- en: The 3-Habit Morning Routine To End Procrastination
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 结束拖延的3习惯早晨例行程序
- en: 原文：[https://thedankoe.com/letters/the-3-habit-morning-routine-to-end-procrastination/](https://thedankoe.com/letters/the-3-habit-morning-routine-to-end-procrastination/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/the-3-habit-morning-routine-to-end-procrastination/](https://thedankoe.com/letters/the-3-habit-morning-routine-to-end-procrastination/)
- en: I’ve tried all of the morning routines.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我尝试过所有的早晨例行程序。
- en: I’ve taken them slow, meditated, read for 30 minutes, and everything else like
    that.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经慢慢地做了，冥想，阅读了30分钟，以及其他所有类似的事情。
- en: I always felt like I was behind.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我总是感觉我落后了。
- en: Stressed and worried about the tasks waiting for me.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 对等待我的任务感到紧张和担忧。
- en: That energy would carry into the rest of my day — they always felt off.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这种能量会持续到我的整个白天——他们总是感觉不对劲。
- en: Over the years of experimentation, I’ve found 3 simple habits was all I needed.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 经过多年的实验，我发现只需要三个简单的习惯。
- en: Having 3 things at the top of mind reduced the friction of getting out of bed.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 有三件事情在脑海中，减少了起床的摩擦。
- en: Once I had intention and purpose behind my mornings — it made a world of difference.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我在早晨有了意图和目的——这产生了巨大的差异。
- en: The 3 Habit Morning Routine
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3习惯早晨例行程序
- en: Mornings are sacred. They set the tone for the rest of the day. Your morning
    routine should have the purpose of generating energy.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 早晨是神圣的。它们为一天剩下的时间定下了基调。你的早晨例行程序应该具有产生能量的目的。
- en: We want to carry and maintain that energy throughout the day.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望在整个白天都能保持这种能量。
- en: Go On A Walk
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 去散步
- en: We all know that the body follows the mind, but the mind can also follow the
    body.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都知道身体跟随心灵，但心灵也可以跟随身体。
- en: They play into each other.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 它们相互影响。
- en: If you want to generate unstoppable momentum into the rest of your day, start
    by moving your body.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要为你的剩余时间产生不可阻挡的动力，就从活动你的身体开始。
- en: Better yet, do it outside.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的是，在外面做。
- en: “An early-morning walk is a blessing for the whole day.” – Henry David Thoreau.
  id: totrans-18
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “清晨散步是一天中的祝福。” ——亨利·大卫·梭罗。
- en: Henry was onto something.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 亨利确实发现了些什么。
- en: Not only are you getting some of your daily steps in, but you are also exposing
    your skin to direct sunlight.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 不仅你完成了你的一些日常步数，而且你还让你的皮肤暴露在直接阳光下。
- en: This is critical for healthy circadian biology when you do it on a consistent
    basis.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 当你持续这样做时，这对健康的昼夜节律生物学至关重要。
- en: (It will even help you get on a more consistent sleep schedule — maybe you aren’t
    a night owl after all!)
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: （这甚至可以帮助你建立更一致的睡眠计划——也许你根本不是夜猫子！）
- en: You can walk to a coffee shop, around your apartment complex, or wherever else
    you please.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以走到咖啡馆，公寓楼周围，或者你喜欢的任何地方。
- en: Write this down in your planner the night before so it is top of mind in the
    morning.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在前一天晚上在你的计划中写下这些，这样在早晨就会记住。
- en: The 10 Minute Creative
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 10分钟创意
- en: Let’s make the snowball of momentum even bigger. Let’s make it impossible for
    the day to be considered a loss.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们让动力的雪球变得更大。让我们让一天被认为是一个损失变得不可能。
- en: My favorite morning habit is one that I’ve been developing over the years.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我最喜欢的早晨习惯是我多年来一直在培养的。
- en: It is a combination of journaling, note-taking, and writing.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 它是日记、笔记和写作的结合。
- en: It helps you learn faster, train your creative muscle, and have immense mental
    clarity.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这有助于你更快地学习，训练你的创造力肌肉，并拥有巨大的心理清晰度。
- en: (And if you are a creator, it helps you have unlimited ideas for your work.)
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: （如果你是创作者，这有助于你为你的工作提供无限的想法。）
- en: Here’s what you do.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你要做的。
- en: '**Step 1) Get Inspired**'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤1）获得灵感**'
- en: Read an article, blink, favorite quote, or page from a book.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 阅读一篇文章，眨眼，喜欢的引言，或书的一页。
- en: You can also listen to an audiobook during your morning walk!
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以在早晨散步时听有声书！
- en: 'Note: these should align with your interests.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：这些应该与你的兴趣相符。
- en: This will give you inspiration for the rest of your day.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这将为你的剩余时间提供灵感。
- en: '**Step 2) Take Note Of Your Excitement**'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤2）注意你的兴奋**'
- en: Dopamine separates signal from noise.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 多巴胺将信号与噪音分开。
- en: As you are reading or listening, write down what catches your attention and
    makes you a bit excited.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在阅读或倾听时，写下吸引你注意并让你有点兴奋的内容。
- en: I have a running notes app in my phone that I write all of these down in.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我在手机上有一个运行笔记应用，我把所有这些写下来。
- en: '**Step 3) Write A 3-5 Bullet Summary**'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤3）写一个3-5点的摘要**'
- en: What should you include in this summary?
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该在这个总结中包含什么？
- en: A description of how YOU understand the topic.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你如何理解这个主题的描述。
- en: Personal experiences and stories
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 个人经验和故事
- en: Other ideas that come to mind
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其他想到的想法
- en: Bonus Step For Creators
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者的额外步骤
- en: Write out a common problem related to the topic
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出与主题相关的一个常见问题
- en: Write out the benefits of solving that problem
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出解决那个问题的好处
- en: Write out steps to overcoming it
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出克服它的步骤
- en: Now you have an outline for a blog, thread, newsletter, or multiple tweets.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你已经有了一个博客、帖子、通讯或多条推文的提纲。
- en: (That’s how I wrote this article.)
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: （这就是我写这篇文章的方式。）
- en: '**Step 4) One-Sentence Big Idea**'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤4）一句话的大想法**'
- en: This is where the creativity comes into play.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是创意发挥作用的地方。
- en: From everything you’ve written before, write a one-sentence summary.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 从你之前写下的所有内容中，写出一个总结性的句子。
- en: Get creative. Try to write it with the quality of your favorite quote.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 发挥创意。尽量用你最喜欢的引言的质量来写。
- en: Why are we doing this?
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为什么要这样做？
- en: It gets the creative juices flowing
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这能让创意源泉涌动
- en: It primes your brain for pattern recognition
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它让你的大脑为模式识别做好准备
- en: It shows you that you CAN be original & profound
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这会向你展示你能够原创且深刻
- en: This will only compound as you write more big ideas.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你写下更多的大想法，这只会越来越明显。
- en: If you want a guided 7-day challenge for the 10-Minute Creative habit, [here
    it is.](https://7daystogenius.com)
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要一个指导性的7天挑战，以培养10分钟创意习惯，[这里就是](https://7daystogenius.com)。
- en: The Power Hour
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 力量小时
- en: So far we’ve spent about 20 productive minutes of our morning.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经花费了我们早晨大约20分钟的生产力时间。
- en: Our body and mind are ready to keep going. To take on a challenge. To get into
    flow.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的身体和心灵都准备好继续前进。接受挑战。进入心流状态。
- en: Next up is what I like to call the Power Hour (no, not the drinking game).
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是我喜欢称之为的力量小时（不，不是那个饮酒游戏）。
- en: “Happiness is the feeling that power increases – that resistance is being overcome.”
  id: totrans-66
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “幸福是力量增强的感觉——阻力正在被克服。”
- en: ''
  id: totrans-67
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Nietzsche
  id: totrans-68
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: —— 尼采
- en: The Power Hour is a 1-hour timeblock that is dedicated to builiding.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 力量小时是一个1小时的时间块，专门用于构建。
- en: No distractions. One priority. Laser focused.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 没有干扰。一个优先事项。激光般的专注。
- en: Think of it as an automated 1% better everyday.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 把它想象成每天自动提高1%。
- en: What are you building?
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 你在构建什么？
- en: Personal freedom.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 个人自由。
- en: Work on your side business
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 经营你的副业
- en: Write an article, thread, or book
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写一篇文章、帖子或书籍
- en: Create social media posts
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建社交媒体帖子
- en: Learn a marketable skill
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习一项可销售的技能
- en: Reach out to potential clients
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 联系潜在客户
- en: You know, the things you said you would start doing but haven’t…
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道，那些你说要开始做的事情，但你还没有做…
- en: How do I know what to work on?
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 我怎么知道该做什么？
- en: Write out your vision for the future
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出你对未来的愿景
- en: Reverse engineer it into a 10-year goal
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 反向工程到10年目标
- en: Then a 1-year goal
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后设定一个1年目标
- en: Then monthly goals
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后设定月度目标
- en: Now align your Power Hour tasks with that monthly goal.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，将你的力量小时任务与那个月度目标对齐。
- en: Lever-moving fundamental-focused action that results in an automated 1% better
    everyday. This is why I created [The Power Planner](https://shop.thedankoe.com/planer).
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 移动杠杆、关注基础、导致每天自动提高1%的行动。这就是我创建[The Power Planner](https://shop.thedankoe.com/planer)的原因。
- en: You will end your Power Hour feeling positive about the future.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 你将结束你的力量小时，对未来感到积极。
- en: Within 1 hour you have won the day before most people have woken up.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在1小时内，你就在大多数人醒来之前赢得了这一天。
- en: That feeling is unbeatable.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这种感觉是无与伦比的。
- en: '**To recap:**'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '**总结：**'
- en: Go on a walk for movement and direct sunlight.
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 去散步以活动身体并直接接受阳光。
- en: Spend 10-minutes training your creativity muscle.
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用10分钟训练你的创意肌肉。
- en: Spend 1-hour building a better future for yourself.
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用1小时为自己构建一个更美好的未来。
- en: When done consistently, you will look back after 6 months and bask in the progress
    you made.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 如果持续这样做，6个月后你将回顾自己的进步并沉浸在其中。
