- en: Micro Education Businesses Are The Future (Zero Dollars To Start)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 微型教育企业是未来的趋势（零成本启动）
- en: 原文：[https://thedankoe.com/letters/why-micro-education-businesses-are-the-future-zero-dollars-to-start/](https://thedankoe.com/letters/why-micro-education-businesses-are-the-future-zero-dollars-to-start/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://thedankoe.com/letters/why-micro-education-businesses-are-the-future-zero-dollars-to-start/](https://thedankoe.com/letters/why-micro-education-businesses-are-the-future-zero-dollars-to-start/)'
- en: I’m building a software company.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在建立一个软件公司。
- en: But I’m taking a different approach.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 但我采取了一种不同的方法。
- en: The common route would be to build the product, test it, and market it to a
    specific audience.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 常规的路线是构建产品，测试它，并将其推广给特定的受众。
- en: This works, but I want to skip the “sink or swim” phase of this business.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这方法有效，但我想要跳过这个业务的“沉或浮”阶段。
- en: I am well aware that churn, developer costs, and engraining software in people’s
    daily lives will be difficult.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常清楚，客户流失、开发者成本以及将软件融入人们日常生活中的困难。
- en: Instead, I plan to take the company to $5-$10 million in its first year.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我计划在公司的第一年将其规模扩大到500万至1000万美元。
- en: '*(February 2, 2024 edit: we are well on track for this)*'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '*(2024年2月2日编辑：我们正稳步推进这一目标)*'
- en: A lofty goal, yes.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个宏伟的目标，没错。
- en: But how?
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 但如何？
- en: By leveraging the experience I’ve gained in modern business.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用我在现代商业中获得的经验。
- en: I know the power of a personal brand. I know the power of digital products (and
    how a $10M digital product business is more profitable than most $50M physical
    product businesses). I know that I can use both to create an education product
    as the main driver of revenue in our first year of business – with that product
    operating at 95% profit margins.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道个人品牌的力量。我知道数字产品的力量（以及一个价值1000万美元的数字产品业务比大多数价值5000万美元的实体产品业务更有利可图）。我知道我可以用这两者来创建一个教育产品，作为我们业务第一年的主要收入驱动因素——该产品运营的利润率高达95%。
- en: We will build the company’s social media like we would a personal brand – with
    an “avatar” as the face of the brand. Most businesses have no idea what it takes
    to build an actual social media audience, so they rely on creator sponsorships.
    We want to create a creator.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将像打造个人品牌一样构建公司的社交媒体——以“头像”作为品牌的面孔。大多数企业都不知道如何真正构建一个社交媒体受众，因此他们依赖于创作者赞助。我们想要培养一个创作者。
- en: We will use that audience, and a plethora of creator audiences, to fuel a cohort-based
    course around the subject of our software.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将利用那个受众，以及众多创作者受众，围绕我们的软件主题开展基于群体的课程。
- en: At that point, it doesn’t matter if the software itself is profitable in the
    first year. We can play long-term and slowly inject it into the creator economy
    as the one true second-brain software.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 到那时，软件本身在第一年是否盈利并不重要。我们可以长期规划，并逐渐将其作为真正的第二大脑软件注入创作者经济。
- en: But, this letter isn’t about the software.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 但，这封信并不是关于软件的。
- en: It’s about how *you can start a hyper-profitable education business with the
    knowledge in your head.*
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这关乎你如何*利用你头脑中的知识启动一个高利润的教育业务*。
- en: You don’t need to build software to make this work.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要构建软件来使这一切工作。
- en: Of course, you can build software based around the profitable education product
    you sell to enhance your business results (if you want to down the road – because
    you’ll have the money to invest in one).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，你可以围绕你销售的盈利性教育产品构建软件，以增强你的业务成果（如果你将来想要这么做——因为你将有钱投资）。
- en: 'Here’s what to expect:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你应该期待的内容：
- en: Why a social media audience is the highest leverage business asset.
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为什么社交媒体受众是最高杠杆的商业资产。
- en: How to *create* your own customers (rather than trying to “find” them with boring
    market research).
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如何*创造*你自己的客户（而不是试图通过无聊的市场研究“找到”他们）。
- en: Realizing that you have $100,000 stuck in your head (and how to extract it).
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 认识到你头脑中有10万美元的知识（以及如何提取它）。
- en: If you want the full philosophy for the future of work, pick up [The Art of
    Focus book](https://theartoffocusbook.com) on Amazon.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想了解关于未来工作的完整哲学，请从亚马逊购买[《专注的艺术》一书](https://theartoffocusbook.com)。
- en: Audience Building Is The Greatest Skill Of The Decade
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 建立受众是本世纪最伟大的技能
- en: Personal brands are the new wave that won’t die out.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 个人品牌是新的浪潮，不会消亡。
- en: It’s not a phase, mom.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是一时的潮流，妈妈。
- en: The digital world is expanding faster than the physical, and personal brands
    are the avatars that occupy the space.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 数字世界比物理世界扩张得更快，个人品牌是占据这个空间的化身。
- en: Everyone has a personal brand. Everyone is in the creator economy. But few realize
    that their contributions (posts and products) aren’t contributions at all.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都有自己的个人品牌。每个人都在创作者经济中。但很少有人意识到他们的贡献（帖子和个人产品）根本不是贡献。
- en: Consumers are too busy posting about their lives to impress friends who aren’t
    really friends.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 消费者太忙于发布关于他们生活的内容，以给那些实际上不是朋友的朋友留下深刻印象。
- en: Creators are learning, building, and distilling valuable information that makes
    life better for everyone.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者们正在学习、构建和提炼使每个人的生活都变得更好的有价值信息。
- en: The Realization Of Owned Distribution
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 拥有型分发的实现
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1416">![](../Images/191214d43747aa8c07676eb302d27f24.png)</picture>
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1416">![](../Images/191214d43747aa8c07676eb302d27f24.png)</picture>
- en: I’m connected with and follow many high-level entrepreneurs.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我与许多高级企业家建立了联系并关注他们。
- en: Some in private equity, some in agency work, and some in software or related
    fields.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 一些人在私募股权领域，一些人在代理工作中，还有一些人在软件或相关领域。
- en: In almost every single conversation we have, the point of owned distribution
    comes up.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们几乎每一次的对话中，都会提到拥有型分发的重要性。
- en: “I don’t know why I didn’t start posting content sooner.”
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: “我不知道为什么我没有早点开始发布内容。”
- en: “It’s insane how much the marketing world has changed in a few short years,
    a personal brand is becoming less and less optional.”
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: “营销世界在短短几年里发生了翻天覆地的变化，个人品牌变得越来越不是可选项。”
- en: 'Of course, this doesn’t eliminate the need for other types of distribution:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这并没有消除对其他类型分发的需求：
- en: '**Manual** – like cold email, cold calls, or cold direct message campaigns.'
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**手册** - 例如冷电子邮件、冷电话或冷直接消息活动。'
- en: '**Bought** – like purchasing Facebook or Google ads.'
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**购买** - 例如购买Facebook或Google广告。'
- en: '**Borrowed** – like paying for podcast, YouTube, or newsletter sponsorships.'
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**借用** - 例如支付播客、YouTube或通讯赞助商的费用。'
- en: '**Owned** – like building an audience, newsletter, community, or list of product
    buyers.'
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**拥有** - 例如建立受众、通讯、社区或产品购买者名单。'
- en: The lines are blurred between them all, and I missed a few things like SEO,
    but they all have their use cases.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 它们之间的界限变得模糊，我错过了一些像SEO这样的东西，但它们都有它们的使用案例。
- en: The first 3 are incredible for testing, beginner business owners, and having
    some form of control over your outcomes.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 前三项对于测试、初涉商业的业主以及对你结果的控制形式来说都是不可思议的。
- en: Owned distribution is a long-term game that scares most people away.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 拥有型分发是一个长期的游戏，它让大多数人望而却步。
- en: Let’s imagine I spent 2 years building a 100,000-person audience.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们假设我花了2年时间建立了一个10万人规模的受众。
- en: If I promoted my product every day for a month (in a smart way) I would get
    at least a million impressions.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我每天（以明智的方式）推广我的产品一个月，我会至少获得一百万的曝光量。
- en: How long would it take me to direct message a million people? A long time.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我要直接消息一百万个人需要多长时间？很长时间。
- en: How much money would it cost for me to reach that many people with ads? Around
    $7,000 a month (based on $7 as an average CPM).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我要花多少钱才能通过广告接触到那么多人？大约每月7000美元（基于平均每千次展示费用7美元）。
- en: Not to mention, owned distribution compounds.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 更不用说，拥有型分发是累积的。
- en: You can get to 10-20k followers in a year, 50-100k in two years, and millions
    after 4-5 years. That is, if you know how to iterate on your best content… or
    even write content in the first place.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在一年内获得10-20k的粉丝，两年内获得50-100k，4-5年后获得数百万。也就是说，如果你知道如何迭代你最好的内容……或者甚至一开始就写内容。
- en: It only makes sense to [systemize your audience growth](https://2hourwriter.com)
    with time and leverage other distribution methods to make your desired revenue.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 只有在时间和利用其他分发方法来创造你想要的收入时，才合理地[系统化你的受众增长](https://2hourwriter.com)。
- en: Once you see the power of personality, owned distribution, and flexibility of
    a personal brand – there’s no going back.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你看到了个性、拥有型分发和个人品牌的灵活性所带来的力量，你就无法回头了。
- en: Audience Building Is A Stack Of High-Value Skills
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 建立受众是一项高价值技能的堆栈
- en: To become a good audience builder, you can’t just study “audience building.”
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 要成为一名优秀的受众建设者，你不仅需要学习“受众建设”。
- en: This is the case for most skills that get abnormal results.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这适用于大多数产生异常结果的能力。
- en: It’s not as simple as looking up a video on “the best skills to learn in 2023,”
    because that’s what everyone else is doing. It’s a great way to commoditize yourself
    and be replaceable.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 它并不像查找“2023年最佳学习技能”的视频那样简单，因为每个人都在这样做。这是一种很好的方式，可以让你自己商品化并变得可替代。
- en: 'Audience building is a stack of today’s most profitable skills:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 受众建设是当今最盈利技能的堆栈：
- en: Graphic design
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图形设计
- en: Content writing
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内容写作
- en: Copywriting
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 营销文案
- en: Marketing & sales
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 营销与销售
- en: Human nature
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人的本性
- en: Psychology
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 心理学
- en: Self-awareness
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自我意识
- en: Networking
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网络营销
- en: And it demands multidisciplinary study and expertise.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 它需要跨学科的学习和专业技能。
- en: Audience building is a *lifestyle.*
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 受众建设是一种**生活方式**。
- en: It is the act of capturing, curating, connecting, creating, and distributing
    valuable information, resources, and products in a way that impacts positive behavior
    change.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种捕捉、整理、连接、创造和以影响积极行为改变的方式分发有价值的信息、资源和产品。
- en: If you don’t pursue a better life for yourself, you will fail.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不为自己的更好生活而努力，你将失败。
- en: '*A better life demands the habits of learning, building, and distributing.*'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '*更好的生活需要学习、构建和分发的习惯*。'
- en: Rapid Fire Tips To Start Learning, Building & Distributing
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 快速学习、构建和分发的技巧
- en: Here is exactly what you must do (without the fluff).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是你必须做的（没有废话）。
- en: These must become habit.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这些必须成为习惯。
- en: That means a part of your everyday life.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着你日常生活中的一个部分。
- en: If you can spend 8 hours building someone else’s dreams, you can spend 1 hour
    building your own.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你可以花8小时去实现别人的梦想，你就可以花1小时来实现自己的梦想。
- en: If you don’t have 1 hour a day to invest in having 2 hours a day, and so on,
    you need to get your priorities straight.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你每天没有1小时的时间来投资于每天2小时，以此类推，你需要理清你的优先事项。
- en: '**Learning with intention:**'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '**有目的地学习：**'
- en: Learn the principles of marketing, sales, writing, and social media. Binge-watch
    30-50 hours of free content and paid courses. Build your personal brand along
    the way so you actually apply what you learn.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 学习营销、销售、写作和社交媒体的原则。观看30-50小时的免费内容付费课程。在旅途中建立你的个人品牌，这样你才能真正应用你所学的。
- en: Study what interests you. Do not limit yourself. If you have the goal of building
    a better life for yourself, anything you learn will be from that lens. You are
    still “focusing on one thing.”
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 研究你感兴趣的东西。不要限制自己。如果你有为自己创造更好生活的目标，你所学的任何东西都将从这个角度出发。你仍然是在“专注于一件事情”。
- en: When you feel the excitement, or dopamine, that comes from discovering a novel
    idea, write it down. Refine that idea and post it to your profile.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 当你感受到来自发现新想法的兴奋或多巴胺时，把它写下来。完善这个想法，并将其发布到你的个人资料中。
- en: '**Build for yourself:**'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '**为自己构建：**'
- en: Pursue your goals and document the process. By document, I mean to keep running
    notes, logs, successes, and failures somewhere safe, physical or digital.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 追求你的目标并记录过程。这里的“记录”是指将笔记、日志、成功和失败保存在某个安全的地方，无论是实体还是数字形式。
- en: From your journey, you gain a knowledge of 100\. From that, you can create a
    path of 1\. This is how you pass down a unique system that markets itself and
    gets better results than those looking to make a quick buck.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 从你的旅程中，你获得100%的知识。从那以后，你可以创造一条1%的道路。这就是你传递一个自我营销并获得比那些想快速赚钱的人更好的结果的独特系统的方式。
- en: Along the way, post the advice, lessons, and authentic successes and failures
    you’ve experienced. This is called “building in public.” Don’t do it for others.
    Do it as a digital journal. It will pay off.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在旅途中，发布你所经历的建议、经验和真实成功与失败。这被称为“公开构建”。不要为了别人做这件事，而要把它当作一个数字日志。这样做会得到回报。
- en: '**Distribute a purposeful product:**'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '**分发有目的的产品：**'
- en: Most people don’t realize that products are authority catalysts. They think
    they are “selling out” by selling a product, but don’t realize that it adds perceived
    authority to their brand, and they gain more loyal followers.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人没有意识到产品是权威催化剂。他们认为通过销售产品就是“背叛”，但没有意识到这增加了他们品牌的感知权威，并且他们获得了更多忠实的追随者。
- en: Create a product that you need, or needed, in your life. Something that would
    have helped you achieve where you are now, or something that will help you achieve
    something faster. This can be clothes for style, courses for knowledge, journal
    for productivity, or anything in between.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个你生活中需要或曾经需要的产品。这可以是帮助你达到目前状态的衣物、知识课程、生产力日记，或者任何介于两者之间的东西。
- en: Sell to yourself and you won’t have to worry about competition.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 向自己销售，你就不必担心竞争。
- en: Customer Creation Through Education
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过教育创造客户
- en: I don’t agree with 99% of business gurus out there.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我不同意那里99%的商业大师。
- en: Most of the hyper-successful ones are old and out of touch. Most of the young
    ones never question what the old ones say and forge a new path.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数超级成功的人都很老，已经脱离了现实。大多数年轻人从不质疑老年人的说法，而是开辟一条新的道路。
- en: It is common advice to “build a product for a starving market, then attract
    that market as your audience.”
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: “为饥饿的市场构建产品，然后吸引那个市场作为你的受众”是一种常见的建议。
- en: Yes, obviously this works.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，显然这是有效的。
- en: 'But it also comes with the downsides of:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 但它也伴随着以下缺点：
- en: Hating your customer base and not feeling motivated to work.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 讨厌你的客户群，并且没有动力工作。
- en: Not having autonomy over what you write and build.
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有自主权来决定你写什么和构建什么。
- en: Not being able to pivot into whatever topic or interest you are curious about.
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无法转向你好奇的任何主题或兴趣。
- en: Being forced into a specific identity, which spills over into the entirety of
    your life.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 被迫接受一个特定的身份，这会影响到你生活的方方面面。
- en: When you prioritize education in your brand through courses, content, cohorts,
    and coaching (all optional), you unlock the ability to *create* your own customers.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 当你通过课程、内容、群体和辅导（所有这些都是可选的）在你的品牌中优先考虑教育时，你就能解锁创造自己客户的能力。
- en: Humans Are Learning Machines
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人类是学习机器
- en: Why does a starving market desire what they desire?
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么一个饥饿的市场渴望他们所渴望的东西？
- en: Why are they willing to pull out their card and pay for something they perceive
    as valuable?
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么他们愿意拿出信用卡并支付他们认为有价值的东西？
- en: Why are you told to “niche down” so you can get specific on the problem you
    leverage in your marketing?
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么你会被告知“专注于细分市场”，以便你能具体化你在营销中利用的问题？
- en: Because of social conditioning, learning, and education.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为社会条件、学习和教育。
- en: You target a specific person because they are educated to have that identity.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 你针对特定的人，因为他们被教育去拥有那个身份。
- en: Their identity influences what they desire (because of who they surround themselves
    with and what they see as opportunity).
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的身份影响着他们渴望的东西（因为他们周围的人和他们认为的机会）。
- en: When you *create* identities through education, by leading people towards your
    vision through your narrative, people grow to desire the product that will help
    them reach that goal.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 当你通过教育创造身份，通过你的叙述引导人们走向你的愿景时，人们会渴望那些帮助他们实现目标的产品。
- en: The Levels Of Awareness
  id: totrans-110
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 意识层次
- en: There is a marketing concept called the “levels of awareness” that will change
    your life.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个营销概念叫做“意识层次”，它将改变你的生活。
- en: It is a simple copywriting framework popularized by Eugene Schwartz in his book
    *Breakthrough Advertising*.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个简单的文案框架，由尤金·施瓦茨在他的书《突破广告》中推广。
- en: It doesn’t only apply to marketing, but everything.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅适用于营销，还适用于一切。
- en: Evolution is about solving problems in the macrocosm. Personal growth is about
    solving problems in the microcosm. Business is about solving problems to bridge
    the gap between the two.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 进化是关于在宏观宇宙中解决问题。个人成长是关于在微观宇宙中解决问题。商业是关于解决问题，以弥合这两个之间的差距。
- en: Business is your contribution to humanity.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 商业是你对人类的贡献。
- en: It is how you fulfill your life’s purpose of raising your consciousness (or
    awareness) and letting that impact the world like a ripple in water.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你实现提升意识（或意识）的生活目的的方式，并让这种影响像水波一样影响世界。
- en: 'There are 5 levels of awareness:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 有5个意识层次：
- en: '**Unaware** – unaware of the problem.'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无意识** – 对问题无意识。'
- en: '**Problem aware** – aware of the problem.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问题意识** – 意识到问题。'
- en: '**Solution aware** – aware of a solution(s) to the problem.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案意识** – 意识到问题的解决方案。'
- en: '**Product aware** – aware of your solution to the problem.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**产品意识** – 意识到你对问题的解决方案。'
- en: '**Most aware** – aware of the vast impact that problem is having on their quality
    of life.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最意识** – 意识到这个问题对他们生活质量的巨大影响。'
- en: Your job as an education brand is to hit all of these levels.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 作为教育品牌，你的工作是触及所有这些层次。
- en: You must make your audience aware of the problems you’ve solved in your life
    (and how that problem impacts their life).
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须让你的受众意识到你生活中解决的问题（以及这些问题如何影响他们的生活）。
- en: You must give advice, lessons, and tips to show that there is a solution.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须提供建议、课程和技巧，以表明存在解决方案。
- en: You must market a product that solves the problem faster just by the nature
    of invested attention.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须推广一种产品，它仅通过投入的注意力就能更快地解决问题。
- en: People don’t log on to social media to solve their problems. It isn’t a learning
    platform. And most people can’t focus, research, and figure out a path for themselves.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 人们登录社交媒体不是为了解决问题。它不是一个学习平台。而且大多数人无法集中注意力、进行研究并为自己找到一条道路。
- en: That is why products are valuable.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么产品有价值。
- en: Because people know they are investing in a solution. Then, their attention
    and behavior follow suit.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 因为人们知道他们正在投资一个解决方案。然后，他们的注意力和行为也会相应地改变。
- en: Free education only works for the 1% that have been conditioned to be motivated
    and ambitious. Even they still see the value in aggregated information, and will
    probably buy out of convenience.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 自由教育只对那1%已经被培养出动力和雄心的人有效。即使是他们，也仍然看到聚合信息的价值，并且可能会出于便利而购买。
- en: The Balance Of Long-Form & Short-Form
  id: totrans-131
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 长篇与短篇的平衡
- en: For the uninitiated, there are 2 main types of content (and communication).
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 对于初学者来说，内容（和沟通）主要有两种类型。
- en: '**Long-form** – podcasts, videos, articles, newsletters, conversations, movies,
    and sometimes long social posts like threads.'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**长形式** – 播客、视频、文章、通讯、对话、电影，有时是长社交帖子，如线程。'
- en: '**Short-form** – tweets, shorts, reels, texts, emails, big ideas, and your
    favorite quotes.'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**短形式** – 推文、短视频、 reels、文本、电子邮件、大想法和你的最爱引言。'
- en: Each has its pros and cons, but long term, they are both necessary to build
    an audience that *trusts* you. Trust is the “new” sales hack that people are starting
    to catch onto.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 每种形式都有其优缺点，但从长远来看，它们都是建立信任你的受众所必需的。信任是“新”的销售技巧，人们开始意识到这一点。
- en: Short-form is for capturing attention, building a large audience, and funneling
    that audience to deeper sources of value (long-form platforms, products, and services).
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 短形式是用来吸引注意、建立庞大的受众群体并将该受众引导到更深层次的价值来源（长形式平台、产品和服务）。
- en: Long-form is for holding invested attention, segmenting your audience, and building
    trust through expertise.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 长形式是用来保持投入的注意力，细分你的受众，并通过专业知识建立信任。
- en: The balance of both forces you to have value to deliver. If you don’t have a
    habit of self-education, building products or systems, and using writing as a
    way to clarify your thoughts and ideas – you are delaying the inevitable.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 两种力量的平衡迫使你必须提供价值。如果你没有自我教育的习惯，不构建产品或系统，也不使用写作来澄清你的思想和观点，那么你就是在推迟不可避免的事情。
- en: I am aware that most of my readers are beginners.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道我的大多数读者都是初学者。
- en: For you, I recommend starting with one long-form channel and one short-form.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 对于你，我建议从一条长形式渠道和一条短形式渠道开始。
- en: Eventually, when you do this full-time and systemize your process you can repurpose
    those to all platforms.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，当你全职做这件事并系统化你的流程时，你可以将这些内容重新用于所有平台。
- en: For long-form, I recommend a newsletter. Why?
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 对于长形式，我推荐通讯。为什么？
- en: You can practice when nobody is watching.
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以在没有人观看的时候练习。
- en: You can build a database of content to repurpose into blogs, YouTube, and solo
    podcasts.
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以建立一个内容数据库，将其重新用于博客、YouTube和单人播客。
- en: Long-form builds depth and connection with your audience so you don’t have to
    rely on pushy sales tactics to make a living.
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 长形式可以加深与观众的联系，因此你不必依赖推促的销售策略来谋生。
- en: You are forced to develop original ideas that spill over into your short-form
    content.
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你被迫发展出原创的想法，这些想法会渗透到你的短形式内容中。
- en: For short-form, I recommend a writing platform like X. Why?
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 对于短形式，我推荐一个写作平台如X。为什么？
- en: You don’t *have* to show your face or body (having a headshot as your profile
    picture helps of course).
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你**不必**展示你的脸或身体（当然，作为个人资料的肖像照是有帮助的）。
- en: You learn to monetize your mind instead of your looks. Your income depends on
    your creativity.
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你学会将你的思维货币化而不是你的外貌。你的收入取决于你的创造力。
- en: You can test multiple ideas each day and repurpose your best ones to other platforms
    like Instagram and LinkedIn to grow faster.
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以每天测试多个想法，并将你最好的想法重新用于Instagram和LinkedIn等平台以更快地增长。
- en: You can use your writing as scripts for shorts, reels, and TikToks.
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以用你的写作作为短视频、 reels和TikToks的脚本。
- en: I teach this entire process in [2 Hour Writer.](https://2hourwriter.com)
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 我在[2小时作家](https://2hourwriter.com)中教授这个整个过程。
- en: Start with 30 minutes of writing each morning.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 从每天早上30分钟的写作开始。
- en: Write a long-form newsletter. Use the ideas you write about as short posts.
    Eventually, let your engagement data act as a compass for what you write more
    about.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 写一篇长形式通讯。使用你写下的想法作为短篇帖子。最终，让你的参与度数据作为你写更多内容的指南针。
- en: You Have $100,000 Trapped In Your Head
  id: totrans-155
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你大脑中有10万美元的财富被囚禁
- en: I wrote an entire letter about how to package up the [knowledge in your head
    to create a $100,000 product.](https://thedankoe.com/letters/you-have-100000-of-knowledge-trapped-in-your-brain/)
    Give it a read if you don’t want to stop after this letter.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 我写了一整封信，讲述了如何将[你头脑中的知识打包成价值10万美元的产品](https://thedankoe.com/letters/you-have-100000-of-knowledge-trapped-in-your-brain/)。如果你不想在这封信之后停下来，请阅读它。
- en: 'First, let’s handle the prime objection of information products in general:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们处理一般信息产品的主要反对意见：
- en: “It’s not real.”
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: “它不是真实的。”
- en: “It’s not tangible.”
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: “它不是有形的。”
- en: “It’s just words on a screen.”
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: “这只是屏幕上的文字。”
- en: If the root of your existence (and quality of life) is your mind, and your mind
    is an information processing machine, and the information you consume heavily
    influences where you end up in life (and the people’s lives you impact) – information
    products are the greatest product one can sell.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的存在根源（和生活质量）是你的思维，而你的思维是一个信息处理机，你消费的信息在很大程度上影响了你最终的生活（以及你影响的人的生活）——信息产品是人们可以出售的最好的产品。
- en: Anyone who tells you otherwise has not thought it through or experienced the
    business model. They are conditioned by their favorite guru’s worldview and can’t
    escape it.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 任何告诉你不同的人都没有深思熟虑或经历过商业模式。他们被他们最喜欢的导师的世界观所影响，无法摆脱。
- en: I am moving toward the belief that every single business should have a *foundation*
    of education.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 我越来越相信，每个企业都应该有一个教育的**基础**。
- en: Every single business should have an information product to distribute positive
    behavior change at scale.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 每个企业都应该有一个信息产品来大规模传播积极的行为改变。
- en: Not to mention, the fact that they have 95%+ profit margins is a sign that the
    economy will continue to favor the education market. Technology and evolution
    have led us to this point, and who are you to question Mother Nature?
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 更不用说，他们有95%以上的利润率，这是经济将继续青睐教育市场的信号。技术和进化将我们带到这个点，你有什么资格质疑大自然？
- en: How To Eliminate All Saturation
  id: totrans-166
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何消除所有饱和度
- en: Build a product for your past self or current self.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 为你过去的自己或现在的自己打造一个产品。
- en: One that accelerates the progress made toward a meaningful goal.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 一个能加速向有意义的目标迈进的过程。
- en: 'Your marketing will revolve around the Universal principle of human behavior:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 你的营销将围绕人类行为的普遍原则展开：
- en: '**Purpose** – a compelling reason to move toward a better future.'
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目的** – 向着更美好未来前进的强烈理由。'
- en: '**Path** – a process, system, or steps that bring clarity to their actions.'
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**路径** – 一个过程、系统或步骤，为他们的行动带来清晰性。'
- en: '**Priority** – the burning problem they face at their level of awareness.'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优先级** – 他们意识层面面临的紧迫问题。'
- en: If you like productivity, create a workflow with education around that.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你喜欢生产力，围绕教育创建一个工作流程。
- en: If you like spirituality, create meditations with education around that.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你喜欢灵性，围绕教育创建冥想。
- en: If you like fitness, create a program with education around that.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你喜欢健身，围绕教育创建一个计划。
- en: You can’t improve what doesn’t exist, so don’t stress the first iteration. This
    is a long game of improvement.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 你不能改善不存在的东西，所以不要担心第一次迭代。这是一个长期的改进游戏。
- en: “But what about my customer avatar and market research?”
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: “但我的客户画像和市场调研怎么办？”
- en: It’s you.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 就是这个。
- en: You are the niche.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 你是细分市场。
- en: You are the customer avatar.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 你是客户画像。
- en: Write the content and promotions that would speak to you.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 写出能与你产生共鸣的内容和推广。
- en: There are a lot of moving pieces to this. It will take a year or so to actually
    feel like you are getting the hang of it.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 这个问题有很多变数。可能需要一年的时间才能真正掌握它。
- en: But don’t make the mistake and thinking that this is a unique case. Every single
    thing you’ve done in life has been a process of trial and error.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 但不要犯错误，认为这是一个独特案例。你生活中所做的一切都是一个试错的过程。
- en: Just because you are older and have psychological barriers built up doesn’t
    mean you can’t build a business like you learned to walk.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 只因为你年纪大了，心理上建立了障碍，并不意味着你不能像学习走路一样建立自己的企业。
- en: I hope you enjoyed this one, my friends.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 希望你们喜欢这个，我的朋友们。
- en: Have a great weekend.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 周末愉快。
- en: – Dan Koe
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹·科
