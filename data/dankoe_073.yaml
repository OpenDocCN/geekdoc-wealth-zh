- en: The Value Creator (A New Internet Career Path For Intelligent People)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 《价值创造者》（为聪明人开辟的新互联网职业道路）
- en: 原文：[https://thedankoe.com/letters/the-value-creator-a-new-internet-career-path-for-intelligent-people/](https://thedankoe.com/letters/the-value-creator-a-new-internet-career-path-for-intelligent-people/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://thedankoe.com/letters/the-value-creator-a-new-internet-career-path-for-intelligent-people/](https://thedankoe.com/letters/the-value-creator-a-new-internet-career-path-for-intelligent-people/)'
- en: Employers hire based on your social media.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 雇主根据你的社交媒体来雇佣你。
- en: Creators hire based on your social media.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者根据你的社交媒体来雇佣你。
- en: Brands hire based on your social media.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 品牌根据你的社交媒体来雇佣你。
- en: Clients hire based on your social media.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 客户根据你的社交媒体来雇佣你。
- en: Customers buy based on your social media.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 客户根据你的社交媒体来购买。
- en: Social media is a necessity of modern life.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体是现代生活的必需品。
- en: It *is* virtual reality.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这确实是虚拟现实。
- en: It *is* a digital society.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这确实是一个数字社会。
- en: It *is* the new economy.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这确实是新经济。
- en: Without a public resume, you close yourself off to global opportunities.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 没有公开的简历，你就关闭了自己对全球机会的接触。
- en: Most people still perceive it as an “app on their phone.”
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人仍然将其视为“手机上的一个应用”。
- en: And yet they spend a much-too-large portion of their life on it.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，他们却在其中花费了太多时间。
- en: Scrolling away rather than building their future.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 选择逃避而不是构建他们的未来。
- en: Once you see social media for what it is, a new world opens up.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你看到了社交媒体的本质，一个新世界就会打开。
- en: You can learn skills that schools can’t teach you.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以学习到学校无法教授你的技能。
- en: You can make friends that are doing bigger things than your local ones.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以结交比你当地更大的朋友。
- en: You can make money that isn’t capped by a salary.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以赚到不受薪水限制的钱。
- en: You’re in the middle of the digital renaissance.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 你正处于数字复兴的中间。
- en: Take advantage of it.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 利用这一点。
- en: The Fall Of The Nation
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 《国家的衰落》
- en: I was reading a [Shortform](https://shortform.com/dan) summary of The Sovereign
    Individual last week.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 上周我阅读了《主权个体》的[Shortform](https://shortform.com/dan)总结。
- en: I’ve read the book before, but I didn’t make an important connection.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我之前读过这本书，但并没有建立重要的联系。
- en: 'The central argument of the book is that:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 书的核心论点是：
- en: “Nations” will fragment into millions of “city-states” and even individual “estates”
    with sovereign-nation status.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “国家”将分裂成数百万个“城邦”甚至拥有主权国家地位的个体“领地”。
- en: Information technology is rapidly advancing to make resources available to more
    people.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 信息技术正在快速发展，使更多的人能够获得资源。
- en: This will change the structure of society and how we relate to each other politically
    and economically.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这将改变社会的结构以及我们在政治和经济上相互关系的方式。
- en: How people make the most money impacts the evolution of society. Society shapes
    itself around those jobs, careers, or businesses.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人们如何赚钱影响着社会的演变。社会围绕着那些工作、职业或企业塑造自己。
- en: Creating a new way of earning money or making businesses more *profitable* will
    have society adapt to increase its wealth.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创造新的赚钱方式或使企业更具**盈利性**将使社会适应并增加其财富。
- en: The book predicted what I have been preaching for the past year.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书预测了我过去一年一直在宣扬的事情。
- en: That the future of work is play.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 工作的未来就是玩耍。
- en: That individuals can [grow a one-person business](https://digitaleconomics.school)
    with the new technologies available to them.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 个人可以利用他们可用的新技术[发展单人企业](https://digitaleconomics.school)。
- en: That the one-person business model can make $1-$5 million a year with 90-95%
    profit margins, so society is adapting to reflect that.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 单人商业模式每年可以赚取100万至500万美元，利润率高达90-95%，因此社会正在适应这种变化。
- en: That everyone is an entrepreneur, social media is the new society, and that
    personal brands or creators are the people of that society.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都是企业家，社交媒体是新社会，而个人品牌或创作者是这个社会的人。
- en: That there’s a reason everyone wants to be a “YouTuber” when they grow up. Although
    it may be exaggerated as a child, people feel the natural pull to do what they
    love and help others along the way. And there is a way for the majority of the
    population to do this (maybe not only on YouTube, of course, but we will see technology
    and social media continue to move toward this reality).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是为什么每个人长大后都想成为“YouTuber”的原因。尽管这可能被夸张为儿童时期，但人们会感受到自然的吸引力去做他们热爱的事情，并在过程中帮助他人。而且对于大多数人口来说，有办法做到这一点（当然，也许不仅仅是在YouTube上，我们将看到技术和社交媒体继续朝这个现实发展）。
- en: Evolution reflects human desire.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 进化反映了人类的需求。
- en: We solve problems to make that desire come true.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们解决问题，让这种愿望成为现实。
- en: Social media solved so many problems that we have yet to realize its true impact.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体解决了许多问题，我们还没有意识到它的真正影响。
- en: That the creator economy is a decentralized entity composed of brands (or city-states)
    and creators (or individual estates) that maintain their own sovereignty.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者经济是一个去中心化的实体，由品牌（或城邦）和创作者（或个人领地）组成，它们保持自己的主权。
- en: If you want to take part in the next phase of human evolution, becoming a Value
    Creator is the answer.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想参与人类进化的下一阶段，成为价值创造者就是答案。
- en: The Importance Of Education
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 教育的重要性
- en: Education is the first step in value creation.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 教育是价值创造的第一步。
- en: How are you going to create anything worth distributing if you don’t become
    a person of value?
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不想成为一个有价值的人，你将如何创造任何值得分发的东西？
- en: Yes, to join in on the new, profitable economy you will need to do something
    with your life. Shocker.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，为了加入这个新的、有利可图的经济体，你需要对你的生活做一些事情。令人震惊。
- en: But, conventional education won’t cut it.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，传统的教育是不够的。
- en: The current school system is just that, a system.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 当前的学校系统就是这样，一个系统。
- en: A system that molds you into the workforce.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 一个塑造你成为劳动力的系统。
- en: It teaches the obedience and skills necessary to work a job in the old economy.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 它教授了在旧经济中工作所需的服从和技能。
- en: If you want to make money in the new economy, then obviously you must seek education
    that teaches you how to.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想在新的经济中赚钱，那么显然你必须寻找教你如何做到这一点的教育。
- en: Courses, coaching, and content from brands and creators that have *created*
    those ways of making money.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 来自那些已经*创造*了这些赚钱方式的品牌和创作者的课程、指导和内容。
- en: New jobs are being created left and right.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 新的工作正在左右创造。
- en: The ones where boomers will tell you to “get a real job.”
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 那些婴儿潮一代会告诉你“找一份真正的工作”的地方。
- en: Every great idea started as blasphemy until it became the normal way of doing
    things.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 每一个伟大的想法最初都是亵渎，直到它成为做事的正常方式。
- en: This area is still developing.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这个领域仍在发展。
- en: It makes sense why many have bad experiences with scammers.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 很多人与骗子有不良经历是有道理的。
- en: They are few and far between nowadays, especially if you have some critical
    thinking skills to avoid it, but there are ample people to learn from.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 现在它们很少见，尤其是如果你有一些批判性思维技能来避免它，但总有很多人可以学习。
- en: Lifelong self-education to adapt to the changing digital landscape is a necessity
    to do business in this space.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 终身自我教育以适应不断变化的数字景观是在这个领域开展业务所必需的。
- en: Education shapes the future because it shapes human behavior.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 教育塑造未来，因为它塑造了人类行为。
- en: Education expands your perspective and allows you to spot opportunities in unknown
    territory.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 教育扩展了你的视野，并允许你在未知领域中发现机会。
- en: The new education system is being built online before your eyes.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 新的教育体系正在你的眼前在线构建。
- en: Set a goal.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 设定一个目标。
- en: Find creators you resonate with.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 找到你共鸣的创作者。
- en: Drown yourself in the information they provide.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 沉浸在他们提供的信息中。
- en: Watch new opportunities register in your awareness.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 观察新的机会在你的意识中注册。
- en: Act on them like your life depends on it.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 就像你的生命依赖于它一样去行动。
- en: The Rise Of The Value Creator
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 价值创造者的崛起
- en: 'In short, Value Creators are those that:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，价值创造者是这样的：
- en: Earn with their mind, not their time (so they can stay as a [one-person business](https://thedankoe.com/letters/the-one-person-business-revisited-turn-yourself-into-a-business/)
    without limiting their income). One man’s labor cannot scale, but their creative
    ability can.
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用他们的头脑而不是时间来赚钱（这样他们就可以作为一个[个人企业](https://thedankoe.com/letters/the-one-person-business-revisited-turn-yourself-into-a-business/)存在，而不限制他们的收入）。一个人的劳动无法扩展，但他们的创造力可以。
- en: Research their obsessions and distill their learnings with writing, video, and
    other internet content.
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究他们的痴迷，并通过写作、视频和其他互联网内容提炼他们的学习成果。
- en: Get paid for aggregated knowledge and experience in the form of digital products
    (or physical products if you want, but everyone should have some form of digital
    product).
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以数字产品（或如果你愿意，也可以是实体产品）的形式获得聚合知识和经验的报酬。
- en: Have a heavy focus on educating their audience (instead of posting memes, starting
    drama, or other things like that).
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重视教育他们的受众（而不是发布梗图、开始戏剧或其他类似的事情）。
- en: Value creators are those that dedicate themselves to their interests, take it
    on as their life’s work to explore them, and distill the information in the form
    of education.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 价值创造者是那些致力于他们的兴趣，将其作为他们一生的使命去探索，并以教育的形式提炼信息的人。
- en: This is the style of one-person business that I teach.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我教授的这种个人企业的风格。
- en: Creating social media content to build distribution under *your name.*
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 创建社交媒体内容，以你的名字建立分发。
- en: '[Targeting yourself as the niche](https://thedankoe.com/letters/the-most-profitable-niche-is-you-how-to-create-your-niche/).
    That’s who you sell to and create content for.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '[将你自己定位为细分市场](https://thedankoe.com/letters/the-most-profitable-niche-is-you-how-to-create-your-niche/)。这就是你销售的对象，也是你为谁创造内容。'
- en: Building an [education product or service](https://thedankoe.com/letters/you-have-100000-of-knowledge-trapped-in-your-brain/)
    that your past self could have used (like a course, coaching, or tutoring offer).
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 建立一个你的过去自我可能会使用的[教育产品或服务](https://thedankoe.com/letters/you-have-100000-of-knowledge-trapped-in-your-brain/)（比如课程、辅导或家教提供）。
- en: Then, when you reach however much you want to make ($100K – $3M a year… with
    time) you can build whatever else you are passionate about.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，当你达到你想要的任何数额（每年10万美元至300万美元……随着时间的推移）时，你可以建立你热衷于的其他任何事情。
- en: You actively create an evolving education system by becoming an expert in the
    skills and interests you are passionate about.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 通过成为你热衷于的技能和兴趣的专家，你积极地创建一个不断发展的教育体系。
- en: The government can’t and will not nurture a curriculum that gives individuals
    the tools that lead to the dissolution of the old economy.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 政府无法，也不会培养一个课程，为个人提供导致旧经济解体的工具。
- en: Creators Are DJs With Ideas
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创作者是带着想法的DJ。
- en: DJs play music sets.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: DJ们播放音乐集。
- en: They mix together their own songs, other’s songs that fit well, and remix to
    craft a *story* for the crowd listening.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 他们将他们自己的歌曲、适合的其他人的歌曲以及混音结合起来，为正在收听的听众编织一个*故事*。
- en: Technology has evolved to allow electronic DJs to create almost any sound they
    want (limited by their creativity, mind, and perspective).
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 技术的发展使得电子DJ能够创造出几乎任何他们想要的声音（受限于他们的创造力、思维和视角）。
- en: With software and skill, they can blend together sounds, edit how they sound,
    and create music that people give their attention.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 通过软件和技能，他们可以将声音混合在一起，编辑它们的声音，并创造出人们愿意给予关注的音乐。
- en: Creators are no different.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者并无不同。
- en: 'They collect *ideas* of their own, others, and remixes of their favorites.
    Then, they weave them together with the evergreen skills: writing, speaking, marketing,
    and sales.'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 他们收集自己的、他人的以及他们最喜欢的混音的*想法*。然后，他们利用永恒的技能：写作、演讲、营销和销售，将它们编织在一起。
- en: With time, they attract an audience that invests their attention in those ideas.
    With that attention, they can benefit humanity and make an income doing what they
    enjoy.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，它们吸引了一个将注意力投资在这些想法上的观众。有了这种关注，他们可以造福人类，并在享受他们喜欢的事情的同时获得收入。
- en: '**One mistake that creators run into:**'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '**创作者常犯的一个错误：**'
- en: People want to hear the same sounds from their favorite artists over and over
    again.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 人们希望一遍又一遍地听到他们最喜欢的艺术家演奏的同一首曲子。
- en: If my favorite dubstep artist switched to country music, he would lose 90% of
    his audience.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我最喜欢的dubstep艺术家转向乡村音乐，他会失去90%的观众。
- en: Even if he tried to create a new dubstep style, he would have to condition his
    audience’s minds to enjoy it with time. Like how you don’t like a genre until
    you listen to it enough (the same goes for any interest, goal, or skill you are
    pursuing – passion comes from invested energy).
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 即使他想创造一种新的dubstep风格，他也必须随着时间的推移让听众的大脑适应享受它。就像你不喜欢一个流派，直到你听了足够多（这同样适用于你追求的任何兴趣、目标或技能——激情来自投入的能量）。
- en: The same goes for value creators.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这同样适用于价值创造者。
- en: If your favorite creator stopped making the one-person business content that
    grew me to this point, my audience would fall off.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我最喜欢的创作者停止制作让我成长到这一点的个人商业内容，我的观众就会流失。
- en: You can see this in my YouTube views. There are a select few big ideas that
    bring me traction.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以从我的YouTube观看次数中看到这一点。有几个精选的大想法让我获得了吸引力。
- en: Your job as a creator is to find this angle and milk it for eternity.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 作为创作者，你的工作是找到这个角度，并永远地利用它。
- en: Notice how I am able to “remix” what I am saying with all of my interests. From
    philosophy to spirituality to evolutionary psychology.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 注意我如何能够“混音”我所说的内容，涵盖了我所有的兴趣。从哲学到灵性到进化心理学。
- en: Get creative.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 发挥创意。
- en: People do not care if you repeat what you say.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 人们不在乎你是否重复你说的话。
- en: The ones that are interested in your work prefer it.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 对你作品感兴趣的人更喜欢它。
- en: You can’t and will not retain everything I say in this letter with one read.
    Content creation is programming. It is a requirement to be repetitive if you want
    to be remembered.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 你不可能，也不会在一次阅读中就记住我在这封信中说的每一句话。内容创作是编程。如果你想被人记住，重复是必要的。
- en: 'The number one reason people fail as value creators:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 人们作为价值创造者失败的第一大原因：
- en: They’re afraid to put themselves on the market (because they don’t think they’re
    unique).
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 他们害怕将自己推向市场（因为他们认为自己不独特）。
- en: How many pairs of shoes do you have?
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 你有多少双鞋？
- en: How many books on the same topic do you read?
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 你阅读了多少本关于同一主题的书？
- en: How many artists in the same genre do you listen to?
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 你听了多少同类型的艺术家？
- en: Write what you would want to read.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 写下你想要阅读的内容。
- en: Sell a product you would want to buy.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 卖出你想要购买的产品。
- en: Make the videos you would want to watch.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 制作你想要观看的视频。
- en: Put your variation of what people want on the market.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 将你想要的市场上的产品版本。
- en: Only then does your luck increase from 0 to 1%.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 只有这样，你的运气才会从0增加到1%。
- en: Reality Mining To Extract Value
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 现实挖掘以提取价值
- en: How do we start our journey as a value creator?
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何开始作为价值创造者的旅程？
- en: By becoming a mental blacksmith.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 通过成为一个思想锻造者。
- en: Blacksmiths (in a video game, at least) will mine for ore to fuel their creations.
    They will smelt the ore and forge it into armor and weapons.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 锻工（至少在视频游戏中）会挖掘矿石来为他们的创造提供燃料。他们将矿石熔炼并锻造为盔甲和武器。
- en: Creators mine a crevice of reality they are interested in.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 创造者挖掘他们感兴趣的现实的裂缝。
- en: They study, research, and obsess over topics to collect value they can distribute
    to their audience.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 他们研究、调查，并对主题着迷，以收集他们可以向观众传播的价值。
- en: With those ideas, they create armor that they can both wear and give to others.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 带着这些想法，他们创造了他们可以自己穿戴并给予他人的盔甲。
- en: “Armor” is perspective to navigate the world in a better way.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: “盔甲”是更好地导航世界的视角。
- en: Like how a book can “change your life” because it gave you the awareness of
    how to do so.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 就像一本书可以“改变你的生活”，因为它给了你如何做到这一点的意识。
- en: “Weapons” are tools for battle.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: “武器”是战斗的工具。
- en: They are the actionable advice, tips, and strategies that people can act on
    to make progress.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是人们可以采取行动的建议、技巧和策略，以取得进步。
- en: Progress implies a challenge. A battle that individuals must overcome in their
    life. You pass down your lessons so others can navigate life more efficiently.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 进步意味着挑战。个人在生活中必须克服的战斗。你将你的教训传授下去，以便他人能更有效地导航生活。
- en: This is how you increase the rate of human evolution, through education and
    worldview programming opposing societal conditioning.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是通过教育和世界观编程来对抗社会教化，从而提高人类进化的速度。
- en: '**1) Create A Lens**'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 创建一个视角**'
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1345">![](../Images/7eed814e883b35a45fb3f506eca3a497.png)</picture>
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1345">![](../Images/7eed814e883b35a45fb3f506eca3a497.png)</picture>
- en: As you are collecting information, ideas, and value – you need a way to apply
    this information to test against reality.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 当你收集信息、想法和价值时，你需要一种方法来应用这些信息以测试现实。
- en: You need a filter to make your thoughts original. A vessel to channel your creative
    energy.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要一个过滤器来使你的思想原创。一个渠道你的创造能量的容器。
- en: In other words, you need to build a project in alignment with a goal. One that
    leads to your vision.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，你需要建立一个与目标一致的项目。一个能引导你实现愿景的项目。
- en: Why?
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: Because leaders attract followers.
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 因为领导者吸引追随者。
- en: This is your niche and brand. It is how you frame everything you read and write.
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这就是你的利基和品牌。这是你如何构建你阅读和写作的一切。
- en: This is how you create something valuable. Value helps people overcome their
    problems or achieve their goals. We are aiming to attract people with shared goals.
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这就是如何创造有价值的东西。价值帮助人们克服他们的问题或实现他们的目标。我们旨在吸引有共同目标的人。
- en: This is how two people read the same book, article, or content and come up with
    completely different ideas.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是两个人阅读同一本书、文章或内容，却得出完全不同想法的原因。
- en: If you are working towards better health, your mind is a magnet for ideas to
    aid in that.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在努力改善健康，你的思想会吸引帮助实现这一目标的想法。
- en: Someone who is working towards better finances will register different ideas
    from the information they are consuming.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 正在努力改善财务状况的人会从他们所消费的信息中产生不同的想法。
- en: '**2) Pursue Curiosity To Collect Material**'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 追求好奇心以收集素材**'
- en: Don’t consume, research.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 不要消费，要研究。
- en: The best creators don’t stop consuming. Instead, they consume for the sake of
    learning and distributing ideas.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的创造者不会停止消费。相反，他们为了学习和传播思想而消费。
- en: This perception shift alone will turn you into an idea-generation machine. Don’t
    just scroll the internet to entertain yourself. Scroll to educate yourself. This
    is more powerful than you think.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 这种认知转变本身就会让你成为一个想法生成机器。不要只是滚动互联网来娱乐自己。滚动来教育自己。这比你想象的要强大得多。
- en: You must fall back in love with learning outside of the traditional education
    system that made you hate it.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须重新爱上学习，这种学习是在使你讨厌传统教育系统的教育体系之外进行的。
- en: Read books, listen to podcasts, read blog posts and newsletters, and immerse
    yourself in information that aligns with your goals.
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 阅读书籍、收听播客、阅读博客文章和通讯，并沉浸与你目标一致的信息中。
- en: Have a notebook, app, or idea-development system to keep your ideas safe. No,
    you won’t remember them. This step is absolutely critical. I’m not exaggerating.
    Do it.
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 拥有一个笔记本、应用程序或想法发展系统来保护你的想法。不，你不会记得它们。这一步绝对至关重要。我并不是夸张。去做吧。
- en: Note down the ideas that raise dopamine in your brain. The ones rivet your attention
    to them. The one’s that change your perspective and bring you clarity.
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记下那些能在大脑中引起多巴胺上升的想法。那些吸引你注意力的想法。那些改变你的观点并为你带来清晰度的想法。
- en: Contemplate different angles of the ideas you jot down and how they apply to
    your vision, goals, and problems in your life.
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 思考你记下的想法的不同角度以及它们如何适用于你的愿景、目标和生活中的问题。
- en: '*This is what you write about in your content.*'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '*这就是你在内容中写的内容。*'
- en: '*Don’t limit yourself to specific topics (although they are good to write out
    so you have something to research and collect ideas from)**.*'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '*不要将自己限制在特定的主题上（尽管写下来是有好处的，这样你可以进行研究并收集想法）**。*'
- en: '*You are distributing ideas in alignment with a goal.*'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: '*你是在按照一个目标分发想法。*'
- en: '*It doesn’t matter what topic that falls under because chances are it only
    falls under the topic that is you. This is how you make your content original.*'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: '*无论什么主题都无关紧要，因为很可能它只是属于你自己的主题。这就是你如何使你的内容原创**。'
- en: If you don’t know what to learn, read [The One Person Business Model 2.0 letter](https://thedankoe.com/letters/the-one-person-business-revisited-turn-yourself-into-a-business/).
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道要学习什么，请阅读[《一个人业务模型2.0信件》](https://thedankoe.com/letters/the-one-person-business-revisited-turn-yourself-into-a-business/)。
- en: If you want courses that give you exact steps and strategies, check out [2 Hour
    Writer](https://2hourwriter.com) or [Digital Economics](https://digitaleconomics.school).
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要提供确切步骤和策略的课程，请查看[2小时作家](https://2hourwriter.com)或[数字经济学](https://digitaleconomics.school)。
- en: '**3) Create Armor & Weapons**'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 创建盔甲与武器**'
- en: The ideas you collect will begin to shape your worldview, baseline perspective,
    and identity.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 你收集的想法将开始塑造你的世界观、基线观点和身份。
- en: By programming your own mind, your actions will follow suit.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 通过编程你的思维，你的行为将随之而来。
- en: That’s how programming works.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是编程的工作方式。
- en: Even if you are lazy, the pain of inaction toward the opportunities you know
    exist will outweigh the pain of doing nothing with your life.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 即使你很懒惰，对已知存在的机遇不采取行动的痛苦也将超过无所作为的痛苦。
- en: '**Armor creation:** Give people ideas, motivation, and inspiration toward their
    goals. This shapes their perspective and identity. They can be happier in life
    and achieve their goals.'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '**盔甲创造：** 给予人们实现目标的想法、动力和灵感。这塑造了他们的观点和身份。他们可以在生活中更加快乐，并实现他们的目标。'
- en: '**Weapon creation:** Give actionable steps, solutions, and advice'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: '**武器创造：** 提供可操作的步骤、解决方案和建议。'
- en: Writing, speaking, marketing, and sales are how you channel your ideas into
    impactful creations.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 写作、演讲、营销和销售是你将想法转化为有影响力的创造的方式。
- en: From there, you distribute them across social media platforms to build a community
    in the digital society.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，你将它们分布到社交媒体平台，以在数字社会中建立一个社区。
- en: Monetizing The Creative Ability Of Your Mind
  id: totrans-160
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 资源化你的思维创造力。
- en: We are shifting away from shallow promises and good looks as a way of building
    an audience.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在从浅薄的承诺和良好的外表转向建立观众的方式。
- en: The health industry grows unhealthy because their income is dependent on their
    looks.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 健康产业变得不健康，因为他们的收入依赖于他们的外表。
- en: And, this creates poor standards for male and female physiques, contributing
    to the lack of mental and spiritual health.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 而且，这为男性和女性的体型设定了低标准，导致精神和心理健康缺失。
- en: Value creation, again, is the answer.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 价值创造，再次，是答案。
- en: Fitness influences (that can’t monetize their intelligence or creativity) have
    to maintain sub-optimal body fat levels and unhealthy habits.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 健身影响者（无法货币化他们的智慧或创造力）必须保持次优的体脂水平和不良习惯。
- en: If they don’t, their income decreases. I’ve heard this many times across podcasts
    and YouTube videos from coaches in the industry.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 如果它们没有，他们的收入就会减少。我在行业内的播客和YouTube视频中听到过很多次。
- en: Business must be sustainable and healthy.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 业务必须是可持续和健康的。
- en: Monetizing your mind or intelligence or creativity is infinite.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 资源化你的思维、智慧或创造力是无限的。
- en: Here’s how you begin, but first, let’s handle some limiting beliefs.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你开始的方式，但首先，让我们处理一些限制性信念。
- en: And yes, these are just beliefs. Your mind’s way of avoiding the action you
    want to take.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，这些只是信念。你大脑避免采取你想要采取的行动的方式。
- en: '**You can build an audience or readership.**'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: '**你可以建立受众或读者群。**'
- en: Every single person on social media follows 300-1000+ people. Even creators.
    That’s more than enough to make a full-time income if you know what you are doing.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体上的每个人都会关注300-1000+人。即使是创作者。如果你知道自己在做什么，这足以让你全职赚钱。
- en: More followers are both a bonus and attainable for most people reading this
    (you are in the 0.5% of humanity that is aware of this line of work).
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 更多关注者对大多数阅读这篇文章的人来说既是奖励也是可实现的（你是那0.5%的人类，意识到这一行工作）。
- en: '**The market is not saturated.**'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: '**市场并不饱和。**'
- en: It only seems saturated because you limit yourself to following 300-1000 people
    that all talk about your interests.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 它看起来如此饱和，只是因为你限制了自己只关注300-1000人，他们都在谈论你的兴趣。
- en: In reality, it’s so unsaturated that you can blow past most creators in that
    niche.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，它如此不饱和，以至于你可以超越该领域的大多数创作者。
- en: Pair this with [my way of “niching down”](https://thedankoe.com/letters/niche-down-is-terrible-advice-for-smart-people/)
    and you’re gold.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 将这与你我的“细分市场”方法（[my way of “niching down”](https://thedankoe.com/letters/niche-down-is-terrible-advice-for-smart-people/)）结合起来，你就成功了。
- en: Simplify Complex Topics
  id: totrans-178
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 简化复杂话题
- en: If we live in the Information Age…
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们生活在信息时代…
- en: And the average person is overwhelmed, anxious, and uncertain…
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 而普通人感到不知所措、焦虑和不确定…
- en: And education is what shapes the selves that go on to create a better future…
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 而教育是塑造那些继续创造更美好未来的人的自我…
- en: Value creation is sense-making.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 价值创造是理解。
- en: Your job is to make sense of your life, the world, and bring clarity to the
    actions that others should take. The ones that follow your vision and want to
    make it reality.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 你的工作是理解你的生活、世界，并为其他人应该采取的行动带来清晰性。那些跟随你的愿景并希望将其变为现实的人。
- en: This comes with time and action.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 这需要时间和行动。
- en: You will not know if your creations are valuable if you never get eyes on them.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你从未让他人看到你的作品，你将无法知道它们是否有价值。
- en: You must post. You must get data. You must attract readers to your work, because
    if you don’t, that’s the first sign that you don’t have value to offer. Or you
    just don’t know how to play the game.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须发布帖子。你必须获取数据。你必须吸引读者关注你的作品，因为如果你不这样做，这是你无法提供价值的第一个迹象。或者你只是不知道如何玩游戏。
- en: Marketing and sales demand people. You need to get your work in front of the
    market.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 市场营销和销售需要人。你需要让你的作品出现在市场上。
- en: If you don’t work to get your content in front of people, you won’t know if
    your ideas are valuable.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不去努力让你的内容出现在人们面前，你就不会知道你的想法是否有价值。
- en: If you get your content in front of people and it doesn’t do well, then it wasn’t
    valuable. You need to write better.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你将内容展示给人们，但它表现不佳，那么它并不具有价值。你需要写得更好。
- en: If you don’t work to get your products in front of people, you won’t make money.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不去努力让你的产品出现在人们面前，你就不会赚钱。
- en: If you get your products in front of people and no one buys, your product isn’t
    perceived as valuable. You need to sell better.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你将产品展示给人们，但没有人购买，那么你的产品被认为没有价值。你需要更好地销售。
- en: '*Perceive* is the keyword there.'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: “感知”是那里的关键词。
- en: Marketing and sales are perception.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 市场营销和销售是感知。
- en: You have to write, speak, market, and sell in a way that resonates with the
    identities you are targeting.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须写作、演讲、营销和销售，以与你所针对的身份产生共鸣。
- en: A valley girl won’t resonate with meathead bodybuilding advice.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 一个山谷女孩不会对健美建议产生共鸣。
- en: A soccer mom (probably) won’t resonate with philosophical musings on business.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 一个足球妈妈（可能）不会对商业的哲学沉思产生共鸣。
- en: Your language dictates who you attract.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 你的语言决定了你吸引谁。
- en: It’s all so simple when you stop being distracted by your thoughts and think
    it through.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 当你停止被你的思想所分散，并深思熟虑时，一切都很简单。
- en: Building an audience over time is how you decrease the manual work necessary
    to get your content and products in front of people.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移建立受众群体，这是你减少将内容产品展示给人们所需的手动工作的方法。
- en: Okay, where do we start?
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，我们从哪里开始？
- en: '**1) Start With Writing**'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 从写作开始**'
- en: Writing forces you to supplement your learning with writing, sales, and persuasion
    if you want to be a success.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 写作迫使你在想要成功的情况下，通过写作、销售和说服来补充你的学习。
- en: It clarifies your thoughts.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 它澄清了你的思想。
- en: It makes you more articulate.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 这使你更加善于表达。
- en: It can be repurposed into any other medium (speaking, video, or visuals).
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 它可以改编成任何其他媒介（演讲、视频或视觉）。
- en: It is also a seamless, non-demanding, lever-moving task that you can schedule
    in the first block of each morning.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是一个无缝、非要求性、杠杆移动的任务，你可以在每个早晨的第一块时间安排它。
- en: So, we prioritize growth and content on writing platforms.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们在写作平台上优先考虑增长和内容。
- en: '**Start With A Newsletter**'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: '**从时事通讯开始**'
- en: Depth is what separates you from the superficial market.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 深度是你与表面市场的区别。
- en: No, you don’t need subscribers. You can also upload it as a blog post, use it
    to write lead magnets or product modules, or use it as a YouTube script like I
    do.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 不，你不需要订阅者。你也可以将其作为博客文章上传，用它来写吸引点击的磁铁或产品模块，或者像我一样用它作为YouTube脚本。
- en: Subscribers will come.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 订阅者会来的。
- en: '**Condense The Complexity Into Tweets (Or Threads)**'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: '**将复杂性浓缩成推文（或帖子）**'
- en: Twitter, in my eyes, was an underrated writing platform.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，Twitter是一个被低估的写作平台。
- en: It still is, but Instagram’s new Threads app is reminding me of Twitter in its
    infancy.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 它仍然是这样的，但Instagram的新Threads应用让我想起了Twitter的初期。
- en: There is a world of opportunity and the community feel is incredible.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个充满机会的世界，社区的感觉令人难以置信。
- en: Threads has a lot of potential.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: Threads有很大的潜力。
- en: Why?
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: You can post as much as you’d like (to test your ideas before you post them
    on other platforms).
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以发布你想要的任何内容（在你将它们发布到其他平台之前测试你的想法）。
- en: It’s writing-based, meaning you don’t need to be a 10/10 model living in Thailand
    sipping coconuts on the beach.
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它是基于写作的，这意味着你不需要是一个住在泰国、在海滩上啜饮椰子的10/10模特。
- en: It is like a forum, you can find like-minded people much quicker in the replies
    of your favorite accounts.
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它就像一个论坛，你可以在你最喜欢的账户的回复中更快地找到志同道合的人。
- en: The retweet or repost button is a low-friction share feature, that’s how you
    gain followers (other platforms are harder to grow on as a beginner)
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 转发或重新发布按钮是一个低摩擦的分享功能，这就是你获得关注者的方式（其他平台作为初学者更难增长）
- en: You can just screenshot your tweets to grow on other platforms (this is how
    I grew without spending hours creating new content).
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以直接截图你的推文来在其他平台上增长（这就是我不花几个小时创造新内容就能增长的方式）。
- en: The basics of growing on Twitter are simple.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 在Twitter上成长的基石很简单。
- en: Post 1-3 times a day (and start getting your “failures” out of the way)
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每天发布1-3次帖子（并开始处理你的“失败”）
- en: If you are under 1000 followers, focus on networking with other people in the
    replies and DMs to leverage *their* audience.
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你拥有不到1000名关注者，专注于在回复和私信中与其他人建立联系，以利用他们的受众。
- en: Have a *clickable* profile picture so people know you are a creator
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让你的个人资料图片可点击，这样人们就知道你是一个创作者
- en: Use your big goal in life OR the interests you talk about as your bio (what
    are you leading people towards and how will they get there through your unique
    interests?)
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用你生活中的大目标或你谈论的兴趣作为你的个人简介（你将带领人们走向何方，他们将通过你独特的兴趣如何到达那里？）
- en: Write threads or long posts based on your story and personal experience (but
    make sure you have a network that will share it so it goes semi-viral)
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据你的故事和个人经验撰写帖子或长篇帖子（但确保你有一个会分享它的网络，这样它就会半病毒式传播）
- en: Start with beginner-level educational content.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 从初学者级别的教育内容开始。
- en: Make it actionable.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 让它变得可操作。
- en: That’s what everyone does to grow at the start (on any platform) and 95% of
    the market are beginners.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是每个人在开始成长（在任何平台上）时都会做的事情，市场中的95%都是初学者。
- en: Don’t try to be super clever or wise until you build a name for yourself.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 在建立自己的名声之前，不要试图表现得过于聪明或睿智。
- en: '**2)** **Prioritize** **Ideas & Attention Capture**'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: '**2)** **优先考虑** **想法与注意力吸引**'
- en: Attention is the currency of the 21st century.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 注意力是21世纪的货币。
- en: Impactful ideas are how you generate attention.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 有影响力的想法是你吸引注意力的方式。
- en: The best tip I can give you is to read others’ content from the lens of a creator.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 我能给你的最好建议是，以创作者的视角阅读他人的内容。
- en: Why do their posts do well? What caught your attention? Why does it have so
    much engagement?
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么他们的帖子做得好？是什么吸引了你的注意力？为什么它有如此高的参与度？
- en: The answers aren’t always obvious.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 答案并不总是显而易见的。
- en: Authors usually have high engagement because people know their ideas already.
    But, of course, they are still great writers and are worth studying.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 作者通常有很高的参与度，因为人们已经知道他们的想法。但当然，他们仍然是伟大的作家，值得学习。
- en: In [Digital Economics](https://digitaleconomics.school/), we dive deep into
    the psychology of capturing attention, but here are a few principles so you can
    start now.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 在[数字经济学](https://digitaleconomics.school/)中，我们深入探讨了吸引注意力的心理学，但这里有一些原则，让你可以现在就开始。
- en: '**Problems** – every good story captures attention by starting with a problem
    that the reader is facing. It opens a curiosity loop and makes them want to find
    the solution. Problems are at the root of human behavior.'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题** - 每一个好故事都是通过开始讲述读者面临的问题来吸引注意力的。它开启了一个好奇心循环，使他们想要找到解决方案。问题是人类行为的基础。'
- en: '**Numbers** – specific numbers are a pattern interrupt when you are scrolling
    on social media. “I read 347 self-help books so you don’t have to” is an example.'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: '**数字** - 在社交媒体上滚动时，具体的数字会打断你的模式。“我读了347本自助书籍，所以你不必”是一个例子。'
- en: '**Statistics** – similar to numbers, statistics set the scene quite nicely.
    “97% of the population has seen a decline in focus, here’s how to fix yours” is
    an example that could use a bit of work, but you see the power in it.'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: '**统计数据** - 类似于数字，统计数据可以很好地设定场景。“97%的人口注意力有所下降，这是如何解决你自己的方法”是一个例子，可能需要一些改进，但你看到了它的力量。'
- en: '**3) Treat Yourself As Your Ideal Reader**'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 将自己视为理想读者**'
- en: When someone is building a readership or audience for the value they are creating,
    common advice is to write to your ideal customer.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 当有人正在为所创造的价值建立读者群或受众时，常见的建议是针对你的理想客户进行写作。
- en: With the one-person business, *you* are your niche. You are your customer avatar.
    You are your brand, content, and product.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 在单人企业中，*你*是你的细分市场。你是你的客户形象。你是你的品牌、内容和产品。
- en: I have people go through the [Myers-Briggs personality test](https://www.16personalities.com/)
    in Digital Economics so they can understand themselves more. When you understand
    yourself, you can write to yourself. The test results are your customer avatar.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 我让人们在数字经济学中参加[迈尔斯-布里格斯个性测试](https://www.16personalities.com/)，这样他们就能更好地了解自己。当你了解自己时，你可以给自己写信。测试结果是你的客户形象。
- en: Now, what do you write?
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你该写些什么呢？
- en: If you are going through a tough time, give yourself advice and write it online
    in your “public journal”
  id: totrans-249
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你正经历困难时期，给自己提供建议，并在你的“公开日记”中写下来。
- en: Give your past self advice on overcoming the problems you faced, but faster
  id: totrans-250
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 给过去的自己提供克服你所面临问题的建议，但要更快地做到。
- en: Give your future self-encouragement to achieve the goals you are trying to achieve.
  id: totrans-251
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 给未来的自己以鼓励，以实现你试图实现的目标。
- en: These are just a few of the many ways you can create content, but they are a
    great (and accessible) starting point.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 这些只是你可以创造内容的许多方法中的一部分，但它们是一个很好的（且易于访问的）起点。
- en: '**4) Turn Your Personal Projects Into Products**'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 将个人项目转化为产品**'
- en: You won’t have anything to write about if you aren’t pushing toward your goals
    (in any domain, even if building a brand is your goal, write about it).
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有朝着目标努力（在任何领域，即使建立品牌是你的目标，也要写下来），你就没有什么可写的。
- en: Goals = project you are working on.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 目标 = 你正在工作的项目。
- en: As you get results, you begin to understand what got those results.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你取得成果，你开始理解是什么导致了这些成果。
- en: This is the foundation of a profitable product or service.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 这是盈利性产品或服务的基础。
- en: If you have built a business, teach people how with a consulting service or
    digital product.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经建立了一个企业，就通过咨询服务或数字产品教人们如何做。
- en: If you have built your body, do the same.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经打造了自己的身体，那就做同样的事情。
- en: If you have built your mind, do the same.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经打造了自己的思想，那就做同样的事情。
- en: Teach people how you got the results they want. It’s not that difficult.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 教人们如何获得他们想要的结果。这并不困难。
- en: You will have to study others’ products or services to see how they structured
    them. This is another bonus of purchasing courses in the new society.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 你将不得不研究他人的产品或服务，看看他们是如何构建的。这是在新社会中购买课程的一个额外好处。
- en: Again, if you want to get a job, purchase the overpriced education that trains
    you into one.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
