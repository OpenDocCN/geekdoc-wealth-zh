- en: Why You Always Feel Overwhelmed
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 你为什么总是感到不知所措
- en: 原文：[https://thedankoe.com/letters/why-you-always-feel-overwhelmed/](https://thedankoe.com/letters/why-you-always-feel-overwhelmed/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/why-you-always-feel-overwhelmed/](https://thedankoe.com/letters/why-you-always-feel-overwhelmed/)
- en: 'I’ve noticed **one pattern** in every:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我注意到每个都存在**一个模式**：
- en: Successful entrepreneur
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 成功的企业家
- en: Enlightened spiritual guru
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开明的灵性大师
- en: Happy married couple
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 幸福的已婚夫妇
- en: Record breaking athlete
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 破纪录的运动员
- en: What pattern?
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 什么模式？
- en: '**Focus.**'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**专注**。'
- en: I’ve heard one person — from each category above — mention that “focus” is the
    key to their success, happiness, and progress.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我听说每个人——从上面的每个类别中——都提到“专注”是他们成功、幸福和进步的关键。
- en: After burning through books on performance, happiness, business, spirituality,
    philosophy, and anything else related to life enjoyment… I think I’ve found the
    answer.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在阅读了关于性能、幸福、商业、灵性、哲学以及与生活享受相关的任何书籍之后……我认为我找到了答案。
- en: The key to maximum life enjoyment that is (with a byproduct of success in any
    of your endeavors.)
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 享受最大生活乐趣的关键（附带你在任何事业上的成功。）
- en: A person can make himself happy, or miserable, regardless of what is actually
    happening “outside,” just by changing the contents of consciousness. — Mihaly
    Csikszentmihaly
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一个人可以让自己快乐，或者痛苦，无论“外面”实际上发生了什么，只需改变意识的内涵。 —— 米哈伊·契克森米哈伊
- en: '*Focus* is controlled consciousness.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '*专注*是受控的意识。'
- en: Or, focus is controlling the “contents of consciousness.”
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，关注点在于控制“意识的内涵”。
- en: When the contents of your consciousness, the things you are focused on, can
    be made sense of in a positive manner; your life becomes positive.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的意识内容，你关注的那些事物，可以以积极的方式理解时；你的生活就会变得积极。
- en: Meaning, if you strive for clear, unbiased perception from an advantageous perspective
    of any given situation, you will feel incredible.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 意味着，如果你努力从任何给定情况的有利角度寻求清晰、无偏见的认识，你会感到难以置信。
- en: 'This also brings up a point made by Leo from Actualized.org about how *everything*
    is a figment of consciousness. Example: an atom is a figment of consciousness.
    It is a label we created to make sense of something when we became conscious of
    it. That is a tad more metaphysical, but it’s interesting to make the connection.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这也引出了Leo from Actualized.org提出的观点，即*一切都是意识的幻象*。例如：一个原子是意识的幻象。这是我们意识到了它时为了理解它而创建的标签。这有点形而上学，但有趣的是建立这种联系。
- en: By maintaining focus on individual “figments of consciousness” — instead of
    split between 10 figments — we can lead happy, healthy, and fulfilling lives.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 通过专注于单个“意识的幻象”——而不是分散在10个幻象之间——我们可以过上快乐、健康和充实的生活。
- en: Content Of Consciousness
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 意识的内涵
- en: I want you to think of your mind as a supercomputer.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我想让你把你的大脑想象成一个超级计算机。
- en: Your ability to process information is dependent on a few things, but I want
    to bring attention to your RAM.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 你处理信息的能力取决于一些因素，但我想把注意力引到你的RAM上。
- en: RAM — or “random access memory” — is one of the most important parts of a computer,
    it determines performance.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: RAM——或“随机存取存储器”——是计算机最重要的部分之一，它决定了性能。
- en: The more RAM you use up with different programs running, open browser tabs,
    and the performance requirements of what you have running, the slower your performance
    will be.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 你运行的不同程序、打开的浏览器标签以及你正在运行的性能要求，使用的RAM越多，你的性能就会越慢。
- en: This is no different from your focus, what you hold in your conscious attention.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这与你的关注点，你意识中的注意力所持有的东西，没有区别。
- en: Humans can process 126 bits of information per second. That adds up to 185 billion
    bits of information in your lifetime.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 人类每秒可以处理126位信息。这加起来在你的 lifetime 中是1850亿位信息。
- en: Most people live with multiple high-demand programs running that are draining
    the limited creative energy they have.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人同时运行着多个高需求程序，这正在消耗他们有限的创造性能量。
- en: Thoughts about regretful past mistakes
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对后悔的过去错误的思考
- en: Thoughts about stressful future happenings
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对有压力的未来事件的思考
- en: Desires of hunger and entertainment to escape those thoughts
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 想要逃避那些想法的饥饿和娱乐欲望
- en: An internal cry to break out of their conditioned way of living
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一种内在的呼喊，要打破他们习惯的生活方式
- en: A list of mixed-priority tasks that need to be finished
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要完成的多优先级任务清单
- en: Open loops of tasks they were supposed to complete but forgot about
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们本应完成但忘记的任务的开放循环
- en: The list goes on and on.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 列表可以一直继续下去。
- en: The modern mind has it’s attention split in infinite directions by default.
    We go about our lives stressed and near sickness. Rather than living in the present
    with singular focus and a worry free mind, we are the opposite. Living in a false
    reality created by split attention.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 现代人的注意力默认分散到无限的方向。我们生活在压力和接近疾病的状态中。我们不是以专注和无忧无虑的心态活在当下，而是相反。生活在由分散的注意力创造的虚假现实中。
- en: When we hold too much of the past or future in the contents of our consciousness,
    chaos ensues. The mind tends toward disorder. If not kept in check, we lose the
    sense of control over our lives that leads to enjoyment. This is accomplished
    through controlled consciousness.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们在意识的 内容中持有太多的过去或未来时，就会产生混乱。心智倾向于无序。如果不加以控制，我们将失去对生活的控制感，这会导致快乐。这是通过有控制的意识实现的。
- en: AKA, Focus.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 即，专注。
- en: 8 Steps To Reclaiming Your Focus
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8步重获你的专注力
- en: To break out of our robotic ways of living, we must first become aware of how
    it is impacting our life.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 要打破我们机械化的生活方式，我们首先必须意识到它对我们生活的影响。
- en: From chaos to order, we must bring out attention back to center and choose what
    deserves our attention.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 从混乱到有序，我们必须将注意力回归中心，并选择值得我们关注的事物。
- en: The less RAM we use — the more singular our focus — the more enjoyable life
    becomes. Order returns and the sense of control over our lives results in a deep
    satisfaction with life itself.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用的RAM越少——我们的专注力越集中——生活就越愉快。秩序回归，对我们生活的控制感带来对生活的深刻满足。
- en: <picture fetchpriority="high" decoding="async" class="wp-image-732">![](../Images/99a555a1bd27634082ee40a5a7fde3ba.png)</picture>
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-732">![](../Images/99a555a1bd27634082ee40a5a7fde3ba.png)</picture>
- en: 1) Choose A Lagging Area In Your Life
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 选择你生活中一个落后的领域
- en: We are only as strong as our weakest link. The areas that are lagging the furthest
    behind hold the lowest hanging fruit. These are the areas that cause the most
    problems.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的力量取决于我们最薄弱的环节。落后的最远领域拥有最易摘取的果实。这些是造成最多问题的领域。
- en: Think, what area of my life is consistently causing problems that if they were
    solved, your quality of life would shoot through the roof.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 思考，我生活的哪个领域一直持续地带来问题，如果这些问题得到解决，你的生活质量将飞跃。
- en: Money? Dating? Mental health? Self-esteem? Social life? Health and energy levels?
    Take a walk, contemplate, and choose the one that, when fixed, the results would
    ripple through other areas of your life.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 金钱？约会？心理健康？自尊？社交生活？健康和能量水平？散步，沉思，并选择一个领域，当它得到解决时，结果会在你生活的其他领域产生连锁反应。
- en: For the sake of this post, and a common problem for many, let’s talk about ***money***
    as a lagging area.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 为了本文的目的，以及许多人的共同问题，让我们谈谈***金钱***作为一个落后的领域。
- en: 2) Gain Clarity On The Fundamentals
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 对基本原理有清晰的了解
- en: 'I want to make a distinction between:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我想要区分：
- en: Basics, principles, or fundamentals
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基础，原则或基本原理
- en: Tactics, hacks, and technical details.
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 战术，技巧和技术细节。
- en: Fundamentals drive results. Technical details can further results, but only
    once the fundamentals are mastered, systemized, and habitual.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 基本原理驱动结果。技术细节可以进一步推动结果，但只有在基本原理被掌握、系统化和习惯化之后。
- en: Fundamentals move levers. Technical details present the opportunity for traps,
    overwhelm, and creating problems that don’t exist.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 基本原理移动杠杆。技术细节提供了陷阱、压倒和创造不存在问题的机会。
- en: For our focus area of money, you need traffic and an offer. This is a universal
    principle for getting what you want.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的关注领域——金钱，你需要流量和一个提议。这是得到你想要的东西的普遍原则。
- en: 'If you don’t have traffic:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有流量：
- en: A social media audience
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个社交媒体受众
- en: Paid ads or promotions
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 支付广告或推广
- en: A community or group
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个社区或团体
- en: Organic search results
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有机搜索结果
- en: Direct outreach (i.e. cold email)
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 直接接触（例如，冷电子邮件）
- en: Nobody will see your offer.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人会看到你的提议。
- en: 'If you don’t have a compelling offer:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有一份令人信服的提议：
- en: Digital or physical product
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数字或实体产品
- en: Freelance or consulting service
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自由职业或咨询服务
- en: Cohort based course or online tutoring
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 群体课程或在线辅导
- en: Membership offer or community
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 会员提议或社区
- en: You won’t have anywhere to send traffic to.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 你将没有地方发送流量。
- en: Like if you are in the dating market.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 就像你在约会市场上。
- en: If you are a high-value “offer” but don’t put yourself in “traffic” heavy environments,
    good luck.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一个高价值的“提议”，但将自己置于“交通”繁忙的环境中，祝你好运。
- en: 3) Create An Ability-Based Goal
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 创建一个基于能力的目标
- en: There is nothing wrong with focusing on looking better, gaining more followers,
    getting the most engagement, having the hottest partner, etc. Those have their
    use cases and can be beneficial. I would recommend paying mind to these, but not
    making them your primary focus.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 专注于看起来更好、获得更多关注者、获得最多的互动、拥有最热门的合作伙伴等，并没有什么错。这些都有它们的使用场景，并且可能有益。我建议你关注这些，但不要把它们作为你的主要焦点。
- en: '**The problem:** vanity-based goals are much more out of our control than ability-based
    goals.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题：**基于虚荣的目标比基于能力的目标更容易超出我们的控制。'
- en: These steps are not linear, it will be difficult to create an ability-based
    goal unless you are educated on the lever-moving actions you can take on a daily
    basis.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这些步骤不是线性的，除非你了解你每天可以采取的杠杆移动行动，否则很难创建一个基于能力的目标。
- en: 'In our case, if I want to build an audience (traffic) and sell a digital product
    (offer) to make money — you will need to execute on levers such as:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们这个例子中，如果我想建立受众（流量）并销售数字产品（提供）来赚钱——你需要执行以下杠杆：
- en: Writing 3 short-form posts a day (like tweets)
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每天写3篇短篇帖子（比如推文）
- en: Writing 1 long-form post a week (newsletter / blog)
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每周写一篇长篇帖子（新闻通讯/博客）
- en: Condensing that long post into a medium form post (like a thread of LinkedIn
    post)
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将那篇长帖子浓缩成一篇中等形式的帖子（比如LinkedIn帖子的线程）
- en: Spending 30-60 minutes writing out a curriculum for your digital product
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用30-60分钟为你的数字产品制定课程
- en: In this case, you could make it a goal to write 1000 high-quality words a day,
    and gauge yourself on the writing (instead of the results that come from it.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，你可以设定一个目标，每天写1000个高质量的字，并评估你的写作（而不是由此产生的结果）。
- en: Process over outcome.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 过程胜于结果。
- en: Speaking of writing, this is everything we go over in [The 2 Hour Writer.](https://2hourwriter.com)
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 说到写作，这是我们将在[《2小时作家》](https://2hourwriter.com)中讨论的一切。
- en: 4) Self-Educate After You Start
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 开始后自我教育
- en: The fundamentals will get you started, but you need to learn how to apply those
    fundamentals to your specific situation.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 基础知识会帮助你开始，但你需要学习如何将这些基础知识应用到你的具体情况中。
- en: Too many people get trapped in “tutorial hell,” try to soak in as much information
    as possible, and never start.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 太多人陷入了“教程地狱”，试图尽可能多地吸收信息，却从未开始。
- en: 'Instead:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是：
- en: Start and fail fast
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 快速开始并快速失败
- en: Identify what caused you to fail
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定导致你失败的原因
- en: Find specific information to overcome it
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 寻找具体信息来克服它
- en: Fail again and let experience compound with time
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 再次失败，并让经验随着时间的推移而累积
- en: Stop trying to figure everything out before you start. That’s called mental
    masturbation.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始之前不要试图弄清楚所有的事情。这被称为心理自慰。
- en: 5) Block Out 30-60 Minutes A Day
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5) 每天留出30-60分钟
- en: Deep work doesn’t only apply to work. It applies to every area of your life.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 深度工作不仅适用于工作，也适用于你生活的每个领域。
- en: When entrepreneurs want to make progress in business, they dedicate time and
    energy to make that progress.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 当企业家想要在商业上取得进步时，他们会投入时间和精力来实现这一进步。
- en: When married couples want to make progress in their relationships, they dedicate
    time for each other.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 当已婚夫妇想要在他们的关系中取得进步时，他们会为对方留出时间。
- en: When individuals want to make progress with their mind, they dedicate time to
    solitude and consciousness work — like meditation.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 当个人想要用他们的心智取得进步时，他们会花时间进行独处和意识工作——比如冥想。
- en: '*Distraction-free time must be made so that your attention isn’t split when
    it is time to engage in “deep work,” no matter the domain of life.*'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '*无干扰的时间必须被创造出来，这样在需要投入“深度工作”时，你的注意力就不会分散，无论生活领域的哪个方面。*'
- en: 6) Immerse Yourself In The Content Of That Goal
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6) 沉浸在那个目标的内容中
- en: For the spiritually inclined, this is “presence.”
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 对于有精神追求的人来说，这是“在场”。
- en: For others, this is known as being “engaged” and tapped into a degree of the
    flow state.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 对于其他人来说，这被称为“参与”并进入了一定程度的流动状态。
- en: Think of how you give your full attention to your phone when you are scrolling
    social media. Marketers and tech companies have entire teams dedicated to triggering
    a pseudo-flow state through attention capture.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 想想当你刷社交媒体时，你如何全神贯注地看手机。营销人员和科技公司有专门的团队致力于通过注意力捕捉来触发一种伪流程状态。
- en: When you get sucked into your phone, there is nothing else held in your attention.
    Most use this to escape reality rather than tapping into reality itself.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 当你被手机吸引时，你的注意力就没有其他东西了。大多数人用这个来逃避现实，而不是挖掘现实本身。
- en: If your goal is related to relationships, practice filling your attention with
    the entirety of the other person. Their body, movements, words. Use all of your
    senses to feel into the moment and make that the forefront of your consciousness.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的目标与人际关系相关，练习让你的注意力完全集中在对方身上。他们的身体、动作、言语。使用你所有的感官去感受当下，并让它成为你意识的焦点。
- en: 7) A Moment Of Recognition
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7) 识别时刻
- en: None of this comes easy. You will fail. That’s just how things are.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 这些都不是轻而易举就能做到的。你会失败。事情就是这样。
- en: A distraction will register in your awareness, your attention will split, and
    you may get sucked into a negative feeling that the distraction triggered.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 一个干扰会进入你的意识，你的注意力会分散，你可能会被干扰引发的负面情绪所吸引。
- en: All it takes is a moment of recognition to snap yourself out of it.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 只需一个识别时刻，你就能从这种状态中摆脱出来。
- en: Whether it be complaining through a grueling workout or being scared to approach
    someone new because of the identity you’ve created for that person before you’ve
    even talked to them.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 不论是抱怨艰苦的训练，还是因为你在与他们交谈之前为他们设定的身份而害怕接近新人。
- en: Pause, recognize that you are resisting reality, and let it flow.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 暂停，认识到你在抗拒现实，然后让它流动。
- en: Your expectation of reality is not reality.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 你对现实的期望并不等同于现实。
- en: It’s not “supposed” to be how you *think* it should be.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 它“不应该”是你“认为”它应该是的样子。
- en: '*It’s supposed to be what it’s being.*'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: “它应该就是它现在的样子。”
- en: 8) Put In The Metaphorical Reps
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8) 进行比喻性的练习
- en: Everything is a muscle.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 任何事物都是肌肉。
- en: Your focus, relationships, business, fitness, spiritual practice, and habits
    of any kind. They grow with focus, ample energy to fuel performance and recovery,
    and direct experience so you can double down on what works for *you**.*
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 你的关注点、人际关系、商业、健身、精神实践以及任何类型的习惯。它们随着关注、充足的能量来支持表现和恢复，以及直接经验而成长，这样你就可以加倍关注对你**有效**的事情。
- en: Do not expect quick results. Even with steroids (like courses, coaching, methods
    and systems) you still have to put in the reps. You can’t inject some test, sit
    on the couch, and expect to be the next Ronnie Coleman.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 不要期望快速的结果。即使有类固醇（如课程、辅导、方法和系统），你仍然需要付出努力。你不能注射一些测试，坐在沙发上，就期望成为下一个罗尼·科尔曼。
- en: Treat every area of your life as a science project.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 将你生活的每个领域都当作一个科学项目来对待。
- en: Identify a problem
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别问题
- en: Set a desired outcome
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设定期望的结果
- en: Test different solutions
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试不同的解决方案
- en: Find one that works
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 找到一个适合你的方法
- en: Replicate the results
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 复制结果
- en: From there, continue building the muscle toward your desired outcome. Then,
    you will be experienced enough to know whether you want to bulk, cut, or maintain.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，继续构建肌肉，朝着你期望的结果前进。然后，你将经验丰富到足以知道你是否想要增重、减重或保持现状。
- en: — Dan Koe
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: — 丹·科
