- en: How To Thrive With Multiple Interests
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何在多重兴趣中茁壮成长
- en: 原文：[https://thedankoe.com/letters/how-to-thrive-with-multiple-interests/](https://thedankoe.com/letters/how-to-thrive-with-multiple-interests/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/how-to-thrive-with-multiple-interests/](https://thedankoe.com/letters/how-to-thrive-with-multiple-interests/)
- en: A small announcement before we start.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始之前，有一个小公告。
- en: By popular request, the next Writer’s Bootcamp starts March 4th.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 应大家要求，下一期的作家训练营将于3月4日开始。
- en: Initially, we were waiting until Kortex AI features were in to start the next
    cohort, but we will simply add on calls during this bootcamp for those who join
    as those features release. (You also get all curriculum updates for life).
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 最初，我们等待Kortex AI功能上线后再开始下一期，但现在我们将在这次训练营期间为那些在功能发布时加入的人增加通话。（你还将获得终身课程更新）。
- en: So, if you want to create your niche of one, write about your interests, and
    build an audience as a way to future-proof yourself going into the future, view
    past student results and [enroll here while the early bird price lasts.](https://bootcamp.kortex.co)
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，如果你想创造你自己的领域，写关于你的兴趣，并建立一个受众作为未来保障自己的方式，查看往届学生的成果，并在早鸟价期间[在此报名](https://bootcamp.kortex.co)。
- en: –––
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: –––
- en: Traditional education and hyperspecialization is a way to make people subservient
    to the dominant paradigm / system. Study the generalized principles of nature
    and be a deep generalist.
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 传统教育和高度专业化是让人们服从主导范式/系统的一种方式。研究自然的普遍原则，成为一个深度通才。
- en: ''
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Daniel Schmachtenberger
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 丹尼尔·施马赫滕贝格
- en: It’s insane to think that you should know what you want to do with your life
    by age 18.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 想象你在18岁时就应该知道自己一生的职业规划是疯狂的想法。
- en: What you want to study.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 你想学习什么。
- en: What career you want to pursue.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 你想追求什么样的职业。
- en: How your life is going to end up.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 你的生活将如何结束。
- en: Most of the time, it’s just like your parents.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数时候，它就像你的父母一样。
- en: A job. A spouse. A mortgage. A few vacations. A few nice dinners. Maybe a cat
    or dog. Maybe some kids?
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 一份工作。一个配偶。一笔抵押贷款。几次假期。几次美好的晚餐。也许养一只猫或狗。也许有几个孩子？
- en: Maybe not… you know… the economy and all that.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 也许不是…你知道…经济和所有那些。
- en: At least that’s what you’re *supposed* to do.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 至少这是你“应该”做的事情。
- en: That’s what society wants for you.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是社会对你所期望的。
- en: But you’re *different*.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 但你与众不同。
- en: You have multiple interests.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 你有多种兴趣。
- en: Focusing on one thing is the bane of your existence.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 专注于一件事情是你存在的痛苦。
- en: You can’t help yourself. You want to explore all that life has to offer. You
    want to embrace the full range of the human experience.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 你无法控制自己。你想要探索生活所能提供的一切。你想要拥抱人类经历的全面范围。
- en: But everywhere you turn, parents, teachers, and even friends shoot you down
    as you try to go your own way.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 但无论你转向哪里，父母、老师和甚至朋友都会在你试图走自己的路时把你击垮。
- en: They say you have “shiny object syndrome” as if that’s a bad thing.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 他们说你患有“闪亮物体综合症”，好像那是个坏事一样。
- en: They throw subtle jabs at your dreams and aspirations (because they want the
    “best for you,” but not if it’s better than them).
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 他们对你的梦想和抱负进行微妙的讽刺（因为他们想“为你好”，但不是比他们更好）。
- en: They want you to pursue the “safe” route. Become a doctor. Become a lawyer.
    Do something respectable. Get a high-paying degree.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 他们希望你追求“安全”的路线。成为一名医生。成为一名律师。做一些体面的工作。获得高薪学位。
- en: They drill your mind into this little box that they can understand, but you
    *hate* it.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 他们把你的思想灌输到一个小盒子里，他们可以理解，但你讨厌它。
- en: Little do they know, having multiple interests is a superpower going into the
    new future of work.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 他们几乎不知道，拥有多重兴趣是进入工作新未来的超级能力。
- en: What used to be the safe route is now the least safe of them all.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 曾经被认为是安全路线的现在变得最不安全。
- en: The 3 Differentiators – Agency, Taste, and Generalism
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 三个差异化因素 – 代理权、品味和通才
- en: A human being should be able to change a diaper, plan an invasion, butcher a
    hog, conn a ship, design a building, write a sonnet, balance accounts, build a
    wall, set a bone, comfort the dying, take orders, give orders, cooperate, act
    alone, solve equations, analyze a new problem, pitch manure, program a computer,
    cook a tasty meal, fight efficiently, die gallantly. Specialization is for insects.
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 人类应该能够换尿布、策划侵略、屠宰猪、驾驶船只、设计建筑、写十四行诗、平衡账户、建造墙壁、接骨、安慰垂死之人、接受命令、下达命令、合作、独立行动、解决方程、分析新问题、扔粪肥、编程计算机、烹饪美味的饭菜、高效战斗、英勇地死去。专业化是昆虫的专利。
- en: ''
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Robert A. Heinlein
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 罗伯特·A·海因莱因
- en: In the early-mid 1800s, when America was industrializing and needed to educate
    large numbers of immigrant children, educators like Horace Mann traveled to Prussia
    to study their system.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在19世纪中叶，当美国工业化并需要教育大量移民儿童时，像霍勒斯·曼这样的教育家前往普鲁士研究他们的体系。
- en: This Prussian education system was designed to create obedient soldiers, compliant
    citizens, civil servants, and well-behaved workers.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这个普鲁士教育体系旨在培养顺从的士兵、顺从的公民、公务员和表现良好的工人。
- en: 'It accomplished this with it’s focus on:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 它通过以下方式实现了这一点：
- en: Mandatory attendance
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 强制性出勤
- en: Training for teachers
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教师培训
- en: National curriculum and testing for students
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 国家课程和学生的考试
- en: Division of students by age
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 按年龄划分学生
- en: The concept of grade levels
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 年级层次的概念
- en: If you’re anything like me, a little part of you just died reading that.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你和我一样，那么你的一部分在读完那之后就已经死了。
- en: '*Students were taught how to work, not how to think.*'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '*学生被教导如何工作，而不是如何思考*。'
- en: Impressed by its efficiency and standardization, Mann and others implemented
    many of these methods in American schools, particularly in Massachusetts, which
    became a model for other states.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 被它的效率和标准化所打动，曼和其他人将这些方法中的许多应用于美国学校，尤其是在马萨诸塞州，这成为其他州的典范。
- en: Since you do not fund this school system, you do not control *what is taught*.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 由于你没有资助这个学校体系，你没有控制*教什么*。
- en: You are told to read this, memorize that, and if you dont, your Industrial Age
    parents scold you and threaten to ground you (so you can’t talk to friends or
    pursue hobbies or interests).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 你被告知要读这个，记住那个，如果你不做，你的工业时代父母会责骂你，并威胁要让你 grounded（不能和朋友交谈或追求爱好或兴趣）。
- en: Even further, the standardized education must bias the bottom quintile.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 更进一步，标准化教育必须偏袒最底层的五分之一。
- en: In other words, you are forced to learn at the same pace as the dumbest 20%
    of people in the public school system.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，你被迫以最愚蠢的20%的人的速度学习。
- en: This is extremely destructive.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这是非常具有破坏性的。
- en: Because if you understand how the mind works, you understand that you only absorb
    the information that the goals that frame your mind allow.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 因为如果你理解了大脑是如何工作的，你就会明白你只能吸收那些框架你思维的目标所允许的信息。
- en: And if your goal is to get a degree and get a job, your destiny is to become
    replaceable because you have not learned the multiple interests that allow one
    to be free.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你目标是获得学位和找到工作，你的命运就是变得可替代，因为你没有学习那些允许一个人自由的多重兴趣。
- en: 'Here’s the point:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是关键点：
- en: Society wants you to be a specialist because useful workers serve society.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 社会希望你成为专家，因为有用的工人服务于社会。
- en: But every single person you admire is *not* a specialist. Specialists are tools.
    Tools get replaced. AI is doing the replacing.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 但你钦佩的每一个人*都不是*专家。专家是工具。工具会被取代。AI正在做取代的工作。
- en: Every free and successful person is a generalist. A polymath. They understand
    that in order to actualize a grand vision, they will have to learn and do many
    things in areas of life that are undefined.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 每一个自由且成功的人都是一个通才。一个博学者。他们明白，为了实现宏伟的愿景，他们必须在生活中许多未定义的领域学习和做很多事情。
- en: But generalism is only one piece of the equation.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 但普及性只是方程式的一部分。
- en: We are going through a second renaissance.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在经历第二次文艺复兴。
- en: We have the power of Einstein and Davinci in our pockets.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我们口袋里有爱因斯坦和达芬奇的能量。
- en: The individual—not the institution—has more power than ever to thrive with multiple
    interests.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 个人——而不是机构——比以往任何时候都有更多的力量，可以通过多种兴趣来繁荣。
- en: But still, people aren’t doing anything.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 但尽管如此，人们并没有做什么。
- en: It’s not because they’re lazy.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不是因为他们懒惰。
- en: It’s not because they lack creativity.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不是因为他们缺乏创造力。
- en: It’s because their mind has been programmed for 20+ years by a society that
    benefits from their stupidity.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为他们的思维已经被一个从他们的愚蠢中受益的社会编程了20多年。
- en: In the future of work, you need to drastically change how you think about your
    future.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在工作的未来，你需要彻底改变你对未来的思考方式。
- en: Generalism is a must, let’s talk about *taste.*
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 普及性是必须的，让我们谈谈*品味*。
- en: How To Develop Taste
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何培养品味
- en: 'I was going to summarize this quote, but i don’t want to do it injustice:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 我本想总结这句话，但我不想做不公正的事情：
- en: Nobody tells this to people who are beginners, I wish someone told me. All of
    us who do creative work, we get into it because we have good taste. But there
    is this gap. For the first couple years you make stuff, it’s just not that good.
    It’s trying to be good, it has potential, but it’s not. But your taste, the thing
    that got you into the game, is still killer. And your taste is why your work disappoints
    you. A lot of people never get past this phase, they quit. Most people I know
    who do interesting, creative work went through years of this. We know our work
    doesn’t have this special thing that we want it to have. We all go through this.
    And if you are just starting out or you are still in this phase, you gotta know
    its normal and the most important thing you can do is do a lot of work. Put yourself
    on a deadline so that every week you will finish one story. It is only by going
    through a volume of work that you will close that gap, and your work will be as
    good as your ambitions. And I took longer to figure out how to do this than anyone
    I’ve ever met. It’s gonna take awhile. It’s normal to take awhile. You’ve just
    gotta fight your way through.
  id: totrans-68
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 没有人告诉初学者，我希望有人告诉我。我们所有从事创造性工作的人，我们之所以进入这个行业，是因为我们有很好的品味。但存在这个差距。在最初的几年里，你制作的东西并不好。它试图变得好，它有潜力，但并不是。但你的品味，让你进入这个游戏的东西，仍然是杀手。而且你的品味是为什么你的作品让你失望。很多人从未越过这个阶段，他们放弃了。我所知道的大部分从事有趣、创造性工作的人，都经历了多年的这种状态。我们知道我们的作品没有我们想要的那种特殊的东西。我们所有人都会经历这个过程。如果你刚开始或者你仍然处于这个阶段，你必须知道这是正常的，最重要的事情是你必须做大量的工作。给自己设定一个最后期限，这样你每周就会完成一个故事。只有通过大量的工作，你才能填补这个差距，你的作品才会像你的抱负一样好。而且我比我所遇到的任何人花更长的时间来弄清楚如何做到这一点。这需要一段时间。花时间是很正常的。你只需要努力克服困难。
- en: ''
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Ira Glass
  id: totrans-70
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 爱拉·格拉斯
- en: Let me see if I can articulate this.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 让我看看我是否能表达清楚。
- en: 'Stick with me here and read carefully:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 跟随我，仔细阅读：
- en: Intelligence is no longer a differentiating resource.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 智力不再是区分资源。
- en: AI models continue to get better and better while the price of those models
    gets closer and closer to zero.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，人工智能模型越来越好，而这些模型的价格越来越接近于零。
- en: Everyone has all answers they could ever need (and yet 99% of people don’t realize
    or utilize it… because intelligence has proven to be a poor resource in isolation.
    There’s more to the story of success).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都有他们可能需要的所有答案（然而，99%的人都没有意识到或利用它……因为智力在孤立状态下已被证明是一种糟糕的资源。成功的背后还有更多故事）。
- en: This is where it gets tricky.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是事情变得棘手的地方。
- en: AI is replacing specialist roles because predictable outputs come from predictable
    inputs.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能正在取代专业角色，因为可预测的输出来源于可预测的输入。
- en: Since many jobs are a repetitive series of tasks that lead to non-creative outputs,
    AI can do this good enough.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 由于许多工作是一系列重复的任务，导致非创造性输出，AI可以做得足够好。
- en: But when you add another layer of abstraction, or multiple, the number of outputs
    that *can* occur are infinite. AI only gives you *one* unless you refine it or
    tell the AI to refine itself*.* The thing is, that’s probably not the best output.
    **And it’s absolutely not the one that will garner the love and attention of the
    supporters who *consume* the output.**
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 但是当你添加另一个抽象层，或者多个，可能出现的输出数量是无限的。除非你细化它或告诉AI自己细化，否则AI只会给你一个。问题是，这可能是最好的输出。**而且绝对不是那个会赢得支持者**（他们**消费**输出）的喜爱和关注的输出。
- en: Most AI generations, from most people, is slop. [The dead internet](https://thedankoe.com/letters/ai-will-end-the-internet/)
    is being filled with slop nobody cares about.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人使用的人工智能生成的文本都是垃圾。[死互联网](https://thedankoe.com/letters/ai-will-end-the-internet/)正被这种无人关心的垃圾填满。
- en: As an example, let’s say you want to write a book.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，让我们假设你想写一本书。
- en: You can also think of building a software, designing a website, or any other
    type of true creative work.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以考虑构建软件、设计网站或任何其他类型的真正创造性工作。
- en: Right now, you can have AI write a decent book on “How To Focus” with a few
    well written prompts.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，你只需用几个精心编写的提示，就可以让AI写出一本关于“如何集中注意力”的不错的书。
- en: Open up Claude Sonnet 3.5
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打开Claude Sonnet 3.5。
- en: Give it a purpose (ghostwriter)
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 给它一个目的（幕后作者）。
- en: Give it your writing style, tone, and voice
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用你的写作风格、语气和声音来表达。
- en: Give it the target audience
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 给定目标受众。
- en: Have it create a table of contents based on pain points of that audience
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让它根据该受众的痛点创建目录。
- en: For each chapter, have it include a relevant story, main insight, actionable
    steps, and a novel concept like “Time Blocking”
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于每一章，让它包含一个相关的故事、主要见解、可执行的步骤，以及像“时间块”这样的新概念。
- en: Give it previous ideas you’ve written about on focus
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 给它之前你关于专注写过的想法
- en: Create and refine the outline for each chapter
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为每一章创建和细化大纲
- en: Finish the book and refine it to your liking
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完成这本书并按照你的喜好进行润色
- en: Now take 1000 real people (using AI or not) and have them write a book on the
    same topic.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 现在拿1000个真实的人（使用AI或不使用）让他们就同一主题写一本书。
- en: '*Every single final output will be different from one another.*'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '*每个最终输出都将彼此不同*。'
- en: One book can be written 1000 different ways.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 一本书可以以1000种不同的方式来写。
- en: And 1000 different people can *interpret* that book in 1000 different ways.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 1000个不同的人可以用1000种不同的方式*解读*那本书。
- en: 'The point is this:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 重点是这样的：
- en: It doesn’t matter if AI can write you a book, build you a software, design a
    website, write a million social media posts.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 无论AI能否为你写一本书、为你构建软件、设计一个网站、写一百万条社交媒体帖子，这都无关紧要。
- en: Why? Because that’s not what makes creative work successful.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？因为那不是使创造性工作成功的原因。
- en: That’s also not what makes people *care about your creative work.*
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 这也不是使人们*关心你的创造性工作*的原因。
- en: Write all the books you want with AI. See how far it takes you. Most people
    love to blabber about how AI is going to replace everything as an excuse to not
    do anything with their lives as they have been with any excuse they’ve been able
    to grasp onto for the entirety of their lives.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 用AI写所有你想写的书。看看它能带你走多远。大多数人喜欢空谈AI将取代一切，作为他们不采取任何行动的借口，就像他们一生中抓住的任何借口一样。
- en: Doers do. Most people don’t. We’ll talk about that next.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 行动者行动。大多数人不会。我们下次再谈。
- en: For now, realize that multiple interests are merged with *taste.*
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，认识到多种兴趣与*品味*相结合。
- en: Anyone can create anything. They can embrace their nature as a generalist if
    they so choose.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 任何人都可以创造任何东西。如果他们选择，他们可以拥抱自己作为通才的本质。
- en: But what makes a book, a brand, a software, and any other creative work is not
    the *ability* to create that thing, but *how you synthesize ideas across various
    disciplines in a way that nobody but you could have thought of.*
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 但使一本书、一个品牌、一个软件以及任何其他创造性作品成为独特之处的，不是创造那个东西的*能力*，而是*你如何将各种学科中的想法综合起来，以一种只有你才能想到的方式*。
- en: A book on “[How To Focus](https://theartoffocusbook.com)” takes a completely
    new shape when you tie concepts in from philosophy, psychology, metaphysics, and
    spirituality rather than just self-help.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 当你从哲学、心理学、形而上学和精神领域引入概念，而不是仅仅从自我帮助的角度来看，“[如何专注](https://theartoffocusbook.com)”这本书将呈现出全新的形态。
- en: Since most people had their taste blunted by schools and jobs, you’re at a massive
    advantage because you didn’t let that stop you from studying beyond the defined.
    You love to explore the unknown.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 由于大多数人被学校和工作的口味钝化，你处于巨大的优势，因为你没有让这些阻止你超越定义去学习。你喜欢探索未知。
- en: The entry level will go extinct because beginners have taste, but can’t make
    it real. They haven’t practiced and failed enough as Glass pointed out in the
    quote above.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 入门级将会灭绝，因为初学者有品味，但不能使之成为现实。他们还没有像Glass在上面的引语中指出的那样练习和失败足够多。
- en: In the future of work, high paying employment will be reserved for the highly
    skilled. Those who can do many things and have an acquired taste.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在工作的未来，高薪就业将仅限于技能高超的人。那些能做很多事情并且有独特品味的人。
- en: But frankly, most people won’t get those jobs.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 但坦白说，大多数人不会得到那些工作。
- en: They will be few and far between.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 它们将会很少见。
- en: Like getting into the NBA, reserved for the 0.1% elite.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 就像进入NBA一样，只为0.1%的精英保留。
- en: A pipedream.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 一个空想。
- en: So if you have multiple interests, and you have taste, there’s one more piece
    of the puzzle.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 所以如果你有多个兴趣，你有品味，这就完成了拼图的一部分。
- en: 'Agency: Employment VS Entrepreneurship'
  id: totrans-115
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代理：就业 VS 创业
- en: It’s sad that “business” and “entrepreneurship” have become dirty words.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 很遗憾，“商业”和“创业”已经变成了脏话。
- en: 'For most people, when they hear them, their mind is flooded with doubt and
    alarm:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大多数人来说，当他们听到这些时，他们的脑海中充满了怀疑和恐慌：
- en: “That requires a lot of money to start.”
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “那需要很多钱才能开始。”
- en: “I’m not talented enough to do that.”
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “我没有足够的才华去做那件事。”
- en: “Charging people money? Sounds like a scam.”
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “收费？听起来像是个骗局。”
- en: “I don’t know how to create an LLC or do my taxes, so I’m never going to learn.
    Sounds boring.”
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “我不知道如何创建有限责任公司或做我的税收，所以我永远不会学习。听起来很无聊。”
- en: I’m not here to talk about entrepreneurship as a role or title or something
    that’s reserved for talented people.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是来谈论创业作为一种角色或头衔，或者它只为有才华的人保留的。
- en: 'I’m here to talk about what it actually is:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里谈论的是它实际上是什么：
- en: '*A state of mind.*'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '*一种心态*。'
- en: The difference between an employee and entrepreneur is the difference between
    low-agency and high-agency. In this context, *high-agency individuals are those
    who create their own goals and actively pursue them without permission from another.*
    Low-agency individuals are those who are assigned goals and pursue them because
    they don’t have a mind that allows them to see any other option. True agency can
    only be developed when you blame yourself for every problem, even when you’re
    not at fault.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 员工与企业家之间的区别，就是低自主性与高自主性的区别。在这个背景下，*高自主性的人是指那些设定自己的目标并主动追求它们，而不需要他人许可的人*。低自主性的人是指那些被分配目标并追求它们的人，因为他们没有足够的思想去看到其他选择。真正的自主性只有在当你为每一个问题承担责任，即使你并非过错方时，才能得到发展。
- en: An entrepreneur is often an employee, but an employee is rarely an entrepreneur.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 企业家通常也是员工，但员工很少成为企业家。
- en: At top companies, the most sought after employees are those who solve problems
    without permission. They just *do.* They have agency. They don’t need their hand
    held to do something valuable.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在顶级公司，最被寻求的员工是那些无需许可就能解决问题的人。他们只是*做*。他们有自主性。他们不需要别人的帮助去做有价值的事情。
- en: But again, the jobs of the future will be reserved for the elite.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 但再次强调，未来的工作将仅限于精英阶层。
- en: So the main option, in my eyes, for those with high ambition and multiple interests,
    is to *create your own path,* and the only way to do that is by becoming an entrepreneur
    (no matter how long it takes for your dreams to gain traction).
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: '所以，在我看来，对于有高抱负和多个兴趣的人来说，主要的选项是*创造自己的道路*，而唯一的方法就是成为企业家（无论你的梦想需要多长时间才能获得动力）。 '
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2499">![](../Images/05d4150db2c87632b168713ba6948a31.png)</picture>
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/05d4150db2c87632b168713ba6948a31.png)'
- en: Now, it’s easy to lump me into the camp of “all 9-5 jobs are bad!” when that’s
    not my belief at all.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，很容易把我归类到“所有9-5的工作都是不好的！”这一阵营，但这根本不是我的信念。
- en: However, I do understand psychology to a reasonable extent.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我确实对心理学有一定的理解。
- en: As a child, there is a “magic” to life because everything is new. You are constantly
    improving, evolving, and taking on new challenges that make life worth living.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 作为孩子，生活中有一种“魔法”，因为一切都是新的。你不断地进步，进化，接受新的挑战，使生活变得值得过。
- en: Schools simulate this desire to “hunt” for good dopamine by providing a video
    game like progression to learning.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 学校通过提供类似视频游戏的进步学习方式来模拟这种“狩猎”好多巴胺的欲望。
- en: When you accept your first job, it’s challenging at first. You develop skill
    to cure your anxiety. Then, when you reach as far as that career letter will allow
    you, the challenge and novelty cease to exist. Your days turn into a blur of repetition.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 当你接受第一份工作时，一开始是具有挑战性的。你发展技能来治愈你的焦虑。然后，当你达到那个职业信函所允许的极限时，挑战和新鲜感就消失了。你的日子变成了重复的模糊。
- en: This is incredibly damaging to your psyche.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 这对你的心理造成了极大的伤害。
- en: You get stuck in the defined. The known. And you can’t escape because a monthly
    paycheck is addictive, and you max out your lifestyle to fit what that paycheck
    allows.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 你陷入了既定的、已知的，而且你无法逃脱，因为月薪是上瘾的，你将你的生活方式最大化，以适应那份薪水所允许的范围。
- en: For those who want more out of life, the only way out is entrepreneurship.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些想要从生活中得到更多的人来说，唯一的出路就是创业。
- en: To dive into the unknown. Embrace uncertainty. Accept the infinite string of
    challenges that bring the child like magic of high highs and low lows back into
    your life.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 要深入未知。拥抱不确定性。接受那些带来孩子般魔法的极高和极低挑战的无穷序列，让这些挑战重新回到你的生活中。
- en: And if you have multiple interests, you’re in a great spot.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你拥有多个兴趣，你正处于一个绝佳的位置。
- en: How To Turn Your Interests Into Income
  id: totrans-141
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何将你的兴趣转化为收入
- en: I would focus on the content creator side of things because I believe that’s
    ‘where the puck is going’. That’s a much more important shift… In how we all consume
    information.
  id: totrans-142
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我会专注于内容创作者这一方面，因为我相信那是“冰球将要去的地方”。这是一个更加重要的转变……关于我们所有人如何消费信息。
- en: ''
  id: totrans-143
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Chamath Palihapitiya
  id: totrans-144
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 查马斯·帕利哈皮蒂亚
- en: 'The final problem is this:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 最后的问题是这个：
- en: You have multiple interests.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 你拥有多个兴趣。
- en: You are developing taste.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在培养品味。
- en: You are ready to increase your agency.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经准备好增加你的自主性。
- en: But you have no idea *where to start.*
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 但你不知道*从哪里开始*。
- en: If you’re young, the only real places you know to look are job boards and maybe
    freelance market places.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你年轻，你唯一真正知道去哪里寻找的地方就是招聘网站，也许还有自由职业市场。
- en: So rather than giving you a singular place to look, because a singular known
    path won’t do you any good, I will guide you to creating your own path to turn
    your interests into income.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，而不是给你一个单一的地方去寻找，因为一个已知的单一路径对你没有任何好处，我会引导你创造自己的路径，将你的兴趣转化为收入。
- en: 1) Choose A Meta Path
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 选择一个元路径
- en: The greatest mistake you can make is boxing yourself into one specific model.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 你能犯的最大错误就是将自己局限于一个特定的模式。
- en: Like starting an agency business or eCommerce business or some other random
    niche model like Amazon print on demand.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 就像开始一个代理业务或电子商务业务或像亚马逊按需印刷这样的其他随机利基模式。
- en: Those are great things to learn, but only to acquire relevant skills that help
    actualize your vision. Just like a job.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 这些都是值得学习的好东西，但只是为了获得帮助实现你愿景的相关技能。就像一份工作一样。
- en: A better route is zooming out a layer to discover the principles that *make
    all of those models work.*
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 一个更好的方法是退后一步，发现那些*使所有这些模型都有效*的原则。
- en: Because once you understand that, you can create success in anything you choose
    to do.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 因为一旦你理解了这一点，你就可以在任何你选择的事情上创造成功。
- en: 'So, if you want to do your own thing, you need 3 things:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，如果你想做自己想做的事情，你需要三样东西：
- en: A valuable product or service
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个有价值的产品或服务
- en: A way to attract people who care
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一种吸引关心这件事的人的方法
- en: The skill to make people care
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让人们关心的技能
- en: Thanks to the internet, each of these are now accessible to anyone with an internet
    connection.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了互联网，现在这些对任何有互联网连接的人来说都是可访问的。
- en: 'You can build a product or service with relative ease:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以相对容易地构建一个产品或服务：
- en: You can write an eBook
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以写一本电子书
- en: You can start a cohort based course around your interests
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以围绕你的兴趣开设一个基于团队的课程
- en: You can build software with AI assisted coding and learning
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以使用AI辅助编码和学习来构建软件
- en: We talked about this in depth in the [*How To Package And Market Your Knowledge*](https://thedankoe.com/letters/the-1-million-product-how-to-package-market-your-knowledge/)
    letter.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在[*如何包装和营销你的知识*](https://thedankoe.com/letters/the-1-million-product-how-to-package-market-your-knowledge/)信件中深入讨论了这一点。
- en: Those are the best options for a beginner who doesn’t want to invest an excessive
    amount of time and money into building a traditional business.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是对于不想在建立传统业务上投入过多时间和金钱的初学者来说的最佳选择。
- en: Once you’ve launched a few of those products, you now have data on what works,
    and you have some cash to invest.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你推出了一些这样的产品，你现在就有了关于什么有效的工作数据，并且你有一些现金可以投资。
- en: At that point, you can take the Justin Welsh route and chill out with a multi-million
    dollar info product business as one person, or you can go my route of using those
    as the starting point of another product that demands more resources, like [Kortex](https://kortex.co).
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 在那个阶段，你可以选择Justin Welsh的道路，作为一个个体，享受一个价值数百万美元的信息产品业务，或者你可以选择我的道路，将这些作为另一个需要更多资源的产品的起点，比如[Kortex](https://kortex.co)。
- en: The problem here is that, again, anyone can build anything.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的问题在于，同样，任何人都可以构建任何东西。
- en: But not everyone can *attract people who care about that thing.*
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 但并不是每个人都能*吸引关心这件事的人*。
- en: That’s where most coders, authors, or creatives fail. They build a cool app,
    or write a book, or create art but they can’t get customers, so they fail.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数程序员、作家或创作者失败的地方就在这里。他们构建了一个酷炫的应用程序，或写了一本书，或创造了艺术，但他们无法吸引客户，所以失败了。
- en: Thankfully, you don’t need paid ads, billboards, or to get on a TV talk show
    to drive traffic to your business anymore.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，你不再需要付费广告、广告牌或上电视谈话节目来为你的业务引流。
- en: You simply start posting about your knowledge and interests online.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 你只需开始在网上发布关于你的知识和兴趣的内容。
- en: '*You get in front of an audience.*'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: '*你出现在受众面前*。'
- en: You can either build, borrow, or buy an audience.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以建立、借用或购买一个受众。
- en: Since we want accessible, affordable, and high leverage, the greatest area to
    focus your attention right now is on *building* an audience. This is done on social
    media until the next social layer of society emerges.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们希望产品易于获取、价格合理且具有高杠杆效应，现在你最需要关注的是*建立*一个受众。这是在社交媒体上完成的，直到社会的下一个社交层出现。
- en: “But Dan, everyone is becoming a creator and talking about the same thing.”
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: “但Dan，每个人都在成为创作者，谈论同样的事情。”
- en: Wrong. You are in an echo chamber.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 错了。你正处于一个回音室中。
- en: Being a creator is interest agnostic. You can talk about anything you want as
    long as you can make it persuasive.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 成为创作者与兴趣无关。只要你能够说服人，你就可以谈论任何你想要的事情。
- en: You don’t *have* to talk about self development or philosophy or business. You
    just think you do because you have similar interests as me (that’s why you read
    these), so maybe you should build an audience around those. Not everyone has those
    interests.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 你**不必**谈论自我发展、哲学或商业。你只是认为你必须这样做，因为你和我有相似的兴趣（这就是你为什么读这些），所以也许你应该围绕这些兴趣建立听众。并不是每个人都有这些兴趣。
- en: Everyone is becoming a creator because that’s how you, as an individual, take
    back your sovereignty. There are business and consumers. Creators are both. So
    yes, that market will be absolutely massive and comprise much of the new economy.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都在成为创作者，因为这是你作为个体恢复主权的方式。这里有企业和消费者。创作者既是企业也是消费者。所以，是的，这个市场将绝对巨大，并构成新经济的大部分。
- en: The thing is, none of this is anywhere close to being easy.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，这一切都不容易。
- en: You need the right skills to both attract an audience *and* make them care about
    who you are and what you do.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要正确的技能来吸引听众，并且让他们关心你是谁以及你在做什么。
- en: In other words, you need a *medium* and a *message.*
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，你需要一个**媒介**和一个**信息**。
- en: Writing and speaking are your medium.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 写作和演讲是你的媒介。
- en: You either write posts, threads, newsletters, products, ads, emails, articles,
    etc. Or you speak to a camera to get your message out to people who may benefit
    from it.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 你要么写帖子、线程、通讯、产品、广告、电子邮件、文章等，要么对着摄像机说话，把你的信息传达给可能从中受益的人。
- en: Psychology, marketing, sales, and persuasion help form your message. You need
    to write or speak in a way that captures attention, articulates value, and builds
    trust.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 心理学、营销、销售和说服力有助于形成你的信息。你需要以吸引注意、阐述价值和建立信任的方式写作或演讲。
- en: If you want help with this, the next [Writer’s Bootcamp](https://bootcamp.kortex.co)
    starts on March 4th. It will help you create your niche of one, write about your
    interests, and learn the skills to build an audience as your “moat” for the future.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要帮助，下一届[作家训练营](https://bootcamp.kortex.co)将于3月4日开始。它将帮助你创建你的个人领域，写关于你的兴趣，并学习建立听众的技能，作为你未来的“护城河”。
- en: 2) Intersections Are Your Edge
  id: totrans-191
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 交叉点是你的优势
- en: If everyone builds an audience, how do you stand out?
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 如果每个人都建立了一个听众，你如何脱颖而出？
- en: Well, this is only a difficult question because you aren’t your authentic self.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，这只是一个困难的问题，因为你不是你真实的自我。
- en: If you were, and everyone else on this planet was, everyone would be unique.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你就是，而且这个星球上的每个人都一样，那么每个人都会是独特的。
- en: In other words, if everyone were to become a creator, and all of those creators
    were their authentic self, meaning they solved their own problems and sold the
    solution, then we would enter some form of digital tribal era. Small self-sustaining
    tribes would form and each person in it would be able to help others within that
    tribe with their own uniqueness. This is already happening.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，如果每个人都成为创作者，并且这些创作者都是他们真实的自我，这意味着他们解决了自己的问题并出售解决方案，那么我们将进入某种形式的数字部落时代。小型自给自足的部落将会形成，而部落中的每个人都能用自己的独特性帮助部落中的其他人。这已经在发生了。
- en: You don’t need a lot of followers. You need a few hundred people who support
    your work and need what you offer. And, as the internet goes, those few hundred
    people will filter in and out every month or two allowing you to sustain what
    you do. You evolve, tribes evolve, the internet is a constant flow of attention.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要很多追随者。你需要几百个人支持你的工作，并需要你提供的东西。而且，随着互联网的发展，这几百个人每个月或两个月就会进出一次，让你能够维持你所做的事情。你进化，部落进化，互联网是注意力不断流动的源泉。
- en: But we conform. We copy other people. We lack vision for our future and the
    agency to make it reality.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们却趋同。我们模仿他人。我们对未来的愿景不足，也没有实现它的能力。
- en: 'Here’s what I want you to do to discover your uniqueness:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我想让你做的，以发现你的独特性：
- en: '**Write out your story** – Where were you a few years ago? What was your mindset
    then? What was the major turning point? What skills did you learn? Where are you
    now? Can you help others do the same?'
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**写下你的故事** – 几年前你在哪里？那时的你是什么心态？发生了什么重大转折？你学习了哪些技能？你现在在哪里？你能帮助他人做到同样的事情吗？'
- en: '**Write out 10-20 interests** – Pull out a notebook and write down 10-20 things
    you love studying, want to study, or are slightly interested in.'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**列出10-20个兴趣** – 拿出笔记本，写下10-20件你热爱学习、想要学习或稍微感兴趣的事情。'
- en: '**Write out 3 pain points for each** – Under each interest, write down 3 problems
    or pain points that you have faced or others face relating to those interests.'
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**为每个问题列出3个痛点** – 在每个兴趣下，写下你或其他人面临或相关的3个问题或痛点。'
- en: '**Connect the dots** – Draw lines between parts of your story, your interests,
    and the pain points. You’ll be amazed with how many things connect.'
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**连接点** – 在你的故事、兴趣和痛点之间画线。你会惊讶于有多少事物是相互关联的。'
- en: My writing can’t be replicated with AI (unless I’m the one manning the AI) because
    my “edge” is my personal experience paired with philosophy paired with business.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 我的写作无法用AI复制（除非我是操作AI的那个人），因为我的“优势”是我个人的经验与哲学和商业的结合。
- en: I can talk about the same topic as everyone else, because that’s where the attention
    is, but my content stands out because of how I *frame* it.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以和大家一样谈论相同的话题，因为那里是关注的焦点，但我的内容之所以突出，是因为我*如何框架*它。
- en: Second, I am focused on attracting people with similar interests.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，我专注于吸引有相似兴趣的人。
- en: Why? Because I know I can help them in some way.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？因为我知道我能在某种程度上帮助他们。
- en: If you want to do the same, take what you wrote above.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想做同样的事情，就采取你上面写的内容。
- en: Write one article or post for every pain point you listed out.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 为你列出的每一个痛点写一篇文章或帖子。
- en: Sprinkle in your personal story throughout your writing.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的写作中穿插你的个人故事。
- en: Bake in connected interests to synthesize unique ideas.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 将相关兴趣融入其中，以综合独特想法。
- en: And of course, be persistent.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，要有毅力。
- en: Remember, you have taste, but it doesn’t reflect in your work until you practice
    for years.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，你有品味，但除非你练习多年，否则它不会反映在你的工作中。
- en: And no, a few years is not a lot of time considering you spent 18+ years being
    drilled into something you don’t want to do. A few years of effort is absolutely
    nothing.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 不，几年时间不算多，考虑到你花了18+年去做你不想做的事情。几年的努力绝对微不足道。
- en: You don’t want to commit because you “have something better you could be doing”
    when all that involves is numbing the pain with cheap pleasures to escape your
    current situation.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 你不想承诺，因为你“有更好的事情可以做”，而这一切只是用廉价的快乐来麻痹痛苦，逃避当前的情况。
- en: The only thing you should want to do is get out.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 你唯一想做的事情就是走出去。
- en: 3) Merge Art & Business
  id: totrans-216
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 融合艺术与商业
- en: "To build product, “make something people want.”\L> \L> To create art, make\
    \ something *you* want.\L> \L> (The best do both)."
  id: totrans-217
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: "要构建产品，“制作人们想要的东西。”\L> \L> 要创作艺术，制作*你*想要的东西。\L> \L> （最好的两者都做）。"
- en: ''
  id: totrans-218
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Naval Ravikant
  id: totrans-219
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 纳瓦尔·拉维坎特
- en: It’s sad that most people can’t come to terms with the fact that business can
    be a very fulfilling thing.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 很遗憾，大多数人无法接受商业可以是一件非常令人满足的事情这一事实。
- en: 'That happiness is a two sided coin:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 那种快乐是一枚双面硬币：
- en: The creativity required to make progress and contributing to something greater
    than yourself.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 需要的创造力以取得进步并为超越自己的事物做出贡献。
- en: In other words, becoming valuable and sharing that value.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，变得有价值并分享这种价值。
- en: With the internet, anyone can do this and reap the rewards of doing so.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 在互联网上，任何人都可以这样做，并从中获得回报。
- en: You merge art and business when you make something you want and share it with
    people who have similar interests, because they will probably want it too.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 当你制作出你想要的东西并与有相似兴趣的人分享时，你就将艺术与商业结合在一起，因为他们可能也会想要。
- en: Write content for yourself.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 为自己写内容。
- en: Treat the internet as your public journal.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 把互联网当作你的公共日记。
- en: Put effort into getting that spread to more people.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 付出努力让更多的人知道。
- en: Build a product you would buy, use, and benefit from.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 建立一个你愿意购买、使用并从中受益的产品。
- en: Given time, you’ll do very well for yourself.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 给予时间，你会为自己做得很好。
- en: – Dan
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
