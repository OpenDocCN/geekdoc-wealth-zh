- en: How My Startup Made $759,900 In 6 Months (Without Launching)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我的创业公司如何在6个月内（未公开发布）赚取759,900美元
- en: 原文：[https://thedankoe.com/letters/how-my-startup-made-759900-in-6-months-without-launching/](https://thedankoe.com/letters/how-my-startup-made-759900-in-6-months-without-launching/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/how-my-startup-made-759900-in-6-months-without-launching/](https://thedankoe.com/letters/how-my-startup-made-759900-in-6-months-without-launching/)
- en: This past weekend, I visited my developer team in Toronto, Canada.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 上个周末，我访问了在加拿大多伦多的我的开发团队。
- en: We are doing things a bit differently at [Kortex](https://kortex.co), and I
    want to get vulnerable with you.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在[Kortex](https://kortex.co)我们做事的方式有些不同，我想和你分享我的脆弱之处。
- en: I want to document building our startup in public so you can learn from our
    failures and successes (and trust me, we have plenty of failures already).
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我想在公共场合记录我们构建创业公司的情况，这样你可以从我们的失败和成功中学习（相信我，我们已经有很多失败了）。
- en: I want to talk about how we generated $759,900 in 6 months without launching
    to the public.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我想谈谈我们如何在6个月内没有公开发布的情况下赚取了759,900美元。
- en: The problem is that most people dream of building a massive company, but most
    of them go about it wrong.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 问题在于，大多数人梦想着建立一个庞大的公司，但其中大多数人都在错误地行事。
- en: They think they need startup capital.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们认为他们需要创业资金。
- en: They think they need investors and VC money.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们认为他们需要投资者和风险投资资金。
- en: They think they need to pour a bunch of money into marketing.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们认为他们需要大量资金投入营销。
- en: They build the product without thinking about how they will get users or if
    the idea is good to begin with.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们没有考虑如何获取用户，或者最初的想法是否好。
- en: We took a completely different approach.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我们采取了完全不同的方法。
- en: The good thing about our approach is that anyone can do it.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的方法的好处是任何人都可以做到。
- en: The bad thing about our approach is that it takes time.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的方法的坏处是它需要时间。
- en: When I landed in Toronto, I wanted to ask our core developers what their biggest
    lessons have been while building Kortex.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当我抵达多伦多时，我想问我们的核心开发者，他们在构建Kortex的过程中最大的教训是什么。
- en: I wasn’t expecting the answers they gave.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我没有预料到他们会给出这样的答案。
- en: I think you’ll benefit from what they had to say.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为你会从他们的言论中受益。
- en: We will start there, then, I will tell you how to come up with a profitable
    startup idea and fund it without external help.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从那里开始，然后，我会告诉你如何提出一个有利可图的创业想法，并无需外部帮助来资助它。
- en: Imperfection, High-Agency People, and Building From Scratch
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不完美，高效率的人，从头开始构建
- en: I’ll start with my biggest lesson.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我会从我的最大教训开始。
- en: I didn’t realize how complex and costly software development can be.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我没有意识到软件开发可以有多复杂和昂贵。
- en: It’s just a note-taking app, right?
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 它只是一个笔记应用，对吧？
- en: Wrong. We take so much of the software we use for granted. And we aren’t taking
    the cheap no-code route to deliver a crappy product to you.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 错误。我们对待我们使用的软件太过轻视。我们不会选择便宜的无代码路线，向你们提供糟糕的产品。
- en: We have a burn rate close to $30,000/week.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的烧钱速度接近每周$30,000。
- en: We’ve removed 3-4 major features already that took months of developer time
    and energy.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经移除了3-4个主要功能，这些功能花费了开发人员数月的时间和精力。
- en: We’ve added major features we didn’t plan for.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我们添加了一些我们没有计划的功能。
- en: We already have a V2 design of the app in the works.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经在进行应用V2的设计工作了。
- en: Building the app has been a constant string of problems, and I wouldn’t have
    it any other way.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 建立这个应用一直是一连串的问题，而且我不会以任何其他方式。
- en: We have no idea what we’re doing because it’s impossible to guess what problem
    will pop up next.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不知道我们在做什么，因为不可能预测下一个会冒出什么问题。
- en: '**So, my biggest lesson is this:**'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**所以，我最大的教训是：**'
- en: Be okay with doing things imperfectly.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 对做事情不完美感到满意。
- en: Yes, our costs could be lower (if we didn’t recruit top talent). Yes, we could
    launch an MVP we aren’t proud of. Yes, we could do a lot of things, but boy are
    we gaining valuable life experience that will pay off 10-fold down the road.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，我们的成本可以更低（如果我们没有招募顶尖人才）。是的，我们可以推出一个我们并不自豪的MVP。是的，我们可以做很多事情，但 boy are we gaining
    valuable life experience that will pay off 10-fold down the road.
- en: Our mindset can change, but our goal isn’t acquisition right now. We want to
    build the app we want to see in the world. An app that will benefit people’s lives
    on a daily basis like it already does mine (seriously, I’m addicted to it).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的心态可以改变，但我们的目标现在并不是获取。我们想要构建我们想要在世界看到的那个应用。一个像它已经对我的生活产生的那样，每天都能让人们受益的应用（真的，我已经上瘾了）。
- en: '**Lesson 2) The Importance Of Being A High-Agency Individual**'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**第2课）成为高效率个体的必要性**'
- en: '**Lesson 3) Learning To Work With A Team As A Lone Wolf**'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**第3课）学会与独行侠团队合作**'
- en: '**Lesson 4) Building From Scratch Takes More Work Than Working At An Established
    Company**'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**第4课）从零开始构建比在一家成熟公司工作需要更多努力**'
- en: The Importance Of Building An Audience
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 建立观众群体的重要性
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1942">![](../Images/79c260f2e50e1b72946f9056c8ab1439.png)</picture>
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1942">![](../Images/79c260f2e50e1b72946f9056c8ab1439.png)</picture>
- en: Most people don’t even think of social media when they start a business.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人在开始创业时甚至不会想到社交媒体。
- en: They don’t see how it is the biggest “shortcut” to success.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 他们看不到这是通往成功的最大“捷径”。
- en: We aren’t building a business in the 2000s. Technology has advanced. You don’t
    need to put in grueling hours with direct sales, cold outreach, and manually finding
    potential customers.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不是在21世纪建立业务。技术已经进步。你不需要投入艰苦的时间进行直接销售、冷门推广和手动寻找潜在客户。
- en: 'Social media is how you:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体是你：
- en: Test ideas with content that turns into marketing and products that sell (without
    spending any money).
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过将内容转化为营销和销售产品的想法来测试（而不需要花费任何钱）。
- en: Build an audience of people who want to buy the product when you launch it (because
    most startups can’t get users).
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你推出产品时，建立一个想要购买产品的观众群体（因为大多数初创公司都无法获得用户）。
- en: Sell a low marginal cost digital product to get results and validate your startup
    idea before building it.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在构建产品之前，通过销售低边际成本的数字产品来获得结果并验证你的创业想法。
- en: Recruit developers, a team, and investors if you want to go that route.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你想要走这条路，招募开发者、团队和投资者。
- en: Many people think I just write content to write content.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人认为我只是为了写内容而写内容。
- en: This is partially true, but I’ve written 40,000 tweets, posted 3000+ more to
    other platforms, sent hundreds of newsletters, and posted hundreds of YouTube
    videos.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这部分是正确的，但我已经写了40,000条推文，在其他平台上发布了3,000多条，发送了数百份新闻通讯，并在YouTube上发布了数百个视频。
- en: Because of that, I have *data*.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 正因为如此，我有**数据**。
- en: I know exactly what ideas pull in followers, catch attention, spark controversy,
    lead to customers, and get engagement.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我确切地知道哪些想法能吸引追随者，吸引注意，引发争议，吸引客户，并促进参与。
- en: I have a database of ideas that I can use as products, inside my products, on
    my sales pages, and in my promotions. I don’t have to do any manual market research,
    and I don’t have to put time into building the product to test whether it will
    sell.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我有一个想法数据库，可以用作产品，在我的产品中，在我的销售页面上，以及在我的推广中。我无需进行任何手动市场研究，也无需投入时间来构建产品以测试其是否畅销。
- en: By writing and building an audience on social media, I get to skip the grind
    that most startups and businesses go through.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在社交媒体上写作和建立观众群体，我可以跳过大多数初创公司和企业必须经历的艰辛。
- en: 'Here are a few simple steps to start:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些简单的步骤来开始：
- en: 1) Create Your Topic Tree
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 创建你的主题树
- en: Write down a list of all of your interests, skills, and ideas you want to talk
    about.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 列出你所有感兴趣、有技能和想要讨论的想法清单。
- en: Don’t worry about getting specific, worry about getting relatable.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 不要担心具体化，担心的是让人产生共鸣。
- en: Don’t niche down too far just yet. Start broad and applicable to most people.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 不要一开始就过于细分领域。从广泛且适用于大多数人开始。
- en: 'Examples of applicable topics are ones you see online all the time: productivity,
    self-improvement, health and fitness, social dynamics, skill acquisition, career
    advice, business, etc.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 适用的话题示例是你经常在网上看到的内容：生产力、自我提升、健康和健身、社会动态、技能获取、职业建议、商业等。
- en: If your topic is “leadership for teams and executives” turn that into “self-improvement”
    or frame it in a way that can benefit more people (without stripping the potential
    to attract the specific audience you want).
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的主题是“团队和高级管理人员的领导力”，将其转变为“自我提升”或以能够惠及更多人的方式来构建（而不会剥夺吸引你想要的具体受众的潜力）。
- en: You don’t have to call out teams and executives for them to resonate with content.
    Write for them, but in a way that others can benefit from, too.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 你不必指出团队和高级管理人员，他们就能与内容产生共鸣。为他们写作，但要以其他人也能从中受益的方式。
- en: Remember, this is social media. It’s not targeted. It’s random. You have to
    start broad and funnel people into your expertise.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，这是社交媒体。它不是针对性的。它是随机的。你必须从广泛开始，并将人们引导到你的专业知识领域。
- en: If you have 100 followers, and your topics are niche, good luck getting your
    content in front of enough people.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只有100名关注者，你的主题又很细分，那么让你的内容出现在足够多的人面前将很困难。
- en: You need a larger audience that can spread your name to *reach* the specific
    people you want. It doesn’t matter if your audience isn’t completely filled with
    potential buyers.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要一个更大的受众，他们能将你的名字传播出去，以接触到你想要的具体人。你的受众是否完全由潜在买家组成并不重要。
- en: I’d rather have 100,000 people who can spread my name to specific people in
    their network rather than 1,000 people who know exactly what I do. Especially
    if I’m building a startup where I need all of the leverage, resources, and connections
    I can get.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我宁愿有10万人能将我的名字传播到他们网络中的特定人，也不愿有1000个人确切知道我做什么。特别是如果我正在建立一个初创公司，我需要我能得到的所有杠杆、资源和联系。
- en: By the way, if you want first access to Kortex, we are running a writing BootCamp
    limited to 500 people.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 顺便说一句，如果你想首先获得Kortex的访问权限，我们正在举办一个仅限500人的写作训练营。
- en: You get 1 year of access to Kortex as we teach you how to write on social media
    to build an audience for your business, work, or career.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 我们教你如何在社交媒体上写作以建立你的业务、工作或职业生涯的受众，你将获得Kortex一年的访问权限。
- en: The first Bootcamp starts May 13\. [Check it out here.](https://bootcamp.kortex.co)
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 第一期训练营将于5月13日开始。[在这里查看。](https://bootcamp.kortex.co)
- en: 2) Make Noise & Focus On Signal
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2)制造噪音并关注信号
- en: Now, just start writing.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，只需开始写作。
- en: Talk about your interests.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 谈谈你的兴趣。
- en: Talk about your opinions.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 谈谈你的观点。
- en: Talk about your expertise.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 谈谈你的专业知识。
- en: Talk about your beliefs.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 谈谈你的信仰。
- en: Teach people the skills you have, the mindset required to see success in your
    field, and the benefits of doing what you teach.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 教授人们你拥有的技能，看到你所在领域成功的思维方式，以及你所教授的事情的好处。
- en: The more you write, the more data points you have.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 你写得越多，你就有越多的数据点。
- en: Emulate what works.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 模仿那些有效的方法。
- en: Build a swipe file of ideas you wish you wrote.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 建立一个你希望写过的想法的滑动文件。
- en: Study the structure of posts and threads that do well.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 研究表现良好的帖子和管理层的结构。
- en: Literally have 10-20 of your favorite posts open next to you as you write.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在你写作时，真的让10-20篇你最喜欢的帖子在你旁边打开。
- en: Don’t try to write your ideas blindly. You need to write with readability, impact,
    and in a style that the platform is used to.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 不要试图盲目地写你的想法。你需要用可读性、影响力和平台习惯的风格来写作。
- en: There’s a reason all creators talk about similar topics in a similar way… because
    it works. This changes occasionally and you need to flow with what the market
    wants.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 所有创作者都谈论类似话题的原因……因为它们有效。这偶尔会改变，你需要顺应市场的需求。
- en: From there, stick it out for 3-6 months.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，坚持3-6个月。
- en: Review all of your posts and see which ones did better.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 审查你所有的帖子，看看哪些表现更好。
- en: Make those ideas a solidified part of your brand. Write about them more often
    because they will continue to do well. Include them in your marketing, promotions,
    and as ideas for products. People want more of that.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 将这些想法变成你品牌的一部分。更频繁地写关于它们，因为它们会继续做得很好。将它们包含在你的营销、促销和产品创意中。人们想要更多这样的东西。
- en: When you have enough validated ideas through content, you can move on to the
    next step.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 当你通过内容验证了足够多的想法后，你可以进行下一步。
- en: How To Fund Your Startup
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何为你的初创公司筹集资金
- en: <picture decoding="async" class="wp-image-1941">![You have everything you need
    to build what you want. It's 2024\. If you have an internet connection, you can
    be free.](../Images/1003cc0ed6c82a32ed29936828db8a6c.png)</picture>
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-1941">![你拥有构建你想要的一切所需的东西。现在是2024年。如果你有互联网连接，你可以自由。](../Images/1003cc0ed6c82a32ed29936828db8a6c.png)</picture>
- en: Finally, to answer your question, how did we make almost $800K in 6 months without
    launching the app yet?
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，回答你的问题，我们如何在还没有推出应用的情况下，在6个月内几乎赚了80万美元？
- en: It’s relatively simple, and it’s the same thing I’ve talked about in almost
    every one of my business newsletters.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 这相对简单，而且这是我几乎在每一封商业通讯中都提到的事情。
- en: We have a team of 9 developers building the Kortex app and 6 creators (including
    myself) building Kortex University – the side where we teach writing.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有一支由9名开发人员组成的团队在构建Kortex应用，还有6名创作者（包括我自己）在构建Kortex大学——这是我们教授写作的部门。
- en: Our first priority with Kortex was to generate *cash flow* so we didn’t have
    to take on investors or continue to dig into our own money (I invested $500K of
    my own money as an initial safeguard to fuel development).
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将Kortex的首要任务定为产生现金流，这样我们就不必承担投资者或继续挖自己的钱（我投资了50万美元作为初始保障来推动发展）。
- en: We built a digital product with ideas we’ve validated before.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用在我们之前验证过的想法构建了一个数字产品。
- en: We started building the Kortex social media and email list. Our X and Instagram
    accounts are almost at 10,000 followers each. Our email list is also closing in
    on 10,000 subscribers.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我们开始构建Kortex的社交媒体和电子邮件列表。我们的X和Instagram账户的粉丝数几乎都接近10000人。我们的电子邮件列表也接近10000名订阅者。
- en: Digital products cost very little to build and distribute. I’ve built multiple
    under my own brand so I know how to do it fast.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 数字产品在构建和分发上成本非常低。我自己品牌下已经构建了多个，所以我了解如何快速完成。
- en: In short, we built a program that teaches writing and fueled it with social
    media traffic.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，我们构建了一个教授写作的项目，并用社交媒体流量为其提供动力。
- en: But, I wouldn’t recommend doing it under your startup first. I would recommend
    doing it under your own brand, then, after building cashflow and having the skill
    to build a startup, you can repeat that same process under the startup’s brand.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，我不会建议你在创业公司下首先这样做。我会建议你在自己的品牌下这样做，然后，在建立现金流并拥有构建创业公司的技能之后，你可以在创业公司的品牌下重复同样的过程。
- en: 'Here are the steps to take:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是你要采取的步骤：
- en: 1) Write Content, Build A Program, & Do Client Work
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 写内容，构建项目，并开展客户工作
- en: You need cash flow.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要现金流。
- en: When you start building your personal brand and testing ideas with content (as
    mentioned above), you’ll start to get a feel for what you can help people with.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 当你开始构建个人品牌并使用内容测试想法（如上所述）时，你将开始了解你可以帮助人们什么。
- en: Turn your expertise into a program that helps people do what you’ve done.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的专业知识转化为帮助人们完成你所做的事情的项目。
- en: As a writer, I help people with writing.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名作家，我帮助人们进行写作。
- en: As a health nut, you can help people with fitness.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名健康达人，你可以帮助人们进行健身。
- en: As a productivity expert, you can help people become more productive.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名生产力专家，你可以帮助人们提高生产力。
- en: Yes, you need to actually get good at something before you can help people with
    a business.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，在你能帮助人们进行商业活动之前，你需要真正擅长某件事。
- en: Your job is to build a curriculum and guide people through it 1 on 1 with weekly
    calls, worksheets, and tasks to get results.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 你的工作是构建一个课程，并通过每周的通话、工作表和任务来一对一地引导人们，以获得结果。
- en: When you don’t have a large audience, it doesn’t make sense to sell a product
    yet. You need to charge $1000-$5000+ per client.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 当你没有大量受众时，现在出售产品还不合时宜。你需要向每位客户收取1000-5000+美元。
- en: I’ll talk about this process in a future letter soon.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 我将在未来的信中讨论这个过程。
- en: 2) Get Results, Grow Your Audience, & Productize Your Offer
  id: totrans-108
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 获得结果，扩大受众，并产品化你的服务
- en: As your audience grows, you have more leverage.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你的受众增长，你拥有更多的议价能力。
- en: We discussed this progression in [Zero To $1 Million As A One-Person Business.](https://thedankoe.com/letters/zero-to-1-million-as-a-one-person-business-while-working-2-4-hours-per-day/)
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在[《作为个人企业家的零到一百万》](https://thedankoe.com/letters/zero-to-1-million-as-a-one-person-business-while-working-2-4-hours-per-day/)中讨论了这种进步。
- en: In between these steps, it is your full time job to improve your program to
    get better results for your customers.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些步骤之间，你的全职工作是改进你的项目，以为你客户获得更好的结果。
- en: Work with them closely and study their problems.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 与他们紧密合作，研究他们的问题。
- en: Results are all that matter. Your results are what will lead to more customers
    and a profitable startup idea.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 结果就是一切。你的结果将导致更多客户和有利可图的创业想法。
- en: And, since you’ve built an audience around this, you don’t have to worry too
    much about getting initial users. Your clients, customers, and readers are enough
    validation for the startup idea that stems from building your own brand.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，由于你已经围绕这个主题建立了一个受众群体，你不必过于担心获取初始用户。你的客户、顾客和读者对你从建立自己的品牌中产生的创业想法已经足够验证。
- en: You have more traffic and potential customers in your audience, so it only makes
    sense to turn a part of your program into a course that more people can access.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 你的受众中有更多的流量和潜在客户，所以将你项目的一部分转化为一个更多人可以访问的课程是合理的。
- en: 'You can do this in two ways:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过两种方式来做这件事：
- en: '**A cohort-based course** – you have a curriculum, community, and live calls
    to help guide groups of people through the program. You can charge more for this
    structure and launch a cohort every 1-3 months.'
  id: totrans-117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**基于团队的课程** – 你有一个课程大纲、社区和现场通话来帮助引导人们完成项目。你可以为这种结构收取更高的费用，并且每1-3个月启动一个团队。'
- en: '**A regular course** – this is where you just sell the curriculum as a course.
    The upside is that it requires very little work on your end. The downsides is
    that you only launch once and charge a lower price.'
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**常规课程** – 这就是你仅仅将课程大纲作为课程出售的地方。好处是你几乎不需要做什么工作。缺点是，你只启动一次，并且收费较低。'
- en: Under my brand, I’ve iterated on my products to the point where 2 Hour Writer
    is my best-selling course.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的品牌下，我已经对我的产品进行了迭代，直到《2小时作家》成为我的最畅销课程。
- en: I have an audience of writers and creators that I’ve helped.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 我有一群我帮助过的作家和创作者。
- en: With close to 15,000 students in 2 Hour Writer alone, it makes sense to build
    a writing app with my system to help make their process better.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 仅在《2小时作家》中就有近15,000名学生，使用我的系统构建一个写作应用来帮助他们改善流程是有意义的。
- en: 3) Build Your Startup & Repeat The Process
  id: totrans-122
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 构建你的初创公司并重复这个过程
- en: 'You now have:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在有了：
- en: Thousands of social media posts to pull data from on what works.
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数千条社交媒体帖子，从中提取有效数据。
- en: Dozens of clients that you’ve personally helped get better at what you do.
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有几十个客户，你亲自帮助他们提高了他们的技能。
- en: Hundreds or thousands of students who can benefit from your startup idea.
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数百或数千名学生可以从你的初创公司想法中受益。
- en: A hyper-profitable digital product business with enough cash flow to start building
    your product and team for your startup.
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个高盈利的数字产品业务，有足够的现金流来开始构建你的产品和团队。
- en: 'You solve the problem that most startups have:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 你解决了大多数初创公司都面临的问题：
- en: They can build an okay product, but they can’t get users. Therefore they can’t
    make money. And they don’t have a cashflow generating business of their own that
    both validates their startup idea and allows them to fuel it’s growth.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 他们可以构建一个不错的产品，但他们无法获得用户。因此，他们无法赚钱。他们也没有自己的现金流生成业务，既验证了他们的初创公司想法，又允许他们为其增长提供动力。
- en: At this point, repeat the process for your startup.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，为你的初创公司重复这个过程。
- en: Build the social media accounts.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 建立社交媒体账户。
- en: Start testing ideas with content related to your startup.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 开始测试与你的初创公司相关的内容相关的想法。
- en: Build out your value ladder starting with client work.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 从客户工作开始构建你的价值层级。
- en: Get results for those initial customers and productize further into a cohort
    or course.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 为那些初始客户获得结果，并将产品进一步产品化到一个群体或课程中。
- en: Hire a team for both the development and education side of the brand so you
    can do it faster than before.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 为品牌的发展和教育方面聘请一个团队，这样你就可以比以前更快地完成它。
- en: With all of this, we can still fail. Kortex could go absolutely nowhere, and
    we’re okay with that. All of this advice is subject to your skill, not luck.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然如此，我们仍然可能失败。Kortex可能完全无处可去，但我们对此并不介意。所有这些建议都取决于你的技能，而不是运气。
- en: I hope this was helpful in providing a big-picture roadmap for building your
    startup.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这能帮助你提供一个构建你初创公司的大纲路线图。
- en: I’ll talk more about how we are building Kortex as it is built.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 当Kortex被构建起来时，我会更多地谈论我们是如何构建Kortex的。
- en: Thank you for reading and enjoy the rest of your weekend.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您阅读，祝您周末愉快。
- en: Dan
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 丹
