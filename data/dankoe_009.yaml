- en: Change Your Life In 6 Months (My Deep Work Routine)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在6个月内改变你的生活（我的深度工作常规）
- en: 原文：[https://thedankoe.com/letters/change-your-life-in-6-months-my-deep-work-routine/](https://thedankoe.com/letters/change-your-life-in-6-months-my-deep-work-routine/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/change-your-life-in-6-months-my-deep-work-routine/](https://thedankoe.com/letters/change-your-life-in-6-months-my-deep-work-routine/)
- en: '*If you can spend 8 hours building someone else’s dreams, you can spend 1 hour
    building your own.*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果你能花8小时去实现别人的梦想，你也能花1小时去实现自己的梦想。*'
- en: 'One of the most powerful ideas I’ve been thinking about recently is this:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 最近我一直在思考的一个最有力的想法是：
- en: Bringing your ideal future into the now.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的理想未来带入现在。
- en: That is, dedicating time to the lifestyle you will be living, but performing
    the same actions on a smaller timescale.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 也就是说，为你要过的生活方式分配时间，但在更小的时间尺度上执行相同的行动。
- en: As an example, I want to write for 2 hours every morning for the rest of my
    life.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我想在我余生每天早上写两个小时。
- en: It [generates a base income](https://2hourwriter.com), clears my mind, and allows
    me to cultivate my creativity every morning.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这样[产生基本收入](https://2hourwriter.com)，让我心情舒畅，并让我每天早上培养我的创造力。
- en: First, the only way I realized this is by experimenting with it.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我意识到这一点是通过实验。
- en: Second, you won’t learn what you want unless you experiment with what you want
    now, just to realize what you don’t want. This is the process of lifestyle iteration.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，除非你尝试你现在想要的东西，否则你不会学到你想要的知识。这是生活方式迭代的进程。
- en: When you bring the specific actions from your ideal future into the now, you
    invest energy into that lifestyle.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 当你将你理想未来的具体行动带入现在，你就在那个生活方式上投入了能量。
- en: From my law of conceptual survival, you will make decisions to maintain those
    daily habits.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我的概念生存定律，你会做出决定来维持那些日常习惯。
- en: '**Conceptual survival:** *The human phenomenon where our survival instincts
    have transcended the physical realm and* *are included* *in the mental**. We work
    to survive ideas, concepts, and beliefs that form our sense of self.*'
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**概念生存：** *人类现象，我们的生存本能已经超越了物理领域，并且* *包括* *在精神层面。我们努力生存，以生存那些形成我们自我意识的思想、概念和信仰。*'
- en: If something threatens your ability to maintain your desired lifestyle, you
    will perceive that as a problem.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有什么威胁到你维持你想要的生活方式的能力，你会把它视为一个问题。
- en: Your mind will view situations through that lens and register potential solutions
    for the problem. You can find these solutions on social media, in books, or anywhere
    really.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 你的大脑将通过那个视角看待情况，并为问题注册潜在解决方案。你可以在社交媒体、书籍或任何地方找到这些解决方案。
- en: This is why I encourage people to read their favorite books again.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是为什么我鼓励人们再次阅读他们最喜欢的书籍。
- en: My guess is that you have refined goals. You will read the books through that
    lens and find lessons that will aid your current endeavors.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我的猜测是，你已经有了一些精炼的目标。你将通过那个视角阅读书籍，并找到有助于你当前努力的教训。
- en: '**The lesson:**'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '**教训：**'
- en: If you aren’t working toward your ideal future, you are working toward someone
    else’s.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有朝着你的理想未来努力，那么你就是在为别人努力。
- en: Your time will be filled according to perceived importance, so create the importance
    by investing energy in your goals.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 你的时间将根据感知的重要性来安排，所以通过在目标上投入能量来创造重要性。
- en: The Holistic Daily Routine
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 全面的日常例行程序
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1092">![](../Images/451f312b7f9b9968d431aa1b9bca053c.png)</picture>
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1092">![](../Images/451f312b7f9b9968d431aa1b9bca053c.png)</picture>
- en: You need dedicated time each day for creativity, productivity, and experimentation.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 你每天都需要专门的时间来培养创造力、生产力和实验。
- en: The first objection that comes into people’s minds is “but Dan, I don’t have
    enough time!”
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 人们首先想到的反对意见是“但是丹，我没有足够的时间！”
- en: That’s fine.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这很好。
- en: I’m not asking you to do this all day.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是要求你整天都这样做。
- en: I’m asking you to do it for the minimum amount of time you can. 15 minutes or
    so. Because the health of your psyche depends on it. You aren’t wired for modern
    life, and if it has become normal to you, you are by definition trapped in “the
    matrix.”
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我要求你尽可能少地做这件事。大约15分钟。因为你的心理健康取决于它。你不是为现代生活而生的，如果你已经习惯了它，那么你本质上就被困在了“矩阵”中。
- en: Many of you are familiar with [how I structure my days](https://thedankoe.com/the-3-part-daily-routine-for-maximum-productivity/),
    so I’ll make this brief.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 你们中的许多人熟悉[我是如何安排我的日常生活的](https://thedankoe.com/the-3-part-daily-routine-for-maximum-productivity/)，所以我将简要说明。
- en: 'You need 3 activities to pursue your goals with full force:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要3个活动来全力以赴地追求你的目标：
- en: '**One that fills your mind** – you need education, ideas, and novel resources
    you can apply toward your goals. This leads to intrinsic motivation.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**充满你的心灵**——你需要教育、思想和你可以应用于你目标的新颖资源。这会导致内在动机。'
- en: '**One that empties your mind** – you don’t want to be trapped in a chaotic
    bubble of thoughts and useful ideas. That’s exactly how you make zero progress.
    Write things down.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**清空你的心灵**——你不想被困在一个混乱的思想和有用想法的泡沫中。这正是你无法取得任何进步的原因。写下你的想法。'
- en: '**One that uses your mind** – you need a vessel to focus your efforts. With
    your ideas and the clarity to execute, build your future.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**利用你的心灵**——你需要一个容器来集中你的努力。有了你的想法和执行的清晰度，构建你的未来。'
- en: This letter will be focused on the last one, using your mind with deep work.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这封信将专注于最后一个，使用深度工作来利用你的心灵。
- en: The Need For Deep Work
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深度工作的必要性
- en: Who you are, what you think, feel, and do, what you love—is the sum of what
    you focus on. ― Cal Newport
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你是谁，你思考、感受和做的事情，你热爱的事物——这些都是你关注的总和。 —— 卡尔·纽波特
- en: Productivity is about getting the most effective work done in the least amount
    of time possible.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 生产力是关于在尽可能短的时间内完成最有效的工作。
- en: Productivity is not about seeing who can work the longest and wearing it as
    a badge of honor.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 生产力不是关于谁可以工作最久，并将其作为荣誉勋章。
- en: We’ve discussed an important concept called the perception threshold in a [previous
    letter.](https://thedankoe.com/life-is-hard-get-used-to-it-the-way-to-mental-mastery/)
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在[之前的信件](https://thedankoe.com/life-is-hard-get-used-to-it-the-way-to-mental-mastery/)中讨论了一个重要的概念，称为感知阈值。
- en: The perception threshold is where what was once difficult becomes effortless
    after pushing through resistance.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 感知阈值是曾经困难的事情在克服阻力后变得毫不费力的地方。
- en: When we invest energy into a goal through work, even if we do not perceive it
    as something we are passionate about, we reach a breakthrough where we *become*
    passionate about the work.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们通过工作将精力投入到目标中，即使我们没有将其视为我们热情所在的事情，我们也会达到一个突破点，在那里我们*成为*对工作充满热情。
- en: If we invest energy in something that results in a desirable future, we feel
    as if we are wasting that energy when we lose momentum. And momentum feels good…
    incredible, to be exact.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们投入精力到某种能够带来理想未来的事物中，当我们失去动力时，我们会觉得我们在浪费这种精力。而且动力感觉很好……确切地说，是令人难以置信的。
- en: In a world of notifications, ample options, and overwhelm, deep work is no longer
    an option.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个通知、选项充足和令人不知所措的世界里，深度工作不再是选择。
- en: It is a *necessity* if you want to change your life.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要改变你的生活，这是一个*必需品*。
- en: Deep work is how you build out your dreams in record time.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 深度工作是你以创纪录的时间构建梦想的方式。
- en: The Priority Ladder
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 优先级阶梯
- en: <picture decoding="async" class="wp-image-1093">![](../Images/f3bd37c45e14162b07a71654eca62008.png)</picture>
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-1093">![](../Images/f3bd37c45e14162b07a71654eca62008.png)</picture>
- en: You can drastically change your life in 6 months with 1 hour a day of pure focus.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过每天1小时的纯粹专注在6个月内彻底改变你的生活。
- en: That’s all you need.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你所需要的。
- en: 1 hour.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 1小时。
- en: So that’s what we will start with.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，这就是我们将要开始的。
- en: First, I want to introduce what I call the *priority ladder*.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我想介绍我称之为**优先级阶梯**的东西。
- en: The priority ladder is a way to structure your focused work sessions.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 优先级阶梯是一种结构化你专注工作时段的方法。
- en: We start with a high-priority project that is based on a future goal.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从一个基于未来目标的高优先级项目开始。
- en: After that time block, we move on to harnessing our creative ability with high-leverage
    tasks… the ones we don’t, and shouldn’t outsource.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在那个时间段之后，我们转向利用我们的创造力来完成高杠杆任务……那些我们不应该，也不应该外包的任务。
- en: Next, we move on to meaningful tasks that coincide with our creative work.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们转向与我们的创造性工作相一致的有意义任务。
- en: Fourth is for maintenance tasks and exposing yourself to the world.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 第四个是维护任务和让自己接触世界。
- en: All of these time blocks should last 60-90 minutes before taking a break.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些时间段都应该持续60-90分钟，然后再休息。
- en: With each time block, you gradually introduce the potential for distraction.
    The first block should be absolutely distractionless.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 随着每个时间段的进行，你逐渐引入了分心的可能性。第一个时间段应该是绝对无干扰的。
- en: Priority 1 – Vision Building
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优先级1 - 视野构建
- en: If you don’t have a lot of time in your days, this is the only block you should
    pay attention to. No excuses.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你每天没有很多时间，这是你应该注意的唯一时间段。没有借口。
- en: If you can’t set aside one hour to build something meaningful to you… something
    needs to change. Fast. Sacrifices hurt but are necessary.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不能留出一个小时来构建对你有意义的东西……有些事情需要改变。快速。牺牲会痛苦，但这是必要的。
- en: 'In this 60-90 minute time block:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个60-90分钟的时间段内：
- en: Create a project that is a puzzle piece to your ideal lifestyle.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个项目，它是你理想生活方式的拼图之一。
- en: For most people, this will revolve around learning new skills to advance their
    career or [starting a one-person business](https://thedankoe.com/the-one-person-business-model-how-to-monetize-yourself/).
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大多数人来说，这会围绕学习新技能来提升他们的职业生涯或[开始一个单人业务](https://thedankoe.com/the-one-person-business-model-how-to-monetize-yourself/)。
- en: The actions you take in this time block should move levers.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个时间段内采取的行动应该能够推动杠杆。
- en: Levers = something that actually moves you toward new insight, progress, or
    results.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 杠杆 = 真正推动你走向新见解、进步或结果的东西。
- en: If you are starting a business, it would be silly to start writing a newsletter
    first ([unless you use my system](https://2hourwriter.com)).
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在创业，首先开始写通讯稿是愚蠢的（除非你使用我的系统[2hourwriter.com]）。
- en: You don’t have readers.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有读者。
- en: You don’t have an offer to monetize with.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有可以货币化的产品。
- en: You don’t have a way of actually getting readers.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有实际获取读者的方法。
- en: Instead, you need to educate yourself on what the levers are through courses,
    books, or internet content.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 而你，你需要通过课程、书籍或网络内容来教育自己，了解什么是杠杆。
- en: 'A much better place to start would be the classic social media growth formula:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 一个更好的开始方式是经典的社交媒体增长公式：
- en: 10-30 replies on larger accounts (because their audience is a traffic source
    that can click on your profile and follow you).
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在大型账户上回复10-30条评论（因为他们的受众是点击你的个人资料并关注你的流量来源）。
- en: 5-10 DMs a day using the non-needy networking process (so you have friends that
    can share your content, you need eyes)
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每天使用非需求型网络过程发送5-10条私信（这样你就有可以分享你内容的朋友，你需要有人关注）
- en: Practicing writing short-form content that can be spread to new readers.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 练习撰写可以传播给新读者的短篇内容。
- en: Once you have that down, you are building traffic.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你掌握了这个，你就是在建立流量。
- en: Then, you need a minimum viable offer you can iterate on. That way, you can
    monetize the traffic.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你需要一个可以迭代的最低可行产品。这样，你就可以将流量货币化。
- en: As your processes become more efficient they will demand less time and you can
    start to play around with your deep work schedule.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你的流程变得更加高效，它们将需要更少的时间，你就可以开始调整你的深度工作日程。
- en: Priority 2 – High Leverage Creative Work
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优先级 2 – 高效创意工作
- en: In the new economy, your ideas are what set you apart.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在新经济中，你的想法是你与众不同的地方。
- en: You must distribute them on a daily basis if you want to generate attention,
    income, and authority.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想吸引注意、收入和权威，你必须每天分发它们。
- en: If you outsource you’re idea generation, you impose a wall on your growth. Content
    agencies can generate traffic, but again, you all know my philosophy on this.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你外包了你的想法生成，你将对你的增长设置障碍。内容机构可以生成流量，但再次，你们都知道我对这个问题的看法。
- en: During my second time block, I prioritize my newsletter writing.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的第二个时间段，我优先处理我的通讯稿写作。
- en: Long-form writing is like fleshing out the depth of one massive idea.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 长篇写作就像 fleshing out 一个巨大想法的深度。
- en: Think of it as deconstructing a big idea, writing it out, and reconstructing
    it into a new one.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，这是在分解一个大的想法，写出来，然后将其重新组合成一个新的想法。
- en: '*Creativity is alchemy but with ideas.*'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '*创意是炼金术，但与想法相结合*。'
- en: For those just starting out, you are better off focusing your efforts on writing
    content for social media platforms to generate traffic.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 对于刚开始的人来说，你最好专注于为社交媒体平台撰写内容以生成流量。
- en: But I wouldn’t put off writing long-form content, because it will determine
    the future quality of your ideas, and hence the future quality of your brand.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 但我不会推迟撰写长篇内容，因为它将决定你未来想法的质量，从而决定你未来品牌的质量。
- en: Priority 3 – Meaningful & Spillover Tasks
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优先级 3 – 有意义且溢出任务
- en: My third time block is when I write social media content or record videos.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我的第三个时间段是写社交媒体内容或录制视频的时候。
- en: Sometimes, I have enough content from random ideas that come to mind that I
    pop into [TweetHunter](https://thedankoe.com/get/tweethunter) (where all of my
    content starts that I cross-post to all platforms).
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，我脑海中涌现的随机想法足够多，我会把它们发到[TweetHunter](https://thedankoe.com/get/tweethunter)（所有内容都是从那里开始，然后我将其转发到所有平台）。
- en: In that case, I try to catch up on other work, or I’ll check in on other ventures
    that I’m working on (like the idea capture software I’m building).
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在那种情况下，我会尽力赶上其他工作，或者检查我正在从事的其他项目（比如我正在构建的想法捕捉软件）。
- en: In short, this time block should be for the meaningful tasks that you don’t
    plan to outsource.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，这个时间段应该是用于那些你不想外包的有意义任务。
- en: And I would recommend that you *never* outsource your idea development.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 我还会建议你*永远*不要外包你的想法开发。
- en: 'I don’t think I will ever outsource:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为我永远不会外包：
- en: My newsletter writing (which turns into a YouTube video)
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我的通讯写作（这会变成YouTube视频）
- en: My tweet writing (which turns into Instagram, LinkedIn, reels scripts, etc).
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我的推文写作（这会变成Instagram、LinkedIn、Reels脚本等）。
- en: That’s really it, those are my fundamental levers.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 就这些了，这些都是我的基本杠杆。
- en: Priority 4 – Maintenance Tasks
  id: totrans-98
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优先级4 – 维护任务
- en: In my case, it’s around 9:30-10am at this point.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 在我这里，现在是早上9:30到10点左右。
- en: I’ve knocked out all of the work that keeps my business healthy and growing.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经完成了所有维持我的业务健康和增长的工作。
- en: Now, I focus on tasks that will maintain my products and services, like checking
    in to Modern Mastery, responding to messages, and checking email.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我专注于维护我的产品和服务的任务，比如检查Modern Mastery，回复消息和查看电子邮件。
- en: I leave this for the end of my work sessions because even one message can throw
    your entire deep work session off.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 我把这件事留到工作会的最后做，因为即使是一条消息也可能让你的整个深度工作会受到影响。
- en: Absolute focus allows you to get 8 hours of work done in 2, and you don’t realize
    this until you do it.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 绝对专注让你能在2小时内完成8小时的工作，直到你这么做，你才会意识到这一点。
- en: This newsletter is about 1000 words shorter than my others, but I feel like
    I got the point across.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 这份通讯比我的其他通讯短了大约1000字，但我感觉我已经把要点传达清楚了。
- en: Test things out, experiment to see what works for you, and enjoy the rest of
    your day.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试各种方法，实验看看哪些对你有效，然后享受你剩余的一天。
- en: – Dan
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
