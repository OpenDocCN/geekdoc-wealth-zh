- en: The Matrix Is Real (How To Break Free With Your Mind)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 矩阵是真实的（如何用你的心灵突破）
- en: 原文：[https://thedankoe.com/letters/become-a-free-thinker-if-you-want-creative-business-success/](https://thedankoe.com/letters/become-a-free-thinker-if-you-want-creative-business-success/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/become-a-free-thinker-if-you-want-creative-business-success/](https://thedankoe.com/letters/become-a-free-thinker-if-you-want-creative-business-success/)
- en: I’ve always had the goal of being a deep, original, and free thinker.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直有一个目标，成为一个深刻、原创和自由思考者。
- en: It hasn’t always been a “conscious” goal though.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 但这并不总是“有意识”的目标。
- en: As the process of self-actualization goes, I started with a shallow and unconscious
    goal.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 随着自我实现的过程，我从一个浅层和无意识的目标开始。
- en: I wanted to be a deep thinker so others thought I was smart, intellectual, and
    deep.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我想成为一个深入思考者，这样别人就会认为我聪明、有思想、深刻。
- en: I didn’t *really* care about being deep, I cared about being accepted by others.
    Being different, but in a non-mediocre way.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我并不真的在乎是否深入，我更在乎被他人接受。与众不同，但不是平庸的方式。
- en: With time, and after burning through that karma, I realized that becoming a
    deep thinker is more than that.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，在耗尽那 karma 之后，我意识到成为一个深入思考者不仅仅是那样。
- en: It is a *requirement* for winning in the game of life and business.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这是赢得生活和商业游戏的一个**要求**。
- en: It is the only way to escape replacement in an era where anyone can learn anything.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这是逃避一个时代中任何人都可能学习任何事物的替代的唯一方式。
- en: It is how you create, build, and construct a life that allows you to do whatever
    you want (while others object to their limiting beliefs, rather than just building
    a solution to them).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何创造、构建和构建一种生活，让你能够做任何你想做的事情（而其他人则反对他们的限制性信念，而不是仅仅构建一个解决方案）。
- en: 'Before we can understand what deep thinking is, we need to understand the opposite:
    shallow thinking.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们能够理解什么是深入思考之前，我们需要理解它的对立面：浅层思考。
- en: Shallow thinking is taking what you see as real, or never seeing beyond the
    surface of your perceptions.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 浅层思考是接受你所看到的是真实的，或者从未超越你感知的表面。
- en: This doesn’t make sense, because every individual is limited by their unique
    perceptions, which are dictated by their environment, experience, and state of
    consciousness. An animal that has a better sense of hearing, for example, can
    listen in to frequencies (that exist) that we will never directly experience or
    comprehend.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这没有意义，因为每个人都被他们独特的感知所限制，这些感知由他们的环境、经验和意识状态所决定。例如，一个听力更好的动物可以听到（存在）我们永远不会直接体验或理解的声音频率。
- en: Like reading a post on social media about the best diet or business model, not
    experimenting with an open mind, and going on to yell that it is the best diet
    or business model for everyone without exception.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 就像在社交媒体上阅读关于最佳饮食或商业模式的帖子，不带着开放的心态进行实验，然后大声宣称这是对所有人来说都是最佳饮食或商业模式。
- en: '**Deep thinking is:**'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**深入思考是**：'
- en: Becoming aware of the limits your mind creates.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意识到你心灵创造的界限。
- en: Holding everything you perceive in the realm of possibility until filtered with
    direct experience.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在直接经验过滤之前，将你所感知的一切都视为可能。
- en: Questioning everything, especially the thoughts, beliefs, and biases that you
    *think* are absolutely true without exception.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 质疑一切，尤其是那些你认为绝对真实、无例外之处的思想、信念和偏见。
- en: In short, **closed-mindedness** is the antagonist of deep thinking.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，**思想狭隘**是深入思考的对手。
- en: But what exactly is closed-mindedness?
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 但什么是思想狭隘？
- en: It’s accepting the matrix as your reality.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这是接受矩阵作为你的现实。
- en: The Matrix Is Not A Fantasy
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 矩阵不是幻想
- en: '*To be conscious is a struggle between novelty and habit.*'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '*意识是一种新颖与习惯之间的斗争。*'
- en: When most people talk about “the matrix” they think about the classic movie
    where the main character is offered the “red” pill or the “blue” pill.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 当大多数人谈论“矩阵”时，他们会想到那部经典电影，主角被提供了“红色药丸”或“蓝色药丸”。
- en: I’m not talking about this matrix, but your choice to take the “red” pill to
    create a glitch in this matrix is more than possible.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是在谈论这个矩阵，而是你选择吃“红色药丸”来在这个矩阵中制造故障的可能性。
- en: You see, all understanding is metaphorical.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 你看，所有的理解都是隐喻的。
- en: We get hints of truth from watching this movie. We can comprehend the essence
    behind what it’s saying, but the notion of the “matrix” is a **symbol**. It is
    a metaphor pointing at some form of truth.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 通过观看这部电影，我们得到了真理的启示。我们可以理解它所表达的本质，但“矩阵”的概念是一个**象征**。它是一个指向某种形式的真理的隐喻。
- en: '**Symbol** (noun) – *a thing that represents or stands for something else,
    especially a material object representing something abstract**.*'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**符号**（名词）——*代表或代表其他事物的东西，尤其是代表抽象事物的物质对象**。'
- en: Since the beginning of time, before we *invented* language, we interpreted reality
    by recognizing patterns and relationships.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 从时间的开始，在我们*发明*语言之前，我们通过识别模式和关系来解释现实。
- en: We used symbols to represent these phenomena or the experience that came from
    those aspects of reality.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我们用符号来代表这些现象或来自现实这些方面的体验。
- en: Now, what you have to understand is that a symbol is a *representation*. It
    is not what that thing *is*.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你必须理解的是，一个符号是一种*表示*。它不是那个东西*本身*。
- en: With time, groups of people began to share and attach meaning to these symbols.
    We had a way to communicate. But, people had different perspectives of these symbols
    based on their environment and prior experience, meaning that they have no absolute
    meaning. There are minor nuances to the meaning of any one thing that differs
    from individual to individual.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，人们开始共享并赋予这些符号意义。我们有了沟通的方式。但是，由于环境和先前经验的不同，人们对这些符号有不同的看法，这意味着它们没有绝对的意义。任何事物的意义都有细微的差别，这些差别因人而异。
- en: '**Crucial note:** these symbols are mental interpretations. They are mental
    constructions, a layer over reality. A limit that our minds’ imposed on the infinite.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**重要提示**：这些符号是心理解释。它们是心理构建，是现实之上的一层。是我们心灵对无限强加的限制。'
- en: With time, these mental constructions became more advanced. We’ve constructed
    language, culture, society, the school system, government, and a load of other
    expectations, assumptions, and predictions (called “beliefs”) for what life has
    been and should be.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，这些心理构建变得更加复杂。我们构建了语言、文化、社会、学校体系、政府，以及一大堆关于生活曾经是什么以及应该是什么的期望、假设和预测（称为“信念”）。
- en: So, think of the matrix as a web of expectations that have been conditioned
    into our minds, so much so that we do not question them. Every-thing in the room
    you are in right now has a meaning that you projected on it without any conscious
    effort. Even the things that aren’t in your room – your entire worldview contains
    the meaning of certain aspects of reality that you have or may come into contact
    with due to the spread of information.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，将矩阵想象成一种已经条件反射到我们心中的期望网络，如此之深以至于我们不会质疑它们。你现在所在的房间里的一切都有意义，是你不费任何意识地将意义投射上去的。即使是那些不在你房间里的东西——你的整个世界观包含了由于信息传播而可能接触到的现实某些方面的意义。
- en: Cycles, Rhythms, Patterns, & Normalization
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 周期、节奏、模式和规范化
- en: You can live and die inside these intellectual structures if you choose to.
    But people of curiosity… usually find themselves unsatisfied with the conventional
    answers. – Terrence McKenna
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你选择的话，你可以活在这些智力结构中，也可以死在其中。但好奇的人……通常会对传统的答案感到不满意。——特伦斯·麦肯纳
- en: Not only have we created a web of expectations, but these expectations become
    engrained in our psyche through repetition – like how you get better at a lift
    in the gym by performing repetitions. When we do this enough, we call it “conditioning.”
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 不仅我们创造了一个期望网络，而且这些期望通过重复——就像你在健身房通过重复练习提高举重能力一样——在我们的心理中根深蒂固。当我们这样做足够多的时候，我们称之为“条件反射”。
- en: I could go on and on about how robotic we are as species. We have much less
    “self-control” than we think.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以继续谈论我们作为物种是多么的机械。我们的“自我控制”比我们想象的要少得多。
- en: As an example, think about the cycles in your personal life.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，想想你个人生活中的周期。
- en: You have a sleep cycle, an ingestion cycle (eating), a work cycle, an excretion
    cycle, and sex cycle (even if you don’t have a partner, you dirty dog). It’s important
    to note that these are only a portion of the habits we have in our personal life.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 你有睡眠周期、摄入周期（进食）、工作周期、排泄周期，以及性周期（即使你没有伴侣，你也是个脏家伙）。重要的是要注意，这些只是我们个人生活中习惯的一部分。
- en: These personal cycles can vary per the individual, like how bodybuilders go
    through bulking and cutting “seasons.”
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这些个人周期因人而异，就像健美运动员经历增肌和减脂“季节”一样。
- en: Even more, there are business cycles. Sometimes your content does well, sometimes
    it doesn’t. You’ll have high months and low months. It’s inevitable. The only
    thing you can do is be mindful that you are in one of those low periods (while
    preparing for a high).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 更重要的是，还有商业周期。有时你的内容做得很好，有时则不然。你会有好月和坏月。这是不可避免的。你能做的唯一一件事是意识到你正处于一个低潮期（同时为高潮做准备）。
- en: Speaking of seasons, the world, universe, and cosmos as a whole seem to go through
    cycles that impact human behavior from the top down. Cosmic > worldly > cultural
    > societal > social > personal. All have cycles. This even reflects in politics
    or government.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 说到季节，整个世界、宇宙和宇宙似乎都在经历周期，这些周期从上到下影响着人类的行为。宇宙 > 世界 > 文化 > 社会 > 社会 > 个人。所有都有周期。这甚至反映在政治或政府中。
- en: Like how you “mirror” someone else’s body in a *social* situation, or celebrate
    Halloween as a *cultural* event, or get especially emotional when *political*
    elections come up.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 就像你在*社交*场合中“镜像”他人的身体，或者庆祝万圣节作为一个*文化*事件，或者当*政治*选举来临时特别情绪化。
- en: Everything we’ve discussed in this chapter is something for you to contemplate
    and deconstruct.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 本章中我们讨论的每一件事都是你需要思考和解构的。
- en: This illusory “matrix” of expectations for what is, was, and should be are chaining
    you to a life of limited potential.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这种对现实、过去和应该是什么的虚幻“矩阵”期望，正将你束缚在有限潜能的生活中。
- en: The Matrix is a web of thoughts, beliefs, biases, expectations, and assumptions
    that create your worldview. Knowing is second order, being is first order. Something
    has to come into *being* before we can add a mental layer of *knowing* on top
    of it.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵是一张由思想、信仰、偏见、期望和假设构成的网，它创造了你的世界观。知识是第二位的，存在是第一位的。在我们能够在它之上添加一层知识的心理层之前，必须先让某物进入*存在*。
- en: The Matrix is what you think you know.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵是你认为你知道的东西。
- en: If you can’t “be” it, you can only “know” it. That is, you can only register
    a symbol of that being in your mind. An image, idea, or thought that we project
    meaning on. A representation, not what it is.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不能“成为”它，你只能“知道”它。也就是说，你只能在你的心中注册那个存在的符号。一个我们赋予意义的图像、想法或思想。一种表现，而不是它本身。
- en: Breaking away from your robotic nature is how you escape the matrix. Because
    if you want to become a deep thinker, and allow that to transfer into your content,
    business, and life as a whole – you don’t want to think within the matrix. That
    would be thinking the same thoughts as everyone else.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 脱离你的机器人本质是你逃离矩阵的方式。因为如果你想要成为一个深刻的思考者，并让这种思考转移到你的内容、商业和生活的各个方面——你不想在矩阵中思考。那将是与所有人思考相同的思想。
- en: What will you find as you explore the mental constructions that compose your
    sense of self?
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 当你探索构成你自我感觉的心理结构时，你会找到什么？
- en: The mystical, profound, and unknown – waiting to be explored.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 神秘的、深刻的和未知的——等待被探索。
- en: This is why I urge creators to study spirituality.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是为什么我敦促创作者研究灵性。
- en: Once you awaken to the fact that there is an infinite intelligence beneath our
    compulsive thoughts, you can consciously explore that intelligence. You can bring
    the essence of your findings to life in your writing, videos, and creations. This
    is the esoteric method of originality as a one-person business.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你意识到在我们强迫性的思想之下有一个无限智慧的事实，你就可以有意识地探索这个智慧。你可以在你的写作、视频和创作中将你发现的本质带入生活。这是作为一个个人企业的原创性的神秘方法。
- en: Exploring The Unknown (Experience Exposure)
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 探索未知（经验暴露）
- en: Your edge is where you stop short, or where you compromise your fullest gift,
    and, instead, cater to your fears. – David Deida
  id: totrans-57
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你的优势在于你停止的地方，或者你妥协了你的全部天赋，取而代之的是迎合你的恐惧。 —— 大卫·迪达
- en: The human mind creates limits on the infinite potential of itself. In relation
    to deep thinking, we are all stuck in a surface-level bubble of thoughts that
    repeat themselves according to the cycles of life and web of expectations that
    come with it.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 人类心灵为自己无限的潜能设置了限制。与深度思考相关，我们所有人都在一个表面层的思想泡沫中停滞不前，这些思想根据生命和随之而来的期望周期重复。
- en: In order to reverse this effect, we have to create a glitch in the matrix by
    pushing the boundaries of what we know.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 为了逆转这种效果，我们必须通过推动我们所知的边界在矩阵中制造一个故障。
- en: <picture fetchpriority="high" decoding="async" class="wp-image-859">![](../Images/7058a4cb70550d0134d5040215a48426.png)</picture>
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-859">![](../Images/7058a4cb70550d0134d5040215a48426.png)</picture>
- en: We have to expose ourselves to deeper experiences, both tangible and intangible
    if we want to be deep, articulate, and clear thinkers in a world of distraction
    and noise.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们想要在充满分心和噪音的世界中成为深刻、清晰和有逻辑的思考者，我们必须让自己接触到更深层次的经验，无论是有形的还是无形的。
- en: Now, we don’t want to just hurl ourselves into the unknown.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们不想只是把自己投入到未知中。
- en: While that is a great tactic for the seasoned explorer that leads to a season
    of intense progress – like moving into a place that is 2x your rent to force yourself
    to make more money – we want to take it slow at the start.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这对经验丰富的探险家来说是一个很好的策略，可以带来一段快速进步的季节——比如搬到一个租金是你租金两倍的地方，强迫自己赚更多的钱——但我们希望在开始时放慢速度。
- en: Our goal is to get a bit uncomfortable, *puncture* the known with consistent
    effort, and let obsession pull us deeper when we make a novel discovery. To create
    a glitch in the Matrix and get a peak at infinity.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标是稍微感到不适，通过持续的努力**刺破**已知，当我们做出新的发现时，让痴迷将我们引向更深。在矩阵中制造一个故障，一瞥无限。
- en: Like when a passage from a book finally makes sense and opens your mind to an
    entirely new world (that we don’t want to get lost in).
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 就像当一本书中的一段话终于让你明白，并打开你的心扉，让你进入一个全新的世界（我们不想在其中迷失）。
- en: 'To reiterate:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调：
- en: The Known is the web of expectations that we mentally reside in. It is the comfortable
    home that our mind can resort to when its survival is threatened.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 已知是我们心理上居住的期望之网。这是当我们的生存受到威胁时，我们的心灵可以回归的舒适家园。
- en: The Unknown is the fabric of reality, the land of infinite potential. An interconnected
    playground for those that are brave enough to push deeper and deeper with time,
    practice, and mindfulness.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 未知是现实的织锦，无限潜力的土地。一个勇敢地愿意随着时间、练习和正念不断深入探索的人们的互联游乐场。
- en: If you can’t grasp this yet, that’s okay.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你现在还无法理解，那也没关系。
- en: The “construct aware” stage of ego development isn’t available to you until
    you’ve gone through years of conscious practice to reprogram your mind. However,
    your mind can peek into this level of awareness if the words are just right, that
    is what I’m trying to do here.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 自我发展的“构建意识”阶段在你经过多年的有意识练习，重新编程你的心灵之前是不开放的。然而，如果你的话语恰到好处，你的心灵可以窥视这个层次的意识，这正是我在这里试图做的。
- en: How To Break The Chains Of The Known
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何打破已知之锁链
- en: To understand the progression of diving into the unknown, we must understand
    the theory of *states* and *stages**.*
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解深入未知的过程，我们必须理解**状态**和**阶段**的理论。
- en: '**States**: a temporary state of consciousness that you can break into at anytime.
    Like taking a psychedelic, reading a quote that eases your worries, or feeling
    extra creative after you write a few words.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '**状态**：一种可以随时打破的暂时性意识状态。就像服用迷幻药、阅读缓解你担忧的引言，或者在写下几句话后感觉格外有创造力。'
- en: '**Stages**: a permanent stage of consciousness, like reaching a new level in
    a game where you have access to the powers you could only previously receive with
    a power up. Like a baseline level of happiness. This takes development over time,
    and does not eliminate regressing into lower *states* of consciousness, like being
    stuck in a rut.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**阶段**：一种永久性的意识阶段，就像在游戏中达到一个新的等级，你能够获得之前只能通过升级才能获得的权力。比如一个基本幸福水平。这需要时间的积累，并不会消除回归到更低**状态**的意识，比如陷入困境。'
- en: Our goal is to reach new *stages* of the unknown. To expose yourself to more
    experience, which leads to a deeper awareness of what is possible.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标是达到新的**阶段**的未知。让自己接触到更多的经验，这会导致对可能性的更深刻认识。
- en: If it helps, look at a “stage” as a new baseline that you reach in income, calmness,
    or any other area of your life that you can develop.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这有助于理解，可以把“阶段”看作是在收入、平静或其他任何你可以发展的生活领域中达到的新基准。
- en: As an example, a year and a half ago I hit my first $50K month in business.
    This was a temporary state, but my baseline monthly income had increased to $20K.
    This year, I’ve had two states where I’ve surpassed $100K in a month. My baseline
    “stage” has increased to $50K or so.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一年半前，我在商业上达到了第一个5万美元的月收入。这是一个暂时性的状态，但我的基准月收入已经增加到2万美元。今年，我有了两个月收入超过10万美元的状态。我的基准“阶段”已经增加到大约5万美元。
- en: If I wanted to maintain $100K per month, it wouldn’t be sustainable. I would
    be too far into the unknown for a prolonged period of time. I would get lossed,
    stressed, and overwhelmed to the point of diminishing returns.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想保持每月10万美元的收入，这是不可持续的。我会长时间地陷入未知之中。我会迷失方向，感到压力和过度劳累，以至于收益递减。
- en: However, there are times when intense growth makes sense. When you have absolute
    clarity that you can achieve a goal and need to create a stressful environment
    for yourself.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，有时强烈的成长是有意义的。当你有绝对的清晰，知道你可以实现一个目标，需要为自己创造一个有压力的环境时。
- en: Like when you drop everything and move across the country. It’s scary, but you
    know it will lead to the most growth you’ve experienced. Your income and lifestyle
    will have to match the stress that you’ve created in order to normalize it.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 就像当你放下一切，搬到另一个国家去。这很可怕，但你清楚这将带来你经历过的最大成长。你的收入和生活方式将不得不与你在其中创造的压力相匹配，以便使其正常化。
- en: Living at the edge of the known also applies to how you learn and execute.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在已知世界的边缘生活也同样适用于你如何学习和执行。
- en: In business, you wouldn’t copy a billion-dollar business’s advertising strategy
    if you haven’t made your first dollar.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业中，如果你还没有赚到第一美元，你就不会复制一个十亿美元企业的广告策略。
- en: There are levels, baselines that you need to reach for your awareness to expand
    to the point of understanding.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 有层次，有基准，你需要达到这些层次，才能让你的意识扩展到理解的程度。
- en: If you tried to copy their strategies, you would utterly fail because you don’t
    recognize that you don’t have the same brand awareness, product quality, advertising
    budget, or anything that would *make sense* for their business.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你试图复制他们的策略，你会彻底失败，因为你没有意识到你没有相同的品牌知名度、产品质量、广告预算或任何对他们业务有意义的因素。
- en: If you are lost, the answer is education.
  id: totrans-85
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你迷失了方向，答案是教育。
- en: ''
  id: totrans-86
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you are educated, the answer is action.
  id: totrans-87
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你受过教育，答案是行动。
- en: ''
  id: totrans-88
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you are acting, the answer is consistency.
  id: totrans-89
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你正在行动，答案是连贯性。
- en: ''
  id: totrans-90
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [March 29, 2022](https://twitter.com/thedankoe/status/1508796620569206784?ref_src=twsrc%5Etfw)
  id: totrans-91
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年3月29日](https://twitter.com/thedankoe/status/1508796620569206784?ref_src=twsrc%5Etfw)
- en: So, it only makes sense to match knowledge with execution.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，将知识与执行相匹配是唯一合理的。
- en: You want to *learn* from someone a few steps ahead of you while *they* still
    understand the level you are at. Then, you want to teach someone a few steps behind
    you so you solidify that knowledge in your head.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 你希望从比你多走几步的人那里学习，而他们仍然理解你所在的水平。然后，你想教给那些比你落后几步的人，这样你就可以在你的脑海中巩固这些知识。
- en: This is why I encourage everyone to create an educational product ASAP. [Modern
    Mastery](https://modernmastery.co/letter) has all of the products I’ve created
    since the start of my journey, because if I were to teach what I’m doing now,
    it wouldn’t help those that are just starting out.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么我鼓励每个人都尽快创建一个教育产品。[现代精通](https://modernmastery.co/letter)拥有我从旅程开始以来创建的所有产品，因为如果我现在教授我所做的事情，那将无法帮助那些刚开始的人。
- en: This is how you chase “good dopamine.”
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何追求“好的多巴胺”。
- en: '*Cheap dopamine comes from receiving novelty without struggle.*'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '*廉价的多巴胺来自于无需努力就获得的新奇感*。'
- en: '*Good dopamine comes from creating novelty through struggle.*'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '*好的多巴胺来自于通过努力创造新奇感*。'
- en: <picture decoding="async" class="wp-image-858">![](../Images/385c835d5a4518958bc9f20e9513cb16.png)</picture>
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-858">![](../Images/385c835d5a4518958bc9f20e9513cb16.png)</picture>
- en: Meaning, you have to set your own goals, educate yourself on how to reach them,
    and execute at the edge of your fear.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 也就是说，你必须设定自己的目标，学习如何实现它们，并在恐惧的边缘执行。
- en: We could consider cheap dopamine as a cycle in itself. Another habitual cycle
    of checking your phone and frying the receptors in your brain, which prevents
    you from thinking deep about the relevance of your intrinsic desires. This leads
    to finding solace in the familiar mental home you’ve always resided in – and never
    executing on the better future that your soul yearns for.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将廉价的多巴胺视为一个循环本身。另一个习惯性的循环是检查你的手机，并在你的大脑中烧毁受体，这阻止了你深入思考你内在欲望的相关性。这导致你在你一直居住的熟悉的精神家园中寻求慰藉——并且永远不执行你灵魂渴望的更美好的未来。
- en: 'While there are many methods to “breaking out of your comfort zone,” these
    are the ones that anyone can do at any time. If you want to travel the world,
    try psychedelics, or go homeless for a day – be my guest, get creative. But, these
    should become a consistent practice in your life:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然有许多方法可以“跳出你的舒适区”，但这些是任何人都可以在任何时候做的。如果你想环游世界，尝试迷幻药，或者一天无家可归——请随意，发挥创意。但，这些应该成为你生活中的一种持续实践：
- en: '**1) Reading**'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 阅读**'
- en: When you read, don’t stop at the first hint of struggle.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 当你阅读时，不要在遇到第一个难题时就停下来。
- en: If you can’t comprehend it, but want to, keep reading. Let your subconscious
    marinate in the ideas and let time make sense of the ideas.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你无法理解，但想理解，继续阅读。让你的潜意识在想法中浸泡，让时间让这些想法变得有意义。
- en: I have had multiple times in my life where I didn’t understand a book, just
    to come back to it a year later to understand all of it. When I read it, it had
    an entirely new meaning for the *stage* of life I was in.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 我在生命中多次遇到不理解一本书的情况，结果一年后再次阅读时，我理解了所有的内容。当我阅读它时，它对我来说有了全新的意义，*处于*我那时的生活阶段。
- en: Now, when you catch a whiff of something exciting, a peak into the unknown,
    pursue it full force. Notice the excitement, write down your discovery, and start
    researching online to find out more.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，当你闻到一些令人兴奋的东西，对未知的一瞥时，全力以赴地追求它。注意兴奋感，写下你的发现，并开始在线研究以了解更多信息。
- en: '**2) Writing**'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 写作**'
- en: Every writer struggles with writer’s block.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 每个作家都会遇到写作障碍。
- en: 90% of them view this as a bad thing, when it is a sign that they are on the
    right path.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 他们中有90%的人认为这是一件坏事，而实际上这是一个他们正在正确道路上的迹象。
- en: When you struggle to articulate your thoughts, your mind is primed to lock that
    articulation pattern in your mind – *if you stick it out**.*
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 当你努力表达自己的思想时，你的大脑已经准备好将这种表达模式锁定在你的思维中——*如果你坚持下去**。
- en: What do you do when you struggle with creative aspects of work?
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在工作中遇到创造性方面的问题时，你会怎么做？
- en: Like Steve Jobs, Tarantino, or even the ancient greeks… you surrender.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 就像史蒂夫·乔布斯、塔伦蒂诺，甚至是古希腊人……你屈服了。
- en: You do nothing related to that aspect of your work.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 你与工作这方面的任何内容都没有关系。
- en: Go on a walk, lay by the pool, go out with friends, go on a hike… do anything
    that will activate the Default Mode Network in your brain. That’s when your mind
    goes to work to piece together the ideas in your subconscious mind.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 去散步，躺在游泳池边，和朋友出去，去远足……做任何能激活你大脑中默认模式网络的事情。那时，你的大脑会开始工作，将你潜意识中的想法拼凑起来。
- en: Like clockwork, the answer will pop into your conscious mind. Have your notes
    ready 😉
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 就像时钟一样，答案会突然出现在你的意识中。准备好你的笔记吧 😉
- en: This is what many know as the “aha!” moment.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是许多人所说的“啊哈！”时刻。
- en: As a creator, this is what you are trying to create for your readers. So if
    you experience this moment, share it. Someone will benefit.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 作为创作者，这就是你试图为你的读者创造的东西。所以如果你经历了这个时刻，分享它。有人会从中受益。
- en: If you want to learn how to write (in a way that builds a business, income,
    and leverage for a future going digital) check out [The 2 Hour Writer](https://2hourwriter.com)
    to prevent yourself from being automated out.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想学习如何写作（以建立业务、收入和为数字化未来提供杠杆的方式），请查看[《2小时作家》](https://2hourwriter.com)，以防止自己被自动化。
- en: Per the Feynman Technique, teaching what you learn blows every other method
    of learning out of the water. It’s how you retain the information you consume.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 根据费曼技巧，教授你所学的知识会将其他所有学习方法都抛诸脑后。这是你保留所吸收信息的方式。
- en: '**3) Teaching**'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 教学**'
- en: Our goal is to become a deep, original, and free thinker so it can spill into
    the impact we make on the world through business.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标是成为一个深刻、原创和自由的思想家，这样它就可以通过商业对世界产生影响。
- en: This implies that you will have to educate your readers. You will have to become
    a teacher and distill your findings in a way that makes sense. [You will have
    to become a value creator.](https://thedankoe.com/the-rise-of-the-value-creator-a-new-career-path/)
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着你必须教育你的读者。你必须成为一个教师，并以一种有意义的way提炼你的发现。[你必须成为一个价值创造者。](https://thedankoe.com/the-rise-of-the-value-creator-a-new-career-path/)
- en: 'Here’s the Feynman Technique in a nutshell to start your teaching journey (with
    my little twist for a creator business):'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是费曼技巧的精髓，以开始你的教学之旅（加上我为创作者业务添加的小变化）：
- en: '**1) Choose and study a concept.**'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 选择并研究一个概念。**'
- en: Choose the interest that you could see yourself pursuing for the rest of your
    life.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 选择你能够看到自己终身追求的兴趣。
- en: '**2) Teach it to a child.**'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 教给一个孩子。**'
- en: Many writers tell you to write at a 4th grade level… don’t do that, instead,
    explain it to a 4 year old with metaphors and other methods that will *make sense*
    to them, therefore make sense to more people.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 许多作家建议你用四年级的水平写作……不要这样做，相反，用比喻和其他对他们来说有意义的*方法*向一个四岁的孩子解释，这样就能让更多的人理解。
- en: '**3) Learn more, fill in knowledge gaps, and simplify further.**'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 学习更多，填补知识空白，并进一步简化。**'
- en: Make an effort to study all perspectives of the topic. Seek to prove yourself
    wrong and double down on the fundamentals. If you are a carnivore, study veganism
    with an open mind… or live in the matrix you’ve put yourself in and get uncontrollably
    angry and reactive toward them.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 努力研究该主题的所有观点。试图证明自己是错的，并加倍重视基础知识。如果你是食肉动物，以开放的心态研究素食主义……或者生活在你自己构建的矩阵中，对他们愤怒且反应过度。
- en: '**4) The Builder’s Mentality**'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 建造者的心态**'
- en: Since I can remember, I’ve always had a side project to build. Whether it be
    my mind, body, or business.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 从我能记事起，我总是有一个构建的副项目。无论是我的思想、身体还是事业。
- en: As a teenager, I got obsessed with lifting. I set an intention to build my body
    and allowed my daily actions to reflect my pursuit of that goal. I broke out of
    my known routine, studied how to build muscle, and experimented with different
    diets and training styles.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名青少年，我沉迷于举重。我设定了打造自己身体的意图，并让我的日常行动反映出我对这个目标的追求。我打破了已知常规，研究了如何增肌，并尝试了不同的饮食和训练方式。
- en: 'A builder:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 一个建造者：
- en: Creates novelty through exploring their interests. This demands you to be conscious
    of and remove distractions from your life.
  id: totrans-134
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过探索他们的兴趣来创造新颖之处。这要求你意识到并从生活中消除干扰。
- en: Leans into their findings by creating a goal in their mind. This almost happens
    naturally, but you can write it out to solidify it.
  id: totrans-135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在心中设定一个目标，以此深入他们的发现。这几乎自然而然地发生，但你可以将其写下来以巩固它。
- en: Treats their goal as a project. Meaning it is a consistent work in progress,
    and will have to be maintained for life once “completed.”
  id: totrans-136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将他们的目标视为一个项目。这意味着它是一个持续进行中的工作，一旦“完成”，将需要终身维护。
- en: They know they will pick up excess “fat,” and will have to trim it according
    to life’s cycles and rhythms.
  id: totrans-137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 他们知道他们会积累额外的“脂肪”，并将根据生活的周期和节奏进行削减。
- en: This applies to every aspect of your life. Your mind, body, business, and relationships
    are projects that need to be actively constructed, maintained, and rebuilt at
    times. That way, you don’t succumb to the structure of the existing matrix.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 这适用于你生活的各个方面。你的思想、身体、事业和关系都是需要积极构建、维护并在必要时重建的项目。这样，你就不至于屈服于现有矩阵的结构。
- en: 'To recap:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 总结：
- en: The key to being a deep thinker it to not let your mind-set on what it already
    thinks it knows.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 成为深度思考者的关键是不要让你的思维停留在你已经知道的事情上。
- en: If you want to separate yourself from the sea of the same, then you have to
    explore the unknown by breaking the conditioned mental patterns in your life.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要从众多相似者中脱颖而出，那么你必须通过打破生活中固有的思维模式来探索未知。
- en: All of this requires conscious practice and awareness. This isn’t an immediate
    hack that will change your life. This letter is written for awareness.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都需要有意识的练习和意识。这不是一个立即改变你生活的技巧。这封信是为了提高意识而写的。
- en: Now that you are aware, you have something to improve.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你意识到了，你有一些可以改进的地方。
