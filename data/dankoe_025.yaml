  zh: '[在这里收听。](https://open.spotify.com/episode/0HLHWwyXRJtLYFFYH6GfdE?si=d116a17ed5c7460c)'
- en: A YouTube video went live about why people can’t make money doing their own
    thing.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 一段关于为什么人们不能通过自己的事情赚钱的YouTube视频已经发布。
- en: '[Watch here.](https://youtu.be/ijU4OTfzu8Y)'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '[在这里观看。](https://youtu.be/ijU4OTfzu8Y)'
