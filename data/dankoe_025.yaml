- en: Why Fear Of Failure Is Ruining Your Life
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么害怕失败正在毁掉你的生活
- en: 原文：[https://thedankoe.com/letters/why-fear-of-failure-is-ruining-your-life/](https://thedankoe.com/letters/why-fear-of-failure-is-ruining-your-life/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/why-fear-of-failure-is-ruining-your-life/](https://thedankoe.com/letters/why-fear-of-failure-is-ruining-your-life/)
- en: Learning is the foundation of the human experience.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 学习是人类经验的基础。
- en: But, 99% of people do it wrong.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，99%的人做错了。
- en: Not because they don’t know how to learn, but because they have forgotten how
    to learn.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 不是因为他们不知道如何学习，而是因为他们已经忘记了如何学习。
- en: We are talking about true learning here.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这里谈论的是真正的学习。
- en: For the sake of this letter, things like memorization, knowledge hoarding, and
    parroting will not be considered learning.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 为了这封信，像记忆、知识囤积和鹦鹉学舌这样的行为将不被视为学习。
- en: Learning is a byproduct of *experience*.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 学习是经验的结果。
- en: The human experience contains more than just words.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 人类经验不仅仅包含文字。
- en: It is a spectrum of feelings, lights, sounds, tastes, and other distinctions
    that form a single *perspective*. Like a snapshot in time. A figment of present
    moment consciousness that passed in less than a millisecond.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 它是一系列的感觉、光线、声音、味道和其他区分，形成一个单一的*视角*。就像时间的一瞬间。是瞬息万变的当下意识的一个片段，在不到一毫秒的时间内就过去了。
- en: Words are a layer over reality.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 文字是现实之上的一层。
- en: Reality is composed of symbols, metaphors, and energy that we have labeled in
    order to understand what we hold in our attention as a human being.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 现实是由符号、隐喻和能量组成的，我们为了理解我们作为人类所关注的对象而对其进行了标记。
- en: Where does learning come into play?
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 学习在哪里发挥作用？
- en: Struggle.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 斗争。
- en: Failure.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 失败。
- en: The things that everyone shys away from, rather than embracing.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 人们都回避而不是接受的事情。
- en: Why do we shy away from it? Because we don’t understand what failure is. Why
    else would you be afraid of it? We don’t have the full picture, the full perspective.
    Which can only be found through failure itself. Do you see where I’m going with
    this?
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为什么回避它？因为我们不理解失败是什么。否则你为什么会害怕它？我们没有完整的画面，没有完整的视角。这只能通过失败本身来找到。你看到我在说什么了吗？
- en: Since learning demands failure, understand that this letter is written for the
    sake of awareness. You cannot act on what you are unaware of, and if this letter
    makes you aware of the importance of failure, my job is done. The rest is in your
    hands. I cannot fail for you.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 由于学习需要失败，请理解这封信是为了提高意识而写的。你不能对不知道的事情采取行动，如果这封信让你意识到失败的重要性，我的工作就完成了。其余的取决于你。我不能为你失败。
- en: Knowing that people hate what they don’t understand, failure is an automatic,
    unconscious, and pre-programmed “hate” for many people.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 知道人们讨厌他们不理解的东西，对许多人来说，失败是一种自动的、无意识的、预先编程的“讨厌”。
- en: <picture fetchpriority="high" decoding="async" class="wp-image-791">![](../Images/4521605559b0ba9de9e5b5e208ae77f8.png)</picture>
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-791">![](../Images/4521605559b0ba9de9e5b5e208ae77f8.png)</picture>
- en: '*The first step to true learning is changing your perception of failure.*'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '*真正的学习的第一步是改变你对失败的看法*。'
- en: That is, not judging, assuming, or expecting it not to be there. Failure is
    a low-frequency energy source. When tapped into with focus (bringing that energy
    into your conscious awareness), the associated feeling manifests in your being
    and you label that energy as “good” or “bad.”
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 即，不要评判、假设或期望它不存在。失败是一个低频能量源。当专注于挖掘（将这种能量带入你的意识中）时，相关的感受就会在你的身体中显现，你将这种能量标记为“好”或“坏”。
- en: Failure exists. Meaning, if you don’t fix your potentially programmed relationship
    with it, procrastination and lack of fulfillment will rule your life.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 失败是存在的。意味着，如果你不修复你与它的潜在编程关系，拖延和缺乏满足感将统治你的生活。
- en: Why do we have to fail, struggle, and embrace challenge to truly learn?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我们必须经历失败、斗争和接受挑战才能真正学习？
- en: Because when you are in a “bad” state of consciousness from struggle, your mind
    is primed to receive a lesson. It is open to receive a solution, internalize it,
    and lock that learning in for next time.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 因为当你处于从斗争中产生的“不好”的意识状态时，你的大脑就准备好接受教训。它是开放接受解决方案、内化它并将这种学习锁定以备下次使用的。
- en: Meaning, you have to directly experience the perspective that comes from struggle
    (resistance), to bring the opposing end (breakthrough) into existence.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 意味着，你必须直接体验来自斗争（阻力）的视角，以将对立面（突破）带入现实。
- en: That perspective is found at the bottom. The feelings associated with it are
    not something to shy away from.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这种观点在底部。与之相关的感受不是我们应该回避的东西。
- en: The Portfolio Of Failures
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 失败的档案
- en: <picture decoding="async" class="wp-image-781">![](../Images/27fad4918f1a8cf998f6bf2e184e364d.png)</picture>
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-781">![](../Images/27fad4918f1a8cf998f6bf2e184e364d.png)</picture>
- en: There seems to be a threshold of failures that every successful person goes
    through.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 每个成功的人似乎都要经历一个失败的阈值。
- en: That is, there is a set amount of failures that one must encounter when pursuing
    a specific goal before they learn what it actually takes to succeed.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 也就是说，在学会成功之前，一个人在追求特定目标时必须经历一定数量的失败。
- en: I personally failed at 7+ different business models before making my first $1000.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我个人在赚得第一笔1000美元之前，失败了7+种不同的商业模式。
- en: “Dan, would you go back and change anything if you could?”
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: “丹，如果你能回到过去，你会改变任何事情吗？”
- en: That’s always an interesting question to be asked, as it implies that you want
    the one “secret” to avoiding failure and remaining comfortable, when failure is
    the secret.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这总是一个有趣的问题，因为它暗示你想要避免失败并保持舒适的那个“秘密”，而失败本身就是秘密。
- en: Knowing what I know now, no. I wouldn’t go back and change anything. If I did,
    I would have to fail again, go through the cycle, and end up in the same exact
    place.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 现在回想起来，不会。我不会回去改变任何事情。如果我这样做，我就不得不再次失败，经历这个循环，最终回到同一个地方。
- en: If I didn’t fail at creating a design, I wouldn’t have studied methods for making
    the design better. Which lead to creating a digital art page on Instagram.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我没有在创造设计上失败，我就不会学习使设计更好的方法。这导致了在Instagram上创建数字艺术页面。
- en: If I didn’t fail at the digital art page, I wouldn’t have studied web design.
    [Which lead to multiple freelancing endeavors.](https://thedankoe.com/i-failed-at-7-online-business-models-and-turned-it-into-a-full-time-creative-income/)
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我没有在数字艺术页面上失败，我就不会学习网页设计。[这导致了多次自由职业的尝试。](https://thedankoe.com/i-failed-at-7-online-business-models-and-turned-it-into-a-full-time-creative-income/)
- en: If I didn’t fail at freelancing, I wouldn’t have studied branding, copywriting,
    and social media. Which lead to failed ecommerce brands.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我没有在自由职业上失败，我就不会去学习品牌、文案和社交媒体。这最终导致了失败的电商品牌。
- en: If I didn’t fail at ecommerce, I wouldn’t have gotten a web design job. Which
    lead to success in freelancing, pivoting to social media, and being consistent
    until now.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我没有在电商上失败，我就不会得到网页设计的工作。这导致了自由职业的成功，转向社交媒体，并一直保持一致至今。
- en: By the end of it, I had an entire arsenal of lessons refined through struggle
    to make anything I want to pursue work.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 到最后，我积累了一整套通过斗争精炼的教训，使我想要追求的任何事情都能成功。
- en: <picture decoding="async" class="wp-image-790">![](../Images/8a01891dbbcbc5eed63d9fa6c10052cb.png)</picture>
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-790">![](../Images/8a01891dbbcbc5eed63d9fa6c10052cb.png)</picture>
- en: This is a pattern that can be seen in any “self-made” success. Self-made meaning
    that they didn’t inherit the money. Go listen to an origin story podcast of any
    of your favorite people and they will tell you the same story. Failure is unavoidable,
    necessary, and the closest thing to “get rich quick” that you will find.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种在任何“白手起家”的成功中都可以看到的模式。白手起家意味着他们没有继承财富。去听听你最喜欢的任何人的起源故事播客，他们会告诉你同样的故事。失败是不可避免的，是必要的，也是你找到的“快速致富”的最近似物。
- en: Success, in any endeavor, is a process of investing in your portfolio of failures
    **until there is nothing else to fail at****.** That is, until your investments
    compound and you can afford to succeed.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何事业中，成功都是一个不断投资于你的失败作品集的过程，直到没有其他可以失败的地方。也就是说，直到你的投资累积起来，你才能负担得起成功。
- en: '**Mid Koe Letter Plug**: If you want to learn from my failures, readers can
    join [Modern Mastery for $5](https://modernmastery.co/letter). There are 180+
    strategies that you can test, fail, and build your portfolio of failures faster
    with.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**Mid Koe Letter Plug**：如果你想从我的失败中学习，读者可以加入[现代精通课程](https://modernmastery.co/letter)，只需支付$5。这里有180多种策略你可以测试、失败，并更快地建立你的失败作品集。'
- en: 'How To Fail Happily: The Intersection Of The Known & Unknown'
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何快乐地失败：已知与未知交汇之处
- en: Humans find meaning in stories.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 人类在故事中找到意义。
- en: Stories are how we make sense of the world.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过故事来理解世界。
- en: Without us knowing it, our unconscious mind will “fill in the blanks” of anything
    we perceive.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们不知道的情况下，我们的潜意识会“填补”我们感知到的一切的空白。
- en: When you approach a new person, why do you get anxious? Because your mind has
    already determined the outcome.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 当你接近一个新人时，为什么你会感到焦虑？因为你的大脑已经决定了结果。
- en: When you do one specific thing, like the same exercises in the gym for too long,
    why do you get bored? Because your mind already knows what to do.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 当你长时间做一件特定的事情，比如在健身房做同样的锻炼，为什么你会感到无聊？因为你的大脑已经知道该做什么。
- en: Life is a game containing an infinite number of games.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 生活是一场包含无限游戏的比赛。
- en: The games you choose to play will determine the results you get from winning
    those games.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 你选择玩的游戏将决定你从赢得这些游戏中获得的结果。
- en: What’s the catch?
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 有什么陷阱？
- en: Games imply a possibility to fail.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 游戏意味着有失败的可能性。
- en: Moreso, when you start playing a new game consistently, you are going to “fail”
    more often. You don’t go from level 1 to 100 by winning every single match.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 更重要的是，当你开始持续玩一款新游戏时，你将“失败”得更频繁。你不可能通过赢得每一场比赛就从1级升到100级。
- en: The masculine wants to feel the bliss of a life lived at the edge, and if he
    doesn’t have the balls to do it himself, he’ll watch it on TV, in sporting events
    and cop shows. — David Deida
  id: totrans-55
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 阳刚之性想要感受到生活在边缘的极乐，如果他不敢自己去做，他会在电视上、在体育赛事和警察剧中观看。 —— 大卫·迪达
- en: 'Games are exciting. They are structured stories that you actively play. This
    is how you find meaning in life: by becoming obsessed with the games that lead
    to fulfilling results.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 游戏是令人兴奋的。它们是有结构的、你积极参与的故事。这就是你如何在生活中找到意义：通过沉迷于那些导致满意结果的比赛。
- en: '*Regarding* *the quote, don’t get “the masculine” mixed up as male or female.
    Everyone has a masculine and feminine edge.* *It is a form of energy that displays
    different characteristics throughout reality, not only in humans**.*'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '*关于* *这句话，不要把“阳刚”和男性或女性混淆。每个人都有阳刚和阴柔的一面。* *这是一种能量，在现实的不同方面表现出不同的特征，而不仅仅是人类**.*'
- en: The point is that to pursue more, conquer, and the benefits that come from winning
    a battle is masculine.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 重点是，追求更多、征服以及从赢得战斗中获得的利益是阳刚之气的体现。
- en: 'Men and women alike, especially as women take on more masculine activities
    thanks to technology solving certain problems (and vice versa for men), everyone
    can:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 男人和女人一样，尤其是随着技术解决某些问题（反之亦然），女性承担更多阳刚活动，每个人都可以：
- en: Climb the corporate ladder
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 爬上企业阶梯
- en: Build businesses around their interests
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 围绕他们的兴趣建立企业
- en: Compete in challenging athletic competitions
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在具有挑战性的体育竞赛中竞争
- en: To think that a man can or should be 100% masculine, or that a woman can or
    should be 100% feminine is silly. Every person has a balance to be kept within
    themselves. A majority of men are tilted toward the masculine and vice versa for
    women.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 认为一个人可以是100%阳刚，或者认为女性应该是100%阴柔是愚蠢的。每个人都有一个需要在自身内保持的平衡。大多数男性倾向于阳刚，反之亦然。
- en: I’ll leave this topic for another day, but the world is blending together. Collapsing
    into oneness, some may predict. I don’t care what people identify as, I simply
    like to observe and piece things together (and not let it make me angry enough
    to base my identity around destroying those things).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我会把这个话题留到另一天，但世界正在融合在一起。有些人可能会预测它将融入一体。我不在乎人们如何自我认同，我只是喜欢观察并将事物拼凑在一起（而不是让它让我愤怒到以摧毁这些事物为基础来建立我的身份）。
- en: I thrive when building (m), but know when it’s time to let loose and celebrate
    (f). Order and chaos. Metaphorical, not literal.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 当我构建（m）时，我会感到充满活力，但我知道何时该放松并庆祝（f）。秩序与混乱。比喻的，不是字面的。
- en: When its hot, you cool down. When it’s cold, you warm up. Some people like being
    warm most of the time, some cold. When men have a big business win, they celebrate
    over a beer. Balance.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 当天气炎热时，你会感到凉爽。当天气寒冷时，你会感到温暖。有些人喜欢大部分时间都保持温暖，有些人则喜欢寒冷。当男性取得重大商业胜利时，他们会喝啤酒庆祝。平衡。
- en: The point being, to live a fulfilling life, the masculine balance in each individual
    needs to be kept by engaging in battle. That is, playing a game. There needs to
    be suspense. And even if you don’t identify as having a “masculine edge,” neglecting
    that aspect of your being is not wise.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 重点是，为了过上充实的生活，每个个体需要通过参与战斗来保持阳刚的平衡。也就是说，玩游戏。需要有悬念。即使你不认同自己有“阳刚的一面”，忽视你身上的这一方面也是不明智的。
- en: Yin yang.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 阴阳。
- en: When all a person’s relevant skills are needed to cope with the challenges of
    a situation, that person’s attention is completely absorbed by the activity. There
    is no excess psychic energy left over to process any information but what the
    activity offers. All the attention is concentrated on the relevant stimuli. —
    Mihaly Csikszentmihalyi
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当一个人的所有相关技能都用于应对某种情况下的挑战时，那个人的注意力就会完全被活动所吸收。没有剩余的心理能量来处理除了活动提供的信息之外的其他信息。所有的注意力都集中在相关的刺激上。
    —— 米哈伊·契克森米哈伊
- en: A battle takes place on a battlefield.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 战斗发生在战场上。
- en: A game is played with a certain set of rules.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 游戏是按照一定的规则进行的。
- en: Any real-life situation presents an *environment* with certain known and unknown
    variables.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 任何现实生活中的情况都呈现出一个带有某些已知和未知变量的*环境*。
- en: '*If you don’t know how to play the game, it won’t be fun.* ***You will get
    anxious.***'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果你不知道如何玩游戏，那就不会有趣。***你会感到焦虑。***'
- en: A noobie in the gym isn’t going to try to deadlift 400 pounds. He embraces the
    challenge of his current strength and is excited to progress over the coming months.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 健身房的初学者不会尝试举起400磅的杠铃。他接受自己当前力量的挑战，并期待在未来几个月内取得进步。
- en: '*If you are too good at the game, it also won’t be fun. **You will get bored.***'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果你在游戏中太擅长，那也不会有趣。**你会感到无聊。***'
- en: A grandmaster at chess may find enjoyment in the challenge that comes from teaching
    a beginner, but playing against one? **Boring**. The grandmaster’s skills must
    be tested for him to kick into flow. [For his attention to be immersed in the
    goal he is pursuing](https://thedankoe.com/why-you-always-feel-overwhelmed/).
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 国际象棋大师可能会从教初学者的挑战中找到乐趣，但与初学者对弈？**无聊**。大师的技能必须得到考验，以便他进入心流状态。[为了使他的注意力完全沉浸在他追求的目标中](https://thedankoe.com/why-you-always-feel-overwhelmed/)。
- en: <picture loading="lazy" decoding="async" class="wp-image-782">![](../Images/11fff48579ac0701a56dc27b6c0c69a2.png)</picture>
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-782">![](../Images/11fff48579ac0701a56dc27b6c0c69a2.png)</picture>
- en: '*Comfort is found in the known.*'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '*舒适存在于已知之中。*'
- en: '*Discomfort is found in the unknown.*'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '*未知中存在不适。*'
- en: '*Fulfillment is found at the edge.*'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '*满足感存在于边缘。*'
- en: <picture loading="lazy" decoding="async" class="wp-image-788">![](../Images/7bb7d3964a9908b2d7b65a2d8650d70d.png)</picture>
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-788">![](../Images/7bb7d3964a9908b2d7b65a2d8650d70d.png)</picture>
- en: I am sure this is a portion of what the ancients speak of when explaining “no
    mind” or “non-duality.”
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我相信这是古人解释“无念”或“非二”时提到的一部分。
- en: A state of consciousness that resembles what modern psychologists have coined
    as “flow.”
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 一种类似于现代心理学家所命名的“心流”的意识状态。
- en: What does this have to do with failure?
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这与失败有什么关系？
- en: You can enjoy failing more often by pursuing the right goal.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 通过追求正确的目标，你可以更频繁地享受失败。
- en: '*One that isn’t so far away that you get lost in the unknown, but one that
    isn’t so close that you get bored.*'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '*一种既不太遥远以至于你在未知中迷失，也不太接近以至于你感到无聊的东西。*'
- en: And at the same time, recognized for it’s value.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，也因其价值而受到认可。
- en: 'A question before we come to an end:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们结束之前的一个问题：
- en: Is your vision valuable enough to you?
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 你的愿景对你来说有价值吗？
- en: That is, have you *internalized, appreciated, and thought with depth* about
    how actualizing that vision will spill over into your life?
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 也就是说，你是否已经*内化、欣赏并深入思考*了实现这一愿景将如何渗透到你的生活中？
- en: Is financial freedom worth 10 years of *failure*? What’s the other option if
    not? Is THAT worth 10 years of struggle?
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 财务自由值得10年的*失败*吗？如果不这样做，另一个选择是什么？那是值得10年奋斗的吗？
- en: 'Repeat that sequence of questions. Swap “financial freedom” for anything good.
    Things that cannot be outsourced or given to you like:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 重复那个问题序列。将“财务自由”替换为任何好事。那些不能外包或给予你的事情，比如：
- en: Your physique and energy levels
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的体格和能量水平
- en: The brand you develop over your lifetime
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你一生中培养的品牌
- en: Mastering your craft and how you move in the world
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精通你的技艺以及你在世界上的行动方式
- en: Write it out. Contemplate your future on a walk. Let your vision become clear
    with *time.* It doesn’t come in an instant.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 写下来。在散步时思考你的未来。让你的愿景随着*时间*变得清晰。它不会瞬间出现。
- en: Sit with it.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 与其相处。
- en: '**You Don’t Need More Advice**'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '**你不需要更多的建议**'
- en: Asking for advice is outsourcing your ability to act and figure it out for yourself.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求建议是将你采取行动和自行解决问题的能力外包出去。
- en: (Asking for advice is not the same as getting specific information for what
    you are currently acting on, that’s called education, another thing that takes
    decades).
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: （寻求建议与获取你目前正在采取行动的具体信息不同，那被称为教育，这也是需要几十年才能掌握的事情）。
- en: Look back up at the graphic.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 重新看看那个图表。
- en: You already *know* what you need to be executing on.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经*知道*你需要执行什么。
- en: You need to push to the edge of the known, challenge yourself, get a taste of
    the unknown, and invest in your education about the things you truly don’t know
    (and when they are the most applicable).
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要挑战已知的边缘，挑战自己，尝尝未知的感觉，并投资于你对真正不知道的事情的教育（以及它们何时最适用）。
- en: '*“Should I start a business?”*'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '*“我应该创业吗？”*'
- en: '*“Should I go to the gym?”*'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '*“我应该去健身房吗？”*'
- en: '*“Should I ask that person on a date?”*'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '*“我应该向那个人表白吗？”*'
- en: If I told you “yes,” would you learn anything? What about if I told you “no?”
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我告诉你“是”，你会学到什么？如果我告诉你“不”，又会怎样？
- en: If you listened to either of thos, you wouldn’t find the answer in the unknown
    for yourself. You may waste 2-3 years because someone told you not to do something
    rather than trying it and figuring out for yourself.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你听了其中的任何一个，你不会在未知中找到自己的答案。你可能会浪费2-3年的时间，因为有人告诉你不要做某事，而不是自己去尝试并找出答案。
- en: Build, create, challenge yourself, try everything, and figure it out.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 建立起来，创造，挑战自己，尝试一切，并找出答案。
- en: That’s what humans do.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 那是人类所做的事情。
- en: – Dan Koe
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹·科
