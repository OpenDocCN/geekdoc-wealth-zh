- en: How I Remember Everything I Learn
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我是如何记住我所学的每一件事的
- en: 原文：[https://thedankoe.com/letters/how-i-remember-everything-i-learn/](https://thedankoe.com/letters/how-i-remember-everything-i-learn/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/how-i-remember-everything-i-learn/](https://thedankoe.com/letters/how-i-remember-everything-i-learn/)
- en: If you’re anything like me, you love studying deep concepts.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你和我一样，你喜欢研究深奥的概念。
- en: But, there’s a dissonance.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，存在一种不和谐。
- en: You feel like you could never be as deep, insightful, or impactful as your favorite
    authors, speakers, or even the people you follow on social media.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 你感觉你永远无法像你最喜欢的作者、演讲者，甚至你在社交媒体上关注的人那样深刻、有洞察力或具有影响力。
- en: As an 18 year old that got arrested for smoking pot in a college parking garage,
    I took a chance on reading The Power Of Now by Eckhart Tolle.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名因在大学停车场吸烟大麻而被逮捕的18岁年轻人，我冒险阅读了Eckhart Tolle的《当下的力量》。
- en: I read closely.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我仔细阅读。
- en: I practiced the meditations.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我练习了冥想。
- en: I opened my mind to the possibility of the notion of God (that I had closed
    myself off to as a rebellious teen).
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我向上帝（作为一个叛逆的青少年，我已经关闭了自己对这个概念的可能性）的概念敞开心扉。
- en: That book changed everything for me. It eased my worries about getting a potential
    felony charge. It helped me calm down and be less reactive toward those I don’t
    agree with.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 那本书彻底改变了我。它缓解了我对可能被定罪为重罪的担忧。它帮助我冷静下来，对我不同意的人不那么容易反应。
- en: I didn’t remember everything from that book, but I learned 10x more than any
    other book I was *told*to read in school.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我并没有记住那本书的所有内容，但我比在学校被“告诉”读的其他任何书都多学到了10倍。
- en: Why did I remember so much of that book?
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我会记住那本书的那么多内容？
- en: '**1) Having An Intention**'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 有一个目标**'
- en: I am big on goal setting, whether you write it down or not.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常重视目标设定，无论你是否将其写下来。
- en: When I read the book, it was the perfect fit for my situation in life.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当我阅读这本书时，它完美地符合我生活中的情况。
- en: I was at one of the lowest points in my life. I either had to go to court for
    smoking the devil’s lettuce and possibly be convicted of a felony, or hand over
    $10,000 to take a diversion program and get called to randomly pee in a cup every
    week.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我处于人生中的最低谷。我要么因为吸食大麻而面临上法庭的可能，并可能被定罪为重罪，要么交出10,000美元参加替代项目，每周都要随机尿检。
- en: As a 19-year-old going into my second year of college, this freaked me out,
    clearly. I didn’t have the money and there was no way in hell I was going to tell
    my parents.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名即将进入大学二年级的19岁年轻人，这显然让我感到恐慌。我没有钱，而且我绝对不可能告诉我的父母。
- en: So, when The Power Of Now was recommended to me, I had the *intent* to apply
    its teachings to the phase of life I was in.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当《当下的力量》被推荐给我时，我有了将它的教诲应用于我当前生活阶段的**意图**。
- en: I was willing to do anything – and read with a radically open mind – to allow
    the teachings to transform my mental state.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我愿意做任何事情——以极其开放的心态阅读——以使教诲改变我的心态。
- en: '**2) Genuine Curiosity**'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 真正的好奇心**'
- en: I first heard about the book from Matt Ogus.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我第一次从Matt Ogus那里听说这本书。
- en: For those unaware of the golden era of fitness on YouTube, Matt Ogus is one
    of the original fitness vloggers.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些不了解YouTube健身黄金时代的黄金时代的人来说，Matt Ogus是原始健身博主之一。
- en: He was someone I aspired to be like. One of my first digital mentors (and he
    doesn’t even know it).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 他是我渴望成为的人。我的第一位数字导师（而且他甚至不知道这一点）。
- en: He had recommended the book many times in his videos, and I had a genuine curiosity
    to learn what this whole “spirituality” thing was about.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 他在视频中多次推荐这本书，我对了解整个“灵性”话题产生了真正的兴趣。
- en: I normally wouldn’t have read the book, but I trusted Matt, like I’m sure some
    of you trust me.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我通常不会读这本书，但我信任Matt，就像我确信你们中的一些人信任我一样。
- en: Curiosity forced me to read slow, meticulous, and aim to understand what was
    being said – especially in the areas that were difficult to understand.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 好奇心迫使我放慢阅读速度，细致入微，并努力理解所说的话——特别是在难以理解的部分。
- en: '**3) Reducing The Execution Gap**'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 缩小执行差距**'
- en: The greatest skill one can develop is decreasing the time between idea and execution.
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一个人可以培养的最伟大的技能是缩短想法与执行之间的时间。
- en: ''
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [May 5, 2022](https://twitter.com/thedankoe/status/1522144576768823296?ref_src=twsrc%5Etfw)
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — DAN KOE (@thedankoe) [2022年5月5日](https://twitter.com/thedankoe/status/1522144576768823296?ref_src=twsrc%5Etfw)
- en: Now, when I read the book, if there was something to practice, I would put the
    book down immediately.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，当我阅读这本书时，如果有需要练习的东西，我会立即放下书。
- en: I remember sitting outside on the porch with my coffee, trying to tap into all
    of my 5 senses, and doing multiple meditative practices.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我记得坐在门廊上，喝着咖啡，试图调动我的所有5个感官，并做多次冥想练习。
- en: Since the ideas were fresh in my head, it was easier to notice when something
    as intangible as meditation was working.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 由于想法在我脑海中很新鲜，所以更容易注意到像冥想这样无形的东西是否有效。
- en: Becoming aware that it was working solidified the idea in my head.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 意识到它在起作用，使这个想法在我脑海中更加稳固。
- en: I had *direct experience* to back the idea.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我有*直接经验*来支持这个想法。
- en: I took the words and grounded them in reality.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我将这些建议与现实联系起来。
- en: Having an intention, genuine curiosity, and reducing the execution gap is an
    incredible way to retain more of what you study – but we can do better than that.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个意图、真正的好奇心和减少执行差距是保留更多所学内容的绝佳方式——但我们可以做得更好。
- en: Over the years, here’s what I’ve discovered to 10X the power of whatever I choose
    to read, research, or study.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这些年，我发现了10倍提升我所选择阅读、研究或学习的能力的方法。
- en: What Are You Building?
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你在建造什么？
- en: '**Praxis** (noun) — *practice, as distinguished from theory.*'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**实践**（名词）——*实践，与理论相区别*。'
- en: The modern problem is abundance of information.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 现代问题在于信息的丰富。
- en: We love to horde theory, orthodoxy, and conceptual understanding of things without
    direct experience. Because that means we have to do something we perceive as uncomfortable,
    when we’ve been conditioned into perceived comfort.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们喜欢囤积理论、教条和事物的概念理解，而没有直接经验。因为这意味着我们必须做一些我们觉得不舒服的事情，而我们已经习惯了这种舒适感。
- en: Life doesn’t work that way, and nobody wants to be “that” guy in the Instagram
    comments. You know, the one that gives a book’s worth of lifting (or business)
    advice while looking like he’s never been within a 10-foot radius of a barbell
    (or customer).
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 生活不是这样运作的，没有人想成为Instagram评论中的“那个人”。你知道，那个给出一本书的举重（或商业）建议，同时看起来他从未在距离杠铃（或客户）10英尺范围内的人。
- en: What you’ll find in most domains is that true experts rarely need guidance.
    They used science, theory, and advice to get to the intermediate stage, but learn
    that intuition and direct experience trump all once you get into the advanced
    stage.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数领域，你会发现真正的专家很少需要指导。他们利用科学、理论和建议达到中级阶段，但一旦进入高级阶段，就会认识到直觉和直接经验胜过一切。
- en: Aside from posting, I don’t log on to social media anymore. I don’t mean to
    sound arrogant, but 99.99% of the advice doesn’t apply to me. All it does is make
    me second guess myself in my mental, physical, financial, and spiritual training.
    My praxis, which is backed by my personal philosophy, that was forged through
    experience.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 除了发帖，我不再登录社交媒体。我不想听起来傲慢，但99.99%的建议都不适用于我。它所做的只是让我在心理、身体、财务和精神训练上自我怀疑。我的实践，这是由我的个人哲学支持的，是通过经验锻造的。
- en: So, how do we balance practice with theory?
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们如何平衡实践与理论？
- en: '***By becoming a builder.***'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**通过成为建造者**。'
- en: That is, always having a project to build in alignment with the theory you are
    learning about.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 也就是说，总是有一个项目与你在学习的理论保持一致。
- en: When I was learning Photoshop, I started by watching endless tutorials on how
    to use the software. This only led to getting stuck in tutorial hell.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 当我学习Photoshop时，我开始观看关于如何使用软件的无数教程。这只会让我陷入教程地狱。
- en: When it came time to create something, I knew nothing.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 当是时候创造一些东西时，我一无所有。
- en: I had to supplement what I was building with specific tutorials.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我不得不通过特定的教程来补充我所构建的内容。
- en: Once I realized how much I retained from this style of learning — having a project
    to apply my knowledge to — I switched to this method exclusively.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我意识到我从这种学习风格中保留了多少——有一个项目来应用我的知识——我就完全转向了这种方法。
- en: If I wanted to learn how to build a website, I wouldn’t start learning first.
    I would pick a software to build the website on, then watch a long tutorial on
    how to build the website.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想学习如何建立网站，我不会先开始学习。我会选择一个软件来建立网站，然后观看一个关于如何建立网站的长时间教程。
- en: I wouldn’t follow the tutorial exactly, because I didn’t want to create the
    same thing. I took what I was learning and *struggled* to create my own website.
    The struggle primed my brain to “lock in” the lesson.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我不会完全遵循教程，因为我不想创造相同的东西。我学习了我在学习的内容，并*努力*创建自己的网站。这种努力使我的大脑准备好“锁定”这个教训。
- en: Now, why does this method work for retaining information?
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，为什么这种方法有助于保留信息？
- en: '**1) Forced Synchronicity**'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 强制同步**'
- en: Novelty, pattern recognition, and the dopamine involved in both are crucial
    for learning.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 新颖性、模式识别以及两者都涉及的多巴胺对于学习至关重要。
- en: When our ancestors noticed something new, they would remember it, especially
    when it aligned with their survival.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们的祖先注意到新事物时，他们会记住它，尤其是当它与他们的生存相一致时。
- en: Like if they pass by a bare bush they had seen many times, meaning it was nothing
    new, it didn’t serve their survival. But when it grew new berries, they noticed
    that it was new, and *remembered* that it had berries because it may help at some
    point in their life.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 就像他们经过一个他们已经看过很多次的裸露的灌木丛，这意味着它没有什么新意，它对他们的生存没有帮助。但是当它长出新浆果时，他们会注意到它是新的，并且*记住*它有浆果，因为它可能在他们的生活中某个时刻有所帮助。
- en: When you start with a project to build, your mind expands to notice things that
    will aid in that project’s survival.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 当你开始以项目构建为目标时，你的思维会扩展，注意到有助于该项目生存的事物。
- en: Like how The Power Of Now was relevant to my situation in life. The lessons
    registered in my awareness. The dopamine from that novel discovery gave me the
    excitement to implement immediately.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 就像《当下的力量》对我生活中情况的适用性。这些教训在我的意识中留下了印记。这种新颖发现的多巴胺给了我立即实施的兴奋感。
- en: If you don’t pay attention, you don’t *see.*
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有注意，你就不会*看到*。
- en: Having a project to focus your attention allows you to see what you normally
    wouldn’t.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个项目让你集中注意力，让你看到你通常不会看到的东西。
- en: This isn’t *just* a learning hack, it is a quality-of-life hack, which we will
    enhance 10-fold in the next section.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅是一个学习技巧，它是一个生活质量的技巧，我们将在下一节中将其提升10倍。
- en: '**2) The Law Of Inspired Action**'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 灵感行动法则**'
- en: I only write when inspiration strikes. Fortunately it strikes at nine every
    morning. — William Faulkner
  id: totrans-65
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我只在灵感来临时才写作。幸运的是，它每天早上9点准时到来。 — 威廉·福克纳
- en: Everyone knows that they act better on inspiration.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都知道他们在灵感的驱使下表现得更好。
- en: People love to watch “best chest workout” videos before training chest at the
    gym.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 人们喜欢在健身房锻炼胸部之前观看“最佳胸部锻炼”视频。
- en: I love reading the authors that inspire me before I sit down to write.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢在我坐下来写作之前阅读那些激励我的作者。
- en: With a project, you are enticed to learn in accordance with it.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个项目，你会被诱惑按照它来学习。
- en: If you are building a business, you will naturally gravitate toward the information
    that gives you inspiration for building said business.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在创业，你自然会倾向于获取那些能给你带来创业灵感的资讯。
- en: '*But you have to start building the damn business.*'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '*但你要开始构建那个该死的企业*。'
- en: '**3) Specific Knowledge**'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 专业知识**'
- en: 'If you’ve been on this newsletter for a bit, you know that I’m a fan of this
    advice:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经关注了这封通讯一段时间，你应该知道我是这些建议的粉丝：
- en: '*Start, then learn.*'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '*先行动，再学习*。'
- en: When you start, *even when you don’t know what you’re doing*, you will encounter
    problems.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 当你开始时，*即使你不知道自己在做什么*，你也会遇到问题。
- en: These problems will induce struggle and prime your mind to learn.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 这些问题将引发挣扎，并让你的大脑准备好学习。
- en: These problems will also give you something specific to research.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这些问题也会给你一些具体的研究内容。
- en: You won’t be learning blindly, without context, or from somebody who isn’t teaching
    you how to do *exactly* what you want to do. When you learn blindly, you gain
    too much information fat. Like when you do a dirty bulk vs a lean bulk when trying
    to gain muscle… eventually you’ll feel slow, tired, and groggy to the point of
    cutting the fat.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 你不会盲目学习，没有上下文，也不会从那些不教你如何做*确切*你想做的事情的人那里学习。当你盲目学习时，你会获得太多的信息脂肪。就像当你尝试增肌时做脏增肌比做瘦增肌…最终你会感到迟钝、疲惫和昏昏欲睡，以至于要减掉脂肪。
- en: Don’t ask questions. Don’t learn blindly. Start building something, then ask
    or research to solve the specific problems that pop up.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 不要问问题。不要盲目学习。开始构建一些东西，然后询问或研究来解决出现的具体问题。
- en: Then repeat for a decade.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 然后重复十年。
- en: You Are The Project — Tying It All Together
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你是项目 — 将一切联系起来
- en: If you want to learn faster, don't start learning.
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你想要学得更快，就不要开始学习。
- en: ''
  id: totrans-83
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Outline a project
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 制定项目大纲
- en: – Start building it out
  id: totrans-85
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 开始构建
- en: – Learn along the way
  id: totrans-86
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 在路上学习
- en: ''
  id: totrans-87
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Too many people get trapped in tutorial hell, stacking up useless knowledge
    as brain fog.
  id: totrans-88
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 太多人陷入了教程地狱，堆积了无用的知识，就像大脑雾一样。
- en: ''
  id: totrans-89
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Start > encounter a problem > seek specific knowledge to overcome it.
  id: totrans-90
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 开始 > 遇到问题 > 寻找具体知识来解决它。
- en: ''
  id: totrans-91
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [November 11, 2022](https://twitter.com/thedankoe/status/1591086400685891588?ref_src=twsrc%5Etfw)
  id: totrans-92
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年11月11日](https://twitter.com/thedankoe/status/1591086400685891588?ref_src=twsrc%5Etfw)
- en: Let’s take it up a notch.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更进一步。
- en: Building helps you retain more knowledge.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 建构帮助你保留更多知识。
- en: But teaching helps you retain even more. Teaching is another modality that locks
    in the experience you gain from building.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 但教学帮助你保留更多。教学是另一种将你在构建过程中获得的经验锁定的方式。
- en: So, why not combine the two so that we create a life of serendipity, synchronicity,
    and good dopamine?
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，为什么不将两者结合起来，从而创造一个充满意外、同步和良好多巴胺的生活呢？
- en: We do this by turning *you* into the project.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过将*你*变成项目来实现这一点。
- en: This implies holistic development.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着全面的发展。
- en: Personal development doesn’t only come from improving yourself, it comes from
    the impact you make on the world.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 个人发展不仅仅来自自我提升，还来自你对世界产生的影响。
- en: In other words, your business.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，你的事业。
- en: Or for those that “resonate” with the term business, exchange that it for your
    life’s work, your calling, or how you plan to leave the world better than you
    left it.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 或者对于那些“共鸣”于“事业”这个词的人，用你的生活工作、你的使命或你计划如何让世界比离开时更好的方式来替换它。
- en: The polarity of selfishness and selflessness.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 自私与无私的两极性。
- en: Improving yourself, then helping others improve. Sending the elevator back down.
    Climbing the mountain and leaving a trail behind you that others can follow.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 提升自己，然后帮助他人提升。按下电梯，留下一条供他人跟随的小径。
- en: '*Documenting your journey so others can evolve faster.*'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '*记录你的旅程，以便其他人可以更快地进化。*'
- en: '*Doing your part to raise the collective consciousness.*'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '*尽你的一份力，提升集体意识。*'
- en: '*That’s what “business” is, yet many mistake it for some mega-corporation that
    sucks the life out of well… your life.*'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '*这就是“事业”的含义，然而许多人错误地将其视为一些吸干人们生活的巨型企业。*'
- en: I’ve done this (and helped thousands of others) turn themselves into a business
    so they can study their interests, pass down their findings, and have a creative
    income leaning into their nature as a builder and teacher.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经这样做过（并帮助成千上万的人）将他们自己转变为一个企业，这样他们就可以研究他们的兴趣，传承他们的发现，并利用他们的建造者和教师的天性获得创造性收入。
- en: 'So, let’s tie everything we’ve learned into 6 steps:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，让我们将我们所学的一切归纳为6个步骤：
- en: '**1) Set An Intention**'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 设定一个意图**'
- en: Set a goal. Create a purpose. Think about your why. However you want to frame
    it.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 设定一个目标。创造一个目的。思考你的“为什么”。无论你如何定义它。
- en: Make an intention to improve your life, to actualize your potential.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 有意向改善你的生活，实现你的潜力。
- en: This sets your focus on the future while encouraging you to channel energy toward
    that vision. The energy you channel comes from your daily actions.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 这使你的注意力集中在未来，同时鼓励你将精力投入到那个愿景中。你所引导的能量来自于你的日常行动。
- en: Everything you consume starts to fuel your vision.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 你所消费的一切开始为你提供动力。
- en: '**2) Schedule A Creativity Block**'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 安排一个创意时段**'
- en: Everyone and their mother knows that they should schedule time for focused work,
    but what fuels that focused work?
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都知道他们应该为专注的工作安排时间，但是什么激发了这种专注的工作？
- en: If you are a creative, are you hunting for ideas in your free time? Or are you
    “creating” on an empty tank?
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一个有创造力的人，你会在空闲时间寻找灵感吗？还是你在“创造”时已经处于空杯状态？
- en: Do you value the spontaneous nature of creativity, or are you a slave to regimented
    work and productivity apps?
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 你重视创造力的自发性，还是你是受制于有规律的工作和生产力应用的奴隶？
- en: I’m not telling you to rid yourself of routine, efficiency, and productivity.
    I’m telling you that it’s only one piece of the puzzle.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是告诉你摆脱常规、效率和生产力。我是在告诉你，这只是拼图的一个部分。
- en: Schedule a 30-minute walk every day.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 每天安排30分钟的散步。
- en: 'On this walk, you can:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在这次散步中，你可以：
- en: Listen to an audiobook or podcast related to your intention
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 听与你意图相关的有声书或播客
- en: Contemplate your future and let your mind work through problems
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 思考你的未来，让你的大脑解决这些问题
- en: Get yourself away from the distractions that would keep you in a non-creative
    state
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让你自己远离那些会阻止你进入非创造状态的分心事物。
- en: When you shift your focus from external to internal, the Default Mode Network
    (a psychology term) comes into play. This is when your mind starts munching on
    the information you’ve consumed to bring new discoveries to your conscious mind.
    (The opposite of living in a state of [stress-induced narrow focus](https://thedankoe.com/the-cure-to-caring-what-people-think/)).
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 当你将你的注意力从外部转移到内部时，默认模式网络（一个心理学术语）就会发挥作用。这时，你的大脑开始咀嚼你已消费的信息，将新的发现带到你的意识中。（与生活在[压力引起的狭窄关注](https://thedankoe.com/the-cure-to-caring-what-people-think/)状态相反）。
- en: '**3) Create A Note Taking System**'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 创建一个笔记系统**'
- en: I could write an entire book on proper note-taking, so instead of writing it
    here, just download my free note-taking system (and 7-day challenge to use it
    most effectively).
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以写一本关于正确记笔记的整本书，所以在这里写它，不如下载我的免费记笔记系统（以及7天挑战，以最有效地使用它）。
- en: What will you be writing down in your notes?
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 你会在你的笔记中写下什么？
- en: Any information, insight, or discovery that will *fuel* your efforts to build.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 任何能够*推动*你构建努力的信息、洞察或发现。
- en: When your mind is set on a goal for the future, your field of awareness expands.
    You begin to filter signal from noise, whether it feels like you are or not.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的心思专注于未来的目标时，你的意识范围就会扩大。你开始从噪音中过滤信号，无论你是否感觉到。
- en: Like when you discover a car for the first time. You’ve never paid close attention
    to it, but you love the way it looks. Then, like magic, you start to notice that
    car everywhere.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 就像当你第一次发现一辆车时。你从未真正关注过它，但你喜欢它的外观。然后，就像魔法一样，你开始注意到这辆车无处不在。
- en: My friend and editor Devan has hated the Jeep Gladiator since it came to market,
    now he’s cursed with seeing them 3 to 4 times a day.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 我的友人兼编辑德万自从吉普牧马人上市以来就讨厌它，现在他每天都要诅咒般地看到它们3到4次。
- en: Imagine if you loved the idea of improving your mind, body, and finances — you
    would start to spot opportunities every single day (that would normally slip right
    under your nose).
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，如果你喜欢改善你的思想、身体和财务状况——你将开始每天发现机会（这些机会通常会从你的鼻子底下溜走）。
- en: '**4) Build Every Aspect Of Your Life**'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 构建你生活的每一个方面**'
- en: You aren't seeing progress because you’re obsessed with the polished end result,
    not the process that created it.
  id: totrans-134
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你没有看到进步，因为你过于沉迷于完美的最终结果，而不是创造它的过程。
- en: ''
  id: totrans-135
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [November 11, 2022](https://twitter.com/thedankoe/status/1591070525585084417?ref_src=twsrc%5Etfw)
  id: totrans-136
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年11月11日](https://twitter.com/thedankoe/status/1591070525585084417?ref_src=twsrc%5Etfw)
- en: You have to understand that you are *building.*
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须明白你是在*构建*。
- en: How long would it take to build a mansion by yourself?
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 独自一人建造一座豪宅需要多长时间？
- en: 20 years? A lifetime?
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 20年？一生？
- en: That’s exactly the point.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是关键所在。
- en: Fall in love with infinite games.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 爱上无限游戏。
- en: Try everything that interests you. Then double down on the thing that you could
    see yourself doing for the rest of your life. Yes, this takes time, experimentation,
    and 6-12 months of patience.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试所有你感兴趣的事情。然后加倍投入你认为自己可以为之终身奋斗的事情。是的，这需要时间、实验和6-12个月的耐心。
- en: If you don’t like the sound of that, sit down and think of what the other option
    is. I bet you won’t like the sound of that even more.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不喜欢这个听起来，就坐下来想想其他选择是什么。我敢打赌你甚至更不喜欢那个听起来。
- en: Snap yourself out of the instant gratification mindset. You must actively construct
    your life on a daily basis.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 摆脱即时满足的心态。你必须每天积极地构建你的生活。
- en: Start with 30-60 minutes.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 从30-60分钟开始。
- en: What do you do during that time?
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 你在那段时间里做什么？
- en: Hit the gym. Write for the sake of digital leverage and income. Self-educate
    when you don’t have clarity on the problem you encountered while building.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 去健身房。为了数字杠杆和收入而写作。在构建过程中遇到问题时，如果你不清楚问题所在，就进行自我教育。
- en: '*If you don’t make time to build, you* *are assigned* *time to build for someone
    else.*'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果你不腾出时间来构建，你* *就会被分配* *为别人构建时间。*'
- en: '**5) Teach What You Know**'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: '**5) 教授你所知**'
- en: <picture fetchpriority="high" decoding="async" class="wp-image-867">![](../Images/6e7d52ebbef46fde94ded7511101a223.png)</picture>
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-867">![](../Images/6e7d52ebbef46fde94ded7511101a223.png)</picture>
- en: As we discussed, building is an incredible way to retain specific knowledge
    in alignment with the life you are trying to build.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们讨论的那样，构建是与你试图构建的生活相一致，保留特定知识的一种了不起的方式。
- en: To retain even more of what you learn, let me introduce you to the *Protégé
    Effect*.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保留你所学到的更多内容，让我向你介绍*辅导效应*。
- en: In short, it’s “learning by teaching.”
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，这就是“教学相长”。
- en: When you pair genuine curiosity with building a project, then teaching what
    you’ve learned, you increase your level of articulation more than any other method.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 当你将真正的好奇心与构建项目相结合，然后教授你所学的知识时，你比任何其他方法都能提高你的表达能力。
- en: Clearly, my favorite way to encapsulate all of these is by stepping into the
    digital arena.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，我最喜欢的将这些全部概括的方式是进入数字竞技场。
- en: Employers are hiring based on your public resume (social media account). You
    can teach what you learn to build digital leverage in the form of an audience.
    And when you’re ready, you can create a product or service to turn your interests
    into income.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 雇主是根据你的公开简历（社交媒体账户）来招聘的。你可以教授你所学的知识，以建立数字杠杆，形成观众。当你准备好时，你可以创建一个产品或服务，将你的兴趣转化为收入。
- en: When you teach about your passions, you tap into a new level of serendipity
    in everyday life.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 当你教授你的激情时，你会在日常生活中开启一个新的意外发现水平。
- en: '**6) Turn It Into Your Life’s Work**'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: '**6) 将其变成你的人生事业**'
- en: The amount of serendipity that will occur in your life, your Luck Surface Area,
    is directly proportional to the degree to which you do something you’re passionate
    about combined with the total number of people to who this is effectively communicated.
    — Jason Roberts
  id: totrans-159
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你生活中可能发生的意外发现，你的**幸运面**，与你做你所热爱的事情的程度以及有效传达给的人数成正比。 —— 贾森·罗伯茨
- en: Work is a necessary part of life, and for most, it consumes a large percentage
    of their waking hours.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 工作是生活的一个必要部分，对于大多数人来说，它占据了他们清醒时间的大部分。
- en: For many, this work lacks interest. They took the conventional path that was
    laid out for them and live in a state of slightly elevated stress (which is terrible
    for your creative problem-solving).
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 对于许多人来说，这项工作缺乏兴趣。他们选择了为他们铺好的传统道路，生活在轻微的压力状态中（这对你的创造性问题解决非常糟糕）。
- en: Is this what you want?
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你想要的吗？
- en: If the duality of work and rest is to be maintained — meaning “retirement” is
    a dream where you will still work on *something* — do you want 70% of your life
    to be consumed doing something you hate, or even slightly dislike?
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 如果要保持工作和休息的双重性——也就是说，“退休”是一个你仍然会从事**某事**的梦想——你愿意将你生命的70%消耗在做一些你讨厌或甚至稍微不喜欢的事情上吗？
- en: No? Here’s what I would do.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 不是吗？我会这样做。
- en: Research what you feel pulled to research.
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究你感到被吸引去研究的课题。
- en: Don’t get distracted. Let it pull you deep into a rabbit hole of discovery.
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要分心。让它把你深深拉入发现的兔子洞。
- en: Understand that ***sustained curiosity + excitement = passion***
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解这一点：**持续的好奇心+兴奋=激情**
- en: Practice sustaining that passion with everything we’ve talked about here.
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 练习用我们在这里讨论的一切来维持那种激情。
- en: Note down your findings, build a project, and begin teaching others.
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记下你的发现，构建一个项目，并开始教授他人。
- en: I’ve talked about [productizing yourself via the one person business multiple
    times](https://youtu.be/BZ2nSULolKI) as well as [becoming a value creator.](https://youtu.be/RuFjY1MV4LM)
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 我多次讨论过[通过单人企业产品化自己](https://youtu.be/BZ2nSULolKI)以及[成为价值创造者](https://youtu.be/RuFjY1MV4LM)。
- en: What many don’t realize is that *products start off as projects.*
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人没有意识到的是，**产品最初是项目。**
- en: If you ARE the *project*, when you put yourself in public, you become a *product*
    that people will want to invest in.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你自己是**项目**，当你将自己公之于众时，你就变成了人们愿意投资**产品**。
- en: Projectize yourself, then productize yourself.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 先将自己项目化，然后再将自己产品化。
- en: Now, understand that you don’t launch a product when it’s perfect, that’s an
    impossible goal.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，明白你不需要在产品完美时才推出市场，那是一个不可能的目标。
- en: Entrepreneurs launch MVPs. Minimum Viable Products. A project that provides
    value enough to charge for, launch, and continue improving it with time.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 创业者推出MVPs。最小可行产品。一个提供足够价值以收费、推出并随着时间的推移持续改进的项目。
- en: '*You are your life’s work.*'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: '**你是你生命的工作。**'
- en: Your minimum viable product was created at birth.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 你的最小可行产品是在出生时创造的。
- en: Launch, build, teach.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 推出，构建，教学。
- en: — Dan Koe
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: —— 丹·科
