- en: The Minimalist Productivity System (6 Years Of Work In 6 Months)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 极简主义生产力系统（六个月完成六年的工作）
- en: 原文：[https://thedankoe.com/letters/the-minimalist-productivity-system-6-years-of-work-in-6-months/](https://thedankoe.com/letters/the-minimalist-productivity-system-6-years-of-work-in-6-months/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://thedankoe.com/letters/the-minimalist-productivity-system-6-years-of-work-in-6-months/](https://thedankoe.com/letters/the-minimalist-productivity-system-6-years-of-work-in-6-months/)'
- en: The clever man may work smarter, not harder, they say, but the creative man
    doesn’t work at all.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 他们说，聪明人可能工作得更聪明，而不是更努力，但创造者根本不工作。
- en: 'I’ve been rereading one of my favorite books, Rest, by Alex Soojung-Kim Pang.
    I have a deep desire to share what I’ve learned, because I feel like the world
    is in dire need of hearing this right now:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直在重读我最喜欢的书之一，亚历克斯·苏松-金·潘的《休息》。我非常渴望分享我所学到的，因为我觉得现在全世界都迫切需要听到这些：
- en: Most people struggle to do good work because they work too much.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人因为工作太多而难以做好工作。
- en: Their mind is always on.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的思想总是处于活跃状态。
- en: Out of gas, pushing down the road because you “need” to get to whatever destination
    you’re heading to.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 没有燃料，因为“需要”到达你正前往的任何目的地而推着车前进。
- en: Stuck in doing mode, a narrow-minded state that, when left unchecked, leads
    to that hot ball of stress in your chest that you have difficulty identifying
    the source of.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 困于执行模式，这是一种狭隘的心态，如果不加控制，会导致你胸口那团难以确定来源的压力。
- en: That *feeling* of a closed mind.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 那种**封闭思想**的感觉。
- en: The one that hurts your quality time with others. The one that makes you unappreciative
    of life’s innate richness. The one where you forget how it feels to have a clear
    line of thought.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 那种会损害你与他人共度质量时间的。那种让你不珍惜生活固有丰富性的。那种让你忘记清晰思考的感觉。
- en: These people wear overwork as a badge of honor.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这些人将过度工作视为荣誉的标志。
- en: They feel like they can’t stop working because they need to keep up in the imaginary
    race they thought themselves into.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 他们觉得自己不能停止工作，因为他们需要跟上他们自己想象中的比赛。
- en: I want to propose a different way of doing work.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我想提出一种不同的工作方式。
- en: We no longer live in a world that benefits the individual who works 40 to 80
    hours a week (as a repetitive and eternal lifestyle, not as an occasional thing).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不再生活在一个有利于每周工作40到80小时的个人（作为一种重复和永恒的生活方式，而不是偶尔的事情）的世界。
- en: The world is shifting from technicians to creators.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 世界正在从技术人员转向创造者。
- en: With the entry-level turning into the senior-level thanks to AI and automation,
    technicians will be replaced, or they will be forced to become creators.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 由于人工智能和自动化的出现，初级职位变成了高级职位，技术人员将被取代，或者他们被迫成为创造者。
- en: Technicians work toward the goals they are assigned.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 技术人员朝着他们被分配的目标努力。
- en: Creators cultivate a lifestyle that naturally results in the goals they choose.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 创造者培养一种自然而然地导致他们选择的目标的生活方式。
- en: 'The ancient Greeks saw rest as a great gift, as the pinnacle of civilized life.
    The Roman Stoics argued that you cannot have a good life without good work. Indeed,
    virtually every ancient society, recognized that both work and rest were necessary
    for a good life: one provided the means to live, the other gave meaning to life.'
  id: totrans-18
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 古希腊人将休息视为一份伟大的礼物，视为文明生活的顶峰。罗马斯多葛主义者认为，没有良好的工作，你无法过上美好的生活。确实，几乎每个古代社会都认识到，工作和休息都是美好生活的必要条件：一个提供了生活的手段，另一个赋予了生活意义。
- en: If you want to get things done, work.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要完成事情，那就去工作。
- en: If you want to get the right things done, rest.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要完成正确的事情，那就休息。
- en: Rest is not wine and bubblebaths nor margaritas on a beach. Rest is a necessity
    for creative work; the type of work that actually leads to a good life.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 休息不是红酒和泡泡浴，也不是海滩上的玛格丽塔。休息是创造性工作的必需品；那种真正能带来美好生活的类型的工作。
- en: It’s counterintuitive, but *rest* is how you get 6 years of work done in 6 months.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这听起来很反直觉，但休息正是你如何在六个月内完成六年的工作。
- en: Proceed with an open mind, because the path to get there may threaten everything
    you believe is true. It may destroy the sense of security you had in your future,
    because it was an illusion to begin with.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 以开放的心态前进，因为通往那里的道路可能会威胁到你所相信的一切真实。它可能会摧毁你对未来的安全感，因为一开始那只是一个幻觉。
- en: Cracking The Work-Life Balance Code
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 打破工作与生活平衡的密码
- en: Let’s do a thought experiment.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们做一个思想实验。
- en: You have a 6-year goal of making $1 million.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 你有一个6年的目标，即赚取100万美元。
- en: 'The low-leverage way to achieve that would be to:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 实现这一目标的低杠杆方式是：
- en: Create a budget and avoid buying $5 Starbucks coffee
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 制定预算并避免购买5美元的星巴克咖啡
- en: Try to get a promotion or raise so your income increases a +/-10%
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试获得晋升或加薪，让你的收入增加10%到+/-10%
- en: Calculate how much you need to invest each month in the stock market
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算你每个月在股市中需要投入多少资金。
- en: Live below your means and fear for your life that nothing catastrophic happens
    to you
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 量入为出，担心你的生活不会发生任何灾难性的事情。
- en: Now, this is going to sound a bit extreme.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这听起来可能有些极端。
- en: “How in the world can you achieve that 6-year goal in 6 months?”
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: “你怎么可能在6个月内实现6年的目标？”
- en: 'What you have to realize is that it *is* possible. That’s step one. Step two
    is realizing you just don’t have the knowledge and skill that makes it possible.
    You haven’t sought new knowledge from education that can’t be found in schools
    relevant to a financial goal you don’t have. Step three is truly understand what
    it takes to learn something of this magnitude: a metric f*ck ton of failures until
    you can afford to succeed.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须意识到这是可能的。这是第一步。第二步是意识到你缺乏实现这一目标所需的知识和技能。你没有从教育中寻求新的知识，而这些知识在学校中找不到，与你没有的财务目标相关。第三步是真正理解学习这样规模的东西需要什么：在能够负担得起成功之前，你需要经历大量的失败。
- en: I’m not saying this will make $1 million in 6 months.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是说我会在6个月内赚到100万美元。
- en: I am just illustrating a point for this letter. I’m sure you’d be happy if this
    led to making $50K or $100K in that time frame.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我只是在这个信件中阐述一个观点。我相信如果你在这个时间段内能赚到5万美元或10万美元，你会很高兴。
- en: Set a big 6 month goal so your mind biases education toward that goal
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设定一个为期6个月的大目标，让你的思维偏向于实现这个目标。
- en: Start a business – yes, a business – so you have full control over the product,
    audience, and revenue
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始一个业务——是的，一个业务——这样你就可以完全控制产品、受众和收入。
- en: That way, you’re forced to think creatively about how to achieve the goal
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这样，你就被迫创造性地思考如何实现目标。
- en: Choose a business model that allows you to achieve that goal without sacrificing
    your interests
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择一种商业模式，让你在不牺牲自己兴趣的情况下实现目标。
- en: 1x, 2x, or 3x your income year after year rather than getting a 10% raise on
    a six-figure salary
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每年增加1倍、2倍或3倍的收入，而不是在六位数的工资上每年只加10%。
- en: If you’re new to this newsletter, you may or may not have the knowledge or awareness
    that you don’t need a fancy fad-business model to do this.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你刚开始订阅这个通讯录，你可能或可能没有意识到你不需要一个花哨的时尚商业模式来做这件事。
- en: Stop thinking about starting an agency or ecom store.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 停止考虑开设一家代理机构或电商店铺。
- en: Start thinking from business principles – you need an audience and a way to
    monetize that audience.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 从商业原则开始思考——你需要一个受众以及一种货币化受众的方式。
- en: Technology has created this beautiful new type of media (media is how you build,
    attract, or target an audience) called social media, which is where most of the
    attention is (you need attention if you want money).
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 技术创造了一种美丽的新媒体类型（媒体是构建、吸引或定位受众的方式），称为社交媒体，这是大多数注意力所在的地方（如果你想赚钱，你需要注意力）。
- en: Starting a personal brand, or being a myopically labeled “content creator” is
    how you attract an audience to *you* and sell whatever you want. A freelance service,
    digital product, physical product… anything that you see people selling online.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 开始打造个人品牌，或者成为一个狭隘地被标记为“内容创作者”，这是吸引受众到你这里并卖任何你想要的东西的方式。自由职业服务、数字产品、实体产品……任何你在网上看到人们销售的东西。
- en: You are already a business. You have value to give. You just don’t know how
    to put yourself in front of the billions of people online and get them to pay
    you for your work. The internet is a necessary part of modern survival.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经是一个企业。你有价值可以提供。你只是不知道如何将自己置于数十亿在线人群中，并让他们为你所做的工作付费。互联网是现代生存的必要部分。
- en: 'So, to use this meta-business model to reach that 6-month goal:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为了使用这种元商业模式来实现6个月的目标：
- en: Study social media, but don’t fall into thinking it’s a business model (yes,
    you have to study it and practice it if you want to grow, shocker)
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究社交媒体，但不要陷入认为它是一种商业模式的思维（是的，如果你想成长，你必须研究和实践它，这是一个令人震惊的事实）。
- en: Write content on platforms like X or LinkedIn to build a quality audience
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在X或LinkedIn等平台上写内容，以建立高质量的受众。
- en: Start a newsletter to keep and nurture that audience with longer, trust-building
    writing (like this)
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始一个通讯录，用更长、建立信任的写作（就像这样）来保持和培养这个受众。
- en: If you want, repurpose that writing to all other platforms like I teach in [2
    Hour Writer](https://2hourwriter.com)
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你想，可以将这些写作内容改编到所有其他平台，就像我在[2小时作家](https://2hourwriter.com)中教授的那样。
- en: As your audience grows, launch digital products and services (courses, templates,
    freelance, coaching, etc) that allow you to build cash flow without spending your
    life savings to actually start the business (they are free to create)
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随着你观众的增长，推出数字产品和服务（课程、模板、自由职业、辅导等），这样你可以建立现金流，而无需花费你的全部积蓄来真正开始业务（它们是免费创建的）。
- en: Promote your valuable product or service to your audience in a systemized fashion
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以系统化的方式向你的观众推广你有价值的产品或服务。
- en: Let’s say you’ve studied social media, write a post, and it gets shared by an
    account with 100K followers (because you have the *skill,* yes *skill,* to do
    that).
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你已经研究了社交媒体，写了一篇帖子，并被一个有10万粉丝的账户分享（因为你拥有*技能*，是的*技能*，能做这件事）。
- en: Now that post is getting a few hundred thousand impressions.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 现在那篇文章已经获得了几十万的浏览量。
- en: You promote your newsletter (or your product) to nurture that audience.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 你推广你的通讯（或你的产品），以培养那个观众。
- en: You write emails that deliver more value than basic social content and promote
    your product.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 你写出的电子邮件应该比基本的社会内容提供更多的价值，并推广你的产品。
- en: Since you have an audience flow in the hundreds of thousands, and if you stick
    that out for 6-12 months, and if you iterate and improve on your process when
    you notice things aren’t working, I find it difficult to believe that you won’t
    be able to convert a fraction of that audience into buyers. I’ll let you do the
    math on if that would equal a million dollars.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 由于你有成千上万的观众流量，如果你坚持6-12个月，并在注意到事情不起作用时迭代和改进你的流程，我觉得很难相信你不会将其中的一部分观众转化为买家。我会让你自己计算一下，如果那样能等于一百万美元。
- en: Some may say, “Well not everyone can do this.”
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人可能会说，“嗯，不是每个人都能做到这一点。”
- en: I think you forgot above where I say, “sell whatever you want.”
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为你可能忘记了我说过的，“卖你想要卖的东西。”
- en: Most if not all local businesses are online doing the same thing. You don’t
    market a business with direct physical mail and billboards anymore. Maybe sometimes,
    but we’re aiming for high leverage.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数甚至几乎所有的地方性商业都在线上做同样的事情。现在不再用直接邮寄和广告牌来营销一个企业了。也许有时候会这样做，但我们追求的是高杠杆。
- en: So yes, everyone *can* do this, if they are the niche. If they don’t conform
    to agency models and templated ecom stores. If they lean into their interests,
    personality, solve their own problems, and sell the solution.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，是的，如果他们是细分市场，每个人*都可以*做到这一点。如果他们不遵循代理模式或模板化的电商商店。如果他们追随自己的兴趣、个性，解决自己的问题，并销售解决方案。
- en: The Minimalist Workday Philosophy
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 极简工作日哲学
- en: 'One of his contemporaries said that Watson had time for girls and tennis because
    he was a genius. But Woolf and Kay made me think: Maybe he was a genius because
    he made time for girls and tennis. Maybe creative achievement needs to be approached
    obliquely.'
  id: totrans-65
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 他的一个同时代人曾说沃森有时间陪女孩打网球，因为他是个天才。但伍尔夫和凯让我想到：也许他之所以是个天才，是因为他为女孩和网球腾出了时间。也许创造性成就需要间接地对待。
- en: My 4-hour workday philosophy has evolved to an extent.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我的4小时工作日哲学已经发展到一定程度。
- en: I am not only building my personal business with the methods we just discussed.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 我不仅用我们刚才讨论的方法在建立我的个人业务。
- en: I’m learning animation, building a startup, and the rest.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我在学习动画、建立初创公司，等等。
- en: But how I work hasn’t changed. I feel as if I still get outsized results because
    of *what* I choose to give my attention.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 但我的工作方式并没有改变。我感觉我之所以能获得超出预期的结果，是因为我选择关注什么。
- en: Minimalism is not about having less, it’s about making room for more of what
    matters.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 极简主义不是关于拥有更少，而是为更多重要的事情腾出空间。
- en: It’s about leverage.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这关乎杠杆。
- en: It’s about releasing the things that you *think* are bringing you progress,
    but are actually slowing you down (like watching tutorials without actively building
    a project – I don’t just watch tutorials, I find a tutorial I want to implement
    directly and learn the skill through building along with it).
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这关乎释放那些你认为能带来进步但实际上会拖慢你步伐的事情（比如观看教程而不积极构建项目——我不仅仅看教程，我会找到一个我想直接实施的教程，并通过构建它来学习技能）。
- en: It’s about focusing on the few tasks that bring outsized results and systemizing,
    outsourcing, or delegating the rest.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这关乎专注于能带来超出预期结果的少数任务，并将其他任务系统化、外包或委托。
- en: But how do you find the select few tasks that allow you to achieve your goals
    in record time?
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 但你如何找到那些能让你在创纪录的时间内实现目标的少数任务呢？
- en: Well, you definitely aren’t going to find it by following a path that your parents
    or teachers told you to follow – because you can directly observe what kind of
    high-pressure lifestyle that leads to.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，你肯定不会通过遵循你父母或老师告诉你的道路找到它——因为你可以直接观察到这会导致什么样的高压生活方式。
- en: That’s step 1.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 这是第一步。
- en: Choosing the right vessel that allows you to control all of the variables. In
    work, that means a business. In modern day, that means an internet business.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 选择正确的载体，让你能够控制所有变量。在工作上，这意味着一家企业。在现代社会，这意味着互联网企业。
- en: '**Step 2** is to study all perspectives and identify patterns and principles.
    If you study online business, you notice that all of them build an audience and
    monetize that audience.'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '**第二步**是研究所有观点，识别模式和原则。如果你研究在线商业，你会注意到它们都建立了一个受众并从中获利。'
- en: '**Step 3** is understanding [**Koe’s Law**](https://thedankoe.com/letters/zero-to-1-million-as-a-one-person-business-while-working-2-4-hours-per-day/),
    which states that leveraged work evolves to earn more in the time allotted for
    its completion.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '**第三步**是理解[**科伊定律**](https://thedankoe.com/letters/zero-to-1-million-as-a-one-person-business-while-working-2-4-hours-per-day/)，该定律指出，利用工作可以使其在完成所需的时间内获得更多收益。'
- en: 'If I wanted to make $1 million as 1 person while working 4 hours or less:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想在4小时或更少的时间内作为一个人赚取一百万：
- en: The allotted time for completion is 4 hours, don’t work more than that (so you
    can identify problems that make you extend beyond that timeframe and solve them
    with systemization, automation, or delegation).
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 完成所需的时间为4小时，不要工作超过这个时间（这样你就可以识别出让你超出这个时间框架的问题，并通过系统化、自动化或委派来解决这些问题）。
- en: Begin building an audience on the internet however you deem fit. Ads, content,
    etc. I would obviously recommend content as the highest leverage. You write once
    and spread it to thousands > millions as you get better.
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以你认为合适的方式开始在网上建立受众。广告、内容等。我显然会推荐内容作为最高杠杆。你写一次，随着你变得更好，就可以将其传播到数千甚至数百万。
- en: Create a minimum viable product or service and start selling fast (as soon as
    you notice a problem, like the first person not buying, begin to test new strategies
    and iterate until you see results).
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个最小可行产品或服务，并快速开始销售（一旦你注意到第一个不购买的人，就开始测试新的策略，并迭代直到看到结果）。
- en: Study new techniques and acquire new skills to enhance how effective you are
    in those 4 hours.
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 学习新技术并掌握新技能，以增强你在那4小时内的效率。
- en: If you were to simply adhere to step 1, persist with steps 2 and 3, and not
    forget about step 4 – you would have a growing audience and a product that sells.
    Boom, a $1 million (and increasing) income.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你仅仅遵循第一步，坚持第二步和第三步，并且不要忘记第四步——你将拥有不断增长的受众和畅销的产品。砰！收入达到一百万（并且还在增加）。
- en: That’s the power of minimalism backed trial and error, the essence of any form
    of improvement.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是简约主义背后的试错之力的力量，这是任何形式改进的本质。
- en: The 4 Cycles Of Progress
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 进步的4个周期
- en: I’ll make this quick, but we need to talk about it.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 我会很快地说，但我们确实需要谈谈这个问题。
- en: I’ve seen quite a few well-known people say that your 20s are meant to pull
    12-hour days and never stop working.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我看到很多知名人士说，你的20多岁应该拉12小时的工作日，永远不要停止工作。
- en: I agree…
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我同意...
- en: 1/4 of the time.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 1/4的时间。
- en: Life unfolds in chapters and phases.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 生活以章节和阶段展开。
- en: Everything, and I mean everything, goes through cycles.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 一切，我是指一切，都经历周期。
- en: There are macro cycles and micro cycles. Cycles of the universe (like seasons),
    cycles of culture (like holidays), cycles of your day (like going to the bathroom
    and satisfying your sexual desire), and more.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 有宏观周期和微观周期。宇宙的周期（如季节），文化的周期（如节日），你一天的周期（如去洗手间和满足你的性欲），等等。
- en: This is a generalized principle of reality. The principle of impermanence and
    entropy.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 这是现实的普遍原则。无常和熵的原则。
- en: 'The 4 cycles of progress are:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 进步的4个周期是：
- en: '**Perplexity** – you feel lost and don’t know what to do next in your life.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**困惑**——你感到迷茫，不知道你下一步在生活中该做什么。'
- en: '**Curiosity** – you discover an inkling of opportunity and dive down the rabbit
    hole.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**好奇心**——你发现了一丝机会，并跳进了兔子洞。'
- en: '**Intensity** – you gain absolute clarity and can’t pull yourself away from
    your work (12-hour workdays).'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**强度**——你获得绝对的清晰度，无法将自己从工作中抽离出来（12小时工作日）。'
- en: '**Consistency** – you systemize what works, lean back, develop a sustainable
    routine, and make rest an essential part of your creative life (4-hour workdays).
    Then, you can repeat the process if you so please.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一致性**——你系统化你所做的工作，放松身心，发展可持续的日常习惯，并将休息作为你创意生活的重要组成部分（4小时工作日）。然后，如果你愿意，你可以重复这个过程。'
- en: Doing intense work, day in day out, often on mindless, low leverage tasks is
    only going to add bloat to your mind and business. You’ll try pushing through
    a perplexity phase of life with intensity when it is solved with curiosity.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 每天都进行高强度的工作，经常是做一些无意义、低效的任务，这只会让你的思想和业务变得臃肿。当你用好奇心解决生活中的困惑阶段时，你会用强度去推动它。
- en: Keep in mind, these are meta states of consciousness. Trying to force your way
    into a new one will not work.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，这些都是意识的元状态。试图强迫自己进入一个新的状态是不会奏效的。
- en: Sure, go ahead and work 12-hour days on a task that you chose to work on just
    because you felt like you had to.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，你可以继续工作12小时，只因为你觉得你必须这样做。
- en: I’ll see you in my DMs with the hundreds of others who feel cheated by the labor
    theory of value.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 我会在我的私信中见到你，还有那些被价值劳动理论欺骗的数百人。
- en: How To Do 6 Years Of Work In 6 Months
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何在6个月内完成6年的工作
- en: But it’s clear that the brain’s creative work is never done, that even in its
    resting state the brain is plugging away at problems, examining and tossing out
    possible answers, looking for novelty. This is a process we can’t really control.
    But by learning to rest better, we can support it, let it work, and take notice
    when it’s found something that deserves our attention.
  id: totrans-106
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 但很明显，大脑的创造性工作永远不会停止，即使在它的休息状态下，大脑也在努力解决问题，检查和摒弃可能的答案，寻找新意。这是一个我们实际上无法控制的过程。但通过学会更好地休息，我们可以支持它，让它工作，并在它找到值得我们关注的东西时注意到它。
- en: Let’s condense what we’ve learned into practical steps.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将我们所学的内容浓缩成实用的步骤。
- en: '*But first, if you want rest, you have to take it, because nobody in this world
    is going to give it to you.*'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '*但首先，如果你想休息，你必须自己去争取，因为在这个世界上没有人会主动给你提供休息的机会*。'
- en: Rest is what allows your mind to filter signal from noise.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 休息是让你的思维从噪音中过滤出信号的方式。
- en: Intentional rest is how you break out of the narrow-minded stress of doing mode
    that most of us are addicted to.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 有意识的休息是你打破我们大多数人上瘾的狭隘的做模式压力的方式。
- en: Rest, like walking, lifting, reading, leisure, or what we can define as anything
    aside from giving attention to work, is what activates the Default Mode Network.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 休息，就像散步、举重、阅读、休闲，或者我们可以定义为除了关注工作之外的一切，这是激活默认模式网络的方式。
- en: In short, that means your brain is as active, or *more* active, when you are
    at rest.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，这意味着当你休息时，你的大脑同样活跃，或者甚至更活跃。
- en: '*Your brain works* ***for you*** *when you rest.*'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '*你的大脑* ***为你工作*** *当你休息时*。'
- en: Think of it like “shower thoughts” or the times right before you fall asleep
    where you can’t stop having potentially life changing ideas.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下“淋浴时的想法”或者在你即将入睡时，你无法停止产生可能改变一生的想法。
- en: If you are always in doing mode, good luck having the idea that *allows* for
    more results in your work.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你总是处于做模式，那么拥有能够让你在工作中取得更多成果的想法将非常困难。
- en: The secret to the creative worker’s ability to make massive progress in such
    short periods of time is that they have the ideas that spring up the awareness
    *to* work on the right tasks with quality and grace.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 创造性工作者能够在短时间内取得巨大进步的秘密在于他们拥有那些能够让他们以质量和优雅的方式专注于正确任务的意识。
- en: 'Here’s how you begin to leverage this power:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何开始利用这种力量的方法：
- en: Build Your Own Thing
  id: totrans-118
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 打造你自己的东西
- en: There is something special about working on a project of your own. I wouldn’t
    say exactly that you’re happier. A better word would be excited, or engaged. You’re
    happy when things are going well, but often they aren’t… So why do it at all?
    Because to the kind of people who like working this way, nothing else feels as
    right. You feel as if you’re an animal in its natural habitat, doing what you
    were meant to do — not always happy, maybe, but awake and alive. – Paul Graham
  id: totrans-119
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在你自己的项目上工作有一些特别之处。我不会说你会更快乐。一个更好的词可能是兴奋，或者投入。当事情进展顺利时，你会感到快乐，但通常它们并不顺利……那么为什么还要这样做呢？因为对于喜欢这样工作的人来说，没有其他事情会让他们感到如此正确。你感觉就像是一个在其自然栖息地中的动物，做着它注定要做的事情——也许并不总是快乐的，但却是清醒和充满活力的。
    ——保罗·格雷厄姆
- en: If you want to get more lever-moving work done, I hate to break it to you, but
    that’s going to be very difficult if all you do is work on projects that are assigned
    to you.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想完成更多有影响力的工作，很遗憾告诉你，如果你只专注于别人分配给你的项目，这将非常困难。
- en: So, if you’ve made it this far, I’m sorry for the tease.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，如果你已经读到这儿，我为之前的逗弄感到抱歉。
- en: Maybe it’s time to take a brutal look at your situation and stop trying to force
    finding meaning in the meaningless. Maybe it’s time to finally take the leap.
    The leap you’ve been wanting to make, because you know it’s the only logical long
    term option, but shy away because you may have to sacrifice a few comforts you
    have now (that can ultimately be replaced with something more fulfilling).
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 也许现在是时候对你的情况进行残酷的审视，并停止试图在无意义中寻找意义。也许现在是时候最终迈出那一步。你一直想要迈出的那一步，因为你知道这是唯一合理的长期选择，但你却因为可能要牺牲你现在的一些舒适（最终可以用更有意义的东西来替代）而退缩。
- en: When you build your own thing, you actually want to work. It only feels like
    work when you are going through a lull, but it’s work you can still tolerate.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 当你建立自己的事业时，你实际上是想工作的。只有在你遇到低谷时，它才感觉像是工作，但这是你仍然可以忍受的工作。
- en: 'When you are in control of the project, you can control the variables for creating
    the flow state of consciousness, the key to achieving the impossible:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 当你掌控项目时，你可以控制创造意识流状态的变量，这是实现不可能的关键：
- en: Curiosity, passion, purpose, autonomy, mastery.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 好奇心、热情、目标、自主性、精通。
- en: I would argue that 90% of people publicly hate their jobs, 9% of people lie
    to themselves that they love their jobs (or they just don’t have the awareness
    of something better because they’ve never explored the unknown), and 1% of people
    have the few jobs that allow them to create the conditions above.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 我会争辩说，90%的人公开讨厌他们的工作，9%的人欺骗自己说他们喜欢他们的工作（或者他们只是没有意识到更好的东西，因为他们从未探索过未知），而1%的人拥有少数工作，这些工作允许他们创造上述条件。
- en: Not everyone can have those jobs.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 并非每个人都能拥有那些工作。
- en: What if you don’t know what to build?
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道要建立什么？
- en: Refer to what I said previously.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 参考我之前所说的。
- en: 'Choose a meta business model. One that prioritizes the two principles of business:
    build an audience, monetize the audience.'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个元商业模式。一个优先考虑商业两个原则的商业模式：建立受众，货币化受众。
- en: That way, you can explore your interests, stack second-order future-proof skills
    like [writing and persuasion](https://2hourwriter.com), and use modern marketable
    skills like email, graphic design, and video to [monetize those interests](https://mentalmonetization.com).
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，你可以探索你的兴趣，积累二级未来保障技能，比如[写作和说服力](https://2hourwriter.com)，并使用现代可销售技能，如电子邮件、平面设计和视频，来[货币化这些兴趣](https://mentalmonetization.com)。
- en: Being a “creator” is a way of being that is currently channeled through the
    internet until the best way to harness your human capabilities evolves, not the
    myopic internet job people make it seem like it is.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 成为“创造者”是一种生活方式，目前这种生活方式是通过互联网实现的，直到找到最佳方式来发挥人类潜能，而不是像那些短视的互联网工作者所表现的那样。
- en: Think Bigger.
  id: totrans-133
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 考虑得更大。
- en: We all operate on a 24-hour clock.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都在24小时时钟上运作。
- en: You can choose to open a coffee shop and be limited to the foot traffic of that
    shop, or you can choose to start a coffee brand limited to the billions of people
    on the internet.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以选择开设一家咖啡店，受限于该店的客流量，或者你可以选择开设一个仅限于互联网上数十亿人的咖啡品牌。
- en: Imagine a line of locals at your coffee shop. Every 30-60 seconds for the morning
    rush people swipe their cards and you collect a few $5 to $20 transactions.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，在你的咖啡店前排着当地人的队伍。在早晨高峰时段，每30-60秒人们就会刷一下卡，你就能收集到几笔5到20美元的交易。
- en: Now imagine building an audience of 10, 20, or 50,000 people over the course
    of a few years. You promote your coffee brand, and there is no line. You get notifications
    every second. So much so that you become numb to it.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 现在想象一下，在几年内建立一个10、20或50,000人的受众群体。你推广你的咖啡品牌，没有排队。你每秒都会收到通知。如此之多，以至于你对这些通知变得麻木。
- en: You chose the path of leverage, so once the systems are created, you barely
    have to work unless you choose to grow even more.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 你选择了杠杆化道路，所以一旦系统建立，除非你选择进一步增长，否则你几乎不需要工作。
- en: The point is that both the local shop and the online shop owners work the same
    amount of time, but the online shop owner has the *potential* to make exponentially
    more and has the choice to work less.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 重点是，无论是当地商店还是在线商店的店主，他们工作的时间都是一样的，但在线商店的店主有**潜力**获得指数级更多的收入，并且可以选择工作更少。
- en: Your mental capacity is limited by the potential of the business you are building.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 你的心理能力受限于你正在建立的业务潜力。
- en: If your mind is limited to a small local shop, you hinder your ability to raise
    dopamine levels in the brain through novelty, discovery, and pattern recognition
    (the fuel that keeps drawing you back to the project you are building).
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的思维局限于一个小型的本地商店，你会阻碍你通过新奇、发现和模式识别（让你不断回到你正在构建的项目中的燃料）来提高大脑多巴胺水平的能力。
- en: Eventually, skill acquisition and growth slow down, and you reach the same point
    you did when you started hating your 9-5.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，技能的获取和增长会放缓，你会达到你开始讨厌朝九晚五工作时的那个点。
- en: So, to tie this together, thing big and reverse engineer how to get there.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为了将这些内容串联起来，要大胆设想，并逆向工程如何实现目标。
- en: Vision > 10 year goal > 1 year goals > monthly goals > weekly goals > daily
    levers…
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 愿景 > 10年目标 > 1年目标 > 月度目标 > 周度目标 > 日度杠杆…
- en: Then, forget about the goals [like I talk about here](https://thedankoe.com/letters/learn-this-skill-if-you-want-to-stay-relevant-in-10-years/).
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，忘记那些目标[就像我在这里讨论的](https://thedankoe.com/letters/learn-this-skill-if-you-want-to-stay-relevant-in-10-years/)。
- en: The Creative Daily Routine
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创意日常惯例
- en: 'You need 3 habits:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要3个习惯：
- en: One to fill your mind.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 一个方法是填充你的思维。
- en: One to empty your mind.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个方法是清空你的思维。
- en: One to use your mind.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 一个方法是利用你的思维。
- en: When you consume too much and create too little, you get anxious.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 当你消费得太多而创造得太少时，你会感到焦虑。
- en: When you create too much and consume too little, you get bored, because you’ve
    run out of fuel to create with, so you repeat old patterns and lose the challenge
    of the craft you enjoyed.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 当你创造得太多而消费得太少时，你会感到无聊，因为你已经耗尽了创造所需的燃料，所以你会重复旧的模式，失去你所享受的工艺的挑战。
- en: This is what I call the fill, empty, use framework.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我所说的填充、清空、使用框架。
- en: A big-picture, sustainable routine that allows *you* to experiment with the
    details.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 一个大局观、可持续的例行程序，让你可以**自己**尝试细节。
- en: Experiment with filling your mind in the afternoon with books, podcasts, content,
    courses.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 在下午用书籍、播客、内容、课程来充实你的思维进行实验。
- en: Experiment with emptying your mind in the evening with journaling, planning,
    or meditation.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 在晚上通过写日记、规划或冥想来尝试清空你的思维。
- en: Experiment with using your mind in the morning writing, deep work, and building.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 在早晨用你的思维进行写作、深度工作和构建进行实验。
- en: Or, front load all of those habits first thing in the morning.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，一大早就养成所有这些习惯。
- en: Or, pull out a piece of paper to start the creation of a system. Plan out those
    3 habits over a week and start doing them. If something doesn’t flow, change it
    and try until it does.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，拿出一张纸开始创建一个系统。在一周内规划出这3个习惯，并开始执行。如果有什么不顺畅，就改变它，直到它顺畅为止。
- en: You can’t get 6 years of work done in 6 months because you aren’t aware of a
    way to do that. You aren’t aware of a way to do that because you don’t have great
    ideas flowing through your mind.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 你不可能在6个月内完成6年的工作，因为你没有意识到这样做的方法。你没有意识到这样做的方法，因为你没有很好的想法在脑海中流动。
- en: 'Your mind has 3 functions: consume, connect, create.'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 你的大脑有3个功能：消费、连接、创造。
- en: '*Ideaflow.*'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: '**Ideaflow**。'
- en: If you don’t connect ideas or create with ideas, they sit in your head and weigh
    you down.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有将想法联系起来或用想法进行创作，它们就会停留在你的脑海中，给你带来负担。
- en: You have to *actualize* an idea in order to discover the one that can only be
    discovered once it’s actualized.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须将一个想法**实现**出来，才能发现那些一旦实现就能发现的唯一想法。
- en: The tractor couldn’t be conceived without the plow.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 没有犁，就不可能构想出拖拉机。
- en: What you may or may not understand is that you can’t generate a life-changing
    idea if you haven’t already acted on the “boring” or “shallow” ideas that lead
    to that life-changing idea.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能或可能不理解的是，如果你没有对那些导致生活发生改变的“无聊”或“肤浅”的想法采取行动，你就无法产生一个改变生活的想法。
- en: You should probably focus on solving the problems staring you in the face –
    your health, money, and competency – before you focus on solving more profound,
    more complex issues that require a more developed mind to benefit from.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 在你专注于解决更深刻、更复杂的问题之前，你可能会先关注解决那些摆在你面前的实际问题——你的健康、金钱和能力。
- en: Tasks Prioritized By Leverage
  id: totrans-168
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 按杠杆作用优先排序的任务
- en: What is the one thing you can do, that both increases in effectiveness with
    consistent failure and brings you closer to your goal?
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 你能做的那件事是什么，它随着持续的失败而增加效果，并让你更接近你的目标？
- en: Now, focus only on that.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，只专注于那件事。
- en: Do it first thing in the morning, every morning.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 早上第一件事就去做，每天早上都这样做。
- en: If you only have 1 hour to build your own thing in the morning, then do only
    that and be okay with it. You don’t need to, and can’t, work 12 hours if you only
    have 1.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你早上只有1小时的时间来构建自己的事情，那么就只做那件事，并且对此感到满意。你不需要，也不能只工作1小时就工作12小时。
- en: And no, successful entrepreneurs don’t start by working 12 hours a day on their
    projects. If they’re anything like you and I, which they are, they have a current
    life they need to exchange with gradual effort.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 不，成功的创业者并不是从每天工作12小时开始他们的项目的。如果他们和你我一样，他们确实如此，他们需要用渐进的努力来交换他们当前的生活。
- en: If you have more time, or are already deep into building your own thing, tier
    out the rest of your work from highest to lowest leverage, or lowest to highest
    entropy.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还有更多时间，或者已经深入到自己的事情中，从最高到最低影响力，或者从最低到最高熵，逐步淘汰你的其他工作。
- en: 'My workday is as follows:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 我的工作日如下：
- en: Writing first thing because that’s the entire fuel of my business. Writing content,
    newsletters, landing pages, promotions, etc is the business model. Typing at a
    computer.
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 早上第一件事就是写作，因为这是我的整个业务的燃料。写作内容、通讯、着陆页、促销等是商业模式。在电脑上打字。
- en: Go on a walk and attempt to learn something new for the day.
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 去散步，并尝试在当天学习新知识。
- en: Do admin work for Kortex and start opening myself up to conversations and responding
    to people.
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为Kortex做行政工作，并开始敞开心扉与人交谈，回应他人。
- en: Unless I have a new project I’m building, that’s really it.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 除非我有一个新的项目在开发，否则也就这样了。
- en: The new project will demand more time until it is systemized and I return back
    to a baseline ~4 hours of work.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 新项目将需要更多的时间，直到它系统化，我才能回到每天大约4小时的工作基准。
- en: The last tasks in your workday, when ordered by priority, are probably optional
    or easily automated or outsources, so consider doing that.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 你工作日中的最后几项任务，按照优先级排序，可能是不必要的或者容易自动化或者外包的，所以考虑去做这些。
- en: Thank you for reading.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您阅读。
- en: We’ll talk in the next letter.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在下一封信中讨论。
- en: – Dan
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
