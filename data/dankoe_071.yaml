- en: The One-Person Business Revisited (Turn Yourself Into A Business)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 重新审视一人企业（将自己变成企业）
- en: 原文：[https://thedankoe.com/letters/the-one-person-business-revisited-turn-yourself-into-a-business/](https://thedankoe.com/letters/the-one-person-business-revisited-turn-yourself-into-a-business/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/the-one-person-business-revisited-turn-yourself-into-a-business/](https://thedankoe.com/letters/the-one-person-business-revisited-turn-yourself-into-a-business/)
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1307">![](../Images/3a9b1933d895ae7b6478bc923c112a28.png)</picture>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1307">![](../Images/3a9b1933d895ae7b6478bc923c112a28.png)</picture>
- en: A new society has emerged.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 一个新的社会已经出现。
- en: A virtual one.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 一个虚拟的。
- en: We all thought that a “virtual reality” was a few years out from existence and
    that it would be composed of technology like Apple’s new VR headset.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都认为“虚拟现实”离消失只有几年时间，它将由像苹果的新VR头戴设备这样的技术组成。
- en: But that’s not how evolution works.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 但进化并非如此运作。
- en: Evolution is about solving problems that cause our suffering.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 进化是关于解决导致我们痛苦的问题。
- en: It is a slow burn.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个缓慢的燃烧过程。
- en: The emergence of this new society was fast like an exploding star. We called
    it social media.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这个新社会的出现就像一颗爆炸的恒星一样快。我们称之为社交媒体。
- en: There were burning problems in human life that led to programmers, visionaries,
    and businessmen building a mass solution.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 人类生活中存在一些紧迫问题，导致程序员、愿景家和商人构建了一个大规模的解决方案。
- en: Communication was local.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 交流是地方性的。
- en: Information was local.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 信息是地方性的。
- en: Business was local.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 商业是地方性的。
- en: Opportunities were local.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 机会是地方性的。
- en: Centuries of geographic restriction changed in the blink of an eye.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 几个世纪的地理限制在瞬间改变。
- en: The internet allowed for the emergence of social media.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网允许社交媒体的出现。
- en: Social media allowed for the emergence of the creator economy.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体允许创作者经济的出现。
- en: The creator economy allowed for the advancement of decentralization.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者经济允许去中心化的进步。
- en: The Industrial Revolution caused an unsustainable development of dominator hierarchies
    – more power and less people at the top, less power with more people at the bottom.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 工业革命导致了支配性等级的不可持续发展——上层权力更大，人数更少，下层权力更小，人数更多。
- en: The Age of Information began to reverse this effect with the development of
    creator actualization hierarchies.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 随着创作者实现层次的发展，信息时代开始逆转这一效应。
- en: Creators educate, entertain, and inspire those beneath them with content and
    courses – but there is nothing holding any individual back from advancing to the
    top of the ladder.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者通过内容和课程教育、娱乐和激励他们之下的人——但没有任何东西阻止任何个人攀登到梯子的顶端。
- en: 'Let’s deconstruct this a bit:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们稍微分解一下：
- en: What Is The Creator Society?
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是创作者社会？
- en: <picture decoding="async" class="wp-image-1302">![](../Images/ac7a86122d62d9818275545ef2eddbb5.png)</picture>
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-1302">![](../Images/ac7a86122d62d9818275545ef2eddbb5.png)</picture>
- en: With the development of the internet, information has spread beyond measure.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 随着互联网的发展，信息传播得无以复加。
- en: This led to the development of a more advanced, global, and accessible society.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这导致了更先进、全球化和可及的社会的发展。
- en: Societies consist of institutions, and communities with shared beliefs, and
    cultural ideas.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 社会由机构、有共同信仰的社区和文化观念组成。
- en: The most notable aspects are the school system, workforce, social and business
    tribes, and religious establishments.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 最显著的方面是教育体系、劳动力、社会和商业群体，以及宗教机构。
- en: Social media has expanded and collapsed the lines between these.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体扩大并缩小了这些界限。
- en: Everything is becoming more holistic and interconnected like rain to the ocean
    as the pattern of Universal division and unity hints at.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 一切都变得更加整体化和互联，就像雨滴融入大海一样，正如宇宙分化和统一的模式所暗示的那样。
- en: 'The public school system had many problems:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 公立学校体系有许多问题：
- en: Convergent thinking
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 聚焦式思维
- en: Compartmentalized learning
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分隔式学习
- en: Conformity over authenticity
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 顺从胜过真实性
- en: Memorization over process
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记忆胜过过程
- en: Failure as something to avoid
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 失败是应该避免的
- en: Authorities as unquestionable
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 权威是不容置疑的
- en: Long work over efficiency and true value
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 长期工作胜过效率和真正价值
- en: Intelligence defined by book smarts
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智力由书本知识定义
- en: Decade-old curriculums that only worry about training you into a replaceable
    job
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 只关注培训你进入可替代工作的十年前课程
- en: 'The new school system in the creator society allows individuals to:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者社会的新教育体系允许个人：
- en: Pursue their curiosity
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 追求他们的好奇心
- en: Find teachers (creators) that they learn best from
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 寻找他们最能从中学习的教师（创作者）
- en: Treat learning as a part of life rather than an annoying obligation
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将学习视为生活的一部分，而不是一个令人烦恼的义务。
- en: Learn modern skills that allow you to adapt fast to the fast-changing environment
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习现代技能，让你能够快速适应快速变化的环境。
- en: Find specific knowledge that contributes to their pursuit of self-generated
    (rather than assigned) goals
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 寻找有助于他们追求自我生成（而非分配）目标的特定知识。
- en: Prioritize entrepreneurship as it is the only logical end goal for those that
    want more out of life
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将创业放在首位，因为这是那些想要从生活中获得更多的人的唯一合理终极目标。
- en: The new school system is internet content. None of this is labeled. It is just
    a part of virtual life.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 新的教育体系是互联网内容。这一切都没有被标记。这只是虚拟生活的一部分。
- en: The religious establishments narrowed the minds of its followers and fought
    any perspective that contradicted their own.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 宗教机构限制了其追随者的思想，并反对任何与他们自身观点相矛盾的观点。
- en: Now, spiritual awareness and education are accessible in most creator brands.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，精神意识和教育在大多数创造者品牌中都是可获得的。
- en: You can open your mind, study different perspectives, and self-experiment until
    you cultivate a philosophy that suits you.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以打开你的思想，研究不同的观点，进行自我实验，直到你培养出一个适合你的哲学。
- en: This is not only for spiritual growth, but mental, financial, and health-related.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅是为了精神成长，还包括精神、财务和健康相关方面。
- en: What Is The Creator Economy?
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创作者经济是什么？
- en: The exchange of goods has been a natural part of society since the inception
    of human interaction.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 商品交换自人类互动开始以来一直是社会的一个自然部分。
- en: Value creation and exchange are the foundation of communication and relationships.
    Humans are deeply social creatures.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 价值创造和交换是沟通和关系的基础。人类是深具社会性的生物。
- en: Money, or currency, is a neutral form of value.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 金钱，或货币，是一种中立的价值形式。
- en: Individuals spend it on what they perceive as valuable.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 个人会将其花费在他们认为有价值的事物上。
- en: What they perceive as valuable is dependent on their identity, perspective,
    goals, current state of mind, and level of awareness of their problems.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 他们认为有价值的是依赖于他们的身份、观点、目标、当前的心态以及他们对问题的认识水平。
- en: We can start to see the importance of marketing and sales – as they are the
    main skills for illustrating the value you have to offer.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我们开始意识到营销和销售的重要性——因为它们是展示你所能提供价值的核心技能。
- en: Marketing and sales take everything above into account.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 营销和销售会考虑上述所有因素。
- en: If you don’t position a product or service to a specific person (identity) with
    a specific goal that implies a specific problem, you won’t make money.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有将产品或服务定位给一个具有特定目标（身份）的特定个人，该目标暗示了一个特定问题，那么你将不会赚钱。
- en: The Creator Economy is composed of individuals distributing value in the form
    of content and products.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者经济由个人组成，他们通过内容和产品形式分发价值。
- en: They educate their audience on the skills and interests that will aid in the
    actualization of their goals.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 他们教育他们的观众，传授有助于实现他们目标的技能和兴趣。
- en: Their products or services are meant to generate results and move them faster
    toward those goals.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的产品或服务旨在产生结果，并帮助他们更快地实现目标。
- en: My One-Person Business Philosophy
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我的个人商业哲学
- en: There are almost 7B people on this planet. Someday, I hope, there will be almost
    7B companies. – Naval
  id: totrans-66
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这个星球上有近70亿人。我希望有一天，几乎会有70亿家公司。 —— 纳瓦尔
- en: The best businesses change lives.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的企业能改变人们的生活。
- en: And transformations make a winning product.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 转变造就了获胜的产品。
- en: Stop trying to solve imaginary problems.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 停止试图解决虚构的问题。
- en: Solve your problems.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 解决你的问题。
- en: Change your own life.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 改变你自己的生活。
- en: Package up the method.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 将方法打包起来。
- en: Slap a price tag on it.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 给它贴上一个价格标签。
- en: You’re less likely to fail if you solve real, meaningful problems.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你解决了真实、有意义的问题，你失败的可能性会更小。
- en: This is the problem with most people entering business.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是大多数进入商业的人遇到的问题。
- en: They don’t have an understanding of marketing, sales, psychology, or evolution
    in general.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 他们对营销、销售、心理学或一般进化没有理解。
- en: Stop trying to land on Saturn or build a billion-dollar tech company when a
    majority of the population is suffering from low-consciousness problems (that
    are holding the collective ego back from enlightenment).
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 当大多数人正遭受低意识问题（这些问题阻碍了集体自我从启蒙中解脱出来）时，停止试图登陆土星或建立一个价值十亿美元的技术公司。
- en: Start as a [micro education business](https://thedankoe.com/letters/the-new-wave-of-micro-businesses-monetize-your-knowledge/)
    that helps people solve the *real* problems in their life.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 从一个帮助人们解决生活中**真实**问题的[微型教育业务](https://thedankoe.com/letters/the-new-wave-of-micro-businesses-monetize-your-knowledge/)开始。
- en: '*That* is how you contribute to the happiness and evolution of humanity.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '*这就是*你为人类的幸福和进化做出贡献的方式。'
- en: 'You do this by understanding the eternal markets: health, wealth, relationships,
    and happiness.'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过理解永恒的市场：健康、财富、关系和幸福来实现这一点。
- en: 'By solving your own problems in these domains, you:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 通过解决这些领域中的问题，你：
- en: Push toward your own self-actualization
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 推动你自己的自我实现
- en: Create a unique map with your own story that you can pass down
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个包含你自己的故事的独特地图，你可以将其传承下去
- en: Make an income by helping others heal and achieve their goals
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过帮助他人疗愈和实现他们的目标来赚取收入
- en: From there, everyone is at a higher state of consciousness.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，每个人都处于更高的意识状态。
- en: We can then do what we love with our time and solve deeper problems that we
    are passionate about (like landing on Saturn).
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以用我们的时间做自己喜欢的事情，解决我们热衷于解决的更深层的问题（比如登陆土星）。
- en: The Path To Self-Monetization
  id: totrans-87
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自我货币化的路径
- en: <picture decoding="async" class="wp-image-1303">![](../Images/60022e7f9d5090b1fed33b7bf1ae0bf7.png)</picture>
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-1303">![](../Images/60022e7f9d5090b1fed33b7bf1ae0bf7.png)</picture>
- en: Social media is a new society.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体是一个新的社会。
- en: Personal brands are the “people” of that society.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 个人品牌是这个社会的“人”。
- en: And no, this is not limited to people that have a business.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 不，这不仅仅限于有生意的人。
- en: Creators large and small are hiring left and right.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 大大小小的创造者都在四处招聘。
- en: Brands and corporations are hiring those that display their value in public.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 品牌和公司正在招聘那些在公共场合展示他们价值的人。
- en: Social media is a public job board, public school, public note-taking system,
    and public party where you can find friends and nurture business relationships.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体是一个公共的工作招聘板、公共学校、公共笔记系统，以及一个你可以找到朋友和培养商业关系的公共派对。
- en: To start, you can work for another creator to gain experience in the new society.
    This is a great option, but you can also go straight into building your own thing.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你可以为其他创造者工作以获得新社会的经验。这是一个很好的选择，但你也可以直接开始建立自己的事情。
- en: Path 1) Learn A Skill, Sell A Skill
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 路径 1) 学习一项技能，出售一项技能
- en: 'This is what most people recommend you do to start making money fast:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 这是大多数人推荐你快速赚钱的方法：
- en: Learn a modern skill that creators or brands use in their business (like email
    marketing, funnel design, or content writing)
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习创造者或品牌在其业务中使用的现代技能（如电子邮件营销、漏斗设计或内容写作）
- en: Create content based around that skill to flex your knowledge (frankly, this
    won’t gain many followers. Your profile will be more like a resume).
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 围绕那个技能创建内容，以展示你的知识（坦白说，这不会吸引很多追随者。你的个人资料更像是一份简历）。
- en: Charge higher prices for a freelance or consulting service because you don’t
    have the audience to sell a product in your sleep.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于你没有受众在睡梦中销售产品，因此你可以为自由职业或咨询服务收取更高的价格。
- en: 'For any of this to work, you will have to [learn the evergreen skills](https://thedankoe.com/letters/the-1-million-dollar-skill-stack-learn-in-this-order/):
    writing, speaking, marketing, and sales.'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 要让这一切发挥作用，你必须[学习永恒的技能](https://thedankoe.com/letters/the-1-million-dollar-skill-stack-learn-in-this-order/)：写作、演讲、营销和销售。
- en: Path 2) Become A Value Creator Around Your Interests
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 路径 2) 在你的兴趣周围成为价值创造者
- en: <picture loading="lazy" decoding="async" class="wp-image-1304">![](../Images/433792543e77ef6202d15412a7aa14a9.png)</picture>
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-1304">![](../Images/433792543e77ef6202d15412a7aa14a9.png)</picture>
- en: This is difficult to articulate, because the most common problem is, “I don’t
    have any interests.”
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 这很难表达，因为最常见的问题是，“我没有任何兴趣。”
- en: So let’s start there.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 所以让我们从这里开始。
- en: You create interest in a topic by investing energy in a goal.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过在目标上投入精力来创造对某个主题的兴趣。
- en: That way you feel as if you are wasting your investment if you don’t achieve
    it. The pressure holds you accountable.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 这样一来，如果你没有实现它，你会觉得自己在浪费投资。压力让你负责。
- en: True goals are based on the eternal markets in pursuit of self-actualization.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 真正的目标是基于追求自我实现的永恒市场。
- en: The interests you learn along the way are applied to the achievement of that
    goal.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 你在旅途中学习的兴趣被应用于实现那个目标。
- en: 'For the health market, I can become interested in sub-topics of nutrition,
    training, and mental health:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 对于健康市场，我可以对营养、训练和心理健康等子主题产生兴趣：
- en: Bodybuilding
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 健身
- en: The ancestral diet
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人类祖先的饮食
- en: Minimalist training
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 极简主义训练
- en: Yoga
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 瑜伽
- en: Mindfulness
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 正念
- en: 'For the wealth market, I can become interested in sub-topics of business, career
    development, and finance:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 对于财富市场，我可以对商业、职业发展和金融的子主题产生兴趣：
- en: Freelancing
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自由职业
- en: Software as a service
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 软件即服务
- en: Resume building
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简历构建
- en: Interview preparation
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 面试准备
- en: Budgeting
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预算
- en: Any skill listed in the previous section
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上一节中列出的任何技能
- en: 'For the relationships market, I can become interested in sub-topics of social
    dynamics, dating, and marriage:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 对于关系市场，我可以对社交动态、约会和婚姻的子话题产生兴趣：
- en: Couples therapy
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 夫妻治疗
- en: Confidence and charisma
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自信和魅力
- en: Day game
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 白天游戏
- en: How to approach
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何接近
- en: All help me push toward the development of each area. This is how you become
    a modern Renaissance man.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都帮助我推动每个领域的发展。这就是你成为一个现代文艺复兴人士的方式。
- en: You must become a lifelong autodidact (self-learner) if you want to be truly
    irreplaceable.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要真正不可替代，你必须成为一个终身自学者（自学成才的人）。
- en: You can learn anything in record time thanks to internet content, courses, and
    unconventional schooling in the new society.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 由于新社会中的互联网内容、课程和非传统教育，你可以以创纪录的时间学习任何东西。
- en: Path 3) Do Both For Maximum Effect
  id: totrans-131
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 路径3）双重行动以获得最大效果
- en: With a personal brand, you will be forced to learn most modern skills to make
    it a success.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 拥有一个个人品牌，你将不得不学习大多数现代技能以使其成功。
- en: You will have to build your own landing pages, funnels, emails, content, profile
    design, graphics, and the rest to make your brand a success.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 你将不得不自己建立自己的着陆页、漏斗、电子邮件、内容、个人资料设计、图形以及其他一切，以使你的品牌成功。
- en: If it doesn’t help your brand grow, it won’t help others, and it isn’t worth
    learning in this case.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 如果它不能帮助你的品牌成长，它也不会帮助他人，在这种情况下学习它也不值得。
- en: When you get results for your own brand, you then have the knowledge to help
    others with theirs.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 当你为自己的品牌获得结果时，你就有知识去帮助他人。
- en: The product or service you will sell (to practice your skill development) will
    be based on your interests.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 你将基于你的兴趣销售产品或服务（以练习你的技能发展），这将基于你的兴趣。
- en: You will create a minimum viable offer around those interests with a freelance
    or consulting service.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 你将围绕这些兴趣创建一个最小可行产品，提供自由职业或咨询服务。
- en: As you grow your audience with the content you produce, you can eventually turn
    that into a product that sells with less effort.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你通过你生产的内容扩大你的受众，你最终可以将它转化为一个需要较少努力的可以销售的产品。
- en: This is a longer path, but oh so worth it.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个更长的路径，但非常值得。
- en: You drastically improve yourself, and your business has more leverage than most
    out there.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 你极大地提升了自己，你的业务比大多数人都更有杠杆作用。
- en: The 4 Pillars Of A 6-Figure One-Person Business
  id: totrans-141
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6位数的单人商业的4个支柱
- en: <picture loading="lazy" decoding="async" class="wp-image-1305">![](../Images/50d0208ad71c1a9df6353885bc7af773.png)</picture>
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-1305">![](../Images/50d0208ad71c1a9df6353885bc7af773.png)</picture>
- en: The one-person business model can have many definitions.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 单人商业模式可以有多个定义。
- en: And now that I have a small team, I can’t really call myself a “one-person business,”
    but I’m going to redefine it so that I can (lol).
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我有一个小团队，我实际上不能称自己为“单人商业”，但我将重新定义它，这样我就可以（哈哈）。
- en: On top of that, I pushed a bit too far into a business model I don’t care for.
    I am actively working to get back to one person and maybe a VA. I’m okay with
    the decrease in income that comes from that.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我过度投入了一个我不关心的商业模式。我正在积极努力回到单人模式，也许再加上一个虚拟助理。我对由此带来的收入减少是可以接受的。
- en: I’ve realized what I want (writing and creative challenges) which allows me
    to ruthlessly eliminate what stands in the way (with time).
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经意识到我想要的是什么（写作和创意挑战），这让我能够无情地消除阻碍（用时间）。
- en: The one-person business model is *turning yourself into the business.*
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 单人商业模式是将自己变成业务。
- en: It is a novel and attention-grabbing way of saying, “*Become high-value and
    put yourself out there until enough people know who you are, what you do, and
    why you do it. Opportunities will compound.”*
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种新颖且引人注目的说法，“*成为高价值并展示自己，直到足够的人知道你是谁，你做什么，以及你为什么这样做。机会会累积。”*
- en: In a nutshell, that’s all you really need to do to succeed.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，这就是你真正需要做的以成功。
- en: 'For clarity, let’s dive into the 4 pillars of the one-person business:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 为了清晰起见，让我们深入了解单人商业的4个支柱：
- en: <picture loading="lazy" decoding="async" class="wp-image-1310">![](../Images/1cc066aea85798e0bb39c83f5576e1e2.png)</picture>
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-1310">![](../Images/1cc066aea85798e0bb39c83f5576e1e2.png)</picture>
- en: Brand – You Are The Niche
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 品牌 – 你是细分市场
- en: Your personal brand is your “self” or “identity” in the new society.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 你的个人品牌是你在新社会中的“自我”或“身份”。
- en: Your identity is the underlying story that shapes your perspective.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 你的身份是塑造你观点的潜在故事。
- en: Your perspective contains goals from which you perceive situations.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 你的观点包含目标，你从中感知情况。
- en: These goals can be assigned to you (social conditioning) or self-generated (in
    alignment with your vision).
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 这些目标可以分配给你（社会条件）或自我生成（与你的愿景一致）。
- en: When you read a book, you will interpret it differently from the next person,
    because you have different goals as your lens.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 当你阅读一本书时，你的解读会与下一个人不同，因为你的目标作为你的视角是不同的。
- en: If I read the book *Awareness* at a low financial point in my life, I will absorb
    ideas related to reaching my financial vision (that I can distribute in my content).
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我在生活的一个低财务点阅读《意识》这本书，我会吸收与实现我的财务愿景相关的想法（我可以在我的内容中传播）。
- en: Another person that reads the book at a high relationship point in their life,
    they may get nothing from it, or absorb ideas to aid in the nurturing of that
    relationship.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个人在生命中的关键时刻阅读这本书，他们可能从中一无所获，或者吸收一些有助于培养这种关系的想法。
- en: Your brand is your vision for the future (and you vision evolves as you do).
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 你的品牌是你对未来的愿景（而且你的愿景随着你的成长而发展）。
- en: Your vision for the future implies that you have, or are learning, the skills
    and interests necessary to achieve it.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 你对未来的愿景意味着你已经拥有，或者正在学习实现它的技能和兴趣。
- en: Your job is to illustrate this wherever a reader can come in contact with you.
    All of your content will be written from the lens of your brand.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 你的任务是展示这一点，让读者在任何可以接触你的地方都能看到。你所有的内容都将从你品牌的视角来写。
- en: If my current vision / goal / purpose is to make more money…
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我的当前愿景/目标/目的是赚更多的钱……
- en: And the skills I’ve learned or am learning are marketing, health, and spirituality…
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 我学到的或正在学习的技能是营销、健康和精神领域……
- en: My bio would be, “I write about marketing, health, and spirituality so you can
    build a holistic one-person business.”
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 我的个人简介将是，“我写关于营销、健康和精神，这样你就可以建立一个全面的一人企业。”
- en: Yes, even health and spirituality can be framed as a way to help with business.
    This is where most people get confused about incorporating their interests into
    a confined niche they feel tied to.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，甚至健康和精神层面也可以被定位为帮助商业发展的方式。这就是大多数人混淆于如何将他们的兴趣融入他们感到有联系的狭小领域的原因。
- en: What are you leading people toward?
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 你在引导人们走向何方？
- en: That’s how you attract followers.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何吸引追随者。
- en: Content – Documenting Your Mind
  id: totrans-169
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 内容 – 记录你的思想
- en: 'I like to think of social media as a public note-taking system where you jot
    down:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢将社交媒体视为一个公共笔记系统，你在其中记下：
- en: What you are learning and how it applies to your life
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你正在学习的内容以及它如何应用于你的生活
- en: Your thoughts and opinions on your skills and interests
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你对你技能和兴趣的看法和观点
- en: The lessons you are learning throughout the story of life
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你在生活的故事中学习到的教训
- en: Without knowing it, we are actively building out the collective consciousness
    in an explorable fashion on the internet.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 在不知不觉中，我们正在以可探索的方式在互联网上积极构建集体意识。
- en: But, you can’t just write things out and pray that you grow your brand.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，你不能只是写些东西然后祈祷你的品牌能增长。
- en: You have to study marketing, and persuasion, and immerse yourself in content
    that does well so you can note the patterns between them all.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须学习营销、说服技巧，并沉浸于表现良好的内容中，以便你能注意到它们之间的模式。
- en: I would recommend the free course on the [Digital Economics](https://digitaleconomics.school)
    landing page – you just enter your email at the top of the page.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 我会推荐[数字经济学](https://digitaleconomics.school)着陆页上的免费课程 – 你只需在页面顶部输入你的电子邮件。
- en: If you haven’t learned marketing, sales, or copywriting – start now. They will
    change your life. And there is too much to go over in this letter about them (double
    and I’ve talked about them multiple times before, [this letter is a good starting
    point](https://thedankoe.com/letters/value-creation-the-skill-that-built-my-one-person-business/)).
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还没有学习营销、销售或文案写作 – 现在就开始吧。它们将改变你的生活。在这封信中关于它们的内容太多（双重和我在之前多次讨论过它们，[这封信是一个好的起点](https://thedankoe.com/letters/value-creation-the-skill-that-built-my-one-person-business/))。
- en: Product – Public Personal Projects
  id: totrans-179
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 产品 – 公共个人项目
- en: Under the one-person business philosophy, you contribute to the new society
    by solving your own problems and selling the solution.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 在个人企业哲学下，你通过解决自己的问题并销售解决方案来为新的社会做出贡献。
- en: 'Here’s the progression:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 进展如下：
- en: Identify a problem in your life
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别你生活中的一个问题
- en: Turn it into a personal project for experience
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将其转化为一个个人项目以获得经验
- en: Turn it into a minimum viable offer
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将其转化为一个最小可行性产品
- en: Start selling for $500-$1000 (freelancing or consulting)
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始以500-1000美元的价格销售（自由职业或咨询）
- en: Build your audience along the way with content
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在过程中通过内容建立你的受众
- en: Increase the depth and complexity of your offer
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高你提供的深度和复杂性
- en: Productize it when you feel ready so it can sell in your sleep
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你准备好时，将其产品化，这样它就可以在睡眠中销售
- en: This will take 1-3 years.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能需要1-3年。
- en: If your goal is to make more money in business or your career, you can learn
    a skill like email marketing.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的目标是增加商业或职业生涯中的收入，你可以学习像电子邮件营销这样的技能。
- en: If your goal is to get ripped and increase your attraction & confidence, you
    can go to the gym and fix your nutrition.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的目标是变得健美并增加你的吸引力与自信，你可以去健身房并调整你的营养。
- en: Once you do, you can begin selling it as a freelance or consulting service.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你做到了，你就可以开始将其作为自由职业或咨询服务来销售。
- en: With the email marketing example, freelance is the obvious option.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 在电子邮件营销的例子中，自由职业者是明显的选择。
- en: '*Teaching* others often gets swept under the rug.'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: '*教授*他人往往被忽视。'
- en: You can teach other creators or brands what you’ve learned in your email marketing
    pursuits – especially *if you applied it to your own brand and saw results along
    the way**.*
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以教授其他创作者或品牌你在电子邮件营销追求中学到的知识——特别是*如果你将其应用于你自己的品牌，并在过程中看到了结果**。
- en: Where does a “project” come into play?
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: “项目”在哪里发挥作用？
- en: Projects are how you actually solve your problems in the real world.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 项目是你实际上在现实世界中解决问题的方法。
- en: They force you to apply what you learn.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 它们迫使你应用你所学的。
- en: They are also tangible, they are your result.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 它们也是可触摸的，它们是你的成果。
- en: You can iterate on them and get better with time.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以迭代它们，并随着时间的推移变得更好。
- en: You can reflect on them and make it easier to achieve for the next person.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以反思它们，并使它们对下一个人更容易实现。
- en: With email marketing, write an email sequence for your own brand. You can practice
    selling someone else’s product (affiliate), or practice promoting your favorite
    books or products. Craft a persuasive argument around them.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 在电子邮件营销中，为你的品牌写一个电子邮件序列。你可以练习销售他人的产品（联盟营销），或者练习推广你最喜欢的书籍或产品。围绕它们构建一个有说服力的论点。
- en: Then, do the same thing for your favorite brand. Build them an email sequence.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，为你的最喜欢的品牌做同样的事情。为他们构建一个电子邮件序列。
- en: Now that you have real-world practice, you can either pitch your services to
    that brand, or start helping others build their own out.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你有了现实世界的实践，你可以向那个品牌推销你的服务，或者开始帮助他人建立自己的。
- en: Teaching is how you identify knowledge gaps.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 教授是识别知识差距的方式。
- en: That is the only way you will be able to fill them.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 那是你唯一能够填补它们的方式。
- en: By not building projects and teaching what you learn, your journey will be slow
    and painful.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有通过构建项目和教授你所学到的知识，你的旅程将会缓慢而痛苦。
- en: Marketing – Sell To Yourself
  id: totrans-208
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 营销 – 向自己销售
- en: You won’t make a single penny if you never promote yourself.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你从不推广自己，你将一分钱也赚不到。
- en: Simple as that.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 简单就是这样。
- en: People ask me (from a state of stress, overwhelm, and panic) why they aren’t
    making money from their efforts.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 人们问我（处于压力、压倒性和恐慌的状态）为什么他们从他们的努力中没有赚到钱。
- en: It’s because they do everything but promote their products or services.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为他们做了一切，但就是没有推广他们的产品或服务。
- en: 'Marketing exists across the entirety of your brand but is most prevalent in:'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 营销贯穿你的整个品牌，但最普遍的是：
- en: Your landing pages for your products and services
  id: totrans-214
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你产品和服务的着陆页
- en: Your emails where you promote them
  id: totrans-215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你推广它们的电子邮件
- en: Your content where you promote them
  id: totrans-216
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你推广它们的内 容
- en: Your outreach messages where you see if others are a fit for them
  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在你的推广信息中，看看其他人是否适合他们
- en: Again, I’ve talked about this all before, and I give my exact systems in [Digital
    Economics](https://digitaleconomics.school), so let’s go over a framework you
    can practice with.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，我之前已经谈过这个问题，我在[数字经济学](https://digitaleconomics.school)中给出了我的确切系统，所以让我们回顾一下你可以练习的框架。
- en: '**Identify Their Goals or Desired Outcome**'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: '**确定他们的目标或期望结果**'
- en: You have to know what your audience wants.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须知道你的受众想要什么。
- en: Make it top-of-mind by asking them or illustrating what the goal is in your
    marketing.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 通过询问他们或在你的营销中说明目标，让他们牢记于心。
- en: When you are the niche, this is a goal that you’ve already achieved. You should
    already know what is desirable to your audience through self-reflection.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 当你是细分市场时，这已经是一个你已经实现的目标。你应该已经通过自我反思知道什么对你的受众来说是可取的。
- en: '**Identify What Is Standing In The Way**'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: '**确定阻碍你的因素**'
- en: What is the reason people aren’t achieving their goals?
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么人们不能实现他们的目标？
- en: What is the reason you didn’t achieve the goal at the start?
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么你没有在开始时实现目标？
- en: Write it out in your promotions or ask the person you are talking to in your
    outreach messages.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的推广或询问你在推广信息中与谈话的人时写出来。
- en: “What’s preventing you from achieving [the goal they mentioned]?”
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: “是什么阻止你实现[他们提到的目标]？”
- en: Present Your Solution To Solve A Burning Problem
  id: totrans-228
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 展示你的解决方案以解决燃眉之急
- en: Now that they are clear on the goal and what is standing in the way, you know
    whether or not they are a fit for your solution.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 既然他们已经明确了目标以及阻碍他们的因素，你就知道他们是否适合你的解决方案。
- en: If they aren’t, wish them a good day and leave them alone.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 如果他们不是的话，祝他们一天愉快，然后让他们独处。
- en: If they are, ask them how their life would be impacted if they could achieve
    that goal – this shines a light on the problem they are facing.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 如果他们是的话，询问他们如果能够实现那个目标，他们的生活将如何受到影响——这有助于揭示他们面临的问题。
- en: From here, you can present your offer as a potential solution.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 从这里，你可以将你的提议作为一个潜在解决方案来展示。
- en: To practice this process more as a beginner, read this letter on [The Non-Needy
    Networking Process](https://thedankoe.com/letters/how-to-network-with-millionaires-and-build-a-name-for-yourself/).
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 作为初学者，为了更好地练习这个过程，请阅读这篇关于[非需求型网络过程](https://thedankoe.com/letters/how-to-network-with-millionaires-and-build-a-name-for-yourself/)的信件。
- en: That’s all you need to know about the one-person business model for now.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 目前你所需要了解的就是关于单人商业模式的全部。
- en: Feel free to watch through the rest of [The One Person Business playlist](https://youtube.com/playlist?list=PLB4ePXk6nBaeG3fD13NaRMsRsEc2iCsV4)
    on my YouTube.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎观看我YouTube上的[单人商业播放列表](https://youtube.com/playlist?list=PLB4ePXk6nBaeG3fD13NaRMsRsEc2iCsV4)的其余部分。
- en: Enjoy the rest of your day.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 享受你余下的这一天。
- en: – Dan Koe
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹·科
