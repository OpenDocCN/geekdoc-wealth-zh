- en: 4 Hours Of Focused Work Will Change Your Life
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 4小时的专注工作将改变你的生活
- en: 原文：[https://thedankoe.com/letters/4-hours-of-focused-work-will-change-your-life/](https://thedankoe.com/letters/4-hours-of-focused-work-will-change-your-life/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/4-hours-of-focused-work-will-change-your-life/](https://thedankoe.com/letters/4-hours-of-focused-work-will-change-your-life/)
- en: 'Being able to intentionally direct your attention at will not only save you
    time, but money (see: [attention economy](https://markmanson.net/attention)).'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 能够有意地随意引导你的注意力不仅能节省你的时间，还能节省金钱（见：[注意力经济](https://markmanson.net/attention)）。
- en: Mainstream news outlets monetize your attention through fear.
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主流新闻机构通过恐惧来货币化你的注意力。
- en: Social media accounts steal your attention through “relatable” and often self-deprecating
    memes.
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 社交媒体账户通过“有共鸣”的以及经常自我贬低的梗来窃取你的注意力。
- en: Twitter, Instagram, and Facebook know exactly what colors, topics, and content
    delivery style make you tick.
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Twitter、Instagram和Facebook确切地知道哪些颜色、主题和内容传递风格能让你兴奋。
- en: There is always something to fill the void that comes with boredom.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 总是有东西可以填补无聊带来的空虚。
- en: Just now, I clicked over to check my Twitter notifications.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 刚才，我点击过去查看我的Twitter通知。
- en: From a top down point of view, this is the big problem that the modern world
    faces.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 从自上而下的角度来看，这是现代世界面临的大问题。
- en: In terms of mental health, people focus on their thoughts instead of the reason
    behind the thoughts.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在心理健康方面，人们关注的是他们的想法，而不是想法背后的原因。
- en: In terms of physical health, people focus on short term pleasure instead of
    long term energy.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在身体健康方面，人们关注的是短期快乐，而不是长期能量。
- en: In terms of monetary health, people focus on get rich quick schemes instead
    of sustainable business growth.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在财务健康方面，人们关注的是快速致富的方案，而不是可持续的业务增长。
- en: We aren’t here to talk about these. We are here to talk about focused work,
    but you can see the problem that the attention economy has created.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不是来谈论这些的。我们是来谈论专注的工作，但你也可以看到注意力经济所造成的问题。
- en: Focus is a currency and we must invest it wisely.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 专注是一种货币，我们必须明智地投资它。
- en: Minimum Risk, Potential Reward
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 风险最小，潜在回报
- en: The attention economy is only disastrous if you are on the consumer end.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 注意力经济只有在你是消费者端时才会是灾难性的。
- en: Opportunities are springing up like weeds and in order to take advantage of
    them, you need to produce.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 机会像杂草一样涌现，为了利用它们，你需要产出。
- en: You need to focus your attention on building something with minimal risk, but
    with the potential to pay off big.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要专注于建立风险最小但有可能带来巨大回报的东西。
- en: These are called asymmetric bets.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这些被称为非对称赌注。
- en: '![Asymmetric Bets Illustration](../Images/5496c897745f09a0ae36ccf1f9167995.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![非对称赌注插图](../Images/5496c897745f09a0ae36ccf1f9167995.png)'
- en: Asymmetric Bets
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 非对称赌注
- en: 'Some opportunities that have popped up in the last 5-10 years (that you can
    still take advantage of):'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去5-10年中出现的某些机会（你仍然可以利用）：
- en: Cryptocurrency
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 加密货币
- en: Building a social media audience
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立社交媒体受众
- en: Offering a niche freelance service
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供专业化的自由职业服务
- en: Starting a marketing agency
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始一家营销公司
- en: Productizing your expertise and selling it online
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将你的专业知识产品化并在网上销售
- en: Starting a podcast or blog
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始播客或博客
- en: 4 years ago I started freelancing with web design. This takes zero dollars and
    some time on YouTube to do, but has the potential of replacing your income.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 4年前，我开始从事网页设计自由职业。这不需要一分钱，只需要在YouTube上花一些时间，但有可能取代你的收入。
- en: 1.5 years ago I started a Twitter account that has grown to 40,000 followers
    and allowed me to transition out of done for you client work.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 1.5年前，我创建了一个Twitter账号，它已经增长到40,000名关注者，并让我从为客户完成工作的业务中转型出来。
- en: Now I am in the starting phases of a blog, YouTube channel, and podcast. Given
    I follow the right formula, I have no doubt that these will pay off big.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我正处于博客、YouTube频道和播客的起步阶段。鉴于我遵循了正确的公式，我毫不怀疑这些会带来巨大的回报。
- en: 'The Formula: Menial upfront investment + persistence + iteration = exponential
    reward.'
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 公式：前期小额投资 + 持之以恒 + 迭代 = 指数级回报。
- en: My success, however large/small it is, was entirely built off of asymmetric
    bets.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我的成功，无论大小，都是建立在非对称赌注之上的。
- en: What was the vessel responsible for the results? Focused work.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 负责产生结果的载体是什么？专注的工作。
- en: That is, investing my focus into the attention economy’s stock market by adding
    value to the world, 1 hour at a time.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 也就是说，通过为世界增加价值，一次投入一小时，将我的专注投入到注意力经济的股票市场。
- en: 4 Hours Is More Than You Think
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4小时比你想象的要多
- en: My good friend Joey ([@heyjoeyjustice](https://twitter.com/psypreneur)) is a
    psychological performance coach.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我的挚友乔伊（[@heyjoeyjustice](https://twitter.com/psypreneur)）是一位心理表现教练。
- en: He along with many others have shown that through focus, you can slash your
    work times in half.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 他和许多其他人已经证明，通过专注，你可以将工作时间减半。
- en: You can get more done in 4 hours of focused work than you can in 8 hours of
    distracted work.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 你在专注工作4小时内能完成的事情，比在分心工作8小时内能完成的还要多。
- en: Hell, even 1 hour of focused work can pay off nicely, especially for those with
    other time-consuming obligations.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 没错，即使是1小时的专注工作也能带来很好的回报，尤其是对于那些有其他耗时义务的人来说。
- en: To get started with your bet there is a prerequisite.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始你的赌注，有一个先决条件。
- en: You must have interests or curiosities that you want to pursue. It will be very
    difficult to find opportunities to cash in on if you are not actively learning.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须有一些你想要追求的兴趣或好奇心。如果你不积极学习，找到可以从中获利的机会将会非常困难。
- en: Once you have learned, you must implement in the real world.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你学会了，你必须将其应用于现实世界。
- en: Joey’s 3 Steps For Getting Into Focused Work
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 乔伊的进入专注工作3步法
- en: Before we start – grab a physical notebook and a pen/pencil.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始之前 - 拿一本物理笔记本和一支笔/铅笔。
- en: '**Step 1) Brain Dump**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤1）头脑风暴**'
- en: 'This serves two purposes:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这有两个目的：
- en: Clear your mind of internal distractions (thoughts and ideas)
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清除内心的干扰（思想和想法）
- en: Know the exact tasks you need to complete for a given project
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定你为特定项目需要完成的精确任务
- en: Go crazy with this, write out everything that comes to mind. This is not limited
    to “work.”
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 对此疯狂一点，写下所有想到的事情。这不仅仅局限于“工作”。
- en: Write down everything from household todo’s to this weeks shopping list (along
    with what you have to do for “work”).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 将家庭待办事项到本周购物清单（以及你必须为“工作”做的事情）都写下来。
- en: '**Step 2) Categorize & Prioritize**'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤2）分类与优先级**'
- en: 'Create categories for tasks to fall under:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 为任务创建分类：
- en: Household
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 家庭事务
- en: Social growth
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 社交成长
- en: Product promotion
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 产品推广
- en: Outreach for freelancing
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 寻找自由职业机会
- en: Client work
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户工作
- en: Relationships
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人际关系
- en: Health
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 健康
- en: To prioritize, consider using The Eisenhower Matrix
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 为了优先级，考虑使用艾森豪威尔矩阵
- en: '[![The Eisenhower Matrix](../Images/c19678ad00af2b3ae0ec82a950ede302.png)](https://www.techtello.com/eisenhower-productivity-matrix/)'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '[![艾森豪威尔矩阵](../Images/c19678ad00af2b3ae0ec82a950ede302.png)](https://www.techtello.com/eisenhower-productivity-matrix/)'
- en: '[The Eisenhower Matrix](https://www.techtello.com/eisenhower-productivity-matrix/)'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '[艾森豪威尔矩阵](https://www.techtello.com/eisenhower-productivity-matrix/)'
- en: If you cannot decide if something is a priority or not, flip a coin. Not knowing
    if its a priority or not usually means its not a priority. Flip a coin and save
    yourself some mental strain.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不能决定某件事是否是优先事项，就抛个硬币。不知道是否是优先事项通常意味着它不是优先事项。抛个硬币可以节省你一些精神压力。
- en: You should come away with 2-5 tasks in each category that you have to work on
    within the next few days.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该带着每个类别中接下来几天内必须完成的2-5个任务离开。
- en: '**Step 3) Time Blocking & Scheduling**'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤3）时间块与安排**'
- en: You know what you need to do, now is the time to set it in stone. Scheduling
    time blocks prepares your brain for action.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道你需要做什么，现在是时候将其固定下来。安排时间块让你的大脑为行动做好准备。
- en: Take 10 minutes to pop your tasks into your calendar or favorite planner.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 用10分钟将你的任务添加到你的日历或最喜欢的计划器中。
- en: Use the Pomodoro method when working – 50 minutes of focus, 10 minutes of active
    rest (get out of your chair).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 工作时使用番茄工作法 - 50分钟专注，10分钟积极休息（离开你的椅子）。
- en: Start small and increase your workload. Start with 1-2 hours, build the habit,
    and increase accordingly.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 从小做起，逐渐增加工作量。从1-2小时开始，养成习惯，然后相应地增加。
- en: Scheduling your time blocks should not take any more than 15 minutes a week.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 安排你的时间块不应该超过每周15分钟。
- en: Joey’s Rapid Fire Tips For Maintaining Focus
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 乔伊的快速焦点保持技巧
- en: '**Step 1) Increase Clarity by Decreasing Uncertainty**'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤1）通过减少不确定性来增加清晰度**'
- en: Fight, flight or freeze – without clarity, you will not fight.
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 战斗、逃跑或冻结 - 没有清晰度，你将无法战斗。
- en: This is accomplished by going through steps 1-3 above again.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这可以通过再次执行上述步骤1-3来实现。
- en: '**Tip 2) Remove Distractions**'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示2）消除干扰**'
- en: Turn your phone on Do-Not-Disturb and move it off of your desk.
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将你的手机设置为勿扰模式，并将其从桌子上移开。
- en: Close unnecessary browser tabs.
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关闭不必要的浏览器标签页。
- en: Get out of your house if you have to (coffee shops are always great).
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果需要的话，出去走走（咖啡馆总是不错的选择）。
- en: '**Tip 3) Music**'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示3）音乐**'
- en: Listen to instrumental music instead of music with lyrics
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 听纯音乐而不是带歌词的音乐
- en: Movie or your favorite video game soundtrack
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 电影或你最喜欢的视频游戏原声带
- en: Interstellar, The Dark Knight, or anything by Hans Zimmer works wonders
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《星际穿越》、《黑暗骑士》或任何汉斯·季默的作品都能产生神奇的效果。
- en: Synthwave
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模拟波。
- en: '**Tip 4) Take Care of Yourself**'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示4）照顾好自己**'
- en: Move more (exercise)
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多运动（锻炼）。
- en: Eat better
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 吃得更好。
- en: Get quality sleep (absolutely crucial)
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获得高质量的睡眠（绝对关键）。
- en: Prioritize recovery (mental and physical)
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优先考虑恢复（精神和身体）。
- en: You can’t force a tired mind into work. Your mental performance has to be sustainable.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 你无法强迫一个疲惫的大脑去工作。你的精神表现必须可持续。
- en: Commit
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 承诺。
- en: If you are reading this, you have ambition.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在阅读这篇文章，说明你有野心。
- en: You want to build something that increases your quality of life monetarily,
    mentally, or physically.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 你想要建造一些能提高你生活质量（金钱、精神或身体）的东西。
- en: This is the starting point.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 这是起点。
- en: Commit to an asymmetric bet.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 承诺一个非对称的赌注。
- en: Commit to focus.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 承诺专注。
- en: —
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: —
- en: Joey’s tips for focused work were taken from a training we did together in [Modern
    Mastery HQ](https://join.modernmastery.co). These tips pair incredibly well with
    [The Power Planner.](https://learn.thedankoe.com/planner)
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 乔伊关于专注工作的建议是从我们共同参加的[现代精通总部](https://join.modernmastery.co)培训中获得的。这些建议与[The
    Power Planner](https://learn.thedankoe.com/planner)配合得非常好。
