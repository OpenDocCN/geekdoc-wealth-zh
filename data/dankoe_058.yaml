- en: Get Mad At Where You Are In Life
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 对你生活中的现状感到愤怒
- en: 原文：[https://thedankoe.com/letters/get-mad-at-where-you-are-in-life/](https://thedankoe.com/letters/get-mad-at-where-you-are-in-life/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/get-mad-at-where-you-are-in-life/](https://thedankoe.com/letters/get-mad-at-where-you-are-in-life/)
- en: Meet Jimmy.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 见吉米。
- en: Jimmy is the average male.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 吉米是普通人。
- en: He went to school, got a decent job, and did everything that society told him
    he should do.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 他去上学，找了一份体面的工作，做了社会告诉他应该做的每一件事。
- en: Jimmy was happy for a bit, but after the monotonous repetition of modern life,
    he fell into a rut.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 吉米一度很快乐，但经过现代生活的单调重复，他陷入了困境。
- en: Uber Eats. Porn. Video games. Netflix. Reddit. Hot Pockets.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: Uber Eats. 恋爱。电子游戏。Netflix。Reddit。热狗。
- en: You know, the things that aren’t that bad if you make the conscious one-time
    choice… but if unconscious can lead to 30 years of mediocrity passing in the blink
    of an eye.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道，如果你做出一次有意识的单一选择，那些不是那么糟糕的事情……但如果是无意识的，它可能导致30年的平庸在眨眼间过去。
- en: Jimmy was offered a helping hand.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 吉米得到了一只援手。
- en: The universe gave him a chance.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 宇宙给了他一个机会。
- en: A feeling. A call to adventure. A higher version of himself begging… SCREAMING
    to be let out.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 一种感觉。一次冒险的召唤。一个更高版本的自己恳求……尖叫着要被释放出来。
- en: He didn’t even notice it.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 他甚至没有注意到它。
- en: Jimmy picked up the remote, clicked “Skip Intro,” took a bong rip, and woke
    up in a blur just to put on his work clothes.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 吉米拿起遥控器，点击“跳过开场白”，吸了一口大麻，然后迷迷糊糊地穿上工作服。
- en: '**All Is Mind**'
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**一切皆心**。'
- en: Jimmy is a concept, created by you while reading this.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 吉米是一个概念，是你阅读此内容时创造的。
- en: When you stop, Jimmy ceases to exist.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 当你停止时，吉米就不再存在。
- en: Your attention is the barrier between Jimmy and the void.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 你的注意力是吉米与虚无之间的障碍。
- en: “I’m scared,” says Jimmy.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: “我害怕，”吉米说。
- en: '*Poof — gone.*'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**噗——消失了**。'
- en: You may have heard spiritual gurus and philosophers mention that the universe
    is a giant mind.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能听说过精神导师和哲学家提到宇宙是一个巨大的心灵。
- en: How can that be?
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 怎么会这样？
- en: Well, the mind makes sense of the world through concepts, stories, metaphors,
    and symbols.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，心灵通过概念、故事、隐喻和符号来理解世界。
- en: To understand those concepts, we need to understand the network of concepts
    that make it a concept.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解这些概念，我们需要理解构成这一概念的各个概念网络。
- en: Why is your hand a hand? Is it still a hand without an arm? What about a cup?
    Is that cup meaningless without a hand to pick it up?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么你的手是手？如果没有手臂，它还是手吗？杯子呢？如果没有手去拿，那个杯子有意义吗？
- en: And gravity? What the fuck is gravity? Can you understand gravity without understanding
    force, gravitational constant, the mass of the object, and the distance between
    the centers of the masses? How do you determine the mass of an object? Can there
    be a “center” of a mass without there being an inner and outer?
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，重力呢？重力究竟是什么东西？你能理解重力而不理解力、万有引力常数、物体的质量和质量中心之间的距离吗？你是如何确定物体的质量的？如果没有内和外，质量中心能有一个“中心”吗？
- en: Everything you know is just a layer of stories pieced together for your understanding.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 你所知道的一切只是为了你的理解而拼凑起来的故事层。
- en: If this email was written in Chinese, would it mean anything to you? No.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这封电子邮件是用中文写的，对你来说有什么意义吗？没有。
- en: The mind makes sense and gives meaning to life through stories.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 心灵通过故事来理解并赋予生命意义。
- en: '*“Cool Dan, got it. Very insightful yada yada bing ding word word concept story”*'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**“酷丹，明白了。非常深刻，yada yada bing ding 词汇词汇概念故事”**'
- en: STORIES GIVE MEANING TO LIFE.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**故事赋予生命意义**。'
- en: Your identity is the story you tell yourself. You will live out that story on
    autopilot if not made conscious. If not made conscious, it is impossible for it
    to end in your favor.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 你的身份是你告诉自己的故事。如果你不将其意识化，你将自动活出那个故事。如果不将其意识化，它不可能以对你有利的方式结束。
- en: Are you the hero or the villain?
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 你是英雄还是恶棍？
- en: One cannot exist without the other.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 一方不能没有另一方存在。
- en: The concept “hero” does not make sense without the concept “villain.”
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: “英雄”这一概念没有“恶棍”这一概念就没有意义。
- en: These opposing concepts reflect the law of polarity. They create tension.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这些对立的概念反映了极性法则。它们创造了紧张感。
- en: The concept of “life” does not make sense without “suffering.”
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: “生命”这一概念没有“苦难”就没有意义。
- en: Now, whether these are labeled as “good” or “bad” is up to you.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这些被标记为“好”或“坏”取决于你。
- en: Remember, it’s all a story. A game. Something within your control. Something
    within your mind.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，这一切都是故事。一场游戏。在你掌控之中。在你心中。
- en: Life implies suffering. Whether that suffering has a negative impact on you
    is determined by your level of consciousness and expectation.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 生活意味着苦难。这种苦难是否对你有负面影响取决于你的意识和期望水平。
- en: If you expect life not to imply suffering, then you will suffer. Why? Because
    you are fighting against what is. You are trying to control the uncontrollable
    instead of flowing with it and controlling yourself within that flow.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你期望生活不意味着苦难，那么你就会遭受苦难。为什么？因为你正在与现实作斗争。你试图控制无法控制的事物，而不是在其中流动并控制自己。
- en: If there is not a hero and villain of the story, it is boring. Meaningless.
    Unfulfilling. The story ceases to exist.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 如果故事中没有英雄和反派，那将是无聊的。无意义的。不满足的。故事就不再存在。
- en: You are the actor. The player behind the character. The consciousness behind
    the mind.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 你是演员。角色背后的玩家。心智背后的意识。
- en: Life is a dance between the hero and the villain.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 生活是英雄与反派之间的舞蹈。
- en: Push pull. Wu wei. Yin yang.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 推拉。无为。阴阳。
- en: The battle between good and evil is what propels you in any direction in life.
    If you are conscious of the battle, you move in a positive direction. If you are
    unconscious or resist the battle, you move in a negative direction.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 善与恶之间的斗争推动你在生活的任何方向上前进。如果你意识到这场斗争，你就会朝着积极的方向前进。如果你是无意识的或抵制斗争，你就会朝着消极的方向前进。
- en: The hero comes from humble beginnings. The hero levels up by playing the game.
    He fails… many times, but he doesn’t quit.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 英雄出身卑微。英雄通过玩游戏来提升等级。他会失败……很多次，但他不会放弃。
- en: He get’s stronger. Cultivates a high value skill set. Rigs the game in his favor
    by taking full responsibility for the direction of his life.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 他变得更强大。培养了一套高价值的技能集。通过完全负责自己生活的方向，使游戏规则对他有利。
- en: After a few bouts with the villain, he prevails. His name is remembered. The
    impact he left on other’s is celebrated for centuries. His legacy is clear.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在与反派几次交锋后，他取得了胜利。他的名字被记住。他对他人留下的影响被庆祝了数百年。他的遗产是清晰的。
- en: '**Character Select**'
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**角色选择**'
- en: Are you where you want to be in life?
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 你在生活中的位置是你想要的吗？
- en: Do you have the money, body, energy, and relationships that you want?
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 你拥有你想要的金钱、身体、能量和关系吗？
- en: Are you pissed off yet?
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 你生气了吗？
- en: Are you the main character in your story? Or are you a layer of stories that
    identifies with negative traits that do not serve you?
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 你是你故事中的主角吗？或者你是一个认同那些对你无益的负面特质的故事的层面？
- en: “I’m broke.”
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: “我破产了。”
- en: “I’m a stoner.”
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: “我是一个瘾君子。”
- en: “I’m not good enough.”
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: “我不够好。”
- en: “I’m scrawny and weak.”
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: “我瘦弱无力。”
- en: You become the story you tell yourself.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 你成为你讲述给自己的故事。
- en: This stresses the necessity of conscious identity creation through proper alignement.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这强调了通过适当的对齐进行有意识的身份创建的必要性。
- en: Orient your thoughts, feelings, and actions in alignment with the person you
    want to become. The story you want to live out. Do not limit yourself.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的思想、感受和行动与你想成为的人、你想过的生活故事对齐。不要限制自己。
- en: Craft your vision.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 构建你的愿景。
- en: Write down your goals.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 记录你的目标。
- en: Write down your priorities.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 记录你的优先事项。
- en: '[Use the Power Planner if you don’t already have it (free).](https://shop.thedankoe.com/planner)'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '[如果你还没有（免费）使用Power Planner，请使用它。](https://shop.thedankoe.com/planner)'
- en: Gain clarity on the blatantly obvious actions that you need to be taking on
    a daily basis.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 对你每天需要采取的明显明显的行动有清晰的了解。
- en: It is fucking simple.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这很简单。
- en: Learn and apply.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 学习并应用。
- en: Go to the fucking gym. Fix your child-like diet. Start the business you’ve been
    telling yourself you would start.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 去那个该死的健身房。改善你的儿童般的饮食。开始你一直告诉自己要开始的事业。
- en: Don’t know how to? LEARN.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 不会？学习。
- en: Watch a YouTube video, buy a course, ask a friend. You have access to the INTERNET
    for goodness sake. A land of infinite potential yet you use it to scroll through
    memes, watch porn, and numb your mind.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 看一个YouTube视频，买一个课程，问一个朋友。看在上帝的份上，你有互联网。一个充满无限潜力的地方，但你却用它来滚动表情包，看色情，麻木你的思想。
- en: Give conscious thought your current life situation and get PISSED that you aren’t
    where you want to be.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 有意识地思考你当前的生活状况，并因为你不处于你想要的位置而感到愤怒。
- en: While conscious, transmute that anger into building something great.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在清醒时，将愤怒转化为创造伟大事物的动力。
- en: Use it as an energy source that you can tap into at any given moment.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 将其用作你可以随时利用的能量来源。
- en: Before you go into the gym, get pissed. Fight the mediocre potential self —
    the villain — inside you.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在进入健身房之前，感到愤怒。与内心的平庸自我——那个反派——战斗。
- en: Dance with life in the present moment while being crushed by hundreds of pounds
    weighing you down.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在承受着数百磅重压的同时，与生活共舞，活在当下。
- en: Junk food? Disgusting.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 垃圾食品？令人厌恶。
- en: Porn? For simps.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 恋爱？给傻瓜。
- en: Anything less than excellence? No.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 任何低于卓越的东西？不。
- en: If you aren’t where you want to be in life and lack meaning, you have to become
    polarized.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你生活中没有达到你想要的位置，缺乏意义，你必须变得极端。
- en: Become so disgusted at your negative life choices that the thought of participating
    in that activity makes you look like an idiot.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 对你消极的生活选择感到如此厌恶，以至于参与那个活动的想法会让你看起来像个白痴。
- en: Again, this is a dance. Anger and “evil” are only a problem when you don’t see
    them for what they are.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，这是一个舞蹈。愤怒和“邪恶”只有在你看不清它们本质的时候才会成为问题。
- en: When you aren’t CONSCIOUS. When you are asleep. Mindlessly floating through
    life expecting shit to just fall in your lap.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 当你不清醒时。当你睡着时。毫无意识地漂浮在生活之中，期待着东西自动掉进你的怀里。
- en: Fuck that.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 算了。
- en: Get pissed off at yourself and defeat that little bitch of a voice that tries
    to pull you down.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 对自己生气，打败那个试图拉你下水的声音。
- en: Stay grounded and connected to truth while seeing life for the game it is. Then
    play the game as the character your consciously create.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 保持脚踏实地，与真理相连，同时看到生活就是一场游戏。然后以你自觉创造的角色来玩游戏。
- en: 1 HOUR. A. DAY. MINIMUM.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 1小时。每天。至少。
- en: '**1 HOUR ON YOUR BUSINESS.**'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '**专注于你的事业1小时。**'
- en: '**1 HOUR ON YOUR FITNESS.**'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '**专注于你的健身1小时。**'
- en: '**1 HOUR ON YOUR MENTAL HEALTH.**'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '**专注于你的心理健康1小时。**'
- en: '*YOU ARE JACKED, RICH, CONFIDENT, AND YOU DO NOT ACCEPT ANYTHING LESS.*'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '*你充满活力，富有，自信，并且不接受任何低于这个标准的东西。*'
- en: WHAT THE FUCK DO YOU HAVE TO DO THAT IS BETTER THAN THIS?
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 你有什么比这更好的事情要做吗？
- en: '**NOTHING.**'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '**什么都没有。**'
- en: IT’S ALL IN YOUR MIND.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这都是你心中的想法。
- en: ACT. NOW.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 行动。现在。
- en: '[AND FUCKING GET INSIDE MMHQ IF YOU AREN’T ALREADY. $5 TO JOIN FOR THIS LETTER
    ONLY.](https://www.modernmastery.co/community/modern-mastery-hq-special)'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '[如果你还没有进来MMHQ，那就进来吧。这次只收5美元加入这个团体。](https://www.modernmastery.co/community/modern-mastery-hq-special)'
- en: FUCK.
  id: totrans-95
  prefs: []
