- en: The Best One-Person Business For Smart People (2025)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 《最适合聪明人的单人企业》（2025）
- en: 原文：[https://thedankoe.com/letters/the-best-one-person-business-for-smart-people-2025/](https://thedankoe.com/letters/the-best-one-person-business-for-smart-people-2025/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/the-best-one-person-business-for-smart-people-2025/](https://thedankoe.com/letters/the-best-one-person-business-for-smart-people-2025/)
- en: I want you to imagine the future with me.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我想让你和我一起想象未来。
- en: 'A world where:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在这样一个世界里：
- en: Creators are the new teachers.
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创作者是新的教师。
- en: Online courses are decentralized schooling.
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在线课程是去中心化的学校。
- en: Individuals pursue their interests and teach those with a similar personality,
    creating a better learning experience.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 个人追求自己的兴趣，并教授那些具有相似性格的人，从而创造更好的学习体验。
- en: Education is more efficient, affordable, and results-oriented than a conformist
    public school system.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教育比顺从的公立学校系统更有效率、更经济、更有结果导向。
- en: Anyone can choose courses and creators that align with their personal goals.
    They aren’t locked into one area of study that breeds narrow-mindedness and dependence
    on society for a job or paycheck.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任何人都可以选择与个人目标相符的课程和创作者。他们不会被锁定在某一特定研究领域，从而培养出狭隘的思想和对社会工作的依赖或工资。
- en: More people embrace deep generalism and become polymaths, which are prerequisites
    to becoming a free-thinking individual.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 越来越多的人拥抱深度通才主义，成为博学家，这是成为独立思考个体的先决条件。
- en: Learning, teaching, and earning collapse into one ideal and meaningful lifestyle
    (thanks to advancements in technology and the spread of information.)
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习、教学和赚钱合并成一种理想且有意义的生活方式（得益于技术的进步和信息传播。）
- en: You’re experiencing this right now.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在正在体验这个过程。
- en: You are currently reading a letter with information that could change your life
    (and wouldn’t dare be taught in schools because it would break you out of their
    system, they wouldn’t benefit from it.)
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在正在阅读一封可能改变你生活的信（而且在学校里不敢教授，因为这会打破他们的体系，他们从中得不到任何好处。）
- en: In my eyes, this is the future of education, entrepreneurship, and work as a
    whole.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，这是教育、创业和整体工作的未来。
- en: All signs point to it.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 所有迹象都指向这一点。
- en: In this letter, I want to show you a path that anyone can take to secure their
    future.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在这封信中，我想向你展示一条任何人都可以走的道路，以确保他们的未来。
- en: This is not a path where everyone does the same thing.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是一条每个人都做同样事情的道路。
- en: It is a path where people can pursue their interests and lean into the story
    that makes them unique. A path where everyone – within reason – gets paid to be
    themselves in a world where robotic jobs are being automated left and right.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一条人们可以追求自己的兴趣，并深入到使他们独特的那个故事中的道路。在这个机器人工作被自动化左右的世界里，每个人——在合理范围内——都能得到报酬来做自己。
- en: If you watch the video, I’ll handle most objections you have about this being
    a viable path for most people.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你观看视频，我会处理你关于这可能是大多数人可行路径的几乎所有疑虑。
- en: Of course, this is just a prediction, but the data is overwhelming, and predictions
    can come true with enough attention and effort to create that reality.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这只是个预测，但数据压倒性，只要有足够的关注和努力去创造那个现实，预测就能成真。
- en: 'Let’s take a look:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看：
- en: First, from Stripe, creator growth isn’t stopping any time soon.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，从Stripe来看，创作者的成长不会很快停止。
- en: (These images are pulled from [Hosun’s X thread](https://x.com/hosun_chung/status/1845491689793982641) on
    a similar topic. This is my take on it, which we’ve discussed quite a few times
    in the past, but it hasn’t been as refined as this time around.)
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: （这些图片是从[Hosun的X帖子](https://x.com/hosun_chung/status/1845491689793982641)中关于类似主题的内容中提取的。这是我对此的看法，我们过去讨论过很多次，但这次没有像这次这样精炼。）
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2258">![](../Images/7c86d25589533f1ae4dbfbf05dd610a1.png)</picture>
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-2258">![](../Images/7c86d25589533f1ae4dbfbf05dd610a1.png)</picture>
- en: The way I see it, creator growth is the only logical option going into a world
    where AI and automation make meaningless work optional.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，创作者的成长是进入一个由AI和自动化使无意义工作变得可选的世界中唯一合理的选项。
- en: While social media may change, the desire to pursue your interests and get paid
    for being yourself remain. And if you haven’t noticed, evolution is about solving
    problems. It’s taken a lot of technology to guide evolution to this point, but
    we’re on the verge of solving the problem of doing work you hate. Of course, the
    principle still remains that none of this will be given to you.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然社交媒体可能会改变，但追求你的兴趣和因做自己而获得报酬的愿望仍然存在。而且如果你没有注意到，进化就是解决问题。为了引导进化到这个阶段，已经使用了大量的技术，但我们正站在解决讨厌的工作问题的边缘。当然，原则仍然存在，即这一切都不会自动给你。
- en: This life is reserved for the polymaths, autodidacts, and those with an unquenchable
    thirst to acquire a diverse set of irreplaceable skills.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这种生活方式是为博学者、自学者和那些渴望获得一系列不可替代技能的人保留的。
- en: Let’s go further.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更进一步。
- en: <picture decoding="async" class="wp-image-2259">![](../Images/bdcd42fe67941e6f6efc439e6f5b709b.png)</picture>
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-2259">![](../Images/bdcd42fe67941e6f6efc439e6f5b709b.png)</picture>
- en: 'A graph from SignalFire illustrates that there are now 50 million content creators.
    Beyond that:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: SignalFire的一张图表显示，现在有5000万内容创作者。除此之外：
- en: Freelancers compose 46.6% of the workforce (increasing substantially from 36%
    in 2020).
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自由职业者占劳动力总数的46.6%（从2020年的36%大幅增加）。
- en: The creator economy is projected to double from $250B to $480B by 2028\. People
    think they are late to the party when it’s just getting started.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创作者经济预计到2028年将从2500亿美元翻倍至4800亿美元。人们认为他们来得太晚了，而实际上它才刚刚开始。
- en: The economy favors profitable business models. Tech enabled businesses like
    creators can operate at 95% profit margins with digital products and services
    – causing more development in that domain for new platforms and tools.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 经济青睐有利可图的商业模式。技术赋能的企业，如创作者，可以通过数字产品和服务的95%利润率运营——这导致该领域对新平台和工具的发展更多。
- en: Big companies are requiring leaders at their company to be active on social
    media for brand reputation. Less corporate marketing, more human marketing.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大公司要求其公司的领导者活跃在社交媒体上，以维护品牌声誉。减少企业营销，增加人性营销。
- en: Corporations are beginning to opt for contractors and creators as workers and
    marketers.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 企业开始选择承包商和创作者作为员工和营销人员。
- en: In short, the future favors the individuals, small teams, and progressive companies
    who stop trying to lock people into lives they hate. People will push back full
    force now that they have the technology to do so.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，未来有利于那些停止试图将人们锁定在讨厌的生活中的个人、小型团队和进步公司。现在他们有了技术，人们将全力以赴地反击。
- en: And that’s the other thing…
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 那还有另一件事……
- en: Technology has evolved.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 技术已经发展了。
- en: You don’t need a team of 10 developers to build a website now.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在不需要一个由10名开发者组成的团队来构建网站。
- en: You have no-code drag-and-drop tools that help you build it fast.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 你有无需编码的拖放工具，可以帮助你快速构建。
- en: You don’t need to pay for billboards or spots on the radio. You simply post
    content to attract people to your creative work and business.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要为广告牌或广播电台的时段付费。你只需发布内容，吸引人们关注你的创意工作和业务。
- en: Most people think AI is going to replace creative workers.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人认为人工智能将取代创意工作者。
- en: If it does, maybe you deserved to be replaced and aren’t as creative as you
    think you are.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果是这样，也许你应得的替代，并且你并不像你认为的那样有创造力。
- en: AI only enables intelligent people to do more as an individual or team. People
    are building viral apps over a weekend and writing content faster than ever. The
    quality of those apps and content are dependent on a wide array of skills that
    can’t be made up for by typing into ChatGPT.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能只使聪明人能够作为个人或团队做更多的事情。人们可以在周末构建病毒式应用程序，并以比以往任何时候都快的速度编写内容。这些应用程序和内容的质量取决于一系列广泛的技能，这些技能不能通过在ChatGPT中输入来弥补。
- en: This is a superpower for generalists and polymaths.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这是对通才和博学者的超级能力。
- en: But it goes even deeper.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 但它还有更深层次的意义。
- en: Smart People Shouldn’t Go To College
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 智慧的人不应该上大学
- en: Knowledge not found in schools is the source of money not found in employment.
    – The Art Of Focus
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 学校找不到的知识是就业中找不到的金钱来源。——《专注的艺术》
- en: People are losing trust in the institutions and ideologies that failed to give
    them the secure future they promised.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 人们开始失去对那些未能给他们带来承诺的稳定未来的机构和意识形态的信任。
- en: <picture decoding="async" class="wp-image-2260">![](../Images/a60b0bffefd6c48cfcc788f2be973d89.png)</picture>
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-2260">![](../Images/a60b0bffefd6c48cfcc788f2be973d89.png)</picture>
- en: Schools narrow your mind on the illusory status of a nice job and large paycheck.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 学校使你的思想局限于美好工作和丰厚薪水的虚幻地位。
- en: Religions narrow your mind on a singular cultural perspective that fails to
    make sense of reality.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 宗教将你的思维局限在单一的文化视角上，这种视角无法理解现实。
- en: Jobs narrow your mind on a replaceable and repetitive string of tasks that won’t
    be worth what you’re being paid now as technology advances.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 乔布斯将你的思维局限在一系列可替代和重复的任务上，随着技术的进步，这些任务将不再值得你现在所获得的报酬。
- en: For those who value self-education and personal responsibility, you are quite
    possibly experiencing the most important time of your life.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些重视自我教育和个人责任的人来说，你们可能正处于一生中最重要的时刻。
- en: For those who can’t think for themselves or open their mind to new perspectives,
    you will probably suffer for the coming years until you hit rock bottom – which
    forces a perspective shift and growth.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些无法独立思考或打开心扉接受新视角的人来说，在达到谷底之前，你可能会在未来几年中遭受痛苦——这迫使你转变视角并成长。
- en: In Ego Development Theory, a lower stage of development is the *conformist*
    stage. A stage where people can’t think for themselves. They need to be accepted
    by the tribe. So their mind sees religion and other ideologies and institutional
    dogma as law. “Bible thumpers” for more than just the bible.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在自我发展理论中，较低的发展阶段是**顺从者**阶段。一个人们无法独立思考的阶段。他们需要被部落接受。因此，他们的思维将宗教和其他意识形态以及制度教条视为法律。“圣经敲击者”不仅仅是对圣经。
- en: It seems that as new generations gain more of a collective voice, the conformist
    stage – mostly occupied by boomers – is slowly starting to fade out from the general
    population. More people are occupying higher stages of development.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来，随着新一代人获得更多的集体声音，顺从者阶段——主要由婴儿潮一代占据——正逐渐从大众中消失。更多的人正在占据更高的发展阶段。
- en: This is hidden importance of social media and the internet.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是社交媒体和互联网隐藏的重要性。
- en: Social media has set the foundation for the distribution of education, meaning,
    and work.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体为教育、意义和工作的分配奠定了基础。
- en: The lines have blurred. No central institution has control over one in any given
    culture.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 界限变得模糊。没有任何中心机构能够控制任何一种文化中的任何一个方面。
- en: Personal brands on social media teach their interests, share their belief system,
    and make an income doing so by providing a product or service under their brand.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体上的个人品牌通过分享他们的兴趣和信仰系统，通过在其品牌下提供产品或服务来赚取收入。
- en: Why is this such an important turning point in history?
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这是历史上的一个如此重要的转折点？
- en: Anyone is free to share their interests and beliefs on the internet.
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 任何人在互联网上都可以自由分享他们的兴趣和信仰。
- en: Anyone is free to self-develop, acquire new skills, learn from others, and contribute
    to humanity by providing their own product or service.
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 任何人都可以自由地自我发展，获取新技能，向他人学习，并通过提供自己的产品或服务为人类做出贡献。
- en: Education determines an individual’s potential, and if that education is dominated
    by a school system with an agenda that doesn’t account for the individual’s goals
    and development, we are entering a new Golden Age.
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 教育决定了个人的潜力，如果这种教育被一个不考虑个人目标和发展的学校系统所主导，我们正在进入一个新的黄金时代。
- en: Education shapes the future because it shapes human behavior. You become what
    you consume.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 教育塑造未来，因为它塑造了人类行为。你成为你所消费的东西。
- en: Education expands your perspective and allows you to spot opportunities in unknown
    territory.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 教育扩展了你的视野，并允许你在未知领域中发现机会。
- en: Education is programming. You’ve been educated your entire life. But you didn’t
    choose the source of that education… until now.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 教育是编程。你一生都在接受教育。但直到现在，你都没有选择过教育的来源…
- en: In other words, we’re entering a human economy.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，我们正在进入一个人类经济时代。
- en: A connected economy that finally reflects natural patterns.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 一个最终反映自然模式的经济体。
- en: A purpose economy where people can choose to learn from those with a shared
    vision and goals.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 一个目的经济，人们可以选择从那些有共同愿景和目标的人那里学习。
- en: Why does this work?
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这为什么有效？
- en: Because people have different needs for understanding.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 因为人们对理解有不同的需求。
- en: Many of you are here because you resonate with what I say and teach.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 你们中的许多人之所以在这里，是因为你们与我所说的和所教的内容产生了共鸣。
- en: Others despise me, yet they get similar information from a different perspective,
    and that’s okay. It’s a difference in personality and teaching style.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人讨厌我，但他们从不同的视角获得了类似的信息，这没关系。这只是个性和教育风格的不同。
- en: The traditional student was assigned goals that left them dumb and replaceable.
    They were assigned a teacher. They were told to pay an outrageous amount. To take
    out loans that would be impossible to pay back. Drowning them in high interest
    that keeps their mind trapped in survival mode due to the stress. They try to
    solve that stress by getting a job, making their life even worse. By the time
    they know it, they either forget that they were meant for more or get overwhelmed
    by how much work it will take to dig out of that mess.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的学生被分配了让他们变得愚蠢和可替代的目标。他们被分配了一位老师。他们被告知要支付巨额费用。要借出无法偿还的贷款。让他们在高利息的困扰下，由于压力而陷入生存模式。他们试图通过找工作来解决这种压力，使他们的生活变得更糟。等到他们意识到这一点时，他们要么忘记了他们本应拥有更多，要么被从那个混乱中摆脱出来的工作量所压倒。
- en: The modern student can choose their own goals, find a teacher, invest in their
    own education, and once they’ve achieved that goal, they can evolve as all things
    do to the next one, or they can fulfill their higher needs of becoming the teacher
    and passing down what they’ve learned.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 现代学生可以选择自己的目标，找到导师，投资自己的教育，一旦他们实现了这个目标，他们就可以像所有事物一样进化到下一个目标，或者他们可以满足自己更高的需求，成为导师并传授他们所学。
- en: How are you going to create anything worth distributing if you don’t become
    a person of value?
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不成为有价值的人，你将如何创造出值得分发的东西？
- en: Yes, to join in on the new, hyper-profitable economy you will need to do something
    with your life.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，要加入这个新、高盈利的经济体，你将需要在你的生活中做一些事情。
- en: But, conventional education won’t cut it.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，传统的教育是不够的。
- en: The current school system is just that, a system.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 当前的教育体系就是这样，一个体系。
- en: A system that molds you into the workforce.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 一个塑造你进入劳动力的体系。
- en: It teaches the obedience and skills necessary to work a job in the old economy.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 它教授了在旧经济中工作所需的服从和技能。
- en: If you want to make money in the new economy, then obviously you must seek education
    from those who have results in that domain.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想在新的经济体中赚钱，那么显然你必须从那些在该领域有成果的人那里寻求教育。
- en: Courses, coaching, and content from brands and creators that have *created*
    those ways of making money.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 来自那些已经*创造*出这些赚钱方式的品牌和创作者的课程、指导和内容。
- en: While many people think of these as scams – and many can be since the area is
    new and hasn’t fully self-corrected per evolution – the worst thing you can do
    is avoid learning from those who are creating the future in front of your eyes.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然许多人认为这些是骗局——而且许多确实如此，因为这个领域是新的，还没有完全通过进化自我纠正——但你能做的最糟糕的事情就是避免从那些在你眼前创造未来的人那里学习。
- en: New jobs are being created left and right.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 新的工作正在到处创造。
- en: The ones where boomers will tell you to “get a real job.”
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 那些婴儿潮一代会告诉你“找一份真正的工作”的地方。
- en: Creators are forging a new path, creating value, building teams, hiring high-agency
    individuals.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者正在开辟一条新的道路，创造价值，组建团队，雇佣高效率的个人。
- en: The creator economy is the new school system. Becoming a creator is the new
    career path. A holistic career path that allows you to pursue and monetize any
    interest you deem meaningful and important.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者经济是新的教育体系。成为创作者是新的职业道路。一条全面发展的职业道路，让你能够追求和货币化你认为有意义和重要的任何兴趣。
- en: Set a goal.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 设定一个目标。
- en: Find creators you resonate with.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 找到你共鸣的创作者。
- en: Drown yourself in the information they provide.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 沉浸在他们提供的信息中。
- en: Watch new opportunities register in your awareness.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 观察新的机会在你的意识中登记。
- en: Act on them like your life depends on it.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 就像你的生命依赖于它一样去行动。
- en: The One-Person Media Company – Your School System
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一人媒体公司 – 你的教育体系
- en: If you understand evolution, you understand that individuals, industries, and
    life itself oscillate between unity and division.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你理解进化，你就会明白个人、行业和生命本身在统一和分裂之间波动。
- en: Centralization and decentralization.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 集中和去中心化。
- en: This is a generalized principle of reality.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个现实的普遍原则。
- en: Like the ocean evaporating into droplets, condensing in the clouds, and once
    it’s heavy enough, raining back down to nourish plants, serve other beneficial
    ecological functions, and repeat all over again.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 就像海洋蒸发成水滴，凝结在云层中，一旦足够重，就会再次降下来滋养植物，提供其他有益的生态功能，然后再次重复。
- en: We are entering an era where the pendulum is swinging from institution to individual.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正进入一个时代，其中钟摆从机构转向个人。
- en: Entropy and wealth are two polar ends.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 熵和财富是两个极端。
- en: As uncertainty or disorder increases, the more opportunity and resources you
    have to build wealth. Wealth is increasing order through value creation. Like
    turning wood into a house (low value into high value).
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 随着不确定性和混乱的增加，你拥有更多机会和资源来积累财富。财富是通过价值创造来增加秩序的。就像把木头变成房子（低价值变成高价值）。
- en: All of this philosophical nonsense is to say that we live in a time of deep
    uncertainty and distrust for institutions’ grip on our minds. But that’s not a
    bad thing. It simply means we have more information, more ideas, more resources
    – like no-code tools that other value creators have birthed – and more abundance
    to work with *as* individuals.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些哲学上的胡言乱语都是为了说明我们生活在一个充满不确定性和对机构对我们心智控制的怀疑的时代。但这不是一件坏事。这仅仅意味着我们拥有更多信息、更多想法、更多资源——比如其他价值创造者诞生的无代码工具——以及更多作为个体可以工作的丰富资源。
- en: 'Let’s break down how this works:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分解一下这是如何运作的：
- en: 1) The Future Of Entrepreneurship
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 创业未来
- en: Social media is where the attention is right now.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体是目前注意力的焦点。
- en: Social media is a free technology that has radically changed how we learn and
    acquire knowledge to improve our quality of life (for value-focused people… lower-development
    people focused on memes and toxicity shouldn’t be your focus).
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体是一种免费技术，它彻底改变了我们学习和获取知识的方式，以改善我们的生活质量（对于价值导向的人来说……专注于梗和毒性的低发展人群不应是你的重点）。
- en: Social media is how you join the future of work.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体是你加入工作未来的方式。
- en: Yes, I believe that on a long enough time scale what we do to generate wealth
    will evolve from physical to digital.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，我相信在足够长的时间尺度上，我们为了创造财富所做的事情将从物理发展到数字。
- en: Physical businesses have online stores and audiences to expand their reach and
    provide more value.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 物理业务拥有在线商店和受众，以扩大其影响力和提供更多价值。
- en: Corporations are breeding “in-house creators” to bring more personality to their
    robotic company.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 企业正在培养“内部创造者”，为他们的机器人公司带来更多个性。
- en: Individuals like Ali Abdaal – our productivity overlord – left their job as
    a doctor. He posted med school videos and the market told him they wanted his
    productivity advice. So, it was a no brainer for him to lean into what held more
    value – considering they did surgery on a grape – and in return makes more than
    10 doctors combined.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 像阿里·阿布达尔这样的个人——我们的生产力主宰者——辞去了医生的工作。他发布了医学院的视频，市场告诉他人们想要他的生产力建议。因此，对他来说，投身于更有价值的事情——考虑到他们是在葡萄上做手术——并且比10个医生加起来赚得还多，这是不言而喻的。
- en: 2) Become A Value Creator
  id: totrans-113
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 成为价值创造者
- en: If we observe evolution’s arrow, let’s assume that the goal of reality is to
    unify consciousness.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们观察进化的箭头，让我们假设现实的目的是统一意识。
- en: We can assume this direction by noting patterns of increasing wholeness.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过注意整体性增加的模式来假设这个方向。
- en: Matter to biology to psychology to spirit – each transcends and includes another.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 从物质到生物到心理学到精神——每个都超越了另一个并包含另一个。
- en: Atom to cell to molecule to organism.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 从原子到细胞到分子到生物体。
- en: Letter to sentence to paragraph to chapter to book.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 从字母到句子到段落到章节到书籍。
- en: Materials to infrastructure to surface to house.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 从材料到基础设施到表面到房屋。
- en: All intelligent life is moving toward higher orders of unity by creating value.
    Or, creating wealth to combat disorder and uncertainty from entropy.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 所有智能生命都在通过创造价值向更高层次的统一迈进。或者，通过创造财富来对抗熵带来的混乱和不确定性。
- en: Now, if we look at the stages of psychological development, we can note a similar
    direction.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果我们观察心理发展的各个阶段，我们可以注意到一个相似的方向。
- en: As one self-develops, they move from ego-centric to socio-centric to world-centric
    to cosmo-centric. They expand their circle of concern. Their desires shift from
    selfish survival to selfless contribution.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 随着一个人的自我发展，他们从以自我为中心到以社会为中心，再到以世界为中心，最后到宇宙为中心。他们扩大了他们的关注圈。他们的欲望从自私的生存转变为无私的贡献。
- en: So, who is this whole “creator business” thing for?
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，这个“创造者业务”究竟是为谁而设的？
- en: In my eyes, it’s those who land between the Achiever to Strategist stage and
    above. A little under half of the population. Achiever seems to be the general
    self-help crowd, Expert seems to be the “go to school, get a job, retire” crowd.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，这是那些处于“成就者到策略家”阶段以及更高阶段的人。不到一半的人口。成就者似乎是一般自我提升的人群，专家似乎是一群“上学、找工作、退休”的人。
- en: It’s for those who love to learn, have results with specific skills or interests,
    and want to learn into their natural desire to help others and evolve.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 这是为了那些热爱学习、在特定技能或兴趣上有成果，并且想要通过他们的自然愿望去帮助他人和进化的人。
- en: <picture loading="lazy" decoding="async" class="wp-image-2262">![](../Images/d26a5aec755311eba369050f85b8ff4a.png)</picture>
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-2262">![](../Images/d26a5aec755311eba369050f85b8ff4a.png)</picture>
- en: It’s not that everyone can’t do this. It’s that it won’t even register as an
    opportunity from most people’s perspective. It won’t make sense. In lower stages,
    their needs are different – concerned with survival and self. They don’t care
    about this stuff.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 并不是每个人都不能做这件事。而是它甚至不会在大多数人的视角中作为一个机会。它没有意义。在较低阶段，他们的需求不同——关注生存和自我。他们不关心这些。
- en: The Achiever stage is most people that have been introduced to and understand
    the importance of self-improvement and value actualization.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 成就者阶段是大多数已经接触并理解自我提升和价值实现重要性的大多数人。
- en: <picture loading="lazy" decoding="async" class="wp-image-2261">![](../Images/18d78ea1b9aa61d0669d859d76b3b1b3.png)</picture>
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-2261">![](../Images/18d78ea1b9aa61d0669d859d76b3b1b3.png)</picture>
- en: The beautiful thing about a creator business model is that it is stage-agnostic
    for the most part.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 创造者商业模式最美丽的地方在于，它在很大程度上不受阶段限制。
- en: It can be used as a forcing function to move from conventional to post-conventional.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 它可以用作推动力，从传统过渡到后传统。
- en: As I’ve tweeted before, “*Self-development is a gateway drug into entrepreneurship
    because you realize that improving others is the next level of improving yourself.*“
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 就像我之前推文所说的，“*自我发展是通往创业的门户药物，因为你意识到提升他人是提升自己的下一个层次。*”
- en: At higher stages, contributing to mankind becomes a top priority and desire.
    Since money and wealth are anti-entropic, creating value (products) and spreading
    knowledge (content) is a viable way to fulfill that desire. Getting paid to be
    and actualize yourself.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 在更高阶段，为人类做出贡献成为首要任务和愿望。由于金钱和财富是反熵的，创造价值（产品）和传播知识（内容）是满足这种愿望的可行方式。通过实现自我来获得报酬。
- en: 'A last point:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一点：
- en: Humans find meaning and enjoyment at the edge of their abilities. When the flow
    of information is maximized. When they feel as though they have the skill to take
    on higher challenges.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 人类在能力边缘找到意义和乐趣。当信息流动最大化时。当他们感觉自己有足够的技能去接受更高的挑战时。
- en: So, if we consider ourselves creative vessels for reality to flow through, that
    is what a creator business is.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果我们把自己视为现实流动的创造性容器，那么这就是一个创造者企业的本质。
- en: We learn, create, and teach.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 我们学习、创造和教学。
- en: We solve our own problems and sell the solution to increase the tail end of
    wealth and contribute to the unification of consciousness.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 我们解决自己的问题，并通过出售解决方案来增加财富的尾端，并为意识的统一做出贡献。
- en: 3) Your Public School And Ecosystem
  id: totrans-139
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 你的公立学校和生态系统
- en: Let’s ground this in practicality.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们把这个实际化。
- en: We got a bit out there for a second.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚才有点跑题了。
- en: You need 3 things to build a value creator business that is focused on education
    and improvement over memes and mindless entertainment like that of a typical influencer.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要三样东西来建立一个专注于教育和改进，而不是像典型影响者那样关注梗和无聊娱乐的价值创造者企业。
- en: '**Brand** – An extension of yourself. How you display your mind online. A way
    for people to find and follow your perspective.'
  id: totrans-143
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**品牌** – 你自己的延伸。你在网上如何展示你的思想。人们发现并跟随你观点的方式。'
- en: '**Content** – How you distribute education, knowledge, and wisdom to help others
    around your skills and interests.'
  id: totrans-144
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**内容** – 你如何分配教育、知识和智慧，以帮助他人在你技能和兴趣的周围。'
- en: '**Product** – A system for helping people solve a problem and achieve a goal.'
  id: totrans-145
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**产品** – 一个帮助人们解决问题和实现目标的系统。'
- en: Your brand is the world you are inviting people into.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 你的品牌是你邀请人们进入的世界。
- en: The perspective you are helping them adopt.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 你帮助他们采纳的视角。
- en: The goal or level of development you are helping them reach.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 你帮助他们达到的目标或发展水平。
- en: While this is illustrated in your bio, profile picture, and brand design, I
    believe content plays the largest role.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这在你的个人简介、个人照片和品牌设计中有所体现，但我认为内容扮演着最重要的角色。
- en: Your brand is the culmination of ideas in your audience’s mind over the course
    of 3-6 months.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 你的品牌是你受众心中3-6个月内思想的结晶。
- en: Now, we want our content to be in accordance with reality.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们希望我们的内容与现实相符。
- en: Interconnected and organismic.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 互联和有机。
- en: Not quick and fragmented sales funnels that make you feel like sleazy marketer
    doing everything you can to maximize profits.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 不是快速而碎片化的销售漏斗，让你感觉像是一个为了最大化利润而无所不为的油腻营销人员。
- en: Not that you can’t do that, or that you shouldn’t at lower levels of development
    that you need to grow through (please don’t confuse “lower” with bad when they
    are necessary), but I’m assuming you are pursuing this line of work because you
    want something deeper than that which you are currently aware of.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 并不是你不能这样做，或者你不应该在需要通过成长来发展的较低级别上这样做（请不要混淆“较低”与坏，当它们是必要的），但我假设你从事这条工作是因为你想要比你现在所意识到的更深层次的东西。
- en: In other words, we are building a content ecosystem.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，我们正在构建一个内容生态系统。
- en: We are carving out our little pocket of the internet for people to join, learn
    from, and evolve beyond to the next.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在为人们开辟一个互联网的小角落，让他们加入、学习和超越到下一个阶段。
- en: 'I do this by:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 我通过以下方式做到这一点：
- en: Writing social posts every day
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每天撰写社交帖子
- en: Posting those across all platforms
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在所有平台上发布这些帖子
- en: Taking the top-performing ideas
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选取表现最好的想法
- en: Expanding them into deeper newsletters or threads
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将它们扩展为更深入的通讯稿或线程
- en: Posting my newsletter on my personal blog / site
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在我的个人博客/网站上发布我的通讯稿
- en: Turning those newsletters into video and podcast scripts
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将那些通讯稿转化为视频和播客脚本
- en: Linking my products throughout for people to discover
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将我的产品链接起来，让人们可以发现
- en: Embedding my videos in the corresponding blog
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将我的视频嵌入相应的博客
- en: “Plugging” that blog on all social platforms
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在所有社交平台上“插入”那个博客
- en: Since I’m only focused on writing posts and newsletters (and sitting down to
    read them to a camera once a week), this doesn’t take more than 1-2 hours a day.
    It’s a very efficient system. Of course, building and experimenting with a product
    takes more time, but once a digital product is built, you don’t need to do much
    upkeep.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我只专注于撰写帖子、通讯稿（以及每周一次坐在摄像机前阅读它们），这不会超过每天1-2小时。这是一个非常高效的系统。当然，构建和实验产品需要更多时间，但一旦数字产品建成，你就不需要做太多的维护。
- en: This creates a cyclical and interconnected “school system” for people to explore
    and get what they need according to their goals.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 这为人们探索和根据他们的目标获得他们所需的东西创造了一个循环和互联的“学校系统”。
- en: Of course, we only have so much space here, so if you want all of the systems
    to do this, I teach them in [Digital Economics](https://digitaleconomics.school)
    – a life’s work masterclass.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，我们在这里的空间有限，所以如果你想了解所有做这件事的系统，我在[数字经济学](https://digitaleconomics.school)——一个终身工作的大师班中教授它们。
- en: 4) Sell High-Value Products
  id: totrans-170
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 销售高价值产品
- en: 'Warning: this may get long and complex, but will provide a meaningful perspective
    to selling a product.'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 警告：这可能变得很长且复杂，但将提供对销售产品的有意义的视角。
- en: The future of entrepreneurship is a blend of education, meaning, and value exchange.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 企业家的未来是教育、意义和价值交换的融合。
- en: You can see it all around you already.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经可以看到它在你周围。
- en: Individuals are creating anything from courses to clothing to software to holistic
    physical products that help rather than hurt humanity.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 个人正在创建从课程到服装到软件到有助于而不是伤害人类的整体物理产品。
- en: 'When I say “sell high-value products” I mean this:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 当我说“销售高价值产品”时，我的意思是这个：
- en: Sell a product that aids in people reaching new stages of development. New stages
    of consciousness. New levels of mind. Help people remove their limits and expand
    their sense of self.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 销售一种帮助人们达到新阶段发展的产品。新的意识阶段。新的心灵层次。帮助人们打破他们的限制，扩展他们的自我感。
- en: There are infinite ways to do this, so I’ll leave that to your creativity.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 有无限种方法来做这件事，所以我会把那留给你的创造力。
- en: But if you want my opinion, education products are the best place to start.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果你想知道我的意见，教育产品是最好的起点。
- en: They’re nearly free to create and distribute. You can start with something as
    simple as an eBook and let it evolve into more complex courses or cohorts with
    time.
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们的创建和分发几乎免费。你可以从简单的电子书开始，随着时间的推移让它发展成为更复杂的课程或群体。
- en: Physical products can be helpful, but a physical product isn’t necessary for
    change. Education and awareness is an absolute necessity and pre-requisite to
    any kind of behavior change.
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 物理产品可能会有所帮助，但改变并不一定需要物理产品。教育和意识是任何行为改变绝对必要和先决条件。
- en: They are profitable and scalable. High margins, no overhead costs, and no shipping
    or supply chains. This creates a high-leverage lifestyle. You can live how you
    want.
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们是盈利的且可扩展的。高利润率，没有运营成本，没有运输或供应链。这创造了一种高杠杆的生活方式。你可以按照你想要的方式生活。
- en: You build cash flow first and validate future product ideas. You can build your
    next startup without investors and already have an audience of potential buyers.
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你首先建立现金流并验证未来的产品想法。你可以在没有投资者的情况下构建你的下一个创业公司，并且已经有一个潜在买家的受众。
- en: Starting with education, to me, seems like the most straight forward, fulfilling,
    and truly impactful approach to having an impact on the world.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我来说，从教育开始似乎是最直接、最令人满足、真正有影响力的方法，来对世界产生影响。
- en: Not to mention, the economy favors the profitable and the market demand is high
    for education in an uncertain world.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 不仅如此，经济倾向于有利可图的，在不确定的世界中对教育的市场需求也极高。
- en: “But won’t it get saturated?”
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: “但不会饱和吗？”
- en: Not really.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上并不是这样。
- en: We talked about entropy as a universal law.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 我们讨论了熵作为普遍定律。
- en: As more options and uncertainty increase, so does the potential for wealth creation.
    Resources increase. Efficiency increases. Evolution is forced.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 随着选项和不确定性的增加，财富创造的潜力也在增加。资源增加。效率增加。进化被迫发生。
- en: Of course, the landscape may drastically change over the next 10 years, but
    that’s why we build an audience, develop ourselves, and put us in the right position
    to both spot and take advantage of that change.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，未来10年内，景观可能会发生剧烈变化，这就是为什么我们要建立受众，发展自己，并把自己置于一个既能发现又能利用这种变化的位置。
- en: But right now, live learning tools are more widely accepted like Zoom. More
    people are investing in further education outside of schools. E-learning is being
    adopted at an accelerated rate. The general market and opportunity for education
    has gone exponential.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 但现在，像Zoom这样的实时学习工具被更广泛地接受。更多的人在学校之外投资于进一步的教育。在线学习正在以加速的速度被采用。教育的一般市场和机会已经呈指数增长。
- en: On the topic of saturation, why would people buy from you over someone else?
    Aren’t there enough info products on the market?
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 在饱和度的议题上，为什么人们会从你这里而不是别人那里购买？市场上不是已经有足够多的信息产品了吗？
- en: If we look back at the stages of psychological development, I believe there
    isn’t enough education until everyone reaches the unitive stage or higher, which
    is unlikely to happen in a *long time.*
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们回顾心理发展的各个阶段，我相信直到每个人都达到统一阶段或更高阶段之前，教育是不够的，而这在*很长时间*内不太可能发生。
- en: Now, the most profitable products right now are those that help people reach
    or go beyond the achiever and pluralist stages.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，最有利可图的产品是那些帮助人们达到或超越成就者和多元主义阶段的产品。
- en: In the context we’re concerned, the achiever and plurarlist stages can most
    easily be spotted by those deep in self-help, professional development and business,
    cultivating relationships, emotional management and regulation, and beginner levels
    of spirituality.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们关注的背景下，成就者和多元主义阶段最容易通过那些深入自我帮助、职业发展、商业、培养关系、情绪管理和调节以及精神初学者水平的人来识别。
- en: In other words, the eternal markets we’ve discussed before. Health, wealth,
    relationships, and happiness.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，我们之前讨论过的永恒市场。健康、财富、关系和幸福。
- en: This is why social media and YouTube are flooded with these kinds of videos.
    Because those are the stages where most of the population (interested in self-development)
    reside.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么社交媒体和YouTube上充满了这类视频。因为那些是大多数人口（对自我发展感兴趣的人）居住的阶段。
- en: The thing is, these videos and content *aren’t focused on helping people move
    to the next stage*. They’re focused on horizontal growth within that stage rather
    than vertical.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，这些视频和内容*并不是专注于帮助人们进入下一个阶段*。它们专注于该阶段内的水平增长，而不是垂直增长。
- en: You can target higher stages, yes, but understand that they are going to be
    more difficult to attract. The percentage of people who occupy higher stages are
    smaller (until an increase in behavior changing education / awareness changes
    that.)
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以针对更高的阶段，但请理解这将更加困难吸引。占据更高阶段的人的比例较小（直到行为改变教育/意识的增加改变这一点。）
- en: How do you create a profitable product?
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何创造一个有利可图的产品？
- en: '**Choose a medium** – eBooks, paid newsletter, a course, a cohort, coaching,
    etc.'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**选择一个媒介** – 电子书、付费通讯、课程、小组、辅导等。'
- en: '**Choose a domain** – your product can have a blend of topics, but it’s main
    focus should be on health, wealth, relationships, or happiness.'
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**选择一个领域** – 你的产品可以包含多个主题，但它的主要焦点应该是健康、财富、关系或幸福。'
- en: '**Sell to your past self** – reflect on a problem that you’ve solved in your
    life. This can be as simple as a budget worksheet or teaching a skill (wealth
    domain), fitness program (health domain), or even a productivity system.'
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**向你的过去自我销售** – 反思你生活中已经解决的问题。这可能只是一个简单的预算工作表或教授一项技能（财富领域）、健身计划（健康领域），甚至是一个生产力系统。'
- en: '**Sell what’s already selling, but better** – research what’s currently selling
    on the market and make it your own.'
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**卖那些已经热销的产品，但要做得更好** – 研究市场上目前热销的产品，并使其成为你自己的。'
- en: '**Experiment with a unique system** – test a plethora of other’s methods (like
    training programs or productivity planners)'
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**尝试一个独特的系统** – 测试大量其他人的方法（如培训计划或生产力规划者）'
- en: '**Map and build your product** – create an outline that solves a big problem
    and helps customers reach a desired outcome in their life.'
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**绘制并构建你的产品** – 创建一个解决大问题的提纲，并帮助客户达到他们生活中期望的结果。'
- en: '**Filter everything through your own perspective** – remove information that
    doesn’t align with your goals. Include information that helps people adopt your
    perspective.'
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通过你自己的视角过滤一切** – 移除与你的目标不一致的信息。包括帮助人们接受你观点的信息。'
- en: '[Mental Monetization](https://mentalmonetization.com) can help more with this.'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: '[精神变现](https://mentalmonetization.com)在这方面能提供更多帮助。'
- en: Next, people learn best from those *at* their stage or those a stage or two
    above it who can look down and create a map. Your map is your product.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，人们最好是从那些处于他们阶段或高一个或两个阶段的人那里学习，这些人可以俯瞰并创建一个地图。你的地图就是你的产品。
- en: Other people can sell a similar product and talk about the same thing, but some
    people will never find them. You don’t follow someone for what they teach, you
    follow them because of their personality and goals.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 其他人在卖类似的产品，谈论同样的事情，但有些人永远不会找到他们。你跟随某人不是因为他们的教诲，而是因为他们的个性和目标。
- en: I can search online for a web design course, but what if I don’t have the initial
    interest in web design to begin with? What if I’m introduced to it from the person
    I follow? At that point, the only person I’m buying from is that specific person.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以在网上搜索网页设计课程，但如果一开始我就没有对网页设计的兴趣呢？如果我是从我所跟随的人那里了解到它的呢？在那个时刻，我唯一要购买的人就是那个特定的人。
- en: It doesn’t matter how saturated the market is when you create a market by exposing
    them to their next level of self-development *though your product.*
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 当你通过你的产品让他们接触到下一个自我发展层次时，市场饱和度并不重要。
- en: I’ll end the letter here.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里结束这封信。
- en: It’s getting a bit long and we probably need to cover some of these topics in
    another letter specific to those topics.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 它已经有点长了，我们可能需要再写另一封信来专门讨论这些话题。
- en: In the meantime, if you want something else to read, I think this letter on
    [Value Creation](https://thedankoe.com/letters/the-value-equation-how-to-become-a-top-1-individual-fast/)
    will help you understand what makes a product profitable.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，如果你想读些别的，我认为这封信关于[价值创造](https://thedankoe.com/letters/the-value-equation-how-to-become-a-top-1-individual-fast/)将帮助你理解是什么让产品有利可图。
- en: Until next week,
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 到下周见，
- en: – Dan
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
