- en: The Future-Proof Manifesto (How To Stay Relevant In The Next 10 Years)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 未来防护宣言（如何在接下来的10年里保持相关性）
- en: 原文：[https://thedankoe.com/letters/the-future-proof-manifesto-how-to-stay-relevant-in-the-next-10-years/](https://thedankoe.com/letters/the-future-proof-manifesto-how-to-stay-relevant-in-the-next-10-years/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://thedankoe.com/letters/the-future-proof-manifesto-how-to-stay-relevant-in-the-next-10-years/)'
- en: 'Here’s how to future-proof yourself so you can stay relevant in the next 10
    years:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何在未来十年中保护自己，保持相关性的方法：
- en: Become Permissionless
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成为无许可者
- en: You live in the most permissionless time in history.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 你生活在历史上最无许可的时代。
- en: You future-proof yourself when you just do things without permission. You pursue
    something you deeply care about, learn new skills, build the project, package
    it up, try to sell it, and attract a tight knit tribe of people who share your
    energy.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当你无需许可就去做事情时，你就为自己未来做好了防护。你追求自己深感兴趣的事物，学习新技能，构建项目，将其打包，尝试销售，并吸引一群与你能量相匹配的紧密团结的人。
- en: You don’t future-proof yourself by sticking with a skill set that was an asset
    then but is a liability now. A liability that allows someone *else* to determine
    your value, cap your income, and control your attention for most of your day.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 你不能通过坚持一个曾经是资产但现在却是负债的技能集来为自己未来做好防护。这种负债让其他人*决定*你的价值，限制你的收入，并在你大部分的时间里控制你的注意力。
- en: You can learn any skill faster than anyone in the past.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以比过去任何人更快地学习任何技能。
- en: You can find the knowledge you need to do almost anything.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以找到你几乎需要做任何事情的知识。
- en: You can do more as one person with less time, work, and money than an entire
    business could do in the past.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 你一个人就能做更多的事情，比过去一个企业能做的还要多，所需的时间、工作和金钱更少。
- en: You don’t need a degree.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要学位。
- en: You don’t need a certification.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要证书。
- en: You need to be able to get results.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要能够取得结果。
- en: This is called *permissionless leverage*.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这被称为*无许可杠杆*。
- en: And it blows my mind that people still opt for the conventional path.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 让我惊讶的是，人们仍然选择传统的道路。
- en: They’ll go through 4 years of university, stack up miles of debt, and lock themselves
    into one area of study not because they have the experience to make that choice,
    but because it promises to give them a stable income rather than experimenting
    with their own path, error correcting for 1-2 years, and cultivating a mindset
    and skillset that allows them to earn as much as they want.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 他们将度过四年的大学时光，积累数英里的债务，并将自己锁定在一个研究领域，不是因为他们在经验上有能力做出这样的选择，而是因为那承诺能给他们带来稳定的收入，而不是实验自己的道路，纠正1-2年的错误，培养一种心态和技能集，使他们能够赚取他们想要的任何数额。
- en: But now…
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 但现在…
- en: Now the power lies in the individual.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 现在的力量在于个人。
- en: Now future success boils down to skill, agency, critical thinking, and a healthy
    relationship with fear, failure, and embarrassment.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，未来的成功归结为技能、自主性、批判性思维，以及与恐惧、失败和尴尬的健康关系。
- en: And if you believe otherwise, read the last sentence over again, because a lack
    of belief in yourself signals that you have none of the above.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你持有不同的观点，请再次阅读最后一句话，因为对自己缺乏信心意味着你上面提到的所有东西你都没有。
- en: 'But that can change:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 但这可以改变：
- en: Become A Creator
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成为创造者
- en: The only real safety net in today’s world is a body of work that can’t be ignored.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今世界，唯一的真正安全网是你无法忽视的作品集。
- en: Find something you deeply care about.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 找到你深感兴趣的事物。
- en: Obsess over it. Dissect it incessantly. Become an expert without care for credentials
    and degrees.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 对它着迷。不断地剖析它。成为一个不关心证书和学位的专家。
- en: Make it your life’s work.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 让它成为你一生的使命。
- en: Do it all in public.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在公共场合做所有事情。
- en: '**From a spiritual perspective:**'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**从精神层面来看：**'
- en: A creator is not a “personal brand.”
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 创造者不是一个“个人品牌”。
- en: A creator is the essence of your being.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 创造者是你的本质所在。
- en: Humans are tool builders. Deep generalists. Unlike animals who thrive in a specific
    niche, like a lion in the Savannah, humans create jackets for the cold and fans
    for the heat. Nature isn’t the all-caring and peaceful entity we pin it as. It’s
    brutal, dangerous, and doesn’t care about your feelings. Through our desire to
    create, we have transformed the earth into a more hospitable place thanks to our
    accepted role as creator.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 人类是工具的创造者，深度的通才。与在特定领域如萨瓦纳的狮子一样繁荣的动物不同，人类为寒冷创造了夹克，为炎热创造了风扇。自然并非我们赋予它的全知全能和和平的实体。它是残酷的、危险的，并且不关心你的感受。通过我们创造的欲望，我们凭借作为创造者的角色，将地球变成了一个更加宜居的地方。
- en: If happiness—or enjoyment—is the combination of progress being made and contribution
    to something greater than yourself, and both are accomplished by solving problems,
    for yourself and others, and problems are solved through creativity, then the
    only logical and fundamental aim for your future is to embody creativity by becoming
    a creator.
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果幸福或享受是进步和为比自身更大的事物做出贡献的结合，而这两种成就都是通过解决您自己和他人面临的问题，通过创造力来实现的，那么您未来的唯一合理和根本的目标就是通过成为创作者来体现创造力。
- en: ''
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – [Purpose & Profit](https://thedankoe.com/purpose)
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – [目的与利润](https://thedankoe.com/purpose)
- en: In other words, you find the intersection of purpose and profit by creating
    solutions to problems *you* deem interesting, passing on those solutions to contribute
    to the progress of humanity, and repeating the process when the next set of more
    complex problems arise.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，您通过解决您认为有趣的问题来找到目的和利润的交集，将这些解决方案传递出去，为人类的进步做出贡献，当下一组更复杂的问题出现时，重复这个过程。
- en: '**From a cultural perspective:**'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**从文化角度来看：**'
- en: Creators form the new meaning, education, and economic systems.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者形成了新的意义、教育和经济体系。
- en: People scoff at “information products” when there has never been a more favorable
    way to pursue a low-cost interest-based education from people who have (mostly)
    practiced what they preach. You don’t have to be Marcus Aurelius to have access
    to the best mathematician in the realm to learn from anymore. You can simply search
    on YouTube.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 当有比从那些（大多数）践行他们所宣扬的人那里追求低成本兴趣教育更有利的方式时，人们会嘲笑“信息产品”。您不必是马库斯·奥勒留斯才能从领域中最优秀的数学家那里学习，现在您只需在YouTube上搜索即可。
- en: Trust isn’t decreasing in religious institutions and formal education because
    the masses are “waking up,” it’s decreasing because there are more options.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 宗教机构和正规教育中的信任并不是因为大众“觉醒”而减少，而是因为有了更多的选择。
- en: Individuals can now find creators who have a similar worldview they can best
    learn from.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 个人现在可以找到拥有类似世界观、可以最好地向他们学习的创作者。
- en: You aren’t limited to the belief system of their parents.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 您不受父母信念体系的限制。
- en: You aren’t limited to the education a static curriculum can provide.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 您不受静态课程所能提供的教育的限制。
- en: You aren’t limited to a job or career you hate because you have access to the
    resources that allow you to pursue your calling.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 您不受您讨厌的工作或职业的限制，因为您有追求您召唤的资源。
- en: '**From a practical perspective:**'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**从实用角度来看：**'
- en: Every business is a media business now.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 每个企业现在都是一个媒体企业。
- en: From newspaper to radio to TV, you have access to the internet for fucks sake.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 从报纸到广播到电视，您现在可以访问互联网，真是见鬼了。
- en: You don’t need permission to write code, write tweets, write newsletters, write
    a book, record videos, record podcasts, reach out to potential clients, offer
    a digital freelance service, build a digital product, or pursue your life’s work.
    You don’t need permission to create and earn a living doing what you care about.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 您不需要许可来编写代码、撰写推文、撰写通讯、撰写书籍、录制视频、录制播客、联系潜在客户、提供数字自由职业服务、构建数字产品或追求您的人生工作。您不需要许可来创造并赚取您关心的事情的收入。
- en: To start, create a storyline of the person you can help most.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，创建一个关于您能帮助最多的人的故事线。
- en: 'Where they are now, where they want to be, and what the journey looks like
    to go from point A to point B. That’s what attracts an audience: the potential
    for transformation. The mindset change, the skills they need to acquire, and steps
    they need to take. You are a clarity creator.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 他们现在在哪里，他们想要去哪里，以及从A点到B点的旅程看起来像什么。这就是吸引观众的地方：变革的潜力。心态的改变，他们需要掌握的技能，以及他们需要采取的步骤。您是一个清晰度创造者。
- en: That’s your brand mission – to help as many people as possible reach point B.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是您的品牌使命——帮助尽可能多的人达到B点。
- en: Your product is a streamlined system that helps them get from point A to point
    B. This can take the form of freelancing, coaching, or a digital product like
    a book, paid newsletter on Substack, course, cohort, small vibe-coded app, or
    anything else you’ve seen a creator sell.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 您的产品是一个简化的系统，帮助他们从A点到达B点。这可能以自由职业、辅导或数字产品如书籍、Substack上的付费通讯、课程、小组、小型情绪编码应用等形式出现，或者任何您看到创作者出售的其他东西。
- en: Your content (that attracts the right people to you and your product) are the
    lessons, insights, opinions, and observations that people at point A resonate
    with.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 您的内容（吸引正确的人来到您和您的产品身边）是那些在A点的人能够产生共鸣的教训、见解、观点和观察。
- en: Focus on *what and why* in your content.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的内容中关注*什么和为什么*。
- en: Focus on *how* in your product.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的产品上专注于*如何*。
- en: 'If you don’t know who you want to create for or what you want to create:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道你想为谁创造，或者你想创造什么：
- en: Create for yourself.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 为自己创造。
- en: Because if everyone were to help the past version of themselves, knowing that
    everyone is slightly unique, and people evolve over time, there would be no such
    thing as saturation in the creator economy.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 因为如果每个人都帮助过去的自己，知道每个人都是略微独特的，并且人们随着时间的推移而进化，那么在创作者经济中就不会有饱和这种说法。
- en: Become A Beginner
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成为一名新手。
- en: The most important thing you can do when the world is changing rapidly is learn.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 当世界快速变化时，你能做的最重要的事情就是学习。
- en: But most people stop learning after graduation, and even then, one could argue
    that they didn’t *learn* a thing, because learning is discovery, not memorization.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 但大多数人毕业后就停止了学习，即使如此，有人可能会争论他们并没有*学习*到任何东西，因为学习是发现，而不是记忆。
- en: If you want to future-proof yourself, you must be willing to change what you
    do and how you do it.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要确保未来，你必须愿意改变你所做的事情以及你做事的方式。
- en: You aren’t passionate about a specific skill.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 你对一项特定的技能并不热情。
- en: You aren’t passionate about writing, design, or the rest.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 你对写作、设计或其他事情并不热情。
- en: And if you fall for the trap that those are your passions, you will go through
    a world of hurt when *how* we do those things change, especially as AI acceleration
    accelerates.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你陷入这样的陷阱，认为那些是你的激情所在，那么当*我们*做这些事情的方式发生变化时，尤其是随着人工智能加速加速，你将经历一个充满痛苦的历程。
- en: You are passionate about creation.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 你对创造充满热情。
- en: The act of turning dirt into gold with the creative ability of your mind.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 利用你心中的创造力将泥土变成金子的行为。
- en: You are passionate about how that creation helps another expand their sense
    of self.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 你对创造如何帮助他人扩展自我意识感到热情。
- en: Traditional education and hyperspecialization is a way to make people subservient
    to the dominant paradigm / system. Study the generalized principles of nature
    and be a deep generalist.
  id: totrans-67
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 传统教育和高度专业化是一种使人们服从主导范式/系统的方式。研究自然的普遍原则，成为一个深度通才。
- en: ''
  id: totrans-68
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Daniel Schmachtenberger
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 丹尼尔·施马滕伯格
- en: 'Whether this was intentional or not, it is an observable fact:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 无论这是否是有意的，这是一个可观察的事实：
- en: Schools were created to enslave the brightest minds by promising the prestige
    of specialization so they remained narrow minded and didn’t overthrow the true
    rulers.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 学校的建立是为了通过承诺专业化的声望来奴役最聪明的大脑，这样他们就会保持狭隘的思维方式，不会推翻真正的统治者。
- en: A Royal Historian—or well educated employee of the past—may be perceived by
    the nation as someone who is smart and valuable, but the pirates—high-agency entrepreneurs
    of the past—understood many things like geography, celestial navigation, the crew
    on their ship, the ship itself, economics, history, and science as those were
    the necessary tools to succeed in trade in dominion.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 一位皇家历史学家——或者过去受过良好教育的雇员——可能被国家视为一个聪明而有价值的人，但海盗——过去的高效能企业家——理解了许多事情，比如地理、天体导航、他们船上的船员、船只本身、经济学、历史和科学，因为这些都是成功进行贸易所必需的工具。
- en: The rulers of the land were powerful, yes (moreso than the specialized historian,
    at least), but only as powerful as the resources the pirates allowed them to have
    for the price they determined.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 陆地的统治者很强大，是的（至少比专业历史学家更强大），但他们只有海盗允许他们以他们确定的代价拥有的资源那么强大。
- en: To future-proof yourself, become a pirate of the digital landscape.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保未来，成为数字景观的海盗。
- en: Learn how to learn.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 学习如何学习。
- en: Learn how to think.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 学习如何思考。
- en: Learn how to earn.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 学习如何赚钱。
- en: Learn how to lead.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 学习如何领导。
- en: Do all of the above through the act of creation.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 通过创造的行为完成上述所有事情。
