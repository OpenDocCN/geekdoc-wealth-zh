- en: I HAD To Learn These High-Income Skills (If I Wanted To Make Money)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我**必须**学习这些高收入技能（如果我想赚钱）
- en: 原文：[https://thedankoe.com/letters/i-had-to-learn-these-high-income-skills-if-i-wanted-to-make-money/](https://thedankoe.com/letters/i-had-to-learn-these-high-income-skills-if-i-wanted-to-make-money/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/i-had-to-learn-these-high-income-skills-if-i-wanted-to-make-money/](https://thedankoe.com/letters/i-had-to-learn-these-high-income-skills-if-i-wanted-to-make-money/)
- en: My business journey is simple.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我的商业之旅很简单。
- en: I tried almost everything and failed.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我尝试了几乎所有事情，但都失败了。
- en: But, as we all know here, failure is a blessing.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，正如我们在这里都知道的，失败是一种祝福。
- en: It is a data point that reveals what can be improved.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个揭示可以改进之处的数据点。
- en: Those that don’t fail don’t succeed.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 那些没有失败的人不会成功。
- en: It just doesn’t make sense when you think about it… to expect success without
    failure when success only exists from a reference point of failure.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 当你想到它时，这根本说不通……期望没有失败的成功，而成功只存在于失败的基础上。
- en: If you were “successful” since the day you were born (which you were in many
    ways) would you see it as success? Or would you see it as normal life?
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你从出生那天起就“成功”（你在很多方面都是），你会把它看作是成功吗？还是会把它看作是正常生活？
- en: You must set a new goal as a high, embrace massive failure as a low, and dance
    through the struggle to marry the meaningful contrast.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须设定一个新目标，将其设定为高目标，将巨大失败视为低目标，并在挣扎中舞动，以实现有意义的对比。
- en: This brings up an important point.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这提出了一个重要观点。
- en: Self-reliance.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 自立。
- en: Rich kids aren’t self-reliant because they didn’t teach themselves to be. Success
    is their normal. So much so that they don’t have new potentials to discover. Not
    all rich kids are depressed and socially inept, but many many are because they
    didn’t have a reason to cultivate a skill set to achieve a self-generated goal.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 富家子弟并不自立，因为他们没有教会自己如何自立。成功对他们来说是常态。如此之甚，以至于他们没有新的潜力去发现。并非所有富家子弟都感到沮丧和社交无能，但许多许多都是，因为他们没有理由去培养一套技能来实现自我设定的目标。
- en: Nobody can teach you *self-*reliance.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人能教你**自我**自立。
- en: Otherwise, it’s not self-reliance.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 否则，这就不算是自立。
- en: To become self-reliant in any domain, from money to relationships to health,
    you need the skills that bridge the gap between where you are and what you want.
    Most people don’t know what they want, and even more don’t see where they are
    as a problem.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 要在任何领域（从金钱到关系再到健康）实现自立，你需要那些能够弥合你目前状态和想要达到的状态之间的差距的技能。大多数人不知道自己想要什么，甚至更多的人没有意识到他们目前的状态是一个问题。
- en: Notice the word “need” in the paragraph above.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 注意上面段落中的“需要”这个词。
- en: There are skills you *need* to learn to achieve self-reliance.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 有一些技能你需要学习才能实现自立。
- en: They aren’t optional.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这些不是可选择的。
- en: I repeat. They are *not* optional.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我重复一遍。它们**不是**可选择的。
- en: The rest of this letter is not a personal method.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这封信的其余部分不是个人方法。
- en: The skills I present are what every single successful person has to learn (or
    hire for) to achieve a certain level of success in business, relationships, and
    arguably health – even though you may not see them as health skills yet.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我所展示的技能是每个成功人士都必须学习（或雇佣）以在商业、关系，甚至可以说是健康方面达到一定成功水平的技能——即使你可能还没有把它们看作是健康技能。
- en: I failed at 7 business models.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我在7种商业模式上失败了。
- en: The reason was that I didn’t have an understanding of the skills that would
    actually make me money.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 原因是我没有理解那些能真正让我赚钱的技能。
- en: And no, it’s not any of the modern skills like web design, email marketing,
    or lead generation that people tell you to learn.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 不，这并不是现代技能，比如网页设计、电子邮件营销或客户开发，这些都是人们告诉你要学习的。
- en: We need to peel back and go to the root of what makes those skills work.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要剥开表面，深入探究这些技能之所以有效的原因。
- en: Once you understand them, truly, through practice, then you will be able to
    make money flow like your sink does with water.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你真正通过实践理解了它们，那么你将能够使金钱流动得像你的水槽一样流畅。
- en: The Evergreen Skills
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 永恒的技能
- en: I’m in the middle of building a software business and I’m lost.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在构建一个软件业务，我现在感到迷茫。
- en: Business structure, trademark lawyers, general lawyers, hiring, design stages,
    operating agreements, etc.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 商业结构、商标律师、普通律师、招聘、设计阶段、运营协议等。
- en: But, these are all things I can learn on the fly.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，这些都是我可以即兴学习的事情。
- en: Every other business (that isn’t a [one-person business](https://thedankoe.com/letters/the-one-person-business-revisited-turn-yourself-into-a-business/))
    will need to learn the ropes of starting a “real” business at some point – so
    there are plenty of resources available online.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 每一个其他业务（除了[个人企业](https://thedankoe.com/letters/the-one-person-business-revisited-turn-yourself-into-a-business/))最终都需要学习如何开始一个“真正的”业务，因此网上有大量的资源可用。
- en: With a one-person business, you can set up a social media profile, create a
    digital product, and promote it for free (in most beginner cases).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在一家个人企业中，你可以建立一个社交媒体档案，创建一个数字产品，并在大多数初学者案例中免费推广它。
- en: The point is that the technical skills required to start a business are out
    there and available to learn.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 重点是，开始一项业务所需的技术技能是存在的，并且可以学习。
- en: But we aren’t here to talk about those.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们不是来谈论那些的。
- en: Because if those were the drivers of business success, most businesses wouldn’t
    fail.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 因为如果那些是商业成功的驱动力，那么大多数企业都不会失败。
- en: '**Marketing and sales** are different.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**营销和销售**是不同的。'
- en: They are evergreen skills.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是永恒的技能。
- en: They require creativity, experience, and big picture understanding of your industry
    to make work.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 他们需要创造力、经验和对你所在行业的整体理解才能发挥作用。
- en: Marketing and sales are the differentiating factor between those that make money
    and those that don’t.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 营销和销售是赚钱和亏钱之间的区别因素。
- en: Let’s take a tech startup for example.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 以科技初创公司为例。
- en: They have incredible developers and an idea.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 他们有出色的开发人员和一个想法。
- en: They build the software, launch, and… nothing.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 他们开发了软件，发布了，然后……就没有然后了。
- en: They don’t have an audience that trusts them. They don’t have promotions that
    catch the attention of their target market. They don’t solve a specific burning
    problem. They don’t plan to raise problem awareness over time (they don’t *create*
    their own customers through content). They don’t have any of the firepower in
    place that would allow them to write good content, ads, and turn viewers into
    customers.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 他们没有信任他们的受众。他们没有吸引目标市场注意力的促销活动。他们没有解决一个具体的热点问题。他们没有计划随着时间的推移提高问题意识（他们不通过内容**创造**自己的客户）。他们没有任何可以让他们写出好内容、广告并将观众转化为客户的火力。
- en: '**Marketing and sales** paired with **writing and speaking** is how you create
    value.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**营销和销售**与**写作和演讲**的结合是你创造价值的方式。'
- en: I’ve discussed value creation before as the single skill that built my one-person
    business. [This letter](https://thedankoe.com/letters/value-creation-the-skill-that-built-my-one-person-business/)
    will turn anything you do into a profitable endeavor.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我之前讨论过价值创造，这是建立我的个人企业的单一技能。[这封信](https://thedankoe.com/letters/value-creation-the-skill-that-built-my-one-person-business/)将把你的任何行为转变为有利可图的业务。
- en: 'To summarize the principles of marketing and sales that must be illustrated
    in your writing and speaking, you need:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 为了总结你在写作和演讲中必须展示的营销和销售原则，你需要：
- en: A desired outcome
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个期望的结果
- en: A burning problem that stands in the way
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个阻碍前进的热点问题
- en: A proven path to reach the outcome (unique to your experience)
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个通往结果的既定路径（独特于你的经验）
- en: The level of awareness of the person you are targeting (how aware are they of
    their problem?)
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你所针对的人的意识的水平（他们对问题的了解程度如何？）
- en: An angle to talk about that problem based on the 8 human desires
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于八种人类欲望来谈论那个问题的角度
- en: A list of benefits and how solving the problem impacts their life
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一份关于好处和解决问题如何影响他们生活的列表
- en: Proof (from yourself or previous customers) that you can solve that problem
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 来自你自己或前客户的证明，表明你可以解决这个问题
- en: A big idea that catches attention in the sea of internet noise
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个在互联网噪音中引起注意的大想法
- en: A risk reversal or guarantee that tips them over the edge
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个风险逆转或保证，使他们跨过边缘
- en: Marketing and sales are evergreen because they are based on mechanics, human
    behavior, and psychology. They start in the mind as all things do.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 营销和销售是永恒的，因为它们基于机制、人类行为和心理。它们像所有事物一样从思想开始。
- en: These are all potent talking points in your content, landing pages, and anywhere
    else you communicate with people or customers.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这些都是你内容、着陆页以及你与人们或客户沟通的任何其他地方的有力论点。
- en: You aren’t *only* marketing a product or service.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 你**不仅**在推销一个产品或服务。
- en: When you write content, you are selling your ideas.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 当你写作内容时，你正在推销你的想法。
- en: Your content doesn’t get engagement or followers because you can’t combine components
    from the above list into impactful writing and speaking.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 你的内容没有得到参与或追随者，因为你不能将上述列表中的组件结合成有影响力的写作和演讲。
- en: Remember how we discussed self-reliance?
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 记得我们讨论过的自给自足吗？
- en: The rest is on you.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 其余的取决于你。
- en: Obsessively study marketing and sales, but keep the above points in mind so
    you can filter what is important.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 迷恋地研究营销和销售，但记住上述要点，这样你可以筛选出重要的内容。
- en: The Evergreen Vessels
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 永恒的容器
- en: Most people fail to make money because they don’t understand how business works.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人失败是因为他们不理解商业是如何运作的。
- en: You need a good product (which has a host of skills involved in making) and
    you need people that want that product.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要一个好的产品（制作过程中涉及一系列技能）以及需要这个产品的人。
- en: 'Let’s run through a scenario:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过一个场景来了解一下：
- en: I want to sell a planner.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我想卖一个计划表。
- en: So, I experiment on myself first.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我先从自己身上进行实验。
- en: Why? Because you need experience and results. Most businesses fail because they’re
    trying to sell to people that have a problem they’ve never experienced.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？因为你需要经验和结果。大多数企业失败是因为它们试图向那些从未经历过问题的客户销售。
- en: I buy 4-5 best-selling planners on Amazon.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我在亚马逊上购买了4-5本畅销的计划表。
- en: I buy productivity books and courses.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我购买生产力书籍和课程。
- en: I drown myself in podcasts, social media accounts, and videos on productivity
    hacks.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我沉迷于播客、社交媒体账户和生产力技巧的视频。
- en: I structure my days, map out my work, and put what I’ve learned to work.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 我规划我的日子，规划我的工作，并将我所学的应用到实践中。
- en: By this point, I have an idea of how to improve the planner I want to sell –
    or do something entirely new based on what I discovered with my research.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 到这个阶段，我已经有了如何改进我想出售的计划表的想法——或者基于我的研究发现的全新事物。
- en: I’ve also exposed myself to the entirety of what makes that business work.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我也让自己接触到使那个业务运作的全部内容。
- en: I’ve listened to high-performing social media content (that I can recreate to
    promote my planner and build a following without ads).
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我已经听过一些高绩效的社交媒体内容（我可以复制这些内容来推广我的计划表并建立追随者，而不需要广告）。
- en: I’ve purchased the planner, books, and courses from people that are making a
    living from them (so I can reverse engineer their marketing and web pages).
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我已经从那些靠这些计划表谋生的人那里购买了计划表、书籍和课程（这样我可以逆向工程他们的营销和网页）。
- en: I’ve gotten results so that I have direct experience of the problem, desired
    outcome, and system to get there (which composes my marketing strategy).
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我已经取得了结果，以至于我有直接的经验、期望的结果以及达到那里的系统（这构成了我的营销策略）。
- en: It’s all right in front of you but you aren’t paying attention.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 它就在你面前，但你没有注意到。
- en: If you want to make money outside of your job, you need **distribution and a
    product**.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想在工作中赚钱之外赚钱，你需要**分销和产品**。
- en: If you want to do it as one person without the restriction of physical location,
    you need **code and content.**
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要作为一个没有地理位置限制的人来做这件事，你需要**代码和内容**。
- en: Code is the back end of the internet.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 代码是互联网的后端。
- en: Content is the front end of the internet.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 内容是互联网的前端。
- en: Code is how you host content.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 代码是你托管内容的方式。
- en: Content is how you capture attention.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 内容是你吸引注意力的方式。
- en: You don’t need to learn how to code, because technology has advanced to the
    point we are at now.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要学习如何编码，因为技术已经发展到我们现在这个阶段。
- en: What used to take 10 employees to build a membership site can now be done by
    1 person who purchases software.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 以前需要10名员工来建立会员网站的事情，现在一个人购买软件就能完成。
- en: You can hit “post,” have one big account see that post, share it, and get hundreds
    of thousands of views without ever posting before.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以点击“发布”，一个大型账户看到这个帖子，分享它，并且在不发布之前就能获得数十万的观看量。
- en: You can build a readership that allows you to do anything you want with your
    life. You aren’t bound to one static niche.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以建立一个读者群，让你在生活中做任何你想做的事情。你不必局限于一个静态的细分市场。
- en: All-in-all I am saying that creating content is not optional anymore.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 总而言之，我想说的是，创造内容不再是可选的。
- en: It was a few years ago, but markets evolve.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 那是几年前的事情了，但市场在演变。
- en: Sales cycles are getting longer.
  id: totrans-93
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 销售周期正在变长。
- en: ''
  id: totrans-94
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Prospects are investigating you more.
  id: totrans-95
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 潜在客户正在更多地调查你。
- en: ''
  id: totrans-96
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Whoever has the most & best content will win.
  id: totrans-97
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 谁拥有最多和最好的内容，谁就会获胜。
- en: ''
  id: totrans-98
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Cold Email Wizard 📩 (@blackhatwizardd) [July 31, 2023](https://twitter.com/blackhatwizardd/status/1686149523704332288?ref_src=twsrc%5Etfw)
  id: totrans-99
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: —— 冷邮件大师 📩 (@blackhatwizardd) [2023年7月31日](https://twitter.com/blackhatwizardd/status/1686149523704332288?ref_src=twsrc%5Etfw)
- en: Content is how you distribute your product.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 内容是你分发产品的方式。
- en: Marketing and sales are how you create products and content that are actually
    valued by the market.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 营销和销售是你创造市场真正重视的产品和内容的方式。
- en: Those are the main skills you need to prioritize no matter what else you learn.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是你无论学习什么其他技能都需要优先考虑的主要技能。
- en: Marketing, sales, writing, and speaking with content as your vessel for all
    of the above.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 营销、销售、写作以及用内容作为所有上述活动的载体。
- en: If “content” doesn’t make sense to you, buy a few social media courses. Or check
    out [2 Hour Writer.](https://2hourwriter.com)
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你觉得“内容”没有意义，那就买几门社交媒体课程。或者查看[2小时作家](https://2hourwriter.com)。
- en: The Modern Career Path
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 现代职业道路
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1378">![](../Images/b27c6bdc47b832784f89eb5c9c0f31fc.png)</picture>
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/b27c6bdc47b832784f89eb5c9c0f31fc.png)'
- en: I have faith in the creator economy even when most don’t see it.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 即使大多数人看不到，我对创作者经济仍然充满信心。
- en: I see it as nature’s way of correcting what went wrong in the Industrial Revolution.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这是自然界纠正工业革命中出错的方式。
- en: Schooling is decentralized with content and courses.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 学校教育随着内容和课程而分散化。
- en: Students can pursue their curiosity and adapt to the times fast.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 学生可以追求他们的好奇心，并快速适应时代。
- en: 8-hour workdays and wage slavery come to an end for individuals that self-educate
    and acquire skills to work for other creators and eventually themselves.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 对于自学并掌握为其他创作者和最终为自己工作的技能的个人来说，8小时工作日和工资奴隶的时代已经结束。
- en: 'Here is the career path I predict for the present and future:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我预测的现在和未来的职业道路：
- en: 1) Code & Content
  id: totrans-113
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 代码与内容
- en: Code and media are permissionless leverage. They’re the leverage behind the
    newly rich. You can create software and media that works for you while you sleep.
    – Naval
  id: totrans-114
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 代码和媒体是无许可杠杆。它们是新富背后的杠杆。你可以在睡觉时创建为你工作的软件和媒体。 —— 纳瓦尔
- en: Most people will have to start with either code or content.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人将不得不从代码或内容开始。
- en: So, you either become a programmer or a content marketer.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你要么成为一名程序员，要么成为一名内容营销员。
- en: You can learn both, but with time, of course. (This is one of the most potent
    skill stacks).
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以学习两者，但当然，随着时间的推移。（这是一套最强大的技能组合）。
- en: The programmer can work for creators, startups, and really any modern job. They
    can freelance or be employed by all of the above.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 程序员可以为创作者、初创公司以及任何现代工作工作。他们可以自由职业或被上述所有公司雇佣。
- en: The content marketer can do the exact same. Everyone has a content, marketing,
    sales, or any form of media team.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 内容营销员可以做完全一样的事情。每个人都有内容、营销、销售或任何形式的媒体团队。
- en: Most people should write content to build their public resume (or personal brand).
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人应该写内容来构建他们的公众简历（或个人品牌）。
- en: That is where you will find clients, jobs, and attract customers in the future.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是你将来找到客户、工作和吸引客户的地方。
- en: Your personal brand is your online character.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 你的个人品牌是你的在线形象。
- en: If you choose to not learn to code, that’s perfectly fine, because modern software
    makes it so you don’t have to.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你选择不学习编程，那完全没问题，因为现代软件使得你不必这样做。
- en: 2) Marketing & Sales
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 营销与销售
- en: Learn to sell, learn to build, if you can do both, you will be unstoppable.
    – Naval
  id: totrans-125
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 学习销售，学习构建，如果你能两者兼之，你将无所不能。 —— 纳瓦尔
- en: Both paths will converge into the *necessity* of learning marketing and sales.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 这两条道路最终都会汇聚到学习营销和销售的*必要性*。
- en: Most software companies and coders fail because they can build a product, but
    they can’t sell it.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数软件公司和程序员失败，因为他们可以构建产品，但无法销售。
- en: The same goes for content creators.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 对于内容创作者来说，也是如此。
- en: They can build an audience with good writing, but when it comes to creating
    a product that people actually want, they fall short.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 他们可以用良好的写作建立受众，但到了创造人们真正想要的产品时，他们就力不从心。
- en: If you want to survive outside of a job that inevitably loses its shine and
    chains you to a paycheck, marketing and sales are your weapons on the entrepreneurial
    hunt.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要在不可避免地失去光泽并把你束缚在工资上的工作之外生存，营销和销售就是你在创业狩猎中的武器。
- en: 3) Build Distribution
  id: totrans-131
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 建立分销
- en: Build distribution, then build whatever you want. – Jack Butcher
  id: totrans-132
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 先建立分销，然后构建你想要的任何东西。 —— 杰克·巴切
- en: Distribution is the most important concept you can understand in the digital
    race to riches.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 分销是在数字财富竞赛中你能理解的最重要概念。
- en: Distribution methods vary in leverage.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 分销方法在杠杆作用上有所不同。
- en: 'Freelancers, agencies, local businesses, and even startups often focus on low-leverage,
    instantly gratifying distribution methods:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 自由职业者、代理机构、本地企业和甚至初创公司通常专注于低杠杆、即时满足的分销方法：
- en: Cold email
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 冷邮件
- en: Paid ads
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有偿广告
- en: Direct messages
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 直接消息
- en: Now, these are still viable methods to acquire customers, but you are often
    left with nothing if you stop putting effort into them.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这些仍然是获取客户的可行方法，但如果你停止投入努力，你通常一无所获。
- en: 'You are better off building long-term distribution (while mixing in the other
    methods to see profit quickly):'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 你最好建立长期的分发渠道（同时混合使用其他方法以快速看到收益）：
- en: '**Building an audience** – like a 100,000 follower X audience.'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**建立观众群** - 就像拥有10万粉丝的X平台观众群。'
- en: '**Promoting to your network** – like having your 100,000 follower internet
    friend promote your work.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**向你的网络推广** - 例如让你的10万粉丝互联网朋友推广你的作品。'
- en: '**Renting other’s audiences** – like newsletter or youtube sponsorships to
    get in front of millions of interested people.'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**租赁他人的观众群** - 例如通过新闻通讯或YouTube赞助来面对数百万感兴趣的人。'
- en: You must learn social media as a skill to tap into the global distribution channel.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须将社交媒体作为一种技能来利用全球分销渠道。
- en: As you write content and build an audience, you can still email, message, or
    pay for ads to start earning immediately.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 当你写内容并建立观众群时，你仍然可以通过电子邮件、消息或付费广告立即开始赚钱。
- en: For perspective, I get around 12 million impressions per month on X alone. With
    other platforms, it’s probably quadruple that number.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有参考，我仅在X上每月就有大约1200万的曝光量。在其他平台上，这个数字可能是四倍。
- en: From a Google search (I don’t know how accurate this is), a low CPM is around
    $3 for paid ads (1000 impressions).
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 从谷歌搜索（我不知道这个有多准确），低CPM大约是3美元（1000次曝光）。
- en: Every month on X (formerly Twitter) alone, I get what would cost me $36,000
    a month worth of impressions.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 仅在X（以前是Twitter）上，我每月就能获得价值36000美元的曝光量。
- en: If your content/ads are profitable – you should be able to make well over $100,000
    from that each month.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的内容/广告有利润 - 你应该能够从那每个月赚取超过10万美元。
- en: 4) Employable To Unemployable
  id: totrans-150
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 从可雇佣到不可雇佣
- en: There comes a point where you know you will never be employed again.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 有那么一个时刻，你知道你永远不会再次被雇佣。
- en: Your skills compound into knowing how to make money in any market condition.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 你的技能会累积成在任何市场条件下赚钱的能力。
- en: 'The progression I would follow is this:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 我会遵循的步骤是：
- en: Start learning the skills that all brands need – marketing, sales, branding,
    content, design, etc.
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始学习所有品牌都需要掌握的技能 - 营销、销售、品牌、内容、设计等。
- en: Apply for jobs or work for a creator to get real-world experience (and earn
    some money). This can be freelance or employment.
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 申请工作或为创作者工作以获得实际经验（并赚一些钱）。这可以是自由职业或雇佣。
- en: Dedicate 1 hour minimum each day to building your own thing. Write content,
    iterate until you are growing, and promote your offer.
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每天至少投入1小时来建立自己的事业。写内容，迭代直到你开始增长，并推广你的产品。
- en: As your audience grows, start to transition into doing your own thing. Expand
    your product stack to target more people in your audience.
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随着你的观众群增长，开始过渡到自己做的事情。扩大你的产品栈以针对你观众中的更多人。
- en: This way, you are making it near impossible to not secure your future.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 这样做，你几乎不可能不确保你的未来。
- en: If you have subpar marketing skills, a massive audience can make up for that.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有良好的营销技能，一个庞大的观众群可以弥补这一点。
- en: If you have subpar audience-building skills, marketing and sales knowledge can
    make up for that.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有良好的观众群建设技能，营销和销售知识可以弥补这一点。
- en: A diversified skill stack backed by daily effort will solve most of your problems.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 一个多元化的技能栈，加上日常的努力，将解决你大部分的问题。
- en: 5) Iterative Products
  id: totrans-162
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5) 重复性产品
- en: Most creators fail because they treat monetization as a one-and-done type of
    deal.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数创作者失败是因为他们将货币化视为一次性的交易。
- en: Your products and services *evolve* as you do. They build off of each other.
    You can’t create a better product if you never launch the first.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 你的产品和服务*演变*与你一样。它们相互构建。如果你从未推出第一个产品，你就无法创造一个更好的产品。
- en: Stagnation = death.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 停滞 = 死亡。
- en: My web design service evolved into funnels. My funnel knowledge evolved into
    3 digital products. Those digital products evolved into a community. My experience
    along the way created 2 more digital products. My 10+ lead magnets evolved into
    a planner, which is now being relaunched with my book in late September. All of
    the above are evolving into the software I’m building. It never ends. That’s what
    makes sit meaningful.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 我的网页设计服务演变成了漏斗。我的漏斗知识演变成了3个数字产品。这些数字产品演变成了一个社区。我在此过程中积累了2个更多数字产品。我的10多个吸引点演变成了一个计划，现在将在9月底与我新书一起重新推出。所有这些都在演变成我正在构建的软件。这永远不会结束。这就是它有意义的原因。
- en: It should be obvious that if something isn’t selling, it’s a problem with you,
    not the market.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，如果某样东西卖不出去，那问题出在你身上，而不是市场。
- en: If you kept learning and refining your skill set, you would see the opportunity
    for improvement in your products.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你持续学习和完善你的技能组合，你就会看到你产品改进的机会。
- en: All of this business stuff is just persistence and iteration for life.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些商业事务只是生活中的持续和迭代。
- en: Keep building.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 继续构建。
- en: – Dan Koe
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹·科
