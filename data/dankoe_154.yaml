- en: The Internet Is Dead, And We Killed It
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 互联网已死，我们亲手杀死了它
- en: 原文：[https://thedankoe.com/letters/ai-will-end-the-internet/](https://thedankoe.com/letters/ai-will-end-the-internet/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/ai-will-end-the-internet/](https://thedankoe.com/letters/ai-will-end-the-internet/)
- en: 'According to Wikipedia:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 根据维基百科：
- en: The Dead Internet Theory is a conspiracy theory suggesting that the internet
    “died” sometime around 2016–2017 and is now largely dominated by bots and AI-generated
    content rather than real people.
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 死亡互联网理论是一种阴谋论，认为互联网“死亡”发生在2016-2017年左右，现在主要由机器人和人工智能生成的内容主导，而不是真实的人。
- en: But there’s something even more surprising about this theory that nobody’s talking
    about.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 但关于这个理论，还有更令人惊讶的事情，没有人谈论。
- en: Now, I’m not sure why we still label this a “conspiracy theory.”
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我不确定为什么我们仍然将这称为“阴谋论”。
- en: Most of the internet *is* made up of bots and AI content.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网的大部分内容都是由机器人和人工智能生成的。
- en: And it will only get worse.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 而且只会变得更糟。
- en: But honestly, I don’t see it as a problem.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 但说实话，我不认为这是一个问题。
- en: In fact, it could present one of the greatest opportunities for creatives and
    entrepreneurs to stand out.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，这可能是创意人士和企业家脱颖而出的最大机会之一。
- en: On the other hand, there is an endless supply of hyper-addictive, brain-dead
    content that people can scroll through at any given time.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，人们可以随时浏览无穷无尽的超上瘾、脑死亡内容。
- en: It’s a little insane, but the average screen time for the average American is
    a little over *7 hours!* Sure, some of that may be work related, but we all know
    the majority of it, even if you’re at work, is spent on social media.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这有点疯狂，但美国人的平均屏幕时间略超过*7小时*！当然，其中一些可能与工作相关，但我们都知道，即使你在工作，大部分时间也是在社交媒体上度过。
- en: Reports of depression, uncertainty, and stress have gone through the roof, especially
    with the threat of AI replacing human jobs, leaving us grasping at our last sources
    of purpose, even when most people say they hate their jobs.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 报告显示，抑郁、不确定性和压力已经达到了顶峰，尤其是在人工智能取代人类工作的威胁下，即使大多数人表示他们讨厌自己的工作，我们也只能抓住我们最后的生命意义。
- en: The thing is, most people don’t want to change.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，大多数人并不想改变。
- en: People become so accustomed to pain that it feels like home, and leaving it
    seems like the real suffering.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 人们习惯了痛苦，以至于它感觉像家一样，离开它似乎才是真正的痛苦。
- en: And with AI breaking record-high benchmarks every other week, individuals and
    companies can churn out hundreds to thousands of pieces of content every day.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 而且随着人工智能每隔一周就打破记录，个人和公司每天可以产出数百到数千篇内容。
- en: Since this content is so addicting, the stress and depression and uncertainty
    will only continue to get worse, and we won’t be able to control ourselves.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这种内容如此上瘾，压力、抑郁和不确定性只会继续恶化，我们将无法控制自己。
- en: 'The question is:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是：
- en: Is that *actually* a problem?
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这*实际上*是个问题吗？
- en: We’ve all thought about it… is society really going to end up like that scene
    from Wall-E where everyone is obese, floating around in a chair, being drip-fed
    sugary beverages and entertainment all day long?
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都想过这个问题……社会真的会变成《机器人总动员》中的那个场景吗？每个人都是肥胖的，整天坐在椅子上，被滴注含糖饮料和娱乐？
- en: '*I’m not so sure.*'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '*我不这么认为*。'
- en: Processed VS Organic Content
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 加工食品与有机内容
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2487">![](../Images/7d8564ddabbc4f0a910b93a89fba1f44.png)</picture>
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-2487">![](../Images/7d8564ddabbc4f0a910b93a89fba1f44.png)</picture>
- en: Processed food is bad.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 加工食品很糟糕。
- en: That’s obvious, we all know it.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这很明显，我们都知道。
- en: But that doesn’t mean we can’t have a cookie or two—or maybe an entire butter
    cake to yourself at 1 AM watching old episodes of The Office after a few birthday
    espresso martinis—to balance out the over-optimization of our lives.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 但这并不意味着我们不能吃一块饼干或者两块——或者也许在凌晨1点，在喝了几杯生日摩卡之后，独自享用一整个黄油蛋糕——来平衡我们生活的过度优化。
- en: The problems spring up when we can’t control ourselves for an extended period
    of time.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们无法长时间控制自己时，问题就会随之而来。
- en: And that’s very easy to do.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这很容易做到。
- en: Fast food chains, streaming companies, gaming companies, and social media companies
    poor hundreds of *billions* of dollars into optimizing dopamine-driven feedback
    loops designed to keep consumers addicted.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 快餐连锁店、流媒体公司、游戏公司和社交媒体公司投入数百亿甚至数千亿美元来优化由多巴胺驱动的反馈循环，以保持消费者的上瘾。
- en: Facebook alone spends over $20 billion annually on research and development.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 仅Facebook每年在研发上的投入就超过200亿美元。
- en: 'Now, what makes fast food particularly addictive is this brutal combination:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，快餐之所以特别容易上瘾，是因为这种残酷的组合：
- en: Fat, sugar, and salt.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 脂肪、糖和盐。
- en: These were scarce resources that humans aren’t adapted to have in abundance
    in today’s world. We’re adapted for survival. Scarce ingredients, when found,
    spurt dopamine into our brain to signal that we’ve found something to aid in our
    survival.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是稀缺资源，人类在当今世界并不适应拥有过多的资源。我们适应了生存。稀缺的原料，一旦找到，就会向我们的大脑释放多巴胺，以信号我们找到了有助于我们生存的东西。
- en: Once companies discovered this mechanism, they could now test and create combinations
    of these ingredients that maximize pleasure for their customers and keep them
    coming back for more. Addiction.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦公司发现了这个机制，他们现在可以测试和创造这些成分的组合，以最大化客户的愉悦感，并让他们不断回来。上瘾。
- en: <picture decoding="async" class="wp-image-2488">![](../Images/6e7ec9b5180ddd011c0c3a36831cc79b.png)</picture>
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-2488">![](../Images/6e7ec9b5180ddd011c0c3a36831cc79b.png)</picture>
- en: The internet companies followed suit. They adopted an advertising model for
    monetization and soon found that polarizing and inflammatory headlines led to
    capturing the most attention. Now all they had to do was serve more of what users
    “liked” to an instantly accessible screen. Hello, “For You” page!
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网公司也效仿了这一做法。他们采用了广告模式进行盈利，很快发现极端和煽情的标题能吸引最多的关注。现在他们只需要向用户即时可访问的屏幕上提供更多他们“喜欢”的内容即可。你好，“为你推荐”页面！
- en: There’s processed food, and there’s processed *content.*
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 有加工食品，也有加工*内容*。
- en: Digital fat, sugar, and salt.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 数字脂肪、糖和盐。
- en: Cheap dopamine. Instant gratification. Entropy.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 低廉的多巴胺。即时的满足。熵。
- en: 'Quick and shallow content is just that: entropic. The more you consume, the
    more chaotic your mind becomes. There is no long term sense making. Just a bunch
    of useless ideas filling your brain without any goal or vision to apply them to.
    The digital food doesn’t energize you or build muscle, it makes you feel so sluggish
    you just want to lay down all day and gain fat.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 快速而肤浅的内容就是这样：熵增。你消费得越多，你的思维就越混乱。没有长期的意义构建。只是一堆没有目标或愿景去应用的无用想法充斥着你的大脑。数字食品不会给你提供能量或建造肌肉，它让你感到如此迟钝，你只想整天躺下增肥。
- en: Being a Wall-E citizen, drooling over a curated algorithm that feeds you short-term
    gratifying content keeps you in a state of stress and survival. The combination
    of fear and desire pull you away from the present and psychic entropy—or disorder
    in the mind—increases. What you thought was a harmless post was actually a combination
    of 50 short posts you read in unison that silently induces chaos. You regress.
    You stay the same. You lock yourself into a paradigm of political ideologies and
    static opinions that aren’t conducive to achieving anything worthwhile in your
    life.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 作为《机器人总动员》中的公民，沉迷于一个为你提供短期满足内容的定制算法，让你处于压力和生存状态。恐惧和欲望的结合让你远离当下和心灵熵增——或者说心灵的混乱——增加。你以为是无害的帖子，实际上是一系列你同时阅读的50个短帖子，它们无声地引发混乱。你退步了。你保持原样。你将自己锁定在一个政治意识形态和静态意见的范式之中，这些都不利于你在生活中取得任何有价值的东西。
- en: The sad thing is… you don’t care, and you didn’t even notice you got yourself
    into this situation. That’s why I’m writing this.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 可悲的是…你不在乎，甚至没有意识到自己已经陷入了这种境地。这就是我写这篇文章的原因。
- en: But there is a bright side.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 但也有积极的一面。
- en: You already know you can’t trust social media companies to change the incentives
    they operate on.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经知道你不能相信社交媒体公司会改变他们运作的激励机制。
- en: But you can, and must, take matters into your own hands.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 但你可以，也必须，自己动手解决问题。
- en: Shop At Digital Farmer’s Markets
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在数字农夫市场购物
- en: '[<picture decoding="async" class="wp-image-2489">![](../Images/54c97cc72aeceb1c7b5862ac50835b09.png)</picture>](https://twitter.com/KevinEspiritu/status/1888066576064332260)'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '[<picture decoding="async" class="wp-image-2489">![](../Images/54c97cc72aeceb1c7b5862ac50835b09.png)</picture>](https://twitter.com/KevinEspiritu/status/1888066576064332260)'
- en: On the flip side of processed food and content, there is organic food and content.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在加工食品和内容的一侧，有有机食品和内容。
- en: “Organic” content is *centropic.*
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: “有机”内容是*中心性的*。
- en: Unlike entropy that leads to disorder and chaos, centropy leads to order and
    clarity. But you can’t expect the For You page to feed you this content. You must
    *actively search, curate, and nurture your digital feed*, especially as AI content
    starts to ramp up.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 与导致混乱和混乱的熵不同，中心性导致秩序和清晰。但你不能期望“为你推荐”页面为你提供这种内容。你必须*主动搜索、整理和培养你的数字信息流*，尤其是随着AI内容的增加。
- en: How do you spot organic content?
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何识别原创内容？
- en: '**It is useful** — it aids in the achievement of your goals. The caveat here
    is that you actually have to have self-generated goals. If you don’t have a vision,
    most content—aside from that which helps generate vision—is useless. Go read a
    philosophy book.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**它是有用的**——它有助于实现你的目标。但这里有一个前提，你必须有自己设定的目标。如果你没有愿景，大部分内容——除了那些有助于产生愿景的内容——都是无用的。去读一本哲学书吧。'
- en: '**It is often long form** — books, articles, newsletters, podcasts, and YouTube
    videos. It has enough room to deliver something of sense and value. However, many
    short form creators can post insights and education that act as a small puzzle
    piece for your mind.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**它通常是长篇形式**——书籍、文章、通讯、播客和YouTube视频。它有足够的空间传达有意义的和价值的内容。然而，许多短篇内容创作者可以发布一些洞察和教育，这些内容就像你思维中的一个小拼图。'
- en: '**It is authentic** — it is not created because it has to be, it is created
    because the creator deems it valuable enough to share with an audience that may
    benefit from it.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**它是真实的**——它不是因为必须创造而创造，而是因为创作者认为它足够有价值，值得与可能从中受益的观众分享。'
- en: Organic, delayed gratification style content can still use persuasion and attention
    tactics, but they are based on relevant pain points, insight, and education rather
    than fear mongering and brain rot. [Learn how to write it here.](https://2hourwriter.com)
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 有机、延迟满足风格的内容仍然可以使用说服和注意力策略，但它们基于相关的痛点、洞察和教育，而不是恐惧煽动和思想腐化。[在这里学习如何写它](https://2hourwriter.com)。
- en: The point of this is that not all social media content is bad.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这一点是，并不是所有的社交媒体内容都是坏的。
- en: In fact, it’s an incredible way to tap into an infinite source of knowledge.
    Where else can you find information from people who have done what you want to
    do in life? Most successful people are self-educated, and the majority of self-education
    today is done through a screen.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，这是一个进入无限知识来源的惊人方式。你还能在哪里找到那些已经做了你想要在生活中做的事情的人的信息？大多数成功的人都是自学成才的，而今天的大多数自学都是通过屏幕完成的。
- en: Royalty in Roman Civilization—like Marcus Aurelius—had access to the best teachers
    to prepare them for the throne.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 罗马文明中的贵族——比如马库斯·奥勒留斯——有最好的教师来为他们准备王位。
- en: Now that you have access to the best teachers online, you decide to scroll videos
    of hot and dumb people dancing?
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你有了在线最佳教师的资源，你却决定滚动观看那些热辣而愚蠢的人跳舞的视频？
- en: Make it make sense.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 让它有意义。
- en: Why AI Content May Be A Good Thing
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么AI内容可能是一件好事
- en: Nobody is talking about the fact that AI generated content may be a good thing.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人谈论到AI生成的内容可能是一件好事的事实。
- en: 'Because here’s the thing:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 因为这里的关键是：
- en: It doesn’t matter if the internet is flooded with a ton of garbage content.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 即便互联网充斥着大量的垃圾内容，这也不重要。
- en: It already has been for years now.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 这已经持续了好几年了。
- en: Even further, if this actually began to pose a problem to the revenue of social
    media companies, which it probably will, they can create a solution. Cryptography
    of biometric passes to prove who is human are an obvious possibility.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 更进一步，如果这实际上开始对社交媒体公司的收入造成问题——这很可能会发生，他们可以创造一个解决方案。生物识别通行证的加密来证明谁是人类是一个明显的可能性。
- en: It’s fun to whine and complain about Dead Internet Reality to distract you from
    what you can do about it. The mind is tricky in this sense.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 对抗Dead Internet Reality（互联网的死亡现实）抱怨和抱怨是有趣的，这样可以让你从你能做什么来解决这个问题上分心。从这方面来说，思维是复杂的。
- en: You’re worried that bots and AI content have affected your ability to acquire
    good information when that couldn’t be further from the truth. You just want everything
    fed to you, and the social media companies are giving you just that.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 你担心机器人和AI内容影响了你获取好信息的能力，但这与事实相去甚远。你只是想要一切都被喂给你，而社交媒体公司正是这样做的。
- en: As mentioned in the beginning, we become so accustomed to pain that it feels
    like home, and leaving feels like the real suffering.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 如开头所述，我们习惯了痛苦，以至于它感觉像家一样，而离开则感觉像是真正的苦难。
- en: On top of that, think about how people actually *view* content.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，想想人们实际上是如何**看待**内容的。
- en: There’s a ton of content, yes.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 内容确实很多。
- en: But any given person can only view so many posts, and they can only follow so
    many people.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 但任何一个人只能看到这么多帖子，他们也只能关注这么多人。
- en: The reality here is that AI doesn’t create great content on it’s own.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，现实是AI本身并不能独立创造出优质内容。
- en: 'I’ve tried to get it to replicate my writing. I’ve engineered simple prompts
    and prompts the size of a mini course on social media. Out of 100 posts AI spits
    out for me, maybe *one* can be posted. The rest are useful for ideas that I completely
    rewrite, some could use minor edits, but there’s a crucial point here:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我尝试让它模仿我的写作。我设计了简单的提示和像社交媒体迷你课程一样大的提示。在我给出的100篇AI生成的帖子中，可能只有*一篇*可以发布。其余的对于我完全重写的想法是有用的，一些可能需要轻微的编辑，但这里有一个关键点：
- en: AI content isn’t good unless *you* are good at content.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: AI内容除非*你*擅长内容，否则不会好。
- en: Most of it goes straight to the bottom of the barrel and isn’t seen by human
    eyes. The dead internet is like an iceberg, and the majority of the dead content
    is so deep that nobody will ever see it.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数内容都直接被扔进垃圾桶，没有人会看到。死互联网就像一座冰山，大部分死内容都太深，以至于没有人会看到。
- en: And if the AI content was good, would it actually matter?
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 如果AI内容很好，这实际上重要吗？
- en: If I were to write this same exact newsletter, word for word, with AI, would
    you care? If it gave you the value you were looking for, I would argue that you
    wouldn’t. You may say, “but if I knew it was AI, something would feel off.”
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我用AI一字一句地写这封相同的通讯稿，你会介意吗？如果它提供了你想要的价值，我会说，你不会介意。你可能会说，“但如果我知道这是AI，会有点不对劲。”
- en: This worry stems from a fundamental misunderstanding and over conflation of
    what AI *is.* Hype is great at clouding perception.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这种担忧源于对AI本质的根本误解和过度混淆。炒作擅长模糊人们的认知。
- en: Intelligence is only one resource, and it’s proving to be a pretty poor one
    at that. It falls flat if there is no vision, taste, and agency. If you aren’t
    already good at the thing, AI won’t be good at the thing.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 智力只是资源之一，而且它证明是一个相当糟糕的资源。如果没有愿景、品味和执行力，它就会失效。如果你在某个领域不是已经擅长，AI在那个领域也不会擅长。
- en: Let’s say this letter was written with AI. It would take a *human behind the
    AI* to orchestrate the story being told. That human would need vast experience
    in writing and content creation to lead to the output being *good.* A simple “write
    a newsletter on dead internet theory” would not lead anywhere remotely close to
    this exact newsletter.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 假设这封信是用AI写的。需要一个人在AI背后来编排要讲述的故事。那个人需要有丰富的写作和内容创作经验，才能使输出变得*好*。简单的“写一篇关于互联网死亡理论的通讯稿”不会带来任何接近这封确切通讯稿的结果。
- en: AI hasn’t replaced content, it has simply made bad content easier to make.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: AI并没有取代内容，它只是让制作糟糕内容变得更加容易。
- en: The fact remains that if you are unexperienced, unskilled, and are trying to
    use AI to achieve some quick result, you will fail. The principles haven’t, and
    won’t, change.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 事实仍然如此，如果你没有经验、没有技能，并且试图使用AI来快速取得一些成果，你将会失败。这些原则从未改变，也不会改变。
- en: Deep Research just dropped a wild list…
  id: totrans-83
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 深度研究刚刚发布了一份疯狂清单…
- en: ''
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 20 jobs that OpenAI o3 will replace humans. [pic.twitter.com/rB45IUqheC](https://t.co/rB45IUqheC)
  id: totrans-85
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: OpenAI o3将取代人类的20个工作。 [图片链接](https://t.co/rB45IUqheC)
- en: ''
  id: totrans-86
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Min Choi (@minchoi) [February 4, 2025](https://twitter.com/minchoi/status/1886597182154850546?ref_src=twsrc%5Etfw)
  id: totrans-87
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — Min Choi (@minchoi) [2025年2月4日](https://twitter.com/minchoi/status/1886597182154850546?ref_src=twsrc%5Etfw)
- en: “But Dan, the first jobs that AI is going to replace are social media managers,
    copywriters, and content marketers!”
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: “但丹，AI将要取代的第一批工作将是社交媒体经理、文案撰写者和内容营销者！”
- en: Correct, they are going to replace the formulaic ones.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 正确，他们将要取代那些公式化的工作。
- en: You know, the social media managers who post a fancy image made in Canva that
    gets absolutely zero results for the client.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道，那些在社交媒体上发布由Canva制作的华丽图片，却对客户毫无结果的社交媒体经理。
- en: Or the content marketer who puts a picture of a pretty girl on the screen with
    a Gen Z caption that people are already tired of (this can be done already with
    Reel Farm).
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 或者是那位内容营销者，在屏幕上放了一张漂亮女孩的图片，配以一个人们已经厌倦的Z世代标题（这已经可以用Reel Farm做到了）。
- en: Or the copywriter who wrote updates for a company just so they can say they
    have an “online presence.”
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 或者是那位为公司写更新，只是为了说他们有“在线存在”的文案撰写者。
- en: Think of AI as a ghostwriter (or ghost coder, designer, filmmaker, etc).
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 将AI视为一个代笔人（或代码编写者、设计师、电影制作人等）。
- en: A ghostwriter doesn’t create the story, they write it. James Patterson (and
    this is a shock to most people) uses a ghostwriter for his novels. The thing is,
    James still orchestrates the plot, the characters, the lore, the marketing, the
    sales, the business, and the rest. The ghostwriter simply strings this together
    in writing. That’s exactly what AI will do. Not just for writing, but for all
    of the above, allowing Patterson to do this all by himself… if he wants to.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 代笔作家并不是创造故事，而是将故事写出来。詹姆斯·帕特森（这对大多数人来说都是一个震惊）为他的小说使用了代笔作家。问题是，詹姆斯仍然负责情节、人物、传说、营销、销售、商业和其他一切。代笔作家只是将这些内容串联起来进行写作。这正是AI将要做的。不仅限于写作，还包括上述所有内容，让帕特森能够独自完成这一切……如果他愿意的话。
- en: 'Now here’s the real kicker:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是真正的关键：
- en: AI lacks a coherent vision and philosophy. People don’t follow creators for
    one piece of content. They follow for their body of coherent work. You don’t find
    value in this letter because it’s the first one you’ve read. You find value in
    the entire philosophy I’ve strung together over the past 3-4 years that helps
    specific creative individuals make sense of their place in the world. If you’re
    new here, you may find some value, but it compounds the more you read. Centropic.
    At least that’s my hope.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能缺乏连贯的愿景和哲学。人们不是追随创作者为了某一件内容，而是为了他们连贯的作品集。你不会因为这是你读的第一封信而从中找到价值。你会在过去3-4年里我串联起来的整个哲学中找到价值，这有助于特定的创意个体理解他们在世界中的位置。如果你是新手，你可能会找到一些价值，但随着阅读的增多，这种价值会成倍增加。中心点。至少这是我希望看到的。
- en: 'The good news: good writers won’t be replaced. They will become more powerful
    and dynamic.'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息是，优秀的作家不会被取代。他们将会变得更加强大和有活力。
- en: Artificial intelligence has only created the potential for *one person* to create
    more, faster, in a company or not, but only if they value agency and self-development.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能只为一个人创造了更多、更快地创造的可能性，无论是在公司内还是公司外，但这只有当他们重视代理权和自我发展时才成立。
- en: The Opportunity Of A Lifetime
  id: totrans-99
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一生一次的机会
- en: <picture loading="lazy" decoding="async" class="wp-image-2490">![](../Images/2a022a2831a00ca6109729aced57a48e.png)</picture>
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-2490">![](../Images/2a022a2831a00ca6109729aced57a48e.png)</picture>
- en: Most people won’t like this.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人不会喜欢这一点。
- en: But it’s ironic that the only way out is through.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 但讽刺的是，唯一的出路就是通过它。
- en: To battle the processed content flood you must contribute to humanity by posting
    organic content.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 为了对抗内容泛滥，你必须通过发布有机内容来为人类做贡献。
- en: “Contribute to humanity” sounds like a strong line to use here, but when social
    media *is* the media now, and *you* are the media, and media shapes culture, and
    culture shapes everything from politics to the economy… something as simple as
    “posting online” can become pretty important.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: “为人类做贡献”听起来在这里是一个强有力的口号，但当你现在的社会媒体就是媒体，而你就是媒体，媒体塑造文化，文化从政治到经济塑造一切时……“在线发布”这样简单的事情可以变得相当重要。
- en: 'It is my belief that this is one of the few paths forward:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这是向前发展的少数几条路径之一：
- en: To become a value creator.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 成为价值创造者。
- en: This isn’t anything new. It’s what the most happy and successful people have
    done throughout history. Why?
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不是什么新鲜事。这是历史上最快乐和最成功的人所做的事情。为什么？
- en: Happiness comes from resistance being overcome and a connection to something
    greater than yourself. In other words, creativity and contribution. When you create,
    you solve a problem. When you pass that creation onto someone else, you solve
    their problem. When you become a person who has value to give, and then give it
    consistently, you learn what it means to be happy.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 幸福来自于克服阻力并与比你更伟大的事物建立联系。换句话说，就是创造力和贡献。当你创造时，你解决了问题。当你将这个创造传递给他人时，你解决了他们的问题。当你成为一个有价值的人，并且持续地给予，你就学会了什么是幸福。
- en: 'The thing is, this wasn’t very accessible in the past. But evolution is creative,
    and thus it solves problems, and this was a set of problems that has been brewing
    for a long time: the problem of work you hate, a lifestyle you don’t control,
    and a lack of access to opportunity.'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，过去这并不容易获得。但进化是富有创造力的，因此它解决问题，这是一系列长期酝酿的问题：你讨厌的工作问题、无法控制的生活方式，以及缺乏机会。
- en: In comes social media as a potential solution. A platform that the uneducated
    person views as toxic. A platform that adopted poor incentives and took an interesting
    shape.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体作为一个潜在的解决方案出现了。一个被未受教育的人视为有毒的平台。一个采用了不良激励并采取了有趣形态的平台。
- en: 'The good sides of it often go underappreciated:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 它的好处往往被低估：
- en: '**Anyone can learn** — you have intelligence on tap, especially with AI. You
    can find any information you need to achieve what you want to achieve.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任何人都可以学习**——你拥有现成的智慧，尤其是有了人工智能。你可以找到你需要的信息来实现你的目标。'
- en: '**Anyone can create** — you don’t need permission to post who you are, what
    you do, and why you do it in public.'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任何人都可以创造**——你不需要许可就可以在公共场合发布你是谁、你在做什么以及你为什么这么做。'
- en: '**Anyone can be discovered** — you no longer need a publisher, job board, or
    record label to write a book, find work, or make music. Your personal brand is
    your public resume.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任何人都可以被发现**——你不再需要出版商、招聘网站或唱片公司来写书、找工作或制作音乐。你的个人品牌是你的公开简历。'
- en: Social media is where the attention is. In the past, it was on billboards, in
    your local network, and on the radio or TV. The average person often didn’t have
    the opportunity to spread their work.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体是注意力的集中地。过去，注意力在户外广告牌、本地网络、收音机或电视上。普通人往往没有机会传播自己的作品。
- en: As AI continues to replace entry level jobs, and top paying jobs are reserved
    for the elite in skill (like getting into the NBA, it’s probably not going to
    happen for the average person), the path forward lies in generalism, agency, and
    storytelling.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能继续取代入门级工作，而高薪工作被技能精英（如进入NBA，对普通人来说可能不会发生）所保留，未来的道路在于通才、自主性和讲故事。
- en: You Are The Moat (How To Future Proof Yourself)
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你是护城河（如何未来无忧）
- en: It seems like people are starting to catch on to what I’ve been saying for the
    past few years now.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来人们现在开始意识到我过去几年一直在说的东西。
- en: 'Not that I had some kind of revolutionary information, but because I proposed
    this as a potential solution:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 不是因为我有一些革命性的信息，而是因为我提出了一个潜在的解决方案：
- en: '**The internet is a decentralized school system**, creators are the teachers
    who can teach relevant and useful information whose sole purpose isn’t to make
    you a useful worker.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**互联网是一个去中心化的教育体系**，创作者是教师，他们可以传授相关和有用的信息，其唯一目的不是让你成为一个有用的工人。'
- en: '**The internet is the public town square** where your value can be discovered
    by those who need it.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**互联网是公共广场**，你的价值可以被那些需要它的人发现。'
- en: '**Building an audience is the new resume and status symbol.** Followers are
    less about vanity and more about social proof that people find value in your ideas.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**建立受众是新的简历和地位象征**。粉丝不仅仅是虚荣，更多的是社会证明，表明人们认为你的想法有价值。'
- en: '**Anyone can be an entrepreneur.** When the novelty and challenge of schooling
    and job advancement come to a halt in your mid 20s—causing a lack of meaning and
    purpose—entrepreneurship is how you continue to develop yourself and control your
    future.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任何人都可以成为企业家**。当你在20多岁时，学校的新奇和挑战以及职业发展的动力停止——导致缺乏意义和目的——创业就是继续自我发展和控制你未来的方式。'
- en: That will not sit well with some people.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能不会让一些人感到满意。
- en: But listen here.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 但请听我说。
- en: I’m not telling you to do anything crazy. I’m simply promoting the value of
    self-governance. I’m showing you that there is a path to taking control of your
    life. That if you were to become a creator, you wouldn’t have to worry about jobs,
    careers, and AI as Naval would say.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是在告诉你做任何疯狂的事情。我只是在推广自我治理的价值。我向你展示了一条掌握你生活的道路。如果你成为创作者，你就不必担心工作、职业和人工智能，正如纳瓦尔所说。
- en: Realize that I’m not talking about a “content creator.”
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，我说的并不是“内容创作者”。
- en: I’m talking about the essence of your being.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 我在谈论你存在的本质。
- en: You are a human. You are a creator. You build tools as a generalist would that
    allows you to thrive in any environment (unlike animals who can only thrive in
    one niche).
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 你是人类。你是创作者。你像通才一样构建工具，让你在任何环境中都能茁壮成长（不像动物只能在一个生态位中茁壮成长）。
- en: The thing is, the internet is where creators go right now.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，现在创作者们都聚集在互联网上。
- en: 'Building an audience requires you to learn the stack of skills that makes you
    future-proof: agency, storytelling, persuasion, marketing, sales, writing, and
    how to orchestrate your vision with the help of AI—all as one person.'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 建立受众需要你学习使你未来无忧的技能堆栈：自主性、讲故事、说服力、营销、销售、写作，以及如何借助人工智能来协调你的愿景——这一切都由一个人来完成。
- en: It’s not about cringeworthy content templates and growing to a million followers
    in 6 months.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是关于令人尴尬的内容模板，也不是在六个月内增长到一百万粉丝。
- en: Think of Jordan Peterson.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 想想约旦·彼得森。
- en: He isn’t a “content creator.” He writes books. He gives talks. He has a writing
    software. He has Peterson Academy because schools wouldn’t cut it.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 他不是一个“内容创作者”。他写书。他做演讲。他有一个写作软件。他创建了彼得森学院，因为学校不能满足他的需求。
- en: The internet, and social media, are simply *the best tools to advance his life’s
    work.*
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网和社交媒体，仅仅是*推进他一生工作的最佳工具*。
- en: That will probably change, but true creators will adapt. Whether it’s intergalactic
    space, virtual reality, or we revert back to the stone age, you must become a
    creator. You must solve problems and distribute solutions.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能会改变，但真正的创造者会适应。无论是星际空间、虚拟现实，还是我们回归石器时代，你必须成为一个创造者。你必须解决问题并传播解决方案。
- en: Create the internet you want to be a part of.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 创造你希望成为其中一员的互联网。
- en: Create the content you want to see in the world.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 创造你希望在世界上看到的内容。
- en: Create the products you would buy, use, and benefit from.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 创造你愿意购买、使用并从中受益的产品。
- en: Since the internet is so central to our society, you’d be surprised how much
    of an impact your contribution can have on the progress of humanity. Zoom out
    and think about that for a bit.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 由于互联网在我们社会中如此核心，你可能会惊讶于你的贡献对人类进步的影响有多大。退一步想想。
- en: Now, in the tech space, there’s a lot of talk about *moats.*
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在科技领域，有很多关于*护城河*的讨论。
- en: When DeepSeek R1 (the Chinese AI company) built an outstanding model that rivaled
    ChatGPT o1 at a fraction of the cost, *and open source,* people started screaming,
    “There is no moat!”
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 当DeepSeek R1（一家中国AI公司）以极低成本构建了一个与ChatGPT o1相媲美的出色模型，*并且开源*时，人们开始尖叫，“没有护城河！”
- en: Meaning that no given company has all of the resources to themselves. Meaning
    that resources like intelligence are moving in the direction of being close to
    zero cost and accessible to everyone—just like building an audience and connecting
    with anyone with an internet connection.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着没有任何一家公司拥有所有资源。这意味着像智力这样的资源正在向接近零成本和人人可及的方向移动——就像建立受众和与任何有互联网连接的人建立联系一样。
- en: This leaves people wondering, “what is the moat?”
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 这让人们不禁要问，“护城河是什么？”
- en: What is the thing that protects you against an uncertain future?
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 是什么保护你免受不确定未来的侵害？
- en: In software, people are saying it’s the *app layer.*
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 在软件领域，人们说它是*应用层*。
- en: That people building interfaces and use cases with AI are the ones with true
    security. They used to be made fun of for building ChatGPT wrappers (software
    that is just a reskinned version of ChatGPT with a new interface).
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 那些使用人工智能构建界面和用例的人才是真正有安全保障的人。他们过去因为构建ChatGPT包装器（只是ChatGPT的新界面版本）而被嘲笑。
- en: But little did they realize that everything is a wrapper.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 但他们几乎没有意识到，一切都是包装。
- en: Typeform, a multi billion dollar company, is just an HTML form wrapper.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: Typeform，一家价值数十亿美元的公司，只是一个HTML表单包装器。
- en: So that begs the question, what’s the ultimate wrapper? What’s the ultimate
    moat?
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 这就引出了一个问题，终极包装是什么？终极护城河是什么？
- en: '*You.*'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: '*你*。'
- en: You are the niche.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 你是细分市场。
- en: Your vision, interests, experience, values, beliefs, and everything that makes
    you you is the most unique wrapper of any creation you put out into the world.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 你的愿景、兴趣、经验、价值观、信仰以及所有让你成为你的东西，是你向世界展示的任何创造中最独特的包装。
- en: Write to yourself.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 给自己写信。
- en: Build for yourself.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 为自己构建。
- en: Solve your own problems and sell the solution.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 解决你自己的问题，并出售解决方案。
- en: By all measures, that is the only way to future-proof yourself.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 从所有衡量标准来看，这是唯一确保未来的方法。
- en: Everything else is a distraction.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 一切其他事物都是干扰。
- en: – Dan
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
