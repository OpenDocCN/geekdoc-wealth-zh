- en: 7 Bad Habits Preventing You From The Life You Want
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 7个阻碍你过上理想生活的坏习惯
- en: 原文：[https://thedankoe.com/letters/7-bad-habits-preventing-you-from-the-life-you-want/](https://thedankoe.com/letters/7-bad-habits-preventing-you-from-the-life-you-want/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/7-bad-habits-preventing-you-from-the-life-you-want/](https://thedankoe.com/letters/7-bad-habits-preventing-you-from-the-life-you-want/)
- en: These 7 habits are psychological.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 这7个习惯是心理上的。
- en: (I’d actually argue that all habits are psychological.)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: （我实际上会争论说所有习惯都是心理上的。）
- en: They aren’t physical actions that you try to stop doing.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这些不是你试图停止做的物理行为。
- en: They are subconscious thought processes that lead to staying the same rather
    than acting on the future you want.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是无意识的思维过程，导致人们保持现状而不是采取未来想要的生活。
- en: And it will take some work to get you to rewire your mind.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 而这需要一些工作来重新连接你的思维。
- en: So stick with me.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 所以请跟我一起坚持下去。
- en: Habit 1) Not Being Selfish Enough
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 习惯1) 不够自私
- en: 'Because the oxygen mask principle applies to real life:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 因为氧气面罩原则适用于现实生活：
- en: You must secure your well-being first if you want to help others.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想帮助他人，你必须首先确保自己的福祉。
- en: A suffocated savior helps no one.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 一个窒息的救世主对任何人都没有帮助。
- en: We’ve been trained to think that we need to care about everyone else before
    ourselves, and the people who trained us to think that way are unconsciously selfish.
    Most people don’t want the best for you. They want what’s best for them, and they
    will convince you to serve them in a way that makes *you* seem selfish if you
    don’t. Avoid that trap. It positions you as an exploitable resource.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我们被训练去认为在关心自己之前需要先关心别人，而那些训练我们这样思考的人是无意识地自私的。大多数人并不希望你得到最好的。他们希望的是对他们最好的，他们会说服你以一种让你看起来自私的方式为他们服务。避免这个陷阱。它把你定位为一个可利用的资源。
- en: The most important people and work in your life deserve the best version of
    you.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 你生活中最重要的人和事值得你最好的版本。
- en: And when you neglect yourself to cater to the needs of others, they receive
    all of the benefit while your potential slowly goes down the drain.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 而当你忽视自己来迎合他人的需求时，他们得到了所有的好处，而你的潜力却慢慢流失。
- en: Stop seeing selfishness as a negative thing.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 停止把自私看作是负面的事情。
- en: Instead, become *strategically selfish.*
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，要变得**策略性自私**。
- en: Think of yourself as a cell phone battery or a muscle. When you are fully charged
    or recovered, you perform your best. When you’re exhausted, you shut down. Most
    people are operating on zero percent battery in everything they do.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 把自己想象成一个手机电池或肌肉。当你完全充电或恢复时，你表现得最好。当你筋疲力尽时，你就关闭了。大多数人做任何事情都是在零电池电量下运作。
- en: '**Identify non-negotiables** – a short list of what you absolutely need to
    function well. Exercise, alone time, sleep. Be specific. These are necessary not
    luxury.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**确定不可协商的事项** – 一份简短的清单，列出你绝对需要来良好运作的事情。锻炼、独处时间、睡眠。要具体。这些都是必需品，不是奢侈品。'
- en: '**Be unapologetic when saying “no”** – this is difficult, but practice saying
    no without saying sorry. State that you aren’t available and let reactions expose
    their lack of care for your well being.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在说“不”时不要道歉** – 这很困难，但练习说“不”而不说“对不起”。说明你不可用，让反应暴露出他们对你的福祉缺乏关心。'
- en: '**Filter requests against resources** – if you don’t have the energy, if it’s
    not important, if you have to give up something important, or if you will hate
    it, *decline*. Full stop.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**根据资源过滤请求** – 如果你没有精力，如果它不重要，如果你必须放弃一些重要的事情，或者如果你会讨厌它，*拒绝*。句号。'
- en: '**Give when you are overflowing** – know what you need to function, know what
    you need to perform your best, and know what you can give away freely *after*
    those are prioritized.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**当你富足时给予** – 知道你需要什么来正常运作，知道你需要什么来发挥最佳状态，并且知道在优先考虑这些之后你可以自由地给予什么。'
- en: Selfishness and selflessness are two sides of the same coin. You can’t have
    one without the other, just like you cannot have happy without contrasting it
    to sad.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 自私和无私是同一枚硬币的两面。你不能有其中之一而没有另一个，就像你不能有快乐而不与悲伤形成对比一样。
- en: This may sound like basic advice, but do you actually do it?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能听起来像基本建议，但你真的做到了吗？
- en: If not, you needed this reminder, and probably shouldn’t write it off because
    you’ve heard it before.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如果不是，你需要这个提醒，而且可能不应该因为之前听过就把它排除在外。
- en: If you practice becoming more selfish, your quality of life will improve drastically
    within a week.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你练习变得更加自私，你的生活质量将在一周内显著提高。
- en: Habit 2) Asking “How Do I Start?”
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 习惯2) 询问“我如何开始？”
- en: Excuse my rant here.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 请原谅我在这里发泄一下。
- en: Why are people so obsessed with the wrong things?
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么人们会对错误的事情如此着迷？
- en: 'It feels like a day doesn’t go by without people asking:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 感觉好像没有一天不有人问：
- en: “How long will it take?”
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: “需要多长时间？”
- en: “How do I start?”
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: “我该如何开始？”
- en: Both of which stem from a deeper question, “What if I fail?”
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个问题都源于一个更深层次的问题，“如果我失败了怎么办？”
- en: I get it.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我明白了。
- en: You want to start the side business to make more money. You want to get in the
    gym to fix your self-confidence. You want to do the hard thing so that life can
    be easier.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 你想开始副业来赚更多的钱。你想去健身房来恢复你的自信心。你想做困难的事情，以便生活可以更容易。
- en: 'To that I say:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这一点，我说：
- en: It doesn’t matter if it takes years.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 无论需要多少年都无关紧要。
- en: What the fuck else are you going to do?
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 你还能做什么？
- en: You aren’t going to learn, build, experiment, and everything else that makes
    life meaningful because you have something better to do?
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 你不会学习、建立、实验以及所有使生活有意义的事情，因为你还有更好的事情要做？
- en: Make it make sense.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 让它有意义。
- en: You want life to be easier because it’s hard. But the minute that pursuing your
    dreams becomes hard, you quit and accept how hard your life is?
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 你想要生活更容易，因为它是艰难的。但是，当你追求梦想变得艰难时，你就放弃并接受你生活的艰难？
- en: Really?
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 真的吗？
- en: The problem is that your priorities are a lie.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 问题在于你的优先级是谎言。
- en: You say you want to be successful, but you clearly don’t, because your desire
    for success doesn’t outweigh your desire to lie in bed eating doritos.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 你说你想要成功，但你显然并不想，因为你的成功欲望并不超过你躺在床上吃多力多滋的欲望。
- en: You must realize that it doesn’t matter if it takes your entire life, because
    at least you’ll be growing, not dying, along the way. Your life’s work isn’t an
    outcome. It’s a process.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须意识到，无论需要你的一生，因为至少你会在成长，而不是死亡。你的生命工作不是一个结果。它是一个过程。
- en: 'Onto the next question:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是下一个问题：
- en: “How do I start?”
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: “我该如何开始？”
- en: You start by starting.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 你从开始做起。
- en: Plain and simple.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 简单明了。
- en: Imagine you were the first person in the history of the world to do what you
    were about to do. Starting the business, getting in shape, learning a new skill,
    whatever it may be.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你是世界上第一个将要做那件事的人。开始业务，保持体型，学习新技能，无论是什么。
- en: Do you think that person had a tutorial they could watch? A book to read?
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 你认为那个人有一个可以观看的教程吗？一本书可以阅读？
- en: Or did they make a mistake? Then another. Then another. Without labeling it
    as failure because they understood that they were building a collection of *what
    doesn’t work, *and at some point, it would be impossible for them not to succeed,
    considering all of the experience they gained.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 或者他们犯了一个错误？然后又一个。然后又一个。他们没有将其称为失败，因为他们明白他们正在积累一个“不适用”的集合，而且从某种意义上说，考虑到他们所获得的所有经验，他们最终不可能不成功。
- en: 'Here’s the real secret to starting:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是开始真正的秘诀：
- en: Act as if nobody will tell you exactly what to do.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 假设没有人会确切地告诉你该做什么。
- en: Assume that you will have to figure it out all on your own.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你必须自己弄清楚。
- en: I’m not going to give you the best way to learn or do anything.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我不会给你提供学习或做任何事情的最好方法。
- en: Instead, stop focusing on that.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是专注于这一点。
- en: Obsess over it. Learn everything. Try everything. Let it fail. Let it be cringe
    and embarrassing. That is the only way to achieve anything worthwhile in your
    life.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 对它着迷。学习一切。尝试一切。让它失败。让它变得令人尴尬和羞愧。这是你在生活中实现任何有价值的事情的唯一方式。
- en: Habit 3) Never Hitting Publish
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 习惯 3) 从不发布
- en: When I realized that a conventional pencil-pushing job was the bane of my existence,
    I started to experiment with any “make money online” method that I could.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 当我意识到传统的工作是存在的祸害时，我开始尝试任何我能找到的“在线赚钱”方法。
- en: I ended up trying, and failing, at almost every business model out there until
    I was forced to get a job to survive.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我尝试了几乎所有商业模式，但都以失败告终，直到我不得不找工作来维持生计。
- en: The singular reason why all of those online businesses failed was that I never
    hit publish. I would spend an excessive amount of time on the logo, the website,
    and building a portfolio of free work so I had some kind of authority.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 所有那些在线业务失败的唯一原因是，我从未发布过。我会花过多的时间在标志、网站和建立一份免费作品集上，以便我有一些权威感。
- en: As I learned, you don’t need any of that to succeed.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我所学，你不需要任何这些来成功。
- en: Instead, you need a body of public work that potential clients, employers, and
    followers can sink their teeth into to know what you do and how well you do it.
    That’s how you increase your percentage of luck.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是这样，你需要有一系列公开的作品，潜在的客户、雇主和追随者可以通过这些作品深入了解你所做的事情以及你做得如何。这样你才能提高你的运气百分比。
- en: Never hitting publish leads to something dangerous.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 从不发布会导致危险的事情。
- en: It’s called progress invisibility.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这被称为进步的隐形性。
- en: In other words, you don’t have *real world* feedback and don’t give yourself
    a *chance* to have some form of responsibility to stick with it.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，你没有*现实世界*的反馈，也没有给自己一个*机会*去承担一些形式的责任来坚持下去。
- en: In other other words, you aren’t actually learning anything. It’s like you’re
    going to college, applying for a job, and going to college again. You never actually
    start the job… which is where you *actually learn how to do the job.* Most of
    your degree knowledge is thrown out the window.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，你实际上并没有学到任何东西。这就像你上了大学，申请了一份工作，然后又上了大学。你从未真正开始工作……这是你*真正学习如何做这份工作*的地方。你大部分的学位知识都被抛到窗外了。
- en: I don’t have an option to not write newsletters every week. I don’t have an
    option to build products and promote them. I have people waiting on them, and
    my entire survival is dependent on that. I *have* to do it (and *want* to do it)
    because I said no to every other thing, the job included. It’s optional for you
    because you have a plan B – AKA the current way of life that you’re trying to
    escape because you don’t like it, which doesn’t make sense.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我没有不每周写时事通讯的选择。我没有不构建产品并推广它们的选择。有人在等待它们，我的整个生存都依赖于这一点。我*必须*这样做（并且*想要*这样做），因为我拒绝了其他所有事情，包括工作。对你来说这是可选的，因为你有一个B计划——也就是你试图逃离的当前生活方式，因为你不喜欢它，这没有意义。
- en: Last, never making your work public is a form of reality distortion through
    isolation.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，永远不公开你的工作是一种通过孤立来扭曲现实的形式。
- en: You work entirely alone without community, customers, feedback, or accountability.
    It’s easy to maintain your self-deception in this environment.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 你完全独立工作，没有社区、客户、反馈或问责制。在这种环境中，维持你的自我欺骗很容易。
- en: It’s easy to justify your lies about how “hard” you are working and your lack
    of results because you don’t have reality checks.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 由于你没有现实检查，所以很容易为你的谎言辩护，比如你“多么努力”地工作以及你的缺乏成果。
- en: Hit publish.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 点击发布。
- en: If you don’t know what to publish, this article is probably my least popular
    premium post, because the least sensational things are usually the most effective
    but get the least attention. In it, I teach 3 ways to practice writing your ideas
    for short posts on Substack notes, LinkedIn, X, or any other platform. [Check
    it out.](https://thedankoe.substack.com/p/3-drills-to-become-a-master-at-short)
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道要发布什么，这篇文章可能是我的最不受欢迎的付费文章，因为最不耸人听闻的事情通常是最有效的，但得到的关注最少。在其中，我教授了3种练习在Substack笔记、LinkedIn、X或其他任何平台上写短篇想法的方法。[查看它。](https://thedankoe.substack.com/p/3-drills-to-become-a-master-at-short)
- en: Habit 4) Creating Artificial Complexity
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 习惯 4）创造人为的复杂性
- en: 'In a nutshell:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之：
- en: People dumber than you are making 10x more progress and money than you because
    they don’t over think and under act.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 比你笨的人比你在进步和赚钱上多10倍，因为他们不会过度思考而行动不足。
- en: I’m talking to the people who read my business content and think “oh that’s
    basic.”
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 我在跟那些阅读我的商业内容并想“哦，那很基本”的人说话。
- en: As if I’m lying to you as to what it takes.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 就好像我在向你撒谎，告诉你需要什么。
- en: The problem is that you are subconsciously maintaining artificial complexity
    around business fundamentals to justify inaction. You believe that business success
    requires some mysterious secret that others are hiding from you, so you stack
    up more and more useless knowledge that only slows you down.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 问题在于你潜意识中在商业基础周围维持着人为的复杂性，以证明不采取行动是合理的。你相信商业成功需要一些神秘的秘密，其他人正在向你隐瞒，所以你堆积了越来越多的无用知识，这只会让你更慢。
- en: I’ll keep this one short to avoid complexity.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 我会尽量简短，以避免复杂性。
- en: You need consistent execution of the basic principles.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要持续执行基本原理。
- en: If you need to take more than a beginner level course to act or see results,
    *you are doing something wrong.*
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要超过入门级课程才能采取行动或看到结果，*你做错了。*
- en: Learn the fundamentals.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 学习基础知识。
- en: Start. Make a mistake. Learn from the mistake.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 开始。犯一个错误。从错误中学习。
- en: 'That’s the blueprint: no blueprint at all.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是蓝图：根本没有蓝图。
- en: A surfer doesn’t need a blueprint to respond to the feedback of the waves. They’ve
    failed and practiced enough to the point of it being second nature.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 一个冲浪者不需要蓝图来回应波浪的反馈。他们已经失败并练习得足够多，以至于这已经成为第二本能。
- en: A common theme between all of these habits is that you never actually do the
    fucking thing with persistence and iteration.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些习惯的共同主题是，你实际上从未坚持不懈地迭代地做那件事。
- en: Habit 5) Being Too Frugal
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 习惯 5）过于节俭
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2693">![](../Images/9dc28d49c122822b09a27685defb0bfe.png)</picture>
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/9dc28d49c122822b09a27685defb0bfe.png)'
- en: Most people struggle with money.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人都与金钱作斗争。
- en: That’s a fact.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个事实。
- en: Money is deeply intertwined with modern survival.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 金钱与现代生存紧密相连。
- en: It impacts every single area of your life. Even if you aren’t thinking about
    money, you’re thinking about money. Your health depends on your money. The sanity
    of your relationships depends on a baseline amount of money.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 它影响你生活的每一个方面。即使你没有在考虑金钱，你也在考虑金钱。你的健康取决于你的金钱。你关系的理智取决于一定数量的金钱。
- en: You can say that’s unfair and complain about how it should be different, but
    I heavily disagree.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以说这是不公平的，并抱怨它应该如何不同，但我强烈不同意。
- en: I’m not here to tell you the truth of money was somehow “hidden” from you.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是来告诉你金钱的真相是如何“隐藏”在你面前的。
- en: It’s both your fault and not your fault for being in this situation.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 处于这种状况，既有你的错，也有你的不对。
- en: You didn’t question how you were raised, developed a terrible psychological
    relationship with money, and because of that you failed to understand that making
    money is a skill. You can make as much as you want, you just didn’t take the time
    to study, practice, and master that skill.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有质疑你的成长方式，与金钱发展了糟糕的心理关系，因此你未能理解赚钱是一项技能。你可以赚到你想要的任何数额，但你没有花时间去学习、练习和掌握这项技能。
- en: Money problems don’t exist. Psychological problems do.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 金钱问题不存在。心理问题存在。
- en: Most people’s inability to make, keep, or smartly use money comes down to their
    beliefs, because your beliefs determine the opportunities you can notice *to*
    do those things.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人无法赚钱、保留或明智地使用金钱，这归结于他们的信念，因为你的信念决定了你能注意到去做那些事情的机会。
- en: 'Here’s a list of the average persons beliefs around money:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一份关于普通人金钱观念的清单：
- en: You believe money is hard to make.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你认为赚钱很难。
- en: You don’t believe money is a domain of mastery like health, relationships, or
    your creative work.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不相信金钱是一个像健康、关系或你的创造性工作一样可以掌握的领域。
- en: You may believe money is evil (because you were programmed by prior negative
    experiences).
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可能认为金钱是邪恶的（因为你被先前的负面经历所编程）。
- en: You aren’t interested in starting a business because you only see the vocal
    minority of sleazy salesmen and 80 hour work weeks.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你对创业不感兴趣，因为你只看到了那些聒噪的销售员和每周80小时的工作周。
- en: You think everyone is trying to scam you, or that any non-mega corporation is
    a grifter (when they’re usually the independent businesses you say you support).
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你认为每个人都试图欺骗你，或者认为任何非大型企业都是骗子（当他们通常是你说你支持的自营企业）。
- en: You are stuck in survival mode, so you don’t see the importance of self-development
    or business and feel the urge to write them off to feel better about your own
    actions.
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你陷入了生存模式，因此你看不到自我发展和商业的重要性，并感到有必要将它们一笔勾销，以便对自己的行为感到更好。
- en: 'You don’t think you can make a lot of money in your field, which is just plain
    false if you can simply observe the top earners in your field (hint: they have
    a business).'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你认为自己在你所在的领域赚不到很多钱，这是错误的，如果你只是观察你所在领域的顶尖收入者（提示：他们有自己的企业）。
- en: Every single one of these limits how much you make.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 这些限制了你所能赚到的每一分钱。
- en: If you believe money isn’t a skill, you won’t learn that skill.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你认为金钱不是一项技能，你就不会学习这项技能。
- en: If you believe money is evil, you will be repulsed by the thought of making
    more (even if it’s your only way out of your self-induced chaos).
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你认为金钱是邪恶的，你会对赚取更多金钱的想法感到厌恶（即使这是你摆脱自我制造的混乱的唯一途径）。
- en: Your perception of money is determined by your level of development.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 你对金钱的看法取决于你的发展水平。
- en: The solution to your money problems (psychological problems) is to advance through
    each level.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 解决你的金钱问题（心理问题）的方法是通过每个级别的发展。
- en: The purpose of money changes as you develop yourself. It starts as a way to
    survive, becomes a method to acquire status, which leads to a desire for autonomy,
    then becomes a fuel for creativity and expression, then finally transforms into
    a way to help others advance through similar stages – related to money or not.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你的自我发展，金钱的目的也在改变。它最初是生存的方式，变成了获取地位的方法，这进而导致了对自主性的渴望，然后变成了创造力和表达的燃料，最终转变为帮助他人通过类似阶段——无论与金钱是否相关——的方式。
- en: 'Here are the levels:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些级别：
- en: '**Survival** – you are in the survival level of development right now in the
    financial domain of your life (you may be higher in something like health or intellect).'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生存** – 你现在在财务领域的发展正处于生存阶段（你可能在健康或智力方面更高）。'
- en: '**Status** – you reach the status stage when (1) you have a sense of security
    around money and (2) you realize the need for others to perceive you as valuable
    to survive better.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**地位** – 当你（1）对金钱有安全感，并且（2）意识到为了更好地生存，需要别人认为你有价值时，你就达到了地位阶段。'
- en: '**Creativity** – you realize the faults with status games, begin to crave autonomy,
    and develop a philosophical sense of mastery around your craft. You create your
    own way of doing things after following the methods of others for so long.'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创造力** – 你意识到地位游戏的缺陷，开始渴望自主性，并在你的技艺周围发展一种哲学上的掌握感。在跟随他人的方法如此之久之后，你创造了自己的做事方式。'
- en: '**Contribution** – you develop yourself to the point of becoming unemployable.
    Work, rest, and play become difficult to distinguish.'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**贡献** – 你发展到无法被雇佣的程度。工作、休息和娱乐变得难以区分。'
- en: You transcend to each level once the previous level becomes too painful to stay
    in. You will know when that is.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 当你发现前一个阶段变得难以忍受时，你将超越到每个阶段。你会知道的。
- en: For now, having awareness of this path is all you need to cure the habit of
    being frugal. Keep it in mind.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，意识到这条道路就足够治愈节俭的习惯了。记住这一点。
- en: You can also go through the 25+ prebuilt AI workflows [inside of Kortex](https://kortex.co)
    to discover what you want out of life, how to turn it into a modern business,
    and other things that may change the direction of your life. (And, having notes,
    PDFs, and all AI models in one place doesn’t hurt).
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以通过 Kortex（https://kortex.co）内的 25+ 预建 AI 工作流程来发现你想要的生活，如何将其转化为现代企业，以及其他可能改变你生活方向的事情。（而且，将笔记、PDF
    和所有 AI 模型放在一个地方也不无裨益）。
- en: '![](../Images/1221d4a0685230d487a3932e0ccc2cfd.png)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1221d4a0685230d487a3932e0ccc2cfd.png)'
- en: Habit 6) Minimizing Anticipated Regret
  id: totrans-123
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 习惯 6) 最小化预期的遗憾
- en: The magic you’re looking for is in the work you’re avoiding.
  id: totrans-124
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你所寻找的魔法就在你正在避免的工作中。
- en: While I believe the magic you’re actually looking for is in the experimentation
    you’re avoiding but can’t see because all that’s on your mind is avoiding the
    work, this holds a hint of truth.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我相信你真正寻找的魔法就在你正在避免但看不到的实验中，因为你的心思全在避免工作，但这确实包含了一丝真理。
- en: 'There are few days that go by where people don’t ask:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎每天都有人问：
- en: “What platform should I start on?”
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “我应该从哪个平台开始？”
- en: “What kind of digital product should I create?”
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “我应该创建什么样的数字产品？”
- en: “Should I start a service business? E-commerce? Something else?”
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “我应该开始一个服务型业务吗？电子商务？还是其他什么？”
- en: Then, when they finally decide and go through a phase of premature optimization.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，当他们最终决定并经历一个过早优化的阶段。
- en: Like I did with my previous business attempts, I focused on the website, the
    logo, and doing portfolio work in private until I felt “ready,” which was never
    going to come.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 就像我在之前的企业尝试中做的那样，我专注于网站、标志，并在私下里做作品集，直到我觉得“准备好了”，但那永远不会到来。
- en: You make decisions primarily to avoid future negative emotions rather than to
    maximize positive outcomes. You are unconsciously playing to lose rather than
    playing to win because in the back of your mind, you really don’t want to win.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 你做决定主要是为了避免未来的负面情绪，而不是为了最大化积极的结果。你无意识地是在玩输而不是赢，因为在你内心深处，你真的不想赢。
- en: The solution is perspective.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案是视角。
- en: What are you going to regret more?
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 你会后悔什么？
- en: Taking the wrong path – which is the only way to find the right path – and gaining
    more experience than you ever have in your life…
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 走错路——这是找到正确道路的唯一方式——并且获得比你一生中任何时候都多的经验……
- en: Or staying the same.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 或者保持不变。
- en: It’s not a difficult decision.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是一个困难的决定。
- en: Do the work that leads to results and forget the rest.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 做出能带来结果的工作，其余的都忘掉。
- en: If you think you need a website and logo and LLC before you can start getting
    customers, or that you need the perfect digital product or business model in order
    to start making an income, you are lying to yourself.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你认为你需要一个网站、标志和有限责任公司才能开始吸引客户，或者你认为你需要完美的数字产品或商业模式才能开始赚钱，那么你是在欺骗自己。
- en: I’ll talk about this in a future letter.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 我会在未来的信中讨论这一点。
- en: Habit 7) Holding Onto An Identity That Doesn’t Serve Your Goals
  id: totrans-141
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 习惯 7) 保留一个不符合你目标身份
- en: You aren’t where you want to be because you aren’t the person who would be there.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有达到你想要的地方，因为你不是那个应该在那里的人。
- en: When people want to change their life, they try to do it without changing much.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 当人们想要改变生活时，他们试图在不做太多改变的情况下进行改变。
- en: They want to lose weight without giving up their favorite foods.
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们想要在不放弃他们最喜欢的食物的情况下减肥。
- en: They want to make more money while still going out every weekend.
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们希望在周末仍然外出游玩的同时赚更多的钱。
- en: They want to get into a relationship while being a slob.
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们想要在不成为邋遢的人的情况下进入一段关系。
- en: I’m not saying you can’t do those things and see results.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 我并不是说你不能做这些事情并看到结果。
- en: I’m saying that the reason you don’t have the results is that your current lifestyle
    doesn’t get those results.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 我说的是，你没有取得结果的原因是，你的当前生活方式无法产生那些结果。
- en: The thing is, all of those things are optional.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，所有这些事情都是可选的。
- en: The only reason you love the sweets or fried foods is because they are habitual.
    You’ve done them to the point of feeling like your life would be terrible without
    them.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 你之所以喜欢甜食或油炸食品，仅仅是因为它们已经成为习惯。你已经做了这些事情，以至于感觉没有它们你的生活会很糟糕。
- en: If you really want to change, you need to rip the band-aid off.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你真的想要改变，你需要撕下创可贴。
- en: You need to jump into a new identity overnight.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要一夜之间跳入一个新的身份。
- en: You need to become disgustingly aware of the fact that the reason you are where
    you are is because the things you do, right now, are the reason you are there.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要极其意识到，你现在所在的位置，正是因为你现在所做的事情。
- en: You won’t die if you give up your current habits.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你放弃当前的习惯，你不会死。
- en: You may go through a short period of pain, but that’s what happens when you
    attempt to remodel a house. It won’t feel the same, but if you continue the renovations,
    you’ll create an identity that makes it all worth it.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会经历一段短暂的痛苦时期，但当你尝试翻新房屋时就是这样。它不会感觉一样，但如果你继续翻新，你将创造一个身份，使这一切都变得值得。
- en: Thank you for reading.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读。
- en: – Dan
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
- en: 'How I can help you when you’re ready:'
  id: totrans-158
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 当你准备好时，我可以如何帮助你：
- en: Last week I posted a [mega guide to creating your first digital product](https://thedankoe.substack.com/p/mega-guide-how-to-create-your-first).
    This week I will post a full guide to writing a persuasive landing page for the
    product.
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上周我发布了一个[创建第一个数字产品的超指南](https://thedankoe.substack.com/p/mega-guide-how-to-create-your-first)。本周我将发布一个关于为产品编写有说服力的着陆页的完整指南。
