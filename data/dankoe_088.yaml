- en: The Daily Routine That Changed My Life (4 Focus Habits)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 《改变我生活的日常例行程序》（4个专注习惯）
- en: 原文：[https://thedankoe.com/letters/the-daily-routine-that-changed-my-life-4-focus-habits/](https://thedankoe.com/letters/the-daily-routine-that-changed-my-life-4-focus-habits/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/the-daily-routine-that-changed-my-life-4-focus-habits/](https://thedankoe.com/letters/the-daily-routine-that-changed-my-life-4-focus-habits/)
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1559">![](../Images/8ae2cbfc5aed4c828f68948c22a55696.png)</picture>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1559">![](../Images/8ae2cbfc5aed4c828f68948c22a55696.png)</picture>
- en: '**You need a routine.**'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**你需要一个常规。**'
- en: And if you think you don’t, you may not realize that you already have a routine
    that was assigned to you by society.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你认为你不是，你可能没有意识到你已经有一个社会分配给你的常规。
- en: Or your “routine” is not having a routine.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 或者你的“常规”就是没有常规。
- en: Without rules, there is no game.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 没有规则，就没有游戏。
- en: Without a game, there is no winning.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 没有游戏，就没有胜利。
- en: A routine contains the rules for how you live your life.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 一个常规包含了你如何生活的规则。
- en: The longer you play, the better you get, and you often forget the rules and
    win anyway.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 你玩得越久，你就越好，你经常忘记规则，但仍然能赢。
- en: '*Now is the time to stop playing the game society told you to play and start
    playing your own.*'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '*现在是时候停止玩社会告诉你要玩的游戏，开始玩你自己的游戏了。*'
- en: A powerful routine, no matter how long, prevents overwhelm as you progress toward
    your goals.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 一个强大的常规，无论多长，都能在你朝着目标前进的过程中防止你感到不知所措。
- en: Most people are progressing toward the goals that were given to them.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人正在朝着别人给他们的目标前进。
- en: They are progressing the dreams of someone else rather than their own.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 他们是在推进别人的梦想，而不是他们自己的。
- en: Without a routine that you created, your life will slowly fall – faster and
    faster – down a chaotic hole into a life of responsibilities, work, people, and
    a personality that you despise.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 如果没有你创造的常规，你的生活将慢慢陷入——越来越快——一个混乱的洞中，进入一个充满责任、工作、人和你讨厌的个性的生活。
- en: Routines are comfortable.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 常规是舒适的。
- en: The mind craves order, and routines allow you to focus your attention to make
    action seamless.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑渴望秩序，而常规让你能够集中注意力，使行动流畅。
- en: This is why working a job “sucks,” but not enough to make you quit and pursue
    something that sucks more until it sucks less.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么工作“很糟糕”，但不足以让你辞职去追求更糟糕的事情，直到它变得不那么糟糕。
- en: Life is suffering, and we have the ability to choose our suffering every day.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 生活是痛苦的，我们每天都有能力选择我们的痛苦。
- en: Your goals are the axis of your suffering, and most people are pursuing goals
    that aren’t their own. Their suffering doesn’t bring fulfillment.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 你的目标是痛苦的轴心，大多数人追求的目标不是他们自己的。他们的痛苦不会带来满足感。
- en: Reversing Local Entropy With Identity Change
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过身份改变逆转局部熵
- en: The optimal state of inner experience is one in which there is order in consciousness.
    This happens when psychic energy—or attention—is invested in realistic goals,
    and when skills match the opportunities for action. The pursuit of a goal brings
    order in awareness because a person must concentrate attention on the task at
    hand and momentarily forget everything else. – Mihaly Csikszentmihalyi
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 内在体验的最佳状态是意识中有秩序。这发生在心理能量——或者说注意力——投入到现实目标中，以及技能与行动机会相匹配的时候。追求目标会带来意识的秩序，因为一个人必须集中注意力在手头的任务上，暂时忘记其他一切。
    —— 米哈伊·契克森米哈伊
- en: '*You don’t need motivation or discipline when you are the person who would
    take certain actions.*'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '*当你是一个会采取某些行动的人时，你不需要动力或纪律。*'
- en: A bodybuilder doesn’t need motivation to eat healthy.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 一个健身者不需要动力来保持健康饮食。
- en: A gamer doesn’t need discipline to stare at a screen all day.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 一个游戏玩家不需要纪律整天盯着屏幕。
- en: A writer doesn’t need motivation to synthesize ideas.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 一个作家不需要动力来综合想法。
- en: An employee doesn’t need discipline to show up to work.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 一个员工不需要纪律来上班。
- en: They do it because their survival is at stake.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 他们这样做是因为他们的生存处于危险之中。
- en: Not physical, but mental.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 不是身体上的，而是心理上的。
- en: Animals survive the information in their genetic code.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 动物通过它们遗传密码中的信息来生存。
- en: Humans survive the information in their consciousness.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 人类通过他们意识中的信息来生存。
- en: The information we are exposed to as children and throughout our lives programs
    our minds to run on certain systems.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在儿童时期以及一生中接触到的信息，编程了我们的思维，使其在特定的系统上运行。
- en: A system, in brief, is the process of reaching a goal (this can get extremely
    complex).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，一个系统是达到目标的过程（这可以变得极其复杂）。
- en: So, our identity is a web of conscious and unconscious goals that determine
    the skills we acquire, the interests we learn, and the choices we make in alignment
    with those goals.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们的身份是一个由有意识和无意识的目标构成的网，这些目标决定了我们获得的能力、学习的兴趣以及与这些目标一致的选择。
- en: You are already acting toward layers of unconscious goals every second of the
    day. They’ve been conditioned to the point of not requiring conscious thought.
    You wake up, walk, brush your teeth (maybe), and put on your clothes so that you
    aren’t seen as an outcast. These are all skills that you have developed as a human
    with the goal of fitting in and surviving in society.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 你每天都在向无意识的目标层次行动。它们已经被训练到不需要有意识的思考。你醒来，走路，刷牙（也许），穿上衣服以免被视为局外人。这些都是你作为一个为了融入社会并生存而发展的人类所培养的技能。
- en: This goes deep. The social matrix of goals creates humans that all operate in
    a similar fashion. With a slightly different goal of society, we could all be
    walking around naked and communicating with each other by tapping people on the
    head with a stick. Biological goals clearly influence this.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这很深刻。目标的社会矩阵创造了以类似方式运作的人类。如果我们有稍微不同的社会目标，我们都可以赤身裸体地走来走去，通过用棍子敲打人们的头部来相互交流。生物目标显然影响了这一点。
- en: When we do not have clarity on how to achieve a goal, our mind becomes disordered.
    We become overwhelmed, anxious, and narrow-minded.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们没有关于如何实现目标的清晰度时，我们的心智变得混乱。我们变得不知所措、焦虑和狭隘。
- en: Our mind declines into chaos.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的心智陷入混乱。
- en: This is known as entropy. Entropy is Universal. It doesn’t only apply to things
    like buildings that fall apart with time unless maintained. The structure of your
    mind, or identity, is an invisible building.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是熵。熵是普遍的。它不仅适用于像建筑这样的东西，如果不维护就会随着时间的推移而崩塌。你心智的结构或身份是一个无形的大楼。
- en: You reverse entropy by making a goal conscious, creating a path to achieve it,
    and focusing your attention on priority actions that bring results as feedback.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过设定目标、创造实现目标的路径，并专注于带来结果的优先行动来逆转熵。
- en: The priority actions include daily education and practice that expose you to
    the information that creates an identity.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 优先行动包括日常教育和实践，让你接触到创造身份的信息。
- en: 'We will talk about how to master new skills quickly in a future letter, but
    for now, understand this:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在未来的信中讨论如何快速掌握新技能，但就现在而言，请理解这一点：
- en: You need a plan.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要一个计划。
- en: There isn’t any other way.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 没有其他方法。
- en: Because if you don’t have one, society does, and they’ve been planning your
    life for decades.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 因为如果你没有，社会有，而且他们已经为你规划了几十年。
- en: If you don’t set your own goals, acquire the skill necessary to take on the
    challenge, and forge your own path – your destiny will be manhandled by society
    and you won’t even realize it.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有设定自己的目标，没有获得应对挑战所需的技能，也没有开辟自己的道路——你的命运将被社会操控，而你甚至不会意识到这一点。
- en: Nobody wants to wake up 40 years later wondering where the time went.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人愿意40年后醒来时还在想时间都去哪了。
- en: The 4 Pillars Of The Good Life (How To Reverse Entropy)
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生活的四大支柱（如何逆转熵）
- en: Becoming [multi-dimensionally jacked](https://thedankoe.com/letters/the-cure-to-a-mediocre-life-become-multidimensionally-jacked/)
    is the path to the good life.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 成为[多维度强健](https://thedankoe.com/letters/the-cure-to-a-mediocre-life-become-multidimensionally-jacked/)是通往美好生活的途径。
- en: <picture decoding="async" class="wp-image-1560">![](../Images/ae67b30276c144a29b66685293c9edc1.png)</picture>
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/ae67b30276c144a29b66685293c9edc1.png)'
- en: All of these domains of life are interconnected systems that create who you
    are and reverse entropy in your mind. Tiny improvements are what create an ordered
    mind.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些生活领域都是相互关联的系统，它们塑造了你的身份，并在你的心中逆转熵。微小的改进是创造有序心智的关键。
- en: By adopting a daily habit for each pillar of your life, success becomes inevitable.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 通过为你的生活支柱中的每一个方面培养日常习惯，成功变得不可避免。
- en: 'My question to you:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我对你的问题：
- en: If you aren’t building your mind, body, business, and relationships every single
    day – what are you doing?
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不是每天都在构建你的心智、身体、事业和人际关系——你在做什么？
- en: Genuine question.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 真诚的问题。
- en: Is there anything more important than that?
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 有什么比这更重要吗？
- en: Or is everything you do now a distraction?
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 或者你现在所做的一切都是一种干扰？
- en: “But Dan, I want to enjoy myself and do what I want.”
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: “但丹，我想享受生活，做我想做的事。”
- en: Do you understand what enjoyment is when compared to pleasure?
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 与快乐相比，你理解什么是享受吗？
- en: Do you realize that human psychology has been mapped over the course of evolution
    to show that humans have an innate drive to grow, expand, transcend, and create?
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 你意识到人类心理学在进化过程中被绘制出来，表明人类天生有成长、扩展、超越和创造的内在驱动力吗？
- en: Enjoyment is found in progress.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 乐趣在于进步中。
- en: “Doing what you want” is often the ego ending the train of thought that would
    lead to you improving yourself – because that’s what your nature wants.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: “做你想做的事”往往是自我意识结束那些可能导致你自我提升的思想的火车——因为那正是你的本性所想要的。
- en: '*You can truly do what you want when you peel back the layers of what you think
    you want.*'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '*当你剥去你认为你想要的东西的层层面纱时，你才能真正做你想做的事。*'
- en: I’m not going to give you a super scientific approach to habit formation.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我不会给你一个超级科学的习惯形成方法。
- en: 'I’m going to give you the only real way to make behavior change seamless with
    time:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我将给你唯一真正使行为改变与时间无缝结合的方法：
- en: '**1) Align Your Future With A Holistic Goal**'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 将你的未来与整体目标对齐**'
- en: Goals can’t exist without the awareness of a problem.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 没有对问题的认识，目标无法存在。
- en: Goals and problems create a frame for your perspective.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 目标和问题为你提供了视角的框架。
- en: Your perspective determines what information you perceive as important.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 你的视角决定了你将哪些信息视为重要。
- en: A person who has money problems and the goals of society will see a new job
    opportunity as important.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 有钱问题和社会目标的人会将新的工作机会视为重要。
- en: A person who has money problems and self-generated goals will see a promising
    business opportunity as important.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 钱有问题且自我设定目标的人会将一个有希望的商业机会视为重要。
- en: Both people will read a book and interpret it in a different way.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 两个人都会读一本书，并以不同的方式解释它。
- en: One will store information in their mind that is conducive to their goals and
    solves their problems.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 人们会在心中储存有助于他们目标并解决他们问题的信息。
- en: The first step to changing your life is to become brutally aware of the problems
    that make you want to change your life.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 改变生活的第一步是残酷地意识到让你想要改变生活的那些问题。
- en: If you’re reading this, then you obviously have problems, everybody does.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在阅读这篇文章，那么很明显你也有问题，每个人都会有。
- en: The big problem is a lack of awareness of your problems.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 最大的问题是缺乏对自身问题的认识。
- en: Sit and become negative for a while.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 坐下来，消极一会儿。
- en: Let your mind run wild to create an anti-vision for your future.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 让你的思维自由驰骋，为你未来的反愿景创造一个场景。
- en: What is the worst-case scenario if you continue with the same mental, physical,
    financial, and relational actions you are taking?
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你继续采取相同的精神、身体、财务和人际关系行动，最坏的情况会是什么？
- en: Then use that as a place to toss an anchor into the future.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 然后利用这一点作为锚定未来的地方。
- en: Create a big, vision-generating goal that encapsulates each domain of life.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 设定一个宏大、能激发生活各个领域的愿景目标。
- en: Next, we will bridge the gap between where you are now with where you want to
    be with self-education and skill acquisition.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将通过自我教育和技能获取来弥合你现在所在之处与你想达到之处之间的差距。
- en: '**2) Treat Daily Self-Education As An Absolute Necessity**'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 将日常自我教育视为绝对必要**'
- en: Schools are necessary in many cases, but they teach you a microscopic fraction
    of reality.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多情况下，学校是必要的，但它们只教你现实的一小部分。
- en: They train you into a compartment of reality – like chemistry, physiology, or
    literature – and lack regard for the holistic interconnectedness that breeds true
    intelligence.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 他们训练你进入现实的某个部分——比如化学、生理学或文学——并且忽视了孕育真正智慧的整体相互关联性。
- en: Without self-education, you go through life with the same narrow identity and
    perspective as everyone else.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 没有自我教育，你将像其他人一样，带着同样的狭隘身份和视角度过一生。
- en: Education expands your mind.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 教育扩展了你的思维。
- en: It introduces you to novel perspectives.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 它向你介绍了新颖的视角。
- en: It increases dopamine in the brain as a consistent source of energy.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 它作为持续的能量来源，在大脑中增加多巴胺。
- en: It gives you the knowledge to act with clarity toward your goals.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 它为你提供了清晰行动以实现目标的知识。
- en: Over time, education conditions your mind to run on new systems.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，教育使你的思维适应新的系统。
- en: If you were to only immerse your mind in information that taught you how to
    build a profitable business, you would.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只沉浸在你如何建立盈利企业的信息中，你会的。
- en: It took you 18+ years to shape your actions with education from your parents,
    friends, and schools – it’s going to take a few years to shape your actions with
    information that you curate.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 你用18年以上的时间通过父母、朋友和学校的教育塑造了你的行为——用你精选的信息塑造你的行为将需要几年时间。
- en: '**3) Acquire The Skillset Necessary To Achieve Your Goals**'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 获得实现你目标所需的技能集**'
- en: '*The difference between where you are and where you want to be is skill.*'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '*你目前所在之处与你想去之处之间的差距是技能。*'
- en: This is a fact.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个事实。
- en: You don’t have the results you want because you aren’t the person with the skill
    that would get those results.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有得到你想要的结果，因为你不是那个能够得到这些结果的人。
- en: The only thing that can stop you is getting distracted to the point of falling
    off the path.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一能够阻止你的就是被分散注意力到偏离轨道的程度。
- en: Skills can be trained.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 技能是可以训练的。
- en: Learning to walk and speak are arguably the most complex skills you’ve ever
    learned. They are more complex than building a billion-dollar company.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 学习走路和说话可能是你学过的最复杂的技能。它们比建立一个价值十亿美元的公司还要复杂。
- en: The thing is, you didn’t have a mind chained by limits that you were taught
    by people who didn’t break through their own.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，你没有被那些没有突破自己的人所教限度的思维所束缚。
- en: 'With this, you need 2 things:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你需要两样东西：
- en: '**A 30-60 minute self-education habit** – read, buy courses, listen to podcasts,
    and acquire ample knowledge that provides you the capability to act.'
  id: totrans-102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**30-60分钟的自学习惯** – 阅读，购买课程，收听播客，获取充足的知识，这使你能够采取行动。'
- en: '**A 30-60 minute building habit**– apply your knowledge in reality and experiment
    with what you learn. Get feedback and iterate until success.'
  id: totrans-103
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**30-60分钟的构建习惯** – 在现实中应用你的知识，并对你所学的进行实验。获取反馈并迭代，直到成功。'
- en: Learning comes from struggle, not memorization.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 学习来自挣扎，而不是记忆。
- en: When you build in the real world and hit a wall, a problem is created.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在现实世界中构建并遇到障碍时，问题就产生了。
- en: You may or may not become aware of the problem depending on your skill and experience
    (this is what prevents most people’s progress, they blame their lack of progress
    on anything but their own ability).
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能或可能不会意识到这个问题，这取决于你的技能和经验（这是阻止大多数人进步的原因，他们把他们的进步不足归咎于任何不是他们自己的能力）。
- en: The problem sits in your subconscious mind to filter the information you get
    from your self-education.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 问题坐在你的潜意识中，以过滤你从自我教育中获得的信息。
- en: As you repeat this process of education and building, for 1-5 years, you will
    be awestruck by how far you come.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你重复这个教育和构建的过程，1-5年内，你会对取得的进步感到震惊。
- en: The Daily Routine That Changed My Life
  id: totrans-109
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 改变我生活的日常常规
- en: My current daily routine is as follows.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我目前的日常常规如下。
- en: I will provide the reasons and whys behind each of these parts of my routine.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我将提供我日常常规中每个部分的理由和原因。
- en: 'This is an important point:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个重要的观点：
- en: Every aspect of your routine should be intentional.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 你的日常常规的每一个方面都应该是故意的。
- en: Intention = what you are stretching towards.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 意图 = 你正在努力实现的目标。
- en: The more reasons or whys you can stack behind your actions, the easier it becomes
    and the more beneficial it is to a great future.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 你能为你采取的行动堆叠的理由或原因越多，它就越容易，对未来的益处就越大。
- en: You discover these reasons or whys by having a goal to apply your self-education
    to.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过设定一个将自我教育应用于的目标来发现这些理由或原因。
- en: If I want to commit to a gym habit, self-education around habit formation and
    the gym will give me the reasoning necessary to do so – if and only if I am building
    in reality.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想坚持去健身房的习惯，关于习惯形成和健身的自我教育会给我必要的理由去做这件事——如果，并且只有当我正在现实中构建时。
- en: Please note that this routine may not be feasible for you now.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，这个常规现在可能对你来说不可行。
- en: Please also note that this was the process of years of experimentation to find
    what I deemed enjoyable and conducive to my desired future.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，这也是经过多年实验的过程，以找到我认为有趣且有利于我期望的未来。
- en: I encourage you to take bits and pieces to experiment with in your own life
    until you can create a routine that fits you.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 我鼓励你在自己的生活中尝试一些片段，直到你能够创建一个适合你的常规。
- en: '**1) 30-minute morning walk.**'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 30分钟的早晨散步。**'
- en: First thing in the morning, around 6am, I get outside no matter the weather
    or how I feel.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 每天早上，大约6点，无论天气如何，我都会出去。
- en: I will either listen to educational material or plan out my day on my phone.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 我要么会听教育材料，要么在手机上规划我的日程。
- en: I aim for 15-20,000 steps a day because of the stacked benefits it brings to
    my life. Walking is one of those activities that requires minimal effort but brings
    maximum results.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 我的目标是每天走15-20,000步，因为这给我的生活带来了累积的好处。走路是那种需要最少努力但能带来最大效果的活动之一。
- en: Walking clears my mind, wakes me up, gets me away from distractions, acts as
    a creativity block in my day, keeps me lean, keeps me healthy, keeps me (slightly)
    tan, and reverses most of the damage done by sitting under life-sucking blue light.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 散步可以让我头脑清醒，唤醒我，让我远离干扰，在我的日常工作中充当创造力障碍，保持我身材苗条，保持我健康，让我（稍微）晒黑，并逆转长时间坐在吸人生命的蓝光下所造成的损害。
- en: 'Note: I am experimenting with slowing down my mornings even more contrary to
    most entrepreneur advice of “getting straight into work.”'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：我正在尝试使我的早晨更加缓慢，这与大多数企业家建议的“直接开始工作”相反。
- en: For the past few days, I have been doing 30 minutes of meditation followed by
    30 minutes of reading (Psycho Cybernetics right now).
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的几天里，我进行了30分钟的冥想，然后是30分钟的阅读（现在是《心理控制术》）。
- en: I walk enough throughout the day.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 我在一天中走了足够的路。
- en: '**2) 90 minutes of focused work.**'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 90分钟专注工作。**'
- en: I have a list of recurring tasks and levers that I execute every morning.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 我有一份每天早晨执行的重复性任务和杠杆列表。
- en: This is when I write (books, newsletters, content, and marketing material).
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 这时我会写作（书籍、通讯、内容以及营销材料）。
- en: I stack all of my priority tasks in this work block so I can complete them before
    most people wake up.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 我将所有优先任务堆叠在这个工作时段，以便在大多数人醒来之前完成它们。
- en: This allows me to gradually introduce entropy into my day as work becomes less
    structured.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 这让我能够逐渐将熵引入我的日常生活，因为工作变得不那么有结构。
- en: I teach how to become a digital writer in [2 Hour Writer.](https://2hourwriter.com)
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 我在[2小时作家](https://2hourwriter.com)中教授如何成为一名数字作家。
- en: '**3) 30-minute run or walk.**'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 30分钟跑步或散步。**'
- en: Three times a week I run for 30 minutes.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 每周三次，我跑步30分钟。
- en: I do this to reap the benefits of the general 150 minutes of zone 2 cardio a
    week (I consider my excessive walking to fill in the rest).
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 我这样做是为了获得每周150分钟一般有氧运动（区域2）的好处（我认为我过多的散步可以填补其余部分）。
- en: I’ve personally noticed that running improves my focus, stress tolerance, body
    composition (less water, more vascularity), and allows me to sleep at night knowing
    I “did the hard thing.” I hate running.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 我个人注意到跑步可以提高我的专注力、压力承受力、身体组成（水分少，血管多），并让我在晚上知道我“完成了艰难的事情”后入睡。我讨厌跑步。
- en: On all other days I walk, listen to educational material, and collect ideas
    in my phone (using [Kortex](https://kortex.co)) to channel into my creations and
    products.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 在其他所有日子里，我散步，听教育材料，并在我的手机上收集想法（使用[Kortex](https://kortex.co)）以将它们转化为我的创作和产品。
- en: '**4) 90 minutes of focused work.**'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 90分钟专注工作。**'
- en: After my run, I shower, eat breakfast, and sit back down to work.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 跑步后，我洗澡，吃早餐，然后坐下来工作。
- en: During this block, I do less creative tasks.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个时段，我进行较少的创造性任务。
- en: I’ll help with administrative work, client work, and introduce myself to people-oriented
    things.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 我会帮助处理行政工作、客户工作，并介绍自己参与面向人的事物。
- en: This is when open loops and distractions start to take over, but not so much
    that they can’t be mitigated by another walk.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 这时，开放的循环和干扰开始占据主导地位，但还不至于无法通过再次散步来缓解。
- en: '[I break down my deep work morning routine here.](https://thedankoe.com/letters/change-your-life-in-6-months-my-deep-work-routine/)'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '[我在这里分解了我的深度工作早晨常规](https://thedankoe.com/letters/change-your-life-in-6-months-my-deep-work-routine/)'
- en: '**5) Take calls and/or another walk.**'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '**5) 接电话和/或散步。**'
- en: If you’ve been following me for a while, this is a new block.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你一直关注我，这是一个新的时段。
- en: I used to despise calls and removed them from my days.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 我过去很讨厌电话，并从我的日程中移除了它们。
- en: With Kortex, this isn’t possible. I had to accept that.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Kortex，这是不可能的。我不得不接受这一点。
- en: I want Kortex to succeed more than I don’t want to take calls, therefore I *want*
    to take calls.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 我想要Kortex成功，超过我不愿意接电话，因此我*想要*接电话。
- en: Most days, I work 4-5 hours. (Even with my excessive workload, I am still close
    to The 4 Hour Workday philosophy I have which I [talk about in my book](http://theartoffocusbook.com).).
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数日子，我工作4-5小时。（即使我的工作量很大，我仍然接近我所持有的“4小时工作日”哲学，我在我的书中[讨论了这一点](http://theartoffocusbook.com)）。
- en: These calls include client calls, internal company calls, design calls, and
    product calls spread out throughout the week.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 这些电话包括客户电话、内部公司电话、设计电话和产品电话，分布在整个星期。
- en: If I don’t have to be at my desk, I will take these calls on yet another walk.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我不必坐在桌前，我会在另一次散步中接这些电话。
- en: '**6) Go to the gym.**'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: '**6) 去健身房。**'
- en: By now, it is around 1-2pm.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 到现在，大约是下午1-2点。
- en: This is the turning point in my day from work to rest.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我一天中从工作到休息的转折点。
- en: I know that I won’t be able to operate at my best after the gym, so I treat
    this as a work cutoff time.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道在健身房之后，我无法达到最佳状态，所以我将这视为工作时间截止。
- en: I train every day, so not rest days unless my body needs it (please don’t reply
    with your latest and greatest training ideology).
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 我每天都在训练，所以除非我的身体需要休息（请不要用你最新的训练理念回复我）。
- en: Of course, with Kortex, the book launch, and everything else on my plate, I
    may have work spillover during this phase of my life.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，随着Kortex、书发布会以及我生活中其他事情的增加，我可能在这个生活阶段会有工作溢出。
- en: '**7) A long conversational lunch.**'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: '**7) 一次长谈式的午餐。**'
- en: I keep an extremely small social circle.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 我保持一个非常小的社交圈。
- en: I’ve had many contacts in the past, but it has always subtracted from my life
    rather than adding to it.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 我过去有很多联系，但它们总是从我生活中减去而不是增加。
- en: After the gym, I get lunch with my good friend and decompress.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 去健身房之后，我会和我的好朋友一起吃午餐，放松一下。
- en: '**8) Take a nap, walk, read, or finish busy work.**'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: '**8) 小憩、散步、阅读或完成繁忙的工作。**'
- en: By now it’s 3-4pm.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是下午3点到4点。
- en: Things are getting boring now so I will spare you, but this part of my day is
    crucial for psychological recovery.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 现在事情有点无聊，所以我会省略一些，但这一天的这部分对我来说至关重要，对心理恢复很有帮助。
- en: If you train your body in the gym, you need to recover.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在大健身房训练身体，你需要恢复。
- en: If you train your mind with work, you need to recover.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你用工作训练你的大脑，你需要恢复。
- en: Different domains, same Universal pattern.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 不同领域，相同的普遍模式。
- en: '**9) Go to dinner or spend time with my girlfriend.**'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: '**9) 和女朋友一起吃饭或度过时光。**'
- en: I love nice dinners.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢美好的晚餐。
- en: It’s a bad habit (sort of, nice dinners are much healthier than fast food, and
    I don’t order the most calorie-dense things on the menu).
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种坏习惯（某种程度上，美好的晚餐比快餐更健康，而且我不会点菜单上热量最高的东西）。
- en: Most nights I’ll go out to dinner with a close friend or spend the night in
    watching shows and catching up with my girlfriend.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数晚上，我会和亲密的朋友外出吃饭，或者在家里看节目，和我的女朋友聊天。
- en: That’s my entire day.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我的整个一天。
- en: It is comprised of intensity, consistency, curiosity, learning, building, mind,
