- en: How To Make Money As A Creative On The Internet
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何在互联网上作为创意人士赚钱
- en: 原文：[https://thedankoe.com/letters/how-to-make-money-as-a-creative-on-the-internet/](https://thedankoe.com/letters/how-to-make-money-as-a-creative-on-the-internet/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://thedankoe.com/letters/how-to-make-money-as-a-creative-on-the-internet/](https://thedankoe.com/letters/how-to-make-money-as-a-creative-on-the-internet/)'
- en: Humans are lazy.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 人类是懒惰的。
- en: We have been creating solutions to make our lives easier for the entirety of
    human evolution.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我们一直在创造解决方案，使人类进化过程中的生活变得更加容易。
- en: At times, this comes at a cost. It is a common theme for us to phase out labor
    jobs.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，这会付出代价。我们淘汰劳动力工作的主题是常见的。
- en: We didn’t like plowing fields. It was unsustainable and almost impossible to
    scale with a growing population.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不喜欢耕田。这既不可持续，也无法随着人口的增长而扩大规模。
- en: So, over a few decades, we created machines, tractors, distribution, GMO crops,
    and many other things that opened up more room for creativity.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在几十年的时间里，我们创造了机器、拖拉机、分销、转基因作物和许多其他事物，为创造力开辟了更多的空间。
- en: I found this tweet the other day as I was scrolling the timeline.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我是在翻看时间线时发现这条推文的。
- en: The McDonalds in Marana AZ got rid of human cashiers — your only option is the
    self-serve kiosk. Giant step backwards for our society. Takes like 20minutes to
    order $57 of food (a quarter pounder, burger not meal, is $6.50 in Joe Biden’s
    economy!). Bring back the humans [pic.twitter.com/eSigaCA3NZ](https://t.co/eSigaCA3NZ)
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 马拉纳AZ的麦当劳取消了人工收银员——你唯一的选项是自助服务亭。对我们社会来说是一个巨大的倒退。点$57的食物（在拜登的经济中，一个四分之一磅的汉堡不是套餐，而是$6.50！）需要20分钟的时间
    [图片](https://t.co/eSigaCA3NZ)
- en: ''
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Blake Masters (@bgmasters) [June 6, 2022](https://twitter.com/bgmasters/status/1533948876935139328?ref_src=twsrc%5Etfw)
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 布莱克·马斯特斯 (@bgmasters) [2022年6月6日](https://twitter.com/bgmasters/status/1533948876935139328?ref_src=twsrc%5Etfw)
- en: Politics aside, this is nothing new. It has been coming for a long time.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 政治问题暂且不谈，这并不是什么新鲜事。这已经很久以前就开始了。
- en: Low-skill labor jobs are being phased out. History has shown this pattern time
    and time again. There is no escaping this phase of evolution.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 低技能劳动力工作正在逐步淘汰。历史一次又一次地证明了这一模式。无法逃避这一进化阶段。
- en: If the work doesn’t require creativity, delegate it, automate it, or leave it.
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果工作不需要创造力，就委托它、自动化它，或者让它消失。
- en: ''
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Naval (@naval) [September 30, 2020](https://twitter.com/naval/status/1311199771676176384?ref_src=twsrc%5Etfw)
  id: totrans-15
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 纳瓦尔 (@naval) [2020年9月30日](https://twitter.com/naval/status/1311199771676176384?ref_src=twsrc%5Etfw)
- en: People are already doing this.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 人们已经在这样做。
- en: If the work doesn’t require creativity, you can bet your future that it will
    be delegated, automated, or phased out.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 如果工作不需要创造力，你可以打赌你的未来，它将被委托、自动化或逐步淘汰。
- en: 'There is only one option: take responsibility for your future and relentlessly
    self-educate.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 只有一个选择：对你的未来负责，并坚持不懈地自我教育。
- en: Create Or Be Created
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创造或被创造
- en: 'Consciousness is the fabric of reality. [The ability to order consciousness
    is the greatest skill of the 21st century](https://thedankoe.com/how-to-create-a-life-of-meaning-money-impact-as-fast-as-humanly-possible/).
    That is, the ability to:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 意识是现实的织物。[对意识进行排序的能力是21世纪最伟大的技能](https://thedankoe.com/how-to-create-a-life-of-meaning-money-impact-as-fast-as-humanly-possible/)。也就是说，能够：
- en: Create certainty from uncertainty
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从不确定性中创造确定性
- en: Create sense from non-sense
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从无意义中创造意义
- en: Create clarity from chaos
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从混乱中创造清晰
- en: Create focus from distraction
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从分心中创造专注
- en: Create signal from noise
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从噪声中创造信号
- en: Create something from nothing
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从无中创造有
- en: Create success from failure
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从失败中创造成功
- en: Create meaning from struggle
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从斗争中创造意义
- en: Create life from death
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从死亡中创造生命
- en: Create positive from negative
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从负面中创造正面
- en: '*That bullet point list is the path to your version of success.*'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '*那个项目符号列表是你版本成功的路径。*'
- en: Nature is creative. You are creative. God is creative. The universe is creative.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 自然是富有创造力的。你是富有创造力的。上帝是富有创造力的。宇宙是富有创造力的。
- en: Our subconscious stores information that is processed based on what we are exposed
    to via our senses. Like collecting the dots before you can connect them with your
    conscious mind.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的潜意识存储着基于我们通过感官接触到的信息处理的信息。就像在用你的意识将点连接起来之前收集点一样。
- en: Creation is the process of molding, controlling, and ordering consciousness
    (that can be tapped into via the subconscious). At that point, we can bring that
    gift into the world via the senses.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 创造是塑造、控制和安排意识（可以通过潜意识来挖掘）的过程。到那时，我们可以通过感官将这份礼物带入世界。
- en: 'Sight, sound, taste, touch, smell, and of course the 6th sense that very few
    people tap into:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 视觉、听觉、味觉、触觉、嗅觉，当然还有很少有人触及的第六感：
- en: '*Awareness.*'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '*意识。*'
- en: Our subconscious stores everything that we have been made aware of at some point
    in our lives.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的潜意识储存了我们生命中某个时刻意识到的所有事物。
- en: This is the foundation of creativity — the ability to pull from, connect, and
    solve problems from the depths of infinity.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这是创造力的基础——从无限深处汲取、连接和解决问题的能力。
- en: '*Creativity is to create clarity from chaos.*'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '*创造力是从混乱中创造清晰*。'
- en: '*Create + clarity = creativity.*'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '*创造 + 清晰 = 创造力*。'
- en: <picture fetchpriority="high" decoding="async" class="wp-image-605">![](../Images/4cb358f849ef5ede17c10ff80c72a818.png)</picture>
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-605">![](../Images/4cb358f849ef5ede17c10ff80c72a818.png)</picture>
- en: Creative solutions to modern problems are how you pull in the big bucks.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 现代问题的创造性解决方案是你吸引大量资金的方式。
- en: It’s no wonder that creative abilities are harnessed by so few. By the time
    we are 18 and have been popped out of the school system, we are aware of very
    little. Everyone does what they are told — because that is all they are aware
    of — instead of exploring the unknown and making new discoveries. Expanding their
    mind, awareness, and consciousness.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 难怪创造性能力被如此少的人利用。当我们18岁并从学校体系中毕业时，我们所意识到的非常有限。每个人都会做他们被告知的事情——因为他们所意识到的只有这些——而不是探索未知并做出新的发现。扩展他们的思维、意识和觉悟。
- en: Rather than creating our own reality via the internal, our reality has been
    created via the external.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的现实不是通过内部创造，而是通过外部创造。
- en: Living in the now or “being present” isn’t exclusive to spiritual people. It
    is a necessity for living a life of joy, creativity, and wonder. The present moment
    is how we tap into infinity (or God source, the universe, or any other interpretation
    of the intelligence that we can’t grasp with the traditional 5 senses.)
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 现在生活或“活在当下”并不局限于精神人士。它是过上快乐、有创造力和充满惊奇的生活的必要条件。当下是我们进入无限（或上帝之源、宇宙或任何其他我们无法用传统五感把握的智能）的方式。
- en: As a creative, your job is to expand your awareness and raise your consciousness
    by diving into the unknown.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名创意工作者，你的任务是通过对未知领域的探索来扩展你的意识，提升你的觉悟。
- en: Think of your exploration of the unknown as a mission to collect dots. When
    it comes time to create, you tune into infinity with the intention to connect
    the dots.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 将你对未知的探索视为收集点的使命。当是时候创造时，你以连接点的意图调谐到无限。
- en: You cannot tap into your creative ability when your focus is unconscious and
    narrow.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的注意力是无意识和狭窄的，你就无法发挥你的创造力。
- en: You can tap into your full creative ability when your focus is conscious and
    open.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的注意力是清醒和开放的，你就可以充分发挥你的创造力。
- en: <picture decoding="async" class="wp-image-604">![](../Images/cbf468779bb0ba6825d15d73db37ab8a.png)</picture>
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-604">![](../Images/cbf468779bb0ba6825d15d73db37ab8a.png)</picture>
- en: We can philosophize about this all day, but I want to give you practical steps
    to harnessing your creative abilities to thrive over the next decade.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以整天讨论这个问题，但我想要给你提供一些实用的步骤，帮助你利用你的创造力，在接下来的十年里蓬勃发展。
- en: Creativity Is Not Inherently Valuable
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创造力并非天生就有价值
- en: You can spend 6 figures to earn a PhD in artistic basket weaving — but if you
    don’t understand what humans perceive as valuable, you will never be able to live
    off of that profession.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以花费六位数来获得艺术编织博士学位——但如果你不理解人类认为有价值的东西，你将永远无法依靠这个职业谋生。
- en: There are skills that need to be learned (how you expand your awareness / consciousness)
    in order to increase the perceived value of your creativity.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 有一些技能需要学习（如何扩展你的意识和觉悟），以便提高你创造力的感知价值。
- en: And that’s just the thing, value is dictated by perception. What you deem valuable
    may be a hunk of garbage to the next person.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 而且这正是问题所在，价值是由感知决定的。你认为有价值的东西可能对下一个人来说只是一堆垃圾。
- en: 'It is absolutely crucial that you study all facets of human understanding:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须研究人类理解的各个方面是绝对至关重要的：
- en: Storytelling
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 讲故事
- en: Psychology
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 心理学
- en: Spirituality
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精神
- en: Philosophy
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哲学
- en: Marketing
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 营销
- en: Sales
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 销售
- en: Branding
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 品牌建设
- en: Persuasion
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 说服
- en: Design or visual storytelling
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计或视觉叙事
- en: Color theory
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 色彩理论
- en: Capturing attention
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 吸引注意力
- en: Yourself (self-awareness)
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自我（自我意识）
- en: By studying **one** of these, you expose yourself to **all** of them and open
    up unique paths into the unknown. They are all the same thing, just viewed under
    different lenses of perception and perceived via a unique combination of senses.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 通过研究**其中之一**，你让自己接触到**所有**这些，并开辟通往未知领域的独特路径。它们都是同一件事，只是从不同的感知角度和通过独特的感官组合来感知。
- en: Human understanding is an iceberg that everyone must master. Why? Because you
    need to understand how to communicate the value of your creativity. You need to
    play the money Game if you want to make money. Don’t let your ego get in the way
    of developing communication skills. They are necessary if you want to build a
    creative income.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 人类理解是一块每个人都必须掌握的冰山。为什么？因为你需要理解如何传达你创造力的价值。如果你想赚钱，你需要玩金钱游戏。不要让你的自负阻碍你发展沟通技巧。如果你想要建立一个创造性的收入，这些技巧是必要的。
- en: The deeper you dive into this iceberg of mastery, the more life will flow in
    your favor. Start with the ones that are most practical to distributing your value
    — **marketing, branding, persuasion, and sales.**
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 你越深入探索这个掌握的冰山，你的生活就会越顺利。从那些最实用、能帮助你传播价值的地方开始——**营销、品牌、说服和销售**。
- en: Those are the fuel for monetizing any skillset. If you want to be able to sell
    a creative solution, you need to be able to attract people to that solution. In
    other words, you need traffic and distribution. You do this by [building an audience,
    building leverage, and building other distribution networks](https://thedankoe.com/the-future-of-work-will-be-play/)
    like an email list. There are other methods like paid ads and media buying — but
    those make sense once you have a creative solution that is selling.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这些都是将任何技能集货币化的燃料。如果你想能够销售一个创造性解决方案，你需要能够吸引人们到这个解决方案。换句话说，你需要流量和分发。你可以通过[建立受众、建立杠杆和建立其他分发网络](https://thedankoe.com/the-future-of-work-will-be-play/)，比如建立一个电子邮件列表来实现这一点。还有其他方法，比如付费广告和媒体购买——但一旦你有一个正在销售的创造性解决方案，这些方法才有意义。
- en: '*How do you learn these skills?*'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '*你如何学习这些技能？*'
- en: 'Like you would any other — but most people suck at learning:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 就像你对待其他事情一样——但大多数人都不擅长学习：
- en: '**1) Immerse yourself in an echo chamber of information related to the skill
    you are trying to learn.**'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 沉浸在你试图学习的技能相关的信息回声室中。**'
- en: For 1 month, only consume information related to what you are trying to learn.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个月内，只消费与你试图学习的相关内容。
- en: Buy 1 book that gives a broad overview of all aspects of that topic. Buy a course
    from someone that is an expert in that topic and has condensed the information
    to what you need to know. Follow blogs, podcasts, social media accounts, and everything
    else you can.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 购买一本概述该主题所有方面的书籍。购买一位在该领域是专家并且已经将信息浓缩到你需要知道的内容的课程。关注博客、播客、社交媒体账户以及你能接触到的一切。
- en: Wherever you go, you want to be exposed to all aspects of this topic of interest.
    *You want to gain awareness — collect the dots — in the iceberg of mastery you
    are diving into.*
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你去哪里，你都希望接触到这个感兴趣主题的所有方面。*你想要获得意识——收集点——在你正在潜入的掌握冰山中。*
- en: '**2) Start a personal project with potential profitability.**'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 开始一个具有潜在盈利能力的个人项目。**'
- en: 'When I was learning to code there was one piece of advice that every educator
    harped on:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 当我学习编码时，每一位教育者都会强调的一条建议是：
- en: '*Get out of tutorial hell.*'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '*摆脱教程地狱。*'
- en: Nobody listens to this advice of course. They are afraid of diving into the
    true unknown.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，没有人会听这些建议。他们害怕跳入真正的未知。
- en: Why would someone start personal project when they have no idea what to do after
    they start (and sometimes have no idea how TO start)?
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个人开始后不知道接下来要做什么（有时甚至不知道如何开始）时，他们为什么要开始个人项目？
- en: That’s exactly why you should start one.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是你应该开始一个项目的原因。
- en: Because it makes your *unconscious* problems *conscious* — **fast**.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 因为它让你的*无意识*问题*变得明显*——**迅速**。
- en: '**3) Embrace the chaos and understand that nothing worth having is predictable.**'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 接受混乱，并理解任何值得拥有的东西都是不可预测的。**'
- en: Specific knowledge is found by pursuing your genuine curiosity and passion rather
    than whatever is hot right now.
  id: totrans-87
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 通过追求你真正的好奇心和激情，而不是当前热门的东西，来找到特定知识。
- en: ''
  id: totrans-88
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Naval (@naval) [May 31, 2018](https://twitter.com/naval/status/1002105081855016961?ref_src=twsrc%5Etfw)
  id: totrans-89
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — Naval (@naval) [2018年5月31日](https://twitter.com/naval/status/1002105081855016961?ref_src=twsrc%5Etfw)
- en: Ordering consciousness by exploring the unknown is how you find specific knowledge.
    Specific knowledge is — in the context of this letter — is a creative solution
    that you find by collecting and connecting dots through self-education and building
    personal projects.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 通过探索未知来排序意识是找到特定知识的方法。在本文的语境中，特定知识是通过自我教育和构建个人项目收集和连接点而找到的创造性解决方案。
- en: By constructing your own [hierarchy of goals related to the vision you are trying
    to actualize](https://thedankoe.com/how-to-create-a-life-of-meaning-money-impact-as-fast-as-humanly-possible/),
    you experience the [phases of life](https://thedankoe.com/if-you-feel-lost-understand-these-3-phases-of-life/)
    that teach the lessons that 99% of the population won’t have access to.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 通过构建你自己的[与你要实现的愿景相关的目标层级](https://thedankoe.com/how-to-create-a-life-of-meaning-money-impact-as-fast-as-humanly-possible/)，你将经历[生活的阶段](https://thedankoe.com/if-you-feel-lost-understand-these-3-phases-of-life/)，这些阶段会教授99%的人无法接触到的教训。
- en: Consistency and persistence are key here.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 一致性和坚持是这里的关键。
- en: It is okay if you start over from scratch.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 从头开始是完全可以的。
- en: It is not okay if you abandon the unconventional path as a whole.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你完全放弃非传统道路，这是不行的。
- en: When in doubt, take some time off and reflect on your exploration for a meaningful
    life through the unknown.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 当你不确定时，请抽出一些时间来反思你通过未知探索有意义的生活。
- en: The 3 Point Business Model
  id: totrans-96
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3点商业模型
- en: The first personal project with high potential profitability that you will start
    is a personal brand on social media.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 你将开始的第一项具有高潜在盈利能力的个人项目是在社交媒体上建立个人品牌。
- en: This is no longer optional. You are a creator by nature. Employers are hiring
    based on individuals public resumes (a personal brand). The market is not and
    never will be saturated. We have returned to 5th century BC where the power is
    back in the individuals hands rather than organizations or corporations. With
    the influx of ideas and information that lead to uncertainty and anxiety — it
    is up to the individual to take responsibility for constructing their life. Opposed
    to having religion, corporate culture, or other organizations create certainty
    in your life.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 这不再是可选的。你天生就是一个创造者。雇主是根据个人的公开简历（个人品牌）来招聘的。市场永远不会饱和。我们回到了公元前5世纪，权力回到了个人手中，而不是组织或公司手中。随着想法和信息的大量涌入，导致不确定性和焦虑
    — 个人有责任构建自己的生活。与宗教、企业文化或其他组织为你生活中创造确定性相反。
- en: The best jobs are neither decreed nor degreed. They are creative expressions
    of continuous learners in free markets.
  id: totrans-99
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 最好的工作既不是由命令决定的，也不是由学位决定的。它们是自由市场中持续学习者的创造性表达。
- en: ''
  id: totrans-100
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Naval (@naval) [January 29, 2019](https://twitter.com/naval/status/1090363813721862144?ref_src=twsrc%5Etfw)
  id: totrans-101
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — Naval (@naval) [2019年1月29日](https://twitter.com/naval/status/1090363813721862144?ref_src=twsrc%5Etfw)
- en: Why am I so adamant on starting a personal brand? Because building an audience
    and leverage was the greatest thing I ever did for myself.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我如此坚决地要开始一个个人品牌？因为建立受众和利用是我为自己做的最伟大的事情。
- en: '*You can practice any creative or marketable skill in the real world.*'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '*你可以在现实世界中练习任何有创造性的或可销售的技能。*'
- en: Want to learn copywriting and persuasion? Follow the 3 steps to rapid learning
    above and practice by writing emails and tweets.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 想学习文案和说服技巧吗？遵循上述快速学习3步，并通过撰写电子邮件和推文来练习。
- en: Want to learn email marketing, web design, sales, or any other skill? Build
    an email list, build a personal website, and DM people to get on sales calls to
    increase the value of your personal brand (and make some money along the way.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 想学习电子邮件营销、网页设计、销售或其他技能吗？建立一个电子邮件列表，建立一个个人网站，并通过DM与人联系进行销售通话，以增加你个人品牌的价值（并在过程中赚一些钱）。
- en: 'I’m rambling a bit, let’s get actionable. Here is the 3 point business model
    (for personal brands):'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我有点啰嗦，让我们来点实际的。以下是一个3点商业模型（针对个人品牌）：
- en: '**1) Start a weekly newsletter.**'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 开始一个每周通讯。**'
- en: Why? Because most people are playing the short-form content game with no authority
    to show for it.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？因为大多数人都在玩短篇内容游戏，没有任何权威可以展示。
- en: Authority comes from depth and expertise. What better way to build that authority
    than making a high quality newsletter the main pillar of your business?
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 权威来自深度和专业知识。还有什么比将高质量通讯作为你业务的主要支柱来建立这种权威更好的方法呢？
- en: 95% of my sales come from my long form content. It builds trust that others
    can’t compete with.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我95%的销售额来自我的长篇内容。它建立了其他人无法竞争的信任。
- en: '**2) Start a twitter account.**'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 开始一个Twitter账户。**'
- en: Why?
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: You don’t have to show your face (if you don’t want to)
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你不想的话，不必展示你的脸。
- en: You don’t have to create fancy designs
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不必创造复杂的设计。
- en: You don’t have to spend hours creating content
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不必花费数小时来创建内容。
- en: All you need is half a brain and the ability to type.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 你只需要一半的头脑和打字的能力。
- en: Anyone can write less than 280 characters and press “send tweet.”
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 任何人都可以写少于280个字符并按下“发送推文”。
- en: 'Other benefits of Twitter:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: Twitter的其他好处：
- en: The retweet is arguably the most powerful share feature — if you can connect
    with others and leverage their audience with retweets, you can grow quick.
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 转发可能是最有力的分享功能——如果你能与他人建立联系，并通过转发利用他们的受众，你可以快速成长。
- en: You can post links anywhere — meaning you have more creative potential for promoting
    your products and newsletter (to make more sales)
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以在任何地方发布链接——这意味着你有更多的创意潜力来推广你的产品和通讯（以创造更多销售）。
- en: You can condense your weekly newsletter into a thread — threads are how you
    gain followers fast.
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以将你的每周通讯压缩成一个帖子——帖子是你快速增加粉丝的方式。
- en: Nobody cares about professionalism. If I had to bet on one platform that will
    be the center of the creator economy, Twitter would be it (just look at how everyone
    copy and pastes tweets to other platforms, they usually go more viral than posts
    that took hours to create).
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有人关心专业性。如果我要赌一个将成为创作者经济中心的平台，那将是Twitter（只需看看人们如何将推文复制粘贴到其他平台，它们通常比花费数小时创作的帖子传播得更广）。
- en: You can test ideas fast since creating Twitter content takes very little time.
    If a tweet does well, that means a YouTube video, product, service, podcast episode,
    article, or Instagram post will do well.
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于创建Twitter内容花费的时间非常少，你可以快速测试想法。如果一条推文表现良好，这意味着YouTube视频、产品、服务、播客剧集、文章或Instagram帖子也会表现良好。
- en: There is zero barrier of entry to this.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 进入这个领域没有任何障碍。
- en: '**3) A creative solution to iterate on.**'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 一个可以迭代的创意解决方案。**'
- en: The easiest way to start making money is by starting a service business related
    to your expertise.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 开始赚钱最简单的方式就是开设与你专长相关的服务型业务。
- en: You can help people for free at the start, get some results, and start charging
    $500-$1000 for a pack of 4 consulting calls.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在一开始免费帮助人们，取得一些成果，然后开始为4次咨询通话收取500-1000美元。
- en: Good at web development? Write for developers, connect with them, and charge
    to mentor them on a project they are building.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在网页开发方面很擅长？为开发者写文章，与他们建立联系，并收取指导他们构建项目的费用。
- en: Good at marketing? Write for creators, connect with them, and charge to consult
    them on any aspect of their marketing.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在营销方面很擅长？为创作者写文章，与他们建立联系，并收取咨询费，帮助他们解决营销的任何方面。
- en: The list goes on — you can do this with anything. I know some people that do
    it for marijuana therapy and some people that do it for Muay Thai online coaching.
    I’ve seen people offer surf lessons and critiques as well.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 列表还在继续——你可以用任何东西做这件事。我知道有些人做的是大麻疗法，有些人做的是在线泰拳教练。我也见过人们提供冲浪课程和评论。
- en: There is a progression to this.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 这有一个进步的过程。
- en: You begin to collect dots that will turn into a creative solution or system
    that you can sell at a premium.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 你开始收集将变成创意解决方案或系统的点，你可以以溢价的价格出售。
- en: This is where most people go wrong — they want to go straight into selling $5,000
    coaching packages or $3,0000/month marketing retainers when they have no idea
    how to create a unique system that gets results (and makes you stand out from
    the crowd).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是大多数人出错的地方——他们想在没有任何创建独特系统以获得结果（并让你在人群中脱颖而出）的方法时，就直接进入销售5000美元的辅导套餐或30000美元/月的营销保留金。
- en: 'Example of a unique solution that I’ve discovered myself (that I could charge
    $5K+ per month for):'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 我自己发现的一个独特解决方案的例子（我可以每月收取5000美元以上的费用）：
- en: While everyone is trying to sell sales funnels, lead generation, and other things
    that are extremely common now — I have enough experience and practice with all
    of those.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 当每个人都试图销售销售漏斗、线索生成和其他现在极其常见的东西时——我在所有这些方面都有足够的经验和实践。
- en: I’ve recently created a content ecosystem (that I teach in [Digital Economics](https://digitaleconomics.school))
    that pulls in sales without being salesy. It allows you to focus on what you love
    (producing high quality content) and streamlines promotions, social media growth,
    and authority building. That is 10x more enticing than a “conversion centered
    website,” sales funnel, or lead generation — I’ve baked them all into one with
    my content ecosystem.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 我最近创建了一个内容生态系统（我在[数字经济学](https://digitaleconomics.school)中教授），它能够吸引销售而不显得像是在销售。它允许你专注于你热爱的事情（制作高质量的内容），并简化了促销、社交媒体增长和权威建立。这比“以转化为中心的网站”、销售漏斗或线索生成要吸引人10倍——我已经将它们都融入了我的内容生态系统中。
- en: (I am not saying conversion centered websites or sales funnels are bad. They
    are a part of the ladder. You just won’t be able to charge the premium price that
    you want to without practice and iteration).
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: （我并不是说以转化为中心的网站或销售漏斗是坏的。它们是阶梯的一部分。只是没有实践和迭代，你将无法收取你想要的溢价价格）。
- en: Work your way up the ladder.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 逐步攀登你的职业阶梯。
- en: Focus on helping people for free to understand their problems.
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 专注于免费帮助人们理解他们的问题。
- en: Start researching, writing about, and creating solutions to solve those problems.
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始研究、撰写关于以及创造解决方案来解决那些问题。
- en: Begin charging a low amount for a consulting or freelance service with this
    solution.
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用这个解决方案开始以较低的价格提供咨询或自由职业服务。
- en: Continue making your solution better and getting more results
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 继续改进你的解决方案，并取得更多成果
- en: Increase your prices
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高你的价格
- en: While doing all of this, you are growing an audience — clients will start to
    come to you and you have the potential to launch a product
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在做所有这些的同时，你正在扩大你的听众群体——客户会开始向你靠近，你也有潜力推出一个产品
- en: You can package up the system that you’ve created into a digital product, market
    it well, and start to gain full control over your time and energy
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以将你创建的系统打包成一个数字产品，好好推广它，并开始完全掌控你的时间和精力
- en: I could go on — but it wouldn’t make sense to you if you haven’t started. It
    is common practice to teach from the perspective of the people that are 2-3 steps
    behind you. If I told you what I do now and you haven’t even started — it will
    go straight over your head.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以继续说——但如果你还没有开始，这对你来说就没有意义。从比你落后2-3步的人的角度进行教学是一种常见的做法。如果我告诉你我现在做什么，而你甚至还没有开始——那只会让你一头雾水。
- en: In a game, you have to be a specific level in order to learn specific traits,
    acquire high level armor, and take on more challenging quests.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 在游戏中，你必须达到特定的等级才能学习特定的特性，获得高级装备，并承担更具挑战性的任务。
- en: '*Stop trying to get a level 100’s results while you are level 10.*'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: '*停止试图在等级10的时候获得等级100的结果。*'
- en: Dive into the unknown starting today. Start gaining XP in the real world.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 从今天开始深入未知。开始在世界真实环境中积累经验值。
- en: — Dan Koe
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: — 丹·科
- en: '**What Happened This Week**'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: '**本周发生了什么**'
- en: Early enrollment for Digital Economics **ends tonight at 7pm ET.**
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 数字经济课程的早期报名**今晚7点（东部时间）截止**。
- en: If you want to enroll in an accelerated education for future creatives, marketers,
    and solopreneurs (while learning the ins and outs of everything we talked about
    in this letter) — [join 57 other students that have already enrolled in the June
    cohort before 7pm tonight.](https://digitaleconomics.school)
  id: totrans-153
