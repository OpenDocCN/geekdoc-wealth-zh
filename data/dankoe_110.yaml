- en: Disappear And Come Back Unrecognizable (12 Rules To Change Your Life)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 消失并重新出现，无法辨认（12条改变你生活的规则）
- en: 原文：[https://thedankoe.com/letters/disappear-and-come-back-unrecognizable-12-rules-to-change-your-life/](https://thedankoe.com/letters/disappear-and-come-back-unrecognizable-12-rules-to-change-your-life/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://thedankoe.com/letters/disappear-and-come-back-unrecognizable-12-rules-to-change-your-life/](https://thedankoe.com/letters/disappear-and-come-back-unrecognizable-12-rules-to-change-your-life/)'
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1909">![](../Images/f7d5112739a4a4e1d1bda0ec933216b8.png)</picture>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/f7d5112739a4a4e1d1bda0ec933216b8.png)'
- en: I don’t say this to sound arrogant.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我这么说并不是为了显得傲慢。
- en: But I’ve never had a problem with knowing what I want in the future.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 但我从未在知道未来想要什么方面遇到过问题。
- en: When people say “I don’t know what I want,” what they’re really saying is “I
    don’t want to do the work it takes to get what I want.”
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当人们说“我不知道自己想要什么”时，他们真正想说的是“我不想做得到我想要的东西所需要付出的工作。”
- en: It’s not that you don’t know what you want. It’s that you know what you don’t
    want – meaning you know what you want – and are hiding from it it takes to get
    away from it.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 你并不是不知道自己想要什么。而是你知道自己不想要什么——这意味着你知道自己想要什么——并且正在逃避它，逃避它需要付出什么代价才能摆脱它。
- en: 'I’ve always known what I wanted because it’s extremely simple to observe society
    and know what I don’t want:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直都知道自己想要什么，因为观察社会并知道我不想要什么非常简单：
- en: A job I hate
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我讨厌的工作
- en: Work I hate
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我讨厌的工作
- en: A body I hate
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个我讨厌的身体
- en: A partner I hate
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我讨厌的伴侣
- en: A mind that hates me
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个讨厌我的心灵
- en: 'From that alone, it’s easy to figure out what I had to do:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 仅从这一点来看，很容易就能想出我必须做什么：
- en: Become an entrepreneur no matter how many times I fail (it took 7 failures)
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 成为一名企业家，无论我失败多少次（我失败了7次）
- en: Gain the power to get rid of work I don’t want to do (writing on social media
    for leverage)
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获得摆脱我不愿意做的工作（在社交媒体上写文章以获得影响力）的力量
- en: Go to the gym and work on my nutrition
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 去健身房锻炼并关注我的营养
- en: Allow those 3 things to open up more opportunities in every domain of life
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让这三件事在每个生活领域的每个领域都为你打开更多的机会
- en: Let that path create a peaceful mind from the progressive overload of responsibility.
    Weights feel lighter as you get stronger.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让那条道路从责任的渐进式超负荷中创造一个平静的心灵。随着你变得更强大，重量会感觉更轻。
- en: Everybody knows that some form of this path is what they are meant to do.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都知道，某种形式的这条道路是他们注定要做的事情。
- en: Your psyche craves actualization and transcendence. The depth of your being
    wants these things, but your ego is distracted by things it thinks it wants.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 你的心理渴望实现和超越。你存在的深度想要这些事物，但你的自我被它认为想要的事物所分散。
- en: That’s the problem.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是问题所在。
- en: You don’t have a way to focus your mind.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有一种方法来集中你的思想。
- en: You don’t have a plan for your future that has more gravity than the distractions
    in your life.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有为你的未来制定一个比生活中分散你注意力的东西更有重量的计划。
- en: You struggle to maintain a long-term time horizon and get trapped in never-ending
    short-term stress-inducing tasks.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 你努力维持长期的时间视野，却陷入了永无止境的短期压力产生的工作中。
- en: How would it feel to have one single framework that would determine the entirety
    of your success? One that you can refer to whenever you feel lost?
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 拥有一个单一的框架，它将决定你全部的成功，你会感觉如何？一个你可以在感到迷茫时随时参考的框架？
- en: That’s what we are going to talk about.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们接下来要讨论的内容。
- en: The 12 Rules Of Creation
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 《创造的12条规则》
- en: You need a plan. Because if you don’t have one, society does, and they’ve been
    planning your life for decades. – [The Art of Focus](https://theartoffocusbook.com)
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你需要一个计划。因为如果你没有，社会就有，他们已经为你规划了几十年。 —— [《专注的艺术》](https://theartoffocusbook.com)
- en: <picture decoding="async" class="wp-image-1910">![](../Images/e44594f73ffa45c445760447b39d62c6.png)</picture>
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/e44594f73ffa45c445760447b39d62c6.png)'
- en: You’ve been assigned goals by society since the day you were born.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 你从出生那天起就被社会分配了目标。
- en: These goals went on to frame how you viewed the world.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这些目标继续塑造了你如何看待世界。
- en: You learned skills to achieve those goals. You registered opportunities in alignment
    with those goals. Everything you experience in life is through the lens of the
    conscious or unconscious goals guiding the systems being formed in your head.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 你学会了实现这些目标所需的技能。你注册了与这些目标一致的机会。你生活中所经历的一切都是通过引导你头脑中形成的系统中的有意识或无意识的目标的视角来体验的。
- en: If we want to build a life of meaning, money, and impact, we must pursue our
    ideal future, create a story worth telling, and pass down that path to those who
    are ready to receive it.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们想要建立一个有意义、有钱财和影响力的生活，我们必须追求我们理想的未来，创造一个值得讲述的故事，并将这条道路传递给那些准备好接受它的人。
- en: After a decade of dancing between creative success and failure, I’ve found a
    big-picture framework that will bring you success in anything you do.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在经历了十年的创造性和失败之间的舞蹈之后，我发现了一个大局观的框架，它将使你在任何你所做的事情上都能取得成功。
- en: These patterns can be found in marketing, sales, human behavior, peak performance,
    psychology, stories, games, the structure of billion-dollar companies, successful
    product development, and anything involved in the process of creating and distributing
    value.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这些模式可以在营销、销售、人类行为、巅峰表现、心理学、故事、游戏、价值创造和分配的结构、成功的产品设计以及任何涉及创造和分配价值的过程中发现。
- en: You will be using this as a guiding light for your life, but I encourage you
    to meditate on how it can be applied to your business, relationships, and conversations.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 你将使用它作为你生活的指导之光，但我鼓励你冥想如何将其应用于你的业务、关系和对话。
- en: '**Anti-Vision**'
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**反愿景**'
- en: We start our story with an anti-vision.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从反愿景开始我们的故事。
- en: The bane of your existence.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 你存在的祸害。
- en: The first polar end of the worldview you will cultivate.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 你将要培养的世界观的第一极。
- en: A positive-fear mechanism that kicks you into action.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 一种积极的恐惧机制，它会推动你采取行动。
- en: '*Your anti-vision is the future that you do not want to live.*'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '*你的反愿景是你不希望生活的未来。*'
- en: Start a running note of experiences you do not want to repeat.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 开始记录你不想重复的经历。
- en: The material you don’t care to learn.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不愿意学习的材料。
- en: The work you don’t care to complete.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不愿意完成的工作。
- en: The arguments you don’t wish to have.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不希望发生的争论。
- en: You won’t get rid of them in an instant.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 你不可能立刻摆脱它们。
- en: You are meant to identify them as problems to be solved.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该把它们识别为需要解决的问题。
- en: '**Vision**'
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**愿景**'
- en: If you don’t have a vision, you are lost.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有愿景，你就会迷失。
- en: You can’t create outcomes, so you are doomed to the mechanical living of determined
    outcomes.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 你不能创造结果，所以你注定要过着机械的生活，追求确定的结果。
- en: Every decision you make in any domain of your life must be filtered through
    your vision.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在你生活的任何领域做出的每一个决定都必须通过你的愿景来过滤。
- en: That is how you bring meaning to your actions and minimize distractions.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你怎么给你的行动带来意义，并最小化干扰。
- en: Write down exactly what you want out of life.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 写下你从生活中得到的确切东西。
- en: '*Don’t miss a detail, but realize this is an iterative process.*'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '*不要错过任何细节，但要知道这是一个迭代的过程。*'
- en: You won’t get it right the first time around, and you probably never will. That’s
    not the point. Spend 30 minutes generating a minimum viable vision. Come back
    to it often to add, subtract, and improve as your desires inevitably change with
    your failures.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 你不可能一开始就做对，你可能永远也不会。这不是重点。花30分钟生成一个最小可行愿景。经常回到它那里，随着你的愿望不可避免地随着你的失败而改变，添加、删除和改进。
- en: '**Mission**'
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**使命**'
- en: Your mission is the most important thing in your life.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 你的使命是你生活中最重要的事情。
- en: It is the bridge between what you do and don’t want.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 它是你所做和所不想要的之间的桥梁。
- en: The path you are forging toward your vision.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在为之奋斗的通往愿景的道路。
- en: '*Anything that does not align with your mission is to be treated as a distraction.*'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '*任何与你的使命不一致的东西都应该被视为一种干扰。*'
- en: Your mission evolves with awareness of new beliefs, opportunities, and knowledge.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 你的使命随着对新信念、机会和知识的认识而发展。
- en: Your mission requires faith. You can’t see the next step unless you take the
    first. And once you do, the second may be completely different than anything you
    imagined.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 你的使命需要信念。除非你采取第一步，否则你看不见下一步。一旦你做到了，第二步可能与你所想象的一切完全不同。
- en: '**Standards**'
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**标准**'
- en: You aren’t where you want to be because you are okay with where you are.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 你之所以没有达到你想要的地方，是因为你对现状感到满意。
- en: '*You don’t submit to your situation, you accept it so you can move forward.*'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '*你不屈服于你的处境，你接受它，这样你才能前进。*'
- en: Standards are absorbed from your environment.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 标准是从你的环境中吸收的。
- en: The friends you hang out with.
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你一起出去玩的朋友。
- en: The books you read.
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你所读的书。
- en: The media you consume.
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你所消费的媒体。
- en: The parents who raise you.
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 抚养你的父母。
- en: The teachers who knew it all.
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 知道一切的老师。
- en: It may be time to make a change and sit with the ramifications.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 可能是时候做出改变，并坐下来思考其后果。
- en: '**Goals**'
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**目标**'
- en: Big goals are for direction. Small goals are for clarity.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 大目标是方向。小目标是清晰。
- en: You don’t need motivation when the task in front of you is so stupidly simple
    that you can’t help but complete it.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 当你面前的任务如此简单以至于你不得不完成它时，你不需要动力。
- en: Break down your vision into goals by decade, year, month, week, and day.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的愿景分解为十年、一年、一个月、一周和一天的目标。
- en: They are your guide, not your master.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 它们是你的指南，而不是你的主人。
- en: Be stubborn with vision and loose with details.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 对愿景要有固执，对细节要宽松。
- en: Your goals will change as you do, be okay with that.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 你的目标会随着你的变化而变化，对此感到满意吧。
- en: '**Projects**'
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**项目**'
- en: Learning comes from struggle, not memorization.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 学习来自斗争，而不是记忆。
- en: You need a series of tangible projects to build that will actualize your vision.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要一系列有形的项目来构建，以实现你的愿景。
- en: Turn your goals into projects.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将你的目标转化为项目。
- en: Architect an outline.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建一个大纲。
- en: Determine milestones
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定里程碑
- en: Set deadlines
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设定截止日期
- en: Map out areas of research.
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 规划研究区域。
- en: Build, then learn. Start the project, expose your lack of knowledge and skill,
    and use that as a reference point for your education.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 构建，然后学习。开始项目，暴露你的知识和技能不足，并以此作为你教育的参考点。
- en: '**Education**'
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**教育**'
- en: You aren’t where you want to be because you aren’t as smart as you think you
    are.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有达到你想要的地方，因为你没有像你想象的那样聪明。
- en: With every project, there is a skill set and mindset required to complete the
    project.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 每个项目都需要一套技能和心态来完成。
- en: Daily self-education must become a cornerstone habit in your life. If you stop
    learning, you stop evolving. Opportunities stop presenting themselves, and you
    get trapped in your current stage of development.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 每日自我教育必须成为你生活中的基石习惯。如果你停止学习，你就停止了进化。机会停止出现，你陷入了当前的发展阶段。
- en: Education is the fuel for experimentation.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 教育是实验的燃料。
- en: '**Limitations**'
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**限制**'
- en: A fool becomes rich at the expense of everything good in life.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 一个傻瓜以生活中所有美好的东西为代价变得富有。
- en: A creative becomes rich at the expense of his choice.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 一个创造者以他的选择为代价变得富有。
- en: Limitations on your goals force creativity.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 目标上的限制迫使创造力。
- en: The question is, what are you *not* willing to sacrifice to achieve your goals?
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，你不愿意为了实现目标而牺牲什么？
- en: The creative challenge appears when you attempt to achieve a goal without betraying
    your vision.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 当你试图在不背叛你的愿景的情况下实现目标时，创造性挑战就会出现。
- en: You can become rich without sacrificing your family.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在不牺牲家庭的情况下变得富有。
- en: You can become healthy without sacrificing your work.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在不牺牲工作的情况下变得健康。
- en: You can become valuable without sacrificing what makes life worth living.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在不牺牲使生活值得活着的因素的情况下变得有价值。
- en: '**Levers**'
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**杠杆**'
- en: Every day, you need priority tasks that move the lever toward your projects,
    goals, and vision from the ground up.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 每天你需要优先任务，这些任务从底层推动你的项目、目标和愿景。
- en: These are often perceived as boring fundamentals without the cultivation of
    a sense of mastery.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 这些通常被视为没有培养掌握感的枯燥基础。
- en: Do what needs to be done, but grip your vision as the anchor into the unknown.
    If you aren’t making progress, it’s because you aren’t moving levers, even if
    you think you are.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 做你需要做的事情，但把你的愿景作为锚定未知的力量。如果你没有取得进展，那是因为你没有移动杠杆，即使你认为你在移动。
- en: Writing is the main lever in my creator business (and almost any other modern
    business). This is what I teach in [2 Hour Writer](https://2hourwriter.com), and
    what we help people that want personalized help and feedback with in [Kortex University](https://university.kortex.co).
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 写作是我创作者业务中的主要杠杆（以及几乎所有其他现代业务）。这是我在[2小时作家](https://2hourwriter.com)中教授的，也是我们在[Kortex大学](https://university.kortex.co)帮助那些需要个性化帮助和反馈的人所提供的。
- en: '**Challenge**'
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**挑战**'
- en: When a novice plays against a master, neither has fun.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 当新手与大师对决时，双方都不会感到快乐。
- en: The novice becomes anxious while the master becomes bored.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 新手会感到焦虑，而大师会感到无聊。
- en: When your skill is the perfect match for the challenge of a situation, the world
    goes quiet, and you move forward with grace.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的技能与情境的挑战完美匹配时，世界会变得安静，你将优雅地前进。
- en: Challenge is the source of enjoyment.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战是乐趣的源泉。
- en: Enjoyment is found on the tightrope between boredom and anxiety. At the edge
    of your abilities.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 乐趣存在于无聊和焦虑之间的平衡木上。在能力的边缘。
- en: The path to meaningful living is often found in a simple shift in perspective.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 有意义的生活的道路通常在于视角的简单转变。
- en: '**Curiosity**'
  id: totrans-116
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**好奇心**'
- en: Be willing to steer off course and discover new potential.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 愿意偏离航线，发现新的潜力。
- en: It is too easy to lock ourselves in the mechanical routine we were trying to
    escape.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 我们很容易陷入我们试图逃离的机械常规中。
- en: Be curious.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 保持好奇心。
- en: Dive deep into your interests.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 深入你的兴趣。
- en: Let few questions go unanswered.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 让少数问题悬而未决。
- en: Avoid getting locked into paradigms and beliefs that narrow your mind on one
    idolized path.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 避免陷入使你的思想局限于一个理想化的路径的范式和信念。
- en: Your vision is like a battery. You must fuel it with experience, education,
    and misdirection.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 你的愿景就像一块电池。你必须用经验、教育和误导来给它充电。
- en: '**Experimentation**'
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**实验**'
- en: If you only do the same thing as everyone else, you are bound to the results
    of everyone else.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只是像其他人一样做同样的事情，你注定要受到其他人结果的影响。
- en: Research processes that others teach, the ones they have seen success with.
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究别人教授的过程，他们看到成功的那些。
- en: Try multiple techniques to see which ones get *you* the best results.
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试多种技术，看看哪一种对你最有帮助。
- en: Create your own process that you can stay consistent with.
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建你自己的过程，你可以保持一致性。
- en: In fitness, try different training and nutrition programs. In relationships,
    try therapy or self-help books. In business, try cold outreach and organic content.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 在健身方面，尝试不同的训练和营养计划。在关系方面，尝试治疗或自助书籍。在商业方面，尝试冷接触和有机内容。
- en: Avoid becoming dogmatic about the single right way. There is no right way, there
    is only your way, and that isn’t bound to stay the same as different levels of
    the game require different methods to complete them.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 避免对单一正确的方式变得教条。没有正确的方式，只有你的方式，而且这并不一定保持不变，因为游戏的不同级别需要不同的方法来完成。
- en: When you are lost, run through this process.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 当你迷失方向时，运行这个过程。
- en: When your relationships are failing, run through this process. When your business
    won’t get off the ground, run through this process.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的关系失败时，运行这个过程。当你的业务无法起飞时，运行这个过程。
- en: Every successful interaction with reality starts and ends with a clear image
    of the want, clarity on how to achieve it, and creative execution to acquire rare
    results.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 每一次与现实的成功互动都是从对需求的清晰图像、如何实现它的清晰认识以及创造性地执行以获得罕见结果开始的。
- en: Making Better Decisions
  id: totrans-134
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 做出更好的决定
- en: <picture decoding="async" class="wp-image-1911">![](../Images/5747c3a446fab8a0880df2104bda392f.png)</picture>
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/5747c3a446fab8a0880df2104bda392f.png)'
- en: 'You aren’t where you want to be because:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 你还没有达到你想要的地方，因为你：
- en: You didn’t make the choices that led to a purposeful career.
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你没有做出导致有目的职业生涯的选择。
- en: You didn’t make the choices that led to fulfilling relationships.
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你没有做出导致满足关系的决定。
- en: You didn’t make the choices that led to a healthy and aesthetic body.
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你没有做出导致健康和美观身体的决定。
- en: You, right now, are the manifestation of your past choices.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你就是你过去选择的体现。
- en: So, if you want to take control of who you become, your choices are of utmost
    importance.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果你想掌握你将成为的人，你的选择至关重要。
- en: 'There are 2 things here:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有两件事：
- en: Who you want to become – perspective and zooming out.
  id: totrans-143
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你想成为什么样的人——视角和放大。
- en: The choices that will take you there – perception and zooming in.
  id: totrans-144
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 带你到达那里的选择——感知和聚焦。
- en: The good life is created by constant reminder of your vision and programming
    the identity that would actualize it through aligned action.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 好的生活是通过不断提醒你的愿景，并通过一致的行动来实际化你的身份来创造的。
- en: Better decisions come from perspective and perception.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的决定来自视角和感知。
- en: Every day, zoom out and remind yourself of what you don’t want. You don’t need
    to focus on what you want, because that will make itself apparent through your
    choices.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 每天都要放大视野，提醒自己你不想做的事情。你不需要专注于你想要的事情，因为那将通过你的选择自然而然地显现出来。
- en: Hold that frame at the top of your mind.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的脑海中保持这个框架在顶部。
- en: Do not allow distractions to penetrate it.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 不要让分心的事情渗透进来。
- en: Any time a choice comes up, zoom out and align.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 任何时候出现选择，放大视野并保持一致。
- en: “Will this benefit the future I am trying to create?”
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: “这会对我试图创造的未来有益吗？”
- en: Then, be decisive. Make the decision.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，果断决定。做出决定。
- en: Allow failure into your life so you can correct your behavior the next time
    around.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 允许失败进入你的生活，这样你就可以在下一次纠正你的行为。
- en: Awareness is a cure.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 意识是良药。
- en: You don’t have to quit all of your bad habits. You just have to view them and
    their consequences through the lens of your vision for long enough.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 你不必放弃所有的坏习惯。你只需要通过你愿景的视角来看待它们及其后果，足够长的时间。
- en: Dan
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 丹
