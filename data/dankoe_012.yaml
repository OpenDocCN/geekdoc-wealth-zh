- en: How To Write Authentic Content (Social Media Growth 101)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何撰写真实内容（社交媒体增长101）
- en: 原文：[https://thedankoe.com/letters/dont-get-replaced-by-ai-how-to-write-authentic-content/](https://thedankoe.com/letters/dont-get-replaced-by-ai-how-to-write-authentic-content/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://thedankoe.com/letters/dont-get-replaced-by-ai-how-to-write-authentic-content/)'
- en: '*People want to follow humans.*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*人们想要跟随人类*。'
- en: They don’t want to follow a search engine with a face on it.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 他们不想跟随一个带人脸的搜索引擎。
- en: And, with the rise of ChatGPT and future iterations of language AI, authenticity
    is more important than ever.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 并且，随着ChatGPT的兴起和未来语言AI的迭代，真实性比以往任何时候都更重要。
- en: Everyone is desperate for human connection, and social media is not delivering
    that.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都渴望人与人之间的联系，而社交媒体并没有提供这种联系。
- en: You can, and it will lead to more authority than you could imagine.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以，这将导致比你想象的更大的权威。
- en: Authenticity, from my predictions, will be the differentiating factor for the
    future generation of creators (which is why I talk about philosophy, self-awareness,
    and other non-business topics that actually make you stand out in business).
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我的预测，真实性将是未来一代创作者的差异化因素（这就是为什么我谈论哲学、自我意识和其他真正让你在商业中脱颖而出的非商业话题）。
- en: I’ve worked directly and indirectly with over 5,000 creators, and this is a
    problem they encounter time and time again.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我直接和间接地与超过5000名创作者合作过，这是他们一次又一次遇到的问题。
- en: '*This seems to be the most overwhelming problem.*'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '*这似乎是最令人难以承受的问题*。'
- en: Creators don’t know how to incorporate who they are into their content.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者不知道如何将他们自己融入他们的内容中。
- en: This makes people quit before it starts getting good.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这让人们在没有开始变得好之前就放弃了。
- en: And, even if you stick it out, if you don’t display who you are and where you
    came from, what separates you from a robot?
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 即使你坚持下去，如果你不展示你是谁以及你从哪里来，你与机器人有什么区别？
- en: Even worse, people that try to incorporate more than one interest don’t know
    how to write in a way that leads to growth, authority, and engagement.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 更糟糕的是，试图融入多个兴趣的人不知道如何以促进增长、权威和参与度的方式进行写作。
- en: 'Before we dive into organizing your topics, writing content, and turning 1
    idea into 10, here’s a bit of credibility:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入组织你的主题、撰写内容和将一个想法变成10个之前，这里有一些信誉：
- en: I started as a creator 3 years ago.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我3年前开始作为一个创作者。
- en: I launched a product right when I started, which most people warn against.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我在开始的时候推出了一个产品，大多数人都会警告不要这样做。
- en: I wrote about anything I wanted to, like emotional management and self-improvement,
    when my product was related to web design.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 当我的产品与网页设计相关时，我写了我想要写的一切，比如情绪管理和自我提升。
- en: I incorporated web design tweets here and there (maybe once every 2 days?) because
    I knew it was important.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里穿插了一些关于网页设计的推文（可能每两天一次？），因为我知道这很重要。
- en: 'The most important thing for those worried about monetization:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 对于担心货币化的人来说，最重要的是：
- en: Talk about whatever you want, and when you plan to promote, talk about that
    topic more.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 随便谈谈你想要谈论的任何话题，当你计划推广时，就多谈谈那个话题。
- en: It’s that simple.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是那么简单。
- en: Well, kinda.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，有点。
- en: Experience will teach you more than I can here.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 经验将教会你比我能教给你的更多。
- en: '**Before we dive in:**'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**在我们深入之前：**'
- en: The first Solopreneur Sprint starts February 7th.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 第一次独立创业者冲刺活动将于2月7日开始。
- en: In 14 days, we will create confidence in your niche of one, create 20+ foundational
    content pieces, and create a zero-cost growth strategy for your creator brand.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在14天内，我们将建立你在特定领域的信心，创建20多个基础内容作品，并为你的创作者品牌制定零成本增长策略。
- en: '[>> Check it out here if interested.](https://sprints.digitaleconomics.school)'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '[>> 如果感兴趣，请在此处查看](https://sprints.digitaleconomics.school)'
- en: Your Topic Tree
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你的主题树
- en: If you don’t know what to write about, [read the last letter about turning yourself
    into the niche.](https://thedankoe.com/the-most-profitable-niche-is-you-how-to-create-your-niche/)
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道写什么，[阅读关于将自己变成特定领域的最后一封信](https://thedankoe.com/the-most-profitable-niche-is-you-how-to-create-your-niche/)
- en: In that letter, we outlined your life story and turned it into book chapters.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在那封信中，我们概述了你的生活故事，并将其转化为书籍章节。
- en: What skills and interests are going to help you create your ideal future?
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 哪些技能和兴趣将帮助你创造你理想中的未来？
- en: And for those that are already on the path, what skills, interests, and expertise
    do you have that have helped you achieve your goals?
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些已经在路上的人，你有什么技能、兴趣和专业知识帮助你实现了你的目标？
- en: Understand that non-money-making interests help you achieve your goals as well.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 理解非盈利兴趣同样可以帮助你实现目标。
- en: If your ideal future consists of being at peace and not worrying about money…
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的理想未来是和平而不担心金钱…
- en: It sounds like spirituality is the solution to all of those, not money. So,
    don’t hesitate to include the things you love talking about.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 听起来精神层面是解决所有这些问题的方法，而不是金钱。所以，不要犹豫，包括你热爱谈论的事情。
- en: An added benefit is your passion for that interest will display in your content.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 一个额外的优势是，你对这个兴趣的热情将在你的内容中体现出来。
- en: These are what we are going to use for our content.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这些就是我们将要用于我们内容的东西。
- en: Choose 2-3 Interests Or Skills You Want To Write About
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 选择2-3个你想要撰写的兴趣或技能
- en: These should already be at the top of your mind.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这些应该已经在你的脑海中。
- en: I can’t help you much here, as I am not you.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里帮不上太多忙，因为我不是你。
- en: If you don’t have interests you want to write about, you need to set a goal,
    start pursuing it, and learn what will help you get there.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有想要撰写的兴趣，你需要设定一个目标，开始追求它，并学习什么能帮助你达到那里。
- en: Broaden & Breakdown
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 扩展与分解
- en: Most people start with hyper-specific interests like “biomechanical movement
    therapy” and get stressed out because so few people are interested in it.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人从超具体的兴趣开始，比如“生物力学运动疗法”，然后因为对此感兴趣的人很少而感到压力。
- en: Even further, they get stressed out again because they feel like if they don’t
    talk about that specific thing, their entire monetization potential goes down
    the drain.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 更进一步，他们再次感到压力，因为他们觉得如果不谈论那个具体的事情，他们的整个货币化潜力就会付诸东流。
- en: Not how it works, my friend. Zoom out.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 不是它的工作原理，朋友。放大视角。
- en: 'Let’s say my interests are:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我的兴趣是：
- en: Web design
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网页设计
- en: Weight lifting
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 举重
- en: Spirituality
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精神层面
- en: From those, I want to broaden them into the overarching market they reside in.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 从这些推文中，我希望将它们扩展到它们所在的总体市场。
- en: Web design = online business or business in general.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 网页设计 = 在线业务或一般商业。
- en: Weight lifting = bodybuilding or health in general.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 举重 = 健身或一般健康。
- en: Spirituality = self-actualization or improvement.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 精神层面 = 自我实现或提升。
- en: Now that we have 3 broad markets we can move within, we want to break them down
    into topics and sub-topics.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了3个我们可以在其中移动的广泛市场，我们想要将它们分解成主题和子主题。
- en: 'The beauty in this method:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法的美丽之处在于：
- en: If you want to make money with an interest like “biomechnical movement therapy,”
    you can attract people interested in health.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要通过像“生物力学运动疗法”这样的兴趣赚钱，你可以吸引对健康感兴趣的人。
- en: Then, you can slowly raise their awareness around bio movement and educate them
    on why its important.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你可以慢慢提高他们对生物运动的意识，并教育他们为什么它很重要。
- en: '*You are not supposed to* *just* *attract people that know everything about
    your main interest**.* Why would they buy from you?'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '*你不应该只* *吸引那些对你的主要兴趣了如指掌的人**。他们为什么要从你这里购买？'
- en: 'With those 3 interests, grab a notebook and break them down like so:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 用这3个兴趣，拿一个笔记本，像这样分解它们：
- en: <picture fetchpriority="high" decoding="async" class="wp-image-993">![](../Images/5c93faa6e14c2754ae90ae24124e2781.png)</picture>
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-993">![](../Images/5c93faa6e14c2754ae90ae24124e2781.png)</picture>
- en: Your job is to cover this entire domain in 6-12 months with all lengths of content.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 你的任务是覆盖这个整个领域，用6-12个月的所有长度的内容。
- en: That is how your brand perception is formed.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你的品牌认知是如何形成的。
- en: Remember The 3 Pillars Of Social Leverage
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 记住社会杠杆的3个支柱
- en: Before we start creating content, we want to have a balance of the content style
    we write.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始创建内容之前，我们希望平衡我们撰写的风格。
- en: The 3 pillars of social leverage are growth, authenticity, and authority.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 社会杠杆的3个支柱是增长、真实性和权威性。
- en: Your content, on a 1-2 month timescale, should hit each of these.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 你的内容，在1-2个月的时间尺度上，应该触及这些中的每一个。
- en: If you aren’t growing, pivot.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有在成长，就转变方向。
- en: If you aren’t making sales, pivot.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有实现销售，就转变方向。
- en: If you aren’t gaining loyal fans, pivot.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有获得忠实的粉丝，就转变方向。
- en: Iterate as you get more *real-world* feedback. You have to post, even if it
    sucks.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你获得更多*现实世界*的反馈，进行迭代。即使内容很糟糕，你也必须发布。
- en: How To Write 3 Authoritative Content Pieces
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何撰写3篇权威内容作品
- en: We are going to be writing tweets for this.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将为这些内容撰写推文。
- en: Why? Because tweets are the perfect length and structure for high-performing
    posts on any platform.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？因为推文是任何平台上高绩效帖子的完美长度和结构。
- en: My LinkedIn posts, Instagram posts and reels, TikToks, and the rest are all
    based off of my tweets.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 我的LinkedIn帖子、Instagram帖子、Reels、TikToks以及其他所有内容都是基于我的推文。
- en: We are going to start by establishing authority in your main interest, the one
    that makes you money.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将首先在你赚钱的主要兴趣上建立权威，也就是那个让你赚钱的兴趣。
- en: We will use “marketing” as an example.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将以“营销”为例。
- en: 'With any of the examples below, you can:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下任何例子中，你都可以：
- en: Turn them into threads or newsletters for more authority
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将它们变成论坛或时事通讯以增加权威
- en: Repurpose any point of the list into its own post
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将列表中的任何一点重新制作成单独的帖子
- en: Copy and paste them to other platforms
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将它们复制粘贴到其他平台
- en: Use them as scripts for Shorts, Reels, or TikToks
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将它们用作短视频、 reels 或 TikToks 的脚本
- en: Let’s dig in.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨。
- en: Actionable Principles
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可操作的原则
- en: Simple, write a list that goes over actionable steps a beginner can take.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 简单，列出初学者可以采取的可操作步骤。
- en: This helps you build authority in one interest. And, even advanced people will
    follow you, because they understand the importance of the fundamental principles.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这有助于你在某个领域建立权威。即使是对高级的人来说，他们也会跟随你，因为他们理解基本原理的重要性。
- en: For all of these, please keep in mind that you should follow a hook > body >
    conclusion structure.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 对于所有这些，请记住，你应该遵循钩子 > 正文 > 结论的结构。
- en: 'Your content sucks because you don’t:'
  id: totrans-87
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你的内容很糟糕，因为你没有：
- en: ''
  id: totrans-88
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Hook in the reader
  id: totrans-89
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 吸引读者的兴趣
- en: ''
  id: totrans-90
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Agitate their problem
  id: totrans-91
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 刺激他们的问题
- en: ''
  id: totrans-92
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Relate to their problem
  id: totrans-93
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 与他们的问题相关
- en: ''
  id: totrans-94
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Give them a valuable solution
  id: totrans-95
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 给他们一个有价值的解决方案
- en: ''
  id: totrans-96
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Human psychology will always beat what you think will work.
  id: totrans-97
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 人类心理学总会战胜你认为会起作用的东西。
- en: ''
  id: totrans-98
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Clear, not clever.
  id: totrans-99
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 清晰，而非花哨。
- en: I’m writing these on the spot, so these won’t be perfect, but do this along
    with me.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在现场写这些，所以它们不会完美，但请和我一起做。
- en: Pick one of your main interests, craft a hook, give actionable value, and wrap
    it up nicely.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 选择你主要感兴趣的一个领域，制作一个吸引人的钩子，提供可操作的价值，并优雅地总结。
- en: Practice makes perfect.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 练习使完美。
- en: Importance Of A Topic
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 话题的重要性
- en: Most people don’t care about what you are writing about because they don’t understand
    its importance.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人不在乎你写什么，因为他们不理解其重要性。
- en: So, instead of packing up your bags and blaming the system…
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，不要收拾行李并责怪系统...
- en: Teach them why it’s important.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 教他们为什么它很重要。
- en: '*This is how you make your interests interesting to other people.*'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '*这就是你让你的兴趣对其他人来说有趣的方法。*'
- en: Make them aware of how it can impact their life.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 让他们意识到它如何影响他们的生活。
- en: Marketing is the greatest skill you can learn.
  id: totrans-109
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 营销是你能学到的最伟大的技能。
- en: ''
  id: totrans-110
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Why?
  id: totrans-111
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 为什么？
- en: ''
  id: totrans-112
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – It pairs with any other skill
  id: totrans-113
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 它与任何其他技能相匹配
- en: ''
  id: totrans-114
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – It teaches you human psychology
  id: totrans-115
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 它教你人类心理学
- en: ''
  id: totrans-116
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – It helps you monetize a niche interest
  id: totrans-117
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 它帮助你将一个利基兴趣货币化
- en: ''
  id: totrans-118
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Only a fool expects to make an income without learning the skill that turns
    scrollers into customers.
  id: totrans-119
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 只有傻瓜才会期望在不学习将滚动浏览者变成顾客的技能的情况下赚钱。
- en: 'Here’s a great example I swiped from Taylin Simmonds on Twitter:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个很好的例子，我从Twitter上的Taylin Simmonds那里借鉴过来的：
- en: <picture decoding="async" class="wp-image-994">![](../Images/96a3cec66f52575026b9562561decd70.png)</picture>
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-994">![](../Images/96a3cec66f52575026b9562561decd70.png)</picture>
- en: Try it out.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试一下。
- en: Why is your main topic important?
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 你的主要话题为什么重要？
- en: How has it impacted your life?
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 它是如何影响你的生活的？
- en: Why should other people care?
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么其他人应该关心？
- en: Self-reflect and write a post on it.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 自我反思，并就此写一篇帖子。
- en: Calling Out Common Mistakes Or Problems
  id: totrans-127
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 指出常见错误或问题
- en: A great way to establish authority in your topic is to call out bad advice,
    common mistakes, or problems.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的话题上建立权威的一个好方法是指出不良建议、常见错误或问题。
- en: This shows that you have experience and that you want to help your readers.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 这表明你有经验，并且你想要帮助你的读者。
- en: Stop writing hyper-specific content.
  id: totrans-130
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 停止写过于具体的内容。
- en: ''
  id: totrans-131
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As a beginner, you should be focused on growth.
  id: totrans-132
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 作为初学者，你应该专注于增长。
- en: ''
  id: totrans-133
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Make your writing relatable
  id: totrans-134
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 使你的写作更具亲和力
- en: ''
  id: totrans-135
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Focus on a common problem
  id: totrans-136
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 关注一个共同的问题
- en: ''
  id: totrans-137
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Talk about the topic from a high level
  id: totrans-138
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 从高层次讨论话题
- en: ''
  id: totrans-139
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Don’t expect to grow if only a few people would share your content.
  id: totrans-140
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果只有少数人愿意分享你的内容，不要期望增长。
- en: This leads into my next advice.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 这引出了我的下一个建议。
- en: How To Get The Most Out Of Your Writing
  id: totrans-142
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何最大限度地发挥你的写作潜力
- en: Beginner creators struggle with seeing the big picture of content creation.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 初创创作者在看到内容创作的整体图景上会有所困难。
- en: You aren’t aiming for an immediate sale with every post.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 你并不是每发一篇帖子都旨在立即销售。
- en: Your posts are not sales pages (but knowing how to write sales pages can help
    with your posts).
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 你的帖子不是销售页面（但了解如何写销售页面可以帮助你的帖子）。
- en: When you look at your writing, it should be obvious whether or not it would
    be shared by the average person scrolling on social media.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 当你审视你的写作时，它应该很明显，是否会被社交媒体上滚动浏览的普通人分享。
- en: If it’s not, and you don’t have a growth strategy in your niche, how do you
    expect to grow?
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 如果不是这样，你在这个利基领域没有增长策略，你如何期望增长？
- en: Shares are the engine for organic brand growth.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 分享是自然品牌增长的引擎。
- en: Zoom out and realize that your content, over time, will introduce people to
    what you have to offer.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 放大视野，意识到随着时间的推移，你的内容将向人们介绍你所能提供的东西。
- en: When the time comes, and if you have the skill, they will buy from you.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 当时机到来，如果你有这个技能，他们会从你这里购买。
- en: Broaden Your Content
  id: totrans-151
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 扩展你的内容
- en: From the tweets I wrote above, are they authoritative?
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 从我上面写的推文中，它们是否具有权威性？
- en: Yes.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 是的。
- en: Will they attract a potential customer (assuming I have more value they can
    find outside of my content)?
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 它们会吸引潜在客户（假设我在我的内容之外还有更多价值可以找到）吗？
- en: Yes.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 是的。
- en: Are they so specific that they won’t get shared?
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 它们是否如此具体以至于不会被人分享？
- en: No.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 不。
- en: This is the balance you have to strike on top-of-funnel social media.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你在漏斗顶部社交媒体上必须达到的平衡。
- en: Then, when you bring them to your newsletter, lead magnet, and product sales
    pages – that’s where you get as specific as necessary.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，当你将他们带到你的通讯、吸引物和产品销售页面时——那就是你需要尽可能具体的地方。
- en: If your content seems like it wouldn’t be shared by a beginner, zoom out one
    layer and rewrite it.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的内容看起来像初学者不会分享，就缩小一层范围并重新写。
- en: Study The Best Content Structures
  id: totrans-161
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 研究最佳内容结构
- en: Before we start writing content other than lists, I would recommend you study
    what good content looks like.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始写除了列表之外的内容之前，我建议你研究一下好的内容是什么样的。
- en: I personally use [TweetHunter](http://tweethunter.io/?via=thedankoe) (a software)
    and Twemex (a chrome plugin) to quickly see my favorite accounts’ top content.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 我个人使用[TweetHunter](http://tweethunter.io/?via=thedankoe)（一款软件）和Twemex（一款Chrome插件）来快速查看我喜欢的账号的顶级内容。
- en: 'You can also use Twitter’s advanced search to do this by typing in:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以通过输入以下内容使用Twitter的高级搜索来完成此操作：
- en: '*from:thedankoe min_faves:1000*'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: '*from:thedankoe min_faves:1000*'
- en: To your Twitter search bar.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的Twitter搜索栏。
- en: Just replace my username with someone else’s and change the minimum likes to
    anything you’d like.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 只需将我的用户名换成别人的，并将最小点赞数改为你想要的任何数字。
- en: Immerse yourself in that content and use it as training wheels for your own.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 沉浸在那个内容中，并把它作为你自己的训练轮。
- en: What topics do you use to practice with this?
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 你使用哪些主题来练习？
- en: Repurpose Your List Style Content
  id: totrans-170
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 重新利用你的列表式内容
- en: The lists you wrote above have multiple bullet points that can be turned into
    it’s own content.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 你上面写的列表有多个要点，可以将其转换成独立的内容。
- en: These lists can also be turned into the outline of a thread, carousel, or newsletter.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 这些列表也可以变成一个帖子、轮播图或通讯的提纲。
- en: (I would highly recommend doing this to establish authority even more).
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: （我强烈推荐这样做，以建立更多的权威性）。
- en: For now, let’s focus on writing another short post.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们专注于写另一篇短文。
- en: From the first tweet we wrote above, the first bullet point is “hook in your
    reader.”
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 从我们上面写的第一条推文开始，第一个要点是“吸引读者的注意力。”
- en: 'And if I take one of my high-performing tweet structures like this one with
    9,000 likes:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我拿我这条有9,000个赞的高绩效推文结构：
- en: <picture decoding="async" class="wp-image-992">![](../Images/0c9ece1f514bb38568a050e3a1c39860.png)</picture>
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-992">![](../Images/0c9ece1f514bb38568a050e3a1c39860.png)</picture>
- en: 'Then I can write a new tweet:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我可以写一条新的推文：
- en: The greatest digital skill is the ability to capture, hold, and deliver value
    on attention.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 最大的数字技能是捕捉、保持和传递注意力的价值。
- en: That could be better, but I know that one will do well.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能更好，但我知道那一个会做得很好。
- en: You can see how simple all of this content writing stuff is if you follow these
    exact steps with all of your interests.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你遵循这些确切步骤，并使用你的所有兴趣，你会发现所有这些内容写作的东西都很简单。
- en: 'To recap:'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 总结：
- en: You can, and should, incorporate your interests to make your brand authentic
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以，也应该，将你的兴趣融入其中，使你的品牌更真实。
- en: Create a topic tree that you can master in 6-12 months through writing
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个你可以通过写作在6-12个月内掌握的主题树。
- en: Write multiple list-style content pieces to establish authority in your main
    interest
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写多个列表式内容，以在你的主要兴趣领域建立权威
- en: Broaden your writing if you don’t think it will be shared
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你认为你的内容不会被分享，就扩展你的写作。
- en: Study the best content structures, use them as training wheels, and branch off
    of what you’ve already written
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究最佳内容结构，将它们作为训练轮，并从你已经写过的内容中扩展
- en: This is all you need to get started with content creation.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你开始内容创作所需的一切。
- en: In the next letter, we will discuss how you can get that content shared without
    spending a penny.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一封信中，我们将讨论如何在不花一分钱的情况下分享这些内容。
- en: Hope you enjoyed this one, my friends.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 希望你们喜欢这篇，我的朋友们。
- en: Talk soon.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 我们很快就会联系。
- en: – DK
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: – DK
- en: '**How I Can Help You When You Are Ready**'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: '**当我准备好时我能如何帮助你**'
- en: Solopreneur Sprints starts on February 7th. We will create your niche of one,
    write 20+ content pieces together, and craft a growth strategy so you can eventually
    do this full time.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: Solopreneur Sprints活动将于2月7日开始。我们将共同创建你的细分市场，撰写20多篇内容，并制定增长策略，以便你最终可以全职从事这项工作。
- en: '[Enroll here for $150.](https://sprints.digitaleconomics.school)'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: '[在此处报名，费用为150美元。](https://sprints.digitaleconomics.school)'
- en: 2 Hour Writer teaches you high impact creative writing in a practical setting.
    I help you build out your content ecosystem and stand out from the sea of other
    creators.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 2小时作家课程在实用环境中教你高影响力的创意写作。我帮助你构建你的内容生态系统，并在众多创作者中脱颖而出。
- en: '[Enroll in 2HW here.](https://2hourwriter.com)'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: '[在此处报名2小时作家课程。](https://2hourwriter.com)'
- en: Modern Mastery is a private community for all things marketing, sales, personal
    development, and performance. Get instant access to a strategy library, personalized
    help in the Discord, and more.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: Modern Mastery是一个涵盖所有营销、销售、个人发展和绩效的私人社区。立即获得策略库的访问权限，在Discord中获得个性化帮助，以及更多。
- en: '[Readers can join for $5.](https://modernmastery.co/letter)'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: '[读者可以花5美元加入。](https://modernmastery.co/letter)'
