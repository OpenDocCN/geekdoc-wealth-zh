- en: If You’re Young, Start This New Type Of Business
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如果你年轻，就尝试这种新型的商业
- en: 原文：[https://thedankoe.com/letters/if-youre-young-start-this-new-type-of-business/](https://thedankoe.com/letters/if-youre-young-start-this-new-type-of-business/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/if-youre-young-start-this-new-type-of-business/](https://thedankoe.com/letters/if-youre-young-start-this-new-type-of-business/)
- en: The best business model isn’t a business model.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的商业模式并不是一个商业模式。
- en: It’s a way of life.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种生活方式。
- en: But most beginners don’t care about that, or even think about it.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 但大多数初学者并不关心这些，甚至没有想过。
- en: They want to learn the “best” skills.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 他们想要学习“最好”的技能。
- en: They want to make more money to leave their job.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 他们想要赚更多的钱来离开他们的工作。
- en: They want to have full control over how they spend their time.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 他们想要完全控制他们如何度过自己的时间。
- en: They silently want to prove themselves to their friends and family.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 他们默默地想要向他们的朋友和家人证明自己。
- en: Life’s work?
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 人生事业？
- en: Purpose?
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 目标？
- en: Enjoyment?
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 快乐？
- en: Nah… that stuff comes later.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 哎呀……那些东西以后再说吧。
- en: And that’s fine. That’s actually how it’s supposed to happen.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这是可以的。实际上，事情就是这样发生的。
- en: The problem then is *beginners blindness*.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 那么问题是**新手盲点**。
- en: Most people who start a business don’t know how to start a business, obviously.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，大多数开始创业的人不知道如何创业。
- en: So they start searching blindly for *businesses to start* rather than deeply
    considering *how they want to live and engineering a path to get there.*
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，他们开始盲目地寻找可以开始的“业务”，而不是深入考虑他们想要如何生活，并设计一条通往那里的路径。
- en: They start their journey with the same mind that was useful for doing well in
    school and getting a job, so they start looking for a new job to perform while
    learning like they were in school.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 他们以在学校表现良好和找到工作的同样心态开始他们的旅程，所以他们开始寻找一份新的工作，就像他们在学校学习一样。
- en: In other words, they try to build a business with the mindset of an employee,
    not an entrepreneur.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，他们试图以雇员的心态而不是创业者的心态来建立业务。
- en: They study how to freelance.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 他们学习如何自由职业。
- en: They study how to start a social media marketing agency.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 他们学习如何开设社交媒体营销机构。
- en: They study how to build an eCommerce store and run paid ads.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 他们学习如何建立一个电子商务商店并运行付费广告。
- en: They build themselves in a new 9-5 and once again feel like they are strapped
    for cash and out of control of their day. But this time, it’s worse. If they lose
    a client or stop working 12 hours a day, their income drops significantly.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 他们在一个新的朝九晚五的工作环境中建立自己，再次感到手头紧张，无法掌控自己的日子。但这一次，情况更糟。如果他们失去一个客户或者停止每天工作12小时，他们的收入会显著下降。
- en: They have no leverage. They feel trapped.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 他们没有优势。他们感到被困住了。
- en: In this letter, I’m not going to give you a static business model that puts
    you in a box.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在这封信中，我不会给你一个静态的商业模式，让你陷入框框。
- en: Instead, I’m going to give you flexible roadmap for pursuing your life’s work.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我将为你提供一个灵活的路线图，以追求你的人生事业。
- en: Business, then, is simply the vessel by which you share what you enjoy doing
    to those who value it enough to pay you.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，商业不过是你分享你所热爱的事情给那些愿意为此付费的人的一种方式。
- en: The New Way To Start A Business
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 新的创业方式
- en: '**The good** – With the internet and social media, business has drastically
    changed for the better. More power to solopreneurs and small teams that will only
    get more powerful beyond the internet and social media.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**优点** – 随着互联网和社交媒体的发展，商业发生了巨大的变化，变得更加美好。为那些在互联网和社交媒体之外也将变得更加强大的独立创业者和小型团队加油。'
- en: '**The bad** – Almost any beginner business information you find is still plagued
    with the old business paradigm.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**缺点** – 几乎你找到的任何初创业信息仍然受到旧商业模式的困扰。'
- en: 'The old way of doing things is to:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 旧的方式是：
- en: Choose a niche
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择一个利基市场
- en: Choose a customer avatar
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择一个客户画像
- en: Choose a skill
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择一项技能
- en: Choose a business model
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择一种商业模式
- en: 95% of the time, people choose the thing that someone else tells them is the
    most profitable.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 95% 的时间，人们选择的是别人告诉他们最有利可图的那个东西。
- en: As a byproduct, they choose a niche they have zero experience with, work with
    people they don’t care about, learn a skill that doesn’t align with their interests,
    and pick a business model that sounds the flashiest or easiest.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 作为副产品，他们选择了一个他们没有任何经验的利基市场，与那些他们不关心的人合作，学习一个与他们兴趣不符的技能，并选择了一个听起来最耀眼或最简单的商业模式。
- en: Now, there’s nothing wrong with wanting to make money. But it’s completely idiotic
    to think that you can’t make money without sacrificing what makes life good.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，想要赚钱并没有什么错。但认为你不能在不牺牲生活中美好的事物的情况下赚钱是完全愚蠢的。
- en: What makes life good?
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 什么让生活变得美好？
- en: '*Investing attention in what you deem important and meaningful.*'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '*投资于你认为重要和有意义的事物*。'
- en: The thing is, “what you deem important and meaningful” evolves as your mind
    develops. So if you pick a business model that always stays the same, you set
    yourself up for a life of misery.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，“你认为重要和有意义的事物”会随着你心智的发展而演变。所以如果你选择一个始终如一的商业模式，你将为自己设定一个痛苦的生活。
- en: In the old way of doing business, where money is placed as the first and *only*
    reason, you invest attention in people, projects, and skills that other people
    persuade you to *believe* are important.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在旧的商业方式中，金钱被视为首要和*唯一*的理由，你将注意力投资在人们、项目和技能上，这些是其他人说服你相信是重要的。
- en: The new way of doing business is to put your *ideal life* as the first reason,
    but not the only reason.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 新的商业方式是将你的*理想生活*作为首要理由，但不是唯一理由。
- en: 'In this new way, you don’t *choose* a niche or skill or model, you:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种方式中，你不需要*选择*一个细分市场、技能或模式，你：
- en: Become the niche
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 成为细分市场
- en: Help your past self
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帮助你过去的自己
- en: Solve your own problems
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解决你自己的问题
- en: Follow the highest leverage path, which involves changing business “models”
    as you progress
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 遵循最高杠杆路径，这涉及到随着你的进步而改变商业“模式”
- en: You don’t need “work life balance” because work and life collapse into one.
    You get paid for being yourself. As it should have been in the first place.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要“工作与生活平衡”，因为工作和生活已经融合为一。你因为做自己而获得报酬。这正是它本应如此的样子。
- en: When you realize that this has always been an option and that you were drawn
    to schools and jobs based on how your mind was conditioned to adopt the values
    based on your past life conditions, you can’t unsee it. So you’re welcome for
    that. Enjoy the ride.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 当你意识到这始终是一个选择，而你之所以被吸引到学校和工作中，是因为你的心智被过去的生活条件所塑造，以适应基于过去生活的价值观，你就无法忽视这一点。所以，欢迎你。享受这个过程。
- en: This path is a process where you develop yourself, share the value you’ve cultivated,
    and sustain your ideal life by packaging up solutions to your own problems and
    distributing them to people who were in a similar position as you.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这条道路是一个过程，你通过发展自己，分享你培养的价值，通过打包解决你自己的问题的方案并将它们分发给与你处于相似位置的人来维持你理想的生活。
- en: With that, this path is only for those who value improving their mind, body,
    skill set, finances, and relationships. This is a way of life, and if your way
    of life is laziness and mediocrity and quick fixes, you won’t make it, and probably
    wouldn’t have made it with any other form of business.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这条道路只为那些重视提升自己的心智、身体、技能组合、财务和人际关系的人。这是一种生活方式，如果你的生活方式是懒惰、平庸和快速修复，你将无法成功，而且可能以任何其他商业形式都无法成功。
- en: The Highest Leverage Path
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最高杠杆路径
- en: 'If you want to turn yourself into the business, or get paid for doing what
    you want, you need a few things:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要将自己变成一个企业，或者为做自己想做的事情而获得报酬，你需要一些东西：
- en: A developmental progression from beginner to advanced
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从初学者到高级的发展过程
- en: A way to attract people to the value you are acquiring
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一种吸引人们到你正在获取的价值的方法
- en: Products or services that evolve as you do
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 随着你成长而演变的商品或服务
- en: With old outdated business models, you choose a model—like eCommerce—that comes
    with a lot of pre-requisites that most beginners can’t deal with.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在过时的商业模式中，你选择一个模式——比如电子商务——它附带了许多大多数初学者无法应对的先决条件。
- en: You need a few thousand bucks to invest in inventory. You need to learn marketing,
    sales, advertising, and more… but you’ve already set a ticking time bomb. Most
    businesses fail because they don’t have the money to keep that business going
    through trial and error. If it fails with the first or second iteration, you’re
    done for.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要几千美元来投资库存。你需要学习营销、销售、广告等等……但你已经设置了一个倒计时炸弹。大多数企业失败是因为它们没有足够的资金通过试错来维持业务。如果它在第一次或第二次迭代中失败，你就完了。
- en: You rarely start earning money immediately. Instead, you start spending immediately
    and hope that you can make it work before you have to give up.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 你很少能立即开始赚钱。相反，你开始立即花钱，并希望在你不得不放弃之前能够让它成功。
- en: In the new way of doing business, it’s the complete opposite.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在新的商业方式中，情况正好相反。
- en: You need zero experience, because the business *is how you gain experience in
    the first place.*
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要任何经验，因为企业*是你最初获得经验的方式*。
- en: You use free or inexpensive technology and software to build an audience and
    create your first product or service.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 你使用免费或价格低廉的技术和软件来建立受众并创建你的第一个产品或服务。
- en: You decrease the chances of failure (by lack of money or experience) to *zero.*
    The only reason you would fail doing this is because you quit early, can’t persist,
    can’t iterate, or refuse to learn… or you just decide that the current life you
    wanted to escape in the first place “isn’t that bad” because your mind starts
    playing tricks on you.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 你将失败的可能性（由于缺乏资金或经验）降低到*零*。你之所以会失败，仅仅是因为你早早放弃，无法坚持，无法迭代，或者拒绝学习……或者你只是决定你最初想要逃离的当前生活“其实并不那么糟糕”，因为你的大脑开始对你玩弄花招。
- en: 'With those limitations (beginner, lack of money, zero experience) that gives
    us a few starting points:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在那些限制（初学者、缺乏资金、无经验）下，我们有一些起点：
- en: 1) Build An Audience
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 建立受众
- en: If you don’t have money for paid ads, sponsorships, or influencer marketing,
    your best bet is to build an audience.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有钱做付费广告、赞助或网红营销，你的最佳选择是建立受众。
- en: Actually, I would argue that every single beginner should build an audience
    anyway.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，我会争辩说每个初学者都应该建立受众。
- en: Why?
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: 'Because it teaches you the skills you need (for free, through experience) to
    do well in any form of business: marketing, persuasion, media, writing, design,
    psychology, human nature.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 因为它教会了你任何形式业务所需的技能（免费，通过经验）来做得很好：营销、说服、媒体、写作、设计、心理学、人性。
- en: Even further, that’s the modern path to talking about and teaching your interests.
    Not only do you learn the necessary parts of skills like marketing, but you learn
    about your interests *faster* because of the Feynman Technique. With each piece
    of content you post, you expose gaps in your knowledge that allows you to learn
    that topic faster.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 更进一步，这是现代谈论和教授你兴趣的途径。不仅你通过费曼技巧更快地学习营销等技能的必要部分，而且你因为费曼技巧而更快地了解你的兴趣。
- en: Building an audience is like combining personal growth and your interests in
    a way that allows you to get paid to do that for the rest of your life.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 建立受众就像将个人成长和你的兴趣结合起来，这样你就可以余生都为此获得报酬。
- en: Yes, you could post to Reddit forums or work on your website SEO to get customers,
    but we are taking the *highest leverage path.*
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，你可以发布到Reddit论坛或优化你的网站SEO来获取客户，但我们正在采取*最高杠杆*的途径。
- en: When you build an audience, you *keep* that audience, especially if you have
    an email list people can join.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 当你建立受众时，你会*保留*那个受众，特别是如果你有一个人们可以加入的电子邮件列表。
- en: With paid ads, you are paying a social platform to display your content to an
    audience that isn’t yours, and those people have no idea who you are.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 使用付费广告，你是在付费给一个社交平台，让它向一个不属于你的受众展示你的内容，而这些人根本不知道你是谁。
- en: With building an audience, you don’t need to worry about marketing or sales
    as much because those skills are about *trust.* If you post content to a growing
    audience every day, your trust automatically builds over time.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 通过建立受众，你不必过多担心营销或销售，因为那些技能是关于*信任*的。如果你每天向一个不断增长的受众发布内容，你的信任就会随着时间的推移自动建立。
- en: If you need a starting point for all of this with templates, consider grabbing
    the [One-Person Business Launchpad](https://stan.store/thedankoe/p/the-oneperson-business-launchpad--your-first-5k).
    No gimmicks, just the basics for those who want it all in once place.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要所有这些的起点，并且有模板，可以考虑获取[单人商业启动器](https://stan.store/thedankoe/p/the-oneperson-business-launchpad--your-first-5k)。没有花哨的东西，只是那些希望一次拥有所有内容的人的基本知识。
- en: 2) Evolving Products & Services
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 产品和服务的发展
- en: When your audience is small, you need to be mindful of that.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的受众很小的时候，你需要对此保持警觉。
- en: You need to do some math.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要做一些数学计算。
- en: If you try to sell a $19 physical book or planner, you will need a *lot* of
    customers in order to replace your current income.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你尝试销售一本19美元的实体书或计划表，你需要很多客户才能替代你目前的收入。
- en: The same goes for building an app or software as an independent programmer and
    slapping a $10-$20/month price tag on it.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 这同样适用于作为一个独立程序员构建应用程序或软件，并给它贴上10-20美元/月的标价。
- en: That doesn’t mean this path doesn’t work. I actually recommend it for people
    who are fast learners.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不意味着这条道路不起作用。我实际上推荐它给那些学习速度快的人。
- en: With the right social media strategy, your posts can do very well from the start,
    so you can pull off a low-ticket product.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 通过正确的社交媒体策略，你的帖子可以从一开始就做得很好，这样你就可以推出低票价产品。
- en: But for most people, that’s not going to happen.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 但对大多数人来说，这种情况不太可能发生。
- en: It’s better to start with a freelance, coaching, or consulting service.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 最好是先从自由职业、辅导或咨询服务开始。
- en: Many people are averse to that because there are so many freelancers and coaches
    (in reality, there aren’t, you just aren’t in the game yet so you misperceive
    it) so they go for a more advanced business model and fail anyway.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人对此感到厌恶，因为现在有那么多自由职业者和指导者（实际上并没有，你只是还没有进入这个游戏，所以你误判了）所以他们选择一个更高级的商业模式，但最终还是失败了。
- en: With those services, you only need 3-5 clients for $1000 to $3000 per month
    (depending on your offer) to make a decent income.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些服务，你只需要3-5个客户，每月收入1000到3000美元（取决于你的报价）就能获得不错的收入。
- en: 'There are various ways to make this work, but when building an audience:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 有很多种让这行工作起来的方法，但在建立受众群体时：
- en: You can message people who engage with your content about your service (this
    is better than cold outreach because people already know who you are).
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以给那些与你内容互动的人发信息，介绍你的服务（这比冷拓展要好，因为人们已经知道你是谁）。
- en: You can link a questionnaire in your bio and high performing content for people
    to fill out to work with you, then message them to follow up and close the deal.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以在你的简介和表现优异的内容中链接一个问卷，供人们填写以与你合作，然后给他们发信息跟进并促成交易。
- en: 'Remember our two starter options:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 记住我们的两个入门选项：
- en: A digital product like a template, guide, or ebook
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一种像模板、指南或电子书这样的数字产品
- en: A freelance, coaching, or consulting service
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自由职业、指导或咨询服务
- en: For the first, you will need to be very good at generating traffic with content.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 对于第一个选项，你需要非常擅长使用内容来生成流量。
- en: For the second, you will need sales and outreach knowledge to close those deals.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 对于第二个选项，你需要销售和拓展知识来促成那些交易。
- en: Both are viable first options, but understand that this is a learning process.
    You learn *and* try to make an income, and at bare minimum you are building an
    audience on the side that slowly makes it easier and easier.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 这两种都是可行的第一选择，但你要明白这是一个学习过程。你学习*并且*尝试赚钱，并且至少你在旁边建立了一个受众群体，这会逐渐使整个过程更容易。
- en: Then, when you make one of those work, you can *evolve* that product or service
    into something with higher leverage.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，当你成功推出其中一项工作时，你可以将那个产品或服务*进化*成具有更高影响力的东西。
- en: A freelance service can evolve into a digital product that teaches your skill
    or your system.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 自由职业服务可以进化成一种数字产品，教授你的技能或你的系统。
- en: A digital product can evolve into a software or physical product (now you have
    an audience and knowledge to make the eCommerce business work on the first go,
    rather than trying to make it work the other way around).
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 数字产品可以进化成软件或实物产品（现在你有了受众和知识，可以一开始就使电子商务业务成功，而不是试图反过来使其成功）。
- en: Do you see why this is powerful? You can still build any type of business you
    want with this model, you just *start* in a way that allows you to do that as
    a beginner.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 你看懂为什么这很强大了吗？你仍然可以用这个模式建立任何你想要的业务，你只是*开始*的方式允许你作为一个初学者那样做。
- en: With each evolution, you decrease the amount of time you spend fulfilling the
    work, increase the amount of money you can make, and have an audience large enough
    to fuel that entire process.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 随着每一次的进化，你花费在完成工作上的时间减少，你能够赚取的金额增加，并且拥有足够大的受众群体来推动整个流程。
- en: Client work—like freelancing or coaching—means you only have so much time, and
    can only take on so many clients, meaning your income is capped at some point
    unless you hire a team.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 客户工作——如自由职业或指导——意味着你只有这么多时间，只能接受这么多客户，这意味着你的收入会在某个点上达到上限，除非你雇佣一个团队。
- en: Products in general can sell while you sleep, and if you have an audience to
    fuel them, you can do quite well for yourself and gain more control over your
    day.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 通常情况下，产品可以在你睡觉时销售，如果你有一个受众群体来推动它们，你可以为自己做得相当不错，并且能够更好地掌控你的日常生活。
- en: By that point, you should have more than enough money to enjoy your life or
    take it further and invest in starting a bigger company, like a software startup
    or more intensive business.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 到那时，你应该有足够的钱来享受生活，或者更进一步，投资于创办一家更大的公司，比如软件初创公司或更密集型的企业。
- en: 3) T-Shaped Content
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) T型内容
- en: If you cringe when you hear the word “content” or “content creator,” don’t worry,
    I do too.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你听到“内容”或“内容创作者”这个词感到不舒服，别担心，我也一样。
- en: 'What I want you to realize is that there are three main ways to attract customers
    to your work: media, word of mouth, and direct outreach.'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 我想让你意识到，吸引客户到你工作上的主要有三种方式：媒体、口碑和直接拓展。
- en: Direct outreach is useful when starting out with something like a service, but
    it’s low leverage and slow.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 当你开始提供某种服务时，直接拓展是有用的，但它的影响力较低且进展缓慢。
- en: You also probably won’t get word of mouth without media first, so we are obviously
    focused on that.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可能在没有媒体的情况下无法获得口碑，所以我们显然专注于这一点。
- en: Paid ads are media. SEO is media. Billboards and radio are (outdated) media.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 广告是媒体。搜索引擎优化是媒体。广告牌和广播是（过时了）媒体。
- en: Anything you *produce* as marketing material to attract customers is media.
    But of course, we’re building an audience.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 任何你*生产*作为吸引客户的营销材料的东西都是媒体。但当然，我们是在建立受众。
- en: So, if it helps, think of “content” as synonymous with media, because it is.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，如果这对你有帮助，就把“内容”视为与媒体同义，因为它是。
- en: 'You don’t need to identify as a content creator to execute on the singular
    part of your business that will determine most of it’s success: creating content.'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要将自己标识为内容创作者来执行你业务中决定其大部分成功的那一部分：创建内容。
- en: But how do you start writing content as a beginner?
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 但作为一个初学者，你如何开始写作内容呢？
- en: 80% based on the topic you plan to create a product or service around.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 80%基于你计划围绕其创建产品或服务的主题。
- en: 20% based on other interests or opinions to experiment with what your audience
    likes.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 20%基于其他兴趣或观点来实验你受众喜欢的内容。
- en: “T-shaped.” A term Valve uses for employees who are good at many things and
    great at one thing. Deep in your main expertise, complimented with your other
    interests.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: “T形。”这是Valve公司用来形容那些在很多事情上都很擅长，在一件事情上非常出色员工的术语。深入你的主要专业领域，辅以你的其他兴趣。
- en: But remember, on social media you are being spread to random people who have
    no idea who you are and are probably a beginner in the topic you are talking about
    (yes, even if you’re selling a freelance service, the person you are doing the
    work for is a beginner, otherwise they wouldn’t hire you).
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 但记住，在社交媒体上，你被传播给那些根本不知道你是谁的人，他们可能是在你谈论的话题中的初学者（是的，即使你是在销售自由职业服务，你为之工作的那个人也是初学者，否则他们不会雇佣你）。
- en: So, avoid getting too technical or clever.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，避免过于技术或聪明。
- en: Focus on educating and persuading people on why your main topic is important.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 专注于教育和说服人们了解你的主要话题为什么重要。
- en: As your audience grows and your products evolve, so does your content.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你的受众增长和你的产品发展，你的内容也会随之发展。
- en: There is a lot of nuance to this, so I would either recommend grabbing [2 Hour
    Writer](https://2hourwriter.com) or waiting for another letter where I can dive
    deeper.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 这其中有很多细微差别，所以我建议你获取[2小时作家](https://2hourwriter.com)或等待另一封信，我在那里可以更深入地探讨。
- en: But How Do I Start?
  id: totrans-123
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 但我如何开始呢？
- en: 'Let’s get one thing straight:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先把一件事搞清楚：
- en: Nobody can tell you how to build a business.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人能告诉你如何建立一家企业。
- en: They can only tell you how they built theirs.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 他们只能告诉你他们是如何建立自己的。
- en: Nobody can teach you branding, content creation, writing, marketing, product,
    or any of those things. They can only share the processes that worked for them,
    in the situation they were in, with the mind they have.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人能教你品牌、内容创作、写作、营销、产品或任何这些事情。他们只能分享在他们所处的环境中，用他们拥有的思想所取得成功的流程。
- en: The thing is, you aren’t in their situation.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，你并不处于他们的处境。
- en: You don’t have access to their mind.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 你无法接触到他们的思想。
- en: 'This holds true for anything in your life:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 这适用于你生活中的任何事物：
- en: You can study others invaluable processes, but you will never escape the need
    for experimentation, persistence, and iteration to the point where you turn that
    process into your own.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以研究他人的宝贵流程，但你永远无法摆脱实验、坚持和迭代的需求，直到你将这个过程变成你自己的。
- en: So, you can treat these as a starting point, but that’s all they are.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，你可以把它们当作一个起点，但它们只是起点。
- en: These guidelines are for clarity.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 这些指南是为了清晰起见。
- en: They are not law.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 它们不是法律。
- en: Learn the rules, then break them so you don’t become both a clone and a failure.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 学习规则，然后打破它们，这样你就不至于成为一个克隆体和失败者。
- en: 1) Intelligent Imitation
  id: totrans-136
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 智能模仿
- en: You don’t need a book of information to set up your profile, write viral content,
    and make millions selling a product.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要一本书的信息来设置你的个人资料，撰写病毒性内容，并通过销售产品赚取数百万。
- en: You simply need 2 eyes connected to a half functioning brain.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 你只需要两个眼睛连接到一个半功能的大脑。
- en: Observation and experimentation are the best teachers, and you are literally
    drowning in education. You look at social media bios, brands, content, and marketing
    every day, but you view it as a consumer.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 观察和实验是最好的老师，你实际上是在教育中淹没。你每天都会查看社交媒体的个人资料、品牌、内容和营销，但你将其视为一个消费者。
- en: Once you flip to the lens of a creator, everything on your feed becomes inspiration
    that you can steal like an artist.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你切换到创作者的视角，你动态中的每一件事都成为你可以像艺术家一样窃取的灵感。
- en: 'In a nutshell, if you want to learn how to do anything:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，如果你想学习如何做任何事情：
- en: Save 3-5 sources of inspiration (brands, content, products)
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保存3-5个灵感来源（品牌、内容、产品）
- en: Break down the structure and characteristics of each of those things
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析每一件事的结构和特征
- en: Take one little piece of what they do and try it out
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从他们所做的事情中取一小部分来尝试
- en: Then take another, then another, then another
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后继续做下去，再继续，再继续
- en: Supplement with courses, videos, or education as you go (so you understand why
    you are doing what you are doing)
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在学习过程中补充课程、视频或教育内容（这样你就能理解你为什么在做你所做的事情）
- en: 'As an example, if you want to write a newsletter and use mine as inspiration,
    you start by breaking down the structure:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你想写一份通讯稿并使用我的作品作为灵感，你首先从分析结构开始：
- en: Introduction with how I view a topic, expose how most people think about it,
    and dig deep into why that’s a problem
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 介绍部分，阐述我对一个话题的看法，揭露大多数人如何看待它，并深入挖掘为什么那是个问题
- en: A section that illustrates the “old way” and “new way” of doing something
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个展示“旧方法”和“新方法”做某事的章节
- en: A section with a big picture overview of the entire process
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个概述整个过程的整体章节
- en: A final section with actionable steps for beginners
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个为初学者提供可操作步骤的最终章节
- en: You can take that, outline a newsletter on a completely different topic, and
    make your first piece of writing better than 99% of people.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以用这个，为完全不同的话题制定一份通讯稿，并使你的第一篇作品比99%的人都要好。
- en: '**What about building a brand?**'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: '**关于品牌建设呢？**'
- en: Look at your 3-5 sources of inspiration and spot patterns between them.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 观察你的3-5个灵感来源，并找出它们之间的模式。
- en: '**What about writing content?**'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: '**关于写内容呢？**'
- en: Find a validated idea that has great engagement and break it down into what
    makes it do well, then rewrite it.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 找到一个经过验证的想法，它有很好的参与度，然后分析它成功的原因，然后重新编写它。
- en: Learning anything can be as simple (not easy) as that.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 学习任何事物都可以像那样简单（虽然不容易）。
- en: Do exactly that as you set up your profile, write your first pieces of content,
    and build your first product.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 当你设置个人资料、撰写第一篇内容、建立第一个产品时，就做这件事。
- en: Study content that does well. Study brands that do well. Study products that
    do well. Take a piece from each every time you write, design, build, or sell and
    you will turn out fine.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 研究做得好的内容。研究做得好的品牌。研究做得好的产品。每次你写作、设计、构建或销售时，都从每个中取一部分，你最终会做得很好。
- en: 2) Learn Direct Response Marketing, Then Forget It
  id: totrans-160
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 学习直接回应营销，然后忘记它
- en: Direct response marketing is the poster child for scammers and sleazy car salesmen.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 直接回应营销是骗子和油腔滑调的汽车销售员的典型代表。
- en: It birthed the era of Clickfunnels, countdown timers, fake scarcity, and everything
    that sets off alarms in peoples heads now even though it was insanely profitable
    during that time.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 它催生了Clickfunnels时代、倒计时计时器、虚假稀缺感，以及现在虽然当时非常有利可图，但现在却会在人们脑海中引发警报的一切。
- en: It’s still around today in TikTok shop, dropshipping, consumer app downloads—mostly
    short form content and sales pages. Some people do it more tastefully than others.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 它今天仍然存在于TikTok商店、跨境电商、消费者应用下载中——主要是短形式内容和销售页面。有些人做得比其他人更有品味。
- en: In short, direct response marketing, or advertising in general, is learning
    how to capture attention, guide attention, and get the reader to take action or
    “convert.”
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，直接回应营销，或者一般意义上的广告，是学习如何吸引注意力、引导注意力，并促使读者采取行动或“转化”。
- en: Many people just call it “copywriting” now and flex it as “the greatest skill
    to learn to make money.” They’re not completely wrong. It’s how Hormozi built
    is fame.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人现在只称之为“文案写作”，并将其视为“赚钱要学的最大技能。”他们并不完全错误。这就是Hormozi建立他名声的方式。
- en: While this skill *can* be sleazy and unethical, it doesn’t have to be.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这项技能*可能*会显得俗气和缺乏道德，但它不必如此。
- en: In my eyes, *it’s the best way to find the principles of psychology, human nature,
    and attention all in one practical place.*
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，*这是在同一个实际地方找到心理学原则、人性、注意力的最佳方式*。
- en: The trap with direct response is focusing on quick cash grabs over long term
    brand building. The magic happens when you merge both, and when you don’t sacrifice
    long term brand for short term cash.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 直接回应营销的陷阱在于过分关注短期现金收入，而忽视了长期品牌建设。当你将两者合并，并且不为了短期现金而牺牲长期品牌时，魔法才会发生。
- en: 'If I were to learn the fundamentals today, I would:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我今天要学习基础知识，我会：
- en: Read Ca$hvertising by Drew Eric Whitman
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 阅读《Cashvertising》一书，作者德鲁·埃里克·惠特曼
- en: Read Influence by Robert Cialdini
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 阅读《影响力》一书，作者罗伯特·西奥迪尼
- en: I haven’t read these, but I’ve heard great things about Traffic Secrets and
    Expert Secrets by Russel Brunson (even though he’s not looking too hot in the
    public eye anymore)
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我没有读过这些，但我听说过Russel Brunson的《流量秘诀》和《专家秘诀》非常好（尽管他在公众眼中现在看起来不太光彩）
- en: Listen to 5-10 YouTube videos and podcasts
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 观看5-10个YouTube视频和播客
- en: Write newsletters, landing pages, and social posts practicing what you learn
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写新闻通讯、着陆页和社交媒体帖子，练习你所学的
- en: Many copywriters don’t agree with me when I say to read those things (they have
    other recommendations) but those are what I read, and they helped a lot. I’m not
    an expert copywriter, but I’ve done quite well for myself.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 当我说要读那些东西时，许多文案工作者不同意我（他们有其他的推荐），但那些是我读过的，它们帮助很大。我不是一个专家文案工作者，但我为自己做得相当不错。
- en: 'I can’t stress this enough:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 我怎么强调都不过分：
- en: Focus on the principles, not the tactics, and you’ll be fine.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 专注于原则，而不是策略，你就会没事。
- en: 3) Establish Who You Are, What You Do, And Why You’re Here
  id: totrans-178
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 确立你是谁，你做什么，以及你为什么在这里
- en: Again, the single biggest mistake people make is thinking that social media
    is some kind of lottery.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，人们犯的最大错误是认为社交媒体是一种彩票。
- en: They don’t understand that social media is a skill that can be learned—like
    anything—so they go in thinking they can just write any old post and pray that
    our lord and savior the algorithm will make them rich and famous overnight.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 他们不明白社交媒体是一种可以学习的技能——就像任何东西一样——所以他们进去时认为他们可以随便写任何帖子，并祈祷我们的救世主算法会让他们一夜之间变得富有和出名。
- en: Stop it.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 停止这样做。
- en: The reality is that when you start, absolutely nobody knows about you or cares
    about you.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 事实是，当你开始的时候，绝对没有人知道你，也不关心你。
- en: The first 6-12 months of your journey should be to prove that you have value
    to offer.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 你的前6-12个月应该用来证明你有价值可以提供。
- en: How do you do that?
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 你是怎么做到的？
- en: '**Free Download** — Create a comprehensive free download that teaches the fundamentals
    of your main topic or interest. Unlike social content that disappears after a
    day, a free download can be linked in your bio and promoted over and over again.
    [You can host your free download, create a link for your bio, and build products
    or services on Stan.](https://join.stan.store/thedankoe)'
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**免费下载** — 创建一个全面免费的下载，教授你主要主题或兴趣的基础知识。与一天后消失的社会内容不同，免费下载可以在你的简介中链接并反复推广。[你可以在Stan上托管你的免费下载，为你的简介创建链接，并建立产品或服务。](https://join.stan.store/thedankoe)'
- en: '**Extend That Into A Product Or Service** — People think that digital products
    make them a sell out when it does the complete opposite. Most creators fail because
    they don’t have a product people can buy that changes their life to the point
    of becoming loyal fans. Your content can only do so much. Link your product in
    your free download and let that bring in your first few dollars.'
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将其扩展为产品或服务** — 人们认为数字产品会让他们成为卖国者，而这恰恰相反。大多数创作者失败是因为他们没有产品可以销售，无法改变人们的生活，使他们成为忠实的粉丝。你的内容只能做到如此。在免费下载中链接你的产品，让它带来你的第一笔收入。'
- en: '**Write Cornerstone Content** — 80% of your content should be about your story,
    the basics of your main topic, actionable and authoritative tips, what you do
    during your day, and why you feel like all of those are important.'
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**撰写基石内容** — 你80%的内容应该关于你的故事，你主要主题的基础知识，可操作的和权威的建议，你一天中做的事情，以及为什么你觉得这些都很重要。'
- en: '**Inject Yourself Into A “Tribe”** — When I want to join a new “space” or niche
    on social media, I make a list of 5-10 people and start making myself known to
    them. I comment on their posts, join their communities, share their content, and
    DM them to start conversations. Over time, that community gets to know me and
    see my face more. *This is arguably the most important step.*'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将自己融入一个“部落”** — 当我想加入社交媒体上的一个新“空间”或细分市场时，我会列出5-10个人，并开始让他们了解我。我在他们的帖子下评论，加入他们的社区，分享他们的内容，并通过私信与他们开始对话。随着时间的推移，那个社区会了解我，看到我的脸更多。*这可能是最重要的一步*。'
- en: '**Write Good Comments** — Excuse my language but holy shit do people not understand
    what this means no matter how much it’s repeated in any piece of social media
    advice you get. Opening the comment sections of any post is a complete trash heap.
    It’s the simplest thing in the world to stand out. “Great insight” is not a good
    comment and won’t get people to care about you. AI generated responses are obvious
    and get you blocked. Just start your comment on someones post with “I remember
    when…” and talk about a time in your life where the topic of their post was relevant
    to your life. This gets way more people to become curious in you.'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**写好评论** — 请原谅我的措辞，但天哪，无论你在任何社交媒体建议中看到多少次，人们似乎都不理解这到底是什么意思。打开任何帖子的评论区就像一个垃圾堆。在世界上，突出自己是最简单的事情。“深刻的见解”并不是一个好的评论，也不会让人们关心你。AI生成的回复很明显，会让你被屏蔽。只需从某人的帖子开始评论时说“我记得当时……”，然后谈论一个你生活中与他们的帖子主题相关的时间。这会让更多的人对你产生好奇心。'
- en: Yes. This takes work. This is a business. It’s not quick. It takes time. All
    of those things should be obvious. You clearly have to establish a baseline level
    of information people can sink their teeth into before they trust you. A few social
    posts isn’t going to cut it.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 是的。这需要付出努力。这是一项事业。这不是一蹴而就的。需要时间。所有这些都应该很明显。你显然需要建立一个信息基础，让人们能够咬住，这样他们才会信任你。几条社交媒体帖子是远远不够的。
- en: That’s it for this letter.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 这封信就到这里了。
- en: I’ll expand on some of these in future ones.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 我会在未来的信中详细阐述一些内容。
- en: For now, the best place to learn more would be [OPBL](https://stan.store/thedankoe/p/the-oneperson-business-launchpad--your-first-5k)
    or the [2 Hour Writer](https://2hourwriter.com) if you want to invest in your
    education.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 目前来说，想要了解更多信息，最好的地方是[OPBL](https://stan.store/thedankoe/p/the-oneperson-business-launchpad--your-first-5k)或者如果你想投资自己的教育，可以看看[2
    Hour Writer](https://2hourwriter.com)。
