- en: Be A Loser – If You Want To Be Happy
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 成为失败者——如果你想要快乐
- en: 原文：[https://thedankoe.com/letters/be-a-loser-if-you-want-to-be-happy/](https://thedankoe.com/letters/be-a-loser-if-you-want-to-be-happy/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/be-a-loser-if-you-want-to-be-happy/](https://thedankoe.com/letters/be-a-loser-if-you-want-to-be-happy/)
- en: If you want to be happy, be a loser.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要快乐，就做一个失败者。
- en: Let your parents think you’re stupid for not following their path.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 让你的父母认为你很愚蠢，因为你没有遵循他们的道路。
- en: Start the business even when your friends don’t believe in you.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 即使你的朋友不相信你，也要开始创业。
- en: Study the interests that nobody else seems to care about.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 研究那些似乎没有人关心的兴趣。
- en: Because the Western notion of success is wrong. The life you want doesn’t lie
    on the other end of a degree, a high-paying job, a calendar full of social obligations
    and events, vapid relationships to hide your loneliness, buying more things, or
    rotting your brain with entertainment.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 因为西方的成功观念是错误的。你想要的生活并不在于学位、高薪工作、充满社交义务和活动的日历、用来隐藏孤独的肤浅关系、购买更多东西，或者用娱乐来腐蚀你的大脑。
- en: The eastern notion of success is also wrong. Rejecting the manifest world to
    discover the intricacies of your inner world is a valid pursuit. More valid than
    ever, but it often leads to people rejecting an entire dimension of reality, closing
    them off to a deeper happiness that can’t be found through an isolated spirituality.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 东方的成功观念也是错误的。拒绝显性的世界，去发现你内心世界的复杂性是一种有效的追求。比以往任何时候都更有价值，但它往往导致人们拒绝整个现实维度，关闭了通往更深层次幸福的道路，这种幸福无法通过孤立的灵性找到。
- en: Life doesn’t reduce down to only a Western doing, nor an Eastern being, but
    an integration of them both as becoming.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 生活并不只是西方的行为，也不只是东方的存在，而是两者的结合，即成为。
- en: Now, “happiness” is a confusing term.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，“快乐”是一个令人困惑的术语。
- en: Everyone has their own interpretations and definitions for it, and frankly,
    there will never be a time when you can sustain a peak state of happiness. That’s
    not how the mind works. Happiness can only exist when compared to a sad reference
    point. Happiness is a *state* of consciousness. A state is not permanent.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都有自己的解释和定义，坦白说，永远不会有你能够维持幸福巅峰状态的时候。这不是大脑的工作方式。快乐只有在与悲伤的参照点相比较时才能存在。快乐是一种**意识状态**。状态不是永恒的。
- en: For that reason, let’s use the term “success” and define it in a way that finally
    allows you to start acting toward a better life.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们使用“成功”这个术语，并以一种最终允许你开始朝着更好的生活行动的方式来定义它。
- en: '* * *'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Subtle reminder:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 微妙的提醒：
- en: The build a profitable personal brand in 30 days challenge starts in 4 days.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在30天内建立盈利的个人品牌的挑战将在4天后开始。
- en: If you have interests, skills, or expertise you want to share with the world
    to build a modern career, [consider enrolling.](https://stan.store/thedankoe/p/build-a-profitable-personal-brand-in-30-days)
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有兴趣、技能或专业知识想要与世界分享以建立现代职业，[考虑报名参加。](https://stan.store/thedankoe/p/build-a-profitable-personal-brand-in-30-days)
- en: A New Paradigm Of Success
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成功的新范式
- en: Pursuing usefulness will make you a lot happier than pursuing happiness.
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 追求有用性将比你追求快乐让你更快乐。
- en: 'The dictionary definition of success is circular:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 成功的词典定义是循环的：
- en: “A degree or measure of succeeding.”
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: “成功的程度或衡量标准。”
- en: Or, “Favorable or desired outcome.”
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，“有利或期望的结果。”
- en: This makes sense for achieving something on the micro scale, like the tangible
    goal of making $1,000, since you can see that in your bank account, but what happens
    when we apply it to the macro scale?
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这对于在微观尺度上实现某些目标是有意义的，比如实现$1,000这个具体目标，因为你可以看到它在你的银行账户中，但当我们将其应用于宏观尺度时会发生什么呢？
- en: 'When you search for further definitions of success, you get a bunch of blog
    articles giving you 19 definitions for success that involve something along the
    lines of: *challenge yourself, learn, grow, always do your best, and have a place
    you call home.*'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 当你寻找成功的进一步定义时，你会得到一堆博客文章，给你19个关于成功的定义，它们都涉及以下内容：*挑战自己，学习，成长，总是尽力而为，并有一个你可以称之为家的地方。*
- en: Wow. Very wise. Much insight.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 哇。非常明智。很多洞察。
- en: But when we dig deeper into the 4 dimensions of reality, we discover a much
    more useful application that transcends the shallow self-help interpretations
    that have plagued us for the past decade.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 但当我们深入挖掘现实的四个维度时，我们发现了一个更有用的应用，它超越了过去十年困扰我们的浅薄的自助解释。
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2746">![](../Images/ac2257e0b35e8a2614efa046ceb5b221.png)</picture>
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-2746">![](../Images/ac2257e0b35e8a2614efa046ceb5b221.png)</picture>
- en: 'The four dimensions, or perspectives, of reality are:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 现实性的四个维度或视角是：
- en: '**Internal individual (Subjective)** – our emotions, thoughts, and experiences.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内部个体（主观）** – 我们的感受、思想和经历。'
- en: '**External individual (Objective)** – how we measure our brain or body’s behavior,
    which often correlates with our experiences (i.e., dopamine signaling a feeling
    of motivation).'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**外部个体（客观）** – 我们如何衡量我们的大脑或身体的行为，这通常与我们的经验相关（例如，多巴胺信号表示动机感）。'
- en: '**Internal collective (Subjective)** – the shared values, morals, or beliefs
    of a group. Culture is a shared mind, in a sense.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内部集体（主观）** – 一个群体共享的价值、道德或信仰。在某种意义上，文化是一种共享的思维方式。'
- en: '**External collective (Objective)** – economic, political, and social systems
    that keep civilization together.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**外部集体（客观）** – 维持文明存在的经济、政治和社会体系。'
- en: I call these “dimensions” because they each develop as a natural hierarchy of
    increasing complexity and depth – like the exterior quadrants moving from atoms
    to molecules to cells to organisms and the interior moving from egocentric to
    ethnocentric to worldcentric value systems.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我将这些称为“维度”，因为它们各自都按照自然发展的复杂性和深度层次递增 – 就像外部四象限从原子到分子到细胞到生物体，内部则从以自我为中心到以民族为中心再到以世界为中心的价值体系。
- en: <picture decoding="async" class="wp-image-2745">![](../Images/b3fe1ea042f9c594305bd9c9d4b14b47.png)</picture>
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-2745">![](../Images/b3fe1ea042f9c594305bd9c9d4b14b47.png)</picture>
- en: Western thought tends to valuethe objective, scientific, and materialistic which
    influences the subjective – the culture we are raised in which influences our
    outlook on the world. We reduce the world to atoms and chase material success.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 西方思想倾向于重视客观、科学和物质主义，这影响了主观 – 我们成长的文化，它影响我们对世界的看法。我们将世界简化为原子，追求物质成功。
- en: Eastern thought tends to value the opposite. Master the internal world, cultivate
    community, and flow with the external.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 东方思想倾向于重视相反的东西。掌握内部世界，培养社区，顺应外部世界。
- en: The problem with both of these is that they tend to reject the validity of either
    side rather than taking what is useful from all to orient our lives in a meaningful
    way.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个问题在于，它们往往倾向于拒绝任何一方的有效性，而不是从所有有用的方面取其精华，以有意义的方式引导我们的生活。
- en: If you reduce higher states of consciousness (internal individual) to simple
    neurotransmitters that stem from a brain composed of atoms, it is rare that you
    will ever experience or even register those states, let alone reach a higher baseline
    of development that adds a layer of peace and enjoyment to your life.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你将更高层次的意识（内部个体）简化为来自由原子组成的简单神经递质，那么你很少会体验到这些状态，甚至无法识别这些状态，更不用说达到一个更高的基线发展水平，为你的生活增添一层和平与快乐。
- en: 'If you are conditioned to write off money, science, and the pursuit of status,
    the ramifications are twofold: One, you allow people less conscious than you to
    build the world you live in, which by your standards is “evil.” Two, you are unable
    to solve the problems that can’t be solved by letting go and meditating, which
    pile drive you into a further state of stress, dampening your spirituality. Material
    problems often can’t be solved with a purely spiritual solution.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你习惯于将金钱、科学和追求地位视为无关紧要，其后果是双重的：一方面，你允许比你意识水平低的人构建你生活的世界，按照你的标准，这个世界是“邪恶”的；另一方面，你无法解决那些不能通过放下和冥想解决的问题，这些问题会进一步加剧你的压力，削弱你的精神。物质问题通常不能仅用精神解决方案来解决。
- en: If we look to psychology,neuroscience, perennial philosophy, and the current
    state of modern life – covering all dimensions – we find that a potential definition
    for happiness is the combination of progress being made, a contribution to something
    greater than yourself, and the ability to manage emotional turbulence.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们参考心理学、神经科学、永恒哲学和现代生活的当前状态 – 涵盖所有维度 – 我们会发现，幸福的一个潜在定义是进步的取得、对超越自我的贡献以及管理情绪动荡的能力。
- en: The dopamine from achieving goals, the fulfillment from helping others, and
    mastering how you respond to external triggers and internal rumination is a rather
    solid argument for what should be included in your life – at least for what we
    can fit into a sentence that sounds nice.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 完成目标带来的多巴胺，帮助他人带来的满足感，以及掌握如何对外部触发和内部沉思做出反应，这些都是关于生活中应该包含的内容的相当有力的论据 – 至少对于我们可以放入听起来很棒的句子中的内容。
- en: 'This poses both a problem and a question:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这既提出了一个问题，也带来了一种困境：
- en: First, society is structured in such a way that by the time you enter adulthood,
    your mind is conditioned with beliefs of success. This version of success comes
    from getting an education to be trained into a specific role within that society
    until you’ve “done your time” and are able to stop working.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，社会是以一种方式构建的，到你成年时，你的思想已经被成功的信念所条件化。这种成功版本来自于接受教育，被训练在社会中扮演一个特定的角色，直到你“完成了你的时间”并能够停止工作。
- en: Second, how do we pursue a new version of success?
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，我们如何追求一种新的成功版本？
- en: One that prevents us from looking back at our choices with regret?
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 一个能阻止我们带着遗憾回顾我们的选择的习惯？
- en: The Key To Success Is Being A Useful Loser
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成功的关键是成为一个有用的失败者
- en: To transform the world, we must begin with ourselves; and what is important
    in beginning with ourselves is the intention. The intention must be to understand
    ourselves and not to leave it to others to transform themselves or to bring about
    a modified change through revolution, either of the left or of the right.
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 要改变世界，我们必须从自己开始；而在自己开始时重要的是意图。意图必须是理解自己，而不是让别人去改变自己，或者通过革命，无论是左翼还是右翼，来带来一种改变。
- en: ''
  id: totrans-46
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Krishnamurti
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 克里希那穆提
- en: If you want control over your happiness, you must have control over your life.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要控制你的幸福，你必须控制你的生活。
- en: And while full control isn’t always possible, at bare minimum you must accept
    that you can influence how successful you are by auditing the choices you make.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然完全的控制并不总是可能的，但至少你必须接受，你可以通过审查你做出的选择来影响你的成功程度。
- en: The choice of all choices is to reject the path laid out for you at birth.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 所有选择的选择是拒绝你出生时为你铺就的道路。
- en: To act with intention. To generate goals rather than accept them. To see advice,
    opinions, and beliefs that others may project on you as a small piece of the map,
    not the territory, and definitely not the law.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 有意为之。产生目标而不是接受它们。将别人可能投射在你身上的建议、意见和信念视为地图上的一个小部分，而不是领土，更不是法律。
- en: But when you check the box of this life task, others will not be happy because
    they have not done the same. They do not have a semblance of control over their
    mind. They will do anything in their power to make you feel as if you are wrong,
    dumb, and misled. They will perceive you as a loser even when they silently yearn
    to join you.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 但当你完成这个生活任务的框框时，其他人不会高兴，因为他们没有做同样的事情。他们没有控制自己思想的任何迹象。他们会尽其所能让你感觉你错了，愚蠢，被误导。即使他们默默地渴望加入你，他们也会把你视为失败者。
- en: 1) Master Yourself
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 掌控自己
- en: 'Almost nobody practices the one habit that makes all the difference:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎没有人练习那个能带来所有差别的习惯：
- en: Self-reflection.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 自我反思。
- en: I can suggest how to improve yourself, but nothing will ever trump an unclouded
    awareness of past mistakes. Because once you are aware – brutally aware – of the
    mistake, it doesn’t happen again. The more mistakes you gain awareness of, the
    more you move in the direction you were meant to.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以建议如何提高自己，但没有任何东西能超越对过去错误的清晰认识。因为一旦你意识到——残酷地意识到——错误，它就不会再次发生。你意识到的错误越多，你就越朝着你注定要走的方向前进。
- en: To master your *individual, internal* world is the foundation of how you interact
    with the external world at large. If you want money, you must develop yourself
    to be useful enough to a community, system, or organization. If you don’t want
    to be lonely, you must do the same to find worthy friends and partners.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 掌控你的*个人、内部*世界是你如何与外部世界互动的基础。如果你想有钱，你必须发展自己，成为一个对社区、系统或组织有用的足够的人。如果你不想孤独，你必须做同样的事情来找到值得的朋友和伙伴。
- en: How do you pursue self-mastery?
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何追求自我掌控？
- en: You level up.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 你升级了。
- en: “Developmental lines” are like abilities on a skill tree in a video game.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: “发展线”就像视频游戏中技能树上的能力。
- en: <picture decoding="async" class="wp-image-2744">![](../Images/49340b0af6f8d934bbca7fb3a954e164.png)</picture>
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-2744">![](../Images/49340b0af6f8d934bbca7fb3a954e164.png)</picture>
- en: Once you reach a certain level of experience, you can choose to add “points”
    to traits like intellect and stamina. Doing so unlocks more opportunities. It
    makes life easier by replacing shallow problems with deep.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你达到一定水平的经验，你可以选择为像智力、耐力这样的特质添加“点”。这样做会解锁更多的机会。它通过用深层问题替换浅层问题来使生活变得更简单。
- en: 'In developmental psychology, there is a large list of lines that can be developed.
    Here’s what AI spat out for me:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在发展心理学中，有一长串可以发展的线。这是AI为我输出的：
- en: '**Core Lines:**'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**核心线：**'
- en: '**Cognitive Line** – Mental reasoning, logic, and conceptual thinking'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**认知线** – 心理推理、逻辑和概念性思维'
- en: '**Moral Line** – Ethical reasoning and care/justice orientations'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**道德线** – 道德推理和关怀/正义取向'
- en: '**Emotional Line** – Emotional intelligence and maturity'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情感线** – 情绪智力和成熟度'
- en: '**Spiritual Line** – Spiritual intelligence and transpersonal development'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**精神线** – 精神智慧和超个人发展'
- en: '**Interpersonal Line** – Social skills and relationship intelligence'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人际线** – 社交技能和关系智慧'
- en: '**Psychosexual Line** – Sexual and intimate relationship development'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性心理线** – 性和亲密关系发展'
- en: '**Self-Identity Line** – Sense of self and ego development'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自我认同线** – 自我意识和自我发展'
- en: '**Additional Lines:**'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**附加线**：'
- en: '**Aesthetic Line** – Artistic appreciation and creative expression'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**审美线** – 艺术欣赏和创造性表达'
- en: '**Somatic Line** – Bodily awareness and physical intelligence'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**身体线** – 身体意识和身体智慧'
- en: '**Values Line** – What individuals consider important or meaningful'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**价值观线** – 个人认为重要或有意义的事物'
- en: '**Needs Line** – Hierarchy of human needs and motivations'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**需求线** – 人类需求层次和动机'
- en: '**Worldview Line** – How one sees and interprets reality'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**世界观线** – 如何看待和解释现实'
- en: '**Mathematical Line** – Numerical and spatial reasoning'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数学线** – 数量和空间推理'
- en: '**Musical Line** – Musical intelligence and appreciation'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**音乐线** – 音乐智慧和欣赏'
- en: '**Kinesthetic Line** – Body-movement intelligence'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**动觉线** – 身体运动智慧'
- en: There is a crucial point I want to make here, and it may sound crazy.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个我想强调的关键点，它可能听起来很疯狂。
- en: Many people place thinkers and gurus of the past on a pedestal. The thing is,
    many of them max out one line – the spiritual or contemplative line – and neglect
    the rest. There are various cases of teachers we regard as wise who are verifiably
    sexist, racist, and, on a more practical note, are so locked into whatever worldview
    they have that they demonize money as a necessary part of modern life.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人将过去的思想家和大师置于神坛之上。问题是，他们中的许多人只达到了一条线——精神或沉思线——而忽略了其他方面。有许多我们视为智慧的教师，实际上是有偏见、种族歧视的，而且在更实际的意义上，他们如此坚定于他们所持有的世界观，以至于他们将金钱视为现代生活的一个必要部分而进行诋毁。
- en: We don’t live in a single location, within a specific culture, with limited
    access to information anymore. We are connected to the world’s knowledge and a
    melting pot of worldviews.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不再生活在一个单一的位置，在一个特定的文化中，信息有限。我们与世界知识相连，是世界观的大熔炉。
- en: The above-average person in today’s world has the potential to become more developed
    than any other being in history.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今世界，平均水平以上的人有潜力比历史上任何其他生物都更加发达。
- en: Do not take that for granted.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 不要把它视为理所当然。
- en: 2) True Education
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 真正的教育
- en: True education is not memorization, it’s discovery.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 真正的教育不是记忆，而是发现。
- en: True education occurs once you realize that when you are told what to learn,
    you don’t learn a thing, so you take matters into your own hands and become your
    own teacher.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 当你意识到当你被告知要学习什么时，你实际上什么也没学到，所以你亲自掌握事情，成为自己的老师，真正的教育就发生了。
- en: When you study the information given to you within a system, the information
    biases the outcome of that system. You did not create the curriculum. You did
    not fund the curriculum. And no matter how much you attempt to justify it, the
    current education system built on the foundation of industrial values has the
    purpose of creating useful workers. If you do not self-educate with interest as
    your compass, the default option is to narrow your attention on that end goal.
    You miss out on opportunities that are tailor-made for you.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在系统中研究给你提供的信息时，信息会偏袒该系统的结果。你没有创造课程。你没有资助课程。无论你如何试图为之辩护，建立在工业价值观基础上的现行教育体系的目的在于创造有用的工人。如果你不以兴趣为指南进行自我教育，默认选项就是将注意力集中在那个最终目标上。你错过了为你量身定制的机会。
- en: True education is the pursuit of truth.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 真正的教育是追求真理。
- en: Truth is not found in the words uttered from someone else’s mouth.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 真理不在他人之口中说出的言语中。
- en: 'And while there is no *right* way to learn, you can’t go wrong by following
    nature’s compass:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然没有一种**正确**的学习方式，但遵循自然的指南针不会出错：
- en: Pursue a self-generated goal (high in interest and meaning)
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 追求一个自我生成的目标（兴趣和意义高）
- en: Break that down into the core skills necessary to achieve it
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将其分解为实现它所需的核心技能
- en: Break those down into the fundamentals
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将其分解为基本要素
- en: Spend 40+ hours experimenting with *techniques*
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用40小时以上的时间进行**技术**实验
- en: Note which get results for your situation, note which don’t
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 注意哪些对你的情况有效，注意哪些无效
- en: Reflect on your progress often, refine your goal, continue learning
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 经常反思你的进步，完善你的目标，继续学习
- en: Knowledge is the hypothesis, practice is the experiment, results are the data.
    A study of the external grounded through the internal.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 知识是假设，实践是实验，结果是数据。外部的研究通过内部得到巩固。
- en: You must study enough to have conviction in a guess as to what gets results,
    then realize that skill acquisition is actually *technique stacking*.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须学习足够多的知识，以便对猜测的结果有信心，然后意识到技能获取实际上是*技术堆叠*。
- en: You don’t “learn” PhotoShop, AI, or writing.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 你不是“学习”Photoshop、AI或写作。
- en: You have a goal. You find a technique to try, like using a writing framework
    or a specific way to select an object you want to mask. You see if it works for
    the unique context of *your* mind and situation.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 你有一个目标。你找到一个尝试的技术，比如使用写作框架或选择你想要遮罩的对象的特定方式。你看看它是否适合你独特的思维和情境。
- en: You add the technique to your toolbox and continue on until you can create enough
    value to do what you want for a living.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 你将这项技术添加到你的工具箱中，并继续前进，直到你能够创造足够的价值，以实现你的职业目标。
- en: 3) Modern Belonging
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 现代归属
- en: Loneliness has its place.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 孤独有其位置。
- en: Brief periods of isolation and focus are incredible for developing independent
    thought. But that does not change the fact that we are social creatures. I’d like
    to think it’s undisputed at this point that a sense of belonging is a basic need
    that follows food, water, shelter, and a stable environment.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 短暂的隔离和专注对于培养独立思考非常有帮助。但这并不改变我们都是社会性生物的事实。我想现在没有人会否认，归属感是仅次于食物、水、住所和稳定环境的基本需求。
- en: The downside of the information age is that the world is so fragmented.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 信息时代的一个弊端是，世界如此碎片化。
- en: Rare is it that you will find people with similar interests and goals in your
    physical location, because rare has it been that we can discover such interests
    thanks to the information we are exposed to.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 很难找到与你兴趣和目标相似的人在你的物理位置，因为我们很少能通过我们所接触到的信息发现这样的兴趣。
- en: Now, as enticing as it seems to desire a past generation (i.e. “I was born in
    the wrong generation!”) that’s quite literally impossible to make real. You are
    here. You are in this beautiful world of technology and interconnectedness. You
    just need to learn how to use it in a way that doesn’t turn you into a drooling
    bag of bones hooked up to a dopamine IV.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，尽管渴望过去的一代人（即“我生错了时代！”）似乎很有吸引力，但这实际上是不可能实现的。你在这里。你身处这个美丽的技术和互联的世界。你只需要学会如何使用它，而不会让你变成一个被多巴胺IV连接的流口水的骨架。
- en: For all of social media’s downsides, it makes up for it in our ability to curate
    who we receive information from and form relationships with almost anyone who
    has an internet connection.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管社交媒体有其弊端，但它弥补了我们筛选信息来源和与几乎任何有互联网连接的人建立关系的能力。
- en: 'The solution is simple: reduce randomness.'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案很简单：减少随机性。
- en: The For You page built to grab your attention at all costs must be used sparingly
    to discover people who share your interests. Once they are found, connect with
    them. Save their feed somewhere safe. Dive deeper into what they teach.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 为了吸引你的注意力而不惜一切代价构建的“为你推荐”页面应该被谨慎使用，以发现与你兴趣相投的人。一旦找到他们，就与他们建立联系。在安全的地方保存他们的信息流。更深入地了解他们所教授的内容。
- en: As illustrated with self-mastery, interpersonal relationships is a developmental
    line. There is no quick fix to becoming someone who can talk to anyone. I’ll write
    another letter on that at some point.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 就像自我管理所展示的那样，人际关系是一条发展线。成为一个能和任何人交谈的人没有捷径。我会在某个时候再写一封信来讨论这个问题。
- en: Until then, let’s tie this all together.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 在此之前，让我们把这些都联系起来。
- en: 4) Contribute To Society
  id: totrans-115
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 贡献于社会
- en: You are improving yourself (individual interior).
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在提升自己（个体内在）。
- en: You are pursuing truth (individual exterior).
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在追求真理（个体外在）。
- en: You are cultivating community (collective interior).
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在培养社区（集体内在）。
- en: All of which blend in various ways leading to a deep sense of fulfillment.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都以各种方式融合在一起，带来深刻的满足感。
- en: But there is one more piece. The one that everyone struggles with.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 但还有另一个部分。每个人都为之奋斗的部分。
- en: The system. The game. The corporate careers. The talked-about-way-too-much-to-the-point-of-it-becoming-annoying
    fact that “everyone” hates their jobs.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 系统。游戏。企业职业。被过度谈论到令人厌烦的事实，即“每个人”都讨厌他们的工作。
- en: The “what do I do with my life?”
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: “我该做什么？”
- en: 'Let’s make this almost too simple:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们把这个说得几乎太简单：
- en: '*Find the intersection of what you care about and what others care about.*'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '*找到你关心的事情和他人关心的事情的交集。*'
- en: The act of creation. That’s what ties everything together. Becoming valuable.
    Taking your mind and molding it into something worth sharing with the world. Not
    being assigned what to create, but choosing what to create.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 创造的行为。这是将一切联系在一起的东西。变得有价值。用你的思想塑造它，使其值得与世界分享。不是被分配要创造什么，而是选择要创造什么。
- en: But again, if we make the critical mistake of prioritizing one dimension over
    another, we end up a starving artist. We create to please our ego. We justify
    our creative desire with regurgitated ideas about being authentic and creating
    what *you* want. Again, by doing this, you are unconsciously choosing to impose
    more problems on yourself and relinquishing your ability to solve them.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 但再次强调，如果我们犯了一个关键的错误，即优先考虑一个维度而不是另一个维度，我们最终会变成一个挨饿的艺术家。我们为了取悦自己的虚荣心而创作。我们用关于真实和创造你想要的东西的想法来合理化我们的创造欲望。再次，通过这样做，你无意识地选择了给自己增加更多问题，并放弃了解决它们的能力。
- en: A more worthwhile goal is to get paid for being yourself.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 一个更有价值的目的是通过做自己来获得报酬。
- en: 'There are two parts to that:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 这包括两个部分：
- en: Becoming someone who is valuable enough to pay
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 成为足够有价值的人，值得为之付费
- en: Understanding the desires of others to create something they care about enough
    to pay for
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解他人创造他们愿意为之付费的产品的欲望
- en: In most cases, this requires entrepreneurship.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数情况下，这需要创业。
- en: I have no gripes with climbing the ladder until you can find a 1% job that gives
    you the autonomy – a documented psychological need – to create what you want.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 在你找到一个能给你自主权——这是一种记录在案的心理需求——让你创造你想要的工作之前，我对攀登梯子没有任何怨言。
- en: But if you take a critical look at the world, you will see that when I say “the
    opportunity has never been higher,” it is not just a cliche thrown around by people
    who don’t understand your situation.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果你对这个世界进行批判性的审视，你会发现，当我提到“机会从未如此之高”时，这并不仅仅是一些不了解你情况的人随口说出的陈词滥调。
- en: Everyone reading this has an internet connection.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 每个阅读这篇文章的人都有互联网连接。
- en: Therefore, everyone reading this has the ability to put their knowledge, interests,
    and creations out into the world.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，每个阅读这篇文章的人都有能力将他们的知识、兴趣和创作带入世界。
- en: From there, all you need to do is refer back to the process of self-education.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，你所需要做的就是回顾自我教育的过程。
- en: The internet is a giant feedback loop.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网是一个巨大的反馈循环。
- en: If people don’t care about what you have to offer, that is but a problem that
    can be identified, hypothesized, turned into an experiment, and solved.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 如果人们不关心你提供的东西，那只是一个可以识别、假设、变成实验并解决的问题。
- en: Thank you for reading.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您的阅读。
- en: I hope this was insightful.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这能给人以启发。
- en: – Dan
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
- en: One more thing.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 还有一件事。
- en: If you want to try the path of entrepreneurship, the ‘[build a profitable personal
    brand in 30 days](https://stan.store/thedankoe/p/build-a-profitable-personal-brand-in-30-days)‘
    challenge starts in 4 days.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要尝试创业之路，‘[30天内建立盈利的个人品牌](https://stan.store/thedankoe/p/build-a-profitable-personal-brand-in-30-days)’挑战将在4天后开始。
- en: 'As lame as personal branding may sound, it encapsulates everything we’ve discussed
    here: self-mastery to become valuable, self-education to have something worth
    saying, finding like-minded people you won’t find elsewhere, and getting paid
    to be yourself.'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管个人品牌可能听起来很无聊，但它概括了我们在这里讨论的所有内容：自我掌握以变得有价值，自我教育以有话可说，找到你其他地方找不到的志同道合的人，以及通过做自己来获得报酬。
- en: Consider joining if that sounds useful.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这听起来有用，考虑加入。
