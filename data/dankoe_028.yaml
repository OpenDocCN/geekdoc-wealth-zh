- en: The One-Person Business Model (How To Productize Yourself)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 一人企业模式（如何产品化自己）
- en: 原文：[https://thedankoe.com/letters/the-one-person-business-model-how-to-monetize-yourself/](https://thedankoe.com/letters/the-one-person-business-model-how-to-monetize-yourself/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/the-one-person-business-model-how-to-monetize-yourself/](https://thedankoe.com/letters/the-one-person-business-model-how-to-monetize-yourself/)
- en: '***Work less. Earn more. Enjoy life.***'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '***工作更少，赚钱更多，享受生活。***'
- en: That’s my motto.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 那是我的座右铭。
- en: Success is counterintuitive, and living by this motto has led to the most growth
    in my life.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 成功是反直觉的，而遵循这个座右铭使我的生活得到了最大的成长。
- en: Working less for the sake of rest and recovery leads to higher-quality work.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 为了休息和恢复而减少工作，反而会导致更高质量的工作。
- en: Earning more is subjective, but I believe anyone can earn more than enough to
    do whatever they want.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 赚更多是主观的，但我相信任何人都可以赚到足够的钱来做他们想做的事情。
- en: Life enjoyment is usually the byproduct of both. With enough free time, capital,
    and a business network you can do almost anything you want in this life.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 生活享受通常是两者的副产品。有了足够的空闲时间、资本和商业网络，你几乎可以在这个生活中做任何你想做的事情。
- en: But, don’t worry, I also fell into the trap of wanting to live the life of someone
    else.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，别担心，我也陷入了想要过别人生活的陷阱。
- en: Beachfront views.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 海滨景观。
- en: Sand in the toes.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 脚趾间的沙子。
- en: Tanned like Hasslehoff.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 像哈斯勒霍夫一样晒黑。
- en: Coconuts served with a straw for those sweet *sweet* electrolytes to top off
    the tropical vibes.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 用吸管提供的椰子，那些甜美的**甜**电解质可以增强热带氛围。
- en: That was, until I experienced it.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 直到我有这样的经历。
- en: It started off awesome, as the dopamine treadmill goes, but once you possess
    it, that lifestyle quickly loses it’s shine (unless you swap the neurotransmitters
    fueling your well-being through appreciation, gratitude, and present moment awareness).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 一开始很棒，就像多巴胺跑步机一样，但一旦你拥有了它，那种生活方式很快就会失去光泽（除非你用欣赏、感激和当下意识来激发你幸福感的神经递质进行交换）。
- en: The crappy Wi-Fi connection got old.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 糟糕的Wi-Fi连接变得无聊。
- en: The partying and language barrier got old.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 酗酒和语言障碍变得无聊。
- en: The working from your laptop on the beach got extremely old.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在沙滩上用笔记本电脑工作变得极其无聊。
- en: I mean, who actually wants to do that?
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我的意思是，谁真的想那样做呢？
- en: Do you want to work in a place where you can’t even see your screen because
    of the sun? Let alone overheat after 30 minutes and have to go back inside anyway?
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 你想在阳光刺眼到连屏幕都看不见的地方工作吗？更不用说30分钟后过热，不得不回到室内？
- en: The purpose of this letter is not to talk bad about the digital nomad lifestyle.
    I’m leaving out the positive side of the coin to paint a picture here. See if
    its the right lifestyle for you.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这封信的目的不是贬低数字游牧生活方式。我在这里省略了积极的一面，只是为了描绘一幅画面。看看这是否是你适合的生活方式。
- en: '*“As with everything, it’s useful in moderation.”*'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '*“就像所有事情一样，适度使用是有益的。”*'
- en: As Watts would say.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 正如沃茨所说。
- en: I’m here to talk about just that.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里就是要谈论这个。
- en: Moderation.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 适度。
- en: Sustainability.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 可持续性。
- en: A business model that allows you to create *your* ideal lifestyle through practice,
    experimentation, and iteration.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 一种商业模式，让你通过实践、实验和迭代来创造**你自己的**理想生活方式。
- en: A way to make a creative income source with skills, interests, and people you
    align with.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 一种通过技能、兴趣和与你观点一致的人来创造创意收入来源的方法。
- en: A new path that is here to stay, but is still seen as “taboo” because people
    are so tied to their beliefs and comfortable ways of living.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 一种新路径，它将一直存在，但因为人们如此依赖他们的信念和舒适的生活方式，所以仍然被视为“禁忌”。
- en: Thanks to the internet, clash of ideas, and solutions that have been built over
    the years — anyone can increase their value through self-education, turn themselves
    into a brand, and have opportunities coming to them.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了互联网、多年来积累的思想冲突和解决方案——任何人都可以通过自学提高自己的价值，将自己打造成品牌，并有机会主动找上门来。
- en: Ask your parents if they could build a website, upload a product, and accept
    payment with $10-$20 and some self-education.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 问问你的父母，他们是否能用10-20美元和一些自学来建立一个网站，上传产品，并接受付款。
- en: Seriously, go ask them. Then tell me why you still hold the belief that you
    need X, Y, and Z to start a business. Those aren’t excuses anymore.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 严肃地说，去问问他们。然后告诉我为什么你仍然坚持认为你需要X、Y和Z来开始创业。这些不再是借口了。
- en: '*Do you perceive this as an opportunity or “**just* *something that people
    more successful than me do”?*'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '*你认为这是机会还是“**仅仅**比我更成功的人做的事情”？*'
- en: To top it off, you can start right now.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 更重要的是，你现在就可以开始。
- en: Not in 1 year when your skills are perfect.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 不是在你技能完美后的1年内。
- en: Right now.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 现在。
- en: If you are reading this letter, I’m assuming you are 18-35 years old (with some
    outliers, I see you ;))
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在阅读这封信，我假设你是18-35岁（有一些例外，我看到你了 ;))
- en: Meaning, you have 18-35+ years of unique experience.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 意味着你有18-35+年的独特经验。
- en: The problem?
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是什么？
- en: '*You do not see the value in that experience.* You think your life is boring…
    or at least too boring to be able to profit off of being yourself. Which is funny,
    because there are hundreds of thousands of people that would love to hear why
    you do what you do, *they* won’t think it’s boring.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '*你看不到那经验的价值。*你认为你的生活很无聊……或者至少无聊到无法从做自己中获得利润。这很奇怪，因为有成千上万的人愿意听你为什么做你做的事情，*他们*不会认为这很无聊。'
- en: From my experience, the highest-paid individuals are not the ones that bank
    on their body or flashy lifestyle to earn an income.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我的经验，收入最高的人并不是那些依赖自己的身体或光鲜的生活方式来赚钱的人。
- en: People of *depth* and *value* are the ones that get paid the most. They aren’t
    one-dimensional. They train their mind just as much as their body. ***They are
    the generalists that hire the specialists — and the specialists, 90% of the time,
    are going to be the robots that were designed to take on repetitive tasks.***
    Automations, no-code tools, and software that weren’t a thing 10 years ago.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 有**深度**和**价值**的人是那些收入最高的人。他们不是单维的。他们训练自己的思维就像训练自己的身体一样。***他们是那些雇佣专家的通才——而90%的时间，专家将是那些被设计来承担重复性任务的机器人。***自动化、无代码工具和10年前并不存在的那种软件。
- en: A human being should be able to change a diaper, plan an invasion, butcher a
    hog, conn a ship, design a building, write a sonnet, balance accounts, build a
    wall, set a bone, comfort the dying, take orders, give orders, cooperate, act
    alone, solve equations, analyze a new problem, pitch manure, program a computer,
    cook a tasty meal, fight efficiently, die gallantly. **Specialization is for insects.**
    —Robert A. Heinlein
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一个人类应该能够换尿布、计划入侵、屠宰一头猪、驾驶船只、设计建筑、写一首十四行诗、平衡账户、建造一堵墙、接骨、安慰垂死之人、接受命令、下达命令、合作、独立行动、解决方程、分析新问题、扔粪肥、编程计算机、烹饪美味的饭菜、高效战斗、英勇地死去。**专业化是昆虫的专利。**
    ——罗伯特·A·海因莱因
- en: 'Even more of a problem (than not seeing in the value in your personal experience):'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 更成问题（比看不到你个人经验的价值）：
- en: You don’t know how to communicate your experiences in a way that people can
    find the value in.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 你不知道如何以人们能找到价值的方式传达你的经验。
- en: That’s all anyone is doing on social media.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是社交媒体上每个人都在做的事情。
- en: Effective communication.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的沟通。
- en: Some are more fake than others, but that’s their problem. Not yours or mine.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 有些比其他人的假象更明显，但这不是你的问题，也不是我的问题。
- en: '*It’s not about being interesting, it’s about learning what makes your words
    interesting to the other person.*'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '*这不仅仅是关于有趣，而是关于学习什么能让你的话对对方有趣。*'
- en: What Is The One Person Business Model?
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是单人商业模式？
- en: The one-person business model has always appealed to me over having many employees.
  id: totrans-50
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 单人商业模式一直比拥有许多员工对我更有吸引力。
- en: ''
  id: totrans-51
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A simple website as a "storefront"
  id: totrans-52
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一个简单的网站作为“店面”
- en: ''
  id: totrans-53
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A digital product stack with high-profit margins
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 具有高利润率的数字产品堆栈
- en: ''
  id: totrans-55
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 4 hour work days and potential $1M years
  id: totrans-56
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 4小时工作日和可能的100万美元年收入
- en: ''
  id: totrans-57
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Control over what you work on and who you work with.
  id: totrans-58
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 控制你做什么工作以及你与谁一起工作。
- en: ''
  id: totrans-59
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Hard to beat.
  id: totrans-60
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 难以超越。
- en: ''
  id: totrans-61
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [July 4, 2022](https://twitter.com/thedankoe/status/1543915024887971840?ref_src=twsrc%5Etfw)
  id: totrans-62
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年7月4日](https://twitter.com/thedankoe/status/1543915024887971840?ref_src=twsrc%5Etfw)
- en: The one person business, in my eyes, is for those that value self-reliance,
    time freedom, and location freedom.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，单人商业模式适合那些重视自力更生、时间自由和地点自由的人。
- en: 'We use:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用：
- en: Social media for building leverage, attracting like-minds, and building a name
    for ourself (from nothing)
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 社交媒体用于建立杠杆、吸引志同道合的人并为我们的自己（从无到有）建立名声
- en: No-code tools and software for digital real estate, product hosting, and email
    lists (that can’t be taken away like social media)
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无代码工具和软件用于数字房地产、产品托管和电子邮件列表（不像社交媒体那样可以被拿走）
- en: Lifestyle design to create a work schedule that best suits the individual –
    usually 2-4 hours of work a day at the start, sometimes more if you get into the
    flow
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计生活方式以创建最适合个人的工作日程——通常开始时每天工作2-4小时，如果你进入状态，有时会更多。
- en: It is an incredible time to be alive.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个令人难以置信的活着的好时代。
- en: The internet has given everyone the ability to become an entrepreneur, choose
    their working hours, and earn an income based around their obsessions.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网让每个人都有能力成为企业家，选择自己的工作时间，并根据自己的热情赚取收入。
- en: No two people are going to be obsessed with the same crevice of reality. And
    as you evolve and experience more, no two people are going to be obsessed with
    the crevice of reality that they gained awareness of (through action and doing).
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 没有两个人会对现实中的同一个角落产生痴迷。随着你不断进化和获得更多经验，没有两个人会对他们通过行动和做事获得的现实角落产生痴迷。
- en: There is no saturation… when done correctly.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如果做得正确，就不会有饱和…。
- en: The one-person business model is the best option for 95% of people, especially
    if you are just starting out. Every single billion-dollar founder started their
    entrepreneurial journey with 2 things – an idea and themselves. They didn’t just
    start with a billion-dollar company, but we tend to believe what we see and limit
    our mind from diving beyond the surface.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 单人商业模式是95%的人的最佳选择，尤其是如果你是刚开始的话。每一个单亿美元的企业家都是以两样东西开始他们的创业之旅的——一个想法和他们自己。他们并不是从一个价值十亿美元的公司开始，但我们往往相信我们所看到的，并限制我们的思维不深入表面。
- en: '*Why do people fail with their one-person business?*'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '*为什么人们会失败于他们的单人商业？*'
- en: 'There are quite a few reasons:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 有很多原因：
- en: You don’t believe it is possible or that you don’t have enough experience
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不相信这是可能的，或者你认为你没有足够的经验。
- en: You don’t realize that every aspect of your business is a skill that needs to
    be improved (you will suck at the beginning)
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你没有意识到你商业的每一个方面都是一个需要改进的技能（你一开始会做得不好）
- en: You don’t listen to feedback or understand how to pivot how you talk about things
    (if your knowledge isn’t interesting, you have to *make* it interesting by learning
    how to think)
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不听反馈或不理解如何调整你谈论事情的方式（如果你的知识不有趣，你必须通过学习如何思考来*制造*它有趣）
- en: You lose momentum because you try to overcomplicate your message to seem unique,
    intelligent, and over the top
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你失去了动力，因为你试图使你的信息过于复杂，以显得独特、聪明和过分
- en: The list goes on. The lesson is that you must value self-reliance. You have
    to take matters into your own hands and understand that nobody is going to give
    you a paycheck every Friday. *You must learn to hunt.*
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 列表还在继续。教训是，你必须重视自力更生。你必须自己动手，并理解没有人会每周五给你发薪水。*你必须学会狩猎。*
- en: 2 Paths To Start A One-Person Business With Zero Experience
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 两条路径，零经验开始单人商业
- en: The biggest killer is that people don’t believe that business is for them, or
    that they don’t have enough experience.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 最大的杀手是人们不相信商业适合他们，或者他们没有足够的经验。
- en: First, stop thinking of business as anything more than an exchange of value.
    You get something useful, I get something useful. If you want to truly make a
    dent in a world that revolves around money, drop your noble charity act. *Acting
    selfless to feel good about yourself is just another version of selfishness.*
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，停止把商业想成除了价值交换之外的东西。你得到一些有用的东西，我得到一些有用的东西。如果你想真正在围绕金钱旋转的世界中留下印记，放下你的高尚慈善行为。*无私地行动只是为了让自己感觉良好，这只是自私的一种版本。*
- en: If you’ve helped your friends or family with *any* topic that you’ve ever learned
    about in your life, you have enough experience.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你曾经帮助过你的朋友或家人解决过你生活中学到的任何话题，你就有了足够的经验。
- en: Even more, how do you think you gain experience?
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 更重要的是，你认为你是如何获得经验的？
- en: I’ll tell you one thing, you *don’t* gain experience without stepping into the
    arena. You gain experience by practicing your skills in a real-world setting.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 我会告诉你一件事，你不进入竞技场是得不到经验的。你通过在现实世界中练习你的技能来获得经验。
- en: If a freelancer can reach out to clients with zero experience (to *gain* experience)
    in exchange for money, why can’t you post something valuable online without expecting
    anything in return?
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个自由职业者可以通过零经验（为了*获得*经验）来接触客户并换取金钱，为什么你不能发布一些有价值的内容到网上而不期待任何回报？
- en: Make it make sense.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 让它有意义。
- en: Your imposter syndrome is self-deception.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 你的冒充者综合症是自我欺骗。
- en: 'Here are the 2 paths you can take:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是你可以走的两条路径：
- en: Path 1) Skill Based
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 路径 1) 基于技能
- en: This is the most common route that people tell you to take.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 这是最常见的路线，人们会告诉你要走这条路。
- en: Learn a skill
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 学习一项技能
- en: Teach the skill
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 教授这项技能
- en: Sell the skill
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 出售这项技能
- en: This is great, but as I said, you don’t want to end up one-dimensional. You
    don’t want to be a slave to client work that can’t be scaled. You don’t want to
    pursue something else with absolutely nothing to show for it. It happens all the
    time. Freelancers earn an income through cold email and referrals, and when human
    nature kicks into play and you want to change direction, you are starting from
    *scratch* all over again.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 这很棒，但正如我所说，你不想最终变成一维的。你不想成为无法扩展的客户工作的奴隶。你不想追求其他事情却毫无成果。这种情况经常发生。自由职业者通过冷邮件和推荐获得收入，当人性发挥作用，你想改变方向时，你将从头开始。
- en: Build an audience of diverse, yet connected interests.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 建立一个多元但相关兴趣的受众群体。
- en: Path 2) Development Based
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 路径2）基于发展
- en: This second route is more my speed.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 这第二条路线更符合我的风格。
- en: It’s based around the 4 eternal markets.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 它基于四个永恒的市场。
- en: The 4 eternal markets are where burning, profitable problems exist. They are
    where people have lofty goals that you can help them achieve.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 四个永恒的市场是存在燃烧、盈利问题的领域。它们是人们有宏伟目标，你可以帮助他们实现的地方。
- en: Health
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 健康
- en: Wealth
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 财富
- en: Relationships
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人际关系
- en: Happiness
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 幸福
- en: Path 1 only pays attention to wealth. Marketable skills to help people make
    more money. By default, you build a one-dimensional brand.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 路径1只关注财富。可销售的技能帮助人们赚更多钱。默认情况下，你建立了一个一维的品牌。
- en: With path 2, you quite literally pursue your own goals in life (brand), solve
    your problems as you are pursuing those goals (content), and create a system to
    help others do the same (offer).
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 在路径2中，你字面意义上追求自己的人生目标（品牌），在追求这些目标的过程中解决问题（内容），并创建一个帮助他人同样做到的系统（提供）。
- en: That is how you be yourself, improve yourself, and profit off of yourself.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何做自己，提升自己，并从中获利。
- en: “But Dan, I’m just starting out!”
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: “但是丹，我刚开始！”
- en: And?
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 然后呢？
- en: It’s not like you have to write content on “How I made 1 million dollars in
    3 days.” Less and less people care about that nowadays. They register it as a
    scam in their mind.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 并不像你必须写关于“如何在3天内赚100万美元”的内容。如今越来越少的人关心这个。他们会在心里将其视为骗局。
- en: Branding and content are all about perspective. Or “positioning” in marketing.
    All you have to do is be honest.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 品牌和内容都是关于视角。或者说是营销中的“定位”。你所要做的就是诚实。
- en: What is going to perform better?
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 哪个会表现得更好？
- en: “How I made 1 million dollars in 3 days”
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: “如何在3天内赚100万美元”
- en: Or
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 或者
- en: “How I plan to make 1 million dollars in 5 years”
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: “我计划在5年内赚100万美元”
- en: Which one would you click on? Which would you follow? Which would you *believe*
    and implement for yourself?
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 你会点击哪一个？你会跟随哪一个？你会*相信*并为自己实施哪一个？
- en: Self-awareness and behavior change are the great determinants of your brand’s
    success. Are you aware of how YOU would view your brand or content as an outsider?
    Are you putting out content that will actually change people’s lives?
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 自我意识和行为改变是品牌成功的重要决定因素。你是否意识到作为局外人你会如何看待你的品牌或内容？你是否在发布能够真正改变人们生活的内容？
- en: Path 3) Both
  id: totrans-118
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 路径3）两者兼具
- en: When you start a one-person business, it is *on you* to learn the skills necessary
    to make it work.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 当你开始个人业务时，学习使其运作所需技能的责任在你身上。
- en: You will have to learn how to create a compelling profile photo, banner, designs,
    persuasive bio and content, landing page, and other software that others don’t
    know how to use.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 你将不得不学习如何创建吸引人的个人资料照片、横幅、设计、有说服力的个人简介和内容、着陆页以及其他其他人不知道如何使用的软件。
- en: And of course, **writing**, which is the foundational skill for any business
    success (that I teach in [2 Hour Writer](https://2hourwriter.com))
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，**写作**，这是任何商业成功的基础技能（我在[2小时作家](https://2hourwriter.com)中教授）
- en: As you talk about your journey towards achieving your goals, you will be learning
    skills (through direct real-world experience) by building your brand.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 当你谈论实现目标的过程时，你将通过建立品牌学习技能（通过直接的现实世界经验）。
- en: Then, you will *have* skills that you can sell to help other brands if you don’t
    already have an offer in mind.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，如果你还没有想到提供什么服务，你将拥有可以出售的技能来帮助其他品牌。
- en: Jose Rosado, as an example, made a full time income selling profile banners,
    then transitioned into web design and made multiple 6 figures. Then transitioned
    again into digital products. The one person business model favors your personal
    evolution. That’s what makes you unique from everyone else.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 以Jose Rosado为例，他通过销售个人资料横幅获得了全职收入，然后转型为网页设计，赚了多个六位数。然后再次转型为数字产品。个人业务模式有利于你的个人发展。这就是你与众不同的地方。
- en: If you don’t see the opportunity, it’s because you aren’t in the arena. The
    opportunities can’t register in your awareness because you haven’t even stepped
    through the door.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你看不到机会，那是因为你还没有进入竞技场。机会无法在你的意识中注册，因为你甚至没有跨过门槛。
- en: The 4 Pillars Of A One Person Business
  id: totrans-126
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一人企业的四个支柱
- en: For those that want to do *what they want* and help the people *they can help
    the most* – traditional branding, marketing, content, and offer creation will
    lead you in the wrong direction.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些想要做他们想做的事情并帮助他们最能帮助的人——传统的品牌、营销、内容和提供创造将把你引向错误的方向。
- en: The personal brand is the most powerful storefront in our times. It builds a
    human connection.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 个人品牌是我们这个时代最强大的店面。它建立了人与人之间的联系。
- en: The traditional business model will have you create a customer avatar based
    on someone with a profitable problem you can solve.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的商业模式会要求你基于一个有利润问题的某人创建一个客户形象，你可以解决这个问题。
- en: My way, The Experience Model, turns YOU into the customer avatar.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 我的做法，体验模型，将你变成客户形象。
- en: <picture fetchpriority="high" decoding="async" class="wp-image-820">![](../Images/75ba6da0a10209fe7aa743204651f0e0.png)</picture>
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-820">![](../Images/75ba6da0a10209fe7aa743204651f0e0.png)</picture>
- en: That way, you can solve your own problems, attract people that are on a similar
    path as you, and help them do the same.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，你可以解决自己的问题，吸引与你路径相似的人，并帮助他们做到同样的事情。
- en: Another bonus, you don’t have to spend countless hours doing market research
    to understand what will sell.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个好处是，你不必花费无数小时进行市场研究来了解什么会畅销。
- en: All you have to do is become obsessed with achieving a goal, solve problems
    that arise, and create a system to help others do it faster.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 你所需要做的就是沉迷于实现目标，解决出现的问题，并创建一个系统来帮助他人更快地做到这一点。
- en: A system is just a step-by-step method for how *you* would go back and solve
    that problem quick.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 一个系统只是你如何一步步快速解决问题的方法。
- en: Like climbing the stairs to the first floor and sending an elevator down to
    help someone up.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 就像爬楼梯到一楼，然后让电梯下去帮助别人上来一样。
- en: You will find the best results helping people 1 level under you (and you will
    learn the most from the same, your awareness level needs to be able to register
    all of the teachings).
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 你会发现，帮助那些在你之下一个级别的人（你也会从他们那里学到最多，你的意识水平需要能够登记所有的教诲）会得到最好的结果。
- en: Pillar 1) Branding
  id: totrans-138
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 核心支柱 1) 品牌
- en: In business, stop trying to find a “problem” to solve.
  id: totrans-139
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在商业中，停止试图找到一个“问题”来解决。
- en: ''
  id: totrans-140
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Instead, understand the “goal” that people are trying to achieve.
  id: totrans-141
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 相反，要理解人们试图实现的“目标”。
- en: ''
  id: totrans-142
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Then, become an expert at solving the problems that prevent people from achieving
    that goal.
  id: totrans-143
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 然后，成为解决阻碍人们实现目标的问题的专家。
- en: ''
  id: totrans-144
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Help them get there as fast as possible. That’s what they want.
  id: totrans-145
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 帮助他们尽可能快地到达那里。这就是他们想要的。
- en: ''
  id: totrans-146
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [October 3, 2022](https://twitter.com/thedankoe/status/1576922278700490753?ref_src=twsrc%5Etfw)
  id: totrans-147
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年10月3日](https://twitter.com/thedankoe/status/1576922278700490753?ref_src=twsrc%5Etfw)
- en: Your brand is who you are, what you do, and what you are doing.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 你的品牌是你是谁，你做什么，你在做什么。
- en: What **goal** are you working towards?
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在努力实现什么**目标**？
- en: Why are you working towards it? What is the desired outcome that you are trying
    to achieve? That is what people are going to follow you for.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 你为什么在努力实现它？你试图实现的目标是什么？这就是人们会跟随你的原因。
- en: The thing about branding is that it doesn’t have to be directly stated in many
    places. Maybe on your website where you can explain your brand message, but aside
    from that – people will pick up what your brand message is through your content.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 关于品牌的事情是，它不必在许多地方直接陈述。也许在你的网站上，你可以解释你的品牌信息，但除此之外——人们会通过你的内容了解你的品牌信息。
- en: Pillar 2) Content
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 核心支柱 2) 内容
- en: 'Beginners need to understand this:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 初学者需要理解这一点：
- en: Your brand (especially on social media) is formed through 1-3 months of content.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 你的品牌（尤其是在社交媒体上）是通过1-3个月的内容形成的。
- en: Content compounds. And I don’t mean in terms of views or reach. I mean the message
    compounds in people’s minds until your entire message *clicks.*
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 内容会累积。我说的不是在观看次数或覆盖范围方面，而是在人们心中，你的信息会累积，直到整个信息*触动*他们。
- en: People aren’t going to understand you from one tweet, video, or article alone.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 人们不会仅仅通过一条推文、一个视频或一篇文章就理解你。
- en: You need TIME in the game if you want to have a shred of authority.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想在游戏中获得一丝权威，你需要时间。
- en: Now, what do you write about?
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你该写些什么？
- en: You write about the interests, skills, and topics that you plan to master. The
    ones that will help you achieve your goals in a way that is unique to you.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 你写关于你计划掌握的兴趣、技能和主题。那些能以你独特的方式帮助你实现目标的东西。
- en: Remember the tweet from above? The one about not finding a problem, but setting
    a goal?
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 记得上面的推文吗？关于找不到问题，但设定目标的那条？
- en: All content (and human attention / behavior in general) revolves around problems.
    Problems are the starting point of your content, but you *and* your followers
    must be working to similar goals for those problems to be *relevant**.*
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 所有内容（以及人类的一般注意力和行为）都围绕着问题。问题是你的内容起点，但你和你的追随者必须为这些问题努力工作，以便这些问题变得*相关*。
- en: Everyone can have the same goal of “living the good life,” but how are YOU going
    to make that a reality?
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都可以有“过上美好生活”的相同目标，但你将如何实现这一目标呢？
- en: For me, it is by studying the human mind, philosophy, and creative work.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，是通过研究人类心灵、哲学和创造性工作。
- en: For another person, it could be web design, mindset, and fitness.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 对另一个人来说，可能是网页设计、心态和健身。
- en: And another, it could be automation, marketing, and productivity.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 另一条，可能是自动化、营销和生产率。
- en: '*If you put 5 people at the bottom of a mountain and asked how they would get
    to the top, they would all draw a different path.*'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果你让五个人站在山脚下，问他们如何到达山顶，他们都会画出不同的路线。*'
- en: The unique combination of these topics IS your niche.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 这些主题的独特组合就是你的细分市场。
- en: They are broad because we want to build a large, leverageable, and flexible
    audience – rather than put ourselves in a box and be limited in what we talk about.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 它们是广泛的，因为我们想建立一个庞大、可利用和灵活的受众群体——而不是把自己局限在一个框框里，限制我们谈论的内容。
- en: If I ever wanted to pivot into fitness, turn my training regimen (that I’ve
    experimented with for years) into a course, and sell it for an income, I could.
    I would market it to my audience (who has similar goals and interests as me) in
    a way that would appeal most to them.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想要转向健身，将我多年来实验过的训练计划变成课程，并以此作为收入，我可以。我会以最吸引他们的方式向我的受众（与我有着相似目标和兴趣的人）进行营销。
- en: But HOW do you write about these topics?
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 但你将如何写这些主题？
- en: In [Digital Economics](https://digitaleconomics.school), I teach about the Domain
    Of Mastery.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 在[数字经济学](https://digitaleconomics.school)中，我教授关于掌握领域。
- en: <picture decoding="async" class="wp-image-821">![](../Images/a4f456f23d4fd3ff12b55740e64328f3.png)</picture>
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-821">![](../Images/a4f456f23d4fd3ff12b55740e64328f3.png)</picture>
- en: You choose 3 *broad* topics that you can then break down into principles, mentors
    for inspiration, and sub topics.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 你选择三个*广泛*的主题，然后你可以将它们分解为原则、灵感导师和子主题。
- en: Then, you can research books, podcasts, articles, and social posts to see how
    others are talking about those topics.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你可以研究书籍、播客、文章和社交媒体帖子，看看其他人是如何讨论这些主题的。
- en: This is more than just business. This is how you get paid for improving yourself,
    learning how to think, and creating a meaningful life.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅是商业。这是你通过提升自己、学习如何思考和创造有意义的生活来获得报酬的方式。
- en: Understand that this is just a starting point to get you *moving forward.* You
    will pivot when you become aware of something you truly want to do (because you
    weren’t aware of it at the level you were at before).
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这只是一个让你*前进*的起点。当你意识到你真正想要做的事情时，你会进行转型（因为你之前没有意识到这一点）。
- en: At the beginning, your job is to emulate what works.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始时，你的任务是模仿那些有效的方法。
- en: You need to build authority in the topics you talk about by writing beginner-level
    content that has guaranteed growth time and time again.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要通过撰写保证持续增长的入门级内容来在讨论的主题上建立权威。
- en: Go look at your favorite YouTuber.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 去看看你最喜欢的YouTube博主。
- en: Did they grow their audience at the start with cool little vlogs?
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 他们是否在开始时通过一些有趣的小视频日志来扩大他们的受众？
- en: Or did they make it their full-time job to educate their audience and teach
    them about new skills and interests?
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 或者他们是否将其作为全职工作来教育他们的受众，并教授他们新的技能和兴趣？
- en: Pillar 3) Offer
  id: totrans-182
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第三支柱）提供
- en: No, you don’t have to wait to start monetizing. I’m tired of hearing that sh*t.
    Gatekeeper mindset.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 不，你不必等待开始货币化。我听腻了这种废话。守门人思维。
- en: You need to start monetizing (charging low) ASAP.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要尽快开始货币化（收取低费）。
- en: You NEED something to iterate on. You need something to build, improve, and
    make more valuable.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要一些可以迭代的东西。你需要一些可以构建、改进和增值的东西。
- en: Your first offer WILL suck. There’s no escaping it. You should get that first
    crappy iteration out immediately.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 你的第一个报价将会很糟糕。这是无法避免的。你应该立即推出第一个糟糕的迭代。
- en: '*You can’t improve something that doesn’t exist.*'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: '*你不能改善不存在的东西。*'
- en: You need to learn what it’s like to sell. You need a real-world vessel to apply
    all of your marketing and sales learnings to.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要学习销售的感觉。你需要一个现实世界的平台来应用你所有的营销和销售知识。
- en: “Okay Dan, but what do I sell?”
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: “好的丹，但我该卖什么？”
- en: Let me introduce you to the **Minimum Viable Offer**.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 让我向你介绍**最小可行产品**。
- en: 'The MVO is either a:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: MVO（最小可行产品）可以是以下之一：
- en: Single-skill freelance service that you can sell for $500-$1000
  id: totrans-192
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 单一技能的自由职业服务，你可以以500-1000美元的价格出售
- en: Single interest consulting service where you can sell a pack of 4 consult calls
    for $500-$1000
  id: totrans-193
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 单一兴趣咨询服务，你可以以500-1000美元的价格出售一组4次咨询电话
- en: I would almost always recommend option 2 if you are joining the creator economy.
    I would not start off with time-sucking client work that makes you feel like you
    don’t have time to create content.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是加入创作者经济，我几乎总是推荐选项2。我不会从让你感觉没有时间创造内容的时间消耗型客户工作中开始。
- en: (And, if you’re anything like me, you like to learn and experiment for yourself.
    Most, not all, creators do. I don’t like having work done for me).
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: （而且，如果你像我一样，你喜欢自己学习和实验。大多数，而不是所有，的创作者都是这样。我不喜欢别人为我做事）。
- en: Health, performance, mindset, and business consulting are a given.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 健康、性能、心态和商业咨询是既定的。
- en: But, you can still do this if you want to sell a skill as opposed to an interest.
    You would simply frame it as “tutoring.”
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，如果你想出售一项技能而不是兴趣，你仍然可以这样做。你只需将其定位为“辅导。”
- en: You can tutor or mentor people on how to build websites.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以辅导或指导人们如何建立网站。
- en: You can tutor or mentor people on how to write.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以辅导或指导人们如何写作。
- en: You can tutor or mentor people on how to start email marketing.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以辅导或指导人们如何开始电子邮件营销。
- en: What’s the beauty in starting with an MVO, especially if it is a pack of 2-4
    consulting calls?
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 从MVO开始有什么好处，尤其是如果它是一组2-4次咨询电话？
- en: '**1) You can start monetizing immediately.**'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 你可以立即开始盈利。**'
- en: No need for a landing page if you understand the sales process. The ability
    to DM someone, a questionnaire software, and a calendar booking link is all you
    need. (And a way to send invoices of course).
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你理解销售流程，不需要着陆页。直接发信息给某人、问卷软件和日历预订链接就是你所需要的。（当然，还需要一种发送发票的方式）。
- en: You get on the calls, help people with their problems, and dedicate yourself
    to researching effective solutions for those problems. You don’t need all of the
    answers at the start, you just need more time than the other person has. They
    don’t have the time to solve the problem themselves. That’s why they pay for your
    service anyway, speed, convenience, and accountability.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 你参加电话会议，帮助人们解决问题，并致力于研究那些问题的有效解决方案。你不需要一开始就拥有所有答案，你只需要比对方更多的时间。他们没有时间自己解决问题。这就是他们支付你服务费用的原因，速度、便利性和责任感。
- en: '**2) You can build out a scalable product based on what gets results.**'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 你可以根据取得的结果构建一个可扩展的产品。**'
- en: To increase the value of your consulting offer, you will be outlining a curriculum
    of sorts to help organize the structure of calls. You should also create things
    like worksheets and Notion dashboards to help your clients get more results.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提高你的咨询服务价值，你将概述一种课程，以帮助组织电话的结构。你还应该创建像工作表和Notion仪表板这样的东西，以帮助你的客户获得更多成果。
- en: These can be turned into a product that you can sell as your audience grows.
    The product buyers can lead into your consulting and become clients.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 这些可以转化为随着受众增长你可以出售的产品。产品买家可以引导进入你的咨询并成为客户。
- en: That means, less time spent on prospecting and more free time if you choose
    to decrease how many clients you take on (your prices will skyrocket too, of course.)
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着，你花在寻找潜在客户上的时间更少，如果你选择减少你接受的客户数量（当然，你的价格也会飙升。）
- en: Pillar 4) Marketing
  id: totrans-209
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第四支柱）市场营销
- en: Let’s imagine you created your MVO.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们假设你创建了你的MVO。
- en: You want to sell programming tutoring.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 你想出售编程辅导。
- en: Now, you need to build authority and trust in order to sell that service.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你需要建立权威和信任，以便销售这项服务。
- en: So, you write a weekly newsletter or thread based on a beginner-level programming
    topic (so that it can reach more people, 90% of the market are beginners).
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你写一份基于入门级编程主题的每周通讯或帖子（这样它可以触及更多的人，市场90%的人都是初学者）。
- en: You network with others in the programming space to get eyes on your content
    with their audience.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 你与编程空间的其他人建立联系，以便通过他们的受众看到你的内容。
- en: If you plug your service at the bottom of a thread and get 100,000+ impressions
    (on the LOW end) on your thread, you’re almost guaranteed to land your first client.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你将你的服务放在一个帖子的底部，并且你的帖子有10万+的曝光量（在低端），你几乎可以保证能获得你的第一个客户。
- en: Boom, with the right strategy and not listening to the limiting beliefs in your
    head, you just made a third of the average salary. If you do this on a weekly
    basis, within 3 months you can outearn most salaries.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 嘭！有了正确的策略，不听你头脑中的限制性信念，你刚刚就赚到了平均工资的三分之一。如果你每周都这样做，三个月内你就能赚得比大多数工资还要多。
- en: Unlike freelancers, you are building an audience along the way as well. Your
    content and promotions are not going to waste. You have future potential to sell
    new things as you grow.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 与自由职业者不同，你在前进的过程中也在建立受众。你的内容和推广不会浪费。随着你的成长，你有未来潜力销售新产品。
- en: The point being, you need to *promote* yourself on a consistent basis.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 重点是，你需要持续地**推广**自己。
- en: If you don’t promote your offer, you aren’t going to make money.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不去推广你的提议，你就不会赚钱。
- en: Simple as that.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 简单就是这样。
- en: With all of that said, Digital Economics is open for enrollment.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 说了这么多，数字经济学现在开放报名。
- en: I give you plug and play systems to create an effective brand, content, offer,
    and marketing with the skills, interests, and expertise you have right now.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 我给你提供即插即用的系统，利用你现在的技能、兴趣和专业知识来创建有效的品牌、内容、提议和营销。
- en: It’s a holistic masterclass with a complete Notion dashboard (that will run
    your business), accelerator recordings, and a Discord community for personalized
    help as you are building your business.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个全面的大师班，包括完整的Notion仪表板（将管理你的业务），加速器录音，以及一个Discord社区，在你建立业务时提供个性化帮助。
- en: If that interests you, and you’re ready to finally build something that gives
    you the time / location freedom you crave, consider enrolling.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这对你有吸引力，你准备好最终建立一个能给你你渴望的时间/地点自由的东西，考虑报名。
- en: '[See if it’s a fit for you here.](https://digitaleconomics.school)'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: '[看看它是否适合你这里。](https://digitaleconomics.school)'
- en: – Dan “do whatever you want” Koe
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹“做你想做的”科
