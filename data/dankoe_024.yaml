- en: Life Is A Video Game, Here’s How You Win
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 生活是一场视频游戏，这是你如何赢得比赛
- en: 原文：[https://thedankoe.com/letters/life-is-a-game-heres-how-you-play-it/](https://thedankoe.com/letters/life-is-a-game-heres-how-you-play-it/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/life-is-a-game-heres-how-you-play-it/](https://thedankoe.com/letters/life-is-a-game-heres-how-you-play-it/)
- en: Have you ever had a taste of the optimal human experience?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否曾经尝到过最佳的人类体验？
- en: You know, when you notice that you feel incredibly confident, energized, or
    productive — at least more than you’d normally be.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道，当你注意到你感到极其自信、充满活力或富有生产力——至少比你通常要高——的时候。
- en: Some call it the flow state.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人称之为心流状态。
- en: A state of consciousness where nothing but what’s in front of you matters.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 一种意识状态，其中只有你面前的东西才是重要的。
- en: You lose the sense of self-consciousness that is the cause of all mental suffering.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 你失去了导致所有心理痛苦的自我意识感。
- en: 'When you tap into this state, you:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 当你进入这种状态时，你：
- en: Cease to care what other people think
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 停止关心别人怎么想
- en: Become one with the task you are engaged in
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与你所从事的任务合为一体
- en: Know exactly what to do next, how well you are doing, and gain a deep sense
    of satisfaction from it
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清楚下一步该做什么，你做得怎么样，并从中获得深深的满足感
- en: The key here is what the mystics, masters, and spiritualists have been trying
    to get you to understand.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的关键是神秘主义者、大师和精神主义者试图让你理解的东西。
- en: Suffering comes from comparison.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 比较带来了痛苦。
- en: The “self” is an idea. It is a concept. It is the *knowing* that comes after
    *being.*
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: “自我”是一个想法。它是一个概念。它是“存在”之后的“知道”。
- en: It is not a static thing, but don’t let this fool you into thinking the “self”
    isn’t important. The character that plays a game will determine if that character
    wins.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是一个静态的东西，但不要因此被误导，认为“自我”不重要。玩游戏的角色将决定这个角色是否能赢。
- en: Another word for the self is the “ego.”
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 自我的另一个词是“自我中心”。
- en: The “I” or “me” that when used in a sentence, always comes before a comparison.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 当“我”或“自我”在句子中使用时，总是位于比较之前。
- en: It’s not something you get rid of, it’s something you develop.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是你可以摆脱的东西，这是你可以发展出来的东西。
- en: If you want to ease your suffering, you must learn how to control your attention,
    which is heavily influenced by the ego.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要减轻你的痛苦，你必须学会如何控制你的注意力，这受到自我中心的强烈影响。
- en: When you become self-conscious through attention and compare an aspect of yourself
    to something else, you tend to highlight the differences.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当你通过关注和将自己的一部分与别的事物比较而变得自我意识时，你往往会突出差异。
- en: This makes you use precious mental energy and tends to scatter your thoughts.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这让你浪费宝贵的心理能量，并倾向于分散你的思想。
- en: Like when you see a pimple on your skin in the mirror, then the *idea* of clear
    skin pops into your awareness, you begin the decline into a negative state of
    mind. You are comparing multiple ideas of what you think it *should* be, instead
    of accepting things as they are and moving on.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 就像你在镜子中看到皮肤上的痘痘，然后清晰的皮肤的想法突然出现在你的意识中，你开始陷入消极的心态。你是在比较多个你认为它“应该是”的想法，而不是接受事物本来的样子并继续前进。
- en: Or, when you bring attention to your status in the world, the *idea* of societal
    success pops into your head, and you feel like you are “behind,” when “behind”
    is just a belief you hold in your mind.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，当你将注意力集中在你的世界地位上时，社会成功的想法突然出现在你的脑海中，你感觉像是“落后”的，而“落后”只是你心中的一个信念。
- en: So, how do we gain control of our attention?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们如何控制我们的注意力？
- en: '*By treating life as a game.*'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '*通过将生活视为一场游戏。*'
- en: My generation is notorious for transferring their obsession with video games
    into business success.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我的这一代人因将他们对视频游戏的痴迷转化为商业成功而闻名。
- en: 'Games, business, and other constructions of the external world, or matrix:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 游戏、商业以及其他外部世界的构建或矩阵：
- en: Present a desirable hierarchy of goals
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出一个令人向往的目标层次
- en: Have a structure that frames your attention
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 有一个结构来框定你的注意力
- en: Introduce a challenge to narrow your attention further
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 引入一个挑战来进一步缩小你的注意力
- en: Require a player to have the skill that meets the requirements to play
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 需要玩家具备满足游戏要求的技能
- en: What few understand is that you can create a game out of any situation in life.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 很少有人理解的是，你可以从生活中的任何情境中创造出一个游戏。
- en: If you can mold your mind to create a fun game, life becomes enjoyable.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能够塑造你的思维来创造一个有趣的游戏，生活就会变得愉快。
- en: If you can’t, your mind will be molded into playing societal status games. Like
    going to college, getting a high-paying job, or taking another structured approach
    to life that eases the initial suffering that sovereign living would imply.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你做不到，你的思想就会被塑造成参与社会地位游戏。比如上大学，找到一份高薪工作，或者采取另一种结构化的生活方式，以减轻主权生活所暗示的初始痛苦。
- en: The purpose of this letter is for awareness.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这封信的目的在于提高意识。
- en: I don’t want you to wake up 20 years from now, with more responsibilities, just
    to realize that you will have to work twice as hard to get your life in order.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我不希望你20年后醒来，责任更多，却意识到你必须加倍努力才能使生活有序。
- en: Let’s dive in.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨。
- en: Macro & Micro Games
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 宏观与微观游戏
- en: When playing an open-world strategy game, like World Of Warcraft, there are
    a few patterns to note in how it relates to everyday life.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 当玩开放世界策略游戏，如《魔兽世界》时，有几个模式需要注意，它如何与日常生活相关。
- en: 'There are the obvious things like:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 明显的事情包括：
- en: Stacking gold
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 累积金币
- en: Choosing a profession
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择一个职业
- en: Leveling up your character
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提升角色等级
- en: And the progression that goes along with those things.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 以及与这些事情相关的进步。
- en: But, there are a few things that people tend to glance over, and they may help
    you see life from a new perspective.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，有一些事情人们往往忽略，它们可能帮助你从新的角度看待生活。
- en: '**The Game** **Is Programmed** **& Downloaded On The Hard Drive**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**游戏** **是编程的** **并下载到硬盘上**'
- en: The system is rigged.
  id: totrans-46
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 系统已经被操纵。
- en: ''
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You can't change it.
  id: totrans-48
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你无法改变它。
- en: ''
  id: totrans-49
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: But you can learn it.
  id: totrans-50
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 但是你可以学会它。
- en: ''
  id: totrans-51
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: That is how you rig yourself in the system's favor.
  id: totrans-52
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这就是你在系统利益下自我操纵的方式。
- en: ''
  id: totrans-53
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [July 5, 2022](https://twitter.com/thedankoe/status/1544277416704720898?ref_src=twsrc%5Etfw)
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年7月5日](https://twitter.com/thedankoe/status/1544277416704720898?ref_src=twsrc%5Etfw)
- en: The conventional path to success has been programmed into the collective psyche.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 成功的常规路径已经被编程到集体心理中。
- en: Before we know it, we are already in pursuit of winning the game that society
    wants us to pursue, usually in favor of maintaining the game.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们意识到之前，我们已经在追求社会想要我们追求的游戏胜利，通常是为了维持游戏。
- en: Go to college
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上大学
- en: Get a high-paying job
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 找到一份高薪工作
- en: Retire at 65 so you can finally enjoy life
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 65岁退休，这样你终于可以享受生活
- en: 90% of the time, it doesn’t work out that way.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 90%的情况下，事情不会这样发展。
- en: (And usually ends up in a perpetual state of anxiety, despair, and lack of fulfillment).
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: （通常最终陷入永无止境的焦虑、绝望和缺乏满足感的状态）。
- en: Why? Because times are changing and the programmers can’t patch the game fast
    enough. As that would require them to overhaul the school, banking, and employment
    systems.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？因为时代在变化，程序员无法快速修复游戏。因为这需要他们彻底改革学校、银行和就业系统。
- en: Removing one foundational piece of a skyscraper may cause it to fall.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 移除摩天大楼的一个基础构件可能会导致它倒塌。
- en: This is why individuals are filling these roles (and making a hefty income doing
    so) by educating people online as a creator, programming decentralized currency,
    and offering their services as independent contract workers (like freelancing.)
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么个人通过在线教育作为创作者、编程去中心化货币以及作为独立合同工（如自由职业者）提供服务来填补这些角色（并且因此获得丰厚的收入）。
- en: The people that never question this system and instead succumb to their programming,
    are known as NPCs.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 从不质疑这个系统并屈服于其编程的人被称为NPC。
- en: Non-Player Characters.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 非玩家角色。
- en: These include townsfolk, bosses in a battle quest, and others that keep the
    game interesting for the players. They do what they are told to do.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这些包括镇民、战斗任务中的Boss以及其他让游戏对玩家保持有趣的角色。他们做他们被告知要做的事情。
- en: Then, there are the people that choose to play the game with a conscious mind
    and have fun playing the game that the collective ego has created.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，还有一些人选择有意识地玩游戏并享受集体自我所创造的乐趣。
- en: '**There Are Infinite Paths You Can Take**'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**你可以选择无数条道路**'
- en: <picture fetchpriority="high" decoding="async" class="wp-image-880">![](../Images/30c2b936f80377cd6224a1c6ff60a5fa.png)</picture>
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-880">![](../Images/30c2b936f80377cd6224a1c6ff60a5fa.png)</picture>
- en: 'In World Of Warcraft, you have a series of choices that you get to make:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在《魔兽世界》中，你有一系列的选择需要做出：
- en: What your character looks like
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的角色看起来像什么
- en: What kind of player they are (warrior, mage, etc)
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们是什么样的玩家（战士、法师等）
- en: What profession they want to learn
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们想要学习哪种职业
- en: The quest path they want to take to level up
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们想要通过的任务路径来提升等级
- en: Whether they play solo or with a group
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无论他们是单人游戏还是组队游戏
- en: What guild they join to help them level faster
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们加入什么公会来帮助他们更快地升级
- en: And a series of other personal choices that allow the game to be played how
    you like.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 以及一系列其他个人选择，允许游戏以你喜欢的任何方式进行。
- en: You see, life is like a mountain, but this mountain is infinitely tall.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 你看，生活就像一座山，但这座山是无限高的。
- en: If 5 people were standing at the bottom, and you asked them to create a path
    to the first peak, all of them would draw a slightly different route.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有5个人站在底部，你要求他们为第一个顶峰创建一条路径，他们都会画出一条略有不同的路线。
- en: Then, when they reach that peak, not only are they able to look down and help
    others climb faster, but there is another peak to reach, but from a place of prior
    experience.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，当他们达到那个顶峰时，他们不仅能够向下看并帮助他人更快地攀登，而且还有一个新的顶峰要达到，但这是基于先前经验的地方。
- en: '**Increasing Your Level Increases The Complexity Of The Self**'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '**提高你的等级会增加自我复杂性**'
- en: In the real world, the main spiritual problem is that people never change.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实世界中，主要的灵性问题在于人们从不改变。
- en: They identify with beliefs, their job, and the life path that was impressed
    on them.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 他们认同信念、他们的工作和强加在他们身上的生活道路。
- en: Their ego never changes, because it doesn’t want to.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的自我永远不会改变，因为它不想改变。
- en: Once they’ve reached that point in life, they cease to learn, stack skills,
    and “level up” to the point of more opportunities being available to them.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦他们达到生活中的那个阶段，他们就会停止学习，积累技能，并“升级”到有更多机会可供他们选择的地步。
- en: By improving your skill set, you are able to take on more complex challenges
    in life.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提高你的技能集，你能够承担生活中更复杂的挑战。
- en: By taking on more challenges, you acquire the knowledge and experience that
    expands your awareness.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 通过承担更多挑战，你获得了扩展你意识的知识和经验。
- en: Like putting points into specific traits in your skill tree in a video game.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 就像在电子游戏中将点数投入到你的技能树中的特定特质一样。
- en: Eventually, you have so much power and experience that the entire world is yours
    to roam freely, without stress or obligation.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，你拥有如此多的力量和经验，整个世界都可以自由地漫游，没有压力或义务。
- en: By taking on higher-level challenges, what used to be an unknown area on the
    map is now explored — and can continue to be explored as much as you’d like.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 通过承担更高水平的挑战，曾经地图上的未知区域现在被探索了——而且可以继续探索，只要你愿意。
- en: As you develop yourself, you have the knowledge and experience necessary to
    create order from chaos.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你自己的发展，你拥有了从混乱中创造秩序的知识和经验。
- en: You have more power to create enjoyment out of any situation.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 你有更多的力量从任何情况下创造乐趣。
- en: This overall structure represents the game of life, the macro game.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 这个整体结构代表了人生的游戏，宏观游戏。
- en: But, it goes deeper.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，这还只是更深层次的问题。
- en: Every single situation you find yourself in can be considered a micro game.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 你发现自己处于的每一个情况都可以被视为一个微观游戏。
- en: A game within a game.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 一个游戏中的游戏。
- en: Let’s discuss how you can create maximum enjoyment while playing the game of
    life.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们讨论一下你如何在玩人生的游戏中创造最大的乐趣。
- en: Set A Hierarchy Of Goals
  id: totrans-99
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设定目标层次
- en: Games present the big goal of winning.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 游戏提出了赢得比赛的大目标。
- en: They also present sub-goals, like quests, that guide you toward winning the
    game.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 他们还提出了子目标，如任务，这些目标引导你走向赢得比赛。
- en: If there was only the goal of winning, and you had little clarity on how to
    win, the game wouldn’t be fun. And your mind will not be able to maintain order,
    meaning it will decline into chaos.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 如果只有赢得比赛的目标，而你又对如何赢得比赛没有多少清晰的认识，那么比赛就不会有趣。而且你的心智将无法维持秩序，意味着它将陷入混乱。
- en: By now it should be common knowledge that creating a vision for your future
    is a good thing to do.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 到现在为止，应该是一个常识，为你的未来制定一个愿景是一件好事。
- en: As humans, we have the ability to *aim.*
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 作为人类，我们有能力*瞄准*。
- en: Monkeys can throw their poop, but they don’t *plan* ahead. The poop usually
    gets hurled straight toward the ground.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 猴子可以扔他们的粪便，但它们不*计划*。粪便通常会被直接扔向地面。
- en: Humans on the other hand can bring their attention to a target, and depending
    on their skill level, hit a bullseye from 50 yards out.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，人类可以将他们的注意力集中在目标上，并且根据他们的技能水平，从50码之外击中靶心。
- en: We don’t want to be poop hurled at the ground, so we create a vision that we
    can build towards.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不想成为被扔向地面的粪便，所以我们创造了一个我们可以为之努力构建的愿景。
- en: But, if we don’t want to be overwhelmed by our grand vision, we need a plan.
    A set of goals, from the top down that brings clarity to our daily actions, making
    them that much easier to act on.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，如果我们不想被我们的宏伟愿景所压倒，我们需要一个计划。一套从上到下的目标，使我们的日常行动变得清晰，使它们更容易采取行动。
- en: Think big, act small.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 思考大，行动小。
- en: 'Sit down with a pen and paper, or [use my Power Planner](https://shop.thedankoe.com/planner),
    to:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 拿起笔和纸，或者[使用我的Power Planner](https://shop.thedankoe.com/planner)，来：
- en: Create the first iteration of your vision
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建您愿景的第一迭代
- en: Create a 10 year, 1 year, and monthly goals
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建10年、1年和月度目标
- en: Have a place for weekly direction and reflection
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有一个地方用于每周的方向和反思
- en: Align your daily priority tasks with those
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将您的日常优先任务与这些任务对齐
- en: With these written down, you will expand your awareness to notice opportunity
    that fuels that vision.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 将这些写下来，您将扩展您的意识，注意到推动这一愿景的机会。
- en: And as better ideas come to mind, you can refine them further to order your
    mind.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 随着更好的想法浮出水面，您可以进一步细化它们以整理您的思绪。
- en: The Frame Of The Game
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 游戏框架
- en: Your perspective is the frame from which you perceive reality.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 您的视角是您感知现实的框架。
- en: Like a camera.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 就像一台相机。
- en: The field of view, even if the background is blurred, constrains what registers
    in the frame itself.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 视野范围，即使背景模糊，也会限制在框架本身中注册的内容。
- en: By manipulating your perspective in any situation, you can perceive what used
    to be problematic as a minor road bump.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在任何情况下操纵您的视角，您可以感知以前被视为问题的小障碍。
- en: In a video game, there are two things that order consciousness in a way that
    reduces anxiety, overwhelm, and stress.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 在视频游戏中，有两样东西以减少焦虑、压倒性和压力的方式对意识进行排序。
- en: '**1) Rules**'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 规则**'
- en: Every video game has a set of rules that have to be followed in order to win
    the game without cheating.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 每个视频游戏都有一套规则，必须遵守才能在不作弊的情况下赢得游戏。
- en: When we play the game, this allows us to use our limited conscious attention
    to remain focused on the here and now – while holding the end goal in the back
    of our mind.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们玩游戏时，这允许我们使用有限的意识注意力专注于此时此地——同时将最终目标放在心底。
- en: In psychology, dopamine spurts into your brain at the thought of possessing
    something desirable in the future (i.e. winning the game or your vision).
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 在心理学中，多巴胺在您想到未来拥有某种渴望的东西时涌入大脑（例如赢得游戏或您的愿景）。
- en: The “here and now” chemicals – like serotonin, oxytocin, and endorphins – reward
    your brain when you appreciate what’s in front of you (i.e. playing the game or
    executing priority tasks).
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: “此时此地”的化学物质——如血清素、催产素和内啡肽——当您欣赏眼前的事物时（例如玩游戏或执行优先任务）会奖励您的大脑。
- en: So, it only makes sense that when you play the game with the intention of winning,
    you are much more likely to kick into the enjoyable state of flow.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当您带着赢得游戏的意图玩游戏时，您更有可能进入愉快的流动状态。
- en: '*Flow, by scientific measures, is just a cocktail of reward chemicals flooding
    your brain that are manipulated through focused attention.*'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: '*流动，从科学的角度来看，只是奖励化学物质在您大脑中泛滥的鸡尾酒，这些化学物质通过专注的注意力被操纵。*'
- en: But, only if you meet other requirements that we will discuss soon.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，只有当您满足我们很快将要讨论的其他要求时。
- en: In the real world, and on the macro scale of life, **your “rules” are your values.**
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实世界中，在生活的宏观尺度上，**您的“规则”就是您的价值观**。
- en: The things that you deem as important.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 您认为重要的事物。
- en: When you act in alignment with your values, while constraining those actions
    to be conducive to your life’s purpose, maximum enjoyment ensues.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 当您按照自己的价值观行事，同时将这些行动限制在有助于您生活目标之内时，您将获得最大的乐趣。
- en: On the micro scale of everyday situations, clarity comes from eliminating environmental
    distractions.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 在日常生活的微观尺度上，清晰来自消除环境干扰。
- en: Like when you are trying to do deep work.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 就像您试图进行深度工作一样。
- en: You close browser tabs, put on noise-canceling headphones, and have clear steps
    for your work.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 您关闭浏览器标签，戴上降噪耳机，并为工作设定清晰的步骤。
- en: When that work is aligned with an intrinsic outcome, you can guess what happens
    next. Flow.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 当这项工作与内在结果一致时，您可以猜到接下来会发生什么。流动。
- en: Now, this doesn’t only come down to understanding and eliminating environmental
    distractions.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这不仅仅在于理解和消除环境干扰。
- en: You can create rules or boundaries in a what-used-to-be mundane situation.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在曾经平凡的情况下创建规则或界限。
- en: I used to hate going on a long walk, even when I knew they were beneficial to
    my mental and physical health.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 我曾经讨厌长时间散步，即使我知道这对我的身心健康有益。
- en: 'So, what you can do is:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，您可以这样做：
- en: Set a goal for that situation, like 2,500 steps
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为这种情况设定一个目标，比如2,500步
- en: Create rules to gamify it, like never stepping on a crack
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建规则来游戏化它，比如永远不要踩到裂缝
- en: Take the action of least resistance, like stepping out your front door
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 执行最小阻力行动，比如走出前门
- en: '*Goal, clarity, simplified action.*'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '*目标、清晰、简化行动。*'
- en: This also works in situations that you would normally hate being in.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 这也适用于你通常讨厌的情况。
- en: Like if you don’t “understand” why people watch sports or go bird watching.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 就像如果你不明白为什么人们看体育比赛或观鸟。
- en: '*Create your own game out of it.*'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: '*从中创造你自己的游戏。*'
- en: '**2) Mechanics**'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 力学**'
- en: If you haven’t played the game before, it is going to be difficult.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你以前没有玩过这个游戏，这将很困难。
- en: Your aim will suck.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 你的目标会糟糕。
- en: You will have to practice on low-level challenges.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 你将不得不在低级别挑战上进行练习。
- en: You will be awestruck by the artfulness of top-level players.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 你会被顶级玩家的技艺所震撼。
- en: Every game has a specific way for you to incorporate more of your senses, thoughts,
    and prior experience that is channeled through attention.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 每个游戏都有一种特定的方式，让你更多地融入你的感官、思维和先前的经验，这些经验通过注意力渠道。
- en: '**In a video game**, it’s pressing a series of keys, buttons, or mouse clicks.'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: '**在电子游戏中**，它是按下一系列按键、按钮或鼠标点击。'
- en: '**In board games**, it’s the effectiveness, creativity, or forward thinking
    that goes into your strategy.'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '**在桌面游戏中**，它是你策略中的有效性、创造力或前瞻性思维。'
- en: '**In sports**, it’s the conditioning of your body and how you move it in accordance
    with the goal.'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: '**在体育运动中**，它是你身体的训练以及你如何根据目标移动它。'
- en: In all of the above, it’s your perception of the situation (the frame of the
    game) and how you choose to act to win.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有上述情况中，是你的情况感知（游戏的框架）以及你如何选择行动以获胜。
- en: Feedback is important here.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 反馈在这里很重要。
- en: A game needs a way to maintain order as the game is being played.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 游戏需要一种方式来维持秩序，因为游戏正在进行。
- en: When you know how well you are doing, you are less likely to break focus.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 当你知道自己做得如何时，你就不太可能分心。
- en: If your perspective is limited and you can’t perceive a situation in a way that
    gives you clarity, it will be difficult to make a “good” move and eventually win.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你视角有限，无法以给你清晰度的方式感知一个情况，那么做出“好”的决策并最终获胜将很困难。
- en: When this happens, your mind will widen its perspective – or framed attention
    – which opens up room for distraction.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 当这种情况发生时，你的思维会拓宽其视角——或者说框架化的注意力——这为分心留出了空间。
- en: How do we improve our mechanics while playing a game?
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何在玩游戏时提高我们的力学？
- en: Practice, of course.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，是练习。
- en: In a game, you usually log in every single day to perform a repetitive process
    of tasks. Like grinding quests, farming XP, or crafting weapons to increase the
    level in your profession.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 在游戏中，你通常每天都会登录，执行一系列重复的任务。比如磨砺任务、农场经验值或制作武器以提升你职业的等级。
- en: You have to program that specific mechanic in your brain to make it effortless.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须在你的大脑中编程那个特定的力学，使其变得不费力。
- en: In other words, habit formation.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，就是习惯的形成。
- en: If you can automate the decisions you make, success becomes effortless.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能够自动化你做出的决策，成功就会变得不费力。
- en: This takes time and a perpetual thirst for learning.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 这需要时间和持续的学习渴望。
- en: We will discuss this more soon.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 我们很快会讨论这个问题。
- en: The Delicate Balance Of Anxiety & Boredom
  id: totrans-172
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 焦虑与无聊的微妙平衡
- en: <picture decoding="async" class="wp-image-889">![](../Images/54b7637af6648b2b93f2bd5248e3d364.png)</picture>
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/54b7637af6648b2b93f2bd5248e3d364.png)'
- en: When you start playing a game, especially without reading the rule book, will
    the experience be enjoyable?
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 当你开始玩游戏时，尤其是没有阅读规则手册，体验会愉快吗？
- en: Probably not.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 可能不会。
- en: And even if you knew the rules, it wouldn’t be that enjoyable until you started
    to grasp the mechanics of the game.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 即使你知道规则，除非你开始掌握游戏的力学，否则也不会觉得那么有趣。
- en: If you were a level 1 in World Of Warcraft, and *somehow* were able to fight
    a level 50 character, would it be fun?
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是在《魔兽世界》中的1级，并且*某种方式*能够与50级角色战斗，这会很有趣吗？
- en: One, you’d lose immediately.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个，你会立即失败。
- en: Two, no, it just wouldn’t be fun unless you created a better frame of the game
    in your mind – like trying to lose because you want to see how powerful a level
    50 is.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个，不，除非你在心中创造了更好的游戏框架——比如试图失败，因为你想看看50级有多强大。
- en: If you had played chess a few times with your buddies, would you even consider
    entering a competitive competition? Or playing against a Grand Master?
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你和朋友们玩了几次象棋，你会考虑参加竞争性比赛吗？或者与大师对弈？
- en: 'The lesson:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 经验教训：
- en: If your skill doesn’t match the challenge that the game presents, you’re in
    for a bad time.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你技能不匹配游戏提出的挑战，你将面临糟糕的时光。
- en: If your skill is high and the challenge low, you will get bored.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你技能高而挑战低，你会感到无聊。
- en: If your skill is low and the challenge is high, you will get anxious.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你技能低，挑战高，你会感到焦虑。
- en: The **boredom** stems from self-centeredness. Your focus breaks, a new desire
    pops into your head, and related thoughts start filling your attention.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: '**无聊**源于自我中心。你的注意力分散，一个新的欲望出现在你的脑海中，相关的想法开始占据你的注意力。'
- en: If you are bored at work, you will start thinking of more productive things
    you could be doing.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你工作中感到无聊，你可能会开始思考你可以做更多富有成效的事情。
- en: The **anxiety** stems from self-consciousness. Your focus turns toward your
    concept of self, and again, related thoughts start penetrating your field of awareness.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: '**焦虑**源于自我意识。你的注意力转向你对自己的概念，再次，相关的想法开始渗透你的意识领域。'
- en: '*“Wow, I’m not as good as I thought.”*'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: '*“哇，我并不像我想象的那么好。”*'
- en: '*“I really need to work on my backswing.”*'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: '*“我真的很需要练习我的挥杆。”*'
- en: '*“That girl is way out of my league.”*'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: '*“那个女孩完全超出了我的水平。”*'
- en: Notice the use of “I” and “my” that implies a comparison.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 注意“我”和“我的”的使用，这暗示了一种比较。
- en: 'This comparison leads to psychic entropy: the [mind tending toward disorder
    unless maintained with proper energy](https://thedankoe.com/the-cure-to-caring-what-people-think/),
    or ordered information that can be processed by the conscious mind as energy.'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 这种比较导致心理熵：[除非用适当的能量维持，否则心灵倾向于混乱](https://thedankoe.com/the-cure-to-caring-what-people-think/)，或者是有序的信息，可以被有意识的思维作为能量处理。
- en: How do we prevent this?
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 我们该如何防止这种情况发生？
- en: Through lifelong learning.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 通过终身学习。
- en: 'And if you’ve been on this letter for a bit, you know what that means:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在这封信上已经思考了一段时间，你知道这意味着什么：
- en: '[Lifelong building.](https://thedankoe.com/how-i-remember-everything-i-learn/)'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: '[终身建设。](https://thedankoe.com/how-i-remember-everything-i-learn/)'
- en: Perceiving your life as not only a game, in this perspective, but as a project.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的生活视为不仅是一个游戏，在这个视角中，还是一个项目。
- en: Holding the intention of improvement in your mind, encountering a problem that
    sparks anxiety or boredom, and learning in the form of specific knowledge to overcome
    that problem.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 在心中保持改进的意图，遇到引发焦虑或无聊的问题，并以具体知识的形式学习来克服这个问题。
- en: Don’t Hate The Player, Create The Player
  id: totrans-199
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不要恨玩家，创造玩家
- en: At this point in our history it should be possible for an individual to build
    a self that is not simply the outcome of biological drives and cultural habits,
    but a conscious, personal creation. – Mihaly Csikszentmihalyi
  id: totrans-200
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在我们历史进程的这个阶段，一个人应该能够构建一个自我，这个自我不仅仅是生物驱动力和文化习惯的结果，而是一个有意识、个性化的创造。 —— 米哈伊·契克森米哈伊
- en: I remember the first time I downloaded World Of Warcraft as a teenager.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 我记得我第一次作为青少年下载《魔兽世界》时的情景。
- en: I spent a solid 2 hours studying the minor details of each race, class, and
    options to change how I physically looked, while holding the thought of winning
    in my head to make proper decisions.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 我花了两小时的时间研究每个种族、职业和改变我外观的选项的细微细节，同时在我脑海中保持胜利的想法，以便做出正确的决定。
- en: Was I going to be a warrior? Shaman? Or something in between?
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 我会成为战士吗？萨满？还是介于两者之间？
- en: Did I want to be a troll?
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 我想要成为巨魔吗？
- en: Maybe just a human with long hair?
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 或者只是一个长头发的普通人？
- en: When I went to take on the challenge of certain quests and dungeons, did my
    personality work best as a tank, support, or damage character?
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 当我去接受某些任务和地下城的挑战时，我的个性最适合作为坦克、支援者还是伤害角色？
- en: How about when I hit level 15?
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 当我达到15级时呢？
- en: What professions would I want to pursue?
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 我想要追求哪些职业？
- en: There were so many like alchemy, mining, blacksmithing, and more that would
    determine how much I could exploit the public trade system.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多像炼金术、采矿、锻造等等，这些都会决定我能利用公共交易系统到什么程度。
- en: Once I made my choice, I then had a series of “talents” and “traits” that I
    was able to level up with experience.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我做出了选择，我就有一系列“才能”和“特质”，我可以通过经验来提升它们。
- en: And once I had leveled them to a certain point, I was given more choices that
    weren’t originally available to me.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我将它们提升到一定水平，我就有了更多最初不可用的选择。
- en: Enough with the reminiscing, how does this apply to everyday life?
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 足够回忆了，这如何应用到日常生活中？
- en: First, to paint a picture, I do not think humans are good by nature.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，为了描绘一幅画面，我认为人类天生并不善良。
- en: Like Eve eating the apple from the tree of knowledge, we have the endless desire
    to know more.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 就像夏娃吃了知识之树的苹果一样，我们有着无尽的求知欲。
- en: Learning is the foundation of the human experience.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 学习是人类经验的基础。
- en: When we are young, we don’t know any better and end up with a “self” that has
    been programmed into our minds. Learned from our environment.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们年轻时，我们不知道更好的方法，最终在心中形成了一个“自我”，这是从我们的环境中学到的。
- en: Learning, through any medium, influences our thoughts. Especially if what we
    are learning is repeated, or conditioned, into our heads.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 通过任何媒介的学习都会影响我们的思想。特别是如果我们所学习的内容被重复或条件化到我们的头脑中。
- en: Our thoughts influence behavior.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的思想影响行为。
- en: Meaning, anything that you learn or consume shapes who you are and how you act
    in this world.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 意味着，你所学习或消费的任何事物都会塑造你的个性和在这个世界中的行为方式。
- en: Winning the game of life, business, or any present-moment situation you are
    in is dependent on how your character frames, perceives, and acts within that
    game.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 赢得人生、商业或任何你目前所处的当下情境，取决于你的性格如何在这个游戏中定位、感知和行动。
- en: Success is a subjective goal that we hold in our minds.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 成功是我们心中所持有的一个主观目标。
- en: A goal is achieved through the right sequence of actions.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是通过正确的行为顺序来实现的。
- en: So, if we want to achieve the life of our dreams, we have to create a character
    that can play the game of life well.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果我们想要实现我们梦想中的生活，我们必须创造一个能够很好地玩人生游戏的性格。
- en: How do we create our character?
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何塑造我们的性格？
- en: '**1) By integrating everything we’ve discussed in this letter.**'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 通过整合我们在这封信中讨论的每一件事。**'
- en: You need an intrinsic hierarchy of goals to order your mind at any given moment.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要一个内在的目标层次结构来在任何给定时刻排序你的思想。
- en: When you get lost, bring your attention to your vision, goals, and priorities
    to gain clarity.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 当你迷失方向时，将你的注意力集中在你的愿景、目标和优先事项上，以获得清晰。
- en: '**2) Through self-education and self-reflection.**'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 通过自我教育和自我反思。**'
- en: Your hierarchy of goals presents a series of challenges that you will have to
    take on through skill acquisition, problem-solving, and direct experience.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 你的目标层次结构呈现了一系列挑战，你必须通过技能获取、问题解决和直接经验来承担这些挑战。
- en: These are all forms of learning.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 这些都是学习的形式。
- en: Thankfully, we live in an age where any and all information is at the edge of
    your fingertips. The solutions to your problems are found in the form of ideas
    that you must implement.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，我们生活在一个任何信息都触手可及的时代。你的问题的解决方案以想法的形式出现，你必须实施这些想法。
- en: You find these ideas by consistently consuming valuable information. Sometimes
    you have to sift through dirt to find gold. This is a lifelong process that can
    only be derailed by distraction and cheap pleasures.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过持续消费有价值的信息来找到这些想法。有时你必须筛去泥沙才能找到金子。这是一个终生的过程，只能被分心和廉价愉悦所打断。
- en: Self-reflection is how you guide future decision-making.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 自我反思是你引导未来决策的方式。
- en: How?
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 怎么做？
- en: Because it is impossible to have 100% certainty in the actions you take.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 因为在采取行动时，不可能有100%的确定性。
- en: You just have to take them.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 你只需要接受它们。
- en: And when you do, the only way you can determine whether those actions were good
    or bad is through self-reflection.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 当你这样做时，唯一确定这些行为是好坏的方式是通过自我反思。
- en: If your current life is the product of your past decisions, that means you can’t
    know the “effect” of a “cause” until it happens.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你当前的生活是你过去决定的产物，这意味着你无法知道“原因”的“效果”直到它发生。
- en: Even if you “know” what will happen because someone told you, you aren’t taking
    into account every other environmental factor that could lead to different results.
    Without direct experience, you limit your potential.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 即使有人告诉你会发生什么，你也没有考虑到可能导致不同结果的每一个环境因素。没有直接经验，你限制了你的潜力。
- en: When you sit and contemplate your decisions, that is how you find the “effect.”
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 当你坐下来沉思你的决定时，这就是你找到“效果”的方式。
- en: From that, and with time, your decisions get more and more accurate to the point
    of you reaching your goals.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 从中，随着时间的推移，你的决定会越来越准确，直到你达到你的目标。
- en: 'Let’s do a quick recap:'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们快速回顾一下：
- en: Games are a way of ordering consciousness to the point of obsession.
  id: totrans-243
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 游戏是一种将意识排序到着迷程度的方式。
- en: When you are obsessed, you stop caring what people think and play to win according
    to your values.
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你着迷时，你不再关心别人怎么想，而是根据你的价值观去赢得比赛。
- en: Games are enjoyable, and every situation in life can be mentally molded into
    a game.
  id: totrans-245
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 游戏是有趣的，生活中的每一个情境都可以在心理上塑造成一个游戏。
- en: If you want to avoid mental turmoil, your skill needs to match the challenge
    that any situation presents.
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你想要避免心理上的混乱，你的技能需要与任何情境提出的挑战相匹配。
- en: Your perspective will determine the information available to you, and if it’s
    not structured, you will misperceive it.
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的视角将决定你能获得的信息，如果它没有结构，你将误解它。
- en: Your self, a concept, is the player. With time, you want to create the character
    that can win the games that it is best at.
  id: totrans-248
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你自己，一个概念，是玩家。随着时间的推移，你想要创造一个能够赢得它最擅长的游戏的角色。
- en: I hope you all enjoyed reading this. This was one of my favorite pieces to write.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 希望你们都喜欢阅读这篇文章。这是我最喜欢写的一篇。
- en: Start playing the big game, my friends.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 开始玩大游戏吧，朋友们。
- en: – *Dan Koe*
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: – *丹·科*
