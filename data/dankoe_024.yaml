    Another episode on how I remember everything I learn is going out tomorrow.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 在YouTube上，我发布了“矩阵是真实的（这是你如何用你的心灵逃脱的方法）。”关于我是如何记住我所学的一切的另一集将在明天推出。
- en: '[Subscribe here to watch.](https://youtube.com/c/DanKoeTalks)'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: '[在此订阅以观看。](https://youtube.com/c/DanKoeTalks)'
- en: '*As always, and when you’re ready, you can find my other free and paid products
