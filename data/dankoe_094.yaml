- en: How To Reset Your Life In 7 Days
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何在7天内重置你的生活
- en: 原文：[https://thedankoe.com/letters/how-to-reset-your-life-in-7-days/](https://thedankoe.com/letters/how-to-reset-your-life-in-7-days/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/how-to-reset-your-life-in-7-days/](https://thedankoe.com/letters/how-to-reset-your-life-in-7-days/)
- en: 2 months ago, I wrote this in my notes.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 两个月前，我在笔记中写了这样一段话。
- en: I write occasional letters to myself as an awareness practice.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我偶尔会给自己写封信，作为一种意识练习。
- en: '(This is edited a bit to flow in the newsletter):'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: （这是为了在通讯中流畅而稍作编辑）：
- en: I can’t find joy in life anymore.
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我已经无法在生活中找到快乐了。
- en: ''
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It’s not the same.
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这已经不一样了。
- en: ''
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Remember when you used to go on long walks while reading or listening to lectures,
    audiobooks, or podcasts and your mind would light up with ideas?
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 记得你以前在阅读或听讲座、有声书或播客时，边走边思考，你的脑海中会闪现出想法吗？
- en: ''
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You couldn’t stop writing. Everything felt seamless. That period was like a
    blur. A 6 month flow state. You built 3 products, gained millions of readers,
    and even wrote a book.
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你停不下来写作。一切感觉都很流畅。那段时间就像一片模糊。6个月的流畅状态。你创建了3个产品，获得了数百万的读者，甚至写了一本书。
- en: ''
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you had to do it all over again right now, could you do it just as well?
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你现在不得不重新开始，你能做得一样好吗？
- en: ''
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: No way.
  id: totrans-15
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 没有办法。
- en: ''
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What did your days look like?
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你的日子看起来是怎样的？
- en: ''
  id: totrans-18
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I would wake up, go down to the lake for a walk, sit on a bench in front of
    that pond, read a book and highlight it nonstop.
  id: totrans-19
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我会醒来，走到湖边散步，坐在那个池塘前面的长椅上，不停地读书并做标记。
- en: ''
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Then, I’d go back home, take a shower, walk 10 minutes to the coffee shop, and
    write for 2 hours. Those 2 hours every morning built the entirety of your life
    right now.
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 然后，我会回家，洗个澡，步行10分钟到咖啡馆，写上2个小时。每天早上这2个小时构建了你现在的生活的全部。
- en: ''
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Then, I’d go home again, eat breakfast (you were experimenting with different
    diets, maybe that’s a clue due to the novelty and dopamine from experimentation),
    and go out on another walk.
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 然后，我再次回家，吃早餐（你当时在尝试不同的饮食，也许这就是线索，因为新鲜感和实验带来的多巴胺），然后再次外出散步。
- en: ''
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A little after noon, I’d go to the gym, eat afterward, learn on YouTube a bit,
    and then go on yet another walk.
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 午后不久，我会去健身房，之后吃饭，在YouTube上学习一点，然后再次外出散步。
- en: ''
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You’d close the day out catching up with friends, maybe working a bit more,
    and watching a show.
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你会在一天结束时和朋友聚会，也许会工作一会儿，然后看个节目。
- en: It’s been bugging me too long.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这已经困扰我很久了。
- en: I knew that there was a way to get back to that higher state of mind – not necessarily
    the lifestyle itself.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道有办法回到那种更高的精神状态——不一定是指生活方式本身。
- en: I’m not one to complain though (even though that letter-to-self sounds sappy)
    I like to fix my problems before sharing the solution with you.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是那种喜欢抱怨的人（尽管那封给自己写的信听起来很矫情）我喜欢在向你分享解决方案之前先解决问题。
- en: If you’re anything like me, you’ve noticed that these low periods of life are
    cyclical.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你和我一样，你会发现这些生活的低谷是周期性的。
- en: For a few months you feel on top of the world. You can’t stop making progress.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 几个月来，你感觉世界都在你的脚下。你无法停止进步。
- en: Then, the next few months slow down. You feel good, but things aren’t the same.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，接下来的几个月会慢下来。你感觉很好，但事情不再一样。
- en: Last, you hit a wall. Your vision is exhausted. You feel lost. Negative thoughts
    begin to flood your mind – they can cloud your mind and prevent you from collecting
    hints at your next purpose in life that sends you down a rabbit hole of obsession.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，你会遇到一个瓶颈。你的视野变得疲惫。你感到迷茫。消极的想法开始涌入你的脑海——它们可能会蒙蔽你的思维，阻止你收集关于你下一个生活目的的线索，让你陷入痴迷的兔子洞。
- en: This letter is for those in that final phase.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这封信是为那些处于最后阶段的人而写的。
- en: The ones that can’t find the same zest for life that they used to.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 那些无法找到他们曾经拥有的同样生活热情的人。
- en: The ones that can’t find joy in reading a book or walking in nature.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 那些无法从阅读书籍或在自然中散步中找到快乐的人。
- en: '2 notes before we start:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始之前，请注意以下两点：
- en: My book, The Art Of Focus, goes live on January 16th. You can [preorder the
    Kindle or Audible version now](https://theartoffocusbook.com) or wait for the
    paperback on that date (mark your calendars).
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我的书《专注的艺术》将于1月16日上线。你现在可以[预订Kindle或Audible版本](https://theartoffocusbook.com)或等待那个日期的平装版（记在你的日历上）。
- en: '[Kortex University](https://university.kortex.co) – a college level experience
    for the creator economy – is open for enrollment. Start your digital career in
    90 days by turning your worldview, interests, and expertise into a flexible online
    career.'
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[Kortex大学](https://university.kortex.co)——为创作者经济提供大学水平体验——现在开始招生。通过将你的世界观、兴趣和专业知识转化为灵活的在线职业，在90天内开始你的数字生涯。'
- en: Your Mind Is A Supercomputer Running The Game Of Life
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你的大脑是一台运行生命游戏的超级计算机
- en: When our mind is not engaged with being or doing, we allow random thoughts to
    register in our awareness. “Random” in this case does not mean half good thoughts
    and half bad thoughts. For every one good thought, there are a hundred bad ones.
    – The Art Of Focus
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当我们的心灵不专注于存在或行动时，我们允许随机思想在我们的意识中注册。“随机”在这里并不意味着一半是好的思想，一半是坏的思想。对于每一个好的思想，都有百个坏的思想。-
    焦点的艺术
- en: I want you to think of your mind as a supercomputer.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我想让你把你的大脑想象成一个超级计算机。
- en: Your ability to process information is dependent on a few things, but I want
    to bring attention to your RAM.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 你处理信息的能力取决于一些因素，但我想把注意力引向你的RAM。
- en: RAM — or “random access memory” — is one of the most important parts of a computer,
    it determines performance.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: RAM——或“随机存取存储器”——是计算机最重要的部分之一，它决定了性能。
- en: The more RAM you use up with different programs running, open browser tabs,
    and the performance requirements of what you have running, the slower your performance
    will be.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 你运行的不同程序、打开的浏览器标签以及你正在运行的任务的性能要求越多，你的性能就会越慢。
- en: This is no different from your focus, what you hold in your conscious attention.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这与你的专注力没有不同，就是你意识中持有的内容。
- en: Humans can process 10-50 bits of information per second. That adds up to 125
    billion bits of information in your lifetime.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 人类每秒可以处理10-50位信息。这加起来在你的 lifetime 中总共是1250亿位信息。
- en: Most people live with multiple high-demand programs running that are draining
    the limited creative energy they have.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人同时运行多个高需求程序，这些程序正在消耗他们有限的创造性能量。
- en: Thoughts about regretful past mistakes
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关于后悔的过去错误的思考
- en: Thoughts about stressful future happenings
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关于有压力的未来事件的思考
- en: Desires of hunger and entertainment to escape those thoughts
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 欲望和娱乐的欲望，以逃避那些思想
- en: An internal cry to break out of their conditioned way of living
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一种内在的呼声，想要打破他们习惯的生活方式
- en: A list of mixed-priority tasks that need to be finished
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一份需要完成的混合优先级任务清单
- en: Open loops of tasks they were supposed to complete but forgot about
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们本应完成但忘记的任务的开放循环
- en: The list goes on and on.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 列表可以一直列下去。
- en: The modern mind has its attention split in infinite directions by default. We
    go about our lives stressed and near sickness. Rather than living in the present
    with singular focus on a vision for the future and a worry-free mind, we are the
    opposite. Living in a false reality created by split attention.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 现代人的注意力默认分散在无限的方向。我们生活在压力和接近疾病的状态中。我们不是活在当下，专注于对未来的愿景和无虑的头脑，而是相反。生活在由分散的注意力创造的虚假现实中。
- en: When we hold too much of the past or future in the contents of our consciousness,
    chaos ensues. The mind tends toward disorder. If not kept in check, we lose the
    sense of control over our lives that leads to enjoyment. This is accomplished
    through controlled consciousness.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们把太多的过去或未来放在我们意识的 内容中时，就会产生混乱。大脑倾向于无序。如果我们不加以控制，我们就会失去对生活的控制感，这会导致享受。这是通过有意识的控制来实现的。
- en: Singular focus creates clarity. Fragmented focus creates tension. Tension allows
    stress to sneak in. Stress is the enemy of creativity.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 单一的关注力创造清晰。分散的关注力创造紧张。紧张让压力悄悄溜进来。压力是创造力的敌人。
- en: How To Win The Game Of Life
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何赢得生活游戏
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1734">![](../Images/6c1f8cee64d52a10d4fedaba427dbd4a.png)</picture>
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/6c1f8cee64d52a10d4fedaba427dbd4a.png)'
- en: Let’s imagine the 125 billion bits of information you can process in your lifetime
    as your *life’s potential.*
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象一下你一生中可以处理的1250亿位信息，这是你的*生活潜力*。
- en: Now, let’s think of your mind as the digestive system of reality.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们把你的大脑想象成现实的消化系统。
- en: If you “eat” too much information, you get anxious.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你“摄入”过多的信息，你会感到焦虑。
- en: If you “eat” too little information, you get bored.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你“摄入”太少的信息，你会感到无聊。
- en: To maximize life enjoyment, maximize the amount of time you spend at your edge.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 为了最大限度地享受生活，最大化你在边缘状态下的时间。
- en: You win the game of life by finding enjoyment, not pleasure (big difference),
    in as much of your experience as possible. Your experience is the present moment.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过在尽可能多的经历中找到乐趣，而不是快乐（两者有本质区别），来赢得生活游戏。你的经历就是当下。
- en: “Winning” the game of life isn’t an outcome but a process.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: “赢得”生活游戏不是一个结果，而是一个过程。
- en: You are either winning right now, regardless of your emotional state or status
    in the social hierarchy, or you are losing by projecting out of the present moment.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 你要么现在就赢了，无论你的情绪状态或社会阶层地位如何，要么你通过投射出当下时刻而输掉了。
- en: In bodybuilding, the optimal amount of nutrition to fuel muscle growth is just
    above maintenance. If you eat too much, you feel groggy. If you eat too little,
    you don’t have enough energy to push hard.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在健身领域，促进肌肉生长的最佳营养摄入量略高于维持量。如果你吃得太多，你会感到困倦。如果你吃得不够，你将没有足够的能量去努力。
- en: In mindbuilding, you must learn and build in unison. Metabolize your experience
    with daily practice. You don’t know where to go next because you haven’t exposed
    yourself to the information that acts as a feint light in the unknown.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在心智建设过程中，你必须学习和共同建设。通过日常实践消化你的经验。你不知道下一步该去哪里，因为你没有接触到那些在未知中充当微光的信息。
- en: In life, you must push into the unknown to fuel your mind.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在生活中，你必须进入未知领域来滋养你的心智。
- en: Expose yourself to new information and experience (**curiosity**).
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 暴露自己于新信息和经验中（**好奇心**）。
- en: Create something of value with that information to digest it (**passion**).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 用这些信息创造一些有价值的东西来消化它们（**热情**）。
- en: Expand your mind when that experience becomes a part of you with practice (**mastery**).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 当这种经验成为你的一部分时，通过实践来扩展你的思维（**精通**）。
- en: Transcend that phase of life by passing down that value to others (**connection**).
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将这种价值观传承给他人来超越那个生活阶段（**联系**）。
- en: '**That’s the recipe for the good life:**'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**这就是美好生活的秘诀：**'
- en: Create, expand, and transcend with the experience you acquire by pursuing self-generated
    goals that lead you into the unknown.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 通过追求自我生成的目标，获得经验，创造、扩展并超越。
- en: Creating Your Own Game (Or Reality)
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创造你自己的游戏（或现实）
- en: Everyone has played a game that they are completely immersed in.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都玩过一款他们完全沉浸其中的游戏。
- en: They forget everything else, enter the flow state, and may not realize that
    they are in peak experience – the beautiful spot where new information is digested
    as reality flows through them.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 他们忘记了所有其他事情，进入了心流状态，可能没有意识到他们正处于巅峰体验——新信息被现实流经时的美丽之地。
- en: When you start playing a game, you go through a tutorial phase that introduces
    you to the rules, goals, and skills required to play the game well.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 当你开始玩游戏时，你会经历一个教程阶段，介绍你游戏的规则、目标和所需的技能。
- en: 'Games are a hierarchy of goals:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 游戏是一个目标层级：
- en: How to win
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何获胜
- en: How to progress to each sub-goal of winning
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何进步到赢得每个子目标
- en: Upgrading your character to continue progressing
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提升你的角色以继续进步
- en: Every level of the game requires a certain level of skill to match the challenge
    of that level.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 游戏的每个级别都需要一定的技能水平来匹配那个级别的挑战。
- en: If you are an absolute beginner, you have no business challenging a higher level.
    You will lose in that moment and probably quit.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一个绝对的新手，你没有资格挑战更高水平。在那个时刻，你可能会失败并可能放弃。
- en: You have to go through the same progression as everyone else.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须经历与其他人相同的进步过程。
- en: You must learn, fail, practice, get better, and expand your knowledge of the
    game as you progress.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你进步，你必须学习、失败、练习、变得更好，并扩展你对游戏的了解。
- en: In life, it’s no different.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在生活中，情况没有不同。
- en: So, to get immersed in the game of your own life, you must first create it.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，要沉浸于自己的生活游戏中，你必须首先创造它。
- en: How To Reset Your Life In 7 Days
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何在7天内重置你的生活
- en: This is a process I run through when life gets a bit too messy.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我当生活变得有些混乱时运行的过程。
- en: Like when you’re constantly thinking back to a time when “life was better.”
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 就像你总是回想起“生活曾经更好”的那个时刻。
- en: Or when your routines fall apart and all of these little tasks pop up that drain
    all of your time in the day.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 或者当你的例行公事崩溃，所有这些小任务都冒出来，耗尽你一天中的所有时间。
- en: We are going to run through this process fast… please put it to use.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将快速地完成这个过程……请将其付诸实践。
- en: 'Here’s how you reset your life in 7 days:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是你在7天内重置生活的步骤：
- en: 1) Take Note Of How You Feel
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 注意你的感受
- en: 'Pull out a notebook and write down:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 拿出笔记本并写下：
- en: Exactly what you are doing on a daily basis.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这正是你每天都在做的事情。
- en: How you feel morning, afternoon, and night.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 早晨、下午和晚上的感受。
- en: Take 10 minutes and get specific.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 抽出10分钟，变得具体。
- en: This is important for identifying unconscious parasites (time and energy suckers).
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 这对于识别无意识的寄生虫（时间和能量消耗者）很重要。
- en: I do all of this in the quarterly section of [The FOCI Planner](https://thedankoe.com/planner).
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 我在[FOCI计划者](https://thedankoe.com/planner)的季度部分做所有这些。
- en: 2) Get Clear On What You Want
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 明确你想要什么
- en: <picture decoding="async" class="wp-image-1735">![](../Images/381a3adfb03e5adddcd00f2e8cd72f26.png)</picture>
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-1735">![](../Images/381a3adfb03e5adddcd00f2e8cd72f26.png)</picture>
- en: '*You have to realize what you don’t want to figure out what you want – even
    if it is destructive – to realize what you don’t want. Preventing yourself from
    making mistakes is the stupidest mistake of all.*'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '*你必须意识到你不想知道什么，才能弄清楚你想要什么——即使它具有破坏性——才能意识到你不想什么。防止自己犯错误是所有错误中最愚蠢的。*'
- en: It is impossible to know with absolute certainty what is going to happen in
    the future.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 无法绝对确定未来会发生什么。
- en: This is why the masses flock to “secure” jobs and belief systems.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么大众都涌向“安全”的工作和信仰体系。
- en: It’s an illusion of certainty to avoid struggle. You can’t skip making mistakes.
    Mistakes are your light in the dark.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 避免挣扎的确定性是一种错觉。你不能跳过犯错误。错误是你在黑暗中的光明。
- en: Start with a minimum viable vision.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 从一个最小可行愿景开始。
- en: What do you want your life to look like?
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你希望你的生活看起来是什么样子？
- en: What do you want your mind to look like?
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你希望你的思想看起来是什么样子？
- en: What do you want your body to look like?
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你希望你的身体看起来是什么样子？
- en: '*Get specific and write down every detail for your future.*'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '*具体化并写下你未来的每一个细节。*'
- en: Now, break it down into goals.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，将其分解为目标。
- en: Not for achievement, but for clarity.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 不是为了成就，而是为了清晰。
- en: Yearly goals and monthly goals.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 年度目标和月度目标。
- en: You need direction for your life. Goals are a filter for skills to learn and
    opportunities to register.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要给你的生活指明方向。目标是对学习技能和抓住机会的筛选。
- en: Your day-to-day experience must be perceived through your vision as the game
    you are trying to win.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 你的日常体验必须通过你的愿景，作为你试图赢得的游戏来感知。
- en: 3) Prioritize, Remove, & Restructure Your Days
  id: totrans-122
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 优先考虑，去除，并重构你的日子
- en: 'The reason you aren’t getting the results you used to is because:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有得到你曾经得到的结果的原因是：
- en: You feel pressed for time
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你感到时间紧迫
- en: You don’t have the energy to get results
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你没有能量去取得结果
- en: '*You stopped doing the things that got results*'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*你停止了那些能取得结果的事情*'
- en: Look over your brain dump from above.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 查看上面的脑图。
- en: What can you change?
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 你能改变什么？
- en: Prioritize the things that will get results.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 优先考虑那些能取得结果的事情。
- en: Remove the things that snuck their way into your day (and don’t deserve to be
    there).
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 去除那些悄悄进入你一天的事情（而且不配在那里）。
- en: Restructure specific tasks and obligations to free up more time.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 重新组织具体任务和义务，以腾出更多时间。
- en: Get the chaotic structure of your mind on paper and reorganize it.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 将你混乱的思维结构写在纸上并重新组织它。
- en: 4) Cornerstone Habits Of The Good Life
  id: totrans-133
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 好生活的基石习惯
- en: <picture decoding="async" class="wp-image-1736">![](../Images/79b4a2ea879dcc161b24d65d817c2ab9.png)</picture>
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-1736">![](../Images/79b4a2ea879dcc161b24d65d817c2ab9.png)</picture>
- en: You now have direction (goals) and awareness of why you aren’t achieving them
    (anti-goals).
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在有了方向（目标）和意识到为什么你没有实现它们（反目标）的认识。
- en: 'Now, you need to cultivate 2 habits to bridge the gap:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你需要培养两个习惯来弥合差距：
- en: '**Learning** – for novel information to fuel your skill acquisition and knowledge.'
  id: totrans-137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**学习**——为你的技能获取和知识积累提供新的信息。'
- en: '**Building** – to metabolize the information and build mental muscle.'
  id: totrans-138
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**构建**——消化信息并构建心理肌肉。'
- en: Both are expensive dopamine.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 这两种都是昂贵的多巴胺。
- en: Start with 30 minutes of each a day.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 从每天30分钟开始。
- en: 30 minutes of self-education in the morning.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 早上30分钟的自学时间。
- en: 30 minutes of building a project that will contribute to your vision.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 每天用30分钟构建一个有助于你愿景的项目。
- en: If you can’t set aside 1 hour each morning, when distractions are minimal, to
    build your future – go back to step 3 and get your priorities straight.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不能在每天早上留出1小时，当干扰最小的时候，来构建你的未来——回到第3步，理清你的优先级。
- en: If you want, you can learn the high-value skill of digital writing with my course,
    [2 Hour Writer](https://2hourwriter.com), to build a future in the new economy.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你愿意，你可以通过我的课程[2小时作家](https://2hourwriter.com)学习高价值的数字写作技能，在新经济中构建未来。
- en: 5) Create A Week Long Plan
  id: totrans-145
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5) 制定一周计划
- en: You are in this chaotic spot in life because of entropy.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 你之所以处于生活中的混乱之地，是因为熵。
- en: The organization of your life (and therefore the mind) tends toward disorder
    if you don’t perform mental housekeeping.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不进行心理整理，你的生活组织（以及因此的思维）倾向于无序。
- en: This is dangerous because you can pick up bad habits along the way.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 这很危险，因为你可能会在这个过程中养成坏习惯。
- en: Habits are difficult to break.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 习惯很难改变。
- en: But you can make the process easier with clarity.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 但你可以通过明确性使这个过程更容易。
- en: Take 10 minutes.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 用10分钟。
- en: Write out every single thing you are going to do for the next week.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 写下你接下来一周要做的每一件事。
- en: This shouldn’t sound crazy or difficult.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 这不应该听起来疯狂或困难。
- en: This is how you reduce the friction of making better decisions.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何减少做出更好决策的摩擦。
- en: 'Write out:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 写下来：
- en: Your morning routine
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的早晨常规
- en: Your focused work routine
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的专注工作常规
- en: Other tasks and meetings
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其他任务和会议
- en: Nightly routine
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 晚间常规
- en: The hardest part is not giving attention to the negative thoughts that inevitably
    pop up when mediocre habits are threatened. Mindfulness is your friend for starting
    your new plan.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 最困难的部分不是关注那些在威胁到平庸习惯时不可避免地出现的负面想法。正念是你的新计划的朋友。
- en: You will have to experiment as you go.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要在实践中不断尝试。
- en: If the routine doesn’t flow, go back to your notebook and write what you’re
    going to do the next day.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 如果常规不顺畅，回到你的笔记本上，写下你第二天要做什么。
- en: This is how you create a system for your life.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何为你的生活创建一个系统。
- en: You create a system for your life by mapping out your week, sticking to the
    plan, identifying problems, experimenting with solutions, and repeating the process
    until you reach your ideal future.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 通过规划你的周计划，坚持计划，识别问题，尝试解决方案，并重复这个过程，直到达到你理想的未来，你为你的生活创建一个系统。
- en: It gets more efficient with time if you make this ‘mental housekeeping’ a regular
    practice.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你将这种“心理整理”变成一种常规实践，随着时间的推移，它会变得更加高效。
- en: Before you know it, new skills will become second nature and you will be baffled
    by how far you’ve come.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 不知不觉中，新技能将变得自然而然，而你也会对你的进步感到惊讶。
