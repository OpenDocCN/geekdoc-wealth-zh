- en: The Uncertainty Crisis (Why Everyone Feels So Lost)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 不确定性危机（为什么每个人都感到如此迷茫）
- en: 原文：[https://thedankoe.com/letters/the-uncertainty-crisis-why-everyone-feels-so-lost/](https://thedankoe.com/letters/the-uncertainty-crisis-why-everyone-feels-so-lost/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/the-uncertainty-crisis-why-everyone-feels-so-lost/](https://thedankoe.com/letters/the-uncertainty-crisis-why-everyone-feels-so-lost/)
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2158">![](../Images/e7d1f8ce9cf23405e9817ae7c192373c.png)</picture>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-2158">![](../Images/e7d1f8ce9cf23405e9817ae7c192373c.png)</picture>
- en: 'Whenever my mom calls me she asks:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 每次妈妈打电话给我，她都会问：
- en: '*“Did you do anything fun this weekend?”*'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '*“这个周末你做了什么有趣的事情吗？”*'
- en: 'For the past few years, my answer was almost always:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的几年里，我的回答几乎总是：
- en: '*“Nope, just the same old stuff.”*'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '*“没有，还是老样子。”*'
- en: Of course, I’d have the occasional trip or event that she wants to hear all
    about, but most of the time, the answer just involved working, writing, walking,
    lifting, and eating. The things I do every day.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，偶尔我会去参加她想要听我详细描述的旅行或活动，但大多数时候，答案只是涉及工作、写作、散步、举重和吃饭。这些都是我每天做的事情。
- en: 'Her response was always:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 她的回答总是：
- en: '*“Oh, you should go out more! You’re young Daniel!”*'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '*“哦，你应该多出去走走！你年轻，丹尼尔！”*'
- en: I always thought there was something wrong with me.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直觉得我有什么地方不对劲。
- en: She was right, I thought.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我觉得她是对的。
- en: I *should* go out more.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我*应该*出去更多。
- en: Am I wasting the years that matter the most?
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我是不是在浪费那些最重要的岁月？
- en: Will I look back and regret doing the same old thing, day after day?
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我会回头看看，后悔日复一日地做同样的事情吗？
- en: So, I pushed myself to go out more.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，我强迫自己出去更多。
- en: What I discovered was that I only started to feel more lost and dissatisfied
    with life.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我发现的是，我刚开始感到更加迷茫和对生活感到不满。
- en: As mom continued to call and ask that question, it started to click.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 随着妈妈继续打电话并问这个问题，我开始意识到。
- en: '*“So, did you do anything fun this weekend?”*'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '*“这个周末你做了什么有趣的事情吗？”*'
- en: Nope, just the same old stuff.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 不，还是老样子。
- en: '*“Why don’t you go out and have some fun?”*'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '*“你为什么不出去找点乐子？”*'
- en: Well…
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯...
- en: Nothing is as fun as what I do every single day.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 没有什么比我所做的每天的事情更有趣。
- en: That question assumes that doing anything is more enjoyable than the same old
    stuff, but the same old stuff is what leads to meaning, presence, and flow. Operating
    at your peak capacity is so much more enjoyable than constantly tapping pleasurable
    distractions to fill the void in your soul.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这个问题假设做任何事情都比老样子更有趣，但老样子才是导致意义、存在和流畅的原因。在最佳状态下运行比不断敲打令人愉悦的干扰来填补你灵魂中的空虚要有趣得多。
- en: Why would I go out and conform to what society says is fun just to fit in and
    seem like I *am* doing something fun?
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我为什么要出去，迎合社会认为的有趣，只是为了融入并显得自己*好像*在做一些有趣的事情呢？
- en: Late nights that throw off your sleep schedule and slowly destroy your mental
    and physical health.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 晚上熬夜打乱你的睡眠时间表，并逐渐破坏你的精神和身体健康。
- en: Hangovers that rot your brain, ruin your focus, and make it difficult to perform
    in the things that are enjoyable, not pleasurable.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 酒精中毒会腐蚀你的大脑，破坏你的注意力，让你难以在享受的事情上表现。
- en: Pigging out on food bombed with grease and sugar and whatever else they put
    in it to make you addicted to it.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 狂吃油腻、含糖的食物，以及他们为了让你上瘾而放入其中的任何其他东西。
- en: Now, I didn’t exactly say this to my mom. I’m not that rude.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我并没有直接和妈妈这么说。我并不那么粗鲁。
- en: I also don’t think that those things should be eradicated from your life as
    a whole.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我也不认为这些事情应该从你的生活中完全消除。
- en: The occasional night out can be a great tactical reset. It can force you to
    feel like shit so you crave feeling better. It can open you up to conversations
    you wouldn’t have normally had, leading to breakthroughs in your work. It can
    expose you to lower states of consciousness so you can navigate their contents
    and use them to your benefit.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 偶尔的夜晚外出可以是一个很好的战略重置。它可以让你感到糟糕，从而渴望感觉更好。它可以让你接触到你通常不会有的对话，从而在你的工作中取得突破。它可以让你接触到意识较低的状态，这样你就可以导航其内容并从中受益。
- en: The lady and I went out for her birthday last night and had a great time. I’m
    a bit fuzzy while writing this, but I wouldn’t trade nights like that for anything
    else.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 昨晚我和那位女士出去给她庆祝生日，玩得很开心。我写这封信的时候有点晕，但我不愿意用任何其他东西来交换那样的夜晚。
- en: This entire idea is a conversation I had with a business friend of mine.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 整个想法是我和一个商业朋友之间的对话。
- en: He commented that people feel lost because they haven’t created a lifestyle
    they don’t want to escape from.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 他评论说，人们感到迷茫是因为他们还没有创造出一个他们不想逃离的生活方式。
- en: That comment shot me down a rabbit hole of how the modern world has set people
    up for failure.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 那条评论让我陷入了对现代世界如何让人们为失败做准备的思考。
- en: 'So that’s what we’re here to discuss:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 所以这就是我们在这里要讨论的：
- en: The problem with modernity and why people – especially young people – feel so
    lost, confused, and uncertain about their future.
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现代性的问题以及为什么人们——尤其是年轻人——对未来感到如此迷茫、困惑和不确定。
- en: The opportunity that technology and the information age provides and how few
    people have taken advantage of it.
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 技术和信息时代提供的机会以及有多少人利用了这些机会。
- en: How setting standards will change your life (and 7 standards you must set for
    yourself if you want to live with purpose).
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设定标准将如何改变你的生活（以及如果你想要有目标地生活，你必须为自己设定的7个标准）。
- en: How to create your ideal day so you can stop hating Mondays and feeling like
    you need to fill a hole in your identity.
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如何创造你理想的一天，这样你就可以停止讨厌星期一，感觉你需要填补你身份上的一个空缺。
- en: 'For those struggling right now:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些现在正在挣扎的人来说：
- en: There is a way out.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 有一种方法可以走出困境。
- en: There is a way to navigate the chaos.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 有一种方法可以驾驭混乱。
- en: There is a way to have a sense of control over where you end up.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 有一种方法可以让你对最终的结果有所掌控。
- en: You live in a time where you can create a life you love waking up to every single
    morning.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 你生活在一个可以创造一个你每天早上醒来都喜欢的生命的时代。
- en: The first step to getting out is understanding what got you there in the first
    place.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 走出困境的第一步是理解你最初是如何到达那里的。
- en: 'The Uncertainty Crisis: A Holistic Problem'
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不确定性危机：一个全面的问题
- en: You feel terrible because your subconscious knows that you could be doing better.
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你感觉非常糟糕，因为你的潜意识知道你可以做得更好。
- en: ''
  id: totrans-48
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [December 28, 2021](https://twitter.com/thedankoe/status/1475819335277031427?ref_src=twsrc%5Etfw)
  id: totrans-49
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2021年12月28日](https://twitter.com/thedankoe/status/1475819335277031427?ref_src=twsrc%5Etfw)
- en: The problem of uncertainty starts with the fact that you outsourced your sense
    of certainty.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 不确定性的问题始于你将你的确定性外包出去的事实。
- en: 'This is how it goes:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是这样：
- en: You’re born into a culture with specific beliefs, values, and standards.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 你出生在一个具有特定信仰、价值观和标准的文化中。
- en: As you learn to walk, run, and speak your mind is molded to match those around
    you. You can’t control this. It’s how you survive.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 当你学习走路、跑步和表达自己的思想时，你的思想被塑造成与周围人相匹配。你无法控制这一点。这就是你生存的方式。
- en: Before you know it, the only goals on your mind are to go to school, get a job,
    marry someone, go on some fun vacations, and retire someday. These goals vary
    from family to family. Some families force moral success and religious beliefs,
    others force academic success, and others encourage entrepreneurial success.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在你意识到之前，你心中的唯一目标就是上学、找工作、结婚、去一些有趣的度假地，以及有朝一日退休。这些目标因家庭而异。有些家庭强迫道德成功和宗教信仰，有些家庭强迫学术成功，而有些家庭则鼓励创业成功。
- en: If you understand the mind and human behavior, you can spot the problem with
    this.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你理解了思想和人类行为，你就能发现这个问题所在。
- en: The unconscious programmed goals sitting deep in your psyche shape how you act,
    who you are, and what opportunities are available for your awareness to register.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 深藏在你的心理深处的无意识设定的目标塑造了你的行为方式，你是谁，以及哪些机会能够被你的意识所察觉。
- en: You have the same mind as your parents, who have the same mind as theirs, who
    have the same mind as theirs.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 你拥有和你父母一样的思想，他们拥有和他们父母一样的思想，他们又拥有和他们父母一样的思想。
- en: Unless… someone in that family tree questioned their beliefs and sought a better
    way of doing things.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 除非……家族树中的某个人质疑了自己的信仰并寻求更好的做事方式。
- en: The world has changed.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 世界已经改变了。
- en: Technological advancement came fast.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 技术进步来得很快。
- en: The world is much, much different than it was just 10 years ago. And if you’re
    operating from a set of 100-year-old beliefs, it’s no wonder you feel so lost.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 世界与10年前相比，已经大不相同。如果你仍然按照100年前的信念行事，你感到如此迷茫也就不足为奇了。
- en: You lack purpose because the modern world is drowning in information.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 你缺乏目标，因为现代世界被信息淹没。
- en: You don’t know how to make sense of it all.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 你不知道如何理解这一切。
- en: Your beliefs don’t match the environment.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 你的信念与你的环境不匹配。
- en: You outsourced your certainty to society, your parents, your teachers, the government,
    and religious ideologies.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 你将你的确定性外包给了社会、你的父母、你的老师、政府以及宗教意识形态。
- en: Now that there’s an abundance of information that challenges what you believe,
    your focus is split, and your mind is in a constant state of disorder until you
    decide to reprogram your own mind.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 现在信息量如此丰富，挑战了你的信念，你的注意力分散，直到你决定重新编程自己的思想，你的思想才会处于持续的无序状态。
- en: What served your survival in your local environment is not going to help you
    survive and thrive in a world that is rapidly changing. Your parents probably
    didn’t push you out of the nest so you could learn to fly, so you have to take
    the leap on your own.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的本地环境中为你生存服务的那些东西，在快速变化的世界中，将无法帮助你生存和繁荣。你的父母可能不会把你推出巢穴，让你学会飞翔，所以你必须自己跳出去。
- en: Not to mention, most workers fear replacement within the next 10 to 20 years.
    Another distraction that could be easily resolved by taking matters into your
    own hands and starting a business. I discussed this last week in [The Future Of
    Work](https://thedankoe.com/letters/the-future-of-work-acquire-this-skill-stack/).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 更不用说，大多数工人担心在接下来的10到20年内被取代。这是一个可以通过自己动手创业来轻易解决的干扰。我上周在[工作未来](https://thedankoe.com/letters/the-future-of-work-acquire-this-skill-stack/)中讨论了这一点。
- en: If you want to learn a skill that hasn’t and won’t go out of style (and allows
    you to be a deep generalist, making you irreplaceable), learn [high-impact writing.](https://2hourwriter.com)
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要学习一种不会过时（并允许你成为一个深度通才，使你变得不可替代）的技能，那就学习[高影响力写作](https://2hourwriter.com)。
- en: The question is, how does one change the code their mind operates on?
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 问题在于，一个人如何改变他们思维运作的代码？
- en: How can you write the code in a way that allows for meaningful progress in your
    life?
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何编写代码，以便在你的生活中实现有意义的进步？
- en: How do you find clarity in a society that benefits from you being a cog in the
    machine?
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个从你作为机器齿轮中获益的社会中，你如何找到清晰的方向？
- en: We’ll get to that.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我们会谈到这一点。
- en: Because it gets much worse before it gets better.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 因为在变好之前，它会变得更糟。
- en: The Modern Environment
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 现代环境
- en: Let’s paint a brutal picture of modern life.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们描绘一幅现代生活的残酷画面。
- en: Most people are dopamine-depleted from unnecessary Adderal prescriptions, phones,
    and distractions that lead to anhedonia – the inability to feel pleasure. Since
    people are at the point where their “normal” state is feeling like complete shit,
    they try to feel something, anything, by whatever means possible.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 由于大多数人的多巴胺因不必要的阿得拉处方、手机和导致快感缺失的干扰而耗尽——快感缺失是指无法感受到快乐。由于人们已经到了他们的“正常”状态就像完全糟糕透顶的地步，他们试图通过任何可能的手段来感受一些东西，任何东西。
- en: You are in a constant state of survival and stress.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 你处于一种持续的生存和压力状态。
- en: Your mind is narrow and can only notice quick opportunities to get a hit of
    short-lived pleasure.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 你的思维变得狭隘，只能注意到快速获得短暂快乐的机会。
- en: From this low state of consciousness, you are robotic and animalistic. You chose
    to pursue the goals society assigned to you. You didn’t focus on solving the unique
    set of problems you grew into that make you unique and valuable. You neglected
    your health, finances, and mind for the sake of conforming to what others wanted
    for you, and now those problems sit around creating chaos and you don’t know what’s
    going on.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 从这种低意识状态出发，你变得机械化和动物化。你选择追求社会赋予你的目标。你没有专注于解决你成长过程中独特的、使你独特和有价值的那些问题。你为了迎合他人对你的期望而忽视了你的健康、财务和心灵，现在这些问题四处蔓延，制造混乱，而你却不知道发生了什么。
- en: The average person stuffs themselves with processed food.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 普通人用加工食品填饱肚子。
- en: They have an emotional reaction every time they see a social media post.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 每次看到社交媒体帖子，他们都会有情绪反应。
- en: They feel the need to argue and prove their worth any time they can.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 他们觉得在任何时候都有必要争论和证明自己的价值。
- en: Beyond that, they never go out in the sun.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，他们从不出去晒太阳。
- en: They stare at screens all day.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 他们整天盯着屏幕。
- en: They sit in fluorescent-lit cubicles.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 他们坐在荧光灯照亮的隔间里。
- en: Their work lacks challenge and meaning.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的工作缺乏挑战和意义。
- en: All of this feeds back into each other and splits off into more problems.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都相互影响，并分裂成更多的问题。
- en: Your sex drive takes a hit because your estrogen and prolactin are sky-high.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 你的性欲受到了打击，因为你的雌激素和催乳素水平极高。
- en: Your testosterone levels are tanked.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 你的睾酮水平急剧下降。
- en: Your body grows soft and pudgy, you start losing your hair, and the man boobs
    popping up on your chest make you self-conscious. You start walking with a slouched,
    unconfident posture and want to hide yourself from the world.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 你的身体变得柔软和臃肿，你开始脱发，胸部突起的胸肌让你感到尴尬。你开始以驼背、不自信的姿态走路，并想从世界中隐藏自己。
- en: For women, there’s a similar hormonal phenomenon.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 对于女性来说，也存在类似的激素现象。
- en: Birth control is prescribed like candy.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 避孕药像糖果一样被开处。
- en: Anti-depressants are the “normal” option for mental health because they make
    more money than going through the slight discomfort of simple lifestyle changes.
    But since you haven’t made a simple lifestyle change before, your mind convinces
    you that it’s incredibly hard, and you project that excuse at any chance you can
    rather than just changing.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 抗抑郁药是心理健康问题的“正常”选择，因为它们能带来比通过简单的生活方式改变带来的轻微不适更多的收入。但因为你之前没有进行过简单的生活方式改变，你的大脑会说服你这是极其困难的，你会在任何可能的机会下提出这个借口，而不是仅仅改变。
- en: Men and women alike lack the energy or care to meet new people, exercise, or
    change their habits.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 男女双方都缺乏能量或关心去结识新人、锻炼或改变他们的习惯。
- en: The masculine/feminine balance on a social scale is getting closer and closer
    to neutral. There’s no polarity. We are fighting the laws of nature and suffering
    immensely because of it. I’m not saying the solution is to regress to a time before
    technology and “return to tradition.” I’m suggesting that you integrate and adapt
    to the modern environment. Solve your own problems.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在社会层面上，男性和女性的平衡越来越接近中性。没有极性。我们正在与自然法则作斗争，因此遭受了巨大的痛苦。我并不是说解决方案是回归到技术之前的时代和“回归传统”。我建议你融入并适应现代环境。解决你自己的问题。
- en: Beyond that, subconsciously you know that chaos is increasing exponentially.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，潜意识中你知道混乱正在呈指数级增加。
- en: Entropy takes hold from your lack of effort, and by doing nothing with your
    life, you slowly start to drown, but that’s only added pressure to the already
    terrible situation.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 由于你的不努力，熵开始占据主导地位，通过无所作为，你慢慢地开始沉沦，但这只是给已经糟糕的情况增加了压力。
- en: The first step to change is becoming aware of all of this.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 改变的第一个步骤是意识到所有这些。
- en: You have to sit with it, contemplate it, and get so angry that you have no option
    but to revolt.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须坐下来思考它，愤怒到没有其他选择，只能反抗。
- en: Then, with that new spiritual energy source, you use the abundance of information
    available to you to self-educate, pursue new goals, and dig yourself out of the
    rut.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，利用你可获得的信息的丰富性，你进行自我教育，追求新的目标，并从困境中摆脱出来。
- en: Uncertainty is a holistic issue.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 不确定性是一个整体问题。
- en: Your environment, your hormones, your mindset, your work, your lifestyle, your
    culture, your society… it can all serve you or pile drive you into the ground.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 你的环境、你的荷尔蒙、你的心态、你的工作、你的生活方式、你的文化、你的社会……它们都可以为你服务，或者将你压垮到地面。
- en: The cure is becoming multi-dimensionally jacked.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 治疗方法正变得多维度地强大。
- en: You must take care of your mind, body, and finances before anything else.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 在其他任何事情之前，你必须照顾好自己的心灵、身体和财务。
- en: You change the world by changing yourself and letting your decisions ripple
    through consciousness.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过改变自己，让你的决定在意识中产生涟漪来改变世界。
- en: But still…
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 但仍然...
- en: It gets worse before it gets better.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 在变好之前，它会变得更糟。
- en: Young People Are Set Up To Fail
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 年轻人注定要失败
- en: Wealth and prosperity are here.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 财富和繁荣就在这里。
- en: They’re just not evenly distributed.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 它们并不均匀分布。
- en: It’s not difficult to log on to social media and see people make a few million
    dollars before they turn 30, or even 21, because they saw the opportunity of the
    information economy. That wasn’t possible for older generations. They don’t understand
    it.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 登录社交媒体并不难，可以看到人们在30岁之前，甚至21岁之前就赚了几百万美元，因为他们看到了信息经济的机遇。这对上一代人来说是不可能的。他们不理解。
- en: So, if you don’t value absolute self-reliance, you will be thrown to the side.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，如果你不重视绝对的自给自足，你将被抛在一边。
- en: Why?
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: Because the lawmakers are all from previous generations.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 因为立法者都来自上一代人。
- en: Society is shaped by those at the top of it.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 社会是由处于顶层的人塑造的。
- en: The opportunities to achieve wealth and prosperity the old way – go to school,
    get a job, buy a house, get married, etc – are influenced by those who make the
    laws.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 通过旧的方式——上学、找工作、买房、结婚等——实现财富和繁荣的机会受到制定法律的人的影响。
- en: Housing has doubled from pre-pandemic to now, so people would rather waste their
    money going out and “finding themselves” with travel. They give up on investing
    in their future because it’s near impossible for someone with a decently high-paying
    job to do so. High-paying jobs are no longer high-paying because the cost of survival
    continues to increase.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 住房成本从疫情前到现在翻了一番，因此人们宁愿浪费钱去旅行，在旅途中“寻找自我”。他们放弃投资未来，因为对于拥有体面高薪工作的人来说，这样做几乎是不可能的。高薪工作不再高薪，因为生存成本持续增加。
- en: Young people aren’t mating or having kids because they can’t afford it, and
    they just don’t have the desire to. Their hormonal and psychological health are
    in the garbage can.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 年轻人因为负担不起，而且他们没有这种欲望，所以不交配或生孩子。他们的激素和心理健康都进了垃圾桶。
- en: So, the only people we spend time with are our digital friends on social media,
    our significant other (if you’re developed enough), and our close friends (if
    you’re lucky enough). Modernity can get extremely lonely if you don’t develop
    the social aspect of your life.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们唯一花时间相处的人是社交媒体上的数字朋友、你的伴侣（如果你已经足够成熟），以及你的亲密朋友（如果你足够幸运）。如果你不发展你生活的社交方面，现代性会变得极其孤独。
- en: Back to the point…
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 回到要点…
- en: The 80-year-old lawmakers have kids who are almost in their 60s.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 80岁的立法者们的孩子几乎快60岁了。
- en: They still need to call their nephew for tech support to learn how to open their
    emails on a 20-year-old computer that is flooded with viruses.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 他们仍然需要打电话给他们的侄子寻求技术支持，学习如何在20年前的电脑上打开他们的电子邮件，这台电脑充满了病毒。
- en: I shouldn’t have to explain how the values and beliefs of older generations
    influence the decisions they make and how that prevents society from seeing progress.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 我不应该解释老一辈的价值和信仰如何影响他们的决策，以及这如何阻碍社会看到进步。
- en: The lawmakers bias themselves and their children.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 立法者及其子女都带有偏见。
- en: Meaning, the only path to wealth and prosperity for you is to take a completely
    different path.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 意味着，对你来说，通往财富和繁荣的唯一途径是走一条完全不同的道路。
- en: To forget and revolt against what you’ve known as “the only way.”
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 忘记并反抗你一直认为是“唯一方式”的东西。
- en: To open your mind, set new standards, and allow yourself to grow into them.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 为了开阔你的思想，设定新的标准，并让自己成长到这些标准。
- en: The Opportunity Of The Information Age
  id: totrans-129
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 信息时代的机会
- en: <picture decoding="async" class="wp-image-2159">![](../Images/66abd96eee29b10ecf3e1d1d9cce6964.png)</picture>
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-2159">![](../Images/66abd96eee29b10ecf3e1d1d9cce6964.png)</picture>
- en: This isn’t meant to be the daily dose of nihilism you use to convince yourself
    to stay the same.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不是为了让你用虚无主义来安慰自己保持现状的日常剂量。
- en: It’s the opposite.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 这正好相反。
- en: It’s meant to make you angry, upset, and mad at yourself so you finally have
    the clarity to make a change. Like a slingshot, you use that negative energy to
    start and let momentum take over. You cultivate a positive philosophy through
    action and effort.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 这是为了让你愤怒、沮丧，并对自己感到愤怒，这样你最终才能有清晰的头脑去做出改变。就像弹弓一样，你利用那种负面能量来开始，让势头接管。你通过行动和努力培养一种积极的哲学。
- en: What you need is an opportunity.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要的是一个机会。
- en: And there are more than plenty around you.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 并且在你周围有足够的数量。
- en: The solution to your problems is technology, information, and efficiency.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 你问题的解决方案是技术、信息和效率。
- en: Going to school and getting a job is an outdated path.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 上学和找工作是一条过时的道路。
- en: Self-education, improvement, and starting a business are the only paths to full
    control over one’s mind, body, and finances.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 自我教育、改进和创业是唯一掌握自己心灵、身体和财务的途径。
- en: You are living through the second renaissance for Christ’s sake.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在经历基督的第二次文艺复兴。
- en: Can’t you see it?
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 你看不到吗？
- en: Individuals are using the internet to remove the limitations of previous generations.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 个人正在使用互联网来消除前几代人的限制。
- en: You no longer need to go to a prestigious school to make connections that lead
    to an incredible job. All you need is to publish a piece of valuable content on
    the internet for someone across the world to see it. Or, you can use that DM feature
    – with a bit of social skills and persuasion of course – that you thought was
    just for sending memes to your friends.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 你不再需要去一所著名学校来建立能带来令人难以置信的工作的联系。你所需要的只是在网上发布一些有价值的内容，让世界各地的人都能看到。或者，你可以使用那个DM功能——当然，需要一点社交技巧和说服力——你以前以为只是用来给你的朋友发表情包的。
- en: You no longer need to have a resume and spam applications to mediocre jobs you
    don’t actually want. Your personal brand is your public resume that lets an audience
    follow you based on the value you provide.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 你不再需要有一份简历和垃圾邮件般的申请平庸工作，这些工作你实际上并不想要。你的个人品牌是你的公开简历，它让听众根据你提供的价值来跟随你。
- en: You no longer need to perform a specialized role in a company you don’t care
    about. You no longer need to be a cog in the machine that sells a product for
    someone else. Thanks to technology, you can build a product or service with close
    to zero dollars, attract an audience, and acquire skills fast that allows you
    to run a one-person business.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 你不再需要在你不关心的公司中扮演一个专业角色。你不再需要成为一台机器上的齿轮，为别人销售产品。多亏了技术，你可以用几乎零成本创建产品或服务，吸引受众，并快速获得技能，让你能够经营一家一个人的企业。
- en: But, some people still ignore the opportunity.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，有些人仍然忽视了机会。
- en: They don’t realize that this is modern survival.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 他们没有意识到这本身就是现代生存。
- en: Yes, right now, it’s the internet, social media, and information that allows
    you to create your ideal lifestyle.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，现在，是互联网、社交媒体和信息让你能够创造你理想的生活方式。
- en: Times change. You won’t win if you are operating from 10-50 year old beliefs
    that you refuse to shed. The ones that take control of your mind and call anything
    new a “scam.”
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 时代在变化。如果你坚持10-50年前的信念，拒绝放弃，你将无法获胜。那些控制你思维的东西，把任何新事物都称为“骗局”。
- en: All great ideas are seen as scams until they solidify their roots in society.
    But by then, the next great “scam” is on the horizon, and only the intelligent
    people take advantage (without scamming or being scammed).
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 所有伟大的想法在它们在社会中稳固根基之前都被视为骗局。但到那时，下一个伟大的“骗局”已经在地平线上，只有聪明的人才会利用（既不进行诈骗也不被诈骗）。
- en: Yes, actual scams are a very real thing. I don’t doubt that. But a bit of critical
    thinking goes a long way.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，实际的骗局是一个非常真实的事情。我并不怀疑这一点。但一点批判性思维就能走得很远。
- en: If you want to enroll in my scam that has allowed individuals to pursue their
    life’s work, check out [Digital Economics](https://digitaleconomics.school) to
    learn the skills they won’t teach you in school.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要报名参加我那个让个人能够追求自己人生工作的骗局，请查看[数字经济学](https://digitaleconomics.school)以学习学校不会教给你的技能。
- en: In other words, they take risks on the future and create it in the process.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，他们在未来冒险，并在这一过程中创造未来。
- en: The risk-takers of the world create society by fueling new ideas they deem worthy
    of their effort. They don’t sit around waiting until it gets diluted and becomes
    accepted by the masses. Because by then, it isn’t an opportunity, it’s an assignment.
    You do it because everyone else is.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 世界的风险承担者通过推动他们认为值得自己努力的新想法来创造社会。他们不会坐等这些想法被稀释并被大众接受。因为到那时，它不再是机会，而是一项任务。你做它是因为其他人都在做。
- en: 'The question now is:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 现在的问题是：
- en: Why can’t I see new opportunities and act on them?
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我看不见新的机会并采取行动？
- en: Because your standards are non-existent.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 因为你的标准根本不存在。
- en: Setting Standards Will Change Your Life
  id: totrans-157
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设定标准将改变你的生活
- en: Your life sucks because your standards are so low that you are okay with your
    life sucking.
  id: totrans-158
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你的生活很糟糕，因为你对生活的标准如此之低，以至于你接受了生活糟糕的事实。
- en: ''
  id: totrans-159
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [October 17, 2023](https://twitter.com/thedankoe/status/1714297471906549825?ref_src=twsrc%5Etfw)
  id: totrans-160
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2023年10月17日](https://twitter.com/thedankoe/status/1714297471906549825?ref_src=twsrc%5Etfw)
- en: Your life sucks because of the thousands of tiny choices you made over the past
    year.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 你的生活之所以糟糕，是因为在过去一年中你做出了数千个微小的选择。
- en: You didn’t make the choices that led to a purposeful career.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有做出导致有意义职业的选择。
- en: You didn’t make the choices that led to fulfilling relationships.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有做出导致满足关系的决定。
- en: You didn’t make the choices that led to a healthy and aesthetic body.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有做出导致健康和美观身体的选择。
- en: “But Dan, what about genetics and where I was born and working a job that doesn’t
    allow me enough time blah blah blah”
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: “但丹，关于遗传和出生地以及从事一份不允许我有足够时间的工作等等”
- en: Yeah, those things play a role.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，这些因素都起着作用。
- en: But you just made another tiny choice to close your mind off to what you can
    do in your situation. You just relinquished your ability to solve problems… the
    only ability that will set you free.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 但你刚刚做出了另一个微小的选择，关闭了你对当前情况下能做什么的思考。你只是放弃了解决问题的能力……这是唯一能让你自由的能力。
- en: The ability to choose cannot be taken away or even given away—it can only be
    forgotten. – Greg McKeown
  id: totrans-168
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 选择的能力不能被剥夺，甚至不能被放弃——它只能被遗忘。 —— 格雷格·麦克劳恩
- en: It’s not difficult to see that you aren’t a special case. Thousands like you
    have turned their situation around. I bet you could take someone in a terrible
    position and give them steps to achieving something, but you can’t do the same
    for yourself because your mind is in the way.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 很容易看出你并不是一个特殊案例。成千上万像你一样的人已经改变了他们的处境。我敢打赌，你可以给一个处于糟糕境地的人提供实现目标的步骤，但你不能为自己做同样的事情，因为你的思维阻碍了。
- en: The quality of your life one year from now will depend on the tiny choices that
    compound into that life.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 一年后你生活的质量将取决于那些累积成生活的微小选择。
- en: You don’t have to make perfect choices.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 你不必做出完美的选择。
- en: It’s actually better if you make mistakes.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，犯错误更好。
- en: The greatest risk is no risk at all, because how else would you fail?
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 最大的风险就是没有风险，因为否则你怎么会失败？
- en: Without failure, improvement is literally impossible.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 没有失败，改进实际上是不可能的。
- en: Without improvement, you don’t have an aim for your life.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 如果没有改进，你的人生就没有目标。
- en: Without an aim for your life, everything becomes meaningless.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的人生没有目标，一切都将变得毫无意义。
- en: Becoming a better person is how you live with purpose.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 成为更好的人是你有目的地生活的途径。
- en: Broke people are okay with being broke until something catastrophic happens.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 穷人可以接受贫穷，直到发生灾难性事件。
- en: And it is much more likely for a catastrophic event to happen to them.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 对于他们来说，发生灾难性事件的可能性更大。
- en: Their car blows up because it’s old and unmaintained.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的车因为老旧且未保养而爆胎。
- en: Someone breaks into their house in a bad neighborhood.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 有人在一个糟糕的社区里闯入他们的房子。
- en: Their parents get sick and they can’t help because of their low income.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的父母生病了，因为他们收入低，无法提供帮助。
- en: Of course, they have some motivation to make money at this point, but they think
    it’s too late when the catastrophic event happens. They didn’t prepare.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，他们现在有一些赚钱的动机，但当灾难事件发生时，他们认为太晚了。他们没有做好准备。
- en: So they get trapped in an endless cycle of “I should’ve started sooner.”
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，他们陷入了“我应该早点开始”的无限循环。
- en: Eventually, things equalize. The stress in their life lowers. They start to
    enjoy their mindless comforts again. Waiting for another catastrophe to break
    them down.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，事情会趋于平衡。他们生活中的压力降低了。他们又开始享受那些无脑的舒适了。等待另一个灾难来摧毁他们。
- en: '*Successful people use these events to change who they are.*'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: '*成功的人会利用这些事件来改变自己。*'
- en: Who they are determines their standards and values.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 他们是谁决定了他们的标准和价值观。
- en: Their standards and values determine the tiny choices they make.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的标准和价值观决定了他们所做的微小选择。
- en: If you’re okay with having $5 in your bank account, you won’t see that as a
    problem.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对自己的银行账户里有5美元感到满意，你不会把它看作是问题。
- en: If you’re okay with having $100,000 in your bank account, you will see anything
    less than that as a problem that needs to be fixed.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对自己的银行账户里有100,000美元感到满意，你会把低于这个数额的任何东西看作是需要解决的问题。
- en: Problems frame your perception – I talk about this [in my book.](https://theartoffocusbook.com)
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 问题塑造了你的认知——我在我的书中谈到了这一点。[在我的书中](https://theartoffocusbook.com)
- en: You begin to notice more money-making opportunities.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 你开始注意到更多的赚钱机会。
- en: Your Google searches change to things like “how to make an extra $1,000/month.”
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 你的谷歌搜索变成了“如何每月额外赚取1000美元”之类的事情。
- en: You start having conversations about money with your friends.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 你开始和朋友讨论金钱问题。
- en: All of these tiny choices begin to compound into results.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些微小的选择开始累积成结果。
- en: You rewire your thinking patterns based on your intentional search for specific
    information relating to the problem you are facing.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 你会根据你针对面临的问题有意识地搜索的特定信息来重新配置你的思维模式。
- en: The information you consume highly impacts your identity and thus your standards.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 你所消费的信息对你的身份和标准有重大影响。
- en: If you surround yourself with people – physical or digital – that make it seem
    like it’s “okay” to be 100 pounds overweight, have zero money, work a job you
    hate, stay with a partner you despise, get drunk every night, and the rest… how
    do you think your life will end up?
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你周围的人——无论是物理的还是数字的——让你觉得100磅的体重、没有钱、讨厌的工作、讨厌的伴侣、每晚喝醉，以及其他……你认为你的生活会怎样结束？
- en: If your standards require you to eat from Whole Foods, you will look at McDonald’s
    meals in disgust.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的人生标准要求你从 Whole Foods 购物，你会对麦当劳的餐点感到厌恶。
- en: If your standards require you to work like a CEO, you will look at low-level
    grunt work as a problem that must be fixed through skill acquisition, education,
    prioritization, and outsourcing.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的人生标准要求你像CEO一样工作，你会把低级的工作看作是一个必须通过技能获取、教育、优先级排序和外包来解决的问题。
- en: You obviously can’t solve all of the problems in your life immediately.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 你显然不能立即解决你生活中的所有问题。
- en: You can’t escape your situation right now.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在无法逃避你的处境。
- en: You need a plan. An aim. A way out.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要一个计划。一个目标。一个出路。
- en: And by sticking to this plan, I promise that the journey will be more enjoyable
    than the outcome of that thing.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 通过坚持这个计划，我保证这段旅程会比那个结果更有趣。
- en: 'As Nietzsche would say:'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 如尼采所说：
- en: “Happiness is the feeling that power increases – that resistance is being overcome.”
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: “幸福是力量增强的感觉——阻力正在被克服。”
- en: The Standards Of Who You Want To Become
  id: totrans-207
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你想要成为的人的标准
- en: Most people take the bare minimum approach to life.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人对生活采取最低限度的态度。
- en: Quick money, quick sex, quick pleasure, no commitment, no depth, no failure.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 快速赚钱，快速性行为，快速愉悦，没有承诺，没有深度，没有失败。
- en: The easier you try to make your life the harder it’s going to be.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 你越想使你的生活变得容易，它就越难。
- en: The way out of mindless living is to adopt the standards of who you want to
    become.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 走出无意义生活的途径是采用你想要成为的人的标准。
- en: How much money do you want to make?
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 你想要赚多少钱？
- en: What kind of work will bring you fulfillment?
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 哪种工作能给你带来满足感？
- en: What is your ideal relationship, for friends or a partner?
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 你理想的关系，无论是朋友还是伴侣，是什么样的？
- en: How do you want to look and feel?
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 你想看起来和感觉如何？
- en: You must go beyond the bare minimum of survival.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须超越仅仅为了生存的最低限度。
- en: Commit to having a reason behind your actions.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 承诺你的行为背后有一个原因。
- en: If you don’t know why you are doing something, why are you doing it? And if
    you know why, why are you ignoring it?
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道你为什么要做某事，你为什么要做它？如果你知道了，你为什么要忽视它？
- en: Are you advancing humanity by handing out 40 triple-pumped mocha cappuccinos
    working at Starbucks? Or are you making humanity sick and overweight?
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 你是不是通过在星巴克分发40杯三倍浓缩摩卡卡布奇诺来推动人类进步？或者你是在让人类变得不健康和肥胖？
- en: What about your “innocent” receptionist job for the military-industrial complex
    that bombs innocent people on the other side of the world?
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 关于你的“无辜”的军事工业复合体接待员工作，它轰炸了世界另一边无辜的人呢？
- en: Are you aware of what you are unconsciously contributing to?
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否意识到你在无意识中做出了什么贡献？
- en: Why haven’t you begun pursuing a more purposeful career or starting a business?
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么你没有开始追求更有意义的事业或开始创业？
- en: Do you know why you are shoveling food down your throat? Do you understand how
    each nutrient interacts with your biology and creates a healthy state?
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道为什么你会狼吞虎咽地吃东西吗？你理解每种营养素如何与你的生物体相互作用并创造一个健康的状态吗？
- en: Why haven’t you begun educating yourself on health and training?
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么你没有开始学习健康和训练？
- en: You live in your body. It should be considered your full-time job to learn about
    it.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 你生活在你的身体里。了解它应该是你全职的工作。
- en: Do you know why you are going through the motions with a partner that was easy
    to get with? Do you see yourself with them for 40 more years?
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道为什么你会和一个轻易就能得到的伴侣一起行动吗？你看到自己和他们在一起度过接下来的40年吗？
- en: Why haven’t you improved your social skills to the point of being able to attract
    a better partner?
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么你没有提高你的社交技巧，以至于能够吸引更好的伴侣？
- en: It’s cliche, but you have one shot at this life thing.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然老套，但你只有一次机会来体验人生。
- en: The only person that can stop you from living a meaningless existence is yourself.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一能阻止你过上无意义生活的人是你自己。
- en: 7 Standards To Set For Yourself
  id: totrans-230
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为自己设定7个标准
- en: 'Let’s rapid-fire 7 standards that will lead to a fulfilling future:'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们快速列举7个标准，这将引导你走向充实的人生：
- en: '**1 hour of deep work** – if you can spend 8 hours building someone else’s
    dreams, you can spend 1 hour building your own.'
  id: totrans-232
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**1小时的深度工作**——如果你能花8小时去实现别人的梦想，你也能花1小时去实现自己的梦想。'
- en: '**$100,000 in your bank** – anything less is considered a problem to be solved.
    This standard provides financial direction and clarity in your choices.'
  id: totrans-233
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**银行里存有10万美元**——任何少于这个数额都被视为需要解决的问题。这个标准为你提供了财务方向和选择的清晰度。'
- en: '**10,000 steps a day** –for physical and mental health. Burn calories, get
    sunlight, open your mind to new ideas. All major discoveries, like the creation
    of the atomic bomb, were discovered on a walk.'
  id: totrans-234
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**每天10000步**——对身心健康有益。燃烧卡路里，获得阳光，让你的思想开放接受新想法。所有重大的发现，如原子弹的创造，都是在散步中发现的。'
- en: '**1 gram of protein per pound of body weight** – this satiates you, builds
    muscle, and makes it easier to hit macro and micronutrients. Even if you aren’t
    building muscle, the thermic effect and micronutrient density of protein-rich
    foods should be prioritized. Most of your fat loss / diet in general falls into
    place when you do this.'
  id: totrans-235
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**每磅体重1克蛋白质**——这让你感到饱腹，增加肌肉，并使达到宏量和微量营养素变得更容易。即使你不是在增肌，富含蛋白质食物的生热效应和微营养素密度也应该优先考虑。当你这样做时，你大部分的脂肪减少/饮食问题就会迎刃而解。'
- en: '**Training 3+ times a week** – run, bike, olympic lift, bodybuild, CrossFit,
    I don’t care. Do something that increases circulation, longevity, and acts as
    a meditative habit to rest your mind from work.'
  id: totrans-236
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**每周训练3次以上** – 跑步、骑自行车、奥运举重、健美、CrossFit，我不在乎。做一些能增加血液循环、延长寿命，并作为冥想习惯来让你的心灵从工作中休息的事情。'
- en: '**1 self-investment per month** – those who pay, pay attention. Swap wasting
    your money on quick pleasure for investing in education, business growth, and
    experiences that lead to the person you want to become.'
  id: totrans-237
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**每月一次自我投资** – 那些付费的人，请注意。将浪费在快速快乐上的钱用于投资教育、业务增长和能让你成为你想成为的人的经历。'
- en: '**30 minutes of self-education** – if you aren’t learning something new every
    day you are dying. Self-education reprograms your mind. Without it, you can’t
    spot new life-changing opportunities.'
  id: totrans-238
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**30分钟的自学** – 如果你每天不学习新东西，你就是在死亡。自学重新编程你的大脑。没有它，你无法发现新的改变生活的机会。'
- en: These are standards that you grow into. They don’t happen overnight.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是你逐渐成长的标准。它们不会一夜之间发生。
- en: You change what you consume to rewire your mind in alignment with these standards,
    then, you will feel the stress response when you don’t live up to them. That’s
    your new identity trying to survive.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 你改变你消费的东西，以重新连接你的大脑，使其与这些标准一致，然后，当你达不到这些标准时，你会感到压力反应。那是你的新身份在试图生存。
- en: You use that stress to act, solve problems, and create.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 你利用那种压力来行动、解决问题和创造。
- en: How To Create Your Ideal Lifestyle
  id: totrans-242
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何创造你理想的生活方式
- en: 'Let’s break down what creates better choices:'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分析一下什么能创造更好的选择：
- en: Learning is the fundamental human drive.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 学习是基本的人类驱动力。
- en: At birth, you are an information sponge.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 在出生时，你就是一个信息海绵。
- en: Your parents, friends, society, teachers, and bosses all project their worldview
    on you.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 你的父母、朋友、社会、老师和管理者都将他们的世界观投射在你身上。
- en: Where did they get their worldview? From the same people, unless they questioned
    it.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 他们从哪里得到他们的世界观？从同一个人那里，除非他们质疑过。
- en: This is all that you know.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你所知道的一切。
- en: If we could put a number on it, you know less than 1% of the information available
    in the world. Probably closer to less than 0.001%.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们能给它一个数字，你知道的比世界上可用的信息少1%以下。可能更接近于少于0.001%。
- en: This information creates reference points in reality.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 这些信息在现实中创造了参考点。
- en: It is how you distinguish yourself from others.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你如何区别于他人。
- en: It creates your identity.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 它塑造了你的身份。
- en: Your identity limits what information you notice, because you’ve only learned
    so much. You won’t notice certain things if you haven’t learned the information
    that bridges what it is with what you know. You won’t understand intermediate
    information if you haven’t learned beginner information. You can’t advance from
    level 1 to 3\. You are missing out on 99% of life for this reason.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 你的身份限制了你能注意到的信息，因为你只学到了这么多。如果你没有学习到连接你所知与所知的信息，你不会注意到某些事情。如果你没有学习到基础知识，你不会理解中间信息。你不能从1级直接跳到3级。你因为这种原因错过了生活中99%的东西。
- en: If I was exposed to the information and environment that made me goth, I would
    notice certain likes and dislikes in music, people, clothing, work opportunities,
    outlooks on the future, and emotional states.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我接触到了让我变成哥特的信息和环境，我会注意到音乐、人、服装、工作机会、对未来的看法和情绪状态中的某些喜好和厌恶。
- en: As a goth, I won’t notice or even care about profitable business opportunities
    to experiment with (assuming that I am the stereotypical loner goth who hates
    the world).
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名哥特，我不会注意到，甚至不会关心有利的商业机会去尝试（假设我是一个典型的孤独哥特，他讨厌这个世界）。
- en: If I drowned myself in information to reprogram my identity over time, I would
    spot opportunities related to that identity.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我沉浸在信息中，随着时间的推移重新编程我的身份，我会注意到与该身份相关的机会。
- en: This brings up the power of the internet.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 这引出了互联网的力量。
- en: You can tend a digital garden or be thrust into a digital swamp.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以照料一个数字花园，或者被推入一个数字沼泽。
- en: We’ve never had access to so much information, and I find it hard to believe
    that it isn’t shaping identities rapidly and for the worse.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从未有过如此多的信息，我很难相信它不会迅速且负面地塑造身份。
- en: When you log on to social media, the default action is to follow entertaining
    accounts and meme pages.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 当你登录社交媒体时，默认操作是关注娱乐账户和梗页。
- en: Almost all of them subject your mind to unwanted tenants that party like it’s
    a frat house. When the parents come home, they’re devastated by what they see.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎所有这些都让你的心灵承受着像兄弟会派对一样狂欢的不受欢迎的房客。当父母回家时，他们会因为看到的一切而感到震惊。
- en: Your awareness is the parents coming home after mindless ideas turn your mind
    into a swamp.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 你的意识就像父母在无意义的想法让你的思维变成沼泽后回家。
- en: Become aware of this now.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 现在就意识到这一点。
- en: Unfollow anyone who does not serve the conditioning of better standards in your
    life. Even if it doesn’t seem like it, and no matter how much you justify it,
    the people you follow subtly influence your actions. Slowly, then all at once
    you become someone you may hate.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 取消关注任何不符合你生活中更好标准培养的人。即使它看起来不像，无论你如何辩解，你关注的那些人都会微妙地影响你的行为。慢慢地，然后突然间，你变成了你可能讨厌的人。
- en: Take your time to follow valuable accounts. Valuable accounts challenge your
    worldview, make you think outside the box, and educate you on the skills necessary
    to reach a higher quality of life.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 仔细关注有价值的账号。有价值的账号挑战你的世界观，让你跳出思维定式思考，并教育你掌握达到更高生活质量所需的技能。
- en: This is not an overnight process.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是一个一夜之间就能完成的过程。
- en: You may not find the information useful at first.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能一开始不会觉得这些信息有用。
- en: It takes time to bridge specific ideas that lead to understanding.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 需要时间来弥合导致理解的具体想法。
- en: You will probably find it boring… until it’s one of the most interesting things
    in the world.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会觉得它很无聊……直到它成为世界上最有趣的事情之一。
- en: Follow one account.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 关注一个账号。
- en: Let the algorithm do its work.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 让算法做它的工作。
- en: Follow accounts that reply to the first account’s posts.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 关注回复第一个账号帖子的账号。
- en: With time, you will create an environment that is conducive to your growth.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，你将创造一个有利于你成长的环境。
- en: The only difference between you and the person more successful than you is the
    consistent intention behind the information they consume.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 你与比你更成功的人之间的唯一区别是他们消费信息背后的持续意图。
- en: “But what about taking action???”
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: “但关于采取行动呢？？”
- en: You are acting every day.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 你每天都在行动。
- en: Why?
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: Because your mind is programmed with the information conducive to those actions.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 因为你的大脑被那些有利于那些行动的信息编程了。
- en: Your identity is forged by the information you’ve been fed, and that alone determines
    what you perceive as an opportunity to act.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 你的身份是由你接受的信息塑造的，而且仅此就决定了你视为行动机会的东西。
- en: Surround yourself with the right people and you can achieve anything you want.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 与正确的人为伍，你可以实现你想要的一切。
- en: The Path Of The Value Creator
  id: totrans-281
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 价值创造者的道路
- en: Why do people keep doing things they hate?
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么人们会一直做自己讨厌的事情？
- en: I’ve always wondered this.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直想知道这个。
- en: Not like I’m a special little flower that never got stuck in the trap, but one
    who feels like he’s escaped and can view the situation from higher up on the mountain
    until he inevitably falls back down.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 不像我是个特殊的小花朵，从未陷入陷阱，而是一个感觉像是从陷阱中逃脱出来，可以从更高的山上俯瞰局势，直到他不可避免地再次跌落。
- en: Praying for the weekend.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 期待周末。
- en: Dreading Monday morning.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 恐惧周一早上。
- en: Hiding who you are to make conversation with people you don’t like working with.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 为了与不喜欢合作的人交谈而隐藏自己。
- en: Using the internet as an escape.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 用互联网作为逃避。
- en: Scrolling, clicking, shutting your mind off for just a bit longer, because when
    it’s on, you don’t like what it’s doing.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 滚动，点击，让你的思维暂时休息一下，因为当它活跃时，你不喜欢它在做什么。
- en: This is the life of the consumer.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是消费者的生活。
- en: The person who is used by the internet, rather than the one who uses it.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 被互联网利用的人，而不是利用它的人。
- en: There’s no escaping this new world.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 无法逃离这个新世界。
- en: You can fight it or flow with it.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以与之抗争，也可以随波逐流。
- en: And while the internet is the problem, it’s also the solution.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然互联网是问题，但它也是解决方案。
- en: You do not have to use the internet to do this, but there is no reason not to.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 你不必使用互联网来做这件事，但也没有不用的理由。
- en: The last reason your life sucks is because you don’t contribute to humanity.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 你生活糟糕的最后一个原因是你没有为人类做出贡献。
- en: You lack *purpose. You aren’t a part of something greater than yourself that*
    ***you chose.***
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 你缺乏*目标。你不是一个大于自己的东西的一部分，你选择了它*。
- en: '*You don’t contribute to humanity because you don’t have something so valuable
    that you can’t help but share it.*'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: '*你之所以没有为人类做出贡献，是因为你没有那样有价值的东西，以至于你不得不分享它。*'
- en: You don’t have something valuable to offer because you are ignoring the problems
    in your life that beg a solution to be created.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有有价值的东西可以提供，因为你忽视了生活中那些需要解决方案的问题。
- en: You are ignoring the problems in your life because you don’t have clarity on
    how to achieve the goal that will solve them.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 你之所以忽视生活中的问题，是因为你不知道如何实现解决这些问题的目标。
- en: You don’t have clarity on how to achieve a goal because you have nothing to
    build. Nothing to frame and guide your learning.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 你对如何实现目标没有清晰的思路，因为你没有任何东西可以构建。没有任何东西可以构建和指导你的学习。
- en: A value creator is someone who has intention behind their inputs and outputs.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 价值创造者是指那些在他们的输入和输出背后有意图的人。
- en: They treat their life like a science project.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 他们将生活视为一个科学项目。
- en: They identify their own problems.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 他们识别自己的问题。
- en: They educate themselves with the infinite resources available to them on the
    internet.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 他们利用互联网上无穷无尽的资源来自我教育。
- en: They test the solution on themselves and distribute their experiences with writing.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 他们亲自测试解决方案，并分享他们的写作经验。
- en: They package up the most helpful and streamlined solutions in the form of a
    product or service.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 他们将最有帮助和最简化的解决方案打包成产品或服务的形式。
- en: That is how they make a living by living with purpose
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是他们通过有目的的生活来谋生的方式。
- en: Becoming a creator is the cure for overconsumption.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 成为创造者是过度消费的解药。
- en: Writing is the vessel for distributing value.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 写作是分配价值的载体。
- en: I write on all platforms. I don’t care to compete with images of my fancy car
    or lifestyle. I gain a deep sense of fulfillment by using the internet as not
    only a place to curate good thoughts, but to organize them and share them with
    others with the ultimate upside of doing what I enjoy for a living. Something
    that’s in my control.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 我在所有平台上写作。我不在乎与我的豪华汽车或生活方式竞争。通过将互联网不仅作为一个整理好思想的地方，而且作为一个组织它们并与他人分享的地方，我获得了深深的满足感，这让我能够以我所热爱的方式谋生。这是我可以控制的事情。
- en: This isn’t about becoming famous.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不是关于成为名人。
- en: This isn’t about building a massive following.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是关于建立一个庞大的追随者群体。
- en: This is about distributing the value you have to offer in a place that can reach
    anyone with the opportunities that will change your life and career.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在一个可以触及任何人的地方分配你所能提供的价值，这些机会将改变你的生活和职业。
- en: You don’t need a step-by-step course to join the online party.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要一个循序渐进的课程来加入在线派对。
- en: Write what you want to write.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 写你想写的东西。
- en: Talk to who you want to talk to.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 与你想交谈的人交谈。
- en: Get your name in front of people by not being a ghost.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 通过不成为隐形人，让你的名字出现在人们面前。
- en: Get eyes on your writing so it can spread more and more with time.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 让你的写作随着时间的推移传播得更广。
- en: If you really need an extra push, just observe the people you are following
    for long enough.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你真的需要额外的推动力，只需观察你长期关注的人即可。
- en: Observe what they write about.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 观察他们写的是什么。
- en: Observe how they write it.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 观察他们是怎样写的。
- en: Observe who they interact with.
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 观察他们与谁互动。
- en: Observe what they sell to make a living.
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 观察他们是怎样谋生的。
- en: Piece the dots together and begin emulating them.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 将点拼凑在一起，开始模仿他们。
- en: If you don’t have an answer, look it up.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有答案，就去查找。
- en: You won’t get all of your answers in an instant.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 你不会立刻得到所有答案。
- en: Be okay with that.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 对此感到满意。
- en: If you know you are meant for more, start acting like it.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你知道自己注定要更多，就开始表现得像那样。
- en: You don’t have to write, but I’ve tried it all.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 你不必写作，但我已经尝试过所有方法。
- en: With writing being the fundamental mode of communication that has survived throughout
    human existence, it’s a great starting point to discover what you truly want to
    do.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 由于写作是人类存在的基本沟通方式，它是发现你真正想做什么的一个很好的起点。
- en: How To Look Forward To Monday Morning
  id: totrans-332
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何期待周一早上
- en: You don’t look forward to waking up because you don’t have something to look
    forward to.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 你不期待醒来，因为你没有期待的事情。
- en: Pretty obvious, but still a widespread problem.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 很明显，但仍然是一个普遍存在的问题。
- en: People don’t see it as a problem, so they become a victim to their situation
    and blame everyone but themselves for their inability to *create* a new path.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 人们不把它看作是问题，因此他们成为了自己处境的受害者，并责怪所有人而不是自己，因为他们无法*创造*一条新的道路。
- en: 'Here’s a process you can try to find that one thing that makes it impossible
    to sleep in:'
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个你可以尝试的过程，以找到那个让你无法睡懒觉的东西：
- en: '**1) Map Out A Holistic Future**'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 制定全面的未来规划**'
- en: <picture decoding="async" class="wp-image-2160">![](../Images/ac9e9066d81dfad2e3469a44a0bfab9a.png)</picture>
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-2160">![](../Images/ac9e9066d81dfad2e3469a44a0bfab9a.png)</picture>
- en: You need a vision and anti-vision.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要有一个愿景和反愿景。
- en: Pull out a notebook and start writing.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 拿出笔记本开始写作。
- en: Brain dump everything you don’t want in your future. Pull from past experiences,
    current situations, and continue writing as you become aware of more things to
    add to the page. This is a living breathing document. You don’t just write for
    10 minutes and then forget about it.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 把你未来不想要的一切都倾倒出来。从过去的经历、当前的情况中汲取，当你意识到更多需要添加到页面上的事情时，继续写作。这是一份活生生的文档。你不仅仅写10分钟就把它忘了。
- en: Your anti-vision should be potent. So much so that you become disgusted with
    your current situation. You should want nothing to do with it. Your only option
    is to launch in the opposite direction.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 你的反愿景应该足够强烈。如此强烈，以至于你对当前的情况感到厌恶。你根本不想与之有任何瓜葛。你唯一的选项就是向相反的方向出发。
- en: From there, write out the opposite.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，写出相反的内容。
- en: Start creating clarity about what you want in the future. As you experience
    life over the next month, add to this.
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 开始明确你对未来的期望。在接下来的一个月里，随着你经历生活，添加到这个列表中。
- en: 'Next, write out a few more things:'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，再写几件事情：
- en: Exactly what you need to do over the next year, month, and week to start making
    progress.
  id: totrans-346
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你接下来一年、一个月和一周内需要确切地做什么来开始取得进步。
- en: Exactly what skills you need to learn in order to get there.
  id: totrans-347
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你需要学习哪些技能才能达到那里。
- en: What is currently holding you back and your plan to replace those habits (or
    people).
  id: totrans-348
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目前阻碍你的是什么，以及你计划如何取代这些习惯（或人）。
- en: Who you need to become in order to reach your vision for the future.
  id: totrans-349
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你需要成为什么样的人才能实现你对未来的愿景。
- en: That should at least give you a starting point.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 至少这应该给你一个起点。
- en: '**2) Start A Business**'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 开始创业**'
- en: “But Dan, I don’t want to start a business!!!!”
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: “但丹，我不想开始创业！！！”
- en: You don’t get it yet, do you?
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在还没有明白，对吧？
- en: Unless your vision isn’t authentic – meaning you aren’t conforming to what you
    parents or society wants for your future – then the only way to have full control
    over all domains of your life is to start a business.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 除非你的愿景不真实——这意味着你并没有按照你父母或社会对你未来的期望去行动——否则，要完全掌控你生活的所有领域，唯一的方法就是开始创业。
- en: Don’t want to get replaced? Become the replacer.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 不想被取代？成为取代者。
- en: Don’t have energy and can’t focus? Start a business so you can control how much
    time you work and focus on health.
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 没有精力，无法集中注意力？开始创业，这样你可以控制你工作的时间，并专注于健康。
- en: Don’t make enough? Start a business that has a high earning ceiling (or infinite
    learning ceiling) that will almost always start as an online business that requires
    $0 to start.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 没有赚到足够的钱？开始一个有高收入上限（或无限学习上限）的生意，几乎总是从需要0美元启动的在线生意开始。
- en: Lack meaning and fulfillment? It’s because you work a job where the challenge
    in your work has stopped. You work for people you don’t care about selling a product
    you don’t care about that drains your energy creating a life you don’t care about.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 缺乏意义和满足感？那是因为你在一份工作中，工作中的挑战已经停止。你为那些你不在乎的人工作，销售你不在乎的产品，消耗你的能量，创造你不在乎的生活。
- en: Your psychology, physiology, and spirituality are in the gutter simply because
    you don’t take matters into your own hands.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 你的心理、生理和精神都处于低谷，仅仅因为你没有把事情掌握在自己手中。
- en: And yes, it’s unfortunate that “starting a business” carries so many old connotations
    with it.
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，很不幸，“开始创业”这个词带有许多陈旧的联想。
- en: A business, for all I’m concerned, is just giving yourself permission to do
    what you want.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，一个企业，就是给自己一个去做你想做的事情的许可。
- en: If you want to create your ideal day, then you need full control over it.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要创造你理想的一天，那么你需要完全掌控它。
- en: Yes, it takes time, but that journey will be more fulfilling than anything you
    do.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，这需要时间，但这段旅程将比你所做的一切都更有意义。
- en: '**3) Self Educate Daily**'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 每日自学**'
- en: This is obvious, but how else are you going to learn *how* to do the things
    you want to do?
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 这很明显，但你还能通过什么其他方式来学习你想要做的事情的方法呢？
- en: Make it make sense.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 让它变得有意义。
- en: You can’t have all of these dreams and aspirations and act like you don’t need
    to learn anything.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 你不能拥有所有的这些梦想和抱负，却表现得好像你不需要学习任何东西。
- en: Invest in seminars.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 投资研讨会。
- en: Invest in courses.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 投资课程。
- en: Invest in experiences.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 投资经历。
- en: Invest in business growth.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 投资业务增长。
- en: Invest everything you have into creating the life you want. Otherwise, it’s
    not investing; it’s wasting.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 把你所有的一切都投入到创造你想要的生活中去。否则，那不是投资；那是浪费。
- en: Block out a 30-60 minute section of your day specifically for self-education.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的一天中专门留出30-60分钟的时间用于自我教育。
- en: You can pair this with other standards in your life like walking 10,000 steps
    a day.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以把这与其他你生活中的标准结合起来，比如每天走10000步。
- en: Go on a walk, throw on a podcast, lecture, or audiobook that exposes you to
    what you don’t know, and capture potent ideas so you have fuel to build during
    your focused work blocks. Use [Kortex](https://kortex.co) capture for this.
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 去散步，戴上播客、讲座或有声书，让你接触到你所不知道的，并捕捉到有力的想法，这样你就有燃料在专注的工作时段中构建。使用 [Kortex](https://kortex.co)
    捕获这个。
- en: '**4) Systemize Your Weeks & Days**'
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 系统化你的周与日**'
- en: If you aren’t making progress, you are making regress.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有取得进步，你就是在退步。
- en: I’m not sure if that’s even correct grammar, but you get the point.
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 我不确定这语法是否正确，但你应该明白我的意思。
- en: Entropy isn’t friendly.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 熵并不友好。
- en: You never stand still, you either move forward or you move backward without
    knowing it.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 你永远不会停滞不前，你要么向前移动，要么不知不觉地后退。
- en: So, if you aren’t making progress, you must be able to identify that as a problem
    and start digging deeper into it.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，如果你没有取得进步，你必须能够将其识别为问题，并开始深入挖掘。
- en: Start with a weekly audit.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 从每周审计开始。
- en: Write down everything you do in a day and start to label everything as unnecessary
    or parasitic.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 记录你一天中做的每一件事，并开始将每件事标记为不必要或寄生。
- en: Then, pull out a blank page, draw a weekly calendar, and write down every single
    thing you are going to do that week. It should align with making progress toward
    your goals.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，拿出一张空白页，画一个每周日历，并写下你那一周要做的每一件事。它应该与朝着你的目标进步相一致。
- en: Then, start doing it.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，开始这样做。
- en: And if something doesn’t flow, cross it out on the page and exchange it for
    something else.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有什么事情不顺畅，就在页面上划掉它，并用其他事情替换它。
- en: If you aren’t making progress, experiment with something else.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有取得进步，就尝试其他事情。
- en: '**5) Self-Experiment**'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: '**5) 自我实验**'
- en: The only way to solve your problems for good is through self-experimentation.
    – The Art Of Focus
  id: totrans-389
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 永久解决你问题的唯一方法是通过自我实验。 —— 专注的艺术
- en: There’s a massive problem.
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个巨大的问题。
- en: If you were to only focus on solving the problems in your life through experimentation,
    you would become successful.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只通过实验来解决你生活中的问题，你会变得成功。
- en: But nobody does that.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 但是没有人这么做。
- en: They are marketed schooling, a job, a house, a car, and retirement. So people
    pursue that as a bandaid to their deep-rooted problems.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 他们被推销教育、工作、房子、汽车和退休。所以人们追求这些作为解决他们根深蒂固问题的创可贴。
- en: Then, they are given food and drugs and advice that add another bandaid on top.
    So people slowly become more neurotic and dumb because they fail to actually solve
    problems in their life. The things that make you valuable, irreplaceable, intelligent,
    aware, and any other good trait you can acquire.
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，他们被给予食物、药物和意见，这又是在上面贴上了一块创可贴。所以人们慢慢地变得更加神经质和愚蠢，因为他们未能真正解决生活中的问题。那些使你变得有价值、不可替代、聪明、有意识，以及你可以获得的任何其他良好特质。
- en: 'As you go on this new path, away from your anti-vision and toward your vision,
    the determinant of your success is agency:'
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 当你踏上这条新道路，远离你的反愿景，走向你的愿景时，你成功的决定因素是能动性：
- en: The ability to identify and solve problems without permission from someone else.
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 能够在没有他人许可的情况下识别和解决问题的能力。
- en: 'When you encounter a problem:'
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 当你遇到问题时：
- en: Become aware of it
  id: totrans-398
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意识到这一点
- en: Start self-educating to solve it
  id: totrans-399
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始自我教育以解决问题
- en: Try different processes and teachings
  id: totrans-400
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试不同的过程和教导
- en: Don’t attach to any given one (like the carnivore diet that may serve you for
    about a year, making you healthier, until it tips in the opposite direction and
    wreaks havoc on your health).
  id: totrans-401
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要执着于任何特定的方法（比如可能为你服务大约一年的肉食主义饮食，让你更健康，直到它转向相反的方向，对你的健康造成破坏）。
- en: Solutions change and evolve depending on your situation.
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案会根据你的情况而改变和演变。
- en: You will probably never find a permanent solution.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能永远找不到一个永久的解决方案。
- en: Meaning, if you ever take focus off of improvement, you will start to regress.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 意思是，如果你一旦停止了改进，你将开始退步。
- en: This doesn’t mean you stop having fun. Creation and destruction happens in cycles.
    Self-improvement can tip into destructive territory when done too much, but at
    that point, it’s not self-improvement. So self-improvement would then be letting
    loose and doing what most people would label as “destructive,” when from this
    perspective, it’s creative.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不意味着你停止了享受乐趣。创造和毁灭是循环发生的。自我提升做得太多时，可能会进入破坏性的领域，但到了那个阶段，它就不再是自我提升了。所以自我提升就是放松，做大多数人会称之为“破坏性”的事情，但从这个角度来看，它是创造性的。
- en: That’s it for this one.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是这一点的全部。
- en: Thank you for reading.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读。
- en: – Dan
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: —— 丹
