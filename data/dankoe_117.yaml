- en: Ideas Are The New Oil (How More People Get Rich In The Digital Era)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 思想是新石油（如何在数字时代让更多人致富）
- en: 原文：[https://thedankoe.com/letters/ideas-are-the-new-oil-how-more-people-get-rich-in-the-digital-era/](https://thedankoe.com/letters/ideas-are-the-new-oil-how-more-people-get-rich-in-the-digital-era/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/ideas-are-the-new-oil-how-more-people-get-rich-in-the-digital-era/](https://thedankoe.com/letters/ideas-are-the-new-oil-how-more-people-get-rich-in-the-digital-era/)
- en: 'In this letter, I want to discuss:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在这封信中，我想讨论：
- en: Why investing is a stupid decision for most people.
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么投资对大多数人来说是一个愚蠢的决定。
- en: Why real estate won’t make you rich.
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么房地产不会让你致富。
- en: How ideas are the new oil that anyone can tap.
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 思想是如何成为任何人都可开采的新石油。
- en: How digital real estate will be referenced 20 years from now as the method this
    generation used to generate wealth.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 20年后，数字房地产将如何被引用为这一代人用来创造财富的方法。
- en: Why the creator economy is the new economy and will probably be the path you
    go down if you want to generate new riches.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么创作者经济是新的经济，如果你想要创造新的财富，这可能是你将要走的道路。
- en: Exactly what kind of digital real estate to build, how to build it, and in what
    order.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确切来说，应该建造什么样的数字房地产，如何建造，以及建造的顺序。
- en: I have been dedicated to entrepreneurship since a very young age.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我从很小的时候就致力于创业。
- en: It wasn’t hard to see that business was an infinite game. A game that couldn’t
    be lost if I kept playing. A game that didn’t trap me in a boring rank in a corporate
    ladder that doomed me to a set amount of money and therefore a set quality of
    life.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 很容易看出，商业是一个无限的游戏。一个只要我继续玩就不会输的游戏。一个不会把我困在一家公司无聊的等级制度中的游戏，这个等级制度注定我会得到一定数量的钱，因此会有一定的生活质量。
- en: It wasn’t hard to see that business was the only way to control my future, my
    income, and what I did at any given moment during my day.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 很容易看出，商业是唯一控制我未来、我的收入和我在一天中的任何时刻所做的事情的方式。
- en: Like anyone else, I had no idea what I was doing at the start.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 就像其他人一样，我在一开始时也不知道自己在做什么。
- en: I thought there were only two paths to getting rich.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为只有两条致富的道路。
- en: '**The first was investing.**'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**第一个是投资**。'
- en: My mom was always adamant that I start early. She encouraged me to invest a
    few dollars here and there because it could turn into a few million after 40 years.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我的妈妈总是坚决地认为我应该尽早开始。她鼓励我到处投资一点钱，因为40年后它可能变成几百万。
- en: I’m glad that never made sense to me because it still doesn’t.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我很高兴这从来就没有对我有道理，因为现在它仍然没有。
- en: Why would I live in a scarcity mindset, investing the last of my hard-earned
    money just to make a *few* million by the time my life is nearly over when I can
    start my own business for close-to-zero dollars thanks to the internet and make
    a few million in profit as one person over the course of 2-4 years? Then, once
    I had more than enough money to invest, I could turn that into $10+ million in
    the stock market or crypto.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我为什么要生活在一种稀缺心态中，用我辛苦赚来的最后一点钱，在我的人生即将结束时只为了赚上几百万，而我可以利用互联网以接近零的成本开始自己的事业，并在2-4年的时间里作为一个人赚取几百万的利润？然后，一旦我有足够的钱可以投资，我就可以把它变成股市或加密货币中的1000万加美元。
- en: '**The second option was real estate.**'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**第二个选择是房地产**。'
- en: I’ve been seeing viral videos of a kid asking boomers how they got rich.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直在看到关于一个孩子问婴儿潮一代他们是如何致富的病毒性视频。
- en: People have been posting compilations of these videos stating that “they are
    all saying the same thing,” as if they are hinting that it’s a great way for anyone
    to get rich.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 人们一直在发布这些视频的汇编，声称“他们都在说同样的话”，好像他们暗示这是任何人致富的绝佳方式。
- en: Most boomers in the videos say they got rich in real estate.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 视频中的大多数婴儿潮一代都说他们在房地产中致富了。
- en: I don’t deny that real estate is a decent option for people who *have* money,
    but for beginners who are still trapped in their parents’ ideology of investing
    every last penny while being forced to stay at a boring job to fund their delusional
    chances of getting rich… not gonna happen. At least not on any meaningful timescale
    where you still have a life to live.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我并不否认房地产是那些**有钱**的人的一个不错的选项，但对于那些仍然被困在父母投资最后一分钱的理念中，被迫从事无聊的工作来资助他们幻想的致富机会的初学者……这是不可能的。至少在任何一个你仍然有生活可以过的有意义的时间尺度上是不可能的。
- en: 'My point is this:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我的观点是：
- en: Most people don’t know what to do to generate new wealth.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人不知道如何创造新的财富。
- en: I would argue that you do know. You’re looking at it right now. But you still
    have the “consume and save” mindset that limits how you perceive the gold rush
    happening right in front of you.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为你确实知道。你现在就在看它。但你仍然有“消费和储蓄”的心态，这种心态限制了你对眼前正在发生的淘金热的认识。
- en: All new fortunes are being built in the digital space.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 所有新的财富都在数字空间中创造。
- en: '**Before we begin:**'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**在我们开始之前：**'
- en: Mental Monetization launches in 2 days (Monday).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 脑力商业化将在2天后（星期一）启动。
- en: The price increases from $150 to $225 at that time.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 那时价格从150美元增加到225美元。
- en: If you want to monetize your creative work with a digital product that sells
    while you sleep (not freelancing or client work) – even if you have few followers
    – [enroll here, and you’ll get access when it is live.](https://mentalmonetization.com)
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要通过在睡觉时也能销售（不是自由职业或客户工作）的数字产品来货币化你的创意工作——即使你只有很少的追随者——[在此报名，当它上线时你将获得访问权限。](https://mentalmonetization.com)
- en: Ideas Are The New Oil – Playing The Infinite Digital Game
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 想法是新石油——玩无限数字游戏
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2021">![](../Images/57af40eeb60d1d01530f6ea8a670fdc6.png)</picture>
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/57af40eeb60d1d01530f6ea8a670fdc6.png)'
- en: We’re at a critical moment in history.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正处于历史的关键时刻。
- en: The impact of artificial intelligence is threatening the livelihood of specialists.
    In the animal kingdom, the main cause of extinction is overspecialization, like
    a long-beaked bird that mates itself into being unable to fly and its children
    not being able to hunt for food.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的影响正在威胁到专家的生计。在动物王国中，灭绝的主要原因就是过度专业化，就像一个长嘴鸟因为无法飞行而无法交配，它的孩子们也无法捕食。
- en: The same holds true for overspecialized people in a world where computers are
    hyperspecialists.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在计算机是超级专家的世界里，过度专业化的个人也是如此。
- en: People are afraid they’re going to be replaced.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 人们害怕他们会被取代。
- en: People aren’t fulfilled in the jobs anyway, which seaps into other areas of
    their lives resulting in a lack of motivation to do anything about it.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 人们在工作中的满足感不足，这渗透到他们生活的其他领域，导致他们缺乏动力去改变现状。
- en: Young people don’t know what path to take that will generate wealth when the
    physical routes of oil and real estate are being exhausted (and require vast resources
    to get into in the first place).
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 年轻人不知道选择哪条道路才能在石油和房地产的物理路线被耗尽（并且需要大量资源才能进入）时产生财富。
- en: In short, the one thing on people’s minds is resources for survival.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，人们心中唯一的事情就是生存资源。
- en: In today’s world, that means money and wealth generation.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在今天的世界里，这意味着金钱和财富的创造。
- en: 'Understand this next statement as it is nothing new:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这句话，因为它并没有什么新意：
- en: What made the last generation rich won’t make you rich.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 上一代人致富的原因不会让你致富。
- en: All new wealth is being generated in the digital space.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 所有新的财富都在数字空间中产生。
- en: The idea space.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 想象空间。
- en: The new rich aren’t extracting finite physical resources. They’re synthesizing
    the infinite resource called ideas.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 新的富人不是提取有限的物理资源。他们是在合成被称为“想法”的无限资源。
- en: The physical world has it’s limits. It’s costly, it takes a lot of time for
    houses to be built, products to be shipped, and communication to spread.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 物质世界有其局限性。它成本高昂，建造房屋、运输产品和传播沟通都需要大量时间。
- en: Why are good ideas so important?
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么好主意如此重要？
- en: Because execution is more accessible than ever.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 因为执行比以往任何时候都更容易。
- en: We no longer live in a world where execution matters more than ideas. We live
    in a world where quality of ideas, distribution of ideas, and iteration of ideas
    lead to a rich life.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不再生活在一个执行比想法更重要的世界里。我们生活在一个想法的质量、想法的传播和想法的迭代能带来丰富生活的世界里。
- en: The digital world has no limits, especially as we continue to outsource specialized
    tasks to AI.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 数字世界没有界限，尤其是当我们继续将专业任务外包给人工智能时。
- en: You can become top 10% in any skill or interest with focused study on the internet.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过在互联网上专注于学习，成为任何技能或兴趣领域的顶尖10%。
- en: You can build a one-person business as a creator (we often forget that this
    wasn’t a possibility just a few years ago, now almost anyone can do it. If they
    can’t, skill issue).
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以作为一个创造者建立一个人的企业（我们经常忘记这只是在几年前才成为可能，现在几乎任何人都可以做到。如果他们做不到，那就是技能问题）。
- en: “But Dan, not everyone can be a creator!”
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: “但丹，不是每个人都能成为创造者！”
- en: If you zoom out and think, yes, they can. I’ll save my logic for another letter.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你退一步想，是的，他们可以。我将把我的逻辑留到另一封信中。
- en: Idea workers thrive in the digital age.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 知识工作者在数字时代蓬勃发展。
- en: Digital real estate can be built at zero cost.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 数字地产可以零成本建设。
- en: Digital products can be built and distributed at low marginal cost.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 数字产品可以以低边际成本构建和分发。
- en: Digital communication can reach anyone with an internet connection.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 数字通信可以触及任何有互联网连接的人。
- en: The digital society, also called the creator economy at times, is where new
    fortunes are being created.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 数字社会，有时也称为创作者经济，是新财富正在被创造的地方。
- en: How To Navigate The Digital Gold Rush
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何应对数字淘金热
- en: 'There’s a common piece of advice that goes around that I think is quite narrow
    and dumb:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 有一种常见的建议我认为相当狭隘且愚蠢：
- en: '*“Build something offline, then start online.”*'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '*“先在线下建立一些东西，然后再在线上开始。”*'
- en: In other words, people don’t realize that social media (or the internet) is
    a perfectly viable way to *start* a business in today’s world. I’d argue it’s
    one of the best ways all things considered.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，人们没有意识到社交媒体（或互联网）在当今世界是一个完全可行的创业方式。我认为考虑到所有因素，这是最好的方式之一。
- en: I don’t think it’s wise to unnecessarily go through the pain and suffering of
    building a brick and mortar business, or a physical service (like pest control,
    car detailing, etc), or even freelancing or agency work with endless hours of
    manual outreach.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为没有必要不必要地经历建立实体业务、物理服务（如害虫控制、汽车美容等）或甚至自由职业或代理工作的痛苦和苦难。
- en: Even then, those businesses can get on social media whenever they f*cking want
    to acquire customers. They don’t need to wait until they meet your standards of
    success before they start posting in the new town square.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 即使如此，这些企业也可以随时在社交媒体上出现，以获取客户。他们不需要等到达到你的成功标准才开始在新城镇广场上发布内容。
- en: It just doesn’t make sense to ignore social media as a way to attract anyone,
    connect with anyone, and build distribution for whatever your work is.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 忽视社交媒体作为吸引任何人、与任何人建立联系以及为你的工作建立分销的方式，这根本说不通。
- en: Of course, I recommend thinking for yourself, pursuing your interests, and turning
    that into a business with the right skill set.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，我建议独立思考，追求你的兴趣，并利用正确的技能集将其转化为业务。
- en: I don’t recommend accepting someone else’s outdated business ideology that narrows
    your mind from seeing your potential.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我不推荐接受他人的过时商业理念，这会限制你的思维，让你看不到自己的潜力。
- en: In other words, I recommend choosing the problem you want to solve and the solution
    you want to provide. I recommend not even starting a business. I recommend treating
    any skill you learn, any problem you solve, and any solution you create as value
    that can be given to other people as your life’s work.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，我建议选择你想解决的问题和想提供的解决方案。我建议甚至不要开始创业。我建议将你学习的任何技能、解决的任何问题和创建的任何解决方案都视为可以提供给其他人的价值，作为你一生的作品。
- en: There’s no need to do anything other than solve the problems in your life, acquire
    the skill to do so, and pass down those lessons as content and products to earn
    a living doing what you enjoy.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 除了解决你生活中的问题、获取解决问题的技能并将这些经验作为内容和产品传承下去以谋生之外，没有必要做其他任何事情。
- en: Digital Society
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数字社会
- en: It’s difficult to argue against creating content no matter your beliefs about
    the future.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你对未来的看法如何，很难反对创造内容。
- en: Creators are the forefront of large company reputations (founders and executives
    have personal brands, like Elon).
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者是大公司声誉的前沿（创始人和管理者有个人品牌，就像埃隆一样）。
- en: Creators get first pick at good jobs (because they prove their value in content).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者可以优先选择好工作（因为他们通过内容证明了他们的价值）。
- en: Creators work for other creators to gain experience and leverage.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者为其他创作者工作以获得经验和利用。
- en: Creators are the first people companies come to as sponsors to spread their
    product to niche markets.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者是企业首先寻求的赞助对象，以将产品推广到细分市场。
- en: Creators are the only accounts consumers actively follow for human connection
    (not memes or company updates).
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者是消费者积极关注的唯一账户，以建立人脉联系（而不是表情包或公司更新）。
- en: Being a creator is not some fancy internet job. It’s a new way of life, and
    I only see it becoming more and more relevant.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 成为创作者并不是一份时髦的互联网工作。这是一种新的生活方式，我只看到它变得越来越相关。
- en: In actuality, I highly recommend against becoming a “creator.”
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，我强烈反对成为“创作者”。
- en: I just recommend attracting a community, improving yourself, acquiring new skills,
    and distributing value.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 我只是建议吸引一个社区，提升自己，获取新技能，并传播价值。
- en: You know… the things that are already keys to the good life in the physical
    world but are amplified to infinity with the digital world.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道……这些在物理世界中已经是美好生活关键的事情，但在数字世界中被放大到了无限。
- en: A one-person creator business is just an ideological way to bring clarity to
    your efforts.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 一个人的创作者企业仅仅是一种理念，用来明确你的努力方向。
- en: Become A Niche Of One – Your Personal Monopoly
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 成为一个人的细分市场——你的个人垄断
- en: Traditional education and hyperspecilization is a way to make people subserviant
    to the dominant paradigm / system. Study the generalized principles of nature
    and become a deep generalist. – Daniel Schmachtenberger
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 传统教育和高度专业化是一种使人们服从主导范式/系统的方式。研究自然的普遍原理，成为一个深度通才。 —— 丹尼尔·施马赫滕贝格
- en: We’ve discussed this in [The Age Of The Generalist](https://thedankoe.com/letters/the-age-of-the-generalist-how-to-thrive-with-multiple-interests/),
    but niching down is a great way to increase competition, be a slave to your client
    (or person who hires you), and not be able to adapt as technology advances further
    than it has.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在[通才时代](https://thedankoe.com/letters/the-age-of-the-generalist-how-to-thrive-with-multiple-interests/)中讨论过这一点，但细分市场是一个很好的方式来增加竞争，成为客户的奴隶（或者雇佣你的人），并且无法适应技术进一步发展。
- en: Just because it was helpful a decade ago doesn’t mean the teaching of “niche
    down” should persist. Business is similar, but vastly different. I can literally
    type in someones URL from the comfort of my home rather than drive to their brick
    and mortar location.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 就算十年前它很有帮助，并不意味着“细分市场”的教学应该持续下去。商业也是如此，但大不相同。我可以在家中舒适地输入某人的URL，而不是开车去他们的实体店。
- en: Let’s try to make this simple.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尽量使这简单一些。
- en: Think about what you are trying to achieve in your life.
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 想想你在生活中试图实现什么。
- en: Write down the interests and skills you’ve learned to help you get there.
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 记录下你学到的兴趣和技能，以帮助你实现目标。
- en: Attract others who are trying to achieve the same thing in their life.
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 吸引那些试图在生活中实现同样目标的人。
- en: Use your combination of interests and skills as a way to make yourself unique.
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 利用你的兴趣和技能组合，使你自己变得独特。
- en: Most people want the same thing out of life.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人都想从生活中得到同样的事情。
- en: They want more money, less insecurity, more sex, less loneliness, more purpose,
    less chaos, and so on.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 他们想要更多的金钱、更少的不安全感、更多的性、更少的孤独、更多的目标、更少的混乱等等。
- en: We are all heading toward the same end goal.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都在朝着同一个最终目标前进。
- en: Self-actualization.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 自我实现。
- en: If you are a value creator (not an influencer), that is your niche.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一个价值创造者（而不是影响者），那么这就是你的细分市场。
- en: What you talk about and build in order to get there based on your experience
    is what makes you unique.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 基于你的经验，你所谈论和构建的内容使你变得独特。
- en: Elon Musk is building rockets to expand humanity to Mars so we can actualize
    as a species. When you really dig into it, every single business or brand that
    is *actually providing some form of value (because true value = transformation
    and problem-solving)* their niche is self-actualization.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 埃隆·马斯克正在建造火箭，以将人类扩展到火星，这样我们作为物种就能实现自我。当你真正深入思考时，每个真正提供某种形式价值（因为真正的价值 = 变化和解决问题）的企业或品牌，它们的细分市场就是自我实现。
- en: You and I can both pursue more money and purpose, but I’ll talk about writing
    and productivity while you talk about budgeting and spirituality.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 你和我都可以追求更多的金钱和目标，但我会谈论写作和生产力，而你则会谈论预算和精神。
- en: If we both write 50,000 tweets in our lifetime, it doesn’t really matter what
    we talk about if all of those posts align with the bigger picture of self-actualization.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们俩在一生中各自写50,000条推文，只要这些帖子都与自我实现的更大图景相一致，那么我们谈论的内容其实并不重要。
- en: You are an experience vessel.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 你是一个经验载体。
- en: You become a niche of one when you pass down that experience for others to utilize.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 当你将这种经验传递给他人以供利用时，你就成为了一个细分市场的唯一代表。
- en: Your Digital Real Estate Portfolio
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你的数字地产投资组合
- en: How many people occupy the digital real estate you build determines your success
    in the new gold rush.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 你建立的数字地产中有多少人占据决定了你在新淘金潮中的成功。
- en: 'There are 2 types of digital real estate here:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有两种类型的数字地产：
- en: '**Free** – a way to attract and build an audience with content, a newsletter,
    and free products.'
  id: totrans-106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**免费** —— 通过内容、通讯和免费产品吸引和建立受众的方式。'
- en: '**Paid** – how you monetize the free real estate you’ve built with digital
    products.'
  id: totrans-107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**付费** —— 如何通过数字产品获得的免费空间来盈利。'
- en: 'Let’s walk through what you should be building, why it matters, and the progression
    you should follow:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看你应该构建什么，为什么这很重要，以及你应该遵循的进步路径：
- en: '**1) Daily Content On One Social Media Platform**'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 在一个社交媒体平台上发布每日内容**'
- en: The biggest problem I see in business in general is people focusing on the wrong
    things.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我在商业领域看到的最大问题是人们专注于错误的事情。
- en: When they’re supposed to find customers, they build a website.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 当他们应该寻找客户时，他们会建立一个网站。
- en: When they’re supposed to attract an audience, they build a product.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 当他们应该吸引受众时，他们会建立一个产品。
- en: When they’re supposed to be doing literally anything else, they’re filing for
    an LLC and creating a logo.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 当他们本应该做其他任何事情的时候，他们却在申请有限责任公司并创建标志。
- en: This lack of prioritization screams that you have no idea what you’re doing.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 这种缺乏优先级的表现表明你根本不知道自己在做什么。
- en: In business, you need a person who wants to pay you and a way to collect payment.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业中，你需要一个愿意付钱给你的人和一种收款方式。
- en: As a beginner, you should not be focused on anything else unless it involves
    practicing getting results for a free client (notice how I didn’t say “building
    portfolio pieces” that are almost useless. Help *people* for free.)
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 作为初学者，除非它涉及到为免费客户提供结果（注意我并没有说“建立几乎无用的作品集”，而是帮助*人们*），否则你不应该专注于其他任何事情。
- en: The first piece of that puzzle is “people who want to pay you.”
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 这个谜题的第一部分是“想要付钱给你的人”。
- en: AKA, an audience.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 即，受众。
- en: Why an audience?
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么要有受众？
- en: Because I’m assuming you’re like me and want leverage.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 因为我在假设你像我一样，想要利用杠杆。
- en: You don’t want to create a second 9-5 with client work.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 你不希望再为客户工作创造第二个朝九晚五的工作。
- en: You want to create whatever you want.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 你想要创造你想要的东西。
- en: You want to control the time in your day.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 你想要控制你一天中的时间。
- en: You want to make sales while you sleep.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 你想在睡觉时进行销售。
- en: The most accessible way to do this in today’s world is by building an audience
    on social media.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今世界，最可行的方式是在社交媒体上建立一个受众。
- en: To do that, writing daily content on one platform until you’ve got the hang
    of growth is what you focus on.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 为了做到这一点，专注于在一个平台上写日常内容，直到你掌握了增长的方法。
- en: 'Here are your first content ideas:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是你的第一个内容想法：
- en: Tell your story and the transformation you’ve made.
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 讲述你的故事和你所取得的转变。
- en: Breakdown any of your skills and interests (teach people how to do them).
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析你的任何技能和兴趣（教人们如何做它们）。
- en: Talk about problems people face when pursuing their goals and how to solve them.
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 讨论人们在追求目标时面临的问题以及如何解决这些问题。
- en: Document lessons you’ve learned while pursuing your goals.
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记录你在追求目标过程中学到的教训。
- en: Share ideas you’ve come across and want to make your own (from books, conversations,
    or podcasts).
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分享你遇到并想要自己实现的想法（来自书籍、对话或播客）。
- en: Start there.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 就从这里开始。
- en: Or, just study what the 10 accounts you want to be like are doing, take their
    best ideas, and make them your own. Remember how you used to “summarize in your
    own words” in school? Same thing here.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，只研究你想要模仿的10个账号正在做什么，吸取他们最好的想法，并使它们成为你自己的。记得你在学校里是如何“用自己的话总结”的吗？这里也是一样。
- en: Social media is a skill, not random luck.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体是一项技能，而不是随机的运气。
- en: People always think it’s about luck or magic when they haven’t spent even one
    hour studying the skill.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 当人们没有花哪怕一个小时研究技能时，他们总是认为这是关于运气或魔法。
- en: My exact system for writing content and growing is inside [2 Hour Writer](https://2hourwriter.com).
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 我写作内容和增长的确切系统在[2小时作家](https://2hourwriter.com)中。
- en: '**2) Deplatform Your Audience With A Newsletter**'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 通过新闻通讯使你的受众去平台化**'
- en: Social media platforms are still centralized.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体平台仍然是集中的。
- en: The company owns the algorithm, your data, and anything you post.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 公司拥有算法、你的数据和任何你发布的内容。
- en: So, funnel your followers to an email list because you can download that list
    at any time, you own it.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，将你的追随者引导到一个电子邮件列表上，因为你可以随时下载这个列表，你拥有它。
- en: Send a weekly newsletter expanding on your best social media posts.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 发送每周新闻通讯，扩展你最好的社交媒体帖子。
- en: Most social media content is broad, beginner-level, and meant for quick entertainment.
    Few people will buy from you straight from social media.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数社交媒体内容都是广泛的、初级的，旨在快速娱乐。很少有人会直接从社交媒体上购买你的产品。
- en: Your newsletter is where you give away deeper insights and monetize your brand
    by promoting your product.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 你的新闻通讯是你提供更深入见解并通过推广你的产品来货币化你的品牌的地方。
- en: '**3) Build A Free Product To Establish Authority**'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 建立一个免费产品以建立权威**'
- en: You’re probably wondering, how do I make sales if I don’t niche down?
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能想知道，如果不细分市场，我如何进行销售？
- en: Think of your social media as the first layer of your business.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的社交媒体视为你商业的第一层。
- en: Like a funnel.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 就像漏斗一样。
- en: You attract a broad audience around a desirable goal, then build authority with
    a free product that gives away valuable advice for a specific skill or interest.
    From there, you can lead them into a product around that same topic.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 你围绕一个诱人的目标吸引广泛的受众，然后通过一个免费产品建立权威，这个产品为特定的技能或兴趣提供有价值的建议。从那里，你可以引导他们进入同一主题的产品。
- en: 'So:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 所以：
- en: Broad content > more specific free product to establish authority > paid digital
    product > create more free products to keep things fresh and keep sales flowing.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 广泛的内容 > 更具体的免费产品以建立权威 > 付费数字产品 > 创建更多免费产品以保持新鲜感和销售流畅。
- en: 'The free product is a lead magnet; people who download it are added to your
    email list. Your lead magnet serves a few more purposes:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 免费产品是吸引人的小册子；下载它的人将被添加到你的电子邮件列表中。你的吸引人的小册子还起到几个其他作用：
- en: '**Customer creation** – your job is to educate your audience to the point of
    becoming customers for your other products.'
  id: totrans-153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**客户创造** – 你的工作是教育你的观众，使他们成为你其他产品的客户。'
- en: '**Writing what you want** – when you have a lead magnet, all of your authoritative
    information on one subject is in one place. You don’t have to worry about writing
    so much about it on the timeline. You must plug the lead magnet often.'
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**写你想写的内容** – 当你有一个吸引人的小册子时，关于一个主题的所有权威信息都集中在一个地方。你不必担心在时间线上写太多关于它。你必须经常提及这个吸引人的小册子。'
- en: '**Selling your product** – your lead magnet should give people enough information
    to trust in buying your product. You should plug it toward the end of your lead
    magnet to make sales when the “leads” are hot.'
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**销售你的产品** – 你的吸引人的小册子应该提供足够的信息，让人们信任并购买你的产品。你应该在吸引人的小册子末尾提及它，以便在“潜在客户”热的时候进行销售。'
- en: When you create multiple free downloads / lead magnets, you substantially increase
    your authority.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 当你创建多个免费下载/吸引人的小册子时，你大大增加了你的权威性。
- en: You teach people on a deeper level.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 你在更深层次上教导人们。
- en: They like you more. They engage with you more. They start conversations in your
    DMs. They feel like you are contributing more value than others. In other words,
    your engagement probably sucks because you’ve never taken your audience deeper
    than social media.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 他们更喜欢你。他们更多地与你互动。他们在你的私信中开始对话。他们觉得你比其他人贡献了更多的价值。换句话说，你的参与度可能很低，因为你从未让你的观众超越社交媒体深入。
- en: Mark Manson and James Clear don’t need to worry about optimizing their content
    because so many people have bought and read their books. People have spent hours
    with their ideas.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 马克·曼森和詹姆斯·克莱尔不需要担心优化他们的内容，因为很多人已经购买了并阅读了他们的书籍。人们已经花了很多时间在他们想法上。
- en: Then, all you have to do is focus on writing content, fueling your free product,
    and creating valuable newsletters while promoting your product.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你所要做的就是专注于撰写内容，为你的免费产品加油，同时创建有价值的通讯并推广你的产品。
- en: You can create templates, checklists, swipe files, or the rest, but I personally
    like creating free products that help your audience achieve *one small desirable
    goal* with a mini course or eBook. That’s what I do with my [One Person Business
    Foundations free product.](https://theone-personbusiness.com)
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以创建模板、清单、滑动文件或其他内容，但我个人更喜欢创建那些能帮助你的观众通过迷你课程或电子书实现**一个小小期望目标**的免费产品。这就是我如何处理我的[单人企业基础免费产品](https://theone-personbusiness.com)的。
- en: '**4) Monetize With A Portfolio Of Digital Products**'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 通过数字产品组合盈利**'
- en: You’ve already built ample digital real estate.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经建立了足够的数字资产。
- en: You could technically monetize your social media, get newsletter sponsorships,
    or start a paid newsletter, but those aren’t the most optimal or profitable ways
    to monetize.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以从技术上通过社交媒体盈利，获得通讯录赞助，或者开始付费通讯，但这些并不是最优化或最有利可图的盈利方式。
- en: When people do that, that’s when you hear the stories of “this account has millions
    of followers but only generates $10,000 per month.”
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 当人们这样做时，你才会听到“这个账户有数百万的粉丝，但每月只产生10,000美元”的故事。
- en: Instead, build a digital product so you have full control over your income.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，创建一个数字产品，这样你就完全控制了你的收入。
- en: I’m not a fan of building 1-2 digital products and calling it a day.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是很喜欢只创建1-2个数字产品就结束的做法。
- en: I am a fan of making success and income almost guaranteed by continuously launching,
    improving, and iterating until you have the perfect combination of digital products
    that create a high base income.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢通过持续推出、改进和迭代，直到你拥有能够创造高基本收入的完美数字产品组合，几乎保证成功和收入。
- en: Then, you can monetize with micro products like workshops or events – where
    you charge a low price for 1-2 calls and launch every 1-2 months – to see predictable
    spikes in revenue on top of your base income.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你可以通过微产品如研讨会或活动来盈利 – 在这里，你为1-2次通话收取低廉的价格，每1-2个月推出一次 – 以在你的基本收入之上看到可预测的收入高峰。
- en: I teach all of this in [Mental Monetization](https://mentalmonetization.com)
    (reminder that early bird price ends in 2 days).
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 我在[Mental Monetization](https://mentalmonetization.com)（提醒：早鸟价在2天后结束）中教授所有这些。
- en: '**5) Diversify Platforms & Focus On Audience**'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: '**5) 多平台运营并关注受众**'
- en: So far, you have a growing audience, free products to build authority, a weekly
    newsletter that keeps you relevant to your audience, and a growing stack of digital
    products that increase in profitability as your audience grows (because you have
    more people who see and buy them).
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你有一个不断增长的受众，有免费产品来建立权威，有一份每周通讯让你的受众保持对你的相关性，以及随着受众增长而增长的数字产品堆叠，这些产品的盈利能力也在增加（因为你有更多的人看到并购买它们）。
- en: That last point is crucial.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一点至关重要。
- en: When you’ve established your business in the digital space and are profitable,
    now you can take all of your best content ideas and spread them to other platforms.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在数字空间建立了你的业务并且盈利时，现在你可以把所有最好的内容想法传播到其他平台。
- en: You can kickstart those audiences on a podcast, YouTube, or Instagram by telling
    your current audience to follow you there and share your content.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过告诉你的当前受众去那里关注你并分享你的内容，在播客、YouTube或Instagram上启动这些受众。
- en: As all of your platforms grow, download your free products, read your newsletters,
    and purchase your paid products; this is when exponential growth kicks in. You
    can double, triple, or even quadruple your income in the span of a year.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你所有的平台都在增长，下载你的免费产品，阅读你的通讯，并购买你的付费产品；这时指数级增长就开始了。你可以在一年内将你的收入翻倍、三倍甚至四倍。
- en: That’s how I went from $800,000 a year with a large X following to ~$4 million
    last year with a diversified audience.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我如何从一个拥有大量X粉丝的每年80万美元增长到去年有多元化受众的约400万美元。
- en: That’s it.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 就这些。
- en: That’s the big picture.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是大局。
- en: You have direction now, it’s up to you to learn the technical details through
    experience and failure.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在有了方向，剩下的就是通过经验和失败来学习技术细节了。
- en: Thank you for reading.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您的阅读。
- en: Enjoy the rest of your weekend.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 享受你周末的剩余时间。
- en: – Dan
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
