- en: If You Feel Lost — Understand These 3 Phases Of Life
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如果你感到迷茫——了解生活的这三个阶段
- en: 原文：[https://thedankoe.com/letters/if-you-feel-lost-understand-these-3-phases-of-life/](https://thedankoe.com/letters/if-you-feel-lost-understand-these-3-phases-of-life/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如果你感到迷茫——了解生活的这三个阶段](https://thedankoe.com/letters/if-you-feel-lost-understand-these-3-phases-of-life/)'
- en: It has always felt that my life unfolded in phases. In one phase, I felt lost.
    In another, pinned to my desk. Surging with energy. Deep in the flow state. Building
    out my future. In another phase, I was going through the motions, but with enjoyment.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我总觉得我的生活是分阶段的。在一个阶段，我感到迷茫。在另一个阶段，我被钉在办公桌前。充满能量。深深陷入心流状态。构建我的未来。在另一个阶段，我只是在例行公事，但感到快乐。
- en: The silly thing is that I had never felt this way while in high school or college.
    When teachers and employers directed my attention. The cyclical nature of sovereign
    living only came into play when I had to manage my goals. When I had to master
    my attention in relation to where I wanted to go in life.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 愚蠢的是，我在高中或大学时从未有过这种感觉。当老师和雇主引导我的注意力时。主权生活的周期性只有在我要管理我的目标时才会发挥作用。当我必须掌握我的注意力，以确定我想要在生活中去往何方时。
- en: The phases of being lost were the most destructive, yet most enlightening. Fumbling
    around in the dark, hoping to find a candle. Finding one. Watching it die out.
    Finding another and hoping it guides you to the next one before the darkness collapses
    once again.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 迷茫的阶段是最具破坏性的，但也是最富有启发性的。在黑暗中摸索，希望能找到一根蜡烛。找到了。看着它熄灭。找到另一根，希望它能引导你走向下一个，在黑暗再次降临之前。
- en: Through awareness and the intention to improve, these cycles have become less
    destructive.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 通过意识和改进的意图，这些周期变得不那么具有破坏性。
- en: I could only imagine how some others must feel. Not knowing how to leverage
    those periods of feeling lost — when, in fact, you are only preparing for the
    next round of heat.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我只能想象其他人必须感到多么迷茫。不知道如何利用那些感到迷茫的时期——实际上，你只是在为下一轮的热潮做准备。
- en: Like a sauna. Don’t fight it. *Let it purify you.*
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 就像桑拿房一样。不要与之抗争。*让它净化你。*
- en: The 3 Drivers Of Progress
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进步的三个驱动力
- en: <picture fetchpriority="high" decoding="async" class="wp-image-404">![](../Images/5c384072804d56e68af6eb0296e2c678.png)</picture>
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-404">![](../Images/5c384072804d56e68af6eb0296e2c678.png)</picture>
- en: The 3 Drivers Of Progress
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 进步的三个驱动力
- en: When you commit to building a life according to your goals — as opposed to someone
    else’s — there are 3 drivers of progress. Meaning if you are engaged — or conscious
    — of these phases, you are making progress toward a better life.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 当你承诺根据你的目标来构建生活——而不是别人的——有三个进步的驱动力。这意味着如果你参与其中——或者是有意识的——这些阶段，你正在朝着更好的生活迈进。
- en: These phases occur for everyone but are the most devastating for those that
    aren’t doing what they enjoy. For those that followed someone else’s path instead
    of blazing their own. Conditioned for a repetitive future since childhood.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这些阶段对每个人来说都会发生，但对那些没有做自己喜欢的事情的人来说最具破坏性。对那些跟随别人的道路而不是开辟自己的道路的人来说。从童年起就被训练去重复一个未来的生活。
- en: Understanding these phases will help you identify where you are at in your journey,
    what you can do about it, and how to make accurate decisions.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这些阶段将帮助你确定你在旅程中的位置，你可以做什么，以及如何做出准确的决策。
- en: '**The 3 drivers of progress are:**'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**进步的三个驱动力是：**'
- en: Intensity
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 强度
- en: Consistency
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一致性
- en: Curiosity
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 好奇心
- en: These come in cycles. Phases. One leads to another. They are inevitable cycles
    of life. Ebb and flow. Wu wei. Push pull. The secret is to let go. Let these cycles
    happen as they will. Flow with the river. Fighting it will only keep you trapped
    in that phase of life until you learn the lesson it is trying to teach you.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这些周期循环出现。阶段。一个导致另一个。它们是生活的必然周期。起伏。无为。推拉。秘诀是放手。让这些周期按照它们的方式发生。随波逐流。与之抗争只会让你陷入那个生活阶段，直到你学会它试图教授你的教训。
- en: Intensity is for building. Consistency is for maintaining. Curiosity is for
    exploring.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 强度用于构建。一致性用于维持。好奇心用于探索。
- en: These are not only life cycles, but year, month, week, and day cycles. We will
    be diving into the macro perspective in this post. While we are at it, can you
    start to become aware of these cycles in your day-to-day life?
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这些不仅是生活周期，还有年、月、周和日的周期。我们将在本文中深入探讨宏观视角。同时，你能否开始意识到你日常生活中的这些周期？
- en: '*Here’s how you navigate them:*'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '*这是你如何导航它们的：*'
- en: Exploring The Unknown
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索未知
- en: “When you walk to the edge of all the light you have and take that first step
    into the darkness of the unknown, you must believe that one of two things will
    happen. There will be something solid for you to stand upon or you will be taught
    to fly.” – Patrick Overton
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “当你走到你所有光亮的边缘，并迈出第一步进入未知的黑暗中，你必须相信两件事之一会发生。会有一个坚固的东西让你站立，或者你会被教导如何飞翔。” – 帕特里克·奥弗顿
- en: We will start with the curiosity phase as many people misperceive it. This is
    the phase that people get trapped in for life. Infinite room for improvement,
    *but keeping a 50-foot distance from the edge of their comfort zone.*
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从好奇阶段开始，因为许多人对此有误解。这是人们一生中都会陷入的阶段。有无限的改进空间，*但需要保持与舒适区边缘50英尺的距离*。
- en: '**Life is a series of experiments.** Nobody — not a single soul — has or ever
    will have it all figured out. The unknown is a land of infinite opportunity. Yet
    most people perceive it as a land of immense risk.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**生活是一系列实验**。没有人——没有单个灵魂——已经或将会完全弄清楚。未知是一个充满无限机会的土地。然而，大多数人将其视为一个充满巨大风险的地方。'
- en: 'Side note: risk, as with everything else, is a label. A fabricated concept
    that implies a reward. The 1% of top performers perceive risk for what it is,
    *a part of life*. The 99% of under-performers perceive risk for what it does,
    destroys their bubble of familiarity. *Scary*.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 旁白：风险，就像其他一切一样，是一个标签。一个虚构的概念，暗示着回报。顶尖的1%的表演者将风险视为它本来的样子，*生活的一部分*。而99%的低表现者将风险视为它所做的事情，摧毁了他们熟悉的小气泡。*令人恐惧*。
- en: The curiosity phase is tricky. It doesn’t seem like exploration. It seems like
    you are floating in space. No routine to ground yourself in. No sense of direction
    in life. Halfway between “I want to do this for the rest of my life!” and “Who
    would do this for the rest of their life?”
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 好奇阶段很棘手。它看起来不像探索。它看起来像你在太空中漂浮。没有日常的例行公事来让你扎根。生活中没有方向感。介于“我想做这件事直到生命的尽头！”和“谁会做这件事直到生命的尽头？”之间。
- en: We must adopt the mindset of an explorer. Slashing through the jungle in search
    for a new life-changing discovery. Exploring the unknown is the real-world manifestation
    of “throwing sh*t at a wall and seeing what sticks.”
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们必须采取探险者的心态。在丛林中砍伐，寻找改变生命的新发现。探索未知是“向墙上扔东西，看看什么会粘住”的真实世界体现。
- en: 'It takes intuition, surrender, and acceptance to navigate this phase with ease
    — but there are ways to navigate it more effectively. Try this:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 要轻松地导航这个阶段，需要直觉、屈服和接受——但有一些更有效地导航的方法。试试这个：
- en: Write out 20 interests you have
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出你拥有的20个兴趣
- en: Make a note of related interests (intersections)
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记录相关的兴趣（交叉点）
- en: Immerse yourself in information related to those
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 沉浸在你所感兴趣的信息中
- en: Read books, listen to podcasts, follow leaders in that space
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 阅读书籍，收听播客，关注该领域的领导者
- en: Connect the dots and understand the real world utility
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 连接这些点，理解现实世界的实用性
- en: Teach what you have learned to understand it better
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教授你所学的知识，以更好地理解它
- en: By the end of it all, you gain a deeper understanding of the direction you must
    move in. Your neurobiology — the feeling of excitement — will hint at passion.
    Educate yourself along your journey in the unknown. Education shines the light
    of awareness on the map of the unknown. Invest your time in free content. [Invest
    your money in the teachings of those you aspire to be like](https://join.modernmastery.co)
    (courses or coaching).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 到最后，你将更深入地理解你必须前进的方向。你的神经生物学——兴奋的感觉——将暗示激情。在未知之旅中不断教育自己。教育将意识之光投射在未知地图上。在你的时间上投资免费内容。[在你的金钱上投资你渴望成为的人的教诲](https://join.modernmastery.co)（课程或辅导）。
- en: The curiosity phase is for exploration, experimentation, and making new discoveries.
    Those new discoveries lead you down a path that you want to go down — not the
    one someone else wants you to go down. This requires you to be in touch with your
    intuition — your neurobiology — and let curiosity be your intrinsic driver. It
    is a time for testing new interests, gauging their utility, and eventually connecting
    the dots. This leads to immense clarity that launches you into the next phase.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 好奇阶段是为了探索、实验和发现新事物。这些新发现将引导你走向你想要走的道路——而不是别人希望你走的道路。这需要你与你的直觉——你的神经生物学——保持联系，让好奇心成为你的内在驱动力。这是一个测试新兴趣、评估它们的实用性，并最终连接点的时期。这导致巨大的清晰度，将你带入下一个阶段。
- en: Building A Better Future — Fast
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 快速构建一个更好的未来
- en: The intensity phase is for building a project related to your curiosities. When
    the clarity hits — mornings, nights, and days are a blur of trying to find the
    time to get things done as fast as possible. Nothing will stop you from blazing
    your trail. Focus is seamless. Flow seems to last all day. You don’t even need
    your precious to-do app to keep you on track.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 强度阶段是构建与你的好奇心相关的项目。当清晰度到来时——早晨、夜晚和白天都模糊不清，试图尽快找到时间完成任务。没有什么能阻止你开辟自己的道路。专注是无缝的。心流似乎持续一整天。你甚至不需要你宝贵的待办事项应用来保持你的进度。
- en: This phase comes after the curiosity phase. It occurs when everything clicks.
    You make the new discovery, have a burst of clarity, and develop a strategy that
    will launch you to new heights. You can already *feel* yourself in your future
    shoes. Who you are and who you want to become merge into one. You are that person.
    You are just waiting for time to catch up.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这个阶段发生在好奇心阶段之后。它发生在一切变得清晰的时候。你有了新的发现，有了清晰的洞察力，并制定了一个将你推向新高度的策略。你已经在你的未来角色中感受到了自己。你是你，你想要成为的人，合并为一个人。你就是那个人。你只是在等待时间赶上你。
- en: Intensity clarifies. It creates not only momentum, but also the pressure you
    need to feel either friction, or fulfillment. — Marcus Buckingham
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 强度可以澄清。它不仅创造了动力，还创造了你需要感受到的摩擦或满足感的压力。 —— 马库斯·巴克敏斯特
- en: The building phase is for turning curiosity into obsession. It is for brewing
    the neurochemical cocktail that launches you into the flow state. It is for cultivating
    passion and purpose while building towards autonomy and mastery. This is where
    you build out your future. Personal freedom. Self-actualization. This phase is
    best used on a project with high potential profitability. It can start as a hobby
    — and can remain a hobby — but autonomy is necessary if you want to continue down
    this path.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 建设阶段是将好奇心转化为狂热的过程。它是为了酿造让你进入心流状态的神经化学鸡尾酒。它是为了在培养自主性和精通的同时，培养激情和目标。这是你构建未来的地方。个人自由。自我实现。这个阶段最适合用于具有高潜在盈利能力的项目。它可以开始作为一个爱好——并且可以保持为一个爱好——但如果你想继续这条路，自主性是必要的。
- en: Towards the end of this phase, you must systemize if you want to maintain your
    progress.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段的后期，如果你想保持进度，你必须系统化。
- en: Consistency Compounds
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 一致性累积
- en: At the end of the intensity phase, you reach a new baseline. Mental, physical,
    spiritual, financial, whatever it may be. If you don’t maintain this baseline,
    you will hit a new low. Again, this is a cycle. You don’t have to fall back into
    a curiosity phase just to feel lost again.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在强度阶段的结束时，你将达到一个新的基准。无论是心理的、身体的、精神的还是财务的，无论是什么。如果你不维持这个基准，你将再次达到一个新的低点。再次，这是一个循环。你不必再次陷入好奇心阶段，只是为了再次感到迷茫。
- en: Consistency is best navigated with systems. These systems should revolve around
    the fundamentals. The lever-moving actions that result in growth. Bake these fundamentals
    into your routines, automate them if you can, and delegate what you hate doing.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 一致性最好通过系统来导航。这些系统应该围绕基本原理旋转。产生增长的杠杆式行动。将这些基本原理融入你的日常惯例中，如果你能的话，自动化它们，并将你不喜欢做的事情委托出去。
- en: 'Again, take out pen and paper, or download my planner:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，拿出笔和纸，或者下载我的计划：
- en: Note your lever-moving goal-oriented tasks
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记录你的杠杆式目标导向任务
- en: Schedule time blocks for executing on those
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为执行这些任务安排时间块
- en: Avoid distractions and get into a deep work routine
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免分心，进入深度工作模式
- en: Do this when your energy is highest
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在你精力最旺盛的时候做这件事
- en: Reflect often and delegate what you don’t like to tech or VAs
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 经常反思，将不喜欢的技术或VA工作委托出去
- en: By building out proper life and business systems, you can maintain a full-time
    income with 2-4 hours of focused work. No-code tech advancements have reduced
    the workload of solopreneurs. Digital product and service creators have a luxury
    that many can’t fathom. You can only decrease your work times by automating or
    delegating tasks. Employees are the ones that get delegated tasks.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 通过建立适当的生活和商业系统，你可以通过2-4小时的专注工作来维持全职收入。无代码技术进步已经减少了独立创业者的工作量。数字产品和服务创造者拥有许多人都无法理解的奢侈。你只能通过自动化或委托任务来减少工作时间。员工是那些被委托任务的人。
- en: Once you feel stable, you can maintain your progress and take the plunge into
    another curiosity phase. Explore the unknown, self-educate to find your way, and
    let new discoveries launch you into a cycle of intensity. (Bonus points if you
    build on top of what you’ve already built — that’s leverage.)
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你感到稳定，你就可以保持你的进度，并跳入另一个好奇心阶段。探索未知，自我教育找到你的道路，让新的发现将你带入强度循环。（如果你在已经建立的基础上构建，那将是一个加分项。）
- en: Macro & Micro Phases
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 宏观与微观阶段
- en: Once you have consciously experienced these phases, they become more predictable.
    You can navigate them more efficiently. You can predict what is going to happen
    and ease your worries about the future.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你意识到了这些阶段，它们就会变得更加可预测。你可以更有效地导航它们。你可以预测将要发生的事情，减轻你对未来的担忧。
- en: 'The thing is, *these phases do not only exist in the macro.* They exist in
    the micro. You can use your understanding of these phases to craft a sustainable
    routine. For example, I:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '事实上，*这些阶段不仅存在于宏观层面。它们也存在于微观层面。你可以利用对这些阶段的理解来制定一个可持续的日常安排。例如，我： '
- en: Build for the first 2 hours of the morning (intensity)
  id: totrans-58
  prefs:
