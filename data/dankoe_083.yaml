- en: How To Be More Productive Than 99% Of People & How To Get Out Of A Rut
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何比99%的人更高效 & 如何走出困境
- en: 原文：[https://thedankoe.com/letters/how-to-be-more-productive-than-99-of-people-how-to-get-out-of-a-rut/](https://thedankoe.com/letters/how-to-be-more-productive-than-99-of-people-how-to-get-out-of-a-rut/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/how-to-be-more-productive-than-99-of-people-how-to-get-out-of-a-rut/](https://thedankoe.com/letters/how-to-be-more-productive-than-99-of-people-how-to-get-out-of-a-rut/)
- en: The best decisions I’ve made are the ones that people see as “stupid.”
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我做出的最好的决定是那些人们认为“愚蠢”的决定。
- en: '**In 2018:**'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**在2018年：**'
- en: I wasted my life’s savings and maxed out my first credit card to try and make
    a business work.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我浪费了我一生的积蓄并透支了我的第一张信用卡，试图让一个生意运转起来。
- en: '**In 2019:**'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '**在2019年：**'
- en: I got rid of everything I owned (except for a few bags of clothes and a laptop)
    and flew to a different country.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我卖掉了所有我拥有的东西（除了几袋衣服和一台笔记本电脑）并飞往另一个国家。
- en: I also quit my job even when my freelancing business could lose every client
    in an instant.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我甚至在我自由职业的生意可能在一瞬间失去所有客户的情况下也辞去了我的工作。
- en: '**In 2020:**'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**在2020年：**'
- en: I signed a lease for an apartment that was 2x what I could afford.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我租了一个超出我负担能力的公寓。
- en: This forced me to make my business work.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这迫使我让我的生意运转起来。
- en: '**From 2021 to present:**'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**从2021年到至今：**'
- en: I moved locations every six months.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我每六个月就搬家一次。
- en: Each one being more expensive than the next, forcing my income to grow with
    it, because the only limits in the digital world are the one’s you believe.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 每本书都比下一本贵，迫使我的收入随之增长，因为在数字世界中的唯一限制是你所相信的。
- en: My income went from $50,000, $100,000, and $200,000 per month year after year.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我的收入从每年每月5万美元、10万美元到20万美元不等。
- en: It would be hard to attribute this to any one piece of business advice or a
    book.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 很难将这归因于任何一条商业建议或一本书。
- en: I knew that my progress was the result of not allowing myself to get stuck in
    the black hole of stagnation and distraction.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道我的进步是我没有让自己陷入停滞和分心的黑洞的结果。
- en: I moved to Austin, Texas with JK Molina, Dakota Robertson, and my editor Devan.
    This led to a massive shift in how I view online business.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我和JK Molina、Dakota Robertson以及我的编辑Devan搬到了德克萨斯州的奥斯汀。这导致我对在线业务的看法发生了巨大转变。
- en: I moved back to Scottsdale, Arizona on a whim. We broke our lease, threw the
    10 or so items we owned in my car, and stayed in a hotel for 2 weeks before our
    next lease started.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我一时兴起搬回了亚利桑那州的斯科茨代尔。我们解除了租赁合同，把我拥有的10件左右物品扔进车里，在我们下一个租赁期开始前，我们在酒店住了两周。
- en: I’m in Phoenix now, but feel the itch to move again, so I’m going to within
    the next two weeks. With the book and software launch coming up, I need to shock
    my system and hurl myself into the unknown.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我现在在凤凰城，但感觉我又想搬家了，所以我将在接下来的两周内这么做。随着书籍和软件的即将发布，我需要给我的系统一个冲击，把自己投入到未知之中。
- en: That’s where I thrive, but only if I have the skill to accept the challenge.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 那是我茁壮成长的地方，但前提是我有接受挑战的技能。
- en: '**Update:** I started writing this on Friday, today is Monday, my move in date
    is tomorrow (Tuesday). Lease was broken Saturday 🙂'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**更新：** 我是在周五开始写这封信的，今天是星期一，我的入住日期是明天（星期二）。周六解除了租赁合同哦 :)'
- en: Quality of life, idea generation, and dopamine are through the roof right now.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 现在的生活质量、创意生成和多巴胺水平都极高。
- en: Everything is meaningful because I have so much responsibility that all information
    can be applied in a practical manner.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 事事都有意义，因为我肩负着如此重大的责任，所有信息都可以以实用方式应用。
- en: If life feels meaningless, it’s because you aren’t training your responsibility
    muscle.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如果生活感觉没有意义，那是因为你没有训练你的责任肌肉。
- en: You haven’t lifted the emotional weight to add more to the bar and see progress
    on a deeper level than muscle.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 你还没有提升情感负担，以增加更多到杠上，并在比肌肉更深层次上看到进步。
- en: Tactical Stress – The Secret Behind Abnormal Results
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 战术压力 – 非常结果的秘密
- en: Goldfish grow to fit the tank you put them in.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 金鱼会长到适合你放它们的鱼缸大小。
- en: But if you keep them in a small bowl, they never grow.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果你把它们放在一个小碗里，它们永远不会成长。
- en: 'A similar phenomenon exists that is illustrated by Parkinson’s Law:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 存在着类似的现象，可以用帕金森定律来解释：
- en: “Work expands so as to fill the time available for its completion.”
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: “工作会扩展，以填满完成它所需的时间。”
- en: 'What I call “Tactical Stress” is quite similar:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我所说的“战术压力”相当类似：
- en: Tactical stress is the conscious decision to force yourself into a do or die
    situation – knowing that you have the skill to make it work – and have no choice
    but to overcome your fears. The result is a season of intensity that propels you
    into the next level of your life.
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 战术压力是有意识地强迫自己进入一种必死无疑的情况——知道你有能力让它起作用——别无选择，只能克服你的恐惧。结果是季节性的强度，推动你进入生活的下一个层次。
- en: When you have an understanding of this concept, you add it as a tool to your
    mental toolbelt.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 当你理解了这个概念，你就可以将其作为工具添加到你的心理工具箱中。
- en: When you identify yourself as being stuck in a rut, you can use this as a tool
    to force you to dig yourself out.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 当你意识到自己陷入了困境时，你可以利用这个工具强迫自己挖出自己。
- en: 'There are a few applications and strategies you can use as inspiration:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 有一些应用和策略你可以作为灵感：
- en: The Philosophy & Psychology Of Tactical Stress
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 战术压力的哲学与心理学
- en: Every time I’ve used tactical stress to break out of a rut, what’s followed
    has always been a season of intense productivity.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 每次我使用战术压力来打破困境，随之而来的总是充满活力的生产季节。
- en: I wouldn’t be doing anything else but working.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我不会做任何其他事情，只会工作。
- en: This is one of the few times that I break my 4 Hour Workday principle. I will
    work long hours and enjoy every second of it.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我打破4小时工作日原则的少数几次之一。我会长时间工作，并享受其中的每一刻。
- en: What’s interesting is that these periods are also my most creative.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，这些时期也是我最富有创造力的时期。
- en: Usually, productivity and creativity exist on polar ends of a spectrum.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，生产力和创造力存在于光谱的两极。
- en: But there is the theme of going full circle, where polar ends collapse into
    one, usually indicating a heightened degree of the flow state.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 但有一个回归原点的主题，其中两极的末端合并为一个，通常表明流状态的高度提升。
- en: '**Going Full Circle**'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**回归原点**'
- en: Imagine a straight line with black on one end, white on the other, and a gradient
    to blend them together in the middle.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一条直线，一端是黑色，另一端是白色，中间有一个渐变来将它们融合在一起。
- en: This line can represent most things in life, because nothing is always black
    or white.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这条线可以代表生活中的大多数事物，因为没有什么总是黑或白的。
- en: Everything exists on a spectrum. Everything is relative. Everything is a state
    of mind or consciousness.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 一切都存在于一个光谱上。一切都是相对的。一切都是心态或意识的状态。
- en: There are *degrees* of energy, productivity, creativity, intelligence, anger,
    sadness, happiness, calmness, stress, saltiness, sweetness, roughness, softness,
    brightness, and darkness.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 有能量、生产力、创造力、智力、愤怒、悲伤、快乐、平静、压力、咸味、甜味、粗糙、柔软、明亮和黑暗等*程度*。
- en: All of these blend together to create your human experience.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些融合在一起，创造了你的人类体验。
- en: They aren’t limited to one but can be isolated with your awareness of them.
    You can pick apart your current state of mind and explore its depths.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 它们不仅限于一个，但可以通过你对它们的意识来孤立。你可以分析你当前的心态，并探索其深度。
- en: Now, imagine the black-to-white gradient line from before.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，想象一下之前的黑到白渐变线。
- en: But now connect the two ends so that it forms a circle.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 但现在将两端连接起来，使其形成一个圆圈。
- en: The black now flips immediately to white.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 黑色立即翻转为白色。
- en: This is a more accurate representation of life, or your state of mind, than
    a flat line with two dead ends.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这比一条有死胡同的平坦直线更能准确地代表生活，或你的心态。
- en: This flip and color represents the phenomenon of going full circle.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这种翻转和颜色代表了回归原点的现象。
- en: When someone is so dumb they become smart.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 当有人如此愚蠢以至于变得聪明。
- en: When someone is so unfunny they become funny.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 当有人如此无趣以至于变得有趣。
- en: When someone is so tired they become energetic.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 当有人如此疲惫以至于变得充满活力时。
- en: Where the black and white ends touch is where tactical stress comes into play.
    Where you consciously push certain aspects of reality to their limit and watch
    it bounce back in your favor.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 黑白两端接触的地方就是战术压力发挥作用的地方。你有意识地推动现实的某些方面达到极限，并观察它在你有利的方向上反弹。
- en: '**The Psychology Of Tactical Stress**'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**战术压力的心理**'
- en: The purpose of tactical stress is to launch yourself into the unknown – the
    land of infinite potential.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 战术压力的目的是将你推向未知——无限潜力的土地。
- en: You become overwhelmed with information.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 你会被信息淹没。
- en: It’s too much for your mind to metabolize.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这对你的大脑来说太多，无法消化。
- en: So, you’re forced to create clarity from the chaos.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，你被迫从混乱中创造清晰。
- en: You set a goal that is borderline impossible, force yourself to achieve it,
    and transmute the stress to study and act your a** off until it becomes reality.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 你设定了一个几乎不可能实现的目标，强迫自己实现它，并将压力转化为学习和行动，直到它成为现实。
- en: Doing this does a few things.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 做这件事有几个好处。
- en: '**First**, it creates a frame of reference.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**首先**，它建立了一个参考框架。'
- en: Your goal must stay top of mind when you launch into the unknown. Your goal
    is how you filter signal from noise. Your goal is how you spot opportunities in
    the chaotic mess of information flooding your mind.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 当你进入未知领域时，你的目标必须始终牢记在心。你的目标是过滤信号与噪音的方式。你的目标是你在充斥你大脑的信息混乱中找到机会的方式。
- en: If you forced yourself to move across the country and become a digital nomad,
    you will notice that certain information is more useful for actualizing that goal.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你强迫自己搬到另一个国家并成为数字游民，你会注意到某些信息对于实现这个目标更有用。
- en: You will naturally notice certain social media posts, follow new accounts, and
    begin programming your mind to perform specific actions.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 你会自然地注意到某些社交媒体帖子，关注新的账户，并开始训练你的大脑执行特定的行动。
- en: '**Second**, it creates a deadline.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**第二点**，它设定了一个截止日期。'
- en: Everyone knows that deadlines are powerful for increasing your productivity.
    But most deadlines aren’t *real.*
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都知道截止日期对于提高你的生产力是非常有效的。但大多数截止日期都不是**真实的**。
- en: When you fly across the country or invest your life savings in coaching, the
    deadline is as real as it can get.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 当你飞越全国或投资你的全部积蓄用于培训时，截止日期就变得像现实一样真实。
- en: You either make it work or let yourself fall apart because your survival is
    at stake.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 你要么让它发挥作用，要么让自己崩溃，因为你的生存处于危险之中。
- en: Tactical stress puts you in a temporary state of survival mode.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 战术压力让你处于一种暂时的生存模式。
- en: It’s unhealthy, yes, but it’s temporary.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然不健康，但这是暂时的。
- en: '**Third**, it narrows your focus.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**第三点**，它缩小了你的关注点。'
- en: When your mind is narrowed on your goal, distractions can’t penetrate your frame.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的大脑专注于目标时，干扰无法穿透你的框架。
- en: It’s all you can focus on.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你唯一能关注的事情。
- en: You go to bed thinking about it.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 你会躺在床上想着它。
- en: Your mind won’t stop strategizing a plan to get you out of this situation.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 你的大脑不会停止策划一个计划来让你摆脱这种状况。
- en: And once you gain clarity on what you must do, through study and action, you
    use that laser focus to build whatever is necessary to actualize the goal.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你通过学习和行动明确了你必须做什么，你就用这种激光般的专注力来构建实现目标所需的一切。
- en: '**Removing Your Money Limits**'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '**消除你的金钱限制**'
- en: It’s safe to say that at a certain point, you will have to start a business
    if you want to keep pushing further in life.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 可以肯定的是，在某个时刻，如果你想继续在生活中更进一步，你将不得不开始创业。
- en: The only reason I was able to do this time and time again was because I had
    a business.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我之所以能一次又一次地做到这一点，仅仅是因为我有自己的企业。
- en: A business gives you the creative boundaries to increase your income as much
    as you’d like. That isn’t possible at any job. I don’t care about the CEO who
    climbed the ranks over 40 years to make a huge salary when I can achieve that
    in 2-6 years of focused effort on building my own thing.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 一家公司为你提供了创造性的边界，让你能尽可能多地增加收入。这在任何工作中都是不可能的。我不在乎那位花了40多年时间爬升到CEO职位，最终获得高薪的人，因为我可以在2-6年的专注努力中实现这一点。
- en: Tactical stress was my method for forcing my business to grow.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 战术压力是我迫使我的企业增长的方法。
- en: When I moved across the country or invested my life’s savings, it created a
    need for more money.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 当我搬到另一个国家或投资了我的全部积蓄时，这创造了对更多金钱的需求。
- en: If I didn’t have a business, I wouldn’t be able to increase my income that rapidly.
    It would take years to job hop my way to $100,000 extra dollars.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我没有自己的企业，我就无法如此迅速地增加收入。要达到10万美元的额外收入，我需要通过跳槽花上几年时间。
- en: In business, all that takes me is a proper strategy, the right skill set, a
    compelling offer, and enough traffic to sell $100,000 worth of it. Yes, I’m aware
    that’s an oversimplification, but that doesn’t mean it’s wrong or not worth listening
    to.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业中，我所需要的是适当的策略、正确的技能组合、有吸引力的提议以及足够的流量来销售价值10万美元的产品。是的，我知道这过于简化，但这并不意味着它是错误的或者不值得听取。
- en: Build your own thing.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 建立你自己的事业。
- en: Strategies For Tactical Stress
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 应对战术压力的策略
- en: Throughout my life, here is what I’ve done that I would consider tactical stress.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的一生中，以下是我认为的战术压力的做法。
- en: These are not the only ways to do it, but they could be used as inspiration.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 这些不是唯一的方法，但它们可以作为灵感的来源。
- en: A lot of you have creator businesses (or are at least trying to build one) and
    one of these could be the push you need.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 你们中的许多人都有创作者企业（或者至少正在尝试建立一家），这些可能正是你们需要的推动力。
- en: '**1) Launching a product before building it.**'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 在构建产品之前推出它。**'
- en: Beginners think you need a product or service before you can start selling it.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 初学者认为在开始销售之前你需要有一个产品或服务。
- en: This is the stupidest way to go about it.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 这是最愚蠢的方法。
- en: You don’t even know if the idea is validated yet.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 你甚至不知道这个想法是否已经被验证。
- en: Instead, create the offer and landing page.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是，创建出价和着陆页。
- en: Set a launch date 3-4 weeks out. This is your deadline.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 设定3-4周后的发布日期。这是你的截止日期。
- en: Start promoting, hard.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 开始努力推广。
- en: This will obviously require you to have the knowledge and skills of how to build
    an audience and create a compelling product or service.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 这显然需要你具备如何构建受众和创建引人注目的产品或服务知识和技能。
- en: I would recommend watching my [One Person Business playlist](https://youtube.com/playlist?list=PLB4ePXk6nBaeG3fD13NaRMsRsEc2iCsV4&si=g7OPBdwyH__-Qp6Y)
    on YouTube, or enroll in [Digital Economics](https://digitaleconomics.school)
    if you want all of my systems laid out for you.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要我为你详细列出所有系统，我建议你在YouTube上观看我的[单人企业播放列表](https://youtube.com/playlist?list=PLB4ePXk6nBaeG3fD13NaRMsRsEc2iCsV4&si=g7OPBdwyH__-Qp6Y)，或者如果你想报名参加[数字经济](https://digitaleconomics.school)。
- en: Once you have one buyer, the pressure is on.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你有一个买家，压力就来了。
- en: You either create the MVP (minimum viable product) in record time or you fail
    and refund all of the money you made.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 你要么在创纪录的时间内创建MVP（最小可行产品），要么失败并退还你赚到的所有钱。
- en: '**2) Location hopping.**'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 地点跳跃。**'
- en: I didn’t do this on purpose, but I’ve found myself moving locations every 6
    months over the past 2 years.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 我并不是故意这样做，但我在过去两年中每六个月就会搬家一次。
- en: Mostly because I felt like I’d exhausted everything from that location.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 主要是因为我觉得我已经从那个地点用尽了所有东西。
- en: I knew all of the restaurants. I knew all of the walking paths. I knew what
    additions I was able to make to my friend group.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道所有的餐厅。我知道所有的步行路径。我知道我能给我的朋友圈增加什么。
- en: There was no further room for discovery.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 没有更多的探索空间。
- en: So, when things began getting monotonous, I moved.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当事情开始变得单调时，我就搬家了。
- en: This also holds true for building a business vs working a job.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 这也适用于建立企业而不是工作。
- en: Entrepreneurship keeps you on your toes. If you become stagnant, that’s your
    fault. You have the choice to scale as high as you want to go and personal development
    will be forced to follow.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 创业让你时刻保持警惕。如果你变得停滞不前，那是你自己的责任。你可以选择扩展到你想达到的高度，个人发展也将被迫跟进。
- en: When I moved, I always made an effort to increase the quality of environment
    I was in.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 当我搬家时，我总是努力提高我所处环境的品质。
- en: Better network.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的网络。
- en: Better resources.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的资源。
- en: Better walkability.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的步行便利性。
- en: Better access to food.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的食物获取。
- en: Of course, this comes at a cost. That’s where tactical stress comes in.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这需要付出代价。这就是战术压力的来源。
- en: I would sign a lease at an apartment that felt like it was at the edge of my
    comfort zone.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 我会签署一份感觉像是在我的舒适区边缘的公寓租赁合同。
- en: Something I could afford, but would have to increase my income to relieve the
    stress that came with a higher payment.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 我负担得起，但为了减轻更高支付带来的压力，我必须增加我的收入。
- en: Survival is a potent short-term productivity tool.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 生存是一个强大的短期生产力工具。
- en: '**3) Investing in education.**'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 投资教育。**'
- en: I was a course hoarder.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 我曾经是一个课程收藏家。
- en: I purchased at least 50 social media, web development, freelancing, and marketing
    courses throughout my journey.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的旅程中，我购买了至少50门社交媒体、网页开发、自由职业和营销课程。
- en: They helped build my knowledge but weren’t enough to kick me into action.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 它们帮助我构建知识，但不足以推动我采取行动。
- en: After seeing some success with freelance web design, I knew I wanted to go all
    in on social media.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在看到自由职业网页设计取得一些成功后，我知道我想要全力以赴投入社交媒体。
- en: I saw the potential in being able to infinitely build a readership over the
    course of my entire life.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 我看到了在整个一生中无限构建读者群的可能性。
- en: I saw that building an audience with valuable writing (that they wanted to read)
    would allow me to build and sell anything I wanted to make a living – as long
    as the customer wanted it as well.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 我看到，通过有价值的写作（他们想阅读的）建立受众，将使我能够构建和销售我想要的任何东西来谋生——只要顾客也想要。
- en: This is the driving force behind why I created [2 Hour Writer](https://2hourwriter.com).
    To pass along the power of the digital word.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我创建[2小时作家](https://2hourwriter.com)的驱动力。为了传递数字文字的力量。
- en: What did I do?
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 我做了什么？
- en: I spent $3500 on a coaching program.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 我花3500美元参加了一个辅导项目。
- en: That did not feel good to my mental bank account.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 这对我的心理账户来说并不好。
- en: What happened?
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 发生了什么？
- en: I showed up to one coaching call.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 我参加了一次辅导电话会议。
- en: One.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 一。
- en: But that was all I needed to show me that I already knew what I had to do.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 但这已经足够让我意识到我已经知道我必须做什么。
- en: Write content, get it shared by making high online social status friends, and
    iterate on products or services until I strike gold.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 写内容，通过结交高在线社交地位的朋友来分享它，并对产品或服务进行迭代，直到我找到金子。
- en: The investment in the program forced me to start doing what I do now and never
    quit.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 对该项目的投资迫使我开始做我现在做的事情，并且从未放弃。
- en: '**4) Material items.**'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 物质物品。**'
- en: This one is touchy.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 这个话题有点敏感。
- en: I’m not a super materialistic guy.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是一个超级物质主义者。
- en: I’m literally writing this in my living room that only has a desk in it. No
    couch, no TV, nothing. Just a desk to write at.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 我实际上是在只有一张桌子的客厅里写这篇东西。没有沙发，没有电视，什么都没有。只有一个可以写作的桌子。
- en: But, material items have their perks.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，物质物品有其好处。
- en: One is that they signal status.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 其中一个是它们表明了地位。
- en: Sure, you don’t want to play status games, but everyone judges a book by it’s
    cover.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，你不想玩地位游戏，但每个人都会根据封面来判断一本书。
- en: That car or watch or shirt could be the unconscious deciding factor that makes
    someone want to give you a million-dollar opportunity.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 那辆车、手表或衬衫可能是无意识的决定因素，让某人想要给你一个价值一百万美元的机会。
- en: I drive a fairly nice car.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 我开一辆相当不错的车。
- en: (For those curious, it’s a Mercedes GT63s – matte black of course to stay on
    brand).
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: （对于那些好奇的人，它是一辆梅赛德斯-奔驰GT63s——当然是哑光黑色，以保持品牌形象）。
- en: The amount of business cards people give me as I’m walking to it are insane.
    The attention is a bit annoying but you can’t deny the bump in social status.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 当我走向那里时，人们给我的名片数量是疯狂的。这种关注有点烦人，但你不能否认这提高了你的社会地位。
- en: Just don’t let materialism consume you.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 只不过不要让物质主义吞噬了你。
- en: I’m ready to sell it or even just let it go at a moment’s notice if the situation
    calls for it.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 如果情况需要，我随时准备出售它，甚至随时放手。
- en: When I bought the car cash, that was an enormous chunk out of my wallet.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 当我用现金买这辆车时，那是我钱包里的一大笔钱。
- en: It was almost automatic to build, sell, and launch a new offer to make that
    money back in a week with the leverage I’ve built over time.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 利用我多年来建立的优势，构建、销售和推出一项新服务，一周内收回成本几乎是自动的。
- en: '**5) Degeneracy.**'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: '**5) 堕落。**'
- en: Another touchy one.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个敏感的话题。
- en: There are obvious lines that you can cross with all of these.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有这些中，你都可以跨越一些明显的界限。
- en: Tactical stress is not for the mindless.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 战术性压力不是对无脑的人的。
- en: I also don’t like sugarcoating what I’ve done that’s helped my personal growth
    but is often demonized by the straight-edge Huberman cult.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 我也不喜欢对我个人成长有帮助的事情进行粉饰，但这些事情通常被直边胡伯曼信徒所诋毁。
- en: The pre-requisite to all of this is having a goal that is so potent (because
    you’ve invested enough energy in it already) that if you weren’t to achieve it
    – it would feel like an early death.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这一切的前提是拥有一个如此强大的目标（因为你已经投入了足够的精力），以至于如果你无法实现它——那将感觉像是早逝。
- en: So, when you decide to go out, party, and have one too many drinks… you will
    feel the lack of progress you are making the next day.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，当你决定出去、聚会，喝得过多时……你会在第二天感受到你正在失去的进步。
- en: You will get mad at yourself.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 你会对自己感到愤怒。
- en: You will be stressed that you are falling behind.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 你会感到压力，因为你落后了。
- en: That brings us to our last point.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 这把我们带到了最后一个观点。
- en: Emotional Transmutation – Turning Stress Into Fuel
  id: totrans-165
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 情感转化——将压力转化为动力
- en: '*The only thing more painful than pursuing the highest version of yourself
    is not pursuing the highest version of yourself.*'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: '*追求最高版本的自己比不追求最高版本的自己更痛苦。*'
- en: As you launch yourself into stressful situations, you will have to deal with
    the negative emotions that come with that state of mind.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 当你将自己投入到压力重重的情况中时，你必须处理随之而来的负面情绪。
- en: These are the moments where you build the mental strength to overcome difficult
    situations.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是你建立心理力量克服困难情况的时刻。
- en: The emotional burden will make or break you.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 情感负担会决定你的成败。
- en: If you can lift the weight and get stronger, you will be surprised how easy
    life becomes. Minor inconveniences that ruin most people will not phase you.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能够举起重量并变得更加强壮，你会惊讶地发现生活变得多么容易。大多数人都无法忍受的小麻烦对你来说不会产生影响。
- en: Another thing, regret is a necessary part of life.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 另一件事，遗憾是生活的一个必要部分。
- en: You can’t avoid it.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 你无法避免它。
- en: Most people dwell on their regrets as if they can change them.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人沉浸在自己的遗憾中，仿佛他们可以改变它们。
- en: 'You have two options: view them as ugly stains that make life worse, or view
    them as cracks that can be sealed with better future decisions.'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 你有两个选择：把它们看作是让生活变得更糟的丑陋污点，或者把它们看作是可以用更好的未来决策来填补的裂缝。
- en: There is one pattern I’ve noticed in people looking to improve their life.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 我注意到人们在寻求改善生活方面有一个模式。
- en: The pain of where you are must outweigh the pain of what other people think.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在的痛苦必须超过别人对你的看法带来的痛苦。
- en: People will think you are stupid for making “stupid” decisions.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 人们会认为你因为做出“愚蠢”的决定而愚蠢。
- en: People will talk about you when you are making big changes.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 当你进行重大改变时，人们会谈论你。
- en: Most of the time, they just want to entertain themselves.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数时候，他们只是想娱乐自己。
- en: They don’t understand the information behind your decisions.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 他们不理解你决策背后的信息。
- en: You will learn to ignore them with time.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 你会随着时间的推移学会忽略他们。
- en: What’s the other option?
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个选择是什么？
- en: Let your dreams die on the shelf because people say something you don’t like?
