- en: If You Are Smart, You Have $100,000 Trapped In Your Head
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如果你聪明，你头脑中有10万美元被困着
- en: 原文：[https://thedankoe.com/letters/if-you-are-smart-you-have-100000-trapped-in-your-head/](https://thedankoe.com/letters/if-you-are-smart-you-have-100000-trapped-in-your-head/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/if-you-are-smart-you-have-100000-trapped-in-your-head/](https://thedankoe.com/letters/if-you-are-smart-you-have-100000-trapped-in-your-head/)
- en: The only way to control your income, and therefore your life, is to create a
    product.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 控制你收入，因此控制你生活的唯一方法就是创造一个产品。
- en: Since the day you were born, you were taught to go to school, get a job, and
    save until you can retire and finally do what you want.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 从你出生的那天起，你就被教导去上学，找工作，存钱直到你可以退休，最终做你想做的事情。
- en: You were conditioned to obey the authority. To learn things you don’t care about
    so you can work for people you don’t care about so you can eventually live a life
    you care about… and with a simple observation of society, that day is unlikely
    to ever come.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 你被训练去服从权威。学习你不在乎的事情，这样你就可以为那些你不在乎的人工作，最终过上你关心的生活……通过对社会进行简单的观察，那一天很可能永远不会到来。
- en: Without realizing it, you were programmed as a line of code in society to sell
    a product for someone else.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有意识到，你被编程成社会中的一行代码，为别人销售产品。
- en: Your entire life has been spent building everyone’s dreams but your own.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 你的一生都在为别人的梦想而奋斗，而不是自己的。
- en: The good news is, times are changing.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息是，时代正在改变。
- en: The decentralization of work has begun.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 工作的去中心化已经开始。
- en: There are more opportunities than ever.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 机会比以往任何时候都多。
- en: Remote work is the norm.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 远程工作是常态。
- en: Freelance work has increased from 36% of the workforce to 46.6% since 2020.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 自2020年以来，自由职业者的比例从工作人口的36%增长到46.6%。
- en: The creator economy is projected to double from $250B to $480B by 2028.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者经济预计到2028年将从2500亿美元增长到4800亿美元。
- en: Thanks to the internet, the power is shifting back to the individual.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了互联网，力量正在回归个人。
- en: I realized this early.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我很早就意识到了这一点。
- en: YouTube was just picking up steam when I was in high school.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 当我上高中时，YouTube 正在兴起。
- en: I noticed that most people were creating content around their skills and passions.
    They taught others what they’d learned throughout their journey, and their personalities
    made them unique.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我注意到，大多数人都在围绕他们的技能和热情创造内容。他们教授他们在旅程中学到的知识，他们的个性使他们变得独特。
- en: This led me to do everything in my power to do the same.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这使我尽我所能去做同样的事情。
- en: I started YouTube channels and tried business models like dropshipping, freelancing,
    and agency work.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我开始创建YouTube频道，并尝试了如直销、自由职业和代理工作等商业模式。
- en: I dropped out of college after learning to code and getting a job at a web design
    agency. With what I learned there, I started my own.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我在学会编码并在一家网页设计公司找到工作后辍学了。在那里学到的知识，我开始自己的事业。
- en: But there was a problem. I wanted freedom. I quickly realized that client work
    was quite similar to working a 9-5 job.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 但有一个问题。我想要自由。我很快意识到客户工作与9-5的工作非常相似。
- en: I was doing freelance projects I didn’t care about for people I didn’t care
    about.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我在做一些我不在乎的项目，为我不在乎的人工作。
- en: This led me to social media and Twitter.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这使我转向了社交媒体和Twitter。
- en: In between then and now, I’ve gotten out of client work, work 2-4 hours a day
    on average, and made $4.1 million in revenue last year with absurdly high-profit
    margins as a personal brand.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在那时和现在之间，我已经摆脱了客户工作，平均每天工作2-4小时，去年通过个人品牌创造了410万美元的收入，利润率极高。
- en: Digital Leverage
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数字杠杆
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1899">![](../Images/d687921474d56a1684df0f3219652cd8.png)</picture>
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1899">![](../Images/d687921474d56a1684df0f3219652cd8.png)</picture>
- en: Social media has set the scene for anyone to do what they love.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体为任何人去做他们热爱的事情创造了条件。
- en: The only people who don’t believe this are the pure consumers. The people who
    doom scroll, creating more problems in their life, and the people who horde information,
    but never do anything with it.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 不相信这一点的人只有纯粹的消费者。那些 doom scroll，在生活中制造更多问题的人，以及那些囤积信息但从不采取行动的人。
- en: Everyone is a creator and consumer.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都是创作者和消费者。
- en: You text your friends. You have conversations. You have ideas. You create every
    day.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 你给朋友发短信。你进行对话。你有想法。你每天都在创造。
- en: You purchase products. You consume content (like we have been since the newspaper
    and radio). You consume every day.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 你购买产品。你消费内容（就像我们从报纸和广播以来所做的那样）。你每天都在消费。
- en: You must consume to create, but if you don’t strike a balance, your mind becomes
    a jumbled mess of stress and anxiety that blinds you from your potential.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须消费以创造，但如果你不保持平衡，你的大脑就会变成一个充满压力和焦虑的混乱，这会让你看不到你的潜力。
- en: 'Social media is where the attention is right now. That may change, but the
    principle still remains:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体现在是注意力集中的地方。这可能会改变，但原则仍然适用：
- en: If you want to take control of your life, you must create and distribute a valuable
    product where the attention is. You must contribute more than you take from humanity.
    Right now, that’s on social media, and it’s foolish to think you shouldn’t be
    competing in this new game.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要掌控你的生活，你必须创造和分发一个有价值的产品，让注意力集中在这里。你必须比从人类那里获取的更多贡献。现在，那是在社交媒体上，认为你不应该在这个新游戏中竞争是愚蠢的。
- en: 'The beautiful thing is this:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 美妙的是：
- en: You don’t need startup capital
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不需要启动资金
- en: You don’t need a lot of experience
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不需要很多经验
- en: You don’t need a lot of followers
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不需要很多关注者
- en: You don’t need to worry about saturation
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不需要担心饱和
- en: You don’t have to be neurotic about profit margins, operating costs, or supply
    chains
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不必对利润率、运营成本或供应链感到神经质。
- en: Technology has advanced to the point where you can run a one-person business
    with 90%+ profit margins and 2-4 hours a day of work.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 技术已经发展到你可以以90%以上的利润率和每天2-4小时的工作时间经营一个单人业务。
- en: This is what led to me building [Digital Economics.](https://digitaleconomics.school)
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是导致我建立[数字经济学](https://digitaleconomics.school)的原因。
- en: Building Distribution
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 建立分销
- en: You need an audience.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要一个观众。
- en: Right now, it’s on social media.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，它是在社交媒体上。
- en: Most people think of social media as a silly app on their phone, yet they spend
    the majority of their life on it.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人把社交媒体看作是他们手机上的一个愚蠢的应用程序，然而他们的大部分生活都在上面度过。
- en: You’ve still yet to make the connection that it is a massive part of the economy,
    business, learning, and life in general.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 你还没有意识到这实际上是经济、商业、学习和生活中一个巨大的部分。
- en: Our ancestors had small audiences for the role they played in their tribe.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我们祖先在他们部落中扮演的角色时，拥有的小众观众。
- en: As the world advanced through the printing press, radio, and television, how
    we acquired an audience for our work has drastically changed.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 随着世界通过印刷机、广播和电视的发展，我们获取观众的方式发生了巨大变化。
- en: 'The point is this:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 重点是这样的：
- en: You need a group of people who know what you do and how it helps them. That’s
    what the business you work for does. That’s the only way to become the CEO of
    your life.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要一群人了解你做什么以及它如何帮助他们。这就是你工作的公司所做的事情。这是成为你生活CEO的唯一方式。
- en: You don’t need to go knocking door to door. You don’t need to send thousands
    of cold emails. But you still need distribution for your work.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要挨家挨户地敲门。你不需要发送数千封冷邮件。但你仍然需要为你的作品进行分销。
- en: Right now, you can post your writing on an app like X, have a larger account
    repost your work, and gain hundreds of followers in a day.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可以在像X这样的应用程序上发布你的写作，让一个更大的账户转发你的作品，并在一天内获得数百个关注者。
- en: Most people think they can’t build an audience because they haven’t taken the
    time to learn the sovereign skills of writing and persuasion.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人认为他们无法建立观众，因为他们没有花时间去学习写作和说服的主权技能。
- en: 'They don’t think they can:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 他们认为自己做不到：
- en: Write an impactful post by emulating what works (we all start as copy cats,
    how else do you learn?)
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过模仿有效的方法来写一篇有影响力的帖子（我们所有人都是从模仿者开始的，你还能怎么学习？）
- en: Write a DM to a large account to offer a form of value (knowledge or money)
    to build rapport.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 给一个大型账户发一条私信，提供一种价值（知识或金钱）来建立联系。
- en: Persuade them to exchange that value for something you want (a repost on social
    media).
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 说服他们用他们想要的东西（社交媒体上的转发）来交换你想要的价值。
- en: Or, write a thread about someone in hopes that they repost it because it adds
    to their social proof ([example from the other day](https://x.com/hosun_chung/status/1772277469648720274),
    he had others repost this and when I last checked, it got him close to 700 followers.)
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 或者，写一个关于某人的帖子，希望他们转发，因为这增加了他们的社会证据（[前几天的一个例子](https://x.com/hosun_chung/status/1772277469648720274)，他让别人转发了这个帖子，当我最后一次检查时，这让他接近700个关注者。）
- en: Get tens of thousands of people to see your post, many of them following you.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让成千上万的人看到你的帖子，其中许多人会关注你。
- en: Continue the process until you have an audience begging to pay you.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 继续这个过程，直到你拥有一个渴望付费的观众。
- en: Launch a product and attain your freedom.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 推出一个产品并获得自由。
- en: As you practice skills, they decrease in the amount of time it takes to see
    results.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你练习技能，看到结果所需的时间会减少。
- en: It will be difficult at first, as all things are, but your time invested will
    decrease to 1-2 hours a day of [writing and self-promotion.](https://2hourwriter.com)
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 起初可能会很困难，就像所有事情一样，但你的投入时间将减少到每天1-2小时的[写作和自我推广。](https://2hourwriter.com)
- en: Most people are stuck with the education of a slave, learning a career-specific
    skill to execute a specific string of tasks for the rest of their life.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人陷入了奴隶的教育，学习一项特定的职业技能，为余生执行一系列特定的任务。
- en: They become attached to that skill and refuse to learn anything that will increase
    their potential.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 他们会依赖于那种技能，拒绝学习任何能提高他们潜力的东西。
- en: Don’t be that guy or girl.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 不要成为那样的人或女孩。
- en: If you want to take control of your future, you must build an audience with
    writing and persuasion – the skills that have been in the toolbelt of the free
    since the day we carved symbols into a rock.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要掌控自己的未来，你必须通过写作和说服力来建立一个受众——这些技能自从我们开始在岩石上刻符号的那一天起，就是自由职业者的工具箱中的东西。
- en: Building A Product
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 打造一个产品
- en: <picture decoding="async" class="wp-image-1900">![](../Images/88e0f9d39fe7c897fb4d6eba9f7a52a7.png)</picture>
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/88e0f9d39fe7c897fb4d6eba9f7a52a7.png)'
- en: You can be a freelancer.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以成为一名自由职业者。
- en: You can be a coach.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以成为一名教练。
- en: You can start an agency.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以开始一个代理机构。
- en: 'But you still won’t achieve the one big goal you set out to when starting a
    business:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 但你仍然无法实现你开始创业时设定的那个一个大目标：
- en: Full control over your time.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 完全掌控你的时间。
- en: This is the trap of service businesses. They can be useful as a starting point,
    but I’ve recently changed my mind.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是服务型企业的陷阱。它们可以作为起点很有用，但我最近改变了我的看法。
- en: In the past, I recommend people start a service business and progress their
    way toward a product as they build an audience.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去，我建议人们从服务型企业开始，随着受众的建立，逐步过渡到产品。
- en: Many succeed with this approach, but even more fail.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人通过这种方法取得了成功，但更多的人失败了。
- en: They adopt the false notion that you can replace your income by learning a skill
    in a few hours and scamming your clients for delivering terrible results.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 他们采纳了错误的想法，认为你可以在几小时内学习一项技能，并通过欺骗客户交付糟糕的结果来替代你的收入。
- en: By all means, if you have the right head on your shoulders, start a service
    business and make some money.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有正确的头脑，无论如何，开始一个服务型企业，赚一些钱。
- en: If you haven’t developed yourself in the slightest, you’re better off playing
    the long term game.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你丝毫没有发展自己，你最好玩长期的游戏。
- en: Improve yourself
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提升自己
- en: Document your journey in public
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在公共场合记录你的旅程
- en: Turn your improvement into a product
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将你的改进变成一个产品
- en: Help others achieve the goals you did
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帮助他人实现你设定的目标
- en: Products are the highest leverage play for those who want full control over
    their time. Products fulfill themselves and sell while you sleep.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 对于想要完全掌控自己时间的人来说，产品是最高杠杆的游戏。产品在你睡觉时自我满足并销售。
- en: This is why we start with building an audience.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么我们从建立受众开始。
- en: You maintain a long term mindset
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你保持长期的心态
- en: You are in it for the right reasons
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你是出于正确的理由进入的
- en: You set yourself up for decades of success
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你为自己设定了几十年的成功
- en: You help more people get results with a product
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你通过产品帮助更多的人取得成果
- en: Your content doesn’t feel trapped and narrow
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的内容感觉不再受限和狭隘
- en: You write content to discover what your audience wants (based on engagement)
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你写内容来发现你的受众想要什么（基于参与度）
- en: You use that as firepower to make your product a success
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以用这个作为火力，让你的产品取得成功
- en: You have $100,000 trapped in your head.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 你有10万美元的想法被困在脑海中。
- en: How do you extract it?
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何提取它？
- en: First, understand why people buy a product.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，了解人们为什么购买产品。
- en: They want to see a transformation. They want to see a slight or drastic improvement
    in one area of their life.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 他们想要看到一种转变。他们想要看到他们在生活中某个领域的轻微或显著改善。
- en: They want to increase their market value through skill acquisition, productivity,
    and self-improvement.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 他们希望通过技能获取、生产力和自我提升来提高他们的市场价值。
- en: They want to make more money, free up time, and increase their quality of life.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 他们想要赚更多的钱，节省时间，提高生活质量。
- en: So, we start with the eternal markets. Health, wealth, relationships, and happiness.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们从永恒的市场开始。健康、财富、关系和幸福。
- en: That is how we position any product we sell.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们对任何我们销售的产品进行定位的方式。
- en: 'Now, follow these steps:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，遵循以下步骤：
- en: Turn yourself into your customer avatar
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将自己变成你的客户形象
- en: List out your interests
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出你的兴趣
- en: List out your goals
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出你的目标
- en: List out your problems
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出你的问题
- en: List out exactly how to overcome the problem and achieve the goal
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出确切如何克服问题并实现目标
- en: Now you have a brand message, dozens of content ideas, and the starting point
    of a profitable product.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你有一个品牌信息，几十个内容想法，以及一个有利可图的产品起点。
- en: For potential ideas, these can be anything related to nutrition, training, mental
    health, spirituality, skill acquisition, productivity, psychology, or anything
    that you can learn and benefit from in life.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 对于潜在的想法，这些可以是与营养、训练、心理健康、灵性、技能获取、生产力、心理学或任何你在生活中可以学习和受益的东西相关。
- en: If you haven’t achieved much in your life, that’s the first step.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你生活中还没有取得太多成就，那就是第一步。
- en: Yes, you have to get out of your mom’s basement and cultivate some form of value.
    Shocker.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，你必须离开你妈妈的地下室，培养一些形式的价值。令人震惊。
- en: If you’ve already achieved a goal in your life, you’re set. Package up everything
    necessary to achieve that goal into a digital product.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经在生活中实现了一个目标，你就已经成功了。把实现那个目标所需的一切打包成数字产品。
- en: A course, coaching, cohort, workshop, template, checklist, system, tutorial,
    program, tracker, or anything else you’ve seen other brands or creators sell.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 一门课程、辅导、小组、研讨会、模板、清单、系统、教程、项目、跟踪器或任何你看到其他品牌或创作者销售的东西。
- en: You can sell a physical product or service, but in my eyes, everyone’s end goal
    should be to sell a high-profit digital product that requires minimal upkeep and
    sells while you sleep. We do want freedom after all, but you need an audience
    to do that.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以销售实体产品或服务，但在我看来，每个人的最终目标应该是销售一个高利润的数字产品，这种产品需要最少的维护，在你睡觉时也能销售。毕竟，我们都想要自由，但你需要有一个观众来实现这一点。
- en: If it’s already selling, good. Don’t assume that everyone knows about it. Sell
    it under the most unique brand you can find – your own – and be the first to introduce
    people to the importance of that product. It will sell.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 如果它已经上市了，那就好。不要假设每个人都了解它。用你能找到的最独特的品牌来销售它——你的品牌——并且第一个向人们介绍这个产品的重要性。它会卖出去的。
- en: Write to your past, current, and future self to attract an audience.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 向你的过去、现在和未来的自己写信，以吸引观众。
- en: Build a product you’ve used before, but better. Build a product you want but
    doesn’t exist. Build a product that solves a problem in your life.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个你之前使用过但更好的产品。创建一个你想要但不存在的产品。创建一个解决你生活中问题的产品。
- en: Promote the product by illustrating why it impacted your life. Personal experience
    is what separates you from everyone else. Nobody can replicate it.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 通过说明它如何影响你的生活来推广产品。个人经历是你与他人区别开来的东西。没有人可以复制它。
- en: We teach this progression with templates, tasks, and personal guidance in [Kortex
    University.](https://university.kortex.co)
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在[Kortex大学](https://university.kortex.co)通过模板、任务和个人指导教授这种进步。
- en: Most businesses fail because they try to solve a problem they haven’t experienced.
    Don’t be one of them.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数企业失败是因为它们试图解决他们没有经历过的问题。不要成为其中之一。
- en: Imitate, Then Innovate
  id: totrans-121
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模仿，然后创新。
- en: You are a copy cat.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 你是一个跟风者。
- en: Every single idea in your head was either observed or learned by something external
    to you.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 你头脑中的每一个想法要么是你观察到的，要么是通过你之外的东西学到的。
- en: The discoveries you’ve made through self-reflection are only possible because
    of this.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过自我反思所做出的发现，正是因为这个原因才成为可能的。
- en: It is quite stupid to think that you shouldn’t copy other people. Especially
    if what they are doing works.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 认为不应该模仿别人是非常愚蠢的。尤其是如果他们在做的事情有效的话。
- en: Imitation is how we survive.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 模仿是我们生存的方式。
- en: Everyone is an imitator and innovator.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都是模仿者和创新者。
- en: The innovators create and test new ideas.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 创新者创造并测试新的想法。
- en: The imitators bring those ideas to life and spread them throughout humanity.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 模仿者将那些想法付诸实践，并将它们传播到全人类。
- en: Obviously, you don’t just copy-paste what others have done. That’s how you become
    an outcast. Use your brain and think long-term for a bit.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，你不会只是复制粘贴别人的东西。那样你会成为一个局外人。用你的大脑思考一下长远。
- en: If you don’t know what to write or create, you have to immerse yourself in the
    writing or creations of someone else.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道要写什么或创造什么，你必须沉浸在你所爱的人的写作或创作中。
- en: Preferably many sources until your mind is overwhelmed to the point of exploding.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 最好是找到很多来源，直到你的大脑被压得快要爆炸。
- en: That’s what creativity is. The release of tension that results in a breakthrough.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是创造力的本质。紧张释放导致突破。
- en: Create a database of writing you love.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个你喜欢的写作数据库。
- en: Practice writing based on what works, but with your own ideas.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 基于有效的方法练习写作，但加入你自己的想法。
- en: Purchase digital products similar to that you want to create. Study the structure
    and fill the gaps of your own.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 购买与你想要创建的类似数字产品。研究你自己的结构和填补差距。
- en: When I created a digital product teaching the skill of web design, I knew quite
    a bit, so I outlined the product.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 当我创建了一个教授网页设计技能的数字产品时，我了解了很多，所以我概述了该产品。
- en: But, I had to purchase other courses and discover which parts of mine were missing.
    Only then could I finish the product and ensure that it was decent.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，我不得不购买其他课程，发现我遗漏了哪些部分。只有这样，我才能完成产品并确保它是体面的。
- en: The rest comes from iteration.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 其余的都是来自迭代。
- en: You have to put out writing and products that suck.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须发布一些糟糕的写作和产品。
- en: You have to look like an idiot.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须看起来像个白痴。
- en: You have to get feedback as to whether or not your creations are valuable. Only
    then can you improve, because you wouldn’t know how to improve otherwise.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须得到反馈，以了解你的创作是否有价值。只有这样，你才能改进，否则你不知道如何改进。
- en: Write to build an audience.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 写作以建立受众。
- en: Launch a product to earn your freedom.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 推出一个产品以赢得你的自由。
- en: Enjoy the rest of your day.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 享受你剩余的一天。
- en: Dan
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 丹
