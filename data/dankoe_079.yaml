- en: Successful People Don’t Ask For Advice (Why 99% Of People Fail)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 成功的人不寻求建议（为什么99%的人失败）
- en: 原文：[https://thedankoe.com/letters/successful-people-dont-ask-for-advice-why-99-of-people-fail/](https://thedankoe.com/letters/successful-people-dont-ask-for-advice-why-99-of-people-fail/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/successful-people-dont-ask-for-advice-why-99-of-people-fail/](https://thedankoe.com/letters/successful-people-dont-ask-for-advice-why-99-of-people-fail/)
- en: “How do I start a business?”
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: “我如何开始创业？”
- en: “How do I start talking to people?”
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: “我如何开始与人交谈？”
- en: “How do I start pursuing my goals?”
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: “我如何开始追求我的目标？”
- en: By starting.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 通过开始。
- en: (Asking for advice is not starting).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: （寻求建议并不是开始）。
- en: Asking for advice is making you stupid.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求建议会让你变得愚蠢。
- en: Most people ask for advice because they fear the embarrassment and failure that
    everyone else went through to achieve their goals.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人寻求建议是因为他们害怕经历其他人为了实现目标所经历的尴尬和失败。
- en: Don’t get me wrong, advice isn’t always a bad thing.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 不要误会，建议并不总是坏事。
- en: But if 99% of people that are unsuccessful ask 99% of the advice… maybe there’s
    a lesson there.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果99%的不成功者寻求99%的建议……也许那里有一个教训。
- en: That’s why there are books upon books worth of information on “how to start
    a business” or “how to get 6-pack abs” and 99% of people still fail.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，关于“如何创业”或“如何获得六块腹肌”的书籍多如牛毛，但99%的人仍然失败。
- en: And 99% of the advice people ask is so vague that it is *impossible* to answer.
    It is a literal waste of time to even ask the question.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 并且99%的人寻求的建议如此模糊，以至于无法回答。提出这个问题本身就是浪费时间。
- en: “How do I start a business?”
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: “我如何开始创业？”
- en: Ah, yes, let me write 4 books, my entire life journey, and redo the 100 YouTube
    videos I made just for you so that you don’t have to do any of the work.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 啊，是的，让我写四本书，记录我的一生旅程，并且重新制作100个仅为你制作的YouTube视频，这样你就不用做任何工作了。
- en: Write your own book.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 写你自己的书。
- en: Live your own life.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 过你自己的生活。
- en: Stop sitting around doing things that don’t result in experience boosts.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 停止做那些不会带来经验提升的事情。
- en: You will never get a truly actionable answer by outsourcing your entire learning
    journey out of fear of that journey.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 你永远不会通过外包整个学习旅程来获得真正可操作的答案，因为你害怕这个旅程。
- en: The problem is a lack of understanding.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 问题在于缺乏理解。
- en: People don’t understand how to learn.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 人们不明白如何学习。
- en: They’ve never sat down and contemplated what the learning process looks like.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 他们从未坐下来思考学习过程是什么样的。
- en: 'And most haven’t even asked for advice on how to learn (my point: people are
    asking the wrong questions from the get-go).'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 而且大多数人甚至没有寻求如何学习的建议（我的观点：人们从一开始就提出了错误的问题）。
- en: 'When they approach a new goal, they don’t have the learning process framing
    their decisions:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 当他们接近一个新目标时，他们没有学习过程来指导他们的决策：
- en: Have a conscious meaningful goal
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设定一个有意识的有意义的目标
- en: Start forming the habits that allow that goal to be achieved
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 开始培养那些能够实现这个目标的习惯
- en: Manage the pain and emotions that come with identity change
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 管理伴随身份变化而来的痛苦和情绪
- en: Program your mind with information relevant to that goal
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用与该目标相关的信息来编程你的大脑
- en: Experiment with different techniques
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尝试不同的技术
- en: Seek technical advice when you encounter problems along the way
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在遇到问题时寻求技术建议
- en: And when you get to that last part… advice is only as good as it is specific
    to your situation.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 当你到达那个部分时……建议只有在你所处的具体情况中才是有效的。
- en: Books, podcasts, articles, and social media content have great advice, but only
    .001% of it applies to the *exact* situation you are in. The millions of bits
    of information you can perceive at this very moment of your life will be vastly
    different in the next second (and completely different from anyone else’s experience
    and interpretation of that experience).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 书籍、播客、文章和社交媒体内容有很好的建议，但只有0.001%适用于你目前所处的*确切*情况。你此刻能感知到的数百万条信息在下一秒将截然不同（并且与任何人的经验和对该经验的解释都完全不同）。
- en: Only once you are in a state of pain, struggle, or challenge can you receive
    the insight necessary to transcend to the next level.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 只有当你处于痛苦、挣扎或挑战的状态时，你才能获得超越到下一个层次的必要洞察。
- en: There is a process to receiving the best advice.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 接收最佳建议有一个过程。
- en: That way you don’t get mentally overweight with useless knowledge.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这样你就不至于因为无用的知识而精神负担过重。
- en: 'Let’s break down identity change, self-experimentation, and how to ask for
    advice so you can supercharge your learning:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分解身份变化、自我实验以及如何寻求建议，这样你就可以加速你的学习：
- en: You Don’t Need More Advice, You Need To Change Who You Are
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你不需要更多的建议，你需要改变自己
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1384">![](../Images/a72a814947e6009a1896bf5d558b300d.png)</picture>
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1384">![](../Images/a72a814947e6009a1896bf5d558b300d.png)</picture>
- en: The reason you haven’t achieved a goal is that you aren’t the person that would
    have achieved the goal.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有实现目标的原因是你不是那个能够实现目标的人。
- en: Every new goal you set is like throwing an anchor into the unknown.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 你设定的每一个新目标都像是向未知中投下一个锚。
- en: Every new goal you set demands a new worldview, specific skills, and beliefs
    that form who you are.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 你设定的每一个新目标都需要一个新的世界观、特定的技能和信念，这些构成了你。
- en: Like a video game.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 就像一款视频游戏。
- en: There’s a reason you aren’t level 100.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有达到100级的原因是有原因的。
- en: You lack the character development that turns you into a level 100.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 你缺乏将你变成100级角色的性格发展。
- en: In video games, risk isn’t real.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在游戏中，风险不是真实的。
- en: In real life, risks are real but often inflated with thought.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实生活中，风险是真实的，但往往被夸大了。
- en: All change requires a change in identity.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 所有的变化都需要身份的改变。
- en: You can’t just take advice and expect it to give you the experience required
    to reach the level of goal you’ve set for yourself.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 你不能只是接受建议并期望它给你带来达到你为自己设定的目标水平所需的经验。
- en: When was the last time you *actually* took the advice you asked for?
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 你最后一次真正接受你请求的建议是什么时候？
- en: Out of all of the advice you’ve gotten, how much did you actually listen to?
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在你得到的所有建议中，你实际上听了多少？
- en: Most advice you get isn’t applicable to your current level of goals and understanding.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 你得到的绝大多数建议并不适用于你当前的目标和理解水平。
- en: A level 100 is going to tell you something that makes sense to them, but not
    to a level 10.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 100级的人会告诉你一些对他们有意义但对10级的人来说没有意义的事情。
- en: People don’t realize that the difference in experience is exponential.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 人们没有意识到经验的差异是指数级的。
- en: In a game, each higher level requires more experience.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在游戏中，每个更高的等级都需要更多的经验。
- en: Getting from level 10 to 11 may require 300 experience points.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 从10级到11级可能需要300点经验值。
- en: Getting from level 99 to 100 would require 100x that amount.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 从99级到100级所需的努力将是之前的100倍。
- en: As a beginner, you don’t have to change too much. You change a few habits, set
    aside an hour a day, and you can replace your income within a year (ish).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名初学者，你不需要改变太多。改变几个习惯，每天留出一个小时，你可以在一年左右的时间内（大概）替代你的收入。
- en: After that, the real self-development journey begins. Progress slows down, like
    the “noobie gains” phenomenon in the gym. You gain strength and muscle rapidly
    for the first year, then it becomes a slow and painful grind.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，真正的自我发展之旅才开始。进步放缓，就像健身房中的“新手进步”现象。你会在第一年迅速增加力量和肌肉，然后它变成了一种缓慢而痛苦的过程。
- en: If your identity is not patient, focused on the long term, risk-tolerant, and
    a lover of failure, you will lose.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的身份不是有耐心、专注于长期、风险容忍和失败爱好者，你就会失败。
- en: '**1) Programming Your Worldview**'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 编程你的世界观**'
- en: Your worldview influences the openness of your perspective.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 你的世界观影响着你的视角开放程度。
- en: The openness of your perspective influences your perception of situations.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 你视角的开放程度影响着你对情况的感知。
- en: Your perception of situations influences the decisions you make.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 你对情况的感知影响着你的决策。
- en: The decisions you make influence how you act.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 你所做的决定会影响你的行为。
- en: Your actions form an information feedback loop that programs your identity or
    sense of self.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 你的行为形成了一个信息反馈循环，编程你的身份或自我感。
- en: Your identity shapes your worldview and your worldview shapes your identity.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 你的身份塑造了你的世界观，而你的世界观又塑造了你的身份。
- en: How do you begin to change who you are?
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何开始改变自己？
- en: By treating self-education and skill acquisition as a necessary part of your
    everyday life.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将自我教育和技能获取视为你日常生活的一个必要部分。
- en: It baffles me that very few people do this.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 令我困惑的是，很少有人这样做。
- en: They want to become a better person.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 他们想要成为一个更好的人。
- en: They want to achieve great things.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 他们想要取得伟大的成就。
- en: They want to be at peace.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 他们想要平静下来。
- en: But they don’t realize that their ability to maneuver toward these desirable
    outcomes comes from having the skill to do so.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 但他们没有意识到，他们能够操纵向这些理想结果的能力来自于他们具备这样做的能力。
- en: Skill is where the mind meets life.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 技能是心灵与生活的交汇点。
- en: Skill is cultivated through education and practice.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 技能是通过教育和实践培养的。
- en: The difference between where you are and what you want is skill. Not belief.
    Not knowledge. Not environment. Not socioeconomic status. Not your upbringing.
    All of those are variables, powerful ones, that are trumped by skill.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 你所在之处和你想要之处之间的区别是技能。不是信念。不是知识。不是环境。不是社会经济地位。不是你的成长背景。所有这些都是变量，强大的变量，但它们都被技能所超越。
- en: It all starts with programming your mind with the right inputs.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 一切都始于用正确的输入编程你的大脑。
- en: Swap mindless scrolling for intentional learning.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 用有意的学习来代替无意义的滚动。
- en: Swap video games for building new projects (same thing, but in the real world).
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 用建立新项目（在现实世界中做同样的事情）来代替玩电子游戏。
- en: Swap sleeping in for a morning walk and a book, podcast, or video that will
    open up new possibilities in your life.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 用早晨散步、一本书、播客或视频来代替睡觉，这些视频将为你的人生开启新的可能性。
- en: Learning leads to awareness of opportunity. Awareness of opportunity creates
    motivation. Continuous learning (every single day) changes your decision-making
    with time.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 学习导致对机会的认识。对机会的认识创造动力。持续学习（每天）随着时间的推移改变你的决策。
- en: '**2) The Pain Of Identity Change**'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 身份转变的痛苦**'
- en: Changing who you are is like sculpting a work of art.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 改变你是像雕塑一件艺术品。
- en: By the time you turn 18, you are like a giant, square, slab of marble that looks,
    feels, and acts ugly.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 到你18岁的时候，你已经像一块巨大的、方形的、丑陋的大理石板，看起来、感觉和行动都很丑陋。
- en: The first decision is the most painful.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个决定是最痛苦的。
- en: A commitment to change.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 对改变的一种承诺。
- en: To *pop* an arm out of the marble against its will so you can start sculpting
    away.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 强行将一只手臂从大理石中“弹出”，这样你就可以开始雕刻了。
- en: Be careful now.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 现在要小心了。
- en: If you strike too hard, you may destroy the entire slab.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你打击得太重，你可能会摧毁整个板子。
- en: You must make small, precise taps to sculpt your ideal mental physique.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须进行小而精确的敲击，以雕塑你理想的心理体格。
- en: Every situation presents a small tap that can be made.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 每个情况都提供了一个可以敲击的小点。
- en: You must approach situations consciously.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须有意识地处理情况。
- en: When you feel that spike of anxiety, pause and push through.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 当你感到焦虑的峰值时，暂停并坚持下去。
- en: The pain is temporary.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 痛苦是暂时的。
- en: All growth requires pain.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 所有的成长都需要痛苦。
- en: '**3) Pain Is Pleasure, Death Gives Life**'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 痛苦是快乐，死亡赋予生命**'
- en: I was listening to an old [Roof Talk video](https://youtu.be/nJGJICvcf4k) from
    Frank Yang this week.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 这周我听了弗兰克·杨（Frank Yang）的一个老[Roof Talk视频](https://youtu.be/nJGJICvcf4k)。
- en: When I was a teen, I would listen to these and have no idea what he was saying
    (I just wanted to be weird and wise with esoteric knowledge to look cool in front
    of my friends).
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 当我还是个青少年时，我会听这些，却不知道他在说什么（我只是想在我朋友面前表现得古怪而聪明，拥有神秘的知识）。
- en: He made an interesting point about death.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 他对死亡提出了一个有趣的观点。
- en: What if death is the ultimate truth?
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 如果死亡是终极真理怎么办？
- en: To become one with what is.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 与存在合一。
- en: To dissolve all mental limitations and barriers between self and Source.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 消解所有心理限制和自我与源头之间的障碍。
- en: 'We have two drives (as said by Freud):'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有两个驱动力（弗洛伊德所说的）：
- en: '**Sex drive** – creation, survival, and extending our lives in the matrix'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性冲动** – 创造、生存，以及在矩阵中延长我们的生命'
- en: '**Death drive** – destruction, absolute, and returning to Infinity'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**死亡冲动** – 破坏、绝对，以及回归无限'
- en: I will be talking about these in the next letter (why you can’t escape the Matrix),
    but Frank’s point was this.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 我将在下一封信中谈论这些（为什么你无法逃离矩阵），但弗兰克的观点是这样的。
- en: We enjoy pain, but many people hide from that and inflict more, unbearable pain
    with surface-level pleasurable activities that keep you “comfortable.”
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我们享受痛苦，但许多人逃避痛苦，通过表面上的愉悦活动施加更多、难以忍受的痛苦，以保持“舒适”。
- en: Some seek it out at the gym, in business, and through personal development.
    They shed layers of their ego to get as close as possible to a mental death they
    can – that’s the goal of the monks, mystics, and self-improvers.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人会在健身房、商业和个人发展中寻求它。他们剥去自己自我的一层皮，尽可能地接近他们可以的精神死亡 – 这就是僧侣、神秘主义者和自我提升者的目标。
- en: The lesson is to create an environment (like the gym) to generate suffering
    that leads to new life.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 经验教训是要创造一个环境（就像健身房），产生痛苦，从而带来新的生命。
- en: I do not think absolute ego death is the answer, so I will not discuss that
    here.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为绝对的自我死亡不是答案，所以在这里我不会讨论那个。
- en: And please, understand that I am not talking about a physical or materialist
    paradigm type of death. I’m talking mental. Symbolic.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 请理解，我说的不是物理或物质主义范式类型的死亡。我谈论的是心理的，象征性的。
- en: The Power Of Self-Experimentation (How To Solve Your Problems For Good)
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自我实验的力量（如何永久解决问题）
- en: <picture decoding="async" class="wp-image-1385">![](../Images/e14fb76e2d3ee88d9073bcca21ba5cb5.png)</picture>
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-1385">![](../Images/e14fb76e2d3ee88d9073bcca21ba5cb5.png)</picture>
- en: Self-experimentation is the only way to solve your problems for good.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 自我实验是解决你问题的唯一方法。
- en: Self-experimentation and self-reliance go hand in hand. They feed into each
    other.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 自我实验和自力更生是手拉手的。它们相互促进。
- en: Self-experimentation is how you avoid the dangerous nature of prescriptions
    and how-to advice.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 自我实验是避免处方和如何做建议的危险本质的方法。
- en: 'A hypothetical problem:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 一个假设性问题：
- en: Not having enough money to do what you enjoy with your time.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 没有足够的钱来享受你的时间。
- en: 'Person A:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: A方：
- en: Follows exactly what a money guru says.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 完全符合一个金钱大师的说法。
- en: They start investing a few bucks here and there.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 他们开始在这里那里投资一些小钱。
- en: They play it safe with their stocks.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 他们对他们的股票采取保守策略。
- en: They downgrade their car so they don’t have that monthly expense.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 他们降低了自己的汽车档次，这样他们就没有那个月度开销了。
- en: 'Person B:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: B方：
- en: Pulls advice from multiple sources to make decisions for themself.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 从多个来源获取建议，为自己做出决定。
- en: They use how-to advice, but only to discover principles that can be integrated
    into the pursuit of their goals.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 他们使用如何做建议，但只是为了发现可以融入他们目标追求的原则。
- en: They study religiously, but do not attach to business, health, or social ideologies
    that keep them stagnant.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 他们虔诚地学习，但不会依附于使他们在商业、健康或社会意识形态上停滞不前的理念。
- en: Eventually, with education and effort, it *clicks* and they know how to make
    it work.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，通过教育和努力，它*点击*了，他们知道如何让它起作用。
- en: I recently saw a post on Instagram about how wealth generation is slow, which
    I agree with, but not THAT slow.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 我最近在Instagram上看到一篇关于财富创造是缓慢的帖子，我同意这一点，但不是那么慢。
- en: The post was about how every person that became a millionaire under 30 had either
    an inheritance, a high income, or a large income event (like crypto).
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 那篇帖子是关于如何在30岁之前成为百万富翁的每个人要么有遗产，要么有高收入，或者有大的收入事件（如加密货币）。
- en: The person that shared the post mentioned how they’ve had an inheritance, and
    have been budgeting, but are only halfway to one million in their mid-30s.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 那个分享帖子的人提到，他们有遗产，并且一直在预算，但他们在30多岁时才达到一百万的一半。
- en: I say this for perspective, at 26 I became a liquid millionaire (until I invested
    50% of it into a new business) with a $3.5 million a year revenue one-person business.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 我这么说是为了提供视角，26岁时，我成为了一个流动的百万富翁（直到我把50%的投资用于一家新业务），拥有一家年收入350万美元的一人公司。
- en: Nobody could teach me to do this… because so few have done it before with the
    path I took. It wasn’t even a possibility just a few years ago. Technology has
    made it possible, and very few have taken advantage of it.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人能教我这样做……因为在我走的这条路上，很少有人这样做过。几年前这甚至不是一个可能性，只是个想法。技术使它成为可能，而且很少有人利用它。
- en: I can’t teach the *exact* path, because it’s highly individual.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 我不能教给你*确切*的路径，因为它非常个性化。
- en: Of course, I can teach the principles, give you systems, and show a map of how
    I did it in things like [2 Hour Writer](https://2hourwriter.com) and [Digital
    Economics](https://digitaleconomics.school) – but even you will have to go through
    the education and effort of making it work for you.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，我可以教授原则，给你系统，并在[2小时作家](https://2hourwriter.com)和[数字经济学](https://digitaleconomics.school)等事物中展示我如何做到的路线图——但即使是你，也必须经历教育和努力，才能让它为你所用。
- en: 'Let’s walk through some tangible steps to achieving any goal you set your mind
    to:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过一些具体的步骤来实现你心中设定的任何目标：
- en: '**1) Have A Conscious Goal**'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 有一个有意识的目标**'
- en: Goals provide a frame for your decision-making.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 目标为你提供决策框架。
- en: I don’t want to hear the regurgitated “systems are greater than goals!” advice
    you got from James Clear.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 我不想听你从詹姆斯·克莱尔那里得到的“系统比目标更重要！”的陈词滥调。
- en: You can’t have a system without a goal. Simple as that.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 没有目标就没有系统。就这么简单。
- en: You need a goal that grows into a vision.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要一个能够成长为一个愿景的目标。
- en: One that you keep top of mind so you can collect fuel to the motivation that
    goal gives you.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要时刻记住，以便你可以收集为那个目标提供的动力。
- en: You don’t just feel ultra-motivated out of nowhere.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 你不会无缘无故地感到极度有动力。
- en: You sit with a goal, experience life, and generate *reasons* to achieve that
    goal through study and observation.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 你带着一个目标，体验生活，并通过学习和观察生成*理由*来实现那个目标。
- en: The more energy you invest in a goal (education and effort) the stronger the
    gravity of that goal. It begins to pull you towards it effortlessly.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 你投入到一个目标（教育和努力）中的能量越多，那个目标的引力就越强。它开始毫不费力地把你拉向它。
- en: '**2) Holistic Understanding**'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 全面的理解**'
- en: Big picture is greater than technical details.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 整体比技术细节更重要。
- en: Principles are greater than tactics.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 原则比战术更重要。
- en: But that does not eliminate the need for technical details and tactics (just
    like how systems don’t remove the need for goals).
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 但这并不消除对技术细节和战术的需求（就像系统不会消除对目标的需求一样）。
- en: You will fail in business if you do not understand every moving piece of the
    business you are trying to build.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不能理解你试图建立的商业的每一个动态部分，你将在商业中失败。
- en: You will fail in fitness if you don’t have a holistic understanding of your
    body, nutrition, and training.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有对你身体的整体理解、营养和训练，你将在健身中失败。
- en: And, if you don’t understand the vast negative impacts of the environment, modern
    foods, and stress – you will succumb to them.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 而且，如果你不理解环境、现代食品和压力的巨大负面影响，你将屈服于它们。
- en: Awareness makes positive decision-making much, much easier.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 意识使积极的决策变得容易得多。
- en: If you don’t have a big-picture understanding of what you wish to achieve, you
    become susceptible to ideologies that are by definition of an ideology untrue
    in a relative world.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有对你想要实现的目标的整体理解，你将容易受到那些在相对世界中定义上就是虚假的意识形态的影响。
- en: You will fall for get-rich-quick schemes, fad diets, and strict advice just
    to start over from scratch when you realize they aren’t sustainable.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 当你意识到这些快速致富计划、流行饮食和严格建议不可持续时，你会陷入其中，从头开始。
- en: When you approach a goal, education and effort go hand in hand to create understanding.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 当你接近一个目标时，教育和努力携手并进，以创造理解。
- en: Purchase general books, listen to podcasts, and follow social media accounts
    that dish out various perspectives.
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 购买一般书籍，收听播客，并关注提供各种观点的社交媒体账户。
- en: Pursue your goal with the time you have and implement what you learn. Action
    solidifies true knowledge.
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用你拥有的时间追求你的目标，并实施你所学的。行动巩固真正的知识。
- en: Adjust your decision-making as you learn. You will suck at first. That’s the
    reality of any new endeavor.
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随着你学习，调整你的决策。一开始你会很糟糕。这是任何新事业的现实。
- en: '**3) Experiment With Various Techniques**'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 尝试各种技巧**'
- en: As you educate toward your goal, you will discover techniques to test.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 当你朝着你的目标学习时，你会发现可以测试的技巧。
- en: In business, this looks like writing advice, lead generation advice, best business
    models, and anything else you can find with a quick Google search.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业中，这看起来像是写建议、生成线索的建议、最佳商业模式，以及你通过快速谷歌搜索能找到的任何其他东西。
- en: This is easily accessible information that anyone can (and will) pursue.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种易于获取的信息，任何人都可以（并且会）追求。
- en: If it’s easy to find, chances are you aren’t going to be a special success case.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 如果它很容易找到，那么你不太可能成为一个特殊成功的案例。
- en: I wish I could give concrete advice, but that would leave you with the same
    problem.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望我能给出具体的建议，但那样只会让你遇到同样的问题。
- en: Again, self-reliance.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，自力更生。
- en: You must *try* the techniques you are given so you can learn the underlying
    principles through experience.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须*尝试*你得到的技巧，这样你才能通过经验学习背后的原则。
- en: As you learn the truth, new opportunities (that others can’t see) will make
    themselves known to you.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 当你了解真相时，新的机会（其他人看不到的机会）会向你显现。
- en: I would have never considered being a creator if I didn’t already have 7 failed
    businesses under my belt.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我没有已经失败的7家企业，我永远不会考虑成为一个创造者。
- en: I wouldn’t see the immense benefits of it.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 我不会看到它的巨大好处。
- en: I wouldn’t have been able to make it work (because [I didn’t have an evergreen
    skill set](https://thedankoe.com/letters/i-had-to-learn-these-high-income-skills-if-i-wanted-to-make-money/)).
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我没有（[我没有持久的技能组合](https://thedankoe.com/letters/i-had-to-learn-these-high-income-skills-if-i-wanted-to-make-money/)）我无法让它成功。
- en: You experiment with techniques to increase your skill stack.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过实验各种技巧来增加你的技能栈。
- en: Skills compound and allow you to perceive and act on better opportunities.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 技能累积并允许你感知和利用更好的机会。
- en: '**4) Systemize What Works**'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 系统化有效的方法**'
- en: As you gain clarity on what you want to do, there will be “levers” that bring
    you the most results.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 当你对你想要做什么有了清晰的了解时，会有“杠杆”能带来最多的结果。
- en: Certain techniques will get you 1% better results than the next person. That
    is your edge. Because that 1% compounds.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 某些技巧将比其他人带来1%更好的结果。这就是你的优势。因为那1%会累积。
- en: I can write for 30 minutes every single morning and repurpose that content for
    all platforms. This is what (with time) brought in multiple millions of followers
    and dollars.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以每天早上写30分钟，并将这些内容用于所有平台。这就是（随着时间的推移）带来了数百万的粉丝和美元。
- en: I saw writing as a lever for traffic.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 我把写作看作是吸引流量的杠杆。
- en: I saw a newsletter as an infinitely repurposable piece of content.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 我把新闻简报看作是一块无限可再利用的内容。
- en: It took me a long time at first, but as my skill increased I was able to systemize
    the time down to 30 minutes each morning.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 起初这花了我很长时间，但随着我的技能提高，我能够将每天早晨的系统化时间缩短到30分钟。
- en: This won’t look the same for a beginner.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 对于初学者来说，这看起来可能不一样。
- en: 'On something like social media, you will have to:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 在社交媒体这样的平台上，你必须：
- en: Reply like a madman to get eyes on your account and content
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 像疯子一样回复，以吸引你的账户和内容的关注
- en: Practice writing content that gets shared (and brings in followers)
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 练习写那些可以分享（并带来粉丝）的内容
- en: Build a product or service that solves your own problems
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打造一个解决你自身问题的产品或服务
- en: Start to write longer form content to build trust and make sales
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始写更长的内容，以建立信任并促成销售
- en: Your systems will evolve and change.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 你的系统将会发展和变化。
- en: If they don’t, you leave growth on the table.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 如果他们做不到，你就错过了增长的机会。
- en: I still know people with 100,000 followers (that are making 5-10x less than
    me) because they don’t know how to evolve their systems.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 我仍然认识一些有10万粉丝的人（他们的收入比我少5-10倍），因为他们不知道如何进化他们的系统。
- en: They still waste 1-2 hours commenting every day instead of building the next
    aspect of their vision. This becomes a massive time suck as you grow (I don’t
    want to hear any opinions from people with less than 50,000 followers, you don’t
    have understanding or experience).
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 他们仍然每天浪费1-2小时来评论，而不是构建他们愿景的下一个方面。随着你的成长，这会变成一个巨大的时间黑洞（我不希望听到那些粉丝少于50,000的人的意见，你们没有理解或经验）。
- en: This letter wasn’t the most actionable, but that’s the point.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 这封信并不是最具可操作性的，但这正是重点。
- en: For every piece of actionable advice given there are 100,000 people that never
    see success with it.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每一条给出的可操作建议，都有100,000人从未因此获得成功。
- en: So, stop masturbating to “all actionable advice and no fluff” when you need
    the fluff for nuanced understanding.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，当你需要细节理解时，停止沉迷于“全是可操作的建议，没有废话”。
- en: Don’t be an advice junky.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 不要成为建议的瘾君子。
- en: Do what you want and get better at doing it through education and effort.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 做你想做的事，并通过教育和努力提高你做这件事的能力。
- en: Have a great weekend.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 周末愉快。
- en: – Dan
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
