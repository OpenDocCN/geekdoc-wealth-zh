- en: When Life Get’s Hard, Here’s How You Push Through
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 当生活变得艰难时，这是你如何坚持下去的方法
- en: 原文：[https://thedankoe.com/letters/when-life-gets-hard-heres-how-you-push-through/](https://thedankoe.com/letters/when-life-gets-hard-heres-how-you-push-through/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/when-life-gets-hard-heres-how-you-push-through/](https://thedankoe.com/letters/when-life-gets-hard-heres-how-you-push-through/)
- en: We live in a delusion that we want to make progress without it being hard.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我们生活在一个幻想中，我们想要进步，但又不希望它艰难。
- en: We become slaves to what “should be,” and our should be is “easy.”
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我们成为了“应该是什么”的奴隶，而我们的“应该”是“容易”。
- en: People will go insane over the thought of walking in hot weather but can go
    into a sauna without complaint.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 人们会因在炎热天气中行走而发疯，但可以毫无怨言地进入桑拿房。
- en: The difference is expectation and intention.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 差别在于期望和意图。
- en: When you’re out in the cold, your automatic reaction is to shiver.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在寒冷中时，你的自动反应就是颤抖。
- en: To fight.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 为了战斗。
- en: It makes sense, right?
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这听起来合理，对吧？
- en: The cold is uncomfortable.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 寒冷让人不舒服。
- en: So, we focus on the compulsive, negative thoughts that stem from expectation
    and become a slave to the mental structures we call home.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们专注于由期望产生的强迫性负面思想，并成为我们称之为家的心理结构的奴隶。
- en: But, if you were to be with it, flow with it, and realize that discomfort is
    a part of the human experience…
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，如果你能与之共存，顺应它，并意识到不适是人类经历的一部分……
- en: You would find that your interpretation of thoughts is the culprit of your suffering.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 你会发现，你对思想的解释是你痛苦的根源。
- en: I’ve learned this lesson many times.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经多次学到这个教训。
- en: The first was after being arrested for the possession of marijuana (they don’t
    take that lightly on a college campus).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个是在因持有大麻被捕（他们在大学校园里不会对此轻视）之后。
- en: The second was after I’d borrowed $2000 from my dad, maxed out my first credit
    card, and taken out loans for a 5th year of college. I financially destroyed myself
    to make my little eCommerce business work… and it failed miserably.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个是在我从父亲那里借了2000美元，刷爆了我的第一张信用卡，并为大学第五年贷款之后。我为了使我的小电子商务业务运转而财务上自我毁灭……结果却惨败。
- en: The third was in Costa Rica. After I hit a high in business revenue, I impulsively
    bought a flight to CR with my girlfriend at the time.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 第三个是在哥斯达黎加。在我达到业务收入的高峰后，我冲动地和我当时的女朋友一起买了飞往CR的机票。
- en: The true nature of our relationship was revealed, we broke things off and flew
    back the next day.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我们关系的真正本质被揭示，我们分手了，第二天就飞了回去。
- en: 'All of these experiences had one thing in common:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些经历都有一个共同点：
- en: Mental turmoil.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 心理动荡。
- en: Not a slight increase in stress, but the kind where you feel trapped.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 不仅仅是压力的轻微增加，而是那种让你感到被困住的压力。
- en: The smallest tasks turn into mountains of impossibility.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 最小的工作也变成了不可能完成的巨山。
- en: Every thought becomes an enemy that traps you in a mental game.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 每个思想都变成了一个敌人，它将你困在心理游戏中。
- en: There ceases to be a light at the end of the tunnel, and you can’t help but
    wonder if you’ll ever get out.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 隧道尽头的光明消失了，你忍不住想知道你是否能出去。
- en: These phases of life aren’t fun, clearly.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这些生活的阶段显然并不有趣。
- en: But, these moments are when life offers a lesson that can only be found through
    a shift in direction.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，这些时刻正是生活提供只能通过改变方向才能找到的教训的时候。
- en: 'All of these major struggles had a few things in common:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些重大斗争有几个共同点：
- en: All progress-induced happiness was stripped from me, like an abrupt transition
    to a new movie scene after the climax.
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 所有由进步引起的快乐都被剥夺了，就像在高潮之后突然切换到新电影场景一样。
- en: I felt lost and had little desire to sustain the progress of my previous purpose
    – I had achieved it and had to move forward.
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我感到迷茫，几乎没有欲望去维持我之前目标的进步——我已经实现了它，必须继续前进。
- en: I experimented both inward and outward. I tried techniques for inner peace while
    creating new goals with accompanying education and practice.
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我内外都进行了实验。我尝试了内在平静的技术，同时设定新的目标，并伴随着教育和实践。
- en: With time, the pieces of the puzzle came together, brought clarity, and launched
    me into a new season of intensity.
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 随着时间的推移，拼图的碎片拼在一起，带来了清晰，并把我带入了新的强度季节。
- en: This is what we are here to unpack.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们在这里要解开的东西。
- en: Why does this matter?
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这为什么很重要？
- en: So you can identify the point in life you are at, see the light at the end of
    the tunnel, and avoid treading water before you are too tired to get to shore.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 所以你可以确定你目前生活中的位置，看到隧道尽头的光明，并在你筋疲力尽之前避免在水中挣扎。
- en: The Balance Of Peace & Progress
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 平衡和平与进步
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1051">![](../Images/d15dc8e06a7887927898fecdd61ccf9c.png)</picture>
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/d15dc8e06a7887927898fecdd61ccf9c.png)'
- en: Happiness is a skill.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 幸福是一种技能。
- en: It is not given but created.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 它不是被给予的，而是被创造的。
- en: Not deserved but earned.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 不是应得的，而是通过努力获得的。
- en: As with all skills, it must be practiced, refined, and adopted as a part of
    your life.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 就像所有技能一样，它必须被练习、提炼并成为你生活的一部分。
- en: If it doesn’t belong in every day, week, or month of your present and future,
    why are you doing it?
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 如果它不属于你现在的每一天、每周或每月，以及你未来的每一天、每周或每月，那你为什么要做它？
- en: If you want to become a writer, creator, or marketer – why are you not writing
    everyday? Even if you don’t get paid at the start, you still have to build leverage,
    reputation, and authority to the point of getting paid.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要成为一名作家、创作者或营销人员——为什么你不每天写作？即使一开始你得不到报酬，你仍然需要建立杠杆、声誉和权威，直到你得到报酬。
- en: If you want to learn high-impact writing (in a practical setting that helps
    you build leverage for the future of work) [check out 2 Hour Writer](https://2hourwriter.com).
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要学习高影响力的写作（在一个有助于你为未来工作建立杠杆的实际环境中）[查看2小时作家](https://2hourwriter.com)。
- en: When isolated, happiness loses its meaning as it cannot exist without an unhappy
    reference point of prior experience.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 当被孤立时，快乐失去了它的意义，因为它不能在没有不快乐的先前经验参照点的情况下存在。
- en: '*This is the problem with the new age positivity movement.*'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '*这就是新时代积极运动的问题所在。*'
- en: You can think positive thoughts all day long. But what people fail to realize
    is that every positive thought holds a negative seed. **This is why almost every
    great success comes after great failure.**
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以整天想些积极的思想。但人们没有意识到的是，每一个积极的思想都包含一个消极的种子。**这就是为什么几乎每一次巨大的成功都发生在巨大的失败之后。**
- en: You can think your way to a positive future, but the image of that future is
    forged through an equal and often more painful past.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过思考走向一个积极的未来，但那个未来的形象是通过一个相等且往往更痛苦的过去锻造的。
- en: Without a negative experience as an anchor, you have nothing meaningful to move
    toward.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 没有负面经验作为锚点，你没有什么有意义的目标可以朝着它前进。
- en: 'There are two states of mind to become aware of:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 有两种心态需要意识到：
- en: Being and doing.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 存在和行动。
- en: Peace and progress.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 和平与进步。
- en: Stillness and movement.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 静止与运动。
- en: When your attention is focused, without distraction, on either of these modalities
    of pure living, you tap into the power of the present moment.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的注意力集中，没有干扰，专注于这些纯粹生活的任何一种模式时，你就能进入当下的力量。
- en: '*Everyone wants money, muscles, and a desirable partner.*'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '*每个人都想要金钱、肌肉和理想的伴侣。*'
- en: The act of achieving those goals feels incredible… at the start.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 实现那些目标的感觉在开始时是难以置信的……
- en: If you don’t have a philosophical sense of mastery behind your material pursuits,
    you are in for a rude awakening.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有在物质追求背后一个哲学上的掌握感，你将面临一个粗鲁的觉醒。
- en: Even if your actions don’t change, the “why” behind them can.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 即使你的行为没有改变，它们背后的“为什么”可以改变。
- en: A bodybuilder that got started after a tough breakup can find meaning in the
    microcosm of life that weight training is – if they allow their mind to see beyond
    their identification with the material world.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 一个在艰难分手后开始健身的人，如果他们让心灵超越对物质世界的认同，可以在健身这个微观世界中找到生活的意义。
- en: Those that do acquire their material desires change on the outside, but not
    the inside.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 那些获得物质欲望的人在外表上发生了变化，但内心并没有。
- en: Many people turn a physical 60 years old with the mind of a 12-year-old going
    through emotional puberty.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人虽然身体已经60岁，但心灵却像12岁的孩子经历情感青春期。
- en: '*The main Buddhist teaching is that of impermanence.*'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '*佛教的主要教义是无常。*'
- en: That is, nothing can be isolated and held static by the mind.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 也就是说，没有任何东西可以被心灵孤立并保持静止。
- en: This includes ideas, feelings, emotions, people, locations, and everything else
    that we label and expect to stay the same forever.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这包括思想、感受、情绪、人、地点以及我们贴上标签并期望永远保持不变的一切。
- en: The identification with ideology, dogma, or other static mental constructs are
    the source of our suffering. **When they are threatened, so is our happiness.**
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 与意识形态、教条或其他静态的心理结构认同，是我们痛苦的根源。**当它们受到威胁时，我们的幸福也会受到影响。**
- en: Thinking is not bad and often necessary when critical.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 思考在关键时刻并不坏，而且是必要的。
- en: But when gone unchecked, compulsive thoughts can create a personal reality of
    inescapable turmoil.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 但当没有受到控制时，强迫性的思想可以创造一个无法逃脱的混乱的个人现实。
- en: '*When one is still, their mind wants to move.*'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '*当人静止时，他们的心灵却想要移动。*'
- en: '*When one is moving, their mind wants to be still.*'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '*当人移动时，他们的心灵却想要静止。*'
- en: Without deliberate practice, the mind will latch onto the past or future in
    an attempt to make the impermanent permanent.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 没有有意识的练习，心灵会抓住过去或未来，试图使不永恒的事物永恒。
- en: This is the cause of unhappiness but is not to be demonized as that is against
    the point.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这是导致不快乐的原因，但不应被妖魔化，因为这违背了宗旨。
- en: When you feel unhappy, observe that feeling. Lean into it. Let it point “a finger
    at the moon” and present the lesson that life is trying to teach you. From that
    low, lean into the coming high.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 当你感到不快乐时，观察那种感觉。深入其中。让它指向“月亮”并呈现生活试图教给你的教训。从那个低谷，深入即将到来的高峰。
- en: The activities that create this blissful state of mind are personal. You must
    observe, hypothesize, experiment, fail, learn, and repeat this never-ending process
    even once you have reached objective success.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 创造这种快乐心态的活动是私人的。你必须观察、假设、实验、失败、学习，即使你已经达到了客观的成功，也要重复这个永无止境的过程。
- en: Because even that isn’t permanent.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 因为即使那样也不是永恒的。
- en: Seasons Of Experimentation & Intensity
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实验与强度季节
- en: <picture decoding="async" class="wp-image-1049">![](../Images/0a526f6123f82a6a9e30b17aadb7fc4d.png)</picture>
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/0a526f6123f82a6a9e30b17aadb7fc4d.png)'
- en: The secret is to engage the mind with the impermanence of life, *not* attempt
    to engage life with the mind’s desire to make permanent.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 秘诀是让心灵与生活的无常相结合，*而不是*试图让生活与心灵想要使之永恒的欲望相结合。
- en: 'Of course, there are seasons of intensity that most of us have experienced:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，我们大多数人都有经历过强度季节：
- en: The “universe aligns,” everything clicks, and you act on an idea that makes
    perfect sense.
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “宇宙对齐”，一切顺利，你行动在一个完美的想法上。
- en: You have clarity on your goals, reaching new levels of skill, and enjoying the
    process.
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你对自己的目标有清晰的认识，达到新的技能水平，并享受这个过程。
- en: You feel a sense of purpose. It seems like there isn’t enough time in the day,
    but you wouldn’t change it for a thing.
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你有一种使命感。感觉一天的时间似乎不够用，但你不会为此改变任何事情。
- en: The feeling of pure progress is unmatched.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 纯粹进步的感觉是无与伦比的。
- en: No distractions, absolute clarity, placing one, two, three bricks down to build
    your vision for the future.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 没有干扰，绝对清晰，放下一块、两块、三块砖来构建你对未来的愿景。
- en: It would make sense to fill our days with more activities that result in this
    experience.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 用更多导致这种体验的活动来填满我们的日子是有意义的。
- en: Life’s seasons of intensity aren’t the problem.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 生活的强度季节并不是问题。
- en: They happen naturally after a season of experimentation.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这些事情在实验季节之后自然发生。
- en: '*That is where the problem lies for most people.*'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '*这就是大多数人问题所在。*'
- en: They don’t perceive the dreadful, negative, and hopeless period of feeling lost
    as an opportunity.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 他们没有把感觉迷失的可怕、消极和绝望的时期视为一个机会。
- en: If you can master your mind in these periods of struggle, the negative ceases
    to induce suffering.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能在这些斗争时期掌握你的心灵，那么消极就不再引起痛苦。
- en: Instead, you prime yourself to launch into a new season of progress.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，你让自己准备好进入一个新的进步季节。
- en: The Purpose Of Experimentation
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实验的目的
- en: Self-experimentation is the only way to solve your problems for good.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 自我实验是解决你问题的唯一方法。
- en: People can diagnose and prescribe a solution to your problems, but that lacks
    regard for the difference in perspective, goals, and experience from those prescribing
    the solutions.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 人们可以诊断并为你提供解决方案，但这忽视了那些提供解决方案的人的视角、目标和经验的差异。
- en: Let’s imagine that you are feeling low energy.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象你感到精力低落。
- en: You come across a post on social media that has confidence and conviction in
    the diet advice they give (this can also be applied to the problem of little money
    and specific business models).
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 你在社交媒体上看到一篇关于他们提供的饮食建议充满信心和信念的帖子（这也可以应用于资金少和特定商业模式的问题）。
- en: 'You are in search of a solution, they tell you that veganism will solve all
    of your problems, and from an unenlightened state you:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 你在寻找解决方案，他们告诉你素食主义将解决你所有的问题，从一个未开化的状态，你：
- en: Clean up your diet
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改善你的饮食
- en: Follow their advice as if it were law
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 像法律一样遵循他们的建议
- en: See the results they mentioned
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 看到他们提到的结果
- en: Then, you attach to that diet ideology and become a prophet. You attribute results,
    that others have gotten via different modalities, to veganism and demonize anyone
    that questions you.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你依附于那种饮食意识形态，成为一个先知。你将其他人通过不同方式获得的结果归因于素食主义，并谴责任何质疑你的人。
- en: This is dangerous, obviously, and is the definition of low consciousness.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 这显然是危险的，这是低意识的定义。
- en: 'In reality, what happened is independent of veganism:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，发生的事情与素食主义无关：
- en: You ate more nutrient-dense foods
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你吃了更多富含营养的食物
- en: Your actions worked to survive your vegan identity
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的行动帮助你生存下来，保持你的素食身份
- en: You had clarity (not chaos) by following a disciplined nutrition regimen
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你通过遵循有纪律的营养计划获得了清晰（而不是混乱）。
- en: Veganism, in this case, was simply a modality for ordering your mind (sustained
    degree of flow state) and allowing you to follow the principles of health – but
    you attributed it to a method.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，素食主义仅仅是一种整理你思维（持续的状态流）并让你遵循健康原则的方式（但你将其归因于一种方法）。
- en: 'Now, if you were to try veganism for a month, carnivore for a month, keto for
    a month, and flexible dieting for a month, you would:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果你尝试一个月的素食主义，一个月的肉食主义，一个月的生酮饮食，一个月的灵活饮食，你会：
- en: Make connections between the diets to reveal the fundamentals of health (pattern
    recognition = dopamine).
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在饮食之间建立联系，揭示健康的基本原则（模式识别=多巴胺）。
- en: Pick and choose certain methodologies that you enjoy, meaning they will bring
    sustainable results.
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择并选择你喜欢的某些方法，这意味着它们将带来可持续的结果。
- en: Refine a system that fits your individual nature to perfection.
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精炼一个适合你个性的系统，达到完美。
- en: Then, once healthy living becomes effortless, you can do the same for your finances,
    social life, romantic relationships, spiritual endeavors, or any other domain
    of life.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，一旦健康的生活方式变得毫不费力，你就可以为你的财务、社交生活、浪漫关系、精神追求或生活的任何其他领域做同样的事情。
- en: If you’re going through problems in your relationship, hire a therapist, watch
    a YouTube guru, go on a retreat, and experiment with options until you find the
    right solution.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在经历关系中的问题，可以雇佣治疗师、观看YouTube大师的视频、参加静修，并尝试不同的选择，直到找到正确的解决方案。
- en: If your business isn’t growing, buy a course, hire a coach, test a new software,
    zoom out, and create a new strategy…
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的业务没有增长，你可以购买课程、雇佣教练、测试新的软件、放宽视野，并制定新的策略...
- en: There’s always a way to solve your problems, and you strip yourself of that
    power when you latch onto one solution (that probably won’t solve the problem
    for good).
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 总是有解决问题的方法，而当你抓住一个解决方案（可能无法长期解决问题）时，你就剥夺了自己这种能力。
- en: Self-experimentation is the open-minded process of creating, not finding, the
    solution to the endless problems in your life.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 自我实验是开放心态的过程，是创造而不是寻找你生活中无尽问题的解决方案。
- en: '**Note for creators and solopreneurs:** this is how you create a unique, holistic
    product or service that markets itself in a saturated market.'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '**对创作者和独立创业者的话：**这就是你如何在竞争激烈的市场中创造一个独特、整体的产品或服务，并使其自我推广。'
- en: We don’t need more specialists, we need holistic synthesizers that create new
    systems with accompanying nuanced education.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不需要更多的专家，我们需要的是能够创建新系统并伴随细致教育的整体综合者。
- en: Experiment Inward
  id: totrans-116
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 向内实验
- en: You feel lost because you don’t have a system to maintain a baseline level of
    clarity.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 你感到迷茫，因为你没有系统来维持一个基线水平的清晰。
- en: When you enter a new chapter of life, clarity creation should be top priority.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 当你进入生活的新篇章时，清晰度的创造应该是首要任务。
- en: That alone will order consciousness to the point of feeling a sense of control
    over your future.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 仅此一项就能使意识有序到能够感觉到对未来的控制感。
- en: 'To go inward, the main techniques you will be experimenting with are that of
    immaterial pursuits:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 要向内探索，你将主要尝试非物质追求的技术：
- en: Philosophy, spirituality, or emotional intelligence.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 哲学、精神或情商。
- en: 'The techniques you can experiment with include but are not limited to:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以尝试的技术包括但不限于：
- en: Reading
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 阅读
- en: Meditation
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 冥想
- en: Observation
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 观察
- en: Self-inquiry
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自我探究
- en: Contemplation
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 思考
- en: Long quiet walks
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 长时间的宁静散步
- en: These activities engage your attention with the present moment.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 这些活动让你专注于当下。
- en: As with all skills, you improve by progressive overload.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 就像所有技能一样，你通过渐进式超负荷来提高。
- en: That is, by gradually increasing the level of challenge so that you don’t get
    bored or anxious. Bored because the challenge is too low, anxious because the
    challenge is too high.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 也就是说，通过逐渐增加挑战的难度，这样你不会感到无聊或焦虑。无聊是因为挑战太低，焦虑是因为挑战太高。
- en: The goal with inward experimentation is to incorporate one of these activities
    into your daily or weekly routine.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 向内实验的目标是将这些活动之一纳入你的日常或每周常规。
- en: The practice must be sustained, lifelong, and on the path of mastery if you
    wish to maintain the benefits that come from these pursuits.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想保持这些追求带来的好处，实践必须是持续的、终身的，并且是在掌握的道路上。
- en: Experiment Outward
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 向外实验
- en: The reason you feel lost is that you lost connection with a purpose, goal, or
    routine that brought order to your life.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 你感到迷茫的原因是你失去了与一个目的、目标或日常习惯的联系，这些习惯为你的生活带来了秩序。
- en: When you end a chapter in your life, you may not want the same things you previously
    did. This is a good thing. It means you are growing.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 当你结束生活中的一个章节时，你可能不再想要之前的东西。这是好事。这意味着你在成长。
- en: 'But, nobody wants to be stuck in that period of feeling lost for too long,
    and there is only one path out:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，没有人愿意长时间陷入迷茫的时期，而且只有一条出路：
- en: Stay mindful of hints at a new purpose, and don’t let the lessons of life pass
    you by.
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持对新的目的的警觉，不要让生活的教训从你身边溜走。
- en: Set a goal so that you can perceive life situations through the lens of that
    goal (again, pattern recognition = dopamine = collecting puzzle pieces until the
    image is clear)
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设定一个目标，这样你就可以通过这个目标来感知生活中的情况（再次强调，模式识别=多巴胺=收集拼图碎片直到图像清晰）
- en: Identify the gap between you and your goals and note problems standing in the
    way.
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别你与目标之间的差距，并注意阻碍你的问题。
- en: Study, build, and experiment in alignment with that goal.
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与目标一致地学习、构建和实验。
- en: What is the most pressing problem in your life right now?
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在生活中最紧迫的问题是什么？
- en: Is it self-esteem? Money? Lack of fulfillment?
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 是自尊心？金钱？缺乏满足感？
- en: Sit with this thought and contemplate.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 坐下来思考这个想法，进行沉思。
- en: Now, are you able to work towards solving that problem now, or do you have to
    solve another one?
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你能否现在就着手解决那个问题，还是你必须解决另一个问题？
- en: If you lack money and don’t have the time to start a business, then clearly
    you shouldn’t start a business. You either need to experiment with budgeting or
    get a new job.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你缺乏资金，没有时间开始创业，那么显然你不应该开始创业。你需要尝试预算或找一份新工作。
- en: If you’re looking for a boy/girlfriend, are you in the financial, physical,
    and spiritual position to sustain a relationship? If not, solve the other problems
    first.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在寻找男女朋友，你是否在财务、身体和精神上能够维持一段关系？如果不能，先解决其他问题。
- en: Once you identify a goal you can pursue, research, and experiment with techniques
    that will allow you to reach it.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你确定了一个可以追求的目标，就可以研究并实验那些帮助你实现它的技术。
- en: If you need guidance and education around building a high-performance lifestyle,
    starting an interest-based business, and joining a supportive community (where
    you might meet your next business partner), [check out Modern Mastery](https://modernmastery.com/letter)
    – readers can join for $5.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要关于建立高性能生活方式、开始基于兴趣的创业和加入一个支持性社区（你可能会在那里遇到你的下一个商业伙伴）的指导和教育，请查看[现代精通](https://modernmastery.com/letter)
    – 读者可以以5美元的价格加入。
- en: Maintain New Baselines
  id: totrans-150
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 维持新的基准
- en: As you progress through a season of experimentation, clarity begins to culminate.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你通过实验的季节的进展，清晰度开始达到高潮。
- en: Soon enough the final piece will click into place, you will launch into a season
    of intensity, and reach new highs in the respective domain of life.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 不久，最后一块拼图就会到位，你将进入一个充满活力的季节，在生活的相应领域达到新的高度。
- en: Like hitting a monthly high in business revenue.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 就像在商业收入中达到月度新高一样。
- en: But, stay mindful that this season will come to an end.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，保持警觉，这个季节将会结束。
- en: Similar to bulking and cutting in bodybuilding, you can only “bulk” for so long
    before you gain too much fat. You start to feel groggy, slow, and uncertain if
    you should keep pushing.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 就像健身中的增肌和减脂一样，你只能“增肌”一段时间，否则你会积累过多的脂肪。你开始感到昏昏欲睡、行动缓慢，不确定是否应该继续努力。
- en: When it comes time to “cut,” and without a proper system, you may lose a lot
    of the muscle you gained.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 当到了“减脂”的时候，如果没有一个合适的系统，你可能会失去你获得的大部分肌肉。
- en: We don’t want that.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不希望这样。
- en: As you are turning the final page, make an effort to separate signal from noise.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 当你翻到最后一页时，努力区分信号和噪音。
- en: Double down on the techniques, tasks, and actions that will maintain your a
    new baseline of “muscle” acquired.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 加倍努力于那些将维持你获得的新“肌肉”基准的技术、任务和行动。
- en: 'The entirety of this process of:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 整个这个过程：
- en: Experimenting to solve your problems
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过实验来解决你的问题
- en: Gaining clarity on a new chapter in life
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在生活中新的一章中获得清晰
- en: Pushing to new highs and systemizing the process to maintain results
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向新的高度努力，并系统化过程以维持结果
- en: Is the essence of life.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 这是生活的本质。
- en: In fact, it’s just another perspective of the scientific method.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，这只是科学方法的一个另一个视角。
- en: Do what you will with this information.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 随意使用这些信息吧。
- en: I am but another human that pursued a goal, figured it out, and am passing down
    what I learn.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 我只是一个追求目标、找到答案并传承所学的人。
- en: I would encourage you to do the same.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 我鼓励你也这样做。
- en: – Dan
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
