- en: How Smart Creators Will Build An Audience In 2025
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 智能创作者如何在2025年建立受众
- en: 原文：[https://thedankoe.com/letters/the-future-of-creators-how-to-build-an-audience-in-2025/](https://thedankoe.com/letters/the-future-of-creators-how-to-build-an-audience-in-2025/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/the-future-of-creators-how-to-build-an-audience-in-2025/](https://thedankoe.com/letters/the-future-of-creators-how-to-build-an-audience-in-2025/)
- en: I started writing on social media because I wanted to do what I want.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我开始在社交媒体上写作，因为我想要做自己想做的事情。
- en: But writing wasn’t my first attempt at freedom.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 但写作并不是我追求自由的第一次尝试。
- en: And before then, I definitely didn’t realize that writing – the weird skill
    for English majors and physical book authors – was my ticket to taking control
    of my life.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在那之前，我肯定没有意识到写作——这个对英语专业和实体书作者来说奇怪的技能——是我掌控自己生活的门票。
- en: My first “real job” was as a web designer for a retailer marketing agency (think
    eCommerce stores for furniture and appliance retailers).
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我的第一个“真正的工作”是在一家零售营销机构担任网页设计师（想想家具和家电零售商的电子商务店铺）。
- en: That came after working at a print shop part-time trying to pay rent in a frat
    house with 7 other dudes. While living there, I did everything in my power to
    work for myself. I’d always wanted to do something creative. I tried everything
    from photography, digital art, dropshipping, multiple eCommerce stores, starting
    an automated agency, freelance web development, and more. All failed.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在一家印刷店兼职工作，试图在兄弟会宿舍里支付租金，那里有7个室友。住在那里的时候，我尽我所能为自己工作。我一直想做一些有创意的事情。我尝试了从摄影、数字艺术、跨境电商、多个电子商务店铺、创办自动化机构、自由职业网页开发等等，但都失败了。
- en: But we all know failure is a good thing.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们都知道失败是好事。
- en: I got the web design job because I was 5 years into University with debt starting
    to pile up. I had about a year left of school because I switched majors at least
    4 times that I can remember.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我得到这个网页设计工作是因为我在大学里已经学习了5年，债务开始累积。我还有大约一年的学校时间，因为我记得至少换过4次专业。
- en: But my dream didn’t die. I knew that once I got the job, the clock started counting
    down toward my demise.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 但我的梦想并没有死去。我知道一旦我得到这份工作，时钟就开始倒计时，指向我的毁灭。
- en: Getting a job was the bane of my existence. The crux of my anti-vision.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 找到一份工作是我存在的痛苦。我反乌托邦愿景的核心。
- en: I knew I would get comfortable.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道我会变得舒适。
- en: I knew if I didn’t act now, I’d be in the corporate system for life.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道如果我现在不采取行动，我就会终身陷入企业系统。
- en: And it would only get harder – as responsibilities piled up – to get out.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 而随着责任的累积，想要摆脱现状只会变得更加困难。
- en: Luckily, I had so many failures under my belt that I made a good chunk of money
    with freelance web design. Enough to quit the job. I procrastinated most of my
    work at my job to pursue and learn about freelancing. I was a terrible employee,
    but I did just enough to fly under the radar.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，我有如此多的失败经历，通过自由职业网页设计赚了一大笔钱。足够让我辞职。我在工作中拖延了大部分工作，以追求和学习自由职业。我是个糟糕的员工，但我做得足够好，以至于没有引起注意。
- en: But I was still working close to full-time as a freelancer.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 但我仍然几乎全职地作为自由职业者工作。
- en: I still hated working on projects for other people.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我仍然讨厌为别人做项目。
- en: That’s when I finally came around to social media.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 那时我终于明白了社交媒体的重要性。
- en: The Key To My Freedom
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自由的关键
- en: You don’t learn anything from praise or success.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 从赞美或成功中你学不到任何东西。
- en: You learn from negativity and failure.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以从负面和失败中学习。
- en: My “failed” businesses are what taught me all of the skills (like branding,
    design, copywriting, and distribution) that developed my mind to finally realize
    the importance of social media at this stage of internet businesses.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我的“失败”的企业教会了我所有的技能（如品牌建设、设计、文案写作和分销），这些技能最终使我意识到在互联网业务这个阶段社交媒体的重要性。
- en: After a few months of scrolling on Twitter in 2019, I realized something.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在2019年翻阅了数月推特后，我意识到一件事。
- en: People were just… writing. No images, no designs, no time-consuming video editing.
    Like sending texts to a huge public group chat.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人们只是……写作。没有图片，没有设计，没有耗时的视频编辑。就像向一个巨大的公共群聊发送短信。
- en: People were talking about things I already knew. I often thought, “I could write
    that tweet.”
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人们谈论的事情我已经知道了。我经常想，“我也能写那条推文。”
- en: People were using their profiles as a way to attract clients. A few did so with
    web design (“Hey, I could do that too.”)
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人们将他们的个人资料用作吸引客户的方式。一些人通过网页设计做到了这一点（“嘿，我也能做这个。”）
- en: The people were actually cool. I felt like I was in a place that didn’t have
    business-speak or the professionalism I despised, but they were still cashing
    out big.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人们实际上很酷。我感觉自己在一个没有商业语言或我厌恶的专业性的地方，但他们仍然赚了很多钱。
- en: That’s when it clicked.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 那时我才恍然大悟。
- en: “Wait, these people aren’t sending cold emails or doing weird client acquisition
    strategies.”
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: “等等，这些人不是在发送冷邮件或采取奇怪的客户获取策略。”
- en: They’re just building an audience.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 他们只是在建立受众。
- en: You’re telling me that I can just write content I enjoy and it can attract clients
    to me?
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 你是在告诉我，我可以只写我喜欢的内容，它就能吸引客户到我这里来吗？
- en: Why have I been ruining my mental health by sending manual cold emails and working
    with people in a niche I despise because someone told me it was profitable?
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我要通过发送手动冷邮件和与一个我讨厌的利基市场的人合作来破坏我的心理健康，因为有人告诉我这是有利可图的？
- en: After all this time… writing, of all things, was the key to my freedom.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 经过这么长时间……写作，所有事情中，是通向我的自由的钥匙。
- en: Why?
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: One, it could help me get freelance clients, but that was just the start.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 一，它可以帮助我获得自由职业客户，但这只是开始。
- en: If I stuck with it and built even a small audience, I’d be able to do something
    even higher leverage.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我坚持下去，建立起哪怕是一个小小的受众群体，我就能做一些更有影响力的工作。
- en: Physical products, digital products, software, books… I could finally “make
    money while I sleep” and stop taking on projects I didn’t care about.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 物理产品、数字产品、软件、书籍……我终于可以“睡梦中赚钱”并停止接受我不感兴趣的项目。
- en: As many of you can tell, that vision came true with the right amount of persistence
    and iteration.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你们中的许多人可以告诉我的那样，通过适当的坚持和迭代，那个愿景终于实现了。
- en: But money was just the tip of the iceberg.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 但钱只是冰山一角。
- en: Most people fail to realize that. They love to say, “They’re just in it for
    the money,” but absolutely nobody is doing anything in life for only one reason.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人都没有意识到这一点。他们喜欢说，“他们只是为了钱而做这件事，”但生活中绝对没有人只为了一个原因而做任何事情。
- en: 'Yes, duh, we’re in it for the money. Money is necessary. Leave your conditioned
    perception of money out of this. The point is:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，当然，我们都是为了钱。钱是必要的。把你对钱的固有观念放在一边。重点是：
- en: What’s a more fulfilling line of work is there than getting paid to be yourself?
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 有什么比得到报酬做自己更有意义的工作呢？
- en: To sell products that have a positive impact on others.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 为了销售对他人有积极影响的产品。
- en: To help people by talking about the interests that are important to you.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 通过谈论对你来说重要的兴趣来帮助人们。
- en: I know it sounds altruistic, but to me, that sounds a hell of a lot better than
    making money just to survive, even if it’s freelancing.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道这听起来很无私，但对我来说，这比仅仅为了生存而赚钱要好得多，即使它是自由职业。
- en: Freelancing wasn’t as free as I thought.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 自由职业并不像我想象的那么自由。
- en: The Future Of Audience Building
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 受众建设的未来
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2251">![](../Images/ab451d892b3db0a19113e8f7d8698127.png)</picture>
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-2251">![](../Images/ab451d892b3db0a19113e8f7d8698127.png)</picture>
- en: Social media has changed since then.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 自从那时起，社交媒体已经发生了变化。
- en: You wouldn’t believe it, but it’s easier now to build an audience than it was
    before.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 你不会相信，但现在建立受众比以前更容易了。
- en: TikToks, Reels, and Shorts didn’t exist.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: TikToks、Reels和Shorts还不存在。
- en: Of course, those aren’t writing-based, but their popularity changed the way
    algorithms work as a whole.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，那些不是基于写作的，但它们的流行改变了算法的整体工作方式。
- en: Algorithms have switched to an *interest graph.*
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 算法已经切换到*兴趣图谱*。
- en: Meaning that *social media followers don’t matter anymore (mostly).*
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着*社交媒体的粉丝不再重要了（大部分情况下）。*
- en: The “For You” page has changed what we see on our feeds.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: “为你推荐”页面已经改变了我们动态上看到的内容。
- en: Yes, you still see content from people you follow, but only if you continuously
    express interest in that account.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，你仍然能看到你关注的人发布的内容，但前提是你必须持续对该账户表示兴趣。
- en: Most of the time, your feed is filled with related posts on topics you’ve shared,
    viewed for an extended period of time, or engaged with recently.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数时候，你的动态都是你分享、长时间查看或最近参与的话题的相关帖子。
- en: 'This means a few things:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着几件事情：
- en: Small accounts can grow rather quickly if they learn to write engaging and relevant
    content.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果小账户学会了写吸引人和相关的内容，它们可以迅速增长。
- en: To stay relevant on social media, you can’t go as deep as you used to. You have
    to stay rather shallow. (Not a bad thing. You are forced to meet people where
    they are, beginner level, and actually change their lives to the point of understanding
    your depth.)
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了在社交媒体上保持相关性，你不能像以前那样深入。你必须保持相对肤浅。（这并不是坏事。你被迫去接触那些处于入门水平的人，并真正改变他们的生活，直到他们理解你的深度。）
- en: If you want to *build* and *keep* your audience, newsletters are more important
    than ever. Social media becomes a “first layer” for followers to be introduced
    to you. Not a place to be nurtured or educated (again, mostly).
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你想要*建立*和*保持*你的受众，时事通讯比以往任何时候都更重要。社交媒体成为让追随者了解你的“第一层”，而不是一个培养或教育的地方（再次强调，主要是）。
- en: I’m talking about short-form platforms here.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里谈论的是短内容平台。
- en: Instagram, X, LinkedIn, TikTok, and shorts.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: Instagram、X、LinkedIn、TikTok和短视频。
- en: Long-from YouTube videos and podcasts are a slightly different story.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 长视频和播客则是一个稍微不同的话题。
- en: Newsletters Are The New Audience
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 时事通讯是新的受众。
- en: <picture decoding="async" class="wp-image-2252">![](../Images/3b60ac2fd1da05c4ba7aeda50e390770.png)</picture>
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-2252">![](../Images/3b60ac2fd1da05c4ba7aeda50e390770.png)</picture>
- en: I’ve been talking about this for 2-3 years now and it seems like others are
    catching on.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经谈论了这个话题2-3年了，现在似乎其他人也开始注意到了。
- en: For trust, authority, and leverage – long-form matters more.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 对于信任、权威和杠杆作用来说，长内容更为重要。
- en: For traffic, virality, and attention – short-form matters more.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 对于流量、病毒式传播和关注度来说，短内容更为重要。
- en: The point is that both matter.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 重点是两者都很重要。
- en: If you rely on one, you limit your long-term success.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你依赖单一来源，你将限制你的长期成功。
- en: Yes, you can talk about shallow topics on social media all day and make some
    quick cash, but you aren’t building something that will last years from now, both
    in terms of digital and mental real estate.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，你可以在社交媒体上谈论肤浅的话题一整天并快速赚钱，但你没有建立出几年后仍然存在的有形和无形资产。
- en: If you don’t write long-form, not only will you be forgotten in people’s minds,
    but your business can be shut down by social platforms at the snap of a finger.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你写得不够长，不仅你会在人们心中被遗忘，而且你的业务可能会在社交平台的瞬间被关闭。
- en: If you don’t write short, you don’t build your audience.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你写得不够简短，你就无法建立起你的读者群。
- en: If you don’t write long, you don’t keep your audience.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你写得不够长，你就无法保持你的读者群。
- en: Your follower count doesn’t represent your audience size anymore because “For
    You” pages exist where everyone goes viral.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 你的关注者数量不再代表你的受众规模，因为“为你推荐”页面存在，每个人都可以在这里病毒式传播。
- en: An email list is the only true representative of your audience size.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 电子邮件列表是唯一真正代表你受众规模的指标。
- en: An email list is the new status symbol.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 电子邮件列表是新的地位象征。
- en: Nobody can take an email list away from you.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人能从你那里夺走你的电子邮件列表。
- en: Let’s piece this all together.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们把这些拼凑在一起。
- en: 1) Write short-form to attract people.
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 写短内容以吸引人们。
- en: You can’t build a newsletter unless you have people to send to the newsletter.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 除非你有可以发送给时事通讯的人，否则你无法建立时事通讯。
- en: It’s like people who write a book and expect Amazon traffic to make them rich.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这就像那些写书并期待亚马逊流量使他们致富的人一样。
- en: No. You need *your own traffic source to fuel your products and writing.*
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 不，你需要*你自己的流量来源来推动你的产品和写作*。
- en: AKA short-form on social media.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 即社交媒体上的短内容。
- en: Short-form writing is your base in today’s social media environment.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今社交媒体环境中，短内容写作是你的基础。
- en: Write about your opinions.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 写关于你的观点。
- en: Give short actionable advice but don’t fill in the blanks. Let people ask questions
    for more engagement.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 提供简短的操作性建议，但不要填空。让人们提问以增加参与度。
- en: Make polarizing statements that are true from your perspective. Let people filter
    themselves out if they can’t see both sides.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 提出具有争议性的但符合你观点的陈述。如果他们看不到双方的观点，就让他们自己过滤掉。
- en: 'In the simplest of explanations:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 在最简单的解释中：
- en: Pick an idea, any idea.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择一个想法，任何想法都可以。
- en: Write it from your own perspective, don’t worry about the first draft.
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从你自己的视角来写，不要担心初稿。
- en: Edit it. Make it attention-grabbing and impactful.
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编辑它。让它引人注目并具有影响力。
- en: Reference other’s content *structures*, not ideas, to enhance your own.
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 参考他人的内容结构，而不是想法，以增强你自己的内容。
- en: Iterate with feedback based on engagement.
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据参与度进行迭代，基于反馈进行改进。
- en: You don’t need a course to start, but if you want all strategies in one place,
    consider joining the [Writer’s Bootcamp](https://bootcamp.kortex.co) that starts
    October 28th. We go over post, thread, newsletter, and other writing strategies
    like social growth and audience building.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要课程就可以开始，但如果你想要所有策略都在一个地方，可以考虑加入10月28日开始的[作家训练营](https://bootcamp.kortex.co)。我们将讨论帖子、线程、时事通讯以及其他写作策略，如社交增长和受众建设。
- en: 'The problem most people have with short-form writing is this:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人对于短内容写作的问题是这样的：
- en: They don’t want to be shallow.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 他们不想肤浅。
- en: They don’t want to “play the status game.”
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 他们不想“玩地位游戏”。
- en: They get upset when people don’t follow or engage with the ideas they post that
    are so clever, cool, and deep.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 当人们不跟随或不参与他们发布的如此聪明、酷、深刻的思想时，他们会感到沮丧。
- en: Stop thinking about it like that.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 别再那样想了。
- en: Think of it like you are expanding people’s minds from shallow to deep.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你正在将人们的思想从浅层扩展到深层。
- en: How are you going to help people if you expect them to know everything you know?
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你期望人们知道你所知道的一切，你将如何帮助他们？
- en: You are meeting them where they are, which is going to be shallow most of the
    time (that’s why they’re on social media), but then it’s your duty to introduce
    them to something deeper in your long-form content.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 你是在他们所在的地方与他们相遇，这在大多数情况下将是浅层的（这就是为什么他们在社交媒体上），但然后你有责任向他们介绍你长内容中的更深层次内容。
- en: You need to think of all of your content as one unit.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要将所有内容视为一个整体。
- en: Your posts, threads, and newsletters are all one organism.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 你的帖子、线索和通讯都是同一个有机体。
- en: Short-form is for attracting a broad and somewhat shallow audience.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 短内容适合吸引广泛但相对肤浅的受众。
- en: Medium-form, like threads and shorter YT videos, is about going a bit deeper
    and letting the right people choose to join your newsletter, watch your videos,
    or read your books/guides/courses.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 中等长度的内容，如线索和较短的YouTube视频，是关于深入探讨，并让合适的人选择加入你的通讯名单、观看你的视频或阅读你的书籍/指南/课程。
- en: Long-form, like newsletters and long videos or podcasts, is for the dedicated
    fans. They are aligned with your goals and want to learn as much as they can from
    you.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 长内容，如通讯、长视频或播客，是为忠实粉丝准备的。他们与你的目标一致，并希望尽可能多地从你那里学习。
- en: 2) Write medium-form to educate people.
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 写中等长度的内容来教育人们。
- en: In my eyes, the role of medium-form content is to display *competence.*
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，中等长度内容的作用是展示**能力**。
- en: Threads, carousels, short YouTube videos, long posts, micro articles, etc.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 线索、轮播图、短视频、长帖子、微型文章等。
- en: Pick one style that makes sense and get better at it.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一种有意义的风格，并在此方面不断提高。
- en: Personally, I like threads, because you can cross post them as carousels quite
    easily and use them as shorter YT video scripts.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 个人来说，我喜欢线索，因为你可以很容易地将它们作为轮播图进行跨发帖，并将它们用作较短的YouTube视频脚本。
- en: (My most viral 1.5M view YouTube video is exactly [this thread](https://x.com/thedankoe/status/1603724124047769600),
    which was an expanded version of this [short-form post](https://x.com/thedankoe/status/1538861422779764738)).
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: （我观看量最高的1.5M次YouTube视频正是这个[线索](https://x.com/thedankoe/status/1603724124047769600)，这是这个[短内容帖子](https://x.com/thedankoe/status/1538861422779764738)的扩展版）。
- en: 'Threads, carousels, and short videos are great at:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 线索、轮播图和短视频在以下方面做得很好：
- en: Building authority and trust.
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立权威和信任。
- en: Giving people enough information to instant follow you.
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 给予人们足够的信息，让他们能够立即关注你。
- en: Leading a lot of people to the bottom of the thread where you can promote your
    newsletter, opt-in, or even product.
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将很多人引导到线索的底部，在那里你可以推广你的通讯、进行订阅或甚至推广产品。
- en: 'You can build a high-quality audience with threads alone, but the problem still
    remains:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以仅用线索就建立一个高质量的受众群体，但问题仍然存在：
- en: Your follower count doesn’t matter anymore.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 你的关注者数量已经不再重要了。
- en: 3) Write long-form to create 1000 true fans.
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 写长内容来创造1000个忠实粉丝。
- en: All of your content should lead people up a hierarchy of trust and value.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 你所有的内容都应该引导人们建立起信任和价值体系。
- en: Posts lead to readers.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 帖子可以吸引读者。
- en: Threads lead to fans.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 线索可以吸引粉丝。
- en: Newsletters lead to superfans.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 通讯可以吸引超级粉丝。
- en: And if you’re familiar with the *1000 true fans* concept, an engaged email list
    is all you need to set yourself up for life.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你熟悉**1000个忠实粉丝**的概念，一个活跃的电子邮件名单就是你为自己设定一生的全部。
- en: I was first introduced to this power when I read The Invisible Selling Machine
    by Ryan Deiss. This is one of the few business books I’ve actually read. I mostly
    get my business advice from ancient philosophy and modern psychology.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 我第一次了解到这种力量是在阅读莱恩·迪伊斯的《无形销售机器》时。这是我真正读过的少数几本商业书籍之一。我主要从古代哲学和现代心理学中获取商业建议。
- en: And while I don’t use any of his tactics anymore, the first lesson of the book
    stuck with me.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我现在不再使用他的任何策略，但书中的第一个教训一直留在了我的心中。
- en: Ryan was in chaos. One of those life situations where he had to come up with
    a lot of money fast or else he was done for. So, he created a valuable offer,
    sent it to his list, and made a substantial amount of money overnight (because
    he took the time to build an email list).
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 莱恩陷入了混乱。这是那种他必须快速筹集大量资金的生活状况，否则他就完了。所以，他创造了一个有价值的提案，发送给了他的名单，并在一夜之间赚了一大笔钱（因为他花了时间建立电子邮件名单）。
- en: I don’t have the book with me now, but it was more money than anyone would know
    what to do with. Much more than $100,000 if I remember correctly (don’t quote
    me).
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 我现在没有那本书，但据我所知，它的价值远远超过任何人都知道如何处理的钱。如果我记得正确的话，比10万美元多得多（不要引用我）。
- en: In short, newsletters are where the people who actually care about you and your
    interests go to support you.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，新闻简报是那些真正关心你和你兴趣的人支持你的地方。
- en: We’re doing a [live stream on the Kortex YT channel](https://community.kortex.co/c/live-events/how-dan-writes-newsletters-youtube-scripts)
    here if you want to learn how I write newsletters and YouTube scripts. It’s on
    October 25th at 1pm MST.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想了解我是如何写新闻简报和YouTube脚本的，我们在这里的Kortex YT频道进行了一场[直播](https://community.kortex.co/c/live-events/how-dan-writes-newsletters-youtube-scripts)。时间是10月25日下午1点
    MST。
- en: How To Build An Audience In 2025
  id: totrans-133
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何在2025年建立受众
- en: 'Audience building comes down to 6 things:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 建立受众主要归结为6件事：
- en: Testing ideas and structures on social media.
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在社交媒体上测试想法和结构。
- en: Having a catalyst strategy for new posts.
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为新帖子制定催化剂策略。
- en: Turning best ideas into threads & newsletters.
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将最佳想法转化为帖子和新简报。
- en: Repurposing your writing to other platforms.
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将你的写作重新用于其他平台。
- en: Taking advantage of exponential events.
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用指数级事件。
- en: Sending everyone to your newsletter.
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将每个人都引导到你的新闻简报。
- en: These are the only things you need to focus on every morning.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是你每天早上唯一需要关注的事情。
- en: When done well, it should take no longer than 1-2 hours a day.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 如果做得好，每天只需1-2小时即可。
- en: 1) Social Media Posts Are The New MVP
  id: totrans-143
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 社交媒体帖子是新的MVP
- en: MVP = minimum viable product.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: MVP = 最小可行产品。
- en: Social media, in my eyes, is a testing ground for ideas that can be distributed
    to higher leverage platforms.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，社交媒体是一个可以分发到更高杠杆平台的想法测试场。
- en: Post on social media.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 在社交媒体上发帖。
- en: Turn your best posts into threads and newsletters.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的最佳帖子转化为帖子和新简报。
- en: Turn your best threads and newsletters into free downloads.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的最佳帖子和新简报转化为免费下载。
- en: Turn free downloads into an information product or service.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 将免费下载转化为信息产品或服务。
- en: Turn your information product or service into a software, physical product,
    book, or other scalable business.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的信息产品或服务转化为软件、实物产品、书籍或其他可扩展的业务。
- en: 2) You Need An Idea Catalyst
  id: totrans-151
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 你需要一个想法催化剂
- en: If you have low or zero followers, you will experience beginner hell.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只有少量或没有粉丝，你将经历新手地狱。
- en: I’m not sure what people are thinking when they start, but no, the algorithm
    isn’t going to do anything with your posts. You may get lucky, but I don’t like
    basing my life’s work off of luck.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 我不确定人们在开始时在想什么，但不是，算法不会对你的帖子做任何事情。你可能会有好运，但我不喜欢把我的生活工作建立在运气上。
- en: You need a way to guarantee that people see your posts. That way, you can actually
    see what ideas do well and which don’t.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要一种方式来确保人们看到你的帖子。这样，你实际上可以看到哪些想法做得好，哪些不好。
- en: In other words, you need someone *with an audience* to like, comment on, or
    share your post. Comments seem to be the most potent right now (platform-dependent).
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，你需要有人*有受众*来点赞、评论或分享你的帖子。目前看来，评论似乎是最有力的（平台相关）。
- en: 'There are a few ways you can do this:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以采取几种方式来做这件事：
- en: '**1) Pay To Play**'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 付费参与**'
- en: Ads allow you to pay a platform (like Facebook or Google) to show your posts
    to more of their audience.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 广告允许你付费给一个平台（如Facebook或Google），让他们向更多受众展示你的帖子。
- en: But ads aren’t the only way to reach a larger audience. In fact, I’d rather
    not pay the platform for it. I’d rather pay an individual with whom I want to
    build a relationship and who has a highly engaged audience.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 但广告并不是扩大受众的唯一方式。事实上，我宁愿不为此向平台付费。我宁愿付给一个我想建立关系并且拥有高度参与度受众的个人。
- en: Almost anyone who has a social media audience also has a service where they
    help you grow. It’s easy money for them and highly beneficial for you.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎所有有社交媒体受众的人也都有一个服务，他们帮助你增长。对他们来说这是容易赚钱的，对你来说非常有益。
- en: DM accounts over 20K followers and ask if they help kickstart social growth.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 向拥有20K以上粉丝的DM账户发送消息，询问他们是否可以帮助启动社交增长。
- en: (Big brands charge thousands for this because other brands view it as a viable
    marketing strategy. If you don’t have thousands of dollars, don’t reach out to
    big brands for growth.)
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: （大品牌为此收费数千美元，因为其他品牌将其视为可行的营销策略。如果你没有数千美元，不要向大品牌寻求增长。）
- en: If you don’t want to invest in growth (1) that’s fine but (2) I’d question whether
    you’re serious about building your life’s work. You’ll spend $40 on a nice pleasurable
    dinner but you won’t spend that much on business traffic that could make you 10X
    more if you have a product and understand the concept of ROI.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不想投资增长（1）那也行，但（2）我会质疑你是否真的认真对待建立你的人生事业。你会在一顿美好的愉悦晚餐上花40美元，但你不会在可能让你增加10倍的业务流量上花这么多钱，如果你有一个产品并且理解ROI的概念。
- en: And no. I don’t agree with those who think investing money in your business
    growth is “inauthentic” so they can pitch you on *their* way to grow. And double
    no, you don’t need to grind in the replies like everyone else and race to the
    bottom (that doesn’t mean don’t comment and make friends).
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 并且不。我不认同那些认为投资金钱在你的业务增长上是“不真诚”的人，他们可以向你推销**他们**的增长方式。而且双重否定，你不需要像其他人一样在回复中努力奋斗，争先恐后地走向底部（这并不意味着不要评论和交朋友）。
- en: '**2) Building A Tribe**'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 建立一个部落**'
- en: Now, you don’t *need* to pay to play the social media game.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你**不需要**付费来玩社交媒体游戏。
- en: I haven’t done it in 3 years now. But you can bet that when I first started
    out I was going to do everything in my power to replace my current life situation.
    I wanted out of freelancing so bad. I wasn’t going to delay that because growth
    gurus say it’s bad yet can’t string together a logical argument as to why.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经三年没有这样做过了。但你可以肯定，当我刚开始的时候，我会尽我所能去改变我当前的生活状况。我非常想摆脱自由职业。我不会因为增长大师说那不好而推迟，他们又不能提出一个合理的论据来说明为什么。
- en: There are other methods to getting your posts spread to larger audiences.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 有其他方法可以将你的帖子传播到更大的受众。
- en: You inject yourself into a tribe on social media.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 你将自己融入社交媒体上的一个部落。
- en: Find accounts around your size.
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 找到与你规模相当的账户。
- en: Add them to a list or bookmark their profiles.
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将它们添加到列表中或收藏他们的个人资料。
- en: Reply to their content every day.
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每天回复他们的内容。
- en: Then, take a conversation from the replies to the DMs.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，从回复中提取对话到私信。
- en: Treat it like you’re texting a friend after you found something interesting
    you wanted to share with them.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 就像你发现了一些有趣的东西想要与朋友分享后给朋友发短信一样对待它。
- en: After that, ask them what they’re doing to grow.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，询问他们正在做什么来增长。
- en: Boom, now you’re in a position to ask if they want to grow together by engaging
    with each others content.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 嘣！现在你可以询问他们是否愿意通过互动彼此的内容一起成长。
- en: If you want to watch this happen live, I’ll probably inject my way into the
    startup niche on X at some point next year for Kortex-related reasons. Feel free
    to watch.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想现场观看这一过程，我可能会因为与Kortex相关的原因，在明年某个时候将我的方式注入X的初创领域。请随意观看。
- en: '**3) Exchanging Value**'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 交换价值**'
- en: If you don’t have money or suck at making friends, maybe you have a skill set
    or other form of social capital you can exchange for shares.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有钱或者不擅长交朋友，也许你有一套技能或其他形式的社会资本可以用来交换股份。
- en: I.E. You have an Instagram audience while they have an X audience.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你有一个Instagram受众，而他们有一个X受众。
- en: You can offer to share their posts on IG while they share yours on X.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以提出在IG上分享他们的帖子，同时他们在X上分享你的帖子。
- en: Or, maybe you can build a landing page to write an email sequence for them in
    exchange for shares.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，也许你可以为他们建立一个着陆页，以换取股份来写一封电子邮件序列。
- en: Get as creative as you want with this.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以根据自己的意愿发挥创意。
- en: Trading goods and services is just as viable as trading money.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 交易商品和服务与交易金钱一样可行。
- en: 3) Turn Your Best Posts Into Newsletters
  id: totrans-185
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 将你的最佳帖子变成通讯稿
- en: When a post stands out as an anomaly, turn that post into a newsletter.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个帖子作为一个异常值脱颖而出时，将那个帖子变成通讯稿。
- en: Use the BPAS framework.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 使用BPAS框架。
- en: Big idea – state the idea in the post.
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大概念 - 在帖子中陈述这个想法。
- en: Problem – illustrate a relatable problem based on the big idea.
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 问题 - 基于大概念，展示一个相关的问题。
- en: Amplify – give examples of how that problem impacts people’s lives.
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 放大 - 提供该问题如何影响人们生活的例子。
- en: Solution – give steps, lessons, or insights that help solve the problem.
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解决方案 - 提供步骤、教训或见解，以帮助解决问题。
- en: This is the short and sweet way to write a newsletter.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 这是写通讯稿简短而直接的方式。
- en: There are only 2 sections. The intro with the big idea, problem, and amplification
    of the problem, and the solution where you list out each step and give context
    to each (like I did in this letter.)
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 只有两个部分。介绍部分包含大概念、问题和问题的放大，以及解决方案部分，你列出每个步骤并给出每个步骤的背景（就像我在这封信中所做的那样）。
- en: 4) Take Advantage Of Exponential Events
  id: totrans-194
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 利用指数级事件
- en: Audience growth is non-linear.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 受众增长是非线性的。
- en: You flatline or make slow progress for a bit. Then you see a lot of growth at
    once.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会暂时停滞不前或缓慢进步。然后你会一次性看到很多增长。
- en: There are a select few posts on X that led to above average audience growth
    for me. Every time I repost those ideas I know that I will gain followers.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 在X上，有一些精选帖子让我获得了高于平均水平的观众增长。每次我重新发布那些想法，我都知道我会增加关注者。
- en: My YouTube growth was very slow until one video did extremely well (and grew
    me by 200K subscribers in a month.)
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 我的YouTube增长一直很慢，直到有一个视频表现极好（一个月内为我增加了20万订阅者。）
- en: My IG growth was also slow, but when I hit the jackpot with certain reels or
    carousels, I grew by 1.2M in a few months.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 我的Instagram增长也很慢，但当我用某些视频或轮播图击中大奖时，几个月内我增长了120万。
- en: Most of viral growth is experimenting with ideas for 1-2 years until you reach
    one of these exponential events.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数病毒式增长是在尝试了1-2年的想法之后，直到你达到这些指数级事件之一。
- en: When you have a topic that does well, don’t be an idiot and try something different.
    Post about that as much as humanely possible from all angles until growth starts
    to plateau.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 当你有一个表现良好的主题时，不要做傻瓜去尝试不同的事情。尽可能从所有角度发布关于那个主题的内容，直到增长开始趋于平稳。
- en: I made 20+ more videos on the one-person business model, and it took me to where
    I am today.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 我制作了20多个关于单人商业模式的视频，这让我走到了今天。
- en: This is less about sticking to a niche and more about experimenting with your
    interests and doubling down on the ideas that work.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 这更多是关于坚持细分市场，而不是关于尝试你的兴趣并加倍投入那些有效想法。
- en: I have plenty of philosophy and productivity videos that have done better than
    my one-person business videos. I doubled down on those too.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 我有很多哲学和生产力视频的表现比我一个人的商业模式视频要好。我也加倍投入了那些。
- en: 5) Send Everyone To Your Newsletter
  id: totrans-205
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5) 将所有人引导到你的通讯录
- en: Promote your newsletter everywhere.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个地方推广你的通讯录。
- en: Once a day under your posts or in your story.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 每天在你的帖子或故事下面更新一次。
- en: At the end of your threads or carousels.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的帖子或轮播图的末尾。
- en: In your YT descriptions.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的YouTube描述中。
- en: Your newsletter will be where you promote your products or services (most of
    the time, not all of the time.)
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 你的通讯录将是推广你的产品或服务的地方（大多数时候，不是所有时候。）
- en: If you don’t get people on your newsletter, you may never see them again.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有在通讯录中添加人们，你可能再也见不到他们了。
- en: Remember, followers don’t matter. Email list does.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，关注者并不重要。电子邮件列表才是。
- en: That’s it for this letter.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 这封信就到这里了。
- en: I hope it was helpful.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 希望这对你有帮助。
- en: – Dan
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
