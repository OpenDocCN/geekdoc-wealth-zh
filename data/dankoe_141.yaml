- en: 'The Dopamine Epidemic: How Society Failed To Think Long Term'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 多巴胺流行病：社会如何未能长期思考
- en: 原文：[https://thedankoe.com/letters/the-dopamine-epidemic-how-society-failed-to-think-long-term/](https://thedankoe.com/letters/the-dopamine-epidemic-how-society-failed-to-think-long-term/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/the-dopamine-epidemic-how-society-failed-to-think-long-term/](https://thedankoe.com/letters/the-dopamine-epidemic-how-society-failed-to-think-long-term/)
- en: 'Ad: Before we start, the One-Person Business Launchpad is available for pre-order
    until Black Friday weekend. It will be 50% off until that time. Pick it up here
    if you find yourself asking, “Okay, I like the concept of a one-person business…
    but *how do I actually start one?”*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 广告：在我们开始之前，单人商业启动平台将在黑色星期五周末前接受预订。在此期间将享受50%的折扣。如果你发现自己在想，“好吧，我喜欢单人企业的概念……但*我该如何真正开始一个呢？”*，请在这里购买。
- en: Inside, I break down everything from forming the business to the best software
    to use to how to make your first $5K.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在里面，我会从成立企业到使用最好的软件，再到如何赚取第一笔5000美元的每一件事都进行剖析。
- en: '[Grab it here.](https://stan.store/thedankoe/p/the-oneperson-business-launchpad--your-first-5k)'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '[在此获取](https://stan.store/thedankoe/p/the-oneperson-business-launchpad--your-first-5k)'
- en: –––
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: –––
- en: Social media is the fast food of socialization.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体是社交的快餐。
- en: Porn is the fast food of intimacy.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 情色片是亲密关系的快餐。
- en: Video games are the fast food of achievement.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 电子游戏是成就的快餐。
- en: Netflix is the fast food of entertainment.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: Netflix是娱乐的快餐。
- en: Fast food itself is a combination of fat, sugar, and salt – ingredients that
    used to be incredibly scarce – that are combined and tested in infinite different
    ways to see which keeps consumers coming back for more.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 快餐本身是脂肪、糖和盐的混合体——这些曾经极其稀缺的成分——以无限不同的方式结合和测试，看看哪种能让消费者不断回来。
- en: In order to understand this cheap dopamine epidemic we’re going through, we
    need a short history lesson.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 为了理解我们正在经历的这种廉价的多巴胺流行病，我们需要一个简短的历史课。
- en: 'One way societies can be categorized is by its techno-economic base. In other
    words, the basic means of production (i.e. the horse-drawn plow vs machines) that
    the society uses to manage its basic needs. There are 5 of them:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 社会可以根据其技术经济基础进行分类。换句话说，社会用来管理其基本需求的基本生产手段（即马拉犁与机器），有5种：
- en: '**Foraging** – hunting and gathering. Men hunted, women gathered.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**觅食** – 狩猎和采集。男性狩猎，女性采集。'
- en: '**Horticultural** – Simple planting. Women produced most of the food, and the
    society’s deities became female.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**园艺** – 简单种植。女性生产了大部分食物，社会中的神祇变成了女性。'
- en: '**Agrarian** – Animal drawn plows. Women couldn’t continue farming due to an
    increase in miscarriages, so they’re roles changed, and the society’s deities
    became men. 80% of Agrarian societies relied on male slave labor.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**农业** – 动物拉犁。由于流产增加，女性无法继续耕作，因此她们的角色发生了变化，社会中的神祇变成了男性。80%的农业社会依赖男性奴隶劳动。'
- en: This marks a massive shift in culture. Since plowing was a Darwinian disadvantage
    for women to do, they shifted roles and began to assume more “traditional” roles
    of taking care of the home and family. Because of the plow, there was now an abundance
    of food, so men had more free time to contemplate and pursue new interests. (This
    is when writing and mathematics were invented.)
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这标志着文化的一个巨大转变。因为耕作对女性来说是达尔文主义上的劣势，她们转变了角色，开始承担更多“传统”的角色，比如照顾家庭和子女。由于有了犁，现在食物丰富，男性有更多空闲时间来思考和研究新的兴趣。（这就是书写和数学被发明的时候。）
- en: The last 2 bases after agrarian were *industrial* and *informational.*
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在农业之后，最后的两个基础是*工业*和*信息*。
- en: Note that the *homo genus* species emerged around 2 million years ago, while
    *homo sapiens* emerged around 300,000 years ago. The industrial age started 300
    years ago (1 one-thousandth of human evolution), meaning that our minds were clearly
    not adapted for what came next.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，*智人*物种在大约200万年前出现，而*智人*在大约30万年前出现。工业时代始于300年前（人类进化的1/1000），这意味着我们的心智显然没有适应接下来发生的事情。
- en: As the industrial age progressed, fat, sugar, and salt became less and less
    scarce. We could trade for salt in coastal areas and produce fat and sugar at
    a rapid rate.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 随着工业时代的进步，脂肪、糖和盐变得越来越不稀缺。我们可以在沿海地区交换盐，并以快速的速度生产脂肪和糖。
- en: Between 1920-1950, things continued to change. Assembly lines and 9-5 jobs became
    a thing (thanks Henry Ford) and how humans work began to shift into the workforce
    we know today. In short, humans had more money and potential.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在1920-1950年之间，事情继续发生变化。装配线和9-5的工作时间成为了常态（感谢亨利·福特），人类的工作方式开始转变，进入了我们今天所知道的劳动力市场。简而言之，人类有了更多的金钱和潜力。
- en: After 1950, fast food chains started popping up. Then, the information age came
    online. The Golden Age Of Television allowed for more spread of information.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 1950年后，快餐连锁店开始兴起。然后，信息时代上线。电视的黄金时代允许信息传播得更广。
- en: Then, a bit later, the internet. Information began to grow and spread like wildfire.
    Continuing to fast forward and we have Google, Facebook, and other soon-to-be
    massive companies competing in a race to the top.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，稍后，互联网。信息开始像野火一样增长和传播。继续快进，我们有了谷歌、Facebook和其他即将成为巨头的公司，它们在竞争中争夺顶峰。
- en: These weren’t all bad at first, but the desire for power caused technology to
    evolve with rather poor incentives. Everything was so new. It had never been done
    before. Who would have guessed it would have turned out so destructive?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这些最初并不全是坏的，但权力的欲望导致技术以相当糟糕的激励因素发展。一切都是新的。以前从未做过。谁能想到它会变得如此具有破坏性？
- en: All of these massive companies across all domains, not just the internet, were
    trying to “win the game” by any means possible, even if that was at the sacrifice
    of their customer’s well-being.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些跨领域的巨头公司，不仅仅是互联网公司，都在试图通过任何可能的方式“赢得游戏”，即使这意味着牺牲客户的福祉。
- en: Fat, sugar, and salt.
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 脂肪、糖和盐。
- en: Scarce resources that humans aren’t adapted to have in abundance. We’re adapted
    for survival. Scarce ingredients, when found, spurt dopamine into our brain to
    signal that we’ve found something to aid in our survival.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 人类不适应拥有丰富资源的稀缺资源。我们适应了生存。当找到稀缺成分时，多巴胺会涌入我们的大脑，以信号表示我们找到了有助于我们生存的东西。
- en: Once companies discovered this mechanism, they could now test and create combinations
    of these ingredients that maximize pleasure for their customers and keep them
    coming back for more. Addiction.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦公司发现了这个机制，他们现在可以测试并创造这些成分的组合，以最大化客户的愉悦感，并让他们不断回来寻求更多。上瘾。
- en: Quadruple patty burgers. Queso chalupa taco burritos with a hyper-palatable
    48oz super-sized soda on the side.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 四倍汉堡。配以超美味48盎司超大型苏打水的奇佐查卢帕玉米卷玉米卷。
- en: The internet companies followed suit. They adopted an advertising model for
    monetization and soon found that polarizing and inflammatory headlines led to
    capturing the most attention. Now all they had to do was serve more of what users
    “liked” to an instantly accessible screen. Hello, “For You” page!
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网公司也效仿。他们采用了广告模式进行货币化，并很快发现，两极分化和煽动性的标题吸引了最多的关注。现在他们只需要向用户“喜欢”的内容提供更多，并立即呈现在屏幕上。你好，“为你推荐”页面！
- en: '**Fat** = fear-mongering'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**脂肪** = 恐慌主义'
- en: '**Sugar** = quick & desirable promises'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**糖** = 快速且诱人的承诺'
- en: '**Salt** = absolutistic takes'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**盐** = 绝对主义的选择'
- en: The internet companies test combinations of these and the algorithm feeds us
    as much as we want until we’re mentally obese. Fear-induced content spurts dopamine
    into our brains and narrows our thinking because we “need” the information for
    later survival.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网公司测试这些组合，算法为我们提供尽可能多的信息，直到我们精神上变得肥胖。恐惧引发的内容将多巴胺注入我们的大脑，并缩小我们的思维，因为我们“需要”这些信息以备后用。
- en: Now, here we are.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们就在这里。
- en: Quick money, quick sex, quick knowledge, quick food, quick entertainment.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 快速赚钱、快速性爱、快速知识、快速食物、快速娱乐。
- en: A ticking time bomb that feels good at first but feels terrible later.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 一种一开始感觉良好但后来感觉极差的定时炸弹。
- en: But there’s more to the story.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 但故事还有更多。
- en: Dopamine isn’t *all* *bad.*
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 多巴胺并不全是**坏**的。
- en: We are living through a Second Renaissance after all (the Renaissance came after
    the Dark Ages). The internet and social media, for conscious and intentional individuals
    seeking truth and growth, is the key to doing work you love and taking back control
    of your life.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我们毕竟是在经历第二次文艺复兴（文艺复兴发生在黑暗时代之后）。对于寻求真理和成长的意识清醒和有意的个人来说，互联网和社交媒体是做你热爱的工作和重新掌控你生活的关键。
- en: The Molecule Of More – How Dopamine Works
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 更多分子的秘密——多巴胺如何工作
- en: In a broad sense, saying something is “important” is another way of saying it’s
    linked to dopamine. Why? Because among the many things it does, dopamine is an
    early-warning system for the appearance of anything that can help us survive.
    – Daniel Z. Lieberman
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 从广义上讲，说某件事是“重要的”，就是另一种说法，它与多巴胺有关。为什么？因为在其许多功能中，多巴胺是任何可能帮助我们生存的东西出现的早期预警系统。 ——
    丹尼尔·Z·利伯曼
- en: Most people don’t understand dopamine.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人都不了解多巴胺。
- en: And since they don’t understand it, they have difficulty noticing poor behavior
    and correcting it in a way that is beneficial to their development.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 由于他们不理解它，他们很难注意到不良行为并以对他们的发展有益的方式纠正它。
- en: Dopamine isn’t the pleasure molecule.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 多巴胺不是快乐分子。
- en: Dopamine is the molecule of *more.*
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 多巴胺是“更多”的分子。
- en: But dopamine isn’t the only neurotransmitter that provides feedback based on
    our behavior and perception.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 但多巴胺并不是唯一一种基于我们的行为和感知提供反馈的神经递质。
- en: 'There are 2 types of neurotransmitters:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 有两种类型的神经递质：
- en: '**1) The Down Chemicals or the “Here & Now’s”**'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 向下的化学物质或“此时此刻”**'
- en: When you look down, what do you see? Everything inside your *peripersonal* space.
    Things within reach. Things you can control.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 当你低头看时，你看到了什么？你个人空间内的所有东西。触手可及的东西。你可以控制的东西。
- en: The “here and now” chemicals associated with what’s in your immediate space
    allow you to *savor, enjoy, or fight and run away from what you are experiencing.*
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 与你直接空间中的东西相关的“此时此刻”化学物质让你能够*品味、享受或战斗并逃离你所经历的东西*。
- en: Oxytocin, norepinephrine, adrenaline, serotonin, endorphins, and endocannabinoids.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 奥克辛，去甲肾上腺素，肾上腺素，血清素，内啡肽和内大麻素。
- en: '**2) The Up Chemical: Dopamine**'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 向上的化学物质：多巴胺**'
- en: Look outside. Look to the sky. Look on the internet. Look through the shop windows.
    Look to your memories of a fun vacation.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 向外看。仰望天空。上网。透过商店橱窗。回忆起愉快的假期。
- en: What do all of these things have in common?
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些事物有什么共同之处？
- en: '*Things you don’t have.*'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '*你没有的东西。*'
- en: Things that are in your extrapersonal space.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的超个人空间中的事物。
- en: Dopamine motivates you to pursue, to control, and to possess what you don’t
    have, but want, because it could be useful for your survival. Well, maybe not
    now, but definitely in the past. More resources. More sex and offspring. A horse
    and a sword to navigate harsh terrain and discover even more in unknown lands.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 多巴胺激励你追求、控制和拥有你想要但没有的东西，因为它们可能对你的生存有用。好吧，也许不是现在，但肯定在过去。更多的资源。更多的性和后代。一匹马和一把剑来穿越崎岖的地形，在未知土地上发现更多。
- en: '**So, what’s the issue? And what do we do?**'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**那么，问题是什么？我们该怎么办？**'
- en: The issue is that we are so dopamine-overloaded by the abundance of information
    forged by game theoretic principles that we’ve lost touch with reality.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 问题在于，我们被游戏理论原则锻造的信息丰富所淹没，以至于我们失去了与现实的联系。
- en: Relationships suffer because once you “possess” a partner thanks to a dopamine-fueled
    motivation, you fail to reprogram your habits to appreciate and savor that relationship
    after the honeymoon phase.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 关系之所以受损，是因为一旦你因为多巴胺驱动的动机而“拥有”了一个伴侣，你便未能重新编程你的习惯，在蜜月期过后去欣赏和品味这段关系。
- en: In the last letter, [*The Meaning Crisis*](https://thedankoe.com/letters/the-meaning-crisis-how-to-do-something-that-matters/),
    we discussed how to reconnect with reality through *being, doing, and becoming.*
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一封信中，[*《意义危机》*](https://thedankoe.com/letters/the-meaning-crisis-how-to-do-something-that-matters/)，我们讨论了如何通过*存在、行动和成为*来重新与现实建立联系。
- en: Dopamine is the anticipation molecule. So, if we want to enjoy the things we
    have, we must train ours minds away from the future-oriented and move back to
    a sustained state of present-oriented.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 多巴胺是期待分子。因此，如果我们想要享受我们所拥有的东西，我们必须训练我们的思维远离未来导向，回到持续的当下导向状态。
- en: In other words, *be* more. Soak in the present moment. Adopt a mindfulness habit.
    Go on a walk. Stare at a leaf and find joy in the translucent web of life encapsulated
    in such a small green object. That’s the main habit you’re probably missing.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，*成为*更多。沉浸在当下。培养正念习惯。去散步。凝视一片叶子，在这样一个小小的绿色物体中找到生命的透明网络带来的快乐。这可能是你缺失的主要习惯。
- en: Dopamine detoxes help for this reason. You eliminate all sources of *what you
    don’t have* and you become incredibly bored. The only option you have is to find
    interest in what’s right in front of you. To see a new world as if you were a
    child again.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 多巴胺排毒疗法之所以有帮助，是因为你可以消除所有你“没有”的东西，你变得极其无聊。你唯一的选择就是对你面前的东西产生兴趣。就像孩子一样看待一个全新的世界。
- en: But, you don’t have to do a dopamine detox.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，你不必进行多巴胺排毒。
- en: You simply have to change how you approach, use, and leverage the technology
    that is destroying most people’s lives.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 你只需要改变你对待、使用和利用正在摧毁大多数人生活的技术的态度。
- en: 'The Holistic Solution: Long-Term Gratification'
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 全面的解决方案：长期满足
- en: Here’s the thing.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是这样的。
- en: Dopamine isn’t a bad chemical.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 多巴胺并不是一种坏化学物质。
- en: It’s the driving force behind success *and* failure.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这是成功和失败背后的驱动力。
- en: The difference is long-term vs short-term gratification.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 差异在于长期满足与短期满足。
- en: That sentence isn’t to be taken lightly, because that difference is *massive.*
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这句话不是随便说的，因为这种差异是**巨大的**。
- en: Short-term gratification – or cheap dopamine – leads to entropy.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 短期满足感——或者说“廉价”的多巴胺——导致熵增。
- en: Long-term gratification – or *earned* dopamine – leads to centropy.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 长期满足感——或者说“获得”的多巴胺——导致熵减。
- en: '**Entropy**, for what we’re concerned with, is the gradual decline into chaos,
    uncertainty, and disorder. Think: anxiety, overwhelm, and that inescapable bubble
    of negative thoughts that seems to only get worse and worse because we can’t make
    sense of the world anymore, usually due to dwelling on the surface for too long.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**熵增**，就我们所关注的内容而言，是逐渐陷入混乱、不确定和无序的过程。想想看：焦虑、压倒性和那种似乎只会越来越糟、无法理解世界的不可逃脱的负面思维泡沫，通常是由于长时间停留在表面而导致的。'
- en: '**Centropy**, or reversing entropy, is the upward battle we are all facing
    as humans. It is maintaining, creating, or improving order and certainty. Think:
    how challenge leads to fulfillment, flow, and a sense of purpose or control over
    your life.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**熵减**，或者说逆转熵，是我们人类都面临的向上斗争。它是指维持、创造或改善秩序和确定性。想想看：挑战如何导致满足感、流畅感和对生活的目的或控制的感知。'
- en: Since social media is such a large and almost necessary part of our lives, I
    want to focus on that.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 由于社交媒体是我们生活中如此之大且几乎是必需的一部分，我想专注于这一点。
- en: While social media can turn toxic fast, it’s difficult to ignore that it’s an
    integral part of how we do and will work, how we communicate, and how we stay
    on the same page as everyone else so we can improve as a society. Of course, that
    last part is heavily being taken advantage of. Nobody seems to be on the same
    page *if* they leave their sensemaking in the hands of the companies that want
    to maximize your time on the platform and exploit your mind’s wiring.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然社交媒体很快就会变得有毒，但很难忽视它是我们如何工作和将来如何工作、我们如何沟通以及我们如何与他人保持一致以改善社会的一个基本组成部分。当然，最后一部分正被过度利用。似乎没有人愿意将自己的思维判断交给那些希望最大化你在平台上时间并利用你思维线路的公司。
- en: 'That poses the problem:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这就提出了一个问题：
- en: Being a slave to a curated algorithm feeds you short-term gratifying content
    that keeps you in a state of stress and survival. The combination of fear and
    desire pull you away from the present and entropy increases. What you thought
    was a harmless post was actually a combination of 50 short posts you read in unison
    that silently induces chaos in your mind. You regress. You stay the same. You
    lock yourself into a paradigm of political ideologies and static opinions that
    aren’t conducive to achieving anything worthwhile in your life.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 成为定制算法的奴隶，它会给你带来短期满足的内容，让你处于压力和生存状态。恐惧和欲望的结合让你远离当下，熵增。你以为无害的帖子实际上是由你同时阅读的50个短帖子组成的组合，这些帖子在无声中在你脑海中引发混乱。你退步了。你保持不变。你将自己锁定在政治意识形态和静态意见的范式之中，这些都不利于你在生活中取得任何有价值的东西。
- en: Now, if the incentives of social media companies were different, we would all
    be in a much better place. But we are too deep into the hole now, and it’s wise
    not to trust anyone, especially a mega-corporation, with increasing your quality
    of life. That’s on you.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果社交媒体公司的激励措施不同，我们都会处于更好的位置。但我们现在已经深陷其中，明智的做法是不信任任何人，尤其是那些希望提高你生活质量的超级企业。这取决于你。
- en: Creating New Digital Environments For Success
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创造新的数字环境以获得成功
- en: Have you heard of the Broken Window’s Theory?
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 你听说过破碎窗户理论吗？
- en: It’s pretty fascinating.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这非常令人着迷。
- en: 'In a nutshell, there was an experiment done where they studied 2 different
    environments: one with intentionally broken windows and one that looked clean
    and tidy.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，有一个实验，他们研究了两个不同的环境：一个是有意打破窗户的环境，另一个看起来干净整洁。
- en: In the area where they installed new windows and cleaned the area up, *crime
    decreased by ~50%.*
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在他们安装新窗户并清理区域的地方，*犯罪率下降了约50%。*
- en: In the area where they broke windows and created a mess, *crime increased*.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在他们打破窗户并制造混乱的区域，*犯罪率上升*。
- en: Why does this happen?
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 这为什么会发生呢？
- en: Because your environment heavily conditions your behavior.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 因为你的环境在很大程度上决定了你的行为。
- en: On the internet, we’re constantly exposing our minds to an area with thousands
    of broken windows a day.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 在互联网上，我们每天都在不断地将我们的思想暴露在每天都有成千上万个破碎窗户的区域。
- en: Digital environments condition your mind much faster than physical ones because
    there is more information available.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 数字环境比物理环境更快地塑造你的思维，因为信息量更大。
- en: 'Here’s the kicker:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个关键点：
- en: Few people realize that *you chose to put yourself in that environment, and
    you, as an intentional individual, can create a new one.*
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 很少有人意识到*是你自己选择了置身于那个环境，作为一个有意识的个体，你可以创造一个新的环境*。
- en: Becoming A Value Creator – The Life Of Earned Dopamine
  id: totrans-94
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成为价值创造者——获得多巴胺的生活
- en: Social media is one of the greatest technologies available to us.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体是我们拥有的最伟大的技术之一。
- en: I don’t mean to brag (okay, I kind of do) but social media is rarely toxic and
    inflammatory to me. Sure, I get sucked down some political rabbit holes and bad
    takes, but 95% of the time social media is both the engine and the fuel of the
    unconventional success I’ve achieved.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是在吹牛（好吧，我有点在吹牛），社交媒体对我来说很少是有毒的或充满争议的。当然，我会陷入一些政治的兔子洞和错误的观点，但95%的时间里，社交媒体是我取得非传统成功的主要引擎和燃料。
- en: 'Think about it. Social media allows you to:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 想想看。社交媒体允许你：
- en: '**Learn almost anything**, challenge your understanding, and seek new perspectives
    to get closer to truth.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**学习几乎任何东西**，挑战你的理解，寻求新的视角，以更接近真理。'
- en: '**Build a business or independent source of income.** You have indirect access
    to 5.5 billion people you can *help* in exchange for another form of value, like
    money or attention that can be used to lead more people down a path of long-term
    gratification, creating a ripple effect.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**建立一个企业或独立的收入来源**。你间接地可以接触到55亿人，你可以*帮助他们*，以换取另一种形式的回报，比如金钱或注意力，这些可以用来引导更多人走向长期满足的道路，产生连锁反应。'
- en: The [One Person Business Launchpad](https://stan.store/thedankoe/p/the-oneperson-business-launchpad--your-first-5k)
    breaks this down in simple terms. Its goal is to help you make your first $5K
    with 5 customers around your main skill or interest.
  id: totrans-100
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[一个人的商业启动平台](https://stan.store/thedankoe/p/the-oneperson-business-launchpad--your-first-5k)用简单的话解释了这一点。它的目标是帮助你通过5个客户在你的主要技能或兴趣领域获得你的第一个5000美元。'
- en: '**Find potential employers, investors, team members, or connections.** Creating
    high-value content does the heavy lifting for you now.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**寻找潜在的雇主、投资者、团队成员或联系。** 创建高价值内容现在为你做了大部分工作。'
- en: All of which are *centropic*. They take time and effort. They reverse the entropy
    and chaos you are so used to by providing meaningful inputs and outputs. They
    are earned dopamine. They lead to greater complexity and order allowing you to
    spot more opportunities, solve more problems, create more value, and profit in
    a meaningful way.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都是*中心化的*。它们需要时间和努力。它们通过提供有意义的输入和输出来逆转你习惯的熵和无序。它们是获得多巴胺的方式。它们导致更大的复杂性和秩序，使你能够发现更多的机会，解决更多的问题，创造更多的价值，并以有意义的方式获利。
- en: Since the social media companies won’t change their own incentives, it’s up
    to you to create your own. Your own order. Your own environment. Your own catalyst
    for success.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 由于社交媒体公司不会改变自己的激励措施，因此创建自己的东西、自己的秩序、自己的环境以及自己成功的催化剂就取决于你了。
- en: 'Here’s how, in 3 steps:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是如何在3个步骤中做到的：
- en: 1) Curate Your Digital Environment
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 筛选你的数字环境
- en: The first offender is short-form content.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个罪魁祸首是短篇内容。
- en: It can be useful for quick insights but can quickly devolve into a rabbit hole
    of memes and meaninglessness.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 它可以用于快速洞察，但很快就会变成一个充满梗和毫无意义的兔子洞。
- en: We no longer challenge our beliefs and understanding with books and articles
    whose incentives *aren’t* to become a New York Times best sellers or to create
    the most inflammatory engagement-bait headline. If their main intention is status
    (*main* intention, everyone is chasing status in one way or another), the information
    they distribute will be tailored to that.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不再用那些激励不是成为《纽约时报》畅销书或创造最具争议性的吸引眼球标题的书籍和文章来挑战我们的信念和理解。如果它们的主要意图是追求地位（主要意图，每个人都在以某种方式追求地位），那么它们传播的信息将会根据这一点来定制。
- en: '*Most of your time spent on the internet should be dedicated to long-form content
    that challenges, expands, and nurtures your perspective.*'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '*你花在互联网上的大部分时间应该用于阅读那些能够挑战、扩展和培养你观点的长篇内容。*'
- en: Read longer. Read about more difficult concepts. Read things that *don’t* confirm
    your beliefs just to make you feel good. Reading can easily be confused with mental
    masturbation when it is so much more than that.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 阅读更长一些。阅读关于更复杂概念的内容。阅读那些*不*确认你信念的东西，只是为了让你感觉良好。阅读很容易被误解为精神自慰，而实际上它远不止于此。
- en: I would argue that most of your future success is dependent on this single habit.
    Read longer things.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为你未来的大部分成功都取决于这个单一的习惯。阅读更长一些的东西。
- en: In other words, consume content that aids in your development and not the other
    way around.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，消费那些有助于你发展的内容，而不是相反。
- en: Unfollow accounts that you *know* aren’t serving your growth.
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 取消关注那些你*知道*对你的成长无益的账户。
- en: Find long-form writing, videos, and podcasts that you enjoy listening to.
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 找到你喜欢听的长篇写作、视频和播客。
- en: Follow those long-form creators on social media – they write better short-form
    content that helps fill in knowledge gaps.
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关注社交媒体上的那些长篇创作者——他们能写出更好的短篇内容，帮助填补知识空白。
- en: If you’d like, notice who those people interact with and follow them too.
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你愿意，注意那些人互动的人，并跟随他们。
- en: The algorithm will start to feed you better content. Be ruthless about unfollowing
    or blocking content that doesn’t serve you.
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 算法将开始为你提供更好的内容。对于那些对你无益的内容，要无情地取消关注或屏蔽。
- en: The more you curate your digital environment, the more you reduce entropy and
    promote centropy.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 你越精心管理你的数字环境，你就越能减少熵，促进中心化。
- en: 2) Focus On A Meaningful Project
  id: totrans-119
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 关注一个有意义的项目
- en: Go do something great and your network will instantly emerge. – Naval Ravikant
  id: totrans-120
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 去做一些伟大的事情，你的网络将立刻出现。——Naval Ravikant
- en: Now that you have good, centropic inputs, you need good centropic outputs.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你有了好的、中心化的输入，你需要好的、中心化的输出。
- en: Dopamine doesn’t just come from consuming information, because information isn’t
    limited to things you read and hear.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 多巴胺不仅仅来自消费信息，因为信息并不仅限于你阅读和听到的。
- en: Your habits… what you *do…* conditions your mind in a positive or negative direction.
    You can either work on a project that acts as a puzzle piece to your ideal lifestyle,
    or you can fill your boredom with memes and pleasure that lead to disorder and
    chaos.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 你的习惯……你所做的……会在积极或消极的方向上影响你的思维。你可以专注于一个项目，这个项目是你理想生活方式的拼图，或者你可以用 memes 和快乐来填补你的无聊，这些
    memes 和快乐会导致混乱和混乱。
- en: Why build a project?
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么要建立项目？
- en: Because they are ordered. They frame your mind. They allow you to channel your
    inputs – the information you consume – into something *real and valuable.* Something
    you can earn an income from. Something you can contribute back to the world.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 因为它们是有序的。它们塑造了你的思维。它们让你能够将你的输入——你消费的信息——转化为某种真实而有价值的东西。你可以从中赚取收入的东西。你可以回馈给世界的东西。
- en: If you don’t have a project to build, chances are you are already working on
    a project… someone else’s. One that was assigned to you by a teacher or employer.
    You’ll spend 8 hours building their dreams but won’t spend 1 hour building your
    own.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有要建立的项目，那么很可能你已经在做别人的项目了……一个老师或雇主分配给你的项目。你将花费8小时去实现他们的梦想，但不会花1小时去实现自己的梦想。
- en: And yes, 1 hour is all it takes to completely reset your mental well-being.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，只需要1小时就可以完全重置你的心理健康。
- en: 3) Earn Your Control And Freedom
  id: totrans-128
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 赢得你的控制和自由
- en: Now, what do you build?
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你该建立什么？
- en: Well, I’m assuming you’re starting from scratch.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，我假设你是从零开始的。
- en: You have little money saved up. You may have a few skills. You have the ambition,
    but you don’t know where to start with building your own thing.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 你存的钱很少。你可能有一些技能。你有野心，但不知道从何开始建立自己的事情。
- en: The thing is, we’re not in the industrial age anymore, we’re in the information
    age.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，我们已经不再处于工业时代，我们现在处于信息时代。
- en: Getting a job and investing your savings *isn’t the only option.*
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 找工作并投资你的储蓄*并不是唯一的选择。
- en: In fact, if you couldn’t tell, people are losing trust in the conventional path’s
    promises to secure their future. It’s one of the worst options because your time,
    energy, and emotional well-being are at the control of a boss.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，如果你没有注意到，人们正在失去对传统路径承诺保障他们未来的信任。这是最糟糕的选择之一，因为你的时间、精力和情感福祉都受老板的控制。
- en: All new wealth is being generated in the digital space.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 所有新的财富都在数字空间中产生。
- en: The idea space.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 思想空间。
- en: The creator economy.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者经济。
- en: A place where people aren’t limited by their connections or physical location
    because they can reach anyone with an internet connection.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 一个人们不受其联系或物理位置限制的地方，因为他们可以接触到任何有互联网连接的人。
- en: And if you have the right skills – writing, marketing, and building – all you
    have to do is get what you build in front of a micro-fraction of people that perceive
    what you built as valuable.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你拥有正确的技能——写作、营销和构建——你所要做的就是让你的作品出现在那些认为你所建之物有价值的人面前。
- en: 'So:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 所以：
- en: Create the content you want to see in the world.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 创造你希望在世界上看到的内容。
- en: Build the product you want to see in the world.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 建立你希望在世界上看到的产品。
- en: Create the content that stretches your mind and encourages you to grow as you
    write. Attract like-minded people to your interests by building an audience. These
    are the people you can help the most.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 创造能够拓展你思维并鼓励你在写作中成长的内容。通过建立受众来吸引志同道合的人加入你的兴趣。这些人是你最能帮助的人。
- en: Build the product that contributes to the development and self-actualization
    of others. Promote your product to your audience – because you don’t have a boss
    to do it for you anymore – and earn your freedom.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 构建有助于他人发展和自我实现的产物。向你的受众推广你的产品——因为你不再有老板为你做这件事了——并赢得你的自由。
- en: That’s it for this letter.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 这封信就到这里了。
