- en: I Brainwashed Myself Into Being Confident
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我自我洗脑变得自信
- en: 原文：[https://thedankoe.com/letters/i-brainwashed-myself-into-being-confident/](https://thedankoe.com/letters/i-brainwashed-myself-into-being-confident/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/i-brainwashed-myself-into-being-confident/](https://thedankoe.com/letters/i-brainwashed-myself-into-being-confident/)
- en: This won’t be another meditation guide. This won’t be me telling you to add
    more material things to your life. This won’t be a “quick trick or hack.”
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '这不会是一本冥想指南。这不会是我告诉你给你的生活中添加更多物质东西。这不会是一个“快速技巧或黑客”。 '
- en: This is a series of concepts that you must understand.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个你必须理解的概念系列。
- en: 'This newsletter could have been titled:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这份通讯本可以命名为：
- en: '*“How to be happy.”*'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '*“如何快乐。”*'
- en: '*“The only thing you need to live a good life.”*'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '*“过上好生活的唯一需要。”*'
- en: '*“How to live.”*'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '*“如何生活。”*'
- en: This concept is crucial for navigating the modern world. Take your time as you
    read through this. Take notes and practice.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这个概念对于在现代世界中导航至关重要。在你阅读的过程中，请慢慢来。做笔记并练习。
- en: This takes time. It took your entire life to be culturally conditioned into
    an unhappy state. It could take years — or a moment of surrender — to deprogram
    the negativity that’s been planted in your head.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这需要时间。你的一生都在被文化培养成不快乐的状态。这可能需要几年——或者一个投降的时刻——来解除你头脑中植根的消极性。
- en: 'We will start with a quote from Alan Watts:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从阿兰·瓦茨的一句话开始：
- en: '*A person who thinks all the time has nothing to think about except thoughts.
    So, he loses touch with reality and lives in a world of illusions. By thoughts
    I mean specifically “chatter in the skull”… perpetual and compulsive repetition
    of words… of reckoning and calculating.*'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*一个总是思考的人除了思考之外没有其他东西可以思考。因此，他失去了与现实的联系，生活在幻觉的世界中。我所说的思考特指“头骨中的喋喋不休”……永无止境和强迫性的词语重复……计算和权衡。*'
- en: ''
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*I’m not saying thinking is bad. Like everything else, it’s useful in moderation.
    A good servant, but a bad master – and all so-called civilized peoples have increasingly
    become crazy and self-destructive. Through excessive thinking, they have lost
    touch with reality.*'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*我并不是说思考是坏事。和其他所有事情一样，适度地思考是有用的。一个好的仆人，但一个坏的主人——而且所有所谓的文明民族都越来越疯狂和自我毁灭。通过过度的思考，他们失去了与现实的联系。*'
- en: ''
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Most of us would have rather money than tangible wealth… and a great occasion
    is somehow spoiled for us unless photographed… and to read about it the next day
    in the newspaper is oddly more fun for us than the original event. This is a disaster.*'
  id: totrans-15
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*我们大多数人宁愿要金钱而不是有形财富……而且，除非拍照，否则某个重大场合似乎就被我们毁了……而且第二天在报纸上读到它对我们来说比原始事件更有趣。这是一场灾难。*'
- en: ''
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*To get in touch with reality there is an art of meditation… It is the art
    of temporarily silencing the mind… of stopping the “chatter in the skull”. Of
    course you can’t force your mind to be silent. That would be like trying to smooth
    ripples in water with a flat iron. Water become cool and clear only when left
    alone.*'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*为了接触现实，有一种冥想的技巧……这是一种暂时使心灵沉默的技巧……停止“头骨中的喋喋不休”。当然，你不能强迫你的心灵沉默。那就像试图用熨斗抚平水波一样。水只有在被独自留下时才会变得凉爽和清澈。*'
- en: ''
  id: totrans-18
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Alan Watts
  id: totrans-19
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 阿兰·瓦茨
- en: '**You’ve Been Conditioned Into Mediocrity**'
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**你已经被培养成平庸**'
- en: What is “conditioning?” Think of the gym. You condition yourself through repetition
    of a specific exercise. As a result, you build muscle or cardiovascular capacity.
    If you don’t go to the gym, you are performing repetitive actions that result
    in the opposite. There is no middle ground. You are either growing or decaying.
    Small increases in muscle, small increases in fat, small decreases in muscle,
    small decreases in fat. Repetition often goes unnoticed.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: “培养”是什么意思？想想健身房。你通过重复特定的练习来培养自己。结果，你建立了肌肉或心血管能力。如果你不去健身房，你正在执行重复的动作，结果正好相反。没有中间地带。你是在成长还是在衰退。肌肉的小幅度增加，脂肪的小幅度增加，肌肉的小幅度减少，脂肪的小幅度减少。重复往往被忽视。
- en: Cultural conditioning of the mind is the enemy here. This is the cause of your
    excess *“chatter in the skull.”* The thing that keeps you unhappy. Thoughts, beliefs,
    biases, reactions, ideologies, political stances, and everything else that blurs
    your perception. External projections that have been hammered into your head through
    repetition.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 心理文化培养是这里的敌人。这是你过度“头骨中的喋喋不休”的原因。这是让你不快乐的原因。思想、信仰、偏见、反应、意识形态、政治立场以及所有其他模糊你感知的东西。通过重复锤炼进你头脑的外部投射。
- en: Your perception — for the sake of this email — is your worldview. How you interpret
    things. Your “lens” that you see things through. Cultural conditioning has “blurred”
    this “lens.” As a child, you existed in your natural state without this conditioning.
    You were playful, loving, and curious. As you aged, these traits were suppressed.
    They were blurred through conditioning. This conditioning prevents you from “seeing”
    things as they are.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 你的感知——为了这封电子邮件——是你的世界观。你如何解释事物。你观察事物的“透镜”。文化条件已经“模糊”了这“透镜”。作为一个孩子，你存在于你的自然状态中，没有这种条件。你曾是玩耍的、充满爱的和好奇的。随着你年龄的增长，这些特质被压制了。它们通过条件作用而变得模糊。这种条件作用阻止你“看到”事物的本来面目。
- en: '![](../Images/2b6a7349d7eb57569579c60460552740.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2b6a7349d7eb57569579c60460552740.png)'
- en: Perception VS Reality
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 感知 VS 现实
- en: There is perception, based on the lens of the character you are playing. Your
    personality, beliefs, and biases. And there is reality, based on who you are.
    Truth. God. Consciousness. What Is. The All. The Universe. Whatever you want to
    call it. Different belief systems call it different things. These are lenses of
    perception that some adopt to lead lives that are closer to Truth.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 有基于你所扮演的角色之透镜的感知。你的个性、信念和偏见。还有基于你自己的现实。真理。上帝。意识。是什么。一切。宇宙。无论你想要称之为什么。不同的信仰体系称之为不同的事物。这些是某些人采用的感知透镜，以使生活更接近真理。
- en: '**Separating Being From Becoming**'
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**从存在到成为的分离**'
- en: Who you *think* you are is not who you are. *Who you are is what you are doing.*
    Not what you have done. Who you are is the being that is moving with life. As
    you walk down the road you see buildings, trees, streets, and other things that
    will *be* there with you even when you are miles away. They aren’t left in the
    past. They don’t have beliefs and emotions that are temporal. The building will
    be here in 2 years unless destroyed. You will be here in 2 years unless destroyed.
    Your thoughts, emotions, and feelings will not be. Negativity cannot exist in
    reality.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 你认为自己是谁并不代表你就是谁。*你是你所做的*。不是你曾经做过的。你是与生活同行的存在。当你走在路上，你会看到建筑、树木、街道和其他事物，即使你远离数英里，它们也会与你同在。它们没有被留在过去。它们没有时间和空间上的信念和情感。除非被摧毁，这些建筑将在两年后仍然在这里。除非被摧毁，你也会在这里。你的思想、情感和感觉不会。消极无法存在于现实中。
- en: Who you *think* you are is a character that you are playing. *Who you are becoming.*
    A disguise you are putting on to fit in. A fabrication of the mind. The result
    of rampant — or controlled — thinking. Thoughts, given life through focus. Turned
    into negative emotions and feelings through perception. Automatic and unconscious
    reactions to the external stimuli you are exposed to. **Accuracy of focus will
    determine how much you suffer in life.**
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 你认为自己是谁是你所扮演的角色。*你正在成为的人*。你为了融入而戴上的面具。心灵的虚构。狂热——或受控——思考的结果。通过专注赋予生命力的思想。通过感知转变为消极的情感和感觉。对外部刺激的自动和无意识的反应。**专注的准确性将决定你在生活中的痛苦程度**。
- en: We all have the desire to transcend the self. To fully serve The All, Universe,
    God, etc. Before we do this, we must self-actualize. Some may be familiar with
    Maslow’s Hierarchy of Needs.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都有超越自我的渴望。为了完全服务于一切、宇宙、上帝等。在我们这样做之前，我们必须自我实现。有些人可能熟悉马斯洛需求层次理论。
- en: '![](../Images/65ba4341ba498124362f2cd1eee5e3ea.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/65ba4341ba498124362f2cd1eee5e3ea.png)'
- en: Maslow’s Hierarchy Of Needs
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 马斯洛需求层次理论
- en: Meaning, before self-transcendence, we must self-actualize. [Hit the gym, start
    a business, gain independence, and nurture our mind.](https://join.modernmastery.co/?utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter)
    In order to self-actualize, we must play the game of life. In order to play the
    game of life, we must first *create* our character. Consciously. Not through cultural
    conditioning. *Through Conscious Conditioning.*
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 意味着，在自我超越之前，我们必须自我实现。[去健身房，开始创业，获得独立，并培养我们的心灵。](https://join.modernmastery.co/?utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter)
    为了自我实现，我们必须玩好生活的游戏。为了玩好生活的游戏，我们必须首先*创造*我们的角色。有意识地。不是通过文化条件。*通过有意识的条件作用*。
- en: Our goal is to become *aware* of this separation and bridge the gap. The gap
    between reality and concepts. God and the word “God.” Nature and fabrication.
    Immaterial and material. Light and dark. Love and hate. Truth and false. Stripping
    away the perceptions that do not serve you so your actions are intrinsically driven
    (closer to Truth) — not extrinsically assigned (obstruction of Truth).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标是变得**意识到**这种分离并弥合差距。现实与概念之间的差距。上帝与“上帝”这个词。自然与人为。非物质与物质。光明与黑暗。爱与恨。真理与虚假。剥去那些对你无益的感知，让你的行为内在地驱动（更接近真理）——而不是外在地分配（阻碍真理）。
- en: '*Remove the obstruction from your mind and you have wisdom. Remove the obstruction
    from your heart and you have love.*'
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*清除你心中的障碍，你就拥有了智慧。清除你心中的障碍，你就拥有了爱。*'
- en: You must realize that your character (who you are becoming) is there to serve
    you. That your beliefs are malleable. That your negative thoughts can be turned
    positive — closer to Truth, at any point in time. We must create the character
    through repetition of positive thoughts, beliefs, and actions to move us towards
    positive outcomes in our life.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须意识到你的性格（你正在成为的人）是为了服务你的。你的信念是可塑的。你的负面思想可以被转化为积极思想——在任何时刻都更接近真理。我们必须通过重复积极的想法、信念和行为来塑造性格，以推动我们生活中积极的结果。
- en: This will allow you to attract and build the things that result in money, meaning,
    health, and other things that have been masked by faulty perception. Allowing
    you to eventually transcend and pass on your lessons (which is the distilled meaning
    of life per ancient and modern teachers.)
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这将使你能够吸引并建立导致金钱、意义、健康以及其他被错误感知所掩盖的事情。最终，你将超越并传授你的教训（这是古代和现代教师所理解的生命的精华意义。）
- en: '[I dove into the whole “being VS becoming” thing more on today’s podcast. It
    may help you understand it better.](https://links.modernmastery.co/?utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter)'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '[我在今天的播客中更深入地探讨了“存在 VS 成为”的问题。这可能有助于你更好地理解它。](https://links.modernmastery.co/?utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter)'
- en: '**The Conscious Conditioning Process**'
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**有意识的训练过程**'
- en: Through conscious conditioning, you create your own “lens” to view the world
    from. You perceive things more accurately. You upgrade your mental programming.
    You can either be culturally conditioned into failure and mediocrity — or you
    can consciously condition your character into favorable outcomes. Program or be
    programmed.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 通过有意识的训练，你为自己创造了一个“透镜”来观察世界。你更准确地感知事物。你升级了你的心理编程。你可以被文化条件化为失败和平庸——或者你可以有意识地训练你的性格，以获得有利的结果。编程或被编程。
- en: Before you go through this process, you may want to read up on [The Creation
    Pyramid](https://thedankoe.com/how-to-create-a-life-of-meaning-money-impact-as-fast-as-humanly-possible/)
    and download [The Power Planner](https://shop.thedankoe.com/planner?utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter).
    This will give you extra guidance and something to refine along the way. Structure
    is king, but distractions will still come our way. They are impossible to avoid.
    This process will help you navigate them and transmute negative energy into positive.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在你开始这个过程之前，你可能想要阅读一下[《如何尽可能快地创造有意义、有金钱和影响力的人生》（The Creation Pyramid）](https://thedankoe.com/how-to-create-a-life-of-meaning-money-impact-as-fast-as-humanly-possible/)，并下载[《Power
    Planner》（The Power Planner）](https://shop.thedankoe.com/planner?utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter)。这将为你提供额外的指导，并在过程中有所改进。结构为王，但分心的事情仍然会出现在我们面前。它们是无法避免的。这个过程将帮助你导航它们，并将负面能量转化为正面能量。
- en: You will be conditioning your focus onto something positive so this process
    becomes habit. It took years for your current thought processes to be solidified.
    This is a lifelong journey and practice.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 你将把你的注意力集中在积极的事物上，使这个过程成为习惯。你的当前思维过程已经固化了多年。这是一场终身的旅程和实践。
- en: 'This is a 6 step process:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个6步的过程：
- en: '**1) Pause**'
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**1) 暂停**'
- en: When a thought pops into your head, pause before that thought becomes emotion,
    belief, trait, or reaction. This takes practice.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个想法突然出现在你的脑海中时，在它成为情感、信念、特质或反应之前，请先暂停一下。这需要练习。
- en: If the thought goes rancid immediately, bring your focus to what I call “anchors.”
    Anchors are places to bring your focus to neutralize and transmute negative feelings
    and emotions.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 如果思想立刻变得腐朽，将你的注意力转移到我所说的“锚点”上。锚点是用来将你的注意力集中起来，中和和转化负面感觉和情绪的地方。
- en: '*The breath* is the most readily available to you. Some schedule this via mindfulness
    meditation. You can bring your focus to your breath at any time.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '*呼吸*是最容易获得的。有些人通过正念冥想来安排这个。你可以在任何时候将你的注意力集中在呼吸上。'
- en: Other’s include music, nature bathing, physical activity, journaling (as we
    will discuss), and any other activities that imply potential flow-state or stress
    regulation.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 其他方法包括音乐、自然沐浴、身体活动、日记（正如我们将讨论的），以及任何其他可能暗示潜在心流状态或压力调节的活动。
- en: '**2) Question**'
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**2) 质疑**'
- en: Ask yourself questions that will reveal the thought’s true nature.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 向自己提出问题，以揭示思想的真正本质。
- en: '*“Why am I thinking this?”*'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '*“我为什么会这样想？”*'
- en: '*“Is this a thought I’ve had before? Where did it lead?”*'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '*“这是我以前想过的事情吗？它引导我去哪里了？”*'
- en: '*“Is this rational? Should it be given energy?”*'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '*“这是合理的吗？应该给它能量吗？”*'
- en: Let questions trigger more questions. This shines awareness and may dissolve
    potential problems outright.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 让问题引发更多问题。这能提高意识，并可能直接解决潜在问题。
- en: The next best way of doing this is through CC (conscious conditioning) journaling.
    Getting your thoughts out on paper. Writing out the questions, and answering them
    right there. This is a crucial habit to develop. Having your thoughts on paper
    provides immediate relief. It is an incredible self-awareness practice.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 做这件事的下一个最好的方法是进行CC（有意识的条件化）日记。将你的想法写下来。写下问题，并立即回答它们。这是一个需要培养的关键习惯。将你的想法写下来能提供即时的缓解。这是一项惊人的自我意识实践。
- en: '**Questioning. Is. Crucial.**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**质疑。至关重要**。'
- en: This is the most important step. Why? Understanding. This is where you uncover
    where the root of your faulty perception lies.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这是最重要的一步。为什么？理解。这是你发现你错误感知根源的地方。
- en: Habit formation and other self-help advice is worthless if you are not aware
    of your attachments and negative aspects of your identity. *You must attack the
    root.* Question your thoughts until they strike a chord. Until you feel that negative
    energy building up. From that energy, you have shined awareness on the issue.
    Now you can work in the opposite direction.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有意识到你的依恋和身份的负面方面，习惯养成和其他自我帮助建议都是无价值的。*你必须攻击根源。质疑你的思想，直到它们触动心弦。直到你感觉到负面能量的积累。从这种能量中，你已经提高了对问题的意识。现在你可以朝相反的方向工作了。
- en: You cannot understand a potential positive future. You can only understand a
    negative familiar past. Now you have a point to work away from. Towards the potential
    positive future.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '你无法理解一个潜在的未来。你只能理解一个熟悉的负面过去。现在你有一个可以工作的点。朝着潜在的未来前进。 '
- en: As an example, “I am lazy” won’t cut it as a place to work away from. What are
    you attached to that is making you lazy? No productivity advice will help as much
    as uncovering and understanding this blockage.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，“我很懒惰”并不能作为远离工作的地方。你是什么让你变得懒惰的？没有任何生产力建议能像揭示和理解这种阻碍一样有帮助。
- en: '**3) Objectify**'
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**3) 对象化**'
- en: Understand that this thought — or negative reaction that you uncovered — is
    not a part of *you*. It is an object. A separate entity. Only given life when
    given focus. A tool that can be used for the destruction or creation of your character.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这个想法——或你发现的负面反应——不是你的一部分。它是一个物体。一个独立的实体。只有当它被关注时才获得生命。一个可以用来破坏或创造你性格的工具。
- en: Write this down along with your thoughts.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 将这些写下来，并记录你的想法。
- en: '**4) Reframe**'
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**4) 重新思考**'
- en: Now you want to turn the self-destructive negative into a self-creative positive.
    Implying consciousness. Something that will push you towards an optimal outcome.
    Your vision, goals, and priorities.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你想要将自我毁灭的负面情绪转变为自我创造的积极情绪。这涉及到意识。某种能推动你朝着最佳结果前进的东西。你的愿景、目标和优先事项。
- en: 'Here are a few reframes:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些重新思考的方法：
- en: '**Guilt to gratitude** — Jocko Willink felt guilty for leaving his team while
    in the military. He had to consciously condition this negative belief into gratitude
    for being able to go home.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**从内疚到感激** — Jocko Willink在军队中离开团队时感到内疚。他必须有意识地将这种负面信念转化为对能回家的感激之情。'
- en: '**Failure to success** — Understanding that one failure is feedback. It is
    a rung in the ladder of success.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**从失败到成功** — 理解一次失败是反馈。它是成功阶梯上的一个台阶。'
- en: '**Cope to curiosity** — Instead of being closed-minded to an opportunity that
    presents itself (most online business opportunities, this conscious conditioning
    process, etc), be open-minded and ask “what would happen if I tried this out?”'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**从应对到好奇** — 而不是对出现的机遇持封闭态度（大多数在线商业机会、这种有意识的条件化过程等），要持开放态度，并问自己“如果我尝试这样做会发生什么？”'
- en: If you want to understand this more, study polarity. Fear opposes — and can
    transmute to — love. Similar to all negatives.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想更深入地理解这一点，研究极性。恐惧对立——并且可以转化为——爱。所有负面事物都是如此。
- en: '**5) Characterize**'
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**5) 描述**'
- en: How can you use this reframe to move you in a positive direction? What actions
    can you take? Is there anything you *can* do?
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何利用这种重构来推动自己向积极的方向发展？你可以采取哪些行动？你*能*做些什么？
- en: Consult with aspirational archetypes such as Jesus, spiritual teachers, and
    positive role models that you “vibe” with. What would they do in your situation?
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 咨询那些你“共鸣”的励志原型，如耶稣、灵性导师和积极榜样。在你这种情况下，他们会怎么做？
- en: '**6) Align**'
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**6) 对齐**'
- en: Remind yourself of your vision, goals, and priorities per The Creation Hierarchy
    and how this positive trait can help you move along the path.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 根据创造等级制度提醒自己你的愿景、目标和优先事项，以及这种积极特质如何帮助你沿着这条道路前进。
- en: Alignment = having your character act in accordance with who you are. Positive,
    truthful, God-like actions that result in self-actualization (enlightened selfishness),
    self-transcendence (enlightened selflessness), and heaven on Earth. Advancing
    the collective human consciousness. Playing your part and spreading the positive
    message.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 对齐=让你的性格行为与你的本质相符。积极、真诚、神一般的行动，导致自我实现（启迪的利己主义）、自我超越（启迪的无私），以及人间的天堂。提升集体人类意识。扮演你的角色，传播积极的信息。
- en: '**This. Takes. Time.**'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**这需要时间**。'
- en: While listening to an Actualized lecture (I listen to philosophy lectures each
    night to “think big picture” and fall asleep), he mentioned the importance of
    studying philosophy. We all get wrapped up in the technical details of life when
    in reality they mean nothing. Technical details solve technical problems. You
    are not tech. You are consciousness blobbed together that may never be fully understood.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在听Actualized的讲座时（我每晚都听哲学讲座，以“思考大局”并入睡），他提到了学习哲学的重要性。当实际上，我们都陷入了生活的技术细节中，而这些细节实际上毫无意义。技术细节解决技术问题。你不是技术。你是一个由意识组成的团块，可能永远无法完全理解。
- en: Studying philosophy and spirituality put’s your brain in “big picture thinking”
    mode. I can’t explain the phenomena, but through studying daily — my days are
    stress and worry-free. I “care less.” Things just fall into place as I act through
    my intuition that is not obstructed by technical thought.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 学习哲学和灵性让你的大脑进入“大局思考”模式。我无法解释这种现象，但通过每天的学习——我的日子不再有压力和担忧。“我不那么在乎。”事情在我通过不受技术思维阻碍的直觉行动时，自然而然地就位了。
- en: It was also mentioned that it took years to start to understand these philosophical
    concepts — then it hits you all at once. All of this spiritual stuff is hitting
    me all at once. It makes sense that it doesn’t make sense and the root of all
    of our problems is trying to make sense.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 也有人提到，要花上数年才能开始理解这些哲学概念——然后它们会突然全部击中你。所有这些精神上的东西都突然向我袭来。它不合理的合理性，以及我们所有问题的根源，就在于试图找到合理性。
- en: By not making sense, you be and become in alignment with Truth.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 通过不寻求合理性，你与真理保持一致。
- en: '*Dan Koe*'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '*丹·科*'
