- en: The $1 Million Dollar Creative – How To Monetize Your Interests
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 《百万美元创意者》——如何将你的兴趣货币化
- en: 原文：[https://thedankoe.com/letters/the-1-million-dollar-creative-how-to-monetize-your-interests/](https://thedankoe.com/letters/the-1-million-dollar-creative-how-to-monetize-your-interests/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/the-1-million-dollar-creative-how-to-monetize-your-interests/](https://thedankoe.com/letters/the-1-million-dollar-creative-how-to-monetize-your-interests/)
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2005">![](../Images/b2e02f866232d58e5db00c799b19bdb6.png)</picture>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-2005">![](../Images/b2e02f866232d58e5db00c799b19bdb6.png)</picture>
- en: I was lied to as a child.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我小时候曾被欺骗过。
- en: I have a feeling you were, too.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我感觉你也是。
- en: I remember sitting in my dad’s old apartment after my parent’s divorce, staring
    at an old laptop screen with Arizona State University’s website open, wondering
    what I was going to study and commit to for the rest of my life.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我记得在我父母离婚后，坐在父亲的老公寓里，盯着打开的亚利桑那州立大学网站的老笔记本电脑屏幕，思考着我将要学习什么，并承诺将此作为我余生的事业。
- en: At the age of 18, I was faced with a near-impossible decision. I was forced
    to know exactly what I wanted out of life when I hadn’t even had a life of my
    own. I was forced to choose the starting point of the career I would spend the
    next 40+ years of my life. I was forced to choose something that seemed to “set
    me up for a good future,” or else I would pay the consequences, literally, with
    a pile of student loans.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 18岁时，我面临了一个几乎不可能的决定。在我甚至没有自己的生活之前，我就被迫知道我想要从生活中得到什么。我被迫选择我将在接下来的40多年里投入的职业起点。我被迫选择似乎能“为我铺就美好未来”的事情，否则我将付出代价，字面上的代价，就是一堆学生贷款。
- en: For most people, they choose the career that will make them the most money…
    but that’s a lie.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大多数人来说，他们会选择能让他们赚最多钱的工作……但那又是一个谎言。
- en: For others, they choose the career that people will respect them for… but that’s
    a lie.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 对于其他人来说，他们会选择那些会得到他人尊重的职业……但那也是一个谎言。
- en: For the rest, they choose the career they think they will enjoy the most… but
    again, that’s a lie.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 对于其他人来说，他们会选择他们认为会最享受的职业……但那又是一个谎言。
- en: You were sold an illusion by parents and teachers who were sold an illusion.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 你的父母和老师给你灌输了一个幻觉，而他们自己也被灌输了一个幻觉。
- en: Their degrees, or lack thereof, had little to no impact on their income, status,
    or enjoyment. A degree may have opened opportunities, but ultimately, it was their
    personal choices that led to a higher income, status, or level of enjoyment. There
    are plenty of rich dropouts and broke graduates.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的学位，或者没有学位，对他们的收入、地位或享受几乎没有影响。学位可能打开了机会，但最终，是他们的个人选择导致了更高的收入、地位或享受水平。有很多富有的辍学生和贫穷的毕业生。
- en: People are starting to wake up to the fact that the conventional path doesn’t
    work for sensible people.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 人们开始意识到，传统的道路对明智的人来说不起作用。
- en: And as Alan Watts would say, “Sensible people get paid for doing what they enjoy
    doing.”
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 就像艾伦·瓦茨所说，“明智的人会因为做自己喜欢的事情而得到报酬。”
- en: If you’re reading this, I’m assuming you are a creative at heart.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在阅读这篇文章，我假设你内心是一个有创造力的人。
- en: You don’t care about making billions, you care about making more than enough
    money to do whatever you want.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 你不在乎赚多少钱，你只在乎赚足够的钱来做你想要做的事情。
- en: You don’t care about the hustle and grind of the typical entrepreneur, you care
    about rest, free time, and meaningful work.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 你不在乎典型创业者的忙碌和辛苦，你更在乎休息、空闲时间和有意义的工作。
- en: But you were lied to.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 但你被骗了。
- en: You went to school, got a job, and realized a few things.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 你上学，找工作，然后意识到一些事情。
- en: '**You don’t know how to monetize your passions, interests, or skills *outside*
    of a job.** In other words, you don’t understand that making money is a stack
    of skills like any others you’ve learned, but you banked on your employer to feed
    you with those skills.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你不知道如何在除了工作之外的地方将你的激情、兴趣或技能货币化。**换句话说，你不懂赚钱就像你学到的其他技能一样，是一系列技能，但你却依赖雇主来提供这些技能。'
- en: '**You learned the skills that would “make you the most money”** but realized
    that you have a hard limit on your earning potential that your employer sets for
    you. How much you earn depends on the vessel you choose for that skill, and a
    job usually isn’t the best long-term vessel.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你学习了那些会“让你赚最多钱”的技能**，但意识到你的收入潜力有一个硬性限制，这是你的雇主为你设定的。你赚多少钱取决于你选择承载这些技能的载体，而工作通常不是最好的长期载体。'
- en: '**You are trading time for money when technology will eventually make those
    tasks more efficient.** What you do for work will be less valuable in the future,
    and you’ll either take a massive pay cut or get fired. Technology lowers the cost
    of replicable tasks so we can focus on solving creative and human problems.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**当技术最终使这些任务更有效率时，你是在用时间换钱**。你为工作所做的事情在将来将变得不那么有价值，你可能会大幅降薪或被解雇。技术降低了可复制任务的成本，这样我们就可以专注于解决创造性和人类问题。'
- en: That’s what I’m here to help you change in this letter.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我在这封信中要帮助你改变的事情。
- en: I want to prove to you that it’s possible to make $1 million doing what you
    enjoy with simple logic and math. This is a semi-practical letter, but belief
    comes before action, so we will be chiseling into your mind a bit to rid your
    thought processes of debilitating beliefs.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我想向你证明，通过简单的逻辑和数学，你可以通过你喜欢的事情赚到一百万。这是一封半实用的信，但信念先于行动，所以我们将努力在你的脑海中剔除那些削弱信念的想法。
- en: I want to show you what to focus on so you don’t get trapped in a new 9 to 5
    called client work.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我想向你展示你应该关注什么，这样你就不会陷入一个名为客户工作的新9到5的陷阱。
- en: I want to give you full control over how much you work, how much you make, and
    how much satisfaction you derive from both.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望给你完全控制你工作多少、你赚多少以及从这两者中获得多少满足感。
- en: Leveraged Work – The Definition Of A Creative
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 杠杆式工作 – 创造者的定义
- en: If the work doesn’t require creativity, delegate it, automate it, or leave it.
    – Naval
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果工作不需要创造力，就委托出去，自动化它，或者放弃它。 – 纳瓦尔
- en: A creative is not someone with a specific skill that a robot will outprice and
    outcompete.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 创造者不是一个机器人会定价更高、竞争更激烈的特定技能的人。
- en: A creative is not a designer, filmmaker, painter, writer, photographer, or any
    specific limiting identity.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 创造者不是一个设计师、电影制作人、画家、作家、摄影师或任何具体的限制性身份。
- en: A creative is someone who engages with the process of life reflected in their
    work.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 创造者是指那些在工作中反映出对生活过程参与的人。
- en: A creative is someone who solves problems with whatever combination of skill,
    knowledge, experience, and inspiration necessary in the pursuit of a goal, usually
    in the form of a project.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 创造者是这样的人，他们通过必要的技能、知识、经验和灵感组合来解决任何问题，通常以项目的形式，以实现目标。
- en: If you work a job you hate as something like a designer, I would argue that
    you are not a true creative even when your job title and identity say you are
    (because you’re a fancy “designer”).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你像设计师一样做一份你讨厌的工作，我会争辩说，即使你的职位和身份说你是一个真正的创造者，你也不是（因为你是“设计师”）。
- en: You don’t register the job you hate as a priority problem to be solved.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 你不会把讨厌的工作登记为优先解决的问题。
- en: You don’t block out time to do the highest-leverage work, which will remove
    you from that job and give you more control over your time and income. You aren’t
    creative enough to solve a real problem, so you focus on doing your work and creating
    some pretty pixels on a screen to solve a problem that your employer assigned
    to you.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 你不会为做最高杠杆的工作留出时间，这将让你摆脱那份工作，让你对自己的时间和收入有更多的控制。你并不足够有创造力去解决真正的问题，所以你专注于做你的工作，在屏幕上创造一些漂亮的像素来解决问题，这是你的雇主分配给你的。
- en: 'I am not against jobs, but I see them for what they are: a stepping stone.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我并不反对工作，但我看到它们本来的样子：一个垫脚石。
- en: A job is useful for acquiring skills and industry knowledge, but it can also
    harm one’s psyche and breed complacency.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 工作对于获取技能和行业知识是有用的，但它也可能损害一个人的心理并滋生自满。
- en: In a job, it is almost guaranteed that there will come a point where you stop
    solving new problems. You get stuck solving the same problems over and over again.
    Problems that you didn’t choose to solve in the first place. You get bored and
    start wasting your time, but by then, you have so many responsibilities and bad
    habits that you always feel narrow-minded and stressed, so your ability to identify
    and solve problems independently is incredibly difficult.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在工作中，几乎可以肯定的是，你将到达一个点，你不再解决新的问题。你会陷入反复解决同样的问题。这些问题是你最初没有选择去解决的。你会感到无聊，开始浪费时间，但那时，你已经有很多责任和坏习惯，你总是感到狭隘和有压力，所以你独立识别和解决问题的能力极其困难。
- en: Life is an endless string of problems.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 生活是一连串无休止的问题。
- en: Problems are the polar end of purpose, one does not exist without the other.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是无目的的极端，一个没有另一个就无法存在。
- en: Solutions to problems are valuable.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 解决问题的方案是有价值的。
- en: When you stop solving new problems, your mind stops expanding.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 当你停止解决新的问题时，你的思维就停止了扩展。
- en: With each problem you solve, you reach a new level of mind because you have
    to zoom out into the unknown, collect resources, and use the creative ability
    of your mind to reach the next stage. This is a key lesson in [The Art Of Focus](https://theartoffocusbook.com).
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你解决每一个问题，你将达到一个新的心灵层次，因为你必须放大到未知，收集资源，并使用你心灵的创造力达到下一个阶段。这是《聚焦的艺术》一书中的一个关键教训。[The
    Art Of Focus](https://theartoffocusbook.com)。
- en: In other words, a job, or just your comfort zone, can be the early death of
    the best version of yourself. In fact, I wouldn’t say it’s an early death. It’s
    a slow and painful decline into the worst version of yourself. Problem-solving
    is how you reverse entropy in your mind. If you have no new problems to solve,
    you slowly drown in chaos, feeling bored, lost, and anxious until it becomes so
    painful that you are forced to change your situation or accept early death.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，一份工作，或者只是你的舒适区，可能是你最好版本的早期死亡。事实上，我甚至不会说这是早期死亡。这是一种缓慢而痛苦的衰落，进入你最糟糕的版本。解决问题是你逆转你心中熵的方式。如果你没有新的问题要解决，你将慢慢地淹没在混乱中，感到无聊、迷失和焦虑，直到它变得如此痛苦，以至于你被迫改变你的情况或接受早期死亡。
- en: I’d prefer that you don’t wait until that point.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望你不要等到那个时刻。
- en: A creative is someone whose end goal is leveraged work.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 创意人士是那些将最终目标转化为杠杆工作的人。
- en: That is, identifying the work that leads to the most results with the least
    effort.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 也就是说，确定那些以最少的努力带来最多结果的工作。
- en: For most people, the “results” you are looking for are more money, more time,
    and more fulfillment.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大多数人来说，你正在寻找的“结果”是更多的钱，更多的时间，以及更多的满足感。
- en: Here are the steps to reaching all of them.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是实现所有这些的步骤。
- en: The $1 Million Dollar Creative
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一百万美元的创意者
- en: <picture decoding="async" class="wp-image-2004">![](../Images/e1b999077a31eb0892f5a2aa09fb29fe.png)</picture>
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-2004">![](../Images/e1b999077a31eb0892f5a2aa09fb29fe.png)</picture>
- en: I always believed passion was found in a specific skill.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直相信激情是在一项特定的技能中找到的。
- en: I tried to find that passion in web design, digital art, and programming. Every
    time, I was left feeling empty.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我试图在网页设计、数字艺术和编程中找到那种激情。每次，我都感到空虚。
- en: It wasn’t until I decided to take control of my life, get clear on what I wanted
    for my future, and start pursuing that relentlessly that I figured out what a
    creative actually is.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 直到我开始决定掌控自己的生活，明确我未来想要什么，并开始不懈地追求它，我才真正弄清楚创意人士实际上是什么。
- en: '*Passion is found in the process of creating your vision.*'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '*激情源于创造愿景的过程*。'
- en: You can enjoy a skill you use along the way to help, but if you become attached
    to or dogmatic about that skill by making an identity out of it, you will get
    trapped.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以享受在帮助过程中使用的技能，但如果因为你把它作为身份而对其产生依恋或教条化，你将会陷入困境。
- en: You aren’t passionate about being a designer, you are passionate about the problems
    design allows you to solve (until your life and work limit what problems you solve).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 你对成为设计师并不充满激情，你对设计允许你解决的问题充满激情（直到你的生活和工作的限制你解决的问题）。
- en: Passion is investing energy into a goal. You can be passionate about the journey
    of mastering a skill, but once you’ve mastered it, that passion fades. You must
    keep that passion alive by channeling energy into the skills, goals, and projects
    that will achieve your vision. Your vision is an infinite bank for energy storage.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 激情是对目标的投入能量。你可以对掌握一项技能的旅程充满激情，但一旦你掌握了它，那种激情就会消失。你必须通过将能量引导到技能、目标和项目中，以实现你的愿景来保持那种激情。你的愿景是一个无限的能量存储银行。
- en: If you want to reach $1 million as one-person by monetizing your interests,
    you’re going to have to be okay with learning skills you may not want to learn
    and doing work you may not want to do.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要通过货币化你的兴趣成为一个人达到一百万美元，你必须愿意学习你可能不想学习的技能，并做一些你可能不想做的事情。
- en: In the end, that will bring you more fulfillment than never creating your vision
    because you were too stubborn to learn the skills necessary to do so.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，这比你因为固执地学习实现愿景所需的技能而从未创造愿景更能带给你满足感。
- en: 1) Choose A Vision, Not A Skill
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 选择一个愿景，而不是一项技能
- en: If you don’t have a vision, you are lost. You can’t create outcomes, so you
    are doomed to mechanical living and determined outcomes.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有愿景，你就会迷失。你不能创造结果，所以你注定要过着机械的生活和确定的结果。
- en: Every decision you make in any domain of your life must be filtered through
    your vision. That is how you bring meaning to your actions and minimize distractions.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 你在生活中任何领域的每一个决定都必须通过你的愿景来过滤。这就是你给你的行动带来意义并最小化干扰的方式。
- en: Write down exactly what you want out of life.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 写下你从生活中想要得到的东西。
- en: Don’t miss a detail, but realize this is an iterative process.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 不要错过任何细节，但要知道这是一个迭代的过程。
- en: You won’t get it right the first time around, and you probably never will. That’s
    not the point. Spend 30 minutes generating a minimum viable vision.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 你不会一开始就做对，你可能永远不会。这不是重点。花30分钟生成一个最小可行愿景。
- en: Return to it often to add, subtract, and improve as your desires inevitably
    change with your failures.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 经常回到它，随着你的失败，你的愿望不可避免地改变，添加、删除和改进。
- en: Your vision is how you filter what work to do, what skills to learn, and what
    decisions to make.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 你的愿景是你过滤要做什么工作、要学习哪些技能以及要做出哪些决策的方式。
- en: Again, if you don’t have a vision, no matter how clear, *you are lost.*
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，如果你没有愿景，无论多么清晰，*你将迷失方向*。
- en: 2) Stack The Future Proof Skills
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 堆积未来证明的技能
- en: You’re worried about what career skills to learn that will be relevant in 20
    years because you are focused on the viability of the skill, not the vision.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 你担心20年后哪些职业技能是相关的，因为你专注于技能的可行性，而不是愿景。
- en: 'If you want to secure your future, you need a foundational skill stack consisting
    of:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想确保你的未来，你需要一套基础技能栈，包括：
- en: '**Marketing & sales** – if you don’t know how to attract and persuade, you
    will never get what you want, and your only option will be for an employer (or
    the government) to give it to you.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**营销与销售** – 如果你不知道如何吸引和说服，你将永远不会得到你想要的，你唯一的选项将是雇主（或政府）给你。'
- en: '**Writing & thinking** – the ability to communicate the value in your unique
    mind. The foundation of getting in front of other people.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**写作与思考** – 传达你独特思维中价值的技能。站在其他人面前的基础。'
- en: '**Entrepreneurship** – the process of taking your future into your own hands,
    hunting for your survival, and building products that you want to see in the world
    (that others care about).'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创业** – 将你的未来掌握在自己手中，寻找你的生存，并创建你希望在世界看到的（其他人也关心的）产品。'
- en: When you pair these with the various interests you learn while creating your
    vision, you become unstoppable. I teach the basics of these in the free [One-Person
    Business Foundations mini-course](https://theone-personbusiness.com).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 当你将这些与你创建愿景时学习的各种兴趣结合起来，你就变得不可阻挡。我在免费的[单人商业基础迷你课程](https://theone-personbusiness.com)中教授这些基本知识。
- en: 3) Solve Problems With Experimentation
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 通过实验解决问题
- en: Self-experimentation is the only way to solve your problems for good.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 自我实验是解决你问题的唯一方法。
- en: Self-experimentation is the only way to create a unique solution that others
    can benefit from.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 自我实验是创造一个其他人也能从中受益的独特解决方案的唯一方法。
- en: 'Your job is to:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 你的任务是：
- en: '**Research processes that others have found success with.** Thankfully, you
    can find these with a simple search.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**研究其他人已经取得成功的流程**。幸运的是，你可以通过简单的搜索找到这些。'
- en: '**Experiment with various techniques.** Implement the processes you learn and
    attempt to get results.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**尝试各种技术**。实施你学到的流程并尝试获得结果。'
- en: '**Identify patterns and principles.** Note the similarities between each and
    double down on them.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**识别模式和原则**。注意它们之间的相似性，并加倍关注它们。'
- en: '**Create your own process.** Tailor what you learn to your unique lifestyle
    and situation.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创建你自己的流程**。将你学到的知识适应你独特的生活方式和环境。'
- en: '**Contribute to true education by passing it down.** Give people education
    that can’t be taught in schools with a fundamental grounding in critical thinking.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通过传承贡献于真正的教育**。提供学校无法教授的、以批判性思维为基础的教育。'
- en: If you’ve solved a problem in your life, you’re qualified to start a business.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经在生活中解决了问题，你就有资格开始创业。
- en: 4) Become A Value Creator
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 成为价值创造者
- en: Today’s vessel for beginning creatives is being a creator.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，对于初出茅庐的创作者来说，成为一个创造者。
- en: Not an influencer, a creator. A value creator, to be exact.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 不是影响者，而是创造者。确切地说，是一个价值创造者。
- en: Someone who becomes a fountainhead of value based on the interests you love
    by making them interesting to other people.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使你热爱的兴趣对其他人变得有趣，从而成为价值源泉的人。
- en: You are to become the *source* for your interests to attract an audience to
    them.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 你要成为你兴趣的*来源*，吸引观众关注它们。
- en: 'You do this through:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过以下方式做到这一点：
- en: '**Education** – teach your interests in a way that helps people achieve a goal
    toward your vision.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**教育** – 以帮助人们实现你愿景中的目标的方式教授你的兴趣。'
- en: '**Entertainment** – throw in a dash of personality to attract people like you
    (the people you can help the most).'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**娱乐** – 加入一点个性，吸引像你一样的人（你可以帮助最多的人）。'
- en: '**Inspiration** – show people what you’ve built so they can see what’s possible.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**灵感** – 展示你建造的东西，让他们看到可能实现的事情。'
- en: Social media is not just an app on your phone.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体不仅仅是你的手机上的一个应用程序。
- en: It’s the town square of the new, digital society.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 这是新数字社会的城镇广场。
- en: Yes, you probably use it to numb your mind by scrolling meaningless content,
    but others are using it as education that schools don’t teach so they can reach
    heights that normal society doesn’t offer.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，你可能用它来通过滚动无意义的内容来麻木你的思维，但其他人正在将其用作学校不教授的教育，以便他们能够达到正常社会所不提供的高度。
- en: Value creators are those who dedicate themselves to their interests, take it
    on as their life’s work to explore them, and distill the information into education.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 价值创造者是这样一些人，他们致力于自己的兴趣，将其作为一生的使命去探索，并将信息提炼成教育内容。
- en: This is the style of one-person business that I teach.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我教授的一个人企业的风格。
- en: Creating social media content to build distribution under *your name.*
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 创建社交媒体内容，以在你的名字下建立分销。
- en: In business, distribution = freedom.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业中，分销=自由。
- en: An audience = distribution.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 听众=分销。
- en: 'Hammer this into your head:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 将这一点深深印在你的脑海中：
- en: You will not make money (*that you control*) if you don’t have *people* who
    will *give you money* for the value you offer in the form of a product.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有人们愿意为你提供的产品形式的价值支付金钱，你就不会赚钱（你控制的）。
- en: If you never realize this, you have no other option but to work a job where
    your employer does this for you for the rest of your life.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你从未意识到这一点，你除了终身从事一份工作，让雇主为你做这件事，别无选择。
- en: 5) Monetize Your Mind, Not Your Time
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5) 将你的思维而非时间货币化
- en: 'Value creators are those who:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 价值创造者是这样一些人：
- en: Monetize their minds, not their time, so they can remain one person without
    limiting their income. One person’s labor can’t scale, but the creative ability
    of their minds can.
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 货币化他们的思维，而不是他们的时间，这样他们就可以作为一个没有限制收入的人存在。一个人的劳动力无法扩展，但他们的思维创造力可以。
- en: Research their obsessions and distill their learning with writing, video, and
    other internet content.
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究他们的痴迷，并通过写作、视频和其他互联网内容提炼他们的学习成果。
- en: Get paid for aggregated knowledge and experience in the form of digital products
    (or physical products once you have the cash flow necessary to sustain that… but
    everyone should have a digital product that replaces their income and covers their
    living expenses).
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过数字产品（或一旦你有足够的现金流来维持……但每个人都应该有一个数字产品来替代他们的收入并支付他们的生活费用）的形式，获得对聚合知识和经验的报酬。
- en: This is what I teach you how to do in my new course, [Mental Monetization](https://mentalmonetization.com),
    to monetize your creative work. It goes live on June 3rd. Preorder before the
    price increases.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我新课程中教你如何做的，[精神货币化](https://mentalmonetization.com)，以货币化你的创意工作。它将于6月3日上线。在价格上涨之前预订。
- en: Products are the highest form of leverage.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 产品是最高形式的影响力。
- en: They sell while you sleep.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 他们在你睡觉时销售。
- en: You don’t need to spend time fulfilling the value you offer like you do with
    service or client work.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要像服务或客户工作那样花费时间来履行你提供的价值。
- en: You build it once and sell it as many times as your skill allows.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 你只需构建一次，然后根据你的技能允许的程度多次销售。
- en: 6) Turning It Into $1 Million
  id: totrans-116
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6) 将其转化为一百万美元
- en: 'Your levers as a value creator are:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 作为价值创造者，你的杠杆包括：
- en: '**Writing** – Attracting an audience of people by educating them on how your
    interests can help them achieve their goals. The writing can be repurposed into
    posts, a newsletter, a YouTube script, and literally any other kind of content.
    Start with writing. ([2 Hour Writer](https://2hourwriter.com) teaches this).'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**写作** – 通过教育人们如何让你的兴趣帮助他们实现目标来吸引人们的听众。这些写作可以改编成帖子、通讯、YouTube剧本，以及任何其他类型的内容。从写作开始。（[2小时作家](https://2hourwriter.com)教授这一点）。'
- en: '**Promotion** – You won’t make money if you don’t promote your product. Promote
    your email list on social media. Promote your products on your email list.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推广** – 如果你不去推广你的产品，你就不会赚钱。在社交媒体上推广你的电子邮件列表。在你的电子邮件列表上推广你的产品。'
- en: '**Iteration** – Pay attention to the writing and promotions that do better
    than others. Improve them as you go to increase the effectiveness of them.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**迭代** – 注意那些比其他人做得更好的写作和推广。在前进的过程中改进它们，以增加它们的有效性。'
- en: This is literally the only thing you need to do to reach $1 million as one person.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是一个人达到一百万美元所需要做的唯一一件事。
- en: You have a product that sells.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 你有一个可以销售的产品。
- en: You have an audience that’s growing.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 你的听众正在增长。
- en: If you can continue growing the audience and selling the product… how much you
    earn is really up to you. It’s just simple math.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能够继续扩大受众并销售产品……你能赚多少钱完全取决于你。这只是简单的数学。
- en: If you can make $1, you can make $1 million.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能够赚1美元，你就能赚100万美元。
- en: If you can gain 1 follower, you can gain 1 million.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能够获得一个追随者，你就能获得一百万。
- en: The only trap here is forgetting that you are a creative.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一的陷阱是忘记你是一个创造者。
- en: If your audience stops growing, that’s a problem, solve it.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的受众停止增长，那就是一个问题，解决它。
- en: If your product stops selling, that’s a problem, solve it.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的产品停止销售，那就是一个问题，解决它。
- en: If you don’t know how to solve it… skill issue.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道如何解决它…技能问题。
- en: 6) The Importance Of Rest
  id: totrans-131
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6) 休息的重要性
- en: You can’t identify new problems with a narrow mind.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 用狭隘的思维无法识别新问题。
- en: Work contracts the mind, rest expands the mind.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 工作会使思维收缩，休息会使思维扩张。
- en: At rest, your brain kicks on the Default Mode Network.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 在休息时，你的大脑会启动默认模式网络。
- en: We don’t need to get into technicals, but your brain is *more* active when you
    are at rest and attempts to connect and spit ideas into your conscious mind.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不需要深入研究技术细节，但当你休息时，你的大脑会更加活跃，并试图将想法连接并吐露到你的意识中。
- en: Heard of “shower thoughts?”
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 听说过“淋浴时的想法”吗？
- en: That’s what this process does.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是这个过程所做的事情。
- en: If you want to consistently have great ideas that lead to the highest leverage
    work… stop working.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要持续拥有伟大的想法，这些想法能带来最高杠杆的工作…停止工作。
- en: Schedule walks in between work blocks. Go to the gym. Block out reading time.
    Go to dinner with your friends. Do anything that isn’t work… especially thinking
    about work.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 在工作块之间安排散步时间。去健身房。安排阅读时间。和朋友们一起吃饭。做任何不是工作的事情…特别是思考工作的事情。
- en: 7) F*ck Being Busy
  id: totrans-140
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7) F*ck Being Busy
- en: If the work doesn’t move the needle toward your vision, stop doing it.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 如果工作没有让你的愿景向前迈进，就停止做它。
- en: Busy work is yet another distraction that most people love to fall for.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 忙碌的工作是大多数人喜欢陷入的另一个诱惑。
- en: Your psyche is wired to hunt.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 你的心理机制是用于狩猎的。
- en: So, work like a lion, as Naval would say.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，像Naval说的那样，像狮子一样工作。
- en: Or, in my words, use tactical stress.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，用我的话说，使用战术压力。
- en: '**Sit**, let vision accumulate.'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**坐下来**，让视野积累。'
- en: '**Wait**, until you see the prey.'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**等待**，直到你看到猎物。'
- en: '**Sprint**, get the work done.'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**冲刺**，完成工作。'
- en: '**Eat**, enjoy life and rest.'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**享受**生活并休息。'
- en: This goes against everything that we’ve been conditioned to believe. It will
    take time to accept that this is how creatives work.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 这与我们所习惯相信的一切相反。接受这一点需要时间，这是创造力的工作方式。
- en: Being boxed in a tidy 9-5 schedule is a living hell for creatives and entrepreneurs
    at heart.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
