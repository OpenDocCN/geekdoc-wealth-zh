- en: The Rise Of The Value Creator (A New Career Path)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 价值创造者的崛起（一条新的职业道路）
- en: 原文：[https://thedankoe.com/letters/the-rise-of-the-value-creator-a-new-career-path/](https://thedankoe.com/letters/the-rise-of-the-value-creator-a-new-career-path/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/the-rise-of-the-value-creator-a-new-career-path/](https://thedankoe.com/letters/the-rise-of-the-value-creator-a-new-career-path/)
- en: The state of work is changing.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 工作状态正在改变。
- en: Things are going digital, we know that.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 事情正在数字化，这是众所周知的事实。
- en: Employers are hiring based on the content you share online, your public resume,
    we know that.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 雇主是根据你在网上分享的内容、你的公开简历来招聘的，这是众所周知的事实。
- en: People are losing trust in traditional education while resorting to internet
    creators to teach them the necessary skills for personal & professional success,
    we know that.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当人们失去对传统教育的信任，转而求助于互联网创作者来教授他们实现个人和职业成功所需技能时，这是众所周知的事实。
- en: Online courses get a bad rap.
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在线课程受到了不好的评价。
- en: ''
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The truth is, we need MORE to educate people on modern skills people can actually
    use in the information age.
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 事实是，我们需要更多来教育人们现代技能，这些技能在信息时代人们实际上可以使用。
- en: ''
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A 19th-century education system built for the industrial age won't cut it.
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 为工业时代设计的19世纪教育体系已经不再适用。
- en: ''
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Decentralized value creators are the answer.
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 去中心化的价值创造者是解决方案。
- en: ''
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [October 15, 2022](https://twitter.com/thedankoe/status/1581308449253638144?ref_src=twsrc%5Etfw)
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年10月15日](https://twitter.com/thedankoe/status/1581308449253638144?ref_src=twsrc%5Etfw)
- en: Client work (like freelancing) is everyone’s first option. One, because they
    aren’t aware of another low-startup-cost opportunity. Two, because everyone screams
    to *“learn a skill, sell a skill”* and it’s conditioned into their brain. This
    usually backfires when they realize they’ve built themselves into another 9-5
    with a capped income. Labor cannot be scaled as a one-person business.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 客户工作（如自由职业）是每个人的首选。一方面，因为他们没有意识到其他低启动成本的机遇。另一方面，因为每个人都高呼“学习一项技能，出售一项技能”，这已经深入他们的脑海。当他们意识到自己又陷入了一个有固定收入的朝九晚五的工作中时，这通常会导致反效果。作为一个人的企业，劳动力是无法扩展的。
- en: Even then, there is one thing that a lot of people glance over. The current
    state of freelancing is 90% composed of people using software to manage aspects
    of people’s businesses.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 即使如此，还有一件事很多人都会忽略。当前自由职业的状态有90%是由使用软件来管理人们业务方面的人组成的。
- en: Web designers use templates and website builders. Email marketers use writing
    templates and automation. While this may make money in the short term, it will
    not be sustainable over the next few years as tech continues to rapidly evolve
    (while putting the power back into the individual’s hands).
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 网页设计师使用模板和网站构建工具。电子邮件营销人员使用写作模板和自动化工具。虽然这可能在短期内带来收益，但随着技术的持续快速演变（同时将权力重新交到个人手中），这种模式在未来几年内将无法持续。
- en: The highest-paid freelancers don’t get paid for this. They get paid for *how
    they use the tools with the value they’ve developed in their mind.* They have
    specific knowledge that allows them to use software in creative ways that get
    extraordinary results.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 最高收入的自由职业者并不是因为这项工作而获得报酬。他们是因为*他们如何使用他们心中已经开发出的价值来使用工具*而获得报酬。他们拥有特定的知识，使他们能够以创造性的方式使用软件，从而获得非凡的结果。
- en: Sure, some people can schedule posts on Instagram and pay for a software that
    helps with growth (like interacting with other accounts), but if your content
    sucks? If your funnel sucks? If your offer sucks? You aren’t gonna make it. Intellectual
    development is increasing in importance as we transcend the material.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，有些人可以在Instagram上安排帖子，并支付软件费用以帮助增长（如与其他账户互动），但如果你的内容糟糕？如果你的转化漏斗糟糕？如果你的产品糟糕？你将无法成功。随着我们超越物质，智力发展的重要性正在增加。
- en: This has been a long time coming.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这已经酝酿已久。
- en: As humans, we’ve built tools, solutions, and technology that make our lives
    easier. The plow made farming easier. Shoes made urban living easier. Software
    made business easier – automations have replaced an immense amount of labor jobs
    and will not stop until the laziness of human nature makes physical life easy.
    And yes, these do all come with consequences, but who are you to judge how the
    cosmos chooses to evolve over a lifetime?
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 作为人类，我们创造了工具、解决方案和技术，使我们的生活变得更轻松。犁使农业变得更简单。鞋子使城市生活变得更简单。软件使商业变得更简单——自动化已经取代了大量的劳动力工作，并且不会停止，直到人类天性的懒惰使物理生活变得简单。是的，这些都伴随着后果，但你有资格评判宇宙如何选择在一生中进化吗？
- en: The next phase is to ideate, build, and earn with our mind to advance to the
    next stage of human evolution. What used to take thousands of dollars and a team
    of programmers can be built with a $10 subscription to a landing page-building
    software. Do not underestimate this power.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个阶段是用我们的思维进行构思、建设和盈利，以进入人类进化的下一个阶段。过去需要数千美元和一支程序员团队才能完成的事情，现在只需花费10美元订阅一个着陆页构建软件就能实现。不要低估这种力量。
- en: In the past few letters, we have discussed the one-person business model.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的几封信中，我们讨论了一人企业模式。
- en: This one on [how to productize yourself](https://thedankoe.com/the-one-person-business-model-how-to-monetize-yourself/)
    and this one [how to find and profit from problems in your life](https://thedankoe.com/if-you-are-valuable-turn-yourself-into-a-business-with-5-repeatable-steps/).
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这一篇关于[如何产品化自己](https://thedankoe.com/the-one-person-business-model-how-to-monetize-yourself/)，还有一篇[如何从生活中的问题中找到并获利](https://thedankoe.com/if-you-are-valuable-turn-yourself-into-a-business-with-5-repeatable-steps/)。
- en: In this letter, I want to introduce you to what I call a **Value Creator.**
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在这封信中，我想向你介绍我称之为**价值创造者**的概念。
- en: A new career path for the intellectually curious that don’t want to turn into
    the stereotypical internet marketer. A career path for those that value independence,
    self-reliance, and having full control over how much you make, how much you work,
    and what you work on.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 为那些不想成为典型互联网营销人员的知识好奇者提供一条新的职业道路。为那些重视独立、自力更生，并完全控制自己赚多少钱、工作多少以及做什么的人提供一条职业道路。
- en: 'In short, Value Creators are those that:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，价值创造者是这样的人：
- en: Earn with their mind, not their time (so they can stay as a one-person business
    without limiting their income).
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用他们的思维而不是时间来赚钱（这样他们就可以作为一个一人企业而不会限制他们的收入）。
- en: Research their obsessions and distill their learnings with writing, video, and
    other internet content.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过写作、视频和其他互联网内容研究他们的痴迷，提炼他们的学习成果。
- en: Get paid for aggregated knowledge and experience in the form of digital products
    (or physical products if you want, but everyone should have some form of digital
    product).
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过数字产品（或如果你愿意，也可以是实体产品）的形式获得聚合知识和经验的报酬。
- en: Have a heavy focus on educating their audience (instead of posting memes, starting
    drama, or other things like that).
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重视教育他们的受众（而不是发布梗图、制造戏剧或其他类似的事情）。
- en: Value creators are those that dedicate themselves to their interests, take it
    on as their life’s work to explore them, and distill the information in the form
    of education.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 价值创造者是这样的人：他们致力于自己的兴趣，将其作为一生的使命去探索，并以教育的方式提炼信息。
- en: Why does this matter? Because we need passionate individuals to become experts
    in their respective domain of mastery. Who else is going to do it? Will the government
    (that is intimately tied with the school system) nurture a curriculum as technology
    phases out an entire segment of work? No, they’re going to be the first to build
    the technology that does it, so they can have more money.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这为什么重要？因为我们需要充满激情的人成为各自领域的大师。还有谁会去做这件事？政府（与学校系统紧密相连）会在技术淘汰整个工作领域时培养课程吗？不，他们将是第一个构建这项技术的人，这样他们就能赚更多的钱。
- en: Lastly, the “value” space in the creator economy is so small. Everyone is focused
    on flashy gimmicks and cheap entertainment. We need individuals that can educate
    in an exciting way for the coming generations – because school curriculum won’t
    be able to keep up with niche advancements.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，创作者经济中的“价值”空间非常小。每个人都专注于花哨的噱头和廉价的娱乐。我们需要能够以令人兴奋的方式教育下一代的人——因为学校课程无法跟上细分领域的进步。
- en: '**Exploring An Unknown Crevice Of Reality Through Obsession**'
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**通过痴迷探索现实的未知角落**'
- en: It’s not about transitioning from consumer to creator.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是从消费者到创作者的转变。
- en: It’s about transitioning from consumer to researcher.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这关乎从消费者到研究员的转变。
- en: Being a “consumer” implies mindless consumption of information.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 成为“消费者”意味着无意识地消费信息。
- en: Being a “researcher” implies intentional consumption of information.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 成为“研究员”意味着有意识地消费信息。
- en: <picture fetchpriority="high" decoding="async" class="wp-image-829">![](../Images/0afd9e47b0793ff85a1e5e1023065ece.png)</picture>
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-829">![](../Images/0afd9e47b0793ff85a1e5e1023065ece.png)</picture>
- en: A value creator earns with his mind, not his time. Meaning, his greatest asset
    is information, ideas, and knowledge that gets you excited to wake up and share
    the discoveries that came from your research.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 价值创造者用他的头脑赚钱，而不是用他的时间。这意味着，他最大的资产是信息、想法和知识，这些让你兴奋地醒来并分享来自你研究发现的发现。
- en: If you follow [my notion of the one-person business model (monetizing yourself),](https://thedankoe.com/the-one-person-business-model-how-to-monetize-yourself/)
    the person you can help the most is *you**.*
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你遵循[我的单人商业模式（货币化自己）的观点，](https://thedankoe.com/the-one-person-business-model-how-to-monetize-yourself/)那么你能帮助最多的就是*你自己*。
- en: Your niche is *you.*
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 你的细分市场是*你自己*。
- en: Your brand, content, and offer are all based on your goals, interests, and personal
    experience.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 你的品牌、内容和提供的产品都基于你的目标、兴趣和个人经验。
- en: This is a holistic approach to doing what you love for a living. You are opening
    up the potential to be paid for becoming a high-value individual by becoming an
    expert in a select domain of the interests you are obsessed over. Why would you
    want to create a business out of anything else? Business was, should, and return
    to being an extension of the self.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个全面的方法，让你能够以你热爱的方式谋生。你正在开启成为你痴迷领域内专家，从而成为一个高价值个体的可能性，以获得报酬。你为什么要从其他任何事情中创造一个企业呢？商业曾经、应该，并且将回归为自我的一种延伸。
- en: That all sounds great, but *how* do you research effectively?
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都听起来很棒，但*如何*进行有效的调研呢？
- en: By exploring the unknown aspects of reality through consciousness. You see,
    reality is infinitely complex, connected, and perspective based.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 通过意识探索现实的未知方面。你看，现实是无限复杂、相互联系和基于视角的。
- en: While most people navigate life on the surface, those that can dive deep beyond
    what they *see* are the ones that unlock the creative potential that others can’t
    fathom.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 当大多数人只是在生活的表面航行时，那些能够深入到他们*所见*之外的人，才是能够开启他人无法理解的创造潜能的人。
- en: In [Digital Economics](https://digitaleconomics.school), I talk about business
    being a vessel for self-actualization. Digging deep into the interests that you
    love researching is how you learn about yourself, life, and the people you plan
    to serve with your findings. Business, to me, is a medium for making the impractical
    practical. It is a way of adding intention and utility to everything that goes
    into your brain.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在[数字经济](https://digitaleconomics.school)中，我谈论了商业是自我实现的载体。深入挖掘你热爱研究的兴趣，这是你了解自己、生活以及你打算用你的发现来服务的人的方法。对我来说，商业是将不切实际变为实际的中介。它是一种给进入你大脑的每一件事添加意图和用途的方式。
- en: But how do you explore this crevice of reality?
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 但你该如何探索这个现实的裂缝呢？
- en: By deconstructing wholes into parts. (Then, you reconstruct those parts into
    a new whole, that is creativity.) That’s what every single thing in this world
    is. A unit of thought. A figment of consciousness. A *thing.* Both a whole and
    a part. Atom, molecule, cell, organism. All parts of a whole and wholes in themselves.
    Human, bedroom, apartment complex, city, state, country, planet, galaxy. Everything
    is infinitely connected in all directions. Up, down, left, and right. This is
    what consciousness is. Seeing beyond what’s right in front of your eyes. This
    requires accurate perception of reality itself. The more closed-minded, reactionary,
    and quick-to-judge you are, the less likely you are to succeed in this space (or
    any space for that matter).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将整体分解为部分。（然后，你将这些部分重新组合成一个全新的整体，这就是创造力。）这就是世界上每一件事的本质。一个思维单位。意识的产物。一个*东西*。既是整体也是部分。原子、分子、细胞、生物体。都是整体的一部分，同时自身也是整体。人类、卧室、公寓综合体、城市、州、国家、星球、星系。一切都在无限地相互连接，向上、向下、向左、向右。这就是意识。看到你眼前所没有的东西。这需要你对现实本身的准确感知。你越封闭、越容易反应过度、越容易快速判断，你在这个空间（或任何空间）成功的机会就越小。
- en: '*Conscious Entrepreneurship is how you become a Value Creator.*'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '*意识创业*是你成为价值创造者的方式。'
- en: Let’s make this a bit more practical.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使这更加实际一些。
- en: '**1) Choose An Obsession**'
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**1) 选择你的痴迷**'
- en: First, do not seek to outsource any of this. You have to adopt the mindset of
    an explorer. Nobody can tell *you* what *you* are obsessed with.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，不要寻求外包任何这些事情。你必须采取探险者的心态。没有人能告诉你*你*痴迷于什么。
- en: '*If you don’t know, try. If you don’t try, you’ll never know.*'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果你不知道，就试试。如果你不尝试，你就永远不会知道*。'
- en: Try *everything.*
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试*一切*。
- en: Go to a local bookstore and buy the book that “calls” your name.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 去当地书店买一本“呼唤”你名字的书。
- en: None of this “earn with your mind” stuff is step-by-step, predictable, or able
    to be described with words. You have to learn to trust your gut.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些“用你的头脑赚钱”的东西都不是按部就班的、可预测的，也不能用言语来描述。你必须学会信任你的直觉。
- en: 'If you need a starting point:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要一个起点：
- en: Look at your browser history
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 查看你的浏览器历史记录
- en: Look at the videos you last watched
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 看看你最近观看的视频
- en: Look at what you naturally consume to learn (FYI, distraction is not natural)
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 看看你自然消费来学习的东西（顺便说一句，分心不是自然的）
- en: Look at your life and see what area you have improved the most
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 看看你的生活，看看你在哪个领域进步最大
- en: Why would you **not** want to turn these things into a business so you can get
    paid for doing what you already do?
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 你为什么不把这些东西变成一个业务，这样你就可以为做你已经在做的事情而得到报酬呢？
- en: '*“Sensible people get paid for doing what they enjoy doing.”*'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '*“明智的人因做自己喜欢做的事情而得到报酬。”*'
- en: '**2) Research From All Angles**'
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**2) 从所有角度进行研究**'
- en: One big problem with creators is that they get sucked into an ideology that
    prevents them from being unique. They get a whiff of “truth” and make it their
    entire brand (and identity). They aren’t able to artfully navigate a persuasive
    argument because they believe their way is the only way.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者们的一个大问题是，他们陷入了一种意识形态，这阻止了他们保持独特性。他们闻到了“真理”的气息，并将其作为他们整个品牌（和身份）的一部分。他们无法巧妙地导航有说服力的论点，因为他们相信他们的方式是唯一的方式。
- en: The health and fitness industry is what comes to mind here.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 健康和健身行业就是这里想到的。
- en: While most people are subscribed to a specific diet and training model (like
    carnivore and powerlifting) you have to understand that reality is composed of
    infinite angles. Infinite perspectives.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 当大多数人订阅了特定的饮食和训练模式（如食肉动物和力量举）时，你必须理解现实是由无限的角度组成的。无限的观点。
- en: Perspectives are goal based. An individual’s goals are what determine whether
    or not specific advice is *valuable* to them. If you truly want to help people,
    you have to help them navigate your crevice of reality in accordance with their
    goals.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 观点是以目标为基础的。个人的目标决定了特定的建议对他们是否有价值。如果你真正想帮助人们，你必须帮助他们根据他们的目标在你的现实世界中导航。
- en: Or, if you are using *your* goals as your brand, you speak on topics from that
    perspective. You research your interests to aid in your journey toward your goals
    – this is how you attract niche, like-minded followers.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，如果你正使用*你的*目标作为你的品牌，你将从这个角度讨论话题。你研究你的兴趣以帮助你朝着目标前进——这就是你吸引特定、志同道合的追随者的方式。
- en: Meaning, you need to expose yourself with an open mind to all perspectives on
    the matter to begin forming your unique message.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 意味着你需要以开放的心态接触所有关于这个问题的观点，以开始形成你独特的信息。
- en: Follow people that you disagree with
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 跟随那些你不同意的人
- en: Buy a best selling book on the fundamentals
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 购买一本关于基础知识的畅销书
- en: Buy books that offer opposite insights (different diets, different religions,
    different mindset techniques)
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 购买提供相反见解的书（不同的饮食、不同的宗教、不同的心态技巧）
- en: Listen to more long form content than short form (because short content is crafted
    to get an emotional reaction out of you more than it is meant to educate you).
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 多听一些长篇内容而不是短篇内容（因为短内容是为了让你产生情感反应而精心制作的，而不是为了教育你）。
- en: Make it impossible for yourself to not see the full picture. In short, immerse
    yourself in your obsession.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 让自己不可能看不到全貌。简而言之，沉浸在你着迷的事物中。
- en: Learn about it everyday. Unfollow anyone that doesn’t talk about it. Make a
    conscious effort to expose yourself to as much information as possible in that
    space that you choose. This will give you creative firepower.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 每天了解它。取消关注任何不谈论它的人。有意识地努力让自己尽可能多地接触到你选择的空间中的信息。这将为你提供创造力。
- en: 3) Note Down Ideas, Discoveries
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 记下想法，发现
- en: As you are researching your obsessions and becoming an expert in that domain,
    it should be impossible *not* to note down interesting information.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 当你研究你的着迷之处并成为该领域的专家时，应该不可能不记下有趣的信息。
- en: 'If you need help, here’s what to look for:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要帮助，以下是你需要寻找的内容：
- en: '**Ideas, anecdotes, or experiences that you can use in the content you post
    or products you create** (so you can hold attention and never run out of things
    to write)'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你可以用于你发布的内容或你创造的产品中的想法、轶事或经验**（这样你可以保持人们的注意力，永远不会写不出东西）'
- en: '**“Golden nuggets” of information that spark excitement in you** (so you can
    spark that excitement in other people)'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**“金块”般的信息，能激发你的兴奋**（这样你就可以激发他人的兴奋）'
- en: '**New ways of thinking about topics that you hadn’t thought about before**
    (so you can change how others view the topic)'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**以新的方式思考你以前从未想过的话题**（这样你可以改变他人对这一话题的看法）'
- en: Understand that this won’t mean anything to you unless you are actively researching
    your obsessions.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 理解，除非你积极研究你的痴迷，否则这对你来说没有任何意义。
- en: By following those 3 steps, you have successfully begun to deconstruct the “whole”
    of your interests into its “parts.”
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循这3个步骤，你已经成功地开始将你的兴趣的“整体”分解成“部分”。
- en: Here’s what you do next (important).
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你接下来要做的（很重要）。
- en: '**Simplifying Complex Topics Will Be The Greatest Skill Of The Next Century**'
  id: totrans-89
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**简化复杂主题将是下一个世纪最伟大的技能**'
- en: This is where most people in the self-help space stop. They horde valuable information
    and close themselves off from true learning.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是大多数自助领域的人停止的地方。他们囤积有价值的信息，并关闭自己，拒绝真正的学习。
- en: You have to *apply* what you learn.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须*应用*你所学的。
- en: You don’t learn how to write by reading about writing.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 你不是通过阅读关于写作的文章来学习如何写作的。
- en: You don’t learn how to balance on a bike by reading a course on riding a bike.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 你不是通过阅读关于骑自行车的课程来学习如何平衡骑自行车的。
- en: But, with value or knowledge creation, you don’t apply what you learn in a physical
    sense. You must **contemplate, think, and write to form a cohesive message** that
    is actually valuable.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，通过价值或知识创造，你不会在物理上应用你所学的。你必须**沉思、思考、写作，形成一个有价值的连贯信息**。
- en: 'The next step is absolutely crucial:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步绝对至关重要：
- en: Put your creations, writing, and content on the public market so you can get
    direct feedback on your work. You have to attract an audience. My favorite way
    of doing that is social media, of course.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的创作、写作和内容放在公共市场上，这样你就可以直接对你的工作进行反馈。你必须吸引一个受众。我最喜欢的方式当然是社交媒体。
- en: The teacher learns more than the student, and building an audience gives you
    leverage, traffic, and a community that will set you up for life.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 老师比学生学到的更多，建立受众为你提供了杠杆、流量和社区，这将为你的一生奠定基础。
- en: 'Now, we could talk about audience building all day long, but you may be wondering,
    “can everyone build an audience?” Let’s run through it real quick:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以整天讨论受众建设，但你可能会想，“每个人都能建立受众吗？”让我们快速了解一下：
- en: Every single person on social media follows 400-1000+ people. Yes, even creators.
  id: totrans-99
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 社交媒体上的每个人都在跟随400-1000+人。是的，甚至创作者也在。
- en: Don’t forget the network affect, all of those 400-1000 people also follow that
    many people, and so do those people. Your audience is not just however many people
    follow you.
  id: totrans-100
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不要忘记网络效应，所有那些400-1000人也在跟随那么多人，那些人也一样。你的受众不仅仅是跟随你的人有多少。
- en: All you need are 1000 true fans and a good offer stack to pull in 6+ figures.
  id: totrans-101
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你只需要1000个真正的粉丝和一个好的产品组合，就能吸引6位数以上的收入。
- en: I could handle this objection all day… in short, if you think the market is
    saturated, you’re incredibly wrong (you wouldn’t be thinking this if you’ve been
    doing it for 3-6 months).
  id: totrans-102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我可以整天处理这个反对意见……简而言之，如果你认为市场已经饱和，你完全错了（如果你已经做了3-6个月，你就不会这样想了）。
- en: Value creation allows you to apply anything you learn. The essence (or lesson)
    from your everyday experiences can be used as firepower for compelling writing,
    videos, or even a product – similar to how I didn’t like any planners I bought,
    so I created my own to sell through an audience I built by talking about my interests.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 价值创造使你能够应用你所学的任何东西。你日常经验中的本质（或教训）可以用作引人入胜的写作、视频甚至产品的动力 – 就像我不喜欢我买的任何计划，所以我创建了自己的来通过谈论我的兴趣建立受众来销售。
- en: However, you have to understand that others aren’t going to be interested in
    what you have to say. That makes most people want to quit.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，你必须理解，其他人不会对你想说的感兴趣。这使得大多数人想要放弃。
- en: You have to package up your findings in a way that others *perceive* as valuable
    and distribute them as a one-person media company.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须以其他人*认为*有价值的方式打包你的发现，并以一个个人媒体公司的形式分发它们。
- en: One-person diversified media companies are the new modern business.
  id: totrans-106
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 单人多元化媒体公司是新的现代企业。
- en: ''
  id: totrans-107
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Grow a social channel, build a large email list, and then offer multiple products
    at multiple price points:'
  id: totrans-108
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 发展一个社交渠道，建立一个大型的电子邮件列表，然后提供多个价格点的多种产品：
- en: ''
  id: totrans-109
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Subscriptions
  id: totrans-110
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 订阅
- en: – Sponsorships
  id: totrans-111
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 赞助
- en: – Coaching
  id: totrans-112
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 指导
- en: – Affiliates
  id: totrans-113
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 附属
- en: – Courses
  id: totrans-114
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 课程
- en: – Etc.
  id: totrans-115
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 等等。
- en: ''
  id: totrans-116
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Tiny business. Big revenue.
  id: totrans-117
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 小型业务。大收入。
- en: ''
  id: totrans-118
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Justin Welsh (@thejustinwelsh) [October 2, 2022](https://twitter.com/thejustinwelsh/status/1576564200062832646?ref_src=twsrc%5Etfw)
  id: totrans-119
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — Justin Welsh (@thejustinwelsh) [2022年10月2日](https://twitter.com/thejustinwelsh/status/1576564200062832646?ref_src=twsrc%5Etfw)
- en: The internet is code and media.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网是代码和媒体。
- en: Media is how you distribute your value, code is what allows the media to be
    there. With a one-person business, you can pay for no-code software and focus
    all of your efforts on distributing valuable media.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 媒体是你分发价值的方式，代码是让媒体存在的方式。作为一个个人企业，你可以支付无代码软件的费用，并将所有精力集中在分发有价值的媒体上。
- en: Let’s make this practical.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使这个方法实用。
- en: How do you package up the knowledge you gain in a valuable way?
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何以有价值的方式打包你获得的知识？
- en: 1) Choose A Media Platform
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 选择一个媒体平台
- en: I prefer Twitter.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 我更喜欢Twitter。
- en: You can post as much as you’d like (to test your ideas before you post them
    on other platforms).
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以发布你想要的任何内容（在你将它们发布到其他平台之前测试你的想法）。
- en: It’s writing based, meaning you don’t need to be a 10/10 model living in Thailand
    sipping coconuts on the beach.
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它是基于写作的，这意味着你不需要是一个住在泰国、在海滩上啜饮椰子的10/10模特。
- en: It is like a forum, you can find people much quicker.
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它就像一个论坛，你可以更快地找到人。
- en: The retweet button is a low-friction share feature, that’s how you gain followers
    (other platforms are harder to grow on as a beginner)
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 转发按钮是一个低摩擦的分享功能，这就是你获得关注者的方式（对于初学者来说，其他平台更难增长）。
- en: You can just screenshot your tweets to grow on other platforms (this is what
    everyone else is doing).
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以截取你的推文以在其他平台上增长（这是其他人都在做的事情）。
- en: The basics of growing on Twitter are simple.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 在Twitter上增长的基本原则很简单。
- en: Post 1-3 times a day (and start getting your “failures” out of the way)
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每天发布1-3次帖子（并开始处理你的“失败”）
- en: If you are under 1000 followers, focus on networking with other people in the
    replies and DMs to leverage *their* audience
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你拥有不到1000个关注者，专注于在回复和私信中与其他人建立联系，以利用*他们的*受众。
- en: Have a *clickable* profile picture so people know you are a creator
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 拥有一个*可点击*的头像，这样人们就知道你是一个创作者。
- en: Use your big goal in life OR the 3 interests you talk about as your bio (what
    are you leading people towards and how will they get their through your unique
    interests?)
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用你生活中的大目标或你谈论的3个兴趣作为你的个人简介（你将引导人们走向何方，他们将通过你独特的兴趣如何获得？）
- en: Write threads based on your story and personal experience (but make sure you
    have a network that will share it so it goes semi viral)
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据你的故事和个人经验编写线程（但确保你有一个会分享它的网络，这样它就可以半病毒式传播）。
- en: Start with beginner level educational content. Make it actionable. That’s what
    everyone does to grow at the start (on any platform) and 95% of the market are
    beginners. Don’t try to be super clever or wise until you build a name for yourself.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 从初学者的教育内容开始。让它具有可操作性。这是每个人在开始时（在任何平台上）增长的方式，市场中的95%都是初学者。在你为自己建立名声之前，不要试图表现得过于聪明或睿智。
- en: 2) Learn To Capture Attention
  id: totrans-138
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 学习如何吸引注意力
- en: Attention is the currency of the 21st century.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 注意力是21世纪的货币。
- en: But don’t worry, you don’t need to become a sleazy salesman to join in on the
    social media party.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 但别担心，你不需要成为一个油滑的销售员就可以加入社交媒体派对。
- en: Entrepreneurship is about finding your unique balance between art and marketing.
  id: totrans-141
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 创业是找到艺术与营销之间独特平衡的过程。
- en: ''
  id: totrans-142
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you swing too far to the "art" side, you end up a starving artist.
  id: totrans-143
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你过于偏向“艺术”一边，你最终会成为一个挨饿的艺术家。
- en: ''
  id: totrans-144
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you swing too far to the "marketing" side, you end up a sleazy salesman.
  id: totrans-145
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你过于偏向“营销”一边，你最终会成为一个油滑的销售员。
- en: ''
  id: totrans-146
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You can't neglect one or the other.
  id: totrans-147
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你不能忽视其中任何一个。
- en: ''
  id: totrans-148
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [October 14, 2022](https://twitter.com/thedankoe/status/1580908539073253380?ref_src=twsrc%5Etfw)
  id: totrans-149
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年10月14日](https://twitter.com/thedankoe/status/1580908539073253380?ref_src=twsrc%5Etfw)
- en: This is a matter of looks VS depth. Dopamine VS the “here and now” neurotransmitters
    like serotonin and oxytocin.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个外观与深度、多巴胺与“此时此刻”神经递质如血清素和催产素之间的较量。
- en: You must capture attention and *then* deliver the value you promised to give
    that attention. Nobody wants to be perceived as a scammer, clickbait conman, or
    shallow platitude slinger. We will fix that in step 4.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须先吸引注意力，然后才能交付你承诺给予注意力的价值。没有人想被认为是一个骗子、点击诱饵骗子或肤浅的陈词滥调传播者。我们将在第4步中解决这个问题。
- en: In [Digital Economics](https://digitaleconomics.school), we dive deep into the
    psychology of capturing attention, but here are a few principles so you can start
    now.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 在[数字经济学](https://digitaleconomics.school)中，我们深入探讨了吸引注意力的心理学，但这里有一些原则，这样你就可以现在就开始了。
- en: '**Problems** – every good story captures attention by starting with a problem
    that the reader is facing. It opens a curiosity loop and makes them want to find
    the solution. Problems are at the root of human behavior.'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题** - 每一个好故事都是通过从读者面临的问题开始来吸引注意力的。它开启了一个好奇心循环，使他们想要找到解决方案。问题是人类行为的基础。'
- en: '**Numbers** – specific numbers are a pattern interrupt when you are scrolling
    on social media. “I read 347 self-help books so you don’t have to” is an example.'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: '**数字** - 在你浏览社交媒体时，具体的数字是一种模式中断。“我读了347本自我提升书籍，所以你不必”是一个例子。'
- en: '**Statistics** – similar to numbers, statistics set the scene quite nicely.
    “97% of the population has seen a decline in focus, here’s how to fix yours” is
    an example that could use a bit of work, but you see the power in it.'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: '**统计学** - 类似于数字，统计学可以很好地设定场景。“97%的人口注意力有所下降，这是如何解决你的问题的例子”可能需要一些改进，但你看到了它的力量。'
- en: If you want to learn the art of capturing attention, start immersing yourself
    in headlines, Twitter thread hooks, and other social media posts in general. Fill
    your subconscious with creative firepower, then go on a walk and let ideas flood
    your conscious mind (have your [note capture system ready](https://digitaleconomics.school)
    🙂
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想学习吸引注意力的艺术，开始沉浸在大标题、Twitter线程钩子和其他社交媒体帖子中。让你的潜意识充满创造力，然后去散步，让想法涌入你的意识（准备好你的[笔记捕捉系统](https://digitaleconomics.school)
    :)）
- en: Start *researching* instead of consuming. Deconstruct why people’s posts are
    working rather than just scrolling by them mindlessly.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 开始*研究*而不是消费。分析人们帖子成功的原因，而不仅仅是漫无目的地滚动。
- en: This is the best hack I could give you.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我能给你的最佳技巧。
- en: Consciousness.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 意识。
- en: 3) Treat Yourself As Your Ideal Reader
  id: totrans-160
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 将自己视为理想读者
- en: When someone is building a readership or audience for the value they are creating,
    common advice is to write to your ideal customer.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 当有人正在为所创造的价值建立读者群或受众时，常见的建议是针对你的理想客户写作。
- en: With the one-person business, *you* are your niche. You are your customer avatar.
    You are your brand, content, and product.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 在一人公司中，*你*是你的细分市场。你是你的客户形象。你是你的品牌、内容和产品。
- en: I have people go through the [Myers-Briggs personality test](https://www.16personalities.com/)
    in Digital Economics so they can understand themselves more. When you understand
    yourself, you can write to yourself. The test results are your customer avatar.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 我让人们在数字经济学中完成[迈尔斯-布里格斯性格测试](https://www.16personalities.com/)，这样他们就能更好地了解自己。当你了解自己时，你可以给自己写信。测试结果就是你的客户形象。
- en: Now, what do you write?
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你该写什么？
- en: If you are going through a tough time, give yourself advice and write it online
    in your “public journal”
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你正经历困难时期，给自己提供建议，并将其写在你“公开日记”上。
- en: Give your past self advice on overcoming the problems you faced, but faster
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 给过去的自己提供克服你所面临问题的建议，但要更快。
- en: Give your future self-encouragement to achieve the goals you are trying to achieve.
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 给未来的自己以鼓励，以实现你试图实现的目标。
- en: These are just a few of the many ways you can create content, but they are a
    great (and accessible) starting point.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 这些只是你可以创造内容的许多方法中的一部分，但它们是很好的（且易于访问）起点。
- en: 4) Prioritize Depth And Clarity
  id: totrans-169
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 优先考虑深度和清晰度
- en: Every single Sunday, I outline my newsletter for the week.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 每个星期天，我都会概述一周的时事通讯。
- en: This newsletter is used as a YouTube script (I literally just read the post
    from my phone to the camera and edit out the pauses).
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 这份时事通讯被用作YouTube脚本（我实际上是从手机上读这篇帖子给摄像机听，然后编辑掉停顿）。
- en: After that, I can condense the main points into a Twitter thread, Instagram
    carousel or caption, LinkedIn post, and more.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，我可以将主要观点浓缩成Twitter线程、Instagram轮播图或标题、LinkedIn帖子等等。
- en: I can also skim through the newsletter to generate Tweet ideas, which then get
    crossposted to every platform (if you follow me, you see this every day… but are
    you conscious of it?). I also read my best tweets to the camera for reels, shorts,
    and TikToks.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 我也可以浏览时事通讯来生成推文想法，然后跨平台转发（如果你关注我，你每天都会看到这个…但你是否有意识呢？）。我还把我的最佳推文读给摄像机听，用于reels、短片和TikToks。
- en: Why start with the newsletter?
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么从时事通讯开始？
- en: Because of depth.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 因为深度。
- en: Depth is how you build authority.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 深度是你建立权威的方式。
- en: If you are a value creator, I can tell you right now that only writing short
    form content will lead to pain and a lack of authority. Sure, it works for ecommerce
    brands that are going for quick cash… **but if you want to do something that you
    don’t think is monetizable (like spirituality)?** Depth is not an option. It is
    a priority and the only way you can monetize effectively.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一个价值创造者，我现在就可以告诉你，只写短形式的内容只会导致痛苦和缺乏权威。当然，对于追求快速现金的电商品牌来说，这是有效的… **但如果你想做你认为无法货币化的东西（比如灵性）？**
    深度不是一种选择。它是一个优先事项，也是你有效货币化的唯一途径。
- en: By outlining my newsletter at the start of every week, I give myself one big
    idea that I can munch on when I’m on a walk, at the gym, or other forms of “rest”
    that activate the Default Mode Network in my brain (the key to creativity).
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 每周一开始就概述我的通讯简报，我给自己一个可以咀嚼的大想法，当我散步、在健身房或其他形式的“休息”时，这个想法可以激活我大脑中的默认模式网络（创造力的关键）。
- en: Whenever an idea pops into my head, I open up my outline on my phone and write
    it down. This makes it seamless to never have writer’s block.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 每当一个想法闪现在我的脑海中，我都会打开手机上的大纲并将其写下来。这使得我永远不会遇到写作障碍。
- en: How do you write a newsletter?
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 你怎么写通讯简报？
- en: Choose a high-performing topic based on your tweets or other content that you
    know will do well (like your favorite YouTuber’s most popular video).
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据你的推文或其他你知道会做得好的内容（比如你最喜欢的YouTube视频博主最受欢迎的视频）选择一个表现优异的主题。
- en: Start with a personal experience or story that illustrates the problem you faced
    relating to that topic.
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从一个个人经历或故事开始，说明你面临与该主题相关的问题。
- en: Give actionable steps to overcoming that problem.
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供克服那个问题的具体步骤。
- en: That’s all you need to start with, you can get fancy or go longer if you want.
    I write long newsletters because I love it. The mental benefits spill over far
    beyond business.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你开始所需的一切，如果你想变得复杂或做得更久，也可以。我写长通讯简报是因为我喜欢它。心理上的益处远远超出了商业领域。
- en: With all of that said, Digital Economics starts in a little over a week.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 说到这里，数字经济学课程将在一周多一点的时间内开始。
- en: I have an entire Notion dashboard with systems for everything we’ve just discussed
    (and more) so you can manage your entire one-person business in 2-4 hours a day.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 我有一个完整的Notion仪表板，其中包含我们刚刚讨论的（以及更多）所有系统的内容，这样你就可以每天用2-4小时管理你的整个个人业务。
- en: 'Here is 30% of what’s inside the Notion dashboard (each of these contains systems
    to make business easy on you):'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是Notion仪表板内部30%的内容（这些内容都包含使商业变得容易的系统）：
- en: <picture decoding="async" class="wp-image-834">![](../Images/69706f16baede822bc2da2909269d5d1.png)</picture>
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-834">![](../Images/69706f16baede822bc2da2909269d5d1.png)</picture>
- en: In 60 days, we master one-person branding, content creation, creating your offer
    (regardless of experience), and craft a marketing strategy so you can start monetizing
    immediately.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 在60天内，我们掌握个人品牌建设、内容创作、创建你的产品（无论经验如何），并制定营销策略，这样你就可以立即开始盈利。
- en: I’ve iterated on this curriculum for 3 years. The information gets results,
    is time tested, and breaks you out of the creator rat race.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经对这个课程进行了3年的迭代。这些信息能带来结果，经过时间的考验，并能帮助你跳出创作者的竞争。
- en: If you’re interested, [read more here and consider enrolling.](https://digitaleconomics.school)
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对这个感兴趣，[在这里了解更多并考虑报名](https://digitaleconomics.school)。
- en: We start on the 26th!
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从26日开始！
- en: Lastly, thank you for reading this weeks letter. I hope you got a lot out of
    it.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，感谢你阅读这周的来信。我希望你从中获得了很多收获。
- en: – Dan Koe
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹·科
