- en: How Average People Will Get Rich With AI
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 《普通人如何通过AI致富》
- en: 原文：[https://thedankoe.com/letters/how-average-people-will-get-rich-with-ai/](https://thedankoe.com/letters/how-average-people-will-get-rich-with-ai/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://thedankoe.com/letters/how-average-people-will-get-rich-with-ai/](https://thedankoe.com/letters/how-average-people-will-get-rich-with-ai/)'
- en: You want to get rich.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 你想要致富。
- en: Everyone does.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都是这样做的。
- en: And you want to do it fast.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 你还想快速做到这一点。
- en: But you also want to enjoy what you do. You want meaning. You want to control
    how long you work so you can prioritize other areas of your life.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 但你也不想只做你不喜欢的事情。你想要意义。你想要控制你工作的时间，这样你就可以优先考虑你生活的其他方面。
- en: I have good news and bad news.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我有好消息和坏消息。
- en: The good news is, this is possible.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息是，这是可能的。
- en: Nobody wants to admit that they’ve found and exploited a shortcut, but that’s
    what our modern world is filled with right now.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人愿意承认他们找到了并利用了捷径，但这就是我们现代世界现在充满的东西。
- en: Digital products are a shortcut.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 数字产品是一个捷径。
- en: Social media is a shortcut.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体是一个捷径。
- en: AI is a shortcut.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: AI是一个捷径。
- en: Technology as a whole is a shortcut.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 整个技术都是一个捷径。
- en: If you don’t like the word “shortcut,” exchange it with “leverage.”
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不喜欢“捷径”这个词，可以用“杠杆”来替换它。
- en: You don’t have to send physical letters through the mail anymore when you can
    post an Instagram reel of you expressing your thoughts in your car that reaches
    500,000 people. (And 500,000 is insane. You don’t even need 10,000\. You can also
    DM anyone, crazy.)
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当你可以通过发布一段你坐在车里表达你想法的Instagram视频来触及500,000人时，你不再需要通过邮寄实物信件。（500,000人太疯狂了。你甚至不需要10,000人。你也可以直接私信任何人，太疯狂了。）
- en: You don’t need to find a book at the library to find a hyper-specific piece
    of information when you can get unstuck from a simple conversation with AI.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 当你可以通过一次简单的与AI的对话来解决问题时，你不需要在图书馆找到一本书来找到超具体的信息。
- en: You don’t need to waste $10,000+ testing whether or not a physical product will
    work when you can launch a digital product on the same topic in 2 weeks, see if
    it works, generate cash flow, and then pour that money and validated idea into
    another business model.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 当你可以用两周的时间在同一主题上推出一个数字产品，看看它是否可行，产生现金流，然后将这些钱和经过验证的想法投入到另一个商业模式中时，你不需要浪费10,000美元以上来测试一个实物产品是否可行。
- en: 'Here’s the bad news:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这是个坏消息：
- en: You still need to learn how to take the shortcut.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 你仍然需要学习如何走捷径。
- en: And shortcuts are not synonymous with guaranteed success.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 但捷径并不等同于保证成功。
- en: Humans get distracted from the shorter path all the time because they can’t
    sit down and focus.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 人类总是因为无法坐下来集中精力而偏离了更短的路径。
- en: Even with the all-powerful AI we have access to, many people will fail for the
    simple reason that they will try for 2 weeks and quit because they weren’t serious
    in the first place.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 即使有了我们能够访问的全能AI，许多人也会因为简单的原因而失败，那就是他们尝试了两周就放弃了，因为他们一开始就不认真。
- en: For those who understand that success doesn’t exist without failure, let’s begin.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些明白成功并不存在没有失败的人来说，让我们开始吧。
- en: How To Get Rich In General
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何一般性地致富
- en: First, we need to understand how to get rich in general.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要了解如何一般性地致富。
- en: 'Assuming you are not rich, or you’re just reading this for fun, there are 4
    ways:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你并不富有，或者你只是为了乐趣而阅读这篇文章，这里有4种方法：
- en: Save a percentage of your income every month (slow)
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个月从你的收入中存下一部分（慢）
- en: Invest a percentage of your income every month into stocks or real estate (less
    slow)
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个月将你收入的百分比投资于股票或房地产（比储蓄慢）
- en: Build a cash flow business that you control the income of, then save or invest
    (even less slow)
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立一个你可以控制收入的现金流业务，然后储蓄或投资（甚至更慢）
- en: Invest an abundance of cash into businesses, stocks, or real estate (reserved
    for those with an abundance of cash)
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将大量现金投资于企业、股票或房地产（仅限于那些拥有大量现金的人）
- en: Basic stuff. Mom told us this. But most of us don’t have free cash lying around.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 基本的东西。妈妈告诉过我们。但大多数人都没闲钱。
- en: However, most of us have time.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们大多数人都有时间。
- en: And thankfully, the 3rd option is something that anyone can do.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，第三个选择是任何人都可以做的。
- en: That’s the option you can take to *start* your path to getting rich.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你可以选择来*开始*你致富之路的选项。
- en: If you’re interested in the other ones, I can’t help you there.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你感兴趣的其他方面，我帮不上忙。
- en: With that said, you’re going to have to build a business.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，你将不得不建立一个企业。
- en: AI is just a way to do more, faster, as one person (or a small team).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: AI只是一个人（或一个小团队）更快地做更多事情的一种方式。
- en: I’m sorry to tell you that this isn’t another get-rich-quick scheme. It’s a
    shortcut to doing something that *already works* and has been proven to work.
    Almost every “get rich with AI” video will give you a fancy new tool to use, but
    that’s a surefire way to ensure it never works.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 很抱歉告诉你，这不是另一个快速致富的计划。这是一个做已经有效且已被证明有效的事情的捷径。几乎所有“用AI致富”的视频都会给你一个新工具来使用，但这确实是一个确保它永远不会成功的可靠方法。
- en: The shortcut we’ve been talking about this entire time is starting an AI-first
    business.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们一直在谈论的捷径是开始一个以AI为先的企业。
- en: 'Due to that, there are a few things you need to know:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这个原因，有一些事情你需要知道：
- en: 1) Every business is a media business now.
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 每个企业现在都是一个媒体企业。
- en: That means every business, from e-commerce to digital products to local businesses,
    is posting internet content to advertise their business.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着从电子商务到数字产品再到本地企业，每个企业都在发布互联网内容来宣传他们的业务。
- en: That means you will have to do that as well.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着你也必须这样做。
- en: That’s how you attract potential customers to pay you money.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何吸引潜在客户付钱给你。
- en: Paid ads, SEO, and other things like sponsoring podcasts are viable marketing
    machines, but in my opinion, organic content is how you build a long term *brand*
    that people trust. Especially in today’s social media first world.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 支付广告、SEO和其他像赞助播客这样的东西是可行的营销机器，但在我看来，有机内容是你建立长期*品牌*并赢得人们信任的方式。尤其是在今天这个社交媒体优先的世界。
- en: This will only become more important as the internet is filled with AI generated
    slop.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 随着互联网充满了AI生成的垃圾，这只会变得更加重要。
- en: 2) The greatest differentiator is *you.*
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 最大的差异化因素是你自己。
- en: Personal branding isn’t just another fad.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 个人品牌不仅仅是另一个潮流。
- en: Yes, the concept of a “personal brand” is cringe.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，“个人品牌”的概念可能会让人感到尴尬。
- en: But the essence of it is beautiful, which is *getting paid to be yourself.*
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 但其本质是美丽的，那就是*得到报酬来做自己**。
- en: We aren’t trying to build a personal brand, we’re using modern technology to
    work less, earn more, and focus on the topics we deeply care about. We’re using
    the internet as a vessel to build our life’s work.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不是试图建立个人品牌，我们正在使用现代技术来减少工作量，增加收入，并专注于我们深感兴趣的话题。我们正在利用互联网作为构建我们一生工作的载体。
- en: No, you don’t need to show your face.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 不，你不需要露脸。
- en: No, you don’t need to use your name.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 不，你不需要使用你的名字。
- en: But what you do need is a story, a personality (even if it’s boring like mine!),
    and a mission to help other people.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 但你需要的是一个故事，一个个性（即使它像我一样无聊！），以及一个帮助他人的使命。
- en: Because people buy from people they trust.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 因为人们会从他们信任的人那里购买。
- en: And when AI starts to flood the internet with untrustworthy content by people
    who are trying to make a quick buck without realizing that always backfires, trust
    becomes scarce.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 当AI开始通过那些试图快速赚钱而未意识到这总是适得其反的人，在互联网上充斥着不可信的内容时，信任变得稀缺。
- en: You, as a person – your problems, experiences, opinions, and interests – are
    what set you apart in today’s world.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 你，作为一个个人——你的问题、经验、观点和兴趣——是你在当今世界中的独特之处。
- en: For all I’m concerned, a normal “brand” or business can be a personal brand
    if it checks those boxes. That is, if it’s an extension of yourself.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 就我而言，一个正常的“品牌”或企业，如果符合那些条件，也可以是一个个人品牌。也就是说，如果它是你自己的延伸。
- en: You don’t have to start a personal brand to get rich, **but you need a business
    with personality.**
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要开始一个个人品牌来致富，**但你需要一个有个性业务**。
- en: That’s what we will learn.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们将会学习的。
- en: 3) Most beginners should start with a digital product.
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 大多数初学者应该从数字产品开始。
- en: We don’t live in a world where you pour your life savings into a business and
    pray that people want what you sell.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们生活在一个世界，你不会把你的全部积蓄投入到一家企业中，然后祈祷人们想要你卖的东西。
- en: 'Instead, you do this:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，你应该这样做：
- en: You test ideas with social content
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你通过社交内容来测试想法
- en: You turn the best ones into a digital product fast
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你快速将最好的产品变成数字产品
- en: You improve the product with feedback
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以通过反馈来改进产品
- en: You expand that product into different offers
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你将这个产品扩展到不同的产品中
- en: A digital product can be anything from an ebook to a course to a small-scale
    software that solves a singular problem. Many people are using tools like Cursor
    to code up niche apps (not full-blown enterprise software). I haven’t done this,
    although I want to soon with a gamified app for going on walks, so we aren’t going
    to focus on that option in this letter.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 数字产品可以是任何东西，从电子书到课程，再到解决特定问题的小型软件。许多人正在使用Cursor等工具来编写利基应用（而不是完整的企业软件）。我还没有这样做，尽管我很快就会用一款游戏化的散步应用来实现这一点，所以我们不会在这封信中关注这个选项。
- en: My 2-Hour Writer course gave me the money and validated idea necessary to build
    Kortex, a more cost-intensive software business with a team of developers.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我的2小时作家课程给了我建立Kortex所需的资金和验证想法，Kortex是一个成本更高的软件开发业务，拥有一个开发团队。
- en: If I wanted to, I could take it even further and sell an internet writer-centric
    keyboard, a physical pen, or another accessory.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想，我可以更进一步，卖一个以网络作家为中心的键盘、一支实物笔或其他配件。
- en: If I had a health digital product, I could create a supplement like I see many
    doing on X and IG right now, but based on my own personal philosophy, giving it
    a unique twist.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我有一个健康数字产品，我可以创建一个像现在在X和IG上许多人所做的那样独特的补充品，但基于我自己的个人哲学。
- en: And, the cool thing here is that you already have people who have benefited
    from your product. Meaning many of them will likely invest in whatever else you
    build.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 而且这里很酷的一点是，你已经有一些人从你的产品中受益了。这意味着他们中的许多人可能会投资你构建的任何其他东西。
- en: Of course, you don’t have to take it further than the digital product.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，你不必把事情做得比数字产品更复杂。
- en: They have incredible profit margins and allow you to help people at scale while
    basking in the free time that technology allows you.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 它们有令人难以置信的利润率，并允许你在享受技术带来的空闲时间的同时，以规模帮助人们。
- en: '**Note**: a personal brand is not a business model, it’s a trust mechanism
    *for* a business. The *model* we are building as a beginner is around a digital
    product, although you can monetize almost anything.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：个人品牌不是一个商业模式，它是一个为业务提供的信任机制。我们作为初学者正在构建的模型是围绕数字产品，尽管你几乎可以货币化任何东西。'
- en: 4) That leaves us with 4 focus areas
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 这就留下了4个重点领域
- en: There are 4 skills you need to start a modern business.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要掌握4项技能才能开启一家现代企业。
- en: '**Content** – because this is a media business, and media is how you attract
    potential customers (no customers, no business).'
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**内容** - 因为这是一个媒体业务，而媒体是吸引潜在客户的方式（没有客户，就没有业务）。'
- en: '**Brand** – because why would they trust *you?* Why do random people on the
    internet resonate with what you help them with?'
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**品牌** - 因为他们为什么要信任你？为什么互联网上的随机人会对你帮助他们的事情产生共鸣？'
- en: '**Product** – well, that’s obvious, because without one you don’t get paid,
    or you get a fraction of the payment (sponsorships, platform revenue, affiliates)'
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**产品** - 嗯，这是显而易见的，因为没有产品你就得不到报酬，或者你只能得到一小部分报酬（赞助、平台收入、联盟）'
- en: '**Promotions** – if you don’t promote your product under your brand and content,
    it will never get seen.'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**推广** - 如果你不在你的品牌和内容下推广你的产品，它永远不会被人看到。'
- en: Thankfully, all of those can be learned fast, done with high enough quality,
    and partially automated with the help of AI.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，所有这些都可以快速学习，以足够高的质量完成，并在AI的帮助下部分自动化。
- en: I am not talking about a full-fledged company with HR and other operations.
    I’m talking about what can be done as an average person augmented with AI.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是在谈论一个拥有HR和其他运营的完整公司。我是在谈论作为一个普通人，通过AI可以做到的事情。
- en: That’s what we’re here to learn.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们在这里学习的内容。
- en: '**Note**: The build a profitable personal brand in 30 days challenge starts
    on June 16\. [Join here](https://stan.store/thedankoe/p/build-a-profitable-personal-brand-in-30-days)
    if you want daily lessons, action steps, and AI prompts that take 30-60 minutes
    each day. By the end you’ll have a stack of modern high-value skills and the foundations
    of a profitable brand.'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：30天内建立盈利性个人品牌的挑战赛将于6月16日开始。[加入这里](https://stan.store/thedankoe/p/build-a-profitable-personal-brand-in-30-days)，如果你想要每天的课程、行动步骤和每天30-60分钟的AI提示。到那时，你将拥有一堆现代高价值技能和盈利性品牌的基石。'
- en: Build An AI-First One-Person Media Company
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 建立一个以AI为先的一人媒体公司
- en: I don’t want to just give you prompts to use to have AI do this for you.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我不想只给你提示，让你用AI为你做这件事。
- en: 'Instead, I want to give you something more powerful:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我想给你一些更强大的东西：
- en: A way to *figure anything out* with AI.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 一种用AI *解决任何问题* 的方法。
- en: So, rather than telling you exactly what to do, I’m going to show you how I
    would figure out how to create a brand, content, product, and promotions from
    scratch.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，而不是告诉你具体该做什么，我要向你展示我是如何从头开始创建品牌、内容、产品和推广的。
- en: If you stick with this, you will come away with more than you could ever find
    by going about it on your own.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你坚持下去，你将得到的比你独自去做能找到的更多。
- en: Brand – Creating A Personal Brand Coach
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 品牌 - 创建个人品牌教练
- en: Let’s imagine that you know absolutely nothing.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们假设你一无所知。
- en: You don’t know what a personal brand is and you don’t know what makes it effective.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 你不知道什么是个人品牌，也不知道是什么让它有效。
- en: All you know is what you’ve read so far in the letter. You have the awareness
    of an opportunity and you want to take advantage of it as fast as possible.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 你所知道的就是你在信中读到的内容。你意识到一个机会，并且你想要尽可能快地利用它。
- en: But here’s the thing.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 但这里有个问题。
- en: For something like building a personal brand, there are 1000 different ways
    to go about it. Everyone has their own way of building one. They all work, but
    sometimes they aren’t aligned with your goals.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 对于像打造个人品牌这样的任务，有1000种不同的方法去做。每个人都有自己的方式去打造一个，它们都有效，但有时它们并不符合你的目标。
- en: If you were to just ask AI to build one for you, you probably wouldn’t get very
    far. Intelligence needs context.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只是让AI为你构建一个，你可能不会走得很远。智能需要上下文。
- en: 'Here’s what I would do:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我会这样做：
- en: Find an expert you trust who teaches personal branding
  id: totrans-99
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 找到一个你信任的个人品牌专家
- en: Feed their advice into AI and condense it into a detailed action plan
  id: totrans-100
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将他们的建议输入AI，并浓缩成一个详细行动计划
- en: Turn that into a prompt that coaches you and keeps you focused
  id: totrans-101
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将其转化为一个指导你并保持你专注的提示词
- en: For step 1, you want to find information that’s not only trustworthy, but detailed
    enough to get results.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 对于第一步，你想要找到既值得信赖又足够详细以获得结果的信息。
- en: You can find this information in a book as a PDF, a YouTube video, free guide,
    course or an article.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在书中找到这些信息，作为PDF、YouTube视频、免费指南、课程或文章。
- en: In my opinion, the best way to find this type of information is on YouTube.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，找到这类信息的最佳方式是在YouTube上。
- en: 'After a bit of searching YouTube for:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 在YouTube上搜索了一段时间后：
- en: “How to build a profitable personal brand”
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “如何打造一个盈利的个人品牌”
- en: “Personal brand Alex Hormozi”
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “亚历克斯·霍莫齐的个人品牌”
- en: “Full guide to building a personal brand”
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “打造个人品牌的全面指南”
- en: I found a few videos that seemed promising. But there’s a [6 hour video from
    Caleb Ralston](https://youtu.be/Ch4Sl0POBhU) (the guy behind Gary V and Alex Hormozi),
    so we’re going to use that.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我找到了一些看起来很有希望的视频。但有一个[凯勒布·拉尔森的6小时视频](https://youtu.be/Ch4Sl0POBhU)（加里·维和亚历克斯·霍莫齐背后的那个人），所以我们将使用那个。
- en: 'Here’s what I would prompt AI:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我想对AI提出的提示：
- en: I want to build a personal brand. Break this video down into a comprehensive
    action plan. Write the action plan as if you are teaching me how to build a personal
    brand from scratch.
  id: totrans-111
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我想要打造一个个人品牌。把这个视频分解成一个全面的行动计划。就像在教我如何从头开始打造个人品牌一样，写下这个行动计划。
- en: ''
  id: totrans-112
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[link to the video]'
  id: totrans-113
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[视频链接](https://app.kortex.co/public/document/41aa3a5d-6e91-4fcf-ac27-388c3fbb95d2)'
- en: I personally did this inside [Kortex](https://kortex.co) since it can pull from
    YouTube transcripts, and you can choose between different AI models for different
    tasks.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 我个人在[Kortex](https://kortex.co)内部做了这件事，因为它可以从YouTube转录中提取信息，并且你可以根据不同的任务选择不同的AI模型。
- en: I used Gemini 2.5 Pro because it is a reasoning model, and it can handle a lot
    of context (a 6 hour video is a lot).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用Gemini 2.5 Pro，因为它是一个推理模型，它可以处理大量的上下文（6小时的视频就是很多）。
- en: The output was an [extremely comprehensive guide](https://app.kortex.co/public/document/41aa3a5d-6e91-4fcf-ac27-388c3fbb95d2)
    which is exactly what we were looking for.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是一个[极其全面的指南](https://app.kortex.co/public/document/41aa3a5d-6e91-4fcf-ac27-388c3fbb95d2)，这正是我们一直在寻找的。
- en: Now, how do we turn this into something we can use to create *our own* personal
    brand?
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们如何将这个指南转化为可以用来创建**我们自己的**个人品牌的东西？
- en: First, you need to think of AI not only as a tool to help you learn how to do
    something, but also as a tool that can do work for you based on the information
    you feed it.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你需要把AI不仅仅看作是一个帮助你学习如何做某事的工具，而且也是一个可以根据你提供的信息为你做工作的工具。
- en: So, we’re going to turn this personal brand guide into a 2-phase prompt.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们将把这个个人品牌指南转化为两个阶段的提示词。
- en: I’ve talked about this many times, but I highly recommend using a prompt that
    helps you create good prompts according to best practices.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经谈论过很多次了，但我强烈推荐使用一个提示词，它能帮助你根据最佳实践创建好的提示词。
- en: Inside of Kortex, you can go to **Chat** and click **Write Incredible AI Prompts**.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 在Kortex内部，你可以进入**聊天**并点击**撰写令人难以置信的AI提示词**。
- en: Then, whatever you type and send will be turned into a prompt.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，无论你输入和发送什么，都会被转换成一个提示词。
- en: Or, you can [copy the prompt here](https://app.kortex.co/public/document/83651c0d-dfd3-4e6c-9821-c9c41b2a3ddc)
    and paste it into whatever tool you are using and hit send.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，你可以[在这里复制提示词](https://app.kortex.co/public/document/83651c0d-dfd3-4e6c-9821-c9c41b2a3ddc)，并将其粘贴到你使用的任何工具中，然后发送。
- en: 'Now, type this:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，输入以下内容：
- en: I want to create an AI prompt that acts as my personal brand coach.
  id: totrans-125
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我想创建一个AI提示词，作为我的个人品牌导师。
- en: ''
  id: totrans-126
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Structure your prompt in 2 phases.
  id: totrans-127
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 将你的提示词分为两个阶段。
- en: ''
  id: totrans-128
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Phase 1 – context gathering: interview the user one question at a time to acquire
    all details necessary to build a personal brand. At the end of phase 1, provide
    a detailed step-by-step action plan'
  id: totrans-129
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 第一阶段 – 背景收集：逐个问题采访用户，以获取构建个人品牌所需的所有详细信息。在第一阶段结束时，提供一个详细的分步行动计划
- en: ''
  id: totrans-130
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Phase 2 – personal brand coach: start with the first set of actionable steps
    the user should take for their personal brand and encourage the user to check
    in frequently with everything they have done. For every check in, give them tips
    on how to make their work more impactful and follow up with the next set of actionable
    steps.'
  id: totrans-131
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 第二阶段 – 个人品牌导师：从用户为个人品牌应采取的第一个可执行步骤开始，并鼓励用户经常检查他们所做的一切。对于每一次检查，给他们提供如何使他们的工作更有影响力的建议，并跟进下一组可执行步骤。
- en: ''
  id: totrans-132
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Base each phase of the prompt on this information on personal branding:'
  id: totrans-133
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 将每个阶段的提示基于个人品牌信息：
- en: ''
  id: totrans-134
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Paste the response from the last prompt here]'
  id: totrans-135
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[在此粘贴上一个提示的响应]'
- en: The output from that is pretty insane when using a reasoning model like Gemini
    2.5 Pro. [Here it is](https://app.kortex.co/public/document/186f6630-7328-4cad-9590-ccfa4b3a76fd).
    Extremely comprehensive. (I did have to clean it up a bit, make sure you read
    through the output when you do this.)
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用像 Gemini 2.5 Pro 这样的推理模型时，这个输出相当惊人。[这里就是](https://app.kortex.co/public/document/186f6630-7328-4cad-9590-ccfa4b3a76fd)。极其全面。（我确实稍微整理了一下，确保你在做这件事时阅读输出。）
- en: Now, send that prompt to a new chat and spend a good chunk of time answering
    the questions for phase 1.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，将这个提示发送到新的聊天，并花大量时间回答第一阶段的问题。
- en: Congrats, you now have a personalized strategy and expert personal brand coach
    without paying $10,000, which took 30 minutes instead of the 6 hours it would
    take to watch the video and another 20 hours to map everything out on your own.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜，你现在拥有了一个个性化的策略和专家个人品牌导师，无需支付 10,000 美元，只需 30 分钟，而不是观看视频所需的 6 小时，以及自己整理所需的其他
    20 小时。
- en: Check in with your “coach” at least once a week, and it will slowly guide you
    to more nuanced actions and monetization.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 至少每周与你的“导师”检查一次，这将逐渐引导你进行更细致的行动和货币化。
- en: Content – Copying What Works, With Your Own Strategy
  id: totrans-140
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 内容 – 模仿成功的策略，结合你自己的策略
- en: 'Since you now have a personal action plan from the last section, you know:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 既然你在上一节已经制定了一个个人行动计划，你知道：
- en: What platform you are starting on
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你将要开始使用的平台
- en: What type of content you are going to create
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你将要创建哪种类型的内容
- en: How often to post per day or week
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每天或每周发布多少次
- en: Now, we need to learn how to write content.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们需要学习如何撰写内容。
- en: There are a few different steps we can take here.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以采取几个不同的步骤。
- en: 'I think you’ll be blown away by the output:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 我想你会对输出感到震惊：
- en: '**1) Generate a list of content ideas from your action plan.**'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 从你的行动计划中生成内容想法列表。**'
- en: We need relevant content ideas to work with.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要相关的创意内容来工作。
- en: Preferably ones that are proven to work.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 最好是那些经过验证有效的平台。
- en: 'Try this prompt in a new chat:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在新的聊天中尝试这个提示：
- en: 'Generate 30 validated content ideas based on my personal brand strategy: [link
    personal brand strategy document from last step]'
  id: totrans-152
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 根据我的个人品牌策略生成 30 个经过验证的内容想法：[从上一步链接个人品牌策略文档]
- en: ''
  id: totrans-153
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The ideas should be a balance between high-performing and authoritative, pulling
    from my audiences pain points, popular topics in my niche, and unique perspectives
    that separate me from other brands.
  id: totrans-154
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这些想法应该在高性能和权威性之间取得平衡，从我的受众痛点、我领域的热门话题以及使我与其他品牌区分开来的独特视角中汲取灵感。
- en: I’ll leave it up to you to judge the quality of these ideas.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 我将把这个判断留给你们，这些想法的质量如何。
- en: '**2) Break down high-performing post structures.**'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 分解高性能帖子的结构。**'
- en: This will depend on the platform you are growing on and content medium.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 这将取决于你正在增长的平台和内容媒介。
- en: 'If I were growing on YouTube, I would:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我要在 YouTube 上增长，我会：
- en: Go to a popular account in my niche
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前往我领域的一个热门账户
- en: Filter their videos by most popular
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过最受欢迎的视频进行筛选
- en: Find a video with the style you want to emulate
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 找到一个你想模仿风格的视频
- en: 'Then, ask AI to break it down in a new chat:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，在新的聊天中让 AI 进行分解：
- en: 'Give me a comprehensive breakdown of why this video works:'
  id: totrans-163
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 给我一个关于这个视频为何奏效的全面分析：
- en: ''
  id: totrans-164
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The overall structure of the video as a framework
  id: totrans-165
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视频的整体结构作为框架
- en: The psychological patterns used to hold attention
  id: totrans-166
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于保持注意力的心理模式
- en: The structure of each section’s ideas and why they’re impactful
  id: totrans-167
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个部分想法的结构以及为什么它们有影响力
- en: ''
  id: totrans-168
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Structure your output as if you are teaching me how to recreate this video step
    by step.
  id: totrans-169
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 按照如果你在教我如何一步一步地重现这个视频的方式来结构化你的输出。
- en: You can accomplish the same thing by pasting multiple Tweets, LinkedIn posts,
    newsletters, or reels scripts into AI.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过粘贴多个推文、LinkedIn帖子、时事通讯或Reels脚本到AI中完成同样的事情。
- en: Once you have a detailed breakdown of *why that content structure performs well*
    you can turn that into a prompt using the previous process.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你对为什么那种内容结构表现良好有一个详细的分解，你就可以使用之前的过程将其转化为一个提示。
- en: First, go to the [Write Incredible AI Prompts](https://kortex.co) workflow,
    or paste the prompt creator prompt into a new chat.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，前往[撰写令人难以置信的AI提示](https://kortex.co)工作流程，或者将提示创建器的提示粘贴到一个新的聊天中。
- en: Feed it the video breakdown output from before and tell it that you want to
    create a prompt that generates a YouTube video outline (phase 1) and YouTube video
    script (phase 2) following that high-performing structure.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 给它之前视频分解的输出，并告诉它你想要创建一个生成YouTube视频大纲（第一阶段）和YouTube视频脚本（第二阶段）的提示。
- en: '**3) Use that prompt to create content with your own ideas**'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 使用该提示创建包含你自己的想法的内容**'
- en: So far, you have a list of 30 content ideas and a prompt that guides you through
    creating the actual content.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你有一个包含30个内容想法的列表和一个引导你创建实际内容的提示。
- en: 'Now all you have to do is:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你只需要做的是：
- en: Send your content creation prompt
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发送你的内容创作提示。
- en: Give it the idea(s) you want to turn into content
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 给它你想要转化为内容的想法。
- en: Here’s an example of a [Tweet writing prompt](https://app.kortex.co/public/document/35506957-e550-40f7-9d0f-c9a116561276)
    I created based on a YouTube video that teaches how to write tweets.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个例子，我基于一个教授如何撰写推文的YouTube视频创建的[推文撰写提示](https://app.kortex.co/public/document/35506957-e550-40f7-9d0f-c9a116561276)。
- en: You already have the process to do anything you want with AI based on what we
    learned, so I’ll leave the experimentation in your hands.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我们所学，你已经有了使用AI做任何你想做的事情的过程，所以我会把实验留给你。
- en: One last thing.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 最后还有一件事。
- en: Since it takes an entire article to teach this, good content isn’t only about
    writing social posts. You need to “build a world” of content for people to binge
    and explore. [I teach that here.](https://thedankoe.substack.com/p/how-to-build-a-world-the-2-hour-content)
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这需要一整篇文章来教授，优质的内容不仅仅是关于撰写社交媒体帖子。你需要为人们“构建一个世界”的内容，让他们可以狂热地探索。[我在这里教授这一点。](https://thedankoe.substack.com/p/how-to-build-a-world-the-2-hour-content)
- en: Product – Stealing Like An AI Artist
  id: totrans-183
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 产品 - 像AI艺术家一样窃取
- en: Here’s the thing about AI.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 关于AI，是这样的。
- en: I don’t trust a general response for something highly personal.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 我不相信对高度个人化的事情有一个通用的回答。
- en: Sure, if you’re asking AI what the weather is like today (even though most base
    models can’t answer that due to knowledge cutoff without being paired with internet
    search), then do that.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，如果你是在询问AI今天的天气如何（尽管大多数基础模型由于知识截止而无法回答，除非与互联网搜索相结合），那么就那样做。
- en: 'But when it comes to something where:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 但当涉及到某些事情时：
- en: There is more than one “right” way to do it
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 做这件事不止一种“正确”的方法。
- en: The results are determined by uniqueness and novelty
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结果由独特性和新颖性决定。
- en: The output requires specific knowledge from your own brain
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出需要你自己的大脑中的特定知识。
- en: Then you can’t skip the learning process.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 然后你不能跳过学习过程。
- en: That’s good news for you, because those who want to “get rich quick” are going
    to fall flat on their face.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 这对你是个好消息，因为那些想要“快速致富”的人将会一败涂地。
- en: But the other thing with AI is that you can turn it into an expert with the
    right prompting. You don’t *need* to be a seasoned marketer in order for AI to
    turn your ideas into something a legendary marketer would use.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 但关于AI的另一件事是，你可以通过正确的提示将其变成一个专家。你不需要*必须是*一个经验丰富的营销人员，AI才能将你的想法转化为一个传奇营销人员会使用的。
- en: So far, we know how to break down what works into a detailed guide with AI.
    We also know how to turn that into a prompt that performs the task for you. Lastly,
    we know we need to find a source of expert-level inspiration so that we can give
    AI context to perform the task from.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们知道如何使用AI将有效的方法分解成详细的指南。我们也知道如何将其转化为一个为你执行任务的提示。最后，我们知道我们需要找到一个专家级灵感的来源，以便我们可以为AI提供执行任务的上下文。
- en: 'So, there are a few things you can do here:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这里有一些你可以做的事情：
- en: Find a YouTube video that explains the best types of digital products to sell
    as a beginner – turn that into a prompt that interviews you to see which one is
    best.
  id: totrans-196
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 找到一个解释作为初学者最佳数字产品类型的YouTube视频，将其转化为一个采访你的提示，看看哪一个最好。
- en: Based on the type of product (ebook, course, cohort, template) ask AI what topic
    you should create the product around – feed it your personal brand strategy from
    before as context.
  id: totrans-197
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据产品的类型（电子书、课程、小组、模板），询问AI你应该围绕哪个主题创建产品——提供你之前个人品牌策略作为背景信息。
- en: Ask AI to give you a comprehensive breakdown of Alex Hormozi’s offer creation
    framework. Turn that into a prompt that guides you through creating your own offer
    out of your product idea.
  id: totrans-198
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 让AI为你提供Alex Hormozi的优惠创建框架的全面分解。将其转化为一个提示，引导你从你的产品想法中创建自己的优惠。
- en: Break down a PDF like Breakthrough Advertising by Eugene Schwartz into a comprehensive
    guide to write landing page copywriting. Turn that into a prompt to write your
    landing page and give it your offer (I also talked about how to do this [in my
    future of digital products letter last week](https://thedankoe.com/letters/how-smart-creators-will-make-money-in-2026-youre-early/)).
  id: totrans-199
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将Eugene Schwartz的《突破广告》等PDF分解成撰写着陆页文案的全面指南。将其转化为一个提示来撰写你的着陆页，并提供你的优惠（我上周也在我的数字产品未来信中谈到了如何做这件事[https://thedankoe.com/letters/how-smart-creators-will-make-money-in-2026-youre-early/](https://thedankoe.com/letters/how-smart-creators-will-make-money-in-2026-youre-early/))。
- en: Find someone who has a similar product, purchase it, and paste each section
    into AI to break down the structure of the product. Turn that into a prompt that
    guides you through creating a similar product but with your own ideas.
  id: totrans-200
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 找到拥有类似产品的人，购买它，并将每个部分粘贴到AI中，以分解产品的结构。将其转化为一个提示，引导你创建一个具有你自己的想法的类似产品。
- en: This is all fairly extensive, but that’s because you are actually going to stand
    out and make this work.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 这一切都很广泛，但这是因为你实际上将脱颖而出并使这一切成功。
- en: Promotions – Repeating The Process
  id: totrans-202
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 推广——重复这个过程
- en: The success of your AI-first business depends on shameless and systemized self-promotion.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 你以AI为先的业务成功取决于无耻和系统化的自我推广。
- en: You have a personal brand strategy.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 你有一个个人品牌策略。
- en: You are checking in with your coach to guide you through growth.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在与你的教练联系，以指导你成长。
- en: You’re posting high-performing content on a weekly schedule.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在按周计划发布高绩效内容。
- en: You have a product that you can start selling ([host it on Stan](https://join.stan.store/thedankoe)
    if you’re wondering how to accept payment).
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 你有一个可以开始销售的产品（如果你想知道如何接受付款，可以[在Stan上托管](https://join.stan.store/thedankoe)）。
- en: Now, you need to promote your product *in your content.*
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你需要在你自己的内容中推广你的产品。
- en: 'That means:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着：
- en: Link your product in every YouTube description
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在每个YouTube描述中链接你的产品
- en: Plug your product in a reply once a day as a reply to a Tweet, Thread, LinkedIn
    post, or in your Instagram story
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每天在回复推文、推文线程、LinkedIn帖子或Instagram故事中插入你的产品
- en: Guide people toward your bio link for Shorts, Reels, and TikToks
  id: totrans-212
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 引导人们点击你的生物链接查看短视频、 reels和TikToks
- en: This all depends on what platform you choose to start out with.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 这一切都取决于你选择从哪个平台开始。
- en: Now, one last thing I want to leave you with. Because most people don’t understand
    how to promote.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，最后一件我想留给你的事情。因为大多数人都不了解如何推广。
- en: If your content is good enough, sometimes a simple “check out my product via
    the link in the description works,” but when you are promoting in something like
    the reply to a tweet, you need to get specific.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的内容足够好，有时一个简单的“通过描述中的链接查看我的产品”就足够了，但当你像回复推文一样推广时，你需要具体化。
- en: 'Try these prompts:'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试以下提示：
- en: What are the most effective copywriting frameworks for promoting my product
    on social media?
  id: totrans-217
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 什么是最有效的文案框架，用于在社交媒体上推广我的产品？
- en: That should give you a few like PAS and AIDA.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 这应该会给你一些PAS和AIDA。
- en: 'If you’d like, ask why those frameworks work and the psychology behind them.
    Then ask:'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你愿意，询问为什么这些框架有效，以及它们背后的心理学。然后问：
- en: 'Here is my product details: [link or paste your product details]'
  id: totrans-220
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这里是我的产品详情：[链接或粘贴你的产品详情]
- en: ''
  id: totrans-221
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Write me three 280 character or less promotions using the PAS framework and
    direct response marketing principles. The promotions should link to my product.
  id: totrans-222
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 使用PAS框架和直接响应营销原则，为我写三条280字符或更少的推广文案。推广文案应链接到我的产品。
- en: From there, you can test and iterate on those.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，你可以测试和迭代这些。
- en: Cycle through them every day and test different variations to see which leads
    to people clicking through to view your product more.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 每天循环使用它们，并测试不同的变体，看看哪个会导致人们点击查看你的产品。
- en: There is a lot more we could go over for this letter, but I’m going to leave
    it there. I’m confident that I gave the right people enough to work with.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这封信，我们还有很多可以讨论的，但我将在这里结束。我坚信我给了正确的人足够的工作。
- en: Thank you for reading.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读。
- en: – Dan
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
- en: 'If you want to take it further:'
  id: totrans-228
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如果你想要更进一步：
- en: The build a profitable personal brand in 30 days challenge starts on June 16th.
    If you want 30 days of daily lessons and action steps to reach your first followers
    and dollars,[ join here before enrollment closes.](https://stan.store/thedankoe/p/build-a-profitable-personal-brand-in-30-days)
  id: totrans-229
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在30天内打造盈利个人品牌的挑战活动将于6月16日开始。如果你想要30天的每日课程和行动步骤，以吸引你的第一批粉丝和收入，[在报名截止前加入这里。](https://stan.store/thedankoe/p/build-a-profitable-personal-brand-in-30-days)
- en: We now have a mega guide to creating a digital product, how to write landing
    page copy for that product, and how to launch the product [inside the growing
    premium library.](https://thedankoe.substack.com/)
  id: totrans-230
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们现在有一份关于创建数字产品、如何为该产品撰写着陆页文案以及如何在不断增长的付费图书馆中推出产品的超级指南。[点击这里查看。](https://thedankoe.substack.com/)
