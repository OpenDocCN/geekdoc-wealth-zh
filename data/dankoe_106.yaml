- en: 'The Value Equation: How To Become A Top 1% Individual Fast'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 价值方程：如何快速成为顶尖1%的个人
- en: 原文：[https://thedankoe.com/letters/the-value-equation-how-to-become-a-top-1-individual-fast/](https://thedankoe.com/letters/the-value-equation-how-to-become-a-top-1-individual-fast/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/the-value-equation-how-to-become-a-top-1-individual-fast/](https://thedankoe.com/letters/the-value-equation-how-to-become-a-top-1-individual-fast/)
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1865">![](../Images/5416b86120120ce70d16d10de9284a67.png)</picture>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1865">![](../Images/5416b86120120ce70d16d10de9284a67.png)</picture>
- en: You are chasing status.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 你在追求地位。
- en: It is an immutable principle in human nature that has persisted since the dawn
    of time.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这是人类本性中一个不可改变的原则，自从时间的开始就一直在持续。
- en: To think that you aren’t chasing status as a noble pursuit is still a status
    game. The desire to kill the ego is still a desire of the ego. That doesn’t mean
    it’s bad. It means it’s natural, and once you accept that you begin to be rewarded
    for it.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 认为你在追求地位不是一种高尚的追求，仍然是在玩地位游戏。消灭自我的欲望仍然是自我的欲望。这并不意味着它是坏的。这意味着它是自然的，一旦你接受了这一点，你就会开始为此得到回报。
- en: 'And whether you like it or not, people judge you based on your relative status.
    To not accept this is to accept the other option: a life of being treated unfairly
    while having little impact on the world.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是否喜欢，人们都会根据你的相对地位来评判你。不接受这一点就是接受另一个选择：一个不公平对待的生活，同时对世界的影响很小。
- en: You have a status in your social circle.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 你在你的社交圈中也有一定的地位。
- en: You have a status in your job or career.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 你在你的工作或职业生涯中也有一定的地位。
- en: You have a status in your religious organization.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 你在你的宗教组织中拥有一定的地位。
- en: People assign you a status when they first see you. This is out of your control,
    but you can position yourself to increase the likelihood of being perceived high
    status.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 当人们第一次看到你时，就会给你分配一个地位。这是你无法控制的，但你可以定位自己以增加被感知为高地位的几率。
- en: People determine whether they want to engage and offer you opportunities based
    on that status.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 人们根据那个地位决定他们是否想要参与并给你提供机会。
- en: People determine whether they want to hire you, pay you, or help you based on
    that status.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 人们根据那个地位决定他们是否要雇佣你、支付你或帮助你。
- en: Even if it was unintentional – which I doubt it was based on their high level
    of awareness – leaders that we glorify like Jesus Christ, Eckhart Tolle, Naval
    Ravikant, Alan Watts, Jordan Peterson, Ken Wilber, and most others who come to
    mind were and are playing a status game.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 即使它是无意的——我怀疑它基于他们高度的意识水平——我们崇拜的领袖，如耶稣基督、厄卡尔特·托勒、纳瓦尔·拉维坎特、艾伦·瓦茨、乔丹·彼得森、肯·威尔伯以及许多其他令人想起的人，都曾经并且正在玩地位游戏。
- en: How else would they gain such mass attention, attract a hierarchy of followers,
    and change the direction of evolution for the better? I don’t want to hear your
    edge cases of high-status people who miss the crucial piece of inner work and
    personal development to balance out the chaos of status.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 他们如何才能获得如此大的关注，吸引一群追随者，并使进化方向变得更好？我不想听你关于那些高地位的人忽视关键的内修和个人发展以平衡地位混乱的边缘案例。
- en: In other words, if you want to contribute to humanity on a large enough scale,
    status is *important.*
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，如果你想以足够大的规模为人类做出贡献，地位是**重要的**。
- en: If it does not involve status, it is doomed to die off.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 如果它不涉及地位，它注定要消亡。
- en: Status is wired into our survival as a species, and once that becomes conscious,
    you can impact the world and minimize the negative effects of your pursuit.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 地位是我们物种生存的一部分，一旦它变得有意识，你就可以影响世界并最小化你追求中的负面影响。
- en: If it remains unconscious, you will manipulate and cheat without knowing it.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 如果它保持无意识，你会在不知情的情况下操纵和欺骗。
- en: You can show me images of the “consciousness scale” all day long and persuade
    me about the dissolution of self, but that scale is still a hierarchy of varying
    status and a static representation of the complexity of blending states of consciousness,
    and you are still persuading me that something is better than something else.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以整天给我展示“意识尺度”的图像，并说服我关于自我消融的观点，但那个尺度仍然是一个不同地位等级的体系，以及融合意识状态的复杂性的静态表示，而你仍然在说服我某样东西比另一样东西更好。
- en: Status is not a static and evil construct. There are higher and lower levels.
    But nobody starts at the top.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 地位不是一个静态和邪恶的构造。有高低不同的层次。但没有人从顶端开始。
- en: 'The Value Equation: How To Make Anything Valuable'
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 价值方程：如何让任何事物变得有价值
- en: The path of the problem solver, or value creator, is how you escape the world
    of replaceability. Fall in love with the challenge that problems present, from
    superficial to metaphysical, and your ideal future will create itself. – The Art
    of Focus
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 问题解决者或价值创造者的道路是你逃离可替代性世界的途径。爱上问题带来的挑战，从表面到形而上学，你的理想未来将自行形成。 —— 专注的艺术
- en: Looks come before depth.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 外观先于深度。
- en: A nice car can have a billion-dollar founder approach you and ask what you do,
    opening a world of opportunity.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 一辆好车可以让一个价值十亿美元的创始人接近你，询问你做什么，打开一个充满机会的世界。
- en: A nice body can get you in the door with a partner who values health, strength,
    and discipline.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 一个好身材可以让你进入一个重视健康、力量和纪律的伴侣的门槛。
- en: People love to close their mind to material or superficial pursuits but don’t
    realize that those are the only starting points. You don’t start digging from
    the core. You dig from the surface. Material is the barrier of the immaterial.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 人们喜欢关闭他们的心灵，对物质或表面追求视而不见，但并没有意识到那些是唯一的起点。你不是从核心开始挖掘的。你从表面开始挖掘。物质是不朽的障碍。
- en: Becoming valuable, or increasing the impact of *both* looks and depth, is how
    you play the game of life.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 通过变得有价值或增加外观和深度的双重影响，你就是在玩人生的游戏。
- en: Don’t hate the game. Don’t hate the player. Master them both.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 不要恨游戏，也不要恨玩家。掌握它们两者。
- en: Status, as far as I’m concerned, is your experience level in the game of life.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，地位是你人生游戏中的经验水平。
- en: The Macronutrients Of Value – Perspective
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 价值宏量元素 – 视角
- en: 'When you understand how to create value, you can:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 当你理解如何创造价值时，你可以：
- en: Change your life
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改变你的生活
- en: Help others change their lives
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帮助他人改变生活
- en: Write, speak, and think with clarity
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清晰地写作、说话和思考
- en: Create content, landing pages, or marketing that sells
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建销售内容、着陆页或营销活动
- en: Navigate relationships in a mutually beneficial manner
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以互利的方式处理人际关系
- en: Understand your emotions and move past them
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解你的情绪并克服它们
- en: The framework I’m about to teach you is how you create solutions to problems.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我即将教给你的框架是如何创造问题的解决方案。
- en: It is the foundation of human behavior, business, and communication.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这是人类行为、商业和沟通的基础。
- en: Value is truth.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 价值是真理。
- en: Value is story.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 价值是故事。
- en: Value is progress.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 价值是进步。
- en: Value is transformation.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 价值是转变。
- en: Value is reversing entropy.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 价值是逆转熵。
- en: Value is a signal of meaning in your psyche.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 价值是你心理中的意义信号。
- en: Our mind has little ideas floating around inside of it that are waiting to be
    connected.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的大脑中有许多小想法在内部漂浮，等待着被连接起来。
- en: When they connect, you feel the clarity. It all makes sense.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 当它们连接时，你会感受到清晰。一切都变得有意义。
- en: 'Whenever you are failing to achieve a result like making more money, improving
    your health, or motivating yourself to act on a better future – it’s because you
    are missing one of these pieces that make it all click:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 无论何时你未能实现结果，比如赚更多钱、改善健康或激励自己为更好的未来采取行动，那是因为你缺少了使一切变得清晰的一个要素：
- en: '**Problem** – A limitation or challenge that creates pain when unsolved.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问题** – 一个未解决时造成痛苦的局限或挑战。'
- en: '**Goal** – An impactful end result that allows the recipient to evolve beyond
    the problem.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标** – 一个有影响力的最终结果，使接收者能够超越问题。'
- en: '**Process** – A creative system that breeds knowledge, skill, and awareness
    to bridge the gap between problem and solution.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过程** – 一个创造性的系统，培育知识、技能和意识，以弥合问题和解决方案之间的差距。'
- en: If you want to improve your life, you must identify a problem, direct your mind
    toward a goal, and experiment with solutions until you create a path to achieve
    the goal.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要改善你的生活，你必须识别问题，将你的思想引向目标，并尝试解决方案，直到你创造出一个实现目标的路径。
- en: If you want to make money, you must help others identify a problem, direct their
    attention toward a goal, and give them the clarity to act on a better future.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要赚钱，你必须帮助他人识别问题，将他们的注意力引向目标，并给予他们采取更好未来行动的清晰度。
- en: If you want to better a relationship, you must both realize the problem, share
    a goal in your head, and both put effort into solving the problem.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要改善关系，你必须双方意识到问题，在心中分享一个目标，并双方努力解决问题。
- en: A problem, goal, and process provide the structure for anything you do from
    writing to marketing to behaving to building a product to telling a story.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 问题、目标和过程为任何你所做的事情提供了结构，无论是写作、营销、行为、产品构建还是讲故事。
- en: If you’ve read [The Art Of Focus](https://theartoffocusbook.com), you’ve seen
    this before as the “Purpose, Path, Priority” chapter.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你读过《专注的艺术》（[The Art Of Focus](https://theartoffocusbook.com)），你之前已经见过这个“目的、路径、优先级”章节。
- en: Now, if you want to make this more impactful, utilize the micronutrients of
    value.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果你想使这更有影响力，利用价值微营养素。
- en: The Micronutrients Of Value – Perception
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 价值微营养素 – 感知
- en: Value boils down to perspective and perception.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 价值归结为视角和感知。
- en: If people are not aware of the problem, believe the goal is possible, or have
    the clarity to achieve it – they will not be able to perceive the importance of
    the value you have to offer.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 如果人们没有意识到问题，相信目标可以实现，或者有实现它的清晰度，他们将无法感知到你提供的价值的的重要性。
- en: 'Use these as a way to shape the perception of your readers:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 用这些来塑造读者的感知：
- en: '**Concept** – a way of packaging up and naming your value in a way that captures
    attention and sticks in people’s heads.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**概念** – 以一种吸引注意力和留在人们脑海中的方式包装和命名你的价值。'
- en: '**Proof** – giving people the belief it’s possible through personal or peer
    results.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**证据** – 通过个人或同伴的结果让人们相信这是可能的。'
- en: '**Risk reversal** – reducing the perceived uncertainty, friction, and difficulty
    of getting results.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**风险逆转** – 减少感知到的不确定性、摩擦和获得结果的难度。'
- en: '**Pain points** – amplifying the problem to illustrate how the problem is impacting
    their life beyond the surface.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**痛点** – 放大问题，以说明问题如何影响他们的生活，而不仅仅是表面现象。'
- en: '**Benefits** – increasing the desire to reach the solution, making motivation
    sustainable if these are repeated.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**好处** – 增加解决问题的愿望，如果这些方法被重复使用，可以保持动机的持续性。'
- en: '**Awareness** – The amount of people who suffer from the problem, can benefit
    from the solution, and are ready to receive the clarity to act.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**意识** – 受到问题困扰的人数，可以从解决方案中受益，并准备好接受采取行动的清晰度。'
- en: If I want to sell a new product to earn a creative income, here’s how I would
    map it out.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想销售新产品以赚取创意收入，我会这样规划。
- en: '**Problem** – I hate working long hours.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问题** – 我讨厌长时间工作。'
- en: '**Goal** – Work for 4 hours a day.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标** – 每天工作4小时。'
- en: '**Process** – Start a business, learn the required skills, and focus on high-leverage
    tasks (you can and should get detailed with this).'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过程** – 开始创业，学习所需技能，并专注于高杠杆任务（你可以也应该详细说明这一点）。'
- en: This helps me frame the content I write to help others adopt the same perspective.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这有助于我为帮助他人采用相同的视角而撰写的内客。
- en: All of these can be used as individual social posts, outlines for a newsletter
    or video script, and anything else that requires you to illustrate your value.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都可以用作单独的社会帖子、新闻通讯或视频脚本的提纲，以及任何需要你展示你价值的东西。
- en: '**Concept**'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**概念**'
- en: '*Example: The 4 Hour Workday.*'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '*示例：4小时工作日*。'
- en: When you name a concept, like “The Eisenhower Matrix” or “1% Better Every Day,”
    you increase your likelihood of making people remember you.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 当你给一个概念命名，比如“艾森豪威尔矩阵”或“每天进步1%”，你增加人们记住你的可能性。
- en: I use concepts like the One Person Business or The Value Equation (for this
    letter) to bring a novel perspective to a boring topic that will change people’s
    lives.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用像“一人企业”或“价值方程式”（针对这封信）这样的概念，为枯燥的话题带来新颖的视角，这将改变人们的生活。
- en: This works well for headlines, video titles, or hooks to catch attention.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这对于标题、视频标题或吸引注意力的钩子来说效果很好。
- en: '**Proof**'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '**证据**'
- en: '*Example: I’ve helped John Smith prioritize tasks to work less and increase
    revenue.*'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '*示例：我帮助约翰·史密斯优先处理任务，以减少工作量并增加收入*。'
- en: In my newsletters, I often start with a problem based on my personal experience
    and how I overcame it. This gives people the belief and relatability to do it
    as well.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的通讯中，我经常从基于我个人的问题以及我是如何克服它开始的。这给人们带来了信念和共鸣，使他们也能做到这一点。
- en: Use whatever you can – statistics, client stories, or personal experience –
    to show what’s possible.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 使用你能用到的任何东西——统计数据、客户故事或个人经验——来展示什么是可能的。
- en: '**Risk reversal**'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '**风险逆转**'
- en: '*Example: You only need 10 minutes each day to start.*'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '*示例：你每天只需要10分钟就可以开始*。'
- en: People need clarity more than they need motivation. How can you reduce the perceived
    risk and friction to make a change?
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 人们需要清晰度比他们需要动力。你如何减少感知到的风险和摩擦，以实现改变？
- en: In marketing, people use money back guarantees.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在营销中，人们使用退款保证。
- en: In writing, I attempt to make things so stupidly clear they don’t have an excuse
    to remain mediocre.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在写作中，我试图使事情如此简单明了，以至于它们没有借口保持平庸。
- en: I teach you how to write to build an audience (to distribute your value for
    profit) in [2 Hour Writer](https://2hourwriter.com).
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 我在[2小时作家](https://2hourwriter.com)中教你如何写作以建立受众（为了盈利分发你的价值）。
- en: '**Pain points**'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '**痛点**'
- en: '*Example: You don’t have time for family. You don’t have time to pursue other
    goals. You don’t have meaningful work to focus on.*'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '*示例：你没有时间陪伴家人。你没有时间追求其他目标。你没有有意义的工作可以专注。*'
- en: On my landing pages, I start with a bullet list of pain points to make people
    realize the impact of their problem. This opens a curiosity loop and makes their
    mind desire a solution.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的着陆页上，我开始列出痛点列表，让人们意识到他们问题的冲击。这开启了一个好奇心循环，使他们的思维渴望一个解决方案。
- en: Remember that the examples I give are one of many. All of these are to be treated
    as creative firepower for your creations.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 记住我给出的例子只是众多例子之一。所有这些都是为了作为你创作的创意火力。
- en: '**Benefits**'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**好处**'
- en: '*Example: Choose when you work. Choose what you work on. Choose who you work
    with.*'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '*示例：选择你工作的时间。选择你工作的内容。选择你合作的伙伴。*'
- en: 'Here’s an example social post I could write using benefits. This is what most
    people should start writing to establish authority in their topic of choice:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我可以写的一个示例社交媒体帖子，使用好处。这是大多数人应该开始写的东西，以在所选主题上建立权威：
- en: 'You started a business because you want to:'
  id: totrans-96
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你开始创业是因为你想要：
- en: ''
  id: totrans-97
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Choose when you work
  id: totrans-98
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择你工作的时间
- en: Choose what you work on
  id: totrans-99
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择你工作的内容
- en: Choose who you work with
  id: totrans-100
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择你合作的伙伴
- en: ''
  id: totrans-101
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Don’t forget: entrepeneurship isn’t about working long hours.'
  id: totrans-102
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要忘记：创业不是关于长时间工作。
- en: ''
  id: totrans-103
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It’s about taking control of your time, money, and enjoyment.
  id: totrans-104
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这关乎掌控你的时间、金钱和乐趣。
- en: (I’m scheduling this as a post right now, go to my profile to see if it did
    well. Notice how there is an implied problem, goal, and process that people will
    learn if they follow me.)
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: （我现在正在安排这个帖子，去我的个人资料看看它是否做得好。注意，如果他们跟随我，会隐含一个问题、目标和过程，人们会从中学习。）
- en: That can be a part of a sales page, newsletter, or used as a social post to
    prime readers for your value.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以是销售页面、通讯或用作社交媒体帖子，为读者预热你的价值。
- en: '**Awareness**'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '**意识**'
- en: 'There are 5 levels of awareness:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 有5个意识级别：
- en: 'Level 1: Unaware of the problem.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第1级：未意识到问题。
- en: 'Level 2: Problem aware.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第2级：问题意识。
- en: 'Level 3: Solution aware.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第3级：解决方案意识。
- en: 'Level 4: Product aware.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第4级：产品意识。
- en: 'Level 5: Most aware.'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第5级：最意识。
- en: Most people will fall between levels 1-4.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人都会处于第1级到第4级之间。
- en: Your job is to speak to each level at various stages of your bio, content, website,
    emails, DMs, calls, and the rest until they are aware that your product (or value)
    is the one they need to implement.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 你的任务是针对你生物、内容、网站、电子邮件、私信、电话和其他各个阶段，与每个级别的人进行沟通，直到他们意识到你的产品（或价值）是他们需要实施的目标。
- en: 'If someone is in level 2 (problem aware), here’s a post I would write as an
    example for The 4 Hour Workday concept:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 如果某人在第2级（问题意识），以下是我会为《4小时工作日》概念写的帖子示例：
- en: 'If you hate working long hours:'
  id: totrans-117
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你讨厌长时间工作：
- en: ''
  id: totrans-118
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Add to your skill set
  id: totrans-119
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 增加你的技能集
- en: Finally start a business
  id: totrans-120
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后开始创业
- en: Work on it for 1 hour each day
  id: totrans-121
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每天工作1小时
- en: Fire your boss from your life
  id: totrans-122
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从你的生活中解雇你的老板
- en: Work whenever you want
  id: totrans-123
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随时随地工作
- en: ''
  id: totrans-124
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You will never work less if you don’t create your own way of doing so.
  id: totrans-125
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你不去创造自己的方式，你永远不会减少工作量。
- en: Notice how I used a “process” to give them a solution to the problem.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 注意我如何使用“过程”来给他们一个解决问题的方案。
- en: Use the value equation to fill holes in your mind, business, and life.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 使用价值方程式来填补你心中、业务和生活中的空白。
- en: If you want personalized guidance to become a synthesizer (or value creator)
    as a career for 12-16 weeks, apply for [Kortex University.](https://university.kortex.co)
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要12-16周的个性化指导，成为合成师（或价值创造者）的职业，请申请[Kortex大学](https://university.kortex.co)。
- en: The Lifestyle Of The 1%
  id: totrans-129
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1%的生活方式
- en: There is one lifestyle that all high-value individuals have.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 所有高价值个体都有一种生活方式。
- en: They reverse entropy on a daily basis.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 他们每天都会逆转熵。
- en: They pursue goals on a daily basis.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 他们每天都会追求目标。
- en: They solve problems on a daily basis.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 他们每天都会解决问题。
- en: They hypothesize, test, and create solutions to distribute to others on a daily
    basis.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 他们每天都会假设、测试并创造解决方案，以分发给他人。
- en: This lifestyle demands constant learning, building, and distributing of value.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 这种生活方式要求不断学习、构建和传播价值。
- en: Value is reversing entropy.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 价值是逆转熵。
- en: Entropy is the decline into chaos.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 熵是陷入混乱的过程。
- en: Entropy is reversed by creating systems to achieve goals by solving problems.
    That’s the Value Equation.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 通过创建系统通过解决问题来实现目标，从而逆转熵。这就是价值方程式。
- en: 'There is one career that will never go out of style: earning in accordance
    with nature. That is to say, reversing entropy by solving an endless series of
    problems, turning the solutions into potential profit, and distributing the value
    you create to others.'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 有一种职业永远不会过时：按照自然规律获得收入。也就是说，通过解决一系列无止境的问题来逆转熵，将解决方案转化为潜在利润，并将你创造的价值分发给他人。
- en: No matter where the economy goes, no matter how many jobs AGI replaces, no matter
    how worried you are… because that worry is just a problem that others also suffer
    from, you can solve for all parties, and profit handsomely from with education
    and meaning content and products.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 无论经济走向如何，无论AGI取代了多少工作，无论你有多么担忧……因为这种担忧是其他人也正在经历的问题，你可以为所有各方解决问题，并且通过教育和有意义的内容及产品从中获得丰厚的利润。
- en: Nobody is going to give you the time, you must take it.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人会给你时间，你必须自己去争取。
- en: Start with 1 hour every morning before the distractions wake up.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 从每天早上在分心之前开始，用1小时的时间。
- en: Solve a problem in your life that births a profitable solution.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 解决你生活中产生有利解决方案的问题。
- en: Build an audience by distributing your value with writing and content.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 通过写作和内容分享你的价值来建立受众。
- en: Turn your solution into a product and iterate until you make as much as you
    want.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的解决方案转化为产品，并迭代直到你得到你想要的。
- en: Don’t rely on a paycheck for your survival.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 不要依赖工资来维持生存。
- en: Transcend your survival through entrepreneurship and remove the earning limit
    from your life.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 通过创业超越生存，从你的生活中移除收入上限。
- en: And lastly, enjoy the rest of your week.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，享受你剩余的一周。
- en: Dan
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 丹
