- en: Working Less Helps You Make More Money (The 4-Hour Workday)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 少工作能让你赚更多钱（4小时工作日）
- en: 原文：[https://thedankoe.com/letters/working-less-helps-you-make-more-money-the-4-hour-workday/](https://thedankoe.com/letters/working-less-helps-you-make-more-money-the-4-hour-workday/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/working-less-helps-you-make-more-money-the-4-hour-workday/](https://thedankoe.com/letters/working-less-helps-you-make-more-money-the-4-hour-workday/)
- en: People don’t believe me when I tell them I work less than 4 hours a day.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 当我告诉他们我每天工作不到4个小时时，他们都不相信我。
- en: Especially at this point in my life where I’ve been working 1-2 hours a day
    max.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 尤其是在我生活的这个阶段，我每天最多工作1-2个小时。
- en: How?
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 如何？
- en: '**1) I’ve always focused on eliminating the things I don’t like in my life.**'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 我一直专注于消除我生活中不喜欢的事情。**'
- en: I didn’t like long client calls or hosting podcasts, so I stopped doing them.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我不喜欢长时间的客户电话或主持播客，所以我停止了这些活动。
- en: Those alone gave me back hours each week of my time.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 仅此一项就每周为我节省了数小时的时间。
- en: Of course, I couldn’t do it immediately.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，我无法立即做到。
- en: I had to *create a solution to my own problems.*
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我必须**为我的问题创造解决方案**。
- en: Client work served its purpose until I realized personal branding was a way
    out. So I made that my priority project each morning for a year.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 客户工作在其目的上发挥了作用，直到我意识到个人品牌是一种出路。因此，我将它作为每天早晨的首要项目，持续了一年。
- en: (By the way, if you can’t tell, this is mainly for internet entrepreneurs and
    creatives.)
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: （顺便说一句，如果你能看出，这主要是针对互联网企业家和创意人士。）
- en: '**2) I’ve always focused on the highest leverage activities possible.**'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 我一直专注于可能的最大杠杆活动。**'
- en: Freelance and consulting work is a great starting point but demands a lot of
    time.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 自由职业和咨询工作是一个很好的起点，但需要投入大量时间。
- en: If you want more freedom, you need a product that can sell in your sleep, without
    personal effort.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要更多的自由，你需要一个可以在你睡觉时销售的产品，而不需要个人努力。
- en: With time I transitioned out of client work and used my results in brand advising
    to create a digital product stack.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，我逐渐从客户工作中退出，并利用我在品牌咨询方面的成果创建了一个数字产品栈。
- en: The time-to-money ratio must decrease as you grow.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你成长，时间与金钱的比例必须降低。
- en: Next, I realized that writing was my ideal traffic generation method.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我意识到写作是我理想的流量生成方法。
- en: I write for 1-2 hours every single morning.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我每天早上都会写1-2个小时。
- en: Yes, even on weekends.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，甚至在周末。
- en: No, I don’t want to do anything else with that time.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 不，我不想用那个时间做其他任何事情。
- en: My writing gets repurposed to every single social media platform so that my
    audience continues to grow.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我的写作被改编成每个社交媒体平台，以便我的受众继续增长。
- en: This is where most people fail.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是大多数人失败的地方。
- en: They take courses, which illustrate exactly what the high-leverage tasks are,
    but then do the exact opposite.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 他们参加课程，这些课程恰好说明了哪些是高杠杆任务，但随后却做了完全相反的事情。
- en: When they ask, “Dan, why am I not getting results?”
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 当他们问，“丹，为什么我没有得到结果？”
- en: I ask what they are doing on a daily, focused basis and it is close to nothing.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我询问他们每天专注于做什么，结果几乎什么都没有。
- en: They are not performing the actions that get results on a daily basis.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 他们没有每天执行那些能带来结果的行为。
- en: They are procrastinating for 3 hours and doing things that don’t matter for
    another 8.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 他们拖延了3个小时，而另外8个小时在做一些无关紧要的事情。
- en: Results take time to build momentum and most people aren’t patient.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 结果需要时间积累势头，而大多数人都没有耐心。
- en: '**3) People still don’t realize the compounding nature of readership growth.**'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 人们还没有意识到读者群增长的复利性质。**'
- en: Business, online or offline, requires people and a product.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 无论在线还是线下，商业都需要人和产品。
- en: People come from ads, geographic location (for physical businesses), manual
    outreach like cold calls or email, or growing a readership through content creation
    in the new digital society.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 人们来自广告、地理位置（对于实体企业）、手动拓展，如冷电话或电子邮件，或者在新的数字社会中通过内容创作扩大读者群。
- en: Most businesses spend hours each day attempting to acquire customers.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数企业每天都要花费数小时试图获取客户。
- en: They neglect the power of social media.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 他们忽视了社交媒体的力量。
- en: 'My creator philosophy:'
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我的创造者哲学：
- en: ''
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 1) Go large and broad so you can talk about whatever you want.
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 1) 要做大而广，这样你就可以谈论任何你想谈论的事情。
- en: ''
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 2) Your newsletter, products, and services create beginner to advanced niche
    sub-audiences.
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 2) 你的通讯、产品和服务为初学者到高级的细分受众群体创造了基础。
- en: ''
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A map that guides people through the hierarchy of needs as you self-actualize.
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一张地图，引导人们在自我实现的过程中通过需求层次。
- en: ''
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [June 10, 2023](https://twitter.com/thedankoe/status/1667519489192128512?ref_src=twsrc%5Etfw)
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2023年6月10日](https://twitter.com/thedankoe/status/1667519489192128512?ref_src=twsrc%5Etfw)
- en: 'My point being:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我的观点是：
- en: If a brand with 50,000 followers can make $50,000 a month (yes, this is the
    low end *if you know what you are doing*)…
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个拥有50,000名粉丝的品牌可以每月赚取50,000美元（是的，这是如果你知道自己在做什么的话的最低端）…
- en: I can make that much with one-tenth of the effort if I have 500,000 followers.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我有500,000名粉丝，我可以用十分之一的努力赚到这么多。
- en: Now imagine if I have 2 million (which I do), I can make that much in an hour
    a week.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 现在想象一下，如果我拥有200万（我确实有），我可以在一周内用一小时的收入赚到这么多。
- en: 'In other words:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说：
- en: I can make 10x the amount of most people because of the focus I’ve invested
    over the years. And I don’t care to work longer for the sake of status and fitting
    in with other entrepreneurs.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我多年来投入的专注力，我可以创造出比大多数人多10倍的收入。而且我不愿意为了地位和与其他创业者合群而工作更长的时间。
- en: Me writing one tweet is the same as a beginner writing 10,000 (both in terms
    of high performing ideas due to practice and the spread of that tweet).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我写一条推文的效果和一个初学者写10,000条推文的效果是一样的（从练习和推文的传播来看，都是因为高绩效的想法）。
- en: I know an entrepreneur who works 14 hrs a day
  id: totrans-50
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我认识一个每天工作14小时的创业者
- en: ''
  id: totrans-51
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: And is stuck living in the basement
  id: totrans-52
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 而且陷入了住在地下室的生活
- en: ''
  id: totrans-53
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I know an entrepreneur who works 5 hrs a day
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我认识一个每天工作5小时的创业者
- en: ''
  id: totrans-55
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: And has built/sold 3 companies for $100m+ each
  id: totrans-56
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 并且已经建立/出售了3家公司，每家公司的价值超过1亿美元
- en: ''
  id: totrans-57
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The value isn't in how many hours you work
  id: totrans-58
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 价值不在于你工作了多少小时
- en: ''
  id: totrans-59
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: But where you focus your attention/awareness/consciousness
  id: totrans-60
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 但你关注你的注意力/意识/意识在哪里
- en: ''
  id: totrans-61
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Tej Dosa (@ComedicBizman) [June 9, 2023](https://twitter.com/ComedicBizman/status/1667192394536611841?ref_src=twsrc%5Etfw)
  id: totrans-62
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — Tej Dosa (@ComedicBizman) [June 9, 2023](https://twitter.com/ComedicBizman/status/1667192394536611841?ref_src=twsrc%5Etfw)
- en: No other traffic generation holds that power.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 没有其他流量生成方式拥有这样的力量。
- en: The harsh reality is that most people don’t stick it out long enough. They never
    reach the point where they can get a month’s worth of results in one day.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 严峻的现实是，大多数人坚持的时间不够长。他们从未达到一天内获得一个月结果的程度。
- en: Most people aren’t increasing their skill level, they are increasing the amount
    of time they spend at their current skill level.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人不是在提高他们的技能水平，而是在增加他们在当前技能水平上花费的时间。
- en: I teach this holistic business model in my [Digital Economics Masterclass](https://digitaleconomics.school)
    to turn yourself into a business.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我在我的[数字经济学大师班](https://digitaleconomics.school)中教授这种全面商业模式，让你自己成为一个企业。
- en: '**Now,** ***why*** **do I only work 4 hours a day?**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**现在，** ***为什么*** **我每天只工作4小时？**'
- en: It seems like more and more young entrepreneurs boast about working all the
    time.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 越来越多的年轻创业者吹嘘自己一直在工作。
- en: 12-14 hour days.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 12-14小时的工作日。
- en: There’s nothing wrong with this, and I’m sure it can be rather enjoyable. Entrepreneurship
    is a game. A very fun game at that.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这没什么问题，我确信这可以相当有趣。创业是一项游戏。一个非常有趣的游戏。
- en: But, there’s a glaring problem with that lifestyle.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，那种生活方式有一个明显的问题。
- en: Overwork is the antagonist of holistic development, and holism is the catalyst
    to exponential growth toward self-transcendence.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 过度工作是全面发展的对立面，而整体性是向自我超越的指数增长催化剂。
- en: People wonder why I work 3-4 hours a day (on an average day, nothing is permanent)…
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 人们 wonder why I work 3-4 hours a day (on an average day, nothing is permanent)…
- en: I wonder why they don’t if they value self-actualization.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 我想知道他们为什么不在意自我实现。
- en: If you are so focused on something as neutral as money, how do you have time
    for creativity, relationships, and health?
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你如此专注于像金钱这样中性的事物，你怎么有时间去培养创造力、人际关系和健康？
- en: Think of a talent tree in a video game.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下视频游戏中的天赋树。
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1297">![](../Images/10da956c063d51c26b1d31c96d5f943e.png)</picture>
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1297">![](../Images/10da956c063d51c26b1d31c96d5f943e.png)</picture>
- en: You won’t have access to higher levels of skill development if you only focus
    on one path.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只专注于一条路径，你将无法接触到更高层次的技术发展。
- en: You can push to a certain level in business, but to reach new heights, you have
    to reach an equal level of development in health, relationships, and cognitive
    development.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在商业上达到一定的高度，但要达到新的高度，你必须达到健康、人际关系和认知发展的同等发展水平。
- en: To my point above about getting 1 month of results in 1 day, this is close to
    impossible if you are *only* focused on business.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 关于我之前提到的在一天内获得一个月结果的观点，如果你*只*专注于商业，这几乎是不可行的。
- en: “Focusing on one thing” *requires* you to focus on a multitude of things to
    do that one thing better. It’s counterintuitive as most good things in life are.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: “专注于一件事情”*需要*你关注许多事情来做这件事做得更好。这在生活中大多数好事中都是反直觉的。
- en: The Psychology (And Futility) Of 9-5 Jobs
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于朝九晚五工作的心理学（及其徒劳无功）
- en: Let’s open this can of worms by making a hard distinction between work and rest.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过在工作与休息之间做出明确的区分来打开这个罐子。
- en: We will classify *work* as “productivity mode” and *rest* as “creativity mode.”
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将**工作**归类为“生产力模式”，将**休息**归类为“创造力模式”。
- en: Both are states of mind that are determined by what, how, and why your attention
    is focused on what it is.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这两种都是由你的注意力集中在哪里、如何集中以及为什么集中在哪里所决定的心态。
- en: <picture decoding="async" class="wp-image-923">![](../Images/97a9cc4cdb34a7d6be521e68b2ee64c0.png)</picture>
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-923">![](../Images/97a9cc4cdb34a7d6be521e68b2ee64c0.png)</picture>
- en: '**Productivity Mode**'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '**生产力模式**'
- en: This is a narrow focused state of attention.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个注意力集中的狭窄状态。
- en: You are fixated on solving a problem that a task presents.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 你专注于解决任务提出的问题。
- en: It is almost always accompanied by a sense of stress or pressure to perform.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 它几乎总是伴随着一种压力感或表现的压力。
- en: In psychology, this is best illustrated by the *Task Positive Network* in the
    brain that, *“is active during attention-demanding tasks and includes our conscious
    attention towards the **external** environment.”*
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在心理学中，这最好通过大脑中的**任务积极网络**来体现，该网络*“在需要注意力的任务中活跃，包括我们对**外部**环境的意识注意力。”*
- en: '**Creativity Mode**'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '**创造力模式**'
- en: This is an open focused state of attention.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个开放和集中的注意力状态。
- en: You do not fixate on a stress-related task, but you can still be focused on
    a task.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 你不会专注于与压力相关的任务，但你仍然可以专注于任务。
- en: You are not actively paying attention.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 你并没有积极关注。
- en: This is why you feel so creative in the shower, at the gym, on a walk, or laying
    out in the sun.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么你在淋浴时、在健身房、在散步时或在阳光下躺着时感觉如此有创造力。
- en: In psychology, this is best illustrated by the Default Mode Network that activates
    when we shift from outward to **inward**-focused cognition.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在心理学中，这最好通过当我们从外向内转向**内向**关注认知时激活的默认模式网络来体现。
- en: '**The Problem**'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题**'
- en: Overworkers don’t realize that habits are not only what you do, but who you
    are.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 过度工作者没有意识到习惯不仅仅是你的行为，更是你的身份。
- en: A state of mind, like productivity mode, can become conditioned into your mind.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 一种心态，如生产力模式，可以成为你心中的条件反射。
- en: You can live in that narrow and stressful perspective in a way that silently
    wreaks havoc on your health.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以以一种在无声中破坏你健康的方式生活在狭窄和有压力的视角中。
- en: And that’s just the thing…
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 而这正是……
- en: You don’t care.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 你不在乎。
- en: Why?
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: Because that’s all you know.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 因为那是你所知道的全部。
- en: You become more egotistical and selfish simply because you can’t fathom a better
    way of living.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 你变得更多自我和自私，仅仅因为你无法想象更好的生活方式。
- en: Your current level of awareness/consciousness doesn’t allow you to grasp at
    the higher rung of the ladder because it’s clouded by fog.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 你当前的水平意识/意识不允许你抓住梯子的更高一级，因为它被雾气笼罩。
- en: Your life is so mechanical and “known” that it never crosses your mind that
    there is an unknown that can benefit you.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 你的生活如此机械和“已知”，以至于你从未想过还有未知的可以对你有益。
- en: Your identity is threatened at the thought that you could see more progress
    while working 3-4 hours a day. And you’re fearful of the unknown lifestyle you
    would be thrown into.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 当你想到如果你每天工作3-4小时就能看到更多进步时，你的身份会受到威胁。而且你害怕被抛入未知的生活方式。
- en: So the ego constricts its grip on your way of living and you keep on doing what
    you were doing.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，自我意识对你的生活方式的掌控变得狭窄，你继续做着之前的事情。
- en: '**The Evolution**'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '**进化**'
- en: I’m not saying that productivity mode is bad.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 我并不是说生产力模式是坏的。
- en: In fact, it’s one of the most enjoyable states of mind to be in.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，这是最令人愉悦的心态之一。
- en: Secure, certain, and focused so that negative thoughts don’t replicate in your
    mind.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 安全、确定和专注，这样消极的想法就不会在你的脑海中复制。
- en: That’s not the problem.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 那不是问题。
- en: The problem is never breaking out of that state to reflect on your past and
    re-aim toward your future.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 问题永远不是打破那种状态来反思你的过去并重新瞄准你的未来。
- en: You never *zoom out* to see where you are going so you can *zoom in* and make
    better choices.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 你从未放大视角去看你将要去哪里，所以你可以放大视角并做出更好的选择。
- en: Most people are zoomed in for life. They wake up one day wondering where they
    went wrong.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人一生都在放大视角。他们有一天醒来，不知道自己哪里错了。
- en: Zoom out.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 放大视角。
- en: Identify a big goal to gain vision.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 确定一个大的目标以获得视野。
- en: Perceive your daily choices from the lens of that goal.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 从那个目标的角度来看待你的日常选择。
- en: Most hard-working entrepreneurs would scoff at the fact that they are the exact
    same as 9-5ers, but they are.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数勤奋的创业者可能会嘲笑他们与朝九晚五的人完全一样，但他们确实如此。
- en: The best way to explain this is with the *skill:challenge match:*
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的解释方式是使用*技能：挑战匹配*：
- en: <picture decoding="async" class="wp-image-881">![](../Images/ae54bb0e77c9ab85ec1e90153b42afa1.png)</picture>
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-881">![](../Images/ae54bb0e77c9ab85ec1e90153b42afa1.png)</picture>
- en: Challenge the key to maximum enjoyment (flow state).
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战是最大享受（心流状态）的关键。
- en: I talk about this in [Life Is A Video Game](https://thedankoe.com/letters/life-is-a-game-heres-how-you-play-it/).
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 我在[生活是一场视频游戏](https://thedankoe.com/letters/life-is-a-game-heres-how-you-play-it/)中谈到了这一点。
- en: Challenge narrows the mind on a problem standing in the way of a meaningful
    goal, which is the driver of evolution.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战会缩小思维，使人们专注于阻碍有意义目标的问题，而目标是进化的驱动力。
- en: We can all feel “the pull” towards our highest version.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都可以感受到“吸引力”向我们的最高版本。
- en: This is evolution calling you to live in accordance with nature.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 这是进化在召唤你按照自然规律生活。
- en: What people don’t realize is this is an ever-evolving way of life.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 人们没有意识到这是一个不断发展的生活方式。
- en: Stagnation = death.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 停滞=死亡。
- en: 'In order to reach new levels of challenge to focus your attention you must:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 为了达到新的挑战水平，集中你的注意力，你必须：
- en: Never stop learning to stack new skills and perspectives
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 永不停歇地学习，积累新的技能和视角
- en: Increase the complexity of your character to be able to even perceive the challenge
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高你角色的复杂性，以便甚至能够感知挑战
- en: Solve deeper problems in your life so you don’t get trapped in the superficial
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解决你生活中的更深层问题，这样你就不会陷入表面化。
- en: This is my gripe with most 9-5s.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我对大多数9-5工作不满的原因。
- en: Yes, some allow you to progress, but it is a slow grind with an inevitable cap.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，有些确实允许你进步，但这是一个缓慢的磨砺，并且有一个不可避免的极限。
- en: I see 9-5 jobs as a stepping stone.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为9-5的工作是一个垫脚石。
- en: They breed complacency and are dangerous for your psyche.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 他们滋生自满，对你的心理有害。
- en: Challenge is what makes life fun and interesting.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战是使生活有趣和有趣味的原因。
- en: If you halt your personal evolution by never pursuing something more, you lose
    purpose and fulfillment.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你通过永远不追求更多来停止你的个人进化，你将失去目标和满足感。
- en: Now, of course, people have their own goals.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，当然，人们都有自己的目标。
- en: People can achieve a sustained level of happiness at a lifelong 9-5 and mindfulness
    methods.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 人们可以在终身9-5工作和正念方法中达到持续的幸福感水平。
- en: But I am not speaking to those people.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 但我并不是在说那些人。
- en: I am speaking to you.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 我在对你说话。
- en: A person who clearly has a thirst for more.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 明显渴望更多的人。
- en: An innate curiosity to discover your potential.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 一种天生的好奇心，去发现你的潜力。
- en: Or else you wouldn’t be reading this.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 否则，你就不会阅读这篇文章。
- en: Creativity & Leverage
  id: totrans-149
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创造力与杠杆
- en: If the work doesn’t require creativity, delegate it, automate it, or leave it.
  id: totrans-150
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果工作不需要创造力，就委托它、自动化它，或者放弃它。
- en: ''
  id: totrans-151
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Naval (@naval) [September 30, 2020](https://twitter.com/naval/status/1311199771676176384?ref_src=twsrc%5Etfw)
  id: totrans-152
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 纳瓦尔 (@naval) [2020年9月30日](https://twitter.com/naval/status/1311199771676176384?ref_src=twsrc%5Etfw)
- en: Creativity is the balance to productivity.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 创造力是生产力的平衡。
- en: A constant need to be productive leads to a constant level of stress.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 持续需要保持生产力会导致持续的压力水平。
- en: A constant level of stress leads to surface-level living. You don’t even realize
    there is depth to this life. You have difficulty opening your mind beyond work-related
    tasks.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 持续的压力水平会导致表面化的生活。你甚至没有意识到生活中还有深度。你很难将你的思维扩展到与工作相关的任务之外。
- en: This impacts every other area of your life.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 这影响你生活的其他每个领域。
- en: Your relationship with your friends and loved ones.
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你与朋友和亲人之间的关系。
- en: Your ability to recover from health-related activities.
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你从健康相关活动中恢复的能力。
- en: Your mental capacity and development (which dictates your future level of true
    wealth).
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的心理能力和发展（这决定了你未来真正的财富水平）。
- en: 4-hour workdays, singular focus, and meaningful work are becoming the norm in
    small pockets of the internet, and for good reason.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 4小时工作日、单一焦点和有意义的工作正在互联网的小部分领域成为常态，而且有很好的理由。
- en: Ancient Romans and Greeks, Steve Jobs, Charles Darwin, and an ever-growing list
    of visionaries, strategists, and innovators attribute their success to surprisingly
    low work times accompanied by an abundance of restful activities like long walks.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 古罗马人和希腊人、史蒂夫·乔布斯、查尔斯·达尔文以及不断增长的愿景家、策略家和创新者的名单，他们都将他们的成功归因于出奇低的工时和大量的休息活动，如长距离散步。
- en: When we see someone with a respectable body of creative work, we would expect
    them to work long hours, obsessing into the night about the details of their next
    piece.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们看到有人拥有令人尊敬的创意作品时，我们就会期待他们长时间工作，整夜痴迷于他们下一部作品的细节。
- en: Instead, we see the opposite.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我们看到的是相反的情况。
- en: Like Darwin arriving at his study by eight after his morning walk and breakfast.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 就像达尔文在早上散步和早餐后八点到达他的书房一样。
- en: He would work for an hour and a half, take a break to read the mail and write
    letters, then return to more serious work where he conducted his experiments.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 他会工作一个半小时，然后休息一下，看看邮件和写信，然后回到更严肃的工作，进行他的实验。
- en: By noon Darwin would stop his work day and head out on a long walk.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 到中午，达尔文会停止他的工作日，出去散步。
- en: After reading and answering a few more letters he would take a nap, take another
    walk, and return to his study for another work block.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 在阅读和回答了几封更多的信件后，他会小睡一会儿，然后再散步，然后回到他的书房进行另一个工作块。
- en: 3-5 hours of work paired with active rest seems to be the sweet spot for most
    impactful creatives.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 3-5小时的工作搭配积极的休息似乎是大多数有影响力的创意人士的黄金点。
- en: Writers from multiple domains like Hemingway, Tarantino, and Ogilvy would spend
    the majority of their days lounging by the pool, talking to beautiful women, and
    doing everything aside from what they deemed work.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 来自多个领域的作家，如海明威、塔伦蒂诺和奥格威，会花他们大部分时间在游泳池边闲逛，与美丽的女人交谈，做他们认为不是工作的事情。
- en: They gave room for the creative emergence of ideas that fueled the impact of
    their work.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 他们为创意的涌现提供了空间，这些创意推动了他们工作的成效。
- en: If they can change culture and business with their methods, why can’t corporate
    workaholics do the same?
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 如果他们可以用他们的方法改变文化和商业，那么企业工作狂为什么不能呢？
- en: If you’re wondering “how,” to do this, I’ve written about it extensively before.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想知道“如何”做这件事，我之前已经详细地写过。
- en: Here are my [10 commandments of the 4-hour workday](https://thedankoe.com/letters/the-4-hour-workday-focused-work-changed-my-life/)
    and [my deep work routine](https://thedankoe.com/letters/change-your-life-in-6-months-my-deep-work-routine/).
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我的[4小时工作日10条戒律](https://thedankoe.com/letters/the-4-hour-workday-focused-work-changed-my-life/)和[我的深度工作常规](https://thedankoe.com/letters/change-your-life-in-6-months-my-deep-work-routine/)。
- en: The New Currency
  id: totrans-174
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 新货币
- en: How do you make money?
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 你怎么赚钱？
- en: First, you need attention.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 第一，你需要注意力。
- en: Second, you need a product or service to direct that attention to.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，你需要一个产品或服务来引导这种注意力。
- en: Third, you need to understand the process of *guiding attention* throughout
    that journey.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 第三，你需要了解在整个旅程中**引导注意力**的过程。
- en: Some people may reach your product and buy randomly.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人可能会随机购买你的产品。
- en: In most cases, that is not sustainable.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数情况下，这是不可持续的。
- en: You must create and understand every single touchpoint that a user can come
    in contact with on your brand.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须创造并理解用户可以与你的品牌接触的每一个接触点。
- en: Some call this a “funnel,” but that has negative connotations associated with
    shady marketers.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人称这为“漏斗”，但这与一些不道德的营销人员有关联。
- en: 'My funnel is simple:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 我的漏斗很简单：
- en: Write a big-idea-centric newsletter every week.
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每周写一篇以大想法为中心的通讯。
- en: Write 3 punchy and memorable tweets every day.
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每天写3条简洁而难忘的推文。
- en: Repurpose them to all platforms (my newsletter is my YouTube script, [I teach
    you how I write them here](https://2hourwriter.com)).
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将它们重新用于所有平台（我的通讯是我的YouTube脚本，[我在这里教你如何写它们](https://2hourwriter.com)）。
- en: <picture loading="lazy" decoding="async" class="wp-image-1294">![](../Images/8ba2cd1bb30a228febba1c293c706b70.png)</picture>
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-1294">![](../Images/8ba2cd1bb30a228febba1c293c706b70.png)</picture>
- en: You must capture, hold, and nurture their attention with *ideas.*
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须用**想法**来吸引、保持和培养他们的注意力。
- en: '*Ideas are the new currency.*'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: '**想法是新的货币**。'
- en: '*Modern success is mental warfare.*'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: '**现代成功是心理战**。'
- en: '*Creativity, rest, and short work hours are the catalyst.*'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: '**创造力、休息和短工作时间是催化剂**。'
- en: This is something I realized late in my journey.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我旅程后期才意识到的事情。
- en: 'Here’s what you need to focus on:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是你需要关注的事情：
- en: '**If you don’t** **prioritize** **depth, you will not** **be remembered****.**'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果不** **优先考虑** **深度，你就不会被** **记住****。'
- en: Your authority is determined by how much attention you hold throughout your
    lifetime.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 你的权威取决于你一生中保持的注意力有多少。
- en: A tweet may hold 10 seconds of attention.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 一条推文可以保持10秒的注意力。
- en: A book holds 5-6 hours of attention.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 一本书可以保持5-6小时的注意力。
- en: You become what you consume, and you mold those who read your work.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 你成为你所消费的东西，你塑造了阅读你作品的人。
- en: Books, newsletters, podcasts, and YouTube videos.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 书籍、通讯、播客和YouTube视频。
- en: These are the foundation of your brand.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是你的品牌的基础。
- en: This is how you nurture an audience without needing pushy sales tactics and
    direct response marketing.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你在不需要强硬的销售策略和直接响应营销的情况下培养观众的方式。
- en: When you prioritize depth, understanding, and novel perspectives you build trust
    and equity with your audience that you can cash in when it’s time to promote.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 当你优先考虑深度、理解和新颖的视角时，你与观众建立了信任和股权，你可以在推广时兑换。
- en: Who do you remember?
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 你还记得谁？
- en: The person on Twitter with a tweet you liked?
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 你在Twitter上喜欢的推文的人？
- en: Or the author that changed how you move in the world?
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 或者那个改变你世界观的书作者？
- en: I don’t remember everything I read from Eckhart Tolle, but I will spread his
    work to anyone curious about who impacted my life the most.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 我不记得我从埃克哈特·托勒那里读到的每一件事，但我将把他的作品传播给任何好奇对我影响最大的人。
- en: He makes money off of me because he lives rent-free in my head.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 他从我的头上赚钱，因为他免费住在我的脑子里。
- en: The Fill-Empty-Use Framework For A Holistic Lifestyle
  id: totrans-208
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 全面的生活方式框架：填满-清空-使用
- en: Fill your brain in the afternoons with books, learning, and socialization
  id: totrans-209
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在下午通过阅读、学习和社交来充实你的大脑
- en: ''
  id: totrans-210
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Empty your brain before bed with journaling, planning, and meditation
  id: totrans-211
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在睡前通过日记、计划和冥想来清空你的大脑
- en: ''
  id: totrans-212
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Use your brain in the morning with creation, output, and focus
  id: totrans-213
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在早上通过创造、输出和专注来使用你的大脑
- en: ''
  id: totrans-214
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [November 5, 2021](https://twitter.com/thedankoe/status/1456553636700504065?ref_src=twsrc%5Etfw)
  id: totrans-215
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科 (@thedankoe) [2021年11月5日](https://twitter.com/thedankoe/status/1456553636700504065?ref_src=twsrc%5Etfw)
- en: 'In the afternoons, fill your mind through:'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 在下午，通过以下方式充实你的心灵：
- en: '**Curiosity pursuit** to collect kernels of truth to integrate into your worldview.'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: '**好奇心追求**以收集真理的颗粒并将其整合到你的世界观中。'
- en: '**Skill acquisition** to increase your value in the marketplace that continues
    to change. If you stop learning, you die.'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: '**技能获取**以增加你在不断变化的市场中的价值。如果你停止学习，你就会死亡。'
- en: '**Intellectual conversation** so you don’t get trapped in a narrow perspective.
    You need to test your ideas with an open mind. Avoid debate and argument.'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: '**智力对话**以免陷入狭隘的视角。你需要以开放的心态检验你的想法。避免辩论和争论。'
- en: All of which can be used as fuel for your creative work.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都可以作为你创造性工作的燃料。
- en: 'In the afternoons, empty your mind through:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 在下午，通过以下方式清空你的心灵：
- en: '**Self-reflection** to note mistakes, lessons, and directions that you would
    have missed otherwise.'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: '**自我反思**以记录你否则会错过的错误、教训和方向。'
- en: '**Reality mapping** (or documenting what you learned for the day and how it
    connects to other ideas) so you can create something of value.'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: '**现实映射**（或记录你当天学到的内容及其与其他想法的联系）以便你可以创造出有价值的东西。'
- en: '**Spiritual connection** so you don’t get trapped in “doing” mode. Embrace
    “being” to balance out the stress.'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: '**精神联系**以免陷入“做”的模式。拥抱“存在”以平衡压力。'
- en: 'In the morning, use your mind through:'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 在早上，通过以下方式使用你的心灵：
- en: '**Focused work** to channel your discoveries and practice your craft.'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: '**专注的工作**以引导你的发现并练习你的技艺。'
- en: '**Priority projects** to have direction for your work. This is the only way
    to produce something that you can pass off to other people (and get paid for doing
    so).'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: '**优先项目**为你的工作提供方向。这是唯一能够生产出你可以转交给他人（并获得报酬）的东西的方法。'
- en: 'More on priority projects here: [Change Your Life In 6 Months (My Deep Work
    Routine](https://thedankoe.com/letters/change-your-life-in-6-months-my-deep-work-routine/)).'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 更多关于优先项目的信息：[在六个月内改变你的生活（我的深度工作常规）](https://thedankoe.com/letters/change-your-life-in-6-months-my-deep-work-routine/)。
- en: '**Bursts of intensity** so you feel a sense of accomplishment first thing in
    the morning. You can be at ease during your rest knowing that you knocked out
    what needs to be done.'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: '**爆发式的强度**让你在早上第一件事就有成就感。在休息时，你可以安心地知道你已经完成了需要做的事情。'
- en: Ending it here.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 就到这里结束。
- en: Enjoy the rest of your week.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 享受你剩余的一周。
- en: – Dan Koe
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹·科
