- en: 5 Ways To Learn 10x Faster
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 5种方法让你学习速度提升10倍
- en: 原文：[https://thedankoe.com/letters/5-ways-to-learn-10x-faster/](https://thedankoe.com/letters/5-ways-to-learn-10x-faster/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/5-ways-to-learn-10x-faster/](https://thedankoe.com/letters/5-ways-to-learn-10x-faster/)
- en: I am absolutely tired of hearing the “jack of all trades, master of none” quote
    that people use to justify putting themselves in a box. Not only is this perpetuated
    in the online business or creator space, but in life as a whole. Want a better
    job? Become a master of the main skill required at that job (instead of the dozens
    of other skills, traits, and behaviors that are required to become a true master
    of that skill). As you can tell, I am a fan of a holistic approach to everything.
    Mind, body, spirit, business.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我绝对厌倦了听到“万事通，样样稀松”这句话，人们用它来为自己画地为牢。这不仅在网上商业或创作者空间中如此，在生活的方方面面也是如此。想要更好的工作？成为那个工作所需的主要技能的大师（而不是成为那个技能真正大师所需的数十种其他技能、特质和行为）。正如你可以看到的，我是一个全面方法的粉丝。心智、身体、精神、商业。
- en: Gone are the days when it took 10,000 hours to learn — or master — a new domain
    of life. It just doesn’t make sense when you see through the statistic. By not
    challenging this collective belief you close your mind to the infinite potential
    that it is capable of.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 那需要一万小时来学习——或者掌握——一个新生活领域的日子已经过去了。当你看到这个统计数据时，这根本说不通。不挑战这种集体信念，你关闭了通向它能够实现的无限潜力的思维。
- en: I’m not a jack of all trades; I’m a master of many. I don’t feel there is anything
    I can’t do if I want to. — Evel Knievel
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我不是一个万事通；我是一个多面手。我不觉得有什么是我做不到的。——伊夫·克尼维尔
- en: Jack of all trades, master of all. Anything other line of thought is self-limiting
    and will seep into your psyche to toy with your emotions like a puppet master.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 百艺通人，万事通。任何其他的思维方式都是自我限制的，并且会渗透到你的心理，像木偶大师一样玩弄你的情绪。
- en: Let’s take Leonardo Da Vinci for example. Leo — as we will call him — was an
    architect, sculptor, painter, and is known by the entire *world* as the greatest
    artist of the Renaissance era. Riches are in the niches my ass.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 以达芬奇为例。利奥——我们将这样称呼他——是一位建筑师、雕塑家、画家，并且被全世界公认为文艺复兴时期最伟大的艺术家。财富在壁龛里，我的屁股。
- en: Rogan? Gambino? Musk?
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 罗根？甘比诺？马斯克？
- en: '*It seems like the key to* *all of* *this is becoming a master of all, but
    channeling that mastery toward one BIG goal in life.*'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '*这似乎是所有这一切的关键是成为万事通，但将这种精通集中在生活中一个大的目标上。*'
- en: The Dangers of Blurred Perception
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模糊感知的危险
- en: A few weeks ago we talked about the depth behind focus and how it’s not all
    about deep work — it’s about every single aspect of your life. Focus, to me, can
    be synonymous with ordered consciousness, the opposite of chaotic consciousness
    that leads to “psychic entropy,” or that the mind tends toward disorder if *not*
    focused. This is the difference between certainty and uncertainty. A sense of
    control or a sense of despair over the outcome of your life. Arguably the key
    to happiness. It’s time to upgrade the tools of our focus.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 几周前我们讨论了专注的深度以及它不仅仅是关于深度工作——它是关于你生活的每一个方面。对我来说，专注可以与有序的意识同义，与导致“精神熵”的混乱意识相反，或者说是如果*不*专注，思想倾向于无序。这是确定性和不确定性之间的区别。对生活结果的控制感或绝望感。可以说是幸福的关键。是时候升级我们专注的工具了。
- en: Think of your individual perspective — or worldview — as a DSLR camera. The
    ones that fancy photographers use. The cameras themselves have varied settings
    and *programming* that allow them to *see* the world in front of them. These cameras
    allow you to attach different lenses that allow for different focal lengths and
    amount of light that is being received. The cameras also have an “auto” and a
    “manual” setting for many different functions, but lets talk about it in relation
    to focus.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 想想你的个人观点——或者世界观——就像一台单反相机。那些喜欢摄影的人使用的。这些相机本身有各种设置和*编程*，使它们能够*看到*它们面前的世界。这些相机允许你安装不同的镜头，以实现不同的焦距和接收到的光线量。相机还有许多功能的“自动”和“手动”设置，但让我们先谈谈与焦点相关的内容。
- en: When your lens is blurred, you can’t see what’s on the other side of the blur,
    you can only assume. You can only tell yourself a story of what’s on the other
    side. This is perception.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的镜头模糊时，你看不见模糊的另一边是什么，你只能猜测。你只能给自己讲述一个关于模糊另一边的故事。这是感知。
- en: What comprises our worldview — or perspective — in reality? Our beliefs, biases,
    goals, values, vision, and everything else that has been programmed into our heads.
    The beliefs, biases, etc are not the problems in themselves. A lack of choice
    and consciousness are the problem. When left unconscious — or when our camera
    is left on “auto” mode — survival comes into play.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 现实中构成我们的世界观——或观点——是什么？我们的信仰、偏见、目标、价值观、愿景以及所有被编程进入我们头脑的东西。信仰和偏见本身并不是问题。缺乏选择和意识才是问题。当它们处于无意识状态——或者当我们的相机处于“自动”模式时——生存机制就会发挥作用。
- en: “Until you make the unconscious conscious, it will direct your life and you
    will call it fate.” — C.G. Jung
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “直到你将无意识变为有意识，它将指引你的生活，而你将称之为命运。” —— C.G. 荣格
- en: Survival is a part of our everyday lives and is an unavoidable function of the
    human psyche, until we evolve beyond it(?). But when these survival mechanisms
    are unconscious, what are we trying to survive? The notion of the self. Meaning,
    we attach to these beliefs and biases and act as if we are them. They become a
    part of our identity. If something as simple as your unconscious attachment to
    bodybuilding feels threatened by someones opinion, your focus contracts and your
    perception blurs. If your identification with becoming jacked and tan gets threatened,
    you perceive the world from the lens of your survival being at stake.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 生存是我们日常生活中的一个部分，是人类心理的一个不可避免的功能，直到我们超越它（？）。但当这些生存机制是无意识的，我们试图生存的是什么？是自我的概念。也就是说，我们依附于这些信仰和偏见，并表现得好像它们就是自己。它们成为我们身份的一部分。如果你的无意识对健身的依附因为某人的观点而受到威胁，你的注意力就会收缩，你的感知就会模糊。如果你的目标变得健壮和晒黑受到威胁，你会从你的生存受到威胁的角度来看待世界。
- en: 'This is a lifelong process of becoming aware of your shadow and integrating
    it through acceptance and behavior change, but there’s a bigger lesson here:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个终身的过程，旨在通过接受和行为改变来意识到你的阴影并将其整合，但这里有一个更大的教训：
- en: When your perception is blurred, you cannot see the world for *what it is.*
    You will miss out on the learning process that is life itself.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的感知模糊时，你无法看到世界的真实面目。你会错过生命本身的学习过程。
- en: This is about learning, and becoming aware of your inaccurate perception is
    the first step to opening yourself *to* learning. I am sure we will dive deeper
    than we already have into this subject, but it feels necessary to bring it to
    your attention.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这关乎学习和意识到你的不准确感知是打开学习之门的第一个步骤。我相信我们将比现在更深入地探讨这个主题，但将这一点带到你的注意下似乎是必要的。
- en: 'Mid Koe Letter reminder: [Readers can join Modern Mastery for $5.](https://modernmastery.co/letter)
    What’s inside? 180+ proven strategies and personalized help to succeed in life
    and one-person business ownership.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: Mid Koe Letter 提醒：[读者可以以 $5 的价格加入 Modern Mastery。](https://modernmastery.co/letter)
    里面有什么？180 多种经过验证的策略和个性化帮助，以成功生活和拥有一人企业。
- en: Opening Your Mind To The Unknown
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 打开你的心扉，拥抱未知
- en: With blurred perception, you will judge and assume the world around you in a
    mechanical, automatic fashion. With clear perception, you will observe and discern
    in an open and conscious fashion. That is the message with all of this. If you
    are trying to learn business, but are so focused on the wrong aspects of business
    because you have a poor, attached relationship with money… you will be scratching
    your head wondering why everyone else is making twice as much progress with half
    the brains.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的感知模糊时，你会以机械、自动的方式判断和假设你周围的世界。而当你的感知清晰时，你会以开放和有意识的方式观察和辨别。这就是所有这些信息的核心。如果你试图学习商业，但因为你对金钱的关系糟糕、依赖，而过于关注商业的某些错误方面……你可能会挠头
    wonder 为什么其他人只用一半的头脑就能取得两倍的成绩。
- en: <picture fetchpriority="high" decoding="async" class="wp-image-705">![](../Images/629f6ba30e1f301ddf4ae535a9508cbd.png)</picture>
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-705">![](../Images/629f6ba30e1f301ddf4ae535a9508cbd.png)</picture>
- en: We’ve discussed the concept of the unknown — the land of infinite potential
    — many times before. This time is no different. The Unknown, in this context,
    is seeing reality for what it is. That is, being open to what our everyday consciousness
    leaves out due to our conditioned perceptions. This stems far beyond clearing
    your own lens. It means being able to throw your lens away completely and being
    open to seeing through any lens. Some know this as empathy and I don’t want to
    get it twisted. We are simply being open here to start. Assumptions and judgements
    while trying to adopt other’s perspectives seems against the point. Be open to
    the moment as it arises, as that’s what it is, a happening.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们之前多次讨论了未知的概念——无限潜力的土地。这一次也没有不同。在这个背景下，未知就是看到现实的本来面目。也就是说，对我们日常意识由于我们条件化的感知而忽略的东西保持开放。这远远超出了清除你自己的眼镜。这意味着能够完全扔掉你的眼镜，并开放地通过任何眼镜来看。有些人把这称为同理心，我不想把它搞混。我们在这里只是开放地开始。在试图采用他人的观点时，假设和判断似乎与这个观点相悖。对出现的时刻保持开放，因为那就是它，一个发生。
- en: Perception is selective. Right now, think, what are you focusing on? The words
    on this screen. But what allows the words to *be?* The white space behind it.
    Like how a song is a series of noises, but without spaces of silence, without
    lows to the highs, without slow to the fast, it wouldn’t be a song… it would be
    a long screech. As is the Universe. Uni = one. Verse = song.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 感知是具有选择性的。现在，想想看，你在关注什么？屏幕上的文字。但是什么让文字*存在*？它背后的空白。就像一首歌是一系列噪音，但没有沉默的空间，没有从低到高的起伏，没有从慢到快的转变，它就不会是一首歌……它将是一长串尖叫。宇宙也是如此。Uni
    = 一。Verse = 歌曲。
- en: Let’s apply.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始应用。
- en: The Meta Skill Of Meta Skills
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 元技能的元技能
- en: Learning is a foundational human drive. What do we do from the second we are
    born? Learn. How else would we end up in the position we are in now? The problem
    is that we have been conditioned into seeing a one-dimensional way of life. A
    shallow existence without depth. Study this, ignore that. Write this way, not
    that way. Follow these goals, not your own. Do as I say, not as you say.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 学习是人类的基本驱动力。我们从出生的那一刻起做什么？学习。我们如何才能达到现在的位置？问题是，我们已经被条件化为看到一种一维的生活方式。一种没有深度的浅薄存在。研究这个，忽略那个。这样写，不要那样写。遵循这些目标，而不是你自己的。照我说的做，而不是照你说的做。
- en: This has caused a polarization of human consciousness itself. Low consciousness,
    high unconsciousness. What is going under your nose and how is that preventing
    you from getting the most out of life? We are taking a very broad approach to
    learning here. Life is our context. But as with most things I talk about that
    reflect universal laws, it can be applied to any dimension. Macro or micro.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这导致了人类意识本身的极化。低意识，高无意识。你鼻子下面发生了什么，以及它是如何阻止你从生活中获得最大利益的？我们在这里采取一个非常广泛的学习方法。生活是我们的背景。但就像我谈论的大多数反映普遍规律的事情一样，它可以应用于任何维度。宏观或微观。
- en: 'Here are 5 steps to 10x your learning in any reality you choose: personal,
    cultural, social, universal, situational, conversational… any.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是五个步骤，帮助你选择任何现实中的学习实现10倍增长：个人、文化、社会、宇宙、情境、对话……任何。
- en: 1) Open Your Mind
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 打开你的心扉
- en: This is a given. How can you learn if your mind is closed to learning itself?
    This, of course, will take time and practice as with anything good in life.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这是个前提。如果你的心扉对学习本身关闭，你如何能学习呢？当然，这需要时间和实践，就像生活中任何美好的事物一样。
- en: 'I like to think of this in terms of the social media comment section. When
    someone with a lot of followers makes a post — doesn’t matter what it is — the
    comments fall into 4 different camps:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢用社交媒体评论区来思考这个问题。当有很多人关注的人发帖时——无论是什么内容——评论会分为四个不同的阵营：
- en: Those that ask questions out of curiosity (open mind)
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 那些出于好奇心提出问题的人（开放心态）
- en: Those that react based off of what they perceive, not seeing beyond what was
    said (closed mind)
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 那些根据他们感知的反应，没有看到所说的内容之外的人（封闭心态）
- en: Those that reply for the sake of siphoning followers (business)
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了吸粉而回复的人（商业）
- en: Those that are encouraging or just reply with an emoji (good people)
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 鼓励他人或只是用表情符号回复的人（好人）
- en: The first is open to learning. However that leads to another problem which we
    discuss in point two. The second, through lack of self-awareness and a puzzling
    desire to not enjoy themselves, see what they see and use what they *know* to
    spark an argument.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 第一种心态是开放的，然而这又引出了另一个问题，我们在第二点中讨论。第二种，由于缺乏自我意识和对不享受自己、看到他们看到的东西以及使用他们*知道*的东西来引发争论的困惑欲望。
- en: I don’t have to tell you the problem with this. If I tell you that you can make
    $1M as a one-person business, what’s your reaction? Is it “impossible” because
    you haven’t been exposed to that potential reality? Is the logical solution to
    close your mind to it forever and hide in the comfortable reality you’ve trapped
    yourself in?
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我不必告诉你这个问题。如果我告诉你你可以作为一个个体户赚取100万美元，你的反应是什么？是不是觉得“不可能”，因为你还没有接触到那种潜在的现实？逻辑上的解决方案是不是永远关闭你的思维，躲在你自己陷入的舒适现实中？
- en: This is one thing that truly gets on my nerves when on socials (working on it)
    but why are you even on social media or living if not to make the most of it?
    In reflection, one of my goals has always been to prove people wrong. Good or
    bad, it has led to in depth newsletters, courses, and other content because I
    cannot stop learning about how to prove limiting perspectives (and myself) wrong.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我社交时（正在努力改进）真正让我感到烦恼的一件事，但如果你不是为了充分利用它而使用社交媒体或生活，那你为什么要这样做呢？反思一下，我的一个目标一直是证明人们是错的。无论好坏，这都导致了深入的新闻通讯、课程和其他内容，因为我无法停止学习如何证明限制性的观点（以及我自己）是错误的。
- en: 2) Environment Immersion
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 环境沉浸
- en: When you are open to learning, it would be silly to rely on any given person
    to provide all of the material for you. With the social media example, let’s picture
    that someone made an educational post on getting six pack abs. You can already
    here the closed-mindedness and limiting beliefs.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 当你愿意学习时，依赖任何给定的人为你提供所有材料是愚蠢的。以社交媒体的例子来说，让我们想象有人发布了一篇关于如何获得六块腹肌的教育性帖子。你已经开始听到那些封闭思维和限制性信念了。
- en: '*“Lol you think that everyone can just lose weight???”*'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '*“哈哈，你以为每个人都能减肥吗？？？”*'
- en: '*“Intermittent fasting? That’s idiotic, we’ve been eating breakfast for centuries!”*'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '*“间歇性禁食？这太愚蠢了，我们吃早餐已经几百年了！”*'
- en: '*“Raw beef liver is the most nutrient dense food on the planet? Wow, don’t
    care either way.”*'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '*“生牛肉肝是地球上营养最丰富的食物？哇，不管怎样都不在乎。”*'
- en: While I have no ties to these things (for those wondering if I still eat raw
    liver, no) closing your mind to just one thing closes your mind from branching
    into other pathways for something that *may* be conducive to a better future.
    Opening your mind to intermittent fasting — as an example — gives you a new perspective
    to open your mind further. Through perspective collection, you can connect the
    dots and create a solution for your health that is perfectly tailored to you.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我与这些事物没有联系（对于那些想知道我是否还在吃生肝的人来说，没有），但关闭你的思维去关注一件事，就会关闭你从其他可能有助于更好未来的路径中拓展思维的大门。以间歇性禁食为例，打开你的思维给你提供了一个新的视角，进一步打开你的思维。通过收集观点，你可以连接点，为你量身定制一个健康解决方案。
- en: 'Those that are open to improving their health after seeing that post can go
    one of two routes:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 那些在看到那篇文章后愿意改善自己健康的人可以走两条路：
- en: Start asking the creator for all of the answers, expecting 5 books worth of
    information from somebody who has their own priorities
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 开始向创造者寻求所有答案，期望从有自己优先事项的人那里得到相当于五本书的信息。
- en: Take it as their responsibility to educate themselves in a domain that will
    improve their life.
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将自我教育视为他们的责任，在一个能改善他们生活的领域。
- en: In the second case, environment immersion is the answer. In essence, this means
    controlling or [framing your focus](https://thedankoe.com/how-to-master-your-focus/)
    to be exposed to information relating to the desired outcome. Following social
    media accounts that are giving different perspectives. Buying books, listening
    to podcasts, talking to your health nut friends, signing up for classes, or anything
    else within your power to become immersed in the environment that will seemingly
    overload you with information.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在第二种情况下，环境沉浸是答案。本质上，这意味着控制或[调整你的关注点](https://thedankoe.com/how-to-master-your-focus/)，以便接触到与期望结果相关的信息。关注提供不同观点的社交媒体账户，购买书籍，收听播客，与注重健康的朋友交谈，报名参加课程，或者任何你能够沉浸其中的环境，似乎会给你带来信息过载。
- en: To prevent overload, practice detachment and critical thinking. Do not take
    any advice as law. Yes, even mine. I am simply a perspective in infinity.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 为了防止信息过载，练习超然和批判性思维。不要将任何建议视为定律。是的，即使是我的。我只是一个在无限中存在的观点。
- en: 3) Silent Observation
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 沉默观察
- en: I just got back to Arizona yesterday afternoon. After driving for 10 hours 2
    days in a row, it was a given that I had to catch up on steps, so I went on a
    ~2 hour walk to explore the city. The novelty of the shops paired with the intention
    to learn where I would want to walk on a daily basis, I learned quite quick.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我昨天下午才回到亚利桑那州。连续两天开车10小时后，我必须赶上步伐是肯定的，所以我进行了一次大约2小时的散步来探索这座城市。商店的新鲜感加上我想要每天散步的意图，我学得相当快。
- en: Silent observation is about *keeping* your mind open to learning. It can be
    easy to “shut down” after you feel like you’ve learned everything. Our mind is
    tricky. It likes to latch onto the ideas that best serve the ego.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 沉默的观察是关于*保持*你的心态开放以学习。在你觉得自己已经学到了所有东西之后，“关闭”可能会变得容易。我们的思维很狡猾。它喜欢抓住最能服务于自我的想法。
- en: If I hear diet advice online that is perfectly marketed to me, I could easily
    accept it as law, test it out, see good results, and feel like that is the best
    option for everyone — when it may not even be the best option for *me**!*
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我在网上听到针对我的完美营销的饮食建议，我很容易接受它作为法律，尝试它，看到好的结果，并感觉这是对每个人都是最好的选择——即使它可能甚至不是对我最好的选择！**
- en: 4) Connect The Dots
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 连接点
- en: The Law of Use.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 使用法则。
- en: “If you don’t use it, you lose it.”
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: “如果你不用它，你就会失去它。”
- en: There is a reason everyone and their mother is screaming at the top of their
    lungs for you to take action. Why, you ask?
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个原因，每个人和他们的母亲都在大声疾呼让你采取行动。你问为什么？
- en: Because you **do not learn a single thing** if you don’t. If you do not solidify
    your findings with direct experience and go on to teach someone, you are spreading
    a lie. You are parroting what someone else said. You are acting out a robotic
    life giving advice that you haven’t implemented yourself. This is more of a disservice
    to you than it is the person you are giving the advice.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 因为你**如果不这样做，你就学不到任何东西**。如果你不通过直接经验巩固你的发现，然后去教别人，你就是在传播谎言。你是在重复别人的话。你是在扮演一个没有自己实施建议的机器人生活。这对你来说更多的是一种伤害，而不是你给的那个人。
- en: There are more ways than physical to take action. You can write, think, meditate,
    and use other methods depending on what it is that you learned.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 采取行动的方式比物理方式更多。你可以写作、思考、冥想，并根据你所学的内容使用其他方法。
- en: When you Use what you learn, you are forced to do it in your own way. You will
    face resistance until you breakthrough. When everything “clicks” and you have
    that “aha!” moment, you will feel the dopamine levels in your brain increase.
    You will feel the excitement.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 当你使用你所学的知识时，你被迫以自己的方式去做。直到你突破，你才会面临阻力。当一切“点击”并你有那种“啊哈！”的时刻，你会在大脑中感受到多巴胺水平的增加。你会感到兴奋。
- en: This phenomenon will continue happening as long as you are immersed in an environment
    and using what you learn. That is why I write so much — because I enjoy consuming
    information that I want to learn more about. I treat my mind, body, and business
    as a science project. I implement fast and reap the neurobiological benefits of
    doing so.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 只要你沉浸在某个环境中并使用你所学的知识，这种现象就会持续发生。这就是我为什么写这么多——因为我喜欢消费我想了解更多信息。我把我的思想、身体和事业当作一个科学项目。我快速实施并从中获得神经生物学的好处。
- en: 5) Stack Experience
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5) 堆积经验
- en: With an open mind, conducive environment, clear observation, and dots being
    connected — your learning will compound. It is incredible how fast you can learn
    when you don’t latch on to specific beliefs.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 以开放的心态、有利的环境、清晰的观察，以及将点连接起来——你的学习将会累积。当你不固守特定的信念时，你学习的速度之快令人难以置信。
- en: 'Complexity is the result of two broad psychological processes: differentiation
    and integration. Differentiation implies a movement toward uniqueness, toward
    separating oneself from others. Integration refers to its opposite: a union with
    other people, with ideas and entities beyond the self. A complex self is one that
    succeeds in combining these opposite tendencies. — Mihaly Csikszentmihalyi'
  id: totrans-65
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 复杂性是两种广泛的心理过程的产物：差异化和整合。差异化意味着向独特性发展，意味着将自己与他人区分开来。整合指的是其对立面：与他人、与自我之外的思想和实体结合。一个复杂的人是那些成功结合这些对立倾向的人。
    —— 米哈伊·契克森米哈伊
- en: With time, your life XP will continue increasing. Your self will become more
    complex. You will start to enjoy life more because you don’t feel the need to
    defend your own perspective — because you know there are infinite other perspectives
    out there. Latching onto one is the cause of suffering.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，你的生活经验值将持续增加。你的自我将变得更加复杂。你会开始更加享受生活，因为你不需要为自己的观点辩护——因为你知道那里有无限多的其他观点。执着于其中之一是痛苦的根源。
- en: — Dan Koe
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: — 丹·科
- en: '**What Happened This Week**'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**本周发生了什么**'
- en: I just got back to AZ and will be getting back on the YouTube schedule soon.
    I have some cool things planned for the newsletter and other content as a whole.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 我刚刚回到亚利桑那州，很快就会恢复YouTube的更新计划。我为通讯和整体内容规划了一些有趣的事情。
- en: Inside Modern Mastery, Sana — a personal brand consultant — posted a framework
    on how she walks clients through crafting their own story. So many creators want
    (and need) to write about their story. She shows you how to do it for maximum
    affect. Your story is your most powerful marketing tool.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在现代精通领域，Sana——一位个人品牌顾问——发布了一个框架，展示了她是如何帮助客户打造他们自己的故事的。许多创作者都希望（并且需要）写关于他们的故事。她展示了如何做到这一点以产生最大影响。你的故事是你最强大的营销工具。
- en: '[Readers can join for $5 here.](https://modernmastery.co/letter)'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '[读者可以在此以5美元的价格加入。](https://modernmastery.co/letter)'
- en: One last thing, I will be starting pre-sale for a new product, The 2 Hour Writer,
    in next weeks Koe Letter. If you want to learn how I batch my newsletter, tweet,
    and thread writing (while repurposing for all platforms) in under 2 hours, keep
    an eye out for that.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一件事情，我将在下周的科信中开始新产品的预售，名为《两小时作家》。如果你想知道如何在不到两小时内批量撰写通讯、推文和帖子（同时为所有平台进行再利用），请密切关注。
