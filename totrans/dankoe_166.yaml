- en: How To Launch Into A Completely New Life
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/how-to-launch-into-a-completely-new-life/](https://thedankoe.com/letters/how-to-launch-into-a-completely-new-life/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2650">![](../Images/364a374a132eac70c95d716ce7b88b0e.png)</picture>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: First, understand that life unfolds in chapters.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: 'Each chapter is a predictable sequence of 4 phases:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: '**Limbo** – you don’t know what to do or what you want.'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Vision** – an image for the future forms, you act on a new path, momentum
    builds.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Flow** – you can’t pull yourself away from the goal you’re pursuing.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resistance** – exponential progress doesn’t last forever, but you don’t want
    it to end, often to your own detriment.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: But most people get stuck in the limbo phase.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Your entire life, you’ve been trained to follow a script.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: You’re used to the linear results of schools and jobs.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: You’re used to someone else giving you your certainty.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: But when it comes to living an unconventional life (because that’s the only
    way to get unconventional results) you interpret “feeling lost” as a bad sign.
    So you jump ship and return to the comfortable life that was planned for you in
    a system that only cares for its own benefit.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: And that’s probably why you’re reading this.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: You hate the thought of ending up like everyone else.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: But that means you’re on your own.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: You feel like you’re lost in a dense forest. You can’t *see* anything through
    the trees, so you don’t realize there’s a path 5 yards away that leads to the
    top of the mountain’s peak.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: The worst thing you can do in this situation is nothing.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how you get out:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: By the way, I created an [AI prompt that turns your life into a video game](https://app.kortex.co/public/document/b9063db2-418b-4876-ba20-45c354d33f0a).
    You can use it to guide you through implementing this letter (it’s pretty sweet).
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 1) How to collect vision
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Your mind makes sense of the world in stories.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: That’s why you feel lost.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: Because you don’t know what story you are living out, or you’re living out a
    story that someone else assigned to you and you can feel that misalignment in
    your soul.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: The hardest part about taking back control of your life is collecting the right
    puzzle pieces until just the right amount of vision forms where you have enough
    clarity to act with confidence.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: At first, the puzzle looks like a jumbled mess.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: Your brain can’t make sense of it.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: You get stressed and worried which leads to a narrow and negative mind which
    makes it painstakingly difficult to notice new opportunities.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: That’s why you feel stuck.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: 'So that’s step one:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: '*Give yourself permission to allow your life to get worse.*'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: Weren’t expecting that?
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: Let me explain.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: The reason you feel lost, dull, or even lifeless is because you don’t have a
    clear goal to work towards.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: But you don’t know what you want.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: Since you feel lost and your mind is turbulent, a “clear goal” is the last thing
    your mind will be able to think of, and you’ll often make excuses as to why that
    isn’t the right one to pursue.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 由于你感到迷茫，你的思维动荡，一个“明确的目标”将是你的大脑最后能想到的东西，你经常会找借口说那不是正确的追求目标。
- en: The thing is, goals don’t exist in isolation.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，目标并不是孤立存在的。
- en: 'A strong, purposeful goal is the result of the exact opposite:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 一个强大、有目的的目标是以下情况的直接对立面：
- en: '*A negative outcome that you will fight tooth and nail to avoid, and once you’ve
    experienced that outcome first hand, you’ll do anything to not relive it.*'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '*一个你将不惜一切代价避免的负面结果，一旦你亲身体验过这种结果，你将做任何事情来避免再次经历它。*'
- en: You need a problem to solve. An enemy to attack. And when you have something
    to avoid, your goal increases in both gravity and clarity.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要一个需要解决的问题。一个需要攻击的敌人。当你有需要避免的东西时，你的目标在重要性和清晰度上都会增加。
- en: So that’s where you turn your focus.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 所以这就是你将注意力转向的地方。
- en: Ask yourself, “If I keep doing the same things, where will my life end up?”
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 问问自己，“如果我继续做同样的事情，我的生活会走向何方？”
- en: Sit with that thought.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 沉浸在那个想法中。
- en: Really sit with it.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 真正地沉浸在其中。
- en: Let it consume your mind, because when it starts to take over, your mind will
    be hungry to learn, experiment, and grow.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 让它占据你的思维，因为当它开始接管时，你的大脑将渴望学习、实验和成长。
- en: 2) How to change your mind
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 如何改变你的思维
- en: You act the way you do right now because you already have a goal.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在的行为方式是因为你已经有一个目标。
- en: That’s how the mind works.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是思维的工作方式。
- en: Your mind is a goal striving machine that perceives the world in a way that
    allows it to collect useful information to achieve that goal.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 你的大脑是一个追求目标的机器，它以允许它收集有用信息以实现目标的方式感知世界。
- en: The thing is, you’re unconscious of what goal you’re pursuing, and it’s ruining
    your life.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，你并没有意识到你正在追求什么目标，这正在毁掉你的生活。
- en: Aristotle believed that the final cause of a situation is the ultimate purpose
    or end goal for which it exists.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 亚里士多德认为，一个情况的最终原因是它存在的最终目的或最终目标。
- en: In Adlerian psychology, with a focus on teleology, we are not pushed by our
    past, but pulled by our goals. We act in a way that is beneficial toward the *aim*
    in which we’re directed, as Jordan Peterson would probably put it.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在阿德勒心理学中，侧重于目的论，我们不是被我们的过去推动，而是被我们的目标吸引。我们以有利于我们被引导的目标的方式行事，正如乔丹·彼得森可能会说的。
- en: 'In other words (and this is a mind bender for many):'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说（这对许多人来说是一个思维挑战）：
- en: You are in your current situation because you want to be, but that’s unconscious
    to you and you probably won’t believe it at first.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 你处于当前的情况是因为你想要这样，但这对你是无意识的，你可能一开始不会相信这一点。
- en: You feel lost, confused, or overwhelmed because it’s beneficial for achieving
    the goal of *avoiding the pain, fear, and embarrassment that comes with doing
    something unconventional with your life.*
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 你会感到迷茫、困惑或不知所措，因为这对实现避免因生活中做出非传统选择而带来的痛苦、恐惧和尴尬的目标是有益的。
- en: You have already primed your mind for change by gaining complete awareness of
    the negative outcome of your life.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经通过完全意识到你生活的负面结果来为改变你的思维做好了准备。
- en: Now, to change your mind completely, you need to immerse yourself in new sources
    of information to discover the puzzle pieces that lead to clarity.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，要彻底改变你的思维，你需要沉浸在新信息源中，以发现通往清晰度的拼图碎片。
- en: Read new books.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 阅读新书。
- en: Talk to new people.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 与新人交谈。
- en: Follow new accounts.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 关注新的账户。
- en: Visit a place you’ve been wanting to go.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 去一个你一直想去的地方。
- en: Go on a long walk and throw on a podcast.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 去散步，并扔上一个播客。
- en: Take a course on a new skill to enhance your career or start a business.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 报名参加一门新技能的课程以提升你的职业生涯或开始一项业务。
- en: Or, turn AI into your focus coach or strategic advisor using this free [mini
    course I put out last week](https://stan.store/thedankoe/p/mini-course-how-i-systemize-my-life-with-ai)
    on how I systemize my life with AI.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，使用我上周发布的这个免费[迷你课程](https://stan.store/thedankoe/p/mini-course-how-i-systemize-my-life-with-ai)将AI变成你的专注教练或战略顾问，这个课程讲述了我是如何用AI系统化我的生活的。
- en: It doesn’t really matter what information you consume as long as it’s something
    that has the potential to spark change.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，你消费的信息是什么并不重要，只要它有激发变革的潜力。
- en: When your mind is in a state of wanting to avoid the current trajectory of your
    life (the new goal), this is when true learning occurs. You will feel the dopamine
    spurt into your brain when you find a potential opportunity to pursue.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的大脑处于想要避免当前生活轨迹（新目标）的状态时，这才是真正的学习发生的时候。当你找到一个追求的机会时，你会感觉到多巴胺涌入你的大脑。
- en: Within a few weeks, you should have some idea of the life you want to live.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: You have a map, but now comes the territory.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: 3) Gamify your life
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Your mind runs on a storyline.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: Games are pre-constructed stories with certain mechanisms that narrow your focus
    and make progress enjoyable.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: 'When you play a game, there are:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: A clear hierarchy of goals so you know how to win
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Direct feedback so you know when you are making progress
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Rules that add a sense of challenge and skill development
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All of these are core components of flow psychology.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: And flow is the state of optimal experience that we often crave (or become addicted
    to).
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: Social media, gaming, and entertainment companies spend billions upon billions
    of dollars on constructing the most addictive information that leverages these
    things.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: What most people don’t realize, however, is that you can replicate this same
    effect in your life.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: Instead of the illusion of progress and improvement, you become someone new
    in the process.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how to gamify your life:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Design the game**'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: First, understand that most people have a mediocre definition of a goal.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: A goal is an *aim.*
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: A goal is not something that you must achieve at all costs.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: A goal is a lens from which to make decisions. The goals themselves are *supposed*
    to change and evolve as you become more experienced.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: Most people write off the following list as something that “doesn’t work” when
    it isn’t supposed to be set in stone.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: '**Create a hierarchy of goals** composed of an end goal, long term goals, and
    short term goals'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Create the rules** – what are you not willing to sacrifice in your life to
    make progress toward the end goal? (Health, relationships, long working hours,
    etc)'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Use quantifiable priority tasks as feedback loops** like writing 1000 words
    a day, reading 10 pages, or reaching out to 5 potential clients'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your life loses the spark of novelty and pattern recognition when you have a
    vague or unconscious story you are living out.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: When you create the order your mind craves, chaos is much easier to keep at
    bay.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Create a tutorial phase**'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: In a game, you learn by doing, not by studying endless tutorials or observing
    gameplay.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: You can study tutorials, of course, but if you haven’t even started the game
    then it is not learning, it is entertainment.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: When you watch a tutorial after playing the game, you can spot strategies and
    tactics to experiment with the next time you play.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: Start playing the game.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: Don’t worry if you aren’t absolutely confident in whether it’s what you want
    to do for the rest of your life because you figure out what you want to do by
    error correcting. You can’t correct an error that doesn’t exist.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: 'Once you are playing (and only once you are playing) supplement your mind with
    education on two things:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: '**The fundamentals** – most success is not getting distracted from these.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Specific solutions** – an intentional search for an answer once you can’t
    make progress by your own knowledge or intuition.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The main priority tasks for your day should be *learning and building* for 1-2
    hours at a time. These do not happen in isolation.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 你每天的主要优先任务应该是每次学习或构建1-2小时。这些活动不是孤立发生的。
- en: 'For those who haven’t made AI a part of their life yet, this is arguably the
    best use case for it: to get unstuck.'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些还没有将AI作为他们生活一部分的人来说，这可能是最好的用例：摆脱困境。
- en: If I’m creating something in Photoshop and get stuck, I can simply ask AI to
    teach me how to do the next step.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我在Photoshop中创建某个东西时遇到了困难，我可以简单地让AI教我下一步怎么做。
- en: If I don’t know why I’m stuck, I can give AI everything about the situation
    and ask it to identify my blindspots.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我不知道为什么我陷入了困境，我可以把关于这个情况的所有信息都告诉AI，并让它识别我的盲点。
- en: '**3) Stay at the edge of the unknown**'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 勇敢地探索未知**'
- en: In some video games, you have a mini-map.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在一些视频游戏中，你有一个小地图。
- en: The map is dark in places you haven’t explored and visible in places you have.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 地图在你尚未探索的地方是黑暗的，在你已经探索的地方是可见的。
- en: 'This indirectly represents two things in the game: your experience and skill
    level.'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 这间接代表了游戏中的两个东西：你的经验和技能水平。
- en: Usually, the dark places have higher level monsters, quests, and challenges.
    If you were to somehow get to them as a low level, you would either be killed
    immediately or would spend your time outrunning people. That isn’t fun.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，阴暗的地方有更高等级的怪物、任务和挑战。如果你作为一个低等级的角色试图进入这些地方，你可能会立即被杀，或者你会花费大量时间在逃跑。这并不有趣。
- en: On the flip side, if you never explore the dark places, you get bored. Again,
    not fun. You’ve done everything already. You can kill monsters with ease and don’t
    have any more quests to do.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 反之，如果你从不探索阴暗的地方，你会感到无聊。再次强调，这并不有趣。你已经做了一切，你可以轻松地杀死怪物，也没有更多的任务要做。
- en: In reality, you get anxious when you don’t know how to take on a task, or you
    get bored when you keep doing the same tasks.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实中，当你不知道如何承担一项任务时，你会感到焦虑；当你不断地做同样的任务时，你会感到无聊。
- en: To stay in the range of optimal experience (enjoying your life), you need to
    consistently cultivate your skill set and take on higher challenges.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保持在最佳体验范围（享受你的生活），你需要持续培养你的技能集并接受更高的挑战。
- en: That’s where the meaningful flow of information is maximized.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 那里才是信息流动最有意义的最大化之处。
- en: That’s where you feel as if you are always learning something new.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 那里你会感觉好像你总是在学习新东西。
- en: That’s where your life becomes an enjoyable blur of progress – a spiritual state
    of clear perception where things “just feel right.” The golden days.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 那里你的生活变成了令人愉快的进步模糊——一种清晰的感知精神状态，事情“感觉就是对的。”金色的日子。
- en: This is also why a 9-5 job is a great stepping stone, but is often a death sentence.
    You learn and progress until you’re stuck doing the same thing over and over again.
    That’s not a meaningful way to live. It psychologically castrates you and bleeds
    into all areas of your life.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是为什么9-5的工作是一个很好的垫脚石，但往往是死刑判决。你学习和进步，直到你陷入重复做同样的事情。这不是有意义的生活方式。它在心理上阉割了你，并渗透到你的生活的各个方面。
- en: 'It is difficult to give advice for what to do here, but if I could suggest
    something:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里给出建议是困难的，但如果我能提出一些建议的话：
- en: Every week or month, slightly increase the challenge of what you do.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 每周或每月，稍微增加你所做的事情的挑战性。
- en: This *does not* mean adding more work.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 这**并不**意味着增加更多的工作。
- en: It means treating what you do like lifting weights in the gym.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着将你所做的事情视为在健身房举重。
- en: You don’t jump up by 50 pounds. The most developed lifters know that adding
    the smallest 2.5 pound plate every one to two weeks is how they see the most progress
    and stay addicted.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 你不会一下子增加50磅。最发达的举重者知道，每过一两周增加最小的2.5磅的杠铃片是他们看到最大进步和保持上瘾的方法。
- en: I hope this letter was helpful.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这封信对你有帮助。
- en: Let me know if it was.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 如果是这样的话，请告诉我。
- en: – Dan
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
