- en: You Are Obligated To Get Rich In Your 20s
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/you-are-obligated-to-get-rich-in-your-20s/](https://thedankoe.com/letters/you-are-obligated-to-get-rich-in-your-20s/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1843">![](../Images/448f153bfacd04f7f9e6b5b556a0b64d.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: I always felt bad for wanting to make money.
  prefs: []
  type: TYPE_NORMAL
- en: There was an unconscious stigma that it was an evil thing to do. That’s all
    you hear others – who haven’t done much with their life – preach.
  prefs: []
  type: TYPE_NORMAL
- en: I didn’t realize money could be a vessel for spiritual growth.
  prefs: []
  type: TYPE_NORMAL
- en: '*To start this letter:*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Don’t feel bad for wanting to make money.*'
  prefs: []
  type: TYPE_NORMAL
- en: It is the tool that allows you to fulfill your basic needs. It is a necessity
    for survival. Most people reject the need, not want, for money and lock themselves
    into a narrow-minded existence.
  prefs: []
  type: TYPE_NORMAL
- en: Money is a tool to solve problems.
  prefs: []
  type: TYPE_NORMAL
- en: Problems are limits on your mind and potential. When you solve a real problem
    and pass down the solution, you contribute to the evolution of humanity.
  prefs: []
  type: TYPE_NORMAL
- en: Starting a business is one of the most spiritual things you can do.
  prefs: []
  type: TYPE_NORMAL
- en: You are spiritually obligated to get rich in your 20s because money – in today’s
    world – is a barrier to personal development. Higher stages of consciousness are
    difficult to achieve without your basic needs met and meaningful work to focus
    your attention.
  prefs: []
  type: TYPE_NORMAL
- en: Without money, you may get trapped in the default lifestyle of going to school,
    working a job you hate, marrying a spouse you don’t care about, and waking up
    one day wondering where the time went.
  prefs: []
  type: TYPE_NORMAL
- en: Business As A Vessel For Spiritual Growth
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You are being attracted to your highest version, and the depth of your core
    can sense it. The external call to evolve requires you to chisel inward beneath
    the mental constructs that have been layered through your conditioning. – [The
    Art Of Focus](https://theartoffocusbook.com)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The big problem:'
  prefs: []
  type: TYPE_NORMAL
- en: Most people reject the pursuit of material objects because they can’t see beyond
    the material object.
  prefs: []
  type: TYPE_NORMAL
- en: Someone can buy a fancy car on impulse, but it doesn’t have to remain a materialistic
    pursuit.
  prefs: []
  type: TYPE_NORMAL
- en: They can grow to become obsessed with the depth of the car itself. They can
    study its parts, turn it into a career, and use it as a portal into the flow state.
  prefs: []
  type: TYPE_NORMAL
- en: 'Lesson: superficial pursuits can birth metaphysical meaning.'
  prefs: []
  type: TYPE_NORMAL
- en: Someone can start a business in the pursuit of status and money, but that same
    business can introduce them to the depth of skill, customer results, and the inner
    workings of their mind required to run that business. They fall in love with that
    crevice of reality, and that crevice of reality teaches them about reality itself.
  prefs: []
  type: TYPE_NORMAL
- en: The pursuit of money almost always starts as superficial.
  prefs: []
  type: TYPE_NORMAL
- en: That doesn’t mean it’s a bad thing to do.
  prefs: []
  type: TYPE_NORMAL
- en: It may be the only way to expose yourself to depth.
  prefs: []
  type: TYPE_NORMAL
- en: Like lifting weights. You start for the vanity and stay for the therapy.
  prefs: []
  type: TYPE_NORMAL
- en: 'When you find the intersection of:'
  prefs: []
  type: TYPE_NORMAL
- en: What allows you to survive
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What you enjoy doing every day
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What helps other people improve
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Life becomes meaningful and abundant.
  prefs: []
  type: TYPE_NORMAL
- en: Yes, there are “bad” parts that come with making money.
  prefs: []
  type: TYPE_NORMAL
- en: Just like there are “bad” lyrics of a song.
  prefs: []
  type: TYPE_NORMAL
- en: Welcome to life. You will never get rid of the bad. You just learn to zoom out,
    nurture a strong vision for the future, and make sure the overarching narrative
    creates heaven, not hell.
  prefs: []
  type: TYPE_NORMAL
- en: Most people never reach this stage because they can’t pursue a goal until passion
    is developed.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t start out passionate.
  prefs: []
  type: TYPE_NORMAL
- en: You become passionate according to the amount of energy you invest in the goal.
  prefs: []
  type: TYPE_NORMAL
- en: All pursuits are materialistic until a philosophical sense of mastery is formed.
    Then, it becomes their vehicle into the unknown to expand and evolve. Like a relationship,
    you are attracted by their looks (95% of the time) and are only then introduced
    to the depth of their being.
  prefs: []
  type: TYPE_NORMAL
- en: Looks, in all domains of life, are as important as depth. The problem is when
    people never dive deeper. They bounce around on the surface like a distracted
    dopamine junkie.
  prefs: []
  type: TYPE_NORMAL
- en: Their mind plays the familiar past and known future on repeat.
  prefs: []
  type: TYPE_NORMAL
- en: They live out that same experience and never solve the problems that live in
    their head rent-free. The problems that must be solved to evolve beyond their
    current mind and situation.
  prefs: []
  type: TYPE_NORMAL
- en: Eventually, you have to kick those mental tenants out and allow new ones to
    occupy it.
  prefs: []
  type: TYPE_NORMAL
- en: Every external problem requires an internal problem to be solved.
  prefs: []
  type: TYPE_NORMAL
- en: Your mind, your customers minds, and the Universe itself fall into chaos if
    you do not pursue a what-could-be superficial goal to reverse entropy.
  prefs: []
  type: TYPE_NORMAL
- en: You aren’t where you want to be because you haven’t solved the problem that
    unlocks your next level of mind.
  prefs: []
  type: TYPE_NORMAL
- en: Money Is A Spiritual Energy – The Decentralized New Economy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1844">![](../Images/6d4e6b31e0aceb8e04b8f09c48cda9d2.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Most people don’t understand what spirituality is.
  prefs: []
  type: TYPE_NORMAL
- en: They are attracted to it because it promises to ease their suffering, they misinterpret,
    and get attached to a new identity of long hair and hippy clothes to feel special
    (and potentially more noble) than others.
  prefs: []
  type: TYPE_NORMAL
- en: Spirituality is your connection to something greater than yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Spirituality is becoming one with the whole you are a part of.
  prefs: []
  type: TYPE_NORMAL
- en: Sports can be spiritual because you are at one with the team. This is called
    “team spirit.”
  prefs: []
  type: TYPE_NORMAL
- en: Work can be spiritual because you are at one with the impact of your work. “Flow
    state” is often described as a spiritual experience.
  prefs: []
  type: TYPE_NORMAL
- en: Spirituality is the dissolution of the limits that compose your self.
  prefs: []
  type: TYPE_NORMAL
- en: Business gives you a reason to be spiritual.
  prefs: []
  type: TYPE_NORMAL
- en: It exposes you to new problems that demand a new perspective to navigate.
  prefs: []
  type: TYPE_NORMAL
- en: Most people are stuck in the same place as they were 10 years ago. They don’t
    need to read more on spirituality, they need to challenge themselves so they are
    forced to develop themselves to the point of needing spirituality to reach the
    next stage.
  prefs: []
  type: TYPE_NORMAL
- en: Shifting to a spiritual perspective allows you to understand money as energy
    that fuels growth, expansion, and evolution by solving problems.
  prefs: []
  type: TYPE_NORMAL
- en: To “shift to a spiritual perspective” is to zoom out and observe reality.
  prefs: []
  type: TYPE_NORMAL
- en: 'When you do, you notice patterns of nature:'
  prefs: []
  type: TYPE_NORMAL
- en: Unity and division
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creation and destruction
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Centralization and decentralization
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As above, so below.
  prefs: []
  type: TYPE_NORMAL
- en: Reality is the ultimate mental model. This spiritual perspective is the “secret”
    behind the rich and successful. They apply the patterns of nature to their everyday
    actions. They observe the markets, understand their direction, and make sound
    decisions based on that.
  prefs: []
  type: TYPE_NORMAL
- en: One big pattern few people have caught onto is the shift from corporation to
    individual.
  prefs: []
  type: TYPE_NORMAL
- en: Freelancers compose 46.6% of the workforce (increasing substantially from 36%
    in 2020).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The creator economy is projected to double from $250B to $480B by 2028\. People
    think they are late to the party when it’s just getting started.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The economy favors profitable business models. Tech enabled businesses like
    creators can operate at 95% profit margins with digital products and services
    – causing more development in that domain for new platforms and tools.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Big companies are requiring leaders at their company to be active on social
    media for brand reputation. Less corporate marketing, more human marketing.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Corporations are beginning to opt for contractors and creators as workers and
    marketers.
  prefs: []
  type: TYPE_NORMAL
- en: Our team at Kortex is contractor and creator-fueled. We have no employees. We
    generate traffic with creator audiences and give our team flexible workdays with
    contract work.
  prefs: []
  type: TYPE_NORMAL
- en: From a spiritual perspective, it’s not difficult to see the security in turning
    your authentic self into a business.
  prefs: []
  type: TYPE_NORMAL
- en: The Creator Philosophy – It’s Not Just A Fancy Internet Job, It’s A Way Of Life
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1845">![](../Images/53d6157eee708ac7caa6bdf768242b49.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: The creator philosophy is not a business model, but a way of life.
  prefs: []
  type: TYPE_NORMAL
- en: Improve yourself, improve others who want to be helped.
  prefs: []
  type: TYPE_NORMAL
- en: Solve your own problems, sell the solution.
  prefs: []
  type: TYPE_NORMAL
- en: Master yourself, master the world.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are the steps that you can start acting on today:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Master Your Survival (Solve Your Own Problems)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You can’t sustain authenticity when you *need* something from someone else.
  prefs: []
  type: TYPE_NORMAL
- en: Money is a tool to remove dependencies that make you inauthentic.
  prefs: []
  type: TYPE_NORMAL
- en: Every single individual on this earth has to self-actualize in order to contribute
    to humanity in the best way they can. And, humanity is only as strong as its weakest
    link. A business allows you to encounter true problems, solve them, and pass down
    products that expand the mind’s of others.
  prefs: []
  type: TYPE_NORMAL
- en: While this can be done with the perfect career path, that’s not what I can help
    with. Nor is it something that you have full control over.
  prefs: []
  type: TYPE_NORMAL
- en: Entrepreneurship is modern-day survival.
  prefs: []
  type: TYPE_NORMAL
- en: We hunt for resources (money, in the modern sense) to fulfill our needs and
    *create* work that we enjoy. And if we don’t enjoy certain aspects, a business
    allows you to eliminate, delegate, or automate that aspect of work.
  prefs: []
  type: TYPE_NORMAL
- en: 'My recommendation is still the same as all of my letters:'
  prefs: []
  type: TYPE_NORMAL
- en: Solve the superficial problems in your life
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Become multidimensionally jacked (mind, body, money, and relationships)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Discover your deeper interests and obsessions through improvement and building
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Document your journey and solutions with content and products on the internet
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 95% of people’s problems revolve around health, wealth, relationships, and happiness.
  prefs: []
  type: TYPE_NORMAL
- en: If you can solve those problems in your own life and document the solution,
    you can charge for the knowledge you acquire.
  prefs: []
  type: TYPE_NORMAL
- en: We discussed this in the last letter [Zero To $1 Million As A One-Person Business](https://thedankoe.com/letters/zero-to-1-million-as-a-one-person-business-while-working-2-4-hours-per-day/).
  prefs: []
  type: TYPE_NORMAL
- en: Individuals don’t learn best from someone 10 steps ahead of them, but from someone
    that is 1 step ahead of them.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Create Your Own Philosophy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There is enough shallow advice on how to make money, how to get laid, and various
    bandaids you can apply to your mental health.
  prefs: []
  type: TYPE_NORMAL
- en: We need more individuals who are truth seekers.
  prefs: []
  type: TYPE_NORMAL
- en: The individuals who understand that prescribed step-by-step advice looks good
    on the outside, but is hollow on the inside.
  prefs: []
  type: TYPE_NORMAL
- en: We need more people who attack the root of the problem, which is often metaphysical,
    spiritual, or epistemological.
  prefs: []
  type: TYPE_NORMAL
- en: The world is desperate for depth, and that can only be created by forging your
    own path.
  prefs: []
  type: TYPE_NORMAL
- en: Philosophy is based on experience.
  prefs: []
  type: TYPE_NORMAL
- en: Depth is created through experimentation and obsession.
  prefs: []
  type: TYPE_NORMAL
- en: You must experiment with different skills and interests until you find the one
    that makes business spiritual for you. The one you can’t stop digging deeper into.
    Document your journey on the internet (the collective consciousness) for everyone
    to learn from.
  prefs: []
  type: TYPE_NORMAL
- en: You have to set your mind on an ideal future, pursue it wholeheartedly, make
    mistakes, [note your lessons](https://kortex.co), and correct your actions with
    a sustainable solution.
  prefs: []
  type: TYPE_NORMAL
- en: Your philosophy is a proposed worldview and lifestyle for the good life.
  prefs: []
  type: TYPE_NORMAL
- en: What are the skills, beliefs, and habits people need to be educated on?
  prefs: []
  type: TYPE_NORMAL
- en: For my own philosophy of work less, earn more, enjoy life – people need marketing,
    sales, writing, complementary marketable skills, a growth mindset, a passion for
    the metaphysical, daily movement, daily writing, daily problem-solving, and daily
    rest. That is what all of my content is based around.
  prefs: []
  type: TYPE_NORMAL
- en: That is what I teach in [2 Hour Writer](https://2hourwriter.com) and [Digital
    Economics](https://digitaleconomics.school).
  prefs: []
  type: TYPE_NORMAL
- en: It won’t apply to everyone. That’s the point.
  prefs: []
  type: TYPE_NORMAL
- en: Your job is to attract people like you and let others attract people like them.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Turn It Into A Public School
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I’m convinced that the future of schooling will be done online, with creators
    as teachers, and each student can join the “school” that aligns the most with
    their interests, values, and preferred method of learning. – [The Art Of Focus](https://theartoffocusbook.com)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*One school system shouldn’t dominate 12+ years of someones life.*'
  prefs: []
  type: TYPE_NORMAL
- en: Students should evolve beyond one creator-based “school” after a few years,
    go on to the next, and eventually be able to start their own – if the other schools
    have the underlying principle of critical thinking and personal experience.
  prefs: []
  type: TYPE_NORMAL
- en: Make it your life’s work to create a library of knowledge and share it online
    under your brand, or school, with an underlying philosophy that attracts the right
    people.
  prefs: []
  type: TYPE_NORMAL
- en: Your public school is digital real estate.
  prefs: []
  type: TYPE_NORMAL
- en: Twitter, Instagram, and LinkedIn to attract a broad audience.
  prefs: []
  type: TYPE_NORMAL
- en: YouTube, podcasting, and a blog or newsletter to educate and nurture the audience.
  prefs: []
  type: TYPE_NORMAL
- en: And a host of products, from low-cost courses to memberships to high-cost tailored
    coaching.
  prefs: []
  type: TYPE_NORMAL
- en: This is what I’ve dedicated myself to teaching because I see the opportunity
    in the space.
  prefs: []
  type: TYPE_NORMAL
- en: Eventually, you will gain the resources to start whatever kind of business you
    want to further your message.
  prefs: []
  type: TYPE_NORMAL
- en: We guide you through this in [Kortex University](https://university.kortex.co)
    to start your digital career in 90 days.
  prefs: []
  type: TYPE_NORMAL
- en: The Holistic Synthesizer – A Meaningful Career
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Under this philosophy, the creator economy cannot get saturated because:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Your Community Evolves**'
  prefs: []
  type: TYPE_NORMAL
- en: When you don’t subscribe to a specific label, niche, or compartment of reality
    that limits what you are capable of, the only option is to evolve.
  prefs: []
  type: TYPE_NORMAL
- en: Humans and communities do not stick to one purpose.
  prefs: []
  type: TYPE_NORMAL
- en: Once you actualize that goal, you move on to the next that reveals itself.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Your Products Evolve**'
  prefs: []
  type: TYPE_NORMAL
- en: I started out as a web designer, my products and services revolved around that.
  prefs: []
  type: TYPE_NORMAL
- en: As I developed myself and my business, I transitioned into different skills
    and interests.
  prefs: []
  type: TYPE_NORMAL
- en: My products followed suit, and I effectively desaturated the web design market
    under me.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Unique Webs Of Interests**'
  prefs: []
  type: TYPE_NORMAL
- en: When you lean into your genuine combination of interests that compose your philosophy,
    your brand ceases to be compartmentalized.
  prefs: []
  type: TYPE_NORMAL
- en: Someone who talks about fitness, business, and tech is still vastly different
    from someone who talks about fitness, business, and spirituality.
  prefs: []
  type: TYPE_NORMAL
- en: '**4) Large Creators Have Ample Resources**'
  prefs: []
  type: TYPE_NORMAL
- en: It is not rare to see a large creator decrease output on all fronts.
  prefs: []
  type: TYPE_NORMAL
- en: Go and look at a YouTuber with over 1 million subscribers.
  prefs: []
  type: TYPE_NORMAL
- en: ~50% of the time, you will see that they barely post, or they stop posting altogether.
  prefs: []
  type: TYPE_NORMAL
- en: The same goes for X creators. Huge accounts often decrease to posting a few
    times a week.
  prefs: []
  type: TYPE_NORMAL
- en: This gives new creators the ability to flood the market, generate more attention,
    and create the network and resources without much competition from the “big players.”
  prefs: []
  type: TYPE_NORMAL
- en: The big players go on to pursue a new purpose, like starting a family or building
    a separate company with the leverage they now have.
  prefs: []
  type: TYPE_NORMAL
- en: '**The Demand For Depth**'
  prefs: []
  type: TYPE_NORMAL
- en: We’ve reached a critical point in the creator economy.
  prefs: []
  type: TYPE_NORMAL
- en: Content platforms have been saturated with basic, shallow, and regurgitated
    ideas for the sake of growth.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t necessarily bad, and still works to grow an account, but my question
    is… why?
  prefs: []
  type: TYPE_NORMAL
- en: Why over-systemize ideas?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Why strip the soul from your business?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Why prioritize growth, revenue, and shallow impact over everything?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Why limit the only thing that can set you apart as an individual: your creative
    ability?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The general level of awareness in the space is rising.
  prefs: []
  type: TYPE_NORMAL
- en: The market will demand that creators rise above generic quotes and the same
    old step-by-step self-help advice.
  prefs: []
  type: TYPE_NORMAL
- en: This can only be done when you prioritize depth, perspective, and holistic synthesis.
  prefs: []
  type: TYPE_NORMAL
- en: '**The Holistic Synthesizer**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s define what a “holistic synthesizer” is:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Someone who pursues their own vision and forges their path with the unique
    skills and interests they acquire. They do not view those skills or interests
    as individual parts, but as an interconnected whole that are necessary aspects
    of their life (not temporary pieces for quick cash grabs). Their life’s work is
    to distill, educate, and distribute their personal experience on the path.*'
  prefs: []
  type: TYPE_NORMAL
- en: In short, a holistic synthesizer who documents their pursuit of the good life
    in a persuasive and educational manner.
  prefs: []
  type: TYPE_NORMAL
- en: That way, you can attract the community that resonates with your voice, help
    them reach their shared goals, and not limit yourself to a compartmentalized aspect
    of reality.
  prefs: []
  type: TYPE_NORMAL
- en: '**Your brand is your philosophy** – how does one live the good life?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Your content is your school** – what skill set and mindset do they need?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Your product is the map** – a holistic system that helps people get to where
    you are with less trial and error'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In a more practical sense, here’s how to get started:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Identify A Desirable Goal**'
  prefs: []
  type: TYPE_NORMAL
- en: What is one big goal in your life that you are trying to achieve, or have achieved?
  prefs: []
  type: TYPE_NORMAL
- en: Are you fit? Have you acquired a skill (like writing)? Have you understood the
    nature of reality? What is it? What have you accomplished, no matter how small
    or insignificant you think it is?
  prefs: []
  type: TYPE_NORMAL
- en: 'The key with this:'
  prefs: []
  type: TYPE_NORMAL
- en: Don’t focus on the goal itself, but on the lifestyle it has created for you.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Identify Your Starting Point**'
  prefs: []
  type: TYPE_NORMAL
- en: What made you want to change?
  prefs: []
  type: TYPE_NORMAL
- en: What was the burning problem in your life?
  prefs: []
  type: TYPE_NORMAL
- en: What did your life look like before the goal?
  prefs: []
  type: TYPE_NORMAL
- en: Marketing is about transformations.
  prefs: []
  type: TYPE_NORMAL
- en: You are helping others go from point A (where you were) to point B (the desirable
    goal).
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Outline A Unique Path**'
  prefs: []
  type: TYPE_NORMAL
- en: Now, outline modules, chapters, or steps necessary to get from point A to point
    B.
  prefs: []
  type: TYPE_NORMAL
- en: You are at a point in life where you can look back and help others navigate
    the mistakes you made.
  prefs: []
  type: TYPE_NORMAL
- en: Act like you are outlining a book.
  prefs: []
  type: TYPE_NORMAL
- en: Fill in the blanks with *everything* people need to know, learn, and do in order
    to reach the goal. Think skill set and mind set.
  prefs: []
  type: TYPE_NORMAL
- en: The internet has given you the power to self-educate much faster than any human
    has ever been able to.
  prefs: []
  type: TYPE_NORMAL
- en: Take it upon yourself to improve your life, pursue your curiosity, and share
    your discoveries.
  prefs: []
  type: TYPE_NORMAL
- en: Is there anything better you could be doing?
  prefs: []
  type: TYPE_NORMAL
- en: 'Before you go off and start a billion-dollar tech company, consider starting
    with the only thing that matters:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Improving the one thing that every human must improve to evolve: the quality
    of their human experience.*'
  prefs: []
  type: TYPE_NORMAL
- en: When more people master their personal lives, they can put the creative ability
    of their minds together to work on global problems.
  prefs: []
  type: TYPE_NORMAL
- en: By the point you do this, you will know what to do.
  prefs: []
  type: TYPE_NORMAL
- en: You will become a large creator that pursues new avenues and desaturates the
    market beneath them.
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading this letter.
  prefs: []
  type: TYPE_NORMAL
- en: Dan
  prefs: []
  type: TYPE_NORMAL
