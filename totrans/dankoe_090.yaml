- en: How To Make Money As A Content Creator In 2024 (The Build Teach Earn Method)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/how-smart-creators-make-money-the-build-teach-earn-method/](https://thedankoe.com/letters/how-smart-creators-make-money-the-build-teach-earn-method/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1634">![](../Images/165b0eb37215d10bf436e847ac0d6bce.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: '**Everyone wants to be a content creator.**'
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t a bad thing.
  prefs: []
  type: TYPE_NORMAL
- en: Especially if you can predict where the future of work is going.
  prefs: []
  type: TYPE_NORMAL
- en: Boomers will tell you to “get a real job,” when those real jobs won’t exist
    in a few decades.
  prefs: []
  type: TYPE_NORMAL
- en: They don’t realize that the Industrial Age *created* those jobs.
  prefs: []
  type: TYPE_NORMAL
- en: They also don’t realize that the Information Age has *created* these new, more
    profitable jobs.
  prefs: []
  type: TYPE_NORMAL
- en: Profitability determines the direction of society and the economy.
  prefs: []
  type: TYPE_NORMAL
- en: Technology allows for more profitable lines of work.
  prefs: []
  type: TYPE_NORMAL
- en: The creator economy is projected to double in size from $250B to $480B over
    the next 5 years.
  prefs: []
  type: TYPE_NORMAL
- en: The big problem is a lack of understanding.
  prefs: []
  type: TYPE_NORMAL
- en: People don’t understand what the content creation is from a big-picture point
    of view.
  prefs: []
  type: TYPE_NORMAL
- en: There’s a reason everyone feels the pull to become a content creator.
  prefs: []
  type: TYPE_NORMAL
- en: Because it’s human.
  prefs: []
  type: TYPE_NORMAL
- en: Because people want to do what they want.
  prefs: []
  type: TYPE_NORMAL
- en: Because people have an innate drive to pursue their curiosity, become a vessel
    for value, and create with their own two hands. You know, the things that schools
    and jobs stripped from you.
  prefs: []
  type: TYPE_NORMAL
- en: Because when you peel back the layers, that’s what the natural evolution of
    humanity has been pointing at this entire time.
  prefs: []
  type: TYPE_NORMAL
- en: Since the dawn of time, we’ve been solving problems with technology to rid ourselves
    of robotic and time-consuming labor work so we can pursue self-actualization and
    transcendence.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s define what both content and creation are.
  prefs: []
  type: TYPE_NORMAL
- en: '**Content:**'
  prefs: []
  type: TYPE_NORMAL
- en: '*The things that are held or included in something.*'
  prefs: []
  type: TYPE_NORMAL
- en: In other words, everything is content.
  prefs: []
  type: TYPE_NORMAL
- en: Content is structured information.
  prefs: []
  type: TYPE_NORMAL
- en: Information is how we learn, grow, and adapt as a species. Information is what
    occupies our mind, shapes our mind, and comes out of our mind. We use the structure
    of our psyche to create content.
  prefs: []
  type: TYPE_NORMAL
- en: The front end of the internet is content.
  prefs: []
  type: TYPE_NORMAL
- en: The front end of your mind is content.
  prefs: []
  type: TYPE_NORMAL
- en: The back end of the internet is code.
  prefs: []
  type: TYPE_NORMAL
- en: The back end of your mind is code.
  prefs: []
  type: TYPE_NORMAL
- en: '**Creation:**'
  prefs: []
  type: TYPE_NORMAL
- en: To bring into existence.
  prefs: []
  type: TYPE_NORMAL
- en: That’s what humans do.
  prefs: []
  type: TYPE_NORMAL
- en: They create. They solve problems. They build solutions. That is your edge.
  prefs: []
  type: TYPE_NORMAL
- en: To be human is to expand, transcend, and create.
  prefs: []
  type: TYPE_NORMAL
- en: To be robot is to forget that you have this gift and allow your mind to mold
    to the whims of others with schooling and employment.
  prefs: []
  type: TYPE_NORMAL
- en: At its root, content creation is just being a human, not a robot as outdated
    jobs would have you believe.
  prefs: []
  type: TYPE_NORMAL
- en: Everyone is a content creator. Some just choose to do it with intention, and
    get paid to do so, in a place called the internet where physical boundaries don’t
    limit your reach and potential.
  prefs: []
  type: TYPE_NORMAL
- en: Content creation is how you make your writing and speaking more valuable, because
    you must first become valuable enough as an individual to contribute to (and profit
    from) the global digital community like our ancestors did their local physical
    community.
  prefs: []
  type: TYPE_NORMAL
- en: '**Before we begin:**'
  prefs: []
  type: TYPE_NORMAL
- en: The Koe Black Friday sale is on.
  prefs: []
  type: TYPE_NORMAL
- en: Up to 50% off my courses and products.
  prefs: []
  type: TYPE_NORMAL
- en: I organized everything on its own page for you.
  prefs: []
  type: TYPE_NORMAL
- en: If you’ve been waiting to grab something from me, now’s your time.
  prefs: []
  type: TYPE_NORMAL
- en: '[Take advantage of me conforming to a useless holiday before Monday at midnight.](https://thedankoe.com/bfcm)'
  prefs: []
  type: TYPE_NORMAL
- en: Content Creation Is Not A Job Or Business – It Is A Magnet
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s bring things back down to Earth (even though it’s not as fun and loses
    its zest).
  prefs: []
  type: TYPE_NORMAL
- en: 'In business, you need 2 things to make money:'
  prefs: []
  type: TYPE_NORMAL
- en: '**People** – business is value exchange, and if you want money, you need *someone
    else* to give it to you in exchange for something of equal value.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Product** – a product (services included) is a valuable creation, physical
    or digital, that preferably solves a real problem in somebody’s life.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: There is more nuance to this of course like understanding how to market the
    product to the people you attract, but you absolutely need people and a product.
    That isn’t optional.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, that’s the first thing we need to understand:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Content is how you attract people to your product as a creator.*'
  prefs: []
  type: TYPE_NORMAL
- en: How do you create content that attracts people?
  prefs: []
  type: TYPE_NORMAL
- en: By deconstructing your mind and sharing its best parts on the internet.
  prefs: []
  type: TYPE_NORMAL
- en: Most people struggle when they begin writing because they water down everything
    they say, or they try to overcomplicate it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s exactly what you need to write content that attracts people like you:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Relatable Topics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Being a content creator is still new.
  prefs: []
  type: TYPE_NORMAL
- en: People are still applying old and outdated business and marketing tactics in
    hopes that their audience will grow large.
  prefs: []
  type: TYPE_NORMAL
- en: "Niching down the topics you talk about \L\L*“But Dan, the riches are in the\
    \ niches!!! It’s a fact!”*"
  prefs: []
  type: TYPE_NORMAL
- en: I get it, but people misinterpret what that means.
  prefs: []
  type: TYPE_NORMAL
- en: And, what if I decide I want to build a massive audience and *create* a niche?
  prefs: []
  type: TYPE_NORMAL
- en: If they made the same amount of money, I would rather have a 3 million follower
    audience than a 10,000 follower audience.
  prefs: []
  type: TYPE_NORMAL
- en: The former gives you an obscene amount of unseen leverage, flexibility, and
    options.
  prefs: []
  type: TYPE_NORMAL
- en: The latter is probably 3 clients away from feeling like their survival is at
    stake.
  prefs: []
  type: TYPE_NORMAL
- en: So, write broad in your content and narrow down to your expertise across your
    content funnel.
  prefs: []
  type: TYPE_NORMAL
- en: Your top-of-funnel social media accounts should include topics that people are
    actively searching for a studying like productivity, psychology, mindset, freelancing,
    skill acquisition, business, marketing, etc.
  prefs: []
  type: TYPE_NORMAL
- en: People actually *want* to follow and learn about those things.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t get all crazy with “automated response mechanisms for e-commerce stores.”
  prefs: []
  type: TYPE_NORMAL
- en: Educate people from your social media to newsletter to podcast and let your
    product page be the final piece to prove your authority and niche down as far
    as you want to go.
  prefs: []
  type: TYPE_NORMAL
- en: This strategy will require you to have a series of products ranging from beginner
    to advanced.
  prefs: []
  type: TYPE_NORMAL
- en: If you only have plans to sell a super specific high-ticket service, this isn’t
    for you.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Impactful Ideas
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Your posts, sentences, paragraphs, or anything you write will not hit if you
    do not pick a side.
  prefs: []
  type: TYPE_NORMAL
- en: If you stand in the middle, people may like you, but you won’t impact them.
  prefs: []
  type: TYPE_NORMAL
- en: Impact = writing words so powerful that they live in their head rent-free. It
    occupies their attention even when their attention is off of your content. They
    tell their friends and co-workers about your ideas because they want to strengthen
    the shared extreme beliefs they have to feel validated.
  prefs: []
  type: TYPE_NORMAL
- en: You write with impact when you wholeheartedly pick a side and express your beliefs.
  prefs: []
  type: TYPE_NORMAL
- en: What are the best beliefs to express?
  prefs: []
  type: TYPE_NORMAL
- en: The ones that the average person would think are “extreme” or “crazy.”
  prefs: []
  type: TYPE_NORMAL
- en: We don’t want people who are dedicated to being average following us.
  prefs: []
  type: TYPE_NORMAL
- en: Your beliefs form the foundation and perception of your brand.
  prefs: []
  type: TYPE_NORMAL
- en: Talk about them often and use them as a way to provide perspective, experience,
    and examples in most of your content.
  prefs: []
  type: TYPE_NORMAL
- en: Do you think freelancing is the best beginner way to make money?
  prefs: []
  type: TYPE_NORMAL
- en: Do you think vegans are dumb and people should eat more animal-based foods?
  prefs: []
  type: TYPE_NORMAL
- en: Do you think people should wake up at 3am and get straight into work?
  prefs: []
  type: TYPE_NORMAL
- en: Your goal is to be 90% liked 10% disliked.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t maintain that polarity with your audience (like you would in a
    thriving relationship) you give people no reason to care about you.
  prefs: []
  type: TYPE_NORMAL
- en: You need the push-pull.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t writing advice, this is spiritual advice.
  prefs: []
  type: TYPE_NORMAL
- en: Make your writing raw, punchy, and digestible.
  prefs: []
  type: TYPE_NORMAL
- en: Remove and replace words that make you sound less confident.
  prefs: []
  type: TYPE_NORMAL
- en: Write with impact, but be open to changing your mind when somebody presents
    you with a better perspective in the replies.
  prefs: []
  type: TYPE_NORMAL
- en: Have firm beliefs held loosely.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Novel Perspectives
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most people regurgitate the same ideas.
  prefs: []
  type: TYPE_NORMAL
- en: They never provide a new way of looking at things.
  prefs: []
  type: TYPE_NORMAL
- en: Novel perspectives are the main way to provide a “good” dopamine hit that aids
    in learning, understanding, and action.
  prefs: []
  type: TYPE_NORMAL
- en: Most creators dish out cheap dopamine-like candy in hopes that they will build
    a loyal readership.
  prefs: []
  type: TYPE_NORMAL
- en: You create novel perspectives through hunting in the unknown.
  prefs: []
  type: TYPE_NORMAL
- en: You hunt in the unknown through personal experience (pursuing your own goals
    and self-reflection) and researching information in the depths of books, podcasts,
    articles, and social media accounts.
  prefs: []
  type: TYPE_NORMAL
- en: People don’t want just another idea, they want a unique point of view.
  prefs: []
  type: TYPE_NORMAL
- en: Like the intro of this letter.
  prefs: []
  type: TYPE_NORMAL
- en: I had to stop and think about the idea I wanted to convey and pair personal
    experience with philosophical ideas that shaped my worldview.
  prefs: []
  type: TYPE_NORMAL
- en: Take your topics, beliefs, and novel perspectives you acquire over time to craft
    writing that holds attention without annoying tactics.
  prefs: []
  type: TYPE_NORMAL
- en: 4) Writing Structure
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You can have the greatest ideas in the world, but you have to pay attention
    to where you are posting them.
  prefs: []
  type: TYPE_NORMAL
- en: When people read a book, they are okay with blocks of text.
  prefs: []
  type: TYPE_NORMAL
- en: When people are on social media, they need to be guided throughout your writing
    (or else they will scroll past to the next person that catches their attention).
  prefs: []
  type: TYPE_NORMAL
- en: '**Use line breaks.**'
  prefs: []
  type: TYPE_NORMAL
- en: Go and look at any of my posts and notice how I add line breaks between sentences
    to increase readability.
  prefs: []
  type: TYPE_NORMAL
- en: '**Study high-performing structures.**'
  prefs: []
  type: TYPE_NORMAL
- en: Look at popular X posts, IG posts, YouTube titles, and article headlines.
  prefs: []
  type: TYPE_NORMAL
- en: '**Write more lists.**'
  prefs: []
  type: TYPE_NORMAL
- en: Bullet lists open a curiosity loop.
  prefs: []
  type: TYPE_NORMAL
- en: People can like, share, follow, or comment based on any bullet in your list.
  prefs: []
  type: TYPE_NORMAL
- en: Lists force you to condense each bullet to be impactful. People will add their
    own thoughts or nuance in the comments (boosting reach) because of this.
  prefs: []
  type: TYPE_NORMAL
- en: Anything can be turned into a list.
  prefs: []
  type: TYPE_NORMAL
- en: 'Go hunt for an idea and try to turn it into a list of reasons, benefits, pains,
    or steps.      I need to post in an hour from now, so I’m going to find an idea real quick.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Okay I’m back, the idea is: 10 habits that changed my life from a Medium article
    headline.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s the post I wrote for X:'
  prefs: []
  type: TYPE_NORMAL
- en: "How to clear your mind:\L> \L> Walk more. Read more. Write more. Listen more.\
    \ Lift more. Strategize more. Build more.\L> \L> Scroll less. Indulge less. Criticize\
    \ less. Ruminate less. Sit less. Procrastinate less.\L> \L> Clarity is reserved\
    \ for those who don’t resist reality, but engage with it."
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I could have put all of those as bullet points, but it wouldn’t have fit on
    the post if I repurpose it to all platforms.
  prefs: []
  type: TYPE_NORMAL
- en: Hook > body > conclusion.
  prefs: []
  type: TYPE_NORMAL
- en: 5) Eyes & Effort
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most creators make the massive mistake of caring about the algorithm and the
    latest trends.
  prefs: []
  type: TYPE_NORMAL
- en: 'They lack understanding of what the algorithm is based on: human nature, psychology,
    and mechanics.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The principles of each:'
  prefs: []
  type: TYPE_NORMAL
- en: Desired outcome.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Burning problem.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A clear solution or system.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When you can nail each one of those in your content, people will share it.
  prefs: []
  type: TYPE_NORMAL
- en: If they don’t, then you aren’t as good of a writer as you think you are. You
    need more data, testing, and experimentation with your writing.
  prefs: []
  type: TYPE_NORMAL
- en: Beyond that, creators realize that the algorithm will get people to see their
    content so they can grow, but don’t realize they can control the amount of people
    that see their content.
  prefs: []
  type: TYPE_NORMAL
- en: You have to put effort into your growth, especially as a beginner, by replying
    to larger accounts (that have an audience to see your replies and follow you),
    networking with creators to help each other, and potentially paying for help.
  prefs: []
  type: TYPE_NORMAL
- en: I break all of these down in [How To Actually Grow On Social Media (Even If
    You Have 0 Followers)](https://thedankoe.com/letters/how-to-actually-grow-on-social-media-what-they-dont-tell-you/).
  prefs: []
  type: TYPE_NORMAL
- en: You Need A Product YOU Would Actually Buy & Use
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1636">![](../Images/61ba337671ed95a230260d57179af36c.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Without lying to yourself, create a product that *you* would actually buy, use,
    and benefit from. There aren’t many shortcuts in business, but this is one of
    them.
  prefs: []
  type: TYPE_NORMAL
- en: When you are the niche, you don’t need to excessively worry about market research,
    product market fit, or crafting the perfect marketing strategy.
  prefs: []
  type: TYPE_NORMAL
- en: Building an audience is a modern cheat code.
  prefs: []
  type: TYPE_NORMAL
- en: Your content is how you test ideas that will turn into your marketing. You already
    know that it works.
  prefs: []
  type: TYPE_NORMAL
- en: About a year ago, I wrote a thread on X that broke down how I write articles
    and newsletters in a way that can be repurposed into content across all platforms.
  prefs: []
  type: TYPE_NORMAL
- en: It did very well, so I turned it into my [2-Hour Writer course](https://2hourwriter.com).
  prefs: []
  type: TYPE_NORMAL
- en: Your audience is more trusting of you since they’ve been exposed to a lot of
    your content. You don’t need to have the perfect conversion-centered landing page
    and copywriting because people already know if they are going to buy.
  prefs: []
  type: TYPE_NORMAL
- en: You’ve raised their level of awareness around their problems over time with
    your content. Your landing or sales page for your product is just the final kicker
    that provides clarity.
  prefs: []
  type: TYPE_NORMAL
- en: When I was a freelancer relying on cold DMs, cold emails, and referrals – I
    was neurotic about having the most optimized website copywriting that would convert.
  prefs: []
  type: TYPE_NORMAL
- en: Every time I sent an email it felt like I had to make the most of it.
  prefs: []
  type: TYPE_NORMAL
- en: I didn’t have any breathing room.
  prefs: []
  type: TYPE_NORMAL
- en: There are 2 routes that people tell you to go.
  prefs: []
  type: TYPE_NORMAL
- en: One is to wait until you hit a large enough readership to monetize.
  prefs: []
  type: TYPE_NORMAL
- en: Two is to monetize immediately.
  prefs: []
  type: TYPE_NORMAL
- en: The first option is for those who have a stable income and have already developed
    a skillset.
  prefs: []
  type: TYPE_NORMAL
- en: The second option is for those who are *using* social media as their *vessel*
    to create an independent income source and develop their skill set.
  prefs: []
  type: TYPE_NORMAL
- en: I’m tired of hearing people say, “Build a business off social media, then build
    an audience and monetize.”
  prefs: []
  type: TYPE_NORMAL
- en: No more gatekeeping.
  prefs: []
  type: TYPE_NORMAL
- en: It didn’t used to be this way, but social media is a viable way to *start* a
    business.
  prefs: []
  type: TYPE_NORMAL
- en: In fact, it’s probably the most effective path you can take.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you’re an absolute beginner, use The Build Teach Earn Method:'
  prefs: []
  type: TYPE_NORMAL
- en: The Build Teach Earn Method For Digital Success
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I had quite a few skills and freelancing business under my belt before starting
    as a creator.
  prefs: []
  type: TYPE_NORMAL
- en: This method helped me succeed much faster.
  prefs: []
  type: TYPE_NORMAL
- en: It bakes in every single thing you need to earn a living as a creator.
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Build To Learn High-Value Skills To Earn With**'
  prefs: []
  type: TYPE_NORMAL
- en: The best way to learn is to self-educate (so you have knowledge) as you build
    something tangible (so you have experience).
  prefs: []
  type: TYPE_NORMAL
- en: Few content creators realize that most businesses are the same nowadays.
  prefs: []
  type: TYPE_NORMAL
- en: They acquire customers online with a brand, content, product, and promotions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Meaning:'
  prefs: []
  type: TYPE_NORMAL
- en: If you learn the skills that make *your* creator business a success, you can
    use those skills to offer other businesses in the form of a freelance service
    or digital product.
  prefs: []
  type: TYPE_NORMAL
- en: Every single skill it takes to build a creator business *is* a high-value skill
    that everyone is talking about.
  prefs: []
  type: TYPE_NORMAL
- en: Learn graphic design as you build your profile picture, banner, website images,
    thumbnails, etc.
  prefs: []
  type: TYPE_NORMAL
- en: Learn copywriting and content writing as you build your landing pages, website,
    social media content, and newsletters.
  prefs: []
  type: TYPE_NORMAL
- en: Learn social media (yes, it’s a skill) to build your following, network, and
    authority.
  prefs: []
  type: TYPE_NORMAL
- en: Learn marketing and sales as you build your product or service.
  prefs: []
  type: TYPE_NORMAL
- en: Learn advertising and promotions as you promote your products or services to
    get buyers.
  prefs: []
  type: TYPE_NORMAL
- en: 'There’s more to this, but every single business (at least the ones we care
    about that will be profitable in the future) depends on:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Top-of-funnel** – social media platforms like X, Instagram, YouTube, LinkedIn,
    etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Middle-of-funnel** – newsletter, lead magnets, direct messages, and any other
    way of nurturing your readers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Bottom-of-funnel**– products, services, upsells, downsells, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I would encourage you to slowly learn every single skill that will enhance your
    success as a creator.
  prefs: []
  type: TYPE_NORMAL
- en: Start with writing.
  prefs: []
  type: TYPE_NORMAL
- en: That is what generates the most traffic and followers.
  prefs: []
  type: TYPE_NORMAL
- en: You can improve by practicing what we talked about above or in previous letters,
    or you can skip the trial and error and grab [2 Hour Writer](https://2hourwriter.com).
  prefs: []
  type: TYPE_NORMAL
- en: When you have traffic and followers, you can actually sell your products and
    services.
  prefs: []
  type: TYPE_NORMAL
- en: Or, you can charge high prices to other businesses because their main problem
    is traffic and leads.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Teach To Enhance Your Learning & Build An Audience**'
  prefs: []
  type: TYPE_NORMAL
- en: '*The second best way to learn is to teach what you know, what you’re learning,
    and what you’ve done to achieve a profitable or meaningful goal.*'
  prefs: []
  type: TYPE_NORMAL
- en: When you teach something, you will struggle… a lot.
  prefs: []
  type: TYPE_NORMAL
- en: People struggle to teach and start to think, “I’m not good enough.”
  prefs: []
  type: TYPE_NORMAL
- en: Correct, you aren’t. Neither is anyone else.
  prefs: []
  type: TYPE_NORMAL
- en: Struggling to teach is an opportunity to self-educate on the specific information
    that will fill your knowledge gap.
  prefs: []
  type: TYPE_NORMAL
- en: 'To write content:'
  prefs: []
  type: TYPE_NORMAL
- en: Teach your skillset
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Teach your mindset
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Try to make sense of complex ideas from your point of view
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Teach about your polarizing beliefs like “everyone should be a carnivore” and
    why
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Not only does teaching build authority, but it turns you into a value creator.
  prefs: []
  type: TYPE_NORMAL
- en: If “value” equals positive behavior change, then most creators aren’t valuable.
  prefs: []
  type: TYPE_NORMAL
- en: When you start a [micro education business](https://thedankoe.com/letters/why-micro-education-businesses-are-the-future-zero-dollars-to-start/)
    disguised as a content creator, you set yourself up for hyper-profitability.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Earn By Helping Others With What You’ve Learned**'
  prefs: []
  type: TYPE_NORMAL
- en: By this point, let’s say you’ve built a valuable social media account to 5-10,000
    followers.
  prefs: []
  type: TYPE_NORMAL
- en: You are fully qualified to charge others for help with your skillset.
  prefs: []
  type: TYPE_NORMAL
- en: Most people don’t have those results.
  prefs: []
  type: TYPE_NORMAL
- en: I’m not just talking about growing a following. I’m talking about everything
    that led to it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s say you’ve learned:'
  prefs: []
  type: TYPE_NORMAL
- en: Content writing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Thread writing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Profile design
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Email opt-in pages
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Newsletter writing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I’ve literally seen people in the past week making money selling consulting
    and courses for how to create long-form X posts (and they have been making good
    money relative to their account size).
  prefs: []
  type: TYPE_NORMAL
- en: At this point, start small.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t try to create some insane offer that you can charge $10-$20K for.
  prefs: []
  type: TYPE_NORMAL
- en: Figure out what area you have become best at and don’t overcomplicate it.
  prefs: []
  type: TYPE_NORMAL
- en: If you’ve gotten results with threads or long-form posts – create and product
    or service around that.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re great at profile and content design – create a product or service
    around that.
  prefs: []
  type: TYPE_NORMAL
- en: If your focus is off the charts with your productivity system – create a product
    or service around that.
  prefs: []
  type: TYPE_NORMAL
- en: '*If you’ve done it, and it helped your business, that means it can help someone
    else who struggles in that area.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Solve your own problems and sell the solution.*'
  prefs: []
  type: TYPE_NORMAL
- en: This is when you start heavily absorbing knowledge around copywriting, marketing,
    and sales.
  prefs: []
  type: TYPE_NORMAL
- en: Those skills will only enhance your ability to sell.
  prefs: []
  type: TYPE_NORMAL
- en: But realize that skill acquisition is actually technique acquisition.
  prefs: []
  type: TYPE_NORMAL
- en: You get better at social media by experimenting with techniques like thread
    writing, post structures, mastermind groups, etc until you learn how to get results.
  prefs: []
  type: TYPE_NORMAL
- en: Right now, sell the *technique*, not the skill.
  prefs: []
  type: TYPE_NORMAL
- en: '**3.5) An Equally Viable Route**'
  prefs: []
  type: TYPE_NORMAL
- en: Business and marketing products and services sell well.
  prefs: []
  type: TYPE_NORMAL
- en: They are very beginner-friendly.
  prefs: []
  type: TYPE_NORMAL
- en: And eventually, you will need those skills no matter what you sell.
  prefs: []
  type: TYPE_NORMAL
- en: So, if you are just starting out in life and don’t have any other skills or
    interests, do what I just told you to do in step 3.
  prefs: []
  type: TYPE_NORMAL
- en: You can (and should) create a product or service to launch and sell at least
    every quarter (3 months) for 2-3 years.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t take that lightly.
  prefs: []
  type: TYPE_NORMAL
- en: Yes, it’s a lot.
  prefs: []
  type: TYPE_NORMAL
- en: But that’s the exact and only difference I can see between myself and others
    who make 1/10 the amount that have been doing this for the same amount of time.
  prefs: []
  type: TYPE_NORMAL
- en: Building forces you to evolve and learn.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a new product isn’t just creating a new product.
  prefs: []
  type: TYPE_NORMAL
- en: It’s creating a new identity with the skillset and mindset you must acquire
    to build the product, sell the product, and improve the product.
  prefs: []
  type: TYPE_NORMAL
- en: Business growth is a vessel for personal growth.
  prefs: []
  type: TYPE_NORMAL
- en: The other route you can take is by creating a product or service that *you*
    would buy, use, and benefit from.
  prefs: []
  type: TYPE_NORMAL
- en: A business principle that most people glance over is “sell what’s already selling.”
  prefs: []
  type: TYPE_NORMAL
- en: You don’t try to create new markets just yet.
  prefs: []
  type: TYPE_NORMAL
- en: You stick your hands in the ones that are already flowing.
  prefs: []
  type: TYPE_NORMAL
- en: What products have you bought recently?
  prefs: []
  type: TYPE_NORMAL
- en: Which ones do you use daily?
  prefs: []
  type: TYPE_NORMAL
- en: What courses have you taken and gotten your own results from?
  prefs: []
  type: TYPE_NORMAL
- en: When I started out on social media, I created and sold a web design and freelancing
    product.
  prefs: []
  type: TYPE_NORMAL
- en: Why? *Because I purchased 5-10 web design and freelancing courses myself.*
  prefs: []
  type: TYPE_NORMAL
- en: I knew they sold. I didn’t opt for the silly belief that the market is saturated.
  prefs: []
  type: TYPE_NORMAL
- en: And, I had results freelancing.
  prefs: []
  type: TYPE_NORMAL
- en: As I grew, I created the Power Planner.
  prefs: []
  type: TYPE_NORMAL
- en: Why? Because I used planners all the time and always wished there was something
    else inside it.
  prefs: []
  type: TYPE_NORMAL
- en: I also enjoyed talking about productivity in my content.
  prefs: []
  type: TYPE_NORMAL
- en: I break down how to create a minimum viable offer (product or service) in [The
    Best Online Business To Make $1 Million In 2023](https://thedankoe.com/letters/the-best-online-business-model-to-make-1-million-in-2023/).
  prefs: []
  type: TYPE_NORMAL
- en: '**4) Earn More By Leveraging Your Results & Audience**'
  prefs: []
  type: TYPE_NORMAL
- en: Alright, we’re all over the place now.
  prefs: []
  type: TYPE_NORMAL
- en: 'At this point, you have:'
  prefs: []
  type: TYPE_NORMAL
- en: A high-value skill stack (ability to solve profitable problems)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A growing audience or readership (people that have profitable problems)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Experience with building and selling (better at solving profitable problems)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You are in one of the most optimal positions you can be in this Digital Renaissance.
  prefs: []
  type: TYPE_NORMAL
- en: You have the resources to be an independent thinker and earner.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have to conform to government agendas you hate.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have to report to someone for work that was assigned to you.
  prefs: []
  type: TYPE_NORMAL
- en: From this place of newfound experience, you want to productize your results.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you’ve helped people with freelancing or consulting:'
  prefs: []
  type: TYPE_NORMAL
- en: Write down the *exact steps* that led to you getting results.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you don’t have steps, create them now and refine as you go.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These steps are your unique mechanism. This is your way of marketing a solution
    to solve a problem in someone’s life to reach the desired outcome they want.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Write down the desired outcome of their life (what is their vision for the future?)
    You are selling a better life.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Write down the worst outcome of their life (what is their anti-vision for the
    future?) You are helping them avoid pain.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That is your marketing strategy.
  prefs: []
  type: TYPE_NORMAL
- en: On your landing page, start by writing out their anti-vision in detail.
  prefs: []
  type: TYPE_NORMAL
- en: Then, talk about the vision they could achieve.
  prefs: []
  type: TYPE_NORMAL
- en: Last, present your solution as a way to bridge the gap.
  prefs: []
  type: TYPE_NORMAL
- en: Emulate other landing pages to understand headlines, content structure, and
    use it as training wheels for your first.
  prefs: []
  type: TYPE_NORMAL
- en: As you grow a readership, it doesn’t make sense to focus on low-leverage activities
    like client work.
  prefs: []
  type: TYPE_NORMAL
- en: And if you don’t plan to hire a team just yet and dive into management – the
    logical option is to create a digital product that requires minimal effort with
    high-profit margins.
  prefs: []
  type: TYPE_NORMAL
- en: This is how some solopreneurs make millions.
  prefs: []
  type: TYPE_NORMAL
- en: They understand that if they can gain 1 follower, they can gain 1 million.
  prefs: []
  type: TYPE_NORMAL
- en: And if they have a product that doesn’t require labor to fulfill, they can turn
    those 1 million eyes into multiple millions of dollars.
  prefs: []
  type: TYPE_NORMAL
- en: I hope you enjoyed this one.
  prefs: []
  type: TYPE_NORMAL
- en: Until next week,
  prefs: []
  type: TYPE_NORMAL
- en: Dan
  prefs: []
  type: TYPE_NORMAL
