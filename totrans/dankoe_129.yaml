- en: Master Persuasion With 4 Frameworks (& Become Powerful)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-greatest-skill-of-the-21st-century/](https://thedankoe.com/letters/the-greatest-skill-of-the-21st-century/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Persuasion is the greatest skill of the 21st century.
  prefs: []
  type: TYPE_NORMAL
- en: No, persuasion is not manipulation. Two separate words.
  prefs: []
  type: TYPE_NORMAL
- en: No, persuasion is not unethical. If it were, then you would be the most unethical
    person on the planet because you persuade every day, but it’s unconscious to you,
    so at that point, it’s considered manipulation.
  prefs: []
  type: TYPE_NORMAL
- en: When you are trying to convince your friends to do something with you, you are
    using persuasion.
  prefs: []
  type: TYPE_NORMAL
- en: When you are presenting an argument for why people should work with you, you
    are using persuasion.
  prefs: []
  type: TYPE_NORMAL
- en: You are trying to get what you want out of life. You are playing the game of
    life. If you weren’t, you probably wouldn’t be alive. You don’t have a choice.
  prefs: []
  type: TYPE_NORMAL
- en: To get what you want, you need to persuade people to give you attention, resources,
    money, and most of all… power.
  prefs: []
  type: TYPE_NORMAL
- en: The only people who did well, and do well, in society are those who had power
    and influence.
  prefs: []
  type: TYPE_NORMAL
- en: They are people who work to acquire the resources necessary to achieve their
    goals, become valuable, and generate wealth.
  prefs: []
  type: TYPE_NORMAL
- en: There has never been a time in history when weak, average, or mindless people
    weren’t treated like cattle. Be careful of your mind trying to hijack your thoughts
    right now and make you a slave to the ideas others (that don’t have the life you
    want to live) programmed into your head.
  prefs: []
  type: TYPE_NORMAL
- en: Status, power, and influence aren’t bad. Everyone has them. Everyone is trying
    to get them. They become bad things when done for unconscious reasons. That is,
    when you don’t understand the big-picture impact *of *your pursuit of power through
    persuasion.
  prefs: []
  type: TYPE_NORMAL
- en: This entire letter could be completely negative, but if the overarching story
    and impact on your life is positive, does that make it a bad thing?
  prefs: []
  type: TYPE_NORMAL
- en: '**A side lesson on making better decisions:** You will probably have to do
    things throughout your life that others will perceive as “bad,” “shallow,” or
    “superficial” because they don’t understand the big picture. They can’t see what
    you see. They criticize you now and praise you later. If you are deciding whether
    or not you should make a decision, zoom out and attempt to think through all possible
    scenarios it could create. As I’ve said before, one stock can be down while the
    index fund is up. You can have a cheat meal and still be healthy. Most just get
    neurotic over the cheat meal. And even if that decision turns out to be a mistake,
    welcome to being human, my friend. That’s the only way you can make a better decision
    the next time. Indecision, stagnation, and not pursuing something greater is the
    most “bad” decision of them all.'
  prefs: []
  type: TYPE_NORMAL
- en: Back to the point.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to be perceived as valuable, you need to generate power.
  prefs: []
  type: TYPE_NORMAL
- en: If your strategy for success is being nice and noble and spiritual, you will
    be pushed aside by mean people, and they will have more of an impact than you.
  prefs: []
  type: TYPE_NORMAL
- en: The people who virtue signal that power games are bad are playing their own
    power game. One that is selfish. One that lacks contribution to humanity. One
    that self-deceives into doing nothing but preaching about how others should change,
    distracting them from looking in the mirror.
  prefs: []
  type: TYPE_NORMAL
- en: After talking with many of you recently, I’ve narrowed down the reason you’re
    here.
  prefs: []
  type: TYPE_NORMAL
- en: You want work you enjoy, a meaningful lifestyle, and a bit more depth than the
    superficial content on the market right now.
  prefs: []
  type: TYPE_NORMAL
- en: Guess what?
  prefs: []
  type: TYPE_NORMAL
- en: In order to achieve any of those things, you need a certain degree of power.
  prefs: []
  type: TYPE_NORMAL
- en: You need people who pay you for your work.
  prefs: []
  type: TYPE_NORMAL
- en: You need people to listen to what you have to say.
  prefs: []
  type: TYPE_NORMAL
- en: You need a sense of control over the lifestyle you create.
  prefs: []
  type: TYPE_NORMAL
- en: You need to persuade more than just people, but reality itself to conspire in
    your favor. “Creating” your ideal life is persuading reality. You can’t force
    reality. You can’t deceive reality. But you can persuade it. That’s a sign of
    truth.
  prefs: []
  type: TYPE_NORMAL
- en: You inherently know that you need to learn to persuade to get what you want.
  prefs: []
  type: TYPE_NORMAL
- en: The only thing stopping you is the judgment of those who aren’t doing much with
    their life.
  prefs: []
  type: TYPE_NORMAL
- en: How To Start Persuading… Today
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Structured thinking is important.
  prefs: []
  type: TYPE_NORMAL
- en: 'To handle an objection early:'
  prefs: []
  type: TYPE_NORMAL
- en: No, frameworks and structures don’t strip you of your creativity.
  prefs: []
  type: TYPE_NORMAL
- en: Whenever I teach writing frameworks, social post frameworks, or how I write
    my newsletters, people ask valid questions.
  prefs: []
  type: TYPE_NORMAL
- en: “What if I don’t want to use a framework? What if I want to be authentic? What
    if I want to write whatever I want?”
  prefs: []
  type: TYPE_NORMAL
- en: (Note that I use “writing” as a way to persuade, but you can exchange that for
    speaking as well).
  prefs: []
  type: TYPE_NORMAL
- en: 'My answers:'
  prefs: []
  type: TYPE_NORMAL
- en: Do it. Write what you want. But organize your writing into a framework until
    you understand what makes writing impactful.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Frameworks don’t hurt creativity. They enhance it. You can only be creative
    when you have a goal (something to be creative towards) and limitations that force
    creativity (like a framework). Building a business in 4 hours a day without sacrificing
    your health and relationships demands more creativity than building a business
    by giving up everything else in your life.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You are using a framework already. It’s called your mind and how you were programmed
    to think. The thing is, it’s unconscious and clearly unimpactful, or else you
    would have the things you want in life.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Humans make sense of the world in stories.
  prefs: []
  type: TYPE_NORMAL
- en: They plug any idea or information they come across into their mind, a sense-making
    machine, that attempts to see how that information is relevant toward their goals
    and past experiences.
  prefs: []
  type: TYPE_NORMAL
- en: So, you *can* write whatever you want, but what’s the purpose of your writing
    or persuading?
  prefs: []
  type: TYPE_NORMAL
- en: To get what you want.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, if there isn’t someone on the other end of your writing, it
    can’t really be persuasive, can it?
  prefs: []
  type: TYPE_NORMAL
- en: You will be using the methods below for nearly everything.
  prefs: []
  type: TYPE_NORMAL
- en: I challenge you to *practice* persuasion during every situation in your life
    going forward and see how your life changes.
  prefs: []
  type: TYPE_NORMAL
- en: In your social posts, newsletters, and landing pages
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In your networking and sales calls or DMs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In your relationships when attempting to make a decision
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Especially in your marketing and promotion of your work or products
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Be intentional going forward.
  prefs: []
  type: TYPE_NORMAL
- en: Practice these at any chance you get.
  prefs: []
  type: TYPE_NORMAL
- en: The Pyramid Principle
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The pyramid principle is a simple and effective way to communicate.
  prefs: []
  type: TYPE_NORMAL
- en: You can use it for anything.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how you do it:'
  prefs: []
  type: TYPE_NORMAL
- en: Start with your answer, conclusion, or big idea
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Prove your conclusion with 3+ key arguments
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Support your arguments with facts, data, anecdotes, quotes, etc
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: From a big-picture lens, that’s how all of my newsletters are written.
  prefs: []
  type: TYPE_NORMAL
- en: Does that make me inauthentic for not just writing chaotically? Or does it give
    me a vessel for articulating my thoughts in an impactful way?
  prefs: []
  type: TYPE_NORMAL
- en: You can notice that I often start with the point that I want to argue.
  prefs: []
  type: TYPE_NORMAL
- en: Then, I have a few sections of the newsletter where I break down arguments for
    that point.
  prefs: []
  type: TYPE_NORMAL
- en: Then, I often have tweets, quotes, or statistics to make those arguments more
    credible.
  prefs: []
  type: TYPE_NORMAL
- en: I have my own templates in [Kortex](https://kortex.co) for this. Before writing
    any newsletter, I write out my point, my arguments, and research that I can reference
    while writing. Then, that newsletter gets turned into a YouTube script. I’ll be
    updating [2 Hour Writer](https://2hourwriter.com) with Kortex templates when we
    launch.
  prefs: []
  type: TYPE_NORMAL
- en: Why does the pyramid principle work?
  prefs: []
  type: TYPE_NORMAL
- en: The reader knows immediately whether it’s relevant to them (the hook works).
  prefs: []
  type: TYPE_NORMAL
- en: They can follow your logic for how you got to that conclusion.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, it’s simple to replicate and use in everything.
  prefs: []
  type: TYPE_NORMAL
- en: State your point, explain why, and back it up.
  prefs: []
  type: TYPE_NORMAL
- en: Frameworks I Personally Use
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I love starting with a pain point or problem in anything I write or speak about.
  prefs: []
  type: TYPE_NORMAL
- en: It makes the rest of my thoughts flow well.
  prefs: []
  type: TYPE_NORMAL
- en: It also frames the situation nicely and qualifies the reader.
  prefs: []
  type: TYPE_NORMAL
- en: When someone becomes aware of a pain point, their mind relates it to a goal
    in their life, sparking a desire to learn more and helping them know if my writing
    is for them or not. Then, the ones who stay want a solution, and if my solution
    is good enough, they’re more likely to stick around and invest in the further
    value I offer.
  prefs: []
  type: TYPE_NORMAL
- en: 'Remember: humans make sense of the world in stories. Stories usually start
    with a problem that foreshadows a “goal” or outcome. This makes your mind start
    filling in the blanks of that story and wanting to continue reading to see if
    it was right.'
  prefs: []
  type: TYPE_NORMAL
- en: Here are a few frameworks to try, starting out simple and increasing in difficulty
    to pull off.
  prefs: []
  type: TYPE_NORMAL
- en: You can use 1 and 2 for social posts or the start of a long-form piece. You
    can use 3 for newsletters, landing pages, and other longer conversations like
    sales calls.
  prefs: []
  type: TYPE_NORMAL
- en: '**1) PP – Pain & Process**'
  prefs: []
  type: TYPE_NORMAL
- en: Pretty simple.
  prefs: []
  type: TYPE_NORMAL
- en: State the pain point and give a process to overcome it.
  prefs: []
  type: TYPE_NORMAL
- en: 'An example as a tweet:'
  prefs: []
  type: TYPE_NORMAL
- en: 'If you’re tired all the time:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Stop scrolling at midnight
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Fix your sh*tty nutrition
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Go on walks, move your body
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Become obsessed with a new interest
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You’re tired because you’re trapped in a routine that has the outcome of being
    tired.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It’s wise to wrap all of these frameworks up with a conclusion or call to action.
  prefs: []
  type: TYPE_NORMAL
- en: Also, the more unique you can get with your solutions, the more impactful it
    becomes.
  prefs: []
  type: TYPE_NORMAL
- en: You are a dopamine dealer, so provide novel perspectives that others haven’t
    heard before. This requires you to be well-read about the topic or market you
    are writing about. It’s easy if you are a part of that marketing (*cough* [You
    Are The Niche](https://thedankoe.com/letters/how-to-create-your-niche-of-one-become-nicheless/)
    *cough*)
  prefs: []
  type: TYPE_NORMAL
- en: '**2) PAS(O) – Problem, Amplify, Solution, (Offer)**'
  prefs: []
  type: TYPE_NORMAL
- en: Similar story with this one.
  prefs: []
  type: TYPE_NORMAL
- en: You start with a pain point, but this time you amplify it.
  prefs: []
  type: TYPE_NORMAL
- en: You think deeply about how that pain point can spread into the rest of someone’s
    life.
  prefs: []
  type: TYPE_NORMAL
- en: Like how being tired can make your husband/wife think something is wrong and
    little problems start springing up out of nowhere. Or how you aren’t able to perform
    when trying to build your side hustle (will it ever work)? Or how when you get
    home from work, all you want to do is lie down and eat junk food, and that obviously
    isn’t helping you.
  prefs: []
  type: TYPE_NORMAL
- en: The more descriptive and relatable you can get, the better. A personal experience
    often works well in this scenario. So, if you have experience with the pain point,
    you can talk about how it impacted *your* life.
  prefs: []
  type: TYPE_NORMAL
- en: The “offer” portion of this framework is optional. If you are using it to write
    a social post, you don’t need the offer portion. If you are using the framework
    for a promotion, then position your offer as a novel solution to the pain point
    you targeted.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) PASTOR – Problem, Amplify, Story, Testimony, Offer, Response**'
  prefs: []
  type: TYPE_NORMAL
- en: Again, very similar.
  prefs: []
  type: TYPE_NORMAL
- en: The PASTOR framework is a bit longer and is best used for promotional material
    like landing pages and emails.
  prefs: []
  type: TYPE_NORMAL
- en: When you are launching a product, running a sale, or just haven’t promoted yourself
    in a long time, use this framework.
  prefs: []
  type: TYPE_NORMAL
- en: Start with the problem.
  prefs: []
  type: TYPE_NORMAL
- en: Amplify it.
  prefs: []
  type: TYPE_NORMAL
- en: Give a personal or customer story as to *how* they overcame the problem. Hint
    at your unique solution.
  prefs: []
  type: TYPE_NORMAL
- en: Show proof via testimonials from others. If you don’t have testimonials, try
    showing proof via personal results or research and statistics.
  prefs: []
  type: TYPE_NORMAL
- en: Introduce your offer’s features and benefits opposing the pain points you illustrated
    before.
  prefs: []
  type: TYPE_NORMAL
- en: Ask them to do something next, like purchase.
  prefs: []
  type: TYPE_NORMAL
- en: '**4) Experimenting With Frameworks**'
  prefs: []
  type: TYPE_NORMAL
- en: 'The best way to learn persuasion is to:'
  prefs: []
  type: TYPE_NORMAL
- en: Research writing and speaking frameworks
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Write them down next to each other
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Practice them in the real world
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Notice patterns between them
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Break the rules
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Frameworks, systems, and most education are training wheels.
  prefs: []
  type: TYPE_NORMAL
- en: Most people will read this letter, or another letter, or any other content and
    see someone with a “novel” solution to try out. This could be relationship advice,
    health practices, or business models.
  prefs: []
  type: TYPE_NORMAL
- en: They will adopt one strategy, make an identity out of it, and eventually get
    hurt when they realize they have to change how they do things as they make progress.
  prefs: []
  type: TYPE_NORMAL
- en: It is a very good thing that people are providing things to *test* and *experiment*
    with. It is a very bad thing when people take those things and act like they are
    the only way to get results.
  prefs: []
  type: TYPE_NORMAL
- en: So, to learn persuasion, research and write down 5-10 frameworks to try in your
    posts, conversations, newsletters, and the rest.
  prefs: []
  type: TYPE_NORMAL
- en: Then, drop the frameworks and use the principles that made them work in the
    first place to become a persuasive person at any time.
  prefs: []
  type: TYPE_NORMAL
- en: I teach my APAG framework inside [2 Hour Writer](https://2hourwriter.com). That’s
    how I write these long letters that turn into long videos (that set me apart).
    Experiment with that framework if you’d like.
  prefs: []
  type: TYPE_NORMAL
- en: Know Who You’re Talking To
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Your words will only persuade if you are speaking to someone who *perceives*
    your words as valuable.
  prefs: []
  type: TYPE_NORMAL
- en: If you are speaking high-level gibberish about a topic you are knowledgeable
    about, a beginner will not care about what you have to say. It’s hard for them
    to relate or understand.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can solve this problem by understanding the 5 levels of awareness:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Unaware** – unaware of their problem and how it is hurting their quality
    of life. (Focus on pain points).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Problem aware** – aware of their problem but don’t know how to solve it.
    (Focus on the impact of those pain points).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Solution aware** – aware of their problem and know there is a solution, education,
    or knowledge to solve it. (Focus on actionable advice).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Product aware** – aware of their problem and know there is a streamlined
    path or system to solve it. (Focus on your unique way of doing things).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Most aware** – they are ready to change, they just need the right reason
    to act. (Focus on covering different angles – say 1 thing 1000 different ways).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In my newsletters, I often attempt to raise people up the entire chain. I assume
    people are unaware of their problem, so I state it at the top. Then, I dig into
    the problem and its impact on their life. Then, I present a step-by-step solution.
    Throughout the newsletter, I promote my relevant products or services.
  prefs: []
  type: TYPE_NORMAL
- en: In something like a social post, I usually focus on levels 1 through 3.
  prefs: []
  type: TYPE_NORMAL
- en: In social promotions (after the social post), I focus on 4 and 5.
  prefs: []
  type: TYPE_NORMAL
- en: From a very big picture, I treat my social posts (top of funnel) as a way to
    make people aware of problems. My newsletters and products do the rest of the
    work.
  prefs: []
  type: TYPE_NORMAL
- en: How I Write About What I Love, Persuasively
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I want to show my process inside Kortex for writing with impact.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, you can technically use any other note-taking or writing software
    to do this, especially since Kortex isn’t out (until late September for [those
    on the waitlist](https://kortex.co).)
  prefs: []
  type: TYPE_NORMAL
- en: You see, we wanted to create a software that actually helped people think and
    write better. Most apps just throw you into a confusing environment. Your only
    option is to take notes how you always do – and we all know how many of your ideas
    get lost or aren’t understandable.
  prefs: []
  type: TYPE_NORMAL
- en: 'To start the process, we need four things:'
  prefs: []
  type: TYPE_NORMAL
- en: '**A topic to write about** – preferably something that performs well. Find
    a topic that works on social media and use this process to make it your own.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**An idea dump** – to get all of your ideas out and jot down new ones when
    they come to you (you won’t have all of your ideas at once).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**An outline page** – To organize all of your ideas in a persuasive, impactful,
    and attention-grabbing way. (This is where most of your writing happens.)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**A draft page** – To string together your ideas and outlines. This shouldn’t
    take long as the work is already done.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here’s how my writing workflow looks in Kortex:'
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2188">![](../Images/0f3f2ec15b302a73d28d0de3ed576667.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: I start my outline at the beginning of each week.
  prefs: []
  type: TYPE_NORMAL
- en: I can capture ideas on my phone and attach them to that outline (think of how
    you would add a “todo” to a project in an app like Todoist).
  prefs: []
  type: TYPE_NORMAL
- en: The magic happens in my outline.
  prefs: []
  type: TYPE_NORMAL
- en: In the top right box of the screenshot above, we have a feature called “Elements.”
  prefs: []
  type: TYPE_NORMAL
- en: This is a simple feature that our students and users love the most.
  prefs: []
  type: TYPE_NORMAL
- en: In short, they are just custom call-out boxes that you can name, similar to
    Notion. But in Kortex, you can link to them, mirror them, and will eventually
    be able to add custom prompts to each element so AI can create your outlines in
    a few seconds (based on all of the knowledge you’ve stored in your second brain,
    so it’s unique to how you write).
  prefs: []
  type: TYPE_NORMAL
- en: Here’s what my blank weekly outline looks like with Elements.
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-2187">![](../Images/9d2b407ebbb1db6571cb5983a28f775f.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: I brainstorm hooks at the top for YouTube titles and headlines.
  prefs: []
  type: TYPE_NORMAL
- en: I connect my relevant notes and ideas to navigate while writing.
  prefs: []
  type: TYPE_NORMAL
- en: I add tweets, quotes, and research to strengthen my argument and give me talking
    points.
  prefs: []
  type: TYPE_NORMAL
- en: (I store all of these in my Library that integrates with Readwise so I can save
    everything from Kindle highlights to Tweet bookmarks to web page clippings).
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-2189">![](../Images/2a7d0e3f5d9625d19fd60cceba74be5d.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: (You can see that I can open any of my highlights, documents, captures, outlines,
    etc in a pane on the left side to have everything in one view as I write – or
    I can go into focus mode.)
  prefs: []
  type: TYPE_NORMAL
- en: Then, I list out questions or objections to answer in the writing.
  prefs: []
  type: TYPE_NORMAL
- en: I illustrate and amplify the pain points or problems.
  prefs: []
  type: TYPE_NORMAL
- en: I brainstorm the goal or desired outcome.
  prefs: []
  type: TYPE_NORMAL
- en: I talk about my experiences for reliability, note novel perspectives, create
    actionable steps as the solution, summarize big ideas, and brainstorm potential
    concepts.
  prefs: []
  type: TYPE_NORMAL
- en: FYI, this is how I come up with all of my best YouTube videos.
  prefs: []
  type: TYPE_NORMAL
- en: My video “The One Person Business (How To Productize Yourself)” is just the
    “Concept (Process)” elements in my content outlines.
  prefs: []
  type: TYPE_NORMAL
- en: This is why the outlines and elements are so important.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t learn to write persuasively, you learn to organize your thoughts persuasively,
    then the writing comes easy.
  prefs: []
  type: TYPE_NORMAL
- en: You can create this system with any note-taking app, but it may be difficult
    or take a lot of time. Or you’ll have to string 5 apps together.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t the sole purpose of Kortex, because I’m sure you can see how this
    will lead to journaling, productivity, and more content templates.
  prefs: []
  type: TYPE_NORMAL
- en: And that’s just the tip of the iceberg with [Kortex](https://kortex.co).
  prefs: []
  type: TYPE_NORMAL
- en: 'So, to recap what you should do to start practicing your persuasion:'
  prefs: []
  type: TYPE_NORMAL
- en: Accept that you need power and status to break out of the hierarchy someone
    more powerful than you put you in.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use the Pyramid Principle as a starting point. State your point, argue your
    point, back up your point.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use a copywriting, content, or persuasion framework to structure your writing,
    speaking, or video scripts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create an outline first based on that framework.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Have a place to capture ideas (because the best ideas won’t come when you try
    to brainstorm them all).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Start your draft. String together your outline ideas.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, post it in public so you can start getting data.
  prefs: []
  type: TYPE_NORMAL
- en: If people don’t engage, buy, or follow, you’re doing something wrong, and you
    probably need to educate yourself more beyond persuasion.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are a few places to start:'
  prefs: []
  type: TYPE_NORMAL
- en: '[How To Actually Grow On Social Media](https://thedankoe.com/letters/how-to-actually-grow-on-social-media-what-they-dont-tell-you/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[The One Person Foundations Mini Course](https://theone-personbusiness.com)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Digital Economics](https://digitaleconomics.school) or my [other courses](https://thedankoe.com)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That’s it for this letter.
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
