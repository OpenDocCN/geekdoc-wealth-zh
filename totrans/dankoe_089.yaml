- en: Make Millions With Your Mind (Turn Your Knowledge Into A Business)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 用你的思维赚取百万（将你的知识转化为商业）
- en: 原文：[https://thedankoe.com/letters/make-millions-with-your-mind-turn-your-knowledge-into-a-business/](https://thedankoe.com/letters/make-millions-with-your-mind-turn-your-knowledge-into-a-business/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/make-millions-with-your-mind-turn-your-knowledge-into-a-business/](https://thedankoe.com/letters/make-millions-with-your-mind-turn-your-knowledge-into-a-business/)
- en: When I was young, I made a crucial observation.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 当我年轻的时候，我做出了一个关键的观察。
- en: I had to earn with my mind, not my time.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我必须用我的思维赚钱，而不是用我的时间。
- en: I made the distinction between labor workers and creative workers.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我区分了劳动工人和创意工作者。
- en: Labor workers would try to accomplish as much as their bodies could handle within
    a specific time frame.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 劳动工人会试图在特定时间内完成他们身体能够承受的最大工作量。
- en: Creative workers would focus on solving the problems that would lead to the
    most results, regardless of time spent.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 创意工作者会专注于解决那些能带来最多结果的问题，而不论花费多少时间。
- en: Labor workers were locked into a salary and schedule that paid them a certain
    amount of money for their efforts.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 劳动工人被锁定在一种工资和日程安排中，他们通过努力获得一定数量的金钱。
- en: Creative workers created their own salary and schedule that paid them according
    to the level of problem they solved.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 创意工作者根据自己的解决问题的水平来创造自己的工资和日程安排。
- en: There’s nothing wrong with labor work.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 劳动工作并没有什么错。
- en: But understand that you are trading time for money.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 但要明白，你是在用时间换钱。
- en: And your time is limited.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 而你的时间是有限的。
- en: Doctors can be paid a great salary, but they are paid the same whether they
    save someone’s life or tell them to take some aspirin.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 医生可以赚很高的薪水，但无论他们是否救了某人的命，还是告诉他们吃一些阿司匹林，他们的薪水都是一样的。
- en: A writer can be paid as much as they want depending on what they write, what
    their product is, and how far their writing spreads.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 一个作家可以根据他们写的什么，他们的产品是什么，以及他们的写作传播多远来赚取他们想要的任何金额。
- en: Writing is one example here as we will discuss how to monetize anything you
    wish later in this letter.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 写作是这里的一个例子，因为我们将在信的后面讨论如何将任何你希望的东西货币化。
- en: The difference between creative workers and labor workers is owning a business.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 创意工作者和劳动工人之间的区别在于拥有自己的企业。
- en: Business is about solving a series of creative problems until you create the
    income and lifestyle you desire.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 商业是解决一系列创意问题，直到你创造出你想要的收入和生活方式。
- en: As soon as you stop solving creative problems around product and reach, your
    income stagnates and you become a slave to the work you built yourself into.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你停止解决与产品和目标相关的创意问题，你的收入就会停滞，你将变成自己创造的工作的奴隶。
- en: My Evolution From Time To Mind
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我的从时间到思维的演变
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1579">![](../Images/53f2a0ed373d368acbc6c04cdb40299d.png)</picture>
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1579">![](../Images/53f2a0ed373d368acbc6c04cdb40299d.png)</picture>
- en: When I first started in business, the logical option was to freelance with a
    valuable skill.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 当我刚开始创业时，逻辑的选择是使用有价值的技能进行自由职业。
- en: It seemed beginner-friendly and cost zero dollars to start.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 它看起来对初学者友好，而且启动成本为零。
- en: With years of manual effort, the joy that came from building the business slowly
    fell as my responsibilities rose.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 经过多年的手工努力，随着责任的增加，我从慢慢建立业务中获得的乐趣逐渐减少。
- en: I could only take on a specific amount of clients.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我只能承担一定数量的客户。
- en: I only had so much time in the day.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我每天的时间是有限的。
- en: Unless I wanted to stay in a self-made 9-5, I had to get creative. I had to
    evolve.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 除非我想继续过那种自己创造的自9-5的生活，否则我必须变得有创意。我必须进化。
- en: Creativity is dependent on the expansion of your mind.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 创造力依赖于你思维的扩展。
- en: So, through education and exposing myself to the unknown, I registered new opportunities
    to solve my problem.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，通过教育和让自己接触未知，我注册了新的机会来解决我的问题。
- en: I began writing online to attract new clients.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我开始在线写作以吸引新客户。
- en: This removed the time-suck of manually reaching out to potential clients with
    cold email, cold call, and and cold messages.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这消除了手动通过冷邮件、冷电话和冷信息联系潜在客户的耗时。
- en: I built a digital product that could sell while I sleep.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我建立了一个可以在我睡觉时销售数字产品。
- en: This removed my absolute dependence on client work to survive.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这消除了我对客户工作的绝对依赖来维持生计。
- en: I pivoted my freelance offer into a consulting offer.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我将我的自由职业服务转向了咨询服务。
- en: This cut my client work times in half. I could charge more and do less because
    I was helping someone rather than doing it for them.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这将我的客户工作时间减半。我可以收取更高的费用，做更少的工作，因为我是在帮助别人，而不是为他们做。
- en: 'During this time, I made a discovery that changed the direction of my life:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在这段时间里，我有一个发现改变了我的生活方向：
- en: If I could gain one reader, I could gain one million.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我能获得一个读者，我就能获得一百万个。
- en: And if I could gain one buyer, I could gain one thousand.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我能获得一个买家，我就能获得一千个。
- en: 2.8 million readers and 20,000 buyers later, my discoveries held true.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 2.8百万读者和2万购买者之后，我的发现得到了证实。
- en: Now, my creative problem-solving has evolved beyond a one-person business.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我的创造性问题解决能力已经超越了单打独斗的企业。
- en: Now, I am focused on building [Kortex](https://kortex.co), delegating work without
    reducing the quality delivered, and not overworking myself.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我专注于构建[Kortex](https://kortex.co)，在不降低交付质量的情况下委派工作，并且不过度劳累自己。
- en: 'One lesson before we begin:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始之前的一个教训：
- en: You can’t eradicate manual labor from your life altogether.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 你无法完全从你的生活中消除体力劳动。
- en: It is a slow and painful evolution, and sometimes you regress.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个缓慢而痛苦的过程，有时你会退步。
- en: Now that I’ve taken on the responsibility of starting a larger company, my manual
    work has increased substantially, but I trust that I can lower it quickly with
    my prior experience.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我承担起创办更大公司的责任，我的体力劳动显著增加，但我相信凭借我之前的经验，我可以很快将其降低。
- en: 'What we will discuss:'
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我们将讨论的内容：
- en: The macronutrients of business
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 商业的宏量营养素
- en: Progressive overload of skill
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技能的渐进式超负荷
- en: Time under attention
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 受关注的时长
- en: How to reinvent yourself
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何重塑自我
- en: Documenting your mind on the internet
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在互联网上记录你的思想
- en: How to create a brand, content, product, and promotions that make you money
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何创建能赚钱的品牌、内容、产品和促销活动
- en: One other thing before we start – we have opened up more spots for VIP and Mastermind.
    If you are a founder, creator, writer, or marketer who wants to work with us directly
    on your social media brand, content, and product… [apply here](https://intake.kortex.co).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始之前还有一件事——我们为VIP和Mastermind项目增加了更多名额。如果你是一位创始人、创作者、作家或营销人员，希望直接与我们合作，在你的社交媒体品牌、内容和产品上工作……[在此申请](https://intake.kortex.co)。
- en: This letter is long, but worth it.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这封信很长，但值得。
- en: Bodybuilding & Businessbuilding
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 健身与商业建设
- en: When you deconstruct the mind and body, you can map patterns that deepen your
    understanding across most domains of life.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 当你分解身心时，你可以在生活的多数领域中映射出加深你理解的模式。
- en: We will connect these patterns to the financial domain by starting a business.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 通过创办一家企业，我们将通过这些模式将金融领域联系起来。
- en: We can think of the mind as your mental body as we talked about in [Mental Aesthetics](https://thedankoe.com/letters/mental-aesthetics-how-to-build-a-beautiful-mind/).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将思维视为我们的精神身体，就像我们在[Mental Aesthetics](https://thedankoe.com/letters/mental-aesthetics-how-to-build-a-beautiful-mind/)中讨论的那样。
- en: We can also think of your business as the body or character you display externally.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以将你的企业视为你外部展示的身体或角色。
- en: A business is just that, a vessel for value exchange.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 生意就是这样，一个价值交换的载体。
- en: '*Personal growth is self-development, business growth is other-development.*'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '*个人成长是自我发展，商业成长是他人发展。*'
- en: 'In nutrition, there are 4 macronutrients:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在营养学中，有4种宏量营养素：
- en: Fat
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 脂肪
- en: Carbs
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 碳水化合物
- en: Protein
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 蛋白质
- en: Alcohol
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 酒精
- en: 'In business, there are 4 pillars that determine your success:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业中，有4个支柱决定了你的成功：
- en: Brand
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 品牌
- en: Content
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内容
- en: Product
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 产品
- en: Promotions
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 促销
- en: In nutrition, there are a plethora of micronutrients that maintain bodily functions.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在营养学中，有许多维持身体功能的微量营养素。
- en: In business, there are skills, interests, experience, knowledge, creativity,
    and personality that determine the potency of your efforts.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业中，有技能、兴趣、经验、知识、创造力和个性，这些决定了你努力的效力。
- en: Your job is to fuel your business with the proper creative nutrition to succeed.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 你的工作是给你的企业提供适当的创造性营养，以取得成功。
- en: You can opt for the business keto diet and take away content as carbs.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以选择商业生酮饮食，并将内容作为碳水化合物去除。
- en: Many people go the direct response marketing route and only use ads to fuel
    their business, but the benefits of content make it an unreasonable approach (especially
    for beginners without money to invest in making mistakes to learn advertising…
    [I learned this the hard way](https://thedankoe.com/letters/my-story-the-untold-truth-of-dan-koe/)).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人选择直接响应式营销路线，只使用广告来推动他们的业务，但内容的好处使得这种方法（尤其是对于没有资金投资于犯错误来学习广告的初学者）变得不合理……[我就是这样艰难地学到了这一点](https://thedankoe.com/letters/my-story-the-untold-truth-of-dan-koe/)。
- en: 'By having a daily content writing habit:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 通过养成每日内容写作的习惯：
- en: You can validate high-performing ideas as content to use in your ads or promotions.
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以将高绩效的想法作为内容用于你的广告或促销。
- en: You get to keep the audience you acquire. You aren’t always burning through
    money to acquire new customers.
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以保留你获得的受众。你并不总是需要烧钱来获取新客户。
- en: You create customers over time by writing content for all levels of awareness.
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你通过为所有意识水平的人写内容来逐渐创造客户。
- en: You can spend hundreds of thousands of dollars a year on ads.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 你每年可以在广告上花费数十万美元。
- en: Or you can build a 100,000 follower audience over a year and get the same amount
    of impressions.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 或者你可以在一年内建立一个10万粉丝的受众群体，并获得相同数量的曝光。
- en: Or you can do both, your call.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 或者你可以两者都做，由你决定。
- en: Progressive Overload Of Skill & Challenge
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 技能与挑战的渐进式负荷
- en: <picture decoding="async" class="wp-image-889">![](../Images/54b7637af6648b2b93f2bd5248e3d364.png)</picture>
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/54b7637af6648b2b93f2bd5248e3d364.png)'
- en: When you are starting out, it is unwise to take on too much as a one-person
    business.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 当你刚开始起步时，作为一个个体经营者承担太多是不明智的。
- en: You must become the marketing, sales, operations, and media department.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须成为市场营销、销售、运营和媒体部门。
- en: 'To create a brand, content, product, and promotions, you will need to learn
    at least the fundamentals of:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 为了创建品牌、内容、产品和服务，你需要至少学习以下基础：
- en: Marketing & sales
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 市场营销与销售
- en: Graphic design
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图形设计
- en: Web design
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网页设计
- en: Copywriting
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文案写作
- en: Content writing
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内容写作
- en: Email marketing
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 电子邮件营销
- en: Social media
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 社交媒体
- en: This is a blessing and a curse.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 这既是祝福也是诅咒。
- en: If you’ve never learned any modern skills, this will take a while.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你从未学习过任何现代技能，这需要一段时间。
- en: You will get overwhelmed and anxious at the thought of a future you don’t have
    the skill to create clarity with.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 当你想到一个你没有技能创造清晰未来的未来时，你会感到不知所措和焦虑。
- en: But social media is the perfect vessel to build as you learn.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 但是社交媒体是你在学习过程中构建的完美载体。
- en: In bodybuilding, you progressively overload the muscle by adding weight to the
    bar over time.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在健美训练中，你通过随着时间的推移增加杠铃上的重量来逐渐增加肌肉的负荷。
- en: If you ego-lift and put on too much weight, you won’t be able to lift it, and
    you’ll probably look like an idiot.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你自大，加上了太多的重量，你将无法举起它，你可能会看起来像个傻瓜。
- en: Start small and build your skill stack with time.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 从小开始，随着时间的推移建立你的技能栈。
- en: Do not start learning until you start building.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 除非你开始构建，否则不要开始学习。
- en: Buy courses, books, and search for content that teaches how to do all of this
    well as you are building.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在你构建的过程中，购买课程、书籍，并寻找教授如何做好所有这些内容的资料。
- en: Create one project.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个项目。
- en: Set one goal.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 设定一个目标。
- en: Learn one skill.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 学习一项技能。
- en: Get good at it so you have mental energy for the next.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 做得很好，这样你就有精神能量去应对下一个。
- en: Repeat.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 重复。
- en: '**Build your profile.** Study social media and graphic design (for your banner
    and profile picture).'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '**建立你的个人品牌**。研究社交媒体和图形设计（用于你的横幅和头像）。'
- en: '**Start writing content**. Study copywriting, content writing, marketing, and
    post structures.'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '**开始写作内容**。研究文案写作、内容写作、市场营销和帖子结构。'
- en: '**Ideate a product.** Study marketing, sales, and offer creation.'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '**构思一个产品**。研究市场营销、销售和提供。'
- en: '**Learn to promote.** Study email marketing, promotions, and copywriting.'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '**学习如何推广**。研究电子邮件营销、促销和文案写作。'
- en: With all of this, don’t get complacent.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有这些中，不要自满。
- en: If you don’t seek a higher challenge after you stop seeing good results from
    the first, you will get bored.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你停止看到第一次尝试的好结果后不再寻求更高的挑战，你会感到无聊。
- en: Boredom leads to thoughts of quitting because you feel like there is something
    better you could be doing with your time.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 无聊会导致你产生放弃的想法，因为你感觉好像有更好的事情可以做。
- en: In the gym, a great thing to do is observe what others are doing to correct
    your form. You can also watch videos of people online.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 在健身房，一件好事是观察别人在做些什么来纠正你的姿势。你还可以观看在线上人们的视频。
- en: Emulate what others are doing in the creator space.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 模仿创作者空间中其他人正在做的事情。
- en: Pull inspiration from creators’ bios, content, and marketing.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 从创作者的个人资料、内容和营销中汲取灵感。
- en: But – and this is a *big* but – realize that people more advanced than you are
    at a different level. What they are doing may not be what they did when they were
    starting out.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 但是——这是一个很大的但是——认识到比你更高级的人处于不同的水平。他们正在做的事情可能不是他们刚开始时做的事情。
- en: This is a long process of experimentation.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个长期的实验过程。
- en: Time Under Attention
  id: totrans-120
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意力下的时间
- en: <picture decoding="async" class="wp-image-1585">![](../Images/f175b94b3a240442b42e987b7ba5b710.png)</picture>
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/f175b94b3a240442b42e987b7ba5b710.png)'
- en: In weight training, there is a concept known as *time under tension*.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 在力量训练中，有一个被称为“张力下的时间”的概念。
- en: Some argue it is the main driver of muscle growth (paired with progressive overload).
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人认为这是肌肉增长的主要驱动力（与渐进式超负荷相结合）。
- en: I want to make the same argument for business, but as *time under **attention***.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 我想为商业提出同样的论点，但作为“**注意力**”下的时间。
- en: This is arguably the most important thing to pay attention to when building
    an audience with your writing and content.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能是你在用写作和内容建立受众时最需要注意的重要事情。
- en: Attention is the currency of the 3rd millennium.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 注意力是第三千年的货币。
- en: The more people pay attention to you, the more power you have.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 你受到的关注越多，你的力量就越大。
- en: Authors, podcasters, and YouTubers often have the most loyal audiences.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 作者、播客主持人和YouTube博主通常拥有最忠实的受众。
- en: Why? Because information creates identity.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？因为信息创造身份。
- en: The more attention you hold, the more information you deliver.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 你保持的注意力越多，你提供的信息就越多。
- en: You program the minds of your audience in a way that is conducive to actually
    changing their life.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 你以有助于真正改变他们生活的方式编程你受众的头脑。
- en: You can write short posts for social media all day long, but someone who has
    held more attention will always outperform you.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以整天写短帖子用于社交媒体，但那些能保持更多注意力的人总是会比你表现得更好。
- en: 'James Clear will get more engagement and reach because:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: James Clear将获得更多的参与度和影响力，因为：
- en: People have adopted his worldview.
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人们已经接受了他的世界观。
- en: People quote him in their content, newsletters, and podcasts.
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人们在他们自己的内容、通讯和播客中引用他。
- en: Any time someone else posts a related idea to Clear, the authority is given
    to Clear because he comes to mind while reading *your* content. Clear is still
    holding their attention while they read others’ content.
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每当有人在其他内容中发表与Clear相关的想法时，权威就赋予了Clear，因为他在阅读你的内容时首先想到的是你。当他们在阅读他人内容时，Clear仍然在保持他们的注意力。
- en: This does not mean that short-form content like X, Instagram, or LinkedIn are
    useless. Quite the opposite. They have their own benefits and use cases.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不意味着像X、Instagram或LinkedIn这样的短形式内容是没有用的。恰恰相反，它们有自己的优点和用例。
- en: Don’t think in black and white here. Think holistically.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里不要只考虑黑白，要全面思考。
- en: I see short-form platforms as a way to attract a broad audience quicker to fuel
    your long-form platforms that are arguably more difficult to grow.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为短形式平台是一种更快吸引广泛受众的方式，以支持那些可能更难增长的长形式平台。
- en: I almost always recommend starting with short-form to build an audience, build
    a network, and validate high-performing ideas that you can then turn into long-form
    videos, newsletters, or combine all of them into a book.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 我几乎总是推荐从短形式开始，以建立受众、建立网络，并验证那些你可以将其转化为长形式视频、通讯或将其全部结合成一本书的高绩效想法。
- en: And, the longer you do it, the more attention you hold. Quitting after 1-6 months
    is stupid.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 而且，你做得越久，你保持的注意力就越多。1-6个月后放弃是愚蠢的。
- en: 1% of 50 years is 6 months.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 50年中的1%是6个月。
- en: If this is the work you see yourself doing for your entire life, don’t quit
    during the tutorial phase.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你打算一生都从事这项工作，那么在教程阶段不要放弃。
- en: If I create 365 posts a year (on all platforms) and those posts hold attention
    for 30 seconds, that’s 3 hours of attention held – per reader – on each platform
    over a year.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我每年（在所有平台上）创建365篇帖子，并且这些帖子能保持30秒的注意力，那么在一年内每个读者在每个平台上都能保持3小时的注意力。
- en: If I create 1 long-form post a week (for a newsletter, YouTube, and podcast
    all being the same) and these posts hold 20 minutes of attention, that’s 52 hours
    of attention held per reader for all platforms.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我每周创建一篇长形式帖子（无论是用于通讯、YouTube还是播客，都一样），并且这些帖子能保持20分钟的注意力，那么每个读者在所有平台上都能保持52小时的注意力。
- en: I’ll let you come to the conclusion of why I wrote a book that may be purchased
    by millions.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 我会让你得出结论，为什么我会写一本可能被数百万人购买的书。
- en: 'So, it’s important that you treat short-form platforms for what they are:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，重要的是你要正确看待短形式平台：
- en: A way to build a broad audience faster, validate ideas, and funnel people into
    various products and long-form content.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 一种更快建立广泛受众、验证想法并将人们引导到各种产品和长形式内容的方式。
- en: For writers, I always recommend using X and a newsletter.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 对于作家来说，我总是推荐使用X和通讯。
- en: One short-form and one long-form platform to start.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 从一个短形式和一个长形式平台开始。
- en: Then, when you’ve spent enough time actually seeing growth, you can repurpose
    all of your best short and long-form content for different platforms. This is
    what I teach in [2 Hour Writer](https://2hourwriter.com).
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，当你真正看到足够的时间增长后，你可以将所有最好的短形式和长形式内容重新用于不同的平台。这就是我在[2小时作家](https://2hourwriter.com)中教授的内容。
- en: Turn Your Self Into A Business (Mental Monetization)
  id: totrans-152
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将你的自我转化为商业（精神货币化）
- en: <picture loading="lazy" decoding="async" class="wp-image-1580">![](../Images/85df55dffa2fee70be3624c39cd10553.png)</picture>
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-1580">![](../Images/85df55dffa2fee70be3624c39cd10553.png)</picture>
- en: Your self, or identity, is your mental body.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 你的自我，或者说身份，是你的精神体。
- en: The “self” is a web of concepts, beliefs, ideas, experiences, and perceptions
    that allow you to navigate the world.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: “自我”是一个由概念、信仰、想法、经验和感知交织而成的网络，它使你能够导航这个世界。
- en: The information you learn and use since birth is what shapes the self.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 从出生以来，你所学到的知识和使用的信息塑造了你的自我。
- en: Your identity shapes your perspective, and your perspective is the most important
    thing you can understand and expand.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 你的身份塑造了你的观点，而你的观点是你能理解和扩展的最重要的事情。
- en: Your perspective is your reality.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 你的观点就是你的现实。
- en: A perspective is a frame composed of goals, problems, and skill to overcome
    those problems to achieve those goals.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 观点是由目标、问题和克服这些问题的技能组成的框架。
- en: It is also composed of beliefs, knowledge, and experiences that either limit
    or aid in the achievement of goals, solving of problems, and understanding of
    knowledge.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 它还由信念、知识和经验组成，这些经验要么限制，要么有助于实现目标、解决问题和理解知识。
- en: When we aren’t conscious of the goals or problems that compose our perspective,
    we are not choosing how we act. The goals were assigned to us.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们没有意识到构成我们观点的目标或问题时，我们并没有选择我们的行为方式。目标是被赋予我们的。
- en: If we don’t have the skill to overcome problems to achieve goals, we get anxious,
    overwhelmed, and negative to the point of lashing out.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们没有克服问题以实现目标的能力，我们就会感到焦虑、不知所措，并变得消极，以至于会爆发。
- en: When you don’t seek to understand the goal of someone else in life, social media,
    politics, religion, or the rest – it is easy for us to misinterpret their situation
    and think they are stupid for doing what they do.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 当你不寻求理解他人生活中的目标，社交媒体、政治、宗教或其他方面时——我们很容易误解他们的处境，认为他们做他们所做的事情是愚蠢的。
- en: In reality, we lack perspective.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，我们缺乏观点。
- en: We can’t open our minds to see that we are not the only perspective.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 我们无法打开我们的思想，看到我们不是唯一的角度。
- en: The goals and problems that compose your perspective determine what information
    you perceive as important.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 构成你观点的目标和问题决定了你将哪些信息视为重要。
- en: Given time, the information you consume either reinforces who you are or changes
    who you are by expanding your perspective to contain better problems and meaningful
    goals.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 给予时间，你消费的信息要么加强了你现在的样子，要么通过扩展你的观点以包含更好的问题和有意义的自标来改变你现在的样子。
- en: From those meaningful goals, you can acquire a unique combination of skills
    to achieve them.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 从那些有意义的自标中，你可以获得实现它们所需的一套独特技能组合。
- en: '**Person A has an unconscious goal that was assigned to them by society.**'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: '**A. 有一个社会赋予他们的无意识目标。**'
- en: They were made to believe that getting a job as a doctor was their only path
    in life.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 他们被说服相信，成为一名医生是他们生活中唯一的道路。
- en: So, whether they know it or not, all of the information, books, podcasts, social
    media content, and conversations will be interpreted to acquire information that
    helps them achieve their goal.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，无论他们是否意识到，所有信息、书籍、播客、社交媒体内容和对话都将被解释，以获取帮助他们实现目标的信息。
- en: Their skillset will form from that information as they attempt to achieve the
    goal.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 当他们试图实现目标时，他们的技能组合将由此信息形成。
- en: There are more goals and problems influencing interpretation here – like watching
    memes on their phone all day because they don’t have a stronger goal that requires
    them to self-educate to achieve it.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 这里还有更多影响解释的目标和问题——比如整天在手机上看搞笑图片，因为他们没有更强大的目标需要他们自我教育来实现。
- en: '**Person B has a conscious goal that they chose for themself based on a problem
    they became aware of.**'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: '**B. 有一个他们自己选择的有意识目标，这个目标是基于他们意识到的某个问题。**'
- en: This sets them up for success in more ways than just achieving their goal.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅使他们在实现目标方面取得成功，而且在更多方面为他们铺平了道路。
- en: First, it prevents them from being a mindless product of the social matrix (the
    groundless loop of webbed information passed down from the government, schools,
    and parents just so they can teach their children the same).
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，它阻止了他们成为社会矩阵（从政府、学校和父母那里传下来的无根据的信息网络循环）的无意识产物。
- en: Second, the path of changing who they are, creating a unique path in life, and
    achieving goals that solve burning problems sets them up for a life of meaning,
    money, and mastery.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，改变他们是谁，创造一条独特的人生道路，实现解决紧迫问题的目标，为他们设定了有意义、有钱和精通的生活。
- en: Documenting Your Mind On The Internet (And Getting Paid To Do So)
  id: totrans-178
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在互联网上记录你的思维（并获得报酬）
- en: Now we understand a very brief description of the human behavior feedback loop.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们理解了人类行为反馈循环的一个非常简短的描述。
- en: Identity influences perspective influences perception of situations influences
    choices influences identity and loops back around to infinity.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 身份影响观点，影响对情况的感知，影响选择，影响身份，并无限循环。
- en: To turn your mind into a business, your job is to change your behavior for the
    better so you can change others.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 要将你的思维转化为商业，你的任务是改善你的行为，以便你可以改变他人。
- en: '**1) Brand Is Your Online Character Or Identity**'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 品牌是你的在线角色或身份**'
- en: The front end of a business is a brand. This is what they display online to
    attract the right people and illustrate their digital identity.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 商业的前端是品牌。这是他们在网上展示给正确的人，并展示他们的数字身份的东西。
- en: 'Since we are turning *your* self into the business, your job is to attract
    the people you can help the most:'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们正在将*你的*自我转化为商业，你的任务是吸引你可以帮助最多的人：
- en: People that are like you.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 像你一样的人。
- en: The people who share the same goals and problems as your past or present self
    but don’t have the skill to achieve and overcome them.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 与你的过去或现在自我有相同目标和问题，但没有技能去实现和克服它们的人。
- en: You already have the knowledge, experience, and skills to pass down to those
    who are one step behind you. That’s all you need to start a business.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经拥有了知识、经验和技能，可以传授给那些落后一步的人。这就是你开始创业所需的一切。
- en: 'So, your job on your website, social media profiles, and anywhere your brand
    is displayed is to:'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在你的网站、社交媒体个人资料以及你的品牌展示的任何地方，你的工作是：
- en: Imply a meaningful goal you help people achieve.
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提出一个你帮助人们实现的有意义的目标。
- en: Imply a burning problem you can help them solve.
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提出一个你可以帮助他们解决的紧迫问题。
- en: Imply the interests or skills that you teach to bridge the gap between problem
    and goal.
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提出你教授的兴趣或技能，以弥合问题和目标之间的差距。
- en: This creates your digital reality.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 这创造了你的数字现实。
- en: It creates the frame that you and your customers share so you can exchange knowledge
    and skill.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 它为你和你客户之间创造了共享的框架，这样你们就可以交换知识和技能。
- en: This does not have to be explicitly said in your branding.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 这不必在你的品牌中明确表达。
- en: It must be implied in your designs, writing, and video.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 这必须在你的设计、写作和视频中暗示。
- en: Your brand is created with time under attention as people learn more about you
    through your content and products.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 你的品牌是在关注下随着时间的推移而形成的，随着人们通过你的内容和产品更多地了解你。
- en: 'My brand slogan is: *Work less. Earn more. Enjoy life.*'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 我的品牌口号是：*少工作，多赚钱，享受生活*。
- en: 'My bio was occasionally: *I write about human potential, writing, and mental
    mastery so you can do what you want.*'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 我的个人简介偶尔是：*我写关于人类潜能、写作和心灵掌控，这样你就可以做你想做的事*。
- en: I don’t recommend copying these as they probably won’t work for you. I have
    more time under attention than you and have the freedom to not be as explicit.
    This will require more study of my other letters like [Value Creation](https://thedankoe.com/letters/value-creation-the-skill-that-built-my-one-person-business/)
    or [The Greatest Skill Of The 21st Century](https://thedankoe.com/letters/the-most-important-skill-of-the-21st-century-only-1-use-it/).
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 我不推荐复制这些，因为它们可能对你不起作用。我比你有更多的时间在关注下，有自由不那么明确。这需要更多地研究我的其他信件，如[价值创造](https://thedankoe.com/letters/value-creation-the-skill-that-built-my-one-person-business/)或[21世纪最伟大的技能](https://thedankoe.com/letters/the-most-important-skill-of-the-21st-century-only-1-use-it/)。
- en: '**2) Content Is Your Mindset & Skillset**'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 内容是你的心态和技能**'
- en: Content becomes a necessity when you realize its power.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 当你意识到内容的力量时，内容就变成了必需品。
- en: Marketers know the power of traffic, a list of interested customers, and the
    power of long-form writing or video – but many of them come around to the content
    game late (like myself).
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 营销人员知道流量、潜在客户名单以及长篇写作或视频的力量——但其中许多人是在内容游戏上晚些时候才加入的（就像我自己一样）。
- en: They don’t realize that the long webinar that made you millions can just be
    a video on YouTube that gets hundreds of thousands of views (once you get the
    hang of the social media game).
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 他们没有意识到，让你赚了百万的长期网络研讨会可以只是一个在YouTube上获得数十万观看次数的视频（一旦你掌握了社交媒体游戏）。
- en: 'I understand a webinar funnel, or similar, can be more strategic, but it doesn’t
    rule out the other benefits of writing content:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 我明白网络研讨会漏斗或类似的东西可能更具有战略意义，但这并不排除写内容的其他好处：
- en: '**You enhance your thinking.** Your ideas become clear with time and it ripples
    into the rest of your life. You can’t have a great idea if you don’t write a good
    idea first. Your first content won’t be that good, that’s okay.'
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你提升了你的思考能力。**随着时间的推移，你的想法变得清晰，并影响到你生活的其他方面。如果你不先写出一个好想法，你就无法有一个伟大的想法。你的第一篇内容可能不会那么好，这是正常的。'
- en: '**It’s free most of the time.** You can grow organically, or you can move your
    ad spend to paid growth by connecting with and having big players share your posts
    (don’t listen to anyone that tells you this doesn’t work, they don’t understand
    it. It doesn’t work for them because their brand and content and strategy suck).'
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**大多数时候它是免费的。**你可以自然增长，或者你可以通过联系大玩家并让他们分享你的帖子来将你的广告支出转移到付费增长（不要听信那些告诉你这不起作用的人，他们不了解它。它对他们不起作用，因为他们的品牌、内容和策略很糟糕）。'
- en: '**You create customers.** Unlike ads, you keep your audience and can remarket
    to them at any time. As you create educational content, people *become* customers
    because your information shapes who they are.'
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你创造了客户。**与广告不同，你可以保持你的观众，并且可以在任何时候向他们重新营销。当你创建教育内容时，人们*成为*客户，因为你的信息塑造了他们的身份。'
- en: '**You validate and test ideas fast.** I can send out a tweet, and if it does
    better than usual, I can turn that into a sales page headline, YouTube title,
    or entire product that I know will sell.'
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**快速验证和测试想法。**我可以发一条推文，如果它的表现比平时好，我就可以将其变成销售页面标题、YouTube标题，或者我知道会卖得好的整个产品。'
- en: Here is how I help [people I work with](https://intake.kortex.co) to build their
    brand by dissecting their minds to turn into content.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我如何通过剖析他们的思维来帮助[我合作的人](https://intake.kortex.co)建立他们的品牌，将其转化为内容。
- en: 'First, answer these questions (write the answers down so you can write content
    with the answers):'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，回答这些问题（写下答案，这样你就可以用答案来写内容）：
- en: What are 5-10 beliefs that are seen as “extreme” or “crazy” to other people
    but are normal to you? (This is what differentiates you and leads to the most
    growth.) I.E. I believe entrepreneurship is for everyone and have reasoning from
    psychology, mechanics, history, and philosophy to back that.
  id: totrans-211
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 有哪些5-10个在你看来是“极端”或“疯狂”但对你来说却是正常的信念？（这就是你与众不同的地方，也是你成长的最大动力。）例如，我相信创业适合每个人，并且有心理学、力学、历史和哲学的推理来支持这一点。
- en: What are 5-10 interests or skills that help you create the lifestyle you live
    and help your followers achieve?
  id: totrans-212
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 有哪些5-10个兴趣或技能能帮助你创造你生活的这种生活方式，并帮助你的追随者实现？
- en: Why are those interests or skills important? What do they help people avoid
    or gain in life?
  id: totrans-213
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为什么那些兴趣或技能很重要？它们帮助人们在生活中避免什么或获得什么？
- en: What foundational knowledge do people need to understand about those skills
    or interests? (This keeps you from being too advanced or high level so you actually
    resonate with people.
  id: totrans-214
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人们需要了解哪些基础知识才能理解那些技能或兴趣？（这让你不会过于高级或高深，从而真正与人们产生共鸣。）
- en: Now, pair these with the [10 Koemmandments of Engagement](https://thedankoe.com/letters/the-most-important-skill-of-the-21st-century-only-1-use-it/)
    and try turning everything you listed into content. It also helps to understand
    the principles of Value Creation which I linked above.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，将这些与[10 Koemmandments of Engagement](https://thedankoe.com/letters/the-most-important-skill-of-the-21st-century-only-1-use-it/)结合起来，尝试将你列出的每一项都转化为内容。这也有助于理解我上面提到的价值创造原则。
- en: During this process, write so a 5th grader can understand you.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个过程中，写到你认为一个五年级学生也能理解的程度。
- en: That is a huge problem I see in the space. People overcomplicate their message
    with niche wording that doesn’t attract people to *become* interested in your
    interests.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这个领域看到的一个大问题是。人们用只有少数人能理解的词汇过度复杂化他们的信息，这不会吸引人们对你感兴趣的兴趣。
- en: You aren’t attracting people who are already interested. You are *making* them
    interested through persuasion.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 你不是在吸引已经感兴趣的人。你是在通过说服*制造*他们的兴趣。
- en: 'Lastly, here are a few traps people fall into:'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，这里有几点人们容易陷入的陷阱：
- en: '*Trap 1 – They focus way too much on promotions or making sure they only talk
    about their product.*'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: '*陷阱1 – 他们过于关注促销或确保他们只谈论自己的产品。*'
- en: Talk about your beliefs, opinions, and educate people on the information necessary
    to become above average in your interests and skills 80% of the time. Promote
    sparingly. It’s like cashing in goodwill with your audience.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 讨论你的信仰、观点，并教育人们了解成为你兴趣和技能领域80%以上的人所必需的信息。适度推广。这就像用你的观众的好感度来换取现金。
- en: '*Trap 2 – They don’t understand the importance of structure VS content.*'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: '*陷阱2 – 他们不理解结构VS内容的重要性。*'
- en: This goes far beyond writing content for business. It is a metaphysical principle.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 这远远超出了为商业写作内容的范畴。这是一个形而上的原则。
- en: For now, take your *ideas* and use high-performing structures and frameworks
    as training wheels until you actually develop your writing ability. Look at quotes,
    newsletter structures, post structures, and the rest and try plugging your ideas
    into them.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，带着你的*想法*，使用高绩效的结构和框架作为训练轮，直到你真正发展你的写作能力。看看引言、通讯结构、帖子结构等等，并尝试将你的想法插入其中。
- en: '*Trap 3 – They don’t research or use high-performing angles.*'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: '*陷阱3 – 他们没有研究或使用高绩效的角度。*'
- en: Any idea can go viral. But only when it is positioned in an attention-grabbing
    way that entertains, educates, or inspires.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 任何想法都可以病毒式传播。但只有当它以一种吸引注意力的方式定位，娱乐、教育或启发时。
- en: You are a dopamine dealer.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 你是一个多巴胺商人。
- en: You raise dopamine levels in your readers’ brains by teaching them something
    new, giving a new point of view, entertaining them, or showing them they are capable
    of more in life.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 通过教授他们新知识、提供新的观点、娱乐他们或向他们展示他们在生活中能够做到更多，你在读者的脑海中提高多巴胺水平。
- en: Study your favorite accounts’ most popular X posts, Instagram posts, YouTube
    videos, and start programming your mind to think in high-performing headlines.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 研究你最喜欢的账户中最受欢迎的X帖子、Instagram帖子、YouTube视频，并开始训练你的大脑以高绩效标题的方式思考。
- en: 'The lesson of content:'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 内容的教训：
- en: '*Good content occurs when you attempt to inject your mindset and skillset into
    your readers over the course of 6-12 months, not in one post.*'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: '*好的内容发生在你试图在6-12个月内将你的心态和技能集注入读者的过程中，而不是在一篇帖子中。*'
- en: '**3) Product Is How You Achieved A Meaningful Goal**'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 产品是你实现有意义的目标的途径**'
- en: When you are the niche, people follow you because they want to achieve the lifestyle
    you have. They want to do what you do.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 当你是细分市场时，人们跟随你是因为他们想要实现你所拥有的生活方式。他们想要做你所做的事情。
- en: You are already educating them on how to do it with your content.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过你的内容正在教育他们如何去做。
- en: The difference between content and product is convenience, clarity, and a replicable
    system that gets results.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 内容和产品之间的区别在于便利性、清晰性和一个可复制的系统，它能带来结果。
- en: '*What is the most meaningful goal you achieved in your life?*'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: '*你一生中实现的最有意义的成就是什么？*'
- en: '(My example: I earn a living writing about my interests.)'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: （我的例子：我通过写关于我的兴趣来谋生。）
- en: '(Potential example: I got a six-pack without doing cardio.)'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: （潜在例子：我通过不做有氧运动就获得了六块腹肌。）
- en: '(Another example: I unlocked extreme focus to build my side business.)'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: （另一个例子：我通过解锁极端专注来建立我的副业。）
- en: '*What steps do people need to take to get there?*'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: '*人们需要采取哪些步骤才能达到那里？*'
- en: '(My example: Write, build a readership, persuade, sell.)'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: （我的例子：写作，建立读者群，说服，销售。）
- en: '(Potential example: Minimalist training and intermittent fasting.)'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: （潜在例子：极简训练和间歇性禁食。）
- en: '*What do people need to learn to take those steps?*'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: '*人们需要学习什么才能采取这些步骤？*'
- en: '(My example: Social media, copywriting, content.)'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: （我的例子：社交媒体，文案写作，内容。）
- en: '(Potential example: The principles of training and nutrition.)'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: （潜在例子：训练和营养的原则。）
- en: '*What can those people practice and implement in their day to get there?*'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: '*这些人可以在他们的日常生活中练习和实施什么来达到那里？*'
- en: '(My example: the 2 hour content ecosystem.)'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: （我的例子：2小时内容生态系统。）
- en: '(Potential example: the executive training system for busy people.)'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: （潜在例子：为忙碌人士的行政培训系统。）
- en: (I’m giving these systems fancy names because it is known as a “unique mechanism”
    in marketing. It is novel. Novelty catches attention and makes people think, “This
    may be the thing that finally solves my problem!”)
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: （我之所以给这些系统起个花哨的名字，是因为在营销中它被称为“独特机制”。它是新颖的。新奇能吸引注意力，让人们想，“这可能就是最终解决我问题的东西！”）
- en: Boom, that’s the outline of your product.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 嘣！这就是你产品的概要。
- en: Please note that those are all brief mediocre examples. Get more specific.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，这些都是简短的平庸例子。要更具体。
- en: 'A “meaningful goal” that you help people achieve is determined by solving a
    burning problem within human nature in the eternal markets: health, wealth, relationships,
    and happiness.'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 一个“有意义的”目标，你帮助人们实现，是通过解决永恒市场中人类本质中的燃眉之急：健康、财富、关系和幸福。
- en: If you haven’t already achieved a meaningful goal in a unique way, I will help
    you in another letter about mastering new skills fast.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还没有以独特的方式实现一个有意义的，我将通过另一封信帮助你快速掌握新技能。
- en: 'Until then:'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 直到那时：
- en: Set a goal in one domain of your life.
  id: totrans-255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在你生活的某个领域设定一个目标。
- en: Drown yourself in knowledge and education around it.
  id: totrans-256
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在这个领域的知识和教育中沉浸自己。
- en: Document that knowledge as content (teaching is how you learn and identify what
    you don’t know so that you can learn efficiently).
  id: totrans-257
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将这些知识作为内容（教学是学习的方式，也是识别你不知道什么以便高效学习的方法）记录下来。
- en: 'Crucial: experiment with different techniques (like training programs, diets,
    ways to make money, etc).'
  id: totrans-258
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关键：尝试不同的技术（如培训计划、饮食、赚钱的方式等）。
- en: Identify the fundamentals, truths, and principles between the different techniques.
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别不同技术之间的基本原理、真理和原则。
- en: Achieve the goal by creating your own way of getting there.
  id: totrans-260
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过创造自己的方式去实现目标来达成目标。
- en: Then, distribute that as a digital product that sells while you sleep with obscenely
    high-profit margins.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，将这个作为数字产品分发出去，在你睡觉的时候也能赚取高额的利润。
- en: From there, you have the resources (readership and income) to build whatever
    other business your heart desires.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，你就有资源（读者群和收入）去建立你心中所渴望的任何其他业务。
- en: '**4) Promotions Are Why You Achieved The Goal**'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 推广是你实现目标的原因**'
- en: People don’t care about features, they care about benefits.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 人们不关心功能，他们关心好处。
- en: Assume that everyone is selfish, because they are, even if that selfishness
    comes from feeling good about themselves by being selfless.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 假设每个人都自私，因为他们确实是，即使这种自私来自于通过无私而感到自我良好。
- en: Marketing is about creating the most powerful “why.”
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 市场营销是关于创造最强大的“为什么”。
- en: A “why” implies a transformation.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: “为什么”意味着一种转变。
- en: Transformations are what people want.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 转变是人们想要的。
- en: Like how physique transformation journeys always get a lot of views on YouTube.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 就像体形转变之旅在YouTube上总是能获得很多观看量。
- en: Or how life transformations get you emotional and invested in the person.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 或者说，生活转变如何让你情感上投入并对这个人产生兴趣。
- en: A transformation is a story, and that’s what our minds’ are wired to be attracted
    to, trust, and connected to.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 转变是一个故事，这正是我们的心智所倾向吸引、信任和连接的。
- en: 'So, you need to do 1 of 2 things:'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，你需要做两件事中的一件：
- en: Tell people why the product will change their life.
  id: totrans-273
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 告诉人们这个产品将如何改变他们的生活。
- en: Tell people why it changed your life (because they will read it as if they were
    changing there’s).
  id: totrans-274
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 告诉人们它如何改变了你的生活（因为他们会像改变自己的生活一样阅读它）。
- en: I’ve been a marketer for almost 6 years now.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 我现在已经做了近6年的市场营销员。
- en: Here’s all you need to know to actually make some money.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你需要知道的一切，实际上可以赚到一些钱。
- en: 'A story or transformation is composed of 3 things:'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 一个故事或转变由三件事组成：
- en: A burning problem.
  id: totrans-278
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个紧迫的问题。
- en: A desirable outcome.
  id: totrans-279
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个期望的结果。
- en: A clear solution.
  id: totrans-280
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个清晰的解决方案。
- en: That’s your entire marketing campaign.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是你的整个营销活动。
- en: You will have to test each one until you strike gold with the right positioning,
    but then you are set for a while.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 你将不得不测试每一个，直到你找到正确的定位，然后你就可以稳定一段时间。
- en: Those 3 components will be used whenever you ask someone to buy your product
    in your emails, landing page, IG story, YouTube promotion, or the rest.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 这三个要素将在你通过电子邮件、着陆页、IG故事、YouTube推广或其他方式请求人们购买你的产品时被使用。
- en: Long-form promotions are like a full sales page, you have to fill up the page
    by guiding people through that structure (go and read the introduction of this
    letter).
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 长篇推广就像一个完整的销售页面，你必须通过引导人们通过这个结构来填充页面（去读这封信的引言）。
- en: 'Short-form promotions are like a call to action inside an email like:'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 短篇推广就像电子邮件中的行动号召：
- en: If you’ve tried the “latest and greatest” business models without any success
    (and are considering accepting your fate at a day job), it’s because you are falling
    for tactics.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你尝试了“最新和最伟大的”商业模式但没有成功（并且正在考虑接受一份日常工作），那是因为你陷入了策略的陷阱。
- en: In [Digital Economics](https://digitaleconomics.school), I teach the principles
    of building a purposeful business.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 在[数字经济学](https://digitaleconomics.school)中，我教授构建有目的的企业的原则。
- en: Brand, content, product, and promotions so you can talk about your interests
    and earn a creative income.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 品牌、内容、产品和推广，这样你就可以谈论你的兴趣并赚取创意收入。
- en: Now, when writing promotions, you have to know what part of your audience you
    are talking to. How long have they been reading your content and do they understand
    your philosophy?
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，当你撰写推广内容时，你必须知道你在和你的哪个受众群体对话。他们阅读你的内容有多久了，他们是否理解你的理念？
- en: I see this mistake often.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 我经常看到这个错误。
- en: People have very high-level language (like manifesting a life of alignment to
    be a peaceful being) and their audience couldn’t care less.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 人们有着非常高级的语言（比如实现与和平存在对齐的生活），而他们的受众对此并不关心。
- en: If you haven’t defined “alignment” and “manifesting” to your beginner-level
    audience, then don’t write this way.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还没有对你的入门级听众定义“对齐”和“显化”，那么就不要这样写。
- en: Be straightforward. Be simple. Be impactful.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 直接了当。简单明了。有影响力。
- en: Give people what they want.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 给予人们他们想要的东西。
- en: Don’t give people what you think they want.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 不要给予人们你认为他们想要的东西。
- en: That’s it for this one, it’s already way too long.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 就这些了，已经够长了。
- en: I hope you enjoyed it.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 希望你喜欢。
- en: Dan
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 丹
