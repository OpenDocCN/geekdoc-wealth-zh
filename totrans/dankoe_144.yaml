- en: How To Make The Greatest Comeback Of Your Life
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/how-to-make-the-greatest-comeback-of-your-life/](https://thedankoe.com/letters/how-to-make-the-greatest-comeback-of-your-life/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Most people feel trapped.
  prefs: []
  type: TYPE_NORMAL
- en: Their mind feels narrow and small.
  prefs: []
  type: TYPE_NORMAL
- en: They can’t escape the bubble of repetitive negative thoughts.
  prefs: []
  type: TYPE_NORMAL
- en: They lack clarity on what to do with their life.
  prefs: []
  type: TYPE_NORMAL
- en: They don’t know that “one thing” they want to commit to because everyone in
    the self-help space yells at them to focus on “one thing,” but that completely
    misses the point.
  prefs: []
  type: TYPE_NORMAL
- en: (You don’t focus on one thing. You focus on one mission, which forces you to
    focus on many things. Focusing on one thing is a surefire way to become dependent
    on that thing and never adapt.)
  prefs: []
  type: TYPE_NORMAL
- en: They have these random ambitions like gaining some followers on social media,
    starting some random business they found out about online, trying to “get a girl”
    to end their loneliness, or any other thing they can latch onto for some sense
    of direction in their life. Those things in particular, like building a business,
    seem worthwhile because at least it’s a different path from the dead-end one that
    our botched culture set them on.
  prefs: []
  type: TYPE_NORMAL
- en: It’s no wonder why most people fail to start.
  prefs: []
  type: TYPE_NORMAL
- en: It’s no wonder why they question everything they do.
  prefs: []
  type: TYPE_NORMAL
- en: It’s no wonder why most people struggle to achieve anything worthwhile.
  prefs: []
  type: TYPE_NORMAL
- en: So they slowly start to accept that maybe they were meant to be average. Maybe
    you were meant to wake up, hit snooze 4 times, walk the dog, commute to work,
    act like you enjoy the people there, act as you care about your tasks, commute
    home, argue with your significant other, watch TV, pass out, repeat.
  prefs: []
  type: TYPE_NORMAL
- en: But there’s something missing.
  prefs: []
  type: TYPE_NORMAL
- en: You’re trying to achieve freedom with a mind that was conditioned to be a servant.
  prefs: []
  type: TYPE_NORMAL
- en: That’s like trying to put a square block in a circular hole.
  prefs: []
  type: TYPE_NORMAL
- en: It will never work.
  prefs: []
  type: TYPE_NORMAL
- en: How To Figure Out What You Want In Life
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2416">![](../Images/1dd4c789661d67c7448ca3db2d52e247.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Humans are natural generalists.
  prefs: []
  type: TYPE_NORMAL
- en: Humans *build tools* to adapt to different niches and environments.
  prefs: []
  type: TYPE_NORMAL
- en: Animals, on the other hand, like lions in the Sahara or polar bears in Alaska,
    wouldn’t survive if they were thrown into a different niche.
  prefs: []
  type: TYPE_NORMAL
- en: This extends beyond physical tools.
  prefs: []
  type: TYPE_NORMAL
- en: Humans invented mental tools like language, culture, concepts, religion, and
    stories so they could adapt, build, and acquire the knowledge and skills necessary
    to thrive in any situation.
  prefs: []
  type: TYPE_NORMAL
- en: This is the ability that makes us unique.
  prefs: []
  type: TYPE_NORMAL
- en: This is the ability that most people have lost.
  prefs: []
  type: TYPE_NORMAL
- en: You see, as children, we love to adventure. We love to discover. We love to
    figure things out. We make mistakes and learn from them. *We touch fire.*
  prefs: []
  type: TYPE_NORMAL
- en: But then, our learning stops being about real mistakes.
  prefs: []
  type: TYPE_NORMAL
- en: It starts being about the traits our parents and teachers dislike in us. The
    traits they find annoying or uncivilized. The traits they don’t think will lead
    to the version of success they were conditioned to believe is the only one true
    path, and they haven’t opened their mind to the discovery that there is never
    only “one true path.”
  prefs: []
  type: TYPE_NORMAL
- en: And what is that one true path? It’s the reason you feel so lost, overwhelmed,
    anxious, confused, and the rest.
  prefs: []
  type: TYPE_NORMAL
- en: The path that was supposed to be safe and secure was the complete opposite.
  prefs: []
  type: TYPE_NORMAL
- en: You were plopped in front of a government-trained expert trained by government-trained
    experts who are clearly not doing what you want to do in life for 6 hours each
    day, being told what to learn, and how to act while constantly being prodded toward
    the status symbol of a job and degree. And if you understand how the mind works,
    you understand that the goals that compose your worldview – fancy degrees and
    high-paying jobs – determine your mind’s potential development and freedom.
  prefs: []
  type: TYPE_NORMAL
- en: You were trained to be a specialist.
  prefs: []
  type: TYPE_NORMAL
- en: You were solely focused on becoming a doctor, lawyer, artist, designer, engineer,
    or any other self-limiting identity that shaped what you were able to perceive
    and learn.
  prefs: []
  type: TYPE_NORMAL
- en: You failed to develop *agency.*
  prefs: []
  type: TYPE_NORMAL
- en: You failed to explore, fail, discover, and build by your own desire, not someone
    else’s. *You failed to develop the singular trait of a free individual.*
  prefs: []
  type: TYPE_NORMAL
- en: In the past, free men were expected to act on their own interests. To do that,
    it was implicit that they would do and learn many things throughout their life.
    The greatest designers are only great designers because of their experience in
    other domains of life, not because they went to a high-status school and somehow
    studied the same curriculum better than everyone else did.
  prefs: []
  type: TYPE_NORMAL
- en: A free individual is the opposite of a government-trained specialist, or someone
    who is viewed as a machine for labor. A useful worker. A slave.
  prefs: []
  type: TYPE_NORMAL
- en: The opposite of what I teach in [2 Hour Writer](https://2hourwriter.com), because
    writing is a skill that allows you to turn any interest into creative work, not
    static work.
  prefs: []
  type: TYPE_NORMAL
- en: Nature’s Compass
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-2417">![](../Images/3282f30bf7c89bc4f221dc54f5275fa3.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: The thing is, you’re different.
  prefs: []
  type: TYPE_NORMAL
- en: You’re aware of this.
  prefs: []
  type: TYPE_NORMAL
- en: You’re observant. Maybe a bit quiet. Afraid to speak your mind because they
    won’t listen anyway. But that silence is killing you. You tried to fit in. You
    tried to trust others with your future. You tried to demonize money, success,
    and the rest because “you don’t need it to live a good life,” but you need to
    *build*. Because that’s how you contribute to others, connect to something greater
    than yourself, and embark on a unique journey that brings an end to robotic living
    because you have the money to remove your dependency from that robotic living.
  prefs: []
  type: TYPE_NORMAL
- en: The thing is, you’re still looking for the “one true path.”
  prefs: []
  type: TYPE_NORMAL
- en: I’m here to tell you that there isn’t one.
  prefs: []
  type: TYPE_NORMAL
- en: If there was, we would have found it by now, and everyone would be rich, happy,
    and healthy. But that’s not how reality works. Things will *never* always be happy.
    Why? Because happy doesn’t make sense without sad. A hand doesn’t exist without
    an arm. The physical, biological, mental, and spiritual planes all contain this
    pattern. One thing cannot exist without the other.
  prefs: []
  type: TYPE_NORMAL
- en: When you go on a vacation, eventually, maybe after 2-3 weeks, it becomes normal
    to you. You get bored. It’s not a “vacation” anymore. It’s normal life. You want
    to get back to work. You want to do something, *anything,* that is just a bit
    more novel and interesting. Your mind craves balance, but not in the common sense
    of living a flat and miserable life. Your mind craves *contrast.*
  prefs: []
  type: TYPE_NORMAL
- en: 'All of this is leading up to say one thing:'
  prefs: []
  type: TYPE_NORMAL
- en: '*You aren’t where you want to be because you’re afraid of making mistakes.*'
  prefs: []
  type: TYPE_NORMAL
- en: I cannot express that enough.
  prefs: []
  type: TYPE_NORMAL
- en: If there were one true sentence in which to orient your life, that would be
    it.
  prefs: []
  type: TYPE_NORMAL
- en: Mistakes are nature’s compass.
  prefs: []
  type: TYPE_NORMAL
- en: If happiness can’t exist without sadness, success can’t exist without failure.
  prefs: []
  type: TYPE_NORMAL
- en: It is a *universal law. A pattern of reality. A phenomenon that has been around
    since the first sign of life, because something can’t exist without nothing.*
  prefs: []
  type: TYPE_NORMAL
- en: You can make mistakes on the conventional path – schools and jobs – but you
    are still working toward a narrow goal. The mistakes don’t lead toward a new,
    better path, they simply lead to you feeling sorry for yourself.
  prefs: []
  type: TYPE_NORMAL
- en: When you decide to be free – and reject the goals assigned to you at birth that
    made you think small and trapped you in this negative bubble of thoughts – your
    mistakes are your light in the dark.
  prefs: []
  type: TYPE_NORMAL
- en: But you don’t know what you want.
  prefs: []
  type: TYPE_NORMAL
- en: That’s the problem.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t realize that you will never know what you want. It’s in the future.
    It doesn’t exist. It’s imaginary. Life changes. What you want now could, and will
    absolutely be, different tomorrow, the next day, or the next decade. But you’ll
    never embark on this process of refinement and purification because you can’t
    seem to allow yourself to fail.
  prefs: []
  type: TYPE_NORMAL
- en: What you want out of life becomes more clear when you realize what you don’t
    want out of life and work in the other direction. Since you haven’t made any mistakes
    on your own path, it’s obvious why you don’t know what you want out of life.
  prefs: []
  type: TYPE_NORMAL
- en: 'My advice:'
  prefs: []
  type: TYPE_NORMAL
- en: Do what you want without permission from someone else.
  prefs: []
  type: TYPE_NORMAL
- en: Go to the party. Get drunk. Start the business. Scroll on your phone all night.
    Do whatever your little heart desires. Seriously, because denying those desires
    is only going to bind you to them.
  prefs: []
  type: TYPE_NORMAL
- en: But there’s a catch.
  prefs: []
  type: TYPE_NORMAL
- en: You need to be able to realize when those things are a mistake.
  prefs: []
  type: TYPE_NORMAL
- en: Getting drunk every night isn’t a mistake if you don’t have meaningful responsibilities
    to wake up to every morning. It’s not hurting your ability to achieve the goal.
    Managing parties and alcohol becomes a lot easier when it impacts something more
    important than parties and alcohol. Since your schooling and job aren’t more important,
    you don’t care and do it anyway. You need your own goals, and you can only generate
    those goals by getting absolutely fed up with where you are and rejecting everything
    you thought was true.
  prefs: []
  type: TYPE_NORMAL
- en: You need to start from scratch.
  prefs: []
  type: TYPE_NORMAL
- en: How To Make The Greatest Comeback Of Your Life
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Tradition becomes our security, and when the mind is secure it is in decay.
    ― J. Krishnamurti
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You cannot make discoveries in the known.
  prefs: []
  type: TYPE_NORMAL
- en: It just doesn’t make sense.
  prefs: []
  type: TYPE_NORMAL
- en: Please realize that.
  prefs: []
  type: TYPE_NORMAL
- en: You absolutely cannot live a full, open, and non-robotic life if you operate
    by what your parents and teachers planted in your head. Sure, you can be happy
    at times, as all people are, but being deeply fulfilled is a different story.
    Most people haven’t experienced that feeling because it’s unknown to them, so
    they don’t bother searching for it and instead project their insecurities by telling
    you how fulfilled they are working as a robot would. The lines of code are engraved
    on their brain. Again, you can’t perceive what is a mistake if you don’t have
    a goal that allows you to.
  prefs: []
  type: TYPE_NORMAL
- en: You must launch into the unknown, feel as if you are drowning, and learn how
    to swim. That is how you learn anything, and that is why most people learn nothing.
    They would rather jump off the deep end, complain about how hard it is (as if
    it were supposed to be any other way, or as if something that is hard is bad or
    negative rather than reality itself), and blame anyone but themselves for their
    inability to do anything without it being given to them.
  prefs: []
  type: TYPE_NORMAL
- en: But all of my rambling up until this point doesn’t help with the fact that you
    are already drowning right here and now.
  prefs: []
  type: TYPE_NORMAL
- en: So what do you do? How do you learn? How do you make the greatest comeback of
    your life?
  prefs: []
  type: TYPE_NORMAL
- en: Get Mad At Where You Are
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The best periods of my life came after getting absolutely fed up with the lack
    of progress I was making.
  prefs: []
  type: TYPE_NORMAL
- en: I didn’t care what I did. I just had to do something. I would try anything to
    get out of that situation. Most people would call that desperation, but I would
    call it a mind that’s hungry to learn, grow, and evolve to the next level.
  prefs: []
  type: TYPE_NORMAL
- en: The goal isn’t to immediately find one thing that eases your pain.
  prefs: []
  type: TYPE_NORMAL
- en: The goal is to accept a radical shift in how you live.
  prefs: []
  type: TYPE_NORMAL
- en: You must realize that all of your actions compounded to where you are right
    now, and if you continue doing those things, you will remain where you are. The
    only real change is behavior change, so say goodbye to almost everything you hold
    onto so tightly right now that you think “aren’t that bad.” You clearly can’t
    manage them well.
  prefs: []
  type: TYPE_NORMAL
- en: You must become disgusted with where you are.
  prefs: []
  type: TYPE_NORMAL
- en: You must fabricate a mental rock bottom.
  prefs: []
  type: TYPE_NORMAL
- en: Write down everything you don’t want in life.
  prefs: []
  type: TYPE_NORMAL
- en: The stupid mind. The pudgy body. The sluggish energy. The dead-end relationships.
    Reject them.
  prefs: []
  type: TYPE_NORMAL
- en: You’re allowed to be extremely negative, as negative energy is much more potent
    than positive, but you must channel it toward forging a new identity.
  prefs: []
  type: TYPE_NORMAL
- en: I’m not telling you to make simple habit changes.
  prefs: []
  type: TYPE_NORMAL
- en: I’m telling you to completely flip the switch.
  prefs: []
  type: TYPE_NORMAL
- en: Because if you do this correctly… if you gain absolute awareness of what you
    don’t want in life, this isn’t a difficult process. You won’t want to do anything
    other than the opposite of what you’ve been doing your entire life.
  prefs: []
  type: TYPE_NORMAL
- en: Disappear For 3 Months
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you don’t have a vision, you are lost.
  prefs: []
  type: TYPE_NORMAL
- en: The negative energy has nowhere to go, so it gets trapped and wreaks havoc in
    your mind. Psychic entropy. If you don’t have a meaningful path, system, or goal
    to invest that energy into, you decay.
  prefs: []
  type: TYPE_NORMAL
- en: But a vision doesn’t start out clear.
  prefs: []
  type: TYPE_NORMAL
- en: It starts as an educated guess.
  prefs: []
  type: TYPE_NORMAL
- en: You won’t be confident in it.
  prefs: []
  type: TYPE_NORMAL
- en: “I think I want to try this business.”
  prefs: []
  type: TYPE_NORMAL
- en: “I think I want to read this book.”
  prefs: []
  type: TYPE_NORMAL
- en: And that’s all it takes to begin reprogramming your mind in a positive direction
    by redirecting energy toward a better life.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to map out your vision and break it down into actionable steps,
    use my [Simple Life Reset planner](https://app.kortex.co/public/document/883d9246-6dde-4794-9f54-92b8ff07d502)
    that you can duplicate and fill out. It will help.
  prefs: []
  type: TYPE_NORMAL
- en: Now that you are brutally aware of what you don’t want, laser in on what you
    think you want.
  prefs: []
  type: TYPE_NORMAL
- en: Fix your physical diet. Fix your mental diet. Go on more walks. Learn a new
    skill. Go to the gym. Go on a walk. Talk to someone new today. You’re in the unknown
    for Christ’s sake. Yes, it’s going to be a bit uncomfortable. But that doesn’t
    take away from the fact that a mediocre life is the most uncomfortable thing in
    the world. Once you realize that, truly realize it, everything else doesn’t seem
    so bad.
  prefs: []
  type: TYPE_NORMAL
- en: Give yourself 3 months, not 2 weeks.
  prefs: []
  type: TYPE_NORMAL
- en: You need enough time to invest the right amount of energy to the point of seeing
    that thing as important. Like a song you don’t like, but when you listen to it
    enough, it becomes your favorite song.
  prefs: []
  type: TYPE_NORMAL
- en: The gym isn’t going to be fun the first time.
  prefs: []
  type: TYPE_NORMAL
- en: The skill is going to be difficult the first time.
  prefs: []
  type: TYPE_NORMAL
- en: But as your skill begins to match the challenge of the situation, you begin
    to find the game extremely addicting to the point where it’s all you want to do.
  prefs: []
  type: TYPE_NORMAL
- en: If It’s Wasn’t A Mistake, You Didn’t Learn A Thing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The best decisions I’ve made are ones that most people see as stupid.
  prefs: []
  type: TYPE_NORMAL
- en: I’m good at making massive mistakes because I’ve realized that’s what leads
    to massive growth.
  prefs: []
  type: TYPE_NORMAL
- en: In 2018, I maxed out my first credit card to try to make a business work.
  prefs: []
  type: TYPE_NORMAL
- en: In 2019, I got rid of everything I owned (except for a bad of clothes and my
    laptop) and flew to a different country.
  prefs: []
  type: TYPE_NORMAL
- en: In 2020, I signed a lease for an apartment that was 2x what I could afford.
    This forced me to make my business work.
  prefs: []
  type: TYPE_NORMAL
- en: 'The catch:'
  prefs: []
  type: TYPE_NORMAL
- en: These don’t start as mistakes. They start as risks. The payoff of that risk
    is the mistake because if that risk only led to success, you wouldn’t learn a
    thing, and you wouldn’t be able to replicate it.
  prefs: []
  type: TYPE_NORMAL
- en: Why does this work?
  prefs: []
  type: TYPE_NORMAL
- en: '**Reason #1**'
  prefs: []
  type: TYPE_NORMAL
- en: Goldfish grow to fit the take you put them in.
  prefs: []
  type: TYPE_NORMAL
- en: But if you keep them in a small bowl, they never grow.
  prefs: []
  type: TYPE_NORMAL
- en: The same is true for your mind.
  prefs: []
  type: TYPE_NORMAL
- en: '**Reason #2**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Parkinson’s Law:'
  prefs: []
  type: TYPE_NORMAL
- en: Work expands so as to fill the time allotted for completion.
  prefs: []
  type: TYPE_NORMAL
- en: When you launch yourself into the unknown, you threaten your survival, and you
    have less time to become a success.
  prefs: []
  type: TYPE_NORMAL
- en: '**Reason #3**'
  prefs: []
  type: TYPE_NORMAL
- en: The theme of going full circle.
  prefs: []
  type: TYPE_NORMAL
- en: Imagine a straight line with black on one end and white on another blended with
    a gradient.
  prefs: []
  type: TYPE_NORMAL
- en: Now, connect the two ends so it forms a circle.
  prefs: []
  type: TYPE_NORMAL
- en: There is an instant flip from black to white.
  prefs: []
  type: TYPE_NORMAL
- en: A joke that’s so unfunny that it becomes funny.
  prefs: []
  type: TYPE_NORMAL
- en: Someone who is so dumb they become insightful.
  prefs: []
  type: TYPE_NORMAL
- en: Someone who is in so much pain they have no option but to find enjoyment.
  prefs: []
  type: TYPE_NORMAL
- en: This is a universal pattern.
  prefs: []
  type: TYPE_NORMAL
- en: Leverage it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s the psychology behind it:'
  prefs: []
  type: TYPE_NORMAL
- en: You set a challenging goal that deep down you know you can achieve.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You create a REAL deadline which eliminates distractions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It leverages your survival instincts to quickly learn what’s necessary to stay
    alive.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So, what do you do?
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Feel into your situation**'
  prefs: []
  type: TYPE_NORMAL
- en: Become brutally aware of the life you don’t want to live. Let your mind simmer
    with negativity.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Launch into the unknown**'
  prefs: []
  type: TYPE_NORMAL
- en: Make a stupid decision. Force yourself to pursue the dream you’ve been putting
    off. Sink or swim.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Learn and build like a mad scientist**'
  prefs: []
  type: TYPE_NORMAL
- en: Perform emotional alchemy with the stress, pain, and overwhelm.
  prefs: []
  type: TYPE_NORMAL
- en: Channel everything into that one meaningful goal.
  prefs: []
  type: TYPE_NORMAL
- en: Study and learn while your mind is primed to store all relevant information.
  prefs: []
  type: TYPE_NORMAL
- en: You’ll make it through.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
