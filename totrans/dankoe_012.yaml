- en: How To Write Authentic Content (Social Media Growth 101)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/dont-get-replaced-by-ai-how-to-write-authentic-content/](https://thedankoe.com/letters/dont-get-replaced-by-ai-how-to-write-authentic-content/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*People want to follow humans.*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: They don’t want to follow a search engine with a face on it.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: And, with the rise of ChatGPT and future iterations of language AI, authenticity
    is more important than ever.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Everyone is desperate for human connection, and social media is not delivering
    that.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: You can, and it will lead to more authority than you could imagine.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Authenticity, from my predictions, will be the differentiating factor for the
    future generation of creators (which is why I talk about philosophy, self-awareness,
    and other non-business topics that actually make you stand out in business).
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: I’ve worked directly and indirectly with over 5,000 creators, and this is a
    problem they encounter time and time again.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: '*This seems to be the most overwhelming problem.*'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Creators don’t know how to incorporate who they are into their content.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: This makes people quit before it starts getting good.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: And, even if you stick it out, if you don’t display who you are and where you
    came from, what separates you from a robot?
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: Even worse, people that try to incorporate more than one interest don’t know
    how to write in a way that leads to growth, authority, and engagement.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: 'Before we dive into organizing your topics, writing content, and turning 1
    idea into 10, here’s a bit of credibility:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: I started as a creator 3 years ago.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: I launched a product right when I started, which most people warn against.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: I wrote about anything I wanted to, like emotional management and self-improvement,
    when my product was related to web design.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: I incorporated web design tweets here and there (maybe once every 2 days?) because
    I knew it was important.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: 'The most important thing for those worried about monetization:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: Talk about whatever you want, and when you plan to promote, talk about that
    topic more.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: It’s that simple.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: Well, kinda.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: Experience will teach you more than I can here.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: '**Before we dive in:**'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: The first Solopreneur Sprint starts February 7th.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: In 14 days, we will create confidence in your niche of one, create 20+ foundational
    content pieces, and create a zero-cost growth strategy for your creator brand.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '[>> Check it out here if interested.](https://sprints.digitaleconomics.school)'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: Your Topic Tree
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you don’t know what to write about, [read the last letter about turning yourself
    into the niche.](https://thedankoe.com/the-most-profitable-niche-is-you-how-to-create-your-niche/)
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: In that letter, we outlined your life story and turned it into book chapters.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: What skills and interests are going to help you create your ideal future?
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: And for those that are already on the path, what skills, interests, and expertise
    do you have that have helped you achieve your goals?
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: Understand that non-money-making interests help you achieve your goals as well.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: If your ideal future consists of being at peace and not worrying about money…
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: It sounds like spirituality is the solution to all of those, not money. So,
    don’t hesitate to include the things you love talking about.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: An added benefit is your passion for that interest will display in your content.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: These are what we are going to use for our content.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: Choose 2-3 Interests Or Skills You Want To Write About
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: These should already be at the top of your mind.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: I can’t help you much here, as I am not you.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t have interests you want to write about, you need to set a goal,
    start pursuing it, and learn what will help you get there.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: Broaden & Breakdown
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most people start with hyper-specific interests like “biomechanical movement
    therapy” and get stressed out because so few people are interested in it.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: Even further, they get stressed out again because they feel like if they don’t
    talk about that specific thing, their entire monetization potential goes down
    the drain.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: Not how it works, my friend. Zoom out.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s say my interests are:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: Web design
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Weight lifting
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Spirituality
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: From those, I want to broaden them into the overarching market they reside in.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: Web design = online business or business in general.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: Weight lifting = bodybuilding or health in general.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: Spirituality = self-actualization or improvement.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have 3 broad markets we can move within, we want to break them down
    into topics and sub-topics.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: 'The beauty in this method:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: If you want to make money with an interest like “biomechnical movement therapy,”
    you can attract people interested in health.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: Then, you can slowly raise their awareness around bio movement and educate them
    on why its important.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: '*You are not supposed to* *just* *attract people that know everything about
    your main interest**.* Why would they buy from you?'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: 'With those 3 interests, grab a notebook and break them down like so:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-993">![](../Images/5c93faa6e14c2754ae90ae24124e2781.png)</picture>
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: Your job is to cover this entire domain in 6-12 months with all lengths of content.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: That is how your brand perception is formed.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: Remember The 3 Pillars Of Social Leverage
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before we start creating content, we want to have a balance of the content style
    we write.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: The 3 pillars of social leverage are growth, authenticity, and authority.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: Your content, on a 1-2 month timescale, should hit each of these.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: If you aren’t growing, pivot.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: If you aren’t making sales, pivot.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: If you aren’t gaining loyal fans, pivot.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: Iterate as you get more *real-world* feedback. You have to post, even if it
    sucks.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: How To Write 3 Authoritative Content Pieces
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We are going to be writing tweets for this.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: Why? Because tweets are the perfect length and structure for high-performing
    posts on any platform.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: My LinkedIn posts, Instagram posts and reels, TikToks, and the rest are all
    based off of my tweets.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: We are going to start by establishing authority in your main interest, the one
    that makes you money.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: We will use “marketing” as an example.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: 'With any of the examples below, you can:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: Turn them into threads or newsletters for more authority
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Repurpose any point of the list into its own post
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Copy and paste them to other platforms
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use them as scripts for Shorts, Reels, or TikToks
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s dig in.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: Actionable Principles
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Simple, write a list that goes over actionable steps a beginner can take.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: This helps you build authority in one interest. And, even advanced people will
    follow you, because they understand the importance of the fundamental principles.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: For all of these, please keep in mind that you should follow a hook > body >
    conclusion structure.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: 'Your content sucks because you don’t:'
  id: totrans-87
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-88
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Hook in the reader
  id: totrans-89
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-90
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Agitate their problem
  id: totrans-91
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-92
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Relate to their problem
  id: totrans-93
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-94
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Give them a valuable solution
  id: totrans-95
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-96
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Human psychology will always beat what you think will work.
  id: totrans-97
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-98
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Clear, not clever.
  id: totrans-99
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I’m writing these on the spot, so these won’t be perfect, but do this along
    with me.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: Pick one of your main interests, craft a hook, give actionable value, and wrap
    it up nicely.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: Practice makes perfect.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: Importance Of A Topic
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most people don’t care about what you are writing about because they don’t understand
    its importance.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: So, instead of packing up your bags and blaming the system…
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: Teach them why it’s important.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: '*This is how you make your interests interesting to other people.*'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: Make them aware of how it can impact their life.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: Marketing is the greatest skill you can learn.
  id: totrans-109
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-110
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Why?
  id: totrans-111
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-112
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – It pairs with any other skill
  id: totrans-113
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-114
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – It teaches you human psychology
  id: totrans-115
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-116
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – It helps you monetize a niche interest
  id: totrans-117
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-118
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Only a fool expects to make an income without learning the skill that turns
    scrollers into customers.
  id: totrans-119
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Here’s a great example I swiped from Taylin Simmonds on Twitter:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-994">![](../Images/96a3cec66f52575026b9562561decd70.png)</picture>
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: Try it out.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: Why is your main topic important?
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: How has it impacted your life?
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: Why should other people care?
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: Self-reflect and write a post on it.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: Calling Out Common Mistakes Or Problems
  id: totrans-127
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A great way to establish authority in your topic is to call out bad advice,
    common mistakes, or problems.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: This shows that you have experience and that you want to help your readers.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: Stop writing hyper-specific content.
  id: totrans-130
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-131
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As a beginner, you should be focused on growth.
  id: totrans-132
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-133
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Make your writing relatable
  id: totrans-134
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-135
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Focus on a common problem
  id: totrans-136
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-137
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Talk about the topic from a high level
  id: totrans-138
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-139
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Don’t expect to grow if only a few people would share your content.
  id: totrans-140
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This leads into my next advice.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: How To Get The Most Out Of Your Writing
  id: totrans-142
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Beginner creators struggle with seeing the big picture of content creation.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: You aren’t aiming for an immediate sale with every post.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: Your posts are not sales pages (but knowing how to write sales pages can help
    with your posts).
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: When you look at your writing, it should be obvious whether or not it would
    be shared by the average person scrolling on social media.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: If it’s not, and you don’t have a growth strategy in your niche, how do you
    expect to grow?
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: Shares are the engine for organic brand growth.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: Zoom out and realize that your content, over time, will introduce people to
    what you have to offer.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: When the time comes, and if you have the skill, they will buy from you.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: Broaden Your Content
  id: totrans-151
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: From the tweets I wrote above, are they authoritative?
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: Yes.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: Will they attract a potential customer (assuming I have more value they can
    find outside of my content)?
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: Yes.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
- en: Are they so specific that they won’t get shared?
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
- en: No.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: This is the balance you have to strike on top-of-funnel social media.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
- en: Then, when you bring them to your newsletter, lead magnet, and product sales
    pages – that’s where you get as specific as necessary.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: If your content seems like it wouldn’t be shared by a beginner, zoom out one
    layer and rewrite it.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
- en: Study The Best Content Structures
  id: totrans-161
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before we start writing content other than lists, I would recommend you study
    what good content looks like.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
- en: I personally use [TweetHunter](http://tweethunter.io/?via=thedankoe) (a software)
    and Twemex (a chrome plugin) to quickly see my favorite accounts’ top content.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: 'You can also use Twitter’s advanced search to do this by typing in:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: '*from:thedankoe min_faves:1000*'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
- en: To your Twitter search bar.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: Just replace my username with someone else’s and change the minimum likes to
    anything you’d like.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: Immerse yourself in that content and use it as training wheels for your own.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: What topics do you use to practice with this?
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
- en: Repurpose Your List Style Content
  id: totrans-170
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The lists you wrote above have multiple bullet points that can be turned into
    it’s own content.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
- en: These lists can also be turned into the outline of a thread, carousel, or newsletter.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: (I would highly recommend doing this to establish authority even more).
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
- en: For now, let’s focus on writing another short post.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
- en: From the first tweet we wrote above, the first bullet point is “hook in your
    reader.”
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: 'And if I take one of my high-performing tweet structures like this one with
    9,000 likes:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-992">![](../Images/0c9ece1f514bb38568a050e3a1c39860.png)</picture>
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: 'Then I can write a new tweet:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
- en: The greatest digital skill is the ability to capture, hold, and deliver value
    on attention.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: That could be better, but I know that one will do well.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
- en: You can see how simple all of this content writing stuff is if you follow these
    exact steps with all of your interests.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: 'To recap:'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
- en: You can, and should, incorporate your interests to make your brand authentic
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create a topic tree that you can master in 6-12 months through writing
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Write multiple list-style content pieces to establish authority in your main
    interest
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Broaden your writing if you don’t think it will be shared
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Study the best content structures, use them as training wheels, and branch off
    of what you’ve already written
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is all you need to get started with content creation.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
- en: In the next letter, we will discuss how you can get that content shared without
    spending a penny.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
- en: Hope you enjoyed this one, my friends.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
- en: Talk soon.
  id: totrans-191
