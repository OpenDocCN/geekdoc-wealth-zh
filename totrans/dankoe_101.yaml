- en: You’re Supposed To Feel Overwhelmed (How To Learn Any Skill FAST)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 你应该感到不知所措（如何快速学习任何技能）
- en: 原文：[https://thedankoe.com/letters/i-discovered-a-way-to-learn-10x-faster-reality-metabolism-universal-thinking/](https://thedankoe.com/letters/i-discovered-a-way-to-learn-10x-faster-reality-metabolism-universal-thinking/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/i-discovered-a-way-to-learn-10x-faster-reality-metabolism-universal-thinking/](https://thedankoe.com/letters/i-discovered-a-way-to-learn-10x-faster-reality-metabolism-universal-thinking/)
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1792">![](../Images/97748acc97a1997e9649b3c31d1444a9.png)</picture>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1792">![](../Images/97748acc97a1997e9649b3c31d1444a9.png)</picture>
- en: People think they aren’t supposed to feel overwhelmed.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 人们认为他们不应该感到不知所措。
- en: You feel slight discomfort
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你感到轻微的不适
- en: Your mind hates it
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的心智讨厌这种感觉
- en: You haven’t trained your awareness
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你还没有训练你的意识
- en: You snap back to comfort and pleasure in an instant
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你瞬间回到舒适和快乐中
- en: You close yourself off to expansion, growth, and understanding
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你封闭了自己，无法拓展、成长和理解
- en: When I attempt to learn something new, none of it makes sense.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 当我尝试学习新事物时，这一切都没有意义。
- en: I feel overwhelmed and like I’m regressing instead of progressing.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我感到不知所措，感觉自己是在退步而不是进步。
- en: In reality, I’m priming my mind for pattern recognition. My subconscious mind
    is soaking up information like a sponge as I expose myself to the new material.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，我正在为我的心智进行模式识别的预备。当我接触新材料时，我的潜意识像海绵一样吸收信息。
- en: Slowly, then all at once, it makes sense.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 慢慢地，然后突然，一切都变得有意义。
- en: The “click.”
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: “咔哒”的声音。
- en: The “aha! moment.”
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: “啊哈！”的时刻。
- en: The avalanche called insight crashes into your psyche.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 被称为洞察力的雪崩冲击到你的心理。
- en: But only if you stay with the discomfort, feel into it, and allow your supercomputer
    of a mind to piece everything together.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 但只有当你与不适相处，深入感受它，并允许你的超级计算机般的思维将一切拼凑在一起时，才能做到。
- en: Nothing happens, then everything happens.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 没有发生任何事情，然后一切事情都发生了。
- en: If you want the full philosophy and steps to turning what you learn into a meaningful
    career, grab [The Art of Focus](https://theartoffocusbook.com) on Amazon.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想了解将你所学转化为有意义职业的完整哲学和步骤，请从亚马逊购买[《专注的艺术》](https://theartoffocusbook.com)。
- en: Reality Metabolism – The Cause Of Mental Obesity
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 现实新陈代谢——心智肥胖的成因
- en: You feel overwhelmed because you can’t digest reality fast enough.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 你感到不知所措，因为你无法快速消化现实。
- en: You can’t deal with the overwhelm because it consumes your attention.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 你无法处理这种不知所措，因为它消耗了你的注意力。
- en: All you can focus on are the negative thoughts flooding your mind about how
    it won’t work, how you will fail, and how you could be doing something better
    with your time.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 你所能关注的只是你脑海中关于它不会奏效、你会失败以及你可以用你的时间做更好的事情的负面想法。
- en: In bodybuilding, you build muscle by increasing your food intake, stressing
    your body with resistance training, and getting ample rest for recovery.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在健身中，你通过增加食物摄入量、用抗阻力训练挑战你的身体，以及充足的休息来恢复来增加肌肉。
- en: You will gain a bit of fat along the way, but this is inevitable if you want
    to see noticeable results.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在路上，你可能会获得一些脂肪，但如果你想要看到明显的成果，这是不可避免的。
- en: In mindbuilding, you build knowledge by increasing your information intake,
    stressing your mind with challenging concepts, and taking breaks so your subconscious
    can munch on complex problems.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在心智构建中，你通过增加信息摄入量、用具有挑战性的概念挑战你的心智，以及休息以便你的潜意识能够咀嚼复杂问题来构建知识。
- en: When you learn something new, it’s new.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 当你学习新事物时，它是新的。
- en: Your mind hasn’t developed the systems that make it seamless.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 你的心智尚未发展出使其无缝运行的系统。
- en: You didn’t always know how to walk, talk, eat, drive, text, make your bed, throw
    a football, and whatever else you do for work, rest, and play.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 你并不总是知道如何走路、说话、吃饭、开车、发短信、整理床铺、扔橄榄球，以及你为工作、休息和娱乐所做的一切。
- en: You trained your mental metabolism to digest that aspect of reality with ease.
    You’ve built the mental muscle to lift the emotional labor that comes with doing
    those things.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 你训练了你的心智新陈代谢，使其轻松消化现实的那一方面。你已经建立了心智肌肉，以承担做那些事情所带来的情感劳动。
- en: The difference between then and now is the limits you’ve adopted as a part of
    your identity.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 那时和现在之间的区别是你已经接受并作为你身份一部分的界限。
- en: Your aged mind, when not kept in check with mindfulness, will cower at the first
    hint of discomfort.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的心智没有被正念所控制时，它会在不适的第一丝迹象面前退缩。
- en: And when you listen and obey the mind that doesn’t want what’s best for you,
    that becomes your default state. You become a robot self-programmed to avoid any
    pain, even when that pain is what brings meaning, fulfillment, and purpose to
    your life.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 而当你听从并服从那个不想对你最好的思想时，那就会成为你的默认状态。你变成了一个自我编程以避免任何痛苦的机器人，即使那种痛苦给你的生活带来了意义、满足感和目的。
- en: Live At The Edge Of Your Abilities
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在你能力的边缘生活
- en: If you consume too much and create too little, your mind gets fat.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你消耗过多而创造过少，你的思想就会变得肥胖。
- en: If you create too much and consume too little, your mind gets skinny.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你创造过多而消费过少，你的思想就会变得瘦弱。
- en: We want neither.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都不想要。
- en: When the flow of information is maximized in your life through the balance of
    consumption and creation, you will encounter meaningful events.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的生活中通过消费和创造的平衡使信息流最大化时，你将遇到有意义的事件。
- en: You will *feel* a deep sense of excitement for the future, fulfillment in the
    present, and gratitude for the past.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 你将*感受到*对未来充满兴奋，对现在感到满足，对过去感到感激。
- en: These feelings should be seen as an opportunity to document the important parts
    of your life that you can share with others.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这些感觉应该被视为一个机会，记录你生活中可以与他人分享的重要部分。
- en: When you read a good book and stumble across a lesson that sparks excitement,
    write it down.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 当你读一本好书并偶然发现一个激发兴奋的教训时，把它写下来。
- en: When you feel fulfilled in the present because of the progress you are making,
    write it down.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 当你因为取得的进步而在当下感到满足时，把它写下来。
- en: When you feel grateful that your past has led you to this moment, despite your
    mistakes, write it down (in something like [Kortex](https://kortex.co)).
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 当你因为过去带给你这个时刻而感到感激，尽管你有错误，把它写下来（比如在[Kortex](https://kortex.co)上）。
- en: As your notes of signal grow, you have data from which you can replicate those
    experiences.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你的信号笔记增长，你有了可以复制那些经历的数据。
- en: You can condition your mind to occupy these states of consciousness as a baseline.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以训练你的思想，使其占据这些意识状态作为基础。
- en: Your quality of life increases to a point of high stability.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 你的生活质量提高到一个高度稳定的状态。
- en: Universal Thinking – The Solution To Most Of Your Problems
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**通用思维 – 解决你大多数问题的方法**'
- en: You feel bad because your future self is watching your every move, and they
    don’t like what they see.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 你感觉不好，因为你的未来自我正在观察你的每一个动作，而且他们不喜欢他们看到的东西。
- en: 'The solution to most of your problems:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 解决你大多数问题的方法：
- en: Zoom out. Adopt the perspective of your ideal self. Break out of the narrow
    focus that traps you in a chaotic loop of negative thoughts.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 放大视角。采用你理想自我的视角。打破把你困在消极思维混乱循环中的狭隘关注。
- en: Understand where you are, choose where you want to be, and bridge the gap with
    education & execution.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 理解你现在在哪里，选择你想要去的地方，并通过教育与执行来弥合差距。
- en: Most people live in a state of closed-mindedness.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人生活在一种封闭的心态中。
- en: They fall victim to the anxiety, overwhelm, and stress that prevents them from
    seeing beyond their problems (so they can solve them).
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 他们成为了焦虑、压倒性和压力的受害者，这阻止了他们看到问题之外的东西（因此他们可以解决问题）。
- en: People focus on the bad lyric instead of the good song.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 人们关注的是糟糕的歌词，而不是好歌。
- en: People focus on the ugly pixel instead of the beautiful image.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 人们关注的是丑陋的像素，而不是美丽的图像。
- en: You are missing the context of the situation and misinterpreting it, so you
    remain stuck and unable to learn.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 你错过了情况的背景，误解了它，所以你陷入了困境，无法学习。
- en: You must train your ability to zoom out, adopt a higher perspective, and perceive
    situations as advantageous toward your end goal.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须训练你放大视角、采用更高视角并感知情况对你最终目标有利的能力。
- en: 'Form this habit:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 形成这个习惯：
- en: When you sense overwhelm, pause and break the reaction cycle.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 当你感到压倒性时，暂停并打破反应周期。
- en: 'Move up the perspective ladder by opening your mind:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 通过打开你的心扉，提升你的视角：
- en: '**1) Your current perspective** – take inventory of your current situation.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 你的当前视角** – 对你的当前情况进行盘点。'
- en: '**2) The perspective of your ideal self** – what would the highest version
    of yourself do?'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 你理想自我的视角** – 你最高版本的自我会做什么？'
- en: '**3) The perspective of the Universe** – beyond all limits, most of our worries
    are irrational and meaningless from the highest perspective.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 宇宙的视角** – 超越所有限制，从最高角度来看，我们的大多数担忧都是不合理的和无意义的。'
- en: These 3 stages are represented by the FOCI symbol on my book, [The Art of Focus](https://theartoffocusbook.com).
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这三个阶段在我的书《聚焦的艺术》（[The Art of Focus](https://theartoffocusbook.com)）中的FOCI符号表示。
- en: <picture decoding="async" class="wp-image-1793">![](../Images/deb7916d606be8d02d0830afb506a74d.png)</picture>
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-1793">![](../Images/deb7916d606be8d02d0830afb506a74d.png)</picture>
- en: When you zoom out far enough, only then can you discover potentials, connections,
    directions, and creative ideas that allow you to learn more than what you know.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 当你足够远地放大视野时，你才能发现潜力、联系、方向和创意想法，让你学习到比你已知更多的东西。
- en: Universal Thinking is the state of mind from which you can note patterns and
    understand topics from the big picture.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 普遍思维是从中可以注意到模式和从大局出发理解主题的心态。
- en: One can note the vast similarities between bodybuilding, mindbuilding, and businessbuilding
    – like progressive overload, time under tension, and proper nutrition – enhancing
    the results from each.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 可以注意到健身、心智建设和商业建设之间存在着巨大的相似性——比如渐进式超负荷、紧张状态下的时间以及适当的营养——这些都能增强每个方面的结果。
- en: On a Universal level, you can note the birth and death of muscle, ideas, and
    products – helping you live at peace with the flow of your body, mind, and business
    – or make a decision that leads to exponential growth.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在普遍层面上，你可以注意到肌肉、思想和产品的诞生与消亡——帮助你与你的身体、心智和商业的流动和平共处——或者做出导致指数级增长的决策。
- en: How To Learn 10x Faster
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何以10倍的速度学习
- en: <picture decoding="async" class="wp-image-1794">![](../Images/a680f3a524c111cf890e919a85c09174.png)</picture>
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-1794">![](../Images/a680f3a524c111cf890e919a85c09174.png)</picture>
- en: When you learn how to learn, you can achieve 5 years of results in 6 months.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 当你学会如何学习时，你可以在6个月内实现5年的成果。
- en: Let’s take everything we’ve learned above and ground it with practical steps.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们把上面学到的所有东西与实际步骤结合起来。
- en: 1) Create A Clarity Catalyst
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 创建一个清晰催化剂
- en: 'There were a few moments in my life when I made giant leaps in learning, understanding,
    and progress:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的生活中，有几个时刻我在学习、理解和进步方面取得了巨大的飞跃：
- en: Writing my book
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 撰写我的书
- en: Building my products
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建我的产品
- en: Writing these newsletters
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 撰写这些通讯
- en: What do they all have in common?
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 它们有什么共同之处？
- en: I treat them as a project.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 我把它们当作一个项目来对待。
- en: 'A project has:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 一个项目有：
- en: An outline so you can note ideas to fill in that outline from everyday life.
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个大纲，这样你可以从日常生活中记录下要填写该大纲的想法。
- en: Milestones so you have direction and clarity on your next steps.
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 里程碑，这样你就有方向和清晰度，知道下一步该做什么。
- en: A real-world deadline that forces you to act, or else your survival takes a
    hit.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个真实世界的截止日期，迫使你采取行动，否则你的生存将受到打击。
- en: Experimentation, trial, and error so you can turn failures into lessons.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过实验、尝试和错误，你可以将失败转化为教训。
- en: This presents a perfect environment for the flow state.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这提供了一个完美的环境，以进入心流状态。
- en: There is pattern recognition for novelty and dopamine, clarity from milestones,
    challenge from deadlines, and feedback from reality.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 有新颖性和多巴胺的识别模式，里程碑带来的清晰度，截止日期带来的挑战，以及现实带来的反馈。
- en: Determine what you want to learn.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 确定你想要学习的内容。
- en: Create a real-world project that you will publish for others to see.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个真实世界的项目，你将发布给其他人观看。
- en: If you don’t know what project to create, see what others have done.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道要创建什么项目，看看别人都做了什么。
- en: If you want to learn Photoshop, your project will be anything from a graphic
    to a digital art scene.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想学习Photoshop，你的项目可以是任何从图形到数字艺术场景的东西。
- en: If you want to learn how to bodybuild, your project is your body, nutrition
    regimen, and training program.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想学习如何健身，你的项目就是你的身体、营养计划和训练计划。
- en: Your project outline doesn’t have to be perfect. It can start as a jumbled list
    of ideas on what you think you have to do and learn.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 你的项目大纲不必完美。它可以从一个杂乱无章的想法列表开始，列出你认为必须做的事情和要学习的内容。
- en: A project is an experience anchor.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 一个项目是一个经验锚点。
- en: You now have somewhere to write ideas, knowledge, and techniques down to try.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你有了一个地方可以写下想法、知识和技巧来尝试。
- en: When I wrote my book, my book outline made life meaningful. Almost every idea
    I came across could be added to the outline.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 当我写我的书时，我的书的大纲让生活变得有意义。我遇到的几乎每一个想法都可以添加到大纲中。
- en: I felt like a child again. I became obsessed.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我感觉像回到了童年。我变得着迷。
- en: Everything was seen from a new lens. The lens of my project.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 所有的东西都通过一个新的视角来看待。我的项目视角。
- en: 2) Learn As You Build
  id: totrans-98
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 在构建中学习
- en: If you aren’t building, you aren’t learning.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有在构建，你就不在学习。
- en: If you aren’t actively applying what you learn to a problem sitting in your
    mind, you are simply stacking useless knowledge as soon-to-be-forgotten brain
    fog.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有将所学知识积极应用于你心中的问题，你只是在堆积即将被遗忘的无用知识，形成脑雾。
- en: 'When you *start* building something, there are only a few things you need to
    know: the fundamentals.'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 当你开始构建某样东西时，你只需要知道几件事：基础。
- en: You have no business researching advanced tactics yet.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在还没有资格研究高级策略。
- en: The fundamentals will take you 80% of the way there (and for most people, that’s
    millions of dollars, a jacked physique, or a stress-free life).
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 基础知识将带你前进80%（对于大多数人来说，那就是数百万美元、健硕的体格或无压力的生活）。
- en: New tactics will take you the next 20% of the way, but this mental bandwidth
    should be reserved for obsession, mastery, and your life’s work of a few specific
    skills and interests.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 新的策略将带你前进的20%，但这个心理带宽应该保留给痴迷、精通以及你少数几个特定技能和兴趣的终身事业。
- en: 'When you have a project to build, do one or both of the following:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 当你有一个要构建的项目时，做以下一项或两项：
- en: Purchase a beginner-level course on the topic
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 购买该主题的入门级课程。
- en: Watch overview videos on YouTube that teach the fundamentals
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 观看YouTube上教授基础知识的概述视频。
- en: 'Study them until you have clarity on what to do next. Then, do it, and when
    you encounter a problem:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 研究它们，直到你对下一步要做什么有清晰的了解。然后，去做，当你遇到问题时：
- en: Refer back to sections of the course or video
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回顾课程或视频的部分内容。
- en: Research how to solve that problem directly
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究如何直接解决这个问题。
- en: Watch tutorials where people *build* projects similar to yours and see how they
    overcome those problems
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 观看那些构建与你类似项目的教程，看看他们是如何克服那些问题的。
- en: Learning is problem-solving, not hoarding as much knowledge as you can.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 学习是解决问题，而不是尽可能多地囤积知识。
- en: 3) Teach What You Learn
  id: totrans-113
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 教你所学的
- en: <picture loading="lazy" decoding="async" class="wp-image-1795">![](../Images/0d69ea0d9c1f983bb5c1c2da0aab61eb.png)</picture>
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-1795">![](../Images/0d69ea0d9c1f983bb5c1c2da0aab61eb.png)</picture>
- en: I, of course, recommend teaching in public by writing as a [personal brand](https://thedankoe.com/letters/the-one-person-business-revisited-turn-yourself-into-a-business/)
    (or your public resume) so you can also attract high-paying opportunities as you
    learn. (This is what I teach in [2 Hour Writer](https://2hourwriter.com)).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我当然推荐通过写作作为[个人品牌](https://thedankoe.com/letters/the-one-person-business-revisited-turn-yourself-into-a-business/)（或你的公开简历）来公开教学，这样你也能在学习的同时吸引高薪机会。（这就是我在[2小时作家](https://2hourwriter.com)中教授的内容）。
- en: Write in public and let people criticize you.
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在公共场合写作，并让人们批评你。
- en: Teach your friends to make for interesting conversations.
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教你的朋友制作，以使对话更有趣。
- en: Take notes on the subject but write them as if you were teaching yourself.
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在这个主题上做笔记，但要以你自己在教自己的方式来写。
- en: Teaching almost forces you to make sense of the information.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 教学几乎强迫你理解信息。
- en: You have to structure it, explain it, and ensure that you aren’t giving false
    knowledge.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须构建结构，解释它，并确保你没有提供错误的知识。
- en: When I write these newsletters, I don’t know everything. But I can guarantee
    that writing for 4 years has accelerated my learning in the topics I love well
    beyond what I would’ve learned trapped in tutorial hell.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 当我写这些通讯时，我并不是无所不知。但我可以保证，写作4年加速了我对所爱主题的学习，远远超过了被困在教程地狱中能学到的东西。
- en: When you build a brand (not in the business sense, in the sense of your external
    display to the world), building and teaching collapse into your work.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 当你建立一个品牌（不是在商业意义上，而是在向世界展示你的外部展示意义上）时，构建和教学就会融入你的工作中。
- en: 'Your life becomes a meaningful series of solving problems, learning how to
    solve them, teaching others, and making an income doing so. I believe this is
    what evolution has allowed: people doing what they love without barriers thanks
    to the internet.'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 你的生活变成了一系列有意义的问题解决过程，学习如何解决问题，教别人，并通过这样做来赚钱。我相信这是进化所允许的：人们因为互联网而能够无障碍地做自己喜欢的事情。
- en: 'On imposter syndrome:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 关于冒名顶替综合症：
- en: Simple – be honest.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 简单——要诚实。
- en: Don’t fabricate your experience. Don’t lie about what you know. Teach from the
    lens you learned it.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 不要编造你的经验。不要对你所知的内容撒谎。从你学习的角度来教学。
- en: Something as simple and attention-grabbing as, *“I read The Art of Focus in
    23 hours, here are the life-changing lessons I learned on joining the new rich,”*
    is honest to where you are in your learning journey.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 就像“我在23小时内阅读了《专注的艺术》，这里是我加入新富行列学到的改变生活的教训”这样简单且引人注目的话，是诚实地反映了你在学习旅程中的位置。
- en: Similar to marketing a product, simply don’t promise results you don’t have.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 就像营销产品一样，不要承诺你无法实现的结果。
- en: 4) Expand Into A New Level Of Mind
  id: totrans-129
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 扩展到新的思维层面
- en: <picture loading="lazy" decoding="async" class="wp-image-1796">![](../Images/75848cb96cf15f67b881b51bca4a2cd1.png)</picture>
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-1796">![](../Images/75848cb96cf15f67b881b51bca4a2cd1.png)</picture>
- en: By this point, you may still feel overwhelmed or like you aren’t learning much.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 到这个阶段，你可能仍然感到不知所措，或者觉得你学不到很多东西。
- en: This is a good thing.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一件好事。
- en: Your mind is primed for pattern recognition.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 你的大脑已经准备好进行模式识别。
- en: 'So:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 所以：
- en: '**Launch yourself into the unknown** – immerse yourself in the culture, environment,
    and information related to what you are trying to learn.'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**投身于未知** – 沉浸在你想要学习的文化、环境和信息中。'
- en: '**Condition your mind through repetition and exposure** – slowly understand
    the lingo, vocabulary, and skill set of those who have seen success in that topic.'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通过重复和接触来调整你的心态** – 慢慢理解那些在该领域取得成功的人的语言、词汇和技能集。'
- en: '**Let your mind expand through the discomfort** – the worst thing you can do
    is quit when you are feeling growing pains.'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**让你的思维在不适中扩展** – 最糟糕的事情是在你感到成长的痛苦时放弃。'
- en: You aren’t seeing results because you aren’t the person who would see results.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有看到结果，因为你不是那个会看到结果的人。
- en: This process allows you to become a new person by letting your old version die.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程通过让你的旧版本死去，让你成为一个新人。
- en: Like when you are adopting new habits, you have to get out of the old environment
    that fueled your bad habits.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 就像当你养成新习惯时，你必须摆脱那些助长了你的坏习惯的旧环境。
- en: 'To make this more practical:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这更加实用：
- en: '**Read books** – books give you 10 years of effort from 6 hours of reading.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**阅读书籍** – 书籍让你在6个小时的阅读中获得了10年的努力。'
- en: '**Consume lectures** – long articles and videos give you 3 days of effort in
    20 minutes.'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**消费讲座** – 长篇文章和视频让你在20分钟内获得了3天的努力。'
- en: '**Follow new people** – this is less about consuming short-form content and
    more about training your mind to be in that tribe of people.'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**跟随新的人** – 这更多是关于训练你的思维去融入那个群体的内容消费，而不仅仅是消费短形式的内容。'
- en: Buy 3 books.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 买三本书。
- en: One best-seller, one technical, and one historical.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 一本畅销书，一本技术书，一本历史书。
- en: Burn through them and don’t let your obsession die.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 燃烧他们，不要让你的热情熄灭。
- en: This may seem like a long process, but we aren’t trying to learn something on
    a surface level, we are trying to become masters as fast as possible.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能看起来是一个漫长的过程，但我们并不是试图在表面层次上学习某样东西，我们是在尽可能快地成为大师。
- en: 5) Make Connections To Solidify Understanding
  id: totrans-149
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5) 建立联系以巩固理解
- en: When you master one thing, it becomes easier to master others.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 当你掌握了一件事，它就会变得更容易掌握其他事情。
- en: Principles are Universal. They overlap.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 原理是普遍的。它们相互重叠。
- en: When you master fitness, you can master business in half the time, and then
    relationships in another half.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 当你掌握了健身，你可以在一半的时间内掌握商业，然后在另一半时间内掌握人际关系。
- en: Most people never master one domain of their lives, so they never experience
    exponential personal growth.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人从未掌握他们生活中的一块领域，所以他们从未经历过指数级个人成长。
- en: 'When you feel like you have a solid understanding of the topic you are trying
    to learn:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 当你觉得自己对想要学习的主题有了稳固的理解时：
- en: '**Zoom out one layer** – move from “Photoshop” to “graphic design” to “creative
    work.”'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**退后一层** – 从“Photoshop”到“平面设计”再到“创意工作”。'
- en: '**Take note of signal** – when your mind signals important information, write
    it down.'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**注意信号** – 当你的大脑发出重要信息时，把它写下来。'
- en: '**Build better projects** – from a new level of mind, build a new project that
    will take you to the success you want to see.'
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**构建更好的项目** – 从一个新的思维层面，构建一个能带你看到你想要的成功的新项目。'
- en: In my own experience, my knowledge compounded when I peeled back a layer from
    web design to marketing to content creation to metaphysics.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 在我自己的经验中，我的知识在我从网页设计剥离到市场营销，再到内容创作，最后到形而上学的过程中得到了累积。
- en: This is also a great way to start your one-person business.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是开始你个人业务的一个好方法。
- en: Start by learning, teaching, and building in one domain then branch out as your
    audience expands.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 从在一个领域学习、教学和构建开始，然后随着受众的扩大而扩展。
- en: We help you do this and start your digital career in 90 days inside [Kortex
    University](https://university.kortex.co).
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 我们帮助你这样做，并在90天内开始在[Kortex大学](https://university.kortex.co)的数字职业。
- en: Now, go learn, build, and enjoy your weekend.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，去学习，去构建，享受你的周末吧。
- en: Dan
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 丹
