- en: Focus Is A Superpower (How To Succeed In The Information Age)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 专注是超能力（如何在信息时代取得成功）
- en: 原文：[https://thedankoe.com/letters/focus-is-a-superpower-how-to-succeed-in-the-information-age/](https://thedankoe.com/letters/focus-is-a-superpower-how-to-succeed-in-the-information-age/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/focus-is-a-superpower-how-to-succeed-in-the-information-age/](https://thedankoe.com/letters/focus-is-a-superpower-how-to-succeed-in-the-information-age/)
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1331">![](../Images/953db71c77ed360ad6d6b0aba7f304cc.png)</picture>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1331">![](../Images/953db71c77ed360ad6d6b0aba7f304cc.png)</picture>
- en: That’s what we are here to discuss today.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是我们今天要讨论的。
- en: It is a simple framework for creating a better life for yourself.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个创建更好生活的简单框架。
- en: But first, we need to understand its importance.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 但首先，我们需要理解其重要性。
- en: Why is focused work a superpower?
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么专注工作是超能力？
- en: Happiness is a skill and it’s easier than ever to practice unhappiness.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 幸福是一种技能，而练习不幸福比以往任何时候都容易。
- en: How?
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 怎么样？
- en: We don’t live in the same world as our ancestors.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我们并不生活在我们祖先的世界里。
- en: The physical world has changed of course.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 物质世界当然也发生了变化。
- en: There are more buildings.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 建筑物更多。
- en: Our routines are different.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的日常惯例是不同的。
- en: The environment changed to reflect human progress and could be detrimental to
    our long-term health unless we revert back, or we create a sustainable solution.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 环境发生了变化，以反映人类进步，除非我们回归，或者我们创造一个可持续的解决方案，否则可能会对我们的长期健康产生不利影响。
- en: But the mental world? Completely different story.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 但心灵世界？完全不同的故事。
- en: As we continue to build the physical world, our mind has to adapt and evolve
    to discover and implement new information.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们继续建造物质世界，我们的心灵必须适应和进化，以发现和实施新的信息。
- en: We call this creativity, our divine gift.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们称之为创造力，我们的神圣礼物。
- en: The physical world was here before human consciousness.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 物质世界在人类意识之前就存在了。
- en: When the plane of mind emerged, it transcended and included both the physical
    and biological.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 当心灵平面出现时，它超越了并包括了物理和生物。
- en: Meaning, the physical is a part of the larger biological, and the biological
    is a part of the larger mental.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 意味着物质是更大生物的一部分，而生物是更大心灵的一部分。
- en: '[<picture decoding="async" class="wp-image-1325">![](../Images/ba12ecbbd30271a27d0a3c8f8701ca02.png)</picture>](https://www.integralworld.net/reynolds6.html)'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '[<picture decoding="async" class="wp-image-1325">![](../Images/ba12ecbbd30271a27d0a3c8f8701ca02.png)</picture>](https://www.integralworld.net/reynolds6.html)'
- en: Think of the old world as an acorn.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 把旧世界想象成一粒橡子。
- en: Think of the new world as a 100-year-old oak tree (that can live to 600-1000
    years old).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 把新世界想象成一棵100岁的橡树（它可以活到600-1000岁）。
- en: '![](../Images/53ce53cb7396baaa2b50365976c17b43.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/53ce53cb7396baaa2b50365976c17b43.png)'
- en: There is a thick core, it splits off in 3-6 major areas and continues to split
    into branches that may live or fall off, and thousands of leaves. Each leaf has
    an ecosystem within itself.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个厚厚的核心，它分裂成3-6个主要区域，并继续分裂成可能存活或掉落的分支，以及数千片叶子。每一片叶子都有其自身的生态系统。
- en: And of course, you may have to prune a branch to encourage growth in the right
    direction.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，你可能需要修剪一个分支来鼓励向正确的方向生长。
- en: We can think of this oak tree as a watered-down description of reality.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以把这棵橡树看作是对现实的稀释描述。
- en: There are infinite branches and leaves to explore, but most are conditioned
    into the *one* they learned during childhood. They limit their potential to one
    of infinite branches through mental programming.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 有无限的分支和叶子可以去探索，但大多数都被条件化为他们在童年时期学到的“一个”。他们通过心理编程限制了他们的潜力，使其局限于无限分支中的一个。
- en: If you want, you can think of that one branch as “The Matrix.”
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你愿意，你可以把那个分支想象成“矩阵”。
- en: This oak tree is explored with the mind.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这棵橡树是用心灵去探索的。
- en: Each branch represents a pathway of information that can be explored with energy,
    attention, and will.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 每个分支代表一条可以用能量、注意力和意志去探索的信息路径。
- en: '**The major problem:**'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**主要问题：**'
- en: It is too easy for modern man to get sucked into a mindless trap of mediocrity,
    degeneracy, and roboticism.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 现代人很容易陷入平庸、堕落和机器人化的无意识陷阱。
- en: When people break away from the default path, they get scared of the unknown.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 当人们脱离默认路径时，他们会害怕未知。
- en: There is too much information to explore.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 有太多信息可以去探索。
- en: Too many opportunities cause overwhelm.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 机会太多会导致不知所措。
- en: Too many opinions lead to anxiety.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 太多的意见会导致焦虑。
- en: To find clarity, you have to battle through the chaos.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 要找到清晰，你必须战胜混乱。
- en: You can’t just shy away at the first site of struggle.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 你不能在遇到第一个挑战时就退缩。
- en: For every good thought, there are 100 bad.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每一个好想法，都有100个坏想法。
- en: Your version of success is empowering, but in comes the thought of failure,
    how long it will take, which skills to learn, and different career and business
    paths to get there.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 你对成功的版本是赋权的，但随之而来的是对失败的思考，需要多长时间，要学习哪些技能，以及不同的职业和商业路径才能达到那里。
- en: Then, those bad thoughts can splinter into 100 more.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，那些负面想法可以分裂成100个更多。
- en: That is unless you learn how to order your mind.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 那除非你学会了如何整理你的思想。
- en: To create clarity from chaos.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 为了从混乱中创造清晰。
- en: Program Or Be Programmed
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 程序或被编程。
- en: The Age Of Information is overwhelming.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 信息时代令人不知所措。
- en: The most important thing you can do in these times is curate your digital, mental,
    and physical environment.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些时代，你能做的最重要的事情是整理你的数字、心理和物理环境。
- en: '**Digital –** Immerse yourself in the information that will program you for
    success.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**数字** – 沉浸在你将为你成功编程的信息中。'
- en: Unfollow accounts that don’t serve your future.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 取消关注那些不利于你未来的账户。
- en: Buy books that increase your awareness of your potential.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 购买能增加你对自己潜力认识的书。
- en: Subscribe to podcasts, newsletters, and blogs that teach you what the schools
    won’t.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 订阅播客、通讯和博客，它们会教你学校不会教的东西。
- en: Everywhere you turn, curate a digital environment that makes success inevitable.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你转向哪里，都要创建一个使成功不可避免的网络环境。
- en: Program your mind.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 编程你的大脑。
- en: '**Mental** – Treat your mind as a garden. Your thoughts can be well-kept and
    beautiful, or they can grow like weeds and cause a chaotic downward spiral.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**心理** – 把你的大脑当作一个花园。你的思想可以是整洁而美丽的，或者它们可以像杂草一样生长，导致混乱的下降螺旋。'
- en: As the Arabs say, “*The nature of rain is the same, but it makes thorns grow
    in the marshes and flowers in the gardens.*”
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 正如阿拉伯人所说，“*雨的本质是相同的，但它使沼泽地长满了荆棘，在花园里长出了花朵。*”
- en: '**Physical** – People that settle for comfort form settlements. They justify
    each other’s mediocre lives and are programmed to believe it is normal. The unknown
    is where your potential lies.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**物理** – 那些满足于舒适的人形成了定居点。他们为彼此平庸的生活辩护，并被编程相信这是正常的。未知是你潜力的所在。'
- en: “*The single most important decision you make is where you live.* *It drives
    your business opportunities, relationships, food and water supply, politics, activities,
    and day-to-day quality of life**.*” – Naval
  id: totrans-56
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “*你做出的最重要的决定是你要住在哪里。* *它驱动着你的商业机会、人际关系、食物和水供应、政治、活动以及日常生活的质量**。” – 纳瓦尔
- en: You are a product of your environment.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 你是你环境的产物。
- en: Your thoughts, emotions, and actions (in that order) are influenced by the people
    and information within it.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 你的思想、情感和行为（按此顺序）受到其中的人和信息的 影响。
- en: Thought processes become habitual.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 思维过程变得习惯化。
- en: Programmed into your mind with time.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，被编程植入你的心中。
- en: Most people wake up after 40 years of robotic living wondering where the time
    went.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人在40年的机器人生活中醒来， wonder where the time went.
- en: Don’t be one of them.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 不要成为他们中的一员。
- en: '**Human behavior is goal oriented.**'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**人类行为是有目标的**。'
- en: Everything we do is in alignment with a goal.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我们所做的一切都与一个目标一致。
- en: Everything.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 一切。
- en: Every decision we make is pushing us toward a conscious or unconscious goal.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我们做出的每一个决定都在推动我们向有意识或无意识的目标迈进。
- en: Goals are baked into your identity.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 目标被融入你的身份中。
- en: Your identity influences your perspective of situations.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 你的身份影响你对情况的看法。
- en: Your perspective influences how you perceive problems within that situation.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 你的观点影响你如何在该情况下感知问题。
- en: Situations can only be viewed by the level of development you are at.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 情况只能通过你所处的发育水平来观察。
- en: This is why so many are bitter, offended, and angry.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么这么多人感到苦涩、受冒犯和愤怒。
- en: They stop learning and growing after childhood.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 他们童年后就停止了学习和成长。
- en: You miss out on the depth of life when you choose an early death.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 当你选择早逝时，你就错过了生活的深度。
- en: For most people, all they know is “go to school, get a job, retire at 65.”
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大多数人来说，他们所知道的就是“上学，找工作，65岁退休。”
- en: This is why I am so big on people spreading awareness of new [opportunities
    through the creator economy.](https://thedankoe.com/letters/the-one-person-business-revisited-turn-yourself-into-a-business/)
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么我如此重视人们通过创作者经济传播对[新机会]的认识。（[https://thedankoe.com/letters/the-one-person-business-revisited-turn-yourself-into-a-business/](https://thedankoe.com/letters/the-one-person-business-revisited-turn-yourself-into-a-business/)）
- en: The mind is a pattern recognition machine.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑是一个模式识别机器。
- en: And as the default life trajectory is conditioned into your mind as a kid through
    your upbringing, schooling, and what your average friends are doing – you will
    do the same.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 因为从你小时候通过你的成长、教育和你的普通朋友在做什么，默认的生活轨迹就被植入你的心中 – 你会做同样的事情。
- en: If you don’t program your mind for success, it will be programmed for mediocrity.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有为成功编程你的大脑，它将会被平庸所编程。
- en: Focus = Quality Of Life
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 专注 = 生活质量
- en: <picture loading="lazy" decoding="async" class="wp-image-1327">![](../Images/cd5e9ff22ba1f74f8afe48367fd9e407.png)</picture>
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-1327">![](../Images/cd5e9ff22ba1f74f8afe48367fd9e407.png)</picture>
- en: Imagine having a spreadsheet that displayed how much attention you’ve invested
    in any given area of your life. Mind, body, spirit, and business that impact your
    relationship with the world and those around you. The spreadsheet would be a direct
    indicator of your quality of life. – The Art of Focus
  id: totrans-81
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 想象一下有一个电子表格，显示了你在生活的任何特定领域投入了多少注意力。包括心智、身体、精神和商业，这些都影响你与世界及周围人的关系。这个电子表格将直接反映你的生活质量。
    —— 《专注的艺术》
- en: Focus is the habit of habits.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 专注是习惯的习惯。
- en: Conscious focus on your long-to-short-term goals are how you program your mind
    for success and daily quality of life.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 对你的长期和短期目标的意识关注是你为成功和日常生活质量编程你的大脑的方式。
- en: Focus is the root of your entire being.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 专注是你整个存在的根源。
- en: It’s how you channel your awareness, consciousness, and attention toward value
    or distraction.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你如何将你的意识、意识和注意力引导到价值或分心的事情上。
- en: Both lead to increased levels of dopamine in the brain.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这两者都会导致大脑中多巴胺水平的增加。
- en: Dopamine, obviously, makes you feel good.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 多巴胺，显然，会让你感觉良好。
- en: Distractions lead to “cheap” dopamine.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 分散注意力会导致“廉价”的多巴胺。
- en: Value leads to “expensive” dopamine.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 价值会导致“昂贵”的多巴胺。
- en: We want to increase the ratio of expensive to cheap dopamine-raising sources
    in our life.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望提高生活中昂贵与廉价的多巴胺提升来源的比率。
- en: We want to increase the signal to noise, significance to insignificance, and
    meaningful to meaningless ratios.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望提高信号与噪声、重要性与无意义、有意义与无意义之间的比率。
- en: We start by creating a hierarchy of self-generated goals.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先创建一个自我生成的目标层次结构。
- en: If you don’t have conscious, meaningful goals, you won’t be able to place your
    focus on those things.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有有意识、有意义的目标，你就无法将你的注意力放在那些事情上。
- en: It doesn’t matter if “you don’t know” what those goals should be yet.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是否“不知道”这些目标应该是什么，都没有关系。
- en: Pick something that sounds meaningful.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一些听起来有意义的事情。
- en: Only then can you realize what you don’t want.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 只有这样，你才能意识到你不想得到什么。
- en: And by realizing what you don’t want, you can then focus on something that is
    closer to what you want.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 通过意识到你不想得到什么，你就可以专注于更接近你想要的东西。
- en: With time, you achieve goals that weren’t assigned to you and forge your own
    path.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，你将实现那些并非分配给你的目标，并开辟自己的道路。
- en: If you are interested in high-value skill acquisition or turning yourself into
    a business, check out [2 Hour Writer](https://2hourwriter.com) or [Digital Economics](https://digitaleconomics.school).
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对获取高价值技能或将自己变成一个企业感兴趣，请查看[2小时作家](https://2hourwriter.com)或[数字经济学](https://digitaleconomics.school)。
- en: 'Here’s what you do:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是你需要做的事情：
- en: 1) Zoom Out To Gain Perspective
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 放大视角以获得洞察力
- en: Think about your ideal future.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下你理想中的未来。
- en: Have you ever done that?
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 你曾经这样做过吗？
- en: If so, when was the last time?
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 如果是这样，那最后一次是什么时候？
- en: Pull out a notebook and describe it in detail.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 拿出笔记本，详细地描述它。
- en: Spend 30 minutes writing out what you think you want.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 用30分钟写下你认为你想要的东西。
- en: Mind, body, spirit, business, and how those things will impact every area of
    your life in a beneficial manner.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 心智、身体、精神、商业，以及这些事物如何以有益的方式影响你生活的各个方面。
- en: Contrast that life with the one you have now.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 将这种生活与你现在的生活进行对比。
- en: This is your vision for the future.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你对未来的愿景。
- en: A big, meta-goal that houses the rest of your goals.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 一个包含你所有其他目标的宏大、元目标。
- en: This gives you a lens – or frame – to view daily situations from.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 这为你提供了一个视角——或者框架——从日常情况中观察。
- en: You are currently viewing situations from a lens of unconscious goals. Your
    attention is drawn toward things that will help with those goals. Like a job opportunity,
    person you want to have superficial sex with, or other low-consciousness problem
    you want to solve in your life.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 你目前是以无意识目标为视角看待情况的。你的注意力会被吸引到那些有助于那些目标的事情上。比如工作机会，你想要进行表面性性爱的人，或者你想要在生活中解决的其它低意识问题。
- en: 'Note: you may have to solve these problems to break through to the next level.
    Superficial pursuits aren’t bad. They can act as a vessel that exposes you to
    depth. Many start going to the gym for a nice body, but stay for the therapy.'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：你可能必须解决这些问题才能突破到下一个层次。表面的追求并不坏。它们可以作为让你接触到深度的载体。许多人开始去健身房为了有一个好身材，但留下来是为了治疗。
- en: Think of your frame as a field that filters distractions.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的框架视为一个过滤干扰的领域。
- en: Most people’s field is projected on them and that’s why they don’t do anything
    great with their lives.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人的领域被投射在他们身上，这就是为什么他们没有在生活中做出伟大的事情。
- en: 2) Deconstruct To Bridge The Clarity Gap
  id: totrans-116
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 解构以弥合清晰度差距
- en: In the notebook you pulled out, break each area of your life down into manageable
    sub-goals.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 在你拿出的笔记本中，将你生活的每个领域分解成可管理的子目标。
- en: 'Write out:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 写下来：
- en: A 10-year goal
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个10年目标
- en: A 1-year goal
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个1年目标
- en: This month’s goal
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 本月的目标
- en: This week’s goal
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这周的目标
- en: What you can do today
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你今天能做什么
- en: Don’t attach to these goals.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 不要执着于这些目标。
- en: This is a practice to generate clarity.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个产生清晰度的实践。
- en: Your goals will evolve with time, and that’s okay.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 你的目标会随着时间而演变，这是可以的。
- en: They may change tomorrow.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 它们可能会改变。
- en: If you don’t do this, the likelihood of you acting on the goals assigned to
    you by society is much higher.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不做这件事，你按照社会分配给你的目标行动的可能性会更高。
- en: Keep this notebook handy.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 保持这个笔记本在手边。
- en: Make a mess, organize it, and act.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 搞乱，整理，然后行动。
- en: 3) Zoom In To Act With Purpose
  id: totrans-131
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 放大以有目的地行动
- en: Hold your frame in the back of your mind.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的脑海中保持你的框架。
- en: Remember, this is a habit you are forming.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，你正在形成这个习惯。
- en: You are trying to decrease the amount of distraction in your life by bringing
    your focus back to what you deem important.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 你试图通过将你的注意力重新集中在你认为重要的事情上来减少你生活中的干扰。
- en: Every other action, and eventually habit, that you form should be directed toward
    your vision.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 每个其他行动，最终习惯，都应该指向你的愿景。
- en: This is how you live in alignment.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何与生活保持一致。
- en: You can feel it.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 你能感觉到它。
- en: The question is, what do we zoom our focus in on?
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，我们聚焦在什么上？
- en: How do we know we are making progress every day?
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何知道我们每天都在取得进步？
- en: One Project, One Hour, One Day At A Time
  id: totrans-140
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一个项目，一小时，一天一次
- en: The modern world is an infinite web of information.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 现代世界是一个无限的信息网络。
- en: Ideas, opportunities, business models, relationship advice, productivity doctrine,
    conspiracy theories, news, and drama that you can get lost in if you do not train
    your focus.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不训练你的专注力，你可能会迷失在想法、机会、商业模式、人际关系建议、生产力教条、阴谋论、新闻和戏剧中。
- en: At your current level in life, 99% of the information you are exposed to is
    a distraction.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在你目前的生活水平上，你接触到的99%的信息都是干扰。
- en: We must narrow our minds on the few things that will lead us to a better life.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 我们必须将我们的注意力集中在那些能让我们过上更好生活的少数事情上。
- en: '*This is unique to the individual.*'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '*这是独一无二的个体特征*。'
- en: One Meaningful Project
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 一个有意义的项目
- en: From what you wrote down in your notebook, *turn your goals into projects.*
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 从你笔记本上写下的内容，*将你的目标转化为项目*。
- en: You are the meta-project.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 你是元项目。
- en: You are your life’s work.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 你是你生活的作品。
- en: You, as a project, are composed of the interconnected planes of existence that
    make life enjoyable.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 你作为一个项目，由使生活愉快的存在相互连接的平面组成。
- en: Mind, body, spirit, and money (yes, money is necessary. It is the bridge of
    commerce. The lifeblood of society. It is how you bring the future you want to
    build to life).
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 心灵、身体、精神和金钱（是的，金钱是必要的。它是商业的桥梁。社会的命脉。它是你将你想要建设的未来带到生命中的方式）。
- en: In business, these are the eternal markets, where burning, profitable problems
    exist. Because they are *real* problems in real people’s lives.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业中，这些是永恒的市场，其中存在燃烧、有利可图的问题。因为它们是真实人在真实生活中的真实问题。
- en: 'When you create a solution to your own problems within these domains:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在这些领域内为自己的问题创造解决方案时：
- en: You unlock the ability to begin a more meaningful (and profitable) project or
    move to the next phase of life.
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你解锁了开始一个更有意义（并且有利可图）的项目或进入生活下一阶段的能力。
- en: You can share your solution with others like you that want to be helped – this
    is the reasoning behind you as the most profitable niche.
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以与你一样想要得到帮助的人分享你的解决方案——这就是你作为最有利可图利基的推理。
- en: You make tangible progress in reality. You don’t get trapped in a cycle of mental
    masturbation and tutorial hell.
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你在现实中取得了有形的进步。你不会陷入精神自慰和教程地狱的循环。
- en: So, we must break down our lives as a project into subsequent projects to climb
    the ladder of personal success.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们必须将我们的生活作为一个项目分解成后续的项目，以攀登个人成功的阶梯。
- en: You can view projects as quests in a video game.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将项目视为视频游戏中的任务。
- en: This is why video games are enjoyable.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么视频游戏是令人愉快的。
- en: They narrow your mind on a hierarchy of goals.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 它们将你的注意力集中在目标层次上。
- en: You begin to control your attention.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 你开始控制你的注意力。
- en: You move with purpose through the world.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 你带着目的在世界中前进。
- en: People notice it in how you hold yourself.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 人们会在你如何自持中注意到。
- en: You walk down the road with confidence because there aren’t any thoughts that
    cloud over your authentic state of being.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 你自信地走在路上，因为没有任何想法会遮蔽你真实的自我状态。
- en: One Hour Of Focused Work
  id: totrans-165
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 一小时的专注工作
- en: <picture loading="lazy" decoding="async" class="wp-image-1332">![](../Images/23e28c92e94dbbd25df776f8366445bc.png)</picture>
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-1332">![](../Images/23e28c92e94dbbd25df776f8366445bc.png)</picture>
- en: You don’t need 12 hours a day to actualize your dreams.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要每天12小时来实现你的梦想。
- en: If that were the case, nobody would see any form of success.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 如果是这样，没有人会看到任何形式的成功。
- en: Adults have responsibilities.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 成年人有责任。
- en: Families, jobs, and bills to pay require their focus until those problems are
    solved.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 家庭、工作和要支付的账单需要他们的专注，直到这些问题得到解决。
- en: For your first meaningful project, pick one that solves the most prevalent problem
    in your life.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 对于你的第一个有意义的计划，选择一个解决你生活中最普遍问题的计划。
- en: This is your purpose.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你的目标。
- en: Sit with it, contemplate, and create a plan of attack.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 与其坐下来，深思熟虑，并制定一个行动计划。
- en: Are you overweight?
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 你超重吗？
- en: Are you broke?
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 你破产了吗？
- en: Are you stressed all the time?
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 你是不是一直都很紧张？
- en: Do you hate your job?
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 你讨厌你的工作吗？
- en: Do you lack energy?
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 你缺乏能量吗？
- en: What is it?
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 它是什么？
- en: What are you sweeping under the rug so you don’t have to face the pain that
    comes with growth?
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 你在逃避什么，以至于你不想面对成长带来的痛苦？
- en: If solved, what problem would unlock the next level of life enjoyment for you?
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 如果解决了，什么问题会为你解锁下一个层次的生活享受？
- en: From there, you must deconstruct that goal into actions that you can incorporate
    into your lifestyle.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，你必须将那个目标分解成你可以融入你生活方式的行动。
- en: Your life must change on a fundamental level.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 你的生活必须在根本层面上改变。
- en: You will have to sacrifice what you are currently doing – because if you want
    growth, you shouldn’t be doing what you are doing in the first place.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 你将不得不放弃你现在正在做的事情——因为如果你想要成长，你本来就不应该做你现在正在做的事情。
- en: If you don’t do it every day, it’s not a habit.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不是每天都做，那就不是习惯。
- en: If it’s not a habit, the results are temporary.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 如果不是习惯，结果就是暂时的。
- en: Habit formation requires you to change a part of who you are.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 习惯的形成需要你改变自己的一部分。
- en: If you need money, dedicate the first hour of your day to education and action
    around money.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要钱，把每天的第一小时用于金钱教育和行动。
- en: If you want to lose weight, dedicate the first hour of your day to education
    and action around fitness.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要减肥，把每天的第一小时用于健身教育和行动。
- en: If you want to decrease stress, dedicate the first hour of your day to education
    and action around mental health.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要减少压力，把每天的第一小时用于心理健康教育和行动。
- en: One Day At A Time
  id: totrans-191
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 一天一天来
- en: Focus is a currency.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 专注是一种货币。
- en: When you invest it in your own education, work, rest, and success the results
    won’t be immediate.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 当你投资于自己的教育、工作、休息和成功时，结果不会立即显现。
- en: Consistency is a requirement.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 一致性是必需的。
- en: Actually, scratch that, consistency is overrated.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，别提那了，一致性被高估了。
- en: Persistence and iteration are the requirements.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 持之以恒和迭代是必需的。
- en: You must show up every day with the intention to build a project that lives
    into the future.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须每天都带着建立一个能够持续到未来的项目的意图出现。
- en: This is how you become a confident and interesting person.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何成为一个自信且有趣的人。
- en: When you are hellbent on creating your vision, people notice.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 当你下定决心要实现你的愿景时，人们会注意到。
- en: As a leader, you attract followers.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名领导者，你会吸引追随者。
- en: They give you the resources to build faster.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 他们会给你资源让你更快地建设。
- en: People adopt your perspective and their lives improve.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 人们接受你的观点，他们的生活就会得到改善。
- en: Of course, there will be people trying to pull you down, but they are few and
    far between. You will learn to manage and ignore them.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，总会有一些人试图拉你下来，但他们很少，你会学会如何管理和忽略他们。
- en: How do you make persistent action seamless?
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何使持续的行动无缝进行？
- en: By scheduling lever moving tasks into a high energy time block in your day.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在一天中安排将杠杆移动任务放入高能量时间段。
- en: '**1) Lever Moving Tasks**'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 杠杆移动任务**'
- en: As to methods, there may be a million and then some, but principles are few.
    The man who grasps principles can successfully select his own methods. The man
    who tries methods, ignoring principles, is sure to have trouble. – Harrington
    Emerson
  id: totrans-207
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 关于方法，可能有成千上万种，但原则却很少。掌握原则的人可以成功地选择自己的方法。而那些忽视原则尝试方法的人，肯定会遇到麻烦。 —— 哈灵顿·艾默生
- en: The key to persistency is momentum.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 持之以恒的关键是动力。
- en: You need to stack *small* wins.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要堆叠*小的*胜利。
- en: Like a video game.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 就像一款视频游戏。
- en: Why would you keep playing the game if you never made any progress? It wouldn’t
    be fun.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你从未取得任何进步，你为什么还要继续玩游戏呢？那不会有趣。
- en: This is where other traps come into play.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是其他陷阱开始发挥作用的地方。
- en: Too many people start working without direction or education.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 太多人开始工作而没有方向或教育。
- en: They latch onto methods rather than habituating the principles.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 他们抓住方法而不是习惯原则。
- en: Start with what you know.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 从你所知道的事情开始。
- en: Prioritize big-picture understanding.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 优先考虑大局理解。
- en: Learn the technical details when you encounter a specific problem.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 当你遇到具体问题时，学习技术细节。
- en: If you want to lose weight, it is foolish to start reading a book on hypothyroidism
    before learning the principles of training and nutrition.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想减肥，在学习训练和营养原则之前就开始阅读关于甲状腺功能减退症的书是愚蠢的。
- en: If you want to start a business, it is foolish to buy a course on client acquisition
    with Facebook ads before learning the principles of traffic and offers.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要开始创业，在学习流量和报价原则之前购买关于通过Facebook广告获取客户的课程是愚蠢的。
- en: If you want to go on a date, it is foolish to learn “game” before understanding
    the principles of social, intimate, or business relationships.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要约会，在学习社交、亲密或商业关系的原则之前学习“游戏”是愚蠢的。
- en: You will notice that principles overlap across multiple domains of life. Meaning,
    you will make holistic progress much faster.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 你会注意到原则在生活的多个领域重叠。这意味着，你将更快地取得全面进步。
- en: Like how you can bulk and cut in business.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 就像你在商业中可以进行增肌和减脂。
- en: Or how you need a valuable offer in front of targeted traffic in dating.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 或者说你需要一个有价值的报价在约会中面对目标流量。
- en: Start your meaningful project.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 开始你的有意义的项目。
- en: Buy books that are focused on the whole of the subject.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 购买专注于整个主题的书籍。
- en: Understand the lever-moving tasks you must complete daily.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 理解你必须每天完成的杠杆移动任务。
- en: '**2) High Energy Time Blocks**'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 高能量时间块**'
- en: For most, it makes sense to block out your focused work first thing in the morning.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大多数人来说，早上首先排除你的专注工作是有意义的。
- en: Especially if you have a job or family.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 尤其如果你有工作或家庭。
- en: Your energy may not seem like it is the “highest,” but you have a limited amount
    of energy each day.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 你的能量可能看起来不是“最高”的，但你每天的能量是有限的。
- en: Are you going to build your dreams after work?
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 你打算下班后建造你的梦想吗？
- en: I’ve tried it, it’s difficult to be consistent.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 我试过，很难保持一致性。
- en: Are you going to build your dreams when you have family obligations clogging
    your mental space?
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 当你有家庭责任占据你的心理空间时，你打算建造你的梦想吗？
- en: Probably not.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 可能不会。
- en: Make it easy on yourself.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 让自己轻松一些。
- en: Wake up early for a week.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 每天早起。
- en: Push through the discomfort.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 推过不适。
- en: Make it habit. It won’t be difficult for long.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 让它成为习惯。它不会很难长时间。
- en: You will grow to enjoy it.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 你会逐渐喜欢它的。
- en: If you are young and have few responsibilities, the same applies.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你年轻且责任少，同样适用。
- en: You can work whenever you want, but realize the distractions in your life.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以随时工作，但意识到你生活中的干扰。
- en: Distractions are subjective.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 分散注意力是主观的。
- en: I’m not saying your friends and video games are bad.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 我并不是说你的朋友和电子游戏是坏的。
- en: But in relation to your dreams, they will prevent your progress.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 但与你的梦想相比，它们会阻碍你的进步。
- en: Work in the morning.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 早上工作。
- en: Knock out your priority tasks.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 完成你的优先任务。
- en: Enjoy the rest of your day at ease because you have already done what you need
    to do.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 在轻松享受你的一天剩余时间，因为你已经完成了你需要做的事情。
- en: That’s it for this letter.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是这封信的全部内容。
- en: Have a great weekend.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 周末愉快。
- en: – Dan Koe
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹·科
