- en: How To Remember Everything You Read With AI
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何利用AI记住你阅读的一切
- en: 原文：[https://thedankoe.com/letters/how-to-remember-everything-you-read-with-ai/](https://thedankoe.com/letters/how-to-remember-everything-you-read-with-ai/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://thedankoe.com/letters/how-to-remember-everything-you-read-with-ai/](https://thedankoe.com/letters/how-to-remember-everything-you-read-with-ai/)'
- en: At first, I was upset.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 起初，我很生气。
- en: 'Now, I just feel bad for this guy:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我只是为这个人感到难过：
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2617">![](../Images/a1863fa92a90615b9327c4dc54147b04.png)</picture>
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-2617">![](../Images/a1863fa92a90615b9327c4dc54147b04.png)</picture>
- en: Screenshot
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 屏幕截图
- en: There’s some truth behind what he’s saying, but that’s because most people,
    in general, don’t know how to read.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 他所说的背后有一些真理，但这是因为大多数人，总的来说，不知道如何阅读。
- en: 'Not because they’re illiterate, but because they learned how to read in a Prussian
    style education system designed to create obedient soldiers, compliant citizens,
    civil servants, and well-behaved workers by focusing on:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 不是因为他们文盲，而是因为他们在一个旨在通过专注于以下内容来培养顺从士兵、顺从公民、公务员和守规矩的工人而设计的普鲁士教育体系中学会了如何阅读：
- en: Mandatory attendance
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 强制出勤
- en: Training for teachers
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教师培训
- en: National curriculum and testing
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 国家课程和考试
- en: Division of students by age
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 按年龄划分学生
- en: The concept of grade levels
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学级概念
- en: Reading, to most people, is a *performative* act.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 对大多数人来说，阅读是一种*表演性*行为。
- en: They read to find specific information for a “test,” be it a school test or
    a life test.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 他们阅读是为了找到“测试”中的特定信息，无论是学校的测试还是生活的测试。
- en: They read to show others that they’ve accomplished something, like how people
    flex that they’ve somehow both read and retained information from 52 books in
    a year.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 他们阅读是为了向他人展示他们已经取得了一些成就，就像人们展示他们如何在一年内阅读并保留了52本书的信息一样。
- en: They avoid reading difficult books because if they don’t understand it, what’s
    the point?
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 他们避免阅读难懂的书，因为他们如果不理解它，那还有什么意义呢？
- en: Here’s the thing.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 事情是这样的。
- en: You don’t read to find a specific answer.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 你阅读不是为了找到特定的答案。
- en: That’s just stupid. Why would you waste 8 hours reading a book just to find
    a few steps to accomplish something when you can type a question into Google,
    Reddit, or now AI?
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是愚蠢。为什么你要浪费8个小时阅读一本书，只是为了找到完成某事的几个步骤，当你可以输入一个问题到谷歌、Reddit或现在的AI中时？
- en: If you need to figure out how to be more productive or start a business, reading
    a book on it is the last place you should look (if you’re actually trying to learn,
    rather than to feel as if you made progress by reading the book itself).
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要弄清楚如何提高生产力或开始创业，阅读关于这方面的书籍应该是你最后应该看的地方（如果你真的在尝试学习，而不是通过阅读书籍本身来感觉自己在进步）。
- en: If you’re trying to get a big picture understanding of things, then yes, a book
    is useful for that, but I’d argue that intelligent and calculated research is
    still better.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你试图对事物有一个全面的了解，那么是的，书籍在这方面是有用的，但我认为智能和有计划的调查仍然更好。
- en: But that doesn’t mean reading is irrelevant.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 但这并不意味着阅读无关紧要。
- en: In fact, if you want to *become* the type of person who *is* more productive,
    owns a business, or is in good health (not just a person who knows how to do those
    things)that requires behavior change, which requires a fundamental rewiring of
    your mind—and that doesn’t come from searching for specific information.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，如果你想成为一个更有效率的人、拥有自己的企业或保持良好的健康（而不仅仅是知道如何做这些事情）的人，这需要行为改变，需要你大脑的根本重组——而这并不来自寻找特定的信息。
- en: Most people are missing out on the plethora of life changing benefits that come
    from reading.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人都错过了阅读带来的众多改变生活的益处。
- en: Why Smart People Read
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么聪明人喜欢阅读
- en: Yes, AI gives you access to almost all *known* information in the world.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，AI让你几乎可以访问世界上几乎所有的*已知*信息。
- en: And if we’ve learned anything about the rise of AI, it’s that even when people
    have access to any answer they could ever want, they don’t do anything different
    with their lives. Most people are doing the same things they’ve always done.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 并且如果我们从AI的兴起中学到了什么，那就是即使人们可以访问他们想要的任何答案，他们也不会在生活中做出任何不同的改变。大多数人仍然在做他们一直做的事情。
- en: It’s never been about how much you know. It’s always been about knowing how
    much you don’t know. You can only cook with the ingredients you have.
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这从来不是关于你知道多少。这始终是关于你知道你不知道多少。你只能用你有的原料来烹饪。
- en: Now, you *already can* find the information you need to make millions of dollars,
    build an aesthetic physique, or anything else you could ever want to achieve in
    your life, but even if people knew what to look for, where to look for it, and
    how to apply the information they found, their life wouldn’t change all that much.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你*已经可以*找到你需要的信息来赚取数百万美元，塑造一个美观的身体，或者你生活中想要实现的其他任何目标，但即使人们知道该寻找什么，在哪里寻找，以及如何应用他们找到的信息，他们的生活也不会有太大的改变。
- en: Because this isn’t an information problem, *it’s an identity problem.*
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 因为这不是一个信息问题，*这是一个身份问题*。
- en: Your identity is reflected in your daily choices, and if you observe most people,
    they aren’t trying to do anything by their own desire. They may search for new
    information, but it’s not to make a change in their life, it’s to feel as if they
    are making progress by hoarding information to sound smart or look different without
    actually doing anything different. They were conditioned to go to school, get
    a job, repeat the same day for 45 years, and hope that one day they can retire
    happy. Those are the goals their mind is automatically trying to achieve. Those
    are the goals that filter what information is noticed as important. They don’t
    need to use new information because they don’t generate new goals. They live in
    a subconscious fear that they will be cast out from the tribe if they don’t conform.
    So, they pursue the goals of others for the entirety of their life.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 你的身份反映在你的日常选择中，如果你观察大多数人，他们并不是出于自己的愿望而做任何事情。他们可能会寻找新的信息，但这并不是为了改变他们的生活，而是为了感觉自己在通过囤积信息来显得聪明或与众不同，而实际上并没有做任何不同的事情。他们被训练去上学，找工作，重复同样的日子45年，并希望有一天能快乐地退休。那些是他们的大脑自动试图实现的目标。那些是过滤出哪些信息被视为重要的目标。他们不需要使用新信息，因为他们没有产生新的目标。他们生活在一种无意识的恐惧中，如果他们不遵守规则，就会被部落排斥。因此，他们一生都在追求他人的目标。
- en: And that’s fine, but you’re reading this because you don’t want to be like them.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这很正常，但你之所以读这本书，是因为你不想成为他们那样的人。
- en: That’s where the importance of reading comes into play.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是阅读重要性的所在。
- en: You don’t read to find information that can already be found.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 你读书不是为了找到已经可以找到的信息。
- en: You read to explore the unknown and pursue your curiosity.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 你读书是为了探索未知，追求你的好奇心。
- en: You read to discover things you didn’t know before and didn’t even think about
    searching with google or ChatGPT.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 你读书是为了发现你之前不知道甚至没有想过用谷歌或ChatGPT搜索的事情。
- en: You read to expand your mind to places you didn’t know were there.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 你读书是为了扩展你的思想，到达你不知道的地方。
- en: '*You read to slowly reprogram who you are by exposing yourself to* ***new ideas***
    *that can’t be intentionally searched by an identity that didn’t even think to
    search for them.*'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '*你读书是为了通过接触* **新想法** *来缓慢地重新编程你自己的身份，这些新想法是一个甚至没有想过要搜索的身份无法有意搜索到的*。'
- en: The statement that “AI makes reading irrelevant” assumes that everyone reads
    books because they want specific information that is already known (that everyone
    else can also find, with AI or not = you’re replaceable).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: “AI使阅读变得无关紧要”这种说法假设每个人读书是因为他们想要特定的信息，这些信息已经是已知的（其他人也可以找到，无论是否有AI = 你是可替代的）。
- en: So, it’s not about how much information you have.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，这并不是关于你拥有多少信息。
- en: It’s also not about what you do with that information.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这也不是关于你如何使用这些信息。
- en: It’s about changing your mind.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这关乎改变你的思想。
- en: Because your mind is how you interact with reality. It’s how you make decisions
    that lead to a good or bad life.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 因为你的思想是你与现实互动的方式。它是你做出决定的方式，这些决定导致你过上好或坏的生活。
- en: Your mind doesn’t change with a few key points.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 你的思想不会因为几个关键点而改变。
- en: It changes when new ideas (actionable or not) that fill in missing pieces, challenge
    old beliefs, or give you a new angle to view a situation from.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 当新的想法（无论是否可行）填补了缺失的部分，挑战了旧信念，或者给你提供了一个新的角度来观察情况时，它就会发生变化。
- en: No single person reads a book and gets the exact same lessons out of it.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 没有哪个人读书能从中得到完全相同的教训。
- en: Each individual has their own beliefs, goals, problems, story, and interests
    that shape how they perceive the information in the book.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都有自己的信念、目标、问题、故事和兴趣，这些都塑造了他们如何感知书中的信息。
- en: Book summaries have been a thing for decades and they don’t do much good because
    they’re missing exactly what makes those key points work.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 书籍摘要已经存在了几十年，但它们并没有带来太多好处，因为它们缺少了那些关键点之所以有效的原因。
- en: 'And last point:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一点：
- en: The obsession over actionable steps and bullet point summaries is just another
    manifestation of cheap dopamine and distraction.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 对可执行步骤和要点总结的迷恋只是廉价多巴胺和分心的另一种表现。
- en: Read more books. Read longer books. Read books that have nothing to do with
    what you’re trying to achieve.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 阅读更多书籍。阅读更长的书籍。阅读与你试图实现的事情无关的书籍。
- en: Read the books that people wouldn’t even think about summarizing with AI.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 阅读那些人们甚至不会考虑用AI总结的书。
- en: That’s where the gold is.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 那里就是金子所在。
- en: I love AI and where it’s going as much as the next guy, and use it every day,
    but you’re going to be the one that’s replaced if you can’t do what AI can’t.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我和任何人一样喜欢AI及其发展方向，并且每天都在使用它，但如果你不能做AI能做的事情，你将是那个被取代的人。
- en: You aren’t high agency if you let AI make your decisions.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你让AI做你的决定，你就不是高自主性的人。
- en: How To Read Deeper With AI
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何使用AI进行深度阅读
- en: The purpose of knowledge is action, not knowledge. – Aristotle
  id: totrans-57
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 知识的目的是行动，而不是知识。 —— 亚里士多德
- en: 'Smart people read in 2 layers:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 智慧的人以两层阅读：
- en: '**Consumption** – they soak in the information to the point of overwhelm and
    struggling to understand.'
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**消费**——他们吸收信息到几乎令人窒息的程度，并努力理解。'
- en: '**Digestion** – they study deeper, write to systematically reflect on what
    they learn, and attempt to connect the dots together through action.'
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**消化**——他们深入研究，系统地写下他们学到的内容，并通过行动尝试连接这些点。'
- en: The first problem is that very few people read.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个问题是很少有人阅读。
- en: The second problem is that when they read, they don’t remember any of it.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个问题是他们在阅读时记不住任何内容。
- en: The third problem is that people don’t like discomfort, so they don’t read difficult
    books.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 第三个问题是人们不喜欢不舒服，所以他们不读难书。
- en: The fourth problem is that since people don’t increase the complexity of knowledge
    they can make sense of, they aren’t able to take on more challenging situations…
    the ones that lead to more than superficial and short lived success. They turn
    50 years old with the intellectual maturity of a 15 year old.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 第四个问题是，由于人们不增加他们能理解的知识的复杂性，他们无法承担更具挑战性的情况……那些导致更多于表面和短暂成功的情况。他们到了50岁，智力成熟度还像一个15岁的孩子。
- en: Now, AI can’t read a book for you, but it can help deepen your understanding
    as you read.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，AI不能为你阅读书籍，但它可以在你阅读时帮助你深化理解。
- en: On a similar note, AI can’t act for you, but it can help expose your limiting
    beliefs and blind spots so you have clarity going into your future.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在类似的情况下，AI不能为你采取行动，但它可以帮助揭露你的限制性信念和盲点，这样你就可以在未来的道路上保持清晰。
- en: While most people use AI to condense books, podcasts, and videos into actionable
    steps—stripping them of the context that leads to a shift in the way you think—you
    are going to use AI for the opposite, and that makes it so much more powerful.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 当大多数人使用AI将书籍、播客和视频压缩成可执行步骤——剥夺了导致你思维方式转变的背景信息时——你将使用AI做相反的事情，这使得它变得更有力量。
- en: 'Step 1) Consumption: Using AI As A Reading Partner'
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第一步）消费：将AI作为阅读伙伴使用
- en: Most people read to memorize as much as possible because that’s how they were
    trained to read in school.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人阅读是为了尽可能多地记住内容，因为这就是他们在学校被训练成阅读的方式。
- en: They don’t know any other way.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 他们不知道其他方法。
- en: But here’s the thing… you don’t read to remember every single sentence in a
    book.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 但问题是……你阅读不是为了记住书中每一句话。
- en: You read to change how you view the world by adding a few nodes to the web of
    ideas that compose your mind, helping you see situations in a new, more complex
    and meaningful light.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过向构成你思想的观念网络添加几个节点，通过改变你看待世界的方式阅读，帮助你以新的、更复杂和更有意义的方式看待情况。
- en: That way, you can both refine your version of success and make more calculated
    decisions toward it.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，你既可以完善你版本的成功，也可以更明智地做出决定。
- en: 'Here’s what you do:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你要做的事情：
- en: '**1) Download any PDF on a site like Z-library.**'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**1）在Z-library等网站上下载任何PDF。**'
- en: Yes, you should pay for books, but unfortunately you need a PDF to be able to
    reference it with AI or do anything with the information. If you download the
    PDF, I recommend buying the paperback to both support the author and to have something
    nice for your bookshelf. Books set the vibe for your home.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，你应该为书籍付费，但不幸的是，你需要一个PDF才能用AI参考它或对信息做任何事情。如果你下载PDF，我建议购买平装本，这样既可以支持作者，也可以让你的书架上有一样东西。书籍为你的家设定了氛围。
- en: I personally have a Z-library Telegram bot that I can type any book name into
    and it spits out PDFs available to download. Super easy.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 我个人有一个Z-library Telegram机器人，我可以输入任何书名，它会输出可下载的PDF。超级简单。
- en: You can read [how to do that here](https://www.reddit.com/r/zlibrary/wiki/index/access/)
    by scrolling down to the “How to access Zlibrary through your Personal Telegram
    Bot” section.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在这里阅读[如何做到这一点](https://www.reddit.com/r/zlibrary/wiki/index/access/)，通过滚动到“如何通过你的个人Telegram机器人访问Zlibrary”部分。
- en: Be careful with this, there are a lot of bad actors if you just search it via
    Google.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里要小心，如果你只是通过Google搜索，会有很多不良分子。
- en: '**2) Drag the PDF into** [**Kortex**](https://kortex.co) **to add it as a source.**'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 将PDF拖入** [**Kortex**](https://kortex.co) **以添加为来源。**'
- en: This will add the book to your library so you can reference it at any time with
    AI.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 这会将书籍添加到你的图书馆，这样你就可以随时用AI参考它。
- en: Then, head to Chat > Be My Reading Companion.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，转到聊天 > 成为我的阅读伴侣。
- en: <picture decoding="async" class="wp-image-2618">![](../Images/26af8ac06ecb067d5efcb187fb7cc546.png)</picture>
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-2618">![](../Images/26af8ac06ecb067d5efcb187fb7cc546.png)</picture>
- en: Replace all of the placeholder text with “Help me understand this book as I
    read it” and hit send.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 将所有占位符文本替换为“帮助我理解我正在阅读的这本书”并点击发送。
- en: I’d recommend using Gemini 2 for this as you are going to be handling a lot
    of context.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议使用Gemini 2来做这件事，因为你将需要处理大量的上下文。
- en: '**Note**: You don’t have to use Kortex for this. You can upload the PDF to
    any AI tool that allows PDFs and ask it questions as you read. But, ours is optimized
    to help you understand deeper – and you can save the responses or summaries as
    documents to reference in other chats or refer to later.'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：你不必使用Kortex来做这件事。你可以将PDF上传到任何允许PDF的AI工具，并在阅读时提问。但，我们的工具优化了帮助你更深入理解——你还可以将回复或总结保存为文档，以便在其他聊天中参考或稍后查阅。'
- en: As you begin reading the book, you can place all of your notes in this chat
    and ask questions whenever you want to dig deeper into a concept.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 当你开始阅读这本书时，你可以把所有的笔记都放在这个聊天中，并在你想深入了解某个概念时随时提问。
- en: 'Now, a few tips on reading in general:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，关于阅读的一些一般性建议：
- en: If it doesn’t interest you, you probably won’t learn anything, so you can drop
    it.
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你对此不感兴趣，你可能不会学到任何东西，所以你可以放弃。
- en: You’re not in a race to finish the book, in fact, the slower the better. Take
    a year or two to finish if you need to.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不是在比赛看谁先读完这本书，实际上，越慢越好。如果你需要，可以花一两年时间完成。
- en: You can read multiple books at a time. I often have 3 books and an audiobook
    that I bounce between. You’d be surprised how many connections you make.
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以同时阅读多本书。我经常同时阅读3本书和一本有声书，你可能会惊讶自己能建立多少联系。
- en: Create a reading ritual. At least 30 minutes every day. Listen to an audiobook
    on a daily walk, or leave the books you’re reading around the house so you can
    pick them up instead of scroll your phone.
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个阅读仪式。每天至少30分钟。在每天散步时听有声书，或者把正在读的书放在家里，这样你就可以拿起它们而不是翻手机。
- en: For this consumption layer of reading, focus on getting through the book, taking
    a few notes on parts you want to understand more inside of the AI chat, and letting
    the ideas marinate in your mind.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个阅读消费层，专注于快速阅读全书，在AI聊天中记下你想要深入了解的部分的笔记，并让这些想法在你的脑海中沉淀。
- en: When your mind lights up with curiosity or excitement, that’s good dopamine
    telling you to go deeper.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的脑海中充满好奇心或兴奋时，这是好的多巴胺告诉你深入探索。
- en: When you feel that, go to your AI chat from above and start asking questions.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 当你感觉到这一点时，回到上面的AI聊天并开始提问。
- en: Return to reading once you feel like you understand.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 当你觉得你理解了，就回到阅读。
- en: '2) Digestion: Using AI For Exploration & Reflection'
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 消化：使用AI进行探索与反思
- en: Fully digesting a book’s ideas takes much longer than reading it over a weekend.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 完全消化一本书的思想需要比周末阅读更长的时间。
- en: Some ideas even take years to make sense of.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 一些想法甚至需要好几年才能理解其意义。
- en: There have been times in my life where the insight didn’t strike until I had
    enough experience for it to click.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的生活中，有过这样的时刻，直到我积累了足够多的经验，这种洞察力才突然出现。
- en: And that’s just it…
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 就是这样……
- en: Most people remember very little of what they read because they don’t see how
    it applies to their life. They can’t *integrate* the lessons in a way where they
    don’t *need* to remember every sentence of the book because it *reflects* in their
    daily actions.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人记得他们所读的很少，因为他们看不到它如何应用到他们的生活中。他们不能以他们不需要记住书中每一句话的方式来*整合*这些课程，因为这些课程*反映*在他们的日常行动中。
- en: You don’t need to memorize lines if it’s a deep part of who you are.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你认为这是你性格中深层次的一部分，你不需要记住这些台词。
- en: So, for the digestion layer of reading, you have a few options.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，对于阅读的消化层，你有几个选择。
- en: '**1) Explore connections of a topic to anchor your understanding.**'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 探索一个主题的关联，以锚定你的理解。**'
- en: 'Reminder: The purpose for reading is behavior change through identity change.'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 提醒：阅读的目的是通过身份改变来实现行为改变。
- en: When you spot the connections that lead to the book’s lessons “clicking” in
    your head, that’s when positive behavior change happens.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在脑海中找到导致书籍教训“点击”的关联时，那就是积极行为改变发生的时候。
- en: So, you can use the “Make Sense Of A Topic Or Idea” workflow inside Kortex.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你可以使用Kortex中的“理解一个主题或想法”工作流程。
- en: <picture decoding="async" class="wp-image-2619">![](../Images/6025cada70d6415ee01d2966ca7cb05e.png)</picture>
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-2619">![](../Images/6025cada70d6415ee01d2966ca7cb05e.png)</picture>
- en: 'This workflow is meant to:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这个工作流程的目的是：
- en: Ask a few clarifying questions on your personal goals, values, and situation
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 就你的个人目标、价值观和情况提出一些澄清问题
- en: Help simplify the concept so that a 12 year old can understand it
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帮助简化概念，以便一个12岁的孩子也能理解它
- en: Give specific ways to integrate the lesson in a practical way in your life
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供具体的方法，将这一课以实际的方式融入你的生活中
- en: Describe potential outcomes for your life and obstacles to look out for
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述你生活中可能出现的潜在结果和需要注意的障碍
- en: This adds a completely new layer to learning that is rarely taught or talked
    about.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 这为学习增加了一个全新的层次，这种层次很少被教授或讨论。
- en: Even further, you can save a response from the last AI chat as a document and
    reference it in this new chat to help make sense of it.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 更进一步，你可以将上一次AI聊天中的回复保存为文档，并在这次新的聊天中引用它，以帮助理解。
- en: '**2) Using knowledge for action, not knowledge.**'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 用知识来行动，而不是知识。**'
- en: Most people don’t need more motivation, they need more clarity.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人不需要更多的动力，他们需要更多的清晰度。
- en: You already have goals and ambitions, but you never pursue them because point
    A (where you are) and point B (where you want to be) need a bridge of smaller
    goals and actions you can take to trek between the two.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经有了目标和抱负，但你从未追求过它们，因为A点（你所在的位置）和B点（你想要到达的位置）之间需要一个桥梁，这个桥梁是由更小的目标和你可以采取的行动组成的。
- en: Without the clarity bridge, anxiety and overwhelm start to seep in.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 没有清晰度桥梁，焦虑和不知所措开始渗透进来。
- en: Many of you are familiar with the [Simple Life Reset planner](https://app.kortex.co/public/document/883d9246-6dde-4794-9f54-92b8ff07d502)
    I give out to help break down your vision into priority tasks, but the problem
    is that most people get stuck staring at a blank template.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人都熟悉我提供的[简单生活重启计划](https://app.kortex.co/public/document/883d9246-6dde-4794-9f54-92b8ff07d502)，以帮助将你的愿景分解为优先任务，但问题是大多数人会卡在空白的模板上。
- en: It’s difficult for people to “guess” what they want out of life.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 人们很难“猜测”他们想要从生活中得到什么。
- en: The best thing to do, in my opinion, is to get a first iteration of your vision
    and priority tasks out on paper so you can begin error correcting toward the goal.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，最好的做法是将你的愿景和优先任务的第一版写在纸上，这样你就可以开始朝着目标进行错误纠正。
- en: I ended up turning that template into a Life Reset Map workflow inside [Kortex](https://kortex.co)
    that interviews you to create your vision, plan, and tasks.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 我最终将这个模板变成了一个在[Kortex](https://kortex.co)中的生活重启地图工作流程，它会通过访谈来创建你的愿景、计划和任务。
- en: When you finish that workflow, it will spit out your life reset map and you
    can add that as a document (one of the buttons at the bottom of the AI message
    output) to reference later.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 当你完成那个工作流程后，它将输出你的生活重启地图，你可以将其添加为文档（AI消息输出底部的按钮之一）以供日后参考。
- en: <picture loading="lazy" decoding="async" class="wp-image-2620">![](../Images/e0ea74e72755371fae3c90df66a10fe5.png)</picture>
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-2620">![](../Images/e0ea74e72755371fae3c90df66a10fe5.png)</picture>
- en: It’s surprisingly thorough.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 这非常全面。
- en: From there, you can go to the “Be My Clarity Coach” workflow under the Plan
    category that will call you out on your BS as you act toward those goals.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，你可以转到“成为我的清晰度教练”工作流程，该工作流程将在你朝着那些目标行动时指出你的胡言乱语。
- en: This alone will help you integrate much of what you read.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 仅此一项就能帮助你整合你所阅读的大部分内容。
- en: You’ll be surprised that, as you read, your mind will automatically start to
    connect certain insights to your vision, deepening how fast you learn and remember
    that concept.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 你会惊讶地发现，当你阅读时，你的大脑会自动开始将某些洞察与你的愿景联系起来，这会加深你学习该概念的速度和记忆。
- en: '**3) Synthesize the ideas with writing to reflect on what you learn.**'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 通过写作综合想法，反思你所学的知识。**'
- en: 'The Feynman Technique is a learning method popularized by physicist Richard
    Feynman. In short, it’s about deeply understanding a concept by explaining it
    in simple terms as if you were teaching it to someone with no prior knowledge:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 费曼技巧是由物理学家理查德·费曼推广的一种学习方法。简而言之，它通过用简单的术语解释一个概念，就像你正在教一个没有先验知识的人一样，来深入理解一个概念：
- en: '**Choose a concept –** Select the topic you want to understand.'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**选择一个概念** – 选择你想要理解的主题。'
- en: '**Teach it –** Explain the concept in simple language, as if you were teaching
    it to a child.'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**教授它** – 用简单的语言解释概念，就像你正在教一个孩子一样。'
- en: '**Identify gaps –** When you struggle to explain something clearly, identify
    the areas where your understanding is weak.'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**识别差距** – 当你难以清晰地解释某事时，识别你理解薄弱的领域。'
- en: '**Review and simplify –** Go back to the source material, relearn the concepts,
    and then try explaining them again in even simpler terms.'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**回顾和简化** – 回到原始材料，重新学习概念，然后尝试用更简单的术语再次解释它们。'
- en: The best way to do this is to write.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 做这件事最好的方式是写作。
- en: Because I’m assuming you are studying something because you are (1) deeply interested
    in it and (2) want to integrate it as some part of your life.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 因为我在假设你正在学习某样东西，因为你（1）对此有深厚的兴趣，并且（2）想要将其作为你生活的一部分。
- en: 'When you teach what you know, in public (AKA on the internet), you open the
    possibility of a few things:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在公共场合（即互联网上）教授你所知的内容时，你打开了几个可能性：
- en: You learn much, much faster because you have a forcing function for understanding.
  id: totrans-140
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你会学得更快，因为你有一个促使你理解的概念。
- en: You attract an audience of people with similar interests (these people are your
    network and future customers).
  id: totrans-141
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你吸引了一群具有相似兴趣的人（这些人是你的人脉和未来的客户）。
- en: You build leverage going into a future of job replacement. The creator economy
    is one area that is proving to not be replaced even though everyone screams there
    will be an overabundance of content.
  id: totrans-142
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你在进入未来可能被取代的工作时建立了优势。创作者经济是证明即使内容过剩，也无法被取代的一个领域。
- en: We’ve talked about this plenty of times in previous newsletters, so I’ll spare
    you that here.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在之前的通讯中已经多次讨论过这个问题，所以在这里我就不赘述了。
- en: If you want to start writing and have AI guide you through it, go to the “Create”
    category in Kortex Chat and choose from any of the post writing, thread writing,
    or newsletter writing flows.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要开始写作并且让AI引导你，请访问Kortex Chat中的“创建”类别，并从任何后写作、线程写作或通讯写作流程中选择。
- en: For the topic you are learning in particular, I’d recommend using the *YouTube,
    Newsletter, or Article Draft* workflow.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 对于你正在学习的特定主题，我建议使用*YouTube、通讯或文章草稿*工作流程。
- en: When it spits out topic ideas, ignore them and ask it to continue with the topic
    you are learning about from previous steps.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 当它提出主题想法时，忽略它们，并要求它从之前的步骤中继续你正在学习的主题。
- en: Then, when it gives you an outline, attempt to write the full newsletter or
    article from that alone.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，当它给你一个大纲时，尝试仅凭这个大纲写出完整的通讯或文章。
- en: This is your chance to use AI in a way that helps you learn.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你使用AI帮助你学习的机会。
- en: When you get stuck with writing, you can always just ask AI to teach you how
    to best write that section.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在写作上遇到困难时，你总是可以请AI教你如何最好地写那部分。
- en: “How do I write a hook?”
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: “我如何写一个吸引人的开头？”
- en: “What’s the best way to start a new section?”
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: “最好的开始新部分的方法是什么？”
- en: “I want to write a paragraph about X, how would you start that off?”
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: “我想写一段关于X的段落，你如何开始？”
- en: “Here’s all of my writing so far, how would you continue it?”
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: “这是我到目前为止的所有写作，你如何继续？”
- en: Try it out.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试一下。
- en: See how far you can get.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 看看你能走多远。
- en: Realize that consumption without creation does not lead to true learning, and
    that there is almost no reason to consume without creation, because that’s the
    entire reason you consume in the first place.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 认识到没有创造的消费并不能带来真正的学习，而且几乎没有任何理由在没有创造的情况下进行消费，因为那正是你最初消费的全部原因。
- en: I hope this was helpful.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 希望这对你有所帮助。
- en: Thank you for reading.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您的阅读。
- en: – Dan
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
