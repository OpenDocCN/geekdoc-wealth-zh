- en: 'Reading: Change Your Life With One Simple Habit'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 阅读：改变你的生活的一个简单习惯
- en: 原文：[https://thedankoe.com/letters/reading-change-your-life-with-one-simple-habit/](https://thedankoe.com/letters/reading-change-your-life-with-one-simple-habit/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/reading-change-your-life-with-one-simple-habit/](https://thedankoe.com/letters/reading-change-your-life-with-one-simple-habit/)
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2132">![](../Images/22971bb5176092c90f7464d7a7aa6e45.png)</picture>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-2132">![](../Images/22971bb5176092c90f7464d7a7aa6e45.png)</picture>
- en: The worst place you can be is stuck *right before* rock bottom.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 你能去的最糟糕的地方就是陷入**就在**谷底之前的困境。
- en: Not painful enough to change.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 痛苦得不够，无法改变。
- en: '*Just comfortable enough to stay the same.*'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '**只是足够舒适，以保持不变**。'
- en: I’m glad I got arrested that summer of freshman year in college.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我很高兴我在大学一年级那个夏天被捕了。
- en: What happened, you ask?
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 发生了什么，你问？
- en: After my roommate’s girlfriend left him for another guy, he wasn’t feeling to
    great. He needed to slow down. The first available option to do that was, you
    guessed it, weed.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的室友的女朋友离开他去找另一个男人后，他感觉不太好。他需要放慢脚步。第一个可用的选择，你猜对了，就是大麻。
- en: Myself, my roommate, and two other friends sat in my car in the parking garage
    across the street. We laughed and joked until one of the friends looked in the
    rearview mirror… “Guys, there’s a bike cop behind us.”
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我自己、我的室友和两个其他朋友坐在街对面的停车场里我的车里。我们笑着开玩笑，直到其中一个朋友看向后视镜…“伙计们，我们后面有个骑警。”
- en: “That’s not funny, man,” I responded trying not to freak out, but when I looked
    for myself, he wasn’t lying.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: “这不是玩笑，伙计，”我回应道，试图不惊慌失措，但当我看向自己时，他并没有撒谎。
- en: Since this has nothing to do with reading, let’s get to the point.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这与阅读无关，让我们直接进入正题。
- en: My roommate and I got arrested.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我的室友和我被捕了。
- en: We were booked, questioned about who sold us the drugs and sent back home that
    night.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我们被捕了，被问及是谁卖给我们毒品，并在那天晚上被送回家。
- en: The next morning, I didn’t think of it.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 第二天早上，我没有想这件事。
- en: But months later, in 2016, when I was back home working my summer job as a lifeguard,
    I found a letter in the mailbox.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 但几个月后，在2016年，当我回到家乡，在暑假做救生员工作时，我在邮箱里发现了一封信。
- en: It had a government sigil on it.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 它上面有一个政府标志。
- en: Before I had time to think, my heart sank into my stomach.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在我来得及思考之前，我的心沉到了肚子里。
- en: My parents went home, so I ran inside and opened it.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我父母回家了，所以我跑进去打开了它。
- en: 'I had 2 options:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我有两个选择：
- en: Go to court and probably become a convicted felon for smoking an illicit drug
    on a school campus, or enroll in a drug diversion program where I’m tested every
    week on a random day. Oh, and the program cost a few thousand bucks that I did
    not have as an incredibly broke college student.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 去法庭，可能因为在学校校园里吸食非法毒品而成为有前科的人，或者报名参加一个药物分流计划，每周在随机的一天接受测试。哦，而且这个计划要花几千美元，而我作为一个极其贫穷的大学生没有这笔钱。
- en: My mind was shattered to pieces.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我的思绪被击得粉碎。
- en: Every negative outcome rolled through my mind like film on a projector.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 每个负面结果都像电影放映机上的电影一样在我脑海中滚动。
- en: I didn’t know what to do. I couldn’t tell my parents. I didn’t have the money.
    I *couldn’t* become a felon… my life was just starting. All of this for smoking
    and laughing with my friends?? Really?!
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我不知道该怎么办。我不能告诉我的父母。我没有钱。我**不能**成为一个罪犯……我的生活才刚刚开始。所有这一切都是为了和朋友们抽烟和笑？真的吗？!
- en: The worry turned to anger. The anger turned to defeat.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 担忧变成了愤怒。愤怒变成了挫败。
- en: Then… *an idea*.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 然后…**一个想法**。
- en: I was into fitness at the time and I remembered a book recommendation from a
    YouTuber I enjoyed learning from.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 当时我对健身很感兴趣，我记得一个我喜欢的YouTube博主的一个书推荐。
- en: It was called The Power of Now.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 它被称为《当下的力量》。
- en: Schools Made You Hate This Life-Changing Habit
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 学校让你讨厌这个改变生活的习惯
- en: Spirituality? That’s for hippies.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 精神？那只是嬉皮士们的事情。
- en: But I was desperate.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 但我绝望了。
- en: I would do anything to help my mind navigate the situation.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我愿意做任何事情来帮助我的大脑应对这种情况。
- en: So, every morning for an hour at a time, I would sit on my dad’s porch with
    a cup of black coffee (the kind in the big blue container that tastes like it
    came from a week-old gas station dispenser).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，每天早上我会花一个小时的时间坐在父亲的门廊上，手里拿着一杯黑咖啡（那种在大蓝罐子里，尝起来像是从一个星期前的加油站自动售货机里出来的咖啡）。
- en: '*The lessons hit hard.*'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**教训来得太猛烈了**。'
- en: So hard I couldn’t help but imagine how much knowledge I had been missing out
    on in my life by not reading beyond public school. Knowledge that could give me
    the tools to live a better life.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 难以想象，如果不阅读公立学校之外的内容，我一生中错过了多少知识。这些知识可以给我提供过上更好生活的工具。
- en: The funny thing is, if I hadn’t hit rock bottom, my mind would reject the abnormal
    ideas in the book.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 令人啼笑皆非的是，如果我没有跌到谷底，我的大脑会拒绝书中的异常想法。
- en: The cool thing is, you don’t have to hit rock bottom to have the same effect.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 好玩的是，你不需要跌到谷底才能产生同样的效果。
- en: The last books I actually *chose* to read were The Magic Treehouse and Alex
    Rider series. But that was more than a decade ago. After that point, I started
    to resent reading.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我最后真正*选择*读的书是《魔法树屋》和亚历克斯·里德系列。但那是在十多年前。从那时起，我开始讨厌阅读。
- en: In high school, I was forced to read books I didn’t care about or have any interest
    in.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在高中时，我被迫阅读我不关心或对之无兴趣的书。
- en: After discovering mindfulness and presence, my life changed. I was happier and
    at peace, and the negative situation didn’t seem to phase me. I handled it as
    it came. Life was good. Sometimes.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在发现正念和在场之后，我的生活发生了改变。我更快乐，更平和，消极的情况似乎并没有让我受到影响。我处理了它。生活是美好的。有时候。
- en: It also taught me about the trap of spiritual status very quickly. I would often
    get angry with my parents for “not getting it.”
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 它还很快让我了解了精神地位的陷阱。我经常因为父母“不懂”而生气。
- en: “Like really Dad, you don’t want to end your suffering and be enlightened like
    *me?”*
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: “像真的爸爸，你不想结束你的痛苦，像*我*一样得到启迪吗？”
- en: Lol.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: Lol。
- en: There are many lessons on spirituality I can share, but that’s not the topic
    of this letter.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以分享很多关于精神层面的教训，但这不是这封信的主题。
- en: Schools probably made you hate reading.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 学校可能让你讨厌阅读。
- en: And thus, they made you hate learning.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，他们让你讨厌学习。
- en: If you hate learning, it’s safe to say that you have lost a lot of zest for
    life. Learning is a fundamental human drive.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你讨厌学习，可以说你已经失去了很多对生活的热情。学习是人类的基本驱动力。
- en: Without it, activities aren’t as enjoyable.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 没有它，活动就不那么愉快了。
- en: Conversations aren’t as meaningful.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 对话不再那么有意义。
- en: Your days feel repetitive and lifeless.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 你的日子感觉重复而乏味。
- en: You don’t see your future changing much from the present.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 你不会看到你的未来从现在有多少改变。
- en: But what if I told you there’s a life-changing habit hiding right under your
    nose?
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果告诉你，有一个改变一生的习惯就隐藏在你的鼻子下面呢？
- en: The problem is that most people are still clones of the school system. They
    are on a life trajectory that they didn’t set.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 问题在于，大多数人仍然是教育体系的克隆。他们在一条他们没有设定的生活轨迹上。
- en: If you want to create a fulfilling career, have better relationships, become
    more intelligent, rediscover life’s depth, and slow down in this busy distracted
    world…
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想创造一个充实的事业，拥有更好的关系，变得更聪明，重新发现生活的深度，在这个繁忙而分心的世界中放慢脚步……
- en: Read.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 阅读。
- en: Part 1) Reasons To Read
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第一部分) 阅读的理由
- en: <picture decoding="async" class="wp-image-2137">![](../Images/822af1eba1b72e7f1a275b023afd26ce.png)</picture>
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-2137">![](../Images/822af1eba1b72e7f1a275b023afd26ce.png)</picture>
- en: You don’t need a reason to read.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要理由来阅读。
- en: You don’t need a reason to improve your life.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要理由来改善你的生活。
- en: You don’t need a reason to spend your time on this Earth being focused, fulfilled,
    and clear-headed.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要理由来在地球上专注于、充实和清醒地度过你的时间。
- en: But, as we all know, that’s not the reality of the modern world.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，正如我们所知，那并不是现代世界的现实。
- en: Let’s start with the fact that most people don’t realize what they’re missing
    out on. Now, stick with me, as this may get abstract, but if you understand the
    lessons, their effects can be profound.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从这样一个事实开始，大多数人都没有意识到他们失去了什么。现在，跟我来，这可能有点抽象，但如果你能理解这些教训，它们的影响可以非常深刻。
- en: 1) You can only cook with what’s in the fridge.
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 你只能用冰箱里的食材来烹饪。
- en: This is from a video from Tim Demoss in his “Reasons To Read” [series of videos](https://youtube.com/playlist?list=PLZpKwDwO5HwPrGyF9_Py_-BHcxbp_Co2c&si=1UCI_3NDFTkDlw5W).
    I’ve been binge watching them lately for the great ideas he provides (and to program
    myself to read more).
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这来自Tim Demoss的一个视频，他在他的“阅读理由”[视频系列](https://youtube.com/playlist?list=PLZpKwDwO5HwPrGyF9_Py_-BHcxbp_Co2c&si=1UCI_3NDFTkDlw5W)。我最近一直在狂热地观看这些视频，因为他提供了很多好主意（并且为了让自己养成多读书的习惯）。
- en: Your mind won’t notice new life-changing opportunities if you don’t have goals
    that *open your mind and expand your awareness.*
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有能够打开你的心扉和扩展你的意识的目标，你的大脑就不会注意到新的改变一生的机会。
- en: If you surround yourself with people who want to acquire certain credentials,
    such as a college degree, to get a high-paying job, your mind will only notice
    information and ideas that help you reach that goal.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你周围的人都是为了获得某些证书，比如大学学位，以获得高薪工作，你的大脑只会注意到帮助你达到那个目标的信息和想法。
- en: But if you were to consciously re-educate yourself with new books, you would
    be exposed to novel ideas that allow you to create new goals for yourself.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果你有意识地通过阅读新书来重新教育自己，你将接触到新颖的想法，这些想法让你能够为自己设定新的目标。
- en: Your awareness surface area expands.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 你的意识表面积开始扩大。
- en: You begin to connect new ideas in your life.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 你开始将生活中的新想法联系起来。
- en: You notice an opportunity – that you wouldn’t have cared about or noticed before
    – that motivates you to do something *new and unknown*. Finally starting that
    business you’ve been putting off is a good example.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 你注意到一个机会——你之前可能不会关心或注意到的机会——这激励你去做一些*新而未知*的事情。最终开始经营你一直推迟的生意就是一个很好的例子。
- en: Then, and only then, can your mind begin to notice higher-level ideas that allow
    you to see progress in that domain. You’ll start to notice beginner, intermediate,
    and advanced strategies on social media, the algorithm will change to show you
    more, and you slowly reprogram your mind to achieve better goals in your life.
    This effect happens on more than just what you consume on social media.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，只有那时，你的大脑才开始注意到更高层次的想法，这些想法让你能够看到该领域的进步。你将开始注意到社交媒体上的初学者、中级和高级策略，算法会改变以显示更多内容，你慢慢地重新编程你的大脑，以实现生活中更好的目标。这种效果不仅仅发生在你在社交媒体上消费的内容上。
- en: '*Your goals have fundamentally changed.*'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '*你的目标已经发生了根本性的变化*。'
- en: Conversations with your friends start to shift. Your search history goes from
    something you probably shouldn’t be searching to things like “best business models
    of 2024.” Then, you get a little taste of what life could be. You will probably
    fail the first time around, and the second, as that’s just how it goes… but your
    potential will always be there. Even if you quit, it won’t stop nagging you. There’s
    no going back.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 与朋友的对话开始转变。你的搜索历史从你很可能不应该搜索的内容转变为“2024年最佳商业模式”等类似的内容。然后，你开始尝到生活的点滴。你可能会在第一次尝试时失败，第二次也是如此……但你的潜力始终存在。即使你放弃了，它也不会停止纠缠你。没有回头路。
- en: 'The point is this:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 重点是：
- en: Life probably passes you by because you are exposed to the same information
    day after day. Life hasn’t changed much for you since you achieved the goals society
    set for you.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 生活可能已经从你身边溜走，因为你每天都在接触相同的信息。自从你实现了社会为你设定的目标以来，你的生活并没有发生太大的变化。
- en: You can only cook with what’s in the fridge. And if your fridge doesn’t expand,
    you eat the same boring meal every single day (this isn’t always a bad thing,
    like for losing weight, but if your fridge is filled with junk, then it’s a very
    bad thing).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 你只能用冰箱里的食材来烹饪。如果你的冰箱不扩大，你每天就只能吃同样的无聊饭菜（这并不总是坏事，比如减肥，但如果你的冰箱里都是垃圾，那就非常糟糕了）。
- en: You need a new goal.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要一个新的目标。
- en: You need to self-educate to reach that goal.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要自我教育以达到那个目标。
- en: That simple process alone will be responsible for much of the joy in your life.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 仅此简单的过程就将成为你生活中大部分快乐的原因。
- en: True education is about curiosity and discovery, not memorization and conformity.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 真正的教育关乎好奇心和探索，而不是记忆和顺从。
- en: By the way, this is why we are building [Kortex](https://kortex.co). To help
    you have a “second brain,” or a database of ideas that make writing seamless.
    Your “second brain” is the food in the fridge you cook with, haha. Soft launch
    date is mid-September 🙂 (Unless you want in on [lifetime access](https://cc.kortex.co)).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 顺便说一句，这就是我们为什么要建立[Kortex](https://kortex.co)。为了帮助你拥有一个“第二大脑”，或者是一个使写作流畅的思想数据库。你的“第二大脑”就是你在冰箱里用来烹饪的食物，哈哈。软启动日期是九月中旬哦
    :)（除非你想获得[终身访问权](https://cc.kortex.co)）。
- en: 2) The mind is a muscle that must be trained.
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 大脑是一块需要训练的肌肉。
- en: Many people obsess over physical health but rarely care about mental health.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人过分关注身体健康，但很少关心心理健康。
- en: Well… they care about mental health but use bandaid solutions to solve their
    disorder in consciousness.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯……他们关心心理健康，但使用临时解决方案来解决他们意识中的问题。
- en: Mental health is about sense-making, understanding, and clarity. Anxiety and
    depression, even if they stem from a chemical imbalance (I’m not saying this will
    cure it), are the product of a narrow mind focused on the familiar past or predictable
    future, often negative.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 心理健康关乎理解、认知和清晰。焦虑和抑郁，即使它们源于化学失衡（我并不是说这会治愈它），是狭隘思维的结果，这种思维专注于熟悉的过去或可预测的未来，通常是负面的。
- en: When you feel lost, it’s usually because you are in a chaotic life situation
    that you don’t have the knowledge or skill to make sense of. You can’t see a way
    out.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 当你感到迷茫时，通常是因为你处于一个混乱的生活状况中，你没有知识或技能去理解它。你看不到出路。
- en: You aren’t where you want to be because you can’t lift the mental weight that
    allows you to get there.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有达到你想要的位置，因为你无法举起让你到达那里的心理负担。
- en: You don’t have the knowledge or skill that allows you to be in that position
    in life.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有知识或技能让你在生活中处于那个位置。
- en: The mind is the operating system for reality, and most people are running on
    Windows 98\. Many others have devolved into a pager that beeps when they need
    to have a negative reaction to something that challenged the lines of government
    rhetoric in their software.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑是现实的操作系统，大多数人都在运行Windows 98。许多人已经退化成了一种需要对他们软件中挑战政府言辞的事情做出负面反应时才会发出蜂鸣声的寻呼机。
- en: You change your life by reprogramming your mind.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过重新编程你的大脑来改变你的生活。
- en: Read more books that challenge your beliefs, expose you to how much you don’t
    know, and encourage you to change your behavior in a way that benefits your own
    life and others.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 阅读更多挑战你信念、让你意识到你不知道多少以及鼓励你以有利于你自己的生活和他人的生活的方式改变行为的书籍。
- en: Don’t expect to do a mental 315 pound bench press on your first try.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 不要期望第一次就能做315磅的卧推。
- en: Pass over the ideas you don’t understand. Your mind will slowly connect the
    dots as you continue your reading habit.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 跳过你不理解的观点。随着你继续阅读习惯，你的大脑会逐渐连接这些点。
- en: 3) The best way to end bad habits is to replace them.
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第三部分）结束坏习惯的最好方法是替换它们。
- en: You can only have so many habits in your day.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 你每天只能养成那么多的习惯。
- en: One for your mind, one for your body, one for your work, one for your relationships.
    Minimum.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 一个用于你的思想，一个用于你的身体，一个用于你的工作，一个用于你的关系。至少。
- en: If you were to stop right now and audit your day, how many of the habits you
    unconsciously performed are actually helping your future?
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你现在停下来审视你的一天，你无意识地养成的习惯中有多少实际上是在帮助你的未来？
- en: When we observe society, it’s easy to assume that the number is close to zero.
    From there, it’s even easier to assume that (1) they aren’t happy and (2) they
    will be the same person, in the same position, with the same mind in 20 years.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们观察社会时，很容易假设这个数字接近于零。从那里，更容易假设（1）他们不快乐，并且（2）20年后，他们仍然是同一个人，处于同样的位置，拥有同样的心态。
- en: Everyone knows that staring at a TV, at night, soaking in that unnatural blue
    light – that is probably contributing to skin cancer, especially if you aren’t
    getting sunlight throughout the day – isn’t good.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都知道，晚上盯着电视，沉浸在那种不自然的蓝光中——这可能会增加患皮肤癌的风险，尤其是如果你整天都没有晒到阳光的话——这是不好的。
- en: In that case, swapping that bad habit with reading could dramatically change
    more than just your mental health. It could potentially save your life.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，用阅读来替换那个坏习惯可以极大地改变不仅仅是你的心理健康。它可能甚至能救你的命。
- en: Bad habits aren’t just bad because they take away time from having good habits;
    they slowly erode every other aspect of your life. Bad habits aren’t neutral in
    their effect. They are exponentially bad. Just as good habits, when consistent,
    are exponentially good.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 坏习惯之所以不好，不仅仅是因为它们占用了养成好习惯的时间；它们慢慢地侵蚀了你生活的其他各个方面。坏习惯在效果上不是中性的。它们是指数级地不好。就像好习惯一样，当它们持续一致时，是指数级地好。
- en: “1% better every day” as they say.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: “每天进步1%”，他们这么说。
- en: <picture decoding="async" class="wp-image-2133">![](../Images/0ca3c5cfa341c65b71dfa18f3729d0c9.png)</picture>
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-2133">![](../Images/0ca3c5cfa341c65b71dfa18f3729d0c9.png)</picture>
- en: 'The questions now are:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 现在的问题是：
- en: What do I read that makes me want to adopt this habit?
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 我读到了什么让我想要养成这个习惯？
- en: How do I read to get the most out of this habit?
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 我如何阅读才能从这个习惯中获得最大收益？
- en: What are some tactics I can use to make this habit change enjoyable?
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以使用哪些策略来使这个习惯的改变变得愉快？
- en: Part 2) What To Read
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第二部分）该读什么
- en: <picture loading="lazy" decoding="async" class="wp-image-2134">![](../Images/1ae7feaf6b91a0c9f5acb90732f943a1.png)</picture>
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-2134">![](../Images/1ae7feaf6b91a0c9f5acb90732f943a1.png)</picture>
- en: Have you ever contemplated the meaning of the word *intention?*
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否曾思考过“意图”这个词的意义？
- en: It’s rather powerful if you use it as an operating principle for your life.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你把它作为你生活的行为准则，它就相当有力量。
- en: '**In latin, *intentio* means to strain, stretch, or stretch out.**'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '**在拉丁语中，*intentio*意味着拉紧、伸展或延伸。**'
- en: So to live an intentional life, *what are you stretching towards? What are you
    struggling for?*
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为了过上有意的生活，*你正在努力追求什么？你在为什么而奋斗？*
- en: Like a muscle being stretched and strained to build muscle, endurance, and strength,
    living with intention is how you build muscle in the mind by simply engaging with
    life. Because of that, it becomes much more meaningful.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 就像肌肉被拉伸和拉扯以建立肌肉、耐力和力量一样，有意识地生活是通过简单地参与生活来锻炼心智肌肉的方式。正因为如此，它变得更有意义。
- en: When you stretch towards a goal that you choose, your mind demands nutrition
    to fuel that growth.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 当你朝着自己选择的目标努力时，你的大脑需要营养来支持这种成长。
- en: Then, and only then, can books help you.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，只有那时，书籍才能帮助你。
- en: If you aren’t doing anything unconventional with your life, reading won’t help
    you much. At a minimum, the intention *to* change your life must be there. *Intention
    signals a mind that’s ready to receive instead of react.*
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你生活中没有做任何非常规的事情，阅读对你帮助不大。至少，*想要*改变生活的意图必须存在。*意图表明你的大脑准备好接受而不是反应。*
- en: Why is this necessary?
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这是必要的？
- en: Because each person interprets a book differently.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 因为每个人对一本书的解释都不同。
- en: One person with the goal of becoming a better CEO can read philosophy and the
    ideas will be applicable to his endeavors.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 一个有成为更好CEO目标的人可以阅读哲学，这些想法将适用于他的事业。
- en: Another person can want a better relationship, read the same book, and see progress
    in that domain.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个人可能想要改善关系，阅读同一本书，并在这个领域看到进步。
- en: With that, any book, conversation, article, or information can help you achieve
    a goal. You don’t *have* to limit what you read, but there are types of books
    that will help you much more than choosing something random.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，任何书籍、对话、文章或信息都可以帮助你实现目标。你不必*必须*限制你阅读的内容，但有一些书籍类型能帮助你比随机选择的东西更多。
- en: 1) Read books that challenge you.
  id: totrans-122
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 阅读挑战你的书籍。
- en: A challenging book is the perfect metaphor for diving into the unknown.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 一本有挑战性的书是深入未知领域的完美隐喻。
- en: You don’t know what to expect.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 你不知道会期待什么。
- en: You have difficulty making sense of it all.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 你难以理解这一切。
- en: But you take it one step, or page, at a time.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 但你一次只迈一步，或一页一页地阅读。
- en: Things start to make sense. It feels good. You make connections, dopamine spurts
    into your brain, and progress is being made. Soon enough, you can’t put the book
    down. The ideas are life-changing. Your mind is flooded with potential.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 事情开始变得有道理。感觉很好。你建立了联系，多巴胺涌入大脑，进步正在发生。不久之后，你无法放下这本书。这些想法是改变生活的。你的脑海中充满了可能性。
- en: '*I should start that business…*'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: '*我应该开始那项业务…*'
- en: '*I should learn that skill…*'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: '*我应该学习那个技能…*'
- en: '*I shouldn’t be distracted right now, I’ll go on a walk instead…*'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '*我现在不应该分心，我会去散步…*'
- en: 'A challenging book teaches you more than just the ideas in the book. It teaches
    you one of the most important processes of life: progress.'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 一本有挑战性的书不仅教会了你书中的想法，还教会了你生活中最重要的过程之一：进步。
- en: You begin to understand that progress is not linear. Nothing happens, then everything
    happens. One moment, you’re lost in the darkness. The tension builds until the
    star explodes and creates atomic nuclei that spread across the galaxy. All of
    the little candles you lit along the way start to light up the room as a whole,
    allowing you to see that new domain of life with clarity and focus.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 你开始理解进步不是线性的。没有发生任何事情，然后所有事情都发生了。某一刻，你在黑暗中迷失。紧张感逐渐增强，直到星星爆炸，创造出遍布银河系的原子核。你一路上点燃的小蜡烛开始照亮整个房间，让你能够清晰地看到新的生活领域，并集中精力。
- en: A challenging book won’t always make sense.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 一本有挑战性的书并不总是能让人理解。
- en: It will overwhelm you.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 这会让你感到不知所措。
- en: Don’t label this feeling as bad when it arises.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 当这种感受出现时，不要将其标记为不好。
- en: You’re supposed to feel overwhelmed.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该感到不知所措。
- en: Realize that confusion and overwhelm mean your mind is searching for answers
    and trying to learn. Don’t stop it.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 认识到困惑和不知所措意味着你的大脑正在寻找答案和尝试学习。不要停止它。
- en: 2) Read what you love until you love to read. – Naval
  id: totrans-138
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 一直阅读你所热爱的，直到热爱阅读。 —— 纳瓦尔
- en: The principles of habit formation apply to more than just books.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 习惯养成的原则不仅适用于书籍。
- en: When you get started in the gym, it’s stupid to go in blindly, hopping to random
    machines, hoping that you will enjoy the process.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 当你开始在健身房开始时，盲目地进入，随意跳到随机机器上，希望你会享受这个过程，这是愚蠢的。
- en: First, you research programs that align with your goals in life.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你研究与你生活目标相符的项目。
- en: If you are a busy person, a 6-day high-volume bodybuilding split probably won’t
    be enjoyable for you. But a 3-day minimalist program would be perfect. Some will
    argue that’s not optimal for muscle growth, but your goal isn’t only muscle growth.
    You choose the program that is optimal for your goals, not someone else’s.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一个忙碌的人，一个6天的高强度健美训练分割可能不会让你感到愉快。但一个3天的简约计划会非常完美。有些人可能会争论这不利于肌肉增长，但你的目标不仅仅是肌肉增长。你选择最适合你目标的计划，而不是别人的。
- en: After that, following the program exactly as it is may work, but you may hate
    some exercises, making you want to skip leg day (as a common example haha).
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，严格按照程序进行可能有效，但你可能会讨厌某些练习，让你想跳过腿部训练日（比如一个常见的例子哈哈）。
- en: This is your chance to research new exercises that you can swap out while retaining
    the impact of the program itself.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你的机会去研究新的练习，你可以替换它们，同时保留计划本身的影响。
- en: Now, as a newcomer in the gym, you have clarity on what to do when you get there
    (check number 1 for enjoyment and flow), you have exercises that *you* look forward
    to doing (check number 2), and because of both, you see more progress than if
    you were to do it any other way and become obsessed with the process (check 3).
    You have clarity. You have focus. Your mind doesn’t split to what people will
    think of you. The anxiety fades.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，作为一个健身房的新手，当你到达那里时，你对自己的目标有清晰的了解（检查第1点以获得乐趣和流畅性），你有你期待做的练习（检查第2点），由于这两点，你比其他任何方式都看到更多的进步，并沉迷于这个过程（检查第3点）。你有清晰的目标。你有专注。你的思维不会分散到别人对你的看法。焦虑消失了。
- en: The same holds true for books you read and how you read them.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 这同样适用于你读的书和你阅读的方式。
- en: Like exercises in a mental gym, choose books that *truly* interest you.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 就像精神健身房中的练习一样，选择那些真正吸引你的书籍。
- en: Then, once it’s a foundational habit in your life, you’ll know what to read.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，一旦它成为你生活中的基础习惯，你就会知道该读什么。
- en: '*Effective habit formation happens through self-experimentation to find the
    intersection of what works and what you enjoy.*'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: '*有效的习惯形成是通过自我实验来找到有效和你喜欢的事情的交集。*'
- en: 3) Read books that make you intelligent.
  id: totrans-150
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 读那些能让你变得聪明的书。
- en: What is intelligence?
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 智力是什么？
- en: Intelligence is not about how much you know, it’s about how much you understand.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 智力不在于你知道多少，而在于你理解多少。
- en: 'And since I supposedly can’t stop using Naval quotes:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我似乎无法停止使用Naval的引言：
- en: If you understand it, you don’t need to memorize it.
  id: totrans-154
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你理解了，你就不需要去记忆它。
- en: ''
  id: totrans-155
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you don’t understand it, you don’t want to memorize it.
  id: totrans-156
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你不懂，你就不想去记忆它。
- en: '*Banger.*'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: '*Banger.*'
- en: Intelligence is holistic.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 智力是整体的。
- en: When we say someone is very intelligent, what we mean is that they have a higher
    ability for holistic pattern recognition.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们说某人非常聪明时，我们的意思是他们具有更高的整体模式识别能力。
- en: They can make sense of the world by connecting the dots.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 他们可以通过连接点来理解世界。
- en: They have a deep sense of insight that leads to intuition, allowing them to
    make intelligent decisions.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 他们有深刻的洞察力，这导致直觉，使他们能够做出明智的决定。
- en: On that note, intelligence is not book smarts. Book smarts are often used as
    a disguise to overanalyze risk, become narrow-minded and unable to see beyond
    that risk, leading to inaction and mediocrity. That is not intelligence.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个意义上，智力不是书本知识。书本知识常常被用作掩饰，过度分析风险，变得狭隘，无法超越那个风险，导致不采取行动和平庸。这并不是智力。
- en: Intelligence is not getting trapped in parts but swimming in wholes.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 智力不是陷入局部，而是在整体中游弋。
- en: Someone who has studied a popular business strategy may be effective at that,
    but the person who has a deep understanding of business as a whole, big picture,
    will be able to create their own strategy and sustain their success regardless
    of how the industry changes.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 研究过流行商业策略的人可能在这方面很有效，但那些对商业整体、大局有深刻理解的人将能够制定自己的策略，并持续成功，无论行业如何变化。
- en: Intelligence stems from generalism, not specialism.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 智力源于通才，而非专家。
- en: Being a specialist often puts you in direct competition with other specialists.
    Confining your mind to that specialist frame prevents you from learning in connected
    domains that would allow you to be creative.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 成为专家往往会使你直接与其他专家竞争。将你的思维局限于专家框架会阻止你在连接的领域中学习，这些领域会允许你发挥创造力。
- en: Intelligence is holistic, creative, and metaphysical.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 智力是整体的、创造性的和形而上的。
- en: So what are the best books you can read to cultivate a sense of intelligence?
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，你能读到的最好的书籍来培养智力感是什么？
- en: Books that open your mind.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 打开你思维的书。
- en: Books on holism, creativity, and metaphysics.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 关于整体论、创造力和形而上学的书籍。
- en: 'Alan Watts is an incredible example of being able to connect the universal
    to the practical. Here’s a long quote, but it may help you get the gist:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 艾伦·瓦茨是能够将普遍性与实用性联系起来的一个不可思议的例子。这里有一段很长的引语，但它可能有助于你抓住要点：
- en: And these basic ideas I call myth, not using the word ‘myth’ to mean simply
    something untrue, but to use the word ‘myth’ in a more powerful sense. A myth
    is an image in terms of which we try to make sense of the world. Now, for example,
    a myth in a way is a metaphor. If you want to explain electricity to someone who
    doesn’t know anything about electricity, you say, well, you talk about an electric
    current. Now, the word ‘current’ is borrowed from rivers. It’s borrowed from hydraulics,
    and so you explain electricity in terms of water. Now, electricity is not water,
    it behaves actually in a different way, but there are some ways in which the behavior
    of water is like the behavior of electricity, and so you explain it in terms of
    water. Or if you’re an astronomer, and you want to explain to people what you
    mean by an expanding universe and curved space, you say, ‘well, it’s as if you
    have a black balloon, and there are white dots on the black balloon, and those
    dots represent galaxies, and as you blow the balloon up, uniformly all of them
    grow farther and farther apart. But you’re using an analogy–the universe is not
    actually a black balloon with white dots on it.
  id: totrans-172
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我把这些基本思想称为神话，并不是简单地用“神话”这个词来表示不真实的东西，而是用这个词在更强大的意义上。神话是我们试图理解世界的一种形象。现在，例如，神话在某种程度上是一种隐喻。如果你想向一个对电一无所知的人解释电，你会说，嗯，你谈论电流。现在，“电流”这个词是从河流借来的。它是从水力学借来的，所以你用水的术语来解释电。现在，电并不是水，它的行为实际上是以不同的方式，但在某些方面，水的性质与电的性质相似，所以你用水的术语来解释它。或者如果你是一位天文学家，你想向人们解释你所说的膨胀宇宙和弯曲空间，你会说，“嗯，就像你有一个黑色的气球，上面有白色的点，这些点代表星系，当你吹气球时，它们均匀地越来越远。但你是在使用类比——宇宙实际上不是一个有白色点的黑色气球。
- en: That, my friends, is intelligence.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 朋友们，这就是智慧。
- en: 7 Books That I Can’t Stop Reading
  id: totrans-174
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7本我无法停止阅读的书
- en: <picture loading="lazy" decoding="async" class="wp-image-2138">![](../Images/26991713fd640d0989d803e587272493.png)</picture>
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-2138">![](../Images/26991713fd640d0989d803e587272493.png)</picture>
- en: I used to fall asleep listening to Alan Watts.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 我过去常常听着艾伦·瓦茨（Alan Watts）的演讲入睡。
- en: (I should probably get back into that).
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: （我可能应该重新开始阅读这些）。
- en: I could quite literally *feel* my mind opening. I could sense that my thoughts
    were able to go down new roads. I started to become able to make sense of things
    I didn’t understand before, but in a metaphorical sense as Watts did in the quote
    above.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以非常真实地感觉到我的思维在打开。我能感觉到我的思想能够走新的道路。我开始能够理解我以前不理解的事物，但就像瓦茨在上面的引语中所做的那样，以一种隐喻的方式。
- en: By the way, this is exactly why I write as long of newsletters as I do. I don’t
    care to narrow your mind on a small piece every day. I want to help you feel that
    sense of an expanded mind that changed my life by presenting a fusion of connected
    ideas (this is yet another reason why we are building Kortex, to help others write
    in that manner).
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 顺便说一句，这正是我为什么写这么长的通讯的原因。我不在乎每天把你的思维局限在很小的一部分。我想通过呈现一系列相连的想法来帮助你感受到那种扩展思维的感觉，这些想法改变了我的人生（这也是我们建设Kortex的原因之一，帮助他人以这种方式写作）。
- en: <picture loading="lazy" decoding="async" class="wp-image-2135">![](../Images/d1c1f20d794cae01894faa45e6ee34f1.png)</picture>
    <picture loading="lazy" decoding="async" class="wp-image-2136">![](../Images/382c84f4f909cf504fb72819f247975d.png)</picture>
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-2135">![](../Images/d1c1f20d794cae01894faa45e6ee34f1.png)</picture>
    <picture loading="lazy" decoding="async" class="wp-image-2136">![](../Images/382c84f4f909cf504fb72819f247975d.png)</picture>
- en: That’s an example from *week 0* of our current Writer’s Bootcamp.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们当前作家训练营*第0周*的一个例子。
- en: There are a few books I reread quite often.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 我经常反复阅读几本书。
- en: Each time I read them, I discover something new and my understanding of life
    deepens.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 每次我阅读它们，我都会发现一些新的东西，我对生活的理解也会加深。
- en: I’m listing these in the order I think you will make the most connections. I
    am including these books specifically because if you read them all, your mind
    will light up with dopamine.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 我按照我认为你会建立最多联系的方式列出这些书。我特别包括这些书，因为如果你都读过了，你的思维就会因为多巴胺而变得明亮。
- en: '**The Art Of Impossible by Steven Kotler** – A practical and scientific book
    on achieving the impossible.'
  id: totrans-185
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**《不可能的艺术》（The Art Of Impossible）by Steven Kotler** – 一本关于实现不可能之事的实用和科学书籍。'
- en: '**Flow by Mihaly Csikszentmihalyi** – For understanding how to sustain enjoyment
    in your life.'
  id: totrans-186
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**《心流》米哈伊·契克森米哈伊** – 理解如何在生活中保持乐趣。'
- en: '**A Brief History Of Everything by Ken Wilber** – To make sense of the world
    in a holistic manner.'
  id: totrans-187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**《万物简史》肯·威尔伯** – 以整体的方式理解世界。'
- en: '**Awareness by Anthony De Mello** – A refreshing and humorous series of lectures
    to help you not take life so seriously.'
  id: totrans-188
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**《安东尼·德·梅洛的觉醒》** – 一系列清新幽默的讲座，帮助你不要对生活过于认真。'
- en: '**Becoming Supernatural by Joe Dispenza** – Potentially pseudoscience on –
    but nonetheless impactful in its lessons – changing your life by breaking the
    cycle of repetition in the familiar and the known.'
  id: totrans-189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**《成为超自然》乔·迪斯彭萨** – 在改变你的生活中，通过打破熟悉和已知事物的重复循环，可能是有伪科学的，但其在教训上仍然有影响力。'
- en: '**The Kybalion by The Three Initiates** – An introduction to hermetic philosophy
    and the patterns of reality (some say this is not a good book for hermeticism,
    but I enjoyed it quite a bit).'
  id: totrans-190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**《三发起者的基巴尔离子》** – 对秘传哲学和现实模式的介绍（有人说这不是一本很好的秘传主义书籍，但我非常喜欢它）。'
- en: '**The Way Of The Superior Man by David Deida** – A student of Ken Wilber writing
    on masculine and feminine dynamics and spiritual growth.'
  id: totrans-191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**《卓越男性的道路》大卫·迪达** – 肯·威尔伯的学生，撰写关于男性和女性动态以及精神成长的文章。'
- en: My life would not be the same without these books.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 没有这些书，我的生活将不再一样。
- en: My own book, [The Art Of Focus](https://theartoffocusbook.com), is somewhat
    of a synthesis between all of these while connecting it to creative work and the
    internet for living a meaningful life.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 我自己的书，《[专注的艺术](https://theartoffocusbook.com)》，在连接到创意工作和互联网以过上有意义的生活的同时，是上述所有内容的综合。
- en: If you’ve read my book and felt it was dense, I would highly encourage you to
    read through the others listed above.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你读过我的书，觉得它很密集，我强烈建议你阅读上面列出的其他书籍。
- en: Part 3) How To Read
  id: totrans-195
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第三部分）如何阅读
- en: 'Here’s how Cal Newport – author of Deep Work – reads 5 books a month:'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是卡尔·纽波特——深度工作一书的作者，如何每月阅读5本书：
- en: Choose more interesting books.
  id: totrans-197
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择更有趣的书。
- en: Schedule reading sessions like you schedule exercise.
  id: totrans-198
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 像安排锻炼一样安排阅读时间。
- en: Form a ritual and make it more enjoyable.
  id: totrans-199
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制定一个仪式，让它更有趣。
- en: Do closing pushes to finish books in one sitting.
  id: totrans-200
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 做一些结束时的推动，以便一次性读完一本书。
- en: Take everything interesting off your phone.
  id: totrans-201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 把手机上所有有趣的东西都删掉。
- en: In short, Cal is an expert at removing distractions from his life to make room
    for what he finds meaningful, important, and interesting.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，卡尔是一位专家，他通过消除生活中的干扰，为他认为有意义、重要和有趣的事物腾出空间。
- en: Here’s what I personally do to ensure I maintain a reading habit.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我个人确保我保持阅读习惯的做法。
- en: 1) Hunt for an idea or two, then put it down.
  id: totrans-204
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 寻找一两个想法，然后放下。
- en: Most books can be understood by reading the first 2-3 chapters.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数书都可以通过阅读前2-3章来理解。
- en: Books often open with the big picture then dive into technical details.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 书通常从大局开始，然后深入技术细节。
- en: If you are looking for a process to experiment with to get a specific result
    in your life, then read the entire book.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在寻找一个实验过程，以在你的生活中获得特定的结果，那么请阅读整本书。
- en: If you are like myself or the creators/writers in my audience whose work revolves
    around novel perspectives and big ideas, you have my permission to stop reading
    once you find that “golden nugget” that spits some dopamine and excitement into
    your brain.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你像我或我的听众中的创作者/作家一样，你的工作围绕新颖的视角和重大思想，一旦你找到那个能让你大脑充满多巴胺和兴奋的“金块”，你可以停止阅读。
- en: 2) Go on a walk and listen to the book.
  id: totrans-209
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 去散步并听书。
- en: Yes, you get it, I love walks.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，你明白了，我喜欢散步。
- en: I treat them as creativity blocks (as opposed to the popular productivity blocks).
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 我把它们当作创造力障碍（而不是流行的生产力障碍）。
- en: As a creative or knowledge worker, your productivity blocks are only as good
    as the ideas you have to be productive with.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名创意工作者或知识工作者，你的生产力障碍只和你用来提高生产力的想法一样好。
- en: Going on a walk removes you from the distractions of your home.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 散步可以让你摆脱家里的干扰。
- en: And, I’m sure there is science on how moving your body makes your brain more
    receptive to ideas.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 我相信，关于运动如何让你的大脑更易于接受想法，是有科学依据的。
- en: 3) Rotate different topics and genres for pattern recognition.
  id: totrans-215
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 轮换不同的主题和类型以识别模式。
- en: I often read 3 books at a time.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 我经常一次读3本书。
- en: One physical, one Kindle, and one audio.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 一个实体书，一个Kindle，一个音频。
- en: Sometimes I’ll listen to one of the same books I’m reading.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 有时我会听我正在读的同一本书。
- en: This allows me to have an array of big ideas in my mind that eventually lead
    to novel connections that I can write about.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 这让我在脑海中拥有了一系列的大想法，最终导致了我可以写下来的新颖联系。
- en: 4) Have books lying everywhere.
  id: totrans-220
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 让书籍无处不在。
- en: Embrace the chaotic creative lifestyle.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 拥抱混乱的创造性生活方式。
- en: Leave books on your desk, kitchen counter, nightstand, by the toilet.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 把书放在你的桌子上、厨房的台面上、床头柜旁、马桶旁边。
- en: Have sticky notes everywhere in case an idea comes to mind, or use [Kortex capture](https://kortex.co)
    when it’s available later this year (sorry not sorry for teasing you about Kortex
    so much).
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有灵感，到处放些便利贴，或者等到今年稍晚些时候有了 [Kortex capture](https://kortex.co) 就使用它（对于如此频繁地提及
    Kortex 我表示抱歉，但不是真的抱歉）。
- en: The goal is to make reading more interesting than your phone.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是让阅读比你的手机更有趣。
- en: 5) Create a reading space you love.
  id: totrans-225
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5) 创建一个你喜欢的阅读空间。
- en: Outside of long walks, I love sitting in a private, quiet place with a nice
    cup of coffee to read.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 除了长时间的散步，我还喜欢坐在一个私密、安静的地方，喝上一杯好咖啡来阅读。
- en: One day I hope to have a room in my house specifically for reading. Nothing
    but books will be allowed inside of there.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望有一天我能在我的房子里有一个专门用于阅读的房间。里面只能放书。
- en: For now, I sit on my patio.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我坐在我的露台上。
- en: Part 4) Writing Isn’t Just For Writers
  id: totrans-229
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第四部分）写作不仅仅是作家的专利
- en: <picture loading="lazy" decoding="async" class="wp-image-2139">![](../Images/2b89b54bd9f857b3d8898346e8c6b070.png)</picture>
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-2139">![](../Images/2b89b54bd9f857b3d8898346e8c6b070.png)</picture>
- en: Writing = organized thinking.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 写作 = 有序思考。
- en: Organized thinking = effective communication.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 有序思考 = 有效沟通。
- en: Communication = how to get what you want out of life.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 沟通 = 如何从生活中得到你想要的东西。
- en: Reading will only take you so far.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 阅读只能带你走这么远。
- en: We’ve all met that person who has all of the ideas but hasn’t built anything
    worth following, using, or benefitting from.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都遇到过那种有很多想法但并没有创造出值得追随、使用或从中受益的东西的人。
- en: Why are you reading?
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 你为什么在阅读？
- en: Why have you made it this far in the letter?
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 你为什么会在信中走这么远？
- en: For some, it’s about status. You want to say you’ve read a lot so you can seem
    like you’re doing something with your life to impress others.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一些人来说，这关乎地位。你想要说你读了很多书，这样你就可以显得你在生活中有所作为，以给他人留下深刻印象。
- en: That’s fine, but if you haven’t *created* anything that benefits humanity, the
    pursuit of status will leave you hollow.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 没关系，但如果你没有*创造*出对人类有益的东西，追求地位只会让你感到空虚。
- en: You don’t need to identify as a writer to start writing.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要自认为是作家就可以开始写作。
- en: You, as a human, *are* a creator. You build tools and solutions from the knowledge
    you acquire to survive and evolve. Quite different from animals.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 你，作为一个人类，*就是*一个创造者。你从获得的知识中构建工具和解决方案来生存和进化。这与动物截然不同。
- en: You already write every day. It’s inherent to the human experience. Writing
    is how we as a species survive. We carved into rocks and wrote on papyrus to immortalize
    information that others can use to make progress faster and avoid dangers. No
    other species has done that. The ability to write is your edge.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 你每天都在写作。这是人类经验的一部分。写作是我们这个物种生存的方式。我们刻在岩石上，写在莎草纸上，以使信息永存，其他人可以使用这些信息更快地进步并避免危险。没有其他物种做过这样的事情。写作的能力是你的优势。
- en: You already write emails, texts, and notes to keep your mind from going insane
    with the abundance of information that comes along with technological progress.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经每天都在写电子邮件、短信和笔记，以防止你的大脑因为科技进步带来的信息过载而变得疯狂。
- en: Thanks to the internet, anyone can now write at scale, build an audience, and
    make a living with whatever skills or interests they cultivate that their audience
    can benefit from.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了互联网，现在任何人都可以大规模地写作，建立受众，并利用他们培养的、受众可以从中受益的任何技能或兴趣来谋生。
- en: Where To Write
  id: totrans-245
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 写作地点
- en: When I was a kid, I always imagined writing a book.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 当我还是个孩子的时候，我总是想象着写一本书。
- en: 'Then, I forgot about it for 10 years so that I could survive knowing the only
    path I was told: go to school, get a job, and retire. That didn’t sit well with
    me, but it was the only thing I knew.'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我把它忘了10年，这样我就可以知道唯一的道路：上学，找工作，退休。这让我感到不舒服，但这是我唯一知道的事情。
- en: Many people tell me they want to write a book, or they simply have dreams of
    doing something outside of society’s conventional and planned path for you.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人告诉我他们想要写一本书，或者他们只是简单地梦想着做一些超出社会对你常规和计划路径的事情。
- en: The problem is that most of them have these dreams, but they think it just happens
    the moment they decide to do it. Okay, maybe they don’t think that, but they act
    like it.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 问题在于，他们中的大多数都有这些梦想，但他们认为这一切都会在决定去做的那一刻发生。好吧，也许他们不是这样想的，但他们的行为就像是这样。
- en: They don’t realize that to write a book, you need a plethora of ideas to work
    with.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 他们没有意识到写一本书，你需要大量的想法来工作。
- en: They don’t realize that to do your own thing, you need people who are willing
    to pay you for it.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 他们没有意识到，要自己做事，你需要愿意为此付费的人。
- en: Both require you to sit at your keyboard and type words in a specific sequence
    to reach that result.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 这两者都需要你坐在键盘前，按特定的顺序输入文字以达到那个结果。
- en: For most people, the most affordable and accessible route to do this – thanks
    to technology as this is only possible at this point in evolution – is on social
    media.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大多数人来说，最经济实惠且易于获取的途径——多亏了技术，因为在这个进化阶段，这仅是可能的——是在社交媒体上。
- en: You write short posts and threads to attract an audience.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 你写短篇帖子或帖子串来吸引观众。
- en: Then, you start writing longer newsletters to nurture that audience.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你开始写更长的通讯来培养这个观众。
- en: Before you know it, you have thousands of posts and hundreds of newsletters
    that *turn into* a book or a loyal audience that loves what you do.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 不知不觉中，你已经有了数千篇帖子以及数百份通讯，它们*变成了*一本书或一个热爱你所做事情的核心观众。
- en: So, you start making progress toward your dreams by writing on social media.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你通过在社交媒体上写作开始朝着你的梦想迈进。
- en: It’s not the only path, but it’s one everyone – yes, everyone – can do.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是唯一的途径，但这是每个人——是的，每个人——都可以做到的。
- en: Social media gave the human species immense power, but they confused that for
    entertainment, pleasure, and distraction.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体赋予了人类巨大的力量，但他们却把它误认为是娱乐、快乐和分心的来源。
- en: What To Write About
  id: totrans-260
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 写什么内容
- en: You don’t need to pick a niche.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要选择一个细分市场。
- en: '[You are the niche.](https://thedankoe.com/letters/the-most-profitable-niche-is-you-how-to-create-your-niche/)'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: '[你就是你的细分市场。](https://thedankoe.com/letters/the-most-profitable-niche-is-you-how-to-create-your-niche/)'
- en: Your unique goals in life frame how you interpret and notice information around
    you.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 你在生活中独特的目标决定了你如何解释和注意到你周围的信息。
- en: When you read, you notice a completely different set of ideas than another person
    who reads the same book.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 当你阅读时，你会注意到与阅读同一本书的另一个人完全不同的一组想法。
- en: Your mind automatically tells you which ideas are important for your future.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 你的大脑会自动告诉你哪些想法对你的未来很重要。
- en: So, you write about ideas that help you achieve your goals.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，你写关于帮助你实现目标的想法。
- en: You write about your goals and how you are achieving them so you attract people
    with those same goals. That’s your niche. People who want to improve.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 你写关于你的目标和你是如何实现它们的，这样你就吸引了有相同目标的人。那就是你的细分市场。那些想要改进的人。
- en: That combination alone makes you unique.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 仅这一组合就使你独一无二。
- en: Stop focusing on your target audience or what niche to go into.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 停止专注于你的目标受众或要进入的细分市场。
- en: Start focusing on the essence of both of those.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 开始关注这两者的本质。
- en: You are trying to attract people you can help.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 你试图吸引你可以帮助的人。
- en: You can help people who have the same goals as you.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以帮助与你目标相同的人。
- en: You write about the ideas, opinions, and advice that give people the firepower
    to achieve the goals.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 你写关于那些给人们提供实现目标动力的想法、观点和建议。
- en: Then, if you want to sell a product or service as I teach in [Digital Economics](https://digitaleconomics.school),
    you have an audience that wants it from you, and they will probably tell you to
    create one by that point.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，如果你想像我在[数字经济学](https://digitaleconomics.school)中教授的那样销售产品或服务，你有一个想要从你这里得到它的观众，他们可能会在那个阶段告诉你创建一个。
- en: How To Write
  id: totrans-275
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何写作
- en: Naval treats Twitter as his note-taking platform.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: Naval把Twitter当作他的笔记平台。
- en: He reads a book, finds an idea, and shares it *from his own perspective* with
    his audience.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 他读一本书，找到一个想法，并从自己的角度与他的观众分享。
- en: He finds the idea impactful, so he’s sharing it with the world and allows others
    who find it impactful to follow him.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 他觉得这个想法有影响力，所以他把这个想法分享给全世界，并允许其他觉得它有影响力的人跟随他。
- en: It can be that simple.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以很简单。
- en: Hunt for ideas, share ideas.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 寻找想法，分享想法。
- en: A beautiful flow of information that benefits both yourself and others.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 一股美丽的信息流，既对你自己也有益于他人。
- en: Aside from that, impactful writing is about behavior change.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 除了这些，有影响力的写作关乎行为改变。
- en: Your job is to write arguments that persuade, not force or deceive, people to
    make better decisions. That’s how you contribute to humanity.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 你的工作是写说服人的论点，而不是强迫或欺骗人们做出更好的决定。这就是你为人类做出贡献的方式。
- en: The best way to think of this is writing to yourself.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的方式是将写作视为写给自己。
- en: All of my posts and newsletters are to me.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 我的所有帖子和新letter都是针对我自己的。
- en: My profile is my public journal.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 我的个人资料是我的公开日记。
- en: I convince myself to make better decisions (like to read more) so those ideas
    get enforced as a part of my identity. A better, more holistic identity.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 我说服自己做出更好的决定（比如多读书），这样那些想法就会成为我身份的一部分。一个更好、更全面的身份。
- en: If you get stuck writing about shallow and myopic topics like getting laid or
    making a quick buck and never thinking beyond that, you will become that… shallow
    and myopic. I’m not saying don’t write about these things, I’m saying cultivate
    a philosophy of depth and meaning behind them through education and experience.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你陷入写作关于肤浅和狭隘的话题，比如找女人或快速赚钱，并且从不考虑其他事情，你将变成那样……肤浅和狭隘。我并不是说不要写这些事情，我是说通过教育和经验培养一种深度和意义的哲学。
- en: Write to your past self and encourage them to improve. Show them how.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 给你的过去自己写信，并鼓励他们改进。向他们展示如何做。
- en: Write to your present self and program them to do better.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 给你的现在自己写信，并编程让他们做得更好。
- en: Write *as* your future self and give your current self advice.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 以你未来的自己来写作，并给你的现在自己提供建议。
- en: When you read, take note of ideas that stick out to you. Take note of “aha!”
    moments. Take note of actionable advice you can experiment with and make your
    own.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 当你阅读时，注意那些让你印象深刻的思想。注意“啊哈！”时刻。注意你可以实验并使之成为你自己的可操作建议。
- en: And remember, you aren’t only sharing ideas you get from books.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 并且记住，你不仅是在分享从书中获得的思想。
- en: Often, you use those ideas to achieve your goals and share the mindset and skill
    set that helped you achieve them.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，你用这些想法来实现你的目标，并分享那些帮助你实现这些目标的心态和技能集。
- en: Writing doesn’t have to be complicated. You don’t need my [2 Hour Writer](https://2hourwriter.com)
    course to engage in the process of trial and error.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 写作不必复杂。你不需要我的[2小时作家](https://2hourwriter.com)课程来参与试错的过程。
- en: If you do want education and templates to make that process faster, then sure,
    pick it up. I’m kind of obligated to promote it at this point. We’re talking about
    writing after all.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你确实想要教育和模板来加速这个过程，那么当然，选择它。在这个时候，我有点义务去推广它。毕竟，我们是在谈论写作。
- en: But, writing can just be writing.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，写作也可以仅仅是写作。
- en: You already do it.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经这样做了。
- en: Just start doing it in a way that leads to leverage and a better future.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 只要坚持这样做，就能带来杠杆作用和更美好的未来。
- en: Thank you for reading.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您的阅读。
- en: – Dan
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
