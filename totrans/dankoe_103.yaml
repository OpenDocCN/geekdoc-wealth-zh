- en: How I Unlock Insane Focus On Demand (The 4 Hour Framework)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/my-1-million-productivity-framework-the-4-hour-workday/](https://thedankoe.com/letters/my-1-million-productivity-framework-the-4-hour-workday/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Block out 1 hour a day.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: Work on 1 meaningful project.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Aim for 1 vision for your future.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Take it 1 day at a time.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need more motivation, you need more clarity.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need more time, you need more focus.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: This letter will teach you to unlock insane focus on command.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: Most people think they need to work like a millionaire to achieve their goals.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: But most people don’t understand how most millionaires work.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: 'Two examples:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: The first, Sam Altman from OpenAI
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1805">![](../Images/0569bc163f26e48cf26c94807f491efc.png)</picture>
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: 'Second, Tej Dosa. A low-key copywriter who writes great X content:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1806">![](../Images/138bc09c01ece337edff00ec72f26b01.png)</picture>
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: Third, myself.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: So no, you don’t need any more time *than you already have.*
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: '*Everyone starts somewhere. People don’t start with a fake millionaire routine.
    They start with what they have.*'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: Aside from building new projects, *I’ve rarely worked more than 4 hours a day.*
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: Especially when I was starting out and had other responsibilities.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: I had 1-2 hours a day and a bit more on my days off.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: The entrepreneurs who work more make that choice, often at their own psychological
    expense.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: Productivity is like fitness and you wouldn’t train 8 hours a day with no food
    or sleep and expect to make progress.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: 'There are 2 types of work:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: '**Building** – when you are building the foundation of something new. Like
    a product, service, or brand. **This requires a lot of upfront work.**'
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Maintenance** – when you are fueling the foundation you’ve built with a streamline
    productivity system. Like writing content, marketing yourself, building an audience,
    or fulfilling on your product or service. **This requires 1-4 hours a day depending
    on your skill level or *choice* of work.**'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: People trying to change their life or quit their job often get discouraged at
    the amount of work it takes to *build.*
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: They can’t zoom out and realize that once it’s built, your work decreases drastically.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: Focus compounds.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: You become better at what you do with time.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: Like learning to walk, it’s difficult at first. It takes more time to walk from
    where you are to where you want to be.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: But as you try, fail, and let your self-corrective mind rewire new neural pathways
    you can walk there as fast as you want… or just sprint.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: If you want my complete philosophy for focused living, grab my book [The Art
    Of Focus](https://theartoffocusbook.com).
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: Focused work is only one part of changing your life.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: Your Mind Is A Supercomputer Running The Game Of Life
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Your mind is a supercomputer.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: Your attention is the RAM.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: Thoughts, regrets, and tasks are the programs slowing your performance.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: Writing, mindfulness, and focus are the reboot you can access at any time.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 写作、正念和专注是你可以随时访问的重启方式。
- en: RAM — or “random access memory” — is one of the most important parts of a computer,
    it determines performance.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: RAM —— 或“随机访问内存”——是计算机最重要的部分之一，它决定了性能。
- en: The more RAM you use up with different programs running, open browser tabs,
    and the performance requirements of what you have running, the slower your performance
    will be.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 当你使用不同的程序、打开的浏览器标签以及运行中的性能要求时，你使用的RAM越多，你的性能就会越慢。
- en: This is no different from your focus, what you hold in your conscious attention.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这与你的专注力，你意识中的注意力所持有的东西没有不同。
- en: Humans can process 50 bits of information per second. That adds up to 125 billion
    bits of information in your lifetime.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 人类每秒可以处理50比特的信息。这加起来就是你一生中1250亿比特的信息。
- en: Most people live with multiple high-demand programs running that are draining
    the limited creative energy they have.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人同时运行多个高需求程序，消耗着他们有限的创造性能量。
- en: Thoughts about regretful past mistakes
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对过去错误行为的悔恨
- en: Thoughts about stressful future happenings
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对未来压力事件的思考
- en: Desires of hunger and entertainment to escape those thoughts
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 饥饿和娱乐的欲望，以逃避这些想法
- en: An internal cry to break out of their conditioned way of living
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内心的呼声，想要打破他们习惯的生活方式
- en: A list of mixed-priority tasks that need to be finished
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一份需要完成的混合优先级任务列表
- en: Open loops of tasks they were supposed to complete but forgot about
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们本应完成但忘记的任务的开放循环
- en: The list goes on and on.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 列表就这样一直继续下去。
- en: The modern mind has its attention split in infinite directions by default.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现代心灵默认会将注意力分散到无限的方向。
- en: We go about our lives stressed and near sickness. Rather than living in the
    present with singular focus and a worry-free mind, we are the opposite. Living
    in a false reality created by split attention.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们生活在压力和接近疾病的状态中。我们不是生活在当下的单一关注和无忧无虑的心态中，而是相反。生活在由分散的注意力创造的虚假现实中。
- en: When we hold too much of the past or future in the contents of our consciousness,
    chaos ensues. The mind tends toward disorder. If not kept in check, we lose the
    sense of control over our lives that leads to enjoyment. This is accomplished
    through controlled consciousness.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们意识中包含太多的过去或未来时，就会产生混乱。心灵趋向无序。如果我们不加以控制，我们就会失去对生活的控制感，这会导致快乐。这是通过有控制的意识实现的。
- en: 'Psychic Entropy: The Danger Of Distractions'
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 心理熵：分心的危险
- en: <picture decoding="async" class="wp-image-1807">![](../Images/5b63633caf96a252188625fa4840e597.png)</picture>
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-1807">![](../Images/5b63633caf96a252188625fa4840e597.png)</picture>
- en: '*Entropy is the supreme law of the Universe.*'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '*熵是宇宙的最高法则。*'
- en: Without getting too complicated, if you don’t attempt to maintain order in a
    system by putting energy into solving problems, that system will decline into
    chaos.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不通过投入能量去解决问题来维持系统的秩序，那么这个系统就会陷入混乱。
- en: If you don’t put effort into maintaining your bookshelf, books will end up all
    over your house, at your friend’s house, and small-scale chaos will ensue.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不对你的书架进行维护，书籍最终会散落在你的房子里、你的朋友家里，并引发小规模的混乱。
- en: If you don’t put effort into the system of cleaning your room, it will slowly
    get dirtier and dirtier until you live in a disgusting nest of filth.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不对整理房间的系统投入努力，它就会慢慢地变得越来越脏，直到你生活在令人厌恶的污垢巢穴中。
- en: This is the state of most people’s minds.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是大多数人的心理状态。
- en: '*A disgusting nest of filth.*'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '*一个令人厌恶的污垢巢穴。*'
- en: Psychic entropy is the natural process of your psyche (or mind) tending toward
    chaos and disorder.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 心理熵是心理（或心灵）自然趋向混乱和无序的过程。
- en: You aren’t productive because you don’t have clarity.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 你不 productive，因为你没有清晰度。
- en: You aren’t productive because you focus on one distraction, don’t correct yourself,
    and slowly become overwhelmed by the chaos in your mind.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 你不 productive，因为你专注于一个分心的事物，不纠正自己，慢慢地被你心中的混乱所淹没。
- en: Distractions are the problems in your productivity system that must be solved
    if you want to unlock laser focus.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 分心是你生产力系统中必须解决的问题，如果你想解锁激光般的专注力。
- en: 'There are 2 ways to identify distractions and correct yourself:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 有两种方法可以识别分心并纠正自己：
- en: '**Boredom and anxiety.**'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**无聊和焦虑。**'
- en: <picture loading="lazy" decoding="async" class="wp-image-889">![](../Images/54b7637af6648b2b93f2bd5248e3d364.png)</picture>
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-889">![](../Images/54b7637af6648b2b93f2bd5248e3d364.png)</picture>
- en: If the challenge of the task you are completing is too low for your skill level,
    you will get bored.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在完成的任务的挑战性低于你的技能水平，你会感到无聊。
- en: If the challenge of the task you are completing is too high for your skill level,
    you will get anxious.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在完成的任务的挑战性高于你的技能水平，你会感到焦虑。
- en: The **boredom** stems from self-centeredness.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**无聊**源于自我中心。'
- en: Your focus breaks, a new desire pops into your head, and related thoughts start
    to fill your attention.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 你的注意力被打断，一个新的欲望出现在你的脑海中，相关的想法开始占据你的注意力。
- en: If you are bored of the task, you will start thinking of better things you could
    be doing.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你厌倦了这项任务，你会开始想些更好的事情可以做。
- en: The **anxiety** stems from self-consciousness.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**焦虑**源于自我意识。'
- en: Your focus turns inward and negative thoughts flood your mind about how you
    aren’t good enough.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 你的注意力转向内部，消极的思想涌入你的脑海，关于你不够好的想法。
- en: If you look in the mirror and spot a pimple, that is going to be on your mind
    for the rest of the day. It will impact every other area of your life.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你照镜子看到一颗痘痘，那将是你一整天都在想的事情。它会影响你生活的其他方面。
- en: The RAM of your mental supercomputer will be consumed by rogue programs until
    your performance suffers as a whole.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 你的心理超级计算机的RAM将被流氓程序消耗，直到你的整体表现受到影响。
- en: The chaos induced by boredom or anxiety can only be cured with clarity.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 由无聊或焦虑引起的混乱只能通过清晰来解决。
- en: You must refocus your mind not only on the task in front of you, but on the
    ideal outcome of your life as a whole.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须重新集中你的注意力，不仅关注眼前的任务，还要关注你生活的整体理想结果。
- en: When you have the skill and knowledge that matches the challenge of a task,
    life becomes a video game of quests that you love to play.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 当你拥有与任务挑战相匹配的技能和知识时，生活就变成了你喜欢的游戏任务。
- en: The 4-Hour Workday – Creating Your Productivity System
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 四小时工作制——创建你的生产力系统
- en: Humans find meaning in stories.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 人类在故事中找到意义。
- en: Humans love playing games.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 人类喜欢玩游戏。
- en: Why?
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: Because they present a clear hierarchy of goals that our mind can adopt as an
    indistractable frame.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 因为它们提供了一个清晰的目标层次结构，我们的心灵可以将其作为不可分散的框架来接受。
- en: They follow the curiosity > intensity > consistency cycle of the Universe.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 他们遵循宇宙的“好奇 > 强度 > 一致性”循环。
- en: First you’re lost. Then you’re curious. Then you’re obsessed. Then it’s a consistent
    part of your life with little extra effort.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你会感到迷茫。然后，你会感到好奇。然后，你会着迷。然后，它就成为了你生活中一个不需要额外努力就持续存在的部分。
- en: Most people get lost, focus on distractions, and never put effort into a goal
    (even if they don’t see the meaning in it yet) to reverse the hole they’re digging
    themselves into.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人会迷失方向，专注于干扰，从未努力去实现一个目标（即使他们还没有看到其中的意义），从而无法扭转他们自己挖的坑。
- en: Understand that nothing is perfect.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 理解到没有什么完美无缺。
- en: Like a story, you will experience lows, but those are what allow the highs to
    exist. Success doesn’t exist without failure.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 就像故事一样，你会经历低谷，但正是这些低谷让高峰存在。成功没有失败是不存在的。
- en: Like a video game, you will have to progress from beginner to advanced by completing
    a series of quests to level up. It will take time.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 就像一款视频游戏，你需要通过完成一系列任务来从新手升级到高级。这需要时间。
- en: If you want maximum enjoyment and focus in your work, these guidelines will
    help you create a hierarchy of goals for your productivity system.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想在工作中获得最大的乐趣和专注，这些指南将帮助你为你的生产力系统创建一个目标层次结构。
- en: The longer you stick with it, the more potent it becomes.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 你坚持的时间越长，它就越有效。
- en: Identity – Solving Productive Problems
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 身份——解决生产力问题
- en: Ever since I can remember, I’ve always had the goal of working 4 hours a day.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 从我能记事起，我总是有每天工作4小时的目标。
- en: A 9-5 job was the bane of my existence.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 朝九晚五的工作是我存在的噩梦。
- en: I observed society and realized the life I didn’t want
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我观察了社会，并意识到我不想要的生活。
- en: I observed the successful and realized the life I did want
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我观察了成功的人，并意识到我想要的生活。
- en: Over time, this perspective shaped my identity.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，这个视角塑造了我的身份。
- en: I was attached to that desire.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 我对那个欲望产生了依恋。
- en: Most people tell you desire is bad, but in my eyes, it’s only bad if the desire
    is bad.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人告诉你欲望是坏的，但在我眼里，只有当欲望本身是坏的时候，它才是坏的。
- en: Your goals are the axis of your suffering, and you get to choose what you suffer
    for.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 你的目标是痛苦的轴心，你可以选择为了什么而痛苦。
- en: Perspective is everything.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 视角是一切。
- en: It allows you to identify problems and opportunities that (when solved) result
    in achieving the goal of that perspective.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 它让你能够识别问题和机会，当这些问题得到解决时，将有助于实现这一视角的目标。
- en: It was an automatic decision to get to where I am today.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: Anything that threatened my 4-hour workday was noted as a problem.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: I was able to spot opportunities like social media, digital products, and audience
    building to solve those problems.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: Most people have an identity and perspective shaped by society, with the goals
    of society, so they never identify and solve problems that lead to abnormal results.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: Project – Building Out Your Potential
  id: totrans-110
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Your identity is shaped by your vision for the future.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: Your vision is the all-encompassing goal you are pursuing in your life. It is
    at the top of your hierarchy. Everything falls under it.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: Now, you need a project that will move the needle toward that future.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: You need something to *build* that will expose you to problems you must solve.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: You need clarity for your work so you have something to anchor your attention.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: And if you read the [last letter](https://thedankoe.com/letters/i-discovered-a-way-to-learn-10x-faster-reality-metabolism-universal-thinking/),
    you understand that building a project is the best way to learn new knowledge
    and skills.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: '**Create an outline** – braindump everything you *know* that should be built
    in the project. You will add to this outline as you build.'
  id: totrans-117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Create milestones** – break the project down into manageable goals you can
    achieve in 1-4 hour work sessions depending on your current responsibilities.'
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: What should your project be?
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: I can’t tell you that.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: But it should probably be a business as that’s the vessel for your purpose.
    It is the catalyst for the good life that breaks you out of robotic living. Entrepreneurship
    is modern survival, and your psyche is wired to hunt. You aren’t meant to be a
    monkey in a cubicle.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: Along with that, your health and relationships are important projects that enhance
    your business results.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: Deadlines – The Procrastinators Edge
  id: totrans-123
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You aren’t productive because you aren’t public.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: Another point for building an internet business on social media. The flow-state
    requirement of challenges and deadlines is baked in.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: When I set a launch date for a product and accept pre-orders, once the first
    person pays, I *have* to build the product before the deadline.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: It doesn’t matter how good or bad it is.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: I can improve it after the fact that it’s actually out and I did something with
    my life.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: 'Another thing:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: Procrastination isn’t bad. It’s human nature.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: Most successful entrepreneurs are lazy.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: They wait until the last minute to get work done.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: But during that last minute, they enter the most enjoyable season of their lives.
    Their mind becomes a magnet for ideas. Their best work happens in these periods
    of obsession and intensity.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: They don’t have a choice, their survival is at stake.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: Timeblocks & Breaks – Managing Your Focus
  id: totrans-135
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Focus is a muscle, and success is reserved for those who train it. – The Art
    Of Focus
  id: totrans-136
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Identity, projects, and deadlines narrow your attention.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: Timeblocks take that one step further, making it easy to get into flow.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: Set a timer for 45-90 minutes.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: Focus with intensity.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 以强烈的专注力工作。
- en: Then, take a break.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，休息一下。
- en: Go on a walk. Eat. Watch some YouTube. Play a video game. I don’t care what
    you do.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 去散步。吃饭。看看YouTube。玩个视频游戏。我不在乎你做什么。
- en: Your focus is finite. You need to take rest between your sets.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 你的注意力是有限的。你需要在你的一组之间休息。
- en: Personally, I [write for two 60 minute time blocks](https://2hourwriter.com).
    That is what builds my entire business.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 个人来说，我[在两个60分钟的时间块里写作](https://2hourwriter.com)。这就是构建我整个业务的方式。
- en: Leverage – Doing The Right Things
  id: totrans-145
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 利用——做正确的事情
- en: 'I’m going to save you a lot of pain:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 我要为你节省很多痛苦：
- en: Choose a career that allows for a 4-hour workday.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个允许4小时工作日的工作。
- en: Start a [one-person business](https://thedankoe.com/letters/the-one-person-business-model-how-to-monetize-yourself/).
    Become a [value creator](https://university.kortex.co). Use the internet to do
    what you love.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 开始一个[单人企业](https://thedankoe.com/letters/the-one-person-business-model-how-to-monetize-yourself/)。成为一个[价值创造者](https://university.kortex.co)。利用互联网做你热爱的事情。
- en: Learn the skills that allow for this.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 学习实现这一点的技能。
- en: Evolution is the process of solving problems that reverse entropy.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 进化是解决逆转熵的问题的过程。
- en: Labor work and long work days are a massive problem. People hate it. So, social
    media, the internet, and artificial intelligence were born.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 劳动工作以及漫长的工作日是一个巨大的问题。人们都讨厌它。因此，社交媒体、互联网和人工智能应运而生。
- en: AI will solve the problem of overwork. Potentially in this lifetime (especially
    if we solve the problem of aging).
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能将解决过度工作的问题。可能在本生（尤其是如果我们解决了衰老问题）。
- en: Now, your work sessions for the day should consist of 3-9 lever-moving tasks
    that build out your project.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你一天的工作应该包括3-9个推动项目发展的关键任务。
- en: Some people can handle more, some less. I help you structure this in [the FOCI
    planner.](https://thedankoe.store/products/the-foci-planner)
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人能处理更多，有些人则较少。我在[FOCI计划者](https://thedankoe.store/products/the-foci-planner)中帮助你构建这一点。
- en: Routine – Becoming Efficient
  id: totrans-155
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 日常——变得高效
- en: You have a routine.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 你有一个日常。
- en: Even if your routine is “no routine.”
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 即使你的日常是“没有日常”。
- en: We discuss this in [The Daily Routine That Changed My Life](https://thedankoe.com/letters/the-daily-routine-that-changed-my-life-4-focus-habits/).
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在[改变我生活的日常](https://thedankoe.com/letters/the-daily-routine-that-changed-my-life-4-focus-habits/)中讨论了这一点。
- en: Routines are how you condition your mind to run on new systems.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 日常是你如何训练你的大脑在新系统上运行的方式。
- en: If you want to solidify a new identity, you must start, refine, and stick to
    a routine.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要巩固一个新的身份，你必须开始、完善并坚持一个日常。
- en: For the first month, building your project will feel uncomfortable.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一个月，构建你的项目会感觉不舒服。
- en: You’re supposed to feel overwhelmed. It means your mind is expanding into a
    new identity.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该感到不知所措。这意味着你的思想正在扩展到一个新的身份。
- en: Slowly, then all at once, everything flows with ease.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 慢慢地，然后突然，一切都会顺畅地流动。
- en: You begin making exponential progress.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 你开始取得指数级的进步。
- en: You move from intensity to consistency and let the results compound.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 你从强度过渡到一致性，并让结果累积。
- en: Rest – The Secret Of The Greats
  id: totrans-166
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 休息——伟大的秘密
- en: '*“The clever man may work smarter, not harder, they say, but the creative man
    doesn’t work at all.” — Alex Soojung-Kim Pang*'
  id: totrans-167
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“聪明人可能工作得更聪明，而不是更努力，”他们说，但创造者根本不工作。”——亚历克斯·苏桑-金·潘*'
- en: I’ve always had some form of aversion toward Western work culture.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直对西方的工作文化有一种厌恶。
- en: 80-hour work weeks.
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 80小时的工作周。
- en: High-pressure environments.
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高压环境。
- en: Little time for rest and recovery.
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 很少有时间休息和恢复。
- en: It never seemed “right” to me.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 这对我来说从来都不“正确”。
- en: Why would I want to waste my entire day, knowing that 2-3 hours in my work quality
    would suffer?
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我想浪费我整个一天，知道我的工作质量在2-3小时内会受到影响？
- en: This has been a talking point for a long time now. I believe it has started
    to shape the creator economy and remote work.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 这已经是一个讨论了很长时间的话题。我相信它已经开始塑造创作者经济和远程工作。
- en: Ancient Romans, Ancient Greeks, Steve Jobs, Charles Darwin, and an infinite
    list of visionaries, strategists, and innovators attributed their success to surprisingly
    low “work” times.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 古罗马人、古希腊人、史蒂夫·乔布斯、查尔斯·达尔文以及无数有远见、策略家和创新者都将他们的成功归因于出奇低的“工作时间”。
- en: Writers from multiple domains, like Hemingway and Tarantino, would spend the
    majority of their days lounging by the pool, spitting game with girls, and doing
    everything aside from what they deemed “work.”
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 来自多个领域的作家，如海明威和塔伦蒂诺，他们的大部分时间都在游泳池边闲逛，和女孩们闲聊，做除了他们认为的“工作”之外的所有事情。
- en: Work for 1-4 hours.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 工作1-4小时。
- en: Then, stop.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，停下来。
- en: This is arguably the most difficult part of your day.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以说是你一天中最困难的部分。
- en: At the end of my work sessions I go to the gym as a “transition” into rest.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的工作时段结束后，我去健身房作为一种“过渡”到休息的方式。
- en: This allows the Default Mode Network to kick in. My subconscious begins to munch
    on problems related to the work.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得默认模式网络开始工作。我的潜意识开始咀嚼与工作相关的问题。
- en: When I get back to my morning focused work, I have the rest and creative resources
    needed to make those 4 hours more potent than those fatiguing their mental muscle
    beyond belief.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 当我回到早晨专注的工作时，我拥有了休息和创造所需的资源，使这4个小时比那些让他们的精神肌肉疲惫不堪的时间更有力量。
- en: I hope you enjoyed this letter my friends.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望你们喜欢这封信，我的朋友们。
- en: Dan
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 丹
