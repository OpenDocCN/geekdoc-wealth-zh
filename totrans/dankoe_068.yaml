- en: The Wisdom In Feeling Lost (How To Get Out Of A Rut)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-wisdom-in-feeling-lost-how-to-get-out-of-a-rut/](https://thedankoe.com/letters/the-wisdom-in-feeling-lost-how-to-get-out-of-a-rut/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: These letters are always the hardest to write.
  prefs: []
  type: TYPE_NORMAL
- en: There will be little practical advice.
  prefs: []
  type: TYPE_NORMAL
- en: Most of it will be abstract, big-picture thinking.
  prefs: []
  type: TYPE_NORMAL
- en: I hope it can help you gain perspective on the situation you are in.
  prefs: []
  type: TYPE_NORMAL
- en: I love observing patterns in my own life.
  prefs: []
  type: TYPE_NORMAL
- en: They shine light on what I perceived as a difficult situation while it was happening.
  prefs: []
  type: TYPE_NORMAL
- en: There’s been a meta pattern that I’ve noticed over the past few years, and I’m
    going through it right now.
  prefs: []
  type: TYPE_NORMAL
- en: 'It goes something like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '**The Clarity Phase**'
  prefs: []
  type: TYPE_NORMAL
- en: Insight strikes and a purpose reveals itself. A vision that I can start to work
    towards. I have the skills to make it work, all that’s left is for me to accept
    the challenge.
  prefs: []
  type: TYPE_NORMAL
- en: '**The Intensity Phase**'
  prefs: []
  type: TYPE_NORMAL
- en: Pure progress is being made. Flow state is almost permanent. The skill set I’ve
    acquired is laying the foundation for my business, relationships, level of mind,
    and quality of life.
  prefs: []
  type: TYPE_NORMAL
- en: '**The Consistency Phase**'
  prefs: []
  type: TYPE_NORMAL
- en: I felt pressure to sustain the progress that I had made. This required systemization,
    prioritization, and sacrifice. It felt like a gradual decline into chaos because
    massive progress was not being made.
  prefs: []
  type: TYPE_NORMAL
- en: '**The Lost Phase**'
  prefs: []
  type: TYPE_NORMAL
- en: I actualized the purpose I had set out for in the clarity phase. My mind filled
    with doubts about the future. A highly mental and spiritual phase that a majority
    of people get stuck in if they don’t learn how to navigate the dark.
  prefs: []
  type: TYPE_NORMAL
- en: With the book finished, I’m in the lost phase. I have some idea where to go
    next, but nothing sticks out as “the one.”
  prefs: []
  type: TYPE_NORMAL
- en: These phases of feeling lost used to be more destructive, but I’ve learned to
    be at peace with them. I hope you can learn to do the same as we dig deeper in
    this letter.
  prefs: []
  type: TYPE_NORMAL
- en: 'These phases encapsulate a few principles that will be necessary to understand:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Novel Emergence**'
  prefs: []
  type: TYPE_NORMAL
- en: After every battle, on any plane of existence, something new emerges.
  prefs: []
  type: TYPE_NORMAL
- en: Atomic nuclei emerges when a star explodes.
  prefs: []
  type: TYPE_NORMAL
- en: Medical advancements emerge after a world war.
  prefs: []
  type: TYPE_NORMAL
- en: Vision for your future emerges after deep internal struggle.
  prefs: []
  type: TYPE_NORMAL
- en: From above to below, this phenomenon reflects on all planes. Cosmic, worldly,
    cultural, social, personal, mind, body, business, and everything in between.
  prefs: []
  type: TYPE_NORMAL
- en: Struggle is a necessary aspect of life.
  prefs: []
  type: TYPE_NORMAL
- en: Without it, progress would not be made.
  prefs: []
  type: TYPE_NORMAL
- en: '**Impermanence & Entropy**'
  prefs: []
  type: TYPE_NORMAL
- en: Nothing lasts forever.
  prefs: []
  type: TYPE_NORMAL
- en: Creation demands destruction.
  prefs: []
  type: TYPE_NORMAL
- en: Every single phase of your life will not last. And the more you attempt to make
    it permanent, the more mental backlash you will experience.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t fight with it, flow with it.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s dissect these phases and principles so you can learn to enjoy the lows,
    maximize the highs, and make more progress than you thought was possible.
  prefs: []
  type: TYPE_NORMAL
- en: The Book Of Life
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Uni-verse. One song. That is what you are smack in the middle of. – The Art
    Of Focus
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Life unfolds in chapters and phases.
  prefs: []
  type: TYPE_NORMAL
- en: Books, songs, stories, architecture, bodybuilding, life setup, relationships,
    mental health, and every other form of human creation reflect this pattern.
  prefs: []
  type: TYPE_NORMAL
- en: Being able to zoom out and see what is happening beyond the thoughts in your
    head can save you from a world of pain.
  prefs: []
  type: TYPE_NORMAL
- en: It’s helpful to know what part of this everlasting book you are in.
  prefs: []
  type: TYPE_NORMAL
- en: That way you can anticipate, prepare for, or cope with what is happening in
    your personal life.
  prefs: []
  type: TYPE_NORMAL
- en: For each chapter of a book there is a purpose, or goal, that must be actualized.
  prefs: []
  type: TYPE_NORMAL
- en: At the beginning of the chapter, you are acclimating to the environment you
    are in.
  prefs: []
  type: TYPE_NORMAL
- en: Maybe you moved to a new city and your routines are destroyed in an instant
    (even if you don’t like “routines” your mind does and forms them at every second
    of the day).
  prefs: []
  type: TYPE_NORMAL
- en: You no longer know what grocery store to shop at, what coffee shop to work at,
    or even just what the common cross roads are.
  prefs: []
  type: TYPE_NORMAL
- en: The same goes for starting a business, getting into a new relationship, or pursuing
    a new goal like fitness.
  prefs: []
  type: TYPE_NORMAL
- en: You launch yourself into an unknown environment until it becomes normalized
    with time.
  prefs: []
  type: TYPE_NORMAL
- en: From that place of decreased stress, you can begin to explore and generate clarity
    in alignment with the purpose of that chapter in your life.
  prefs: []
  type: TYPE_NORMAL
- en: In the middle of a chapter you have enough experience in that environment to
    make ample progress.
  prefs: []
  type: TYPE_NORMAL
- en: Everything feels smooth, you reach your “climax,” and achieve the goal you set
    out to achieve.
  prefs: []
  type: TYPE_NORMAL
- en: As the chapter nears it’s end, you begin to decline into a state of feeling
    lost.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t know what the next chapter holds.
  prefs: []
  type: TYPE_NORMAL
- en: The “lost” phase of life can create or destroy your future.
  prefs: []
  type: TYPE_NORMAL
- en: At One, Not War
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There is wisdom in feeling lost.
  prefs: []
  type: TYPE_NORMAL
- en: It means that there is potential to find your way.
  prefs: []
  type: TYPE_NORMAL
- en: But for most people, feeling lost becomes an eternal struggle.
  prefs: []
  type: TYPE_NORMAL
- en: They get consumed by the fog of thoughts, emotions, and low-level responsibilities
    that prevent them from seeing, or creating, a light at the end of the tunnel.
  prefs: []
  type: TYPE_NORMAL
- en: This is dangerous. Very dangerous.
  prefs: []
  type: TYPE_NORMAL
- en: If you only have access to a mental bubble of certain thoughts and solutions,
    you may never find your way out.
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, this is a common occurrence.
  prefs: []
  type: TYPE_NORMAL
- en: Stress is useful to add pressure to a situation and force you to move toward
    your goals.
  prefs: []
  type: TYPE_NORMAL
- en: 'The problem is this:'
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t create your own goals, they will be assigned to you.
  prefs: []
  type: TYPE_NORMAL
- en: That’s all society is.
  prefs: []
  type: TYPE_NORMAL
- en: A hierarchy of subjective goals with accompanying systems that have become more
    efficient with evolution.
  prefs: []
  type: TYPE_NORMAL
- en: By adopting the goals conditioned into your mind since birth, you commit to
    upholding the machine as a singular cog.
  prefs: []
  type: TYPE_NORMAL
- en: If the only direction in life you know is to go to school, get a job, and retire
    at an old age, your mind will be narrowed on the stressful tasks associated with
    that path.
  prefs: []
  type: TYPE_NORMAL
- en: To that individual, money is finite.
  prefs: []
  type: TYPE_NORMAL
- en: The thought of paying the bills every week sparks the same anxiety and conditions
    that experience into your sense of self.
  prefs: []
  type: TYPE_NORMAL
- en: Just by living, your quality of life is lower than it has to be.
  prefs: []
  type: TYPE_NORMAL
- en: At the end of each chapter in your life, you will inevitably be tossed into
    the unkown.
  prefs: []
  type: TYPE_NORMAL
- en: The stress will intensify.
  prefs: []
  type: TYPE_NORMAL
- en: When you leave school, what’s next?
  prefs: []
  type: TYPE_NORMAL
- en: When you break up with your partner, what’s next?
  prefs: []
  type: TYPE_NORMAL
- en: When your job becomes comfortable, do you stay in that spot?
  prefs: []
  type: TYPE_NORMAL
- en: That question, “What’s next?” can lead to a black hole of despair.
  prefs: []
  type: TYPE_NORMAL
- en: Or, it can be perceived as your chance to discover new potentials for your life.
  prefs: []
  type: TYPE_NORMAL
- en: Struggle is a Universal principle.
  prefs: []
  type: TYPE_NORMAL
- en: It isn’t only happening to you. Humans have been around for a long time. We
    understand psychology. Everyone goes through these phases.
  prefs: []
  type: TYPE_NORMAL
- en: What many don’t understand is that stress is the enemy of discovery.
  prefs: []
  type: TYPE_NORMAL
- en: When your attention is narrowed on stressful entities, your mind will not register
    potentials in its awareness.
  prefs: []
  type: TYPE_NORMAL
- en: Ideas cannot be collected and culminate into a vision.
  prefs: []
  type: TYPE_NORMAL
- en: You must embrace feeling lost.
  prefs: []
  type: TYPE_NORMAL
- en: Let go.
  prefs: []
  type: TYPE_NORMAL
- en: Surrender.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t fight with it, flow with it.
  prefs: []
  type: TYPE_NORMAL
- en: Be at one with it, not at war with it.
  prefs: []
  type: TYPE_NORMAL
- en: And make a conscious effort to expose yourself to experience.
  prefs: []
  type: TYPE_NORMAL
- en: Read a new book. Buy a new course. Meet new people. Have deeper conversations.
    Watch new content. Journal more. Write more. Hit the gym. Go on a hike. Swim in
    the environments and information that allow ideas to collect in your subconscious.
  prefs: []
  type: TYPE_NORMAL
- en: Almost everyone gets trapped in this phase.
  prefs: []
  type: TYPE_NORMAL
- en: That would explain the state of society.
  prefs: []
  type: TYPE_NORMAL
- en: You do have to have a sense of paranoia sitting in the back of your mind, like
    an animal in the jungle.
  prefs: []
  type: TYPE_NORMAL
- en: Stay cerebral.
  prefs: []
  type: TYPE_NORMAL
- en: You’re in the fog.
  prefs: []
  type: TYPE_NORMAL
- en: When a ladder rung swings by you, don’t miss it because you fear change.
  prefs: []
  type: TYPE_NORMAL
- en: The Intensity Threshold – Navigating The Unknown
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the cyclical story of life, there will be conflict.
  prefs: []
  type: TYPE_NORMAL
- en: It’s the most interesting part of the story in fact, but many people don’t see
    it that way in their personal life.
  prefs: []
  type: TYPE_NORMAL
- en: After the conflict is resolved, there is a phenomenon of novel emergence.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, something new comes into being.
  prefs: []
  type: TYPE_NORMAL
- en: On the global scale, wars between nations lead to medical advancements and global
    progress.
  prefs: []
  type: TYPE_NORMAL
- en: On the personal scale, a war in your mind leads to the emergence of insight,
    perception, or solution to a problem.
  prefs: []
  type: TYPE_NORMAL
- en: When this happens, you will feel it.
  prefs: []
  type: TYPE_NORMAL
- en: It may take longer than expected.
  prefs: []
  type: TYPE_NORMAL
- en: But when you do find the next direction to take in your life, you enter the
    *clarity* phase.
  prefs: []
  type: TYPE_NORMAL
- en: With a solidified and self-generated goal, you must clarify the path to reach
    that goal.
  prefs: []
  type: TYPE_NORMAL
- en: In most cases, this will require self-education in alignment with the goal.
  prefs: []
  type: TYPE_NORMAL
- en: If you have the vision to start a business, then clearly you will have to learn
    about business.
  prefs: []
  type: TYPE_NORMAL
- en: But remember, learning without a tangible project to apply your teachings is
    not learning, it’s mental masturbation.
  prefs: []
  type: TYPE_NORMAL
- en: Start with what you know.
  prefs: []
  type: TYPE_NORMAL
- en: Learn along the way.
  prefs: []
  type: TYPE_NORMAL
- en: And when you encounter specific problems, solve them through trial and error.
  prefs: []
  type: TYPE_NORMAL
- en: As you commit to progress in this phase, you will gain new insight.
  prefs: []
  type: TYPE_NORMAL
- en: The “aha!” moment will strike.
  prefs: []
  type: TYPE_NORMAL
- en: Again, this may take longer than expected. Not all chapters are the same length.
  prefs: []
  type: TYPE_NORMAL
- en: This is when you enter the *intensity* phase, the middle part of a chapter.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this phase you:'
  prefs: []
  type: TYPE_NORMAL
- en: Have complete clarity on what you must do
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Have a tangible aspect of life that you are making progress in
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Don’t want to do anything aside from “work” because work is the funnest thing
    you could be doing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This blur of pure progress usually lasts 1-3 months, more or less.
  prefs: []
  type: TYPE_NORMAL
- en: Then, you hit the *intensity threshold.*
  prefs: []
  type: TYPE_NORMAL
- en: You exhaust the progress you’re allowed to reap from reality with that specific
    vessel.
  prefs: []
  type: TYPE_NORMAL
- en: You can keep pushing, but you will be disappointed to see that your efforts
    aren’t going as far.
  prefs: []
  type: TYPE_NORMAL
- en: At this point, you must attempt to enter a maintenance phase so you don’t drop
    straight into feeling lost.
  prefs: []
  type: TYPE_NORMAL
- en: Reaching New Baselines
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In bodybuilding, there are 3 common phases for sculpting a desirable physique:
    cutting, bulking, and maintaining.'
  prefs: []
  type: TYPE_NORMAL
- en: We can think of cutting as gaining clarity.
  prefs: []
  type: TYPE_NORMAL
- en: You let go of the fat, physical or mental, to reveal what you’ve built from
    previous bulking cycles.
  prefs: []
  type: TYPE_NORMAL
- en: We can think of bulking as an intensity phase.
  prefs: []
  type: TYPE_NORMAL
- en: You are in an environment that is conducive to muscle growth, physical or mental,
    until you reach a point of feeling groggy and demotivated.
  prefs: []
  type: TYPE_NORMAL
- en: In between either bulking or cutting you can enter a maintenance phase.
  prefs: []
  type: TYPE_NORMAL
- en: In bodybuilding, this is where you attempt to maintain a new baseline of muscle
    mass that you’ve reached.
  prefs: []
  type: TYPE_NORMAL
- en: In business, you maintain baseline revenue.
  prefs: []
  type: TYPE_NORMAL
- en: In relationships, you maintain a baseline of fulfillment.
  prefs: []
  type: TYPE_NORMAL
- en: In spirituality, you maintain a baseline of happiness.
  prefs: []
  type: TYPE_NORMAL
- en: You do all of the above by creating a system.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, a routine that prioritizes the actions that get the most results.
  prefs: []
  type: TYPE_NORMAL
- en: The goal is to make this a sustainable part of your life.
  prefs: []
  type: TYPE_NORMAL
- en: One that doesn’t take too much conscious effort to maintain.
  prefs: []
  type: TYPE_NORMAL
- en: With time, effort, and consciousness of these cyclical phases of life you begin
    to create a lifestyle that you enjoy.
  prefs: []
  type: TYPE_NORMAL
- en: The Supreme Law
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Nothing is permanent.
  prefs: []
  type: TYPE_NORMAL
- en: Feeling lost isn’t permanent.
  prefs: []
  type: TYPE_NORMAL
- en: Intense progress isn’t permanent.
  prefs: []
  type: TYPE_NORMAL
- en: Even happiness isn’t permanent.
  prefs: []
  type: TYPE_NORMAL
- en: These phases of life will come and go, but you can trust that if you seek to
    understand them year after year, you will get holistic results with time.
  prefs: []
  type: TYPE_NORMAL
- en: If you grasp at any phase and attempt to make it permanent, you will experience
    chaos.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t fight with reality, flow with it.
  prefs: []
  type: TYPE_NORMAL
