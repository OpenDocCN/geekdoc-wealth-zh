- en: The Focus Formula (How To Take Control Of Your Life)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-focus-formula-how-to-take-control-of-your-life/](https://thedankoe.com/letters/the-focus-formula-how-to-take-control-of-your-life/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Early last year, I came across an American philosopher that was touted to be
    “the most conscious man alive.”
  prefs: []
  type: TYPE_NORMAL
- en: His name is Ken Wilber.
  prefs: []
  type: TYPE_NORMAL
- en: I bought a few of his books, like “*A Brief History Of Everything*,” and was
    instantly hooked.
  prefs: []
  type: TYPE_NORMAL
- en: His teachings on holism, consciousness, and integration helped me understand
    the world from a high level. A cosmic lens. Wilber answered my burning questions
    that other philosophers couldn’t.
  prefs: []
  type: TYPE_NORMAL
- en: 'As I researched, I found one interesting thing:'
  prefs: []
  type: TYPE_NORMAL
- en: David Deida and Mark Manson (the authors of *The Way Of The Superior Man* and
    *The Subtle Art Of Not Giving A F*ck*) were former students of his.
  prefs: []
  type: TYPE_NORMAL
- en: Deida went on to use the integral model to help explain sexuality and masculinity
    in his books.
  prefs: []
  type: TYPE_NORMAL
- en: My writing had a significant uptick after reading Ken’s work as well. This philosophy
    stuff is a lot more practical when you are building your own thing (as you’ll
    find out).
  prefs: []
  type: TYPE_NORMAL
- en: But Mark Manson… he had an interesting encounter.
  prefs: []
  type: TYPE_NORMAL
- en: Manson saw the rise and fall of Ken Wilber. He was an adamant student. He loved
    Wilber’s insights.
  prefs: []
  type: TYPE_NORMAL
- en: But one day, out of nowhere, Ken “turned” on his audience and disappeared.
  prefs: []
  type: TYPE_NORMAL
- en: 'Mark’s summary of Wilber’s momentary downfall was this:'
  prefs: []
  type: TYPE_NORMAL
- en: '*No matter how conscious the human being, they are still human.*'
  prefs: []
  type: TYPE_NORMAL
- en: Ken is now back in action after some time off and is making appearances on some
    more niche podcasts.
  prefs: []
  type: TYPE_NORMAL
- en: While Ken did disappear out of nowhere and made some questionable remarks, there
    is still a lot we can learn from him. Especially when we don’t jump to conclusions.
    His disappearance is rather refreshing, as the modern spirituality industry is
    just as bad as the modern fitness industry.
  prefs: []
  type: TYPE_NORMAL
- en: Hidden flaws that don’t give the full picture.
  prefs: []
  type: TYPE_NORMAL
- en: Similar to how Alan Watts is a library of anxiety-soothing knowledge, he was
    a victim of alcoholism. Which does not contradict his philosophy. In fact, it
    shines light on the deceptive nature of the spirituality industry.
  prefs: []
  type: TYPE_NORMAL
- en: Watts is one of the few that was true to himself.
  prefs: []
  type: TYPE_NORMAL
- en: I recommend reading Ken’s work to get the full picture, but I want to introduce
    you to what he calls a “holon.”
  prefs: []
  type: TYPE_NORMAL
- en: A holon is the unit of everything.
  prefs: []
  type: TYPE_NORMAL
- en: A holon is both a part and a whole.
  prefs: []
  type: TYPE_NORMAL
- en: Like how an atom is a whole in itself, but also a part of a molecule, and so
    on up until you reach the whole of the cosmos.
  prefs: []
  type: TYPE_NORMAL
- en: Holons span in infinite directions, like how wood is a part of a chair, but
    also a part of a tree, house, and table.
  prefs: []
  type: TYPE_NORMAL
- en: Holons are the building blocks of creative problem-solving.
  prefs: []
  type: TYPE_NORMAL
- en: Alan Watts has called these “units of thought.”
  prefs: []
  type: TYPE_NORMAL
- en: Leo Gura has called these “figments of consciousness.”
  prefs: []
  type: TYPE_NORMAL
- en: A snapshot of infinity. A limit that our mind creates. One of the infinite distinctions
    that enable our mind to assign meaning to the world around us.
  prefs: []
  type: TYPE_NORMAL
- en: The hidden material that joins holons together is relationship.
  prefs: []
  type: TYPE_NORMAL
- en: As Watts said, “existence is relationship, and you are smack in the middle of
    it.”
  prefs: []
  type: TYPE_NORMAL
- en: They are not just physical, they are everything.
  prefs: []
  type: TYPE_NORMAL
- en: This is a powerful realization.
  prefs: []
  type: TYPE_NORMAL
- en: Thoughts, ideas, and emotions are holons.
  prefs: []
  type: TYPE_NORMAL
- en: Struggle is a whole in itself, but also a part of fulfillment.
  prefs: []
  type: TYPE_NORMAL
- en: Holons are best understood through philosophical contemplation. Pick something
    random, like an object in front of you, and follow it down a rabbit hole of discovery
    through questioning.
  prefs: []
  type: TYPE_NORMAL
- en: Seriously, pick an object and ask a series of what, how, why, where, and when
    questions.
  prefs: []
  type: TYPE_NORMAL
- en: Do not limit yourself to the physical world here, or even direct connections.
  prefs: []
  type: TYPE_NORMAL
- en: 'If I were to choose “honey” as my holon to dissect, my mind can follow it to:'
  prefs: []
  type: TYPE_NORMAL
- en: The process of making honey
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The bees associated with pollination
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The beekeepers and if they are making a living wage
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Whether any harm is being done to the bees
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The manufacturing and distribution process of honey
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How the honey impacts human health when consumed
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And onward to infinity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Even the words in that sentence are parts in the whole of the sentence. The
    sentence a part of the whole of this letter. The letter the part of the whole
    of my content. And so on.
  prefs: []
  type: TYPE_NORMAL
- en: You are a whole that includes your interests. Interests are parts in the whole
    of a niche. Niches are a part in the whole of a market. Markets are a part in
    the whole of social media.
  prefs: []
  type: TYPE_NORMAL
- en: If you struggle in any domain of life, it’s because your perspective doesn’t
    include the aspects that would make it whole. This is why multi-perspectival understanding
    via open-mindedness and questioning is important.
  prefs: []
  type: TYPE_NORMAL
- en: Modern Enslavement – Society As A Pyramid Scheme
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-953">![](../Images/f13b4dd625cf27d2b2372beb1bc50e03.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Notice how holons are hierarchical.
  prefs: []
  type: TYPE_NORMAL
- en: They transcend and include one another.
  prefs: []
  type: TYPE_NORMAL
- en: Like how humans transcend and include – or integrate – animals. With that transcendence,
    spirit emerged. The connection of minds through the intangible.
  prefs: []
  type: TYPE_NORMAL
- en: Everything is structured as a hierarchy, and there are two types.
  prefs: []
  type: TYPE_NORMAL
- en: The first are **dominator hierarchies**, which is what gives the word “hierarchy”
    a bad reputation. These consist of a pyramid scheme-esque structure.
  prefs: []
  type: TYPE_NORMAL
- en: 'The second are **natural hierarchies** or “actualization hierarchies,” which
    is “an order of increasing wholeness, such as: particles to atoms to cells to
    organisms, or letters to words to sentences to paragraphs. The whole on one level
    becomes a part of the whole of the next.”'
  prefs: []
  type: TYPE_NORMAL
- en: You can see the wisdom in how humans replicate this structure in society. But
    from a big picture, society would fall under the definition of a dominator hierarchy.
  prefs: []
  type: TYPE_NORMAL
- en: Societal entities like public schools, government, corporate jobs, and even
    religious institutions are structured in this way.
  prefs: []
  type: TYPE_NORMAL
- en: Less people with more power at the top.
  prefs: []
  type: TYPE_NORMAL
- en: More people with less power at the bottom.
  prefs: []
  type: TYPE_NORMAL
- en: In a true pyramid scheme, there are investors at the bottom that enable the
    unfair power distribution.
  prefs: []
  type: TYPE_NORMAL
- en: You “climb” the ladder through hard work, but rarely will you reach the top.
    If there are 1000 people at the bottom and 10 at the top, there is only room for
    so many people to get to the top, obviously.
  prefs: []
  type: TYPE_NORMAL
- en: But, money isn’t the biggest problem here.
  prefs: []
  type: TYPE_NORMAL
- en: The people at the bottom of societal pyramid schemes are not investing money,
    **they’re investing attention.**
  prefs: []
  type: TYPE_NORMAL
- en: Since humans survive on a conceptual level, and if someone enslaves your attention,
    you will identify with that hierarchy.
  prefs: []
  type: TYPE_NORMAL
- en: Like how people identify with their job title. When people challenge it, they
    get offended, and willingly rivet their attention to stay enslaved.
  prefs: []
  type: TYPE_NORMAL
- en: Power in our modern world comes from attention.
  prefs: []
  type: TYPE_NORMAL
- en: Those that hold power at the top of any pyramid require more collective psychic
    energy to maintain their power.
  prefs: []
  type: TYPE_NORMAL
- en: As we’ve discussed before, the human mind craves order.
  prefs: []
  type: TYPE_NORMAL
- en: When we can focus all of our attention on the tasks we enjoy pursuing, life
    becomes enjoyable.
  prefs: []
  type: TYPE_NORMAL
- en: And with increasing anxiety, uncertainty, and overwhelm due to the downfall
    of traditional values – people flock to the “safe and secure” path toward becoming
    a cog in the societal machine (or scheme, if you will).
  prefs: []
  type: TYPE_NORMAL
- en: We’ve replaced religious values with capitalistic values to maintain our sanity,
    which I am indifferent about. I am not pushing ideology here, nor do I believe
    “returning to tradition” is the answer. We are supposed to transcend and include,
    or evolve, not regress.
  prefs: []
  type: TYPE_NORMAL
- en: This is the definition of modern enslavement.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not physical, it’s mental.
  prefs: []
  type: TYPE_NORMAL
- en: And, it’s the default state of most people unless they are made aware of it,
    which is what I’m trying to do here.
  prefs: []
  type: TYPE_NORMAL
- en: Political campaigns, corporate work, and religious ideology are upheld with
    mass attention to survive the ideas that form a collective ego.
  prefs: []
  type: TYPE_NORMAL
- en: Social conditioning from the day you are born narrows your mind to see the world
    the same as everyone else.
  prefs: []
  type: TYPE_NORMAL
- en: By the time you exit the school system, you are just as mechanical as an animal.
    Acting out of survival. The difference is that you are trying to uphold what other
    people told you is important.
  prefs: []
  type: TYPE_NORMAL
- en: It becomes automatic to invest our attention in an extrinsic hierarchy of goals.
    A dominator hierarchy that forms a collective ego – through attachment of individual
    identity – that works to conceptually survive.
  prefs: []
  type: TYPE_NORMAL
- en: The collective societal vision for your future is to get good grades, *maybe*get
    a high paying job, watch TV to “ease your mind,” and *maybe*retire happily at
    65\. Both with the unconscious seeking of status, survival, and approval.
  prefs: []
  type: TYPE_NORMAL
- en: With the habit of investing attention in external status games, this process
    goes on to encourage us to waste our money on fancy cars, mansions, and other
    material items without consulting our own values, wants, and needs – because our
    self is not a product of our own conscious creation.
  prefs: []
  type: TYPE_NORMAL
- en: You escape this enslavement by creating your own **actualization hierarchy**
    to invest your attention in. One that orders your mind so you can enjoy life,
    create a conscious identity, and impact the world through your passionate work.
    Reproduction through spirit.
  prefs: []
  type: TYPE_NORMAL
- en: You *can* opt for doing nothing, but you won’t escape your need to survive.
    Doing nothing about your life is exactly how you become a modern slave.
  prefs: []
  type: TYPE_NORMAL
- en: The Focus Formula – How To Take Control Of Your Life
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-952">![](../Images/6d8d6682694ddaec75c75beb61cf7a4f.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t know what you want, you will be told what you want, and you will
    believe it.
  prefs: []
  type: TYPE_NORMAL
- en: Unless you have dissolved your ego and plan to live as a monk in the eternal
    present moment, you need a purpose.
  prefs: []
  type: TYPE_NORMAL
- en: It is not feasible for someone with worldly responsibilities to “live in the
    present” for the entirety of their lives. The present is a tool. A gift. A haven
    that you can resort to when you don’t need to take immediate action.
  prefs: []
  type: TYPE_NORMAL
- en: Anything that is not the present moment is a mental construction for understanding
    reality.
  prefs: []
  type: TYPE_NORMAL
- en: Since “success” is determined by a hierarchy of goals that orders your mind
    and directs behavior, you must create your own.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s create the structure to focus our lives:'
  prefs: []
  type: TYPE_NORMAL
- en: Purpose – Your North Star
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: At the peak of your actualization hierarchy is your purpose.
  prefs: []
  type: TYPE_NORMAL
- en: For the sake of simplicity, your purpose will be synonymous with your vision,
    life’s work, and any other big goal in your life.
  prefs: []
  type: TYPE_NORMAL
- en: This is crucial. It is the most important step in taking control of your life
    because it is the whole that contains all parts. Without it, everything else we
    will talk about will fall apart.
  prefs: []
  type: TYPE_NORMAL
- en: 'But, when it comes to purpose, there are a few traps to be aware of:'
  prefs: []
  type: TYPE_NORMAL
- en: '**You don’t have one purpose for your life.**'
  prefs: []
  type: TYPE_NORMAL
- en: They come in stages, from shallow to deep.
  prefs: []
  type: TYPE_NORMAL
- en: Like how your purpose as a teen might be to get back at your ex by becoming
    obsessed with the gym.
  prefs: []
  type: TYPE_NORMAL
- en: But, you eventually transcend that purpose and adopt one around health, longevity,
    and enjoyment.
  prefs: []
  type: TYPE_NORMAL
- en: There are no wrong actions.
  prefs: []
  type: TYPE_NORMAL
- en: (Don’t object that statement. Question it. “Wrong” is determined by your narrow
    worldview and lack of perspective.)
  prefs: []
  type: TYPE_NORMAL
- en: Follow your desires, self-reflect, raise your consciousness and make better
    decisions next time.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t let the picture of perfection (that even spiritual teachers lie about)
    make you think you can’t take one “wrong” step.
  prefs: []
  type: TYPE_NORMAL
- en: My “worst” actions led to the best points in my life, but only because I was
    conscious of their ramifications and changed my behavior accordingly.
  prefs: []
  type: TYPE_NORMAL
- en: '**It won’t be crystal clear the first time around.**'
  prefs: []
  type: TYPE_NORMAL
- en: Treat this as a Minimum Viable Purpose that you will refine with experience
    (you need experience to make you aware of opportunities).
  prefs: []
  type: TYPE_NORMAL
- en: If you need help with this, try creating an anti-vision.
  prefs: []
  type: TYPE_NORMAL
- en: Observe the masses, realize what kind of life you don’t want to live, and move
    in the opposite direction.
  prefs: []
  type: TYPE_NORMAL
- en: '[I talk about this more in this quick video](https://youtu.be/d5RKW3WSEb0).'
  prefs: []
  type: TYPE_NORMAL
- en: '**Your purpose will fade.**'
  prefs: []
  type: TYPE_NORMAL
- en: Life unfolds in chapters, like a book. Each chapter has a purpose that the words
    lead to.
  prefs: []
  type: TYPE_NORMAL
- en: You will feel lost heading into new chapters of your life, this is normal.
  prefs: []
  type: TYPE_NORMAL
- en: Did anyone say that you aren’t supposed to feel lost? Or did you tell yourself
    that? “Lost” is something that exists. It’s silly to think that the infinite nature
    of life shouldn’t apply to you.
  prefs: []
  type: TYPE_NORMAL
- en: This is where self-reflection becomes crucial.
  prefs: []
  type: TYPE_NORMAL
- en: As you go about life, you will miss almost everything unless you reflect on
    your actions. That is, what went right and what went wrong, from your perspective.
  prefs: []
  type: TYPE_NORMAL
- en: When you understand both, they are hints at your next purpose.
  prefs: []
  type: TYPE_NORMAL
- en: Like puzzle pieces. When they connect, you feel the pull to go all in. This
    will not happen if you are constantly distracting yourself.
  prefs: []
  type: TYPE_NORMAL
- en: How do we create a meaningful purpose?
  prefs: []
  type: TYPE_NORMAL
- en: Through questioning.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t know what you want, it’s because you haven’t asked the right questions.
  prefs: []
  type: TYPE_NORMAL
- en: Quality questions dictate your quality of life, because the quality of your
    understanding is dependent on the quality of answers you receive.
  prefs: []
  type: TYPE_NORMAL
- en: You will not receive the answers to these questions immediately.
  prefs: []
  type: TYPE_NORMAL
- en: You ask yourself a question > move forward in life > and reflect on your experience
    for answers.
  prefs: []
  type: TYPE_NORMAL
- en: 'Use these questions as attention anchors. With these questions made known,
    your mind will gravitate toward noticing answers as time goes on:'
  prefs: []
  type: TYPE_NORMAL
- en: What do I really want out of life?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What is important to me?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What is the highest version of myself?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What does my ideal day look like?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What do I have to accomplish in order to get there?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Does that solve a problem in the world, and what product or service aligns
    with both?*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What is the next phase of my purpose?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Write. These. Down.
  prefs: []
  type: TYPE_NORMAL
- en: Process – The Pursuit Of Mastery
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-954">![](../Images/2271372aaba060e837353ef95f1624af.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: What is the process that will allow you to achieve that goal?
  prefs: []
  type: TYPE_NORMAL
- en: Every goal that you have – by nature – is accompanied by a subsequent hierarchy
    of goals descending down to a small, behavior-related goal, like writing the first
    word of an article.
  prefs: []
  type: TYPE_NORMAL
- en: Your process, system, or strategy for achieving your purpose is how you prevent
    your mind from declining into chaos.
  prefs: []
  type: TYPE_NORMAL
- en: Systems, when understood, help maintain order in your mind. This alone will
    10x the enjoyment in your life.
  prefs: []
  type: TYPE_NORMAL
- en: The problem is that people think they will be fine just by “winging it.”
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t hold this hierarchy of goals at the top of your mind, you will
    give too much mental energy – transferred through attention – to things that distract
    you from your process.
  prefs: []
  type: TYPE_NORMAL
- en: Make these goals conscious by writing down 10 year, 1 year, monthly, weekly,
    and daily goals.
  prefs: []
  type: TYPE_NORMAL
- en: Again, get as specific as you can.
  prefs: []
  type: TYPE_NORMAL
- en: Since these are written down, you will refine them with experience. This alone
    is a process within itself that will order your mind.
  prefs: []
  type: TYPE_NORMAL
- en: The process of mastery comes in stages.
  prefs: []
  type: TYPE_NORMAL
- en: Beginner, intermediate, and advanced relating to the skills you must acquire
    to actualize your vision.
  prefs: []
  type: TYPE_NORMAL
- en: You must understand which stage you are in, and what you need to do to advance
    to the next stage.
  prefs: []
  type: TYPE_NORMAL
- en: Every stage will have its own set of lever-moving actions to polish off your
    process.
  prefs: []
  type: TYPE_NORMAL
- en: As a business beginner, your levers may be learning the fundamentals of marketing
    and sales, writing content, and making online connections.
  prefs: []
  type: TYPE_NORMAL
- en: As an intermediate, your levers may be building out a product so that you can
    monetize your audience. You can start to ween off of learning via external sources.
  prefs: []
  type: TYPE_NORMAL
- en: As an expert, your levers may be doing what you enjoy, repurposing your best
    work, and diversifying your reach.
  prefs: []
  type: TYPE_NORMAL
- en: Again, write all of this down.
  prefs: []
  type: TYPE_NORMAL
- en: Yearly, monthly, weekly, and daily goals paired with the lever moving actions
    that will move you toward achievement.
  prefs: []
  type: TYPE_NORMAL
- en: Priority – Making Better Decisions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-955">![](../Images/31497eada0799ae582e3bbec42c5dc47.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: First, this encapsulates your lever moving actions that we just discussed.
  prefs: []
  type: TYPE_NORMAL
- en: These are best framed as performance goals (as opposed to vanity goals).
  prefs: []
  type: TYPE_NORMAL
- en: Instead of aiming for an uncontrollable goal of “50 followers a day,” aim to
    write 3 posts that may *lead* to 50 followers a day.
  prefs: []
  type: TYPE_NORMAL
- en: Instead of aiming for a “well written article,” aim for writing 1000 words (that
    you can come back and edit).
  prefs: []
  type: TYPE_NORMAL
- en: The specificity helps reduce the friction around action, because you are in
    direct control of the outcome.
  prefs: []
  type: TYPE_NORMAL
- en: You, at this point in your life, are a manifestation of all of your past choices.
    These choices are not just physical… but mental, financial, and spiritual.
  prefs: []
  type: TYPE_NORMAL
- en: It’s safe to say that your life, 10 years from now, will be a manifestation
    of your choices today, tomorrow, and the next.
  prefs: []
  type: TYPE_NORMAL
- en: Making better decisions is easier when you have a *purpose* and *process* to
    bounce your focus between, but it’s not enough.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how you make better decisions:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Bring your purpose to the top of your mind.**'
  prefs: []
  type: TYPE_NORMAL
- en: This will help you filter signal from noise. If it isn’t conducive to your vision,
    it isn’t important (unless you’ve been convinced it is important by someone else).
  prefs: []
  type: TYPE_NORMAL
- en: All of this takes time.
  prefs: []
  type: TYPE_NORMAL
- en: Your signal (importance) to noise (distraction) ratio will improve as you do.
  prefs: []
  type: TYPE_NORMAL
- en: '**Gain multi-perspectival understanding.**'
  prefs: []
  type: TYPE_NORMAL
- en: Don’t lock your mind into one perspective. Try to see the situation from multiple
    angles.
  prefs: []
  type: TYPE_NORMAL
- en: Your perspective is based on your identity.
  prefs: []
  type: TYPE_NORMAL
- en: With time, we want to work towards adopting a cosmic perspective. If you identify
    as the universe, human problems become minor, and you can begin working towards
    creative solutions to advance humanity.
  prefs: []
  type: TYPE_NORMAL
- en: But, that takes time.
  prefs: []
  type: TYPE_NORMAL
- en: As humans, we work to survive our identity. You can’t escape survival, we still
    have an animalistic nature in us. But, we can work to survive a more “enlightened”
    identity, like the cosmos, humanity, or the actualized version of yourself.
  prefs: []
  type: TYPE_NORMAL
- en: '*If your perspective is a part of the whole that is your identity, you evolve
    by transcending and including different perspectives until you’ve become the whole
    of the cosmos.*'
  prefs: []
  type: TYPE_NORMAL
- en: Start by identifying with your future self, how would they approach situations?
  prefs: []
  type: TYPE_NORMAL
- en: If you can do this, decision making will become automatic, as you are trying
    to survive the idea of your higher self.
  prefs: []
  type: TYPE_NORMAL
- en: 'Perspective goes so deep. I’m planning another letter for it, but the main
    question is this:'
  prefs: []
  type: TYPE_NORMAL
- en: '*How can you view the situation that allows you to perceive it in a way that
    is conducive to action?*'
  prefs: []
  type: TYPE_NORMAL
- en: '**Perceive the situation in a way that allows you to act in alignment with
    your purpose.**'
  prefs: []
  type: TYPE_NORMAL
- en: Problems are only problems if you interpret them as such.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t feel like getting out of bed, step back and think about your measly
    problem.
  prefs: []
  type: TYPE_NORMAL
- en: There are people that don’t have legs. They can’t get out of bed without help.
  prefs: []
  type: TYPE_NORMAL
- en: There are people that don’t have a bed or food to cook in the morning.
  prefs: []
  type: TYPE_NORMAL
- en: Adopt their perspective and interpret your problem from their lens, do you think
    they give a f*ck if you don’t “feel” like getting out of bed?
  prefs: []
  type: TYPE_NORMAL
- en: You have a purpose to actualize.
  prefs: []
  type: TYPE_NORMAL
- en: Move.
  prefs: []
  type: TYPE_NORMAL
- en: Consciousness
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: State of consciousness is everything.
  prefs: []
  type: TYPE_NORMAL
- en: Through social conditioning – so we can operate within society – most people
    have a narrow worldview.
  prefs: []
  type: TYPE_NORMAL
- en: This worldview contains their beliefs which influence thoughts which influence
    emotions which influence attention.
  prefs: []
  type: TYPE_NORMAL
- en: Attention influences behavior.
  prefs: []
  type: TYPE_NORMAL
- en: If you are only aware of the path that society has laid out for you, your attention
    will be riveted to that path, and enslaved in exchange for your survival.
  prefs: []
  type: TYPE_NORMAL
- en: A steady paycheck. A spouse that, intrinsically, you have nothing in common
    with. And, of course, too much responsibility… that way you can’t invest attention
    in your own thing.
  prefs: []
  type: TYPE_NORMAL
- en: Society is well aware of humans’ mechanical nature.
  prefs: []
  type: TYPE_NORMAL
- en: By pursuing your own thing, it will become easier with time.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t supposed to be an easy process.
  prefs: []
  type: TYPE_NORMAL
- en: Some would even argue that raising your consciousness is the meaning of life.
  prefs: []
  type: TYPE_NORMAL
- en: You raise your consciousness by questioning everything, gaining awareness of
    a potential future, and learning to deal with those highs and lows… for life.
  prefs: []
  type: TYPE_NORMAL
- en: You raise your consciousness even more by creating a holistic identity, like
    humanity or the cosmos, and expanding your mind to embody that perspective.
  prefs: []
  type: TYPE_NORMAL
- en: Your behavior will follow, and true problems will reveal themselves that you
    can solve through creativity.
  prefs: []
  type: TYPE_NORMAL
- en: Challenge – The Source Of Wisdom And Evolution
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-960">![](../Images/2b33b81dcc1c5dbe628ce70b18705f85.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Your personal actualization hierarchy – purpose, process, and priority – should
    be challenging.
  prefs: []
  type: TYPE_NORMAL
- en: Many conventional goals are challenging at the start, but that challenge soon
    fades. And, those challenges aren’t something *you* actually want to take on.
  prefs: []
  type: TYPE_NORMAL
- en: Challenge narrows attention further. This helps eliminate distractions from
    taking you off the path.
  prefs: []
  type: TYPE_NORMAL
- en: Every subsequent goal that your process presents to actualize your vision will
    demand you to grow.
  prefs: []
  type: TYPE_NORMAL
- en: That is, you will have to invest in your education to acquire the skill set
    required to meet that goal’s challenge.
  prefs: []
  type: TYPE_NORMAL
- en: The source of learning is struggle, not memorization.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t a corporate gig where you stop evolving at a certain rung in the
    ladder. Avoid mindless repetition without progression.
  prefs: []
  type: TYPE_NORMAL
- en: Clarity – Self-Correcting With Time
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If creating your purpose, process, and priorities does not come easy to you,
    *don’t fall into the quick fix mindset**.*
  prefs: []
  type: TYPE_NORMAL
- en: None of this is easy.
  prefs: []
  type: TYPE_NORMAL
- en: None of this is immediate.
  prefs: []
  type: TYPE_NORMAL
- en: None of this will be crystal clear at the start.
  prefs: []
  type: TYPE_NORMAL
- en: You can predict the future, but it’s impossible to have a perfect prediction.
  prefs: []
  type: TYPE_NORMAL
- en: This is LIFE we are talking about, not DAY.
  prefs: []
  type: TYPE_NORMAL
- en: It’s going to take time, and if you haven’t already, go back and write all of
    this down to the best of your ability.
  prefs: []
  type: TYPE_NORMAL
- en: Self-reflection will be your best friend on this journey.
  prefs: []
  type: TYPE_NORMAL
- en: Every month, go back to what you wrote down.
  prefs: []
  type: TYPE_NORMAL
- en: Reflect on what went right and what went wrong.
  prefs: []
  type: TYPE_NORMAL
- en: But understand, in the moment, there are not right or wrong choices. There is
    no way you can know with 100% certainty where your actions are going to lead.
    Get comfortable with the uncertain nature of life.
  prefs: []
  type: TYPE_NORMAL
- en: Experience is how you refine your purpose with time. That is how you create
    your own certainty (in your ability).
  prefs: []
  type: TYPE_NORMAL
- en: You don’t know what to improve if you don’t make mistakes.
  prefs: []
  type: TYPE_NORMAL
- en: Awareness begets awareness.
  prefs: []
  type: TYPE_NORMAL
- en: Alignment – Extrinsic Potential With Intrinsic Progression
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The top pyramid – purpose, process, priority – creates a potential reality for
    you to create through your daily choices.
  prefs: []
  type: TYPE_NORMAL
- en: These are responsible for extrapersonal neurotransmitters like dopamine.
  prefs: []
  type: TYPE_NORMAL
- en: The bottom pyramid – consciousness, challenge, and clarity – create an ever
    increasing order in your mind.
  prefs: []
  type: TYPE_NORMAL
- en: These are responsible for peripersonal neurotransmitters like endorphins.
  prefs: []
  type: TYPE_NORMAL
- en: When these align, you create a neurochemical cocktail that continues circulating
    in your brain. It becomes much easier to live in some degree of a flow state,
    with your focus on the future and little to sway you from the path.
  prefs: []
  type: TYPE_NORMAL
- en: You align these pyramids through attention.
  prefs: []
  type: TYPE_NORMAL
- en: Meaning, you have to create time to work toward your dreams, reflect on your
    progress, and refine your strategy.
  prefs: []
  type: TYPE_NORMAL
- en: Swap out the mindless consumption for future building.
  prefs: []
  type: TYPE_NORMAL
- en: Live in the mental reality that you’ve created for yourself.
  prefs: []
  type: TYPE_NORMAL
- en: This Is Your Reality – A Note About The Focus Formula
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This does not only apply to your life.
  prefs: []
  type: TYPE_NORMAL
- en: It applies to anything you do.
  prefs: []
  type: TYPE_NORMAL
- en: If you are building a side business, you need a purpose, process, priorities,
    and the rest.
  prefs: []
  type: TYPE_NORMAL
- en: If you are writing an article, you need the same. Even the structure of said
    article is the same. You communicate with the external world through persuasive
    actualization hierarchies.
  prefs: []
  type: TYPE_NORMAL
- en: This is a meta formula for operating at your highest potential on the macro
    and micro scale of life.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, this is your reality.
  prefs: []
  type: TYPE_NORMAL
- en: The Focus Formula you have created is what you bring your attention back to
    when distractions happen.
  prefs: []
  type: TYPE_NORMAL
- en: Keep your head down in your little world, aiming for your purpose, and others
    opinions will stop holding weight.
  prefs: []
  type: TYPE_NORMAL
- en: Get focused.
  prefs: []
  type: TYPE_NORMAL
- en: Put on your headphones, throw up your hood, let people criticize, and focus
    on creating a better future for yourself and the world.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan Koe
  prefs: []
  type: TYPE_NORMAL
