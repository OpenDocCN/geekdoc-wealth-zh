- en: The Creator Economy Is A Giant Ponzi Scheme
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-creator-economy-is-a-giant-ponzi-scheme/](https://thedankoe.com/letters/the-creator-economy-is-a-giant-ponzi-scheme/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: There are some things I get pretty annoyed with, and this is one of them.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: A beginner starts their creator journey.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: They learn writing, marketing, branding, and other skills paired with their
    craft that allow them to be a one-person business – because as a creator, you
    need to be a *specialized generalist*.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: In other words, you need to have a general understanding of all digital business
    skills but also be specialized in the one thing you love doing every single day.
    Good at many things, incredible at one thing, as that general understanding is
    *what makes you incredible at that one thing.*
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2178">![](../Images/5f6c1641f3603e1702ecf87a2447187f.png)</picture>
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: The beginner creator wants to start making money. That’s reasonable. There’s
    nothing wrong with trying to sell your own product so you can stop selling someone
    else’s.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, here’s the tricky part:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: The beginner creator wants to help other creators with the skills they’ve learned.
    Marketing, sales, branding, writing, whatever it may be.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: They want to help other creators with the skills they’ve gained experience in,
    in the business model they’ve gained experience in. Makes sense.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: Where I get annoyed is when people call this a ponzi scheme.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: They don’t understand business, so they only see the surface of what’s going
    on and reduce it to that.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: “You’re just a creator helping creators become a creator.”
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: “You’re just a coach coaching coaches to become coaches.”
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: I get it, it looks bad on the surface, but so does everything else in life if
    you fail to look a bit deeper at what’s actually going on.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: The first thing this narrow-minded crowd doesn’t seem to understand is what
    a Ponzi Scheme is. They just seem to think that helping other people do what you’ve
    done (AKA, the only thing you’re actually qualified to do) is bad, so they call
    it a Ponzi.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: A Ponzi Scheme, by definition, is a type of financial fraud that pays returns
    to earlier investors with the capital of newer investors, rather than from profit
    earned by the operation of a legitimate business.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: That’s not what a creator business is. I’ll handle more objections on this later,
    but what you need to understand is that a creator business is a business. Creators
    can operate as one person or with a team. By the narrow-minded’s logic, all of
    B2B business is a Ponzi Scheme because they help each others businesses with skills
    they’ve learned.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: Ponzi Schemes are characterized by dependence, deception, and manipulation.
    Business in general, and especially the creator model, is characterized by *independence*,
    persuasion, and choice. Nobody is forcing you to listen to anyone or buy their
    product. Just because it isn’t a fit for you doesn’t mean it isn’t valuable and
    worth paying for to someone else.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s look at this from an evolutionary perspective.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们从进化的角度来审视这个问题。
- en: 'There are 2 types of hierarchies:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 有两种类型的等级制度：
- en: '**Dominator Hierarchies** – systems where the structure is maintained through
    force, power, control, and domination. The relationships within this type of hierarchy
    are typically characterized by coercion, top-down authority, and fear.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**支配者等级制度** - 通过力量、权力、控制和支配来维持结构的系统。这类等级制度中的关系通常以强制、自上而下的权威和恐惧为特征。'
- en: Examples of this include most corporate structures, the animal kingdom like
    alpha male apes having their choice of food and mating, and certain political
    structures i.e. dictatorship.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这包括大多数企业结构，动物王国中像雄性黑猩猩那样有选择食物和交配的权利，以及某些政治结构，即独裁。
- en: Hierarchies reflect in everything. On a biological level, a cancer cell can
    begin to create a dominator hierarchy unless reintegrated into the natural hierarchy
    of the body.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 等级制度反映在一切事物中。在生物层面上，癌细胞可以开始形成一个支配者等级制度，除非重新整合到身体的自然等级制度中。
- en: Ponzi schemes aren’t exactly dominator hierarchies, but they are in a similar
    league.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 庞氏骗局并不完全是支配者等级制度，但它们处于类似的领域。
- en: The people claiming that the creator economy is a Ponzi Scheme are usually doing
    so trapped within a dominator hierarchy. Which is sad, because they are closing
    their mind to one of the only ways out of their misery.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 声称创作者经济是庞氏骗局的人通常是在一个支配者等级制度中陷入困境。这很遗憾，因为他们关闭了通向他们苦难的唯一途径之一。
- en: '**Actualization Hierarchies** – inspired by theories like Maslow’s hierarchy
    of needs, are structured to support the growth, development, and self-actualization
    of its members. Leadership in such hierarchies aims to empower individuals rather
    than control them.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**实现等级制度** - 受马斯洛需求层次理论等理论的启发，结构旨在支持其成员的增长、发展和自我实现。这类等级制度中的领导力旨在赋权个人而不是控制他们。'
- en: This is where innovative startups, the creator economy, and progressive education
    (also the creator economy, teaching about their skills and interests) come into
    play.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是创新型初创公司、创作者经济和进步教育（也是创作者经济，教授他们的技能和兴趣）发挥作用的地方。
- en: Creators don’t control what you do. They are literally just media channels.
    They distribute information. If you feel like that is bad, refer to the Tyler
    The Creator tweet about cyber bullying and turn off your screen.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者不控制你做什么。他们实际上只是媒体渠道。他们分发信息。如果你觉得这样不好，可以参考Tyler The Creator关于网络霸凌的推文并关闭你的屏幕。
- en: The defining characteristic of the creator economy is *improving yourself and
    improving others.*
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者经济的定义特征是**提升自己和他人**。
- en: The exchange of value.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 价值的交换。
- en: Solving problems and distributing the solution.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 解决问题和分发解决方案。
- en: A creator who helps another creator is perfectly within the realm of reason,
    and it’s arguably one of the most fulfilling things you can do.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 一个创作者帮助另一个创作者完全在合理范围内，这可以说是你能做的最令人满足的事情之一。
- en: Taking into account the independence, high skill cap, high earning ceiling,
    high agency, and everything else that makes life worth living, being a creator,
    in my eyes, is the way of the future (and many other influential people who have
    predicted creators as the future of work).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到独立性、高技能上限、高收入上限、高自主性和使生活值得过的其他一切，在我看来，成为创作者是未来的道路（以及许多预测创作者将是未来工作的人）。
- en: 'Here’s what to expect in this letter:'
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在这封信中，你可以期待以下内容：
- en: Why the Creator2Creator market is new, weird, and the opportunity you’ve been
    waiting for (because you’re always “too late” to the rest).
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么创作者到创作者的市场是新的、奇怪的，以及你一直在等待的机会（因为你总是“来得太晚”到其他地方）。
- en: My secret weapon for being perceived as an authority, so you can overcome imposter
    syndrome and stop questioning everything you do.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我成为权威人士的秘密武器，这样你就可以克服冒名顶替综合症并停止质疑你所做的一切。
- en: The best path to starting a one-person business as a creator. How to start,
    skills to learn, and what to sell.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 作为创作者开始一家单人企业的最佳途径。如何开始，要学习的技能，以及要出售的产品。
- en: These are my favorite letters to write.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是我最喜欢的信件。
- en: I love ripping arguments apart.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢拆解争论。
- en: The C2C Market
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C2C 市场
- en: A “content creator” is a business model.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: “内容创作者”是一种商业模式。
- en: Meaning, a creator helping creators is a business helping other businesses.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 意思是，一个创作者帮助其他创作者，就是一家企业帮助其他企业。
- en: There are a metric ton of creators out there. Most of them don’t understand
    business. It’s quite obvious why other creators – who learn marketable skills
    like everyone tells them to – would want to help and teach them.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: By the narrow-minded’s standards, they are essentially saying that the entire
    B2B market is a Ponzi Scheme.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: Yeah… that’s a reach.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: Another thing they fail to realize is that creators aren’t just one-person businesses.
    Creators can have small or large teams. They are businesses. They just use social
    media, put themselves in public, and generate more business by putting who they
    are on the internet.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: Creators, in my eyes, are people who want to do what they enjoy for a living
    and finally make the realization that business is just a legal structure *to*
    do what you want for payment.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: The weird thing is that the creator model is so new. Creators are *both* businesses
    and consumers. Meaning, they buy from other creators to learn (because that’s
    who provides the education and courses) and they run a business with what they’ve
    learned. Creators are in the center of a B2B and B2C venn diagram and the lines
    are becoming more blurred every single day.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: The reason people label this as a Ponzi is because they don’t understand the
    model yet. It isn’t a normal part of society. Boomers will still tell you to “get
    a real job” no matter how much you make as a creator. They still think internet
    bucks are some imaginary currency and that it doesn’t count unless you break your
    back over some manual labor that robots should and will eventually do.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: People calling the creator economy a Ponzi is more of a sign than ever that
    there is opportunity in the space and you are still early to the party.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: The Creator2Creator market is growing and thriving every day.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: Creators, as a business, have to learn so many skills and span across any interest
    imaginable. So when they go to teach that thing, and the person learning it can
    become a creator with it (because creators can build an audience around any interest),
    then I understand how that can be seen as an illegitimate thing. But in that sense,
    everyone online is a creator, teaching their audience how to be creators, whether
    directly or indirectly. So even if it was a Ponzi, it’s reality, and you’re life
    still won’t be very good with that pessimist mindset.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: Makes sense, but what about creators who are helping beginner creators with
    a skill they just learned (like content, branding, or marketing)?
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: That’s gotta be a Ponzi, no?
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: Well, what if the beginner creator is an established business owner who just
    doesn’t understand those things? Why do businesses hire people to do their content,
    branding, and marketing in the first place?
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: Why did Alex Hormozi hire a ghostwriter that had no previous clients or experience
    to write for him on Twitter? Is that a Ponzi? Alex wasn’t a Twitter creator, but
    he was just a beginner in that context, so he paid someone for help because he
    understands the value in that.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: Context context context.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: I’ve helped 8 figure e-commerce CEOs start as a creator. You’d be surprised
    how little they know about the space.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: If you were to purchase a course on SkillShare or Udemy (created by creators)
    to learn about email marketing, would that be a Ponzi? So when you learn it from
    someone who is a public creator who actually has results, why do you not apply
    the same mindset? Is it not better to learn from someone who can get customers
    from an email list itself if they are teaching email marketing rather than relying
    on SkillShare or Udemy for the distribution of said course? That’s the entire
    point of email marketing, no? Why would you bias getting less results for yourself
    because the person teaching the skill does so from a place of public, real world
    experience? Anyone can create a course, but since creators on social media are
    a business, they are the ones with real validated results.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: Now, as a new creator who is just learning skills, is it ethical to help other
    people in exchange for money?
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: If your answer is no, apply that mindset to other ways of making money.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: How do freelancers gain experience? Not by learning, but by helping clients
    even if they suck, often in exchange for a low amount of money. You have to suck
    first, and that may piss some people off. That’s okay. Welcome to business.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: The beautiful thing about this is there’s a thing called a refund. If the freelancer
    can’t deliver, they give the money back. Good luck getting your money back in
    a Ponzi. The creator economy also has natural checks and balances. If you screw
    up, you better believe someone is going to post about it or attack you for it.
    You can be a scammer, but not for long. The mob will come after you.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: By the way, I’m saying all of this to shatter your limiting beliefs so you can
    finally take action on being a creator. I can guarantee you that if you just think
    it through, most other options to make money aren’t as good.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: Last scenario, what if the creator is just starting out and charges another
    person who wants to *become* a creator?
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: Well, I don’t see anyone better to learn from than the person who just freshly
    achieved the goal. The person on the purchasing end also has a *choice* to learn
    from that person and buy what they’re offering.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: And, since the creator economy is so new, it makes sense why there’s an abundance
    of education. Supply and demand. People *want* to become creators because subconsciously
    they know that’s where the future of work is heading.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: The only “scam” in this scenario is your inability to think for yourself.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: By the way, I teach you how to be a creator in [Digital Economics](https://digitaleconomics.school)
    (in reality, I just teach you every modern skill needed in business nowadays,
    but if you want to call yourself a creator after, feel free.)
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: The Secret Weapon To Being Respected
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'All of that is to say:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: I’m probably not going to change the minds of people who don’t want to be changed.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: 'It’s like trying to convince a hardcore Democrat (or Republican) to become
    a Republican (or Democrat). It is an extremely rare yet valuable trait to drop
    your beliefs in an instant when provided with a better argument. Most people don’t
    because it would mean they have to change. If people had to stop considering any
    new opportunity as a scam or Ponzi scheme they’d actually have to do something
    other than sit around and wallow in their own misery. They’d remove their source
    of cheap dopamine: trolling.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: I want to help those who want to be helped.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: I want to give aspiring and current creators the secret to being respected and
    earning more by doing the same thing.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: I’m a writer.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: I teach people how to write.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: Some would say that’s a bit weird, but as I mentioned, what else are you more
    qualified to teach than what you do and have experience in?
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: Now, where it gets tricky is that I’m also a creator.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: So, when I teach writing, I’m technically teaching people how to become a creator.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: I’m a writer that uses social media (because as a writer, designer, musician,
    or anything it’s a bit stupid not to be on social media, because media is how
    you attract an audience to your work (so you actually get paid) and social media
    IS the media right now) so that makes others perceive me as a “creator.”
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: 'In other words, if you:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: Actually want to earn a living doing what you enjoy
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Want to teach or help people with what you do (because you are qualified to
    do that and is a perfectly valid and impactful business model)
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You are at risk for being perceived as a “Ponzi” by stupid people.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: The secret to avoiding this is to understand positioning.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: It’s suboptimal to say “I help people become a creator.”
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: It’s more optimal to say “I teach writing so you can attract people to your
    work.”
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: (I’m not trying to put on my marketer hat right now by the way, these won’t
    be the *best* ways to position yourself.)
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: It’s suboptimal to be a coach that coaches coaches.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: It’s more optimal to have a lead generation system for service businesses and
    to bias your content toward attracting the coaches you want to help.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: You can teach other creators and/or people who want to become creators.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: There’s nothing wrong with that, as technically anyone on social media that
    has a business (which is a *lot* of people, including most of the B2B market)
    is a creator.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: Just position yourself as someone who teaches X for Y benefit.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: I don’t teach creators how to be better creators literally, because that’s not
    that persuasive.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: I teach people how to write to attract people to their work. When I teach this,
    I teach it on social media because that’s the most effective medium for writers
    to use. I’d be doing them a disservice by teaching it any other way.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: If you want to teach marketing, branding, or content… then teach it to whoever
    you want to teach it. You don’t help people become creators explicitly. You teach
    them a skill that solves a problem in their life and helps them reach their desired
    lifestyle, and just by the landscape of work and business, they become creators.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: So, if you want to be perceived as valuable, change how you position what you
    offer.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: How To Start As A One-Person Business
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Another common piece of advice from people who don’t understand the creator
    model is:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: “You should start a *real* business first. Then do the creator stuff.”
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: I get it, I really do, but listen to yourself.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: You’re telling me that I *shouldn’t* leverage one of the best ways to generate
    traffic *for* a business just so I can suffer with your methods of cold email,
    cold calls, and paid ads? That’s not very beginner-friendly now, is it?
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: I get that you have an identity to defend because your business mind was raised
    in an older generation of tactics, but there are better, more accessible ways
    to do things now.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: Technology has allowed people to build one-person media companies, make a great
    living doing so, attract audiences that older generations would be jealous of,
    all at minimal to zero cost thanks to writing on social media.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: The benefits of becoming a creator right now are difficult to contain all in
    one list, but I’ll try.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: You are forced to learn every skill required to run a modern business. This
    is easier than ever thanks to courses, tutorials, and ease of access to tools
    for practice.
  id: totrans-108
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You build an audience, AKA social capital, so when you want to build a startup
    or the business you’ve always dreamed of, you don’t need personal capital or venture
    capital. You have users for your app and customers for your products.
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You have a network beyond your audience. You can reach almost anyone on the
    internet for what you need. If you have 10K followers, and each person following
    them has 500-1000 followers, and the same for the people following them, you effectively
    have a network of 10x your audience. (No, you obviously don’t need a lot of followers
    to earn a living).
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You can do what you enjoy, attract like-minded people, introduce new people
    to your skills and interests, and create a meaningful business model you love
    showing up to every day, even if it’s difficult at times.
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Since your only levers are writing and building products or services, you can
    cut your work times down as much as you want. If my audience is growing with 30
    minutes of writing, and I send them to a good product, I technically don’t have
    to work any longer than that – especially if my 30 minutes of writing generates
    more traffic than someone writing for 8 hours on a book that won’t be seen by
    anyone.
  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: I’ll leave it at that for now.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: How do you actually get started?
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: 1) Start, Then Learn
  id: totrans-115
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The best way to learn is *not* by taking course after course after course until
    you find yourself in tutorial hell with nothing built, no results, and no money.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: The best way to learn is by starting, being overwhelmed, and having no idea
    what you’re doing. That way, your mind is hungry to learn and has something tangible
    to apply that learning to.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: I will tell you right now that you are wasting your time learning from a course
    if you are not actively building along with it.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: Everyone can watch a video on exactly how a top CEO built a billion dollar business
    in record time, but how many people have actually replicated that? If it was as
    easy as following a step by step tutorial (I’m talking to you, people who want
    these letters to be shorter and “to the point”) then everyone would be billionaires
    by now.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: You need both the *right idea* at the right time and experience.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: Experience experience experience.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: Experience is king.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: Experience is *not* only progress.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: Experience is determined by frequency of failure.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: Like fighting a boss in a video game.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: You try once and get destroyed.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: You change your strategy a bit, try again, and still lose.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: You have a better idea, try it, and *almost* win.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: Then you lose 5 more times and question your sanity.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: You turn off the game and touch grass.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: Then, the perfect idea crashes into your mind when you least expect it. You
    boot the game up, go in with confidence, and win with ease.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: Remember this process whenever you are discouraged with your progress. It’s
    all a game.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how you learn:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: '**You need a goal to frame your learning.** In this case, it’s building an
    audience and making an income. If you aren’t making progress toward those, then
    you need to continue learning, testing, and failing until you see follower and
    income growth. If they aren’t growing, it’s a skill issue.'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**You need to start with what you know.** It’s pretty obvious that you need
    a profile on social media, regular content being posted, and some way to monetize
    the people who see it.'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**You need consistent ideas flowing for how to improve your process.** Buy
    courses to see other peoples systems and experiment with them. Have some form
    of inspiration entering your mind every day.'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**You need specific information when you encounter a problem.** Research how
    to solve a problem when you experience it, not before. Like how to start a newsletter
    or design a profile picture or build a website.'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There has never been a point where I learned a specific skill like email marketing
    or graphic design.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: I always started a project, researched exactly what I needed to know to reach
    the goal, then repeated the process.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: Now, I have a stack of skills that actually get results. It’s hard to even consider
    them individual skills at this point, it’s just knowing how to reach a specific
    goal after achieving so many.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: 2) Choose Your Domain Of Mastery
  id: totrans-141
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Back to the topic of specialized generalism.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2178">![](../Images/5f6c1641f3603e1702ecf87a2447187f.png)</picture>
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: Valve, the company that created the video game Half-Life, mentions that their
    company is composed of “T-Shaped” people.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: People who are both generalists and specialists. The top of the “T” represents
    being highly skilled at a broad set of valuable things. The bottom portion represents
    being among the best in one narrow field of study.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 既是通才又是专家的人。T形图的顶部代表在一系列有价值的广泛事物上具有高度技能。底部部分代表在某个狭窄研究领域中处于最佳状态。
- en: This works because when you become skilled at one thing, you become valuable
    in many domains, but you often aren’t aware of how your skill can overlap with
    those domains if you don’t have experience in them.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 这之所以有效，是因为当你在一件事上变得熟练时，你在许多领域都变得有价值，但你通常不会意识到如果你的经验不足，你的技能如何与这些领域重叠。
- en: 'I would argue that I’m very good at writing, not because my grammar or structure
    is the best, but because my other skills help me achieve the main goal of writing:
    sparking behavior change in a positive direction.'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 我会争辩说，我非常擅长写作，并不是因为我的语法或结构是最好的，而是因为我的其他技能帮助我实现了写作的主要目标：激发积极方向的行为改变。
- en: When I consider it from another perspective, writing isn’t my main skill. I
    actually didn’t know what my main skill was until a few people pointed it out
    to me.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 当我从另一个角度来看时，写作并不是我的主要技能。实际上，直到有几个人指出这一点，我才知道我的主要技能是什么。
- en: I’m very good at holding many ideas in my head at once. I can often work through
    entire strategies, business models, or other complex topics and notice all of
    the traps and problems, and with enough time, I can come up with a winning solution.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常擅长同时在大脑中保持许多想法。我经常能够处理整个策略、商业模式或其他复杂主题，并注意到所有的陷阱和问题，而且只要有足够的时间，我就能想出一个获胜的解决方案。
- en: But maybe writing is what led to that. So at the end of the day, just learn
    a lot of stuff and build a lot of stuff.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 但也许正是写作导致了这一切。所以最终，只是学习很多知识，构建很多事物。
- en: 'If I could rephrase what a “T” shaped person or specialized generalist is,
    it’s:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我能重新定义“T”形人或专业通才是什么，那就是：
- en: '*A person who can and will learn any interest or skill toward one project,
    goal, or vision. They understand the mission, their role in it, and what they
    need to learn to make it happen. This is very difficult in corporate positions
    or jobs that don’t allow for autonomy or breaking out of your repetitive routine
    of tasks.*'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: '*一个能够并且愿意为了一个项目、目标或愿景学习任何兴趣或技能的人。他们理解使命，他们在其中的角色，以及他们需要学习什么来实现它。这在企业职位或不允许自主或打破重复性任务常规的工作中是非常困难的。*'
- en: The larger your awareness surface area, the more valuable problems you can solve.
    You stop competing with specialists in a given niche and start solving problems
    that nobody else can solve.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 你的意识范围越大，你能解决的问题就越有价值。你停止与特定利基领域的专家竞争，开始解决其他人无法解决的问题。
- en: To start as a creator, you need value to share. You need content ideas. You
    need something to monetize. You need a reason for people to follow and pay you.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 要成为一个创作者，你需要分享的价值。你需要内容想法。你需要可以盈利的东西。你需要一个让人们跟随并支付你的理由。
- en: I don’t think it helps too much to write these things out and put them in specific
    boxes.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为将这些事情写出来并放入特定的框中并不会帮助太多。
- en: Instead, I’d encourage you to write out 2-3 broad topics that you are very interested
    in and start there.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我鼓励你写出2-3个你非常感兴趣的广泛主题，并从这里开始。
- en: This could be specific skills like marketing and programming or certain interests
    like self-improvement or fitness. As long as they align with goals and projects
    that improve yourself and others, you’ll be fine.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能是一些特定的技能，如市场营销和编程，或者某些兴趣，如自我提升或健身。只要它们与提高自己和他人目标的项目相一致，你就没问题。
- en: Make noise, find signal.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 响应，找到信号。
- en: Start writing and creating about what you find interesting and valuable to your
    life. You will slowly find what you are good at or want to be good at.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 开始写作和创作关于你生活中有趣和有价值的事情。你将逐渐发现你擅长什么或想擅长什么。
- en: 3) Learn The Right Skills First (Habits)
  id: totrans-160
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 首先学习正确的技能（习惯）
- en: Along with your current skills or interests, there are specific skills you need
    to learn to make your creator business a success.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 除了你当前技能或兴趣之外，还有一些特定的技能你需要学习，以使你的创作者业务成功。
- en: '**Writing** – you need to write posts, emails, video scripts, landing pages,
    courses, DMs, and course material. I teach this in [2 Hour Writer](https://2hourwriter.com).'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**写作** – 你需要写帖子、电子邮件、视频脚本、着陆页、课程、直接消息和课程材料。我在[2小时作家](https://2hourwriter.com)中教授这一点。'
- en: '**Speaking** – an alternative to writing for distributing ideas in a consumable
    way, often enhanced by writing first.'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**演讲** – 一种以可消费的方式分发想法的替代写作方式，通常在先写作的基础上得到增强。'
- en: '**Marketing** – understanding how your writing or speaking reaches people,
    where it reaches them, how it impacts them, and what the result of that is (do
    they act or engage toward the goal you are leading them toward?)'
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sales** – crafting your writing in a way that makes people perceive what
    you offer as valuable. Sales is the antidote to starving artistry.'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you were to combine all of these, it would simply be *persuasion.* That’s
    the skill you need to learn. We will discuss it in next week’s letter.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: These are more habits than they are skills. They are habits of successful individuals.
    If you go to any creator, or any successful person for that matter, I can guarantee
    you that most of them (if they are still working in/on the business) are writing
    every single day. It’s a habit. It’s a way of life. It’s the main lever to success.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t write, how are you ever going to produce anything?
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: Writing is the foundational medium of communication.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
- en: Writing is tangible thinking, and you won’t get anywhere if your ideas stay
    in your head.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: Writing is how you build and spread your ideas.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
- en: So, where do marketing and sales come into play?
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: These shape *how* you write and speak.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
- en: If you just write whatever you want, however you want, you’ll end up as an author
    with zero readers or a startup with zero users.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
- en: This doesn’t strip you of your creativity because creativity happens within
    the limitations you provide. In fact, it takes more creativity to remain authentic
    *and* get your message across in the most impactful way possible.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: As an example, it takes much more creativity to build a business 4 hours a day
    without sacrificing your relationships or health than it does to build a business
    while forgetting about anything important in your life. The former also leads
    to much more fulfilling results (and more knowledge/experience).
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
- en: The best marketing and selling aren’t detectable. The most creative people make
    it seem effortless.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: 4) Focus On Eyeballs
  id: totrans-178
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The greatest mistake I see beginners make is that they just don’t understand
    business.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: '**Rule 1)** Generate traffic.'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
- en: '**Rule 2)** Sell a product.'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: '**Rule 3)** Optimize the system that bridges 1 and 2 according to your ideal
    lifestyle.'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
- en: I don’t know what goes on in people’s minds, but if your audience isn’t growing…
    *you’re doing something wrong.* If you aren’t making sales… *you’re doing something
    wrong.*
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
- en: What does that mean?
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
- en: It means there’s a problem.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
- en: And since you’re an entrepreneur, it’s your job to identify it and solve it
    through experimentation and education.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ve given exact strategies for how to control your growth on social media
    before in a bit too much detail. You can find them in this article: [How To Actually
    Grow On Social Media](https://thedankoe.com/letters/how-to-actually-grow-on-social-media-what-they-dont-tell-you/).'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
- en: For now, understand that you need to try everything until something works, then
    systemize it as a habit in your deep work blocks, then continue experimenting
    for life.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
- en: It may be replies to large accounts, paid growth, building a network, or cracking
    the algorithm. Everyone will scream about which ones are better, which ones are
    unethical, and which ones suck. If you listen to them, you may close your mind
    to the one that would have worked for you. Then, you quit and call it a Ponzi,
    lol.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
- en: Try everything, see what sticks.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
- en: A life well lived, not survived, is a series of experiments.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
- en: 5) What To Sell, In What Order
  id: totrans-192
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I’ve also talked about this many times before.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
- en: In [Zero to $1 Million as a One-Person Business](https://thedankoe.com/letters/zero-to-1-million-as-a-one-person-business-while-working-2-4-hours-per-day/)
    I break down how creative work must evolve if you want to work less while earning
    more (without hiring others).
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
- en: 'In my eyes, here’s the best thing you can do:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Create A Minimalist Offer**'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
- en: This is a new concept of mine that I’ll expand on in another letter.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
- en: 'In short, a minimalist offer is:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
- en: What you can help people with
  id: totrans-199
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A payment link
  id: totrans-200
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Optional: A questionnaire for warm traffic'
  id: totrans-201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: No landing pages. No logos. No LLCs. Nothing but talking to your audience about
    their goals and offering to help them in exchange for money.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
- en: When you don’t have a large audience, most of your sales will come from direct
    messages.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
- en: You write content that targets peoples pain points.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
- en: You respond to peoples comments and take conversations to the DMs.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
- en: You ask them about their goals further and give some free education (this creates
    a network for yourself).
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
- en: You mention that you can *teach* them over the next few weeks (and that it would
    cost some money, but not much). You help them achieve their goal with the skills
    / interests you’ve learned. You test what actually gets results and refine your
    own system. Then you can package that up and charge more beyond step 2.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
- en: In other words, you learn to create offers on the fly.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
- en: Nobody actually needs a landing page to close clients. Especially when your
    DMs with the other person serve the purpose of the landing page. It makes them
    aware of pain points and positions yourself as the solution.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
- en: The questionnaire you create would ask them about their goals and what’s preventing
    them from achieving it. You would put it in your bio and in your emails if you
    write them. It’s a way for people to express interest in working with you if you
    aren’t the one DMing them first (be sure to ask for their social handle so you
    can DM them afterward).
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
- en: This is how I started transitioning from freelance web design to “marketing
    consulting” for social media businesses (aka creators). I had conversations and
    mentioned I could help them grow faster (more traffic) and sell more – you know,
    the only two things you can help businesses with regardless of if they’re a creator.
    And if they didn’t have something to sell, I would help them create an offer.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
- en: Remember, positioning.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Optional: Turn It Into A Service Business**'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
- en: If I could go back, I would focus less on services and more on something like
    a cohort-based course.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
- en: And, the first thing I created as a creator was a web design course, not a marketing
    consulting service. That came after.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
- en: Now that I know many respected people like David Perell and Dickie Bush, who
    started with a cohort (and made much more than me), I see that as the optimal
    option.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
- en: Now, if your account isn’t growing month over month, this may not work the best.
    But if you aren’t growing, you have bigger problems than what your offer should
    be. You need to fix that first.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
- en: But if you are truly adamant on it, turn your minimalist offer into a service
    business. Freelancing or coaching. Take your skills and interests, create a system
    to get a specific result, and start researching how to generate leads and close
    deals on sales calls.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Spin It Into A Cohort**'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
- en: Notice how I’m saying “spin” it into a cohort.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
- en: Service businesses are often very specific, targeting more advanced problems.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
- en: With a cohort and other products, you are aiming to get *more people* inside
    at a lower price (but with a delivery structure that allows you to save more time
    and leave client work).
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
- en: At the same time, you can charge very high prices for a cohort and just take
    on less people. David Perell charged upwards of $7K for his. That’s more than
    most service businesses. At that point, you would just treat it as a service business
    and do more manual outreach to close students along the way.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
- en: With a cohort, you are usually going more beginner level so you can help more
    people. You are usually helping them get a desirable result with your main skills
    or interests – like how I teach people how to write in order to build an audience
    for work they enjoy doing.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
- en: A cohort, by the way, is just a structured course that you guide people through.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
- en: You set a start and end date.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
- en: You have a curriculum.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
- en: You have 1-2 calls every week to answer questions and go over material.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
- en: And sometimes you have a community for people to be in.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
- en: '**4) Spin It Into A Digital Product**'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
- en: If you want to start with a digital product, I teach you how in my marketing
    / product development course [Mental Monetization](https://mentalmonetization.com).
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
- en: Now that you clearly know what you’re doing and have results, *spin* a portion
    of what you teach into a digital product.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
- en: The best place to start is your main skill or interests.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
- en: Don’t overcomplicate it.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
- en: Teach the skill or interest in the way you would want to be reached.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
- en: Include projects, templates, tasks, and a curriculum that covers what people
    need to know to reach a desirable end result.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
- en: '**5) Build Something You Want But Doesn’t Exist**'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
- en: At this point, you have an audience, a profitable business, and excess cash
    flow you can invest into a new type of business.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
- en: (Or, you can continue scaling the service business you started by hiring more
    people).
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
- en: You know what your audience wants and needs.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
- en: You can either compliment your current offers with a digital product or software.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
- en: Similar to why we are creating Kortex (and are [launching soon to those on the
    waitlist!)](https://kortex.co).
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 就像我们为什么创建Kortex（并且即将对等待名单上的用户[推出！)](https://kortex.co)一样。
- en: Notion felt bloated and wasn’t nice to write in.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: Notion感觉臃肿，而且不适合写作。
- en: I didn’t have a good way of organizing all of my ideas.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 我没有很好的方法来组织我所有的想法。
- en: Most other second-brain apps were too confusing for the average individual
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数其他第二大脑应用对普通个人来说都太复杂了
- en: So we created something better.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 所以我们创造了一些更好的东西。
- en: This isn’t an impossibility for you.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 这对你来说并不是不可能的。
- en: When you have social capital (vs venture capital) you can really build anything
    you want at that point.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 当你拥有社会资本（而非风险资本）时，你真的可以在这个时候建造任何你想要的东西。
- en: So, depending on where you’re at in your creator journey, I hope this helped
    and I wish you the best of luck.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，根据你在创作者旅程中的位置，我希望这有所帮助，并祝愿你一切顺利。
- en: Thank you for reading.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您阅读。
- en: – Dan
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
