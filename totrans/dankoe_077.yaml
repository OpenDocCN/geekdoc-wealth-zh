  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Use your brain in the morning with creation, output, and focus
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
