- en: Entrepreneurship Is Modern Survival (How To Escape Wage Slavery)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创业是现代生存之道（如何逃离工资奴隶制）
- en: 原文：[https://thedankoe.com/letters/entrepreneurship-is-modern-survival-how-to-escape-wage-slavery/](https://thedankoe.com/letters/entrepreneurship-is-modern-survival-how-to-escape-wage-slavery/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/entrepreneurship-is-modern-survival-how-to-escape-wage-slavery/](https://thedankoe.com/letters/entrepreneurship-is-modern-survival-how-to-escape-wage-slavery/)
- en: This letter may get peoples’ panties in a bunch.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 这封信可能会让一些人感到不安。
- en: So, I ask that you keep an open mind.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我要求你们保持开放的心态。
- en: Without an open mind, there is no chance to receive a kernel of truth (no matter
    how small) from someone else’s perspective in a way that can *help* your life.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 没有开放的心态，就没有机会以*帮助*你的生活的方式从他人的视角中接收哪怕是一粒真理的种子（无论多小）。
- en: Remember, that is my intention.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，那是我的意图。
- en: To help rather than hurt.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 帮助而不是伤害。
- en: If you misinterpret what I say, no matter how harsh, it will be you that hurts
    yourself.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你误解了我的话，无论多么严厉，受伤害的将是你自己。
- en: Even if my intention were to hurt you, some people may see that as a positive.
    If you choose to be hurt, you will be hurt.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 即使我的意图是伤害你，有些人可能会认为那是一种积极的东西。如果你选择受伤，你就会受伤。
- en: If you feel your mind start to close, resist the urge to lash out. You know
    this feeling. It is hard to have any other thought than the negative garbage you’ve
    been programmed with by the external world.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你感觉到你的思维开始封闭，抵制冲动的冲动。你知道这种感觉。很难有其他想法，除了外部世界编程给你的负面垃圾。
- en: With that, let’s get straight in.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样，让我们直接进入正题。
- en: '*You’re a slave.*'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '*你是一个奴隶。*'
- en: I’m a slave.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我是一个奴隶。
- en: Slaves don’t know they’re slaves if everyone else is too.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 如果其他人也都是奴隶，奴隶们就不会意识到自己是被奴役的。
- en: Just because the “slavery” that everyone knows and hates is no longer a thing,
    doesn’t mean that slavery doesn’t still exist.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 就算众所周知且人人痛恨的“奴隶制”已经不复存在，这并不意味着奴隶制仍然不存在。
- en: No, I’m not talking about sex slavery, although many porn abusers could fall
    under that category.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 不，我并不是在谈论性奴隶制，尽管许多色情滥用者可能属于这一类别。
- en: I’m talking about mental and financial slavery.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我在说的是精神和财务上的奴隶制。
- en: Slave (noun) – a person who is forced to work for and obey another and is considered
    to be their property.
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 奴隶（名词）——被迫为他人工作并服从他人，被视为其财产的人。
- en: The key word in that definition is “force.”
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 那个定义中的关键词是“力”。
- en: Force can have multiple definitions and contexts.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 力可以有多个定义和上下文。
- en: 'For the sake of coherence, we are going to use this definition:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保持连贯性，我们将使用这个定义：
- en: Force (noun) – strength or energy as an attribute of physical action or movement.
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 力（名词）——作为物理行动或运动的属性，力量或能量。
- en: In other words, there is something pushing you to do one thing over the other.
    The stronger that “something” is, the more enslaved you are.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，有一种东西推动你去做一件事而不是另一件事。那个“东西”越强，你就越受奴役。
- en: A slave of the past could run away, in some cases, but they would run out of
    food, water, and shelter to the point of death.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 过去的奴隶可以逃跑，在某些情况下，但他们会因食物、水和住所耗尽而面临死亡。
- en: With this said, slavery is influenced by survival.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，奴隶制受到生存的影响。
- en: As we’ve discussed earlier, human survival is not physical, it is conceptual.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们之前讨论的，人类的生存不是物理的，而是概念上的。
- en: Humans survive form, self, ego, or identity. However you want to label a distinction
    within consciousness.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 人类通过形态、自我、自我或身份来生存。你可以用任何方式来标记意识中的区别。
- en: 'Some common examples:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 一些常见的例子：
- en: '**Political Ideologies**'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**政治意识形态**'
- en: If you identify as a Republican or Democrat, and your beliefs are challenged,
    you will feel a *physical stress response* that encourages you to defend those
    beliefs.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你自认为是共和党人或民主党人，并且你的信仰受到挑战，你将感受到一种*身体压力反应*，这会促使你捍卫那些信仰。
- en: Your survival feels threatened because you consider an idea a part of who you
    are, which is also an idea.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 你的生存感受到威胁，因为你认为一个想法是你身份的一部分，而这本身也是一个想法。
- en: '**Sports Teams**'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**体育队伍**'
- en: Have you ever noticed people get visibly angry when they argue about which sports
    team will win? Especially if they have money on the line.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 你有没有注意到，当人们争论哪个运动队会赢时，会变得明显愤怒？尤其是如果他们有赌注的话。
- en: Your “team spirit” makes you feel as if you are a part of something larger than
    yourself. It is your spirituality. But it doesn’t have to make your mental health
    worse.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 你的“团队精神”让你觉得自己是更大事物的一部分。这是你的精神。但这并不意味着它会让你心理健康状况恶化。
- en: '**Your Identity**'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**你的身份**'
- en: Are you a coffee snob? Health expert? Productive person?
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 你是咖啡鉴赏家吗？健康专家？高效的人？
- en: If someone tells you to stop drinking coffee, how do you feel? If someone tells
    you that the keto diet is best, how do you feel? Do you want to educate them on
    what you “know” is best or that you have experience with? The ideology that you
    have attached to your identity and feel the need to survive? Even when you know
    that blanket statements don’t apply to every single person on Earth across different
    cultures with different resources?
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有人告诉你停止喝咖啡，你感觉如何？如果有人告诉你生酮饮食最好，你感觉如何？你想要教育他们关于你“知道”的最好方法，或者你有经验吗？你附加在你身份上的意识形态，并感到需要生存？即使你知道这些笼统的陈述并不适用于地球上不同文化、不同资源中的每一个人？
- en: If you’re productive, and you move to a new location, how do you feel? Your
    routine just got destroyed out of nowhere. You were surviving the form that is
    your routine through effort, energy, and habit. You need a week or two to “acclimate,”
    right?
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你很有效率，你搬到一个新的地方，你感觉如何？你的日常习惯突然被破坏了。你通过努力、能量和习惯来维持你的生存形式。你需要一周或两周来“适应”，对吧？
- en: This is where I am often a slave. To my routines.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我经常成为奴隶的地方。对我的日常习惯。
- en: '**Religious Ideologies**'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**宗教意识形态**'
- en: Even if people say they don’t care to convert you to their belief system, they
    still do so unconsciously. Because they are conditioned to reproduce their identity.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 即使人们说他们不关心将你转化为他们的信仰体系，他们仍然在无意识中这样做。因为他们被训练去繁殖他们的身份。
- en: Survival includes reproduction, and any ideas we transfer to another through
    communication influence the identity of another person.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 生存包括繁殖，我们通过交流传递给另一个人的任何想法都会影响另一个人的身份。
- en: Your “self” is a concept. It is a web of ideas and beliefs. Those ideas and
    beliefs can change with time. Any piece of information you consume has an impact
    on who you are.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 你的“自我”是一个概念。它是一张由想法和信仰构成的网络。这些想法和信仰会随着时间的推移而改变。你消费的任何信息都会影响你。
- en: Hence why mental phone slaves often end up unsuccessful. All they do is consume
    self-deprecating memes and numb their mind to avoid confronting the truth of their
    situation.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么精神上的奴隶通常最终会失败。他们所做的只是消费自我贬低的梗，麻木自己的思想以避免面对他们情况的真相。
- en: Slavery is powerful because if we are conditioned to survive an identity, like
    a job title, and if we think about quitting that job, the force of our survival
    being at stake keeps us tied to it.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 奴隶制之所以强大，是因为如果我们被训练去生存一个身份，比如一个工作头衔，如果我们考虑辞职，我们生存的威胁力量让我们继续留在这个职位上。
- en: Society Is A Pyramid Scheme Of Attention
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 社会是一个关注力的金字塔骗局
- en: If it is not given attention, it doesn’t exist.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 如果没有得到关注，它就不存在。
- en: If it doesn’t exist, attention must be invested for it to survive.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 如果它不存在，就必须投入关注才能让它生存。
- en: 'This brings two realizations:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这带来了两个认识：
- en: '**1) You are contributing to unconscious destruction.**'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 你正在对无意识中的破坏做出贡献。**'
- en: How do mega-corporations grow and thrive?
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 巨型企业是如何成长和繁荣的？
- en: They start small and form a power hierarchy with time.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 他们从小做起，随着时间的推移形成了一个权力等级。
- en: Fewer people with more power at the top, more people with less power at the
    bottom.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 顶层的人少，权力大，底层的人多，权力小。
- en: The top tier of the hierarchy (the company and executives) can only do what
    they do because a plethora of people are giving attention to the tasks, vision,
    and values from the bottom up.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 层级顶端的（公司和高管）之所以能做他们所做的事情，是因为大量的人从底层向上给予关注，关注任务、愿景和价值观。
- en: The bottom is composed of low-skill grunt work, like a cashier at McDonalds,
    and moves up to marketing and business operations until you reach the top.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 底层由低技能的苦力工作组成，比如麦当劳的收银员，然后向上发展到市场营销和商业运营，直到达到顶层。
- en: By nature, it is impossible for a large number of people to rise up this hierarchy.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，大量的人不可能在这个等级制度中上升。
- en: The problem is that people at the bottom are unconscious of the impact they
    have with their work.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 问题在于底层的人们对自己的工作所产生的影响是无意识的。
- en: Like how McDonalds is poisoning the population with their food (do cashiers
    have extensive nutrition and health knowledge? No, or else they wouldn’t be working
    there, they would probably be in the nutrition field).
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 就像麦当劳如何通过他们的食物毒害人口（收银员有广泛的营养和健康知识吗？没有，否则他们就不会在那里工作，他们可能会在营养领域工作）。
- en: Or how military programmers write code for drones that execute orders to kill
    people on the other side of the country.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 或者军事程序员为无人机编写代码，这些无人机在国家的另一边执行杀人命令。
- en: Or even a web designer for a course creator that scams people.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 或者甚至是一个课程创造者的网页设计师，他们欺骗人们。
- en: '*“Forgive them for they know not what they do.”*'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '*“宽恕他们，因为他们不知道自己在做什么。”*'
- en: '**2) You can bring a conscious vision into reality.**'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 你可以将有意识的愿景变为现实。**'
- en: The only way to escape is to build your own thing.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一的逃脱方式是建立你自己的东西。
- en: But this is increasingly difficult when you are a slave to that which sucks
    up your time and energy.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 但当你成为消耗你时间和精力的奴隶时，这变得越来越困难。
- en: It’s taken you 20, 30, maybe even 40 years to drill yourself into this reality.
    It shouldn’t take that long to get out, but have some patience.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 你花了20年、30年，甚至可能40年才将自己钻进这个现实。但走出这个现实不应该花那么长时间，但请有点耐心。
- en: The way out is to [become a value creator.](https://thedankoe.com/letters/the-value-creator-a-new-internet-career-path-for-intelligent-people/)
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 脱离的方法是[成为价值创造者。](https://thedankoe.com/letters/the-value-creator-a-new-internet-career-path-for-intelligent-people/)
- en: True value is creative.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 真正的价值是创造性的。
- en: Creativity allows for change and emergence.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 创造力允许变化和出现。
- en: It allows the form, ego, or identity it was trying to survive to evolve into
    something new.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 它允许形式、自我或身份进化成新的东西。
- en: If the only value you have to offer is physical, you will get stuck in manual
    labor jobs (while the people at the top earn with their minds).
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你唯一能提供的价值是物理的，你将陷入体力劳动的工作（而那些在顶端的人用他们的头脑赚钱）。
- en: 'As we always talk about, you must:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们总是谈论的，你必须：
- en: Push the boundaries of the unknown
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 推动未知领域的边界。
- en: Learn and discover new potentials along the way
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在路上学习和发现新的潜力。
- en: Acquire the skills necessary to build a purposeful product
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获得构建有目的产品的必要技能。
- en: Solve your own problems so you create a solution of true value
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解决你自己的问题，这样你就能创造出一个真正有价值的问题。
- en: Start a business as a vessel to actualize your vision for the future
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以创业作为实现你对未来愿景的载体。
- en: You must create your own conscious hierarchy that minimizes unconscious destruction.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须创造自己的有意识层次，以最大限度地减少无意识破坏。
- en: The Wage Slave
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工资奴隶
- en: I’m tired of both sides of the argument.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 我厌倦了争论的双方。
- en: “9-5 workers are slaves!”
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: “9-5的工人是奴隶！”
- en: “It’s okay Johnny, if you work a 9-5 you aren’t a slave.”
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: “约翰尼，如果你做9-5工作，你并不是奴隶。”
- en: Both are wrong. Both are right.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 两者都是错误的。两者都是正确的。
- en: Both are trying to get maximum engagement and boost the status of their brand.
    They don’t zoom out and think if people are actually slaves. A published idea
    without depth and understanding is a disservice to humanity.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 两者都在试图获得最大的参与度和提升他们品牌的地位。他们没有退后一步思考人们是否真的是奴隶。没有深度和理解的观点对人类是一种伤害。
- en: The fact of the matter is that 95%+ of 9-5 workers are slaves.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，95%以上的9-5工人都是奴隶。
- en: Your feelings don’t matter here. If you do feel threatened by words on a screen,
    then maybe there is some truth to what I’m saying. Look inward and see what you
    are hiding from.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 你的感受在这里不重要。如果你觉得屏幕上的文字让你感到威胁，那么我所说的可能有一些真理。向内看，看看你在隐藏什么。
- en: Most workers are the literal definition of a slave.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数工人是奴隶的直白定义。
- en: If you cannot stop showing up to work for your survival and have no skills to
    open other options immediately, and you are the “property” or *employee* of a
    certain company… that’s a slave.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不能停止为了生存而工作，没有立即开启其他选择的技能，并且你是某个公司的“财产”或*雇员*…那就是一个奴隶。
- en: Now, this doesn’t mean you can’t be happy.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这并不意味着你不能快乐。
- en: Everyone is a slave in one way or another, and we all have waves of happiness
    in our life.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都以某种方式成为奴隶，我们都在生活中经历着快乐和痛苦的波动。
- en: If happiness is the feeling we get when our attention is distracted from the
    vast unhappiness in the world, then slavery may make some people happier than
    non-slaves.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 如果快乐是我们从世界的巨大不幸中分心时获得的感受，那么奴隶制可能会让一些人比非奴隶更快乐。
- en: You can be happy (at points in your life) while being unconscious of the problems
    in your life.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在生活中（在某些时刻）快乐，同时没有意识到生活中的问题。
- en: But once you are aware of them, truly aware of them, then you will feel the
    pull to evolve.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 但一旦你真正意识到它们，你将感受到进化的拉力。
- en: I am not here to demonize 9-5 jobs.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是来诋毁9-5工作的。
- en: I see them as a *necessary* stepping stone.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为它们是一个*必要的*垫脚石。
- en: I also see entry-level business models like agency work, freelancing, coaching,
    and even digital products as stepping stones in your life’s work. They can easily
    enslave you.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我还认为入门级商业模式，如代理工作、自由职业、辅导甚至数字产品，是你人生工作中的一块垫脚石。它们很容易让你成为奴隶。
- en: A personal brand, however, is not a business model. It is how you build an audience
    for any product or service you wish to distribute as you evolve.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，个人品牌并不是商业模式。它是你在发展过程中为任何你希望推广的产品或服务建立受众的方式。
- en: A personal brand is your character in the digital society.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 个人品牌是你在数字社会中的性格。
- en: Many people *will* get trapped in a certain level of the hierarchy. Maybe that’s
    their destiny. And that’s fine.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人*会*陷入等级制度中的某个层次。也许那就是他们的命运。而且那也行。
- en: Virtual realities, like video games, have a constructed society that is held
    together by NPCs (Non-Player Characters). On the internet, these are the unconscious
    trolls, consumers, and reply guys.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 虚拟现实，如视频游戏，有一个由NPC（非玩家角色）构成的社会，这些NPC在互联网上是无意识的捣乱者、消费者和回复者。
- en: The truth is that most people will remain unconscious of the impact they have
    on the world.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 事实是，大多数人将不会意识到他们对世界的影响。
- en: I can’t change them, you can’t change them, but we can change what we do in
    our own lives.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我无法改变它们，你无法改变它们，但我们可以在自己的生活中改变我们所做的事情。
- en: Entrepreneurship Is Modern Survival
  id: totrans-101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创业是现代生存之道
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1362">![](../Images/554041d72500cd418eacd92d8971282f.png)</picture>
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1362">![](../Images/554041d72500cd418eacd92d8971282f.png)</picture>
- en: Entrepreneurship is the only logical option for long-term thinkers.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 对于长期思考者来说，创业是唯一合理的选项。
- en: If you stay in a 9-5 job for too long, you become a monkey in a cubicle.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你长时间待在9-5的工作中，你将变成一个格子间的猴子。
- en: Your psyche is wired to hunt.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 你的心理被编程为狩猎。
- en: To hunt is to make novel discoveries that aid in your survival.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 通过狩猎，你可以做出新颖的发现，这有助于你的生存。
- en: Imagine our ancestors walking by a bare bush every day. It doesn’t serve their
    future.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 想象我们的祖先每天经过一个光秃秃的灌木丛。它对他们未来的发展没有帮助。
- en: But one day, it grows new berries.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 但有一天，它长出了新的浆果。
- en: Somebody walks by it, they notice it, and that novelty causes excitement. They
    either gather the berries or remember them for later so they can survive longer.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 有人经过它，注意到它，这种新奇性引起了兴奋。他们要么收集浆果，要么记住它们以便以后生存更长。
- en: When you get stuck in a 9-5 (or a new 9-5 like an agency or freelancing) you
    live in the eternal known. You can’t make new discoveries in the known.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 当你陷入9-5（或新的9-5，如代理或自由职业）时，你生活在永恒的已知中。你无法在已知中做出新的发现。
- en: You get bored, depressed, and see life as meaningless because the only dopamine
    you get is from superficial sources.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 你感到无聊、抑郁，并认为生活毫无意义，因为你得到的多巴胺只来自表面来源。
- en: You never take risks, push into the unknown, and discover new knowledge, tools,
    and potentials that raise dopamine levels in the brain.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 你从不冒险，进入未知领域，发现新的知识、工具和潜力，这些都能提高大脑中的多巴胺水平。
- en: You must evolve.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须进化。
- en: Entrepreneurship is the path of uncertainty.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 创业是一条充满不确定性的道路。
- en: Like slashing your way through the jungle.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 像在丛林中砍伐一样。
- en: You are required to learn skills that aren’t taught in schools.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要学习学校里没有教授的技能。
- en: You are required to be okay with failure, rejection, and slow progress.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要接受失败、拒绝和缓慢的进步。
- en: You are required to learn from your mistakes, show up again tomorrow, and push
    until your strike gold.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要从你的错误中学习，明天再次出现，并一直努力直到找到金子。
- en: As an entrepreneur, you “hunt” for your survival by gathering knowledge, creating
    a valuable product, and putting it in front of people that could benefit from
    it.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名企业家，你通过收集知识、创造有价值的产品并将其展示给可能从中受益的人来“狩猎”你的生存。
- en: 'As I’ve discussed, my path for doing this is to:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我之前讨论的，我这样做的方法是：
- en: Start a personal brand as the foundation
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以个人品牌作为基础开始
- en: Solve your own problems in the real world (health, wealth, relationships)
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在现实世界中解决你自己的问题（健康、财富、人际关系）
- en: Distribute your findings, opinions, and beliefs via writing
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过写作分发你的发现、观点和信念
- en: Start with a freelance or coaching service and get results
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从自由职业或咨询服务开始，并取得成果
- en: Sell a physical or digital product that requires less time invested (once your
    audience grows)
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 销售需要投入较少时间（一旦你的受众增长）的实体或数字产品
- en: Make a hefty income in 2-4 years with persistence and iteration
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过坚持不懈和迭代，在2-4年内获得丰厚的收入
- en: Expand your vision for the future and build whatever you want to get there (software,
    spaceships, whatever you want)
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 扩大你对未来的愿景，并建立你想要达到的一切（软件、宇宙飞船，等等）
- en: This is the entire process I give, with templates and education, inside [Digital
    Economics](https://digitaleconomics.school).
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我提供的整个流程，包括模板和教育，都在[数字经济学](https://digitaleconomics.school)内部。
- en: Skill & Opportunity
  id: totrans-129
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 技能与机会
- en: I am a slave to many things in life, but I would like to believe that I’ve escaped
    wage slavery.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 我在生活中对许多事情都感到奴隶般的存在，但我希望相信我已经逃离了工资奴隶制。
- en: 'If my business got wiped from the face of the earth, I can still:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我的业务从地球上消失，我仍然可以：
- en: Create a product or service that someone else needs
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个其他人需要的产品或服务。
- en: Call, email, advertise, and spread internet content to drive traffic to that
    offer
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打电话、发电子邮件、做广告和传播互联网内容，以推动流量到那个报价。
- en: Make $5-10K in the first month and improve that with the data I’ve gathered
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在第一个月赚5-10K，并利用我所收集的数据来提高这个数字。
- en: Why can I do this but most can’t?
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我能做到而大多数人不能？
- en: Because over the past 10 years, I’ve learned graphic design, video editing,
    copywriting, psychology, web development, marketing, sales, email marketing, speaking,
    audience building, advertising, product design, course creation, idea generation,
    lifestyle design, bodybuilding, nutrition, and more that people struggle with.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 因为在过去10年里，我学习了图形设计、视频编辑、文案写作、心理学、网页开发、营销、销售、电子邮件营销、演讲、受众建设、广告、产品设计、课程创建、创意生成、生活方式设计、健身、营养等等，这些都是人们感到困难的事情。
- en: With $0 to my name, I could create a service that teaches people how to create
    a landing page that sells.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 即使身无分文，我也能创建一个教授人们如何创建销售着陆页的服务。
- en: I would charge $1000-$2500 for a 4-call “boot camp” depending on how I want
    to structure the offer.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 我会根据我想要如何构建报价来收取1000-2500美元的4次电话“训练营”费用。
- en: I would target new businesses that have a full website (because that isn’t even
    close to an optimal way to sell a product or service). Or I would target students
    who want to learn a profitable skill outside of employment. Or I would target
    creators that want the first step in monetizing their brand outside of platform
    revenue.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 我会针对那些拥有完整网站的新业务（因为那甚至不是销售产品或服务的最佳方式）。或者我会针对那些希望在就业之外学习有利可图技能的学生。或者我会针对那些希望在平台收入之外将品牌货币化的创作者。
- en: I would spend 3 hours in the morning DMing people and writing marketing content
    online.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 我会在早上花3个小时与人DM和在线撰写营销内容。
- en: People will read this and try to replicate it.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 人们会阅读这篇文章并试图复制它。
- en: Yet, they will fail because they don’t understand how powerful *experience*
    is. There are so many subtle nuances and thought processes that a beginner has
    to reprogram with effort.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，他们会失败，因为他们不理解经验有多强大。有许多微妙的细微差别和思维过程，初学者必须努力重新编程。
- en: When you go to school, you are narrowed in on a few select skills that train
    you into an employable position.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 当你去学校时，你会专注于几项选定的技能，这些技能会训练你成为一个可雇佣的职位。
- en: With every skill I learn outside of school, I can spot multiple opportunities
    that allow me to earn an income outside of a job.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 在学校之外学习的每一项技能，我都能发现多个机会，让我在非工作状态下赚取收入。
- en: This effect compounds.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 这种效果会累积。
- en: With the skills I’ve developed, I can write out 50 different products that I
    know will be profitable within the first 6 months of my efforts.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经培养的技能，我可以写出50种不同的产品，我知道在努力的第一个月内它们将会盈利。
- en: Skill is determined by experience here.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，技能是由经验决定的。
- en: You can’t just learn about them and expect to see what I can in the market.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 你不能只是了解他们并期望看到我在市场上能看到的东西。
- en: You haven’t failed to the point of understanding the nuance behind all of this
    business stuff.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 你还没有失败到理解所有这些商业事务背后细微差别地步。
- en: 'If you want to escape, here’s how you discover opportunity and develop the
    skill to actualize it:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要逃离，这是你发现机会和培养实现它的技能的方法：
- en: '**1) Drown In New Information To Program Your Mind**'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 沉浸在新信息中，以编程你的思维**'
- en: Most people are drowning in information that has nothing to do with their goals.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人都沉浸在与他们目标无关的信息中。
- en: They don’t have a vision, goal, or problem to interpret information through.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 他们没有愿景、目标或问题来通过信息进行解读。
- en: Chances are you’ve already read life-changing information, but it didn’t register
    in your awareness.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 很可能你已经阅读了改变一生的信息，但它并没有在你的意识中留下印象。
- en: 'With the goal of “escaping wage slavery” at the top of your mind, you can:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 当“摆脱工资奴隶制”的目标始终牢记在心时，你可以：
- en: Schedule a minimum of 20 minutes dedicated to consuming information that will
    help with that goal.
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安排至少20分钟专门用于消费有助于实现该目标的信息。
- en: Buy books, use your Audible credits, save podcasts, follow new social accounts,
    and add new videos to your “Watch Later” on YouTube
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 购买书籍、使用你的Audible积分、保存播客、关注新的社交媒体账户，并在YouTube上添加新的“稍后观看”视频。
- en: Get out of your house, have a notes app open on your phone, and write down your
    discoveries as you immerse yourself in the information.
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 离开你的房子，在手机上打开笔记应用，在你沉浸在信息中时记下你的发现。
- en: You will feel the dopamine in your brain on your hunt for a better life.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 在你寻找更好生活的过程中，你会在大脑中感受到多巴胺。
- en: '**2) Study Purposeful Businesses You Aspire To Build**'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 研究你渴望构建的有目的性的业务**'
- en: Now that you have a consumption habit, you need a more practical goal to apply
    what you are learning.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你有了消费习惯，你需要一个更实际的目标来应用你所学的。
- en: What business do you build to escape wage slavery?
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 你要建立什么样的业务来摆脱工资奴隶的身份？
- en: Take mental note of the apps and activities you incorporate on a daily basis.
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在心中记下你每天融入的应用和活动。
- en: Look at who you follow and the businesses they’ve built.
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 看看你是跟随谁，他们建立了哪些业务。
- en: Buy a book or course on a specific business model that interests you.
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 购买一本关于你感兴趣的具体业务模式的书籍或课程。
- en: You must discover a business model that you feel pulled to build.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须发现一个你感到被吸引去构建的业务模式。
- en: One you can become obsessed with.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 一个你可以着迷的。
- en: It doesn’t matter which one it is.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 哪一个都无关紧要。
- en: '*Emulation* built my first successful businesses.'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: '*模仿* 帮助我建立了第一个成功的商业。'
- en: It helped me identify blindspots.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 这帮助我识别了盲点。
- en: Those blindspots were usually the crucial piece that kept me from seeing success.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 那些盲点通常是阻止我看到成功的关键部分。
- en: Get in the habit of studying people you want to be like, downloading and purchasing
    everything they have to offer, and making a mindmap of everything they have online
    (social media profiles, websites, landing pages, email sequences, products, services,
    lead magnets, books, everything).
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 养成研究你想要成为的人的习惯，下载并购买他们提供的所有东西，并制作一个他们在线上所有内容的思维导图（社交媒体档案、网站、着陆页、电子邮件序列、产品、服务、吸引物、书籍等）。
- en: Reverse engineer what allows them to be successful.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 反向工程那些使他们成功的原因。
- en: If you don’t know what to do after that, I don’t know what to tell you.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道接下来该做什么，我不知道该告诉你什么。
- en: '**3) Become Your Own Dopamine Dealer**'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 成为你的多巴胺经销商**'
- en: My friend and I were having a discussion the other day.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 我和我的朋友前几天在讨论。
- en: I’ll paraphrase what he said.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 我会转述他说的。
- en: '*You know what’s wild… I remember asking you why none of your friends take
    action or follow in your footsteps. I get it now.*'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: '*你知道吗，很疯狂……我记得问你为什么你的朋友们都不采取行动或跟随你的脚步。我现在明白了。*'
- en: '*People are dopamine junkies, even businessmen.*'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: '*人们都是多巴胺上瘾者，即使是商人。*'
- en: '*The people that don’t take action don’t know how to replace the dopamine they
    are getting from their current habits with business**.*'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: '*那些不采取行动的人不知道如何用商业**来替代他们从当前习惯中获得的多巴胺**。'
- en: '*So, they either don’t start or quit after a week because they couldn’t get
    their hit.*'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: '*所以，他们要么根本不开始，要么在一周后放弃，因为他们无法获得刺激。*'
- en: This made me think back and realize what made it work for me.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 这让我回想起并意识到是什么让它对我有效。
- en: I was constantly chasing that good ol’ dopamine, but in the right direction.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直在追逐那种美好的多巴胺，但方向是正确的。
- en: 'So, my advice:'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，我的建议：
- en: Hold a loose idea of what you want in life (money, success, peace, fulfillment).
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对你想要在生活中得到的东西（金钱、成功、和平、满足）有一个宽松的想法。
- en: Start building something, anything, that will make that a reality – I would,
    of course, recommend a one-person business because it is long-term.
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始构建一些东西，任何东西，让它成为现实——当然，我会推荐一个单人企业，因为它具有长期性。
- en: Learn what you want to learn the most to help build it (skills, courses, websites,
    logos, whatever) so you get your dopamine hit.
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习你最想学习的知识，以帮助构建它（技能、课程、网站、标志等），这样你就能获得多巴胺的刺激。
- en: Don’t be afraid to change what you are doing if you get bored.
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你感到无聊，不要害怕改变你正在做的事情。
- en: I attribute my unique success to “shiny object syndrome.”
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 我把我的独特成功归因于“闪亮物体综合症”。
- en: I tried and [failed at 7 different business models.](https://thedankoe.com/letters/i-failed-at-7-online-business-models-and-turned-it-into-a-full-time-creative-income/)
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 我尝试过7种不同的商业模式，都失败了。[（https://thedankoe.com/letters/i-failed-at-7-online-business-models-and-turned-it-into-a-full-time-creative-income/）]
- en: What most don’t see is that I wouldn’t be here without those failures.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人看不到的是，没有那些失败，我就不会在这里。
- en: The skills I learned with each compounded into better opportunities.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 我学到的每一项技能都累积成了更好的机会。
- en: My tweets wouldn’t be the same without copywriting.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 没有文案，我的推文就不会是现在这样。
- en: My web pages wouldn’t be the same without web design.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 没有网页设计，我的网页就不会是现在这样。
- en: My profile picture and branding wouldn’t be the same without Photoshop art.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 没有Photoshop艺术，我的个人资料图片和品牌形象就不会是现在这样。
- en: The list goes on.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 列表还在继续。
- en: Replace the habits that keep you enslaved with habits that will break you free.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 用能让你解脱的习惯来替代让你受奴役的习惯。
- en: It won’t happen immediately.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 这不会立即发生。
- en: Be okay with that.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 对此感到满意。
- en: If you can stay on the path, you win.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能够坚持在这条路上，你就赢了。
