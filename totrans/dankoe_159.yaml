- en: How To Achieve Big Goals So Fast It Feels Like Cheating
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/why-you-fail-at-almost-everything-you-do/](https://thedankoe.com/letters/why-you-fail-at-almost-everything-you-do/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'If you want to understand why most people don’t achieve anything great, you
    need to understand this:'
  prefs: []
  type: TYPE_NORMAL
- en: Learned helplessness is a psychological condition where a person or animal learns
    to behave helplessly in a particular situation, even when the opportunity to avoid
    or escape it is available. It occurs after an individual has experienced repeated
    aversive stimuli (e.g., pain, failure) that they cannot control. As a result,
    they come to believe that their actions have no effect on the environment, and
    they give up trying to change their circumstances.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You know those people.
  prefs: []
  type: TYPE_NORMAL
- en: You probably have that friend who never believes they can’t do anything. It’s
    difficult to talk with them because it’s just depressing. Like dude, how can you
    not see that *it is possible?*
  prefs: []
  type: TYPE_NORMAL
- en: You see this everywhere online.
  prefs: []
  type: TYPE_NORMAL
- en: People don’t even *try* anymore, and there’s a deep reason behind it.
  prefs: []
  type: TYPE_NORMAL
- en: 'They’re presented with opportunities to start a business, meet new people,
    or change their life as a whole and their unconscious, automatic, and programmed
    response is:'
  prefs: []
  type: TYPE_NORMAL
- en: Sounds like a scam
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I can’t do that because…
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: But what if it doesn’t work?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is a critical flaw in their self-development.
  prefs: []
  type: TYPE_NORMAL
- en: It’s called *selective skepticism.*
  prefs: []
  type: TYPE_NORMAL
- en: Their mind can’t see a potential future where they do well. Their beliefs trap
    where their thoughts can go in this small little bubble. Their attention can’t
    transcend the problem. And if your decisions create your future, you can see that
    this only leads to a mediocre life.
  prefs: []
  type: TYPE_NORMAL
- en: 'The brutal truth is this:'
  prefs: []
  type: TYPE_NORMAL
- en: You haven’t failed enough.
  prefs: []
  type: TYPE_NORMAL
- en: You gave up too soon, and you didn’t learn how to view failure as the only path
    to success.
  prefs: []
  type: TYPE_NORMAL
- en: Now, success is mostly about winning the internal battle between your lower
    and higher self. It’s a mind game, and you lose that game when you accept that
    negative outcomes for your life are the only outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: You win the game when you cultivate a mind that can thrive in any domain of
    life.
  prefs: []
  type: TYPE_NORMAL
- en: 'So that’s what we need to do, and I have a few tricks for you in this letter:'
  prefs: []
  type: TYPE_NORMAL
- en: How to become a strategic thinker like the most successful people in history.
    We’ll break down the 7 principles.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: How to simulate failure *before* you even start with the Pre-Mortem Technique
    (so you can prepare your mind to do hard things).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: But first, we need to start from ground zero.
  prefs: []
  type: TYPE_NORMAL
- en: You need the *belief* before you can effectively *act.*
  prefs: []
  type: TYPE_NORMAL
- en: You need to learn how to reprogram your mind to love failure and uncertainty.
  prefs: []
  type: TYPE_NORMAL
- en: Winning The Mind Game
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What is your aim in philosophy? — To show the fly the way out of the fly-bottle.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Ludwig Wittgenstein
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You have a project you want to build.
  prefs: []
  type: TYPE_NORMAL
- en: You have a goal you want to achieve.
  prefs: []
  type: TYPE_NORMAL
- en: You have an idea for the life you want to live.
  prefs: []
  type: TYPE_NORMAL
- en: It could be making millions of dollars, marrying a person you couldn’t see yourself
    without, losing weight, learning a skill, or anything else that leads to growth
    because humans have an intrinsic desire to break out of one shell, then the next,
    then the next.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s the thing:'
  prefs: []
  type: TYPE_NORMAL
- en: Everything is a mind game within one big mind game.
  prefs: []
  type: TYPE_NORMAL
- en: In order to play the mind game, you must understand how the mind works.
  prefs: []
  type: TYPE_NORMAL
- en: We’re going to go a bit deep before we talk about practical steps.
  prefs: []
  type: TYPE_NORMAL
- en: If you skip trying to understand the root cause of your failure, the practical
    steps won’t help you in the slightest.
  prefs: []
  type: TYPE_NORMAL
- en: Stick with me and try to understand.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s dissect the mind so you can change your own:'
  prefs: []
  type: TYPE_NORMAL
- en: 1 – The Mind As An Interpretive Filter
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The mind makes sense of the world in stories.
  prefs: []
  type: TYPE_NORMAL
- en: Stories are web of symbols that create a bigger picture.
  prefs: []
  type: TYPE_NORMAL
- en: Games are an interactive story composed of challenging goals to achieve, rules
    to obey, and actions you can choose to take that result in an increase in skill.
  prefs: []
  type: TYPE_NORMAL
- en: A story, or game, provides the mind with a “frame” to maintain order and clarity.
    It gives you fulfilling steps to take toward the end goal.
  prefs: []
  type: TYPE_NORMAL
- en: And if you don’t understand the story your are living out, or the game you are
    playing, you can’t make sense of your place in the world. You lose purpose. Entropy
    ensues and you get lost in chaos.
  prefs: []
  type: TYPE_NORMAL
- en: The thing is, everyone is living out a story, but most people aren’t aware of
    what that story is or where it’s leading.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, they haven’t created a strategy like we soon will.
  prefs: []
  type: TYPE_NORMAL
- en: They’re pursuing the unconscious goals that their parents and society put into
    their head. They are playing the game of being a *useful worker* rather than a
    free and fulfilled individual.
  prefs: []
  type: TYPE_NORMAL
- en: People try to play the game of starting a business or losing weight with the
    programmed mind of an employee or overweight person and wonder why they fail.
    The don’t understand that to achieve anything in life, you must *become* the person
    who both sees that as a possibility and has the skill to achieve it.
  prefs: []
  type: TYPE_NORMAL
- en: How your mind interprets the world is largely dependent on your *identity or
    who you are.*
  prefs: []
  type: TYPE_NORMAL
- en: Your identity is a web of ideas, beliefs, goals, and values that act as a mental
    “filter.”
  prefs: []
  type: TYPE_NORMAL
- en: You notice information that helps you achieve your goals (or win the game).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You notice information that aligns with whats important to you, or your values
    (the rules of the game).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You notice information that confirms your beliefs (how you think the game should
    be played).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Two different people, with different goals, playing different games, can read
    the same book and come away with entirely different conclusions.
  prefs: []
  type: TYPE_NORMAL
- en: Those conclusions are then used to make decisions. Those decisions compound
    into success or failure.
  prefs: []
  type: TYPE_NORMAL
- en: Do you see why this is important?
  prefs: []
  type: TYPE_NORMAL
- en: '*You fail at almost everything you do because you fail to interpret reality
    in a way that provides you with the information you actually need to succeed.*'
  prefs: []
  type: TYPE_NORMAL
- en: In any given situation, you can interpret it in 1000 different ways. Maybe 5
    of those interpretations will help you succeed, but your mind can’t comprehend
    those 5 ways.
  prefs: []
  type: TYPE_NORMAL
- en: You can’t make progress because your mind *rejects* the information you need
    to make progress.
  prefs: []
  type: TYPE_NORMAL
- en: This goes far beyond getting information from a book.
  prefs: []
  type: TYPE_NORMAL
- en: What is your relationship with failure? Do you see that as the only source of
    reliable information to base your decisions on? Or do you see it as a reason to
    crawl back into your hole and give up?
  prefs: []
  type: TYPE_NORMAL
- en: Do you not realize that growth is like being a lobster?
  prefs: []
  type: TYPE_NORMAL
- en: That it is *painful* to grow too big for your shell. And if you don’t remove
    it, the pain only intensifies until *death.* If you do decide to remove it, which
    most don’t, you will be *vulnerable.* You will go through a period of building
    a new shell.
  prefs: []
  type: TYPE_NORMAL
- en: The shell is your identity, by the way.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, your identity is shaped in 2 main ways:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Social conditioning:** You adopt the goals or games of your parents, teachers,
    and friends. As a child, you are a learning sponge that doesn’t know right from
    wrong.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Conceptual survival:** Humans notice and remember information that aids in
    their survival. It’s how we’re wired.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The thing is, we aren’t animals, and most of us aren’t under the constant threat
    of being attacked by a bear like our ancestors.
  prefs: []
  type: TYPE_NORMAL
- en: Humans don’t only try to protect and reproduce their physical form like animals.
    They don’t only try to pass on the information in their genes. They protect and
    reproduce their *identity. Their mental or conceptual form.* They try to pass
    on the information in their consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: This is why we write books. This is why we feel offended and lash out—trying
    to impregnate their mind with their beliefs—when someone challenges our political
    ideology. This is why we feel stressed when we aren’t making progress toward our
    goals.
  prefs: []
  type: TYPE_NORMAL
- en: Almost all of your pain, insecurity, and lack of progress boils down to you
    being trapped in the shell of your lower self that is doing everything it can
    to stay the same. You refuse to open your mind, or remove your shell, so you can
    actually *see* that a better life *is* possible.
  prefs: []
  type: TYPE_NORMAL
- en: Your identity isn’t some set-in-stone thing that you were assigned at birth
    along with your name. It’s a living, breathing, and evolving entity.
  prefs: []
  type: TYPE_NORMAL
- en: You aren’t helpless.
  prefs: []
  type: TYPE_NORMAL
- en: You’ve just learned to be.
  prefs: []
  type: TYPE_NORMAL
- en: 2 – Mistakes Are The Only Source Of Truth
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Here’s the thing:'
  prefs: []
  type: TYPE_NORMAL
- en: Most people try and try and try just to fail and fail and fail because they
    try to match someone else’s map to their territory.
  prefs: []
  type: TYPE_NORMAL
- en: Courses, books, podcasts.
  prefs: []
  type: TYPE_NORMAL
- en: They don’t realize that these things *are* maps.
  prefs: []
  type: TYPE_NORMAL
- en: They are guides. Not truth. They are useful, but only if you understand that
    they are nothing but a candle off in the distance that guides you through a dark
    room. They do not determine the direction of your steps or if you stumble into
    a pit of snakes.
  prefs: []
  type: TYPE_NORMAL
- en: Further, you do not have access to someone else’s state of mind. You do not
    have access to how *they* perceive the world. You do not have their same exact
    identity.
  prefs: []
  type: TYPE_NORMAL
- en: '**This leads to one crucial and counterintuitive realization:**'
  prefs: []
  type: TYPE_NORMAL
- en: Mistakes are the only source of truth.
  prefs: []
  type: TYPE_NORMAL
- en: Not the thoughts in your head. Not the advice of a billionaire.
  prefs: []
  type: TYPE_NORMAL
- en: Failure is the only teacher that is absolutely 100% tailored to your situation.
  prefs: []
  type: TYPE_NORMAL
- en: Failure has a signal to noise ratio or 100:1.
  prefs: []
  type: TYPE_NORMAL
- en: But you hate failure.
  prefs: []
  type: TYPE_NORMAL
- en: You let it rule your life.
  prefs: []
  type: TYPE_NORMAL
- en: You ignore it and dig your head into more courses, books, and podcasts.
  prefs: []
  type: TYPE_NORMAL
- en: Everything you learn that is not derived from mistakes is derived from theory.
    It is derived from a map. It is but a conjecture formed through the interpretation
    of mistakes made by another person.
  prefs: []
  type: TYPE_NORMAL
- en: 'That leads to the question:'
  prefs: []
  type: TYPE_NORMAL
- en: How do you make better mistakes, in the right direction, and learn from those
    mistakes in a way that leads to success?
  prefs: []
  type: TYPE_NORMAL
- en: And lastly, for the end of this letter, how do you fail before you even start
    to start learning immediately?
  prefs: []
  type: TYPE_NORMAL
- en: How To Change Your Life With Strategic Thinking
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Strategy is not a lengthy action plan. It is the evolution of a central idea
    through continually changing circumstances.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Lawrence Freedman
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Most people’s lives are mediocre due to a lack of strategic thinking.
  prefs: []
  type: TYPE_NORMAL
- en: Successful people, on the other hand, are highly strategic.
  prefs: []
  type: TYPE_NORMAL
- en: They don’t just let life happen to them. They reject the default path they were
    assigned. They choose the game they want to play, both for their ideal life and
    the games that allow them to get there. They become the person that can win that
    game through skill acquisition and learning.
  prefs: []
  type: TYPE_NORMAL
- en: So, to win any game you choose to play, you need a strategy.
  prefs: []
  type: TYPE_NORMAL
- en: '[→ Here is a document to fill out accordingly as you read.](https://app.kortex.co/public/document/564f7219-7cf6-4cdd-86e2-e71895631781)'
  prefs: []
  type: TYPE_NORMAL
- en: If you download the desktop app for Kortex, you can press Alt or Option+D to
    open a floating note as you read.
  prefs: []
  type: TYPE_NORMAL
- en: 'Onto the strategy:'
  prefs: []
  type: TYPE_NORMAL
- en: 1 – Strategic Intent
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You need direction.
  prefs: []
  type: TYPE_NORMAL
- en: You need a new goal from which your mind perceives the world.
  prefs: []
  type: TYPE_NORMAL
- en: First, think of everything you *hate* about your current life.
  prefs: []
  type: TYPE_NORMAL
- en: The job? The body? Your routine? How you feel? Start somewhere.
  prefs: []
  type: TYPE_NORMAL
- en: Second, think of a few potential possibilities for your future life.
  prefs: []
  type: TYPE_NORMAL
- en: Starting a business. Being fit and energetic. Living out *your* ideal day.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t dwell on this. Write a few things down and continue.
  prefs: []
  type: TYPE_NORMAL
- en: Choose the macro game you want to play.
  prefs: []
  type: TYPE_NORMAL
- en: 2 – Self Analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Your identity clearly isn’t serving you.
  prefs: []
  type: TYPE_NORMAL
- en: So, you need to become aware of all of your sticking points by performing a
    SWOT analysis.
  prefs: []
  type: TYPE_NORMAL
- en: '**Strengths** – simple, what are your strengths and talents? What comes easy
    to you? If you respond with a cop out answer of “nothing,” you are lying and already
    can’t see past the reactions your lower self is feeding your mind to spit out
    like a robot. Think harder.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Weaknesses** – What are you notoriously bad at and how is it impacting your
    progress?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Opportunities for Growth** – What can help you overcome your weaknesses and
    leverage your strengths? This could be learning skills, taking courses, meeting
    new people, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Threats** – What threatens your progress? This could be friends inviting
    you out to party, a lack of time, a fear of failure, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By the way, I enhanced the [Strategic Advisor prompt](https://app.kortex.co/public/document/564f7219-7cf6-4cdd-86e2-e71895631781)
    from the last letter.
  prefs: []
  type: TYPE_NORMAL
- en: I’d recommend duplicating this document, pasting it into Kortex AI, writing
    your entire strategy down in a document, and asking kAI to guide you through it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s an example of what it spat out when I asked for guidance on building
    an audience:'
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2528">![](../Images/6aed16fac8a4eee2e6a7326ed951666c.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: I could then ask kAI to help me learn about any of the above and guide me along
    the way.
  prefs: []
  type: TYPE_NORMAL
- en: 3 – Strategic Preparation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: How do you change your identity so that you act on your strategy with ease?
  prefs: []
  type: TYPE_NORMAL
- en: You start by immersing yourself in a completely new environment.
  prefs: []
  type: TYPE_NORMAL
- en: You change the books you read, the information you consume, the people you follow,
    and everything else to reflect the goal you are trying to achieve.
  prefs: []
  type: TYPE_NORMAL
- en: You open your mind to new perspectives and allow them to challenge your beliefs
    of what’s possible.
  prefs: []
  type: TYPE_NORMAL
- en: Delete most of the apps on your phone. Unfollow most of the people you follow.
    Buy 3 new books. Queue podcasts to listen to on a walk. Invest in resources to
    learn the skills you need to learn. Have a pre-written messages that declines
    your friend’s invitations to go out.
  prefs: []
  type: TYPE_NORMAL
- en: Anything that does not align with your goals is by definition a distraction.
  prefs: []
  type: TYPE_NORMAL
- en: You need an environment that is solely conducive to you achieving your goal.
  prefs: []
  type: TYPE_NORMAL
- en: 4 – Concentration of Force
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As we discussed in the last letter, the only way to actualize a goal is to build
    a real-world project.
  prefs: []
  type: TYPE_NORMAL
- en: 'You learn through struggle, not memorization, and you need a project to apply
    your learning to, so:'
  prefs: []
  type: TYPE_NORMAL
- en: Write down 3-5 projects you *could* build to achieve the goal.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Choose the highest leverage project that has the most advantageous outcomes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Map out the 3-5 priority tasks you can do on a daily basis to make progress
    on the project.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you are trying to quit your job and do your own thing, an example project
    is starting a weekly newsletter or starting on social media. Social media would
    probably be the highest leverage due to it’s ability to build an audience, and
    a newsletter would come after.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, that may not be your interest, but if it is, [2 Hour Writer](https://2hourwriter.com)
    may help.
  prefs: []
  type: TYPE_NORMAL
- en: 5 – Disciplined Execution
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You need to replace your old routine with a new one.
  prefs: []
  type: TYPE_NORMAL
- en: Because you probably “fell in” to your current routine without knowing it.
  prefs: []
  type: TYPE_NORMAL
- en: And if your actions create your future, you are falling into a future without
    knowing it, and it’s probably not one you’ll care about.
  prefs: []
  type: TYPE_NORMAL
- en: Execute your 3-5 priority, lever-moving tasks for 1-2 hours in the morning or
    1-2 hours at night.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Everything you do throughout the day should fuel your work. What you read. What
    you scroll. Your conversations. Going on walks instead of distracting yourself.
    Eating well.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The only thing on your mind should be strategizing how to overcome obstacles
    of the game.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This will become seamless when we create a Pre-Mortem soon.
  prefs: []
  type: TYPE_NORMAL
- en: 6 – Adaptability
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A strategy is like everything else in life.
  prefs: []
  type: TYPE_NORMAL
- en: It is not static.
  prefs: []
  type: TYPE_NORMAL
- en: It evolves with feedback.
  prefs: []
  type: TYPE_NORMAL
- en: You need to be able to identify when things aren’t working, go back to your
    strategy, and experiment with something new.
  prefs: []
  type: TYPE_NORMAL
- en: Remember, mistakes are the only source of truth.
  prefs: []
  type: TYPE_NORMAL
- en: Experimentation is how you make mistakes, thus, experimentation is the only
    way to achieve what you want in life.
  prefs: []
  type: TYPE_NORMAL
- en: 7 – Study The General Principles Of Nature
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you understand the general principles that are found in everything you do,
    it becomes much easier to make sense of a negative situation.
  prefs: []
  type: TYPE_NORMAL
- en: The easiest way to make sense of this, in my opinion, is by understanding the
    structure of a story.
  prefs: []
  type: TYPE_NORMAL
- en: First, there’s a problem that needs to be solved. There are highs and lows the
    hero must go through. There is struggle. There is bliss.
  prefs: []
  type: TYPE_NORMAL
- en: Like waves in the ocean, emotions in your mind, how your relationships develop,
    on all planes of reality, in every situation, you are in a sentence of a paragraph
    of a chapter of a never ending series of books.
  prefs: []
  type: TYPE_NORMAL
- en: If you can identify what part of the story you are in, and not fixate your mind
    on that as if it should stay the same forever, it becomes much easier to navigate
    out.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to understand this deeper, a great short book to read is The Kybalion.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Pre-Mortem: How To Fail Before You Even Start'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The essence of strategy is choosing what not to do.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Michael Porter
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Most people don’t fail because they can’t complete their project.
  prefs: []
  type: TYPE_NORMAL
- en: They fail because of internal, psychological thought processes that take control
    of their focus and lead to the belief that success isn’t possible.
  prefs: []
  type: TYPE_NORMAL
- en: 'A few examples:'
  prefs: []
  type: TYPE_NORMAL
- en: Paralysis by analysis (over-researching, not taking action)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Losing sight of the big vision due to others’ opinions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Lack of complimentary skills, like writing and audience building, to be able
    to find customers for your work
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Financial insecurity to the point of accepting that you need to focus on the
    job you hate
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Burning out and not having a coping mechanism that refreshes you
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Getting bored with the mundane work that gets results
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The desire to do something fancy and high status instead of something that you
    enjoy, or gets you out of your situation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When you are in the middle of a project, it’s extremely difficult to open your
    mind to see beyond your situation. You fall into a narrow-minded survival mode
    ruled by stress. You can’t think of solutions, only problems.
  prefs: []
  type: TYPE_NORMAL
- en: The best way around this is to do a Pre-Mortem.
  prefs: []
  type: TYPE_NORMAL
- en: A Pre-Mortem is a strategic thinking tool that identifies *failure points* in
    any project before it even begins.
  prefs: []
  type: TYPE_NORMAL
- en: A “project” in this sense can be anything from quitting your job, changing your
    career, finding purpose, self-education, losing weight, improving your relationship,
    planning your year, or anything else really.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s what you do.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, select your project or use your strategy above, all of this is in the
    [template mentioned earlier](https://app.kortex.co/public/document/564f7219-7cf6-4cdd-86e2-e71895631781)
    to fill out. Then:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Imagine spectacular failure** – Visualize your strategy failing horribly.
    What does it look like? Where does your life end up?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**List the causes of failure** – Brainstorm *all* possible reasons for the
    failure. Include psychological reasons like personal weaknesses, self-sabotage,
    lack of knowledge or skill, and external factors like not having enough money.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prioritize the list** – Reorganize the list and place the *most threatening*
    at the top.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Brainstorm solutions** – For each cause of failure, brainstorm potential
    solutions. Ask kAI as your strategic advisor for help with these.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With both a strategy and pre-mortem completed, you should feel rather clear
    on what you need to do in order to prevent failing at your next project.
  prefs: []
  type: TYPE_NORMAL
- en: I hope all of that was helpful.
  prefs: []
  type: TYPE_NORMAL
- en: And I also hope you didn’t just read this without implementing any of it.
  prefs: []
  type: TYPE_NORMAL
- en: Enjoy the rest of your week.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
