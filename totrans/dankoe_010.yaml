- en: Distraction Is The Greatest Trap Of The 21st Century
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/distraction-is-the-greatest-trap-of-the-21st-century/](https://thedankoe.com/letters/distraction-is-the-greatest-trap-of-the-21st-century/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The Middle Ages, also known as the “Dark Ages,” was an era filled with war,
    ignorance, famine, and pandemics.
  prefs: []
  type: TYPE_NORMAL
- en: What came after set the scene for modern civilization – The Renaissance Era.
    A cultural, political, and economic rebirth that housed many of the thinkers,
    artists, and scientists we know today.
  prefs: []
  type: TYPE_NORMAL
- en: History repeats itself, and the Digital Dark Ages are among us.
  prefs: []
  type: TYPE_NORMAL
- en: But, there is a light on the horizon.
  prefs: []
  type: TYPE_NORMAL
- en: The Digital Dark Ages are a time of distraction, closed-mindedness, and cheap
    dopamine.
  prefs: []
  type: TYPE_NORMAL
- en: We’ve lost touch with the belief systems that gave an individual a sense of
    certainty for their future.
  prefs: []
  type: TYPE_NORMAL
- en: And, if we don’t take it upon ourselves to create our own sense of purpose,
    we distract ourselves to maintain the little sanity we have left.
  prefs: []
  type: TYPE_NORMAL
- en: Having a vision – that you create – gives you a sense of control over your life.
    A purpose that fuels your present actions.
  prefs: []
  type: TYPE_NORMAL
- en: That vision presents a hierarchy of goals that increase in challenge as you
    acquire the skills necessary to achieve those goals.
  prefs: []
  type: TYPE_NORMAL
- en: This is how you create an endless source of good dopamine.
  prefs: []
  type: TYPE_NORMAL
- en: A vision that is a conscious personal creation forces you to focus your mind.
  prefs: []
  type: TYPE_NORMAL
- en: A focused mind is the source of life enjoyment.
  prefs: []
  type: TYPE_NORMAL
- en: Without a vision, [you inevitably become a slave to the system.](https://thedankoe.com/the-focus-formula-how-to-take-control-of-your-life/)
  prefs: []
  type: TYPE_NORMAL
- en: You will shy from thinking about your future because it seems painful, hopeless,
    and uncertain.
  prefs: []
  type: TYPE_NORMAL
- en: 'Because of this, you will find solace in a few things:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) The societal machine**'
  prefs: []
  type: TYPE_NORMAL
- en: The clear path of going to school, getting a job, and retiring happily is enticing.
    So, you relinquish your freedom to choose and do what you’re told.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Momentary pleasures**'
  prefs: []
  type: TYPE_NORMAL
- en: Deep down, we know we aren’t making the right choice.
  prefs: []
  type: TYPE_NORMAL
- en: That is painful.
  prefs: []
  type: TYPE_NORMAL
- en: So we numb our minds with endless scrolling, sitcom binges, and foods that taste
    good for a few seconds but lowers our ability to function at our peak capacity
    – because why would you need to if your future is already decided?
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Modern distractions**'
  prefs: []
  type: TYPE_NORMAL
- en: Distractions are not just digital.
  prefs: []
  type: TYPE_NORMAL
- en: They are everything that doesn’t align with your vision.
  prefs: []
  type: TYPE_NORMAL
- en: And if you don’t have a vision, how are you going to filter what is important
    from what is meaningless?
  prefs: []
  type: TYPE_NORMAL
- en: The catalyst for these distractions is *you*. Your identity.
  prefs: []
  type: TYPE_NORMAL
- en: You were told what to learn, think, and do.
  prefs: []
  type: TYPE_NORMAL
- en: You didn’t question it, but accepted it as fact.
  prefs: []
  type: TYPE_NORMAL
- en: So, your mind is narrowed on everything that reinforces that identity and feels
    threatened by anything that does not.
  prefs: []
  type: TYPE_NORMAL
- en: 'All 3 of these can be grouped into one thing, the greatest trap of the 21st
    century:'
  prefs: []
  type: TYPE_NORMAL
- en: Closed-mindedness.
  prefs: []
  type: TYPE_NORMAL
- en: Signs Of The Closed Minded
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-973">![](../Images/1f47e18cb4d18a491727fbdc68698a72.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Closed-mindedness is the inability to see beyond your narrow perspective in
    any situation.
  prefs: []
  type: TYPE_NORMAL
- en: If your perspective only shines a negative light on that situation, even worse.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take social media comment sections as an example.
  prefs: []
  type: TYPE_NORMAL
- en: How common is it for someone to completely miss the point of what’s being said,
    interpret it for their benefit, and leave a comment that resembles nothing of
    the original message?
  prefs: []
  type: TYPE_NORMAL
- en: Like when you read a polarizing political post, feel offended, and conveniently
    leave out their perspective because it doesn’t align with yours.
  prefs: []
  type: TYPE_NORMAL
- en: Little do you realize that your perspective is not absolute truth, nor is theirs.
    And, if you seek to understand both, you inch your way toward a life of peace
    and creative problem-solving.
  prefs: []
  type: TYPE_NORMAL
- en: People don’t realize the depth behind these simple, unconscious actions. You
    are destroying your life. How? Because you aren’t creating it. Without intentional
    action, the only way is down.
  prefs: []
  type: TYPE_NORMAL
- en: Not only is this closed-minded, but it’s also distracted.
  prefs: []
  type: TYPE_NORMAL
- en: People can’t focus their mind on a holistic outcome, and instead, cherry-pick
    what they see, start arguments, and get absolutely nowhere.
  prefs: []
  type: TYPE_NORMAL
- en: This is another embodiment of the quick-fix mindset.
  prefs: []
  type: TYPE_NORMAL
- en: You “win the game” in your own mind, reap the cheap dopamine of doing so, and
    reinforce that bad habit… making it harder to break the more you do it.
  prefs: []
  type: TYPE_NORMAL
- en: The universe is an infinite song. Uni-verse. One song.
  prefs: []
  type: TYPE_NORMAL
- en: Songs are symbolic of stories. Stories form the structure of games.
  prefs: []
  type: TYPE_NORMAL
- en: All understanding is metaphorical, and the mind makes sense of the world by
    stringing symbols into stories.
  prefs: []
  type: TYPE_NORMAL
- en: The inevitable highs, lows, pushes, pulls, yins, and yangs that construct your
    understanding of life.
  prefs: []
  type: TYPE_NORMAL
- en: Most of it *can’t* be put into words.
  prefs: []
  type: TYPE_NORMAL
- en: Language is useful, but extremely limiting.
  prefs: []
  type: TYPE_NORMAL
- en: This is why the structure of games order our mind and allow us to tap into the
    flow state.
  prefs: []
  type: TYPE_NORMAL
- en: In essence, closed-mindedness is assuming what you think the story is, rather
    than what it actually is.
  prefs: []
  type: TYPE_NORMAL
- en: If you assume that someone else’s words can plug into the story running in your
    head, you’re in for a bad time.
  prefs: []
  type: TYPE_NORMAL
- en: So, let’s start expanding your mind.
  prefs: []
  type: TYPE_NORMAL
- en: None of this happens overnight.
  prefs: []
  type: TYPE_NORMAL
- en: This is a process of making the unconscious, conscious, and correcting your
    behavior over weeks, months, and years.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s go over a few common traits that would indicate closed-mindedness.
  prefs: []
  type: TYPE_NORMAL
- en: I’ll leave it up to you to become aware of this in your everyday life.
  prefs: []
  type: TYPE_NORMAL
- en: As you become aware, I encourage you to slowly correct your actions with the
    strategies we talk about in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Awareness begets improvement. Improvement begets awareness.
  prefs: []
  type: TYPE_NORMAL
- en: 1) Assumption and Expectation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most people are walking distractions.
  prefs: []
  type: TYPE_NORMAL
- en: They *are* the distraction. Their identity distracts them from truth.
  prefs: []
  type: TYPE_NORMAL
- en: Your reality is determined by your conditioning.
  prefs: []
  type: TYPE_NORMAL
- en: That is, your identity that houses your perspective. Your perspective houses
    your beliefs, thoughts, and experiences that you hold as truth. For most people,
    this perspective, or worldview, is shared with your parents, culture, and society.
  prefs: []
  type: TYPE_NORMAL
- en: These are limits on what you think is possible.
  prefs: []
  type: TYPE_NORMAL
- en: If all you know is school, work, and retirement, your behavior will follow.
  prefs: []
  type: TYPE_NORMAL
- en: Your programming is a network of hardwired assumptions and expectations of the
    world.
  prefs: []
  type: TYPE_NORMAL
- en: Unless you can expand your mind beyond them, you are doomed to a life of the
    limits that others imposed on you.
  prefs: []
  type: TYPE_NORMAL
- en: Scratch that… *the limits that you imposed on yourself.*
  prefs: []
  type: TYPE_NORMAL
- en: 2) Selfish Perspective
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Outside of the present moment, everyone is acting in alignment with a specific
    goal.
  prefs: []
  type: TYPE_NORMAL
- en: This goal can be conscious, subconscious, or unconscious.
  prefs: []
  type: TYPE_NORMAL
- en: Most people are unconscious, they act in a way that favors their survival. And,
    if humans survive on a conceptual level, they act in a way that reinforces their
    hard-set beliefs, assumptions, and expectations. They act in a way that confirms
    their self-image.
  prefs: []
  type: TYPE_NORMAL
- en: How do you spot this in the real world?
  prefs: []
  type: TYPE_NORMAL
- en: It’s not hard.
  prefs: []
  type: TYPE_NORMAL
- en: Look at any political post.
  prefs: []
  type: TYPE_NORMAL
- en: How many people are in the comments arguing about how the other side is wrong?
    How many are willing to die over their beliefs?
  prefs: []
  type: TYPE_NORMAL
- en: Republicans will defend their political stance as the best because they are
    republicans.
  prefs: []
  type: TYPE_NORMAL
- en: Every freelancer will defend their business model as the best because they are
    a freelancer.
  prefs: []
  type: TYPE_NORMAL
- en: Every Christian, Muslim, and atheist will defend their belief system as the
    best because they are that belief system.
  prefs: []
  type: TYPE_NORMAL
- en: What people fail to see is that these people are human too.
  prefs: []
  type: TYPE_NORMAL
- en: They went through a different cultural, social, or even business conditioning
    process that hardwired beliefs in their head.
  prefs: []
  type: TYPE_NORMAL
- en: In their mental, physical, financial, and spiritual environment, those beliefs
    serve *their identity* the best.
  prefs: []
  type: TYPE_NORMAL
- en: If you want a more holistic version of truth, you must be able to transfer your
    consciousness into their mind. You have to prove yourself wrong.
  prefs: []
  type: TYPE_NORMAL
- en: Everything is relative, and you have to understand that in some countries, your
    beliefs would have you physically killed.
  prefs: []
  type: TYPE_NORMAL
- en: They don’t care how “right” you think you are.
  prefs: []
  type: TYPE_NORMAL
- en: And from the perspective of the universe, everyone is right, and everyone is
    wrong.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Literal Interpretation**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When I say “disappear for 6 months to work on yourself,” how do you perceive
    that statement?
  prefs: []
  type: TYPE_NORMAL
- en: Do you think I’m actually telling you to disappear?
  prefs: []
  type: TYPE_NORMAL
- en: Or do you think I’m using a metaphor for higher-impact writing?
  prefs: []
  type: TYPE_NORMAL
- en: Whether you are a Christian or not, when you read the bible, do you think that
    Noah took 2 of *every kind* of animal on a giant ark in flood?
  prefs: []
  type: TYPE_NORMAL
- en: Maybe he did, maybe he didn’t, and that’s the point.
  prefs: []
  type: TYPE_NORMAL
- en: Focus.
  prefs: []
  type: TYPE_NORMAL
- en: Understand the *essence, lesson, or truth* that the words are pointing at.
  prefs: []
  type: TYPE_NORMAL
- en: And please, for the love of all things holy, don’t message me about typos in
    my writing.
  prefs: []
  type: TYPE_NORMAL
- en: Same story.
  prefs: []
  type: TYPE_NORMAL
- en: Focus.
  prefs: []
  type: TYPE_NORMAL
- en: 4) Missing The Point
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is similar to literal interpretation of words.
  prefs: []
  type: TYPE_NORMAL
- en: Internet trolls are notorious for intentionally missing the point of any given
    post.
  prefs: []
  type: TYPE_NORMAL
- en: They laser in on the one thing that has nothing to do with the message as a
    whole.
  prefs: []
  type: TYPE_NORMAL
- en: You wouldn’t take one lyric from a song, play it on its own, and expect it to
    make sense.
  prefs: []
  type: TYPE_NORMAL
- en: The uni-verse (one song) is the same.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t miss the point of life, or any of its multi-dimensional aspects, by lasering
    in on one part of the story.
  prefs: []
  type: TYPE_NORMAL
- en: The low point in your life is a part of the bigger picture.
  prefs: []
  type: TYPE_NORMAL
- en: If you can’t see it, your mind lacks order, and will consume you.
  prefs: []
  type: TYPE_NORMAL
- en: 5) Vision Avoidance
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We discuss having a vision for your life in almost every letter.
  prefs: []
  type: TYPE_NORMAL
- en: This is intentional.
  prefs: []
  type: TYPE_NORMAL
- en: Your vision isn’t clear in an instant. You need a constant reminder. That way,
    you can reflect on recent experiences to start moving in a better life direction.
  prefs: []
  type: TYPE_NORMAL
- en: The thing is, some people avoid this thought entirely.
  prefs: []
  type: TYPE_NORMAL
- en: Every single person knows that deep down they are capable of more.
  prefs: []
  type: TYPE_NORMAL
- en: But, the path to actualizing that potential isn’t clear, and the opposite of
    clarity is confusion.
  prefs: []
  type: TYPE_NORMAL
- en: To mask that confusion, they distract themselves with momentary pleasures.
  prefs: []
  type: TYPE_NORMAL
- en: The instant gratification feels good now, but hurts later.
  prefs: []
  type: TYPE_NORMAL
- en: Acting in alignment with your purpose hurts now, but feels good later.
  prefs: []
  type: TYPE_NORMAL
- en: Flip the switch.
  prefs: []
  type: TYPE_NORMAL
- en: Open Your Mind – The Art Of Zooming Out
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Empty your mind. Be formless, shapeless, like water. You put water into a cup,
    it becomes the cup. – Bruce Lee
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Everyone knows that quote, but how many have sat with it, questioned it, and
    let it fill their mind with insight?
  prefs: []
  type: TYPE_NORMAL
- en: Most people read it, think that they “win” the cliche understanding game for
    a quick dopamine hit, and close their mind to the depth beyond the sentence.
  prefs: []
  type: TYPE_NORMAL
- en: 'Peak experiences seem to be the result of one of two types of focus:'
  prefs: []
  type: TYPE_NORMAL
- en: Hyper-focus on what’s in front of you, **doing**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Radical open focus that grasps at nothing, **being**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: All something or all nothing.
  prefs: []
  type: TYPE_NORMAL
- en: Understand that these are peak *states* of consciousness. They are difficult,
    if not impossible, to sustain if you have worldly responsibilities.
  prefs: []
  type: TYPE_NORMAL
- en: Closed-mindedness in this sense can be useful when your attention is engaged
    on a hierarchy of goals in alignment with your vision for the future. You are
    “at one” with a task. Your mind is empty of thought because there is nothing to
    think about. You just do.
  prefs: []
  type: TYPE_NORMAL
- en: So, open-mindedness, in the most extreme sense, is opening your mind beyond
    all form, limitation, and distraction. At one with the universe as opposed to
    the task.
  prefs: []
  type: TYPE_NORMAL
- en: In this state, you don’t hold onto thoughts. You are the silent observer underneath
    the layered ego.
  prefs: []
  type: TYPE_NORMAL
- en: Open-mindedness comes in stages.
  prefs: []
  type: TYPE_NORMAL
- en: 'An example (in no specific order):'
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 1)** You believe religion is the only path to salvation.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 2)** You believe religion is mind control.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 3)** You believe religion has deep truths when interpreted from a metaphorical
    lens.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In business, this is similar:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 1)** You believe freelancing is the best business model.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 2)** You believe most business models are scams.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 3)** You believe that all business models hold truths that can be used
    to improve the one that aligns with your interests.'
  prefs: []
  type: TYPE_NORMAL
- en: Oh, and would you look at that, [a course that gives my perspective on how to
    do just that.](https://digitaleconomics.school)
  prefs: []
  type: TYPE_NORMAL
- en: We all know a few people that have adopted, and identified, with each of those
    perspectives.
  prefs: []
  type: TYPE_NORMAL
- en: Some are more open-minded than others.
  prefs: []
  type: TYPE_NORMAL
- en: And, the ones that are, lead to less suffering and more success.
  prefs: []
  type: TYPE_NORMAL
- en: 'The benefits of open-mindedness are obvious:'
  prefs: []
  type: TYPE_NORMAL
- en: Deeper intelligence, heightened creativity, less reactivity, fulfilling relationships,
    novel content ideas, and other things like artful navigation of what would be
    polarizing domains like politics.
  prefs: []
  type: TYPE_NORMAL
- en: So, let’s dive into some practical steps to open your mind.
  prefs: []
  type: TYPE_NORMAL
- en: And, as always, please internalize that this is not instant. Quick fixes in
    your thinking are against the point here.
  prefs: []
  type: TYPE_NORMAL
- en: This is a *lifelong* practice.
  prefs: []
  type: TYPE_NORMAL
- en: Meaning, it has to become a part of your identity if you want the outcomes of
    open-mindedness.
  prefs: []
  type: TYPE_NORMAL
- en: If you can’t do it every day, why are you doing it?
  prefs: []
  type: TYPE_NORMAL
- en: 1) Critical Thinking 101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Hold all thoughts, ideas, and opinions in the realm of possibility until filtered
    through direct experience.
  prefs: []
  type: TYPE_NORMAL
- en: You do not have to prove something right or wrong in an instant.
  prefs: []
  type: TYPE_NORMAL
- en: You are allowed to let things marinate in your mind without identifying with
    any side of an argument.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Work Towards A More Holistic Identity
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Your identity houses your perspective.
  prefs: []
  type: TYPE_NORMAL
- en: Your perspective houses your beliefs.
  prefs: []
  type: TYPE_NORMAL
- en: Your beliefs influence your thoughts, emotions, and actions.
  prefs: []
  type: TYPE_NORMAL
- en: So, if we adopt an identity that is greater than us, our mind opens as such.
  prefs: []
  type: TYPE_NORMAL
- en: This is how you develop your ego.
  prefs: []
  type: TYPE_NORMAL
- en: If the ego works to survive what we identify with, and we identify with say
    humanity, then we will act to preserve humanity.
  prefs: []
  type: TYPE_NORMAL
- en: I am not 100% certain about this, but I believe this is what some people mean
    when they identify themselves as God. We aren’t talking about the Christian notion
    of God here. We are talking about what Brahman, the Absolute, Source, Infinity,
    Mind (not brain), or the Universe.
  prefs: []
  type: TYPE_NORMAL
- en: Think of it like this.
  prefs: []
  type: TYPE_NORMAL
- en: If you are on a sports team, the “Snowbirds,” then you will identify as a Snowbird.
    The spirit of that team forms a collective ego that fuels your games. That spirit
    is also transferred to fans that identify with that team.
  prefs: []
  type: TYPE_NORMAL
- en: The same is true for identifying with a corporate job, religion, or family.
  prefs: []
  type: TYPE_NORMAL
- en: Be careful, be conscious, and fix problems as they come up in how your identity
    impacts the world. Certain identifications will either close or open your mind.
  prefs: []
  type: TYPE_NORMAL
- en: '***Please note: we are identifying in mind or spirit, not physicality or intellect.***'
  prefs: []
  type: TYPE_NORMAL
- en: If you want to identify as something hyper-limiting, like a toaster oven or
    an apache attack helicopter, be my guest. Or, go back to the previous section
    on “intentionally missing the point.” Unless the point is humor, of course, that’s
    useful.
  prefs: []
  type: TYPE_NORMAL
- en: If you are the Universe, which you are, then your petty human problems lose
    their weight. And, you can see political, cultural, and even global creation and
    destruction from a better vantage point.
  prefs: []
  type: TYPE_NORMAL
- en: What is the point of identifying as the Universe?
  prefs: []
  type: TYPE_NORMAL
- en: Not for nobility, status, or any other selfish endeavor that pops into your
    mind, clearly, but by improving your decision-making in a way that benefits more
    than yourself.
  prefs: []
  type: TYPE_NORMAL
- en: That is, seeing beyond your survival. Thinking twice about going from one surface-level
    pleasurable distraction to another.
  prefs: []
  type: TYPE_NORMAL
- en: How is your life’s work going to impregnate the minds of the world?
  prefs: []
  type: TYPE_NORMAL
- en: If you love beer, can you open a brewery and transfer that passion into your
    customers?
  prefs: []
  type: TYPE_NORMAL
- en: If you love philosophy, can you start writing online and transfer your understanding
    to others?
  prefs: []
  type: TYPE_NORMAL
- en: From a universal perspective, this is reproduction, or creation. You transfer
    obsession through spirit, because humans have transcended (and included) the physical.
  prefs: []
  type: TYPE_NORMAL
- en: The physical is important of course, but it is only a fraction of the total
    importance in our lives.
  prefs: []
  type: TYPE_NORMAL
- en: This all sounds great, but how do we develop ourselves to embody this?
  prefs: []
  type: TYPE_NORMAL
- en: 3) Collecting Consciousness
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This takes decades, and I can only speak from experience here.
  prefs: []
  type: TYPE_NORMAL
- en: I am not an almighty guru here to tell you exactly what to do.
  prefs: []
  type: TYPE_NORMAL
- en: This is my level of understanding and what I am working towards.
  prefs: []
  type: TYPE_NORMAL
- en: To collect consciousness, you need to understand the multiple perspectives that
    form a superior identity.
  prefs: []
  type: TYPE_NORMAL
- en: You need to *transfer consciousness* and seek to understand, not judge.
  prefs: []
  type: TYPE_NORMAL
- en: Like how a predator can transfer consciousness into their prey and predict their
    next moves. And if they make a mistake? Even better, that’s how you understand
    with time.
  prefs: []
  type: TYPE_NORMAL
- en: If animals can do this, you can. Marketers, writers, and creators have to do
    it all the time.
  prefs: []
  type: TYPE_NORMAL
- en: Transfer your consciousness into your reader, are they going to like, engage,
    and share your content? Or do you need to rewrite it?
  prefs: []
  type: TYPE_NORMAL
- en: I teach this from a more practical lens in [2 Hour Writer](https://2hourwriter.com).
  prefs: []
  type: TYPE_NORMAL
- en: Transfer your consciousness into the driver that cut you off, are they in a
    rush? What if their mother is in the hospital? Or should they only care about
    your selfish need for a comfortable drive?
  prefs: []
  type: TYPE_NORMAL
- en: Focus on the big picture here, not the minor details. There is of course no
    way you can know every single person’s thoughts about a situation.
  prefs: []
  type: TYPE_NORMAL
- en: But, you can understand their actions, note patterns, and observe outcomes.
    We want to understand the *experience,* whether it can be put in words or not.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, you can’t speak someone’s language by seeking to understand their
    perspective. We are seeking the *essence* here beyond mere human existence. Like
    how “strength” reflects in culture, society, animals, science, and the universe.
  prefs: []
  type: TYPE_NORMAL
- en: When you study a bodybuilder as an identity, their perspective on food is different
    than the average person’s.
  prefs: []
  type: TYPE_NORMAL
- en: They don’t have to think about deciding against junk food. They just do it because
    it results in an optimal outcome for their goals.
  prefs: []
  type: TYPE_NORMAL
- en: A successful businessman doesn’t have to think about being consistent in business.
    It’s just what they do.
  prefs: []
  type: TYPE_NORMAL
- en: The Universe doesn’t have to think about a star or planet exploding, because
    in the grand scheme, something else comes into being.
  prefs: []
  type: TYPE_NORMAL
- en: This is something I want you to contemplate for yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Start by identifying as the highest version of yourself. This should align with
    your vision.
  prefs: []
  type: TYPE_NORMAL
- en: Study the people that have done what you want to do.
  prefs: []
  type: TYPE_NORMAL
- en: 4) Pause & Question
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A challenge:'
  prefs: []
  type: TYPE_NORMAL
- en: Study the exact opposite of your beliefs in any domain.
  prefs: []
  type: TYPE_NORMAL
- en: If you are a vegan, study carnivores.
  prefs: []
  type: TYPE_NORMAL
- en: If you are a freelancer, study creators.
  prefs: []
  type: TYPE_NORMAL
- en: If you are a Christian, study atheists.
  prefs: []
  type: TYPE_NORMAL
- en: Approach the situation by trying to prove yourself wrong.
  prefs: []
  type: TYPE_NORMAL
- en: The few people that can do this will launch their progress through the roof.
  prefs: []
  type: TYPE_NORMAL
- en: This is difficult, and you will experience an ego reaction.
  prefs: []
  type: TYPE_NORMAL
- en: Your mind will have an imaginary battle with the beliefs you exposed yourself
    to.
  prefs: []
  type: TYPE_NORMAL
- en: You will feel threatened. Fight or flight from a belief. Humans are interesting.
    That is your concept of self working to survive.
  prefs: []
  type: TYPE_NORMAL
- en: When you are aware of this reaction, question it.
  prefs: []
  type: TYPE_NORMAL
- en: Questioning is how you learn.
  prefs: []
  type: TYPE_NORMAL
- en: Pick something you disagree with in business, religion, or even health, and
    work through the following questions.
  prefs: []
  type: TYPE_NORMAL
- en: When more questions come up, keep questioning.
  prefs: []
  type: TYPE_NORMAL
- en: Is there something I can learn in this situation?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What goal are they working to achieve?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Does that align with my goals? And does it matter if not?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What is the context they are saying this from?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What is the *essence or lesson* of what they are saying?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Can I incorporate an aspect of their beliefs into my own?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With time, these should birth some incredible insights.
  prefs: []
  type: TYPE_NORMAL
- en: 5) Think Macro, Act Micro
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You are a perspective vessel.
  prefs: []
  type: TYPE_NORMAL
- en: Your actions, whether you are conscious of them or not, have an impact on the
    world. And on the timescale of your physical life, that can add up quite a bit.
  prefs: []
  type: TYPE_NORMAL
- en: As you open your mind to hold a more holistic perspective, your actions must
    follow suit.
  prefs: []
  type: TYPE_NORMAL
- en: Think big picture, forget the petty details, and act.
  prefs: []
  type: TYPE_NORMAL
- en: The *only* way to acquire true knowledge is through mistakes.
  prefs: []
  type: TYPE_NORMAL
- en: Knowledge is infinite, and in the relative world, nobody will be absolutely
    correct, only relative.
  prefs: []
  type: TYPE_NORMAL
- en: Your job is to make mistakes, correct them, and allow humanity to improve over
    eons, not just your microscopic lifetime.
  prefs: []
  type: TYPE_NORMAL
- en: Think bigger.
  prefs: []
  type: TYPE_NORMAL
- en: Please don’t end your journey with this letter.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to open your mind, you are going to have to change your mental habits.
  prefs: []
  type: TYPE_NORMAL
- en: You have to set an intention to seek truth – even if it doesn’t benefit you
    – and adopt open-mindedness as a constant practice in your life.
  prefs: []
  type: TYPE_NORMAL
- en: The highest version of every single one of you is open-minded.
  prefs: []
  type: TYPE_NORMAL
- en: Try to expand your mind to embody that identity.
  prefs: []
  type: TYPE_NORMAL
- en: Let your actions slowly reflect that.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan Koe
  prefs: []
  type: TYPE_NORMAL
