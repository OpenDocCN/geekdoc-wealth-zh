- en: A Full Guide To Reinvent Your Life (In 6-12 Months)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 《全面重塑生活指南》（6-12个月内）
- en: 原文：[https://thedankoe.com/letters/a-full-guide-to-reinvent-your-life-in-6-12-months/](https://thedankoe.com/letters/a-full-guide-to-reinvent-your-life-in-6-12-months/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://thedankoe.com/letters/a-full-guide-to-reinvent-your-life-in-6-12-months/](https://thedankoe.com/letters/a-full-guide-to-reinvent-your-life-in-6-12-months/)'
- en: Life is like a dark room.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 生活就像一个黑暗的房间。
- en: On occasion, we find a candle so that we can see, but not for long.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，我们会找到一根蜡烛，以便我们可以看到，但不会太久。
- en: The candle provides vision and direction.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 蜡烛提供视野和方向。
- en: But the flame will die out, sparking fear in our souls that we will never find
    our way… unless we move with faith that we will find the next candle.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 但火焰会熄灭，在我们灵魂中激起恐惧，我们永远找不到出路……除非我们带着信仰移动，相信我们会找到下一根蜡烛。
- en: The human mind bounces between clarity and chaos.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 人类的心灵在清晰和混沌之间弹跳。
- en: Chaos is our default state.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 混沌是我们的默认状态。
- en: Clarity is the byproduct of ordered information that fills our consciousness.
    Our mind is clear when what we pay attention to is clear.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰是有序信息填充我们意识的结果。当我们关注的事物清晰时，我们的心灵就清晰。
- en: This is an explanation for human behavior.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这是对人类行为的解释。
- en: And explains why people report that the most miserable part of their days is
    between 10am and 2pm on a Sunday afternoon.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这解释了为什么人们报告说他们一天中最痛苦的部分是在星期日下午10点到2点之间。
- en: People hate their jobs, yet jobs provide a more enjoyable state of mind than
    being alone with yourself and your random thoughts.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 人们讨厌他们的工作，但工作能提供比独自一人与你的随机思想相伴更愉快的心态。
- en: Humans fill their day with activities that structure their minds.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 人类用活动来填充他们的日子，以构建他们的心灵。
- en: We always want to be doing something. Seeing people. Playing games. Writing.
    Designing. Creating. Preferably investing our attention in something useful.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我们总是想要做点什么。见人。玩游戏。写作。设计。创造。最好是将注意力投入到有用的事情上。
- en: When we are alone, psychic entropy ensues.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们独处时，精神熵随之而来。
- en: We catch on to a coherent line of thought for no more than a few minutes, then
    get lost in the unknown.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们只能连贯地思考几分钟，然后就会迷失在未知中。
- en: Our mind grasps at negative thoughts and they multiply.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的心灵抓取负面思想，它们就会倍增。
- en: The cure to this state of mind is knowing how to direct your attention.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这种心态的解药是知道如何引导你的注意力。
- en: Meditation teaches you to focus on your breath.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 冥想教你专注于你的呼吸。
- en: Meta-cognition teaches you to question your thoughts.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 元认知教你质疑你的思想。
- en: Learning to be alone is learning to order your mind in any circumstance for
    enjoyment.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 学习独处就是学习在任何情况下都能让你的心灵有序，以便享受。
- en: It’s ironic that people want to maximize freedom.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 人们想要最大化自由，这很讽刺。
- en: That’s the opposite of what they want.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这与他们的愿望相反。
- en: People don’t want freedom, they want autonomy.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 人们不想要自由，他们想要自治。
- en: They don’t want limitations projected on them, they want to create their own
    limitations.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 他们不希望有人强加限制，他们想要创造自己的限制。
- en: Your self is a definition.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 你的自我是一个定义。
- en: Self-imposed or accepted limits.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 自我强加或接受的限制。
- en: The self is your psychic body. You are not physical.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 自我是你的精神身体。你不是物理的。
- en: You are an amalgamation of the ideas, beliefs, and distinctions that you perceive
    as important based on your programming.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 你是你根据编程认为重要的想法、信念和区别的混合体。
- en: Your self determines how you interpret situations which determines how you act.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 你的自我决定了你如何解读情况，这决定了你的行为。
- en: Your self determines your destiny.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 你的自我决定了你的命运。
- en: You are free to define yourself however you want, but most people accept who
    the world says they are.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以自由地定义自己，但大多数人接受世界告诉他们是怎样的人。
- en: If your self was unlimited, then you would die, because death is metaphorical.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的自我是无限制的，那么你就会死亡，因为死亡是比喻性的。
- en: It is the destruction of distinction within consciousness.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这是意识中区别的破坏。
- en: If the distinction between self and other is dissolved, then the form that is
    your self is dead. Ego death. You become one with the Universe. Most people want
    this because it sounds cool. It’s another status game to them.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如果自我与他人的区别被消解，那么你的自我形式就死了。自我消亡。你与宇宙合为一体。大多数人想要这样，因为这听起来很酷。对他们来说，这是另一种地位游戏。
- en: Alright alright enough with the abstractions, let’s make this practical.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，好吧，别再抽象了，让我们来点实际的。
- en: Clarity is the key to enjoyment.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰是享受的关键。
- en: But enjoyment isn’t the only piece of the puzzle.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 但乐趣不是谜题的唯一部分。
- en: We can enjoy a life that someone assigns to us, but that does not bring fulfillment.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以享受别人赋予我们的生活，但这并不带来满足感。
- en: 'Sustainable, long-term clarity comes from 2 sources:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 可持续、长期清晰的来源有两个：
- en: 1) Self-generated goals in alignment with a conscious future.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 1) 与有意识未来一致的自我生成目标。
- en: 2) Soceity-generated goals in alignment with an unconscious future.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 2) 与无意识未来一致的由社会产生的目标。
- en: One is created, one is assigned.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 一个是创造的，一个是分配的。
- en: If we don’t want our life to be the product of someone else’s vision, we must
    take control of our own.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们不想我们的生活成为他人愿景的产物，我们必须掌控自己的生活。
- en: Let’s dive in.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨。
- en: Most People Don’t Need Motivation, They Need Clarity
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 大多数人不需要动力，他们需要清晰。
- en: Motivation is like standing on one side of a canyon.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 动机就像站在峡谷的一边。
- en: The other side looks like a Utopia. Everything you could ever want. Beautiful
    people, music, cars, houses, all calling your name to take the leap, but you don’t
    have a way to get over the canyon.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 另一边看起来像是一个乌托邦。你想要的一切。美丽的人、音乐、汽车、房子，都在呼唤你跳入其中，但你没有越过峡谷的方法。
- en: Clarity is the first plank of the bridge toward the other side.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰是通往另一边的桥梁的第一块木板。
- en: Motivation can be illustrated with the behavior molecule, dopamine.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 动机可以通过行为分子多巴胺来解释。
- en: When something is “far” away from us, we desire it more.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 当某物“远离”我们时，我们更渴望它。
- en: When we acquire that thing – like a house, car, pretty person, watch, or even
    something like an internet course – we feel good for a bit.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们获得某样东西——比如房子、汽车、漂亮的人、手表，甚至是像网络课程这样的东西——我们会在一段时间内感到良好。
- en: But then it becomes normal.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 但然后它变得正常。
- en: We know this as the “honeymoon” phase.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将其称为“蜜月期”。
- en: Now, dopamine is not bad. *It’s one of the most important neurotransmitters
    in your life*. It is the drive behind your dreams.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，多巴胺并不坏。*它是你生活中最重要的神经递质之一*。它是你梦想背后的驱动力。
- en: The problem is that we don’t know how to utilize it.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是我们不知道如何利用它。
- en: Most people drown in motivation.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人沉溺于动力。
- en: They see so many things out of their reach, especially on social media.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 他们看到许多触手可及的东西，尤其是在社交媒体上。
- en: Over and over again they waste the most precious energy source to act on their
    dreams.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 他们一次又一次地浪费了实现梦想最宝贵的能量来源。
- en: And even if they do acquire what they want, like a car, they don’t know how
    to swap their focus to sustain their enjoyment of that thing.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 即使他们也得到了他们想要的东西，比如一辆车，他们也不知道如何调整他们的注意力来维持对那件事的享受。
- en: The “here and now” neurotransmitters like serotonin, oxytocin, endorphins, and
    endocannabinoids give you satisfaction and appreciation for what’s in front of
    you.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: “此时此刻”的神经递质，如血清素、催产素、内啡肽和内大麻素，给你带来满足感和对面前事物的欣赏。
- en: While some people take drugs like molly and marijuana to send them into the
    present moment (I’m not judging, I’ve taken them too), there are more sustainable
    ways to do this.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然有些人通过服用molly和大麻等药物来让自己进入当下（我不做评判，我也服用过），但还有更可持续的方法来做这件事。
- en: '**1) Mindfulness & Detail**'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 正念与细节**'
- en: Notice the detail that your senses can provide.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 注意你的感官可以提供的细节。
- en: When you are on a walk, try to *see* more than you’ve seen before.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在散步时，试着比以前看到更多。
- en: Snap out of your mindless and “normal” routine of living on the surface.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 从你无意识的“正常”生活中清醒过来。
- en: Notice the extravagant detail in the leaves of a tree, the blades of grass,
    and the shine of the light on cars as they pass by.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 注意树叶、草叶和汽车经过时灯光的华丽细节。
- en: When you cook a meal, notice the differences in texture, taste, and feel. Try
    to pick apart the ingredients.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 当你烹饪一顿饭时，注意质地、味道和感觉的差异。试着分析配料。
- en: When listening to a song, dig deep. Can you hear the subtle layers in the background?
    Those were intentional by the Creator. They want you to notice them.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 当听一首歌时，深入挖掘。你能听到背景中微妙的层次吗？这是创造者有意为之的。他们希望你能注意到它们。
- en: You can see why food critics, music lovers, and yogis enjoy certain activities
    so much. Because the present moment is enjoyable.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以理解为什么美食评论家、音乐爱好者以及瑜伽士如此享受某些活动。因为当下是愉快的。
- en: This is reality. An ever-flowing quality of experience.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这是现实。一种不断流动的经验质量。
- en: Apply this strategy when you acquire something that is border lining boredom.
    There is an entire world you have yet to discover.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 当你获得的东西接近无聊时，应用这个策略。你还有整个世界尚未发现。
- en: '**2) Developing An Intrinsic Philosophy**'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 培养内在哲学**'
- en: Let’s imagine a young bodybuilder.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象一个年轻的健美运动员。
- en: They start going to the gym for vanity, but stay for therapy.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 他们开始去健身房是为了虚荣，但留下来是为了治疗。
- en: They desire a strong, aesthetic physique so they can attract a partner and command
    respect.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 他们渴望一个强壮、美观的体格，这样他们就可以吸引伴侣并赢得尊重。
- en: But, after a year or two, their progress drastically slows down.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，一年或两年后，他们的进步急剧放缓。
- en: They’ve built a great body, but what’s next?
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 他们已经打造了一个好身体，但接下来是什么？
- en: It didn’t change how many people they attracted. Maybe it bumped them up in
    the social hierarchy a bit. But for what? A bit more attention? Is it worth spending
    7-8 hours a week on this still?
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 它没有改变他们吸引的人数。也许它在社会等级上稍微提升了一点。但为了什么？一点更多的关注？这值得每周花7-8个小时在这上面吗？
- en: So, they look inward.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，他们开始向内看。
- en: What has this brought to my life?
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这给我带来了什么？
- en: Why do I keep showing up every day?
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我每天都坚持出现？
- en: Where would I have spent my time otherwise?
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我本可以花时间在哪里？
- en: How has this impacted the people I meet, the conversations I can have, and the
    career opportunities open to me?
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这对我遇到的人、我能进行的对话以及我面前的职业机会有何影响？
- en: They realize that their material pursuit was deeply immaterial. As are most,
    but people glance over that fact.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 他们意识到他们的物质追求实际上是深层次的非物质。大多数人也是如此，但人们往往忽略了这一点。
- en: Their pursuit for better gave them an identity that influenced positive decisions.
    It prevented them from being like the mindless masses.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 他们对更好的追求给了他们一个身份，影响了积极的决策。这阻止了他们成为无脑的大众。
- en: 'The lesson:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 课程：
- en: It’s better to pursue something superficial than it is to do nothing with your
    life. You either learn what you don’t want, so you can pursue what you want, or
    you find depth, meaning, and spirituality along the way.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 追求表面的事物，总比在生活中无所事事要好。你要么学会你不想做的事情，这样你就可以追求你想要的事情，要么在过程中找到深度、意义和精神。
- en: '**3) Learning & Education**'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 学习与教育**'
- en: 95% of people will scoff at someone that buys a new Porsche GT3.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 95%的人会对买新保时捷GT3的人嗤之以鼻。
- en: That’s because they only see the surface.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 那是因为他们只看到了表面。
- en: And they can’t open their mind to think that the other person’s identity is
    more than just that snapshot of their life.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 他们无法打开心扉去思考，认为对方的身份不仅仅是他们生活中的一张快照。
- en: What if the person that bought it was a mechanic?
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 如果买它的人是一个机械师呢？
- en: What if they derived deep satisfaction from digging into the machinery?
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 如果他们从深入研究机械中获得了深深的满足感呢？
- en: Now, what if the average Joe made the same purchase, but decided to learn something
    new? Rather than sitting around and acquiring more material?
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果平均的乔（Joe）做出了同样的购买决定，但决定学习一些新东西？而不是坐着获取更多的物质？
- en: They can learn their way into a deeper crevice of reality through education.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 他们可以通过教育的方式深入到现实的更深层次。
- en: They study the car’s parts, history, and how to drive better.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 他们研究汽车部件、历史以及如何更好地驾驶。
- en: They start visiting the track and the car becomes a consistent part of their
    lifestyle. One that brings enjoyment and flow.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 他们开始参观赛道，汽车成为他们生活方式的一个持续部分。它带来了享受和流畅感。
- en: They construct a house of meaning under the foundation of material. Most people
    keep laying a foundation and never build anything worth keeping.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 他们建立在物质基础上的意义之屋。大多数人只是继续打基础，却从未建造出值得保留的东西。
- en: '*With this knowledge, the key to the good life is a disciplined balance between
    meaningful dopamine sources and creating satisfaction when you achieve those goals**.*'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '*有了这些知识，美好生活的关键在于在有意义的多巴胺来源和实现目标时创造满足感之间保持自律的平衡**。'
- en: Enjoyment VS Pleasure (Choose Your Dopamine Sources Wisely)
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 享受 VS 快乐（明智地选择你的多巴胺来源）
- en: Enjoyment comes from investing attention.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 享受来自于投入注意力。
- en: Pleasure comes from spending attention.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 快乐来自于投入注意力。
- en: Investments are long-term.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 投资是长期的。
- en: Purchases are short-term.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 购买是短期的。
- en: Enjoyment is process focused.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 享受是关注过程。
- en: Pleasure is outcome focused.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 快乐是关注结果。
- en: Enjoyment is progress toward a long-term goal.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 享受是朝着长期目标前进的过程。
- en: Pleasure is achieving a goal without effort.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 快乐是无需努力就能实现目标。
- en: Our goal is to maximize the enjoyment in our everyday life. That’s all anyone
    is trying to do. But they don’t zoom out enough to create a perspective that is
    distraction-proof. They focus on what can bring pleasure right here and now.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标是最大化我们日常生活中的享受。这就是每个人都在尝试做的事情。但他们没有足够地退后一步，以创造一个防干扰的视角。他们专注于什么可以立即带来快乐。
- en: We don’t want to get stuck scrolling social media, having meaningless sex (in
    more ways than physical), and winning arguments in the comments that lead to absolutely
    nothing but time wasted.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不想陷入刷社交媒体、进行无意义的性（不仅仅是身体上的）和赢得评论中的争论，这些争论除了浪费时间外，毫无意义。
- en: We want to act on our goals, build something beneficial in reality, and impact
    others in a way that brings enjoyment to our lives.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我们想要采取行动实现我们的目标，在现实中构建一些有益的东西，并以一种给我们生活带来快乐的方式影响他人。
- en: The Anti-Vision
  id: totrans-112
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 反愿景
- en: I talk *a lot* about having a vision for the future.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 我经常谈论对未来有一个愿景。
- en: Why?
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: Because at every point in my life where I have made substantial progress (and
    enjoyed every second of it) I was hellbent on actualizing a vision I held in my
    mind.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 因为在我人生的每一个取得实质性进步（并且享受每一刻）的时刻，我都决心实现我心中持有的愿景。
- en: People that have experienced the same know this power.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 经历过的人都知道这种力量。
- en: That’s why I write about it so much.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是为什么我如此频繁地写关于它。
- en: I want to understand it more.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 我想要更深入地理解它。
- en: I want to write to the point of having a process that helps more people create
    and actualize their own vision.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望写出一个有助于更多人创造和实现他们自己愿景的过程。
- en: One concept I’ve coined that has helped many is the *Anti-Vision*.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 我提出的一个概念帮助了许多人，那就是*反愿景*。
- en: In brief, it is how you realize what you don’t want.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，这是你如何意识到你不想拥有的东西。
- en: The things you hate and don’t want as a part of your life.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 你讨厌的，不希望成为你生活一部分的事情。
- en: Does this mean you can get rid of them immediately?
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 这是否意味着你可以立即摆脱它们？
- en: Of course not.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 当然不是。
- en: You can’t just quit your job or move out of your hometown if you’ve built an
    entire house of responsibilities around it. There is more on the line than just
    money if you quit your job. Be smart about this. Long term game.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你围绕它建立了一个由责任组成的整个房子，你就不能只是辞职或搬出你的家乡。如果你辞职，涉及的不仅仅是金钱。要对此事明智地处理。这是一个长期的游戏。
- en: 'To create your anti-vision:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建你的反愿景：
- en: '**1) Observe society as a habit** – Pay close attention to the people around
    you in any situation. Why do they do what they do? What is it leading towards?
    Are they somebody that you want to be?'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 观察社会作为一种习惯** – 在任何情况下，密切关注你周围的人。他们为什么这样做？这会引导他们走向何方？他们是你要成为的人吗？'
- en: It could be as simple as observing the groceries in their basket, observing
    their body, and realizing you don’t want to end up slow, overweight, and lazy
    through your shopping habits.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能就像观察他们篮子里的杂货，观察他们的身体，并意识到你不想通过你的购物习惯最终变得迟钝、超重和懒惰一样简单。
- en: '**2) Reflect on your past** – What are experiences that you never want to experience
    again? What were the lowest lows of your life? What caused them? Have you done
    anything to prevent that from happening again?'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 反思你的过去** – 你永远不希望再次经历哪些经历？你人生中最低谷的时刻是什么？是什么原因造成的？你做了什么来防止它再次发生？'
- en: Make this a conscious practice in your life.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 让这成为你生活中的一个有意识的实践。
- en: '**3) Make a list of what you don’t want** – Pull out a notebook and get specific.
    This list should make you uncomfortable.'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 列出你不想拥有的东西** – 拿出笔记本，具体化。这份清单应该让你感到不舒服。'
- en: Keep this somewhere safe. When something new comes to mind, add to it.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 把这个放在一个安全的地方。当有新的想法出现时，就添加进去。
- en: '**4) Realize where you will be if you keep doing the same thing** – You are
    your habits. Where will your life end up if you have the same lifestyle in 10
    years?'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 实现如果你继续做同样的事情你会变成什么样子** – 你是你自己的习惯。如果你在10年后保持同样的生活方式，你的生活会结束在哪里？'
- en: Do you want that?
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 你想要吗？
- en: '**5) Transmute that energy into a passionate vision** – What will you have
    to learn, build, and execute daily to avoid your anti-vision?'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: '**5) 将这种能量转化为充满激情的愿景** – 你每天需要学习、构建和执行什么，以避免你的反愿景？'
- en: If you want to turn your vision into a brand, and your notes into content so
    you can build an authentic one-person business, [check out 2 Hour Writer here.](https://2hourwriter.com)
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要将你的愿景转化为品牌，将你的笔记转化为内容，以便建立一个真实的一人企业，[在这里查看2小时作家](https://2hourwriter.com)。
- en: The Vision
  id: totrans-137
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 愿景
- en: Your vision is your frame.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 你的愿景是你的框架。
- en: It is what you hold in the back of your mind to guide your daily actions.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你放在心中引导你日常行动的东西。
- en: It’s not about having long-term or short-term focus, it’s about having both.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是关于长期或短期关注，而是关于两者都要有。
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1356">![](../Images/3f4914a4af9d81aeac4bc2aa579330d3.png)</picture>
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1356">![](../Images/3f4914a4af9d81aeac4bc2aa579330d3.png)</picture>
- en: Now that you’ve created a specific anti-vision for your future, you’ve primed
    your mind for pattern recognition.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经为你的未来创造了一个具体的反愿景，你已经为你的大脑做好了模式识别的准备。
- en: Yes, it is helpful to get specific on what you want out of life, but I will
    leave that to you.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，明确你想要从生活中得到什么是有帮助的，但我会把这个留给你。
- en: Take the time to write out the opposite of your anti-vision. Get specific as
    to what your dream life looks like.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 抽出时间写下你反愿景的反面。具体说明你梦想的生活是什么样的。
- en: By doing this you allow your mind to register opportunities you would have normally
    missed.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这样做，你让你的大脑能够记录下你通常会错过的机会。
- en: Your vision may not be “strong” yet, but you cannot improve what doesn’t exist.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 你的愿景可能“还不强”，但你不能改善不存在的东西。
- en: With your vision in the back of your mind, start executing a better future through
    education, practice, and building.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 在心中牢记你的愿景，通过教育、实践和构建来开始执行一个更好的未来。
- en: How To Learn & Build
  id: totrans-148
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何学习与构建
- en: Schools can’t, and won’t, teach you how to build your dreams.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 学校无法，也不会教你如何构建你的梦想。
- en: Schools are intimately connected with the government, politics, and economy.
    Their conditioning process (education) is set up to keep these things going.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 学校与政府、政治和经济紧密相连。它们的条件化过程（教育）被设定为维持这些事物的发展。
- en: Anything that gives individuals power is a threat.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 任何赋予个人权力的事物都是一种威胁。
- en: Self-education is a requirement on your journey.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 自我教育是你旅程中的必需品。
- en: It’s obvious, you can’t achieve your goals at your current level of development.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 很明显，你不能在你当前的发展水平上实现你的目标。
- en: You will have to learn the skills necessary to achieve them.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 你将不得不学习实现它们所需的技能。
- en: It wouldn’t be challenging otherwise, would it?
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 否则，它不会具有挑战性，对吧？
- en: Challenge plays a crucial role in the flow state, enjoyment, and dopamine –
    but only if you take on challenges that aren’t too boring or difficult. Play at
    your level, but try to make it to the next level.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战在心流状态、享受和多巴胺中扮演着至关重要的角色——但只有当你接受的不是过于无聊或困难的挑战时。在你的水平上玩游戏，但尽量达到下一个水平。
- en: If you want to retain everything you learn (or at least the important things,
    not the noise) then you must build as you learn.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要保留你所学的一切（或者至少是重要的事情，而不是噪音），那么你必须在学习的同时构建。
- en: 'Here’s what you do:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你需要做的：
- en: '**1) Write Down 10-20 Specific Skills, Interests, or Topics That Will Actualize
    Your Vision**'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 列出10-20个具体技能、兴趣或主题，这些将实现你的愿景**'
- en: Now, we need clarity on what we need to do every single day to actualize our
    vision.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们需要明确我们每天需要做什么来实现我们的愿景。
- en: Most people fail to make tangible progress because they don’t realize that a
    lifelong habit of education, skill acquisition, and practice is how you build
    a better life.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人未能取得有形的进步，因为他们没有意识到终身的教育、技能获取和实践是构建更好生活的方式。
- en: This is not optional.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是可选择的。
- en: If you don’t have time carved out each day to *practice your craft, for life,*
    then you aren’t going to make it anywhere meaningful.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你每天没有抽出时间来*练习你的技艺，终身地*，那么你不会在任何有意义的领域取得成功。
- en: Life itself is a practice and people aren’t showing up.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 生命本身是一种实践，人们并没有出现。
- en: They sit at home and distract themselves with mindless entertainment.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 他们呆在家里，用无意义的娱乐来分散自己的注意力。
- en: You don’t have your ideal lifestyle because you aren’t living that lifestyle
    now, but on a smaller scale. As you get better at what you do, the time you spend
    doing it will increase, and money will become inevitable.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有你理想的生活方式，因为你现在没有生活在那种生活方式中，但规模较小。随着你在所做的事情上变得更好，你花在它上面的时间将会增加，金钱将变得不可避免。
- en: The key to all of this is specificity.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这一切的关键在于具体性。
- en: Don’t write down “web design.”
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 不要写下“网页设计。”
- en: Write down “how to create landing pages that are actually useful to businesses.”
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 写下“如何创建对商业真正有用的着陆页。”
- en: Don’t write down “the gym.”
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 不要写下“健身房”。
- en: Write down “diet and training principles to lose 10 pounds of fat in 6 weeks.”
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 写下“如何在6周内减掉10磅脂肪的饮食和训练原则。”
- en: Do this 10 times minimum.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 至少做10次。
- en: If you don’t see how the skills or interests will aid in your vision, remove
    them.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你看不到技能或兴趣如何帮助你实现愿景，就移除它们。
- en: '**2) Leverage Dopamine Through Pattern Recognition & Momentum**'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 通过模式识别和动力利用多巴胺**'
- en: Connecting ideas or noting patterns in reality raises dopamine levels in the
    brain.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实中连接想法或注意模式可以提高大脑中的多巴胺水平。
- en: It’s the same reason cocaine feels so good (dopamine) but this is much more
    sustainable. It is addictive.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是为什么可卡因感觉如此好的原因（多巴胺），但这更加可持续。它是上瘾的。
- en: This process becomes more powerful with momentum.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程随着动力的增加而变得更加强大。
- en: Think of it like doing a sudoku puzzle.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 将其想象成解决数独谜题。
- en: You come up with one answer – dopamine increases.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 你会想出一个答案——多巴胺增加。
- en: Then, like magic, other answers click into place and you can’t stop solving
    the puzzle – dopamine compounds.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，就像魔法一样，其他答案会突然出现，你无法停止解决这个谜题——多巴胺累积。
- en: The same thing happens when you have an idea at night that triggers 10 more
    that keep you awake.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在晚上有一个想法，这个想法又引发了你10个其他想法，让你整夜无法入睡时，情况也是一样的。
- en: When you notice one idea that connects to your vision, your signal-to-noise
    ratio increases.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 当你注意到一个与你愿景相连的想法时，你的信号与噪声比会增加。
- en: Your attention narrows on *more* relevant information and your mind lights up
    with excitement.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 你的注意力集中在**更多**相关的信息上，你的思维因兴奋而发光。
- en: '*This is why it feels so good to “live with purpose.”*'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: '*这就是为什么“有目的地生活”感觉如此美好。*'
- en: '**3) Learn & Build –** **Eliminate** **Useless Information**'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 学习与构建 –** **消除** **无用信息**'
- en: Everyone is telling you what to do.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都在告诉你该做什么。
- en: They’re projecting what they deem important onto you.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 他们正在将他们认为重要的东西投射到你身上。
- en: If you aren’t where you want to be in life, nothing is as important as your
    goals.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的人生还没有达到你想要的状态，那么没有什么比你的目标更重要。
- en: Not the news, not your friends’ relationship problems, and definitely not who’s
    getting elected.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 不是新闻，不是你朋友的感情问题，当然也不是谁当选。
- en: On the election part – why are people so up in arms about gas prices and whether
    or not they can have a baby?
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 在选举方面 – 为什么人们对油价和是否能够生育如此激动？
- en: Because it’s easier to submit a vote than it is to change your life.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 因为投票比改变你的生活更容易。
- en: I’m not saying these issues aren’t important to you, I’m saying that “voting”
    is the worst way to go about it.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 我并不是说这些问题对你不重要，我的意思是“投票”是处理这些问题的最糟糕方式。
- en: Zoom out.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 放大视角。
- en: Build a business so you don’t have to worry about gas prices.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 创业，这样你就不用担心油价了。
- en: Build an audience and present your perspective to millions so you *actually*
    have an impact on the votes of your bodily rights.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 建立一个观众群体，向数百万观众展示你的观点，这样你**实际上**对你的身体权利的投票产生影响。
- en: The only way to bring your vision into reality is to create.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的愿景变为现实唯一的方法是创造。
- en: To create, you need boundaries for your creativity (or else things get too chaotic
    and overwhelming.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 要创造，你需要为你的创造力设定边界（否则事情会变得过于混乱和压倒性）。
- en: You need goals turned into projects so you have something tangible to work on.
    These provide the boundaries for your learning and creativity.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要将目标转化为项目，这样你就有具体的工作可以做了。这些为你学习和创造力提供了边界。
- en: Break down your vision into goals now. Yearly, monthly, weekly.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 现在将你的愿景分解成目标。年度的、月度的、周度的。
- en: Turn all of them into milestones for a tangible project you can work on, like
    a [personal brand or one person business](https://digitaleconomics.school). Something
    that is holistic and evolved with you. Not a static business model that sounds
    too good to be true.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 将它们全部转化为你可以工作的具体项目的里程碑，比如一个[个人品牌或单人企业](https://digitaleconomics.school)。一个与你整体发展和进化相一致的东西。不是一个听起来太美好而不真实的静态商业模式。
- en: With your vision and project in mind, start building and learning.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 在心中想着你的愿景和项目，开始构建和学习。
- en: Work on your project daily regardless of if you know what you are doing.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是否知道自己在做什么，都要每天工作在你的项目上。
- en: You don’t know what you are doing because you haven’t encountered a problem
    to frame your learning.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 你不知道自己在做什么，因为你还没有遇到一个可以让你学习的问题。
- en: That is the best way to learn.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是最好的学习方式。
- en: Encounter a *real-world* problem.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 遇到一个**现实世界**的问题。
- en: Research specific information to solve it.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 研究具体信息来解决它。
- en: Keep a steady flow of information from your consumption.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 保持从你的消费中稳定的信息流。
- en: Solve the problem, enjoy the dopamine, and let momentum carry you into a season
    of intensity.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 解决问题，享受多巴胺带来的快感，让势头带你进入一个充满活力的季节。
- en: The rest is in your hands.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 其余的都掌握在你手中。
- en: – Dan
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
