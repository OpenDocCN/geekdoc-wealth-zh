- en: Why You Won’t Change (How To Reinvent Yourself)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/why-you-wont-change-how-to-reinvent-yourself/](https://thedankoe.com/letters/why-you-wont-change-how-to-reinvent-yourself/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I was a boy scout when I was a kid.
  prefs: []
  type: TYPE_NORMAL
- en: I would show up to my former church on Tuesday nights, put a 3 finger salute
    in the air, and recite the scout oath.
  prefs: []
  type: TYPE_NORMAL
- en: Our troop would discuss our weekly agenda, work towards merit badges that interested
    us, and plan our next camping trip.
  prefs: []
  type: TYPE_NORMAL
- en: Every year we had what was called a “High Adventure” trip.
  prefs: []
  type: TYPE_NORMAL
- en: These adventures were week-long camping trips. Sometimes we would go and build
    our own snow caves to sleep in. Others we would join other scout troops from across
    the state, work towards different merit badges (like the survival merit badge
    where I had to create a shelter out of tree bark and “survive” the night), and
    during the night we would sit around the campfire and play games.
  prefs: []
  type: TYPE_NORMAL
- en: One year we decided to go to Catalina Island. We had the lofty goal of kayaking
    around the island and camping on different beaches along the way.
  prefs: []
  type: TYPE_NORMAL
- en: When that day came, we drove to California, got on the fairy, and landed in
    Catalina after an hour of card games and virgin Piña Coladas.
  prefs: []
  type: TYPE_NORMAL
- en: Since we got there late we had to *rush to our kayak rentals and “set sail”*
    almost immediately. No downtime, a tad stressful.
  prefs: []
  type: TYPE_NORMAL
- en: We partnered up, strapped our oversized duffle bags to the back of the small
    boats, and banked on our previous canoeing (a canoe is a boat similar to a kayak)
    merit badge to have made us skilled enough to navigate the next 5 hours in the
    ocean.
  prefs: []
  type: TYPE_NORMAL
- en: Life Comes In Waves
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The waters were smooth for about an hour. No problems. Peaceful.
  prefs: []
  type: TYPE_NORMAL
- en: That was until the ocean’s waves started getting a bit deeper. We thought it
    was temporary because we couldn’t see the storm that was coming over the other
    side of the island. We were too close to the cliffside to see anything aside from
    the clear skies to our right.
  prefs: []
  type: TYPE_NORMAL
- en: Long story short, *we got caught in the middle of the storm* halfway through
    our adventure.
  prefs: []
  type: TYPE_NORMAL
- en: The waves grew to a minimum of 10 feet in size.
  prefs: []
  type: TYPE_NORMAL
- en: Our group started to get split up — the strong and able in the front, the weak
    in the back.
  prefs: []
  type: TYPE_NORMAL
- en: '**My buddy and I flipped our kayak multiple times.** Soaked. Cold. Nearly losing
    our paddles. Can’t hear a thing. Dense and heavy rain needling the parts of our
    body that were above water.'
  prefs: []
  type: TYPE_NORMAL
- en: My duffel bag fell off at one point — soaking all of my food and clothes – making
    me dive in to grab it and attempt at tying it back on.
  prefs: []
  type: TYPE_NORMAL
- en: Not to mention… we were paddling *against* the strong winds. Making barely any
    progress towards our beach destination.
  prefs: []
  type: TYPE_NORMAL
- en: '**This was the one moment in my life where I truly thought my life was over.**'
  prefs: []
  type: TYPE_NORMAL
- en: The scout leaders’ orange paddles could only be seen when they were at the bottom
    of a wave when we were at the top. We lost them after about the first 30 minutes
    of the storm.
  prefs: []
  type: TYPE_NORMAL
- en: My kayak buddy and I went through phases of paddling as hard as we can and accepting
    our demise. Slouched in the storm. Defeated. Giving in to the waves and praying
    that they didn’t slam us into the cliffside that was ~100-200 feet away from us.
  prefs: []
  type: TYPE_NORMAL
- en: Time was a blur at this point. We eventually saw the shore, regained hope, and
    paddled as hard as we possibly fucking could to reach land.
  prefs: []
  type: TYPE_NORMAL
- en: Crashing on shore, we dragged our kayak onto the beach and collapsed. All of
    us slightly convulsing from the cold trying to expose as much of our bodies to
    the sun as we could.
  prefs: []
  type: TYPE_NORMAL
- en: Those that fell behind showed up with the island rescue team about an hour later.
    All of my food and clothes were still soaked (and ended up getting eaten by birds
    while we were sleeping).
  prefs: []
  type: TYPE_NORMAL
- en: Safe to say, we had to call the trip short and left the next day.
  prefs: []
  type: TYPE_NORMAL
- en: There is a lot we can learn from this story, it mimics [life’s cycles of intensity](https://thedankoe.com/if-you-feel-lost-understand-these-3-phases-of-life/)
    quite well — but I want to paint a different picture.
  prefs: []
  type: TYPE_NORMAL
- en: High Highs And Low Lows
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-638">![](../Images/399cc4a2c5fcc65ff86d0d0491672326.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: When we were on top of the waves, there was hope.
  prefs: []
  type: TYPE_NORMAL
- en: When we were deep in the trenches, hope was scarce.
  prefs: []
  type: TYPE_NORMAL
- en: When you feel on top of the world, nothing can stop you.
  prefs: []
  type: TYPE_NORMAL
- en: When you fall to the bottom of the ocean, anything can stop you.
  prefs: []
  type: TYPE_NORMAL
- en: You’re out in the cold, you start shivering, why? Because you’re resisting the
    cold, you are tightening your muscles against the cold and you get the staggers.
    Take it easy, go with the cold, relax.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Alan Watts
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In classical mechanics, *a harmonic oscillator is a system that tries to maintain
    equilibrium* (homeostasis).
  prefs: []
  type: TYPE_NORMAL
- en: The 80/20 of what you need to know is that when equilibrium is displaced, it
    bounces back in the same amount the opposite direction and eventually brings itself
    back to equilibrium.
  prefs: []
  type: TYPE_NORMAL
- en: Our mind is no different.
  prefs: []
  type: TYPE_NORMAL
- en: The high highs that we grow to look forward to in life are *always* followed
    by a low low. Always. If you don’t recognize it as a low low – congratulations,
    you have developed a certain level of mindfulness when interacting the battles
    that come while you are deep in the trenches.
  prefs: []
  type: TYPE_NORMAL
- en: Our mind is a network of complex systems that have been conditioned over time
    through positive and negative feedback. That’s how systems work, right?
  prefs: []
  type: TYPE_NORMAL
- en: If you receive negative feedback, you won’t do that again.
  prefs: []
  type: TYPE_NORMAL
- en: If you receive positive feedback, you will do that again.
  prefs: []
  type: TYPE_NORMAL
- en: If you consistently receive positive feedback for doing one specific thing,
    it becomes engrained in your psyche. The action, belief, or thought pattern become
    habitual. They happen on autopilot.
  prefs: []
  type: TYPE_NORMAL
- en: Like training a dog. They don’t understand words, but they can associate tones
    and patterns with certain meanings — positive and negative. If a dog has sub-optimal
    behavior, you use a certain tone or strategy to give the dog negative feedback.
    Do this enough times and they will eventually change their behavior, which you
    can reinforce (condition) with positive feedback.
  prefs: []
  type: TYPE_NORMAL
- en: This malleable nature of our mind can be very dangerous (when unconscious) or
    very beneficial (when conscious).
  prefs: []
  type: TYPE_NORMAL
- en: This shows that we have the power to recondition, reprogram, or rewire our brain
    — but our harmonic oscillator of a mind won’t let us off that easy.
  prefs: []
  type: TYPE_NORMAL
- en: '***Shameless Mid Koe Letter Plug**: [Readers can join Modern Mastery for $5](https://modernmastery.co/letter)
    — join 1000+ members and access 170+ life and business strategies, roadmaps, live
    trainings, & personalized help.*'
  prefs: []
  type: TYPE_NORMAL
- en: Layers Of Identity
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you want to change your life, you must change your identity.
  prefs: []
  type: TYPE_NORMAL
- en: A healthy person does not see eating healthy as a chore. *They ARE a person
    that eats healthy*. There is no other option. It is enjoyable to them.
  prefs: []
  type: TYPE_NORMAL
- en: A businessman does not see focused work as a burden every morning. *They ARE
    a person who gets work done every morning.*
  prefs: []
  type: TYPE_NORMAL
- en: Changing your beliefs, identity, and life is not as simple as it sounds.
  prefs: []
  type: TYPE_NORMAL
- en: I want you to think of your mind as a city. Seattle Washington in specific.
  prefs: []
  type: TYPE_NORMAL
- en: In 1889, a glue pot tipped over resulting in a fire that destroyed a large portion
    of the city. Why?
  prefs: []
  type: TYPE_NORMAL
- en: Aside from the person that thought it would be wise to throw water on the flaming
    glue (making it spread fast) the city was built on a terrible foundation. Wooden
    buildings. Wooden sewage system. Poor construction — the lot of it.
  prefs: []
  type: TYPE_NORMAL
- en: The human psyche is wired for survival. When your beliefs, identity, or life
    is threatened — the brain signals the body, your focus starts to narrow, and you
    give a bit too much attention to the thoughts flooding your mind. Equilibrium
    is displaced and your mind starts reacting accordingly to bring you back to homeostasis.
  prefs: []
  type: TYPE_NORMAL
- en: The problem is that we live in a completely different world than our ancestors.
    We are rarely threatened on a physical level. Most of us have shelter, access
    to food, and the ability to make a living.
  prefs: []
  type: TYPE_NORMAL
- en: Humans are the only beings that equate the death of a belief to physical death.
  prefs: []
  type: TYPE_NORMAL
- en: This survival mechanism can be dangerous and damaging. If you attempt to change
    your identity by making one small change, you displace equilibrium (or tip over
    a pot of glue) and potentially set fire to a portion of the city that has been
    built in your mind over years of construction (conditioning).
  prefs: []
  type: TYPE_NORMAL
- en: When you try reconstruct a piece of your city, it may threaten the entire foundation.
    When you are at the bottom of the wave, you can’t see anything. You may lose hope
    for reaching the shore. You may tip over your kayak a few times.
  prefs: []
  type: TYPE_NORMAL
- en: When you are deep in the trenches of life, you may not interpret it as a good
    thing. You may take it as negative feedback — conditioning a faulty systematic
    thought pattern — and avoid anything that threatens the identity that isn’t conducive
    to a high quality of life.
  prefs: []
  type: TYPE_NORMAL
- en: That’s the challenge with all of this. New Rome is built on top of Ancient Rome
    (and no, it wasn’t built in a day!). New Seattle is built on top of Old Seattle.
  prefs: []
  type: TYPE_NORMAL
- en: All of the buildings, foundations, streets, and other networks are all interconnected.
    Layers upon layers that rely on each other for proper function. An array of systems
    that work in unison to perform what it was meant to perform. Removing a specific
    part may cause temporary damage to how the systems function.
  prefs: []
  type: TYPE_NORMAL
- en: Similar to your identity — we make sense of ourselves through the layers of
    stories, beliefs, and engrained thought patterns that construct how optimally
    our mind operates.
  prefs: []
  type: TYPE_NORMAL
- en: Would I cease to exist if I reconstructed my story? If I revealed and recreated
    the traumas of my past? What if I questioned my hardset religious beliefs? Would
    I still be “me” if my entire life didn’t revolve around the church? What would
    my life look like if I didn’t do the same thing day after day?
  prefs: []
  type: TYPE_NORMAL
- en: It would be difficult to make sense of — that’s for sure.
  prefs: []
  type: TYPE_NORMAL
- en: How To Reinvent Yourself
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There are 2 routes to reinventing yourself:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Hit rock bottom.**'
  prefs: []
  type: TYPE_NORMAL
- en: By feeling into the lowest of lows in your life, [you start to become fed up
    with your life situation.](https://thedankoe.com/get-mad-at-where-you-are-in-life/)
  prefs: []
  type: TYPE_NORMAL
- en: You become hyper aware of what is holding you back. You dig deep into the layers
    of your identity and find just the right piece to remove in order to launch in
    the opposite direction.
  prefs: []
  type: TYPE_NORMAL
- en: This comes with a lot of pain and suffering — and is often uncontrollable. Burning
    down your metaphorical city may cause some deeper issues leading to another rock
    bottom years later in life.
  prefs: []
  type: TYPE_NORMAL
- en: Everybody I have met that hit rock bottom was from an unfortunate hand they
    were dealt with by life itself.
  prefs: []
  type: TYPE_NORMAL
- en: There is a better option. One that is completely within your control.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Stack small wins.**'
  prefs: []
  type: TYPE_NORMAL
- en: Everybody has heard of James Clear’s “One Percent Better Everyday” mantra.
  prefs: []
  type: TYPE_NORMAL
- en: It holds a lot of power.
  prefs: []
  type: TYPE_NORMAL
- en: When you reconstruct your city piece by piece, you build what would be New Seattle
    (without having to burn down half the city).
  prefs: []
  type: TYPE_NORMAL
- en: Where do you begin?
  prefs: []
  type: TYPE_NORMAL
- en: By getting crystal clear on your vision and anti-vision.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t know what you want, understand what you don’t want and work in
    the opposite direction.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [June 15, 2022](https://twitter.com/thedankoe/status/1537030087874420738?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Thanks to our brains negativity bias, it is easy to observe what you don’t want
    and start working in the opposite direction.
  prefs: []
  type: TYPE_NORMAL
- en: When you [outline a vision for your future](https://thedankoe.com/how-to-create-a-life-of-meaning-money-impact-as-fast-as-humanly-possible/),
    it will shine the light of awareness on your blindspots.
  prefs: []
  type: TYPE_NORMAL
- en: If you are lost, the answer is education.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you are educated, the answer is action.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you are acting, the answer is consistency.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [March 29, 2022](https://twitter.com/thedankoe/status/1508796620569206784?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As you reverse engineer your vision into 10-year, 1-year, and monthly goals
    — you start to gain clarity on what you need to do in order to actualize that
    vision.
  prefs: []
  type: TYPE_NORMAL
- en: Now, we can break things down into priority tasks.
  prefs: []
  type: TYPE_NORMAL
- en: From there — and by far the most important step — is reducing the friction of
    taking action.
  prefs: []
  type: TYPE_NORMAL
- en: What is the smallest mental, physical, emotional, or financial step you can
    take?
  prefs: []
  type: TYPE_NORMAL
- en: Is it putting on your gym shoes and walking out the door?
  prefs: []
  type: TYPE_NORMAL
- en: Is it moving one leg and getting off of the couch?
  prefs: []
  type: TYPE_NORMAL
- en: Is it investing $25 into a course to show you are serious about improving your
    skill set?
  prefs: []
  type: TYPE_NORMAL
- en: Is it reading the first word of a book or writing the first word of your own
    book?
  prefs: []
  type: TYPE_NORMAL
- en: Actively Construct Your Life
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This is not an easy process. You are still in a metaphorical kayak in the middle
    of a storm. Life is chaotic. Ordering consciousness through vision and goal setting
    is how we gain a sense of certainty and control over our life.
  prefs: []
  type: TYPE_NORMAL
- en: Since we are in an age similar to 5th century BC — there is information and
    an abundance of ideas circulating our world. People are losing trust in externally
    assigned hierarchies of goals whether it be from corporate culture, organized
    religions, or formal education.
  prefs: []
  type: TYPE_NORMAL
- en: Because of this, you must play an active role in constructing your life. This
    requires personal responsibility, massive self-belief, and the realization that
    nobody is coming to save you.
  prefs: []
  type: TYPE_NORMAL
- en: It is in your hands to [collect and organize the abundant information](https://thedankoe.com/how-to-make-money-as-a-creative-on-the-internet/)
    in the world and organize it in a way that will result in a fulfilling income
    source, radiating health, an ordered mind, and a connected spirit.
  prefs: []
  type: TYPE_NORMAL
- en: 'Hard pill to swallow:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Most of your limitations are self imposed. If you want something, there’s always
    a way – your mind just won’t let you see it.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [April 12, 2021](https://twitter.com/thedankoe/status/1381538141895528448?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you believe you are in the middle of a storm, you will be.
  prefs: []
  type: TYPE_NORMAL
- en: If you believe you are having fun on a roller coaster of waves, you will have
    fun.
  prefs: []
  type: TYPE_NORMAL
- en: How do you actively construct your life?
  prefs: []
  type: TYPE_NORMAL
- en: Through consciousness, creativity, and intention.
  prefs: []
  type: TYPE_NORMAL
- en: The easiest way to do this is by treating every facet of your life as a project.
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-559">![](../Images/989fcff0a08a3dc77dbd37ce6fd5b055.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is all you need to start changing your life:'
  prefs: []
  type: TYPE_NORMAL
- en: Purchase a blank notebook
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In big letters write “My Scientific Journal”
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Treat your mind, body, spirit, and business as a lifelong project
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Note observations, test small changes, analyze the results, and double down
    on what works
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Stay conscious and aware through silent observation (that can apply to your
    mental, physical, financial, and spiritual projects).
  prefs: []
  type: TYPE_NORMAL
- en: Self-educate to expand awareness and uncover new paths.
  prefs: []
  type: TYPE_NORMAL
- en: Hypothesize and experiment with solutions that will solve your problems.
  prefs: []
  type: TYPE_NORMAL
- en: Analyze the result and get feedback that will begin to rewire the network of
    systems in your mind.
  prefs: []
  type: TYPE_NORMAL
- en: Document a replicable process that can help other people and bring you *more*
    feedback.
  prefs: []
  type: TYPE_NORMAL
- en: Rinse and repeat.
  prefs: []
  type: TYPE_NORMAL
- en: It took 18+ years to condition you to the point you are now.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t expect much progress overnight.
  prefs: []
  type: TYPE_NORMAL
- en: That, my friends, is how you reinvent yourself.
  prefs: []
  type: TYPE_NORMAL
- en: — Dan Koe
  prefs: []
  type: TYPE_NORMAL
