  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**无耻的中途Koe信件推广**：[读者可以以5美元的价格加入现代精通](https://modernmastery.co/letter)——加入1000多名成员，并获取170多条生活和商业策略、路线图、现场培训和个人帮助。'
- en: Layers Of Identity
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 身份的层次
- en: If you want to change your life, you must change your identity.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要改变你的生活，你必须改变你的身份。
- en: A healthy person does not see eating healthy as a chore. *They ARE a person
    that eats healthy*. There is no other option. It is enjoyable to them.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 一个健康的人不会把吃健康食物看作是一项负担。*他们就是那种吃健康食物的人*。没有其他选择。对他们来说，这很享受。
- en: A businessman does not see focused work as a burden every morning. *They ARE
    a person who gets work done every morning.*
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 一个商人不会把专注工作看作是每天早晨的负担。*他们就是那种每天早晨完成工作的人*。
- en: Changing your beliefs, identity, and life is not as simple as it sounds.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 改变你的信念、身份和生活并不像听起来那么简单。
- en: I want you to think of your mind as a city. Seattle Washington in specific.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我想让你把你的思维想象成一个城市。具体来说，是华盛顿州的西雅图。
- en: In 1889, a glue pot tipped over resulting in a fire that destroyed a large portion
    of the city. Why?
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在1889年，一个胶水锅翻倒了，导致一场大火摧毁了城市的大部分地区。为什么？
- en: Aside from the person that thought it would be wise to throw water on the flaming
    glue (making it spread fast) the city was built on a terrible foundation. Wooden
    buildings. Wooden sewage system. Poor construction — the lot of it.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 除了那个认为往燃烧的胶水上倒水（使其蔓延更快）的人之外，这个城市建立在糟糕的基础上。木制建筑。木制下水道系统。建筑质量差——全是这样。
- en: The human psyche is wired for survival. When your beliefs, identity, or life
    is threatened — the brain signals the body, your focus starts to narrow, and you
    give a bit too much attention to the thoughts flooding your mind. Equilibrium
    is displaced and your mind starts reacting accordingly to bring you back to homeostasis.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 人类的心理是为生存而设计的。当你的信念、身份或生活受到威胁时——大脑向身体发出信号，你的注意力开始变得狭窄，你开始过分关注涌入你脑海中的想法。平衡被打破，你的思维开始相应地反应，以将你带回稳态。
- en: The problem is that we live in a completely different world than our ancestors.
    We are rarely threatened on a physical level. Most of us have shelter, access
    to food, and the ability to make a living.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是我们生活在一个与我们祖先完全不同的世界里。我们在物理层面上很少受到威胁。我们大多数人都有住所，有食物来源，有能力谋生。
- en: Humans are the only beings that equate the death of a belief to physical death.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 人类是唯一将信念的死亡等同于物理死亡的存在。
- en: This survival mechanism can be dangerous and damaging. If you attempt to change
    your identity by making one small change, you displace equilibrium (or tip over
    a pot of glue) and potentially set fire to a portion of the city that has been
    built in your mind over years of construction (conditioning).
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这种生存机制可能很危险且具有破坏性。如果你试图通过做出一个小改变来改变你的身份，你打破了平衡（或者翻倒了胶水锅），并可能点燃了你多年来在心中建造的城市的一部分（条件反射）。
- en: When you try reconstruct a piece of your city, it may threaten the entire foundation.
    When you are at the bottom of the wave, you can’t see anything. You may lose hope
    for reaching the shore. You may tip over your kayak a few times.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 当你试图重建你城市的一部分时，它可能会威胁到整个基础。当你处于波浪底部时，你看不到任何东西。你可能会失去到达岸边的希望。你可能会几次翻倒你的皮划艇。
- en: When you are deep in the trenches of life, you may not interpret it as a good
    thing. You may take it as negative feedback — conditioning a faulty systematic
    thought pattern — and avoid anything that threatens the identity that isn’t conducive
    to a high quality of life.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 当你深陷生活的泥潭中时，你可能不会将其视为好事。你可能会将其视为负面反馈——培养错误的系统思维模式——并避免任何威胁到那些不利于高质量生活的身份的事物。
- en: That’s the challenge with all of this. New Rome is built on top of Ancient Rome
    (and no, it wasn’t built in a day!). New Seattle is built on top of Old Seattle.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是所有这些挑战所在。新罗马是建立在古罗马之上的（而且，它不是一天建成的！）。新西雅图是建立在旧西雅图之上的。
- en: All of the buildings, foundations, streets, and other networks are all interconnected.
    Layers upon layers that rely on each other for proper function. An array of systems
    that work in unison to perform what it was meant to perform. Removing a specific
    part may cause temporary damage to how the systems function.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 所有建筑、地基、街道和其他网络都是相互连接的。层层叠叠，相互依赖以确保正常运作。一系列协同工作的系统，以完成其应有的功能。移除特定的部分可能会暂时损害系统的运作方式。
- en: Similar to your identity — we make sense of ourselves through the layers of
    stories, beliefs, and engrained thought patterns that construct how optimally
    our mind operates.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 就像你的身份一样——我们通过故事、信念和根深蒂固的思维模式来理解自己，这些构成了我们的大脑如何最优地运作。
- en: Would I cease to exist if I reconstructed my story? If I revealed and recreated
    the traumas of my past? What if I questioned my hardset religious beliefs? Would
    I still be “me” if my entire life didn’t revolve around the church? What would
    my life look like if I didn’t do the same thing day after day?
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我重建了我的故事，我会消失吗？如果我揭露并重新创造了我的过去的创伤？如果我质疑我根深蒂固的宗教信仰呢？如果我的整个生活不再围绕教堂旋转，我还会是“我”吗？如果我不日复一日地做同样的事情，我的生活会是什么样子？
- en: It would be difficult to make sense of — that’s for sure.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 确实很难理解。
- en: How To Reinvent Yourself
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何重新塑造自己
- en: 'There are 2 routes to reinventing yourself:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 重新塑造自己的有两条途径：
- en: '**1) Hit rock bottom.**'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 达到谷底。**'
- en: By feeling into the lowest of lows in your life, [you start to become fed up
    with your life situation.](https://thedankoe.com/get-mad-at-where-you-are-in-life/)
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 通过感受你生活中最低谷的时刻，[你开始对你的生活状况感到厌倦](https://thedankoe.com/get-mad-at-where-you-are-in-life/)。
- en: You become hyper aware of what is holding you back. You dig deep into the layers
    of your identity and find just the right piece to remove in order to launch in
    the opposite direction.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 你变得极度意识到是什么阻碍了你。你深入挖掘你身份的层次，找到刚好可以移除以朝相反方向前进的那一块。
- en: This comes with a lot of pain and suffering — and is often uncontrollable. Burning
    down your metaphorical city may cause some deeper issues leading to another rock
    bottom years later in life.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这会带来很多痛苦和苦难——通常是难以控制的。烧毁你象征性的城市可能会在多年后导致更深层次的问题，再次达到谷底。
- en: Everybody I have met that hit rock bottom was from an unfortunate hand they
    were dealt with by life itself.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 我遇到的每一个达到谷底的人都是因为生活本身给予他们的不幸。
- en: There is a better option. One that is completely within your control.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个更好的选择。一个完全在你控制之内的选择。
- en: '**2) Stack small wins.**'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 累积小胜利。**'
- en: Everybody has heard of James Clear’s “One Percent Better Everyday” mantra.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都听说过詹姆斯·克莱尔的“每天进步百分之一”的咒语。
- en: It holds a lot of power.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 它拥有很大的力量。
- en: When you reconstruct your city piece by piece, you build what would be New Seattle
    (without having to burn down half the city).
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 当你一点一点地重建你的城市时，你将建立起新西雅图（而不必烧毁城市的一半）。
- en: Where do you begin?
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 你从哪里开始？
- en: By getting crystal clear on your vision and anti-vision.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 通过清晰地确定你的愿景和反愿景。
- en: If you don’t know what you want, understand what you don’t want and work in
    the opposite direction.
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你不知道你想要什么，了解你不想什么，并朝相反方向努力。
- en: ''
  id: totrans-83
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [June 15, 2022](https://twitter.com/thedankoe/status/1537030087874420738?ref_src=twsrc%5Etfw)
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年6月15日](https://twitter.com/thedankoe/status/1537030087874420738?ref_src=twsrc%5Etfw)
- en: Thanks to our brains negativity bias, it is easy to observe what you don’t want
    and start working in the opposite direction.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了我们大脑的负面偏见，观察你不想看到的东西并开始朝相反方向努力是很容易的。
- en: When you [outline a vision for your future](https://thedankoe.com/how-to-create-a-life-of-meaning-money-impact-as-fast-as-humanly-possible/),
    it will shine the light of awareness on your blindspots.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 当你 [规划你未来的愿景](https://thedankoe.com/how-to-create-a-life-of-meaning-money-impact-as-fast-as-humanly-possible/)
    时，它将照亮你盲点的意识之光。
- en: If you are lost, the answer is education.
  id: totrans-87
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你迷失了方向，答案就是教育。
- en: ''
  id: totrans-88
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you are educated, the answer is action.
  id: totrans-89
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你受过教育，答案是行动。
- en: ''
  id: totrans-90
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you are acting, the answer is consistency.
  id: totrans-91
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你正在行动，答案是持续性。
- en: ''
  id: totrans-92
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [March 29, 2022](https://twitter.com/thedankoe/status/1508796620569206784?ref_src=twsrc%5Etfw)
  id: totrans-93
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — DAN KOE (@thedankoe) [2022年3月29日](https://twitter.com/thedankoe/status/1508796620569206784?ref_src=twsrc%5Etfw)
- en: As you reverse engineer your vision into 10-year, 1-year, and monthly goals
    — you start to gain clarity on what you need to do in order to actualize that
    vision.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 当你将你的愿景分解为10年、1年和月度目标时——你开始清晰地了解为了实现这个愿景你需要做什么。
- en: Now, we can break things down into priority tasks.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以将事情分解为优先任务。
- en: From there — and by far the most important step — is reducing the friction of
    taking action.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里——并且是最重要的步骤——是减少采取行动的摩擦。
- en: What is the smallest mental, physical, emotional, or financial step you can
    take?
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 你能采取的最小心理、身体、情感或财务步骤是什么？
- en: Is it putting on your gym shoes and walking out the door?
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 是不是穿上你的运动鞋，走出家门？
- en: Is it moving one leg and getting off of the couch?
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 是不是从沙发上站起来，迈出第一步？
- en: Is it investing $25 into a course to show you are serious about improving your
    skill set?
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 是不是投资25美元进入一个课程，以表明你认真想要提高你的技能集？
- en: Is it reading the first word of a book or writing the first word of your own
    book?
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 是不是阅读书的第一句话，或者写下你自己的书的第一句话？
- en: Actively Construct Your Life
  id: totrans-102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 积极构建你的生活
- en: This is not an easy process. You are still in a metaphorical kayak in the middle
    of a storm. Life is chaotic. Ordering consciousness through vision and goal setting
    is how we gain a sense of certainty and control over our life.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是一个容易的过程。你仍然处于暴风雨中的比喻式皮划艇中。生活是混乱的。通过视觉和目标设定来整理意识是我们获得对生活的确定感和控制感的方式。
- en: Since we are in an age similar to 5th century BC — there is information and
    an abundance of ideas circulating our world. People are losing trust in externally
    assigned hierarchies of goals whether it be from corporate culture, organized
    religions, or formal education.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们处于与公元前5世纪相似的时代——信息和大量观点在我们周围的世界中流传。人们对外部指定的目标层次失去了信任，无论是来自企业文化、有组织的宗教还是正规教育。
- en: Because of this, you must play an active role in constructing your life. This
    requires personal responsibility, massive self-belief, and the realization that
    nobody is coming to save you.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这个原因，你必须积极参与构建你的生活。这需要个人责任感、巨大的自信，以及意识到没有人会来救你。
- en: It is in your hands to [collect and organize the abundant information](https://thedankoe.com/how-to-make-money-as-a-creative-on-the-internet/)
    in the world and organize it in a way that will result in a fulfilling income
    source, radiating health, an ordered mind, and a connected spirit.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的手中，你可以[收集和组织世界上丰富的信息](https://thedankoe.com/how-to-make-money-as-a-creative-on-the-internet/)，并以一种将产生令人满意收入来源、辐射健康、有序的头脑和相连的精神的方式组织它。
- en: 'Hard pill to swallow:'
  id: totrans-107
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 难以下咽的真理：
- en: ''
  id: totrans-108
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Most of your limitations are self imposed. If you want something, there’s always
    a way – your mind just won’t let you see it.
  id: totrans-109
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你的大部分限制都是自我强加的。如果你想要某样东西，总有办法——只是你的大脑不会让你看到它。
- en: ''
  id: totrans-110
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [April 12, 2021](https://twitter.com/thedankoe/status/1381538141895528448?ref_src=twsrc%5Etfw)
  id: totrans-111
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — DAN KOE (@thedankoe) [2021年4月12日](https://twitter.com/thedankoe/status/1381538141895528448?ref_src=twsrc%5Etfw)
- en: If you believe you are in the middle of a storm, you will be.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你认为自己正处于暴风雨中，那么你确实如此。
- en: If you believe you are having fun on a roller coaster of waves, you will have
    fun.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你认为自己正在波浪的过山车上享受乐趣，那么你确实会感到快乐。
- en: How do you actively construct your life?
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何积极地构建自己的生活？
- en: Through consciousness, creativity, and intention.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 通过意识、创造力和意图。
- en: The easiest way to do this is by treating every facet of your life as a project.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 做这件事的最简单方法是将你生活的每一个方面都视为一个项目。
- en: <picture decoding="async" class="wp-image-559">![](../Images/989fcff0a08a3dc77dbd37ce6fd5b055.png)</picture>
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-559">![](../Images/989fcff0a08a3dc77dbd37ce6fd5b055.png)</picture>
- en: 'Here is all you need to start changing your life:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是你开始改变生活的所有你需要的东西：
- en: Purchase a blank notebook
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 购买一本空白笔记本
- en: In big letters write “My Scientific Journal”
  id: totrans-120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用大字写上“我的科学日志”
- en: Treat your mind, body, spirit, and business as a lifelong project
  id: totrans-121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将你的心灵、身体、精神和事业视为一项终身项目
- en: Note observations, test small changes, analyze the results, and double down
    on what works
  id: totrans-122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 记录观察结果，测试小变化，分析结果，并加倍投入有效的方法
- en: Stay conscious and aware through silent observation (that can apply to your
    mental, physical, financial, and spiritual projects).
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 通过静默观察（这可以应用于你的心理、身体、财务和精神项目）保持清醒和警觉。
- en: Self-educate to expand awareness and uncover new paths.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 自我教育以扩展意识并发现新的路径。
- en: Hypothesize and experiment with solutions that will solve your problems.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 假设并实验解决方案，以解决你的问题。
- en: Analyze the result and get feedback that will begin to rewire the network of
    systems in your mind.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 分析结果并获得反馈，这将开始重新连接你心中系统的网络。
- en: Document a replicable process that can help other people and bring you *more*
    feedback.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 记录一个可复制的流程，这可以帮助他人并获得*更多*反馈。
- en: Rinse and repeat.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 重复以上步骤。
- en: It took 18+ years to condition you to the point you are now.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 培养你到现在这个程度，花了 18 年以上。
- en: Don’t expect much progress overnight.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 不要期望一夜之间有太多进展。
- en: That, my friends, is how you reinvent yourself.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 朋友们，这就是你自我革新的方式。
- en: — Dan Koe
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: — 丹·科
- en: '**What Happened This Week**'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '**本周发生了什么**'
- en: A new YouTube video went out about my story. How I failed at most online business
    models and turned it into a half-mil a year one-person business.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 关于我的故事的新 YouTube 视频已经发布。我是如何失败于大多数在线商业模式，并将其转变为一年半百万美元的一人企业的。
- en: '[You can watch it here.](https://www.youtube.com/watch?v=L9qh1-T_YVo)'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: '[你可以在这里观看。](https://www.youtube.com/watch?v=L9qh1-T_YVo)'
- en: We are prepping for the live training next week with Dakota Robertson inside
    Modern Mastery. We will be going over how to get into Twitter Ghostwriting, landing
    your first client, and the skills you need to learn.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在为下周在 Modern Mastery 内与达科塔·罗伯逊的现场培训做准备。我们将讨论如何进入推特匿名写作，如何获得你的第一个客户，以及你需要学习的技能。
- en: '[Koe Letter readers can join for $5 here.](https://modernmastery.co/letter)'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: '[Koe Letter 读者可以在此加入，费用为 5 美元。](https://modernmastery.co/letter)'
- en: For those that are wondering why there haven’t been podcast episodes recently
    — I’ve had to prioritize my attention due to the launch of Digital Economics.
    The podcast has always been the first thing to go when I need to refocus. I will
    either get back on the same schedule soon or start doing bite size big ideas of
    the week (5-10 minute episodes).
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些想知道为什么最近没有播客集的人来说 — 由于数字经济的推出，我不得不优先考虑我的注意力。播客总是我在需要重新集中注意力时首先放弃的事情。我很快就会恢复到相同的日程安排，或者开始做每周的精华大思想（5-10
    分钟的集数）。
- en: If you have suggestions on a podcast style you’d like to see, let me know by
    replying to this email!
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对想要看到的播客风格有建议，请通过回复此电子邮件告诉我！
