- en: Why You Won’t Change (How To Reinvent Yourself)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么你不会改变（如何重塑自我）
- en: 原文：[https://thedankoe.com/letters/why-you-wont-change-how-to-reinvent-yourself/](https://thedankoe.com/letters/why-you-wont-change-how-to-reinvent-yourself/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/why-you-wont-change-how-to-reinvent-yourself/](https://thedankoe.com/letters/why-you-wont-change-how-to-reinvent-yourself/)
- en: I was a boy scout when I was a kid.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我小时候是童子军。
- en: I would show up to my former church on Tuesday nights, put a 3 finger salute
    in the air, and recite the scout oath.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我会在周二晚上出现在我以前教堂，举起三指敬礼，并背诵童子军誓言。
- en: Our troop would discuss our weekly agenda, work towards merit badges that interested
    us, and plan our next camping trip.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的部队会讨论我们的每周议程，努力获得我们感兴趣的成绩章，并计划我们的下一次露营之旅。
- en: Every year we had what was called a “High Adventure” trip.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 每年我们都有一次被称为“高冒险”的旅行。
- en: These adventures were week-long camping trips. Sometimes we would go and build
    our own snow caves to sleep in. Others we would join other scout troops from across
    the state, work towards different merit badges (like the survival merit badge
    where I had to create a shelter out of tree bark and “survive” the night), and
    during the night we would sit around the campfire and play games.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这些冒险是为期一周的露营之旅。有时我们会去建造自己的雪洞睡觉。有时我们会加入来自全州的其它童子军队伍，努力获得不同的成绩章（比如生存成绩章，我必须用树皮制作一个避难所并在夜间“生存”），而在夜间，我们会围坐在篝火旁玩游戏。
- en: One year we decided to go to Catalina Island. We had the lofty goal of kayaking
    around the island and camping on different beaches along the way.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 一年，我们决定去卡塔利娜岛。我们雄心勃勃的目标是在岛上划皮划艇，并在沿途的不同海滩上露营。
- en: When that day came, we drove to California, got on the fairy, and landed in
    Catalina after an hour of card games and virgin Piña Coladas.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 当那一天到来时，我们开车去加利福尼亚，上了飞机，在一小时的纸牌游戏和未尝过的菠萝椰子鸡尾酒之后，我们在卡塔利娜岛降落。
- en: Since we got there late we had to *rush to our kayak rentals and “set sail”*
    almost immediately. No downtime, a tad stressful.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们到那里较晚，我们不得不**急忙赶到皮划艇租赁处，并立即“起航”**。没有休息时间，有点紧张。
- en: We partnered up, strapped our oversized duffle bags to the back of the small
    boats, and banked on our previous canoeing (a canoe is a boat similar to a kayak)
    merit badge to have made us skilled enough to navigate the next 5 hours in the
    ocean.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我们组队，把超大的背包绑在小船的后面，并依赖我们之前划独木舟（独木舟是一种类似于皮划艇的船）的成绩章，认为我们已经足够熟练，可以在接下来的5个小时里在海洋中导航。
- en: Life Comes In Waves
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生活如波浪般起伏
- en: The waters were smooth for about an hour. No problems. Peaceful.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 水面大约平静了一个小时。没有问题。平静。
- en: That was until the ocean’s waves started getting a bit deeper. We thought it
    was temporary because we couldn’t see the storm that was coming over the other
    side of the island. We were too close to the cliffside to see anything aside from
    the clear skies to our right.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 直到海洋的波浪开始变得有点深。我们以为这只是暂时的，因为我们看不到岛另一边的风暴。我们离悬崖太近，除了右边的晴朗天空外，什么也看不见。
- en: Long story short, *we got caught in the middle of the storm* halfway through
    our adventure.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，*我们在冒险中途被暴风雨困住了*。
- en: The waves grew to a minimum of 10 feet in size.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 波浪增长到至少10英尺的尺寸。
- en: Our group started to get split up — the strong and able in the front, the weak
    in the back.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的小组开始分散——强壮的在前，弱小的在后。
- en: '**My buddy and I flipped our kayak multiple times.** Soaked. Cold. Nearly losing
    our paddles. Can’t hear a thing. Dense and heavy rain needling the parts of our
    body that were above water.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '**我和我的朋友多次翻了我们的皮划艇。湿透了。冷。几乎失去了我们的桨。什么都听不见。密集而沉重的雨点刺痛了我们身体上在水面的部分。**'
- en: My duffel bag fell off at one point — soaking all of my food and clothes – making
    me dive in to grab it and attempt at tying it back on.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我的背包掉下来了——我的食物和衣服都湿透了——让我跳进去抓它，并试图重新绑好。
- en: Not to mention… we were paddling *against* the strong winds. Making barely any
    progress towards our beach destination.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 更不用说……我们是在逆风划桨。几乎无法向我们的海滩目的地前进。
- en: '**This was the one moment in my life where I truly thought my life was over.**'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**这是我一生中真正认为我的生命即将结束的时刻。**'
- en: The scout leaders’ orange paddles could only be seen when they were at the bottom
    of a wave when we were at the top. We lost them after about the first 30 minutes
    of the storm.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们在浪尖上时，才能看到侦察员的橙色桨，而那时我们已经在浪底了。大约在暴风雨开始后的30分钟后，我们就失去了它们。
- en: My kayak buddy and I went through phases of paddling as hard as we can and accepting
    our demise. Slouched in the storm. Defeated. Giving in to the waves and praying
    that they didn’t slam us into the cliffside that was ~100-200 feet away from us.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我的皮划艇伙伴和我经历了全力以赴划桨和接受我们灭亡的阶段。在暴风雨中蜷缩。被打败了。向波浪屈服，祈祷它们不会把我们撞到距离我们100-200英尺远的悬崖上。
- en: Time was a blur at this point. We eventually saw the shore, regained hope, and
    paddled as hard as we possibly fucking could to reach land.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 此时时间变得模糊不清。我们最终看到了海岸，重拾希望，尽可能地划桨，试图到达陆地。
- en: Crashing on shore, we dragged our kayak onto the beach and collapsed. All of
    us slightly convulsing from the cold trying to expose as much of our bodies to
    the sun as we could.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 碰撞到岸边，我们拖着皮划艇上了海滩，然后倒下。我们都因为寒冷而轻微抽搐，试图尽可能多地让身体暴露在阳光下。
- en: Those that fell behind showed up with the island rescue team about an hour later.
    All of my food and clothes were still soaked (and ended up getting eaten by birds
    while we were sleeping).
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 落后的那些人大约一个小时后由岛屿救援队接应。我的所有食物和衣服都湿透了（在我们睡觉的时候被鸟吃掉了）。
- en: Safe to say, we had to call the trip short and left the next day.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 可以肯定地说，我们不得不提前结束这次旅行，第二天就离开了。
- en: There is a lot we can learn from this story, it mimics [life’s cycles of intensity](https://thedankoe.com/if-you-feel-lost-understand-these-3-phases-of-life/)
    quite well — but I want to paint a different picture.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 从这个故事中我们可以学到很多，它很好地模拟了[生活的强度周期](https://thedankoe.com/if-you-feel-lost-understand-these-3-phases-of-life/)——但我想要描绘一幅不同的画面。
- en: High Highs And Low Lows
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 高潮与低潮
- en: <picture fetchpriority="high" decoding="async" class="wp-image-638">![](../Images/399cc4a2c5fcc65ff86d0d0491672326.png)</picture>
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-638">![](../Images/399cc4a2c5fcc65ff86d0d0491672326.png)</picture>
- en: When we were on top of the waves, there was hope.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们处于浪尖之上时，还有希望。
- en: When we were deep in the trenches, hope was scarce.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们深陷困境时，希望变得稀缺。
- en: When you feel on top of the world, nothing can stop you.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 当你感觉站在世界之巅时，没有什么可以阻止你。
- en: When you fall to the bottom of the ocean, anything can stop you.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 当你跌落到海底时，任何东西都可能阻止你。
- en: You’re out in the cold, you start shivering, why? Because you’re resisting the
    cold, you are tightening your muscles against the cold and you get the staggers.
    Take it easy, go with the cold, relax.
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你身处寒冷之中，开始颤抖，为什么？因为你正在抵抗寒冷，你正在用肌肉对抗寒冷，你感到摇晃。放松一下，顺其自然，放松。
- en: ''
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Alan Watts
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 阿兰·瓦茨
- en: In classical mechanics, *a harmonic oscillator is a system that tries to maintain
    equilibrium* (homeostasis).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在经典力学中，*谐振子是一个试图维持平衡的系统*（稳态）。
- en: The 80/20 of what you need to know is that when equilibrium is displaced, it
    bounces back in the same amount the opposite direction and eventually brings itself
    back to equilibrium.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要了解的80/20法则之一是，当平衡被打破时，它会以相同的力量反弹到相反的方向，并最终恢复平衡。
- en: Our mind is no different.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的大脑并无不同。
- en: The high highs that we grow to look forward to in life are *always* followed
    by a low low. Always. If you don’t recognize it as a low low – congratulations,
    you have developed a certain level of mindfulness when interacting the battles
    that come while you are deep in the trenches.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在生活中期待的高潮总是伴随着低潮。总是如此。如果你没有意识到这是一个低潮——恭喜你，在与困境中的战斗互动时，你已经发展了一定程度的正念。
- en: Our mind is a network of complex systems that have been conditioned over time
    through positive and negative feedback. That’s how systems work, right?
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的大脑是一个复杂的系统网络，这些系统通过正负反馈在时间中被训练。这就是系统的工作方式，对吧？
- en: If you receive negative feedback, you won’t do that again.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你收到负面反馈，你不会再做那件事。
- en: If you receive positive feedback, you will do that again.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你收到正面反馈，你会再次做那件事。
- en: If you consistently receive positive feedback for doing one specific thing,
    it becomes engrained in your psyche. The action, belief, or thought pattern become
    habitual. They happen on autopilot.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你持续因为做某件事而获得正面反馈，它就会在你的心理上根深蒂固。行为、信念或思维模式变得习惯化。它们在自动导航下发生。
- en: Like training a dog. They don’t understand words, but they can associate tones
    and patterns with certain meanings — positive and negative. If a dog has sub-optimal
    behavior, you use a certain tone or strategy to give the dog negative feedback.
    Do this enough times and they will eventually change their behavior, which you
    can reinforce (condition) with positive feedback.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 就像训练狗一样。它们不懂词语，但可以关联音调和模式与某些含义——正面和负面。如果狗有不良行为，你用特定的音调或策略给狗负面反馈。这样做足够多次，它们最终会改变行为，你可以用正面反馈来强化（条件反射）。
- en: This malleable nature of our mind can be very dangerous (when unconscious) or
    very beneficial (when conscious).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们思维的这种可塑性可能非常危险（在无意识时）或非常有益（在意识时）。
- en: This shows that we have the power to recondition, reprogram, or rewire our brain
    — but our harmonic oscillator of a mind won’t let us off that easy.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '这表明我们有能力重新训练、重新编程或重新连接我们的大脑——但我们的思维谐波振荡器不会让我们那么容易摆脱。 '
