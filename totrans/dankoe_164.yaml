- en: How To Unf*ck Your Life (Evidence Based)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/how-to-unfck-your-life-evidence-based/](https://thedankoe.com/letters/how-to-unfck-your-life-evidence-based/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Your life feels terrible because your mind is filled with beliefs that interpret
    it as terrible.
  prefs: []
  type: TYPE_NORMAL
- en: 'But here’s the truth that psychology points to:'
  prefs: []
  type: TYPE_NORMAL
- en: '*You’re in the perfect position to change your life.*'
  prefs: []
  type: TYPE_NORMAL
- en: However, most people don’t know this, and they get stuck in their situation
    for years. Sometimes decades. They never realize that they are one shift away
    from a completely different experience of life.
  prefs: []
  type: TYPE_NORMAL
- en: Now, you may feel like you’re stuck in a career you hate.
  prefs: []
  type: TYPE_NORMAL
- en: Or you may be in a constant battle with negative emotions.
  prefs: []
  type: TYPE_NORMAL
- en: Or… you may just feel like you’re constantly spinning your wheels, trying to
    make something work but getting demotivated because you keep starting from zero.
  prefs: []
  type: TYPE_NORMAL
- en: Thankfully, there was a little known breakthrough in psychology in the mid-20th
    century which showed that human values, motivations, and thinking *evolve in predictable
    stages* over time, both individually and societally.
  prefs: []
  type: TYPE_NORMAL
- en: Meaning, when you understand what stage you’re in and the exact “conditions”
    you need to make progress, what seems impossible now becomes inevitable.
  prefs: []
  type: TYPE_NORMAL
- en: Your mind literally reconstructs how it processes reality.
  prefs: []
  type: TYPE_NORMAL
- en: This is unlike any modern self-help band-aid that only offer temporary motivation
    that always fails because they don’t change *who you are* at the root level.
  prefs: []
  type: TYPE_NORMAL
- en: Instead, this shines a light on the exact sequence your mind needs to “move
    through” to create lasting change.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve spent the last 4 years of my life synthesizing dense books, long lectures,
    and my own experiences into what I hope is a useful guide to getting unstuck.
  prefs: []
  type: TYPE_NORMAL
- en: The Theory That Changed Human Potential
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The breakthrough in psychology we hinted at is called the “Levels Of Existence”
    theory.
  prefs: []
  type: TYPE_NORMAL
- en: 'It was developed by Dr. Clare W. Graves which went on to influence other theories
    such as:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Spiral Dynamics** (popularized by Don Beck and Christopher Cowan)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The 9 Stages of Ego Development** ([which we’ve discussed previously](https://thedankoe.com/letters/how-to-join-the-top-1-of-intelligence-full-guide/))'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The AQAL Model** (Ken Wilber’s expansion on all of the above that synthesizes
    them all together)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2630">![](../Images/c2797f1e2e7fa3a779626a62e97d9cff.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: For the purpose of this letter, we’re going to focus on the Spiral Dynamics
    Model.
  prefs: []
  type: TYPE_NORMAL
- en: In short, it states that human value systems or worldviews (which influence
    how we interpret the world and make decisions… in other words, our operating system
    for reality) evolves through stages in an upward spiral.
  prefs: []
  type: TYPE_NORMAL
- en: These stages are the *structure* of how we think.
  prefs: []
  type: TYPE_NORMAL
- en: Each of us as individuals move up the spiral as we age and develop ourselves.
  prefs: []
  type: TYPE_NORMAL
- en: But this doesn’t only apply to the individual, it applies to societies as a
    whole, as you’ll be able to tell. If you can understand this, you can make sense
    of much of today’s political battles, work culture (like 80 hour work weeks),
    and why religious institutions are losing their occupancy in the global mindshare.
  prefs: []
  type: TYPE_NORMAL
- en: Now, there are 2 tiers, the old paradigm and new paradigm, that house each of
    the stages.
  prefs: []
  type: TYPE_NORMAL
- en: My goal, of course, with this letter is to give you the tools to identify where
    you are and transcend to new stages, allowing you to see your life from a new
    perspective and unlock the mental space necessary to achieve higher forms of success.
  prefs: []
  type: TYPE_NORMAL
- en: Tier 1 Stages (First-Tier Thinkers)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first tier represents the “old paradigm” ways of thinking.
  prefs: []
  type: TYPE_NORMAL
- en: These stages are largely driven by survival and motivated by deficiency needs.
    Each of these stages believes that their worldview is the “right” or “only” way
    to think, like red vs blue politics, or business gurus teaching their eCommerce
    model as the one true way (I’m guilty of this too!)
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, these stages tend to *react* to life. They live by their programming
    and respond to situations in predictable ways that often seem scripted. Like how
    talking to a devout Christian can seem like talking to the bible, or how talking
    to a rigid Democrat can seem like talking to the news channel on TV.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, none of these stages are bad.
  prefs: []
  type: TYPE_NORMAL
- en: Everyone goes through them in one area of their life or another.
  prefs: []
  type: TYPE_NORMAL
- en: But, things can become very bad if you get stuck in a less than optimal stage,
    which is very likely to happen in Tier 1.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are the stages with what I hope to be helpful examples:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 1) Beige – Survival Sense**'
  prefs: []
  type: TYPE_NORMAL
- en: Beige thinkers are focused on meeting basic survival needs.
  prefs: []
  type: TYPE_NORMAL
- en: This is increasingly rare in today’s world (<0.1% of the population) and people
    typically leave this stage early in their childhood.
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 2) Purple – Safety In Community**'
  prefs: []
  type: TYPE_NORMAL
- en: At around 10% of the population, the Purple stage belongs largely to tribal
    societies and clans.
  prefs: []
  type: TYPE_NORMAL
- en: I’m assuming most of you don’t live in these conditions, so we won’t dig too
    deep here.
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 3) Red – Power & Action**'
  prefs: []
  type: TYPE_NORMAL
- en: While this stage is mostly populated with developing nations and gang territories,
    the teachings are important. This was a key stage in the great empires of the
    past, but we’ve largely evolved as a society out of it.
  prefs: []
  type: TYPE_NORMAL
- en: The thing with these stages is that while they may be your “baseline” worldview
    or way of thinking, you never really “leave” any given stage. You transcend and
    include their properties.
  prefs: []
  type: TYPE_NORMAL
- en: You are never really in *one* stage.
  prefs: []
  type: TYPE_NORMAL
- en: If you are in a particularly stressful period of your life, you can tap into
    this stage quite easily for the sake of commanding some form of power or authority.
  prefs: []
  type: TYPE_NORMAL
- en: If you watch sports fans get angry at a TV and start yelling when their team
    starts to lose (or when a political party is about to lose to the other) you can
    directly observe how people instantly change how they think and start “attacking”
    the other side in an attempt to regain power.
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 4) Blue – Order & Purpose**'
  prefs: []
  type: TYPE_NORMAL
- en: Most of today’s world (around 40%) falls into the blue stage.
  prefs: []
  type: TYPE_NORMAL
- en: Blue thinkers value structure, rules, clear purpose, and stability, often assigned
    to them by some external source, like the value code of a religion or productivity
    system.
  prefs: []
  type: TYPE_NORMAL
- en: One prime example here are bible thumpers who outsource all of their decision
    making to a strict doctrine (i.e. Christianity or Islam).
  prefs: []
  type: TYPE_NORMAL
- en: In the domain of work and careers, Blue values stable jobs with clear hierarchy.
    They follow company policy to avoid risk. They want certainty.
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 5) Orange – Achievement & Success**'
  prefs: []
  type: TYPE_NORMAL
- en: While most people are in Blue, I would argue most people watching this are in
    Orange while many jumping into Green and sometimes tier 2.
  prefs: []
  type: TYPE_NORMAL
- en: Orange thinkers value individual achievement, rationality, and personal success.
  prefs: []
  type: TYPE_NORMAL
- en: They are the goal setters, self-helpers, and those focused on winning at all
    costs.
  prefs: []
  type: TYPE_NORMAL
- en: In terms of religion or spirituality, this is where most people start to question
    tradition for the sake of personal growth. Many become atheists, many just don’t
    know what to believe and don’t care to find out (until later stages).
  prefs: []
  type: TYPE_NORMAL
- en: 'In terms of work and career, this is where people tend to fall into 2 camps:
    pursuing their own side hustle or entrepreneurial venture, or climbing the corporate
    ladder. Both provide a sufficient amount of challenge.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 6) Green – Community & Harmony**'
  prefs: []
  type: TYPE_NORMAL
- en: Green holds a special place in my heart because I remember my hippy phase in
    college shortly after my rebellious phase against the religion I was raised in.
  prefs: []
  type: TYPE_NORMAL
- en: “Everything is good just as it is, man.”
  prefs: []
  type: TYPE_NORMAL
- en: I feel like that was my first glimpse into Green, while I was still largely
    Orange throughout college, and still am in some areas of my life.
  prefs: []
  type: TYPE_NORMAL
- en: Green values connection, consensus, and meaning. They’re often progressive,
    post-modern, and focus on universal love, found in academic centers for better
    or worse.
  prefs: []
  type: TYPE_NORMAL
- en: The main problem is that Green can get trapped in what Ken Wilber calls “aperspectival
    madness.”
  prefs: []
  type: TYPE_NORMAL
- en: In essence, aperspectival madness occurs when individuals or societies recognize
    the validity of multiple perspectives (which is good), but then fall into a relativistic
    trap where they cannot or will not integrate these perspectives or make value
    judgments between them (which is problematic).
  prefs: []
  type: TYPE_NORMAL
- en: Postmodernists—well, not real postmodernists, but those who disguise themselves
    as such yet still have a lot of Blue and Red residue (meaning they still believe
    one perspective is the right perspective, which is “no perspective.”)—want to
    dismantle hierarchies and privileged perspectives (i.e. identity/gender politics),
    and in doing so, create their own dominator focused hierarchy (deeming hierarchies
    bad is still a value judgment, placing hierarchies at the bottom of their unconscious
    hierarchy) that lacks regard for evolution and the structure of reality.
  prefs: []
  type: TYPE_NORMAL
- en: Tier 2 Stages (Second-Tier Thinkers)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The key shift between tier 1 and tier 2 is that the first tier stages believe
    they have arrived at the correct worldview and try to push that on others, often
    unconsciously.
  prefs: []
  type: TYPE_NORMAL
- en: The second tier stages, however, recognize that each stage is a necessary and
    valuable part of human development, with each stage having it’s appropriate responses
    to their life conditions.
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-2631">![](../Images/e153d33fe3a27e0f9354e9236f90fe7d.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Graves and Beck – those who developed these theories of developmental psychology
    – consider the shift from tier 1 to tier 2 to be a monumental leap in consciousness.
    It is the leap from subsistence-level values to “being-level” values which is
    comparable to the emergence of human consciousness itself.
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 7) Yellow – Integrative Flexibility**'
  prefs: []
  type: TYPE_NORMAL
- en: Yellow thinkers value systems thinking and adapting solutions to context.
  prefs: []
  type: TYPE_NORMAL
- en: 'They understand that the content of a situation is highly dependent on the
    context, like how the word “jump” takes completely different shape when used in
    two different sentences:'
  prefs: []
  type: TYPE_NORMAL
- en: '*The man jumped on the trampoline.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*The man jumped to conclusions.*'
  prefs: []
  type: TYPE_NORMAL
- en: Think about that, and apply it to every situation, word, action, thought in
    your head, and the rest. If you can tap into this stage of thinking, life gains
    significant depth.
  prefs: []
  type: TYPE_NORMAL
- en: This stage can combine multiple approaches from various perspectives. In productivity,
    they can balance structure (blue) with innovation (orange) and purpose (green)
    to craft a custom path that works better than any of them in isolation. They aren’t
    team “you don’t need a routine” or team “you need a routine” they are team “do
    your own f*cking thing.”
  prefs: []
  type: TYPE_NORMAL
- en: In spirituality and politics, they are integrative. They transcend group boundaries
    and pull truths from each perspective, like how some are starting to merge Eastern
    and Western thought for a more impactful and comprehensive approach to meaning
    making.
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 8) Turquoise – Holistic Flow**'
  prefs: []
  type: TYPE_NORMAL
- en: Turquoise thinkers value global consciousness, holistic views, and interconnected
    systems.
  prefs: []
  type: TYPE_NORMAL
- en: They build businesses with a triple bottom line – people, planet, and profit
    – taking on a much higher responsibility relating to their interconnected impact
    on the world. We’ve talked about this many times and I discuss this partially
    in [Purpose & Profit](https://thedankoe.com/purpose) chapter 3.
  prefs: []
  type: TYPE_NORMAL
- en: In spirituality, this is where consciousness work, oneness, and Gaia theory
    take root.
  prefs: []
  type: TYPE_NORMAL
- en: 'All of these stages follow a general trend:'
  prefs: []
  type: TYPE_NORMAL
- en: With each increasing stage, we expand our circle of concern from egocentric
    to cosmocentric. Meaning, first we care only about ourselves, then our family
    or tribe, then the world, and so on as our mind develops to house more meaning,
    complexity, and responsibility.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, these stages move up in a spiral fashion, hence the name.
  prefs: []
  type: TYPE_NORMAL
- en: Each stage, starting at Beige, oscillates between self-expressive and self-sacrificing
    (self-centered and other-centered).
  prefs: []
  type: TYPE_NORMAL
- en: At the Beige stage, one is focused on pure survival and fending for themselves.
    In the next Purple stages one seeks safety in community. In red, one seeks personal
    power while Blue seeks order and purpose in something like organized religion.
    And so on and so forth.
  prefs: []
  type: TYPE_NORMAL
- en: Now, stick with me here, as there are a few important concepts we need to understand
    before you can accurately apply this model to your life.
  prefs: []
  type: TYPE_NORMAL
- en: But once you understand them, you won’t be able to unsee them, and the way you
    view the world will change forever.
  prefs: []
  type: TYPE_NORMAL
- en: This will set the stage for setting up your life in a way that allows you to
    navigate to higher and higher levels of existence.
  prefs: []
  type: TYPE_NORMAL
- en: The Importance Of Memes (No, Not That Kind Of Meme)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are other patterns of information that compete with one another to maintain
    their shape and transmit themselves through time. For instance, languages are
    engaged in competition, as are religions, scientific theories, lifestyles, technologies,
    and even the elements of that realm of consciousness we have come to regard as
    the ‘self.’
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Mihaly Csikszentmihalyi
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Memes.
  prefs: []
  type: TYPE_NORMAL
- en: No, not the memes you endlessly scroll on your phone (even though those are
    memes).
  prefs: []
  type: TYPE_NORMAL
- en: Memes are like genes, but for consciousness or mind.
  prefs: []
  type: TYPE_NORMAL
- en: Memes are units of cultural information that spread from person to person. One
    prime example (that some may love or hate) is the “Woke Mind Virus” that Elon
    Musk has vowed to destroy. To me, this is the exact “aperspectival madness” that
    Ken Wilber has coined for those in stage Green.
  prefs: []
  type: TYPE_NORMAL
- en: 'Memes are fascinating because they reveal one unique characteristic that no
    other being has:'
  prefs: []
  type: TYPE_NORMAL
- en: While both animals and humans attempt to survive and reproduce on the physical
    level (they attempt to spread the information in their *genes*), humans also attempt
    to survive and reproduce on the conceptual level (they attempt to spread the information
    in their *mind – with memes*).
  prefs: []
  type: TYPE_NORMAL
- en: Genes didn’t cut it anymore for increasing our chances at survival, so by some
    process that I’m not fully aware of, we evolved to the level of mind.
  prefs: []
  type: TYPE_NORMAL
- en: We invented language. We invented religion. We invented tools and technology
    likes plains and clothes and fire that allow us to survive in almost any condition—unlike
    animals who can only thrive in their niche (try swapping a polar bear and lion
    and see how they turn out).
  prefs: []
  type: TYPE_NORMAL
- en: 'The hidden process behind the world you live in right now is thanks to one
    little thing:'
  prefs: []
  type: TYPE_NORMAL
- en: The self.
  prefs: []
  type: TYPE_NORMAL
- en: The strange loop of us thinking about our own consciousness in relation to others.
  prefs: []
  type: TYPE_NORMAL
- en: In terms of survival, humans *feel* the threat of someone challenging their
    beliefs. We feel the need to “defend” ourselves when a piece of our identity is
    under attack, like our political position, religious beliefs, or any other thing
    we consider a part of our lives, like our partner deciding to go to the gym which
    exposes your insecurity of not following along because you’re afraid of the pain
    that comes with change—your old self may die.
  prefs: []
  type: TYPE_NORMAL
- en: In Spiral Dynamics, the stages illustrated previously are called vMEMEs (Value
    System Memes).
  prefs: []
  type: TYPE_NORMAL
- en: Memes, as a whole, represent why ideas resonate with us or not.
  prefs: []
  type: TYPE_NORMAL
- en: Your values—beliefs, standards, points of reference, or other elements of identity—shape
    what is important to you and what is worth noticing.
  prefs: []
  type: TYPE_NORMAL
- en: If you value health, and have a standard for it that makes you feel threatened
    if you disobey it (like missing the gym for a week), you will notice opportunities
    that help you solve that problem.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t value health, or financial stability, you will continue to notice
    things that keep you in that position. Opportunities will fly right under your
    nose because dopamine won’t fire for the sake of your continued survival in the
    direction of optimal health or finances.
  prefs: []
  type: TYPE_NORMAL
- en: The stages of Spiral Dynamics are important for this reason.
  prefs: []
  type: TYPE_NORMAL
- en: The stage you are in determines much of what you notice in reality and the opportunities
    available to you.
  prefs: []
  type: TYPE_NORMAL
- en: And the higher stages you reach, the more you can tap into the stages beneath,
    meaning you have both the ability and wisdom to spot opportunities for varied
    versions of success and achieve them with grace as you move up the spiral.
  prefs: []
  type: TYPE_NORMAL
- en: The question then is, how do I move up the stages beyond the one that makes
    me feel trapped?
  prefs: []
  type: TYPE_NORMAL
- en: 'The good news:'
  prefs: []
  type: TYPE_NORMAL
- en: You are in the perfect spot to change.
  prefs: []
  type: TYPE_NORMAL
- en: How To Unf*ck Your Life
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-2632">![](../Images/b56fd450d6017fa36a48bbb7a4c4b515.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: First, we need to understand the *sequence of change.*
  prefs: []
  type: TYPE_NORMAL
- en: 'These are the 4 “phases” to expect as you move from one stage to another:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Alpha** – Life is good and normal. There is order.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Beta** – Doubts arise as you enter a new phase. Doing the same thing only
    makes it worse.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Gamma** – You feel lost. Things are chaotic and turbulent. This is where
    you can get trapped and feel like there’s nowhere to go.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Delta** – Things are vibrant. You make quick progress and reach a new baseline.
    This is where you learn the most and *feel* the growth.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You’ve probably experience that sequence before but didn’t realize it.
  prefs: []
  type: TYPE_NORMAL
- en: I personally have, many times.
  prefs: []
  type: TYPE_NORMAL
- en: In my business, things feel stable for a bit. Then I feel as if something needs
    to change, or I notice that my systems aren’t serving me as they usually are (I
    notice this in revenue, engagement, customer satisfaction, etc).
  prefs: []
  type: TYPE_NORMAL
- en: Then, things start to get chaotic. I’m stuck between what I was doing and experimenting
    with things I don’t completely understand yet.
  prefs: []
  type: TYPE_NORMAL
- en: Eventually, things start to work. Order starts to come back. I hit record highs
    in revenue knowing that I’ll see a subtle dip back down to baseline.
  prefs: []
  type: TYPE_NORMAL
- en: Funnily enough, I noticed this sequence before learning about Spiral Dynamics.
  prefs: []
  type: TYPE_NORMAL
- en: 'I discussed the “Cycles of Progress” in a [previous letter](https://thedankoe.com/letters/how-to-focus-for-12-hours-a-day-on-your-purpose/)
    which stated these stages:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Perplexity** – you feel lost after a period of consistency.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Curiosity** – you become curious as to how to reach the next level.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Intensity** – you experiment until you find that one thing, then progress
    surges.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Consistency** – you reach a new baseline until the cycle inevitably repeats.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, that’s all great, but how do you actually prime yourself to reach a new
    stage of development?
  prefs: []
  type: TYPE_NORMAL
- en: We focus on the “Grow up” portion of Ken Wilber’s *Wake up, Clean up, Grow up*
    framework for human development.
  prefs: []
  type: TYPE_NORMAL
- en: '**Wake up** meaning becoming aware of your true nature beyond the ego—accessing
    states of consciousness beyond ordinary waking awareness.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Clean up** meaning psychological healing through shadow work—addressing unconscious
    or repressed aspects of yourself that are causing unnecessary harm.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Grow up** meaning cognitive, moral, and perspectival development—expanding
    your cognitive complexity and worldview while building the capacity to take on
    multiple perspectives.'
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ll save waking up and cleaning up for other letters, but in terms of growing
    up, here of the conditions for reaching new stages of development:'
  prefs: []
  type: TYPE_NORMAL
- en: 0) Navigating Change With AI As Your Coach
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The incredible thing about AI is that it can tailor an approach specific to
    you.
  prefs: []
  type: TYPE_NORMAL
- en: I can’t give you hyper actionable steps to reach the next stage, because that
    would require an entire book going over potential strategies for each stage… and
    I’d have to somehow hack your brain and gain access to your experience and worldview,
    which probably isn’t happening.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what I want you to do:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1 –** [**Log into Kortex**](https://kortex.co) **and run through The Life
    Reset Map workflow**'
  prefs: []
  type: TYPE_NORMAL
- en: You can find this in Chat > Plan
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f509c05f295df3c36335f9e17da54511.png)'
  prefs: []
  type: TYPE_IMG
- en: Once you finish the interview questions, it will spit out a comprehensive blueprint
    with your life vision, goals, self-education plan, and potential skills to acquire.
  prefs: []
  type: TYPE_NORMAL
- en: You can save this output as a document with the “Create New Document” button
    at the bottom of the AI message. (This will come in handy for the next part).
  prefs: []
  type: TYPE_NORMAL
- en: '**2 – Train AI on Spiral Dynamics and ask it to help guide you to the next
    stage.**'
  prefs: []
  type: TYPE_NORMAL
- en: '[Here is a document you can duplicate with my notes on Spiral Dynamics](https://app.kortex.co/public/document/468c8d82-f6eb-4724-993d-df7f77cbdae6)
    with instructions on how to use it with AI, prompt included.'
  prefs: []
  type: TYPE_NORMAL
- en: You’re going to connect your previous Life Reset Map as context along with the
    Spiral Dynamics notes and ask AI to help identify what stage you are in.
  prefs: []
  type: TYPE_NORMAL
- en: '*After you are done chatting with the AI, ask it to summarize the entire chat,
    the save that as a document.*'
  prefs: []
  type: TYPE_NORMAL
- en: '[I’ve created a short Loom video to show you how to do this.](https://www.loom.com/share/3750275702b34f168252fdf835999c01?sid=9b696f91-3964-4b0f-b3f5-92cfee225190)'
  prefs: []
  type: TYPE_NORMAL
- en: '**3 — Use the Be My Clarity Coach Workflow to help you when you’re stuck**'
  prefs: []
  type: TYPE_NORMAL
- en: 'From there, you now have documents with:'
  prefs: []
  type: TYPE_NORMAL
- en: Your Life Reset Map
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Spiral Dynamics Notes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Specific advice based on your stage
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, you can go to Chat > Plan > Be My Clarity Coach, attach those documents
    as context, and ask it what you should start doing.
  prefs: []
  type: TYPE_NORMAL
- en: If you do the challenges it gives and continue asking questions, you will get
    far.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are the conditions to keep in mind as you go:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Potential To Change
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Change must be possible if you want to reach the next stage.
  prefs: []
  type: TYPE_NORMAL
- en: You need either the skill acquisition, resources, or environment that allows
    you to see the potential for change.
  prefs: []
  type: TYPE_NORMAL
- en: This corresponds to the concept of “horizontal development” in Susanne Greuter’s
    ego development theory.
  prefs: []
  type: TYPE_NORMAL
- en: In order to move up vertically (to new stages) one must acquire a sufficient
    amount of knowledge, skill, and experience within their current stage. You can’t
    jump up stages without ample development in the stage you are in.
  prefs: []
  type: TYPE_NORMAL
- en: This requires you to educate, practice, pursue goals, and *improve* in the things
    you are currently doing in your life.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Solve Unresolved Problems
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Each stage presents a unique set of problems.
  prefs: []
  type: TYPE_NORMAL
- en: I personally like to think of self-development as an endless series of problems
    that, once solved, increase in meaning and complexity, making life more interesting
    as you solve them.
  prefs: []
  type: TYPE_NORMAL
- en: 'Since the majority of you are in stages blue through green, and since we are
    focused on our personal lives, these will almost always involve the big 3:'
  prefs: []
  type: TYPE_NORMAL
- en: Work
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Health
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Relationships
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All of these are interwoven and drastically impact one another.
  prefs: []
  type: TYPE_NORMAL
- en: You can’t perform your best at work or in your relationship if your health is
    impacting your mental and emotional state. Your health will take a hit if your
    work or relationships are too stressful.
  prefs: []
  type: TYPE_NORMAL
- en: In work, this could be changing your career or reframing your mind to find the
    work more enjoyable.
  prefs: []
  type: TYPE_NORMAL
- en: In relationships, this could be having difficult conversations.
  prefs: []
  type: TYPE_NORMAL
- en: In health, this could be something as simple as starting with daily 15 minute
    walks.
  prefs: []
  type: TYPE_NORMAL
- en: All of these issues that are circulating in your life do have solutions.
  prefs: []
  type: TYPE_NORMAL
- en: It’s your job to identify those problems, self-educate, and experiment with
    solutions until you discover the one that works. This also increases your potential
    to change.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Felt Dissonance Within Current Worldview
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is one of my favorites because you see it so much in our space.
  prefs: []
  type: TYPE_NORMAL
- en: One prime example is someone like Chris Williamson, who on our podcast together
    mentioned how he felt like he had to be constantly busy in order to feel sane.
    He saw rest as a weakness until recently, and is still grappling with that problem
    in one way or another.
  prefs: []
  type: TYPE_NORMAL
- en: For many children advancing from Blue to Orange, they feel as if the beliefs
    they were raised with—like going to church and praising a specific God—no longer
    resonate with them. It doesn’t answer their questions sufficiently and creates
    a sense of dissatisfaction, sparking their curiosity to learn.
  prefs: []
  type: TYPE_NORMAL
- en: 4) Insight Point & Awareness Of Other Approaches
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After some time sitting with the dissonance and being open to other approaches,
    they reach the point of insight, where everything crashes into their psyche at
    once.
  prefs: []
  type: TYPE_NORMAL
- en: The productivity obsessed realize that rest can increase the quality of their
    output. Their work style may change, but their work sees a notable increase even
    if their overall volume decreases.
  prefs: []
  type: TYPE_NORMAL
- en: The curious child finds a new belief system to dive into and identify with,
    for better or worse, potentially posing a trap if they close their mind to the
    next stage.
  prefs: []
  type: TYPE_NORMAL
- en: 5) Eliminate, Bypass, Neutralize, or Reframe Barriers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once you are stretched between two opposite poles (your old way of life and
    the new approach you want to take), you will encounter obstacles on the path.
  prefs: []
  type: TYPE_NORMAL
- en: If you are an aspiring writer, you may fall into the trap of perfectionism.
  prefs: []
  type: TYPE_NORMAL
- en: You start projects and then quit because they are never good enough.
  prefs: []
  type: TYPE_NORMAL
- en: With this specific obstacle, you would need to reframe your relationship with
    perfectionism. You would need to realize that the only way to get better is to
    start with something you find embarrassing, knowing that others actually don’t
    care that much, and improve as you continue practicing the craft.
  prefs: []
  type: TYPE_NORMAL
- en: 6) Expect Periods Of Confusion & Long Learning Curves
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'All of this is up in the air because nobody can tell you what to do, they can
    only tell you how they did it, and that lacks regard for:'
  prefs: []
  type: TYPE_NORMAL
- en: Your value system
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your current stage of development
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your personality, beliefs, identity, goals, and the rest
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The purpose of education, at this point, is awareness.
  prefs: []
  type: TYPE_NORMAL
- en: I can give you examples and processes, but if you don’t have the ability to
    understand where you are and who you are, those won’t serve you much.
  prefs: []
  type: TYPE_NORMAL
- en: The path will be confusing.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not supposed to make sense just yet.
  prefs: []
  type: TYPE_NORMAL
- en: When you’re doing something new, you aren’t supposed to be anything other than
    lost because you’re flailing in the middle of the ocean until you learn how to
    swim (or build a boat).
  prefs: []
  type: TYPE_NORMAL
- en: I hope that with this letter, I’ve given you not the practical things to do,
    but the points of reference from which you can start making better mistakes.
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
