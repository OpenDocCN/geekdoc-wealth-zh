- en: 4 Hours Of Focused Work Will Change Your Life
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/4-hours-of-focused-work-will-change-your-life/](https://thedankoe.com/letters/4-hours-of-focused-work-will-change-your-life/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Being able to intentionally direct your attention at will not only save you
    time, but money (see: [attention economy](https://markmanson.net/attention)).'
  prefs: []
  type: TYPE_NORMAL
- en: Mainstream news outlets monetize your attention through fear.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Social media accounts steal your attention through “relatable” and often self-deprecating
    memes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Twitter, Instagram, and Facebook know exactly what colors, topics, and content
    delivery style make you tick.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is always something to fill the void that comes with boredom.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Just now, I clicked over to check my Twitter notifications.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: From a top down point of view, this is the big problem that the modern world
    faces.
  prefs: []
  type: TYPE_NORMAL
- en: In terms of mental health, people focus on their thoughts instead of the reason
    behind the thoughts.
  prefs: []
  type: TYPE_NORMAL
- en: In terms of physical health, people focus on short term pleasure instead of
    long term energy.
  prefs: []
  type: TYPE_NORMAL
- en: In terms of monetary health, people focus on get rich quick schemes instead
    of sustainable business growth.
  prefs: []
  type: TYPE_NORMAL
- en: We aren’t here to talk about these. We are here to talk about focused work,
    but you can see the problem that the attention economy has created.
  prefs: []
  type: TYPE_NORMAL
- en: Focus is a currency and we must invest it wisely.
  prefs: []
  type: TYPE_NORMAL
- en: Minimum Risk, Potential Reward
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The attention economy is only disastrous if you are on the consumer end.
  prefs: []
  type: TYPE_NORMAL
- en: Opportunities are springing up like weeds and in order to take advantage of
    them, you need to produce.
  prefs: []
  type: TYPE_NORMAL
- en: You need to focus your attention on building something with minimal risk, but
    with the potential to pay off big.
  prefs: []
  type: TYPE_NORMAL
- en: These are called asymmetric bets.
  prefs: []
  type: TYPE_NORMAL
- en: '![Asymmetric Bets Illustration](../Images/5496c897745f09a0ae36ccf1f9167995.png)'
  prefs: []
  type: TYPE_IMG
- en: Asymmetric Bets
  prefs: []
  type: TYPE_NORMAL
- en: 'Some opportunities that have popped up in the last 5-10 years (that you can
    still take advantage of):'
  prefs: []
  type: TYPE_NORMAL
- en: Cryptocurrency
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Building a social media audience
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Offering a niche freelance service
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Starting a marketing agency
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Productizing your expertise and selling it online
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Starting a podcast or blog
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 4 years ago I started freelancing with web design. This takes zero dollars and
    some time on YouTube to do, but has the potential of replacing your income.
  prefs: []
  type: TYPE_NORMAL
- en: 1.5 years ago I started a Twitter account that has grown to 40,000 followers
    and allowed me to transition out of done for you client work.
  prefs: []
  type: TYPE_NORMAL
- en: Now I am in the starting phases of a blog, YouTube channel, and podcast. Given
    I follow the right formula, I have no doubt that these will pay off big.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Formula: Menial upfront investment + persistence + iteration = exponential
    reward.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: My success, however large/small it is, was entirely built off of asymmetric
    bets.
  prefs: []
  type: TYPE_NORMAL
- en: What was the vessel responsible for the results? Focused work.
  prefs: []
  type: TYPE_NORMAL
- en: That is, investing my focus into the attention economy’s stock market by adding
    value to the world, 1 hour at a time.
  prefs: []
  type: TYPE_NORMAL
- en: 4 Hours Is More Than You Think
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: My good friend Joey ([@heyjoeyjustice](https://twitter.com/psypreneur)) is a
    psychological performance coach.
  prefs: []
  type: TYPE_NORMAL
- en: He along with many others have shown that through focus, you can slash your
    work times in half.
  prefs: []
  type: TYPE_NORMAL
- en: You can get more done in 4 hours of focused work than you can in 8 hours of
    distracted work.
  prefs: []
  type: TYPE_NORMAL
- en: Hell, even 1 hour of focused work can pay off nicely, especially for those with
    other time-consuming obligations.
  prefs: []
  type: TYPE_NORMAL
- en: To get started with your bet there is a prerequisite.
  prefs: []
  type: TYPE_NORMAL
- en: You must have interests or curiosities that you want to pursue. It will be very
    difficult to find opportunities to cash in on if you are not actively learning.
  prefs: []
  type: TYPE_NORMAL
- en: Once you have learned, you must implement in the real world.
  prefs: []
  type: TYPE_NORMAL
- en: Joey’s 3 Steps For Getting Into Focused Work
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before we start – grab a physical notebook and a pen/pencil.
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 1) Brain Dump**'
  prefs: []
  type: TYPE_NORMAL
- en: 'This serves two purposes:'
  prefs: []
  type: TYPE_NORMAL
- en: Clear your mind of internal distractions (thoughts and ideas)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Know the exact tasks you need to complete for a given project
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Go crazy with this, write out everything that comes to mind. This is not limited
    to “work.”
  prefs: []
  type: TYPE_NORMAL
- en: Write down everything from household todo’s to this weeks shopping list (along
    with what you have to do for “work”).
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 2) Categorize & Prioritize**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Create categories for tasks to fall under:'
  prefs: []
  type: TYPE_NORMAL
- en: Household
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Social growth
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Product promotion
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Outreach for freelancing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Client work
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Relationships
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Health
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To prioritize, consider using The Eisenhower Matrix
  prefs: []
  type: TYPE_NORMAL
- en: '[![The Eisenhower Matrix](../Images/c19678ad00af2b3ae0ec82a950ede302.png)](https://www.techtello.com/eisenhower-productivity-matrix/)'
  prefs: []
  type: TYPE_NORMAL
- en: '[The Eisenhower Matrix](https://www.techtello.com/eisenhower-productivity-matrix/)'
  prefs: []
  type: TYPE_NORMAL
- en: If you cannot decide if something is a priority or not, flip a coin. Not knowing
    if its a priority or not usually means its not a priority. Flip a coin and save
    yourself some mental strain.
  prefs: []
  type: TYPE_NORMAL
- en: You should come away with 2-5 tasks in each category that you have to work on
    within the next few days.
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 3) Time Blocking & Scheduling**'
  prefs: []
  type: TYPE_NORMAL
- en: You know what you need to do, now is the time to set it in stone. Scheduling
    time blocks prepares your brain for action.
  prefs: []
  type: TYPE_NORMAL
- en: Take 10 minutes to pop your tasks into your calendar or favorite planner.
  prefs: []
  type: TYPE_NORMAL
- en: Use the Pomodoro method when working – 50 minutes of focus, 10 minutes of active
    rest (get out of your chair).
  prefs: []
  type: TYPE_NORMAL
- en: Start small and increase your workload. Start with 1-2 hours, build the habit,
    and increase accordingly.
  prefs: []
  type: TYPE_NORMAL
- en: Scheduling your time blocks should not take any more than 15 minutes a week.
  prefs: []
  type: TYPE_NORMAL
- en: Joey’s Rapid Fire Tips For Maintaining Focus
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Step 1) Increase Clarity by Decreasing Uncertainty**'
  prefs: []
  type: TYPE_NORMAL
- en: Fight, flight or freeze – without clarity, you will not fight.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is accomplished by going through steps 1-3 above again.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tip 2) Remove Distractions**'
  prefs: []
  type: TYPE_NORMAL
- en: Turn your phone on Do-Not-Disturb and move it off of your desk.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Close unnecessary browser tabs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Get out of your house if you have to (coffee shops are always great).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tip 3) Music**'
  prefs: []
  type: TYPE_NORMAL
- en: Listen to instrumental music instead of music with lyrics
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Movie or your favorite video game soundtrack
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Interstellar, The Dark Knight, or anything by Hans Zimmer works wonders
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Synthwave
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tip 4) Take Care of Yourself**'
  prefs: []
  type: TYPE_NORMAL
- en: Move more (exercise)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Eat better
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Get quality sleep (absolutely crucial)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prioritize recovery (mental and physical)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can’t force a tired mind into work. Your mental performance has to be sustainable.
  prefs: []
  type: TYPE_NORMAL
- en: Commit
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you are reading this, you have ambition.
  prefs: []
  type: TYPE_NORMAL
- en: You want to build something that increases your quality of life monetarily,
    mentally, or physically.
  prefs: []
  type: TYPE_NORMAL
- en: This is the starting point.
  prefs: []
  type: TYPE_NORMAL
- en: Commit to an asymmetric bet.
  prefs: []
  type: TYPE_NORMAL
- en: Commit to focus.
  prefs: []
  type: TYPE_NORMAL
- en: —
  prefs: []
  type: TYPE_NORMAL
- en: Joey’s tips for focused work were taken from a training we did together in [Modern
    Mastery HQ](https://join.modernmastery.co). These tips pair incredibly well with
    [The Power Planner.](https://learn.thedankoe.com/planner)
  prefs: []
  type: TYPE_NORMAL
- en: You can also check out the podcast, [You Are NOT The Sum of Your 5 Friends](https://www.modernmastery.co/post/you-are-not-5-friends-psypreneur),
    that Joey and I did together.
  prefs: []
  type: TYPE_NORMAL
