- en: 'Value Creation: The Skill That Built My One-Person Business'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/value-creation-the-skill-that-built-my-one-person-business/](https://thedankoe.com/letters/value-creation-the-skill-that-built-my-one-person-business/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: One of my favorite failed businesses was creating digital art with photoshop.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s one of my favorite pieces (you can find them all if you scroll ALL the
    way to the bottom of my Instagram).
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1111">![](../Images/5cdd4df0d1f400e99535ba0f696884a0.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: This endeavor was the first time I realized the power of social media.
  prefs: []
  type: TYPE_NORMAL
- en: 'I emulated how larger accounts grew their following by:'
  prefs: []
  type: TYPE_NORMAL
- en: Tagging community pages that share digital art
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating the best composites I could so they would get shared
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Remixed photographers’ images in hopes that they would share my content (like
    mentioning a large account in a Twitter thread so they retweet to their audience)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This was almost 5 years ago and was how I gained my first 2,500 followers on
    Instagram.
  prefs: []
  type: TYPE_NORMAL
- en: After 3 months of locking myself in my room, forgetting to eat, and pouring
    my heart into my creations, I gave up.
  prefs: []
  type: TYPE_NORMAL
- en: I loved to create but had no idea how to monetize.
  prefs: []
  type: TYPE_NORMAL
- en: My art was valuable, but not valuable enough to demand payment.
  prefs: []
  type: TYPE_NORMAL
- en: It wasn’t even a possibility in my mind.
  prefs: []
  type: TYPE_NORMAL
- en: I realized that I couldn’t sustain my lifestyle as an artist.
  prefs: []
  type: TYPE_NORMAL
- en: I felt like I had to learn a more profitable skill to freelance with.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, I was an idiot.
  prefs: []
  type: TYPE_NORMAL
- en: If I knew what I knew now, I would probably still be creating in photoshop.
  prefs: []
  type: TYPE_NORMAL
- en: 'I love writing a bit more now, so I don’t plan to go back to digital art, but
    if I could go back here’s what I would do:'
  prefs: []
  type: TYPE_NORMAL
- en: Continue growing and realize my audience is a traffic source
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create a product or service to send that traffic to (courses and coaching in
    this case)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learn copywriting, marketing, and offer creation to position my product in the
    market
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Partner with personal development creators to visualize their best ideas and
    become an authority in the space
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In other words, I’d do everything we’ve talked about in the one-person business
    videos.
  prefs: []
  type: TYPE_NORMAL
- en: As with all of my failed businesses, they taught me a valuable lesson.
  prefs: []
  type: TYPE_NORMAL
- en: The skills, like photoshop, all contributed to the success of my current brand
    (i.e. I make all of my designs and thumbnails).
  prefs: []
  type: TYPE_NORMAL
- en: But there is one skill that I attribute 95% of my brand, sales, and audience
    growth over the years.
  prefs: []
  type: TYPE_NORMAL
- en: The Universal Pattern Of Human Psychology
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1112">![](../Images/9ba4c95d64151919f06e3d86c43d99ac.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Every “money-making” skill that people tell you to learn is linked with Universal
    patterns and human psychology.
  prefs: []
  type: TYPE_NORMAL
- en: If they aren’t, then they don’t make money.
  prefs: []
  type: TYPE_NORMAL
- en: And if they don’t make money, then you need to stack the skills that allow them
    to make money.
  prefs: []
  type: TYPE_NORMAL
- en: 'At the base of all human behavior (including people pulling out their credit
    cards to pay you) are three things:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Survival** – the desire to replicate the information in your genes and
    consciousness, both physical and mental.'
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Evolution** – the desire to outpace destruction through creation.'
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Transformation** – the desire to achieve a higher quality of experience.'
  prefs: []
  type: TYPE_NORMAL
- en: These are all fairly similar and can be considered synonymous for the rest of
    this letter.
  prefs: []
  type: TYPE_NORMAL
- en: Storytelling, games, music, and architecture can also be observed to dissect
    these patterns. The principles of each can be used to enhance the impact of your
    skill stack.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the simplest way I can explain it, all of these use the same framework:
    purpose, path, priority.'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Purpose
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Behavior change starts with a problem and shines a light on a goal to overcome
    it.
  prefs: []
  type: TYPE_NORMAL
- en: Goal = purpose.
  prefs: []
  type: TYPE_NORMAL
- en: Purpose = desire.
  prefs: []
  type: TYPE_NORMAL
- en: Desire = how problems come into existence.
  prefs: []
  type: TYPE_NORMAL
- en: Like how a story opens a curiosity loop by illustrating or implying a problem.
  prefs: []
  type: TYPE_NORMAL
- en: Or how a landing page targets a relevant problem in your life to incentivize
    action.
  prefs: []
  type: TYPE_NORMAL
- en: Or how you get fed up with a problem in your life and finally decide to solve
    it.
  prefs: []
  type: TYPE_NORMAL
- en: By shining a light on a problem in someone’s life, you create purpose.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Path
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When a problem is identified and an accompanying goal reveals a potential future,
    clarity is the bridge.
  prefs: []
  type: TYPE_NORMAL
- en: The opposite of clarity is chaos, and we don’t want our customers anxious and
    overwhelmed at the thought of using our product.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Priority
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In order for the problem to register in one’s awareness it must be important
    to them.
  prefs: []
  type: TYPE_NORMAL
- en: And if the problem isn’t important to them, you won’t catch their attention
    to show them the path. The path won’t even matter at that point because it won’t
    help them, nor will they have the drive to act.
  prefs: []
  type: TYPE_NORMAL
- en: Importance is subjective.
  prefs: []
  type: TYPE_NORMAL
- en: Humans perceive problems from the lens of their identity.
  prefs: []
  type: TYPE_NORMAL
- en: If you are trying to sell a self-improvement product to an overweight gamer,
    you have to position that product in a very specific way.
  prefs: []
  type: TYPE_NORMAL
- en: By the way, this is the same framework you can use to take back control of your
    life.
  prefs: []
  type: TYPE_NORMAL
- en: The Value Creation Framework
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The purpose > path > priority framework is great, but let’s make it practical.
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we will discuss where we can use these things.
  prefs: []
  type: TYPE_NORMAL
- en: Consider all of the parts below as “marketing firepower” that you can use in
    your content, promotions, or even language in everyday life to illustrate the
    value of your product or yourself.
  prefs: []
  type: TYPE_NORMAL
- en: These are the steps to turning dirt into gold.
  prefs: []
  type: TYPE_NORMAL
- en: These are the steps that, when applied to any of my endeavors, led to my business
    making $1M.
  prefs: []
  type: TYPE_NORMAL
- en: These are the steps to practicing the most valuable skill which is *value creation*.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t have an offer, learn [how to create one here](https://thedankoe.com/the-best-online-business-model-to-make-1-million-in-2023/),
    or how to package up the [knowledge in your head](https://thedankoe.com/you-have-100000-of-knowledge-trapped-in-your-brain/)
    here.
  prefs: []
  type: TYPE_NORMAL
- en: These will get easier with time.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t worry if you struggle to fill these all out.
  prefs: []
  type: TYPE_NORMAL
- en: 1) Levels Of Awareness
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Everyone that you come across online and offline falls within a level of awareness
    (or consciousness) around their problems and your value (product, service, or
    being).
  prefs: []
  type: TYPE_NORMAL
- en: Note that these overlap with [stages of ego development](https://thedankoe.com/a-message-from-a-recovering-atheist-how-to-find-god/)
    or the spiral dynamics scale in psychology / philosophy.
  prefs: []
  type: TYPE_NORMAL
- en: '**Level 1: Unaware**'
  prefs: []
  type: TYPE_NORMAL
- en: If you want to write viral tweets or create viral YouTube videos, base your
    content around the unaware stage.
  prefs: []
  type: TYPE_NORMAL
- en: In this stage, people are unaware of their problem and your offer.
  prefs: []
  type: TYPE_NORMAL
- en: You want to write and speak to make them aware of their problem and how it is
    impacting their life.
  prefs: []
  type: TYPE_NORMAL
- en: Educate, inform, and empathize with your readers with the problem they are facing.
  prefs: []
  type: TYPE_NORMAL
- en: If you are trying to help someone get fit, you may point out that a lack of
    proper nutrition is the source of their grogginess.
  prefs: []
  type: TYPE_NORMAL
- en: 'A tweet I would write:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“You are always tired because you stuff your face with hot pockets, Uber eats,
    and foods that lead to nutrient deficiency.”*'
  prefs: []
  type: TYPE_NORMAL
- en: A bit harsh, yes, but that’s my style.
  prefs: []
  type: TYPE_NORMAL
- en: '**Level 2: Problem Aware**'
  prefs: []
  type: TYPE_NORMAL
- en: Your readers are aware of a problem but may not understand it or know of a solution.
  prefs: []
  type: TYPE_NORMAL
- en: 'A post I would write:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“If you’re tired all the time:*'
  prefs: []
  type: TYPE_NORMAL
- en: '*– Weigh yourself every morning*'
  prefs: []
  type: TYPE_NORMAL
- en: '*– Eat your bodyweight in protein*'
  prefs: []
  type: TYPE_NORMAL
- en: '*– Drink water until you pee clear*'
  prefs: []
  type: TYPE_NORMAL
- en: '*– Walk 10,000 steps a day*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Thank me later when you feel so good that you hate the thought of ruining
    that feeling with junk food.”*'
  prefs: []
  type: TYPE_NORMAL
- en: In long-form content, you can both educate people on the problem they are facing
    and provide a solution.
  prefs: []
  type: TYPE_NORMAL
- en: With short form, like tweets or shorts, you usually target levels 1-3 for maximum
    effect. Don’t be too high-level or clever.
  prefs: []
  type: TYPE_NORMAL
- en: '**Level 3: Solution Aware**'
  prefs: []
  type: TYPE_NORMAL
- en: At this stage people are aware of their problem and that a solution exists.
    But they don’t know *your* solution exists.
  prefs: []
  type: TYPE_NORMAL
- en: Now you are giving a clear solution or encouraging them to act.
  prefs: []
  type: TYPE_NORMAL
- en: '**Level 4: Product Aware**'
  prefs: []
  type: TYPE_NORMAL
- en: People are aware of your solution and other similar solutions.
  prefs: []
  type: TYPE_NORMAL
- en: Your job is to present reasons as to why yours is better.
  prefs: []
  type: TYPE_NORMAL
- en: Benefits-rich language is key.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a post I would write:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“Why you should start intermittent fasting:*'
  prefs: []
  type: TYPE_NORMAL
- en: '*– Morning focus is insane*'
  prefs: []
  type: TYPE_NORMAL
- en: '*– You don’t have to plan morning food*'
  prefs: []
  type: TYPE_NORMAL
- en: '*– Lunch and dinner can be massive meals”*'
  prefs: []
  type: TYPE_NORMAL
- en: I could finish the post but you get the point, and this is already getting long.
  prefs: []
  type: TYPE_NORMAL
- en: '**Level 5: Most Aware**'
  prefs: []
  type: TYPE_NORMAL
- en: People are brutally aware of your solution and need a little push over the edge.
  prefs: []
  type: TYPE_NORMAL
- en: You can either continue promoting your product until the time is right (like
    retargeting ads, people usually don’t buy when they first see your product)…
  prefs: []
  type: TYPE_NORMAL
- en: Or you can offer a limited-time sale or implement another scarcity tactic. Use
    this sparingly.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Positioning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1113">![](../Images/082f4810ec33030cf6604ae7eabddfac.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Now that we understand the levels of awareness, we can begin to craft a persuasive
    message.
  prefs: []
  type: TYPE_NORMAL
- en: By the way, I give you Notion templates and in-depth education on how to create
    and sell a product from the knowledge in your brain in [Digital Economics](https://digitaleconomics.school).
  prefs: []
  type: TYPE_NORMAL
- en: We’ve discussed the eternal markets many times before (health, wealth, relationships),
    but we are taking it deeper.
  prefs: []
  type: TYPE_NORMAL
- en: There are 8 human desires that are impossible to ignore.
  prefs: []
  type: TYPE_NORMAL
- en: 'All of your content, sales pages, or writing should be written from the lens
    of these desires:'
  prefs: []
  type: TYPE_NORMAL
- en: Survival
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Life Enjoyment
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Freedom From Fear
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sexual Companionship
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Comfort & Clarity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Perceived Status
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Safety Of Community
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Social Acceptance
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Educate people on the problems standing in the way of these desires and provide
    a solution to overcome them.
  prefs: []
  type: TYPE_NORMAL
- en: Notice how every single person’s “niche” is self-actualization.
  prefs: []
  type: TYPE_NORMAL
- en: 'My business philosophy that is:'
  prefs: []
  type: TYPE_NORMAL
- en: Solve your own problems > document the solution > improve others to raise the
    collective consciousness still holds true.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Big Problem
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: From a specific level of awareness and angle you choose to position from, you
    identify a big problem to begin your writing, speaking, or creations.
  prefs: []
  type: TYPE_NORMAL
- en: 'From the “unaware” stage and “perceived status” angle, I can identify a big
    problem like:'
  prefs: []
  type: TYPE_NORMAL
- en: Not being able to get a 6 figure job.
  prefs: []
  type: TYPE_NORMAL
- en: I can then agitate that problem and illustrate how not having a 6 figure job
    is impacting their dating, ability to pay the bills, and how the world naturally
    lacks a level of respect for them.
  prefs: []
  type: TYPE_NORMAL
- en: You can also see how that problem hits from other angles like “survival.”
  prefs: []
  type: TYPE_NORMAL
- en: Shallow?
  prefs: []
  type: TYPE_NORMAL
- en: Yes.
  prefs: []
  type: TYPE_NORMAL
- en: Welcome to human life.
  prefs: []
  type: TYPE_NORMAL
- en: Depth comes after you solve shallow problems in your life (and others).
  prefs: []
  type: TYPE_NORMAL
- en: Nobody cares about mindfulness or existentialism if the problem that occupies
    the entirety of their mind is paying the bills or having sex.
  prefs: []
  type: TYPE_NORMAL
- en: There are stages of development that we must raise people up.
  prefs: []
  type: TYPE_NORMAL
- en: 4) Unique Mechanism
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You need a solution that stands out from everyone elses.
  prefs: []
  type: TYPE_NORMAL
- en: Again, this is why I recommend “figuring it out” for yourself, because you create
    a unique solution through experimentation.
  prefs: []
  type: TYPE_NORMAL
- en: Like how Greg O Gallagher combined intermittent fasting and reverse pyramid
    training into a fitness program that fits his specific lifestyle.
  prefs: []
  type: TYPE_NORMAL
- en: Then, he targeted problems within his lifestyle, positioned them toward the
    8 human desires, and sold his unique solution.
  prefs: []
  type: TYPE_NORMAL
- en: Think about how *you* would solve the problem, step by step, and slap a compelling
    name on those steps.
  prefs: []
  type: TYPE_NORMAL
- en: My [2-Hour Content Ecosystem](https://2hourwriter.com) is an example.
  prefs: []
  type: TYPE_NORMAL
- en: 5) Bullet Spray Benefits
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I love overwhelming people with benefits in my copywriting and tweets.
  prefs: []
  type: TYPE_NORMAL
- en: When you give a bullet point list of hard-hitting benefits of your unique solution,
    you give people *multiple* reasons to buy (or engage).
  prefs: []
  type: TYPE_NORMAL
- en: Even if one point doesn’t resonate, another may be the reason they convert.
  prefs: []
  type: TYPE_NORMAL
- en: 6) Proof
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Personal results, testimonials, and any other statistics or facts you can gather
    will help people trust that you can deliver results.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t underestimate the power of personal experience. It’s something that we
    rarely see. People crave human connection.
  prefs: []
  type: TYPE_NORMAL
- en: This is why I start 90% of my newsletters and videos with a personal experience
    that illustrates a problem I was having.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, testimonials are powerful, and you should make it your full-time
    job to acquire them at the beginning, but you shouldn’t wait until you have them
    to start selling.
  prefs: []
  type: TYPE_NORMAL
- en: 7) Big Idea
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After you’ve fleshed out the other value creation points, you want to mull over
    them all to get to the big idea.
  prefs: []
  type: TYPE_NORMAL
- en: The big idea is somewhat of a one-sentence summary that illustrates your value.
  prefs: []
  type: TYPE_NORMAL
- en: Most popular quotes are big ideas.
  prefs: []
  type: TYPE_NORMAL
- en: The content that sticks in your head is big ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Big ideas are best found by hunting for them and making them your own.
  prefs: []
  type: TYPE_NORMAL
- en: Bitcoin is the digital currency of the future.
  prefs: []
  type: TYPE_NORMAL
- en: Uber is the modern taxi service.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT is f**king everything.
  prefs: []
  type: TYPE_NORMAL
- en: This can overlap with or *be* any of the points you listed, as long as it’s
    potent.
  prefs: []
  type: TYPE_NORMAL
- en: It took a while for this to make sense to me, and I’m still unable to articulate
    it.
  prefs: []
  type: TYPE_NORMAL
- en: Understand it through practice and struggle.
  prefs: []
  type: TYPE_NORMAL
- en: Or, you can hunt for big ideas with [last weeks letter.](https://thedankoe.com/how-i-read-books-for-maximum-intelligence-5-minute-habit/)
  prefs: []
  type: TYPE_NORMAL
- en: 8) Risk Reversal & End Result
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A compelling risk reversal will help you close deals at the beginning of your
    journey.
  prefs: []
  type: TYPE_NORMAL
- en: Most people opt for a money-back guarantee, which is cool, but you can make
    it juicier by pairing it with a clear end result.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example when selling a dating product:'
  prefs: []
  type: TYPE_NORMAL
- en: “If you don’t land 5 dates in 60 days we refund your investment.”
  prefs: []
  type: TYPE_NORMAL
- en: Who wouldn’t buy that?
  prefs: []
  type: TYPE_NORMAL
- en: And it puts pressure on you to deliver.
  prefs: []
  type: TYPE_NORMAL
- en: You will have to add caveats to your risk reversal and state that they must
    act on everything you provide.
  prefs: []
  type: TYPE_NORMAL
- en: Marketing Legos
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Treat everything above as “marketing legos” for anything you write about, speak
    about, or interact with another human being about.
  prefs: []
  type: TYPE_NORMAL
- en: Everything.
  prefs: []
  type: TYPE_NORMAL
- en: You have to practice this every moment you can if you want to get good.
  prefs: []
  type: TYPE_NORMAL
- en: Reading this post is not enough.
  prefs: []
  type: TYPE_NORMAL
- en: Reading anything is not enough.
  prefs: []
  type: TYPE_NORMAL
- en: You have to start a project, encounter *real-world problems,* and let reality
    teach you what reading can’t.
  prefs: []
  type: TYPE_NORMAL
- en: There are thousands of minor nuances that no single person can illustrate to
    you in a piece of content, book, or course.
  prefs: []
  type: TYPE_NORMAL
- en: You have to pick them up, consciously and subconsciously, through action.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are a few places you can start practicing your value creation:'
  prefs: []
  type: TYPE_NORMAL
- en: Social Media Posts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Engaging long-form content follows this format:'
  prefs: []
  type: TYPE_NORMAL
- en: Introduce a problem and agitate it
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Give context or raise them to the solution-aware level (usually through proof
    or a story)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Give actionable steps to overcome the problem (and preferably name that method
    as your own)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Incorporate the benefits of implementing that system so people act
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use the big idea of your content as the title or headline
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The One Person Business that I talk about so much is both a validated big idea
    and unique mechanism to many big problems in life.
  prefs: []
  type: TYPE_NORMAL
- en: Long-form content can walk people through all levels of awareness.
  prefs: []
  type: TYPE_NORMAL
- en: For engagement, target 1-3.
  prefs: []
  type: TYPE_NORMAL
- en: For sales, target 2-5.
  prefs: []
  type: TYPE_NORMAL
- en: For hard promotions, target 3-5.
  prefs: []
  type: TYPE_NORMAL
- en: This applies to newsletters, threads, carousels, captions, and YouTube videos.
  prefs: []
  type: TYPE_NORMAL
- en: Short-form content is limited to one at a time.
  prefs: []
  type: TYPE_NORMAL
- en: You can turn any of your “marketing legos” into a post.
  prefs: []
  type: TYPE_NORMAL
- en: This applies to tweets, single IG posts, tiktoks and shorts, etc.
  prefs: []
  type: TYPE_NORMAL
- en: Landing Pages & Sales Pages
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Similar to writing long-form content, landing and sales pages follow the same
    pattern.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you want to practice with copywriting frameworks, use:'
  prefs: []
  type: TYPE_NORMAL
- en: '**PASTOR** – problem, amplify, story, testimony, offer, response'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AIDA** – attention, interest, desire, action'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**PAS** – problem, amplify, solution'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And get better with time.
  prefs: []
  type: TYPE_NORMAL
- en: For your headline and subheadline, you are trying to fit most, if not all, of
    your marketing legos into them.
  prefs: []
  type: TYPE_NORMAL
- en: This also applies to sales calls, DMs, or presentations.
  prefs: []
  type: TYPE_NORMAL
- en: Course Curriculum
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You want people to act on the content you teach.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t stop being persuasive after they buy your product.
  prefs: []
  type: TYPE_NORMAL
- en: You have to hold their attention, give them clarity, and encourage them to act.
  prefs: []
  type: TYPE_NORMAL
- en: How else are they going to get results?
  prefs: []
  type: TYPE_NORMAL
- en: And if they don’t get results, how are you going to get testimonials?
  prefs: []
  type: TYPE_NORMAL
- en: Everyday Conversation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: All human communication is persuasive.
  prefs: []
  type: TYPE_NORMAL
- en: When you converse with someone, you attempt to operate from a shared perspective.
  prefs: []
  type: TYPE_NORMAL
- en: When you don’t, that’s when arguments start.
  prefs: []
  type: TYPE_NORMAL
- en: A perspective has a shared goal, so start the conversation with a problem to
    catch their attention.
  prefs: []
  type: TYPE_NORMAL
- en: 'You: “Man I’ve felt so tired lately, I can’t get any work done.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Them: “Same man I’m always tired.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'You: “Yeah last time I felt like this I got deep into fitness, I’m going to
    get back on my routine.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Them: “What was the routine?”'
  prefs: []
  type: TYPE_NORMAL
- en: 'You: “I followed the vertical diet and bro split in the gym.”'
  prefs: []
  type: TYPE_NORMAL
- en: The conversation would go on to hopefully educate them on what you are doing
    and give them something useful to try (and the benefits of doing so).
  prefs: []
  type: TYPE_NORMAL
- en: That conversation is valuable (and can be turned into content ;))
  prefs: []
  type: TYPE_NORMAL
- en: That’s it.
  prefs: []
  type: TYPE_NORMAL
- en: Go out and start practicing in everything you do.
  prefs: []
  type: TYPE_NORMAL
- en: Your articulation, cash flow, and quality of life will go through the roof.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan Koe
  prefs: []
  type: TYPE_NORMAL
