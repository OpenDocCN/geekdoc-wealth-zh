  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Zoom in on what's important.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Zoom out from everything else.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
