- en: How To Master Your Focus
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/how-to-master-your-focus/](https://thedankoe.com/letters/how-to-master-your-focus/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: One of my favorite books is *The Way Of The Superior Man* by David Deida.
  prefs: []
  type: TYPE_NORMAL
- en: David has some transformative ideas on modern masculinity. He brings a unique
    light to the misconceptions surrounding it and a spiritual approach to relationships.
    My favorite aspect of David? *His writing.*
  prefs: []
  type: TYPE_NORMAL
- en: There’s something different about it. Some of it doesn’t make sense… yet it
    still makes sense. You can tell that Deida isn’t writing from his mind, he’s writing
    from his heart. He isn’t only talking the spiritual talk, he is walking (or writing)
    the spiritual walk.
  prefs: []
  type: TYPE_NORMAL
- en: He is channeling from his deepest source by immersing himself in the present
    moment. Connected to the infinite, God, the universe, a higher intelligence… fully
    conscious. Deida is writing while hovering a few feet off the material ground.
    He is painting a picture. He is “showing, not telling.” He is attempting to explain
    his present, direct experience by explaining what it is like, not what it is.
  prefs: []
  type: TYPE_NORMAL
- en: This has taught me a lot about writing in itself. I write my best when I can
    sit down, no distractions, present, and speak in words that may not make sense
    to the unconscious eye.
  prefs: []
  type: TYPE_NORMAL
- en: Little thought. From source to screen.
  prefs: []
  type: TYPE_NORMAL
- en: What hold’s people back from reaching this state? I’ll let Watts set the scene.
  prefs: []
  type: TYPE_NORMAL
- en: Human consciousness is at the same time as being a form of awareness and sensitivity
    and understanding it’s also a form of ignorance.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The ordinary everyday consciousness that we have leaves out more than it takes
    in.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: And because of this, it leaves out things that are terribly important.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It leaves out things that would if we did know them, allay our anxieties and
    fears and horrors. And if we could extend our awareness you see to include those
    things that we leave out we would have a deep interior piece because we would
    all know the one thing that you mustn’t know… what is profound, what is mysterious,
    what is in the depths.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Alan Watts
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Like Deida, Watts is describing what he sees in these “depths” of human consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s discuss. Maybe this can make all of us better writers (and open us up
    to a new dimension of human life.)
  prefs: []
  type: TYPE_NORMAL
- en: '*Warning:* This is going to be one of my more spiritual or philosophical letters.
    I would encourage you to read through it with an open mind and curiosity to understand.'
  prefs: []
  type: TYPE_NORMAL
- en: The Focus Matrix
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I am writing my book, *The Art Of Focus*, to expose people to the depths of
    something we don’t appreciate enough, focus.
  prefs: []
  type: TYPE_NORMAL
- en: Focus is vastly misunderstood for this exact reason.
  prefs: []
  type: TYPE_NORMAL
- en: People only *see* it from a surface level and decided to leave it at that. Most
    people — especially those in the self-improvement space — see it as a once-in-a-while
    tool for deep work.
  prefs: []
  type: TYPE_NORMAL
- en: In reality, focus is the entirety of our lives.
  prefs: []
  type: TYPE_NORMAL
- en: You'd be surprised how much you can get done with 1 hour of uninterrupted focus.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [June 25, 2022](https://twitter.com/thedankoe/status/1540653535192387584?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Learning how to get into deep, focused work](https://thedankoe.com/4-hours-of-focused-work-will-change-your-life/)
    is an incredible way to introduce yourself to the power of harnessing attention.'
  prefs: []
  type: TYPE_NORMAL
- en: You can get 8 hours of work done in 2.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can utilize the finite energy you have in the day.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can make a habit out of making massive progress on your goals.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We’ve talked about all this before (and to be frank, the focused work is getting
    a tad repetitive on social media).
  prefs: []
  type: TYPE_NORMAL
- en: '*But that’s not what I meant by the tweet above. It has nothing to do with
    focused work… yet everything to do with “focused work.”*'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s dive *deeper.*
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-679">![](../Images/06f1ade21865a1527215545b9067ce75.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Focus, in my definition, is conscious attention.
  prefs: []
  type: TYPE_NORMAL
- en: Consciousness is the essence of the human experience.
  prefs: []
  type: TYPE_NORMAL
- en: Attention is how we process information within the infinite realm of consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: Focus is how you maneuver your attention to navigate reality towards optimal
    outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: In my book, I present an argument for what I call The 3 Pillars.
  prefs: []
  type: TYPE_NORMAL
- en: This is the overarching meta concept that I conduct my life by.
  prefs: []
  type: TYPE_NORMAL
- en: '**I: Focus**'
  prefs: []
  type: TYPE_NORMAL
- en: Your vision, purpose, hierarchy of goals (mission), and priority actions are
    focus anchors. These “anchors” must be cultivated, refined, and revisited to give
    you consistent intrinsic energy.
  prefs: []
  type: TYPE_NORMAL
- en: '**II: Energy**'
  prefs: []
  type: TYPE_NORMAL
- en: Now that you have something of importance to dedicate your time and attention
    to, everything else must follow suit. All inputs. Food, thoughts, money, information,
    etc. Every stimuli you encounter either aids your future (that includes collective
    impact) or it is ignored.
  prefs: []
  type: TYPE_NORMAL
- en: You can expand, contract, narrow, or widen your focus on these specific entities
    to “tap in” to their level of energy. If a negative thought pops into your head,
    you can transmute that negative thought into a positive experience through polar
    thinking.
  prefs: []
  type: TYPE_NORMAL
- en: '**III: Experience**'
  prefs: []
  type: TYPE_NORMAL
- en: With accurate focus and an open energy channel, you conduct yourself from your
    direct conscious experience right now. That is, you anchor your focus to the present
    moment. While connected to source, you “give your gift” or “fuck the world” as
    Deida would say with your full ability. Nothing held back. Impacting the minds
    and hearts of the world, thus impacting the collective mind and heart.
  prefs: []
  type: TYPE_NORMAL
- en: Think of this in the aspect of writing or communication. Deida is “giving his
    gift” fully in the present moment in his writing. He encourages you to give your
    gift fully while communicating and interacting with the world.
  prefs: []
  type: TYPE_NORMAL
- en: '*This is only the tip of the iceberg of course. It is taking an entire book
    to explain. For those wondering, it will be dropping sometime next year. I am
    in no rush.*'
  prefs: []
  type: TYPE_NORMAL
- en: Focal contraction and expansion is how you live a life of meaning, enjoyment,
    and progress. It is an art form. No matter how “negative” the situation is to
    the untrained eye. All Is Mind.
  prefs: []
  type: TYPE_NORMAL
- en: Narrow, unconscious focus leads to stress, anxiety, reactivity, and annoyance.
  prefs: []
  type: TYPE_NORMAL
- en: When you find yourself projecting into the predictable future, it is easy to
    narrow your focus on a stressful upcoming situation and pull that future experience
    into your present experience.
  prefs: []
  type: TYPE_NORMAL
- en: Open, unconscious focus leads to feeling lost and overwhelmed with where your
    life is headed.
  prefs: []
  type: TYPE_NORMAL
- en: There are tasks, goals, and life outcomes that trigger thoughts, emotion, and
    experience unless caught by the watcher.
  prefs: []
  type: TYPE_NORMAL
- en: 'Conscious focus — both narrow and open — have an entire lifetime of use cases,
    but I want to focus on one that has radically transformed the way I navigate relaity:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Depth, appreciation, and love.*'
  prefs: []
  type: TYPE_NORMAL
- en: Don’t worry, I used to be the guy that would cringe at all of the “good vibes
    only” lingo. For the rest of this letter I want you to set your labels, judgements,
    and reactions aside. Open your mind beyond words as I challenge the way you think
    for a bit.
  prefs: []
  type: TYPE_NORMAL
- en: '**Mid Koe Letter reminder**: [readers can join Modern Mastery for $5 here](https://modernmastery.co/letter).
    MM contains 170+ life and business strategies, live trainings, and step-by-step
    roadmaps from people who have built sustainable and passionate one-person businesses.'
  prefs: []
  type: TYPE_NORMAL
- en: Infinite Consciousness
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There is one thing that separates human beings the most from other species:'
  prefs: []
  type: TYPE_NORMAL
- en: Depth of focus.
  prefs: []
  type: TYPE_NORMAL
- en: Expansion and contraction.
  prefs: []
  type: TYPE_NORMAL
- en: Expansion being a large area of attention.
  prefs: []
  type: TYPE_NORMAL
- en: Contraction being a small area of attention.
  prefs: []
  type: TYPE_NORMAL
- en: Like a circle that gets larger and smaller depending on what you are directly
    conscious of.
  prefs: []
  type: TYPE_NORMAL
- en: Focus is the most important skill that has flown under people’s noses.
  prefs: []
  type: TYPE_NORMAL
- en: It isn’t tangible. It isn’t material. It is near impossible to pinpoint the
    exact state of your focus. You can’t quantify it.
  prefs: []
  type: TYPE_NORMAL
- en: For that reason, and multiple reasons we have discussed before, the majority
    of the human population are asleep. Living out pre-programmed unconscious lives.
    Habitual actions, thought patterns, emotional reactions, and decisions that result
    in their direct experience in this present moment.
  prefs: []
  type: TYPE_NORMAL
- en: Conscious living is another layer deeper. Through practice, you enjoy life in
    an entirely new dimension. You begin to see this world from another dimension.
  prefs: []
  type: TYPE_NORMAL
- en: What is stopping people from tapping in to this new dimension?
  prefs: []
  type: TYPE_NORMAL
- en: '[Think of the tip of an iceberg.](https://thedankoe.com/what-mushrooms-taught-me-about-life-and-business/)'
  prefs: []
  type: TYPE_NORMAL
- en: It sits above the surface of the water.
  prefs: []
  type: TYPE_NORMAL
- en: Now imagine that iceberg as anything you were to come in contact with in reality.
    Infinite icebergs that create the fabric of reality.
  prefs: []
  type: TYPE_NORMAL
- en: A thought, emotion, phone, glass, plant, computer, word, letter, design, social
    media profile, tattoo, keyboard, key, shirt, belt, button, room, cloud, chair,
    smell, or anything else you can become directly conscious of through your sensory
    experience.
  prefs: []
  type: TYPE_NORMAL
- en: This is how most people conduct their lives. They see what they see (or feel
    what they feel) and forget the rest. There is no depth. There is no understanding.
    There is no awareness of the interdependence of life itself.
  prefs: []
  type: TYPE_NORMAL
- en: How do you dive deeper?
  prefs: []
  type: TYPE_NORMAL
- en: Through conscious attention and awareness.
  prefs: []
  type: TYPE_NORMAL
- en: Can you become aware of the EMF frequencies that your phone is emitting? I’m
    not asking you to *see* or *feel* them. I am asking you to become aware of them.
    Visualize them. Know that they are there. Let your curiosity take you on a learning
    spree. Understand how it impacts everything it touches.
  prefs: []
  type: TYPE_NORMAL
- en: Can you become aware of the coffee that is in your hands? What is the chemical
    composure of the coffee? Whose hands were involved in the manufacturing process
    of the coffee? What about the glass that it is held in?
  prefs: []
  type: TYPE_NORMAL
- en: Can you see how you are focusing your attention on one specific figment of consciousness
    throughout this? You can separate the coffee from the glass, the molecules from
    the liquid, and as you expand and contract your focus — you become more or less
    aware of infinity.
  prefs: []
  type: TYPE_NORMAL
- en: Can you contract down to a valve in your heart, expand out to everything within
    your field of vision, and manipulate your focus to everything in between?
  prefs: []
  type: TYPE_NORMAL
- en: Like driving a car. Sometimes you are happy, windows down, singing your favorite
    song at the top of your lungs. Other times you are scared for your survival, hyper
    focused in a moments notice of the deer that just jumped in front of your car.
  prefs: []
  type: TYPE_NORMAL
- en: You navigate, appreciate, and thrive in life by mastering your focus.
  prefs: []
  type: TYPE_NORMAL
- en: A Thought Exercise
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We talk a lot about my concept of The Unknown.
  prefs: []
  type: TYPE_NORMAL
- en: It is a dark, scary place where infinite opportunity lies.
  prefs: []
  type: TYPE_NORMAL
- en: A layer beneath your perceived reality.
  prefs: []
  type: TYPE_NORMAL
- en: '*Think* of your ego as a flashlight that your being is holding.'
  prefs: []
  type: TYPE_NORMAL
- en: '*Think* of the beam of light being emitted as your perception.'
  prefs: []
  type: TYPE_NORMAL
- en: '*Think* of your life as being a culmination of everything you have become directly
    conscious of by shining your flashlight on it.'
  prefs: []
  type: TYPE_NORMAL
- en: '*Think* of yourself as an explorer on The Unknown.'
  prefs: []
  type: TYPE_NORMAL
- en: (All understanding is metaphorical, you have *experienced* this before. Language
    is how we communicate our experience. Your direct experience is a manifestation
    of infinity.)
  prefs: []
  type: TYPE_NORMAL
- en: You are in a dark room that spans in infinite directions.
  prefs: []
  type: TYPE_NORMAL
- en: Your vision is the north star, the tiny light at the end of the tunnel.
  prefs: []
  type: TYPE_NORMAL
- en: Your goals are dimly lit candles that outline your mission. The path to actualizing
    your vision.
  prefs: []
  type: TYPE_NORMAL
- en: The limited consciousness that comes along with holding the flashlight will
    not serve you well on this journey.
  prefs: []
  type: TYPE_NORMAL
- en: The ego, or flashlight, is in a common state of narrow focus. What the light
    reveals is what you see. If you turn your back on (or forget) your vision, you
    will be lost in the dark.
  prefs: []
  type: TYPE_NORMAL
- en: Throw the flashlight away for a second. No, it’s not that easy in reality. Just
    imagine with me.
  prefs: []
  type: TYPE_NORMAL
- en: There is a ball of light in your chest that you can contract and expand.
  prefs: []
  type: TYPE_NORMAL
- en: Stop. Imagine a ball of light in your chest. Can you sense it’s warmth? With
    your conscious attention, can you move it slowly down your body and into your
    stomach? Can you move that ball of light down and out into the middle of your
    legs — feeling the edges of the ball radiate on the inside of your calves?
  prefs: []
  type: TYPE_NORMAL
- en: Now, can you slowly expand that ball, wider and wider, it has engulfed your
    entire body now. *Feel* it “brightening” your blood, veins, brain, and anything
    else that you can become conscious of in this moment.
  prefs: []
  type: TYPE_NORMAL
- en: Expand your focus further and out into the room. How far can you go? Can you
    bring everything within a 50 foot radius of you into your open focus?
  prefs: []
  type: TYPE_NORMAL
- en: As you are navigating The Unknown, can you become more present, conscious, and
    aware of the path in front of you?
  prefs: []
  type: TYPE_NORMAL
- en: When you “zoom out” are there any worries in the world?
  prefs: []
  type: TYPE_NORMAL
- en: Can you see the big picture?
  prefs: []
  type: TYPE_NORMAL
- en: When you hit a roadbump in your path and your inner light goes out, are you
    going to pick up the flashlight and narrow in on the problem — making it your
    entire world?
  prefs: []
  type: TYPE_NORMAL
- en: 'Two steps to happiness:'
  prefs:
