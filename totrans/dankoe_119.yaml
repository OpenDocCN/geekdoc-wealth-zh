- en: The Power Of Long Walks (15,000 Steps A Day Changed My Life)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 长步走的威力（每天15000步改变了我的人生）
- en: 原文：[https://thedankoe.com/letters/the-power-of-long-walks-daily-walks-will-change-your-life/](https://thedankoe.com/letters/the-power-of-long-walks-daily-walks-will-change-your-life/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/the-power-of-long-walks-daily-walks-will-change-your-life/](https://thedankoe.com/letters/the-power-of-long-walks-daily-walks-will-change-your-life/)
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2026">![](../Images/2e749c151dcda272a47d0748e8dd19be.png)</picture>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-2026">![](../Images/2e749c151dcda272a47d0748e8dd19be.png)</picture>
- en: I used to ***hate*** walking.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我曾经***讨厌***走路。
- en: I don’t mean that I used to hate just going on a nice stroll.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我的意思不是说我以前只是讨厌散步。
- en: I hated walking anywhere. I was the definition of lazy… maybe efficient is a
    better word. I loved going to the gym and working on my little side businesses,
    but outside of that, you would find me on my couch, in bed, or in my office chair
    playing video games. I’ve always been the type to do the bare minimum, which has
    mostly benefited me in one way or another.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我讨厌去任何地方散步。我就是懒惰的化身……也许“高效”这个词更合适。我喜欢去健身房和经营我的小生意，但除此之外，你会在我的沙发上、床上或办公椅上找到我，玩电子游戏。我总是那种只做最基本的事情的人，这让我在某种程度上受益。
- en: I would make any excuse to walk or drive somewhere.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我会找任何借口去散步或开车去某个地方。
- en: To set the scene, I started using nicotine when the Juul became popular (yes,
    I was one of those kids that didn’t know any better and conformed). Eventually,
    that nicotine usage transitioned into using Zyns instead for focused work. Zyns
    are tobaccoless nicotine pouches, very popular right now.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 为了设定场景，我开始使用尼古丁，因为Juul变得流行（是的，我就是那些不知道更好的孩子之一，并且随波逐流）。最终，这种尼古丁使用转变为使用Zyns来集中精力工作。Zyns是无尼古丁的尼古丁烟包，现在非常流行。
- en: On a random day in 2019, I realized that my nicotine abuse was hurting the attention
    I could give to others. I always felt tired. I didn’t say much in conversation.
    And if I hadn’t had a hit in a while, that’s all that I would be able to think
    about.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在2019年某天，我意识到我滥用尼古丁正在损害我对他人的注意力。我总是感到疲倦。在谈话中我说得不多。而且如果有一段时间没抽过烟，那我就只会想这件事。
- en: (For those wondering, I still use nicotine because of its various benefits,
    and often take breaks from it for a week or two at a time).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: （对于那些好奇的人，我仍然因为它的各种好处而使用尼古丁，并且经常一周或两周休息一次）。
- en: Around that time, and I’m not sure how, I came across a social media post about
    the benefits of walking. It had something to do with “getting lean for the summer”
    and walking instead of doing endless cardio.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 大概就在那个时候，我不知道是怎么了，我看到了一条关于散步益处的社交媒体帖子。它与“为夏天变得苗条”和用散步代替无休止的有氧运动有关。
- en: The stars aligned, and I decided to quit nicotine cold turkey. Whenever I had
    a craving, I decided to go on a quick 10-minute walk and chew gym instead.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 星星都排成一线，我决定冷 turkey 戒掉尼古丁。每当我有渴望的时候，我就决定去散步10分钟，然后嚼健身房。
- en: The first few walks were boring, but they worked. Quitting nicotine was pretty
    easy, and I could always justify the little suffering with the fact that I was
    burning calories. Walking became a way for me to *feel* like I was shredding fat.
    That made me want to walk more.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 前几次散步很无聊，但它们有效。戒掉尼古丁相当容易，我总是可以用燃烧卡路里的方式来合理化这种小小的痛苦。散步成了我“感觉”自己在燃烧脂肪的方式。这让我更想散步。
- en: Over the course of a month, I walked the glorified 10,000 steps a day.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个月的时间里，我每天都走那所谓的10000步。
- en: The result was an absolute love for walking.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是，我完全爱上了散步。
- en: For 5 years, there has never been a day where I’ve walked under 10,000 steps
    in a day. When I lived in Austin, I averaged between 20,000 and 25,000 steps.
    Now I average around 15,000.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 5年来，我从未有一天走的步数少于10000步。当我住在奥斯汀时，我平均每天走20000到25000步。现在我平均每天走大约15000步。
- en: Some would even say that my name has become synonymous with “walking” considering
    how much I talk about it’s importance. I mean hell, even a podcast with Danny
    Miranda was called “[Dan Koe – The King Of Walking.](https://youtu.be/3Rwr8cK9aQ0?si=-b7UG8JUtVEgLEIu)“
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人甚至说，我的名字已经与“散步”同义，考虑到我谈论它的重要性。我的意思是，甚至有一个与丹尼·米兰达合作的播客被称作“[丹·科——散步之王](https://youtu.be/3Rwr8cK9aQ0?si=-b7UG8JUtVEgLEIu)“。
- en: Similar to how Charles Darwin and Steve Jobs treated walks as crucial aspects
    of their lives and work, I discovered the same.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于查尔斯·达尔文和史蒂夫·乔布斯将散步视为他们生活和工作的关键部分，我也发现了同样的道理。
- en: Some ask, “How do you get work done if you’re walking for multiple hours in
    a day?”
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人会问，“如果你一天要走几个小时，你怎么完成工作？”
- en: I say read chapter 7 of Anti-Fragile by NN Taleb or read my [4-Hour Workday](https://thedankoe.com/letters/zero-to-1-million-as-a-one-person-business-while-working-2-4-hours-per-day/)
    philosophy.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议你读读NN Taleb的《反脆弱》第七章，或者读读我的[4小时工作日](https://thedankoe.com/letters/zero-to-1-million-as-a-one-person-business-while-working-2-4-hours-per-day/)哲学。
- en: In a nutshell, I try not to *do* anything unless I need to because that’s nature’s
    built in mechanism for filtering signal from noise. Too many people grind all
    day long with nothing to show for it because they drown in tasks that don’t get
    them anywhere.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，我尽量不做任何我不需要做的事情，因为这是自然界内置的机制，用于从噪声中过滤信号。太多的人整天忙碌，却没有什么可以展示的，因为他们陷入了那些无法让他们取得任何进展的任务中。
- en: And, you probably wouldn’t be reading this letter if it weren’t for walking.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，如果不是因为步行，你可能不会阅读这封信。
- en: My ideas wouldn’t be the same. My content wouldn’t be the same. My body wouldn’t
    be the same. My identity wouldn’t be the same.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我的想法不会相同。我的内容不会相同。我的身体不会相同。我的身份不会相同。
- en: 'I want to share with you:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我想与你分享：
- en: 1) The raw power of walking so you have multiple “whys” to keep you going with
    this habit.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 1) 步行的原始力量，让你有多个“为什么”来维持这个习惯。
- en: 2) How to turn walking into a game so you can seamlessly form the habit yourself.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 2) 如何将步行变成游戏，以便你可以无缝地形成这个习惯。
- en: My hope with this letter is to transform your life with one simple habit.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我写这封信的愿望是希望通过一个简单的习惯来改变你的生活。
- en: Let’s begin.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧。
- en: Mind, Body, Spirit, Business – The Holistic Habit
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 心灵、身体、精神、商业——全面的生活习惯
- en: <picture decoding="async" class="wp-image-2027">![](../Images/0d166f0e4a12c8a9495fd1bc689d3e70.png)</picture>
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/0d166f0e4a12c8a9495fd1bc689d3e70.png)'
- en: 'I hope that I can get this point across:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望我能把这一点说明白：
- en: You only have so much time in a day.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 你每天的时间是有限的。
- en: Meaning, there are only so many habits you can adopt.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 意味着你可以采纳的习惯是有限的。
- en: Also meaning, the habits you choose to implement are of utmost importance because
    they create your future and influence your quality of life.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 也就是说，你选择实施的习惯至关重要，因为它们创造了你的未来，并影响了你的生活质量。
- en: Most people aren’t in control of the habits they choose, so their life is on
    a trajectory that they didn’t set, and it becomes increasingly hard to change
    who you are.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人无法控制他们选择的习惯，所以他们的生活轨迹是他们没有设定的，而且越来越难以改变自己。
- en: Habits aren’t only physical but mental.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 习惯不仅仅是身体上的，也是心理上的。
- en: You distract yourself by scrolling on your phone.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过在手机上滑动来分散自己的注意力。
- en: Your attention span shrinks because your mind is in the habit of receiving novel
    information every 30 seconds.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 你的注意力跨度缩小，因为你的大脑习惯于每30秒接收新的信息。
- en: So, you can’t focus on meaningful conversations. You can’t focus on building
    a business. You can’t focus on putting on your shoes and going to the gym.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你无法专注于有意义的对话。你无法专注于建立商业。你无法专注于穿上鞋子去健身房。
- en: Your mind reacts to almost everything with memes and random bits that others
    programmed into your mind. You can’t take anything seriously. You think anything
    worthwhile is a joke. Meanwhile, you feel depressed and hopeless, but there isn’t
    a solution because your mind is stuck bouncing around on the surface to see one.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 你的大脑几乎对几乎所有事情都做出反应，用其他人编程进你大脑的梗和随机片段。你无法认真对待任何事情。你认为任何有价值的东西都是个笑话。同时，你感到沮丧和绝望，但因为没有解决方案，因为你的大脑被困在表面跳来跳去，试图看到一点。
- en: 'The solution to most of your problems is this:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 解决你大多数问题的方法就是：
- en: You must reclaim your focus so you can implement new habits.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须重新获得你的专注力，以便你可以实施新的习惯。
- en: You must implement new habits because you can only choose a few.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须实施新的习惯，因为你只能选择少数几个。
- en: The habits you choose must be high leverage, high impact, and highly enjoyable.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 你选择的习惯必须是高杠杆、高影响和高乐趣的。
- en: The habits you choose refocus your attention on the depth of life.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 你选择的习惯将你的注意力重新集中在生活的深度上。
- en: Where you focus your attention programs your mind, creates who you are, and
    determines your future.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 你把注意力集中在哪里，就会编程你的大脑，塑造你成为谁，并决定你的未来。
- en: 'Walking as a habit covers all bases: mind, body, spirit, and business.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 步行作为一种习惯涵盖了所有方面：心灵、身体、精神和商业。
- en: Let me show you how.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 让我来展示给你看。
- en: Walking As Meditation
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步行冥想
- en: I used to be skeptical of meditation.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我过去对冥想持怀疑态度。
- en: I thought it was something reserved for hippies and new agers who thought they
    were channeling some form of energy to become more powerful like they were in
    Avatar the Last Airbender.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我曾认为这是嬉皮士和新新人类保留的，他们认为自己在引导某种形式的能量，变得像《阿凡达》中的最后一任土著人一样强大。
- en: Turns out, as with most things I dislike, I just didn’t understand what meditation
    was.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 结果表明，就像我大多数不喜欢的事情一样，我只是没有理解冥想是什么。
- en: Meditation is the act of freeing your mind.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 冥想是解放你思想的行为。
- en: Meditation is decreasing your attachment to thoughts.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 冥想是减少你对思想的依恋。
- en: Meditation is the practice of being at one with reality, not expectations for
    the future or happenings of the past.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 冥想是实践与现实的统一，而不是对未来的期望或过去的经历。
- en: In other words, with a consistent meditation practice, life gets better because
    you are living it.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，通过持续的冥想练习，生活变得更好，因为你正在经历它。
- en: Most people don’t realize how surface-level their lives are. They bounce around
    in their heads, creating problems that don’t exist and spiral out of control into
    a state of deep anxiety and overwhelm.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人没有意识到他们的生活有多么表面化。他们在头脑中跳来跳去，创造出不存在的问题，并失控地陷入深深的焦虑和混乱状态。
- en: Their lives are ruled by stressful past situations that influence how they perceive
    the future. The boss that yelled at you yesterday makes you dread going to work
    today. The writing that sucked yesterday makes you worried that it won’t get done
    tomorrow and you continue projecting into a future where you don’t get it done,
    your side business fails, and you start creating a plan B without realizing you
    are creating that reality with your thoughts because your actions will follow.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的生活被过去的有压力的情况所统治，这些情况影响了他们对未来的看法。昨天对你大喊大叫的老板让你今天害怕去上班。昨天糟糕的写作让你担心明天无法完成，你继续投射到一个未来，在那里你无法完成任务，你的副业失败，而你开始制定B计划，却没有意识到你正在用你的思想创造那个现实，因为你的行动将随之而来。
- en: You trap yourself in a narrow-minded state of suffering, and your only path
    out is by reprogramming your mind with meditation.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 你将自己困在狭隘的痛苦状态中，而你唯一的出路是通过冥想重新编程你的思想。
- en: The problem is that I always failed to form a seated meditation habit. I always
    forgot or found that my other work (like writing) suffered when I didn’t do that
    first thing in the morning.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是我总是无法形成坐姿冥想的习惯。我总是忘记或者发现当我早上不做那件事时，我的其他工作（如写作）会受到影响。
- en: We will talk about how to walk for meditation later.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我们稍后会讨论如何步行冥想。
- en: Walking For Health
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步行与健康
- en: This one isn’t difficult to understand.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这个并不难理解。
- en: '**Walking = increased calorie expenditure.**'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**步行 = 增加卡路里消耗。**'
- en: I don’t know how true this is, but I’ve read that whether you walk or run the
    same distance, you burn the same amount of calories. So, if one person walks a
    mile, and the other person runs a mile, they burn the same amount. I’m sure there
    are marginal difference between the two. The main difference is speed at which
    you can go that distance.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我不知道这是否真实，但我读到过，无论你是走路还是跑步相同的距离，你燃烧相同数量的卡路里。所以，如果一个人走了一英里，另一个人跑了一英里，他们燃烧相同数量的卡路里。我敢肯定两者之间有微小的差异。主要差异是你完成这个距离的速度。
- en: I love walking because on a run I can’t truly listen, read, capture ideas, or
    write.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢散步，因为在跑步时我无法真正倾听、阅读、捕捉想法或写作。
- en: So, if you struggle to lose weight, walking is a sustainable habit to form.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果你在减肥方面有困难，散步是一个可以形成的可持续习惯。
- en: '**Being outside = sunlight and lack of blue light.**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**户外 = 阳光和缺乏蓝光。**'
- en: Blue light doesn’t just hurt your sleep, it destroys your health and contributes
    to chronic disease.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 蓝光不仅会损害你的睡眠，还会破坏你的健康，并导致慢性疾病。
- en: Most people have heard of Andrew Huberman’s advice to get sunlight first thing
    in the morning, but even he admits that this is just the tip of the iceberg.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人都听说过安德鲁·休伯曼早上第一件事就是晒太阳的建议，但即使是他也承认这只是冰山一角。
- en: 'I won’t go too deep into this here, because there’s books of information I’d
    have to include, but I’ll give you people to dive into:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里不会深入探讨这个问题，因为需要包括的信息量相当于一本书，但我将提供一些资料供你深入研究：
- en: '[Analyze & Optimize](https://x.com/Outdoctrination)'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '[分析 & 优化](https://x.com/Outdoctrination)'
- en: '[Jack Kruse](https://x.com/DrJackKruse)'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '[杰克·克鲁斯](https://x.com/DrJackKruse)'
- en: '[Grimhood](https://x.com/Grimhood)'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '[Grimhood](https://x.com/Grimhood)'
- en: Sunlight is more important to your health than you know, and you’re probably
    afraid of it because you think you’ll get skin cancer (when sunlight actually
    helps reverse skin cancer – [starting information](https://x.com/zaidkdahhaj/status/1798381439479943612)
    and [another one](https://x.com/zaidkdahhaj/status/1796966480640381210) out of
    various, dive deeper as your curiosity allows).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 日光对你的健康比你知道的更重要，你可能害怕它，因为你认为你会得皮肤癌（而实际上日光有助于逆转皮肤癌 – [起始信息](https://x.com/zaidkdahhaj/status/1798381439479943612)
    和 [另一个](https://x.com/zaidkdahhaj/status/1796966480640381210) 出于各种原因，根据你的好奇心深入挖掘）。
- en: Most people are so heavily indoctrinated with centralized dogma to protect yourself
    from the sun when that is a major cause of much disease today.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人被中央教条深深地洗脑，要保护自己免受阳光的伤害，而阳光现在是许多疾病的主要原因。
- en: For reference of what’s possible, I’m the palest guy you’ll ever meet. I was
    always afraid of the sun and would have to reapply sunscreen 4-5 times a day when
    I worked as a lifeguard for my summer job in high school.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 作为参考，我可能是你见过的最白的人。我总是害怕太阳，在我高中暑假做救生员的时候，我每天不得不涂抹4-5次防晒霜。
- en: With the right diet and protocol, I do not burn in the sun.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 通过正确的饮食和协议，我在阳光下不会晒伤。
- en: I walk about 15,000-20,000 steps a day, much of that in the Arizona UV9-UV10
    heat and do not burn.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 我每天大约走15,000-20,000步，其中大部分是在亚利桑那州的UV9-UV10高温下，但我不会晒伤。
- en: For those curious to dive further into this, start searching information like
    “how to build your solar callus” and research concepts you aren’t educated on
    from there.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些想要深入了解的人来说，开始搜索像“如何建立你的太阳能茧”这样的信息，并从那里研究你不了解的概念。
- en: With all of this, please understand that my mind is not theirs. I’m sharing
    information that I find helpful, not their ideology as one to adopt. I don’t agree
    with many things they say, but that doesn’t mean I can’t gain from some of it.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 请理解，我的思想不是他们的。我在分享我认为有用的信息，而不是他们的意识形态作为要采纳的一种。我不赞同他们说的许多事情，但这并不意味着我不能从中获益。
- en: Walking For Creativity
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步行激发创造力
- en: If I could attribute my writing and creator success to one thing, it would be
    walking.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我能将我的写作和创作者的成功归因于一件事，那将是散步。
- en: 'To me, walking is my creativity block. It’s where I:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，散步是我的创造力障碍。这是我在哪里：
- en: Listen to audiobooks and long YouTube lectures ([actualized.org](http://actualized.org)
    is my favorite)
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 听有声书和长YouTube讲座（[actualized.org](http://actualized.org)是我最喜欢的）
- en: Read physical books (yes, I bring a book on my walk with me in the morning and
    read it while walking).
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 阅读实体书籍（是的，我早上带着一本书散步，边走边读）。
- en: Write down ideas that I want to write about (using my [genius ideas process
    in this free course](https://7daystogeniusideas.com))
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记下我想写的想法（使用我在这个免费课程中的[天才想法过程](https://7daystogeniusideas.com)）。
- en: Walk in silence to allow my mind to solve a problem, relieve stress, or bring
    clarity to my goals or vision.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持沉默，让我的大脑解决问题，缓解压力，或为我的目标或愿景带来清晰。
- en: Don’t take the concept of “creativity blocks” lightly.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 不要轻视“创造力障碍”的概念。
- en: You have productivity blocks for your focused work, but in order for those to
    have any kind of unique or original contribution, they need to be balanced out
    with creativity blocks.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 你有专注工作的生产力障碍，但为了使那些有独特的或原创的贡献，它们需要与创造力障碍相平衡。
- en: In other words, your work doesn’t stand much of a chance at greatness if you
    do not dedicate time to cultivating and developing ideas by contemplating and
    solving problems.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，如果你不花时间通过思考和解决问题来培养和发展想法，你的工作很难达到卓越。
- en: Because face it…
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 因为面对现实……
- en: You probably struggle to form a reading or meditation habit because you are
    stuck inside where distractions run wild. And if your intention is to read or
    ideate, but you opt for focused work instead, even that’s a distraction, and you
    lack discipline.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能很难形成阅读或冥想习惯，因为你被困在室内，而那里充满了干扰。如果你的意图是阅读或思考，但你选择了专注的工作，即使是那也是一种干扰，而且你缺乏自律。
- en: When you get outside and go on a walk, the only option you have is to do what
    you said you were going to do.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 当你外出散步时，你唯一的选择就是做你打算做的事情。
- en: Forming An Enjoyable Walking Habit By Turning It Into A Game
  id: totrans-94
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过将其变成游戏来形成愉快的步行习惯
- en: Why do we get so addicted to video games?
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我们会如此沉迷于电子游戏？
- en: There is a clear hierarchy of goals (how to win + quests)
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 有一个清晰的目标层次（如何获胜+任务）
- en: There is clear feedback for progress (leveling up + milestones)
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于进步（升级+里程碑）有明确的反馈
- en: There are rules that narrow your attention and remove distractions
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 有规则可以缩小你的注意力并消除干扰。
- en: There are tutorials to get you up to speed with the game
  id: totrans-99
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 有教程帮助你快速掌握游戏。
- en: There are challenges according to your skill level so you don’t get anxious
    or overwhelmed
  id: totrans-100
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据你的技能水平，会有相应的挑战，这样你就不会感到焦虑或不知所措。
- en: In a nutshell, video games are addictive because they push us into the flow
    state.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，视频游戏之所以上瘾，是因为它们推动我们进入流感状态。
- en: The flow state is characterized by absolute clarity. Zero distractions. Pure
    progress that is like no other feeling in the world… and you can tap into it with
    most habits, especially walking.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 流感状态的特点是绝对的清晰。零干扰。纯粹的进步，这种感觉在世界上无与伦比……而且你可以通过大多数习惯，尤其是步行，进入这种状态。
- en: You know what you need to do, how to do it, when to do it, and it isn’t easy
    or well known, so it is meaningful.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道你需要做什么，如何做，何时做，这并不容易或众所周知，所以它是有意义的。
- en: The extra dopamine from novelty doesn’t hurt either.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 新奇带来的额外多巴胺也不会有害。
- en: So, to form this new walking habit, I think it’s wise that we turn it into a
    game. That’s what I did without realizing it. 4 years later, I don’t have to worry
    about being overweight, unhealthy, or have difficulty coming up with creative
    ideas that allow me to build businesses faster than most people.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为了形成这个新的步行习惯，我认为将其变成一个游戏是明智的。这就是我不知不觉中做的事情。4年后，我不再担心体重过重、不健康，或者难以想出创意点子，让我能比大多数人更快地建立企业。
- en: Step 1) Clarify Why You Are Walking
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第1步）明确你为什么步行
- en: Vision and anti-vision.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 视觉和反视觉。
- en: I always talk about these because they f*cking matter.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 我总是谈论这些，因为它们真的很重要。
- en: If you aren’t aligning every single action you take with your ideal lifestyle,
    you are lost, mindless, and programmed. You aren’t making your own decisions and
    your mind is prone to conform to the will of others’ without even noticing it.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有将你所采取的每一个行动与你理想的生活方式对齐，你就迷失了，你无意识，你被编程了。你没有做出自己的决定，你的思想容易无意识地服从他人的意愿，甚至没有注意到。
- en: Think deeply about how walking is a holistic habit that can revolutionize your
    life.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 深入思考步行是如何成为一种全面的习惯，可以彻底改变你的生活。
- en: Do you want the benefits that comes from quitting a bad habit? Walking can be
    a replacement for that habit.
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想从戒掉坏习惯中获得的好处吗？步行可以替代那个习惯。
- en: Do you want to be more creative in your work? Do you always struggle to write
    or come up with the ideas that will change your future? Can you see how a simple
    walk can change the direction of your life?
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想在工作中更有创意吗？你总是挣扎着写作或想出能改变你未来的想法吗？你能看到简单的散步如何改变你的人生方向吗？
- en: Do you want to drop 10 pounds of fat, get a tan, and reap the benefits of consistent
    sunlight exposure? If your mental health is in shambles, isn’t it worth a shot?
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想减掉10磅脂肪，晒黑，并从持续的阳光照射中获益吗？如果你的心理健康状况糟糕，这不是值得一试吗？
- en: List out everything you don’t like in your life write now.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 列出你现在生活中不喜欢的一切。
- en: From that, list out everything you want in your life 1 year from now.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，列出你希望一年后生活中拥有的一切。
- en: Then, contemplate how walking 10,000+ steps every day can help with that.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，思考每天走10000多步如何有助于实现这一点。
- en: Step 2) Set A Daily Goal & Break It Up
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第2步）设定每日目标并将其分解
- en: All behavior starts with a conscious or unconscious goal.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 所有行为都始于一个有意识或无意识的目标。
- en: 'Every single action you take can be mapped to a goal you are pursuing. The
    question is: did you set that goal? Or were you quietly programmed by the media,
    your parents, your teachers, and your friends?'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 你所采取的每一个行动都可以映射到你正在追求的目标。问题是：你是否设定了那个目标？或者你是被媒体、你的父母、你的老师和朋友悄悄编程了吗？
- en: A simple habit is no different.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 一个简单的习惯并无不同。
- en: Set a daily goal and start small.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 设定一个每日目标，并从小处着手。
- en: I feel as though 10,000 steps is attainable for most people if they are realistic
    with how they can reorganize and prioritize their life. You *can* wake up earlier,
    go to bed earlier, and tell your spouse that this is important to you – the benefits
    of this “walking” thing can spill over into your entire life.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 我觉得，如果人们现实地重组和优先考虑他们的生活，10000步对大多数人来说是可以实现的。你可以早点起床，早点睡觉，告诉你的配偶这对你很重要——这种“步行”的好处可以渗透到你的整个生活中。
- en: If 10,000 steps in a day makes you anxious, aim lower like you would in a video
    game. If 10,000 steps is level 100, opt for 2,000 steps as a level 1 and increase
    from there.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你一天走10000步会让你焦虑，那就降低目标，就像你在视频游戏中做的那样。如果10000步是100级，那么选择2000步作为1级，然后逐步增加。
- en: Now, break that down into sub-goals for your individual walks.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，将其分解为个人步行的子目标。
- en: Are you going to knock it all out on one walk?
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你打算在一次散步中完成所有的事情吗？
- en: Are you going to space them out?
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你打算分散它们吗？
- en: What route are you going to take on the walk?
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你打算在散步中走哪条路线？
- en: Are you going to walk to a specific landmark or location?
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你打算走到一个特定的地标或地点吗？
- en: Are you going to walk to the local cafe for focused work?
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你打算走到当地的咖啡馆去专注工作吗？
- en: Bring clarity to your new habit by sticking to these goals until they become
    automatic after a month or so.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 通过坚持这些目标直到大约一个月后它们变得自动，来为新习惯带来清晰性。
- en: Step 3) Create Rules For The Walk
  id: totrans-131
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第3步）为散步制定规则
- en: Now, to narrow your attention further and increase the enjoyment of the walk,
    we need to create rules.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，为了进一步集中注意力和增加散步的乐趣，我们需要制定规则。
- en: If we don’t, your mind will opt for complaining.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们不这样做，你的大脑会倾向于抱怨。
- en: “I don’t like walking.”
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: “我不喜欢散步。”
- en: “It’s too hot/cold outside boohoo I need my comfortable air conditioned box.”
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: “外面太热/冷了，呜呜，我需要我的舒适的空调箱。”
- en: “I don’t live in a walkable city.”
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: “我不住在一个适合散步的城市。”
- en: All excuses. You can walk even if you don’t feel like walking. You go in a sauna
    and don’t care that it’s hot. Your expectations and limiting beliefs are ruining
    your potential.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 所有借口。即使你不想走路，你也能走。你走进桑拿房，不在乎它有多热。你的期望和限制性信念正在毁掉你的潜力。
- en: 'Here are some rules you can play with:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些你可以尝试的规则：
- en: Never step on a crack in the road as you walk.
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 散步时永远不要踩到路上的裂缝。
- en: Come back with 3 ideas to write about from a book or audiobook.
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 带着从一本书或有声书中得到的3个写作想法回来。
- en: Get 15 minutes of sun on each side of your body.
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让你的身体两侧都晒上15分钟太阳。
- en: Alternate 5-10 minutes of walking meditation and 5-10 minutes of learning.
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 交替进行5-10分钟的行走冥想和5-10分钟的学习。
- en: Finish one chapter of a book or module of a course.
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完成一本书的一章或一个课程的模块。
- en: Write one section of your newsletter, or write a few content pieces (like I
    teach in [2 Hour Writer](https://2hourwriter.com))
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写你通讯的一节，或者写几篇内容（就像我在[2小时作家](https://2hourwriter.com)中教授的那样）。
- en: Try one out.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试一下。
- en: Step 4) Go On The Walk (And Have A Trigger)
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第4步）进行散步（并有一个触发器）
- en: The walk is the easiest part.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 散步是最容易的部分。
- en: Getting yourself to go on the walk is the hardest part.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 让自己去散步是最困难的部分。
- en: If you have a trigger, like when I had nicotine cravings and wanted to quit,
    use that as a moment to immediately go outside and start your walk.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有一个触发器，比如我有了尼古丁渴望并想要戒烟，那么就用那个时刻立即出去开始你的散步。
- en: If you don’t have any motivator or trigger, you need to guide your mind toward
    the lowest friction action you can take right now.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有任何动机或触发器，你需要引导你的大脑走向你现在能采取的最低摩擦的行动。
- en: Can you walk into the closet and get your shoes?
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 你能走进衣柜拿你的鞋子吗？
- en: If that’s too difficult, ask yourself why you can’t even control your body to
    the point of walking a few feet.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这太难了，问问自己为什么你甚至无法控制自己的身体走几步。
- en: At the same time, break it down further.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，进一步分解。
- en: Can you walk to your room?
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 你能走到你的房间吗？
- en: No?
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 不？
- en: Can you at LEAST stand up?
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 你至少能站起来吗？
- en: No?
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 不？
- en: Okay, move your foot.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，移动你的脚。
- en: Still no?
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 仍然没有？
- en: I have no words.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 我无话可说。
- en: At this point, nobody can save you.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 到这个地步，没有人能救你。
- en: (If you literally can’t walk because you don’t have legs or they don’t work,
    ignore me, because I’m sure you would tell these people that they are ungrateful
    for their ability to even walk).
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: （如果你真的不能走路，因为你没有腿或者它们不起作用，忽略我，因为我确信你会告诉这些人他们应该感激自己能走路的能力）。
- en: That’s it.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样。
- en: Start walking.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 开始散步。
- en: Have a nice weekend.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 周末愉快。
- en: – Dan
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
