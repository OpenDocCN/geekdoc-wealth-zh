- en: You Need To Be Extreme If You Want Your Life To Change
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如果你想要改变生活，就必须极端
- en: 原文：[https://thedankoe.com/letters/you-need-to-be-extreme-if-you-want-your-life-to-change/](https://thedankoe.com/letters/you-need-to-be-extreme-if-you-want-your-life-to-change/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/you-need-to-be-extreme-if-you-want-your-life-to-change/](https://thedankoe.com/letters/you-need-to-be-extreme-if-you-want-your-life-to-change/)
- en: I remember my birthday weekend of 2021 vividly.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我清晰地记得2021年的生日周末。
- en: My business was starting to do very well. I was at the tail end of cutting down
    weight (after gaining 20-30 pounds during COVID). I was in the middle of the first
    draft of my first book.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我的生意开始变得非常好。我在减重（在COVID期间体重增加了20-30磅）的尾声。我正在我的第一本书的第一稿中间。
- en: Leading up to my birthday, it felt like every weekend there was an event that
    I “couldn’t miss.”
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的生日之前，感觉每个周末都有一个“我不能错过”的活动。
- en: Concerts. Hangouts with friends. That kind of stuff. Normal life.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 音乐会。和朋友聚会。这类事情。正常生活。
- en: And I was making great progress, taking a little break wouldn’t hurt.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经取得了很大的进步，稍微休息一下不会有什么坏处。
- en: So I went out. I drank. Stayed up late. Went off my diet. And as you’d guess,
    everything I had made progress on didn’t only stall, it went downhill fast (thanks
    entropy).
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 所以我出门了。我喝了酒。熬夜。打破了饮食。正如你所猜到的，我在各个方面取得的进步不仅停滞不前，而且迅速下滑（感谢熵）。
- en: It would take about 4-5 days for my mental and physical energy levels to recover.
    And by that time, there was another event to attend. I couldn’t think straight
    for my book or business, and the fitness habits became more difficult to maintain.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我的心理和体能水平恢复大约需要4-5天。到那时，又有另一个活动要参加。我无法清晰地思考我的书或生意，保持健身习惯变得更加困难。
- en: It was painful, but that pain wasn’t excruciating just yet.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这很痛苦，但那种痛苦还不是无法忍受的。
- en: For months prior, my friend group and I had plans to go to Seattle for my birthday.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在几个月前，我和我的朋友群计划在我生日时去西雅图。
- en: I was already tired of not making progress, but it was my birthday. Why wouldn’t
    I let loose and have a little fun? It seemed like I found a way to justify each
    poor decision I made once I was put in the environment to do so.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经厌倦了没有进步，但今天是我的生日。我为什么不放松一下，找点乐子呢？似乎我找到了一种为我在这种环境下做出的每一个糟糕决定找借口的方法。
- en: After a weekend of waking up late, making *zero* progress on anything, and being
    away from home, I was done.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 经过一个周末的晚起，在任何事情上都没有取得任何进展，并且远离家，我已经受够了。
- en: I was so fucking mad at myself.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我对自己非常愤怒。
- en: Because when you have goals that are the most important thing in your world,
    they shine a light on everything you’re doing wrong. The most painful thing in
    the world is watching those goals fade into the background as they’re replaced
    by goals of shallow pleasure.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 因为当你有目标是你世界中最重要的东西时，它们会照亮你正在做的每一件错事。世界上最痛苦的事情是看着这些目标逐渐消失在背景中，被肤浅的快乐目标所取代。
- en: The second I got back home, I disappeared.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 一回到家，我就消失了。
- en: I responded to no one. I became unavailable. Every invitation in any form was
    an automatic no. Every single action I took felt seamless. I *wanted* to be disciplined.
    It gave me joy. My mind returned. My body returned. My life returned.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我对任何人都没有回应。我变得不可用。任何形式的邀请都是自动拒绝。我采取的每一个行动都感觉无缝。我*想要*自律。这让我感到快乐。我的思绪回来了。我的身体回来了。我的生活回来了。
- en: My entire world changed in an instant.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我的整个世界在一瞬间改变了。
- en: But why?
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 但为什么呢？
- en: 1) Being extreme changes your brain
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 极端改变你的大脑
- en: “Neurons that fire together, wire together.”
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: “一起放电的神经元，会建立联系。”
- en: That’s Hebb’s Law, a famous saying that summarizes a neuropsychological theory
    related to neuroplasticity.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这是赫布定律，一句著名的格言，总结了与神经可塑性相关的神经心理学理论。
- en: Neuroplasticity, as you may know, is your brain’s ability to rewire itself by
    forming new neural connections throughout life. Your brain isn’t fixed and rigid.
    It’s a dynamic network that can adapt, learn, and change based on your experiences,
    thoughts, and actions.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所知，神经可塑性是指你的大脑通过在一生中形成新的神经连接来重新布线自己的能力。你的大脑不是固定和僵化的。它是一个动态的网络，可以根据你的经验、思想和行动进行适应、学习和改变。
- en: Being extreme about changing your life helps quicken this process.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 对改变生活极端可以帮助加快这个过程。
- en: People scream about how “consistency is key,” which is true due to repetition
    reinforcing neural pathways through consistent effort, but we can take it a step
    further.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 人们大声疾呼“一致性是关键”，这是真的，因为重复通过持续的努力强化了神经通路，但我们还可以更进一步。
- en: Novelty and challenge stimulate neuroplasticity even more.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 新奇和挑战更能刺激神经可塑性。
- en: So, when you flip the switch and pursue a goal with all your might, you put
    your brain in an environment that quickly adapts and helps that become your *new
    standard.*
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当你全力以赴追求目标时，你让你的大脑处于一个快速适应并帮助你将其成为*新标准*的环境。
- en: 2) Intensity and obsession create a neurochemical cocktail
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 强度和痴迷创造了一种神经化学鸡尾酒
- en: Most people fall into a rut because they seek *extrinsic motivators.*
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人陷入困境，因为他们寻求*外在动机*。
- en: But when you’re obsessed in the context of this discussion, you are fueled by
    *intrinsic motivators.*
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 但在这次讨论的背景下，你被*内在动机*所驱动。
- en: 'Each of which stack onto and strengthen each other in a way that sustains some
    degree of flow (optimal experience, or one of the most enjoyable states of mind):'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 每一种都相互叠加并加强，以维持某种程度的流动（最佳体验，或最令人愉悦的心态之一）：
- en: '**Curiosity** – The desire to explore the unknown, learn how to change, and
    fill knowledge gaps. Results in good dopamine from novelty and norepinephrine,
    which heightens attention, preparing you to learn.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**好奇心** – 探索未知、学习如何改变和填补知识空白的需求。这会产生来自新奇和去甲肾上腺素的好多巴胺，这提高了注意力，为你学习做准备。'
- en: '**Passion** – An intense enthusiasm is built for the path that allows you to
    change your life. Results in more good dopamine and norepinephrine.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**激情** – 对改变你生活的道路产生强烈的热情。这会产生更多的好多巴胺和去甲肾上腺素。'
- en: '**Purpose** – The feeling that your actions contribute to something larger
    than yourself. Achieving goals results in more dopamine which reinforces behavior.
    Serotonin stems from significance and belonging. Oxytocin stems from connection.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标** – 感觉到你的行动对比你自身更大的事物有所贡献。实现目标会导致更多多巴胺的产生，从而强化行为。血清素源于重要性和归属感。催产素源于联系。'
- en: '**Autonomy** – The desire to direct your own life and work. To control your
    choices, actions, and environment. Results in yet again more dopamine and a reduction
    in cortisol (the stress from feeling put in a box), allowing for creative decision
    making.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自主性** – 指导自己的生活和工作，控制你的选择、行动和环境。这又会导致多巴胺的增加和皮质醇（感觉被困在框中的压力）的减少，从而允许进行创造性的决策。'
- en: '**Mastery** – The process of learning and growing is its own reward. Results
    in sustainable good dopamine that keeps you in the game.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**精通** – 学习和成长的过程本身就是一种奖励。这会导致可持续的好多巴胺，让你保持参与。'
- en: You will understand how all of these come into play when we talk about *how*
    to spend the next 6 months when you have the undeniable desire to change.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们谈到如何度过接下来的6个月，而你又有不可否认的改变欲望时，你将理解所有这些是如何发挥作用的。
- en: 3) Your mind filters reality based on what you are obsessed with
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 你的大脑根据你所痴迷的事物过滤现实
- en: The man who conceives himself to be a “failure-type person” will find some way
    to fail, in spite of all his good intentions, or his willpower, even if opportunity
    is literally dumped in his lap. The person who conceives himself to be a victim
    of injustice, one “who was meant to suffer,” will invariably find circumstances
    to verify his opinions.
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 那个自认为是“失败型人物”的人，尽管他有好意，或者有意志力，甚至如果机会直接摆在他面前，也会找到某种方式失败。那个自认为是“不公正的受害者”，一个“注定要受苦”的人，必然会找到证实他观点的情况。
- en: ''
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Maxwell Maltz
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 马克斯韦尔·马尔茨
- en: Our mind is wired for survival.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的大脑是为生存而设计的。
- en: But the interesting thing about being human is that we don’t only try to protect
    and reproduce the information in our DNA like animals, we attempt to protect and
    reproduce the information in our consciousness.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 但人类有趣的地方在于，我们不仅试图像动物一样保护和复制我们DNA中的信息，我们还试图保护和复制我们意识中的信息。
- en: That is, we feel threatened when our body, or our *identity*, is threatened.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 也就是说，当我们的身体或我们的*身份*受到威胁时，我们会感到受到威胁。
- en: On the negative end, we notice information that reinforces our beliefs and worldview,
    often leading to us lashing out at those who question our religious or political
    beliefs. Our identity feels threatened, and the brain’s stress response sends
    that signal, so we feel the need to “survive.”
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在负面方面，我们会注意到那些加强我们信念和世界观的信息，这往往导致我们猛烈抨击质疑我们宗教或政治信仰的人。我们的身份感到受到威胁，大脑的压力反应发出信号，所以我们感到需要“生存”。
- en: On the positive end, when you are identified with the goal you are obsessed
    with, you notice opportunities in your environment to reinforce that higher version
    you are becoming. Since your identity is higher, it attempts to survive at that
    level, leading to you collecting knowledge and taking action to do so.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在积极的一面，当你与你所痴迷的目标认同时，你会注意到环境中的机会来加强你正在成为的更高版本。由于你的身份更高，它试图在这个层面上生存，这导致你收集知识并采取行动来实现这一点。
- en: Since our ancestors lived in a scarce environment, when they noticed something
    that helped them sustain their survival, like berries on a bush or wood for fire,
    dopamine would spurt into their brain and heighten their attention.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们的祖先生活在资源匮乏的环境中，当他们注意到有助于他们生存的东西，比如灌木上的浆果或用于生火的木材时，多巴胺就会涌入他们的大脑，提高他们的注意力。
- en: If we look to cybernetics and apply that to the psyche (the mind / soul), we
    can see that our mind has some form of homing mechanism toward our goals. Our
    mind accepts information that helps it and rejects information that doesn’t. You
    are steered toward your goals without much effort.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将控制论应用于心灵（心灵/灵魂），我们可以看到我们的心灵有一种向我们的目标归巢的机制。我们的心灵接受有助于它的信息，拒绝不利于它的信息。你几乎不费吹灰之力就会被引导向你的目标。
- en: In summary, *if you are obsessed with a goal, the universe will conspire in
    your favor by giving you the resources to achieve it.*
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，*如果你痴迷于一个目标，宇宙会通过给你提供实现它的资源来支持你*。
- en: Evolution Creates Order From Disorder
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进化从混乱中创造秩序
- en: The Second Law of Thermodynamics states that all natural processes move towards
    a state of greater disorder with time.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 热力学第二定律表明，所有自然过程都会随着时间的推移向更加无序的状态发展。
- en: In other words, entropy increases with time, and entropy is the measure of messiness,
    disorder, or randomness in a system.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，熵随时间增加，熵是衡量系统混乱、无序或随机性的度量。
- en: This has led to the concepts of “the arrow of time,” irreversibility, and determinism.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这导致了“时间之箭”、“不可逆性”和“决定论”的概念。
- en: That time is irreversible and heading toward increasing entropy.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 时间是不可逆的，正朝着增加熵的方向发展。
- en: However, that’s not the full picture. The universe isn’t heading toward a dead
    end where the world ends in fire. Quite the opposite actually.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这并不是全部。宇宙并不是朝着死胡同的方向发展，世界在火中终结。实际上恰恰相反。
- en: In his book, *The End of Uncertainty,* Ilya Prigogine makes the argument that
    this “arrow of time” is not just an illusion, but a fundamental feature of reality
    itself. When a system is pushed far enough away from equilibrium, it can become
    unstable.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在他的著作《不确定性的终结》中，伊利亚·普里高津提出了这样的观点：“时间之箭”不仅仅是一种幻觉，而且是现实本身的根本特征。当一个系统被推离平衡状态足够远时，它可能会变得不稳定。
- en: 'Here’s the key point: This instability can lead to a *spontaneous emergence
    of new, complex, ordered patterns called “dissipative structures.”*'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 关键点在于：这种不稳定性可能导致“耗散结构”这种新的、复杂的、有序模式的自发出现。
- en: Think of a large amount of water flowing out of a faucet. As it goes down the
    drain, it reaches a point of becoming a beautiful whirlpool. That is order *from*
    chaos.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 想象大量的水从水龙头流出。当它流进下水道时，它会达到形成美丽漩涡的点。这是从混乱到秩序。
- en: For the nerds out there, let’s take this a bit deeper.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些热衷于探索的人来说，让我们深入探讨一下。
- en: I enjoy mapping big picture patterns with practical applications because they
    tend to be as close to truth as you can *theoretically* find without getting locked
    into some method or paradigm.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢用具有实际应用的宏观模式进行绘制，因为它们在理论上可以接近真相，而不至于陷入某种方法或范式。
- en: When we think about the universe in a general way, we can see that it is composed
    of *whole-parts.*
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们以一般的方式思考宇宙时，我们可以看到它是由整体和部分组成的。
- en: Not just parts. Not just wholes. Whole-parts. Every *thing* is both a whole
    in itself and a part of another whole. All the way up and all the way down.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 不仅是有部分，不仅是整体，而是整体-部分。每一件事物本身都是一个整体，也是另一个整体的一部分。从上到下，从下到上。
- en: An atom is a whole and a part of a molecule.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 原子是一个整体，也是分子的一部分。
- en: A molecule is a whole and a part of a cell.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 分子是一个整体，也是细胞的一部分。
- en: A cell a part of an organism.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 细胞是生物体的一部分。
- en: An organism a part of an environment.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 生物体是环境的一部分。
- en: Letter → word → sentence → paragraph
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 字母 → 词 → 句子 → 段落
- en: Matter → life → mind → soul → spirit
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 物质 → 生命 → 心灵 → 灵魂 → 精神
- en: Foraging → horticultural → agrarian → industrial → informational societies
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 捡拾 → 园艺 → 农业社会 → 工业社会 → 信息社会
- en: Infinite nested hierarchies with infinite interconnected linking.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 无限嵌套的层次结构，无限互联的链接。
- en: Pick literally anything you can see, hear, touch, taste, smell, or think and
    you will realize this.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 任意选择你能看到、听到、触摸、品尝、闻到或思考的事物，你就会意识到这一点。
- en: Now, these whole-parts have various tenets which describe their characteristics
    and behavior, like their fundamental capacities for agency (self-preservation),
    communion (self-adaptation), self-transcendence, and self-dissolution. If you
    want to learn more about the tenets I would recommend reading *A Brief History
    of Everything* by Ken Wilber. It’s one of my favorite books along with *Integral
    Psychology* which is blowing my mind right now.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这些整体-部分有各种原则，描述了它们的特征和行为，比如它们的基本能力（自我保存）、交流（自我适应）、自我超越和自我消解。如果你想了解更多关于这些原则，我推荐阅读肯·威尔伯的《万物简史》。这是我最喜欢的书之一，还有《整体心理学》，它现在正在震撼我的思想。
- en: 'There’s one characteristic of these whole-parts I want to focus on which ties
    into Prigogine’s argument:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我想要关注这些整体-部分的一个特征，它与普里戈金的论点相联系：
- en: '*Evolution creates order from chaos.*'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '*进化从混乱中创造秩序*。'
- en: As matter progressed, life emerged. As life progressed, mind emerged.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 随着物质的进步，生命出现。随着生命的进步，心灵出现。
- en: As anything becomes more developed or complex, a new whole emerges with the
    structure that contains the complex parts.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 随着任何事物的发展或复杂化，一个新的整体随之出现，其中包含着复杂的部分。
- en: Bare with me as I attempt to tie this all together.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 请耐心等待，因为我试图将这些全部联系起来。
- en: When you take the concept of entropy and apply in to the psyche, you get psychic
    entropy.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 当你将熵的概念应用于心理时，你得到的是心理熵。
- en: In other words, the mind tends toward disorder, randomness, chaos, etc.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，心灵倾向于无序、随机、混乱等。
- en: In your personal life, when you reach the point of feeling lost, or like your
    life is falling into chaos, *you are presented with an opportunity for a higher
    version of yourself to emerge.*
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的个人生活中，当你感到迷茫，或者觉得你的生活正在陷入混乱时，*你将有机会出现一个更高版本的自己*。
- en: As illustrated in my story of getting fed up with my lack of progress on my
    birthday, you need to reach the crossroads of *dissonance and insight.*
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我在生日时对我在进步上缺乏进展感到厌倦的故事中所展示的那样，你需要达到*失调与洞察力*的十字路口。
- en: Once you get enough of a taste of where you are, you will begin to feel like
    you’re being ripped in half.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你充分尝到了你所在的位置，你将开始感觉像被撕成两半。
- en: One lower part of you wants to stay the same.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 你的一部分想要保持不变。
- en: One higher part of you wants to change.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 你的一部分想要改变。
- en: As you lean toward the higher, you are met by insight.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 当你趋向更高层次时，你会遇到洞察力。
- en: The tipping point that pushes you into the extreme.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 推你进入极端的临界点。
- en: Disappear For 3-6 Months & Focus On 4 Habits
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 消失3-6个月，专注于4个习惯
- en: New knowledge comes when you simply bear in mind what you need to know. Keep
    holding the problem in mind, and it will yield. The history of human beings is
    certainly a testament to that fact. An individual runs into a problem, and simply
    obsesses about that problem until he or she solves it… It might take a week, a
    month, a year, a decade, a century, or a millennium, but the Kosmos appears to
    be such that solutions are always forthcoming.
  id: totrans-87
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当你仅仅记住你需要知道的事情时，新的知识就会出现。继续将问题保持在心中，它就会解决。人类的历史无疑是这一事实的证明。一个人遇到一个问题，就会简单地痴迷于这个问题，直到他或她解决它……这可能需要一周、一个月、一年、十年、一百年或一千年，但宇宙似乎总是这样，解决方案总是会出现。
- en: ''
  id: totrans-88
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Ken Wilber
  id: totrans-89
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 肯·威尔伯
- en: Monk mode.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 僧侣模式。
- en: I’m sure you’re familiar with it.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我相信你很熟悉它。
- en: It’s a concept often talked about in the self-improvement space for more than
    a decade now, but recently it’s become a bastardized version of its former self
    due to its normalization. Everyone has talked about it, and since everyone knows
    about it, it’s often reduced to the shallow definition of “cut everyone off and
    make more money.”
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这个概念在自我提升领域已经讨论了十多年，但最近由于它的普及化，它已经变成了其前身的一个糟糕版本。每个人都谈论过它，既然每个人都了解它，它通常被简化为“切断所有人并赚更多钱”的肤浅定义。
- en: We’re not going to do that.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不会这样做。
- en: In fact, we’re not even going to follow what the original meaning of monk mode
    is.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，我们甚至不会遵循僧侣模式的原始含义。
- en: When the horse-drawn plow was invented, free men didn’t have to spend as much
    time hunting for food as there was an abundance of it. This allowed them (for
    the first time in history) to pursue specialized interests such as writing, mathematics,
    empire building, and for our discussion, *contemplation –* to ponder their own
    existence.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 当马拉犁被发明时，自由的人不需要花太多时间寻找食物，因为食物很丰富。这使得他们（历史上第一次）能够追求专业兴趣，如写作、数学、帝国建设和我们的讨论，*冥想*——思考他们自己的存在。
- en: People soon began to realize that the divine wasn’t “out there” or “up there”
    with the mythic gods, it was “in here.” Soon after came the Axial period where
    revolutionary spiritual and philosophical ideas emerged across multiple civilizations.
    Socrates in Ancient Greece, Gautama Buddha in India, Lao Tzu in China.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 人们很快意识到，神圣的不是“在那里”或“在那里”与神话中的神，而是在“这里”。不久之后，出现了轴心时代，在多个文明中涌现出革命性的精神和哲学思想。古希腊的苏格拉底，印度的乔达摩·悉达多（佛陀），中国的老子。
- en: This breakthrough in spirituality specifically was “purely Ascending.”
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 精神上的这一突破是“纯粹的提升”。
- en: Ascending spirituality, or asceticism, is a view that pins the manifest world
    as evil. Since the kingdom of Heaven is “in here” and not “out there,” money,
    sex, food, and pleasure were demonized.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 提升精神，或禁欲主义，是一种认为显现世界是邪恶的观点。因为天堂“在这里”而不是“在那里”，所以金钱、性、食物和快乐都被妖魔化了。
- en: '*True* monk mode is just this. A period dedicated to the ascending path and
    self-realization.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '*真正的*僧侣模式就是这样。一段致力于提升之路和自我实现的时间。'
- en: The thing is, most non-dogmatic individuals realize that spirituality is only
    one piece of the puzzle. It’s very important, but reducing the solution to all
    of your problems to contemplation is just as bad as reducing the same to atoms,
    money, or *just parts*.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，大多数非教条主义者意识到，精神只是谜题的一部分。它非常重要，但将解决所有问题的方案简化为冥想，与将其简化为原子、金钱或*仅仅部分*一样糟糕。
- en: Instead, we’re going to disappear for a period of intensity toward a better
    life.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我们将消失一段时间，专注于追求更好的生活。
- en: A period where you obsess over a problem until it’s solved. And in this case,
    our problem is that we want to change the entirety of our life.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 一个你沉迷于问题直到它得到解决的时间段。在这种情况下，我们的问题是想要改变我们生活的全部。
- en: We need a holistic monk mode, if you will.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要一种全面的僧侣模式，如果可以这样说的話。
- en: 'This comes in two parts: defense and offense.'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 这分为两个部分：防御和进攻。
- en: Defense – Removing Distractions
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 防御 – 消除干扰
- en: Focus does not only apply to work.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 专注不仅适用于工作。
- en: Distractions are not only notifications that pull you away from work.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 干扰不仅仅是让你远离工作的通知。
- en: The entire point of “disappearing” is to create a glitch in the matrix. To change
    your identity overnight. To rid yourself of the crabs and parasites that pull
    you down and drain you of the energy that must be dedicated to the choices that
    create a better future.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: “消失”的全部意义在于在矩阵中制造一个故障。一夜之间改变你的身份。摆脱那些拉你下水并消耗你能量（这些能量必须用于创造更好未来的选择）的螃蟹和寄生虫。
- en: For the sake of being extreme, it’s easier to change everything at once than
    it is to change one thing at a time.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 为了极端，一次改变一切比一次改变一件事要容易。
- en: Rip the band-aid off.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 剥掉创可贴。
- en: Stop responding to people who only take and never give.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 停止回应那些只索取而不给予的人。
- en: Any invitation that pulls you away from your goals should be an automatic and
    firm “no.”
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 任何将你从目标拉开的邀请都应该是一个自动而坚定的“不”。
- en: Every bad habit that does not serve you stops tomorrow, no exceptions.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 每个对你无益的坏习惯明天都将停止，没有例外。
- en: It is an incredible feeling to choose your own limitations.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 选择自己的局限性的感觉是难以置信的。
- en: To be free of that which splits your focus from the highest good you can do.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 为了摆脱那些分散你注意力、让你无法做最高善事的障碍。
- en: Menial distractions – like thoughts, worries, hunger, or work related visual
    clutter – will be solved in the next steps and as you commit to the path. A sign
    of pure commitment is that distractions don’t even have a chance to register in
    your attention.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 贫乏的干扰——如思想、担忧、饥饿或与工作相关的视觉杂乱——将在下一步解决，并且当你致力于这条道路时。纯粹承诺的标志是干扰甚至没有机会在你的注意力中登记。
- en: Offense – 4 Focus Habits
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 进攻 – 4个专注习惯
- en: A good life stems from the pursuit of the good, the true, and the beautiful.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 好的生活源于对善、真和美的追求。
- en: The pursuit of truth.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 追求真理。
- en: '**The good** is intersubjective truth, what is good for humanity or community
    – doing what’s right.'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '**善**是主观真理，对人类或社区有益——做正确的事。'
- en: '**The true** is objective truth, found in scientific study (science derives
    data, data is experience, experience is physical, mental, *and* spiritual) – learning
    and understanding how things really are. A process.'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '**真实**是客观真理，存在于科学研究中（科学推导数据，数据是经验，经验是物理的、心理的，*以及*精神的）——学习和理解事物的真实状态。这是一个过程。'
- en: '**The beautiful** is subjective truth, the realm of aesthetics – noticing and
    *creating* beauty around you.'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '**美丽**是主观真理，是美学的领域——注意到并*创造*你周围的美。'
- en: When we apply this pursuit to our own personal life rather than social change
    or some other systemic problem, our attention is turned toward our daily habits.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们将这种追求应用于我们自己的个人生活，而不是社会变革或其他系统性问题时，我们的注意力转向了我们的日常习惯。
- en: There are many variations of habits you can adopt that check these boxes, but
    I want to provide a clear and simple suggestion.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以采用许多不同的习惯来检查这些框，但我想要提供一个清晰简单的建议。
- en: Here’s what you’re going to disappear and do *every day* for the next 6 months.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你接下来6个月每天都要消失去做的事情。
- en: One project.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 一个项目。
- en: One book.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 一本书。
- en: One meditation.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 一次冥想。
- en: One workout.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 一次锻炼。
- en: '**1) One project**'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 一个项目**'
- en: Work is a necessary part of life that brings contrast to rest and leisure.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 工作是生活的一个必要部分，它为休息和休闲带来了对比。
- en: But most people work at jobs they hate, thus they throw the baby out with the
    bath water hoping that they will never have to work again. This is a delusion.
    You will not be happy in a state of perpetual vacation and rest. On top of that,
    the average person’s view of rest is self-destruction in the form of pleasure
    to numb the pain of a life working toward the goals others assigned to you.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 但大多数人都在做着他们讨厌的工作，因此他们把婴儿连同洗澡水一起倒掉，希望永远不再工作。这是一种错觉。你不会在永久的假期和休息状态下感到快乐。而且，普通人对于休息的看法是以快乐的形式自我毁灭，以减轻为他人设定的目标而工作的生活的痛苦。
- en: '*Choose one project that acts as a building block for the life you want to
    live.*'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '*选择一个作为你想要生活的生命基石的项目。*'
- en: This can be anything.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以是任何东西。
- en: A creative project that leads to independent work.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 一个能够导致独立工作的创意项目。
- en: A portfolio project that leads to a change in career.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 一个能够导致职业转变的文件夹项目。
- en: Most of the time, and considering the state of AI, I recommend at least *trying*
    entrepreneurship in some form, as you cannot be replaced if you are the adaptive
    [high-agency](https://thedankoe.substack.com/p/main-character-energy-mce) individual
    who dodges the replacing.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数时候，考虑到AI的状态，我建议至少尝试以某种形式进行创业，因为你不能被替代，如果你是那个能够规避替代的适应性[高代理](https://thedankoe.substack.com/p/main-character-energy-mce)个体。
- en: Because you are attempting to bring the good, the true, and the beautiful into
    your work. You can’t control that when someone assigns you the work.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 因为你在尝试将美好、真实和美丽融入你的工作中。当你被分配工作时，你无法控制这一点。
- en: Your work, and the project that moves you toward that work, is a representation
    of *the good.* Entrepreneurship is the art of solving problems in other people’s
    lives. It is how you contribute to a small community of people by fulfilling a
    role that improves their lives. If you can bake in *the true* by building solutions
    based on direct experience and *the beautiful* by expressing the depths of your
    personality, you’re on the right path.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 你的工作和推动你走向这项工作的项目，是*美好*的体现。创业是解决他人生活中问题的艺术。这是你通过履行改善他们生活的角色，为一个小社区的人们做出贡献的方式。如果你能通过基于直接经验构建解决方案来融入*真实*，通过表达你个性的深度来融入*美丽*，你就走上了正确的道路。
- en: '**One hour of deep work a day** on a project that can change your professional
    life.'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: '**每天在一个可以改变你职业生涯的项目上投入一小时深度工作**。'
- en: Put it on your calendar.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 把它放在你的日历上。
- en: Work that doesn’t feel like work is the intersection of what the world needs
    (the good), what you have experience with (the true), and what you deeply care
    about (the beautiful).
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 那些不觉得像工作的工作，是这个世界需要的东西（美好）、你经验中的东西（真实）以及你深深关心的东西（美丽）的交汇点。
- en: Work, when done right, is synonymous with life.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 当正确完成时，工作与生活同义。
- en: It is the central pillar of everything else you do.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你所有其他行动的核心支柱。
- en: '**2) One book**'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 一本书**'
- en: You’re bound to finish one book long before the 6 months.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 你肯定会在6个月前完成一本书。
- en: You can read more, but saying “2 books” would take away from the fun of making
    everything start with “one.”
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以读更多，但说“两本书”会剥夺了让一切从“一个”开始带来的乐趣。
- en: If you want to change your life, you need the knowledge to do so.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要改变你的生活，你需要改变生活的知识。
- en: You need education that schools can’t, or didn’t, provide.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要学校无法提供，或没有提供的教育。
- en: You need to immerse your mind in the thoughts of those who have lived the life
    you want to live.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要让你的心灵沉浸在你想要过的生活的人的思想中。
- en: This is simple enough.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 这很简单。
- en: One book.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 一本书。
- en: 30 minutes a day.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 每天锻炼30分钟。
- en: Learning something new just because you’re curious is a prime representation
    of *the true.*
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 因为你好奇而学习新事物是*真实*的最好体现。
- en: And, as you’ll find, the simple act of exploration brings novel ideas which
    lead to progress.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 并且，正如你会发现的那样，简单的探索行为会带来新颖的想法，从而带来进步。
- en: '**3) One meditation**'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 一项冥想**'
- en: Work can be beautiful and spiritual, but it is not a full replacement for a
    habit that maintains your connection with reality.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 工作可以是美丽和灵性的，但它不能完全取代一个保持你与现实联系的习惯。
- en: By meditation, I do not mean sitting in a dark room and letting thoughts pass,
    although that is one incredibly viable route.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 我所说的冥想，并不是指坐在黑暗的房间里让思绪流逝，尽管这也是一条非常可行的路线。
- en: Meditation, for all I’m concerned, is a way of life.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，冥想是一种生活方式。
- en: A way of perceiving the world through a lens of wonder and gratitude, noticing
    the amazing things all around you that tend to be glanced over when we are stressed
    and narrow minded.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 通过惊奇和感激的视角看待世界，注意你周围那些在我们压力和狭隘时往往被忽视的奇妙事物。
- en: The purpose of meditation in this sense is to notice *depth.*
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种意义上，冥想的目的是注意到*深度*。
- en: To escape the trap of shallow living.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 为了逃离浅薄生活的陷阱。
- en: For at least 10 minutes a day, attempt to notice reality in detail through your
    senses.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 至少每天10分钟，尝试通过你的感官细致地注意到现实。
- en: Go on a walk and only focus on the feeling of your feet on the ground.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 去散步，并且只专注于你的脚踩在地上的感觉。
- en: Stare at a tree and notice the intricate detail that you’ve never noticed before.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 直视一棵树，注意你以前从未注意过的复杂细节。
- en: Listen deeply when having a conversation with a loved one. Don’t just notice
    words. Notice tone, expression, everything.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 当与心爱的人交谈时，要深入倾听。不要只注意词语。注意语气、表情，一切。
- en: Stare at your hand for 10 minutes straight (yes, I’m serious) and let your mind
    wander deeper into the detail.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 直视你的手10分钟（是的，我是认真的）并让你的心灵深入到细节中。
- en: Feel the water on your hands while doing dishes. Feel everything you touch for
    once in your life. Listen to the sound of silence or cars in the distance. Pick
    apart the intricate smell of even the most boring food.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 在洗碗时感受手上的水。感受你一生中接触到的每一件事。聆听寂静的声音或远处汽车的声音。分辨出即使是无聊食物的复杂气味。
- en: Don’t overcomplicate this.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 不要过于复杂化这个问题。
- en: '**4) One workout**'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 一项锻炼**'
- en: No man has the right to be an amateur in the matter of physical training. It
    is a shame for a man to grow old without seeing the beauty and strength of which
    his body is capable.
  id: totrans-171
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 没有人有权利在体能训练方面成为业余爱好者。一个男子在未看到他身体能够达到的美丽和力量之前变老是一种耻辱。
- en: ''
  id: totrans-172
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Socrates
  id: totrans-173
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 苏格拉底
- en: 'Back to the topic of reality being composed of whole-parts:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 回到现实由整体和部分组成的主题：
- en: One other major tenet is that the destruction of the lower is self-destructive
    for the higher.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个重要的原则是，低级事物的破坏对高级事物具有自我毁灭性。
- en: If we destroy Earth, humans are destroyed with it.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们破坏地球，人类也会随之毁灭。
- en: If a cancer cell invades the organism, it becomes sick.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 如果癌细胞侵入生物体，它就会生病。
- en: If you remove a sentence from a paragraph, it tends to lose its sense.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你从一段话中删除一句话，它往往会失去其意义。
- en: You live in your body.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 你生活在你的身体里。
- en: It should be considered your full time job to learn about it, train it, and
    treat it with respect, because anything else is literal suicide.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 应该把它视为你的全职工作，去了解它、训练它、尊重它，因为其他任何事都是字面上的自杀。
- en: Not only that, but a lack of health shoots its impact upward into the creative
    ability of your mind, the quality of your work, and the depth of connections in
    your relationships. It’s all connected.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 不仅如此，健康缺失的影响还会向上蔓延到你的创造力、工作质量以及人际关系中的深度。这一切都是相互关联的。
- en: Commit to one workout.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 承诺一项锻炼。
- en: Whatever you feel most pulled to do.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你做什么都感到最有吸引力。
- en: Find a running program, weight lifting program, pilates routine, whatever it
    may be.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 找一个跑步计划、举重计划、普拉提练习，无论是什么。
- en: The point is to pay mind to the body that allows you to be here every single
    day.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 关键是要关注让你每天都能在这里的身体。
- en: 4 simple habits can radically change your life.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 4个简单的习惯可以彻底改变你的生活。
- en: 4 simple habits can align you with the good, the true, the beautiful.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 4个简单的习惯可以使你与美好、真实、美丽的事物保持一致。
- en: 4 simple habits can lead to higher states of enjoyment through curiosity, passion,
    purpose, autonomy, and mastery.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 4个简单的习惯可以通过好奇心、激情、目标、自主性和精通带来更高的享受状态。
- en: Get sick of being sick.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 对生病感到厌倦。
- en: Give yourself permission to be extreme.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 允许自己极端。
- en: Disappear, and come back unrecognizable.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 消失，然后以无法辨认的方式归来。
- en: – Dan
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
- en: On June 16th, the build a profitable personal brand in 30 days challenge starts.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 6月16日，为期30天的打造盈利个人品牌挑战赛开始。
- en: If you want to learn about the path of modern entrepreneurship, turn your interests
    into the foundation of a fulfilling business, and have a guided project to work
    on for 30-60 minutes for the next 30 days, [consider enrolling here.](https://stan.store/thedankoe/p/build-a-profitable-personal-brand-in-30-days)
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想了解现代创业之路，将你的兴趣转化为一个充实企业的基石，并有一个为期30-60分钟的指导项目来工作，接下来的30天里，[考虑在此报名。](https://stan.store/thedankoe/p/build-a-profitable-personal-brand-in-30-days)
- en: If you’re not ready yet, consider reading [last weeks letter](https://thedankoe.substack.com/p/how-to-build-a-better-personal-brand)
    on personal branding to see why it changed my life.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还没有准备好，考虑阅读[上周的信件](https://thedankoe.substack.com/p/how-to-build-a-better-personal-brand)了解个人品牌如何改变我的生活。
