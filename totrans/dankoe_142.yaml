- en: The Simplest Way To Start A One-Person Business (Micro Products)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-simplest-way-to-start-a-one-person-business-micro-products/](https://thedankoe.com/letters/the-simplest-way-to-start-a-one-person-business-micro-products/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I talk about starting a one-person business a lot.
  prefs: []
  type: TYPE_NORMAL
- en: Why?
  prefs: []
  type: TYPE_NORMAL
- en: Because it’s the most logical option for beginners.
  prefs: []
  type: TYPE_NORMAL
- en: I mean, do you really expect to start anything *more* than a *one*-personbusiness
    when you’re just starting out?
  prefs: []
  type: TYPE_NORMAL
- en: Many people have dreams of starting things like an apparel brand or software
    startup or some other kind of business that requires a ton of capital and resources
    to make work.
  prefs: []
  type: TYPE_NORMAL
- en: It makes sense why a one-person business is enticing as a starting point.
  prefs: []
  type: TYPE_NORMAL
- en: You can build an audience and hefty monthly income with pure skill and effort.
  prefs: []
  type: TYPE_NORMAL
- en: You can leverage that audience and income to start whatever other business you
    want, like that apparel brand. Those are a lot easier to start when you have an
    audience full of potential customers and an income to cover initial costs and
    inventory.
  prefs: []
  type: TYPE_NORMAL
- en: Or, you can just scale as one person as far as you want to go.
  prefs: []
  type: TYPE_NORMAL
- en: As Sam Altman said, he has a group chat with his friends where they’re betting
    on who’s going to be the first $1 billion one-person business. Because there are
    already plenty hitting the $1 million and $10 million mark with modern technology
    like social media and digital products.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, the biggest question I get related to starting is this:'
  prefs: []
  type: TYPE_NORMAL
- en: “Okay Dan, I like the concept of the one-person business, but *how do I actually
    start?”*
  prefs: []
  type: TYPE_NORMAL
- en: So, I’m going to lay out the simplest path for you.
  prefs: []
  type: TYPE_NORMAL
- en: I’m going to act as if you have only a few dollars to your name and a few interests
    that you could see yourself turning into a business.
  prefs: []
  type: TYPE_NORMAL
- en: Do not worry about building a website, starting an LLC, or even worrying about
    taxes just yet. If you haven’t made at least $10K-$50K, you’re fine. Nobody is
    going to come after you for that minuscule amount (in the context of business,
    I understand that’s a decent chunk of money). Remove those from your mind and
    focus on actually making money first.
  prefs: []
  type: TYPE_NORMAL
- en: Last thing.
  prefs: []
  type: TYPE_NORMAL
- en: I’m not going to teach you how to start an agency or e-commerce store or anything
    else you can find online.
  prefs: []
  type: TYPE_NORMAL
- en: I’m going to teach you the absolute bare bones of online business.
  prefs: []
  type: TYPE_NORMAL
- en: Why is this important?
  prefs: []
  type: TYPE_NORMAL
- en: Because you can grow, pivot, and expand into any other kind of business model.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s begin.
  prefs: []
  type: TYPE_NORMAL
- en: Step 1) Set Up A Simple Digital Tool Stack
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Everything we talk about in this section *is your business.*
  prefs: []
  type: TYPE_NORMAL
- en: These are the tools that you will be logging into every day or week.
  prefs: []
  type: TYPE_NORMAL
- en: It’s wise to sign up for them and bookmark them. Most of them are free to start.
  prefs: []
  type: TYPE_NORMAL
- en: 'When setting up an online business, you need 4 things:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Somewhere to generate traffic** (to attract potential customers)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Somewhere to collect emails** (so you have direct access to interested potential
    customers and can remarket to them)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Somewhere to accept payment and host your products or services** (to promote
    to number 1 and 2 to make money)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Somewhere to save your ideas and writing** (for marketing, client work, product
    planning, and content.)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: I’ve tried every possible type of software on the market.
  prefs: []
  type: TYPE_NORMAL
- en: 'Since we are trying to keep things as simple and low-cost as possible, here’s
    what I would do if I were starting from scratch:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Somewhere to generate traffic
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Many of you aren’t going to like this.
  prefs: []
  type: TYPE_NORMAL
- en: But the simplest, most accessible way to start generating traffic is by writing
    on social media.
  prefs: []
  type: TYPE_NORMAL
- en: Why?
  prefs: []
  type: TYPE_NORMAL
- en: Social media is free. Anyone can build an audience with enough practice (yes,
    social media is a skill, not luck).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can post content and promote your products to a social media audience every
    day (paid ads and sponsoring podcasts or newsletters cost money).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can endlessly test ideas with content to see what best leads to growth and
    sales.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With writing, you don’t need to learn video editing, audio editing, or graphic
    design. Anyone can write and post an impactful idea.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'With that, you have a few options:'
  prefs: []
  type: TYPE_NORMAL
- en: X, Threads, or LinkedIn.
  prefs: []
  type: TYPE_NORMAL
- en: Pick the one you resonate with most and focus all of your energy on that.
  prefs: []
  type: TYPE_NORMAL
- en: X has a lot of potential and deep ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Threads seems to be great for beginners right now, but has a lower level of
    market sophistication (like Instagram) so people troll a good amount.
  prefs: []
  type: TYPE_NORMAL
- en: LinkedIn has the most money, but it’s pretty boring and professional.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t know what to write for these platforms, download my [Idea Museum](https://thedankoe.com/get/idea-museum).
    It’s a swipe file of all of the past content I wrote to grow as a beginner.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Somewhere to collect emails.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You are now generating traffic with social media.
  prefs: []
  type: TYPE_NORMAL
- en: Now, you need a place to demonstrate competency.
  prefs: []
  type: TYPE_NORMAL
- en: You need a place where you can promote your product or service directly to a
    list of interested potential customers (this is where you are going to make most
    of your money).
  prefs: []
  type: TYPE_NORMAL
- en: That’s best done with longer-form content.
  prefs: []
  type: TYPE_NORMAL
- en: '(Side note: we will learn how to write these in a bit.)'
  prefs: []
  type: TYPE_NORMAL
- en: In other words, you need a newsletter.
  prefs: []
  type: TYPE_NORMAL
- en: Why?
  prefs: []
  type: TYPE_NORMAL
- en: I’m a fan of pairing one short-form platform with one long-form platform.
  prefs: []
  type: TYPE_NORMAL
- en: You *could* exchange a newsletter for a podcast or YouTube channel, but there
    are a few downsides to that.
  prefs: []
  type: TYPE_NORMAL
- en: You need audio and video equipment.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You need audio, video, and extensive social media skill.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You’ll have to build an email list anyway to have a place where you can speak
    off of social media to them.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'So far, the flow goes like this:'
  prefs: []
  type: TYPE_NORMAL
- en: Write social media content > plug your newsletter.
  prefs: []
  type: TYPE_NORMAL
- en: I personally recommend [using Beehiiv for your email list.](https://thedankoe.com/get/beehiiv)
  prefs: []
  type: TYPE_NORMAL
- en: It’s free for your first 2,500 subscribers (that’s a lot) and you can also build
    a website, blog, and have automations.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Somewhere for payment and product / service hosting.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that you have two customer touchpoints, social media and newsletter, you
    need somewhere to *link to* so they can pay you for a product or service.
  prefs: []
  type: TYPE_NORMAL
- en: And since we are keeping this as simple as possible, you also need a place that
    has landing pages, digital product hosting, courses, community features, and coaching
    call scheduling.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve gone through the ringer with different software.
  prefs: []
  type: TYPE_NORMAL
- en: There are so many to choose from.
  prefs: []
  type: TYPE_NORMAL
- en: But Stan recently came across my map and I’ve transferred all of my own stuff
    over to them.
  prefs: []
  type: TYPE_NORMAL
- en: They pride themselves in being the simplest way to start an online business,
    and after using it, I’d agree with them.
  prefs: []
  type: TYPE_NORMAL
- en: '[Here’s a link to Stan.](https://join.stan.store/thedankoe)'
  prefs: []
  type: TYPE_NORMAL
- en: 4) Somewhere to save marketing and content ideas/writing.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 80% of your work as an online business owner comes down to *ideas and writing.*
  prefs: []
  type: TYPE_NORMAL
- en: Ideas for marketing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ideas for content
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ideas for newsletters
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ideas for products
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ideas for your service
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Outlining and writing them all
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A 1-2 hour timeblock dedicated to writing content, newsletters, and promotions
    is necessary.
  prefs: []
  type: TYPE_NORMAL
- en: Even further, you need a place to flesh out and write your digital product or
    service.
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes you need a place to host templates, client worksheets, or client work
    in general.
  prefs: []
  type: TYPE_NORMAL
- en: Shameless plug, but this is why we built Kortex.
  prefs: []
  type: TYPE_NORMAL
- en: And we have some crazy features coming by the end of the year (like AI Synthesis
    – you can select multiple documents, sources, or captures to turn into summaries,
    outlines, or notes with AI, which removes time-consuming organization and note-taking).
  prefs: []
  type: TYPE_NORMAL
- en: '[Sign up here.](https://kortex.co) With the free tier you can write unlimited
    documents and capture unlimited ideas (and integrate with Readwise to store all
    of your tweet bookmarks and highlights).'
  prefs: []
  type: TYPE_NORMAL
- en: 'The question now is:'
  prefs: []
  type: TYPE_NORMAL
- en: What do I sell?
  prefs: []
  type: TYPE_NORMAL
- en: Step 2) What Are You Good At?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'So far, our business looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: Social media content > collect emails > send newsletters > promote your digital
    product or service on social media and in newsletters > create everything in Kortex
    so it’s all in one place.
  prefs: []
  type: TYPE_NORMAL
- en: Now we need to hammer down *what you write content, write emails, and create
    a product or service around.*
  prefs: []
  type: TYPE_NORMAL
- en: I can’t help you too much with this, but I can ask questions that may reveal
    an answer.
  prefs: []
  type: TYPE_NORMAL
- en: From these questions, think of 1 main skill or interest you’d like to build
    this business around.
  prefs: []
  type: TYPE_NORMAL
- en: What are your favorite practical non-fiction books?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What do you already do for work / what have you studied?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Are other people doing those things online already? If so, good.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What transformation have you made in one domain of your life?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you had to write a paper on *one* interest right now, what would it be?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Be decisive.
  prefs: []
  type: TYPE_NORMAL
- en: We just need a starting point.
  prefs: []
  type: TYPE_NORMAL
- en: 'From there, I want you to do a few things:'
  prefs: []
  type: TYPE_NORMAL
- en: Write down 5 authors, creators, or experts in that skill or interest.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Save 5 quotes or ideas from each of them inside Kortex.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Study what digital products they are selling (books? courses? coaching?)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is where you’re going to get your ideas for what to write about and what
    to sell.
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2371">![](../Images/449d02ad0824c3adc6d69e40160d9f58.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: From there, follow the screenshot above.
  prefs: []
  type: TYPE_NORMAL
- en: Break down your main interest into 3 main topics.
  prefs: []
  type: TYPE_NORMAL
- en: Then, break those topics down into atleast 5 real-world pain points and 5 content
    ideas.
  prefs: []
  type: TYPE_NORMAL
- en: If you want the full template and walkthrough, the [One-Person Business Launchpad](https://thedankoe.com/get/opbl)
    has the above and more.
  prefs: []
  type: TYPE_NORMAL
- en: 'Pro-tip: Nobody has original ideas. They take what works and combine it with
    other ideas to seem unique. The most unique people are simply those who combine
    ideas from sources where people aren’t looking, or haven’t heard before.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Step 3) Micro Products & Services
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Okay, we have a way to generate traffic.
  prefs: []
  type: TYPE_NORMAL
- en: We have a skill or interest to write about.
  prefs: []
  type: TYPE_NORMAL
- en: Now, we need to turn that skill or interest into something that people can pay
    for.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are 2 ways to do that:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) The Micro Product
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Last week I had a conversation with John Hu.
  prefs: []
  type: TYPE_NORMAL
- en: He’s the CEO of Stan, a simple online store builder for creators.
  prefs: []
  type: TYPE_NORMAL
- en: Before he started Stan, he was a creator on TikTok.
  prefs: []
  type: TYPE_NORMAL
- en: Before he was a creator, he worked at Goldman Sachs.
  prefs: []
  type: TYPE_NORMAL
- en: As a creator, he posted content giving out career advice.
  prefs: []
  type: TYPE_NORMAL
- en: After a few people asked, he decided to allow people to download a copy of his
    old resume (that got him the Sachs job) for $10.
  prefs: []
  type: TYPE_NORMAL
- en: He didn’t think it would lead to much, but he ended up making $1K from it pretty
    quick.
  prefs: []
  type: TYPE_NORMAL
- en: As I worked more with the Stan team, they mentioned how quite a few creators
    start with a $10-$19 digital download. Some have made millions (seriously), others
    have made thousands.
  prefs: []
  type: TYPE_NORMAL
- en: 'The lesson:'
  prefs: []
  type: TYPE_NORMAL
- en: You probably already have something you can upload to the internet, put a small
    price tag on, create content around, and build a side income.
  prefs: []
  type: TYPE_NORMAL
- en: It’s sitting somewhere on your hard drive, in your Kortex, or still stuck in
    your head waiting to be written as a short 10-page ebook or guide.
  prefs: []
  type: TYPE_NORMAL
- en: 2) The Micro Service
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Previously I’ve talked about the “micro offer.”
  prefs: []
  type: TYPE_NORMAL
- en: In reality, it’s a micro service.
  prefs: []
  type: TYPE_NORMAL
- en: The problem is that freelancers, coaches, consultants, or other service providers
    think they need everything in place before they start selling. The landing page.
    The logo. The program’s system and teachings.
  prefs: []
  type: TYPE_NORMAL
- en: Wrong.
  prefs: []
  type: TYPE_NORMAL
- en: You literally just need to be able to teach your skill or interest.
  prefs: []
  type: TYPE_NORMAL
- en: Yesterday, in the Kortex Premium community, someone made a post they were saying
    they were lost when it came to monetization.
  prefs: []
  type: TYPE_NORMAL
- en: They have been a coder and systems analyst for more than a decade.
  prefs: []
  type: TYPE_NORMAL
- en: They started writing on social media to build an audience but felt like they
    had to sell what everyone else was selling in the niche self-improvement echo
    chamber many of you find yourselves in.
  prefs: []
  type: TYPE_NORMAL
- en: They didn’t know if they should try ghostwriting or productivity coaching to
    start making money.
  prefs: []
  type: TYPE_NORMAL
- en: 'I asked:'
  prefs: []
  type: TYPE_NORMAL
- en: “Why don’t you simply teach people your skill? Teach them coding or systems
    analysis as a way to increase their skill set and break into new career opportunities.
    The coding space is massive and people are buying courses and bootcamps non-stop
    as an alternative to college.”
  prefs: []
  type: TYPE_NORMAL
- en: 'He replied:'
  prefs: []
  type: TYPE_NORMAL
- en: “I never thought of it like that.”
  prefs: []
  type: TYPE_NORMAL
- en: The point is that you’re probably 1-2 steps ahead of other people in some skill
    or interest.
  prefs: []
  type: TYPE_NORMAL
- en: You can write content about that thing.
  prefs: []
  type: TYPE_NORMAL
- en: You can charge $750-$1000 for a pack of 4 zoom calls where you teach the other
    person what you know.
  prefs: []
  type: TYPE_NORMAL
- en: (Online personal trainers do this all the time. They charge more actually. Most
    people are just afraid to ask for money for something they learned out of curiosity
    for free. Not everyone is like you. Not everyone wants to spend 4 years slowly
    stacking knowledge. They want everything given to them in order to achieve their
    goals because they are busy people who spend time on other areas of their life.)
  prefs: []
  type: TYPE_NORMAL
- en: Why do I recommend a pack of 4 calls?
  prefs: []
  type: TYPE_NORMAL
- en: Because you can start right now without anything else.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If people pay $750-$1000 for it, you have the validation you need to start turning
    it into a more fleshed-out program or course.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It gives you enough time to teach something significant. You can sell 1 coaching
    call, but you usually need more time to teach what you know.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The question now is:'
  prefs: []
  type: TYPE_NORMAL
- en: How do I attract people that want to pay me?
  prefs: []
  type: TYPE_NORMAL
- en: Step 4) Offer Driven Content
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Since we are trying to do this in the most *accessible and low-cost way,* that
    narrows us down to a few options to attract people who want to pay for your product
    or service:'
  prefs: []
  type: TYPE_NORMAL
- en: Social media
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Writing
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Social media is free to use. You don’t need to pay for ads, learn SEO, or pay
    for podcast or newsletter sponsorships.
  prefs: []
  type: TYPE_NORMAL
- en: As a bonus, you *build an audience.* The magical thing about building an audience
    is that you can remarket to more and more people if you are consistent.
  prefs: []
  type: TYPE_NORMAL
- en: Many people start an online business with cold emails and cold calls. There’s
    nothing wrong with that at all, but why not just write content on social media
    so you can do warm outreach *and have people reach out to you.*
  prefs: []
  type: TYPE_NORMAL
- en: Social media, of all distribution methods, is arguably the highest leverage,
    most accessible, and most affordable ways to build your business.
  prefs: []
  type: TYPE_NORMAL
- en: Choosing Topics To Write About
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the past, I teach people to go rather broad and multidisciplinary with what
    they write about online.
  prefs: []
  type: TYPE_NORMAL
- en: But if you are a beginner who simply wants to start making money, I’d still
    recommend it, but there’s a faster way to monetization.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, take the *topic* of your product or service and break it down into:'
  prefs: []
  type: TYPE_NORMAL
- en: Your personal story. Where you were before, middle, and after relating to the
    topic.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Pain points people face. This is going to be how you start 80% of the content
    you write.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Content topics that have already done well. Search your topic on YouTube and
    write down the best performing videos. Watch them for content ideas.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: That’s it.
  prefs: []
  type: TYPE_NORMAL
- en: Create a new document or note and write down 5-10 points for each of those.
  prefs: []
  type: TYPE_NORMAL
- en: Once you start, then you can worry about how to write and structure your content.
  prefs: []
  type: TYPE_NORMAL
- en: For now, *act like your texting a friend and they’re asking you questions about
    your topic of interest. Write your answers in public on social media.*
  prefs: []
  type: TYPE_NORMAL
- en: Start With Newsletter And Post Frameworks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I learned to write content by emulating the writing that I liked and plugging
    my own ideas into it.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t just copy an idea and change a few words.
  prefs: []
  type: TYPE_NORMAL
- en: '*You study the* ***structure*** *of the content you want to emulate.*'
  prefs: []
  type: TYPE_NORMAL
- en: You write down this structure and try plugging your own ideas into it.
  prefs: []
  type: TYPE_NORMAL
- en: For newsletter writing, one structure that I love is the P&P framework ([here’s
    a resource](https://app.kortex.co/public/document/bec7fcec-d76c-4d00-8669-37f53892fead)).
  prefs: []
  type: TYPE_NORMAL
- en: Pain and process.
  prefs: []
  type: TYPE_NORMAL
- en: It’s simple… you choose a topic. You illustrate a pain related to that topic
    as the intro. Then, you break down a step by step process to overcome that pain
    (pretty close to how this newsletter you are reading is structured).
  prefs: []
  type: TYPE_NORMAL
- en: Outline it first, then write.
  prefs: []
  type: TYPE_NORMAL
- en: For posts, do the same thing.
  prefs: []
  type: TYPE_NORMAL
- en: Scroll social media and embed the links of 10 great posts in a Kortex document.
  prefs: []
  type: TYPE_NORMAL
- en: Under each of them, break down line by line what the structure of it is.
  prefs: []
  type: TYPE_NORMAL
- en: Then, plug your own topics and ideas into those structures and write them in
    your own voice.
  prefs: []
  type: TYPE_NORMAL
- en: Step 5) Please, For The Love Of God, Promote Yourself
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I’ve been doing this a while.
  prefs: []
  type: TYPE_NORMAL
- en: The *only* reason people don’t make money is because they don’t promote themselves.
  prefs: []
  type: TYPE_NORMAL
- en: You read that correctly.
  prefs: []
  type: TYPE_NORMAL
- en: Yes, even if you are promoting to zero followers and readers.
  prefs: []
  type: TYPE_NORMAL
- en: Why?
  prefs: []
  type: TYPE_NORMAL
- en: 'If you don’t promote your products or services:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) You don’t have an incentive to improve your writing.**'
  prefs: []
  type: TYPE_NORMAL
- en: It’s a lot easier to give up when *you don’t see the point of writing to build
    an audience.*
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t *see* a way to make money (your product or service linked in your
    writing) then you won’t try to make any, and you’ll see it as pointless.
  prefs: []
  type: TYPE_NORMAL
- en: I wrote my first eBook at 140 followers and made $3000 by the time I hit 500
    followers. This happened because I wanted it to happen and tried to get as much
    traffic as possible to my product.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) People won’t know that they can pay you.**'
  prefs: []
  type: TYPE_NORMAL
- en: I still have people tell me, after years of following me, that they had no idea
    I had products they could pay for.
  prefs: []
  type: TYPE_NORMAL
- en: And I thought I did a pretty good job at promoting them.
  prefs: []
  type: TYPE_NORMAL
- en: The fact is, if you just expect people to *find* what you sell, you will go
    broke.
  prefs: []
  type: TYPE_NORMAL
- en: You need to put it in front of them and tell them how it can help them.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) You’ll never get over your fear of selling.**'
  prefs: []
  type: TYPE_NORMAL
- en: There’s a vocal minority on the internet.
  prefs: []
  type: TYPE_NORMAL
- en: The 1% of people who despise advertisements and self-promotions (even though
    they claim to support independent artists).
  prefs: []
  type: TYPE_NORMAL
- en: They’d rather you beg for donations or sponsorships rather than create your
    own product and pitch it to them.
  prefs: []
  type: TYPE_NORMAL
- en: Ignore these people.
  prefs: []
  type: TYPE_NORMAL
- en: You’ll see them in the comments of posts and think that nobody buys that persons
    product. I can tell you for every 1 negative comment I get, 50-100 people buy
    my product. They just don’t say anything because they aren’t idiots.
  prefs: []
  type: TYPE_NORMAL
- en: '**4) You can’t improve what doesn’t exist.**'
  prefs: []
  type: TYPE_NORMAL
- en: If you never promote your product or service, how do you expect to get better
    at marketing and sales?
  prefs: []
  type: TYPE_NORMAL
- en: '*You don’t have any* ***data*** *to improve from.*'
  prefs: []
  type: TYPE_NORMAL
- en: The same goes with business, writing, or any other project or skill.
  prefs: []
  type: TYPE_NORMAL
- en: You will suck at first.
  prefs: []
  type: TYPE_NORMAL
- en: Then you get better.
  prefs: []
  type: TYPE_NORMAL
- en: But you don’t get better unless you suck at first.
  prefs: []
  type: TYPE_NORMAL
- en: So, to end this letter, you have my full permission to suck.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need anything aside from the advice I gave you in this letter.
  prefs: []
  type: TYPE_NORMAL
- en: The *first* successful business – who didn’t have anyone to teach them how to
    do it – simply figured it out.
  prefs: []
  type: TYPE_NORMAL
- en: Trial and error.
  prefs: []
  type: TYPE_NORMAL
- en: Reply to one post of yours a day. Alternate promoting your newsletter opt-in
    and product or service.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In your weekly email, promote a link to your product or service.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now all you need to do is focus on improving your writing and fueling your newsletter.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Go.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
