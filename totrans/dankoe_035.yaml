- en: If You Are High Value, Start A One Person Business
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/if-you-are-valuable-turn-yourself-into-a-business-with-5-repeatable-steps/](https://thedankoe.com/letters/if-you-are-valuable-turn-yourself-into-a-business-with-5-repeatable-steps/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Self-reliance is a value of mine.
  prefs: []
  type: TYPE_NORMAL
- en: I would argue that it is the driving force behind what I do.
  prefs: []
  type: TYPE_NORMAL
- en: 'When people would say things like:'
  prefs: []
  type: TYPE_NORMAL
- en: '***“It’s time to scale your business! You need to be hiring! Why aren’t you
    running ads?***“'
  prefs: []
  type: TYPE_NORMAL
- en: I doubled down on building digital assets, leverage, and products that required
    less time from me.
  prefs: []
  type: TYPE_NORMAL
- en: '***“You have to keep doing client work. High ticket is where it’s at bro!”***'
  prefs: []
  type: TYPE_NORMAL
- en: I stopped freelancing after transitioning to consulting. I turned my consulting
    into a hybrid program. That hybrid program is now a cohort.
  prefs: []
  type: TYPE_NORMAL
- en: Each iteration increasing the value delivered while decreasing my time invested
    so I can focus on building *more* leverage (like writing my book and growing on
    multiple platforms – which is NOT what you should be focusing on as a beginner).
  prefs: []
  type: TYPE_NORMAL
- en: '***“You need to be going hard on TikToks and reels! The future*** ***is headed***
    ***that way.”***'
  prefs: []
  type: TYPE_NORMAL
- en: So I doubled down on long-form [newsletters, podcasts, and YouTube videos.](https://2hourwriter.com)
  prefs: []
  type: TYPE_NORMAL
- en: 'Lesson: if you want to “do what you love,” don’t fall for the short-form content
    trap. Focus on creating depth and authority. That is what people will pay for.'
  prefs: []
  type: TYPE_NORMAL
- en: (This is only for business btw. I’m even more stubborn in my personal life).
  prefs: []
  type: TYPE_NORMAL
- en: The greatest thing I did for myself was to ignore everyone’s advice. I didn’t
    care about hiring someone to fix a part of my business, *I wanted to figure it
    out myself.*
  prefs: []
  type: TYPE_NORMAL
- en: Stubborn? Yes.
  prefs: []
  type: TYPE_NORMAL
- en: Time intensive? Yes.
  prefs: []
  type: TYPE_NORMAL
- en: (Well, sorta, it took about 3 years to get to where I am now after making my
    first dollar with creative work. That’s still less time than a 4-year degree.
    The unpredictability is what scares people off.)
  prefs: []
  type: TYPE_NORMAL
- en: Did I learn more than any other solopreneur out there and enjoy every second
    of it? Yes.
  prefs: []
  type: TYPE_NORMAL
- en: 'I kept to my vision for the future (as I always encourage you to do):'
  prefs: []
  type: TYPE_NORMAL
- en: 3-4 hours of fulfilling work a day until the day I die
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The flexibility to build whatever I want and get paid for doing so
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Having more than enough money to live worry-free. Building a billion-dollar
    company doesn’t appeal to me.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Having more than enough time to pursue the important things in life like spirituality,
    self-development, and nurturing real-life relationships
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Not relying on anybody (be it employees or people in my network) for my personal
    and professional growth
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These may not be possible at the start, of course, but that’s the point. It’s
    a vision that must be actualized over 5-10 years. You have to climb the rungs
    of the one-person business ladder.
  prefs: []
  type: TYPE_NORMAL
- en: That’s what we are here to talk about.
  prefs: []
  type: TYPE_NORMAL
- en: Business As An Extension Of The Self
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Internet enables eight billion monopolies.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Naval (@naval) [November 29, 2020](https://twitter.com/naval/status/1332968723133517825?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'There is one thing that humans can do better than any other being:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Have an idea
  prefs: []
  type: TYPE_NORMAL
- en: 2) Make it real
  prefs: []
  type: TYPE_NORMAL
- en: Through consciousness, attention, and focus we have been given the power to
    build, create, and make.
  prefs: []
  type: TYPE_NORMAL
- en: '*Does this not blow your mind?*'
  prefs: []
  type: TYPE_NORMAL
- en: 'We can have a vision, gather resources, and build layer by layer the world
    we inhabit. Both immaterial and material:'
  prefs: []
  type: TYPE_NORMAL
- en: Language, buildings, technology, products, services, marketing campaigns, culture,
    society, school systems, science, philosophy, etc.
  prefs: []
  type: TYPE_NORMAL
- en: '*It seems that our role on this Earth is to solve local problems.* *Knowing
    that problems are systemic, not personal, and that solving local problems leads
    to solving global, and even cosmic, problems**.*'
  prefs: []
  type: TYPE_NORMAL
- en: Anyone can do this.
  prefs: []
  type: TYPE_NORMAL
- en: The problem?
  prefs: []
  type: TYPE_NORMAL
- en: Limiting beliefs, programmed minds, and a lack of self-belief hold most people
    back.
  prefs: []
  type: TYPE_NORMAL
- en: Everyone was an entrepreneur before the industrial revolution. We would hunt
    for the resources necessary to sustain our life.
  prefs: []
  type: TYPE_NORMAL
- en: Everyone is a content creator.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Some just take the content in their head and reap the benefits of sharing it
    with the world.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [June 21, 2022](https://twitter.com/thedankoe/status/1539176803931242502?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: With many basic needs covered from the start along with the creation of the
    dollar bill, things have changed.
  prefs: []
  type: TYPE_NORMAL
- en: We have the psyche of our ancestors trapped in a modern environment. Like a
    monkey in a cubicle that mentally decomposes with time due to a lack of intrinsic
    motivation (and the neurotransmitters involved in said motivation).
  prefs: []
  type: TYPE_NORMAL
- en: Why is this happening?
  prefs: []
  type: TYPE_NORMAL
- en: Cultural and societal conditioning. We’ve been conditioned to rely on everything
    except for ourselves.
  prefs: []
  type: TYPE_NORMAL
- en: We were graded on performance and adherence in school. We obeyed our parents
    and more than likely adopted their belief system without question. Even those
    who did question still have some residual unconsciousness that impacts the progress
    they could be making.
  prefs: []
  type: TYPE_NORMAL
- en: What is the answer?
  prefs: []
  type: TYPE_NORMAL
- en: Self-reliance on all fronts.
  prefs: []
  type: TYPE_NORMAL
- en: Sovereignty, personal responsibility, self-awareness, self-confidence, self-education,
    self-interest, and a set of values, goals, and priorities that you can work towards,
    learn from, and pass down your lessons (enough so that you can make an income
    from it).
  prefs: []
  type: TYPE_NORMAL
- en: This is what a one-person creator business is built from.
  prefs: []
  type: TYPE_NORMAL
- en: '**Your brand** **(how your business** **is displayed****)** is created from
    your vision in goals. What are you building? What are you leading people towards?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Your content** **(how you attract people to your brand)** is created from
    the interests and skills you are refining to actualize your vision and goals.
    Your purpose is to educate, entertain, and inspire along your self-development
    journey. Leaders attract followers.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Your product** **(how you get paid through value)** is created from your
    map of reality. That is, a process, system, or tool that people can use to solve
    their problems faster. The ones that you were stubborn about solving that led
    to having a unique perspective and solution.'
  prefs: []
  type: TYPE_NORMAL
- en: The most profitable niche is *you.*
  prefs: []
  type: TYPE_NORMAL
- en: As a divine creator, your job is to make forward progress, expose yourself to
    new ideas, and *use* those ideas to further the progress of humanity.
  prefs: []
  type: TYPE_NORMAL
- en: By passing down tools that will accelerate the learning of your followers, the
    world will continue to evolve as it should.
  prefs: []
  type: TYPE_NORMAL
- en: I have an inclination to believe that social media was created for this reason.
    The problem of global communication was solved, potentially for money, but with
    an impact that nobody could have imagined… that is, an idea was had and made real,
    opening up room in the realm of infinite possibility for something to be built
    on top.
  prefs: []
  type: TYPE_NORMAL
- en: '*Are you going to do your part?*'
  prefs: []
  type: TYPE_NORMAL
- en: The Entrepreneurial Method (Get it? Like, the Scientific Method?)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-762">![](../Images/fea83790c2a11c66d6e81f633c9896cc.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Most people have a goldmine of information, skill, and experience at their fingertips.
  prefs: []
  type: TYPE_NORMAL
- en: The only people that don’t are the one’s that haven’t improved any aspect of
    their life (by their own doing).
  prefs: []
  type: TYPE_NORMAL
- en: '*Everyone is an entrepreneur, some choose to display their value in public.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'For those that are still with me, here is a 5 part cycle for turning yourself
    into a business:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Find A Problem
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: All stories, marketing, and products revolve around solving a problem.
  prefs: []
  type: TYPE_NORMAL
- en: '*“There was a cold spot on the side of the bed.”*'
  prefs: []
  type: TYPE_NORMAL
- en: If that was the start of a story, it implies a problem. It opens a curiosity
    loop that makes people want to discover more.
  prefs: []
  type: TYPE_NORMAL
- en: Problems are the root of human behavior, real or not. They are what lead to
    forward progress. [Creativity is about *creating* the best solution, or providing
    the most clarity.](https://thedankoe.com/how-to-make-money-as-a-creative-on-the-internet/)
  prefs: []
  type: TYPE_NORMAL
- en: Don’t like your situation? In comes dopamine, making you feel good about the
    desire you have for fancy cars and mansions.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t like how you look? Want to make more money?
  prefs: []
  type: TYPE_NORMAL
- en: Are you not curious on what life would be like if those were solved?
  prefs: []
  type: TYPE_NORMAL
- en: Whatever the problem may be, don’t deny or label it. Move into it.
  prefs: []
  type: TYPE_NORMAL
- en: Move in a forward direction towards those desires. That is the only way you
    will discover if you actually want them.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, you will find out that’s not what you want, but the only other option
    is to stand still.
  prefs: []
  type: TYPE_NORMAL
- en: Yes, you can and should enjoy the present moment, it’s there when you need it.
    But suppressing your desires will not lead to anything good, or anything at all.
  prefs: []
  type: TYPE_NORMAL
- en: You must dissolve that karma to [move closer toward revealing your true purpose.](https://thedankoe.com/how-to-profit-from-solving-your-own-problems/)
  prefs: []
  type: TYPE_NORMAL
- en: 2) Experiment With Different Solutions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Systems, absolutes, and hard advice have their place, but they strip you of
    your ability to "figure it out," self-experiment, and come to your own conclusions
    (which is how you become a true expert).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [August 17, 2022](https://twitter.com/thedankoe/status/1559926188897976328?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The worst way to solve a problem is to study one perspective and treat it as
    dogma.
  prefs: []
  type: TYPE_NORMAL
- en: Like with business.
  prefs: []
  type: TYPE_NORMAL
- en: If you start researching how to fix your money problem and only choose to learn
    from 1 person that is teaching 1 business model, you are shooting yourself in
    the foot.
  prefs: []
  type: TYPE_NORMAL
- en: Your job is to pull from multiple perspectives and let the truth accumulate
    in the middle.
  prefs: []
  type: TYPE_NORMAL
- en: From that crossover of perspectives, you will notice patterns.
  prefs: []
  type: TYPE_NORMAL
- en: Those patterns are what you need to pay attention to. They are the lever-moving
    fundamentals that get results. They are also where creativity comes into play,
    like connecting the dots, making a new discovery, and having a solution that you
    actually remember.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s say you study 3 different perspectives (business models) for solving
    the problem of money:'
  prefs: []
  type: TYPE_NORMAL
- en: Freelance ghostwriting
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Starting an eCommerce brand
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Starting a marketing agency
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'You will notice these patterns:'
  prefs: []
  type: TYPE_NORMAL
- en: You need a compelling brand to attract the right people
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You need valuable content that establishes authority and gets shared
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You need an offer that people actually want (and that gets the results you say
    it will)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you aren’t building an audience with content, you need a strategy for acquiring
    customers (like ads, SEO, sponsored posts, etc)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You need to understand human behavior and apply it to everything we listed above
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: From there, you can approach a business model that suits you best. Your focus
    will be on the fundamentals, and you will grow faster than those drowning in tactics.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Document How You Solved It
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If I could go back in time, the one thing I would change is to start building
    an audience earlier than I did. It’s difficult for people to take this advice
    seriously because all they see is a huge gap.
  prefs: []
  type: TYPE_NORMAL
- en: People see that I have hundreds of thousands of followers and leave it at that
    ([innacurate perception can hurt your decision making](https://thedankoe.com/5-ways-to-learn-10x-faster/)).
  prefs: []
  type: TYPE_NORMAL
- en: What they don’t see is that I’m a regular ass dude.
  prefs: []
  type: TYPE_NORMAL
- en: I identified a money problem in my life
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I was a young, broke college student with less than $0 to my name
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I persisted with freelancing to solve that problem
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I saw results and [wrote about it online](https://2hourwriter.com)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I pivoted my brand in a way that reduced my time spent on client work
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'I ignored common business advice, questioned how people told me to do things,
    and created profitable offers by following step #2'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I continued playing the audience growth game and now people perceive me as some
    sort of celebrity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All I’m trying to tell you is that you have to step into the arena. That alone
    will open a new world for you. After that, it’s a matter of staying in the arena.
  prefs: []
  type: TYPE_NORMAL
- en: '**Side note**: Someone asked me recently if they should start growing an audience.
    They asked how long it would take and if it was worth it. My friend, you tell
    me. *Does it matter how long it takes if this is something you are going to be
    doing (and enjoying) for the rest of your life anyway?*'
  prefs: []
  type: TYPE_NORMAL
- en: Even if you lack experience. You don’t have to write about “making 6 figures
    as a freelancer” if you don’t have those results. You can, however, educate people
    on the skill you are freelancing with and talk about what you’ve learned growing
    a freelancing business.
  prefs: []
  type: TYPE_NORMAL
- en: People learn the best when it is from someone that is 1 step ahead of them,
    not 10\. (We all know how trying to skip 9 steps goes, get rich quick scheme alert!)
  prefs: []
  type: TYPE_NORMAL
- en: Not only does this build authority and make it 10x easier to land clients, but
    you are building a name for your authentic self.
  prefs: []
  type: TYPE_NORMAL
- en: 4) Distill Into A Replicable Process
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The best thing I did for myself in business was to be stubborn and self-reliant.
  prefs: []
  type: TYPE_NORMAL
- en: I would purchase courses and coaching for strategies, but use them as guides,
    not law. No teaching is absolutely true, and most systems can be made better.
  prefs: []
  type: TYPE_NORMAL
- en: But, I would never hire someone to do the work for me. I wanted to create my
    own writing, website, landing page, product, email marketing, promotions, and
    the rest.
  prefs: []
  type: TYPE_NORMAL
- en: If you hire someone to do it for you, you miss out on real-world experience
    that can be leveraged into something monetizable.
  prefs: []
  type: TYPE_NORMAL
- en: Again, this is why I always emphasize *learning by doing,* or stepping into
    the arena and actually building something.
  prefs: []
  type: TYPE_NORMAL
- en: Once you have the know-how (through direct experience) and results, you can
    self-reflect and teach others how to do it faster.
  prefs: []
  type: TYPE_NORMAL
- en: This is when free consulting, content, and help comes into play. You have to
    test that process on people and see if it gets them results.
  prefs: []
  type: TYPE_NORMAL
- en: Then you ask for testimonials, refine your process, start charging more, repeat,
    and productize once you have traffic courses built up (through content, audience
    growth, and building an email list)
  prefs: []
  type: TYPE_NORMAL
- en: Personal growth = business growth but only when you post online.
  prefs: []
  type: TYPE_NORMAL
- en: 5) Give It To Others That Want To Be Helped
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*What is the meaning of life?*'
  prefs: []
  type: TYPE_NORMAL
- en: 'From the patterns I’ve seen from studying multiple perspectives while trying
    to solve this problem (see what I did there?), it comes down to 2 things:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Raising your consciousness**'
  prefs: []
  type: TYPE_NORMAL
- en: What, exactly, does that mean?
  prefs: []
  type: TYPE_NORMAL
- en: It means that you are actively exploring reality, the unknown. You are solving
    your own problems (that distort reality), making forward progress, and becoming
    directly conscious of the lessons, insights, and patterns that reality presents.
  prefs: []
  type: TYPE_NORMAL
- en: You are making the unknown, known. The unconscious, conscious. The unpredictable,
    predictable. The non-sensical, sensical.
  prefs: []
  type: TYPE_NORMAL
- en: 'You fulfill your basic survival needs (see: Maslows Hierarchy Of Needs) so
    you can help the world from a non-needy state. Authenticity.'
  prefs: []
  type: TYPE_NORMAL
- en: Then, you can move on to step 2.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Raising the collective consciousness**'
  prefs: []
  type: TYPE_NORMAL
- en: In essence, you pass down your map of reality so others can navigate it faster.
  prefs: []
  type: TYPE_NORMAL
- en: This is a feature of raising your own consciousness, as you will be contributing
    less and less to the spread of falsehood, while impacting those that interact
    with you on a frequent basis.
  prefs: []
  type: TYPE_NORMAL
- en: When it comes to business, and with the internet being a thing, you can accelerate
    this “raising of the collective consciousness” by writing about your experiences
    online.
  prefs: []
  type: TYPE_NORMAL
- en: You are helping people solve their money, relationship, health, and happiness
    problems with free content and paid products.
  prefs: []
  type: TYPE_NORMAL
- en: Content is pieces of the map.
  prefs: []
  type: TYPE_NORMAL
- en: Products are the map itself.
  prefs: []
  type: TYPE_NORMAL
- en: People pay for aggregation, convenience, and speed. (If you don’t believe this,
    I know that you haven’t started your business yet).
  prefs: []
  type: TYPE_NORMAL
- en: The thing is, you can only help people that want to be helped.
  prefs: []
  type: TYPE_NORMAL
- en: If someone is not at the experience level where the problem you are solving
    registers in their awareness, your teaching won’t make sense to them.
  prefs: []
  type: TYPE_NORMAL
- en: And with that, you have to accept that people hate what they don’t understand.
    Queue the negative comments from the sidelines!
  prefs: []
  type: TYPE_NORMAL
- en: 'I will end with this:'
  prefs: []
  type: TYPE_NORMAL
- en: “The lips of wisdom are closed except to the ears of understanding.”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The Kybalion
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Enjoy your Saturday.
  prefs: []
  type: TYPE_NORMAL
- en: '*Dan Koe*'
  prefs: []
  type: TYPE_NORMAL
