- en: How To Finally Stop Caring What Other People Think
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/how-to-finally-stop-caring-what-other-people-think/](https://thedankoe.com/letters/how-to-finally-stop-caring-what-other-people-think/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As a kid, video games fascinated me. I remember begging my mom to buy me my
    first “rated M” game Call Of Duty Modern Warfare, because all of my friends were
    already playing it. She caved. I spent my nights slamming Dr. Peppers, cursing
    kids out in the pre-game lobby, falling asleep at 2am — just to wake up an hour
    before school started to play one more match.
  prefs: []
  type: TYPE_NORMAL
- en: You could call me addicted. Moreso, *obsessed.*
  prefs: []
  type: TYPE_NORMAL
- en: As time went on, I built my first PC. A fun little hobby that opened an entire
    new world of games I could play. League Of Legends and World Of Warcraft were
    my thing. For what seems like 5 years, I was glued to my screen every night (after
    I hit the gym! It was my “treat.”).
  prefs: []
  type: TYPE_NORMAL
- en: I will not be the guy that tells you to stop playing video games. I made it
    out just fine — and I see my time playing them as a net benefit to my life. I
    no longer play them — but there are many lessons to pull from my time as a gamer.
  prefs: []
  type: TYPE_NORMAL
- en: Why We Become Obsessed
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Why do we become so obsessed with games? A few reasons.
  prefs: []
  type: TYPE_NORMAL
- en: The mind craves order. It despises chaos. Humans pursue a [hierarchy of goals](https://shop.thedankoe.com/planner)
    to maintain mental order. This can be conscious or unconscious. Assigned or created.
    Both leaders and manipulators know this. Corporate workplaces have daily goals,
    weekly goals, yearly goals, and personal goals that they assign to you. This reduces
    the uncertainty of what you need to do daily. Culture and politics have goals.
    Political leaders get you to rally behind their vision for the world, bring clarity
    to how they are going to accomplish that (goals), and ask for your vote.
  prefs: []
  type: TYPE_NORMAL
- en: Want to add more firepower to this? Use storytelling. As we’ve discussed in
    previous letters, [all understanding is metaphorical](https://thedankoe.com/how-to-copy-your-way-to-success-instead-of-mediocrity/).
    Story based. One thing has to come before another. This word has to come before
    this word in order for this word to make sense to you. One goal has to come before
    another in order for it to make sense. Understand the perspective — the metaphorical
    world — that people are talking about before the rest makes sense. That is to
    say you need to understand the setting of the story. What’s next? The rising action.
    Then a battle of the protagonist and antagonist. Then the falling action and resolution.
  prefs: []
  type: TYPE_NORMAL
- en: When we don’t understand something, our mind fills in the blanks of the story.
    This is called an assumption. You don’t have a piece of the puzzle, so you imagine
    it based on your experiences. Your programming. This is dangerous, and often useless.
    A distraction from what is truly important to you.
  prefs: []
  type: TYPE_NORMAL
- en: This causes obsession. When something makes little sense to us — we have the
    urge to make sense of it. In order to make sense of it, we need to uncover the
    rest of the story. We want to understand what came before, after, and in between.
  prefs: []
  type: TYPE_NORMAL
- en: Transferring Obsession — The Key To Extreme Success & Not Caring What People
    Think
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Arnold was obsessed. Walt Disney was obsessed. Elon IS obsessed. Joe Rogan IS
    obsessed. Did they care what others thought of them? Did they care about the people
    calling them crazy? No. They were hyper-focused on actualizing an idea that they
    were passionate about, regardless of the short-term payout.
  prefs: []
  type: TYPE_NORMAL
- en: Obsession, to me, signals ordered consciousness. A difficult-to-distract state
    of clarity. Some call it flow, others call it presence. We can label it all day,
    in reality — it just feels good.
  prefs: []
  type: TYPE_NORMAL
- en: “To make an original contribution, you have to be irrationally obsessed with
    something.” — Naval Ravikant
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What story do you want to understand? What is the tip of the iceberg that sparks
    excitement in you? Dive deep into that. This is where most people go wrong. They
    deny themselves the permission to dive into an iceberg of opportunity.
  prefs: []
  type: TYPE_NORMAL
- en: A recent example. I came across an Alan Watts 2-part lecture called “You Are
    God.” That sparked excitement in me. It was a novel perspective that caught my
    attention. Wtf? I’m God? How is that possible? So rather than closing my mind
    to a new idea (like most people in the [pre-rational and rational stages](https://thedankoe.com/why-choosing-a-niche-is-stupid-for-intelligent-people/)
    of development would) I dissected it. I had to piece together the story. What
    led him to saying that? Horizontal and vertical questioning. Since then, I’ve
    listened to the lecture 10+ times, noticed his teachings in other content I am
    consuming (like Actualized.org lectures on God Consciousness), was able to make
    connections (pattern recognition) and at least gain some form of understanding.
  prefs: []
  type: TYPE_NORMAL
- en: I still don’t understand it fully, but that’s the fun in it, no? Will we ever
    explore every square inch of the iceberg we are obsessed with?
  prefs: []
  type: TYPE_NORMAL
- en: Now, all of this obsession stuff is great, but how do we obsess in the right
    direction? A direction that will lead to extreme success?
  prefs: []
  type: TYPE_NORMAL
- en: “Follow your obsessions until a problem starts to emerge, a big meaty challenging
    problem that impacts as many people as possible, that you feel hellbent to solve
    or die trying.” — Justine Musk
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Obsession, in my eyes, is associated with the flow state. People that naturally
    become obsessed with things are entering the flow state over time and labeling
    it as obsession. Entering the flow state is a science. I want to introduce you
    to 2 things.
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Steven Kotler’s 5 Intrinsic Drivers**'
  prefs: []
  type: TYPE_NORMAL
- en: The 5 intrinsic drivers are curiosity, passion, purpose, autonomy, and mastery.
    We have discussed this before — but I want to bring your attention to the “purpose”
    driver.
  prefs: []
  type: TYPE_NORMAL
- en: You cultivate passion by pursuing your curiosity and making connections at the
    intersections of your curiosities. Purpose is born when these “intersections”
    gain real world utility. What is a big problem that you want to solve in the world?
    How can your curiosities solve that big problem? Don’t know? Cool, now you have
    things to research and rabbit holes to go down.
  prefs: []
  type: TYPE_NORMAL
- en: My purpose is to end human suffering. That lights a fire in me. I am doing that
    by studying philosophy, business, spirituality, and other things that allow me
    to spread my message. I am obsessed with this. Random opinions mean nothing because
    I can bring my focus back to my purpose. This is key.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Mihaly Csikszentmihalyi’s Flow Model**'
  prefs: []
  type: TYPE_NORMAL
- en: There is a progression to following obsession. It is a balance of challenge
    and skill.
  prefs: []
  type: TYPE_NORMAL
- en: You can kick into degrees of the flow state at any given moment. You need a
    desired outcome, clarity on how to get there, and a challenge that matches your
    skill.
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-554">![](../Images/27b1a40ab468635b27d4ec24bfb45ca0.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Optimal Experience
  prefs: []
  type: TYPE_NORMAL
- en: If you are pursuing a specific goal (desired outcome) and the journey is boring,
    you need to increase the challenge. If the journey makes you anxious, you need
    to increase your skill. You do this through self-education via the internet.
  prefs: []
  type: TYPE_NORMAL
- en: This will make sense soon.
  prefs: []
  type: TYPE_NORMAL
