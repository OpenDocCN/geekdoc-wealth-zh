- en: Creating The Game You Want To Play In The World You Want To Live In
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-553">![](../Images/e88711e08829d2684bf5fb5d4d5a2193.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: The Game Of Life
  prefs: []
  type: TYPE_NORMAL
- en: A game is a structured story. That is why we love them so much. Games give you
    a structured, goal or quest oriented way of achieving a desired outcome — the
    happy ending of a story.
  prefs: []
  type: TYPE_NORMAL
- en: Everything is a game if you perceive it as a game. Games imply rules, skill,
    challenge, and milestones. We can consciously create these. This is how you predict
    obsession and give yourself something worth focusing on. That is to say, something
    worth caring about so you can stop caring about the things that don’t matter.
  prefs: []
  type: TYPE_NORMAL
- en: When done correctly, other’s opinions, modern distractions, personal insecurity,
    and potential mediocrity stop existing. They only existed in the first place because
    you gave them your attention.
  prefs: []
  type: TYPE_NORMAL
- en: Humans are divine creators. When we are tapped into optimal experience, flow,
    or the present — we open up room for creation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s create our own game:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Creating Your Reality**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As humans, we create our own reality. Your reality is based on your perspective
    and perception. That is how we make sense of the non-sensical. It’s all labels,
    symbols, words, and interpretations strung together into a story. It’s all imaginary
    — as the only thing there is is the present moment. Psychological time — the past
    and future — are just parts of the story that you remember. The points in time
    that you were conscious of. The 1 out of 7 billion perspectives you had at that
    point in time.
  prefs: []
  type: TYPE_NORMAL
- en: If you want any situation to be in your favor — shift your perspective to a
    point where you can create an advantageous perception of the situation. Perspective
    is the camera, perception is the lens. Most people have a camera on a tripod with
    a blurred lens. They won’t move their camera or try to unblur their lens. This
    leads to the inability to see the situation for what it is.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s say you are in a busy coffee shop and see an attractive person. Where
    does your mind go? I guarantee it will be from a faulty perspective, one that
    doesn’t serve you. Your mind will start making excuses.
  prefs: []
  type: TYPE_NORMAL
- en: “What if she denies me and everyone notices? That would be embarrassing.”
  prefs: []
  type: TYPE_NORMAL
- en: “What if she has a boyfriend? I shouldn’t even risk it.”
  prefs: []
  type: TYPE_NORMAL
- en: Every excuse imaginable will flood your head. Notice these thoughts, pause,
    breath, and see the situation for what it is. If you approach the girl and she
    denies you, the situation is over. Everyone is off in their own little reality.
    They won’t care in 5 seconds and you will probably never see them again.
  prefs: []
  type: TYPE_NORMAL
- en: This goes for anything. Afraid to speak in front of a camera and post it online?
    What’s the worst that happens? Somebody calls you a “dweeb” in the comment section?
    Does that comment warrior not have an entire life to live?
  prefs: []
  type: TYPE_NORMAL
- en: Don’t make one comment your entire world. Zoom out. Gain perspective.
  prefs: []
  type: TYPE_NORMAL
- en: '**Creating Your Character**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: “I am not what happened to me, I am what I choose to become.” — Carl Jung
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In many video games, the first thing you do is create your character. The one
    that you want to play as. The character that *you* believe will play the game
    best. Pull out a pen and paper, this is where things get important.
  prefs: []
  type: TYPE_NORMAL
- en: From my experience, the only way to stop playing the game is to win the game.
    If you want initial success in growing on social media — you need to play the
    game. Once you have enough leverage — once you reach max level — you can do whatever
    you want.
  prefs: []
  type: TYPE_NORMAL
- en: What does the maxed out version of your character look like?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What skills and traits will that character develop?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How much gold will that character earn?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What is your vision for the future (desired outcome)? What are the steps to
    getting there (goals & clarity)?
  prefs: []
  type: TYPE_NORMAL
- en: '**Writing Your Story**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Life unfolds in chapters and phases.
  prefs: []
  type: TYPE_NORMAL
- en: If you were to imagine a story of your life being written, what is being written
    right now? What chapter are you in? Are you the protagonist or antagonist? What
    battle are you fighting? Are you on the winning side? What perspective is this
    being written from? Did you care too much about asking the girl out at the coffee
    shop? If so, did you redeem yourself?
  prefs: []
  type: TYPE_NORMAL
- en: “Happiness is the feeling that power increases – that resistance is being overcome.”
    — Nietzsche
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Stories are how we create meaning in life. Meaning is found in the struggle,
    the battle, the resistance being overcome.
  prefs: []
  type: TYPE_NORMAL
- en: Are you going to play to win? Or are you going to play to help others win? Are
    you going to pursue your own character’s storyline? Or are you going to be an
    NPC in another characters storyline? It’s all within your control.
  prefs: []
  type: TYPE_NORMAL
- en: Winning The Game
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Everything is a game.
  prefs: []
  type: TYPE_NORMAL
- en: Social media growth, online business, confidence, self-improvement, skill acquisition,
    etc. Everything.
  prefs: []
  type: TYPE_NORMAL
- en: You start the game by learning the rules, mechanics, and principles.
  prefs: []
  type: TYPE_NORMAL
- en: You play the game by keeping your attention on an intrinsic hierarchy of goals.
  prefs: []
  type: TYPE_NORMAL
- en: You win the game by achieving those goals, gaining experience (XP), and maxing
    out your character’s desired traits.
  prefs: []
  type: TYPE_NORMAL
- en: There is no way around this. You either play the game or get played by the game.
  prefs: []
  type: TYPE_NORMAL
- en: The only way you can stop playing is if you win.
  prefs: []
  type: TYPE_NORMAL
- en: — Dan Koe
  prefs: []
  type: TYPE_NORMAL
