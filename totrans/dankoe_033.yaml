- en: How To Get What You Want Out Of Life
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何从生活中获得你想要的东西
- en: 原文：[https://thedankoe.com/letters/how-to-get-what-you-want-out-of-life/](https://thedankoe.com/letters/how-to-get-what-you-want-out-of-life/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/how-to-get-what-you-want-out-of-life/](https://thedankoe.com/letters/how-to-get-what-you-want-out-of-life/)
- en: 'The modern education system is great at one thing:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 现代教育体系擅长一件事：
- en: '*Training people into replaceable jobs.*'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**将人们培训成可替代的工作**。'
- en: This was a realization I had before I went to college. I knew that even if I
    went, finding the right career for me wasn’t over when graduation came around.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我上大学之前的一个认识。我知道，即使我上了大学，找到适合我的正确职业并不意味着毕业就结束了。
- en: 'I had 2 options if I wanted to make more than enough money to eliminate the
    problems that come from money:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想赚足够的钱来消除金钱带来的问题，我有两个选择：
- en: 'Option 1:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 选项 1：
- en: Climb the corporate ladder
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 爬上企业梯子
- en: Use my skills to build someone elses business
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用我的技能为别人的业务建树
- en: Sacrifice my wants and time for a higher paycheck
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了更高的薪水，牺牲我的欲望和时间
- en: 'Option 2:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 选项 2：
- en: Create my own ladder
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创造自己的梯子
- en: Use my skills to build my own business
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用我的技能建立自己的业务
- en: Sacrifice my free time for leverage toward my goals
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了实现我的目标，牺牲我的空闲时间
- en: I’m being dramatic here, of course.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，我在这里是在夸张。
- en: I’ve been self-employed for 3-4 years now and I am *extremely*out of touch with
    most things. I have a distorted perception of corporate work and am well aware
    of that.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经自雇3-4年了，我对大多数事情都感到**极度**脱节。我对企业工作有一种扭曲的认识，并且对此非常清楚。
- en: From what I’ve seen, there are few lines of work that have a shred of the benefits
    that self-employment do.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 从我所看到的，很少有工作能有一丝自我雇佣的好处。
- en: Ample rest, pursuing an intrinsic hierarchy of goals, not sitting in front of
    artificial blue light for 8 hours, the pursuit of mastery and the deep sense of
    satisfaction that comes with it… the list goes on.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 充足的休息、追求内在的目标层次、而不是坐在人造的蓝光前8小时、追求精通以及随之而来的深刻满足感……等等。
- en: The human psyche, general health, and the *basic need* for self-actualization
    are pushed under the rug for the sake of making a predictable amount of money.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 为了赚取可预测的金额，人类的心理、健康和实现自我价值的**基本需求**被置于次要位置。
- en: This doesn’t make sense when good dopamine comes from hunting for your own survival,
    pursuing the goals *you* set, and achieving mastery in the skills *you* choose
    — not someone that offers to hold your hand toward their goals.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当好的多巴胺来自于追求你自己的生存、追求你设定的目标以及在你选择的技能上达到精通时，这并没有什么意义——不是有人愿意帮你走向他们的目标。
- en: How do you prevent or escape this reality?
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何防止或逃避这种现实？
- en: Skill acquisition, building a creative income source, and adopting the value
    of self-sufficiency.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 技能获取、建立创造性的收入来源，以及采纳自给自足的价值。
- en: But there’s more.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 但还有更多。
- en: '*The internet has leveled the playing field.*'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**互联网已经使竞争更加公平**。'
- en: People of all experience levels are solving their own problems, learning new
    skills, and posting their findings online in an engaging way.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 所有经验水平的人都在解决他们自己的问题，学习新技能，并以吸引人的方式在线发布他们的发现。
- en: This kills 4 birds with one stone.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这一举多得。
- en: Learning leverage building skills through experience (like writing, persuasion,
    and other marketable skills that come with building a brand)
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过经验学习建立杠杆技能（如写作、说服和其他与建立品牌相关的可销售技能）
- en: Building digital leverage (a following, network, and digital real estate that
    lives online forever)
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立数字杠杆（追随者、网络和永远存在于线上的数字房地产）
- en: Studying the interests they truly want to pursue (and learning about them by
    organizing their ideas and posting online)
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究他们真正想要追求的兴趣（并通过组织他们的想法和在线发布来了解它们）
- en: Offering help to those 1-2 steps behind them (because people are losing trust
    in the “system” and want to learn from a human)
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帮助那些在他们后面1-2步的人（因为人们正在失去对“系统”的信任，并希望从人类那里学习）
- en: The state of modern education has been changing right before our eyes.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 现代教育状况正在我们眼前发生变化。
- en: Like Bitcoin, education will continue to decentralize.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 就像比特币一样，教育将继续去中心化。
- en: Creators are the new teachers.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者成为了新的教师。
- en: Consumers are the new students.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 消费者成为了新的学生。
- en: The New Education System
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 新的教育体系
- en: The current education system will not prepare you for the future of work.
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当前的教育体系不会为工作的未来做好准备。
- en: ''
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [July 12, 2022](https://twitter.com/thedankoe/status/1546816648199507969?ref_src=twsrc%5Etfw)
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年7月12日](https://twitter.com/thedankoe/status/1546816648199507969?ref_src=twsrc%5Etfw)
- en: In reality, what I’m going to teach you is the old education system.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，我要教给你的就是旧的教育体系。
- en: Long before government-supported schools came into play, how did we learn?
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在政府支持的学校出现之前，我们是如何学习的？
- en: From our parents, community, and experiences.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 来自我们的父母、社区和经验。
- en: We touched fire, cried for a few minutes, and learned that life implies risk.
    Some controllable, some the product of self-deception and illusion.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们触碰到火，哭了几分钟，并了解到生活意味着风险。有些是可控的，有些是自我欺骗和幻觉的产物。
- en: As humans without an expected path to take (for the sake of being a perfect
    fit into the society that we’ve constructed) we pursued our curiosity, learned
    from experience, and sought out mentors that could help us accelerate our unique
    path.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 作为没有预期路径可走的人类（为了完美融入我们构建的社会），我们追求好奇心，从经验中学习，并寻找能帮助我们加速独特路径的导师。
- en: We’ve got it all backward.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们把一切都搞反了。
- en: 'Since we were young, we’ve been conditioned to:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 从我们小时候起，我们就被训练成：
- en: Please others and be graded on performance (rather than what we truly learned)
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 取悦他人，并按表现评分（而不是我们真正学到了什么）
- en: Cater to the wants and needs of society (because accepting someone elses ideology
    is easier than creating our own way of living)
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 满足社会的需求和欲望（因为接受别人的意识形态比创造我们自己的生活方式要容易）
- en: Limit our own minds to the point of wondering, “Is this all there is?”
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将我们的思维限制到怀疑的程度，“这就是全部了吗？”
- en: This is a disaster.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一场灾难。
- en: Go to school, do what you’re told, get a degree, be trained into a replaceable
    job with a set income that determines your value in society…
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 去上学，按照别人告诉你的去做，获得学位，被训练成一份可替代的工作，拥有固定的收入，这决定了你在社会中的价值…
- en: Question nothing, only see what’s in front of you, and don’t you dare be better
    than me! I say I want the best for you… but that’s just a guise to justify my
    unconscious actions that signal the opposite.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 不质疑任何事情，只看到眼前的东西，不要比我做得更好！我说我想对你最好…但这只是为了证明我无意识的行动，这些行动发出了相反的信号。
- en: The new education system doesn’t rely on society.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 新的教育体系不依赖于社会。
- en: It relies on you.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 它依赖于你。
- en: Self-education is the answer, but nobody knows how to self-educate… and that’s
    kinda the point.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 自我教育是答案，但没有人知道如何自我教育…这正是重点。
- en: 5 Steps To Take Your Education Into Your Own Hands
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5步让你掌握自己的教育
- en: <picture fetchpriority="high" decoding="async" class="wp-image-746">![](../Images/83dd4af91565b770b252d9353dc611a6.png)</picture>
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-746">![](../Images/83dd4af91565b770b252d9353dc611a6.png)</picture>
- en: We haven’t entered another renaissance era.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还没有进入另一个文艺复兴时代。
- en: Ideas, information, and advice are everywhere.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 思想、信息和建议无处不在。
- en: People are losing trust in religion, government, and forced ideology.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 人们正在失去对宗教、政府和强制意识形态的信任。
- en: This leaves us in a perpetual state of anxiety and uncertainty. Order has been
    lost and our minds are hit with the backlash.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这使我们陷入永久的焦虑和不确定状态。秩序已经丧失，我们的心灵遭受了冲击。
- en: In the past, religious doctrine and accepted cultural standards gave us an external
    hierarchy of goals to pursue. It brought order to our lives. We didn’t have to
    *think* about what the future held. A blessing and a curse.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去，宗教教义和接受的文化标准为我们提供了追求目标的外部等级制度。它为我们带来了秩序。我们不必*思考*未来会怎样。这是一件好事，也是一件坏事。
- en: 'Now, we must take matters into our own hands. Here’s how:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们必须自己动手。以下是方法：
- en: '**1) Know Thyself**'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 认识自己**'
- en: If you don’t know what you want, understand what you don’t want and work in
    the opposite direction.
  id: totrans-63
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你不知道你想要什么，了解你不想什么，然后朝相反的方向努力。
- en: ''
  id: totrans-64
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [June 15, 2022](https://twitter.com/thedankoe/status/1537030087874420738?ref_src=twsrc%5Etfw)
  id: totrans-65
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年6月15日](https://twitter.com/thedankoe/status/1537030087874420738?ref_src=twsrc%5Etfw)
- en: What do you want in your future?
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 你想要你未来的什么？
- en: How are you going to get there? What are the goals?
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 你将如何到达那里？目标是什么？
- en: Why do you want to get there? What is important to you?
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 你为什么要达到那里？对你来说什么才是重要的？
- en: Contemplate your [vision, goals, and values](https://youtu.be/h8BrVhksQw8) over
    the next week. Then internalize these next steps.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的一个星期里，思考你的[愿景、目标和价值观](https://youtu.be/h8BrVhksQw8)，然后内化这些下一步。
- en: '**2) Pursue Your Curiosity**'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 追求你的好奇心**'
- en: '3 things:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 3件事：
- en: Potential utility
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 潜在的实用性
- en: Potential creativity
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 潜在的创造力
- en: Potential enjoyability
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 潜在的愉悦性
- en: Those are what you should look for when building a profitable skill stack.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是你构建盈利技能堆栈时应该寻找的东西。
- en: Yes, *stack*. Not singular skill.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，*堆叠*。不是单一技能。
- en: This is where most creatives go wrong. You can’t just create art all day and
    hope someone sees it the way you do.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是大多数创意人士出错的地方。你不能整天创作艺术并希望有人以你的方式看待它。
- en: If you want to pursue an artistic skill, great, do it, but you must be open
    to offering that skill in a way that helps others get what they want.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要追求一项艺术技能，那很好，去做吧，但你必须开放地提供这种技能，以帮助他人得到他们想要的。
- en: Writing, marketing, sales.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 写作、营销、销售。
- en: Learn those. That gives any other skill you choose to learn utility.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 学习这些。这会给任何你选择学习的技能带来实用性。
- en: Enjoyability? That comes with the process. Try things out. Throw sh*t at a wall.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 享受过程？这是自然而然的事情。尝试新事物。把东西扔到墙上。
- en: '**3) Start A Personal Project**'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 开始一个个人项目**'
- en: You can read books and listen to advice all day long, but it means nothing unless
    you apply and experience those teachings.
  id: totrans-83
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你可以整天读书和听建议，但除非你应用并体验这些教诲，否则这一切都没有意义。
- en: ''
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [December 30, 2021](https://twitter.com/thedankoe/status/1476483719653376003?ref_src=twsrc%5Etfw)
  id: totrans-85
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2021年12月30日](https://twitter.com/thedankoe/status/1476483719653376003?ref_src=twsrc%5Etfw)
- en: Projects are powerful.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 项目是有力量的。
- en: One, they get you out of tutorial hell, the endless cycle of learning that tricks
    you into thinking that you are making progress.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 第一，它们让你摆脱了教程地狱，那种让你误以为自己在取得进步的无尽学习循环。
- en: Two, they force you to build something that serves a function in the real world.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，它们迫使你构建一些在现实世界中具有功能的东西。
- en: 'Keyword: *build*.'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 关键词：*构建*。
- en: Three, they teach you how to pursue sources of good dopamine. You can make progress,
    get obsessed, and feel the energy that all great entrepreneurs talk about.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 第三，它们教你如何追求好的多巴胺来源。你可以取得进步，变得着迷，并感受到所有伟大的企业家所谈论的能量。
- en: '[Write a newsletter](https://2hourwriter.com) and uncover the holes in your
    writing.'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '[撰写通讯稿](https://2hourwriter.com)并揭示你写作中的不足之处。'
- en: Create a banner for your brand and be forced to research tools you can use to
    create those images.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 为你的品牌创建一个横幅，并被迫研究你可以用来创建这些图像的工具。
- en: Build out that “million dollar” app idea that you had last year. It’s not like
    you can’t look up “how to build an app” on YouTube, do some digging, and spend
    a few months actually doing it.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 将你去年想到的“百万美元”应用想法发展起来。你不可能在YouTube上找不到“如何构建应用”的教程，做一些调查，然后花几个月时间真正去做。
- en: Don’t let your mind fool you.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 不要让你的思想欺骗你。
- en: '**4) Seek Specific Knowledge**'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 寻求具体知识**'
- en: Fail, then learn.
  id: totrans-96
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 失败，然后学习。
- en: ''
  id: totrans-97
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Act, then ask.
  id: totrans-98
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 先行动，再提问。
- en: ''
  id: totrans-99
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Move, then steer.
  id: totrans-100
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 先移动，再转向。
- en: ''
  id: totrans-101
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A tank full of gas, directions on the map, and hands on the wheel is nothing
    but wishful thinking if your foot is off the pedal.
  id: totrans-102
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你的脚没有踩在油门上，那么一个装满油的坦克、地图上的方向和手握方向盘只是一厢情愿的想法。
- en: ''
  id: totrans-103
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [August 21, 2022](https://twitter.com/thedankoe/status/1561282467243466753?ref_src=twsrc%5Etfw)
  id: totrans-104
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年8月21日](https://twitter.com/thedankoe/status/1561282467243466753?ref_src=twsrc%5Etfw)
- en: Building a project will expose what you don’t know.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 构建一个项目会暴露你不知道的东西。
- en: Trying to learn everything before you start will only delay this process.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始之前试图学习一切只会推迟这个过程。
- en: When you hit a wall, find the solution.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 当你遇到障碍时，找到解决方案。
- en: Buy a course, watch a YouTube video, ask a specific question to someone you
    follow on social media, join a community, and overall… just get involved in a
    digital space that talks about your interests.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 购买一门课程，观看YouTube视频，向你在社交媒体上关注的某人提出具体问题，加入一个社区，总的来说……只是参与一个讨论你兴趣的数字空间。
- en: That’s the beautiful thing about this “new education system.”
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是这种“新教育体系”的美丽之处。
- en: You don’t have to pay a pretty penny to get the answers you need. Everything
    is out there. People just don’t know what to look up because they haven’t started
    a project, failed, and been given a reason to look up something specific.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要花大价钱就能得到你需要的答案。一切都在那里。人们只是不知道该查找什么，因为他们还没有开始一个项目，失败，并且没有理由去查找具体的东西。
- en: '*Creators are the new professors, but teach information that the professors
    can’t teach until the next curriculum update**.*'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '*创作者是新教授，但教授的信息是教授们直到下一次课程更新之前都无法教授的**。'
- en: '**5) Take Your Project Public**'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '**5) 将你的项目公开**'
- en: “Give me a place to stand, and a lever long enough, and I will move the world.”
    — Archimedes
  id: totrans-113
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “给我一个立足点，一个足够长的杠杆，我就能移动世界。” —— 阿基米德
- en: The internet gives anyone the opportunity to build leverage.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网给任何人提供了建立杠杆的机会。
- en: Personal websites
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 个人网站
- en: Writing and educating on social media
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在社交媒体上写作和教育
- en: Building an audience and accepting payments
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立受众和接受支付
- en: Hosting, managing, and distributing your project
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 托管、管理和分发你的项目
- en: The coders of the world have been building solutions for years.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 世界各地的程序员已经为多年。
- en: Most people can do whatever they want if they learn the rules, play the game,
    and be the “man in the arena.”
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 如果人们学会了规则，玩好游戏，并成为“竞技场上的男人”，大多数人都可以做他们想做的事情。
- en: 'One thing I want you to know:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 我想要你知道的一件事：
- en: You will never ever ever get paid for doing what you love if you don’t have
    people to support you.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有支持你的人，你永远不会因为热爱的事情而得到报酬。
- en: The internet gives you access to any and all people with a wi-fi connection
    (if you have a strategy and the know-how to get in front of them).
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网让你可以接触到任何有Wi-Fi连接的人（如果你有策略和进入他们面前的知识）。
- en: Build your project in public. Talk about your journey. Inspire others. And get
    the feedback necessary to make it a success.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 在公共场合构建你的项目。谈谈你的旅程。激励他人。并获得使它成功的必要反馈。
- en: (And remember, no feedback is still feedback. If something isn’t working, giving
    up isn’t the solution, clearly.)
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: （记住，没有反馈也是一种反馈。如果某件事不起作用，放弃显然不是解决办法。）
- en: Until next time, my friends.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 到下次见面时，我的朋友们。
- en: — Dan Koe
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: — 丹·科
