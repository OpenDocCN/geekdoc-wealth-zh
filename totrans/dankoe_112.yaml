- en: This Deep Work Strategy Made Me $700K In 30 Days (As A Procrastinator)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/this-deep-work-strategy-made-me-700k-in-2-weeks-as-a-procrastinator/](https://thedankoe.com/letters/this-deep-work-strategy-made-me-700k-in-2-weeks-as-a-procrastinator/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I procrastinate… a lot.
  prefs: []
  type: TYPE_NORMAL
- en: But I’ve learned that this is a good thing. Procrastination is my superpower
    for achieving what most people think is impossible.
  prefs: []
  type: TYPE_NORMAL
- en: I wait until the last minute, but in that last minute, I launch into the flow
    state and my mind is impossible to distract from the task at hand.
  prefs: []
  type: TYPE_NORMAL
- en: When I do this, the work is of higher quality than if I were to do scattered
    “planned” work for weeks before.
  prefs: []
  type: TYPE_NORMAL
- en: I have other things to worry about, and if my work isn’t the only thing on my
    mind, the quality will suffer.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve discovered that this is a character trait.
  prefs: []
  type: TYPE_NORMAL
- en: It’s how some people are wired.
  prefs: []
  type: TYPE_NORMAL
- en: You only focus when focus is needed.
  prefs: []
  type: TYPE_NORMAL
- en: You are bad at texting people back.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You rarely did your homework on time in school.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Client work is put off until the last minute.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You struggle to make progress in business (because you don’t have someone managing
    you when it’s time to publish a project).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If this is you, procrastination is your key to getting ahead of 99% of people…
    if you learn to harness that power.
  prefs: []
  type: TYPE_NORMAL
- en: The work you procrastinate on isn’t real-time like a video game or sports where
    you get immediate feedback on your effort.
  prefs: []
  type: TYPE_NORMAL
- en: Society has made you feel bad for this character trait. You constantly feel
    like you are falling behind others because you can’t, and shouldn’t, play the
    same game as them.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need to change. You need to understand yourself, structure your life
    accordingly, and make calculated decisions.
  prefs: []
  type: TYPE_NORMAL
- en: Tactical Stress – Forcing Yourself To Survive
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1920">![](../Images/8a171eabf3f8e9d749ec77226d2b5122.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: The best decisions I’ve made are the stupidest.
  prefs: []
  type: TYPE_NORMAL
- en: I maxed out my first credit card at 19 for inventory on a business that failed
    fast.
  prefs: []
  type: TYPE_NORMAL
- en: I signed multiple leases on apartments that I never thought I could afford.
  prefs: []
  type: TYPE_NORMAL
- en: I got rid of everything I owned to fly across the country because I saw an opportunity.
  prefs: []
  type: TYPE_NORMAL
- en: I purchased an expensive software that cleared my bank account as a bet on my
    business success.
  prefs: []
  type: TYPE_NORMAL
- en: I built a landing page and accepted orders for a product before it was built.
    I’ve done this with every launch because, one, if it doesn’t sell, I don’t waste
    more of my time. Second, if it does sell, I’m forced to build it out before the
    launch date.
  prefs: []
  type: TYPE_NORMAL
- en: 'Every time I took these risks, I only gave myself two options:'
  prefs: []
  type: TYPE_NORMAL
- en: Figure it out
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Be crushed
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It was a quarterly powerlifting competition for my mind. I put myself under
    my mental bench press max and forced myself to lift it without a spotter.
  prefs: []
  type: TYPE_NORMAL
- en: 'An example I see often in the business space:'
  prefs: []
  type: TYPE_NORMAL
- en: “Should I purchase this software or take the free option?”
  prefs: []
  type: TYPE_NORMAL
- en: “Should I buy a course or waste my time learning on my own?”
  prefs: []
  type: TYPE_NORMAL
- en: “Should I start or wait until the pain is too great in my current situation
    so I end up starting 2 years later?”
  prefs: []
  type: TYPE_NORMAL
- en: The answer is obvious.
  prefs: []
  type: TYPE_NORMAL
- en: When I spent $1,000 on software (when that was the last $1,000 in my bank account),
    I was forced to learn and build with that software to make that money back.
  prefs: []
  type: TYPE_NORMAL
- en: When I spent $3,500 on a course, I was forced to make the teachings work to
    make that money back.
  prefs: []
  type: TYPE_NORMAL
- en: When I moved into an $8,000/month apartment, I was forced to increase my income
    to make that feel comfortable, resulting in $100,000 extra per month in my bank
    account.
  prefs: []
  type: TYPE_NORMAL
- en: When I made $700K in 30 days from a product that had yet to be built, I was
    forced to do the best work of my life to build it.
  prefs: []
  type: TYPE_NORMAL
- en: For clarity and those who may benefit, the number was actually $687,886 in May
    2023.
  prefs: []
  type: TYPE_NORMAL
- en: 'A few things happened:'
  prefs: []
  type: TYPE_NORMAL
- en: I created a 2-week-long cohort that was 4 calls long on one topic for $150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Things like cohorts have scarcity baked in because there is an enrollment date
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I was increasing the price of another course at the time (more scarcity)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I had the usual sales from my other products
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I used the strategy I will go over later to promote them
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I have a pretty large audience at this point in my journey, and it wouldn’t
    have been possible without putting 4 years of effort into that
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This concoction led to the most money I’ve ever seen in one month.
  prefs: []
  type: TYPE_NORMAL
- en: (**Side note:** With digital products, you can build fast and do this often.
    It only took me 4-5 hours to build the cohort material above. With physical products,
    you have to build them as you sell or put a lot of time into product development,
    like when I launched my book. This is why I heavily test ideas with content and
    digital products first).
  prefs: []
  type: TYPE_NORMAL
- en: You’re okay with where you are because you won’t take the risk that forces you
    to a level you can’t fathom right now.
  prefs: []
  type: TYPE_NORMAL
- en: 'There’s a myth that floats around occasionally:'
  prefs: []
  type: TYPE_NORMAL
- en: Goldfish grow to fit the tank you put them in. But if you keep them in a small
    bowl, they never grow.
  prefs: []
  type: TYPE_NORMAL
- en: In reality, smaller tanks lead to poor water quality and less room to move freely.
    So, it’s not that they never grow, it’s that they suffer and die. A slight but
    important difference.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is similar to my concept of Tactical Stress:'
  prefs: []
  type: TYPE_NORMAL
- en: The conscious decision to force yourself into a do or die situation – knowing
    that you have the skill to make it work – and have no choice but to overcome your
    fears. The result is a season of intensity that propels you into the next level
    of your life.
  prefs: []
  type: TYPE_NORMAL
- en: The purpose of tactical stress is to launch yourself into the unknown, the land
    of infinite potential. Because if you don’t, entropy takes hold and you slowly
    begin to drown and suffer until the pain is so great that you have to do it anyway.
  prefs: []
  type: TYPE_NORMAL
- en: When you launch into new situations that can change your life, you become overwhelmed
    with information.
  prefs: []
  type: TYPE_NORMAL
- en: It’s too much for your mind to digest.
  prefs: []
  type: TYPE_NORMAL
- en: So, you’re forced to be consumed by chaos or to create clarity.
  prefs: []
  type: TYPE_NORMAL
- en: 'You set a goal that is borderline impossible, make a single decision that forces
    you to step off the cliff, and turn the resulting stress into a potent fuel that
    allows you to outwork anybody else. This does a few things psychologically:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Maintains Perspective** – When you are in a do or die situation, you have
    no option but to focus on your goal. Distractions don’t register in your awareness,
    so you can’t fall to them.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Creates A Deadline** – Most deadlines don’t work because they aren’t real.
    If you spend money on something or accept money for something, you are forced
    to deliver. A real deadline is created.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Narrows Focus** – Survival mode puts you in a temporary state of stress.
    Stress narrows your focus on the task at hand, which allows you to survive. The
    only thing on your mind is achieving the goal you set out to achieve.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Makes Life Enjoyable** – Since your goal is top of mind, anything you experience
    is filtered to aid in that goal. The books you read, conversations you have, and
    content you consume all “magically” seem to help you. Dopamine floods your brain
    as pattern recognition gets pushed into overdrive.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If your life isn’t enjoyable or you aren’t making progress, maybe it’s time
    to take a leap.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t for everyone, but what’s *really* holding you back from starting
    a new life? Quitting your job? Not having a plan B?
  prefs: []
  type: TYPE_NORMAL
- en: 'Only give yourself 2 options: win or die. And if you understand that success
    is a result of skill and knowledge, not luck, I have trust that you’ll figure
    it out.'
  prefs: []
  type: TYPE_NORMAL
- en: I don’t want to hear any excuses, because that’s just a prime example of a lack
    of skill. You can’t control your ego and use your brain to create your own path.
  prefs: []
  type: TYPE_NORMAL
- en: Fabricating Urgency – The Deep Work Routine Nobody Talks About
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To start, this will not work unless you take full control of your life.
  prefs: []
  type: TYPE_NORMAL
- en: The reason you show up to a job every day is because your survival is at stake
    if you don’t. If you want to be free, you have to recreate this effect in your
    own work. Most people quit because they have nothing holding them accountable
    to continue writing, building, and selling toward their vision.
  prefs: []
  type: TYPE_NORMAL
- en: Everyone has a desire to be wealthy because they desire to do the work they
    want to do.
  prefs: []
  type: TYPE_NORMAL
- en: Yet, most people suppress this desire because they’ve been conditioned to believe
    they don’t stand a chance. Or they just feel guilty for making money because they
    grew up an environment – physical or digital – that had a terrible relationship
    with it.
  prefs: []
  type: TYPE_NORMAL
- en: The only reason I was able to do this was because I had full control over my
    time and income… because I had a business.
  prefs: []
  type: TYPE_NORMAL
- en: Some of these strategies can help you at work, but you need a business to fully
    leverage the asymmetric payoffs that come from taking risks.
  prefs: []
  type: TYPE_NORMAL
- en: A business gives you the creative boundaries to increase your income as much
    as you’d like. That isn’t possible at 99.99% of jobs, and I’m guessing you aren’t
    in the small minority that will make over $500K/year by working up the corporate
    ladder for 10-20 years when you can achieve that in 1-3 years of focused effort
    on building your own thing. I’ve had multiple friends and students make that amount
    in that timeframe by trusting the audience-building and digital product process
    I teach.
  prefs: []
  type: TYPE_NORMAL
- en: 'The question now is:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“What exactly do I do when I take a risk that forces me to survive?”*'
  prefs: []
  type: TYPE_NORMAL
- en: I’m going to walk you through the exact quarterly planning that led to me making
    the $700K in 30 days.
  prefs: []
  type: TYPE_NORMAL
- en: Repeat this as much as you’d like. You won’t make a ton of money in the first
    few rounds, but as your skill set and audience for your work grows, you will be
    surprised at what you are capable of.
  prefs: []
  type: TYPE_NORMAL
- en: 0) How I Structure My Days
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You’ve probably read about my routine before.
  prefs: []
  type: TYPE_NORMAL
- en: I build new projects in the first block of each morning (right now it’s my next
    book).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I write for the second block of each morning.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I maintain different aspects of the business for the third block of each morning.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I go on walks to clarify ideas and set intentions for my work in between blocks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I go to the gym as a hard cut-off time for my work.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I have a life to enjoy after work, so I know I have to get my work done in the
    time I’ve allotted myself in the morning.
  prefs: []
  type: TYPE_NORMAL
- en: It’s counterintuitive, but my health and life take priority over my work, and
    that makes my work more impactful.
  prefs: []
  type: TYPE_NORMAL
- en: I have to go to the gym at the same time so I can be free in the afternoons,
    so my work is naturally focused because of this.
  prefs: []
  type: TYPE_NORMAL
- en: 1) Quarterly Projects
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you don’t sell your own product, you will be forced to sell someone elses.
  prefs: []
  type: TYPE_NORMAL
- en: 'There is a mind virus in the online space:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“It seems like everyone is selling something nowadays.”*'
  prefs: []
  type: TYPE_NORMAL
- en: '*“Look at this guy selling a product, he’s a sell out.”* (I see this under
    many high level individuals posts).'
  prefs: []
  type: TYPE_NORMAL
- en: '*“Ads ads ads ads.”* (I saw this on Ali Abdaal’s promotion the other day).'
  prefs: []
  type: TYPE_NORMAL
- en: Yes, silly, you need a product to earn an income. There literally is no other
    way. That’s how the economy works. Buying and selling. Sure, you can invest money,
    but where did you get that money? By playing a mechanical role in a company that
    sells a product and pays you a paycheck in return for your replaceable efforts.
    And if you don’t make a lot of money, good luck ever making anything substantial
    through investing.
  prefs: []
  type: TYPE_NORMAL
- en: Ignore the blind hypocrites and launch a product anyway.
  prefs: []
  type: TYPE_NORMAL
- en: Ever since I started my business, I’ve launched a new project every quarter.
    Why?
  prefs: []
  type: TYPE_NORMAL
- en: '**It gave me plenty of ideas to write about relating to the product (because
    I was fleshing out the outline).** I wrote most of the product as tweets and newsletters
    to test what ideas and marketing angles worked before I launched.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Product *launches* are the most profitable part of your products timeline.**
    Like a graph that shoots up fast, drops hard, and levels out at a certain number.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**I wanted to diversify my income streams.** When you’re building an audience,
    one product can do well, but you wouldn’t bet on one stock to make you rich.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**I became more experienced and had something more valuable to launch each
    quarter.** If you’re doing this whole business thing right, you should have something
    new and better than the competition that you should launch. This leads to a lot
    of people copying you to capitalize on your good ideas, but you still get most
    of the sales and reputation. Quarterly launches keep you on top.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**I don’t have to worry about being extremely successful with one launch**
    because I know I’ll be iterating on it within 3 months.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**It gave me quarterly public deadlines to hit.** I didn’t have to guess when
    my next project was going to launch (so I couldn’t get stagnant with my business).
    If I wanted my income to increase – rather than decrease – I had to launch a product
    to survive.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: People often ask, “What is the one thing that helped you get so far ahead of
    other people in this space?”
  prefs: []
  type: TYPE_NORMAL
- en: I would confidently say it’s launching a project every quarter.
  prefs: []
  type: TYPE_NORMAL
- en: It built my authority, kept me focused, and prevented me from trying to fuel
    a dead product.
  prefs: []
  type: TYPE_NORMAL
- en: What kind of products can you launch in such a short time frame?
  prefs: []
  type: TYPE_NORMAL
- en: Courses
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cohorts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Coaching
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: eBooks
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Templates
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can build and test these fast. If one fails, that’s fine, build another.
    If it works, great, start building complimentary products and consider turning
    that idea into a business that demands more capital or resources. As an example,
    the success of 2 Hour Writer is what led to the idea of building Kortex. The idea
    is already validated with sales and engagement because the product and content
    that led to it were validated.
  prefs: []
  type: TYPE_NORMAL
- en: At the start, these should form the foundation of your brand and build cash
    flow. Don’t try to get complex with the products you create until you have the
    resources to do so.
  prefs: []
  type: TYPE_NORMAL
- en: Then, you can plan for bigger products like a software to launch in one of those
    quarterly spots, but still keep launching other things.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, you don’t need to launch an entirely new product. You can:'
  prefs: []
  type: TYPE_NORMAL
- en: Combine products into a bundle and launch that.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Add a new module to a current product increase your prices – you would promote
    the price increase “launching” on a specific date.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Run the same cohort over and over again each quarter. This is probably the simplest
    way to go about this. I would recommend having different topics for each cohort
    so you can attract customers with different needs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By doing this every quarter, I could measure the impact and authority of my
    brand based on my revenue from the launch.
  prefs: []
  type: TYPE_NORMAL
- en: When I launched a freelancing product around 500 followers, I made around $3K.
    When I launched a branding product when I hit 10,000 Twitter followers, I made
    around $10K. 3 years later when I launched a writing cohort, I made $700K. People
    who only sell one product (and don’t improve it) end up marketing too hard and
    destroying their trust with their audience while making much *much* less in revenue.
  prefs: []
  type: TYPE_NORMAL
- en: There is a lot of nuance to product launches. We guide you through it all in
    the Builder tier of [Kortex University](https://university.kortex.co).
  prefs: []
  type: TYPE_NORMAL
- en: '**The Lesson**'
  prefs: []
  type: TYPE_NORMAL
- en: Your deep work sessions are fueled by your quarterly product launches.
  prefs: []
  type: TYPE_NORMAL
- en: Embrace procrastination at the start. You have time before the launch.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Work on the product outline and plan for 1-2 months leading up to your launch.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Set a public launch date. Set a first promotion date 3-4 weeks before that.
    Build the sales page to accept orders first. Execute the launch and get the product
    built.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you read the last letter on [The 12 Rules Of Creation](https://thedankoe.com/letters/disappear-and-come-back-unrecognizable-12-rules-to-change-your-life/),
    you understand that these projects are crucial for structuring your life and work.
    They are the single thing that move the needle toward your vision and goals. If
    you aren’t building, you’re dying.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Public Writing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In online business, you need three things:'
  prefs: []
  type: TYPE_NORMAL
- en: An audience for your work.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A valuable product for that audience.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Good arguments to attract people to your audience and product.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Writing is the foundation of all three of those.
  prefs: []
  type: TYPE_NORMAL
- en: 'I want to harp on this again:'
  prefs: []
  type: TYPE_NORMAL
- en: '*A valuable product for that audience.*'
  prefs: []
  type: TYPE_NORMAL
- en: If you own a business, this newsletter won’t bother you in the slightest because
    you are reading it through an enlightened lens.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t own a business, you may misinterpret or only read it from a one-sided
    viewpoint, especially if you have a bad relationship with money. You have to zoom
    out and realize that people buy products because they want them and benefit their
    lives. This isn’t only about making as much money as possible. It’s about solving
    a problem in someone’s life that is *worth more* than what you are asking.
  prefs: []
  type: TYPE_NORMAL
- en: And, I’d also ask you to zoom out and think about all of the useless products
    you buy that don’t benefit your life and ask yourself why you don’t apply that
    mindset to other areas. People will spend $100 on drinks without batting an eye
    (and destroy their health as an outcome), but won’t spend $100 on their skill
    development (that increases their earning capacity and therefore quality of life).
  prefs: []
  type: TYPE_NORMAL
- en: 'In [2 Hour Writer](https://2hourwriter.com) (gotcha), I teach the 3-point content
    ecosystem:'
  prefs: []
  type: TYPE_NORMAL
- en: Write tweets to test ideas.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Write threads to expand on those ideas.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Turn any of those into a newsletter to nurture your audience and promote your
    products.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use your newsletter to write new tweets and threads so you never run out of
    content ideas.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: My friend Nick Verge asked about this process the other day. Here’s a screenshot
    if it helps see it from a big picture.
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1918">![](../Images/b41cae9b09f056f887e7e8eee6abbce8.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Writing is the necessary foundation of this strategy. I can’t tell you exactly
    what to do because I don’t understand your situation, but I can tell you what
    I do.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t have a lot of time on your hands right now, you won’t be able to
    do all of this, and that’s okay. You don’t need to for your first few product
    launches that replace your income.
  prefs: []
  type: TYPE_NORMAL
- en: '**I write for 60-90 minutes every morning.** I start with my newsletter and
    write social posts as the ideas come.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**I promote my newsletter once a day.** I don’t post opt-in pages asking people
    to subscribe. I post the actual newsletter (as a blog post) so people can read
    it, get value, subscribe, and see the products I promote in the newsletter. This
    is how I get newsletter subscribers and sell my products whenever I am not launching
    a product.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**I focus my content during the product launch month.** I will write about
    whatever I want for 2 months leading up to the launch, then write only about topics
    related to what I’m launching for the remaining month. (This is when I gain the
    most followers and authority… when I’m dishing out value and launching a product
    that shows my expertise.)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I outline and build the product along the way, but am forced to actually finish
    it before the public deadline.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How do I stay consistent with writing?
  prefs: []
  type: TYPE_NORMAL
- en: Because I understand that if I don’t write, my audience won’t grow, and I won’t
    survive. I keep myself in a constant state of good pressure that wakes me up in
    the morning and gets me writing.
  prefs: []
  type: TYPE_NORMAL
- en: If my audience doesn’t grow, my product launch won’t do well, and I’m that much
    closer to getting a job. Plus, as you build projects, you have much more on the
    line. If I stop writing now, Kortex as a whole will die. I need money to build
    it. And I will not let it die.
  prefs: []
  type: TYPE_NORMAL
- en: Once it’s stable, I can take a break, but I’m going to start a new project so
    my life can remain meaningful and not become mechanical / boring.
  prefs: []
  type: TYPE_NORMAL
- en: Please note that writing isn’t the ONLY thing here. You have to understand how
    to grow on socials. You can’t just post content into the wind and pray it does
    well. I’ve [talked about this before](https://thedankoe.com/letters/how-to-actually-grow-on-social-media-what-they-dont-tell-you/)
    and will talk about it in next week’s letter.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Tactical Promotion
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'So far our deep work routine is structured as so:'
  prefs: []
  type: TYPE_NORMAL
- en: '**A public quarterly project that moves the needle toward our vision and goals.**
    This creates a real deadline, but *only* if you charge for the value you are creating
    under a business.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Daily writing to fuel the projects success by building a tiered audience.**
    I write tweets and threads to attract the audience, funnel them to my newsletter,
    and promote my products after I’ve given enough value.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, I’m not a fan of heavy marketing and sales on social media.
  prefs: []
  type: TYPE_NORMAL
- en: I’m a fan of tactical promotions.
  prefs: []
  type: TYPE_NORMAL
- en: I only promote my products on social media during the last week of launch. This
    keeps my profile clear of sales for all but 4 weeks out of the year. People like
    that and often compliment the fact that I’m not “pushy or salesy.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I have a soft promotion in each of my newsletters like you’ve seen above. That’s
    how I fuel previous products I’ve built outside of launches. I think people are
    tired of hard sales every day in their email and want a lot of value with the
    *choice* to buy something. They don’t want to feel forced.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Leading up to the product launch, I promote more and more each week. Most of
    my income is made in the 1-2 days before launch because that’s when scarcity kicks
    in.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That’s my entire strategy.
  prefs: []
  type: TYPE_NORMAL
- en: That’s what holds me accountable to work and write every morning.
  prefs: []
  type: TYPE_NORMAL
- en: That’s how I’ve 80x’d (yes, that’s correct) my income since having a web design
    job 5 years ago.
  prefs: []
  type: TYPE_NORMAL
- en: If you quite literally *plan* for iteration and persistence and force yourself
    to do the work with proper strategies, failure is a myth.
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading. Enjoy your weekend.
  prefs: []
  type: TYPE_NORMAL
- en: Dan
  prefs: []
  type: TYPE_NORMAL
