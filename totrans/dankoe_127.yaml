- en: How To Create Your Niche Of One (Become Nicheless)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何创建你的独特领域（成为无领域）
- en: 原文：[https://thedankoe.com/letters/how-to-create-your-niche-of-one-become-nicheless/](https://thedankoe.com/letters/how-to-create-your-niche-of-one-become-nicheless/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://thedankoe.com/letters/how-to-create-your-niche-of-one-become-nicheless/](https://thedankoe.com/letters/how-to-create-your-niche-of-one-become-nicheless/)'
- en: The most authentic, profitable, and unique niche is you.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 最真实、最盈利、最独特的领域就是你。
- en: I realized this after years of pain.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我在多年的痛苦之后意识到了这一点。
- en: 'Excruciating pain caused by the first piece of advice you’ll hear when you
    first embark on your journey to become a free individual:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 当你刚开始踏上成为自由个体的旅程时，你将听到的第一条建议带来的痛苦是难以忍受的：
- en: “Niche down.”
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: “缩小领域。”
- en: Just like the social matrix, there is a business matrix.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 就像社会矩阵一样，有一个商业矩阵。
- en: The social matrix is a web of beliefs and ideas that act as anchors for your
    mind to make sense of the world.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 社会矩阵是一系列信念和想法的网络，它作为你心智理解世界的锚点。
- en: The government and culture influence the school system. The school system creates
    resources for students to learn from. The students don’t question what they’re
    taught. The students go on to be parents. The parents teach their children what
    they know and send them to school. The children make friends and conform further
    to fit in. The children grow up, get jobs, become teachers, become parents, become
    politicians, and create the knowledge and resources online and offline that influence
    culture. The parents, students, and children vote. The cycle continues to create
    the society we live in.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 政府和文化影响学校系统。学校系统为学生提供学习资源。学生不会质疑他们所学的。学生成为父母。父母教他们的孩子他们所知道的知识，并送他们上学。孩子们交朋友，进一步适应以融入其中。孩子们长大成人，找到工作，成为教师，成为父母，成为政治家，并在线上线下创造影响文化的知识和资源。父母、学生和孩子们投票。这个循环继续创造我们生活的社会。
- en: This isn’t bad, it’s just how we learn to survive. But if we don’t question
    what we learned, we end up a clone like everyone else.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不坏，这只是我们学会生存的方式。但如果我们不质疑我们学到的知识，我们最终会像其他人一样成为克隆体。
- en: The business matrix is a similar web of beliefs and ideas that illustrate how
    businesses are “supposed” to operate.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 商业矩阵是一个类似的信念和想法的网络，它说明了企业“应该”如何运作。
- en: Pick a skill.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一项技能。
- en: Pick a niche.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个领域。
- en: And do the same thing all over again.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 然后再次做同样的事情。
- en: Do work you don’t care about for people you don’t care about to live a life
    you don’t care about.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 为你不在乎的人做你不在乎的工作，过你不在乎的生活。
- en: You are a human. You learn by being exposed to beginner-level knowledge, then
    intermediate and advanced.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 你是人。你通过接触入门级知识，然后是中级和高级知识来学习。
- en: The thing is, who questioned this beginner-level knowledge from the start?
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，从一开始是谁质疑了这种入门级知识的？
- en: Are we absolutely sure it is the best way to go about things?
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我们绝对确定这是最好的行事方式吗？
- en: Is it the most conducive to results? Or does it cause more confusion that makes
    people quit too early?
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这是最有利于结果吗？还是它造成了更多的困惑，让人们过早地放弃？
- en: You decided to start a business to *escape* the mechanical and meaningless lifestyle,
    not to create a new one where you can earn a bit more.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 你决定开始创业是为了*逃离*机械和无意义的生活方式，而不是创造一个可以赚更多钱的新生活方式。
- en: Those that break free of the business matrix can do whatever they want.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 那些摆脱商业矩阵的人可以随心所欲地做任何事情。
- en: But you can’t break free in an instant.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 但你不能瞬间解脱。
- en: You have to understand the rules of the game and acquire enough experience before
    you can start playing your own game.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在你开始玩自己的游戏之前，你必须理解游戏规则并积累足够的经验。
- en: It Never Made Sense. It Never Worked. Until…
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从来都没有意义。从来都没有成功过。直到…
- en: When I began my business journey I started with freelancing.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 当我开始我的商业旅程时，我从自由职业开始。
- en: I thought it was the most “beginner-friendly” option because all I had to do
    was “learn a skill, sell a skill.”
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这是最“适合初学者”的选项，因为我只需要“学习一项技能，出售一项技能。”
- en: So, I decided to try my hand at freelancing with almost every skill you can
    think.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我决定尝试几乎你能想到的所有技能的自由职业。
- en: Video editing, graphic design, SEO, content marketing, Facebook Ads, and web
    design.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 视频剪辑、平面设计、SEO、内容营销、Facebook 广告和网页设计。
- en: My pain point was always picking a niche.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我的痛点一直是选择一个领域。
- en: I’d download free guides and run endless Google searches on the “top 100 niches
    to target.”
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我会下载免费的指南，并在“顶级100个目标领域”上进行无休止的谷歌搜索。
- en: I targeted dentists, gyms, construction companies, and the rest.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我的目标是牙医、健身房、建筑公司以及其他。
- en: What are the problems with this approach?
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法有什么问题？
- en: '**I don’t care about these people.** I would (and did) hate working with them.
    This isn’t a sustainable approach to something as important as your life’s work.
    You’re starting a business for a reason, and it isn’t to just have a new boss.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**我不在乎这些人。** 我会（并且确实）讨厌与他们合作。这不是对你生命中如此重要的事情的一种可持续的方法。你创业是有原因的，并不是为了仅仅有一个新的老板。'
- en: '**I don’t have experience with their business.** *Most businesses fail because
    they try to solve a problem they haven’t experienced.* Remember that. Feel free
    to come back to me when you ignore this and fail.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**我没有与他们商业的经验。** *大多数企业失败是因为他们试图解决他们没有经历过的问题。* 记住这一点。如果你忽视了这一点并失败了，随时欢迎回来找我。'
- en: '**It prioritizes *finding*, not attracting or becoming.** You learn a skill
    for someone else. You search endlessly for people to reach out to and end up spending
    more time on lead generation than building leverage.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**它优先考虑*寻找*，而不是吸引或成为。** 你为别人学习一项技能。你无休止地寻找可以联系的人，最终花费更多的时间在客户开发上，而不是建立杠杆。'
- en: It’s no wonder people don’t stick to building a business.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人坚持建立业务也就不足为奇了。
- en: The business ideologies circling the space have dominated for too long.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 空间中环绕的商业理念已经主导了太久。
- en: They are shallow and lack regard for human nature, psychology, and fulfillment.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 它们是肤浅的，缺乏对人性、心理学和满足感的考虑。
- en: I will give you a better way to go about creating a niche of one. A way that
    is intuitive, profitable, and sustainable.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我将给你一个更好的方法来创建一个细分市场。这是一种直观、有利可图且可持续的方法。
- en: '**A few lessons that will spare you a lot of pain:**'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**一些能让你避免很多痛苦的教训：**'
- en: 1) The endless shiny object syndrome you have with finding a niche is a blatant
    sign that business hasn’t “clicked” for you yet. You haven’t failed enough. You
    haven’t produced enough. You can make any niche work. That’s why it’s wise to
    create your own.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 1) 你在寻找细分市场时那种永无止境的闪亮物体综合症是商业对你来说还没有“点击”的一个明显迹象。你还没有失败足够多。你还没有产出足够多。你可以让任何细分市场发挥作用。这就是为什么创造自己的细分市场是明智的。
- en: 2) Build a product or service that **you** would actually buy, use, and benefit
    from. There aren’t many shortcuts in business, but this is one of them. When you
    do that, you become the niche, and you can focus on marketing to your past and
    current self.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 2) 建立一个你实际上会购买、使用并从中受益的产品或服务。商业中很少有捷径，但这是其中之一。当你这样做时，你就成为了细分市场，你可以专注于向你的过去和现在自己进行营销。
- en: Those two lessons are what changed everything for me.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个教训改变了我的一切。
- en: The Most Profitable Niche Is You (Productize Your Mind)
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最有利可图的细分市场是你自己（产品化你的思维）
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1653">![](../Images/9af7a7b630d22bf5887c51ec08665c78.png)</picture>
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1653">![](../Images/9af7a7b630d22bf5887c51ec08665c78.png)</picture>
- en: Most people don’t realize that they belong to a very specific niche.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人没有意识到他们属于一个非常具体的细分市场。
- en: You follow a broad number of people with various interests that have created
    your personality and identity.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 你关注着许多具有各种兴趣的人，这些人塑造了你的个性和身份。
- en: Personality and identity are created by the information you are repeatedly exposed
    to.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 个性和身份是由你反复接触到的信息塑造的。
- en: 'This is mistake number one when creating your niche:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这是创建细分市场时的第一个错误：
- en: If your job is to target a specific person, and you are a specific person, why
    are you narrowing in on one specific interest that you want to sell a product
    or service around? Do **you** not have more than one interest? Do you not already
    follow people that talk about their opinions, their values, their lifestyle, **and**
    their expertise?
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的工作是针对一个特定的人，而你本身就是一个特定的人，为什么你要缩小到一个特定的兴趣，你想要围绕这个兴趣销售产品或服务？难道你没有超过一个兴趣吗？难道你还没有跟随那些谈论他们的观点、价值观、生活方式**以及**他们的专业知识的人吗？
- en: No, talking about one specific skill or interest won’t make you more authoritative.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 不，谈论一个特定的技能或兴趣不会让你更有权威。
- en: No, people won’t trust you more.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 不，人们不会更加信任你。
- en: At best, you’ll look like a glorified search engine of “actionable advice.”
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的情况是，你看起来像是一个“可操作建议”的夸大的搜索引擎。
- en: At worst, you limit your audience growth and can’t leverage a wider network.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 最坏的情况是，你限制了你的受众增长，无法利用更广泛的网络。
- en: If someone only talked about the niche they chose, like training programs for
    entrepreneurs and executives, they would only attract those people.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有人只谈论他们选择的细分市场，比如企业家和执行人员的培训计划，他们只会吸引那些人。
- en: This isn’t bad, but it’s such a small sample size, and this isn’t paid ads where
    you can pinpoint ad placements to get in front of these people.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不坏，但样本量如此之小，这也不是付费广告，你可以精确地定位广告位置，让这些人出现在你面前。
- en: 'When they only talk to that niche:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 当他们只与那个细分市场交流时：
- en: They have more difficulty at the start.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们一开始会有更多的困难。
- en: Fewer people share their content (they can’t get in front of the right people)
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分享内容的人更少（他们无法接触到正确的人）。
- en: They may grow to 5,000 followers in a year when someone who incorporated their
    interests can grow to 20,000 in a year
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当有人结合了他们的兴趣时，他们可能一年内增长到5,000粉丝，而另一个人可能一年内增长到20,000粉丝。
- en: After 3 years, the first gets to 30,000 followers and the second gets to 300,000
    because of the compounding effect.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 经过3年后，第一个达到30,000粉丝，第二个因为复利效应达到300,000粉丝。
- en: “But Dan, those 300,000 followers don’t care about my product or service. They’re
    not hot leads. They aren’t going to buy from me right away. They’re useless.”
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: “但是Dan，那300,000名粉丝对我的产品或服务不感兴趣。他们不是热线索。他们不会立即从我这里购买。他们是没用的。”
- en: There is a lot to unpack there.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有很多东西需要解释。
- en: First, if those 300,000 followers each know 3-5 people that they can refer to
    you, that’s a 900,000 to 1,500,000 audience thanks to the network effect. All
    while the 30,000 follower hyper-niched-down guy is struggling to have enough leverage
    to get out of manual client work.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，如果那300,000名粉丝中的每个人都能推荐3-5个人给你，那么凭借网络效应，你就有900,000到1,500,000的观众。而那个只有30,000粉丝的超细分领域的人还在努力争取足够的杠杆力量来摆脱手动客户工作。
- en: Second, they’re not supposed to buy from you right away. That’s the entire purpose
    of writing content. You *help* them go from beginner (content) to advanced (product)
    with time. You **create** customers by raising them up the levels of awareness.
    You attract with social media, educate with newsletters, emails, or free downloads,
    and help them implement with your product or service.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，他们不应该立即从你这里购买。这正是写作内容的全部目的。你*帮助*他们随着时间的推移从入门（内容）到高级（产品）。你通过提升他们的意识层次**创造**客户。你通过社交媒体吸引他们，通过新闻通讯、电子邮件或免费下载进行教育，并通过你的产品或服务帮助他们实施。
- en: Third, nobody is a useless follower, you are just so narrow-minded and indoctrinated
    with outdated business dogma that you don’t understand that people can learn something
    new that improves their life.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 第三，没有人是无用的粉丝，你只是如此狭隘和受过时商业教条的洗脑，以至于你不理解人们可以学习到一些能改善他们生活的新东西。
- en: '**Lesson**: You can go on social media right now, read a post, and become interested
    in a new topic. You aren’t just born with specific interests. You are persuaded
    of their importance (like how lifting weights can give you confidence, improve
    your health, and make you look good), so you slowly adopt them as an interest.
    Then, *you become a part of that niche.*'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**教训**：你现在就可以上社交媒体，读一篇帖子，并对一个新话题产生兴趣。你并不是生来就有特定的兴趣。你被说服了它们的重要性（比如举重可以给你自信，改善你的健康，让你看起来更好），所以你慢慢地把它们作为兴趣接受。然后，*你成为了那个细分市场的一部分*。'
- en: So, your job is to argue why your interests are valuable to adopt. All of your
    content is persuasive arguments – like how this letter argues that you are the
    niche.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，你的工作是论证为什么你的兴趣值得采纳。你所有的内容都是说服性的论点——就像这封信如何论证你是细分市场。
- en: 'Meaning:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 意味着：
- en: You aren’t *targeting* a niche. You *are* a niche and your job is to persuade
    people to join it.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 你并不是在**针对**一个细分市场。你**就是**一个细分市场，你的工作是说服人们加入它。
- en: By the way, I teach all of this in [Digital Economics](https://digitaleconomics.school).
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 顺便说一句，我在[数字经济学](https://digitaleconomics.school)中教授所有这些内容。
- en: A “Niche” Is A Worldview or Perspective
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: “细分市场”是一种世界观或观点。
- en: <picture decoding="async" class="wp-image-1654">![](../Images/804825ab5735aa78b9cc4284b44a70f2.png)</picture>
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-1654">![](../Images/804825ab5735aa78b9cc4284b44a70f2.png)</picture>
- en: Let’s break down what a niche actually is.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分析一下细分市场实际上是什么。
- en: When you are the niche, and who you are is constantly changing, you are niche-less.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 当你是细分市场，而你又是不断变化的，那么你就没有细分市场。
- en: You can be like Zuby who makes music and sells tickets to shows one day, talks
    about politics the next day, and sells a fitness ebook the next.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以像Zuby一样，有一天制作音乐并出售演唱会门票，第二天讨论政治，第三天又出售健身电子书。
- en: Or you can be like Hamza who has an extremely broad niche like self-improvement
    where he talks about confidence, dating, masculinity, business, and whatever else
    he’s *interested in.*
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 或者你可以像Hamza一样，拥有一个非常广泛的细分市场，比如自我提升，他在那里讨论自信、约会、男性气质、商业以及他*感兴趣*的任何其他事物。
- en: '**Your niche is what you are interested in and why it’s important to your life.**'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**你的细分市场是你感兴趣的东西以及为什么它对你的生活很重要**。'
- en: You don’t box yourself into hyper-specific skills or interests that you will
    outgrow because you are human. You will grow bored of it. Or it will no longer
    serve you, like talking about agency work, because you change what you do as your
    business grows. Locking yourself into a niche makes it extremely difficult to
    develop yourself beyond it. Your business evolves as you evolve. If your business
    is a narrow niche, you limit your own potential.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 你不会把自己局限于超具体的技能或兴趣，因为你是人类。你会对它感到厌倦。或者它将不再为你服务，比如谈论代理工作，因为随着你的业务增长，你做的事情也在改变。将自己锁定在一个细分市场会使你很难超越它。你的业务随着你的成长而发展。如果你的业务是一个狭窄的细分市场，你限制了自身的潜力。
- en: Now, why are you told to niche down in the first place?
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，为什么你一开始就被建议要缩小范围呢？
- en: So you can understand the mind of your readers and customers.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你可以理解你的读者和客户的想法。
- en: 'You’re told to create a customer avatar, identify a burning problem they face,
    and position a solution toward them. (This solution is often the same as any other
    product on the market with small changes. The point is to make it *perceived *as
    valuable to a specific person by understanding them. **Hack**: recreate what already
    exists, but better, and don’t overcomplicate it).'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 你被告知要创建一个客户画像，确定他们面临的紧迫问题，并向他们提供解决方案。（这个解决方案通常与市场上任何其他产品类似，只是略有不同。关键是通过了解他们，使它被感知为对特定个人有价值。**技巧**：重新创造已经存在的东西，但做得更好，不要过于复杂）。
- en: '*So, why don’t we skip all of that and treat ourselves as the customer avatar,
    solve problems that we’ve actually experienced, and build a solution that actually
    benefits our lives.*'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '*那么，我们为什么不跳过所有那些，把自己当作客户画像，解决我们真正经历过的问题，并建立一个真正对我们生活有益的解决方案呢？*'
- en: And once you grow as a person, you build and distribute a new solution.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你作为一个个人成长，你将创建并分发一个新的解决方案。
- en: This eliminates 99% of the guesswork with making money.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这消除了赚钱的99%的猜测。
- en: And, you don’t end up working with people you don’t like.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 并且，你不会与不喜欢的人合作。
- en: In essence, a customer avatar is the mind, worldview, or perspective of someone
    you are creating for or marketing toward.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，客户画像是你为或向其营销的人的思维、世界观或观点。
- en: 'From a structural standpoint, a worldview or perspective is composed of:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 从结构角度来看，世界观或观点由以下组成：
- en: '**1) Goals**'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 目标**'
- en: The conscious or unconscious goals that influence every single action you take,
    like taking one step forward or going to the gym.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 影响你采取每一个行动的有意识或无意识的目标，比如向前迈出一小步或去健身房。
- en: Self-generated goals put you in control of your life.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 自我设定的目标让你掌控自己的生活。
- en: Goals frame how you interpret situations. A person with the assigned goal of
    society to retire at 60 years old will see fewer business opportunities as opportunities
    than a person with a self-generated goal of financial freedom at 25 years old.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 目标决定了你如何解读情况。一个被社会赋予目标在60岁退休的人，会比一个设定了在25岁时实现财务自由目标的人看到更少的商业机会。
- en: Goals also frame how you (or your readers) interpret books and content. Two
    people with different goals will have radically different highlights of the books
    and content. They will notice the things that aid in their goals – whether they
    are aware of it or not.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 目标也决定了你（或你的读者）如何解读书籍和内容。拥有不同目标的人会对书籍和内容有截然不同的重点标注。他们会注意到有助于实现目标的事物——无论他们是否意识到这一点。
- en: '**2) Problems**'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 问题**'
- en: The conscious or unconscious problems that prevent you from reaching your goals
    or ideal lifestyle.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 阻碍你实现目标或理想生活方式的有意识或无意识的问题。
- en: The foundation of marketing is to raise your readers’ level of awareness surrounding
    their problems over time.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 市场营销的基础是随着时间的推移提高读者对其问题的意识水平。
- en: If you’ve solved your own problems and are helping your audience do the same,
    you are in a great position.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经解决了自己的问题，并帮助你的观众也这样做，你处于一个很好的位置。
- en: 'The 5 levels of awareness are:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 意识的5个层次是：
- en: '**Unaware** – unaware of their problem and how it is hurting their quality
    of life.'
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**无意识**——不知道他们的问题以及它如何损害他们的生活质量。'
- en: '**Problem aware** – aware of their problem but don’t know how to solve it.'
  id: totrans-99
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**问题意识**——意识到他们的问题，但不知道如何解决它。'
- en: '**Solution aware** – aware of their problem and know there is a solution, education,
    or knowledge to solve it.'
  id: totrans-100
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**解决方案意识**——意识到他们的问题，并知道有解决方案、教育或知识可以解决它。'
- en: '**Product aware** – aware of their problem and know there is a streamlined
    path or system to solve it.'
  id: totrans-101
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**产品意识**——意识到他们的问题，并知道有简化的路径或系统可以解决它。'
- en: '**Most aware** – they are ready to change, they just need the right “why” that
    changes behavior instantly. Like when you read an idea in the book and it changes
    you entire outlook on life.'
  id: totrans-102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**最清醒** - 他们准备好改变，他们只需要一个能够立即改变行为的“为什么”。就像你在一本书中读到某个想法，它改变了你整个的人生观。'
- en: When your worldview is your niche, your job is to write in a creative fashion
    that increases people’s awareness of their problems. That way, they act on a solution
    toward reaching their goals.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的世界观是你的细分市场时，你的工作是以一种创造性的方式写作，增加人们对他们问题的认识。这样，他们会采取行动，朝着实现目标的方向寻求解决方案。
- en: 'Another way of thinking of it:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种思考方式：
- en: Every piece of content you write and every product you build helps people learn
    the knowledge or skills that allow them to reach the *goals of your brand.* The
    bigger the goal, the more people you can attract and help.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 你所写的每一篇内容和所构建的每一个产品，都帮助人们学习那些使他们能够实现**你品牌目标**的知识或技能。目标越大，你能够吸引和帮助的人就越多。
- en: You help them reach the goal by solving problems or pain points.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过解决问题或痛点来帮助他们实现目标。
- en: So, your content and products argue why achieving a specific goal is important
    and give them the knowledge, tools, and education to solve the problems standing
    in the way.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你的内容和产品论证实现特定目标的重要性，并给他们提供知识、工具和教育，以解决挡在他们道路上的问题。
- en: '**3) Potential paths**'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 潜在路径**'
- en: The last piece of the worldview puzzle is clarity.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 世界观拼图中的最后一部分是清晰度。
- en: When people don’t have clarity on their next steps, they feel anxious, overwhelmed,
    or bored.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 当人们对自己的下一步行动没有清晰的认识时，他们会感到焦虑、不知所措或无聊。
- en: This is what causes arguments in relationships, dissonance in business, and
    battles between political parties.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是导致人际关系中的争吵、商业中的不和谐以及政党之间的斗争的原因。
- en: People who don’t share the same worldview are missing pieces of the other party’s
    path, narrative, or system that allows them to make sense of that situation.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 与你拥有不同世界观的人，缺少了理解对方路径、叙事或系统的某些部分，这些部分使他们能够理解那种情况。
- en: '*So, when you are the niche, your job is to create a holistic, step-by-step
    path that you can share with readers who have your same worldview, usually in
    the form of a product or service that you can be paid for.*'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '*因此，当你成为细分市场时，你的工作是为拥有相同世界观、通常以产品或服务形式，你可以从中获得报酬的读者创造一个全面、循序渐进的路径。*'
- en: That way they are more likely to get results and understand you.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 这样他们更有可能取得成果并理解你。
- en: There’s a reason why my philosophical musings bring a load of new people into
    business. Because I make it make more sense than the shallow business gurus you
    see everywhere.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么我的哲学沉思能吸引大量新进入商业领域的人。因为我让它们比你在到处都能看到的浅薄商业大师更有意义。
- en: 'Beyond goals, problems, and potential paths there are multiple aspects of the
    human psyche that influence how people perceive and act on goals and problems:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 除了目标、问题和潜在路径之外，还有许多影响人们如何感知和行动的心理因素：
- en: Prior experiences
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 先前的经验
- en: Firm and loose beliefs
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 稳固和松散的信念
- en: Skill level across all domains of life
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生活中所有领域的技能水平
- en: All of the above can be conscious, unconscious, known, or unknown.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 以上所有内容可以是意识到的、无意识的、已知的或未知的。
- en: Your entire job as an education brand is to raise the consciousness of your
    audience.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 作为教育品牌，你的整个工作就是提高你受众的意识。
- en: '**Note**: by education brand, I mean a brand that *gives actual value.* A creator
    that teaches their audience and improves their life. Not an influencer that posts
    half-naked pictures, flexes their lifestyle, or posts self-deprecating memes.'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：我所说的教育品牌，是指那些**提供实际价值**的品牌。一个教育他们的受众并改善他们生活的创作者。而不是那些发布半裸照片、炫耀生活方式或发布自嘲表情包的网红。'
- en: Make your audience conscious of their goals and problems (argue the importance
    of the goals and illustrate the impact of their problems. Show the benefits of
    achieving the goal and pains of not solving the problem. This is persuasion 101.)
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 让你的受众意识到他们的目标和问题（论证目标的重要性，展示他们问题的后果。展示实现目标的好处和未解决问题带来的痛苦。这是说服101。）
- en: Your niche is the *frame* of big goals and burning problems that compose your
    worldview.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 你的细分市场是你世界观中由大目标和紧迫问题组成的**框架**。
- en: Your job is to program the minds of your audience to adopt this frame (or worldview),
    pursue those goals, and solve those problems.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 你的工作是通过编程你受众的思维方式，让他们接受这种框架（或世界观），追求那些目标，解决那些问题。
- en: This is a massive yet fulfilling undertaking to live a life of purpose.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一项既庞大又令人满足的使命，是为了过上有意义的生活。
- en: It demands that you develop yourself for life and evolve with the responsibility
    of guiding a community under you.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 这要求你为生活发展自己，并随着指导你下面的社区的职责而进化。
- en: Niches are supposed to be specific, and what is more specific than this?
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 领域应该是具体的，还有什么比这更具体？
- en: A desirable goal that will change your life (and your readers).
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 一个能改变你生活（以及你的读者）的期望目标。
- en: '**Brand**.'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '**品牌**。'
- en: A burning problem that will ease your suffering (and your readers).
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 一个能减轻你痛苦（以及你的读者）的燃点问题。
- en: '**Content**.'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: '**内容**。'
- en: A clear path, system, or solution to bring you clarity (and your readers).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 一个清晰的道路、系统或解决方案，为你（以及你的读者）带来清晰。
- en: '**Product**.'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '**产品**。'
- en: The goals and problems will almost always be similar to someone else’s.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 目标和问题几乎总是与别人的相似。
- en: 'Everyone has the same goals and problems in the eternal markets: health, wealth,
    relationships, and happiness.'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 在永恒的市场中，每个人都有相同的目标和问题：健康、财富、关系和幸福。
- en: But the path…
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 但道路……
- en: The path is singular to you.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 这条道路对你来说是独一无二的。
- en: Everyone wants financial freedom, but two people *have* to take different paths.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都想要财务自由，但两个人*必须*走不同的道路。
- en: You may go the social media and online business route with e-commerce and the
    unique skills, mindset, and experience associated with that.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以选择社交媒体和在线商业路线，通过电子商务以及与之相关的独特技能、心态和经验。
- en: Another may go the investing and real estate route with another unique combination
    of skills and interests.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个人可能会选择投资和房地产路线，结合另一种独特的技能和兴趣组合。
- en: Remember that *every other interest* you learn also plays a role in how you
    perceive situations.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，你学习的*每一个其他兴趣*也在你如何看待情况方面发挥作用。
- en: If journaling, going on a walk, or playing video games were included on that
    path, no matter how direct to achieving your goal, still played a role in your
    achieving your goal.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 即使在日记、散步或玩电子游戏这条道路上，无论它们在实现目标上多么直接，仍然在你实现目标的过程中扮演了角色。
- en: The path is what creates who you are.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 这条道路塑造了你是谁。
- en: All of the beliefs, skills, and billions of bits of information you process
    along the way toward achieving your goals is the most unique niche in the world.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在实现目标的过程中，你处理的所有信念、技能以及数十亿比特的信息是你在这个世界上独一无二的领域。
- en: If you can illustrate your path across your hundreds of posts, newsletters,
    products, and interactions – that is how you create a niche of one.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能在你的数百篇帖子、通讯、产品和互动中展示你的道路——这就是你如何创造一个独特领域。
- en: Your job is to document your life on the internet and let the rewards of authenticity
    work their magic.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 你的工作是记录你在互联网上的生活，让真实性的回报发挥其魔力。
- en: Your job is to attract a specific group of people. You do this by writing ideas
    in a way that makes sense to you. From your worldview. From your point of view.
    The specific group of people are those with your same personality. That’s how
    you set yourself up to create a product for yourself that sells without market
    research.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 你的工作是吸引一个特定的群体。你通过以对你有意义的方式撰写想法来实现这一点。从你的世界观。从你的观点。这个特定的群体是你有相同性格的人。这就是你如何为自己创造一个无需市场调研就能销售的产品。
- en: The Book Of Your Life – How To Create Your Niche Of One
  id: totrans-149
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 《你的人生之书——如何创造你的独特领域》
- en: When you document your life on the internet, you create your niche of one.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在互联网上记录你的生活时，你创造了你的独特领域。
- en: The mindset & skillset of your past, present, and future self should be illustrated
    in a persuasive manner to attract those with a similar personality, but are a
    few steps behind you so you can actually help them.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 以有说服力的方式展示你过去、现在和未来的自我心态和技能集，以吸引那些性格相似但落后你几步的人，这样你实际上才能帮助他们。
- en: You are going to outline the structure of a book you would write about your
    life.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 你将要概述你将写关于你生活的书的结构。
- en: This will be used for pattern recognition and content creation.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 这将用于模式识别和内容创作。
- en: Use this outline to notice ideas as you consume information.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 在您获取信息时，使用这个大纲来捕捉想法。
- en: Also use it as a content plan to write newsletters, threads / carousels, and
    short form posts over the course of 6-12 months (that is how long it will take
    to get your audience truly familiar with you).
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 也可以将其用作内容计划，用于撰写为期6-12个月的通讯、帖子/轮播图和短形式帖子（这就是让您的受众真正熟悉您所需的时间）。
- en: With that, fill out the book structure below as if you were writing to those
    1-3 steps behind you.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，就像你是在写给那些落后你1-3步的人一样，填写下面的书籍结构。
- en: You can use this book outline along with my [2 Hour Writer](https://2hourwriter.com)
    course to learn how to write posts, threads, and newsletters that can be posted
    on all platforms.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用这本书的提纲以及我的[2小时作家](https://2hourwriter.com)课程来学习如何撰写可以在所有平台上发布的帖子、论坛和通讯。
- en: '**Book Introduction: Your Story**'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: '**书籍介绍：您的故事**'
- en: Your *story* is your brand. It is important that you get clear on what your
    story is so you can use it to frame content from a unique angle.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 您的故事就是您的品牌。您需要清楚地了解您的故事，这样您就可以从独特的角度来构建内容。
- en: You can start almost any writing with a personal experience. That alone makes
    it unique and not like the rest of shallow writing.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 您几乎可以用个人经历开始任何写作。这本身就使它与众不同，不同于其他肤浅的写作。
- en: Where did you start out?
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您是从哪里开始的？
- en: What struggles did you go through?
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您经历了哪些挑战？
- en: What was the climax of your journey?
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您旅程的高潮是什么？
- en: What did you achieve that is desirable to others?
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您取得了哪些别人渴望得到的成绩？
- en: What topics, interests, or skills helped you get there?
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些主题、兴趣或技能帮助您达到那里？
- en: Remember – all of these are content topics.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 记住——所有这些都是内容主题。
- en: '**Section 1: Philosophy**'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: '**第1节：哲学**'
- en: You need to get people on the same page as you.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要让人们与您站在同一页面上。
- en: Your philosophy is your answer to the question, **“How does one live the good
    life?”**
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 您的哲学是对问题“一个人如何过上美好的生活？”的回答。
- en: (Are you writing this down yet?)
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: （您开始记录了吗？）
- en: You must constantly illustrate the importance of what you believe and do in
    a way that leads toward your ideal future (or avoids the “enemy” of your brand).
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 您必须不断地以引导您理想未来（或避免您品牌的“敌人”）的方式说明您所相信和做的事情的重要性。
- en: Describe your ideal future and lifestyle in detail. What goals are you leading
    your followers toward?
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 详细描述您的理想未来和生活方式。您正在引导您的追随者朝着什么目标前进？
- en: Describe the enemy. What is the future and lifestyle you want to avoid like
    the plague?
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述您的敌人。您想要避免的未来和生活方式是什么？
- en: What are beliefs you have that others would consider extreme or offensive?
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您有哪些别人可能会认为极端或冒犯性的信念？
- en: What is the importance of each topic, interest, or skill you’ve learned to help
    you on the way toward your ideal lifestyle?
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您学到的每个主题、兴趣或技能的重要性是什么，帮助您朝着理想的生活方式前进？
- en: Take your time with this. The outline can be as long as you want it to be.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以慢慢来。提纲可以长到您想要的程度。
- en: The answers to these questions will form the majority of your content ideas
    that lead to the most of your growth and authority. This is the part that makes
    you unique.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 这些问题的答案将形成您内容想法的大部分，这些想法将导致您的大部分成长和权威。这是让您与众不同的部分。
- en: '**Section 2: Education**'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: '**第2节：教育**'
- en: This is how you build authority.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是建立权威的方式。
- en: Your job is to educate people on the skills or interests that help them achieve
    your version of the good life.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 您的职责是教育人们掌握帮助他们实现您版本的美好生活的技能或兴趣。
- en: Literally *teach* them the skills or interests and how you learned it. There
    is only so much that can be said about this. You aren’t creating anything new.
    You are simply creating a library of information under *your* brand – that way
    people can learn from you.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上*教授*他们技能或兴趣以及您是如何学习的。关于这一点，可以说得很少。您并不是在创造任何新东西。您只是在您的品牌下创建一个信息库——这样人们就可以从您那里学习。
- en: Don’t fall into the trap of, “They can just learn this information somewhere
    else online.”
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 不要陷入“他们可以在网上其他地方学到这些信息”的陷阱。
- en: Assume they don’t have the drive to learn elsewhere and that YOU have to give
    them the information.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 假设他们没有动力去其他地方学习，而您必须提供信息。
- en: Also, realize the massive difference between organic content and intentional
    searches. People on social media aren’t *actively looking for education*. No,
    they don’t already know it. No, they can’t just search for it because they don’t
    have a reason to. Show them that you are valuable enough to follow and they will
    solely learn from *you.*
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，认识到有机内容和有意搜索之间的巨大差异。社交媒体上的人并不是*积极寻找教育*。不，他们已经知道了。不，他们不能只是搜索它，因为他们没有理由。向他们展示您足够有价值，值得跟随，他们将从*您*那里学习。
- en: Please don’t ignore this. Any idea you see that you want to include under your
    brand, save it for later and post it. If it’s already been said or taught, good,
    that means it will be useful to your followers.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 请不要忽视这一点。您看到的任何想要包含在您的品牌下的想法，都保存起来稍后发布。如果它已经被说过或教授过，那很好，这意味着它将对您的追随者有用。
- en: As we will discuss in the next section, *people remember those who **first taught
    them the knowledge** that is useful to them*. **Be that person for more people.**
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们将在下一节讨论的，*人们会记住那些首先教给他们对他们有用的知识的人*。**成为更多人的那个人**。
- en: '**Section 3: Practice**'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: '**第三部分：实践**'
- en: Create step-by-step systems and practices that your readers can use to get better
    at your skills and interests.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 创建逐步系统和实践，让读者可以使用它们来提高你的技能和兴趣。
- en: Do this now.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 现在就做。
- en: Write out step-by-step plans for your audience to learn the skills or interests
    under your brand, then write content about them. Turn the best ones into products
    or services.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 为你的受众制定逐步计划，让他们在你的品牌下学习技能或兴趣，然后写关于它们的内容。将最好的内容转化为产品或服务。
- en: As a bonus, slap your own name on these.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 作为额外的好处，把你的名字加在这些上面。
- en: If you want to recreate something like The Eisenhower Matrix for productivity,
    do it.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要重新创造像艾森豪威尔矩阵这样的生产力工具，就去做。
- en: If you see something like “solopreneurship,” put a spin on it like “the one-person
    business.”
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你看到像“solopreneurship”这样的东西，就把它变成“一人企业”。
- en: If you see something like the “4 hour workweek,” try turning it into the “4
    hour workday” or “2 hour writer.”
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你看到像“4小时工作周”这样的东西，试着把它变成“4小时工作日”或“2小时作家”。
- en: 😉
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 😉
- en: Don’t teach that concept or model, take it and create your own in a way that
    may get better results.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 不要教授那个概念或模型，拿过来，以可能获得更好结果的方式创造自己的。
- en: Behavior change is the driver of authority and recognition.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 行为改变是权威和认可的动力。
- en: When you write your “book” with time on social media, in emails, and in free
    downloads, you build a brand that blows past 99% of people.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在社交媒体上、在电子邮件中和在免费下载中用时间写你的“书”时，你建立了一个超越99%的人的品牌。
- en: The Psychology Of Interest – How To Talk About Whatever You Want & Still Get
    Paid
  id: totrans-199
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 兴趣心理学——如何谈论你想要谈论的任何内容并获得报酬
- en: 'Since I’ve started working to change the online business landscape to make
    it more accessible to the creative person, I get this question almost daily:'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我开始努力改变在线商业格局，使其对创意人士更加容易接近，我几乎每天都收到这个问题：
- en: '*“I want to talk about more of my interests, but what if it gets low engagement
    or my audience doesn’t like it?”*'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: '*“我想谈谈更多的兴趣，但如果参与度低或者我的受众不喜欢怎么办？”*'
- en: First, understand the separation between content and product.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，理解内容和产品之间的区别。
- en: People think that content is all about promotions. They think they should only
    write content that leads to sales and leads for their product.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 人们认为内容都是关于促销的。他们认为他们应该只写那些能导致销售和产品推广的内容。
- en: They think they should niche down everything they write about – rather than
    having a *specific and compelling landing page or free download for a product
    that establishes authority in one go **so you don’t have to talk about it all
    the time in your content.***
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 他们认为他们应该缩小他们写的每一件事的领域——而不是有一个*具体而有吸引力的着陆页或免费下载，一次就建立了一个产品在某一领域的权威，这样你就不必总是在内容中谈论它**。
- en: They also don’t realize they can write one newsletter or article, turn it into
    a YouTube video, and then break that down into content they can post every now
    and then to link back to it. Articles and YouTube videos are evergreen. Social
    media content disappears pretty quick. So, attract people to your audience with
    social media content, then link them to the guides, articles, and videos that
    establish authority and make sales for your product.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 他们也没有意识到他们可以写一封通讯或一篇文章，将其变成一个YouTube视频，然后将其分解成他们可以不时发布以链接回它的内容。文章和YouTube视频是永恒的。社交媒体内容很快就会消失。所以，用社交媒体内容吸引你的受众，然后链接到那些建立权威并为你产品带来销售的指南、文章和视频。
- en: Test ideas here and there for selling your product in your content, then use
    those ideas to form the landing page that lives as static content forever that
    you link to.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的内容中尝试这里那里的想法来销售你的产品，然后使用这些想法来形成一个永远作为静态内容存在的着陆页，你可以链接到它。
- en: 'I see this way too often:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 我看到这种情况太频繁了：
- en: All people post are images or updates of their product.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 所有人发布的都是图片或他们产品的更新。
- en: Or they make a post with something valuable, but can’t help themselves and ruin
    it by mentioning their product or only trying to sell to their audience *on social
    media.* Save that sh*t for newsletters, downloads, and spread throughout videos.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 或者他们发布了一些有价值的内容，但忍不住提到他们的产品，或者只试图在社交媒体上向他们的受众销售，*这会毁了它**。把这种东西留给通讯、下载，并在视频中传播。
- en: They never show that they are human.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 他们从未表现出他们是人类。
- en: They never educate, entertain, or inspire (you know, the things that people
    actually follow and show up for on social media).
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 他们从不教育、娱乐或激励（你知道，这些都是人们实际上在社交媒体上关注并参与的事情）。
- en: They only sell.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 他们只销售。
- en: Nobody follows company accounts.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人会关注公司的账号。
- en: People follow educators, entertainers, and inspirers.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 人们会跟随教育家、娱乐家和激励者。
- en: RedBull has a massive following because they don’t have a single picture of
    their product on their Instagram. It is all inspirational content about the lifestyle
    people are living because of RedBull.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: RedBull 因其不在 Instagram 上展示单一的产品图片而拥有庞大的粉丝群。它全部是关于人们因为 RedBull 而生活的励志内容。
- en: If all you do is talk about your product, that is a great way to never grow
    your brand, have engaged readers, or see exponential growth in revenue.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只是谈论你的产品，那将是一个永远不会让你的品牌成长、拥有参与度高的读者或看到收入指数级增长的好方法。
- en: A personal brand is the most potent traffic source for your business, product,
    or service.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 个人品牌是你业务、产品或服务的最有力的流量来源。
- en: So, let’s start by flipping this on its head.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，让我们从颠倒这一点开始。
- en: What happens if you only talk about your skill that makes you money?
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只谈论让你赚钱的技能，会发生什么？
- en: '**You get low engagement.** If your content doesn’t get shared, how are you
    going to grow so that you have *more* people to promote to?'
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你的参与度很低。** 如果你的内容没有被分享，你将如何增长，以便你有 *更多* 的人可以推广？'
- en: '**You don’t build trust or authority.** Stop thinking like you have to monetize
    right now and start thinking that you’re going to monetize in 12 months (and you’ll
    monetize faster now by doing so.)'
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你不会建立信任或权威。** 停止认为你必须立即变现，开始思考你将在12个月内变现（这样做会让你更快地变现。）'
- en: '**People don’t like you.** If you ever want to pivot and sell something else,
    you won’t be able to. You’re trapped into whatever niche you always sell to.'
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人们不喜欢你。** 如果你想要转向销售其他东西，你将无法做到。你被永远困在了你一直销售的那个细分市场。'
- en: People have multiple interests.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 人们有多种兴趣。
- en: People can adopt new interests.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 人们可以培养新的兴趣。
- en: You can make your interests interesting so people become interested in them.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以让你的兴趣变得有趣，让人们对他们产生兴趣。
- en: You do this by highlighting the benefits of achieving the goals of your brand
    and making people aware of how to solve their pain points with your skills or
    interests.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过突出你品牌目标实现的好处，让人们意识到如何用你的技能或兴趣来解决他们的痛点来做到这一点。
- en: This is what turns viewers into fans into superfans.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是观众变成粉丝，再变成超级粉丝的过程。
- en: Someone may follow you for one interest, like how you would follow Dwayne The
    Rock Johnson after watching a movie he starred in.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 可能有人会因为你某个兴趣而关注你，就像你看了一部由道恩·强森主演的电影后，会去关注他一样。
- en: Now they’re a viewer.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，他们成为了观众。
- en: Then, you either share another interest of theirs or get introduced to something
    new, like how The Rock posts about fitness and nutrition.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你可以分享他们的另一个兴趣，或者介绍一些新的东西，就像 The Rock 发布关于健身和营养的内容一样。
- en: Now they’re a fan.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，他们成为了粉丝。
- en: Then, they discover the beliefs or values that compose their mindset, like how
    The Rock values gratitude and hard work.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，他们发现了构成他们心态的信念或价值观，就像 The Rock 重视感恩和努力工作一样。
- en: Now, they’re a superfan.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，他们成为了超级粉丝。
- en: (Everyone should include mindset in their content by the way, that is what attracts
    a broad audience because it applies to everyone).
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: （顺便说一句，每个人都应该在他们的内容中包含心态，这就是它吸引广泛受众的原因，因为它适用于每个人）。
- en: Talking about more than one interest is how you become irreplaceable.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 谈论多个兴趣是你变得不可替代的方法。
- en: The best personal brands do this without trying.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的个人品牌在无意中就做到了这一点。
- en: They just post whatever *they* deem important to them and attempt to illustrate
    that importance to you.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 他们只是发布他们认为对他们重要的事情，并试图向你展示这种重要性。
- en: 'Here’s how you can begin doing this:'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你可以开始这样做的方法：
- en: '**1) Focus On Education**'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 专注于教育**'
- en: Adopt the mind of your past self, an absolute beginner.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 借鉴你过去自己的心态，一个绝对的初学者。
- en: '*How* would they get to where you are now in a better way?'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: '*他们*如何以更好的方式达到你现在所在的位置？'
- en: '**2) Focus On Understanding**'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 专注于理解**'
- en: Zoom out and identify the gaps in your followers’ knowledge.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 放大视野，识别你粉丝知识中的空白。
- en: '*What* do they need to know to get on the same page as you?'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: '*他们*需要了解什么才能与你站在同一页面上？'
- en: '**3) Focus On Importance**'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 专注于重要性**'
- en: Analyze your life and realize why you do what you do.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 分析你的生活，并意识到你为什么做你所做的事情。
- en: '*Why* do you only have those select skills and beliefs rather than the millions
    of others you could have? *Why* did you take the path you did over another one?'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: '*为什么*你只有那些精选的技能和信念，而不是你本可以拥有的数百万种其他选择？*为什么*你选择了这条道路而不是另一条？'
- en: Broad Brand, Specific Product (How To Actually Niche Down)
  id: totrans-248
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 广泛的品牌，具体的产品（如何真正进行细分市场）
- en: You may be asking, “Dan, how am I going to sell anything if I’m not writing
    anything related to what I sell?”
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能正在问，“丹，如果我不写任何与我销售相关的内容，我该如何销售任何东西？”
- en: First, you are writing about it occasionally so people know what you do. I’m
    not telling you *not* to write about your product. I’m telling you do it wisely.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你偶尔会写一些关于它，这样人们就知道你做什么了。我并不是告诉你*不要*写关于你的产品。我是在告诉你要明智地去做。
- en: Two, you don’t have a solid understanding of what marketing actually is.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，你对营销实际上是什么并没有一个稳固的理解。
- en: You are almost never directly talking about the skill you sell.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 你几乎永远不会直接谈论你销售的技能。
- en: '*You are talking about how it will change their life. How it will spark a transformation.
    How it will bridge the gap between where they are and their ideal future.*'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: '*你正在谈论它将如何改变他们的生活。如何激发变革。如何弥合他们目前的状态和理想未来的差距。*'
- en: You are illustrating the life they want, making them aware of the problem they
    are facing, and presenting a product as the solution.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在展示他们想要的生活，让他们意识到他们面临的问题，并展示一个作为解决方案的产品。
- en: 'With that, think about niching down like this:'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这样思考细分市场：
- en: Your brand is a broad attractor of similar people.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 你的品牌是一个吸引类似人群的广泛吸引器。
- en: Your content is a modality of making people aware of desirable goals and burning
    problems in their life.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 你的内容是一种让人们意识到他们生活中理想目标和燃点问题的方式。
- en: Your first and foundational product is the bridge between those.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 你的第一个和基础产品是这两者之间的桥梁。
- en: You don’t have to consistently write about your product because you have something
    called a landing page that picks up where your content left off. A landing page
    is static digital real estate that doesn’t disappear like content does.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 你不必始终写关于你的产品，因为你有一种叫做着陆页的东西，它会在你的内容结束后继续发挥作用。着陆页是一种静态的数字地产，它不会像内容那样消失。
- en: So, become a mad scientist for a bit.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，暂时成为一位疯狂科学家吧。
- en: Map out a newsletter, free guide, low-ticket product, and high-ticket service
    (which is optional if you are building a large, not niche, audience – I talk about
    this in [Mental Monetization](https://mentalmonetization.com)).
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 制定一份新闻通讯、免费指南、低价值产品和高价值服务（如果你正在构建一个大型而非细分的市场，这是可选的——我在[Mental Monetization](https://mentalmonetization.com)中谈到了这一点）。
- en: Your newsletters should all be hosted on a blog so you can plug the best ones
    for interested readers to read.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 你的新闻通讯应该全部托管在博客上，这样你就可以将最好的内容提供给感兴趣的读者阅读。
- en: Your free guide landing page and content educates people toward becoming customers
    for your product. This is catered toward a more specific problem in your audience.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 你的免费指南着陆页和内容教育人们成为你产品的客户。这是针对你受众中更具体的问题。
- en: Your product landing page picks up from where you left off and makes people
    aware that they can solve their problem faster.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 你的产品着陆页从你离开的地方继续，让人们意识到他们可以更快地解决问题。
- en: That is how you niche down.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何进行细分市场。
- en: You deploy digital real estate, write worldview-based content, and consistently
    guide people every day toward your newsletter, free guide, and product in that
    order.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 你部署数字地产，撰写基于世界观的内容，并始终如一地每天引导人们按照顺序关注你的新闻通讯、免费指南和产品。
- en: The Evolution Of Your Niche, Brand, and Products
  id: totrans-267
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你的细分市场、品牌和产品的演变
- en: Solve your own problems and sell the solution.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 解决你自己的问题，然后销售解决方案。
- en: Not once, but forever.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 不仅仅是一次，而是永远。
- en: Your brand, content, and products will evolve as you reach new heights in your
    life.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你在生活中达到新的高度，你的品牌、内容和产品也将随之发展。
- en: You will be forced to create new products as the old ones lose their punch.
    This isn’t a bad thing, it actually allows you to sustain and increase your yearly
    revenue.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 当旧产品失去吸引力时，你将不得不创造新产品。这并不是一件坏事，实际上这让你能够维持并增加你的年收益。
- en: I have launched something new almost every quarter since I started 4 years ago.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 自从4年前我开始以来，我几乎每个季度都会推出一些新产品。
- en: From web design and freelancing, to marketing consulting, to a physical productivity
    planner, to social media growth, to self-improvement, to writing, to a business
    masterclass, to short cohorts, to a book, and now a software from the systems
    I’ve created (that almost nobody can replicate because their path isn’t the same).
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 从网页设计到自由职业，再到市场营销咨询，从实体生产力规划师，到社交媒体增长，到自我提升，到写作，到商业大师班，到短期小组，到一本书，现在还有我创建的系统中的软件（几乎没有人能够复制，因为他们的路径不同）。
- en: You have to experiment and iterate.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须进行实验和迭代。
- en: That is the only way you will prevent brand entropy and not die a slow death
    to the nature of social media. You must evolve.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你唯一能够防止品牌熵增，避免因社交媒体的本质而缓慢死亡的方法。你必须进化。
- en: That’s it for this letter.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 这封信就到这里了。
- en: Hope it helped.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 希望这对你有所帮助。
- en: Dan
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 丹
