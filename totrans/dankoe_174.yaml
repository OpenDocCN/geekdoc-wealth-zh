- en: How To Build A Better Personal Brand Than 99% Of People
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何建立比99%的人更好的个人品牌
- en: 原文：[https://thedankoe.com/letters/how-to-build-a-better-personal-brand-than-99-of-people/](https://thedankoe.com/letters/how-to-build-a-better-personal-brand-than-99-of-people/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/how-to-build-a-better-personal-brand-than-99-of-people/](https://thedankoe.com/letters/how-to-build-a-better-personal-brand-than-99-of-people/)
- en: What most people don’t understand is that a “personal brand” isn’t a business
    model. It’s a traffic source. It’s a trust mechanism. Founders build a personal
    brand to get users for their startup. Ecommerce brands use UGC to sell physical
    products. You can quite literally sell *anything –* from bags of coffee to nudes
    – if you have a trustworthy personal brand.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 大多数人都不理解的是，“个人品牌”不是一个商业模式。它是一个流量来源。它是一个信任机制。创始人建立个人品牌是为了为他们的初创公司获取用户。电子商务品牌使用UGC来销售实体产品。如果你有一个值得信赖的个人品牌，你几乎可以卖任何东西——从咖啡袋到裸照。
- en: I never thought I was going to have a personal brand.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我从未想过我会拥有个人品牌。
- en: Back in 2016 or so, I wanted to be a fitness YouTuber.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 回到2016年左右，我想成为一名健身YouTube博主。
- en: My college friend and I filmed eating challenges, workouts, and talking head
    videos with minimal success. I really wish I hadn’t deleted those videos, but
    they were embarrassing to say the least.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我和我的大学朋友一起拍摄了一些吃挑战、锻炼和谈话头视频，但效果甚微。我真的很希望我没有删除那些视频，但至少它们是尴尬的。
- en: That wasn’t the end though.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 但这并不是结束。
- en: Next, I became obsessed with photography, editing, and digital art.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我沉迷于摄影、编辑和数字艺术。
- en: That’s technically when “thedankoe” (my username) was born. I was a lifeguard
    during the summer in between college semesters. I was thinking about starting
    an instagram to post my photos, and my coworkers helped me brainstorm the name.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是技术上“thedankoe”（我的用户名）诞生的时候。我在大学学期的暑假期间做救生员。我在想是否要开始一个Instagram账号来发布我的照片，我的同事帮我头脑风暴了这个名字。
- en: I gained some followers, but eventually burned out because I couldn’t keep slamming
    stimulants and taking Adderall to make sure that I got one image out each day.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我获得了一些粉丝，但最终因为无法每天服用兴奋剂和安非他命来确保我每天发布一张图片而筋疲力尽。
- en: So that failed.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 但那失败了。
- en: But I really, really didn’t want to get a job when I graduated college. I never
    figured out what I wanted to be when I grew up, but I did figure out that I didn’t
    want to live like most people – stressed, emotionally reactive, unhealthy.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 但我真的、真的不想大学毕业后找工作。我从未弄清楚我长大后想成为什么，但我确实弄清楚了我不想像大多数人那样生活——有压力、情绪化、不健康。
- en: I tried building 3 e-commerce brands. One minimalist wallets, one blue light
    glasses, and one that drop-shipped rave clothing. I also tried a few short-lived
    ventures like an SEO agency and Facebook Ads agency that I learned from courses
    I purchased.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我尝试建立3个电子商务品牌。一个是极简钱包，一个是防蓝光眼镜，还有一个是批发派对服装。我还尝试了几家短暂的企业，比如一家SEO代理公司和一家Facebook广告代理公司，这些都是我从购买的课程中学到的。
- en: This timeline is all a bit blurry to me since so much happened all in the course
    of a few years, but I was also learning to code as a fallback. I’d taken an intro
    programming class in college, enjoyed it, and figured that could be my safeguard
    if I did have to get a job.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 由于在短短几年内发生了太多事情，我对这个时间线有些模糊，但我也在学习编码作为备选方案。我在大学时上过一门编程入门课，很喜欢，并认为这可能是我必须找工作时的保障。
- en: By this point, I had maxed out my first credit card, was $8000 in debt (which
    is a LOT for a broke college kid living with 7 other guys to keep our rent low),
    was working part time at a print shop, and none of my businesses worked out.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 到这个时候，我已经用完了我的第一张信用卡，负债8000美元（对于一个和7个室友合租以降低租金的穷大学生来说，这是一笔巨款），我在一家印刷店做兼职工作，我的所有企业都没有成功。
- en: Why Personal Branding Saved My Life
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么个人品牌拯救了我的生命
- en: I ended up getting a job.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我最终找到了一份工作。
- en: The thing I had sworn I would never do.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我曾发誓我永远不会做的事情。
- en: It was at a web design agency in Arizona.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 那是在亚利桑那州的一家网页设计公司。
- en: But thankfully, I discovered the reality of most office jobs pretty quickly.
    I could put all of my work off until the last minute, copy paste website templates,
    change the colors, images, etc, and get my work done at a decent level of quality
    while flying under the radar. I’m a terrible employee.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 但幸运的是，我很快发现了大多数办公室工作的现实。我可以把所有工作都推迟到最后时刻，复制粘贴网站模板，更改颜色、图片等，以相当高的质量完成工作，同时保持低调。我是个糟糕的员工。
- en: I knew that if I stayed in that job for too long, I’d get comfortable. Then
    the wife, mortgage, and everything else would pile drive me into a pit of time-and-money-sucking
    responsibilities. It would only get harder and harder to escape.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道，如果我在这份工作中待得太久，我会变得安逸。然后妻子、房贷以及所有其他事情都会把我推入一个时间和金钱消耗的深渊。逃离将变得越来越困难。
- en: So I spent the first few hours of every day at my job trying to freelance with
    web design.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 所以我每天上班的第一几个小时都在尝试做自由职业的网页设计。
- en: To keep this brief, it worked, and I was able to quit a year after, but little
    did I realize I’d built myself into a new 9 to 5 of reaching out to clients and
    working on projects that I didn’t give a fuck about.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简短起见，它确实有效，我在一年后就能辞职了，但当时我并没有意识到我把自己变成了一个全新的朝九晚五的工作，那就是联系客户和从事我不在乎的项目。
- en: 'That’s when the power of social media made itself known to me:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是社交媒体的力量让我意识到的时候：
- en: People were just posting about their knowledge and interests, and I felt like
    I could write similar to what they posted
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人们只是在发布关于他们的知识和兴趣，我觉得我可以像他们一样写。
- en: They didn’t have to constantly reach out to clients because their content attracted
    them
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们不必不断联系客户，因为他们的内容吸引了他们。
- en: I saw web designers selling digital products that required zero effort (beyond
    creating the product) to make money
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我看到网页设计师在销售需要零努力（除了创建产品之外）的数字产品来赚钱。
- en: It checked all the boxes.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 它满足了所有的条件。
- en: But I’d already tried that…
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 但我已经尝试过那样做了...
- en: My fitness YouTube failed catastrophically. I was building some kind of an audience
    with digital art, but I had no idea how to turn that into a sustainable income
    source.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我的健身YouTube频道彻底失败了。我试图通过数字艺术建立某种观众群体，但我不知道如何将其转化为可持续的收入来源。
- en: Either way, I had learned so much from my business failures that I felt I could
    make it work.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 无论哪种方式，我从商业失败中学到了很多，我觉得我可以让它成功。
- en: And as you can tell, I did.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，我确实做到了。
- en: Build A Better Personal Brand Than 99% Of People
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 打造比99%的人更好的个人品牌
- en: Artist are, by definition, authentic. Entrepreneurs are authentic, too. Who’s
    going to be Elon Musk? Who’s going to be Jack Dorsey? These people are authentic,
    and the businesses and products they create are authentic to their desires and
    means.
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 艺术家按定义是真诚的。企业家也是真诚的。谁会是埃隆·马斯克？谁会是杰克·多西？这些人都是真诚的，他们创建的业务和产品都是符合他们的愿望和手段的。
- en: ''
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Escape Competition Through Authenticity – Naval*'
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**通过真诚摆脱竞争 – 纳瓦尔**'
- en: Let’s speed this up a bit.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们加快一点速度。
- en: You’re here because you have interests or skills that you want to turn into
    a future-proof income source.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 你在这里是因为你有兴趣或技能，你想要将其转化为一个有保障的收入来源。
- en: But you don’t want to become a hollow shell of a human being.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 但你不想成为一个空洞的人。
- en: You don’t want to be put into a box.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 你不希望被框在一个固定的框架里。
- en: You don’t want to build yourself into another 9-5.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 你不希望再次陷入另一个朝九晚五的工作中。
- en: I want to get down to the *highest impact* things you could be doing.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我想要深入探讨你能做的**最有影响力**的事情。
- en: The things that most beginners either don’t know about or glance over.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数初学者要么不知道，要么只是匆匆略过的那些事情。
- en: If you solely focus on these, I promise you will not end up like those who quit
    because they couldn’t get results.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只专注于这些，我保证你不会像那些因为无法取得结果而放弃的人一样。
- en: Forget about your niche for now.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 现在先不要考虑你的细分市场。
- en: Forget about your bio and banner and all of that stuff.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 忘掉你的个人简介和横幅以及所有那些东西。
- en: It’s important, but there are plenty of people with *no* bio and a blank profile
    picture doing just fine.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这很重要，但有很多人的**个人简介**和空白个人头像也能做得很好。
- en: '*Your content, and the quality of ideas you post over a long enough time period
    are what create a brand that people can’t help but trust.*'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**你的内容，以及你在足够长的时间内发布的想法的质量，是创造人们无法不信任的品牌的关键**。'
- en: That’s your entire business strategy.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是你的整个商业策略。
- en: Trust.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 信任。
- en: Money is a measure of trust.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 金钱是信任的衡量标准。
- en: 'I’m going to teach you what I call The Trust Matrix:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我将教你我称之为“信任矩阵”的东西：
- en: '**Growth** – doing “what works” to attract people.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增长** – 做出“有效”的事情来吸引人们。'
- en: '**Authenticity** – expressing your core beliefs.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**真诚** – 表达你的核心信念。'
- en: '**Authority** – displaying your expertise.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**权威** – 展示你的专业知识。'
- en: There have been spinoffs of this framework since I first talked about it in
    2020, but I’ve refined it to give you even more clarity than before.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 自从我在2020年第一次提到这个框架以来，已经出现了很多衍生品，但我已经将其完善，以便给你比以前更多的清晰度。
- en: If you can nail those 3 things, your brand will be undeniable.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能够掌握这三件事，你的品牌将无可争议。
- en: After, we’ll talk about how to turn that brand foundation into an easier way
    to generate an income.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将讨论如何将这个品牌基础转化为一种更容易产生收入的方式。
- en: Growth – Build Your Idea To Execution Muscle
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 成长 – 建立你的想法到执行肌肉
- en: 'A pattern I’ve noticed in successful creators:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我在成功的创作者中注意到的一个模式：
- en: The moment they notice an idea at the intersection of performance and excitement,
    they drop anything they were doing and write it down.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 当他们注意到绩效和兴奋交汇处的想法时，他们会放下他们正在做的事情，并把它写下来。
- en: These ideas typically come to them on a walk, while listening to an audiobook
    or video, while reading a book or “heavy” content (not brainrot social posts),
    or while having a conversation with others.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这些想法通常在他们散步时，在听有声书或视频时，在阅读书籍或“重”内容（不是脑残社交媒体帖子）时，或者在与他人交谈时产生。
- en: There are 2 pieces there.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有两个方面。
- en: '**Performance** – they understand how to articulate ideas in an engaging way.
    The ideas have the potential to “do well.”'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**绩效** – 他们理解如何以吸引人的方式表达想法。这些想法有“做得好”的潜力。'
- en: '**Excitement** – they have a genuine interest in understanding the idea or
    articulating it in their own way. They see their brand as a collection of notes
    of these ideas.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**兴奋** – 他们对理解这个想法或以他们自己的方式表达它有真正的兴趣。他们认为他们的品牌是这些想法笔记的集合。'
- en: Everything becomes a source of ideas when you know *how to articulate an idea
    in an engaging way* and when you *want to write about it.*
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 当你知道*如何以吸引人的方式表达一个想法*并且你*想要写关于它的时候*，一切都会成为想法的来源。
- en: The reason most people struggle to come up with ideas worth writing about are
    those two reasons. Their mind isn’t trained to be articulate, and they don’t consume
    information at the edge of their understanding.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人难以想出值得书写的想法的原因是这两个。他们的思维没有训练得能够清晰地表达，他们也没有在理解边缘消费信息。
- en: The single most beneficial thing you can do for your growth is to use high-performing
    post structures as training wheels for your articulation.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 你能为你自己的成长做的最有益的事情就是使用高性能的帖子结构作为你表达的训练轮。
- en: Pull out a notebook or open a note-taking app
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 拿出笔记本或打开记事本应用
- en: Write down 5-10 writers, thinkers, or creators who you admire for their articulation
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出5-10个你钦佩的、以他们的表达为荣的作家、思想家或创作者
- en: Spend 1 hour a day for the next week scrolling through their social accounts
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在接下来的一个星期里，每天花1小时浏览他们的社交媒体账号
- en: Find their anomalies – the posts that have at least 2x the engagement as their
    other posts
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 找出他们的异常情况 - 至少有其他帖子两倍参与度的帖子
- en: Screenshot them or write them down in your note-taking app
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 截图或在你记事本应用中写下它们
- en: You are not reading the ideas as a consumer, you are studying them like a scientist.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 你不是作为一个消费者阅读这些想法，而是像科学家一样研究它们。
- en: When you have at least 20-30 posts that represent the articulation you want
    to adopt, break down *why these posts work so well.*
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 当你至少有20-30篇代表你想要采用的表达的帖子时，分析*为什么这些帖子做得如此之好*。
- en: Write down 3-5 bullet points for each post as to why it captures attention,
    why people engage with it, what psychological tactics they are using, and more.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 为每篇帖子写下3-5个要点，说明为什么它能吸引注意力，为什么人们会参与其中，他们使用了哪些心理战术，等等。
- en: 'Even better, use this prompt:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的是，使用这个提示：
- en: Do a comprehensive analysis on this social post. The overall idea, how the sentences
    are structured, and choice of words. Analyze why people engage with it, why it
    works so well, what psychological tactics are being used, and how I can replicate
    this style step-by-step with my own ideas.
  id: totrans-77
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 对这篇社交媒体帖子进行全面分析。整体想法，句子的结构，以及用词的选择。分析人们为什么参与其中，为什么它效果如此之好，使用了哪些心理战术，以及我如何一步一步地用我自己的想法复制这种风格。
- en: ''
  id: totrans-78
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[paste social post]'
  id: totrans-79
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[粘贴社交媒体帖子]'
- en: In a nutshell, you are dissecting why *already validated* ideas have done well.
    When you practice writing in a way that stops the scroll and nearly demands readers
    to absorb the idea, growth is a byproduct.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，你正在剖析为什么*已经得到验证*的想法做得很好。当你练习以停止滚动并几乎要求读者吸收想法的方式写作时，成长就是一个副产品。
- en: Authenticity – Core Beliefs Attract The Right People
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 真诚性 – 核心信念吸引正确的人
- en: So far, and with practice, you know how to turn any idea into a social post
    people can’t ignore.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，通过练习，你知道如何将任何想法转化为人们无法忽视的社会帖子。
- en: But people don’t follow ideas, they follow people who share ideas.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 但人们不是追随想法，而是追随那些分享想法的人。
- en: Two people can write the same thing and people will perceive that post in drastically
    different ways.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 两个人可以写出同样的事情，但人们会以截然不同的方式感知这篇帖子。
- en: Take James Clear vs a random guy off the street.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 以詹姆斯·克莱尔与街头的一个普通人进行比较。
- en: They both tweet, “Habits are good for you.”
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 他们都发推文，“习惯对你有好处。”
- en: Tens of millions of people know who James Clear is. They know his story. They’ve
    read his book on habits. They have a deep yet indirect relationship with him.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 数百万的人知道詹姆斯·克莱尔是谁。他们知道他的故事。他们读过他关于习惯的书。他们与他有着深刻而间接的关系。
- en: Most people who read the tweet from James Clear will like and repost simply
    because they agree. The fact that James is saying it brings his other ideas *along*
    with that post.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数阅读詹姆斯·克莱尔推文的人会喜欢并转发，仅仅因为他们同意。詹姆斯说出这一点，就把他的其他想法带到了那篇帖子中。
- en: But if a random guy posted something that simple, people would either ignore
    it or comment, “Yeah, no shit.”
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果是一个随机的人发布了这样简单的东西，人们可能会忽略它或评论，“是的，这很显然。”
- en: 'There are 3 things here:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有三件事：
- en: '**Time under attention** – The more attention people give you, especially in
    long form content like articles, books, and videos, the more they perceive your
    posts through the rest of your ideas.'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**注意力下的时间** – 人们给你的注意力越多，尤其是在文章、书籍和视频等长篇内容中，他们就越会通过你的其他想法来感知你的帖子。'
- en: '**Alignment of values** – When people know who you are, where you came from,
    and what you stand for, they form a deeper relationship with your ideas as a whole.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**价值观的一致性** – 当人们知道你是谁，你来自哪里，你代表什么，他们会与你整体的想法形成更深的关系。'
- en: '**Authentic polarization** – “If you’re liked by everybody, you’re liked by
    nobody.” You need to give people reasons to heavily disagree and thus heavily
    agree with you. This is the difficult part of putting yourself out there.'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**真实的两极分化** – “如果你被每个人都喜欢，那么你就没有人喜欢。”你需要给人们提供理由，让他们强烈地不同意，从而强烈地同意你。这是将自己展示出来的困难部分。'
- en: This doesn’t need much explanation.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 这不需要太多解释。
- en: You can directly observe that you feel a stronger connection with creators whose
    story and core beliefs you resonate with. If you were presented with a product
    to purchase from a random brand and a similar product from the creator you love,
    you would probably choose the creator’s.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以直接观察到，你与那些故事和核心信念与你产生共鸣的创作者有更强的联系。如果你面前有一个来自随机品牌的要购买的产品和一个来自你喜爱的创作者的类似产品，你可能会选择创作者的。
- en: How do we replicate this in our own brand?
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何在我们自己的品牌中复制这一点？
- en: We need to illustrate our *story* and *core beliefs* often in our content, both
    as content topics and as ways of reframing ideas.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要在我们的内容中经常展示我们的*故事*和*核心信念*，无论是作为内容主题还是作为重新构建想法的方式。
- en: As a content topic, I could talk about how I failed at 7 different business
    models.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 作为内容主题，我可以谈谈我如何失败了7种不同的商业模式。
- en: As a way of reframing an idea, I could talk about how to build a personal brand
    (validated and has high potential) and make that topic unique to me by starting
    with my story. That’s exactly what I did at the top of this letter.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 作为重新构建想法的一种方式，我可以谈谈如何建立一个个人品牌（经过验证且具有高潜力），并通过我的故事使这个主题对我而言独一无二。这正是我在这封信的开头所做的事情。
- en: In terms of my core beliefs as a topic, I could talk about how I believe digital
    products are the best way for beginners to start. I could also reframe classic
    product development ideas through the lens of being a creator.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的核心信念作为主题方面，我可以谈谈我认为数字产品是初学者开始的最佳方式。我也可以通过创作者的视角重新构建经典的产品开发理念。
- en: 'To do this well:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 要做好这一点：
- en: Write out where you were, what sparked change, and where you are now
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将你当时所在的位置、引发变化的原因以及你现在所在的位置写下来
- en: For each topic or theme you talk about, list out core principles that you hold
    with conviction
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于你谈论的每个主题或主题，列出你坚信的核心原则
- en: This is difficult to do while just sitting and staring at a blank screen, so
    we can use the help of AI to help us.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 这在只是坐着盯着空白屏幕的时候很难做到，因此我们可以利用AI的帮助。
- en: I created a “Story & Core Belief Extractor” prompt that interviews you, helps
    you brainstorm, and spits out a draft with exactly what you need.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 我创建了一个“故事与核心信念提取器”提示，它会采访你，帮助你头脑风暴，并输出一份包含你所需内容的草稿。
- en: '[Save this prompt to use it after finishing this letter here.](https://app.kortex.co/public/document/9d77482b-0dd9-4dbc-829d-77f2d0364132)'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '[将此提示保存在此处完成此信件后使用](https://app.kortex.co/public/document/9d77482b-0dd9-4dbc-829d-77f2d0364132)'
- en: That prompt is a part of the build a profitable personal brand in 30 days challenge
    that starts June 16th [if you’re interested in more.](https://stan.store/thedankoe/p/build-a-profitable-personal-brand-in-30-days)
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 那个提示是30天建立盈利性个人品牌挑战赛的一部分，该挑战赛将于6月16日开始[如果你对此感兴趣的话](https://stan.store/thedankoe/p/build-a-profitable-personal-brand-in-30-days)。
- en: Authority – Persuasive Education Changes Behavior
  id: totrans-108
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 权威 – 有说服力的教育改变行为
- en: Most creators build education businesses.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数创作者都会建立教育业务。
- en: They teach their skills and interests.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 他们教授他们的技能和兴趣。
- en: Of course, you can try to be the next big celebrity or OnlyFans model, but remember
    we’re aiming for some form of positive impact and meaningful work.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，你可以尝试成为下一个大名人或OnlyFans模特，但记住我们追求的是某种形式的积极影响和有意义的工作。
- en: The thing is, there are so many creators who *already* teach what you want to
    teach. You can search any skill on YouTube and find a ton of videos on any topic.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，有那么多创作者*已经*在教授你想要教授的内容。你可以在YouTube上搜索任何技能，找到大量关于任何主题的视频。
- en: That’s what trips up most beginners. They don’t believe that people have a reason
    to follow *them.* Why would they learn from you when there are already plenty
    of people to learn from?
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是大多数初学者遇到的问题。他们不相信人们有理由跟随*他们*。为什么他们会从你这里学习，当已经有很多人可以学习的时候？
- en: There are 2 solutions here.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有两种解决方案。
- en: '**1) Teach through a new lens**'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 以新的视角教学**'
- en: Same as before.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 和之前一样。
- en: I can teach personal branding in this letter from a new lens by starting with
    my own personal story.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以通过从我的个人故事开始，以新的视角在这封信中教授个人品牌。
- en: Another way I like to do this is by reframing through a novel idea.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢用一种新颖的方式重新定义这个问题。
- en: If I am consistently researching and consuming information from people with
    great ideas, eventually one will pop up like Naval’s “ideas are the new oil” and
    “this generation is getting rich in idea space not physical space.” (This is why
    it’s important to surround yourself with great thinkers).
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我持续研究并从有伟大想法的人那里获取信息，最终会出现像Naval的“想法是新石油”和“这一代人正在思想空间而不是物理空间中致富”这样的想法。（这就是为什么周围要有伟大的思想家很重要）。
- en: Then, I can introduce the topic of a personal brand *through* that idea, and
    it’s much more compelling.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我可以通过这个想法引入个人品牌的话题，这样会更有吸引力。
- en: '**2) Persuade the non-interested**'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 说服不感兴趣的人**'
- en: 'I sound like I’m beating a dead horse after talking about this in the last
    few letters, but it is so important to internalize:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 我在上一封信中提到这一点后，感觉像是在重复旧话，但这一点非常重要，需要内化：
- en: Most people on social media aren’t *intentionally* trying to learn. If they
    were, they would physically search for a video, course, or article on the topic.
    And, you are being spread to *random* people on social media. You don’t control
    who sees your content by typing in their interests and demographics into something
    like Facebook ads.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体上的大多数人并不是*有意*想要学习的。如果他们是这样，他们就会在视频、课程或文章上搜索这个主题。而且，你的内容被传播到社交媒体上的*随机*人。你无法通过在Facebook广告中输入他们的兴趣和人口统计数据来控制谁会看到你的内容。
- en: So, *you need to frame your ideas as broad and desirable.*
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，*你需要将你的想法框架得既广泛又具有吸引力*。
- en: If I want to talk about personal branding, I don’t go straight into giving people
    instructions on how to pick their topics or create a bio. That’s boring. It won’t
    get enough reach to spread to a new audience.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想谈论个人品牌，我不会直接告诉人们如何选择他们的主题或创建个人简介。那很无聊。它不会达到足够的覆盖面去吸引新的受众。
- en: I start with some permutation of “if you want” (desire) or “if you don’t want”
    (pain point), then most people at least have a chance at *becoming interested*
    in what I have to say.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 我从“如果你想要”或“如果你不想要”（痛点）的某种变体开始，这样大多数人至少有机会对我所说的内容产生兴趣。
- en: 'As an example:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：
- en: If you hate the thought of building someone else’s dreams for the rest of your
    life, start a personal brand.
  id: totrans-128
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你讨厌为别人的一生建造梦想，那就开始一个个人品牌。
- en: I could then go on to list the benefits of starting one, how low-risk it can
    be, and how you can sell almost anything from digital products to software to
    physical products.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以继续列举开始一个个人品牌的益处，比如它有多低的风险，以及你可以从数字产品到软件再到实体产品几乎卖任何东西。
- en: Mastering curiosity and desire by focusing on pain points, desires, and benefits
    in your content is how you help people become interested in your interests.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 通过关注你内容中的痛点、欲望和好处来掌握好奇心和欲望，这是你帮助人们对你感兴趣的方法。
- en: The Best Way To Monetize
  id: totrans-131
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最有效的货币化方式
- en: The best way to monetize is any way.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 货币化的最佳方式就是任何方式。
- en: They literally all work.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 他们实际上都有效。
- en: Ebooks, templates, cohorts, coaching, paid newsletters, sponsorships…
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 电子书、模板、小组、辅导、付费通讯、赞助……
- en: What most people don’t understand is that a “personal brand” isn’t a business.
    It’s a traffic source. Founders build a personal brand to get users for their
    startup. Ecommerce brands use UGC to sell physical products. You can quite literally
    sell *anything –* from bags of coffee to nudes – if you have a trustworthy personal
    brand.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人都不理解，“个人品牌”不是一家企业。它是一个流量来源。创始人建立个人品牌是为了为他们的初创公司获取用户。电商品牌使用UGC来销售实体产品。如果你有一个值得信赖的个人品牌，你几乎可以卖任何东西——从咖啡袋到裸照。
- en: Those without a personal brand need to build trust fast or leverage deeper psychological
    tactics in the form of direct response marketing to secure the sale. They need
    to go from ad to conversion as fast as possible. That opens up room for potentially
    unethical tactics and a sole focus on making quick money.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 没有个人品牌的人需要快速建立信任，或者利用直接响应营销的形式，采取更深层次的心理战术来确保销售。他们需要尽可能快地从广告转换到转化。这为可能不道德的策略和只关注快速赚钱的单一焦点打开了空间。
- en: Since we are building a personal brand according to The Trust Matrix from before,
    you’re in a very good spot.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们正在根据之前的信任矩阵建立个人品牌，你处于一个非常有利的位置。
- en: 'I could list out the pros and cons of each type of product you could build,
    but instead I’ll say this:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以列出你可以构建的每种产品的优缺点，但相反，我会这么说：
- en: '*Your first product should take no longer than a week to build.*'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: '*你的第一个产品应该不需要超过一周的时间来构建*。'
- en: Because you probably already have a product lying around.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 因为你可能已经有一个产品在身边了。
- en: As an example, John Hu from [Stan](https://join.stan.store/thedankoe) (a creator
    store that replaces your link in bio and hosts products) found his old resume
    that got him a Goldman Sachs job and turned that into a template. He made his
    first few thousand from that alone while talking about career advice. (Oh yeah,
    for any developers in Toronto out there, we’re hosting a Stan x Kortex hackathon
    with $15,000 in prizes. The goal is to build a creator tool that allows people
    to work for themselves. [Apply here if interested](https://hackai.ca/), or send
    to someone you know!)
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，来自[Stan](https://join.stan.store/thedankoe)（一个替代你的生物链接并托管产品的创作者商店）的John Hu找到了他的旧简历，那让他得到了高盛的工作，并将其变成了模板。仅靠这个模板他就赚了最初的几千元，同时还在谈论职业建议。（哦，对了，对于任何在多伦多的开发者来说，我们正在举办一个Stan
    x Kortex黑客马拉松，奖金高达15,000美元。目标是构建一个允许人们为自己工作的创作者工具。[有兴趣的话请申请这里](https://hackai.ca/)，或者转发给你的朋友！）
- en: 'You could:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以：
- en: Record a 30-60 minute training on how to do one impactful thing
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 录制一个30-60分钟的训练，介绍如何做一件有影响力的事情。
- en: Find an old asset that allowed you to get a desirable result and turn it into
    a template
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 找到一个曾经让你获得理想结果的老资产，并将其变成模板。
- en: Take a social post that’s received good reception and turn it into a short guide
    of template
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将受到良好反响的社会帖子变成一个简短的指南或模板。
- en: We aren’t trying to make the big bucks here.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这里并不是想赚大钱。
- en: We’re trying to validate an idea that is worth paying for.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在尝试验证一个值得付费的想法。
- en: Start by charging something like $10.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 从收取大约10美元开始。
- en: If you’re conversion rate is over 2.5% or so, then consider turning it into
    a more fleshed out product. That way, you don’t waste your time building something
    that people may not want.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你转化率超过2.5%左右，那么考虑将其转变为一个更完善的产品。这样，你就不会浪费时间构建人们可能不想要的东西。
- en: It really can be that simple.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 真的可以这么简单。
- en: I’ll leave it there since I’ve already posted a [mega guide to building a digital
    product.](https://thedankoe.substack.com/p/mega-guide-how-to-create-your-first)
  id: totrans-151
