  zh: 1. 目标（方向）
- en: 2\. Plan (clarity)
  id: totrans-109
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 2. 计划（清晰）
- en: 3\. Reduced friction (action)
  id: totrans-110
  prefs:
