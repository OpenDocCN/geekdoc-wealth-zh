- en: A desired outcome + knowing how to get there + simple execution will put you
    into a distraction-numbing state of flow.
  id: totrans-112
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一个期望的结果 + 知道如何实现它 + 简单执行，将使你进入一种消除干扰的心流状态。
- en: ''
  id: totrans-113
