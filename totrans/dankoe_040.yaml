- en: The 3-Part Daily Routine For Maximum Productivity
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 最大化生产力的三部分日常例行程序
- en: 原文：[https://thedankoe.com/letters/the-3-part-daily-routine-for-maximum-productivity/](https://thedankoe.com/letters/the-3-part-daily-routine-for-maximum-productivity/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/the-3-part-daily-routine-for-maximum-productivity/](https://thedankoe.com/letters/the-3-part-daily-routine-for-maximum-productivity/)
- en: I’ve always had some form of aversion toward Western work culture.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直对西方的工作文化有一种厌恶。
- en: 80-hour work weeks.
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 80小时工作周。
- en: High-pressure environments.
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高压环境。
- en: Little time for rest and recovery.
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 很少有时间休息和恢复。
- en: It never seemed “right” to me.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这对我来说从来都不“正确”。
- en: Why would I want to waste my entire day, knowing that 2-3 hours in my work quality
    would suffer?
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我为什么要浪费一整天的时间，明知我的工作效率会在2-3小时内下降？
- en: This has been a talking point for a long time now. I believe it has started
    to shape the creator economy and remote work.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这已经是一个长期的话题了。我相信它已经开始塑造创作者经济和远程工作。
- en: 4-hour workdays, singular focus, and meaningful work are becoming the norm in
    our little pocket of Twitter — and I wouldn’t have it any other way. We are creating
    a future of passionate individuals that produce world-shifting creations.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 4小时工作日、单一焦点和有意义的工作正在我们的小Twitter圈子里成为常态——而且我绝不希望有任何其他方式。我们正在创造一个充满激情的个体，他们能够创造出改变世界的作品。
- en: Ancient Romans, Ancient Greeks, Steve Jobs, Charles Darwin, and an infinite
    list of visionaries, strategists, and innovators attributed their success to surprisingly
    low “work” times.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 古罗马人、古希腊人、史蒂夫·乔布斯、查尔斯·达尔文以及无数有远见、策略家和创新者都将他们的成功归因于出奇低的“工作时间”。
- en: Writers from multiple domains, like Hemingway and Tarantino, would spend the
    majority of their days lounging by the pool, spitting game with girls, and doing
    everything aside from what they deemed “work.”
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 来自多个领域的作家，如海明威和塔伦蒂诺，会花大部分时间在游泳池边闲逛，和女孩们闲聊，做除了他们认为的“工作”之外的所有事情。
- en: Why?
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: I. The Paradox Of Productivity
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: I. 生产力悖论
- en: “The clever man may work smarter, not harder, they say, but the creative man
    doesn’t work at all.” — Alex Soojung-Kim Pang
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “聪明人可能工作得更聪明，而不是更努力，”他们说，“但创造者根本不工作。”——亚历克斯·苏桑金·金·潘
- en: For those that are like me and love the gym (or any kind of exercise), you understand
    the importance of rest and recovery.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 对于像我一样喜欢健身房（或任何形式的锻炼）的人来说，你理解休息和恢复的重要性。
- en: Imagine going to the gym for 8 hours trying to be as “productive” as possible.
    You would try to max out on main exercises like the nervous system taxing deadlift,
    then go on to do accessory movements. In one day, you would run out of exercises
    to do. You may even opt to go on a run just because your boss told you to.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你花了8个小时去健身房，试图尽可能“高效”地工作。你会尝试完成像神经系统挑战的深蹲这样的主要练习，然后进行辅助运动。在一天之内，你可能就会用完所有的练习。你甚至可能选择去跑步，因为你的老板告诉你这么做。
- en: Would you be able to come back and give it your all the next day? How about
    5 days in a row? Would you be able to tough it out until you can use your paid
    vacation time to recover and do it all over again?
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 你能否在第二天全力以赴？连续5天呢？你能否坚持下去，直到你可以使用你的带薪休假时间来恢复，然后再从头开始？
- en: '*Your body would* *be decimated**.*'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '*你的身体将会* *被摧毁**。'
- en: Instead, we go to the gym for 45-90 minutes at a time. We push ourselves at
    the expense of physical energy. We create a routine and schedule it into our days
    so we can prioritize rest, recovery, and general quality of life (because we have
    other parts of life to explore.)
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我们每次去健身房45-90分钟。我们以牺牲体力为代价来挑战自己。我们制定一个常规，并将其安排在我们的日程中，这样我们就可以优先考虑休息、恢复和一般的生活质量（因为我们还有其他生活部分要探索。）
- en: While corporate culture is handing you a pretty paycheck to incentivize sustained
    intensity, we must push back.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 当企业文化给你一份相当不错的薪水来激励持续的强度时，我们必须进行反击。
- en: Intensity isn’t sustainable. It’s not rocket science. Sustainability, consistency,
    and creativity must be prioritized before we even mention the word “productivity.”
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 强度是不可持续的。这不是火箭科学。在提及“生产力”这个词之前，我们必须优先考虑可持续性、一致性和创造力。
- en: II. The Fill – Empty – Use Framework For Sustainable Productivity & Creativity
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: II. 可持续生产力和创造力的填充-空虚-使用框架
- en: Now, this framework can be used by anybody but is best used by those that are
    in the creator space. Knowledge workers, consciousness workers, marketers, creatives,
    and the rest as [opposed to manual labor jobs](https://thedankoe.com/the-future-of-work-will-be-play/).
    Those that are creating value with their mind and post their findings, perspectives,
    and creations from the depths of their study online.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这个框架任何人都可以使用，但最好是由那些在创造者空间中的人使用。知识工作者、意识工作者、营销人员、创意人士以及其他[与体力劳动工作相对](https://thedankoe.com/the-future-of-work-will-be-play/)的人。那些用他们的思想创造价值，并从他们研究的深处在线发布他们的发现、观点和创作的人。
- en: This letter will be dedicated to understanding the depth behind a tweet I wrote
    a while back.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这封信将致力于理解我之前写的一条推文的深层含义。
- en: Fill your brain in the afternoons with books, learning, and socialization
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在下午用书籍、学习和社交来填充你的大脑
- en: ''
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Empty your brain before bed with journaling, planning, and meditation
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在睡前通过写日记、规划和冥想清空你的大脑
- en: ''
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Use your brain in the morning with creation, output, and focus
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在早晨用创造、输出和专注来使用你的大脑
- en: ''
  id: totrans-30
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [November 5, 2021](https://twitter.com/thedankoe/status/1456553636700504065?ref_src=twsrc%5Etfw)
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2021年11月5日](https://twitter.com/thedankoe/status/1456553636700504065?ref_src=twsrc%5Etfw)
- en: This letter is also assuming that you understand the importance of meeting your
    basic needs. Your psyche is wired for survival. If you have attachments to the
    external world — relationships of any form — that threaten your identity when
    the relationship is challenged, then you will not be able to act authentically.
    That is to say, you will have difficulty opening your mind to reality to leverage
    nature. Your attachments — or perceived needs — will act as obstructions that
    slow the flow of your productive and creative energy.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这封信也假设你理解满足基本需求的重要性。你的心理是为生存而设定的。如果你对外部世界有依恋——任何形式的关系——当关系受到挑战时威胁到你的身份，那么你将无法真诚地行动。也就是说，你将难以打开你的心扉去利用自然。你的依恋——或感知到的需求——将作为障碍，减缓你生产力和创造力的流动。
- en: You cannot be your true, authentic self if you *need* something that you do
    not already have.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你**需要**你还没有的东西，你就不能成为你真正的、真实的自我。
- en: Authenticity and openness is the key to all of this.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 真实性和开放性是这一切的关键。
- en: Before we jump in, a gentle reminder that Koe Letter readers can [join Modern
    Mastery for $5](https://modernmastery.co/letter) — a community dedicated to one-person
    businesses, personal development, lifestyle design, and the depth that comes along
    with that.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入之前，提醒一下，Koe Letter的读者可以[以5美元的价格加入现代精通](https://modernmastery.co/letter)——一个致力于个人企业、个人发展、生活方式设计和随之而来的深度的社区。
- en: II.I. Fill Your Mind
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: II.I. 填充你的思想
- en: We set the scene in the afternoon, not the morning, why? First, personal preference.
    Second, because this approach is holistic. Deep work hacks that only mention the
    time — usually morning — in which it’s time to be productive will always fail.
    Productivity and creativity are not one time things, they are modes of being.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在下午设定场景，而不是在早晨，为什么？首先，个人偏好。其次，因为这个方法是一体的。只提到时间——通常是早晨——是时候提高生产力了，这样的深度工作技巧总是会失败。生产力和创造力不是一时的事情，它们是存在的方式。
- en: It is not a matter of deep work. It is a matter of the balance and degree of
    which you engage in deep play, deep rest, and *lastly* deep work.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是关于深度工作的问题。这是关于你在深度玩耍、深度休息和**最后**深度工作之间的平衡和程度。
- en: For value creators, those that intend to put good out into the world, you must
    adopt the habit of conscious study. Without expanding your worldview, mind, and
    knowledge through exposing yourself to novel perspectives; how do you plan to
    create? Creativity, in some aspects, is about pulling from multiple sources and
    mashing them together. Like deconstructing a topic, learning about its parts through
    study, and building your own creation like you would playing with legos as a kid.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 对于价值创造者，那些意图将美好事物带入世界的人来说，你必须养成有意识学习的习惯。如果不通过接触新颖的视角来扩展你的世界观、思想和知识，你将如何计划创造？在某些方面，创造力是关于从多个来源汲取灵感并将它们混合在一起。就像分解一个主题，通过学习其各个部分，并像孩子玩乐高一样构建你自己的创造。
- en: When aligned with your vision, values, and goals you can consume information
    with the intention to understand and apply. This can begin to act as a vessel
    for raising your consciousness. You start to gain clarity on your life’s work
    through exposure to the information that aligns with you the most. If you don’t
    know where to start, re-read the book that changed the way you think, it will
    do it again.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的愿景、价值观和目标相一致时，你可以带着理解和应用的目的去消费信息。这可以开始作为一种提升你意识的方式。你开始通过接触与你最契合的信息，对你的生活工作有更清晰的了解。如果你不知道从哪里开始，就重新阅读那本改变你思维方式的书，它还会再次做到这一点。
- en: 'My favorite way of doing this comes in 2 parts:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我最喜欢的做这件事的方式有两个部分：
- en: '**1) Listening On A Walk**'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 漫步中的倾听**'
- en: 'I go on multiple walks throughout the day. Once in the morning, once after
    my work sessions, and once in the evenings. Not only is this crucial for sleep
    (see: circadian rhythm and sunlight) it has a multitude of other benefits.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我在一天中多次散步。一次在早上，一次在我工作之后，一次在傍晚。这不仅对睡眠至关重要（参见：昼夜节律和阳光），还有许多其他好处。
- en: It is quite nice to have an office and even nicer to have a warm, well-furnished
    home. But my mind often comes to a standstill after some hours indoors. So I take
    a walk. Once outside, my mind immediately begins to move freely and instinctively
    over my subject. Ideas come rushing to my mind, without being called. Soon enough,
    the best answer emerges from the jumble. I realize what I can do, what I should
    do, and what I must abandon. — Eugene Wigner
  id: totrans-44
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 有一个办公室是很不错的，有一个温暖、设备齐全的家就更好了。但我在室内待了几个小时后，我的思绪往往会停滞不前。所以我开始散步。一旦到了外面，我的思绪就会立即开始自由而本能地在我所关注的主题上移动。想法会突然涌入我的脑海，无需召唤。不久，最佳答案就会从混乱中浮现。我意识到我能做什么，我应该做什么，以及我必须放弃什么。——尤金·维格纳
- en: Aside from movement and exercise being great for your health, there is something
    unique about walks. Ancient masters swore by it, industry leaders took them religiously,
    and the world’s most respected creatives made them a part of their everyday routine
    — I have noticed immense benefits myself.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 除了运动和锻炼对你的健康大有裨益之外，散步还有一些独特之处。古代大师们对其深信不疑，行业领袖们虔诚地践行，世界上最受尊敬的创意人士将其作为他们日常例行公事的一部分——我自己也注意到了巨大的益处。
- en: When I pop in an audiobook, lecture, or video with the intention of applying
    what I learn to my current project (like a newsletter, tweet, module, or anything
    else that comes from having a personal brand as your consciousness work vessel)
    the ideas flow in a steady stream. From subconscious to conscious.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 当我带着将所学应用到当前项目（如通讯、推文、模块或任何其他以个人品牌作为意识工作载体的东西）的目的，听有声书、讲座或视频时，想法就会源源不断地涌现。从潜意识到意识。
- en: I pick up gold nuggets here and there from what I am consuming, but the real
    magic happens when I hear the right word that triggers a waterfall of insight.
    I’m not sure what the phenomenon is, but sometimes you just need that one word,
    letter, sound, example, anecdote, or story to bring up a thought that leads you
    down a rabbit hole of questioning and exploration.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里零零碎碎地捡起一些我所消费的东西中的金块，但真正的魔法发生在当我听到那个能触发一连串洞察力的正确词语时。我不确定这种现象是什么，但有时你只需要那个一个词、字母、声音、例子、轶事或故事，就能引发一个让你陷入疑问和探索的兔子洞般的思考。
- en: Walks are how I do my best work, as they are a necessity for creativity. Being
    a writer, I can get 80% of my work done by generating ideas, outlining, and writing
    on my phone while on a walk. Hence why my unique process is bundled up inside
    [The 2 Hour Writer.](https://2hourwriter.com)
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 散步是我完成最佳工作的方式，因为它们是创造力的必需品。作为一个作家，我可以在散步时通过产生想法、概述和在手机上写作来完成80%的工作。这就是为什么我的独特过程被整合在[《两小时作家》](https://2hourwriter.com)中。
- en: '**2) Reading In The Sun**'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 阳光下的阅读**'
- en: Another reason I love walks is that they act as creativity time blocks. When
    you get out of the house you become less prone to familiar distractions that will
    impact your study just by being in that environment. It doesn’t matter how hard
    you try to block out the distractions. You know they are there and they will occupy
    creative energy.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢散步的另一个原因是它们充当了创意时间块。当你离开房子时，你会变得不太容易受到熟悉干扰的影响，这些干扰仅仅因为身处那个环境就会影响你的学习。无论你多么努力地试图排除干扰，你都知道它们在那里，并且会占据你的创意能量。
- en: The same goes for going out in the sun. I’ve tried reading on walks but I end
    up tripping and getting hit in the head with tree branches (being 6’5″ does come
    with it’s downsides)!
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，出去晒太阳也是如此。我尝试过在散步时阅读，但结果是被树枝绊倒，头被撞到！（身高6英尺5英寸确实有其不利之处）！
- en: Heading out to my apartment pool with my Kindle and a bottle of San Pellegrino
    allows me to block out time specifically for reading. Reading — as opposed to
    listening — allows me focus my attention and study deeper. I can highlight ideas
    that I want to contemplate over the coming weeks and months for the sake of understanding.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 带着Kindle和一瓶圣培露矿泉水去我的公寓游泳池，让我能够专门留出时间来阅读。阅读——与听相比——让我能够集中注意力，深入研究。我可以突出那些我想在未来几周和几个月内深入思考的观点，以便更好地理解。
- en: '*Filling your mind* can be done at any time, and may be scattered throughout
    your day, but for the sake your own experimentation and clarity; start with doing
    this in the afternoons. If you do not have time to do this in the afternoon, sprinkle
    it throughout your day. I will give personal examples below.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '*充实你的心灵*可以在任何时候进行，可能散布在一天中的各个时刻，但为了你自己的实验和清晰；从下午开始做这个。如果你下午没有时间做这个，就把它分散到一天中。以下我将给出个人例子。'
- en: If you are unsure what to study, how to capture ideas, and want to develop your
    ability to learn a subject with speed and ease — [download my free 7 day creative
    challenge.](https://7daystogeniusideas.com)
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不确定要研究什么，如何捕捉想法，以及想要快速轻松地学习一门学科的能力——[下载我的免费7天创意挑战。](https://7daystogeniusideas.com)
- en: II.II. Empty Your Mind
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: II.II. 清空你的心
- en: In psychology, there is something called the Default Mode Network. From the
    book *Rest,* the DMN is “a series of interconnected sections that activate as
    soon as people stop concentrating on external tasks, and shifts from outward-focused
    to inward-focused cognition.”
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在心理学中，有一种被称为默认模式网络的东西。根据《休息》一书，DMN是“一系列相互连接的部分，一旦人们停止专注于外部任务，就会激活，并从外向型认知转向内向型认知。”
- en: When “activated” through restful, meditative, or open activities the brain is
    not any less active than it would be when engaged in something like focused work,
    or something that demands [narrow focus](https://thedankoe.com/how-to-master-your-focus/)
    and concentrated attention.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 当通过休息、冥想或开放的活动“激活”时，大脑的活跃程度并不亚于专注于某项工作或需要[狭窄的焦点](https://thedankoe.com/how-to-master-your-focus/)和集中注意力的活动。
- en: This can be associated with presence, surrender, and divine inspiration. When
    your focus is open, your subconscious mind is still working hard and munching
    on problems. Many programmers understand this well. They will often work on a
    project, encounter a bug, struggle to fix it, “give up,” and go about their day.
    At the most unexpected time, the perfect solution will pop into their head and
    the excited programmer will rush to open their code base to test it out. Shower
    thoughts is another example of this.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以与在场、投降和神圣的灵感联系起来。当你的注意力是开放的，你的潜意识仍在努力工作，咀嚼着问题。许多程序员对此理解得很好。他们经常会处理一个项目，遇到一个错误，努力修复它，“放弃”，然后继续他们的日常生活。在最意想不到的时刻，完美的解决方案会突然出现在他们的脑海中，激动的程序员会急忙打开他们的代码库来测试它。淋浴时的想法也是这样的例子。
- en: From personal experience, the greatest insights come after a period of struggle.
    My attention engaged with the natural battle raging in my head to the point of
    seeing its pointlessness. When you are hyper-focused on a problem in your life,
    the best way to solve it is counterintuitive. Letting go — surrendering, that
    is — and engaging with life itself will bring the answer to mind. Have faith 😉
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 从个人经验来看，最大的洞察力往往出现在一段挣扎之后。我的注意力与头脑中自然激荡的战斗达到一个点，看到了它的无意义。当你对生活中的问题极度专注时，解决问题的最佳方式往往是反直觉的。放手——即投降——与生活本身互动，答案就会浮现在脑海中。要有信心哦
    😉
- en: Empty your mind, be formless. Shapeless, like water. If you put water into a
    cup, it becomes the cup. You put water into a bottle and it becomes the bottle.
    You put it in a teapot it becomes the teapot. Now, water can flow or it can crash.
    Be water my friend. — Bruce Lee
  id: totrans-60
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 清空你的心，变得无形。像水一样无形状。如果你把水倒入杯子，它就变成了杯子。你把水倒入瓶子，它就变成了瓶子。你把它倒入茶壶，它就变成了茶壶。现在，水可以流动，也可以倾泻。成为水吧，我的朋友。
    —— 李小龙
- en: Everyone should be familiar with that quote, but how do you empty your mind?
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都应该熟悉那个引言，但你是如何清空你的心的？
- en: By immersing yourself in the present moment. [Flowing with the river of life
    and the highs and lows that it presents.](https://thedankoe.com/why-you-wont-change-how-to-reinvent-yourself/)
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 通过沉浸于当下。随着生活的河流起伏波动。[顺应生活的河流及其高低起伏。](https://thedankoe.com/why-you-wont-change-how-to-reinvent-yourself/)
- en: 'There are many ways to make this easier on you to grasp, but understand that
    all of these means lead to the same end. A few ways you can practice immersing
    yourself in the present moment:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多方法可以使这个过程更容易被你掌握，但请理解，所有这些方法最终都指向同一个目标。以下是一些你可以练习让自己沉浸于当下的方法：
- en: '**1) The Gym**'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 健身房**'
- en: Gym bros talk a lot about “mind-muscle connection” and other things that are
    just short for anchoring your attention in the present. When you are at the gym,
    be a silent observer. Observe the voice in your head that tells you to quit. Observe
    how the muscle feels as it contracts. Observe the blood flowing quicker through
    your body.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 健身房里的朋友们经常谈论“心灵与肌肉的联系”以及其他只是用来锚定你注意力在当下的简短说法。当你身处健身房时，成为一个沉默的观察者。观察你脑海中告诉你放弃的声音。观察肌肉收缩时的感觉。观察血液在你体内流动得更快。
- en: This works for any exercise, not only the gym. Elevated bodily functions that
    are easily observable makes it easier to treat the gym as a meditation practice.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这适用于任何锻炼，而不仅仅是健身房。那些容易观察到的身体功能提升使得将健身房视为冥想实践变得更容易。
- en: '**2) Nature Bathing**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 自然沐浴**'
- en: What better way to tap into the source than Source itself?
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 有什么比从源头本身汲取更好的方法呢？
- en: From a psychological lens, nature presents the perfect formula for flow. On
    a hike, you order your consciousness by having a vision of how you want the hike
    to go. You construct a hierarchy of goals in your mind that allow you to gain
    clarity on the climb. You may have a water intake goal, distance goal, health
    goal, or just the goal to have a good time in nature. Intention.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 从心理学的角度来看，自然提供了完美的流动公式。在徒步旅行中，你通过想象你希望徒步旅行如何进行来安排你的意识。你在心中构建了一个目标层次，这让你在攀登中变得清晰。你可能有一个水摄入目标、距离目标、健康目标，或者只是想在自然中度过愉快的时光的目标。意图。
- en: From there, you begin your ascent up the trail and are faced with a challenge.
    Is the challenge too difficult to the point it upsets you or makes you latch on
    to negative thoughts about not reaching your vision? Or maybe the challenge is
    too easy and it disappoints you. Even better, you planned the hike to match your
    skill level and you don’t have to incessantly think. Hiking becomes an art form
    and you kick into flow.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，你开始沿着小径攀登，并面临挑战。这个挑战是否过于困难，以至于让你感到沮丧或让你陷入无法达到目标的消极想法？或者，挑战可能过于简单，让你感到失望。更好的是，你计划这次徒步旅行以适应你的技能水平，你不必不断地思考。徒步旅行变成了一种艺术形式，你进入了心流状态。
- en: '**3) Other Meditative Habits You Can Adopt**'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 你可以采纳的其他冥想习惯**'
- en: Conscious meditation (obviously), conscious walks, conscious listening during
    conversation, conscious writing, conscious creating — can you start to see the
    picture I am painting here?
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 有意识的冥想（显然），有意识的散步，有意识的倾听对话，有意识的写作，有意识的创造——你能否开始看到我描绘的画面？
- en: Work when it’s time to work.
  id: totrans-73
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 适当时就工作。
- en: ''
  id: totrans-74
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Rest when it’s time to rest.
  id: totrans-75
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 适当时就休息。
- en: ''
  id: totrans-76
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Play when it’s time to play.
  id: totrans-77
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 适当时就玩耍。
- en: ''
  id: totrans-78
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: When immersed in the present moment, there is no difference.
  id: totrans-79
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当你沉浸于当下时，没有区别。
- en: ''
  id: totrans-80
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Live when it's time to live.
  id: totrans-81
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 适当时就生活。
- en: ''
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [July 3, 2022](https://twitter.com/thedankoe/status/1543552638293254144?ref_src=twsrc%5Etfw)
  id: totrans-83
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — DAN KOE (@thedankoe) [2022年7月3日](https://twitter.com/thedankoe/status/1543552638293254144?ref_src=twsrc%5Etfw)
- en: There is a big problem in self-help that everyone is prone to, myself included.
    When you are just starting out, and even when you are deep into the space, you
    are just doing the activities that people tell you to do. Most people are meditating
    unconsciously, which is a funny example. They are mechanically going through the
    motions because it has become habitual. They aren’t getting the benefits they
    would get if they simply prioritized consciousness at any given moment — not just
    during meditation.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在自我帮助领域存在一个很大的问题，每个人都容易陷入，包括我自己。当你刚开始，甚至当你深入这个领域时，你只是在做人们告诉你要做的事情。大多数人都在无意识地冥想，这是一个有趣的例子。他们机械地重复动作，因为它们已经变成了习惯。他们没有得到他们在任何给定时刻优先考虑意识所能得到的益处——不仅仅是冥想时。
- en: The best way I can explain consciousness in this context is by understanding
    relativism. Everything that is not absolute truth (unknowable or unspeakable with
    words alone) is relative. Relative means that there is a relationship. Cause and
    effect. Polarity. One thing cannot exist without the other. During meditation,
    can you follow a thought to another thought to an event until the lines are blurred
    and you glimpse into Infinity?
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个背景下，我能用理解相对论的方式来解释意识。所有不是绝对真理（仅用言语无法知晓或表达）的东西都是相对的。相对意味着存在一种关系。因果关系。两极性。一件事不能没有另一件事而存在。在冥想中，你能跟随一个想法到另一个想法到一件事件，直到线条模糊，你窥视到无限吗？
- en: When you are writing, can you spot the gaps in your understanding? Can you bust
    through “writer’s block” by following a paragraph and becoming conscious of what
    is missing? Can you see how I am weaving in concepts into this article and connecting
    them with other concepts that are seemingly unrelated but they aren’t because
    everything is relative?
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在写作时，你能发现你理解上的空白吗？你能通过跟随一段文字并意识到缺失的内容来打破“写作障碍”吗？你能看到我是如何将概念编织进这篇文章，并将它们与看似不相关但实际上因为一切都是相对的而相关联的其他概念相连接的吗？
- en: As a note, that is the secret to my writing. I choose a topic that I know and
    fill in the blanks in a way that I understand it according to my direct experience.
    Stream of consciousness, then edit. If you can’t tap into an infinite stream of
    consciousness, question why. Questioning shines the light of awareness onto resistance
    and allows it to dissipate.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 作为备注，这是我写作的秘密。我选择一个我知道的主题，并按照我的直接经验来填补空白。意识流，然后编辑。如果你无法进入无限的意识流，问自己为什么。质疑将意识之光投射到阻力上，并允许它消散。
- en: '**4) Physical Mediums**'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 物理媒介**'
- en: Another way to order consciousness or create clarity is to express the unorganized
    thoughts that are in your head. This is done through writing or speaking.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种整理意识或创造清晰的方法是表达你头脑中的无序思想。这是通过写作或说话来完成的。
- en: My favorite method was shown to me by my good friend [Joey Justice](https://twitter.com/heyjoeyjustice).
    That method is brain dump journaling. How do you brain dump journal? First, by
    writing out every single thing that you can bring your attention to in your mind.
    Once you have all thoughts, reactions to feelings, emotions, and tasks written
    in chaotic fashion on your paper — you can start to organize them.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我最喜欢的这个方法是由我的好朋友[乔伊·贾斯提斯](https://twitter.com/heyjoeyjustice)展示给我的。这个方法就是大脑倾倒式日记。如何进行大脑倾倒式日记？首先，通过写下你心中能注意到的每一件事。一旦你将所有想法、对感受、情绪和任务的反应以混乱的方式写在纸上——你就可以开始组织它们了。
- en: This is where connections are made and clarity is gained. You can organize the
    entities on your page into specific categories, potential projects, deep work
    priorities, and any other relationship that can be made by the connection of your
    brain dump.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是连接被建立，清晰被获得的地方。你可以将你页面上的实体组织成特定的类别、潜在项目、深度工作优先级，以及通过你大脑倾倒的连接可以建立的其他任何关系。
- en: Not only will this quiet your mind and prepare you for sleep — which is why
    I enjoy doing it at night — it can be used as an intentional planning session
    for the months, weeks, or days ahead.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅会平静你的心灵，为你准备睡眠——这就是我为什么喜欢在晚上做这件事的原因——它还可以用作对未来几个月、几周或几天有意识的规划。
- en: '*By taking your attention off work and placing it on life, the gap between
    the two dissipates and The Unknown will deliver the insight you were looking for
    to the forefront of your conscious mind.*'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '*通过将你的注意力从工作转移到生活，两者之间的差距就会消散，未知将把你要寻找的洞察带到你意识的前台。*'
- en: This aspect is also baked into my work as a writer, I just [choose to do it
    online so I can do it for a living.](https://2hourwriter.com) By treating social
    media as a “public journal,” I kill two birds with one stone.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 这个方面也融入了我作为作家的工作中，我只是[选择在网上做这件事，这样我就可以以此为生](https://2hourwriter.com)。将社交媒体视为“公共日记”，我是一石二鸟。
- en: II.III. Use Your Mind
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: II.III. 使用你的思维
- en: I’ve talked about focused work a lot. I’ve also talked about the [depth behind
    focus](https://thedankoe.com/how-to-master-your-focus/), that most humans glance
    over, even when it is the main thing that separates us from other beings.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经多次谈论过专注工作。我也谈到了[专注背后的深度](https://thedankoe.com/how-to-master-your-focus/)，这是大多数人忽略的，即使它是我们与其他生物区分开来的主要因素。
- en: Using your mind comes last as we have *filled* and *emptied* our mind. By filling
    our mind we have expanded it, broadening our awareness and allowing The Law of
    Inspired Action to come into play. This gives us fresh creative firepower for
    when we *use* our mind. By emptying our mind we have allowed the Default Mode
    Network to come into play. Our subconscious mind will deliver insight to our conscious
    mind and we can order said consciousness through brain dump journaling.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 使用你的思维是最后的步骤，因为我们已经“填充”和“清空”了我们的思维。通过填充我们的思维，我们扩展了它，拓宽了我们的意识，并允许灵感行动法则发挥作用。这为我们提供了当“使用”我们的思维时的新鲜创造力。通过清空我们的思维，我们允许默认模式网络发挥作用。我们的潜意识将向我们的意识提供洞察力，我们可以通过大脑倾倒日记来整理这种意识。
- en: 'There are 3 main things that come into play when getting into deep, focused
    work:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行深入专注的工作时，有三个主要因素发挥作用：
- en: Leveraged familiarity
  id: totrans-99
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 利用熟悉感
- en: Ordered consciousness
  id: totrans-100
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 有序意识
- en: Connection to The Unknown
  id: totrans-101
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与未知相连
- en: We have checked some of these boxes already — like ordering consciousness with
    journaling — but everything serves a different purpose under different contexts.
    Our goal with focused work is to eliminate distractions, get into flow, and produce
    quality work in the short amount of time that our finite creative energy allows.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经检查了一些这些框——比如通过日记来排序意识——但在不同的背景下，每一件事都有不同的目的。我们专注于工作的目标是通过消除干扰，进入心流状态，并在有限创造力的短时间内产出高质量的工作。
- en: Leveraged familiarity is a soft morning routine. The human brain loves to conserve
    the energy wasted on familiar things. Hence why habit formation is so popular,
    like putting certain and preferably beneficial aspects of your life on autopilot.
    As with most things, there is depth to the term habits. There are mental, emotional,
    physical, and financial habits that could each be broken down even further to
    take a peek into how robotic we truly are in our unconscious lives.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 利用熟悉感是一种温和的早晨习惯。人脑喜欢节省在熟悉事物上浪费的能量。这就是为什么习惯形成如此受欢迎，比如将你生活中某些和最好是有益的部分自动化。与大多数事情一样，这个术语“习惯”有深度。有心理、情感、身体和财务习惯，每个都可以进一步分解，以窥见我们在无意识生活中的真正机器人化程度。
- en: Leveraged familiarity is just that. Being conscious that your morning routine
    is familiar and remaining connected to The Unknown or infinity throughout by being
    conscious of your direct experience. For my Tolle fans, and in simple terms, this
    means being in the Now — as you can only “know” what you can project on reality
    from the familiar past or potential future.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 利用熟悉感正是如此。意识到你的早晨习惯是熟悉的，并通过意识到你的直接体验，保持与未知或无限的联系。对于我的托勒尔粉丝来说，简单来说，这意味着活在当下——因为你只能“知道”你能从熟悉的过去或潜在的未来投射到现实中的东西。
- en: Ordered consciousness comes into play with your routine. Having a familiar wake-up
    time, work environment, and little friction when it comes time to work is key
    for preserving creative energy. If you have not already planned your morning out
    with your nightly brain dump, you can set an ideal yet challenging outcome for
    your work and 2-3 priority tasks that will move the needle towards that outcome.
    When this micro hierarchy of goals is aligned with the macro — your life’s vision
    and goals — the flow state should come seamlessly.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 有序意识在你的日常习惯中发挥作用。拥有一个熟悉的起床时间、工作环境，以及在工作时减少摩擦是保持创造力的关键。如果你还没有在夜间进行大脑倾倒来规划你的早晨，你可以设定一个理想但具有挑战性的工作成果，以及2-3个能够推动这一成果的优先任务。当这个微观目标层次与宏观目标——你的人生愿景和目标——对齐时，心流状态应该会无缝出现。
- en: There are 3 steps to unlocking deep focus
  id: totrans-106
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
