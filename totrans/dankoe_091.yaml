- en: The Anti-Niche (Why Being Nicheless Makes You Irreplaceable)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 反利基（为什么无利基让你无可替代）
- en: 原文：[https://thedankoe.com/letters/the-anti-niche-why-being-nicheless-makes-you-irreplaceable/](https://thedankoe.com/letters/the-anti-niche-why-being-nicheless-makes-you-irreplaceable/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/the-anti-niche-why-being-nicheless-makes-you-irreplaceable/](https://thedankoe.com/letters/the-anti-niche-why-being-nicheless-makes-you-irreplaceable/)
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1652">![](../Images/ada0e2616d7d8d7c5aa335dfaa0c621a.png)</picture>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1652">![](../Images/ada0e2616d7d8d7c5aa335dfaa0c621a.png)</picture>
- en: I realized this after years of pain.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我在经历了多年的痛苦之后才意识到这一点。
- en: 'Excruciating pain caused by the first piece of advice you’ll hear when you
    first embark on your journey to become a free individual:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 当你开始你的自由个体之旅时，你将听到的第一条建议带来的痛苦是难以忍受的：
- en: “Niche down.”
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: “利基化。”
- en: Just like the social matrix, there is a business matrix.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 就像社会矩阵一样，还有一个商业矩阵。
- en: The social matrix is a groundless web of ideas that allows society to operate
    cohesively.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 社会矩阵是一个没有根据的思想网络，它允许社会协同运作。
- en: The government and culture influence the school system. The school system creates
    resources for students to learn from. The students don’t question what they’re
    taught. The students go on to be parents. The parents teach their children what
    they know and send them to school. The children make friends and conform further
    to fit in. The children grow up, get jobs, become teachers, become parents, become
    politicians, and create the knowledge and resources online and offline that influence
    culture. The parents, students, and children vote. The cycle continues to create
    the society we live in.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 政府和文化影响着教育体系。教育体系为学生提供学习资源。学生不会质疑他们所学的。学生成为父母。父母传授他们所知，并将他们送到学校。孩子们交朋友，进一步适应以融入其中。孩子们长大成人，找到工作，成为教师，成为父母，成为政治家，并在线上线下创造影响文化的知识和资源。父母、学生和孩子们投票。这个循环继续创造我们生活的社会。
- en: The business matrix is the same web of ideas that allows businesses to operate
    how they’re “supposed to.”
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 商业矩阵是那个让企业能够按照“应该”的方式运营的思想网络。
- en: You are a human. You learn by being exposed to beginner-level knowledge, then
    intermediate and advanced.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 你是人类。你通过接触入门级知识，然后是中级和高级知识来学习。
- en: The thing is, who questioned this beginner-level knowledge from the start?
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，谁从一开始就质疑了这种入门级知识？
- en: Are we absolutely sure it is the best way to go about things?
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我们绝对确定这是处理事情的最佳方式吗？
- en: Is it the most conducive to results? Or does it cause more confusion that makes
    people quit too early?
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这是最有利于结果吗？还是它造成了更多的困惑，让人们过早地放弃？
- en: Those that break free of the matrix can do whatever they want.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 那些摆脱矩阵的人可以随心所欲地做任何事情。
- en: But you can’t break free in an instant.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 但你不能瞬间摆脱束缚。
- en: You have to understand the rules of the game and acquire enough experience before
    you can start playing your own game.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在你开始自己的游戏之前，你必须理解游戏的规则并积累足够的经验。
- en: It Never Made Sense. It Never Worked. Until…
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 这从未有意义。它从未奏效。直到…
- en: When I began my business journey I started with freelancing.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 当我开始我的商业之旅时，我从自由职业开始。
- en: I thought it was the most “beginner-friendly” option because all I had to do
    was “learn a skill, sell a skill.”
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这是最“适合初学者”的选项，因为我只需要“学习一项技能，出售一项技能”。
- en: So, I decided to try my hand at freelancing with almost every skill you can
    think.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我决定尝试使用几乎所有你能想到的技能进行自由职业。
- en: Video editing, graphic design, SEO, content marketing, Facebook Ads, and web
    design.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 视频编辑、平面设计、SEO、内容营销、Facebook广告和网页设计。
- en: I called myself an “agency” at the time because it sounded cooler than being
    a freelancer. But it was just me. So I wasn’t an agency, I was a freelancer. So
    are you if you don’t have employees.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 当时我称自己为“代理”，因为这听起来比自由职业者酷。但那只是我。所以我不是代理，我是自由职业者。如果你没有雇员，那你也是。
- en: (People don’t care about whether you are an agency or freelancer by the way).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: （顺便说一句，人们不在乎你是代理还是自由职业者）。
- en: My pain point was always picking a niche.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我的痛点总是选择利基市场。
- en: I’d download free guides and run endless Google searches on the “top 100 niches
    to target.”
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我会下载免费指南，并在“顶级100个目标利基市场”上进行无休止的谷歌搜索。
- en: I targeted dentists, gyms, construction companies, and the rest.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我的目标是牙医、健身房、建筑公司以及其他。
- en: What are the problems with this approach?
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法有哪些问题？
- en: '**I don’t care about these people.** I would (and did) hate working with them.
    This isn’t a sustainable approach to something as important as your life’s work.
    You’re starting a business for a reason, and it isn’t to just have a new boss.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**我不在乎这些人。** 我会（并且确实）讨厌与他们合作。这不是对如此重要的事情（如你的生活工作）的可持续方法。你创业是有原因的，并不是为了仅仅有一个新的老板。'
- en: '**I don’t have experience with their business.** *Most businesses fail because
    they try to solve a problem they haven’t experienced.* Remember that. Feel free
    to come back to me when you ignore this and fail.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**我没有与他们业务的经验。** *大多数企业失败是因为它们试图解决他们没有经历过的问题。* 记住这一点。如果你忽视这一点并失败了，随时可以回来找我。'
- en: '**It prioritizes *finding*, not attracting or becoming.** You learn a skill
    for someone else. You search endlessly for people to reach out to and end up spending
    more time on lead generation than building leverage.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**它优先考虑*寻找*，而不是吸引或成为。** 你为别人学习一项技能。你无休止地寻找要联系的人，最终花费更多的时间在客户开发上，而不是建立杠杆。'
- en: It’s no wonder people don’t stick to building a business.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 没有什么奇怪的人不会坚持建立业务。
- en: The business ideologies circling the space have dominated for too long.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 空间中环绕的商业理念已经主导了太久。
- en: They are shallow and lack regard for human nature, psychology, and fulfillment.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 它们是肤浅的，并且缺乏对人性、心理学和满足感的关注。
- en: I will give you a better way to go about creating a niche of one. A way that
    is intuitive, profitable, and sustainable.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我会给你一个更好的方法来创建一个细分市场。这是一种直观、有利可图且可持续的方法。
- en: '**A few lessons that will spare you a lot of pain:**'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**一些能让你少受很多痛苦的教训：**'
- en: 1) The strong desire to find the best niche is a blatant sign pointing to the
    fact that you don’t understand business from a big picture. Principles VS tactics,
    and “finding the best niche” is a tactic.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 1) 强烈想要找到最佳细分市场的愿望是一个明显的迹象，表明你没有从大局出发理解商业。原则VS策略，“找到最佳细分市场”是一种策略。
- en: 2) Build a product or service that **you** would actually buy, use, and benefit
    from. There aren’t many shortcuts in business, but this is one of them.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 2) 建立一个你实际上会购买、使用并从中受益的产品或服务。商业中很少有捷径，但这是其中之一。
- en: Those two lessons are what changed everything for me.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个教训改变了我的一切。
- en: The Most Profitable Niche Is You (Productize Your Mind)
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 《最赚钱的细分市场就是你》（将你的思维产品化）
- en: <picture decoding="async" class="wp-image-1653">![](../Images/9af7a7b630d22bf5887c51ec08665c78.png)</picture>
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-1653">![](../Images/9af7a7b630d22bf5887c51ec08665c78.png)</picture>
- en: Most people don’t realize that they belong to a very specific niche.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人没有意识到他们属于一个非常特定的细分市场。
- en: You follow a broad amount of people with various interests that have created
    who you are.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 你关注了各种兴趣的人，这些人塑造了你。
- en: 'This is mistake number one when creating your niche:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建你的细分市场时，这是第一个错误：
- en: If your job is to target a specific person, and you are a specific person, why
    are you narrowing in on one specific interest that you want to sell a product
    or service around?
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的工作是针对一个特定的人，而你是一个特定的人，为什么你要专注于一个你想要围绕其销售产品或服务的特定兴趣？
- en: No, it won’t make you more authoritative.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 不，这不会让你更有权威。
- en: No, people won’t trust you more.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 不，人们不会更信任你。
- en: At best, you’ll look like a glorified search engine of “actionable advice.”
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的情况是，你看起来像是一个“行动建议”的荣耀搜索引擎。
- en: At worst, you limit your audience growth and can’t leverage a wider network.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 最坏的情况是，你限制了你的受众增长，无法利用更广泛的网络。
- en: If someone only talked about the niche they chose, like training programs for
    entrepreneurs and executives, they would only attract those people.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有人只谈论他们选择的细分市场，比如企业家和执行人员的培训计划，他们只会吸引那些人。
- en: This isn’t bad, but it’s such a small sample size, and this isn’t paid ads where
    you can pinpoint ad placements to get in front of these people.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不坏，但样本量如此之小，这也不是付费广告，你可以精确地定位广告投放，让这些人看到。
- en: 'When they only talk to that niche:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 当他们只与那个细分市场交谈时：
- en: They have more difficulty at the start.
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们一开始的难度更大。
- en: Fewer people share their content (they can’t get in front of the right people)
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分享内容的人更少（他们无法接触到正确的人）。
- en: They may grow to 5,000 followers in a year when someone who incorporated their
    interests can grow to 20,000 in a year
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们可能一年内增长到5,000个粉丝，而一个结合了他们兴趣的人可能一年内增长到20,000个粉丝。
- en: After 3 years, the first gets to 30,000 and the second gets to 300,000 because
    of the compounding effect.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 经过3年后，第一个达到30,000，第二个因为复利效应达到300,000。
- en: “But Dan, those 300,000 followers don’t care about my product or service. They’re
    not hot leads. They aren’t going to buy from me right away. They’re useless.”
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: “但是丹，那300,000名追随者对我的产品或服务不感兴趣。他们不是热线索。他们不会立即从我这里购买。他们是无用的。”
- en: There is a lot to unpack there.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有很多东西需要解释。
- en: First, if those 300,000 followers each know 3-5 people that they can refer to
    you, that’s a 900,000 to 1,500,000 audience thanks to the network effect. All
    while the 30,000 follower hyper-niched-down guy is struggling to have enough leverage
    to get out of manual client work.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，如果那300,000名追随者每人都能推荐3-5个人给你，那么由于网络效应，这将是一个900,000到1,500,000的受众。而那个有30,000名追随者的超利基化的人却在努力获得足够的杠杆来摆脱手动客户工作。
- en: Second, they’re not supposed to buy from you right away. That’s the entire purpose
    of an education brand. You *help* them go from beginner (content) to advanced
    (product) with time.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，他们不应该立即从你这里购买。这正是教育品牌的目的所在。你 *帮助* 他们随着时间的推移从初学者（内容）到高级（产品）。
- en: Third, nobody is a useless follower, you are just so narrow-minded and indoctrinated
    with outdated business dogma that you don’t understand that people can learn something
    new that improves their life.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 第三，没有人是无用的追随者，你只是如此狭隘和受过时商业教条的洗脑，以至于你不理解人们可以学习到一些新东西，这些新东西可以改善他们的生活。
- en: By the way, I teach all of this in [Digital Economics](https://digitaleconomics.school).
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 顺便说一句，我在[数字经济学](https://digitaleconomics.school)教授所有这些内容。
- en: A “Niche” Is A Worldview or Perspective
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: “利基”是一种世界观或视角
- en: <picture decoding="async" class="wp-image-1654">![](../Images/804825ab5735aa78b9cc4284b44a70f2.png)</picture>
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-1654">![](../Images/804825ab5735aa78b9cc4284b44a70f2.png)</picture>
- en: Let’s break down what a niche actually is.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分析一下“利基”实际上是什么。
- en: When you are the niche, and who you are is constantly changing, you are niche-less.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 当你是利基时，而你又是不断变化的，你就没有利基。
- en: You don’t box yourself into skills or interests that you will outgrow because
    you are human.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 你不会把自己局限于你将因人而成长的技能或兴趣中。
- en: Why are you told to niche down in the first place?
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么你一开始就被要求利基化？
- en: So you can understand the mind of your readers and customers.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你可以理解你的读者和客户的心态。
- en: 'You’re told to create a customer avatar, identify a burning problem they face,
    and position a solution toward them. (This solution is often the same as any other
    product with small changes. The point is to make it *perceived *as valuable to
    a specific person by understanding them. **Hack**: recreate what already exists,
    but better, and don’t overcomplicate it).'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 你被告知要创建一个客户形象，确定他们面临的紧迫问题，并向他们提供解决方案。（这个解决方案通常与任何其他产品相似，只是略有不同。关键是通过对他们有所了解，让他们觉得这个解决方案对他们有价值。**技巧**：重新创造已经存在的东西，但做得更好，不要过于复杂）。
- en: So, why don’t we skip all of that and treat ourselves as the customer avatar,
    solve problems that we’ve actually experienced, and build a solution that actually
    benefits our lives.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们为什么不跳过所有这些，把自己当作客户形象，解决我们真正经历的问题，并建立一个真正对我们生活有益的解决方案呢？
- en: This eliminates 99% of the guesswork with making money.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这消除了赚钱的99%的猜测。
- en: And, you don’t end up working with people you don’t like.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，你不会与不喜欢的人共事。
- en: In essence, a customer avatar is the mind, worldview, or perspective of someone
    you are creating for or marketing toward.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，客户形象是你为某人创造或向其营销的思维、世界观或视角。
- en: 'From a structural standpoint, a worldview or perspective is composed of:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 从结构的角度来看，世界观或视角由以下组成：
- en: '**1) Goals**'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 目标**'
- en: The conscious or unconscious goals that influence every single action you take,
    like taking one step forward or going to the gym.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 影响你每个行动的有意识或无意识的目标，比如向前迈出一步或去健身房。
- en: Self-generated goals put you in control of your life.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 自我设定的目标让你掌控自己的生活。
- en: Goals frame how you interpret situations. A person with the assigned goal of
    society to retire at 60 years old will see fewer business opportunities as opportunities
    than the person with a self-generated goal of financial freedom by 25 years old.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 目标决定了你如何解读情况。一个被分配的目标是在60岁时退休的人，将把更少的商业机会视为机会，与那些通过25岁实现财务自由的人相比。
- en: Goals also frame how you (or your readers) interpret books and content. Two
    people with different goals will have radically different highlights of the books
    and content. They will notice the things that aid in their goals – whether they
    are aware of it or not.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 目标也决定了你（或你的读者）如何解读书籍和内容。具有不同目标的两个人将对书籍和内容有截然不同的重点。他们会注意到有助于他们目标的事情——无论他们是否意识到这一点。
- en: '**2) Problems**'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 问题**'
- en: The conscious or unconscious problems that prevent you from reaching your goals
    or ideal lifestyle.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 阻碍你达到目标或理想生活方式的有意识或无意识的问题。
- en: The foundation of marketing is to raise your readers’ level of awareness surrounding
    their problems over time.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 营销的基础是在一段时间内提高你读者对问题的认识水平。
- en: If you’ve solved your own problems and are helping your audience do the same,
    you are in a great position.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经解决了自己的问题，并帮助你的受众也这样做，你处于一个很好的位置。
- en: 'The 5 levels of awareness are:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 5个意识层次是：
- en: '**Unaware** – unaware of their problem and how it is hurting their quality
    of life.'
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**无意识** – 对他们的问题以及它如何损害他们的生活质量一无所知。'
- en: '**Problem aware** – aware of their problem but don’t know how to solve it.'
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**问题意识** – 了解他们的问题，但不知道如何解决它。'
- en: '**Solution aware** – aware of their problem and know there is a solution, education,
    or knowledge to solve it.'
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**解决方案意识** – 了解他们的问题，并知道有解决方案、教育或知识可以解决它。'
- en: '**Product aware** – aware of their problem and know there is a streamlined
    path or system to solve it.'
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**产品意识** – 了解他们的问题，并知道有一个简化的路径或系统可以解决它。'
- en: '**Most aware** – they are ready to change, they just need the right “why” that
    changes behavior instantly. Like when you read an idea in the book and it changes
    you entire outlook on life.'
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**最清醒** – 他们准备好改变，只是需要立即改变行为的正确“为什么”。就像你在一本书中读到某个想法，它改变了你对生活的整个看法一样。'
- en: When your worldview is your niche, your job is to write in a creative fashion
    that increases people’s awareness of their problems. That way, they act on a solution
    toward reaching their goals.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的世界观是你的细分市场时，你的工作是创造性地写作，以增加人们对问题的认识。这样，他们就会采取行动，朝着实现目标的方向寻求解决方案。
- en: '**3) Potential paths**'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 潜在路径**'
- en: The last piece of the worldview puzzle is clarity.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 世界观拼图中的最后一部分是清晰度。
- en: When people don’t have clarity on their next steps, they feel anxious, overwhelmed,
    or bored.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 当人们对自己的下一步没有清晰的认识时，他们会感到焦虑、不知所措或无聊。
- en: This is what causes arguments in relationships, dissonance in business, and
    battles between political parties.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是关系中的争吵、商业中的失调以及政党之间的斗争的原因。
- en: People who don’t share the same worldview are missing pieces of the other party’s
    path, narrative, or system that allows them to make sense of that situation.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 与你持有不同世界观的人缺少了对方路径、叙事或系统的一部分，这使他们能够理解那种情况。
- en: '*So, when you are the niche, your job is to create a holistic, step-by-step
    path that you can share with readers who have your same worldview, usually in
    the form of a product or service that you can be paid for.*'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '*因此，当你处于细分市场时，你的工作是创建一个全面、逐步的路径，你可以与拥有相同世界观、通常以你可以从中获得报酬的产品或服务形式分享的读者分享。*'
- en: That way they are more likely to get results and understand you.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 这样他们更有可能取得成果并理解你。
- en: There’s a reason why my philosophical musings bring a load of new people into
    business. Because I make it make more sense than the shallow business gurus you
    see everywhere.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我为什么的哲学沉思能吸引一大群新人进入商业领域是有原因的。因为我认为它比随处可见的肤浅的商业大师更有道理。
- en: 'Beyond goals, problems, and potential paths there are multiple aspects of the
    human psyche that influence how people perceive and act on goals and problems:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 除了目标、问题和潜在路径之外，还有许多影响人们如何感知和行动的心理因素：
- en: Prior experiences
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 先前的经验
- en: Firm and loose beliefs
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 坚定和松散的信念
- en: Skill level across all domains of life
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生活中所有领域的技能水平
- en: All of the above can be conscious, unconscious, known, or unknown.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都可以是有意识的、无意识的、已知的或未知的。
- en: Your entire job as an education brand is to raise the consciousness of your
    audience.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 作为教育品牌，你的整个工作就是提高你受众的意识。
- en: Make them conscious of their goals and problems.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 让他们意识到他们的目标和问题。
- en: Expose them to unknown potentials of their life and educate them to the point
    of it being known.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 向他们展示他们生活中未知的潜力，并教育他们到他们知道的程度。
- en: Your niche is the *frame* of big goals and burning problems that compose your
    worldview.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 你的细分市场是你世界观中由大目标和紧迫问题组成的框架。
- en: Your job is to program the minds of your audience to adopt this frame (or worldview),
    pursue those goals, and solve those problems.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 你的任务是编程你受众的头脑，让他们接受这种框架（或世界观），追求那些目标，并解决那些问题。
- en: This is a massive yet fulfilling undertaking to live a life of purpose.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一项艰巨而充实的任务，是为了过上充满目标的生活。
- en: It demands that you develop yourself for life and evolve with the responsibility
    of guiding a community under you.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 它要求你在生活中发展自己，并承担起在你之下引导社区的职责。
- en: Niches are supposed to be specific, and what is more specific than this?
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 领域应该是具体的，还有什么比这更具体呢？
- en: A desirable goal that will change your life (and your readers).
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 一个能改变你生活（以及你的读者）的期望目标。
- en: A burning problem that will ease your suffering (and your readers).
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 一个能减轻你（以及你的读者）痛苦的燃点问题。
- en: A clear path, system, or solution to bring you clarity (and your readers).
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 一个清晰的路径、系统或解决方案，为你和你的读者带来清晰。
- en: The goals and problems will almost always be similar to someone else’s.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 目标和问题几乎总是与别人的相似。
- en: 'Everyone has the same goals and problems in the eternal markets: health, wealth,
    relationships, and happiness.'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在永恒的市场中，每个人都有相同的目标和问题：健康、财富、关系和幸福。
- en: But the path…
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 但路径……
- en: The path is singular to you.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 路径对你来说是独一无二的。
- en: Everyone wants financial freedom, but two people *have* to take different paths.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都想要财务自由，但两个人*必须*走不同的道路。
- en: You may go the social media and online business route with e-commerce and the
    unique skills, mindset, and experience associated with that.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以选择社交媒体和在线商业路线，包括电子商务以及与之相关的独特技能、心态和经验。
- en: Another may go the investing and real estate route with another unique combination
    of skills and interests.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 另一些人可能会选择投资和房地产路线，结合另一种独特的技能和兴趣组合。
- en: Remember that *every other interest* you learn also plays a role in how you
    perceive situations.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，*你学习的每一个其他兴趣*也在你如何感知情况中扮演着角色。
- en: If journaling, going on a walk, or playing video games were included on that
    path, no matter how direct to achieving your goal, still played a role in your
    achieving your goal.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 即使是日记、散步或玩电子游戏这样的路径，无论它们在实现目标上多么直接，仍然在你实现目标的过程中发挥着作用。
- en: The path is what creates who you are.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 路径创造了你。
- en: All of the beliefs, skills, and billions of bits of information you process
    along the way toward achieving your goals is the most unique niche in the world.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 在实现目标的过程中，你处理的所有信念、技能以及数十亿比特的信息构成了世界上独一无二的专业领域。
- en: If you can illustrate your path across your hundreds of posts, newsletters,
    products, and interactions – that is how you create a niche of one.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能在你的数百篇帖子、通讯、产品和互动中描绘出你的路径，那么这就是你创造独特领域的方式。
- en: Your job is to document your life on the internet and let the rewards of authenticity
    work their magic.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 你的工作是记录你在互联网上的生活，让真实性的回报发挥其魔力。
- en: Your job is to attract a specific group of people. You do this by writing ideas
    in a way that makes sense to you. From your worldview. From your point of view.
    The specific group of people are those with your same personality. That’s how
    you set yourself up to create a product for yourself that sells without market
    research.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 你的工作是吸引一个特定的群体。你通过以对你有意义的方式撰写想法来实现这一点。从你的世界观出发。从你的观点出发。这个特定的群体是你性格相同的人。这就是你如何为自己创造一个无需市场调研就能销售的产品。
- en: The Book Of Your Life – How To Create Your Niche Of One
  id: totrans-129
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 《你的人生之书》——如何创造你自己的独特领域
- en: When you document your life on the internet, you create your niche of one.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在互联网上记录你的生活时，你创造了属于你自己的独特领域。
- en: The mindset & skillset of your past, present, and future self should be illustrated
    in a persuasive manner to attract those with a similar personality, but are a
    few steps behind you so you can actually help them.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 你的过去、现在和未来的自我心态和技能应该以有说服力的方式展现出来，以吸引那些性格相似但落后你几步的人，这样你才能真正帮助他们。
- en: You are going to outline the structure of a book you would write about your
    life.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 你将要概述你将写关于你生活的那本书的结构。
- en: This will be used for pattern recognition and content creation.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 这将用于模式识别和内容创作。
- en: Use this outline to notice ideas as you consume information.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这个提纲，在你获取信息时注意捕捉想法。
- en: Also use it as a content plan to write newsletters, threads / carousels, and
    short form posts over the course of 6-12 months (that is how long it will take
    to get your audience truly familiar with you).
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 还可以将它用作内容计划，在6-12个月内撰写通讯、帖子/轮播和短篇帖子（这就是让你的受众真正熟悉你需要的时间）。
- en: With that, fill out the book structure below as if you were writing to those
    1-3 steps behind you.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，就像你是在写给那些落后你1-3步的人一样，填写下面的书结构。
- en: You can use this book outline along with my [2 Hour Writer](https://2hourwriter.com)
    course to write content that actually leads to readership growth.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用这本书的提纲以及我的[2小时作家](https://2hourwriter.com)课程来撰写真正能带来读者增长的内容。
- en: '**Book Introduction: Your Story**'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '**书籍引言：你的故事**'
- en: Your story is your brand. It is important that you get clear on what your story
    is so you can use it to frame content from a unique angle.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 你的故事就是你的品牌。明确你的故事很重要，这样你就可以从一个独特的角度来构建内容。
- en: You can start almost any writing with a personal experience. That alone makes
    it unique and not like the rest of shallow writing.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 你几乎可以用个人经历开始任何写作。这本身就让它与众不同，不像其他肤浅的写作。
- en: Where did you start out?
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你是从哪里开始的？
- en: What struggles did you go through?
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你经历了哪些挑战？
- en: What was the climax of your journey?
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的旅程的高潮是什么？
- en: What did you achieve that is desirable to others?
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你实现了哪些其他人渴望的目标？
- en: What topics, interests, or skills helped you get there?
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些主题、兴趣或技能帮助你达到了那里？
- en: '**Section 1: Philosophy**'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '**第一部分：哲学**'
- en: You need to get people on the same page as you.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要让人们与你站在同一条战线上。
- en: Your philosophy is your answer to the question, “How does one live the good
    life?”
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 你的哲学是你对“一个人如何过上好生活”这个问题的回答。
- en: You must constantly illustrate the importance of what you believe and do in
    a way that leads toward your ideal future (or avoids the “enemy” of your brand).
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须不断地以引导你走向理想未来（或避免你品牌的“敌人”）的方式说明你相信和做的事情的重要性。
- en: Describe your ideal future and lifestyle in detail. What goals are you leading
    your followers toward?
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 详细描述你的理想未来和生活方式。你正在引导你的追随者走向什么样的目标？
- en: Describe the enemy. What is the future and lifestyle you want to avoid like
    the plague?
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述你的敌人。你想要避免的未来和生活方式是什么？
- en: What are beliefs you have that others would consider extreme or offensive?
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你有哪些别人可能会认为极端或冒犯的信念？
- en: What is the importance of each topic, interest, or skill you’ve learned to help
    you on the way toward your ideal lifestyle?
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个主题、兴趣或技能对你实现理想生活方式的重要性是什么？
- en: Take your time with this. The outline will be pretty dang big.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个上面花点时间。大纲会相当大。
- en: The answers to these questions will form the majority of your content ideas
    that lead to a lot of growth.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 这些问题的答案将构成你大部分的内容想法，这些想法将带来大量的成长。
- en: '**Section 2: Education**'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '**第二部分：教育**'
- en: This is how you build authority.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是建立权威的方式。
- en: Your job is to educate people on the skills or interests
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 你的工作是教育人们关于技能或兴趣
- en: Literally *teach* them the skill or interest and how you learned it. There is
    only so much that can be said about this. You aren’t creating anything new. You
    are simply creating a library of information under *your* brand – that way people
    can learn from you.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上 *教授* 他们技能或兴趣以及你是如何学习的。关于这一点可以说的并不多。你并没有创造任何新东西。你只是在 *你的* 品牌下创建了一个信息库——这样人们就可以从你这里学习。
- en: Don’t fall into the trap of, “They can just learn this information somewhere
    else online.”
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 不要陷入这样的陷阱，“他们可以在网上其他地方学到这些信息。”
- en: Assume they don’t have the drive to learn elsewhere and that YOU have to give
    them the information.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 假设他们没有在其他地方学习的动力，而你必须提供给他们信息。
- en: As we will discuss in the next section, *people remember those who first taught
    them the knowledge that is useful to them*. Be that person for more people.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们将在下一节讨论的，*人们会记住那些首先教给他们有用知识的人*。成为更多人的那个人。
- en: '**Section 3: Practice**'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: '**第三部分：实践**'
- en: Create step-by-step systems and practices that your readers can use to get better
    at your skills and interests.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 创建逐步系统和实践，让你的读者可以使用它们来提高你的技能和兴趣。
- en: As a bonus, slap your own name on these.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 作为额外的好处，把这些归功于你自己。
- en: If you want to recreate something like The Eisenhower Matrix for productivity,
    do it.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要重新创造像艾森豪威尔矩阵这样的生产力工具，那就去做吧。
- en: Don’t teach that concept or model, take it and create your own in a way that
    may get better results.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 不要教授那个概念或模型，而是拿过来，以可能获得更好结果的方式创建你自己的。
- en: Behavior change is the driver of authority and recognition.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 行为改变是权威和认可的动力。
- en: When you write your book with time on social media, you build a brand that blows
    past 99% of people.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在社交媒体上用时间写书时，你建立的品牌会超过99%的人。
- en: The Psychology Of Interest – How To Talk About Whatever You Want & Still Get
    Paid
  id: totrans-170
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 兴趣心理学——如何谈论你想要的一切并获得报酬
- en: 'Since I’ve started changing the online business landscape, I get this question
    almost daily:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我开始改变在线商业格局，我几乎每天都会收到这个问题：
- en: '*“I want to talk about more of my interests, but what if it gets low engagement
    or my audience doesn’t like it?”*'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '*“我想谈谈更多的兴趣，但万一参与度低或者我的观众不喜欢怎么办？”*'
- en: First, understand the separation between content and product.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，理解内容和产品之间的区别。
- en: People think that content is all about promotions. They think they should only
    write content that leads to sales and leads.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 人们认为内容都是关于推广的。他们认为他们应该只写那些能导致销售和推广的内容。
- en: They think they should niche down everything they write about – rather than
    having a *specific and compelling landing page for a product that establishes
    authority in one go **so you don’t have to talk about it all the time in your
    content.***
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 他们认为他们应该将他们写的每一件事都细分——而不是有一个**具体而有说服力的着陆页，一次就建立权威，这样你就不必总是在内容中谈论它**。
- en: Test ideas here and there for selling your product in your content, then use
    those ideas to form the landing page that lives as static content forever that
    you link to.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里尝试一些想法，以在你的内容中销售你的产品，然后使用这些想法来形成一个永远作为静态内容存在的着陆页，你可以链接到它。
- en: 'I see this way too often:'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 我看到这种情况太多次了：
- en: All people post are images or updates of their product.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 所有人发布的都是图片或产品的更新。
- en: Or they make a post with
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 或者他们发帖说
- en: They never show that they are human.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 他们从未表现出他们是人类。
- en: They never educate, entertain, or inspire (you know, the things that people
    actually follow and show up for on social media).
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 他们从不教育、娱乐或激励（你知道，人们实际上在社交媒体上追随和出现的事情）。
- en: They only sell.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 他们只销售。
- en: Nobody follows company accounts.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人关注公司账号。
- en: People follow educators, entertainers, and inspirers.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 人们追随教育家、娱乐家和激励者。
- en: RedBull has a massive following because they don’t have a single picture of
    their product on their Instagram. It is all inspirational content about the lifestyle
    people are living because of RedBull.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: RedBull 有庞大的追随者群体，因为他们Instagram上没有一张产品的图片。它全部是关于人们因为RedBull而生活着的生活方式的有启发性内容。
- en: If all you do is talk about your product, that is a great way to never grow
    your brand, have engaged readers, or see exponential growth in revenue.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只谈论你的产品，那是一个永远不会让你的品牌增长、拥有参与度高的读者或看到收入指数增长的好方法。
- en: A personal brand is the most potent traffic source for your business, product,
    or service.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 个人品牌是您业务、产品或服务的最有力的流量来源。
- en: So, let’s start by flipping this on its head.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，让我们从颠倒这一点开始吧。
- en: What happens if you only talk about your skill that makes you money?
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只谈论让你赚钱的技能会发生什么？
- en: '**You get low engagement.** If your content doesn’t get shared, how are you
    going to grow so that you have *more* people to promote to?'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你的参与度很低**。如果你的内容没有被分享，你怎么能增长，以便有更多的人来推广？'
- en: '**You don’t build trust or authority.** Stop thinking like you have to monetize
    right now and start thinking that you’re going to monetize in 12 months (and you’ll
    monetize faster now by doing so.)'
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你无法建立信任或权威**。停止认为你必须立即变现，开始思考你将在12个月内变现（这样做会让你更快地变现。）'
- en: '**People don’t like you.** If you ever want to pivot and sell something else,
    you won’t be able to. You’re trapped into whatever niche you always sell to.'
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人们不喜欢你**。如果你想要转型并销售其他东西，你将无法做到。你被困在了你一直销售的那个细分市场。'
- en: People have multiple interests.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 人们有多种兴趣。
- en: People can adopt new interests.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 人们可以接受新的兴趣。
- en: You can make your interests interesting so people become interested in them.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以让你的兴趣变得有趣，这样人们就会对他们感兴趣。
- en: This is what turns viewers into fans into superfans.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是将观众变成粉丝，再变成超级粉丝的过程。
- en: Someone may follow you for one interest, like how you would follow Dwayne The
    Rock Johnson after watching a movie he starred in.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 某人可能因为某个兴趣而关注你，就像你在看过他主演的电影后关注道恩·强森一样。
- en: Now they’re a viewer.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，他们只是观众。
- en: Then you either share another interest of theirs or get introduced to something
    new, like how The Rock posts about fitness and nutrition.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 然后你或者分享他们另一个兴趣，或者被介绍到一些新事物，比如巨石强森在社交媒体上关于健身和营养的帖子。
- en: Now they’re a fan.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，他们变成了粉丝。
- en: Then they discover the beliefs or values that compose their mindset, like how
    The Rock values gratitude and hard work.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，他们发现了构成他们心态的信念或价值观，比如巨石强森重视感恩和努力工作。
- en: Now they’re a superfan.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，他们变成了超级粉丝。
- en: (Everyone should include mindset in their content by the way, that is what attracts
    a broad audience because it applies to everyone).
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: （顺便说一句，每个人都应该在他们的内容中包含心态，因为这是吸引广泛受众的原因，因为它适用于每个人）。
- en: Talking about more than one interest is how you become irreplaceable.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 谈论多个兴趣是你变得不可替代的方法。
- en: The best personal brands do this without trying.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的个人品牌不费吹灰之力就做到了这一点。
- en: They just post whatever *they* deem important to them and attempt to illustrate
    that importance to you.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 他们只是发布他们认为对他们自己重要的事情，并试图向你展示这种重要性。
- en: 'Here’s how you can begin doing this:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你可以开始这样做的方法：
- en: '**1) Focus On Education**'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 专注于教育**'
- en: Adopt the mind of your past self, an absolute beginner.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 采用你过去自己的心态，一个绝对的初学者。
- en: '*How* would they get to where you are now in a better way?'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: '*他们*如何以更好的方式达到你现在所在的位置？'
- en: '**2) Focus On Understanding**'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 专注于理解**'
- en: Zoom out and identify the gaps in your followers’ knowledge.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 放大视角，确定你追随者的知识差距。
- en: '*What* do they need to know to get on the same page as you?'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: '*他们*需要了解什么才能与你站在同一页面上？'
- en: '**3) Focus On Importance**'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 专注于重要性**'
- en: Analyze your life and realize why you do what you do.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 分析你的生活，并意识到你为什么这样做。
- en: '*Why* do you only have those select skills and beliefs rather than the millions
    of others you could have? *Why* did you take the path you did over another one?'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: '*为什么*你只有那些精选的技能和信念，而不是成千上万的其它可能性？*为什么*你选择了这条道路而不是另一条？'
- en: Broad Brand, Specific Product (How To Actually Niche Down)
  id: totrans-217
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 广泛的品牌，具体的产品（如何真正细分市场）
- en: You may be asking, “Dan, how am I going to sell anything if I’m not writing
    anything related to what I sell?”
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会问，“丹，如果我不写任何与我销售相关的内容，我该如何销售任何东西？”
- en: First, you are writing about it occasionally so people know what you do.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你偶尔会写关于它，这样人们就会知道你在做什么。
- en: Two, you don’t have a solid understanding of what marketing actually is.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，你对营销实际上是什么并没有一个稳固的理解。
- en: You are almost never directly talking about the skill you sell.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 你几乎从未直接谈论你销售的技能。
- en: '*You are talking about how it will change their life. How it will spark a transformation.
    How it will bridge the gap between where they are and their ideal future.*'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: '*你正在谈论它将如何改变他们的生活。它将如何引发变革。它将如何弥合他们目前的位置和理想未来的差距。*'
- en: You are illustrating the life they want, making them aware of the problem they
    are facing, and presenting a product as the solution.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在展示他们想要的生活，让他们意识到他们面临的问题，并展示一个作为解决方案的产品。
- en: 'With that, think about niching down like this:'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这样思考细分市场：
- en: Your brand is a broad attractor of similar people.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 你的品牌是一个吸引类似人群的广泛吸引器。
- en: Your content is a modality of making people aware of desirable goals and burning
    problems in their life.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 你的内容是让人们意识到他们生活中渴望的目标和紧迫问题的手段。
- en: Your first and foundational product is the bridge between those.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 你的第一个和基础产品是这两者之间的桥梁。
- en: You don’t have to consistently write about your product because you have something
    called a landing page that picks up where your content left off. A landing page
    is static digital real estate that doesn’t disappear like content does.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 你不必持续写关于你的产品，因为你有一种叫做着陆页的东西，它会在你的内容结束后继续发挥作用。着陆页是静态的数字地产，不会像内容那样消失。
- en: So, become a mad scientist for a bit.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，暂时成为一位疯狂科学家。
- en: Map out a newsletter, free guide, low-ticket product, and high-ticket service
    (which is optional if you are building a large, not niche, audience).
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 制定一份通讯稿、免费指南、低价值产品和高价值服务（如果你正在构建一个大型而非细分的市场，这是可选的）。
- en: Your newsletters should all be hosted on a blog so you can plug the best ones
    for interested readers to read.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 你的通讯稿都应该托管在博客上，这样你就可以为感兴趣的读者提供最好的阅读内容。
- en: Your free guide landing page and content educates people toward becoming customers
    for your product. This is catered toward a more specific problem in your audience.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 你的免费指南着陆页和内容教育人们成为你产品的客户。这是针对你受众中更具体的问题。
- en: Your product landing page picks up from where you left off and makes people
    aware that they can solve their problem faster.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 你的产品着陆页从你离开的地方继续，让人们意识到他们可以更快地解决问题。
- en: That is how you niche down.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是细分市场的做法。
- en: You deploy digital real estate, write worldview-based content, and consistently
    guide people every day toward your newsletter, free guide, and product in that
    order.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 你部署数字地产，撰写基于世界观的内容，并每天持续引导人们按照这个顺序关注你的通讯稿、免费指南和产品。
- en: The Evolution Of Your Niche, Brand, and Products
  id: totrans-236
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你的细分市场、品牌和产品的演变
- en: Solve your own problems and sell the solution.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 解决你自己的问题，然后销售解决方案。
- en: Not once, but forever.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 不仅仅一次，而是永远。
- en: Your brand, content, and products will evolve as you reach new heights in your
    life.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你生活中达到新的高度，你的品牌、内容和产品将不断发展。
- en: You will be forced to create new products as the old ones lose their punch.
    This isn’t a bad thing, it actually allows you to sustain and increase your yearly
    revenue.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 随着旧产品失去吸引力，你将不得不创造新产品。这并不是坏事，实际上这让你能够维持并增加你的年收入。
- en: I have launched something new almost every quarter since I started 4 years ago.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 自从4年前开始，我几乎每个季度都会推出一些新事物。
- en: From web design and freelancing, to marketing consulting, to a physical productivity
    planner, to social media growth, to self-improvement, to writing, to a business
    masterclass, to short cohorts, to a book, and now a software from the systems
    I’ve created (that almost nobody can replicate because their path isn’t the same).
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 从网页设计到自由职业，再到市场营销咨询，再到实物生产力规划，再到社交媒体增长，再到自我提升，再到写作，再到商业大师班，再到短期小组，再到一本书，现在还有我从创建的系统中的软件（几乎没有人能够复制，因为他们的路径不同）。
- en: You have to experiment and iterate.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须进行实验和迭代。
- en: That is the only way you will prevent brand entropy and not die a slow death
    to the nature of social media. You must evolve.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是唯一防止品牌熵增并避免社交媒体缓慢消亡的方法。你必须进化。
- en: That’s it for this letter.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 这封信就到这里。
- en: Hope it helped.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 希望这有所帮助。
- en: Dan
  id: totrans-247
