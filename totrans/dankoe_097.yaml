- en: The 7 Digital Career Paths (In The New Economy)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-7-digital-career-paths-from-zero-experience-to-advanced/](https://thedankoe.com/letters/the-7-digital-career-paths-from-zero-experience-to-advanced/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Throughout my childhood, I was only made aware of one path in life.
  prefs: []
  type: TYPE_NORMAL
- en: Go to school, get a job, retire with just enough currency to survive until death.
  prefs: []
  type: TYPE_NORMAL
- en: I was fed the information from my parents, teachers, and friends that solidified
    that narrow worldview.
  prefs: []
  type: TYPE_NORMAL
- en: 'The dream injected into my mind was to:'
  prefs: []
  type: TYPE_NORMAL
- en: Do well in school
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Choose a major that would increase my earning potential
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Aim high and become something like a doctor, lawyer, or engineer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I didn’t realize I was being trained as a replaceable unit of society.
  prefs: []
  type: TYPE_NORMAL
- en: I knew there were millionaires, digital nomads, and people doing what they loved
    for a creative income – but I never registered it as a possibility.
  prefs: []
  type: TYPE_NORMAL
- en: It just seemed so far out there. Too far away. My mind couldn’t fathom doing
    it, because the only thing I knew was “get a high-paying job” being repeated by
    those who never decided to pursue their dreams in the unknown.
  prefs: []
  type: TYPE_NORMAL
- en: Eventually, the potential of the digital world made itself apparent to me.
  prefs: []
  type: TYPE_NORMAL
- en: In eighth grade, my best friend and I shared a math class with Mr. Schroeder.
  prefs: []
  type: TYPE_NORMAL
- en: He was also the after-school weights teacher.
  prefs: []
  type: TYPE_NORMAL
- en: My friend and I had decent builds. I had already grown to 6 foot 5 inches tall
    so he softly bullied us into showing up to an after-school weights class.
  prefs: []
  type: TYPE_NORMAL
- en: I still remember how weird it felt to lift weights for the first time. Completely
    different from today where it feels strong and stable.
  prefs: []
  type: TYPE_NORMAL
- en: My skinny arms would shake uncontrollably to bench press 65 pounds. The soreness
    was next level. I didn’t want to go back, but I did.
  prefs: []
  type: TYPE_NORMAL
- en: With time and progress, I became obsessed.
  prefs: []
  type: TYPE_NORMAL
- en: 'In high school, my after school routine was:'
  prefs: []
  type: TYPE_NORMAL
- en: Drink preworkout
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Grab my gym bag
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Review my training program (Ogus 7/5/3 at the time)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hit the gym hard with my friend
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Go back home, make a protein shake, and watch YouTube videos
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The only channels I watched were fitness channels.
  prefs: []
  type: TYPE_NORMAL
- en: Matt Ogus, Chris Lavado, Scott Herman, Elliot Hulse, Chris Jones…
  prefs: []
  type: TYPE_NORMAL
- en: If you are aware of this era in YouTube fitness, you’re welcome for the good
    memories popping up in your head.
  prefs: []
  type: TYPE_NORMAL
- en: 'The realization:'
  prefs: []
  type: TYPE_NORMAL
- en: These creators were doing what they loved, impacting others at scale, and exposing
    people to their potential.
  prefs: []
  type: TYPE_NORMAL
- en: This is when I started to become aware of and deconstruct how I could do the
    same.
  prefs: []
  type: TYPE_NORMAL
- en: After years of failures with a fitness YouTube channel, digital art Instagram
    page, multiple marketing agencies, and eventually seeing success with freelance
    web design while transitioning to a creator… I found what I was looking for.
  prefs: []
  type: TYPE_NORMAL
- en: I’m here to make sense of the path for you.
  prefs: []
  type: TYPE_NORMAL
- en: The path to purpose, profits, and peace.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before we begin:'
  prefs: []
  type: TYPE_NORMAL
- en: '[The Art Of Focus](https://theartoffocusbook.com) is now available on Amazon.
    The book contains my practical philosophy to find meaning, reinvent yourself,
    and create your ideal future.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Kortex University is accepting applications. The next cohort start date is the
    26th. If you are interested, it makes to apply now so you have time to join before
    it closes. [Start your digital career in 90 days here](https://university.kortex.co).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Creators Are Decentralized Media Companies
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Media runs the world.
  prefs: []
  type: TYPE_NORMAL
- en: Media shapes culture.
  prefs: []
  type: TYPE_NORMAL
- en: Media keeps people in chains.
  prefs: []
  type: TYPE_NORMAL
- en: Media exposes people to their potential.
  prefs: []
  type: TYPE_NORMAL
- en: The computer you’re looking at? Everything on the screen is media.
  prefs: []
  type: TYPE_NORMAL
- en: The billboards you drive by? Shops on the side of the road? Car brands next
    to you? Song on the radio? Media.
  prefs: []
  type: TYPE_NORMAL
- en: We are in a spiritual war of ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Media is synonymous with content.
  prefs: []
  type: TYPE_NORMAL
- en: And content is arguably more encompassing than media, so we will use that from
    now on.
  prefs: []
  type: TYPE_NORMAL
- en: Everything you hold within consciousness is content. **The content of your attention.**
  prefs: []
  type: TYPE_NORMAL
- en: Mindful content helps people grow, evolve, and expand their sense of self.
  prefs: []
  type: TYPE_NORMAL
- en: Mindless content encourages decay, stagnation, and defending their low development
    ego.
  prefs: []
  type: TYPE_NORMAL
- en: That’s the game we are playing.
  prefs: []
  type: TYPE_NORMAL
- en: You either raise the well-being of humanity by spreading.
  prefs: []
  type: TYPE_NORMAL
- en: Or you destroy the well-being of humanity by creating content.
  prefs: []
  type: TYPE_NORMAL
- en: You are a content creator whether you water it down to a new-age internet job
    or not.
  prefs: []
  type: TYPE_NORMAL
- en: You write texts. You speak to your peers. You persuade your way into a career.
    You are doing everything that “content creators” do, but with a fraction of the
    leverage.
  prefs: []
  type: TYPE_NORMAL
- en: And as Balaji says, “Physical, then digital, then native digital.”
  prefs: []
  type: TYPE_NORMAL
- en: You will be an internet content creator within the next few decades. It will
    be a necessity for survival.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s how you prepare.
  prefs: []
  type: TYPE_NORMAL
- en: Your Character In Virtual Reality
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You aren’t a “creator.”
  prefs: []
  type: TYPE_NORMAL
- en: You aren’t a “personal brand.”
  prefs: []
  type: TYPE_NORMAL
- en: You are just a person who is conscious about their internet avatar and how it
    will interact with the digital society.
  prefs: []
  type: TYPE_NORMAL
- en: You already have an account.
  prefs: []
  type: TYPE_NORMAL
- en: Are you a consumer – soaking in value or memes while giving nothing in return?
  prefs: []
  type: TYPE_NORMAL
- en: Or are you a creator – contributing to humanity with the value you produce?
  prefs: []
  type: TYPE_NORMAL
- en: This is not an internet phenomenon.
  prefs: []
  type: TYPE_NORMAL
- en: The masses are consumers. They leach off the government, their parents, the
    school system, and blow around like a bird in heavy winds. Life happens to them.
    Life is assigned to them. They don’t realize they are fueling society with attention.
  prefs: []
  type: TYPE_NORMAL
- en: A select few are creators. They contribute more than they take. They control
    their destiny by controlling their attention. They encourage the destiny of others
    by capturing their attention and expanding their consciousness with valuable content.
  prefs: []
  type: TYPE_NORMAL
- en: Attention is the first step.
  prefs: []
  type: TYPE_NORMAL
- en: Attention is the root of existence.
  prefs: []
  type: TYPE_NORMAL
- en: You have to capture attention if you want any form of success.
  prefs: []
  type: TYPE_NORMAL
- en: “But Dan, I don’t want to capture attention, it seems unethical.”
  prefs: []
  type: TYPE_NORMAL
- en: Have you sat and contemplated this for even 5 minutes? Or are you regurgitating
    a bad take you found on the internet?
  prefs: []
  type: TYPE_NORMAL
- en: Are you mad that you are using your attention to read this right now?
  prefs: []
  type: TYPE_NORMAL
- en: Is it unethical that your attention is drawn to important things?
  prefs: []
  type: TYPE_NORMAL
- en: Is it unethical that your attention goes to your phone when you get a notification?
  prefs: []
  type: TYPE_NORMAL
- en: Do you want nobody to capture your attention? So you just want to sit in a void
    for the rest of your life and never interact with anything?
  prefs: []
  type: TYPE_NORMAL
- en: Wake up.
  prefs: []
  type: TYPE_NORMAL
- en: Learn to persuade.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t, you are actively choosing to let unethical people win this spiritual
    war.
  prefs: []
  type: TYPE_NORMAL
- en: You aren’t “conscious” by opting out of the game of life. You are arguably less
    conscious than the sleazy businessman who at least provides a fraction of value
    with the product he is selling (that genuinely improves some people’s lives… others,
    not so much, and that’s okay).
  prefs: []
  type: TYPE_NORMAL
- en: If You Don’t Create A Product, You Are Not In Control Of Your Future
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The ability to earn with your intelligence – not your time, labor, or looks
    – is how you become in control of what you do and how much you make.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[The Art Of Focus](https://theartoffocusbook.com)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'To answer a common shallow (but good) question:'
  prefs: []
  type: TYPE_NORMAL
- en: “How do I make money online?”
  prefs: []
  type: TYPE_NORMAL
- en: I’m not sure why this isn’t taught in schools, but no, it’s not from platform
    revenue like YouTube ad money or X monetization.
  prefs: []
  type: TYPE_NORMAL
- en: I make about $300 per month from X and $10K per month from YouTube.
  prefs: []
  type: TYPE_NORMAL
- en: That’s great, life-changing money, but it took me 5 years to get there.
  prefs: []
  type: TYPE_NORMAL
- en: In those same 5 years, I’ve totaled a little over $5MM in revenue. I’ve taken
    home 90%+ of that.
  prefs: []
  type: TYPE_NORMAL
- en: I started on Twitter in November of 2019\. Before that, I was a freelance web
    designer.
  prefs: []
  type: TYPE_NORMAL
- en: In 2020, I made $100,000.
  prefs: []
  type: TYPE_NORMAL
- en: Try doing that by growing a YouTube channel and only relying on ad money.
  prefs: []
  type: TYPE_NORMAL
- en: In short, how do you make money online? Actual money?
  prefs: []
  type: TYPE_NORMAL
- en: You start a business.
  prefs: []
  type: TYPE_NORMAL
- en: You need a product and customers.
  prefs: []
  type: TYPE_NORMAL
- en: Shocking, I know.
  prefs: []
  type: TYPE_NORMAL
- en: Your job, as a business, is to attract people to a product so they can hand
    you money in exchange for it.
  prefs: []
  type: TYPE_NORMAL
- en: Obviously, there’s a lot more to that, which I’ve covered in previous letters.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now here’s the magic click:'
  prefs: []
  type: TYPE_NORMAL
- en: You write content.
  prefs: []
  type: TYPE_NORMAL
- en: You put effort into getting eyes on it (crucial step that everyone ignores no
    matter how much I tell them because this is where the work comes into play).
  prefs: []
  type: TYPE_NORMAL
- en: People who like your content follow you.
  prefs: []
  type: TYPE_NORMAL
- en: You create a product.
  prefs: []
  type: TYPE_NORMAL
- en: You market the product.
  prefs: []
  type: TYPE_NORMAL
- en: Your main lever is content.
  prefs: []
  type: TYPE_NORMAL
- en: If you can gain 1 follower you can gain 100,000.
  prefs: []
  type: TYPE_NORMAL
- en: Your secondary lever is marketing.
  prefs: []
  type: TYPE_NORMAL
- en: If you can make $1 you can make $100,000.
  prefs: []
  type: TYPE_NORMAL
- en: That’s the new economy.
  prefs: []
  type: TYPE_NORMAL
- en: That’s how individuals – with technology that has sprung up in the last 5 years
    (so most people still view this idea as crazy, it’s not “normal” yet in your eyes)
    – earn an income doing what they enjoy.
  prefs: []
  type: TYPE_NORMAL
- en: 7 Digital Career Paths
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To reiterate, you are building an audience to have a traffic source to your
    products.
  prefs: []
  type: TYPE_NORMAL
- en: That is step one.
  prefs: []
  type: TYPE_NORMAL
- en: Notice how I didn’t say “you are writing content,” I said you are “building
    an audience.”
  prefs: []
  type: TYPE_NORMAL
- en: There is a slight difference.
  prefs: []
  type: TYPE_NORMAL
- en: Writing is necessary, but most people stop there. They don’t put effort into
    getting their content shared, making their name known in the space, and making
    friends that help them grow. I discuss [growth mechanisms here](https://thedankoe.com/letters/how-to-actually-grow-on-social-media-what-they-dont-tell-you/),
    but we also provide a network of people who want to help you grow in [Kortex University](https://university.kortex.co).
  prefs: []
  type: TYPE_NORMAL
- en: Now, how do you utilize the audience you are building to create a career? To
    diversify income streams? To set yourself up for a future of freedom?
  prefs: []
  type: TYPE_NORMAL
- en: 'I will put these in order of most beginner level to most advanced:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Working For Another Creator Or Brand
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Your profile is your digital resume.
  prefs: []
  type: TYPE_NORMAL
- en: Your content is how you attract opportunities and gigs.
  prefs: []
  type: TYPE_NORMAL
- en: The more people that know what you do = the more people that may hire you.
  prefs: []
  type: TYPE_NORMAL
- en: Now, understand the network effect…
  prefs: []
  type: TYPE_NORMAL
- en: If you “only” have 1,000 followers, but each of those followers has 200-500
    followers, and each of those followers has 200-500 followers…
  prefs: []
  type: TYPE_NORMAL
- en: Then you have an indirect network of 40,000,000 – 250,000,000 people that can
    spread your name.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, that’s if every one of your followers shares your posts (impossible).
    And we have to take into account engagement rate, quality of content, whether
    those followers even log in to social media, and the chance that they know someone
    who needs your work at your experience level.
  prefs: []
  type: TYPE_NORMAL
- en: So let’s give a very generous 10,000 people per month somewhat knowing who you
    are and what you do.
  prefs: []
  type: TYPE_NORMAL
- en: Multiply that by 6-12 months of effort and I find it extremely hard to fail
    in this game.
  prefs: []
  type: TYPE_NORMAL
- en: '**Skills Required:**'
  prefs: []
  type: TYPE_NORMAL
- en: If you want to work for another creator or brand, you need to practice any skill
    that aids in the growth of your own brand.
  prefs: []
  type: TYPE_NORMAL
- en: Social media growth
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Content writing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Email copywriting
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Funnel building (landing pages etc)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Brand design
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Lead generation or marketing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pick one, learn it, implement it, pick the next, learn it, implement it.
  prefs: []
  type: TYPE_NORMAL
- en: Then, write about it. Give advice. Teach. Some creators may reach out to you.
    Some you will have to reach out to. None of this is guaranteed, but you can increase
    your chances at success by growing your audience and reaching out to more creators
    about helping them with your skill set.
  prefs: []
  type: TYPE_NORMAL
- en: You will have to learn them all anyway.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need all of them to see some success, but it only makes sense to continue
    improving yourself and your business as a result.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Start A Service Business
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You can go straight into this if you have a skill set that has gotten you results.
  prefs: []
  type: TYPE_NORMAL
- en: Or you can take what you learn from working with another creator, turn it into
    a business, and help other creators as clients.
  prefs: []
  type: TYPE_NORMAL
- en: A service business is a client business. You are charging $1000 to $50,000 (on
    the *very* high end) to help clients with your skill set.
  prefs: []
  type: TYPE_NORMAL
- en: 'Types of service businesses (that we care about when just starting online):'
  prefs: []
  type: TYPE_NORMAL
- en: Tutoring – similar to coaching, but you teach your skill to another person 1
    on 1\. Like if I were to have weekly calls teaching someone web design.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Freelancing – obvious, you help a client with whatever your skill set is, like
    web design which is a good starting point – but you should learn how to create
    a better offer because you won’t last long selling something that simple.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Coaching or consulting – this is where you help people implement your skill
    or system. You don’t do it for them like freelancing, you do it with them and
    guide them.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Agency – think of an agency as a freelancing business with employees or contractors
    that deliver the service. If you don’t have employees or contractors, you aren’t
    an agency.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You start with a service business because your audience isn’t large enough to
    support another type of business.
  prefs: []
  type: TYPE_NORMAL
- en: You only need 2-4 clients at $2000 ish a month to replace your income and make
    decent money.
  prefs: []
  type: TYPE_NORMAL
- en: You will have to learn lead-generation strategies like direct outreach or targeted
    content to land clients.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Affiliate Marketing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I’m not a huge fan of affiliate marketing as your sole income source.
  prefs: []
  type: TYPE_NORMAL
- en: Affiliating for software and products to link in your own products and content?
    Sure. But if you can sell it, that means you understand it, and you should probably
    just create your own version.
  prefs: []
  type: TYPE_NORMAL
- en: Affiliate marketing is when you send your traffic to someone else’s product
    for a commission.
  prefs: []
  type: TYPE_NORMAL
- en: So, if you promoted my [2 Hour Writer](https://2hourwriter.com) course and someone
    bought, you would get a percentage of that sale (I don’t offer affiliates btw).
  prefs: []
  type: TYPE_NORMAL
- en: The only reason I am mentioning it in this list is because it is good for beginner
    practice.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can build an entire business with zero experience with this option:'
  prefs: []
  type: TYPE_NORMAL
- en: Write content around the topics of the affiliate product
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Put effort into building an audience
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Promote the affiliate product
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You don’t need the skill and you don’t need a product.
  prefs: []
  type: TYPE_NORMAL
- en: So, this can be good practice while you refine your skill and create a product.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t get stuck in this phase. Build your own thing.
  prefs: []
  type: TYPE_NORMAL
- en: 4) Digital Products
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once you have a large enough audience and have the ability to get results, you
    can make a decent income with digital products.
  prefs: []
  type: TYPE_NORMAL
- en: I recommend building one ASAP so you can iterate fast (because most first products
    will be terrible).
  prefs: []
  type: TYPE_NORMAL
- en: 'But, it makes sense to follow this progression:'
  prefs: []
  type: TYPE_NORMAL
- en: Monetize with a service business
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Grow your audience
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Get results with a service business
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Grow your audience
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Turn what you offer in your service business into a digital product
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Grow your audience
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Get digital product buyers and upsell them on your service
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Grow your audience
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Do whatever you want and quit client work so you have more free time (and desaturate
    the market for beginners)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For simplicity, we are going to consider digital products **courses, cohorts,
    or memberships.**
  prefs: []
  type: TYPE_NORMAL
- en: If you can sell *two* $150 digital products a day, you make 6 figures per year
    in revenue.
  prefs: []
  type: TYPE_NORMAL
- en: If we do the math, that means you need to get 80 people to a landing page and
    convert at 2.5%.
  prefs: []
  type: TYPE_NORMAL
- en: If you write an X thread and promote your product at the bottom, you would need
    around 10,000 impressions to pull this off, more or less.
  prefs: []
  type: TYPE_NORMAL
- en: If I have 1,000 followers, but I have a friend who has 10,000 and they share
    my thread, and if the thread is persuasive, I can almost guarantee I make 2 sales
    that day – and that’s with a small following.
  prefs: []
  type: TYPE_NORMAL
- en: The cool thing is that even if I don’t make those 2 sales, I am building an
    audience that may buy my products later.
  prefs: []
  type: TYPE_NORMAL
- en: 5) Sponsorships & Ad Revenue
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: YouTube, newsletter, and podcast sponsorships can pay good money.
  prefs: []
  type: TYPE_NORMAL
- en: But you need a large engaged audience to do this.
  prefs: []
  type: TYPE_NORMAL
- en: For writers, newsletter sponsorships are the most viable – but why waste that
    promotional space in your email for someone else’s product?
  prefs: []
  type: TYPE_NORMAL
- en: This is the same issue with affiliate marketing.
  prefs: []
  type: TYPE_NORMAL
- en: Just build your own product and make 2X-10X more than the sponsorship.
  prefs: []
  type: TYPE_NORMAL
- en: Same with YouTube ad revenue. Stop caring about it. Build your own product or
    service and take control of your own income.
  prefs: []
  type: TYPE_NORMAL
- en: 6) Physical Products
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you want to be hyper-profitable, start with digital products so you can invest
    in a physical product revenue stream.
  prefs: []
  type: TYPE_NORMAL
- en: For physical products, I prefer to sell something that compliment my other products
    or are something I use.
  prefs: []
  type: TYPE_NORMAL
- en: This is why I created the FOCI planner.
  prefs: []
  type: TYPE_NORMAL
- en: It compliments my business products and is something I use.
  prefs: []
  type: TYPE_NORMAL
- en: Someone like SolBrah or Greg Doucette sell supplements that fit under their
    training and nutrition philosophies.
  prefs: []
  type: TYPE_NORMAL
- en: This is a good step, albeit not as simple or profitable as digital products
    and services.
  prefs: []
  type: TYPE_NORMAL
- en: 7) Software Or Service Scaling
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Above, I mentioned that you can build a digital product and quit client work.
  prefs: []
  type: TYPE_NORMAL
- en: That is a solid move for a lot of people who don’t want to meet the demands
    of a growing company (hiring, systems, etc).
  prefs: []
  type: TYPE_NORMAL
- en: You can make $1MM to $5MM a year with a growing audience and digital products
    alone as one person (on the high end, after years of effort and iteration).
  prefs: []
  type: TYPE_NORMAL
- en: But, another option is to take it further.
  prefs: []
  type: TYPE_NORMAL
- en: You can scale your service business or build something like software.
  prefs: []
  type: TYPE_NORMAL
- en: You have such a large audience at this point that you can build whatever you
    want.
