- en: The 7 Digital Career Paths (In The New Economy)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 7个数字职业路径（在新经济中）
- en: 原文：[https://thedankoe.com/letters/the-7-digital-career-paths-from-zero-experience-to-advanced/](https://thedankoe.com/letters/the-7-digital-career-paths-from-zero-experience-to-advanced/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://thedankoe.com/letters/the-7-digital-career-paths-from-zero-experience-to-advanced/](https://thedankoe.com/letters/the-7-digital-career-paths-from-zero-experience-to-advanced/)'
- en: Throughout my childhood, I was only made aware of one path in life.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的童年时期，我只意识到生活中的一条道路。
- en: Go to school, get a job, retire with just enough currency to survive until death.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 上学，找工作，退休时只拥有足够的货币来维持生存直到死亡。
- en: I was fed the information from my parents, teachers, and friends that solidified
    that narrow worldview.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我的父母、老师和朋友们给我提供的信息巩固了那个狭窄的世界观。
- en: 'The dream injected into my mind was to:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 注入我脑海中的梦想是：
- en: Do well in school
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在学校表现良好
- en: Choose a major that would increase my earning potential
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择一个能提高我收入潜力的专业
- en: Aim high and become something like a doctor, lawyer, or engineer
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设定高目标，成为像医生、律师或工程师这样的人
- en: I didn’t realize I was being trained as a replaceable unit of society.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我没有意识到我正在被训练成社会的一个可替代的单位。
- en: I knew there were millionaires, digital nomads, and people doing what they loved
    for a creative income – but I never registered it as a possibility.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道有百万富翁、数字游民和那些为了创造性的收入而做自己热爱的事情的人——但我从未把它当作一种可能性。
- en: It just seemed so far out there. Too far away. My mind couldn’t fathom doing
    it, because the only thing I knew was “get a high-paying job” being repeated by
    those who never decided to pursue their dreams in the unknown.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这似乎太遥远了。太远了。我的大脑无法想象去实现它，因为我知道的唯一事情就是“得到一份高薪工作”，这是那些从未决定去追求未知梦想的人反复强调的。
- en: Eventually, the potential of the digital world made itself apparent to me.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，数字世界的潜力对我显现出来。
- en: In eighth grade, my best friend and I shared a math class with Mr. Schroeder.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在八年级时，我和我的最好朋友与施罗德先生一起上数学课。
- en: He was also the after-school weights teacher.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 他也是课后举重老师。
- en: My friend and I had decent builds. I had already grown to 6 foot 5 inches tall
    so he softly bullied us into showing up to an after-school weights class.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我和朋友都有不错的身材。我已经长到了6英尺5英寸高，所以他轻轻地逼迫我们参加课后举重课。
- en: I still remember how weird it felt to lift weights for the first time. Completely
    different from today where it feels strong and stable.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我仍然记得第一次举重时的奇怪感觉。与今天的感觉完全不同，今天我感觉自己强壮而稳定。
- en: My skinny arms would shake uncontrollably to bench press 65 pounds. The soreness
    was next level. I didn’t want to go back, but I did.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我的瘦胳膊在65磅的卧推中会不受控制地颤抖。疼痛达到了极限。我不想回去，但我还是去了。
- en: With time and progress, I became obsessed.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间和进步，我变得着迷。
- en: 'In high school, my after school routine was:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在高中时，我的课后常规是这样的：
- en: Drink preworkout
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预热运动饮料
- en: Grab my gym bag
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 拿起我的健身房包
- en: Review my training program (Ogus 7/5/3 at the time)
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 审查我的训练计划（当时是Ogus 7/5/3）
- en: Hit the gym hard with my friend
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 和我的朋友一起在健身房里努力锻炼
- en: Go back home, make a protein shake, and watch YouTube videos
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回家，制作一杯蛋白粉，观看YouTube视频
- en: The only channels I watched were fitness channels.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我只看健身频道。
- en: Matt Ogus, Chris Lavado, Scott Herman, Elliot Hulse, Chris Jones…
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 马特·奥古斯、克里斯·拉瓦多、斯科特·赫尔曼、埃利奥特·赫尔斯、克里斯·琼斯……
- en: If you are aware of this era in YouTube fitness, you’re welcome for the good
    memories popping up in your head.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你意识到了这个时期的YouTube健身潮流，那么你脑海中涌现的美好回忆就归功于你。
- en: 'The realization:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 那个认识：
- en: These creators were doing what they loved, impacting others at scale, and exposing
    people to their potential.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这些创作者在做他们热爱的事情，大规模地影响他人，并向人们展示他们的潜力。
- en: This is when I started to become aware of and deconstruct how I could do the
    same.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我开始意识到并解构我如何做到同样事情的时候。
- en: After years of failures with a fitness YouTube channel, digital art Instagram
    page, multiple marketing agencies, and eventually seeing success with freelance
    web design while transitioning to a creator… I found what I was looking for.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在尝试了多年的健身YouTube频道、数字艺术Instagram页面、多个营销机构，并在转型为创作者的过程中最终通过自由职业网页设计获得成功之后，我找到了我一直在寻找的东西。
- en: I’m here to make sense of the path for you.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里是为了为你解释这条道路。
- en: The path to purpose, profits, and peace.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是目的、利润和和平。
- en: 'Before we begin:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始之前：
- en: '[The Art Of Focus](https://theartoffocusbook.com) is now available on Amazon.
    The book contains my practical philosophy to find meaning, reinvent yourself,
    and create your ideal future.'
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[《专注的艺术》](https://theartoffocusbook.com)现在可在亚马逊购买。这本书包含了我寻找意义、重塑自我和创造理想未来的实用哲学。'
- en: Kortex University is accepting applications. The next cohort start date is the
    26th. If you are interested, it makes to apply now so you have time to join before
    it closes. [Start your digital career in 90 days here](https://university.kortex.co).
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Kortex大学正在接受申请。下一批的开始日期是26日。如果你感兴趣，现在申请是明智的，这样你就有时间在它关闭之前加入。[在这里开始你的90天数字职业生涯](https://university.kortex.co)。
- en: Creators Are Decentralized Media Companies
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创作者是去中心化的媒体公司
- en: Media runs the world.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 媒体统治着世界。
- en: Media shapes culture.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 媒体塑造文化。
- en: Media keeps people in chains.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 媒体将人们束缚在链条中。
- en: Media exposes people to their potential.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 媒体让人们接触到他们的潜力。
- en: The computer you’re looking at? Everything on the screen is media.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在看的电脑？屏幕上的所有东西都是媒体。
- en: The billboards you drive by? Shops on the side of the road? Car brands next
    to you? Song on the radio? Media.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 你开车经过的广告牌？路边的商店？旁边的汽车品牌？收音机里的歌曲？媒体。
- en: We are in a spiritual war of ideas.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在进行一场精神上的思想战争。
- en: Media is synonymous with content.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 媒体与内容同义。
- en: And content is arguably more encompassing than media, so we will use that from
    now on.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 并且内容可能比媒体更全面，所以我们从现在开始使用这个词。
- en: Everything you hold within consciousness is content. **The content of your attention.**
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 你意识中持有的每一件事都是内容。**你注意力的内容**。
- en: Mindful content helps people grow, evolve, and expand their sense of self.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 有意识的内容帮助人们成长、发展和扩展他们的自我感。
- en: Mindless content encourages decay, stagnation, and defending their low development
    ego.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 无意识的内容会鼓励衰退、停滞和捍卫他们低级的发展自我。
- en: That’s the game we are playing.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 那是我们正在玩的游戏。
- en: You either raise the well-being of humanity by spreading.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 你要么通过传播来提高人类的福祉。
- en: Or you destroy the well-being of humanity by creating content.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 或者你通过创造内容破坏了人类的福祉。
- en: You are a content creator whether you water it down to a new-age internet job
    or not.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是否将其降低为新时代的互联网工作，你都是一个内容创作者。
- en: You write texts. You speak to your peers. You persuade your way into a career.
    You are doing everything that “content creators” do, but with a fraction of the
    leverage.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 你写文本。你与同龄人交谈。你通过说服进入职业生涯。你正在做“内容创作者”所做的一切，但影响力却小得多。
- en: And as Balaji says, “Physical, then digital, then native digital.”
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 正如Balaji所说，“物理，然后是数字，然后是原生数字。”
- en: You will be an internet content creator within the next few decades. It will
    be a necessity for survival.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的几十年里，你将成为一个互联网内容创作者。这将是一种生存的必需品。
- en: Here’s how you prepare.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你的准备方法。
- en: Your Character In Virtual Reality
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你的虚拟现实中的角色
- en: You aren’t a “creator.”
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 你不是一个“创作者”。
- en: You aren’t a “personal brand.”
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 你不是一个“个人品牌”。
- en: You are just a person who is conscious about their internet avatar and how it
    will interact with the digital society.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 你只是一个关注自己互联网形象及其如何与数字社会互动的人。
- en: You already have an account.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经有了账户。
- en: Are you a consumer – soaking in value or memes while giving nothing in return?
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否因为现在正在用你的注意力阅读这篇文章而感到愤怒？
- en: Or are you a creator – contributing to humanity with the value you produce?
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 或者你是一个创造者——用你生产的价值为人类做出贡献？
- en: This is not an internet phenomenon.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅是一个互联网现象。
- en: The masses are consumers. They leach off the government, their parents, the
    school system, and blow around like a bird in heavy winds. Life happens to them.
    Life is assigned to them. They don’t realize they are fueling society with attention.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 大众是消费者。他们从政府、父母、教育体系中吸取营养，像一只在狂风中飞翔的鸟一样四处飘荡。生活发生在他们身上。生活被分配给他们。他们没有意识到他们正在用注意力为社会提供燃料。
- en: A select few are creators. They contribute more than they take. They control
    their destiny by controlling their attention. They encourage the destiny of others
    by capturing their attention and expanding their consciousness with valuable content.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 精选的少数人是创作者。他们给予的比他们得到的更多。他们通过控制注意力来控制自己的命运。他们通过吸引他人的注意力并使用有价值的内容扩展他们的意识来鼓励他人的命运。
- en: Attention is the first step.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 注意力是第一步。
- en: Attention is the root of existence.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 注意力是存在的根源。
- en: You have to capture attention if you want any form of success.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要任何形式的成功，你必须吸引注意力。
- en: “But Dan, I don’t want to capture attention, it seems unethical.”
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: “但是丹，我不想吸引注意力，这似乎是不道德的。”
- en: Have you sat and contemplated this for even 5 minutes? Or are you regurgitating
    a bad take you found on the internet?
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否坐下来思考了哪怕5分钟？或者你只是在重复你在互联网上找到的糟糕观点？
- en: Are you mad that you are using your attention to read this right now?
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否是一个消费者——在吸收价值或梗的同时，却没有任何回报？
- en: Is it unethical that your attention is drawn to important things?
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 你的注意力被吸引到重要的事情上，这是不道德的吗？
- en: Is it unethical that your attention goes to your phone when you get a notification?
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 当你收到通知时，你的注意力转向手机，这是不道德的吗？
- en: Do you want nobody to capture your attention? So you just want to sit in a void
    for the rest of your life and never interact with anything?
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 你想要没有人吸引你的注意力吗？所以你只想坐在一个空洞里度过余生，永远不与任何事物互动？
- en: Wake up.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 醒醒。
- en: Learn to persuade.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 学习如何说服。
- en: If you don’t, you are actively choosing to let unethical people win this spiritual
    war.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你这样做，你就是在积极地选择让不道德的人赢得这场精神战争。
- en: You aren’t “conscious” by opting out of the game of life. You are arguably less
    conscious than the sleazy businessman who at least provides a fraction of value
    with the product he is selling (that genuinely improves some people’s lives… others,
    not so much, and that’s okay).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 通过退出生活的游戏，你并不是“有意识”的。你或许比那些至少通过他们销售的产品（真正改善了某些人的生活……其他人则不然，这没关系）提供了一部分价值的卑鄙商人还要“无意识”。
- en: If You Don’t Create A Product, You Are Not In Control Of Your Future
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如果你没有创造产品，你就无法掌控你的未来
- en: The ability to earn with your intelligence – not your time, labor, or looks
    – is how you become in control of what you do and how much you make.
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 通过你的智慧赚钱的能力——而不是你的时间、劳动或外貌——是你掌控你做什么以及你赚多少钱的方式。
- en: ''
  id: totrans-83
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[The Art Of Focus](https://theartoffocusbook.com)'
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[专注的艺术](https://theartoffocusbook.com)'
- en: 'To answer a common shallow (but good) question:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 为了回答一个常见的肤浅（但很好）的问题：
- en: “How do I make money online?”
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: “我如何在网络上赚钱？”
- en: I’m not sure why this isn’t taught in schools, but no, it’s not from platform
    revenue like YouTube ad money or X monetization.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我不确定为什么学校不教这个，但不是，这不是来自平台收入，比如YouTube的广告收入或X的货币化。
- en: I make about $300 per month from X and $10K per month from YouTube.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 我从X每月赚取约300美元，从YouTube每月赚取10K美元。
- en: That’s great, life-changing money, but it took me 5 years to get there.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这很好，这是改变生活的钱，但这是我花了5年才得到的。
- en: In those same 5 years, I’ve totaled a little over $5MM in revenue. I’ve taken
    home 90%+ of that.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 在那同样的5年里，我总共赚了超过500万美元的收入。我拿回了其中的90%以上。
- en: I started on Twitter in November of 2019\. Before that, I was a freelance web
    designer.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我从2019年11月开始在Twitter上活跃。在那之前，我是一名自由网页设计师。
- en: In 2020, I made $100,000.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在2020年，我赚了10万美元。
- en: Try doing that by growing a YouTube channel and only relying on ad money.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试通过发展YouTube频道并仅依靠广告收入来做这件事。
- en: In short, how do you make money online? Actual money?
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，你如何在网络上赚钱？真正的钱？
- en: You start a business.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 你开始创业。
- en: You need a product and customers.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要产品和客户。
- en: Shocking, I know.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道这很令人震惊。
- en: Your job, as a business, is to attract people to a product so they can hand
    you money in exchange for it.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一家企业，你的工作是吸引人们关注产品，以便他们可以用钱来交换它。
- en: Obviously, there’s a lot more to that, which I’ve covered in previous letters.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，还有更多内容，我在之前的信件中已经讨论过。
- en: 'Now here’s the magic click:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是神奇的一步：
- en: You write content.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 你写内容。
- en: You put effort into getting eyes on it (crucial step that everyone ignores no
    matter how much I tell them because this is where the work comes into play).
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 你投入精力去吸引人们的注意（这是一个关键步骤，无论我告诉他们多少次，每个人都会忽略，因为这是工作开始的地方）。
- en: People who like your content follow you.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 喜欢你内容的人会关注你。
- en: You create a product.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 你创造一个产品。
- en: You market the product.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 你推销产品。
- en: Your main lever is content.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 你的主要杠杆是内容。
- en: If you can gain 1 follower you can gain 100,000.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能够获得1个粉丝，你就能获得100,000个。
- en: Your secondary lever is marketing.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 你的次要杠杆是营销。
- en: If you can make $1 you can make $100,000.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能够赚1美元，你就能赚100,000美元。
- en: That’s the new economy.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是新经济。
- en: That’s how individuals – with technology that has sprung up in the last 5 years
    (so most people still view this idea as crazy, it’s not “normal” yet in your eyes)
    – earn an income doing what they enjoy.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是个人——在过去的5年里涌现出的技术（所以大多数人仍然认为这个想法很疯狂，它在你看来还不是“正常”的）——通过他们喜欢的事情赚取收入的方式。
- en: 7 Digital Career Paths
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7种数字职业道路
- en: To reiterate, you are building an audience to have a traffic source to your
    products.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，你是在建立受众，以便为你的产品提供流量来源。
- en: That is step one.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 这是第一步。
- en: Notice how I didn’t say “you are writing content,” I said you are “building
    an audience.”
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 注意我并没有说“你在写内容”，我说的是你在“建立受众”。
- en: There is a slight difference.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一点不同。
- en: Writing is necessary, but most people stop there. They don’t put effort into
    getting their content shared, making their name known in the space, and making
    friends that help them grow. I discuss [growth mechanisms here](https://thedankoe.com/letters/how-to-actually-grow-on-social-media-what-they-dont-tell-you/),
    but we also provide a network of people who want to help you grow in [Kortex University](https://university.kortex.co).
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 写作是必要的，但大多数人就止步于此。他们不努力让他们的内容被分享，让他们的名字在领域内为人所知，也不努力结交帮助他们成长的朋友。我在这里讨论[增长机制](https://thedankoe.com/letters/how-to-actually-grow-on-social-media-what-they-dont-tell-you/)，但我们还提供了一个想要帮助你成长的网络，在[Kortex大学](https://university.kortex.co)。
- en: Now, how do you utilize the audience you are building to create a career? To
    diversify income streams? To set yourself up for a future of freedom?
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你是如何利用你正在建立的受众来创造职业生涯？多元化收入来源？为自由未来的到来做好准备？
- en: 'I will put these in order of most beginner level to most advanced:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 我将按从入门级到高级的顺序排列这些：
- en: 1) Working For Another Creator Or Brand
  id: totrans-120
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 为另一位创作者或品牌工作
- en: Your profile is your digital resume.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 你的个人资料是你的数字简历。
- en: Your content is how you attract opportunities and gigs.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 你的内容是你吸引机会和工作的方式。
- en: The more people that know what you do = the more people that may hire you.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 知道你做什么的人越多 = 可能雇佣你的人就越多。
- en: Now, understand the network effect…
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，理解网络效应……
- en: If you “only” have 1,000 followers, but each of those followers has 200-500
    followers, and each of those followers has 200-500 followers…
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你“只有”1000名关注者，但每个关注者都有200-500名关注者，而这些关注者每人又都有200-500名关注者……
- en: Then you have an indirect network of 40,000,000 – 250,000,000 people that can
    spread your name.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你有一个间接的网络，有4000万至2.5亿人可以传播你的名字。
- en: Of course, that’s if every one of your followers shares your posts (impossible).
    And we have to take into account engagement rate, quality of content, whether
    those followers even log in to social media, and the chance that they know someone
    who needs your work at your experience level.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这是假设你的每个关注者都分享你的帖子（不可能）。我们还必须考虑参与度、内容质量、这些关注者是否甚至登录社交媒体，以及他们是否认识某个需要你在该经验水平上工作的机会的人。
- en: So let’s give a very generous 10,000 people per month somewhat knowing who you
    are and what you do.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 所以让我们假设每个月有1万人多少了解你是做什么的。
- en: Multiply that by 6-12 months of effort and I find it extremely hard to fail
    in this game.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 将此乘以6-12个月的努力，我发现在这个游戏中失败非常困难。
- en: '**Skills Required:**'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '**所需技能：**'
- en: If you want to work for another creator or brand, you need to practice any skill
    that aids in the growth of your own brand.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要为另一位创作者或品牌工作，你需要练习任何有助于你个人品牌成长的技能。
- en: Social media growth
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 社交媒体增长
- en: Content writing
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内容写作
- en: Email copywriting
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 邮件文案写作
- en: Funnel building (landing pages etc)
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 管道建设（着陆页等）
- en: Brand design
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 品牌设计
- en: Lead generation or marketing
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 领导生成或营销
- en: Pick one, learn it, implement it, pick the next, learn it, implement it.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个，学习它，实施它，选择下一个，学习它，实施它。
- en: Then, write about it. Give advice. Teach. Some creators may reach out to you.
    Some you will have to reach out to. None of this is guaranteed, but you can increase
    your chances at success by growing your audience and reaching out to more creators
    about helping them with your skill set.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，写下来。提供建议。教学。一些创作者可能会联系你。你可能需要联系一些。这一切都不是保证的，但通过扩大你的受众并联系更多创作者以帮助他们使用你的技能组合，你可以增加成功的机会。
- en: You will have to learn them all anyway.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 你无论如何都需要学习它们。
- en: You don’t need all of them to see some success, but it only makes sense to continue
    improving yourself and your business as a result.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要所有这些才能取得一些成功，但继续提升自己和你的业务是有意义的。
- en: 2) Start A Service Business
  id: totrans-142
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 开始服务业务
- en: You can go straight into this if you have a skill set that has gotten you results.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有一套技能组合并取得了成果，你可以直接进入这个领域。
- en: Or you can take what you learn from working with another creator, turn it into
    a business, and help other creators as clients.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，你可以将你在与另一位创作者合作中学到的知识转化为业务，并作为客户帮助其他创作者。
- en: A service business is a client business. You are charging $1000 to $50,000 (on
    the *very* high end) to help clients with your skill set.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 服务业务是客户业务。你通过你的技能组合向客户收费1000至50,000美元（在非常高端的情况下）。
- en: 'Types of service businesses (that we care about when just starting online):'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在刚开始在线时关注的几种服务业务类型：
- en: Tutoring – similar to coaching, but you teach your skill to another person 1
    on 1\. Like if I were to have weekly calls teaching someone web design.
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 家教——类似于咨询，但你一对一地教授你的技能。比如，如果我要每周进行电话教学，教授某人网页设计。
- en: Freelancing – obvious, you help a client with whatever your skill set is, like
    web design which is a good starting point – but you should learn how to create
    a better offer because you won’t last long selling something that simple.
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自由职业——很明显，你帮助客户做任何你的技能组合，比如网页设计，这是一个很好的起点——但你应该学习如何创建更好的报价，因为你不会长时间销售这样简单的东西。
- en: Coaching or consulting – this is where you help people implement your skill
    or system. You don’t do it for them like freelancing, you do it with them and
    guide them.
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 咨询或顾问——这是你帮助人们实施你的技能或系统的地方。你不是像自由职业者那样为他们做，而是与他们一起做并指导他们。
- en: Agency – think of an agency as a freelancing business with employees or contractors
    that deliver the service. If you don’t have employees or contractors, you aren’t
    an agency.
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理——将代理视为一个拥有员工或承包商的自由职业业务，他们提供服务。如果你没有员工或承包商，你就不是代理。
- en: You start with a service business because your audience isn’t large enough to
    support another type of business.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 你从服务业务开始，因为你的听众还不够大，无法支持另一种类型的业务。
- en: You only need 2-4 clients at $2000 ish a month to replace your income and make
    decent money.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 你只需要每月2-4个客户，每个客户2000美元左右，就可以替代你的收入并赚得不错的钱。
- en: You will have to learn lead-generation strategies like direct outreach or targeted
    content to land clients.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 你将不得不学习如何通过直接接触或目标内容等策略来生成潜在客户。
- en: 3) Affiliate Marketing
  id: totrans-154
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 联盟营销
- en: I’m not a huge fan of affiliate marketing as your sole income source.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是特别喜欢将联盟营销作为你唯一的收入来源。
- en: Affiliating for software and products to link in your own products and content?
    Sure. But if you can sell it, that means you understand it, and you should probably
    just create your own version.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 为软件和产品做联盟营销以链接到你的产品内容？当然可以。但如果你能卖出去，这意味着你理解它，你可能应该只创建你自己的版本。
- en: Affiliate marketing is when you send your traffic to someone else’s product
    for a commission.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 联盟营销是指你将流量发送到他人的产品以获得佣金。
- en: So, if you promoted my [2 Hour Writer](https://2hourwriter.com) course and someone
    bought, you would get a percentage of that sale (I don’t offer affiliates btw).
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，如果你推广了我的[2小时作家](https://2hourwriter.com)课程，有人购买了，你将获得那笔销售的一部分（顺便说一句，我不提供联盟营销）。
- en: The only reason I am mentioning it in this list is because it is good for beginner
    practice.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 我之所以提到它在这个列表中，是因为它对初学者练习很有帮助。
- en: 'You can build an entire business with zero experience with this option:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以用这个选项从头开始建立整个业务，而无需任何经验：
- en: Write content around the topics of the affiliate product
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 围绕联盟产品的主题写内容
- en: Put effort into building an audience
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 投入努力建立听众
- en: Promote the affiliate product
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 推广联盟产品
- en: You don’t need the skill and you don’t need a product.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要技能，也不需要产品。
- en: So, this can be good practice while you refine your skill and create a product.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这可以在你完善技能并创建产品的同时成为一种良好的练习。
- en: Don’t get stuck in this phase. Build your own thing.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 不要陷入这个阶段。建立你自己的东西。
- en: 4) Digital Products
  id: totrans-167
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 数字产品
- en: Once you have a large enough audience and have the ability to get results, you
    can make a decent income with digital products.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你有一个足够大的听众并且有能力获得成果，你就可以通过数字产品赚取不错的收入。
- en: I recommend building one ASAP so you can iterate fast (because most first products
    will be terrible).
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议尽快建立一个，这样你可以快速迭代（因为大多数第一个产品都会很糟糕）。
- en: 'But, it makes sense to follow this progression:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，遵循以下步骤是有意义的：
- en: Monetize with a service business
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过服务业务进行货币化
- en: Grow your audience
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 扩大你的听众
- en: Get results with a service business
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过服务业务获得成果
- en: Grow your audience
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 扩大你的听众
- en: Turn what you offer in your service business into a digital product
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将你在服务业务中提供的东西变成数字产品
- en: Grow your audience
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 扩大你的听众
- en: Get digital product buyers and upsell them on your service
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获得数字产品买家并向上销售你的服务
- en: Grow your audience
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 扩大你的听众
- en: Do whatever you want and quit client work so you have more free time (and desaturate
    the market for beginners)
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 做你想做的，放弃客户工作，这样你就有更多空闲时间（并且减少初学者的市场饱和度）
- en: For simplicity, we are going to consider digital products **courses, cohorts,
    or memberships.**
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简单起见，我们将考虑数字产品**课程、小组或会员资格**。
- en: If you can sell *two* $150 digital products a day, you make 6 figures per year
    in revenue.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你每天能卖出**两个**价值150美元的数字产品，你每年的收入将达到六位数。
- en: If we do the math, that means you need to get 80 people to a landing page and
    convert at 2.5%.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们进行计算，这意味着你需要将80人带到着陆页，并将转化率提高到2.5%。
- en: If you write an X thread and promote your product at the bottom, you would need
    around 10,000 impressions to pull this off, more or less.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你写一个X帖子并在底部推广你的产品，你需要大约10000次曝光才能实现这一点，或多或少。
- en: If I have 1,000 followers, but I have a friend who has 10,000 and they share
    my thread, and if the thread is persuasive, I can almost guarantee I make 2 sales
    that day – and that’s with a small following.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我有1000个追随者，但我的一个朋友有10000个，他们分享我的帖子，如果帖子有说服力，我可以几乎保证我那天能卖出2笔销售——而且这是在一个小追随者群体中。
- en: The cool thing is that even if I don’t make those 2 sales, I am building an
    audience that may buy my products later.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 最酷的是，即使我不做那两笔销售，我正在建立一个可能会后来购买我产品的观众群体。
- en: 5) Sponsorships & Ad Revenue
  id: totrans-186
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5) 赞助商和广告收入
- en: YouTube, newsletter, and podcast sponsorships can pay good money.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: YouTube、时事通讯和播客赞助可以带来不错的收入。
- en: But you need a large engaged audience to do this.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 但是你需要一个庞大的积极参与的观众群体来做这件事。
- en: For writers, newsletter sponsorships are the most viable – but why waste that
    promotional space in your email for someone else’s product?
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 对于作家来说，时事通讯赞助是最可行的——但为什么要在你的电子邮件中为别人的产品浪费促销空间呢？
- en: This is the same issue with affiliate marketing.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是与联盟营销相同的问题。
- en: Just build your own product and make 2X-10X more than the sponsorship.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 只需创建自己的产品，就能比赞助商多赚2倍到10倍。
- en: Same with YouTube ad revenue. Stop caring about it. Build your own product or
    service and take control of your own income.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 与YouTube广告收入一样。不要关心它。创建自己的产品或服务，并控制自己的收入。
- en: 6) Physical Products
  id: totrans-193
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6) 实体产品
- en: If you want to be hyper-profitable, start with digital products so you can invest
    in a physical product revenue stream.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要超级盈利，从数字产品开始，这样你就可以投资于实体产品收入流。
- en: For physical products, I prefer to sell something that compliment my other products
    or are something I use.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 对于实体产品，我更喜欢销售可以补充我的其他产品或是我自己使用的产品。
- en: This is why I created the FOCI planner.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么我创建了FOCI计划。
- en: It compliments my business products and is something I use.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 它补充了我的商业产品，也是我使用的东西。
- en: Someone like SolBrah or Greg Doucette sell supplements that fit under their
    training and nutrition philosophies.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 像SolBrah或Greg Doucette这样的人会销售符合他们训练和营养理念的补充品。
- en: This is a good step, albeit not as simple or profitable as digital products
    and services.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个不错的步骤，尽管它不像数字产品和服务那样简单或有利可图。
- en: 7) Software Or Service Scaling
  id: totrans-200
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7) 软件或服务扩展
- en: Above, I mentioned that you can build a digital product and quit client work.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 如上所述，你可以创建一个数字产品并放弃客户工作。
- en: That is a solid move for a lot of people who don’t want to meet the demands
    of a growing company (hiring, systems, etc).
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 这对于许多不想满足不断增长的公司需求（招聘、系统等）的人来说是一个稳固的举措。
- en: You can make $1MM to $5MM a year with a growing audience and digital products
    alone as one person (on the high end, after years of effort and iteration).
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 仅凭不断增长的观众和数字产品，一个人一年可以赚取100万至500万美元（在高端，经过多年的努力和迭代）。
- en: But, another option is to take it further.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，另一个选择是更进一步。
- en: You can scale your service business or build something like software.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以扩展你的服务业务或创建类似软件的东西。
- en: You have such a large audience at this point that you can build whatever you
    want.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你拥有如此庞大的观众群体，你可以创建任何你想要的东西。
- en: You can make $1MM to $5MM a year with a growing audience and digital products
    alone as one person (on the high end, after years of effort and iteration).
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 仅凭不断增长的观众和数字产品，一个人一年可以赚取100万至500万美元（在高端，经过多年的努力和迭代）。
- en: But, another option is to take it further.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，另一个选择是更进一步。
- en: You can scale your service business or build something like software.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以扩展你的服务业务或创建类似软件的东西。
- en: You have such a large audience at this point that you can build whatever you
    want.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你拥有如此庞大的观众群体，你可以创建任何你想要的东西。
- en: What Makes A Profitable Product?
  id: totrans-211
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么使产品有利可图？
- en: I teach this in [Digital Economics](https://digitaleconomics.school), but a
    “good” product is a system for behavior change.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 我在[数字经济学](https://digitaleconomics.school)中教授这一点，但一个“好”的产品是一个改变行为系统的产品。
- en: Your philosophy is your brand.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 你的哲学就是你的品牌。
- en: The way you live is your product.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 你的生活方式就是你的产品。
- en: My philosophy is that people should build their own thing, become sovereign,
    and do what they want.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 我的哲学是人们应该建立自己的事情，成为主权者，并做他们想做的事情。
- en: My product is my writing system that allows people to do that.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 我的产品是我允许人们做到这一点的写作系统。
- en: 'The way I live is:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 我的生活方式是：
- en: Wake up
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 醒来
- en: Write for 2 hours (with breaks for creativity)
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写作2小时（创意休息时间除外）
- en: Handle other tasks in my business
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理我业务中的其他任务
- en: That’s pretty enticing. I have results and a unique system that allowed me do
    to that.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 这非常吸引人。我有结果和一个独特的系统，让我做到了这一点。
- en: The system came from trial and error toward my end goal (my philosophy of doing
    my own thing and becoming free).
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 这个系统是从尝试和错误中发展出来的，朝着我的最终目标（我的独立行事和自由的理念）。
- en: It will take time to get to this point. Be okay with that.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 达到这一点需要时间，对此要持开放态度。
- en: Build a product or service anyway and start selling now so you can fail.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 无论如何都要建立一个产品或服务，并开始销售，这样你才能失败。
- en: Pursue goals so you actually gain experience that you can monetize.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 追求目标，以便你实际上获得可以货币化的经验。
- en: Sitting around and doing nothing keeps you trapped selling for someone else.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 闲坐着什么都不做会让你陷入为他人销售的困境。
- en: That’s it for this letter my friends.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是这封信的全部内容，我的朋友们。
- en: Thank you for reading.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您阅读。
- en: Dan
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 丹
