- en: The Future Of Work (Acquire This Skill Stack)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-future-of-work-acquire-this-skill-stack/](https://thedankoe.com/letters/the-future-of-work-acquire-this-skill-stack/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In 2022, Elon Musk acquired Twitter for $44 billion.
  prefs: []
  type: TYPE_NORMAL
- en: Soon after, he fired 80% of Twitter staff. That’s upward of 6000 people.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t the only case of tech layoffs or layoffs in general. Headlines are
    flooded with news of companies deciding to downsize, stripping people of their
    livelihood and leaving the general population worried if they’re next on the chopping
    block.
  prefs: []
  type: TYPE_NORMAL
- en: Along with that, there are a few other interesting predictions.
  prefs: []
  type: TYPE_NORMAL
- en: Freelance work has increased from 36% of the workforce to 46.6% since 2020.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The creator economy is projected to double from $250B to $480B by 2028.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Prominent figures predict AGI – or Artificial General Intelligence – by the
    end of this year.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now, some say development is slowing down due to high costs and may take 2 or
    more years to reach AGI.
  prefs: []
  type: TYPE_NORMAL
- en: Either way, whether we live until we are 500 years old or have robots doing
    our chores in the next 4 months or 10 years, the only solution is to take matters
    into your own hands. What you should have been doing in the first place.
  prefs: []
  type: TYPE_NORMAL
- en: It’s no wonder why people are so worried about being replaced.
  prefs: []
  type: TYPE_NORMAL
- en: Their skills are becoming outdated. They are on the verge of losing their means
    to survival. Their family, lifestyle, and ability to find new work is on the line.
  prefs: []
  type: TYPE_NORMAL
- en: It all adds up.
  prefs: []
  type: TYPE_NORMAL
- en: It’s crucial that we understand these 3 takeaways.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding them will benefit your future even if they don’t directly apply
    to you.
  prefs: []
  type: TYPE_NORMAL
- en: 1) The entry-level is going extinct.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It’s becoming harder and harder to get an entry-level job.
  prefs: []
  type: TYPE_NORMAL
- en: It doesn’t matter if it’s programming or marketing, AI can (or is very close)
    to being able to perform basic specialized work in most domains.
  prefs: []
  type: TYPE_NORMAL
- en: Now, this doesn’t necessarily mean the entry-level is leaving; it just means
    the bar is being raised.
  prefs: []
  type: TYPE_NORMAL
- en: What used to be an entry-level position is now a junior – and soon-to-be senior
    – level position.
  prefs: []
  type: TYPE_NORMAL
- en: Very sad ending for Software Developers.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I kept saying this for 6 years.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In 10 years, 90% of them won't get their former pay grades (inflation-adjusted).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The solution: Become an Indie Maker ASAP.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Even if you fail, you'll earn soft skills to be hirable by corporations later.
    [pic.twitter.com/TXVpHtYA41](https://t.co/TXVpHtYA41)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — John Rush (@johnrushx) [June 28, 2024](https://twitter.com/johnrushx/status/1806682114290541049?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The existing workforce will be composed of highly skilled and highly paid individuals
    who have a certain set of traits.
  prefs: []
  type: TYPE_NORMAL
- en: So, what traits do these “highly-skilled” individuals have that you don’t?
  prefs: []
  type: TYPE_NORMAL
- en: What do beginners do to make an income?
  prefs: []
  type: TYPE_NORMAL
- en: How do developers, writers, marketers, salesmen, designers, and other creative
    and technical workers survive?
  prefs: []
  type: TYPE_NORMAL
- en: 2) People aren’t educated.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you don’t create a purpose, you will be assigned one. – The Art Of Focus
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Only slaves were expected to perform one task for their entire life.
  prefs: []
  type: TYPE_NORMAL
- en: They were taught career-specific skills like growing wheat, herding sheep, and
    riding a horse.
  prefs: []
  type: TYPE_NORMAL
- en: Our current education system reflects the education of slaves.
  prefs: []
  type: TYPE_NORMAL
- en: Today, we are taught to be useful workers.
  prefs: []
  type: TYPE_NORMAL
- en: We are taught to obey the authority.
  prefs: []
  type: TYPE_NORMAL
- en: We are conditioned to get good grades out of fear of punishment.
  prefs: []
  type: TYPE_NORMAL
- en: '**A free man is expected to have a purpose and learn whatever is necessary
    to achieve it.**'
  prefs: []
  type: TYPE_NORMAL
- en: A purpose is a goal that has a positive impact on others.
  prefs: []
  type: TYPE_NORMAL
- en: Most people don’t choose their own goals. They are programmed at a young age
    to have an employee mindset, to do what they’re told and only learn in that narrow
    domain.
  prefs: []
  type: TYPE_NORMAL
- en: A goal implies knowledge and skills that must be learned to solve problems that
    prevent you from achieving the goal.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t choose your own goal, you do not choose what you learn or what
    problems you solve. *Your mind remains narrow by default because the goal is narrow.*
    Your destiny is decided for you because the only potential you know is the one
    you were assigned.
  prefs: []
  type: TYPE_NORMAL
- en: So, what do we learn?
  prefs: []
  type: TYPE_NORMAL
- en: And how do we protect ourselves against the dangers of AI?
  prefs: []
  type: TYPE_NORMAL
- en: 3) The future of work belongs to one-person businesses.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are almost 7B people on this planet. Someday, I hope, there will be almost
    7B companies. – Naval
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'A business is a legal structure that allows you to:'
  prefs: []
  type: TYPE_NORMAL
- en: Build what you want
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Solve valuable problems
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Profit from both
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Why am I telling you this?
  prefs: []
  type: TYPE_NORMAL
- en: Because I’m tired of people thinking that “business” or “entrepreneurship” is
    reserved for those with startup capital or a certain personality.
  prefs: []
  type: TYPE_NORMAL
- en: For all I’m concerned, stop thinking of making an independent income as starting
    a business. Think of it as becoming valuable, packaging up that value, and engaging
    in value exchange – the action that has been around since the caveman days, not
    just when the legal requirement became a thing.
  prefs: []
  type: TYPE_NORMAL
- en: Social media, the creator economy, and technology have allowed a singular person
    to attract and monetize an audience, a distribution channel.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t a new fad business model, this is the reality of the modern world.
  prefs: []
  type: TYPE_NORMAL
- en: You have the ability to learn anything on the internet, build anything on the
    internet, and accept payment from anyone on the internet.
  prefs: []
  type: TYPE_NORMAL
- en: And yes, you can start with $0 to your name.
  prefs: []
  type: TYPE_NORMAL
- en: We still have much to discuss as we are just setting the scene.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what you will learn in the coming sections:'
  prefs: []
  type: TYPE_NORMAL
- en: How becoming a deep generalist will future-proof yourself.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: What skills you must learn to make a living with any interest or passion you
    have (and how to learn them fast).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Why AI isn’t as special as you think it is and will only replace those who deserve
    to be replaced.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: How to turn yourself into a one-person business so you can take matters into
    your own hands.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: How to go from $0 to $100K to $1M while working an average of 4 hours a day
    doing what you want.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: None of this would be possible at any other point in history.
  prefs: []
  type: TYPE_NORMAL
- en: Welcome to the future of work.
  prefs: []
  type: TYPE_NORMAL
- en: The Future Proof Skill Stack
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Traditional education and hyperspecialization is a way to make people subservient
    to the dominant paradigm / system. Study the generalized principles of nature
    and be a deep generalist. – Daniel Schmachtenberger
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I want to introduce you to a certified genius, inventor, and philosopher. He
    designed the geodesic dome that revolutionized architectural design by being incredibly
    stable while also being lightweight.
  prefs: []
  type: TYPE_NORMAL
- en: His name is Buckminster Fuller.
  prefs: []
  type: TYPE_NORMAL
- en: In his book, Operating Manual For Spaceship Earth, he illustrates a metaphor
    about The Great Pirates.
  prefs: []
  type: TYPE_NORMAL
- en: The Great Pirates were just that, pirates, who understood many things like geography,
    celestial navigation, biology, the men on their ship, the ship itself, history,
    and science as those were necessary topics to succeed in trade and dominion.
  prefs: []
  type: TYPE_NORMAL
- en: The men on they brought to work on their ship were stupid on purpose. The pirates
    didn’t want them to understand their strategies and contrive to overtake them
    and their wealth. They were expected to follow orders without question, and they
    did.
  prefs: []
  type: TYPE_NORMAL
- en: Pirates had global knowledge as they could sail to different lands. They were
    generalists. The rulers of the land knew only about their land and what the pirates
    told them (and the pirates can lie). They were specialists.
  prefs: []
  type: TYPE_NORMAL
- en: This gave the pirates great power and made the land rulers rely on them for
    trade and knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: The pirates influenced the land rulers to give prestigious roles to the brightest
    minds in their kingdom as a way to keep them narrow-minded. They would give the
    bright minds roles like “Royal Historian” or “Treasurer” so they spent their days
    studying that singular niche, rendering themselves only useful to the land rulers
    and pirates. Like the men on the pirate’s ships, this prevented the bright minds
    of the land from overtaking the pirates because they were specialists, not generalists.
  prefs: []
  type: TYPE_NORMAL
- en: '*The bright minds were happy with the prestige.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*The land rulers were happy with having “smart” people serve them.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*The pirates were happy with having control over both across multiple lands.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'The lesson:'
  prefs: []
  type: TYPE_NORMAL
- en: Schools were created to enslave the brightest minds by promising the prestige
    of specialization. That way, they remained narrow-minded, didn’t choose their
    own purpose, and, therefore, didn’t learn multiple interests and skills that would
    allow them to overthrow those who assigned their purpose.
  prefs: []
  type: TYPE_NORMAL
- en: This explains why specialization is still highly encouraged. This explains why
    “high-paying jobs” are the first thing on teenager’s minds when thinking about
    what to do with their future.
  prefs: []
  type: TYPE_NORMAL
- en: You’ve been programmed to be replaced.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s learn how to reverse the damage that’s already been done.
  prefs: []
  type: TYPE_NORMAL
- en: How To Become A Deep Generalist
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Do it all.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Become a writer, designer, marketer, filmmaker, bodybuilder, runner, or whatever
    your curiosity desires
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The internet gave the individual the power to learn almost anything, fast, and
    get results from diverse interests.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You are living through the second renaissance.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [May 8, 2024](https://twitter.com/thedankoe/status/1788225509593149750?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The difference between an animal and a human is that animals specialize, or
    niche down, to survive.
  prefs: []
  type: TYPE_NORMAL
- en: The problem is that overspecialization leads to extinction in certain species.
  prefs: []
  type: TYPE_NORMAL
- en: Like a long-beaked bird that can reach fish in shallow waters, so they stay
    in that environment. Then, they breed, and the longest beaks survive, but the
    beaks become so heavy that they can’t fly, and the children’s beaks become so
    small that there isn’t any food left for them.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, humans build tools to make up for their shortcomings.
  prefs: []
  type: TYPE_NORMAL
- en: In the past, we learned to throw spears so we could eat. Today, we learn to
    text our social circle on our phones so we aren’t seen as outcasts. All technological
    advancement around you was a hedge against the extinction of the human race.
  prefs: []
  type: TYPE_NORMAL
- en: 'A question there:'
  prefs: []
  type: TYPE_NORMAL
- en: Are you building something valuable to prevent your replacement?
  prefs: []
  type: TYPE_NORMAL
- en: Or are you content with a single skill as a cog in someone else’s machine awaiting
    extinction?
  prefs: []
  type: TYPE_NORMAL
- en: Humans are natural generalists. They thrive at an intersection of overlapping
    niches and can adapt to new ones by building tools, acquiring new skills, or learning
    new information.
  prefs: []
  type: TYPE_NORMAL
- en: I want to tell you exactly what to learn to become a deep generalist.
  prefs: []
  type: TYPE_NORMAL
- en: What I am about to share are a stack of skills, from big picture to technical
    details, that will allow you to make your own decisions, think for yourself, and
    secure your future.
  prefs: []
  type: TYPE_NORMAL
- en: 'In Devon Eriksen’s opinion, the seven liberal arts (or “liberating arts,” as
    he coins, because they are much different from the near-worthless information
    being taught in liberal arts schools) are, quote:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Logic**: how to derive truth from known facts'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Statistics**: how to understand the implications of data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Rhetoric**: how to persuade, and spot persuasion tactics'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Research**: how to gather information on an unknown subject'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**(Practical) Psychology**: how to discern and understand the true motives
    of others'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Investment**: how to manage and grow existing assets'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Agency**: how to make decisions about what course to pursue, and proactively
    take action to pursue it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you want to learn these skills, you must hold them in your mind as you dive
    into the unknown.
  prefs: []
  type: TYPE_NORMAL
- en: If you prepare yourself with a future-proof mind, whatever technical skills
    you think will be lucrative or useful in the future are irrelevant because you
    can adapt as necessary.
  prefs: []
  type: TYPE_NORMAL
- en: 'To learn the liberating arts, these are the skills I acquired:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Marketing & sales** – if you don’t know how to attract and persuade, you
    will never get what you want, and your only option will be for an employer (or
    the government) to give it to you. (Rhetoric, psychology)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Writing & thinking** – the ability to communicate the value in your unique
    mind. The foundation of getting in front of other people. (Logic, research)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Entrepreneurship** – the process of taking my future into my own hands, hunting
    for my survival, and building products that I want to see in the world (that others
    care about). (Statistics, agency, investment)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Entrepreneurship may not be a “skill,” but it is a meta skill. It teaches you
    to be high-agency, identify problems, sell the solution, systemize your work,
    and cultivate the other traits that make you enemployable, and therefor irreplaceable.
  prefs: []
  type: TYPE_NORMAL
- en: Now, nobody can tell you how to write, think, market, and sell. They can only
    tell you how *they* do it.
  prefs: []
  type: TYPE_NORMAL
- en: Meaning, to learn these skills, you must embrace a self-experimentation mindset.
  prefs: []
  type: TYPE_NORMAL
- en: 'Your job is to:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Research processes that others have found success with.** Read books, use
    Google search, binge YouTube tutorials. Self-education must become a daily 30-60
    minute habit. This isn’t optional.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Experiment with various techniques.** Implement the processes you learn and
    attempt to get results.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Identify patterns and principles.** Note the similarities between each and
    double down on them.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Create your own process.** Tailor what you learn to your unique lifestyle
    and situation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Contribute to true education by passing it down.** Give people education
    that can’t be taught in schools with a fundamental grounding in critical thinking.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With entrepreneurship as your vessel, you set the scene for true education and
    sovereignty.
  prefs: []
  type: TYPE_NORMAL
- en: With writing and thinking, you continuously create, test, and iterate on the
    value you have to offer.
  prefs: []
  type: TYPE_NORMAL
- en: You are required to learn practical psychology – marketing and sales – to understand
    the minds of yourself and your customers.
  prefs: []
  type: TYPE_NORMAL
- en: You then persuade, not force or deceive, to inspire people to care about the
    value you have to offer.
  prefs: []
  type: TYPE_NORMAL
- en: Technical Know-How & Personal Interests
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With the foundation of a future-proof skill stack, the next step is adapting
    to the times with technical skills.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this digital renaissance, that means:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Social media** – building a name for yourself as your storefront for the
    value you create. The command center for your business.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Content** – writing, design, or video to educate, entertain, and inspire
    people to see your value.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Email marketing** – newsletters or sequences to nurture the audience you
    acquire.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Visual design** – illustrating the vibe of your brand to spark emotion in
    your viewers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Funnel building** – creating landing pages, websites, and fueling them with
    other technical skills like content and email.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The requirements to learn these skills are bound to change as artificial intelligence
    shakes the industry. They won’t go away any time soon, but the general competition
    will increase due to the ease in acquiring these skills.
  prefs: []
  type: TYPE_NORMAL
- en: If you only learn these skills *without* learning the previous marketing, sales,
    writing, and entrepreneurship, the skills will lose potency.
  prefs: []
  type: TYPE_NORMAL
- en: These technical skills are how you start building your own thing as an entrepreneur.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now the questions you’re asking are:'
  prefs: []
  type: TYPE_NORMAL
- en: What do I write about?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What do I market and sell?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What do I email, design, or leverage technical skills with?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*The interests you can’t help but tell others about.*'
  prefs: []
  type: TYPE_NORMAL
- en: The books you can’t pull yourself away from.
  prefs: []
  type: TYPE_NORMAL
- en: The ideas that flood your search history.
  prefs: []
  type: TYPE_NORMAL
- en: The projects you dream of building but can’t seem to find – excuse me, *make
    –* the time to build.
  prefs: []
  type: TYPE_NORMAL
- en: If you want my systems for writing or building products, you can find 2 Hour
    Writer and Mental Monetization [on my site](https://thedankoe.com).
  prefs: []
  type: TYPE_NORMAL
- en: You are the most profitable niche.
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2152">![](../Images/ae235fd0d1b43eafa9e76cc8c33bef2d.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: The creator economy – not to be confused with the influencer economy – is characterized
    by individuals who pursue their interests and document their knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: Creators attract people to their vision, their story, their goals. AI is not
    curious. You must give it the context of a vision, story, or goal to work. Curiosity
    and generalism are your edge in attracting like-minded people who have problems
    you’ve solved in your life.
  prefs: []
  type: TYPE_NORMAL
- en: Business and value are problem solving. That’s how you make an income.
  prefs: []
  type: TYPE_NORMAL
- en: Nobody wants to follow a glorified search engine that talks about the same thing
    all the time.
  prefs: []
  type: TYPE_NORMAL
- en: Many creators tell me they are afraid to branch out into new interests. They
    have trouble seeing how that will work.
  prefs: []
  type: TYPE_NORMAL
- en: All you have to do is look at everyone you follow. Are they talking about *one*
    thing? Are they actually?
  prefs: []
  type: TYPE_NORMAL
- en: Or are they giving their opinions, beliefs, knowledge, and snippets of their
    life experience packaged up into impactful content?
  prefs: []
  type: TYPE_NORMAL
- en: “But Dan, what do I sell then?”
  prefs: []
  type: TYPE_NORMAL
- en: We will talk about that soon, don’t worry.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t “find” a profitable niche. You create a profitable niche through persuasion.
    You write persuasive arguments for why your interests benefit others lives, you
    sell a product that aligns with that interest, you deliver both through technical
    skills like social media, email, and design.
  prefs: []
  type: TYPE_NORMAL
- en: If you understood the future-proof skills, and therefore human nature, you would
    understand that you can control the perception of your interests.
  prefs: []
  type: TYPE_NORMAL
- en: Interest is generated. Interest is programmed. You are interested in specific
    things because of how you were raised and the information you were exposed to.
  prefs: []
  type: TYPE_NORMAL
- en: You are interested in them for a reason. That means others can *become* interested
    in them with well-placed writing on social media. This has happened to you before.
    Go scroll the timeline and tell me something doesn’t persuade you to change your
    behavior.
  prefs: []
  type: TYPE_NORMAL
- en: You spend time, attention, and money on your interests. That means others will
    spend those same resources on you if you are valuable enough.
  prefs: []
  type: TYPE_NORMAL
- en: Free people don’t niche down.
  prefs: []
  type: TYPE_NORMAL
- en: But What About AI?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s do a thought experiment.
  prefs: []
  type: TYPE_NORMAL
- en: You are an entrepreneur, not an employee.
  prefs: []
  type: TYPE_NORMAL
- en: You have multiple products you want to build in your lifetime, either before
    retirement or before death (because you’ve found that retirement is an illusion,
    work is a necessary counterbalance to rest, and if we never worked, we would be
    miserable. We just work on the wrong things).
  prefs: []
  type: TYPE_NORMAL
- en: 'In order to build those products, you need:'
  prefs: []
  type: TYPE_NORMAL
- en: A brand with a mission, vision, and philosophy for their ideal customer.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Writing, speaking, ads, video, designs, and emails to attract and nurture customers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A persuasive marketing message that helps you stand out from the rest.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A product that continues to iterate based on feedback.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And more, repeated across all products you plan to build.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The common question people ask on social media right now goes like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“Will writers be replaced if AI can write a landing page or term paper?”*'
  prefs: []
  type: TYPE_NORMAL
- en: '*“Will coders be replaced if AI can build an app?”*'
  prefs: []
  type: TYPE_NORMAL
- en: And the answer is, yes, some of them, if they aren’t in control of the vision.
  prefs: []
  type: TYPE_NORMAL
- en: Computers are hyperspecialists. Humans are deep generalists. A great combo but
    not too effective on their own.
  prefs: []
  type: TYPE_NORMAL
- en: Computers will only replace those who deserve to be replaced.
  prefs: []
  type: TYPE_NORMAL
- en: AI can help you write the term paper, create the design, or edit the video *faster,*
    giving more power to the individual using the AI and making $10M one-person businesses
    possible, but there still has to be an individual orchestrating the path toward
    the vision for the future.
  prefs: []
  type: TYPE_NORMAL
- en: The fundamental misunderstanding with people worried about replacement is that
    there will always be problems to solve. You don’t know how to hunt. You are trapped
    in a repetitive string of known tasks assigned by someone else. It’s obvious why
    you are a prime candidate for replacement. You don’t grow or evolve. There’s no
    novelty, no iteration, and no building toward a vision that exposes you to solvable
    problems that can’t be found when you are at a standstill.
  prefs: []
  type: TYPE_NORMAL
- en: If you rely on someone to give you a problem to solve, you will be replaced.
  prefs: []
  type: TYPE_NORMAL
- en: You need a purpose, agency, and creativity.
  prefs: []
  type: TYPE_NORMAL
- en: AI can write a book, but it is only valuable if it is part of a larger purpose
    written for, marketed to, and distributed to an audience that perceives that book
    as valuable through persuasion.
  prefs: []
  type: TYPE_NORMAL
- en: Try to have AI write a bestselling book for you.
  prefs: []
  type: TYPE_NORMAL
- en: I’ll wait… for a while… because a bestseller is not just about the writing.
  prefs: []
  type: TYPE_NORMAL
- en: You need hooks, connections to companies, brands, and creators with distribution.
    And that’s just the tip of the iceberg.
  prefs: []
  type: TYPE_NORMAL
- en: In the meantime, use AI to do your employed work faster so you have time to
    get out.
  prefs: []
  type: TYPE_NORMAL
- en: I already know what you’re going to ask.
  prefs: []
  type: TYPE_NORMAL
- en: What do I work on to get out?
  prefs: []
  type: TYPE_NORMAL
- en: Productize Yourself – The One-Person Business Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '*If you’ve solved a problem in your life, you’re qualified to start a business.*'
  prefs: []
  type: TYPE_NORMAL
- en: Not just any business.
  prefs: []
  type: TYPE_NORMAL
- en: An education business.
  prefs: []
  type: TYPE_NORMAL
- en: As one person.
  prefs: []
  type: TYPE_NORMAL
- en: With zero startup costs.
  prefs: []
  type: TYPE_NORMAL
- en: With the knowledge you already have in your head (regardless of experience level).
  prefs: []
  type: TYPE_NORMAL
- en: Most people try to build a “startup” or some crazy idea they came up with after
    a night of drinking with their friends.
  prefs: []
  type: TYPE_NORMAL
- en: They think their idea will change the world, but they’re usually delusional
    because they don’t have any prior business experience.
  prefs: []
  type: TYPE_NORMAL
- en: If you’ve had the idea with zero experience (meaning your mind can only have
    so many good ideas… you haven’t built anything that leads to better ideas) then
    I can almost guarantee someone has already tried and failed with it.
  prefs: []
  type: TYPE_NORMAL
- en: There are special cases of course, but it’s better not to bank on luck here.
  prefs: []
  type: TYPE_NORMAL
- en: 'There’s a reason people are making millions solving fitness, productivity,
    career, money, relationships, and lifestyle problems:'
  prefs: []
  type: TYPE_NORMAL
- en: Because every person has them.
  prefs: []
  type: TYPE_NORMAL
- en: Because AI can help with the dissemenation of tools and knowledge, but it can’t
    actually change the behavior of an individual. That’s what writing, information,
    systems, and products from a like-minded individual (creator) does through education.
  prefs: []
  type: TYPE_NORMAL
- en: Because they prevent the average individual from doing the only thing they want…
    enjoying life.
  prefs: []
  type: TYPE_NORMAL
- en: What better (and more profitable) problem is there to solve than one *you* experience
    every day?
  prefs: []
  type: TYPE_NORMAL
- en: 0 To $1 Million Working 4 Hours A Day
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let''s make this whole one-person business thing simple:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 1) Build for yourself
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 2) Write to yourself
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3) Sell to yourself
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: There are millions of people with the same interests, problems, and desires
    – and you only need to find a fraction of them.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The most profitable niche is you.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [October 22, 2022](https://twitter.com/thedankoe/status/1583750513862098945?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you’ve gotten results in fitness, sell a fitness program.
  prefs: []
  type: TYPE_NORMAL
- en: If you’ve gotten results with focus, sell a productivity course.
  prefs: []
  type: TYPE_NORMAL
- en: If you’ve gotten results with a skill, sell a tutorial.
  prefs: []
  type: TYPE_NORMAL
- en: If you’ve gotten results with psychology, sell a journaling prompt.
  prefs: []
  type: TYPE_NORMAL
- en: If you’ve gotten results with spirituality, sell a meditation.
  prefs: []
  type: TYPE_NORMAL
- en: The list goes on.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can see people earning a living doing what they love every day, because
    that’s one of the few irreplaceable paths left. AI is solving the problems humans
    don’t want to solve, leaving us with one option: enjoy ourselves and find meaning
    by contributing to humanity with our unique gifts.'
  prefs: []
  type: TYPE_NORMAL
- en: “Dan, everyone is selling an information product nowadays… it seems like a scam.”
  prefs: []
  type: TYPE_NORMAL
- en: Again with the lack of perspective. You don’t have the experience that allows
    you to make sense of the industry. You don’t understand that information and education
    are the foundation of *everything.* Learning is the foundation of the human experience,
    and most people aren’t having a very good experience, mostly because they don’t
    educate and improve themselves.
  prefs: []
  type: TYPE_NORMAL
- en: Rather than opening your mind and changing your life, you have an immediate
    programmed reaction, close your mind, and stay where you are. You don’t want to
    change, it’s obvious, but atleast be honest with yourself about it.
  prefs: []
  type: TYPE_NORMAL
- en: 'It also shows that you don’t understand Business 101: sell what’s already selling.
    Especially if you’re just starting out. Don’t chase blue oceans, there’s a reason
    money isn’t flowing there and you aren’t smarter than Mother Nature.'
  prefs: []
  type: TYPE_NORMAL
- en: The school system is failing.
  prefs: []
  type: TYPE_NORMAL
- en: Education is the foundation of humanity.
  prefs: []
  type: TYPE_NORMAL
- en: Creators are the decentralized school system.
  prefs: []
  type: TYPE_NORMAL
- en: You complain so much about how “[insert any real-world problem here] should
    be taught in schools!”
  prefs: []
  type: TYPE_NORMAL
- en: And now that it is, at a fraction of the cost of formal education (if not free)
    on the internet, you call it a scam.
  prefs: []
  type: TYPE_NORMAL
- en: The only real scam is you not taking responsibility for your future with the
    plethora of information available to you outside of schools.
  prefs: []
  type: TYPE_NORMAL
- en: In my eyes, the one-person business is for those who value self-reliance, time
    freedom, and location freedom.
  prefs: []
  type: TYPE_NORMAL
- en: 'We use:'
  prefs: []
  type: TYPE_NORMAL
- en: Social media for building leverage, attracting like-minds, and building a name
    for ourselves (from nothing)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No-code tools and software for digital real estate, product hosting, and email
    lists (that can’t be taken away like social media)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Lifestyle design to create a work schedule that best suits the individual –
    usually 2-4 hours of work a day at the start, sometimes more if you get into the
    flow
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is an incredible time to be alive.
  prefs: []
  type: TYPE_NORMAL
- en: The internet has given everyone the ability to become an entrepreneur, choose
    their working hours, and earn an income based around their obsessions.
  prefs: []
  type: TYPE_NORMAL
- en: No two people are going to be obsessed with the same crevice of reality. And
    as you evolve and experience more, no two people are going to be obsessed with
    the crevice of reality that they gained awareness of (through action and doing).
  prefs: []
  type: TYPE_NORMAL
- en: There is no saturation… when done correctly.
  prefs: []
  type: TYPE_NORMAL
- en: 3 Paths To Start A One-Person Business With Zero Experience
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The biggest killer is that people don’t believe that business is for them, or
    that they don’t have enough experience.
  prefs: []
  type: TYPE_NORMAL
- en: First, stop thinking of business as anything more than an exchange of value.
    A business is a legal structure to build what you want. Our ancestors had businesses,
    they just didn’t need a legal structure to exchange value. You get something useful,
    I get something useful. If you want to truly make a dent in a world that revolves
    around money, drop your noble charity act. *Acting selfless to feel good about
    yourself is just another version of selfishness.*
  prefs: []
  type: TYPE_NORMAL
- en: If you’ve helped your friends or family with *any* topic that you’ve ever learned
    about in your life, you have enough experience.
  prefs: []
  type: TYPE_NORMAL
- en: Even more, how do you think you gain experience?
  prefs: []
  type: TYPE_NORMAL
- en: I’ll tell you one thing, you *don’t* gain experience without stepping into the
    arena. You gain experience by practicing your skills in a real-world setting.
  prefs: []
  type: TYPE_NORMAL
- en: If a freelancer can reach out to clients with zero experience (to *gain* experience)
    in exchange for money, why can’t you post something valuable online without expecting
    anything in return?
  prefs: []
  type: TYPE_NORMAL
- en: Make it make sense.
  prefs: []
  type: TYPE_NORMAL
- en: Your imposter syndrome is self-deception.
  prefs: []
  type: TYPE_NORMAL
- en: If it helps, don’t think of your writing as teaching. People will inherently
    be educated. Instead, think of it as taking notes in public, or sharing the ideas
    that impacted you the most. People with different goals and personalities find
    different ideas impactful, so, by just sharing your ideas, you are unique, because
    your mind is the most unique thing on this planet.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are the 2 paths you can take:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Path 1) Skill Based**'
  prefs: []
  type: TYPE_NORMAL
- en: This is the most common route that people tell you to take.
  prefs: []
  type: TYPE_NORMAL
- en: Learn a skill
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Teach the skill
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Sell the skill
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This is great, but as I’ve said, you don’t want to end up one-dimensional. You
    don’t want to be a slave to client work that can’t be scaled. You don’t want to
    pursue something else with absolutely nothing to show for it. It happens all the
    time. Freelancers earn an income through cold email and referrals, and when human
    nature kicks into play, and you want to change direction, you are starting from
    *scratch* all over again.
  prefs: []
  type: TYPE_NORMAL
- en: You can start as a freelancer, but you should be building a rather diverse audience
    to both land clients and evolve out of it when you have enough distribution.
  prefs: []
  type: TYPE_NORMAL
- en: '**Path 2) Development Based**'
  prefs: []
  type: TYPE_NORMAL
- en: This second route is more my speed.
  prefs: []
  type: TYPE_NORMAL
- en: It’s based around the 4 eternal markets.
  prefs: []
  type: TYPE_NORMAL
- en: The 4 eternal markets are where burning, profitable problems exist. They are
    where people have lofty goals that you can help them achieve.
  prefs: []
  type: TYPE_NORMAL
- en: Health
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Wealth
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Relationships
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Happiness
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI cannot solve human problems. It can give us tools, but it can’t cure our
    lack of meaning, clarity, and other intrinsic traits that stems from disorder
    in consciousness. We are entering a purpose / human economy where we transcend
    our basic needs and have the mental energy to focus toward our growth needs –
    challenge, understanding, and meaning.
  prefs: []
  type: TYPE_NORMAL
- en: Path 1 only pays attention to wealth. Marketable skills to help people make
    more money. By default, you build a one-dimensional brand.
  prefs: []
  type: TYPE_NORMAL
- en: With path 2, you quite literally pursue your own goals in life (brand), solve
    your problems as you are pursuing those goals (content), and create a system to
    help others do the same (product).
  prefs: []
  type: TYPE_NORMAL
- en: That is how you be yourself, improve yourself, and profit off of yourself.
  prefs: []
  type: TYPE_NORMAL
- en: “But Dan, I’m just starting out!”
  prefs: []
  type: TYPE_NORMAL
- en: And?
  prefs: []
  type: TYPE_NORMAL
- en: It’s not like you have to write content on “How I made 1 million dollars in
    3 days.” Less and less people care about that nowadays. They register it as a
    scam in their mind.
  prefs: []
  type: TYPE_NORMAL
- en: Branding and content are all about perspective. Or “positioning” in marketing.
    All you have to do is be honest.
  prefs: []
  type: TYPE_NORMAL
- en: What is going to perform better?
  prefs: []
  type: TYPE_NORMAL
- en: “How I made 1 million dollars in 3 days”
  prefs: []
  type: TYPE_NORMAL
- en: Or
  prefs: []
  type: TYPE_NORMAL
- en: “How I plan to make 1 million dollars in 5 years”
  prefs: []
  type: TYPE_NORMAL
- en: Which one would you click on? Which would you follow? Which would you relate
    the most with? Which would you *believe* and implement for yourself?
  prefs: []
  type: TYPE_NORMAL
- en: Self-awareness and behavior change are the great determinants of your brand’s
    success. Are you aware of how YOU would view your brand or content as an outsider?
    Are you putting out content that will actually change people’s lives?
  prefs: []
  type: TYPE_NORMAL
- en: '**Path 3) Both**'
  prefs: []
  type: TYPE_NORMAL
- en: The beautiful thing about a one-person business is that you are forced to become
    a generalist.
  prefs: []
  type: TYPE_NORMAL
- en: You *need* to learn all of the skills that make any business a success. You
    become future-proof by default.
  prefs: []
  type: TYPE_NORMAL
- en: Design for your website, profile photo, and banner
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Persuasion and marketing for your bio, content, and web pages
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sales for your products, services, and networking endeavors
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Operations by systemizing the entire process down to a few hours of work a day
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And of course, writing, which is the foundational skill for any business success
    (that I teach in [2 Hour Writer](https://2hourwriter.com/)). You use it for content,
    emails, newsletters, ads, video scripts, and almost everything… because at the
    end of the day you’re just typing at your computer to build this thing.
  prefs: []
  type: TYPE_NORMAL
- en: Why is this beautiful?
  prefs: []
  type: TYPE_NORMAL
- en: Because you talk about your interests and goals to build an audience. By building
    an audience, you have marketable skills you can charge other people for. You also
    have an audience of interested people ready to pay for a way to achieve the same
    goals you have. In other words, you can monetize your broad skillset or knowledge
    in more ways than one – that’s powerful.
  prefs: []
  type: TYPE_NORMAL
- en: Jose Rosado, as an example, made a full time income selling profile banners,
    then transitioned into web design and made multiple 6 figures. Then transitioned
    again into digital products. The one person business model favors your personal
    evolution. That’s what makes you unique from everyone else.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t see the opportunity, it’s because you aren’t in the arena. The
    opportunities can’t register in your awareness because you’re in tutorial hell
    and haven’t started, failed, and improved for 3-6 months.
  prefs: []
  type: TYPE_NORMAL
- en: The barrier of entry to anything good in life is half a year of failure.
  prefs: []
  type: TYPE_NORMAL
- en: The 4 Pillars Of A One-Person Business
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For those that want to do *what they want* and help the people *they can help
    the most* – traditional branding, marketing, content, and offer creation will
    lead you in the wrong direction.
  prefs: []
  type: TYPE_NORMAL
- en: The personal brand is the most powerful storefront in our times. It builds a
    human connection.
  prefs: []
  type: TYPE_NORMAL
- en: The traditional business model will have you create a customer avatar based
    on someone with a profitable problem you can solve.
  prefs: []
  type: TYPE_NORMAL
- en: My way, The Experience Model, turns YOU into the customer avatar. Your experience
    and story turn you into the niche.
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-2153">![](../Images/2dd549f3cfbdb6d7a0289b56d702ed6c.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: That way, you can solve your own problems, attract people that are on a similar
    path as you, and help them do the same.
  prefs: []
  type: TYPE_NORMAL
- en: Another bonus, you don’t have to spend countless hours doing market research
    to understand what will sell.
  prefs: []
  type: TYPE_NORMAL
- en: Does that make sense?
  prefs: []
  type: TYPE_NORMAL
- en: You pursue a goal, achieve it, talk about it, attract people with that same
    goal, and offer them a solution to reach it faster (a product or service). That’s
    how you make an income. You help the people you can help the most improve, but
    faster than you did.
  prefs: []
  type: TYPE_NORMAL
- en: '**Pillar 1) Branding**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In business, stop trying to find a “problem” to solve.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Instead, understand the “goal” that people are trying to achieve.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Then, become an expert at solving the problems that prevent people from achieving
    that goal.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Help them get there as fast as possible. That’s what they want.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [October 3, 2022](https://twitter.com/thedankoe/status/1576922278700490753?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Your brand is who you are, what you do, and what you are doing.
  prefs: []
  type: TYPE_NORMAL
- en: What **goal** are you working towards?
  prefs: []
  type: TYPE_NORMAL
- en: Why are you working towards it? What is the desired outcome that you are trying
    to achieve? That is what people are going to follow you for.
  prefs: []
  type: TYPE_NORMAL
- en: The thing about branding is that it doesn’t have to be directly stated in many
    places. Maybe on your website where you can explain your brand message, but aside
    from that – people will pick up what your brand message is through your content.
  prefs: []
  type: TYPE_NORMAL
- en: '**Pillar 2) Content**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Beginners need to understand this:'
  prefs: []
  type: TYPE_NORMAL
- en: Your brand (especially on social media) is formed through 1-3 months of content.
  prefs: []
  type: TYPE_NORMAL
- en: Content compounds. And I don’t mean in terms of views or reach. I mean the message
    compounds in people’s minds until your entire message *clicks.*
  prefs: []
  type: TYPE_NORMAL
- en: People aren’t going to understand you from one tweet, video, or article alone.
  prefs: []
  type: TYPE_NORMAL
- en: You need TIME in the game if you want to have a shred of authority.
  prefs: []
  type: TYPE_NORMAL
- en: Now, what do you write about?
  prefs: []
  type: TYPE_NORMAL
- en: You write about the interests, skills, and topics that you plan to master. The
    ones that will help you achieve your goals in a way that is unique to you.
  prefs: []
  type: TYPE_NORMAL
- en: Remember the tweet from above? The one about not finding a problem, but setting
    a goal?
  prefs: []
  type: TYPE_NORMAL
- en: All content (and human attention / behavior in general) revolves around problems.
    Problems are the starting point of your content, but you *and* your followers
    must be working to similar goals for those problems to be *relevant.*
  prefs: []
  type: TYPE_NORMAL
- en: Everyone can have the same goal of “living the good life,” but how are YOU going
    to make that a reality?
  prefs: []
  type: TYPE_NORMAL
- en: For me, it is by studying the human mind, philosophy, and creative work.
  prefs: []
  type: TYPE_NORMAL
- en: For another person, it could be web design, mindset, and fitness.
  prefs: []
  type: TYPE_NORMAL
- en: And another, it could be automation, marketing, and productivity.
  prefs: []
  type: TYPE_NORMAL
- en: '*If you put 5 people at the bottom of a mountain and asked how they would get
    to the top, they would all draw a different path.*'
  prefs: []
  type: TYPE_NORMAL
- en: The unique combination of these topics IS your niche.
  prefs: []
  type: TYPE_NORMAL
- en: They are broad because we want to build a large, leverageable, and flexible
    audience – rather than putting ourselves in a box and be limited in what we talk
    about.
  prefs: []
  type: TYPE_NORMAL
- en: If I ever wanted to pivot into fitness, turn my training regimen (that I’ve
    experimented with for years) into a course, and sell it for an income, I could.
    I would market it to my audience (who has similar goals and interests as me) in
    a way that would appeal most to them.
  prefs: []
  type: TYPE_NORMAL
- en: But HOW do you write about these topics?
  prefs: []
  type: TYPE_NORMAL
- en: In [Digital Economics](https://digitaleconomics.school/), I teach about the
    Domain Of Mastery.
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-2154">![](../Images/65f60fc6beb02b4b7ae0e3a6a542b6f8.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: You choose 3 *broad* topics that you can then break down into principles, mentors
    for inspiration, and sub topics.
  prefs: []
  type: TYPE_NORMAL
- en: Then, you can research books, podcasts, articles, and social posts to see how
    others are talking about those topics.
  prefs: []
  type: TYPE_NORMAL
- en: This is more than just business. This is how you get paid for improving yourself,
    learning how to think, and creating a meaningful life.
  prefs: []
  type: TYPE_NORMAL
- en: Understand that this is just a starting point to get you *moving forward.* You
    will pivot when you become aware of something you truly want to do (because you
    weren’t aware of it at the level you were at before).
  prefs: []
  type: TYPE_NORMAL
- en: At the beginning, your job is to emulate what works.
  prefs: []
  type: TYPE_NORMAL
- en: You need to build authority in the topics you talk about by writing beginner-level
    content that has guaranteed growth time and time again.
  prefs: []
  type: TYPE_NORMAL
- en: Go look at your favorite YouTuber.
  prefs: []
  type: TYPE_NORMAL
- en: Did they grow their audience at the start with cool little vlogs?
  prefs: []
  type: TYPE_NORMAL
- en: Or did they make it their full-time job to educate their audience and teach
    them about new skills and interests?
  prefs: []
  type: TYPE_NORMAL
- en: '**Pillar 3) Offer**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: No, you don’t have to wait to start monetizing. I’m tired of hearing that sh*t.
    Gatekeeper mindset.
  prefs: []
  type: TYPE_NORMAL
- en: You NEED something to iterate on. You need something to build, improve, and
    make more valuable.
  prefs: []
  type: TYPE_NORMAL
- en: An offer is your product or service. It’s what people receive in exchange for
    their money.
  prefs: []
  type: TYPE_NORMAL
- en: Your first offer WILL suck. There’s no escaping it. You should get that first
    crappy iteration out immediately.
  prefs: []
  type: TYPE_NORMAL
- en: '*You can’t improve something that doesn’t exist.*'
  prefs: []
  type: TYPE_NORMAL
- en: You need to learn what it’s like to sell. You need a real-world vessel to apply
    all of your marketing and sales learnings to.
  prefs: []
  type: TYPE_NORMAL
- en: “Okay Dan, but what do I sell?”
  prefs: []
  type: TYPE_NORMAL
- en: Let me introduce you to the **Minimum Viable Offer**.
  prefs: []
  type: TYPE_NORMAL
- en: 'The MVO is either a:'
  prefs: []
  type: TYPE_NORMAL
- en: Single-skill freelance service that you can sell for $500-$1000
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Single interest/skill consulting, coaching, or tutorial service where you can
    sell a pack of 4 calls for $500-$1000
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: I would almost always recommend option 2 if you are joining the creator economy.
    I would not start off with time-sucking client work that makes you feel like you
    don’t have time to create content.
  prefs: []
  type: TYPE_NORMAL
- en: (And, if you’re anything like me, you like to learn and experiment for yourself.
    Most, not all, creators do. I don’t like having work done for me).
  prefs: []
  type: TYPE_NORMAL
- en: Health, productivity, mindset, and business consulting are a given.
  prefs: []
  type: TYPE_NORMAL
- en: But, you can still do this if you want to sell a skill as opposed to an interest.
    You would simply frame it as “tutoring.”
  prefs: []
  type: TYPE_NORMAL
- en: You can tutor or mentor people on how to build websites.
  prefs: []
  type: TYPE_NORMAL
- en: You can tutor or mentor people on how to write.
  prefs: []
  type: TYPE_NORMAL
- en: You can tutor or mentor people on how to start email marketing.
  prefs: []
  type: TYPE_NORMAL
- en: What’s the beauty in starting with an MVO, especially if it is a pack of 2-4
    consulting calls?
  prefs: []
  type: TYPE_NORMAL
- en: '**1) You can start monetizing immediately.**'
  prefs: []
  type: TYPE_NORMAL
- en: No need for a landing page if you understand the sales process. The ability
    to DM someone, a questionnaire software, and a calendar booking link is all you
    need. (And a way to send invoices of course).
  prefs: []
  type: TYPE_NORMAL
- en: You get on the calls, help people with their problems, and dedicate yourself
    to researching effective solutions for those problems. You don’t need all of the
    answers at the start, you just need more time than the other person has. They
    don’t have the time to solve the problem themselves. That’s why they pay for your
    service anyway, speed, convenience, and accountability.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) You can build out a scalable product based on what gets results.**'
  prefs: []
  type: TYPE_NORMAL
- en: To increase the value of your MVO, you will be outlining a curriculum of sorts
    to help organize the structure of calls. You should also create things like worksheets
    and Notion dashboards to help your clients get more results.
  prefs: []
  type: TYPE_NORMAL
- en: These can be turned into a product that you can sell as your audience grows.
    The product buyers can lead into your consulting and become clients.
  prefs: []
  type: TYPE_NORMAL
- en: That means, less time spent on prospecting and more free time if you choose
    to decrease how many clients you take on (your prices will skyrocket too, of course.)
  prefs: []
  type: TYPE_NORMAL
- en: '**Pillar 4) Marketing**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s imagine you created your MVO.
  prefs: []
  type: TYPE_NORMAL
- en: You want to sell programming tutoring, teaching people how to code.
  prefs: []
  type: TYPE_NORMAL
- en: Now, you need to build authority and trust in order to sell that service.
  prefs: []
  type: TYPE_NORMAL
- en: So, you write a weekly newsletter on a beginner-level programming topic (so
    that it can reach more people, 90% of the market are beginners).
  prefs: []
  type: TYPE_NORMAL
- en: You network with others in the programming space to get eyes on your content
    with their audience.
  prefs: []
  type: TYPE_NORMAL
- en: If you promote your service at the bottom of a thread and get 100,000+ impressions
    (on the LOW end) on your thread, you’re almost guaranteed to land your first client.
  prefs: []
  type: TYPE_NORMAL
- en: Boom, with the right strategy and not listening to the limiting beliefs in your
    head, you just made a third of the average salary. If you do this on a weekly
    basis, within 3 months you can outearn most salaries.
  prefs: []
  type: TYPE_NORMAL
- en: Unlike freelancers, you are building an audience along the way as well. Your
    content and promotions are not going to waste. You have future potential to sell
    new things as you grow.
  prefs: []
  type: TYPE_NORMAL
- en: The point being, you need to *promote* yourself on a consistent basis.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t promote your offer, you aren’t going to make money.
  prefs: []
  type: TYPE_NORMAL
- en: Simple as that.
  prefs: []
  type: TYPE_NORMAL
- en: 0 To $1 Million Working 4 Hours A Day
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The path to $1 million as 1 person working 4 hours or less:'
  prefs: []
  type: TYPE_NORMAL
- en: Do not work more than 4 hours
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Start with client work
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Get results, make money
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Build your audience
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Productize your work
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Repeat steps 3-5 until you reach $1 million.
  prefs: []
  type: TYPE_NORMAL
- en: Then, don’t stop.
  prefs: []
  type: TYPE_NORMAL
- en: '**Koe’s Law:** *creative* *work evolves to earn more in the time allotted for
    its completion*. This demands creativity, growth, and skill acquisition to solve
    problems that prevent this evolution.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We’ve all heard of Parkinson’s Law.
  prefs: []
  type: TYPE_NORMAL
- en: That work expands to fill the time allotted for its completion.
  prefs: []
  type: TYPE_NORMAL
- en: But that’s only the first layer. Your work expands, but your income doesn’t.
  prefs: []
  type: TYPE_NORMAL
- en: The 4-hour workday has been my philosophy for quite some time.
  prefs: []
  type: TYPE_NORMAL
- en: What people don’t realize is that with technology you can work that same amount
    of time while making as much money as you want.
  prefs: []
  type: TYPE_NORMAL
- en: The problem is that people get trapped in business ideologies.
  prefs: []
  type: TYPE_NORMAL
- en: They start as a freelancer, that’s all they know, they bias freelancing above
    other models, and complain when they can’t escape the feast or famine cycle with
    just enough income to survive.
  prefs: []
  type: TYPE_NORMAL
- en: Because they identify as a freelancer, their mind can’t open beyond that to
    perceive opportunities that allow them to better leverage their skill set.
  prefs: []
  type: TYPE_NORMAL
- en: They left the 9-5 to pursue freedom and created a new 9-5 for themselves.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s break down how Koe’s Law works in practical steps to evolve from $100K
    per year to $100K per month.
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 1) Start With Client Work**'
  prefs: []
  type: TYPE_NORMAL
- en: As one person without an audience, client work is the best option.
  prefs: []
  type: TYPE_NORMAL
- en: You can use manual client acquisition strategies and charge between $1000 and
    $10,000+ per client.
  prefs: []
  type: TYPE_NORMAL
- en: You only need 2-3 clients to replace your income.
  prefs: []
  type: TYPE_NORMAL
- en: In my eyes, it’s best to skip the freelancer stage and go straight to coaching,
    consulting, or tutoring as illustrated in the last section.
  prefs: []
  type: TYPE_NORMAL
- en: 'Your time is allocated as such in a 4-hour time frame:'
  prefs: []
  type: TYPE_NORMAL
- en: 1 hour per day prospecting for new clients
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3-5 hours per week on sales calls
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2-4 hours per week on client calls
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1 hour per day writing content for audience and clients
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The rest is filled with pour-over from any of these
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The key is to hold the intention of evolution in your mind so you don’t get
    trapped in this stage.
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 2) Build An Audience & Evolve One Layer**'
  prefs: []
  type: TYPE_NORMAL
- en: As a client business, you can only take on so many clients with 4 hours of work.
  prefs: []
  type: TYPE_NORMAL
- en: And if you want to stay as one person, you need to identify the route that allows
    you to maintain that work time without hiring employees.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve discovered this route for you, so you don’t have to go through the years
    of trial and error.
  prefs: []
  type: TYPE_NORMAL
- en: '**Build an audience with writing** – don’t waste time on video editing and
    graphics yet. Use [writing on social media and a newsletter](https://2hourwriter.com)
    to build an audience. If you need an example of this, just look at my Instagram,
    LinkedIn, and X.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Use a new client model** – create a program, tutorials, or curriculum and
    take on more clients in a group coaching setting. This brings your client work
    down to 1-2 hours a week.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Evolve your fulfillment** – decrease pricing a bit, remove time-suckers like
    1 on 1 calls, introduce a group chat or community, and attempt to restructure
    how you deliver to your clients without removing any value.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, thanks to Koe’s Law, you’ve increased your earning potential form $100K
    per year to $300-$500K while working the same 4 hours.
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 3) Productize With Your Audience Growth**'
  prefs: []
  type: TYPE_NORMAL
- en: Distribution = freedom.
  prefs: []
  type: TYPE_NORMAL
- en: An audience = distribution.
  prefs: []
  type: TYPE_NORMAL
- en: You can turn your client work into a digital product at any time for extra income
    (and potentially more clients that needed to learn more before hiring you), but
    that won’t be your main source of income at first.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this third stage, you:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Create a cohort-based program** – you charge less than before but take on
    more customers. Thanks to your larger audience, you earn more than a group client
    model while working the same amount of time.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Build a standalone digital product** – use your teachings and results from
    your client work to build a successful product. You build it once and it sells
    while you sleep, adding to your income.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Leave client work if you want** – you may see a dip in income at the start,
    but that newly allotted time is used to diversify platforms, increase revenue,
    and improve audience growth speed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Again, thanks to Koe’s Law, you’ve increased your earning potential from $300K
    per year to $1 million+ per year.
  prefs: []
  type: TYPE_NORMAL
- en: This is where rapid iteration comes into play. You must detach from manual labor
    and solely bank on your creative ability.
  prefs: []
  type: TYPE_NORMAL
- en: 'Your time is allocated to:'
  prefs: []
  type: TYPE_NORMAL
- en: 1-2 hours per week fulfilling your cohort program
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2 hours per day writing content to fuel growth
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1-2 hours a day building projects that take you even further
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can build new products, branch out of the one-person business, or just enjoy
    life for a bit until early retirement bores you enough to start meaningful building
    again.
  prefs: []
  type: TYPE_NORMAL
- en: You’ve build so much leverage and distribution that you can sell whatever you
    want.
  prefs: []
  type: TYPE_NORMAL
- en: Hire a team to build software.
  prefs: []
  type: TYPE_NORMAL
- en: Work with a product developer to launch a physical product.
  prefs: []
  type: TYPE_NORMAL
- en: Write a book to solidify your legacy in the space.
  prefs: []
  type: TYPE_NORMAL
- en: Then do it all over again because money is a tool to build what you want but
    doesn’t exist. Ignore anyone that tells you you don’t need to make more. Especially
    if the end result is benefiting the evolution of society.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
