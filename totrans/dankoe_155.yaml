- en: How To Focus For 12 Hours A Day On Your Purpose
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何每天专注于你的目标12小时
- en: 原文：[https://thedankoe.com/letters/how-to-focus-for-12-hours-a-day-on-your-purpose/](https://thedankoe.com/letters/how-to-focus-for-12-hours-a-day-on-your-purpose/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/how-to-focus-for-12-hours-a-day-on-your-purpose/](https://thedankoe.com/letters/how-to-focus-for-12-hours-a-day-on-your-purpose/)
- en: You won’t find rare results in an average lifestyle.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在普通的生活方式中，你不会找到罕见的结果。
- en: If you feel lost, tired, and can’t focus on making progress toward the life
    you promised yourself you would live, sometimes the only thing you can do is to
    flip the switch.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你感到迷茫、疲惫，无法专注于实现你承诺给自己生活的目标，有时你能做的唯一一件事就是切换开关。
- en: Create a glitch in the matrix.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在矩阵中制造一个故障。
- en: Become a completely different person.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 变成一个完全不同的人。
- en: Change your habits all at once. Remove every distraction from your life. Start
    the business. Build the project. Work 12 hours a day and forget to eat. Look back
    and realize you’ve done more in 3 months than you have in the past 3 years.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 一次性改变你的习惯。从你的生活中移除每一个干扰。开始创业。建立项目。每天工作12小时，忘记吃饭。回头看，你会发现你在3个月内所做的工作比你过去3年所做的工作还要多。
- en: You need seasons of intensity that launch you to a new baseline.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要一段时间的强度，让你达到一个新的基准。
- en: Waking up at 4am gives you 3-4 hours of experience that others just don’t get
    to have. It’s a completely different reality. A quiet one. People aren’t awake.
    Distractions lack gravity.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 早上4点起床给你带来了3-4小时的经验，这是其他人无法拥有的。这是一个完全不同的现实。一个安静的现实。人们还没有醒来。干扰失去了重力。
- en: I’m not saying you need to wake up at 4am. That’s just one example of embracing
    an unconventional life.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是说你需要早上4点起床。这只是拥抱不寻常生活的一个例子。
- en: But if your mind is already pushing back on the idea of breaking out of your
    painful bubble of comfort, you probably won’t benefit from the rest of this letter.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果你的大脑已经开始抵制跳出你痛苦舒适泡的想法，你可能不会从这封信的其余部分中受益。
- en: Open your mind or leave.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 打开你的心扉或者离开。
- en: You Already Have Motivation
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你已经有了动力
- en: Here’s the thing.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有个问题。
- en: You can already focus for 12 hours a day.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经可以每天专注12小时。
- en: When you’re playing a video game or scrolling on your phone, it’s automatic.
    You don’t need to discipline yourself to do it.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在玩游戏或刷手机时，这是自动的。你不需要自律去做它。
- en: But you know deep down that you’re ruining your life.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 但你内心深处知道你正在毁掉自己的生活。
- en: So, we need to learn how to create a mental, physical, and spiritual environment
    that makes it seamless to work on your dreams.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们需要学习如何创造一个心理、身体和精神的环境，使你能够无缝地工作在你的梦想上。
- en: First, we need to understand that 12-hour workdays aren’t always possible. You
    need to be in the right phase of life (and you can’t get trapped in any of the
    phases).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要理解，12小时工作日并不总是可能的。你需要处于生活的正确阶段（而且你不能陷入任何阶段）。
- en: Second, we need to remove the blockers that prevent you from seeing life as
    a video game. One that’s addictive and fun. One where you grind out hours of work
    and see actual progress in your life.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，我们需要消除那些阻止你将生活视为一个视频游戏的障碍。一个上瘾且有趣的游戏。一个你投入数小时工作并看到生活中实际进步的游戏。
- en: If you want to completely change the direction of your life, read on.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要彻底改变你生活的方向，请继续阅读。
- en: The Cycles Of Progress
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进步的周期
- en: Many people know my 4-hour workday philosophy.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人知道我的4小时工作日哲学。
- en: Many people – albeit less, because people don’t understand the philosophy, they
    just see the idea and latch onto it – know that I’m not a fan of sticking to something
    for life as that limits growth and discovery.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人——尽管如此，因为人们并不理解这种哲学，他们只是看到了这个想法并紧紧抓住它——知道我不是一个终身坚持某件事的人，因为这限制了成长和发现。
- en: Progress is non-linear.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 进步是非线性的。
- en: You don’t go to the gym for 10 years and build the same amount of muscle every
    single year. You build a lot at the start because you’re new. Then you build muscle
    in cycles of consistency and intensity. You bulk and cut. Life happens and you
    get thrown off for a year. The next year you regain motivation and are hyper-disciplined,
    gaining more in year 10 than you did in year 3.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 你不会在健身房待上10年，每年都建造相同数量的肌肉。你一开始就建造了很多，因为你是个新手。然后你在一致性和强度的周期中建造肌肉。你增肌和减脂。生活发生了，你被抛离了一年。第二年你重新获得动力，并且极端自律，在第10年比在第3年获得更多。
- en: The same holds true for productivity.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这同样适用于生产力。
- en: I do not believe that 12 hour workdays are something you sustain forever. That’s
    just stupid. The downsides are obvious. Burnout. Neglecting other domains of life.
    And simply not having something to work on.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我不相信12小时的工作日是你能永远维持的。那太愚蠢了。弊端显而易见。过劳。忽视生活的其他领域。而且没有东西可以工作。
- en: 12-hour workdays shouldn’t be forced.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 12小时的工作日不应该被强迫。
- en: No amount of work should be forced.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 任何工作都不应该被强迫。
- en: If it is, change your work (or change your mind.)
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 如果是这样，改变你的工作（或改变你的想法。）
- en: Like a lion hunts and rests, we’re going to replicate that in our work.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 就像狮子狩猎和休息一样，我们将在工作中复制这一点。
- en: 1) Perplexity
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 困惑
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2244">![](../Images/252f0af66631f84e1f22005a012733a0.png)</picture>
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-2244">![](../Images/252f0af66631f84e1f22005a012733a0.png)</picture>
- en: There are 4 cycles of progress.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 有四个进步周期。
- en: You can think of these like chapters of a book.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以像看待一本书的章节一样看待这些。
- en: The first cycle is perplexity, or feeling lost and confused.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个周期是困惑，或者感到迷茫和困惑。
- en: You’re at the start of the story. You haven’t set the scene or found your mission.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 你故事的开始。你还没有设定场景或找到你的使命。
- en: You can’t work for 12 hours because you don’t have something to work on. You
    don’t know what to do next.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 你不能工作12小时，因为你没有东西可以工作。你不知道下一步该做什么。
- en: Most people are in this cycle. They get trapped. They don’t allow themselves
    to be bored, so they flood their minds with instant gratification and cheap dopamine.
    This is bad, because it tricks your mind to think you’re making progress. It’s
    obvious why you don’t have the natural desire to pursue something more.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人处于这个循环中。他们被困住了。他们不允许自己感到无聊，因此他们用即时满足和廉价的多巴胺填满自己的头脑。这是不好的，因为它会让你的大脑认为你在取得进步。显然，你没有追求更多事物的自然欲望。
- en: You escape the perplexity cycle by becoming curious.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 通过变得好奇，你可以摆脱困惑的循环。
- en: If you have difficulty doing that, we will talk about progress blockers in the
    next section.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在这方面有困难，我们将在下一节讨论进步的障碍。
- en: 2) Curiosity
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 好奇心
- en: The next chapter in your book of building your dream life is curiosity.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 你梦想生活的书中的下一章是好奇心。
- en: You identify a problem in your life.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 你在生活中识别出一个问题。
- en: You dig deeper into how it’s dragging you into chaos.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 你会深入挖掘它如何将你拖入混乱。
- en: The job. The bills. The sluggishness. The unfitness. The lack of social skills.
    Whatever it may be. You have plenty of problems you can solve. You’re just distracted.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 工作。账单。迟钝。不健康。缺乏社交技巧。无论是什么。你有很多问题可以解决。你只是分心。
- en: You become curious and desire a solution.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 你变得好奇并渴望解决方案。
- en: At this point, your mind sees a pivotal transformation of perspective.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，你的思维看到了视角的关键转变。
- en: You start noticing information that reinforces a new goal attempting to shape
    your identity.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 你开始注意到信息，这些信息强化了新的目标，试图塑造你的身份。
- en: You start exposing yourself to new environments.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 你开始让自己接触新的环境。
- en: As an example, if you become disgusted with how your job is holding back every
    other area of your life with long work hours and low pay, you start noticing business
    opportunities on social media, or you start searching for side hustles to pursue,
    or you decide to finally pick up investing or budgeting.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你对你的工作如何通过长时间工作和低工资阻碍你生活的其他方面感到厌恶，你开始注意到社交媒体上的商业机会，或者你开始寻找副业来追求，或者你决定最终开始投资或预算。
- en: In the curiosity phase, your job is to try everything and see what sticks.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在好奇心阶段，你的任务是尝试一切，看看什么能坚持下去。
- en: Shiny object syndrome is a good thing.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 光鲜事物综合症是好事。
- en: But only if it’s toward a positive aim for your future.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 但只有当它指向你未来的积极目标时。
- en: Read more books. Join new digital social circles. Watch new content. Buy courses.
    Build projects. Try everything. Allow ideas to accumulate in your brain until
    you gain just the right amount of clarity to go all in on that one thing you can’t
    pull yourself away from.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 阅读更多书籍。加入新的数字社交圈。观看新的内容。购买课程。建立项目。尝试一切。让想法在你的大脑中积累，直到你获得足够多的清晰度，全力以赴于那一件让你无法自拔的事情。
- en: Then, launch into a season of intensity.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，进入一个强烈的季节。
- en: 3) Intensity
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 强烈
- en: The climax of the story.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 故事的高潮。
- en: The main battle.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 主要战斗。
- en: The most interesting and fulfilling part of your life.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 你生活中最有意思和最有成就感的一部分。
- en: The 3-6 months go by in a blur. Pure flow state. Completely focused on actualizing
    one meaningful goal.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 3-6个月的时间在模糊中度过。纯粹的流动状态。完全专注于实现一个有意义的目标。
- en: In fitness, this is when you are disciplined with your diet and training. It’s
    all you think about.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在健身中，这是你饮食和训练有纪律的时候。你只考虑这些。
- en: In relationships, it’s the honeymoon phase. All you want to do is build your
    connection with one person.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在关系中，这是蜜月期。你只想与一个人建立联系。
- en: In business, it’s building and launching a new product or going on a writing
    spree. Both lead to new heights in growth and revenue.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业中，这是构建和推出新产品或进行写作狂潮。两者都导致增长和收入的新的高度。
- en: This is when you pull 12-hour days.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是当你拉长12小时工作日的时候。
- en: It’s stupid to try to force them in any other phase. You’ll end up doing low
    quality work while letting other areas of your life slip.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何其他阶段强迫它们都是愚蠢的。你最终会做低质量的工作，同时让生活的其他方面滑坡。
- en: Of course, this phase can become dangerous, fast.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这个阶段可以很快变得危险。
- en: You have to know when to pull out of it. You also have to know how to transition
    out of those new habits you built.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须知道何时退出困境。你也必须知道如何过渡到那些你建立的新习惯。
- en: Don’t try to push the bulk to the point of getting fat.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 不要试图将大量工作做到发胖的程度。
- en: Don’t push the cut until you’re scrawny and losing muscle.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 不要等到你变得瘦弱并开始失去肌肉时才进行削减。
- en: Don’t get so obsessed with the relationship that you become needy and desperate.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 不要对关系过于痴迷，以至于你变得依赖和绝望。
- en: Don’t try to push revenue higher and destroy your brand reputation.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 不要试图提高收入并破坏你的品牌声誉。
- en: Know when to drop down to a new baseline and maintain the progress you’ve made.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 知道何时降低到新的基准并维持你所取得的进步。
- en: 4) Consistency
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 一致性
- en: No, consistency is not everything.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 不，一致性不是一切。
- en: Consistency is a tool to maintain progress, not make progress.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 一致性是一个保持进步的工具，而不是取得进步的工具。
- en: Stagnation isn’t maintaining progress. Stagnation is death.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 停滞不是保持进步。停滞是死亡。
- en: Being consistent with content creation doesn’t get you anywhere. You must become
    curious and experiment with new angles and strategies. When you find the right
    one you double down and see the most growth you’ve seen (this is how I grew by
    200K on YouTube in a few months and 1.2M on Instagram in the same). You find a
    strategy and milk it. But realize those strategies won’t work forever. Impermanence.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 保持内容创作的一致性不会让你走得太远。你必须变得好奇，并尝试新的角度和策略。当你找到正确的方法时，你加倍投入，看到你见过的最大增长（这就是我在几个月内通过YouTube增长200K，在Instagram上增长1.2M的方式）。你找到一个策略并充分利用它。但意识到这些策略不会永远有效。无常。
- en: The consistency phase in your work is when you drop down to the 4 hours of high-priority
    work. Enough time to experiment for the next intensity phase, enough time to maintain
    a higher baseline than the last macro cycle.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 你工作中的这个一致性阶段是你降低到4小时的高优先级工作。足够的时间为下一个强度阶段进行实验，足够的时间保持比上一个宏观周期更高的基准。
- en: When I shot up to $700K in a month after a launch, there was no way I was sustaining
    all of that. Not that it’s impossible for me to, I just didn’t have the right
    infrastructure to maintain that level. Instead, it brought me to a new higher
    baseline, and I made sure to execute the priority tasks I needed to maintain that.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在推出后一个月内我的收入激增到70万美元，我无法维持所有这些。并不是说对我来说不可能，我只是没有维持那个水平的正确基础设施。相反，它将我带到了一个新的更高的基准，我确保执行了维持那个水平所需的优先任务。
- en: For my work, those tasks were writing for 2 hours a day, managing the business
    for another hour or two, and building new projects like a book or product until
    the next season of intensity came.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我的工作来说，那些任务包括每天写作2小时，管理业务另一小时或两小时，以及构建新的项目，如书籍或产品，直到下一个强度季度的到来。
- en: This consistency cycle is important.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这个一致性周期很重要。
- en: It’s how you drop down and maintain your gains in the gym when life gets busy.
    It’s how you nurture a relationship after the neurochemical cocktail fades.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这是当你生活忙碌时如何在健身房保持你的进步。这是你在神经化学鸡尾酒消退后如何培养关系。
- en: The big thing is – you have nothing to be consistent on if you haven’t gone
    through the other cycles.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是——如果你没有经历过其他周期，你就没有东西可以保持一致性。
- en: If you’re stuck in the cycle of feeling lost, it’s because your mind is blocked.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你陷入了感到迷茫的循环，那是因为你的思想被阻塞了。
- en: Why You Can’t Focus For 12 Hours A Day With Ease
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么你无法轻松地每天集中精力12小时
- en: Let’s not waste any time.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不要浪费时间。
- en: You can’t focus because your mind, life, and priorities are a mess.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 你无法集中注意力，因为你的思想、生活和优先事项一团糟。
- en: And you haven’t done anything about it.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 而你对此没有采取任何行动。
- en: 1) Remove Focus Blockers
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 移除集中精力的障碍
- en: Focus is about removing anything that prevents focus.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 集中精力是关于移除任何阻碍集中的事物。
- en: You feel lost, distracted, and low energy for that exact reason.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 你感到迷茫、分心和精力不足，正是这个原因。
- en: The moment you sense boredom, you fill it with the closest relief.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 当你感觉到无聊时，你就用最近的慰藉来填补它。
- en: The moment you sense anxiety, you do the same thing.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 当你感觉到焦虑时，你就做同样的事情。
- en: Your mind is guiding you toward a better life, but instead of listening to the
    signals, you attempt to numb the pain of not being everything you could be, making
    it worse in the long run.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 你的心智正在引导你走向更好的生活，但你没有听从这些信号，而是试图麻木自己无法成为一切可能成为的人的痛苦，这从长远来看只会使情况变得更糟。
- en: 'There are a few blockers that keep you feeling lost:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 有几个阻碍让你感到迷茫：
- en: '**Purpose**'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '**目标**'
- en: You feel lost because you lack purpose.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 你感到迷茫是因为你缺乏目标。
- en: You don’t know what problem you’re solving. You don’t know what goal you’re
    pursuing. You don’t know your part in a whole that’s greater than yourself.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 你不知道你在解决什么问题。你不知道你在追求什么目标。你不知道你在比你自己更大的整体中的角色。
- en: Your mind is conditioned to focus on the goals society assigned to you. Your
    path is already known. Go to school, get a job, retire. You end up dragging your
    feet through life and getting bored because you don’t care about those things.
    You fill your boredom with laziness and pleasure instead of building toward your
    own goal.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 你的心智被训练成专注于社会分配给你的目标。你的道路已经确定。上学，找工作，退休。你最终在生活中拖拖拉拉，感到无聊，因为你不在乎那些事情。你用懒惰和快乐来填补你的无聊，而不是朝着自己的目标前进。
- en: You need to allow yourself to be bored.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要让自己感到无聊。
- en: You need to expose yourself to higher potentials.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要让自己接触更高的潜力。
- en: You need to drop everything and see what sticks.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要放下一切，看看什么会留下痕迹。
- en: You need to sit with your thoughts so you can catch an inkling of vision.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要静下心来，这样你才能捕捉到一丝愿景。
- en: '**Environment**'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '**环境**'
- en: Your environment creates who you are.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 你的环境塑造了你。
- en: But most people forget that they’re in full control of their environment.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 但大多数人忘记了他们完全控制着自己的环境。
- en: If you’re surrounded by people, opinions, and distractions in both the physical
    and digital world, it’s no wonder why you can’t focus.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你被周围的人、意见和物理及数字世界中的干扰所包围，难怪你无法集中注意力。
- en: Rip the bandaid off.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 勇敢地撕下创可贴。
- en: Take a day and quite literally throw away anything that (1) isn’t important
    and (2) distracts you from what is. Don’t hesitate.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 抽出一整天，字面意义上地扔掉任何（1）不重要和（2）分散你注意力的事物。不要犹豫。
- en: '**Metabolism**'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '**新陈代谢**'
- en: You lack motivation because you eat too much in one sitting.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 你缺乏动力，因为你一次吃得太多。
- en: If I eat anything over 300-600 calories as a meal during the day, as a 225 pound
    guy, my focus suffers immensely.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我一天中作为225磅重的男子吃任何超过300-600卡路里的食物作为一餐，我的专注力就会受到极大的影响。
- en: Try intermittent fasting.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试间歇性禁食。
- en: Try smaller meals and bigger dinners.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试小餐和大餐。
- en: If you eat too much, your body takes from the energy you could use for focus
    and puts it toward digestion.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你吃得太多，你的身体就会从你本可以用以专注的能量中抽取，并将其用于消化。
- en: Reward yourself with a big meal once you are finished with work.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 工作完成后，用一顿丰盛的餐点奖励自己。
- en: '**Knowledge**'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '**知识**'
- en: You’re lost because you don’t know what to do *right now.*
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 你之所以迷茫，是因为你不知道现在该做什么。
- en: You project into the future you want, get stuck there, and begin to stress over
    how long and difficult the journey will be.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 你投射到未来你想要的样子，卡在那里，开始担心旅程将有多长、有多难。
- en: If you’re lost, learn.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你迷茫，就去学习。
- en: When you have direction, act.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 当你有方向时，就要行动。
- en: Stop trying to act when you need to learn and learn when you need to act. That
    alone will solve 99% of your clarity problems.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 当你需要学习时，停止尝试行动；当你需要行动时，去学习。仅此一项就能解决你99%的清晰度问题。
- en: 2) Throw Your Mind Off The Deep End
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 将你的思维从深渊中拉出来
- en: Everything starts with identity.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 一切始于身份。
- en: The web of ideas that shape how you view the world.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 形塑你世界观的思想网络。
- en: The perspective that’s been shaped by decades of social conditioning that makes
    you desire what you desire.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 由数十年的社会条件塑造的视角，使你渴望你所渴望的东西。
- en: If you want to love working toward your dreams, your mind must reflect that.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要热爱追求你的梦想，你的思维必须反映出这一点。
- en: It can’t be some idea you like the sound of. It has to be *who you are.*
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 这不能是某个你听起来喜欢的主意。它必须是*你自己的样子*。
- en: How do you change who you are?
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何改变自己？
- en: Reprogram your mind.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 重新编程你的思维。
- en: Rip yourself from your current lifestyle and immerse yourself in the information
    that will slowly shape how you see the world.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 摆脱你当前的生活方式，让自己沉浸在那些将逐渐塑造你世界观的信息中。
- en: Follow people on social media who have the goals you want to pursue.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 关注社交媒体上那些有你想追求的目标的人。
- en: Listen to podcasts, read books, and put your money where your mouth is by purchasing
    courses that slowly give you ideas that compound into clarity.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 收听播客，阅读书籍，并且通过购买课程来实践你的想法，这些课程会逐渐为你提供清晰的想法。
- en: Wake up tomorrow and do nothing the same.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 明天醒来，不要做任何相同的事情。
- en: Plan a new week. Set new priority tasks. Have new conversations. Overload yourself
    with new information.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 规划一个新的星期。设定新的优先任务。进行新的对话。用新的信息超负荷自己。
- en: 3) Think Bigger, Act Smaller
  id: totrans-137
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 思考更大，行动更小
- en: You are now in a state of chaos.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在处于混乱的状态。
- en: It’s up to you to create order.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 创建秩序取决于你。
- en: You’re surrounded by new ideas that you can collect as building blocks for your
    vision. Then, you can lay those blocks, day after day, to create the life you
    want.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 你被新的想法所包围，你可以收集这些想法作为你愿景的构建块。然后，你可以一天天地将这些块放在一起，创造你想要的生活。
- en: You need a vision. Without one, and by definition, you are lost.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要一个愿景。没有它，按照定义，你将迷失方向。
- en: 'Take out a piece of paper and write down:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 拿出一张纸，写下：
- en: Everything you hate and don’t want in your life again (anti-vision).
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你生活中所有你讨厌的，不再想要的东西（反愿景）。
- en: Everything you want in your future. The body. The lifestyle. The location. The
    mind. The money. Anything. Don’t worry about being shallow. You can create meaning
    from it later.
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你未来想要的一切。身体。生活方式。地点。心灵。金钱。任何东西。不用担心肤浅。你可以在以后从中创造意义。
- en: Inside the [Writer’s Bootcamp](https://bootcamp.kortex.co), this exact process
    becomes your brand. All of your writing topics stem from that.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在[作家训练营](https://bootcamp.kortex.co)内部，这个确切的过程成为你的品牌。你所有的写作主题都源自于此。
- en: You will be coming back to this every week.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 你将每周都会回到这里。
- en: Your vision will become clearer and clearer with time.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，你的愿景将越来越清晰。
- en: As you go about this process, you are waiting for “the click” to happen.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 在你进行这个过程的时候，你正在等待“点击”发生。
- en: The moment when everything clicks, and you launch into a season of intensity.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 一切都变得清晰的那一刻，你便开始了充满活力的季节。
- en: But vision isn’t the only piece of the puzzle.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 但愿景并不是拼图中唯一的部分。
- en: Big goals are for motivation, perspective, and potential.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 大目标是为了激励、视角和潜力。
- en: Small goals are for clarity, action, and sanity.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 小目标是为了清晰、行动和理智。
- en: 4) Reverse Engineer Your Priorities
  id: totrans-153
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 反向工程你的优先级
- en: Once you have a Minimum Viable Vision, do this.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你有了最小可行愿景，就做这件事。
- en: 'Break it down into:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 将其分解为：
- en: 10-year goals
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 10年目标
- en: 1-year goals
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 1年目标
- en: Monthly goals
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每月目标
- en: Weekly goals
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每周目标
- en: Daily priority tasks
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每日优先任务
- en: Then, only focus on the priority tasks.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，只专注于优先任务。
- en: Everything else is for clarity.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 其他一切都是为了清晰。
- en: You will need to test how many priority tasks you do, when you do them, and
    how you structure your work.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要测试你完成优先任务的数量、完成时间以及你如何组织你的工作。
- en: I personally enjoy 2-hour work blocks.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 我个人喜欢2小时的工作块。
- en: I can usually complete 1-3 tasks within that time.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 我通常可以在那个时间内完成1-3项任务。
- en: In between the blocks, I go on walks, go to the gym, get lunch, and occasionally
    read. This makes my days more digestible.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 在块之间，我去散步，去健身房，吃午餐，偶尔阅读。这使得我的日子更加容易消化。
- en: 5) Refine Your Productivity System Each Week
  id: totrans-167
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5) 每周完善你的生产力系统
- en: At the start of each week, I do a weekly review.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 每周开始时，我都会进行一次周回顾。
- en: What went well last week?
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上周哪些事情做得顺利？
- en: What didn’t go well?
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些事情没有做好？
- en: What am I grateful for?
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我感激什么？
- en: What are my focus projects?
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我的重点项目是什么？
- en: '[I use this Kortex template if you’d like to duplicate it to your workspace.](https://app.kortex.co/public/document/883d9246-6dde-4794-9f54-92b8ff07d502)'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: '[如果您想在我的工作空间中复制此模板，请使用这个Kortex模板](https://app.kortex.co/public/document/883d9246-6dde-4794-9f54-92b8ff07d502)。'
- en: If you don’t have access, join the waitlist and you’ll receive it soon.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你无法访问，请加入等待名单，你很快就会收到。
- en: Simple and to the point, you can do that in 5 minutes.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 简洁明了，你可以在5分钟内做到这一点。
- en: This step is important. It shines a light on (1) what you should add to your
    vision and anti-vision and (2) what minor changes can be made this week for better
    results.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 这一步很重要。它照亮了（1）你应该添加到你的愿景和反愿景中的内容，以及（2）本周可以做出哪些小的改变以获得更好的结果。
- en: If you stick with this process, you’ll be awestruck with how far you go in 6-12
    months.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你坚持这个过程，你将在6-12个月内取得的进步会让你感到震惊。
- en: – Dan
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
