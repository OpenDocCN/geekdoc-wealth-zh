- en: Life Is Hard, Get Used To It (The Way To Mental Mastery)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/life-is-hard-get-used-to-it-the-way-to-mental-mastery/](https://thedankoe.com/letters/life-is-hard-get-used-to-it-the-way-to-mental-mastery/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Comfort is an impermanent state of mind that humans love to call home.*'
  prefs: []
  type: TYPE_NORMAL
- en: What’s funny is that the longer we box ourselves into this mental house we refuse
    to leave, the more uncomfortable it gets.
  prefs: []
  type: TYPE_NORMAL
- en: The only path to true comfort is by *reaching the level of mind that is comfortable
    with the inevitable discomfort that life presents**.*
  prefs: []
  type: TYPE_NORMAL
- en: '**The problem is this:**'
  prefs: []
  type: TYPE_NORMAL
- en: When people are faced with discomfort, their automatic reaction is to flee,
    not fight.
  prefs: []
  type: TYPE_NORMAL
- en: We may not flee from the physical situation, but we attempt to run toward the
    mental comfort of a past experience. Our mind wants to move even when we are still.
  prefs: []
  type: TYPE_NORMAL
- en: This creates tension, and unless that tension is resolved it stays around longer
    than it should.
  prefs: []
  type: TYPE_NORMAL
- en: '*The result of this problem is distraction, feeling “lost,” and getting stuck
    in a rut.*'
  prefs: []
  type: TYPE_NORMAL
- en: We don’t know what to pursue next, because we lack the clarity that discomfort
    provides with time.
  prefs: []
  type: TYPE_NORMAL
- en: When we are in this “lost” or chaotic state of mind, it’s impossible to see
    beyond the initial problem.
  prefs: []
  type: TYPE_NORMAL
- en: Why? Because it’s begging to be solved.
  prefs: []
  type: TYPE_NORMAL
- en: The mind determines how we interact with reality.
  prefs: []
  type: TYPE_NORMAL
- en: The mind houses perspective houses perception houses behavior.
  prefs: []
  type: TYPE_NORMAL
- en: From the top down, most people hold a narrow perspective that leads to a negative
    perception of a situation which dictates their mindless behavior.
  prefs: []
  type: TYPE_NORMAL
- en: The goal is to move through life with artfulness and grace.
  prefs: []
  type: TYPE_NORMAL
- en: That is, to be at one with the present moment regardless of how the mind wants
    to interpret the difficulty of the situation.
  prefs: []
  type: TYPE_NORMAL
- en: 'When you:'
  prefs: []
  type: TYPE_NORMAL
- en: Broaden your perspective by approaching life with an open mind
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Gain the power to accept situations as they are
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reap the joy that comes from progress
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You come to the realization that you’ve been sold a lie.
  prefs: []
  type: TYPE_NORMAL
- en: The conventional path is not the path to the good life.
  prefs: []
  type: TYPE_NORMAL
- en: To do this well, there are a few things you need to understand.
  prefs: []
  type: TYPE_NORMAL
- en: The 3 Perspectives
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The space between expectation and reality creates tension that causes pain.
  prefs: []
  type: TYPE_NORMAL
- en: I love philosophy, but realized fast that theory has to meet practice.
  prefs: []
  type: TYPE_NORMAL
- en: Knowledge must be brushed up against reality, in more ways than one, to determine
    its validity.
  prefs: []
  type: TYPE_NORMAL
- en: A philosopher can intellectualize all day, but can they run a business?
  prefs: []
  type: TYPE_NORMAL
- en: How do they react when they lose $100,000?
  prefs: []
  type: TYPE_NORMAL
- en: What about when you [start writing content](https://2hourwriter.com), gain a
    follower, but lose 5 more?
  prefs: []
  type: TYPE_NORMAL
- en: Can they create, keep, and nurture a relationship?
  prefs: []
  type: TYPE_NORMAL
- en: Or are they just guessing about how to create a good one and promoting it as
    “the best path” to those that learn from them?
  prefs: []
  type: TYPE_NORMAL
- en: What about when their dog dies? How about their parents?
  prefs: []
  type: TYPE_NORMAL
- en: Actions must align with words.
  prefs: []
  type: TYPE_NORMAL
- en: An overweight health expert is a clear example of someone that is difficult
    to trust, but anyone can hide behind an anonymous online profile.
  prefs: []
  type: TYPE_NORMAL
- en: The best philosophy is that which is grounded in reality, and that is individual.
  prefs: []
  type: TYPE_NORMAL
- en: I want to give 3 perspectives to help you realize the importance of reducing
    the space between expectation and reality, concept and experience, and what is
    and what isn’t.
  prefs: []
  type: TYPE_NORMAL
- en: Expectation VS Reality
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Expectations are beliefs, and our beliefs are often unconscious and conditioned
    into our mind as we go about life.
  prefs: []
  type: TYPE_NORMAL
- en: An expectation is a projection into the future.
  prefs: []
  type: TYPE_NORMAL
- en: It is the assumption that something “should” or “will” happen.
  prefs: []
  type: TYPE_NORMAL
- en: Western children are often told they “should” become a doctor, engineer, or
    some other high-paying job title.
  prefs: []
  type: TYPE_NORMAL
- en: Kids are told they “will” go to Church on Sunday, and they believe it.
  prefs: []
  type: TYPE_NORMAL
- en: Expectations narrow your mind toward a predictable future and prevent us from
    opening your mind to potential futures.
  prefs: []
  type: TYPE_NORMAL
- en: From this narrow-minded state, our perspective is limited.
  prefs: []
  type: TYPE_NORMAL
- en: Since our perspective is limited, so is our perception of the situation.
  prefs: []
  type: TYPE_NORMAL
- en: With an inaccurate perception, we often make choices that are inconducive to
    our ideal future.
  prefs: []
  type: TYPE_NORMAL
- en: And choices are important, they create your future one brick at a time.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at the example of hot weather and a sauna.
  prefs: []
  type: TYPE_NORMAL
- en: When people think about going out in hot weather, they complain, because their
    expectation narrows their mind on a negative outcome.
  prefs: []
  type: TYPE_NORMAL
- en: When people think about going to the sauna, it is intentional. Usually in alignment
    with a meaningful outcome.
  prefs: []
  type: TYPE_NORMAL
- en: The reality of the situation is the same, but the expectation is different,
    and that causes pain in the former situation.
  prefs: []
  type: TYPE_NORMAL
- en: In a more practical situation, let’s look at someone with a lot of responsibility
    that wants to start a business.
  prefs: []
  type: TYPE_NORMAL
- en: They see others with little responsibility flexing their business success within
    6-12 months.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They hold that expectation in your mind without context for their situation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They conceptualize why they can’t do the same and how life is unfair (because
    they have a job, kids, and a spouse).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They fail to face reality.
  prefs: []
  type: TYPE_NORMAL
- en: And the reality is that they did not hop on the opportunity to build a business
    when they had less responsibilities, and that’s fine. There’s no changing it,
    and the sooner you accept reality for what it is, the sooner you’ll be able to
    start making progress.
  prefs: []
  type: TYPE_NORMAL
- en: Because once they do accept reality, they can approach that goal from a new
    lens, a more sustainable one.
  prefs: []
  type: TYPE_NORMAL
- en: They can search for aligned mentors, education, and strategies that will result
    in the same success, but on a longer time scale.
  prefs: []
  type: TYPE_NORMAL
- en: The only other option is to become a slave to your expectations and never reach
    that goal, going about life knowing it’s possible, but complaining that you aren’t
    able to achieve the same thing.
  prefs: []
  type: TYPE_NORMAL
- en: Concept VS Experience
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Concepts can only be created from experience.
  prefs: []
  type: TYPE_NORMAL
- en: The prime example of this misunderstanding is that of God, The Universe, or
    whatever you want to call the higher power.
  prefs: []
  type: TYPE_NORMAL
- en: Religious people attach to the concept of God but fail to realize that it is
    an experience. The concept is simply a symbolic representation of that experience.
  prefs: []
  type: TYPE_NORMAL
- en: The difference is knowing and understanding.
  prefs: []
  type: TYPE_NORMAL
- en: Concepts allow you to know, experience allows you to understand.
  prefs: []
  type: TYPE_NORMAL
- en: Knowledge is a layer on top of reality, understanding is an inherent aspect
    of human consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: One an outward construction, the other an inward truth.
  prefs: []
  type: TYPE_NORMAL
- en: Concept is the guide that must brush up against reality to be experienced.
  prefs: []
  type: TYPE_NORMAL
- en: Reality is experience, and that’s all there is, if you’re paying attention.
  prefs: []
  type: TYPE_NORMAL
- en: People love to conceptualize because they can do so without moving forward in
    the world to solve problems (internal and external) that result in a less superficial
    and reactively emotional experience.
  prefs: []
  type: TYPE_NORMAL
- en: What Is VS What Isn’t
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: “It is what it is” is the most profound statement you will hear in your life,
    but few people realize the depth behind it.
  prefs: []
  type: TYPE_NORMAL
- en: Making a distinction between “what is” and “what isn’t” is a great way to close
    the space between expectations and reality, as well as concept and experience.
  prefs: []
  type: TYPE_NORMAL
- en: The present moment, what’s right in front of you, is “what is.”
  prefs: []
  type: TYPE_NORMAL
- en: The difficulty of the barbell in your hand is reality. The expectation that
    it should be easy is not.
  prefs: []
  type: TYPE_NORMAL
- en: The struggle of building a name for yourself is the experience. The concept
    of a fulfilling lifestyle in your mind isn’t.
  prefs: []
  type: TYPE_NORMAL
- en: And if you want to start this journey toward long-term success, enroll in the
    [Digital Economics masterclass.](https://digitaleconomics.school)
  prefs: []
  type: TYPE_NORMAL
- en: Now, I’m not saying that expectations, concepts, and “what isn’t” are bad.
  prefs: []
  type: TYPE_NORMAL
- en: The main problem are the negative expectations, the concepts that “know” and
    prevent you from action, and an inability to be at one with “what is.”
  prefs: []
  type: TYPE_NORMAL
- en: The Point
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'With all of these perspectives, the point is this:'
  prefs: []
  type: TYPE_NORMAL
- en: When life is difficult, overwhelming, or you feel that dreaded sense of despair
    about your future, there is a dissonance between expectation and reality.
  prefs: []
  type: TYPE_NORMAL
- en: The beliefs, ideas, or thoughts in your head do not match the present moment
    that is unfolding in front of you.
  prefs: []
  type: TYPE_NORMAL
- en: And because you give them too much attention, they take priority over and mask
    your sensory perceptions.
  prefs: []
  type: TYPE_NORMAL
- en: In another word, you can clean your room, and you can clean it well, even if
    you don’t *feel* like cleaning it.
  prefs: []
  type: TYPE_NORMAL
- en: Feel free to exchange “clean your room” with any given activity.
  prefs: []
  type: TYPE_NORMAL
- en: Levels Of Mind
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: No problem can be solved from the same level of consciousness that created it.
    – Albert Einstein
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Problems are encoded in the system and few people can see them for what they
    are.
  prefs: []
  type: TYPE_NORMAL
- en: Problems are what spark the gap between expectation and reality, and only once
    you can close that gap does that problem become effortless to solve.
  prefs: []
  type: TYPE_NORMAL
- en: But, in order to solve that problem and close that gap, you must reach a new
    level of mind.
  prefs: []
  type: TYPE_NORMAL
- en: We will define “mind” as how you interact with reality.
  prefs: []
  type: TYPE_NORMAL
- en: Mind, in this sense, is perspective.
  prefs: []
  type: TYPE_NORMAL
- en: Think of perspective as a field that holds all expectations, beliefs, ideas,
    skills, experience, potentialities, and the rest.
  prefs: []
  type: TYPE_NORMAL
- en: The broader this perspective becomes, the more you increase your level of mind,
    and the more difficult it is to latch on to one expectation, belief, skill, etc.
  prefs: []
  type: TYPE_NORMAL
- en: With each problem you solve, the perceived difficulty of life goes down, and
    your level of mind goes up.
  prefs: []
  type: TYPE_NORMAL
- en: The degree of problems you face is a prime indicator of the stage of personal
    development you are in.
  prefs: []
  type: TYPE_NORMAL
- en: And the degree of problems you can solve is the degree of problems you can solve
    for another.
  prefs: []
  type: TYPE_NORMAL
- en: Meaning, the more you develop yourself, by taking on an ever-increasing level
    of challenge, the more experience you gain.
  prefs: []
  type: TYPE_NORMAL
- en: The challenges you face will you require to close the gap between expectation
    and reality many times, and each time you do, you will be presented with a lesson.
  prefs: []
  type: TYPE_NORMAL
- en: This experience can be transferred into business, as products solve problems,
    so the higher your experience, the more profitable your business becomes.
  prefs: []
  type: TYPE_NORMAL
- en: There must be a balance, as you would not try to climb Mount Everest when you
    can’t even sustain a habit of 10K steps a day.
  prefs: []
  type: TYPE_NORMAL
- en: Live At Your Edge – The Way To Mental Mastery
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As you open yourself to living at your edge, your deepest purpose will slowly
    begin to make itself known. In the meantime, you will experience layer after layer
    of purposes, each one getting closer and closer to the fullness of your deepest
    purpose. – David Deida
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: To reach new levels of mind, you have to encounter problems.
  prefs: []
  type: TYPE_NORMAL
- en: You can’t sit around, wasting away, doing the same thing over and over without
    regard for personal evolution.
  prefs: []
  type: TYPE_NORMAL
- en: You must live at the edge of skill and challenge.
  prefs: []
  type: TYPE_NORMAL
- en: As you solve problems, you increase your level of mind.
  prefs: []
  type: TYPE_NORMAL
- en: In order to solve problems, you must increase your level of skill.
  prefs: []
  type: TYPE_NORMAL
- en: 1) Pursue A Challenging Goal
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is a lesson in almost every single one of my newsletters.
  prefs: []
  type: TYPE_NORMAL
- en: You need a goal that you are working towards *every. single. day.*
  prefs: []
  type: TYPE_NORMAL
- en: One that will lead to your ideal future, even if you don’t know what that future
    is.
  prefs: []
  type: TYPE_NORMAL
- en: I can assume that it involves a healthy body, abundant bank account, and thriving
    relationships (with peace of mind being the byproduct of pursuing those goals,
    not necessarily achieving them).
  prefs: []
  type: TYPE_NORMAL
- en: This goal will be achieved, and you will have to set a new one (that may not
    be clear for a while) in order to prevent and dig yourself out of subsequent ruts.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Remain Conscious Of The Present Moment Difficulty
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: What judgments, connotations, and words do you associate with the words “struggle,”
    “difficulty,” or “hard?”
  prefs: []
  type: TYPE_NORMAL
- en: Do they lead to compulsive thoughts about a stressful future?
  prefs: []
  type: TYPE_NORMAL
- en: Maybe they lead to a memory of a past mistake… one that causes fear to the point
    of inaction?
  prefs: []
  type: TYPE_NORMAL
- en: Or maybe a mixture of both, leaving you in a vortex of anxiety?
  prefs: []
  type: TYPE_NORMAL
- en: Again, these are but expectations, concepts, and “what isn’ts” that you hold
    in your mind.
  prefs: []
  type: TYPE_NORMAL
- en: They are not reality, and reality includes struggle, difficulty, and hardness.
    You can’t escape them. And this requires radical acceptance of the present moment.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Hit The Critical Point Of The Perception Threshold
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1064">![](../Images/c21b44e18747ab061b5743d43b961671.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: If you have writer’s block…
  prefs: []
  type: TYPE_NORMAL
- en: If you’re 30 minutes into a 5k run…
  prefs: []
  type: TYPE_NORMAL
- en: If you’re on your last rep of a 365lb squat…
  prefs: []
  type: TYPE_NORMAL
- en: If you’re hesitant to post your first piece of content…
  prefs: []
  type: TYPE_NORMAL
- en: If you’re 45 minutes into a meditation session and your mind is begging you
    to check your notifications…
  prefs: []
  type: TYPE_NORMAL
- en: Thoughts and emotions will flood your mind, and “the only way out is through.”
  prefs: []
  type: TYPE_NORMAL
- en: You must *train* your pain tolerance because the magic happens when you stick
    it out for just enough time to hit “the runner’s high” in any situation.
  prefs: []
  type: TYPE_NORMAL
- en: '**The Perception Threshold** is the critical point after a period of struggle
    where *what was once difficult becomes effortless due to a shift in how you perceive
    the situation.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Expectations collapse into reality.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Concepts collapse into experience.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*What isn’t collapses into what is.*'
  prefs: []
  type: TYPE_NORMAL
- en: This may take 5 minutes, it may take 1 hour, and with problems that aren’t immediately
    solvable, it may take years.
  prefs: []
  type: TYPE_NORMAL
- en: Chaos is a prerequisite to clarity, and clarity is the most potent fuel in this
    world.
  prefs: []
  type: TYPE_NORMAL
- en: 4) Reach A New Level Of Mind
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Crossing The Perception Threshold forces you to zoom out to a higher level of
    mind, or more holistic perspective beyond the narrow state you were in.
  prefs: []
  type: TYPE_NORMAL
- en: From this level, you can accurately perceive your prior problem and see it for
    what it is.
  prefs: []
  type: TYPE_NORMAL
- en: '[“Not having ideas” for your writing becomes a silly excuse.](https://2hourwriter.com)'
  prefs: []
  type: TYPE_NORMAL
- en: Not performing the last rep – that leads to the most gains – becomes “I’m being
    a little b*tch, push through.”
  prefs: []
  type: TYPE_NORMAL
- en: Not posting your first piece of content becomes, “If I don’t do this, it becomes
    habit, and I’ll be stuck in my current situation for life, which is the opposite
    of what I want.”
  prefs: []
  type: TYPE_NORMAL
- en: Deep satisfaction is the result.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
