- en: 'My Story: The Untold Truth Of Dan Koe'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我的故事：丹·科伊未述说的真相
- en: 原文：[https://thedankoe.com/letters/my-story-the-untold-truth-of-dan-koe/](https://thedankoe.com/letters/my-story-the-untold-truth-of-dan-koe/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/my-story-the-untold-truth-of-dan-koe/](https://thedankoe.com/letters/my-story-the-untold-truth-of-dan-koe/)
- en: I was observant as a child.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我小时候就很警觉。
- en: I knew there had to be a better way of living.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道一定有更好的生活方式。
- en: It seemed like every corner I looked… people were unhappy.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 好像我看的每个角落里的人都不开心。
- en: Unhappy with their careers, boss, spouse, children, colleagues, self, mornings,
    nights, everything.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 对他们的职业生涯、老板、配偶、孩子、同事、自我、早晨、夜晚、一切都不满意。
- en: This may just be the environment I was exposed to or what my mind gravitated
    towards, but something made me want to avoid this “default” lifestyle like the
    plague.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能只是我接触到的环境，或者是我内心所倾向的，但某种东西让我想避免这种“默认”的生活方式，就像瘟疫一样。
- en: Complaining about the cards I was dealt wasn’t going to change my future.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 抱怨我手中的牌不会改变我的未来。
- en: Taking matters into my own hands was the only option.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 把事情掌握在自己手中是唯一的选择。
- en: Personal responsibility, self-education, and the pursuit of sovereignty is what
    I dedicated my sub-20-year-old life to.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 个人责任、自我教育和追求主权是我致力于我20岁以下的年轻生活。
- en: If everyone was told to watch the news, go to college, get a job, retire at
    65, and do as they’re told — would that not lead to everyone getting the same
    results?
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 如果每个人都被告知要观看新闻、上大学、找工作、65岁退休，并按他们所说的去做——难道不会导致每个人都得到相同的结果吗？
- en: Is that not the cause of this global unhappiness?
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 难道这不是全球不快乐的根源吗？
- en: 'There was only one option: *Do the exact opposite of everyone else.*'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 只有一个选择：*做与所有人相反的事情*。
- en: While everyone glued their eyes to the TV, I drowned my mind in the information
    from people who were doing what I wanted to do, creators (who actually had results
    for it unlike most professors who teach something they’ve never done, they are
    taught to teach, not do).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 当每个人都盯着电视时，我却在沉浸于那些正在做我想做的事情的人的信息中，创作者（他们实际上有成果，与大多数从未做过什么却教授别人的人不同，他们被教导去教学，而不是去做）。
- en: While everyone sat on the couch after work, I went to the gym straight after
    school.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当每个人都下班后坐在沙发上时，我却在放学后直接去健身房。
- en: While everyone let toxic mainstream news flood their mind, I read books on spirituality
    and actualizing my full potential.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 当每个人都让有毒的主流新闻充斥他们的头脑时，我却在阅读关于灵性和实现我全部潜能的书籍。
- en: '**Before we begin:**'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '**在我们开始之前：**'
- en: 'The Art Of Focus Keepsake Edition **price increases in 3 days**. It comes with:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 《专注的艺术纪念版**价格将在3天内上涨**》。它包括：
- en: The Keepsake Hardcover – we are only printing 2000 copies.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 纪念版精装本——我们只印刷2000本。
- en: The digital download of the book so you can be the first to read.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 书籍的数字下载，让你能成为第一个阅读的人。
- en: The audiobook version when it is recorded and uploaded.
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当它被录制并上传时，会有有声书版本。
- en: The FOCI Planner to deconstruct your ideal future into priority tasks.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: FOCI 计划者，将你的理想未来分解为优先任务。
- en: The FOCI Coin to remember to act with intention.
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: FOCI 硬币，用来提醒自己有目的地行动。
- en: The Digital Transformation Center with 12 hours of modern entrepreneurship training.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数字化转型中心，包含12小时的现代创业培训。
- en: The Private Community for updates, discussion, and networking.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 私人社区，用于更新、讨论和建立人脉。
- en: A private invitation to an in-person event in Phoenix, AZ next year.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明年亚利桑那州凤凰城的一个现场活动的私人邀请。
- en: '[Preorder your copy here before October 24, 2023.](https://theartoffocusbox.com)'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '[在2023年10月24日之前在此处预订您的副本。](https://theartoffocusbox.com)'
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1511">![](../Images/2c2d8a76ee4b38bc0212754ad5166409.png)</picture>
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1511">![](../Images/2c2d8a76ee4b38bc0212754ad5166409.png)</picture>
- en: And a special shoutout to [Jack Moses](https://twitter.com/jackmoses0) for seeing
    how the newsletters pieced together to create a cohesive book on The Universe,
    lifestyle design, creating your ideal self, and finding purpose in modern business
    (when it seems full of sleazy marketing on the surface).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 并向 [Jack Moses](https://twitter.com/jackmoses0) 致敬，因为他看到了如何将通讯拼凑在一起，创作出一本关于宇宙、生活方式设计、创造你理想自我以及在现代商业中找到目的（当它表面上似乎充满了卑鄙的营销时）的连贯书籍。
- en: 'The Bane Of My Existence: The Conventional Career Path'
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我的存在的祸害：传统的职业道路
- en: 'One thing that I was truly excited to do was go to college. I knew that it
    would give me a chance to let me try new things, meet new people, and ultimately:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我真正兴奋的一件事就是上大学。我知道这将给我一个机会去尝试新事物，遇见新的人，最终：
- en: '*Delay the amount of time I had to build a sustainable income source for myself.*'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '*推迟我建立可持续收入来源的时间。*'
- en: The minute that I set foot on the ASU campus I knew that I had started a timer.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我一踏上ASU校园，就知道我已经开始计时了。
- en: It was do or die.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一场生死存亡的较量。
- en: I had to learn the skills necessary to make an income without a job, or end
    up the same as everyone else. If I had to get a job, I knew that 8-hour days and
    energy-draining work would leave little room for me to break free of that job.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我必须学习必要的技能，在没有工作的情况下赚钱，或者最终和其他人一样。如果我要找工作，我知道每天8小时的工作和消耗精力的工作几乎让我没有时间摆脱这份工作。
- en: I was hell-bent on trying different business models.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我一心想要尝试不同的商业模式。
- en: In freshman year, I started a fitness YouTube channel with my buddy who lived
    in the dorm room 3 doors down from mine.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在大一那年，我和住在离我宿舍三扇门远的朋友一起开始了一个健身YouTube频道。
- en: We made workout videos, educational videos, and food challenges (my 10,000 calorie
    challenge video got around 20,000 views which excited me).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们制作了健身视频、教育视频和食物挑战（我的10,000卡路里挑战视频获得了大约20,000次观看，这让我很兴奋）。
- en: After a few months, we decided to call it quits. I didn’t do much else during
    freshman year aside from partying, playing video games, taking graphic design,
    marketing, film, and other classes to see what I was truly interested in.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 几个月后，我们决定放弃。在大一那年，除了聚会、玩电子游戏、学习图形设计、市场营销、电影和其他课程，看看我真正感兴趣的是什么之外，我没有做太多其他的事情。
- en: Around that time, my group of friends and I were arrested for smoking weed in
    the parking structure across from our dorm building. I got to take a ride with
    the not-so-kind police officer, give him my fingerprints, and have him interrogate
    me about where I got the weed (funny story that we’ll dive into another time).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 大约在那个时间，我和我的朋友们因为在我们宿舍楼对面的停车场吸大麻而被逮捕。我不得不和那位不太友好的警察一起乘车，留下我的指纹，并接受他的审问，询问我大麻的来源（这是一个有趣的故事，我们下次再讲）。
- en: 'This is an important turning point in my life. I had forgotten about my goal
    of avoiding the conventional career path. When I went home for the summer, I got
    a letter from the court in the mail that gave me 2 options:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我人生中的一个重要转折点。我忘记了避免传统职业道路的目标。当我回家过暑假时，我在邮件中收到了法院的一封信，给了我两个选择：
- en: Go to court, defend my case, and possibly be a convicted felon
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 去法庭辩护我的案件，可能成为被定罪的罪犯
- en: Pay $5-$10,0000 for a program that made me pee in a cup every week for 3-6 months.
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了一个需要每周在杯子里尿检3-6个月的程序支付5-10,000美元。
- en: This scared the crap out of me. I hid the letter from my parents and dealt with
    my emotional turmoil in silence.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这让我感到非常害怕。我把信藏起来，不让父母知道，默默地处理我的情绪困扰。
- en: This was the moment I purchased The Power Of Now by Eckhart Tolle. I glued my
    eyes to the page hoping it would ease some of my suffering — and it did. This
    was one of the times when I genuinely stopped caring. I let go. Whatever was going
    to happen was going to happen.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我购买《当下的力量》这本书的时刻，作者是厄克哈特·托勒。我目不转睛地盯着页面，希望它能缓解我的一些痛苦——它确实做到了。这是那些我真正不再在乎的时刻之一。我放手了。无论会发生什么，都会发生。
- en: I regained that drive to blaze my own path, started making YouTube videos again
    (talking head videos, kind of like Elliot Hulse at the time), and continued learning
    about spirituality along the way.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我重新找回了那条自己开辟道路的动力，又开始制作YouTube视频（头部讲话视频，有点像当时的Elliot Hulse），并且在路上继续学习关于灵性的知识。
- en: As with every other business model I tried, it didn’t work out.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 就像我尝试过的每一个商业模式一样，它并没有成功。
- en: Failing, Failing, and Failing Again
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 失败，失败，再失败
- en: In my sophomore year of college, I picked up photography. I watched YouTube
    videos like mad to educate myself, used my summer job money to buy a camera, and
    shot pics of whatever I could. Skyscrapers downtown, landscapes after a long hike,
    macro shots of nature.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在我大学二年级的时候，我开始学习摄影。我疯狂地观看YouTube视频来教育自己，用暑假的工作钱买了一台相机，拍摄了各种各样的照片。拍摄城市摩天大楼、长途跋涉后的风景，以及自然的微距照片。
- en: I didn’t really care for taking pictures, what I really loved was editing. That
    realization shot me down a Photoshop learning rabbit hole and come junior year
    of college I committed to posting some of my edits on Instagram.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我并不真的喜欢拍照，我真正热爱的是编辑。这个认识让我一头扎进了Photoshop学习的兔子洞，到了大学三年级，我决定在Instagram上发布一些我的编辑作品。
- en: 'I spent 6-8 hours at a time glued to my computer working to actualize a surreal
    image I had in my head. These were some of the results:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我一次花上6-8小时的时间，全神贯注地坐在电脑前，努力实现我脑海中那个超现实的图像。这些是一些结果：
- en: <picture decoding="async" class="wp-image-579">![](../Images/757ed82c274935bff996f6a7f70c8f92.png)</picture>
    <picture decoding="async" class="wp-image-580">![](../Images/4e44e772308d5980d02830faa8ab2318.png)</picture>
    <picture loading="lazy" decoding="async" class="wp-image-581">![](../Images/be207d7f5afff00e4b6f0eb941f6758f.png)</picture>
    <picture loading="lazy" decoding="async" class="wp-image-582">![](../Images/1f30eb2184165345864e94746211e6ea.png)</picture>
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-579">![](../Images/757ed82c274935bff996f6a7f70c8f92.png)</picture>
    <picture decoding="async" class="wp-image-580">![](../Images/4e44e772308d5980d02830faa8ab2318.png)</picture>
    <picture loading="lazy" decoding="async" class="wp-image-581">![](../Images/be207d7f5afff00e4b6f0eb941f6758f.png)</picture>
    <picture loading="lazy" decoding="async" class="wp-image-582">![](../Images/1f30eb2184165345864e94746211e6ea.png)</picture>
- en: Most of these were just mashups of stock images, some had my own photos (like
    the buildings and plane).
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数这些都是股票图片的混搭，其中一些是我的照片（比如建筑和飞机）。
- en: I never planned to make an income from this — but I ended up gaining around
    2,500 followers on Instagram. I got bored of the whole digital art thing after
    a few months, but it taught me the importance of graphic design, visual storytelling,
    and opened my mind to the possibility of growing on social media with quality
    content.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我从未打算从这个中赚钱——但最终我在Instagram上获得了大约2,500个关注者。几个月后，我对整个数字艺术感到厌倦，但它教会了我图形设计、视觉叙事的重要性，并让我对在社交媒体上通过优质内容成长的可能性有了新的认识。
- en: If I had the awareness I do now, I could have easily created a course teaching
    people how to make these compositions.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我有现在的意识，我很容易就能创建一个课程，教人们如何制作这些构图。
- en: That same year, I tried a few more business models.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 那一年，我尝试了更多的商业模式。
- en: '**1) A Facebook Ads Agency**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 一个Facebook广告代理机构**'
- en: I bought a course that taught me the fundamentals of landing clients, creating
    Facebook ads, and advertising local businesses.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我购买了一个课程，它教会了我如何吸引客户、创建Facebook广告以及如何为本地企业做广告。
- en: I gave up after sending around 50 cold emails and never landing a client after
    2-3 sales calls.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在发送了大约50封冷邮件并且经过2-3次销售电话后，我放弃了，因为没有成功吸引到一个客户。
- en: Looking back, this taught me about funnels and direct response marketing. A
    key component to making any business work. I just didn’t have the patience.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾过去，这让我了解了漏斗和直接响应营销。这是任何业务成功的关键组成部分。我只是没有耐心。
- en: '**2) A Rave Clothing Dropshipping Store**'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 一个派对服装的Dropshipping商店**'
- en: I went to my first rave and was exposed to the whole EDM scene in my sophomore
    year (hence my obsession with dubstep for focused work and gym music). I knew
    the industry like the back of my hand and knew there was a demand for fancy (and
    skimpy) clothes. Especially during “festival season.”
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我在大学二年级时参加了我的第一次派对，并接触到了整个EDM场景。因此，我对dubstep在专注工作和健身房音乐中的痴迷。我对这个行业了如指掌，知道市场上需要时尚（且简约）的服装。尤其是在“音乐节季节”。
- en: I bought an eCom course that taught me branding, copywriting, Shopify, and how
    to find “good products.”
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我购买了一个电子商务课程，它教会了我品牌建设、文案写作、Shopify以及如何找到“好的产品”。
- en: I used my previous Facebook ads knowledge, spent about $100 on ads, and made
    one sale of a shiny bra (lol).
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我利用了我之前对Facebook广告的知识，花费了大约100美元的广告费用，并卖出了一件闪亮的内衣（哈哈）。
- en: <picture loading="lazy" decoding="async" class="wp-image-583">![](../Images/19f601f2b6fbacb8305ba3e2b8a49c92.png)</picture>
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-583">![](../Images/19f601f2b6fbacb8305ba3e2b8a49c92.png)</picture>
- en: The first online dollar felt amazing, but I felt like a piece of garbage having
    people wait 30 days for the product to be shipped from China.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个在线美元感觉太棒了，但当我看到人们等待30天从中国发货的产品时，我感到自己像垃圾一样。
- en: My skills were starting to stack.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我的技能开始累积。
- en: I had a solid understanding of design, marketing, copywriting, sales, and branding.
    Things started to make sense.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 我对设计、营销、文案写作、销售和品牌建设有了稳固的理解。事情开始变得有道理。
- en: '**3) Freelance Web Design**'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 自由职业网页设计**'
- en: This is where things get spicy. At this time — in senior year — I was living
    with 6 other guys in an old frat house. Yes… 6 guys in one house. There were 2
    master bedrooms that people split.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是事情变得有趣的地方。在高三这一年，我和其他6个男生住在一所老兄弟会房子里。是的……一栋房子里有6个男生。有两间主卧室，人们可以分住。
- en: Sometimes I miss those days. There was always something interesting going on.
    A truly unique group of people that all got along.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候我会怀念那些日子。总有有趣的事情发生。一个真正独特的人群，他们彼此相处融洽。
- en: I took an introduction to web development course that launched me into an entirely
    new phase of life. I fell in love with coding. I skipped class, studied Udemy
    courses, took free coding classes, and ended up learning the entire college course
    curriculum in about a month. I didn’t show up to 95% of the classes and was still
    top of that class.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: This taught me the absolute necessity of a self-education habit for those who
    want to do their own thing in life.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: Deep study and deep work have to be a *daily thing.* You can’t skip it. The
    only other option is to be assigned distractions or the work of others to fill
    that time.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: Part of the reason I loved coding so much is that I knew I could freelance with
    that skill and at minimum get a high-paying job whether I graduate or not. The
    tech industry was rather lenient when it came to needing a degree.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: I tried my hand at freelancing, reached out to friends and family, built some
    portfolio sites, and landed a few cheap clients (I made around $500 total).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: That was senior year — my time was running out.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: I had to make something work or succumb to my fate of “getting a real job.”
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: '**4) Two Ecommerce Brands**'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: I decided to combine my branding, web development, graphic design, and advertising
    skills into one and create a real brand.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: I knew that developers were stuck at a screen all day — and this is around the
    time blue light glasses were gaining mainstream popularity — so I called my dad.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: “Hey pops… question for ya… can I uhhhhhh borrow a few thousand dollars? I promise
    I’ll pay you back, here’s my entire plan for getting rich, makes sense right?”
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: My dad probably thought I was insane, but he believed in me, something I am
    truly grateful for — not many have this opportunity. I couldn’t waste it.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: I looked for the perfect product, ordered them, waited 30 days for them to show
    up, took product pictures, and started paying for ads and influencer shoutouts.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s one of my ad images:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-584">![](../Images/31dd17cda6b292346dc11f788d2943da.png)</picture>
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: Yes. That’s a hedgehog. His name was Momo. Very cuddly despite his spiky demeanor.
    He ended up getting sick — and after multiple efforts to syringe feed him to health
    — he passed away.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: RIP Momo.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: The glasses were great. I was proud of the product. But I was just shoveling
    money down the drain on ads at this point. I learned about influencer promotions,
    paid a meme page to post an ad and had everyone in the comments calling me a “clown.”
    That hurt, I quit once again.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: This sparked another major low point in my life, similar to when I got arrested.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: I had wasted my dad’s money, maxed out my first credit card, and could not see
    the light. I was doomed.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: The only logical option was to accept my fate, use my previously learned coding
    skills, and opt for plan B of getting a job.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: Luckily enough, I got a web design job fairly quickly. It was a cushy job that
    taught me about what it really takes to run a web design agency. I used my free
    time there to try to land clients and saw some success.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，我很快就找到了一份网页设计工作。这是一份轻松的工作，让我了解了运营网页设计公司真正需要什么。我在那里的空闲时间试图吸引客户，并取得了一些成功。
- en: Now that I had money coming in, I decided to try out another e-commerce brand.
    This time with minimalist wallets (that my friends and I still use to this day,
    they were top quality.)
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我有了收入，我决定尝试另一个电子商务品牌。这次是简约的钱包（我和我的朋友们至今仍在使用，它们质量上乘。）
- en: 'I even invested quite a bit in professional product pics:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我甚至投资了不少于专业产品图片：
- en: <picture loading="lazy" decoding="async" class="wp-image-585">![](../Images/0098c3c86237e93a4aa2b220fbc44417.png)</picture>
    <picture loading="lazy" decoding="async" class="wp-image-586">![](../Images/26c257d1c46caf7371597193067028a4.png)</picture>
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/0098c3c86237e93a4aa2b220fbc44417.png) ![图片](../Images/26c257d1c46caf7371597193067028a4.png)'
- en: Again… didn’t make a sale, wasted money, and got tired of it.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 再次……没有做成销售，浪费了钱，也厌倦了这一切。
- en: This is when I went all-in on freelancing.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 这时我全力以赴做自由职业者。
- en: There was a blurry moment throughout all of this where I also tried an SEO agency,
    content marketing agency, and was still kinda trying to find clients for anything
    I could get my hands on, mostly web design.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一切中，我还尝试过一家SEO公司、内容营销公司，并且还在试图为我能接触到的一切寻找客户，主要是网页设计。
- en: All of the skills I had developed up until this point could not fail me.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我开发的所有技能都不会让我失望。
- en: Nothing Happens, Then Everything Happens
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 没有发生什么，然后一切就发生了
- en: <picture loading="lazy" decoding="async" class="wp-image-594">![](../Images/0ef3c8384a33ae750968a4d3f8f630f2.png)</picture>
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/0ef3c8384a33ae750968a4d3f8f630f2.png)'
- en: Even though I had a decent-paying job, my inner child was still screaming at
    me to live up to my promise.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我有一份收入不错的的工作，但我的内心小孩仍在尖叫着要实现我的承诺。
- en: I may not have been able to avoid a job altogether, but I could sure as hell
    get out of it before other life responsibilities started to pile up. A car, wife,
    children, and the rest would be my nail in the coffin. I had to get out immediately.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我可能无法完全避免工作，但我在其他生活责任开始堆积之前确实可以摆脱它。一辆车、妻子、孩子以及其他一切都会是我的坟墓。我必须立即摆脱。
- en: I walked into local businesses, reached out to my network again, tried LinkedIn
    prospecting, and everything else.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 我走进当地的企业，再次联系我的网络，尝试LinkedIn的潜在客户开发，以及所有其他方法。
- en: I was able to land 2-3 clients a month at $1500-$2500 from this.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 我从这个渠道每月能吸引2-3个客户，收费1500-2500美元。
- en: When I learned more about the businesses I was helping (mostly service businesses)
    I learned a bit about email marketing and copywriting.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 当我更多地了解我帮助的企业（主要是服务型企业）时，我学到了一些关于电子邮件营销和文案写作的知识。
- en: I also realized that the web design agency I worked at was only profitable because
    they had a marketing, sales, and operations department. The web designers were
    only one piece of the puzzle (keep that in mind freelancers, you have to learn
    it all).
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 我还意识到，我工作的网页设计公司之所以盈利，仅仅是因为他们有一个营销、销售和运营部门。网页设计师只是这个谜团中的一块拼图（记住，自由职业者，你们必须学会所有这些）。
- en: I pivoted my offer and started creating simple service funnels.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 我调整了我的报价，开始创建简单的服务漏斗。
- en: A landing page, opt-in, and email sequence that would get calls booked for people
    like contractors, lawyers, accountants, pest control, and anyone else who were
    already getting leads but wanted to convert more into calls and customers.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 一个着陆页、注册和电子邮件序列，这将为像承包商、律师、会计师、害虫控制以及任何其他已经获得线索但希望将更多线索转化为电话和客户的任何人预订电话。
- en: This is when I started increasing my prices (because it was a more specific
    offer that got better results than just “I’ll build you a pretty website”).
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这时我开始提高我的价格（因为这是一个更具体的报价，比“我会为你建一个漂亮的网站”效果更好）。
- en: I was charging $2500-$5000 to set this funnel up. It took me less time to build
    than it did a full-blown website. I was able to systemize my process. It was less
    “custom” and more “results” based on what has worked.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我为设置这个漏斗收费2500-5000美元。这比我做一个完整的网站花的时间还少。我能够系统化我的流程。它更少“定制”，更多基于已经成功的结果。
- en: A few months later, I decided to quit my job. I had the knowledge and skill.
    I had absolute confidence in my ability at this point.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 几个月后，我决定辞职。我有了知识和技能。在这个时候，我对我的能力有绝对的信心。
- en: Quitting my job wasn’t as exciting as I thought it would be… but the act of
    working toward that goal was deeply enjoyable.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: A few months later I discovered the power of Twitter, started posting content,
    and planned out a freelancing digital product while trying to land web design/funnel
    clients there. This is when my niche shifted towards creators, coaches, and freelancers.
    I knew them well, liked working with them, and could get them some killer results.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: Over the last 4 years, I built out products, pivoted my brand, tested different
    offers, and here we are now.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: This is where the exponential growth started to kick in.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what happened:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: '**1) I hit 6 figures freelancing.**'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: 4 years ago was the first time I hit 6 figures from my efforts.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: Technically, it took 4-5 years of trial and error since my freshman year of
    college to reach that point. But I wasn’t all too serious. I took too much time
    off and like cardio, your progress dissipates fast. You have to do it every day
    for life.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: '**2) I built out a freelancing course, grew my audience, and started making
    an extra $3,000 per month with my course (on top of client work).**'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: “Solve your own problems and sell the solution” is my mantra.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: I had so much freelancing knowledge by this point that it made sense to create
    a product around that. I could just have easily created a fitness product since
    I’ve spent 10 years in the gym and obsessing over my nutrition.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: I only had 500 followers at this point.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: I made $3,000 a month because I was smart with networking. I got shared and
    reposted by developer accounts (people who had skills to freelance with) and self-improvement
    accounts (people who wanted to get out of their job).
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: Even with 500 followers, I was leveraging accounts’ audiences that added up
    to over 100,000\. That’s how I got traffic to my digital products *and* gained
    followers that would compound with time.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: '**3) I created a second digital product that taught how I create websites.**'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: The freelancing product was a hit for my size and authority (not much).
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: “Create your own customers” is my second mantra.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: I had to create a bridge between my current product and the beginners I was
    attracting by talking about my other interests, like mindset and spirituality.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: I had to *teach* them a skill that they could freelance with.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: '**4) I hit 10,000 followers on Twitter and created a beginner social media
    digital product.**'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: Now that I had results with social media, I created a social media product.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: It was a logical puzzle piece to my other products.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: You can freelance on social media and avoid the pains of cold email and manual
    outreach by building an audience.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: I eventually bundled them all together into a product called Modern Money (lol).
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: '**5) I launched a physical planner.**'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-596">![](../Images/ecf341f576e3ad7afe02d128743c86cd.png)</picture>
    <picture loading="lazy" decoding="async" class="wp-image-597">![](../Images/edac2ffe2e5b6986354dba0ced2f4ba4.png)</picture>
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: I loved talking about productivity in my writing.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢在我的写作中谈论生产力。
- en: And I’ve always had an itch to create something physical.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直想创造一些实物产品。
- en: So, I used my previous eCommerce failures to source and sell a physical planner.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我利用我之前的电子商务失败来寻找和销售实体计划表。
- en: It did well, but I hated shipping out of my own home. It was too time consuming.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 它做得很好，但我讨厌从我家发货。这太耗时了。
- en: So I turned it into a digital version and gave it away for free.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我将它变成了一个数字版本，并免费提供。
- en: '**6) I hit 6 figures in digital product sales in just over a year.**'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: '**6) 在一年多后，我的数字产品销售额达到了六位数。**'
- en: With multiple product launches and “bullet spraying” the market to see what
    worked, I was able to double down fast.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 通过多次产品发布和“子弹射击”市场以查看哪些有效，我能够快速加倍投入。
- en: My 3 digital products made $100,000 in a little over a year.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 我的3个数字产品在一年多后创造了10万美元的收入。
- en: '**7) I pivoted my freelance offer into a marketing consulting offer.**'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: '**7) 我将我的自由职业报价转向了营销咨询报价。**'
- en: At this point, I was kind of tired of web design and funnels.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 到这个时候，我对网页设计和漏斗有点厌倦了。
- en: I had creators and coaches nearly begging me to consult them rather than do
    it for them. Creators often like to learn and do things themselves, so I leaned
    into that.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 我有创作者和教练几乎恳求我给他们提供咨询服务，而不是为他们做这件事。创作者通常喜欢学习和自己做事，所以我顺应了这一点。
- en: I created a consulting program that taught marketing, sales, copywriting, offer
    creation and my simple service funnel to land more clients.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 我创建了一个咨询服务项目，教授营销、销售、文案写作、提案制作以及我的简单服务漏斗，以吸引更多客户。
- en: This freed up more time since I didn’t have to do the work for them. I showed
    up for calls and communicated through a chat app like Telegram.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我不必为他们做这项工作，这为我节省了更多时间。我参加电话会议，并通过Telegram等聊天应用进行沟通。
- en: '**8) I built Modern Mastery HQ.**'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: '**8) 我创建了Modern Mastery HQ。**'
- en: Modern Mastery was the next stepping stone in my life’s work.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: Modern Mastery是我人生工作的下一个里程碑。
- en: I spent two years of my life overloading it with all of the information I learned.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 我用我生命中两年的时光，将我所学到的所有信息都加载进去。
- en: I put all of my old products inside there to get people up to speed.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 我把所有旧产品都放进去，让人们跟上进度。
- en: This taught me that growing a membership-based community is a long and slow
    grind.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 这让我明白，发展基于会员的社区是一个漫长而缓慢的过程。
- en: Everyone always asks me how to start a community because they think it’s more
    profitable than a plain old digital product. It’s hard… and it’s not.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人总是问我如何开始一个社区，因为他们认为这比普通数字产品更有利可图。这很难……但也不是。
- en: '**9) I hit my first $50,000 month.**'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: '**9) 我实现了第一个月收入50,000美元。**'
- en: With Modern Mastery and my marketing/brand advising, I made my first $50,000
    in one month.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 通过Modern Mastery和我的市场营销/品牌咨询，我在一个月内赚到了第一个50,000美元。
- en: This consisted of around 5 clients at $8,000 a piece and the rest was filled
    with Modern Mastery subscriptions.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 这包括大约5个客户，每人8000美元，其余的都是Modern Mastery订阅。
- en: '**10) I built Digital Economics and 2 Hour Writer to create a foundation for
    my vision.**'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: '**10) 我创建了Digital Economics和2 Hour Writer，为我的愿景奠定基础。**'
- en: Over the years I had some pretty insane results for myself and my clients.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 这些年，我为自己和我的客户取得了一些相当惊人的成果。
- en: The cool thing about this business is that my best clients became good friends.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 这个业务的酷之处在于，我的最佳客户变成了好朋友。
- en: With that, I was still annoyed by client work. I didn’t like how much time it
    took out of my day. I had the results to productize, so I did.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我仍然对客户工作感到烦恼。我不喜欢它占用了我多少时间。我有将工作产品化的结果，所以我做到了。
- en: I built my Digital Economics masterclass with literally everything I’ve ever
    learned. Then, I splintered 2 Hour Writer off from that and sold it as a lower
    ticket product to create a value ladder.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 我用我所学的一切知识构建了我的Digital Economics大师班。然后，我从那里分离出2 Hour Writer，并将其作为低价产品出售，以创建一个价值阶梯。
- en: Everything I’ve built until this point *allowed* for my current products to
    form.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 我到目前为止所建立的一切都“允许”我的当前产品形成。
- en: Meaning, you can’t create the perfect product, or even know what product to
    create, if you don’t just create one at your current level.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 意思是，如果你不只是在当前水平上创建一个产品，你就无法创造出完美的产品，甚至不知道要创建什么产品。
- en: All of my knowledge is going into my book.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 我所有的知识都进入了我的书中。
- en: The Power Planner failure will turn into a success with its relaunch with the
    book (you can preorder [The FOCI Planner with the Keepsake Box](https://theartoffocusbox.com)).
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: Power Planner的失败将在与书籍（你可以预购[The FOCI Planner with the Keepsake Box](https://theartoffocusbox.com)）重新发布时转变为成功。
- en: The software I’m building would not be possible without 4 years of writing and
    teaching writing as a skill.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在构建的软件没有4年的写作和教授写作技能是不可能的。
- en: I had to evolve. Most people create a product and sell that for life. That’s
    a great way to get stuck.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 我不得不进化。大多数人创造一个产品并终身销售。那是一个容易陷入困境的好方法。
- en: '**11) I made $800,000 in 2022 writing 2 hours a day.**'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '**11) 我在2022年每天写作2小时赚了80万美元。**'
- en: At the end of 2022, my brand started to reach exponential growth on all platforms.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 到2022年底，我的品牌开始在所有平台上实现指数级增长。
- en: Everything started to align.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 一切开始对齐。
- en: My products were solid just by the nature of evolution.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 我的产品的质量仅通过进化本身就很好。
- en: My audience (traffic) increased fast, so my income grew with it.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 我的（流量）读者群增长迅速，因此我的收入也随之增长。
- en: Thank goodness I was out of client work now because I wouldn’t have been able
    to utilize that traffic.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 幸好我现在没有客户工作，否则我就无法利用那个流量。
- en: 'Lesson: if you have a decent product that sells, focus the majority of your
    efforts on audience building and leverage. Diversify platforms, make sure you
    are growing, maybe even write a book for added depth and authority.'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 经验教训：如果你有一个好卖的产品，就把大部分精力集中在受众建设和利用上。多元化平台，确保你在增长，也许甚至写一本书以增加深度和权威性。
- en: I made a [video on my writing process that allowed me to do this in 2 hours
    a day](https://youtu.be/-oy55UWlbdw).
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 我制作了一个[关于我的写作过程的视频，让我每天只需2小时就能完成这个任务](https://youtu.be/-oy55UWlbdw)。
- en: '**12) I’ve made $3,300,000 in a year.**'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: '**12) 我一年赚了330万美元。**'
- en: Once I realized that all I needed was a growing readership and a product that
    helped others (so it sold, brought value to their lives, and spread by word of
    mouth), I knew what my levers were.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我意识到我所需要的只是一个不断增长的读者群和一个帮助他人的产品（因此它销售，为他们的生活带来价值，并通过口碑传播），我就知道我的杠杆是什么。
- en: I spent 2 hours every morning writing.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 我每天早上花2小时写作。
- en: When done right, this leads to both new products, readership growth, and maintenance
    of your business.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 当事情做得正确时，这会带来新产品、读者增长以及你业务的维护。
- en: By staying consistent – and being sure that I was in fact growing my readership
    – exponential growth hit and my income stayed consistent with my growth.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 通过保持一致性——并确保我确实在增长我的读者群——指数级增长到来，我的收入也随着增长保持一致。
- en: '**13) I’m investing every cent I can into the success of my new company, Kortex.**'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: '**13) 我把能投资的每一分钱都投入到了我新公司Kortex的成功中。**'
- en: Kortex is many things.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: Kortex是许多东西。
- en: At its heart, it is a revolutionary software for writers, marketers, and creatives.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，这是一款为作家、营销人员和创意人士的革命性软件。
- en: Think of it as a note-taking app combined with a writing app to ensure that
    your writing is unique, impactful, and persuasive.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 想象它是一个笔记应用和写作应用的结合，以确保你的写作是独特、有影响力和有说服力的。
- en: (Say bye-bye to Notion and Obsidian being the “second brain” apps of the creator
    economy when they don’t serve the purpose of good writing that builds a readership.)
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: （当Notion和Obsidian不服务于构建读者群的良好写作目的时，它们就不再是创作者经济的“第二大脑”应用了。）
- en: Further than that, it will also replace newsletter software, personal websites,
    and content scheduling apps for the majority of creators in future versions.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 更进一步，它还将在未来的版本中取代大多数创作者的通讯软件、个人网站和内容调度应用。
- en: That is the software base. It is not ready for the public.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 那是软件的基础。它还没有准备好面向公众。
- en: We are building an education backbone.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在构建一个教育框架。
- en: All Kortex subscribers get access to a library of strategies that is better
    than most courses you will find in the creator economy.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 所有Kortex订阅者都可以访问一个策略库，这个库比你在创作者经济中找到的大多数课程都要好。
- en: It is the only place you can hire me (and Justin Scott + Joey Justice) for consulting,
    a group mastermind, or ghostwriting to build your name with writing as a creator.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 这是唯一一个你可以雇佣我（以及Justin Scott和Joey Justice）进行咨询、团体头脑风暴或代笔写作以通过写作建立你名字的地方。
- en: If you’re interested in working with us, [apply here.](http://intake.kortex.co)
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对我们合作感兴趣，[请在此申请。](http://intake.kortex.co)
- en: 'The Overarching Lesson Of All Of My Teachings: Evolution Of Identity'
  id: totrans-196
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我所有教诲的总体教训：身份的进化
- en: Evolution demands struggle, tension, conflict, and challenge.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 进化需要斗争、紧张、冲突和挑战。
- en: As above, so below.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 如上所述，亦然。
- en: When a star explodes, atomic nuclei fill the galaxy allow other forms to grow.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 当一颗恒星爆炸时，原子核会填满银河系，允许其他形式生长。
- en: When war breaks out among nations, technological advancements are made that
    have saved more lives than were lost.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 当国家之间爆发战争时，会做出技术进步，这些进步比失去的生命还要多。
- en: When you feel lost, you are nearing the end of a chapter in your life. You either
    find purpose or get consumed by the emotional turmoil you are trapped in.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 当你感到迷茫时，你正接近你人生中的一个章节的结束。你要么找到目标，要么被你陷入的情感风暴所吞噬。
- en: You can’t allow yourself to get complacent.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 你不能让自己变得自满。
- en: There is always a next mountain to climb, project to build, product to launch,
    writing to post.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 总有一座山要攀登，一个项目要建设，一个产品要推出，一篇文章要发表。
- en: When you pursue and overcome challenges by solving problems, you are required
    to acquire the skillset and mindset to do so.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 当你通过解决问题来追求和克服挑战时，你需要获得完成这些所需的技能集和心态。
- en: When you pursue and achieve goals, your complexity of self increases.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 当你追求并实现目标时，你的自我复杂性会增加。
- en: Life becomes meaningful because you have the experience to notice the things
    that the average individual can’t.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 生活变得有意义，因为你有了经验去注意到普通人无法察觉的事物。
- en: If you don’t know what to do, start a business.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道该做什么，就开创一家企业。
- en: It is one of the best vessels for personal and collective evolution.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 这是个人和集体进化最好的载体之一。
- en: That’s my story.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是我的故事。
- en: I hope you enjoyed it.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望你们喜欢它。
- en: Dan Koe
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 丹·科
