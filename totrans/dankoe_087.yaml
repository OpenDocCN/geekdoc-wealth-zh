- en: The Greatest Skill Of The 21st Century (The Top 1% Exploit This)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-most-important-skill-of-the-21st-century-only-1-use-it/](https://thedankoe.com/letters/the-most-important-skill-of-the-21st-century-only-1-use-it/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I’m going to be honest.
  prefs: []
  type: TYPE_NORMAL
- en: Myself and [Justin Scott](https://twitter.com/iamjustincscott) are having a
    newsletter writing competition.
  prefs: []
  type: TYPE_NORMAL
- en: We set out to write 7 newsletters in 7 days to have a backlog.
  prefs: []
  type: TYPE_NORMAL
- en: I even took it a step further and have been recording 7 YouTube videos day by
    day.
  prefs: []
  type: TYPE_NORMAL
- en: Today’s writing fell on a busy day, I was preparing Sprint curriculum calls.
  prefs: []
  type: TYPE_NORMAL
- en: So… I copy pasted this directly from [Digital Economics](https://digitaleconomics.school)
    (it’s less than 1% of what’s in there).
  prefs: []
  type: TYPE_NORMAL
- en: 'In my eyes, it is one of the most important skills you can master: **persuasive
    communication.**'
  prefs: []
  type: TYPE_NORMAL
- en: That way, people actually share your writing (meaning you actually grow on social
    media).
  prefs: []
  type: TYPE_NORMAL
- en: As a bonus, I’ve included a download link to a PDF (no email required) with
    what we discuss in this letter.
  prefs: []
  type: TYPE_NORMAL
- en: '[Open this PDF in another tab so you don’t lose it.](https://www.dropbox.com/scl/fi/nhvzkqzbzlp6ro6ocb8a4/ContentPresentation.pdf?rlkey=8kpb8t3wgc21wu9acqg33c80v&dl=0)'
  prefs: []
  type: TYPE_NORMAL
- en: I would highly encourage you have it open while writing content.
  prefs: []
  type: TYPE_NORMAL
- en: It includes the 10 Koemmandments of Engagement and 32 post structures you can
    emulate – my personal swipe file.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s dive in:'
  prefs: []
  type: TYPE_NORMAL
- en: '**People don’t remember what you say, they remember how you make them feel.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'This is worth repeating:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Humans are emotional beings, not logical.*'
  prefs: []
  type: TYPE_NORMAL
- en: 99% of the population have not developed themselves to the point of being free
    from — or in control of — their ego.
  prefs: []
  type: TYPE_NORMAL
- en: That is the foundation of capturing and holding attention.
  prefs: []
  type: TYPE_NORMAL
- en: Poking your reader’s ego.
  prefs: []
  type: TYPE_NORMAL
- en: Feeding it = making them feel “good.”
  prefs: []
  type: TYPE_NORMAL
- en: Starving it = making them feel “bad.”
  prefs: []
  type: TYPE_NORMAL
- en: If you can take people on an emotional journey of love, hate, excitement, deceit,
    calmness, and any other emotion that eventually ends in a benefit for their life
    — you have mastered the art of content creation.
  prefs: []
  type: TYPE_NORMAL
- en: Life is story.
  prefs: []
  type: TYPE_NORMAL
- en: Song is story (Uni-verse, one song).
  prefs: []
  type: TYPE_NORMAL
- en: Architecture, music, plant life, and everything else follow the Universal principles
    of highs/lows creation/destruction growth/death etc.
  prefs: []
  type: TYPE_NORMAL
- en: Humans make sense of the world in stories.
  prefs: []
  type: TYPE_NORMAL
- en: Your job is to use the power of word to make people *feel* something.
  prefs: []
  type: TYPE_NORMAL
- en: Stories mimic the natural highs and lows of emotion.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before we start:'
  prefs: []
  type: TYPE_NORMAL
- en: The Art Of Focus (my book) is [available for pre-order.](https://theartoffocusbox.com)
  prefs: []
  type: TYPE_NORMAL
- en: (This isn’t a normal book launch, it is expensive, and for good reason.)
  prefs: []
  type: TYPE_NORMAL
- en: The paperback will release after the 2000 available copies of the Keepsake Edition
    sell out.
  prefs: []
  type: TYPE_NORMAL
- en: Dan’s 10 Koemmandments Of Capturing Attention
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As you are scrolling through social media or just reading content in general
    — try to keep an eye out for these tactics being used. That is the best way to
    solidify this information in your head. Notice when your attention is being captured
    and question “why.”
  prefs: []
  type: TYPE_NORMAL
- en: 'There are many ways to capture attention. I’ve found these to be the most replicable
    and practical (number 8 is the most important):'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Specific Numbers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Using numbers in your hooks, headlines, or tweets will make people stop to see
    what the numbers relate to.
  prefs: []
  type: TYPE_NORMAL
- en: 'These can be in the form of:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Statistics** — “There are 7 billion people on this earth”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Dollar amounts** — “Apples new $1175 iPhone has this new feature”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Metrics** — “I sent 322 cold emails” or “After 293 days…”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lists** — “7 bad habits that are preventing you…”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The more specific the number is, the more it catches people’s attention.
  prefs: []
  type: TYPE_NORMAL
- en: If you can’t make it super specific, that’s fine. Don’t stress it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s an example from me that was the deciding factor in many people joining
    Digital Economics (my course):'
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1469">![](../Images/a2e0b698f0489da91e7fa6b9a72c2d27.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: 2) Pattern Interrupts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A pattern interrupt is something that breaks people out of their normal conditioned
    patterns.
  prefs: []
  type: TYPE_NORMAL
- en: If someone is scrolling on X and is used to a lot of political commentary, a
    well-formatted list tweet will make them stop their scroll.
  prefs: []
  type: TYPE_NORMAL
- en: Most of the things in this list are pattern interrupts.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Negativity Bias
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The human brain is wired to remember and pay attention to negativity.
  prefs: []
  type: TYPE_NORMAL
- en: This does not mean you have to be negative all the time.
  prefs: []
  type: TYPE_NORMAL
- en: It means you need to use the negative forms of words.
  prefs: []
  type: TYPE_NORMAL
- en: If you are saying something positive, but the point is better illustrated in
    its negative form, use that.
  prefs: []
  type: TYPE_NORMAL
- en: “You are going to achieve great things.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Compared to:'
  prefs: []
  type: TYPE_NORMAL
- en: “You will never hit rock bottom again.”
  prefs: []
  type: TYPE_NORMAL
- en: The second is most potent. We remember negativity. It is the most relatable
    aspect of many people’s lives.
  prefs: []
  type: TYPE_NORMAL
- en: It can still be a positive message while leveraging the reader’s negativity
    bias.
  prefs: []
  type: TYPE_NORMAL
- en: 4) Group Callout
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is simple, call out the specific person you are talking to.
  prefs: []
  type: TYPE_NORMAL
- en: If you are in your 20’s…
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Calling all creators, coaches, and freelancers!
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fathers are a gift to humankind…
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Even if your audience doesn’t fall into the specific group you are calling out,
    it will allow them to “pick a side” and compare themselves to what you are saying.
  prefs: []
  type: TYPE_NORMAL
- en: 'I talked about bodybuilders the other day. Even if people don’t consider themselves
    one, it helps paint a picture that they can relate to:'
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1470">![](../Images/84df818ba6e0463d5a4dccecb518a79f.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: If someone talks about being a father, I can still relate because I will be
    a father one day. I will still pay attention to and take the advice.
  prefs: []
  type: TYPE_NORMAL
- en: This also works when it comes time to promote. You can call out exactly who
    the promotion is for and paint a picture of the problems they are struggling with.
  prefs: []
  type: TYPE_NORMAL
- en: 5) Problem Callout
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Calling out the pains or problems people are experiencing will also make them
    relate to the post.
  prefs: []
  type: TYPE_NORMAL
- en: MOST people have encountered the same problem or pain as everyone else throughout
    their life.
  prefs: []
  type: TYPE_NORMAL
- en: If you can describe the feeling accurately, you have attention at your fingertips.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have to be dead on with this. Simply describing pain points will have
    people trying to relate their experiences to it. If they can relate, they will
    engage.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s an example of calling out a pain as simple as “feeling terrible:”
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1471">![](../Images/cd5eea07d5e608395067dc41545fe1df.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: 6) Potential Benefit
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The opposite of calling out a problem. Again, pains and benefits. Your mind
    needs to think in pains and benefits. That is your unique “why” behind whatever
    “what” or “how” you are writing about.
  prefs: []
  type: TYPE_NORMAL
- en: 7) Social Proof
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Again this is authoritative and implies an information gap.
  prefs: []
  type: TYPE_NORMAL
- en: When you flex your results or credentials, people automatically assume that
    you know more than them. They will take your content more seriously and read to
    find the information they are “missing.”
  prefs: []
  type: TYPE_NORMAL
- en: This works 100x better when it isn’t viewed as a “flex.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Justin Welsh is the current king of this:'
  prefs: []
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-1472">![](../Images/bfe0a591b401b5b91cc29cc54ddadad8.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Use social proof to illustrate a point you are trying to make.
  prefs: []
  type: TYPE_NORMAL
- en: 8) Confidence & Conviction
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '***This is by far the most important point here.***'
  prefs: []
  type: TYPE_NORMAL
- en: You can create highly impactful posts with confidence alone — it allows other
    aspects of attention-grabbing to fall into place.
  prefs: []
  type: TYPE_NORMAL
- en: You are right about everything at this very point in time in relation to your
    goals, vision, beliefs, values, and everything else that forms your perspective
    of reality.
  prefs: []
  type: TYPE_NORMAL
- en: Your job is to have confidence and conviction in your beliefs and a credible
    or clear argument to back them up (if you have to).
  prefs: []
  type: TYPE_NORMAL
- en: Everyone is on social media to be told what to do in a confident way. Nobody
    is secure in their actions, choices, and beliefs. They are looking for someone
    to confirm them with confidence and give them that clarity to act.
  prefs: []
  type: TYPE_NORMAL
- en: 'Tools you can use to sound more confident:'
  prefs: []
  type: TYPE_NORMAL
- en: Eliminate words that imply uncertainty
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Speak in absolutes when possible
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Exaggerate your point to add energy
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Of course, do not abuse these for the sake of engagement.
  prefs: []
  type: TYPE_NORMAL
- en: 'Rather than saying:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“It may be wise if some people developed their skillset.”*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Say:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“It is crucial that everyone on planet earth develops their skill set.”*'
  prefs: []
  type: TYPE_NORMAL
- en: Just by being confident, the words flow easier and the writing is more impactful.
  prefs: []
  type: TYPE_NORMAL
- en: I can go on to back that argument up with statistics or more creative firepower
    that I have in my mind.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is an example of me being confident in what I was saying:'
  prefs: []
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-1473">![](../Images/51818d471fcdd77d903d7ee74ddded5c.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: This tweet got featured in a big newsletter and sparked a lot of controversy.
  prefs: []
  type: TYPE_NORMAL
- en: People were arguing whether or not it was the “greatest” skill. Some were proposing
    what their greatest skill was.
  prefs: []
  type: TYPE_NORMAL
- en: This made people comment and quote tweet, leading to more engagement and impressions.
  prefs: []
  type: TYPE_NORMAL
- en: I wrote this tweet in the moment when I had executed on an idea quickly. Doing
    that gave me a lot of joy, so I wanted to share that joy with others. It worked.
  prefs: []
  type: TYPE_NORMAL
- en: Is it 100% correct? No.
  prefs: []
  type: TYPE_NORMAL
- en: Was it 100% correct when I wrote it, through my perspective, relating to my
    personal experience?
  prefs: []
  type: TYPE_NORMAL
- en: Yes. At the time I was 100% convinced that that was the greatest skill.
  prefs: []
  type: TYPE_NORMAL
- en: I went on to add nuance in the replies. If I had added nuance in the actual
    tweet, it wouldn’t have done as well and opened up the opportunity to be featured
    in a big newsletter.
  prefs: []
  type: TYPE_NORMAL
- en: The people YOU want to attract aren’t the people that “hate” on your work.
  prefs: []
  type: TYPE_NORMAL
- en: Here is one other — a bit more extreme — example. Can you sense the motivational
    and practical energy “flowing through the screen?”
  prefs: []
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-1474">![](../Images/eacc886e87e8e9a1924ca4d2d060afb7.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: By the way, these types of high-energy advice posts pull in quite a bit of followers.
  prefs: []
  type: TYPE_NORMAL
- en: In summary — have some conviction behind what you are saying. This is not a
    skill that needs to be trained. It’s just a matter of writing the words in the
    most impactful way. Leaders don’t dance around the point they are trying to get
    across.
  prefs: []
  type: TYPE_NORMAL
- en: 9) Active Voice
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Active voice implies that there is a story. It eases people into what you are
    saying.
  prefs: []
  type: TYPE_NORMAL
- en: Passive voice is often boring and gives away the “mini-story” too early. There
    is no anticipation that makes people want to figure out what happened next.
  prefs: []
  type: TYPE_NORMAL
- en: When you are practicing writing posts, look up an article on active voice and
    use it to edit until you get the hang of it.
  prefs: []
  type: TYPE_NORMAL
- en: This also helps with being perceived as confident.
  prefs: []
  type: TYPE_NORMAL
- en: 10) Warnings & Cautionary Advice
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: What should people look out for when they are trying to achieve something?
  prefs: []
  type: TYPE_NORMAL
- en: Can you warn them of something they will encounter as they are trying to reach
    where you are now?
  prefs: []
  type: TYPE_NORMAL
- en: When you are doing your weekly reflection, or just reflecting on your life,
    what roadblocks can you help people navigate?
  prefs: []
  type: TYPE_NORMAL
- en: This is best illustrated with this tweet. I hit on a hot topic like dopamine
    and warned them of another hot topic (then wrapped it up with confidence).
  prefs: []
  type: TYPE_NORMAL
- en: 'This sparked a LOT of controversy, but I have research to back up that point
    AND gave nuance in the replies to build a deeper connection with my audience:'
  prefs: []
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-1475">![](../Images/425dd8c17d7c4ce6cc57503d7752b5a4.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: What Holds Attention?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Once the curiosity loop is opened, the mind feels committed to figuring out
    the rest of the story.
  prefs: []
  type: TYPE_NORMAL
- en: That is what holds attention — crafting a compelling story.
  prefs: []
  type: TYPE_NORMAL
- en: Stories are layers of metaphors, concepts, perspectives, and experiences that
    take people on a journey.
  prefs: []
  type: TYPE_NORMAL
- en: People want to understand the entire story. They want to know what came before,
    during, and after any given event (from capturing attention).
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are 2 things to keep in mind when it comes to holding attention:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Structure
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We aren’t in high school anymore. Long, professional paragraphs don’t matter
    and reduce readability. Especially on X — people log on to that platform to escape
    the professional world.
  prefs: []
  type: TYPE_NORMAL
- en: How do you improve the structure of all of your content?
  prefs: []
  type: TYPE_NORMAL
- en: '**Bullet lists** — use numbers, bullets, and other tactics that help you break
    apart what you are saying. These lists create a “story” in themselves.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Line breaks** — use line breaks whenever possible, but don’t just add line
    breaks for the sake of it. Be creative. Use line breaks to emphasize specific
    sentences and help your writing flow.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Starting short and concise** — Use shorter sentences or paragraphs at the
    start of your content. Capture attention with short and punchy statements, then
    let loose and get creative with how your sentences flow.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Break apart sentences** — use parenthesis and “—” dashes over commas. This
    sentence is too long (until I make people want to know what are in these parenthesis).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here is an example of all of the above in one hook:'
  prefs: []
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-1476">![](../Images/7d113d928c849dcb49212f739b2ca9a9.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: 2) Novel Perspectives
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This requires you to get the bulk of your ideas from books, podcasts, or other
    longer-form content that gives more nuance to certain ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Novelty increases dopamine levels in the brain. It brings more clarity to an
    idea that has been talked about over and over.
  prefs: []
  type: TYPE_NORMAL
- en: If you are getting all of your content from Twitter while trying to grow on
    Twitter — you will probably end up with the same perspective as everyone else.
  prefs: []
  type: TYPE_NORMAL
- en: Metaphors, personal experiences, and creating new concepts is how you achieve
    this.
  prefs: []
  type: TYPE_NORMAL
- en: This will be our prime focus in future modules, so hold tight on this for now
    (but keep it in mind so you can start making connections as you consume).
  prefs: []
  type: TYPE_NORMAL
- en: I was reading an article, learned about how a glass of water can create an acre
    of fog, and applied it to one of my sub-topics — mindfulness.
  prefs: []
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-1477">![](../Images/bad79dd99be244146afab487f4caf2e6.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Content *consumption* (or research) is important. Specifically books, audiobooks,
    podcasts, or articles. Those will give you different perspectives on the things
    you love talking about.
  prefs: []
  type: TYPE_NORMAL
- en: What Creates Engagement?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Remember: ***People don’t remember what you say, they remember how you make
    them feel.***'
  prefs: []
  type: TYPE_NORMAL
- en: Alan Watts may have been an alcoholic in his later years and cheated on his
    wives — which I have my own opinions about — but his work has changed my life
    for good. It gives me inspiration, clarity, and a new outlook on life.
  prefs: []
  type: TYPE_NORMAL
- en: I may remember some quotes of his, but the reason I remember them is because
    of the clarity they gave me. The feeling of having zero worries in the world.
    When I want to experience that again, I throw on an Alan Watts lecture.
  prefs: []
  type: TYPE_NORMAL
- en: YOU are but a humble messenger of a life-changing message.
  prefs: []
  type: TYPE_NORMAL
- en: '**1) The feelings that come from education.**'
  prefs: []
  type: TYPE_NORMAL
- en: Learning something new or gaining clarity on some aspect of their life raises
    dopamine levels in the brain.
  prefs: []
  type: TYPE_NORMAL
- en: You create clarity through novel perspectives, metaphors, stories, personal
    experiences, and other parts of your life that will help others understand what
    you are saying.
  prefs: []
  type: TYPE_NORMAL
- en: Your job is to “make sense” to a specific group of people.
  prefs: []
  type: TYPE_NORMAL
- en: You do this by sharing how certain topics make sense to you.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) The feelings that come from inspiration.**'
  prefs: []
  type: TYPE_NORMAL
- en: Inspiration is different from motivation.
  prefs: []
  type: TYPE_NORMAL
- en: You are helping people connect the dots on their own, giving them the clarity
    to make their own decisions and change their behavior.
  prefs: []
  type: TYPE_NORMAL
- en: People feel good when they think they came up with the answer themselves — but
    will still attribute that feeling to you.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) The feeling that comes from entertainment.**'
  prefs: []
  type: TYPE_NORMAL
- en: Can you throw in a joke, meme, or interesting point of view?
  prefs: []
  type: TYPE_NORMAL
- en: When you watch a movie, you are entertained through humor, drama, emotional
    parts of the story, and battles that spark excitement in you.
  prefs: []
  type: TYPE_NORMAL
- en: Entertainment, education, and inspiration are the main goals of your content.
  prefs: []
  type: TYPE_NORMAL
- en: I hope you enjoyed this one.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to become a digital writer who controls the outcome of their life
    through the internet, check out read more in the [Digital Writer series](https://thedankoe.com/blog/category/digital-writing/).
  prefs: []
  type: TYPE_NORMAL
