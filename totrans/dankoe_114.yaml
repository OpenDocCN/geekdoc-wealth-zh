- en: The Rise Of The Generalist (How To Thrive With Multiple Interests)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通用时代崛起（如何通过多种兴趣茁壮成长）
- en: 原文：[https://thedankoe.com/letters/the-age-of-the-generalist-how-to-thrive-with-multiple-interests/](https://thedankoe.com/letters/the-age-of-the-generalist-how-to-thrive-with-multiple-interests/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/the-age-of-the-generalist-how-to-thrive-with-multiple-interests/](https://thedankoe.com/letters/the-age-of-the-generalist-how-to-thrive-with-multiple-interests/)
- en: We’re in the middle of a second renaissance.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正处于第二次文艺复兴时期。
- en: But only a select few people can see what’s going on.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 但只有少数人能看到正在发生的事情。
- en: Even fewer people are actually taking advantage of it.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 但实际上真正利用它的人却很少。
- en: Can you see it?
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 你能看到吗？
- en: The creator economy is growing at an exponential rate.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创作者经济正在以指数速度增长。
- en: People don’t trust traditional jobs or schooling to secure their future.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人们不相信传统的工作或学校能保障他们的未来。
- en: People are turning to creators to educate them on the skills necessary to thrive
    in a fast-changing digital environment.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人们转向创作者，让他们了解在快速变化的数字环境中茁壮成长所需的技能。
- en: AI, automation, and software have made business more accessible to people who
    want to do what they enjoy for a living.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能、自动化和软件使那些想要把喜欢的事情作为职业的人更容易进入商业领域。
- en: People are working less, earning more, and leveraging technology to remove themselves
    from the old society.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人们工作较少，收入更多，利用技术将自己从旧社会中解脱出来。
- en: People are craving human connection online from people with personalities, not
    glorified search engines who talk about one specialized interest.
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人们渴望在网上与有个性的人建立联系，而不是那些只谈论一个专业兴趣的吹嘘的搜索引擎。
- en: These are all connected to the fact that technology has changed the way we work,
    the opportunities we have for work, and what justifies valuable work.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这些都与技术改变了我们的工作方式、工作机会以及什么可以证明有价值的工作的事实有关。
- en: If you want to do what you enjoy for a living, you’re living in the right time
    period.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要把喜欢的事情作为职业，你正生活在正确的时代。
- en: The internet has decentralized wealth generation to individuals who value self-education,
    personal responsibility, and amounting to something in your life by doing good
    work.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网将财富创造去中心化到了那些重视自我教育、个人责任，并通过做好工作在生活中有所成就的人。
- en: A few problems have led to this.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 几个问题导致了这种情况。
- en: '**1) Specialists compete with other specialists.**'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 专家与其他专家竞争。**'
- en: A specialist is someone who attempts to achieve a goal with a single interest
    or skill.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 专家是那些试图用单一的兴趣或技能实现目标的人。
- en: Like a bodybuilder with fitness.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 就像健身者对健身一样。
- en: Or only playing one role/class/character in a video game.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 或者只在一个电子游戏中扮演一个角色/职业/角色。
- en: Or performing a mechanical string of tasks at a job.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 或者在工作中重复执行一系列机械任务。
- en: Being a specialist made sense in the Industrial Age but not in the Information
    Age.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在工业时代，成为专家是有意义的，但在信息时代则不然。
- en: When a bodybuilder gets injured, they either get bored and stop making progress
    or start from scratch.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 当一名健身者受伤时，他们要么感到无聊并停止进步，要么从头开始。
- en: When you get countered in a video game, or someone is already playing your role,
    you are at a massive disadvantage.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在电子游戏中被反击，或者有人已经扮演了你的角色，你将处于巨大的劣势。
- en: When your work consists of the same thing over and over again, not only are
    you a prime candidate for replacement, but life loses its zest because there is
    no challenge or novel goal that brings meaning to life… your time shrivels up
    because all you can focus on is working all day, being tired all night, paying
    the bills, hoping your family doesn’t leave you, and the rest.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的工作重复做同样的事情，你不仅是最容易被取代的候选人，而且生活失去了活力，因为没有挑战或新的目标能赋予生活意义……你的时间因为只能专注于整天工作、整夜疲惫、支付账单、希望家人不要离开你而变得枯萎。
- en: On the other hand, generalists are diverse and interesting.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，通才多样化且有趣。
- en: Most people think that in order to become successful, they have to be really
    good at one thing.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人认为，为了成功，他们必须在一件事上非常出色。
- en: Social media has distorted how we perceive value.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体扭曲了我们看待价值的方式。
- en: You don’t need chiseled six-pack abs and a spray tan to impress others and generate
    attention.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要雕刻般的六块腹肌和喷漆晒黑的皮肤来打动别人并吸引注意力。
- en: Most people find it impressive to have a tiny bit of muscle mass, be able to
    do a few pull-ups and have a life outside of fitness.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人觉得有点肌肉量、能做几个引体向上，并且有健身之外的生活很令人印象深刻。
- en: Pair that with a writing hobby and some psychology knowledge and you open up
    a world of opportunities from random people on the internet (that you wouldn’t
    have been able to get in front of in the past).
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 将写作爱好和一些心理学知识结合起来，你就能从互联网上随机的人群中打开一个充满机会的世界（在过去，你无法接触到这些人）。
- en: In the second renaissance, you don’t need to be exceptional at one thing, you
    need to be average at many.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在第二次文艺复兴时期，你不需要在某一件事上出类拔萃，你需要在许多事情上保持平均水平。
- en: '**2) The internet favors the generalist.**'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 互联网青睐通才。**'
- en: When I first started in business I was bombarded with the advice to “niche down.”
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 当我刚开始做生意时，我被“细分市场”的建议轰炸了。
- en: The riches are in the niches, so they say.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 他们说，财富在于细分市场。
- en: And don’t just niche down a bit, niche *so far down* that you only have a small
    pool of people you can help with the skill you’ve learned.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 不要只是稍微细分一下，要细分得*足够深*，以至于你只能帮助那些你学到的技能的一小部分人。
- en: It makes sense, but in my eyes, it’s outdated advice.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这是有道理的，但在我看来，这是过时的建议。
- en: Social media is at the forefront of attention.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体是关注的焦点。
- en: Things like paid ads and cold emails – you know, the things absolutely nobody
    likes doing – require you to get specific on your messaging so you can find, target,
    and get your work in front of specific people. If you don’t understand this, take
    my free [one-person business foundations course](https://theone-personbusiness.com).
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 像付费广告和冷电子邮件这样的东西——你知道，绝对没有人喜欢做的事情——需要你具体化你的信息，这样你才能找到、定位并将你的工作展示给特定的人。如果你不理解这一点，请参加我的免费[个人企业基础课程](https://theone-personbusiness.com)。
- en: As marketing shifts more and more to organic content on social media, this just
    isn’t the case.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 随着营销越来越多地转向社交媒体上的有机内容，这根本不是事实。
- en: With content, your work is exposed to diverse audiences because that’s just
    how social media works.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 由于内容，你的工作会接触到多元化的受众，因为这就是社交媒体的工作方式。
- en: The algorithm
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 算法
- en: Reposts and shares
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 转发和分享
- en: Comments from random people
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 来自陌生人的评论
- en: They all launch you into unpredictable audiences.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 他们都将你推向不可预测的受众。
- en: And, people aren’t on social media to learn or buy (at least when they log on
    to social media until they come across something beneficial to their lives). They’re
    there to be entertained. So, you need to adapt your strategy accordingly.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 而且，人们上社交媒体不是为了学习或购买（至少当他们登录社交媒体直到他们遇到对他们生活有益的东西之前）。他们是为了娱乐。因此，你需要相应地调整你的策略。
- en: If your message is too niche, people will scroll right past it.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的信息太细分，人们会直接划过它。
- en: Instead, you have to attract a diverse audience with a range of interests and
    then *persuade* them of the importance of the skill you aim to monetize.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，你必须吸引一个具有各种兴趣的多元化受众，然后*说服*他们你所要货币化的技能的重要性。
- en: If all you talk about is what you sell, people will catch on that fast.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只谈论你卖的东西，人们很快就会察觉到这一点。
- en: I would rather have a diverse 100,000-follower audience than a niche 10,000-follower
    audience because I understand how to educate people.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我宁愿有一个多元化的10万粉丝受众，也不愿有一个小众的1万粉丝受众，因为我懂得如何教育人们。
- en: I will teach you how to do this soon.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我很快就会教你如何做到这一点。
- en: '**3) Labor work is more replaceable than ever.**'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 劳动力工作比以往任何时候都更容易被替代。**'
- en: Society has set you up to fail.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 社会已经为你设置了失败的陷阱。
- en: We are in the middle of a spiritual war of beliefs.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正处于一场信仰的精神战争之中。
- en: Older generations haven’t allowed their identity to be challenged with the changing
    landscape. Their mind still lives in a time when it was smart to go to school,
    get a job, and work until you die with the possibility of a good retirement.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 老一代人没有让他们的身份在变化的环境中受到挑战。他们的思想仍然停留在上学、找工作、工作直到死去，并有可能得到良好退休的时代。
- en: It’s not their fault… that’s just human nature. It takes time for belief systems
    to evolve on a collective scale.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是他们的错……这只是人性。集体层面的信仰体系需要时间才能进化。
- en: The problem is that people will claw and fight so that you don’t change. As
    much as they say they do it out of love for you, the reality is that their identity
    is threatened when you do better than them.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 问题在于，人们会为了不让你改变而争斗和挣扎。尽管他们说他们这样做是出于对你的爱，但现实是，当你做得比他们好时，他们的身份受到了威胁。
- en: The path of the Second Renaissance Man requires mental strength and fortitude.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 第二次文艺复兴人的道路需要心理力量和坚韧。
- en: You must have conviction in your beliefs that you have more potential than getting
    a job that a robot can replace within 5-10 years.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须坚信，你比在5-10年内被机器人取代的工作有更大的潜力。
- en: I don’t need to tell you that most schooling and job options are outdated when
    you can go to any news or reporting site and see for yourself.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 当你可以去任何新闻或报道网站看到这一点时，我就不需要告诉你大多数学校和职业选择都是过时的了。
- en: Why Generalists Thrive In The Creator Economy
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么通才在创作者经济中蓬勃发展
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1993">![](../Images/289f684cab189d26f21d5740a6d7c9a9.png)</picture>
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1993">![](../Images/289f684cab189d26f21d5740a6d7c9a9.png)</picture>
- en: Only slaves are expected to perform one task for their entire life.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 只有奴隶才会被期望一生只做一项任务。
- en: That’s what our current education and employment system reflects.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们的当前教育和就业体系所反映的。
- en: Wage slavery is a very real thing.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 工资奴隶制是一个非常真实的事情。
- en: On the other hand, a “free man” is defined as someone who acts on their interests
    and does many things throughout their life.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，“自由人”被定义为那些根据自己的兴趣行事并在一生中做很多事情的人。
- en: If you don’t create a goal, you will be assigned one, and society is great at
    handing out goals to those who can’t think for themselves.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不去创造一个目标，你将被分配一个，而社会在向那些不能独立思考的人分配目标方面做得很好。
- en: A generalist is someone who learns all relevant knowledge and skills out of
    interest of achieving a goal in their life.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 通才是指那些出于实现生活中目标的目的，学习所有相关知识和技能的人。
- en: This came naturally for me, as I’m sure it has for many people reading this.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 这对我来说很自然，我相信对许多阅读这篇文章的人来说也是如此。
- en: I’m grateful I have an audience that can relate to my failures.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 我很感激我有一个能够理解我失败的观众。
- en: So, for those who are in the trenches, I want to provide some clarity.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，对于那些在战场上的人，我想提供一些清晰度。
- en: I failed at dropshipping, e-commerce, SEO, digital art, and more.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我在淘宝客、电子商务、SEO、数字艺术等方面失败了。
- en: But in the pursuit of my business goals, I stacked an irreplaceable set of skills.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 但在追求我的商业目标的过程中，我积累了一套不可替代的技能。
- en: One or two skills didn’t bring me much in terms of results.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 一两个技能在结果方面并没有给我带来太多。
- en: But five… six… seven skills allowed me to spot and act on profitable opportunities
    because I had more tools to solve more problems.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 但五……六……七个技能使我能够发现并利用有利可图的机会，因为我有更多的工具来解决更多的问题。
- en: Dropshipping taught me branding so I could stand out from bigger brands with
    low shipping times.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 淘宝客教会了我品牌建设，这样我就能在低运费时间中脱颖而出，与大型品牌竞争。
- en: E-commerce taught me advertising and product design so I could be more attention-grabbing.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 电子商务教会了我广告和产品设计，这样我就能更吸引人的注意。
- en: Digital art taught me graphic design and the nuances of building an audience
    on social media.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 数字艺术教会了我图形设计和在社交媒体上建立受众的微妙之处。
- en: '*Notice how I didn’t study endless tutorials to learn those skills. I set a
    goal of working for myself, started a project, and practiced those skills while
    educating myself along the way.*'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '*注意我并没有研究无穷无尽的教程来学习那些技能。我设定了一个为自己工作的目标，开始了一个项目，并在教育自己的过程中练习了那些技能。*'
- en: All of those “failures” were the reason I can do what I do today.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 所有那些“失败”都是我能做到今天的事情的原因。
- en: There are 2 reasons why this story matters.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这个故事之所以重要，有两个原因。
- en: 1) Failure Stacking Makes You Irreplaceable
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 失败堆叠使你变得不可替代
- en: Most people know what “skill stacking” is.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人都知道“技能堆叠”是什么。
- en: It’s like a diversified stock portfolio.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这就像一个多元化的股票投资组合。
- en: Rather than investing all of your money in one stock – like a specialist – that
    sets you up for catastrophe, you invest in various stocks to increase your chances
    at success.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 与其像专家一样把所有的钱都投资在一支股票上——这会让你面临灾难，不如投资各种股票来增加成功的可能性。
- en: Even if one stock drops, a few others may go up and you will still be at a profit.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 即使一支股票下跌，其他几支可能会上涨，你仍然会盈利。
- en: If you were going to be in the NBA or have a platinum album, you would know
    by now.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你现在就要进入NBA或者拥有一张白金唱片，你现在就应该知道了。
- en: Being the best at one specific thing is statistically near impossible.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在某一件特定的事情上做到最好，从统计学的角度来看几乎是不可能的。
- en: Now, being top 25% in the few areas you find interesting… that’s pretty easy.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在你感兴趣的少数领域成为前25%……这相当容易。
- en: To make this more digestible, let’s reframe “skill stacking” as “failure stacking.”
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这一点更容易理解，让我们将“技能堆叠”重新定义为“失败堆叠”。
- en: Acquiring a skill puts you in the mindset that you just need to study and learn
    all day.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 获得一项技能会让你处于一种只需要整天学习和学习的心态。
- en: Acquiring a failure assumes that you are actively working toward a goal and
    gaining actual experience.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 获得失败意味着你正在积极朝着目标努力并获得实际经验。
- en: '**Identify a goal in your life** – like quitting your job, finding a partner,
    or getting fit.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在你的生活中确定一个目标**——比如辞职、找到伴侣或保持健康。'
- en: '**Start with what you know** – you can only know what to learn when you hit
    a roadblock, so hit one fast.'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从你所知开始**——你只能在遇到障碍时知道该学什么，所以快速遇到一个障碍。'
- en: '**Pursue your curiosity** – let your experience guide you into new paths to
    experiment with.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**追求你的好奇心**——让你的经验引导你进入新的路径进行实验。'
- en: All of these will overlap eventually.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些最终都会重叠。
- en: Starting in fitness can introduce you to diet models to try, training programs
    to test, and lifestyle changes to implement.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 从健身开始可以让你接触到尝试的饮食模型、测试的训练计划以及要实施的改变生活方式。
- en: Once you get to the top 25%, which isn’t much in fitness, you can explore new
    routes.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你达到前25%，在健身领域这其实并不多，你就可以探索新的路径。
- en: Maybe you want to start a career in fitness, so you start writing on the internet
    and building an audience.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 也许你想要开始一份健身职业，所以你开始在互联网上写作并建立受众。
- en: Again, once you get to the top 25%, which again isn’t much, you can start adding
    to your results by branching out.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，一旦你达到前25%，这其实并不多，你就可以通过拓展领域来增加你的成果。
- en: You can study philosophy to add depth to your writing, design to enhance your
    brand, or really anything as a creator – and that’s why generalists thrive.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过学习哲学来丰富你的写作，通过设计来提升你的品牌，或者作为一个创作者，真正地做任何事情——这就是为什么通才能够繁荣发展。
- en: 2) The Most Profitable Niche Is You
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 最有利可图的领域是你自己
- en: The creator economy – not to be confused with the influencer economy – is characterized
    by individuals who pursue their interests and document their knowledge.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者经济——不要与网红经济混淆——其特点是个人追求自己的兴趣并记录他们的知识。
- en: Nobody wants to follow a glorified search engine that talks about the same thing
    all the time.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人愿意跟随一个总是谈论同样话题的夸大的搜索引擎。
- en: Many creators tell me they are afraid to branch out into new interests because
    they have trouble understanding how that will work.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 许多创作者告诉我，他们害怕拓展到新的兴趣领域，因为他们难以理解这将如何运作。
- en: All you have to do is look at everyone you follow. Are they talking about *one*
    thing? Are they actually?
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 你只需要看看你关注的每个人。他们在谈论**一件事**吗？他们真的在吗？
- en: Or are they giving their opinions, beliefs, knowledge, and snippets of their
    life experience packaged up into impactful content?
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 或者他们是在提供他们的观点、信念、知识和他们生活经验的片段，打包成有影响力的内容？
- en: “But Dan, what do I sell then?”
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: “但丹，那我该卖什么呢？”
- en: That’s where things get tricky.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是事情变得复杂的地方。
- en: How To Earn A Living As A Generalist
  id: totrans-109
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何成为一名通才
- en: <picture decoding="async" class="wp-image-1994">![](../Images/61bbeced457e850be0cbb59f5d53d0bb.png)</picture>
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-1994">![](../Images/61bbeced457e850be0cbb59f5d53d0bb.png)</picture>
- en: The first step to earning a living as a generalist is choosing a career path
    that doesn’t box you into one specific skill or interest.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 成为通才以谋生的第一步是选择一条不会将你局限于一种特定技能或兴趣的职业道路。
- en: In other words, you need to become an entrepreneur.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，你需要成为一个企业家。
- en: But that alone doesn’t cut it.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 但仅此还不够。
- en: You can easily get trapped in a specific niche with work you no longer find
    meaningful.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会因为不再觉得工作有意义而陷入一个特定的领域。
- en: As mentioned, you are in the second renaissance.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 正如之前提到的，你正处于第二次文艺复兴时期。
- en: Social media is the new town square.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体是新城镇广场。
- en: Creators are the new Renaissance men.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者是新文艺复兴时期的人。
- en: Creators are the decentralized education system.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者是去中心化的教育体系。
- en: Creators are the new economy.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者是新经济。
- en: Stop thinking of a “creator” as some new internet job. Think of it as a part
    of life. You already spend most of your day on your phone. To act like social
    media isn’t engrained in humanity at this point is foolish. Being a “creator”
    is just expressing your value in the digital world rather than being a slave to
    it on the sidelines.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 停止将“创作者”视为一种新的互联网工作。将其视为生活的一部分。你已经花了一整天的时间在手机上。在这个时候还认为社交媒体没有深深植根于人性之中是愚蠢的。成为一个“创作者”就是在你所处的数字世界中表达你的价值，而不是在旁边成为它的奴隶。
- en: You probably follow creators for education and entertainment because they present
    beliefs and opportunities different from what you’ve been told.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能因为创作者们呈现了与以往不同的信念和机会，所以关注他们进行教育和娱乐。
- en: Ideas shape society, and it’s happening right before your eyes.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 思想塑造社会，而这就在你眼前发生。
- en: Creators are earning an independent income by teaching what they know by pursuing
    their interests.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者通过追求自己的兴趣，通过教授他们所知道的知识来赚取独立收入。
- en: They solve problems in their life and sell the solution.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 他们解决生活中的问题，并出售解决方案。
- en: Some sell stylish blue light glasses to help with sleep. Some sell business
    advice because college professors probably don’t own a business (unless they are
    teaching out of passion and sitting on wads of cash), so creators are some of
    the few qualified to teach it. Some sell productivity systems, psychology practices,
    and meditations.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人在销售时尚的防蓝光眼镜以帮助睡眠。有些人销售商业建议，因为大学教授可能没有自己的企业（除非他们是出于激情教学并且拥有大量现金），所以创作者是一些少数有资格教授商业的人。有些人销售生产力系统、心理学实践和冥想。
- en: If you don’t see this, it’s probably time to unfollow everyone and start searching
    for new pockets of the internet that create the society you want to see in the
    world. Your attention is going somewhere, might as well fuel what you believe
    in (and what you want to become).
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有意识到这一点，可能就是时候取消关注所有人，开始寻找新的互联网领域，那里创造了你希望在世界中看到的那个社会。你的注意力会去某个地方，不妨用它来支持你相信的东西（以及你想要成为的人）。
- en: Let’s start there. How do you begin earning a living?
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从这里开始。你如何开始赚取生活费用？
- en: Build A General Audience
  id: totrans-128
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 建立一个普通观众群体
- en: I’m not a fan of building “niche” or specific audiences.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是很喜欢建立“细分市场”或特定观众群体。
- en: I am a fan of helping your audience reach a big goal with whatever skills, interests,
    and ideas help them get there.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢帮助你的观众通过任何技能、兴趣和想法来实现一个大目标。
- en: When people tell you to build a niche audience in a specific topic, they usually
    don’t realize that’s not what they are doing.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 当人们告诉你在一个特定主题上建立细分市场观众群体时，他们通常没有意识到他们实际上并不是在做这件事。
- en: They say that, and then they go on to give random mindset tips, discuss their
    beliefs, post about their lives, and discuss their other interests.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 他们这么说，然后继续给出随机的思维模式建议，讨论他们的信仰，发布关于他们生活的帖子，并讨论他们的其他兴趣。
- en: Before anything else, why build an audience?
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有事情之前，为什么要建立观众群体？
- en: Because you need attention and people if you want to make an independent income.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 因为如果你想赚取独立收入，你需要注意力和人脉。
- en: You can no longer rely on your boss to generate attention with a marketing department
    that sells their product. You have to do it all yourself.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 你不能再依赖老板通过营销部门来吸引注意力并销售他们的产品了。你必须自己来做这一切。
- en: Building an audience is the most accessible way for beginners to do this. All
    you need is an internet connection, a few ideas, and the ability to type on your
    keyboard. I teach this in [2-Hour Writer](https://2hourwriter.com).
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 建立观众群体是初学者实现这一目标最便捷的方式。你只需要一个互联网连接、一些想法，以及打字的能力。我在[2小时作家](https://2hourwriter.com)中教授这一点。
- en: 'To make this simple:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之：
- en: '**Choose a big goal** – Is it financial freedom? Is it a fit body? Is it self-actualization?
    The purpose of a value creator – someone focused on value and education rather
    than entertainment and looks – is to help people improve their mind, body, business,
    and relationships.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**选择一个大的目标** – 是财务自由吗？是拥有一个健康的身体吗？是自我实现吗？价值创造者（专注于价值和教育而不是娱乐和外表的人）的目的是帮助人们改善他们的思想、身体、事业和人际关系。'
- en: '**List out skills, interests, and beliefs** – What do people need to know in
    order to reach that goal? The combination of these is what makes you unique.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**列出技能、兴趣和信仰** – 人们需要了解什么才能达到那个目标？这些的组合就是你独特的地方。'
- en: '**Frame everything you write through the lens of achieving that goal** – If
    you want to talk about basket weaving for some reason, do it, but talk about how
    it benefits your life as a fun hobby that helps with creativity and mental clarity.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通过实现那个目标的角度来框架你写的每一件事** – 如果出于某种原因你想谈论篮子编织，那就去做，但谈论它如何作为一项有趣爱好，帮助你提高创造力和精神清晰度，从而对你的生活有益。'
- en: Let’s say the goal I’m helping people achieve is financial freedom.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我正在帮助人们实现的目标是财务自由。
- en: I talk about creativity, psychology, writing, and human potential to help people
    get there.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 我谈论创造力、心理学、写作和人类潜能，以帮助人们实现目标。
- en: Someone else can choose something completely different, like performance/health,
    budgeting, and spirituality.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个人可以选择完全不同的事情，比如表现/健康，预算和灵性。
- en: Both have the same big goal that everyone wants – financial freedom – with completely
    different ways of getting there.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 他们都有同一个大目标，那就是每个人都想要的财务自由，但达到这个目标的方式却完全不同。
- en: The problem most creators face is that they either don’t have a goal to frame
    their content, don’t choose a goal that people want, or choose a goal so small
    that they attract a small audience.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数创作者面临的问题是，他们要么没有设定一个目标来框架他们的内容，要么选择了一个人们不感兴趣的目标，或者选择了一个太小以至于只能吸引一小部分观众的目标。
- en: The bigger the goal, the bigger your potential audience and the more unique
    you can be.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 目标越大，你的潜在观众群体就越大，你也能表现得越独特。
- en: Make Noise, Find Signal
  id: totrans-147
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 噪声大，找到信号。
- en: Most creators struggle to start writing because they don’t know what to write
    about.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数创作者都难以开始写作，因为他们不知道要写什么。
- en: Just start writing. Nobody is watching when you have zero followers.
  id: totrans-149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 只管开始写。当你没有关注者时，没有人会看着你。
- en: If your friends follow you, good. Maybe it’s finally time for them to learn
    who you really are and potentially join you. And if they don’t like it, maybe
    they don’t really care about you, and you should find that out now instead of
    later.
  id: totrans-150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你的朋友关注你，那很好。也许是他们终于了解你真正是谁，并可能加入你的时候了。如果他们不喜欢，也许他们真的不在乎你，你现在就应该弄清楚，而不是以后。
- en: Write about all of your interests. Make a lot of noise and let your audience
    decide what they want to hear more of from you. A few poorly performing posts
    aren’t the end of the world; it’s data.
  id: totrans-151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 写关于你所有的兴趣。制造很多噪音，让你的观众决定他们想从你这里听到更多什么。一些表现不佳的帖子并不是世界末日；这是数据。
- en: Of course, posting good content is only one aspect of social growth. You have
    to understand social media as a skill if you want to grow. I talk about that skill
    in [How To Actually Build An Audience On Social Media](https://thedankoe.com/letters/how-to-actually-grow-on-social-media-what-they-dont-tell-you/).
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，发布优质内容只是社交增长的一个方面。如果你想增长，你必须将社交媒体视为一项技能。我在[如何在社交媒体上真正建立受众](https://thedankoe.com/letters/how-to-actually-grow-on-social-media-what-they-dont-tell-you/)中讨论了这项技能。
- en: 'Next question: how do I write?'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个问题：我如何写作？
- en: First, make a list of content ideas based on your interests.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，根据你的兴趣列出内容想法。
- en: Second, focus on the “how” and “why.”
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，关注“如何”和“为什么”。
- en: Third, write out the post.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 第三，写出帖子。
- en: Fourth, filter it through your big goal.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 第四，通过你的大目标进行筛选。
- en: Let’s say I’m writing about psychology.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我在写关于心理学。
- en: 'Some topics include:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 一些主题包括：
- en: How do I manage my emotions? Create a list of steps.
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我如何管理我的情绪？创建一个步骤列表。
- en: Why should I manage my emotions? Think of compelling reasons from experience.
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么我应该管理我的情绪？想想经验中的有力理由。
- en: 'Frame it through a big goal like financial freedom, and you have a post:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 通过像财务自由这样的目标来构建框架，你就有了帖子：
- en: 'How to manage your emotions:'
  id: totrans-163
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如何管理你的情绪：
- en: ''
  id: totrans-164
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Become aware of negative reactions
  id: totrans-165
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意识到负面反应。
- en: Pause before you act on them
  id: totrans-166
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在采取行动之前先暂停一下。
- en: Stay quiet or make a better decision
  id: totrans-167
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持安静或做出更好的决定。
- en: ''
  id: totrans-168
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: When you repeat this process, you reprogram your mind to be less negative.
  id: totrans-169
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当你重复这个过程时，你重新编程你的大脑，使其变得不那么消极。
- en: ''
  id: totrans-170
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Life, money, and relationships will flow with ease.
  id: totrans-171
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 生活、金钱和关系将顺利流动。
- en: All it takes is a small mention of your big goal for it to be impactful.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 只需提及你的大目标，就能使其产生重大影响。
- en: Why are we focused on illustrating the “why” or importance of an idea?
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我们专注于说明“为什么”或一个想法的重要性？
- en: Because people whine a lot and experiment little.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 因为人们抱怨很多，实验很少。
- en: “Dan, how can I talk about my interests if nobody is interested in them?”
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: “丹，如果没有人对它们感兴趣，我如何谈论我的兴趣？”
- en: That’s not their fault. It’s yours. Your interests aren’t interesting because
    you don’t make them interesting.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 那不是他们的错。是你的。你的兴趣之所以不吸引人，是因为你没有使它们变得有趣。
- en: If you *became* interested in them, that means there’s a series of thoughts
    and ideas that can make it important to someone else.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对他们产生了兴趣，这意味着有一系列思想和想法可以使其对他人变得重要。
- en: You weren’t born with that interest. You were programmed into it. You were persuaded
    of its importance and adopted it to help you achieve your goals in life.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 你不是天生就有那个兴趣。你是被编程的。你被说服了它的重要性，并采纳它来帮助你实现生活中的目标。
- en: This does require you to think. It probably won’t be that easy the first time
    around.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 这确实需要你思考。第一次可能不会那么容易。
- en: Establish Authority With A Digital Asset
  id: totrans-180
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通过数字资产建立权威。
- en: At this point, you are writing quite a few posts.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 到这个时候，你已经写了很多帖子。
- en: You should review their performance every week to see which ideas did better
    than others. It should be obvious which ones they are.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该每周审查他们的表现，看看哪些想法比其他想法做得更好。应该很明显哪些是它们。
- en: You can look for better writing or more engagement.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以寻找更好的写作或更多的参与度。
- en: 'From there, you want to make the most of those ideas:'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，你想要充分利用这些想法：
- en: Turn them into longer-form content like a thread, carousel, newsletter, or video.
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将它们转化为更长的内容形式，如帖子、轮播图、通讯或视频。
- en: Rewrite that post from multiple angles to consistently get more engagement.
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从多个角度重写那篇帖子，以保持持续获得更多参与度。
- en: Bake that topic into your writing routine and make it a part of your brand.
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将这个主题融入你的写作习惯，使其成为你品牌的一部分。
- en: If that topic continues to do well for you, establish a piece of your authority
    in that topic by creating a digital asset.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
- en: Create a free product. Pin a thread or carousel to your profile. Write it down
    as a potential starting point for a digital product. This is what we do in my
    new course [Mental Monetization](https://mentalmonetization.com) to monetize your
    creative work. It launches on June 3rd when the early bird price increases.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
- en: Why do we do this?
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
- en: So you don’t feel like you have to keep repeating yourself and box yourself
    into a niche.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
- en: A free product will contain almost everything you know on the topic.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
- en: Instead of writing endless content on that, you can just send them to the free
    product or they can read your pinned thread.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
- en: This gives you room to continue experimenting with new ideas to diversify your
    brand and make it irreplaceable as a generalist.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
- en: As you make noise and find signal, you will solidify the signal as a part of
    your brand by consistently repurposing that idea and creating new free products
    to get people on your email list.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
- en: Build A Portfolio Of Income Sources
  id: totrans-196
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As a generalist, we can look to a few people for inspiration.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
- en: First, there’s Zuby.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
- en: He’s a rapper, fitness buff, and political commentator.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
- en: With a rather general audience, he promotes his music, fitness ebook, and public
    speaking gigs. He isn’t boxed into one specific topic and that’s what allows him
    to stand out.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
- en: I’d like to think of myself as another example.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
- en: Even though I started out in web design, that didn’t stop me from talking about
    emotional management and self-improvement.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
- en: It didn’t stop me from building more products like a physical planner and self-help
    ebook (The Path To Power that was complete sh*t but allowed me to get better and
    eventually write and publish a full book).
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
- en: As my audience grew thanks to attracting people with big goals of achieving
    more in their life, I was able to pivot out of web design into writing, productivity,
    branding, and marketing.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
- en: I wouldn’t even say those are my interests. I honestly talk about whatever ideas
    are on my mind. Because if they are important to me with the goals I have, they
    can *become* important to someone else with those shared goals, which is quite
    a few people.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
- en: In brief, launch products around the ideas that do well for you.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
- en: Monetize with courses, cohorts, templates, systems, tutorials, or whatever else
    will help people achieve a smaller goal that helps them get a few steps closer
    to the big goal.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
- en: Every 3-6 months, launch at least one free product and one paid product until
    you have a brand and business you are satisfied with.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
- en: Once you have *cash flow,* then you can consider building a product that requires
    capital and a large audience of people to sell. I wasn’t raised in a wealth family.
    I never had capital to invest. I had to create my own substantial income source
    to be able to do thing like publish my own book and build a software startup.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
- en: That’s how you earn a living as a generalist in a world going digital.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading and enjoy the rest of your day.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您的阅读，祝您剩余的时光愉快。
- en: – Dan
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
