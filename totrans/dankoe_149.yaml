- en: The Meaning Crisis (How To Do Something That Matters)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 意义危机（如何做一些有意义的事情）
- en: 原文：[https://thedankoe.com/letters/the-meaning-crisis-how-to-do-something-that-matters/](https://thedankoe.com/letters/the-meaning-crisis-how-to-do-something-that-matters/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/the-meaning-crisis-how-to-do-something-that-matters/](https://thedankoe.com/letters/the-meaning-crisis-how-to-do-something-that-matters/)
- en: Firstly, credit to John Vervaeke for “The Meaning Crisis” concept. I have not
    watched his series on the topic, but I’ve heard great things.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，感谢约翰·维瓦克克（John Vervaeke）提出的“意义危机”概念。我没有看过他关于这个主题的系列，但我听说了很多好话。
- en: This letter is for those who want to do something that matters.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这封信是为那些想要做一些有意义的事情的人而写的。
- en: Because if you’re observant, it’s not difficult to see the state of the modern
    world.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 因为如果你观察力敏锐，就不难看到现代世界的状况。
- en: We’re addicted to our phones. We’re disconnected from nature. We’ve lost trust
    in public schooling, and for good reason. People are realizing that an education
    model adopted from a Prussian military state can’t work. In other words, an education
    model that is a mirror reflection of the education of indentured servants, created
    to keep people weak, dumb, and powerless – even if that wasn’t their intention,
    it was the result of incentives based on status and survival – was bound to make
    people lose trust in the system, because the state of their life is guaranteed
    to end up in a place they despise.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们沉迷于我们的手机。我们与自然脱节。我们对公共教育失去了信任，这是有充分理由的。人们意识到，从普鲁士军事国家采纳的教育模式是行不通的。换句话说，一个反映契约仆人教育的教育模式，旨在让人们保持弱小、愚蠢和无能——即使这不是他们的意图，也是基于地位和生存的激励的结果——注定会让人们对系统失去信任，因为他们的生活状态注定会结束在一个他们所憎恶的地方。
- en: 'Where do they end up? In a job where they face the threat of replacement more
    and more as years pass. If you can’t see this, I’d encourage you to think through
    what hyperspecialized education leads to. You were blinded by status to get a
    degree. And by doing so, you probably didn’t pursue education on the side. So
    you narrowed your mind on one goal and allowed it to be conditioned with a one-sided
    worldview to be useful as one thing: a worker.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 他们最终会怎样？在一份工作中，他们随着年龄的增长，面临被取代的威胁越来越多。如果你看不到这一点，我鼓励你思考一下高度专业化的教育会带来什么。你被地位蒙蔽去获得学位。而且通过这样做，你可能没有在旁边追求教育。所以你将你的思想局限于一个目标，并让它被一个片面的世界观所条件化，以便作为一件事物有用：一个工人。
- en: And once you become a worker, you start to realize that what you worked for
    all this time is (1) at high threat of replacement and (2) not meaningful in the
    slightest. You lost the curiosity and wonder of your childhood that brought a
    zest to life.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你成为工人，你就会开始意识到，你一直为之努力的工作（1）面临着很高的被取代风险，并且（2）在本质上没有任何意义。你失去了童年时的好奇心和惊奇，这些曾经给生活带来了激情。
- en: Everyone is either at work or at home dreading going back to work. There is
    little desire to soak in the good, the true, and the beautiful of reality that
    realigns your psyche toward meaningful contribution to those things.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人要么在工作，要么在家，害怕回到工作中。对现实中的美好、真实和美丽的东西几乎没有兴趣，这些可以让你心理重新调整，对那些事物做出有意义的贡献。
- en: Addiction. Disconnection. Lack of trust. Lack of stability. Lack of education.
    Fear of replacement. Status seeking. Survival mode. A gradual decline into chaos
    that makes us question the meaning of our existence. Constant questioning as to
    why you are working so long, what better things you could be doing with your life,
    creating a state of anxiety and overwhelm that traps you in a state of fogged
    perception, unable to actually think of a solution to get out, and it doesn’t
    help that you the time or energy to acquire the broad set of skills that would
    allow you to see clearly and create that solution.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 上瘾。脱节。缺乏信任。缺乏稳定性。缺乏教育。害怕被取代。追求地位。生存模式。逐渐陷入混乱，让我们质疑我们存在的意义。不断质疑为什么你要工作这么久，你的人生中还有什么更好的事情可以做，这创造了一种焦虑和压倒性的状态，让你陷入模糊的感知中，无法真正思考出解决问题的方案，而且你也没有时间或精力去获得那些能够让你看得清楚并创造解决方案的广泛技能。
- en: Those are the characteristics of this meaning crisis we are facing.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是我们面临的意义危机的特征。
- en: So what do we *do*?
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们*应该*做什么？
- en: How do we live a meaningful life?
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何过上有意义的生活？
- en: How do we reconnect with what we’ve lost while continuing to make forward progress?
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何在继续前进的同时，重新连接我们失去的东西？
- en: How do we educate ourselves in a manner that doesn’t get us replaced by rapidly
    advancing AI and technology?
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何教育自己，以便不会被快速发展的AI和技术所取代？
- en: How do we find *our* unique and individual path and feel as if we are doing
    something that matters?
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何找到我们独特且个人的道路，并感觉我们正在做有意义的事情？
- en: Let’s find out.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看。
- en: The Meaning Equation
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 意义方程式
- en: If our lives are meaningless, what are we doing here?
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们的生活毫无意义，我们在这里做什么？
- en: What do we do with our lives?
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的生命应该如何度过？
- en: How do we make sense of suffering and pain?
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何理解痛苦和痛苦？
- en: Is the good life as simple as a belief in a God, when belief is a disconnected
    map of that thing rather than the thing itself, and the map is interpreted by
    an individual’s culture, value system, language, and conditioning? The map, most
    of the time, is miles away from the territory.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 当信仰只是一个与那个事物脱节的地图而不是那个事物本身，并且地图是由个人的文化、价值观体系、语言和教养来解释的时候，美好的生活是否仅仅是对上帝的信仰？这个地图，大多数时候，离那个领域还有很远的距离。
- en: I have a sense that we all want to feel useful. We crave purpose. We are social
    creatures after all… we want to feel connected – as nature is – to something greater
    than ourselves. And by losing that connection, we start to see life as meaningless.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我有一种感觉，我们都想感到有用。我们渴望目的。毕竟，我们都是社会性生物……我们想要感到与比我们自己更大的事物相连——就像自然一样。而当我们失去这种联系时，我们开始觉得生活毫无意义。
- en: The question then is how do I reconnect to that which matters? And how do we
    determine what matters?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，问题就是如何重新连接到那些有意义的事物？以及我们如何确定什么是重要的？
- en: To reconnect, we need to strip down and reorient our fundamental experience.
    To determine what matters, we need to pull from multiple disciplines and cultures
    to uncover a holistic direction – or highest order – to align ourselves within
    as an antidote to chaos and meaninglessness.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 为了重新连接，我们需要简化并重新定位我们的基本经验。为了确定什么是重要的，我们需要从多个学科和文化中汲取，以揭示一个整体的方向——或者最高秩序——以作为混乱和无意义的解毒剂，来调整我们自己的位置。
- en: At the base of it all, there are 3 general categories or modes of existence.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有这一切的基础之上，有三种一般类别或存在模式。
- en: '**Being** – connection to reality, direct experience, and the present moment.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**存在** – 与现实、直接经验和当下的连接。'
- en: '**Doing** – contribution to reality and the experience of others.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行为** – 对现实和他人经历的贡献。'
- en: '**Becoming** – increasing your capacity to connect with and thus contribute
    to reality, personal experience, and the experience of others.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成为** – 提高你与现实、个人经历以及他人经历连接并因此贡献的能力。'
- en: We all engage in these every day. But a massive problem arises when we do so
    unconsciously. We are assigned goals and values during our upbringing. What we
    *do* and who we *become* are at the whim of someone else. The schooling, the job,
    and the society all project what they think is good – often for selfish gain –
    leading us into a trap that has us questioning our sanity.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我们每天都在参与这些活动。但是，当我们无意识地这样做时，会出现一个巨大的问题。我们在成长过程中被赋予了目标和价值观。我们所**做**的和我们所**成为**的完全取决于他人。学校、工作和社会都投射出他们认为好的东西——通常是出于自私的收益——将我们引入一个陷阱，让我们质疑自己的理智。
- en: Being, doing, and becoming form a feedback loop.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 存在、行为和成为形成一个反馈循环。
- en: They influence one another.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 它们相互影响。
- en: The more time you spend *being,* the less psychological time you spend in the
    familiar past or predictable future. You immerse yourself in direct experience.
    Your perception clears. You can achieve a neutral – or peaceful – mind. You aren’t
    projecting into a stressful future of tasks that make you feel that stress now,
    even though you aren’t in that situation. You aren’t reminiscing on a painful
    past, leading to the same thing.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 你花在**存在**上的时间越多，你在熟悉过去或可预测未来上花费的心理时间就越少。你沉浸在直接经验中。你的感知变得清晰。你可以达到一种中立——或者平和——的心态。你不会投射到一个让你现在就感到压力的未来任务中，即使你并不在那个情境中。你也不会回忆一个痛苦过去，导致同样的结果。
- en: From that state of clear perception, your *doing* increases in degrees of consciousness.
    You start focusing on what matters and thinking toward a deeper future. Your choices
    then create who you become, and when you do that from a state of higher consciousness
    and connection, your identity expands and sheds its limitations. Meaning is easier
    to make sense of.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 从这种清晰的感知状态出发，你的**行为**在意识程度上有所增加。你开始关注重要的事情，并思考更远的未来。你的选择创造了你的身份，当你从更高的意识和连接状态中这样做时，你的身份就会扩展并摆脱其限制。意义更容易理解。
- en: Unfortunately, most people neglect being and get stuck in *doing* mode. Their
    attention is focused on the next task, next event, next meme, next pleasure, next
    cause of stress or anxiety, so they end up *becoming* something of that nature.
    Rivoted to “next,” avoidant of “now.” Their mind begins to narrow into a state
    of meaninglessness because they’ve lost touch with reality.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，大多数人忽视了“存在”，陷入了“行动”模式。他们的注意力集中在下一个任务、下一个事件、下一个梗、下一个快乐、下一个压力或焦虑的来源，所以他们最终变成了那种性质的人。专注于“下一个”，回避“现在”。他们的思维开始变得狭隘，陷入无意义的状态，因为他们已经失去了与现实的联系。
- en: That’s where we start.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 就从这里开始。
- en: The now. Being. Direct experience. Maintaining connection.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现在。存在。直接体验。保持联系。
- en: Before we go any further, consider adding time for *being* even if you don’t
    notice its direct effects. Meditate. Go in deep nature for a day. Go on a walk
    and attempt to “push” your awareness toward the skies. Stare at your hand for
    10 minutes and marvel at its intricacies. Go deeper into your senses. Feel the
    water on your hands as you wash the dishes. Pick apart the nuanced flavors of
    the food you’re eating. Explore the human experience that is happening right *now.*
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们继续前进之前，考虑即使你没有注意到它的直接效果，也要为“存在”留出时间。冥想。深入大自然一天。散步并尝试“推动”你的意识向天空。凝视你的手10分钟，并对其复杂性感到惊奇。深入你的感官。当你洗碗时，感受手上的水。品尝你正在吃的食物的细微味道。探索正在发生的“现在”这一人类体验。
- en: '*Soak in more beauty.*'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '*更多地沉浸于美丽之中。*'
- en: It’s all around you. Sit with it until you can see it. Observe until you see
    clearly.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 它无处不在。静下心来，直到你能看到它。观察，直到你看得清楚。
- en: From that state of connection, how do we ensure that we are *doing* things that
    matter?
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 从那种连接的状态，我们如何确保我们在做有意义的事情？
- en: Aligning With The Highest Order
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 与最高秩序保持一致
- en: We aren’t adapted to this chaotic modern environment.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我们并没有适应这种混乱的现代环境。
- en: Phones. Computers. Information everywhere. It’s difficult to filter signal from
    noise. Since wealth and entropy are two polar ends, the more uncertainty there
    is, the more opportunity to create value there is. Individuals are learning skills
    and building businesses on the internet that wasn’t possible before, but many
    people are more uncertain than ever. And they don’t know how to order the chaos
    all around them.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 电话。电脑。信息无处不在。从噪声中过滤信号变得困难。由于财富和熵是两个极端，不确定性越大，创造价值的机会就越多。个人正在学习技能并在互联网上建立业务，这在以前是不可能的，但许多人比以往任何时候都更加不确定。他们不知道如何整理他们周围的所有混乱。
- en: Before the Industrial Revolution, we interacted with small communities and tribes.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在工业革命之前，我们与小型社区和部落互动。
- en: '*The main information you were exposed to was that which was passed down by
    the elders of that community or tribe. A mentor of sorts.*'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '*你接触到的主要信息是那个社区或部落的长者或导师所传授的。一种导师式的信息。*'
- en: Everyone used to be on the same page.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人曾经都在同一页上。
- en: Now everyone is on a different page, and that creates conflict. We are in the
    middle of a psychic war. A war of worldviews and identities.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现在每个人都在不同的页面上，这造成了冲突。我们正处于一场心理战争之中。一场世界观和身份的战争。
- en: To understand this, let’s work from the ground up.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 为了理解这一点，让我们从基础开始。
- en: We lack meaning because we can’t make sense of the chaos.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我们缺乏意义，因为我们无法理解混乱。
- en: The mind craves order, and once order is maintained by expanding our mind to
    the highest order, meaning isn’t difficult to find.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑渴望秩序，一旦我们的思维扩展到最高秩序，意义就不再难以寻找。
- en: 'To live a meaningful life, we can synthesize strong conclusions across multiple
    domains like:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 为了过上有意义的生活，我们可以在多个领域综合出强有力的结论，例如：
- en: Flow psychology
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 流心理学
- en: Stages of development
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发展阶段
- en: The ultimate structure of reality
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 现实的终极结构
- en: In the next section of this letter, we can use that understanding to create
    our own unique path in this life. One that brings meaning through mastering ourselves
    and our craft so we can contribute in a way that matters to others.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在这封信的下一部分，我们可以利用这种理解来创造我们自己的生活独特路径。一条通过掌握自己和我们的技艺来带来意义，这样我们就可以以对他人有意义的方式做出贡献的路径。
- en: How To Enter The Flow State
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何进入心流状态
- en: They have rules that require the learning of skills, they set up goals, they
    provide feedback, they make control possible. They facilitate concentration and
    involvement by making the activity as distinct as possible from the so-called
    “paramount reality” of everyday existence. – Mihaly Csikszentmihalyi
  id: totrans-57
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 他们有规则需要学习技能，他们设定目标，他们提供反馈，他们使控制成为可能。他们通过尽可能使活动与所谓的“至高无上的现实”即日常存在的现实区分开来，从而促进专注和参与。
    – 米哈伊·契克森米哈伊
- en: When people enter the flow state, they call it a “spiritual experience.”
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 当人们进入心流状态时，他们称之为“精神体验”。
- en: However, I think that description is misguided as to what is actually happening.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我认为这种描述对于实际发生的事情是误导性的。
- en: 'Most “spiritual experiences” can be more accurately described as *clear perception.*
    Clear perception leads to decisions aligned with the transcendentals: the good,
    the true, and the beautiful.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数“精神体验”可以更准确地描述为**清晰的感知**。清晰的感知导致与超越性的决策一致：好的、真的和美的。
- en: No distractions. No projections. Minimal to no limitations. You feel invincible
    because you are locked into the here and now. You tap into the source code of
    reality and flow with it.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 没有干扰。没有投射。最小化或没有限制。你感觉不可战胜，因为你完全锁定在此时此刻。你触碰到现实的源代码并与它同步。
- en: To enter the flow state, or achieve an extremely clear state of perception,
    you need a few things.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 要进入心流状态，或达到极其清晰的感知状态，你需要一些东西。
- en: '**1) A Hierarchy Of Goals**'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 目标层次结构**'
- en: Order is created when the mind has a clear path to focus on.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 当思想有一个清晰的路径可以专注于时，秩序就产生了。
- en: Chaos is created when there are gaps in that path of either knowledge, skill,
    or understanding.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 当知识、技能或理解的道路上出现差距时，就会产生混乱。
- en: When you’re having a conversation, if you don’t have a shared goal, it will
    probably devolve into conflict and argument. You see this on social media all
    the time. People with vastly different worldviews are arguing their points without
    attempting to understand what goal their mind is working toward.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在进行对话时，如果你没有共同的目标，它很可能会演变成冲突和争论。你总是在社交媒体上看到这种情况。有着截然不同世界观的人们在争论他们的观点，而没有试图理解他们的思想正在朝着什么目标努力。
- en: '*Everyone has a goal they are working toward.*'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**每个人都有一个正在为之努力的目标**。'
- en: For most people, those goals are assigned to them. They do what parents, teachers,
    and authorities tell them, so they learn the knowledge and acquire the skill to
    do that narrow set of things, conditioning their mind into a potentially destructive
    state.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大多数人来说，这些目标是被分配给他们的。他们做父母、老师和权威告诉他们的事情，因此他们学习知识并获得技能去做那一小套事情，将他们的思想训练成可能具有破坏性的状态。
- en: '*Zoom out and determine what* ***you*** *want out of life.*'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**放大视野，确定你想要从生活中得到什么**。'
- en: Create a frame. Vision and anti-vision. What you do and don’t want out of life.
    Let it evolve with time. It’s not going to be perfect at the start. From there,
    create a hierarchy of goals. 10-year, 1-year, monthly, weekly, and daily priorities.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个框架。愿景和反愿景。你想要和不想从生活中得到的东西。让它随着时间发展。一开始它不会完美。从那里，创建一个目标层次结构。10年、1年、每月、每周和每日的优先事项。
- en: These goals are for direction and clarity. You aren’t supposed to achieve exactly
    those things. If they change, let them.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这些目标是为了方向和清晰。你不应该精确地实现那些事情。如果它们改变了，就让他们改变。
- en: '**2) Deep Interest**'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 深入兴趣**'
- en: Contemplate your life.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 思考你的生活。
- en: What you do and don’t want.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 你想要和不要的东西。
- en: The temporary goals create a frame for your mind to adopt.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 暂时性的目标为你的思想提供了一个框架。
- en: Now, what interest, topic, or skill will help solidify one piece of that puzzle
    and move you forward toward your ideal lifestyle?
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，什么兴趣、主题或技能将帮助巩固这个谜题的一部分，并推动你朝着理想的生活方式前进？
- en: Start there. Pick something to begin studying. Block out time for it. Read a
    fundamental book. Watch a lecture or podcast. Follow new social accounts. Expose
    your mind to more information and allow your vision to filter for signal.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 从这里开始。选择一些东西开始学习。为此分配时间。阅读一本基础书籍。观看讲座或播客。关注新的社交媒体账号。让你的思想接触到更多信息，并让你的视野筛选出信号。
- en: This is only the starting point. As we will learn, through interest-based education,
    you will have to learn much, much more. You will have to learn for life. To master
    one interest, it will demand that you go deeper. It will demand that you learn
    another, then another, until you have a deep interest in the intricacies of life
    itself. To think that *everything, and I mean everything,* ***isn’t*** interesting
    is to have lost your ground. You’re distracted.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是一个起点。正如我们将学到的，通过基于兴趣的教育，你将不得不学习得多得多。你将不得不终身学习。为了掌握一个兴趣，你需要深入。这将要求你学习另一个，然后另一个，直到你对生活的复杂性本身有深刻的兴趣。认为**一切，我是说一切**，**不是**有趣的，就是失去了立足点。你被分心了。
- en: If a good, true, and beautiful life is important to you, anything other than
    being or doing in alignment with that is, by definition, *wasting your time.*
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你认为美好的、真实的和美丽的生活很重要，那么任何不符合这种生活状态的事情，按照定义，都是在浪费时间。
- en: '**3) Challenge & Skill**'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 挑战与技能**'
- en: If your skill is high and the challenge low, you will get bored.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你技能高而挑战低，你会感到无聊。
- en: If your skill is low and the challenge is high, you will get anxious.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你技能低而挑战高，你会感到焦虑。
- en: Both scenarios prevent you from getting into flow, increase the potential for
    chaos, and, when left unchecked, can lead to feelings of meaninglessness.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这两种情况都阻止你进入心流状态，增加了混乱的可能性，如果任其发展，可能会导致无意义的感觉。
- en: The boredom stems from self-centeredness. Your focus breaks, a new desire pops
    into your head, and related thoughts start filling your attention.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 无聊源于自我中心。你的注意力中断，一个新的欲望突然出现在你的脑海中，相关的想法开始占据你的注意力。
- en: If you are bored at work, you will start thinking of more productive things
    you could be doing.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你工作中感到无聊，你会开始考虑你可以做的更有生产力的事情。
- en: The anxiety stems from self-consciousness. Your focus turns toward your concept
    of self, and again, related thoughts start penetrating your field of awareness.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 焦虑源于自我意识。你的注意力转向你的自我概念，再次，相关的想法开始渗透你的意识领域。
- en: If you take on work that you aren’t good enough to do, or challenge a player
    that is much higher level than you, negative thoughts of doubt start to come in.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你承担的工作你做得不够好，或者挑战一个比你级别高得多的玩家，怀疑的负面想法开始出现。
- en: The antidote to chaos is an interest-based project.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 混乱的解药是基于兴趣的项目。
- en: Projects force you to learn effectively. They help you realize that success
    in building a project is not as simple as learning one skill. In a one-person
    business, you don’t just learn “marketing” if you want to be financially free.
    No. You may start with that, but then you get exposed to branding, content, product,
    persuasion, psychology, and more auxiliary skills that don’t make themselves apparent
    until you see initial progress.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 项目迫使你有效地学习。它们帮助你意识到，在构建项目中的成功并不像学习一项技能那样简单。如果你想在财务上自由，在一家个人企业中，你不仅需要学习“营销”。不，你可能从那开始，但随后你会接触到品牌、内容、产品、说服、心理学以及更多直到看到初步进展才显现的辅助技能。
- en: Meaningful projects order your mind and narrow your attention on the levers
    you need to pull every single day.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 有意义的项目能整理你的思绪，并使你的注意力集中在每天需要拉动的杠杆上。
- en: But that’s not the end of the story. We will loop back to this in the final
    section.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 但这并不是故事的结尾。我们将在最后一部分回到这一点。
- en: 'Side note: if you don’t have a skill you want to learn, consider writing. Any
    other skill or interest you plan to learn will demand that you learn to write.
    You will have to attract people to your work if you want to actually get paid
    and sustain it. [Check out 2 Hour-Writer here.](https://2hourwriter.com)'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 旁白：如果你没有想学习的技能，考虑写作。你计划学习的任何其他技能或兴趣都将要求你学会写作。如果你想真正得到报酬并维持它，你必须吸引人们关注你的工作。[查看2小时作家在这里。](https://2hourwriter.com)
- en: How Your Level Of Mind Shapes How You See The World
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你的心智水平如何塑造你看待世界的方式
- en: To enter the flow state, you need a hierarchy of goals, deep interest, and challenge
    that demands a certain level of skill.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 要进入心流状态，你需要目标层次、深厚的兴趣和需要一定技能水平的挑战。
- en: But we are all at different stages of development in our lives.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们每个人在生活中都处于不同的发展阶段。
- en: We all operate from different meta goals. We see different things as important
    and worth acting on.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都从不同的元目标出发。我们把不同的事情视为重要并值得采取行动的。
- en: Why does this matter?
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 这为什么重要？
- en: Because if you are at a lower stage of development, frankly, you have no business
    acting and faking like you are at a higher stage. Putting on a spiritual hat when
    you haven’t earned that experience isn’t spirituality. It’s status-seeking.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 因为如果你处于较低的发展阶段，坦白说，你没有资格表现得像处于更高阶段的人。在没有获得那种经验时戴上精神的面具不是精神，那是寻求地位。
- en: We broke down the 9 stages of ego development 2 weeks ago in [*How To Become
    More Intelligent Than 99% Of People*](https://thedankoe.com/letters/how-to-join-the-top-1-of-intelligence-full-guide/)*,*
    so we will go over broad stages here for understanding.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 我们两周前在[*如何比99%的人更聪明*](https://thedankoe.com/letters/how-to-join-the-top-1-of-intelligence-full-guide/)中分解了9个自我发展阶段，所以我们将在这里概述广泛阶段以供理解。
- en: 'Most humans, in most domains, evolve through 4 broad stages:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人类在大多数领域都通过4个广泛阶段进化：
- en: '**Ego-centric** – focused on the survival of ourselves.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**以自我为中心** – 关注我们自己的生存。'
- en: '**Group-centric** – focused on the survival of our group, tribe, nation, or
    ideology.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**以群体为中心** – 关注我们群体、部落、国家或意识形态的生存。'
- en: '**World-centric** – focused on the survival of humanity and the biosphere.'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**以世界为中心** – 关注人类和生物圈的生存。'
- en: '**Cosmo-centric** – focused on the survival and harmony of the cosmos and beyond,
    the highest order.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**宇宙中心主义** – 关注宇宙及其超越的生存和和谐，最高秩序。'
- en: As a society, we are still mostly at the group-centric stage. The election is
    quite a good indicator of this. People are still worried about defending their
    side rather than seeking the truth and transcending their harmful identity.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 作为社会，我们仍然主要处于以群体为中心的阶段。选举相当好地说明了这一点。人们仍然担心捍卫自己的立场，而不是寻求真理和超越他们有害的身份。
- en: This weaves in the topic of mental survival. Where animals attempt to survive
    the information in their genes and humans attempt to survive the information in
    their genes *and consciousness*.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 这涉及到心理生存的话题。动物试图生存其基因中的信息，而人类则试图生存其基因中的信息*以及意识*。
- en: This can be seen across all domains from religion to business to ecology to
    relationships.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 这在所有领域都可以看到，从宗教到商业，从生态学到人际关系。
- en: When your religious (group-centric) beliefs are challenged, you may feel threatened,
    as if your mental body, or identity, isn’t going to survive, so you attempt to
    reproduce the information in your head by preaching and arguing as to why your
    limited worldview should be adopted by the other.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的宗教（以群体为中心）信仰受到挑战时，你可能会感到受到威胁，好像你的精神身体或身份无法生存，所以你试图通过布道和争论来复制你头脑中的信息，以证明你的有限世界观应该被其他人接受。
- en: We can go over more examples, but to keep this brief, most of your emotional
    reactions and feelings of being offended stem from an inability to open your mind
    and expand your identity to the next stage.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以举更多的例子，但为了保持简短，你们大多数的情感反应和被冒犯的感觉都源于无法打开你的心扉，将你的身份扩展到下一个阶段。
- en: How does this have anything to do with a meaningful life?
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这与有意义的生活有什么关系？
- en: Well, if you are so focused on yourself and your group – like 80%+ of people
    – and those concepts (religion, schooling, politics, etc) are bursting at the
    seems with the rapid spread of information and acceleration of technology, you’re
    kind of lost in a void until you attempt to self-develop toward the next stage.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，如果你像80%以上的人一样，如此专注于你自己和你的群体，而这些概念（宗教、教育、政治等）随着信息的快速传播和技术的加速发展而充满紧张，那么在你尝试向下一个阶段自我发展之前，你可能会在空虚中迷失。
- en: '**Fun fact:** *regular meditation can help you “unstick” from a specific stage
    and accelerate reaching the next, because it helps understand your current stage
    and clear perceptions toward the next.*'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '**有趣的事实**：*规律的冥想可以帮助你“摆脱”特定阶段，并加速达到下一个阶段，因为它有助于理解你当前的阶段，并清除对下一个阶段的感知。*'
- en: In the next sections of this letter, we will learn how to evolve into higher
    stages and what you, as an individual, should do that is meaningful.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 在这封信的下一部分，我们将学习如何进化到更高的阶段，以及作为个体，你应该做些什么才是有意义的。
- en: A Brief Description Of Evolution & Ultimate Reality
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 进化与终极现实的简要描述
- en: 'Two words:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 两个词：
- en: '*Transcend & include.*'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '*超越并包含*。'
- en: 'Okay, I lied. One more word:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，我骗了你们。再说一个词：
- en: '*Holons.*'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '*全息体*。'
- en: Wtf are you talking about Dan?
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 你在说什么呢，丹？
- en: A *holon* is a concept that helps describe the fabric and nature of reality.
    The building blocks of the universe. First coined by Arthur Koestler and now adopted
    by Ken Wilber, a holon is a whole/part. Both a whole in itself *and* a part of
    something else.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '*全息体*是一个有助于描述现实结构和本质的概念。宇宙的构建块。最初由亚瑟·科斯特勒提出，现在被肯·威尔伯采用，全息体是一个整体/部分。既是自身的一个整体，也是另一个事物的部分。'
- en: For those who have studied systems thinking or the Greek philosophy of the Kosmos
    – an orderly and harmoniously arranged system, like the universe, in which everything
    has a purpose – you see where this is going.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些研究系统思维或希腊哲学中的宇宙哲学的人来说 – 一个有序和谐排列的系统，就像宇宙一样，其中一切都有其目的 – 你会看到这会走向何方。
- en: '*Everything transcends and includes what came before it.*'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '*一切都在超越并包含其之前的东西*。'
- en: Atoms to molecules to cells to organisms. Letter to word to sentence to paragraph.
    Ego to group to world to cosmos. Employee to team to department to company. All
    of these interconnect infinitely, like how the employee is a whole in itself but
    also a part of a family, or group text, or the honey inside of a whole cup of
    coffee, both of which are processed by beekeepers and coffee manufacturers who
    may or may not be causing harm within their own whole processes. Reality is constructed
    of metaphorical holons. Metaphors breed understanding.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 从原子到分子到细胞到生物体。从字母到单词到句子到段落。从自我到群体到世界到宇宙。从雇员到团队到部门到公司。所有这些无限地相互连接，就像雇员本身是一个整体，但也是家庭、群组短信或整个咖啡杯中的蜂蜜的一部分，这些都被养蜂人和咖啡制造商加工，他们可能在自己的整个过程中造成伤害。现实是由隐喻性的整体构成的。隐喻孕育理解。
- en: '**Tip:** Holistic thinking, or thinking in holons, is quite fun and leads to
    deeper conversations and solutions.'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示**：整体性思维，或以整体为单位进行思考，非常有趣，并能引导深入的对话和解决方案。'
- en: One key insight is that reality is hierarchical. However, not all hierarchies
    are created the same. There are dominator hierarchies and natural/growth hierarchies.
    Dominator hierarchies or *imposed order*. They are often oppressive and harmful.
    It makes sense why the left wants to rid the world of these, but they often lump
    both hierarchies into the same group, which leads to them wanting to dismantle
    any and all order in the world, resulting in mass chaos (another massive reason
    we are in this position of meaninglessness). Natural hierarchies are *emergent
    order.* After conflict, pain, or problem-solving, a solution or level to the hierarchy
    emerges, transcends, and includes the rest, resulting in increasing wholeness
    and embrace.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 一个关键的洞见是现实是分层的。然而，并非所有的分层都是相同的。有支配型分层和自然/成长型分层。支配型分层或*强加的秩序*。它们往往是压迫性和有害的。这解释了为什么左派想要摆脱这些分层，但他们经常将这两种分层归为一类，这导致他们想要拆毁世界上任何和所有的秩序，从而导致大规模的混乱（这也是我们处于这种无意义状态的一个巨大原因）。自然分层是*涌现的秩序*。在冲突、痛苦或问题解决之后，一个解决方案或分层级别出现，超越并包括其余部分，从而实现整体性和包容性的增加。
- en: So, by aligning *what you do* with this highest order of the Kosmos – whose
    systemic properties can be mapped to that of God, Brahman, or any other omniscient,
    omnipresent, and omnipotent *identity* of reality (not reality itself) – you begin
    to see reality as an interconnected whole, and your place or purpose within it
    starts to shine through. You perceive how your being, doing, and becoming send
    a ripple through everyone and everything, and your decisions carry a vast weight
    of responsibility that crushes the weak and empowers the strong.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，通过将*你所做的事情*与宇宙的最高秩序对齐——其系统特性可以映射到上帝、梵天或现实中的任何其他全知全能的*身份*（而不是现实本身）——你开始将现实视为一个相互关联的整体，你在这个整体中的位置或目的开始变得明显。你意识到你的存在、行为和成长如何向每个人和每件事传递涟漪，你的决定承载着巨大的责任，压垮了弱者并赋予了强者力量。
- en: Since this has been cross-culturally mapped and studied, but not to the point
    of being fully synthesized or made sense of on a large enough scale to consider
    it the norm (hence the purpose behind my writing), it is wise to orient yourself
    in the direction of expansion of identity beyond your selfish needs through problem-solving,
    skill acquisition, and contribution to others.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这已经被跨文化地映射和研究，但还没有达到充分综合或在大规模上被充分理解的程度，以至于可以将其视为常态（因此我写作的目的），通过问题解决、技能获取和对他人的贡献来超越你自私的需求，这是一个明智的方向。
- en: 'That leads us into one of our most important lessons:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 这引导我们进入我们最重要的教训之一：
- en: So, What Do I Do With My Life?
  id: totrans-129
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那么，我该如何度过我的生活？
- en: Happiness is the feeling that power increases – that resistance is being overcome
    – Friedrich Nietzsche
  id: totrans-130
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 幸福是力量增加的感觉——阻力正在被克服——弗里德里希·尼采
- en: For Nietzsche, happiness is a sense of control over one’s surroundings. A sense
    that progress is being made.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 对于尼采来说，幸福是对周围环境的控制感。一种进步正在被做出的感觉。
- en: For Mihaly Csikszentmihalyi, the Godfather of flow psychology, this is the source
    of *enjoyment,* which I find to be a better descriptor than *happiness.*
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 对于流心理学的教父米哈伊·契克森米哈伊来说，这是*享受*的来源，我认为这是一个比*幸福*更好的描述词。
- en: But that begs the question, what do I make progress toward that leads to maximum
    enjoyment?
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 但这引发了一个问题，我朝着什么方向进步才能达到最大的享受？
- en: How can I find that perfect intersection of *what matters, what I’m good at,
    and what is needed*?
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 我如何找到*重要的事情、我擅长的事情和所需的事情*之间的完美交汇点？
- en: What do I learn? How do I learn? How do I contribute to humanity in a meaningful
    way that I can be paid well for?
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 我学到了什么？我是如何学习的？我如何以有意义的方式为人类做出贡献，从而获得良好的报酬？
- en: Here are a few steps.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些步骤。
- en: 1) Your Personal Path
  id: totrans-137
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 你的个人道路
- en: The first thing we must do is revolt against the meaningless path.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 我们必须做的第一件事是反抗没有意义的道路。
- en: We must start from scratch. We must reject the education system whose sole purpose
    is to breed *useful* workers who are dependent on another for their paycheck.
    In turn, they relinquish their control over their emotions (stress from paying
    bills) which impacts their potential (their mind remains narrow) and prevents
    them from change (if they dig themselves too deep).
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 我们必须从头开始。我们必须拒绝那种唯一目的是培养**有用**工人，他们依赖他人支付工资的教育体系。反过来，他们放弃了对自己情绪的控制（支付账单的压力），这影响了他们的潜力（他们的思维保持狭窄），并阻止他们改变（如果他们陷入太深）。
- en: How do we start from scratch?
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何从头开始？
- en: By ideating, creating, and iterating our own narrative. Our *own* story. Not
    the narrative that was assigned to you by parents, teachers, and peers.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 通过构思、创造和迭代我们自己的叙事。我们的**自己的**故事。不是父母、老师和同龄人分配给你的叙事。
- en: 'To do this, you create a vision and anti-vision. This starts to form a mental
    frame from which you can focus your attention on things that matter. Since we’ve
    already discussed that, here are a few key questions to uncover what you want
    to do:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 为了做到这一点，你创造了一个愿景和反愿景。这开始形成一个心理框架，你可以集中注意力在重要的事情上。既然我们已经讨论了这一点，这里有一些关键问题来揭示你想要做什么：
- en: What are you most bothered by? This could be behavior, the state of the world,
    how people think, etc.
  id: totrans-143
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你最烦恼的是什么？这可能包括行为、世界状况、人们的思维方式等。
- en: What were you most interested in as a child?
  id: totrans-144
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你小时候最感兴趣的是什么？
- en: If you could change one part of the world, what would it be, and are you conscious
    of its impact?
  id: totrans-145
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你能够改变世界的一个部分，那会是什么，你是否意识到了它的影响？
- en: Who are you most inspired by? Can you continue their work?
  id: totrans-146
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你最受谁的影响？你能继续他们的工作吗？
- en: If you could study something all day, what would it be?
  id: totrans-147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你可以整天研究某件事，那会是什么？
- en: There are a thousand more questions I could ask, but I will let you let those
    5 questions trigger more thoughts. Sit with them for at least 10 minutes. A notebook
    would be helpful.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 我还可以提出一千个更多的问题，但我会让你让这5个问题引发更多的思考。至少坐10分钟。一个笔记本会有所帮助。
- en: All you need is a starting point.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 你只需要一个起点。
- en: A spark of curiosity to kickstart your journey into the unknown.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 一丝好奇心来启动你进入未知世界的旅程。
- en: '*Your personal and unique path is the bridge between your anti-vision and vision.
    Acquiring knowledge, building solutions to problems, and developing yourself to
    take on more complex challenges. On that path, you can help others with the bridge
    you create.*'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: '**你个人和独特的道路**是你反愿景和愿景之间的桥梁。获取知识，构建解决问题的方案，并发展自己以承担更复杂的挑战。在这条路上，你可以通过你创造的桥梁帮助他人。'
- en: 2) Interest-Based Education
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 基于兴趣的教育
- en: 'Here’s the kicker:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是关键点：
- en: There is no right path.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 没有正确的道路。
- en: If I could assign you a path to take, you would end up in the same place. Replaceable
    and dependent. You must create your own path through a better style of education.
    Self-education.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我能为你指定一条道路，你最终会到达同一个地方。可替代的和依赖的。你必须通过更好的教育方式创造自己的道路。自我教育。
- en: I was a straight-A student in high school.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 我在高中时是一名全A学生。
- en: Before I went to college, my parents got divorced, money became scarce, and
    I rapidly realized that I didn’t want to end up in that situation. As a child,
    I was observant as to what made my parents’ lives seem unhappy, unhealthy, and
    unfulfilling.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 在我去上大学之前，我的父母离婚了，钱变得稀缺，我迅速意识到我不想陷入那种情况。作为一个孩子，我注意到了是什么让我的父母的生活看起来不快乐、不健康和不满足。
- en: That alone sparked my interest-based education. I began to question everything,
    and thanks to the internet, those questions could be partially answered. The other
    answers were found as my experience increased.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 仅此一点就激发了我基于兴趣的教育。我开始质疑一切，多亏了互联网，这些问题可以部分得到解答。其他答案则随着经验的增加而找到。
- en: I started by studying religion and then arguments against religion. When I couldn’t
    find answers that satisfied me, I started betting on myself. I dove into fitness
    and nutrition but realized that was only one domain of my life. I knew I had to
    get my financial situation in check, so I started learning about business. It
    all felt so shallow, so I dug deeper and dove into philosophy.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 我从研究宗教和反对宗教的论点开始。当我找不到让我满意的答案时，我开始相信自己。我深入到健身和营养领域，但意识到那只是我生活的一个领域。我知道我必须管理好我的财务状况，所以我开始学习商业。这一切都感觉太肤浅了，所以我深入挖掘，深入到哲学领域。
- en: Over the past 10 years, I’ve experimented with a plethora of nutrition models,
    training programs, business models, religious worldviews, metaphysical philosophies,
    and more that made me much more adaptable than any narrow specialized education
    could have.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的10年里，我尝试了大量的营养模型、训练计划、商业模式、宗教世界观、形而上学哲学等，这些都让我比任何狭窄的专业教育都要更具适应性。
- en: I realized that in order to be great at business, I had to move up a layer to
    philosophy of mind, meta systems, and more that grow you into higher stages of
    development.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 我意识到，要想在商业上取得卓越成就，我必须提升到心灵哲学、元系统等更高层次的领域，这些领域能帮助你进入更高的发展阶段。
- en: '**Now stick with me, here’s the cool part:**'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: '**现在，请跟我来，这是最酷的部分：**'
- en: Most of history’s greatest thinkers, like Marcus Aurelius, had the privilege
    of being taught by the world’s best teachers. To prepare them for leadership,
    they were mentored by top mathematicians and strategists. It’s not a matter of
    luck why they were great.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 历史上大多数最伟大的思想家，如马库斯·奥勒留斯，有幸得到世界上最好的老师的教导。为了准备他们成为领导者，他们得到了顶尖数学家和战略家的指导。他们之所以伟大，并不是运气的问题。
- en: This disappeared after the Industrial Revolution. Everyone started learning
    from teachers with poor incentives to be the greatest inside of a public school
    system.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 工业革命之后，这种情况消失了。每个人都开始从那些在公立学校系统中缺乏激励成为最优秀的人的教师那里学习。
- en: Now, with the rise of the internet and social media, *you* have access to the
    world’s greatest minds. They are posting content every day because that’s their
    *purpose.*
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，随着互联网和社交媒体的兴起，*你*可以接触到世界上最好的思想。他们每天都在发布内容，因为那是他们的*目的*。
- en: However, the information they distribute is still tailored to suit a shallow
    algorithm. You can pick up general information about a field, but it won’t lead
    to you being the best.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，他们传播的信息仍然是为了适应浅显的算法。你可以获取一个领域的泛泛信息，但这不会让你成为最优秀的人。
- en: 'So, my advice is this:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，我的建议是：
- en: When you feel that spark of curiosity, go all in.
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你感受到那股好奇心时，全力以赴。
- en: Follow new people. Buy books. Listen to podcasts on walks or commutes. Binge-watch
    YouTube lectures.
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关注新的人。购买书籍。在散步或通勤时听播客。狂热地观看YouTube讲座。
- en: When you find a topic important, purchase a course on it.
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你发现某个主题很重要时，购买关于它的课程。
- en: When you find one thing you want deeper education in, seek out a mentor.
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你发现你想深入学习某个领域时，寻找一位导师。
- en: We don’t live in ancient Greece, and you aren’t the heir to the throne. You
    don’t have the luxury of being given a great teacher by default.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不生活在古希腊，你也不是王位的继承人。你没有默认得到一位伟大老师的奢侈。
- en: So, you’re going to have to pay for their time. And that’s only a bad thing
    with people who either (1) don’t understand what money is or (2) have an irrational
    and poor relationship with money. If that’s you, read my letter, [*The Truth About
    Money*](https://thedankoe.com/letters/the-truth-about-money-and-how-to-make-a-ton-of-it/)*.*
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你得为他们的时间付费。对于那些要么（1）不理解金钱是什么，要么（2）与金钱关系不理性且糟糕的人来说，这仅仅是一个坏消息。如果你是这样的，请阅读我的信件，[*关于金钱的真相*](https://thedankoe.com/letters/the-truth-about-money-and-how-to-make-a-ton-of-it/)*.*
- en: No, modern mentors shouldn’t give out their knowledge for free. The lips of
    wisdom are closed except to the ears of understanding.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 不，现代导师不应该免费传授他们的知识。智慧之口只对理解者开放。
- en: 3) Contribution To Humanity
  id: totrans-175
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 对人类的贡献
- en: The purpose of this entire letter was to help you find meaning.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 整封信的目的就是为了帮助你找到意义。
- en: 'So far, we’ve learned:'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经学到：
- en: A meaningful life is a recursive relationship with being, doing, and becoming
    to appreciate, contribute to, and deepen your capacity for appreciation and contribution.
    The doing must come from being.
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有意义的生活是与存在、行动和成为的递归关系，以欣赏、贡献并深化你的欣赏和贡献能力。行动必须源于存在。
- en: You are a part of an evolved conscious form called society, culture, etc and
    it is your duty to maintain and strengthen that connection through contribution.
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你是社会、文化等进化了的意识形式的一部分，你有责任通过贡献来维持和加强这种联系。
- en: The best way to contribute is by finding the intersection of what matters, what
    I’m good at, and what is needed.
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最好的贡献方式是找到重要的事情、我擅长的事情和需要的事情的交集。
- en: In my eyes, the best way to learn and contribute is on the Internet. That’s
    where the attention is right now, and you need attention if you want to contribute
    in any meaningful way.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，学习和贡献的最好方式是在互联网上。那正是现在注意力的集中地，如果你想以任何有意义的方式做出贡献，你需要注意力。
- en: Personal brands and creators – who don’t get trapped in the popularity or status
    race – embrace the path of uncertainty and find meaning in the unique and helpful
    products they sell. They aren’t personal brands or content creators at all, actually.
    They are simply people who saw the opportunity of distributing the value they
    have to offer – and getting paid to do so – where the attention is right now.
    The place where *they can make the greatest amount of change.*
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 个人品牌和创作者——那些没有陷入流行或地位竞赛的人——拥抱不确定性的道路，在他们所销售的独特且有用的产品中找到意义。实际上，他们根本不是个人品牌或内容创作者。他们只是看到了将他们所能提供的价值进行分销的机会——并且为此获得报酬——在现在注意力集中的地方。这是他们能够带来最大改变的地方。
- en: If you want to sustain what you love to do, then you will have to make money.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要维持你所热爱的事情，那么你就必须赚钱。
- en: If you want to make money doing what you love, then you will have to start a
    business.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要通过做自己热爱的事情来赚钱，那么你就必须开始创业。
- en: If you want to start a business, you will have to educate yourself with the
    broad array of skills necessary to do so. That *is* a part of your interest-based
    education. At some point, if you want to continue your path of mastery, you will
    become interested in business. Hopefully, you will go through the stages of development
    so you can do so in a way that results in the least harm (no, businesses aren’t
    evil, but not starting one ensures that the evil ones dominate.)
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要创业，你必须通过掌握必要的广泛技能来教育自己。那确实是你的基于兴趣的教育的一部分。在某个时候，如果你想继续你的精通之路，你将开始对商业感兴趣。希望你能经历发展的各个阶段，这样你就可以以一种造成最少伤害的方式去做（不，企业不是邪恶的，但不开办企业确保了邪恶的企业占主导地位）。
- en: This is getting long, and I’ve written about this before, so I’ll end here.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
