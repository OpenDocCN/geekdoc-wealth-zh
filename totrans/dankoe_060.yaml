- en: Life Lessons Learned From A Decade Of Failures
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从十年失败中汲取的生活教训
- en: 原文：[https://thedankoe.com/letters/life-lessons-learned-from-a-decade-of-failures/](https://thedankoe.com/letters/life-lessons-learned-from-a-decade-of-failures/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/life-lessons-learned-from-a-decade-of-failures/](https://thedankoe.com/letters/life-lessons-learned-from-a-decade-of-failures/)
- en: Over the past six months, my life has been a blur of breakthroughs, big ideas,
    and exponential progress. I’ve been experimenting with improvement in all areas
    of my life — mind, body, spirit, business — and after 10 years of life’s ebbs
    and flows… things are starting to come together.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的六个月里，我的生活充满了突破、大想法和指数级进步。我一直在尝试改善生活的各个方面——心智、身体、精神、商业——经过10年的起伏不定后…事情开始变得有头绪。
- en: When I first started lifting weights, I reached “The Peak Of Mount Stupid” within
    a year.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 当我开始举重时，一年内就达到了“愚蠢之巅”。
- en: '![](../Images/4fc40740465f52a93c465a4d7435c7e1.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4fc40740465f52a93c465a4d7435c7e1.png)'
- en: Dunning Kreugar Effect
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 邓宁-克鲁格效应
- en: I was obsessed with learning the fundamentals of training and nutrition. I studied
    people like Layne Norton, Alan Aragon, Eric Helms, and OG fitness influencers
    like Matt Ogus, Chris Lavado, Chris Jones, Vitruvian Physique, Michael Kory, and
    Rob Lipsett ([who I had the pleasure of doing a podcast with a few months ago](https://open.spotify.com/episode/2LEFy0v4Hs18x5ZMT7BstX?si=f92bbfa7e3d44711&utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter)).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我沉迷于学习训练和营养的基础知识。我研究过莱恩·诺顿、艾伦·阿贡、埃里克·赫尔姆斯，以及像马特·奥格斯、克里斯·拉瓦多、克里斯·琼斯、维特鲁维安体质、迈克尔·科里和罗布·利普塞特等OG健身影响者（[几个月前我有幸与他们一起做了一期播客](https://open.spotify.com/episode/2LEFy0v4Hs18x5ZMT7BstX?si=f92bbfa7e3d44711&utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter)）。
- en: I became an IIFYM zealot. The only thing that mattered to me was calories and
    macros. I stuffed my face with frozen burritos, pop tarts, and anything I could
    get my hands on to hit my carbs, fats, and proteins.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我变成了IIFYM（按需摄入）的狂热者。对我来说，唯一重要的是卡路里和宏量营养素。我吃了很多冷冻玉米卷、泡芙，以及我能找到的任何东西，以摄入碳水化合物、脂肪和蛋白质。
- en: This worked to an extent. I gained quite a bit of muscle and strength. I was
    repping 275lbs on the bench press in my senior year in high school — but quickly
    realized that overdosing on Dr. Pepper every night while playing Halo 3 until
    3 AM wasn’t going to work. So I started experimenting.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这在一定程度上是有效的。我增加了大量的肌肉和力量。我在高中的最后一年在卧推上能举275磅——但很快意识到，每天晚上玩Halo 3直到凌晨3点，每晚喝大量Dr.
    Pepper是不行的。所以我开始尝试。
- en: The Optimal (Insert Aspect Of Life Here) Is A Myth
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最佳（此处插入生活方面）是一种神话
- en: Over the past 2 years, I have tried the vegan, keto, carnivore, low-carb, high-carb,
    and The Broke College Student diet.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的两年里，我尝试过素食、生酮、食肉、低碳、高碳以及“经济拮据的大学生”饮食。
- en: Recently, I became dogmatic about the pseudo-carnivore diet. In a nutshell,
    you eat mainly organ meats, muscle meats, gelatinous parts of the animal, in-season
    fruits, eggs, dairy, and a few other things. Heavy emphasis on sourcing the highest
    quality you can find.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，我对伪食肉饮食变得教条。简单来说，你主要吃器官肉、肌肉肉、动物的胶状部分、当季水果、鸡蛋、乳制品，以及一些其他东西。非常重视寻找你能找到的最高质量。
- en: The reason I was so dogmatic is that I was on a spree of elimination. I dropped
    alcohol, social events, and anything else that took my away from hitting my goal
    of 185 pounds. I had been trying to hit that weight for 3-4 years and finally
    got fed up with my lack of progress. ([This podcast explains how my 25th birthday
    sparked this drastic change in mindset](https://open.spotify.com/episode/5Q8aAd1OKfKZT4mVhEVF85?si=833e193f4e0147a6&utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter)).
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我之所以如此教条，是因为我正处于一种消除狂潮中。我戒掉了酒精、社交活动，以及任何其他分散我注意力的事情，以实现我185磅的目标。我已经尝试了3-4年，最终对缺乏进步感到厌倦。（[这个播客解释了我的25岁生日如何引发了这种心态的巨大转变](https://open.spotify.com/episode/5Q8aAd1OKfKZT4mVhEVF85?si=833e193f4e0147a6&utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter)）。
- en: Now that I have hit that goal, I am feeling myself moving from the “Slope Of
    Enlightenment” to the “Plateau Of Sustainability.”
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我已经达到了那个目标，我感觉自己正从“启蒙斜坡”转向“可持续平台”。
- en: 'Here are my recent realizations:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我最近的领悟：
- en: Balance Is Found Through Cycles Of Intensity
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过强度循环找到平衡
- en: Hustle culture loves to glorify monk mode and intensity. I love a good old monk
    mode when you feel pulled to go all-in on a lesser purpose — laser-focused deep
    work, getting a years worth of work done in a month, losing sleep because the
    ideas won’t stop flowing, and riding the wave of dopamine & intrinsic drive —
    but *sustainability* has to be taken into account.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 奋斗文化喜欢美化僧侣模式和高强度。当我感到被拉去全身心投入到一个较小的目标时，我喜欢古老的僧侣模式——激光般的专注深度工作，一个月内完成一年的工作量，因为想法源源不断而失眠，以及享受多巴胺和内在驱动的浪潮——但*可持续性*必须被考虑在内。
- en: If you stay in a state of intensity or optimization for too long, you hit a
    point of diminishing returns on quality of life.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你长时间处于强度或优化状态，你会在生活质量上遇到收益递减的点。
- en: '![](../Images/2689666c9b9ffa31ba89c8cf84c7f030.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2689666c9b9ffa31ba89c8cf84c7f030.png)'
- en: When I started optimizing too much, *life lost its zest*. Things became stressful.
    Everything outside of my normal routine was seen as a burden. If I didn’t control
    every little thing about my life, I couldn’t enjoy it for what it is.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当我开始过度优化时，*生活失去了活力*。事情变得有压力。除了我的正常日常之外的一切都被视为负担。如果我不能控制我生活中每一件小事，我就无法享受它本身。
- en: '**Trying to perfect every area of your life makes you hate the imperfections.**
    When you do this, you prevent yourself from enjoying the imperfection that is
    baked into the human condition.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**试图完美化你生活的每一个领域会让你讨厌不完美**。当你这样做时，你阻止了自己享受人类条件中固有的不完美。'
- en: Nature is perfect. Nature Is. Humans were blessed with thought. But thought
    overcomplicates and misinterprets nature as imperfect. Society models nature —
    over-optimizing this is not a way to live.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 自然是完美的。自然就是如此。人类被赋予了思考的能力。但思考过于复杂，误解了自然的不完美。社会模仿自然——过度优化并不是一种生活方式。
- en: Going home for the holidays to see my family only made me think about what I
    could eat, how much money I was spending, and when I would be able to go back
    home to “get back on it.” I could imagine myself judging their “normie” actions.
    Not being able to enjoy time with my own family. When I head home later today,
    I will be making a conscious effort to enjoy my time with them.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在假期回家看家人，只会让我思考我能吃什么，我花了多少钱，以及我什么时候能回家“重新开始”。我可以想象自己评判他们的“正常”行为。无法享受和家人在一起的时光。当我今天晚些时候回家时，我会努力享受和他们在一起的时光。
- en: However, these states of intensity and optimization are necessary. I wouldn’t
    have solidified these conclusions in my head without it. All self-improvement
    stems from awareness. Awareness is found by diving into the unknown. *You cannot
    improve what you are not aware of* — you cannot become aware of things you don’t
    know exist (they exist in the unknown… the uncomfortable… the realm of infinite
    potential).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这些强度和优化的状态是必要的。没有它们，我就无法在脑海中巩固这些结论。所有的自我提升都源于意识。通过深入未知来找到意识。*你不能改善你不知道的东西*——你不能意识到你不知道存在的东西（它们存在于未知中……不舒服的地方……无限潜力的领域）。
- en: When you transition out of these high-intensity states — you operate from a
    higher baseline on whatever you exponentially improved. Through intensity, you
    hit walls quickly. *You gain 1 year of experience in 1 month.* When you hit the
    metaphorical wall of over-optimization, life offers you a lesson. Are you going
    to learn from it?
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 当你从这些高强度状态中过渡出来时——你将在你指数级改进的任何事物上从一个更高的基准出发。通过强度，你会迅速遇到障碍。*你在一个月内获得一年的经验*。当你遇到过度优化的隐喻性墙壁时，生活会给你一个教训。你会从中学习吗？
- en: The Fundamentals (And Your Consistency With Them) Are What Matters
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基础（以及你对它们的坚持）才是最重要的
- en: Through my cycle of intensity, I have reached a higher baseline. I have better
    eating habits and my new fundamentals are locked down.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 通过我强度的循环，我已经达到了更高的基准。我有了更好的饮食习惯，我的新基础已经稳固。
- en: The fundamentals are what you can fall back on when things get too intense (or
    too lax). They are your system for getting results. They are the ‘levers’ for
    making progress.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 基础是你当事情变得过于激烈（或过于松懈）时可以依靠的东西。它们是你获得成果的系统。它们是推动进步的“杠杆”。
- en: When you feel lost, overwhelmed, or directionless in your pursuit of personal
    and business development, come back to the fundamentals — write them down.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在追求个人和商业发展时感到迷茫、不知所措或没有方向时，回到基础——把它们写下来。
- en: '**MY health fundamentals are now:**'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**我的健康基础现在如下：**'
- en: Daily raw liver, bone broth, and muscle meats for a pseudo-nose-to-tail carnivorous
    diet. Covering most bases in terms of vital nutrients.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每天生食肝脏、骨头汤和肌肉肉，以实现伪从头到尾的食肉主义饮食。在必需营养素方面覆盖了大部分。
- en: Fruit, white rice, and tubers to fill carbs.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用水果、白米和块茎来补充碳水化合物。
- en: Fermented foods like goat milk kefir
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发酵食品，如山羊奶酸奶
- en: My enlightenment elixir has and will remain a staple.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我的启迪灵药将一直保持基本。
- en: Full body training 3x a week
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每周全身训练3次
- en: Running and sprinting 4x a week
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每周跑步和短跑4次
- en: Light activity (like hiking) on the weekend
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 周末进行轻度活动（如远足）
- en: Hitting 1 gram of protein per pound of bodyweight
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每磅体重摄入1克蛋白质
- en: Stress and emotional regulation
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 压力和情绪调节
- en: Now that I am opening myself up to more social events, I am falling back to
    the 80/20 rule as I mentioned above. If I can stick to this for 80% of the time,
    it’s safe to say I will continue making exponential progress in health. Alcohol
    is still eliminated, for now, it caused too much trouble. However, I am having
    a good time experimenting with micro-dosing psilocybin (zero calories and a world
    of benefits when it comes to writing).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我开始参加更多的社交活动，我正在回归上面提到的80/20规则。如果我能坚持80%的时间，那么可以说我将继续在健康方面取得指数级的进步。酒精仍然被排除在外，因为现在它造成了太多的麻烦。然而，我在尝试微剂量裸盖菇素（在写作方面，它零热量且好处无穷）方面玩得很开心。
- en: The thing that gets me is the body of “flexible dieters” that have sustainability
    in mind. Take it even further and you have someone like Timbahwolf on Instagram
    who eats like shit and has a better physique than 99% of social influencers.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 让我感到惊讶的是，那些把可持续性放在心上的“灵活节食者”群体。更进一步，你会有像Instagram上的Timbahwolf这样的人，他吃得乱七八糟，但体形比99%的社会影响者都要好。
- en: The Rock eats pancakes. Michael Phelps smokes weed and eats a ton of pizza.
    What we see on Twitter is what we expose ourselves to. I completely forgot where
    I came from back in the day and may have attributed my progress poorly.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 洛奇吃煎饼。迈克尔·菲尔普斯抽大麻，吃很多披萨。我们在Twitter上看到的就是我们暴露给自己的。我完全忘记了过去我是从哪里来的，可能错误地归因于我的进步。
- en: '**From my reflection:** the biggest impact on *my* mental clarity, skin, and
    energy levels is from not overeating, being lean, having a purpose, stress regulation,
    training, and movement. NOT necessarily the ultra-high-quality high-fat diet that
    many are promoting. *Most people stop overeating, start moving, stay consistent,
    and lockdown some other principles* — THEN they go on to say it was some magic
    like eating raw liver or going keto. It seems like the cause and effect that people
    talk about in the health industry are misidentified — or polarized to promote
    a product.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**从我的反思来看：**对我精神清晰度、皮肤和能量水平影响最大的是不过量进食、保持瘦弱、有目标、压力调节、训练和运动。**并不一定是许多人推崇的超高质量高脂肪饮食**。**大多数人停止过量进食，开始运动，保持一致性，并锁定一些其他原则**——然后他们才会说这是某种魔法，比如吃生肝或进行生酮饮食。看起来健康行业人们谈论的原因和效果似乎被误认了——或者被极化来推广产品。'
- en: I am not saying this to sway your opinion. I’m saying this so you approach life
    critically. With an open mind. Not limiting what could lead to enjoyment because
    you limit your awareness and knowledge of *all areas* of one given field. I value
    critical thinking and nuance — I will be heading in that direction more instead
    of being so dogmatic about a specific way of eating.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我并不是要改变你们的观点。我是要你们以批判性的态度去面对生活。保持开放的心态。不要限制可能导致快乐的事物，因为你限制了你对一个特定领域的所有领域的意识和知识。我重视批判性思维和细微差别——我将会更多地朝这个方向发展，而不是对一种特定的饮食方式过于教条。
- en: Am I going to start gorging on junk food? No. I will test and experiment as
    you should. From this new baseline and level of awareness, I will be able to accurately
    see the short-term effects on my body.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我是不是要开始大吃垃圾食品？不。我会像你们一样进行测试和实验。从这个新的基准和意识水平出发，我能够准确看到对我的身体产生的短期影响。
- en: When traveling, you bet your ass I’m not missing out on commonly demonized foods
    like pasta, bread, and other carb sources. I’ll probably post some pictures on
    [Insta](https://instagram.com/thedankoe?utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter)
    of all the BBQ I’ll be eating in Texas next week. These are demonized by some
    researchers and glorified by others.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 当旅行时，我肯定不会错过像意大利面、面包和其他碳水化合物来源这样的常见被诋毁的食物。我可能会在下周在德克萨斯州吃烧烤时，在[Insta](https://instagram.com/thedankoe?utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter)上发一些照片。这些食物被一些研究人员诋毁，被另一些研究人员赞美。
- en: If you want to break out of whatever health ideology or religion you have subscribed
    to, [I’ve started listening to this older Joe Rogan podcast with Layne Norton
    and Dom D’Agostino](https://open.spotify.com/episode/1G5UGm5BqnbAFoefA20zx1?si=Yjrk8KDZThqDY-y8yKWWhg&utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter)
    (they debate about flexible dieting and keto).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要摆脱你已订阅的任何健康理念或宗教，[我已经开始收听这个较老的乔·罗根播客，与莱恩·诺顿和多姆·达戈斯蒂诺一起](https://open.spotify.com/episode/1G5UGm5BqnbAFoefA20zx1?si=Yjrk8KDZThqDY-y8yKWWhg&utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter)（他们辩论关于灵活饮食和生酮饮食）。
- en: This is the beauty of these “Cycles Of Intensity.” My health philosophy is an
    amalgamation of the experience I’ve gained throughout my 10 years of improving
    it. It is backed by research and experience from all sides. This is powerful and
    is the same for other pillars of my life.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这是这些“强度周期”的美丽之处。我的健康哲学是我过去10年改善过程中获得的经验的综合。它得到了来自各个方面的研究和经验的支持。这是强大的，并且对我来说，我的生活的其他支柱也是如此。
- en: This does not eliminate the merit of a disciplined lifestyle. This IS a disciplined
    lifestyle. This “balanced” lifestyle is harder to pull off than eliminating things
    entirely — but with a higher potential reward. This is why intensity is needed
    to find balance. I spun my wheels for multiple years because I was afraid to go
    all in. I was afraid to learn the lessons that life had waiting for me in the
    unknown.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这并没有消除有纪律的生活方式的好处。这正是有纪律的生活方式。这种“平衡”的生活方式比完全消除事物更难实现——但潜在回报更高。这就是为什么需要强度来找到平衡。我多年来一直在原地打转，因为我害怕全力以赴。我害怕学习生活中在未知中等待我的教训。
- en: This is very different — yet very similar — compared to my previous diet. I
    got to this point through conscious experimentation.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这非常不同——但也很相似——与我的之前饮食相比。我是通过有意识的实验达到这个阶段的。
- en: '**Life Is A Series Of Science Experiments**'
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**生活是一系列科学实验**'
- en: I have been speaking in terms of health here… but this applies to all areas
    of life.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里一直在谈论健康……但这适用于生活的所有领域。
- en: '*Every single topic can be argued and researched to the end of the Earth.*
    If I want to be dogmatic about holistic health, I can find research and compelling
    arguments backing that. There is no fun in that though. The fun comes from being
    open-minded, holding things in the realm of possibility, questioning everything,
    and solidifying a nuanced perspective through direct experience.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '*每个话题都可以辩论和研究到地球尽头.* 如果我想对整体健康持教条主义，我可以找到研究和有说服力的论据支持这一点。但这没有乐趣。乐趣来自于保持开放的心态，把事物保持在可能性的领域，质疑一切，并通过直接经验巩固一个细微的观点。'
- en: Life is about experimentation. Learning what you like and don’t like. Seeing
    what works and what doesn’t. Slowly making small upgrades in the traits, skills,
    and wisdom that your character holds. These small boosts in experience and upgrades
    lead to massive results in the game of life (sometimes you don’t even notice them
    until you reflect on your progress).
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 生活就是实验。了解你喜欢和不喜欢什么。看到什么有效，什么无效。慢慢地提升你性格中持有的特质、技能和智慧。这些经验的小提升和升级导致你在人生游戏中取得巨大成果（有时你甚至直到反思你的进步才意识到它们）。
- en: For me, I switched majors in college 6 times before I came across coding. That
    led to a dopamine-fueled extravaganza of learning to code. That led to experimenting
    with freelancing and other online business models. That led to starting Modern
    Mastery. The progress has been immense.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我来说，我在大学里换了六次专业，才接触到编程。这导致了一场由多巴胺驱动的学习编程的狂欢。这导致了我尝试自由职业和其他在线商业模式。这导致了我创办了现代精通。进步是巨大的。
- en: 'If you have no idea what to pursue — your life’s work, your purpose, your passions
    — **you must start experimenting**. You need to throw shit at a wall and see what
    sticks. *You need to try enough things until you experience that intrinsic drive
    that pulls you into a high-intensity state.* This happens thanks to dopamine.
    Dopamine separates signal from noise. Dopamine tells you that you are doing something
    right (beware: cheap dopamine).'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道要追求什么——你的人生工作、你的目标、你的激情——**你必须开始实验**。你需要把东西扔到墙上，看看什么会粘住。*你需要尝试足够多的事情，直到你体验到那种内在的驱动力，它把你拉入高强度状态.*
    这要归功于多巴胺。多巴胺将信号与噪音分开。多巴胺告诉你你正在做正确的事情（小心：廉价的 dopamine）。
- en: How do you start experimenting? You treat all areas of your life as a science
    project.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何开始实验？你把你生活的各个方面都当作一个科学项目来对待。
- en: '![](../Images/db3c3cc4dc3568ef2a34d6766991857c.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/db3c3cc4dc3568ef2a34d6766991857c.png)'
- en: The Scientific Method
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 科学方法
- en: Your body is a project. Your health is a project. Your relationships are a project.
    Your business is a project. All of these have more projects embedded in them.
    The “Project Mindset” is powerful. My roommate has started thinking of his body
    as a project. This simple act made him track his improvements, lose 80 pounds,
    and be mindful of how he “works” on this project.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 你的身体是一个项目。你的健康是一个项目。你的关系是一个项目。你的商业是一个项目。所有这些都包含着更多的项目。“项目心态”是强大的。我的室友开始把他的身体当作一个项目来思考。这个简单的行为让他跟踪他的进步，减掉了80磅，并注意如何在这个项目上“工作”。
- en: Projects imply a desired outcome (improvement), steps to completion (goals and
    metrics), and actions that will move you closer to completion (priorities).
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 项目意味着一个期望的结果（改进），完成步骤（目标和指标），以及将你推向完成的行为（优先事项）。
- en: Experiments imply risks that you need to take into account, intention, testing,
    and iteration. This means that you have to see an experiment through. You can’t
    quit before things start to get good.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 实验意味着你需要考虑的风险、意图、测试和迭代。这意味着你必须坚持到底。在事情开始变好之前，你不能放弃。
- en: They also imply failure. Not all experiments are successful. When you think
    of this as a project, it is easier to detach from the outcome. You see failure
    as a chance to iterate and improve. Failure is feedback on what to improve. Looping
    back to awareness — *you cannot improve what you are not aware of.*
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 它们也意味着失败。并非所有实验都成功。当你把它当作一个项目来思考时，更容易从结果中抽身。你将失败视为迭代和改进的机会。失败是对需要改进之处的反馈。回到意识层面——*你不能改善你不知道的东西*。
- en: 'You need to come into your experiments with an open and curious mind. This
    will give room for questioning. Curiosity is fueled by questions. Question: What
    would life look like if I tried this thing I’ve never tried before?'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要带着开放和好奇的心态进入你的实验。这将留出提问的空间。好奇心由问题激发。问题：如果我尝试这个我从未尝试过的事情，我的生活会是什么样子？
- en: You will naturally feel the pull to dive into the unknown. If you don’t, keep
    asking questions until you feel energized. That is your call to adventure. A call
    to become an explorer of the unknown. A call to start actualizing your potential.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 你自然会感到一股冲动，想要深入未知。如果你没有这种感觉，继续提问，直到你感到充满活力。这是你的冒险召唤。一个成为未知探索者的召唤。一个开始实现你潜能的召唤。
- en: '**The Meaning Of Life Is To Pass Down Your Experiences**'
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**生命的意义在于传承你的经验**'
- en: Experiments = experience.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 实验 = 经验。
- en: Experimentation is how you find what works for you. Experimentation is how you
    form your personal health, wealth, and relationships philosophy — allowing you
    to pass down your lessons and make money doing so (this is arguably the meaning
    of life per ancient and modern teachers, self-transcendence).
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 实验是找到对你有效的方法。实验是形成你个人健康、财富和人际关系哲学的方法——让你能够传承你的教训并从中赚钱（这可以说是古代和现代教师们所认为的生命意义，自我超越）。
- en: Experimentation is how you form your life philosophy. An operating manual that
    keeps you on the enjoyable, sustainable, and fulfilling path.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 实验是形成你人生哲学的方法。一本操作手册，让你保持在愉快、可持续和满足的道路上。
- en: Since we talk a lot about business here — this ties in perfectly. Business —
    in our case online business — is your vessel for pursuing your life’s work. Your
    life’s work consists of pursuing your interests (experiments), becoming a niche
    of one (understanding how to market, sell, and distribute), and packaging up your
    experiences in a way that the end-user can digest and implement. Money is a byproduct
    of your irreplaceable value.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们在这里谈论了很多关于商业的内容——这完美地结合在一起。在我们的案例中，商业——在线商业——是你追求你人生工作的载体。你的人生工作包括追求你的兴趣（实验），成为一个细分市场的专家（理解如何营销、销售和分销），以及以用户可以消化和实施的方式打包你的经验。金钱是你不可替代的价值的副产品。
- en: If you enjoyed this blog post — you can get early access to all of them by subscribing
    to [The Mastery Letter](https://join.modernmastery.co/the-mastery-letter).
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你喜欢这篇博客文章——你可以通过订阅[掌握信件](https://join.modernmastery.co/the-mastery-letter)来提前获取所有内容。
