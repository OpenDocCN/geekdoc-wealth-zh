- en: How To Become A Millionaire In Your 20s
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/how-to-become-a-millionaire-in-your-20s/](https://thedankoe.com/letters/how-to-become-a-millionaire-in-your-20s/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I always hated the feeling of doing so much for so little.
  prefs: []
  type: TYPE_NORMAL
- en: Waking up at 3am for a morning shift at my minimum-wage job.
  prefs: []
  type: TYPE_NORMAL
- en: Going to school for 8 hours a day knowing in the back of my mind that I was
    spending all this time to make *as much or less* than the average person in my
    future.
  prefs: []
  type: TYPE_NORMAL
- en: Putting in my all for someone else’s company and making the same amount no matter
    how hard I worked.
  prefs: []
  type: TYPE_NORMAL
- en: I had this mindset early.
  prefs: []
  type: TYPE_NORMAL
- en: When I explain this to people, they tell me I was very observant as a child.
  prefs: []
  type: TYPE_NORMAL
- en: I could see that most people were unhappy, sluggish, and stressed about almost
    every decision they made. Especially financial decisions.
  prefs: []
  type: TYPE_NORMAL
- en: So my attention went towards the opposite. I spent much of my late teens dissecting
    what made successful people successful.
  prefs: []
  type: TYPE_NORMAL
- en: I always had this dream of becoming a “millionaire.”
  prefs: []
  type: TYPE_NORMAL
- en: It sounded so enticing.
  prefs: []
  type: TYPE_NORMAL
- en: Something about that label… *millionaire.*
  prefs: []
  type: TYPE_NORMAL
- en: The status. The freedom. The lack of stress.
  prefs: []
  type: TYPE_NORMAL
- en: But now, as a person who has become one, I can tell you that everything you
    think about becoming a millionaire is true.
  prefs: []
  type: TYPE_NORMAL
- en: I’m not going to downplay it. When I think back to when I was struggling to
    pay a measly $300 for my share of rent in a house shared with 7 other roommates,
    I’m grateful. It’s a blessing and a curse not to have to worry about what you
    spend on 99% of your purchases.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, just because you become a millionaire doesn’t mean your life is perfect
    all day long. Developing the financial domain of your life doesn’t mean you’ve
    developed the mental, physical, social, and spiritual domains.
  prefs: []
  type: TYPE_NORMAL
- en: In fact, if you look around, life is pretty terrible for most people who *only*
    focus on the money.
  prefs: []
  type: TYPE_NORMAL
- en: So, before we begin, keep that in mind.
  prefs: []
  type: TYPE_NORMAL
- en: I’m going to give you the exact steps to become a millionaire in your 20s.
  prefs: []
  type: TYPE_NORMAL
- en: But understand that making money will only solve your money problems.
  prefs: []
  type: TYPE_NORMAL
- en: And most of your money problems aren’t actually money problems. They’re psychological
    problems. Money isn’t going to do as much for you as you think it is unless you
    dedicate yourself to becoming the highest version of yourself.
  prefs: []
  type: TYPE_NORMAL
- en: What They Don’t Teach You In School
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you’re reading this, you were raised by people who lived and were conditioned
    by the old economy.
  prefs: []
  type: TYPE_NORMAL
- en: “Invest your savings in your 401k and the stock market,” said Mom.
  prefs: []
  type: TYPE_NORMAL
- en: “Real estate is how 99% of people become millionaires,” said the random wealthy
    old guy in Scottsdale.
  prefs: []
  type: TYPE_NORMAL
- en: “Be frugal. Save every last penny. Collect coupons. Don’t make impulsive decisions.”
    said the person with a boring life that nobody wants to live.
  prefs: []
  type: TYPE_NORMAL
- en: “Go to school and study something you don’t care about to get a job,” said almost
    everyone who doesn’t understand the model of our public school system was adopted
    from a Prussian military state – reflecting the education given to slaves – and
    was created to keep people narrow-minded and dependent on the dominant social
    system while discouraging generalism, exploration, and building toward a unique
    vision.
  prefs: []
  type: TYPE_NORMAL
- en: No thanks.
  prefs: []
  type: TYPE_NORMAL
- en: We are living through the second renaissance for heaven’s sake.
  prefs: []
  type: TYPE_NORMAL
- en: The new rich understand that ideas are the new oil in a world where anyone can
    learn and build anything (if you’ve been keeping up with indie hacking, you know
    non-coders are building MVP apps over a weekend with new AI tools.)
  prefs: []
  type: TYPE_NORMAL
- en: They understand that new generations are building wealth in the idea space,
    not the physical space (the physical space still matters, but it exists at a premium
    now reserved for those who have already built cash flow).
  prefs: []
  type: TYPE_NORMAL
- en: Digital space is infinite. Physical space is finite.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are 3 things you need to know about this era where people become millionaires
    by posting memes and knowledge:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) The Digital Landscape
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It took a while for it to click for me.
  prefs: []
  type: TYPE_NORMAL
- en: I was raised to think that I should budget every penny and “get rich slow.”
  prefs: []
  type: TYPE_NORMAL
- en: But that never sat well in my mind.
  prefs: []
  type: TYPE_NORMAL
- en: Thanks to the internet, I was brutally aware that there *were* people making
    an income doing what they enjoy. I consumed their content every day. That was
    enough proof for me to try to achieve that reality by all means possible.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before we dig into the details, this is what you need to understand:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) If you want to make money outside of a job, *you* need to build and distribute
    the product.**'
  prefs: []
  type: TYPE_NORMAL
- en: I will continue repeating this until everyone and their mother realize how dependent
    they are on the dominant paradigm for their survival because they didn’t continue
    to learn after (or before) leaving the school system.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t create a product to sell, you will continue selling a product for
    someone else.
  prefs: []
  type: TYPE_NORMAL
- en: The only reason you are making any form of an income right now is because you
    play one *specific* role in a company that makes said money by selling a product
    or service.
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2315">![](../Images/d5d8964927cb6c7aabe9632b56cd8a13.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: In other words, if you want to earn your freedom, first, you need a business,
    and second, you need a product by which people voluntarily trade their money for
    the value encapsulated in said product.
  prefs: []
  type: TYPE_NORMAL
- en: Long story short, build something you can sell or your survival, and those stress
    and emotions, will be like uncontrollable waves determined by a company.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) The internet made business and education accessible to anyone with a wifi
    connection.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'If you are reading this:'
  prefs: []
  type: TYPE_NORMAL
- en: You can learn anything in 3-6 months (less time if you’re obsessed, I learned
    to animate [this video](https://youtu.be/hN-ITerTpLg) in 2-3 weeks).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can write about your interests and attract an audience.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can teach your interests as a product or service with zero money to your
    name
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Or, you can freelance with a marketable skill until you feel the need to productize
    and teach.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you want to become a millionaire, you can take the long route that your parents
    and teachers taught you, but most of them aren’t millionaires, so why are you
    listening to them?
  prefs: []
  type: TYPE_NORMAL
- en: Every single skill I use today was learned from a course, random string of articles
    from diving down a curiosity rabbit hole, and trial and error.
  prefs: []
  type: TYPE_NORMAL
- en: Every single penny I make is directly controlled by what I build, how many people
    see it, and if those people care.
  prefs: []
  type: TYPE_NORMAL
- en: If you aren’t learning and building on the internet, I implore you to look at
    what you are actually doing.
  prefs: []
  type: TYPE_NORMAL
- en: Audit your day down to the minute.
  prefs: []
  type: TYPE_NORMAL
- en: Are you doing the things that will compound into achieving your goals?
  prefs: []
  type: TYPE_NORMAL
- en: Or are you waiting around, hoping that it will someday magically appear if you
    scroll social media enough?
  prefs: []
  type: TYPE_NORMAL
- en: 2) The Labor Theory Of Value Doesn’t Work
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You can work hard at anything but that doesn’t mean it’s useful to the progress
    of humanity.
  prefs: []
  type: TYPE_NORMAL
- en: This is the delusion of hard work.
  prefs: []
  type: TYPE_NORMAL
- en: You can put 4 years of work into getting a degree.
  prefs: []
  type: TYPE_NORMAL
- en: You can put 10 years of work into climbing a corporate ladder.
  prefs: []
  type: TYPE_NORMAL
- en: And still, you won’t be paid anywhere close to what you want.
  prefs: []
  type: TYPE_NORMAL
- en: So, rather than taking your future into your own hands, you whine and complain.
  prefs: []
  type: TYPE_NORMAL
- en: “I deserve to be paid more!”
  prefs: []
  type: TYPE_NORMAL
- en: “I’ve spent 14 years working hard and this is all I get for it?”
  prefs: []
  type: TYPE_NORMAL
- en: “I barely have any time for my family. I don’t have enough to take a vacation.
    I slave away with no light at the end of the tunnel.”
  prefs: []
  type: TYPE_NORMAL
- en: 'The complainers of the world are missing one crucial piece of the puzzle:'
  prefs: []
  type: TYPE_NORMAL
- en: The labor theory of value is that you should be paid for the amount of work
    you do.
  prefs: []
  type: TYPE_NORMAL
- en: To feel as if you have jumped through hoops.
  prefs: []
  type: TYPE_NORMAL
- en: To feel like you deserve something.
  prefs: []
  type: TYPE_NORMAL
- en: But that’s not how reality works.
  prefs: []
  type: TYPE_NORMAL
- en: Money is a unit of value.
  prefs: []
  type: TYPE_NORMAL
- en: Value is a measure of how much people care about what you do.
  prefs: []
  type: TYPE_NORMAL
- en: How valuable you are = the magnitude of problems you solve, the results of the
    solutions you create, and your ability to get people to care about your creation.
  prefs: []
  type: TYPE_NORMAL
- en: If you aren’t happy with how much you make, it may be time to take a brutally
    honest look at what you contribute to the world.
  prefs: []
  type: TYPE_NORMAL
- en: It does not make sense to pay someone based on the amount of work they do. It
    does make sense to pay someone based on the level of problem they solve.
  prefs: []
  type: TYPE_NORMAL
- en: Why?
  prefs: []
  type: TYPE_NORMAL
- en: I can work hard for 1 year at writing to become an author, but 1 year isn’t
    enough to justify $100,000 of compensation. Many times, that writing can be perceived
    as less valuable than a burger flipper making minimum wage. It’s not *what you
    do,* it’s *how you do it, and who you do it for.*
  prefs: []
  type: TYPE_NORMAL
- en: You only make as much money as other people *care* about *what you’ve done*
    within that year. That is, how your creation benefits them so that they use it
    to solve a problem, change their life, and bring progress to humanity.
  prefs: []
  type: TYPE_NORMAL
- en: Complaining about not being paid enough is not going to get you paid. In fact,
    it will probably get you fired or ignored. Or just hated by anyone you come into
    contact with because they are thinking, “Ok… what are you going to *do* about
    it?”
  prefs: []
  type: TYPE_NORMAL
- en: The only option is to take matters into your own hands.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Passive Income VS Cash Flow
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For 99% of people, passive income is a pipe dream.
  prefs: []
  type: TYPE_NORMAL
- en: Passive income is built by investing excess and abundant active income from
    a cash-flow business like I teach in [Digital Economics](https://digitaleconomics.school).
  prefs: []
  type: TYPE_NORMAL
- en: Most people aren’t going to outpace inflation by investing a few 10 thousand
    a year into the stock market or their retirement fund.
  prefs: []
  type: TYPE_NORMAL
- en: You need excess.
  prefs: []
  type: TYPE_NORMAL
- en: You either need a top 1% job (which, like getting into the NBA, the chances
    of the average person doing so is close to zero) or you need to build a business
    where your income is entirely dependent on your skill acquisition, personal growth,
    and ability to persist and iterate.
  prefs: []
  type: TYPE_NORMAL
- en: A cash flow business comes down to simple cybernetics and mathematics.
  prefs: []
  type: TYPE_NORMAL
- en: '**Cybernetics** is that a system self-regulates to achieve a goal.'
  prefs: []
  type: TYPE_NORMAL
- en: In other words, when you set your mind on a goal, listen to feedback, and correct
    your actions according to that feedback, you will achieve the goal. Cybernetics
    illustrates that low-intelligence systems (or minds) are the ones who quit rather
    than pivot. They aren’t smart enough to realize that any problem can be solved
    or diverted by evolving the goal they are pursuing.
  prefs: []
  type: TYPE_NORMAL
- en: With that, think big. Think digital. Think infinite. Give your mind room to
    connect the dots.
  prefs: []
  type: TYPE_NORMAL
- en: You only have so much time in the day.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, you will spend the same amount of time building a brick and mortar
    coffee shop (limited to a few hundred thousand dollars) as you will any internet
    business (with close-to-zero startup costs and income limits only dependent on
    your creativity.)
  prefs: []
  type: TYPE_NORMAL
- en: '**Mathematics** is a simple understanding of the system itself and what you
    need to do.'
  prefs: []
  type: TYPE_NORMAL
- en: If you want to make $1 million in 1 year, break it down.
  prefs: []
  type: TYPE_NORMAL
- en: $1,000,000 / 12 = $83,333 per month
  prefs: []
  type: TYPE_NORMAL
- en: $83,333 / 30 = $2,777 per day
  prefs: []
  type: TYPE_NORMAL
- en: Now, there are a few ways to do that.
  prefs: []
  type: TYPE_NORMAL
- en: Sell 18 $150 products a day
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sell 111 $25 products a day
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Land one $5000 client every other day
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Land one $10,000 client every 4 days
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A combination of both. 1-2 clients a week and a few product sales a day.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This alone determines a lot of your decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: If you go the client route, you will probably need a team (or have the service
    so productized you can handle fulfillment yourself).
  prefs: []
  type: TYPE_NORMAL
- en: If you go the product route, you will need a lot of traffic.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s assume you’re skilled at social media.
  prefs: []
  type: TYPE_NORMAL
- en: You can get 50-100,000 views per YouTube video or 1-5 million impressions on
    social media per month.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, you’ll have the occasional anamoly of much more views or impressions.
  prefs: []
  type: TYPE_NORMAL
- en: To make 18 sales a day on a $150 product, you would need to send 720 people
    to a product page with a 2.5% conversion rate.
  prefs: []
  type: TYPE_NORMAL
- en: If you can’t do that with 4-8 videos a month or an active social account, skill
    issue. Get better. You’re in control of how many views you get and how many clicks
    result from that.
  prefs: []
  type: TYPE_NORMAL
- en: But *how* do we do this?
  prefs: []
  type: TYPE_NORMAL
- en: Pull 2 Levers To Make $1 Million In Your 20s
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You need a product (or service).
  prefs: []
  type: TYPE_NORMAL
- en: You need distribution (an audience).
  prefs: []
  type: TYPE_NORMAL
- en: Beyond that, the entirety of your success comes down to experimentation and
    iteration. Trial and error.
  prefs: []
  type: TYPE_NORMAL
- en: You can supplement with courses like [2 Hour Writer](https://2hourwriter.com)
    for distribution and [Mental Monetization](https://mentalmonetization.com) for
    product, but courses are simply other processes for you to experiment with in
    a less error-prone direction. Courses don’t account for your state of consciousness
    and prior experience unless you are the perfect customer avatar, which you aren’t,
    because you are the only one with access to your mind.
  prefs: []
  type: TYPE_NORMAL
- en: '1) Product: The Only Way To Make An Independent Income'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To avoid confusion, I use the word *product* to define anything that you sell.
    That can be a service as well.
  prefs: []
  type: TYPE_NORMAL
- en: 'The other day in the Kortex community, someone asked a great question:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“I’m not confident in my abilities to sell a product. I have results, but
    I didn’t use a framework or specific steps, I kinda just did it, so I’m not sure
    how I could help someone else.”*'
  prefs: []
  type: TYPE_NORMAL
- en: This could apply to fitness, mental health, programming, anything.
  prefs: []
  type: TYPE_NORMAL
- en: Many people think they can’t sell a product because they’ve gotten results,
    but they didn’t use a specific process, program, or framework to do that thing.
  prefs: []
  type: TYPE_NORMAL
- en: What you don’t realize is that’s the perfect place to start with a product.
  prefs: []
  type: TYPE_NORMAL
- en: How does anyone create a product?
  prefs: []
  type: TYPE_NORMAL
- en: You don’t just plagiarize someone else’s framework.
  prefs: []
  type: TYPE_NORMAL
- en: You create your own. Creating your own requires real world feedback from customers
    after you experiment for yourself.
  prefs: []
  type: TYPE_NORMAL
- en: You create an MVP (minimum viable product).
  prefs: []
  type: TYPE_NORMAL
- en: You get a first round of customers or free users.
  prefs: []
  type: TYPE_NORMAL
- en: You listen to feedback and gauge results.
  prefs: []
  type: TYPE_NORMAL
- en: You implement feedback and attempt to make your product better.
  prefs: []
  type: TYPE_NORMAL
- en: Then, once you have solid results, you can market harder and be confident you
    are able to do this.
  prefs: []
  type: TYPE_NORMAL
- en: It’s the same as a beginner freelancer landing clients. They do it for relatively
    cheap until they are very confident in their abilities. They gain *real-world
    experience* as opposed to just theory they’ve learned about and personal projects
    they’ve built.
  prefs: []
  type: TYPE_NORMAL
- en: 'My entire product philosophy is:'
  prefs: []
  type: TYPE_NORMAL
- en: Build a product you’ve used before, but better.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Solve your own problems and sell the solution.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Build a product you want but doesn’t exist.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Most people should start with the first one, advance to the second, and once
    they have cash flow, move onto the third.
  prefs: []
  type: TYPE_NORMAL
- en: But you have to realize that you can create any product you want.
  prefs: []
  type: TYPE_NORMAL
- en: How many planners can you find on Amazon? A billion.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can create one too by:'
  prefs: []
  type: TYPE_NORMAL
- en: Purchasing 3-5 planners
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using them and noticing what doesn’t flow
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mapping out your own planner
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using it and improving it over a week or two
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, package it up and sell it.
  prefs: []
  type: TYPE_NORMAL
- en: Listen to customer feedback, make it better.
  prefs: []
  type: TYPE_NORMAL
- en: 'Simple. Now you have the *ability* to make money, but you need one more thing:'
  prefs: []
  type: TYPE_NORMAL
- en: '2) Distribution: How To Survive Going Into The Future'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Build distribution, then build whatever you want. – Jack Butcher
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Distribution is your potential to get *what you build* in front of *people who
    care.*
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have a product we’ve built, we need to get it in front of people.
  prefs: []
  type: TYPE_NORMAL
- en: The most accessible way to get in front of people is on the internet.
  prefs: []
  type: TYPE_NORMAL
- en: The front end of the internet is media.
  prefs: []
  type: TYPE_NORMAL
- en: 'Legacy media is dying, so you have a few options:'
  prefs: []
  type: TYPE_NORMAL
- en: '**There are 3 types of distribution:**'
  prefs: []
  type: TYPE_NORMAL
- en: '*Built, borrowed, and bought.*'
  prefs: []
  type: TYPE_NORMAL
- en: You **build** distribution by growing an audience with internet content. Then,
    you can (and should) take it a step further by “de-platforming” your audience.
  prefs: []
  type: TYPE_NORMAL
- en: You de-platform by funneling your audience to a community or newsletter. These
    can be free or paid.
  prefs: []
  type: TYPE_NORMAL
- en: Social media platforms can go *poof* at any time. Your account can get suspended,
    you can get canceled, or you may just hate social media enough to leave.
  prefs: []
  type: TYPE_NORMAL
- en: But, they can’t take an off-platform community or email list away from you.
    And, these are your most dedicated readers, so it’s better to give them the most
    value and attention anyway.
  prefs: []
  type: TYPE_NORMAL
- en: You **borrow** distribution by leveraging other people’s audience, community,
    or newsletter.
  prefs: []
  type: TYPE_NORMAL
- en: You can be hosted on their podcast and plug your offers.
  prefs: []
  type: TYPE_NORMAL
- en: Or, your ideas can be so unique that they mention you on their podcast without
    you being there. They can give credit to your ideas in their posts, newsletters,
    and even a full-fledged book at times.
  prefs: []
  type: TYPE_NORMAL
- en: This is the game you eventually want to play. Make your ideas so contagious
    that your distribution continues to grow without any manual effort.
  prefs: []
  type: TYPE_NORMAL
- en: Let your ideas live in peoples’ heads rent-free.
  prefs: []
  type: TYPE_NORMAL
- en: You **buy** distribution in many different ways.
  prefs: []
  type: TYPE_NORMAL
- en: The various options for paid ads are the obvious ones, but not the most powerful.
  prefs: []
  type: TYPE_NORMAL
- en: You can buy sponsorship spots on podcasts, newsletters, and YouTube videos.
  prefs: []
  type: TYPE_NORMAL
- en: You can also buy paid shares like retweets, Instagram stories, or even “watch
    next” slots on YouTube videos. I haven’t tried this one for those wondering, my
    recent YouTube growth happened out of nowhere (but I’m not opposed to testing
    it out).
  prefs: []
  type: TYPE_NORMAL
- en: The last one, paid growth, is my favorite because it usually results in a large
    number of engaged people following you. You don’t tell them to follow you, they
    follow because your content is good. This compounds with time and crosses over
    with “built” distribution.
  prefs: []
  type: TYPE_NORMAL
- en: The common objection to this is “cheating,” which is usually spouted by those
    who aren’t in the creator game. If your brand, content, or product suck you’re
    not going to grow, sell, or be seen as any kind of authority.
  prefs: []
  type: TYPE_NORMAL
- en: Bought distribution compounds the results, ideas, and time in the game you already
    have.
  prefs: []
  type: TYPE_NORMAL
- en: 'One thing that way too many people forget:'
  prefs: []
  type: TYPE_NORMAL
- en: Your audience is not just *your* audience.
  prefs: []
  type: TYPE_NORMAL
- en: '*The Network Effect* is extremely powerful.'
  prefs: []
  type: TYPE_NORMAL
- en: I don’t only have access to my following.
  prefs: []
  type: TYPE_NORMAL
- en: I have indirect access to the followers of every person following me – many
    of those people being creators themselves or others with 100K+ audiences. I.E.
    Gordon Ramsey and John Cena follow me. I don’t think anything would come of that,
    but who knows.
  prefs: []
  type: TYPE_NORMAL
- en: I also have access to those that people share my content with digitally or by
    word of mouth.
  prefs: []
  type: TYPE_NORMAL
- en: And, I have access to the “followers” of everyone that follows me. To a lesser
    extent, of course.
  prefs: []
  type: TYPE_NORMAL
- en: The point being, my ideas have the small potential of reaching any of the 4.5
    billion people on the internet if (1) I’m consistent (2) I prioritize creative
    ideas that stick.
  prefs: []
  type: TYPE_NORMAL
- en: With 3.2 million followers, I have indirect access to 10X more potential traffic.
    The same holds true for smaller followings, they just don’t realize it. A “measly”
    1,000 follower audience can quite literally change your life, because 1 of those
    1000 could have 1 million followers.
  prefs: []
  type: TYPE_NORMAL
- en: 'My Biggest Business Lesson: Imitate, Then Innovate'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Whether you are building a product or writing content to build distribution,
    you only need one heuristic to guide your decision-making:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Imitate, then innovate.*'
  prefs: []
  type: TYPE_NORMAL
- en: Sell what’s already selling.
  prefs: []
  type: TYPE_NORMAL
- en: Write what’s already performing.
  prefs: []
  type: TYPE_NORMAL
- en: Add a dash of personal experience and perspective to make it unique.
  prefs: []
  type: TYPE_NORMAL
- en: Stick your hand in the attention that’s already flowing.
  prefs: []
  type: TYPE_NORMAL
- en: Learn what works. Learn the principles. Have another product or piece of writing
    open as you build or write. Pay attention to the *structure, not the content*
    of the product or writing. You aren’t plagiarizing a single word. You are emulating
    the essence of what works. You are abstracting the lesson from those things and
    trying to replicate it.
  prefs: []
  type: TYPE_NORMAL
- en: Once you see results – and if you are doing this correctly, with awareness,
    you will – then attempt to create something of your own.
  prefs: []
  type: TYPE_NORMAL
- en: That’s all for this one.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
