- en: How To Think Originally
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/how-to-think-originally/](https://thedankoe.com/letters/how-to-think-originally/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Before we begin, a few updates:'
  prefs: []
  type: TYPE_NORMAL
