  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 捕获中的会话、图像和嵌入（本月）
- en: Kortex AI for editing, research, and speeding up your writing (this month)
  id: totrans-10
  prefs:
  - PREF_UL
