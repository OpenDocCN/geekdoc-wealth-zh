  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mobile app (releasing this week)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Offline mode (releasing this month)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Voice transcription (this month)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sessions, images, and embeds in capture (this month)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Kortex AI for editing, research, and speeding up your writing (this month)
