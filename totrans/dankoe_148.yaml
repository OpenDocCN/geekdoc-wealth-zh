    with floating capture and docs)
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 桌面应用（昨天发布，带有浮动捕获和文档功能](https://www.kortex.co/blog/how-to-install-the-kortex-desktop-app)
- en: Light mode (releasing today)
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 亮色模式（今天发布）
- en: Mobile app (releasing this week)
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 移动应用（本周发布）
- en: Offline mode (releasing this month)
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 离线模式（本月发布）
- en: Voice transcription (this month)
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语音转录（本月）
