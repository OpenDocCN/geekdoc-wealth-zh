- en: How To Think Originally
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何进行原创思考
- en: 原文：[https://thedankoe.com/letters/how-to-think-originally/](https://thedankoe.com/letters/how-to-think-originally/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://thedankoe.com/letters/how-to-think-originally/)'
- en: 'Before we begin, a few updates:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始之前，有一些更新：
