- en: How Smart Creators Will Make Money In 2026 (You’re Early)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/how-smart-creators-will-make-money-in-2026-youre-early/](https://thedankoe.com/letters/how-smart-creators-will-make-money-in-2026-youre-early/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Right now, creators mostly sell digital products and services.
  prefs: []
  type: TYPE_NORMAL
- en: Coaching, courses, communities, cohorts, and subscription memberships.
  prefs: []
  type: TYPE_NORMAL
- en: And it makes sense.
  prefs: []
  type: TYPE_NORMAL
- en: They have huge profit margins. They can be fulfilled at scale by one person.
    They provide more freedom than relying on platform revenue or accepting sponsorships.
    And they are arguably the most transformative type of product someone can buy
    – there’s never been a time where affordable interest-based education from people
    on the cutting edge of skills have been available, and since education influences
    behavior, proper education is the *only *thing that can change your life. Of course,
    there are bad actors.
  prefs: []
  type: TYPE_NORMAL
- en: Now, I have a prediction for how this will evolve.
  prefs: []
  type: TYPE_NORMAL
- en: If you understand this, you may be able to gain a competitive advantage over
    the next few years.
  prefs: []
  type: TYPE_NORMAL
- en: 'I’m basing it on these beliefs:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Information will never be free**'
  prefs: []
  type: TYPE_NORMAL
- en: On the one hand you have—the point you’re making, Woz—is that information sort
    of wants to be expensive because it is so valuable—the right information in the
    right place just changes your life. On the other hand, information almost wants
    to be free because the costs of getting it out is getting lower and lower all
    of the time. So you have these two things fighting against each other.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Stewart Brand interviewing Apple’s Steve Wozniak
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Information doesn’t want to be free because information doesn’t want.
  prefs: []
  type: TYPE_NORMAL
- en: People want information to be free because they don’t understand that information
    is labor.
  prefs: []
  type: TYPE_NORMAL
- en: And while it may sound cliche at this point, if people don’t pay, they don’t
    pay attention. Only those with a poor relationship with money have a problem paying
    for critical information.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, information becomes less valuable the longer it is around. It becomes
    common knowledge, AI becomes trained on the most popular or relevant, but there
    is still another category that will retain its value into the near future.
  prefs: []
  type: TYPE_NORMAL
- en: That’s where creators come in.
  prefs: []
  type: TYPE_NORMAL
- en: Creators deal in personal information (writing, audio, video) and will continue
    to.
  prefs: []
  type: TYPE_NORMAL
- en: The problem is getting the right information in the right place, as Brand points
    out to Wozniak in the quote above.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) AI will never give you the best answer out of the box**'
  prefs: []
  type: TYPE_NORMAL
- en: It’s not that AI isn’t as good as you.
  prefs: []
  type: TYPE_NORMAL
- en: It’s that you aren’t good enough to make AI better than you.
  prefs: []
  type: TYPE_NORMAL
- en: Because if you ask ChatGPT to write you a book, it will, but it won’t be worth
    reading.
  prefs: []
  type: TYPE_NORMAL
- en: If you are both skilled in writing a book and in prompt engineering (giving
    clear instructions to AI, mostly) then you can probably write an incredible book
    much faster than you were able to before, *and it would still be from your knowledge,
    not the AIs.*
  prefs: []
  type: TYPE_NORMAL
- en: AI is only effective in highly relative domains (like marketing, writing, design,
    or anything non-mechanical) when it has a sufficient amount of context. So much
    so that it is no longer the AI providing the knowledge as it is doing the busy
    work.
  prefs: []
  type: TYPE_NORMAL
- en: This will make sense.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Courses are static**'
  prefs: []
  type: TYPE_NORMAL
- en: There are 3 types of offers.
  prefs: []
  type: TYPE_NORMAL
- en: Do it yourself. Done with you. Done for you.
  prefs: []
  type: TYPE_NORMAL
- en: These are what creators have sold since the dawn of social media. Some freelance
    with skills like marketing. Some coach with interests like health. Some sell courses
    if they want a low-ticket product in the mix.
  prefs: []
  type: TYPE_NORMAL
- en: But each of those have their downsides.
  prefs: []
  type: TYPE_NORMAL
- en: Courses are static information that must be interpreted correctly in order to
    work.
  prefs: []
  type: TYPE_NORMAL
- en: Freelancing is usually unfulfilling because you’re working on others projects
    rather than your own.
  prefs: []
  type: TYPE_NORMAL
- en: Coaching requires either a lot of time or a growing team if you want to scale.
  prefs: []
  type: TYPE_NORMAL
- en: But what if AI now allows you to collapse all of them into one?
  prefs: []
  type: TYPE_NORMAL
- en: What if a digital product provided both the education *and *the execution based
    on your own unique knowledge?
  prefs: []
  type: TYPE_NORMAL
- en: The Future Of Digital Products
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I’ve created a few digital products in my time.
  prefs: []
  type: TYPE_NORMAL
- en: My next one is going to be a [30 day challenge to build a personal brand](https://stan.store/thedankoe/p/build-a-profitable-personal-brand-in-30-days).
  prefs: []
  type: TYPE_NORMAL
- en: (Because I want to test this theory before we try to catch the wave by building
    it as a feature into Kortex – sharing workspaces with custom prompts).
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s run through a scenario.
  prefs: []
  type: TYPE_NORMAL
- en: 'Imagine that I have 2 pieces of the digital product:'
  prefs: []
  type: TYPE_NORMAL
- en: '**The education** – the curriculum or knowledge laid out in an easy to digest
    way.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The execution** – AI prompts built from that specific knowledge to allow
    you to execute faster.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Neither of those are as valuable alone as they are together.
  prefs: []
  type: TYPE_NORMAL
- en: Having AI do the task for you doesn’t teach you how to do the task yourself,
    so when the AI inevitably only gives you a first draft, you don’t know how to
    create a final draft that works. AI doesn’t solve for iteration or lack of results
    (unless you know *where *to guide the AI).
  prefs: []
  type: TYPE_NORMAL
- en: This is why “vibe coders” can’t build anything complex right now.
  prefs: []
  type: TYPE_NORMAL
- en: They don’t understand coding at a high-level, so when they hit a bug, they either
    have to start learning to code, or they get stuck because they outsourced their
    agency. Even when people can code an entire app in natural language, that doesn’t
    mean people will use it. In other words, you still need to learn.
  prefs: []
  type: TYPE_NORMAL
- en: And when you only have the education, it’s difficult to apply that knowledge
    to your own situation. Many people struggle with courses because they try to copy
    the teacher without realizing that their unique situation changes how that education
    is applied.
  prefs: []
  type: TYPE_NORMAL
- en: This is where the combination of both thrive.
  prefs: []
  type: TYPE_NORMAL
- en: AI is great at collecting your personal context, especially when prompted to,
    so that it can perform the task with that taken into account.
  prefs: []
  type: TYPE_NORMAL
- en: If you were learning from me to start a personal brand, there are a lot of moving
    variables. You have to extract your beliefs, opinions, interests, ideas, and the
    rest. AI can’t pull that out of your mind, but it can help guide your mind to
    coming up with those things.
  prefs: []
  type: TYPE_NORMAL
- en: This is why courses have such a low completion and success rate.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let me make this more clear:'
  prefs: []
  type: TYPE_NORMAL
- en: Imagine a YouTube course.
  prefs: []
  type: TYPE_NORMAL
- en: 'It teaches:'
  prefs: []
  type: TYPE_NORMAL
- en: How to generate ideas that have viral potential
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to design and iterate on thumbnail ideas
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to outline the YouTube script and key points
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to format the hook and introduction to reduce drop off
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to storyboard the video for pacing, b-roll, main shots, and visuals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What you need to understand is that there is no best way to do this.
  prefs: []
  type: TYPE_NORMAL
- en: If you ask AI to do these things without context, it will give you general information
    it can find on the internet.
  prefs: []
  type: TYPE_NORMAL
- en: But the thing about YouTube, and most relative (non-mechanical) domains, is
    that “what works” changes quite often. No YouTuber is the same as another, yet
    they all seem to reach some form of success. That means that even a YouTube specific
    AI software will have it’s faults because it will probably be built off of *one *best
    practice. If everyone uses that AI tool, it generates less results.
  prefs: []
  type: TYPE_NORMAL
- en: So, for this YouTube course, the creator builds it out with their own *mind,
    model, and methods.*
  prefs: []
  type: TYPE_NORMAL
- en: Then, when they turn each of the bullet points above into a prompt (like idea
    generation, outline, scripting, etc), something magical happens.
  prefs: []
  type: TYPE_NORMAL
- en: Not only do you have education, you have execution!
  prefs: []
  type: TYPE_NORMAL
- en: Do you realize how insane that is?
  prefs: []
  type: TYPE_NORMAL
- en: A YouTube course is no longer a course. It’s a piece of the creators mind *that
    can act on its own.*
  prefs: []
  type: TYPE_NORMAL
- en: You, as an individual, can purchase this piece of their mind, study the “operating
    manual,” give it your own context, and then it *does the work for you.*
  prefs: []
  type: TYPE_NORMAL
- en: It gives you ideas, you choose one, it guides you through the outline, you edit
    it, it spits out a script according to your own voice, and hell, at some point
    it AI will be able to create the entire video while sounding like you and looking
    like your style.
  prefs: []
  type: TYPE_NORMAL
- en: It’s still *you *creating the video, you’re just doing less work.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t AI slop because it has *context.*
  prefs: []
  type: TYPE_NORMAL
- en: If you want to see this in action, [watch this video I made on the Kortex channel.](https://youtu.be/4E9rO6FDUwo)
  prefs: []
  type: TYPE_NORMAL
- en: What about a content team for a company? You don’t need to hire the person as
    a freelancer, because they can do the work for you without being there.
  prefs: []
  type: TYPE_NORMAL
- en: What about something like fitness coaching? Where they can’t do the work for
    you? Well, they can still have prompts that create customized training programs,
    nutrition protocols, and daily check ins to track your progress, weight loss,
    or whatever it may be.
  prefs: []
  type: TYPE_NORMAL
- en: You’re no longer selling a course.
  prefs: []
  type: TYPE_NORMAL
- en: You’re selling a complete solution – a personal and specific system that AI
    will never give you out of the box, because it needs to be trained to do so –
    that is much more likely to get results.
  prefs: []
  type: TYPE_NORMAL
- en: The value of information isn’t going down, it’s increasing sharply.
  prefs: []
  type: TYPE_NORMAL
- en: How To Build An AI First Product
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you’re a creator, or you want to be a creator, the best thing you can do
    is learn how to turn your knowledge into a prompt.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re a beginner and do this well, congratulations, you now have your first
    product that you can start selling immediately!
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s exactly what I would do:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Document Your Process
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Open up a note or document to write in.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to make this easier on you, do this in [Kortex](https://kortex.co/) so
    you can reference that document in an AI chat when we turn this into a prompt.
    You can copy and paste between something like ChatGPT, but Kortex has ChatGPT
    models and all other models, so you can pick different ones for different use
    cases.
  prefs: []
  type: TYPE_NORMAL
- en: From there, *act as if you are giving detailed instructions to someone else
    so they can do what you do.*
  prefs: []
  type: TYPE_NORMAL
- en: This will take some time.
  prefs: []
  type: TYPE_NORMAL
- en: If you are a YouTuber, then you need to create a document for each step of your
    process. Look at the bullet points from before and expand on each of those.
  prefs: []
  type: TYPE_NORMAL
- en: For creating a YouTube intro, [it could look like this](https://app.kortex.co/public/document/eff80eec-769f-479d-8a00-e1556aac6c6e) (linked
    in a document because it’s long and detailed).
  prefs: []
  type: TYPE_NORMAL
- en: Of course, you can do this with almost any task. If you’ve never done this before,
    it may be difficult. You are actively learning how to manage and teach an employee
    (AI) and that takes time.
  prefs: []
  type: TYPE_NORMAL
- en: But, you document once and utilize forever.
  prefs: []
  type: TYPE_NORMAL
- en: And, you can think of this as the outline for your curriculum as well.
  prefs: []
  type: TYPE_NORMAL
- en: It takes some upfront work but pays off large.
  prefs: []
  type: TYPE_NORMAL
- en: Very high leverage activity to focus on.
  prefs: []
  type: TYPE_NORMAL
- en: 1.5) Using Someone Else’s Process
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I’d recommend that you do this manually for your own stuff.
  prefs: []
  type: TYPE_NORMAL
- en: 'But for the sake of value and education, here’s something else you can do:'
  prefs: []
  type: TYPE_NORMAL
- en: Choose a task you want to accomplish
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Find an expert on YouTube who teaches it in a video
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Or, find a PDF of a book that teaches it
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feed that to AI (you can link to a YT vid or upload a PDF to Kortex)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ask AI to break down the detailed instructions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Save that as a document to reference in step 2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That’s what I did with the YouTube intro instructions above 😉
  prefs: []
  type: TYPE_NORMAL
- en: I found a video that teaches it and asked AI to break it down.
  prefs: []
  type: TYPE_NORMAL
- en: I have a [free AI mini course](https://stan.store/thedankoe/p/mini-course-how-i-systemize-my-life-with-ai) that
    goes over multiple examples of this.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Turn Each Part Into A Prompt
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It’s worth spending 30-40 hours studying prompt engineering on your own.
  prefs: []
  type: TYPE_NORMAL
- en: I clearly can’t explain it all here.
  prefs: []
  type: TYPE_NORMAL
- en: For that reason, I want to give you a shortcut I use.
  prefs: []
  type: TYPE_NORMAL
- en: I like to structure my prompts in 2 phases depending on what the task is.
  prefs: []
  type: TYPE_NORMAL
- en: '**Phase 1** = context gathering phase that interviews the user to acquire the
    relevant information needed to perform the task well.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Phase 2** = execution phase where it takes the user’s information and performs
    the task.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If the task is something like creating a YouTube intro, then you obviously need
    user context. You need the idea they want to turn into a video and a voice analysis
    to reference so it sounds like them.
  prefs: []
  type: TYPE_NORMAL
- en: Preferably you would have an idea generation prompt as well. That way, you can
    feed the output of that into the YouTube intro prompt.
  prefs: []
  type: TYPE_NORMAL
- en: Each one of these tasks build on top of one another in some way.
  prefs: []
  type: TYPE_NORMAL
- en: First, you have the idea generation prompt that gathers context about your interests
    and spits out high performing topics
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, you feed one of those topics as context to the YouTube intro prompt that
    also gathers context about the key points you want to use.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, you feed that as context to an outline prompt.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, you feed that as context to the script prompt.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In a nutshell, you’re going to be creating quite a few prompts to encapsulate
    the entire process.
  prefs: []
  type: TYPE_NORMAL
- en: Now, here’s the shortcut.
  prefs: []
  type: TYPE_NORMAL
- en: I have a prompt that creates incredible prompts.
  prefs: []
  type: TYPE_NORMAL
- en: So, you tell it what task you want to complete, you give it the instructions
    for the task, and you have it structure the output of the prompt in 2 phases.
  prefs: []
  type: TYPE_NORMAL
- en: You can either duplicate [the prompt here](https://app.kortex.co/public/document/83651c0d-dfd3-4e6c-9821-c9c41b2a3ddc),
    or go to **Chat → Create Incredible AI Prompts** inside of Kortex to have this
    done for you. I like using either Gemini 2.5 Pro or Claude 3.7 Sonnet to do this.
  prefs: []
  type: TYPE_NORMAL
- en: Here is what the prompt looks like to create the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ec8d34ff253ed60d8dd69778a24e57cc.png)'
  prefs: []
  type: TYPE_IMG
- en: Notice how I provided the instructions in the form of a document and structured
    it into 2 phases. [Here’s the output of that prompt.](https://app.kortex.co/public/document/d1ac7b33-83f8-4af6-886a-9b9d867d0318)
  prefs: []
  type: TYPE_NORMAL
- en: The beautiful thing about this is that you can save the prompts as a document
    so you can organize them and reference them at any time.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Use It Yourself & Iterate
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You may think you’re done here.
  prefs: []
  type: TYPE_NORMAL
- en: But you’re not.
  prefs: []
  type: TYPE_NORMAL
- en: I know that you want AI to be this all-magical thing that just does all of the
    work for you, but that’s not how it works if you want it to be good.
  prefs: []
  type: TYPE_NORMAL
- en: Think of this as a first draft.
  prefs: []
  type: TYPE_NORMAL
- en: It’s the same with creating any kind of system for your life.
  prefs: []
  type: TYPE_NORMAL
- en: You create a routine, you try it for a week, you notice what didn’t work well,
    then you try new things until it gets great results. This goes for health, writing
    content, etc.
  prefs: []
  type: TYPE_NORMAL
- en: Your job for the next few weeks is to use the prompts you create yourself, grade
    how good they are, and make changes to the prompt until the results are 80-90%
    as good as you.
  prefs: []
  type: TYPE_NORMAL
- en: Then you have something worth giving to someone else.
  prefs: []
  type: TYPE_NORMAL
- en: For now, AI will always need a person to grade and edit the output.
  prefs: []
  type: TYPE_NORMAL
- en: If you have it spit out a YouTube script, sure, you can use that and see some
    good results… probably better than most people, but you’ll still want to treat
    it as a draft while making your own finishing touches.
  prefs: []
  type: TYPE_NORMAL
- en: 4) Create Documentation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Congrats.
  prefs: []
  type: TYPE_NORMAL
- en: Now you have a library of prompts that you can use for your own work or as a
    product to give someone else.
  prefs: []
  type: TYPE_NORMAL
- en: Now, you need to create the curriculum portion.
  prefs: []
  type: TYPE_NORMAL
- en: You need to teach both how to use the prompts and what they need to know about
    the task.
  prefs: []
  type: TYPE_NORMAL
- en: Thankfully, you already have your processed outlined.
  prefs: []
  type: TYPE_NORMAL
- en: You just need to expand on and structure those in the form of a product that
    takes someone from point A to point B.
  prefs: []
  type: TYPE_NORMAL
- en: I created a [mega-guide on creating a digital product](https://thedankoe.substack.com/p/mega-guide-how-to-create-your-first) here
    if you’d like to dive deeper.
  prefs: []
  type: TYPE_NORMAL
- en: 'Without going on for another hour, here’s what I would do to create the digital
    product:'
  prefs: []
  type: TYPE_NORMAL
- en: Purchase someone else’s that seems to do well
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Save all of it as separate documents in Kortex
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ask AI to break down the structure and patterns of the product (why it works
    well)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Turn that into a prompt with what you learned above
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feed it the details about your own product
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Have it guide you through creating your own product
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What you learned here isn’t just for creating a product.
  prefs: []
  type: TYPE_NORMAL
- en: It’s a way of thinking with AI.
  prefs: []
  type: TYPE_NORMAL
- en: It’s how you teach AI to do any task you’d like to achieve.
  prefs: []
  type: TYPE_NORMAL
- en: I’ll leave you with that.
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
- en: 'If you want to dive deeper:'
  prefs: []
  type: TYPE_NORMAL
- en: The ‘build a profitable personal brand in 30 days’ challenge goes live on June
    16th. It is [discounted for early birds](https://stan.store/thedankoe/p/build-a-profitable-personal-brand-in-30-days).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The latest paid posts in Substack are a [mega guide to building a digital product](https://thedankoe.substack.com/p/mega-guide-how-to-create-your-first) and [how
    to write a sales page](https://thedankoe.substack.com/p/how-to-write-persuasive-landing-pages) for
    that product. Next will be a launch strategy.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Claude 4 just dropped and we will be putting it along with every other AI model [inside
    Kortex](https://kortex.co/) – a note-taking and AI workflow software.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
