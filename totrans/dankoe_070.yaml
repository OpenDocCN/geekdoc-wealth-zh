- en: “Niche Down” Is Terrible Advice (For Smart People)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/niche-down-is-terrible-advice-for-smart-people/](https://thedankoe.com/letters/niche-down-is-terrible-advice-for-smart-people/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**The Koe Letter**'
  prefs: []
  type: TYPE_NORMAL
- en: '*June 24, 2023*'
  prefs: []
  type: TYPE_NORMAL
- en: '**Length:** 4000 words'
  prefs: []
  type: TYPE_NORMAL
- en: '**Read time:** 15 minutes'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: When I first started out in business, I had no idea what I was doing.
  prefs: []
  type: TYPE_NORMAL
- en: 'I thought it was obvious, especially freelancing:'
  prefs: []
  type: TYPE_NORMAL
- en: If I have a skill, people need that skill, so they will hire me.
  prefs: []
  type: TYPE_NORMAL
- en: I was ignorant to the fact that anybody could learn that skill (and the online
    freelancing arena was starting to become flooded with single-skill commodities
    like web design).
  prefs: []
  type: TYPE_NORMAL
- en: That was the first problem I had to solve.
  prefs: []
  type: TYPE_NORMAL
- en: 'To cut to the chase, I bought courses on:'
  prefs: []
  type: TYPE_NORMAL
- en: Freelancing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Facebook ads
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: e-Commerce brand building
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Copywriting
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sales and client acquisition
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: At least 15 web development courses that are irrelevant, but noteworthy
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I didn’t see much success when I tried to build the business they were teaching
    in those courses (that’s on me, not them)…
  prefs: []
  type: TYPE_NORMAL
- en: But I noticed a few patterns between them all.
  prefs: []
  type: TYPE_NORMAL
- en: 'One was very apparent:'
  prefs: []
  type: TYPE_NORMAL
- en: I had to get very specific with *who* I was targeting.
  prefs: []
  type: TYPE_NORMAL
- en: '*I had to niche down.*'
  prefs: []
  type: TYPE_NORMAL
- en: I had to identify a starving market (like health).
  prefs: []
  type: TYPE_NORMAL
- en: Break that down into sub-markets (like bodybuilding).
  prefs: []
  type: TYPE_NORMAL
- en: Narrow in on a niche market (like minimalist training).
  prefs: []
  type: TYPE_NORMAL
- en: Research the people within that market and collect data on them. That way, I
    could hit their pain points and speak to them directly.
  prefs: []
  type: TYPE_NORMAL
- en: It all made so much sense!
  prefs: []
  type: TYPE_NORMAL
- en: This was it.
  prefs: []
  type: TYPE_NORMAL
- en: I knew I had to find a specific person and tailor my skill set to them in the
    form of a product or service.
  prefs: []
  type: TYPE_NORMAL
- en: This was the secret I was missing!
  prefs: []
  type: TYPE_NORMAL
- en: Just niche down bro! That’s all there is to it!
  prefs: []
  type: TYPE_NORMAL
- en: This is still the most common advice that you will hear in the online space.
  prefs: []
  type: TYPE_NORMAL
- en: And it still sparks the most confusion, overwhelm, and anxiety in beginners.
  prefs: []
  type: TYPE_NORMAL
- en: They feel like if they don’t have the most profitable niche from the start,
    they will fail.
  prefs: []
  type: TYPE_NORMAL
- en: 'So they spend their time:'
  prefs: []
  type: TYPE_NORMAL
- en: Flopping from niche to niche
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learning skills for that niche (not a bad thing)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: End up with no money or leverage to show for it (a bad thing)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I like to challenge common beliefs (in more than just business) because most
    of the time they are accepted as law without question.
  prefs: []
  type: TYPE_NORMAL
- en: They get some – but not the best – results so people flock to them, hide behind
    them, and lash out at anyone who says there is a better way.
  prefs: []
  type: TYPE_NORMAL
- en: Business education is much like politics or religion and people would be better
    off if they could become aware of the dangers that come with ideology.
  prefs: []
  type: TYPE_NORMAL
- en: The business world has changed drastically with the rise of social media.
  prefs: []
  type: TYPE_NORMAL
- en: There is a significant difference between a business model that relies on cold
    outbound outreach rather than building an audience that warms up and become customers
    with time.
  prefs: []
  type: TYPE_NORMAL
- en: Most of the things you will learn on the internet are outdated and are ***not***the
    best way of doing business in the new economy.
  prefs: []
  type: TYPE_NORMAL
- en: This letter is going to be long.
  prefs: []
  type: TYPE_NORMAL
- en: We will dive into a metaphysical explanation of reality.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is important, but if you want to skip to the practical steps, we talk
    about:'
  prefs: []
  type: TYPE_NORMAL
- en: Treating the evolution of your brand as an actualization hierarchy (so you don’t
    have to niche down)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to build each level of your brand from beginner to advanced
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Practical things to *build at each level* – so you know what to do right now
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the last section, *You Are The Infinite Niche*.
  prefs: []
  type: TYPE_NORMAL
- en: The Mindset Shift That Led To You Reading This Letter
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I don’t know how or why, but I was scrolling Twitter.
  prefs: []
  type: TYPE_NORMAL
- en: I had just re-downloaded it after it was deleted from my phone for 8 years.
  prefs: []
  type: TYPE_NORMAL
- en: A tweet caught my eye.
  prefs: []
  type: TYPE_NORMAL
- en: It was a guy both selling web design services and dishing out self-development
    advice at the same time.
  prefs: []
  type: TYPE_NORMAL
- en: I was conditioned into the mind that I had to cold call, cold email, and run
    ads in order to see any form of business success.
  prefs: []
  type: TYPE_NORMAL
- en: After years of trial and error, I never saw the kind of success that I wanted
    to see. I could have stuck it out, but I never would have made it as one person.
  prefs: []
  type: TYPE_NORMAL
- en: When I saw people posting content (around things that I knew I could talk about
    as well) and landing clients from it… things started to click.
  prefs: []
  type: TYPE_NORMAL
- en: 'With cold email and DMs:'
  prefs: []
  type: TYPE_NORMAL
- en: Nobody knew who I was
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There wasn’t any prior trust
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I didn’t have a way of showing my authority or results from the start – I had
    to prove myself
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As one person, it’s a lot of manual work if you want the messages to be personal
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Every pitch I sent either led to a customer or nothing at all. I wasn’t building
    leverage along the way.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'With social media content, warm outreach (to your audience), and promotions:'
  prefs: []
  type: TYPE_NORMAL
- en: I create a reputation over time
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I build trust with span and depth (short-form and long-form content)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I can build trust in my audience without having to explain myself to them
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I can generate interest in my products without trying
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Nothing goes to waste. All content either contributes to data (failures) or
    growth (successes)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As I grow larger, I can evolve my brand into something I enjoy doing. I gain,
    rather than lose, freedom with time.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So, I started writing content on Twitter to land clients for my marketing services.
  prefs: []
  type: TYPE_NORMAL
- en: '**Another problem:**'
  prefs: []
  type: TYPE_NORMAL
- en: People feel like they can only talk about one topic related to what they sell.
  prefs: []
  type: TYPE_NORMAL
- en: 'They don’t realize that:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) You are interested in the topic related to what you sell, obviously.
  prefs: []
  type: TYPE_NORMAL
- en: 2) You also follow 200-500 other people with other interests that are “completely
    different.”
  prefs: []
  type: TYPE_NORMAL
- en: How can you believe that you have to stick to one interest when *you are following
    people that talk about 10-20 different interests**?*
  prefs: []
  type: TYPE_NORMAL
- en: It’s not that people won’t be interested in your other interests.
  prefs: []
  type: TYPE_NORMAL
- en: It’s that you don’t know how to make your interests interesting to other people.
  prefs: []
  type: TYPE_NORMAL
- en: People feel like if they go to broad, rather than niche, they will dilute themselves
    to the point of not making any money.
  prefs: []
  type: TYPE_NORMAL
- en: I called bullshit on this early.
  prefs: []
  type: TYPE_NORMAL
- en: Every single big YouTuber, podcaster, or other pseudo-celebrity is broad. Go
    look at Iman Ghadzi or Hamza.
  prefs: []
  type: TYPE_NORMAL
- en: They focus on beginner-level education on top-of-funnel social media.
  prefs: []
  type: TYPE_NORMAL
- en: They focus on intermediate to advanced in their low-ticket to high-ticket products
    and services.
  prefs: []
  type: TYPE_NORMAL
- en: They are *somewhat* holistic in the things they talk about. They understand
    that business or self-improvement demands that health and lifestyle be talked
    about.
  prefs: []
  type: TYPE_NORMAL
- en: They are far ahead of the curve because they understand human nature.
  prefs: []
  type: TYPE_NORMAL
- en: 'Think of it like this:'
  prefs: []
  type: TYPE_NORMAL
- en: Most *brands* are a building *within* a community in the world of social media.
  prefs: []
  type: TYPE_NORMAL
- en: I want my brand to *be* a community in the world of social media. My newsletters,
    lead magnets, and products are the buildings, or digital real estate.
  prefs: []
  type: TYPE_NORMAL
- en: But, you clearly have to establish a building first, then expand.
  prefs: []
  type: TYPE_NORMAL
- en: Human nature is the can of worms we will attempt to open now.
  prefs: []
  type: TYPE_NORMAL
- en: Stages Of Development, Natural Hierarchies, & How They Reflect In The Creator
    Economy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s begin by understanding *hierarchies* and *developmental stages.*
  prefs: []
  type: TYPE_NORMAL
- en: '**Hierarchies are the foundation of existence.**'
  prefs: []
  type: TYPE_NORMAL
- en: Yes… even those that think hierarchies are bad are still *ranking hierarchies
    as bad*, which is a hierarchy within itself.
  prefs: []
  type: TYPE_NORMAL
- en: The fabric of reality is composed of *units of mind.*
  prefs: []
  type: TYPE_NORMAL
- en: This is a concept that is foundational in my new book The Art Of Focus (updates
    coming soon).
  prefs: []
  type: TYPE_NORMAL
- en: Others have coined this term as “holons” or “units of thought” as Alan Watts
    likes to put it.
  prefs: []
  type: TYPE_NORMAL
- en: I prefer units of mind because of the philosophy of mentalism – or that All
    is Mind.
  prefs: []
  type: TYPE_NORMAL
- en: During animal life, or before the emergence of human consciousness, there was
    no mind to label, interpret, and create language so that everyone could be on
    the same page.
  prefs: []
  type: TYPE_NORMAL
- en: We had to make sense of reality.
  prefs: []
  type: TYPE_NORMAL
- en: These “units” of mind are everything.
  prefs: []
  type: TYPE_NORMAL
- en: Every single thing you can label or perceive.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are a few distinct characteristics to them:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Units of mind are hierarchical and** **intimately** **connected with the
    rest of the world.**'
  prefs: []
  type: TYPE_NORMAL
- en: Like an atom to cell to molecule.
  prefs: []
  type: TYPE_NORMAL
- en: Or a letter to sentence to paragraph to book.
  prefs: []
  type: TYPE_NORMAL
- en: Or content to product to brand to community to social media.
  prefs: []
  type: TYPE_NORMAL
- en: Or short-form content to medium-form to long-form.
  prefs: []
  type: TYPE_NORMAL
- en: Beyond that, any of those units are vertically or horizontally connected to
    everything by a proximal relationship.
  prefs: []
  type: TYPE_NORMAL
- en: Like how short-form content on the topic of bodybuilding connects to the gym
    to your nutrition to your kitchen to the fork in your hand to the micro-ecosystem
    in your gut.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Units of mind are whole parts. Both a whole in themself and a part of
    something greater.**'
  prefs: []
  type: TYPE_NORMAL
- en: A whole of a personal brand is nothing without its parts, and most people neglect
    the need for each part in order to evolve.
  prefs: []
  type: TYPE_NORMAL
- en: '**Dominator hierarchies** – the ones that give “hierarchies” a bad reputation
    and make people want to “dismantle” the patriarchy – are classified when a unit
    within the hierarchy attempts to dominate.'
  prefs: []
  type: TYPE_NORMAL
- en: Like how a cancer cell will replicate in the body… until it kills the host,
    or hierarchy, by destroying a lower level that allows the whole of the hierarchy
    to exist.
  prefs: []
  type: TYPE_NORMAL
- en: The cancer cell must be healed and reintegrated into the hierarchy for it to
    continue healthy growth.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) With that, units of mind emerge, transcend, and include.**'
  prefs: []
  type: TYPE_NORMAL
- en: By nature, fewer creators will reach the highest level of the hierarchy. There
    can only be so many creators with millions of followers.
  prefs: []
  type: TYPE_NORMAL
- en: But, the amount of creators with 100,000 followers – which is more than enough
    to make more money than you can fathom – is growing by the day.
  prefs: []
  type: TYPE_NORMAL
- en: As the creator economy continues to evolve, new levels of the hierarchies that
    compose it will emerge as new wholes that transcend its parts.
  prefs: []
  type: TYPE_NORMAL
- en: We must also take into account that you do not need a digital product business
    or a following to earn an income.
  prefs: []
  type: TYPE_NORMAL
- en: People can refer you to gigs, you can create a physical product, or you can
    land big opportunities.
  prefs: []
  type: TYPE_NORMAL
- en: 'But the underlying principles remain if you want to make this a possibility
    for yourself: brand, content, value (or offer), and marketing (or promotion).'
  prefs: []
  type: TYPE_NORMAL
- en: You cannot receive from the creator economy if you do not contribute.
  prefs: []
  type: TYPE_NORMAL
- en: You are a whole in a part of your network, which is a part of a community, which
    is a part of the creator economy, which is a part of the internet and beyond.
  prefs: []
  type: TYPE_NORMAL
- en: You must exchange value if you want to survive.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding Your Personal Evolution
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Everything goes through developmental stages.
  prefs: []
  type: TYPE_NORMAL
- en: Even your personal brand.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve written about this in-depth in [The One Person Business roadmap](https://thedankoe.com/letters/the-one-person-business-roadmap-99-of-creators-make-this-mistake/).
  prefs: []
  type: TYPE_NORMAL
- en: 'Without overcomplicating this and writing a book on stages of ego development
    and spiral dynamics, let’s simplify this with two examples:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Beginner, Intermediate, Advanced
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: At each stage of the creator journey, you will have to prioritize different
    things.
  prefs: []
  type: TYPE_NORMAL
- en: Beginners won’t have validated ideas.
  prefs: []
  type: TYPE_NORMAL
- en: They won’t have a developed brand (or personal) philosophy because you can only
    find that through years of writing and reflection.
  prefs: []
  type: TYPE_NORMAL
- en: They also won’t have the leverage necessary to focus on what brings exponential
    results (newsletter, YouTube, digital products, etc).
  prefs: []
  type: TYPE_NORMAL
- en: The point is, you will have to cultivate social media as a skill just like everyone
    else. You will have to prioritize your learning and action around whatever level
    of the game you are in.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Pre-rational, Rational, & Post-Rational
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This developmental progression is best illustrated by the notorious bell-curve
    meme:'
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1314">![](../Images/b1bd4b4ff236c5bf0b7bc234ca704114.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: When people first start to develop themselves in any area of life, they latch
    on to specific teachings and principles of related ideologies.
  prefs: []
  type: TYPE_NORMAL
- en: If they don’t continue to evolve, they can get trapped in that phase.
  prefs: []
  type: TYPE_NORMAL
- en: Like how religious people become “bible thumpers” and regurgitate everything
    they’ve learned without questioning or understanding.
  prefs: []
  type: TYPE_NORMAL
- en: Then, they reach the intermediate or rational stage.
  prefs: []
  type: TYPE_NORMAL
- en: This is where people start to question and rebel against the beginner stage.
  prefs: []
  type: TYPE_NORMAL
- en: In the spiritual domain of development, this is where atheists come into play.
  prefs: []
  type: TYPE_NORMAL
- en: In the creator domain of development, this is where people get bitter at the
    game (I’ve been seeing this a lot on Twitter lately. The market is going through
    a cycle of calling people out and complaining about how the game is unfair).
  prefs: []
  type: TYPE_NORMAL
- en: “Everyone is a copycat.”
  prefs: []
  type: TYPE_NORMAL
- en: “Coaches selling to coaches are running a pyramid scheme.” (Lack of understanding
    of hierarchies).
  prefs: []
  type: TYPE_NORMAL
- en: “High ticket sales is the best business model because everyone else is basic
    and not as smart as me. It’s also my way of survival so I’m deeply tied to it
    or else I feel threatened”
  prefs: []
  type: TYPE_NORMAL
- en: Again, this can get dangerous.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, you evolve to the advanced or post-rational stage.
  prefs: []
  type: TYPE_NORMAL
- en: In this stage, you rediscover the principles and can approach them from a place
    of experience.
  prefs: []
  type: TYPE_NORMAL
- en: Like how most developed spiritual people agree and embody the principles in
    the bible (and every other pattern across all belief systems that point to truth
    because they are not limited by cultural understanding), but they see the futility
    in preaching it as the one and only ideology (or else you burn in hell!)
  prefs: []
  type: TYPE_NORMAL
- en: In the creator economy, we can note a few things.
  prefs: []
  type: TYPE_NORMAL
- en: Many intermediates despise simple platitudes or cliches. They enter a bitter
    phase where they try to rebel against the nature of business.
  prefs: []
  type: TYPE_NORMAL
- en: (Which is good, but like a replicating cancer cell, you must take your discoveries
    and be reintegrated into the hierarchy to advance to the next stage – or else
    you destroy your business like I’ve seen time and time again).
  prefs: []
  type: TYPE_NORMAL
- en: Advanced creators see them as a pillar in their growth, but from the perspective
    of experience and authority, or else the simple quote-like content doesn’t have
    impact.
  prefs: []
  type: TYPE_NORMAL
- en: With that long background, we can now come to “creating your niche” from a place
    of metaphysical understanding.
  prefs: []
  type: TYPE_NORMAL
- en: You Are The Infinite Niche
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I’ve discussed how “you are the most profitable niche” a few times in the past,
    [notably in this letter.](https://thedankoe.com/letters/the-most-profitable-niche-is-you-how-to-create-your-niche/)
  prefs: []
  type: TYPE_NORMAL
- en: 'So this letter doesn’t end up at 5000 words (it still might):'
  prefs: []
  type: TYPE_NORMAL
- en: Your brand vision is your vision for the future, this is what you are leading
    your followers toward.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your brand identity is your story. Where you came from and how you transformed.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your content illustrates this by educating on the skills and interests you learned
    to get to where you are.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your thoughts, opinions, and worldview are how you position your content in
    a unique way.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your products are the systems you’ve created to help those behind you.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s build on this idea by going deeper.
  prefs: []
  type: TYPE_NORMAL
- en: 'Hopefully, this provides clarity:'
  prefs: []
  type: TYPE_NORMAL
- en: Don’t Niche Down – View Your Brand As An Actualization Hierarchy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1315">![](../Images/5ec1fbea6b4d016ecb8e8cee364426d4.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: You are complex.
  prefs: []
  type: TYPE_NORMAL
- en: Well, at least that should be your aim.
  prefs: []
  type: TYPE_NORMAL
- en: The Universe evolves toward complexity, as does your sense of self as you learn,
    implement, and understand.
  prefs: []
  type: TYPE_NORMAL
- en: The complexity of your character is determined by the goals or challenges you’ve
    pushed through.
  prefs: []
  type: TYPE_NORMAL
- en: Each goal you achieve requires a certain skill level and perspective to match.
  prefs: []
  type: TYPE_NORMAL
- en: Once you achieve that goal, a new path unlocks so that you can work towards
    the next.
  prefs: []
  type: TYPE_NORMAL
- en: The higher your skill level (across multiple domains), the higher your complexity
    of self.
  prefs: []
  type: TYPE_NORMAL
- en: As you increase in complexity, you can solve deeper, more meaningful problems
    in your life and the lives of others.
  prefs: []
  type: TYPE_NORMAL
- en: And if you are the niche, your brand should grow in similar complexity as your
    skills and interests evolve in the pursuit of your goals.
  prefs: []
  type: TYPE_NORMAL
- en: As you learn and acquire skills, it is your duty to build real-world projects
    that get results for other people.
  prefs: []
  type: TYPE_NORMAL
- en: That is both how you create a profitable product in business and fulfill your
    spiritual duty.
  prefs: []
  type: TYPE_NORMAL
- en: With every level of development you reach, you will build a tangible product
    to reflect that. This is how you educate your followers and build authority.
  prefs: []
  type: TYPE_NORMAL
- en: After I solved a productivity problem in my life, I created a Power Planner
    which is now a lead magnet of mine.
  prefs: []
  type: TYPE_NORMAL
- en: After I got results with web design and freelancing, I created a course for
    each (this only furthered my understanding of those things, teaching is how you
    learn more).
  prefs: []
  type: TYPE_NORMAL
- en: After I acquired a skill stack, I created a brand consulting offer to start
    helping others.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, what many people miss when it comes to niching down is this:'
  prefs: []
  type: TYPE_NORMAL
- en: They don’t realize that any newsletter, lead magnet, product, or service you
    create IS AN AUDIENCE.
  prefs: []
  type: TYPE_NORMAL
- en: You are building an audience *off platform*.
  prefs: []
  type: TYPE_NORMAL
- en: 'The problem:'
  prefs: []
  type: TYPE_NORMAL
- en: Most people are afraid to create and publish anything.
  prefs: []
  type: TYPE_NORMAL
- en: They don’t realize that long-form content, products, and services are the backbone
    of your entire brand.
  prefs: []
  type: TYPE_NORMAL
- en: I don’t want to sound egotistical, but this example illustrates it well.
  prefs: []
  type: TYPE_NORMAL
- en: “Dan, how do you keep such high engagement when all of my Twitter clients are
    going to zero?”
  prefs: []
  type: TYPE_NORMAL
- en: Hmmm I wonder why… because I don’t treat my brand as something that can be built
    by someone else. Or something that can be systemized into the ground with templated
    content.
  prefs: []
  type: TYPE_NORMAL
- en: Because I’ve cultivated depth in my content, have thousands of students, and
    hundreds of thousands of people that have read my newsletter and downloaded my
    free products.
  prefs: []
  type: TYPE_NORMAL
- en: People read my content from a place of understanding who I am and my philosophy.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve been talking about this for years but people glance over it because short-form
    content and shallow products is the easy route.
  prefs: []
  type: TYPE_NORMAL
- en: My brand is my vessel for my life’s work.
  prefs: []
  type: TYPE_NORMAL
- en: My brand is a brand, *not a niche audience.*
  prefs: []
  type: TYPE_NORMAL
- en: It is a city within social media. A community of millions of people.
  prefs: []
  type: TYPE_NORMAL
- en: My Power Planner has a 70,000 downloader niche audience around productivity.
    This is digital real estate I am occupying.
  prefs: []
  type: TYPE_NORMAL
- en: My newsletter has a 120,000 subscriber niche audience around depth, philosophy,
    and business.
  prefs: []
  type: TYPE_NORMAL
- en: My products have a 15,000+ student niche audience around writing, branding,
    and business.
  prefs: []
  type: TYPE_NORMAL
- en: When you niche down your brand, I see people maybe get to 100,000 total followers
    after 3 years.
  prefs: []
  type: TYPE_NORMAL
- en: My Power Planner is more of a niche audience than that, and it has 70,000 people
    there.
  prefs: []
  type: TYPE_NORMAL
- en: Do you see what I’m getting at?
  prefs: []
  type: TYPE_NORMAL
- en: This is how you remove the boundaries around who you are and build whatever
    the f*ck you want (with time).
  prefs: []
  type: TYPE_NORMAL
- en: Everyone Starts On Level One
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, of course, you won’t be able to just build all of these things in the blink
    of an eye.
  prefs: []
  type: TYPE_NORMAL
- en: These are *stages* of development we are talking about here.
  prefs: []
  type: TYPE_NORMAL
- en: You have to set your mind on building the first level of your pyramid.
  prefs: []
  type: TYPE_NORMAL
- en: Once that project emerges, transcend to the next level and include the prior.
  prefs: []
  type: TYPE_NORMAL
- en: Most people never evolve because they stop building.
  prefs: []
  type: TYPE_NORMAL
- en: And because they stop building, they stop learning.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t learn if you don’t have something to apply what you learn to, it’s
    just mental masturbation at that point.
  prefs: []
  type: TYPE_NORMAL
- en: 'Lesson:'
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t build digital real estate under your brand, you will be trapped
    in that shallow level of development.
  prefs: []
  type: TYPE_NORMAL
- en: You will continue competing against those at that level.
  prefs: []
  type: TYPE_NORMAL
- en: For most people, that means writing content, landing clients, and getting stuck
    in the feast or famine service business cycle.
  prefs: []
  type: TYPE_NORMAL
- en: The Smart Progression For Authority & Growth
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Here’s what I would recommend as a beginner progression.
  prefs: []
  type: TYPE_NORMAL
- en: This is what I would do if I could go back and optimize what I build.
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Determine The 2-3 Topics That Lead To Your Vision**'
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1316">![](../Images/c47af8cfcbbfbf1c1876cff43e4f5619.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Identify what you want in life, the thing that you are leading your followers
    toward.
  prefs: []
  type: TYPE_NORMAL
- en: Your skills and interests are how you, uniquely, will get there.
  prefs: []
  type: TYPE_NORMAL
- en: Like how someone that wants to be free can start an e-commerce business, while
    the other can practice budgeting techniques, while the other becomes a digital
    nomad from side hustles.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve broken this in-depth in my [how to write social media content letter.](https://thedankoe.com/letters/dont-get-replaced-by-ai-how-to-write-authentic-content/)
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Practice Top Of Funnel Writing & Growth**'
  prefs: []
  type: TYPE_NORMAL
- en: Your number one priority is consistent brand growth on social media.
  prefs: []
  type: TYPE_NORMAL
- en: The “easiest” ones to grow big on are Twitter, Instagram, LinkedIn, and other
    short-form platforms. You are in more control of your growth.
  prefs: []
  type: TYPE_NORMAL
- en: You want to build a base audience where you can fuel your digital real estate,
    products, and services over time.
  prefs: []
  type: TYPE_NORMAL
- en: As your audience grows, your leverage to build and talk about whatever you want
    does with it.
  prefs: []
  type: TYPE_NORMAL
- en: Buy best-selling books on your topics and devour them.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Follow social media accounts that talk about those topics and emulate them from
    the lens of a creator, not consumer.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pay attention to what writing, ideas, and structures perform the best.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That is how you practice writing.
  prefs: []
  type: TYPE_NORMAL
- en: Yours will suck at first.
  prefs: []
  type: TYPE_NORMAL
- en: Get it out of the way while nobody is watching.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Start A Newsletter As A Vessel To Build Projects**'
  prefs: []
  type: TYPE_NORMAL
- en: I always recommend starting a newsletter.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t *have* to start writing it on a consistent basis.
  prefs: []
  type: TYPE_NORMAL
- en: You can build a subscriber base until you are ready to be consistent.
  prefs: []
  type: TYPE_NORMAL
- en: People procrastinate building a newsletter because it is a long-term game. You
    don’t see immediate results.
  prefs: []
  type: TYPE_NORMAL
- en: 'The benefits of starting a newsletter are:'
  prefs: []
  type: TYPE_NORMAL
- en: You can practice developing depth behind your ideas. This leads to original
    thought and struggle with writing. You get better faster.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can use it as a place to write modules or sections of your lead magnet or
    products. No, it doesn’t matter if you send it out free at first.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You show that you are providing value off platform as a beginner, which helps
    with perceived authority (“selling” something helps your brand, not selling something
    hurts it).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Whenever you create something in the next steps, use your newsletter to write
    the first iteration of the sections.
  prefs: []
  type: TYPE_NORMAL
- en: '**4) Create A Lead Magnet As Your First “Niche”**'
  prefs: []
  type: TYPE_NORMAL
- en: I’ve built and tested 8-10 lead magnets.
  prefs: []
  type: TYPE_NORMAL
- en: From how to create a basic website to the basics of marketing to the power planner
    to my idea generation system.
  prefs: []
  type: TYPE_NORMAL
- en: People with a “niche” brand have to consistently talk about the one topic they
    are niched down into.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take video editing as an example (this applies to every other interest.
    Health, nutrition, marketing skills, philosophy, anything.)
  prefs: []
  type: TYPE_NORMAL
- en: If I create a lead magnet on the basics of video editing, do I have to always
    worry about writing about only that?
  prefs: []
  type: TYPE_NORMAL
- en: Or can I write whatever I want and just plug my lead magnet?
  prefs: []
  type: TYPE_NORMAL
- en: Especially when my lead magnet has my best thoughts and articulation of the
    subject matter.
  prefs: []
  type: TYPE_NORMAL
- en: And, I build my newsletter along the way.
  prefs: []
  type: TYPE_NORMAL
- en: 'Examples of lead magnet ideas:'
  prefs: []
  type: TYPE_NORMAL
- en: Checklists to get results (like a web design checklist)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Notion templates for systems (like writing or habit formation)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Beginner-level ebook that goes over the fundamentals to get people up to speed
    with more advanced stuff you talk about.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Video tutorials or screen recordings of the same beginner fundamentals.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create a lead magnet to establish authority in the topic you want to monetize,
    or at least think you want to monetize. You can always create another one.
  prefs: []
  type: TYPE_NORMAL
- en: Over time, you will build a niche audience of downloaders.
  prefs: []
  type: TYPE_NORMAL
- en: '**5) Sell A** **Minimum** **Viable Service Offer To Gain Experience**'
  prefs: []
  type: TYPE_NORMAL
- en: You need a “next step” for lead magnet downloaders.
  prefs: []
  type: TYPE_NORMAL
- en: Hopefully, something you can monetize.
  prefs: []
  type: TYPE_NORMAL
- en: For beginners, I recommend a minimum viable offer.
  prefs: []
  type: TYPE_NORMAL
- en: That means a single-skill freelance service (like web design) or a single interest
    coaching service (like productivity or health).
  prefs: []
  type: TYPE_NORMAL
- en: I’ve discussed this before [in it’s own letter (The Best Online Business Model).](https://thedankoe.com/letters/the-best-online-business-model-to-make-1-million-in-2023/)
  prefs: []
  type: TYPE_NORMAL
- en: Charge $500-$1000 until you understand what will get true results.
  prefs: []
  type: TYPE_NORMAL
- en: Systemize it.
  prefs: []
  type: TYPE_NORMAL
- en: Charge more.
  prefs: []
  type: TYPE_NORMAL
- en: Replace your income with 3-4 clients a month and go full-time.
  prefs: []
  type: TYPE_NORMAL
- en: '**6) De-niche, Evolve, Transcend, Include**'
  prefs: []
  type: TYPE_NORMAL
- en: At this point, you have developed authority in one niche.
  prefs: []
  type: TYPE_NORMAL
- en: You should spend some time getting results in this area while testing different
    interests in your content.
  prefs: []
  type: TYPE_NORMAL
- en: To deepen your authority and open up room to explore new interests, you should
    complete your brand actualization pyramid.
  prefs: []
  type: TYPE_NORMAL
- en: Turn your freelance or consulting service into a cohort-based course. Get results
    at this level.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Productize that cohort into a digital product. Get results at this level.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Repeat the process of lead magnet, service, cohort, and product until you have
    a holistic synthesis of content, products, and services.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you want to talk about certain interests, you need foundational content (like
    a lead magnet or newsletter) in place to get people up to speed.
  prefs: []
  type: TYPE_NORMAL
- en: If you aren’t getting engagement when talking about a new interest, it’s because
    you haven’t developed depth under it.
  prefs: []
  type: TYPE_NORMAL
- en: You need to get your audience on the same page of understanding.
  prefs: []
  type: TYPE_NORMAL
- en: Holistic Synthesis Of Skills & Interests
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With time and effort, let’s say 1-2 years, you can really begin to do whatever
    you want.
  prefs: []
  type: TYPE_NORMAL
- en: The world needs more holistic synthesizers because reality is not compartmentalized
    like the current school system.
  prefs: []
  type: TYPE_NORMAL
- en: You may not see it now, but you are creating society.
  prefs: []
  type: TYPE_NORMAL
- en: Your job is to note patterns between interests and industries.
  prefs: []
  type: TYPE_NORMAL
- en: Bridge them together in your creations.
  prefs: []
  type: TYPE_NORMAL
- en: Become a modern polymath.
  prefs: []
  type: TYPE_NORMAL
- en: A digital renaissance man.
  prefs: []
  type: TYPE_NORMAL
- en: Explore reality through your interests.
  prefs: []
  type: TYPE_NORMAL
- en: Distribute your discoveries through content.
  prefs: []
  type: TYPE_NORMAL
- en: Make a living doing what you love by creating something worth charging for.
  prefs: []
  type: TYPE_NORMAL
- en: Flow with the direction of the Universe and bask in the enjoyment that comes
    with it.
  prefs: []
  type: TYPE_NORMAL
- en: And, enjoy the rest of your weekend.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan Koe
  prefs: []
  type: TYPE_NORMAL
