- en: The Death Of The Personal Brand (And What Comes Next)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-death-of-the-personal-brand-and-what-comes-next/](https://thedankoe.com/letters/the-death-of-the-personal-brand-and-what-comes-next/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Personal brands are no longer personal.
  prefs: []
  type: TYPE_NORMAL
- en: When I was a teenager, I was obsessed with fitness.
  prefs: []
  type: TYPE_NORMAL
- en: I believe I experienced a peak in creator authenticity during this time. A Golden
    Age of individuals picking up a camera and filming their progress in life. Sharing
    their passions. Helping others do better.
  prefs: []
  type: TYPE_NORMAL
- en: Matt Ogus, Chris Lavado, and many others come to mind.
  prefs: []
  type: TYPE_NORMAL
- en: As a young teen, I had no idea how much their content would shape my future.
  prefs: []
  type: TYPE_NORMAL
- en: I was just a kid who played video games all day. A kid who wanted to become
    an anesthesiologist because it paid a lot. A kid who had massive ambitions, but
    lacked the confidence to do something *I* wanted to do with my life. These creators
    were my role models that lived across the globe.
  prefs: []
  type: TYPE_NORMAL
- en: I can’t thank them enough.
  prefs: []
  type: TYPE_NORMAL
- en: I hope I can help bring another wave, a second renaissance, to the creator economy.
    And I’d encourage you to join me in that.
  prefs: []
  type: TYPE_NORMAL
- en: Create the content you want to see in the world.
  prefs: []
  type: TYPE_NORMAL
- en: Build the product you want to see in the world.
  prefs: []
  type: TYPE_NORMAL
- en: People are starving for it. Starving for depth.
  prefs: []
  type: TYPE_NORMAL
- en: That’s what we’re going to learn in this letter.
  prefs: []
  type: TYPE_NORMAL
- en: Not how to become a personal brand.
  prefs: []
  type: TYPE_NORMAL
- en: But how to stand out with unique ideas and create your life’s work.
  prefs: []
  type: TYPE_NORMAL
- en: Today, we have influencers, creators, and personal brands.
  prefs: []
  type: TYPE_NORMAL
- en: Concepts that have begun to carry a negative connotation along with them.
  prefs: []
  type: TYPE_NORMAL
- en: In the eyes of the public, there are a few differences between them.
  prefs: []
  type: TYPE_NORMAL
- en: They are all relatively similar, but when you say the word, you feel a certain
    part of you die.
  prefs: []
  type: TYPE_NORMAL
- en: Influencers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Oh man… influencers.
  prefs: []
  type: TYPE_NORMAL
- en: The defining characteristic is that they don’t sell a product of inherent value.
  prefs: []
  type: TYPE_NORMAL
- en: They garner attention with looks and gimmicks to pitch often destructive products
    to the underdeveloped masses. They don’t educate, entertain, or inspire toward
    solving a real problem in people’s lives.
  prefs: []
  type: TYPE_NORMAL
- en: No, we don’t need Lunchly’s and Mr. Beast Bars that fuel the problem of obese
    and sick children. We’re at a critical turning point in society with attention
    spans decreasing, processed foods running rampant, and not enough online role
    models to show a positive direction that births a generation of sovereign individuals,
    not slaves.
  prefs: []
  type: TYPE_NORMAL
- en: Now, don’t get me wrong here. You all know that I don’t believe selling is bad.
    Work is a necessary part of life. Money is a necessary aspect of modern survival.
    You can make a lot of it, but at least *try* to have some shred of a positive
    impact. Profit from purpose.
  prefs: []
  type: TYPE_NORMAL
- en: Most of you will not become an influencer (thank the heavens), so we will stop
    there.
  prefs: []
  type: TYPE_NORMAL
- en: Creators
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I love creators.
  prefs: []
  type: TYPE_NORMAL
- en: I would consider myself one.
  prefs: []
  type: TYPE_NORMAL
- en: But the average creator has a myopic view of that word.
  prefs: []
  type: TYPE_NORMAL
- en: They are content creators, not reality creators.
  prefs: []
  type: TYPE_NORMAL
- en: They become slaves to content templates.
  prefs: []
  type: TYPE_NORMAL
- en: They never go through the pain of contemplation and critical thinking to birth
    an idea that is worth copying. They just copy.
  prefs: []
  type: TYPE_NORMAL
- en: They see audience growth as some formulaic thing and trap themselves in a slightly
    more autonomous 9 to 5.
  prefs: []
  type: TYPE_NORMAL
- en: They comment on large accounts, not because they like the idea in the content,
    or because they want to befriend the person, but because they want to fake a relationship
    in order to garner attention for their own brand.
  prefs: []
  type: TYPE_NORMAL
- en: This is a problem on both sides. The “large account” doesn’t have ideas that
    make people stop and question their existence, the “small account” just wants
    to survive.
  prefs: []
  type: TYPE_NORMAL
- en: I see what we call “engagement” as one big online party. One big Xbox 360 game
    lobby. One big classroom where others help each other with their projects. One
    big bar where people meet and make memories. Engagement groups have become a laughing
    stock of the creator economy because they are quick pump-and-dump networking.
  prefs: []
  type: TYPE_NORMAL
- en: You *can* make good friends who help you in business. It’s actually the one
    thing people are missing that is necessary to build their audience. But most people
    just haven’t developed themselves socially, so they abuse outreach templates and
    lack a personality people want to form a bond with.
  prefs: []
  type: TYPE_NORMAL
- en: Stop thinking of it as an “engagement group.”
  prefs: []
  type: TYPE_NORMAL
- en: Start thinking of it as making friends, in a digital world where you can finally
    meet like minded people, so you can help each other build toward a shared goal.
    That’s a requirement for most goals.
  prefs: []
  type: TYPE_NORMAL
- en: Again, these aren’t always bad things. What I am trying to do here is open your
    mind to a greater possibility. The same thing, but deeper. Evolving beyond the
    shallowness you started with and got trapped in. You often need to do these things
    to learn, but they aren’t meant to be your death sentence.
  prefs: []
  type: TYPE_NORMAL
- en: Some may say I teach these things, and I do, but if you read the not-so-fine
    print, I’m rather explicit about not turning into a robot. Many read what they
    want to read and discard the things that actually make it work.
  prefs: []
  type: TYPE_NORMAL
- en: I want you to see that there is a more meaningful way to create your life’s
    work, but let’s finish talking about the average personal brand.
  prefs: []
  type: TYPE_NORMAL
- en: Personal Brands
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The personal brand archetype is someone with the sole purpose of making money
    for their business.
  prefs: []
  type: TYPE_NORMAL
- en: They trap themselves in shallow topics and narrow niches.
  prefs: []
  type: TYPE_NORMAL
- en: They become glorified search engines.
  prefs: []
  type: TYPE_NORMAL
- en: They churn followers faster than their flash-in-a-pan SaaS.
  prefs: []
  type: TYPE_NORMAL
- en: They stick to one topic. One offer. The same ideas that brought the highest
    conversion rate to their email list and high ticket service. They position themselves
    as the absolute authority.
  prefs: []
  type: TYPE_NORMAL
- en: They stagnate at a certain follower count because nobody actually cares to follow
    them. If they aren’t talking about their offer they are talking about what’s wrong
    with everything that others are doing. They attract an audience of trolls that
    feed into their negativity.
  prefs: []
  type: TYPE_NORMAL
- en: But as long as their funnel is seeing continued growth and high conversion rates,
    they’ll be fine. They just gotta keep churning out the authority content.
  prefs: []
  type: TYPE_NORMAL
- en: Not all of these things are bad. Sticking to a niche can be a good option. Shallow
    topics are necessary to introduce people at that stage of development to deeper
    topics. The problem occurs when you don’t zoom out to look at the big picture.
  prefs: []
  type: TYPE_NORMAL
- en: Are you helping people do something that actually matters?
  prefs: []
  type: TYPE_NORMAL
- en: To do that, you can’t stagnate.
  prefs: []
  type: TYPE_NORMAL
- en: You must continuously improve and evolve.
  prefs: []
  type: TYPE_NORMAL
- en: You must reverse brand entropy by pushing into the unknown.
  prefs: []
  type: TYPE_NORMAL
- en: The churn of your brand is a dead giveaway that you’ve given up a higher purpose
    for quick cash.
  prefs: []
  type: TYPE_NORMAL
- en: A New Way Of Life, No Label Required
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Don’t be a YouTube creator.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t be a personal brand.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t be an influencer.
  prefs: []
  type: TYPE_NORMAL
- en: Be you. But in a place where your work can be discovered, followed, and supported.
    Right now and for the foreseeable future, that’s on the internet.
  prefs: []
  type: TYPE_NORMAL
- en: The internet is a tool.
  prefs: []
  type: TYPE_NORMAL
- en: Social media is a tool.
  prefs: []
  type: TYPE_NORMAL
- en: Software is a tool.
  prefs: []
  type: TYPE_NORMAL
- en: If you think these things are toxic and negative, that’s a direct reflection
    of yourself. Algorithms show you more of what you pay attention to. Social media,
    for the right people, is the singular thing that will change their life. If you
    believe it’s toxic, you close yourself off to that reality.
  prefs: []
  type: TYPE_NORMAL
- en: These new forms of technology are tools to display your work, your art, your
    findings in the unknown that others can benefit from.
  prefs: []
  type: TYPE_NORMAL
- en: Jordan Peterson isn’t a “content creator.”
  prefs: []
  type: TYPE_NORMAL
- en: He goes on tours, writes books, leverages social media as a base, and uses all
    of the *tools* at his disposal to spread his life’s work. He isn’t worried about
    the latest content idea trend. His mind outperforms any of those myopic growth
    strategies. The quality of his ideas is what sets him apart and changes people’s
    lives (regardless of your opinion on Peterson).
  prefs: []
  type: TYPE_NORMAL
- en: You didn’t start down this path to end up a “personal brand” on the internet.
  prefs: []
  type: TYPE_NORMAL
- en: You simply lost your way and were programmed by the new society after breaking
    free of the old one. You left the old matrix for the new one. Happens to all of
    us.
  prefs: []
  type: TYPE_NORMAL
- en: You started because you wanted freedom. Autonomy. Meaningful income. The ability
    to write, speak, and create about the interests that spark a fire in your soul.
  prefs: []
  type: TYPE_NORMAL
- en: I’m not proposing that you quit because social media has become what it has.
  prefs: []
  type: TYPE_NORMAL
- en: That only means it’s easier than ever to start out… even if you feel like you’re
    late.
  prefs: []
  type: TYPE_NORMAL
- en: I’m proposing that you aim higher.
  prefs: []
  type: TYPE_NORMAL
- en: I don’t see social media as some shallow place with online business models and
    cheap advice.
  prefs: []
  type: TYPE_NORMAL
- en: I see it as a new way of life.
  prefs: []
  type: TYPE_NORMAL
- en: You’re already “online” most of the day.
  prefs: []
  type: TYPE_NORMAL
- en: The problem is that you don’t know what value you provide, how to stand out,
    and how to shift focus with the time you are already spending on the internet
    to make your creative work a success.
  prefs: []
  type: TYPE_NORMAL
- en: You have knowledge and skill that others can benefit from.
  prefs: []
  type: TYPE_NORMAL
- en: That’s a fact.
  prefs: []
  type: TYPE_NORMAL
- en: You just need to learn to stand out.
  prefs: []
  type: TYPE_NORMAL
- en: By the way, I teach all of this in [Digital Economics.](https://digitaleconomics.school)
  prefs: []
  type: TYPE_NORMAL
- en: How To Pursue Your Life’s Work On The Internet
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you understand the [levels of purpose](https://thedankoe.com/letters/the-truth-about-money-and-how-to-make-a-ton-of-it/),
    you understand that your life’s work, at some point in the job > career > calling
    evolution, will require you to start a business.
  prefs: []
  type: TYPE_NORMAL
- en: If thinking of a one-person business as “independent work” helps you swallow
    that pill, do that.
  prefs: []
  type: TYPE_NORMAL
- en: But for now, let’s remove all of the business jargon and get straight to the
    essence of what you need to pursue your life’s work.
  prefs: []
  type: TYPE_NORMAL
- en: '**1) A Positive Aim For Your Life**'
  prefs: []
  type: TYPE_NORMAL
- en: Here’s the thing.
  prefs: []
  type: TYPE_NORMAL
- en: '*You don’t need to know what your life’s work is right now.*'
  prefs: []
  type: TYPE_NORMAL
- en: And realistically, your life’s work isn’t something you maintain 100% clarity
    on.
  prefs: []
  type: TYPE_NORMAL
- en: At times, it’s crystal clear. But this is often hopeful delusion, which isn’t
    bad but necessary for intense bursts of progress.
  prefs: []
  type: TYPE_NORMAL
- en: At others, you have no idea what you’re doing, but you are still moving toward
    a positive **aim**.
  prefs: []
  type: TYPE_NORMAL
- en: Your life’s work isn’t a static sentence that you can articulate to others,
    as that’s impossible. Your life’s work is in the unknown, and by nature of the
    unknown, it’s unknown. If it were known, you fell off your path to find security
    in someone else’s.
  prefs: []
  type: TYPE_NORMAL
- en: You create your life’s work through experimentation and evolution.
  prefs: []
  type: TYPE_NORMAL
- en: Your brand, content, and products won’t stay the same.
  prefs: []
  type: TYPE_NORMAL
- en: They will change as you discover new goals for yourself, but you won’t discover
    those goals unless you start and pursue your current ones.
  prefs: []
  type: TYPE_NORMAL
- en: '**If you aren’t sure how to orient yourself in a positive direction:**'
  prefs: []
  type: TYPE_NORMAL
- en: Deeply understand what you don’t want in life.
  prefs: []
  type: TYPE_NORMAL
- en: An anti-vision that brings clarity to your vision.
  prefs: []
  type: TYPE_NORMAL
- en: Is it a job you despise? Then your aim is to create more enjoyable work and
    learn everything necessary to achieve that.
  prefs: []
  type: TYPE_NORMAL
- en: Is it being overweight and unconfident? Then your aim is the opposite.
  prefs: []
  type: TYPE_NORMAL
- en: Get mad at yourself.
  prefs: []
  type: TYPE_NORMAL
- en: That which you don’t hate, you tolerate. – Malcolm X
  prefs: []
  type: TYPE_NORMAL
- en: No tree can grow to heaven unless its roots reach down to hell. – Carl Jung
  prefs: []
  type: TYPE_NORMAL
- en: '**2) A Way To Attract An Audience**'
  prefs: []
  type: TYPE_NORMAL
- en: The term “followers” has lost its punch.
  prefs: []
  type: TYPE_NORMAL
- en: I prefer the term readers, but not everyone views themselves as a writer.
  prefs: []
  type: TYPE_NORMAL
- en: So, we’re going to use the term *audience*.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are a few beautiful things about the internet:'
  prefs: []
  type: TYPE_NORMAL
- en: How far your work spreads is a skill that can be learned and practiced, not
    luck.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: There *are* people who relate to your anti-vision and aim for your future.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It’s free, accessible, and the majority of the population has access to it.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: I’m of the firm belief that the internet was invented by the deep human desire
    to connect, share, and solve problems.
  prefs: []
  type: TYPE_NORMAL
- en: Now that it’s here, and because of shallow human distractions, few people realize
    it as the foundation for pursuing your life’s work.
  prefs: []
  type: TYPE_NORMAL
- en: You’re telling me you have indirect access to nearly everyone in the world,
    and you don’t think any of them can benefit from what you have to offer? Yeah,
    it takes some development and skill acquisition, but once you truly see the potential
    for everyone to have a business in this global decentralized economy, it’s hard
    to pursue any other path.
  prefs: []
  type: TYPE_NORMAL
- en: 'As Naval said:'
  prefs: []
  type: TYPE_NORMAL
- en: '*There are almost 7B people on this planet. Someday, I hope, there will be
    almost 7B companies.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'The point:'
  prefs: []
  type: TYPE_NORMAL
- en: The internet is how you attract an audience to your life’s work.
  prefs: []
  type: TYPE_NORMAL
- en: An audience, large or small, with small being enough to make more than enough
    money to be fulfilled, is not optional.
  prefs: []
  type: TYPE_NORMAL
- en: You aren’t working for a company that attracts an audience to their product
    that you fulfill a specific role in keeping alive.
  prefs: []
  type: TYPE_NORMAL
- en: The audience doesn’t *have* to come from social media. But it’s going to come
    from media (paid ads, podcasts, etc). Might as well take the free and leveraged
    option of building an audience, then tack on other methods.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) A Project Turned Into A Product**'
  prefs: []
  type: TYPE_NORMAL
- en: Projects are how you achieve the goals in your life.
  prefs: []
  type: TYPE_NORMAL
- en: Projects are how you build a solution to a problem.
  prefs: []
  type: TYPE_NORMAL
- en: Projects are how you guide experimentation, education, and skill acquisition.
  prefs: []
  type: TYPE_NORMAL
- en: '[Profitable products](https://mentalmonetization.com) provide a transformation
    – they solve a problem to help you get closer to a goal.'
  prefs: []
  type: TYPE_NORMAL
- en: So, if you aren’t building a project, every single day, that pushes you toward
    your vision for the future, you are playing a losing game, and your attention
    automatically gets drawn to the projects of others so you can make money and survive.
  prefs: []
  type: TYPE_NORMAL
- en: Build more projects.
  prefs: []
  type: TYPE_NORMAL
- en: It can be a program that helps you get in shape.
  prefs: []
  type: TYPE_NORMAL
- en: It can be a planner that helps you stay productive.
  prefs: []
  type: TYPE_NORMAL
- en: It can be a Kortex or Notion system that helps you write content, take notes,
    track progress, or anything really. Templates are always beneficial to include
    in a product.
  prefs: []
  type: TYPE_NORMAL
- en: And if you attract an audience that has the same vision as you, they will pay
    you for these projects if you position them correctly.
  prefs: []
  type: TYPE_NORMAL
- en: '**4) Experimentation, Iteration, & Persistence**'
  prefs: []
  type: TYPE_NORMAL
- en: You will have to improve your product based on feedback.
  prefs: []
  type: TYPE_NORMAL
- en: You will have to create new products to reverse brand entropy.
  prefs: []
  type: TYPE_NORMAL
- en: You will have to experiment with content ideas while doubling down on feedback.
  prefs: []
  type: TYPE_NORMAL
- en: You will have to change direction toward your own goals in life in order to
    evolve.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t get stuck.
  prefs: []
  type: TYPE_NORMAL
- en: It’s all an iterative process.
  prefs: []
  type: TYPE_NORMAL
- en: How To Set Yourself Apart
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The 4 pillars of creative work are:'
  prefs: []
  type: TYPE_NORMAL
- en: Brand
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Content
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Product
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Promotion
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Most people focus on the skill they want to sell and forget that they need to
    earn an income to survive.
  prefs: []
  type: TYPE_NORMAL
- en: 'The problem:'
  prefs: []
  type: TYPE_NORMAL
- en: Most people have no idea how to stand out.
  prefs: []
  type: TYPE_NORMAL
- en: They start, buy a few courses, and never branch outside of what the courses
    teach.
  prefs: []
  type: TYPE_NORMAL
- en: And just like going to school, you set yourself up for being replaced, or worse…
    forgotten.
  prefs: []
  type: TYPE_NORMAL
- en: Brand Is An Environment
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Stop thinking of your brand as a profile picture and social media bio.
  prefs: []
  type: TYPE_NORMAL
- en: '*Brand is an environment where people come to transform.*'
  prefs: []
  type: TYPE_NORMAL
- en: You attract people to a vision for the future.
  prefs: []
  type: TYPE_NORMAL
- en: You help people move away from an anti-vision.
  prefs: []
  type: TYPE_NORMAL
- en: You illustrate your worldview, story, and philosophy for life across every single
    touchpoint. Your banner, profile picture, bio, link in bio, landing page design,
    pinned content, posts, threads, newsletters, videos, and the rest.
  prefs: []
  type: TYPE_NORMAL
- en: Brand is the little world you are inviting others into.
  prefs: []
  type: TYPE_NORMAL
- en: Brand isn’t illustrated when a reader first visits your profile.
  prefs: []
  type: TYPE_NORMAL
- en: Brand is the accumulation of ideas in your reader’s mind after 3-6 months of
    following you.
  prefs: []
  type: TYPE_NORMAL
- en: Filter all ideas, content, products, and decisions through your brand vision.
  prefs: []
  type: TYPE_NORMAL
- en: People will buy from you even if you have the same products at a higher price
    point as a competitor.
  prefs: []
  type: TYPE_NORMAL
- en: Content Is Novel Perspectives
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: People don’t follow information, they follow perspectives.
  prefs: []
  type: TYPE_NORMAL
- en: 10 people can talk about the same old topics, but one of them can say it in
    such a way that brings an entirely new meaning to it.
  prefs: []
  type: TYPE_NORMAL
- en: Perspectives are infinite.
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes, it’s not about coming up with a completely different idea.
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes, it’s about talking about the same idea, but from a deeper lens.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you want to stand out:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Find ideas that are already working. Save ideas from books, social media,
    podcasts, and videos.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Turn them into an original idea by changing the perspective.
  prefs: []
  type: TYPE_NORMAL
- en: But how do you change the perspective?
  prefs: []
  type: TYPE_NORMAL
- en: How To Think With Impact
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Inside the [free Kortex Second Brain course](https://community.kortex.co), I
    breakdown what I call KoreNotes.
  prefs: []
  type: TYPE_NORMAL
- en: KoreNotes is a note-taking system for writers and creators that I’ve been developing
    for quite some time now.
  prefs: []
  type: TYPE_NORMAL
- en: And after over 70,000 people going through my creative ideas guide and 2 Hour
    Writer course, it’s safe to say that it works.
  prefs: []
  type: TYPE_NORMAL
- en: You can duplicate the [KoreNotes template](https://app.kortex.co/public/document/4d9f5da0-79fb-46b2-a006-869d7dc4ee8d)
    here if you have early access to Kortex, or you can emulate it in another app.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what you do:'
  prefs: []
  type: TYPE_NORMAL
- en: First, choose a high-performing idea that you want to make your own (try one
    from this letter).
  prefs: []
  type: TYPE_NORMAL
- en: 'Then, **pick 3-4** of the following to flesh out more ideas related to it:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Problem** – illustrate a problem associated with the idea and how it impacts
    people’s lives.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Goal** – desirable goals people want to achieve to overcome the problem.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Example** – a personal experience or tangible example to help people understand.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Benefit** – the benefits of overcoming the problem and achieving the goal.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Process** – a step-by-step process for overcoming the problem and achieving
    the goal.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Concept** – a word or name that helps make sense of everything above.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, if you understand [persuasion](https://thedankoe.com/letters/the-greatest-skill-of-the-21st-century/),
    content, marketing, or sales – you can see that this is a synthesis of them all.
  prefs: []
  type: TYPE_NORMAL
- en: A completed KoreNote [looks like this.](https://app.kortex.co/public/document/ee3f71e7-44fa-4646-9097-60d8ea0570c4)
  prefs: []
  type: TYPE_NORMAL
- en: You can see how I turned one popular idea into original thought.
  prefs: []
  type: TYPE_NORMAL
- en: One of my most popular YouTube videos was *The One-Person Business (How To Productize
    Yourself).*
  prefs: []
  type: TYPE_NORMAL
- en: That title is just a Concept (the one-person business) and Process (how to productize
    yourself).
  prefs: []
  type: TYPE_NORMAL
- en: The video itself is composed of KoreNotes as building blocks.
  prefs: []
  type: TYPE_NORMAL
- en: I promise you.
  prefs: []
  type: TYPE_NORMAL
- en: If you create 1 KoreNote a day for a week, you will realize that you can create
    unique ideas that others can’t stop reading.
  prefs: []
  type: TYPE_NORMAL
- en: You can string KoreNotes together for unique writing.
  prefs: []
  type: TYPE_NORMAL
- en: You can use each KoreNote as an outline for a thread or newsletter.
  prefs: []
  type: TYPE_NORMAL
- en: You can use each part of a KoreNote for individual posts.
  prefs: []
  type: TYPE_NORMAL
- en: You can use a KoreNote as an outline for a product and landing page.
  prefs: []
  type: TYPE_NORMAL
- en: This is how you end writer’s block and create a database of intellectual property.
  prefs: []
  type: TYPE_NORMAL
- en: A secret weapon for those who want to stand out.
  prefs: []
  type: TYPE_NORMAL
- en: Education Is The New Marketing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You can’t write or sell whatever you want because you don’t understand how becoming
    interested works.
  prefs: []
  type: TYPE_NORMAL
- en: People aren’t just born interested in something.
  prefs: []
  type: TYPE_NORMAL
- en: They’re slowly exposed to ideas, from beginner to advanced, until they become
    interested in that thing.
  prefs: []
  type: TYPE_NORMAL
- en: First, they’re exposed to why they should care about that thing.
  prefs: []
  type: TYPE_NORMAL
- en: Second, they’re exposed to how a pain point is affecting their life.
  prefs: []
  type: TYPE_NORMAL
- en: Third, they’re exposed to a solution that creates a desire to change.
  prefs: []
  type: TYPE_NORMAL
- en: And through that process, they become interested in that thing.
  prefs: []
  type: TYPE_NORMAL
- en: Your writing doesn’t do well because you’re trying to discuss a topic that people
    don’t care about.
  prefs: []
  type: TYPE_NORMAL
- en: 'When you start talking about a new topic, establish interest by:'
  prefs: []
  type: TYPE_NORMAL
- en: Writing content about why it’s important to your brand vision.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Making people aware of pain points in their lives.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Giving actionable steps to overcome those pain points.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create a free guide that goes over all of the above.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Turn parts of that guide into posts, threads, newsletters, videos, etc.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your job isn’t to “find” a niche set of customers.
  prefs: []
  type: TYPE_NORMAL
- en: On something like social media, where most of your content is being shared to
    random people who don’t care about you, your job is to create customers with constant
    education and brand awareness.
  prefs: []
  type: TYPE_NORMAL
- en: Systems Are The New Product
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: At this point in time, we are in a systems economy.
  prefs: []
  type: TYPE_NORMAL
- en: People don’t want *a* solution to their problems.
  prefs: []
  type: TYPE_NORMAL
- en: They want *your* solution to their problems.
  prefs: []
  type: TYPE_NORMAL
- en: There are tons of writing products out there, so what’s different about [2 Hour
    Writer](https://2hourwriter.com)?
  prefs: []
  type: TYPE_NORMAL
- en: It’s a system I created through experience.
  prefs: []
  type: TYPE_NORMAL
- en: It doesn’t teach a bunch of academic writing nonsense that doesn’t help you
    achieve our shared vision of living a creative and meaningful life.
  prefs: []
  type: TYPE_NORMAL
- en: 'I had a few problems:'
  prefs: []
  type: TYPE_NORMAL
- en: I had trouble having an endless source of content ideas.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I didn’t want to waste a ton of time creating content for all different platforms.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So, I started experimenting with my own system.
  prefs: []
  type: TYPE_NORMAL
- en: 'My goal for the system was clear: write all of the content I need to in under
    2 hours a day. That way my audience growth is handled and I can focus on building
    better products and enjoying life.'
  prefs: []
  type: TYPE_NORMAL
- en: I started testing solutions to have more content ideas.
  prefs: []
  type: TYPE_NORMAL
- en: I created swipe files, steps to generate ideas, and templates if I still couldn’t
    think of anything.
  prefs: []
  type: TYPE_NORMAL
- en: 'I mapped out exactly what I was going to attempt to write each week: 3 posts
    a day, 1 thread a week, and 1 newsletter a week.'
  prefs: []
  type: TYPE_NORMAL
- en: During that process, I realized I could cross-post my writing to all social
    platforms (this is public, you can see it). I also realized that threads could
    be turned into carousels, and newsletters could be turned into YouTube videos.
  prefs: []
  type: TYPE_NORMAL
- en: If the system didn’t flow, I would try new things the next week.
  prefs: []
  type: TYPE_NORMAL
- en: From there, I realized I could copy-paste my newsletter to my blog, embed the
    YT video in that blog, promote my products in that blog, and turn that blog into
    more content ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Then, I could link that blog under my content each day.
  prefs: []
  type: TYPE_NORMAL
- en: This led to more newsletter subscribers, YouTube subscribers, and product sales.
  prefs: []
  type: TYPE_NORMAL
- en: I realized that if everything I did was newsletter-centric, that’s all I had
    to worry about for both growing my audience and promoting my products.
  prefs: []
  type: TYPE_NORMAL
- en: That’s how you stand out in a world of copy-paste products.
  prefs: []
  type: TYPE_NORMAL
- en: Yes, it takes time and experience.
  prefs: []
  type: TYPE_NORMAL
- en: But the end result is so worth it.
  prefs: []
  type: TYPE_NORMAL
- en: That’s it for this letter.
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
