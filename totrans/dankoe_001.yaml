- en: The Path Of The NPC (How To Not End Up Mediocre)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-path-of-the-npc-how-to-not-end-up-mediocre/](https://thedankoe.com/letters/the-path-of-the-npc-how-to-not-end-up-mediocre/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You have been copying people since you were born.
  prefs: []
  type: TYPE_NORMAL
- en: That’s how you learn to operate in society.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are 2 paths this can lead to:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) The path of the NPC
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The NPC, or non-player character, is an individual that is a slave to their
    programming.
  prefs: []
  type: TYPE_NORMAL
- en: They never question their beliefs (you know, the ones that were projected on
    them and they accepted without a fight).
  prefs: []
  type: TYPE_NORMAL
- en: They never seek to change.
  prefs: []
  type: TYPE_NORMAL
- en: The default path of going to school, getting a job, and retiring at 65 are the
    only big goals they have.
  prefs: []
  type: TYPE_NORMAL
- en: They never branch into the unknown.
  prefs: []
  type: TYPE_NORMAL
- en: Their life becomes boring, mechanical, and animalistic. They never discover
    new potentials for their life. And even if they do, it scares them back into their
    comfortable hole.
  prefs: []
  type: TYPE_NORMAL
- en: 2) The path of the Main Character
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A main character is an individual with a clear vision for the future, self-generated
    goals to actualize it, and non-negotiable actions they must take on a daily basis.
  prefs: []
  type: TYPE_NORMAL
- en: They are aware that the conventional career path leads to the same mediocre
    lifestyle that you can observe in 99% of the population.
  prefs: []
  type: TYPE_NORMAL
- en: They understand that they must take responsibility for their lives.
  prefs: []
  type: TYPE_NORMAL
- en: They understand that they are entitled to nothing. That they must create success
    whether the odds are for or against them.
  prefs: []
  type: TYPE_NORMAL
- en: '**Reminder**: As you know, Solopreneur Sprints (build the base of your one-person
    business) starts on the 15th. [Enroll here](https://sprints.digitaleconomics.school).'
  prefs: []
  type: TYPE_NORMAL
- en: You Are A Perspective Vessel In A Subjective Reality
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1155">![](../Images/0adaf7127453fd183284fef8dd9a53cd.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Reality is perspective, and you are a perspective vessel.
  prefs: []
  type: TYPE_NORMAL
- en: The NPC and Main Character move through reality in the way they do because of
    their perspective.
  prefs: []
  type: TYPE_NORMAL
- en: Your perspective is forged with time through conditioning.
  prefs: []
  type: TYPE_NORMAL
- en: Conditioning = the information you process with your mind repeated over time
    until those thought processes are automatic.
  prefs: []
  type: TYPE_NORMAL
- en: Perspective and identity are closely tied.
  prefs: []
  type: TYPE_NORMAL
- en: 'Joe Dispenza has a saying:'
  prefs: []
  type: TYPE_NORMAL
- en: “Your personality creates your personal reality.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Your identity (your sense of who you are) influences three major things:'
  prefs: []
  type: TYPE_NORMAL
- en: Your perspective or worldview
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How you perceive situations from that perspective
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The choices you make because of both
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The NPC perspective is closed-minded and narrowed on the societal goals projected
    onto them.
  prefs: []
  type: TYPE_NORMAL
- en: The NPC is identified with the beliefs, ideas, and thoughts that they register
    in their awareness.
  prefs: []
  type: TYPE_NORMAL
- en: Because of their ‘average Joe’ identity, they will feel pulled to do things
    that align with that.
  prefs: []
  type: TYPE_NORMAL
- en: 'They will:'
  prefs: []
  type: TYPE_NORMAL
- en: Make similar friends
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Change their external appearance (to fit in)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Consume movies, media, and information that reinforces that identity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All of which narrow their mind on certain problems and potentials for their
    life.
  prefs: []
  type: TYPE_NORMAL
- en: For the NPC, the problems often involve paying the bills, advancing their career
    in a corporate power ladder, and saving a few bucks here and there for retirement.
  prefs: []
  type: TYPE_NORMAL
- en: Most of the information they consume will be negative, polarizing, and attention-grabbing
    keeping them in chains.
  prefs: []
  type: TYPE_NORMAL
- en: The most dangerous threat to society is someone who isn’t reliant on it.
  prefs: []
  type: TYPE_NORMAL
- en: From that conditioned perspective, the NPC will interpret situations and opportunities
    in that way.
  prefs: []
  type: TYPE_NORMAL
- en: When someone shows them a business opportunity, like starting a personal brand,
    their mind will flood with the excuses and defense mechanisms programmed into
    it by their parents, school, and news outlets.
  prefs: []
  type: TYPE_NORMAL
- en: When someone encourages them to work on their health, they attack it with whatever
    narrative the news has given them to defend themselves.
  prefs: []
  type: TYPE_NORMAL
- en: It is your job to become aware of your mental programming.
  prefs: []
  type: TYPE_NORMAL
- en: That is how you become the main character of your story.
  prefs: []
  type: TYPE_NORMAL
- en: You must realize and work to change the identity that you were conditioned to
    have in a society that glorifies mediocrity.
  prefs: []
  type: TYPE_NORMAL
- en: Changing who you are is difficult, and nobody can do it for you.
  prefs: []
  type: TYPE_NORMAL
- en: It takes intention and effort.
  prefs: []
  type: TYPE_NORMAL
- en: The Intelligent Imitation Process (Become The Main Character)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To begin conditioning your mind for success you must:'
  prefs: []
  type: TYPE_NORMAL
- en: Set new goals for a higher quality of life
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Immerse yourself in the information that will condition a new perspective
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Make progress and notice the positive outcome it has on your life.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Start with what matters most:'
  prefs: []
  type: TYPE_NORMAL
- en: Your mind body, spirit, and finances.
  prefs: []
  type: TYPE_NORMAL
- en: Somebody who values fitness, like a bodybuilder, will make choices that lead
    to a higher quality of life.
  prefs: []
  type: TYPE_NORMAL
- en: It’s baked into the identity
  prefs: []
  type: TYPE_NORMAL
- en: They will eat healthy food, train, and avoid situations that are detrimental
    to their progress.
  prefs: []
  type: TYPE_NORMAL
- en: The same holds true for someone who values building a business, spreading good,
    and a mind that is witty and wise.
  prefs: []
  type: TYPE_NORMAL
- en: The choices they make lead to more energy, less financial stress, and a deeper
    satisfaction from intellectual development.
  prefs: []
  type: TYPE_NORMAL
- en: Most people will think that they should try to stop copying, imitating, or being
    conditioned by information.
  prefs: []
  type: TYPE_NORMAL
- en: That’s impossible.
  prefs: []
  type: TYPE_NORMAL
- en: Imitation is how you learn.
  prefs: []
  type: TYPE_NORMAL
- en: The difference between the NPC and Main Character is that the latter imitates
    with an intelligent or conscious mind.
  prefs: []
  type: TYPE_NORMAL
- en: They are *aware* of what they are imitating and how it impacts their life.
  prefs: []
  type: TYPE_NORMAL
- en: The NPC will imitate the herd and go down the same path.
  prefs: []
  type: TYPE_NORMAL
- en: The main character will imitate who they deem successful in alignment with the
    future they want to create.
  prefs: []
  type: TYPE_NORMAL
- en: Step 1) Create a perspective you can grow into.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Perspective is reality.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to create your own reality, you have to create a new perspective.
  prefs: []
  type: TYPE_NORMAL
- en: The perspective you create will give you a lens to view your present situations
    through.
  prefs: []
  type: TYPE_NORMAL
- en: You “grow into” that perspective through conscious practice.
  prefs: []
  type: TYPE_NORMAL
- en: 'Answer these questions:'
  prefs: []
  type: TYPE_NORMAL
- en: What does my ideal day look like?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What do I want to do as my life’s work?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How do I want to impact people’s lives?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What do I want to look and feel like?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What values and habits will I have to adopt to bring those to life?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: From there, practice putting on the perspective of your future self as you go
    about your days.
  prefs: []
  type: TYPE_NORMAL
- en: It will be difficult at first, but you will start to spot problems and opportunities
    that you can act on.
  prefs: []
  type: TYPE_NORMAL
- en: Step 2) Choose 3-5 “mentors” that you aspire to be like.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*You become what you consume, so consume* *in accordance with* *who you want
    to become.*'
  prefs: []
  type: TYPE_NORMAL
- en: Make this process easy by writing down the 3-5 names of the people that have
    changed *your* perspective.
  prefs: []
  type: TYPE_NORMAL
- en: What is your favorite book that you recommend to everyone? Write down the author’s
    name.
  prefs: []
  type: TYPE_NORMAL
- en: Who is the YouTuber, podcaster, or blogger that you can’t stop watching? The
    one that “blows your mind” every time they post?
  prefs: []
  type: TYPE_NORMAL
- en: What social media accounts do you follow that make you think, “How did they
    say that so perfectly?”
  prefs: []
  type: TYPE_NORMAL
- en: Because that’s the thing… not everyone thinks that. Only you. The combination
    and *connection* of these “mentors” is how you create your own niche, perspective,
    and content that separates you from the crowd.
  prefs: []
  type: TYPE_NORMAL
- en: Re-read the first chapter of your favorite books again — I guarantee your brain
    will light up.
  prefs: []
  type: TYPE_NORMAL
- en: Step 3) Become a mad scientist.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The good life is a series of experiments.
  prefs: []
  type: TYPE_NORMAL
- en: You can’t copy it from someone else. You have to try, fail, and collect the
    pieces that make your individual life great.
  prefs: []
  type: TYPE_NORMAL
- en: The NPC takes what is put in front of them.
  prefs: []
  type: TYPE_NORMAL
- en: The main character leans into the trial and error that reflects in nature toward
    evolution and growth.
  prefs: []
  type: TYPE_NORMAL
- en: As you are immersing yourself in information from your mentors and pushing toward
    your goals, follow the scientific process.
  prefs: []
  type: TYPE_NORMAL
- en: '**Research** – don’t mindlessly consume content. Gather it to apply to your
    goals.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Test** – don’t take advice or information as law. Test if it works for your
    situation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Experiment** – don’t be dogmatic about one method. Try different diets, business
    models, and religious ideologies until the truth of each blurs in the middle.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Discover** – note patterns that get results in alignment with your goals.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Document** – write down what gets you results. This is the valuable information
    that you can sell or leverage.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When you treat your life as a project, it becomes profitable.
  prefs: []
  type: TYPE_NORMAL
- en: A personal brand is just discovering yourself in public and getting paid for
    the research you do.
  prefs: []
  type: TYPE_NORMAL
- en: Step 4) Create or be created.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The primary difference between the NPC and the Main Character is creation.
  prefs: []
  type: TYPE_NORMAL
- en: The NPC is created through years of conditioning that remains unconscious.
  prefs: []
  type: TYPE_NORMAL
- en: The Main Character is created through years of conscious conditioning (they
    choose their inputs).
  prefs: []
  type: TYPE_NORMAL
- en: Nobody escapes conditioning.
  prefs: []
  type: TYPE_NORMAL
- en: It’s happening all around you.
  prefs: []
  type: TYPE_NORMAL
- en: This letter is conditioning you. Hopefully toward something good.
  prefs: []
  type: TYPE_NORMAL
- en: The modern world is create or be created.
  prefs: []
  type: TYPE_NORMAL
- en: The choice is yours (at every millisecond of the day).
  prefs: []
  type: TYPE_NORMAL
- en: Enjoy your weekend.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
- en: P.S. Solopreneur Sprints starts on May 15th.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to build the base of your one-person business with my brand and
    high-performing content systems, [check it out here](https://sprints.digitaleconomics.school).
  prefs: []
  type: TYPE_NORMAL
- en: The price of Digital Economics will also double on that date. You can find it
    on the same page.
  prefs: []
  type: TYPE_NORMAL
