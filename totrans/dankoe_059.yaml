- en: Why Self-Help Is Ruining Your Life
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/why-self-help-is-ruining-your-life/](https://thedankoe.com/letters/why-self-help-is-ruining-your-life/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Self-help is making you miserable. Let’s change that.
  prefs: []
  type: TYPE_NORMAL
- en: This is a topic that has been on my mind recently. I want to clear the room
    up front by saying that self-help is not inherently bad. It can be good in many
    cases.
  prefs: []
  type: TYPE_NORMAL
- en: The energy and information you gain from reading self-help needs to be channeled
    correctly.
  prefs: []
  type: TYPE_NORMAL
- en: The Problem With Self-Help
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Have you ever bought a book and expect your life to change? Don’t lie.
  prefs: []
  type: TYPE_NORMAL
- en: The titles, sub-titles, and social praise from a book hook our attention. We
    build false expectations in our heads, order the book with excitement, and start
    to consume it.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s the thing… You and I both know that reading alone isn’t going to change
    your life.
  prefs: []
  type: TYPE_NORMAL
- en: We end up getting trapped in a cycle of reading with good intentions, but end
    up reading just to feel good about ourselves.
  prefs: []
  type: TYPE_NORMAL
- en: This is called mental masturbation.
  prefs: []
  type: TYPE_NORMAL
- en: Reading about improving yourself but not actually improving yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Reading to feel good about yourself, to feel like you are actually improving
    that is.
  prefs: []
  type: TYPE_NORMAL
- en: In reality, your brain loves collecting those dopamine hits and enforcing the
    mental masturbation loop further.
  prefs: []
  type: TYPE_NORMAL
- en: The Difference Between Self-Help and Self-Improvement
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Self-help is extrinsic motivation – relying on external factors to motivate
    you.
  prefs: []
  type: TYPE_NORMAL
- en: For the David Goggin’s of the world (“fuck motivation, all you need is discipline”),
    you can start to see the problem here.
  prefs: []
  type: TYPE_NORMAL
- en: “All you need is discipline,” is partially true.
  prefs: []
  type: TYPE_NORMAL
- en: 'The extrinsic motivation we get from self-help books is useful for 3 reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: We are motivated (which can be used as initial momentum into discipline)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We are equipped with a concept that can change our lives
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We understand how to implement that concept
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The magic happens in the last point. It forms the basis for self-improvement.
  prefs: []
  type: TYPE_NORMAL
- en: That’s the difference between the two.
  prefs: []
  type: TYPE_NORMAL
- en: Self-help = unsustainable motivation
  prefs: []
  type: TYPE_NORMAL
- en: Self-improvement = implementing self-help concepts, seeing results, and cultivating
    intrinsic motivation
  prefs: []
  type: TYPE_NORMAL
- en: The Thing That Can F*ck You Up
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Not all self-improvement is created equal.
  prefs: []
  type: TYPE_NORMAL
- en: Many people fail to understand is that *some* concepts may not work for you.
    We are human. We are each different in our own unique ways.
  prefs: []
  type: TYPE_NORMAL
- en: This is what creates an anti-self-improvement mindset.
  prefs: []
  type: TYPE_NORMAL
- en: The ones who adopt this mindset implemented a self-help concept, it didn’t work
    for them, and they go on to tell everyone that it doesn’t work.
  prefs: []
  type: TYPE_NORMAL
- en: At the same time there are people that swear by the exact same concepts.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take the gym for example.
  prefs: []
  type: TYPE_NORMAL
- en: Some people love bench press, some people hate it.
  prefs: []
  type: TYPE_NORMAL
- en: Some people say it is a bad exercise for chest growth, others say it’s the best.
  prefs: []
  type: TYPE_NORMAL
- en: Mechanics, genetics, noobie gains, and muscle insertions aside…
  prefs: []
  type: TYPE_NORMAL
- en: How can you know that bench press is a good exercise for you without doing it
    consistently?
  prefs: []
  type: TYPE_NORMAL
- en: If you implemented this exercise, continuously increased weight, and stuck to
    it for 6-12 months – THEN you can decide if it’s good or bad.
  prefs: []
  type: TYPE_NORMAL
- en: This goes for any other concept that can improve your life.
  prefs: []
  type: TYPE_NORMAL
- en: Trying it for a day, deciding it sucks, and dropping it will f*ck you up.
  prefs: []
  type: TYPE_NORMAL
- en: A Foundation of Awareness & House of Direct Experience
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: All true self improvement stems from awareness and is solidified through direct
    experience.
  prefs: []
  type: TYPE_NORMAL
- en: Self-help information makes you *aware* of a problem you may have. It gives
    you steps to fix it.
  prefs: []
  type: TYPE_NORMAL
- en: Following those steps (direct experience) for a given amount of time is what
    improves your life.
  prefs: []
  type: TYPE_NORMAL
- en: If you have given ample time and still not seen results, awareness comes back
    into play and the cycle continuous. Continuous improvement.
  prefs: []
  type: TYPE_NORMAL
- en: If you have a clouded/anxious mind and a self-help book tells you to meditate,
    you need to meditate on a consistent basis to see if it actually helps you. If
    it doesn’t, that’s fine.
  prefs: []
  type: TYPE_NORMAL
- en: Self-help concepts act as a “boost” to your awareness.
  prefs: []
  type: TYPE_NORMAL
- en: Direct experience helps you understand if it is useful to you.
  prefs: []
  type: TYPE_NORMAL
- en: If it is useful to you, the intrinsic motivation starts to build.
  prefs: []
  type: TYPE_NORMAL
- en: If it isn’t useful to you, go back to the awareness step. This is what most
    people skip.
  prefs: []
  type: TYPE_NORMAL
- en: The worst thing you could do at this point is write off self-help as a whole.
  prefs: []
  type: TYPE_NORMAL
- en: That’s how you end up living an average life.
  prefs: []
  type: TYPE_NORMAL
- en: Show me anyone you aspire to be like that doesn’t have a foundation of continuous
    improvement in their life. You won’t be able to. If you can, these people aren’t
    worth aspiring to be like.
  prefs: []
  type: TYPE_NORMAL
- en: Your business will suffer if you don’t improve yourself as your business grows.
  prefs: []
  type: TYPE_NORMAL
- en: Your relationships will suffer if you don’t improve yourself as they grow.
  prefs: []
  type: TYPE_NORMAL
- en: Your health will suffer if you aren’t aware of the hidden problems it is causing.
  prefs: []
  type: TYPE_NORMAL
- en: TLDR
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Self-help is bad if you are reading it to feel like you are actually doing something.
  prefs: []
  type: TYPE_NORMAL
- en: Self-improvement is good if you develop awareness and intrinsic drivers with
    time.
  prefs: []
  type: TYPE_NORMAL
