- en: Cheap Dopamine Stops You From Becoming High Value
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/how-cheap-dopamine-prevents-you-from-becoming-high-value/](https://thedankoe.com/letters/how-cheap-dopamine-prevents-you-from-becoming-high-value/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Hey*,* you ***NEED*** to become a *HIGH-VALUE INDIVIDUAL!*
  prefs: []
  type: TYPE_NORMAL
- en: If this were a tweet, it would get 10,397 likes.
  prefs: []
  type: TYPE_NORMAL
- en: If I were to ask you what becoming “valuable” means, would you be able to tell
    me?
  prefs: []
  type: TYPE_NORMAL
- en: Is it acquiring a certain number of skills?
  prefs: []
  type: TYPE_NORMAL
- en: Is it how you combine those skills?
  prefs: []
  type: TYPE_NORMAL
- en: Is it the result those skills get for a person that is receiving that value?
  prefs: []
  type: TYPE_NORMAL
- en: What about the value of that Ferrari? Maybe the value of a human being? Is that
    NFL cheerleader more valuable to you than the woman that just passed you on the
    street?
  prefs: []
  type: TYPE_NORMAL
- en: You see, nobody *really*knows the answer to the value equation.
  prefs: []
  type: TYPE_NORMAL
- en: And I don’t think anyone has taken the time to bring value to the word “value.”
  prefs: []
  type: TYPE_NORMAL
- en: 'So, let’s answer this age-old question:'
  prefs: []
  type: TYPE_NORMAL
- en: What IS value?
  prefs: []
  type: TYPE_NORMAL
- en: The Psychology Of Value
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In your brain the down world is managed by a handful of chemicals—neurotransmitters,
    they’re called—that let you experience satisfaction and enjoy whatever you have
    in the here and now. But when you turn your attention to the world of up, your
    brain relies on a different chemical—a single molecule—that not only allows you
    to move beyond the realm of what’s at your fingertips, but also motivates you
    to pursue, to control, and to possess the world beyond your immediate grasp. It
    drives you to seek out those things far away, both physical things and things
    you cannot see, such as knowledge, love, and power. — The Molecule Of More
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: From a external standpoint, value is determined by dopamine.
  prefs: []
  type: TYPE_NORMAL
- en: That’s how we label something as valuable by conventional standards, correct?
  prefs: []
  type: TYPE_NORMAL
- en: We have a perspective that is conditioned by culture and society, perceive an
    external stimulus, and become slaves to that feeling of desire.
  prefs: []
  type: TYPE_NORMAL
- en: The fancy cars, Rolex watches, models, and six-pack abs on the beach (with water
    that is a *little* too blue).
  prefs: []
  type: TYPE_NORMAL
- en: The thing is, dopamine is the desire molecule, not the pleasure molecule.
  prefs: []
  type: TYPE_NORMAL
- en: Desire, and the strength of that desire, is determined by *how far away something
    is from you.*
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-799">![](../Images/482119c142675eb47c3282e8ac5e5e91.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Dopamine has many other determining factors of course like novelty, anticipation,
    and complexity — but we are talking about value here.
  prefs: []
  type: TYPE_NORMAL
- en: When we see something that we do not have, we misperceive it.
  prefs: []
  type: TYPE_NORMAL
- en: We assume that it holds more value than it does simply because it resides in
    our extra-personal space — while other neurotransmitters manage the peri-personal
    space (the things you possess).
  prefs: []
  type: TYPE_NORMAL
- en: As a lesson, remember that your mind will trick you into thinking that something
    is valuable when there is a gap between you and it.
  prefs: []
  type: TYPE_NORMAL
- en: When you close that gap and possess what you used to deem valuable, it quickly
    loses it’s shine.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, that donut advertisement looks incredible up until you take
    the first bite. After that, the dopaminergic response falls drastically.
  prefs: []
  type: TYPE_NORMAL
- en: Remember how much you liked your car when you first got it?
  prefs: []
  type: TYPE_NORMAL
- en: How much did you like it after a week? (Trick question, that is dependent on
    how well you can manage which neurotransmitters are fueling your brain. If you
    have present moment appreciation for the car, it can retain its perceived value
    in *your* eyes).
  prefs: []
  type: TYPE_NORMAL
- en: Dopamine is fuel, not a value determinant.
  prefs: []
  type: TYPE_NORMAL
- en: Perception, Marketing, & Glamour
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Marketers know this well:'
  prefs: []
  type: TYPE_NORMAL
- en: If you want to master marketing, master perception.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A better product will always lose to a product that people *think* is better.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [May 28, 2022](https://twitter.com/thedankoe/status/1530479498872889344?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As do any creators, influencers, or average Joe’s that are going out to the
    club on a Friday night.
  prefs: []
  type: TYPE_NORMAL
- en: While the *gap* between you and your desires impacts the value you project on
    something, people can manipulate what is on the other side of that gap.
  prefs: []
  type: TYPE_NORMAL
- en: Marketers polish their products.
  prefs: []
  type: TYPE_NORMAL
- en: Influencers polish their brands.
  prefs: []
  type: TYPE_NORMAL
- en: Average Joe’s put on their best floral shirt, hair gel, and that new cologne
    (that promises more women!) before they head out for the night.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t a bad thing.
  prefs: []
  type: TYPE_NORMAL
- en: I would argue it is a necessary game that must be played, but is often abused.
  prefs: []
  type: TYPE_NORMAL
- en: It doesn’t matter how much I develop my character to a point of value if I can’t
    even catch someone else’s attention with my external appearance.
  prefs: []
  type: TYPE_NORMAL
- en: Just like writing content.
  prefs: []
  type: TYPE_NORMAL
- en: You can have the same value inside two separate Twitter threads, but the hook
    will be what influences engagement the most.
  prefs: []
  type: TYPE_NORMAL
- en: I’m friends with many ghostwriters.
  prefs: []
  type: TYPE_NORMAL
- en: One has straight up copied the same thread “body,” exchanged the “hook,” and
    the difference was millions of impressions and 20,000+ likes.
  prefs: []
  type: TYPE_NORMAL
- en: That’s insane.
  prefs: []
  type: TYPE_NORMAL
- en: The lesson being, if you have developed intrinsic value, but your extrinsic
    value is not desirable… not many will be exposed to the depth of your being, brand,
    or creations.
  prefs: []
  type: TYPE_NORMAL
- en: 'The second lesson:'
  prefs: []
  type: TYPE_NORMAL
- en: Become a dopamine dealer, but deliver on the glamour that you display.
  prefs: []
  type: TYPE_NORMAL
- en: Bridge the gap, because if you don’t, that’s called a scam.
  prefs: []
  type: TYPE_NORMAL
- en: Depth VS Looks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: True value requires development over time.
  prefs: []
  type: TYPE_NORMAL
- en: This is a universal principle and is one reason I start my week by writing these
    newsletters.
  prefs: []
  type: TYPE_NORMAL
- en: If I want my tweets or other content to be truly valuable (and not just parroting
    what someone else has said) I have to **start with depth****.**
  prefs: []
  type: TYPE_NORMAL
- en: I write the newsletter and *then* condense it into short, punchy, and desire-inducing
    tweets.
  prefs: []
  type: TYPE_NORMAL
- en: I teach this process (and the true fundamentals of high impact digital writing
    / content) in [the 2 Hour Writer.](https://2hourwriter.com)
  prefs: []
  type: TYPE_NORMAL
- en: Like how an author can get thousands upon thousands of likes on the most basic
    content out there. The reason being is that he wrote an entire book that provides
    unique perspectives, credibility, and fleshed-out ideas.
  prefs: []
  type: TYPE_NORMAL
- en: James Clear could tweet the word “habits” and outperform any account that would
    do the same. I wonder why.
  prefs: []
  type: TYPE_NORMAL
- en: If you are working to “provide value” in business or relationships, you can’t
    deliver a present with nothing inside.
  prefs: []
  type: TYPE_NORMAL
- en: You can’t expect to make any worthwhile progress if you are only working on
    the tip of the iceberg. You must create depth.
  prefs: []
  type: TYPE_NORMAL
- en: The tip of the iceberg = dopamine
  prefs: []
  type: TYPE_NORMAL
- en: The depths of the iceberg = “down” neurotransmitters, something you can *appreciate*
    once the external shine fades.
  prefs: []
  type: TYPE_NORMAL
- en: Your external appearance should be backed with years of self-development if
    you want to sustain any fulfilling relationship.
  prefs: []
  type: TYPE_NORMAL
- en: Your short-form content should be backed with long-form content, direct experience,
    or research that illustrates the depth behind the short-form content.
  prefs: []
  type: TYPE_NORMAL
- en: Your offer should have the looks (desired end result) but must also have the
    depth (customer results) in a way that makes sense as a pair. The gap must be
    closed when the looks deliver a dopamine hit to the perceiver.
  prefs: []
  type: TYPE_NORMAL
- en: If your offer — your product or service — does not have looks that match the
    depth, that’s called a scam.
  prefs: []
  type: TYPE_NORMAL
- en: The larger the gap is between looks and depth, the more you aren’t delivering
    on dopamine, that’s called manipulation.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, all of this takes time. We are talking about super valuable things
    here. When you are a beginner, you will have to start small and prove your worth.
  prefs: []
  type: TYPE_NORMAL
- en: You can’t skip the experience that comes with going from level 1 to 100, even
    if you buy a course that shows you how to get there, you still have to put in
    the reps and directly experience those teachings.
  prefs: []
  type: TYPE_NORMAL
- en: To wrap everything up, know that value creation is a lifelong game.
  prefs: []
  type: TYPE_NORMAL
- en: If you aren’t committed to *creating* the most value as humanly possible, my
    guess is that you are doing the opposite — sucking the value out of everything
    while delivering nothing in return.
  prefs: []
  type: TYPE_NORMAL
- en: Flip the switch.
  prefs: []
  type: TYPE_NORMAL
- en: — Dan Koe
  prefs: []
  type: TYPE_NORMAL
