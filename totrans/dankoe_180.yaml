- en: How To Think Like A Genius (The Map Of All Knowledge)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何像天才一样思考（所有知识的地图）
- en: 原文：[https://thedankoe.com/letters/how-to-think-like-a-genius-the-map-of-all-knowledge/](https://thedankoe.com/letters/how-to-think-like-a-genius-the-map-of-all-knowledge/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/how-to-think-like-a-genius-the-map-of-all-knowledge/](https://thedankoe.com/letters/how-to-think-like-a-genius-the-map-of-all-knowledge/)
- en: The mark of a free individual is that they get what they want in life.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 自由个体的标志是他们能够得到他们生活中的想要的东西。
- en: This requires them to learn how to learn, how to earn, and how to think.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这需要他们学习如何学习，如何赚钱，以及如何思考。
- en: The last one – how to think – is the most important because your thoughts influence
    what you learn, how you act, and whether or not you can create a strategy that
    allows you to achieve the big goals that most people wouldn’t even think to achieve.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一个——如何思考——是最重要的，因为你的思想会影响你学习的内容，你的行为方式，以及你是否能够制定一个策略，让你实现大多数人甚至不会想到实现的大目标。
- en: 'But here’s the thing: you don’t need to be smart to think like a genius.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 但问题是：你不需要聪明才能像天才一样思考。
- en: In fact, you don’t want to be like most smart people. Smart people often aren’t
    that smart. They memorize facts to get a secure and high-paying job while overanalyzing
    the risk of doing what they want. Dumb people often run laps around smart people
    because they take the stupid risks that shift the trajectory of their lives.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，你不想像大多数聪明人一样。聪明人通常并不那么聪明。他们通过记忆事实来获得一份安全和高薪的工作，同时过度分析他们想要做的事情的风险。愚蠢的人经常绕过聪明人，因为他们愿意承担那些改变他们生活轨迹的愚蠢风险。
- en: Genius-level thinking isn’t about book smarts.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 天才级的思考不是关于书本知识。
- en: It’s about clarity.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这关乎清晰。
- en: That’s why most people end up in a life they hate and aren’t able to think of
    a way out. Their mind can’t sift through the overwhelm, anxiety, and stress so
    it continues to beat them down until they give up completely.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是为什么大多数人最终过上了他们讨厌的生活，而且找不到出路。他们的思维无法筛选出压倒性、焦虑和压力，所以它继续打击他们，直到他们完全放弃。
- en: The good news is, thinking is a skill, and skills can be practiced.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息是，思考是一种技能，而技能是可以练习的。
- en: I’ve always admired the articulation of Jordan Peterson, the magic behind Alan
    Watts, and the clarity of Daniel Schmachtenberger. I want to share with you one
    of the most powerful models that has yet to be conceived. It’s a synthesis of
    all of the world’s great philosophies, scientific discoveries, and psychological
    patterns that, if you spend enough time with it, will radically transform your
    life.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直钦佩乔丹·彼得森的清晰表达，艾伦·瓦茨背后的魔力，以及丹尼尔·施马赫滕贝格的清晰。我想与你分享一个尚未被构思的最强大的模型。这是所有世界伟大哲学、科学发现和心理模式的综合，如果你花足够的时间去研究它，将彻底改变你的生活。
- en: It doesn’t matter if you’re trying to figure out what you want to do with your
    life, become a spiritually enlightened monk, or build a billion-dollar company,
    this model will drastically shorten how quickly you can achieve those things.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是在试图弄清楚你想要做什么，成为一位精神觉醒的僧侣，还是建立一个价值十亿美元的公司，这个模型都将极大地缩短你实现这些目标的速度。
- en: This Map Of All Knowledge Is Mind-Blowing
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这张所有知识的地图令人震惊。
- en: “I don’t have to agree with everything you say, but I should attempt at least
    to understand it, for the opposite of mutual understanding is, quite simply, war.”
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “我不必同意你说的每一件事，但至少我应该尝试去理解它，因为相互理解的相反，简单地说，就是战争。”
- en: ''
  id: totrans-15
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Ken Wilber
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – Ken Wilber
- en: This may sound obvious, but you have to *think* to solve a problem or achieve
    a goal.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能听起来很明显，但你要思考才能解决问题或实现目标。
- en: You need to identify a problem.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要识别一个问题。
- en: You need to understand it deeply.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要深入理解它。
- en: You need to hypothesize a reasonable goal.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要设定一个合理的目标。
- en: You need to create and execute a strategy to achieve the goal.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要制定并执行一个策略来实现目标。
- en: Sounds simple, but it’s incredibly complex. Most businesses fail because they
    don’t build a product that actually solves a problem. Most relationships fail
    because problems are never identified. Most people fail in general because they
    simply can’t see a way out of their situation.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 听起来很简单，但极其复杂。大多数企业失败是因为它们没有建立一个真正解决问题的产品。大多数关系失败是因为问题从未被识别。大多数人失败是因为他们根本看不到摆脱困境的方法。
- en: So, if you can improve your thinking, you can solve those problems or achieve
    those goals *faster.* When you map that out over a 10-year timeline, it’s not
    difficult to see that you can achieve 10x more than most people do in their entire
    lifetime.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果你能提高你的思考能力，你就可以更快地解决问题或实现目标。当你将其映射到10年的时间线上，你很容易就能看到，你可以实现比大多数人一生中实现的多10倍。
- en: Let me introduce you to the AQAL model from Ken Wilber, an American Philosopher
    who made it his life’s work to synthesize *all* knowledge and experience into
    one comprehensive theory of everything.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 让我向你介绍肯·威尔伯的AQAL模型，他是一位美国哲学家，他将其一生的工作都致力于将所有知识和经验综合成一个全面的理论。
- en: '[![](../Images/2e437a4f6bfc1cc928bbf474cdb004de.png)](https://substackcdn.com/image/fetch/$s_!QXDl!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Ffd44b6c1-e4d5-4486-9011-11353dbec5d6_1099x736.jpeg)'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](../Images/2e437a4f6bfc1cc928bbf474cdb004de.png)](https://substackcdn.com/image/fetch/$s_!QXDl!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Ffd44b6c1-e4d5-4486-9011-11353dbec5d6_1099x736.jpeg)'
- en: While Wilber has stated that his model is not the end-all be-all, I can confidently
    say that this model is one of those “hidden gems” that most people don’t care
    about for the simple reason that they can’t see beyond their own worldview.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然威尔伯表示他的模型不是终极的，但我可以自信地说，这个模型是那些“隐藏的宝石”之一，大多数人之所以不关心，仅仅是因为他们无法超越自己的世界观。
- en: AQAL stands for All Quadrants, All Levels.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: AQAL代表所有象限，所有层级。
- en: 'Wilber found, through decades of study and 3 year sabbaticals, that all knowledge
    and experience mapped into four interconnected quadrants:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 威尔伯通过数十年的研究和三年的休假，发现所有知识和经验都映射到四个相互关联的象限中：
- en: '**Individual Interior** (Upper Left): Your personal thoughts, emotions, beliefs,
    and consciousness'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**个人内在**（左上角）：你的个人思想、情感、信仰和意识'
- en: '**Individual Exterior** (Upper Right): Your behaviors, actions, and physical
    brain states'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**个人外在**（右上角）：你的行为、行动和物理大脑状态'
- en: '**Collective Interior** (Lower Left): Shared culture, values, and group consciousness'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集体内在**（左下角）：共享文化、价值观和群体意识'
- en: '**Collective Exterior** (Lower Right): Systems, structures, and social institutions'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集体外在**（右下角）：系统、结构和社交机构'
- en: For becoming a genius-level thinker, the utility of this model is that when
    you are facing any form of challenge, you can systematically examine it from all
    four quadrants or perspectives.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 对于成为天才级思考者来说，这个模型的作用在于，当你面临任何形式的挑战时，你可以系统地从所有四个象限或视角来审视它。
- en: More importantly, most people only think from one quadrant and preach that as
    the “one true way.” Capitalists focus on the economic system, lower right. Scientific
    materialists focus on matter and behavior, upper right. Religions focus on shared
    faith, lower left. Stoics and Buddhists focus on the internal world, upper left.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 更重要的是，大多数人只从一个象限思考，并宣扬这是“唯一正确的道路”。资本家关注经济体系，右下角。科学唯物主义者关注物质和行为，右上角。宗教关注共同的信仰，左下角。斯多葛主义者和佛教徒关注内在世界，左上角。
- en: The fact of the matter is that all of these perspectives are valid and overlapping.
    Locking yourself into one dogmatic worldview puts you in a box. Certain problems
    are best solved from certain perspectives, and if you can’t access the right one,
    you will experience unnecessary pain in life.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，所有这些观点都是有效且重叠的。将自己锁定在一个教条的世界观中，会让你陷入困境。某些问题最好从某些角度来解决，如果你无法接触到正确的角度，你将在生活中经历不必要的痛苦。
- en: To make this clear, let’s run through a difficult example.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这一点更清晰，让我们通过一个困难的例子来解释。
- en: I think it’s safe to say that most people struggle to figure out what they want
    in life. That’s a hard problem that 90% of people get stuck on.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为可以说，大多数人都在努力弄清楚他们生活中想要什么。这是一个难题，90%的人都会卡在这里。
- en: If you’ve heard of the Japanese concept of IKIGAI, think of the AQAL model like
    that, but on steroids, especially in this context.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你听说过日本的IKIGAI概念，那么在这个背景下，你可以将AQAL模型看作是那种概念，但更加强大。
- en: Now, thinking is a conversation with yourself.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，思考是与自己的对话。
- en: Idiotic thinking is a conversation that turns into an argument and ends fast
    because you latch onto one answer.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 愚蠢的思维是一种变成争论并迅速结束的对话，因为你只抓住一个答案。
- en: Genius thinking is a conversation that accurately covers multiple perspectives
    and synthesizes their best parts into a clear solution.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 天才思维是涵盖多个视角并准确综合它们最佳部分的对话。
- en: To begin figuring out what we want out of life, we ask a series of questions
    *within each quadrant in the map of all knowledge and experience.*
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 为了开始弄清楚我们想要从生活中得到什么，我们在所有知识和经验地图的每个象限中提出一系列问题。
- en: Here are some examples I came up with (Note that this takes time. True thinking
    is difficult).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些我想出的例子（注意，这需要时间。真正的思考是困难的）。
- en: It may be wise to pull out a pen and paper.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 拿出笔和纸可能是个明智的选择。
- en: '**Individual Interior (Upper Left) – Your Inner World**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**个人内部（左上角）- 你的内心世界**'
- en: What are my core values and what truly matters to me?
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我的核心价值观是什么？对我真正重要的是什么？
- en: What activities make me feel most alive and energized?
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些活动让我感到最真实和充满活力？
- en: What fears or limiting beliefs are holding me back?
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么恐惧或限制性信念阻碍了我？
- en: What does my intuition tell me when I quiet the mental noise?
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当我静下心来，摆脱内心的喧嚣时，我的直觉告诉我什么？
- en: '**Individual Exterior (Upper Right) – Your Actions & Capabilities**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**个人外部（右上角）- 你的行动 & 能力**'
- en: What are my natural talents and developed skills?
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我的自然才能和培养的技能是什么？
- en: What does my behavior reveal about my true preferences?
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我的行为揭示了关于我真实偏好的什么？
- en: What were some of my favorite things as a child?
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我小时候最喜欢的东西有哪些？
- en: What concrete steps am I taking and what life is that leading to?
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我正在采取哪些具体步骤？这会引导我走向什么样的生活？
- en: '**Collective Interior (Lower Left) – Cultural & Social Context**'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**集体内部（左下角）- 文化 & 社会背景**'
- en: What do my parents or religious leaders expect of me in terms of their idea
    of success?
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我的父母或宗教领袖对我的成功有何期望？
- en: How do my friends influence my career aspirations and life path?
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我的朋友们是如何影响我的职业抱负和生活道路的？
- en: How does the language I speak and digital culture I am exposed to influence
    my opportunities?
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我所使用的语言和接触到的数字文化是如何影响我的机会的？
- en: What shared values am I drawn to? What do I find meaningful?
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我被哪些共同价值观所吸引？我找到什么是有意义的？
- en: '**Collective Exterior (Lower Right) – Systems & Structures**'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**集体外部（右下角）- 系统 & 结构**'
- en: What are the current opportunities for jobs, careers, or entrepreneurship in
    today’s world?
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在当今世界，有哪些就业、职业或创业的机会？
- en: How does the education system or internet shape my path?
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教育体系或互联网是如何塑造我的道路的？
- en: What technological or social trends are creating new opportunities?
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些技术或社会趋势正在创造新的机会？
- en: What systemic barriers or advantages do I face?
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我面临哪些系统性障碍或优势？
- en: By using this model, you turn the question of “what do I do with my life?” into
    a comprehensive map that reveals how your authentic self, actual capabilities,
    personal calling, economic realities, and cultural contexts all interplay.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用这个模型，你将“我该如何度过一生？”这个问题转化为一个全面的地图，揭示了你的真实自我、实际能力、个人召唤、经济现实和文化背景如何相互作用。
- en: Rather than ending up with the answer of “I don’t know” or “I’m not interested
    in anything,” you may end up with a few realizations.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是最终得出“我不知道”或“我对什么都不感兴趣”的答案，你可能会得出一些真正的认识。
- en: You might discover you value creativity over financial security.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会发现，你更重视创造力而不是财务安全。
- en: You might discover that the fear of disappointing your parents is hindering
    your authentic desires.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会发现，害怕让父母失望阻碍了你的真实愿望。
- en: You might notice that you procrastinate on certain tasks (to remove from your
    life or delegate) while you can’t stop talking about other interesting tasks.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会注意到，当你无法停止谈论其他有趣的任务时，你可能会推迟某些任务（比如从生活中去除或委托出去）。
- en: You might realize that technology allows you to learn more, do more, and create
    a career path that wasn’t available in the recent past.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会意识到，技术让你能够学到更多，做得更多，并创造出一个在过去不久的过去不可能的职业道路。
- en: Those are deep, life-changing realizations that you may not have come to on
    your own.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这些都是你可能自己没有意识到的深刻、改变生活的认识。
- en: And while that’s powerful, that’s only the first half of this model.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这很强大，但这只是这个模型的一半。
- en: Why Smart People Are Incredibly Dumb
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么聪明人如此愚蠢
- en: You could say that what humans selected for are genetics selected for memetics—our
    genetics selected for radical neuroplasticity and the capacity to have much more
    significant software upgrades that could change our capacity without needing hardware
    upgrades.
  id: totrans-74
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你可以说，人类所选择的，是遗传学所选择的，是遗传学——我们的遗传学选择了极端的神经可塑性，以及拥有更多重大软件升级的能力，这些升级可以改变我们的能力，而无需硬件升级。
- en: ''
  id: totrans-75
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Daniel Schmachtenberger
  id: totrans-76
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 丹尼尔·施马滕贝格
- en: When I first came across this, I was blown away.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 当我第一次遇到这个时，我感到震惊。
- en: It made so much sense that it felt like my mind had expanded into a new dimension
    of thinking.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这听起来如此合理，以至于我感觉我的思维扩展到了一个全新的思考维度。
- en: We covered the “All Quadrants” portion of AQAL, but not the “All Levels” portion.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经涵盖了AQAL的“所有象限”部分，但没有涵盖“所有层次”部分。
- en: All Levels refer to the developmental stages of consciousness that individuals
    and collectives can evolve through.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 所有层次指的是个体和集体可以经历的意识发展阶段。
- en: When it comes to thinking like a genius, this is crucial because most life conflicts
    or “impossible” problems exist because people are operating from different levels.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 当谈到像天才一样思考时，这一点至关重要，因为大多数生活冲突或“不可能”的问题都源于人们处于不同的层次。
- en: We’ve discussed this in depth before when discussing Spiral Dynamics and the
    9 Stages of Ego development, so I want to focus on the 4 key levels that will
    change how you think about the world.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在讨论螺旋动力学和自我发展九阶段时已经深入讨论过这一点，所以我想要关注这4个关键层次，这将改变你对世界的看法。
- en: '[![](../Images/8c026276206fead7528924a51bda35d3.png)](https://substackcdn.com/image/fetch/$s_!Snjt!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F78cd2529-ea13-4820-9c9a-06d2e8131678_781x715.png)'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](../Images/8c026276206fead7528924a51bda35d3.png)](https://substackcdn.com/image/fetch/$s_!Snjt!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F78cd2529-ea13-4820-9c9a-06d2e8131678_781x715.png)'
- en: These levels of development illustrate the dominant value systems of a person
    or culture. In other words, these levels show what people, cultures, or systems
    hold as central and important, which influence the decisions that are made and
    how problems are perceived and solved. Most people reside in the first three,
    while very few – let’s call them geniuses for the sake of this letter – fall into
    the fourth.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这些发展水平展示了一个人或文化的主导价值观。换句话说，这些水平显示了人们、文化或系统认为的中心和重要的事物，这些影响着所做的决策以及如何感知和解决问题。大多数人居住在前三个阶段，而非常少数——为了这封信的方便，我们称他们为天才——落入第四个阶段。
- en: '**1) Premodern**'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 前现代**'
- en: These individuals, cultures, or systems follow established authority and traditions.
    Their thinking is black and white. There is only “one right way,” and that usually
    involves obeying a God or conforming to what is right and true.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这些个人、文化或系统遵循既定的权威和传统。他们的思维是黑白分明的。只有“一种正确的方式”，这通常涉及服从上帝或符合正确和真实的事物。
- en: '**2) Modern**'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 现代**'
- en: They value science, individual achievement, and competition. You can best identify
    this level in universities, corporate structures, and self-help teachings. People
    with a modern worldview are dogmatic about the fact that success should be based
    on merit and results.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 他们重视科学、个人成就和竞争。你可以在大学、企业结构和自助教学中最好地识别这一层次。具有现代世界观的人坚信成功应该基于功绩和结果。
- en: '**3) Postmodern**'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 后现代**'
- en: Postmodernists value relativistic thinking. Everyone’s truth is valid. Include
    everyone and ensure they are equal.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 后现代主义者重视相对主义思考。每个人的真理都是有效的。包括所有人并确保他们平等。
- en: With each of these stages, there are good and bad parts, and in today’s world,
    postmodern thinking has gone pathological, resulting in things like DEI, gender
    politics, and attempting to dismantle all hierarchies, which is stupid and impossible.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 每个这些阶段都有好的一面和不好的一面，在当今世界，后现代思维已经病态化，导致了像DEI、性别政治和试图摧毁所有等级制度这样的现象，这是愚蠢且不可能的。
- en: The critical piece of these first 3 stages is that they cannot hold multiple
    perspectives. They are right and you are wrong. This makes it difficult for them
    to think outside of their stage, and even more difficult to solve personal and
    systemic problems that lead to beneficial progress for humanity.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这前三个阶段的关键在于它们不能持有多个观点。它们是对的，而你是不对的。这使得它们难以超越自己的阶段思考，甚至更难以解决导致人类有益进步的个人和系统性问题。
- en: This is why smart people are incredibly dumb.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么聪明人非常愚蠢。
- en: '[![](../Images/a259d23d73ba5aa3bd542ef98bee6fa8.png)](https://substackcdn.com/image/fetch/$s_!cXTE!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F93320fe5-881c-41e3-aef8-60e6351f51f8_800x450.jpeg)'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](../Images/a259d23d73ba5aa3bd542ef98bee6fa8.png)](https://substackcdn.com/image/fetch/$s_!cXTE!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F93320fe5-881c-41e3-aef8-60e6351f51f8_800x450.jpeg)'
- en: '**4) Second-Tier**'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 二级**'
- en: With enough effort and development, you can reach the stage of second-tier thinking.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 通过足够的努力和发展，你可以达到二级思考的阶段。
- en: At this stage, you are able to look backward and pull truths from all prior
    perspectives, opening up a world of complexity, systems thinking, and awareness.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，你能够回顾过去，从所有先前的视角中提炼真理，开启一个充满复杂性、系统思维和意识的世界。
- en: It’s less about a black and white “I’m right and you’re wrong” and more about
    a nuanced “the best solution comes from a synthesis of all.” Authority is important,
    merit is important, equality is important, but many people can hold those contradictions
    in their minds long enough for them to be reconciled.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不是关于黑白分明的“我是对的，你是错的”，而更多是关于细微的“最佳解决方案来自综合所有观点”。权威很重要，功绩很重要，平等很重要，但许多人可以在心中长时间保持这些矛盾，直到它们得到调和。
- en: Genius thinkers understand that these are stages, not static identities you
    have for the rest of your life. They often act as “translators” between different
    stages.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 天才思想家明白这些是阶段，而不是你余生都拥有的静态身份。他们经常充当不同阶段之间的“翻译者”。
- en: If the problem is business related, they can put on the cap of a CEO and resolve
    it faster than someone who permanently wears the cap of a bible-thumper for clear
    reasons.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 如果问题是与业务相关，他们可以戴上CEO的帽子，比那些永远戴着圣经敲击者帽子的人更快地解决问题，原因很明显。
- en: If the problem is in a personal relationship, mansplaining about female psychology
    may help, but it isn’t the best substitute for empathy, depending on the *context.*
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 如果问题是个人关系，对女性心理的mansplaining可能会有所帮助，但根据*情境*，它并不是同理心的最佳替代品。
- en: If the problem is writing on social media to attract and help an audience of
    self-helpers, you must understand their psychology and the best way to navigate
    their mind to reach the next level of development.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 如果问题是撰写社交媒体内容以吸引和帮助自助听众，你必须了解他们的心理，以及如何最好地引导他们的思维以达到下一个发展阶段。
- en: When it comes to figuring out what you want in life, accepting that you *are*
    in a modern stage of development can allow you to zoom out a layer, notice your
    shortcomings, and account for them when acting toward a better life.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到确定你生活中想要什么时，接受你正处于现代发展阶段，可以让你退后一步，注意到你的不足，并在追求更好生活的行动中考虑到它们。
- en: This is a dense topic.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个复杂的话题。
- en: We could continue talking about it for hours upon hours.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以就此话题谈论数小时。
- en: My challenge to you is to pursue this knowledge in your own time, by your own
    curiosity, because it will only enhance your ability to take control of your life.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我对你的挑战是在你自己的时间里，通过你自己的好奇心去追求这种知识，因为它将只会增强你掌控自己生活的能力。
- en: Thank you for reading.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您的阅读。
- en: – Dan
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
