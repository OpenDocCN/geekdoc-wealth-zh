- en: Solve Your Own Problems & Sell The Solution
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-self-reliant-career-path-how-to-generate-independent-income/](https://thedankoe.com/letters/the-self-reliant-career-path-how-to-generate-independent-income/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The creator economy is a decentralized society where people can learn, teach,
    and create a better life for themselves.
  prefs: []
  type: TYPE_NORMAL
- en: I made this realization over the past decade.
  prefs: []
  type: TYPE_NORMAL
- en: When I was a child, I didn’t trust the school system (or my parents) to equip
    me with the knowledge necessary to make the most of my life.
  prefs: []
  type: TYPE_NORMAL
- en: Instead, I consumed content from YouTubers, bloggers, and social media accounts
    that were teaching about fitness, business, and philosophy.
  prefs: []
  type: TYPE_NORMAL
- en: I bought affordable courses that taught me more than my overpriced college degree.
  prefs: []
  type: TYPE_NORMAL
- en: My college degree got me into a $60K/year job.
  prefs: []
  type: TYPE_NORMAL
- en: My internet studies built me a business that enables me to do anything I want
    in this life.
  prefs: []
  type: TYPE_NORMAL
- en: Education is only one aspect of the creator economy.
  prefs: []
  type: TYPE_NORMAL
- en: I see it as a self-sufficient Utopia that is the product of human desire and
    evolution.
  prefs: []
  type: TYPE_NORMAL
- en: I have a person that sells shoes.
  prefs: []
  type: TYPE_NORMAL
- en: I have a person that sells kitchenware.
  prefs: []
  type: TYPE_NORMAL
- en: I have a person that sells blue light glasses.
  prefs: []
  type: TYPE_NORMAL
- en: I have a person that sells apparel.
  prefs: []
  type: TYPE_NORMAL
- en: I have a person that sells coffee and supplements.
  prefs: []
  type: TYPE_NORMAL
- en: I have a person that sells fresh herbs, milk, and meat.
  prefs: []
  type: TYPE_NORMAL
- en: All of which have an underlying philosophy that holds more depth than today’s
    shallow brands and mega corporations that just want your money.
  prefs: []
  type: TYPE_NORMAL
- en: 'This thread is a prime example of what I mean:'
  prefs: []
  type: TYPE_NORMAL
- en: This is why I made the Sol short
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A classic, short-inseam 100% cotton short that was flexible, comfortable and
    looked stylish paired with whatever on top.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Couldn’t find it, so I made it. [https://t.co/vB85NhzpCH](https://t.co/vB85NhzpCH)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — 🌞 Sol Brah 🌞 (@SolBrah) [April 22, 2023](https://twitter.com/SolBrah/status/1649604730426126338?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: And, of course, I have plenty of individuals that I can acquire specific knowledge
    from in relevant fields.
  prefs: []
  type: TYPE_NORMAL
- en: If I want to learn stock or real estate investing, I can acquire that knowledge
    for a fraction of what it would cost from a degree. And I would get 10x the results
    because the person teaching it actually has results.
  prefs: []
  type: TYPE_NORMAL
- en: 'The creator economy is where you:'
  prefs: []
  type: TYPE_NORMAL
- en: Find people with shared goals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Curate your own community
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide value to that community
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Get paid for your contributions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: My recommendation is to start with what we’ve learned in previous letters.
  prefs: []
  type: TYPE_NORMAL
- en: Start an education business by pursuing your purpose (because it has minimal
    startup costs and huge profit margins).
  prefs: []
  type: TYPE_NORMAL
- en: Create an independent income for yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Then, build a business that you *really* want to build.
  prefs: []
  type: TYPE_NORMAL
- en: My little one-person education business makes around $1.5 million a year.
  prefs: []
  type: TYPE_NORMAL
- en: I am now writing a book, building software, and strategizing the true impact
    I want to leave on the world. I have the money and resources to do it, but only
    because I started with what was available to me.
  prefs: []
  type: TYPE_NORMAL
- en: I didn’t fantasize about building a billion-dollar company just to leave me
    paralyzed with overwhelm and anxiety.
  prefs: []
  type: TYPE_NORMAL
- en: That’s exactly how you make 0 progress.
  prefs: []
  type: TYPE_NORMAL
- en: P.S. This style of business (solving your own problems and selling the solution)
    is exactly what I help with in [Digital Economics.](https://digitaleconomics.school)
  prefs: []
  type: TYPE_NORMAL
- en: Solve Your Problems For Profit & Purpose
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1145">![](../Images/08261898f47316a6b4c1c5f2a91f77e1.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: My entire business journey was selfish.
  prefs: []
  type: TYPE_NORMAL
- en: All I did was build for myself, write to myself, and sell to myself.
  prefs: []
  type: TYPE_NORMAL
- en: When you are the niche, saturation and competition cease to exist.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you want to profit off of your purpose:'
  prefs: []
  type: TYPE_NORMAL
- en: Identify a problem in your life
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Set a goal to reveal your present purpose
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Experiment with different solutions
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Find what works and create your own
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Talk about your journey in public
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Offer your solution with a price tag on it
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Repeating this process has been the guiding light in my life.
  prefs: []
  type: TYPE_NORMAL
- en: Ever since I can remember I’ve always had a project to build.
  prefs: []
  type: TYPE_NORMAL
- en: A project is an organized way for achieving your goal (or purpose).
  prefs: []
  type: TYPE_NORMAL
- en: A few years ago, I struggled with productivity.
  prefs: []
  type: TYPE_NORMAL
- en: It was difficult to focus and I knew that I could be doing more.
  prefs: []
  type: TYPE_NORMAL
- en: That was the problem that I became aware of.
  prefs: []
  type: TYPE_NORMAL
- en: So, I made it my purpose to fix that area of my life.
  prefs: []
  type: TYPE_NORMAL
- en: I watched YouTube videos, purchased supplements, and ordered a few different
    planners and journals.
  prefs: []
  type: TYPE_NORMAL
- en: I was adamant on solving the problem, so I experimented with every piece of
    advice I got.
  prefs: []
  type: TYPE_NORMAL
- en: After a few months, I had gotten some incredible results.
  prefs: []
  type: TYPE_NORMAL
- en: So, I sat down to create a sustainable productivity solution that would fit
    *me* to perfection (because there was always one minor issue with the other methods
    I tried).
  prefs: []
  type: TYPE_NORMAL
- en: This is when I designed and launched the digital Power Planner.
  prefs: []
  type: TYPE_NORMAL
- en: 'I didn’t have many followers at the time, but I loved the thought of making
    a living from my productivity knowledge. So, I:'
  prefs: []
  type: TYPE_NORMAL
- en: Wrote content on what I knew about productivity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Grew a following with the proper strategies
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Promoted the digital planner as a free download
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Added educational resources to the free download
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: People loved it.
  prefs: []
  type: TYPE_NORMAL
- en: So, I took it further and launched a physical version of the planner.
  prefs: []
  type: TYPE_NORMAL
- en: Things are different now, but the entirety of my success is built on solving
    my own problems and selling the solution.
  prefs: []
  type: TYPE_NORMAL
- en: I solved my career problems by learning web design (so I built a course).
  prefs: []
  type: TYPE_NORMAL
- en: I solved my money problems by succeeding with freelancing (so I built another
    course).
  prefs: []
  type: TYPE_NORMAL
- en: Then, Modern Mastery was born from me building what I would have wanted for
    a community and learning platform.
  prefs: []
  type: TYPE_NORMAL
- en: Now, I’m writing a book and building a software that I could sell to my younger
    self (to help him reach his goals faster).
  prefs: []
  type: TYPE_NORMAL
- en: It’s that simple.
  prefs: []
  type: TYPE_NORMAL
- en: Everyone is an entrepreneur.
  prefs: []
  type: TYPE_NORMAL
- en: Some just get paid for the problems they solve.
  prefs: []
  type: TYPE_NORMAL
- en: The Self-Reliant Career Path (How To Start)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1146">![](../Images/e23ddeff5aa240edef2b8b1b603e8cb3.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: There are almost 7B people on this planet. Someday, I hope, there will be almost
    7B companies. *—* Naval
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The future of work is play and everyone will be an entrepreneur.
  prefs: []
  type: TYPE_NORMAL
- en: Everyone will be forced to create, contribute, and deliver value to their community
    or else their way of survival will dry up.
  prefs: []
  type: TYPE_NORMAL
- en: Artificial intelligence points to this reality.
  prefs: []
  type: TYPE_NORMAL
- en: Automation points to this reality.
  prefs: []
  type: TYPE_NORMAL
- en: Most things on the internet point to this reality.
  prefs: []
  type: TYPE_NORMAL
- en: Even if that does not become that reality for most people, it can for you.
  prefs: []
  type: TYPE_NORMAL
- en: 1) Profitable Interests
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We start with life direction.
  prefs: []
  type: TYPE_NORMAL
- en: You need a vision, goals, and priority tasks that you can execute on every single
    day.
  prefs: []
  type: TYPE_NORMAL
- en: This is how you gain experience in this life.
  prefs: []
  type: TYPE_NORMAL
- en: This is how you gain knowledge, skill, and the direction to acquire both that
    you can pass down to those on the same path.
  prefs: []
  type: TYPE_NORMAL
- en: 'All burning problems (in your life and others) fall within the eternal markets:
    Health, wealth, and relationships.'
  prefs: []
  type: TYPE_NORMAL
- en: Self-improvement is about solving your own problems in those domains.
  prefs: []
  type: TYPE_NORMAL
- en: Business is about providing a solution to problems in those domains.
  prefs: []
  type: TYPE_NORMAL
- en: 'Simply by:'
  prefs: []
  type: TYPE_NORMAL
- en: Setting a purposeful goal to improve yourself
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Self-educating and acquiring the skills for your mind, body, and business
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Letting your curiosity guide which methods you choose and create
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You will have the experience necessary to help others and profit off of living
    with purpose.
  prefs: []
  type: TYPE_NORMAL
- en: Curiosity is a crucial touchpoint there.
  prefs: []
  type: TYPE_NORMAL
- en: What makes you unique is your ability to find the combination of knowledge that
    gets you results.
  prefs: []
  type: TYPE_NORMAL
- en: In business, some may be curious about e-commerce or website flipping.
  prefs: []
  type: TYPE_NORMAL
- en: Others may be curious about personal branding and digital products.
  prefs: []
  type: TYPE_NORMAL
- en: In health, some may be curious about sports and optimal performance.
  prefs: []
  type: TYPE_NORMAL
- en: Others may be curious about bodybuilding and biohacking.
  prefs: []
  type: TYPE_NORMAL
- en: Too often we think that we are doing the same thing as everyone else.
  prefs: []
  type: TYPE_NORMAL
- en: Your story is vastly different.
  prefs: []
  type: TYPE_NORMAL
- en: Everyone has to pursue goals in the same eternal markets. You won’t escape that.
    But the way you pursue those goals can be unique to you, and that’s what makes
    your experience profitable.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Project To Product**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you don’t know what to sell, sell something you would have wanted on your
    journey, or something you can’t find but want right now.
  prefs: []
  type: TYPE_NORMAL
- en: 'When you begin pursuing a goal, the best way to actualize it is to:'
  prefs: []
  type: TYPE_NORMAL
- en: Study the fundamentals to gain clarity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Start a real-world project so you don’t get trapped in tutorial hell
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Build the project until you discover a problem
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Buy courses, coaching, or research internet content to find the solution
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Apply everything you learn until the project is completed
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A “project” doesn’t sound like it applies to all domains of life, but hear me
    out.
  prefs: []
  type: TYPE_NORMAL
- en: When you start improving your health, you only make progress when you turn it
    into a measurable personal project.
  prefs: []
  type: TYPE_NORMAL
- en: You go to the gym.
  prefs: []
  type: TYPE_NORMAL
- en: You write down your routine.
  prefs: []
  type: TYPE_NORMAL
- en: You document every single one of your lifts.
  prefs: []
  type: TYPE_NORMAL
- en: If you aren’t seeing progress, you research and find the gaps in your knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: Maybe it’s nutrition holding you back?
  prefs: []
  type: TYPE_NORMAL
- en: Time to track your calorie intake.
  prefs: []
  type: TYPE_NORMAL
- en: Seeing progress in your physique but not in your energy?
  prefs: []
  type: TYPE_NORMAL
- en: Maybe you fall down an esoteric rabbit hole of how beef liver is the most nutrient-dense
    food on the planet.
  prefs: []
  type: TYPE_NORMAL
- en: So, you experiment with it and note the results.
  prefs: []
  type: TYPE_NORMAL
- en: When you treat every domain of your life as a purpose-oriented project you are
    required to experiment.
  prefs: []
  type: TYPE_NORMAL
- en: Through self-experimentation you create a unique set of experiences that you
    can pass down to others.
  prefs: []
  type: TYPE_NORMAL
- en: In marketing, you are selling purpose (purpose = goal = desired outcome).
  prefs: []
  type: TYPE_NORMAL
- en: You are selling the benefits of the lifestyle that come from pursuing that purpose.
  prefs: []
  type: TYPE_NORMAL
- en: In the health space, some people might sell a running product to *20-30 year
    olds that want to create a healthy social circle and get involved with their community**.*
  prefs: []
  type: TYPE_NORMAL
- en: Others may sell a weight training program to business bros that want to get
    jacked with only 3 days in the gym. That way they have both money and muscles
    so they can live a fun life. Who wouldn’t buy that (if they resonate with the
    product’s philosophy)?
  prefs: []
  type: TYPE_NORMAL
- en: My writing product, [2 Hour Writer](https://2hourwriter.com), is my unique experience
    with personal branding and gaining millions of followers through digital writing.
  prefs: []
  type: TYPE_NORMAL
- en: I experimented with idea generation, newsletter writing, and social media content
    over the course of 2-3 years.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have to wait that long.
  prefs: []
  type: TYPE_NORMAL
- en: I actually recommend launching immediately.
  prefs: []
  type: TYPE_NORMAL
- en: You need *data* and *feedback* as to how to make your products better.
  prefs: []
  type: TYPE_NORMAL
- en: The benefits you reap from living with purpose are your marketing firepower
    to help people live better lives.
  prefs: []
  type: TYPE_NORMAL
- en: That is, the underlying philosophy you forge through self-experimentation is
    how you generate a creative income from your pursuits.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Personal Distribution Center
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This all sounds great so far.
  prefs: []
  type: TYPE_NORMAL
- en: Study your interests to actualize your goals
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Experiment with a personal project to get results
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Turn that project into a product you can sell with purpose
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: But most people get stuck there.
  prefs: []
  type: TYPE_NORMAL
- en: They don’t realize that you need both a product and *people* to actually make
    money.
  prefs: []
  type: TYPE_NORMAL
- en: You have to build *distribution.*
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t optional.
  prefs: []
  type: TYPE_NORMAL
- en: My favorite way to do this is by building a personal brand.
  prefs: []
  type: TYPE_NORMAL
- en: One, because it’s becoming a necessity.
  prefs: []
  type: TYPE_NORMAL
- en: Brands, companies, and employers alike are hiring based on your public resume
    (your profile).
  prefs: []
  type: TYPE_NORMAL
- en: Two, the following you gain is leverage.
  prefs: []
  type: TYPE_NORMAL
- en: You can pivot as your life does and sell anything you want ([as long as you
    don’t box yourself into one narrow niche](https://thedankoe.com/the-most-profitable-niche-is-you-how-to-create-your-niche/)).
  prefs: []
  type: TYPE_NORMAL
- en: Three, most other forms of distribution leave you with nothing.
  prefs: []
  type: TYPE_NORMAL
- en: Paid ads and cold outreach are extremely powerful, but what happens when you
    stop doing them?
  prefs: []
  type: TYPE_NORMAL
- en: Do you have an audience or email list that was built along the way?
  prefs: []
  type: TYPE_NORMAL
- en: Can you ever take a break?
  prefs: []
  type: TYPE_NORMAL
- en: Can you cultivate a meaningful philosophy behind your brand and not be limited
    in the products you sell?
  prefs: []
  type: TYPE_NORMAL
- en: Maybe, but it’s not likely.
  prefs: []
  type: TYPE_NORMAL
- en: 'Build a personal distribution center by:'
  prefs: []
  type: TYPE_NORMAL
- en: Passing down the lessons you learn pursuing your goals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Writing out your thoughts, beliefs, and opinions to separate yourself from others
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Teaching what you learn in a persuasive manner
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That’s really it.
  prefs: []
  type: TYPE_NORMAL
- en: There are technical details and [nuanced strategies for social media growth](https://sprints.digitaleconomics.school)…
    but that’s a goal and project that you can experiment with for yourself.
  prefs: []
  type: TYPE_NORMAL
- en: (That’s how you start learning every marketable skill there is, by building
    your business and applying what you learn to it).
  prefs: []
  type: TYPE_NORMAL
- en: This is the future career path.
  prefs: []
  type: TYPE_NORMAL
- en: This is how you monetize close to everything you learn.
  prefs: []
  type: TYPE_NORMAL
- en: This is how you get paid for just living.
  prefs: []
  type: TYPE_NORMAL
- en: The future belongs to people that pass down their valuable experiences to improve
    others’ lives.
  prefs: []
  type: TYPE_NORMAL
- en: That’s what all the best businesses do, just take a look at the next social
    media post you see (from the lens of a creator, not a consumer) and you can verify
    this for yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Join in on the self-sufficient and growing utopia that is the creator economy
    and thank me later.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
