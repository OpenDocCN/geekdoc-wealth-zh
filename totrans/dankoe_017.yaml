- en: The $1 Million Dollar Skill Stack (Learn In This Order)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-1-million-dollar-skill-stack-learn-in-this-order/](https://thedankoe.com/letters/the-1-million-dollar-skill-stack-learn-in-this-order/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Ever since I can remember, I’ve been obsessed with learning.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: Yes, even years ago when I was playing video games for 3-6 hours a day.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: I *always* carved out time to learn. A lot of it took away from the quality
    of my school work or job – but somehow I always knew that the knowledge acquisition
    would pay off.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: At first, I thought my thirst for learning was shiny object syndrome.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: You know… the “dangerous” thing that every successful person warns against.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: But, if my bursts of obsession were true shiny object syndrome I wouldn’t be
    where I am now.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: My path has led to something I couldn’t fathom as a teen. Now, I’m here to share
    that path with you (but in a streamlined fashion, without the road bumps).
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: 'In the course of 10 years, I’ve obsessed over:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Fitness
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Nutrition
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: SEO
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Web design
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Web development
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Graphic design
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Digital art
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Social media
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Content writing
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Marketing & sales
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Copywriting & funnels
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Neuroscience
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Philosophy
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Spirituality
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Self development
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This list is getting too long so I’m cutting it here… but there’s more.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each obsession lasted ~1-3 months.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: And of course, I wouldn’t exclusively learn about one thing. If a nutrition
    podcast piqued my interest while I was obsessed with copywriting, I’m still going
    to listen to it.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: The results after a decade? The one thing that most people tell you is impossible.
    And even if they don’t literally say it’s impossible, they imply it.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: 'The impossible achievement:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: '*Doing what I love for a living.*'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: Hopping from skill to skill did not prevent me from making an income at the
    start. Don’t get trapped thinking that you can’t replace your income early on
    in your journey ([If you build in the real world, in front of real people, as
    you learn.)](https://thedankoe.com/how-i-remember-everything-i-learn/)
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: To start, let’s not mistake shiny object syndrome for skill stacking.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: Skill stacking > being a specialist > doing nothing at all because you’re afraid
    of saturation, automation, or any other excuse that leads to distraction.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: Skill stacking allows you to build a creative solution to *almost* any burning
    problem on the market.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: I can get better results than a specialist agency simply because I have more
    awareness of the domain.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: I know how A will impact B will impact C and so on throughout the alphabet (and
    how the alphabet makes sense from a cosmic perspective.) Specialists tend to understand
    how A impacts B, but when it gets to C… things start to get fuzzy, which leads
    to limited results, even if those results are above average to the person receiving
    them.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: We’ll talk about why that’s the case toward the end, but first, we have to understand
    what skills to learn (and in what order).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: Stacking Evergreen Skills For Profitability
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-945">![](../Images/db8f53c722608943fa50a5435986a61b.png)</picture>
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: If you follow success-oriented social media accounts, you’ve probably been screamed
    at to learn certain skills.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: “Start an agency!”
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: “Learn Facebook ads!”
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: “Start a personal brand!”
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t bad advice, but I want to propose a different approach.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: So, let’s zoom out and go meta.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: For profitability, you will be exchanging value for value (in the forms of money,
    time, social leverage, information, or expertise).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: You will be exchanging this value with other humans.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: At the top of everything, human nature and psychology reign supreme.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: 'So, we need 3 things:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: '**1) A valuable message** – a way to communicate with others that is relevant,
    understandable, or actionable.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: '**2) A medium for distribution** – a way of putting your valuable message in
    front of people (or else nobody sees your value).'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '**3) A results-oriented skill** – a way for delivering a transformation to
    the people you have attracted with 1 and 2.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: Message, medium, and applicability.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: These are all skills that interact with and enhance one another. Without one,
    you won’t get results. This is why it takes 6+ months to feel like you know what
    you are doing. You can’t just learn a skill and expect people to come to you (and
    then buy from you).
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: The Message
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: People, especially creators, tend to glance over the fact that people can become
    interested in anything.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: Self-awareness and reflection are key here.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: If you’re interested in a weird topic, how did you become interested in it?
    Were you just born with that interest? Of course not. So how can you get others
    interested and attract an audience large enough to make a living from it?
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: If your words aren’t resonating with others, it’s not them, it’s you.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: 'You are either:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: Speaking from an advanced level (when 95% of the market are beginners).
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Don’t understand persuasion. You have to answer or imply an answer to the question
    “What’s in it for me?”
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Didn’t capture their attention and deliver a valuable message to that attention.
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For the last point, “value” does not always mean actionable.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: Value can be described by the key pillars of content creation.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: Educate, entertain, and inspire.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: Entertainment is just as valuable (to some) as education.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: And, “entertaining” doesn’t mean humorous. A relevant statistic or fun fact
    that captures attention can be entertaining. Learning something new is a form
    of entertainment.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: 'There are 2 skills to study if you want to craft a valuable message:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Marketing** – creating a message that is attention-grabbing, relevant,
    and valuable for a specific person.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Sales** – a process for making people aware of their problems and presenting
    a solution to those problems. Notice how you don’t just target people that are
    automatically aware of everything you do. It’s a process.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: Sales can also be synonymous with storytelling.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: They both imply a transformation by overcoming problems in a unique way.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: For the sake of brevity, this letter will not go into each and every skill,
    that would be impossible to accomplish in one letter.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: But, in the last section, I will show you how to best learn these skills.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: If you want my marketing and sales systems that I use to create and launch profitable
    offers, [check out Digital Economics](https://digitaleconomics.school).
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: The Medium
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In life, discipline = freedom (shoutout Jocko).
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: In business, distribution = freedom.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: With an internet business, distribution comes from the combination of media
    and code.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: Coding is a great high-value skill to learn, especially when paired with marketing
    know-how.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: Building software, distributing it online, and actually getting users through
    marketing is a superhuman skill stack. Most coders only know the technical side,
    but not the human side.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: However, many of you here are going down the creative route.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: In this case, keep in mind that you will need technical know-how for the software
    you choose to use.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: You will have to learn no-code tools (like website builders, course platforms,
    note-taking apps, and organizational tools) to maximize the effect of your skill
    stack.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: Your message, from above, is what leads to engagement, impact, and sales.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: But if you don’t have a medium for distribution, people aren’t going to see
    that message, obviously.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: '*This is where I went wrong in the past. I was too focused on perfecting my
    product or service.*'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: The result?
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: No sales, of course. I didn’t have a plan to get *traffic* to my freelance service
    with an overly fancy website, logo, and 3 months of “work” down the drain.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: And, I didn’t have any data. I was creating a product blindly without testing
    first (with content and an audience).
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: Now, in this letter, we are taking a meta-approach.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: You build distribution by growing top-of-funnel social media channels.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: We talk about distribution and leverage in [The One Person Business Roadmap](https://thedankoe.com/the-one-person-business-roadmap-99-of-creators-make-this-mistake/).
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: This can be any of them, but I would recommend beginners start with a social
    platform that allows you to control growth.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: YouTube, podcasts, and blogs are great… but they take time to build. I would
    save them for later in your journey. Treat them as authority-building platforms
    and let them grow with time.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: At the start, I would highly recommend Twitter, Instagram, or LinkedIn… Twitter
    being my favorite. The [only skill you need is writing](https://2hourwriter.com)
    while learning other skills along the way.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: 'The principles of these “growth” social platforms are the same. You need:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: A valuable message
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Eyeballs on that message
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Consistent effort on getting your content shared
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A brand that looks like it should have 1 million followers
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fancy tactics for rapid growth are great. But, it’s better to focus on creating
    content that will bring in followers on any platform.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: So, the *medium* for distributing your message comes *before* the social media
    platform.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: Writing and speaking.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: Those are the mediums for distributing your message.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: When paired with marketing and sales you get copywriting and persuasive speaking.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: This is the foundation of all of my social media growth. Written newsletters
    are scripts for YouTube. Written tweets are scripts for reels (and can be copy-pasted
    to all other platforms.)
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: '[In 2 Hour Writer](https://2hourwriter.com), I show exactly how I write a long-form
    newsletter, deconstruct it into engaging tweets, and distribute that writing across
    all platforms.'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: ALL of my social media growth is based on my writing.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: Speaking comes second (which I base on the written scripts).
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: Other skills to help illustrate that message come third.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: So, start writing to articulate your message. Build distribution on social media.
    Then practice speaking when you are ready.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: Results Oriented Skills
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: By now, we understand that you need an attractive, valuable, and persuasive
    message paired with a medium for distribution.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: That is all you need, but you can enhance these skills by applying them in specific
    ways.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: Email marketing
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sales closing
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Graphic design
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Videography
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Animation
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Web design
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In short, you learn how to *apply* the medium and message – to your own or someone
    else’s business – with technology.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: Every business needs specific technology to pull in customers on the internet.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: When you understand how those pieces work, you can deliver specific results
    through that technology.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: You can write emails that pull in more customers.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: You can create graphics that pull in more followers.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: You can create videos that hold more attention.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: 'You unlock a new level of power when you pair marketing, sales, and communication
    with a specific technology that can be leveraged for what everyone wants:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: Money, followers, reputation, opportunity, freedom, and status as a whole.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: Stacking Personal Interests For Individuality
  id: totrans-131
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In these letters, I talk about turning yourself into the niche and building
    a personal brand.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: But, this can also apply when you are trying to sell to a different customer
    avatar, person, or business.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: With a personal brand, your interests are what make you unique.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: When you have an offer to sell, your interests help you niche down who you sell
    to.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: If I’m interested in fitness, I attract people interested in fitness. Meaning,
    I can introduce them to my other interests.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: Since I understand the fitness scene, I know a LOT about my target customer.
    I can piece together an offer for fitness coaches and help them get better results.
    And, that just sounds more enjoyable than working with a business you despise
    for the sake of money.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: And, if I’m already attracting fitness people by talking about fitness (rather
    than just business) then my target audience IS my audience.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: My interest is fitness, so I incorporate content on that to make myself more
    unique.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: My target customer is a fitness coach, who are attracted through my fitness
    content. Since they are in my audience, I can educate and sell them on my business-related
    offer.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: See how that works?
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: Many people are afraid to incorporate their interests into a focused brand.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: '**“What if it doesn’t get good engagement?”**'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: Then it isn’t interesting enough. You aren’t hitting a relevant pain point and
    why they should care. Anyone can become interested in anything.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: Broaden the topic and speak to a beginner level.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: (Yes, this will still attract advanced-level people. I’m advanced in fitness
    but still need to be reminded of the fundamentals, so I consume basic fitness
    content.)
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: '**“What if I don’t make as many sales?”**'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: Are you hard promoting with every single post? No.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: On a 5-year time scale, if 20% of your posts are about a specific interest,
    do you really think that is going to impact overall revenue?
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: '**Hint**: it doesn’t, and if anything, it contributes to more sales because
    you aren’t hyper-focused on one thing like everyone else.'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: '**“What if my interest has nothing to do with the thing that makes me money?”**'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: Get creative. Use it as a way to help people understand.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: Like when I talk about creators being like DJs.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: I like EDM, but that isn’t related to business. So I note common patterns and
    make business more interesting with it.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: Stacking Experience For Nuance & Navigation
  id: totrans-155
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Nothing happens, then everything happens.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
- en: When you are on the path of mastery, not in one skill, but one domain… your
    life, you will experience this lesson multiple times.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: From the book *Mastery* by George Leonard, mastery is “the mysterious process
    during which what is at first difficult becomes progressively easier and more
    pleasurable through practice.”
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
- en: This is the opposite of instant gratification – and why it is so difficult to
    internalize without action.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: I am not going to baby you here and give exact steps for immediate reward.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
- en: I am, however, going to give you the meta-skills necessary for this path.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: 'Your job:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
- en: Hold these in your mind while on the path.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: When things get difficult, remind yourself that it is a part of the process.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: By sticking things out, you will experience short bursts of intense progress.
    Lean into those. Enjoy them.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
- en: Bursts Of Building
  id: totrans-166
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The 2 skills that will help you learn the skills above are *rapid learning*
    and *rapid execution*.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: 'Combined, we can consider these skills as one:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: Building.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
- en: I wrote an entire letter on this, [you should read it](https://thedankoe.com/how-i-remember-everything-i-learn/)…
    or watch it.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: 'In short, here’s what you do:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
- en: '**Choose a project to emulate.** This should incorporate the skills you are
    trying to learn.'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Start building your own version.** Create an outline for your project and
    build until you hit a wall.'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Seek specific knowledge.** When you hit a wall, learn the skills necessary
    for that specific real-world situation. This helps you cut through the fluff that
    can be learned through experience.'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Bonus: teach along the way.** Teaching will identify your knowledge gaps,
    meaning you can seek more specific knowledge.'
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: My favorite way of integrating everything we’ve learned in this letter is by
    building a one-person business.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
- en: Why?
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: It’s obvious to me, but not to those that haven’t started.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
- en: You get to practice all skills mentioned **on your own business.**
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: Writing, speaking, marketing, sales, and complementary skills like design, video,
    or email.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
- en: You write content, sales pages, and promotions.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: You market your own [Minimum Viable Offer](https://thedankoe.com/the-one-person-business-model-how-to-monetize-yourself/)
    (or affiliate product, you don’t have to have your own) and get data to improve.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
- en: You design your profile picture, banner, product assets, and more.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
- en: Your one-person business success is determined by your ability to learn as you
    build.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
- en: Then, with that skill stack, you can create an irresistible offer for almost
    any online business… or just monetize what you’ve built on the way.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
- en: Tending To Your Perspective
  id: totrans-186
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*1% of 50 years is 6 months.*'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
- en: And 6 months is just the start of the beginning.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
- en: If you are on the path of mastery, you are on it for life.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
- en: When you open your mind beyond surface-level living, you can finally see the
    depth, enjoyment, and reflection of life that the path of mastery presents.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
- en: I mentioned earlier that shiny object syndrome isn’t a bad thing.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
- en: The “bad” shiny objects are the ones that take you off the path.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
- en: Learning a new skill that can complement your current ones is not bad.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
- en: Your skills compound, and nobody can take them away from you.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
- en: When a distraction registers in your awareness, and you *allow* your focus to
    narrow in on it, you close your mind to the depth of your craft.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
- en: The distractions are just that, a temporary bump in the path.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
- en: Because once you’ve started, you will always come back to it, as that is the
    only way to achieve what you want in this life.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
- en: 'The most important pattern to notice here is this:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
- en: Nothing happens, then everything happens.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
- en: Mastery is a cyclical process of slow, or no, progress followed by exponential
    leaps in progress.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
- en: In business, the first exponential leap happens after 6 months of consistent
    effort. This is followed by massive resistance. You will feel like you aren’t
    getting anywhere.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
- en: Zoom out.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
- en: Notice that the months of potential despair are a part of the journey.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
- en: Nobody said you aren’t supposed to feel good (or bad).
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
- en: Nobody said it’s going to be easy (or hard).
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
- en: Nobody said you are supposed to be rich (or poor).
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
- en: Those are expectations you hold in your mind.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
- en: See beyond them.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
- en: Gradual Awareness Of The Domain
  id: totrans-209
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Everything we’ve discussed is a guide until solidified with direct experience.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
- en: “Nothing happens, then everything happens” is just a feel-good saying until
    you truly experience it.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
- en: When you learn one skill, a field of awareness opens around it.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
- en: Like a candle in a dark room.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
- en: This allows you to see the next step forward, and leads to the next skill, broadening
    your field of awareness further.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
- en: The candle turns into two.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
- en: Then three, four, and so on.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
- en: Soon enough, you’re able to navigate a large portion of what used to be a dark
    room.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
- en: '*Nothing happens (pieces of the puzzle that form an ugly mess) then everything
    happens (a piece clicks into place that forms an image you can make sense of).*'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果没有发生（拼凑成混乱的碎片），那么一切都会发生（一个碎片到位，形成一个你可以理解的图像）。*'
- en: This “field of awareness” is where you can help others, build creative solutions,
    and map your journey.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 这个“意识领域”是你可以帮助他人、构建创造性解决方案和规划你旅程的地方。
- en: Commit to the path.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 承诺走这条道路。
- en: Stack evergreen skills (medium, message, and results)
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 堆叠常青技能（媒体、信息和结果）
- en: Stack personal interests (for individuality)
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 将个人兴趣堆叠（以展现个性）
- en: Stack experience (for nuance and navigation)
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 堆叠经验（以展现细微差别和导航）
- en: Give yourself 20 years, not 2 weeks.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 给自己20年，而不是2周。
- en: '**– Dan Koe**'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: '**– 丹·科**'
- en: When you’re ready, [visit my site](https://thedankoe.com) for free tools and
    products for building a life that you control.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 当你准备好时，[访问我的网站](https://thedankoe.com) 获取免费工具和产品，以构建你掌控的生活。
