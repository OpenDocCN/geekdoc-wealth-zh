- en: Why Choosing A Niche Is Stupid (For Intelligent People)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么选择一个细分市场是愚蠢的（对于聪明人来说）
- en: 原文：[https://thedankoe.com/letters/why-choosing-a-niche-is-stupid-for-intelligent-people/](https://thedankoe.com/letters/why-choosing-a-niche-is-stupid-for-intelligent-people/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/why-choosing-a-niche-is-stupid-for-intelligent-people/](https://thedankoe.com/letters/why-choosing-a-niche-is-stupid-for-intelligent-people/)
- en: Human beings can process 126 bits of information per second (per my research,
    Google says different, oh well). That adds up to 185 billion bits of information
    throughout our entire lives (on average). These bits of information are stored
    somewhere in our brain. Through consciousness, we order this information. That
    is, what we are conscious of gets stored. We are conscious of what we bring our
    attention to. What we focus on. There is more to this, but the point is that we
    are limited in the amount of information we can be conscious of throughout our
    lifetimes.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 人类每秒可以处理126比特的信息（根据我的研究，谷歌说不同，哦好吧）。这加起来在我们的一生中总共是1850亿比特的信息（平均而言）。这些信息比特存储在我们的大脑的某个地方。通过意识，我们整理这些信息。也就是说，我们所意识到的信息会被存储。我们意识到的就是我们关注的东西。我们专注的东西。还有更多，但重点是我们在一生中能意识到的信息量是有限的。
- en: I would consider this a crucial player in human potential — if not the main
    metric for human potential. While most give 15% of their conscious attention to
    showering, bathing, grooming, cooking, and other necessities — most also lay around,
    watch TV, scroll memes, and numb their mind with useless activities. Throwing
    their potential down the drain.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这是人类潜力中的一个关键因素——如果不是人类潜力的主要指标。虽然大多数人将他们15%的注意力用于洗澡、洗澡、打扮、烹饪和其他必需品——但大多数人也会闲逛、看电视、滚动表情包，用无用的活动麻木他们的思想。把他们的潜力浪费掉。
- en: '[Last week we discussed Ken Wilber’s holonic theory](https://www.modernmastery.co/post/how-to-not-end-up-mediocre).
    How we are beings that must develop ourselves in specific areas and pass through
    the 3 developmental stages — having our skill in that area become art. Ken has
    mentioned this, but the statistic above solidifies it. Human beings can process
    185 billion bits of information through conscious development. This limits the
    amount of areas we can truly develop ourselves in. This also means that others
    are limited in the same manner. Everyone will develop themselves in different
    domains of life — per many philosophers and ancient teachers, this is what brings
    happiness. The act of not doing so brings unhappiness.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '[上周我们讨论了肯·威尔伯的蜂巢理论](https://www.modernmastery.co/post/how-to-not-end-up-mediocre)。我们是如何在特定领域发展自己并经历3个发展阶段——在那个领域的技能变成艺术。肯提到了这一点，但上面的统计数据巩固了这一点。人类可以通过有意识的开发处理1850亿比特的信息。这限制了我们可以真正发展的领域数量。这也意味着其他人以同样的方式受到限制。每个人都会在生活的不同领域发展自己——根据许多哲学家和古代教师的说法，这就是幸福。不这样做会导致不幸福。'
- en: That is, having a vision, goal, and consciously working to actualize those things
    is what works — “find joy in the process.”
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 也就是说，拥有一个愿景、目标，并自觉地努力实现这些事情是有效的——“在过程中找到快乐。”
- en: 'From Nietszche:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 来自尼采：
- en: '*“Happiness is the feeling that power increases — that resistance is being
    overcome.”*'
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“幸福是力量增加的感觉——阻力正在被克服。”*'
- en: 'From Csikszentmihalyi:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 来自齐克森米哈伊：
- en: '*“The mark of a person who is in control of consciousness is the ability to
    focus attention at will, to be oblivious to distractions, to concentrate for as
    long as it takes to achieve a goal, and not longer. And the person who can do
    this usually enjoys the normal course of everyday life.”*'
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“一个能够控制意识的人的标志是能够随意集中注意力，对干扰视而不见，集中精力直到实现目标，而不是更长。而且能够这样做的人通常享受日常生活的正常过程。”*'
- en: If we think of this in the context of a game — like World Of Warcraft — you
    tap out at a max level. There is only so much experience you can gain. There is
    only so many “points” you can give in a specific trait on the skill tree. If you
    do not play the story or participate in various parts of the game, you will not
    max out your level (or potential). If you spread your points too thin, you will
    end up having little power compared to others that distributed their points wisely.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将这个想法放在游戏（比如《魔兽世界》）的背景下——你会在最高等级时退出。你只能获得这么多经验。你只能在技能树上的特定特质中给予这么多“点”。如果你不玩故事或参与游戏的各个部分，你就无法达到最高等级（或潜力）。如果你把点分散得太薄，你最终会发现你的力量比那些明智分配点的人要小。
- en: Mindset, focus, ordering your mind, avoiding distractions, and other sayings
    that imply using your limited consciousness to develop awareness and pursue a
    hierarchy of interest-based goals is one of the master keys to overall life enjoyment.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 心态、专注、整理你的思绪、避免分心，以及其他暗示使用你有限的意识来发展意识和追求基于兴趣的目标层级的格言，是整体生活享受的秘诀之一。
- en: This is a lesson in itself that I will talk about in a future letter. You will
    never have access to another person’s state of mind. You will never understand
    how they have controlled their consciousness. You will never understand the hierarchy
    of goals they are pursuing that brings them happiness. Just because somebody doesn’t
    lift, start a business, improve their health, and all of the stuff I talk about
    — does not mean they are not thoroughly happy. One that follows their dopamine-induced
    rabbit hole explorations in vegan eating may be happier than me due to their ordered
    consciousness. Judgement is useless. Assumptions are useless. Expectations are
    useless. Do what’s best for you and let others do what’s best for them. Only teach
    when others want to be reached. “The lips of wisdom are closed except to the ears
    of understanding.”
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这本身就是一个教训，我将在未来的信中谈到。你永远无法了解另一个人的心态。你永远无法理解他们是如何控制自己的意识的。你永远无法理解他们追求的目标层级，这些目标带给他们快乐。仅仅因为某人不锻炼、不创业、不改善健康，以及我谈论的所有这些事情，并不意味着他们不彻底快乐。那些跟随他们多巴胺诱导的素食主义探索兔子洞的人，可能因为他们的有序意识比我更快乐。判断是无用的。假设是无用的。期望是无用的。做自己认为最好的事情，让其他人做他们认为最好的事情。只有当其他人想要被触及时，才去教导。“智慧之口除了理解之耳外，对其他一无所言。”
- en: If we want to take it further, The 3 Pillars in my future book are focus, energy,
    and experience. Focus, in my eyes, is conscious attention. Energy, whether you
    believe it or not, is held in everything around you. Positive or negative. What
    you focus on breathes life / energizes whatever it is you are “paying” attention
    to. This energy is reflected in you, dictating your experience. Experience, per
    Csikszentmihalyi, is stored information based on what you were conscious of. This
    experience will form the foundation of everything going forward.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们要更进一步，我未来书中提到的三个支柱是专注、能量和经验。在我的看法中，专注就是有意识的注意。能量，无论你是否相信，都存在于你周围的每一件事物中。无论是积极的还是消极的。你关注的对象会赋予生命/激发你“关注”的任何事物。这种能量在你身上得到反映，决定了你的经历。根据齐克森米哈伊的观点，经验是基于你所意识到的信息存储。这种经历将成为未来一切的基础。
- en: I’m rambling….
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我在胡言乱语……
- en: How The “Creator” Economy Is Accelerating Our Development
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: “创作者经济”如何加速我们的发展
- en: I was having a talk with JK Molina the other night and we were discussing the
    need for creativity in the development of business. Think of it like this… through
    specific knowledge — that is, courses, coaching, apprenticeships, and other forms
    of online education — people are packaging up and simplifying ~10 years of information,
    experience, and failures into a simple and actionable roadmap for success in a
    specific domain of life. Books, articles, videos, podcasts, etc. [Consume them,
    but have a project to tie ideas back to and invoke pattern recognition.](https://open.spotify.com/episode/5DdgoAufTrFF6tzd4B6zXy?si=9b98ded372ce4bf8)
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我前几天晚上和JK Molina聊天，我们讨论了在商业发展中创造力的必要性。可以这样想……通过具体知识——即课程、辅导、学徒制和其他在线教育形式——人们正在将大约10年的信息、经验和失败简化成一个简单且可操作的路线图，用于在生活的特定领域取得成功。书籍、文章、视频、播客等。[消费它们，但要有项目将想法联系起来，并引发模式识别。](https://open.spotify.com/episode/5DdgoAufTrFF6tzd4B6zXy?si=9b98ded372ce4bf8)
- en: You could say that this information has been condensed or compacted. A zip file
    if you will. Our brains can now process what used to be 10 years of information
    much faster. Instead of this information taking up ~5 billion bits of our conscious
    attention, it takes up ~10 million bits. Meaning that we are “creating” solutions
    to problems, busting through the limits of individuals’ personal and professional
    development, and opening up room for them to do the same.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以说，这些信息已经被压缩或紧凑化。就像一个压缩文件。现在我们的头脑可以更快地处理过去需要10年的信息。不再是这些信息占据我们大约50亿位的意识注意力，而是只需要大约1000万位。这意味着我们正在“创造”解决问题的方案，突破个人和职业发展的限制，为他们腾出空间去做同样的事情。
- en: It took me 5 years to see success with freelancing. After I packaged up everything
    in my first eBook and sold it — others saw success within months. Now they can
    see MORE success in less time, package up their learnings over 1-3 years, and
    pass down their teachings. Leading to exponential development in particular domains.
    Also allowing for quick development in multiple domains. Computer programming
    used to be extremely specialized. Now their are frameworks, education, and ways
    of learning that can get you a high-paying web dev job in 6 months without a degree.
    This will only continue to accelerate — especially for those in tech and those
    that dare to pursue creative work.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我花了5年时间才在自由职业中取得成功。在我把我的第一本电子书打包并出售之后——其他人几个月内就看到了成功。现在他们可以在更短的时间内看到更多的成功，将1-3年的学习成果打包，并将他们的教诲传授下去。这导致特定领域的指数级发展。同时也允许在多个领域快速进步。计算机编程曾经非常专业化。现在有框架、教育和学习方法，可以在6个月内让你获得高薪的网页开发工作，而不需要学位。这只会继续加速——特别是对于科技行业的人和那些敢于追求创造性工作的人。
- en: My point is, we are compressing the amount of information that needs to be processed.
    We can learn more than those before us thanks to creators and tech. We do not
    have to specialize in a specific area. In fact, we are drastically limiting ourselves
    by specializing in one thing. One becomes valuable through specialization, and
    irreplaceable by becoming a modern renaissance man. By enhancing their specialization
    and opening up room for creativity by learning complimentary areas. A solopreneur
    can thrive because they can learn marketing, sales, a marketable skill, email
    marketing, create content, edit videos, run ads, build products, generate leads,
    etc. By compressing, systemizing, and productizing this process throughout your
    lifetime as a creator — you can make $1-$5MM as a one-person operation. A small
    team adds more firepower, of course.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我的观点是，我们在压缩需要处理的信息量。得益于创作者和技术，我们可以比前辈们学到更多。我们不必专门研究一个领域。实际上，我们通过专注于一个领域极大地限制了自身。一个人通过专业化变得有价值，通过成为现代文艺复兴人变得不可替代。通过增强他们的专业化，通过学习互补领域来为创造力腾出空间。一个独立创业者可以繁荣发展，因为他们可以学习市场营销、销售、一项可销售的技能、电子邮件营销、创建内容、编辑视频、运行广告、构建产品、生成潜在客户等。通过在整个创作者生涯中压缩、系统化和产品化这一过程——你可以作为一个人的运营赚取100万至500万美元。当然，一个小团队可以增加更多的火力。
- en: Do you see the power and necessity of becoming a creator? You are quite literally
    “raising the collective human consciousness” while doing what you love. By creating
    novel solutions that rapidly increase the domain-specific development of individuals.
    While at the same time increasing your own development even moreso due to teachers
    learning more than students. You open up room for further innovation if you are
    consistently producing / creating content, products, services, and simplified
    ways of understanding.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 你看到了成为创作者的力量和必要性吗？你实际上是在“提升集体人类意识”的同时做着你热爱的事情。通过创造新颖的解决方案，迅速提高个人的特定领域发展。同时，由于教师比学生学到更多，你的自身发展甚至更加迅速。如果你持续地生产/创造内容、产品、服务和简化理解的方式，你将为进一步的创新腾出空间。
- en: 'Side note: I am honestly surprised of how much of a creative “fusion” this
    newsletter is. I would not have been able to make these connections without being
    a creator, and that is exactly my point. You have to go through the developmental
    stages, utilize the specific knowledge available (self-education), and become
    a creator to further enhance, connect, and simplify that knowledge through value
    production.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 顺便说一句：我真心惊讶这份通讯中创意“融合”的多少。如果不是作为一个创作者，我无法做出这些联系，这正是我的观点。你必须经历发展阶段，利用可用的具体知识（自我教育），并成为一个创作者，通过价值生产来进一步增强、连接和简化这些知识。
- en: Specialization Is A False God
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 专业化是一种虚假的神
- en: Remember from last week how we discussed the pre-trans fallacy? The developmental
    stages of going from pre-rational, rational, and trans-rational? In essence, how
    this meme is true for every aspect of life?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 记得上周我们讨论了“前理性谬误”吗？从前理性、理性和超理性阶段的发展阶段？本质上，这个梗对生活的每个方面都是真的吗？
- en: '![](../Images/8523130056005b9272c23c2b2f2b0c4e.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8523130056005b9272c23c2b2f2b0c4e.png)'
- en: Niche IQ Bell Curve
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 利基智商正态分布曲线
- en: The “jack of all trades” or Renaissance Man used to bring one success in older
    times. Then came the age of specialization. Now, for those that see the opportunity
    and seize it, the renaissance times are coming back — mainly in the online world.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在古代，"万能手"或文艺复兴时期的全才曾经带来成功。然后进入了专业化的时代。现在，对于那些看到机会并抓住它的人来说，文艺复兴时代正在回归——主要是在网络世界。
- en: Let me ask you a question. What is my niche? What is my specialization? Can
    you give me a straight answer? If you told me “online business” or “self-improvement”
    or “philosophy and spirituality” or even “fitness and health” I would not agree.
    My brand is a synthesis — an interconnectedness — of the areas I have chosen to
    develop myself in. My niche is “all of the above” which is the precursor for creativity.
    Not limiting myself allows me to connect with those that are developing themselves
    in similar areas. Not limiting myself opens up room for pattern recognition, allowing
    me to connect the dots and bring knew, novel perspectives on any given topic.
    It allows myself and my products to separate themselves from the sea of commodities.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 让我问你一个问题。我的细分市场是什么？我的专业是什么？你能给出一个直接的答案吗？如果你告诉我“在线商业”或“自我提升”或“哲学和精神”甚至“健身和健康”，我不会同意。我的品牌是我选择发展的领域的综合——一种相互关联。我的细分市场是“所有这些”，这是创造力的先导。不限制自己让我能够与那些在类似领域发展自己的人建立联系。不限制自己为模式识别打开了空间，让我能够连接点，对任何给定主题带来新的、新颖的视角。这让我和我的产品能够从商品的大海中脱颖而出。
- en: Now, specialization is important at the start and can serve very useful long
    term. This is the difference between becoming valuable and becoming irreplaceable.
    Jack of all trades master of none VS jack of all trades master of ONE. Specializing
    in one area while taking advantage of modern innovations that allow you to develop
    yourself quickly in multiple domains gives you *leverage.* Your development in
    sub-domains will only aid in your effectiveness in the development of your main
    domain.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，专业化在开始时很重要，并且可以长期发挥非常有益的作用。这是变得有价值与变得不可替代之间的区别。万能手不如精通一技之长。专注于一个领域，同时利用现代创新，让你能够快速在多个领域发展自己，这为你提供了*杠杆*。你在子领域的发展将只会增强你在主要领域发展的有效性。
- en: The Experience Model For Modern Business
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 现代商业的体验模型
- en: The world is shifting. As technology advances, we are slowly becoming more human
    (if you use it wisely). It is opening up room for more creative pursuits and the
    ability to earn a massive income doing so.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 世界正在转变。随着技术的进步，我们逐渐变得更加人性化（如果你明智地使用它）。这为更多的创造性追求和通过这种方式赚取巨额收入的能力打开了空间。
- en: In comes my notion of The Experience Model to thrive in the creator / attention
    economy.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我的体验模型概念应运而生，以在创作者/注意力经济中繁荣发展。
- en: The amount of information you process throughout your life determines your conditioning,
    programming, beliefs, biases, perceptions, identity, personality, skill level,
    and the rest. Where and how your attention is placed (or manipulated) determines
    your experience. Your experience is what will serve as the foundation of your
    creations. That is your content, products, and services. Your potential will become
    your brand. That is your vision, goals, and values. Nobody can replicate this
    “niche” and you are not limited to the products you create. They will be profitable
    as long as you understand the [Evergreen Skills](https://www.modernmastery.co/post/learn-these-skills-if-you-want-to-thrive-in-2022).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 你一生中处理的信息量决定了你的条件反射、编程、信念、偏见、感知、身份、个性、技能水平以及其他方面。你的注意力放在哪里以及如何放置（或操纵）决定了你的体验。你的体验将成为你创作的基石。那就是你的内容、产品和服务。你的潜力将成为你的品牌。那就是你的愿景、目标和价值观。没有人可以复制这个“细分市场”，你也不局限于你创造的产品。只要你能理解[常青技能](https://www.modernmastery.co/post/learn-these-skills-if-you-want-to-thrive-in-2022)，它们就会盈利。
- en: Do you see everything coming full circle? Personal growth = business growth.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否看到一切都在回归原点？个人成长 = 商业成长。
- en: 'One thing to think about in terms of content creation: can you capture peoples
    attention through novelty, make them aware of a specific interest they want to
    pursue, fill their limited consciousness with compact and valuable information,
    leading them towards a better life? Above all, that is the key to a personal brand
    or creator.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在内容创作方面，有一点需要思考：你能通过新奇的事物吸引人们的注意力，让他们意识到他们想要追求的特定兴趣，用紧凑而有价值的信息填满他们有限的意识，引导他们走向更好的生活吗？最重要的是，这是个人品牌或创作者的关键。
- en: You craft your own vision, goals, and values — work towards them, and attract
    followers that you lead toward this better life. Your vision is the desire outcome
    for you and your followers. Your goals are what you are working towards. Your
    values are the areas that you & your followers are developing themselves in. All
    of these form your content pillars. When it comes time to create content, you
    bank on your experience. The lessons you have learned that consistently get more
    creative as you develop yourself in these areas. You teach from your mistakes,
    insights, and successes as you blaze the path towards actualizing your vision.
    It is a highly fulfilling line of work. People follow you because you are the
    confident and authentic leader towards a better life.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 你塑造自己的愿景、目标和价值观——朝着它们努力，吸引追随者，引领他们走向更美好的生活。你的愿景是你和你追随者所期望的结果。你的目标是你在努力实现的目标。你的价值观是你和你追随者正在发展的领域。所有这些都构成了你的内容支柱。当是时候创造内容时，你依靠你的经验。随着你在这些领域的发展，你学到的教训会越来越有创意。你从你的错误、洞察和成功中学习，在你实现愿景的道路上开辟道路。这是一条非常充实的工作道路。人们跟随你，因为你是一个自信、真诚的领导者，引领他们走向更美好的生活。
- en: In comes creativity. How do we incorporate it into our life and business for
    maximum, rapid advancement? By building off of the ideas and specific knowledge
    that are already created. You bring clarity to your vision when you follow and
    emulate other leaders or aspirational archetypes. Like that saying, “every good
    coach has a coach.”
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 创造力随之而来。我们如何将其融入生活和事业，以实现最大化和快速的发展？通过利用已经创造出的想法和具体知识。当你跟随和模仿其他领导者或励志原型时，你为你的愿景带来了清晰。就像那句俗语，“每个优秀的教练都有自己的教练”。
- en: As a side note and reminder, this is more of a philosophical take — if you want
    my simple and straightforward business, social media, and performance systems
    to build a multi-six figure business as a creator, [join MMHQ here](https://join.modernmastery.co).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 作为旁注和提醒，这更多的是一种哲学观点——如果你想要我简单直接的商业、社交媒体和绩效系统，作为创造者建立六位数以上的业务，[在这里加入MMHQ](https://join.modernmastery.co)。
- en: How To Live (And Earn) In Accordance With Nature
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何与自然和谐生活（并赚钱）
- en: The first step is awareness. Awareness of your conditioning and programming.
    Given time, you heart and mind open. You revert to your child-like state… or should
    I say you transcend your adult-like state (pre-trans fallacy) and unlock the gifts
    of confidence, curiosity, and creativity.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是意识。对你自己的条件和编程的意识。给以时间，你的心和思想就会打开。你回归到你的童年状态……或者说，你应该说你超越了你的成人状态（前谬误），并解锁了自信、好奇心和创造力的礼物。
- en: Through curiosity, you pursue the areas of development that truly interest you.
    You build momentum through pattern recognition and dopamine. You begin making
    connections from different domains — and unless you transcend to creator (child
    = creator, adult = consumer, childlike adult = creator) you cannot fully develop
    yourselves in those areas. You are not teaching, leading, and doing the things
    necessary to reach the next stage of development.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 通过好奇心，你追求真正感兴趣的发展领域。你通过模式识别和多巴胺来积累动力。你开始从不同领域建立联系——除非你超越成为创造者（儿童=创造者，成人=消费者，童真成人=创造者），否则你无法在这些领域全面发展自己。你没有教学、领导和做达到下一发展阶段所必需的事情。
- en: By pursuing YOUR interests in accordance with nature (your intuition), you become
    a “niche of one.” You build out your “personal monopoly” of a brand. You live
    in accordance with the evolution (nature) of the internet. You flow (and profit)
    with the overall development of the universe. This is what you are supposed to
    do. You haven’t realized it because you are out of touch with your being — and
    you do not have an anchor of becoming.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循自然（你的直觉）追求你的兴趣，你成为一个“独一无二的细分市场”。你建立你品牌的“个人垄断”。你与互联网的进化（自然）保持一致。你随着宇宙的整体发展而流动（并获利）。这就是你应该做的事情。你没有意识到这一点，因为你与你的存在脱节——你没有成为的锚点。
- en: How you *choose* to fill the 185 billion bits of information is going to be
    vastly different from others. Sure, some similarities will be shared, but competition
    is irrelevant at this point. Your “niche” is the manifestation of the billions
    of bits of information that you have stored throughout your life. In short, you
    have more to share than you think — all you need is a hierarchy of goals pertaining
    to growing online, educating yourself on branding, marketing, and sales, and maintaining
    momentum.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何选择填充那1850亿比特的信息将与其他人截然不同。当然，会有一些相似之处，但在这个阶段，竞争是不相关的。你的“细分市场”是你一生中存储的数十亿比特信息的体现。简而言之，你分享的比你想象的要多——你所需要的是一个关于在线增长、品牌、营销和销售自我教育的目标层级，并保持动力。
- en: It’s easier than you think. The only thing standing in the way of your progress
    is yourself. Your unconscious identification with the mind. You already have everything
    within you — all you need to do is embrace your innate curiosity, let it be your
    guide, pass down your experiences, and document the journey via content, products,
    and services.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这比你想象的要容易。阻碍你进步的唯一因素是你自己。你对思维的潜意识认同。你已经有了一切——你所需要做的就是拥抱你天生的好奇心，让它成为你的指南，传承你的经验，并通过内容、产品和服务记录你的旅程。
- en: Of course, there are more technical details, but I’ve produced hundreds of newsletters,
    [MMHQ articles](https://join.modernmastery.co), podcasts, courses, videos, trainings,
    and posts about those already. Everything you need is already out there on the
    internet. You may be blind to them because you allow distractions to capture and
    hold your attention.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，还有更多的技术细节，但我已经制作了数百份通讯，[MMHQ文章](https://join.modernmastery.co)，播客，课程，视频，培训以及关于这些内容的帖子。你需要的所有东西已经在互联网上。你可能因为允许干扰占据并保持你的注意力而对这些视而不见。
- en: Wake Up.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 醒来。
- en: Dan Koe
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 丹·科
