- en: Self Improvers Are Creating Their Own Careers Online (Here’s How)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/self-improvers-are-creating-their-own-career-heres-how/](https://thedankoe.com/letters/self-improvers-are-creating-their-own-career-heres-how/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Wake up.
  prefs: []
  type: TYPE_NORMAL
- en: Hit snooze 4 times.
  prefs: []
  type: TYPE_NORMAL
- en: Stare at your phone.
  prefs: []
  type: TYPE_NORMAL
- en: Roll out of bed.
  prefs: []
  type: TYPE_NORMAL
- en: Make coffee.
  prefs: []
  type: TYPE_NORMAL
- en: Sit in traffic.
  prefs: []
  type: TYPE_NORMAL
- en: 8 hours of unfulfilling work.
  prefs: []
  type: TYPE_NORMAL
- en: Sit in traffic… again.
  prefs: []
  type: TYPE_NORMAL
- en: Argue with your “significant” other.
  prefs: []
  type: TYPE_NORMAL
- en: Walk the pet.
  prefs: []
  type: TYPE_NORMAL
- en: Watch TV.
  prefs: []
  type: TYPE_NORMAL
- en: Pass out.
  prefs: []
  type: TYPE_NORMAL
- en: Repeat.
  prefs: []
  type: TYPE_NORMAL
- en: This should scare the shit out of you.
  prefs: []
  type: TYPE_NORMAL
- en: This is the state of 95% of the population.
  prefs: []
  type: TYPE_NORMAL
- en: Even those that are putting in effort on a daily basis to escape, can’t.
  prefs: []
  type: TYPE_NORMAL
- en: I did everything in my power to avoid a 9-5.
  prefs: []
  type: TYPE_NORMAL
- en: I built businesses from the age of 18 to 22 and didn’t make a penny. (But it
    was an incredibly fun way to spend my time).
  prefs: []
  type: TYPE_NORMAL
- en: When I did get a job, the list above was my assigned state of living.
  prefs: []
  type: TYPE_NORMAL
- en: I didn’t have control over how I structured 10 hours of my day.
  prefs: []
  type: TYPE_NORMAL
- en: Everything revolved around my work whether I wanted it to or not.
  prefs: []
  type: TYPE_NORMAL
- en: 'Over the past 3-4 years of my creator journey, I’ve realized a few things:'
  prefs: []
  type: TYPE_NORMAL
- en: Entrepreneurship is the only path for long-term logical thinkers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Humans have been removing labor work since the beginning of time (and we are
    on the horizon of complete removal)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The creator economy is the new economy. If you don’t have a personal brand you
    lose. Like that Black Mirror episode “Nosedive,” but in a good way.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sensible people get paid for doing what they enjoy doing (shoutout Alan Watts
    for being ahead of his time).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The future belongs to the self improver.
  prefs: []
  type: TYPE_NORMAL
- en: The person that takes responsibility for their future and becomes a fountain
    of value for those around them.
  prefs: []
  type: TYPE_NORMAL
- en: When done in public, it is almost impossible not to get paid.
  prefs: []
  type: TYPE_NORMAL
- en: That is what we are here to discuss today.
  prefs: []
  type: TYPE_NORMAL
- en: “Entrepreneurship Is Overrated”
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I was scrolling on YouTube the other day and a post caught my attention.
  prefs: []
  type: TYPE_NORMAL
- en: It asked, “What are things that everyone loves but you think are overrated?
  prefs: []
  type: TYPE_NORMAL
- en: There were comments about travel,
  prefs: []
  type: TYPE_NORMAL
- en: 'But this one caught my attention:'
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1118">![](../Images/36931d26aab7be0db2b6188bf7d2aefa.png)</picture>
    <picture decoding="async" class="wp-image-1119">![](../Images/f4430e391b192ac847705ffc1565510f.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: I won’t lie, it irked me at first.
  prefs: []
  type: TYPE_NORMAL
- en: How can people not realize that entrepreneurship is the only path to full control
    over your life?
  prefs: []
  type: TYPE_NORMAL
- en: And full control is the only path to sustainable enjoyment?
  prefs: []
  type: TYPE_NORMAL
- en: But it is becoming increasingly more difficult to find the “perfect” gig for
    you that allows you to consistently leverage all of the intrinsic drivers that
    make life good (curiosity, passion, purpose, autonomy, and mastery).
  prefs: []
  type: TYPE_NORMAL
- en: 'A few things hit me:'
  prefs: []
  type: TYPE_NORMAL
- en: '**People hate what they don’t understand.**'
  prefs: []
  type: TYPE_NORMAL
- en: They only see 5% of an entrepreneur’s life and assume that’s enough to draw
    conclusions and close their mind. Curiosity vanishes at this moment.
  prefs: []
  type: TYPE_NORMAL
- en: They think entrepreneurship is overrated because they aren’t entrepreneurs.
  prefs: []
  type: TYPE_NORMAL
- en: '**“I’m tired of** **being called** **a wage slave.”**'
  prefs: []
  type: TYPE_NORMAL
- en: Sorry, but your feelings are not reality.
  prefs: []
  type: TYPE_NORMAL
- en: If you got let go and couldn’t pay your bills you are forced to work for your
    survival. You don’t have a choice. You are by definition a wage slave whether
    you like being called that or not.
  prefs: []
  type: TYPE_NORMAL
- en: Not only that, but most aren’t conscious of the exploitation that is going on
    behind the scenes. By staying at your predatory 9-5 you are enabling the exploitation
    of sweat shop workers and actively preventing human evolution. (Not in all cases,
    of course. Think through who you work for).
  prefs: []
  type: TYPE_NORMAL
- en: '**“What’s wrong with me offering my skills to already developed corporations?”**'
  prefs: []
  type: TYPE_NORMAL
- en: Nothing.
  prefs: []
  type: TYPE_NORMAL
- en: But why let the skills you acquire be influenced by a repetitive and income-capped
    career?
  prefs: []
  type: TYPE_NORMAL
- en: Why not lean into your unique interests and sell those skills to a developed
    corporation AS a business?
  prefs: []
  type: TYPE_NORMAL
- en: Then you aren’t a slave to certain productivity metrics, create your own systems,
    take on more clients, and make 5x what you would at the job with less work.
  prefs: []
  type: TYPE_NORMAL
- en: All of this, as always, is coming back to a narrow perspective enforced by a
    socially conditioned identity.
  prefs: []
  type: TYPE_NORMAL
- en: Or, they have a narrow view of what entrepreneurship is.
  prefs: []
  type: TYPE_NORMAL
- en: '**“You’re paying a man $50 to escape the matrix, that’s not how it works.”**'
  prefs: []
  type: TYPE_NORMAL
- en: I don’t care for Tate or his products, but $50 for time-tested marketable skills
    is better than a $40,000 outdated degree to get trained into the “matrix.”
  prefs: []
  type: TYPE_NORMAL
- en: '**Entrepreneurs don’t go back to a 9-5.**'
  prefs: []
  type: TYPE_NORMAL
- en: I’ve never heard of someone quitting a successful entrepreneurial venture to
    go back to a 9-5\. But I hear of 9-5ers leaving their career for a better life
    all the time.
  prefs: []
  type: TYPE_NORMAL
- en: '**“You’re busy all the time.”**'
  prefs: []
  type: TYPE_NORMAL
- en: No, you aren’t.
  prefs: []
  type: TYPE_NORMAL
- en: The entire point of entrepreneurship is to reduce how much you work and prioritize
    the better things in life. If you are working all day, it’s not because you’re
    an entrepreneur, it’s because you lack self-management skills.
  prefs: []
  type: TYPE_NORMAL
- en: I work for [4 hours a day](https://thedankoe.com/the-4-hour-workday-focused-work-changed-my-life/)
    (most of the time) and cut myself off there. Because I know the quality of my
    work increases.
  prefs: []
  type: TYPE_NORMAL
- en: '**The psychology of entrepreneurship.**'
  prefs: []
  type: TYPE_NORMAL
- en: Our ancestors were entrepreneurs in their tribes.
  prefs: []
  type: TYPE_NORMAL
- en: And your psyche is not wired to remain stagnant.
  prefs: []
  type: TYPE_NORMAL
- en: You can do what you want, but I believe that the end goal for anyone is entrepreneurship.
  prefs: []
  type: TYPE_NORMAL
- en: Why? Because your psyche demands evolution for satisfaction. It demands an ever-increasing
    challenge without actually “winning the game.”
  prefs: []
  type: TYPE_NORMAL
- en: In a corporate power ladder, you will inevitably reach a point where challenge
    ceases to exist. You become docile, comfortable, and get used to mediocre living
    (and you will *think* that’s how it’s supposed to be).
  prefs: []
  type: TYPE_NORMAL
- en: The profound and meaningful lie in the unknown and entrepreneurship is your
    submarine into the depths of the ocean.
  prefs: []
  type: TYPE_NORMAL
- en: '**Work consumes about 25% of your life.**'
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t create a career, you will be assigned one.
  prefs: []
  type: TYPE_NORMAL
- en: If you aren’t passionate about your work, you aren’t passionate for 25% of your
    life. Most people aren’t passionate about the other 75% of their life either.
  prefs: []
  type: TYPE_NORMAL
- en: Our career, or purpose, or mission is how we engage our attention with reality
    in an impactful way. It keeps us from going insane.
  prefs: []
  type: TYPE_NORMAL
- en: And frankly, we can’t engage our attention with the breath, body, or nature
    for our entire lives as a mindfulness practice. There must be a balance, but our
    attention must be engaged with reality to prevent a chaotic state of mind.
  prefs: []
  type: TYPE_NORMAL
- en: A 9-5 is a stepping stone.
  prefs: []
  type: TYPE_NORMAL
- en: I have nothing against a 9-5, but it is a means, not an end.
  prefs: []
  type: TYPE_NORMAL
- en: Use your job to acquire skills, knowledge, and status that allow you to create
    what you want.
  prefs: []
  type: TYPE_NORMAL
- en: The Dissolution Of Labor
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The real AI singularity, if it happens at all, isn't going to look like a sudden
    doomsday scenario like in a sci-fi story. The real way it happens—and this is
    probably inevitable—is as a gradual erosion of human labor [pic.twitter.com/gHXoKjZjfk](https://t.co/gHXoKjZjfk)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Zero HP Lovecraft 🦅🐍 (@0x49fa98) [April 3, 2023](https://twitter.com/0x49fa98/status/1643016730187386880?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Aristotle condemned manual labor as harmful to the body and soul.
  prefs: []
  type: TYPE_NORMAL
- en: The Ancient Greeks saw work as a necessary part of life. But only as a means
    to leisure, creativity, and contemplation as they considered them the keys to
    happiness.
  prefs: []
  type: TYPE_NORMAL
- en: Without work, leisure loses its meaning and vice versa.
  prefs: []
  type: TYPE_NORMAL
- en: Life begins to lack balance and contrast.
  prefs: []
  type: TYPE_NORMAL
- en: Manual work isn’t always bad. But completing mindless tasks for the sake of
    survival or status makes you no different than a robot or animal.
  prefs: []
  type: TYPE_NORMAL
- en: A sense of mastery must uphold our endeavors to create meaningful work.
  prefs: []
  type: TYPE_NORMAL
- en: Your purpose is the source of suffering you accept.
  prefs: []
  type: TYPE_NORMAL
- en: First, there were slaves that were assigned most of the labor work.
  prefs: []
  type: TYPE_NORMAL
- en: Then, tools like tractors, windmills, and self-checkouts reduced the burden
    further.
  prefs: []
  type: TYPE_NORMAL
- en: Now, the majority of employees are tied to their cubicles to perform repetitive
    tasks that go against their nature.
  prefs: []
  type: TYPE_NORMAL
- en: My beliefs are that humanity has evolved to the point of not needing humans
    to perform the “dirty work.”
  prefs: []
  type: TYPE_NORMAL
- en: Automation and artificial intelligence have seen leaps in development over the
    years.
  prefs: []
  type: TYPE_NORMAL
- en: There have been many doomsday speculations on this, but I only see good coming
    from it.
  prefs: []
  type: TYPE_NORMAL
- en: A decline in labor work demands an incline in creative and knowledge work.
  prefs: []
  type: TYPE_NORMAL
- en: 'From McKenna: *“Thought can only go as far as the language that paves the road”*'
  prefs: []
  type: TYPE_NORMAL
- en: If we want to expand the limits of what’s possible, we have to create the knowledge,
    ideas, and beliefs that permeate culture and influence language. That way, collective
    thought can expand and exponential progress can be made.
  prefs: []
  type: TYPE_NORMAL
- en: The future of work, in my eyes, belongs to the creative.
  prefs: []
  type: TYPE_NORMAL
- en: The writers.
  prefs: []
  type: TYPE_NORMAL
- en: The speakers.
  prefs: []
  type: TYPE_NORMAL
- en: The designers.
  prefs: []
  type: TYPE_NORMAL
- en: The creators.
  prefs: []
  type: TYPE_NORMAL
- en: Every person that we thought AI would “replace.”
  prefs: []
  type: TYPE_NORMAL
- en: Instead, AI will act as a tool that allows creatives to push the boundaries.
  prefs: []
  type: TYPE_NORMAL
- en: 'To do this well, work is necessary, but rest and leisure are of more importance
    because of the brains Default Mode Network:'
  prefs: []
  type: TYPE_NORMAL
- en: “The DMN is a series of interconnected sections that activate as soon as people
    stop concentrating on external tasks, and shifts from outward-focused to inward-focused
    cognition.”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In short, the brain is MORE active when you aren’t focused on work.
  prefs: []
  type: TYPE_NORMAL
- en: When we, as humans, prioritize both work and rest (not red wine and bubble baths
    type rest, but gym and walks type rest), we prime our mind for novel ideas.
  prefs: []
  type: TYPE_NORMAL
- en: And through the power of the internet, collective knowledge increases, and our
    capacity for thought evolves with it.
  prefs: []
  type: TYPE_NORMAL
- en: 'To get practical:'
  prefs: []
  type: TYPE_NORMAL
- en: You now have the opportunity to pursue meaningful work that unlocks the parts
    of the brain that modern society has neglected for so long.
  prefs: []
  type: TYPE_NORMAL
- en: Humans can explore reality with passion, improve their skill set, and self-actualize.
  prefs: []
  type: TYPE_NORMAL
- en: The future of work belongs to the self-reliant, self-educated, and those that
    pursue the creative opportunity that automation and AI have presented.
  prefs: []
  type: TYPE_NORMAL
- en: The future is about balance, not overwork.
  prefs: []
  type: TYPE_NORMAL
- en: The future is about being human, not robotic.
  prefs: []
  type: TYPE_NORMAL
- en: The [digital renaissance](https://thedankoe.com/become-a-digital-renaissance-man-and-join-the-new-rich/)
    is here.
  prefs: []
  type: TYPE_NORMAL
- en: The Creator Economy Is The New Economy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I’ve been talking about this for a while now, but [Matt Mic](https://twitter.com/themattmic)
    wrote an incredible thread that brings an entirely new perspective to my theory.
  prefs: []
  type: TYPE_NORMAL
- en: My theory = [the future of work and education](https://thedankoe.com/the-future-of-the-creator-economy-my-bold-prediction/)
    will be that every individual will have their own creator business (or work for
    creators) that act as a public school.
  prefs: []
  type: TYPE_NORMAL
- en: I’m going to summarize points from Matt’s thread with my own commentary and
    structure, [but you can read it here.](https://twitter.com/themattmic/status/1643236796522700801)
  prefs: []
  type: TYPE_NORMAL
- en: First, we need to step back and realize how important social media is.
  prefs: []
  type: TYPE_NORMAL
- en: It can be toxic, yes, but that is a reflection of the individual’s choice to
    consume that content. Social media is an incredible addition to my life (and most
    creators’ lives, it is rarely toxic).
  prefs: []
  type: TYPE_NORMAL
- en: Humans are social creatures. Social media removes the barriers to socialization
    through media.
  prefs: []
  type: TYPE_NORMAL
- en: Media is how we learn.
  prefs: []
  type: TYPE_NORMAL
- en: Media is how we get new information.
  prefs: []
  type: TYPE_NORMAL
- en: Media is how we communicate the value of our businesses.
  prefs: []
  type: TYPE_NORMAL
- en: Media consumes a large portion of our lives. It creates a social fabric that
    people rely on for civilization to operate as it does.
  prefs: []
  type: TYPE_NORMAL
- en: P.S. I teach all of this, with Notion templates and systems, in [Digital Economics](https://digitaleconomics.school).
    It is a masterclass on creator brand, content, product creation, and promotions
    for the future.
  prefs: []
  type: TYPE_NORMAL
- en: The 3 Layers Of Social Media
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Platforms form the first layer of digital media.
  prefs: []
  type: TYPE_NORMAL
- en: Apple and Google created the majority of the tech we hold in our hands and have
    in our offices. They laid the foundation for social media.
  prefs: []
  type: TYPE_NORMAL
- en: The second layer is apps like Facebook, Instagram, YouTube, and Twitter.
  prefs: []
  type: TYPE_NORMAL
- en: These apps captured the same value as the platform layer in that they have billions
    of monthly active users and trillions of dollars in value.
  prefs: []
  type: TYPE_NORMAL
- en: 'Over the past decade, a new and 3rd layer has emerged:'
  prefs: []
  type: TYPE_NORMAL
- en: The Creator.
  prefs: []
  type: TYPE_NORMAL
- en: Like the apps themselves, huge creators like Rogan will garner billions of followers
    (over the next decade) and generate trillions of dollars.
  prefs: []
  type: TYPE_NORMAL
- en: Creators are “atomizing” what the social networks did by capturing mass attention,
    forming communities, distributing media, and generating revenue.
  prefs: []
  type: TYPE_NORMAL
- en: The Need For Human
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With automation and AI seeing exponential growth, it only makes sense that people
    will get their media fix from humans.
  prefs: []
  type: TYPE_NORMAL
- en: Personal brands.
  prefs: []
  type: TYPE_NORMAL
- en: People that educate, entertain, and inspire according to their interests.
  prefs: []
  type: TYPE_NORMAL
- en: Unless we rewrite the collective psyche (which hasn’t changed much in a few
    hundred years) then this is inevitable. People are attracted to people, not robots.
  prefs: []
  type: TYPE_NORMAL
- en: Robots have their place in decreasing labor and increasing human creativity,
    though.
  prefs: []
  type: TYPE_NORMAL
- en: My Philosophy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Business is an extension of the self.
  prefs: []
  type: TYPE_NORMAL
- en: It is a vessel for your purpose.
  prefs: []
  type: TYPE_NORMAL
- en: Your purpose evolves, and you must solve the superficial problems in your life
    to reach your deepest purpose.
  prefs: []
  type: TYPE_NORMAL
- en: The pattern here are the eternal markets (where the most money flows).
  prefs: []
  type: TYPE_NORMAL
- en: Health, wealth, and relationships.
  prefs: []
  type: TYPE_NORMAL
- en: Solve your own problems by acquiring the skill and knowledge necessary to do
    so through the internet.
  prefs: []
  type: TYPE_NORMAL
- en: Pass down what you learn in the form of free content and paid products.
  prefs: []
  type: TYPE_NORMAL
- en: By doing so, you not only create an independent income source, but massive social
    leverage.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve written about this extensively, but the most organized place to get the
    information is from the [One Person Business series](https://youtube.com/playlist?list=PLB4ePXk6nBaeG3fD13NaRMsRsEc2iCsV4)
    on my YouTube.
  prefs: []
  type: TYPE_NORMAL
- en: Creator Monetization Methods
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Once you’ve [built an audience](https://2hourwriter.com), or even if you haven’t,
    there are many ways to monetize, but I will list them out by priority here.
  prefs: []
  type: TYPE_NORMAL
- en: 1) Freelancing, Coaching, or Tutoring
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To monetize from the start, you need a service.
  prefs: []
  type: TYPE_NORMAL
- en: Building a digital product or membership or software isn’t sustainable when
    you don’t have ample traffic to pull in an income.
  prefs: []
  type: TYPE_NORMAL
- en: When you create a minimum viable offer for $500-$1000, you can use direct outreach
    strategies to sell your offer.
  prefs: []
  type: TYPE_NORMAL
- en: Once you get some results and increase your prices you only need 2-3 clients
    a month to pull in more than the average US salary.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need a large audience and 500 product sales a month to generate an
    income.
  prefs: []
  type: TYPE_NORMAL
- en: What service do you create? I wrote about creating a [minimum viable offer](https://thedankoe.com/the-best-online-business-model-to-make-1-million-in-2023/)
    here.
  prefs: []
  type: TYPE_NORMAL
- en: In short, improve yourself and build something you would have wanted on your
    journey.
  prefs: []
  type: TYPE_NORMAL
- en: Pull inspiration from the products you purchased to achieve your self actualization.
  prefs: []
  type: TYPE_NORMAL
- en: Then, help others do the same.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Cohorts & Courses
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once you have a small audience and client results, you can transfer those results
    into a cohort style course.
  prefs: []
  type: TYPE_NORMAL
- en: 'This way, you can still:'
  prefs: []
  type: TYPE_NORMAL
- en: Charge higher prices
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Maintain a sustainable income
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Not need a ton of customers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A cohort-based course is a regular course with a time frame, helpful group calls,
    and a community to answer questions.
  prefs: []
  type: TYPE_NORMAL
- en: Then, when the time is right and you have a larger audience, you can turn it
    into a full-fledged do-it-yourself course.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Build Whatever You Want
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that you have distribution and leverage, you can sell anything you want
    really.
  prefs: []
  type: TYPE_NORMAL
- en: Want to start a clothing brand? Feel free.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Want to sell a physical product like a supplement line? All you.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Want to drop everything and build a physical gym or coffee shop? Go ahead.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You have the resources to make any business model work.
  prefs: []
  type: TYPE_NORMAL
- en: Your reputation is high. You have social capital. And your digital products
    are pulling in $50,000 to $200,000 a month.
  prefs: []
  type: TYPE_NORMAL
- en: This is on a 3-4 year time scale of course.
  prefs: []
  type: TYPE_NORMAL
- en: And just like that, you create your own career.
  prefs: []
  type: TYPE_NORMAL
- en: By learning, creating, and selling on the digital marketplace, you remove the
    barriers that once existed in the physical world.
  prefs: []
  type: TYPE_NORMAL
- en: The future is bright, and anyone that wants to take advantage has the ability
    to do so.
  prefs: []
  type: TYPE_NORMAL
- en: 'The eternal markets in business are:'
  prefs: []
  type: TYPE_NORMAL
- en: Health
  prefs:
