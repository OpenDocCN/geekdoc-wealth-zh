- en: The Future Of Work Is Play (How To Create Your Own Career)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-future-of-work-is-play-how-to-create-your-own-career/](https://thedankoe.com/letters/the-future-of-work-is-play-how-to-create-your-own-career/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Obsession is your key to greatness.
  prefs: []
  type: TYPE_NORMAL
- en: Expose yourself to more experience, not distraction, and let curiosity pull
    you down a rabbit hole of discovery.
  prefs: []
  type: TYPE_NORMAL
- en: Once you find the thing you can’t pull yourself away from, work to make it a
    sustainable part of your life.
  prefs: []
  type: TYPE_NORMAL
- en: This is a lesson I discovered in my childhood.
  prefs: []
  type: TYPE_NORMAL
- en: I have always been obsessed with finding a better way of living.
  prefs: []
  type: TYPE_NORMAL
- en: Everywhere I went, I paid close attention to people’s actions. Not for the sake
    of judgment, but discernment. I wanted to understand what actions led to a good
    life and which led to a bad life.
  prefs: []
  type: TYPE_NORMAL
- en: I often found myself questioning what, how, and why.
  prefs: []
  type: TYPE_NORMAL
- en: What were they pursuing?
  prefs: []
  type: TYPE_NORMAL
- en: If every action is toward a conscious or unconscious goal, it seemed like everyone
    was eager to be overweight, unhealthy, overworked, and broke. They didn’t have
    self-generated goals that shaped their decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: How did that person get to where they are?
  prefs: []
  type: TYPE_NORMAL
- en: Why did they look that way?
  prefs: []
  type: TYPE_NORMAL
- en: Was it because they picked up a 1000-calorie dessert drink for breakfast with
    a sandwich that leaked grease from its wrapper?
  prefs: []
  type: TYPE_NORMAL
- en: Why did they go to the same job that clearly caused them immense suffering?
  prefs: []
  type: TYPE_NORMAL
- en: How did they not see the opportunity all around them? The digital world unfolding
    right before their eyes? A world of information and technology they can use to
    learn and build in record time?
  prefs: []
  type: TYPE_NORMAL
- en: Due to my questioning, I had conditioned myself to think that getting a 9-5
    job was the worst outcome that could happen in my life.
  prefs: []
  type: TYPE_NORMAL
- en: It seemed like once people accepted a job offer, they were doomed to a life
    of comfort.
  prefs: []
  type: TYPE_NORMAL
- en: They would fill their plate with never-ending responsibilities – a mortgage,
    spouse, and kids – before they had the financial capability to truly dedicate
    their time and energy to those things. It looked like they were quick to become
    an adult, but were never able to reap the rewards of being one.
  prefs: []
  type: TYPE_NORMAL
- en: They chained themselves to a paycheck because they never made the choices that
    led to more money and time.
  prefs: []
  type: TYPE_NORMAL
- en: The danger of employment goes far beyond this.
  prefs: []
  type: TYPE_NORMAL
- en: Before we dive in, Kortex ([the software](https://kortex.co)) is nearing completion.
    Kortex ([University](https://university.kortex.co)) are the one’s who get early
    access along with a revolutionary curriculum for the future of work (that schools
    can’t teach).
  prefs: []
  type: TYPE_NORMAL
- en: The Psychology & Danger Of Employment
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1362">![](../Images/554041d72500cd418eacd92d8971282f.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: I see 9-5 jobs as a stepping stone.
  prefs: []
  type: TYPE_NORMAL
- en: My problem with them is that they breed complacency and are dangerous for your
    psyche.
  prefs: []
  type: TYPE_NORMAL
- en: Challenge is what makes life fun and interesting.
  prefs: []
  type: TYPE_NORMAL
- en: If you halt your personal evolution by never pursuing something more, you lose
    purpose and fulfillment.
  prefs: []
  type: TYPE_NORMAL
- en: Entrepreneurship is the only logical option for long-term thinkers.
  prefs: []
  type: TYPE_NORMAL
- en: Entrepreneurship is the path of uncertainty.
  prefs: []
  type: TYPE_NORMAL
- en: Like slashing your way through the jungle.
  prefs: []
  type: TYPE_NORMAL
- en: You are required to learn skills that aren’t taught in schools.
  prefs: []
  type: TYPE_NORMAL
- en: You are required to be okay with failure, rejection, and slow progress.
  prefs: []
  type: TYPE_NORMAL
- en: You are required to learn from your mistakes, show up again tomorrow, and push
    until your strike gold.
  prefs: []
  type: TYPE_NORMAL
- en: Your psyche is wired to hunt.
  prefs: []
  type: TYPE_NORMAL
- en: The physical world has changed much faster than our mind can adapt.
  prefs: []
  type: TYPE_NORMAL
- en: We still have the same neurobiological processes as our ancestors.
  prefs: []
  type: TYPE_NORMAL
- en: If you stay in a 9-5 job for too long, you become a monkey in a cubicle.
  prefs: []
  type: TYPE_NORMAL
- en: When you get stuck in a 9-5 (or a new 9-5 like an agency or freelancing) you
    live in the eternal known. You can’t make new discoveries in the known.
  prefs: []
  type: TYPE_NORMAL
- en: You get bored, depressed, and see life as meaningless because the only dopamine
    you get is from superficial sources.
  prefs: []
  type: TYPE_NORMAL
- en: You never take risks, push into the unknown, and discover new knowledge, tools,
    and potentials that raise dopamine levels in the brain.
  prefs: []
  type: TYPE_NORMAL
- en: As an entrepreneur, you “hunt” for your survival by gathering knowledge, creating
    a valuable product, and putting it in front of people who could benefit from it.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have to hunt for your food, but you have to hunt for the resources
    to acquire food, like money to put toward a better future.
  prefs: []
  type: TYPE_NORMAL
- en: Aristotle condemned manual labor as harmful to the body and soul.
  prefs: []
  type: TYPE_NORMAL
- en: The Ancient Greeks saw work as a necessary part of life. But only as a means
    to leisure, creativity, and contemplation as they considered them the keys to
    happiness.
  prefs: []
  type: TYPE_NORMAL
- en: Without work, leisure loses its meaning and vice versa.
  prefs: []
  type: TYPE_NORMAL
- en: Life begins to lack balance and contrast.
  prefs: []
  type: TYPE_NORMAL
- en: Manual work isn’t always bad. But completing mindless tasks for the sake of
    survival or status makes you no different than a robot or animal.
  prefs: []
  type: TYPE_NORMAL
- en: The Future Of Work Is Play
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are almost 7B people on this planet. Someday, I hope, there will be almost
    7B companies. — Naval
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '***Money is a tool for building what you want but doesn’t yet exist.***'
  prefs: []
  type: TYPE_NORMAL
- en: It’s not for the material acquisition of cars and houses (although those can
    be achieved through a deeply spiritual vessel like business, investing, or self-development).
  prefs: []
  type: TYPE_NORMAL
- en: Technology and the internet are how you build a solution that leads to personal
    and collective progress.
  prefs: []
  type: TYPE_NORMAL
- en: Evolution is about solving problems with technology.
  prefs: []
  type: TYPE_NORMAL
- en: That’s what we do as humans. That is our edge. That is what sets you apart from
    other beings and has led to the complex world we live in filled with skyscrapers,
    libraries, sports, and the infinite internet.
  prefs: []
  type: TYPE_NORMAL
- en: We build, create, and solve our own problems with a plan, focus, and creativity.
  prefs: []
  type: TYPE_NORMAL
- en: Humans have the innate drive to survive the information in their genes *and*
    consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: We have built technology since the dawn of time for the sake of life extension
    and youth extension.
  prefs: []
  type: TYPE_NORMAL
- en: The drive to preserve our physical bodies is natural, but it’s not for the reason
    that most people think.
  prefs: []
  type: TYPE_NORMAL
- en: Humans survive on the conceptual level.
  prefs: []
  type: TYPE_NORMAL
- en: We attempt to reproduce the contents of our minds.
  prefs: []
  type: TYPE_NORMAL
- en: The ideas, beliefs, and values that make us who we are.
  prefs: []
  type: TYPE_NORMAL
- en: Is a child just a physical body? When they are born, do they have a “self?”
    Are you creating a child just by birthing them physically? Or are you spewing
    your spiritual seed into their minds to create their identity?
  prefs: []
  type: TYPE_NORMAL
- en: For us to become immortal, the drive to survive our physical form and extend
    our youth is necessary to increase the time in which we can spread our ideas to
    ripple throughout consciousness and (hopefully) win the battle of good against
    evil. The biosphere (biology) must remain intact for the noosphere (mind) to expand
    and transcend to whatever is next.
  prefs: []
  type: TYPE_NORMAL
- en: In this sense, it makes sense why we do what we do.
  prefs: []
  type: TYPE_NORMAL
- en: Authors write books to become immortal and pass down their ideas to create selves
    around the world.
  prefs: []
  type: TYPE_NORMAL
- en: Authors and creators have had more children than Genghis Khan.
  prefs: []
  type: TYPE_NORMAL
- en: We read books and adopt ideas that align with our goals as a part of our identity.
  prefs: []
  type: TYPE_NORMAL
- en: And since most people have the goals that society assigned to them, they are
    perceiving and storing information that reinforces their identity. The masses
    are the children of society.
  prefs: []
  type: TYPE_NORMAL
- en: '**This all points a finger at the future of work.**'
  prefs: []
  type: TYPE_NORMAL
- en: Through evolution and technology, we have been removing labor work from our
    eyes.
  prefs: []
  type: TYPE_NORMAL
- en: To me, this seems like the human drive to pursue creative work further to advance
    the expansion and unity of mind and consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: We want to do what we want, when we want, in a positive direction by pursuing
    our interests, solving our problems, and building solutions that create heaven
    on Earth.
  prefs: []
  type: TYPE_NORMAL
- en: Never has this been more of an option for the majority of the population.
  prefs: []
  type: TYPE_NORMAL
- en: We have the technology available to us to create our ideal lives with the internet.
  prefs: []
  type: TYPE_NORMAL
- en: The Digital Renaissance
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The future of work, in my eyes, belongs to the creative.
  prefs: []
  type: TYPE_NORMAL
- en: The writers.
  prefs: []
  type: TYPE_NORMAL
- en: The designers.
  prefs: []
  type: TYPE_NORMAL
- en: The speakers.
  prefs: []
  type: TYPE_NORMAL
- en: The builders.
  prefs: []
  type: TYPE_NORMAL
- en: The creators.
  prefs: []
  type: TYPE_NORMAL
- en: The synthesizers.
  prefs: []
  type: TYPE_NORMAL
- en: The highest-paid individuals are and will be those who use the creative ability
    of their mind to solve problems that prevent progress in humanity.
  prefs: []
  type: TYPE_NORMAL
- en: This is what I teach in [2 Hour Writer.](https://2hourwriter.com)
  prefs: []
  type: TYPE_NORMAL
- en: Ideas are the building blocks of a better future.
  prefs: []
  type: TYPE_NORMAL
- en: Ideas are the primary pursuit of the creative worker.
  prefs: []
  type: TYPE_NORMAL
- en: What people don’t realize is that there is a way to achieve impossible ideas.
    You just need to create a path that allows you to actualize that reality.
  prefs: []
  type: TYPE_NORMAL
- en: Elon Musk wanted to land on Mars.
  prefs: []
  type: TYPE_NORMAL
- en: A few years ago, this was impossible, but it is becoming more and more possible
    by the day.
  prefs: []
  type: TYPE_NORMAL
- en: He didn’t start with SpaceX.
  prefs: []
  type: TYPE_NORMAL
- en: He made smart choices (among many dumb ones, you can’t skip making mistakes)
    to the point of having companies, capital, and a path to land on Mars.
  prefs: []
  type: TYPE_NORMAL
- en: Most people try to make the impossible possible but fail because they skipped
    building the ideas that must come before.
  prefs: []
  type: TYPE_NORMAL
- en: The plow came before the tractor.
  prefs: []
  type: TYPE_NORMAL
- en: The filing cabinet came before a second brain.
  prefs: []
  type: TYPE_NORMAL
- en: The horse-drawn carriage came before the car.
  prefs: []
  type: TYPE_NORMAL
- en: And most of the time, people didn’t know that the car could have existed had
    they not built the other solutions that made it a possibility.
  prefs: []
  type: TYPE_NORMAL
- en: In a practical sense, you have no idea what is possible for your future. And
    you will never find out if you don’t build a solution for the personal problems
    in your life.
  prefs: []
  type: TYPE_NORMAL
- en: We are going through what seems to be a second Renaissance. A digital one. An
    eternal one.
  prefs: []
  type: TYPE_NORMAL
- en: As we expand to new planets and the human race hits trillions in numbers, there
    will be thousands of Einsteins and Nietzsches.
  prefs: []
  type: TYPE_NORMAL
- en: We are back in a time where artists, thinkers, and creatives are rewarded for
    their risk.
  prefs: []
  type: TYPE_NORMAL
- en: This is not a time for specialists.
  prefs: []
  type: TYPE_NORMAL
- en: Nor is it a time for generalists.
  prefs: []
  type: TYPE_NORMAL
- en: We live in a time of [specialized generalism](https://thedankoe.com/letters/become-a-digital-renaissance-man-and-join-the-new-rich/).
  prefs: []
  type: TYPE_NORMAL
- en: You must laser in on a specific vision for the future and acquire the general
    skill and knowledge that will actualize each ascending goal that *creates* that
    vision.
  prefs: []
  type: TYPE_NORMAL
- en: Success is not as simple as learning one skill.
  prefs: []
  type: TYPE_NORMAL
- en: As we will find, self-education and skill acquisition – for life – in alignment
    with a self-generated goal is your key to sovereignty.
  prefs: []
  type: TYPE_NORMAL
- en: The New Economy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Universe divides and reunites like the ocean evaporates and condenses back
    down into rain.
  prefs: []
  type: TYPE_NORMAL
- en: We will call this a cycle of centralization and decentralization.
  prefs: []
  type: TYPE_NORMAL
- en: Social media has caused a shift from centralized media to decentralized media.
  prefs: []
  type: TYPE_NORMAL
- en: Synthesizers – or creators – are decentralized media companies.
  prefs: []
  type: TYPE_NORMAL
- en: They compose the new public school system that is available to anyone with an
    internet connection.
  prefs: []
  type: TYPE_NORMAL
- en: Individuals are creating new jobs, teaching new information, and creating new
    paths that schools and government can’t keep up with.
  prefs: []
  type: TYPE_NORMAL
- en: Few people recognize the importance of social media as the new digital society.
  prefs: []
  type: TYPE_NORMAL
- en: Most people see it as a place to entertain themselves and use to complete a
    few tasks at work.
  prefs: []
  type: TYPE_NORMAL
- en: In reality, media shapes culture, society, and the economy.
  prefs: []
  type: TYPE_NORMAL
- en: Media is how we learn.
  prefs: []
  type: TYPE_NORMAL
- en: Media is how we get new information.
  prefs: []
  type: TYPE_NORMAL
- en: Media is how we communicate the value of our businesses.
  prefs: []
  type: TYPE_NORMAL
- en: Media consumes a large portion of our lives. It creates a social fabric that
    people rely on for civilization to operate as it does.
  prefs: []
  type: TYPE_NORMAL
- en: Social media is the collective consciousness that spreads ideas for people to
    adopt as a part of their identity.
  prefs: []
  type: TYPE_NORMAL
- en: Identity influences perspective. Perspective influences perception. Perception
    influences what we deem important or valuable to our lives.
  prefs: []
  type: TYPE_NORMAL
- en: Social media, whether you are on it or not, changes our behavior on a personal
    level and ripples throughout society through communication. Social media is creating
    new selves with the ideas hosted on it and adopted from it.
  prefs: []
  type: TYPE_NORMAL
- en: A creator can send out a message to millions of people in the blink of an eye.
    Imagine trying to send a message to one million people 50 years ago. It would
    have taken months if not much longer.
  prefs: []
  type: TYPE_NORMAL
- en: Social media changes how we spend our money because it changes what message
    is adopted and spread by creators.
  prefs: []
  type: TYPE_NORMAL
- en: There are the synthesizers who pursue their own goals, collect ideas to creatively
    achieve them, and distribute a valuable message to their readers.
  prefs: []
  type: TYPE_NORMAL
- en: Then there are the general influencers who attract the masses with looks, rather
    than depth, for the sake of reinforcing their ego. They may be unconsciously leading
    society toward a dead end.
  prefs: []
  type: TYPE_NORMAL
- en: The world needs more synthesizers.
  prefs: []
  type: TYPE_NORMAL
- en: The value creators explore unknown crevices of reality and distribute ideas
    that others can build with the technology available to them that leads to collective
    progress.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to become a synthesizer, this is why I started Kortex University,
    [you can apply for admissions here](https://university.kortex.co).
  prefs: []
  type: TYPE_NORMAL
- en: With automation and AI seeing exponential growth, it only makes sense that people
    will get their media fix from humans.
  prefs: []
  type: TYPE_NORMAL
- en: Personal brands. Creators. Synthesizers. Same thing, different nuance and impact.
  prefs: []
  type: TYPE_NORMAL
- en: People who educate, entertain, and inspire according to their interests.
  prefs: []
  type: TYPE_NORMAL
- en: Unless we rewrite the collective psyche (which hasn’t changed much in a few
    hundred years) then this is inevitable. People are attracted to people, not robots.
  prefs: []
  type: TYPE_NORMAL
- en: Robots have their place in decreasing labor and increasing human creativity,
    though.
  prefs: []
  type: TYPE_NORMAL
- en: '**Modern business is an extension of the self.**'
  prefs: []
  type: TYPE_NORMAL
- en: It is a vessel for your purpose.
  prefs: []
  type: TYPE_NORMAL
- en: Your purpose evolves, and you must solve the superficial problems in your life
    to reach your deepest purpose.
  prefs: []
  type: TYPE_NORMAL
- en: The pattern here are the eternal markets (where the most money flows).
  prefs: []
  type: TYPE_NORMAL
- en: Health, wealth, and relationships.
  prefs: []
  type: TYPE_NORMAL
- en: '[Solve your own problems](https://thedankoe.com/letters/the-self-reliant-career-path-how-to-generate-independent-income/)
    by acquiring the skill and knowledge necessary to do so through the internet.'
  prefs: []
  type: TYPE_NORMAL
- en: Pass down what you learn in the form of free content and paid products.
  prefs: []
  type: TYPE_NORMAL
- en: By doing so, you not only create an independent income source, but massive social
    leverage.
  prefs: []
  type: TYPE_NORMAL
- en: The new economy is composed of creators that sell products which lead to progress
    within their community.
  prefs: []
  type: TYPE_NORMAL
- en: Some sell information. Some sell cotton clothes because they see danger in polyester
    as an endocrine disruptor. Some sell skin care products.
  prefs: []
  type: TYPE_NORMAL
- en: As the barrier for product creation lowers thanks to technology, we can earn
    a living doing what we enjoy while improving ourselves (and those in our community
    or readership) beyond measure.
  prefs: []
  type: TYPE_NORMAL
- en: How To Create Your Own Career
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1692">![](../Images/d7985688f7a206534d320653c2ed85ed.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Curiosity leads to learning.
  prefs: []
  type: TYPE_NORMAL
- en: Learning leads to obsession.
  prefs: []
  type: TYPE_NORMAL
- en: Obsession leads to a life that you never thought was possible.
  prefs: []
  type: TYPE_NORMAL
- en: A life filled with enjoyment, winning, and an impact on those who see the value
    in the path you’ve carved out of reality.
  prefs: []
  type: TYPE_NORMAL
- en: With the – rapidly evolving – technology available to use, we no longer have
    to remain a puppet of society.
  prefs: []
  type: TYPE_NORMAL
- en: We can make the conscious personal choice to use the tools that have been built
    for us in the new economy.
  prefs: []
  type: TYPE_NORMAL
- en: We have the chance to create a career, not be assigned one.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the career path of the future, the direction you take is your choice
    within it:'
  prefs: []
  type: TYPE_NORMAL
- en: Self-Education
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A synthesizer is a Digital Renaissance Man.
  prefs: []
  type: TYPE_NORMAL
- en: They are constant self-educators.
  prefs: []
  type: TYPE_NORMAL
- en: They acquire the knowledge and skill to actualize their goals.
  prefs: []
  type: TYPE_NORMAL
- en: They let the goals they create, not the one’s society assigned to them, be their
    interest compass.
  prefs: []
  type: TYPE_NORMAL
- en: The future of work is based on creativity, not productivity.
  prefs: []
  type: TYPE_NORMAL
- en: Creativity is using your diverse knowledge that you acquire from learning skills
    and interests to achieve a goal.
  prefs: []
  type: TYPE_NORMAL
- en: If you have not learned anything outside of what you have been told to learn,
    you probably haven’t invested in your own goals, and you have a long way to go.
  prefs: []
  type: TYPE_NORMAL
- en: As discussed in [last weeks letter](https://thedankoe.com/letters/you-wont-be-the-same-person-in-6-months-master-anything-fast/),
    goals shape the entirety of your life, identity, and the knowledge you acquire.
  prefs: []
  type: TYPE_NORMAL
- en: This is less about becoming an expert in certain skills and interests.
  prefs: []
  type: TYPE_NORMAL
- en: This is more about having a constant influx of information to fuel what you
    are building to achieve your goals.
  prefs: []
  type: TYPE_NORMAL
- en: If you haven’t started yet, you must start with the foundation.
  prefs: []
  type: TYPE_NORMAL
- en: Mind, body, spirit, and business.
  prefs: []
  type: TYPE_NORMAL
- en: Educate yourself on how to solve the most burning, profitable problems in your
    own life and others.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to make money reasonably fast, you must solve your superficial problems
    and help others solve theirs.
  prefs: []
  type: TYPE_NORMAL
- en: Do your part in raising the collective consciousness by helping others transcend
    the problems that keep them in a lower state of consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: Learn, build, and sell a product around fitness, relationships, mental health,
    and financial freedom.
  prefs: []
  type: TYPE_NORMAL
- en: By pursuing these goals, your path will be unique. It’s obvious that nobodies
    path is the same. The knowledge you acquire by achieving these goals is unique
    to you.
  prefs: []
  type: TYPE_NORMAL
- en: Everybody’s niche is self-actualization.
  prefs: []
  type: TYPE_NORMAL
- en: Before this technological revolution, people did not self-actualize in public.
  prefs: []
  type: TYPE_NORMAL
- en: The ones building rockets are also in the self-actualization niche. They are
    advancing human potential.
  prefs: []
  type: TYPE_NORMAL
- en: But, you have the ability to improve yourself, earn from it, and then pursue
    whatever you want.
  prefs: []
  type: TYPE_NORMAL
- en: Code & Content
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To take advantage of the future of work there are certain skills you must acquire.
  prefs: []
  type: TYPE_NORMAL
- en: '**The Meta Skills**'
  prefs: []
  type: TYPE_NORMAL
- en: Code and content create the internet.
  prefs: []
  type: TYPE_NORMAL
- en: They umbrella every other skill you will need to learn.
  prefs: []
  type: TYPE_NORMAL
- en: And if everything that can be done on the internet will be done on the internet,
    learning these is not optional.
  prefs: []
  type: TYPE_NORMAL
- en: '**Results Oriented Skills**'
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need to learn to code, but you need technical know-how.
  prefs: []
  type: TYPE_NORMAL
- en: You need to understand the tools you can use to build a better life.
  prefs: []
  type: TYPE_NORMAL
- en: Email marketing, graphic design, video editing, website and funnel building
  prefs: []
  type: TYPE_NORMAL
- en: These are all technical tools to help you establish your foothold as a personal
    brand in the digital society.
  prefs: []
  type: TYPE_NORMAL
- en: “Code,” in this sense, is digital real estate.
  prefs: []
  type: TYPE_NORMAL
- en: Learn everything you can to build more digital real estate that people can find
    and follow.
  prefs: []
  type: TYPE_NORMAL
- en: '**The [Evergreen Skills](https://thedankoe.com/letters/the-1-million-dollar-skill-stack-learn-in-this-order/)**'
  prefs: []
  type: TYPE_NORMAL
- en: Code is the vessel for content, and content is the only way to get in front
    of others to attract them to your product.
  prefs: []
  type: TYPE_NORMAL
- en: Writing, speaking, marketing, and sales are the skills that provide the impactful
    message *for* your results oriented skills.
  prefs: []
  type: TYPE_NORMAL
- en: You can’t just write a social post and expect it to do well.
  prefs: []
  type: TYPE_NORMAL
- en: You need to understand mechanics and psychology.
  prefs: []
  type: TYPE_NORMAL
- en: Marketing and sales are applied mechanics and psychology.
  prefs: []
  type: TYPE_NORMAL
- en: '**Personal Interests**'
  prefs: []
  type: TYPE_NORMAL
- en: Now, you are learning the vast array of skills that are required to build a
    business (your digital resume) in today’s age on social media.
  prefs: []
  type: TYPE_NORMAL
- en: You’ve learned to write, speak, market, and sell through your emails, content,
    and web pages.
  prefs: []
  type: TYPE_NORMAL
- en: That – plus actually posting things – is how you start to build an audience.
  prefs: []
  type: TYPE_NORMAL
- en: But your personal interests are what set you apart *and determine what you sell.*
  prefs: []
  type: TYPE_NORMAL
- en: Any of the above relating to business can be considered personal interests,
    but so can anything you’ve learned studying the mind, body, or spirit.
  prefs: []
  type: TYPE_NORMAL
- en: Your job is to use your skills to monetize the interests that make you unique.
  prefs: []
  type: TYPE_NORMAL
- en: Employees & Entrepreneurs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most people dream of being the CEO of a billion-dollar company but can’t even
    be the CEO of their own life.
  prefs: []
  type: TYPE_NORMAL
- en: 'The employee mindset is a difficult to break:'
  prefs: []
  type: TYPE_NORMAL
- en: You don’t pursue anything other than what you know
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You don’t continue developing your skillset beyond the work that is assigned
    to you
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You wait to be told what to do in your work and life, you don’t make the decision
    yourself
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your parents are still your bosses even though you’ve moved out. The programming
    still tugs at your mind.
  prefs: []
  type: TYPE_NORMAL
- en: 'Entrepreneurs have a distinct set of traits that align with our ancestors and
    nature:'
  prefs: []
  type: TYPE_NORMAL
- en: They push into the unknown and create new paths
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They build solutions to creative problems that advance humanity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They never stop acquiring knowledge and applying it in reality
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can take either path in the new economy.
  prefs: []
  type: TYPE_NORMAL
- en: Employers hire based on your social media.
  prefs: []
  type: TYPE_NORMAL
- en: Creators hire based on your social media.
  prefs: []
  type: TYPE_NORMAL
- en: Brands hire based on your social media.
  prefs: []
  type: TYPE_NORMAL
- en: Clients hire based on your social media.
  prefs: []
  type: TYPE_NORMAL
- en: Customers buy based on your social media.
  prefs: []
  type: TYPE_NORMAL
- en: You can be an employee, but understand that entrepreneurship is an eventual
    step you will have to take if you want full control over your life and income.
  prefs: []
  type: TYPE_NORMAL
- en: Assigned & Created Products
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: “Everyone has a product nowadays.”
  prefs: []
  type: TYPE_NORMAL
- en: I saw this under a post by Chris Williamson promoting his new productivity drink.
  prefs: []
  type: TYPE_NORMAL
- en: The commenter said it as a negative.
  prefs: []
  type: TYPE_NORMAL
- en: As if they aren’t working for someone else who has a product.
  prefs: []
  type: TYPE_NORMAL
- en: Yes, everyone has a product nowadays. Because it is a requirement if you don’t
    want to be assigned a product to sell.
  prefs: []
  type: TYPE_NORMAL
- en: “I don’t want to sell, it’s sleazy.”
  prefs: []
  type: TYPE_NORMAL
- en: Then you dont understand sales. You are selling me your ideas right now to reproduce
    and survive your narrow identity.
  prefs: []
  type: TYPE_NORMAL
- en: '*By doing nothing, you allow people less conscious and intelligent than you
    to have more attention, impact, and money than you.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*By doing nothing, you become a puppet to society and are assigned an unconscious
    life to live of selling others products and never realizing it.*'
  prefs: []
  type: TYPE_NORMAL
- en: Create a product that you would buy, use, and benefit from.
  prefs: []
  type: TYPE_NORMAL
- en: That is the only shortcut in business.
  prefs: []
  type: TYPE_NORMAL
- en: You belong to a niche, you have purchased products from that niche, and if you
    understand anything about business, you should skip 50% of the trial and error
    and sell what you’ve bought, but better.
  prefs: []
  type: TYPE_NORMAL
- en: Distribution & Leverage
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Build distribution, then build whatever you want. – Jack Butcher
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'How to start a billion-dollar company:'
  prefs: []
  type: TYPE_NORMAL
- en: Don’t.
  prefs: []
  type: TYPE_NORMAL
- en: Start as one person.
  prefs: []
  type: TYPE_NORMAL
- en: Leverage the technology available to you.
  prefs: []
  type: TYPE_NORMAL
- en: Deploy digital real estate until you have ample distribution of your products
    and services.
  prefs: []
  type: TYPE_NORMAL
- en: Write posts every single day that live on your profile.
  prefs: []
  type: TYPE_NORMAL
- en: Network with people to get them shared ([so you can grow without the algorithm](https://thedankoe.com/letters/how-to-actually-grow-on-social-media-what-they-dont-tell-you/)).
  prefs: []
  type: TYPE_NORMAL
- en: Get on podcasts to build your authority.
  prefs: []
  type: TYPE_NORMAL
- en: Plug your newsletter so you own your audience.
  prefs: []
  type: TYPE_NORMAL
- en: Give away small free products to build your newsletter more.
  prefs: []
  type: TYPE_NORMAL
- en: Sell a low-ticket product to have more people dedicated to your brand.
  prefs: []
  type: TYPE_NORMAL
- en: With an audience of 10,000, newsletter of 1,000, and network of 100 – you can
    do anything you want.
  prefs: []
  type: TYPE_NORMAL
- en: You have the resources to make a full time income at this point.
  prefs: []
  type: TYPE_NORMAL
- en: Beyond that, you can funnel extra cash into building your dream company or investing.
  prefs: []
  type: TYPE_NORMAL
- en: This letter was for big picture understanding.
  prefs: []
  type: TYPE_NORMAL
- en: For practical steps, click on any of the links in this letter for previous letters
    of products to help.
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading.
  prefs: []
  type: TYPE_NORMAL
