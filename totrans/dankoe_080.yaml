- en: The Cure To A Mediocre Life (Become Multidimensionally Jacked)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-cure-to-a-mediocre-life-become-multidimensionally-jacked/](https://thedankoe.com/letters/the-cure-to-a-mediocre-life-become-multidimensionally-jacked/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: For some reason, I’ve always had the drive to “max out” every area of my life.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: I saw life as a video game.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: My mind, body, spirit, and finances were the abilities I had to gain experience
    in.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: I wanted to become multidimensionally jacked.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Maybe because I started questioning the default path early.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Maybe because I noticed how unhappy, overweight, and miserable people seemed.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Maybe because I observed how people limited their opportunities by taking a
    specific path in life.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: It didn’t make sense to follow what most people do, because that would create
    a life that most people have, and that isn’t pretty.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: The problem with the default path in life is specialization, compartmentalization,
    and niching down.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: We are trained to focus on one dot, instead of the lines that connect the dots.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: In school, we learn biology, chemistry, math, literature, and more. We go to
    individual classes that don’t connect the dots between them all. It lacks holism,
    creativity, and the kind of practicality that gets abnormal results.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: After school, we narrow our minds further on what we *think*we want to be for
    the rest of our lives.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: We’re expected, as teenagers, to choose *one* of the infinite paths in life
    when we haven’t even started our real life. How can we know exactly what we want?
    There doesn’t seem to be a greater recipe for misery than to focus on one thing
    for the rest of your life.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: This strips our curiosity and creativity from us.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: It leads to a world where warriors lack brains and intellectuals lack balls.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: A “philosopher” will ignore practical aspects of life because they are an intellectual.
    But the main question of philosophy is “How does one live a good life?” If a philosopher
    can’t build a business, ease their mind, or become a social savant, their philosophy
    means nothing.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: Scientists will throw a frog in a blender to examine its parts. They will make
    a few discoveries, but not nearly as many if they studied holistically.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: Rather than only looking at the pieces of a frog, you can study its environment,
    mating patterns, decision-making, and diet without ignoring one or the other.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: The effects of compartmentalized learning destroy our individual potential.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: The Modern Renaissance Man
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1397">![](../Images/9397911b1aad41658e6e8ef88931c82f.png)</picture>
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: At birth, we are prescribed a way of life.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: Go to school, get a job, find a partner, try to squeeze in activities that make
    life good, retire at 65, and never work again when work is a necessary part of
    life that should involve investing our attention in what we deem enjoyable.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: In school, we’re told to pick a major.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: In business, we’re told to pick a niche.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: So we neglect other areas of study and our results suffer.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: Creativity is the path to wealth, mental and financial, and creativity requires
    a high level of understanding focused on solving specific problems.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: We are smack in the middle of a second Golden Age.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: There is so much information on the internet that it becomes overwhelming. There
    is no way that you can learn everything, but you can learn a lot.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: People still live in a paradigm where they have to get very good at *one* thing,
    because in the past, that’s what the environment required for success.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: Now, success is reserved for the [value creator](https://thedankoe.com/letters/the-value-creator-a-new-internet-career-path-for-intelligent-people/).
    The specialized generalist. The new Renaissance man. The Digital Renaissance Man.
    Somebody who can study diverse interests, create value from them, and sustain
    an enjoyable lifestyle like I teach in [Digital Economics.](https://digitaleconomics.school)
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: We live in interesting times.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: There’s an abundance of information, but it’s only overwhelming to those without
    goals or intentions behind their learning.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: The creator economy emerged and courses began condensing the information into
    actionable business models and life advice.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: Content, courses, and books are like mental zip files for the modern world.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: It no longer takes 4-12 years, $40,000, and a piece of paper to make a replaceable
    income.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: But, this implies personal responsibility.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: Nobody is there to hold your hand.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what you do:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: '**1) I Am Nobody**'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: Become labelless.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: Become everything.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: Be a designer, writer, marketer, socializer, runner, bodybuilder, philosopher,
    scientist, psychologist, and polymath that knows how to sustain their obsessive
    curiosity.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: Subscribing to one skill, ideology, or identity limits your potential in every
    situation.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: The Universe is a shapeshifter. It is in constant flow. The oceans evaporate,
    condense in the clouds, rain down into puddles, and the water inevitably finds
    its way back.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: Nothing is permanent.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: Your cells are completely different from a few years ago. Your interests are
    allowed to change. Your mind is allowed to change. You are allowed to change.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: Become the Universe.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: '**2) The Curiosity Compass**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: As a kid, people would discourage “going through a phase.”
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: I had my emo phase, my gym bro phase, and even my raver phase. All of which
    have shaped who I am.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: There’s absolutely nothing wrong with experimentation. There is absolutely something
    wrong with conforming to the whims of others.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: Prescriptions, roadmaps, and long curriculums are not bad, but they narrow your
    mind on a specific outcome with specific advice to reach that goal.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: This is useful, but should not be treated as a one-and-done type of deal. That’s
    how you get trapped in a miserable life.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: 'There is one pattern I’ve noticed both in myself and those I aspire to be like:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: They don’t limit what they learn to one thing.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: Everything connects.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: By pursuing what you are curious about, not only are you motivated to learn,
    but pattern recognition increases good dopamine and solidifies high-level knowledge.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: “Focus on one thing” is great advice, but only if that one thing is a big, meaty,
    meaningful goal that requires you to focus on a plethora of interests, skills,
    and experiences to achieve.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: My “shiny object syndrome” in business is what led to my online persona today.
    My branding, content, and products are all a unique culmination of my skills and
    interests.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: It is wise to become obsessively curious about a topic, skill, or interest for
    1-2 months to add it to your mental toolbox. This will only increase your awareness
    of opportunities as you experience life.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: When you niche down (for too long, or too far) you become a glorified search
    engine that lacks depth and personality.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: If you want to share your curiosities in public (in a way that brings career
    opportunities and fulfillment) check out [2 Hour Writer](https://2hourwriter.com).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Invest In Your Education**'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: 'In this life, you own one thing: your mind.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: Everything else can be taken away from you.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: There is one thing that the school system did get right which is consistent,
    daily education in hopes for a better future.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: But, schools don’t prioritize curiosity, so most people hate learning by the
    time they graduate.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: Learning is the foundation of the human experience.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: Hammer it into your head that you must be learning something, anything, every
    single day. No matter if it’s for 10 minutes or 3 hours, your future depends on
    it.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: How else are you going to discover new opportunities if you don’t first learn
    about them? How are you going to act on opportunities that don’t exist to you?
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: When you stop learning, your life stops progressing. You stop growing. The psychological
    benefits and feel-good chemicals stop flowing. Life gets mediocre and repetitive.
    You become mechanical and robotic.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: We’ve talked about learning a lot, but learning means nothing without building.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: Become A Builder
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In my new book [The Art Of Focus (coming soon)](https://theartoffocusbox.com)
    I have a section on the philosophy of the builder.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: One pattern I’ve noticed in my life is that I’ve always carved out time to build
    something of my own.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: School work, client work, and projects assigned to me at a job were necessary
    but didn’t get me the fulfillment I was looking for.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: My life was the meta-project that was built through a series of personal and
    business projects.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: Projects frame your attention for learning.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: When your focus is centered on that which you are building, all information
    you are exposed to is filtered through that lens.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: The source of learning is struggle not memorization. You must encounter a problem,
    discover the solution to that problem, and integrate it into your life.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: To identify a problem, you need a goal.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: To solve a problem, you need to create a solution.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: To create a solution, you need a project to invest your attention in for the
    next 1-6 months.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: When I say project, I mean something that is measurable and documented. It doesn’t
    have to be a physical product.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: It can be as simple as having a weight training log, tracking your food, tracking
    your weight, and researching fitness information to boost your progress.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start there.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Big Irrational Goals, Small Rational Steps**'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1393">![](../Images/4a0ea7d76c10f25f5d81fd6f75bf86bc.png)</picture>
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: Big goals are better than small goals because they give you the vision, motivation,
    and long-term focus necessary to see them through.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: I get more excited about building a million-dollar business in 1 year than I
    do sending 10 networking DMs a day.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: I get more excited over looking shredded at the beach this summer than I do
    meal prepping for the week.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: To embark on your journey of becoming multidimensionally jacked, create a big
    goal for the main pillars of your life.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: '**Mind** – How do you want to handle emotions and stress? Do you want to have
    the same mediocre mindset as everyone else?'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Body** – How do you want to look and feel? How does that impact other areas
    of your life (like how others perceive you and throw opportunities at you)?'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Spirit** – Do you feel like life lacks meaning, wonder, and fulfillment?
    Do you feel like life is happening to you, or that you are flowing with life?'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Business** – How much money do you want to make? Why? Do you want that money
    to come from a purposeful endeavor, unlike 90% of jobs?'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I would highly encourage that you spend 10-20 minutes writing about this in
    a journal. How do those impact your life?
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: The problem is that people stop here.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: They mentally masturbate over their goals and never make any meaningful progress
    toward them.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Outline A Project For Each Domain Of Life**'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: The goal is the what, the vision is the why, and the project is the how.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have vision and motivation for our big goals, we need to gain clarity.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: Projects have a goal, process, and priority actions to knock out on a daily
    basis.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: What can you do every single day that will move the needle toward your goals?
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: What aspects of your goals do you need to educate yourself on to make better
    decisions?
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: How can you document your progress in a way that keeps you motivated to come
    back tomorrow?
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: 'In the notebook you used to write down your goals, create a simple project
    for each goal:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: '**The milestones** – Write down tangible milestones with realistic timelines.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The variables** – Write out each variable that will help you achieve the
    goal (for health: nutrition, training, sleep. for business: product, traffic generation,
    content)'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The principles** – The priority actions that will move the needle forward.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The skills** – The skills you will have to acquire to actualize that goal.'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This brings even more clarity to changing your life.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Start, Then Learn**'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: If you want to learn faster, don’t start learning.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: Outline a project
  id: totrans-117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Start building it out
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Learn along the way
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Too many people get trapped in tutorial hell, stacking up useless knowledge
    as brain fog.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: Start, encounter a problem, and experiment with different techniques to solve
    that problem.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: When I was learning Photoshop, I would try to learn everything about the software
    before starting.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: When I did start, I felt like I knew absolutely nothing.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: I had to supplement with specific tutorials and “create with me” videos until
    I figured out how to create what I wanted.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: What I realized is that there is more than 1 way to solve a problem.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: If I wanted to remove the background behind something as complex as a tree,
    I could either do it with the pen tool, color channels, color range, or quick
    select.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: Quick select would be what everyone does, and it often leads to the worst results.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: Keep this in mind when you are researching anything.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: If anyone can solve the problem with easily accessible information, there is
    probably a better way of doing it that will give you an edge over your competition.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: Now, I don’t want to make it seem like you should *never* learn unless you have
    a problem.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: Quite the opposite.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: I would highly encourage a general education habit.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: 10-30 minutes every single day immersing yourself in information related to
    your goals.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: Watch a YouTube video that interests you. Buy a best-selling book. Queue a podcast
    for your next walk (and start going on walks… I promise you won’t keep up with
    this education habit if you don’t get out of your house. Too many distractions).
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: '**4) Lifestyle Design Through Habit Formation**'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1394">![](../Images/76163bfda2c7c9e12b22ff3dff5ce6b2.png)</picture>
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: The difference between you and who you want to become is the habits that compose
    your lifestyle.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: Think about it.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: Do mentally, physically, or financially jacked people just wake up with the
    best mind, body, and business one day?
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: Or do they have tiny actions they take on a daily basis that maintains their
    progress and builds toward a better future?
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: Most people will tell you to stop playing video games, going out, and distracting
    yourself… I agree, but I don’t.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: I still play video games here and there. Maybe 5 hours a week.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: I still go out with friends and stay up late. Maybe 2-5 times a month.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: The reason I still outpace 99% of people is that I frontload my mornings with
    needle-moving tasks.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: 'Between 5am and 11am I:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: Go on a run 3-4 days a week
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Write my newsletter and content for 1 hour (this sustains 95% of my business…
    remember, principles).
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Build out a new project, right now it’s my book launch and software company
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hit the gym 6-7 days a week
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Take walks in between all of those activities
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cook nutrient-dense meals that take 10-15 minutes to prepare (and eat out for
    dinner quite a bit – I’m hovering around 4500 calories a day)
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I know not everyone can do this due to time constraints, but neither could I
    in the past.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: As you get results from your efforts, you become more efficient at what you
    do. Time will free up (since that should be a sub-goal for almost every goal you
    set… it’s a great way of measuring progress).
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 当你从你的努力中获得成果时，你在你所做的事情上会变得更加高效。时间会释放出来（因为那应该是你设定的几乎每个目标的子目标……这是一种衡量进步的绝佳方式）。
- en: 'When in doubt:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 当你不确定时：
- en: Waking up an hour earlier unlocks the distraction-free time that will solve
    most of your problems.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 提前一个小时起床可以解锁无干扰的时间，这将解决你大部分的问题。
- en: That’s it for this one my friends.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 好了，朋友们，就到这里。
- en: To the multidimensionally jacked,
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 对于多维度的健身爱好者，
- en: – Dan Koe
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹·科
