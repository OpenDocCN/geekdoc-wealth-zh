- en: Making Money Is Spiritual (If You Learn These Unethical Skills)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/making-money-is-spiritual-if-you-learn-these-unethical-skills/](https://thedankoe.com/letters/making-money-is-spiritual-if-you-learn-these-unethical-skills/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In today’s world, one of the worst things you can do is get trapped in the mind
    of the “noble brokie.”
  prefs: []
  type: TYPE_NORMAL
- en: Many intelligent people I know hate online business, marketing, and sales because
    they think it is “below” them.
  prefs: []
  type: TYPE_NORMAL
- en: They get locked into what they think is a “higher” perspective that demonizes
    the sleazy salesman. In reality, this is an illusion. This “higher” perspective
    is filled with misunderstanding, a lack of empathy, and hate.
  prefs: []
  type: TYPE_NORMAL
- en: It is on par with if not a lower level of consciousness than the “sleazy salesman”
    himself.
  prefs: []
  type: TYPE_NORMAL
- en: This is similar to how democrats and republicans argue to defend the ideology
    they identify with. Similar to atheists and theists. When they engage in these
    narrow-minded arguments, there is no chance of discovering the holistic truth
    of the situation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s start to deconstruct what this holistic truth is:'
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t start a business to provide information, education, and goods that
    make a better humanity – then unethical businesses rise to the top without competition
    making a worse humanity.
  prefs: []
  type: TYPE_NORMAL
- en: The reason that unethical businesses flood the marketplace is that you aren’t
    as conscious or intelligent as you think.
  prefs: []
  type: TYPE_NORMAL
- en: You are directly contributing to evil by not starting a business to raise the
    collective consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: By doing nothing but demonizing money and businesses that are the lifeblood
    of society, you are assigned a job where the employer is more than likely unethical
    by your standards.
  prefs: []
  type: TYPE_NORMAL
- en: You won’t start a business because of your delusional *assumptions* and conditioning
    that it is unethical to make money – but you are working for a business that makes
    the population sick, contributes to bombing people across the world, and locks
    employees into robotic routines so they wouldn’t dare achieve their potential.
  prefs: []
  type: TYPE_NORMAL
- en: People criticize new creator education businesses as “grifts” and “scams” for
    solving the only true problems that will raise the baseline consciousness of humanity.
  prefs: []
  type: TYPE_NORMAL
- en: People who sell education, courses, and coaching in the health, wealth, relationships,
    and happiness domains of life are attacking the root of positive behavior change.
    I discuss the importance of education in [You Have $100,000 Trapped In Your Head.](https://thedankoe.com/letters/you-have-100000-of-knowledge-trapped-in-your-brain/)
  prefs: []
  type: TYPE_NORMAL
- en: If humanity is only as strong as its weakest link, and 99% of people suffer
    from the same survival problems, and education is what allows the *individual*
    to solve their own problems (rather than prescribing temporary relief), and problems
    are what prevent personal to collective evolution, and if the education system
    is focused on training people into jobs for its own benefit, then the new digital
    society of value creators is one realistic path out of this mess.
  prefs: []
  type: TYPE_NORMAL
- en: Back to the main argument…
  prefs: []
  type: TYPE_NORMAL
- en: '*By doing nothing, you allow people less conscious and intelligent than you
    to have more attention, impact, and money than you.*'
  prefs: []
  type: TYPE_NORMAL
- en: Money creates a ripple effect and allows them to spread their message further,
    hire employees (that contribute to said unethical practices), and compound the
    attention they hold in society.
  prefs: []
  type: TYPE_NORMAL
- en: The only way you can stop people from paying attention to one thing is to give
    them something more persuasive to pay attention to.
  prefs: []
  type: TYPE_NORMAL
- en: This issue is not as simple as “just starting a business to make money.”
  prefs: []
  type: TYPE_NORMAL
- en: Everything is connected and you are unconsciously allowing the entire Universe
    to tilt in the hands of evil by not becoming a conscious business owner that impacts
    its customers, employees, readers, economy, and the rest to infinity.
  prefs: []
  type: TYPE_NORMAL
- en: '*Spirituality is understanding your part in the whole of the Universe.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Spirituality is not disconnecting from that whole to live in the woods and
    letting the Universe decline into chaos.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Spirituality then can be considered, and felt, when you attempt to reverse
    entropy by putting effort and energy into the progress and evolution of humanity.*'
  prefs: []
  type: TYPE_NORMAL
- en: Happiness is the feeling that power increases — that resistance is being overcome.
    — Nietzsche
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you hate money, do you not hate your life?
  prefs: []
  type: TYPE_NORMAL
- en: Everything around you right now from the phone in your hands to the roads you
    drive on to the desk you sit at to the food that keeps you alive are all products
    from a business that makes money for their contribution to the advancement of
    civilization.
  prefs: []
  type: TYPE_NORMAL
- en: You are drowning in a world that was built by the drive of money stemming from
    survival.
  prefs: []
  type: TYPE_NORMAL
- en: I discuss the importance of money, marketing, and sales from a spiritual lens
    in my new book, The Art of Focus. If you want a practical philosophy for meaning,
    money, and mastery [pick it up here.](https://theartoffocusbook.com)
  prefs: []
  type: TYPE_NORMAL
- en: The Importance And Unignorability Of Money
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '*“The best way to make money is teaching others how to make money.”*'
  prefs: []
  type: TYPE_NORMAL
- en: I see people say this quite often.
  prefs: []
  type: TYPE_NORMAL
- en: Some people say it as wisdom.
  prefs: []
  type: TYPE_NORMAL
- en: Others act like it is a sentence that dismantles any business advice so they
    don’t have to face reality.
  prefs: []
  type: TYPE_NORMAL
- en: Some people see this saying as a bad thing when money rules people’s lives.
    It is the one thing holding them back from reaching the next level of their personal
    development. *It dictates almost every single action a person takes, even the
    most “spiritual” people, because money is deeply intertwined with modern survival.*
  prefs: []
  type: TYPE_NORMAL
- en: '**Why do you work 8 hours a day for 45 years?** Because you need to pay the
    bills and support your family.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Why do you go off and live in the woods like a monk?** Because you want to
    eliminate the need for money to pursue personal development. (To think this is
    what everyone should do is more foolish than leaving society to rot. “All is one”
    until you actually have to take responsibility for the health of the world, so
    you choose to check out instead).'
  prefs: []
  type: TYPE_NORMAL
- en: '**Why do you go to the gym and eat healthy foods?** To be healthy, yes, but
    there’s more. You want to increase your perceived status so you can attract better
    opportunities, advance your career, and make more money.'
  prefs: []
  type: TYPE_NORMAL
- en: Why am I typing on my keyboard right now? To help you out, yes, but there is
    not only *one* reason behind anyone’s actions. Writing is my business. I write
    on a weekly business because I get paid to do so, among a plethora of other benefits
    it brings to my life.
  prefs: []
  type: TYPE_NORMAL
- en: Why are you reading this? To get a new perspective, yes, but it will open your
    mind to reduce the limiting beliefs around making money.
  prefs: []
  type: TYPE_NORMAL
- en: Almost every action you take has money as an attached reason.
  prefs: []
  type: TYPE_NORMAL
- en: Money is deeply rooted in modern survival.
  prefs: []
  type: TYPE_NORMAL
- en: If you look at Maslow’s Hierarchy of Needs, each stage requires money in the
    modern world.
  prefs: []
  type: TYPE_NORMAL
- en: The financial domain of your life is just like any other domain.
  prefs: []
  type: TYPE_NORMAL
- en: Like a skill tree in a video game.
  prefs: []
  type: TYPE_NORMAL
- en: All domains of your life require seeds to be planted over time for a garden
    to flourish.
  prefs: []
  type: TYPE_NORMAL
- en: To achieve health, you need money.
  prefs: []
  type: TYPE_NORMAL
- en: To achieve fulfilling relationships, you need to solve the problem that destroys
    99% of them… money.
  prefs: []
  type: TYPE_NORMAL
- en: To be happy (moreso to enjoy life since happiness is a fickle metric) you need
    to make progress toward a meaningful goal. You need to build. Building requires
    resources. Resources require money.
  prefs: []
  type: TYPE_NORMAL
- en: When you ignore the need for money, you limit how far you can go in your mental,
    physical, and even spiritual practices.
  prefs: []
  type: TYPE_NORMAL
- en: Spiritual practices? Yes. If you have a poor relationship with the lifeblood
    of the material world then your spirituality is stunted. You can’t acquire the
    resource that allows you to contribute to the spiritual evolution of humanity.
  prefs: []
  type: TYPE_NORMAL
- en: Everything is “teaching people how to make money” and advance their career no
    matter if its advice positioned from the perspective of relationships, health
    and fitness, or learning a new skill like digital art.
  prefs: []
  type: TYPE_NORMAL
- en: Hell, why do you go to school for 12 to 24 years of your life? To increase your
    earning capacity of course. Yes, you learn how to operate within society, but
    what is the lifeblood of society?
  prefs: []
  type: TYPE_NORMAL
- en: What do they teach in school? Is it only “how to make money?” Or is it an interest
    you can adopt to eventually help you make money?
  prefs: []
  type: TYPE_NORMAL
- en: Back on the topic of the creator economy…
  prefs: []
  type: TYPE_NORMAL
- en: Do you not see that the only way to make money in the new economy is from people
    who *created* the jobs and opportunities to make money in that economy?
  prefs: []
  type: TYPE_NORMAL
- en: Just because you don’t understand it doesn’t mean it isn’t useful.
  prefs: []
  type: TYPE_NORMAL
- en: Do you not see that the only way to make money in the old economy is from the
    institutions and constructs that created those jobs?
  prefs: []
  type: TYPE_NORMAL
- en: Everything evolves. Let go of what you thought worked 10 years ago.
  prefs: []
  type: TYPE_NORMAL
- en: Schools teach outdated and less profitable ways to make money, because more
    profitable ones emerged with the creation of the internet. Just like how more
    profitable jobs emerged after the creation of the tractor and everything else.
  prefs: []
  type: TYPE_NORMAL
- en: By viewing everything as a scam you are delaying your development by years if
    not your entire life.
  prefs: []
  type: TYPE_NORMAL
- en: This is the phase of evolution we are in and you are missing out on what will
    be the new normal.
  prefs: []
  type: TYPE_NORMAL
- en: You Can’t Avoid Learning “Unethical” Skills
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The most successful people are those who study unethical tactics and use them
    in an ethical way.
  prefs: []
  type: TYPE_NORMAL
- en: Sales
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Marketing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Persuasion
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hypnosis
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Influence
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Game
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Their work, business, and pursuit of lofty goals are the modalities for integrating
    their shadow. (I teach all of these, except hypnosis, inside [Digital Economics](https://digitaleconomics.school)
    from a philosophical business lens)
  prefs: []
  type: TYPE_NORMAL
- en: They’re all the same thing when you zoom out to see the principles.
  prefs: []
  type: TYPE_NORMAL
- en: 'All of these “unethical” skills are just understanding human nature, psychology,
    and patterns of the Universe like storytelling (even architecture and music):'
  prefs: []
  type: TYPE_NORMAL
- en: Music is liquid architecture; architecture is frozen music. – Goethe
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Everyone has a dark side.
  prefs: []
  type: TYPE_NORMAL
- en: Like the ugly underside of a floor rug or the bass note of a song.
  prefs: []
  type: TYPE_NORMAL
- en: The Universe is a balance of creation and destruction, unity and division, birth
    and death. Buildings are destroyed so new ones can be built. Your past self dies
    so your ideal self and birth.
  prefs: []
  type: TYPE_NORMAL
- en: You are not pure good.
  prefs: []
  type: TYPE_NORMAL
- en: It is impossible to be pure good when “good” is relative and would not exist
    without evil.
  prefs: []
  type: TYPE_NORMAL
- en: People that try to suppress it, rather than integrate it, have that dark side
    manifest in unconscious ways. Often, the people who say they aren’t manipulative
    are the most manipulative, they just aren’t aware of it.
  prefs: []
  type: TYPE_NORMAL
- en: Getting a sales job or starting a marketing business is a great way to integrate
    your shadow. You are given a choice to use skills for good or evil. You get to
    see the outcome and how it impacts you and your customers.
  prefs: []
  type: TYPE_NORMAL
- en: Spiritual masters are not “all good,” they’ve just learned to integrate the
    bad and not let their song of a life be written as a depressing one. There will
    be lows in your story, but when you zoom out, how will it turn out?
  prefs: []
  type: TYPE_NORMAL
- en: A good way to think about your skill stack is like a mutual fund.
  prefs: []
  type: TYPE_NORMAL
- en: If one stock goes down, the mutual fund can still be up.
  prefs: []
  type: TYPE_NORMAL
- en: If one skill is “unethical,” that may be the unlock to your business being profitable,
    ethical, and impactful.
  prefs: []
  type: TYPE_NORMAL
- en: To Be Human Is To Transcend, Expand, and Create
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The world is going mental.
  prefs: []
  type: TYPE_NORMAL
- en: As a species, we are transcending the physical thanks to technology, science,
    and computational power.
  prefs: []
  type: TYPE_NORMAL
- en: We are unifying as a species – the unity of consciousness – through technology.
    Would that have been possible without money?
  prefs: []
  type: TYPE_NORMAL
- en: While most see social media as a net negative to humanity, I couldn’t disagree
    more.
  prefs: []
  type: TYPE_NORMAL
- en: Social media is where we are documenting the collective mind.
  prefs: []
  type: TYPE_NORMAL
- en: We share thoughts, opinions, ideas, creations, and our identity. We are uploading
    our minds to the internet. Not just creators. Content is the collective mind.
  prefs: []
  type: TYPE_NORMAL
- en: Social media dissolves the boundary of how we are communicating.
  prefs: []
  type: TYPE_NORMAL
- en: It’s like people are waiting in line to go inside their screens. They stare
    at it all day. Like there is a primordial pull to become one with every other
    mind.
  prefs: []
  type: TYPE_NORMAL
- en: Your entire identity is already on the screen anyway, but there’s still a barrier
    that is the screen.
  prefs: []
  type: TYPE_NORMAL
- en: Imagine a world where you can send a signal that is a thought to another person.
    Imagine a world where you are reading my newsletters are fed into your mind without
    reading them. Imagine a world where you are watching my videos and I’m right there
    with you.
  prefs: []
  type: TYPE_NORMAL
- en: If you haven’t seen the Lex Fridman podcast with Mark Zuckerberg ([The First
    Interview In The Metaverse](https://youtu.be/MVYrJJNdrEg)), that future isn’t
    too far off. They have a podcast in virtual reality where their avatars are hyper-realistic.
    It’s mind-blowing.
  prefs: []
  type: TYPE_NORMAL
- en: I recently switched [The Art Of Focus](https://theartoffocusbox.com) event from
    in-person to virtual – and one objection to this change is that in-person would
    be more valuable, a different kind of energy.
  prefs: []
  type: TYPE_NORMAL
- en: While I’m sure this is true now, what about in the future? What if virtual events
    were *as real* as physical, but the flow of information was instant and the experience
    was nothing like we can conceptualize right now?
  prefs: []
  type: TYPE_NORMAL
- en: 'Another question:'
  prefs: []
  type: TYPE_NORMAL
- en: You have the entire world’s knowledge at your fingertips. How does that make
    you feel?
  prefs: []
  type: TYPE_NORMAL
- en: You have the capacity to learn, expand your sense of self, and start a business
    that provides value to the world.
  prefs: []
  type: TYPE_NORMAL
- en: When polled for what kids wanted to be when they grew up, the highest-voted
    option was a “YouTuber.”
  prefs: []
  type: TYPE_NORMAL
- en: While most see this as delusional and impossible, I see it as natural and really
    the only option in the future. Maybe not specifically as a “YouTuber,” but as
    a creator like the Universe. You are a being that creates with your mind.
  prefs: []
  type: TYPE_NORMAL
- en: Most people label wanting influence and attention as “vanity” but few people
    realize reasoning can’t be reduced to a singular “why.” There is always something
    deeper and unconscious pushing us to act and make decisions.
  prefs: []
  type: TYPE_NORMAL
- en: There are multiple “whys” behind our cares, wants, and desires.
  prefs: []
  type: TYPE_NORMAL
- en: Your reasoning behind your actions becomes more holistic as you expand and transcend
    to new levels of mind.
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1549">![](../Images/9017dae355b54dd7aba2da3798fa4bd9.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Your level of mind determines your values.
  prefs: []
  type: TYPE_NORMAL
- en: You didn’t choose to sit around and think about money, social media, and skill
    acquisition.
  prefs: []
  type: TYPE_NORMAL
- en: You make an automatic decision based on the structure of your psyche.
  prefs: []
  type: TYPE_NORMAL
- en: For many, they were assigned ideology, beliefs, systems, and business models
    that sounded “good” and began defending their beliefs as the best and only.
  prefs: []
  type: TYPE_NORMAL
- en: 'When you zoom out, push into the unknown, and make progress by solving problems
    that increase your level of mind – you can see money for what it truly is: a piece
    of paper that can benefit yourself and others massively.'
  prefs: []
  type: TYPE_NORMAL
- en: A Brief Summary Of Why You Aren’t Successful
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You aren’t successful because you say you want to help others, but you won’t
    learn the skills that allow you to help others.
  prefs: []
  type: TYPE_NORMAL
- en: You aren’t successful because you focus too much on art, and then blame the
    market when they don’t see the value in what you have to offer (because you couldn’t
    articulate it with marketing and sales).
  prefs: []
  type: TYPE_NORMAL
- en: You aren’t successful because you “focus on your craft” rather than getting
    your craft in front of potential customers. Your websites, designs, writing, and
    other projects do not count until other people see them. You are delaying the
    time to feedback. Without feedback, you can’t make it valuable. Your first iteration
    will not be valuable.
  prefs: []
  type: TYPE_NORMAL
- en: You aren’t successful because you have an incomplete perspective on what business
    is. It is how you participate in the advancement of humanity by creating a product
    that raises the collective consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: You aren’t successful because you took these points as personal attacks, closed
    your mind to your potential, and allowed your conditioning to rule you.
  prefs: []
  type: TYPE_NORMAL
- en: You aren’t successful because you don’t create something valuable that the market
    wants to pay for. People don’t want what your ego wants, they want what Mother
    Nature wants, and who are you to act like you know what that should be?
  prefs: []
  type: TYPE_NORMAL
- en: You aren’t successful because you find comfort in the beliefs that you believe
    are high and mighty. You lock yourself into a paradigm that prevents you from
    growing as an individual. You begin coping rather than creating.
  prefs: []
  type: TYPE_NORMAL
- en: Self-development is a gateway drug into entrepreneurship because you realize
    that improving others is the next level of improving yourself.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'To become successful, there is one golden rule:'
  prefs: []
  type: TYPE_NORMAL
- en: Provide value to others.
  prefs: []
  type: TYPE_NORMAL
- en: 'This means two things:'
  prefs: []
  type: TYPE_NORMAL
- en: '**You must cultivate your value.** You must expand your mind, identify problems,
    acquire skills to solve them, and make tangible progress in reality. (You can’t
    just sit around and learn theory all day, you must practice.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**You must distribute your value.** You need a vessel – AKA a business – to
    distribute a product or service that the market *wants* to buy. If they don’t
    want it, it isn’t as valuable as you think.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In other words, you need self-development *and* other-development.
  prefs: []
  type: TYPE_NORMAL
- en: Personal growth and business growth.
  prefs: []
  type: TYPE_NORMAL
- en: Business is how you provide value to others at scale.
  prefs: []
  type: TYPE_NORMAL
- en: How do you cultivate and distribute value in the modern world?
  prefs: []
  type: TYPE_NORMAL
- en: Social media. Virtual reality.
  prefs: []
  type: TYPE_NORMAL
- en: Social media is your public school, public resume, and public portfolio.
  prefs: []
  type: TYPE_NORMAL
- en: 'It holds the holy trifecta of the good life: Learning, building, and selling.'
  prefs: []
  type: TYPE_NORMAL
- en: You cultivate your value by learning new knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: You solidify your value by building new projects.
  prefs: []
  type: TYPE_NORMAL
- en: You distribute your value by selling those projects.
  prefs: []
  type: TYPE_NORMAL
- en: All 3 result in a more valuable skillset and mindset.
  prefs: []
  type: TYPE_NORMAL
- en: Now, this letter was about mindset. It was to help you bust through limiting
    beliefs and provide you with a worldview conducive to a better future for yourself.
  prefs: []
  type: TYPE_NORMAL
- en: If you want previous letters on skillset, I’d recommend starting with my [entrepreneurship
    letters](https://thedankoe.com/blog/category/entrepreneurship/). Scroll to the
    bottom and start there.
  prefs: []
  type: TYPE_NORMAL
- en: Talk soon,
  prefs: []
  type: TYPE_NORMAL
- en: Dan Koe
  prefs: []
  type: TYPE_NORMAL
- en: P.S. The price for The Art Of Focus Keepsake Box increases in under a week (you
    won’t receive another Koe Letter before then).
  prefs: []
  type: TYPE_NORMAL
- en: It has new pricing options and a better virtual event.
  prefs: []
  type: TYPE_NORMAL
- en: '[Check it out here.](https://theartoffocusbox.com)'
  prefs: []
  type: TYPE_NORMAL
