- en: The Future Of The Creator Economy (My Bold Prediction)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创作者经济的未来（我的大胆预测）
- en: 原文：[https://thedankoe.com/letters/the-future-of-the-creator-economy-my-bold-prediction/](https://thedankoe.com/letters/the-future-of-the-creator-economy-my-bold-prediction/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://thedankoe.com/letters/the-future-of-the-creator-economy-my-bold-prediction/](https://thedankoe.com/letters/the-future-of-the-creator-economy-my-bold-prediction/)'
- en: Complex sales funnels.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 复杂的销售漏斗。
- en: Upsells with countdown timers.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 使用倒计时计时器的促销。
- en: Absurd guarantees and flexing big numbers.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 荒谬的保证和炫耀大数字。
- en: Rented Lamborghinis and beautiful women on a yacht for a *paid* photoshoot to
    market the product.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 租赁兰博基尼和游艇上的美女进行*付费*拍照来推广产品。
- en: That was the state of internet marketing 10 years ago.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 那是十年前互联网营销的状态。
- en: And while I don’t believe it was all bad, it seemed like everyone was walking
    on eggshells and bending the truth to make an income.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我不认为这一切都是坏的，但似乎每个人都小心翼翼，扭曲事实来谋生。
- en: '*“Start an agency, you can make $100,000 fast.”*'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '*“开设一家代理机构，你可以快速赚到10万美元。”*'
- en: So you can learn one skill you hate, to work with people you hate?
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 那么你难道可以学习一项你讨厌的技能，与那些你讨厌的人一起工作吗？
- en: '*“Start a dropshipping store, you can ship straight from China.”*'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '*“开设一家直邮商店，你可以直接从中国发货。”*'
- en: So you can sell useless products and contribute to the cheap dopamine extravaganza
    online?
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 那么你就可以销售无用的产品，为在线的廉价多巴胺狂欢做出贡献吗？
- en: '*“Target this niche and never break out of it. Never evolve. Never incorporate
    your interests into your work. Always squeeze the most money you can out of your
    customers.”*'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '*“针对这个细分市场，永远不要突破。永远不要进化。永远不要将你的兴趣融入工作中。总是从你的客户那里榨取尽可能多的钱。”*'
- en: Okay… nobody said that directly, but it was implied in all of their teachings.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧……没有人直接这么说，但他们的所有教导都暗示了这一点。
- en: I don’t really care if you go and do these things.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我并不真的在乎你是否去做这些事情。
- en: But you’re subscribed to this newsletter because you want to create a better
    life.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 但你订阅这个通讯是因为你想要创造一个更好的生活。
- en: I’m here to tell you there is a way to earn a living doing what you enjoy, and
    it’s becoming a lot more feasible as the creator economy evolves.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里要告诉你，有一种方法可以在享受生活的同时谋生，随着创作者经济的不断发展，这种方法变得越来越可行。
- en: I was on a Zoom call with Michael from my Modern Mastery community the other
    day, and we had a great discussion about how the creator economy is moving.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我前几天与我的现代精通社区中的迈克尔进行了一次Zoom通话，我们讨论了创作者经济是如何发展的。
- en: First, the level of market sophistication is increasing across the board.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，整个市场的成熟度正在普遍提高。
- en: Similar to how people lost trust in the formal education system, the collective
    space is losing trust in the shady marketing tactics of the past decade.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 与人们失去对正规教育系统的信任一样，集体空间正在失去对过去十年中可疑营销策略的信任。
- en: 1) Reality Is Not Compartmentalized
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 现实并非分割的
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1078">![](../Images/cf6e07b8113086cb7234f80ec6a3087f.png)</picture>
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1078">![](../Images/cf6e07b8113086cb7234f80ec6a3087f.png)</picture>
- en: The internet marketing industry followed the same path as the school system.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网营销行业遵循了与学校系统相同的路径。
- en: The common advice was to “niche down” as far as possible, because the riches
    are in the niches, as they say.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 常见的建议是尽可能地进行细分，因为正如他们所说，财富在细分市场中。
- en: This has merit and is still a half-truth, but niching down on a target audience
    and accompanying skill is against the point.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这是有益的，但仍然是一个半真半假的说法，但针对目标受众和伴随技能进行细分是违背初衷的。
- en: Niching down for the sake of positioning from a *goal, accompanying problem,
    and acquiring the skills to bridge the gap* is a different story.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 为了定位而进行细分，从*目标、伴随问题和获取弥合差距的技能*出发，是另一回事。
- en: The essence of marketing is delivering a transformation with a unique solution.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 市场营销的本质是提供一种独特的解决方案，实现变革。
- en: You help people get from point A to point B with a system that gets results.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过一套能够取得成果的系统帮助人们从A点到B点。
- en: In the school system, there are separate departments that help you “learn” in
    pockets.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在学校系统中，有独立的部门帮助你“学习”在各个领域。
- en: Like chemistry, biology, business, design, or architecture.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 就像化学、生物学、商业、设计或建筑学一样。
- en: This structure neglects the interconnected nature of life that allows you to
    learn much faster.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这种结构忽视了生活的相互联系性，这让你能够更快地学习。
- en: Like how the ocean divides into rain droplets just to reunify back in the ocean,
    the internet marketing space is following the same pattern of evolution.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 就像海洋分裂成雨滴，只是为了再次在海洋中重新统一，互联网营销空间也在遵循相同的进化模式。
- en: It divided into niche compartments, and is now reunifying into a demand for
    holistic, unified solutions.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 它被分割成专门的区域，现在正重新整合成一个对整体、统一解决方案的需求。
- en: 2) Holistic Solutions For A Community With A Shared Purpose
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 具有共同目标的社区的全面解决方案
- en: Napoleon Hill had a concept he called a “Master Mind.”
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 拿破仑·希尔有一个他称之为“大师心智”的概念。
- en: In short, it is a group of people that are attracted to each other with a shared
    perspective.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，这是一个被共同观点吸引在一起的人群。
- en: A perspective is comprised of a goal (purpose) and accompanying beliefs.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 一个观点由一个目标（目的）和伴随的信念组成。
- en: When a group, or community, of people join together to actualize the same purpose,
    they can achieve it 10x faster than any one individual.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 当一群人或社区联合起来实现同一个目标时，他们可以比任何一个人快10倍地实现它。
- en: When it comes to the creator economy, individuals are attracting a community
    of people that resonate with their goals, voice, and personality.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 当谈到创作者经济时，个人会吸引一群与他们目标、声音和个性产生共鸣的人。
- en: Then, these creators are providing education related to a multitude of skills
    and interests that will help actualize that goal.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，这些创作者提供了与众多技能和兴趣相关的教育，这将有助于实现这一目标。
- en: Like how [Kortex University](https://university.kortex.co) attracts a certain
    demographic of people that resonate with my meaningful goal of “work less, earn
    more, enjoy life.”
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 就像[Kortex大学](https://university.kortex.co)吸引了一群与我“工作更少，赚更多，享受生活”的有意义目标产生共鸣的特定人群。
- en: That goal is not limited to one niche or interest.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这个目标不仅限于一个细分市场或兴趣。
- en: It is a holistic synthesis of everything required to achieve that.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个综合了实现这一目标所需的一切的整体综合。
- en: Mind, body, spirit, and business with strategies that help with each.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 心灵、身体、精神和企业，以及有助于每个方面的策略。
- en: We need fewer shallow promises and more solutions to reach meaningful goals.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要更少的肤浅承诺，更多的解决方案来实现有意义的目标。
- en: Most modern business models don’t do that.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数现代商业模式都不这样做。
- en: Dropshipping a fancy little flashlight has no depth.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 批发一个花哨的小手电筒没有深度。
- en: Creating a basic journal with print on demand for the sake of quick and easy
    cash has no soul.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 为了快速和轻松地赚钱而创建一个基本的按需印刷日记，没有任何灵魂。
- en: Starting an agency with a skill you hate to work with a customer avatar you
    hate will only result in shallow work.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 用你讨厌的技能开一家代理机构，用你讨厌的客户形象，只会导致肤浅的工作。
- en: 3) Clarity Above All
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 清晰度至上
- en: The past decade of internet marketing banked on complexity.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 过去十年的互联网营销依赖于复杂性。
- en: Products and services would have the same simple solutions, but they were marketed
    in a way that overcomplicated what’s inside (to increase the perceived value of
    the product).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 产品和服务将具有相同简单的解决方案，但它们被营销的方式过于复杂了（为了增加产品的感知价值）。
- en: Now, people want a clear, simple, and straightforward solution that is *taught*
    *from a perspective that they learn the best from**.*
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，人们想要一个清晰、简单、直接的解决方案，这个解决方案是从他们最能学习的角度**教授**的。
- en: Some people are very practical.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人非常务实。
- en: I am very philosophical, and my audience reflects that.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常哲学，我的听众也反映了这一点。
- en: By leaning into the voice *you* learn best from, you attract people with shared
    goals that can learn best from you.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 通过依靠你最能学习的声音，你吸引那些有共同目标的人，他们可以从你这里学到最好的东西。
- en: This starts to paint the depth behind my phrase, “[You Are The Niche](https://thedankoe.com/the-most-profitable-niche-is-you-how-to-create-your-niche/).”
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 这开始描绘出我短语“[你是你的细分市场](https://thedankoe.com/the-most-profitable-niche-is-you-how-to-create-your-niche/)”背后的深度。
- en: The Emergence & Demand For The Holistic Synthesizer
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 整体综合者的出现与需求
- en: 'Under this philosophy, the creator economy cannot get saturated because:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个哲学下，创作者经济不会饱和，因为：
- en: '**1) Your Community Evolves**'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 你的社区在进化**'
- en: When you don’t subscribe to a specific label, niche, or compartment of reality
    that limits what you are capable of, the only option is to evolve.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 当你不认同一个特定的标签、细分市场或现实中的某个部分，它限制了你的能力时，唯一的选择就是进化。
- en: Humans and communities do not stick to one purpose.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 人类和社区不会坚持一个目标。
- en: Once you actualize that goal, you move on to the next that reveals itself.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你实现了这个目标，你就会转向下一个揭示的目标。
- en: '**2) Your Products Evolve**'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 你的产品在进化**'
- en: I started out as a web designer, my products and services revolved around that.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我最初是一名网页设计师，我的产品和服务的核心都是围绕这个领域。
- en: As I developed myself and my business, I transitioned into different skills
    and interests.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我自己和我的业务的发展，我转向了不同的技能和兴趣。
- en: My products followed suit, and I effectively desaturated the web design market
    under me.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我的产品也跟着这样做，我有效地降低了我所处的网络设计市场的饱和度。
- en: '**3) Unique Webs Of Interests**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 独特的兴趣网络**'
- en: When you lean into your genuine combination of interests, your brand ceases
    to be compartmentalized.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 当你深入到你的真正兴趣组合中时，你的品牌就不再被分割。
- en: Someone who talks about fitness, business, and tech is still vastly different
    from someone who talks about fitness, business, and spirituality.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 一个人谈论健身、商业和科技，与一个人谈论健身、商业和灵性的人有很大的不同。
- en: '**4) Large Creators Have Ample Resources**'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 大型创作者拥有丰富的资源**'
- en: It is not rare to see a large creator decrease output on all fronts.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有方面减少产出的大型创作者并不少见。
- en: Go and look at a YouTuber with over 1 million subscribers.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 去看看一个拥有超过100万订阅者的YouTube博主。
- en: ~50% of the time, you will see that they barely post, or they stop posting altogether.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 大约50%的时间，你会发现他们几乎不发布，或者完全停止发布。
- en: The same goes for Twitter creators. Huge accounts often decrease to posting
    a few times a week.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 对于Twitter创作者来说，情况也是如此。大型账户通常减少到每周发布几次。
- en: This gives new creators the ability to flood the market, generate more attention,
    and create the network and resources without much competition from the “big players.”
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这为新创作者提供了在市场上泛滥的能力，产生更多的关注，并在没有太多来自“大玩家”的竞争的情况下创建网络和资源。
- en: The big players go on to pursue a new purpose, like starting a family or building
    a separate company with the leverage they now have.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 大玩家们继续追求新的目标，比如利用他们现在拥有的优势开始一个新的家庭或建立一家独立的公司。
- en: The Demand For Depth
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对深度的需求
- en: We’ve reached a critical point in the creator economy.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经达到了创作者经济的关键点。
- en: Content platforms have been saturated with basic, shallow, and regurgitated
    ideas for the sake of growth.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 内容平台为了增长，充斥着基本、浅薄和重复的思想。
- en: This isn’t necessarily bad, and still works to grow an account, but my question
    is… why?
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不一定不好，而且仍然有助于增长账户，但我的问题是…为什么？
- en: Why over-systemize ideas?
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么过度系统化想法？
- en: Why strip the soul from your business?
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么从你的业务中剥离灵魂？
- en: Why prioritize growth, revenue, and shallow impact over everything?
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么要把增长、收入和浅层影响置于一切之上？
- en: 'Why limit the only thing that can set you apart as an individual: your creative
    ability?'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么限制唯一能让你作为个体脱颖而出的事物：你的创造力？
- en: The general level of awareness in the space is rising.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 该领域的整体意识水平正在上升。
- en: The market will demand that creators rise above generic quotes and the same
    old step-by-step self-help advice.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 市场将要求创作者超越陈词滥调以及老套的逐步自我帮助建议。
- en: This can only be done when you prioritize depth, perspective, and holistic synthesis.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 这只能在优先考虑深度、视角和整体综合的情况下完成。
- en: The Holistic Synthesizer
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 整体合成者
- en: 'Let’s define what a “holistic synthesizer” is:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来定义一下“整体合成器”是什么：
- en: '*Someone who pursues their own vision, forges their path with the unique skills
    and interests they* *acquire**.* *They do not view those skills or interests as
    individual parts, but as an interconnected whole that are necessary aspects of
    their life (not temporary pieces for quick cash grabs)**.* *Their life’s work
    is to distill, educate, and distribute their personal experience on the path**.*'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '*那些追求自己愿景的人，用他们获得的独特技能和兴趣开辟自己的道路。他们不将这些技能或兴趣视为独立的部分，而是一个相互关联的整体，这是他们生活中必要的方面（而不是为了快速赚钱的临时部分）。*
    *他们的生活工作是在这条路上提炼、教育和传播他们的个人经验。*'
- en: In short, a holistic synthesizer who documents their pursuit to the good life
    in a persuasive and educational manner.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，一个以有说服力和教育性的方式记录他们追求美好生活的整体合成者。
- en: That way, you can attract the community that resonates with your voice, help
    them reach their shared goals, and not limit yourself to a compartmentalized aspect
    of reality.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，你可以吸引与你的声音产生共鸣的社区，帮助他们实现共同的目标，并且不要将自己限制在现实的一个分割的方面。
- en: '**Your brand is your story** – where you are now, regardless of experience.'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你的品牌是你的故事** – 无论经验如何，你现在的位置。'
- en: '**Your content is your school** – what helped you get there.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你的内容是你的学校** – 帮助你达到那里的东西。'
- en: '**Your product is the map** – a holistic system that helps people get to where
    you are with less trial and error.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你的产品是地图** – 一个帮助人们以更少的尝试和错误达到你所在位置的整体系统。'
- en: The internet has given you the power to self-educate much faster than any human
    has ever been able to.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网给了你比任何人类都快的自我教育能力。
- en: Take it upon yourself to improve your life, pursue your curiosity, and share
    your discoveries.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 主动改善你的生活，追求你的好奇心，分享你的发现。
- en: Is there anything better you could be doing?
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 有没有更好的事情可以做？
- en: 'Before you go off and start a billion-dollar tech company, consider starting
    with the only thing that matters:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 在你开始创办一个价值十亿美元的技术公司之前，考虑从唯一重要的事情开始：
- en: '*Improving the one thing that every human must improve to evolve: the quality
    of their human experience.*'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '*改善每个人必须改善以进化的人的经验质量*。'
- en: When more people master their personal lives, they can put the creative ability
    of their minds together to work on global problems.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 当更多的人掌握他们的个人生活时，他们可以集思广益，共同解决全球问题。
- en: By the point you do this, you will know what to do.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 到你这样做的时候，你就会知道该做什么。
- en: You will become a large creator that pursues new avenues and desaturates the
    market beneath them.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 你将成为一个追求新途径并使市场饱和度降低的大创作者。
- en: A New Way Of Life
  id: totrans-104
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一种新的生活方式
- en: <picture decoding="async" class="wp-image-1077">![](../Images/87bbf2a8371ecce10dbebc61707986cb.png)</picture>
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-1077">![](../Images/87bbf2a8371ecce10dbebc61707986cb.png)</picture>
- en: The creator philosophy is not a business model, but a way of life.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 创造者哲学不是商业模式，而是一种生活方式。
- en: Improve yourself > improve others that want to be helped.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 提升自己 > 提升那些想要被帮助的人。
- en: 'Here are the steps that you can start acting on today:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些你可以开始采取行动的步骤：
- en: 1) Master Your Survival
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 掌握你的生存
- en: You can’t sustain authenticity when you *need* something from someone else.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 当你需要从别人那里得到某些东西时，你无法维持真实性。
- en: Every single individual on this earth has to self-actualize in order to contribute
    to humanity in the best way they can.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 地球上的每一个人都必须自我实现，以便以最好的方式为人类做出贡献。
- en: '**Self-actualization:** *to fulfill the desire to become everything one can
    be. To actualize your potential.*'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '**自我实现**：*实现成为一切可能成为的人的欲望。实现你的潜能*。'
- en: While this can be done with the perfect career path, that’s not what I can help
    with. Nor is it something that you have full control over.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这可以通过完美的职业道路来实现，但这不是我能帮助你的。这也不是你完全控制的事情。
- en: Entrepreneurship is modern-day survival.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 创业是现代生存。
- en: We hunt for resources (money, in the modern sense) to fulfill our needs and
    *create* work that we enjoy. And if we don’t enjoy certain aspects, a business
    allows you to eliminate, delegate, or automate that aspect of work.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我们寻找资源（在现代意义上是金钱）来满足我们的需求，并*创造*我们喜欢的工作。如果我们不喜欢某些方面，企业允许你消除、委托或自动化工作的一部分。
- en: 'My recommendation is still the same:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 我的建议仍然是相同的：
- en: Solve the biological problems in your life
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解决你生活中的生物学问题
- en: Improve your health, finances, and socialization
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提升你的健康、财务和社交
- en: Discover your interests through improvement
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过提升来发现你的兴趣
- en: This takes time, but does not limit you from generating an independent income
    source.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 这需要时间，但不会限制你创造一个独立的收入来源。
- en: 95% of people’s problems revolve around health, wealth, relationships, and happiness.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 95%的人的问题围绕着健康、财富、关系和幸福。
- en: If you can solve those problems in your own life and document the solution,
    you can charge for the knowledge you acquire.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能在你的生活中解决这些问题并记录解决方案，你可以为所获得的知识收费。
- en: Individuals don’t learn best from someone 10 steps ahead of them, but from someone
    that is 1 step ahead of them.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 个人最好是从比他们先进一步的人那里学习，而不是从比他们先进十步的人那里学习。
- en: 2) Create Your Own Philosophy
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 创造你自己的哲学
- en: There is enough shallow advice on how to make money, how to get laid, and various
    bandaids you can apply to your mental health.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 关于如何赚钱、如何上床以及你可以应用于你心理健康的各种急救包，有足够的肤浅建议。
- en: We need more individuals that are truth seekers.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要更多追求真理的个人。
- en: The individuals that understand that prescribed step-by-step advice looks good
    on the outside, but is hollow on the inside.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 那些理解规定的逐步建议在外观上看起来不错，但内部是空洞的个人。
- en: We need more people that attack the root of the problem, which is often metaphysical,
    spiritual, or epistemological.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要更多的人去攻击问题的根源，这通常是形而上学、精神或认识论的。
- en: The world is desperate for depth, and that can only be created by forging your
    own path.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 世界急需深度，而这只能通过开辟自己的道路来实现。
- en: Philosophy is based on experience.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 哲学基于经验。
- en: You have to set your mind on an ideal future, pursue it wholeheartedly, make
    mistakes, and correct your actions.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须将你的心思放在一个理想未来上，全心全意地追求它，犯错误，并纠正你的行为。
- en: We aren’t here to get the same results that everyone else has gotten for decades.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不是来这里得到几十年来其他人已经得到的结果。
- en: As an example, my ideal future is to work 4 hours a day, do what I want in my
    free time, and help others realize a better way of living.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我理想的未来是每天工作4小时，在空闲时间做自己想做的事情，并帮助他人实现更好的生活方式。
- en: My philosophy is fueled by the teachers I resonate most with.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 我的哲学是由我最共鸣的教师激发的。
- en: I’ve burned through books on psychology, philosophy, modern work, and modern
    rest to refine my philosophy through experience.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 我通过阅读心理学、哲学、现代工作和现代休息方面的书籍，通过经验来完善我的哲学。
- en: 3) Turn It Into A Public School
  id: totrans-136
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 将其转变为公立学校
- en: I’m convinced that the future of schooling will be done online, with creators
    as teachers, and each student can join the “school” that aligns the most with
    their interests, values, and preferred method of learning.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 我坚信学校教育的未来将在线上完成，以创作者为教师，每个学生都可以加入与他们兴趣、价值观和首选学习方法最相符的“学校”。
- en: '*One school system wouldn’t dominate 12+ years of their life.*'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '*一个学校系统不会主导他们12年以上的生活。*'
- en: Students would evolve beyond one creator-based “school” after a few years, go
    on to the next, and eventually be able to start their own – if the other schools
    have the underlying principle of critical thinking and personal experience.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 几年后，学生将超越基于一个创造者的“学校”，继续前进，最终能够开始自己的学校——如果其他学校有批判性思维和个人经验的根本原则。
- en: Make it your life’s work to create a library of knowledge and share it online
    under your brand, or school, with an underlying philosophy that attracts the right
    people.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 让创建知识库并在线下品牌或学校分享成为你一生的使命，或者学校，其背后的哲学能吸引到正确的人。
- en: Your public school is digital real estate.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 你的公立学校是数字地产。
- en: Twitter, Instagram, and LinkedIn to attract a broad audience.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 通过Twitter、Instagram和LinkedIn吸引广泛的受众。
- en: YouTube, podcasting, and a blog or newsletter to educate and nurture the audience.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 通过YouTube、播客和博客或通讯来教育和培养受众。
- en: And a host of products, from low-cost courses to memberships to high-cost tailored
    coaching.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 以及一系列产品，从低成本课程到会员资格到高成本定制辅导。
- en: This is what I’ve dedicated myself to teaching because I see the opportunity
    in the space.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我致力于教学的原因，因为我看到了这个领域的机遇。
- en: So, I offer [2 Hour Writer](https://2hourwriter.com) to help people get their
    ideas out without prior experience.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我提供[2小时作家](https://2hourwriter.com)来帮助人们在没有先前经验的情况下表达自己的想法。
- en: Then, I offer a more expensive masterclass, [Digital Economics](https://digitaleconomics.school),
    to productize yourself for those that are serious about making this work.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我提供更昂贵的大师班，[数字经济学](https://digitaleconomics.school)，为那些认真想要让这件事成功的人产品化自己。
- en: Eventually, you will gain the resources to start whatever kind of business you
    want to further your message.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，你将获得资源来开始你想要进一步传播信息的任何类型的业务。
- en: 4) Create A Holistic Solution
  id: totrans-149
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 创建一个全面解决方案
- en: I’ve worked with 5000+ creators and one of the main problems is not knowing
    what to sell, or not knowing how to make what they sell unique.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 我与5000多名创作者合作，其中一个主要问题是不知道要卖什么，或者不知道如何使他们的产品与众不同。
- en: I will flesh out my Minimum Viable Offer strategy in the next letter.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 我将在下一封信中详细阐述我的最小可行产品策略。
- en: That will help you get started from 0.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 这将帮助你从零开始。
- en: I especially like creating a “tutoring” offer that nobody does in the space
    yet. I’ll show you how to create one.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 我特别喜欢创建一个“辅导”服务，这个领域还没有人做。我会教你如何创建一个。
- en: 'Until then, here’s what you do:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 在那时，你可以这样做：
- en: '**1) Identify A Desirable Goal**'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 确定一个理想的目标**'
- en: What is one big goal in your life that you are trying to achieve, or have achieved?
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 你生命中的一个大目标是什么，你正在努力实现，或者已经实现了？
- en: Are you fit? Have you acquired a skill (like writing)? Have you understood the
    nature of reality? What is it? What have you accomplished, no matter how small
    or insignificant you think it is?
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否适合？你是否掌握了一项技能（如写作）？你是否理解了现实的本质？它是什么？无论你认为它多么小或微不足道，你都取得了什么成就？
- en: 'The key with this:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 关键在于：
- en: Don’t focus on the goal itself, but on the lifestyle it has created for you.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 不要专注于目标本身，而要专注于它为你创造的生活方式。
- en: '**2) Identify Your Starting Point**'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 确定你的起点**'
- en: What made you want to change?
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 什么让你想要改变？
- en: What was the burning problem in your life?
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 你生命中的燃点问题是什么？
- en: What did your life look like before the goal?
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 在目标之前，你的生活是什么样的？
- en: Marketing is about transformations.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 市场营销关乎转变。
- en: You are helping others go from point A (where you were) to point B (the desirable
    goal).
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在帮助他人从A点（你所在的地方）过渡到B点（理想的目标）。
- en: '**3) Outline A Unique Path**'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 制定一个独特的路径**'
- en: Now, outline modules, chapters, or steps necessary to get from point A to point
    B.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，概述从A点到B点所需的模块、章节或步骤。
- en: You are at a point in life where you can look back and help others navigate
    the mistakes you made.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在处于一个可以回顾过去并帮助他人避免你所犯错误的生活阶段。
- en: Act like you are outlining a book.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 就像你正在概述一本书。
- en: Fill in the blanks for what people need to know, learn, and do in order to reach
    the goal.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 填写空白，说明人们需要知道、学习和做什么才能达到目标。
- en: Start thinking about this now, we will come back to it in the next letter.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 现在就开始思考这个问题，我们将在下一封信中回到它。
- en: 5) Branch Into New Opportunity
  id: totrans-172
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5) 拓展新的机遇
- en: As you start, grow, and evolve as a creator, you will reach stages of development
    that will present new opportunities.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 当你作为一个创作者开始、成长和进化时，你会达到一些发展阶段，这些阶段将带来新的机遇。
- en: Maybe you’ll start podcasting full-time.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 可能你会全职开始播客。
- en: Maybe you’ll write a book (I am right now).
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 可能你会写一本书（我现在就是这样）。
- en: Maybe you’ll build a software (I am right now).
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 可能你会开发软件（我现在就是这样）。
- en: The most difficult part is gaining a foothold in the market during your first
    year or so.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 最困难的部分是在你第一年左右在市场上站稳脚跟。
- en: After that, your ideas and name have reached so many people that you cannot
    lose.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
