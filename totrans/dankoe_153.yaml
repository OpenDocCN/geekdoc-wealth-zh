- en: 'The $1 Million Product: How To Package & Market Your Knowledge'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-1-million-product-how-to-package-market-your-knowledge/](https://thedankoe.com/letters/the-1-million-product-how-to-package-market-your-knowledge/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You have $100,000 trapped in your head.
  prefs: []
  type: TYPE_NORMAL
- en: Or, it’s lying around in your Google Drive, Notion, or Kortex.
  prefs: []
  type: TYPE_NORMAL
- en: 'The point is:'
  prefs: []
  type: TYPE_NORMAL
- en: You have skills, interests, and some kind of expertise you can package up into
    a product that sells while you sleep.
  prefs: []
  type: TYPE_NORMAL
- en: What you learn in this letter will determine most of your success as a creative.
  prefs: []
  type: TYPE_NORMAL
- en: But this letter isn’t just about building a product.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are a lot of things that come into the mix like:'
  prefs: []
  type: TYPE_NORMAL
- en: How to find a hyper-profitable idea
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to create a marketing strategy and iterate with failure
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to position a boring product as something people can’t ignore
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The 5 elements of an irresistible offer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to write a landing page even when you never have before
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to actually build the product and how to accept payment
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And last, how to launch the product so it doesn’t sit around collecting dust
    (and you don’t waste your time)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Here’s the thing…
  prefs: []
  type: TYPE_NORMAL
- en: If you want to earn an independent income *and* have control over your time,
    you need a product.
  prefs: []
  type: TYPE_NORMAL
- en: This should be obvious.
  prefs: []
  type: TYPE_NORMAL
- en: However, most people are like me. You start with client work. You start to see
    some success. Your time gets eaten up. And worst of all, you realize how much
    you hate working on other people’s projects.
  prefs: []
  type: TYPE_NORMAL
- en: You left your job because you hated the work, right?
  prefs: []
  type: TYPE_NORMAL
- en: You wanted to write.
  prefs: []
  type: TYPE_NORMAL
- en: You wanted to explore your interests.
  prefs: []
  type: TYPE_NORMAL
- en: You wanted to focus on your craft but now you’re back in survival mode working
    from invoice to invoice instead of paycheck to paycheck.
  prefs: []
  type: TYPE_NORMAL
- en: But once you have a product that doesn’t require your time or labor to earn
    a substantial income, $100,000 is just a matter of persistence and iteration.
  prefs: []
  type: TYPE_NORMAL
- en: It’s liberating once you realize that if you can make $1, you can make $1,000,000,
    if you have a *product* that is capable of reaching that scale as one-person.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to build a team to fulfill $1,000,000 worth of client work and beyond,
    be my guest, but even then, why not build a product that adds revenue to your
    bottom line *and* leads to more warm prospects for your client work?
  prefs: []
  type: TYPE_NORMAL
- en: Before we start, understand that this isn’t some get rich quick mumbo jumbo.
  prefs: []
  type: TYPE_NORMAL
- en: My first year of building a product, I made around $10,000.
  prefs: []
  type: TYPE_NORMAL
- en: Second year was $100,000.
  prefs: []
  type: TYPE_NORMAL
- en: Then $150K. Then $800K. Then $4M.
  prefs: []
  type: TYPE_NORMAL
- en: Then I felt comfortable enough to fund Kortex and had the audience to do so.
  prefs: []
  type: TYPE_NORMAL
- en: If you stick with this for years (and refuse to go back to the life you wanted
    to leave) you will see success.
  prefs: []
  type: TYPE_NORMAL
- en: This will be long as it is a product and marketing masterclass.
  prefs: []
  type: TYPE_NORMAL
- en: Both are crucial skills that can’t be skipped.
  prefs: []
  type: TYPE_NORMAL
- en: How To Find A $1 Million Idea — What Product To Build
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2479">![](../Images/a054faf8c1b88db4a53820c412fcbba2.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a mindf*ck for you:'
  prefs: []
  type: TYPE_NORMAL
- en: You’ve already purchased a $1 million product.
  prefs: []
  type: TYPE_NORMAL
- en: You’ve purchased hundreds in fact, if not more.
  prefs: []
  type: TYPE_NORMAL
- en: Do you now what that means?
  prefs: []
  type: TYPE_NORMAL
- en: It means you’re probably overthinking it.
  prefs: []
  type: TYPE_NORMAL
- en: It means that most ideas can be taken to $1 million if you understand exactly
    what I am going to say throughout this letter.
  prefs: []
  type: TYPE_NORMAL
- en: Now, I’m assuming this is your first product and you are a beginner.
  prefs: []
  type: TYPE_NORMAL
- en: 'The best progression to follow going into a future of AI would be this:'
  prefs: []
  type: TYPE_NORMAL
- en: Build an audience as a free and high leverage traffic source
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Become an authority in your interests or expertise
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Start with a “personal system” digital product that you can test fast
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Persist and iterate until you reach $100,000+
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, since you have so much data and results, turn that system into something
    like a software or physical product
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The big question there is, “*What is a ‘personal system’ product?*“
  prefs: []
  type: TYPE_NORMAL
- en: Well, it’s how you turn any idea into something unique. Something that can’t
    be replicated or replaced by AI, because it can use AI in the process.
  prefs: []
  type: TYPE_NORMAL
- en: This can be done in the form of a freelance service, coaching service, education
    product, or software.
  prefs: []
  type: TYPE_NORMAL
- en: 'As an example, my 2 Hour Writer course doesn’t teach writing. It teaches my
    personal system for what I write, how I write, and why I write. It *positions*
    writing—something that is either too boring or too academic—in a way that is desirable
    and valuable to people who are *like my past self* (See: [You are the niche](https://thedankoe.com/letters/how-to-create-your-niche-of-one-become-nicheless/)).'
  prefs: []
  type: TYPE_NORMAL
- en: I write a newsletter, break that down into social posts, cross post those everywhere,
    and am able to build an audience on all platforms with less than 2 hours of writing
    a day.
  prefs: []
  type: TYPE_NORMAL
- en: I could easily turn this into a freelance service for personal brands to handle
    their content creation. I could also teach people how to implement this 1-1 as
    a coaching service for founders and executives, not just creators, because building
    an audience is such an important thing.
  prefs: []
  type: TYPE_NORMAL
- en: But since we want to avoid client work and control our time, the two options
    we are left with are an *education product and software product.*
  prefs: []
  type: TYPE_NORMAL
- en: Building software is now more accessible to the average person thanks to tools
    like Cursor and Lovable. It still takes time to learn, and you will still need
    to learn quite a bit of programming if you want to be decent, but building a web
    app or mobile app is more than possible, I’m seeing it happen every day on X.
  prefs: []
  type: TYPE_NORMAL
- en: The thing is, you still need to understand marketing and offer creation. Building
    the next todo app isn’t going to get you very far without a *personal system*
    that positions it as unique.
  prefs: []
  type: TYPE_NORMAL
- en: In my eyes, and for the next few years, education products are still the best
    starting point. And just like Cursor with programming, you can use [Kortex](https://kortex.co)
    to help with writing when the AI features release in the coming weeks.
  prefs: []
  type: TYPE_NORMAL
- en: 'An education product takes the form of:'
  prefs: []
  type: TYPE_NORMAL
- en: Courses
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Communities
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cohorts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All based around a personal system with accompanying templates that can also
    be given with Kortex.
  prefs: []
  type: TYPE_NORMAL
- en: You know, the types of products that line Alex Hormozi’s portfolio.
  prefs: []
  type: TYPE_NORMAL
- en: The “info products” that people love to pin in a bad light as if education isn’t
    the most important aspect of your development or what will prepare you for a future
    that schools won’t be able to keep up with.
  prefs: []
  type: TYPE_NORMAL
- en: A *good* education product can change someone’s life 10x more than a physical
    product or software could any day.
  prefs: []
  type: TYPE_NORMAL
- en: Creators are decentralized teachers. They *are* the new school system on the
    internet. Creators—not content creators, just people who create their life—are
    those who forge new paths and pass down the esoteric information that allow you
    to take advantage of new opportunities.
  prefs: []
  type: TYPE_NORMAL
- en: As long as people buy books, they will buy courses. Conditioning your mind to
    only see half the picture of education products is as stupid as you think courses
    are. You don’t whine about there being ~129,864,880 books in the world (most of
    them bad, because anyone can type on a keyboard…), so if you can’t come to terms
    with info products, you’re in for a bad time.
  prefs: []
  type: TYPE_NORMAL
- en: “But Dan! People are just teaching what they do themselves!”
  prefs: []
  type: TYPE_NORMAL
- en: No shit. That’s what the market wants and that’s really the only thing *anyone*
    is actually qualified to teach.
  prefs: []
  type: TYPE_NORMAL
- en: I can handle objections about this all day, but I’ll let you think through it
    without some regurgitated beliefs that were conditioned into your head by some
    anti-guru (they educated you that education is bad, by the way, and you didn’t
    even pay for it!)
  prefs: []
  type: TYPE_NORMAL
- en: Education products are hyper-profitable and hyper-valuable. The perfect combination.
    You build them once and sell them as many times as you’d like.
  prefs: []
  type: TYPE_NORMAL
- en: So, that’s what the rest of this letter is focused on.
  prefs: []
  type: TYPE_NORMAL
- en: Turning What You Do Into A Product Idea
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The best education products are the ones that:'
  prefs: []
  type: TYPE_NORMAL
- en: Solve a specific pain point
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Give people a system to get results
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide clarity on everything involved with performing the system
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: First, we need to decide the topic of the product you want to create. Then we’ll
    get to the fun stuff of how to market the product.
  prefs: []
  type: TYPE_NORMAL
- en: Think of an area that you have at least some experience in.
  prefs: []
  type: TYPE_NORMAL
- en: Something that you’ve taken the time to study or implement in your life.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t *need* the personal system part yet. Just the topic.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s a list that may spark some ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Writing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Video editing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Speaking
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Social dynamics
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Relationships & dating
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Productivity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Web design or development
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Artificial intelligence
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mental health
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Weight lifting
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Running
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Nutrition
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learning faster
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Knowledge management
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Managing finances
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Landing job interviews
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Simply think of ONE thing that you are above average at and write it down.
  prefs: []
  type: TYPE_NORMAL
- en: Second, we need to research products *and* ideas within that topic.
  prefs: []
  type: TYPE_NORMAL
- en: Our goal is to find the intersection of *what works* and *what you can do better.*
  prefs: []
  type: TYPE_NORMAL
- en: Write down at least 10-20 products or ideas.
  prefs: []
  type: TYPE_NORMAL
- en: How do you find them?
  prefs: []
  type: TYPE_NORMAL
- en: Search your topic on course sites like Masterclass, Udemy, or Skillshare
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Search reddit for course reviews like, “Best training programs” in the health
    topic
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dig through accounts you follow, join their email lists, and identify what products
    they sell on their site and in their funnel
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Remember products you’ve bought in the past and resurface them
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Find X accounts within that topic, use Twemex to see their top performing tweets,
    search for keywords related to your topic, and save posts that you can use as
    ideas for the product or marketing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Find YouTube accounts within that topic, filter their videos by most popular,
    and write down popular video titles that could turn into a product
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s imagine you want to build a business around social dynamics as an interest.
  prefs: []
  type: TYPE_NORMAL
- en: You could go to the Charisma On Command YouTube channel, study their video titles,
    and pick a few that clearly did better than the rest.
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-2473">![](../Images/d3d5e88d3e59328e6827aa4500eb2db3.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: If you look at their top videos, you can instantly tell that being interesting,
    confident, and not insecure is something people *really want.*
  prefs: []
  type: TYPE_NORMAL
- en: You could create a product around that, recreate quite a few of these video
    topics with your own twist, and be rather confident that the product will do well.
  prefs: []
  type: TYPE_NORMAL
- en: As you research, save all of these ideas somewhere safe.
  prefs: []
  type: TYPE_NORMAL
- en: You now have a list of successful product and marketing ideas that you can combine,
    add to, simplify, or make unique. We’ll do that next.
  prefs: []
  type: TYPE_NORMAL
- en: For the courses you find, buy them.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t cheap out on me now.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t know how to structure a product, then you need to use a few as
    a reference point for inspiration.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need to know exactly what you want to create just yet.
  prefs: []
  type: TYPE_NORMAL
- en: How To Market & Build The Product
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-2481">![](../Images/a8910c9a3d2c3847395486653c074274.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Most people waste 2-3 months building a product just for it to never be launched
    or worse, never make any sales.
  prefs: []
  type: TYPE_NORMAL
- en: We’re going to do the complete opposite.
  prefs: []
  type: TYPE_NORMAL
- en: You’re going to make money *before* you even start building the product.
  prefs: []
  type: TYPE_NORMAL
- en: That way, if you don’t make money, you can pivot fast and try again.
  prefs: []
  type: TYPE_NORMAL
- en: Once you strike gold, you give it everything you have, build it over the course
    of 2-3 weeks, and launch a successful product.
  prefs: []
  type: TYPE_NORMAL
- en: This is yet another reason why education products are superior.
  prefs: []
  type: TYPE_NORMAL
- en: You can test and iterate fast.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You can turn them into software or another product.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: They are genuinely helpful to those who purchase them, if they’re good.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In other words, most products should *start* as an education product, and most
    founders could create a new revenue channel simply by adding some form of education,
    even if it’s just an ebook.
  prefs: []
  type: TYPE_NORMAL
- en: Choosing Your Target Persona
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: People get stuck on this part way too much.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s make it simple.
  prefs: []
  type: TYPE_NORMAL
- en: You need a target persona—who you are positioning the product toward—so that
    your marketing is specific and tangible. That’s it.
  prefs: []
  type: TYPE_NORMAL
- en: The thing is, there is a *much larger* market of people who will *also* resonate
    with your marketing. Especially if you are marketing with social media. You don’t
    want to be *too* specific or else your content won’t get spread to more people.
  prefs: []
  type: TYPE_NORMAL
- en: 'Personally, I think you should choose from two options:'
  prefs: []
  type: TYPE_NORMAL
- en: Target yourself or your past self.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Target people who have a lot of money (founders, executives, those with high
    paying jobs).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The problem with targeting people who have a lot of money is that you often
    don’t understand them. You can’t relate with them. That will seep into your marketing.
    However, it’s a great option for those who have either worked with these people
    before or are following a lot of them on social media.
  prefs: []
  type: TYPE_NORMAL
- en: That’s all you need for now.
  prefs: []
  type: TYPE_NORMAL
- en: A vague idea of who you want to target.
  prefs: []
  type: TYPE_NORMAL
- en: Creating An Offer They Can’t Resist In 5 Steps
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You don’t start with the product.
  prefs: []
  type: TYPE_NORMAL
- en: You start with the marketing.
  prefs: []
  type: TYPE_NORMAL
- en: Because if you get the marketing right, you can build the product *around what
    works.*
  prefs: []
  type: TYPE_NORMAL
- en: It’s a lot easier to build a product based on good marketing than it is to create
    marketing based on a bad product.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, take your topic, all of the ideas you’ve gathered, and write these down:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Big Problem**'
  prefs: []
  type: TYPE_NORMAL
- en: This is the most important thing that needs to be nailed down.
  prefs: []
  type: TYPE_NORMAL
- en: What is the *big burning problem* related to the topic?
  prefs: []
  type: TYPE_NORMAL
- en: Where are people at right now, and if they don’t change, where will that lead?
  prefs: []
  type: TYPE_NORMAL
- en: How does that one problem splinter into 100 more?
  prefs: []
  type: TYPE_NORMAL
- en: The problem is the starting point of their transformation.
  prefs: []
  type: TYPE_NORMAL
- en: The problem should be
  prefs: []
  type: TYPE_NORMAL
- en: '**Relatable** – they have to be able to *feel* and experience the problem.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Relevant** – the problem has to be important and worth solving.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Research backed** – you have to make sure that you aren’t just making the
    problem up.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Most burning problems fall within the health, wealth, and relationships categories.
  prefs: []
  type: TYPE_NORMAL
- en: 'So if you’re topic is **weight lifting**, the problem could be a few things:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Health example** – without resistance training, you’re more likely to develop
    chronic disease and have difficulty moving around as you age.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Wealth example** – if you don’t look good, people won’t respect you because
    your body reflects your discipline and commitment. You’re less likely to get opportunities,
    promotions, and trust from high value people.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Relationships example** – you lack the confidence to go up and talk to a
    stranger, or you feel insecure when you take your shirt off around your spouse
    leading to a poor sex life which creates little problems in other areas of the
    relationship.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Surprisingly, the most burning problem here isn’t related to health. It’s related
    to being perceived as high value for better opportunities and relationships.
  prefs: []
  type: TYPE_NORMAL
- en: If we wanted to amplify that problem further (you should), you would talk about
    how a lack of social opportunities leads to a feeling of loneliness. That effects
    your mental health that makes it harder to act with discipline in any other area
    of your life. You get stuck in a specific job and environment and have no idea
    why you can’t get out.
  prefs: []
  type: TYPE_NORMAL
- en: As a tip, none of this will be perfect after the first round of brainstorming.
  prefs: []
  type: TYPE_NORMAL
- en: This marketing strategy is something you refine as you read more books, content,
    listen to audiobooks, and talk with people with this problem.
  prefs: []
  type: TYPE_NORMAL
- en: Testing these ideas as social media posts also helps. The more engagement you
    get, the more likely it is that it’s a good idea to include in your marketing.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Desired Outcome**'
  prefs: []
  type: TYPE_NORMAL
- en: If the big problem is where people start, the desired outcome is the other end
    of the transformation.
  prefs: []
  type: TYPE_NORMAL
- en: Meaning, if you don’t nail down the problem (it will take some time for the
    right idea to strike) most of your marketing falls apart. Another reason why you
    should build an audience so you can test these ideas for free in your content.
    Use [2 Hour Writer](https://2hourwriter.com) for that.
  prefs: []
  type: TYPE_NORMAL
- en: If our problem, in general, is a lack of confidence and others not perceiving
    you as valuable, the general desired outcome is having a body that commands respect.
  prefs: []
  type: TYPE_NORMAL
- en: Now, we need to again make that more relatable, relevant, and research backed.
  prefs: []
  type: TYPE_NORMAL
- en: What do people actually want? **Why do they want it?**
  prefs: []
  type: TYPE_NORMAL
- en: For men, they want visible abs, a decent jawline, broad shoulders, and to feel
    confident in their own skin when it’s time to talk with other people or get naked.
  prefs: []
  type: TYPE_NORMAL
- en: For women, I can’t really speak to this, but I’d assume they want an hourglass
    figure, a nice butt, visible abs, and to *feel* “hot” and sexy. They want their
    man to fawn over them.
  prefs: []
  type: TYPE_NORMAL
- en: You can pair this with a big benefit to answer the “why?” question.
  prefs: []
  type: TYPE_NORMAL
- en: Why do men want visible abs?
  prefs: []
  type: TYPE_NORMAL
- en: Why do women want a big butt?
  prefs: []
  type: TYPE_NORMAL
- en: Remember, a lot of the specificity here stems from your target persona.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Believable Timeframe**'
  prefs: []
  type: TYPE_NORMAL
- en: Timeframes supercharge your marketing.
  prefs: []
  type: TYPE_NORMAL
- en: 30 days.
  prefs: []
  type: TYPE_NORMAL
- en: 3-6 months.
  prefs: []
  type: TYPE_NORMAL
- en: 6 weeks.
  prefs: []
  type: TYPE_NORMAL
- en: 2 hours.
  prefs: []
  type: TYPE_NORMAL
- en: They help make your product tangible. They are a reference point that spark
    desire in the reader.
  prefs: []
  type: TYPE_NORMAL
- en: Timeframes also help compress what you put into the product. A lot of people
    just throw everything they know into one product rather than only putting in what
    is valuable to solving the problem and reaching the desired outcome.
  prefs: []
  type: TYPE_NORMAL
- en: You may have to come back to this after creating your personal system.
  prefs: []
  type: TYPE_NORMAL
- en: '**4) Personal System**'
  prefs: []
  type: TYPE_NORMAL
- en: Your personal system for overcoming the pain point and reaching the outcome
    is what makes your product unique.
  prefs: []
  type: TYPE_NORMAL
- en: You could copy a product’s marketing that works, exchange their system with
    yours, and it would probably sell incredibly well. This is what most products
    do because that’s what most people want. People want *your way of doing something.*
  prefs: []
  type: TYPE_NORMAL
- en: How do you create a personal system?
  prefs: []
  type: TYPE_NORMAL
- en: You experiment. On yourself or someone else who is willing to help you and fits
    your target persona. (This also gives you results that you can show for social
    proof if you are a beginner.)
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what you do:'
  prefs: []
  type: TYPE_NORMAL
- en: Open something like Kortex to write this down
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Remember the **problem** and **outcome**
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Write out a list of steps they need to take over the course of the **timeframe**
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: These steps should involve *everything* related to reaching the outcome (with
    something like weight training, nutrition usually has to be touched on as well)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Test it on yourself or your target persona for that timeframe
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Write down places that can be improved
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Rewrite the list of steps and test it again
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Repeat until it can get results for more people
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Then, slap a name on your system.
  prefs: []
  type: TYPE_NORMAL
- en: For something like weight training or health, you see this all the time.
  prefs: []
  type: TYPE_NORMAL
- en: Intermittent fasting is a personal system that went on to be a term recognized
    by a huge portion of the world.
  prefs: []
  type: TYPE_NORMAL
- en: Stronglifts 5×5 is a personal system that is now the “go to” for most beginners
    in the gym.
  prefs: []
  type: TYPE_NORMAL
- en: If you can bake in other aspects of your marketing to this, like the “2 Hour”
    in 2 Hour Writer, it becomes a lot more powerful.
  prefs: []
  type: TYPE_NORMAL
- en: Your personal system is what makes people think “this could finally solve my
    problem!”
  prefs: []
  type: TYPE_NORMAL
- en: '**4.5) Education**'
  prefs: []
  type: TYPE_NORMAL
- en: If you are creating an education product, you need to create a curriculum or
    outline for what people need to know.
  prefs: []
  type: TYPE_NORMAL
- en: You can give them the system, but that’s not going to help very much if they
    don’t understand everything involved with it.
  prefs: []
  type: TYPE_NORMAL
- en: Along with your personal system, outline the fundamentals, steps, and skills
    that people need to know in order to best use the system.
  prefs: []
  type: TYPE_NORMAL
- en: '**5) Features & Benefits**'
  prefs: []
  type: TYPE_NORMAL
- en: Most people *only* list out the features of their product.
  prefs: []
  type: TYPE_NORMAL
- en: But that’s not persuasive.
  prefs: []
  type: TYPE_NORMAL
- en: People don’t care about the product, they care about how the product changes
    their life. This is marketing 101 but even the most advanced marketers get tripped
    up here. (We all forget and don’t remind ourselves of the fundamentals).
  prefs: []
  type: TYPE_NORMAL
- en: 'When you list out features like:'
  prefs: []
  type: TYPE_NORMAL
- en: 5 week training program
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cookbook with 20 recipes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learn the top 5 exercises for chest growth
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Pair them with a compelling benefit, or completely exchange the boring feature
    *for* the benefit:'
  prefs: []
  type: TYPE_NORMAL
- en: 5 week program so you know exactly what to do when you step in the gym (no more
    feeling lost!)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cookbook with 20 filling and low calorie foods so you can feel stuffed without
    the guilt.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The top 5 exercises for chest growth so you don’t waste years without developing
    shirt splitting pecs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: From here, take all of the features from your personal system and education.
  prefs: []
  type: TYPE_NORMAL
- en: List them out.
  prefs: []
  type: TYPE_NORMAL
- en: Add benefits to them.
  prefs: []
  type: TYPE_NORMAL
- en: All of this is necessary as it will become the building blocks of a high-converting
    landing page.
  prefs: []
  type: TYPE_NORMAL
- en: '**6) Delivery Mechanism**'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s recap everything we’ve learned with a new example.
  prefs: []
  type: TYPE_NORMAL
- en: '**Topic** – productivity'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Target persona** – my past self. An 18 year old who wants to balance study
    and building a business'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Big problem + negative outcome** – I don’t want a traditional 9-5 job, but
    I’m falling behind in classes and my business has taken a backseat. If I can’t
    study for long periods and work on my business for long periods, I’ll get stuck
    in a comfortable job and it will be extremely difficult to get out. 40 years later
    I would wish that I took the time to study.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Desired outcome** – deep focus for 12+ hours a day without adderall'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Believable timeframe** – 14 days'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Personal system** – “The Attention Marathon” a training program for your
    mind to run a marathon'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Education** – everything about the flow state, dopamine, workspace setup,
    avoiding distractions, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I know this is a validated idea because I researched YouTube beforehand. People
    *want* to focus for extreme amounts of time.
  prefs: []
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-2474">![](../Images/b487e4bec53a280048461478ab691959.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have a soft marketing plan and offer outline, we need to decide
    on *how* we are going to *deliver* the actual offer.
  prefs: []
  type: TYPE_NORMAL
- en: 'You have a few options here:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Ebooks** – quick to make but hard to charge a lot for.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Email course** – structured learning but most people fall off.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cohort** – a 4-8 week curriculum with calls and a community. Only opens for
    enrollment 4 times a year. Good for scarcity and perceived value, but expensive.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Normal course** – an evergreen product that can be promoted at all times,
    but you need a lot of traffic.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Community** – monthly recurring revenue = monthly recurring work. Harder
    to sell but a huge pay off if you commit to it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Software** – takes longer to build, higher chances at failure, but can pay
    off big time if you dedicate 5-10 years to it (or land the viral jackpot fast).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To make any of these more valuable, you can add a template, tracker, or worksheets
    to it. That alone would make the education product worth paying for over just
    watching the free video above.
  prefs: []
  type: TYPE_NORMAL
- en: I can’t really tell you which one to choose… but I can tell you that you will
    probably create more than one.
  prefs: []
  type: TYPE_NORMAL
- en: 'A good beginner progression could be this:'
  prefs: []
  type: TYPE_NORMAL
- en: Start with a $27 ebook on a specific topic like “focusing 12 hours a day for
    a year”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Turn that into a module of a larger $150 course with a “Focus Hub” template
    to plan their study and work blocks
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Expand that into an even more comprehensive $399 cohort on “Living In Flow”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can promote the ebook anywhere. You can promote the course on backend emails
    or YouTube videos. You can promote the cohort once every quarter everywhere.
  prefs: []
  type: TYPE_NORMAL
- en: The entire job of your delivery mechanism—ebook, course, cohort, etc—is to fulfill
    on your marketing and offer.
  prefs: []
  type: TYPE_NORMAL
- en: After you’ve outlined everything that will go in your first offer, it’s time
    to make your first $1.
  prefs: []
  type: TYPE_NORMAL
- en: Landing Page, Launch, Build — In That Order
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I want to reiterate that this is the best route for beginners.
  prefs: []
  type: TYPE_NORMAL
- en: You can’t do what we’re going to talk about with almost any other type of product.
  prefs: []
  type: TYPE_NORMAL
- en: In the past, digital products weren’t really a thing.
  prefs: []
  type: TYPE_NORMAL
- en: You would spend a ton of time building a product that *may or may not* work.
  prefs: []
  type: TYPE_NORMAL
- en: You pour money into product development, set up manufacturing and distribution,
    then launch.
  prefs: []
  type: TYPE_NORMAL
- en: There’s a statistic circulating the space of something like 95% of businesses
    fail within their first year.
  prefs: []
  type: TYPE_NORMAL
- en: The thing about building an audience and digital product is that you can *pivot.*
  prefs: []
  type: TYPE_NORMAL
- en: You can test ideas daily in your content.
  prefs: []
  type: TYPE_NORMAL
- en: You can turn those ideas into a marketing strategy.
  prefs: []
  type: TYPE_NORMAL
- en: You can build a landing page, add payment, and launch preorders.
  prefs: []
  type: TYPE_NORMAL
- en: If it doesn’t work, you can scrap it and try again an infinite amount of times
    until it works.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, it is impossible to fail if you *persist and iterate.*
  prefs: []
  type: TYPE_NORMAL
- en: And when it comes time to turn that into a startup or more demanding physical
    product, you already have so much data that the likelihood of success is much
    higher.
  prefs: []
  type: TYPE_NORMAL
- en: 'Okay, we have our marketing strategy, here’s what you do next:'
  prefs: []
  type: TYPE_NORMAL
- en: Create The Landing Page First
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To repeat myself:'
  prefs: []
  type: TYPE_NORMAL
- en: You are going to create the landing page *first* on a [platform like Stan.](https://join.stan.store/thedankoe)
  prefs: []
  type: TYPE_NORMAL
- en: Then, you’re going to *launch* the product. Be sure to tell people that the
    product releases on a certain date. Inside Stan, you can add a module to the product
    that gives everyone details as to when it will go live.
  prefs: []
  type: TYPE_NORMAL
- en: Once you make the first sale, the pressure is on. You have no option to quit
    now. You have to focus and build a *good* product by the release date you put
    in public. This is a public accountability mechanism so you can’t chicken out.
  prefs: []
  type: TYPE_NORMAL
- en: Now, copywriting is easy once you have the pieces of the offer down.
  prefs: []
  type: TYPE_NORMAL
- en: The entire point of copywriting is to illustrate the offer in a clear and persuasive
    way.
  prefs: []
  type: TYPE_NORMAL
- en: We have the persuasive part down, now we need the structure.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are many ways to do this, and I recommend you research them, but here’s
    how I structure my pages:'
  prefs: []
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-2475">![](../Images/f54fb4a17ae364fce0e874de628d665d.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: The best way to build and host these products, again, is on a [platform like
    Stan.](https://join.stan.store/thedankoe)
  prefs: []
  type: TYPE_NORMAL
- en: The landing pages are simple to make (they’re just writing) and you can host
    any kind of digital product. Plus, all of your links are products live on a LinkTree
    style page which is perfect for promoting in your bio, posts, and newsletters.
  prefs: []
  type: TYPE_NORMAL
- en: '**Headline**'
  prefs: []
  type: TYPE_NORMAL
- en: Your headline and sub headline should be a *condensation* of all the value inside
    of your offer.
  prefs: []
  type: TYPE_NORMAL
- en: Your job is to combine the *most potent parts of* the big problem, desired outcome,
    personal system, timeframe, and potentially the target persona in this section.
  prefs: []
  type: TYPE_NORMAL
- en: 'For my productivity product, the headline could be:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Study For 12 Hours A Day Without Adderall (With A 14 Day Program)*'
  prefs: []
  type: TYPE_NORMAL
- en: If you want templates for this, check out [Mental Monetization.](https://mentalmonetization.com)
  prefs: []
  type: TYPE_NORMAL
- en: '**Subheadline**'
  prefs: []
  type: TYPE_NORMAL
- en: In the subheadline, you add the other parts.
  prefs: []
  type: TYPE_NORMAL
- en: 'Since I only included the desired outcome and timeframe in the headline, because
    it was the most potent, I could make my subheadline:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Use “The Attention Marathon” system to avoid a low-paying 9-5 and conquer
    cheap dopamine.*'
  prefs: []
  type: TYPE_NORMAL
- en: There I pull in the personal system, big problem, and even toss in a high performing
    topic like cheap dopamine.
  prefs: []
  type: TYPE_NORMAL
- en: '**Problem + Amplify**'
  prefs: []
  type: TYPE_NORMAL
- en: In the next section most people call the *lead,* your job is to illustrate the
    big problem and negative outcome.
  prefs: []
  type: TYPE_NORMAL
- en: When you start with the problem, you increase the reader’s awareness around
    the problem. You give them the belief that their life can change (because it can)
    by using a system that helped you.
  prefs: []
  type: TYPE_NORMAL
- en: Personally, I like to include a a few short sentences that state the problem,
    then follow that with a bullet point list of pain points that stem from that problem.
  prefs: []
  type: TYPE_NORMAL
- en: You can visit any of my landing pages to see this in action.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t know what to write here, use your personal story.
  prefs: []
  type: TYPE_NORMAL
- en: Where were you before?
  prefs: []
  type: TYPE_NORMAL
- en: Why did you want to change?
  prefs: []
  type: TYPE_NORMAL
- en: What did you try that didn’t work?
  prefs: []
  type: TYPE_NORMAL
- en: '**Personal System**'
  prefs: []
  type: TYPE_NORMAL
- en: Moving into the next section of the landing page, your job is to show how your
    personal system is different.
  prefs: []
  type: TYPE_NORMAL
- en: What was the turning point in your story?
  prefs: []
  type: TYPE_NORMAL
- en: How did you discover and create the personal system?
  prefs: []
  type: TYPE_NORMAL
- en: Why is it better than most other solutions on the market?
  prefs: []
  type: TYPE_NORMAL
- en: If you can add a graphic here to help explain the system, even better.
  prefs: []
  type: TYPE_NORMAL
- en: '**Results or Testimonials**'
  prefs: []
  type: TYPE_NORMAL
- en: After the personal system, you can throw in images of results people have gotten
    with your product.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you don’t have testimonials, you have two options:'
  prefs: []
  type: TYPE_NORMAL
- en: Walk people through your product for free in exchange for a testimonial
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Show your own results
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can use images of yourself (like for productivity or health), or you can
    use screenshots if your topic is something digital like web design.
  prefs: []
  type: TYPE_NORMAL
- en: '**Features + Benefits**'
  prefs: []
  type: TYPE_NORMAL
- en: This is the “offer introduction” section.
  prefs: []
  type: TYPE_NORMAL
- en: Here, you break down every thing they receive inside the program.
  prefs: []
  type: TYPE_NORMAL
- en: The simplest way to do this is just a bullet point list with the features +
    benefits.
  prefs: []
  type: TYPE_NORMAL
- en: If it helps, think of this list as the *opposite* of the list of pain points
    you included in the *lead.*
  prefs: []
  type: TYPE_NORMAL
- en: You’ve probably seen this before in most products you’ve purchased. It’s just
    a list of what’s inside + why they should care.
  prefs: []
  type: TYPE_NORMAL
- en: '**Call To Action**'
  prefs: []
  type: TYPE_NORMAL
- en: After the features and benefits section you need to close the deal.
  prefs: []
  type: TYPE_NORMAL
- en: I like to do a comparison.
  prefs: []
  type: TYPE_NORMAL
- en: Something like “You before this product” vs “You after this product” that reiterate
    the pain points and benefits.
  prefs: []
  type: TYPE_NORMAL
- en: This can be a graphic or a simple bullet point list.
  prefs: []
  type: TYPE_NORMAL
- en: If you are using something like Stan, let this go straight into the payment
    button. Skip the FAQ section in this case.
  prefs: []
  type: TYPE_NORMAL
- en: '**FAQ**'
  prefs: []
  type: TYPE_NORMAL
- en: If you are building a custom landing page, which I don’t recommend your first
    time around (takes too much time and it’s another skill you need to learn) then
    include a list of common questions and answers.
  prefs: []
  type: TYPE_NORMAL
- en: If these questions can handle the objections people were thinking throughout
    your landing page, even better.
  prefs: []
  type: TYPE_NORMAL
- en: Launch Launch Launch
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Set a release date.
  prefs: []
  type: TYPE_NORMAL
- en: 3-4 weeks out from your first promotion.
  prefs: []
  type: TYPE_NORMAL
- en: Promote in your newsletter every week.
  prefs: []
  type: TYPE_NORMAL
- en: Place the link everywhere. In your bio and descriptions.
  prefs: []
  type: TYPE_NORMAL
- en: Write threads, create carousels, or film reels or whatever other kind of content
    you make *around* the main topic your product is about.
  prefs: []
  type: TYPE_NORMAL
- en: Include small plugs or call to actions like, “If you struggle with [pain points],
    the [product] goes live on [date].
  prefs: []
  type: TYPE_NORMAL
- en: '*Use the elements of your marketing strategy from above every time you promote.*'
  prefs: []
  type: TYPE_NORMAL
- en: When you are 1-2 weeks out from launch, start increasing how often and how hard
    you promote.
  prefs: []
  type: TYPE_NORMAL
- en: It helps a lot if you have some kind of early bird discount for those who preorder.
  prefs: []
  type: TYPE_NORMAL
- en: For the sake of brevity, I’ll leave this letter here.
  prefs: []
  type: TYPE_NORMAL
- en: Let me know if you want me to talk more about how to promote your offer in the
    future.
  prefs: []
  type: TYPE_NORMAL
- en: Until then, you can find previous letters on audience building, productivity,
    and writing [on my site.](https://thedankoe.com)
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
