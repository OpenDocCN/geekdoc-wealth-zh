- en: The Best Online Business Model To Make $1 Million In 2023
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2023年最佳在线商业模式，赚取一百万美元
- en: 原文：[https://thedankoe.com/letters/the-best-online-business-model-to-make-1-million-in-2023/](https://thedankoe.com/letters/the-best-online-business-model-to-make-1-million-in-2023/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://thedankoe.com/letters/the-best-online-business-model-to-make-1-million-in-2023/](https://thedankoe.com/letters/the-best-online-business-model-to-make-1-million-in-2023/)'
- en: This is quite possibly the most popular topic in the self-improvement space.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能是自我提升领域最受欢迎的话题。
- en: 'These types of posts always do well:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这类帖子总是做得很好：
- en: The best side hustles to start in 2023
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 2023年最佳副业
- en: The best online business model in 2023
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 2023年最佳在线商业模式
- en: How to get RICH and stop being so POOR in 2023!!!! (please CLICK now or you
    will have 10 YEARS of BAD luck!)
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何在2023年变得富有并停止那么贫穷！！！（请现在点击，否则你将会有10年的坏运气！）
- en: I’m tired of the last example too.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我也对最后一个例子感到厌倦。
- en: 'All of these videos, posts, and articles lack one crucial aspect:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些视频、帖子文章都缺少一个关键方面：
- en: '*A big picture overview of online business.*'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**在线商业的宏观概述**。'
- en: They focus on the technical skills, models, and outreach strategies to make
    money as fast as possible.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 他们专注于技术技能、模型和推广策略，以尽可能快地赚钱。
- en: As always, there’s nothing wrong with this.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 和往常一样，这没有什么错。
- en: I’m just here to paint new perspectives and open your mind.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我只是在这里提供新的视角，开阔你的思路。
- en: The problem is that *everyone* wants quick results.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 问题在于**每个人**都想要快速的结果。
- en: '*Everyone*.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**每个人**。'
- en: I did (and still do) too.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我也做过（现在还在做）。
- en: I’m here to tell you that it may not work, and even if it does, it won’t be
    around in the next 3 months because you’re fighting other bottom feeders that
    lack purpose behind their work.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里告诉你，这可能不会奏效，即使奏效了，在接下来的3个月内也不会持续，因为你正在与其他缺乏工作目的的底层竞争者作斗争。
- en: Because they are in a state of survival that doesn’t allow them to even consider
    [their *life’s work.*](https://thedankoe.com/the-rise-of-the-value-creator-a-new-career-path/)
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 因为他们处于一种生存状态，这使他们甚至无法考虑[他们的**一生之工作**](https://thedankoe.com/the-rise-of-the-value-creator-a-new-career-path/)。
- en: Similar to the short-form content and ghostwriting rat race going on right now.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于目前正在进行的短形式内容和代笔写作的竞争。
- en: I get 100s of DMs and emails from people pitching the same Walmart quality reels
    captions (all you gotta do is learn an actual software – not CapCut – and stop
    trying to take shortcuts bros).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我收到了100多条私信和邮件，都是关于同样的沃尔玛质量视频字幕（你只需要学习真正的软件——不是CapCut——并停止试图走捷径，兄弟们）。
- en: People don’t care to get good, they care to get money.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 人们不在乎变得更好，他们在乎赚钱。
- en: That’s a brutal mistake.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个残酷的错误。
- en: I went through the same phase as everyone else though.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，我也经历了和其他人一样的阶段。
- en: Most people do.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人都这么做。
- en: So treat this as a seed of awareness on your business journey.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，把这当作你在商业旅程中的意识种子。
- en: If you are chasing the quick bucks with the latest strategies, you have about
    3-6 months left before you need to pivot, give up, or prioritize becoming the
    best.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正用最新的策略追逐快速的钱，你大约还有3-6个月的时间需要转型、放弃，或者优先考虑成为最好的。
- en: What Is The Best Business Model?
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最佳商业模式是什么？
- en: The best business model is an actual business model.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 最佳商业模式是一个真正的商业模式。
- en: Not a side hustle.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 不是副业。
- en: Not free online surveys.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 不是免费的在线调查。
- en: Not investing your weekly allowance into crypto.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 不要把你的每周零花钱投资到加密货币中。
- en: A business has to generate revenue. You need cash flow.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 一个企业必须创造收入。你需要现金流。
- en: A business has the ability to scale, pivot, and position itself in the market
    regardless of algorithm changes and trends.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 无论算法变化和趋势如何，企业都有能力扩展、转型并在市场上定位自己。
- en: Half of the short-form content people will be out of a job because they don’t
    understand marketing (I’m not talking about a surface-level knowledge here, I’m
    talking about deep experience).
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 将有一半的短形式内容的人会失业，因为他们不懂营销（这里我说的不是表面知识，而是深入的经验）。
- en: '**Money Is The Lifeblood Of Society**'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**金钱是社会生命的源泉**'
- en: Like how your hand will die if blood stops flowing, so will your business, and
    therefore your sense of purpose.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 就像你的手如果血液停止流动就会死亡一样，你的企业也会死亡，因此你的目标感也会消失。
- en: Purpose is something greater than you.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是超越你自身的东西。
- en: If you aren’t making money, it means you aren’t contributing to society with
    the value you have to offer.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有赚钱，那就意味着你没有用你所能提供的价值为社会做出贡献。
- en: Business is how you make money, therefore it is how you contribute to society,
    therefore it is a valid purpose in your life.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 商业是你赚钱的方式，因此它也是你为社会做出贡献的方式，因此它是你生活中一个有效的目标。
- en: Business is a vessel for your value and nothing more.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 业务是你价值的载体，没有更多。
- en: Online surveys, prescriptive business models (like short-form content agencies),
    and most jobs are soulless.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在线调查、规定性的商业模式（如短形式内容机构）和大多数工作都是无灵魂的。
- en: '**A Business Has An Offer & Traffic Source**'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**一个业务有一个提议和流量来源**'
- en: This is a universal principle beyond business.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个超越商业的普遍原则。
- en: Offer = value
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 提供的内容=价值
- en: Traffic = people
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 流量=人
- en: You need to place a valuable product or service in front of a group of people
    that want to buy.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要将一个有价值的产品或服务放在一群想要购买的人面前。
- en: Like putting a hot dog stand outside of a music festival with a bunch of drunk
    people walking by.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 就像在音乐节外摆一个热狗摊，旁边有一群喝醉的人走过。
- en: Or, in dating, putting yourself in an environment where your ideal partner is
    so you actually have a chance of landing a date.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，在约会中，把自己放在一个你的理想伴侣可能存在的环境中，这样你实际上就有机会找到约会对象。
- en: If you have an offer, but no traffic, why are you complaining about not getting
    any sales (or dates)?
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有一个提议，但没有流量，你为什么还在抱怨没有销售（或约会）？
- en: '**The Dynamic Traffic Source**'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**动态流量来源**'
- en: I’m not a fan of putting yourself in a box, and I’m bullish on the [creator
    economy as a way of life](https://thedankoe.com/the-future-of-the-creator-economy-my-bold-prediction/).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是很喜欢把自己放在一个框子里，我对[创作者经济作为一种生活方式](https://thedankoe.com/the-future-of-the-creator-economy-my-bold-prediction/)持乐观态度。
- en: It is the *new economy* regardless of if you care to start a business or become
    a creator.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 不论你是否想创业或成为创作者，它都是*新经济*。
- en: Therefore, a personal brand is the closest thing to a “one size fits all” traffic
    source.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，个人品牌是“一刀切”流量来源的近似物。
- en: A personal brand is how [you become the niche](https://thedankoe.com/the-most-profitable-niche-is-you-how-to-create-your-niche/)
    and eradicate competition.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 个人品牌是你如何成为细分市场[你](https://thedankoe.com/the-most-profitable-niche-is-you-how-to-create-your-niche/)并消除竞争的方式。
- en: 'With a personal brand:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在个人品牌下：
- en: You don’t have to rely on ads
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不必依赖广告。
- en: You can talk about whatever you want ([if you sprinkle in content related to
    your offer](https://thedankoe.com/dont-get-replaced-by-ai-how-to-write-authentic-content/))
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以谈论任何你想说的话（[如果你在你的内容中穿插与你的提议相关的信息](https://thedankoe.com/dont-get-replaced-by-ai-how-to-write-authentic-content/））
- en: You don’t have to rely on cold outreach (for long)
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不必长期依赖冷接触。
- en: You build an audience so you can do whatever you want
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你建立观众群体，这样你就可以做任何你想做的事情。
- en: Your business doesn’t die when you stop doing the manual work
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你停止手动工作时，你的业务不会死亡。
- en: You aren’t cornered into a specific niche, like how Zuby not only talks about
    politics, but makes music and sells fitness programs (most people just can’t get
    out of the scarcity mindset of needing to land clients, so their content feels
    limited and boring).
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不会被限制在特定的细分市场，就像Zuby不仅谈论政治，还制作音乐和销售健身计划（大多数人无法摆脱需要吸引客户的稀缺心态，因此他们的内容感觉有限且无聊）。
- en: And, you get to meet like-minded people, travel the world, and actually enjoy
    your work.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，你还能遇到志同道合的人，环游世界，并真正享受你的工作。
- en: I just got back from a trip to see Joey Justice and Justin Scott. You won’t
    find the conversations we had in your everyday life.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我刚从去看Joey Justice和Justin Scott的旅行回来。你不会在日常生活中找到我们之间的对话。
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1086">![](../Images/047729d2a733f86615a43e915dc9f966.png)</picture>
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1086">![](../Images/047729d2a733f86615a43e915dc9f966.png)</picture>
- en: I don’t care to convince you on this, because you will come to this conclusion
    eventually.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我不想说服你这一点，因为你最终会得出这个结论。
- en: '**The lesson:**'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**教训：**'
- en: A personal brand should be considered your foundational traffic source for your
    offers.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 个人品牌应该被视为你提议的基础流量来源。
- en: Paid ads increase in authority when people know your name.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 当人们知道你的名字时，付费广告的权威性会提高。
- en: Cold outreach to your audience makes them open to talking to you (they actually
    respond).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 向你的观众进行冷接触会使他们愿意与你交谈（他们实际上会回应）。
- en: You can pivot whenever you’d like if you understand that content is about value,
    not writing about specific topics.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你理解内容是关于价值而不是关于特定主题，你可以随时进行转型。
- en: In other words, you write content based on ideas, not topics, and articulate
    those ideas from the lens of a relevant goal or problem. Topics help with idea
    generation.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，你根据想法而不是主题来写内容，并从相关目标或问题的角度阐述这些想法。主题有助于产生想法。
- en: Nobody cares about the topic, they care about how anything and everything will
    benefit their life.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人关心这个话题，他们关心的是任何事物如何使他们的生活受益。
- en: The Experience Model
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 经验模型
- en: <picture decoding="async" class="wp-image-1087">![](../Images/615076c30d09418f3681d2b5b7825948.png)</picture>
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-1087">![](../Images/615076c30d09418f3681d2b5b7825948.png)</picture>
- en: I’ve talked about personal brand strategies many times in the past, so I’ll
    leave it at that.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 我过去多次讨论过个人品牌策略，所以我就不多说了。
- en: Instead, I want to focus more on offer creation.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我想更多地关注提案的创建。
- en: 'Most people think they need:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人认为他们需要：
- en: The perfect customer avatar
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完美的客户画像
- en: The perfect system, curriculum, or coaching structure
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完美的系统、课程或辅导结构
- en: A fancy physical product with perfected supply chain management
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个拥有完善供应链管理的精美实物产品
- en: Prior results (when you need to actually work with someone to get results)
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前期成果（当你需要真正与某人合作以取得成果时）
- en: In reality, *you need to **know** more than someone who is one step behind you.*
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，*你需要比那些落后一步的人知道得更多。*
- en: 'See: the terms “age of information” and “attention economy”. Knowledge is king.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 参见：术语“信息时代”和“注意力经济”。知识为王。
- en: Everything in this world goes through developmental stages.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这世界上的一切都经过发展阶段。
- en: It doesn’t matter if it’s the globe and its seasons, progress in society, or
    you reaching a new level in life.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 无论是对地球及其季节变化、社会进步，还是你达到生活中的新水平，这都不重要。
- en: Business is no different, and if you haven’t started, you aren’t going to hit
    level 10 in 2 weeks making $1 million a year.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 商业也不例外，如果你还没有开始，你不可能在两周内达到10级并每年赚100万美元。
- en: This is common sense but most people set that expectation thanks to human nature,
    social media headlines, and the collective quick-fix mindset.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这似乎是常识，但大多数人都是因为人性、社交媒体标题和集体快速解决问题的思维模式而设定这样的期望。
- en: We have to start small.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我们必须从小处着手。
- en: The Minimum Viable Offer
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 最小可行提案
- en: I’ve talked about this briefly before in [The One Person Business Model letter](https://thedankoe.com/the-one-person-business-model-how-to-monetize-yourself/),
    but I want to give you the dirty deets.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我之前在[《一人企业模式信件》（The One Person Business Model letter）](https://thedankoe.com/the-one-person-business-model-how-to-monetize-yourself/)中简要地谈过这一点，但我想给你一些更详细的内幕信息。
- en: A minimum viable offer revolves around a ***single*** skill or interest.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 一个最小可行提案围绕一个***单一***技能或兴趣。
- en: Charging big bucks takes time, experience, and multidisciplinary skill acquisition
    while building in the real world (not reading about working with them).
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 收取高额费用需要时间、经验和跨学科技能的获取，同时在实际世界中构建（而不是仅仅阅读关于如何与他们合作的内容）。
- en: With your single skill or interest, you immediately turn it into a relevant
    freelance, coaching, consulting, or tutoring offer.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 用你的单一技能或兴趣，你立即就能将其转化为相关的自由职业、辅导、咨询或家教提案。
- en: 'When I say “skill,” I mean anything like:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 当我说“技能”时，我指的是任何类似的东西：
- en: Email marketing
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 邮件营销
- en: Web design
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网页设计
- en: Copywriting
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 营销文案
- en: Facebook ads
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Facebook广告
- en: Brand design
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 品牌设计
- en: Anything else from the [$1 Million Dollar Skill Stack](https://thedankoe.com/the-1-million-dollar-skill-stack-learn-in-this-order/)
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 来自[$100万美元技能栈](https://thedankoe.com/the-1-million-dollar-skill-stack-learn-in-this-order/)的其他任何内容
- en: 'By “interest” I mean anything like:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 当我说“兴趣”时，我指的是任何类似的东西：
- en: Health and fitness
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 健康和健身
- en: Performance and productivity
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 性能和生产力
- en: Personal development and spirituality
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 个人发展和灵性
- en: Relationships or dating
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人际关系或约会
- en: Those are skills, yes, but I want to make the distinction here to help frame
    what we are talking about.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 这些都是技能，是的，但我想在这里区分一下，以帮助我们界定我们正在讨论的内容。
- en: '**Packaging Up Your Offer Fast**'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '**快速打包你的提案**'
- en: With a skill, it should be fairly obvious.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 有了一项技能，这应该是相当明显的。
- en: You would either sell website design, landing page design, email marketing,
    sales page copywriting, or a brand design service like a profile banner, profile
    picture, and ebook cover design.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会销售网站设计、着陆页设计、邮件营销、销售页面文案，或者像个人横幅、个人照片和电子书封面设计这样的品牌设计服务。
- en: In essence, you can take a beginner level course, watch some YouTube videos,
    and start selling (remember that you aren’t trying to charge insane amounts here…
    *you have to develop your offer, and you can’t develop what doesn’t exist*).
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，你可以参加一个入门级课程，观看一些YouTube视频，并开始销售（记住，你在这里不是试图收取天价费用……*你必须发展你的提案，你不能发展不存在的东西*）。
- en: Anyone can pick up one of these skills fast and start landing clients from your
    personal brand.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 任何人都可以快速掌握这些技能之一，并开始通过个人品牌吸引客户。
- en: I’ve written plenty of letters on this in the past, but there are 10+ courses
    and 180+ strategies in [Modern Mastery](https://modernmastery.co/letter) to help
    you do this. Or the [Digital Economics](https://digitaleconomics.school) masterclass
    to productize yourself with my personal systems.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我过去写过很多关于这个的信，但在[现代精通](https://modernmastery.co/letter)中有10+门课程和180+策略来帮助你做到这一点。或者我的个人系统[数字经济学](https://digitaleconomics.school)大师班，以产品化自己。
- en: '**For Coaching, Consulting, Or Tutoring Offers**'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '**对于辅导、咨询或辅导服务**'
- en: 'First, understand this universal principle:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，理解这个普遍原则：
- en: Goal (where your customer wants to be)
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目标（你的客户想要达到的地方）
- en: Path (your unique way of getting them there)
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 路径（你独特的引导方式）
- en: Problem (what they are struggling with now)
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 问题（他们现在正在挣扎的事情）
- en: In a nutshell, that’s all that marketing is.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，这就是营销的全部。
- en: You are selling a *transformation* that either you have achieved yourself, you
    have helped others achieve, or you want to start helping others achieve.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在销售一种*转变*，要么是你自己实现的，要么是你帮助他人实现的，要么是你想开始帮助他人实现的。
- en: '**Remember**: *freelancers gain experience by working with clients first. Most
    of them don’t have a business to do it themselves first. They just learn the skill
    and start selling it to their ideal customer. You don’t have to have prior results
    to get started… because you get results by helping yourself **or** helping others.*'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: '**记住**：*自由职业者通过与客户合作来积累经验。他们中的大多数都没有自己的业务来首先自己完成。他们只是学习技能，然后开始向理想客户销售。你不需要有先前的成果就可以开始……因为通过帮助自己**或**帮助他人，你就能获得成果。*'
- en: Coaching and consulting offers are fairly obvious, you help them with an interest
    like fitness, productivity, or something else in their life.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 咨询和顾问服务相当明显，你帮助他们处理兴趣，如健身、生产力或他们生活中的其他事情。
- en: For a tutoring offer, you will be ***teaching*** them the skill instead of doing
    it for them. Think of it like you are walking them through a course one-on-one.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 对于辅导服务，你将**教授**他们技能，而不是为他们做。想象一下，你就像一对一地引导他们通过课程一样。
- en: Teaching them how to write an email newsletter
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教他们如何撰写电子邮件通讯
- en: Teaching them how to edit YouTube videos
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教他们如何编辑YouTube视频
- en: Teaching them how to write social media content
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教他们如何撰写社交媒体内容
- en: Teaching them web or graphic design
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教他们网页设计或图形设计
- en: This is an alternate option to freelancing. You teach them instead of doing
    it for them.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种替代自由职业的选择。你教他们而不是为他们做。
- en: This works incredible for targeting beginners. More people should create a tutoring
    offer (if you are beginner or intermediate, I would do a tutoring offer and skip
    the pain that comes with freelancing… it also helps you write about anything you
    want to beginners in your content).
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 这对于针对初学者非常有效。更多的人应该提供辅导服务（如果你是初学者或中级，我会提供辅导服务并跳过自由职业带来的痛苦……这也有助于你撰写关于任何你想在内容中向初学者介绍的内容）。
- en: And the results you get transfer over into a digital product / course much easier.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 你得到的结果更容易转移到数字产品/课程中。
- en: 'The reason you are doing this, instead of a course, as a beginner is because:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 你之所以这样做，而不是作为初学者开设课程，是因为：
- en: You can charge more (and increase prices to $2,500+ after a few clients)
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以收取更高的费用（并在几个客户之后将价格提高到$2,500+）
- en: You don’t have an audience (traffic) to bring in consistent course sales
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你没有受众（流量）来带来持续的课程销售
- en: You don’t know what gets results yet (even if you think you do, you don’t),
    that’s why you work 1-1 and refine along the way
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你还不知道什么能带来结果（即使你认为你知道，你也不知道），这就是为什么你一对一工作并在过程中完善。
- en: You can use direct outreach methods or [different strategies](https://digitaleconomics.school)
    to acquire clients
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以使用直接外联方法或[不同的策略](https://digitaleconomics.school)来获取客户
- en: In short, it’s “easier” to make a $1000 sale instead of ten $100 sales.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，与十个$100的销售相比，做出$1000的销售“更容易”。
- en: You start to realize that you are in full control of your income.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 你开始意识到你完全控制着自己的收入。
- en: That’s liberating.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 这很解放。
- en: 'Coaching, consulting, or tutoring offers consist of a few things:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 咨询、顾问或辅导服务包括以下几点：
- en: '**1) A structure for what you are going to teach or help them with.**'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 你将要教授或帮助他们的事情的结构。**'
- en: Think of where they are now (point A) and what you help them achieve (point
    B).
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 想想他们现在在哪里（点A）以及你帮助他们实现什么（点B）。
- en: Now, create a soft outline of the necessary things they need to learn and do.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，创建一个软性大纲，列出他们需要学习和做的事情。
- en: This does not have to turn into a curriculum, because you will be walking them
    through everything on a call.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 这不必变成一个课程，因为你将在电话中引导他们了解所有内容。
- en: Most coaches, consultants, etc are selling programs that are direct teachings
    from their courses or book.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数教练、顾问等都在销售直接来自他们课程或书籍的教学项目。
- en: Yes, the exact same thing, because that’s their method for getting results.
    The difference is 1-1 help and accountability.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，完全一样，因为那是他们获得结果的方法。区别在于一对一的帮助和责任感。
- en: '**If you want to structure your teachings well:**'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果你想很好地组织你的教学：**'
- en: Define what point A is (where they are now and the problem they are experiencing)
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义A点是什么（他们目前的位置和遇到的问题）
- en: Befine what point B is (the desirable point in life that you can help them reach)
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义B点是什么（你能够帮助他们达到的理想生活状态）
- en: The path to get there – outline chapters of a book or modules in a course –
    you can use others’ books or courses for inspiration to make sure you aren’t missing
    anything.
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前往目的地的路径——一本书的章节或课程中的模块——你可以使用他人的书籍或课程来获取灵感，以确保你不会遗漏任何内容。
- en: Fill this in as you see fit. You can incorporate multiple interests if you’d
    like… you don’t have to limit it to one specific interest and be the same as everyone
    else. Think of how a book synthesizes multiple teachings to get to one outcome.
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 按照你的想法填写。如果你愿意，可以结合多个兴趣……你不必局限于一个特定的兴趣，与他人相同。想想一本书是如何综合多个教学以得到一个结果的。
- en: '**2) Weekly calls to answer questions and teach them what they need to know.**'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 每周通话以回答问题并教给他们需要知道的内容。**'
- en: I recommend selling a pack of 4 calls. One every week.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议出售一包4次通话。每周一次。
- en: You will be teaching them exactly what they need to know and answer any questions
    they have.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 你将教给他们确切需要知道的内容，并回答他们可能有的任何问题。
- en: Start with 4 calls, because that allows you to charge more at the start.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 从4次通话开始，因为这让你在开始时可以收取更高的费用。
- en: And, you probably won’t be able to get them to their desired end result (point
    B) in one call.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 并且，你可能无法在一次通话中就帮助他们达到他们期望的结果（B点）。
- en: 4 calls allows you to create a more enticing offer than just “I’ll get on a
    consultation call with you to help you with whatever you are struggling with.”
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 4次通话让你能够创造一个比“我会与你进行一次咨询通话，帮助你解决你遇到的任何问题”更有吸引力的报价。
- en: You are marketing a transformation.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在推广一种转变。
- en: '**3) Weekly Action Items & Text Access**'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 每周行动项目与文本访问**'
- en: After every call, you should tell them exactly what they should do.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 每次通话后，你应该告诉他们确切应该做什么。
- en: You can create worksheets, tasks, or projects for them to complete.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以为他们创建工作表、任务或项目来完成。
- en: If you are selling health coaching, have them track their food and weigh themselves
    each morning.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在销售健康指导，让他们每天早上跟踪他们的食物并称体重。
- en: If you are selling design tutoring, have them create a first iteration of a
    social media design.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在销售设计辅导，让他们创建一个社交媒体设计的第一个版本。
- en: You should have a way of communicating with them outside of calls, like on Telegram,
    Whatsapp, or just texting on your phone.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该有一种方式在通话之外与他们沟通，比如在Telegram、WhatsApp上，或者只是用手机发短信。
- en: '**Charge $500-$1000 At The Start**'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: '**开始时收费500-1000美元**'
- en: For a single-skill freelance service OR pack of 4 calls (coaching, consulting,
    or tutoring) you will start at $500, increase to $1000 after the first few clients,
    and continue improving your offer from there as you go through this course.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 对于单一技能的自由职业服务或4次通话套餐（辅导、咨询或教学），你将从500美元开始，在最初的几位客户之后增加到1000美元，并在完成此课程的过程中继续改进你的报价。
- en: Even better, I would recommend helping people for free.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的是，我建议免费帮助人们。
- en: If you are a creator and are [networking with other creators](https://thedankoe.com/how-to-network-with-millionaires-and-build-a-name-for-yourself/),
    offer them a few calls for free.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一位创作者，并且正在[与其他创作者建立联系](https://thedankoe.com/how-to-network-with-millionaires-and-build-a-name-for-yourself/)，可以免费提供给他们几次通话。
- en: As you both grow, their testimonial will increase in value.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你们双方的成长，他们的推荐信价值将增加。
- en: A testimonial from me at 500 followers is worth tens of thousands of dollars
    when I have 1 million followers. People will buy the product just because they
    see my name associated with it.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 当我有100万粉丝时，我500粉丝时的推荐信价值数万美元。人们会购买产品，仅仅是因为他们看到我的名字与它相关联。
- en: '*Testimonials from creators are appreciating assets.*'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: '*来自创作者的推荐信是宝贵的资产*。'
- en: Don’t only try to land big fish because you are desperate for money.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 不要只试图捕获大鱼，因为你急需钱。
- en: Slow and steady.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 慢慢来，稳扎稳打。
- en: '**You Can Either Scale Your Client Business Or Productize**'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: '**你可以选择扩展客户业务或产品化**'
- en: As you are growing your brand, getting client results, and refining your offer
    through skill acquisition (never stop learning)… you have 2 options.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在扩大你的品牌、获得客户成果并通过技能获取（永不停止学习）来完善你的报价时……你有两个选择。
- en: Create a more compelling offer and increase your prices.
  id: totrans-173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个更有吸引力的报价并提高你的价格。
- en: Turn your curriculum into a cohort-based course and use your audience to fuel
    it (only works for coaching, consulting, or tutoring)
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将你的课程转变为基于班级的课程，并利用你的受众来推动它（仅适用于辅导、咨询或家教）
- en: I, of course, recommend the second option.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 我当然推荐第二个选择。
- en: It gives you more free time, less stress, and more leverage.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 这给你带来更多空闲时间，更少的压力，以及更多的杠杆作用。
- en: Leverage leverage leverage.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 利用利用利用。
- en: The main downside is that you will need to be consistently growing your audience
    to fuel the cohort. That is difficult, but oh so worth it instead of getting trapped
    in a feast or famine freelance cycle.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 主要的缺点是，你需要持续扩大你的受众来推动班级。这很困难，但比起陷入 feast or famine 自由职业周期，它绝对值得。
- en: Then, once your cohort gets results and testimonials, you can productize further
    into a self-paced course.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，一旦你的班级取得成果和推荐信，你就可以进一步将其产品化为一门自学课程。
- en: Now, you don’t have to do any work, and can spend your free time building higher
    ROI projects.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你不必做任何工作，可以花你的空闲时间来构建更高回报的项目。
- en: As we discussed in the last letter, you desaturate the market beneath you.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在上一封信中讨论的那样，你让你的市场变得不那么饱和。
- en: The creator economy cannot get saturated.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者经济不会饱和。
- en: '**Scale To One Million**'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: '**规模扩大至一百万**'
- en: '$1 million becomes inevitable if:'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 如果：
- en: You don’t stagnate with one underpaying offer
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不会因为一个低薪的报价而停滞不前
- en: You continue growing your following (yes, this is possible, don’t stagnate and
    blame the algorithm for your lack of knowledge of social media)
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你继续扩大你的追随者（是的，这是可能的，不要停滞不前，也不要把社交媒体知识不足的责任归咎于算法）
- en: You evolve, your offers evolve, and you increase your income while decreasing
    the time you spend on work
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你在进化，你的报价在进化，你在增加收入的同时减少了你在工作上花费的时间
- en: The route I took to do this was with a personal brand, digital products, and
    endless iteration.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 我采取的这条路是通过个人品牌、数字产品和无尽迭代来实现的。
- en: It took me 3 years (with a bit of prior experience).
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 我（考虑到一些先前的经验）用了3年时间。
- en: Hopefully, my content can help you get there faster.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 希望我的内容能帮助你更快地达到那里。
- en: – Dan
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
