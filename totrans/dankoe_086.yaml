- en: This Is Why Your Life Sucks (How To Reinvent Yourself)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/this-is-why-your-life-sucks-how-to-reinvent-yourself/](https://thedankoe.com/letters/this-is-why-your-life-sucks-how-to-reinvent-yourself/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I think often about one of the darkest periods of my life.
  prefs: []
  type: TYPE_NORMAL
- en: The funny thing is, I didn’t know it was my darkest period.
  prefs: []
  type: TYPE_NORMAL
- en: At the time, it was normal.
  prefs: []
  type: TYPE_NORMAL
- en: It was my standard.
  prefs: []
  type: TYPE_NORMAL
- en: My “good” days then are my terrible days now… and that was normal.
  prefs: []
  type: TYPE_NORMAL
- en: So many people have no idea how much better they could feel. They don’t realize
    that their “normal” state is bottom of the barrel.
  prefs: []
  type: TYPE_NORMAL
- en: I would start my days at 10am.
  prefs: []
  type: TYPE_NORMAL
- en: I would drive straight to Mcdonald’s to pick up 2 sausage, egg, and cheese McMuffins
    with an iced coffee.
  prefs: []
  type: TYPE_NORMAL
- en: I would instantly feel like garbage, lay back down, and binge-watch episodes
    of The Office until I got hungry again.
  prefs: []
  type: TYPE_NORMAL
- en: I was taking online classes at the time. Of course, I didn’t know how to manage
    myself. I saw the “freedom” of online classes as an excuse to adopt self-destructive
    habits and slowly die in my comfortable hole.
  prefs: []
  type: TYPE_NORMAL
- en: I barely did my schoolwork.
  prefs: []
  type: TYPE_NORMAL
- en: I would log on last minute and complete the bare minimum of the assignments
    (I still passed with As and Bs).
  prefs: []
  type: TYPE_NORMAL
- en: At night, I would spend 5-7 hours playing League Of Legends. With or without
    friends, it didn’t matter. I was just numbing my mind at this point.
  prefs: []
  type: TYPE_NORMAL
- en: 'This was all to illustrate one point:'
  prefs: []
  type: TYPE_NORMAL
- en: The difference between video games and real life is fake risk and real risk.
  prefs: []
  type: TYPE_NORMAL
- en: Real pain.
  prefs: []
  type: TYPE_NORMAL
- en: Real fear.
  prefs: []
  type: TYPE_NORMAL
- en: Real sacrifice.
  prefs: []
  type: TYPE_NORMAL
- en: The things that allow pleasure, love, and results to exist.
  prefs: []
  type: TYPE_NORMAL
- en: In a video game, you can fail without repercussion.
  prefs: []
  type: TYPE_NORMAL
- en: In life, you can’t just hide behind your screen and hope there won’t be failure.
  prefs: []
  type: TYPE_NORMAL
- en: In a video game, we trick our minds into thinking it’s making progress.
  prefs: []
  type: TYPE_NORMAL
- en: I was doing the same thing in life.
  prefs: []
  type: TYPE_NORMAL
- en: The sleeping-in, fast food, and Netflix binges kept me in a drip-fed dopamine
    sedation so that I didn’t feel the need to pursue anything greater.
  prefs: []
  type: TYPE_NORMAL
- en: Everything was fine, because I let it be fine.
  prefs: []
  type: TYPE_NORMAL
- en: My life sucked, because I let it suck.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before we start, The Art Of Focus Keepsake Box is available for preorder:'
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1489">![](../Images/4701ae247b8cef003d4a0cd034d080f8.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: The Keepsake Hardcover – we are only printing 2000 copies.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The digital download of the book so you can be the first to read.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The audiobook version when it is recorded and uploaded.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The FOCI Planner to deconstruct your ideal future into priority tasks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The FOCI Coin to remember to act with intention.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Digital Transformation Center with 12 hours of modern entrepreneurship trainings.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Private Community for updates, discussion, and networking.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A private invitation to 6+ speaker two-weekend-long virtual event on The Future
    Of Work
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The price increases twice leading up to the release date. [Preorder your copy
    here.](https://theartoffocusbox.com)
  prefs: []
  type: TYPE_NORMAL
- en: Tiny Choices
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Your life sucks because of the thousands of tiny choices you made over the past
    year.
  prefs: []
  type: TYPE_NORMAL
- en: You didn’t make the choices that led to a purposeful career.
  prefs: []
  type: TYPE_NORMAL
- en: You didn’t make the choices that led to fulfilling relationships.
  prefs: []
  type: TYPE_NORMAL
- en: You didn’t make the choices that led to a healthy and aesthetic body.
  prefs: []
  type: TYPE_NORMAL
- en: “But Dan, what about genetics and where I was born and working a job that doesn’t
    allow me enough time blah blah blah”
  prefs: []
  type: TYPE_NORMAL
- en: Yeah, those things play a role.
  prefs: []
  type: TYPE_NORMAL
- en: But you just made another tiny choice to close your mind off to what you *can*
    do in your situation.
  prefs: []
  type: TYPE_NORMAL
- en: The ability to choose cannot be taken away or even given away—it can only be
    forgotten. – Greg McKeown
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Essentialism
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It’s not difficult to look around and see that you aren’t a special case. There
    are thousands like you that have turned their situation around.
  prefs: []
  type: TYPE_NORMAL
- en: The quality of your life one year from now will depend on the tiny choices that
    compound into that life.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have to make perfect choices.
  prefs: []
  type: TYPE_NORMAL
- en: It’s actually better if you make mistakes.
  prefs: []
  type: TYPE_NORMAL
- en: The greatest risk is no risk at all, because how else would you fail?
  prefs: []
  type: TYPE_NORMAL
- en: Without failure, improvement is literally impossible.
  prefs: []
  type: TYPE_NORMAL
- en: Without improvement, you don’t have an aim for your life.
  prefs: []
  type: TYPE_NORMAL
- en: Without an aim for your life, everything becomes meaningless.
  prefs: []
  type: TYPE_NORMAL
- en: Becoming a better person is how you live with purpose.
  prefs: []
  type: TYPE_NORMAL
- en: Big Standards
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Broke people are okay with being broke until something catastrophic happens.
  prefs: []
  type: TYPE_NORMAL
- en: And it is much more likely for a catastrophic event to happen to them.
  prefs: []
  type: TYPE_NORMAL
- en: Their car blows up because it’s old and unmaintained.
  prefs: []
  type: TYPE_NORMAL
- en: Someone breaks into their house in a bad neighborhood.
  prefs: []
  type: TYPE_NORMAL
- en: Their parents get sick and they can’t help because of their low income.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, they have some motivation to make money at this point, but they think
    it’s too late when the catastrophic event happens. They didn’t prepare.
  prefs: []
  type: TYPE_NORMAL
- en: So they get trapped in an endless cycle of *“I should’ve started sooner.”*
  prefs: []
  type: TYPE_NORMAL
- en: Eventually, things equalize. The stress in their life lowers. They start to
    enjoy their mindless comforts again. Waiting for another catastrophe to break
    them down.
  prefs: []
  type: TYPE_NORMAL
- en: Successful people use these events to change who they are.
  prefs: []
  type: TYPE_NORMAL
- en: Who they are determines their standards and values.
  prefs: []
  type: TYPE_NORMAL
- en: Their standards and values determine the tiny choices they make.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re okay with having $5 in your bank account, you won’t see that as a
    problem.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re okay with having $100,000 in your bank account, you will see anything
    less than that as a problem that needs to be fixed.
  prefs: []
  type: TYPE_NORMAL
- en: Problems frame your perception – I talk about this in [my book](https://theartoffocusbox.com).
  prefs: []
  type: TYPE_NORMAL
- en: You begin to notice more money-making opportunities.
  prefs: []
  type: TYPE_NORMAL
- en: Your Google searches change to things like “how to make an extra $1,000/month.”
  prefs: []
  type: TYPE_NORMAL
- en: You start having conversations about money with your friends.
  prefs: []
  type: TYPE_NORMAL
- en: All of these tiny choices begin to compound into results.
  prefs: []
  type: TYPE_NORMAL
- en: You rewire your thinking patterns based on your intentional search for specific
    information relating to the problem you are facing.
  prefs: []
  type: TYPE_NORMAL
- en: The information you consume highly impacts your identity and thus your standards.
  prefs: []
  type: TYPE_NORMAL
- en: If you surround yourself with people – physical or digital – that make it seem
    like it’s “okay” to be 100 pounds overweight, have zero money, work a job you
    hate, stay with a partner you despise, get drunk every night, and the rest… how
    do you think your life will end up?
  prefs: []
  type: TYPE_NORMAL
- en: If your standards require you to eat from Whole Foods, you will look at McDonald’s
    meals in disgust.
  prefs: []
  type: TYPE_NORMAL
- en: If your standards require you to work like a CEO, you will look at low-level
    grunt work as a problem that must be fixed through skill acquisition, education,
    prioritization, and outsourcing.
  prefs: []
  type: TYPE_NORMAL
- en: You obviously can’t solve all of the problems in your life immediately.
  prefs: []
  type: TYPE_NORMAL
- en: You can’t escape your situation right now.
  prefs: []
  type: TYPE_NORMAL
- en: You need a plan. An aim. A way out.
  prefs: []
  type: TYPE_NORMAL
- en: And by sticking to this plan, I promise that the journey will be more enjoyable
    than the outcome of that thing.
  prefs: []
  type: TYPE_NORMAL
- en: 'As Nietzsche would say:'
  prefs: []
  type: TYPE_NORMAL
- en: “Happiness is the feeling that power increases – that resistance is being overcome.”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The Standards Of Who You Want To Become
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Most people take the bare minimum approach to life.
  prefs: []
  type: TYPE_NORMAL
- en: Quick money, quick sex, quick pleasure, no commitment, no depth, no failure.
  prefs: []
  type: TYPE_NORMAL
- en: The easier you try to make your life the harder it’s going to be.
  prefs: []
  type: TYPE_NORMAL
- en: The way out of mindless living is to adopt the standards of who you want to
    become.
  prefs: []
  type: TYPE_NORMAL
- en: How much money do you want to make?
  prefs: []
  type: TYPE_NORMAL
- en: What kind of work will bring you fulfillment?
  prefs: []
  type: TYPE_NORMAL
- en: What is your ideal relationship, for friends or a partner?
  prefs: []
  type: TYPE_NORMAL
- en: How do you want to look and feel?
  prefs: []
  type: TYPE_NORMAL
- en: You must go beyond the bare minimum of survival.
  prefs: []
  type: TYPE_NORMAL
- en: Commit to having a reason behind your actions.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t know why you are doing something, why are you doing it? And if
    you know why, why are you ignoring it?
  prefs: []
  type: TYPE_NORMAL
- en: Are you advancing humanity by handing out 40 triple-pumped mocha cappuccinos
    working at Starbucks? Or are you making humanity sick and overweight?
  prefs: []
  type: TYPE_NORMAL
- en: Why haven’t you begun pursuing a more purposeful career or starting a business?
  prefs: []
  type: TYPE_NORMAL
- en: Do you know why you are shoveling food down your throat? Do you understand how
    each nutrient interacts with your biology and creates a healthy state?
  prefs: []
  type: TYPE_NORMAL
- en: Why haven’t you begun educating yourself on health and training?
  prefs: []
  type: TYPE_NORMAL
- en: You live in your body. It should be considered your full-time job to learn about
    it.
  prefs: []
  type: TYPE_NORMAL
- en: Do you know why you are going through the motions with a partner that was easy
    to get with? Do you see yourself with them for 40 more years?
  prefs: []
  type: TYPE_NORMAL
- en: Why haven’t you improved your social skills to the point of being able to attract
    a better partner?
  prefs: []
  type: TYPE_NORMAL
- en: It’s cliche, but you have one shot at this life thing.
  prefs: []
  type: TYPE_NORMAL
- en: The only person that can stop you from living a meaningless existence is yourself.
  prefs: []
  type: TYPE_NORMAL
- en: The Power Of The Internet
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s break down what creates better choices:'
  prefs: []
  type: TYPE_NORMAL
- en: Learning is the fundamental human drive.
  prefs: []
  type: TYPE_NORMAL
- en: At birth, you are an information sponge.
  prefs: []
  type: TYPE_NORMAL
- en: Your parents, friends, society, teachers, and bosses all project their worldview
    on you.
  prefs: []
  type: TYPE_NORMAL
- en: Where did they get their worldview? From the same people, unless they questioned
    it.
  prefs: []
  type: TYPE_NORMAL
- en: This is all that you know.
  prefs: []
  type: TYPE_NORMAL
- en: If we could put a number on it, you know less than 1% of the information available
    in the world. Probably closer to less than 0.001%.
  prefs: []
  type: TYPE_NORMAL
- en: This information creates reference points in reality.
  prefs: []
  type: TYPE_NORMAL
- en: It is how you distinguish yourself from others.
  prefs: []
  type: TYPE_NORMAL
- en: It creates your identity.
  prefs: []
  type: TYPE_NORMAL
- en: Your identity limits what information you notice, because you’ve only learned
    so much. You won’t notice certain things if you haven’t learned the information
    that bridges what it is with what you know. You won’t understand intermediate
    information if you haven’t learned beginner information. You can’t advance from
    level 1 to 3\. You are missing out on 99% of life for this reason.
  prefs: []
  type: TYPE_NORMAL
- en: If I was exposed to the information and environment that made me goth, I would
    notice certain likes and dislikes in music, people, clothing, work opportunities,
    outlooks on the future, and emotional states.
  prefs: []
  type: TYPE_NORMAL
- en: As a goth, I won’t notice or even care about profitable business opportunities
    to experiment with (assuming that I am the stereotypical loner goth who hates
    the world).
  prefs: []
  type: TYPE_NORMAL
- en: If I drowned myself in information to reprogram my identity over time, I would
    spot opportunities related to that identity.
  prefs: []
  type: TYPE_NORMAL
- en: This brings up the power of the internet.
  prefs: []
  type: TYPE_NORMAL
- en: You can tend a digital garden or be thrust into a digital swamp.
  prefs: []
  type: TYPE_NORMAL
- en: We’ve never had access to so much information, and I find it hard to believe
    that it isn’t shaping identities rapidly and for the worse.
  prefs: []
  type: TYPE_NORMAL
- en: When you log on to social media, the default action is to follow entertaining
    accounts and meme pages.
  prefs: []
  type: TYPE_NORMAL
- en: Almost all of them subject your mind to unwanted tenants that party like it’s
    a frat house. When the parents come home, they’re devastated by what they see.
  prefs: []
  type: TYPE_NORMAL
- en: Your awareness is the parents coming home after mindless ideas turn your mind
    into a swamp.
  prefs: []
  type: TYPE_NORMAL
- en: Become aware of this now.
  prefs: []
  type: TYPE_NORMAL
- en: '**Unfollow anyone who does not serve the conditioning of better standards in
    your life**. Even if it doesn’t seem like it, and no matter how much you justify
    it, the people you follow subtly influence your actions. Slowly, then all at once
    you become someone you may hate.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Take your time to follow valuable accounts.** Valuable accounts challenge
    your worldview, make you think outside the box, and educate you on the skills
    necessary to reach a higher quality of life.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This is not an overnight process.
  prefs: []
  type: TYPE_NORMAL
- en: You may not find the information useful at first.
  prefs: []
  type: TYPE_NORMAL
- en: It takes time to bridge specific ideas that lead to understanding.
  prefs: []
  type: TYPE_NORMAL
- en: You will probably find it boring… until it’s one of the most interesting things
    in the world.
  prefs: []
  type: TYPE_NORMAL
- en: Follow one account.
  prefs: []
  type: TYPE_NORMAL
- en: Let the algorithm do its work.
  prefs: []
  type: TYPE_NORMAL
- en: Follow accounts that reply to the first account’s posts.
  prefs: []
  type: TYPE_NORMAL
- en: With time, you will create an environment that is conducive to your growth.
  prefs: []
  type: TYPE_NORMAL
- en: '*The only difference between you and the person more successful than you is
    the consistent intention behind the information they consume.*'
  prefs: []
  type: TYPE_NORMAL
- en: “But what about taking action???”
  prefs: []
  type: TYPE_NORMAL
- en: You are acting every day.
  prefs: []
  type: TYPE_NORMAL
- en: Why?
  prefs: []
  type: TYPE_NORMAL
- en: Because your mind is programmed with the information conducive to those actions.
  prefs: []
  type: TYPE_NORMAL
- en: Your identity is forged by the information you’ve been fed, and that alone determines
    what you perceive as an opportunity to act.
  prefs: []
  type: TYPE_NORMAL
- en: Surround yourself with the right people and you can achieve anything you want.
  prefs: []
  type: TYPE_NORMAL
- en: The Path Of The Value Creator
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Why do people keep doing things they hate?
  prefs: []
  type: TYPE_NORMAL
- en: I’ve always wondered this.
  prefs: []
  type: TYPE_NORMAL
- en: Not like I’m a special little flower that never got stuck in the trap, but one
    who feels like he’s escaped and can view the situation from higher up on the mountain
    until he inevitably falls back down.
  prefs: []
  type: TYPE_NORMAL
- en: Praying for the weekend.
  prefs: []
  type: TYPE_NORMAL
- en: Dreading Monday morning.
  prefs: []
  type: TYPE_NORMAL
- en: Hiding who you are to make conversation with people you don’t like working with.
  prefs: []
  type: TYPE_NORMAL
- en: Using the internet as an escape.
  prefs: []
  type: TYPE_NORMAL
- en: Scrolling, clicking, shutting your mind off for just a bit longer, because when
    it’s on, you don’t like what it’s doing.
  prefs: []
  type: TYPE_NORMAL
- en: This is the life of the consumer.
  prefs: []
  type: TYPE_NORMAL
- en: The person who is used by the internet, rather than the one who uses it.
  prefs: []
  type: TYPE_NORMAL
- en: There’s no escaping this new world.
  prefs: []
  type: TYPE_NORMAL
- en: You can fight it or flow with it.
  prefs: []
  type: TYPE_NORMAL
- en: And while the internet is the problem, it’s also the solution.
  prefs: []
  type: TYPE_NORMAL
- en: You do not have to use the internet to do this, but there is no reason not to.
  prefs: []
  type: TYPE_NORMAL
- en: '*The last reason your life sucks is because you don’t contribute to humanity.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*You don’t contribute to humanity because you don’t have something so valuable
    that you can’t help but share it.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*You don’t have something valuable to offer because you are ignoring the problems
    in your life that beg a solution to be created.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*You are ignoring the problems in your life because you don’t have clarity
    on how to achieve the goal that will solve them.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*You don’t have clarity on how to achieve a goal because you have nothing to
    build. Nothing to frame and guide your learning.*'
  prefs: []
  type: TYPE_NORMAL
- en: A value creator is someone who has intention behind their inputs and outputs.
  prefs: []
  type: TYPE_NORMAL
- en: They treat their life like a science project.
  prefs: []
  type: TYPE_NORMAL
- en: They identify their own problems.
  prefs: []
  type: TYPE_NORMAL
- en: They educate themselves with the infinite resources available to them on the
    internet.
  prefs: []
  type: TYPE_NORMAL
- en: They test the solution on themselves and distribute their experiences with writing.
  prefs: []
  type: TYPE_NORMAL
- en: They package up the most helpful and streamlined solutions in the form of a
    product or service.
  prefs: []
  type: TYPE_NORMAL
- en: That is how they make a living by living with purpose.
  prefs: []
  type: TYPE_NORMAL
- en: Becoming a creator is the cure for overconsumption.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve discussed this numerous times in my previous letters. I also break it all
    down in my book, [The Art Of Focus](https://theartoffocusbox.com).
  prefs: []
  type: TYPE_NORMAL
- en: Writing is the vessel for distributing value.
  prefs: []
  type: TYPE_NORMAL
- en: I write on all platforms. I don’t care to compete with images of my fancy car
    or lifestyle. I gain a deep sense of fulfillment by using the internet as not
    only a place to curate good thoughts, but to organize them and share them with
    others with the ultimate upside of doing what I enjoy for a living. Something
    that’s in my control.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t about becoming famous.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t about building a massive following.
  prefs: []
  type: TYPE_NORMAL
- en: This is about distributing the value you have to offer in a place that can reach
    anyone with the opportunities that will change your life and career.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need a step-by-step course to join the online party.
  prefs: []
  type: TYPE_NORMAL
- en: Write what you want to write.
  prefs: []
  type: TYPE_NORMAL
- en: Talk to who you want to talk to.
  prefs: []
  type: TYPE_NORMAL
- en: Get your name in front of people by not being a ghost.
  prefs: []
  type: TYPE_NORMAL
- en: '[Get eyes on your writing](http://People have yet to realize the power of social
    media to get what you do in front of (potentially) billions of people with an
    internet connection.  Here''s what you need to know to get your name in people''s
    mouths: https://thedankoe.com/letters/how-to-actually-grow-on-social-media-what-they-dont-tell-you/)
    so it can spread more and more with time.'
  prefs: []
  type: TYPE_NORMAL
- en: If you really need an extra push, just observe the people you are following
    for long enough.
  prefs: []
  type: TYPE_NORMAL
- en: Observe what they write about.
  prefs: []
  type: TYPE_NORMAL
- en: Observe how they write it.
  prefs: []
  type: TYPE_NORMAL
- en: Observe who they interact with.
  prefs: []
  type: TYPE_NORMAL
- en: Observe what they sell to make a living.
  prefs: []
  type: TYPE_NORMAL
- en: Piece the dots together and begin emulating them.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t have an answer, look it up.
  prefs: []
  type: TYPE_NORMAL
- en: You won’t get all of your answers in an instant.
  prefs: []
  type: TYPE_NORMAL
- en: Be okay with that.
  prefs: []
  type: TYPE_NORMAL
- en: If you know you are meant for more, start acting like it.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have to write, but I’ve tried it all.
  prefs: []
  type: TYPE_NORMAL
