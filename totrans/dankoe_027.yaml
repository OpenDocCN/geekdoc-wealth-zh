- en: '[Check out Digital Economics.](https://digitaleconomics.school)'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '[查看数字经济学](https://digitaleconomics.school)'
- en: A YouTube video just went live titled “If You Are High Value, Start A One Person
    Business”
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 一段名为“如果你有价值，就开一家一个人企业”的YouTube视频刚刚上线。
- en: '[Watch it here.](https://youtu.be/sgXAQDTa3dA)'
  id: totrans-148
