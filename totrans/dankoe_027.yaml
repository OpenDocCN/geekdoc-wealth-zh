- en: How To Stop Feeling Lost, Overwhelmed, & Uncertain About The Future
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-cure-to-caring-what-people-think/](https://thedankoe.com/letters/the-cure-to-caring-what-people-think/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Problems are not personal.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: Problems are systemic.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Everyone has the same problems, and they will continue having the same problems.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: You will never escape them.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: You can only get better at how you perceive them, which leads to better decision-making
    (without being impacted by emotion).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-811">![](../Images/b4885b21aef4b80fd8bd105a6b5d7913.png)</picture>
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: In this letter, I want to bring a new perspective to problems in a way that
    helps you think, do, and be better.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: Anxiety, overwhelm, and stress are the result of psychic entropy.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: What is psychic entropy?
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: Psychic = of the mind.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: Entropy = systems tending toward disorder.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: Systems need consistent energy to thrive.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: If your mind is a room, and you don’t put energy toward cleaning that room (maintaining
    order), then the room will get dirty.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: One day without cleaning won’t be bad. But after a week? A month? A year? That,
    my friends, is what we call a pig sty.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: It’s no wonder that anxiety is rampant in our society. Nobody has cleaned their
    room for a year, and who wants to put in that much more energy? It’s much easier
    to clean your room after a day than it is after a year. The anxiety cycle continues
    because we *know* we need to clean our room, but we don’t. There is a gap between
    thought and action.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: That is exactly where problems occur.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: When there is a blockage of energy in the system that is our mind.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: Mental health is about *making sense, understanding, and clarity.*
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: If you let a compulsive and negative thought hijack a situation, you can’t see
    that situation for what it is.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: You get stuck in your head, thinking about the bad things that *could* happen.
    You pull that negative experience into the now and it influences your thoughts
    and actions.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: Attention breathes life into everything it touches.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: When you give your attention to a false reality that your mind creates, you
    act in a way that makes it *real.*
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: '*Do you think this will lead to beneficial outcomes in any situation?*'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Will it help your social, financial, or personal goals? Or will it distort them
    in a way that makes you retreat into comfort?
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: The Lesson
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-812">![](../Images/8ead21733feb7e0a96db1d0f9e833a45.png)</picture>
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: Understand that your problems are normal.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: They are fabrications of the mind that are made real through attention.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: Problems aren’t special, and when put into perspective, they become stupid.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: Why are you worried about your social media post getting zero engagement when
    a child in a 3rd world country has come to accept that he may not have water tomorrow?
    How is that child in a better mental space than you?
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: By gaining perspective, you create the space to zoom out from the problem that
    has engulfed your attention. The problem shrinks from the size of the world to
    the size of a bread crumb.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: You can *see* the problem for what it is, and through awareness, start correcting
    how you expend energy in your life to maintain mental order.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: Operate Within Your Own Reality
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: How do you maintain order in your mind to avoid the dreaded anxiety, overwhelm,
    and stress?
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: By creating your own reality.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: What the f*ck does that even mean, Dan?
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: Systems need energy.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: Your mind is a system.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: Mental energy is transferred through attention.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: “Where attention goes, energy flows.”
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: When you pay attention to the positive, life is positive.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: When you pay attention to the negative, life is negative.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: While this can be changed in an instant, you have to understand that you are
    a product of your past.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: Your mind started as a *near* blank slate. Over time, it was conditioned to
    operate in a way that is conducive to the progress of society and culture. There
    isn’t a way around this. It is how you learn.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: We adopt the beliefs of our parents, the mannerisms of our friends, and the
    problems of our culture as if they are our own.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: Again, this isn’t “bad” per se. But if you want more out of life (why else are
    you reading this newsletter?) then I can see you shaking your head left and right.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: It’s a common saying that “your thoughts create your reality,” and they do,
    but what makes your thoughts (your reality) good or bad?
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: If our beliefs are programmed into our mind, and our beliefs tend to automate
    our thoughts, what do we do then? Do we just accept what we have been taught and
    the emotional baggage that comes along with that?
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: Living in a reality that you were conditioned into is like being a puppet. An
    NPC. An emotional light switch at the control of anyone except for yourself.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: 'To reverse this effect, we must take control of the faculties we have full
    control over:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '**Your perspective** — the angle or position you are observing a situation.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Your perception** — how you interpret the situation. Is it problematic or
    beneficial?'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Combined, perspective + perception = focus.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: Focus = conscious attention.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: Focus can be controlled. Zoomed in, zoomed out, narrow, wide, open, closed.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: Focus is how you interact, interpret, and determine where you are going to place
    your precious energy.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: Focus is how you (and your mind) interacts with whatever external environment
    you are in.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: I am not talking about focus in the sense of deep work.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: I am talking about focus as the thing you are doing right now, for the entirety
    of your past, and the entirety of your future.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: Do not take this lightly.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: Attention is the only thing you can consciously control.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: 'An uncontrollable thought pops into your head and you have 2 options:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: 1) Let your attention be automatic and unconscious — which almost guarantees
    a negative interpretation of the thought, idea, or information that you are interpreting.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: 2) Observe your attention, how you react, and course correct by interpreting
    the situation that is conducive to your goals, which we will discuss below.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: When we make this process conscious, focus, throughout our lifetime, our quality
    of life skyrockets. Why? Because we slowly begin to realize that everything we
    could ever want is achieved by how we invest the currency of focus. Investments
    compound.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: 'The Cure To Anxiety: Always Act With Intention'
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Your reality is a frame.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: Perspective is the camera, perception is the lens.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: When your attention is fully focused IN your reality, all of your worries dissipate.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: 'We will discuss creating better relationships in another letter, but to keep
    it short: you create better relationships by finding a common perspective to share
    — a common reality where you can both give the most energy and solve problems
    that arise.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: Think about it, does a bodybuilder care if he brings chicken and rice to a family
    dinner? Yes, but only if he projects outside of his reality. That is, only if
    he loses control of his attention.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: If he remembers what is important to him, his goals, and perceives the situation
    correctly to avoid short term pleasure, then he won’t care. That is, he is focused.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: Does anything else actually matter?
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: Yes, but only if you give it attention. It will literally only exist — be held
    in your conscious awareness — if you give it attention.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: If you were unable to give it your attention, would it exist? Of course not,
    at least not to you.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: Bring your attention back to your reality if a rogue thought, opinion, or belief
    pops into your field of awareness (which is determined by the wideness of your
    focus).
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: In short, to rid yourself of anxiety, caring what others think, and psychic
    entropy — you must master your focus.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: You have to exchange robotic living for *intentional* living.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: From Latin *intentio:*
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: '*‘stretching, purpose’*'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: What are you ***stretching*** towards?
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: Can you tell me? Are you doing it on a daily basis, or only when you “feel”
    like it?
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: '*If you aren’t pursuing a life of purpose — stretching toward something bigger
    than yourself — then you are surviving**. An unconscious, mechanical, and automatic
    state of meaninglessness. A cog in the societal machine.*'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: Finally, how do we get out of this perpetual state of feeling lost, anxious,
    and having no sense of control over our lives?
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: By building, constructing, and actively creating the future that you want.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: Please understand that these words are intentional.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: You do not “build” a house in a day.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: You do not “contruct” a life without the resources to do so.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: You may not even see the building emerge before the foundation has been laid.
    But once the skeleton of the house reveals itself, that is when motivation becomes
    automatic.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what you need to do:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Set A Meaningful Goal**'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: This is what trips most people up.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: A system needs an *outcome.*
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: You need to have something to *put energy towards*.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: If you aren’t making progress in any domain of your life (yes, even the spiritual
    domain by ‘doing nothing’ or taking some rest) then energy isn’t flowing properly.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: Motivation comes from movement.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: Poorly contructed houses are destroyed, then rebuilt.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: “But Dan, how do I create a meaningful goal?”
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: First, don’t hold **false expectations about it being easy, immediate, or effortless.**
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t know what to do, then the literal only option is to **try new things**.
    Nobody can tell you what is meaningful for you.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: Try that business model.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: Learn about that weird interest of yours.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: Take someones advice (that you respect) and experiment with it.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: Do ANYTHING that isn’t scrolling on your phone and complaining about your situation
    in life.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: Given time, you will find something that you want to go “all in” on.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: How do you know when it’s time to go all in?
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: You won’t be able to help yourself.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: If you aren’t living in a perpetual state of distraction, the excitement of
    that goal will propel you into action.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Create A System**'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t have a plan, don’t expect results that aren’t driven by luck.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: The highest-paid individuals are the innovators, strategists, and visionaries
    of the world. Not the manual labor workers.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: Become a strategist.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: Sit down for 30 minutes tonight with a journal.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: DRAW out your future. Write exactly what you are going to do to get there.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: Now, understand that most goals are achieved with a system.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: A process.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: A process is repetitive, based on the fundamentals, and improved with experience.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: What levers are you going to move on a daily, weekly, and monthly basis?
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: Write it down.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: Because then, and only then, can you work to improve that process.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: You can’t improve something that doesn’t exist.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: So create something that you can improve.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Channel** **All Of** **Your Energy Toward That Goal**'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: Energy comes in two forms, extrinsic and intrinsic.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: By working toward a goal that excites you, you will be fueled by good dopamine,
    as dopamine comes from the desire to actualize your vision.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: This is intrinsic energy. If you lose the initial excitement for your goal,
    you may need to remind yourself why you started in the first place.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: The next form of energy, extrinsic, comes from channeling all of your *thoughts,
    emotions, and actions* toward that goal.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: Reframe *everything* you encounter to be seen from the perspective of your goal.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: Reframing = transmutation.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: There are always 2 sides to the same coin. Positive and negative.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: Most people conveniently leave out the positive so they have an excuse to stop
    pursuing the goal.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: You have to take control of your attention.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: The best way to do this is by asking “why” in the context of intention.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: Why are you eating that bland yet energizing food? To achieve your physique
    goals.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: Why are you writing posts that will get zero traction at the start? To achieve
    your financial freedom goals.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: Why are you talking to a new person even if you look “out of place” in public?
    To achieve your social goals.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: Mental. Order.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t have an answer to “why” you are doing what you are doing, then
    why are you doing it?
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道自己为什么要做正在做的事情，那你为什么要做它呢？
- en: It doesn’t make sense. Mental health is about making sense.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 这没有意义。心理健康是关于找到意义的。
- en: 'I ask again:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 我再次提问：
- en: What are you *stretching* towards?
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 你正朝着什么方向努力？
- en: This alone will bring the clarity necessary to avoid the downward spiral that
    comes from giving negative aspects of your life too much attention.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 仅此一项就能带来避免因过度关注生活中负面方面而陷入下滑的清晰度。
