- en: The One-Person Business Roadmap (99% Of Creators Make This Mistake)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-one-person-business-roadmap-99-of-creators-make-this-mistake/](https://thedankoe.com/letters/the-one-person-business-roadmap-99-of-creators-make-this-mistake/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Before we begin: this letter is one of many in the one-person business series.
    Here are a few more.'
  prefs: []
  type: TYPE_NORMAL
- en: '[The One-Person Business Model (How To Productize Yourself)](https://thedankoe.com/the-one-person-business-model-how-to-monetize-yourself/)'
  prefs: []
  type: TYPE_NORMAL
- en: '[The Rise Of The Value Creator (A Career Path For Polymaths & Self Improvers)](https://thedankoe.com/the-rise-of-the-value-creator-a-new-career-path/)'
  prefs: []
  type: TYPE_NORMAL
- en: '[11 Insights I Wish I Knew As A Creator](https://thedankoe.com/11-insights-i-wish-i-knew-to-grow-my-one-person-business/)'
  prefs: []
  type: TYPE_NORMAL
- en: '[You Have A $100,000 Product In Your Head](https://thedankoe.com/you-have-100000-of-knowledge-trapped-in-your-brain/)'
  prefs: []
  type: TYPE_NORMAL
- en: And lastly, all of these are just interesting posts. They’re valuable, yes,
    but the real value is in the systems I’ve refined that maintain my little one-person
    business that pulls in +/- $100,000 a month.
  prefs: []
  type: TYPE_NORMAL
- en: If you want a Notion dashboard with these systems to manage your business (with
    full-fledged education on brand, content, product, marketing, and promotions),
    then you may enjoy Digital Economics.
  prefs: []
  type: TYPE_NORMAL
- en: '[Productize yourself for the new economy by enrolling here.](https://digitaleconomics.school)'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: If you’re building a one-person creator business, pay attention.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve been in this game for 3 years now.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve seen accounts small and large disappear off the map.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve seen small accounts make $100K a month.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve seen large accounts make $1K a month.
  prefs: []
  type: TYPE_NORMAL
- en: Most people see this and think of one or the other as bad.
  prefs: []
  type: TYPE_NORMAL
- en: That they should stick with a high-priced service and never have enough time
    on their hands, or gain a lot of followers and never make enough money to survive.
  prefs: []
  type: TYPE_NORMAL
- en: There is a crucial piece of the solopreneurship puzzle that nobody talks about.
  prefs: []
  type: TYPE_NORMAL
- en: While most people think you have to sacrifice either time or money, I’m here
    to tell you that you can have both.
  prefs: []
  type: TYPE_NORMAL
- en: How?
  prefs: []
  type: TYPE_NORMAL
- en: Digital Leverage.
  prefs: []
  type: TYPE_NORMAL
- en: Let me paint a picture of what I mean.
  prefs: []
  type: TYPE_NORMAL
- en: 'With 500K+ followers and a solid reputation, I can:'
  prefs: []
  type: TYPE_NORMAL
- en: Reach out to almost anyone, even celebrities, and get a response.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Promote a product, service, or message and have it reach 10x more than the followers
    I have.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Increase or decrease my income within a specific range with a strategic investment
    of time or money.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If I had to make $50K in 24 hours, I have the leverage to do so. Hell, if I
    *really* tried, I could make $100K in 24 hours without owing any favors or money
    to anyone, but I’d probably have to cross some moral barriers. That doesn’t feel
    good.
  prefs: []
  type: TYPE_NORMAL
- en: And on special occasions, like Black Friday weekend, my little creator business
    pulled in $139,000 in revenue.
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-908">![](../Images/1e295380b0c3878bcc25b473ca135aec.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: This wasn’t always an option, and definitely wasn’t an option before I had a
    lot of followers.
  prefs: []
  type: TYPE_NORMAL
- en: JK Molina talks about how “likes ain’t cash,” which is true, but cash alone
    ain’t leverage.
  prefs: []
  type: TYPE_NORMAL
- en: Now, of course, as with anything I talk about, this is goal dependent.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to create content around your interests, not hire employees, and
    unlock an abundance of time & money… this is for you.
  prefs: []
  type: TYPE_NORMAL
- en: If your goals are different, don’t let a few flashy screenshots distract you
    from carving your own path.
  prefs: []
  type: TYPE_NORMAL
- en: The Mental Monopoly
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Internet enables eight billion monopolies. – Naval
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: To make things simple, your “personal brand” is based on what you want out of
    life.
  prefs: []
  type: TYPE_NORMAL
- en: The thing you are *leading* your *followers* toward.
  prefs: []
  type: TYPE_NORMAL
- en: Everyone has the same desires.
  prefs: []
  type: TYPE_NORMAL
- en: 'They’re all based around the eternal markets:'
  prefs: []
  type: TYPE_NORMAL
- en: Health
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Wealth
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Relationships
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Bonus: Happiness'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The first 3 are survival or actualization based (see: Maslow’s Hierarchy Of
    Needs).'
  prefs: []
  type: TYPE_NORMAL
- en: 'The last is transcendence based (see: the next phase of Maslow’s Hierarchy
    that he had plans to complete before his death).'
  prefs: []
  type: TYPE_NORMAL
- en: These markets are where burning problems exist. The ones that are relevant,
    profitable, and evergreen. Everyone has either conscious or subconscious goals
    relating to these markets.
  prefs: []
  type: TYPE_NORMAL
- en: Now, we don’t want to be a normal old “personal brand,” we want to be a personal
    monopoly.
  prefs: []
  type: TYPE_NORMAL
- en: '*Your long-term success as a creator depends on the mental monopoly you create
    that occupies a small chunk of the collective consciousness.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Irreplaceable* is a good word.'
  prefs: []
  type: TYPE_NORMAL
- en: How do we become irreplaceable?
  prefs: []
  type: TYPE_NORMAL
- en: By pursuing your genuine curiosity.
  prefs: []
  type: TYPE_NORMAL
- en: That’s what makes you, you.
  prefs: []
  type: TYPE_NORMAL
- en: And if you are the only ‘you’ on this planet, your *niche of one* is already
    carved out.
  prefs: []
  type: TYPE_NORMAL
- en: But, most people can’t pursue their curiosity. At least not consistently.
  prefs: []
  type: TYPE_NORMAL
- en: Why?
  prefs: []
  type: TYPE_NORMAL
- en: Because their attention is being manhandled by their base psychological needs.
  prefs: []
  type: TYPE_NORMAL
- en: Self-actualization is a need, not a want, for living a good life.
  prefs: []
  type: TYPE_NORMAL
- en: '*Your future isn’t about competition with others, it’s about competition with
    your distracted mind.*'
  prefs: []
  type: TYPE_NORMAL
- en: Meaning, an exceptional future belongs to those that can master their survival,
    pursue their genuine curiosity, and pass down what they learned.
  prefs: []
  type: TYPE_NORMAL
- en: 'So:'
  prefs: []
  type: TYPE_NORMAL
- en: Improve yourself
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Solve your own problems
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Master your survival
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Document your journey
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Pursue your curiosity and separate yourself from the crowd
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: How you do this is unique to you.
  prefs: []
  type: TYPE_NORMAL
- en: If your goal is financial freedom, your path will not be the same as others.
    Your *story* is what turns you into a niche of one.
  prefs: []
  type: TYPE_NORMAL
- en: If you and I both achieved financial freedom through different skills, interests,
    and lessons learned through struggle, we would have a drastically different story
    to tell.
  prefs: []
  type: TYPE_NORMAL
- en: This story is valuable to the generation under us, and is crucial for your brand
    success.
  prefs: []
  type: TYPE_NORMAL
- en: Why is this important?
  prefs: []
  type: TYPE_NORMAL
- en: Because that is what we are here to do.
  prefs: []
  type: TYPE_NORMAL
- en: Self-actualize and transcend.
  prefs: []
  type: TYPE_NORMAL
- en: Pass down your lessons.
  prefs: []
  type: TYPE_NORMAL
- en: '*Help others get there faster.*'
  prefs: []
  type: TYPE_NORMAL
- en: Do good for humanity and receive good back.
  prefs: []
  type: TYPE_NORMAL
- en: If enough people do this, imagine what kind of world you can help create.
  prefs: []
  type: TYPE_NORMAL
- en: If more people solve their base survival needs, they open up room for creative
    problem solving.
  prefs: []
  type: TYPE_NORMAL
- en: '*Creativity, innovation, and discovery through the pursuit of curiosity are
    what will take us into the next phase of evolution, whatever it may be.*'
  prefs: []
  type: TYPE_NORMAL
- en: Distribution = Freedom
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Build distribution, then build whatever you want – Jack Butcher
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “Distribution,” from the lens of a creator business, is the *potential traffic*
    you can send to a product, service, or crevice of the internet.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are 3 types of distribution:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Built, borrowed, and bought.*'
  prefs: []
  type: TYPE_NORMAL
- en: You **build** distribution by growing an audience with internet content. Then,
    you can (and should) take it a step further by “de-platforming” your audience.
  prefs: []
  type: TYPE_NORMAL
- en: You de-platform by funneling your audience to a community or newsletter. These
    can be free or paid.
  prefs: []
  type: TYPE_NORMAL
- en: Social media platforms can go *poof* at any time. Your account can get suspended,
    you can get canceled, or you may just hate social media enough to leave.
  prefs: []
  type: TYPE_NORMAL
- en: But, they can’t take an off-platform community or email list away from you.
    And, these are your most dedicated readers, so it’s better to give them the most
    value and attention anyway.
  prefs: []
  type: TYPE_NORMAL
- en: You **borrow** distribution by leveraging other people’s audience, community,
    or newsletter.
  prefs: []
  type: TYPE_NORMAL
- en: You can be hosted on their podcast and plug your offers.
  prefs: []
  type: TYPE_NORMAL
- en: Or, your ideas can be so unique that they mention you on their podcast without
    you being there. They can give credit to your ideas in their posts, newsletters,
    and even a full-fledged book at times.
  prefs: []
  type: TYPE_NORMAL
- en: This is the game you eventually want to play. Make your ideas so contagious
    that your distribution continues to grow without any manual effort.
  prefs: []
  type: TYPE_NORMAL
- en: Let your ideas live in peoples’ heads rent-free.
  prefs: []
  type: TYPE_NORMAL
- en: You **buy** distribution in many different ways.
  prefs: []
  type: TYPE_NORMAL
- en: The various options for paid ads are the obvious ones, but not the most powerful.
  prefs: []
  type: TYPE_NORMAL
- en: You can buy sponsorship spots on podcasts, newsletters, and YouTube videos.
  prefs: []
  type: TYPE_NORMAL
- en: You can also buy paid shares like retweets, Instagram stories, or even “watch
    next” slots on YouTube videos. I haven’t tried this one for those wondering, my
    recent YouTube growth happened out of nowhere (but I’m not opposed to testing
    it out).
  prefs: []
  type: TYPE_NORMAL
- en: The last one, paid growth, is my favorite because it usually results in a large
    number of engaged people following you. You don’t tell them to follow you, they
    follow because your content is good. This compounds with time and crosses over
    with “built” distribution.
  prefs: []
  type: TYPE_NORMAL
- en: The common objection to this is “cheating,” which is usually spouted by those
    that aren’t in the creator game. If your brand, content, or product suck you’re
    not going to grow, sell, or be seen as any kind of authority.
  prefs: []
  type: TYPE_NORMAL
- en: Bought traffic compounds the results, ideas, and time in the game you already
    have.
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-909">![](../Images/c389abcf5bac555d21ed0773b4cc4256.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: That image is my current distribution network.
  prefs: []
  type: TYPE_NORMAL
- en: I have 500K+ followers across multiple platforms, 40K+ newsletter subscribers,
    and a product stack that allows me to comfortably fund my desired lifestyle.
  prefs: []
  type: TYPE_NORMAL
- en: 'One thing that way too many people forget:'
  prefs: []
  type: TYPE_NORMAL
- en: Your audience is not just *your* audience.
  prefs: []
  type: TYPE_NORMAL
- en: '*The Network Effect* is extremely powerful.'
  prefs: []
  type: TYPE_NORMAL
- en: I don’t only have access to my following.
  prefs: []
  type: TYPE_NORMAL
- en: I have indirect access to the followers of every person following me – many
    of those people being micro-celebrities or others with 100K+ audiences.
  prefs: []
  type: TYPE_NORMAL
- en: I also have access to those that people share my content with digitally or by
    word of mouth.
  prefs: []
  type: TYPE_NORMAL
- en: And, I have access to the “followers” of everyone that follows me. To a lesser
    extent, of course.
  prefs: []
  type: TYPE_NORMAL
- en: The point being, my ideas have the small potential of reaching any of the 4.5
    billion people on the internet if (1) I’m consistent (2) I prioritize creative
    ideas that stick.
  prefs: []
  type: TYPE_NORMAL
- en: With 500K followers, I have indirect access to 10X more potential traffic. The
    same holds true for smaller followings, they just don’t realize it.
  prefs: []
  type: TYPE_NORMAL
- en: Products That Don’t Require Time
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We will discuss what product or service style you should be focused on in the
    next section, but let’s understand this:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Your income, lifestyle, and freedom are limited by the amount of time your
    products take to fulfill.*'
  prefs: []
  type: TYPE_NORMAL
- en: With a projected 62% of labor jobs being threatened by automation in the next
    decade, it makes sense that the highest-paid individuals will be those that prioritize
    selling their knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: When you have an absurd amount of distribution, but only have a service that
    requires your precious time, it’s not going to be fun.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have a product in place that can sell, fulfill, and maintain itself
    while you sleep. If you have an influx of traffic from someone else mentioning
    your ideas, like on a podcast, you are flushing money (and more leverage) down
    the drain.
  prefs: []
  type: TYPE_NORMAL
- en: '**Another thing:**'
  prefs: []
  type: TYPE_NORMAL
- en: The more people you help, the more leverage you have.
  prefs: []
  type: TYPE_NORMAL
- en: If people dig into your deep, valuable, and actionable ideas, systems, and advice
    – you hold more mental real estate.
  prefs: []
  type: TYPE_NORMAL
- en: People that only sell high-ticket coaching, freelancing, or consulting don’t
    have this power.
  prefs: []
  type: TYPE_NORMAL
- en: Like how you will remember the author of your favorite book for the rest of
    your life.
  prefs: []
  type: TYPE_NORMAL
- en: Books, digital products, and high-value long-form content have a higher potential
    impact than servicing a few select people with freelancing or coaching.
  prefs: []
  type: TYPE_NORMAL
- en: The more impact you have on the world – the more attention you *hold –* the
    more leverage you have.
  prefs: []
  type: TYPE_NORMAL
- en: Internet Content Is Idea Warfare On Mental Real Estate
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Most one-person business beginners don’t see content for what it is.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not about catching attention.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not about getting the most followers.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not about having the most engagement.
  prefs: []
  type: TYPE_NORMAL
- en: It’s about valuable ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Valuable ideas = relevant, understandable, and actionable to the point of them
    being spread without personal effort.
  prefs: []
  type: TYPE_NORMAL
- en: The more perspective-shifting ideas you put out into the world, the more mental
    real estate you occupy.
  prefs: []
  type: TYPE_NORMAL
- en: 'The big problem:'
  prefs: []
  type: TYPE_NORMAL
- en: It’s common (and good) advice to steal high-performing ideas from other creators.
  prefs: []
  type: TYPE_NORMAL
- en: I do this all the time.
  prefs: []
  type: TYPE_NORMAL
- en: 'I steal ideas from:'
  prefs: []
  type: TYPE_NORMAL
- en: '**High performing YouTube videos** – go to a channel you aspire to be like
    and filter their videos by most popular.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Medium articles** – Medium’s algorithm gives you content based around your
    interests. You can get some incredible ideas just by skimming the home page.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Top tweets** – with Twemex or TweetHunter, you can filter any account’s tweets
    and see what their highest performing content is.'
  prefs: []
  type: TYPE_NORMAL
- en: Those are a few common examples. The problem is a lack of balance, testing,
    and turning those ideas into your own through direct experience.
  prefs: []
  type: TYPE_NORMAL
- en: I talk about this more in [2 Hour Writer](https://2hourwriter.com).
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s understand the evolution of your journey.
  prefs: []
  type: TYPE_NORMAL
- en: As with all domains of life, there are developmental stages.
  prefs: []
  type: TYPE_NORMAL
- en: These stages have a certain set of opportunities available to them in alignment
    with their skills, results, and experience.
  prefs: []
  type: TYPE_NORMAL
- en: A stage 1 creator can’t send out an email and make $50K on demand like a stage
    3 can. Nor can they DM anyone and get a response, have their choice of business
    opportunities in their DMs, or have the freedom to disappear for 3 months because
    they don’t have clients to service.
  prefs: []
  type: TYPE_NORMAL
- en: You develop yourself and your business by [consistently pushing the boundaries
    of what you know](https://thedankoe.com/become-a-free-thinker-if-you-want-creative-business-success/).
  prefs: []
  type: TYPE_NORMAL
- en: '**Preface**: All of these stages are made up from my observation over the years.
    They aren’t set in stone and don’t apply to everyone. And, this mainly applies
    to one person creator businesses that aren’t starting their journey with prior
    business success.'
  prefs: []
  type: TYPE_NORMAL
- en: Stage 1 Creators (Low Leverage)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is where every single new creator starts.
  prefs: []
  type: TYPE_NORMAL
- en: Social media growth is formulaic. These stages will help you understand it more.
  prefs: []
  type: TYPE_NORMAL
- en: Most people think they can’t grow an audience, but they look at their favorite
    creator’s content, know they have the same knowledge, and don’t realize that social
    media is a *skill* that can be learned like any other with practice and persistence.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what to focus on in Stage 1 of your creator journey:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) High Performing Content**'
  prefs: []
  type: TYPE_NORMAL
- en: You need to understand what kind of content actually leads to growth.
  prefs: []
  type: TYPE_NORMAL
- en: You can’t just start putting out whatever you feel like posting and expect it
    to do well because you are clever and artsy.
  prefs: []
  type: TYPE_NORMAL
- en: If you aren’t growing, it’s not the readers’ fault for not understanding your
    writing, it’s your fault for not writing in an understandable way.
  prefs: []
  type: TYPE_NORMAL
- en: Study popular tweets, viral content, and attention-grabbing headlines. Immerse
    yourself in them, deconstruct why they work, and start testing what you learn
    in your own content.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Content Templates As Training Wheels**'
  prefs: []
  type: TYPE_NORMAL
- en: Almost every single social media course has content templates that you can follow.
    Use these as training wheels.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a template that I reuse on a daily basis. It’s second nature for me
    now to structure my writing in a digestible, shareable, and understandable way:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Trust me when I say:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Writing down your goals
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Refining them into small tasks
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Prioritizing each task daily
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Will make it 100x easier to actually achieve your goals
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Relying on your memory isn't reliable, distractions are all around you
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [May 29, 2020](https://twitter.com/thedankoe/status/1266299534893711360?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: When you are studying high performing content, pay close attention to how it’s
    structured.
  prefs: []
  type: TYPE_NORMAL
- en: Hook > value > conclusion.
  prefs: []
  type: TYPE_NORMAL
- en: Practice plugging your ideas into these.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Short Form Growth & Idea Validation**'
  prefs: []
  type: TYPE_NORMAL
- en: Tweets, reels, TikToks, shorts, Instagram posts, and LinkedIn posts are all
    styles of short-form content.
  prefs: []
  type: TYPE_NORMAL
- en: Social media platforms should be treated as “top of funnel” growth mechanisms
    at the beginning. You can always start testing authority and authenticity style
    content, but you have to grow.
  prefs: []
  type: TYPE_NORMAL
- en: If you can master short form, you will have a solid base when it’s time to evolve
    into stages 2 and 3.
  prefs: []
  type: TYPE_NORMAL
- en: '**What happens if you get trapped in this stage?**'
  prefs: []
  type: TYPE_NORMAL
- en: You end up as a brand with high followers but zero loyalty.
  prefs: []
  type: TYPE_NORMAL
- en: If you were to disappear one day, nobody would ask themselves “Hey, where’d
    Dan go?”
  prefs: []
  type: TYPE_NORMAL
- en: Their obsession with engagement and basic advice leads to an account with low
    monetization potential.
  prefs: []
  type: TYPE_NORMAL
- en: Full control over your income, lifestyle, and opportunities you take is not
    an option.
  prefs: []
  type: TYPE_NORMAL
- en: They act out of scarcity because they haven’t mastered their survival through
    self-development.
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 2 Creators (Medium Leverage)**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once you hit 10K followers or so, you should feel like you have the whole social
    media growth game down.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have to wait until this point to monetize, and [I actually recommend
    not to wait](https://thedankoe.com/the-one-person-business-model-how-to-monetize-yourself/),
    but this is where the real money will come in.
  prefs: []
  type: TYPE_NORMAL
- en: At 500 followers, I had a $3k month
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: At 10,000 followers, I had a $10k month
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: At 50,000 followers, I had a $50k month
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: At 200,000 followers, I had a $150k month
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If this shocks you, good.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If it doesn’t, props.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Hopefully it some break out of their limiting money beliefs.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [November 27, 2022](https://twitter.com/thedankoe/status/1596895970519924738?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you aren’t making $1 per 1 follower, you can upskill yourself to reach that
    baseline.
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Learn Direct Response**'
  prefs: []
  type: TYPE_NORMAL
- en: Direct response marketing or copywriting has the purpose of persuading people
    to convert immediately. Sales and offer creation are also lumped into this – worth
    studying.
  prefs: []
  type: TYPE_NORMAL
- en: This skill is what makes people like Alex Hormozi rich before they go all in
    on brand by giving everything away for free. You should give everything away for
    free, but over the course of years via long form content. Aggregate the actionable
    points in the [form of a system into a paid product](https://thedankoe.com/you-have-100000-of-knowledge-trapped-in-your-brain/).
  prefs: []
  type: TYPE_NORMAL
- en: This is the same story with someone like Justin Welsh and many others in the
    social media space. They start out with a service business, burn through direct
    response books like Ca$hvertising by Whitman, and even when they pivot into a
    more ‘authentic’ voice – the advertising principles still form their marketing
    and content.
  prefs: []
  type: TYPE_NORMAL
- en: By learning direct response, you understand buyer psychology on a deeper level,
    and will see a drastic improvement in your offers, conversions, and baseline income.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Build A High Ticket Offer**'
  prefs: []
  type: TYPE_NORMAL
- en: When you are between 10,000 to 80,000 followers, you don’t have the time in
    the game to pull in big money without a high ticket offer.
  prefs: []
  type: TYPE_NORMAL
- en: (I am saying this from the context of starting a creator business without any
    prior business experience).
  prefs: []
  type: TYPE_NORMAL
- en: This is where freelancing, consulting, or coaching comes into play based around
    your interests and skill set. I talk about creating a [Minimum Viable Offer to
    iterate on here](https://thedankoe.com/the-one-person-business-model-how-to-monetize-yourself/).
  prefs: []
  type: TYPE_NORMAL
- en: At this stage, you have ample traffic – and hopefully skill – to land 4+ clients
    at $2500-$5000 per month.
  prefs: []
  type: TYPE_NORMAL
- en: All of these numbers are *estimates* depending on your true skill level backed
    by real world experience, not the skill level you think you are at.
  prefs: []
  type: TYPE_NORMAL
- en: Focus on getting results, refining your unique system, and preparing yourself
    to evolve into stage 3.
  prefs: []
  type: TYPE_NORMAL
- en: By the way, I have strategies and roadmaps for every single thing we are talking
    about here inside Modern Mastery. [Readers can join for $5.](https://modernmastery.co/letter)
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Branch Into Long Form Content**'
  prefs: []
  type: TYPE_NORMAL
- en: By now, you’ve grown enough to know what tweets, posts, or ideas do well.
  prefs: []
  type: TYPE_NORMAL
- en: You want to start dissecting these ideas and creating depth behind them.
  prefs: []
  type: TYPE_NORMAL
- en: You do this by turning your validated ideas into long-form podcasts, newsletters,
    or YouTube videos.
  prefs: []
  type: TYPE_NORMAL
- en: The depth you create behind these ideas is what will turn followers into die-hard
    fans. And, you will find new ways of approaching the ideas to start creating your
    mental monopoly.
  prefs: []
  type: TYPE_NORMAL
- en: I would recommend starting with a newsletter.
  prefs: []
  type: TYPE_NORMAL
- en: Long-form content doesn’t disappear. You can stack up 20+ newsletters and repurpose
    them to other platforms later.
  prefs: []
  type: TYPE_NORMAL
- en: '**What happens if you get trapped in this stage?**'
  prefs: []
  type: TYPE_NORMAL
- en: You build yourself into another 9-5.
  prefs: []
  type: TYPE_NORMAL
- en: You’ve mastered your survival, but haven’t leaned into your curiosity.
  prefs: []
  type: TYPE_NORMAL
- en: You have just enough clients to make a living, but not enough time to utilize
    the leverage you’ve built.
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 3 Creators (High Leverage)**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Many don’t reach this stage.
  prefs: []
  type: TYPE_NORMAL
- en: Why?
  prefs: []
  type: TYPE_NORMAL
- en: Because it’s impossible without survival mastery, ego development, and multidisciplinary
    study.
  prefs: []
  type: TYPE_NORMAL
- en: People get locked into the “one thing” mindset (which isn’t bad at the beginning),
    build themselves into a high-ticket client cycle, and don’t pursue complementary
    interests and skills.
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Productize, Build A Network, & Leverage Results**'
  prefs: []
  type: TYPE_NORMAL
- en: By now, you may have already created a product. If so, good work.
  prefs: []
  type: TYPE_NORMAL
- en: But, by now, you definitely should have results from your service.
  prefs: []
  type: TYPE_NORMAL
- en: You’ve iterated on your system for getting results, have gotten better results,
    and can now leverage those results everywhere.
  prefs: []
  type: TYPE_NORMAL
- en: 'My advice:'
  prefs: []
  type: TYPE_NORMAL
- en: Take your system and method for getting results
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reposition it towards a broader audience (beginner level)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use your results as initial social proof to have a 6 figure launch
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you want to know more about productizing your knowledge, [I wrote about it
    here](https://thedankoe.com/you-have-100000-of-knowledge-trapped-in-your-brain/).
  prefs: []
  type: TYPE_NORMAL
- en: The social proof you’ve acquired by having a high follower count and good ideas
    can get you in the door with other big players.
  prefs: []
  type: TYPE_NORMAL
- en: DM them. Offer to help them however you can. Eventually, you will have 5-10
    confidants that you can rely on for cross-platform growth and business opportunities.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Refine Your Ideas & Diversify**'
  prefs: []
  type: TYPE_NORMAL
- en: 'The graphic above that illustrated my distribution network had 3 key areas:
    growth, authenticity, and authority.'
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-910">![](../Images/32f6ea86869ae7f1ce80bbd26c381ff2.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Growth comes from short-form content.
  prefs: []
  type: TYPE_NORMAL
- en: Authority comes from product or service results.
  prefs: []
  type: TYPE_NORMAL
- en: Authenticity comes from long-form big idea synthesis.
  prefs: []
  type: TYPE_NORMAL
- en: And, of course, they all overlap each other. Authority and authenticity can
    apply to short-form content, etc, etc.
  prefs: []
  type: TYPE_NORMAL
- en: In stage one, 80%+ of your content should be focused on growth.
  prefs: []
  type: TYPE_NORMAL
- en: In stage two, you start to incorporate more authority content around the product
    or service you are selling. You start to dabble in authenticity with long form.
  prefs: []
  type: TYPE_NORMAL
- en: In stage 3, it’s time to double down on your best ideas and use them to grow
    on other platforms.
  prefs: []
  type: TYPE_NORMAL
- en: 'I grew very quickly on Instagram and LinkedIn by:'
  prefs: []
  type: TYPE_NORMAL
- en: Reaching out to big accounts on those platforms
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Showing them I had value (with my following) and time in the game
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Offering an exchange of services, shares, or money to help me grow in the most
    optimal way possible
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I had content that had already performed well.
  prefs: []
  type: TYPE_NORMAL
- en: So, when I approached a new platform with a solidified growth strategy… all
    I had to do was use my past content, get it in front of my network’s network,
    and grow fast.
  prefs: []
  type: TYPE_NORMAL
- en: '**3)** **Prioritize** **Long Form Content**'
  prefs: []
  type: TYPE_NORMAL
- en: Once you reach a point of high income and high followers, it’s time to put a
    heavy emphasis on being a synthesizer.
  prefs: []
  type: TYPE_NORMAL
- en: You can do this at the start, of course, but this is where it becomes very important
    for the future of your brand.
  prefs: []
  type: TYPE_NORMAL
- en: This is best done with long form.
  prefs: []
  type: TYPE_NORMAL
- en: 'In short, you:'
  prefs: []
  type: TYPE_NORMAL
- en: Pursue what interests you
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Study the *big-picture ideas of those interests*
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Note patterns based on your experience
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Connect the dots with long-form content
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create your own versions of concepts, processes, and philosophies
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Take pieces of that long form for your short-form content
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This is where business becomes extremely fulfilling.
  prefs: []
  type: TYPE_NORMAL
- en: This is how I created my own concept of the “one-person business” that gives
    a novel approach to all of this stuff. Others talk about one-person business all
    the time, but it’s through the same watered-down lens that isn’t very interesting.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve also named processes like Intelligent Imitation, The Unknown, and Tactical
    Stress.
  prefs: []
  type: TYPE_NORMAL
- en: This comes from applying any of my interests – like philosophy, neurobiology,
    and spirituality – to business. I have enough exposure to all of those domains
    that I can note common patterns.
  prefs: []
  type: TYPE_NORMAL
- en: To Wrap Things Up
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As to methods there may be a million and then some, but principles are few.
    The man who grasps principles can successfully select his own methods. – Harrington
    Emerson
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This entire letter is *my* method based on principles.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t take it as law.
  prefs: []
  type: TYPE_NORMAL
- en: This is not the only way of doing business, clearly.
  prefs: []
  type: TYPE_NORMAL
- en: Try things out, experiment, and create your own way of doing things.
  prefs: []
  type: TYPE_NORMAL
- en: The main lesson of this letter should be what I always preach.
  prefs: []
  type: TYPE_NORMAL
- en: Never stop learning.
  prefs: []
  type: TYPE_NORMAL
- en: Never stop building.
  prefs: []
  type: TYPE_NORMAL
- en: Never stop evolving.
  prefs: []
  type: TYPE_NORMAL
- en: Distraction and comfort are the only things that can get in your way.
  prefs: []
  type: TYPE_NORMAL
- en: Self-actualize > self-monetize > self-transcend.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan Koe
  prefs: []
  type: TYPE_NORMAL
