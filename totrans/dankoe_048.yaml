- en: There Will Only Be 1 Career Path In The Future
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 未来将只有一条职业道路。
- en: 原文：[https://thedankoe.com/letters/the-future-of-work-will-be-play/](https://thedankoe.com/letters/the-future-of-work-will-be-play/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/the-future-of-work-will-be-play/](https://thedankoe.com/letters/the-future-of-work-will-be-play/)
- en: This past month, I have realized a common theme in my life (and the lives of
    many others).
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的一个月里，我意识到我生活中（以及许多其他人生活中）的一个共同主题。
- en: '*Obsession*.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*痴迷*。'
- en: As a kid, I was obsessed with finding a better way of living. I don’t know what
    sparked this. **All I know is that I was a silent observer.** Everywhere we went,
    I paid close attention to people’s actions. Not in a judgemental way, but in a
    discerning way.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一个孩子，我痴迷于找到更好的生活方式。我不知道是什么激发了我。**我所知道的是，我是一个沉默的观察者**。无论我们去哪里，我都会密切关注人们的行为。不是评判性的，而是辨别性的。
- en: How did that person get to that point in life? Why did they look that way? Was
    it because they were going through the McDonald’s drive-thru every morning? 2
    sausage and egg McMuffins with a large iced coffee (and don’t forget the 3 extra
    pumps!)? Many things didn’t sit well with me.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 那个人是如何到达人生那个阶段的？他们为什么看起来那样？是因为他们每天早上都在麦当劳的快车道上吗？两个香肠蛋麦满分，一大杯冰咖啡（别忘了多加三泵！）？许多事情都不太让我舒服。
- en: One of them was the conventional career path. Go to school. *Think* you know
    what you want to do at 18 years old (when in reality it’s what culture conditioned
    you to do). *Possibly* get a good job the first time around. *Possibly* enjoy
    life while having no control over 70% of your day. *Possibly* have the freedom
    to do whatever you want with your time… at 65 years old. Sign me up!
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 其中之一是传统的职业道路。上学。*认为*自己在18岁时就知道自己想要做什么（实际上这是文化让你去做的事情）。*可能*第一次就能找到一份好工作。*可能*在无法控制自己70%的一天的时间里享受生活。*可能*在65岁时拥有自由去做自己想做的事情……我报名参加了！
- en: Nope. Didn’t like that. A “secure” future didn’t sound so secure. So I spent
    my time in the gym, learning from people I aspired to be like on social media,
    learning whatever skill could help me, and failing at 7+ business models.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 不。我不喜欢那样。一个“安全”的未来听起来并不那么安全。所以我花时间在健身房，从社交媒体上我渴望成为的人那里学习，学习任何能帮助我的技能，并且失败了7次以上的商业模式。
- en: 'Side note: I found this was a missing piece in my brand. So I am launching
    Digital Economics on June 7th. It will be a modern business degree (taught by
    someone who actually understands modern online business). Skill acquisition, brand
    building, rapid content creation, and creating your own niche that nobody can
    compete with (in 30 days). [Here is the waitlist for early-bird updates.](https://digitaleconomics.school)'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 顺便说一句：我发现这是我品牌中缺失的一块。所以我将在6月7日推出数字经济学。这将是一个现代商业学位（由真正理解现代在线业务的人教授）。技能获取、品牌建设、快速内容创作，以及创建一个无人能竞争的自己的利基市场（30天内）。[这里是早期鸟更新的等待名单。](https://digitaleconomics.school)
- en: 'When it all clicked, I started seeing success. Throughout the last 4 years,
    I’ve pieced together the puzzle. Here is what I wish I knew at 18 years old:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 当一切都变得清晰时，我开始看到成功。在过去4年里，我拼凑了这个谜题。以下是我18岁时希望知道的事情：
- en: The Future Career Path
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 未来的职业道路。
- en: <picture fetchpriority="high" decoding="async" class="wp-image-489">![](../Images/96cea3db43aa9ba6e2710184258ca9c8.png)</picture>
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-489">![](../Images/96cea3db43aa9ba6e2710184258ca9c8.png)</picture>
- en: The Future Career Path
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 未来的职业道路。
- en: The future of work will not be work. *It will be play.*
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 工作的未来将不是工作。*它将是游戏。*
- en: The human psyche is wired for survival. Entrepreneurship is modern-day survival.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 人类的心理是为生存而设计的。创业是现代的生存方式。
- en: The people of the past would hunt, gather, trade, and earn within their own
    little community.
  id: totrans-15
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 过去的人们会在他们自己的小社区内狩猎、采集、交易和赚钱。
- en: ''
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The internet gives us the opportunity to hunt, gather, trade, and earn within
    our own infinite community.
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 互联网给了我们在我们自己的无限社区中狩猎、采集、交易和赚钱的机会。
- en: ''
  id: totrans-18
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Return to nature.
  id: totrans-19
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 回归自然。
- en: ''
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [May 5, 2022](https://twitter.com/thedankoe/status/1522191336241254400?ref_src=twsrc%5Etfw)
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — DAN KOE (@thedankoe) [2022年5月5日](https://twitter.com/thedankoe/status/1522191336241254400?ref_src=twsrc%5Etfw)
- en: We cannot control human evolution. The path is already laid out and it is unfolding
    rapidly before our eyes. Those that hop on the train will survive and others will
    experience neurobiological decay.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们无法控制人类的进化。道路已经铺好，它正迅速在我们眼前展开。那些登上列车的人会生存下来，而其他人将经历神经生物学的衰退。
- en: Good dopamine VS bad. Pursuing your curiosity, making discoveries, and being
    able to maintain that lifestyle in a world that is shifting from corporation to
    individual. Tapping into your creative genius, creating solutions to problems,
    condensing information, and raising the well-being of the collective.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 好的多巴胺VS坏的多巴胺。追求你的好奇心，进行发现，并能在从公司到个人的世界中维持这种生活方式。挖掘你的创意天才，为问题提供解决方案，浓缩信息，并提高集体的福祉。
- en: Pursuing Your Curiosity
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 追求你的好奇心
- en: Specific knowledge is found by pursuing your genuine curiosity and passion rather
    than whatever is hot right now.
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 通过追求你真正的好奇心和激情，而不是目前热门的东西，来找到具体的知识。
- en: ''
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Naval (@naval) [May 31, 2018](https://twitter.com/naval/status/1002105081855016961?ref_src=twsrc%5Etfw)
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — Naval (@naval) [2018年5月31日](https://twitter.com/naval/status/1002105081855016961?ref_src=twsrc%5Etfw)
- en: We’ve talked about curiosity a lot in these letters, [specifically in the last
    one](https://thedankoe.com/if-you-feel-lost-understand-these-3-phases-of-life/).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这些信件中谈了很多关于好奇心的事情，[特别是在上一封信中](https://thedankoe.com/if-you-feel-lost-understand-these-3-phases-of-life/)。
- en: For the first 18+ years of our lives, culture is designed to strip our child-like
    curiosity away from us. This is a blessing and a curse. A blessing for those that
    realize it, a curse for those that don’t.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们生命的最初18+年里，文化被设计用来剥夺我们孩童般的好奇心。这是一件好事，也是一件坏事。对于意识到这一点的人来说是好事，对于没有意识到的人来说是坏事。
- en: Curiosity is the path to doing the things you want to do — not the things that
    others want you to do. The school system assigns us learning material that we
    may or may not be interested in. It may spark curiosity to explore something in
    your own time, but kids rarely do that. Especially when their parents are yelling
    at them to do their homework.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 好奇心是做你想做的事情的道路——而不是别人想让你做的事情。教育体系为我们分配了可能或可能不感兴趣的学习材料。它可能会激发好奇心，让你在空闲时间探索某些东西，但孩子们很少这样做。尤其是当他们的父母在叫他们做作业的时候。
- en: You pursue your curiosity by questioning instead of coping.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过提问而不是应对来追求你的好奇心。
- en: “What if I learned that skill?”
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: “如果我学会了那个技能呢？”
- en: “What if I improved my health?”
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: “如果我改善了健康状况呢？”
- en: “What if I started that business?”
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: “如果我开始那个业务呢？”
- en: “What if I failed? What if I didn’t? What if I stuck it out? Would the world
    end? Of course not.”
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: “如果我失败了怎么办？如果我成功了怎么办？如果我坚持下去呢？世界会结束吗？当然不会。”
- en: After a series of questions, what follows is exploration of the unknown. Action.
    Finding resources to self-educate online. Letting new discoveries lead you down
    another unknown path. Repeating the process until you’ve connected all of the
    dots.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 经过一系列问题后，接下来是对未知领域的探索。行动。寻找资源来自我教育在线。让新的发现引导你走向另一条未知的道路。重复这个过程，直到你连接了所有的点。
- en: Luckily, we live in a world where anything is monetizable. If you know how to
    learn fast, build an offer, and sell — you can build distribution just by talking,
    learning, and teaching about your curiosities online.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，我们生活在一个任何东西都可以货币化的世界里。如果你知道如何快速学习，构建一个产品，并销售——你只需通过在线谈论、学习和教授你的好奇心，就能建立分销。
- en: The Medium & The Message
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 《媒介与信息》
- en: I have a theory. A theory that we as humans are mapping out the collective consciousness
    online.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我有一个理论。一个理论，即我们作为人类正在在线绘制集体意识地图。
- en: Creators, personal brands, “thought leaders,” and online educators are increasing
    the rate of evolution at an exponential rate. We are condensing information through
    courses, systems, step-by-step guides, and mentorship that distills years of experience
    in a digestible way. What would have taken 60 million bits of information to process
    now takes 10 million.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者、个人品牌、“思想领袖”和在线教育者正在以指数级的速度提高进化的速度。我们通过课程、系统、分步指南和导师制来浓缩信息，以可消化的方式提炼出多年的经验。原本需要处理6000万个信息比特现在只需要1000万个。
- en: We can learn more, act faster, make new discoveries, and pass down our own lessons
    in the same manner. Some argue this is the meaning of life and some people are
    sitting on the sidelines as others are building massive leverage for their future.
    All while pursuing their unique curiosities that would allow everyone to go in
    a unique, unsaturated direction in business.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以学到更多，行动更快，做出新的发现，并以同样的方式传授我们的经验。有些人认为这就是生活的意义，而有些人则坐在场外，其他人则在为他们的未来建立巨大的杠杆。所有这些都在追求他们独特的兴趣，这将使每个人都能在商业中走向独特的、未饱和的方向。
- en: That is exactly what humans do. They imitate for survival. We imitated our parents,
    teachers, and friends in order to learn how to function in the world. Many stop
    there. Intelligent imitation comes after the fact. You learn from those that are
    condensing information you are curious about, dissect it, understand it, and experience
    it. How? By documenting what you learn, build, and experience online. To do this
    correctly, you need an understanding of what captures attention. That is, how
    to distill your learnings in a way that attracts others pursuing their curiosity.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是人类所做的事情。他们为了生存而模仿。我们模仿我们的父母、老师和朋友，以便学会如何在世界上生存。许多人就止步于此。智能模仿是在之后发生的。你从那些正在压缩你好奇的信息的人那里学习，剖析它，理解它，并体验它。如何？通过在线记录你所学、所建和所经历的内容。要正确地做到这一点，你需要理解什么能吸引注意力。也就是说，如何以吸引其他追求好奇心的人的方式提炼你的学习成果。
- en: If you want my Intelligent Imitation process for faster learning, [download
    my free 7-day challenge.](https://7daystogeniusideas.com) It will 10x your creative
    output and make content creation ideas seamless. (It’s how I write these newsletters).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想获取我用于快速学习的智能模仿过程，[免费下载我的7天挑战](https://7daystogeniusideas.com)。它将使你的创意产出增加10倍，并使内容创作想法变得无缝。（这就是我写这些通讯的方式）。
- en: Now, back on track. There are 2 paths you can take to pursue your intrinsic
    curiosity.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，回到正轨。你可以选择两条路径来追求你的内在好奇心。
- en: '**1) Media (The Message)**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 媒介（信息）**'
- en: Media is how we communicate with other human beings without being right in front
    of them. The front end of the internet is media. That is how you capture attention
    to educate, entertain, and inspire others. That is how you attract an audience,
    learn in public, and distribute your condensed zip-file-like knowledge that you
    can sell (while simultaneously accelerating evolution and raising the collective
    well-being).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 媒介是我们与他人沟通的方式，而不必面对面。互联网的前端是媒介。这就是你如何吸引注意力来教育、娱乐和激励他人。这就是你如何吸引观众，公开学习，并分发你像压缩的zip文件一样的知识，你可以将其出售（同时加速进化并提高集体福祉）。
- en: To master media, study marketing, persuasion, sales, psychology, epistemology,
    philosophy, and everything else that allows you to understand the mind. The best
    way to do this is to learn in public. That is, learn by building out a real-world
    project. Start a social media account based on your curiosities. Create videos,
    podcasts, articles, posts, and the rest. Treat it like a hobby, a game where you
    are learning what makes other human beings tick.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 要掌握媒介，学习营销、说服、销售、心理学、认识论、哲学以及所有其他能让你理解心智的东西。最好的方法是公开学习。也就是说，通过建立一个现实世界的项目来学习。基于你的好奇心创建一个社交媒体账户。制作视频、播客、文章、帖子以及其他内容。把它当作一种爱好，一个游戏，你在其中学习是什么让其他人兴奋。
- en: At a minimum, you have created a public portfolio and developed modern skills
    that can get you a high-paying job without a degree. Media jobs are hot. You can
    work for marketing and media agencies, creatives, other personal brands, and many
    other options. You can then use your increase in income to fuel your entrepreneurial
    journey (and have already mastered the media game).
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 至少，你创建了一个公开的资料库，并发展了可以让你在没有学位的情况下获得高薪工作的现代技能。媒体工作很热门。你可以为营销和媒体机构、创意人士、其他个人品牌以及许多其他选项工作。然后你可以利用你收入的增加来推动你的创业之旅（并且已经掌握了媒体游戏）。
- en: At a maximum, you build leverage for your future, create a system-based project,
    and make more than enough money than you need to live a happy life.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 最多，你为未来建立了杠杆，创建了一个基于系统的项目，并且赚得比你过上幸福生活所需的资金要多得多。
- en: Either way, you win. Start creating.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 无论哪种方式，你都会赢。开始创作。
- en: Modern Mastery HQ — the private community — has 1000+ members doing just that.
    [Koe Letter readers can join for $5.](https://modernmastery.co/community/modern-mastery-hq-special)
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 现代精通总部——这个私人社区——有1000多名成员正在这样做。[Koe Letter读者可以以5美元的价格加入](https://modernmastery.co/community/modern-mastery-hq-special)。
- en: '**2) Code (The Medium)**'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 代码（媒介）**'
- en: The tech world has exploded in the last decade. Tech, specifically code, is
    the vessel for media. It allows us to package up information in a structured way.
    It allows us to house the information, products, services, and everything else
    in the digital economy. It is the back-end of the internet.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去十年中，科技世界已经爆炸。科技，特别是代码，是媒介的载体。它使我们能够以结构化的方式包装信息。它使我们能够将信息、产品、服务以及所有其他内容存放在数字经济中。它是互联网的后端。
- en: Again, you can learn to code and get a job in ~6 months without a degree, make
    a good amount of money, and then transition into whatever you would like. When
    I was in my last year of college before dropping out, code was my curiosity. I
    took a basic HTML and CSS class, got hooked, and started self-educating via YouTube
    videos and courses. I ended up getting a job at a web design agency after failing
    on the media side of things. I used that income to fuel my business and ended
    up seeing success freelancing. I took what I learned, talked about it online,
    packaged up a system, and sold it under my personal brand.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，你可以在不到6个月的时间内学会编码并找到工作，无需学位，赚得一笔不错的收入，然后过渡到你想要的任何行业。在我大学退学前的最后一年，代码是我的好奇心。我参加了一个基本的HTML和CSS课程，上瘾了，然后开始通过YouTube视频和课程自学。我在媒体方面失败后，最终在一家网页设计公司找到了工作。我用那份收入来推动我的业务，并最终在自由职业中取得了成功。我把我学到的东西在网上谈论，打包成一个系统，并在我的个人品牌下出售。
- en: There is more to the coding side of things, like blockchain and web3, but I
    can’t let my focus split from what I’m building just yet. So I’ll leave that to
    your curiosity 🙂
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 代码方面还有更多，比如区块链和web3，但我不能让我对正在构建的东西的关注分散。所以我会把那留给你的好奇心吧。
- en: '**3) The Brutal Combo**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 残忍的组合**'
- en: 'The beautiful thing about all of this:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这一切的美丽之处在于：
- en: The coders of the world have gotten so good that no-code tools are popping up
    out of nowhere. Anyone can build a website, email list, blog, product, membership,
    community, and other things that allow them to harness their media skills online.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 世界的程序员们已经变得如此出色，以至于无代码工具突然涌现。任何人都可以建立一个网站、电子邮件列表、博客、产品、会员、社区以及其他允许他们利用在线媒体技能的东西。
- en: With these no-code tools, the average individual will learn both media and code
    by just starting a personal brand. You educate yourself on communication by learning
    and posting, you educate yourself on code by housing that information on your
    website, landing page, and email list.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些无代码工具，普通个人只需开始一个个人品牌，就可以通过学习媒体和代码。通过学习和发布，你通过沟通教育自己，通过在你的网站、着陆页和电子邮件列表上存放信息，你通过代码教育自己。
- en: Build Distribution, Then Build Whatever You Want
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 先建立分销，然后建立你想要的任何东西
- en: Build distribution, then build whatever you want.
  id: totrans-61
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 建立分销，然后建立你想要的任何东西。
- en: ''
  id: totrans-62
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — jckbtchr (@jackbutcher) [May 22, 2021](https://twitter.com/jackbutcher/status/1395945544430854144?ref_src=twsrc%5Etfw)
  id: totrans-63
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — jckbtchr (@jackbutcher) [2021年5月22日](https://twitter.com/jackbutcher/status/1395945544430854144?ref_src=twsrc%5Etfw)
- en: As we’ve learned, anyone can build distribution. Distribution is just a fancy
    way of saying potential traffic. An audience is traffic. An email list is traffic.
    Communities are traffic. Your network is traffic. All can be sent to your digital
    product or service.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所学的，任何人都可以建立分销。分销只是指潜在流量的一种花哨说法。观众是流量。电子邮件列表是流量。社区是流量。你的网络是流量。所有这些都可以引导到你的数字产品或服务。
- en: The world is craving human connection as we learn to navigate the internet.
    Decentralization is a hot topic. Corporations can’t be trusted. Formal education
    can’t be trusted. Individual distribution centers (personal brands) are popping
    up to give that human connection and educate. Everyone can pursue their curiosity
    and do what they love — if they realize this opportunity.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们学习如何在互联网中导航，世界正渴望人与人之间的联系。去中心化是一个热门话题。企业不可信。正规教育也不可信。个人分销中心（个人品牌）正在涌现，以提供这种人与人之间的联系和教育。每个人都可以追求他们的好奇心，做他们喜欢的事情——如果他们意识到这个机会的话。
- en: “There are almost 7B people on this planet. Someday, I hope, there will be almost
    7B companies.” — Naval
  id: totrans-66
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “这个星球上有近70亿人。我希望有一天，几乎会有70亿家公司。” — 纳瓦尔
- en: Media is the information (content). Code is the real estate (where content is
    housed). Brand is distribution (how you attract people to your content). By building
    these digital assets, you can create a system-based digital product or service
    (that condenses information, which is valuable) and talk about your expertise
    from the lens of your curiosities (so there is no “competition”).
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 媒体是信息（内容）。代码是房地产（内容存放的地方）。品牌是分销（如何吸引人们到你的内容）。通过建立这些数字资产，你可以创建一个基于系统的数字产品或服务（浓缩了有价值的信息），并从你的好奇心的角度谈论你的专业知识（因此没有“竞争”）。
- en: Making A Fortune
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 赚大钱
- en: So far, we’ve gone through the curiosity, media, code, and distribution steps.
    But what do you distribute? Digital products or services. The things that impact
    human’s direct experience through accelerated education or solving a problem.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经经历了好奇心、媒体、代码和分销的步骤。但你分发什么呢？数字产品或服务。通过加速教育或解决问题影响人类直接体验的东西。
- en: 'There are 3 ways to do this:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 有三种方法可以做到这一点：
- en: '**1) Done For You**'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 完成你的服务**'
- en: Done for you services are things like freelancing or agency work. Someone has
    a problem, you have a unique system for solving that, they hire you, and you solve
    the problem for them.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 完成你的服务包括像自由职业或代理工作这样的服务。有人有问题，你有一个独特的系统来解决它，他们雇佣你，然后你为他们解决问题。
- en: '**2) Done With You**'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 与你一起完成**'
- en: Done with you services are things like consulting, coaching, or mentoring. Rather
    than doing something for someone, you are walking them through your system. You
    are teaching them, educating them, on how to improve a certain aspect of their
    life. You help them navigate the roadblocks that you’ve experienced previously.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 完成你的服务包括咨询、辅导或指导。你并不是为某人做某事，而是引导他们通过你的系统。你教导他们、教育他们，如何改善他们生活的某个方面。你帮助他们克服你之前经历过的障碍。
- en: '**3) Do It Yourself**'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) DIY（自己动手做）**'
- en: Do it yourself is for digital products. You package up your system in a digestible
    way via no-code tools and distribute it infinitely via the internet. You can go
    straight into the digital product game, but you will need distribution to monetize
    well. When you don’t have distribution, freelancing or consulting can help you
    develop your system, get results, and make an income without a large audience.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: DIY适用于数字产品。你通过无代码工具将你的系统打包成易于消化的形式，并通过互联网无限期地分发。你可以直接进入数字产品市场，但你需要分销才能有效地盈利。当你没有分销渠道时，自由职业或咨询可以帮助你发展你的系统，取得成果，并在没有大量受众的情况下赚取收入。
- en: This is how you make a fortune. By working your way up the ladder, developing
    your system, packaging it up, and distributing it with “no marginal cost of replication.”
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何创造财富。通过攀登阶梯，发展你的系统，将其打包，并以“没有边际复制成本”的方式分发。
- en: Fortunes require leverage. Business leverage comes from capital, people, and
    products with no marginal cost of replication (code and media).
  id: totrans-78
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 幸运需要杠杆。商业杠杆来自资本、人员和没有边际复制成本的产物（代码和媒体）。
- en: ''
  id: totrans-79
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Naval (@naval) [May 31, 2018](https://twitter.com/naval/status/1002106317064949763?ref_src=twsrc%5Etfw)
  id: totrans-80
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 纳瓦尔 (@naval) [2018年5月31日](https://twitter.com/naval/status/1002106317064949763?ref_src=twsrc%5Etfw)
- en: Start Building Leverage
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 开始构建杠杆
- en: I could go on and on about this, and I will in future letters, but for now —
    just start. That is how you learn. Use my [Power Planner](https://shop.thedankoe.com/planner)
    to develop the mission and vision for your brand (what you are leading people
    towards, what you are going to study, and what you are going to learn in public).
    Then, use my [intelligent imitation process](https://7daystogeniusideas.com) to
    aid in the process of documenting your mind.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以继续谈论这个问题，我会在未来的信件中这样做，但现在是——开始吧。这就是你学习的方式。使用我的[Power Planner](https://shop.thedankoe.com/planner)来制定你品牌的使命和愿景（你将引导人们走向何方，你将研究什么，你将在公众面前学习什么）。然后，使用我的[智能模仿过程](https://7daystogeniusideas.com)来帮助你记录思维的过程。
- en: That is what we are all doing. Mapping out a giant mind (like the universe is)
    online. Join the party and reap the neurobiological benefits, or wait until you
    have no other option. I’m not a fan of “fear-mongering,” but there truly seems
    to be no other path. You either live in accordance with nature or be a product
    of man. That is, create or be created.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们都在做的事情。在线绘制一个巨大的思维图（就像宇宙一样）。加入这个派对，享受神经生物学的好处，或者等到你没有其他选择。我不是“恐吓者”的粉丝，但似乎真的没有其他路径。你要么按照自然规律生活，要么成为人类的产物。也就是说，创造或被创造。
- en: If you want The Koe Letter sent to your inbox every Saturday morning, [you can
    subscribe here.](https://links.thedankoe.com/#letter)
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你希望每周六早上将《科伊信件》发送到你的收件箱，[你可以在此订阅](https://links.thedankoe.com/#letter)。
