- en: How To Make $1 Million A Year As A Digital Writer
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何成为年薪一百万的数字作家
- en: 原文：[https://thedankoe.com/letters/how-to-make-1-million-a-year-as-a-digital-writer/](https://thedankoe.com/letters/how-to-make-1-million-a-year-as-a-digital-writer/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/how-to-make-1-million-a-year-as-a-digital-writer/](https://thedankoe.com/letters/how-to-make-1-million-a-year-as-a-digital-writer/)
- en: This is the start of the Digital Writer series.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 这标志着数字作家系列的开始。
- en: Over the coming weeks (with some breaks for a few harsh truths and self-improvement
    letters) we will dive deep into how to become a profitable writer while talking
    about your interests.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的几周内（中间会有一些关于一些残酷的真相和自我提升的信件），我们将深入探讨如何在谈论你的兴趣的同时成为一位盈利的作家。
- en: Let’s begin.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧。
- en: I’ve always been a creative at heart.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我内心一直是个有创造力的人。
- en: I loved the thought of working from my laptop, living anywhere in the world,
    and not having to worry about money.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢从我的笔记本电脑上工作的想法，无论在世界上的任何地方生活，都不必担心钱的问题。
- en: Naturally, I studied things like graphic design, photography, and film.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 自然地，我学习了像图形设计、摄影和电影这样的东西。
- en: Those were valuable skills to learn, but they never really got me anywhere.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这些都是值得学习的技能，但它们从未真正带我去过任何地方。
- en: I knew that I had to learn something that was valued by the market more, but
    I didn’t want to give up my creative edge.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道我必须学习市场更重视的东西，但我不想放弃我的创意优势。
- en: That’s when I took a web development class in college.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 那是我上大学时开始学习网页开发课程的时候。
- en: I became obsessed.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我变得着迷了。
- en: The promises of a high-paying job without a degree and the infinite resources
    I could use to teach myself to code were enticing.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 没有学位也能获得高薪工作的承诺，以及我可以用来自学编程的无限资源，这些都很有吸引力。
- en: And I didn’t have to let go of my creativity if I did front-end design.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 而且如果我做前端设计，我并不需要放弃我的创造力。
- en: Creativity paired with coding seemed more valuable than something like graphic
    design alone, but only to the job market (from my level of awareness at the time).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 创造力和编程似乎比单纯的图形设计更有价值，但只在我当时的意识水平上对就业市场来说如此。
- en: I have always wanted to do my own thing.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直想做自己想做的事情。
- en: Getting a job was the bane of my existence.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 找工作是我存在的痛苦。
- en: It wasn’t hard to observe society and see that most people were overweight and
    unhappy. The common theme was that they all had their precious resource, time,
    sucked away from them by a job that worked them to death.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 观察社会并不难，看到大多数人超重且不快乐。共同的主题是他们所有的宝贵资源，时间，都被让他们筋疲力尽的工作夺走了。
- en: Long story short, I never was able to monetize my creativity.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，我从未能够将我的创造力货币化。
- en: It’s not because I wasn’t skilled enough, it’s because I didn’t stack other
    skills that would allow me to make money. I wasn’t skilled in the right things
    that would allow me to monetize my main skill. Another loss for “focus on one
    thing.”
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不是因为我技能不够，而是因为我没有积累其他能够让我赚钱的技能。我没有掌握能够让我将主要技能货币化的正确技能。“专注于一件事情”又是一次损失。
- en: I’ll talk about my full story in one of the next letters, but for now, just
    know that it didn’t work out.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我会在下一封信中详细讲述我的故事，但到目前为止，只是知道它没有成功。
- en: I had to swallow my pride and get a job.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我不得不吞下我的骄傲，找一份工作。
- en: Luckily, I was able to land the first web design job I applied for because I
    took a year to teach myself to code (and had design experience before that).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，我能够得到第一份申请的网页设计工作，因为我花了一年时间自学编程（在此之前我已有设计经验）。
- en: 'Lesson:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 经验教训：
- en: You don’t need to go to school to get a high-paying job.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要上学就能得到一份高薪工作。
- en: That job can be used as a launchpad for building your own thing.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 那份工作可以用作建立你自己的事业的跳板。
- en: 'Before we start, The Art Of Focus Keepsake Box is available for preorder:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始之前，《专注的艺术》珍藏盒现在可以预订：
- en: The Keepsake Hardcover – we are only printing 2000 copies.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《珍藏版精装本》——我们只印刷2000册。
- en: The digital download of the book so you can be the first to read.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 书籍的数字下载，让你能成为第一个阅读的人。
- en: The audiobook version when it is recorded and uploaded.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当录音并上传时，有声书版本。
- en: The FOCI Planner to deconstruct your ideal future into priority tasks.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: FOCI计划，将你的理想未来分解为优先任务。
- en: The FOCI Coin to remember to act with intention.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: FOCI币，提醒你带着意图行动。
- en: The Digital Transformation Center with 12 hours of modern entrepreneurship trainings.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数字转型中心，提供12小时的现代创业培训。
- en: The Private Community for updates, discussion, and networking.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新、讨论和社交网络的私人社区。
- en: A private invitation to an in-person event in Phoenix, AZ next year.
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明年亚利桑那州凤凰城的一次面对面活动的私人邀请。
- en: The price increases twice leading up to the release date.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在发布日期前价格两次上涨。
- en: How I Made Millions As A Digital Writer
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我如何作为一名数字作家赚取数百万
- en: I worked at a web design agency for a year.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我在一家网页设计代理机构工作了整整一年。
- en: This was a blessing, because it showed me the exact pieces I was missing in
    my freelance web design business.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这真是个祝福，因为它让我看到了我在自由职业网页设计业务中缺失的精确部分。
- en: The agency had a marketing, sales, and operations department.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 代理机构有营销、销售和运营部门。
- en: Marketing and sales generated and closed leads.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 营销和销售产生并关闭了潜在客户。
- en: Operations handed them off to the designers (me).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 运营部门将他们转交给设计师（也就是我）。
- en: I built their website and handed it off to them.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我为他们建立了网站，然后将其交给了他们。
- en: It made sense, so I started studying skills like copywriting, sales, direct
    response marketing, and all of the other skills that people tell you to learn.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这是有道理的，所以我开始学习诸如文案写作、销售、直接回应营销以及其他所有人们告诉你要学习的技能。
- en: In my free time, I would try everything under the sun to land clients.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的空闲时间，我会尝试一切可能的方法来吸引客户。
- en: Cold email.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 冷邮件。
- en: Cold calls.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 冷电话。
- en: Cold DMs.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 冷直接消息。
- en: Facebook Group networking.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: Facebook 群组网络。
- en: Paid Facebook and Google ads.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 支付 Facebook 和 Google 的广告费用。
- en: Walking into local businesses and talking to the manager.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 走进当地企业并与经理交谈。
- en: Writing down the phone numbers of services businesses from their vehicle graphics
    (like pest control).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 从他们的车辆广告（如害虫控制）上记下服务公司的电话号码。
- en: I started landing a few clients, but not nearly enough as I wanted. Don’t get
    me wrong, I replaced my income and quit my job within my year at the web design
    agency.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我开始吸引一些客户，但远远没有达到我想要的那么多。请别误会，我在网页设计代理机构的这一年里已经取代了我的收入并辞去了我的工作。
- en: But I didn’t just want to replace my income.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 但我不仅仅想取代我的收入。
- en: I wanted to make millions… because who doesn’t?
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我想赚得数百万……因为谁不想呢？
- en: I was well off, making close to $100,000 a year – mostly from referrals after
    a lot of manual effort – and was able to quit my job.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我过得很好，年收入接近 10 万美元——主要是通过大量的手动努力后的推荐——并且能够辞去我的工作。
- en: A few things happened at this point.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上发生了一些事情。
- en: And they could only happen at this point, because my mind wouldn’t understand
    them without my prior experience and failures.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 而且它们只能在这个时候发生，因为我的头脑没有先前的经验和失败，无法理解它们。
- en: '**1) I began to understand the power of social media.**'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 我开始理解社交媒体的力量。**'
- en: Why in the world was I doing all of this manual work to land clients?
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我究竟为什么要做所有这些手动工作来吸引客户？
- en: Why didn’t I realize that people posting content and building a following had
    unlimited clients at their fingertips (if they understood marketing and sales)?
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我没有意识到发布内容和建立追随者的人手头有无限多的客户（如果他们懂得营销和销售）？
- en: If I could build an audience, that would save me 10-20 hours a week generating
    leads for my freelance services.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我能建立一个受众，那将为我节省每周 10-20 个小时为我的自由职业服务生成潜在客户的时间。
- en: And if I built a large enough following, I could pivot out of client work. That
    would save me even more time because I could monetize digital or physical products.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我能建立一个足够大的追随者群体，我就可以从客户工作中转型。那将为我节省更多时间，因为我可以货币化数字或实体产品。
- en: You can start to see where my 4-Hour Workday philosophy comes from.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以开始看到我的“4小时工作日”哲学从何而来。
- en: '**2) I had the experience to grow on X.**'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 我在 X 方面有经验可以继续发展。**'
- en: Centuries ago, there was a social media app called Twitter.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 几个世纪前，有一个名为 Twitter 的社交媒体应用。
- en: I never really cared for it.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我从未真正喜欢过它。
- en: But for some reason, I started using it more and more.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 但不知为什么，我开始越来越多地使用它。
- en: I noticed people talking about everything I liked.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我注意到人们在谈论我喜欢的所有事情。
- en: Self-improvement, mindset, philosophy, web design, business, marketing, and
    more. Often from the same accounts. They didn’t seem to limit the topics they
    talked about, because it was obvious that they all overlapped (similar to how
    this newsletter can be categorized as any one of those topics). They told you
    to “choose a niche” but didn’t have one themselves. [Their products and services
    were niched down, not their personal brand.](https://thedankoe.com/letters/niche-down-is-terrible-advice-for-smart-people/)
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 自我提升、心态、哲学、网页设计、商业、营销等等。通常来自同一个账户。他们似乎没有限制他们谈论的话题，因为很明显，它们都重叠（类似于这个通讯可以归类为任何一个这些话题）。他们告诉你要“选择一个利基市场”，但他们自己却没有。
    [他们的产品和服务的利基市场化，而不是他们的个人品牌。](https://thedankoe.com/letters/niche-down-is-terrible-advice-for-smart-people/)
- en: If they were generating traffic with their content and had the successful business
    they said they did… why couldn’t I do the same?
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如果他们通过内容吸引流量，并且拥有他们所说的成功业务……为什么我不能做到同样的呢？
- en: I started emulating their content structure and posting the ideas in my head.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我开始模仿他们的内容结构，并将头脑中的想法发布出来。
- en: Remember, I had prior copywriting and direct response marketing knowledge.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，我之前有文案写作和直接响应营销的知识。
- en: I knew what was necessary to write a post that captured attention and generated
    enough interest to follow me.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道要写一篇吸引注意力和激发足够兴趣以吸引粉丝的帖子需要什么。
- en: In my first year, I gained around 10,000 followers.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的第一年，我大约获得了10,000名粉丝。
- en: In my second year, that jumped to 50,000.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的第二年，这个数字跃升至50,000。
- en: In my third year, another jump to 100,000.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的第三年，粉丝数又增加到了100,000。
- en: Then, I used my validated ideas to post to other platforms like Instagram, LinkedIn,
    and YouTube. I knew they would get engagement because I had so much data from
    writing on Twitter.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我利用经过验证的想法在其他平台如Instagram、LinkedIn和YouTube上发布帖子。我知道他们会获得参与度，因为我从Twitter上的写作中获得了大量数据。
- en: Today, 4 years later, I have around 2,800,000 followers across all platforms.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，4年过去了，我在所有平台上大约有280万粉丝。
- en: Talk about exponential growth and how consistency is king.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 谈谈指数增长和一致性为王。
- en: There is a lot more to this social media growth thing. I’ll talk about that
    in a letter soon called *How To Actually Grow On Social Media (What They Don’t
    Tell You).* [For now you can read this letter on networking](https://thedankoe.com/letters/how-to-network-with-millionaires-and-build-a-name-for-yourself/).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体增长的事情还有很多。我会在一封即将到来的信中谈谈，题为*如何在社交媒体上真正增长（他们没有告诉你的内容).* [现在你可以阅读这封信关于网络](https://thedankoe.com/letters/how-to-network-with-millionaires-and-build-a-name-for-yourself/)。
- en: '**3) Everything pointed to writing.**'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 一切都指向了写作。**'
- en: Writing on Twitter made me realize one thing.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在Twitter上写作让我意识到一件事。
- en: '*I wasn’t just writing on Twitter.*'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '**我不仅仅是在Twitter上写作。**'
- en: I was writing emails, newsletters, landing pages, promotions, video scripts,
    direct messages, course curriculums, product material… everything.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我在写电子邮件、通讯、着陆页、促销、视频脚本、直接消息、课程大纲、产品材料……等等。
- en: It wasn’t too long until I just considered myself a writer.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 没过多久，我就把自己当作一个作家了。
- en: That’s all I did every single morning.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是我每天早上都在做的事情。
- en: That was the driver of all growth in my business.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 那是推动我业务增长的动力。
- en: My ability to capture attention, create value, and impact my readers was all
    due to writing.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 我吸引注意、创造价值和影响读者的能力都归功于写作。
- en: This is how [2 Hour Writer](https://2hourwriter.com) was birthed. That’s a course
    where I teach my entire writing ecosystem. Because everything in business – no
    matter what you do – starts with writing.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是[2小时作家](https://2hourwriter.com)诞生的原因。这是一门课程，我在这门课程中教授我的整个写作生态系统。因为商业中的每一件事——无论你做什么——都始于写作。
- en: Most writers want to sell their writing, and they can with something like a
    paid blog, newsletter, or community, but that is limiting.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数作家都想出售他们的作品，他们可以通过付费博客、通讯或社区来实现，但这很有限。
- en: Writing is both a traffic generation mechanism and the means to create an information
    product.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 写作既是流量生成机制，也是创建信息产品的手段。
- en: When you know how to write, market, and sell, you can earn an income writing
    about whatever you want.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 当你知道如何写作、营销和销售时，你可以通过撰写你想要的内容来赚取收入。
- en: '**4) My income grew with my readership.**'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 我的收入随着读者群的增加而增长。**'
- en: A few years ago I read a tweet that said you can make $0.50-$1 per follower
    per month (with your own product or service of course, not by relying on platform
    monetization or Adsense).
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 几年前，我读了一条推文，说你可以每月每粉丝赚取0.50美元到1美元（当然，是你的产品或服务，而不是依赖平台的货币化或AdSense）。
- en: This held true for me up until a point.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 这对我一直有效，直到某个点。
- en: From years 1-3 I made about $1 per follower per month.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在第1到3年，我每月每粉丝赚了大约1美元。
- en: So, $10,000 then $50,000 then $100,000.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，先是10,000美元，然后是50,000美元，接着是100,000美元。
- en: I made $800,000 in my third year.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的第三年，我赚了80万美元。
- en: This past year I’ve passed my follower count in income, around $3.1 million
    so far.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 过去一年，我的粉丝数超过了收入，到目前为止大约是310万美元。
- en: 'There are a lot of technical details here, but one thing holds true:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有很多技术细节，但有一点是真实的：
- en: If you slowly build a decent readership, launch a new product, and get 80% of
    things right, I find it hard to believe that you couldn’t make a million dollars.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你慢慢建立起一个不错的读者群，推出新产品，并且80%的事情都做对了，我觉得很难相信你不能赚到一百万美元。
- en: At this point, if you stick it out, the path should be blatantly obvious to
    you.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 到这个时候，如果你坚持下去，路径应该对你来说非常明显。
- en: The main trap I see is people playing short-term money games. Blasting their
    audience with promotions on a crappy product and never improving what they offer.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我看到的主要陷阱是人们玩短期金钱游戏。用糟糕的产品促销轰炸他们的受众，永远不会改善他们提供的东西。
- en: The Principles Of Monetizing Your Writing
  id: totrans-104
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 赚钱写作的原则
- en: I don’t want to give you hacks and tactics.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 我不想给你提供技巧和策略。
- en: This is a long-term game.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个长期的游戏。
- en: The sooner you accept that the sooner you will get results, because the quickest
    fix is the longest path.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 你越早接受这一点，你就能越早得到结果，因为最快的解决方案是最长远的道路。
- en: Instead, I want to give you principles to focus on.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 我不想给你提供一些关注原则。
- en: These will be the main drivers of monetizing your writing.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 这些将成为你货币化写作的主要驱动力。
- en: 1) Distribution – Choosing A Writing Platform
  id: totrans-110
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 分发 - 选择一个写作平台
- en: Distribution is how you bridge product and people.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 分发是连接产品和人的桥梁。
- en: For writers, social media is how you are going to do that.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 对于作家来说，社交媒体是你将如何做到这一点的方式。
- en: You don’t need to start on a writing platform, but why wouldn’t you?
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要从写作平台开始，但为什么不呢？
- en: You don’t need to post pictures of your body.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要发布你身体的照片。
- en: You can prioritize learning and idea generation.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以优先考虑学习和思想生成。
- en: You don’t need to design graphics or edit videos.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要设计图形或编辑视频。
- en: It is a peaceful existence unless you want to expand in the future.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 除非你想在未来扩展，否则这是一种平静的生活。
- en: I recommend X as your starting point because you can control growth with strategies
    we will talk about later.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议你从X开始，因为你可以通过我们稍后讨论的策略来控制增长。
- en: Medium, blog sites, and newsletters take longer to grow.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: Medium、博客网站和通讯需要更长的时间才能成长。
- en: In my eyes, it’s easier to build an X following and transfer your audience to
    long-form writing down the road.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，建立一个X追随者群体，并在将来转移到长篇写作上要容易得多。
- en: 2) Offer – How You Monetize An Audience
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 提供 - 如何将受众货币化
- en: Beginners tend to see YouTubers pulling in big numbers from ad revenue and think
    that’s the best way to monetize.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 初学者往往会看到YouTube博主从广告收入中获得大量收入，并认为这是最好的盈利方式。
- en: Even now with X monetization being a thing… I’m seeing this more and more.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 即使现在X货币化已经成为一种趋势…我越来越多地看到这种情况。
- en: This is arguably the stupidest way to think.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以说是最愚蠢的思考方式。
- en: You started doing this because you want more autonomy in your life.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 你开始做这件事是因为你想要在生活中有更多的自主权。
- en: Don’t be a slave to the algorithm.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 不要成为算法的奴隶。
- en: You have to create a product or service.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须创建一个产品或服务。
- en: 'Here’s what I would do:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我会做的事情：
- en: '**Start a freelance business.** You won’t have a large following at first.
    So you do more manual work to land writing clients for a higher price than something
    like a course. This allows you to make an income. (You can sell social media content,
    copywriting, emails, etc. Just don’t offer plain old “writing.”)'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**开始一个自由职业业务**。一开始你可能不会有大量的追随者。所以你做更多手动工作，以比课程等更高的价格吸引写作客户。这让你能够赚钱。（你可以出售社交媒体内容、文案、电子邮件等。只是不要提供普通的“写作”服务。）'
- en: '**Ween off of manual outreach.** As your audience grows you can leverage that
    for landing clients. This frees up time to start creating a product.'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**摆脱手动推广**。随着你的受众增长，你可以利用这一点来吸引客户。这为你腾出时间来开始创建产品。'
- en: '**Turn your freelance service into a product.** You can keep freelancing, but
    having a digital product, course, or physical product allows you to earn without
    manual labor.'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将你的自由职业服务转变为产品**。你可以继续自由职业，但拥有数字产品、课程或实物产品让你可以在不进行手动劳动的情况下赚钱。'
- en: '**Do whatever you want.** At this point, you should have the mental and financial
    resources to build and monetize whatever you want. Enjoy the freedom that a proper
    skill stack and experience provides.'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**做你想做的任何事情**。在这个阶段，你应该有精神和财务资源来构建和货币化你想要的任何东西。享受由适当的技能堆栈和经验提供的自由。'
- en: One last thing, most people create a product and see zero results. I would recommend
    enrolling in [Digital Economics](https://digitaleconomics.school) for my monetization
    systems, or reading my previous letter on [Value Creation](https://thedankoe.com/letters/value-creation-the-skill-that-built-my-one-person-business/).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一点，大多数人创建了一个产品，但看不到任何结果。我建议你报名参加[数字经济学](https://digitaleconomics.school)课程，学习我的盈利系统，或者阅读我之前关于[价值创造](https://thedankoe.com/letters/value-creation-the-skill-that-built-my-one-person-business/)的信件。
- en: 3) Leverage & Scalability
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 杠杆和可扩展性
- en: If you don’t prioritize leverage and scalability, you won’t be able to make
    $1 million a year (at least without hating your life).
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有优先考虑杠杆和可扩展性，你将无法每年赚取100万美元（至少在没有讨厌你的生活的情况下）。
- en: The Internet allows businesses to scale without hiring an insane amount of employees.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网允许企业在不雇佣大量员工的情况下进行扩展。
- en: Digital tools, software, and automation allow you to do what used to take 10
    employees by yourself.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 数字工具、软件和自动化让你可以自己完成过去需要10名员工才能完成的工作。
- en: As you are writing and building, you have to continue to evolve your products
    to take up less of your time.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在写作和建设时，你必须继续进化你的产品，以便占用你更少的时间。
- en: The obvious and priority thing to do is turn your service (like freelancing)
    into a digital product (like a course teaching the same thing to a more beginner-level
    audience).
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 明显且优先的事情是将你的服务（如自由职业）转变为数字产品（如为更初级的受众教授相同内容的课程）。
- en: In my case, I was a freelance web designer.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的情况下，我是一个自由职业网页设计师。
- en: So, to free up more time, I created 2 products in my first year.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为了腾出更多时间，我在第一年创建了2个产品。
- en: One taught how to create websites and landing pages.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 其中一位教授了如何创建网站和着陆页。
- en: The other taught my manual methods for landing freelance clients.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 另一位教授了如何通过手动方法获得自由职业客户。
- en: In my second year, I stopped freelance web design as a whole.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 在我第二年，我完全停止了自由职业网页设计。
- en: Some people get tied to what they do even if they see a better opportunity.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人即使看到更好的机会，也会被他们所做的事情束缚。
- en: I had *so much* more experience at this point. It didn’t make sense to continue
    doing something less profitable and more time-consuming.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 到这个阶段，我积累了更多经验。继续做利润较低、耗时更多的事情没有意义。
- en: So, I transitioned into marketing consulting for online businesses.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我转向了在线企业的营销咨询。
- en: I had direct access to them on social media anyway. It just made sense.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 我无论如何都可以直接在社交媒体上接触到他们。这很合理。
- en: Eventually, I did the same thing.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，我做了同样的事情。
- en: I turned that marketing consulting into a more expensive course.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 我将营销咨询转变为一个更昂贵的课程。
- en: 'The lesson:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 经验教训：
- en: You *and* your business must continue to evolve.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 你和你的业务必须继续进化。
- en: For me, it happened every 6 months.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，这种情况每6个月就会发生一次。
- en: I *felt* things getting slow and stagnant.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 我感觉事物变得缓慢和停滞。
- en: I had to create new products and services to survive in the Wild West of entrepreneurship.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 我不得不创造新产品和服务来在创业的荒野中生存。
- en: 4) Promotions – The Destroyer Of Brands
  id: totrans-156
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 推广 – 品牌的破坏者
- en: I’ve talked about my new book, *[The Art Of Focus](https://theartoffocusbox.com)*,
    for close to 3 years now.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经谈论了我的新书，*[《专注的艺术》](https://theartoffocusbox.com)*，近3年了。
- en: I still have people message me saying they had no idea I wrote a book.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 我仍然有人给我发消息说他们不知道我写过一本书。
- en: Just because someone followed you or read one of your posts doesn’t mean they
    know what they can buy from you – even if they’re a perfect fit.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 仅仅因为有人关注了你或阅读了你的帖子，并不意味着他们知道他们可以从你这里买到什么——即使他们是完美的匹配。
- en: You. Have. To. Promote.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 你。必须。推广。
- en: Promoting means telling people about your product or service and sending them
    to a page where they can read more and buy.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 推广意味着告诉人们你的产品或服务，并引导他们到一个可以阅读更多并购买的地方。
- en: A simple framework for this is PAS.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 这个框架很简单，就是PAS。
- en: '**Problem** – capture their attention by talking about the problem they are
    facing that your product solves. *“If you struggle with…”* is a great place to
    start.'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问题** – 通过谈论他们面临的问题以及你的产品如何解决这些问题来吸引他们的注意力。“如果你在……方面有困难”是一个很好的开始。'
- en: '**Amplify** – talk about how the problem impacts their life and why it needs
    to be solved.'
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**放大** – 讨论问题如何影响他们的生活以及为什么需要解决这个问题。'
- en: '**Solution** – Position your offer as the solution to the problem so they click
    and read more.'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案** – 将你的提议定位为解决问题的方案，这样他们就会点击并阅读更多。'
- en: You can plug your products, services, or newsletter in the comments of your
    posts, in your story, or randomly in your writing like I did above.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在你帖子的评论中，在你的故事中，或者像我上面那样随机在你的写作中插入你的产品、服务或通讯。
- en: Whenever people come to me for help with monetization, they may have problems
    with their marketing, but most of the time it’s just a lack of promotion.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 每当有人来找我帮助进行货币化时，他们可能在与他们的营销有问题，但大多数时候只是缺乏推广。
- en: They don’t set a schedule to promote once a day in any of their content.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 他们不会在他们的任何内容中设定每天推广一次的时间表。
- en: This is a surefire way to get trapped as a starving artist.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种确保成为饿肚子的艺术家的方法。
- en: 'Summary: How To Make $1 Million A Year As A Writer'
  id: totrans-170
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 摘要：如何成为一名年收入百万的作家
- en: I wish I could tell you it’s going to be easy, but it’s not.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望我能告诉你这会很容易，但事实并非如此。
- en: The principles are pretty straightforward.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 原则相当直接。
- en: Use writing to build a readership (that grows infinitely with the internet if
    you know how to improve when you hit a stunt in growth).
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 利用写作来建立读者群（如果你知道如何在增长遇到瓶颈时改进，随着互联网的无限扩展，读者群也会无限增长）。
- en: Build a product that your readers want (and if it doesn’t sell, that’s not on
    them, it’s on you. Create a better product and try again).
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 打造读者想要的产品（如果它卖不出去，那不是他们的责任，而是你的责任。创造一个更好的产品再试一次）。
- en: Stick it out for multiple years if not the rest of your life.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 如果不是一生，至少也要坚持多年。
- en: Entrepreneurship means you’re in full control of how much you make.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 创业意味着你可以完全控制你赚多少钱。
- en: Your income is only limited by your perspective, beliefs, skill set, and real-world
    practice.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 你的收入仅受限于你的视角、信念、技能组合和现实世界的实践。
- en: Enjoy the rest of your week.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 享受你剩余的一周时光。
