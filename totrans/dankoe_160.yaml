- en: How To Actually Make $1 Million With AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/how-to-actually-make-1-million-with-ai/](https://thedankoe.com/letters/how-to-actually-make-1-million-with-ai/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I bet you clicked on this so you could find a quick way to make money.
  prefs: []
  type: TYPE_NORMAL
- en: I hate to break it to you, but you will never live in a world where that is
    possible.
  prefs: []
  type: TYPE_NORMAL
- en: There will never ever ever be a time where you can just tell a bunch of robots
    to go and make you money so you can sit around with the poor habits you don’t
    want to change and do nothing.
  prefs: []
  type: TYPE_NORMAL
- en: Not how it works.
  prefs: []
  type: TYPE_NORMAL
- en: The reality is that AI hasn’t changed a thing.
  prefs: []
  type: TYPE_NORMAL
- en: You still need traffic
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You still need content
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You still need promotions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You still need a valuable offer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You still need a customer avatar
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You still need a landing page
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You still need copywriting
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And of course, you still need to *understand* what you’re doing to orchestrate
    all of those things well.
  prefs: []
  type: TYPE_NORMAL
- en: So no. This isn’t some fancy new AI business model that absolves you from learning
    every principle of business.
  prefs: []
  type: TYPE_NORMAL
- en: The only thing that AI has changed is the speed and quality which you can do
    the things above.
  prefs: []
  type: TYPE_NORMAL
- en: 'But here’s the cool part:'
  prefs: []
  type: TYPE_NORMAL
- en: I enjoy writing content and books (like my new little book [Purpose & Profit](https://thedankoe.com/purpose)
    which is free as a PDF that you can chat with in Kortex now! (Drag the PDF into
    a chat or your library)). That’s what I want to spend my time doing. That’s my
    differentiator—my ideas and novel perspectives.
  prefs: []
  type: TYPE_NORMAL
- en: I do not, however, enjoy marketing. I’m good at it if I take the required amount
    of time to prime creativity, but it’s a drag to get myself to actually care about
    optimizing headlines and leads and offer positioning and all of that stuff. I’d
    rather spend my finite creative firepower on the writing I enjoy doing.
  prefs: []
  type: TYPE_NORMAL
- en: In business, when you don’t enjoy doing something, it’s wise to outsource it
    to someone—or now, something—that can do it better.
  prefs: []
  type: TYPE_NORMAL
- en: The thing is, AI is not a good marketer (or writer) out of the box. AI has a
    swath of general information that needs to be made specific.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, if you want to outsource your marketing, you have 2 options:'
  prefs: []
  type: TYPE_NORMAL
- en: Become very good at marketing and create your own AI system.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Find someone who is good at marketing, understand the process, and use their
    system so you can focus on what you enjoy doing.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: With that I say you’re in luck!
  prefs: []
  type: TYPE_NORMAL
- en: Because I’ve created an AI system that can create better customer avatars, offers,
    landing pages, and sales copy than 99% of creators, businesses, and especially
    corporate marketing departments.
  prefs: []
  type: TYPE_NORMAL
- en: How To Make $1 Million (In General)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before we start, let’s break down a few realistic paths to get to $1 million
    a year.
  prefs: []
  type: TYPE_NORMAL
- en: $1,000,000 / 12 = $83,333 per month
  prefs: []
  type: TYPE_NORMAL
- en: $83,333 / 30 = $2,777 per day
  prefs: []
  type: TYPE_NORMAL
- en: Now, there are a few ways to do that.
  prefs: []
  type: TYPE_NORMAL
- en: Sell 18 $150 products a day
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sell 111 $25 subscriptions a day
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Land one $5000 client every other day
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Land one $10,000 client every 4 days
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A combination of both. 1-2 clients a week and a few product sales a day.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Or whatever other combination and price point there is to hit $1 million.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you go the client route, you will probably need a team after a certain amount
    of time (or have the service so productized you can handle fulfillment yourself).
  prefs: []
  type: TYPE_NORMAL
- en: If you go the product route or subscription route, like a software or membership,
    you will need a lot of traffic.
  prefs: []
  type: TYPE_NORMAL
- en: How do you get enough traffic to make that many product or service sales?
  prefs: []
  type: TYPE_NORMAL
- en: At a 2.5% conversion rate on a landing page that allows people to purchase your
    product, you need 720 people to visit that page a day to make 18 sales on a $150
    product.
  prefs: []
  type: TYPE_NORMAL
- en: Where do those 720 people come from?
  prefs: []
  type: TYPE_NORMAL
- en: Social media, ads, SEO, or some other form of influencer marketing or word of
    mouth.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, if we assume you’re skilled at social media (yes, social media is a skill,
    not luck based on an algorithm), you can:'
  prefs: []
  type: TYPE_NORMAL
- en: Get 10-50,000 views per YouTube video
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Get 500k to 1 million impressions on social media per month
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That means out of that many people, you need only 720 people to click on your
    landing page in order to make $1 million a year.
  prefs: []
  type: TYPE_NORMAL
- en: '*720 people out of hundreds of thousands isn’t that much to ask for.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*And of course, most people would be happy with much less than $1 million per
    year.*'
  prefs: []
  type: TYPE_NORMAL
- en: For those who aren’t used to that kind of money or work based on salary, it
    is a bit “out there” to think it can be that simple. That’s what your employer
    does to make multiples on top of what they pay you to execute one specific part
    of the process that makes them money.
  prefs: []
  type: TYPE_NORMAL
- en: But of course, it’s simple not easy yada yada I get it.
  prefs: []
  type: TYPE_NORMAL
- en: It can take 5-10 years to get *really* good at offer creation, social media
    marketing, and copywriting.
  prefs: []
  type: TYPE_NORMAL
- en: But if we train AI on the principles of them all, and feed them data from legendary
    marketers, you’d be shocked how well AI can do those things for you.
  prefs: []
  type: TYPE_NORMAL
- en: How To Use AI To Make $1 Million
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you haven’t already, [read my previous letter that goes over the absolute
    basics of AI](https://thedankoe.com/letters/learn-ai-to-10x-any-other-skill-full-beginner-guide/)
    and how to write meta prompts.
  prefs: []
  type: TYPE_NORMAL
- en: You can read it after this to fill in the blanks.
  prefs: []
  type: TYPE_NORMAL
- en: For now, I’m going to teach you everything you need to know about branding,
    marketing, and content along with a way to have AI do it for you.
  prefs: []
  type: TYPE_NORMAL
- en: Personal Brand Strategy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We’re going to focus on social media because:'
  prefs: []
  type: TYPE_NORMAL
- en: It’s free, and frankly, I don’t understand paid ads enough to teach you (and
    testing content on social media is how you create winning ads without blowing
    a ton of money)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You probably don’t have the time for SEO, or the money for sponsoring influencers
    (again, use socials to test)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Even though social media is free and accessible, it’s arguably the best source
    of traffic, and an audience = leverage
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'So here’s what you need to do:'
  prefs: []
  type: TYPE_NORMAL
- en: First, go to [Kortex and start a new chat](https://kortex.co) with the Personal
    Brand Strategy option under the ‘Market’ category.
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2606">![](../Images/5aaf4e9ef99df3ef1d06bd5232055880.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Hit ‘enter’ to start the interview.
  prefs: []
  type: TYPE_NORMAL
- en: 'Then, it will walk you through a series of questions and eventually spit out
    an entire strategy with:'
  prefs: []
  type: TYPE_NORMAL
- en: A summary of your transformation story, ideal target audience, and value proposition
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your ‘domain of mastery’ composed of one monetizable skill/interest followed
    by two complementary skills/interests
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A list of your audience’s pain points, content inspiration sources, and authority
    building topics
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A condensed and expanded social media bio to use across different platforms
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A monetization strategy with potential services to offer, products to sell,
    and starting points
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A content strategy with posting dates and general tips
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/f736cb06522e5fc0daad366c19105b10.png)'
  prefs: []
  type: TYPE_IMG
- en: I personally made all of these AI flows in Kortex based off of my own courses,
    experience, and industry best practices.
  prefs: []
  type: TYPE_NORMAL
- en: They’re a very good starting point.
  prefs: []
  type: TYPE_NORMAL
- en: Copy the output of this prompt and save it as a new document so you can keep
    it safe.
  prefs: []
  type: TYPE_NORMAL
- en: Customer Avatar
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Market research is annoying.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve always hated doing it, and because of that, my customer avatars were always
    half-assed.
  prefs: []
  type: TYPE_NORMAL
- en: I never felt like I *dug deep* into who they were, and the rest of my marketing
    suffered because of that.
  prefs: []
  type: TYPE_NORMAL
- en: With your strategy from above, we need to dig deeper into your target audience.
  prefs: []
  type: TYPE_NORMAL
- en: We need to understand their demographics, psychographics, buying behavior, where
    they hang out online, and more.
  prefs: []
  type: TYPE_NORMAL
- en: For this step, go to the ‘Customer Avatar Generator’ inside the same ‘Market’
    category when creating a new prompt.
  prefs: []
  type: TYPE_NORMAL
- en: Fill in the blanks with the target audience description you got from your Personal
    Brand Strategy.
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-2608">![](../Images/e7d05548b2cfebba2ea8b01f6b9dc2f9.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Answer all of the interview questions from the AI, save your customer avatar
    to a new document, and be ready to reference it in everything else you do from
    now on.
  prefs: []
  type: TYPE_NORMAL
- en: Irresistible Offer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Here’s the main problems at this step:'
  prefs: []
  type: TYPE_NORMAL
- en: Most people don’t know what they want to sell in order to monetize
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If people do know what they want to sell, it usually sucks because it’s vague
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When they try to create a more compelling offer, it’s usually based on guesswork
    rather than data and people aren’t confident in what they’re selling
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The cool thing about AI is that it has literally the entire internet’s worth
    of knowledge, and certain models like Claude don’t suffer from self-doubt and
    a lack of confidence that impacts the quality of their work.
  prefs: []
  type: TYPE_NORMAL
- en: So, do the same thing this time.
  prefs: []
  type: TYPE_NORMAL
- en: Go to the ‘Irresistible Offer Creation Blueprint’, fill in the first blank with
    “@customer avatar document” and the second blank with a brief description of the
    product or service you want to sell based on your brand strategy (or based on
    one you already have planned).
  prefs: []
  type: TYPE_NORMAL
- en: 'Again, answer the clarifying questions and kAI will spit out a full offer with:'
  prefs: []
  type: TYPE_NORMAL
- en: The delivery mechanism (course, template, freelancing, etc)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The big idea to capture attention
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The big problem and amplifying pain points
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The quantifiable outcome that your audience desires
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The unique mechanism that sets your offer apart
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: General features and benefits (you can and should change these)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The value equation analysis from Alex Hormozi
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: General positioning recommendations to make it even better
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-2609">![](../Images/45f8582dc20472999684a28f35fb9d3b.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Again, save this as a document in your workspace for the next step.
  prefs: []
  type: TYPE_NORMAL
- en: High Converting Landing Page
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now you have all of your marketing firepower saved inside documents in your
    workspace.
  prefs: []
  type: TYPE_NORMAL
- en: We need kAI to string all of that together into a well-written persuasive landing
    page.
  prefs: []
  type: TYPE_NORMAL
- en: I wouldn’t worry about landing page design just now. In fact, the highest converting
    landing pages are often pure and persuasive text.
  prefs: []
  type: TYPE_NORMAL
- en: You can take the output that kAI gives you, create the product on [Stan (a place
    for creators to host products – and the most affordable, feature rich option)](https://join.stan.store/thedankoe),
    and paste your landing page text into there.
  prefs: []
  type: TYPE_NORMAL
- en: After testing this, the writing that kAI spits out is better than almost any
    creator I’ve seen. Most creators don’t even think about learning marketing or
    copywriting, so this alone will get you better results than them (I know because
    I’ve been doing this for 5 years and have launched over 10 products.)
  prefs: []
  type: TYPE_NORMAL
- en: We are our own worst enemies when we first get into marketing and copywriting.
    We overcomplicate things and try to think of the most clever or creative thing
    and end up with something that falls flat and doesn’t make any money.
  prefs: []
  type: TYPE_NORMAL
- en: So again, go to the ‘Persuasive Landing Page Generation’ option, insert your
    target audience, offer blueprint, and optional voice analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Watch the AI spit out headline variations followed by a structured and persuasive
    landing page.
  prefs: []
  type: TYPE_NORMAL
- en: You can see it’s pulling from my voice analysis here, which may not be optimal
    talking in a philosophical tone, but the rest of the landing page is quite good.
  prefs: []
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-2610">![](../Images/8678ca58fb1e182a375afbf2f2df48f5.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Make edits as you need, but most of it should be good to go.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: Just because you can spit out copywriting doesn’t mean that you can ignore
    the need to *test.* If you don’t make money the first time around, it’s not the
    AI’s fault. It’s still your fault for not being able to use feedback and iterate.'
  prefs: []
  type: TYPE_NORMAL
- en: 'You can return to the Landing Page AI chat you have at any time and tell it
    things like:'
  prefs: []
  type: TYPE_NORMAL
- en: “This isn’t converting well, can you help me understand why?”
  prefs: []
  type: TYPE_NORMAL
- en: “What can I add to my offer to make it more compelling?”
  prefs: []
  type: TYPE_NORMAL
- en: “Regenerate 10 headline variations, short and long, so I can test them.”
  prefs: []
  type: TYPE_NORMAL
- en: Remember that the best way to use AI is to converse with it, not expect it to
    spit out something perfect on the first go.
  prefs: []
  type: TYPE_NORMAL
- en: Posts, YT Videos, Emails, Reels
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You now have a strategy, target audience, offer blueprint, and landing page.
  prefs: []
  type: TYPE_NORMAL
- en: Now, all you need to do is build the actual product and start posting to social
    media.
  prefs: []
  type: TYPE_NORMAL
- en: 'Thankfully, under the ‘Create’ category there are options to:'
  prefs: []
  type: TYPE_NORMAL
- en: Generate 50+ viral content ideas
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Recreate any viral youtube video in your voice (this is under the default category,
    deselect any category to see it)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Write social posts or short video scripts for X, LinkedIn, Threads, IG, YT shorts,
    or TikTok
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Write threads with better hooks than most creators
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Write YouTube scripts, newsletters, or articles
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Turn an idea into a reel, tiktok, or short
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-2611">![](../Images/f57d49eae1007f4baa283561f5028ee6.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: On top of that, there’s a ‘Persuasive Ads, Emails, & Scripts’ option under the
    ‘Market’ category that can write sales posts, emails, and ads at varying lengths.
    It’s decent at writing captions for Instagram and LinkedIn posts that plug your
    offer.
  prefs: []
  type: TYPE_NORMAL
- en: The only thing stopping you now is the discipline to sit down and actually do
    it.
  prefs: []
  type: TYPE_NORMAL
- en: And if you struggle with that, maybe you need to try the ‘Personal Growth Advisor’
    option under the ‘Growth’ category.
  prefs: []
  type: TYPE_NORMAL
- en: So yeah… all of that’s pretty insane.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to try them all out, sign up for [Kortex here.](https://kortex.co)
  prefs: []
  type: TYPE_NORMAL
- en: If you want to create reels or tutorials around Kortex and become an affiliate,
    [you can do that here.](https://kortex.co/affiliates)
  prefs: []
  type: TYPE_NORMAL
- en: Have fun with this, and enjoy the new models (like Llama Scout and Maverick,
    Gemini 2.5 pro, and all other frontier models). That way you don’t have to pay
    for multiple subscriptions unless you use AI for images, which we will also be
    adding at some point.
  prefs: []
  type: TYPE_NORMAL
- en: If you download the desktop version of kortex and press Ctrl or Command+A, it
    will open a floating chats window so you can chat with AI at anytime from anywhere
    on your computer.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
