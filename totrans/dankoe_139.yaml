- en: Learn This Skill If You Want To Thrive The Next 10 Years
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 学习这项技能，如果你想在未来10年里蓬勃发展
- en: 原文：[https://thedankoe.com/letters/learn-this-skill-if-you-want-to-survive-the-next-10-years/](https://thedankoe.com/letters/learn-this-skill-if-you-want-to-survive-the-next-10-years/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/learn-this-skill-if-you-want-to-survive-the-next-10-years/](https://thedankoe.com/letters/learn-this-skill-if-you-want-to-survive-the-next-10-years/)
- en: Ever since I can remember, I’ve had the goal of doing what I love for a living.
    Isn’t that what everyone wants?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 从我能记事起，我就有一个目标，那就是把热爱的事情变成职业。难道这不是每个人都想要的吗？
- en: My family, teachers, and even the people I was following online screamed at
    me to go down other paths.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我的家人、老师，甚至我在线上关注的人都在大声呼喊，让我走其他道路。
- en: So that’s what I did.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 所以这就是我做的事情。
- en: Went to college (and didn’t finish after 5 years)
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上过大学（但5年后没有毕业）
- en: Learned creative skills on the side
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 顺便学习了创意技能
- en: Started every online business imaginable
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始了所有可以想象到的在线业务
- en: Learned to code because it was “lucrative”
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习编程，因为它是“有利可图的”
- en: Dropped out of college because it was wasting my time
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 因为我认为大学在浪费时间，所以我退学了
- en: Got a $55K/year job as an entry level web developer at a design agency
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在一家设计公司找到了一份年薪55K的初级网页开发员工作
- en: Throughout this entire journey, my dream of “doing what I love” stuck in the
    back of my head. I was constantly reminded of it. There wasn’t a single moment
    from age 16-25 where I wasn’t working on a meaningful side project.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在整个旅程中，我“做我所爱”的梦想一直在我脑海中。我不断地被提醒这一点。从16岁到25岁，我没有一刻不在从事一个有意义的副项目。
- en: I still maintain this habit to this day. If it isn’t a business project, it’s
    a health project.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我至今仍保持着这个习惯。如果不是商业项目，那就是一个健康项目。
- en: This is how I get out of a rut, because the only reason I fall into a rut is
    psychic entropy, the mind tending toward disorder. Meaning I don’t have a goal,
    project, or priority to bring my focus to.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我摆脱困境的方法，因为唯一让我陷入困境的原因是心理熵，即思想倾向于混乱。这意味着我没有目标、项目或优先事项来集中我的注意力。
- en: My current projects are Kortex (second brain software), Kortex University (a
    school for creators), promoting my book, planning another book (to write in Kortex),
    and gaining a few more pounds before I trim down for the warm seasons.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我目前的项目是Kortex（第二大脑软件）、Kortex University（一个为创作者的学校）、推广我的书、计划另一本书（在Kortex中写作），并在我减重迎接温暖的季节之前再增重几磅。
- en: Why am I telling you all of this?
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我为什么要告诉你这些？
- en: Because I realized most people didn’t know what they were talking about.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 因为我发现大多数人并不知道自己谈论的是什么。
- en: I was taking career and life advice from people who hadn’t achieved what I wanted
    to achieve. In their closed mind, the reality I wanted to create was impossible,
    yet I kept looping back to projects that I loved working on for the sake of maintaining
    my sanity.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我曾从那些没有实现我想要实现的目标的人那里获取职业和生活的建议。在他们封闭的头脑中，我想创造的现实中是不可能的，但我还是不断回到那些为了保持理智而热爱的工作的项目上。
- en: Most people don’t have a personal project that will create the future they want.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人没有能够创造他们想要的未来的个人项目。
- en: Most people don’t realize a personal project is not optional to *create* the
    future *they* want.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人没有个人项目来创造他们想要的未来。
- en: The only other option is to live by your programming, pursue the goals that
    society set for you, and work on the projects that lead to those goals. If you
    don’t spend 1 hour building your dreams, you will spend 8 hours building someone
    else’s, for life.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一的另一种选择是按照你的编程生活，追求社会为你设定的目标，并从事那些能实现这些目标的项目。如果你不花1小时去建造你的梦想，你将花上8小时去建造别人的，而且是一辈子。
- en: '10 years ago, my mindset was: *“If I can monetize any of these passion projects,
    I’ll be set. All I need to do is learn and build until one works. I need to increase
    my capacity for luck with skill acquisition and experience. It may take 10 years,
    but some people go to school for 12\. Even if I fail I’d be in a similar position.”*'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 10年前，我的心态是：“如果我能将任何这些激情项目货币化，我就会成功。我需要做的就是学习和建造，直到其中一个成功。我需要通过技能获取和经验来增加我的运气容量。可能需要10年，但有些人上学要12年。即使我失败了，我也会处于相似的位置。”
- en: After years of trial and error with every “marketable skill” that people tell
    you to learn, I found the secret.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 经过多年对人们告诉你要学习的每一个“可销售技能”的尝试和错误，我发现了一个秘密。
- en: Well, not really a secret, but I’m supposed to make you curious to read more
    ya know.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，这其实不是什么秘密，但我应该让你好奇，想知道更多。
- en: 'Before we begin:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始之前：
- en: This one is going to be long. Make sure you have the bandwidth and time to read
    it. I promise it will be worth it.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章会很长。请确保你有足够的带宽和时间来阅读它。我保证它值得。
- en: If you want to learn the ins and outs of writing (that can’t be covered in one
    article), check out [2-Hour Writer.](https://2hourwriter.com)
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想了解写作的方方面面（这不可能在一篇文章中涵盖），请查看[2-Hour Writer.](https://2hourwriter.com)
- en: Why Writing?
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么是写作？
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1763">![](../Images/d5f3a1fb0160b7464c1e1f51dbc08892.png)</picture>
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1763">![](../Images/d5f3a1fb0160b7464c1e1f51dbc08892.png)</picture>
- en: The future of media is decentralized.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 媒体的未来是去中心化的。
- en: 'People are and will continue to turn to:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 人们现在和将来都会转向：
- en: Social media for news
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 新闻媒体社交媒体
- en: Courses for education
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教育课程
- en: Creators for knowledge
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 知识创作者
- en: I don’t want to hear about AI disrupting writing.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我不想听到关于人工智能颠覆写作的消息。
- en: I see it as an impossibility that the only thing we consume online is created
    by a robot without a soul.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为我们在线消费的唯一东西是由没有灵魂的机器人创造的，这是不可能的。
- en: The emergence of AI seems to favor human creativity, and media is the vessel
    for front-end creativity.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的出现似乎有利于人类创造力，而媒体是前端创造力的载体。
- en: AI is a tool for writers to become more prolific.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能是作家提高生产力的工具。
- en: Writing is the skill that breathes life into any other skill you learn.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 写作是赋予你所学任何其他技能生命力的技能。
- en: It is *the* meta-skill that people avoid learning until they are forced to (because
    they need to survive).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这是人们直到被迫学习（因为他们需要生存）之前都会避免学习的元技能。
- en: They don’t see it’s importance because it’s *“just plain old writing, who needs
    to learn that?”*
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 他们没有看到它的重要性，因为它只是“普通的写作，谁需要学习这个？”
- en: There was a reason I failed at almost every business model I tried.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我在尝试的几乎所有商业模式上都失败了，这是有原因的。
- en: Digital art, SEO, Facebook ads, dropshipping, e-commerce stores, and more.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 数字艺术、SEO、Facebook 广告、dropshipping、电子商务商店等等。
- en: I was so focused on learning the skill and building a website that I forgot
    I actually had to get customers at some point.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我之所以如此专注于学习这项技能和建立网站，以至于我忘记了实际上我必须在某个时候获得客户。
- en: How do you get customers?
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 你是如何获得客户的？
- en: Writing.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 写作。
- en: Content (or media) is the front end of the internet. It’s how you capture, hold,
    and convert attention in a sea of self-deprecating memes and valueless content.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 内容（或媒体）是互联网的前端。它是你如何在一片自我贬低的自媒体和毫无价值的内容中捕捉、保持和转换注意力的方式。
- en: The foundation of content is writing.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 内容的基础是写作。
- en: '**Tweets?** Writing.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推文？** 写作。'
- en: '**Threads?** Writing.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**讨论串？** 写作。'
- en: '**Newsletters?** Writing.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通讯？** 写作。'
- en: '**Blog posts?** Writing.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**博客文章？** 写作。'
- en: '**Cold emails?** Writing.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**冷邮件？** 写作。'
- en: '**Social media captions?** Writing.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**社交媒体标题？** 写作。'
- en: '**Landing pages?** Writing.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**着陆页？** 写作。'
- en: '**Product descriptions?** Writing.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**产品描述？** 写作。'
- en: '**Course modules?** Writing.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**课程模块？** 写作。'
- en: '**Client communications?** Writing.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户沟通？** 写作。'
- en: '**Customer resources?** Writing.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户资源？** 写作。'
- en: '**Ads of any form?** Starts with writing.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任何形式的广告？** 从写作开始。'
- en: '**YouTube videos?** Done best with written scripts.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**YouTube 视频？** 最好的方式是使用书面脚本。'
- en: '**Instagram reels and TikToks?** Like reading well-written tweets.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Instagram 短视频和 TikToks？** 就像阅读写得好的推文一样。'
- en: '**Images on Instagram?** Usually designed from a well-written quote or saying.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Instagram 图片？** 通常是从一句写得好的引言或格言中设计的。'
- en: '**Any other form of online marketing, advertising, or entertainment?** Starts
    with writing.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任何其他形式的在线营销、广告或娱乐？** 从写作开始。'
- en: '*Everything that your audience, customers, and network see starts with writing.*'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '*你受众、客户和网络看到的每一件事都始于写作。*'
- en: Don’t underestimate that power.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 不要低估这种力量。
- en: Every single person in business is a writer at their core, they just don’t label
    themselves as that.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 每个从事商业的人本质上都是一名作家，他们只是没有这样称呼自己。
- en: There’s a reason I can outperform every dude with six pack abs in terms of engagement
    and follower growth on Instagram.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 我之所以能在 Instagram 上在参与度和粉丝增长方面超越所有拥有六块腹肌的家伙，是有原因的。
- en: High-impact digital writing.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 高影响力数字写作。
- en: Not technical or academic writing.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 不是技术或学术写作。
- en: I’m not here to teach you how to write a research paper. I’m here to teach you
    how to write in a way that lets you live the life you want.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是来教你如何写研究论文的。我是来教你如何以让你过上想要的生活的方式写作。
- en: If you want to become a master of content (and leverage no-code tools to distribute
    your writing and attract an audience) it’s pretty clear that writing needs to
    be the foundation of your one-person business.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要成为内容大师（并利用无代码工具分发你的写作和吸引受众），很明显，写作需要成为你个人业务的基石。
- en: 6 Steps To Starting A One-Person Writing Business
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6 步骤开启个人写作业务
- en: Content is an extension of the personal and collective mind. We put out our
    ideas, beliefs, and opinions that form a digital society, cultures, and world.
    Content on the internet is content in the collective consciousness.
  id: totrans-73
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 内容是个人和集体思维的延伸。我们提出我们的想法、信仰和观点，形成了数字社会、文化和世界。互联网上的内容是集体意识中的内容。
- en: ''
  id: totrans-74
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The Art Of Focus
  id: totrans-75
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 专注的艺术
- en: I call myself a writer because that is what I do on a daily basis (even when
    it doesn’t seem like it on social media).
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我称自己为作家，因为这是我每天做的事情（即使在社会媒体上看起来不是这样）。
- en: I’ve sustained a $100K-$250K per month (with the occasional jump to $500K-$700K)
    revenue by writing tweets, newsletters, and threads that get repurposed into Instagram
    posts, YouTube videos, LinkedIn posts, and the rest. This is only for my personal
    brand, not my other company.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 我通过撰写推文、通讯和帖子（这些帖子被重新用于Instagram帖子、YouTube视频、LinkedIn帖子等）来维持每月10万至25万美元的收入（偶尔跳到50万至70万美元）。这仅针对我的个人品牌，而不是我的其他公司。
- en: In reflection, and referring to the top of this letter, writing is the force
    multiplier that made me have to pay 20x my previous web design salary in taxes
    each year. That’s a solid problem to have.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 反思，并参考这封信的顶部，写作是我不得不每年支付比以前网页设计工资高20倍的税收的倍增器。这是一个坚实的问题。
- en: But, if you were to strip things down to only X and a Newsletter, I would still
    maintain a lot of that revenue.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，如果你只把事情简化为X和通讯，我仍然会保持大部分收入。
- en: Don’t fall into the trap that you have to have an insane follower count across
    all platforms to replace your current income. [Follow this progression of income
    sources](https://thedankoe.com/letters/the-7-digital-career-paths-from-zero-experience-to-advanced/)
    if you don’t know where to start (last week’s letter).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 不要陷入必须要在所有平台上拥有疯狂的粉丝数量来替代你当前收入的陷阱。[遵循这个收入来源的进展](https://thedankoe.com/letters/the-7-digital-career-paths-from-zero-experience-to-advanced/)，如果你不知道从哪里开始（上周的信件）。
- en: Getting into it, here are the 6 steps to start your writing business.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 入门，以下是你开始写作业务的6个步骤。
- en: '**1) Choose A Topic You Can’t Shutup About**'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 选择一个你无法停止谈论的主题**'
- en: Don’t overthink this just yet. Pick a topic and practice writing.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 不要过早地思考这个问题。选择一个主题并练习写作。
- en: It can be productivity, creativity, spirituality, fitness, or any of the interests
    you could hold a conversation with.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 它可以是生产力、创造力、灵性、健身或任何你可以与之交谈的兴趣。
- en: If you are already writing, use one of your topics from [your topic tree](https://thedankoe.com/letters/dont-get-replaced-by-ai-how-to-write-authentic-content/).
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经开始写作，请使用你[你的主题树](https://thedankoe.com/letters/dont-get-replaced-by-ai-how-to-write-authentic-content/)中的一个主题。
- en: '**2) Brainstorm Your Unique Perspective**'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 策划你独特的观点**'
- en: Forget everything you know about “value.”
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 忘掉你关于“价值”的一切知识。
- en: Actionable advice and platitudes don’t sell as well as they did when the internet
    was just budding.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 可行的建议和陈词滥调在互联网刚刚兴起时并不像现在这样好卖。
- en: Novelty catches attention. Attention is a given if you want people to read what
    you write.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 新颖性吸引注意力。如果你想让人们阅读你写的东西，注意力是必不可少的。
- en: Novel perspectives are the best (and replicable way) to capture attention without
    using sleazy tactics.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 新颖的观点是捕捉注意力的最佳（且可复制的方式），而不使用卑鄙的策略。
- en: How do you come up with a novel perspective?
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何想出一个新颖的观点？
- en: 'Braindump:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 思维导图：
- en: Common problems associated with the topic
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与该主题相关的问题
- en: Benefits to overcoming those problems
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 克服这些问题的好处
- en: Common goals associated with the topic
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与该主题相关的常见目标
- en: Roadblocks to achieving those goals
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实现这些目标的道路障碍
- en: Personal experiences you’ve had
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你所经历的个人经历
- en: Now, piece everything together and *explain it how you would if you were talking
    to a friend.*
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，将所有东西拼凑在一起，*就像你和一个朋友交谈一样解释它。*
- en: Don’t try to copy someones perspective or way of wording things. Say it in your
    own voice and let it *refine with time, effort, and practice.*
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 不要试图模仿某人的观点或措辞方式。用自己的声音说出来，并让它*随着时间、努力和练习而完善。*
- en: '**3) Write 500-1000 Words On The Topic Per Week**'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 每周就主题写500-1000字**'
- en: You need a balance of depth and growth.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要深度和增长的平衡。
- en: Meaning, you need long form and short form.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 意味着你需要长篇和短篇内容。
- en: I’m big on starting a newsletter as your long form – but that can wait at the
    start.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常重视以通讯作为你的长篇内容——但可以等到开始时再进行。
- en: Focus on a platform like X.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 专注于一个平台，比如X。
- en: Write threads as your long form once a week.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 每周写一篇长篇帖子。
- en: Write 2-3 posts a day.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 每天写2-3篇帖子。
- en: Then focus on step 5 the most for growth.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 然后最专注于第5步以实现增长。
- en: I will break down how to write these soon.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 我很快就会分解如何写这些内容。
- en: '**4) Deconstruct & Simplify Ideas For Daily Posts**'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 为日常帖子分解和简化想法**'
- en: Writing long-form gives you multiple ideas to pull from.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 长形式写作给你提供了多个可以借鉴的想法。
- en: Don’t try to copy-paste posts from your newsletters or threads – *rewrite them
    as standalone short posts.*
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 不要尝试复制粘贴你的通讯或线程中的帖子——*将它们重写为独立的短帖子。*
- en: We will discuss this throughout the letter.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在整封信中讨论这一点。
- en: '**5) Learn How To Get Your Writing Shared (Crucial)**'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '**5) 学习如何让你的写作被分享（至关重要）**'
- en: Your writing means nothing if nobody sees it.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 如果没有人看到你的写作，你的写作就没有意义。
- en: This is a huge beginner trap.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个巨大的新手陷阱。
- en: They think they can write all day and hope that our lord and savior the algorithm
    will make them an overnight success.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 他们认为他们可以整天写作，并希望我们的救世主算法会让他们一夜成名。
- en: No. Writing is 20% of the equation. Traffic is 80%.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 不。写作只是方程式的20%。流量是80%。
- en: You get traffic on your profile and writing through replies, networking, and
    shares.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过回复、网络和分享在你的个人资料和写作中获得流量。
- en: I break down every possible way to do this in the [How To Actually Grow On Social
    Media letter.](https://thedankoe.com/letters/how-to-actually-grow-on-social-media-what-they-dont-tell-you/)
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 我在[如何在社交媒体上真正增长的信件](https://thedankoe.com/letters/how-to-actually-grow-on-social-media-what-they-dont-tell-you/)中详细介绍了所有可能的方法。
- en: '**6) Monetize Your Experience**'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '**6) 利用你的经验进行货币化**'
- en: Now that you have writing, a growing audience, and traffic – the only thing
    left to do is create a product or service to monetize.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你有了写作、不断增长的受众和流量——剩下要做的就是创建一个产品或服务来货币化。
- en: We discussed all possible options in last weeks letter.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在上周的来信中讨论了所有可能的选择。
- en: Everything You Need To Know About High-Impact Writing
  id: totrans-123
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 高影响力写作的一切你都需要知道
- en: Writing is the vehicle for articulated thought and communication. It is the
    medium for putting your message in front of those that can adopt the perspective
    it presents and operate within that shared reality.
  id: totrans-124
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 写作是表达思想和沟通的载体。它是将你的信息展示给那些可以接受你所呈现的视角并在其中运作的中介。
- en: ''
  id: totrans-125
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The Art Of Focus
  id: totrans-126
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 专注的艺术
- en: There are a lot of writing frameworks out there.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 有很多写作框架。
- en: After trying them all and making connections between them — I’ve created my
    own that I see as most effective.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 在尝试了所有这些并建立它们之间的联系后——我创造了自己的，我认为它是最有效的。
- en: 'If you want to read up on solid writing frameworks and connect the dots for
    yourself, some of my favorites are:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想了解一些可靠的写作框架并自己连接这些点，我的一些最喜欢的包括：
- en: '[PASTOR](https://goinswriter.com/better-sales-copy/) — for longer-form writing
    that works well for persuasive blogs and sales pages.'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '[PASTOR](https://goinswriter.com/better-sales-copy/)——适用于长形式写作，非常适合有说服力的博客和销售页面。'
- en: '[AIDA](https://www.siegemedia.com/creation/aida-model) — a basic framework
    for shorter-form writing like tweets, email opt-in pages, and sometimes a general
    structure for long-form content.'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '[AIDA](https://www.siegemedia.com/creation/aida-model)——一个用于推文、电子邮件订阅页面等短形式写作的基本框架，有时也是长形式内容的一般结构。'
- en: '[PAS(O)](https://www.copywritematters.com/paso-copywriting-formula/) — great
    for any type of content writing, short or long form.'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: '[PAS(O)](https://www.copywritematters.com/paso-copywriting-formula/)——适用于任何类型的内容写作，无论是短形式还是长形式。'
- en: 'ALL of these follow a general storytelling structure that sparks curiosity:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都遵循一个普遍的故事叙述结构，激发好奇心：
- en: '**A problem is introduced or implied** — making people curious about what caused
    that problem (the law of cause and effect). Hint at the effect and THEN dive into
    the cause.'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**引入或暗示一个问题**——让人们好奇是什么原因导致了这个问题（因果关系定律）。先暗示效果，然后再深入原因。'
- en: '**It exposes people to a potential sequence of events** — this is similar,
    but makes people want to understand the sequence of events that lead to a particular
    resolution (happy ending of a story).'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**它让人们接触到一系列可能的事件**——这与此类似，但让人们想要了解导致特定解决方案（故事的好结局）的事件序列。'
- en: '**It creates an information gap** — implying that there is educational, entertaining,
    or inspiring information that the specific reader desires.'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**它造成了一个信息差距**——这意味着存在教育、娱乐或启发性的信息，这是特定读者所渴望的。'
- en: 'Once curiosity is sparked, you must deliver on your promises through:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦好奇心被激发，你必须通过以下方式履行你的承诺：
- en: Personal, client, or other experiences that state or imply a transformation.
    A before (the problem) and an after (the resolution and associated benefits).
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 个人、客户或其他经历，陈述或暗示一种转变。一个“之前”（问题）和一个“之后”（解决方案和相关好处）。
- en: Step-by-step advice on how to get to the resolution quicker (a unique solution).
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何更快地达到解决方案的逐步建议（独特的解决方案）。
- en: A crystal clear call to action to lead them deeper into your other content or
    spark behavior change — again, so they can associate that good behavior with you.
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个清晰明确的行动号召，引导他们深入了解你的其他内容或激发行为改变——再次，这样他们就可以将这种良好行为与你联系起来。
- en: You do not have to use my framework. You can use any that you’d like. But I
    have considered these aspects of curiosity and storytelling when crafting my own.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 你不必使用我的框架。你可以使用你喜欢的任何框架。但我在构建自己的框架时已经考虑了好奇心和故事讲述的这些方面。
- en: I call mine the **APAG framework.**
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 我称之为 **APAG 框架**。
- en: Attention, Perspective, Advantage, and Gamify.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 注意力、视角、优势和游戏化。
- en: All are backed by psychological research with the intention of kicking someone
    into a flow-like experience… making them associate that good experience with you.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都有心理研究的支持，目的是将人们带入类似流动的状态体验……使他们将这种良好体验与你联系起来。
- en: What can this be used for?
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以用于什么？
- en: Your newsletter
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的新闻通讯
- en: Podcast or YouTube scripts
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 播客或YouTube脚本
- en: Multiple threads or medium-form posts
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多个线程或中形式帖子
- en: Sales pages, landing pages, or opt-in pages
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 销售页面、着陆页面或注册页面
- en: Book or eBook chapters or sections
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 书籍或电子书章节或部分
- en: Course modules, lead magnet modules, and other education
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 课程模块、吸引用户的模块以及其他教育模块
- en: Potential ideas for tweets or short-form posts
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 推特或短形式帖子的潜在想法
- en: Anything else that you use to build your business
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你用来构建业务的任何其他东西
- en: This section of the letter is pulled from [2 Hour Writer.](https://2hourwriter.com)
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 这封信的这一部分来自 [2 Hour Writer.](https://2hourwriter.com)
- en: Attention — The Art Of Hooks And Headlines
  id: totrans-155
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意 —— 吸引注意力的技巧与标题的艺术
- en: Your hook or headline are the most important aspect of your content.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 你的钩子或标题是你内容最重要的部分。
- en: If the hook doesn’t catch their attention — are they going to read the rest
    of the content that you put a lot of effort into? Or will they scroll past leaving
    your hard work gone unnoticed?
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 如果钩子没有吸引他们的注意力——他们会阅读你投入大量努力的其余内容吗？或者他们会滚动过去，让你的辛勤工作无人问津？
- en: 'These are the 3 things that will make them continue reading:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是让他们继续阅读的三个因素：
- en: '**Relevance** — how relevant is it to their everyday life? Resolved pains or
    potential benefits. What’s in it for the reader?'
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**相关性** —— 它与他们的日常生活有多相关？解决了痛苦或潜在的好处。对读者有什么好处？'
- en: '**Awareness** — is it simple or complex enough for the level of awareness you
    are targeting? Will they understand what you are about to show them?'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**意识** —— 它是否足够简单或复杂，以适应你想要达到的意识水平？他们能否理解你即将展示给他们的是什么？'
- en: '**Effort** — how fast will they receive the result (education, entertainment,
    or inspiration) and is it easy to get?'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**努力** —— 他们将多快收到结果（教育、娱乐或灵感），并且是否容易获得？'
- en: These do not all have to be included in your headline or hook — but they should
    all be considered. The most potent ones should be used.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 这些内容不必都包含在你的标题或钩子中——但都应该被考虑。最有力量的应该被使用。
- en: In a newsletter or article headline, you have much less room than a hook in
    a thread or other medium-form post (like a LinkedIn post).
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 在新闻通讯或文章标题中，你比在帖子或其他中形式帖子（如LinkedIn帖子）中的钩子有更少的空间。
- en: Now, we can start to piece together our headline or hook with pieces of our
    outline and article (the problems, benefits, experiences, etc).
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以开始使用我们的提纲和文章（问题、好处、经历等）的片段来拼凑我们的标题或钩子。
- en: '**The BIG problem** — you can create this by summarizing all of the problems
    you have listed.'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**核心问题** —— 你可以通过总结你列出的所有问题来创建这一点。'
- en: '**The BIG benefit** — again, you can create this by summarizing all of the
    benefits into one.'
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**核心好处** —— 你可以通过总结所有好处来创建这一点。'
- en: '**The BIG idea** — can you summarize the most impactful parts of the post into
    one sentence?'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**核心思想** —— 你能否将文章中最有影响力的部分总结成一句话？'
- en: '**The transformation process** — you can use numbers or a unique name to hint
    at the process that will get them results (posing an information gap).'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**转变过程** —— 你可以使用数字或独特的名称来暗示将带给他们结果的流程（提出信息差距）。'
- en: '**Timeframe** — can you quantify a timeframe for how long it will take them
    to read the content or get the result you are promising? Use numbers.'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间框架** —— 你能否量化他们阅读内容或获得你承诺的结果所需的时间？请使用数字。'
- en: '**Negative personal experience** — if you include a personal experience in
    your content, can you imply a low point during that experience and the emotion
    associated with it?'
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**负面个人经历** —— 如果你在内容中包含个人经历，能否暗示经历中的低点和与之相关的情感？'
- en: Treat all of these as building blocks for the perfect hook.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 将所有这些都视为构建完美钩子的构建块。
- en: You don’t have to include all of them, especially in the headline.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 你不必包括所有内容，尤其是在标题中。
- en: But the hook (the few starting lines of your content) can talk about them to
    grab the readers attention once they click to read.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 但钩子（你内容的前几行）可以谈论它们，一旦点击阅读，就能吸引读者的注意。
- en: Here is an example of a tweet with a short hook, can you see how it implies
    a problem, benefit, and transformation in one sentence?
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一条推文的例子，有一个简短的钩子，你能看到它如何在一句中暗示问题、好处和转变吗？
- en: You won’t make it without obsession.
  id: totrans-175
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 没有痴迷，你无法成功。
- en: ''
  id: totrans-176
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: But nobody starts out obsessed. They start out curious. They experiment. They
    build things. They break things, They fail. And eventually they can’t pull themselves
    away.
  id: totrans-177
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 但没有人一开始就是痴迷的。他们开始时是好奇的。他们尝试。他们建造东西。他们打破东西，他们失败。最终，他们无法自拔。
- en: ''
  id: totrans-178
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Curiosity turns into obsession with time and persistence.
  id: totrans-179
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 好奇心随着时间的推移和坚持变成痴迷。
- en: ''
  id: totrans-180
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [November 24, 2023](https://twitter.com/thedankoe/status/1728068209075519958?ref_src=twsrc%5Etfw)
  id: totrans-181
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2023年11月24日](https://twitter.com/thedankoe/status/1728068209075519958?ref_src=twsrc%5Etfw)
- en: '**Note:**'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意：**'
- en: The “attention” part of the APAG framework can be used for the hook or headline
    of long or short form.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: APAG框架中的“注意”部分可以用作长篇或短篇内容的钩子或标题。
- en: Meaning, it can be used as the first slide of a carousel, first line of a tweet,
    the hook of a thread, etc.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 意味着，它可以作为旋转木马的第一张幻灯片、推文的第一行、长篇或短篇内容的钩子等。
- en: All of the other pieces below will be treated as sections of long form, or they
    can individually be used for a short post like a tweet.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 以下所有其他内容都将被视为长篇内容的章节，或者它们可以单独用于像推文这样的短篇帖子。
- en: Long form should follow APAG.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 长形式应遵循APAG。
- en: Short form should be A+P, A+A, or A+G.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 短形式应该是A+P、A+A或A+G。
- en: If you can fit them all in one short post, even better, try it.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你可以一次性将它们全部放入一篇短文中，那就更好了，试试看。
- en: Perspective — Paint A Picture Of The Enemy Or Why A Perspective Is Wrong
  id: totrans-189
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 观点 — 描绘敌人的图画或为什么一个观点是错误的
- en: This is where you relate to and amplify the problems that the reader is currently
    experiencing. This is also where you create the “enemy” of your story.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你与读者目前经历的问题建立联系并放大问题的地方。这也是你创造故事“敌人”的地方。
- en: The best way you can do this is to paint a picture of a common perspective on
    the topic you are writing about.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 你能做的最好的事情就是描绘一个关于你所写主题的常见观点的图画。
- en: '*Place a heavy emphasis on the problems associated with that perspective and
    the pains they cause.*'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: '*在描述与该观点相关的问题及其带来的痛苦时，要着重强调。*'
- en: '*This can be stated directly or implied. Here is an example tweet that paints
    a perspective without directly stating the problem:*'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: '*这可以直接陈述或暗示。以下是一条推文，它描绘了一个观点，但没有直接陈述问题：*'
- en: Wake up.
  id: totrans-194
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 醒来。
- en: Hit snooze 4 times.
  id: totrans-195
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 按“贪睡”键4次。
- en: Stare at your phone.
  id: totrans-196
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 盯着你的手机。
- en: Roll out of bed.
  id: totrans-197
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 从床上滚下来。
- en: Make coffee.
  id: totrans-198
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 做咖啡。
- en: Sit in traffic.
  id: totrans-199
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 坐在交通中。
- en: 8 hours of unfulfilling work.
  id: totrans-200
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 8小时令人不满的工作。
- en: Sit in traffic… again.
  id: totrans-201
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 再次坐在交通中。
- en: Argue with your "significant" other.
  id: totrans-202
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 与你的“重要”伴侣争吵。
- en: Walk the pet.
  id: totrans-203
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 散步宠物。
- en: Watch TV.
  id: totrans-204
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 看电视。
- en: Pass out.
  id: totrans-205
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 睡过去。
- en: Repeat.
  id: totrans-206
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 重复。
- en: ''
  id: totrans-207
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This should scare the shit out of you.
  id: totrans-208
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这应该会让你感到害怕。
- en: ''
  id: totrans-209
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [February 23, 2023](https://twitter.com/thedankoe/status/1628758834192736256?ref_src=twsrc%5Etfw)
  id: totrans-210
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2023年2月23日](https://twitter.com/thedankoe/status/1628758834192736256?ref_src=twsrc%5Etfw)
- en: For more firepower, relate to them with a personal experience you’ve had with
    that perspective.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 为了增加火力，用你个人与那种观点相关的经历来与他们建立联系。
- en: This is how I start most of my articles, newsletters, videos, and threads. I
    give a personal experience to help illustrate the problem and relate to the readers.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我开始大多数文章、通讯、视频和帖子的方式。我分享一个个人经历，以帮助说明问题并与读者建立联系。
- en: People want to feel understood. If they feel understood, they are more open
    to hearing what you have to say.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 人们希望被理解。如果他们感到被理解，他们就更愿意听你说话。
- en: '**Not sure what to say in this section?**'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: '**不知道在这个部分该说些什么？**'
- en: Good writing is about piecing together everything you have available to you.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 好的写作是将你所能利用的一切拼凑在一起。
- en: 'For Perspective, you can use:'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 对于观点，你可以使用：
- en: Problems
  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 问题
- en: Benefits
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 好处
- en: Examples
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 例子
- en: Metaphors
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 隐喻
- en: Quotes or Tweets
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 引用或推文
- en: Personal or popular stories
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 个人或流行故事
- en: Comparisons
  id: totrans-223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较
- en: Concepts
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 概念
- en: '*Any of those elements (what we call them in Kortex) can be used as a start,
    transition, or end of a section.*'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: '*这些元素（我们在Kortex中称它们为）可以用作章节的开始、过渡或结束。*'
- en: If you have writers block, research or think of problems, examples, tweets,
    comparisons, etc.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你遇到写作障碍，研究或思考问题、例子、推文、比较等。
- en: Advantage — Paint A Picture Of The Hero, Vision, Or Why Your Perspective Is
    Right
  id: totrans-227
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优势 — 描绘英雄、愿景或为什么你的观点是正确的画面
- en: Note that any part of the APAG framework can be a single line or an entire section
    of content.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，APAG框架的任何部分都可以是一行或整个内容部分。
- en: As long as you hit on each part, you’re fine. If you can’t think of anything
    more to write, move on to the next part.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 只要你触及每个部分，你就没问题。如果你想不出更多要写的内容，就转到下一部分。
- en: With persuasive writing, you are presenting a credible argument to sell something.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 在说服性写作中，你是在提出一个可信的论点来推销某物。
- en: YOU are always selling, or at least you should be.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 你总是在销售，或者至少你应该如此。
- en: Not only selling products — but selling ideas and better ways of doing things.
    That’s what people want. Sell people out of a low-consciousness existence.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 不仅销售产品 — 而且销售思想和更好的做事方式。这就是人们想要的。让人们摆脱低意识的存在。
- en: Now that you’ve painted a picture of their faulty perspective and the problems
    associated with it — you can start to shift they perspective to view things the
    way you do.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经描绘了他们错误观点及其相关的问题 — 你可以开始转变他们的观点，让他们以你的方式看待事物。
- en: How can you educate people to the point of understanding your perspective?
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你如何教育人们，让他们理解你的观点？
- en: What do they need to know in order to understand where you are now?
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们需要了解什么才能理解你现在所处的位置？
- en: What is missing from your writing that prevents them from understanding your
    better way of doing things?
  id: totrans-236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你写作中缺少了什么，阻止了他们理解你的更好的做事方式？
- en: This is where you can present novel ideas, concepts, social proof, and experiences
    that make your argument credible.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你可以展示新颖想法、概念、社会证明和经验的地方，这些可以使你的论点更具可信度。
- en: If you have quotes, tweets, or other references you can include — that will
    only make your argument more credible.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有一些引言、推文或其他参考资料可以包括 — 那将只会使你的论点更具可信度。
- en: 'Here is an example of an “Advantage” tweet I wrote:'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个我写的“优势”推文的例子：
- en: Writing is a great skill to learn because it pairs with any other skill or interests.
  id: totrans-240
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 写作是一项伟大的技能去学习，因为它可以与任何其他技能或兴趣搭配。
- en: ''
  id: totrans-241
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you can write, you can do whatever you want and distribute the value you
    discover from those pursuits.
  id: totrans-242
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你能够写作，你就可以做任何你想做的事，并分发从这些追求中发现的价值。
- en: ''
  id: totrans-243
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Writing allows you to make a living from living. The problem is that most people
    arent
  id: totrans-244
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 写作让你可以从生活中谋生。问题是大多数人并不
- en: ''
  id: totrans-245
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [May 10, 2023](https://twitter.com/thedankoe/status/1656228093453914112?ref_src=twsrc%5Etfw)
  id: totrans-246
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2023年5月10日](https://twitter.com/thedankoe/status/1656228093453914112?ref_src=twsrc%5Etfw)
- en: This is the turning point in this metaphorical story. You are showing them a
    better way of doing things.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 这是这个比喻故事的转折点。你正在向他们展示更好的做事方式。
- en: Again, you can use examples, problems, benefits, stories, metaphors, quotes,
    tweets, etc to help structure your argument and make it more credible.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，你可以使用例子、问题、好处、故事、隐喻、引言、推文等来帮助构建你的论点并使其更具可信度。
- en: Gamify — Create A Hierarchy Of Challenging Goals
  id: totrans-249
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 游戏化 — 创建挑战性目标的层次结构
- en: When you think of a game, you think of a set hierarchy of goals (or quests,
    missions, etc) that give people clarity on what to do.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 当你想到一个游戏时，你会想到一组目标层次（或任务、使命等），这给人们提供了清晰的方向，知道该做什么。
- en: When done correctly, and when you give people a challenge that matches their
    skill, you put your readers into a flow state of discovering novel ideas that
    aid in their future.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 当正确执行，并且当你给出与他们技能相匹配的挑战时，你将你的读者置于发现新颖想法的流动状态，这些想法有助于他们的未来。
- en: In short, you “gamify” by giving step-by-step advice on how to achieve the transformation
    you’ve described in the post. (From old problem-ridden perspective to an advantageous
    perspective).
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，你通过在帖子中描述的转型步骤提供逐步建议来“游戏化”。（从充满问题的旧观点到有利的角度）。
- en: You are wrapping everything up into a clear, concise, and actionable way of
    getting a specific result — and making it clear on what they should do next.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在将一切总结成一个清晰、简洁且可操作的获得特定结果的方式 — 并清楚地说明他们下一步应该做什么。
- en: What are the steps (or advice) that will help them overcome the problem you
    mentioned in “Perspective?”
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 有哪些步骤（或建议）将帮助他们克服你在“观点”中提到的那个问题？
- en: What can they implement right now that will get them results?
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 他们现在可以实施什么来获得结果？
- en: List of steps, key points, or other things like a list of books to read that
    helps them solve the problem.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 步骤列表、关键点或其他类似的书单，帮助他们解决问题。
- en: 'Here is a unique example of a “Gamify” tweet I wrote – this turned into a daily
    routine newsletter, and could easily be turned into key points for a thread:'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我写的一个独特的“游戏化”推文示例——这变成了一个日常常规通讯，并且可以轻松地转化为一个帖子的要点：
- en: 'You need 4 habits:'
  id: totrans-258
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你需要4个习惯：
- en: ''
  id: totrans-259
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: One that builds your mind.
  id: totrans-260
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一个能帮助你塑造思维的方法。
- en: One that builds your body.
  id: totrans-261
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一个能帮助你塑造身体的方法。
- en: One that builds your business.
  id: totrans-262
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一个能帮助你建立业务的方法。
- en: One that builds your relationships.
  id: totrans-263
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一个能帮助你建立关系的方法。
- en: ''
  id: totrans-264
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The good life is the process of becoming everything you could be.
  id: totrans-265
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 好的生活是成为你所能成为的一切的过程。
- en: ''
  id: totrans-266
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [November 12, 2023](https://twitter.com/thedankoe/status/1723689606774706247?ref_src=twsrc%5Etfw)
  id: totrans-267
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2023年11月12日](https://twitter.com/thedankoe/status/1723689606774706247?ref_src=twsrc%5Etfw)
- en: '**If This Doesn’t Make Sense Yet (It Won’t)**'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果这还不明白（它不会）**'
- en: You will have to understand and internalize the structure of most long form
    content online.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 你将不得不理解和内化大多数长篇在线内容的结构。
- en: You will also have to understand storytelling. They both interconnect.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 你还必须理解讲故事。它们两者相互关联。
- en: 'Here is the general persuasive writing structure:'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是普遍的说服性写作结构：
- en: '**Hook** — we’ve talked about this.'
  id: totrans-272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**钩子** — 我们已经讨论过这一点。'
- en: '**Lead** — introducing and agitating the problem'
  id: totrans-273
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**引言** — 介绍和激化问题'
- en: '**Body** — key points (numbered or not) separated by headlines to help learn
    and understand the topic'
  id: totrans-274
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**正文** — 通过标题分隔的关键点（编号或不编号），以帮助学习和理解主题'
- en: '**Conclusion** — a summary or step-by-step advice to overcoming the problem'
  id: totrans-275
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结论** — 总结或逐步建议，以克服问题'
- en: '**CTA** — a call to action to do something next (not necessary on short posts)'
  id: totrans-276
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**CTA** — 呼吁行动，促使人们采取下一步行动（不必要在简短帖子中）'
- en: This IS a storytelling structure.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 这确实是一个讲故事的结构。
- en: Storytelling is NOT always a story.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 讲故事不总是故事。
- en: Stories consist of anecdotes, research, examples, metaphors, quotes, tweets,
    videos, other content, and anything else you can do to help someone else understand.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 故事由轶事、研究、例子、隐喻、引言、推文、视频、其他内容以及任何可以帮助他人理解的其他事物组成。
- en: This is why it’s important to have a second brain (like [Kortex](https://kortex.co))
    filled with ideas you collect. Writing becomes so easy as it grows. You just piece
    ideas together in infinite ways.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么拥有一个充满你收集的想法的第二大脑（如[Kortex](https://kortex.co)）很重要。随着它的增长，写作变得如此容易。你只需以无限的方式拼接想法即可。
- en: You present a problem and guide someone to overcome it.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 你提出一个问题，并引导某人克服它。
- en: The Key To Short Writing
  id: totrans-282
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 短篇写作的关键
- en: All of the above can be used to write short posts like tweets, IG posts, LinkedIn
    posts, reels scripts, and more.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 所有上述内容都可以用来写短篇帖子，如推文、Instagram帖子、LinkedIn帖子、Reels脚本等。
- en: But how do you get better at writing them?
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 但如何提高写作这些的能力？
- en: Emulation.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 模仿。
- en: I learned to write good tweets through observation.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 我通过观察学会了写好的推文。
- en: 'Since you have ideas flowing from your other writing, take those ideas and:'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 由于你的其他写作中产生了想法，所以请采取这些想法：
- en: Study quotes from your favorite authors
  id: totrans-288
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究你最喜欢的作者的引言
- en: Use tools like Twemex to research high performing posts (link)
  id: totrans-289
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用像Twemex这样的工具来研究高绩效帖子（链接）
- en: Be a researcher not a consumer – read social media content to study other’s
    post structures
  id: totrans-290
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 成为研究者而不是消费者——阅读社交媒体内容来研究他人的帖子结构
- en: For every post you see, try to recreate it with your own ideas to train your
    mind to write like that
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于你看到的每一篇帖子，尝试用你自己的想法重新创作，以训练你的大脑像那样写作
- en: '*Drown yourself in good short form writing.*'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: '*沉浸在优秀的简短形式写作中*。'
- en: '*Use their sentence structure as training wheels to write your own.*'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: '*用他们的句子结构作为训练轮来写你自己的*。'
- en: '*Contemplate why that writing does well. How does it make you feel? Why does
    it make you feel that way?*'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: '*思考为什么那篇写作做得好。它让你感觉如何？为什么让你有这种感觉？*'
- en: I’ve written an entire letter on [how to write short-form content here](https://thedankoe.com/letters/dont-get-replaced-by-ai-how-to-write-authentic-content/).
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里写了一封关于[如何写短篇内容](https://thedankoe.com/letters/dont-get-replaced-by-ai-how-to-write-authentic-content/)的完整信件。
- en: You can also download some of my best tweets and use them as training wheels
    for your content [in this PDF.](https://www.dropbox.com/scl/fi/nhvzkqzbzlp6ro6ocb8a4/ContentPresentation.pdf?rlkey=8kpb8t3wgc21wu9acqg33c80v&dl=0)
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以下载我的一些最佳推文，并将它们作为你内容的训练轮（[在此PDF中](https://www.dropbox.com/scl/fi/nhvzkqzbzlp6ro6ocb8a4/ContentPresentation.pdf?rlkey=8kpb8t3wgc21wu9acqg33c80v&dl=0)）使用
- en: All of this takes practice, a lot of practice.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都需要练习，大量的练习。
- en: But if you want to earn an income from any other skill you have, you have to
    pair it with the skill of writing.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果你想从你拥有的任何其他技能中获得收入，你必须将其与写作技能相结合。
- en: Thank you for reading, I hope it helped.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读，希望这有所帮助。
- en: Dan
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 丹
