- en: A Message From A Recovering Atheist (How To Find God)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/a-message-from-a-recovering-atheist-how-to-find-god/](https://thedankoe.com/letters/a-message-from-a-recovering-atheist-how-to-find-god/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I’ve avoided writing this letter for quite some time.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: I’ve never felt “ready,” and I still don’t, but I know that writing about it
    will help clarify my thoughts.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: I hope those thoughts can be beneficial to you.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Religion is like politics in the sense that when people disagree with your views,
    they have an unconscious emotional reaction where they spew pre-programmed words
    that they’ve been fed since birth.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: What’s worse is that religion and politics bring certainty to an uncertain future.
    From a psychological lens, that’s why people outsource their free thinking to
    those ideological structures; to order their minds and prevent a decline into
    chaos.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: When one’s views are threatened, they have a physical survival response like
    that of a mouse in the grips of a snake.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: So, they reinforce their identity as they always have, close themselves off
    to truth (which is ironic), and never open their mind beyond the pre-rational
    stage of development.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: I would encourage you to keep an open mind when reading this letter, and if
    you can’t, please unsubscribe. I’m not asking you to adopt my beliefs, I’m asking
    you to challenge your own.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: I was raised a Latter-Day Saint, some people know this ideology as “Mormonism.”
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: Every Sunday, I would dress up in black slacks, a pure white shirt, and my favorite
    tie that my dad gave me.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: It started in Sunday school, where kids under the age of 12 would sing hymns
    like “I Am A Child Of God” and go into a lesson from the Bible or Book Of Mormon.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: At age 12, the boys became deacons. At 14, teachers. At 16, priests. All with
    increasing responsibilities in the priesthood.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: We went on temple trips, performed baptisms for the dead, and attended “seminary;”
    a one-hour block of religious schooling before getting dropped off at public school.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: I had great experiences in the church, like boy scouts and the week-long multi-season
    adventures associated with it. There are some incredible people that subscribe
    to the belief system, but I was always skeptical.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: The teachings failed to make logical, scientific, or realistic sense when you
    questioned them without getting scared of what you might find.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: During my time in the church, I was blessed to have the internet available to
    me.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: I let my curiosity pull me down rabbits of Christian, Catholic, Muslim, and
    even atheist ideologies so I could learn what they were all about.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: I went with my high school friends to their respective churches on Sunday, kept
    an open mind, observed, and questioned.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: 'I was able to note patterns, but they still lacked sense-making. At the time,
    I was not okay with the same blanket answer to every philosophical question I
    asked:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: “Just have faith.”
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: Somehow I knew that holding the same beliefs for the entirety of my life would
    not serve me well.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: And over the past 10 years observing my former churchmates (thanks Facebook),
    I was correct.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 并且在过去的10年里观察我的前教会成员（感谢Facebook），我证明了自己是正确的。
- en: Ego Development & The Pre-Trans Fallacy
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自我发展与前理性谬误
- en: The difference between a theist, atheist, and spiritualist, in that order, is
    self-development.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 按顺序，神论者、无神论者和灵性主义者之间的区别是自我发展。
- en: Consider the “self” and “ego” synonymous for the rest of this letter.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在这封信的其余部分，将“自我”和“自我”视为同义词。
- en: You don’t get rid of your ego, you develop it to the point or being at one with
    reality.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 你不是消除你的自我，而是将其发展到与现实的统一。
- en: You don’t develop your ego by trying to answer the impossible question of “who
    am I?” but instead, asking the question “who am I not?” until you are left with
    nothing but pure consciousness.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 你不是通过试图回答“我是谁？”这个不可能的问题来发展你的自我，而是通过问“我不是谁？”这个问题，直到你只剩下纯粹的意识。
- en: 'In my quest for meaning, I came across three incredible resources:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在我寻找意义的旅程中，我发现了三个令人难以置信的资源：
- en: The 9 Stages Of Ego Development by Susan Cook Greuter, summarized by Actualized.Org
    ([link](https://youtu.be/J3hNosyyXRA))
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 苏珊·库克·格雷特（Susan Cook Greuter）的《自我发展九阶段》（The 9 Stages Of Ego Development），由Actualized.Org总结([link](https://youtu.be/J3hNosyyXRA))
- en: The AQAL Model of human consciousness evolution by Ken Wilber
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 肯·威尔伯（Ken Wilber）的人类意识进化AQAL模型
- en: The Spiral Dynamics evolutionary model of individuals, organizations, and societies
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 个人、组织和社会的螺旋动力学进化模型
- en: These are all models for mapping individual and collective psyche development.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这些都是映射个人和集体心理发展的模型。
- en: There is way too much to distill in one letter, so I encourage you to explore
    them in your own time.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在一封信中提炼出太多内容是不可能的，所以我鼓励你在自己的时间里去探索它们。
- en: But, one model from Ken Wilber helps explain the stages of spiritual development.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，肯·威尔伯（Ken Wilber）的一个模型有助于解释精神发展的阶段。
- en: It is called the Pre-Trans Fallacy.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这被称为前理性谬误。
- en: 'In short, think of it like the bell curve meme that was popular last year:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，想想去年流行的钟形曲线梗：
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1015">![](../Images/c7e142405395538ef63dcb7e4a2341e0.png)</picture>
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1015">![](../Images/c7e142405395538ef63dcb7e4a2341e0.png)</picture>
- en: If you are struggling to find direction in your search for meaning, understanding,
    and God, this model can help.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在寻找意义、理解和上帝的方向上感到困惑，这个模型可以帮到你。
- en: The Pre-Trans Fallacy does not only apply to religion. It applies to development
    in any domain.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 前理性谬误不仅适用于宗教，也适用于任何领域的发展。
- en: It states that people often mistake the pre-rational stage of development for
    being post-rational because neither represents the rational stage.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 它指出，人们常常将前理性发展阶段误认为是后理性阶段，因为两者都不代表理性阶段。
- en: We are using religion as an example, and the easiest way to illustrate this
    concept is the belief in God.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我们以宗教为例，最容易说明这个概念的方式是信仰上帝。
- en: A biblical Christian’s notion of God is vastly different from a mystic’s notion
    of God.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 圣经基督教徒对上帝的概念与神秘主义者对上帝的概念大相径庭。
- en: From the outside looking in, they look like they are saying the same thing because
    they are not atheistic.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 从外面看，他们看起来像是在说同样的话，因为他们不是无神论者。
- en: 'They are not the same, let’s break down why:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 他们并不相同，让我们来分析一下原因：
- en: The Pre-Rational Stage
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 前理性阶段
- en: For this letter, we will be using Christianity as an example, because that is
    what I have experience with in the most extreme form.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这封信，我们将以基督教为例，因为这是我最极端形式的经验。
- en: But, this can be applied to any ideology, religious or not.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，这可以应用于任何意识形态，无论是宗教还是非宗教。
- en: I see these patterns reflect in business as well.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我看到这些模式在商业中也有所反映。
- en: Like how pockets of the internet believe in the “best” outreach, content, or
    branding strategies without room for improvement.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 就像互联网上的某些区域相信“最佳”的外展、内容或品牌策略，而没有改进的余地。
- en: In reality, the most developed individuals take the principles, move through
    the stages, and create their own methods to see the desired end result that any
    domain points at. For business it’s money, for religion it’s meaning, for health
    it’s health.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，最发达的个人会采用原则，经历各个阶段，并创造出自己的方法来看到任何领域指向的期望结果。对于商业来说，是金钱；对于宗教来说，是意义；对于健康来说，是健康。
- en: Without questioning your own beliefs, you close yourself off to novel discoveries,
    innovations, and the things that will bring true progress to your life and the
    world.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不对自己的信念提出质疑，你就会关闭自己对新发现、创新以及将真正进步带给你的生活和世界的事物。
- en: The individuals, organizations, and societies in this pre-rational stage are
    best described as “bible thumpers.”
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这个前理性阶段的个人、组织和社会最好被描述为“圣经敲击者”。
- en: The spirituality of this stage is highly material.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这个阶段的灵性非常物质化。
- en: They think heaven and hell are literal places where “you” (which is a concept,
    the self) are blessed with virgins or tortured with fire.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 他们认为天堂和地狱是“你”（这是一个概念，自我）被赋予处女或被火烧的实实在在的地方。
- en: Any form of feedback is taken as a threat.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 任何形式的反馈都被视为威胁。
- en: They lash out with the same words they’ve been parroting since they were indoctrinated
    into that belief system.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 他们用自从被灌输那个信仰体系以来一直在重复的同样的话进行攻击。
- en: The real problem is that the people in this stage close their minds to higher
    stages of development.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 真正的问题是这个阶段的人们关闭了他们通往更高发展阶段的大门。
- en: They can’t view and interpret reality for what it is.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 他们不能以现实本身来观察和解释现实。
- en: 'Note: I do not aim to paint any religious ideology as bad. There are deep truths
    that can be found through study. The problem is the belief that these truths are
    limited to one lens of understanding these truths.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：我并不旨在将任何宗教意识形态描绘成坏的。通过研究可以找到深刻的真理。问题是人们相信这些真理局限于理解这些真理的一个视角。
- en: The Rational Stage
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理性阶段
- en: The rational stage is one that I know well.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 理性阶段是我所熟悉的。
- en: It is the stereotypical atheist that rejects any and all notion of a higher
    power.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这是典型的无神论者，他们拒绝任何关于更高力量的观念。
- en: They lean on scientific discoveries to prove what is real from what’s not. If
    it can’t be scientifically proven, it is not true, according to this stage.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 他们依赖科学发现来区分什么是真实的，什么不是。根据这个阶段，如果不能科学证明，就不是真的。
- en: This is the stage where false skepticism begins to take over.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这是虚假怀疑开始占据主导地位的阶段。
- en: Atheists “question everything,” as they should, but fail to question their own
    beliefs. Instead, they horde debate-worthy information that disproves the existence
    of God.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 无神论者“质疑一切”，正如他们应该做的，但未能质疑他们自己的信仰。相反，他们囤积可以用来反驳上帝存在的辩论信息。
- en: They can see through the blatant flaws of the pre-rational stage, but have not
    opened their mind to the flaws of their own. They think they have, and that’s
    what prevents them from going deeper.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 他们可以看到前理性阶段的明显缺陷，但没有打开他们自己的思想去认识自己的缺陷。他们认为他们已经做到了，这就是阻止他们更深入的原因。
- en: One thing to understand here is that most people go through all 3 stages of
    development.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 这里要理解的一点是，大多数人都会经历这三个发展阶段。
- en: If you are in the rational or pre-rational stage, you won’t make an immediate
    leap to the next stage. It requires time and ego development.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你处于理性或前理性阶段，你不会立即跳到下一个阶段。这需要时间和自我发展。
- en: The Trans Rational Stage
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 超理性阶段
- en: In the trans-rational stage, belief in God returns, but not the static image
    of a man in the sky.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在超理性阶段，对上帝的信仰回归，但不是天空中一个男人的静态形象。
- en: This is where eastern philosophy, mysticism, and the labels associated with
    spirituality come into play.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是东方哲学、神秘主义以及与精神相关的标签发挥作用的地方。
- en: I do not want to do this stage injustice, as it is difficult to explain to those
    that lack the mental capacity for higher-level understanding (this isn’t meant
    to be an insult, nor do I believe that people in this stage are “above” others
    in the context of status, this isn’t about status).
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我不想对这个阶段不公，因为它很难向那些缺乏高级理解能力的人解释（这并不是侮辱，我也不认为这个阶段的人在其他方面“高于”其他人，这无关地位，这不是关于地位）。
- en: Instead, I will attempt to point a finger at God. I would encourage you to use
    this as a way for you to notice and understand this higher power in your everyday
    life.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我将尝试指向上帝。我鼓励你将这作为一种方式，让你在日常生活中注意到并理解这种更高的力量。
- en: How To Find God
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何找到上帝
- en: He who knows himself knows God. – Clement Of Alexandria
  id: totrans-76
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 认识自己的人就认识了上帝。 —— 克莱门特·亚历山大
- en: First, let’s make a distinction between “concept” and “reality.”
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们区分一下“概念”和“现实”。
- en: A concept is a label for an aspect of reality that we hold as static in our
    minds.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 一个概念是我们心中认为静止的现实的一个方面。
- en: They are useful, but not law. Reality flows like a river, a concept is a snapshot
    of that river.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 它们是有用的，但不是法则。现实如河流般流淌，概念是这条河流的快照。
- en: This introduces the Buddhist principle of *impermanence.*
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这引入了佛教的“无常”原则。
- en: That is, nothing can be isolated and held static by the mind. A thought, idea,
    concept, ideology, person, item, community, emotion, and anything else that we
    process with our mind and expect to stay the same.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: As an example, how we interpret what we see is determined by our perspective
    at the time, and our perspective is influenced by our state of mind.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: The ego perpetuates this issue. It doesn’t want to change.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: If I am angry and have little experience with business, and I see a post from
    a billionaire about money… you can guess the outcome.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: I will form a concept of who that billionaire is in my mind (after reading *one*
    of their posts) and solidify that concept with my beliefs.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: “He had rich parents.”
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: “He got lucky, I could never do that.”
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: “Why doesn’t he give his money to charity? Doesn’t he have enough?”
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: Even if you don’t say these things, your ego does.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: The ego creates barriers, limitations, and fabricated stories that veil reality.
    It prevents you from seeing things as they are by filling in the blanks of the
    static image your ego is attempting to construct.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: In reality, you formed your entire opinion of another human being on a post
    that composes 0.0000000000001% of their contributions in life.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: '*Everyone has the desire to be free, and that’s important.*'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: Some would say it’s the inner voice of a higher power.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: All that freedom is when pertaining to the mind, is the dissolution of barriers
    that comes from adopting a higher perspective.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: When you adopt a higher perspective, you can start to see things for what they
    are.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: This is the lesson of all spiritual teachings.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: Patterns Of God
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Teotl, Brahman, Infinity, Source, The Universe, and more are all perspectives
    of God.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: Teotl in Aztec Philosophy is defined as, “a single, vivifying, eternally self-generating
    and self-regenerating sacred power, energy, or force.”
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: In short, this is “spirit.”
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: Brahman in Buddhism is defined as, “the ultimate reality underlying all phenomena…
    Brahman is formless but is the birthplace of all forms in visible reality.”
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: Infinity or Source are other common lenses used by those that choose to understand
    God in that way.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: They are all pointing toward the same thing, and that thing can’t be captured
    and isolated as a religious ideology.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: I mean… it can and has been, but as minds have slowly started to open over the
    last century, these constructs have been questioned, and for good reason.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: The Universe
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: My favorite way of illustrating this formless power is through the lens of The
    Universe.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: Universe = uni-verse = one-song.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: An infinite song that has highs, lows, harmonies of multiple instruments, rising
    actions, climaxes, falling actions, and a chorus.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: This pattern reflects in human sense-making.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: Humans make sense of the world via stories, and we become obsessed with games
    because they are stories with interactive challenges that narrow our attention.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: The problem is that we try to make sense of a note, lyric, instrument, or musician
    on it’s own without regard for the big picture.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: If you isolate a part of the story, especially a negative one, you’re going
    to have a bad time. Unless you zoom out to see the story unfolding before your
    eyes.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你孤立故事的一部分，尤其是负面的一部分，你将会过得不好。除非你退后一步，看到在你眼前展开的故事。
- en: 'Let’s run through a story of the self-generation and self-regeneration of rain:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下雨水的自我生成和自我再生的故事：
- en: Imagine the ocean or a large body of water. The heat from the sun evaporates
    that water, dividing it into many microscopic droplets.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下海洋或一大片水域。太阳的热量蒸发水分，将其分成许多微小的水滴。
- en: Those droplets rise and reunify as clouds. These clouds grow in size and unify
    as larger clouds.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 这些水滴上升并重新统一成云。这些云逐渐变大，并最终统一成更大的云。
- en: Soon, droplets unify in the clouds until they are heavy enough to rain back
    down to Earth.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 很快，云中的水滴会统一，直到它们足够重，可以再次降落到地球。
- en: Rain creates puddles, fills streams, and works it’s way through other ecological
    processes.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 雨水形成水坑，填满溪流，并在其他生态过程中发挥作用。
- en: Eventually, the rain makes its way back to the ocean with time and the process
    is repeated.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，随着时间的推移，雨水会回到海洋，这个过程会重复。
- en: This is not a localized phenomenon of division and unity.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是一种局部性的分裂与统一现象。
- en: '**It is infinite.**'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '**它是无限的**。'
- en: The ideas in your mind divide and reunite, we call this creativity.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 你心中的思想在分裂与重组，我们称之为创造力。
- en: Throughout human history, races have divided and are now reunifying.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 在人类历史上，种族曾经分裂，现在正在重新统一。
- en: From a universal perspective, your opinions do not matter about this, nor do
    mine.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 从宇宙的角度来看，你对这件事的看法并不重要，我的看法也是如此。
- en: The barriers of race have been questioned and fought against until people were
    able to mate with whomever they please. This, of course, is not the driving force
    behind all of this.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 种族的障碍被质疑和对抗，直到人们能够与任何他们愿意的人交配。当然，这并不是这一切背后的驱动力。
- en: In some time from now, all of our skin may be the same slight shade of what
    humans perceive as brown, and race as a concept will collapse into one.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 在不久的将来，我们所有人的皮肤可能都会变成人类感知的那种浅棕色，种族这个概念将合并成一种。
- en: What about the chapters of your life? You’ve gone through highs and lows. You’ve
    gained friends and lost friends. You’ve changed, even if you’re mind has attached
    to an image of yourself from the past.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，你的人生篇章呢？你经历了高潮和低谷。你获得了朋友，也失去了朋友。你改变了，即使你的心灵仍然附着于过去的自我形象。
- en: I would encourage you to notice these pattern wherever you can, even when making
    your breakfast, writing a book, or using the bathroom.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 我鼓励你注意这些模式，无论你在哪里都能注意到，即使是在做早餐、写书或上厕所时。
- en: This is how you find God in your everyday life. By seeing beyond the surface
    and appreciating the depth behind your mechanical pre-programmed actions (and
    yes, those mechanical actions can be praising a surface-level image of God, which
    seems against the point).
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你在日常生活中找到上帝的方式。通过超越表面，欣赏你机械预设行为背后的深度（是的，这些机械行为可能是赞美上帝表面形象，这似乎与目的相悖）。
- en: Notice the parts, wholes, and how they dance together across the physical globe
    and ripple through the collective consciousness.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 注意局部、整体以及它们如何在物理地球上共同起舞，并在集体意识中产生涟漪。
- en: The Practicality Of God
  id: totrans-130
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 上帝的实用性
- en: You are probably asking, “How in the world is this practical to my life?”
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能正在问，“这对我的人生有何实际意义？”
- en: One, because this isn’t “your” life.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 一，因为这不是“你的”生活。
- en: This isn’t about your selfish narrow perspective. You are meant to open your
    mind beyond that.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是关于你自私狭隘的视角。你本应超越这一点，打开你的心扉。
- en: Two, does this not fascinate you? The depth behind what you perceive as mundane,
    “normal,” actions?
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 二，这难道不令你着迷吗？你感知到的平凡、“正常”行为背后的深度？
- en: There is more beyond the surface of material, status, and words.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 在物质、地位和言语的表面之下，还有更多。
- en: You are a part of something much bigger, and that can only be seen through spirit.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 你是更大事物的一部分，这只能通过精神来感知。
- en: By doing this, it reveals that the concepts, beliefs, and ideals we hold so
    dear are not static.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这样做，它揭示了我们所珍视的概念、信仰和理想并非静止不变的。
- en: When we identify with these mentally constructed entities and regard them as
    unchanging, we are in for a world of emotional trouble that prevents personal
    and collective progress.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们认同这些心理构建的实体，并将它们视为不变的，我们将陷入情感上的麻烦，这会阻碍个人和集体的进步。
- en: The open-minded flow with the Universe, the closed-minded force the Universe
    to flow with them.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 开放的心态与宇宙同行，而封闭的心态则强迫宇宙随着他们流动。
- en: If the closed-minded are the barriers to true progress, then the open-minded
    have an obligation to raise them up.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 如果思想狭隘是真正进步的障碍，那么思想开放的人有责任提升他们。
- en: One of the most beneficial habits you can adopt is playing with mental legos.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以养成最有益的习惯之一就是玩心理积木。
- en: Sit with an idea, thought, or problem and follow the connections that present
    themselves.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 与一个想法、思想或问题坐下来，并跟随呈现出来的联系。
- en: Stay vigilant of egoic distractions.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 保持对自我中心的干扰保持警惕。
- en: This is how you practice creativity, mindfulness, and deep thinking without
    any external tools or guides.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你在没有任何外部工具或指南的情况下练习创造力、正念和深度思考的方法。
- en: The big problem on the cultural, social, and personal planes of existence is
    identification with ideology.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在文化、社会和个人存在的层面上，最大的问题是与意识形态的认同。
- en: Humans group ideas into what is supposed to be indivisible unity of ideas.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 人类将想法分组为应该是不分割的思想统一体。
- en: We leave no room for division and reunification. We leave no room for God.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不留任何分裂和统一的余地。我们不留任何给上帝的空间。
- en: – Dan Koe
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹·科
