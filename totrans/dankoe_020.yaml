- en: The Power Of Being Alone (How To Be Yourself)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-power-of-being-alone-how-to-be-yourself/](https://thedankoe.com/letters/the-power-of-being-alone-how-to-be-yourself/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “Be yourself!”
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: How annoying has that advice gotten?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Want to start writing? Just be yourself!
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Want to start a personal brand? Be yourself!
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Want to land a hot date? Be yourself!
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: It’s good advice, but not to the masses. They don’t understand what it really
    means to “be themselves.” Why?
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Because they are somebody else, and they are viewing the world through that
    lens, not the one they created.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: They went to school and unconsciously adopted personality traits, bad habits,
    and a notion of what’s possible in this life.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: They went to college with a fresh start, but went through another round of conditioning,
    layering over their being once more.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: They got a job and accepted the company’s goals as their own. The unconscious
    misalignment leads to dread, despair, and the death of a soul that leaves a robotic,
    animalistic corpse of a human being that lives in a perpetual state of survival.
    A slave to the external world.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: When the external aligns with the internal, that is, when the goals you create
    align with who you really are, the unconscious sends resources to your conscious
    mind to execute on those goals faster.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: The unconscious mind can manage 11 million bits of information per second while
    the conscious mind only 40-50 bits of information. Imagine how much untapped power
    you are sitting on. All you need to do is tap into it.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: In previous letters, we’ve discussed how manual labor, specialization, and earning
    with your time is not sustainable.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: Robots that perform specific tasks are just that, robots. They are being automated
    out left and right.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: The future belongs to those that can leverage their creative power. The power
    of their mind.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: But, if you try to leverage a mind that was created by the external world, you
    will simply be joining a different kind of rat race.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: We want originality, personality, and wisdom.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: We want to have visionary ideas that change people’s lives for the better.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: That’s what we are talking about today. Let’s dive in.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: Existence Is Relationship
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In a world where there are no eyes, the sun would not be light. And in a world
    where there were no soft skins, rocks would not be hard, nor in a world where
    there were no muscles would they be heavy. Existence is relationship, and you
    are smack in the middle of it. – Alan Watts
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*In a world where there are no others, the self would not exist.*'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: '*Your identity – or “the self” – can only exist when you make a distinction
    between you and everything around you**.*'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-850">![](../Images/911a2aed7e0fbb13bfd7aa732d0ba6cb.png)</picture>
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: This is what spirituality, non-duality, and Buddhism are pointing toward. Their
    aim is to make you realize that the self is not separate from the universe, it
    is the universe.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: The goal of those teachings, and enlightenment as a whole, is the end of suffering.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: Suffering happens when you fail to recognize the infinite intelligence (interconnectedness)
    that life is. Suffering happens when you fail to zoom out and see the big picture.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: '***Suffering happens when you see the world from the lens of comparison.***
    You zoom in on the difference between self and other.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: '***Enjoyment happens when you see the world from the lens of connection.***
    You zoom out and create a holistic perspective. You highlight the similarities,
    why those matter, and appreciate the intelligence that connects everything the
    untrained eye would see as separate.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: This is “love” by many spiritual teachings, even though I feel that term confuses
    the modern world, which is why I use the words “enjoyment” and “appreciation.”
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: 'Two steps to happiness:'
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Zoom in on what's important.
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Zoom out from everything else.
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [May 2, 2022](https://twitter.com/thedankoe/status/1521057414203727873?ref_src=twsrc%5Etfw)
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: When you are zoomed in on things that don’t matter, your mind is zoomed in,
    meaning it is closed-minded. You prevent your mind from seeing any further than
    what fills the content of your consciousness.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: Narrow focus is great for things like productivity and purpose, when you are
    actively pursuing a meaningful goal, but this is not the case for most people.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-851">![](../Images/608328b10bf0de75c8071b472af212cc.png)</picture>
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: Most people are in a perpetual state of stress-induced narrow (contracted) focus.
    A negative thought pops into their head and that immerses all of their attention.
    They can’t see beyond the thought itself. The thought becomes their world, and
    the importance of the world ceases to exist.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: What does this have to do with “being yourself?”
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a tweet I wrote the other day:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: People love to say “be yourself,” but tend to forget that it took your entire
    life to get to this point of not being yourself.
  id: totrans-44
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It’s going to take thousands of hours to reprogram your mind to act from a place
    of consistent authenticity.
  id: totrans-46
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [October 25, 2022](https://twitter.com/thedankoe/status/1584837675877638147?ref_src=twsrc%5Etfw)
  id: totrans-48
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You see, since the day you popped into this world, your conscious mind has been
    interpreting the sensory information it receives and storing it in memory.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: This is necessary to be able to operate in the external world, but isn’t it
    crazy how this works? How do we share the same language? How do we have a specific
    amount of career paths to pursue? I have many questions. We could live in an entirely
    different reality, and I would argue people on polar ends of the Earth do, we
    just don’t understand their perspective.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: The point is, by the time you are 18, “yourself” is created by your environment.
    Humans are creatures of habit, your mind forms grooves with time, like the Grand
    Canyon with water, called neural networks.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: Through societal, cultural, and social conditioning, and if left unconscious,
    you have zero control over “being yourself.”
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 通过社会、文化和社交的熏陶，如果你没有意识到这一点，你对“做自己”将毫无控制力。
- en: You are quite literally a product of the external world.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 你实际上是你所处的外部世界的产物。
- en: Social media has created the problem of over-socialization, and quite frankly,
    socialization makes you stupid. When an unconfident mind is exposed to hundreds
    of thousands of confident thoughts, advice, and opinions, your mind tries to latch
    on to those.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体创造了过度社交的问题，坦白说，社交会让你变得愚蠢。当一个缺乏自信的头脑接触到成千上万自信的思想、建议和观点时，你的大脑会试图依附于那些。
- en: Soon enough, you’ll find yourself speaking like the echo chamber you surround
    yourself in. You’ll be thinking the thoughts of others, not your own thoughts.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 很快，你会发现自己在模仿你所处的回音室。你会思考别人的想法，而不是自己的想法。
- en: I find it funny that many people would cringe at the thought of being with their
    friends for an extended period of time, but will log on to social media (1000s
    of friends telling you what to do) and act like it isn’t different, or worse.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我觉得很多人会对长时间与朋友相处的想法感到不适，但他们会登录社交媒体（成千上万的“朋友”告诉你该做什么），表现得好像这没什么不同，或者更糟。
- en: '***I’m not saying any of this is bad, and there is no immediate solution. I’m
    saying this to spread awareness, as that is the first step to improvement. You
    cannot improve what you are not aware of. You cannot remove what you are not aware
    of.***'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '***我并不是说任何这些都是不好的，也没有立即的解决方案。我只是在传播意识，这是改进的第一步。你不能改善你不知道的东西。你不能去除你不知道的东西。***'
- en: Don’t just blindly trust what I’m saying here.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 不要盲目相信我这里所说的。
- en: As you are going about this week, try to catch yourself being someone else.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在你本周的行动中，试着发现自己变成了另一个人。
- en: Notice the words you pick up, and if you want to be using those words.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 注意你选择的词汇，如果你想要使用这些词汇。
- en: Notice what decisions you make, and if those decisions are influenced by someone
    else (online or offline).
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 注意你做出的决定，以及这些决定是否受到他人（在线或线下）的影响。
- en: And if they are influenced by others, are those decisions beneficial to your
    goals, or theirs? Where is the “money” flowing?
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 如果他们的决定受到他人影响，这些决定对你的目标或他们的目标是否有益？钱流向了哪里？
- en: “Who wrote the software in your head, and are you sure you want it running there?”
    – Master Of Twitter (and attention) Elon Musk
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: “谁编写了你头脑中的软件，你确定你想要它在那里运行？” —— 推特（和注意力）大师埃隆·马斯克
- en: The Power Of Being Alone (How To Be Yourself)
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 独处的力量（如何做自己）
- en: '*You can’t be yourself if you’re never alone with yourself.*'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果你从未与自己独处，你就无法做自己。*'
- en: As with everything, this requires balance. Balance does not mean split down
    the middle. Balance means a conscious effort to prevent either extreme from taking
    over.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 就像所有事情一样，这需要平衡。平衡并不意味着平分秋色。平衡意味着有意识地努力防止任何极端占据主导地位。
- en: If your goal is to make a dent on this world, you will have to expose yourself
    to other people. You will have to provide the most value to other people.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要在这个世界上留下印记，你必须让自己暴露在他人面前。你必须为他人提供最大的价值。
- en: 'The problem with over-socialization: your thoughts, writing, and work are not
    unique, original, or novel. Meaning, you will get the same results as everyone
    else.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 过度社交的问题：你的思想、写作和工作都不独特、原创或新颖。这意味着，你将得到与所有人相同的结果。
- en: This is especially important for knowledge workers, value creators, and really
    anyone that doesn’t want to trade money for time. Time and manual labor is a dead
    end (that doesn’t mean it isn’t a viable option for beginners). You have to earn
    an income with creative ideas, solutions, and content.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这对于知识工作者、价值创造者以及任何不想用金钱换时间的人来说尤为重要。时间和体力劳动是一条死胡同（这并不意味着它不是初学者的可行选择）。你必须通过创意想法、解决方案和内容来赚取收入。
- en: How are you going to do that when you are putting out the same information as
    everyone in your niche?
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 当你发布的信息与你所在领域的每个人都一样时，你将如何做到这一点？
- en: If you want to reverse the effects of being on social media, keeping up with
    the trendiest joke for your friend group, or meeting new people that you think
    are better than you (so you adopt aspects of their personality) – you have to
    **make time for being alone.**
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要逆转社交媒体的影响，跟上你朋友圈中最时髦的笑话，或者遇见你认为比你更好的人（因此采纳他们的性格特点）——你必须**抽出时间独处**。
- en: What’s the first step to “being yourself?”
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: “如何才能做到‘做自己’的第一步是什么？”
- en: Prioritizing yourself.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 优先考虑自己。
- en: Being selfish.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 做自私。
- en: 'Selflessness requires selfish values:'
  id: totrans-75
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-76
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Self-control
  id: totrans-77
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Self-reliance
  id: totrans-78
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Self-reflection
  id: totrans-79
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Self-education
  id: totrans-80
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Self-awareness
  id: totrans-81
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Self-employment
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Self-management
  id: totrans-83
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It's impossible to be selfless when you are dependent on others for your survival.
  id: totrans-85
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-86
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [October 28, 2022](https://twitter.com/thedankoe/status/1585981967199240192?ref_src=twsrc%5Etfw)
  id: totrans-87
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'I realize that I left an important point out of that list: **self-experimentation.**'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: Take it on yourself to “figure it out.”
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: '*Don’t outsource your health to convenience.*'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: '*Don’t outsource your thinking to social media.*'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: '*Don’t outsource your career to the school system.*'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: Treat your life as a science project. The essence of science is trial and error.
    Try everything and eliminate what doesn’t work. Be your own personal trainer.
    Be your own business mentor. Be your own therapist.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: What do you do during your alone time?
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are a few of my favorite methods for thinking clear, critical, and deep:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: 1) Go On A Contemplative Walk
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'If you aren’t going on at least one daily walk, do you even follow me? What
    are you doing brother / sister? This isn’t only about “getting your steps in.”
    This is about:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: Living longer
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Having creative ideas
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Stress regulation (to prevent unconscious narrow focus)
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Getting away from your screen
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A distractionless timeblock for listening to that book you’ve been putting off
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Writing content (ideas just flow better when you’re walking)
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Do you want me to go on? I could list off 10 more reasons.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: GO. ON. A. WALK.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: But, when you do, contemplate.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: Hold one idea in your head and let your mind dance with it. Let thoughts trigger
    thoughts. Sit back and observe. Open your focus so wide that everything in your
    sensory field is held lightly in your conscious awareness. Lean in to all 5 senses
    and let your subconscious take over.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: Contemplate your vision.
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Contemplate who you want to become.
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Contemplate why you aren’t who you want to become.
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Contemplate who you are and if you created that identity (and if not, who did?)
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Contemplate the idea that stuck out to you in something you read.
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Contemplate why you hold specific beliefs and if those are closing your mind
    off to futher discovery.
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dig deep. Don’t let the ego trap you in a cycle of compulsive negative thinking.
    Question.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: When your mind is stuck, move.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Weekly Self-Reflection**'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: Nobody knows exactly what they want in the future. It’s literally impossible.
    There are infinite possibilities of what could happen in the next second.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: We can “guess” with a mission, vision, and goals to follow — if we create them,
    rather than being assigned them — and those are helpful for guiding us in a positive
    direction.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: But, you only know what will happen when it happens, and once it happens, we
    tend to forget about it and repeat mistakes left unconscious.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: Self-reflection allows you to know with absolute certainty whether your actions
    were conducive or detrimental to your future.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: I like to think of this as the “art of doing whatever you want.”
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: You have to do what you want, even if it’s for shallow reasons, and self-reflect
    to become conscious of the detriments of your actions.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: '*You will never make the perfect decision. You just get better at making imperfect
    decisions.*'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Write To Clarify Your Thoughts**'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: If you can think, and speak, and write, you are absolutely deadly. Nothing can
    get in your way.
  id: totrans-125
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-126
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Dr Jordan B Peterson (@jordanbpeterson) [November 30, 2021](https://twitter.com/jordanbpeterson/status/1465735961279700993?ref_src=twsrc%5Etfw)
  id: totrans-127
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Few ideas can be held at the “top of mind.”
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: Your conscious brain can only process a certain amount of information. It can
    only hold a specific amount of content in its conscious awareness.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: Meaning, most of the things you think, read, and want to remember can’t be given
    much attention. You have to note them down and clarify the thoughts in your head
    with the written word.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: If you don't have ideas, read.
  id: totrans-131
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-132
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you have ideas, but can't articulate them, write.
  id: totrans-133
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-134
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you have ideas, and have the clarity to execute, build.
  id: totrans-135
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-136
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [October 25, 2022](https://twitter.com/thedankoe/status/1584932451251519490?ref_src=twsrc%5Etfw)
  id: totrans-137
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Now, I’m a fan of efficiency.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: So if you plan to [build a one-person business](https://thedankoe.com/the-one-person-business-model-how-to-monetize-yourself/),
    the way you will attract customers is through writing.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: Every single person you look up to or buy from is a writer, whether they like
    to think of themselves as that or not.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: Writing is how you build leverage for a future going digital.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: Doesn’t it make sense to pair writing for clarity and writing for an income?
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: If you’re looking to learn how, check out [The 2 Hour Writer.](https://2hourwriter.com)
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: '**4) Question The Story Your Ego Fabricates**'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: None of this is easy. It’s extremely difficult.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: It doesn’t help that it all sounds so mystical either. This isn’t a “step-by-step
    system to make a million dollars in 30 days.”
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: That’s an external game. It was constructed by man and the schematics are readily
    available.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: This is an internal game. You will have to dance, fight, and battle with the
    ego over years and years. I’m 10+ years in this game and it never ends (but it
    does get easier). It is infinite unless you opt out of external games to become
    a monk. Not many feel the pull to do that, and I don’t believe it to be necessary,
    as the battle is what makes the story interesting.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: Watch where your mind goes as you are going about your life.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: This practice is easiest on social media.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: As you are scrolling on Twitter, notice how your mind will start a conversation
    with the post you read. What story is it creating out of nowhere? Why is it making
    you angry or happy? What aspects of that fabricated story do you agree or disagree
    with those points?
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: Extract the essence of the post you read (or anything you see in life) as it
    is.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: And stay aware of how your mind will fill in the blanks to create its own picture.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: When you become aware, zoom out as far as you can. Gain meta-perspective and
    appreciate the situation for what it is.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 当你意识到这一点时，尽量退后一步。获得元视角，并欣赏现状本身。
- en: '**– Dan Koe**'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: '**– 丹·科**'
- en: '**What Happened This Week**'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '**本周发生了什么**'
- en: The latest YouTube video, The One Person Business Model (How To Productize Yourself,
    went absolutely bonkers. It beat all of my prior videos analytics by 10X. I think
    we are finally hitting the “nothing happens, then everything happens” point in
    this journey.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 最新发布的YouTube视频《一个人商业模式（如何产品化自己）引起了极大的轰动。它的分析数据比我的先前视频高出10倍。我认为我们终于到达了“没有发生什么，然后一切发生”的旅程中的关键时刻。
- en: '[Watch it here.](https://youtu.be/BZ2nSULolKI)'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: '[在这里观看](https://youtu.be/BZ2nSULolKI)'
- en: In Modern Mastery, we had a workshop on making your ideas stick in the head
    of your readers with Max Bernstein. I will personally be incorporating the writing
    tips into my process.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 在现代精通课程中，我们与Max Bernstein一起举办了一个研讨会，讨论如何让你的想法留在读者的脑海中。我将亲自将写作技巧融入到我的过程中。
- en: '[Readers can join for $5](https://modernmastery.co/letter)'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: '[读者可以以5美元的价格加入](https://modernmastery.co/letter)'
- en: Digital Economics is off to a great start with 130+ students in this cohort.
    I’m stoked to see what results we can get for everyone building leverage on the
    internet with their interests and personality.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 数字经济学这门课程已经取得了良好的开端，共有130多名学生参与。我非常期待看到我们能为那些利用自己的兴趣和个性在互联网上建立优势的每个人带来什么样的成果。
