- en: You Aren’t Successful Because You Care Too Much (How To Stop Caring)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/you-arent-successful-because-you-care-too-much-how-to-stop-caring/](https://thedankoe.com/letters/you-arent-successful-because-you-care-too-much-how-to-stop-caring/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You stop caring about others’ opinions when you trust yourself with your future.
  prefs: []
  type: TYPE_NORMAL
- en: That… is a lot to unpack.
  prefs: []
  type: TYPE_NORMAL
- en: Lack of confidence is the one thing that plagues the potential of the majority
    of the population. They care too much about what others think.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s say you want to start a business and the thoughts start to flood in:'
  prefs: []
  type: TYPE_NORMAL
- en: What will my parents think?
  prefs: []
  type: TYPE_NORMAL
- en: What will my friends think?
  prefs: []
  type: TYPE_NORMAL
- en: What will my spouse think?
  prefs: []
  type: TYPE_NORMAL
- en: Will it be enough to replace my income?
  prefs: []
  type: TYPE_NORMAL
- en: How long will it take?
  prefs: []
  type: TYPE_NORMAL
- en: Don’t even get me started on the thoughts that come when you actually start
    building the business.
  prefs: []
  type: TYPE_NORMAL
- en: The reason people fail is they can’t lift the emotional weights required to
    achieve the goals they set.
  prefs: []
  type: TYPE_NORMAL
- en: For every thought of a better life, there are 100 thoughts beating you back
    down.
  prefs: []
  type: TYPE_NORMAL
- en: And that’s just thoughts about business.
  prefs: []
  type: TYPE_NORMAL
- en: What about the other 60-80,000 thoughts we have in a day?
  prefs: []
  type: TYPE_NORMAL
- en: We have a lot on our plate.
  prefs: []
  type: TYPE_NORMAL
- en: Will I come off as weird when I try to make new friends?
  prefs: []
  type: TYPE_NORMAL
- en: Where will I end up in life if I don’t get my debt under control?
  prefs: []
  type: TYPE_NORMAL
- en: Did I feed the dog this morning? Imagine how terrible of a pet owner people
    would think I am if they found out.
  prefs: []
  type: TYPE_NORMAL
- en: Developing self-confidence is no easy task.
  prefs: []
  type: TYPE_NORMAL
- en: More information, more responsibilities, and more options for our future turns
    confidence into success and anxiety into failure.
  prefs: []
  type: TYPE_NORMAL
- en: This is the modern environment we live in.
  prefs: []
  type: TYPE_NORMAL
- en: How do we begin to cultivate the trust in ourselves that leads to self-confidence?
  prefs: []
  type: TYPE_NORMAL
- en: The 4 Pillars Of Self-Confidence
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1369">![](../Images/dcc70391c4afe5ae4d6121c808e5dd2b.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: 'When most people wonder how they can become more confident, they are reminded
    of the simplistic advice:'
  prefs: []
  type: TYPE_NORMAL
- en: “Confidence = competence.”
  prefs: []
  type: TYPE_NORMAL
- en: This is true, but most people will see competence as getting better at a specific
    skill.
  prefs: []
  type: TYPE_NORMAL
- en: So they’ll learn and learn and learn, never act, never self-reflect, and never
    actually develop confidence as a skill in any situation. This is the most common
    outcome.
  prefs: []
  type: TYPE_NORMAL
- en: There is depth behind that simple statement that few can see.
  prefs: []
  type: TYPE_NORMAL
- en: We must seek to understand that statement, because clearly “confidence = competence”
    as general advice has not fixed one of the biggest problems in the world, but
    has made it worse.
  prefs: []
  type: TYPE_NORMAL
- en: '**Pillar 1) Perspective**'
  prefs: []
  type: TYPE_NORMAL
- en: When you enter a situation where you don’t feel confident, anxiety shoots through
    the roof.
  prefs: []
  type: TYPE_NORMAL
- en: This closes your mind to everything but your thoughts.
  prefs: []
  type: TYPE_NORMAL
- en: They multiply.
  prefs: []
  type: TYPE_NORMAL
- en: You completely retract from the situation and become a slave to your past. The
    experiences you’ve had before. You remain the same person.
  prefs: []
  type: TYPE_NORMAL
- en: You must snap out of this and make a conscious effort to reprogram your habitual
    way of reacting to situations.
  prefs: []
  type: TYPE_NORMAL
- en: 'To do this:'
  prefs: []
  type: TYPE_NORMAL
- en: When you enter a situation and anxiety sparks, pause
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Zoom out to see the situation for what it is, just a normal situation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Transfer consciousness to those in the situation with you
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “Transferring consciousness” is adopting another person’s perspective.
  prefs: []
  type: TYPE_NORMAL
- en: Most people are just people living the same experience as us.
  prefs: []
  type: TYPE_NORMAL
- en: Billionaires are people with the same problems.
  prefs: []
  type: TYPE_NORMAL
- en: Fitness models are people with the same problems.
  prefs: []
  type: TYPE_NORMAL
- en: Any person you mentally place above you has the same problems.
  prefs: []
  type: TYPE_NORMAL
- en: The ONE thing that will make them react in a negative way to you is treating
    them like they aren’t human.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t put them above you.
  prefs: []
  type: TYPE_NORMAL
- en: Remember, this is a habit you are forming.
  prefs: []
  type: TYPE_NORMAL
- en: It will take repetition and practice.
  prefs: []
  type: TYPE_NORMAL
- en: You cannot advance to the other pillars if you do not gain perspective on a
    situation.
  prefs: []
  type: TYPE_NORMAL
- en: '**Pillar 2) Perception**'
  prefs: []
  type: TYPE_NORMAL
- en: How you perceive situations determines how you act.
  prefs: []
  type: TYPE_NORMAL
- en: This requires you to shift into an open-minded state before and maintain it
    during, the situation.
  prefs: []
  type: TYPE_NORMAL
- en: If you are scrolling social media and don’t perceive a business owner’s tweet
    as an opportunity to reach out, you won’t reach out.
  prefs: []
  type: TYPE_NORMAL
- en: If you do see it as an opportunity, you still may botch the message or not send
    one at all because you misperceive that individual.
  prefs: []
  type: TYPE_NORMAL
- en: The same goes for making new friends or engaging in difficult discussions.
  prefs: []
  type: TYPE_NORMAL
- en: Perception goes two ways.
  prefs: []
  type: TYPE_NORMAL
- en: You perceive others in a certain way based on how they present themselves.
  prefs: []
  type: TYPE_NORMAL
- en: They perceive you based on how you present yourself.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t “look the part” or hold yourself in a way that would lead to a
    positive interpretation by the other party, it won’t go well. And you will know
    this subconsciously. You won’t engage in situations because you set yourself up
    for failure in the way you look and act.
  prefs: []
  type: TYPE_NORMAL
- en: I’m as introverted as they come, but people often tell me I look confident in
    the way I dress, walk, and talk.
  prefs: []
  type: TYPE_NORMAL
- en: Practice.
  prefs: []
  type: TYPE_NORMAL
- en: '**Pillar 3) Practice**'
  prefs: []
  type: TYPE_NORMAL
- en: How good you are at something allows you to perceive situations better.
  prefs: []
  type: TYPE_NORMAL
- en: Think of skill acquisition as a way to increase your level in the game of life.
  prefs: []
  type: TYPE_NORMAL
- en: In a video game there are “skill trees.”
  prefs: []
  type: TYPE_NORMAL
- en: As you play the game, you choose skills to help you play how you want.
  prefs: []
  type: TYPE_NORMAL
- en: As you practice those skills, you increase your experience, and new skills become
    available to you.
  prefs: []
  type: TYPE_NORMAL
- en: 'The key point here:'
  prefs: []
  type: TYPE_NORMAL
- en: '*You are not able to access other skills until you practice the ones available
    to you.*'
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have the awareness of profitable opportunities because you don’t have
    the skill to recognize, choose, and act on them.
  prefs: []
  type: TYPE_NORMAL
- en: As you move toward your goals, it will require that you educate and practice
    skills to reach those goals.
  prefs: []
  type: TYPE_NORMAL
- en: If you aim too high, you get overwhelmed and don’t know what to learn.
  prefs: []
  type: TYPE_NORMAL
- en: You must play at your level and acquire the skills necessary to reach the next
    level.
  prefs: []
  type: TYPE_NORMAL
- en: As your level increases, you fill your toolbelt with skills that allow you to
    view the plane you are on, which is more vast than the lower level you were at.
  prefs: []
  type: TYPE_NORMAL
- en: My first successful endeavor was freelance web design.
  prefs: []
  type: TYPE_NORMAL
- en: A single skill that is available for anyone to learn. Lots of competition and
    battling for higher prices.
  prefs: []
  type: TYPE_NORMAL
- en: I knew that if I wanted to do something more profitable, like funnels for service
    businesses, I would have to learn skills like marketing, copywriting, and buyer’s
    journey to do that well.
  prefs: []
  type: TYPE_NORMAL
- en: Then, when I pursued the level of a creator, I needed to combine what I knew
    and add new skills like content writing (I teach all skills you need in [2 Hour
    Writer](https://2hourwriter.com)).
  prefs: []
  type: TYPE_NORMAL
- en: The higher my level grew, the more people I met, and the more my confidence
    throughout multiple domains increased.
  prefs: []
  type: TYPE_NORMAL
- en: The worst thing you can do is stop learning new skills and settle for the level
    you are at.
  prefs: []
  type: TYPE_NORMAL
- en: '**Pillar 4) Authenticity**'
  prefs: []
  type: TYPE_NORMAL
- en: Authenticity is doing what you want without interference from external thoughts,
    opinions, and beliefs that you feel the need to conform to.
  prefs: []
  type: TYPE_NORMAL
- en: When I curse, and people in the comments tell me that’s unprofessional, do I
    conform to their relative beliefs (that aren’t absolute truth) or do I think for
    myself?
  prefs: []
  type: TYPE_NORMAL
- en: I don’t care to be professional. I don’t care to be offended by words that every
    single person interprets in a different way.
  prefs: []
  type: TYPE_NORMAL
- en: Confidence through authenticity is a mental game.
  prefs: []
  type: TYPE_NORMAL
- en: You must play it daily.
  prefs: []
  type: TYPE_NORMAL
- en: You must pause, gain perspective, perceive the situation, and practice the skill
    that the situation requires.
  prefs: []
  type: TYPE_NORMAL
- en: Authenticity is how you implement the 4 Pillars of Self-Confidence.
  prefs: []
  type: TYPE_NORMAL
- en: The Unconventional Path To Self-Confidence
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1370">![](../Images/6b45bb4262b51ac8eab1a372c01fd19e.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Entrepreneurship is in your nature.
  prefs: []
  type: TYPE_NORMAL
- en: To pursue new challenges, never settle, expand your perspective through skill
    acquisition, and get feedback on if you are actually contributing to society in
    the form of money.
  prefs: []
  type: TYPE_NORMAL
- en: Entrepreneurship is creation.
  prefs: []
  type: TYPE_NORMAL
- en: And being a creator is the act of channeling the divine through your human edge.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t want to get stuck in a situation where challenge ceases to exist.
  prefs: []
  type: TYPE_NORMAL
- en: Like a monkey in a cubicle, your psyche will suffer, and you will wonder why
    your life isn’t fulfilling even if you are a top 1% earner.
  prefs: []
  type: TYPE_NORMAL
- en: Personal growth is a gateway drug into business growth.
  prefs: []
  type: TYPE_NORMAL
- en: And business growth is the unconventional path to self-confidence.
  prefs: []
  type: TYPE_NORMAL
- en: I combine the two in [Digital Economics](https://digitaleconomics.school) so
    you can improve yourself, productize yourself, and earn from being yourself. A
    natural progression.
  prefs: []
  type: TYPE_NORMAL
- en: '**1) It demands that you evolve, or die.**'
  prefs: []
  type: TYPE_NORMAL
- en: Most people die at 25.
  prefs: []
  type: TYPE_NORMAL
- en: They get their job.
  prefs: []
  type: TYPE_NORMAL
- en: They get their spouse.
  prefs: []
  type: TYPE_NORMAL
- en: They get their house.
  prefs: []
  type: TYPE_NORMAL
- en: They get their car.
  prefs: []
  type: TYPE_NORMAL
- en: They get exactly what society wants for them. Someone who is comfortable, docile,
    and of little threat to their system they are trying to survive.
  prefs: []
  type: TYPE_NORMAL
- en: Life is ever-flowing, ever-evolving, and if you choose to obstruct that flow
    by settling for a sub-par life, you’re dead.
  prefs: []
  type: TYPE_NORMAL
- en: Death is symbolic. And all understanding is metaphorical.
  prefs: []
  type: TYPE_NORMAL
- en: If life is growth, and growth requires new, death is the death of new ideas,
    potentials, projects, and practices.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to survive in a world that never stops changing, entrepreneurship
    ensures that you don’t. If you persist until success, that is.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) It demands you to become an expert in your industry.**'
  prefs: []
  type: TYPE_NORMAL
- en: If you have subpar understanding you will get subpar results.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding is different from knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding is the upward motion of expanding consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: Meditation is the downward motion of expanding consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: Most mystics and spiritual teachers forget this balance.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not creativity *or* productivity.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not monk *or* warrior.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not peace *or* progress.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not being *or* doing.
  prefs: []
  type: TYPE_NORMAL
- en: It’s both.
  prefs: []
  type: TYPE_NORMAL
- en: It’s life.
  prefs: []
  type: TYPE_NORMAL
- en: The duality collapses into one.
  prefs: []
  type: TYPE_NORMAL
- en: If you stack theory without practice, you will fail in this business.
  prefs: []
  type: TYPE_NORMAL
- en: You need both daily education and execution. Not one or the other.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) It demands you get results for yourself and your customers.**'
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t get results, you aren’t valuable.
  prefs: []
  type: TYPE_NORMAL
- en: Simple as that.
  prefs: []
  type: TYPE_NORMAL
- en: If you aren’t getting results, that isn’t a sign to quit. It’s a sign to improve.
    True value requires development over time.
  prefs: []
  type: TYPE_NORMAL
- en: Entrepreneurship is how you ensure that you develop yourself into a valuable
    asset in reality.
  prefs: []
  type: TYPE_NORMAL
- en: '**4) It demands that you suck at what you’re doing so you can improve.**'
  prefs: []
  type: TYPE_NORMAL
- en: It is foolish to think that you will not suck at almost everything at the start.
  prefs: []
  type: TYPE_NORMAL
- en: This is what keeps most people from acting on their dreams.
  prefs: []
  type: TYPE_NORMAL
- en: Once you overcome the first hump, you snowball into a season of pure progress.
  prefs: []
  type: TYPE_NORMAL
- en: '**5) It demands that you change your work, rest, and play habits.**'
  prefs: []
  type: TYPE_NORMAL
- en: You cannot reach level 3 with the character that got you to level 2.
  prefs: []
  type: TYPE_NORMAL
- en: Growth requires change and that’s why most people settle early.
  prefs: []
  type: TYPE_NORMAL
- en: '**6) It demands a skill set in psychology so you understand your mind.**'
  prefs: []
  type: TYPE_NORMAL
- en: Marketing, sales, writing, and speaking are the backbone of business success.
  prefs: []
  type: TYPE_NORMAL
- en: In today’s world, wealth is generated through code and content.
  prefs: []
  type: TYPE_NORMAL
- en: Code is the back end of the internet.
  prefs: []
  type: TYPE_NORMAL
- en: Content is the front end.
  prefs: []
  type: TYPE_NORMAL
- en: Combine both and you have people and product.
  prefs: []
  type: TYPE_NORMAL
- en: Send people to product and you have profit.
  prefs: []
  type: TYPE_NORMAL
- en: You can learn to code, which is incredibly valuable, but unless that is a passion
    of yours you are better off learning content.
  prefs: []
  type: TYPE_NORMAL
- en: You can build using what the coders build (like website builders, social media
    platforms, and everything else on the internet) to distribute your content.
  prefs: []
  type: TYPE_NORMAL
- en: Content requires self-understanding.
  prefs: []
  type: TYPE_NORMAL
- en: You must capture attention, hold attention, and deliver value to that attention.
  prefs: []
  type: TYPE_NORMAL
- en: I discuss this in [The $1 Million Dollar Skill Stack](https://thedankoe.com/letters/the-1-million-dollar-skill-stack-learn-in-this-order/).
  prefs: []
  type: TYPE_NORMAL
- en: A Potential Progression For Self-Improvers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1371">![](../Images/269e1478376572e9e545595c47177fd5.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: The anxiety trap is dangerous when you attempt to become more confident.
  prefs: []
  type: TYPE_NORMAL
- en: You get anxious approaching new people.
  prefs: []
  type: TYPE_NORMAL
- en: You get anxious about the change required to build a business.
  prefs: []
  type: TYPE_NORMAL
- en: When you feel it, pause.
  prefs: []
  type: TYPE_NORMAL
- en: (No, seriously, this is going to take a conscious effort… *pause.*)
  prefs: []
  type: TYPE_NORMAL
- en: Zoom out.
  prefs: []
  type: TYPE_NORMAL
- en: Reframe your mind.
  prefs: []
  type: TYPE_NORMAL
- en: The cure to anxiety is curiosity.
  prefs: []
  type: TYPE_NORMAL
- en: That’s it. That’s the reframe.
  prefs: []
  type: TYPE_NORMAL
- en: When you’re anxious about starting a business, you are projecting so far into
    the future that clarity is impossible. Your mind cannot bring order to the chaotic
    situation you mentally reside in.
  prefs: []
  type: TYPE_NORMAL
- en: Bring your attention back to what you can do right now.
  prefs: []
  type: TYPE_NORMAL
- en: Get curious about what you can start learning, then learn it.
  prefs: []
  type: TYPE_NORMAL
- en: When you are in a social situation, stop imagining every little detail about
    the future with that person.
  prefs: []
  type: TYPE_NORMAL
- en: Focus your attention on them, right in front of you.
  prefs: []
  type: TYPE_NORMAL
- en: What is something that catches your eye?
  prefs: []
  type: TYPE_NORMAL
- en: Ask them about it.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s how you can leverage curiosity to build momentum into a profitable business
    (with self-confidence as a byproduct).
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Start With Writing**'
  prefs: []
  type: TYPE_NORMAL
- en: When you aren’t confident, writing is your best bet.
  prefs: []
  type: TYPE_NORMAL
- en: And, it’s the foundation of any and all content.
  prefs: []
  type: TYPE_NORMAL
- en: Tweets, ads, videos, reels, etc all start with writing the actual post or a
    script.
  prefs: []
  type: TYPE_NORMAL
- en: Writing allows you to flex your intelligence while everyone else competes for
    looks.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have to show your body, or even your face for that matter. ([Orange
    Book](https://twitter.com/orangebook_) is one of my favorite anonymous writers.)
  prefs: []
  type: TYPE_NORMAL
- en: To become a good writer, you will need to understand psychology to structure
    a message that captures, holds, and spreads attention.
  prefs: []
  type: TYPE_NORMAL
- en: To understand psychology, study marketing and sales. That’s how you learn to
    apply your psychological understanding in the real world.
  prefs: []
  type: TYPE_NORMAL
- en: 'If I were to give you a path, here’s how to start writing:'
  prefs: []
  type: TYPE_NORMAL
- en: Choose a topic you are interested in making your full-time gig
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Block out 30 minutes to learn about marketing, sales, or your interest
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Do not skip a day of learning. Watch videos, podcasts, read books and internet
    content.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Take notes on the ideas that stick out to you.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Start on Twitter (X) or Threads and start posting your ideas.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Study social media as a skill so you can grow (I teach all of this in [2 Hour
    Writer](https://2hourwriter.com)).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the course of 3-6 months, you should gain a decent amount of followers.
  prefs: []
  type: TYPE_NORMAL
- en: Enough to give you confidence that you can make this your full-time business.
  prefs: []
  type: TYPE_NORMAL
- en: Once you have enough readers, you can create a product or service to monetize
    your writing.
  prefs: []
  type: TYPE_NORMAL
- en: The marketing and sales knowledge will compound at this moment.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Branch Into Speaking**'
  prefs: []
  type: TYPE_NORMAL
- en: Most people don’t know this, but the first platform I branched out to was not
    Instagram. It was a podcast.
  prefs: []
  type: TYPE_NORMAL
- en: Why?
  prefs: []
  type: TYPE_NORMAL
- en: It helped me meet high-level people and get offered more opportunities.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You don’t need video editing skills. It is an easy progression from writing.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It forces you to identify your blind spots in communicating with other people.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I didn’t use a podcast to monetize or become famous.
  prefs: []
  type: TYPE_NORMAL
- en: That is incredibly rare with podcasting.
  prefs: []
  type: TYPE_NORMAL
- en: I used it to get people I wanted to talk to on a call.
  prefs: []
  type: TYPE_NORMAL
- en: People LOVE getting on podcasts.
  prefs: []
  type: TYPE_NORMAL
- en: I wanted to talk with Justin Welsh, so I asked him to do a podcast, and that
    gave new vision for my brand.
  prefs: []
  type: TYPE_NORMAL
- en: Our chat on one-person businesses was the catalyst for me gaining 150k subscribers
    in less than 6 weeks on YouTube.
  prefs: []
  type: TYPE_NORMAL
- en: That’s another next step.
  prefs: []
  type: TYPE_NORMAL
- en: You can go straight to YouTube with your previous writing.
  prefs: []
  type: TYPE_NORMAL
- en: You can literally see the increase in confidence you get after creating 6 months
    of videos.
  prefs: []
  type: TYPE_NORMAL
- en: You become less awkward, more concise, and more impactful.
  prefs: []
  type: TYPE_NORMAL
- en: Your business compounds as your confidence does.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Create A Product Or Service**'
  prefs: []
  type: TYPE_NORMAL
- en: By now you are growing an audience.
  prefs: []
  type: TYPE_NORMAL
- en: You have people.
  prefs: []
  type: TYPE_NORMAL
- en: Well, hopefully. If you don’t, you need to zoom out and realize it’s a skill
    issue. You need a big picture understanding of social media to get eyes on good
    content however you can.
  prefs: []
  type: TYPE_NORMAL
- en: Money requires people and a product.
  prefs: []
  type: TYPE_NORMAL
- en: “Product” can also include services here. It is what you sell to the people
    you’ve attracted.
  prefs: []
  type: TYPE_NORMAL
- en: This is the only way to make money.
  prefs: []
  type: TYPE_NORMAL
- en: You can aim to be one of the select few that lives off of ad revenue (generated
    from the social media platform) alone, but you will be a slave to the algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: Creating your own product or service is how you take control of your income.
  prefs: []
  type: TYPE_NORMAL
- en: Social media as a skill becomes a faucet that you can turn on whenever you want
    to make more money.
  prefs: []
  type: TYPE_NORMAL
- en: You know how to attract people and you have a product that sells.
  prefs: []
  type: TYPE_NORMAL
- en: (There’s a lot that goes into both, you will need to improve at both.)
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ve written about this extensively, so here are some letters to learn how
    to create a product:'
  prefs: []
  type: TYPE_NORMAL
- en: – [An overview of the one person business model](https://thedankoe.com/letters/the-one-person-business-revisited-turn-yourself-into-a-business/)
  prefs: []
  type: TYPE_NORMAL
- en: – [The best way to create an offer even as a beginner](https://thedankoe.com/letters/the-best-online-business-model-to-make-1-million-in-2023/)
  prefs: []
  type: TYPE_NORMAL
- en: – [How to productize the $100,000 worth of knowledge in your head](https://thedankoe.com/letters/you-have-100000-of-knowledge-trapped-in-your-brain/)
  prefs: []
  type: TYPE_NORMAL
- en: 'The reason building a product or service helps with confidence is this:'
  prefs: []
  type: TYPE_NORMAL
- en: You will suck at first. This is the case for literally anything else you do.
    Don’t see it as scary just because business seems foreign to you.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You get direct feedback on what can be improved. People can be brutal, but most
    are nice.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you want to actually make money, you need to actually provide value. If you
    aren’t continuing to grow your audience or money – maybe start thinking about
    how valuable you really are.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That’s it for this one my friends.
  prefs: []
  type: TYPE_NORMAL
- en: Go practice confidence as a skill, for life.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan Koe
  prefs: []
  type: TYPE_NORMAL
