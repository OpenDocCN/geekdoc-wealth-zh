- en: The 80-Hour Myth (Why We’re Addicted To Being Busy)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 80小时神话（为什么我们沉迷于忙碌）
- en: 原文：[https://thedankoe.com/letters/the-80-hour-myth-why-were-addicted-to-being-busy/](https://thedankoe.com/letters/the-80-hour-myth-why-were-addicted-to-being-busy/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://thedankoe.com/letters/the-80-hour-myth-why-were-addicted-to-being-busy/](https://thedankoe.com/letters/the-80-hour-myth-why-were-addicted-to-being-busy/)'
- en: Ever since I could remember, I didn’t want to work my life away.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 从我能记事起，我就不想把我的生活都花在工作上。
- en: Anti role models were all around me.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 反面典型无处不在。
- en: And I was pretty observant as a child.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我小时候就非常警觉。
- en: I didn’t want to wake up at 4am, drive to work at 5am, grind away, and get home
    at 7pm because I was trying to support a family—working double shifts—just to
    be met by a spouse ready to argue or tell me how I could be doing more around
    the house.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我不想在凌晨4点醒来，早上5点开车去上班，磨炼一整天，晚上7点回到家，因为我在努力支撑一个家庭——上双班——结果遇到的是一个准备争吵或告诉我我在家里能做得更多的配偶。
- en: I’ll let you fill in the details there, as that sentence alone is making me
    emotional about the negatives (interspersed between *many* positives) of my childhood.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我会让你在那里填写细节，因为仅仅这句话就让我对童年的负面情绪（夹杂在*许多*正面情绪之间）感到情感上的波动。
- en: That’s why I refused to go that route.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么我拒绝走那条路。
- en: In my teenage years, I was always obsessing over what I could do that would
    make the most money with the least amount of work.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在我的青少年时期，我总是痴迷于我能做什么来用最少的工作赚取最多的钱。
- en: In college, I was going to class and working part time. I would spend 2-3 hours
    a day building side projects and learning via Udemy courses or YouTube.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在大学时，我去上课，做兼职工作。我每天会花2-3小时建立副项目，通过Udemy课程或YouTube学习。
- en: When I had my first full time job, I’d learn during my 1 hour commute (audiobooks,
    podcasts, YouTube) and procrastinate my work tasks for an hour or two to build
    my side businesses at the time.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当我有了第一份全职工作时，我会在1小时的通勤时间（有声书、播客、YouTube）学习，并且拖延我的工作任务一两个小时来建立当时的副业。
- en: 'What I’m trying to get at is this:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我试图表达的是这个：
- en: I didn’t have 12-16 hours a day to “grind” on my side business to make it work.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我没有12-16个小时每天来“磨炼”我的副业以使其成功。
- en: I had 1 to 4 hours if I didn’t lie to myself about how I could prioritize my
    time.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我不对自己撒谎关于如何优先安排我的时间，我会有1到4个小时。
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2643">![](../Images/88e8547e8b58edc503f23a12332a359e.png)</picture>
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-2643">![](../Images/88e8547e8b58edc503f23a12332a359e.png)</picture>
- en: This is one thing that really pisses me off. Otherwise I’m pretty stoic (at
    least I think so).
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我真正感到愤怒的一件事。否则我相当冷静（至少我认为是这样）。
- en: 'A few days ago, someone on X said:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 几天前，有人在X上说了：
- en: “That’s easy for you to say in your position, but that’s not how it works for
    beginners,” referencing a comment I made on how you need to take rest in order
    to do your best work.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: “你这么说很容易，但初学者的情况并不是这样，”这是我对如何休息以便做到最好工作的评论的引用。
- en: People say this all the time, even when I teach how to write, as if I’m not
    teaching *what I did* as a beginner. If your methods are so much better show me
    your results.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 人们经常这么说，即使我在教写作时也是如此，好像我没有教*我作为一个初学者所做的事情*。如果你的方法真的那么好，那就给我看看你的成果。
- en: 'Here’s why I get unnecessarily upset: because young people have been conditioned
    to see “grinding” mindlessly as a status symbol disguised as an effective strategy
    for achieving success.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我为什么会不必要地感到沮丧的原因：因为年轻人已经被训练成将“磨炼”无意识地视为一种伪装成实现成功有效策略的地位象征。
- en: I’m here to deconstruct that idiotic way of thinking that leads to the fact
    that 95% of beginners and businesses as a whole fail. “Grinding” is not wisdom
    nor a strategy, it’s a lack thereof.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里是为了拆解那种愚蠢的思维方式，这种思维方式导致了95%的初学者和整体企业失败的事实。“磨炼”既不是智慧也不是策略，它是一种缺乏。
- en: I worked 1-4 hours at a time on the side business that allowed me to leave my
    job.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我一次工作1-4小时在副业上，这样我就能离开我的工作。
- en: When I started doing my own thing full time, I worked about the same amount.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 当我开始全职做自己的事情时，我工作的时间几乎一样多。
- en: Now that I’ve written 2 books, have built almost 10 products, run a software
    startup, and have built quite a large following, I’m pretty confident in the fact
    that most people are either wasting their time or just don’t know what they don’t
    know.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我已经写了2本书，建立了近10个产品，运营了一个软件初创公司，并且建立了一个相当大的追随者群体，我对这样一个事实感到相当自信：大多数人要么在浪费时间，要么就是不知道自己不知道什么。
- en: If you are grinding 12+ hours a day, especially as a beginner, I can guarantee
    that there *is a way* to get more results while working less than 4 hours.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你每天工作12小时以上，尤其是作为一个初学者，我可以保证有一种方法可以在工作少于4小时的情况下获得更多成果。
- en: In fact, I would argue that if you are working more than 4 hours, you are at
    least working on a few wrong things, and there is *some* improvement that can
    be made.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，我会争辩说，如果你工作超过4小时，你至少在做一些错误的事情，而且有一些改进是可以做到的。
- en: You can drop things that don’t work.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以放弃那些不起作用的事情。
- en: You can speed up busy work with AI [(I actually just created a free mini course
    on how I use AI since many people asked for it)](https://stan.store/thedankoe/p/mini-course-how-i-systemize-my-life-with-ai).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以用AI加速忙碌的工作[(我实际上刚刚创建了一个关于我如何使用AI的免费迷你课程，因为很多人要求它）](https://stan.store/thedankoe/p/mini-course-how-i-systemize-my-life-with-ai)。
- en: You can discover your strengths and focus on levers.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以发现你的优势并专注于杠杆。
- en: But you probably just don’t want to realize that because you won’t fit in with
    this world that glorifies busyness. The mind is a tricky thing.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 但你可能只是不想意识到这一点，因为你不会适应这个赞美忙碌的世界。思维是一件棘手的事情。
- en: If you understand the importance of leisure and leverage (that could be a catchy
    title of a book, oh wow, I’ll write that next… ideas beget ideas) your productivity,
    mind, and lifestyle will transform.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你理解休闲和利用（这可能是一个吸引人的书名，哦，太棒了，我下次会写那本书…想法孕育想法）你的生产力、思维和生活方式将发生转变。
- en: When Long Hours Make Sense
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 当长时间工作有意义时
- en: I’m not here to convince you that working under 4 hours is the one true way.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是来说服你，工作少于4小时是唯一正确的方法。
- en: It is one way.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种方式。
- en: And you don’t go one way for the entirety of your life.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 你在一生中不会一直走一条路。
- en: Productivity comes in seasons.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 生产力有季节性。
- en: In one season, you may work 4 hours.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个季节里，你可能只工作4小时。
- en: In another, you may work 16.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在另一个季节，你可能工作16小时。
- en: Sometimes it’s 6, 2, 8, 10, or any other number because input vs output often
    aren’t a linear correlation.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候是6点2点8点10点，或者任何其他数字，因为输入与输出往往不是线性相关。
- en: I have my fair share of times where I can’t help but work long hours, and I
    love it.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我也有不少时候不得不长时间工作，而且我喜欢这样。
- en: But systems (especially productivity systems) don’t last forever in one singular
    state. They evolve. They adapt to the situation. They break down rapidly and leave
    you lost (like that Notion productivity system you obsessed about years ago that
    was fun at the time and served you well, but would be a waste of time in your
    current phase).
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 但系统（尤其是生产力系统）不会永远处于单一状态。它们会进化。它们会适应情况。它们会迅速崩溃，让你迷失（就像你多年前痴迷的那个Notion生产力系统，当时很有趣，对你很有帮助，但在你当前阶段将是浪费时间）。
- en: My purpose with writing this is to prove that a sustained 16 hour grindset won’t
    get you as far as you think it will.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我写这篇的目的就是要证明持续的16小时努力并不能让你达到你想象中的那么远。
- en: Consistent 12-16 hour workdays is not personality trait, it is a sign of major
    disfunction and a general neglect for how your mind is wired.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 持续的12-16小时工作日不是个性特征，它是重大功能障碍和对你大脑结构的普遍忽视的迹象。
- en: All I ask is that you finish this letter before forming a hard set opinion,
    because even that is a system that will break down when you need it most.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我只要求你在形成固定看法之前完成这封信，因为即使那也是一个在你最需要的时候会崩溃的系统。
- en: The 80 Hour Myth – Why We Are Addicted To Being Busy
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 80小时神话——为什么我们沉迷于忙碌
- en: 'The creator’s paradox:'
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 创作者的悖论：
- en: ''
  id: totrans-46
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Creativity is the result of not trying to be creative.
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 创造力是试图不创造的结果。
- en: Humans are memetic creatures.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 人类是模仿性的生物。
- en: We imitate in order to survive and avoid being cast out (of our family… or our
    productivity obsessed culture).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我们模仿是为了生存，避免被排斥（我们的家庭…或者我们生产力至上的文化）。
- en: Our mind takes the shape of that which allows us to fit in.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的大脑会适应那些让我们融入其中的事物。
- en: The problem starts with the fact that everyone glorifies the *visible extreme.*
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 问题始于这样一个事实：每个人都赞美“可见的极端”。
- en: There’s something we find inspiring about the young startup phenom who built
    a $1M business in 3 weeks just from “grinding.”
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我们发现年轻创业现象令人鼓舞，他们在3周内仅通过“努力工作”就建立了一个价值100万美元的业务。
- en: It feels relatable. Anyone can do that, right? It makes sense that the longer
    and harder I work, because that’s what I’ve been told to do my entire life, the
    more likely I am to get what I want, right? It’s just all about working hard,
    right???
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这感觉很有共鸣。任何人都可以做到，对吧？我工作得越久越努力，因为我的整个一生都被教导要这样做，我得到我想要的东西的可能性就越大，对吧？这仅仅是因为努力工作，对吧？？？
- en: Wrong.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 错误。
- en: You and I both know that there is a deeper formula at play.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都知道，有一个更深的公式在起作用。
- en: We both know that a highlight reel spurred by unconscious competence is not
    reality.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都知道，由无意识能力激发的精彩片段并不代表现实。
- en: 'We both know that you can spend 10,000 hours writing 10 books just for them
    to never see more than 50 readers, and that pisses some people off, because someone
    who understands how to distribute a sub-par book can sell millions of copies and
    run laps around you: because they focused on what gets results.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都知道，你可以花10,000小时写10本书，但它们可能永远不会超过50个读者，这让一些人感到愤怒，因为那些懂得如何推广质量不佳书籍的人可以卖出数百万份，并且绕过你：因为他们专注于结果。
- en: Most people are missing the context.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人都忽略了这个背景。
- en: They’re missing the *invisible extreme* that actually led to the success of
    most creatives, visionaries, and strategists.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 他们忽略了实际上导致大多数创意人士、思想家和策略家成功的关键因素——*无形极端*。
- en: Take Charles Darwin.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 以查尔斯·达尔文为例。
- en: You know, the guy who wrote 19 books in his lifetime, discovered the theory
    of evolution, and changed the world as we know it while working 4-5 hours a day
    followed by lots of long walks, reading, and other leisure that fueled his mind
    with the ideas that allowed him to accomplish such grand tasks.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道，这位在他的一生中写了19本书、发现了进化论、并改变了我们所知的世界的人，每天工作4-5小时后，会进行大量的长时间散步、阅读和其他休闲活动，这些活动用想法滋养了他的大脑，使他能够完成如此伟大的任务。
- en: The difference between you and him is that this was his life’s work.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 你和他之间的区别在于，这是他一生的作品。
- en: It didn’t matter how long it took.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不重要花了多长时间。
- en: For you, it’s do or die. You either succeed in 6 months or you quit and accept
    your fate forever, which is laughable and backward. And that constant state of
    stress and survival definitely isn’t helping your cause.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 对于你来说，这是生死存亡。你要么在6个月内成功，要么放弃并永远接受你的命运，这是可笑的，也是倒退的。而这种持续的压力和生存状态肯定不会帮助你。
- en: When we actually take a look at (1) the lifestyles of successful people and
    (2) the human brain and psychological facts, we shine a light on a few things.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们真正审视（1）成功人士的生活方式以及（2）人脑和心理学事实时，我们就能揭示一些事情。
- en: First, most of the creatives we admire had very similar routines.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们钦佩的大多数创意人士都有非常相似的日常习惯。
- en: They had intense focused work blocks followed by relentless rest that involved
    a complete disconnection from work.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 他们有强烈的专注工作阶段，随后是无休止的休息，这涉及到完全脱离工作。
- en: Take David Ogilvy, a legendary advertiser and copywriter, who believed in doing
    intensive research and writing down everything possible, then stepping away to
    let his subconscious work on the problem.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 以大卫·奥格威为例，这位传奇的广告商和文案作家，他相信进行深入的研究，写下所有可能的东西，然后离开，让他的潜意识去处理问题。
- en: Big ideas come from the unconscious. This is true in art, in science, and in
    advertising. But your unconscious has to be well informed, or your idea will be
    irrelevant. Stuff your conscious mind with information, then unhook your rational
    thought process.
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 伟大的想法来自潜意识。这在艺术、科学和广告中都是如此。但你的潜意识必须充分了解信息，否则你的想法将变得无关紧要。用信息填满你的意识思维，然后让你的理性思维过程脱钩。
- en: ''
  id: totrans-70
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Ogilvy
  id: totrans-71
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 奥格威
- en: 'The long walks, reading, and leisure time of the greats is what activates the
    Default Mode Network (DMN) in your brain. That is, when you stop focusing on work,
    your subconscious continues to do work for you, often in a more creative and effective
    way, presenting the ideas to your conscious mind (see: shower thoughts) that bring
    novelty and innovation to your work.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 伟大的思想家们的长时间散步、阅读和休闲时间正是激活你大脑中的默认模式网络（DMN）。也就是说，当你停止专注于工作时，你的潜意识会继续为你工作，通常以更富有创造性和有效的方式，将想法呈现给你的意识（参见：淋浴时的思考），为你的工作带来新颖性和创新。
- en: Other scientists have found that the complexity of the DMN shapes our capacity
    for self-awareness, memory, ability to imagine the future, empathy, and moral
    judgment[…] The better-developed your DMN, other scientists have found, the better
    able you are to construct models of other people’s minds.
  id: totrans-73
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 其他科学家发现，DMN（默认模式网络）的复杂性塑造了我们的自我意识、记忆、想象未来的能力、同理心和道德判断能力……其他科学家发现，DMN越发达，你构建他人心理模型的能力就越强。
- en: ''
  id: totrans-74
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Rest, Alex Pang
  id: totrans-75
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 休息，亚历克斯·庞
- en: In other words, *the most effective and result generating “work” you do is when
    you don’t work at all*. This is an extremely hard pill to swallow for those whose
    identity is so attached to “the grind” that their mind will spit out a reaction
    to that statement before it even has time to think.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，*你做的最有效和结果产生的工作是在你根本不工作的时候*。这对那些身份与“忙碌的生活”紧密相连的人来说，是一剂难以吞下的苦药。
- en: If that’s you, you should go on a walk, because that’s the exact ineffective
    thinking that is getting you nowhere.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你就是这样的人，你应该去散步，因为那正是那种无效的思考，让你一事无成。
- en: When you are deeply focused on a string of tasks, your mind is narrowed in on
    that quest-like video game. You will not and cannot see outside of the task. You
    simply sit down and complete something that you’ve already learned or strategized
    how to do. You are mostly limited to the ideas already circulating in your brain.
    Your mind isn’t attempting to come up with *new* ideas, and if it is, the ideas
    are few and far between.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 当你专注于一系列任务时，你的思维会像类似视频游戏的追求一样集中。你不会，也不能看到任务之外的东西。你只是坐下来完成你已经学会或已经策略性地知道如何完成的事情。你主要受限于你大脑中已经存在的想法。你的大脑并没有试图提出*新*的想法，如果有的话，这些想法也是少之又少。
- en: Most great ideas come from well informed self-reflection.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数伟大的想法都来自信息丰富的自我反思。
- en: The Power Of Procrastination — It’s Not Laziness, It’s How We’re Wired
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 拖延的力量——这不是懒惰，这是我们如何被编程的
- en: You and I are not like cows. We’re not meant to graze all day. We’re meant to
    hunt like lions. We’re closer to carnivores in our omnivorous development than
    we are to herbivores. As an intellectual athlete, you want to function like an
    athlete. Which means you train hard, then you sprint, then you rest, then you
    reassess. This idea that you’re going to have linear output just by cranking every
    day at the same amount of time sitting… That’s machines. Machines are meant to
    work 9-5, not humans.
  id: totrans-81
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我和你都不像牛。我们不是用来整天吃草的。我们是用来像狮子一样狩猎的。在我们的杂食性发展中，我们更接近肉食性动物，而不是草食性动物。作为一个智力运动员，你希望像运动员一样发挥作用。这意味着你努力训练，然后冲刺，然后休息，然后重新评估。这种想法认为你只需每天以相同的时间坐着……那就是机器。机器是按9-5工作，而不是人类。
- en: ''
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Naval
  id: totrans-83
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: ——纳瓦尔
- en: Most people have underlying fears and desires that tie them to “the grind:”
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人都有潜在恐惧和欲望，这些使他们与“忙碌的生活”联系在一起：
- en: They romanticize the long and hard route
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们浪漫化漫长而艰难的道路
- en: They have underlying trauma that makes them want to prove themselves to people
    who won’t care
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们有潜在的创伤，使他们想要向那些不会关心的人证明自己
- en: They were raised in a frugal family and delay their success because deep down,
    they’re afraid to make money
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们在一个节俭的家庭中长大，推迟他们的成功，因为他们内心深处害怕赚钱
- en: They think they don’t deserve leverage yet, so they do everything themselves
    or try to do everything at once
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们认为他们还不配拥有杠杆作用，所以他们会自己做所有事情，或者试图一次性做所有事情
- en: The reality is…
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 事实是…
- en: It’s no longer acceptable to say you found and exploited a shortcut.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 找到并利用捷径已经不再被接受。
- en: It feels like you’re falling behind when you stop working so much and are met
    with boredom.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 当你停止大量工作，遇到无聊时，你会感觉自己在落后。
- en: But to the Ancient Greeks, who we consistently reference as pillars of wisdom,
    leisure was the pinnacle of civilized life.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 但对古希腊人来说，我们一直将其视为智慧的柱石，休闲是文明生活的顶峰。
- en: Work was necessary, but secondary to leisure.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 工作是必要的，但次要于休闲。
- en: I’ve recently rediscovered this myself.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我最近自己重新发现了这一点。
- en: As a fancy pants “startup founder” I felt like I needed to grind all day to
    keep up with the AI race that’s happening right now.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一位“高级的创业创始人”，我觉得我需要整天忙碌，才能跟上目前正在发生的AI竞赛。
- en: 2 months later, my writing began to suffer. It felt like I couldn’t think clearly.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 两个月后，我的写作开始受到影响。感觉我无法清晰地思考。
- en: I would look back on my old writing and think, “How in the world did I write
    that?”
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我会回顾我以前的文章，想，“我究竟是怎么写出那样的东西的？”
- en: Not because it was the greatest thing I’ve ever seen, not by a long shot, but
    because I could articulate my thoughts in such a compelling way. My vision was
    clear. My life, at the time, felt stable even though the future was incredibly
    uncertain.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 不是因为它是我见过的最伟大的东西，不是一点，而是因为我能够以如此吸引人的方式表达我的思想。我的愿景是清晰的。当时，尽管未来极其不确定，但我的生活感觉稳定。
- en: I thought back and remembered my long walks where my brain would light up with
    connections between so many different worldviews and philosophies.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 我回想起我的长距离散步，那时我的大脑会因众多不同世界观和哲学之间的联系而发光。
- en: I missed that.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我错过了这一点。
- en: It’s as if something was putting a limiter on my pattern recognition.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 仿佛有什么东西在限制我的模式识别。
- en: If I could somehow get that back… it would actually *help my business*, not
    hurt it.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我能以某种方式找回它……这实际上会*帮助我的业务*，而不是伤害它。
- en: So, I started *intentionally* taking more rest throughout the day.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，我开始*有意地*在一天中更多地休息。
- en: As in forcing myself *not* to work even when I felt the urge.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 就像强迫自己*不*工作，即使我感到强烈的冲动。
- en: It felt off at first. It felt like I was falling behind. But my mind is thanking
    me, slowly, then all at once.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 最初感觉有些不对劲。感觉像是在落后。但我的大脑在慢慢地，然后突然感谢我。
- en: My creativity is returning with a vengeance. I can think as clear as ever. And
    you can probably tell by this letter, that weaving ideas from multiple domains
    is no longer an issue.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我的创造力正在以惊人的速度回归。我可以像以前一样清晰地思考。你可能从这封信中就能看出，从多个领域编织想法已经不再是一个问题。
- en: My cookie cutter boringness of my recent YouTube videos isn’t the result of
    a lack of output, it’s the result of a lack of rest.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 我最近YouTube视频的千篇一律的乏味并不是因为没有产出，而是因为没有休息。
- en: Work Like A Lion, Not A Cow
  id: totrans-108
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 像狮子一样工作，而不是像牛一样
- en: There are two approaches to work.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 工作有两种方法。
- en: 'First, is like a cow who grazes the fields:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 第一，就像一头在田野上吃草的牛：
- en: Consistent long hours every day
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每天持续长时间的工作
- en: Steady and predictable output
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 稳定且可预测的产出
- en: Trading time for money in a linear fashion
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以线性方式用时间换金钱
- en: Showing up regularly regardless of energy
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不论能量如何，都要定期出现
- en: Often leads to burnout and diminishing returns
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 往往导致过度劳累和收益递减
- en: Second, is like a lion, which we share a similar psychological wiring in that
    we are *hunters* (at least when it comes to work)*.*
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种方法就像狮子一样，我们在心理上有着相似的连接，因为我们都是*猎人*（至少在工作方面是）*。
- en: 'Our brain craves the novelty and dopamine that comes along with discovering
    resources (like ideas) that aid in our survival:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的大脑渴望发现有助于我们生存的资源（如想法）所带来的新颖性和多巴胺：
- en: Intense bursts of focused, high-energy work
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 焦点集中、高能量工作的短暂爆发
- en: Long periods of rest and recovery between hunts
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 猎捕之间的长时间休息和恢复
- en: Work according to energy and creativity cycles
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据能量和创造力周期来工作
- en: Prioritize impact over number of hours logged
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优先考虑影响而不是记录的小时数
- en: Aim for leverage where results aren’t tied to *time*
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 寻求结果不与*时间*挂钩的杠杆作用
- en: A lion, by today’s perception, is a massive procrastinator, and people discourage
    that. They make you feel guilty for taking your time. They tell you that you lack
    discipline and you should take things more seriously.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 根据今天的看法，狮子是一个巨大的拖延症患者，人们会劝阻这种行为。他们会让你觉得自己在浪费时间，告诉你你缺乏自律，你应该更加认真对待事情。
- en: If you’re bad at texting people back, or you tend to put your work (or homework)
    off until the last second, it’s not a character flaw, it’s how many people are
    wired.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你擅长回复短信，或者你倾向于把工作（或家庭作业）推迟到最后一刻，这不是性格缺陷，这是很多人都是这样。
- en: If that sounds like you, what you need to understand is that intensity is better
    than duration, rest is the most productive form of work, and results matter more
    than hours.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这听起来像你，你需要理解的是，强度比持续时间更重要，休息是最有生产力的工作形式，结果比小时数更重要。
- en: But there are a few moving pieces here.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 但这里有几个移动的部分。
- en: First, is leveraging your unique strengths that give you an asymmetric advantage.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，是利用你的独特优势，这些优势给你带来了不对称的优势。
- en: Second, is choosing to pursue work that allows you to put lifestyle first.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，是选择追求那些让你能够将生活方式放在首位的工作。
- en: That way, you can work according to your energy cycles *and* make a conscious
    choice as to what you should be working on. Some creatives worked late into the
    night while others preferred the morning.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，你可以根据你的能量周期来工作，并且有意识地选择你应该做什么。有些创意人士喜欢熬夜工作，而有些人则更喜欢早晨。
- en: If someone tells you what to work on, you can’t really change that, and your
    first priority must be to leave that work.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有人告诉你应该做什么工作，你实际上无法改变，你的首要任务必须是离开那项工作。
- en: How To Work Less, Earn More, and Enjoy Life
  id: totrans-131
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何少工作、多赚钱、享受生活
- en: To work like a lion, you need clarity.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 要像狮子一样工作，你需要清晰的目标。
- en: 'Let’s coin this Koe’s Razor:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们提出Koe的剃刀：
- en: '*If you need to force yourself to work, you’re working on the wrong thing.*'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果你需要强迫自己工作，那么你正在做的事情就是错误的。*'
- en: If you have absolute clarity on the idea, project, or strategy that will take
    you one step closer to your vision, you don’t need discipline. You can’t help
    but work. You tap into the flow state and get it done quickly with extremely high
    quality.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对你认为能让你更接近愿景的想法、项目或策略有绝对的清晰度，你不需要自律。你无法不工作。你进入心流状态，并以极高的质量迅速完成工作。
- en: This is how most of my best, most notable projects are completed.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我的大多数最好、最引人注目的项目是如何完成的。
- en: I take my leisure, often to the point of feeling like I should be working, until
    the project deadline approaches and I have sufficient clarity on how to get it
    done.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 我享受我的休闲时光，常常到感觉我应该工作的程度，直到项目截止日期临近，我对如何完成它有了足够的清晰度。
- en: Then, it’s the only thing that’s on my mind. My focus narrows and distractions
    become zero. And once the project is done, I return to a “maintenance mode” where
    I do the minimal amount of work required to sustain some form of progress, knowing
    that if I were to try to force more, from experience, I would be disappointed
    with the results.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，它就成为了我唯一关心的事情。我的注意力变得集中，干扰变得为零。一旦项目完成，我就回到“维护模式”，只做维持某种形式进步所需的最小工作量，因为我有经验，知道如果我试图强迫更多，结果可能会让我失望。
- en: 'Now, in order to work less, a few conditions need to be met:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，为了减少工作量，需要满足以下几个条件：
- en: You must define and abide by your ideal lifestyle.
  id: totrans-140
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你必须定义并遵守你的理想生活方式。
- en: Your unique strengths must align with a leverage based game.
  id: totrans-141
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的独特优势必须与基于杠杆的游戏相匹配。
- en: You need the awareness of tools and technology at your disposal to do more in
    less time as one person.
  id: totrans-142
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你需要意识到你拥有的工具和技术，以便以更少的时间作为一个人做更多的事情。
- en: 'With that, let’s begin:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，让我们开始吧：
- en: 1) Ideal Lifestyle Determines Focus
  id: totrans-144
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 理想生活方式决定焦点
- en: The best way to create your ideal life is to live it, right now, but on a smaller
    scale.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 创造你理想生活的最佳方式是现在就开始生活，但规模要小一些。
- en: If you want to be a writer, and you aren’t already writing, you will never become
    one.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要成为一名作家，而你还没有开始写作，你永远不会成为作家。
- en: But if you start writing now, even if you only have 30 minutes, you can slowly
    titrate up the amount of time you spend writing.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果你现在开始写作，即使只有30分钟，你也可以逐渐增加你花在写作上的时间。
- en: Because if you aren’t writing—or designing, creating, coding, etc—you aren’t
    engaged in the process of error correction. You aren’t encountering the real world
    feedback that allows you to get better. Until you actually start, whether it be
    now or when you are more “knowledgeable,” you are delaying how soon you will be
    good enough to do that thing full time.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 因为如果你不写作——或者设计、创造、编码等——你就不是在错误纠正的过程中。你没有遇到让你变得更好的真实世界反馈。直到你真正开始，无论是现在还是当你更有“知识”的时候，你都在推迟你能够全职做那件事的时间。
- en: To work less, *every single decision you make must be filtered through your
    ideal lifestyle.*
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 要减少工作量，*你必须将你做的每一个决定都过滤通过你的理想生活方式*。
- en: This image of your “ideal lifestyle” is not a static target, it’s an evolving
    work of art. I can’t tell you what it is, because it’s up to your own self-reflection
    of the past experiences you don’t want to live again and a gradual trial and error
    toward the future experiences you think you want until they become past experiences
    that you can see with clear eyes.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 你心中的“理想生活方式”并非一个静态的目标，而是一幅不断演变的艺术作品。我无法告诉你它是什么，因为它取决于你对自己过去不希望再次经历的经历的自我反思，以及朝着你认为想要体验的未来经历的逐步尝试和错误，直到它们成为你可以用清晰双眼看到的过去经历。
- en: For now, one of the most useful things you can do is to set *anti-goals.*
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可以做的最有用的事情之一是设定*反目标*。
- en: 'In other words:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说：
- en: What are you *not* willing to sacrifice in order to achieve success?
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现成功，你不愿意放弃什么？
- en: Are you willing to sacrifice your health?
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 你愿意牺牲你的健康吗？
- en: No?
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 不是吗？
- en: Then 16 hour days are automatically ruled out.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，16小时的工作日就被自动排除了。
- en: What about time with your significant other? Your intellectual development?
    Social life?
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 与你重要的人共度的时间？你的智力发展？社交生活？
- en: Many people will see this as limiting when it is incredibly freeing, because
    creativity thrives within constraints.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人会认为这是限制性的，而实际上它是一种极大的自由，因为创造力在限制中蓬勃发展。
- en: With the constraint of not sacrificing your health, you are required to (1)
    choose a career or business model that favors that (2) say “no” to more commitments,
    freeing up more focus and (3) prioritize quality over quantity of work.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 在不牺牲健康的前提下，你必须（1）选择一个有利于健康的职业或商业模式（2）拒绝更多的承诺，释放更多注意力（3）优先考虑工作的质量而非数量。
- en: When you can’t extend your working hours indefinitely, you’re forced to make
    the most of the time you do have, leading to more focused and often better results.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 当你不能无限期地延长工作时间时，你就被迫充分利用你拥有的时间，这导致更专注和通常更好的结果。
- en: 2) Permissionless Leverage
  id: totrans-161
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 无许可杠杆
- en: We’ve missed one crucial point so far, and that is the difference between mechanical
    and creative work.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 我们到目前为止错过了一个关键点，那就是机械工作和创造性工作的区别。
- en: Mechanical work can be done for 16 hours a day with relative ease because it
    doesn’t demand that much mental energy.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 机械工作可以轻松地每天工作16小时，因为它不需要太多的脑力。
- en: But that’s not where leverage comes from.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 但杠杆的来源并不在这里。
- en: And, you are still neglecting the rest of your life.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 而且，你仍然忽视了你余下的生活。
- en: So if you still arguing with me in your head that you can work all day and get
    a lot of high quality work done, it is probably mechanical work, and you are still
    probably better off working less so you don’t procrastinate all of the other work
    you should have done in other areas of your life for 40 years.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，如果你还在心里和我争论你可以整天工作并完成大量高质量的工作，那么这很可能是机械工作，而且你仍然可能更明智地少工作一些，这样你就不会拖延你在生活中其他领域应该完成的40年的其他工作。
- en: 'None of this is to say that working a lot is always bad, but it is the lowest
    form of leverage out of the 3:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不是说工作很多总是不好的，但这是三种形式中最低效的杠杆：
- en: '**Labor leverage** – increasing your time spent on tasks or outsourcing work
    to others. (Cons: management overhead and complexity)'
  id: totrans-168
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**劳动杠杆** – 增加你在任务上的时间或外包工作给他人。（缺点：管理成本和复杂性）'
- en: '**Capital leverage** – your money works for you through investments. (Cons:
    requires existing wealth or something worth investing in)'
  id: totrans-169
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**资本杠杆** – 你的钱通过投资为你工作。（缺点：需要现有的财富或值得投资的东西）'
- en: '**Permissionless leverage** – the most powerful form of modern leverage. (Cons:
    most people look like they’re doing the same thing)'
  id: totrans-170
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**无许可杠杆** – 现代最强大的杠杆形式。（缺点：大多数人看起来都在做同样的事情）'
- en: All have their pros, but we live in the most permissionless time in history.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都有其优点，但我们生活在这个历史上最无许可的时代。
- en: Permissionless leverage comes in the form of code, media, books, podcasts, tweets,
    newsletters, courses, etc.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 无许可杠杆的形式包括代码、媒体、书籍、播客、推文、通讯、课程等。
- en: These have zero marginal cost of replication.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 这些工作的复制边际成本为零。
- en: In other words, build once, sell as many times as you’d like.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，一次构建，想卖多少次就卖多少次。
- en: Once a piece of software, content, or digital asset is created, you can distribute
    additional copies at virtually zero cost. One digital product can serve one million
    users.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦软件、内容或数字资产被创建，你几乎可以零成本地分发额外的副本。一个数字产品可以服务一百万用户。
- en: Why is this important?
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 这为什么很重要？
- en: Because never has their been a time where so much power lies in the hands of
    the individual.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 因为从来没有一个时代像现在这样，个人手中掌握着如此多的权力。
- en: One person (or a small team) can reach global scale without gatekeepers thanks
    to the internet
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个人（或一个小团队）可以通过互联网达到全球规模，而不需要守门人。
- en: Digital products don’t require *permission* to build or distribute
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数字产品不需要**许可**来构建或分发
- en: They often have exponential rather than linear returns on investment of time
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们往往有指数级的而不是线性的时间投资回报率
- en: 'This is where people get confused:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是人们容易混淆的地方：
- en: One, they think they have to (again) grind out content to build any form of
    an audience. But if you think critically, you know that’s not true. You know that
    with *quality and consistent output* you have more of a chance at being spread
    to more people who love your work.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 一方面，他们认为他们必须（再次）努力创作内容来建立任何形式的受众。但如果你进行批判性思考，你就会知道那并不正确。你知道，只要你有**高质量和持续的内容输出**，你就更有机会让你的作品被更多喜欢它的人传播。
- en: I wrote 3 tweets a day for 2 years (with the occasional thread) and grew to
    over 100k followers.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 我每天写3条推文两年（偶尔有长篇帖子），增长到超过10万粉丝。
- en: 3 measly tweets doesn’t require anywhere close to a “grind.” Neither do the
    other strategies for growth. I spent *maybe* 5-10 hours a week on it.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 3条微不足道的推文并不需要接近“努力”。其他增长策略也是如此。我每周可能只花5-10小时在这上面。
- en: A digital product takes some time (well, not anymore really, because [AI can
    expedite that process if you have clarity on what you want to build](https://youtu.be/QsyhyMpvPR4))
    say, 1-2 hours a day for a month depending on the type of product.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 数字产品需要一些时间（实际上，现在不再是这样，因为如果你对要构建的内容有清晰的了解，[AI可以加速这个过程](https://youtu.be/QsyhyMpvPR4)），比如说，一个月每天1-2小时，具体取决于产品的类型。
- en: And a landing page takes a few hours to build (again, [you can use AI for this
    now](https://youtu.be/z9dtU-xUX04)), but once they’re built, you’re literally
    just focused on generating traffic with content.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 建立一个着陆页需要几个小时（再次强调，[现在你可以使用AI来做这件事](https://youtu.be/z9dtU-xUX04)），但一旦建成，你实际上只需要专注于通过内容生成流量。
- en: If I wanted to stay as one person and make a reasonable income, I don’t see
    why I *couldn’t* work 5-10 hours a week with content alone and a digital product
    that’s already built.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想保持一个人并赚取合理的收入，我不明白为什么我**不能**只靠内容和已经建立起来的数字产品每周工作5-10小时。
- en: Of course, I’m not wired that way (there comes a time where I feel the urge
    to *hunt*) so I filled my time with other projects and endeavors as I acquired
    the resources to do so.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，我并不是那种类型的人（总会有想**狩猎**的时候），所以我用其他项目和努力来填充我的时间，当我获得资源去做这些事情时。
- en: Lastly, this path isn’t reserved for anyone.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，这条道路不是为任何人保留的。
- en: Any interest or skill of yours can be turned into a digital product and content
    that others with similar interests or skills resonate with.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 你的任何兴趣或技能都可以转化为数字产品和其他有相似兴趣或技能的人产生共鸣的内容。
- en: If you want to work less, this is one of the best beginner routes to take to
    build that initial leverage.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要工作更少，这是建立初始杠杆的最佳入门路线之一。
- en: Once you have enough cash, capital, skill, and distribution in the form of an
    audience, it’s really up to you what you build next.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你有了足够的现金、资本、技能和以观众形式存在的分销，接下来你建什么就完全取决于你了。
- en: 3) A New Perspective On AI
  id: totrans-193
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 对AI的新视角
- en: The more I use AI, the more I realize that I’m not outsourcing my thinking,
    I’m *enhancing it.*
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 我越使用AI，就越意识到我并不是在外包我的思考，而是在**增强**它。
- en: When I try to have AI perform a task (in a more accurate way than yelling at
    it to “write me an entire book” in a one sentence prompt) I am exposed to clear
    and intelligent thinking. I am reading more. I am understanding more. I am revealing
    my own blindspots more because much of my instructions aren’t clear the first
    time around.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 当我尝试让AI执行一项任务（比在一句提示中大喊“给我写一本书”更准确）时，我会接触到清晰和明智的思考。我读得更多了。我理解得更多了。我更多地揭示了自身的盲点，因为我的许多指令一开始并不清晰。
- en: I find it so powerful that instead of creating multiple newsletters on it, [I
    put all of my AI use cases into this free mini course](https://stan.store/thedankoe/p/mini-course-how-i-systemize-my-life-with-ai)
    (the only caveat is that I use my software to teach it).
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 我发现它非常强大，以至于我不再创建多个关于它的通讯稿，[我将所有我的AI应用案例都放入了这个免费的迷你课程中](https://stan.store/thedankoe/p/mini-course-how-i-systemize-my-life-with-ai)（唯一的缺点是，我使用我的软件来教授它）。
- en: When I write a newsletter or read a book, I often look to AI to help me learn.
    I’ll ask for clarification on things like “permissionless leverage,” which I had
    a solid grasp on, but AI helped deepen that understanding. It’s like reading a
    book that’s tailored to you in real time.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 当我写通讯稿或读书时，我经常求助于AI来帮助我学习。我会要求对“无需许可的杠杆”等事物进行澄清，我对这些事物有很好的把握，但AI帮助我加深了这种理解。这就像在实时阅读一本为你量身定做的书。
- en: '*AI is closing the gap between learning in doing.*'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: '*AI正在缩小学习和实践之间的差距*。'
- en: Since AI can accomplish tasks according to your instructions, like writing landing
    page copywriting or creating a viral marketing plan, you are both *completing*
    the task and *learning* how to better complete it the next time.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 由于AI可以按照你的指令完成任务，比如撰写着陆页文案或创建病毒式营销计划，你既是在**完成**任务，又是在**学习**如何更好地在下一次完成任务。
- en: A “prompt” that you refine and reuse is a reflection of your understanding of
    the task. It is a externalized clone of a creative process that no longer needs
    to sit in your head or in a static SOP document.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 一个经过精炼和重复使用的“提示”反映了你对任务的了解。它是创造性过程的具象化克隆，不再需要停留在你的头脑中或静态的操作规程文档中。
- en: 'Here’s how I like to use AI right now:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我现在喜欢使用AI的方式：
- en: I choose a task to complete, like making a better YouTube introduction
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我选择一个任务来完成，比如制作一个更好的YouTube介绍。
- en: I find a YouTube video, PDF, or reference text and have AI break it down into
    replicable steps
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我找到一个YouTube视频、PDF或参考文本，并让AI将其分解成可复制的步骤。
- en: I turn that into a meta prompt I can reuse over and over again
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我将其转化为可以反复使用的元提示。
- en: I refine the prompt as I use it
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我在使用过程中不断精炼提示。
- en: As another example, I saw a brand get 11 million views on their product launch
    on Twitter the other day. I want those results, so I pasted all of their marketing
    material into AI following the steps above.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 作为另一个例子，我前几天看到某个品牌在Twitter上对其产品发布获得了1100万次观看。我想要这样的结果，所以我按照上述步骤将他们的所有营销材料粘贴到AI中。
- en: Now, I have a “paradigm shift marketing” strategy for our next big [Kortex](https://kortex.co)
    release.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我有一个针对我们下一个重大[Kortex](https://kortex.co)发布的“范式转变营销”策略。
- en: 'Another thing you could do, if you’ve read the book Flow by Mihaly Csikszentmihalyi,
    is download the PDF to the book, feed it to AI, and create multiple things like:'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你读过米哈伊·契克森米哈伊的《心流》一书，你可以做另一件事，就是下载这本书的PDF，将其输入AI，创建多个类似的东西，比如：
- en: A morning exercise to get you into the flow state for the task you plan to work
    on
  id: totrans-209
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个早晨的锻炼，让你进入你计划要工作的任务的状态
- en: A clarity advisor that helps you choose skills and careers that bring more meaning
    into your life
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个清晰度顾问，帮助你选择能给你的生活带来更多意义的技能和职业
- en: A personal therapist to turn boredom into interest and anxiety into action
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个将无聊转化为兴趣、将焦虑转化为行动的个人治疗师
- en: Books, videos, courses, and other sources of information are no longer *static.*
    That information can *do things* for you now. If you fed it my [2 hour writer](https://2hourwriter.com)
    course in a smart way, you could have it write posts, threads, and newsletters
    a lot better than you would be able to on your own.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 书籍、视频、课程和其他信息来源不再*静态*。现在这些信息可以为你*做事情*。如果你以明智的方式将我的[2小时作家](https://2hourwriter.com)课程输入AI，它就能写出比你自己能写出的帖子、线程和新闻通讯要好得多的内容。
- en: Is that not insane? Do you not see how powerful that can be? AI is so much more
    than a place to pop boring questions into. I guess you could say the quality of
    your AI responses matches your level of vision and agency.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是疯狂吗？你难道没有看到这有多么强大吗？AI远不止是一个可以随意提出无聊问题的地方。我想你可以这么说，你AI回复的质量与你视野和能动性的水平相匹配。
- en: The point of AI now, in my opinion, is to spend *more* time on what you enjoy
    doing (your unique strengths) and build AI workflows and prompts that allow you
    to do the rest at a surprisingly high quality if you take the time to build once,
    use forever.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，AI现在的目的是花更多的时间在你喜欢做的事情上（你的独特优势），并构建AI工作流程和提示，这样如果你花时间构建一次，就可以永远使用，以惊人的高质量完成剩余的工作。
- en: I personally don’t care for marketing, so I plan to focus on my writing as I
    always have.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 我个人并不喜欢营销，所以我计划专注于我的写作，就像我以前一直做的那样。
- en: AI can help enhance my writing, and it can write persuasive copy for landing
    pages, emails, promotional posts, and more.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以帮助提升我的写作，它可以为着陆页、电子邮件、推广帖子等撰写有说服力的文案。
- en: This is only the tip of the iceberg of what AI can allow you to do.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是AI能让你做到的事情的冰山一角。
- en: 4) Types Of Leisure
  id: totrans-218
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 休闲类型
- en: We all understand what work is.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都明白什么是工作。
- en: 'But when it comes to leisure, I often get the question:'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 但当谈到休闲时，我经常遇到这样的问题：
- en: “If you don’t work that long, what do you do for the rest of your day? Do you
    just sit around?”
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: “如果你不工作这么长时间，你一天中剩下的时间做什么？你只是坐着吗？”
- en: My friend, I feel very bad for you if you think the only thing you can do in
    life is work.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 朋友，如果你认为你生活中唯一能做的就是工作，我感到非常难过。
- en: For the sake of definition, **leisure is a mindset.**
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 为了定义，**休闲是一种心态**。
- en: You can write for fun, leisure, or rest, but once it’s tied to an obligatory
    outcome for the purpose of work, that’s when it ceases to be leisure.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以为了乐趣、休闲或休息而写作，但一旦它与工作目的的强制性结果挂钩，它就不再是休闲了。
- en: You can go on a long walk with the external goal of 3,000 steps, but that goal
    is often a way to free the mind from thinking about the walk. You gain more mental
    energy that can be allocated to solving subconscious problems.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以带着走3000步的外部目标去长时间散步，但这个目标通常是一种让大脑从思考散步中解脱出来的方式。你将获得更多的精神能量，可以用来解决潜意识中的问题。
- en: You can read a book, but once you start analyzing and trying to *get something
    from it*, it becomes work.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以读书，但一旦你开始分析和试图从中“得到一些东西”，它就变成了工作。
- en: You can go to the gym, go on a run, do yoga, take a nap, cook, clean, socialize
    with friends, and your mind may oscillate between a type of work and rest, but
    the purpose of rest should be a lack of focus on work.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以去健身房，去跑步，做瑜伽，小憩一会儿，做饭，打扫卫生，与朋友社交，你的思绪可能会在工作和休息之间摇摆，但休息的目的应该是减少对工作的专注。
- en: The beautiful thing about this, for creative work, is that these are often *direct
    fuel* for that work.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 对于创造性工作来说，美妙之处在于这些往往是该工作的*直接燃料*。
- en: Since creative work is largely dependent on the quality of ideas you have, and
    most of your best ideas don’t come while you’re working, leisure is how you begin
    to create a life where work, rest, and play blur into one.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 由于创造性工作在很大程度上取决于你拥有的想法的质量，而你大多数最好的想法并不是在你工作时产生的，所以休闲是你开始创造一个工作、休息和玩耍模糊融合在一起的生活的方式。
- en: If long walks are considered a part of my work, which in many cases they are,
    then I work all day, every day. Even my sleep is a direct contributor to work.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 如果长时间散步被认为是我的工作的一部分，这在很多情况下都是如此，那么我就会整天工作，每天如此。甚至我的睡眠也是直接贡献于工作。
- en: 5) A Responsible Life Has Deadlines Built In
  id: totrans-231
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5) 负责任的生活中内置了截止日期
- en: It’s common advice for successful people to tell you to work as hard as you
    possibly can in your 20s.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 成功人士通常会告诉你，在20多岁时尽可能努力工作，这是一种常见的建议。
- en: To give up most of your life.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 放弃你大部分的生活。
- en: But I think most people misinterpret what that means.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 但我认为大多数人误解了这意味着什么。
- en: What they’re trying to say is take bigger risks.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 他们试图说的是承担更大的风险。
- en: Bet on yourself and create your own path.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 信任自己，创造你自己的道路。
- en: That doesn’t require 16 hours of work, because you can work hard on more things
    than your business.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 这不需要16小时的工作时间，因为你可以比你的业务更努力地工作在更多的事情上。
- en: You have a mind, a body, and spirit that also need developing.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 你的心智、身体和精神也需要发展。
- en: You have relationships that probably shouldn’t go neglected, because that can
    absolutely load rogue thoughts into your mind that dampens the quality of your
    work.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 你有一些关系可能不应该被忽视，因为那绝对会把你心中的那些会损害你工作质量的叛逆思想加载进去。
- en: With that, a responsible life has deadlines built in.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，负责任的生活中已经内置了截止日期。
- en: If you truly value your intellect, physique, connection to others and reality,
    and a standard of health that envelopes them all, you cannot sustain 16 hours
    of work. It’s impossible. Those who work 16 hours day in day out expose that they
    do not value those things, and I would question your trust in their methods.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你真正重视你的智力、体魄、与他人的联系和现实，以及一个涵盖所有这些的健康标准，你就无法持续16小时的工作。这是不可能的。那些每天工作16小时的人暴露出他们不重视这些事情，我会质疑你对他们的方法的信任。
- en: If I value my health, and understand that my gym performance will decrease later
    in the day if I am tired, then I need a mid day deadline for my work so my performance
    in the gym is closer to optimal.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我重视我的健康，并理解如果我感到疲倦，我的健身房表现会在一天晚些时候下降，那么我需要为我的工作设定一个中午的截止日期，以便我的健身房表现更接近最佳。
- en: If I value my relationship with my significant other, and the fact that good
    things demand *consistent* watering, I cannot end the night in a stressed state
    where all I can think about is work.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我重视我与伴侣的关系，以及好事需要*持续*浇灌的事实，我就不能在晚上处于压力状态，那时我唯一能想到的就是工作。
- en: This is not a downgrade but an upgrade for the quality of your work.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是对工作质量的降级，而是升级。
- en: Why?
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: Because deadlines narrow your mind and create a sense of urgency which act as
    rocket fuel for deep work.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 因为截止日期会缩小你的思维，并创造一种紧迫感，这可以作为深度工作的火箭燃料。
- en: When you strive to be multidimensionally jacked, and hold that as your standard,
    you will feel that sense of urgency in the morning to complete the tasks you can
    during that time with the creative fuel you acquired during your previous day’s
    rest.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 当你努力成为多维度强大的人，并将此作为你的标准时，你会在早上感到一种紧迫感，想要利用你前一天休息期间获得的创造性燃料来完成这段时间内可以完成的任务。
- en: Tack on Parkinson’s Law, that work expands to fill the time allotted for completion,
    and you’ll be shocked with how much you can get done in such little time.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 结合帕金森定律，即工作会扩展以填满分配给完成的时间，你将会对在如此短的时间内能完成多少工作感到震惊。
- en: The results may not show up immediately, of course.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，结果可能不会立即显现。
- en: It takes a few weeks to adapt to that new lifestyle.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 适应新的生活方式需要几周的时间。
- en: But if you stick it out, I promise that your life will improve more than you
    could have imagined.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果你坚持下去，我保证你的生活将比你想象的改善更多。
- en: – Dan
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹
