- en: Life Is A Video Game (You Can’t Escape The Matrix)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/life-is-a-video-game-you-cant-escape-the-matrix/](https://thedankoe.com/letters/life-is-a-video-game-you-cant-escape-the-matrix/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I remember waking up at 3 a.m. so I could play games before I had to go to high
    school.
  prefs: []
  type: TYPE_NORMAL
- en: From Halo 3 and Call Of Duty to World Of Warcraft and League Of Legends.
  prefs: []
  type: TYPE_NORMAL
- en: I was addicted, to say the least.
  prefs: []
  type: TYPE_NORMAL
- en: Increasing my level in video games took priority over increasing my level in
    reality.
  prefs: []
  type: TYPE_NORMAL
- en: But I wouldn’t change a thing.
  prefs: []
  type: TYPE_NORMAL
- en: How else would I be able to write this newsletter?
  prefs: []
  type: TYPE_NORMAL
- en: Psychology, metaphysics, self-help, and modern business all point to life being
    a video game.
  prefs: []
  type: TYPE_NORMAL
- en: In a metaphorical sense, of course. I’m not saying that the underlying fabric
    of the Universe is a giant computer that aliens built before humans existed… but
    it’s quite similar as we will learn (and I’m not completely closed off to that
    idea. Who *actually* knows?).
  prefs: []
  type: TYPE_NORMAL
- en: 'I want to break down each perspective so you can:'
  prefs: []
  type: TYPE_NORMAL
- en: Make progress toward your goals (and fall in love with the process)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understand how to tap into optimal states of consciousness
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Stop taking life so seriously and create your ideal future
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reinvent yourself or the character that plays the game of life
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Leverage your character to pursue your life’s work and earn a meaningful income
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A game is a structured flow of information.
  prefs: []
  type: TYPE_NORMAL
- en: Life is in-formation, and our quality of life depends on our ability to process
    it.
  prefs: []
  type: TYPE_NORMAL
- en: When we push too far beyond our edge, too far into the unknown, there is too
    much stimulus. We can’t metabolize the experience. Information builds up and creates
    anxiety and overwhelm.
  prefs: []
  type: TYPE_NORMAL
- en: When we shy too far away from our edge, too far into the known, there is little
    novelty that makes life worth living. Our mind is not stimulated. Information
    is easy to digest and we become bored.
  prefs: []
  type: TYPE_NORMAL
- en: The conscious mind can process 50 bits of information per second.
  prefs: []
  type: TYPE_NORMAL
- en: The unconscious mind can manage 11 million bits of information per second.
  prefs: []
  type: TYPE_NORMAL
- en: As we become more efficient at processing information, or playing the game,
    our unconscious grows in power, and we free up conscious attention to invest in
    what we deem meaningful.
  prefs: []
  type: TYPE_NORMAL
- en: In video games, you have a map. The light of awareness reveals where you have
    been and what you have experienced. This knowledge allows you to make better decisions
    in the future.
  prefs: []
  type: TYPE_NORMAL
- en: The darkness of the map is the unknown, and you wouldn’t launch yourself too
    far from the known.
  prefs: []
  type: TYPE_NORMAL
- en: You must slowly puncture the unknown, let the experience normalize through skill
    acquisition and emotional management, and press forward.
  prefs: []
  type: TYPE_NORMAL
- en: The purpose of life is to raise your consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: This is only possible by living at your edge. Embracing the story of life. The
    highs, lows, successes, and catastrophic failures. The most miserable place you
    can be is in the middle.
  prefs: []
  type: TYPE_NORMAL
- en: 'Psychology: How Video Games Make You Addicted To Progress'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The optimal state of inner experience is one in which there is order in consciousness.
    This happens when psychic energy—or attention—is invested in realistic goals,
    and when skills match the opportunities for action. The pursuit of a goal brings
    order in awareness because a person must concentrate attention on the task at
    hand and momentarily forget everything else. – Mihaly Csikszentmihalyi
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Flow.
  prefs: []
  type: TYPE_NORMAL
- en: You’ve heard about it before.
  prefs: []
  type: TYPE_NORMAL
- en: The optimal state of consciousness that all of the ancients, mystics, and psychologists
    point to with their teachings.
  prefs: []
  type: TYPE_NORMAL
- en: Where you are at one with doing or being.
  prefs: []
  type: TYPE_NORMAL
- en: You lose self-consciousness and move through life without a worry in the world.
  prefs: []
  type: TYPE_NORMAL
- en: It seems that the key to the good life is investing attention in what we deem
    meaningful. But what you deem meaningful is found by investing attention in what
    you eliminate as meaningless. This process of trial and error, high and low, focus
    and distraction is the natural balance that keeps life enjoyable.
  prefs: []
  type: TYPE_NORMAL
- en: But if you get stuck in a low, chaos ensues.
  prefs: []
  type: TYPE_NORMAL
- en: Psychic Entropy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Ordered consciousness is what creates degrees of the flow state.
  prefs: []
  type: TYPE_NORMAL
- en: To “order consciousness” is to focus your attention on something external or
    internal. A task, situation, or conversation in the external. Or a thought, emotion,
    or feeling in the internal.
  prefs: []
  type: TYPE_NORMAL
- en: Both have their benefits and change the way our brain operates.
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-923">![](../Images/97a9cc4cdb34a7d6be521e68b2ee64c0.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: When we lose focus to a distraction, we increase the chances of entropy – the
    decline into chaos. Psychic entropy is when the mind tends toward a disordered
    state of consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: When we give life, or attention, to a negative thought it multiplies.
  prefs: []
  type: TYPE_NORMAL
- en: A social media post about how eggs will cause cancer brings thoughts about your
    grandma’s health, your diet choices, if you’ve fulfilled your potential, how food
    affects your skin quality, what you are going to eat next, and more.
  prefs: []
  type: TYPE_NORMAL
- en: We can reverse entropy when we use our human ability to zoom out, gain perspective,
    and refocus our attention on doing or being in a direction that brings growth.
  prefs: []
  type: TYPE_NORMAL
- en: Video Games Order Consciousness
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are a lot of practical lessons we can learn by deconstructing how video
    games order consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: Those lessons can be used to enhance our learning, skill acquisition, and self-confidence.
  prefs: []
  type: TYPE_NORMAL
- en: 'When you first start playing a game:'
  prefs: []
  type: TYPE_NORMAL
- en: You have no idea what you’re doing.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You go through a tutorial so you aren’t exposed to everything at once.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You practice at level one until that level becomes boring.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You are introduced to more skills, traits, and abilities to practice with.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You progressively overload the challenges you take on until you decide to stop
    playing the game.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: There must be a skill challenge match if we want to maintain order in consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-889">![](../Images/54b7637af6648b2b93f2bd5248e3d364.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: If the challenge is too high for your skill, you get anxious.
  prefs: []
  type: TYPE_NORMAL
- en: If the challenge is too low for your skill, you get bored.
  prefs: []
  type: TYPE_NORMAL
- en: So, you start by learning the rules of the game.
  prefs: []
  type: TYPE_NORMAL
- en: A “game” represents any situation in life. Especially the ones where you lack
    confidence and can’t see yourself winning.
  prefs: []
  type: TYPE_NORMAL
- en: Then, you practice the mechanics of the game.
  prefs: []
  type: TYPE_NORMAL
- en: There are a series of steps, or quests, that provide education and practice
    in unison.
  prefs: []
  type: TYPE_NORMAL
- en: Remember this when you approach anything new (or get bored with your current
    endeavor).
  prefs: []
  type: TYPE_NORMAL
- en: If you are faced with a large challenge, you need to learn and practice at your
    level.
  prefs: []
  type: TYPE_NORMAL
- en: If you are bored with your current level of challenge, you need to expose yourself
    to the education of the next level, practice the new skills, and enjoy the neurochemical
    cocktail with a double of dopamine as you transcend to the next phase of your
    life.
  prefs: []
  type: TYPE_NORMAL
- en: Self-Awareness As A Compass
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Balancing skill with challenge is the metagame you must practice.
  prefs: []
  type: TYPE_NORMAL
- en: When you get bored, your mind will start to drift and think “I could be doing
    something better with my time.”
  prefs: []
  type: TYPE_NORMAL
- en: You tilt into self-centeredness. Refocus your attention on adding a challenge
    to the situation.
  prefs: []
  type: TYPE_NORMAL
- en: Even if you work a job with the same repetitive tasks, you can make it more
    enjoyable by *creating* a more challenging game.
  prefs: []
  type: TYPE_NORMAL
- en: You may see daily walks as boring, but what if you add some rules? Try making
    it without stepping on a crack in the sidewalk.
  prefs: []
  type: TYPE_NORMAL
- en: When you get anxious, your mind grasps at negative aspects of yourself.
  prefs: []
  type: TYPE_NORMAL
- en: “I’m not good enough.”
  prefs: []
  type: TYPE_NORMAL
- en: “What will people think of this blemish on my face.”
  prefs: []
  type: TYPE_NORMAL
- en: “I could never make that much money with my business.”
  prefs: []
  type: TYPE_NORMAL
- en: You tilt into self-consciousness and let negative thoughts multiply.
  prefs: []
  type: TYPE_NORMAL
- en: Again, pause and zoom out. Refocus.
  prefs: []
  type: TYPE_NORMAL
- en: This will take intentional practice to make a habit.
  prefs: []
  type: TYPE_NORMAL
- en: 'Metaphysics: We Live In A Survival Based Simulation'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you play a video game on your computer, such as “Doom” or “Uncharted”, you
    see compelling 3D worlds with 3D objects. Yet the information is entirely 2D,
    limited by the number of pixels on the screen. The same is true when you look
    away from your computer to the world around you. It too has pixels, and all the
    information is 2D. – Donald Hoffman
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Donald Hoffman is a cognitive psychologist and author, notably of the book *The
    Case Against Reality**.*
  prefs: []
  type: TYPE_NORMAL
- en: In the book (and various [podcasts](https://youtu.be/dd6CQCbk2ro) I’ve binge
    listened) he argues that human perception is a “user interface” that hides the
    true nature of reality, so that we can survive.
  prefs: []
  type: TYPE_NORMAL
- en: Natural selection doesn’t favor organisms that see reality as it is.
  prefs: []
  type: TYPE_NORMAL
- en: This aligns with psychedelic enthusiasts like Terrance McKenna who say that
    language *is* virtual reality. Perception is a closed system and psychedelics
    allow you to see beyond our fitness-based perceptions.
  prefs: []
  type: TYPE_NORMAL
- en: Spacetime As A Compression Algorithm
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Hoffman argues that space and time are a visualization tool.
  prefs: []
  type: TYPE_NORMAL
- en: They are the operating system of our user interface.
  prefs: []
  type: TYPE_NORMAL
- en: Think of a desktop screen.
  prefs: []
  type: TYPE_NORMAL
- en: Subjective reality is like a screen that is programmed to help us see what we
    need to see in order to do what we need to do.
  prefs: []
  type: TYPE_NORMAL
- en: Every “material” object is like an icon on the screen.
  prefs: []
  type: TYPE_NORMAL
- en: It is pretty. It has properties and qualities. We should “take them seriously,
    but not literally.”
  prefs: []
  type: TYPE_NORMAL
- en: You can click around on the screen and perform specific tasks that result in
    a desired outcome.
  prefs: []
  type: TYPE_NORMAL
- en: These desired outcomes are “fitness payoffs.” These payoffs are like points
    in a video game. Through trial and error, we learn how to win, and how to evolve.
    By winning, your offspring go to the next level.
  prefs: []
  type: TYPE_NORMAL
- en: In real-world simulations, organisms that saw the truth went extinct. Like an
    ant trying to mate with a glass bottle, because its perception was distorted.
  prefs: []
  type: TYPE_NORMAL
- en: Removing The Interface
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Everyone thinks they are seeing the truth but it’s more like everyone is in
    the same video game like Grand Theft Auto.
  prefs: []
  type: TYPE_NORMAL
- en: When we look at our computers and consoles that run these programs, they are
    packaged up nicely.
  prefs: []
  type: TYPE_NORMAL
- en: We don’t *see* the wires and diodes that transfer information to create what
    is on the screen. And even if we did see it, it wouldn’t serve our survival. We
    wouldn’t understand it and wouldn’t be able to *do* anything with the jumble of
    electronics.
  prefs: []
  type: TYPE_NORMAL
- en: Even further, we can’t see or comprehend the code that is running the game.
  prefs: []
  type: TYPE_NORMAL
- en: We can draw connections between this theory and non-duality, infinite consciousness,
    and mentalism / idealism.
  prefs: []
  type: TYPE_NORMAL
- en: If you were to remove your interface (with a tool like psychedelics or advanced
    meditation) you would eventually go insane. Your ego would dissolve and you would
    “live” and operate in a completely different fashion. Your physical body or avatar
    would stop playing the game – and you would probably die very soon.
  prefs: []
  type: TYPE_NORMAL
- en: There is a reason people aren’t on psychedelics 24 hours a day, 7 days a week.
  prefs: []
  type: TYPE_NORMAL
- en: We aren’t at that phase of evolution just yet, but who knows what the future
    holds.
  prefs: []
  type: TYPE_NORMAL
- en: For now, it is wise to ground yourself in the metaphysical and act in the “physical”
    from a place of higher perspective.
  prefs: []
  type: TYPE_NORMAL
- en: The Mind As A Vessel
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The human mind is a vessel where reality flows through it.
  prefs: []
  type: TYPE_NORMAL
- en: Think of it like a projector.
  prefs: []
  type: TYPE_NORMAL
- en: The light that the projector emits is consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: The film is the mind.
  prefs: []
  type: TYPE_NORMAL
- en: The light shines on the film and displays a spectrum of experiences that humans
    have. It frames our perception.
  prefs: []
  type: TYPE_NORMAL
- en: 'Self-Help: How To Reinvent Yourself (Your Character)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1405">![](../Images/0b45017d26ffd2bcbc736d3b42393f02.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Life is a game.
  prefs: []
  type: TYPE_NORMAL
- en: Stack gold.
  prefs: []
  type: TYPE_NORMAL
- en: Acquire skills.
  prefs: []
  type: TYPE_NORMAL
- en: Gain experience.
  prefs: []
  type: TYPE_NORMAL
- en: Unlock new levels.
  prefs: []
  type: TYPE_NORMAL
- en: And eventually, get to a point where you have the resources to do whatever you
    want.
  prefs: []
  type: TYPE_NORMAL
- en: When your operating frame is focused on the process that will actualize your
    future, your focus is impenetrable, and you live in a world of your own design.
  prefs: []
  type: TYPE_NORMAL
- en: The difference between a video game and real life is virtual risk and real risk.
  prefs: []
  type: TYPE_NORMAL
- en: The sameness between a video game and real life is learning, practice, and becoming
    a dopamine junkie.
  prefs: []
  type: TYPE_NORMAL
- en: Video games have tutorials, professions, quests, and an unknown to explore.
  prefs: []
  type: TYPE_NORMAL
- en: Real life has childhood, career paths, responsibilities, and potentials that
    you are unaware of – but once discovered – can drastically change how you think,
    act, and work.
  prefs: []
  type: TYPE_NORMAL
- en: Once you understand the significance of the patterns illustrated between games
    and life, you can begin to correct your behavior in a manner that is conducive
    to your ideal future.
  prefs: []
  type: TYPE_NORMAL
- en: Increasing The Complexity Of Self
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: No problem can be solved from the same consciousness that created it. – Albert
    Einstein
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: To raise your consciousness you must increase your level of mind.
  prefs: []
  type: TYPE_NORMAL
- en: To raise your level of mind you must open your perspective.
  prefs: []
  type: TYPE_NORMAL
- en: To open your perspective you must identify problems, take on the challenge,
    acquire the skill, and receive the knowledge necessary to transcend your previous
    identity.
  prefs: []
  type: TYPE_NORMAL
- en: With each level of mind, your identity must change.
  prefs: []
  type: TYPE_NORMAL
- en: The knowledge, skill, belief, and experience you order in your mind as “self”
    determines the opportunities available to you.
  prefs: []
  type: TYPE_NORMAL
- en: At level 1, you have access to opportunities slightly above your level. The
    opportunities you can register in your awareness exist on a spectrum.
  prefs: []
  type: TYPE_NORMAL
- en: As you level up, you have access to all opportunities beneath you, and those
    slightly above you still.
  prefs: []
  type: TYPE_NORMAL
- en: It is a massive disservice to your life to distract yourself and never see what
    you are capable of.
  prefs: []
  type: TYPE_NORMAL
- en: Creating The Games You Play
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If games have a desired outcome (winning), a path to get there (progression),
    and habitual actions to take (priorities) then we can create games out of any
    situation in life.
  prefs: []
  type: TYPE_NORMAL
- en: This Universal principle of purpose, process, and priority is the underlying
    framework of human behavior.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t have a goal, you don’t have vision.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t have a path, you don’t have clarity.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t have a task, you don’t have focus.
  prefs: []
  type: TYPE_NORMAL
- en: Most of your problems in life can be solved by understanding and applying this
    principle.
  prefs: []
  type: TYPE_NORMAL
- en: To create a game, you need a hierarchy of goals that frames your attention.
  prefs: []
  type: TYPE_NORMAL
- en: 'As an example:'
  prefs: []
  type: TYPE_NORMAL
- en: A 10 year goal (that allows your vision to blossom)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Yearly goals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Monthly goals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Weekly goals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All of which are to be loosely held in the back of your mind. They should not
    be your master, but your guide.
  prefs: []
  type: TYPE_NORMAL
- en: Only from there can you align your education and daily lever-moving actions
    with them.
  prefs: []
  type: TYPE_NORMAL
- en: The progress you make increases meaningful dopamine in the brain, it feels incredible.
  prefs: []
  type: TYPE_NORMAL
- en: And if you can anchor your attention to this hierarchy of goals, most of your
    worries disappear.
  prefs: []
  type: TYPE_NORMAL
- en: You’re overly focused on the negative parts of your life because you haven’t
    built positive responsibilities that demand your focus.
  prefs: []
  type: TYPE_NORMAL
- en: The more attention you invest in your goals, the stronger their gravity becomes.
  prefs: []
  type: TYPE_NORMAL
- en: All Change Is Behavior Change
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To change your life you must change your actions.
  prefs: []
  type: TYPE_NORMAL
- en: To change your actions (in the right direction) you need a plan. There isn’t
    any other way. And if you don’t create your own, someone will create a plan for
    you.
  prefs: []
  type: TYPE_NORMAL
- en: To stick to the plan you need a system.
  prefs: []
  type: TYPE_NORMAL
- en: Systems are organized behavior changes.
  prefs: []
  type: TYPE_NORMAL
- en: To create a system you must attack your goals, embrace the nature of trial and
    error, double down on your successes, and persist until “success” becomes the
    default state in each area of your life. Health, wealth, relationships, and happiness.
  prefs: []
  type: TYPE_NORMAL
- en: 'Business: The New Digital Society'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Eventually, everybody will be in the creator economy. – Naval Ravikant
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The world is shifting from corporate dominance to individual power thanks to
    technology.
  prefs: []
  type: TYPE_NORMAL
- en: This is reflected in nature through the principle of division and unity.
  prefs: []
  type: TYPE_NORMAL
- en: Everything divides and reunites, like ocean to cloud to rain, and the creator
    economy is the perfect example of this phenomenon.
  prefs: []
  type: TYPE_NORMAL
- en: In the Renaissance Era, the economy favored the multi-dimensional. The polymaths.
    The artists who refused to limit their abilities. The thinkers, creators, designers,
    builders, and individuals who took responsibility for their mental, physical,
    and spiritual development.
  prefs: []
  type: TYPE_NORMAL
- en: In the Digital Renaissance we are going through, history is repeating itself.
  prefs: []
  type: TYPE_NORMAL
- en: We can learn anything, do anything, and become anything thanks to the vast and
    rapid information expanding at our fingertips.
  prefs: []
  type: TYPE_NORMAL
- en: The expansion of the mental plane of existence (through the internet) has created
    a field of infinite potential.
  prefs: []
  type: TYPE_NORMAL
- en: Communication is no longer local.
  prefs: []
  type: TYPE_NORMAL
- en: Commerce is no longer local.
  prefs: []
  type: TYPE_NORMAL
- en: Friendships are no longer local.
  prefs: []
  type: TYPE_NORMAL
- en: Society is no longer fragmented.
  prefs: []
  type: TYPE_NORMAL
- en: The creator economy is virtual reality.
  prefs: []
  type: TYPE_NORMAL
- en: Your personal brand is your character.
  prefs: []
  type: TYPE_NORMAL
- en: Online business is the game and progression.
  prefs: []
  type: TYPE_NORMAL
- en: Networking is how you build a powerful tribe.
  prefs: []
  type: TYPE_NORMAL
- en: Purposeful products are how you make a living.
  prefs: []
  type: TYPE_NORMAL
- en: The intrinsic philosophy you cultivate throughout your journey is the marketing
    firepower that attracts those like you.
  prefs: []
  type: TYPE_NORMAL
- en: You are a part of the creator economy right now.
  prefs: []
  type: TYPE_NORMAL
- en: The question is – which side are you on?
  prefs: []
  type: TYPE_NORMAL
- en: Are you engaging in the mutual benefit of value exchange? Product for money?
    Or are you draining your attention, overloading your mind, and wasting your creative
    ability by not producing anything in return for the value you are taking?
  prefs: []
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-820">![](../Images/75ba6da0a10209fe7aa743204651f0e0.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Brand – You Are The Most Profitable Niche
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Your brand is your online avatar.
  prefs: []
  type: TYPE_NORMAL
- en: Strong brands have vision. A big irrational goal that they are leading their
    followers toward. The gravity of that goal – and the energy displayed along with
    it – is what attracts people to you.
  prefs: []
  type: TYPE_NORMAL
- en: Your brand is your highest version.
  prefs: []
  type: TYPE_NORMAL
- en: It is who you are becoming.
  prefs: []
  type: TYPE_NORMAL
- en: It is your guiding light toward a better future that allows you to align your
    actions with goals through a tangible vessel that others can benefit massively.
  prefs: []
  type: TYPE_NORMAL
- en: Your job is to display who you are in your profile picture, images, bio, and
    website.
  prefs: []
  type: TYPE_NORMAL
- en: Your style shapes your designs.
  prefs: []
  type: TYPE_NORMAL
- en: Your vision shapes your bio.
  prefs: []
  type: TYPE_NORMAL
- en: Your goals shape the content, product, and marketing you create under your brand
    as a hierarchy.
  prefs: []
  type: TYPE_NORMAL
- en: Content – Lessons Learned Completing Quests
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Your content is the ideas, thoughts, beliefs, opinions, lessons, and advice
    you acquire as you pursue your challenging hierarchy of goals.
  prefs: []
  type: TYPE_NORMAL
- en: Do you see the power in this?
  prefs: []
  type: TYPE_NORMAL
- en: Writing has changed my life.
  prefs: []
  type: TYPE_NORMAL
- en: It has brought self-awareness, self-understanding, and the ability to organize
    my thoughts – or order consciousness – to make life more enjoyable. This is a
    driving factor why I created [2 Hour Writer](https://2hourwriter.com) – to teach
    you what is arguably the most valuable (and profitable) skill that will never
    go out of style – even with the emergence of AI.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need fancy content frameworks and templates.
  prefs: []
  type: TYPE_NORMAL
- en: They help, of course, but the best content results from energy transfer.
  prefs: []
  type: TYPE_NORMAL
- en: As you acquire knowledge and skills through education and practice – share the
    ideas that spark excitement and resonance in you.
  prefs: []
  type: TYPE_NORMAL
- en: Do not filter yourself.
  prefs: []
  type: TYPE_NORMAL
- en: This is what attracts a like-minded readership that sets you up for monetizing
    your life’s work.
  prefs: []
  type: TYPE_NORMAL
- en: Product – Systems For Behavior Change
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The best products spark positive behavior change.
  prefs: []
  type: TYPE_NORMAL
- en: Behavior change is reflected in the eternal markets of business – health, wealth,
    and relationships.
  prefs: []
  type: TYPE_NORMAL
- en: Write to yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Build for yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Sell to yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Create a product or service out of the knowledge and skills you’ve acquired
    on your journey.
  prefs: []
  type: TYPE_NORMAL
- en: Something that you would have wanted, or something that would truly benefit
    your life right now.
  prefs: []
  type: TYPE_NORMAL
- en: There are individuals in the creator economy that sell courses, clothing, supplements,
    blue light glasses, planners, coaching in multiple areas of life, kitchenware,
    and really anything that shapes the lifestyle of people like you.
  prefs: []
  type: TYPE_NORMAL
- en: People will object and tell you to “start a real business.”
  prefs: []
  type: TYPE_NORMAL
- en: What they mean is, “I am fabricating problems that don’t benefit humanity. Don’t
    start a business around real problems that will raise the collective consciousness.”
  prefs: []
  type: TYPE_NORMAL
- en: People who have a poor relationship with money think that sales and business
    are evil.
  prefs: []
  type: TYPE_NORMAL
- en: They don’t understand that the exchange of goods is a part of human nature.
  prefs: []
  type: TYPE_NORMAL
- en: Money is neutral until put in the hands of good or evil.
  prefs: []
  type: TYPE_NORMAL
- en: Consistent progression toward your conscious goals ensures that you lean toward
    good.
  prefs: []
  type: TYPE_NORMAL
- en: When you solve your own problems and sell the solution, you can guarantee that
    those problems exist on the cosmic scale, and rest well knowing that you are making
    a difference.
  prefs: []
  type: TYPE_NORMAL
- en: Marketing – Cultivating An Intrinsic Philosophy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It is wise to study marketing and sales.
  prefs: []
  type: TYPE_NORMAL
- en: They are evergreen skills backed with psychological and metaphysical principles
    of value exchange.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, there are tainted aspects of those skills. People who lack moral
    development will use them for evil, but like money, these skills are neutral until
    wielded.
  prefs: []
  type: TYPE_NORMAL
- en: Invest in education around these, but do so to note patterns and identify principles
    that shape your articulation and persuasive ability.
  prefs: []
  type: TYPE_NORMAL
- en: From there, use the intrinsic philosophy you cultivate as you play the game.
  prefs: []
  type: TYPE_NORMAL
- en: Goals imply problems and problems imply struggle.
  prefs: []
  type: TYPE_NORMAL
- en: You will struggle on this journey, but the lessons learned are what increase
    your level of mind.
  prefs: []
  type: TYPE_NORMAL
- en: The *reasons* or *“whys”* behind your pursuit is how you promote the product
    you create to the people you’ve attracted.
  prefs: []
  type: TYPE_NORMAL
- en: Why did you start training in the gym or fixing your health?
  prefs: []
  type: TYPE_NORMAL
- en: Why did you improve your relationships and social life?
  prefs: []
  type: TYPE_NORMAL
- en: Why did you increase your wealth through business, skill, and professional pursuits?
  prefs: []
  type: TYPE_NORMAL
- en: The “why” is what creates emotion in your readers.
  prefs: []
  type: TYPE_NORMAL
- en: From there, you can learn tactics to test on your business to increase revenue,
    but don’t lose your soul in the process.
  prefs: []
  type: TYPE_NORMAL
- en: That’s it for this one my friends.
  prefs: []
  type: TYPE_NORMAL
- en: Life is a game.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan Koe
  prefs: []
  type: TYPE_NORMAL
