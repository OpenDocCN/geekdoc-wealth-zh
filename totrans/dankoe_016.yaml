  type: TYPE_NORMAL
- en: 'Another important thing with this:'
  prefs: []
  type: TYPE_NORMAL
- en: When your 4 hours of work are up, stop working.
  prefs: []
  type: TYPE_NORMAL
- en: Dead stop. No excuses.
  prefs: []
  type: TYPE_NORMAL
- en: Break the habit of *needing* to work past your assigned hours.
  prefs: []
  type: TYPE_NORMAL
- en: If you can’t because your business will explode, that’s a problem.
  prefs: []
  type: TYPE_NORMAL
- en: Fix it (with a system).
  prefs: []
  type: TYPE_NORMAL
- en: '**10) Make Your System More Efficient**'
  prefs: []
  type: TYPE_NORMAL
- en: If you have so much work that you can’t work 4 hours or less (given that you
    want to), again, that’s a problem.
  prefs: []
  type: TYPE_NORMAL
- en: Problems require creativity and systemization.
  prefs: []
  type: TYPE_NORMAL
- en: AKA, another reason to prioritize rest so the Default Mode Network in your brain
    can help solve the problem.
  prefs: []
  type: TYPE_NORMAL
- en: You will have to implement solutions to test and refine with time.
  prefs: []
  type: TYPE_NORMAL
- en: 'If I can’t work less than 4 hours because of client work, then I have to:'
  prefs: []
  type: TYPE_NORMAL
- en: Build a larger audience
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create a product that doesn’t require my time
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Promote and improve that product until sustainable
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Take on less clients with my new free time
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You would be correct in assuming that this isn’t instant. Be patient.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, last question:'
  prefs: []
  type: TYPE_NORMAL
- en: What is preventing you from working 4 hours a day and what can you do to change
    that?
  prefs: []
  type: TYPE_NORMAL
- en: You will have to work harder before you can work smarter.
  prefs: []
  type: TYPE_NORMAL
- en: You will have to work smarter before you don’t consider it work at all.
  prefs: []
  type: TYPE_NORMAL
