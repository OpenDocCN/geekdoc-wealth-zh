- en: The 4-Hour Workday (Focused Work Changed My Life)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 《4小时工作日》（专注工作改变了我的人生）
- en: 原文：[https://thedankoe.com/letters/the-4-hour-workday-focused-work-changed-my-life/](https://thedankoe.com/letters/the-4-hour-workday-focused-work-changed-my-life/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/the-4-hour-workday-focused-work-changed-my-life/](https://thedankoe.com/letters/the-4-hour-workday-focused-work-changed-my-life/)
- en: 'Quick update:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 快速更新：
- en: Digital Economics is now open to the public. You can enroll at any time (rather
    than waiting until February).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 数字经济学现在对公众开放。你可以随时报名（而不是等到2月份）。
- en: You can also download Digital Economics 101 for free. It is a mini-course to
    get you up to speed on the new economy.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以免费下载《数字经济学101》。这是一门迷你课程，帮助你了解新经济。
- en: If you’re interested in productizing yourself with the *systems* I’ve refined
    with 3 years of creator experience, consider enrolling.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对我的3年创作者经验中提炼出的*系统*感兴趣，并想通过这些系统产品化自己，请考虑报名。
- en: '[Check out Digital Economics.](https://digitaleconomics.school)'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '[查看数字经济学。](https://digitaleconomics.school)'
- en: '* * *'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: When I was in college trying to become a fitness YouTuber (of all things), I
    remember seeing the title of a popular book by Tim Ferris.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 当我在大学里试图成为一名健身YouTube博主（真是奇怪）时，我记得看到Tim Ferris的一本流行书的标题。
- en: '*The 4-Hour Work Week.*'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 《4小时工作周》。
- en: I’ve never read the book, but for some odd reason I interpreted it as “4-Hour
    Work Day.”
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我从未读过这本书，但出于某种奇怪的原因，我把它理解为“4小时工作日”。
- en: The idea of a 4 hour work day stuck in my mind throughout college and my plethora
    of business failures.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 4小时工作日的想法在我大学期间以及我众多的商业失败中一直萦绕在我心头。
- en: Subconsciously, I was making decisions to limit how much I work to 4 hours each
    day.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 潜意识中，我做出了决定，限制每天工作4小时。
- en: '*This alone changed the direction of my life.*'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '*这本身就改变了我的人生方向*。'
- en: Why?
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: '**First**, I perceived anything more than 4 hours of work as a problem.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**首先**，我认为超过4小时的工作都是一个问题。'
- en: Few people do this. Most people label this lifestyle as “impossible” and then
    it becomes so.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 很少有人这样做。大多数人将这种生活方式标签为“不可能”，然后它就真的变得不可能了。
- en: This has forced my mind to work on a creative solution for that problem to eliminate,
    systemize, or automate low-leverage work.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这迫使我动脑筋寻找一个创造性的解决方案来消除、系统化或自动化低效工作。
- en: In business, that means outsourcing, productizing, or building more leverage
    – so that’s what I did.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业中，这意味着外包、产品化或建立更多杠杆——所以我就是这么做的。
- en: I grew on social media, pivoted out of time-sucking client work, and productized
    my offers so they could sell in my sleep (with the leverage I built).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我在社交媒体上成长，摆脱了耗时客户工作，并将我的产品化，以便它们可以在我睡觉时销售（利用我建立的优势）。
- en: As of right now, I’m working overtime.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我正在加班。
- en: 4-hour workdays are a blessing, but sometimes you need a 16-hour laser-focused
    forgot-to-eat marathon to see what you are capable of building.
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 4小时工作日是一种祝福，但有时你需要16小时的全神贯注、忘了吃饭的马拉松来看到你能建造什么。
- en: ''
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [November 30, 2021](https://twitter.com/thedankoe/status/1465612082112602112?ref_src=twsrc%5Etfw)
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — DAN KOE (@thedankoe) [2021年11月30日](https://twitter.com/thedankoe/status/1465612082112602112?ref_src=twsrc%5Etfw)
- en: For the past 3 years, I’ve worked less than 4 hours a day for 90% of my days.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的3年里，我90%的日子里每天工作不到4小时。
- en: Recently, I’ve hit new monthly highs in revenue that are unsustainable with
    4 hours of work.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，我的收入达到了新的月度高点，但用4小时工作是无法维持的。
- en: And, I’ve started building a new software that requires more of my attention.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我开始构建一个需要更多我注意力的新软件。
- en: But, you can bet your a** that I am constantly thinking of creative ways to
    reduce my time spent (while maintaining the value of what I’ve built).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 但，你可以确信，我一直在思考如何以创造性的方式减少我花费的时间（同时保持我所建立的价值）。
- en: '**Second**, as we do with these letters, it goes a lot deeper than just “4
    hours of focused work.”'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**其次**，正如我们在这些信件中所做的那样，它远不止“4小时的专注工作”。'
- en: So, let’s dive into some philosophy, evolutionary psychology, and why they matter
    for the future of work – specifically in the new digital economy.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，让我们深入探讨一些哲学、进化心理学，以及它们为什么对工作的未来——特别是在新的数字经济中——很重要。
- en: Then, toward the end of the letter, we’ll get into my 10 commandments of focused
    work.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，在信件的结尾，我们将探讨我关于专注工作的10条戒律。
- en: '**Preface**: If you don’t have 4 hours to dedicate to your business, you can
    apply these principles to your current job… or on the 1-2 hours that you have
    to work on your business.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**前言**：如果你没有4小时可以投入到你的生意中，你可以将这些原则应用到你的当前工作中……或者在你用于经营生意的1-2小时里。'
- en: Taking Advantage Of What Makes Us Different
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 利用我们的不同之处
- en: There are many things that make humans stand out from other beings.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多事情使人类区别于其他生物。
- en: Like how we survive on a conceptual level, while animals survive on a physical
    level. (You wouldn’t see a snake feel threatened because it disagrees with your
    opinions.)
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 就像我们在概念层面上生存，而动物在物理层面上生存一样。（你不会看到一条蛇因为不同意你的观点而感到威胁。）
- en: But, one difference that has always fascinated me is a human’s *depth of focus*.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，一直让我着迷的一个区别是人类的*关注深度*。
- en: In psychology, there is the Task Positive Network and the Default Mode Network.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在心理学中，有任务积极网络和默认模式网络。
- en: The Task Positive Network “kicks on” when our focus narrows in on a string of
    external goals or tasks.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们的关注点缩小到一系列外部目标或任务时，任务积极网络就会“启动”。
- en: This is helpful with productivity.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这对生产力很有帮助。
- en: The Default Mode Network kicks on when our focus shifts inward and expands to
    allow more thoughts & ideas to register in our awareness.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们的关注点转向内部并扩展以允许更多的想法和观点在我们的意识中注册时，默认模式网络就会启动。
- en: This is helpful with creativity.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这对创造力很有帮助。
- en: (Remember these for later).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: （记住这些，稍后使用）。
- en: But, there are negative aspects of this mysterious spectrum of focus.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，这个神秘的焦点光谱也有负面方面。
- en: <picture fetchpriority="high" decoding="async" class="wp-image-923">![](../Images/97a9cc4cdb34a7d6be521e68b2ee64c0.png)</picture>
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-923">![](../Images/97a9cc4cdb34a7d6be521e68b2ee64c0.png)</picture>
- en: Like when you narrow in on a problem and it expands to fill your attention.
    This closes your mind off to potential creative solutions. A small problem soon
    becomes your entire world.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 就像当你专注于一个问题，它就会扩展并占据你的注意力。这会关闭你的思维，对潜在的创造性解决方案视而不见。一个小问题很快就会成为你的整个世界。
- en: Or, when you open your focus and hold multiple ideas in your awareness.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，当你打开你的关注焦点并保持多个想法在你的意识中。
- en: If those ideas are not connected, ordered, or just don’t make sense – chaos
    ensues. You can get sucked into a downward spiral of overwhelm, anxiety, and difficulty
    seeing beyond the bubble of problems you’ve created.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这些想法没有连接、排序，或者根本说不通——就会陷入混乱。你可能会陷入一个令人沮丧、焦虑的恶性循环，难以超越你创造的困境。
- en: This phenomenon doesn’t only happen in the mind.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这种现象不仅仅发生在心里。
- en: Our body follows.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的身体会随之而动。
- en: You can narrow, contract, or deepen the focus of your physical being by touching
    something with the tip of your finger.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过用指尖触摸某物来缩小、收缩或加深你身体的关注焦点。
- en: You can open, expand, or widen the focus of your physical being by opening your
    body in a confident manner.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过自信地打开身体来打开、扩展或拓宽你身体的关注焦点。
- en: Like how we can throw a dart and hit a bullseye, we can take action toward a
    vision for our future.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 就像我们扔飞镖能击中靶心一样，我们也可以朝着我们未来的愿景采取行动。
- en: That is if the skill, clarity, and awareness are there to make that vision a
    reality. Because it can quickly overwhelm you and lead to procrastination.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是如果技能、清晰度和意识都在那里，使那个愿景成为现实。因为那可能会让你感到不知所措，导致拖延。
- en: 'And one last example:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 最后再举一个例子：
- en: We can narrow or widen our perspective or worldview.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以缩小或拓宽我们的视角或世界观。
- en: We can be “open-minded” or “closed-minded” depending on how we approach a situation.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以根据我们如何处理一个情况而“开放心态”或“封闭心态”。
- en: You can open your mind to the idea of working 4 hours or less – or you can give
    up, make excuses, and blame everyone but yourself until you do.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以打开你的思想，接受工作4小时或更少的时间——或者你可以放弃，找借口，把责任推给所有人，除了你自己，直到你这样做。
- en: Survival Systems
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生存系统
- en: Evolution is forced on us by the fact that systems fall apart with time unless
    they become more efficient. We can’t stop and remain in the same place; even to
    remain still we must advance. – Mihaly Csikszentmihalyi
  id: totrans-58
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 由于系统随着时间的推移会崩溃，除非它们变得更加高效，进化被迫作用于我们。我们不能停下来停留在原地；即使为了保持静止，我们也必须前进。——米哈伊·契克森米哈伊
- en: As humans, we have a natural desire for more.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 作为人类，我们有一种对更多事物的自然渴望。
- en: We *need* to survive at all costs.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我们*必须*不惜一切代价生存下去。
- en: Evolution reflects this.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 进化反映了这一点。
- en: With our unique minds, we build systems to aid in survival.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 用我们独特的思维，我们建立系统来帮助生存。
- en: It takes a lot of energy to carry water and plow fields, so we built systems
    to use that energy with efficiency.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 挑水、耕田需要大量的能量，所以我们建立了系统来高效地利用这些能量。
- en: (Irrigation systems, tractors, and every other system that had to be built in
    order for those things to even be possible).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: （灌溉系统、拖拉机以及为了使这些事情成为可能而必须建立的每一个系统）。
- en: Systems layer on top of each other to make our mind more efficient. We get better
    at ‘investing’ our mental energy.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 系统层层叠加，使我们的思维更加高效。我们越来越擅长“投资”我们的精神能量。
- en: 'Let me introduce you to the supreme law of the universe:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 让我向你介绍宇宙的最高法则：
- en: '*Entropy.*'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '*熵*。'
- en: Some call it “nature’s tax.”
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人称之为“自然的税”。
- en: In brief, entropy is the measure of disorder in a system.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，熵是系统中无序的度量。
- en: With time, the energy that would maintain a system disperses, and the system
    dissolves into chaos (unless quality energy is added).
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，维持系统所需的能量会分散，系统就会陷入混乱（除非添加高质量的能量）。
- en: Like a library compared to your home book collection.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 就像图书馆与你的家庭藏书相比。
- en: The library is systemized.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 图书馆是有系统的。
- en: It uses energy efficiently to alphabetize, organize, and make the books on the
    shelf easy for readers to find.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 它使用能量高效地按字母顺序排列、组织，并使书架上的书籍更容易让读者找到。
- en: Libraries have workers that maintain this system, and one day, we may create
    a robot that can do the job better (while saving energy like time, money, and
    the mental bandwidth of library managers).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图书馆有工作人员维护这个系统，有一天，我们可能会创造一个能更好地完成这项工作（同时节省像时间、金钱和图书馆管理员的脑力带宽）的机器人。
- en: Your home book collection may be organized, but what happens when you take one
    book out? Do you put it back after you read it? What happens when you take out
    2 more?
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 你的家庭藏书可能是有组织的，但当你拿出一本书时会发生什么？你阅读后是否会放回原处？当你再拿出两本书时会发生什么？
- en: Do you have a system that eases the mental cost of keeping your personal library
    maintained?
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 你有没有一个系统来减轻维护个人图书馆的心理成本？
- en: Have you used that system enough to spot problems, solve them, and engraine
    the system into the neural networks of your brain – to the point of it becoming
    habit?
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否已经足够使用这个系统来发现问题、解决问题，并将系统刻入你大脑的神经网络——以至于它变成了习惯？
- en: Books may end up in separate rooms of your house and your bookshelf becomes
    unorganized.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 书可能会放在你房子的不同房间里，你的书架变得无序。
- en: Without a good system that orders consciousness, an ever-growing energy requirement
    to order the bookshelf will lead to anxiety, overwhelm and stress.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 没有一个好的系统来有序地组织意识，不断增长的能量需求来整理书架将导致焦虑、压倒性和压力。
- en: '**What does this have to do with focused work and productivity?**'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**这与专注工作和生产力有什么关系？**'
- en: If you don’t systemize your path to success, you won’t achieve it.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有系统化你的成功之路，你就不会实现它。
- en: Your productivity system is one out of many that you will make more efficient
    with time.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 你的生产力系统是你将在时间推移中使其更加高效的许多系统之一。
- en: Productivity is about getting from point A to point B as fast as possible.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 生产力是关于尽可能快地从A点到B点。
- en: Like your home bookshelf, if you don’t have a system for your work, you will
    get overwhelmed with the tasks in front of you.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 就像你的家庭书架一样，如果你没有为你的工作建立系统，你将无法应对面前的任务。
- en: When you are overwhelmed, if you don’t have a system for your mind, the intensity
    of that overwhelm will increase.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 当你感到压倒时，如果你没有为你的心灵建立系统，那种压倒的强度会增加。
- en: Now that entropy has its grasp on your productivity, it may lead to a week-long
    downward spiral of emotions and laziness… nobody wants that.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 现在熵已经控制了你的生产力，可能会导致一周的情绪和懒惰的下降螺旋……没有人希望这样。
- en: The 4-Hour Philosophy – My 10 Commandments For Focused Work
  id: totrans-87
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 四小时哲学——我专注工作的十诫
- en: <picture decoding="async" class="wp-image-924">![](../Images/480b5405931b8d03c8190f9a9ce54b13.png)</picture>
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-924">![](../Images/480b5405931b8d03c8190f9a9ce54b13.png)</picture>
- en: Humans survive on a conceptual level.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 人类在概念层面上生存。
- en: We have the desire to build systems to survive the mental constructions that
    we create – the “self” being one of them.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有建立系统的欲望，以生存于我们创造的心理结构中——自我就是其中之一。
- en: We attach to a concept, make it a part of our identity, and open up room for
    suffering.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对某个概念产生依恋，将其作为我们身份的一部分，从而为痛苦腾出空间。
- en: This is not always a bad thing.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不总是件坏事。
- en: You have a self.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 你有一个自我。
- en: You have an ego.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 你有自我。
- en: And unless you plan to become a monk (who still go through similar worldly struggles,
    from what I’ve read… we’ll never have access to their state of mind so who knows.
    Better to just experiment for ourselves) then we must use this knowledge to our
    advantage.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 除非你打算成为一名僧侣（根据我所读，他们仍然会经历类似的世俗斗争……我们永远无法了解他们的心态，所以谁知道呢。最好是亲自实验）否则我们必须利用这些知识来为我们自己谋利。
- en: 'If you were to loosely identify with a positive version of success and the
    projects that will take you there:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你与成功和将你引向成功的项目的一个积极版本松散地认同：
- en: '*You will have the desire to build systems to aid in the survival of those
    concepts.*'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '*你将会有建立系统来帮助这些概念存活的愿望*。'
- en: If you create a vision for your future, you will subconsciously work to survive
    that vision.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你为你的未来创造一个愿景，你将无意识地努力维持那个愿景。
- en: If you create a project that will help you actualize that vision, you will work
    to survive that project.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你创造一个能帮助你实现那个愿景的项目，你将努力维持那个项目。
- en: If you create an identity that makes the automatic decision to build that project
    for 4 hours every day, you will work to survive that identity.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你创造一个每天自动决定为4小时的项目，你将努力维持那个身份。
- en: Why? Because if you don’t survive the things that make you, you… then you cease
    to exist.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？因为如果你不能生存于让你成为你的那些事物，那么你就不再存在。
- en: The concept of “death,” which we can’t experience, fills us with fear.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: “死亡”的概念，我们无法体验，让我们充满了恐惧。
- en: We can either transmute that fear or be a slave to it.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以选择转化那种恐惧，或者成为它的奴隶。
- en: So, let’s take a meta approach to productivity.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们采取一种元方法来提高生产力。
- en: With the steps below, you can begin to craft a productivity system that allows
    you to actualize your vision for success.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 通过以下步骤，你可以开始构建一个生产力系统，让你能够实现成功的愿景。
- en: '**1) Why 4 Hours?**'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 为什么是4小时？**'
- en: Conceptual systems need mental energy to thrive.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 概念性系统需要精神能量来繁荣。
- en: From personal experience, scientific studies, and anecdotes from my time spent
    in the productivity space… 3-4 hours is the sweet spot for mental energy expenditure.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 从个人经验、科学研究和我在生产力领域度过的时光中的轶事来看… 3-4小时是精神能量消耗的最佳点。
- en: Some studies show that 5-6 hours is the top end.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 一些研究表明，5-6小时是上限。
- en: But, 3-4 hours of hyper-focus creates a deadline for your work, which narrows
    attention further and helps curb distraction.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，3-4小时的超级专注为你的工作创造了一个截止日期，这进一步缩小了注意力范围，有助于减少分心。
- en: Start with 4 hours as your goal.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 以4小时为目标开始。
- en: '**2) Vision & Identity**'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 愿景与身份**'
- en: This is for another letter, and we’ve discussed it previously, but you need
    an MVV.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 这是另一封信，我们之前已经讨论过，但你需要一个MVV。
- en: A Minimum Viable Vision.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 一个最小可行愿景。
- en: You won’t have absolute clarity on it the first time around.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 你第一次可能不会对此有绝对的清晰度。
- en: 'Write out the following (be as specific and detailed as you can):'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 写出以下内容（尽可能具体和详细）：
- en: Who you want to be
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想成为谁
- en: What you want to do for work
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想为工作做什么
- en: Where you want to live
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想住在哪里
- en: What your ideal day looks like
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你理想的一天是什么样的
- en: How you will contribute to humanity
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你将如何为人类做出贡献
- en: What people you will surround yourself with (network and social circle)
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你将围绕自己的人（网络和社交圈）
- en: Feel free to keep the stream of consciousness going by answering more questions
    that come to mind.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 随意回答更多出现在脑海中的问题，以保持意识流的连贯性。
- en: When your actions begin to habitually align with your vision, your character
    development will follow.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的行动开始习惯性地与你的愿景一致时，你的性格发展也会随之而来。
- en: '**3) Outline 3 Lever Moving Tasks**'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 概述3个杠杆移动任务**'
- en: This is situation-dependent.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 这取决于具体情况。
- en: You will have to gain a big-picture understanding of the tasks necessary to
    reach the next stage of your business development.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 你将不得不获得达到你商业发展下一阶段所需的任务的宏观理解。
- en: As a creator, read this [One Person Business Roadmap](https://thedankoe.com/the-one-person-business-roadmap-99-of-creators-make-this-mistake/)
    to know what to execute on as a beginner, intermediate, or advanced
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一位创作者，阅读这篇[个人企业路线图](https://thedankoe.com/the-one-person-business-roadmap-99-of-creators-make-this-mistake/)，了解作为初学者、中级或高级创作者应该执行什么。
- en: 'Here are my lever movers for my current stage in business:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我当前商业阶段的一些杠杆移动任务：
- en: '**Writing content** – I write my newsletter every single morning. This writing
    gets broken down and repurposed for all platforms (this is in [2 Hour Writer](https://2hourwriter.com),
    an *efficient system* for content creation).'
  id: totrans-130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**撰写内容** – 我每天早上都会写我的通讯。这篇写作被分解并用于所有平台（这是在[2小时作家](https://2hourwriter.com)，一个内容创作的*高效系统*)。'
- en: '**Generating traffic** – Growth isn’t automatic when you start on a certain
    platform. Since I have my smallest audience on LinkedIn, I network with people
    to get eyes on my content.'
  id: totrans-131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**生成流量** – 当你在某个平台上开始时，增长并不是自动发生的。由于我在领英上的受众最小，所以我与人们建立联系，让他们看到我的内容。'
- en: '**Promoting my products** – With consistent traffic on all platforms, I promote
    my offers, directly or indirectly, once a day (*all* 3 of these are systemized
    in [Digital Economics](https://digitaleconomics.school)).'
  id: totrans-132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**推广我的产品** – 在所有平台上保持一致的流量，我每天直接或间接地推广我的优惠（所有这些都在[数字经济学](https://digitaleconomics.school)中系统化）。'
- en: This ensures that my business continues to grow and sustainable sales are coming
    in.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 这确保了我的业务持续增长，可持续的销售也在不断进行。
- en: <picture decoding="async" class="wp-image-925">![](../Images/4785a0d8e92dc4858dac3459cb984323.png)</picture>
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-925">![](../Images/4785a0d8e92dc4858dac3459cb984323.png)</picture>
- en: It also helps to attach a specific number to these, like “writing 1000 words.”
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 这也有助于将这些具体化，比如“写1000个字”。
- en: I write 1 section of my newsletter every morning. I know exactly who to message
    and DM. I promote my products once a day.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 我每天早上都会写时事通讯的一个部分。我知道该给谁发消息和私信。我每天推广我的产品一次。
- en: Those are quantifiable to my brain.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 这些对我来说是可量化的。
- en: '*Dependent on your vision, business model, and experience level which quantifiable
    tasks will yield the most progress?*'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '*根据你的愿景、商业模式和经验水平，哪些可量化的任务会产生最大的进步？*'
- en: '**4) Gain Clarity On Those Tasks**'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 对那些任务有清晰的了解**'
- en: A few times a week, you will have to exchange lever-moving tasks for clarity-generating
    tasks.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 每周几次，你将不得不交换推动任务以产生清晰的任务。
- en: Every Sunday and Monday, I exchange my newsletter writing for outlining and
    research.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 每个星期日和星期一，我会用写时事通讯的时间来规划和研究。
- en: In the afternoons I will consume content revolving around my interests. This
    is for idea generation.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 在下午，我会消费与我兴趣相关的内容。这是为了产生想法。
- en: In the evenings (sometimes mornings) I outline exactly what I’m going to get
    done. When I wake up, my mind is set on that plan.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在晚上（有时是早上）我会详细规划我要完成的事情。当我醒来时，我的心思已经放在那个计划上了。
- en: I talk about this balance in my [Fill Empty Use framework](https://thedankoe.com/the-3-part-daily-routine-for-maximum-productivity/).
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 我在我的[Fill Empty Use框架](https://thedankoe.com/the-3-part-daily-routine-for-maximum-productivity/)中讨论了这种平衡。
- en: With a systemized supply of good ideas, there is no friction when I outline
    and write my newsletters.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在有系统化好想法的供应下，我在规划和撰写时事通讯时没有摩擦。
- en: '*How can you use 1-2 hours of your week to set yourself up for seamless work
    sessions?*'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '*你如何利用一周中的1-2小时来为自己设定无缝的工作会议？*'
- en: '**5) Timeblocks & Breaks**'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: '**5) 时间块和休息**'
- en: At the start, before it becomes habit, put these time blocks on your calendar
    and set reminders.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始之前，在它成为习惯之前，将这些时间块放在你的日历上并设置提醒。
- en: This is something you can test.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你可以测试的事情。
- en: I’ve found that 90 minutes of focus with 15-30 minute breaks are the sweet spot
    for me.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 我发现，对我来说，90分钟专注和15-30分钟休息是最佳平衡点。
- en: I’ll work on my priority tasks for that time, go on a short walk, and get straight
    back into work for another 90 minutes.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 我会在这段时间内处理我的优先任务，进行短暂的散步，然后直接回到工作，再专注90分钟。
- en: You can schedule these 90-minute blocks throughout the day if you want.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你愿意，你可以将这些90分钟的时间块安排在一天中的任何时间。
- en: But, be mindful that distractions are more abundant when the world is awake.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，要注意，当世界醒来时，分心的事情会更多。
- en: '**6) Manipulate Deadlines**'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: '**6) 操作截止日期**'
- en: Deadlines narrow your attention.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 截止日期会缩小你的注意力。
- en: Narrow attention (on an outcome that you have clarity to achieve) increases
    the potential for flow.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 窄化注意力（对你有清晰度可以达成的结果）增加了进入心流状态的可能性。
- en: The flow state is like nitrous for focused work.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 心流状态就像是专注工作的氮气。
- en: 4 hours of total work and 90-minute time blocks may do the job, but you can
    constrain your attention more.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 总共4小时的工作时间和90分钟的时间块可能足够，但你还可以进一步约束你的注意力。
- en: Put something tangible on the line and let everyone know.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 放一些具体的东西在赌注上，并让每个人都知道。
- en: If I set a date for a product launch and accept presale payments, there is no
    way in hell that everything related to the product launch is *not* getting done.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我设定了一个产品发布日期并接受预售付款，那么与产品发布相关的所有事情都没有完成的可能。
- en: Get creative. *How can you add a real deadline to your work?* This can be long
    or short-term.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 发挥创意。*你如何给你的工作添加一个真正的截止日期？* 这可以是长期或短期的。
- en: '**7) Manipulate Environment**'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: '**7) 操作环境**'
- en: Your environment must be conducive to your work sessions.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 你的环境必须有利于你的工作会议。
- en: 'Before work, I have exact steps for what I do after I wake up:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 在工作之前，我有明确的步骤来描述我醒来后要做什么：
- en: Brush my teeth and shower
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 刷牙和洗澡
- en: Walk and feed the dog
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 散步和喂狗
- en: Make coffee and write
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 做咖啡和写作
- en: This helps reduce decision fatigue and distraction potential before the work
    session.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 这有助于在工作会议之前减少决策疲劳和分心的可能性。
- en: 'While working, my environment is curated to narrow my focus on the task at
    hand:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 在工作期间，我的环境被精心设计，以缩小我对当前任务的注意力：
- en: A clear workspace
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清晰的工作空间
- en: Nice headphones and lyric-less music (like dubstep, complexity also narrows
    focus by “tuning out” and not listening to the song)
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 好耳机和无歌词的音乐（如dubstep，复杂性通过“调出”和不听歌曲来缩小注意力）
- en: No physical items – like my phone or reminders – that will break my attention.
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有物理物品——比如我的手机或提醒——会打断我的注意力。
- en: '*How can you manipulate your environment to conserve mental energy for your
    priority tasks?*'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: '*你如何操纵你的环境来保存精神能量，以便优先处理任务？*'
- en: '**8) Wake Up Before The Distractions**'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: '**8) 在干扰之前醒来**'
- en: Distractions are the start of entropy in your productivity system.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 干扰是你生产力系统中熵的起点。
- en: The more distractions you give the chance to penetrate your awareness, the more
    likely you will be to go into a downward spiral of procrastination.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 你给干扰的机会越多，你陷入拖延症恶性循环的可能性就越大。
- en: 'This is my most effective productivity advice:'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我最有效的生产力建议：
- en: '*Wake up 1-2 hours earlier.*'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: '*提前1-2小时起床。*'
- en: Even if you’re a night owl (leverage your sleepy open focused brain for creative
    work, rather than technical work).
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 即使你是夜猫子（利用你困倦的开放性思维进行创造性工作，而不是技术性工作）。
- en: Even though you’re *allowed* to ignore messages and not touch your phone…
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管你“允许”忽略消息和不碰手机…
- en: Nobody will be texting, calling, or trying to get a hold of you. That alone
    will hedge against getting sucked into social apps. Because your phone won’t require
    your attention.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人会发短信、打电话或试图联系你。仅此一项就能防止你陷入社交应用。
- en: '**9)** **Prioritize** **Rest**'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: '**9)** **优先考虑** **休息**'
- en: Quality work doesn’t exist without quality rest. Simple as that.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 没有高质量的休息，就没有高质量的工作。就这么简单。
- en: 'But as we’ve discussed in my balanced daily routine letter:'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 但正如我们在我的平衡日常安排信中讨论的那样：
- en: “Rest” does not mean Netflix, wine, and bubble baths.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: “休息”并不意味着Netflix、红酒和泡泡浴。
- en: 'Rest = regenerating mental energy through non-work related activities like:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 休息=通过非工作相关的活动（如）恢复精神能量：
- en: Going to the gym
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 去健身房
- en: Going on a walk
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 去散步
- en: Socializing with friends
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与朋友社交
- en: Reading a good book
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 阅读一本好书
- en: Trying a new hobby
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试一项新爱好
- en: Anything that doesn’t support mediocrity or a cheap dopamine habit.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 任何不支持平庸或廉价多巴胺习惯的东西。
- en: 'Another important thing with this:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 与此相关的重要事情：
- en: When your 4 hours of work are up, stop working.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的4小时工作时间结束时，停止工作。
- en: Dead stop. No excuses.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 停止。没有借口。
- en: Break the habit of *needing* to work past your assigned hours.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 打破“需要”加班的习惯。
- en: If you can’t because your business will explode, that’s a problem.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不能这样做，因为你的业务会爆炸，那将是一个问题。
- en: Fix it (with a system).
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 修复它（用系统）。
- en: '**10) Make Your System More Efficient**'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: '**10) 使你的系统更高效**'
- en: If you have so much work that you can’t work 4 hours or less (given that you
    want to), again, that’s a problem.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有很多工作，以至于你不能工作4小时或更少（假设你想要），那么这又是一个问题。
- en: Problems require creativity and systemization.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 问题需要创造性和系统化。
- en: AKA, another reason to prioritize rest so the Default Mode Network in your brain
    can help solve the problem.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 即，优先考虑休息的另一个原因，以便你的大脑中的默认模式网络可以帮助解决问题。
- en: You will have to implement solutions to test and refine with time.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 你将不得不实施解决方案，并随着时间的推移进行测试和改进。
- en: 'If I can’t work less than 4 hours because of client work, then I have to:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 如果因为客户工作我无法工作少于4小时，那么我必须：
- en: Build a larger audience
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立更大的受众群体
- en: Create a product that doesn’t require my time
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个不需要我时间的产品
- en: Promote and improve that product until sustainable
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 促销和改进该产品，直到可持续。
- en: Take on less clients with my new free time
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用我新获得的空闲时间承担更少的客户
- en: You would be correct in assuming that this isn’t instant. Be patient.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 你会正确地假设这不是立即发生的。要有耐心。
- en: 'So, last question:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，最后一个问题：
- en: What is preventing you from working 4 hours a day and what can you do to change
    that?
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 什么阻止你每天工作4小时，你能做什么来改变这一点？
- en: You will have to work harder before you can work smarter.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 在你能够更聪明地工作之前，你必须更努力地工作。
- en: You will have to work smarter before you don’t consider it work at all.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 在你不认为它是工作之前，你必须更聪明地工作。
- en: '**11) Bonus: Leverage Digital Tools**'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: '**11) 奖励：利用数字工具**'
- en: Once you have the money to invest in automation software, you should.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你有足够的钱投资自动化软件，你应该这么做。
- en: Bulk schedule content with software like TweetHunter.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 使用像TweetHunter这样的软件批量安排内容。
- en: Write out, organize, and refine your systems in Notion.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 在Notion中列出、组织和完善你的系统。
- en: When problems come up, like emails taking too long to go through, seek specific
    knowledge on how to free that time up – don’t just accept your fate.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 当出现问题时，例如电子邮件处理时间过长，寻找如何释放这部分时间的具体知识——不要只是接受你的命运。
- en: '*Instead of distracting yourself, **learn** in alignment with your top-of-mind
    problems.*'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: '*与其分心，不如与您心中最紧迫的问题保持一致**学习**。*'
- en: '**My Challenge For You**'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: '**对我的挑战**'
- en: Write down these commandments and execute.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 记下这些诫命并执行。
- en: Don’t just read this without applying the information.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 不要只是阅读而不应用这些信息。
- en: 4-hour workdays are more than possible for those that craft their lifestyle
    in that direction.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些将生活方式调整为这个方向的人来说，4小时工作日是完全可能的。
- en: The internet is an incredible tool if you use it to its full potential (rather
    than it using you).
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您充分利用互联网（而不是让它利用您），它是一个不可思议的工具。
- en: – Dan Koe
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹·科
- en: '**What Happened This Week**'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: '**本周发生了什么**'
