    you can access Digital Economics 101 for free*. If you’re interested in productizing
    yourself with the *systems* I’ve refined with 3 years of creator experience, consider
    enrolling.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 数字经济学现在对公众开放。您可以随时报名。*此外，您可以免费访问数字经济学101课程*。如果您对使用我3年创作者经验中精炼的*系统*来产品化自己感兴趣，请考虑报名。
- en: '[Check out Digital Economics.](https://digitaleconomics.school)'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: '[查看数字经济学](https://digitaleconomics.school)'
- en: If you only want the content systems (like how I create my newsletters > threads
    > and repurposable tweets), enroll in 2 Hour Writer. This is a part of Digital
    Economics (and there is a discount code inside to subtract the price of the course
    if you want to upgrade).
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您只想获得内容系统（例如，我如何创建我的通讯 > 线程 > 和可重用的推文），请报名参加2小时作家课程。这是数字经济学的一部分（并且如果您想升级课程，里面有一个折扣码可以减去课程费用）。
- en: '[Enroll in 2 Hour Writer.](https://2hourwriter.com)'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: '[报名参加2小时作家课程](https://2hourwriter.com)'
- en: In Modern Mastery, I posted a training on how to “niche down multiple interests”
    for those that feel like they have to stick to one thing. Joey also posted “how
    to take back control of your nervous system” for optimal performance.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 在现代精通中，我为那些感觉必须坚持一件事的人发布了一篇关于如何“缩小多个兴趣点”的培训。乔伊也发布了一篇关于“如何恢复对您神经系统控制”的文章，以实现最佳表现。
- en: '[Readers can join for $5.](https://modernmastery.co/letter)'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: '[读者可以以5美元的价格加入](https://modernmastery.co/letter)'
