- en: The 4-Hour Workday (Focused Work Changed My Life)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-4-hour-workday-focused-work-changed-my-life/](https://thedankoe.com/letters/the-4-hour-workday-focused-work-changed-my-life/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Quick update:'
  prefs: []
  type: TYPE_NORMAL
- en: Digital Economics is now open to the public. You can enroll at any time (rather
    than waiting until February).
  prefs: []
  type: TYPE_NORMAL
- en: You can also download Digital Economics 101 for free. It is a mini-course to
    get you up to speed on the new economy.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re interested in productizing yourself with the *systems* I’ve refined
    with 3 years of creator experience, consider enrolling.
  prefs: []
  type: TYPE_NORMAL
- en: '[Check out Digital Economics.](https://digitaleconomics.school)'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: When I was in college trying to become a fitness YouTuber (of all things), I
    remember seeing the title of a popular book by Tim Ferris.
  prefs: []
  type: TYPE_NORMAL
- en: '*The 4-Hour Work Week.*'
  prefs: []
  type: TYPE_NORMAL
- en: I’ve never read the book, but for some odd reason I interpreted it as “4-Hour
    Work Day.”
  prefs: []
  type: TYPE_NORMAL
- en: The idea of a 4 hour work day stuck in my mind throughout college and my plethora
    of business failures.
  prefs: []
  type: TYPE_NORMAL
- en: Subconsciously, I was making decisions to limit how much I work to 4 hours each
    day.
  prefs: []
  type: TYPE_NORMAL
- en: '*This alone changed the direction of my life.*'
  prefs: []
  type: TYPE_NORMAL
- en: Why?
  prefs: []
  type: TYPE_NORMAL
- en: '**First**, I perceived anything more than 4 hours of work as a problem.'
  prefs: []
  type: TYPE_NORMAL
- en: Few people do this. Most people label this lifestyle as “impossible” and then
    it becomes so.
  prefs: []
  type: TYPE_NORMAL
- en: This has forced my mind to work on a creative solution for that problem to eliminate,
    systemize, or automate low-leverage work.
  prefs: []
  type: TYPE_NORMAL
- en: In business, that means outsourcing, productizing, or building more leverage
    – so that’s what I did.
  prefs: []
  type: TYPE_NORMAL
- en: I grew on social media, pivoted out of time-sucking client work, and productized
    my offers so they could sell in my sleep (with the leverage I built).
  prefs: []
  type: TYPE_NORMAL
- en: As of right now, I’m working overtime.
  prefs: []
  type: TYPE_NORMAL
- en: 4-hour workdays are a blessing, but sometimes you need a 16-hour laser-focused
    forgot-to-eat marathon to see what you are capable of building.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [November 30, 2021](https://twitter.com/thedankoe/status/1465612082112602112?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: For the past 3 years, I’ve worked less than 4 hours a day for 90% of my days.
  prefs: []
  type: TYPE_NORMAL
- en: Recently, I’ve hit new monthly highs in revenue that are unsustainable with
    4 hours of work.
  prefs: []
  type: TYPE_NORMAL
- en: And, I’ve started building a new software that requires more of my attention.
  prefs: []
  type: TYPE_NORMAL
- en: But, you can bet your a** that I am constantly thinking of creative ways to
    reduce my time spent (while maintaining the value of what I’ve built).
  prefs: []
  type: TYPE_NORMAL
- en: '**Second**, as we do with these letters, it goes a lot deeper than just “4
    hours of focused work.”'
  prefs: []
  type: TYPE_NORMAL
- en: So, let’s dive into some philosophy, evolutionary psychology, and why they matter
    for the future of work – specifically in the new digital economy.
  prefs: []
  type: TYPE_NORMAL
- en: Then, toward the end of the letter, we’ll get into my 10 commandments of focused
    work.
  prefs: []
  type: TYPE_NORMAL
- en: '**Preface**: If you don’t have 4 hours to dedicate to your business, you can
    apply these principles to your current job… or on the 1-2 hours that you have
    to work on your business.'
  prefs: []
  type: TYPE_NORMAL
- en: Taking Advantage Of What Makes Us Different
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are many things that make humans stand out from other beings.
  prefs: []
  type: TYPE_NORMAL
- en: Like how we survive on a conceptual level, while animals survive on a physical
    level. (You wouldn’t see a snake feel threatened because it disagrees with your
    opinions.)
  prefs: []
  type: TYPE_NORMAL
- en: But, one difference that has always fascinated me is a human’s *depth of focus*.
  prefs: []
  type: TYPE_NORMAL
- en: In psychology, there is the Task Positive Network and the Default Mode Network.
  prefs: []
  type: TYPE_NORMAL
- en: The Task Positive Network “kicks on” when our focus narrows in on a string of
    external goals or tasks.
  prefs: []
  type: TYPE_NORMAL
- en: This is helpful with productivity.
  prefs: []
  type: TYPE_NORMAL
- en: The Default Mode Network kicks on when our focus shifts inward and expands to
    allow more thoughts & ideas to register in our awareness.
  prefs: []
  type: TYPE_NORMAL
- en: This is helpful with creativity.
  prefs: []
  type: TYPE_NORMAL
- en: (Remember these for later).
  prefs: []
  type: TYPE_NORMAL
- en: But, there are negative aspects of this mysterious spectrum of focus.
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-923">![](../Images/97a9cc4cdb34a7d6be521e68b2ee64c0.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Like when you narrow in on a problem and it expands to fill your attention.
    This closes your mind off to potential creative solutions. A small problem soon
    becomes your entire world.
  prefs: []
  type: TYPE_NORMAL
- en: Or, when you open your focus and hold multiple ideas in your awareness.
  prefs: []
  type: TYPE_NORMAL
- en: If those ideas are not connected, ordered, or just don’t make sense – chaos
    ensues. You can get sucked into a downward spiral of overwhelm, anxiety, and difficulty
    seeing beyond the bubble of problems you’ve created.
  prefs: []
  type: TYPE_NORMAL
- en: This phenomenon doesn’t only happen in the mind.
  prefs: []
  type: TYPE_NORMAL
- en: Our body follows.
  prefs: []
  type: TYPE_NORMAL
- en: You can narrow, contract, or deepen the focus of your physical being by touching
    something with the tip of your finger.
  prefs: []
  type: TYPE_NORMAL
- en: You can open, expand, or widen the focus of your physical being by opening your
    body in a confident manner.
  prefs: []
  type: TYPE_NORMAL
- en: Like how we can throw a dart and hit a bullseye, we can take action toward a
    vision for our future.
  prefs: []
  type: TYPE_NORMAL
- en: That is if the skill, clarity, and awareness are there to make that vision a
    reality. Because it can quickly overwhelm you and lead to procrastination.
  prefs: []
  type: TYPE_NORMAL
- en: 'And one last example:'
  prefs: []
  type: TYPE_NORMAL
- en: We can narrow or widen our perspective or worldview.
  prefs: []
  type: TYPE_NORMAL
- en: We can be “open-minded” or “closed-minded” depending on how we approach a situation.
  prefs: []
  type: TYPE_NORMAL
- en: You can open your mind to the idea of working 4 hours or less – or you can give
    up, make excuses, and blame everyone but yourself until you do.
  prefs: []
  type: TYPE_NORMAL
- en: Survival Systems
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Evolution is forced on us by the fact that systems fall apart with time unless
    they become more efficient. We can’t stop and remain in the same place; even to
    remain still we must advance. – Mihaly Csikszentmihalyi
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As humans, we have a natural desire for more.
  prefs: []
  type: TYPE_NORMAL
- en: We *need* to survive at all costs.
  prefs: []
  type: TYPE_NORMAL
- en: Evolution reflects this.
  prefs: []
  type: TYPE_NORMAL
- en: With our unique minds, we build systems to aid in survival.
  prefs: []
  type: TYPE_NORMAL
- en: It takes a lot of energy to carry water and plow fields, so we built systems
    to use that energy with efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: (Irrigation systems, tractors, and every other system that had to be built in
    order for those things to even be possible).
  prefs: []
  type: TYPE_NORMAL
- en: Systems layer on top of each other to make our mind more efficient. We get better
    at ‘investing’ our mental energy.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let me introduce you to the supreme law of the universe:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Entropy.*'
  prefs: []
  type: TYPE_NORMAL
- en: Some call it “nature’s tax.”
  prefs: []
  type: TYPE_NORMAL
- en: In brief, entropy is the measure of disorder in a system.
  prefs: []
  type: TYPE_NORMAL
- en: With time, the energy that would maintain a system disperses, and the system
    dissolves into chaos (unless quality energy is added).
  prefs: []
  type: TYPE_NORMAL
- en: Like a library compared to your home book collection.
  prefs: []
  type: TYPE_NORMAL
- en: The library is systemized.
  prefs: []
  type: TYPE_NORMAL
- en: It uses energy efficiently to alphabetize, organize, and make the books on the
    shelf easy for readers to find.
  prefs: []
  type: TYPE_NORMAL
- en: Libraries have workers that maintain this system, and one day, we may create
    a robot that can do the job better (while saving energy like time, money, and
    the mental bandwidth of library managers).
  prefs: []
  type: TYPE_NORMAL
- en: Your home book collection may be organized, but what happens when you take one
    book out? Do you put it back after you read it? What happens when you take out
    2 more?
  prefs: []
  type: TYPE_NORMAL
- en: Do you have a system that eases the mental cost of keeping your personal library
    maintained?
  prefs: []
  type: TYPE_NORMAL
- en: Have you used that system enough to spot problems, solve them, and engraine
    the system into the neural networks of your brain – to the point of it becoming
    habit?
  prefs: []
  type: TYPE_NORMAL
- en: Books may end up in separate rooms of your house and your bookshelf becomes
    unorganized.
  prefs: []
  type: TYPE_NORMAL
- en: Without a good system that orders consciousness, an ever-growing energy requirement
    to order the bookshelf will lead to anxiety, overwhelm and stress.
  prefs: []
  type: TYPE_NORMAL
- en: '**What does this have to do with focused work and productivity?**'
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t systemize your path to success, you won’t achieve it.
  prefs: []
  type: TYPE_NORMAL
- en: Your productivity system is one out of many that you will make more efficient
    with time.
  prefs: []
  type: TYPE_NORMAL
- en: Productivity is about getting from point A to point B as fast as possible.
  prefs: []
  type: TYPE_NORMAL
- en: Like your home bookshelf, if you don’t have a system for your work, you will
    get overwhelmed with the tasks in front of you.
  prefs: []
  type: TYPE_NORMAL
- en: When you are overwhelmed, if you don’t have a system for your mind, the intensity
    of that overwhelm will increase.
  prefs: []
  type: TYPE_NORMAL
- en: Now that entropy has its grasp on your productivity, it may lead to a week-long
    downward spiral of emotions and laziness… nobody wants that.
  prefs: []
  type: TYPE_NORMAL
- en: The 4-Hour Philosophy – My 10 Commandments For Focused Work
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-924">![](../Images/480b5405931b8d03c8190f9a9ce54b13.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Humans survive on a conceptual level.
  prefs: []
  type: TYPE_NORMAL
- en: We have the desire to build systems to survive the mental constructions that
    we create – the “self” being one of them.
  prefs: []
  type: TYPE_NORMAL
- en: We attach to a concept, make it a part of our identity, and open up room for
    suffering.
  prefs: []
  type: TYPE_NORMAL
- en: This is not always a bad thing.
  prefs: []
  type: TYPE_NORMAL
- en: You have a self.
  prefs: []
  type: TYPE_NORMAL
- en: You have an ego.
  prefs: []
  type: TYPE_NORMAL
- en: And unless you plan to become a monk (who still go through similar worldly struggles,
    from what I’ve read… we’ll never have access to their state of mind so who knows.
    Better to just experiment for ourselves) then we must use this knowledge to our
    advantage.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you were to loosely identify with a positive version of success and the
    projects that will take you there:'
  prefs: []
  type: TYPE_NORMAL
- en: '*You will have the desire to build systems to aid in the survival of those
    concepts.*'
  prefs: []
  type: TYPE_NORMAL
- en: If you create a vision for your future, you will subconsciously work to survive
    that vision.
  prefs: []
  type: TYPE_NORMAL
- en: If you create a project that will help you actualize that vision, you will work
    to survive that project.
  prefs: []
  type: TYPE_NORMAL
- en: If you create an identity that makes the automatic decision to build that project
    for 4 hours every day, you will work to survive that identity.
  prefs: []
  type: TYPE_NORMAL
- en: Why? Because if you don’t survive the things that make you, you… then you cease
    to exist.
  prefs: []
  type: TYPE_NORMAL
- en: The concept of “death,” which we can’t experience, fills us with fear.
  prefs: []
  type: TYPE_NORMAL
- en: We can either transmute that fear or be a slave to it.
  prefs: []
  type: TYPE_NORMAL
- en: So, let’s take a meta approach to productivity.
  prefs: []
  type: TYPE_NORMAL
- en: With the steps below, you can begin to craft a productivity system that allows
    you to actualize your vision for success.
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Why 4 Hours?**'
  prefs: []
  type: TYPE_NORMAL
- en: Conceptual systems need mental energy to thrive.
  prefs: []
  type: TYPE_NORMAL
- en: From personal experience, scientific studies, and anecdotes from my time spent
    in the productivity space… 3-4 hours is the sweet spot for mental energy expenditure.
  prefs: []
  type: TYPE_NORMAL
- en: Some studies show that 5-6 hours is the top end.
  prefs: []
  type: TYPE_NORMAL
- en: But, 3-4 hours of hyper-focus creates a deadline for your work, which narrows
    attention further and helps curb distraction.
  prefs: []
  type: TYPE_NORMAL
- en: Start with 4 hours as your goal.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Vision & Identity**'
  prefs: []
  type: TYPE_NORMAL
- en: This is for another letter, and we’ve discussed it previously, but you need
    an MVV.
  prefs: []
  type: TYPE_NORMAL
- en: A Minimum Viable Vision.
  prefs: []
  type: TYPE_NORMAL
- en: You won’t have absolute clarity on it the first time around.
  prefs: []
  type: TYPE_NORMAL
- en: 'Write out the following (be as specific and detailed as you can):'
  prefs: []
  type: TYPE_NORMAL
- en: Who you want to be
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What you want to do for work
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Where you want to live
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What your ideal day looks like
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How you will contribute to humanity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What people you will surround yourself with (network and social circle)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feel free to keep the stream of consciousness going by answering more questions
    that come to mind.
  prefs: []
  type: TYPE_NORMAL
- en: When your actions begin to habitually align with your vision, your character
    development will follow.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Outline 3 Lever Moving Tasks**'
  prefs: []
  type: TYPE_NORMAL
- en: This is situation-dependent.
  prefs: []
  type: TYPE_NORMAL
- en: You will have to gain a big-picture understanding of the tasks necessary to
    reach the next stage of your business development.
  prefs: []
  type: TYPE_NORMAL
- en: As a creator, read this [One Person Business Roadmap](https://thedankoe.com/the-one-person-business-roadmap-99-of-creators-make-this-mistake/)
    to know what to execute on as a beginner, intermediate, or advanced
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are my lever movers for my current stage in business:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Writing content** – I write my newsletter every single morning. This writing
    gets broken down and repurposed for all platforms (this is in [2 Hour Writer](https://2hourwriter.com),
    an *efficient system* for content creation).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Generating traffic** – Growth isn’t automatic when you start on a certain
    platform. Since I have my smallest audience on LinkedIn, I network with people
    to get eyes on my content.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Promoting my products** – With consistent traffic on all platforms, I promote
    my offers, directly or indirectly, once a day (*all* 3 of these are systemized
    in [Digital Economics](https://digitaleconomics.school)).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This ensures that my business continues to grow and sustainable sales are coming
    in.
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-925">![](../Images/4785a0d8e92dc4858dac3459cb984323.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: It also helps to attach a specific number to these, like “writing 1000 words.”
  prefs: []
  type: TYPE_NORMAL
- en: I write 1 section of my newsletter every morning. I know exactly who to message
    and DM. I promote my products once a day.
  prefs: []
  type: TYPE_NORMAL
- en: Those are quantifiable to my brain.
  prefs: []
  type: TYPE_NORMAL
- en: '*Dependent on your vision, business model, and experience level which quantifiable
    tasks will yield the most progress?*'
  prefs: []
  type: TYPE_NORMAL
- en: '**4) Gain Clarity On Those Tasks**'
  prefs: []
  type: TYPE_NORMAL
- en: A few times a week, you will have to exchange lever-moving tasks for clarity-generating
    tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Every Sunday and Monday, I exchange my newsletter writing for outlining and
    research.
  prefs: []
  type: TYPE_NORMAL
- en: In the afternoons I will consume content revolving around my interests. This
    is for idea generation.
  prefs: []
  type: TYPE_NORMAL
- en: In the evenings (sometimes mornings) I outline exactly what I’m going to get
    done. When I wake up, my mind is set on that plan.
  prefs: []
  type: TYPE_NORMAL
- en: I talk about this balance in my [Fill Empty Use framework](https://thedankoe.com/the-3-part-daily-routine-for-maximum-productivity/).
  prefs: []
  type: TYPE_NORMAL
- en: With a systemized supply of good ideas, there is no friction when I outline
    and write my newsletters.
  prefs: []
  type: TYPE_NORMAL
- en: '*How can you use 1-2 hours of your week to set yourself up for seamless work
    sessions?*'
  prefs: []
  type: TYPE_NORMAL
- en: '**5) Timeblocks & Breaks**'
  prefs: []
  type: TYPE_NORMAL
- en: At the start, before it becomes habit, put these time blocks on your calendar
    and set reminders.
  prefs: []
  type: TYPE_NORMAL
- en: This is something you can test.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve found that 90 minutes of focus with 15-30 minute breaks are the sweet spot
    for me.
  prefs: []
  type: TYPE_NORMAL
- en: I’ll work on my priority tasks for that time, go on a short walk, and get straight
    back into work for another 90 minutes.
  prefs: []
  type: TYPE_NORMAL
- en: You can schedule these 90-minute blocks throughout the day if you want.
  prefs: []
  type: TYPE_NORMAL
- en: But, be mindful that distractions are more abundant when the world is awake.
  prefs: []
  type: TYPE_NORMAL
- en: '**6) Manipulate Deadlines**'
  prefs: []
  type: TYPE_NORMAL
- en: Deadlines narrow your attention.
  prefs: []
  type: TYPE_NORMAL
- en: Narrow attention (on an outcome that you have clarity to achieve) increases
    the potential for flow.
  prefs: []
  type: TYPE_NORMAL
- en: The flow state is like nitrous for focused work.
  prefs: []
  type: TYPE_NORMAL
- en: 4 hours of total work and 90-minute time blocks may do the job, but you can
    constrain your attention more.
  prefs: []
  type: TYPE_NORMAL
- en: Put something tangible on the line and let everyone know.
  prefs: []
  type: TYPE_NORMAL
- en: If I set a date for a product launch and accept presale payments, there is no
    way in hell that everything related to the product launch is *not* getting done.
  prefs: []
  type: TYPE_NORMAL
- en: Get creative. *How can you add a real deadline to your work?* This can be long
    or short-term.
  prefs: []
  type: TYPE_NORMAL
- en: '**7) Manipulate Environment**'
  prefs: []
  type: TYPE_NORMAL
- en: Your environment must be conducive to your work sessions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before work, I have exact steps for what I do after I wake up:'
  prefs: []
  type: TYPE_NORMAL
- en: Brush my teeth and shower
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Walk and feed the dog
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Make coffee and write
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This helps reduce decision fatigue and distraction potential before the work
    session.
  prefs: []
  type: TYPE_NORMAL
- en: 'While working, my environment is curated to narrow my focus on the task at
    hand:'
  prefs: []
  type: TYPE_NORMAL
- en: A clear workspace
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Nice headphones and lyric-less music (like dubstep, complexity also narrows
    focus by “tuning out” and not listening to the song)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No physical items – like my phone or reminders – that will break my attention.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*How can you manipulate your environment to conserve mental energy for your
    priority tasks?*'
  prefs: []
  type: TYPE_NORMAL
- en: '**8) Wake Up Before The Distractions**'
  prefs: []
  type: TYPE_NORMAL
- en: Distractions are the start of entropy in your productivity system.
  prefs: []
  type: TYPE_NORMAL
- en: The more distractions you give the chance to penetrate your awareness, the more
    likely you will be to go into a downward spiral of procrastination.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is my most effective productivity advice:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Wake up 1-2 hours earlier.*'
  prefs: []
  type: TYPE_NORMAL
- en: Even if you’re a night owl (leverage your sleepy open focused brain for creative
    work, rather than technical work).
  prefs: []
  type: TYPE_NORMAL
- en: Even though you’re *allowed* to ignore messages and not touch your phone…
  prefs: []
  type: TYPE_NORMAL
- en: Nobody will be texting, calling, or trying to get a hold of you. That alone
    will hedge against getting sucked into social apps. Because your phone won’t require
    your attention.
  prefs: []
  type: TYPE_NORMAL
- en: '**9)** **Prioritize** **Rest**'
  prefs: []
  type: TYPE_NORMAL
- en: Quality work doesn’t exist without quality rest. Simple as that.
  prefs: []
  type: TYPE_NORMAL
- en: 'But as we’ve discussed in my balanced daily routine letter:'
  prefs: []
  type: TYPE_NORMAL
- en: “Rest” does not mean Netflix, wine, and bubble baths.
  prefs: []
  type: TYPE_NORMAL
- en: 'Rest = regenerating mental energy through non-work related activities like:'
  prefs: []
  type: TYPE_NORMAL
- en: Going to the gym
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
