- en: Why You Struggle To Make Money (and 7 Lessons To Change That)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 你为什么难以赚钱（以及7个改变这一现状的教训）
- en: 原文：[https://thedankoe.com/letters/why-you-struggle-to-make-money-and-7-lessons-to-change-that/](https://thedankoe.com/letters/why-you-struggle-to-make-money-and-7-lessons-to-change-that/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://thedankoe.com/letters/why-you-struggle-to-make-money-and-7-lessons-to-change-that/](https://thedankoe.com/letters/why-you-struggle-to-make-money-and-7-lessons-to-change-that/)'
- en: Money is a problem.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 钱是一个问题。
- en: Everyone knows it.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都知道这一点。
- en: Nobody can escape the desire to hop on the latest “get rich quick” advice like
    winning stocks, shitcoins, and anything else that promises some quick cash.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人能逃避对最新的“快速致富”建议的渴望，比如赢股票、垃圾币和任何承诺快速现金的东西。
- en: It impacts the entirety of our lives.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 它影响着我们生活的方方面面。
- en: The food we have access to
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们可以获取的食物
- en: The environment we can live in
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们可以生活的环境
- en: The people we can connect with
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们可以与之建立联系的人
- en: The amount of stress a situation will cause
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情况将造成的压力量
- en: And those all circle back, affecting our ability to make money in the first
    place.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都回到了原点，影响着我们最初赚钱的能力。
- en: 'Not to mention:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 更不用说：
- en: 99% of people aren’t aware of what’s possible.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 99%的人都没有意识到什么是可能的。
- en: Since we were young, and with a blank slate of a mind, we’ve been filled with
    non-sense that we accept as fact.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们年幼，并且拥有一个空白的思维白板，我们被填满了我们接受为事实的废话。
- en: It hurts to realize this, but the one thing holding you back from making as
    much money as you want is *you.*
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 实现这一点很痛苦，但阻碍你赚到你想要的钱的唯一一件事就是*你*。
- en: Your thoughts shape your reality.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的思想塑造了你的现实。
- en: Your beliefs dictate how you perceive those thoughts.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的信念决定了你如何感知这些思想。
- en: Your perception determines how you act in the world.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的感知决定了你在世界中的行为。
- en: If you don’t believe you can make a million bucks, will the sea of opportunities
    that you are swimming in even register in your awareness? Or will your perception
    prevent you from seeing what’s right in front of you?
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你认为自己赚不到一百万美元，那么你身处其中的机会之海在你的意识中甚至能留下痕迹吗？或者你的感知会阻止你看到眼前的东西？
- en: None of this is easy, but who said it was supposed to be?
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这些都不容易，但谁说它应该容易？
- en: I’ll answer that for ya,
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我会为你解答，
- en: '*You.*'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '*你*。'
- en: The Stress Society
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 压力社会
- en: What causes stress?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 什么导致压力？
- en: '[Focus](https://thedankoe.com/why-you-always-feel-overwhelmed/).'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '[关注](https://thedankoe.com/why-you-always-feel-overwhelmed/)'
- en: That is, where your attention is placed. The contents of your consciousness.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 也就是说，你的注意力放在了哪里。你意识的内涵。
- en: Is it split and narrow? Distracted? Hyper-focused on what’s happened, what’s
    going to happen, and what’s not happening?
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 它是分裂的、狭窄的？分心？过度专注于已经发生的事情、将要发生的事情和没有发生的事情？
- en: Or is it singular and wide?
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 或者它是单一的、广阔的？
- en: Are you seeing the tip of the iceberg? Or what’s underneath?
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 你看到冰山一角了吗？还是看到了冰山下面？
- en: Survival. That’s what’s underneath.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 生存。这就是下面隐藏的东西。
- en: Every. Single. Action you take is out of the need for survival.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 你所采取的每一个行动都是出于生存的需要。
- en: Not physical survival like the old days.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 不是像过去那样物理上的生存。
- en: I’m talking survival of the self.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我在谈论自我的生存。
- en: What is the self? It’s an illusion.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 自我是什么？它是一种错觉。
- en: Our mind started as a blank slate.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的大脑最初是一片空白。
- en: As we aged, we created the self with our mind.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们年龄的增长，我们用我们的思想创造了自我。
- en: You see, the self only exists when hundreds of thousands of external relationships
    are formed over time.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 你看，自我只有在随着时间的推移形成数以万计的外部关系时才存在。
- en: “My name is Dan” is a relationship between me and everyone I come across.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: “我叫丹”是我与遇到的所有人之间的关系。
- en: If no other “selves” existed, why in the world would I call myself “Dan”? Why
    would I need to speak a certain language? Or words at all?
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 如果没有其他“自我”存在，我为什么要称自己为“丹”？我为什么要说某种语言？或者用任何词汇？
- en: If a specific religion, ideology, cultural norm, expectation, opinion, belief,
    bias, or word hadn’t registered in your awareness, would it even exist to you?
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 如果特定的宗教、意识形态、文化规范、期望、观点、信仰、偏见或词汇在你的意识中没有留下痕迹，那么它对你来说甚至存在吗？
- en: Think of the self as a bunch of tiny dots that form the shape of a human. Imagine
    that the dots are connected to strings.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 把自我想象成组成人类形状的一堆小点。想象这些点通过线连接起来。
- en: What happens when one of those strings is plucked, gripped, or threatened?
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 当其中一根弦被拉、握住或受到威胁时会发生什么？
- en: Stress response. No matter how small (yet compounding).
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 压力反应。无论多小（尽管是累积的）。
- en: Our attention is sucked back to more pressing matters. The survival of the self.
    An attempt to prevent the death of one string we’ve attached to our identity.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的关注力被拉回到更紧迫的事情上。自我的生存。试图防止我们附着在我们身份上的某根弦的死亡。
- en: “Okay, Dan, cool story bro. How does this relate to making me some cold hard
    cash??”
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: “好吧，丹，好故事兄弟。这怎么关系到让我赚一些冷硬的现金呢？”
- en: You tell me…
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 你告诉我…
- en: '**What happens when you encounter an opportunity to make money?**'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**当你遇到赚钱的机会时会发生什么？**'
- en: 'I’ll tell you what most people do:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我会告诉你大多数人会做什么：
- en: They misperceive the situation
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们误解了情况
- en: They close their mind to seeing beyond what’s in front of them
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们关闭了他们的思维，看不到他们面前之外的东西
- en: They immediately label it as a “scam,” impossible, or not for them
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们立即将其标记为“骗局”、“不可能”或“不适合他们”
- en: A survival string is plucked and they shut down to preserve their programmed
    beliefs. If their beliefs around their ability to make money are threatened, they
    are threatened.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 一个生存字符串被拉动，他们关闭自己以保存他们程序化的信念。如果他们关于赚钱能力的信念受到威胁，他们也会受到威胁。
- en: Think this leads anywhere beneficial?
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 你认为这会导向任何有益的地方吗？
- en: Instead, you must pause, *seek* to *understand* every moving piece of the information
    you receive through observation.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，你必须暂停，*寻求*理解你通过观察接收到的信息的每一个移动部分。
- en: “Yeah this guy Dan sells a 2 Hour Writer course.”
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: “是的，这个人丹卖了一个2小时的作家课程。”
- en: 2 hours? Lol, you think you can just work for two hours and call it a day?
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 2个小时？哈哈，你认为你只需要工作两个小时就可以结束一天了吗？
- en: Writing? Creativity? You think that’s monetizable? Nobody can do what they love.
    Back to working for the boss that is doing what he loves!
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 写作？创造力？你认为这可以货币化吗？没有人能做自己喜欢的事情。回到为那个喜欢自己工作的老板工作吧！
- en: (Nobody has said this, but I guarantee some random social media lurkers are
    thinking it. Eagerly awaiting their chance to leave a negative comment that serves
    their future in zero possible ways.)
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: （没有人说过这句话，但我保证一些随机的社交媒体潜行者正在想这件事。急切地等待他们的机会留下一个负面的评论，这在任何可能的方式上都不会服务于他们的未来。）
- en: This is an exaggeration, but can you not see how obvious it is? How people *choose*
    what they want to see, stop there, and fill in the rest of the story with assumptions.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个夸张的说法，但你难道没有看到这是多么明显吗？人们*选择*他们想看到的东西，停下来，然后用假设来填补故事的其余部分。
- en: 'Another example:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个例子：
- en: '**How does it make you feel when you have to talk about money? Or even when
    it’s brought up?**'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**当你不得不谈论金钱，或者当它被提及时，你感觉如何？**'
- en: Which survival strings are threatened?
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 哪些生存字符串受到威胁？
- en: Is it uncomfortable? Do you get mad? Does it immediately make you think to the
    bill you have to pay when the paycheck deposits on Friday?
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这不舒服吗？你会生气吗？当周五发工资时，这会立刻让你想到你不得不支付的账单吗？
- en: Dive deeper. Consider the possibility. Think critically.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 深入挖掘。考虑可能性。批判性思考。
- en: Money buys freedom in the external world.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 金钱在外部世界可以买到自由。
- en: Spirituality returns freedom in the internal world.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 精神自由在内心世界回归。
- en: We will discuss survival again under a different lens, because life is more
    than just money, of course.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在不同的视角下再次讨论生存，因为生活不仅仅是金钱，当然。
- en: But for a majority of the population, money would decrease the amount of stress
    they experience by ~80%.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 但对于大多数人口来说，金钱可以减少他们经历的压力，大约减少80%。
- en: Solving your money problems opens up room for relaxation, creativity, and solving
    the deeper, internal problems that lead to true happiness.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 解决你的金钱问题为放松、创造力和解决导致真正幸福的更深层次、内心问题腾出了空间。
- en: And… it just feels good to fend for yourself, but why?
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 而且…为自己奋斗的感觉真的很棒，但为什么呢？
- en: The molecule of More, dopamine, rewards you like it did our ancestors when they
    had to hunt.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 莫尔分子中的多巴胺，就像我们的祖先在狩猎时一样，会给你带来奖励。
- en: Like how a monkey will get a dopamine response when a light bulb goes off (that
    signals it will get food) rather than no dopamine response when it gets the same
    food at the same time.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 就像猴子在灯泡亮起（这表示它会得到食物）时会产生多巴胺反应（而不是在相同时间得到相同食物时没有多巴胺反应）一样。
- en: Our psyche is wired for entrepreneurship.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的内心深处是为创业而设计的。
- en: That is, our psyche is wired to be rewarded for the novelty, anticipation, and
    unpredictability that comes from hunting for our survival. That is how you leverage
    dopamine in a useful way
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 也就是说，我们的内心深处是为了奖励狩猎生存时带来的新奇、期待和不可预测性而设计的。这就是你如何以有用的方式利用多巴胺。
- en: 7 Practical Money Lessons That Will Make You [infinite]X More Than A College
    Degree
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7个实用的金钱课程，让你比大学学位多赚[无限]X倍
- en: Abstractions on survival are fun to talk about, they help with self-understanding,
    but how do you implement those teachings?
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 关于生存的抽象概念谈论起来很有趣，它们有助于自我理解，但你是如何实施这些教诲的呢？
- en: By holding them in your awareness as you improve your money situation.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在你改善财务状况的同时保持对它们的意识。
- en: As you go through these lessons, notice when you feel a negative thought, emotion,
    or feeling come into your awareness. Question it.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习这些课程的过程中，注意当你感到负面思想、情绪或感觉进入你的意识时，质疑它。
- en: 1) The Man In The Arena
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 竞技场上的男人
- en: Making money is a skill, not a talent.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 赚钱是一种技能，而不是天赋。
- en: Skills are refined with practice.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 技能通过实践得到提升。
- en: How do you practice making money?
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何练习赚钱？
- en: 'Well, it’s not like a sport where you can get a few of your buddies and still
    reach the end goal: scoring a point.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，这不像一项运动，你可以叫上几个朋友，仍然达到最终目标：得分。
- en: With money, you have to step into the arena.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在金钱方面，你必须进入竞技场。
- en: The exchange of money is not a battle, but if you don’t have an “opponent” (that
    has money to give) on the other side of the arena, you aren’t giving yourself
    a fighting chance.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 金钱的交换不是一场战斗，但如果你在竞技场的另一边没有“对手”（即有钱给予的人），你就没有给自己一个战斗的机会。
- en: Nobody to give you money = no real-world use of your skills = no money being
    put in your pockets.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人给你钱 = 你的技能在现实世界中没有实际用途 = 没有钱进入你的口袋。
- en: It is not, and should not, just appear out of thin air and into your bank account.
    Your psyche is wired to hunt. Not to be a monkey collecting bananas in his virtual
    banana stash with zero effort.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是，也不应该是从天而降，直接进入你的银行账户。你的心理机制是狩猎，而不是在虚拟的香蕉堆里收集香蕉，不费吹灰之力。
- en: This is why so many have money problems. They love talking about money, especially
    in a negative light, but when it comes time to make more? Crickets. That would
    mean they have to do something uncomfortable. Criticism is the loudest from the
    bleachers. Booooo!
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么很多人都有金钱问题。他们喜欢谈论金钱，尤其是以负面方式，但到了赚钱的时候？一片寂静。那意味着他们必须做一些不舒服的事情。批评的声音总是来自看台。嘘！
- en: '*Studying courses on how to make money is not making money.*'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '*学习如何赚钱的课程并不是在赚钱。*'
- en: '*Building a product, website, or app to make money is not making money.*'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '*建立一个产品、网站或应用程序来赚钱并不是在赚钱。*'
- en: Learn to sell. Learn to build. If you can do both, you will be unstoppable.
  id: totrans-90
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 学习如何销售。学习如何构建。如果你两者都能做到，你将无所不能。
- en: ''
  id: totrans-91
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Naval (@naval) [May 31, 2018](https://twitter.com/naval/status/1002104154737684480?ref_src=twsrc%5Etfw)
  id: totrans-92
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — Naval (@naval) [2018年5月31日](https://twitter.com/naval/status/1002104154737684480?ref_src=twsrc%5Etfw)
- en: You have to build, *and sell.*
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须构建，*并且销售*。
- en: 2) Open Your Mind
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 打开你的心扉
- en: People are slaves to money because they believe they are incapable of making
    more.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 人们因为相信他们无法赚更多而成为金钱的奴隶。
- en: '*“I didn’t go to college, I can’t get a high paying job.”*'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '*“我没有上大学，我找不到高薪工作。”*'
- en: '*“Writing? Don’t you have to be like a poet to do that?*“'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '*“写作？你不觉得自己得像诗人一样才能做那件事吗？”*'
- en: '*“Lol you think that guy* ***really****hit $100K this month? What’s the profit?
    Either way, I’m going to go with… scam!”*'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '*“哈哈，你认为那个人* ***真的***这个月赚了10万美元吗？利润是多少？无论如何，我要选择…骗局！”*'
- en: People will feed themselves a self-limiting story that narrows their perception
    to the point of not seeing the infinite opportunities staring them in the face
    (your phone). Being broke becomes their reality, and their actions follow.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 人们会给自己一个自我限制的故事，将他们的感知缩小到几乎看不到他们面前无限的机会（你的手机）。贫穷成为他们的现实，他们的行为也随之而来。
- en: 3) Fundamentals Are King
  id: totrans-100
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 基础为王
- en: <picture fetchpriority="high" decoding="async" class="wp-image-752">![](../Images/79755d1f4ac63d0036ceb23f72bd56b9.png)</picture>
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-752">![](../Images/79755d1f4ac63d0036ceb23f72bd56b9.png)</picture>
- en: 'In business, you need 2 things:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业中，你需要两样东西：
- en: '**Value**: A product or service that promises a desirable result (and delivers
    on that promise).'
  id: totrans-103
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**价值**：一个承诺带来可取结果（并履行承诺）的产品或服务。'
- en: '**People**: Well, this is obvious, but often glanced over. You need people
    to see the value you have to offer if you want to exchange it for money.'
  id: totrans-104
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**人们**：嗯，这很明显，但常常被忽视。如果你想用金钱交换你拥有的价值，你需要有人看到你提供的价值。'
- en: Like with dating.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 就像约会一样。
- en: If you are valuable, attention-grabbing, and deliver on the value you display
    but aren’t in an environment with ample people… how can you expect to land a date?
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是有价值、引人注目并且能够实现你所展示的价值，但不在一个有很多人（无论是物理还是数字）的环境中…你怎么能期望找到约会对象？
- en: If you are in an environment (physical or digital) with ample people, but aren’t
    a person of value… same story.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在一个有很多人（无论是物理还是数字）的环境中，但不是一个有价值的人…故事相同。
- en: If you were to apply the fundamentals to the online landscape, people come from
    media, just like you’re reading this media right now.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你将基础应用到在线环境中，人们来自媒体，就像你现在正在阅读这篇媒体一样。
- en: Media is the frontend of the internet. It’s what captures, holds, and delivers
    value on attention.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 媒体是互联网的前端。它是捕捉、保持和传递价值在注意力上的载体。
- en: Writing, speaking, video, audio, design.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 写作、演讲、视频、音频、设计。
- en: I prefer writing, as it helps you refine your message before you repurpose it
    for other mediums. Like how this letter will be used as a soft YouTube script.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我更喜欢写作，因为它可以帮助你在重新用于其他媒介之前完善你的信息。就像这封信将被用作软YouTube剧本一样。
- en: If you want to learn an evergreen skill for the digital economy and implement
    my content ecosystem, check out [The 2 Hour Writer](https://2hourwriter.com).
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想学习一个适合数字经济且能实施我的内容生态系统的永恒技能，请查看[2小时作家](https://2hourwriter.com)。
- en: Media attracts *people*, but how do you create, display, and promote the *value*
    you have to offer?
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 媒体吸引*人们*，但你如何创造、展示和推广你所能提供的*价值*？
- en: Marketing, sales, influence, persuasion, and building with no-code tools.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 营销、销售、影响力、说服力和无代码工具的建设。
- en: By learning a skill that will help you succeed in either domain (people or value),
    your skills crossover and complement each other. Especially if you are in the
    online “arena” with a personal brand.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 通过学习一项能帮助你在任何领域（人或者价值）成功的技能，你的技能可以交叉和互补。尤其是如果你在在线“竞技场”中拥有个人品牌。
- en: Touching back to “opening your mind,” skill acquisition is one way to aid in
    that.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 回到“开阔你的思路”，技能获取是帮助实现这一目标的途径之一。
- en: 4) The One Person Business
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 单人企业
- en: The internet has leveled the playing field for what’s possible.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网为可能实现的事情拉平了竞争场。
- en: 'What used to take:'
  id: totrans-119
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 以前需要：
- en: ''
  id: totrans-120
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – A few thousand bucks
  id: totrans-121
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 几千美元
- en: – A team of employees
  id: totrans-122
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 一支员工团队
- en: – Years of study and practice
  id: totrans-123
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 几年的学习和实践
- en: ''
  id: totrans-124
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Can now be done with a free software.
  id: totrans-125
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 现在可以用免费软件完成。
- en: ''
  id: totrans-126
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You can laser focus on developing a high value skill set to leverage these tools.
  id: totrans-127
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你可以激光聚焦于开发一套高价值技能组合，以利用这些工具。
- en: ''
  id: totrans-128
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It's cliche, but the opportunity has never been higher.
  id: totrans-129
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这是个陈词滥调，但机会从未如此之高。
- en: ''
  id: totrans-130
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [September 2, 2022](https://twitter.com/thedankoe/status/1565631122825945089?ref_src=twsrc%5Etfw)
  id: totrans-131
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年9月2日](https://twitter.com/thedankoe/status/1565631122825945089?ref_src=twsrc%5Etfw)
- en: The one-person business is all about maximizing your time freedom, doing what
    you truly enjoy, and making more than enough money doing it.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 单人企业就是最大化你的时间自由，做你真正喜欢的事情，并从中赚取足够的钱。
- en: I believe this is the best option for 99% of people. Not dreaming of starting
    a billion-dollar behemoth of a company and never doing anything about it.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这是99%的人的最佳选择。不是梦想着创办一个价值数十亿美元的大公司，却从未采取任何行动。
- en: It’s all about small steps, personal growth, and providing as much value as
    *you* can.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 这一切都是关于小步骤、个人成长和尽可能多地提供价值。
- en: 'Here’s how you go about it:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你如何去做：
- en: '**Start a service business.**'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: '**开始服务型业务。**'
- en: Study your interests
  id: totrans-137
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 研究你的兴趣
- en: Start a service business
  id: totrans-138
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 开始服务型业务
- en: Grow an audience
  id: totrans-139
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 增长观众群
- en: Work for free
  id: totrans-140
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 免费工作
- en: Develop your process
  id: totrans-141
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 发展你的流程
- en: Increase prices
  id: totrans-142
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 提高价格
- en: Repeat 5-6
  id: totrans-143
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 重复5-6次
- en: Productize your process
  id: totrans-144
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 产品化你的流程
- en: ''
  id: totrans-145
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This takes 2 years for potential $50K+ months & 3 hour workdays
  id: totrans-146
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这需要2年，潜在的每月5万美元+的收入和每天3小时的工作日
- en: ''
  id: totrans-147
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: College takes 4 years for potential $10K months & 9 hour workdays
  id: totrans-148
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 大学需要4年，潜在的每月1万美元的收入和每天9小时的工作日
- en: ''
  id: totrans-149
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [January 11, 2022](https://twitter.com/thedankoe/status/1480875904104599553?ref_src=twsrc%5Etfw)
  id: totrans-150
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年1月11日](https://twitter.com/thedankoe/status/1480875904104599553?ref_src=twsrc%5Etfw)
- en: If you can’t leverage money or an audience to send *people* to a product. Start
    with a service.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不能利用金钱或观众将*人们*引导到产品上，从服务开始。
- en: Why?
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: Because you can cold email, cold DM, or create a strategy to get in front of
    more people on social media.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 因为你可以冷邮件、冷私信或制定策略，让更多的人在社交媒体上看到你。
- en: And, because it is easier (yes, easier) to sell a more expensive service with
    direct response marketing, sales, and a proper cold outreach strategy.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 而且，由于直接响应营销、销售和适当的冷接触策略，更容易（是的，更容易）销售更昂贵的服务。
- en: Now, would you be able to create an income for yourself in a few months by trying
    to sell a low cost *product* in the DMs?
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你能否在几个月内通过尝试在私信中销售低成本*产品*来为自己创造收入？
- en: No, you need more money, results, and authority before you can sell a product
    through your brand.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 不，在你能够通过你的品牌销售产品之前，你需要更多的钱、结果和权威。
- en: But with the right strategy, you can land 4+ $2500 clients through DMs and email
    alone.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 但有了正确的策略，你仅通过私信和电子邮件就能吸引4+个2500美元的客户。
- en: '**Build an audience on the side.**'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: '**在旁边建立一个观众群。**'
- en: You don’t want to be sending cold DMs forever. It only makes sense to build
    leverage in the form of an audience.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 你不希望永远发送冷冰冰的私信。建立受众作为杠杆是有意义的。
- en: What do you talk about? Actionable advice related to the service you are selling.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 你会谈论什么？与你所销售的服务相关的可操作建议。
- en: '*If you sell health coaching, talk about health.*'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果你销售健康指导，就谈谈健康。*'
- en: '*If you sell marketing services, talk about marketing.*'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果你销售营销服务，就谈谈营销。*'
- en: '*If you sell accounting services, talk about money.*'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果你销售会计服务，就谈谈金钱。*'
- en: This will establish authority, put you on the radar of hundreds of thousands
    of people, and expand your network.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 这将建立权威，使你在数十万人面前引起注意，并扩大你的网络。
- en: Think about it, you don’t only have direct access to your audience, *you have
    indirect access to every audience of people that follow you**.*
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 想想看，你不仅直接接触到你的受众，*你还间接接触到跟随你的人的每一个受众**。*
- en: Take a moment to think about that. It’s actually nuts.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 仔细思考一下。这实际上很疯狂。
- en: '**Productize once you have results.**'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: '**一旦你有了结果，就将其产品化。**'
- en: Now that we’ve gotten results for our clients and built an audience talking
    about our expertise, it’s time to productize.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经为客户取得了成果，并建立了一个谈论我们专业知识的受众，现在是时候将其产品化了。
- en: Create a product with the exact system and actions you take with your service
    business on a daily basis.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个产品，这个产品就是你每天在服务型业务中采取的精确系统和行动。
- en: You can use your client testimonials for initial social proof during your launch.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在推出时使用客户的推荐信作为初始的社会证据。
- en: This letter is already getting very long, so I’m going to leave the one-person
    business for an entirely separate letter.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 这封信已经写得非常长了，所以我将把关于个人企业的内容留到另一封信中。
- en: '*If you want 180+ strategies, trainings, and step-by-step roadmaps for building
    a one-person business (and high-performance mind), check out Modern Mastery. [Readers
    can join for $5.](https://modernmastery.co/letter)*'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果你想获得180+种策略、培训和逐步路线图，用于构建个人企业（以及高性能思维），请查看现代精通。[读者可以以5美元的价格加入。](https://modernmastery.co/letter)*'
- en: 5) Think Big, Act Small
  id: totrans-173
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5) 思考大，行动小
- en: When you’re lost, try everything and see what sticks.
  id: totrans-174
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当你迷失方向时，尝试一切，看看什么有效。
- en: ''
  id: totrans-175
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: When you’re overwhelmed, drop everything and see what sticks.
  id: totrans-176
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当你感到不知所措时，放下一切，看看什么有效。
- en: ''
  id: totrans-177
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [September 1, 2022](https://twitter.com/thedankoe/status/1565268731017699328?ref_src=twsrc%5Etfw)
  id: totrans-178
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年9月1日](https://twitter.com/thedankoe/status/1565268731017699328?ref_src=twsrc%5Etfw)
- en: Opening your mind to the potential of being rich is the first step to becoming
    rich.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 打开你的思维，认识到成为富有的可能性，这是成为富有的第一步。
- en: Riches demand a balance of creativity and productivity.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 财富需要创造力和生产力的平衡。
- en: Creativity demands an open mind and meta-perspective.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 创造力需要开放的心态和元视角。
- en: Productivity demands a clear mind and narrow focus.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 生产力的提升需要清晰的思维和专注的焦点。
- en: Creativity is like you are floating in space. The stars are ideas that register
    in your awareness. Profitable solutions are created when you create constellations,
    connections between the stars.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 创造力就像你在太空中漂浮。星星是进入你意识中的想法。当你创造星座，即星星之间的联系时，就会产生有利的解决方案。
- en: Productivity is like you’re on a rocket ship to the moon. There is no thought.
    It is calculated, planned, and foolproof. You cut through the air and arrive at
    your destination in record time… because the outcome was already decided.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 生产力的提升就像你乘坐火箭飞船前往月球。没有思考。它是计算过的、计划过的，且万无一失。你穿越空气，以创纪录的时间到达目的地……因为结果已经确定。
- en: Creativity is about connection, productivity is about clarity.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 创造力关乎联系，生产力关乎清晰。
- en: Schedule dedicated time for both.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 为两者安排专门的时间。
- en: You can use my [Fill Empty Use](https://thedankoe.com/the-3-part-daily-routine-for-maximum-productivity/)
    framework to find your own balance.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用我的[填满空缺使用](https://thedankoe.com/the-3-part-daily-routine-for-maximum-productivity/)框架来找到自己的平衡。
- en: 6) Increase Baseline Income, Maintain Baseline Lifestyle
  id: totrans-188
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6) 提高基本收入，维持基本生活方式
- en: In solopreneurship, everything is unpredictable. (This is a good thing)
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 在单打独斗的企业家精神中，一切都是不可预测的。（这是一件好事）
- en: Sure, you can create a membership or other recurring monthly offer that can
    create some stability… but the point is, you will have both high and low months.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，你可以创建一个会员资格或其他每月重复出现的提供，这可以创造一些稳定性……但重点是，你会有高低起伏的月份。
- en: I hit my first $100K month last week.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 我上周达到了第一个10万美元的月份。
- en: I’m not going to hit that this month unless I actively try, but I need to rest.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 除非我主动尝试，否则这个月我无法达到目标，但我需要休息。
- en: That being said, hitting $100K means that my baseline has increased.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，达到10万美元意味着我的基本水平已经提高。
- en: This seems to always happen after a period of tactical stress.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 这似乎总是在一段战术压力之后发生。
- en: 'Tactical stress:'
  id: totrans-195
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 战术压力：
- en: ''
  id: totrans-196
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The conscious decision to put yourself in a do or die situation – knowing that
    you have the skill to make it work – and will accept nothing less than success.
  id: totrans-197
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 有意识地让自己处于一种非做即死的情况——知道你有能力让它成功——并且只接受成功。
- en: ''
  id: totrans-198
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [May 13, 2022](https://twitter.com/thedankoe/status/1525117916538097666?ref_src=twsrc%5Etfw)
  id: totrans-199
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年5月13日](https://twitter.com/thedankoe/status/1525117916538097666?ref_src=twsrc%5Etfw)
- en: I will force myself to launch a product or promotion, make it public, and have
    to get it done or else I would be a public failure.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 我将强迫自己推出一个产品或促销活动，公开它，并必须完成它，否则我就会成为公众的失败者。
- en: I’ve done this once a year, and I would attribute a majority of my growth to
    it. Most people get stuck in dreamland and never publish the project they’ve been
    building.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 我每年做一次，我会把我的大部分成长归功于它。大多数人陷入梦想之中，从未发布他们一直在构建的项目。
- en: That being said, lifestyle creep can be a real thing.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，生活方式的膨胀可能是一个真实存在的问题。
- en: You’ll hit a high month, something you never could’ve imagined, and celebrate
    by making a big purchase.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 你会遇到一个高收入的月份，这是你从未能想象到的，你可以通过购买大件物品来庆祝。
- en: Meaning, you increased your baseline lifestyle demands.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 意味着，你提高了你的基本生活方式需求。
- en: More stuff = more responsibility = more resources being utilized = less resources
    to go towards business = lower monthly income = difficulty sustaining that lifestyle.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 更多的事情 = 更多责任 = 更多资源被利用 = 更少的资源用于业务 = 更低的月收入 = 难以维持这种生活方式。
- en: If your lifestyle demands increases with your income, you’re not going to have
    a good time.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的生活方式需求随着你的收入增加，你不会过得愉快。
- en: 7) Leverage Your Time, Then Your Mind
  id: totrans-207
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7) 利用你的时间，然后是你的头脑
- en: Earn with your mind, not with your time.
  id: totrans-208
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 用你的头脑赚钱，而不是用你的时间。
- en: ''
  id: totrans-209
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Naval (@naval) [December 17, 2019](https://twitter.com/naval/status/1206967499838803968?ref_src=twsrc%5Etfw)
  id: totrans-210
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 纳瓦尔 (@naval) [2019年12月17日](https://twitter.com/naval/status/1206967499838803968?ref_src=twsrc%5Etfw)
- en: Manual labor implies that there is a limit on how much you can work, meaning
    there is a limit on how much you can make.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 体力劳动意味着你的工作能力有限，这意味着你能赚到的钱也有上限。
- en: The highest-paid earners are the strategists, visionaries, and innovators of
    the world.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 世界上收入最高的人是策略家、愿景家和创新者。
- en: Yes, even if they don’t start a billion-dollar company.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，即使他们没有创立一个价值十亿美元的公司。
- en: A $1M/year one-person business demands creativity, leverage, and productization.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 一年一百万美元的一人企业需要创造力、杠杆和产品化。
- en: My goal is to have products and digital real estate in place to the point where
    I can spend ALL of my time writing. No-code tools, automations, and social media
    handles the rest.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 我的目的是拥有产品和数字资产，以便我可以把所有的时间都花在写作上。无代码工具、自动化和社交媒体处理其余的事情。
- en: Unless you have ample cash flow to invest in audience growth or traffic acquisition
    (people) you’re going to have to spend time building that cash flow with a service
    business.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 除非你有充足的现金流来投资观众增长或流量获取（人），否则你将不得不花时间通过服务业务来建立这种现金流。
- en: Once you’ve built digital leverage through audience growth, have gotten results
    with your service, and are ready to productize… that’s where the real fun begins.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你通过观众增长建立了数字杠杆，通过你的服务获得了成果，并准备好产品化……那么真正的乐趣就开始了。
- en: Most people get stuck in the feast or famine client business because they don’t
    use their mind. They don’t realize the value of digital leverage, don’t grow,
    and spend their time in an endless cycle of cold DMs and emails.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人陷入盛宴或饥荒的客户业务，因为他们没有使用他们的头脑。他们没有意识到数字杠杆的价值，没有成长，并花费他们的时间在无休止的冷DM和电子邮件循环中。
- en: Build an audience. Build an email list. Build a list of buyers.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 建立一个观众群体。建立一个电子邮件列表。建立一个买家列表。
- en: Build distribution, then build whatever you want.
  id: totrans-220
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 建立分销，然后建立任何你想要的东西。
- en: ''
  id: totrans-221
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Jack Butcher (@jackbutcher) [May 22, 2021](https://twitter.com/jackbutcher/status/1395945544430854144?ref_src=twsrc%5Etfw)
  id: totrans-222
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 杰克·巴切特 (@jackbutcher) [2021年5月22日](https://twitter.com/jackbutcher/status/1395945544430854144?ref_src=twsrc%5Etfw)
- en: That’s digital leverage. Once they’re big enough, build whatever you want.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 那是数字杠杆。一旦他们足够大，就可以建立任何你想要的东西。
- en: That’s all for this letter.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是这封信的全部内容。
- en: If you enjoyed it, you’ll enjoy what happened this week off of surface-level
    social media (below).
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你喜欢它，你也会喜欢本周从表面社交媒体（以下）发生的事情。
- en: Dan Koe
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 丹·科伊
- en: '**What Happened This Week**'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: '**本周发生了什么**'
- en: We’re still getting some incredible feedback from the 2 Hour Writer. People
    are growing from Instagram reels and TikToks with writing (yes, you read that
    correctly), writing incredible newsletters that build authority, and having a
    content ecosystem that separates you from the sea of new creators.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 我们仍在从“2小时作家”那里获得一些令人难以置信的反馈。人们通过Instagram短视频和TikToks进行写作（是的，你读对了），撰写出令人印象深刻的通讯稿，建立起权威，并拥有一个将你与众多新创作者区分开来的内容生态系统。
- en: '[Check out 2HW here.](https://2hourwriter.com)'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: '[在这里查看2HW](https://2hourwriter.com)'
- en: Inside Modern Mastery we had a brand workshop. We broke down Based Realists
    profile, threw in some profile design education for getting maximum followers,
    and answered questions.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 在现代精通课程中，我们进行了一次品牌研讨会。我们分析了基于现实的现实主义者档案，加入了一些关于如何获得最多粉丝的档案设计教育，并回答了问题。
- en: Joey posted the Creator Tech Stack going over the best software to start your
    one-person creator business (if you’re looking to break into this space).
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 乔伊发布了“创作者技术栈”，概述了开始个人创作者业务的最佳软件（如果你想要进入这个领域的话）。
- en: '[Readers can get access to both (and more) for $5 here.](https://modernmastery.co/letter)'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: '[读者可以在这里以5美元的价格获得这两个（以及更多）内容。](https://modernmastery.co/letter)'
- en: As always, YouTube will be up later. Podcast is starting back up soon. Keep
    an eye on those if you’re interested.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 和往常一样，YouTube视频稍后会上线。播客很快就会重新开始。如果你感兴趣，请留意这些内容。
