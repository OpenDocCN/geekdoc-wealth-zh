- en: Why You Struggle To Make Money (and 7 Lessons To Change That)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/why-you-struggle-to-make-money-and-7-lessons-to-change-that/](https://thedankoe.com/letters/why-you-struggle-to-make-money-and-7-lessons-to-change-that/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Money is a problem.
  prefs: []
  type: TYPE_NORMAL
- en: Everyone knows it.
  prefs: []
  type: TYPE_NORMAL
- en: Nobody can escape the desire to hop on the latest “get rich quick” advice like
    winning stocks, shitcoins, and anything else that promises some quick cash.
  prefs: []
  type: TYPE_NORMAL
- en: It impacts the entirety of our lives.
  prefs: []
  type: TYPE_NORMAL
- en: The food we have access to
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The environment we can live in
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The people we can connect with
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The amount of stress a situation will cause
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And those all circle back, affecting our ability to make money in the first
    place.
  prefs: []
  type: TYPE_NORMAL
- en: 'Not to mention:'
  prefs: []
  type: TYPE_NORMAL
- en: 99% of people aren’t aware of what’s possible.
  prefs: []
  type: TYPE_NORMAL
- en: Since we were young, and with a blank slate of a mind, we’ve been filled with
    non-sense that we accept as fact.
  prefs: []
  type: TYPE_NORMAL
- en: It hurts to realize this, but the one thing holding you back from making as
    much money as you want is *you.*
  prefs: []
  type: TYPE_NORMAL
- en: Your thoughts shape your reality.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your beliefs dictate how you perceive those thoughts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your perception determines how you act in the world.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you don’t believe you can make a million bucks, will the sea of opportunities
    that you are swimming in even register in your awareness? Or will your perception
    prevent you from seeing what’s right in front of you?
  prefs: []
  type: TYPE_NORMAL
- en: None of this is easy, but who said it was supposed to be?
  prefs: []
  type: TYPE_NORMAL
- en: I’ll answer that for ya,
  prefs: []
  type: TYPE_NORMAL
- en: '*You.*'
  prefs: []
  type: TYPE_NORMAL
- en: The Stress Society
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What causes stress?
  prefs: []
  type: TYPE_NORMAL
- en: '[Focus](https://thedankoe.com/why-you-always-feel-overwhelmed/).'
  prefs: []
  type: TYPE_NORMAL
- en: That is, where your attention is placed. The contents of your consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: Is it split and narrow? Distracted? Hyper-focused on what’s happened, what’s
    going to happen, and what’s not happening?
  prefs: []
  type: TYPE_NORMAL
- en: Or is it singular and wide?
  prefs: []
  type: TYPE_NORMAL
- en: Are you seeing the tip of the iceberg? Or what’s underneath?
  prefs: []
  type: TYPE_NORMAL
- en: Survival. That’s what’s underneath.
  prefs: []
  type: TYPE_NORMAL
- en: Every. Single. Action you take is out of the need for survival.
  prefs: []
  type: TYPE_NORMAL
- en: Not physical survival like the old days.
  prefs: []
  type: TYPE_NORMAL
- en: I’m talking survival of the self.
  prefs: []
  type: TYPE_NORMAL
- en: What is the self? It’s an illusion.
  prefs: []
  type: TYPE_NORMAL
- en: Our mind started as a blank slate.
  prefs: []
  type: TYPE_NORMAL
- en: As we aged, we created the self with our mind.
  prefs: []
  type: TYPE_NORMAL
- en: You see, the self only exists when hundreds of thousands of external relationships
    are formed over time.
  prefs: []
  type: TYPE_NORMAL
- en: “My name is Dan” is a relationship between me and everyone I come across.
  prefs: []
  type: TYPE_NORMAL
- en: If no other “selves” existed, why in the world would I call myself “Dan”? Why
    would I need to speak a certain language? Or words at all?
  prefs: []
  type: TYPE_NORMAL
- en: If a specific religion, ideology, cultural norm, expectation, opinion, belief,
    bias, or word hadn’t registered in your awareness, would it even exist to you?
  prefs: []
  type: TYPE_NORMAL
- en: Think of the self as a bunch of tiny dots that form the shape of a human. Imagine
    that the dots are connected to strings.
  prefs: []
  type: TYPE_NORMAL
- en: What happens when one of those strings is plucked, gripped, or threatened?
  prefs: []
  type: TYPE_NORMAL
- en: Stress response. No matter how small (yet compounding).
  prefs: []
  type: TYPE_NORMAL
- en: Our attention is sucked back to more pressing matters. The survival of the self.
    An attempt to prevent the death of one string we’ve attached to our identity.
  prefs: []
  type: TYPE_NORMAL
- en: “Okay, Dan, cool story bro. How does this relate to making me some cold hard
    cash??”
  prefs: []
  type: TYPE_NORMAL
- en: You tell me…
  prefs: []
  type: TYPE_NORMAL
- en: '**What happens when you encounter an opportunity to make money?**'
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ll tell you what most people do:'
  prefs: []
  type: TYPE_NORMAL
- en: They misperceive the situation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They close their mind to seeing beyond what’s in front of them
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They immediately label it as a “scam,” impossible, or not for them
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A survival string is plucked and they shut down to preserve their programmed
    beliefs. If their beliefs around their ability to make money are threatened, they
    are threatened.
  prefs: []
  type: TYPE_NORMAL
- en: Think this leads anywhere beneficial?
  prefs: []
  type: TYPE_NORMAL
- en: Instead, you must pause, *seek* to *understand* every moving piece of the information
    you receive through observation.
  prefs: []
  type: TYPE_NORMAL
- en: “Yeah this guy Dan sells a 2 Hour Writer course.”
  prefs: []
  type: TYPE_NORMAL
- en: 2 hours? Lol, you think you can just work for two hours and call it a day?
  prefs: []
  type: TYPE_NORMAL
- en: Writing? Creativity? You think that’s monetizable? Nobody can do what they love.
    Back to working for the boss that is doing what he loves!
  prefs: []
  type: TYPE_NORMAL
- en: (Nobody has said this, but I guarantee some random social media lurkers are
    thinking it. Eagerly awaiting their chance to leave a negative comment that serves
    their future in zero possible ways.)
  prefs: []
  type: TYPE_NORMAL
- en: This is an exaggeration, but can you not see how obvious it is? How people *choose*
    what they want to see, stop there, and fill in the rest of the story with assumptions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Another example:'
  prefs: []
  type: TYPE_NORMAL
- en: '**How does it make you feel when you have to talk about money? Or even when
    it’s brought up?**'
  prefs: []
  type: TYPE_NORMAL
- en: Which survival strings are threatened?
  prefs: []
  type: TYPE_NORMAL
- en: Is it uncomfortable? Do you get mad? Does it immediately make you think to the
    bill you have to pay when the paycheck deposits on Friday?
  prefs: []
  type: TYPE_NORMAL
- en: Dive deeper. Consider the possibility. Think critically.
  prefs: []
  type: TYPE_NORMAL
- en: Money buys freedom in the external world.
  prefs: []
  type: TYPE_NORMAL
- en: Spirituality returns freedom in the internal world.
  prefs: []
  type: TYPE_NORMAL
- en: We will discuss survival again under a different lens, because life is more
    than just money, of course.
  prefs: []
  type: TYPE_NORMAL
- en: But for a majority of the population, money would decrease the amount of stress
    they experience by ~80%.
  prefs: []
  type: TYPE_NORMAL
- en: Solving your money problems opens up room for relaxation, creativity, and solving
    the deeper, internal problems that lead to true happiness.
  prefs: []
  type: TYPE_NORMAL
- en: And… it just feels good to fend for yourself, but why?
  prefs: []
  type: TYPE_NORMAL
- en: The molecule of More, dopamine, rewards you like it did our ancestors when they
    had to hunt.
  prefs: []
  type: TYPE_NORMAL
- en: Like how a monkey will get a dopamine response when a light bulb goes off (that
    signals it will get food) rather than no dopamine response when it gets the same
    food at the same time.
  prefs: []
  type: TYPE_NORMAL
- en: Our psyche is wired for entrepreneurship.
  prefs: []
  type: TYPE_NORMAL
- en: That is, our psyche is wired to be rewarded for the novelty, anticipation, and
    unpredictability that comes from hunting for our survival. That is how you leverage
    dopamine in a useful way
  prefs: []
  type: TYPE_NORMAL
- en: 7 Practical Money Lessons That Will Make You [infinite]X More Than A College
    Degree
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Abstractions on survival are fun to talk about, they help with self-understanding,
    but how do you implement those teachings?
  prefs: []
  type: TYPE_NORMAL
- en: By holding them in your awareness as you improve your money situation.
  prefs: []
  type: TYPE_NORMAL
- en: As you go through these lessons, notice when you feel a negative thought, emotion,
    or feeling come into your awareness. Question it.
  prefs: []
  type: TYPE_NORMAL
- en: 1) The Man In The Arena
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Making money is a skill, not a talent.
  prefs: []
  type: TYPE_NORMAL
- en: Skills are refined with practice.
  prefs: []
  type: TYPE_NORMAL
- en: How do you practice making money?
  prefs: []
  type: TYPE_NORMAL
- en: 'Well, it’s not like a sport where you can get a few of your buddies and still
    reach the end goal: scoring a point.'
  prefs: []
  type: TYPE_NORMAL
- en: With money, you have to step into the arena.
  prefs: []
  type: TYPE_NORMAL
- en: The exchange of money is not a battle, but if you don’t have an “opponent” (that
    has money to give) on the other side of the arena, you aren’t giving yourself
    a fighting chance.
  prefs: []
  type: TYPE_NORMAL
- en: Nobody to give you money = no real-world use of your skills = no money being
    put in your pockets.
  prefs: []
  type: TYPE_NORMAL
- en: It is not, and should not, just appear out of thin air and into your bank account.
    Your psyche is wired to hunt. Not to be a monkey collecting bananas in his virtual
    banana stash with zero effort.
  prefs: []
  type: TYPE_NORMAL
- en: This is why so many have money problems. They love talking about money, especially
    in a negative light, but when it comes time to make more? Crickets. That would
    mean they have to do something uncomfortable. Criticism is the loudest from the
    bleachers. Booooo!
  prefs: []
  type: TYPE_NORMAL
- en: '*Studying courses on how to make money is not making money.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Building a product, website, or app to make money is not making money.*'
  prefs: []
  type: TYPE_NORMAL
- en: Learn to sell. Learn to build. If you can do both, you will be unstoppable.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Naval (@naval) [May 31, 2018](https://twitter.com/naval/status/1002104154737684480?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You have to build, *and sell.*
  prefs: []
  type: TYPE_NORMAL
- en: 2) Open Your Mind
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: People are slaves to money because they believe they are incapable of making
    more.
  prefs: []
  type: TYPE_NORMAL
- en: '*“I didn’t go to college, I can’t get a high paying job.”*'
  prefs: []
  type: TYPE_NORMAL
- en: '*“Writing? Don’t you have to be like a poet to do that?*“'
  prefs: []
  type: TYPE_NORMAL
- en: '*“Lol you think that guy* ***really****hit $100K this month? What’s the profit?
    Either way, I’m going to go with… scam!”*'
  prefs: []
  type: TYPE_NORMAL
- en: People will feed themselves a self-limiting story that narrows their perception
    to the point of not seeing the infinite opportunities staring them in the face
    (your phone). Being broke becomes their reality, and their actions follow.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Fundamentals Are King
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-752">![](../Images/79755d1f4ac63d0036ceb23f72bd56b9.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: 'In business, you need 2 things:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Value**: A product or service that promises a desirable result (and delivers
    on that promise).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**People**: Well, this is obvious, but often glanced over. You need people
    to see the value you have to offer if you want to exchange it for money.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Like with dating.
  prefs: []
  type: TYPE_NORMAL
- en: If you are valuable, attention-grabbing, and deliver on the value you display
    but aren’t in an environment with ample people… how can you expect to land a date?
  prefs: []
  type: TYPE_NORMAL
- en: If you are in an environment (physical or digital) with ample people, but aren’t
    a person of value… same story.
  prefs: []
  type: TYPE_NORMAL
- en: If you were to apply the fundamentals to the online landscape, people come from
    media, just like you’re reading this media right now.
  prefs: []
  type: TYPE_NORMAL
- en: Media is the frontend of the internet. It’s what captures, holds, and delivers
    value on attention.
  prefs: []
  type: TYPE_NORMAL
- en: Writing, speaking, video, audio, design.
  prefs: []
  type: TYPE_NORMAL
- en: I prefer writing, as it helps you refine your message before you repurpose it
    for other mediums. Like how this letter will be used as a soft YouTube script.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to learn an evergreen skill for the digital economy and implement
    my content ecosystem, check out [The 2 Hour Writer](https://2hourwriter.com).
  prefs: []
  type: TYPE_NORMAL
- en: Media attracts *people*, but how do you create, display, and promote the *value*
    you have to offer?
  prefs: []
  type: TYPE_NORMAL
- en: Marketing, sales, influence, persuasion, and building with no-code tools.
  prefs: []
  type: TYPE_NORMAL
- en: By learning a skill that will help you succeed in either domain (people or value),
    your skills crossover and complement each other. Especially if you are in the
    online “arena” with a personal brand.
  prefs: []
  type: TYPE_NORMAL
- en: Touching back to “opening your mind,” skill acquisition is one way to aid in
    that.
  prefs: []
  type: TYPE_NORMAL
- en: 4) The One Person Business
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The internet has leveled the playing field for what’s possible.
  prefs: []
  type: TYPE_NORMAL
- en: 'What used to take:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – A few thousand bucks
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – A team of employees
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Years of study and practice
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Can now be done with a free software.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You can laser focus on developing a high value skill set to leverage these tools.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It's cliche, but the opportunity has never been higher.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [September 2, 2022](https://twitter.com/thedankoe/status/1565631122825945089?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The one-person business is all about maximizing your time freedom, doing what
    you truly enjoy, and making more than enough money doing it.
  prefs: []
  type: TYPE_NORMAL
- en: I believe this is the best option for 99% of people. Not dreaming of starting
    a billion-dollar behemoth of a company and never doing anything about it.
  prefs: []
  type: TYPE_NORMAL
- en: It’s all about small steps, personal growth, and providing as much value as
    *you* can.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how you go about it:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Start a service business.**'
  prefs: []
  type: TYPE_NORMAL
- en: Study your interests
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Start a service business
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Grow an audience
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Work for free
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Develop your process
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Increase prices
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Repeat 5-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Productize your process
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This takes 2 years for potential $50K+ months & 3 hour workdays
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: College takes 4 years for potential $10K months & 9 hour workdays
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [January 11, 2022](https://twitter.com/thedankoe/status/1480875904104599553?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you can’t leverage money or an audience to send *people* to a product. Start
    with a service.
  prefs: []
  type: TYPE_NORMAL
- en: Why?
  prefs: []
  type: TYPE_NORMAL
- en: Because you can cold email, cold DM, or create a strategy to get in front of
    more people on social media.
  prefs: []
  type: TYPE_NORMAL
- en: And, because it is easier (yes, easier) to sell a more expensive service with
    direct response marketing, sales, and a proper cold outreach strategy.
  prefs: []
  type: TYPE_NORMAL
- en: Now, would you be able to create an income for yourself in a few months by trying
    to sell a low cost *product* in the DMs?
  prefs: []
  type: TYPE_NORMAL
- en: No, you need more money, results, and authority before you can sell a product
    through your brand.
  prefs: []
  type: TYPE_NORMAL
- en: But with the right strategy, you can land 4+ $2500 clients through DMs and email
    alone.
  prefs: []
  type: TYPE_NORMAL
- en: '**Build an audience on the side.**'
  prefs: []
  type: TYPE_NORMAL
- en: You don’t want to be sending cold DMs forever. It only makes sense to build
    leverage in the form of an audience.
  prefs: []
  type: TYPE_NORMAL
- en: What do you talk about? Actionable advice related to the service you are selling.
  prefs: []
  type: TYPE_NORMAL
- en: '*If you sell health coaching, talk about health.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*If you sell marketing services, talk about marketing.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*If you sell accounting services, talk about money.*'
  prefs: []
  type: TYPE_NORMAL
- en: This will establish authority, put you on the radar of hundreds of thousands
    of people, and expand your network.
  prefs: []
  type: TYPE_NORMAL
- en: Think about it, you don’t only have direct access to your audience, *you have
    indirect access to every audience of people that follow you**.*
  prefs: []
  type: TYPE_NORMAL
- en: Take a moment to think about that. It’s actually nuts.
  prefs: []
  type: TYPE_NORMAL
- en: '**Productize once you have results.**'
  prefs: []
  type: TYPE_NORMAL
- en: Now that we’ve gotten results for our clients and built an audience talking
    about our expertise, it’s time to productize.
  prefs: []
  type: TYPE_NORMAL
- en: Create a product with the exact system and actions you take with your service
    business on a daily basis.
  prefs: []
  type: TYPE_NORMAL
- en: You can use your client testimonials for initial social proof during your launch.
  prefs: []
  type: TYPE_NORMAL
- en: This letter is already getting very long, so I’m going to leave the one-person
    business for an entirely separate letter.
  prefs: []
  type: TYPE_NORMAL
- en: '*If you want 180+ strategies, trainings, and step-by-step roadmaps for building
    a one-person business (and high-performance mind), check out Modern Mastery. [Readers
    can join for $5.](https://modernmastery.co/letter)*'
  prefs: []
  type: TYPE_NORMAL
- en: 5) Think Big, Act Small
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When you’re lost, try everything and see what sticks.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: When you’re overwhelmed, drop everything and see what sticks.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [September 1, 2022](https://twitter.com/thedankoe/status/1565268731017699328?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Opening your mind to the potential of being rich is the first step to becoming
    rich.
  prefs: []
  type: TYPE_NORMAL
- en: Riches demand a balance of creativity and productivity.
  prefs: []
  type: TYPE_NORMAL
- en: Creativity demands an open mind and meta-perspective.
  prefs: []
  type: TYPE_NORMAL
- en: Productivity demands a clear mind and narrow focus.
  prefs: []
  type: TYPE_NORMAL
- en: Creativity is like you are floating in space. The stars are ideas that register
    in your awareness. Profitable solutions are created when you create constellations,
    connections between the stars.
  prefs: []
  type: TYPE_NORMAL
- en: Productivity is like you’re on a rocket ship to the moon. There is no thought.
    It is calculated, planned, and foolproof. You cut through the air and arrive at
    your destination in record time… because the outcome was already decided.
  prefs: []
  type: TYPE_NORMAL
- en: Creativity is about connection, productivity is about clarity.
  prefs: []
  type: TYPE_NORMAL
- en: Schedule dedicated time for both.
  prefs: []
  type: TYPE_NORMAL
- en: You can use my [Fill Empty Use](https://thedankoe.com/the-3-part-daily-routine-for-maximum-productivity/)
    framework to find your own balance.
  prefs: []
  type: TYPE_NORMAL
- en: 6) Increase Baseline Income, Maintain Baseline Lifestyle
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In solopreneurship, everything is unpredictable. (This is a good thing)
  prefs: []
  type: TYPE_NORMAL
- en: Sure, you can create a membership or other recurring monthly offer that can
    create some stability… but the point is, you will have both high and low months.
  prefs: []
  type: TYPE_NORMAL
- en: I hit my first $100K month last week.
  prefs: []
  type: TYPE_NORMAL
- en: I’m not going to hit that this month unless I actively try, but I need to rest.
  prefs: []
  type: TYPE_NORMAL
- en: That being said, hitting $100K means that my baseline has increased.
  prefs: []
  type: TYPE_NORMAL
- en: This seems to always happen after a period of tactical stress.
  prefs: []
  type: TYPE_NORMAL
- en: 'Tactical stress:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The conscious decision to put yourself in a do or die situation – knowing that
    you have the skill to make it work – and will accept nothing less than success.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [May 13, 2022](https://twitter.com/thedankoe/status/1525117916538097666?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I will force myself to launch a product or promotion, make it public, and have
    to get it done or else I would be a public failure.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve done this once a year, and I would attribute a majority of my growth to
    it. Most people get stuck in dreamland and never publish the project they’ve been
    building.
  prefs: []
  type: TYPE_NORMAL
- en: That being said, lifestyle creep can be a real thing.
  prefs: []
  type: TYPE_NORMAL
- en: You’ll hit a high month, something you never could’ve imagined, and celebrate
    by making a big purchase.
  prefs: []
  type: TYPE_NORMAL
- en: Meaning, you increased your baseline lifestyle demands.
  prefs: []
  type: TYPE_NORMAL
- en: More stuff = more responsibility = more resources being utilized = less resources
    to go towards business = lower monthly income = difficulty sustaining that lifestyle.
  prefs: []
  type: TYPE_NORMAL
- en: If your lifestyle demands increases with your income, you’re not going to have
    a good time.
  prefs: []
  type: TYPE_NORMAL
- en: 7) Leverage Your Time, Then Your Mind
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Earn with your mind, not with your time.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Naval (@naval) [December 17, 2019](https://twitter.com/naval/status/1206967499838803968?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Manual labor implies that there is a limit on how much you can work, meaning
    there is a limit on how much you can make.
  prefs: []
  type: TYPE_NORMAL
- en: The highest-paid earners are the strategists, visionaries, and innovators of
    the world.
  prefs: []
  type: TYPE_NORMAL
- en: Yes, even if they don’t start a billion-dollar company.
  prefs: []
  type: TYPE_NORMAL
- en: A $1M/year one-person business demands creativity, leverage, and productization.
  prefs: []
  type: TYPE_NORMAL
- en: My goal is to have products and digital real estate in place to the point where
    I can spend ALL of my time writing. No-code tools, automations, and social media
    handles the rest.
  prefs: []
  type: TYPE_NORMAL
- en: Unless you have ample cash flow to invest in audience growth or traffic acquisition
    (people) you’re going to have to spend time building that cash flow with a service
    business.
  prefs: []
  type: TYPE_NORMAL
- en: Once you’ve built digital leverage through audience growth, have gotten results
    with your service, and are ready to productize… that’s where the real fun begins.
  prefs: []
  type: TYPE_NORMAL
- en: Most people get stuck in the feast or famine client business because they don’t
    use their mind. They don’t realize the value of digital leverage, don’t grow,
    and spend their time in an endless cycle of cold DMs and emails.
  prefs: []
  type: TYPE_NORMAL
- en: Build an audience. Build an email list. Build a list of buyers.
  prefs: []
  type: TYPE_NORMAL
- en: Build distribution, then build whatever you want.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Jack Butcher (@jackbutcher) [May 22, 2021](https://twitter.com/jackbutcher/status/1395945544430854144?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: That’s digital leverage. Once they’re big enough, build whatever you want.
