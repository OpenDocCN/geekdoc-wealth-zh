- en: The Delusion Of Hard Work (And Why It Won’t Make You Rich)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-7-traits-of-the-irreplaceable-how-to-secure-your-future/](https://thedankoe.com/letters/the-7-traits-of-the-irreplaceable-how-to-secure-your-future/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You can work hard at anything but that doesn’t mean it’s useful to the progress
    of humanity.
  prefs: []
  type: TYPE_NORMAL
- en: This is the delusion of hard work.
  prefs: []
  type: TYPE_NORMAL
- en: You can put 4 years of work into getting a degree.
  prefs: []
  type: TYPE_NORMAL
- en: You can put 10 years of work into climbing a corporate ladder.
  prefs: []
  type: TYPE_NORMAL
- en: And still, you won’t be paid anywhere close to what you want.
  prefs: []
  type: TYPE_NORMAL
- en: So, rather than taking your future into their own hands, you whine and complain.
  prefs: []
  type: TYPE_NORMAL
- en: “I deserve to be paid more!”
  prefs: []
  type: TYPE_NORMAL
- en: “I’ve spent 14 years working hard and this is all I get for it?”
  prefs: []
  type: TYPE_NORMAL
- en: “I barely have any time for my family. I don’t have enough to take a vacation.
    I slave away with no light at the end of the tunnel.”
  prefs: []
  type: TYPE_NORMAL
- en: 'The complainers of the world are missing one crucial piece of the puzzle:'
  prefs: []
  type: TYPE_NORMAL
- en: The labor theory of value is that you should be paid for the amount of work
    you do.
  prefs: []
  type: TYPE_NORMAL
- en: To feel as if you have jumped through hoops.
  prefs: []
  type: TYPE_NORMAL
- en: To feel like you deserve something.
  prefs: []
  type: TYPE_NORMAL
- en: But that’s not how reality works.
  prefs: []
  type: TYPE_NORMAL
- en: Money is a unit of value. Value is a measure of how much people care about what
    you do.
  prefs: []
  type: TYPE_NORMAL
- en: How valuable you are = the magnitude of problems you solve, the results of the
    solutions you create, and your ability to get people to care about your creation.
  prefs: []
  type: TYPE_NORMAL
- en: If you aren’t happy with how much you make, it may be time to take a brutally
    honest look at what you contribute to the world.
  prefs: []
  type: TYPE_NORMAL
- en: It does not make sense to pay someone based on the amount of work they do. It
    does make sense to pay someone based on the level of problem they solve.
  prefs: []
  type: TYPE_NORMAL
- en: Why?
  prefs: []
  type: TYPE_NORMAL
- en: I can work hard for 1 year at writing to become an author, but 1 year isn’t
    enough to justify $100,000 of compensation.
  prefs: []
  type: TYPE_NORMAL
- en: You only make as much money as other people *care* about *what you’ve done*
    within that year. That is, how your creation benefits them so that they use it
    to solve a problem, change their life, and bring progress to humanity.
  prefs: []
  type: TYPE_NORMAL
- en: Complaining about not being paid enough is not going to get you paid. In fact,
    it will probably get you fired or ignored. Or just hated by anyone you come into
    contact with because they are thinking, “Ok… what are you going to *do* about
    it?”
  prefs: []
  type: TYPE_NORMAL
- en: The only option is to take matters into your own hands.
  prefs: []
  type: TYPE_NORMAL
- en: The Irreplaceable Individual
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1890">![](../Images/c012ee1b1f0aeb4fecf474495b41c16b.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: You are worried about what will be relevant 20 years from now because you are
    dependent on everyone but yourself for your success.
  prefs: []
  type: TYPE_NORMAL
- en: Successful people aren’t worried because they understand what makes anyone successful.
  prefs: []
  type: TYPE_NORMAL
- en: The highest-paid earners are the visionaries, strategists, and innovators of
    the world.
  prefs: []
  type: TYPE_NORMAL
- en: The highest-paid earners are not those who work hard, nor smart, but leveraged.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to secure your future, you need the traits that allow you to succeed
    in any environment.
  prefs: []
  type: TYPE_NORMAL
- en: 'These traits comprise The Irreplaceable Individual:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Self-experimentation** – how to solve complex problems through trial and
    error and come to your own conclusions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Self-reflection** – how to understand the motives of your mind, so you can
    understand the motives of others.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Self-development** – cultivating a valuable mindset and skillset that can
    help others.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Self-reliance** – how to get what you want by taking responsibility for the
    outcome of your life.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Self-education** – the ability to gather, make sense of, and utilize information
    on an unknown subject.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Self-sufficiency** – the ability to sustain one’s ideal lifestyle and acquire
    the resources necessary to do so.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Self-mastery** – an unwavering dedication to the process of navigating reality.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When you master yourself, you master the world.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to become irreplaceable, you are required to become valuable.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to become well-paid, you must convince people to see that value.
  prefs: []
  type: TYPE_NORMAL
- en: The perception of value changes as the world does.
  prefs: []
  type: TYPE_NORMAL
- en: With the advent of AI, we may not know what the future of value looks like,
    but we do know that there will be value.
  prefs: []
  type: TYPE_NORMAL
- en: Humans may not be paid in dollars, but may still be paid in prestige, status,
    and anything else that will run the human economy.
  prefs: []
  type: TYPE_NORMAL
- en: Money as dollars may not persist, but the ability to profit from your creations
    will.
  prefs: []
  type: TYPE_NORMAL
- en: How To Secure Your Future
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Your skill set isn’t valuable if nobody knows or cares about it.
  prefs: []
  type: TYPE_NORMAL
- en: There are 2 issues here.
  prefs: []
  type: TYPE_NORMAL
- en: If nobody knows about what you create, it isn’t valuable.
  prefs: []
  type: TYPE_NORMAL
- en: If nobody cares about your create, it isn’t valuable.
  prefs: []
  type: TYPE_NORMAL
- en: In business, you need a product and group of people who care about that product
    enough to buy it.
  prefs: []
  type: TYPE_NORMAL
- en: You can place your product in front of people on the internet, but if they can’t
    see why it benefits their lives, they won’t care about it.
  prefs: []
  type: TYPE_NORMAL
- en: You can have what you believe is the most valuable product, but if you don’t
    place it in front of people, they don’t have a chance to care about it.
  prefs: []
  type: TYPE_NORMAL
- en: In relationships, you can place yourself in front of a group of potential partners,
    but if they can’t see where you fit into their life, they won’t care about you.
  prefs: []
  type: TYPE_NORMAL
- en: You can believe you are the most developed individual, but if you sit inside
    all day, potential partners don’t have a chance to care about you.
  prefs: []
  type: TYPE_NORMAL
- en: 1) Become An Entrepreneur
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You only gain full control over your time and income when you realize that entrepreneurship
    is the only path to do so.
  prefs: []
  type: TYPE_NORMAL
- en: At a job, you are not in charge of the product, the tasks you are assigned,
    or the customer acquisition process.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, your employer is in charge of everything that pays the bills.
    Therefore they are in charge of your entire life.
  prefs: []
  type: TYPE_NORMAL
- en: Some are more lenient then others yes, and there’s nothing wrong with a temporary
    job, but I am writing to those who want to eventually be free.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Build Distribution
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There is one big trap in entrepreneurship.
  prefs: []
  type: TYPE_NORMAL
- en: I fell into it 7 times.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why I failed at 7 business models when starting.
  prefs: []
  type: TYPE_NORMAL
- en: I was so enamored by the skill I was learning. I just wanted to build projects
    all day. I loved being the architect of the business.
  prefs: []
  type: TYPE_NORMAL
- en: Website, landing page, logo, portfolio, but rarely did I try to actually get
    customers. You know… the one’s that pay you.
  prefs: []
  type: TYPE_NORMAL
- en: When I did start learning to get customers, it was manual outreach or paid ads.
    Think cold email, cold DMs, and Facebook ads that I didn’t have the money to run.
  prefs: []
  type: TYPE_NORMAL
- en: Times are different.
  prefs: []
  type: TYPE_NORMAL
- en: You have the ability to build an audience of potential buyers by becoming a
    one-person media company.
  prefs: []
  type: TYPE_NORMAL
- en: Everyone is on social media. That’s where the attention is right now. Your customers
    aren’t looking at the TV. Your customers aren’t listening to the radio. Your customers
    aren’t reading the newspaper.
  prefs: []
  type: TYPE_NORMAL
- en: Your job is to place your business where the attention is right now. That may
    change in the future, but not any time soon. And when it does, you must be adaptable.
  prefs: []
  type: TYPE_NORMAL
- en: Building an audience with education, inspiration, and entertainment through
    content is the best way to start a business these days.
  prefs: []
  type: TYPE_NORMAL
- en: You get to prove your value in public, attract a following you don’t have to
    pay for, and put a product in front of them so you can get paid to do what you
    want.
  prefs: []
  type: TYPE_NORMAL
- en: Study those who are doing what you want to do. I guarantee they are posting
    on social media, building a name for themselves, and selling something (because
    they aren’t selling something for someone else anymore).
  prefs: []
  type: TYPE_NORMAL
- en: 3) Learn To Write
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The greatest skill of an irreplaceable individual is writing.
  prefs: []
  type: TYPE_NORMAL
- en: 'It knocks out 3 birds with one stone:'
  prefs: []
  type: TYPE_NORMAL
- en: It teaches you to articulate your value from reader feedback.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It is the foundation of media (how to build distribution by getting your writing
    shared).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It is the morning habit that builds any project you build.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Posts, threads, emails, outlines, modules, advertisements, direct messages,
    books, video scripts, and the rest all start with writing.
  prefs: []
  type: TYPE_NORMAL
- en: Another bonus is that writing is a meta-skill.
  prefs: []
  type: TYPE_NORMAL
- en: By meta-skill, I mean you can start without experience and stack skills underneath
    it.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need to show your body. You don’t need to have an English degree.
    You write every day with texts and messages.
  prefs: []
  type: TYPE_NORMAL
- en: With speaking or video, you need editing skills and the confidence to not stumble
    over your words. You need to think on the fly.
  prefs: []
  type: TYPE_NORMAL
- en: Writing teaches you to think clearly in the comfort of your own home (or coffee
    shop).
  prefs: []
  type: TYPE_NORMAL
- en: This is why I recommend starting your journey on X/Twitter.
  prefs: []
  type: TYPE_NORMAL
- en: Once you’ve got the hand of growing distribution (your audience) you start a
    newsletter to double your impact. Then, you build a written product and monetize
    that.
  prefs: []
  type: TYPE_NORMAL
- en: By the way, we hold your hand through this process inside [Kortex University](https://university.kortex.co)
    as you progress through The Synthesizer, Authority, and Builder tiers.
  prefs: []
  type: TYPE_NORMAL
- en: 4) Learn To Sell
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1891">![](../Images/ac1bfba431df1f9c151cab7663940027.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Sales = survival.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t sell your own product, you will be forced to sell someone else’s.
  prefs: []
  type: TYPE_NORMAL
- en: You can complain all day about how “everyone is selling something nowadays,”
    but you are missing the point behind that.
  prefs: []
  type: TYPE_NORMAL
- en: Yes, everyone is selling something because they have to if they (1) want to
    survive (2) contribute to humanity and (3) receive money in return.
  prefs: []
  type: TYPE_NORMAL
- en: 'Another point:'
  prefs: []
  type: TYPE_NORMAL
- en: People only invest in what they care about.
  prefs: []
  type: TYPE_NORMAL
- en: Sales and persuasion go hand in hand.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t learn to sell, you will be disappointed when you put your product
    in front of a crowd of crickets.
  prefs: []
  type: TYPE_NORMAL
- en: Sales is how you persuade people to see the value in what you have to offer.
    Persuasion is inspiring people to make a good decision for their life.
  prefs: []
  type: TYPE_NORMAL
- en: The sales process is not inherently sleazy.
  prefs: []
  type: TYPE_NORMAL
- en: It is guiding people through a story, because that’s how humans relate and determine
    value.
  prefs: []
  type: TYPE_NORMAL
- en: You make them aware of a problem.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You make them realize how that problem will impact their life if it goes unsolved.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You introduce a solution (your product) that can solve that problem.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You show them proof that change is possible with testimonials or personal experience.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Give them the clarity to act and continue on a new path.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: That’s how you write a landing page, run a “sales” call, direct message people,
    or get people to read your newsletter like I did here.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t like sales, you may not realize that you are selling people on
    your beliefs, ideas, and worldview every single day.
  prefs: []
  type: TYPE_NORMAL
- en: Flip the switch from mindlessly manipulating people to mindfully helping people.
  prefs: []
  type: TYPE_NORMAL
- en: 5) Learn To Build
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Learn to sell. Learn to build. If you can do both, you will be unstoppable.
    – Naval
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Every day, set aside one hour to build a project that actualizes your ideal
    future.
  prefs: []
  type: TYPE_NORMAL
- en: That is the only way to escape building projects for someone else.
  prefs: []
  type: TYPE_NORMAL
- en: To build, you need technical know-how.
  prefs: []
  type: TYPE_NORMAL
- en: You must either learn to code or learn to use the technology available to you.
  prefs: []
  type: TYPE_NORMAL
- en: What used to take 10 people now takes 1.
  prefs: []
  type: TYPE_NORMAL
- en: What used to take 10 hours now takes 1.
  prefs: []
  type: TYPE_NORMAL
- en: What used to take 10 dollars now takes 1.
  prefs: []
  type: TYPE_NORMAL
- en: You live in a beautiful time where humans can leverage technology to build what
    they want.
  prefs: []
  type: TYPE_NORMAL
- en: Website builders, email marketing software, AI, social media, course builders,
    and more.
  prefs: []
  type: TYPE_NORMAL
- en: It is your job to create and distribute value by learning and building on the
    internet.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you don’t know what to build, start with:'
  prefs: []
  type: TYPE_NORMAL
- en: What you already use, but make it better
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A problem you’ve solved in your life
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Building what you want to see in the world
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We discussed this in [last weeks letter.](https://thedankoe.com/letters/the-future-proof-skill-stack-learn-in-this-order/)
  prefs: []
  type: TYPE_NORMAL
- en: Turn your adversity into a good story. Turn your story into a brand. Turn your
    journey into a product.
  prefs: []
  type: TYPE_NORMAL
- en: Enjoy the fruits of your labor and the rest of your day.
  prefs: []
  type: TYPE_NORMAL
- en: Dan
  prefs: []
  type: TYPE_NORMAL
