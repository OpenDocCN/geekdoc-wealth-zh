- en: 'Mental Aesthetics: How To Build A Beautiful Mind'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/mental-aesthetics-how-to-build-a-beautiful-mind/](https://thedankoe.com/letters/mental-aesthetics-how-to-build-a-beautiful-mind/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: One of the best compliments you can get is “I like the way your mind works.”
  prefs: []
  type: TYPE_NORMAL
- en: And when I was young, I always envied those more intelligent than me.
  prefs: []
  type: TYPE_NORMAL
- en: How did they do it?
  prefs: []
  type: TYPE_NORMAL
- en: How did they articulate their thoughts so well?
  prefs: []
  type: TYPE_NORMAL
- en: How did they say what I’ve been thinking for years but couldn’t string into
    words?
  prefs: []
  type: TYPE_NORMAL
- en: How did they hold high-level conversations with a sense of understanding that
    leaves you feeling awestruck, but like you are so far below them on the level
    of knowledge?
  prefs: []
  type: TYPE_NORMAL
- en: I’ve tried to emulate the voice of the stoics, ancients, and modern masters.
    Soon I realized that language evolved for a reason. We have a more diverse toolset
    to pierce through the noise and acquire truth.
  prefs: []
  type: TYPE_NORMAL
- en: The poeticism of Watts.
  prefs: []
  type: TYPE_NORMAL
- en: The pithy advice of Seneca.
  prefs: []
  type: TYPE_NORMAL
- en: The crypticism of Nietsche.
  prefs: []
  type: TYPE_NORMAL
- en: The elegance of Peterson.
  prefs: []
  type: TYPE_NORMAL
- en: There was a gravity to their words that stuck in the back of my head.
  prefs: []
  type: TYPE_NORMAL
- en: In reflection, it led me to where I am today.
  prefs: []
  type: TYPE_NORMAL
- en: I always wanted to do something creative.
  prefs: []
  type: TYPE_NORMAL
- en: I knew that I didn’t want to earn a living from my body, or my time for that
    matter. I had to earn with my mind.
  prefs: []
  type: TYPE_NORMAL
- en: This led me down a brutal path of life and business failures that led to the
    discovery and cultivation of high-value skills.
  prefs: []
  type: TYPE_NORMAL
- en: Design, marketing, sales, technology, programming, writing, film, and more that
    trained my mind for creative problem-solving.
  prefs: []
  type: TYPE_NORMAL
- en: 'Today, I am grateful to say that I can earn a living and sustain a high quality
    of life by moving two levers: the inputs and outputs of my mind.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In this letter, I want to discuss 4 big ideas:'
  prefs: []
  type: TYPE_NORMAL
- en: Your mental body and how it rules your life.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: How mental bodybuilding is your path to intelligence.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Why mental real estate is the most valuable resource.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: How to monetize your mind to create your own source of income.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Mental aesthetics is your master key to the doors of the good life.
  prefs: []
  type: TYPE_NORMAL
- en: I – The Mental Body
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the book Psycho-Cybernetics by Maxwell Waltz, there’s a phenomenon that surgery
    patients radically change their lives after changing their physical appearance.
  prefs: []
  type: TYPE_NORMAL
- en: Many patients went on to achieve their wildest dreams.
  prefs: []
  type: TYPE_NORMAL
- en: The dreams they didn’t think were possible before, even if the “blemish” that
    held them back was as simple as a bump on their nose (that was unnoticeable to
    the average eye).
  prefs: []
  type: TYPE_NORMAL
- en: But it wasn’t the physical appearance that made the difference.
  prefs: []
  type: TYPE_NORMAL
- en: It was the change in self-image.
  prefs: []
  type: TYPE_NORMAL
- en: A change in the body they held as a mental construct, one that often didn’t
    reflect their physical appearance.
  prefs: []
  type: TYPE_NORMAL
- en: This brings up the principle of expectations vs reality.
  prefs: []
  type: TYPE_NORMAL
- en: Humans tend to latch onto thoughts, ideas, and beliefs to make sense of the
    world and aid their survival.
  prefs: []
  type: TYPE_NORMAL
- en: We hold an *idea* of the past or future in our mind, and if present reality
    doesn’t match, tension is the result.
  prefs: []
  type: TYPE_NORMAL
- en: Tension narrows the mind and creates stress.
  prefs: []
  type: TYPE_NORMAL
- en: It prevents you from seeing the world as it is, because it isn’t *supposed*
    to be anything other than what it’s being.
  prefs: []
  type: TYPE_NORMAL
- en: When we hold an image of who we think we are in our mind, even when we’ve never
    directly seen our own face outside of external reflections, anything that challenges
    that image is seen as a threat.
  prefs: []
  type: TYPE_NORMAL
- en: Even fitness models voted to have the most aesthetic physique in the eyes of
    the masses have body dysmorphia.
  prefs: []
  type: TYPE_NORMAL
- en: '*Hell, even I have body dysmorphia after being in the gym for 10 years.*'
  prefs: []
  type: TYPE_NORMAL
- en: The image of who they are does not match their appearance.
  prefs: []
  type: TYPE_NORMAL
- en: This influences how we perceive and interpret the world around us.
  prefs: []
  type: TYPE_NORMAL
- en: Something as simple as the idea of an unhealthy meal can send a fitness model
    into an emotional spiral of rage, self-hatred due to a past binge, and the urge
    to preach that all people should abide by the diet ideology that they subscribe
    to.
  prefs: []
  type: TYPE_NORMAL
- en: The same holds true for everything we think we are.
  prefs: []
  type: TYPE_NORMAL
- en: From religious beliefs to budgeting techniques to the business models and jobs
    that allow us to survive, our identity turns sour when we create permanence in
    our minds that does not match the impermanence of life.
  prefs: []
  type: TYPE_NORMAL
- en: I.i – Conceptual Survival
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As above, so below.
  prefs: []
  type: TYPE_NORMAL
- en: Humans survive on both the physical and mental planes of existence.
  prefs: []
  type: TYPE_NORMAL
- en: Yes, if there is a bear charging towards you, your life flashes before your
    eyes.
  prefs: []
  type: TYPE_NORMAL
- en: But even then, I would argue that humans only survive on the mental plane of
    existence.
  prefs: []
  type: TYPE_NORMAL
- en: When a bear charges toward you, you aren’t *really* worried about your physical
    body. You’re worried about the idea of it.
  prefs: []
  type: TYPE_NORMAL
- en: You’re also worried about the friends, family, career, and whatever other idea
    you will lose that flood your mind in time before your life ends.
  prefs: []
  type: TYPE_NORMAL
- en: Your “self” is what you are trying to survive.
  prefs: []
  type: TYPE_NORMAL
- en: And if it’s threatened, you feel it.
  prefs: []
  type: TYPE_NORMAL
- en: If you are attached to a sports team and someone says that team sucks, how do
    you feel?
  prefs: []
  type: TYPE_NORMAL
- en: If you are subscribed to a specific religion and someone tells you theirs is
    better, how do you feel? Do you want to replicate what’s in your mind into theirs
    through communication so your mental offspring can survive in hopes that you convert
    them?
  prefs: []
  type: TYPE_NORMAL
- en: If you identify as a coffee drinker and run out of coffee, is your day ruined?
  prefs: []
  type: TYPE_NORMAL
- en: In reality, all is well.
  prefs: []
  type: TYPE_NORMAL
- en: You aren’t in true danger, and your physical body changes on a cellular level
    every second. You are not your body, because your body is 100% different than
    it was 7 years ago. You are consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: When you attempt to make anything permanent you increase the chances of suffering.
  prefs: []
  type: TYPE_NORMAL
- en: To play the game of life you must choose what is worth suffering for and dedicate
    your life to that.
  prefs: []
  type: TYPE_NORMAL
- en: Successful people use their emotions. Unsuccessful people are used by them.
  prefs: []
  type: TYPE_NORMAL
- en: 'I.ii – The Lesson: Releasing Concepts'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Self-development is cognitive development.
  prefs: []
  type: TYPE_NORMAL
- en: To develop, expand, and grow yourself – not to be confused with *inflating*
    your ego – you must release the ideas that prevent you from rising up like sandbags
    tied to a hot air balloon.
  prefs: []
  type: TYPE_NORMAL
- en: When you feel tension, stress, or negative emotions arise you must train yourself
    to pause.
  prefs: []
  type: TYPE_NORMAL
- en: This is a lifelong pursuit of mindfulness.
  prefs: []
  type: TYPE_NORMAL
- en: It is a habit that must be adopted to achieve the good life.
  prefs: []
  type: TYPE_NORMAL
- en: It is not optional.
  prefs: []
  type: TYPE_NORMAL
- en: When you pause, identify both the expectation in your mind and the reality of
    the situation.
  prefs: []
  type: TYPE_NORMAL
- en: We don’t want to be at war with life, we want to be at one with it.
  prefs: []
  type: TYPE_NORMAL
- en: We don’t want to fight with it, but flow with it.
  prefs: []
  type: TYPE_NORMAL
- en: Let go of the irrational beliefs that hold you back and act regardless of how
    you feel, because you can.
  prefs: []
  type: TYPE_NORMAL
- en: II – Mental Bodybuilding
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When most people have a sense of self that is the product of the external world,
    you have the chance to peel back the layers. You can build a self that is a conscious,
    personal creation that works less, earns more, and enjoys life. – [The Art Of
    Focus](https://theartoffocusbox.com)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The highest-paid individuals are the strategists, visionaries, and true creatives
    of the world.
  prefs: []
  type: TYPE_NORMAL
- en: The most fulfilled individuals are the ones who have control over their minds.
  prefs: []
  type: TYPE_NORMAL
- en: The people who get what they want have developed a self that makes their ideal
    future inevitable.
  prefs: []
  type: TYPE_NORMAL
- en: Your “self” is an idea.
  prefs: []
  type: TYPE_NORMAL
- en: A concept.
  prefs: []
  type: TYPE_NORMAL
- en: A set of beliefs that are conditioned into your mind through learning. And when
    we are young, we absorb external information like a sponge.
  prefs: []
  type: TYPE_NORMAL
- en: This information is often passed down by your parents who were influenced by
    society, the government, and culture – especially if they don’t question those
    beliefs.
  prefs: []
  type: TYPE_NORMAL
- en: This is exactly how you live a mediocre life.
  prefs: []
  type: TYPE_NORMAL
- en: By doing what everyone else tells you to do.
  prefs: []
  type: TYPE_NORMAL
- en: By letting your attention be stolen from you.
  prefs: []
  type: TYPE_NORMAL
- en: By waking up one day after doing exactly what you were told would lead to happiness,
    but only having unhappiness to show for it.
  prefs: []
  type: TYPE_NORMAL
- en: Mental bodybuilding is the act of chiseling your psychic body to the point of
    ideal outcomes in health, wealth, relationships, and happiness.
  prefs: []
  type: TYPE_NORMAL
- en: To craft your ideal mental physique, accept that the path will be painful.
  prefs: []
  type: TYPE_NORMAL
- en: Right now “you” are a blob of limitations that were projected on you.
  prefs: []
  type: TYPE_NORMAL
- en: Your job is to become aware of these limitations, release them, and increase
    your complexity of self.
  prefs: []
  type: TYPE_NORMAL
- en: “Complexity of self” is the knowledge, skill, and beliefs you have that determines
    the amount of clarity you can generate as you navigate life.
  prefs: []
  type: TYPE_NORMAL
- en: A clear mind is an asset in an unclear world.
  prefs: []
  type: TYPE_NORMAL
- en: Clarity, or making sense, or ordered consciousness is the prime ingredient for
    life enjoyment.
  prefs: []
  type: TYPE_NORMAL
- en: The problem is that most people are anxious, overwhelmed, and uncertain when
    it comes to doing what they want.
  prefs: []
  type: TYPE_NORMAL
- en: II.i – Information Metabolism
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Life is experience and experience is information.
  prefs: []
  type: TYPE_NORMAL
- en: Your mind dictates your quality of life because your development dictates how
    you process information, or how you process life.
  prefs: []
  type: TYPE_NORMAL
- en: When you are overwhelmed with information, you feel anxious.
  prefs: []
  type: TYPE_NORMAL
- en: When you are underwhelmed with information, you feel bored.
  prefs: []
  type: TYPE_NORMAL
- en: To maximize the flow of information, think of your mind as the digestive system
    of reality.
  prefs: []
  type: TYPE_NORMAL
- en: If you eat too much or don’t move enough, you won’t metabolize that experience.
  prefs: []
  type: TYPE_NORMAL
- en: If you eat too little or move too much, you get hungry and agitated.
  prefs: []
  type: TYPE_NORMAL
- en: When you eat just enough, you create an environment that is conducive to mental
    muscle growth. You trek through reality toward your goals. You enter a season
    of pure progress, and the feeling is incredible.
  prefs: []
  type: TYPE_NORMAL
- en: II.ii – Bulking & Cutting
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In fitness, you build muscle by creating an environment conducive to muscle
    growth.
  prefs: []
  type: TYPE_NORMAL
- en: You need ample food, sleep, intensity of training, and consistency.
  prefs: []
  type: TYPE_NORMAL
- en: You will gain a bit of fat along the way. This is inevitable if you want to
    see noticeable results.
  prefs: []
  type: TYPE_NORMAL
- en: At some point, you start feeling off.
  prefs: []
  type: TYPE_NORMAL
- en: You feel groggy and slow, and you don’t like how soft you look in the mirror.
  prefs: []
  type: TYPE_NORMAL
- en: To reveal the newly built muscle, you change your environment to reflect your
    new goal.
  prefs: []
  type: TYPE_NORMAL
- en: You decrease the amount of food you eat – or increase the amount of training
    you do – in a way that maintains the muscle you’ve built in your bulking phase.
  prefs: []
  type: TYPE_NORMAL
- en: '**A key point:**'
  prefs: []
  type: TYPE_NORMAL
- en: '*You need a conscious goal for each chapter of life.*'
  prefs: []
  type: TYPE_NORMAL
- en: A goal provides both vision and a narrative that orders your mind.
  prefs: []
  type: TYPE_NORMAL
- en: The two main themes of a chapter will be consistency or intensity.
  prefs: []
  type: TYPE_NORMAL
- en: A goal, vision, and narrative for your life provides you with a perceptual filter
    to digest the right information. We can think of these as the mechanisms for nutrient
    partitioning.
  prefs: []
  type: TYPE_NORMAL
- en: When you utilize the right parts of the information you consume, you build muscle
    faster than you would otherwise.
  prefs: []
  type: TYPE_NORMAL
- en: To build your mental physique, you must push the boundaries of the unknown.
  prefs: []
  type: TYPE_NORMAL
- en: Try new things, fly across the country, start the business, and flood yourself
    with information so you can filter the insight that allows you to do those things
    well.
  prefs: []
  type: TYPE_NORMAL
- en: When you hit a wall, peel back.
  prefs: []
  type: TYPE_NORMAL
- en: Rest, recover, and shed your mind of the fat you’ve acquired along the way through
    awareness and understanding.
  prefs: []
  type: TYPE_NORMAL
- en: It’s okay to take a break after a chapter of progress.
  prefs: []
  type: TYPE_NORMAL
- en: II.iii – Training The Mind
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Short-form content is the current language of the internet.
  prefs: []
  type: TYPE_NORMAL
- en: The average individual has trained their mind to think small, remain narrow,
    and have difficulty seeing into a positive future.
  prefs: []
  type: TYPE_NORMAL
- en: Training your mind is training your the idea of your self.
  prefs: []
  type: TYPE_NORMAL
- en: Your self, or identity, is limited by your worldview.
  prefs: []
  type: TYPE_NORMAL
- en: To expand who we are to the point of vast knowledge, experience, and expertise
    we must expand our minds beyond superficial pleasures and problems.
  prefs: []
  type: TYPE_NORMAL
- en: Read longer books. Listen to longer podcasts. Have deeper conversations with
    those close to you.
  prefs: []
  type: TYPE_NORMAL
- en: Break out of the mindless cycle of circulating the ideas of sex, money, and
    indulgence without a philosophical backbone of mastery.
  prefs: []
  type: TYPE_NORMAL
- en: Remember, you need a goal for your life.
  prefs: []
  type: TYPE_NORMAL
- en: An aim.
  prefs: []
  type: TYPE_NORMAL
- en: Something to move towards and align your decision-making with.
  prefs: []
  type: TYPE_NORMAL
- en: This will be useful for your mental output.
  prefs: []
  type: TYPE_NORMAL
- en: Consumption can only go so far without creation.
  prefs: []
  type: TYPE_NORMAL
- en: It’s like over-eating without lifting. Most of it will be stored as fat. You
    don’t utilize the nutrients to their maximum effect.
  prefs: []
  type: TYPE_NORMAL
- en: Reading, listening, and consuming must be balanced with writing, speaking, and
    building a product that contributes to humanity. That is how you find connection
    and fulfillment.
  prefs: []
  type: TYPE_NORMAL
- en: We will tie all of this together into practical steps at the end of this letter.
    Stay with me.
  prefs: []
  type: TYPE_NORMAL
- en: II.iv – Meaningful Events
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When the flow of information is maximized in your life through the balance of
    consumption and creation, you will encounter meaningful events.
  prefs: []
  type: TYPE_NORMAL
- en: You will *feel* a deep sense of excitement for the future, fulfillment in the
    present, and gratitude for the past.
  prefs: []
  type: TYPE_NORMAL
- en: These feelings should be seen as an opportunity to document the important parts
    of your life that you can share with others.
  prefs: []
  type: TYPE_NORMAL
- en: When you read a good book and stumble across a lesson that sparks excitement,
    write it down.
  prefs: []
  type: TYPE_NORMAL
- en: When you feel fulfilled in the present because of the progress you are making,
    write it down.
  prefs: []
  type: TYPE_NORMAL
- en: When you feel grateful that your past has led you to this moment, despite your
    mistakes, write it down.
  prefs: []
  type: TYPE_NORMAL
- en: As your notes of signal grow, you have data from which you can replicate those
    experiences.
  prefs: []
  type: TYPE_NORMAL
- en: You can condition your mind to occupy these states of consciousness as a baseline.
  prefs: []
  type: TYPE_NORMAL
- en: Your quality of life increases to a point of high stability.
  prefs: []
  type: TYPE_NORMAL
- en: 'II.v – The Lesson: Explore The Unknown'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You aren’t where you want to be because you’ve been where you are for a bit
    too long.
  prefs: []
  type: TYPE_NORMAL
- en: The way you expand your mind (and potential) is by solving the problems that
    stand in the way of your goals.
  prefs: []
  type: TYPE_NORMAL
- en: Your goals lie in the unknown.
  prefs: []
  type: TYPE_NORMAL
- en: The *thought* of the unknown creates tension and fear.
  prefs: []
  type: TYPE_NORMAL
- en: What is it costing you to put off solving the problems in your life?
  prefs: []
  type: TYPE_NORMAL
- en: Person 1 decides to solve the problem in a day.
  prefs: []
  type: TYPE_NORMAL
- en: Person 2 decides to put up with the pain of stagnation and either solve it in
    a month, or not at all.
  prefs: []
  type: TYPE_NORMAL
- en: Person 1 will achieve 30 goals by the time person 2 achieves 1.
  prefs: []
  type: TYPE_NORMAL
- en: You hate your job, but its pain is not stronger than your fear of the unknown,
    so you don’t pursue the goal of doing your own thing.
  prefs: []
  type: TYPE_NORMAL
- en: You hate where you live, but not enough to do what’s required to move out.
  prefs: []
  type: TYPE_NORMAL
- en: You hate your partner, but not enough to develop a bit of self-respect.
  prefs: []
  type: TYPE_NORMAL
- en: Snap out of your narrow way of living.
  prefs: []
  type: TYPE_NORMAL
- en: Fall in love with the lessons you learn from relentlessly pursuing your goals.
  prefs: []
  type: TYPE_NORMAL
- en: III – Mental Real Estate
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Whether they be positive or negative, the ideas that occupy the collective mental
    real estate will influence the progress we make as a species. The future belongs
    to those that can capture and hold attention with valuable information for the
    most amount of time possible. – [The Art Of Focus](https://theartoffocusbox.com)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Who wrote the code in your head?
  prefs: []
  type: TYPE_NORMAL
- en: That is to say, who fed you the information, ideas, beliefs, perspectives, and
    worldviews that create your sense of self?
  prefs: []
  type: TYPE_NORMAL
- en: Let’s consider your “self” as an intellectual construct.
  prefs: []
  type: TYPE_NORMAL
- en: A psychic body.
  prefs: []
  type: TYPE_NORMAL
- en: A house that can be occupied, nurtured, or destroyed by the tenants you allow
    to live there rent-free.
  prefs: []
  type: TYPE_NORMAL
- en: In comes the internet.
  prefs: []
  type: TYPE_NORMAL
- en: In comes social media.
  prefs: []
  type: TYPE_NORMAL
- en: Just like that, we have thousands upon thousands of ideas shaping who we are,
    how we act, and what we care about on a daily basis.
  prefs: []
  type: TYPE_NORMAL
- en: Most people don’t even know why they are doing what they are doing.
  prefs: []
  type: TYPE_NORMAL
- en: That alone is a great way to audit your life.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t know *why* you are going to that class, going to that job, marrying
    that person, or doing anything that you do, you did not create yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Sustained long-term focus is a lost art in a distracted world, and it’s wreaking
    havoc on our ability to achieve anything meaningful.
  prefs: []
  type: TYPE_NORMAL
- en: III.i – Flipping The Social Switch
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Social media is the devil if you perceive it that way.
  prefs: []
  type: TYPE_NORMAL
- en: Social media is the vessel for your potential if you perceive it that way.
  prefs: []
  type: TYPE_NORMAL
- en: How you perceive opportunities depends on your self-development.
  prefs: []
  type: TYPE_NORMAL
- en: You won’t see a viral social media post as inspiration if you don’t identify
    as a writer.
  prefs: []
  type: TYPE_NORMAL
- en: You won’t see a business owner’s complaint as a potential lead if you don’t
    identify as a consultant or service business owner.
  prefs: []
  type: TYPE_NORMAL
- en: Most people see cliche advice as “cringe” because they identify as mediocre
    thanks to an abundance of self-deprecating memes occupying their worldview.
  prefs: []
  type: TYPE_NORMAL
- en: '[Social media is the virtual reality to achieve your potential.](https://thedankoe.com/letters/the-value-creator-a-new-internet-career-path-for-intelligent-people/)'
  prefs: []
  type: TYPE_NORMAL
- en: Entrepreneurship is the only logical option for long-term thinkers.
  prefs: []
  type: TYPE_NORMAL
- en: A personal brand is an extension of your character, the self you continue to
    develop.
  prefs: []
  type: TYPE_NORMAL
- en: Your goals are what attract like-minded players.
  prefs: []
  type: TYPE_NORMAL
- en: Your problems, when solved, are how you help others in the form of a product
    or service.
  prefs: []
  type: TYPE_NORMAL
- en: Your ideas are the posts that occupy the mental real estate of your followers
    and shape their sense of self.
  prefs: []
  type: TYPE_NORMAL
- en: Writing and speaking your beautiful mind to the masses through social media
    is how you check the boxes of a fulfilling life.
  prefs: []
  type: TYPE_NORMAL
- en: III.ii – Reproduction Through Spirit
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When you have children, you create a “self.”
  prefs: []
  type: TYPE_NORMAL
- en: Yes, their physical body has your “blood,” but *who they are* is a result of
    the ideas you inject into their mind.
  prefs: []
  type: TYPE_NORMAL
- en: With that knowledge, we are reproducing on a spiritual level every day.
  prefs: []
  type: TYPE_NORMAL
- en: Each conversation you have, idea you spread, or belief you defend is for the
    sake of conceptual survival.
  prefs: []
  type: TYPE_NORMAL
- en: Your sense of self becomes immortal because your ideas live in the minds of
    others. They shape the selves of the world.
  prefs: []
  type: TYPE_NORMAL
- en: This is why writing, speaking, and building a business is so rewarding. You
    feel that sense of connection and fulfillment that comes from impacting lives
    at scale.
  prefs: []
  type: TYPE_NORMAL
- en: III.iii – We Are In A Spiritual War
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Those who occupy the most mental real estate hold the most power in the modern
    world.
  prefs: []
  type: TYPE_NORMAL
- en: Think of James Clear.
  prefs: []
  type: TYPE_NORMAL
- en: Most people are aware of his book Atomic Habits.
  prefs: []
  type: TYPE_NORMAL
- en: If James posted the word “habits,” he would get thousands of likes and reposts.
  prefs: []
  type: TYPE_NORMAL
- en: If anyone else posted that word, even with the same amount of followers, they
    would get much less engagement.
  prefs: []
  type: TYPE_NORMAL
- en: 'This brings up a few lessons:'
  prefs: []
  type: TYPE_NORMAL
- en: '**The longer you hold attention, the more power your ideas hold.** Books will
    always reign supreme. Podcasts and long videos come second. Short content comes
    last. But all have their use cases.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Your ideas must spark positive behavior change.** If you change someone’s
    life, they will credit you over and over for your success. Meaning, your ideas
    spread without people consuming your work.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**When your ideas change lives, you hold attention longer.** If someone is
    forming new habits, James Clear’s ideas will occupy their mind throughout the
    day, which shapes their identity. They become a half-child of Clear.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Short-form writing is for initial attention capture and audience growth. Long-form
    writing is for nurturing the mind and self of the reader.
  prefs: []
  type: TYPE_NORMAL
- en: Both are necessary, but short writing without long writing will trap you in
    a feast or famine cycle. Your ideas will not live in people’s heads for long.
  prefs: []
  type: TYPE_NORMAL
- en: People try to talk about whatever they want online and fail because they don’t
    understand this realization.
  prefs: []
  type: TYPE_NORMAL
- en: If I write a book (this is why I did) I can expand my language online and stop
    relying on “proven” or “high-performing” topics to grow.
  prefs: []
  type: TYPE_NORMAL
- en: But beginners can’t skip this step.
  prefs: []
  type: TYPE_NORMAL
- en: Unless you are a best-selling offer, your content needs to follow an attention
    progression. You must emulate validated ideas (like viral tweets or videos) while
    slowly building authority with long-form media.
  prefs: []
  type: TYPE_NORMAL
- en: When it comes to business, your life’s work, or just writing online it is a
    spiritual war of ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Engagement tactics and growth hacks are helpful to spread your ideas, but will
    those ideas live on through eternity by the selves they create?
  prefs: []
  type: TYPE_NORMAL
- en: III.iv – The Spirituality Of Entrepreneurship
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Self-development is a gateway drug into entrepreneurship because you realize
    that improving others is the next level of improving yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Attention is the root of your being.
  prefs: []
  type: TYPE_NORMAL
- en: It is both reality and your connection to it.
  prefs: []
  type: TYPE_NORMAL
- en: Improving yourself is improving where you focus your attention.
  prefs: []
  type: TYPE_NORMAL
- en: Most people are focused on the next pleasurable experience. Wise people are
    focused on the problems that the pleasure seekers are hiding from.
  prefs: []
  type: TYPE_NORMAL
- en: Find a problem.
  prefs: []
  type: TYPE_NORMAL
- en: Learn how to solve it.
  prefs: []
  type: TYPE_NORMAL
- en: Document how you solved it.
  prefs: []
  type: TYPE_NORMAL
- en: Distill into a replicable process.
  prefs: []
  type: TYPE_NORMAL
- en: Give it to others that want to be helped.
  prefs: []
  type: TYPE_NORMAL
- en: Do it offline and it’s called growth.
  prefs: []
  type: TYPE_NORMAL
- en: Do it online and it’s called business.
  prefs: []
  type: TYPE_NORMAL
- en: 'Spirituality is feeling like you are a part of something greater than yourself.
    It is reuniting with the one thing that has always been: the unity and connection
    of all things.'
  prefs: []
  type: TYPE_NORMAL
- en: Business is spirituality in that you are attempting to raise the collective
    consciousness or development through the exchange of goods.
  prefs: []
  type: TYPE_NORMAL
- en: III.v – Action Steps
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Study that which generates attention.
  prefs: []
  type: TYPE_NORMAL
- en: Psychology, media, design, writing, marketing, sales, persuasion, influence,
    and the mind.
  prefs: []
  type: TYPE_NORMAL
- en: Study yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Your thoughts, emotions, actions, and follow them to their root. What goals,
    problems, and beliefs have others projected on you that led to those thoughts,
    emotions, and actions?
  prefs: []
  type: TYPE_NORMAL
- en: This may sound like a lot, but you have an entire lifetime to make this work,
    no?
  prefs: []
  type: TYPE_NORMAL
- en: What’s the only other option? Distracting yourself with mind-numbing pleasures
    that entrench you in the same boring life?
  prefs: []
  type: TYPE_NORMAL
- en: '*The only pain greater than seeing what you are capable of is not seeing what
    you are capable of.*'
  prefs: []
  type: TYPE_NORMAL
- en: Your education should, and must, reflect that.
  prefs: []
  type: TYPE_NORMAL
- en: IV – Mental Monetization
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It’s 2023.
  prefs: []
  type: TYPE_NORMAL
- en: You have the resources to revamp your education, enhance your skill set, and
    change the source of your income in less time than it would take to get a college
    degree.
  prefs: []
  type: TYPE_NORMAL
- en: But there’s a trap that many fall into.
  prefs: []
  type: TYPE_NORMAL
- en: They attempt to monetize the vane, superficial, or rapid.
  prefs: []
  type: TYPE_NORMAL
- en: They post half-naked pictures just to lose their income source when they can’t
    sustain their unhealthy eating patterns.
  prefs: []
  type: TYPE_NORMAL
- en: They study the algorithm rather than human nature just to lose their income
    when technology changes.
  prefs: []
  type: TYPE_NORMAL
- en: They study the “best business models of 2023” rather than marketing, sales,
    persuasion, and distribution just to lose income when the economy shifts.
  prefs: []
  type: TYPE_NORMAL
- en: It is better to realize early that intelligence is a more sustainable monetization
    lever.
  prefs: []
  type: TYPE_NORMAL
- en: Creativity, wisdom, development, and character can be the source of your income
    if you protect your mind.
  prefs: []
  type: TYPE_NORMAL
- en: IV.i – What To Study
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s take a big-picture approach to the skills that will bring you success
    going into the future.
  prefs: []
  type: TYPE_NORMAL
- en: The 3 *applications* we want to master are social media, offer creation, and
    driving traffic. These are how your skills will be channeled and your learning
    will be filtered.
  prefs: []
  type: TYPE_NORMAL
- en: You must build a brand, offer, and practice driving traffic between the two.
    That’s how you make money.
  prefs: []
  type: TYPE_NORMAL
- en: When you learn the skills below, learn them from the lens of what you are building.
    Filter the information through the lens of a social media brand, driving traffic,
    and creating a great product.
  prefs: []
  type: TYPE_NORMAL
- en: '**IV.i.i – Evergreen Skills**'
  prefs: []
  type: TYPE_NORMAL
- en: Writing, speaking, marketing, and sales are how you structure and distribute
    the value you provide to the world.
  prefs: []
  type: TYPE_NORMAL
- en: Social media posts, newsletters, video scripts, and all other media is written
    or spoken.
  prefs: []
  type: TYPE_NORMAL
- en: They are then enhanced with marketing and sales knowledge because they are based
    on psychological principles of attention capture and value perception.
  prefs: []
  type: TYPE_NORMAL
- en: These are not optional.
  prefs: []
  type: TYPE_NORMAL
- en: Avoid learning any other skills first.
  prefs: []
  type: TYPE_NORMAL
- en: True learning stems from struggle, not memorization.
  prefs: []
  type: TYPE_NORMAL
- en: You must start building, NOT learning, and when you encounter a problem, study
    writing, speaking, marketing, and sales courses and content.
  prefs: []
  type: TYPE_NORMAL
- en: '**IV.i.ii – Results Oriented Skills**'
  prefs: []
  type: TYPE_NORMAL
- en: When you have a solid grasp on the evergreen skills, you can choose to enhance
    them with other results-oriented skills.
  prefs: []
  type: TYPE_NORMAL
- en: 'These include but are not limited to any other skill that will make your social
    media, traffic generation, or offer better:'
  prefs: []
  type: TYPE_NORMAL
- en: Graphic design
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Web design and development
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Search engine optimization
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Email marketing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Social media marketing agencies
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Any other business or skill people tell you to learn or start.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All of these will be made effective by the evergreen skills.
  prefs: []
  type: TYPE_NORMAL
- en: Learning them by themselves will prime you for replacement.
  prefs: []
  type: TYPE_NORMAL
- en: Since you are building a personal brand as your character in the new virtual
    reality, you are building a skill set that transfers over into any other business.
  prefs: []
  type: TYPE_NORMAL
- en: When you have a knowledge of 100, you can create a product or service of 1.
  prefs: []
  type: TYPE_NORMAL
- en: The more skills and experience you have with your own brand, the more opportunities
    become available to you.
  prefs: []
  type: TYPE_NORMAL
- en: People will tell you to build a business before starting on social media. I
    believe that is a quick way to a life of unnecessary pain because you don’t understand
    social media.
  prefs: []
  type: TYPE_NORMAL
- en: IV.ii – Dissecting Your Mind For Topics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If a mind is composed of ideas that form thoughts, beliefs, and actions – it
    makes sense to break them into their individual parts, study them, enhance them,
    and reprogram the way you think.
  prefs: []
  type: TYPE_NORMAL
- en: '**What are your goals?**'
  prefs: []
  type: TYPE_NORMAL
- en: Write about the benefits of achieving them.
  prefs: []
  type: TYPE_NORMAL
- en: '**What are the problems standing in the way?**'
  prefs: []
  type: TYPE_NORMAL
- en: Write about the emotions involved in overcoming them.
  prefs: []
  type: TYPE_NORMAL
- en: '**What skills do you have to** **acquire** **to reach your goals?**'
  prefs: []
  type: TYPE_NORMAL
- en: Write about how you are applying those skills and what you’ve learned.
  prefs: []
  type: TYPE_NORMAL
- en: '**What are 10-20 things you are** **genuinely** **curious to learn?**'
  prefs: []
  type: TYPE_NORMAL
- en: Study them and share the big ideas that you feel compelled to share with someone
    else but in your own words.
  prefs: []
  type: TYPE_NORMAL
- en: '**What are the topics and interests you already consume?**'
  prefs: []
  type: TYPE_NORMAL
- en: I love watching, reading, and listening to content on psychology, spirituality,
    metaphysics, business, mindset, mental models, and more.
  prefs: []
  type: TYPE_NORMAL
- en: Create a topic tree with 3 broad interests, break it down into topics, and then
    break it down further into writing ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Then, use those as a starting point for distilling lessons as you learn the
    evergreen skills.
  prefs: []
  type: TYPE_NORMAL
- en: '**Are you a beginner, intermediate, or advanced?**'
  prefs: []
  type: TYPE_NORMAL
- en: 99% of the market are beginners.
  prefs: []
  type: TYPE_NORMAL
- en: This is often a struggle point for people of all levels.
  prefs: []
  type: TYPE_NORMAL
- en: Think about what you consume and how you consume it.
  prefs: []
  type: TYPE_NORMAL
- en: On social media, I love reading beginner-level advice. It reminds me of the
    fundamentals I need to focus on.
  prefs: []
  type: TYPE_NORMAL
- en: If I want to learn something more advanced, I don’t try to find it on social
    media. I have a much higher search intent. I am going to search for it directly
    and/or purchase a book or course.
  prefs: []
  type: TYPE_NORMAL
- en: With this knowledge, even if you are advanced, write for beginners.
  prefs: []
  type: TYPE_NORMAL
- en: And if you are a beginner, rest assured that people will benefit from learning
    from your journey.
  prefs: []
  type: TYPE_NORMAL
- en: '**Social media is a collective mind.**'
  prefs: []
  type: TYPE_NORMAL
- en: Your job is to display your character as your brand and document your mind with
    your writing.
  prefs: []
  type: TYPE_NORMAL
- en: Observe your thoughts and attempt to turn your experiences into lessons.
  prefs: []
  type: TYPE_NORMAL
- en: I help you with all of this in [2 Hour Writer.](https://2hourwriter.com)
  prefs: []
  type: TYPE_NORMAL
- en: Your clarity of thought will shoot through the roof.
  prefs: []
  type: TYPE_NORMAL
- en: IV.iii – Iterating On Your Big Ideas
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For every 100 pieces you write only a handful will be good.
  prefs: []
  type: TYPE_NORMAL
- en: This is the nature of everything in life, trial and error.
  prefs: []
  type: TYPE_NORMAL
- en: You have to be okay with failure because success wouldn’t exist without it.
  prefs: []
  type: TYPE_NORMAL
- en: Pay close attention to your best ideas.
  prefs: []
  type: TYPE_NORMAL
- en: The ones you like the most or perform the best.
  prefs: []
  type: TYPE_NORMAL
- en: Every month, review your writing and save the best ones.
  prefs: []
  type: TYPE_NORMAL
- en: Then, rewrite them from a place of higher experience.
  prefs: []
  type: TYPE_NORMAL
- en: You can be sure that your posts will start to perform better and better when
    you do this.
  prefs: []
  type: TYPE_NORMAL
- en: Eventually, your mind *thinks* in terms of your best ideas. This is how authors,
    speakers, podcasters, and the rest sound so articulate.
  prefs: []
  type: TYPE_NORMAL
- en: They’ve trained their mind to operate on big ideas.
  prefs: []
  type: TYPE_NORMAL
- en: IV.iv – Creating A Data-Driven Product
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Your mental monetization journey will provide you with a lot of feedback (that
    you won’t receive if you don’t start).
  prefs: []
  type: TYPE_NORMAL
- en: 'Pay attention to:'
  prefs: []
  type: TYPE_NORMAL
- en: '**How your best ideas perform.** If the idea performs well, it probably means
    a product or service will also do well based on that idea.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**How others’ products and ideas perform.** You have to become an observer
    over a consumer. View social media content, landing pages, funnels, products,
    services, and promotions as inspirational firepower for your own. *Sell what’s
    already selling, but under your own name and worldview.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**What people tell you they want.** As you grow your readers will become vocal
    about what they want from you and what was helpful. Double down on this.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The questions people ask.** You will notice patterns in the problems people
    have. The more questions you get, the bigger the problem, and the more likely
    people are to pay you for help.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can monetize anything you want nowadays.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve talked about this many times before in the [one-person business playlist
    on YouTube.](https://youtube.com/playlist?list=PLB4ePXk6nBaeG3fD13NaRMsRsEc2iCsV4&si=ClrQ044bDE6tR9rO)
  prefs: []
  type: TYPE_NORMAL
- en: But the best route you can take is to *solve your own problems and sell the
    solution.*
  prefs: []
  type: TYPE_NORMAL
- en: Everyone has the same goals and problems.
  prefs: []
  type: TYPE_NORMAL
- en: They just view them through different perspectives and worldviews.
  prefs: []
  type: TYPE_NORMAL
- en: You want financial freedom, health, vitality, love, and every benefit of improving
    your health, wealth, and relationships.
  prefs: []
  type: TYPE_NORMAL
- en: One person will try budgeting, the other will build a side hustle.
  prefs: []
  type: TYPE_NORMAL
- en: What you do to achieve your goals is completely different from how someone else
    will.
  prefs: []
  type: TYPE_NORMAL
- en: Your job is to attract people like you by talking about your journey.
  prefs: []
  type: TYPE_NORMAL
- en: Then, package up your *path* to achieving the goal and sell it.
  prefs: []
  type: TYPE_NORMAL
- en: This is how you build a beautiful mind.
  prefs: []
  type: TYPE_NORMAL
- en: Understand your mental body.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Train that body like you would in the gym.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Know that modern power comes from attention or mental real estate.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use writing and business as a vessel for self-understanding and monetization.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enjoy the rest of your weekend.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan Koe
  prefs: []
  type: TYPE_NORMAL
