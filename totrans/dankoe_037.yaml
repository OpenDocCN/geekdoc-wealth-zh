  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 一部新的YouTube视频“为什么你不会改变（如何重塑自我）”刚刚上线。
- en: '[Watch here.](https://youtu.be/QBESNoCeZWY)'
  id: totrans-255
  prefs: []
