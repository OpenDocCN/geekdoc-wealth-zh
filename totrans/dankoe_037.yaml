- en: Why You Can’t Enjoy Life
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么你不能享受生活
- en: 原文：[https://thedankoe.com/letters/why-you-cant-enjoy-life/](https://thedankoe.com/letters/why-you-cant-enjoy-life/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/why-you-cant-enjoy-life/](https://thedankoe.com/letters/why-you-cant-enjoy-life/)
- en: I’ve been riding motorcycles for most of my adult life.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我大部分成年时间都在骑摩托车。
- en: My first “car” at 16 years old was a motorcycle. (A CBR250R for my fellow enthusiasts).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我16岁时的第一辆车是一辆摩托车。（对于同样热衷于摩托车的人，是CBR250R）。
- en: I eventually graduated to a Yamaha R6 after a year or so. (A *much* faster sport
    bike). Ended up going through 2 of those.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我在一年左右后升级到了雅马哈R6。（一辆*更快*的运动摩托车）。最终骑了两辆那样的车。
- en: Last year, before moving to Austin, I was riding my Yamaha R1\. (Even *faster*,
    like… too fast… but it fit my tall body).
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 去年，在搬到奥斯汀之前，我骑着我的雅马哈R1。（更快，就像……太快……但很适合我高大的身材）。
- en: <picture fetchpriority="high" decoding="async" class="wp-image-660">![](../Images/a294e53268b97322e338e4580ac6f790.png)</picture>
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-660">![](../Images/a294e53268b97322e338e4580ac6f790.png)</picture>
- en: My Previous R1
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我之前的R1
- en: After being in Texas for a few months, I had the itch to get on a bike again.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在德克萨斯州待了几个月后，我又想骑自行车了。
- en: My roommate (also my YouTube editor) wanted to learn how to ride.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我的室友（也是我的YouTube编辑）想学习如何骑自行车。
- en: So we went and picked up a used beginner bike for him to learn on.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们去买了一辆二手的入门级自行车供他学习。
- en: He purchased a Honda Rebel 500.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 他购买了一辆本田Rebel 500。
- en: I ended up purchasing this beauty.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我最终买了一辆这辆美丽的车。
- en: <picture decoding="async" class="wp-image-661">![](../Images/052f2256da932c628888e32e0559ea61.png)</picture>
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-661">![](../Images/052f2256da932c628888e32e0559ea61.png)</picture>
- en: Coffee Cup In-Hand (Of Course)
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 手中拿着咖啡杯（当然）
- en: Now, I could talk all day about how riding a bobber is SO much different from
    riding a supersport, but that’s not what we are here to learn.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我可以整天谈论骑复古摩托车与骑超级运动摩托车有多么不同，但这不是我们在这里要学习的内容。
- en: (The motorcycles will make sense soon, I promise).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: （摩托车很快就会变得有意义，我保证）。
- en: The Importance Of Learning
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 学习的重要性
- en: I have some issues with the modern education system.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我对现代教育体系有一些问题。
- en: Don’t get me wrong… it has some great aspects to it — *everyone should be on
    a similar page in terms of how we operate as a society.*
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 请不要误解……它确实有一些很好的方面——*每个人都应该在社会运作方式上保持一致的观点*。
- en: But in terms of living as nature intended?
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 但从自然本意生活的角度来看呢？
- en: It’s a horrible solution for helping people find, learn about, and make a career
    out of something they care about.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这对于帮助人们找到、了解并从他们关心的事情中找到职业是一个糟糕的解决方案。
- en: The modern education system works against our psyche that is wired for survival.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 现代教育体系与我们的生存本能心理作对。
- en: It pushes us to “learn,” memorize, and get trained into a job that has nothing
    to do with what we spent learning and memorizing.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 它推动我们去“学习”，记住，并训练进入一个与我们学习和记忆无关的工作。
- en: The other thing… mass education will never be able to keep up with the digital
    economy that continues to evolve at an exponential rate.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 另一件事……大规模教育永远无法跟上以指数速度持续发展的数字经济。
- en: Only those that know how to pursue their curiosity, learn fast, and become “tool-independent”
    will end up on top.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 只有那些知道如何追求好奇心、快速学习并成为“工具独立”的人才能最终站在顶峰。
- en: By leaning into your nature — your survival-wired brain — you will begin to
    reap the benefits of doing so.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 通过顺应你的天性——你的生存本能的大脑——你将开始收获这样做的益处。
- en: '**Learning is how you become more aware, conscious, and skilled in the game
    of life.**'
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**学习是你如何在生活中变得更清醒、更有意识、更有技能的方法。**'
- en: 'When you start playing a game for the first time, you learn:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 当你第一次开始玩游戏时，你会学到：
- en: The rules of the game
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 游戏规则
- en: The mechanics and controls
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机械和控制系统
- en: How to win the game
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何赢得游戏
- en: You are curious about how fun the game will be.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 你好奇这个游戏会有多有趣。
- en: You go through a tutorial video or read the rule book.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 你会通过教程视频或阅读规则手册。
- en: You test your limits as a level 1 player and quickly realize that you have a
    lot of work to do.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 你作为一个一级玩家测试你的极限，并很快意识到你还有很多工作要做。
- en: 'You start asking yourself questions:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 你开始问自己问题：
- en: Is this game for me?
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这个游戏适合我吗？
- en: Is it actually worth my time?
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这真的值得我花时间吗？
- en: Will I even have fun playing this?
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我甚至会在玩这个游戏时感到乐趣吗？
- en: Are my friends playing the game?
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我的朋友们在玩游戏吗？
- en: How many people are playing the game in the world?
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 世界上有多少人正在玩游戏？
- en: How much time, money, and other resources will this consume?
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这将消耗多少时间、金钱和其他资源？
- en: Asking questions is how you determine if it is worth adopting this new activity
    into your life.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 提问是确定是否值得将这项新活动纳入你生活的方法。
- en: You have other things going on, no?
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 你还有其他事情要做，不是吗？
- en: You have routines, lifestyles, social events, habits, errands, and other things
    that could be impacted by playing this game on a consistent basis.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 你有常规、生活方式、社交活动、习惯、差事和其他可能会因持续玩游戏而受到影响的事情。
- en: If playing that specific game isn’t perceived as more “fun” or more “valuable”
    or an activity than the other games you are playing, why would you make a constant
    in your life?
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如果玩那个特定的游戏没有被看作比其他你正在玩的游戏更有趣、更有价值或是一项活动，那你为什么要把这变成你生活中的常态呢？
- en: This is where a lot of people fall off.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是很多人掉队的地方。
- en: They stop playing the game while they are still level 1.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 他们还在第1级时就停止玩游戏了。
- en: Learning is how you uncover the depth that life has to offer.
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 学习是你揭示生活所提供深度的方法。
- en: When you first start learning a game (or trying something new in life) you may
    not like it.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 当你刚开始学习一个游戏（或在生活中尝试新事物）时，你可能不喜欢它。
- en: It may not make sense to you just yet.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能对你来说现在还没有意义。
- en: Maybe you “hate” going antique shopping with your wife on Sundays.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 也许你“讨厌”在周日和妻子一起去古董店购物。
- en: It’s not that you hate it. It’s that you don’t understand it.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 并不是你讨厌它。而是你不理解它。
- en: It’s not a game to you, it’s a nuisance.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 对你来说，这不仅仅是一个游戏，而是一种麻烦。
- en: All you see are boring old antiques that *serve no purpose* in your life.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 你看到的只是无聊的旧古董，在你的生活中没有任何作用。
- en: To your wife, however, antique shopping is a fun game that she is a high level
    in.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，对你妻子来说，古董店购物是一种有趣的游戏，她在其中是高级玩家。
- en: She has fun trying to find the “hidden gems” in the antique shop
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 她喜欢尝试在古董店找到“隐藏的宝石”。
- en: She understands history to a point where she can appreciate the antiques
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 她对历史的理解到了一个程度，可以欣赏古董。
- en: Her father was a woodworker and it brings back memories of him when she see’s
    rocking chairs
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 她的父亲是一位木匠，当她看到摇椅时，这让她想起了他。
- en: She is ***curious*** to dive deep into the inner workings of the game.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 她对深入探索游戏的内部运作感到**好奇**。
- en: She has ***clarity*** on how to play the game through experience.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 她通过经验对如何玩游戏有**清晰**的认识。
- en: She makes ***connections*** to other past or potential experiences that the
    game presents.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 她将游戏呈现的其他过去或潜在经历联系起来。
- en: She fabricates a ***challenge*** in her mind to engage in the game on that day.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 她在心中虚构了一个**挑战**，以便在那天参与游戏。
- en: She raises her ***consciousness*** to see the web of interconnectedness the
    game presents.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 她提高自己的**意识**，看到游戏呈现的相互关联的网络。
- en: But you… you haven’t even started playing. You don’t see it as a game. You fixate
    your focus on the tip of the iceberg and assume that everything under the water
    serves no purpose.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 但你……你甚至还没有开始玩。你不把它当作游戏。你专注于冰山一角，并假设水下的一切都没有作用。
- en: You aren’t giving yourself a chance to find your “why.”
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有给自己一个机会去找到你的“为什么”。
- en: Do this enough and you won’t see past the tip of the iceberg of life itself.
    A shallow existence.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 做得足够多，你就不会看到生活的冰山一角。这是一种肤浅的存在。
- en: '*You will find yourself ready to quit before you even leave the tutorial.*'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '*在你离开教程之前，你可能会发现自己想要放弃。*'
- en: At level 1, you can only assume or predict what exists in levels above you.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在第1级，你只能假设或预测在你之上的层级中存在什么。
- en: At level 100, you have a birds eye view of the levels under you.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在第100级，你对下面的层级有鸟瞰般的视野。
- en: The Art Of Doing Whatever You Want
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 做任何你想做的事的艺术
- en: Whenever I talk about “doing what you want” I always get the same responses.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 每当我谈到“做你想做的事”时，我总是得到相同的回应。
- en: '*“You mean if I wanted to jump off a bridge I should???”*'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '*“你是说我如果想从桥上跳下去就应该吗？？？”*'
- en: '*“You mean if I want to be the next Hitler I should?”*'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '*“你是说我如果想成为下一个希特勒就应该吗？”*'
- en: '*“You mean it’s okay if people are mass murderers?!?!”*'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '*“你是说如果人们是大规模杀人犯那就没关系吗？！！”*'
- en: Wake the fuck up. Stop it. Have some common sense and think critically about
    what you are saying.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 该醒醒了。停止这样做。有点常识，批判性地思考你所说的话。
- en: '*This brings up the difference between conscious and unconscious living.*'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '*这提出了有意识和无意识生活的区别。*'
- en: If you were conscious of the widespread impact of what “becoming the next Hitler”
    would lead to, you wouldn’t want to do it.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你意识到了“成为下一个希特勒”会带来的广泛影响，你就不会想这样做。
- en: If you did it anyway, good. That’s how you become aware of your blindspots and
    work to change them.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你无论如何都做了，那很好。这样你才能意识到自己的盲点并努力改变它们。
- en: If you were conscious of your immoral actions and how it displaces the balance
    of the collective system, you would work to change them.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你意识到你的不道德行为以及它如何破坏集体系统的平衡，你就会努力改变它们。
- en: You would *want* to improve… if you were conscious.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你意识到了，你会*想要*改进…
- en: 'Mid Koe Letter reminder: [readers can join Modern Mastery for $5 here](https://modernmastery.co/letter).
    MM contains 170+ life and business strategies, live trainings, and step by step
    roadmaps from people who have built sustainable and passionate one-person businesses.'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 中科提醒：[读者可以在这里以5美元的价格加入现代精通](https://modernmastery.co/letter)。MM包含170多个生活和商业策略、现场培训以及来自那些已经建立了可持续和充满激情的单人企业的逐步路线图。
- en: Doing what you want is a matter of living in accordance with nature.
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 做你想做的事，就是按照自然规律生活。
- en: From a psychological lens, this has been studied well.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 从心理学的角度来看，这一点已经被很好地研究了。
- en: Two of my favorite models come to mind.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我想到了两个我最喜欢的模型。
- en: Steven Kotler’s 5 Intrinsic Drivers and Mihaly Csikszentmihalyi’s flow model.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 史蒂文·科特勒的5个内在驱动因素和米哈伊·契克森米哈伊的“心流”模型。
- en: We’ve talked about these many times before, so I will spare you the rundown.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我们之前已经讨论过很多次了，所以我就不详细说明了。
- en: In short, there are specific ways to manipulate your attention or frame your
    focus with the result of a more enhanced experience.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，有具体的方法可以操纵你的注意力或调整你的焦点，以获得更丰富的体验。
- en: Chemicals like dopamine, adrenaline, and norepinephrine squirt into your brain
    to reward your pursuits that stem from your nature.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 多巴胺、肾上腺素和去甲肾上腺素等化学物质会喷入你的大脑，以奖励你源自你本性的追求。
- en: Developing your skill set
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发展你的技能集
- en: Mastering your craft
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精通你的技艺
- en: Pursuing *your* vision
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 追求*你的*愿景
- en: Working towards *your* goals
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为*你的*目标而努力
- en: Living by a code of values
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 按照一套价值观生活
- en: Living in the moment
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生活在当下
- en: Hunting for your survival (entrepreneurship)
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了生存而狩猎（创业）
- en: Harnessing your creativity (nature is creative)
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用你的创造力（自然界是富有创造力的）
- en: Raising your level of consciousness (game XP)
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提升你的意识水平（游戏经验值）
- en: Everyone has a “pull” to pursue a higher version of themselves.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都有追求更高版本自己的“拉力”。
- en: The only thing more painful than pursuing the highest version of yourself is
    not pursuing the highest version of yourself
  id: totrans-99
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 比追求最高版本的自己更痛苦的事情，就是不去追求最高版本的自己
- en: ''
  id: totrans-100
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [February 6, 2021](https://twitter.com/thedankoe/status/1357983425760817154?ref_src=twsrc%5Etfw)
  id: totrans-101
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2021年2月6日](https://twitter.com/thedankoe/status/1357983425760817154?ref_src=twsrc%5Etfw)
- en: When you pursue your curiosity, fulfill your basic needs, gain a degree of geographical
    freedom, and consistently make progress — you are psychologically rewarded.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 当你追求你的好奇心，满足你的基本需求，获得一定程度的地域自由，并持续进步时，你会在心理上得到奖励。
- en: It. Feels. Good.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 它。感觉很好。
- en: Busting out of the trenches of struggle.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 冲破斗争的壕沟。
- en: Conquering the challenge.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 克服挑战。
- en: Winning the battle in the ever-unfolding story of life.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 在生活的不断展开的故事中赢得战斗。
- en: Reaching the peak of the mountain.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 登上山顶。
- en: Feeling the energy in the drop of a song.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 感受一首歌中的能量。
- en: It’s all the same.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 一切都是相同的。
- en: Push pull. Wu wei. Yin yang.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 推拉。无为。阴阳。
- en: Cycles, chapters, phases of life.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 生活的周期、章节、阶段。
- en: Life mimics nature, lean into it.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 生活模仿自然，顺应它。
- en: 'Another way of saying that:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种说法是：
- en: The system is rigged, so learn the system so you can maneuver yourself within
    it towards optimal outcomes.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 系统是有缺陷的，所以学习系统，这样你才能在其中灵活操作，朝着最佳结果前进。
- en: Don’t hate the player, hate the game.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 不要恨玩家，恨游戏。
- en: (Scratch that, don’t hate the game, *appreciate* it)
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: （划掉，不要恨游戏，*欣赏*它）
- en: The Life Enjoyment 5
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生活的5个享受
- en: Back to the motorcycles.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 回到摩托车。
- en: I’ve been paying very close attention to how my roommate is learning to ride
    his motorcycle.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直非常关注我的室友是如何学习骑摩托车的。
- en: After I noticed the curiosity and clarity phase — I started noticing
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在我注意到好奇心和清晰阶段之后——我开始注意到
- en: This newsletter was initially going to be about learning.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 这份通讯最初是关于学习的。
- en: I’ve decided (at this very moment) to pivot towards enjoyment (what learning
    leads to).
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经决定（就在此刻）转向享受（学习带来的结果）。
- en: I’ve started developing a meta-concept that pairs perfectly with The Creation
    Pyramid.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经开始开发一个与《创造金字塔》完美匹配的元概念。
- en: It combines the spiritual, psychological, and philosophical teachings that I’ve
    found to cross over when it comes to life enjoyment. Not only occasionally, but
    on demand. That is, once you understand the parts of the system. The aspects of
    the game.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 它结合了我在生活享受方面发现的灵性、心理和哲学教导，这些教导在生活享受方面是相互交叉的。不仅偶尔，而且是按需。也就是说，一旦你理解了系统的各个部分。游戏的各个方面。
- en: I call it The Life Enjoyment 5.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 我称之为“生活享受5”。
- en: <picture decoding="async" class="wp-image-667">![The Life Enjoyment 5 - curiosity,
    clarity, connection, challenge, and consciousness](../Images/51e94026cf10a9fe8e22069d77150d6b.png)</picture>
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-667">![生活享受5 - 好奇心、清晰、连接、挑战和意识](../Images/51e94026cf10a9fe8e22069d77150d6b.png)</picture>
- en: All five “C’s” of enjoyment are both *tools* and *tells.*
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 享受的五个“C”都是工具和迹象。
- en: You can use and combine them to increase your enjoyment of day-to-day existence.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用并组合它们来增加你对日常生活的享受。
- en: Or you can become aware of them when you are doing things you genuinely enjoy.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 或者当你做真正喜欢的事情时，你可以意识到它们。
- en: This reminds me of Eckhart Tolle’s 3 Modalities Of Doing
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 这让我想起了埃克哈特·托勒的3种行动模式
- en: Acceptance
  id: totrans-131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接受
- en: Enjoyment
  id: totrans-132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 享受
- en: Enthusiasm
  id: totrans-133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 热情
- en: Which are great *tools* to be at peace with whatever situation you are in –
    but that’s just it…
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是让你在任何情况下都能保持平和的伟大工具——但这就是关键所在...
- en: Every situation brings vastly different variables to the table.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 每一种情况都会带来截然不同的变量。
- en: I love Eckhart and his modalities served me well, but there is more.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢埃克哈特，他的模式对我很有帮助，但还有更多。
- en: My purpose with this is to build and create from his work (as well as others)
    to bring a more powerful concept to the table. One that allows you to become aware
    of the [depth and opportunity that life has to offer.](https://thedankoe.com/what-mushrooms-taught-me-about-life-and-business/)
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 我用这个目的来构建和创造他的工作（以及其他人）来带来一个更强大的概念。一个让你意识到生活所能提供的深度和机会的概念。[深度和机会](https://thedankoe.com/what-mushrooms-taught-me-about-life-and-business/)
- en: The LE5 is not linear, they happen as they happen. Non-sequential.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: LE5不是线性的，它们就像发生的那样发生。非顺序的。
- en: '**Curiosity**'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: '**好奇心**'
- en: What do you feel *pulled* to do?
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 你觉得被什么吸引去做？
- en: When you feel the pull, what limiting beliefs arrive?
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 当你感到被吸引时，哪些限制性信念会出现？
- en: From there, pause and question.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，暂停并提问。
- en: Don’t let your monkey brain *think* that your survival is at stake.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 不要让你的猴子大脑去想你的生存处于危险之中。
- en: '*The death of a belief is not death itself — even when it feels eerily similar.*'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: '*信念的消亡并不是死亡本身——即使它感觉令人毛骨悚然地相似。*'
- en: Questioning is how you open up new mental pathways to explore.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 提问是你如何打开新的心理路径去探索。
- en: Questioning is how you expand your consciousness by diving down the rabbit hole
    of infinity.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 提问是你如何通过深入无限之洞来扩展你的意识。
- en: Questioning is how you dictate what you need to self-educate on next.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 提问是你如何决定你接下来需要自我教育的内容。
- en: 'This is difficult at first, but is usually catalyzed by the question:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 这一开始可能很难，但通常是由以下问题引发的：
- en: “What if?”
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: “如果...”
- en: What if I learned that skill?
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我学会了这项技能？
- en: What if I traveled no matter the cost?
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我无论代价如何都要去旅行呢？
- en: '[What if I committed to starting that business?](https://thedankoe.com/the-future-of-work-will-be-play/)'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: '[如果我承诺开始那项业务？](https://thedankoe.com/the-future-of-work-will-be-play/)'
- en: When we went out to purchase the motorcycles, we got absorbed in all of the
    different models, the purpose they serve, and the minor differences.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们去购买摩托车时，我们沉浸在了所有不同的型号中，它们所服务的目的，以及微小的差异。
- en: We were both curious.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都很好奇。
- en: What would our days look like if we had this new mode of transportation?
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们有这种新的交通方式，我们的日子会是什么样子？
- en: That triggered many other questions, which begin to tie in the other tools of
    the LE5.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 这引发了许多其他问题，这些问题开始与其他LE5工具联系起来。
- en: As you can guess, that has opened up a new world to explore and experience (not
    just on the road).
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所猜，这开启了一个新的世界去探索和体验（不仅仅是路上）。
- en: We’ve met new friends that have bikes and effectively expanded our network of
    high-level individuals in Austin.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 我们遇到了骑自行车的新朋友，有效地扩大了我们在奥斯汀的高层人士网络。
- en: We’ve felt compelled to explore backroads and get out in nature.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 我们感到有必要去探索小路，走出大自然。
- en: The list goes on.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 列表还在继续。
- en: '**Clarity**'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: '**清晰**'
- en: The cause of most modern problems is clarity.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数现代问题的根源在于清晰。
- en: Anxiety, uncertainty, fixed mindsets, closed-mindedness, and the rest are all
    due to a lack of clarity.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 焦虑、不确定性、固定思维模式、思想狭隘，以及其他都是由于缺乏清晰。
- en: What you want (goal)
  id: totrans-164
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你想要什么（目标）
- en: ''
  id: totrans-165
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How to get there (clarity)
  id: totrans-166
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如何到达那里（清晰）
- en: ''
  id: totrans-167
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Why you want to (intention)
  id: totrans-168
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你为什么想要（意图）
- en: ''
  id: totrans-169
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: When these 3 things fall into place, your choice to act becomes seamless.
  id: totrans-170
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当这三件事到位时，你的行动选择变得无缝。
- en: ''
  id: totrans-171
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [December 6, 2021](https://twitter.com/thedankoe/status/1467865674932445194?ref_src=twsrc%5Etfw)
  id: totrans-172
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2021年12月6日](https://twitter.com/thedankoe/status/1467865674932445194?ref_src=twsrc%5Etfw)
- en: This deserves an entire article, and is the backbone of [The Creation Pyramid](https://thedankoe.com/how-to-create-a-life-of-meaning-money-impact-as-fast-as-humanly-possible/),
    [creativity in general](https://thedankoe.com/how-to-make-money-as-a-creative-on-the-internet/),
    and [Intelligent Imitation](https://thedankoe.com/how-to-copy-your-way-to-success-instead-of-mediocrity/).
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 这值得一篇完整的文章，并且是[《创造金字塔》](https://thedankoe.com/how-to-create-a-life-of-meaning-money-impact-as-fast-as-humanly-possible/)、[一般创造力](https://thedankoe.com/how-to-make-money-as-a-creative-on-the-internet/)和[智能模仿](https://thedankoe.com/how-to-copy-your-way-to-success-instead-of-mediocrity/)的支柱。
- en: 'Relating to motorcycles, here was the process:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 与摩托车相关，以下是这个过程：
- en: Immerse
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 沉浸
- en: Imitate
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模仿
- en: Innovate
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创新
- en: 'Devan, my editor that bought the motorcycle with me, used me for a few things:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 德凡，和我一起买摩托车的编辑，用我做了几件事：
- en: Education — I ran him through the tutorial of playing the motorcycle game (the
    basics, mechanics, and/or fundamentals of riding).
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教育——我带他玩摩托车游戏教程（基础、机械和/或骑行的基本原理）。
- en: Coach — I revealed his blind spots AS he was riding. I helped him eliminate
    problems as they arose.
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教练——我在他骑车的过程中揭示了他的盲点。我帮助他在问题出现时消除问题。
- en: Resource — I gave him other “mentors” to study and material to read to speed
    up his learning.
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 资源——我给了他其他“导师”去学习，以及阅读材料来加速他的学习。
- en: Whether you are learning a new skill or struggling with a specific task…
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是学习一项新技能还是挣扎于一项具体任务…
- en: Clarity comes down to structure, information, and surrender.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰度归结为结构、信息和屈服。
- en: Information is abundant and potentially overwhelming, yet necessary.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 信息丰富且可能令人不知所措，但又是必要的。
- en: Structuring that information (or ordering consciousness) is how you start to
    “outline the puzzle.”
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 结构化这些信息（或排序意识）是你开始“概述谜题”的方式。
- en: Surrender and rest *usually* piece everything together.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 屈服和休息通常会将一切整合在一起。
- en: Like when a writer brainstorms 15 headlines, puts his pen down, and goes to
    lay out by the pool (this is actually a thing, most writers get most of their
    work done during rest).
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 就像当一位作家想出15个标题，放下笔，去游泳池边休息时（这实际上是一件事，大多数作家都是在休息时完成大部分工作）。
- en: Or when a programmer can’t figure out a bug, but the perfect solution comes
    to them when they are in the shower.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 或者当程序员无法找出一个错误，但在洗澡时突然想到了完美的解决方案。
- en: This can be applicable to motorcycles, but the “surrender” aspect comes into
    play with longer commitments. Starting your business, improving yourself, making
    the most of life, etc.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以适用于摩托车，但“屈服”方面在更长的承诺中发挥作用。开始你的业务、提升自己、充分利用生活等。
- en: '**Connection**'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: '**连接**'
- en: In psychology there is a phenomena known as pattern recognition. There is also
    the “construct aware” stage of ego development along with systems thinking as
    a whole.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 在心理学中，有一个被称为模式识别的现象。还有自我发展的“构建意识”阶段，以及整体系统思维。
- en: Connection stems from the ability to zoom out, see the big picture, and recognize
    patterns, models, constructs, and connections.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 连接源于能够放大视野、看到大局、识别模式、模型、结构和联系的能力。
- en: This is best illustrated as the “aha!” moment (or a series of these moments).
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 这最好用“啊哈！”时刻（或一系列这样的时刻）来体现。
- en: Along with curiosity, connection raises dopamine in the brain.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 与好奇心一样，连接能提高大脑中的多巴胺水平。
- en: '*It causes excitement.* It makes you want to share what you are learning. Most
    of the time you can’t help but tell everyone about your new motorcycle and everything
    you’ve learned about it.'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: '*这会激发兴奋感。* 它让你想要分享你所学的。大多数时候，你忍不住要告诉每个人你的新摩托车以及你学到的所有关于它的东西。'
- en: Referring to Steven Kotler’s 5 intrinsic drivers, connection can also be seen
    under the lens of *purpose and passion.*
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 指的是史蒂文·科特勒的5个内在驱动因素，连接也可以从*目的和热情*的角度来审视。
- en: When you connect what you are learning with something else that has real world
    utility, you start to cultivate passion for the purpose that your new skill holds.
    (like solving a big problem in the world, starting a business, or direct application
    to your life right now).
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 当你将你正在学习的内容与具有现实世界实用性的其他事物联系起来时，你开始培养对新技能所持目的的热情。（比如解决世界上的大问题、开始创业，或直接应用于你现在的生活中）。
- en: '**Challenge**'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: '**挑战**'
- en: Challenge is encoded in the system.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战是系统的一部分。
- en: Challenge is what kicks you into flow.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战是推动你进入心流状态的因素。
- en: Challenge is what eliminates boredom.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战是消除无聊的东西。
- en: We are so afraid as a society to take on new challenges because they threaten
    the comfort we’ve been conditioned into.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 我们作为一个社会非常害怕接受新的挑战，因为它们威胁到我们被训练成习惯的舒适感。
- en: If your work, life, or self isn’t challenging you on a consistent basis, I can
    assure you that your life won’t be interesting. I can also assure you that you
    aren’t making much progress.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您的工作、生活或自我不是在持续地挑战您，我可以向您保证，您的生活不会很有趣。我还可以向您保证，您没有取得很大的进步。
- en: Again, this brings up the importance of consistent self-reflection and setting
    new goals.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，这突出了持续自我反思和设定新目标的重要性。
- en: Set a challenging goal
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设定一个具有挑战性的目标
- en: Gain clarity by breaking it down into smaller goals
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过将其分解成更小的目标来获得清晰度
- en: Act with intention by aligning all aspects of your life (mind, body, spirit,
    business) with those goals.
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过将您生活的各个方面（思想、身体、精神、商业）与这些目标对齐来有意识地行动。
- en: If you get anxious or start overthinking, you need clarity. You need to learn,
    practice, and teach to increase your skill that revolves around that goal.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您感到焦虑或开始过度思考，您需要清晰度。您需要学习、练习和教学，以增加围绕该目标的技能。
- en: If you get bored or aren’t engaged with the task at hand, you need to set new
    goals that match your skill.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您感到无聊或对当前的任务不感兴趣，您需要设定与您的技能相匹配的新目标。
- en: '**Consciousness**'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: '**意识**'
- en: We will discuss consciousness more in the coming weeks.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的几周内，我们将更多地讨论意识。
- en: Consciousness is about depth and appreciation. *Love*.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 意识是关于深度和欣赏。*爱*。
- en: For now, start seeing beyond the surface.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，开始看到表面之下。
- en: Take on the *challenge* of becoming *curious* in understanding all of the *connections*
    that any given situation presents (so you can gain *clarity*).
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 承担理解所有给定情况所呈现的*联系*的*挑战*，以了解所有情况（这样您就可以获得*清晰度*）。
- en: While most people perceive a motorcycle as a purposeless death machine — you
    can make the conscious choice to see beyond that and break out of your unconscious,
    conditioned emotional reactions to life.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 当大多数人将摩托车视为一个无目的的死亡机器时——您可以选择超越这一点，并打破您对生活的无意识、条件化的情感反应。
- en: Dive deeper.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 深入挖掘。
- en: Appreciate the entire process it took to create that motorcycle.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 欣赏创造那辆摩托车所经历的整个过程。
- en: Appreciate the opportunities it opens to those who ride it.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 欣赏它为那些骑摩托车的人带来的机会。
- en: Appreciate the game that people have chosen to play.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 欣赏人们选择玩的游戏。
- en: Seek to understand by dissecting what you see into smaller parts. Then dissect
    further.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将您所看到的内容分解成更小的部分来寻求理解。然后进一步分解。
- en: Seriously, stop what you are doing, think of a motorcycle, and start to dissect
    downward and construct upward.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 严肃地说，停止您正在做的事情，想想摩托车，然后开始向下剖析和向上构建。
- en: With your mind, dissect the motorcycle into it’s parts, where those parts came
    from, who was involved, and keep going deeper until you reach the base elements
    that we use to build physical material.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 用您的思想将摩托车剖析成它的各个部分，这些部分从何而来，谁参与了其中，并继续深入挖掘，直到您达到我们用来构建物理材料的基元素。
- en: With your mind, construct a potential reality that would be conducive to your
    vision if a motorcycle was involved. Can you meet new people? Can you adopt a
    new hobby into your life?
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 用您的思想构建一个潜在的现实，如果涉及到摩托车，这将有利于您的愿景。您能遇到新的人吗？您能将一项新的爱好融入您的生活中吗？
- en: This is impossible to do if you are a slave to the unconscious thought patterns
    that keep your mind closed and narrow.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您是受无意识思维模式束缚的奴隶，这几乎是不可能的，这些思维模式使您的思想变得封闭和狭隘。
- en: Continue this dissection and construction process as you go about your day to
    day life.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 在日常生活中继续进行这种剖析和构建过程。
- en: You can do this with anything. (Even the screen you are looking at). A n y t
    h i n g.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以用任何东西来做这件事。（即使是您正在看的屏幕）。A n y t h i n g。
- en: How do you think I *create* content?
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 您认为我是如何*创造*内容的？
- en: How do you think I *create* an income via unconventional methods?
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 您认为我是如何通过非常规方法*创造*收入的？
- en: How do you think anyone *creates* in general?
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 您认为任何人通常是如何*创造*的吗？
- en: Pause, dive deep, and appreciate.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 停下来，深入挖掘，并欣赏。
- en: Raise your consciousness.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 提升您的意识。
- en: Dissect and construct.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 剖析和构建。
- en: '*Think*.'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: '*思考*。'
- en: '**You can use the LE5 to identify, understand, and solve problems across multiple
    domains using everything we just talked about.**'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: '**您可以使用LE5来识别、理解和解决多个领域的问题，使用我们刚刚讨论的一切。**'
- en: This is difficult to understand until experienced.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 这很难理解，直到亲身体验。
- en: 'My advice:'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 我的建议：
- en: Save the LE5 graphic to your phone.
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将LE5图形保存到您的手机上。
- en: Study it’s parts and let your curiosity run wild. (Dissect and construct — create)
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究它的各个部分，让你的好奇心自由驰骋。（剖析和构建 — 创造）
- en: When you are learning, start to notice the different aspects of this concept.
  id: totrans-239
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你在学习时，开始注意这个概念的不同方面。
- en: Notice how you feel and question why you feel that way.
  id: totrans-240
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 注意你的感受，并质疑你为什么会有那样的感受。
- en: This will allow you to understand yourself on a deeper level and start to replicate
    those results.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 这将帮助你更深入地了解自己，并开始复制那些结果。
- en: 'When you find yourself in a bad mood, use the LE5 to your advantage:'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 当你发现自己处于不良情绪中时，利用LE5的优势：
- en: Question why you are in a bad mood (curiosity)
  id: totrans-243
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 询问你为什么会有不良情绪（好奇心）
- en: Set a goal to reverse the bad mood (challenge)
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设定一个目标来逆转不良情绪（挑战）
- en: Reverse engineer it so you know what to learn (clarity)
  id: totrans-245
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 反向工程它，以便你知道要学习什么（清晰性）
- en: As you learn, observe the excitement that fills your mind as you make new discoveries
    (excitement)
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你学习时，观察你发现新事物时心中充满的兴奋（兴奋）
- en: Remain conscious during this entire process.
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在整个过程中保持清醒。
- en: This is a huge topic that we will continue to apply, dissect, construct, and
    understand.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个巨大的话题，我们将继续应用、剖析、构建和理解。
- en: Until next time my friends,
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 直到下次见面，我的朋友们，
- en: — Dan Koe
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: — 丹·科
