- en: '[Listen here.](https://open.spotify.com/episode/3LSoJtQQHPOWQvbYfLARxc?si=8edc405b3d634b19)'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: '[在这里收听。](https://open.spotify.com/episode/3LSoJtQQHPOWQvbYfLARxc?si=8edc405b3d634b19)'
- en: A new YouTube video titled “Why You Won’t Change (How To Reinvent Yourself)”
