- en: 11 Insights I Wish I Knew To Make My One-Person Business A Success
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 11个我希望知道的洞察，以使我的单人企业成功
- en: 原文：[https://thedankoe.com/letters/11-insights-i-wish-i-knew-to-grow-my-one-person-business/](https://thedankoe.com/letters/11-insights-i-wish-i-knew-to-grow-my-one-person-business/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/11-insights-i-wish-i-knew-to-grow-my-one-person-business/](https://thedankoe.com/letters/11-insights-i-wish-i-knew-to-grow-my-one-person-business/)
- en: When I first started on this business journey, it was out of curiosity.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 当我第一次开始这段商业之旅时，是出于好奇心。
- en: I was observant.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我很警觉。
- en: I observed those I didn’t want to be like, and observed those I did.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我观察了我不想成为的人，也观察了我想要成为的人。
- en: The contrast between the two became very clear to me at a young age, around
    15 years old at this time.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在我年轻的时候，大约15岁左右的时候，我对这两种对比有了非常清晰的认识。
- en: 'On one side of the coin, people were:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 一方面，人们是：
- en: Unfit
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不健康
- en: Unhappy
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不满意
- en: Unwilling to change
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不愿意改变
- en: A lifestyle chained to a weekly paycheck.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 一种与每周工资挂钩的生活方式。
- en: 'On the other side of the coin, people were:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，人们是：
- en: Living their dream
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生活在他们的梦想中
- en: Spreading a great message
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 传播伟大的信息
- en: Inspiring people to be better
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 激励人们变得更好
- en: Most of them were creators in the early days of social media.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在社交媒体的早期，他们大多数都是创作者。
- en: Some people will give you the classic, “but they’re probably all unhappy deep
    down inside!”
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人会给你经典的，“但他们可能都深陷于不快乐之中！”
- en: '*Instantly closes off any potential opportunity and goes back to their unhappy
    way of living*'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '*立即关闭任何潜在的机会，并回到他们不快乐的生活方式*'
- en: You may be right, but if you know me, I like to question without bias (as much
    as my ego allows me).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能是对的，但如果你了解我，我喜欢无偏见地提问（尽可能多，只要我的自负允许）。
- en: Meaning, why couldn’t I be wealthy in all facets of life?
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 意味着，为什么我不能在生活的各个方面都变得富有？
- en: I would have to directly experience the flashy lifestyle and talk with those
    people to be able to judge it, no?
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我必须直接体验那种闪亮的生活方式，并与那些人交谈，才能对其进行判断，不是吗？
- en: What if they were happy, just misunderstood by the masses?
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果他们很快乐，只是被大众误解了怎么办？
- en: And if they were unhappy, why didn’t they change it?
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 如果他们不满意，为什么不去改变呢？
- en: This led to me trying anything and everything they recommended.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这导致我尝试他们推荐的一切。
- en: I tried the gym and fell in love with it.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我尝试了健身房，并爱上了它。
- en: I tried new skills and fell in love with learning.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我尝试了新的技能，并爱上了学习。
- en: I failed a bunch and fell off the path, but eventually came to a point where
    my knowledge, skillset, and experience had compounded to the point of “success,”
    by my standards.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我失败了多次，偏离了道路，但最终达到了一个点，我的知识、技能和经验已经积累到了“成功”的程度，按照我的标准。
- en: 'With a vision for my future small consistent actions, I’ve been able to build
    a one-person business that allows me to:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我未来的小而稳定的行动，我能够建立一个单人企业，让我能够：
- en: Research the things I love
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究我喜欢的事物
- en: Write about them in a creative way
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用创造性的方式写关于他们
- en: Have full control over how much I work
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完全控制我工作多少
- en: Have full control over where I can live
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完全控制我可以住在哪里
- en: Build products and services that would have helped me (so they can help you)
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立那些曾经帮助过我的产品和服务（这样它们也能帮助你）
- en: The only downside to this lifestyle is just that, you are in full control. If
    you don’t have the skills to navigate that freedom, your mind may not be able
    to handle the disorder.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这种生活方式的唯一缺点就是，你完全控制。如果你没有导航这种自由所需的技能，你的心智可能无法处理这种混乱。
- en: In this letter, I want to give unique and actionable lessons to help you accomplish
    the same.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在这封信中，我想提供独特且可操作的教训，帮助你实现同样的目标。
- en: Anyone can do this, and someday I hope to see a wave of individuals that package
    up the value they have to offer as a human being and give their gift to the world.
    Conscious entrepreneurship.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 任何人都可以做到这一点，我希望有一天能看到一波个人，将他们作为人类所拥有的价值打包起来，并将这份礼物献给世界。有意识的创业。
- en: Before we dive into the lessons, Digital Economics starts in 4 days. If you
    want to build a one-person business with the knowledge and skill you have, [consider
    enrolling here.](https://digitaleconomics.school)
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入探讨这些课程之前，数字经济学将在4天后开始。如果你想用你所拥有的知识和技能建立单人企业，[请在此处报名。](https://digitaleconomics.school)
- en: 1) It’s All Traffic & Offers
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1) すべてトラフィックとオファー
- en: <picture fetchpriority="high" decoding="async" class="wp-image-839">![](../Images/1fafdb077c251ebaeb52d93f97ebd9cf.png)</picture>
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-839">![](../Images/1fafdb077c251ebaeb52d93f97ebd9cf.png)</picture>
- en: Business is a game of creating a great product or service and putting it in
    front the right people.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 商业是一场创造伟大的产品或服务并将其展示给正确的人的游戏。
- en: Yes, there are details in the marketing, promotion strategy, and other things…
    but people get too caught up in that. If you were to go to a busy bar on a Saturday
    night (traffic) and hit on as many people as you could (offer) you would probably
    get laid. Too many people strive for perfection from the start and become an involuntary
    (financial) celibate.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，营销、推广策略和其他事情中有很多细节……但人们太过于沉迷于这些。如果你周六晚上（交通高峰期）去一个繁忙的酒吧，尽可能多地吸引人们（提供机会），你可能会得到性。太多的人从一开始就追求完美，变成了无意识的（财务）禁欲者。
- en: What many don’t understand is that it is just that, a game.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人不理解的是，这仅仅是一个游戏。
- en: It’s not reserved for anyone.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是为任何人保留的。
- en: You could affiliate for a product you’ve purchased before, write a Twitter thread
    promoting it, pay people to retweet it, and make a full-time income from that
    alone if you’re smart enough. Since the product is good, you *should* out-earn
    what you spend on paid promotions. That’s the whole point of ads. ROI.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以为之前购买的产品做联盟推广，写一条推文来推广它，付费让人们转发，如果你足够聪明，仅凭这一点就能获得全职收入。由于产品很好，你应该能够从付费推广中获得比支出更多的收益。这就是广告的全部意义。投资回报率。
- en: That’s a beginner method, but helps you build an audience along the way. That
    way, when you’re experienced enough, you can do the same for your own product
    or service. But, with time, you won’t have to pay for the traffic, because you
    will have built it with great content.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个初学者方法，但可以帮助你在旅途中建立受众。这样，当你经验足够丰富时，你可以为你自己的产品或服务做同样的事情。但是，随着时间的推移，你将不必为流量付费，因为你将用优质内容建立它。
- en: Of course, you can hold off on monetizing your brand for a bit while you build,
    but most people only do that because they’re told to.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，在建立品牌的同时，你可以暂时推迟货币化，但大多数人之所以这样做，是因为他们被告知要这样做。
- en: 2) You Need 3 Levers
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2) 你需要3个杠杆
- en: Once you build leverage (by pulling the right *levers* consistently) you gain
    a freedom that others can’t imagine.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你通过持续拉动正确的**杠杆**来建立杠杆作用，你将获得其他人无法想象的自由。
- en: Let’s act like you have something to sell. If you don’t, that should be on your
    mind 24/7\. You must contemplate it on long walks, immerse yourself in what people
    like you are selling, and be ready to go all in on building when inspiration strikes.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们假设你有什么东西要卖。如果你没有，这应该一直萦绕在你的脑海中。你必须长时间思考，沉浸在你这样的人正在销售的东西中，并在灵感迸发时准备好全力以赴地构建。
- en: A freelance, consulting, tutoring, or cohort service.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 自由职业、咨询、辅导或小组服务。
- en: Or a course, physical tool, membership, paid newsletter, or affiliate offer
    like discussed above.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 或者是一门课程、物理工具、会员资格、付费通讯或如上所述的联盟推广。
- en: If you don’t know how, learn.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道如何做，就去学习。
- en: Now, you need to strike a balance of 3 things.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你需要平衡三件事。
- en: Growth, nurture, and monetization.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 成长、培养与支持、货币化。
- en: These are levers. Meaning that you need to learn, discover, and perform the
    actions that are fundamental to these areas. These are done almost on a daily
    basis and should be systemized once you find what works for your business.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是杠杆。这意味着你需要学习、发现并执行这些领域的基本行动。这些行动几乎每天都在进行，一旦你找到对你业务有效的方法，就应该系统化。
- en: '**Lever 1) Growth**'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**杠杆 1) 成长**'
- en: If your following or brand isn’t growing on a consistent basis, there’s a problem.
    Fix it.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的关注者或品牌没有持续增长，那就存在问题。解决问题。
- en: Most people don’t grow because they think they are above content styles that
    lead to growth.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人没有成长，因为他们认为他们高于那些导致成长的内容风格。
- en: Content, and getting traffic to that content, is how you grow.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 内容，以及将流量引导到该内容，是你成长的方式。
- en: 90% of the market are beginners.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 市场中的90%都是初学者。
- en: That means your content on top-of-funnel socials should mostly be basic advice
    relating to your chosen interests or expertise.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着你顶部漏斗社交平台上的内容应该主要是与你的选择兴趣或专业知识相关的基本建议。
- en: Your social media brand should be broad enough to attract these beginners, so
    you can nuture them toward the more advanced stuff.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 你的社交媒体品牌应该足够广泛，以吸引这些初学者，这样你就可以引导他们走向更高级的内容。
- en: 'Side note: you CAN go super niche on social media, I just don’t like doing
    that personally. You put yourself in a box, give yourself less room to pivot,
    and aren’t able to talk about a variety of interests that intersect (productivity,
    self-improvement, and business overlap incredibly well, as an example).'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 旁白：你确实可以在社交媒体上非常细分，我只是个人不喜欢这样做。你把自己放在一个框子里，给自己更少的调整空间，而且无法谈论各种交叉的兴趣（例如，生产力、自我提升和商业重叠得非常好）。
- en: '**Lever 2) Nurture**'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**杠杆 2) 培养与支持**'
- en: If you are a value creator (instead of an entertainer, meme account, or commentary
    account) then your *entire job* is to educate your audience.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一个价值创造者（而不是一个娱乐者、模因账户或评论账户），那么你的**整个工作**就是教育你的受众。
- en: If your social media is attracting a wide net of people, you need to educate
    and nurture them to the point of purchasing a product of yours. This is how you
    change peoples lives, develop authority, and show that you are more than just
    looks.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的社交媒体吸引了广泛的人群，你需要教育和培养他们，直到他们购买你的产品。这就是你改变人们的生活、建立权威并展示你不仅仅是外表的方法。
- en: A newsletter, lead magnet, or other long form content is necessary for value
    creators. This is where you flex what you know and teach about your interests
    (related to what you are selling).
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 对于价值创造者来说，一份通讯、引诱物或其他长篇内容是必要的。这就是你展示你所知并教授你兴趣的地方（与你所销售的内容相关）。
- en: Brands that skip this education step will always have a difficult time monetizing
    their audience.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 跳过这一教育步骤的品牌在货币化他们的受众时总会遇到困难。
- en: '**Lever 3) Monetization**'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**杠杆3）货币化**'
- en: Don’t lie to yourself, you’re here to make money. If you’re just starting, that’s
    the entire reason you are thinking about doing this. The more honest you are with
    yourself about this, the more authentic you can be when selling. There’s nothing
    wrong with this, you need money. Don’t let people make you feel bad about wanting
    to get the thing that controls your life under your own control.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 不要欺骗自己，你在这里是为了赚钱。如果你是刚开始，那正是你考虑做这件事的全部原因。你越诚实地对待自己，你在销售时就越真实。这没什么错，你需要钱。不要让别人让你觉得自己想要控制自己生活的东西是错误的。
- en: Eventually, you will find deeper meaning and purpose in your work, but either
    way, you have to sustain that.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，你将在你的工作中找到更深的意义和目的，但无论如何，你必须保持这种状态。
- en: You need to test different promotions, angles, and how you promote.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要测试不同的促销、角度以及你的推广方式。
- en: Are you going to promote once a week with a Twitter thread? Are you only going
    to promote in your newsletter? Are you going to promote once a day under a relevant
    post?
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 你会每周通过Twitter帖子推广一次吗？你只会在你的通讯中推广吗？你会在相关帖子下每天推广一次吗？
- en: Once you know what brings in sales, you can start to systemize it and make it
    a part of your routine, that way the income becomes more sustainable.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你知道什么能带来销售，你就可以开始系统化它，让它成为你日常的一部分，这样收入就会更加可持续。
- en: In [Digital Economics](https://digitaleconomics.school), we help you systemize
    your brand, content, and product to follow these 3 pillars of social leverage.
    This is what most one-person businesses miss, and they become a commodity because
    of it.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在[数字经济学](https://digitaleconomics.school)中，我们帮助你系统化你的品牌、内容和产品，以遵循这三个社会杠杆的支柱。这是大多数个人企业所忽视的，因此它们变成了商品。
- en: 3) Question Everything
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3) 质疑一切
- en: It’s unfortunate that “question everything” has become so mainstream that it
    has lost it’s impact as advice.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 很不幸，“质疑一切”已经变得如此主流，以至于它作为建议的影响力已经丧失。
- en: Questioning is the driver of my success in business.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是推动我在商业上成功的关键。
- en: '*“You have to niche down!”*'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '*“你必须细分市场！”*'
- en: Who said?
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 谁说的？
- en: '*“You can’t sell until you hit 10,000 followers!”*'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '*“你必须在达到10,000名关注者之后才能开始销售！”*'
- en: Who said?
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 谁说的？
- en: '*“You can’t work 2 hours a day and make $1M a year!”*'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '*“你不可能每天工作2小时就能年收入100万美元！”*'
- en: I haven’t accomplished this yet, but WHO SAID?!
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我还没有完成这个，但WHO SAID?!
- en: Fuck your limiting beliefs right off and prove them wrong (for the benefit of
    yourself and your followers).
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 离开你的限制性信念，证明它们是错误的（为了你自己和你的追随者的利益）。
- en: This is where the fun comes into play. The game proposes a challenge that will
    kick you into the flow state.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是乐趣开始的地方。游戏提出一个挑战，将你带入心流状态。
- en: Be stubborn.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 要固执。
- en: When people say you can’t do something you want to do, **be the first to find
    the way.**
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 当人们说你不能做你想做的事情时，**你要第一个找到方法**。
- en: That’s how you gain the knowledge that will build your fame and fortune.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你会获得建立你名声和财富的知识。
- en: '**4) Deconstruct Everything**'
  id: totrans-89
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**4) 解构一切**'
- en: Consciousness and creativity are the drivers of success in the age of information.
    They are how you think, live, and impact on a deeper level.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 意识和创造力是信息时代成功的关键驱动力。它们是你如何思考、生活和更深层次地产生影响的方式。
- en: On the flip side of the coin, unconsciousness and closed-mindedness are a guaranteed
    path to mediocrity.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 从另一方面来看，无意识和思想狭隘是通往平庸的保证途径。
- en: Creativity is connecting the dots of consciousness.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 创造力是连接意识之点的。
- en: <picture decoding="async" class="wp-image-840">![](../Images/69dd252439e97ebc8dc7a7742a823884.png)</picture>
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-840">![](../Images/69dd252439e97ebc8dc7a7742a823884.png)</picture>
- en: You experience something by becoming directly conscious of that moment in life.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 通过直接意识到生活中的那个时刻，你经历了某件事。
- en: You become more conscious by not closing your mind off to any given tip of the
    iceberg you see.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 通过不关闭你对冰山任何一角的思维，你会变得更加有意识。
- en: Every-thing is the tip of the iceberg.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 每件事都是冰山一角。
- en: Every-thing is a whole that is composed of parts.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 每件事都是一个由部分组成的整体。
- en: Everything is a thing. A unit of thought. A figment of consciousness. A part
    and a whole.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 每件事都是一个事物。一个思维单元。意识的产物。部分和整体。
- en: Those parts also compose other wholes, meaning they connect.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 这些部分也构成了其他整体，这意味着它们是相互连接的。
- en: That’s all life is. The cosmos is a whole that has divided itself into infinite
    parts. Each of those parts are wholes in themselves. Humans are wholes. They are
    probes of self-discovery. As we discover ourselves, the cosmos discovers itself.
    There is nothing to do, but everything to do. Have fun with it.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是生活的全部。宇宙是一个整体，它将自己分成了无限的部分。这些部分本身也是整体。人类是整体。他们是自我发现的探测器。当我们发现自己时，宇宙也在发现自己。没有什么需要做的，但一切都可以做。享受这个过程吧。
- en: You dive into the iceberg through questioning.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过提问深入到冰山之下。
- en: '**Whole**: a book on productivity'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: '**整体**：一本关于生产力的书'
- en: '**Parts**: principles of productivity, tactics for being more productive, stories
    and anecdotes that hold your attention and help you understand what you are learning.'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '**部分**：生产力的原则，提高生产力的策略，吸引你注意并帮助你理解你所学习的故事和轶事。'
- en: By noting these down, can you use one of those interesting stories or anecdotes
    to make another point?
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将这些记录下来，你能用其中一个有趣的故事或轶事来提出另一个观点吗？
- en: In [Digital Economics](https://digitaleconomics.school), I talk about how Electronic
    Dance Music is like being a creator.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 在[数字经济学](https://digitaleconomics.school)中，我谈论了电子舞曲音乐如何像创作者一样。
- en: Every EDM producer has their own unique sound, they blend together different
    sounds, and walk people through a series of highs and lows.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 每个电子舞曲音乐制作人都有自己的独特声音，他们混合不同的声音，并引导人们经历一系列的高潮和低谷。
- en: A creator has their own unique tone, they blend together ideas, and walk people
    through the highs and lows of their life.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者有自己的独特风格，他们混合想法，并引导人们经历他们生活的起伏。
- en: I could also use EDM live sets to illustrate the highs and lows of life. If
    the DJ only plays hard music without a break, it is boring. If your life is all
    high, and no low, it gets boring.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 我也可以用电子舞曲现场表演来展示生活的起伏。如果DJ只播放音乐而不休息，那会很无聊。如果你的生活全是高潮，没有低谷，那也会很无聊。
- en: Practice deconstructing the next thing (literally anything) you see. Ask questions.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 练习分解你看到的下一件事（字面上说任何事）。提出问题。
- en: '**5) Don’t Quit, Pivot**'
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**5) 不要放弃，转型**'
- en: Everyone is worried about shiny object syndrome.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都在担心闪亮物体综合症。
- en: What you need to understand is that you are allowed to “start over” from a position
    of compounded knowledge.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要理解的是，你可以从复合知识的位置“重新开始”。
- en: You’re allowed to start over from a better position, with transferrable skills,
    and the new skills that sparked you to “start over.”
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以从更好的位置重新开始，拥有可转移的技能，以及激发你“重新开始”的新技能。
- en: If you learn web design and see an opportunity to use that skill and go all
    in on copywriting, why would you not?
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你学习网页设计，看到使用这项技能的机会并全力以赴进行文案写作，你为什么不呢？
- en: That’s not shiny object syndrome, that’s skill stacking. It will make you more
    money in the long run.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 那不是闪亮物体综合症，那是技能堆叠。从长远来看，它会让你赚更多的钱。
- en: If you are still working toward the same big and broad goal, like financial
    freedom, you are required to pivot along the way.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你仍在朝着同一个宏伟而广泛的目标努力，比如财务自由，你需要在路上进行转型。
- en: If you give up on that big goal, you are giving up on your future. Not good.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你放弃那个宏伟的目标，你就是在放弃你的未来。这不好。
- en: Sure, quit a certain skill because you saw an opportunity. Your initial skill
    isn’t going to go away, especially if you will still use it in your next venture.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，放弃一项技能是因为你看到了机会。你的初始技能不会消失，尤其是如果你会在下一个事业中使用它。
- en: Knowledge compounds, skills compound, good habits in general compound.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 知识会累积，技能会累积，一般的好习惯也会累积。
- en: This is why I am a fan of a personal brand and one-person business. Your interests
    change. Your skills, knowledge, experience, awareness, and network compounds.
    You are a human. Humans evolve. Your business evolves with you if you follow this
    path. In fact, it is the vessel for accelerated evolution.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么我喜欢个人品牌和单人企业。你的兴趣会改变。你的技能、知识、经验、意识和网络会复合增长。你是一个人类。人类会进化。如果你遵循这条道路，你的业务也会随着你一起进化。事实上，它是加速进化的载体。
- en: Don’t quit, pivot.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 不要放弃，转变方向。
- en: 6) Copy Your Way To Success
  id: totrans-122
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6) 复制成功之路
- en: Success is a game of intelligent imitation.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 成功是一场智能模仿的游戏。
- en: <picture decoding="async" class="wp-image-841">![](../Images/f58f331c4266c7b1559c64e01a24eee2.png)</picture>
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-841">![](../Images/f58f331c4266c7b1559c64e01a24eee2.png)</picture>
- en: Don’t act like you haven’t copied everything around you since you were born,
    just to think you are “original,” clever, or witty.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 不要表现得好像你从出生以来就没有模仿过周围的一切，只是因为你认为自己“原创”、“聪明”或“机智”。
- en: You very well may be, but the self can only exist in relation to other. Who
    you *think* you are is just a mental construction from the environments, stimuli,
    and conditioning you’ve been exposed to over your life.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 你很可能就是这样，但自我只能存在于与其他人的关系中。你*认为*你是谁只是你一生中暴露于环境、刺激和训练的心理构造。
- en: Imitation is the greatest skill any beginner can follow, like you’re a blank-slate
    child that just got birthed into the life of business.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 模仿是任何新手都能遵循的最重要的技能，就像你是一个刚出生进入商业生活的白板孩子。
- en: Practice writing in your favorite author’s voice
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用你最喜欢的作者的语气练习写作
- en: Use the topic your favorite account posted as inspiration
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用你最喜欢的账号发布的主题作为灵感
- en: Swipe the problems that your competitor targets in their landing page
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 滑过你的竞争对手在他们的着陆页上针对的问题
- en: Deconstruct why certain posts go viral and whether or not it brought in money
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析为什么某些帖子会走红，以及它是否带来了收入
- en: Look at what everyone is selling (meaning it sells) and think about how you
    can create your own with your unique experience
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 看看大家都在卖什么（意味着它能卖出去），然后想想你如何能利用你独特的经验创造出自己的东西
- en: Read about an idea that excites you, don’t highlight, and write it without looking
    at the text. Make it your own by recalling what you learned from memory
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 了解一下让你兴奋的想法，不要高亮，然后不看文本就写下来。通过回忆你从记忆中学习到的内容来使它成为你自己的东西
- en: Before I go on more of a philosophical rant, let’s get back to business.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 在我继续更多的哲学狂言之前，让我们回到正题。
- en: 7) The Most Profitable Niche Is You
  id: totrans-135
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7) 最有利可图的利基市场是你自己
- en: Traditional branding, marketing, and sales advice are coming to an end. We’ve
    explored that crevice of reality and made distinctions between the good and bad.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 传统品牌、营销和销售建议正走向终结。我们已探索了现实的这个缝隙，并区分了好坏。
- en: Pushy sales funnels and robotic writing work, but they work less than they used
    to.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 推销漏斗和机器人写作曾经有效，但现在效果不如以前。
- en: If you want to get ahead of the curve, *productize yourself.*
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想领先于潮流，*产品化你自己*。
- en: Understand yourself through self-reflection and the Myers Briggs personality
    test.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 通过自我反思和迈尔斯-布里格斯性格测试来了解自己。
- en: Then, treat YOU as your customer avatar.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，把你自己当作你的客户形象。
- en: Pursue your goals, study your interests, and write to your past, present, and
    future self online.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 追求你的目标，研究你的兴趣，并在线向你的过去、现在和未来的自己写信。
- en: Nobody can replicate authenticity.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人能复制真实性。
- en: There is only one you, if you aren’t a slave to the external. You are what you
    say you are, not what other people say you are.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 你是独一无二的，如果你不是外部环境的奴隶。你所说的就是你，而不是别人所说的你。
- en: 8) Self-Awareness Is Key
  id: totrans-144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8) 自我意识是关键
- en: Self-awareness (or self-consciousness, in the positive sense) will help you
    learn most skills faster than anyone else.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 自我意识（或积极的自我意识）将帮助你比其他人更快地学习大多数技能。
- en: If you’re a creator, personal brand, or other form of solopreneur, you understand
    the necessity of consistent high-quality content.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一位创作者、个人品牌或其他形式的独立创业者，你会理解持续高质量内容的重要性。
- en: That means you have to master human behavior and psychology.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着你必须掌握人类行为和心理。
- en: In this case, you are your best teacher.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，你就是你最好的老师。
- en: Why did that thread capture my attention?
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么那个帖子吸引了我的注意？
- en: Why did I like and retweet it?
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我喜欢并转发它？
- en: Think about it, you want people to do those same things to you.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 想想看，你希望别人对你做同样的事情。
- en: So rather than scrolling past as we mindlessly do…
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，而不是像我们那样无意识地滚动过去…
- en: Stop, pause, and reverse engineer
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 停下来，暂停，逆向工程
- en: Same with making money.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，赚钱也是如此。
- en: If you want to make money, understand why you spend money.
  id: totrans-155
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你想赚钱，了解你为什么花钱。
- en: ''
  id: totrans-156
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [April 28, 2022](https://twitter.com/thedankoe/status/1519636048430735365?ref_src=twsrc%5Etfw)
  id: totrans-157
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年4月28日](https://twitter.com/thedankoe/status/1519636048430735365?ref_src=twsrc%5Etfw)
- en: 9) Start, Then Learn
  id: totrans-158
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 9) 先行动，再学习
- en: Information is abundant.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 信息是丰富的。
- en: The massive mistake that people make in the age of information is letting knowledge
    outpace execution.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 信息时代人们犯的一个巨大错误是让知识超越执行。
- en: Yes, you can learn anything, but are you learning anything?
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，你可以学习任何东西，但你真的在学习吗？
- en: The best way to go about this is by outlining a project.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 处理这个问题最好的方式是制定一个项目规划。
- en: Outline a newsletter
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 制定一个通讯简报
- en: Outline a product
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 制定一个产品规划
- en: Outline a service
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 制定一个服务规划
- en: Outline your life
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 制定你的生活规划
- en: Then, start.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，开始。
- en: Your mind will be primed for pattern recognition. Your quality of life will
    shoot through the roof because you have a *project* to *apply* what you learn,
    experience, and consume as you go about your days.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 你的思维将准备好进行模式识别。你的生活质量将飞跃，因为你有一个*项目*来应用你在日常生活中所学、所经历和所消费的知识。
- en: Create a project, then seek the specific knowledge necessary to actualize that
    project. Don’t get trapped in tutorial hell.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个项目，然后寻找实现该项目的具体知识。不要陷入教程的陷阱。
- en: 10) Create Your Own Career
  id: totrans-170
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10) 创建你的职业生涯
- en: 60% of new jobs haven’t been created yet.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 60%的新工作尚未被创造出来。
- en: Meaning, we have no idea what they are going to be.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 意思是，我们不知道它们会是什么样子。
- en: What we do know is that they are on the internet.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 我们所知道的是，它们都在互联网上。
- en: Value creators are creating new jobs left and right.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 价值创造者正在左右创造新的工作。
- en: The internet allows people to pursue new goals, meaning there are new paths
    to take in life, meaning there are more problems to solve.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网允许人们追求新的目标，这意味着生活中有新的道路可以选择，这意味着有更多的问题需要解决。
- en: The education industry can’t keep up, so value creators pave the way and distill
    their learnings in the form of content, courses, and other forms of educational
    media.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 教育行业无法跟上，因此价值创造者开辟道路，并将他们的学习成果以内容、课程和其他形式的教育媒体的形式提炼出来。
- en: I’ve seen music production teachers, therapeutic herb specialists, confidence
    coaches, and even biohacking coaches (for performance-enhancing dr*gs of the mind,
    body, and spirit… like psychedelics).
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 我见过音乐制作教师、治疗草药专家、自信教练，甚至生物黑客教练（针对增强身心和精神的性能提升药物……如迷幻药）。
- en: How do you create your own career?
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何创建自己的职业生涯？
- en: By pursuing your own broad interests, turning them into their own category,
    and solving problems with them.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 通过追求你自己的广泛兴趣，将它们转化为自己的类别，并利用它们解决问题。
- en: If you are interested in mindset, productivity, and business… that can all fall
    under the “niche” of lifestyle design, personal sovereignty, or something else.
    Then, you *create* the meaning, theory, and philosophy behind that new category.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对心态、生产力、商业感兴趣……这些都可能属于“生活方式设计”、“个人主权”或其他某个领域的“利基”。然后，你*创造*这个新类别背后的意义、理论和哲学。
- en: Mine is one-person businesses. I tie in spirituality with you being a divine
    “creator” and form my own way of viewing this through my personal experience.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 我的业务是单人企业。我将灵性与你作为神圣的“创造者”联系起来，并根据自己的个人经验形成自己的观点。
- en: 11) Lack Of Experience Isn’t An Excuse
  id: totrans-182
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 11) 缺乏经验不是借口
- en: It’s incredible what kind of mental gymnastics the ego will go through to convince
    you what you can’t do.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 令人难以置信的是，自我会进行怎样的心理体操来说服你你不能做什么。
- en: If I tell you to start writing online and the 20+ life and business benefits
    that come from it, how does your mind object?
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我告诉你开始在线写作以及它带来的20多个生活和商业好处，你的思维会如何反对？
- en: “I’m not good at writing.”
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: “我不擅长写作。”
- en: “Only influencers can grow an audience.”
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: “只有影响者才能扩大观众。”
- en: “I’m just freelancing before I build an audience.”
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: “我在建立观众之前只是自由职业。”
- en: While all of these are dumb and more false than true, the last one is a little
    too silly.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然所有这些都是愚蠢的，而且比真实的还要多，但最后一个有点太荒谬了。
- en: You’re telling me you don’t want to give out free information (because you are
    inexperienced), but you are going to do free or paid *work* for someone’s business
    where there is revenue on the line? How do you justify that to yourself?
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 你告诉我你不想提供免费信息（因为你缺乏经验），但你却要为某人的业务做免费或付费*工作*，那里有收入在考虑？你怎么向自己解释这一点？
- en: Writing is how you clarify your thoughts. Writing is how you clarify what you
    know. Writing is how you open up the potential to come up with a *real* (not copied)
    solution that you can sell for more money.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 写作是你澄清思想的方式。写作是你澄清你所知道的方式。写作是你开启提出*真正*（不是复制的）解决方案的潜力的方式，你可以用它来赚取更多的钱。
- en: Learn the skill, use the skill (on yourself, because a personal brand requires
    every skill that a business would need), teach what you learn, then sell it.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 学习技能，运用技能（对自己，因为个人品牌需要企业需要的每一项技能），教授你所学的，然后将其出售。
- en: Do the opposite of everyone else.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 做与别人相反的事情。
- en: <picture loading="lazy" decoding="async" class="wp-image-842">![](../Images/e94882e204ab551a398eb5d69ff6fb8f.png)</picture>
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-842">![](../Images/e94882e204ab551a398eb5d69ff6fb8f.png)</picture>
- en: Everyone is just leaving out the pieces of the full picture that would lead
    them to action.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人只是遗漏了完整画面中引导他们采取行动的部分。
- en: Don’t let fear rule you and keep you the same.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 不要让恐惧统治你，让你保持不变。
- en: '***– Dan Koe***'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: '***– 丹·科伊***'
- en: P.S. Digital Economics starts in 4 days.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: P.S. 数字经济学课程将在4天后开始。
- en: If you want a complete Notion dashboard for starting, growing, and scaling your
    one-person business, [consider enrolling.](https://digitaleconomics.school)
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要一个用于启动、成长和扩展你的一人企业的完整Notion仪表板，[考虑报名参加。](https://digitaleconomics.school)
- en: We will work together to create a unique brand, authentic voice, untapped niche,
    and product or service that actually sells (from the start of your journey).
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将共同努力创造一个独特的品牌，真实的嗓音，未被开发的细分市场，以及真正能销售的产品或服务（从你的旅程开始）。
