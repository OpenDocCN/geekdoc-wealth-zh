- en: 8 Steps To Just Stop Giving A F*ck
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 8 Steps To Just Stop Giving A F*ck
- en: 原文：[https://thedankoe.com/letters/8-steps-to-just-stop-giving-a-fck/](https://thedankoe.com/letters/8-steps-to-just-stop-giving-a-fck/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/8-steps-to-just-stop-giving-a-fck/](https://thedankoe.com/letters/8-steps-to-just-stop-giving-a-fck/)
- en: If you want to stop caring what others think…
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要停止关心别人的看法...
- en: If you want to move through the world with confidence and grace…
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要自信地优雅地在这个世界上行走...
- en: If you want to build the business, approach the girl, master your craft, or
    get what you want out of life…
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要建立业务、掌握你的技艺或从生活中得到你想要的东西...
- en: Here are 8 steps to just stop giving a f*ck.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些停止在乎的8个步骤。
- en: 'We’re going to go over:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将讨论：
- en: The 3 pillars of self-confidence so you can stop caring… fast.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自信的三个支柱，这样你就可以快速停止关心。
- en: Why you care so much in the first place (so you have the awareness to stop).
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么你一开始就如此关心（这样你就有意识去停止）。
- en: How to reprogram your mind to become who you were meant to be.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何重新编程你的大脑，成为你注定要成为的人。
- en: Why you are probably on a life path that has a 100% failure rate, and how to
    escape.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么你可能正走在一条100%失败率的生活道路上，以及如何逃离。
- en: How to develop your own internal compass and find what you want in life.
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何发展你自己的内心指南针，找到你生活中的所求。
- en: The passion process for discovering your interests and turning improvement into
    obsession.
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发现你的兴趣并将改进变成痴迷的过程。
- en: A tool to accelerate changing your life.
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个加速改变你生活的工具。
- en: The nature of reality, and how it can help you become more intelligent (so you
    stop worrying about minor inconveniences).
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 现实的本质，以及它如何帮助你变得更聪明（这样你就不会为小事烦恼）。
- en: I don’t want this to be yet another superficial band-aid of step-by-step advice
    you can find anywhere online. I want you to solve this problem for good. And that
    will require us to go deep.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我不希望这又是一个随处可见的表面性的步骤建议。我希望你能彻底解决这个问题。而这将需要我们深入探讨。
- en: '* * *'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: '**A subtle reminder:**'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '**一个微妙的提醒：**'
- en: We will begin rolling out access to Kortex on September 20th (6 days from now).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将于9月20日开始推出Kortex的访问权限（现在还有6天）。
- en: You must be on the Kortex waitlist to gain access.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须加入Kortex的等待名单才能获得访问权限。
- en: Taylin Simmonds said, “It’s like Notion, Obsidian, and Google Docs had a baby.”
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: Taylin Simmonds说：“这就像Notion、Obsidian和Google Docs生了一个孩子。”
- en: 'So, if you want a place to:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，如果你想要一个地方：
- en: Capture all of your ideas (without having one messy note where you lose them
    all)
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 捕获你所有的想法（而不会有一个混乱的笔记，让你丢失它们）
- en: Store your highlights from Kindle, web pages, PDFs, Tweets, and anything that
    integrates with Readwise.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将你的Kindle高亮、网页、PDF、推文以及任何与Readwise集成的内容存储起来。
- en: Haven an interconnected second brain that breeds articulate and unique writing.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 拥有一个互联的第二大脑，孕育出清晰而独特的写作。
- en: Write landing pages, social posts, video scripts, or any of your creative projects.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编写着陆页、社交媒体帖子、视频脚本或任何你的创意项目。
- en: And, get access to a free second brain course and community forum…
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，获取免费的第二大脑课程和社区论坛的访问权限...
- en: Join the [Kortex waitlist](https://kortex.co) here. You’ll be receiving an email
    over the coming weeks to sign up (and yes, there’s a free tier).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里加入[Kortex等待名单](https://kortex.co)。在接下来的几周内，你将收到一封电子邮件来注册（是的，有免费层）。
- en: '* * *'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 1) The 3 Pillars Of Self-Confidence
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1) 自信的三个支柱
- en: The first step to not giving a f*ck is understanding the big picture of self-confidence,
    not just some shallow advice.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 不再在乎的第一步是理解自信的大图景，而不仅仅是些肤浅的建议。
- en: If self-confidence were as simple as watching a YouTube video on confidence,
    we would live in a Utopia.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 如果自信就像观看一个关于自信的YouTube视频那么简单，我们就会生活在乌托邦。
- en: There is something much deeper going on, and I hope I can make you aware of
    it throughout this letter.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 有更深层次的事情在发生，我希望我能在整封信中让你意识到这一点。
- en: Lack of confidence is the one thing that plagues the potential of the majority
    of the population. They care too much about what others think.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 缺乏自信是困扰大多数人口潜力的一个问题。他们太在意别人的看法。
- en: 'Let’s say you want to start a business, and the thoughts start to flood in:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你想开始创业，思绪开始涌来：
- en: What will my parents think?
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我的父母会怎么想？
- en: What will my friends think?
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我的朋友们会怎么想？
- en: What will my spouse think?
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我的配偶会怎么想？
- en: Will it be enough to replace my income?
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这是否足以取代我的收入？
- en: How long will it take?
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 需要多长时间？
- en: Don’t even get me started on the thoughts that come when you actually start
    building the business.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 当你真正开始建立业务时，甚至不要让我开始谈论那些涌上心头的想法。
- en: The reason people fail is they can’t lift the emotional weights required to
    achieve the goals they set.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 人们失败的原因是他们无法承担实现他们设定的目标所需的情感负担。
- en: For every thought of a better life, there are 100 thoughts beating you back
    down.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每一个想要过上更好生活的想法，都有100个想法把你拉回原点。
- en: And that’s just thoughts about business.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是关于商业的想法。
- en: What about the other 60-80,000 thoughts we have in a day?
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们一天中还有60-80,000个其他想法呢？
- en: We have a lot on our plate.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有很多事情要做。
- en: Will I come off as weird when I try to make new friends?
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 当我尝试交新朋友时，我会显得奇怪吗？
- en: Where will I end up in life if I don’t get my debt under control?
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我不控制我的债务，我会在生活中走到哪里？
- en: Did I feed the dog this morning? Imagine how terrible of a pet owner people
    would think I am if they found out.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我今天早上喂狗了吗？想象一下，如果他们发现了，人们会认为我是一个多么糟糕的宠物主人。
- en: Developing self-confidence is no easy task.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 培养自信并非易事。
- en: More information, more responsibilities, and more options for our future turns
    confidence into success and anxiety into failure.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 更多信息，更多责任，以及更多未来选择，将信心转化为成功，将焦虑转化为失败。
- en: This is the modern environment we live in.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们现在生活的现代环境。
- en: How do we begin to cultivate the trust in ourselves that leads to self-confidence?
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何开始培养那种导致自信的信任？
- en: 'When most people wonder how they can become more confident, they are reminded
    of the simplistic advice:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 当大多数人想知道他们如何能变得更加自信时，他们会想起这种简单的建议：
- en: “Confidence = competence.”
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: “自信=能力。”
- en: This is true, but most people will see competence as getting better at a specific
    skill.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这是真的，但大多数人会将能力视为在特定技能上变得更好。
- en: So they’ll learn and learn and learn, never act, never self-reflect, and never
    actually develop confidence as a skill in any situation. This is the most common
    outcome.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 所以他们会学习，学习，再学习，从不行动，从不自我反思，也从未在任何情境中真正将自信作为一种技能来培养。这是最常见的结局。
- en: There is depth behind that simple statement that few can see.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 那个简单陈述背后有着深意，很少有人能看透。
- en: We must seek to understand that statement, because clearly “confidence = competence”
    as general advice has not fixed one of the biggest problems in the world, but
    has made it worse.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我们必须寻求理解这个陈述，因为显然，“自信=能力”作为一般建议并没有解决世界上最大的问题之一，反而使它变得更糟。
- en: '**Pillar 1) Perspective**'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**支柱1）视角**'
- en: When you enter a situation where you don’t feel confident, anxiety shoots through
    the roof.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 当你进入一个你感觉不自信的情境时，焦虑会急剧上升。
- en: This closes your mind to everything but your thoughts.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这会使你的思想封闭，除了你的思想之外，其他一切都不考虑。
- en: They multiply.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 它们会成倍增加。
- en: You completely retract from the situation and become a slave to your past. The
    experiences you’ve had before. You remain the same person.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 你完全从情境中退缩，成为你过去的奴隶。你之前经历过的经历。你仍然是同一个人。
- en: You must snap out of this and make a conscious effort to reprogram your habitual
    way of reacting to situations.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须摆脱这种状态，并做出有意识的努力，重新编程你对情境的反应习惯。
- en: 'To do this:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 要做到这一点：
- en: When you enter a situation and anxiety sparks, pause
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你进入一个情境，焦虑爆发时，暂停一下
- en: Zoom out to see the situation for what it is, just a normal situation
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 放大视角，看看情境本身，只是一个正常的情况
- en: Transfer consciousness to those in the situation with you
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将意识转移到与你处于同一情境的人身上
- en: “Transferring consciousness” is adopting another person’s perspective.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: “转移意识”就是采取另一个人的视角。
- en: Most people are just people living the same experience as us.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人只是像我们一样经历同样生活的人。
- en: Billionaires are people with the same problems.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 亿万富翁也是有同样问题的人。
- en: Fitness models are people with the same problems.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 健身模特也是有问题的人。
- en: Any person you mentally place above you has the same problems.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 你在心理上置于你之上的人都有同样的问题。
- en: The ONE thing that will make them react in a negative way to you is treating
    them like they aren’t human.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 令他们对你产生负面反应的唯一一件事就是像对待非人类一样对待他们。
- en: Don’t put them above you.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 不要把他们置于你之上。
- en: Remember, this is a habit you are forming.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，这正在形成一种习惯。
- en: It will take repetition and practice.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这需要重复和实践。
- en: You cannot advance to the other pillars if you do not gain perspective on a
    situation.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不对情境有正确的认识，你就无法前进到其他支柱。
- en: '**Pillar 2) Perception**'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '**支柱2）感知**'
- en: How you perceive situations determines how you act.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何看待情境决定了你的行为。
- en: This requires you to shift into an open-minded state before and maintain it
    during the situation.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 这要求你在情境之前转变到一个开放的心态，并在情境中保持这种心态。
- en: If you are scrolling social media and don’t perceive a business owner’s tweet
    as an opportunity to reach out, you won’t reach out.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你滑动社交媒体，不把企业主的推文视为接触的机会，你就不会去接触。
- en: If you see it as an opportunity, you may still botch the message or not send
    one at all because you misperceive that individual.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你把它视为机会，你可能会搞砸信息或者根本不发送信息，因为你误解了那个人。
- en: The same goes for making new friends or engaging in difficult discussions.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这同样适用于结交新朋友或参与困难的讨论。
- en: Perception goes two ways.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 感知是双向的。
- en: You perceive others in a certain way based on how they present themselves.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 你根据他们如何展示自己来感知他人。
- en: They perceive you based on how you present yourself.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 他们根据你如何展示自己来感知你。
- en: If you don’t “look the part” or hold yourself in a way that would lead to a
    positive interpretation by the other party, it won’t go well. And you will know
    this subconsciously. You won’t engage in situations because you set yourself up
    for failure in the way you look and act.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有“看起来合适”或者以某种方式表现自己，导致对方做出积极的解读，那么事情就不会顺利。而且你会在潜意识中知道这一点。你不会参与某些情况，因为你以你的外观和行为为自己设置了失败。
- en: I’m as introverted as they come, but people often tell me I look confident in
    the way I dress, walk, and talk.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常内向，但人们经常告诉我，我穿着、走路和说话的方式看起来很有自信。
- en: Practice.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 练习。
- en: '**Pillar 3) Practice**'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '**第三支柱）实践**'
- en: How good you are at something allows you to perceive situations better.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 你在某个方面的能力允许你更好地感知情况。
- en: Think of skill acquisition as a way to increase your level in the game of life.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 将技能获取视为提高你在人生游戏中水平的一种方式。
- en: In a video game, there are “skill trees.”
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在一款视频游戏中，有“技能树”。
- en: As you play the game, you choose skills to help you play how you want.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 在游戏中，你选择技能来帮助你以你想要的方式玩游戏。
- en: As you practice those skills, you increase your experience, and new skills become
    available to you.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你练习这些技能，你增加了你的经验，新的技能对你开放。
- en: 'The key point here:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 这里关键点是：
- en: '*You are not able to access other skills until you practice the ones available
    to you.*'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '*你无法访问其他技能，直到你练习你目前可用的技能。*'
- en: You don’t have the awareness of profitable opportunities because you don’t have
    the skill to recognize, choose, and act on them.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有意识到有利可图的机会，因为你没有识别、选择和采取行动的技能。
- en: As you move toward your goals, you will be required to educate and practice
    skills to reach those goals.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 当你朝着你的目标前进时，你需要教育和练习技能以达到那些目标。
- en: If you aim too high, you get overwhelmed and don’t know what to learn.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你目标定得太高，你会感到不知所措，不知道该学什么。
- en: You must play at your level and acquire the skills necessary to reach the next
    level.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须在你自己的水平上玩，并获取达到下一个水平所需的技能。
- en: As your level increases, you fill your toolbelt with skills that allow you to
    view the plane you are on, which is more vast than the lower level you were at.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你的水平提高，你会在你的工具箱中填满技能，这些技能让你能够看到你所在的飞机，这比你在较低水平时要广阔得多。
- en: My first successful endeavor was freelance web design.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 我第一次成功的尝试是自由职业网页设计。
- en: A single skill that is available for anyone to learn. Lots of competition and
    battling for higher prices.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 任何人都可学习的单一技能。竞争激烈，争夺更高的价格。
- en: I knew that if I wanted to do something more profitable, like funnels for service
    businesses, I would have to learn skills like marketing, copywriting, and buyer’s
    journey to do that well.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道，如果我想做一些更有利可图的，比如为服务型企业制作漏斗，我就必须学习营销、文案写作和买家旅程等技能，才能做得好。
- en: Then, when I pursued the level of a creator, I needed to combine what I knew
    and add new skills like content writing (I teach all skills you need in [2 Hour
    Writer](https://2hourwriter.com/)).
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，当我追求创作者的水平时，我需要结合我所知，并添加新的技能，如内容写作（我在[2小时作家](https://2hourwriter.com/)教授你所需的所有技能）。
- en: The higher my level grew, the more people I met, and the more my confidence
    throughout multiple domains increased.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 我的水平越高，我遇到的人越多，我在多个领域的自信心也越强。
- en: The worst thing you can do is stop learning new skills and settle for the level
    you are at.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 你能做的最糟糕的事情就是停止学习新技能，满足于你现在的水平。
- en: Perspective, perception, and practice are the foundations of self-confidence.
    Now, let’s dive a bit deeper.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 视角、感知和实践是自信的基础。现在，让我们深入探讨一下。
- en: 2) Understand Why You Care In The First Place
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2) 理解你为何一开始就关心
- en: Today, so many hundreds of thousands of years later, we have the same brain
    designed for the same purpose. But because we have increasingly gained control
    of our environment and the physical pressures have loosened dramatically, the
    dangers have become much more subtle—they come in the form of people (not leopards)
    and their tricky psychology, and the delicate political and social games we have
    to play. And because of these less obvious dangers, our greatest problem is that
    our minds tend to become less sensitive to the environment; we turn inward, absorbed
    in our dreams and fantasies. We become naive. – Robert Greene
  id: totrans-112
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 今天，在数百万年之后，我们拥有着为相同目的设计的相同大脑。但由于我们越来越能控制我们的环境，物理压力大大减轻，危险变得更加微妙——它们以人的形式（而不是豹子）和他们的狡猾心理，以及我们必须玩的政治和社会游戏出现。正因为这些不那么明显的危险，我们最大的问题是我们的思维变得对环境不那么敏感；我们转向内心，沉迷于我们的梦想和幻想。我们变得天真。
    —— 罗伯特·格林
- en: You care too much because it threatens your self-image.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 你太在乎了，因为这威胁到了你的自我形象。
- en: You have an image of who you are in your head, and when a thought, idea, or
    opinion conflicts with that, your emotions start to flare up. You retract. You
    get trapped in survival mode. The only thing you can focus on is the opinion of
    another person. From there, and because you failed to pause and open your mind,
    it amplifies and dominates your mind.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 你在心中有一个关于自己的形象，当一种思想、观点或意见与之冲突时，你的情绪开始激化。你退缩了。你陷入了生存模式。你唯一能关注的就是另一个人的观点。从那里，因为你没有暂停并打开你的心扉，它放大并占据了你的心灵。
- en: Humans and animals have one major difference.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 人类和动物有一个主要的不同点。
- en: Animals attempt to survive on the physical level. They feel threatened when
    their physical body is threatened. They attempt to reproduce the information in
    their genes.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 动物试图在物理层面上生存。当它们的身体受到威胁时，它们会感到受到威胁。它们试图复制它们基因中的信息。
- en: Thanks to the emergence of self-reflective consciousness, humans attempt to
    survive on the physical *and* mental level. We feel threatened when our physical
    body is threatened, but also when our mental body, or our self-image, is threatened.
    We attempt to reproduce the information in our genes, but also the information
    in our consciousness.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了自我反思意识的产生，人类试图在物理层面和心灵层面上生存。当我们的身体受到威胁时，我们会感到受到威胁，但我们的心灵，或者我们的自我形象，也会受到威胁。我们试图复制我们基因中的信息，也试图复制我们意识中的信息。
- en: We write books, communicate, text each other, and choose political sides so
    that the web of ideas that we identify with survives beyond our death. Ideas are
    mental sperm. By reading a book, the author is mentally impregnating you. Your
    self-image is the child of all of the ideas you’ve been exposed to your entire
    life. Artists attain immortality when their ideas become immortal, like how we
    reference Plato and Aristotle long after their physical bodies are gone.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 我们写书，交流，互相发短信，选择政治立场，这样我们认同的思想网络就能在我们死后继续存在。思想是精神上的精子。通过读书，作者在精神上使你受孕。你的自我形象是你一生中接触到的所有思想的产物。艺术家通过他们的思想变得不朽，就像我们长时间引用柏拉图和亚里士多德，尽管他们的肉体已经消失。
- en: This may sound weird, and it is, but I’ll let you reflect on it for a bit to
    determine its validity. If it helps, don’t think of it as mental sex, think of
    it as planting and watering seeds to become flowers in your mind. Same thing when
    you think about it. As above, so below.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能听起来很奇怪，确实如此，但我会让你稍微思考一下，以确定它的有效性。如果这有助于你，不要把它看作是精神上的性行为，而把它看作是在你的心中播种和浇灌种子，使其成为花朵。当你思考的时候也是这样。上面这样，下面也是这样。
- en: So, why do we care what others think?
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们为什么在乎别人的看法呢？
- en: Because we want to survive.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 因为我们想要生存。
- en: We are wired to be accepted by the tribe. If we aren’t accepted, we will become
    outcasts. We will lose our resources for survival. Your parents will kick you
    out if you don’t agree with the ideologies they’ve so heavily identified with,
    like being a Republican, Democrat, Christian, Muslim, or if they’ve identified
    hard enough… they will despise you if your favorite sports team is not the same
    as theirs (this is an extreme, but possible case). Your beliefs go to battle with
    your parent’s beliefs, and they will do whatever it takes to survive. The psychological
    feeling is on par with being stabbed in battle. If they aren’t developed, they
    will stab back by kicking you out of the house, and you *will* feel that pain.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 我们被编程去被部落接受。如果我们不被接受，我们就会成为局外人。我们将失去生存的资源。如果你的父母与你所认同的意识形态不同，比如你是共和党人、民主党人、基督徒、穆斯林，或者如果你足够坚定地认同……如果你的最喜欢的运动队不是他们的（这是一个极端但可能的情况），他们将会厌恶你。你的信仰与父母的信仰发生冲突，他们会不惜一切代价去生存。这种心理感受与在战斗中被刺伤相当。如果他们没有发展，他们会通过把你赶出家门来反击，你*将会*感到那种痛苦。
- en: In some cases, it makes a lot of sense to care what others think. It is wise
    and strategic not to want to be kicked out (or stabbed back) at a young age when
    you don’t have the ability to survive and thrive on your own.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些情况下，关心别人的看法是有意义的。在你还没有能力独立生存和繁荣的时候，不想被排斥（或被反击）是明智和战略性的。
- en: But in 95% of modern cases, when we can learn anything, do anything, and achieve
    anything, it’s completely useless. You are not actually being threatened. Your
    survival is not actually at stake when someone makes fun of your hairline in the
    comment section. But, you haven’t learned to navigate and master your mind, so
    you think the threat is real and become a slave to it. You don’t have the knowledge,
    skill, and self-development to be able to do whatever you want with confidence.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 但在95%的现代案例中，当我们可以学习任何东西，做任何事，实现任何事时，这是完全无用的。你实际上并没有受到威胁。当有人在评论区嘲笑你的发际线时，你的生存并没有真正受到威胁。但是，你没有学会如何导航和掌控你的思维，所以你认为威胁是真实的，并成为它的奴隶。你没有知识、技能和自我发展的能力，能够自信地做任何你想做的事。
- en: 3) Program Your Mind To Stop Caring
  id: totrans-125
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3) 编程你的思维停止关心
- en: You care what people think because your mind is programmed to.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 你在乎别人的看法，因为你的思维被编程去这样。
- en: It’s second nature to you.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 这对你来说是一种本能。
- en: You were programmed as a child to follow orders. Your mind programmed itself
    to survive. You registered threats to your survival – like touching a candle flame
    when you were young – as a bad thing. It makes sense. You didn’t want to be scolded
    or scorched. That’s negative feedback, and your mind interprets it as such.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 你在小时候就被编程去服从命令。你的思维编程自己以生存。你将威胁到你生存的事情——比如小时候触摸蜡烛火焰——视为坏事。这是有道理的。你不想被责骂或烧伤。这是负面反馈，你的思维将其解释为如此。
- en: Your parents probably didn’t teach you how to master your mind because they
    didn’t master theirs.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 你的父母可能没有教你如何掌控自己的思维，因为他们自己也没有掌控好。
- en: Here’s how you start reprogramming your mind.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是开始重新编程你思维的方法。
- en: First, you need to break the unconscious habit.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你需要打破无意识的习惯。
- en: You need to stop the program from executing.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要停止程序执行。
- en: Any time you feel an emotional reaction, *pause.*
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 每当你感到情绪反应时，*暂停*。
- en: '*A pause is an opportunity to change your mind.*'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '*暂停是一个改变你想法的机会*。'
- en: Second, practice metacognition. Question your thoughts and allow your mind to
    open up from its narrow state.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，练习元认知。质疑你的思绪，让你的思维从狭窄的状态中打开。
- en: Ask the question, “Do I actually care about this?”
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 提出问题，“我真的在乎这件事吗？”
- en: From there, let thoughts trigger thoughts until the tension is released.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里开始，让思绪引发思绪，直到紧张感释放。
- en: When you do this enough, it becomes a habit, and your mind transforms. You realize
    that you don’t actually care; your mind just loves to distract you from being
    fulfilled and at peace.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 当你这样做足够多的时候，它就变成了一种习惯，你的思维也会转变。你会意识到你实际上并不在乎；你的思维只是喜欢让你从满足和平静的状态中分心。
- en: This may not be possible in the heat of the moment, but it’s possible in reflection
    or when you are alone and feel threatened after reading something on your phone.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能在一时的冲动中不可能实现，但在反思或在你独自一人，在手机上阅读某些内容后感到受到威胁时是可能的。
- en: Through self-reflection, you can reprogram your mind at any time.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 通过自我反思，你可以在任何时候重新编程你的思维。
- en: 4) Society’s Path Has A 100% Failure Rate
  id: totrans-141
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4) 社会的道路有100%的失败率
- en: The only real test of intelligence is if you get what you want out of life.
    – Naval Ravikant
  id: totrans-142
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 智力的真正考验是你是否能从生活中得到你想要的东西。 —— 纳瓦尔·拉维坎特
- en: You care what other people think because you aren’t confident in your ability
    to survive on your own. You are dependent on someone giving you a role, rather
    than creating your own.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 你在乎别人的看法，因为你对自己的独立生存能力没有信心。你依赖别人给你一个角色，而不是自己创造。
- en: I’m going to state a few things that may offend you.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 我要陈述一些可能会冒犯你的事情。
- en: In other words, you may care what I think, so it may be time to practice what
    came above.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，你可能在乎我的看法，所以可能是时候练习上面提到的事情了。
- en: '**1) The default modern path in life is an automatic failure because you didn’t
    set the destination in the first place.**'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 生活中现代的默认路径是自动失败的，因为你一开始就没有设定目标。**'
- en: Go to school, get a job, buy the house, let 40 years happen, retire (maybe).
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 上学，找工作，买房，让40年过去，退休（也许）。
- en: You achieved what someone else wanted, not what you wanted. That’s not intelligence,
    that’s blind stupidity. You failed to question your programming.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 你实现了别人想要的东西，而不是你自己的。这并不是智慧，这是盲目的愚蠢。你没有质疑你的编程。
- en: That’s not success, that’s complete and utter failure. Even if everyone around
    you perceives your material possessions as success, they are blind to the fact
    that you aren’t a unique human being. Your personality and self-image is a clone
    along with the masses of society.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是成功，这是彻底的失败。即使周围的人都认为你的物质财富是成功，他们却忽视了这样一个事实：你不是独一无二的个体。你的个性和自我形象是与社会大众一样的克隆体。
- en: Success, in my definition, is creating who you are. The quality, enjoyment,
    and satisfaction in your life is the byproduct of that.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的定义中，成功是创造你自己。你生活中的质量、乐趣和满足感是那个过程的副产品。
- en: '**2) The school system is a construct made to keep people dumb, even if that
    wasn’t the intention.**'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 学校系统是一个旨在让人变得愚昧的构造，即使这并非其初衷。**'
- en: Schools were created to educate people into specific roles within the kingdom
    or society they were in.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 学校的建立是为了教育人们在其所在王国或社会中的特定角色。
- en: The keywords there are “specific roles.”
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 那里的关键词是“特定角色”。
- en: For the entirety of their education, they pursued one goal. The goal they were
    assigned so that they could achieve a certain level of status so others would
    *think* of them as important. That way they could survive and acquire resources
    from others. That one goal framed any and all of the knowledge they had the potential
    of acquiring (that’s what goals do, frame your mind to learn new information to
    reach that goal). They studied one domain, like history, finance, biology. They
    studied a part, not the whole. They studied the material, not the relationship.
    They studied the dot, not the web of connections.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 在他们整个教育过程中，他们追求一个目标。这个目标是为了让他们达到一定的地位，这样别人就会认为他们很重要。这样他们才能生存并从别人那里获取资源。这个单一的目标决定了他们可能获得的所有知识（这就是目标的作用，框架你的思维以学习新的信息以达到那个目标）。他们研究了一个领域，比如历史、金融、生物学。他们研究的是一部分，而不是整体。他们研究的是材料，而不是关系。他们研究的是点，而不是联系的网络。
- en: The result is a lot of knowledge in one field that makes them useful to someone
    else, not themselves. They only have the option to be a slave of someone who needs
    their expertise. Not physical slavery, but mental. They don’t have the generalist
    understanding that allows them to create their own path toward the goal they set
    for themselves.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是，他们在某个领域拥有大量的知识，使他们对别人有用，而不是对自己有用。他们只有选择成为需要他们专业知识的人的奴隶。不是身体上的奴隶，而是精神上的。他们没有通才的理解力，使他们能够为自己设定的目标创造自己的道路。
- en: What does this have to do with caring what other people think?
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 这与在乎别人的看法有什么关系？
- en: Because it is incredibly destructive to learn solely for the sake of achieving
    the goal someone assigns to you.. It will lock you into a singular path for the
    sake of status. It will turn you into a narrow minded clone who doesn’t see the
    depth of life, because if you were to see the depth of life, you would stop caring.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 因为仅仅为了实现别人分配给你的目标而学习是极其破坏性的。它会让你陷入一条单一的道路，为了地位。它会让你变成一个狭隘的克隆体，看不到生活的深度，因为如果你看到了生活的深度，你就会停止关心。
- en: 5) Embracing Nature’s Compass
  id: totrans-158
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5) 拥抱自然的指南针
- en: Do you know how the mind works?
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道大脑是如何工作的吗？
- en: The mind is a system that aids in achieving known goals and discovering unknown
    goals.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑是一个帮助实现已知目标和发现未知目标的系统。
- en: Your mind is always operating, scheming, and making sense of reality based on
    the goals that occupy your mind.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 你的大脑总是在运作，策划，并根据占据你大脑的目标来理解现实。
- en: These goals, most of the time, are the result of the *values* you accept from
    your culture, the *information* fed to you by parents and teachers, biological
    needs to survive, and more. Your goals are often the product of the environment
    you are in.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 这些目标，大多数情况下，是你从文化中接受的*价值观*、父母和老师提供的*信息*、生存的生物需求以及更多其他因素的结果。你的目标往往是你的环境的产物。
- en: Why is this important?
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这很重要？
- en: Because understanding it will determine the outcome of your life.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 因为理解它将决定你生活的结果。
- en: The goals which occupy your mind determine what you perceive and learn.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 占据你头脑的目标决定了你感知和学习的内容。
- en: Your mind automatically accepts or rejects information to aid in achieving the
    goal you are pursuing. As an example, if you only have the goal to go to school
    and get a job, you will only notice the aspects of life that help you achieve
    that. But if you had the goal to live the best life, something a tad more holistic
    and almost neverending (an infinite game), you would notice much, much more. The
    goals and skills available for your discovery and acquisition would be endless.
    Life would maintain its zest as long as you maintain that goal – because it can
    easily be overtaken by society.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 你的大脑会自动接受或拒绝信息，以帮助你实现追求的目标。例如，如果你只有一个目标，那就是上学和找工作，你只会注意到帮助你实现这一目标的生活方面。但如果你有一个目标，那就是过上最好的生活，这是一个更加全面且几乎永无止境的目标（一个无限游戏），你会注意到多得多的东西。你可以发现和获取的目标和技能将是无限的。只要你保持这个目标，生活就会保持其活力——因为它很容易被社会所取代。
- en: 'The point:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 重点：
- en: You care what others think because you aren’t in your own little world. You
    aren’t consumed by your vision, mission, and the goals that comprise them to the
    point where distraction is impossible.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 你在乎别人的看法，因为你不在自己的小世界里。你没有被你的愿景、使命以及构成它们的那些目标所占据，以至于无法被分散注意力。
- en: The flow state is representative of optimal experience. Your attention is immersed
    in the goal at hand and you forget about your worries.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 流动状态代表了最佳体验。你的注意力沉浸在当前的目标中，你忘记了你的担忧。
- en: To stay in a constant degree of flow, that can only happen if you are in control
    of the goals that shape every single one of your actions, from waking up in the
    morning to walking down the street.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保持持续的状态，这只能发生在你控制着塑造你每一个行动的目标时，从早上醒来到走在街上。
- en: If you want to take back control of your life, you must start from scratch.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要重新掌控你的生活，你必须从头开始。
- en: Since goals frame how you perceive the world, and therefore determine the opportunities
    available to you, the default path society set you on – and any shred of it’s
    existence in your head – is detrimental to your quality of life.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 由于目标决定了你如何看待世界，因此决定了你所能获得的机会，社会为你设定的默认路径——以及你头脑中存在的任何碎片——对你的生活质量是有害的。
- en: Question everything you know. Revolt against society and find out what’s true
    for yourself. Pay close attention to every single one of your thoughts and actions.
    Ask, “Did I set the goal that led to this outcome?”
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 对你所知道的一切提出质疑。反抗社会，找出对你自己来说什么是真实的。密切关注你的每一个思想和行动。问自己，“我设定的目标导致了这个结果吗？”
- en: The question now is, how do you navigate life with certainty?
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 现在的问题是，你如何带着确定性去导航生活？
- en: You don’t. And you weren’t in a secure or certain place to begin with.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要。而且你一开始就不在一个安全或确定的地方。
- en: For all I’m concerned, today is your birthday. You are no longer the identity
    that was assigned to you. You are born anew because you chose to be, and you can
    now begin the reprogramming process. So, happy birthday.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，今天是你的生日。你不再是那个被分配给你的身份。因为你选择了重生，你现在可以开始重新编程的过程。所以，生日快乐。
- en: Forget about your constant craving for certainty and security. That will just
    trap you in another narrow-minded domain.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 忘掉你对确定性和安全的不断追求。那只会将你困在另一个狭隘的领域。
- en: Instead, embrace nature’s compass.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，拥抱自然的指南针。
- en: Create a vision for your future. Make it big and almost delusional.
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为你的未来创造一个愿景。让它宏大而几乎疯狂。
- en: Reverse engineer that into 10-year, 1-year, monthly, and weekly goals.
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将其逆向工程为10年、1年、每月和每周的目标。
- en: Break that down further into priority tasks you need to do every day.
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将其进一步分解为每天需要完成的优先任务。
- en: Those priority tasks will involve self-education and problem-solving.
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这些优先任务将涉及自我教育和问题解决。
- en: You’ve effectively created a new frame for your mind to make the most of life.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 你实际上为你的心灵创造了一个新的框架，以充分利用生活。
- en: You are giving yourself the opportunity to tap into flow at will. You have an
    endless string of challenging goals and must acquire the skill to match them.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在给自己提供机会，可以随意进入心流状态。你有一连串的挑战性目标，必须掌握匹配这些目标的技能。
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2211">![](../Images/b2e174ab4e5ffdb44f8c24870c687995.png)</picture>
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-2211">![](../Images/b2e174ab4e5ffdb44f8c24870c687995.png)</picture>
- en: Now, this is not a static and narrow minded frame. This will evolve as you do.
    Be okay with revisiting your plan and changing it.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这并不是一个静态和狭隘的框架。这会随着你的成长而发展。接受重新审视你的计划并改变它是可以的。
- en: After that, everything you do comes down to identifying and solving problems.
    Problems are your light in a dark room.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，你所做的一切都归结于识别和解决问题。问题是黑暗房间里的光明。
- en: Start with the tangible problems in your life right now.
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从你生活中现在可触及的问题开始。
- en: Fix your health. Fix your money. Fix your relationships. Fix your mental health.
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改善你的健康。改善你的财务状况。改善你的关系。改善你的心理健康。
- en: Don’t get distracted by problems that aren’t within your direct experience.
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要被那些不在你直接经验范围内的问题所分散注意力。
- en: As you solve problems, new ones will reveal themselves. You can go to the gym
    to fix your confidence issues, but that will reveal a deeper problem. Self-confidence
    isn’t solved with external looks. It’s an internal problem. So solve that one.
    Start shallow, because that’s the only way to dig into the depths.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 当你解决问题时，新的问题会显现出来。你可以去健身房解决你的自信心问题，但这会揭示更深层次的问题。自信不是通过外在的表象就能解决的。这是一个内在的问题。所以解决那个问题。从浅处开始，因为这是唯一深入挖掘深度的方式。
- en: <picture decoding="async" class="wp-image-2212">![](../Images/9762690c052f76976fa003cc898d9c40.png)</picture>
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-2212">![](../Images/9762690c052f76976fa003cc898d9c40.png)</picture>
- en: How do you solve problems?
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 你是如何解决问题的？
- en: Through self-experimentation. Not accepting someone else’s solution, ideology,
    or advice as law. You experiment with techniques and processes from others and
    find the intersection of them that leads to the problem being solved for good.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 通过自我实验。不接受别人的解决方案、意识形态或建议作为法律。你尝试别人的技术和流程，找到它们交汇的地方，从而永久解决存在的问题。
- en: Soon you will realize that all problems lead to self-actualization and development.
    The deeper you go, the more successful you can be, and the more skill you acquire
    along the way.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 很快你就会意识到，所有的问题都导向自我实现和发展。你走得越深，你就能越成功，你在这个过程中获得的技能也越多。
- en: 6) The Passion Process
  id: totrans-196
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6) 激情过程
- en: It’s unfortunate that “passion” has become a bastardized version of its former
    self.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 很不幸，“激情”已经变成了它以前形态的糟粕版本。
- en: The internet is flooded with headlines and marketing angles screaming that passion
    is useless, that you don’t need to find it, or that you should do something else
    instead.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网上充斥着标题和营销角度的头条，大声疾呼激情是无用的，你不需要找到它，或者你应该做其他的事情。
- en: Passion is a great, descriptive, and worthy word.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 激情是一个伟大、描述性、值得的词。
- en: You can feel passion in your bones.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在骨子里感受到激情。
- en: And if you don’t live a passionate life, what’s the only other option?
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不去过一种充满激情的生活，那么唯一的其他选择是什么？
- en: When you are passionate about something, you don’t care what people think.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 当你对某件事充满激情时，你不在乎别人怎么想。
- en: You’ll study it all on your own. It will be your escape.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 你将独自研究这一切。这将成为你的避风港。
- en: You’ll have friends on a social level, but you’ll be perfectly happy with your
    loneliness on an intellectual level.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 你在社会层面上会有朋友，但在智力层面上，你将完全满足于你的孤独。
- en: At the same time, when you find the select few who share your passions, an unbreakable
    bond is formed. There is no greater feeling.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，当你找到那些与你分享激情的少数人时，就会形成一种不可摧毁的纽带。这是无与伦比的感觉。
- en: How do you discover your passion?
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 你是如何发现你的激情的？
- en: 'There’s a few things you need to know:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 有几件事情你需要知道：
- en: Passion is when improvement turns into obsession.
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 激情是当改进变成痴迷的时候。
- en: Passion is the process of trying everything and discovering the one thing you
    can’t pull yourself away from.
  id: totrans-209
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 激情是尝试一切并发现那一件让你无法自拔的事情的过程。
- en: Passion is not found from where you are now. It’s discovered on the path of
    where you’re going.
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 激情不是在你现在所在的地方找到的。它是在你前往的地方的旅途中被发现的。
- en: Those are your guidelines.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 那些是你的指南。
- en: As you are solving problems toward your vision, experimenting with potential
    techniques and solutions you find through self-education, keep a steady eye out
    for signs of passion.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 当你朝着你的愿景解决问题时，通过自我教育找到的潜在技术和解决方案进行实验，保持对激情迹象的警觉。
- en: Learning new information will become a hobby instead of a chore.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 学习新信息将变成一种爱好，而不是一项任务。
- en: Building a business will feel like playing with Legos as a child.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 建立一家企业会感觉像是一个孩子玩乐高一样。
- en: If you want to stop giving a f*ck, discover your passion.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要停止在乎别人的看法，发现你的激情。
- en: 7) Write More
  id: totrans-216
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7) 写得更多
- en: Your mind is the operating system for reality.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 你的思想是现实的操作系统。
- en: When you learn how to think, you learn how to effectively navigate situations
    for the most advantageous outcome to your life and others. In other words, when
    you learn how to think, you get what you want out of life.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 当你学会如何思考时，你就学会了如何有效地导航情况，以获得对你和他人最有利的结局。换句话说，当你学会如何思考时，你就能从生活中得到你想要的东西。
- en: How do you get better at thinking? By treating your thoughts and ideas as legos.
    You aren’t an intelligent thinker because the thoughts and ideas that *compose*
    your thinking are a jumbled mess. You aren’t able to see them in their individual
    states and reorganize them.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何提高思考能力？通过将你的思想和想法视为乐高积木。你不是因为组成你思考的思想和想法是一团糟而有智慧的思想家。你无法看到它们的个体状态并重新组织它们。
- en: This is where writing comes into play.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是写作发挥作用的地方。
- en: Writing is a tool to accelerate the conditioning of your mind.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 写作是加速你心智训练的工具。
- en: Write yourself into a worldview that leads to a better life.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 将自己写入一个能带来更好生活的世界观。
- en: I feel my best when I write in accordance with the person I want to become.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 当我按照我希望成为的人来写作时，我感觉最好。
- en: I never thought of myself as a writer (and still don’t in most cases) until
    I realized that every other skill I learned required me to write.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 我从未把自己当作一个作家（在大多数情况下仍然不是），直到我意识到我学到的每一项其他技能都需要我写作。
- en: Video outlines, landing pages, text messages, emails, advertisements, social
    media content, etc. Even if I learned another skill like graphic design or programming,
    I still had to *write* using the other skills to get clients or customers for
    that thing.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 视频大纲、着陆页、短信、电子邮件、广告、社交媒体内容等。即使我学习了像平面设计或编程这样的其他技能，我仍然需要*写作*，使用这些技能来为这项服务吸引客户或顾客。
- en: Everyone is a writer. Once you internalize this and begin to polish the skill
    that is involved with making your creative work a success, you start seeing benefits
    you didn’t even know you were after.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都是作家。一旦你内化了这一点，并开始磨练使你的创意工作成功的技能，你就会看到你甚至不知道你正在追求的好处。
- en: Writing forces you to organize and articulate your thoughts. You become a better
    decision-maker. You slowly begin to navigate the chaos in your mind.
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写作迫使你组织和表达你的思想。你成为一个更好的决策者。你开始慢慢地在你的思想混乱中找到方向。
- en: Writing is the perfect feedback mechanism. If your readers aren’t growing or
    you aren’t getting paid for your work, that’s a sign that you need to improve
    at writing with persuasion.
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写作是完美的反馈机制。如果你的读者没有成长，或者你没有因为你的工作而获得报酬，那么这是一个你需要提高说服力写作能力的信号。
- en: The better you write, the better you think, and if your thoughts influence most
    of your habits, actions, priorities, and ability to make sense of complex situations
    – writing drastically increases your chance at success.
  id: totrans-229
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的写作越好，你的思考就越深入，如果你的思想影响了你的大多数习惯、行为、优先事项以及理解复杂情况的能力，那么写作将大大增加你成功的机会。
- en: You don’t need an English degree to write. You already text your friends with
    more impact than most school papers out there. If you can convince a friend to
    grab dinner with you over text, you are a better writer than most academics in
    the real-world applications that it matters in.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要英语学位就能写作。你已经用短信给你的朋友带来了比大多数学校论文更大的影响力。如果你能说服一个朋友通过短信和你一起吃饭，那么你在现实世界的应用中比大多数学者更有写作能力。
- en: Thanks to social media and the internet, and given you have the ability to learn
    about how they work, a simple text-message-like social media post can reach hundreds
    of thousands of people, many of them willing to pay you for the value you have
    to offer.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了社交媒体和互联网，如果你有能力了解它们是如何运作的，一个简单的类似短信的社交媒体帖子就能触及成千上万的人，其中许多人愿意为你提供的价值付费。
- en: The most impactful habit you can adopt is a 30-60 minute writing habit first
    thing in the morning. Make it conscious. Making yourself and your work a success
    hinges on your ability to get your writing – free or paid – in front of people
    who resonate with it.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以养成最具影响力的习惯是早上30-60分钟的写作习惯。让它变得有意识。让你自己和你的工作成功的关键在于你将你的写作——免费或付费——展示给那些能够共鸣的人。
- en: We will discuss how I do this inside Kortex in a future letter.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在未来的信中讨论我在Kortex内部是如何做到这一点的。
- en: For now, [join the waitlist](https://kortex.co) and we will start rolling out
    access to the app on September 20th.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，[加入等待名单](https://kortex.co)，我们将在9月20日开始推出应用程序的访问权限。
- en: 8) Kosmic Thinking
  id: totrans-235
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8) 宇宙思维
- en: If you want to stop caring what others think, learn to zoom out.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要停止关心别人的看法，学会放大视角。
- en: And when I say zoom out, I mean all the way out. As far as you can go. Beyond
    the cosmos, toward the Kosmos.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 当我说放大视角时，我是指尽可能远地放大。超越宇宙，向着宇宙本身。
- en: For the ancient Greek philosophers, the world was a “kosmos,” used to describe
    the universe as an ordered and harmonious system. This is the opposite perspective
    of the reductionist scientific paradigm of today that sees the universe as a machine
    (trying to understand reality by studying it’s parts, rather than relationship
    between the parts that create a whole).
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 对于古希腊哲学家来说，世界是一个“宇宙”，用来描述宇宙作为一个有序和和谐的系统。这与今天将宇宙视为机器的还原论科学范式相反，它试图通过研究部分来理解现实，而不是研究部分之间的关系，这些关系构成了整体。
- en: 'The “Kosmos,” in this sense, is close to synonymous with all interpretations
    of an ultimate reality: God, Brahman, The Infinite, Source, Teotl, and the rest
    implied by religious leaders and mystic masters.'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种意义上，“宇宙”几乎等同于对终极现实的全部解释：上帝、梵天、无限、源头、特奥洛、以及宗教领袖和神秘大师们所暗示的其他概念。
- en: For the Greeks, when thinking in parts and wholes, the parts each served a purpose
    toward the harmony of the Universe.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 对于希腊人来说，在思考部分和整体时，每个部分都服务于宇宙和谐的目的。
- en: Other philosophers, like Alan Watts, speak of the world as an organism—a functioning
    ecosystem bound by relationships.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 其他哲学家，如艾伦·瓦茨，将世界描述为一个有机体——一个由关系约束的功能性生态系统。
- en: Aristotle believed that the final cause of a thing is its function, and that
    a full explanation of anything must consider its final cause. This presents the
    field of teleology and cybernetics.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 亚里士多德认为，事物的最终原因是它的功能，任何事物的完整解释都必须考虑其最终原因。这提出了目的论和控制论领域。
- en: Teleology (*telos* meaning goal, *logos* meaning reason) is the idea of explaining
    something by referring to its purpose, end, or goal.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 目的论（*telos*意为目标，*logos*意为理由）是通过参考其目的、终点或目标来解释某物的观点。
- en: Cybernetics studies how systems self-regulate and self-organize toward the end
    goal of the system.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 控制论研究系统如何自我调节和自我组织，以达到系统的最终目标。
- en: When combined and applied to the mind, we can begin to understand our actions
    and behaviors, and through that understanding, we can change them.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 当结合并应用于心灵时，我们可以开始理解我们的行为和举止，通过这种理解，我们可以改变它们。
- en: The mind is a system that accepts and rejects information to aid in the achievement
    of its goals. I’ve discussed this previously, but for now you must understand
    that your behavior can be explained by your purpose.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 心灵是一个系统，它接受和拒绝信息以帮助实现其目标。我之前讨论过这一点，但你现在必须理解，你的行为可以通过你的目的来解释。
- en: Humans are goal-oriented creatures. You always have a goal. But when that goal
    is assigned to you, and you remain unconscious of it, you care what others think,
    and it slowly destroys your life.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 人类是目标导向的生物。你总是有一个目标。但当这个目标被分配给你，而你又没有意识到它时，你开始关心别人的看法，这会慢慢地摧毁你的生活。
- en: By aligning with the purpose of your highest self, and the purpose of the Kosmos
    itself – as discussed in my book – life makes a lot more sense and you can begin
    to navigate it with grace.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 通过与最高自我的目的以及宇宙本身的目的相一致——正如我在书中所讨论的——生活将变得更有意义，你可以开始优雅地导航它。
- en: We can go extremely deep into the nature of reality, but in my opinion, that
    is best done by observing your mind and noting pattern that reflect in the world
    around you.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以深入探究现实的本质，但在我看来，最好的方式是通过观察你的心灵并记录下反映在你周围世界中的模式。
- en: When it comes to “not giving a f*ck” about a situation, you care what people
    think because you can’t see the big picture. You can’t see the ecosystem you are
    operating in. You don’t understand your purpose, the purpose of those in the situation,
    and how both of those goals aren’t in alignment, so of course, there will be mental
    conflict.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到“对某事不关心”时，你之所以关心别人的看法，是因为你看不到大局。你看不到你正在运作的生态系统。你不理解你的目的，也不理解处于这种情况中的人们的目的，以及这两个目标如何不一致，因此当然会有心理冲突。
- en: You can’t adopt the other person’s perspective to see how they are interacting
    with the situation. You can’t broaden your own perspective to navigate your way
    out. You can’t see the cause and effect of every variable in that situation, which
    would allow you to gain clarity and move forward with confidence.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 你无法采取他人的视角来看他们是如何与情况互动的。你无法拓宽自己的视角来找到出路。你无法看到那个情况中每个变量的因果关系，这会帮助你获得清晰并自信地前进。
- en: You get offended by someone’s political comment because you don’t understand
    their worldview and what is causing that comment to occur. You can’t zoom out
    and see that your taking offense will have close to zero impact on the other person’s
    opinion and, if anything, will make their own reaction worse, leading to a time-wasting
    argument.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 你会因为某人的政治评论而感到冒犯，因为你不懂他们的世界观以及是什么导致了这样的评论。你无法退后一步，看到你的反应几乎对对方的观点没有影响，而且，如果有什么的话，反而会使他们的反应变得更糟，导致浪费时间争论。
- en: By Kosmic Thinking, I mean systems thinking with a bit of magic and spirituality
    thrown in. I love this subject, and haven’t written enough about it, so we will
    save much of this for a future letter.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 我所说的宇宙思维，是指带有一些魔法和灵性的系统思维。我喜欢这个主题，而且还没有写够，所以我们将把大部分内容留到未来的信件中。
- en: Kosmic thinking is about letting go, expanding your mind to observe the situation
    from a higher, paradigm-agnostic lens, understanding the purpose of the whole
    and its parts (yourself included), and navigating yourself toward a decision that
    is conducive to clarity in your mind and progress in your life toward that higher
    purpose.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 宇宙思维是关于放手，扩大你的思维，从一个更高、无范式偏见的视角来观察情况，理解整体及其部分（包括你自己）的目的，并引导自己做出有利于你内心清晰和实现更高目的的生活进步的决定。
- en: So, again, when you feel yourself becoming tense and reactive, pause.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，再次强调，当你感到自己变得紧张和反应过度时，请暂停。
- en: Zoom out. See the situation for what it is. If you can’t control it, let it
    go. Find the connections that lead to order.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 退后一步。看清情况本身。如果你无法控制它，就放手。找到导致秩序的关联。
