- en: Why you care so much in the first place (so you have the awareness to stop).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to reprogram your mind to become who you were meant to be.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Why you are probably on a life path that has a 100% failure rate, and how to
    escape.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to develop your own internal compass and find what you want in life.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The passion process for discovering your interests and turning improvement into
    obsession.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A tool to accelerate changing your life.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The nature of reality, and how it can help you become more intelligent (so you
    stop worrying about minor inconveniences).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I don’t want this to be yet another superficial band-aid of step-by-step advice
    you can find anywhere online. I want you to solve this problem for good. And that
    will require us to go deep.
  prefs: []
  type: TYPE_NORMAL
