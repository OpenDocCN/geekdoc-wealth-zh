- en: How To Attack Your Big Goals & Achieve Them In 2-3 Months
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/how-to-attack-your-big-goals-achieve-them-in-2-3-months/](https://thedankoe.com/letters/how-to-attack-your-big-goals-achieve-them-in-2-3-months/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The fourth Writer’s Bootcamp starts on March 4th.
  prefs: []
  type: TYPE_NORMAL
- en: And… we are adding a bonus call at no additional cost.
  prefs: []
  type: TYPE_NORMAL
- en: Kortex AI v1 is almost ready to release in the coming week. That means that
    by the end of the bootcamp, more AI features will be in, and we will go through
    idea generation, tweet, thread, newsletter, and editing with AI lessons and prompts.
    This *should* be the cost of the bootcamp alone, but you get it as a bonus.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you want to:'
  prefs: []
  type: TYPE_NORMAL
- en: Create your niche of one based on your personal interests
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Turn 1 idea into 7 days of content (posts, threads, newsletter)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Repurpose those to all platforms (including YouTube)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Templates to organize your writing and avoid “not knowing” how to start
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A curriculum that you receive lifetime updates for as we continue to make it
    better than it already is
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It’s a lot. An entire audience building masterclass. So be prepared for an intense
    5 weeks (6 with AI stuff.)
  prefs: []
  type: TYPE_NORMAL
- en: '[Enroll here before March 4th.](https://bootcamp.kortex.co)'
  prefs: []
  type: TYPE_NORMAL
- en: –––
  prefs: []
  type: TYPE_NORMAL
- en: I shave my head every so often.
  prefs: []
  type: TYPE_NORMAL
- en: At first, it was out of fear of going bald.
  prefs: []
  type: TYPE_NORMAL
- en: I shaved my head to rip the metaphorical band-aid of golden locks from my head
    to get used to the look I was “doomed” to have.
  prefs: []
  type: TYPE_NORMAL
- en: I also believe that too many guys are dependent on their hair for their self-confidence,
    but that’s aside the point.
  prefs: []
  type: TYPE_NORMAL
- en: Turns out, I wasn’t going bald, my hairline has always just looked like the
    top of an iPhone (as Ian—a Kortex engineer—so gratefully illustrated) and I was
    paying too much attention to it.
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2508">![](../Images/66eacc7dd2d673929faf777c8a3fde33.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Now, I know this can sound cheesy, but shaving my head has become symbolic for
    shifting into an alter ego. A sub-identity that allows me to achieve goals fast,
    with pure focus, like a warrior going into battle.
  prefs: []
  type: TYPE_NORMAL
- en: A way to make myself so vulnerable that I have no option but to be okay with
    it. It’s a forcing function for focus when things need to be done. And honestly,
    it’s becoming my favorite look (on some days. On others not so much.)
  prefs: []
  type: TYPE_NORMAL
- en: In fact, this is the secret weapon of Kobe Bryant. His alter ego, “The Black
    Mamba” was something he adopted during a difficult period in his life. It reflected
    the mindset he wanted to embody on the basketball court.
  prefs: []
  type: TYPE_NORMAL
- en: We’ll dive into the psychology behind it soon.
  prefs: []
  type: TYPE_NORMAL
- en: In my own life, I often oscillate between the warrior and monk archetypes.
  prefs: []
  type: TYPE_NORMAL
- en: War mode and monk mode.
  prefs: []
  type: TYPE_NORMAL
- en: Many are familiar with monk mode. It’s become a self-improvement tactic where
    you disappear from the world, remove distractions, and practice some form of asceticism
    where you reject worldly pleasures in the pursuit of personal development.
  prefs: []
  type: TYPE_NORMAL
- en: War mode is the opposite.
  prefs: []
  type: TYPE_NORMAL
- en: You attack your goals. You simulate a hunt. You say yes to everything. You expose
    yourself to massive experience. You overwhelm your mind with chaos and force yourself
    to expand into a new identity. *You become the person who can bear a massive load
    of responsibility.* Someone who doesn’t crack under pressure, because that means
    death.
  prefs: []
  type: TYPE_NORMAL
- en: I use *war mode* as a means to take my mind, body, and business to the next
    level, and it works surprisingly well.
  prefs: []
  type: TYPE_NORMAL
- en: The problem with modern life is that it’s too comfortable.
  prefs: []
  type: TYPE_NORMAL
- en: People work on simple tasks they hate all day, never challenge themselves creatively,
    and think they need a “break” from work.
  prefs: []
  type: TYPE_NORMAL
- en: Personally, I think most people would benefit from *more work* than they would
    *more rest.*
  prefs: []
  type: TYPE_NORMAL
- en: One, because rest, for most people, is synonymous with a pleasurable escape
    from boredom rather than a deep recovery session from stimulating work.
  prefs: []
  type: TYPE_NORMAL
- en: Two, because the average person lacks periods of pure intensity toward a meaningful
    goal.
  prefs: []
  type: TYPE_NORMAL
- en: 'They lack true balance: **contrast**.'
  prefs: []
  type: TYPE_NORMAL
- en: Meaningful work and meaningful rest.
  prefs: []
  type: TYPE_NORMAL
- en: Both with pure focus.
  prefs: []
  type: TYPE_NORMAL
- en: In the macro (years), meso (months), and micro (days).
  prefs: []
  type: TYPE_NORMAL
- en: Not the middle path, but the path of high highs and low lows.
  prefs: []
  type: TYPE_NORMAL
- en: Catastrophic failure and blissful success.
  prefs: []
  type: TYPE_NORMAL
- en: Those are where the most profound lessons are learned, and if you’re floating
    in the middle, life becomes a blur of boredom and anxiety.
  prefs: []
  type: TYPE_NORMAL
- en: Too many people simply want to escape the stress and mundaneness of every day
    life, so they think more rest or a fancy vacation will do it for them.
  prefs: []
  type: TYPE_NORMAL
- en: I’d like to propose another solution.
  prefs: []
  type: TYPE_NORMAL
- en: To go a little insane.
  prefs: []
  type: TYPE_NORMAL
- en: To flip the switch overnight.
  prefs: []
  type: TYPE_NORMAL
- en: To transform into an entirely new person.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s learn how.
  prefs: []
  type: TYPE_NORMAL
- en: The Alter Ego Effect – Stepping Into A New Identity
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The alter ego is a bridge between who you are now and who you are meant to be…
    The alter ego allows you to step outside yourself and see the bigger picture.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Todd Herman, The Alter Ego Effect
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I wrote a paper in high school English class.
  prefs: []
  type: TYPE_NORMAL
- en: I don’t remember why we were supposed to write this paper, but I do remember
    what I wrote.
  prefs: []
  type: TYPE_NORMAL
- en: In a nutshell, I wrote about how *I am not the same person around other people.*
  prefs: []
  type: TYPE_NORMAL
- en: I am a different person in class, at church (when I was forced to go), with
    my friends, with my parents, and when talking to people online—usually while playing
    Call of Duty, Halo 3, or League Of Legends.
  prefs: []
  type: TYPE_NORMAL
- en: Why would I speak to my parents, who would probably disown me, if I spoke to
    them like I spoke to the stupid little f*ck that sniped me across the map within
    the first 30 seconds of search and destroy?
  prefs: []
  type: TYPE_NORMAL
- en: What surprised me is that my teacher, Mr. Wright, *agreed with me.*
  prefs: []
  type: TYPE_NORMAL
- en: He pulled me aside and mentioned that he does the same thing, but didn’t like
    talking about it because it could make him seem inauthentic or two faced. I’m
    paraphrasing here.
  prefs: []
  type: TYPE_NORMAL
- en: The reality is, humans are shapeshifters.
  prefs: []
  type: TYPE_NORMAL
- en: We are creators. Generalists. We adapt to situations to survive and thrive.
  prefs: []
  type: TYPE_NORMAL
- en: Our mind has the unique capability to change it’s perspective—thus changing
    the landscape for where your attention goes—but so few people have practiced this
    skill.
  prefs: []
  type: TYPE_NORMAL
- en: You already do this every day. You bring forth different qualities of your identity
    to act your best in different situations. But once you learn to control this power,
    you can do the impossible.
  prefs: []
  type: TYPE_NORMAL
- en: This is why so many people struggle with discipline and confidence.
  prefs: []
  type: TYPE_NORMAL
- en: They get trapped in a mind clouded with self-doubt and insecurity.
  prefs: []
  type: TYPE_NORMAL
- en: They fail to *step out* of that little box and view it from an entirely new
    angle.
  prefs: []
  type: TYPE_NORMAL
- en: So they drown.
  prefs: []
  type: TYPE_NORMAL
- en: Their goals, dreams, and ambitions sit on a bookshelf and collect dust.
  prefs: []
  type: TYPE_NORMAL
- en: That business you want to start. That social life you want to have. That body
    and mind you want to build. They all nag at you as you go about the life you don’t
    want to live and continue to make the chaos in your mind worse.
  prefs: []
  type: TYPE_NORMAL
- en: In comes the alter ego.
  prefs: []
  type: TYPE_NORMAL
- en: A concept coined by Todd Herman, the author of The Alter Ego Effect.
  prefs: []
  type: TYPE_NORMAL
- en: Martin Luther King Jr would wear non-prescription glasses to become a “Distinguished
    Intellectual” for his talks.
  prefs: []
  type: TYPE_NORMAL
- en: Kobe Bryant, who turns into “The Black Mamba” because it is fast, smooth, and
    terrifying.
  prefs: []
  type: TYPE_NORMAL
- en: In a similar vein, strongmen competitors like Eddie Hall imagine his kids being
    crushed by the weights he’s lifting. He says that there is absolutely no way he
    can lift that record level weight. That no human could do it. But when he *really*
    believes that he’s in a do-or-die situation, he taps into a supernatural level
    of strength.
  prefs: []
  type: TYPE_NORMAL
- en: Why does this work?
  prefs: []
  type: TYPE_NORMAL
- en: When you adopt an alter ego, your mind starts to focus on how you should act.
    Your finite mental energy—about 50 bits of conscious information per second—is
    consumed by the shift in attention. *You don’t have the bandwidth to give energy
    to your self-doubt and insecurities.*
  prefs: []
  type: TYPE_NORMAL
- en: The point is this, you only have so much attention to give. And when you give
    it all to doubt and insecurity, that becomes your world. You become what you focus
    on, but it takes effort to expand into a new mind that *allows* a shift in focus.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, we need to:'
  prefs: []
  type: TYPE_NORMAL
- en: Create a mental frame to focus our attention away from self-doubt and fear
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create a new identity to expand into with repetition and learning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create a plan so our attention is narrowed further and we live in the flow state
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When you give this process time, your life changes in innumerable ways.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s exactly how you create an alter ego to jump into when it’s time to perform:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Vision – What Do You Want?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: First, we need an *attention anchor*.
  prefs: []
  type: TYPE_NORMAL
- en: We need something that pulls your attention away from doubt and insecurity.
  prefs: []
  type: TYPE_NORMAL
- en: You need a sturdy mental house that *you* built, not someone else. A house you
    can decorate and live in when outside conditions get harsh.
  prefs: []
  type: TYPE_NORMAL
- en: Now, this can’t be any old goal or New Years resolution that you set because
    everyone else is or you feel a tiny bit of motivation. It must have *gravity.*
    It must be meaningful. It must be something you want to dedicate your life to.
  prefs: []
  type: TYPE_NORMAL
- en: But none of that comes in an instant.
  prefs: []
  type: TYPE_NORMAL
- en: Your vision is something you start like you do anything else.
  prefs: []
  type: TYPE_NORMAL
- en: It sucks at first. It feels inauthentic. But you need to get something on paper
    so you have something to improve.
  prefs: []
  type: TYPE_NORMAL
- en: As you make progress, you notice things that you thought you wanted, but don’t
    anymore. So you *iterate.* You add brush strokes to your vision. This never stops.
    It’s a painting you keep adding to.
  prefs: []
  type: TYPE_NORMAL
- en: You can start with this template I use, [The Simple Life Planner (free)](https://app.kortex.co/public/document/883d9246-6dde-4794-9f54-92b8ff07d502),
    or simply write these down on paper or in your [favorite notes app.](https://kortex.co)
  prefs: []
  type: TYPE_NORMAL
- en: How do you want to look, speak, and be perceived? Why?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What environment do you want to live in? Why?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What impact do you want to have on others? Why?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If money is a reflection of the impact you have, how much money do you want
    to make?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What can you see yourself getting really good at and being known for? Why?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What do you want your average day to look like down to the detail? Why?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is a starting point.
  prefs: []
  type: TYPE_NORMAL
- en: Remember, you add, subtract, and refine it as you make progress.
  prefs: []
  type: TYPE_NORMAL
- en: But what if you aren’t motivated to start?
  prefs: []
  type: TYPE_NORMAL
- en: And what if you struggle to even get moving?
  prefs: []
  type: TYPE_NORMAL
- en: 2) Clarity – How Do You Make Progress?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A lack of self-confidence is brutal.
  prefs: []
  type: TYPE_NORMAL
- en: You can’t stop questioning your actions and can’t find any sustainable source
    of motivation because it’s always clouded over with doubt.
  prefs: []
  type: TYPE_NORMAL
- en: The truth is, a lack of self-confidence comes down to a lack of clarity.
  prefs: []
  type: TYPE_NORMAL
- en: The first half of the clarity equation comes down to perspective. We’ve solved
    that with a vision that gets stronger with faith. The second half of clarity comes
    down to *knowing what to focus on.*
  prefs: []
  type: TYPE_NORMAL
- en: Luckily, this isn’t a matter of luck.
  prefs: []
  type: TYPE_NORMAL
- en: It’s a matter of strategy.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, you need a plan.
  prefs: []
  type: TYPE_NORMAL
- en: Your vision can seem so far away, like a north star.
  prefs: []
  type: TYPE_NORMAL
- en: A plan is a guess—that starts out dumb and becomes educated—that narrows your
    focus on what steps move the needle forward.
  prefs: []
  type: TYPE_NORMAL
- en: Because optimal experience depends on the ability to control what happens in
    consciousness moment by moment, each person has to achieve it on the basis of
    his own individual efforts and creativity.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Mihaly Csikszentmihalyi
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: When your attention narrows on a task, distractions become more difficult to
    register in consciousness. But if you don’t know what to do next, and next, and
    next… it starts to fall apart. If the next task is hard, you get anxious. If it’s
    easy, you get bored. Then and there, your attention splits *out* of your vision
    and chaos starts to sink in.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s create a plan.
  prefs: []
  type: TYPE_NORMAL
- en: '**First**, break down your vision into palatable milestones.'
  prefs: []
  type: TYPE_NORMAL
- en: If I want to make $1 million a year, then milestones could be your first $1,
    then $10,000, then $100,000 and so on. You probably aren’t going to leap to $1
    million without making your first $10K. And *what you must do* to get to $10K
    is going to be much different than getting to $1M.
  prefs: []
  type: TYPE_NORMAL
- en: '**Second**, write out exactly what you have to do to reach the first milestone.'
  prefs: []
  type: TYPE_NORMAL
- en: For the example, I would have to start a business, obviously, to make my first
    dollar. Specifically one that aligns with the rest of my vision and interests.
    So in my case, it involves writing.
  prefs: []
  type: TYPE_NORMAL
- en: Now I have atleast some clarity. I can start learning what other writers have
    done as *beginners* to get started.
  prefs: []
  type: TYPE_NORMAL
- en: '**Third**, write out exactly what you have to learn in order to do that thing.'
  prefs: []
  type: TYPE_NORMAL
- en: For starting a writing business, I’d need to learn marketing, sales, content
    creation, and how to create a product or service.
  prefs: []
  type: TYPE_NORMAL
- en: If I focus on the first $1 milestone, I could create an ebook, charge $10 for
    it, and promote it on social media to the small audience I’ve been building with
    content creation.
  prefs: []
  type: TYPE_NORMAL
- en: As a reminder, [The Writer’s Bootcamp](https://bootcamp.kortex.co) (now with
    YouTube and AI) starts March 4th if you want to build an audience around your
    interests.
  prefs: []
  type: TYPE_NORMAL
- en: '**Fourth**, list out what the daily tasks that actually get results. Not just
    busy work.'
  prefs: []
  type: TYPE_NORMAL
- en: For a writing business, that means posting high quality content. Like Devon
    Eriksen, a self-published science fiction author.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve seen other authors complaining about how social media isn’t a good sales
    channel, but then you look at their profile and they’re just posting links to
    their book. How the f*ck do you expect to build an audience with that? Why would
    they care about your book when they know nothing about the ideas inside?
  prefs: []
  type: TYPE_NORMAL
- en: You need to post your beliefs, opinions, and teach people about your interests.
    They don’t care about your book first. They care about you first. Then they purchase
    your book (or any other product) because they like you.
  prefs: []
  type: TYPE_NORMAL
- en: You can, and should, get as granular as possible with your plan.
  prefs: []
  type: TYPE_NORMAL
- en: But like your vision, this is simply a first iteration that you add to with
    time.
  prefs: []
  type: TYPE_NORMAL
- en: This is why most people don’t follow through.
  prefs: []
  type: TYPE_NORMAL
- en: They get stuck on something like “I don’t know what business to start” instead
    of just starting *any* because the skills that comprise one business transfer
    over pretty well into any other one you pivot into. This applies to more than
    business.
  prefs: []
  type: TYPE_NORMAL
- en: It doesn’t matter where you start. You’ll probably change direction like everyone
    else. What matters is what you learn by starting so you can keep going.
  prefs: []
  type: TYPE_NORMAL
- en: It’s okay if you don’t know what to do yet.
  prefs: []
  type: TYPE_NORMAL
- en: It’s okay if you feel overwhelmed.
  prefs: []
  type: TYPE_NORMAL
- en: You’re changing your life.
  prefs: []
  type: TYPE_NORMAL
- en: Of course it’s going to feel like swimming in the middle of the ocean.
  prefs: []
  type: TYPE_NORMAL
- en: Expecting it to just “come to you” is some residual social conditioning from
    parents and teachers telling you exactly what to do… and look where that’s led
    to.
  prefs: []
  type: TYPE_NORMAL
- en: That’s what we need to discuss next.
  prefs: []
  type: TYPE_NORMAL
- en: How to reprogram your mind.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Identity – Who Must You Become?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: What would Jesus do?
  prefs: []
  type: TYPE_NORMAL
- en: Heard that before?
  prefs: []
  type: TYPE_NORMAL
- en: Turns out, that question can be the singular source of a good life.
  prefs: []
  type: TYPE_NORMAL
- en: I’m not a Christian, but I get the point of the question.
  prefs: []
  type: TYPE_NORMAL
- en: Jesus Christ, the person, is symbolic for someone who achieved a high stage
    of consciousness. In some circles, they call this “Christ Consciousness.” They
    didn’t have the word “consciousness” or “awareness” back then, so I can only imagine
    how much more clear their message would be interpreted if they were here today.
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-2509">![](../Images/18edfa0618b49e023de2af3da572a69a.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: We talked about these stages of ego development [in a past letter](https://thedankoe.com/letters/how-to-join-the-top-1-of-intelligence-full-guide/),
    so I’ll spare you another detailed explanation of them.
  prefs: []
  type: TYPE_NORMAL
- en: Instead, I want you to create an alter ego more conscious and developed than
    you so you can adopt their perspective to thrive in what-used-to-be difficult
    situations.
  prefs: []
  type: TYPE_NORMAL
- en: Your alter ego is *who you become* to achieve your vision and execute your plan.
  prefs: []
  type: TYPE_NORMAL
- en: As Einstein supposedly said, “you can’t solve a problem from the same level
    of mind that created it.”
  prefs: []
  type: TYPE_NORMAL
- en: So we need to tap into a higher level of mind to overcome the struggles we face
    in the pursuit of our goals, because most of your problems aren’t problems, they’re
    a lack of perspective (and thus awareness/consciousness).
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what I want you to do:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Choose 2-3 aspirational archetypes that have achieved what you want to
    achieve.**'
  prefs: []
  type: TYPE_NORMAL
- en: As I’m building a startup, I often study people like Steve Jobs because their
    aura is undeniable. I also learn directly from people like [John Hu and Vitalii
    Dodonov](https://youtu.be/p6n4Q6-N7XI) who are grateful enough to help me and
    answer my questions.
  prefs: []
  type: TYPE_NORMAL
- en: For meaning and spirituality, you could very well look to Jesus Christ or Gautama
    Buddha.
  prefs: []
  type: TYPE_NORMAL
- en: The beautiful thing about the internet is that you can literally just follow
    these people and read their mind.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Write down the qualities you need to adopt to achieve your goals.**'
  prefs: []
  type: TYPE_NORMAL
- en: Your job is to study and understand what qualities made these people so exceptional.
  prefs: []
  type: TYPE_NORMAL
- en: Steve Jobs was articulate, creative, and high agency. Buddha was mindful, calm,
    and sharp.
  prefs: []
  type: TYPE_NORMAL
- en: These are the qualities you are going to “jump” into when it’s time to make
    progress.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Give your alter ego a name.**'
  prefs: []
  type: TYPE_NORMAL
- en: This can be anything. A name of a person. A name of an animal. Just make it
    something descriptive of the identity you want to adopt. I’ve thought of myself
    as Goku going Super Saiyan when I’m trying to hit a new record in the gym.
  prefs: []
  type: TYPE_NORMAL
- en: Now, creating an alter ego isn’t some silly practice.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not a “mask” you put on that disappears once you take it off.
  prefs: []
  type: TYPE_NORMAL
- en: It is a *vessel for identity change.*
  prefs: []
  type: TYPE_NORMAL
- en: Every time you embody those higher qualities and make progress toward your goals,
    your identity expands to higher levels of skill and complexity. This is personal
    *growth* in a nutshell.
  prefs: []
  type: TYPE_NORMAL
- en: You are reprogramming your mind to perceive situations from a more developed
    lens, because you are becoming more developed.
  prefs: []
  type: TYPE_NORMAL
- en: But you don’t become more developed by sitting around and saying “Yeah I’m Goku!
    Lets go lift some weights!”
  prefs: []
  type: TYPE_NORMAL
- en: You develop yourself through committing, learning, building, and persisting.
  prefs: []
  type: TYPE_NORMAL
- en: How To Go War Mode
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You aren’t where you want to be because you haven’t put yourself in the situations
    that would force you to get there.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[The Art Of Focus](https://theartoffocusbook.com)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You don’t need motivation or discipline when you *are* the person who would
    take certain actions.
  prefs: []
  type: TYPE_NORMAL
- en: To change who you are you must educate, practice, and experience new information
    to reprogram your mind’s faulty wiring that was installed by society.
  prefs: []
  type: TYPE_NORMAL
- en: You must rip yourself out of the environment that is keeping you the same.
  prefs: []
  type: TYPE_NORMAL
- en: You must force yourself into places you don’t belong until you do.
  prefs: []
  type: TYPE_NORMAL
- en: You must channel what you learn into a project moves you toward your vision.
  prefs: []
  type: TYPE_NORMAL
- en: Take your alter ego and go war mode.
  prefs: []
  type: TYPE_NORMAL
- en: Remember, war mode is different from monk mode.
  prefs: []
  type: TYPE_NORMAL
- en: You attack your goals. You simulate a hunt. You say yes to everything. You expose
    yourself to massive experience. You overwhelm your mind with chaos and force yourself
    to expand into a new identity. *You become the person who can bear a massive load
    of responsibility.* Someone who doesn’t crack under pressure, because that means
    death.
  prefs: []
  type: TYPE_NORMAL
- en: Commit – Shave Your Head
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You don’t have to shave your head, especially if you’re a woman.
  prefs: []
  type: TYPE_NORMAL
- en: 'But the point still stands:'
  prefs: []
  type: TYPE_NORMAL
- en: Do something *physical* that is representative of your commitment that *you
    can’t turn back from.*
  prefs: []
  type: TYPE_NORMAL
- en: Too many people in todays society want to “try” changing their life without
    consequences. It’s no wonder why they rarely achieve anything. They have too many
    plan B’s. They aren’t fully invested in their vision because they’re afraid to
    leave the comfort that will always prove to end up more uncomfortable than committing
    to a life you want.
  prefs: []
  type: TYPE_NORMAL
- en: Buy new clothes. Burn your old ones. Sign a lease on an apartment you can’t
    afford so you are forced to make your business work. Get on the plane across the
    country with a few dollars and a plan. Put your last few dollars into marketing
    for your business. (Money doesn’t buy happiness, but it buys the ability to make
    mistakes which leads to growth which leads to happiness.)
  prefs: []
  type: TYPE_NORMAL
- en: Tactical stress.
  prefs: []
  type: TYPE_NORMAL
- en: Do the thing that makes your self-doubt *real.*
  prefs: []
  type: TYPE_NORMAL
- en: Because right now, it’s all in your head. It’s going to be a lot scarier than
    the reality of it.
  prefs: []
  type: TYPE_NORMAL
- en: Like a goldfish, you only grow as much as the tank you are put in. So put yourself
    in a new tank.
  prefs: []
  type: TYPE_NORMAL
- en: Learn – Embrace Chaos
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'You need 2 habits:'
  prefs: []
  type: TYPE_NORMAL
- en: '**30-60 minutes of learning.** The most important thing you can do when the
    world is changing rapidly is learn. New skills, new technologies, new paths in
    life. Dedicate time to finding the ideas you can channel into your work.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**30-60 minutes of building.** If you want any form of work, money, or the
    ability to sustain a better life, you need to create something valuable that other
    people want. You already spend most of your time building for someone else, you
    can set aside some time to build your own thing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: But we don’t stop there.
  prefs: []
  type: TYPE_NORMAL
- en: Learning goes far beyond just reading books and watching tutorials.
  prefs: []
  type: TYPE_NORMAL
- en: Learning is a fundamental human drive. You learn from your everyday experience.
    But you don’t learn in the known. You don’t learn in the mundane every day routine
    that you’ve fallen into over the past few years.
  prefs: []
  type: TYPE_NORMAL
- en: When things get static, you need to change something. Anything. You need chaos.
    You need novelty. You need the experiences and ideas that fuel forward progress.
    Build something new. Test test test. Rip apart your daily routine. Do anything
    but the same thing.
  prefs: []
  type: TYPE_NORMAL
- en: Build – Mind, Body, Business
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'If you don’t know what to build, start with the only things that matter:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Mind** – how you interpret risks and opportunities to make better decisions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Body** – how you look, feel, and are perceived by others.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Business** – how you contribute value to the world.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You live with your mind and body, it should be considered your full time job
    to study them, master them, and not be controlled by them.
  prefs: []
  type: TYPE_NORMAL
- en: Your mind and body allow you to transform the world and help others. Business
    is the modern way to package up the creative ability of your mind and give it
    to others in a way that allows you to sustain your ideal life. Your health and
    energy are your capacity to invest attention into your life’s work without getting
    distracted.
  prefs: []
  type: TYPE_NORMAL
- en: Your mind, body, and business are the singular priorities that will lead to
    your vision becoming reality.
  prefs: []
  type: TYPE_NORMAL
- en: Create a project for each.
  prefs: []
  type: TYPE_NORMAL
- en: Adopt a training program.
  prefs: []
  type: TYPE_NORMAL
- en: Start the business.
  prefs: []
  type: TYPE_NORMAL
- en: Acquire knowledge in the pursuit of both.
  prefs: []
  type: TYPE_NORMAL
- en: For those asking, “What about relationships?” don’t understand that by developing
    yourself you improve your relationships by proxy. You become less of a leach.
    Your cup overflows into theirs and you no longer need them to pour into yours.
  prefs: []
  type: TYPE_NORMAL
- en: Expose Yourself To Massive Experience
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: War mode is a period of intense growth.
  prefs: []
  type: TYPE_NORMAL
- en: It doesn’t last forever.
  prefs: []
  type: TYPE_NORMAL
- en: Maybe 2-3 months.
  prefs: []
  type: TYPE_NORMAL
- en: You only have so much you can give before you burn out.
  prefs: []
  type: TYPE_NORMAL
- en: So give it everything you have.
  prefs: []
  type: TYPE_NORMAL
- en: Say yes to everything.
  prefs: []
  type: TYPE_NORMAL
- en: Talk to new people. Accept the invitation. Launch the business. Ask for help.
    Fill your mind with so much chaos that even if you crack under pressure, you come
    out a more developed individual. Fly too close to the sun and land on the moon.
  prefs: []
  type: TYPE_NORMAL
- en: I promise you.
  prefs: []
  type: TYPE_NORMAL
- en: You will look back in 12 months and have no idea how you came so far.
  prefs: []
  type: TYPE_NORMAL
- en: After a period of recovery, do it all over again.
  prefs: []
  type: TYPE_NORMAL
- en: Growth isn’t linear.
  prefs: []
  type: TYPE_NORMAL
- en: It comes in short exponential bursts of progress.
  prefs: []
  type: TYPE_NORMAL
- en: The good thing is, once you practice it, you can *choose* to set up the right
    variables to encourage this period of growth.
  prefs: []
  type: TYPE_NORMAL
- en: I’ll see you on the other side.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
