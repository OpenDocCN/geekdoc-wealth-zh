- en: You Have $100,000 Of Knowledge Trapped In Your Brain
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 你的大脑里困着10万美元的知识
- en: 原文：[https://thedankoe.com/letters/you-have-100000-of-knowledge-trapped-in-your-brain/](https://thedankoe.com/letters/you-have-100000-of-knowledge-trapped-in-your-brain/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/you-have-100000-of-knowledge-trapped-in-your-brain/](https://thedankoe.com/letters/you-have-100000-of-knowledge-trapped-in-your-brain/)
- en: Attention *isn’t* the new currency.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 注意力**不是**新的货币。
- en: Information is.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 信息是。
- en: Information is what we process with attention.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 信息是我们用注意力处理的东西。
- en: That’s all humans really do…
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是人类真正所做的一切…
- en: We process, store, and use information to create or destroy.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我们处理、存储和使用信息来创造或毁灭。
- en: I’d like to believe that the unconscious, evolution-aligned intent behind modern
    technology, like social media, was to allow us as humans to gain access to information
    we wouldn’t normally have. Thus increasing our potential in life.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望相信，现代技术，如社交媒体，背后无意识的、与进化一致的意图是让我们作为人类能够获得我们通常无法获得的信息。从而增加我们生活的潜力。
- en: Information leads to awareness of opportunity.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 信息导致对机会的觉察。
- en: Awareness of opportunity leads to profitable ideas.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 机会的觉察能带来有利的想法。
- en: Profitable ideas lead to positive behavior change.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 有利的思想导致积极的行为改变。
- en: Manipulation of information can lead to death, destruction, and getting stuck
    in your own head… [but we’ve talked about that before](https://thedankoe.com/how-cheap-dopamine-prevents-you-from-becoming-high-value/).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 信息操纵可能导致死亡、破坏，以及陷入自己的头脑中……[但我们之前已经讨论过这一点](https://thedankoe.com/how-cheap-dopamine-prevents-you-from-becoming-high-value/)。
- en: Instead, I want to discuss the positive aspects of the information age we live
    in (and how you can take advantage of it).
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我想讨论我们生活在这个信息时代（以及你如何利用它）的积极方面。
- en: '*I want you to understand one thing:*'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '*我想让你明白一件事：*'
- en: Everything is information.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 一切都是信息。
- en: Our genetic code is information. Light is information that our eyes interpret
    in a way that aligns with our survival. Our programming is the result of information
    repeated over time.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的遗传密码是信息。光是眼睛以符合我们生存的方式解释的信息。我们的编程是信息重复的结果。
- en: Information is how humans form beliefs, which shape our thoughts, and go on
    to influence behavior.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 信息是人类形成信念的方式，这些信念塑造了我们的思想，进而影响行为。
- en: Information is what culminates as tension — or resistance — that when relieved,
    leads to discovery, innovation, and creative breakthrough. New ideas that can
    impact the future of the cosmos.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 信息是累积为紧张——或阻力——的东西，当它得到缓解时，会导致发现、创新和创造性突破。能够影响宇宙未来的新想法。
- en: Information is what allows us to survive and thrive, as it comes before anything
    else that uses information as its foundation.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 信息是我们生存和繁荣的基础，因为它在所有其他以信息为基础的事物之前。
- en: '**Everyone has the same big goal they are trying to achieve:**'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**每个人都有一个他们试图实现的大目标：**'
- en: '*Increase the quality of their human experience as much as possible.*'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '*尽可能提高他们的人类体验质量。*'
- en: Our thoughts, emotions, and actions — which are all forms of information — dictate
    our experience, which is information in the form of feedback.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的思想、情感和行为——这些都是信息的形式——决定了我们的体验，这是一种反馈形式的信息。
- en: You see, the human mind needs ordered information to keep itself, well… ordered.
    Like sports, religious doctrine, or routines. Once we have the information to
    play a game well, through learning, and then play the game that results in experience,
    that experience will be higher quality than if we were fed scattered information.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 你看，人类的大脑需要有序的信息来保持自己，嗯……有序。就像运动、宗教教义或例行公事一样。一旦我们有了学习游戏所需的信息，然后通过游戏获得经验，这种经验的质量将高于如果我们被喂食零散信息的情况。
- en: There is **content** and there is **consciousness**.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 有**内容**，也有**意识**。
- en: The structure of the *content* is what determines happiness and fulfillment.
    That content can represent order or chaos, the latter resulting in a poor quality
    of experience.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 内容的结构决定了幸福和满足感。这种内容可以代表秩序或混乱，后者会导致体验质量低下。
- en: While most use information as a way to distract themselves from the problems
    in their life (through argument, mainstream news, and flavor-of-the-day drama),
    others realize it is a trap and let curiosity guide them in the opposite direction.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 当大多数人将信息作为逃避生活中问题（通过争论、主流新闻和当天的戏剧）的方式时，其他人意识到这是一个陷阱，并让好奇心引导他们走向相反的方向。
- en: Then, there are those I genuinely feel bad for… the ones that are trapped consuming
    negative content about how courses and other information products are bad to sell.
    If that’s you, gain some perspective. You live in the *information age.* **Don’t
    write off an entire epoch of existence because you had one bad experience with
    a sleazy marketer.**
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，还有一些我真心感到难过的人……那些被困在消费关于课程和其他信息产品是坏处的负面内容中的人。如果你是这样的，获得一些观点。你生活在*信息时代*。**不要因为与一个狡猾的营销人员的一次糟糕经历就否定整个存在时代**。
- en: If you fall into the curious group, this letter is for you. Why?
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你属于好奇的那群人，这封信就是给你的。为什么？
- en: Because you have $100,000+ worth of information in your head.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 因为你头脑中有价值10万美元以上的信息。
- en: In this letter, I want to propose a system for packaging up that knowledge to
    distribute to others in a valuable way.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在这封信中，我想提出一个系统，将知识打包起来，以有价值的途径分发给他人。
- en: A way to use information for good while opening the potential to profit handsomely.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 一种利用信息做好事的同时又能获得丰厚利润的方法。
- en: Controlling the content (information) of your consciousness and guiding the
    content (through content) of others’ consciousness. Both (preferably) resulting
    in a high-quality experience.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 控制你意识中的内容（信息）和引导他人意识中的内容（通过内容）。两者（最好是）都产生高质量的经验。
- en: A journey of *both* self-actualization and self-monetization that eventually
    results in self-transcendence.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一条既实现自我实现又实现自我货币化的旅程，最终导致自我超越。
- en: Increasing your quality of life, then others.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 提高你的生活质量，然后是别人的。
- en: Notice how this information (the content you are reading right now) can lead
    to potential opportunities. Don’t manipulate what I’m saying with your mind just
    yet. Be open. Hold the idea in the realm of possibility for the rest of this letter.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 注意如何（你现在正在阅读的内容）可以导致潜在的机会。不要用你的思想操纵我说的话，先保持开放。把这想法保持在可能性的领域，直到这封信的结尾。
- en: How I Turned My Knowledge Into A 7 Figure Business As A Value Creator
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 《如何将我的知识转化为价值创造者的七位数业务》
- en: 'It’s been a bit since I’ve discussed my story, and we have quite a few new
    people reading since then, so here are the cliff notes (I’ll rewrite my story
    at some point for an entire letter):'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 自从我上次讨论我的故事以来已经有一段时间了，自从那时起，有很多新的人开始阅读，所以这里是一些要点（我会在某个时候重写我的故事，以一封信的形式呈现）：
- en: I tried and failed at most marketable skills and online business models
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我尝试过大多数有市场前景的技能和在线商业模式，但都失败了。
- en: I lost $8,000 trying to make them work and had to get a web design job for the
    sake of survival
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我试图让它们起作用，但失败了，损失了8000美元，不得不为了生存而找了一份网页设计工作。
- en: My knowledge and skills compounded to the point where I made freelance web design
    work
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我的知识和技能累积到了一个点，以至于我可以从事自由职业的网页设计工作。
- en: I started writing on Twitter and pivoted my freelance offer for the following
    I was attracting
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我开始在Twitter上写作，并转变了我的自由职业报价，以吸引以下关注。
- en: I started on Twitter 3 years ago.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我3年前开始在Twitter上起步。
- en: In my first year, I launched 3 information products and pulled in my first 6
    figures of info product sales.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的第一年，我推出了3个信息产品，并实现了第一次6位数的知识产品销售额。
- en: First was a “how to freelance with web design” product.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 首先是关于“如何通过网页设计自由职业”的产品。
- en: The second was a product that taught how I built the websites.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个是一个教授我如何构建网站的产品。
- en: The third was how I grew on Twitter and used it as my sole way of landing freelance
    clients.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 第三个是如何在Twitter上成长，并利用它作为我唯一吸引自由职业客户的方式。
- en: Eventually, I bundled all of these up and sold them at a discount (now they
    are a bonus for joining Modern Mastery).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，我将所有这些产品捆绑在一起，以折扣价出售（现在它们是加入《现代精通》的额外奖励）。
- en: In my second year, I started branching out to new platforms like Instagram and
    podcasting.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的第二年，我开始拓展到新的平台，如Instagram和播客。
- en: During this time, I tried launching 3 other products that failed miserably by
    my own doing and lack of promotion. A physical planner, a self-help eBook, and
    a course on offer creation (also all bonuses for Modern Mastery).
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在这段时间里，我尝试推出了3个其他产品，由于我的错误和缺乏推广，它们都彻底失败了。一个实物计划者，一本自我帮助的电子书，以及一个关于提供创造力的课程（这些都是《现代精通》的额外奖励）。
- en: I also tried selling multiple high-ticket offers. I saw success with marketing
    consulting for creators and ghostwriting, but was quick to get out of ghostwriting
    as it was a massive time suck (meaning it went against my values and didn’t align
    with my goals of maximum time freedom).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我还尝试销售多个高价值产品。我在为创作者提供营销咨询和代笔写作方面取得了成功，但很快就放弃了代笔写作，因为它是一个巨大的时间黑洞（意味着它违背了我的价值观，并且与我的最大时间自由目标不一致）。
- en: This is when I launched Modern Mastery.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这时，我推出了《现代精通》。
- en: I launched the community with the information I had already put out.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我用已经发布的信息推出了这个社区。
- en: Now, finally, in my third year, I feel as if I have the product and service
    stack that will carry me through a solid 10 years of hyper profitability.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，最后，在我的第三年，我感觉我有了能够支持我未来10年超盈利的产品和服务组合。
- en: What’s the lesson here (before we dive deep into how you can do the same)?
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入探讨你如何做到同样的事情之前，这里的教训是什么？
- en: '**1) I have the experience to talk about this.** **I’ve sold 6 figures** ***each***
    **of info products, coaching, consulting, freelancing, and agency work****.**'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 我有谈论这个的经验。** **我卖出了每个** ***信息产品、辅导、咨询、自由职业和代理工作**** 的六位数。**'
- en: '***2) Constant building and iteration.***'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '***2) 持续构建和迭代。***'
- en: NONE of what I built went to waste. It gave me something to build on top of
    and refine my ideas further.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我所构建的每一项都没有浪费。它给了我继续构建和进一步精炼想法的基础。
- en: This is where most creators go wrong.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是大多数创作者出错的地方。
- en: They wait to launch something because of a deep-rooted fear.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 他们因为根深蒂固的恐惧而等待推出某物。
- en: They know the first product is going to suck, because it’s inevitable, so they
    prevent themselves from iterating early — which opens them up to a higher income
    ceiling faster.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 他们知道第一个产品将会很糟糕，这是不可避免的，所以他们防止自己早期迭代——这使他们更快地达到更高的收入上限。
- en: Build.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 构建。
- en: NOW.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 现在。
- en: How To Extract The Value Stuck In Your Brain
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何从你的大脑中提取价值
- en: Brand is what you do.
  id: totrans-63
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 品牌是你所做的事情。
- en: ''
  id: totrans-64
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Product is how you do it.
  id: totrans-65
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 产品是你如何做到的。
- en: ''
  id: totrans-66
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Marketing is why you do it.
  id: totrans-67
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 市场营销是你为什么要做这件事的原因。
- en: ''
  id: totrans-68
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Do something that improves your quality of life, teach others how you did it,
    and show them why they should care.
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 做一些能提高你生活质量的事情，教别人你是如何做到的，并告诉他们为什么他们应该关心。
- en: ''
  id: totrans-70
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [November 15, 2022](https://twitter.com/thedankoe/status/1592462921468108800?ref_src=twsrc%5Etfw)
  id: totrans-71
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年11月15日](https://twitter.com/thedankoe/status/1592462921468108800?ref_src=twsrc%5Etfw)
- en: In previous letters, we discussed an overview of [productizing yourself](https://thedankoe.com/the-one-person-business-model-how-to-monetize-yourself/)
    and becoming a [value creator](https://thedankoe.com/the-rise-of-the-value-creator-a-new-career-path/).
    Treat this letter as part 3 in the one-person business series (with many more
    to come).
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在之前的信件中，我们讨论了如何将个人产品化[产品化自己](https://thedankoe.com/the-one-person-business-model-how-to-monetize-yourself/)以及成为[价值创造者](https://thedankoe.com/the-rise-of-the-value-creator-a-new-career-path/)的概述。将这封信视为个人业务系列的第三部分（还有更多即将到来）。
- en: In this letter, I want to discuss how to ideate the perfect product while doing
    what you enjoy in this life.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在这封信中，我想讨论如何在享受生活中做你热爱的事情的同时，如何构思完美的产品。
- en: If your personal brand revolves around what you do, your product revolves around
    your unique way of doing it.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的个人品牌围绕着你所做的事情，你的产品就围绕着你的独特方式来做。
- en: '**What you do** = what you do on a daily basis in pursuit of your goal for
    a better life.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**你所做的事情** = 你为了追求更好的生活目标而在日常生活中所做的事情。'
- en: '**How you do it** = the system, method, or process that you’ve created to get
    better results. This comes from experience and experimentation.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**如何做到** = 你为了获得更好的结果而创建的系统、方法或过程。这来自于经验和实验。'
- en: I sold a freelancing product because I had made 6 figures with freelancing.
    I knew how to do it well and had processes in place for landing clients, delivering
    the service, and making it sustainable.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 我出售了一个自由职业产品，因为我通过自由职业赚了六位数。我知道如何做得很好，并且有吸引客户、提供服务以及使其可持续的流程。
- en: I built a membership community based on what I do on a daily basis. Like having
    a reminder and accountability for completing your daily ‘priority tasks’ during
    focused work.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 我基于我每天所做的事情建立了一个会员社区。就像在专注工作时提醒和问责完成你的每日“优先任务”一样。
- en: I now sell a writing product because I had built my entire 500K+ audience with
    a 2-hour-a-day writing (and walking) habit.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 我现在出售一个写作产品，因为我通过每天两小时的写作（和散步）习惯建立了整个50万+的受众。
- en: Others sell minimalist training programs that go completely against the accepted
    ‘good’ advice for lifting weights. If someone only has 2 hours a week to train,
    because they work long hours, but they still made progress… that is unique, and
    your marketing is already laid out for you. They sell a system to those with limited
    time because they’ve experimented to the point of getting results.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 其他人在完全违背公认的“好”建议进行举重训练时出售简约训练计划。如果某人每周只有两小时的时间来训练，因为他们工作时间长，但他们仍然取得了进步……这是独特的，你的营销策略已经准备好了。他们向那些时间有限的人出售系统，因为他们已经实验到获得结果的程度。
- en: 'In summary, everyone that has productized themselves has done 3 things:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，所有那些将自己产品化的人都已经做了三件事：
- en: They improved their quality of life through personal and professional development
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 他们通过个人和职业发展提高了他们的生活质量。
- en: They learned necessary skills and interests along the way to increase their
    quality of life
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 他们在这个过程中学习了必要的技能和兴趣，以提高他们的生活质量。
- en: They started posting online regardless of ‘how basic’ they thought their information
    was
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 他们开始在网上发布信息，不管他们认为自己的信息有多“基础”。
- en: '*I want to pose this question to you:*'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '*我想向你提出这个问题：*'
- en: Is there any better business model you can think of?
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 你能想到比这更好的商业模式吗？
- en: To self-actualize, self-monetize, and use business as a modality for self-transcendence?
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 为了自我实现、自我货币化，并利用商业作为自我超越的手段？
- en: To increase the quality of your human experience (what everyone is trying to
    do) and pass down what you learned along the way?
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提高你的人生体验（这是每个人都试图做到的）并在旅途中传授你所学的知识？
- en: There are other viable business models of course, but I genuinely believe this
    is the way of the future.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，还有其他可行的商业模式，但我真诚地相信这是未来的道路。
- en: If we lived in accordance with our nature, there would be one business for every
    one person on this planet. All unique. All fulfilling the perfect purpose.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们按照自己的本性生活，那么这个星球上每个人都会有一个独特的商业。所有都是独一无二的。所有都完美地实现了其目的。
- en: This will never happen of course, but that just means it will never get saturated
    (if, and only if, people take their piece of the pie and leave it at that. Know
    when enough is enough).
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这种情况永远不会发生，但这意味着它永远不会饱和（如果，并且只有如果，人们只拿走他们的一份，然后离开。知道何时足够了）。
- en: 'Here are 3 questions you can contemplate this week to brainstorm a profitable
    product idea:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这周你可以思考以下三个问题，以激发一个有利可图的产品的想法：
- en: '**1) What is the highlight of your day?**'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 你一天中最精彩的是什么？**'
- en: Is it writing? Journaling? Meditating? Yoga? The gym?
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 是写作吗？日记？冥想？瑜伽？健身房？
- en: This is the most difficult part because it slips under most people’s nose.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 这是最困难的部分，因为它往往被大多数人忽视。
- en: These are the things that seem so “normal” to us that we think others wouldn’t
    benefit from our perspective.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是我们认为如此“正常”的事情，以至于我们觉得别人不会从我们的观点中受益。
- en: If you journal, can you create a journal for yourself and sell it down the road?
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你写日记，你能为自己创建一本日记并在将来出售它吗？
- en: Can you create your own yoga routine?
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 你能创造自己的瑜伽练习吗？
- en: How about a writing system?
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 关于写作系统呢？
- en: What is the thing you enjoy doing, to the point of it being effortless, that
    benefits your life so much to the point of you wanting to teach others?
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 有什么你喜欢做的事情，以至于它变得毫不费力，对你的生活帮助如此之大，以至于你想要教别人？
- en: '**2) What do you do better than your peers?**'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 你比你的同行做得更好是什么？**'
- en: If your friend expressed genuine interest in what you do, what is that one thing
    that you could teach them everything about?
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的朋友对你所做的事情表现出真正的兴趣，你能教他们关于这件事的一切吗？
- en: 'Another metric:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个指标：
- en: What is something that your friends will criticize you for because they don’t
    understand it?
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 有什么你的朋友会因为你不理解而批评你的事情？
- en: Like how Chris Bumstead, a champion and competitor in Mr. Olympia, said how
    he had to give up a “normal” life to achieve greatness. He would skip partying
    and eating out to recover and cook healthy meals. His friends didn’t get it, but
    he sure as hell knew that it led toward something they couldn’t fathom.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 就像克里斯·布姆斯特德，奥林匹亚先生的冠军和竞争者，说他不得不放弃“正常”的生活来实现伟大。他会跳过派对和外出就餐，以便恢复并烹饪健康的餐食。他的朋友们不理解，但他确实知道这会引导他们无法理解的某个方向。
- en: '**3) Who do you follow and what do they sell?**'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 你跟随谁，他们卖什么？**'
- en: 'Success is counterintuitive, and this is the best advice I can give related
    to ideating a great product:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 成功是反直觉的，这是我关于构思优秀产品的最好建议：
- en: Sell what is already selling.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 卖那些已经卖得好的东西。
- en: Please for the love of all things holy do not take this advice lightly. Those
    5 words single-handedly created the foundation of my business.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 请为了所有神圣的事物，不要轻视这些建议。这五个字单独创造了我的商业基础。
- en: This requires you to immerse yourself in the digital environment you want to
    join, like success by osmosis (or “your network is your networth”).
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这需要你沉浸在你想要加入的数字环境中，就像通过渗透获得成功（或者说“你的网络就是你的财富”）。
- en: Pay very close attention to those you aspire to be like.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 仔细关注那些你渴望成为的人。
- en: Reverse engineer their profile, content, landing pages, products, and anything
    else so you can piece together the puzzle of their success (and then replicate
    it).
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 反向工程他们的个人资料、内容、着陆页、产品以及任何其他东西，这样你就可以拼凑出他们成功的拼图（然后复制它）。
- en: '**4) A Bonus For Those That Haven’t Started**'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 为尚未开始的人提供额外奖励**'
- en: If you haven’t started, you need to be decisive.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还没有开始，你需要果断。
- en: Pick a path that slightly interests you and start acting today.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个稍微吸引你的路径，并从今天开始行动。
- en: Look at the books on your shelf, the videos in your browser history that you
    watch to *learn (not distract yourself),* and who you follow on social media that
    inspires you to be better.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 看看你的书架上的书，浏览器历史记录中的视频，你观看它们是为了**学习（而不是分散注意力），**以及你在社交媒体上跟随的人，他们激励你变得更好。
- en: Set a goal, learn from those who have achieved it, and replicate their success.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 设定目标，向那些已经实现它的人学习，并复制他们的成功。
- en: Creating A Profitable Product (In The Simplest Way I Can Explain It)
  id: totrans-118
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建一个有利可图的产物（以我能解释的最简单方式）
- en: <picture fetchpriority="high" decoding="async" class="wp-image-873">![](../Images/85b303bc0005a6303e7bc991a858c2ed.png)</picture>
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-873">![](../Images/85b303bc0005a6303e7bc991a858c2ed.png)</picture>
- en: Before we start, I want to reiterate the context of this entire letter.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始之前，我想重申这封信的背景。
- en: We are discussing this from the perspective of productizing yourself via information.
    We will not be discussing physical products, freelance services, or even B2B (business-to-business)
    sales.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从将信息产品化的角度来讨论这个问题。我们不会讨论实物产品、自由职业服务，甚至B2B（企业对企业）销售。
- en: This is the You2You business model, or if it helps you frame it in a less selfish
    way; the Creator2Creator model. Your brand, product, content, and every other
    facet of your business comes from organizing the information in your head, solidified
    through experience, into a creation that others perceive as valuable.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 这是You2You商业模式，或者如果你希望以不那么自私的方式构建它；创作者到创作者模式。你的品牌、产品、内容以及你业务的每一个其他方面都来自于你头脑中信息的组织，通过经验巩固，形成他人认为有价值的东西。
- en: You build for yourself and attract those that resonate with what you’re building.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 你为自己而建，吸引那些与你所建产生共鸣的人。
- en: '**One key point that most miss:**'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '**一个大多数人都会错过的重要观点：**'
- en: This has to be done in public.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 这必须在公共场合完成。
- en: You need *data* to know whether your information is valuable or not.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要**数据**来了解你的信息是否有价值。
- en: Starving artists love to create what *they* think is valuable, and when others
    don’t validate their ideas, they blame everyone but themselves for their inability
    to pivot, iterate, and create something that actually serves the collective good.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 饥饿的艺术家喜欢创造他们认为有价值的东西，当别人不验证他们的想法时，他们会责怪所有人，而不是自己，因为他们无法转型、迭代并创造出真正服务于集体利益的东西。
- en: Let’s dive in.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨。
- en: 'Use these 7 (non-linear) steps to turn your self-improvement journey into a
    self-monetization journey:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这7个（非线性）步骤将你的自我提升之旅转变为自我货币化之旅：
- en: '**1) Become Above Average In Select Skills Or Interests**'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 在某些技能或兴趣方面成为平均水平以上**'
- en: Motivation gets you into this game. **Learning is what helps you continue to
    play**. Creativity is how you steer. Flow is how you turbo boost the results beyond
    all rational standards and reasonable expectations. — Steven Kotler
  id: totrans-131
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 动机让你进入这个游戏。**学习是帮助你继续游戏的方法**。创造力是你如何引导的方向。心流是你如何将结果超乎理性标准和合理期望地加速。 —— 史蒂文·科特勒
- en: We’ve discussed skills and interests multiple times before, so I’m assuming
    many of you have already begun learning the ones that interest you.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 我们之前多次讨论过技能和兴趣，所以我假设你们中的许多人已经开始学习你们感兴趣的东西。
- en: '*Here’s something that most people don’t want to hear:*'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '**这里有一些大多数人不愿意听到的：**'
- en: If you aren’t seeing the results you want, in any endeavor, **it’s because you
    aren’t skilled enough**. You haven’t put in the necessary time to learn how to
    play, win, and become artful in the game.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有看到你想要的结果，在任何事业中，**那是因为你的技能还不够**。你没有投入必要的时间去学习如何玩耍、获胜并在游戏中变得技艺高超。
- en: Without this focus on learning, we tend to focus on the desired outcome that
    we don’t have. We begin to compare ourselves to the results of others that have
    a higher skill level (that isn’t visible to the unskilled eye).
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 没有这种对学习的关注，我们往往会专注于我们还没有的期望结果。我们开始将自己与他人比较，他们有更高的技能水平（这在没有技能的眼睛看来是不可见的）。
- en: I had a comment on one of my posts the other day.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 我前几天在我的帖子下收到了一条评论。
- en: Someone asked why he wasn’t growing on social media even after following common
    advice on how to grow.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 有人问他为什么即使遵循了如何增长的常见建议，他在社交媒体上也没有增长。
- en: '*It’s still a skill problem.*'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '*这还是一个技能问题*。'
- en: There is only so much about a skill you can learn from learning alone. You have
    to marinate your skillset in the market. This expands your awareness around the
    skill. You pick up little nuances if you don’t mindlessly repeat what you’ve been
    told to do.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 仅通过学习，你只能学到关于一项技能的有限内容。你必须让你的技能在市场上“浸泡”。这扩大了你对该技能的认识。如果你不盲目重复别人告诉你的事情，你会学到一些细微之处。
- en: You can comment, engage with big accounts, or follow any of the other fundamental
    social media growth advice out there — but if you aren’t seeing results, you have
    to identify what’s causing that blockage.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以评论、与大型账户互动或遵循任何其他基本社交媒体增长建议——但如果你没有看到结果，你必须找出导致这种阻碍的原因。
- en: Is it your messaging? Are you fluent in English? Do you add a space before punctuation
    ? Is there a crucial piece of what you learned that you didn’t think was important?
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 是你的信息吗？你精通英语吗？你在标点符号前加空格吗？有没有你之前认为不重要的、但实际很重要的学习内容？
- en: In most cases, you can’t go wrong learning how to write, how to market, and
    how to sell.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数情况下，学习如何写作、如何营销和如何销售是不会出错的。
- en: Business is transactional in nature.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 商业本质上是交易性的。
- en: Writing, marketing, and sales will teach you human psychology, but in a practical
    way that spills over into all transactional areas of your life.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 写作、营销和销售会教你人类心理学，但以一种实用方式，这种方式会渗透到你生活的所有交易领域。
- en: '**2) Build Something With Those Skills Every Day**'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 每天用这些技能构建一些东西**'
- en: Don’t learn if you don’t have something to build.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有东西要构建，就别去学习。
- en: But don’t let this trick you into thinking that your entire life isn’t something
    you are building.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 但不要让这一点让你误以为你的整个生活不是你在构建的东西。
- en: Meaning, be ruthless with eliminating distractions. Information that stems from
    distractions leads to disorder of the mind, and as we’ve discussed, [that leads
    to overwhelm, anxiety, and lack of clarity](https://thedankoe.com/the-cure-to-caring-what-people-think/)
    — the opposite of building.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 意思是，要无情地消除干扰。来自干扰的信息会导致心灵混乱，正如我们之前讨论的，[这会导致不知所措、焦虑和缺乏清晰度](https://thedankoe.com/the-cure-to-caring-what-people-think/)
    ——这与构建相反。
- en: If you are learning marketing, build a brand.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在学习营销，就建立一个品牌。
- en: If you are learning spirituality, build a life.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在学习灵性，就构建一个生活。
- en: If you are learning any of the infinite skills that stem from either of those,
    apply what you learn to your life, business, or both. Hold that intention in your
    mind.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在学习从这两个来源中产生的无限技能之一，将你所学应用到你的生活、业务或两者之中。在心中保持这个意图。
- en: '**3) Document Your Learnings, Discoveries, & Results**'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 记录你的学习、发现和结果**'
- en: Take notes.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 做笔记。
- en: Write content.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 写内容。
- en: Treat the internet as a way of documenting the information that makes sense,
    sparks excitement, and is valuable to you. Document your ordered consciousness
    so that others can benefit.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 将互联网视为记录有意义的、能激发兴奋和对你有价值的信息的工具。记录你的有序意识，以便他人也能从中受益。
- en: The internet is a public note-taking software, public journal, and public school
    that shortcuts your way to massive opportunity, but only if you treat it as such.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网是一个公共笔记软件、公共日记和公共学校，它能让你快速通往巨大的机会，但前提是你把它当作这样的事情来对待。
- en: We discussed last week how [“start, build, teach” is the best way to retain
    what you learn.](https://thedankoe.com/how-i-remember-everything-i-learn/)
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 我们上周讨论了“开始、构建、教授”是保留所学知识的最佳方式。(https://thedankoe.com/how-i-remember-everything-i-learn/)
- en: '**4) Experiment For Holistic Understanding**'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 为了全面理解进行实验**'
- en: I’ve always loved doing things “my own way.”
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直喜欢以“我的方式”做事。
- en: My own way = *implementing the best teachings from multiple sources until I
    have a unique way of doing it.*
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 我的“我的方式”= *从多个来源实施最佳教诲，直到我有一种独特的方式来做这件事*。
- en: With fitness, I’ve tried every training style under the sun. I enjoyed minimalist,
    high-intensity, full-body training 3 days a week the most.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 在健身方面，我尝试过太阳下所有的训练风格。我最喜欢每周三天进行极简主义、高强度、全身训练。
- en: With diet, I’ve tried vegan, ancestral, carnivore, IIFYM, keto, and calorie
    restriction models like intermittent fasting.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 在饮食方面，我尝试过素食、祖先饮食、食肉者、IIFYM、生酮和间歇性禁食等节食模式。
- en: From that experimentation, I can navigate the health space artfully. I can take
    the most enjoyable aspects from each of those diets and create something new that
    I genuinely enjoy (that gets me results).
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 通过那次实验，我能够巧妙地导航健康领域。我可以从每个饮食中提取最令人愉快的方面，创造出真正喜欢（并取得结果）的新事物。
- en: If I wanted to slap a name on my diet or training program and sell it, I could.
    And with my marketing knowledge, I would do a damn good job at it. But I’ll leave
    that space less saturated for now 😉
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想给我的饮食或训练计划起个名字并出售它，我可以。凭借我的营销知识，我会做得相当出色。但现在，我会让这个领域不那么饱和 😉
- en: '***This is the way of the synthesizer.***'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: '***这是综合者的方式。***'
- en: Since most niches have been filled in multiple industries, this is the way of
    the future, as it allows for infinite creativity and lack of saturation.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 由于大多数利基市场在多个行业中都已饱和，这是未来的趋势，因为它允许无限的创造力和缺乏饱和度。
- en: Similar to how Electronic Dance Music came about from technological advancements.
    New genres and subgenres are being created every week. The electronic industry
    continues to grow because the technology allows DJs and producers to infinitely
    innovate.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 就像电子舞曲是从技术进步中产生的。每周都在创造新的流派和子流派。电子行业持续增长，因为技术允许DJ和制作人无限创新。
- en: Creators are just IJs.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者只是灵感迸发者。
- en: Idea Junkies.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 灵感迸发者。
- en: Ideas are the sounds, content are the songs.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 灵感是声音，内容是歌曲。
- en: Create your mix, play it loud, and attract an audience.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 创建你的混合，大声播放，吸引观众。
- en: '**5) Iterate On Your Process For Efficiency & Results**'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '**5) 对你的流程进行迭代以提升效率和结果**'
- en: Once you have a holistic understanding of the skill or interest you want to
    pursue, create your own process.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你对想要追求的技能或兴趣有一个全面的理解，就创建你自己的流程。
- en: Literally, write down your own SOPs.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，写下你自己的SOPs。
- en: SOP = Standard Operating Procedure in business.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: SOP = 商业中的标准操作流程。
- en: Like an SOP I had for creating client websites as a web designer that turned
    into a web design course (of course, I had to add a bit more detail to the curriculum,
    but that’s the easy part).
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 就像作为一个网页设计师，我有一个创建客户网站的SOP，后来变成了一个网页设计课程（当然，我必须添加更多细节到课程中，但这只是容易的部分）。
- en: It is a set of steps, with a description, on how to perform a certain task that
    gets a result. A system.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一套步骤，包括如何执行一项特定任务以获得结果的描述。一个系统。
- en: When you follow this system and gain direct experience from using it, you will
    encounter problems. Especially the first few times around.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 当你遵循这个系统并直接从使用中获得经验时，你将遇到问题。尤其是最初几次。
- en: When you encounter this problem, make a small change to your system.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 当你遇到这个问题时，对你的系统进行一些小的调整。
- en: Test again, see if it works, and repeat the process until you have something
    that consistently gets results.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 再次测试，看看它是否有效，并重复这个过程，直到你有一个能够持续产生结果的东西。
- en: Another example of this would be my [Power Planner](https://learn.thedankoe.com/planner).
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个例子是我的[Power Planner](https://learn.thedankoe.com/planner)。
- en: I created a productivity system for myself.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 我为自己创建了一个生产力系统。
- en: I would write down certain things every day to ensure I was completing my priority
    tasks. I experimented with multiple planners and took what I liked most from them.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 我每天会写下一些事情，以确保我完成了我的优先任务。我尝试了多个计划本，并从中选择了我最喜欢的部分。
- en: Eventually, I packaged it up, sent the designs to a printer, and created a physical
    planner (that I stopped selling because I hated handling inventory from my small
    apartment).
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，我将它打包，将设计发送给印刷厂，并制作了一个实物计划本（因为我讨厌在我的小公寓里处理库存，所以我停止了销售）。
- en: My course, [The 2 Hour Writer](https://2hourwriter.com), started off as templates
    that I created for writing my newsletters based on what I had learned about writing,
    persuasion, social media growth, and marketing.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 我的课程[《两小时作家》](https://2hourwriter.com)最初是我根据所学关于写作、说服、社交媒体增长和营销的知识创建的模板，用于撰写我的通讯。
- en: That one took a bit more testing and experience, but the point still stands.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 那个需要更多的测试和经验，但观点仍然成立。
- en: I show my process for creating a system in Notion and turning it into a product
    inside [MMHQ](https://modernmastery.co/letter).
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 我在[MMHQ](https://modernmastery.co/letter)中展示了创建系统并在其中创建产品的过程。
- en: '**6) Steal Marketing & Structure That Already Works**'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: '**6) 借鉴已经成功的营销和结构**'
- en: “Sell what’s already selling.”
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: “卖那些已经热销的产品。”
- en: This is the single best piece of counterintuitive advice I’ve received.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我收到的最好的反直觉建议。
- en: I created The 2 Hour Writer because I knew how hot the writing market was in
    my little Twitter circle.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 我创建了《2小时作家》，因为我知道在我的小Twitter圈子里写作市场有多热。
- en: I knew that people were selling 7+ figures a year in writing products on Twitter
    alone.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道人们仅在Twitter上就通过写作产品每年卖出7位数。
- en: I knew that I had a unique take on writing, even when I don’t consider myself
    a writer, and had the results to back it.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道我对写作有独特的见解，即使我不认为自己是作家，也有成果来支持这一点。
- en: To make it even easier on myself, I was able to take the best aspects of certain
    writers’ landing pages.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让自己更容易，我能够吸取某些作家着陆页的最佳方面。
- en: The headlines
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标题
- en: The burning problems
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 燃烧的问题
- en: The offer and curriculum structure
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供和课程结构
- en: The guarantee, benefits, FAQs, and the rest
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保证、好处、常见问题解答以及其余部分
- en: The positioning (not “make money online with writing”)
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定位（不是“通过写作在线赚钱”）
- en: This is no different from any other product I’ve created.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 这与我创建的任何其他产品都没有不同。
- en: 'My first product, an ebook on how web developers can start freelancing, was
    created because:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 我的第一款产品，一本关于网络开发者如何开始自由职业的电子书，是创建出来的，因为：
- en: I knew the developer market was hot, they love buying courses (I was a developer)
  id: totrans-202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我知道开发者市场很热，他们喜欢购买课程（我曾经是开发者）
- en: They were on Twitter and actively following people
  id: totrans-203
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 他们都在Twitter上，并积极关注他人
- en: Most dev courses were underpriced on Udemy (a course platform). I knew I had
    to differentiate myself with a personal brand on social media to charge more and
    pull in a sustainable income.
  id: totrans-204
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 大多数在Udemy（一个课程平台）上的开发课程都定价过低。我知道我必须通过社交媒体上的个人品牌来区分自己，以收取更多费用并吸引可持续的收入。
- en: I had purchased a similar freelancing course myself and gotten results with
    it
  id: totrans-205
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我自己购买了一个类似的自由职业课程，并从中获得了成果
- en: Since I had results and my own way of doing things, I decided to create my own.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我有结果和自己的做事方式，我决定创建自己的。
- en: I could use the seller’s content, marketing, and ebook itself as inspiration
    for my own.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以用卖家的内容、营销和电子书本身作为我自己的灵感来源。
- en: I outlined my product, pulled inspiration from others to be sure I was covering
    everything, and wrote it with the knowledge in my head.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 我概述了我的产品，从其他人那里汲取灵感以确保我涵盖了所有内容，并带着我头中的知识来写它。
- en: Buyers buy again. Remember that.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 买家会再次购买。记住这一点。
- en: How many courses, on the same topic, have you bought? And why do you believe
    that someone wouldn’t buy yours if you created something similar?
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 你买了多少门关于同一主题的课程？你为什么认为如果有人创建了一个类似的产品，他们不会购买？
- en: I personally don’t affiliate for many products because I usually have the results,
    and don’t want less than half of the earnings.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 我个人不推广很多产品，因为我通常有成果，并且不想收入少于一半。
- en: If I want something, I create it. If I want to sell a specific type of product,
    I create it.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想得到某样东西，我就创造它。如果我想卖特定类型的产品，我就创造它。
- en: '**7) Build Distribution & Systemize Promotions**'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: '**7) 建立分销和系统化推广**'
- en: There are a lot of moving pieces in business.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 商业中有许多变动因素。
- en: Brand is one of those things you don’t have to change too much.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 品牌是那些你不必改变太多的事情之一。
- en: Product is similar, but you should maintain and update it when the time is right.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 产品相似，但你应该在适当的时候维护和更新它。
- en: Content and marketing, on the other hand, these are a consistent effort.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 内容和营销，另一方面，这些都是持续的努力。
- en: Content is for building distribition.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 内容是用于构建分销的。
- en: An audience
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个受众
- en: An email list
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个电子邮件列表
- en: A community if you feel like it
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你愿意，可以创建一个社区
- en: Marketing is for distributing your product through promotions.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 营销是通过推广来分发你的产品。
- en: Plugging in your social posts
  id: totrans-223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 插入你的社交媒体帖子
- en: Promoting in your newsletter
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在时事通讯中推广
- en: Changing up the angle and messaging
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改变角度和信息的传递方式
- en: The only way you will succeed in the great online game is with *persistence
    and iteration*.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 在伟大的在线游戏中取得成功的唯一方法是**坚持不懈和迭代**。
- en: Make a bunch of noise and laser in on signal.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 制造一些噪音，然后专注于信号。
- en: Throw a bunch of tweets at the wall for a month.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 把一堆推文扔到墙上一个月。
- en: (Be sure you are working to get eyes on your content through networking, replies,
    or paid growth).
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: （确保你通过网络、回复或付费增长来努力让你的内容被人看到）。
- en: Note which content does **best** and begin to say 1 thing 1000 different ways.
    Post it to other platforms, turn it into a newsletter topic, and turn that newsletter
    into a YouTube video.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 注意哪些内容**最好**，并开始用1000种不同的方式说一件事。将其发布到其他平台，将其变成时事通讯的主题，并将该时事通讯变成YouTube视频。
- en: Same with marketing.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 营销也是如此。
- en: Promote, see what gets the most clicks and conversions, double down, continue
    testing, and repeat.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 推广，看看什么获得最多的点击和转化，加大力度，继续测试，并重复。
- en: Remember, 10-year mindset, not 2-week mindset.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，要有10年的心态，而不是两周的心态。
- en: Your content and promotions, after 1-3 years, will be so good that “how-to”
    advice will start to mean nothing to you.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 经过1-3年后，你的内容和推广将变得如此出色，以至于“如何做”的建议对你来说将不再重要。
- en: You learn to harness the power of self-awareness and intuition.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 你学会利用自我意识和直觉的力量。
- en: '**The caveat:**'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意事项：**'
- en: You have to start writing, building, and promoting.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须开始写作、构建和推广。
- en: If you’re anxious, remember that the unknown becomes known with time.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你感到焦虑，记住，随着时间的推移，未知将变为已知。
- en: You’ll have to lean into it at some point, might as well be now.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 你最终必须投入其中，现在开始也未尝不可。
- en: An autonomous, profitable, and fulfilling future awaits.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 一个自主、盈利且充实的未来在等待着你。
- en: — Dan Koe
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: — 丹·科
- en: What Happened This Week
  id: totrans-242
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 这周发生了什么
- en: Digital Economics is open for Enrollment until tomorrow night. If you missed
    enrollment a month ago, and want to join midway through, nows the time. The next
    cohort is in February.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 数字经济学开放报名至明天晚上。如果你一个月前错过了报名，想在中途加入，现在就是时候了。下一期课程将在2月份。
- en: '[Enroll here.](https://upgrade.digitaleconomics.school)'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: '[在此报名](https://upgrade.digitaleconomics.school)。'
