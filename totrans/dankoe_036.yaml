- en: How To Discover (And Pursue) Your Life’s Work
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何发现（并追求）你的人生使命
- en: 原文：[https://thedankoe.com/letters/how-to-discover-and-pursue-your-lifes-work/](https://thedankoe.com/letters/how-to-discover-and-pursue-your-lifes-work/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/how-to-discover-and-pursue-your-lifes-work/](https://thedankoe.com/letters/how-to-discover-and-pursue-your-lifes-work/)
- en: Society is a mass hallucination.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 社会是一种集体幻觉。
- en: '**Ask yourself this:**'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**问问自己这个问题：**'
- en: '*How did you determine what is true or false when you were growing up?*'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '*你在成长过程中是如何判断什么是真什么是假的？*'
- en: Meaning, how did you interpret the positive or negative feedback that programs
    the complex systems that compose your mind? This leads to your unconscious decision-making,
    thought patterns, how you perceive reality, and everything else that makes up
    your direct experience right now.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 意味着，你是如何解释那些编程你心中复杂系统的正面或负面反馈的？这导致你的无意识决策、思维模式、你如何感知现实，以及构成你直接体验的一切。
- en: Systems learn from the ‘bad’ and double down on the ‘good’ to hardwire neural
    networks relating to the survival of the human race.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 系统从“不好”中学习，并加倍投入“好”的方面，以固化与人类生存相关的神经网络。
- en: The question again, how did you determine what was true or false from the time
    you were born?
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 再次提出问题，从你出生的那一刻起，你是如何判断什么是真什么是假的？
- en: You learned from your parents, school system, mass media, possibly university,
    and other societal constructs like religious organizations, right?
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 你从你的父母、学校体系、大众媒体、可能还有大学，以及其他社会结构，如宗教组织那里学习，对吧？
- en: Now ask again, how did your parents determine what is true or false when they
    grew up?
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 再次问，当你父母长大时，他们是如何判断什么是真什么是假的？
- en: How did your school teachers determine what was true or false? University professors?
    Google search results that are heavily manipulated and favor university-level
    information? Maybe Wikipedia? Created by universities and those that went to university,
    used by university students to create the research papers that will go up elsewhere
    on Google?
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 你的学校老师是如何判断什么是真什么是假的？大学教授？被大量操纵并倾向于大学水平信息的谷歌搜索结果？也许维基百科？由大学和那些上过大学的人创建，由大学生用来创建将在谷歌其他地方出现的论文？
- en: If you question your beliefs enough, you end up with nothing but the pieces
    of a game. You end up with an understanding that everything that we can make sense
    of with words is a human construct that does not have a base of absolute truth.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你质疑你的信念足够多，你最终只会得到游戏的碎片。你最终会理解，我们用语言可以理解的一切都是人类构造，它们没有绝对真理的基础。
- en: These constructs are what anchor your mind to reality. These constructs create
    the game that we’ve unconsciously built ourselves into.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这些构造是锚定你的心灵到现实的东西。这些构造创造了我们无意识地构建进的游戏。
- en: When you are aware of this game, you can learn to win it.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 当你意识到这个游戏时，你可以学会如何赢得它。
- en: When you are unaware of this game, you are just another construct. An anchor
    to help the players navigate and win the game. An NPC.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当你不知道这个游戏时，你只是另一个构造。一个锚点，帮助玩家导航并赢得游戏。一个NPC。
- en: '**See**: keyboard warriors, political zealots, bible thumpers, flavor of the
    day drama, and others that are brought to the attention to the minds of many (usually
    by the media) either causing an emotional reaction in them (consumers, unaware,
    unconscious, mindless, etc) or being used as feedback on what to avoid (creators,
    aware, conscious, mindful, etc).'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**看到**：键盘战士、政治狂热分子、圣经敲击者、当天的戏剧性事件，以及其他被许多人的心灵所关注的人（通常是通过媒体），要么在他们中引起情感反应（消费者、无意识、无意识、无思维等），要么被用作避免的反馈（创作者、有意识、有意识、有思维等）。'
- en: Contemplate this. You may not be as unique as you think you are. I am not excluding
    myself from this. Nobody is excluded.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 思考这个问题。你可能并不像你想象的那样独特。我并不把自己排除在外。没有人被排除在外。
- en: Breaking Free Of The Conditioned Path
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 脱离条件化路径
- en: It is rare to see somebody that is living a passionate, zestful life.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 很少看到有人过着充满激情、充满活力的人生。
- en: It is even more rare to see somebody that willingly “works” all day.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 很少看到有人愿意“整天工作”。
- en: Building, writing, contemplating, curious, experiencing, diving deep into the
    unknown, and meditating on the problems that keep them up at night.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 构建、写作、沉思、好奇、体验、深入未知，以及冥想那些让他们夜不能寐的问题。
- en: Something has to change.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 必须有所改变。
- en: If your future is the result of societal education and conditioning, it is safe
    to say you will have the same future as everyone else. And to be frank, *that
    doesn’t seem very enticing.*
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的未来是社会教育和条件的结果，那么可以肯定地说，你将拥有与其他人相同的未来。坦白说，*这听起来并不那么吸引人*。
- en: If you are lost, the answer is education.
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你迷失了方向，答案是教育。
- en: ''
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you are educated, the answer is action.
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你受过教育，答案是行动。
- en: ''
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you are acting, the answer is consistency.
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你正在行动，答案是持续性。
- en: ''
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [March 29, 2022](https://twitter.com/thedankoe/status/1508796620569206784?ref_src=twsrc%5Etfw)
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年3月29日](https://twitter.com/thedankoe/status/1508796620569206784?ref_src=twsrc%5Etfw)
- en: You will feel lost when you start pursuing your own path.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 当你开始追求自己的道路时，你会感到迷茫。
- en: Nothing worthwhile is predictable. There is not a set path. You cannot expect
    one, because if there were one, it would be taught in schools. The people that
    get paid the most are not those that are trained into an occupation constructed
    by society. Anybody can do that. That is how you become a “cog in the machine.”
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 任何有价值的事情都是不可预测的。没有一条固定的路径。你不能期望有，因为如果有，学校就会教授。收入最高的人不是那些被社会构建的职业训练的人。任何人都可以做到。这就是你成为“机器上的齿轮”的方式。
- en: You’re reading this letter because you have a (good) desire for more in life.
    You want to bridge the gap between work and life. You want to live a life of zest,
    passion, and deep satisfaction for the domain you decide to pursue with full force.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 你之所以在读这封信，是因为你有一种（好的）对生活中更多事物的渴望。你想要弥合工作和生活之间的差距。你想要在你全力以赴追求的领域过上充满活力、充满激情和深刻满足的生活。
- en: I may not be able to give you an exact path to more money, passion, and satisfaction
    — but I can give you a rough guide.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我可能无法给你一条通往更多金钱、激情和满足感的确切路径——但我可以给你一个大致的指南。
- en: <picture fetchpriority="high" decoding="async" class="wp-image-645">![](../Images/208f7cdf8405fa9e7334b0f436bf0f7e.png)</picture>
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-645">![](../Images/208f7cdf8405fa9e7334b0f436bf0f7e.png)</picture>
- en: The first step you need to take when going down a new path in life is *education.*
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在人生的新道路上迈出第一步，你需要的是*教育*。
- en: Self-education to be exact. You have to revive your child-like curiosity, feel
    into it, and let it guide you throughout life. Some people use the words intuition,
    your “calling,” your purpose, or anything else that refers to tapping into the
    intelligent voice inside you (that everyone is born with).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 精确地说，是自我教育。你必须恢复你孩童般的好奇心，深入感受它，并让它引导你度过一生。有些人会用直觉、你的“召唤”、你的目标或其他任何指代挖掘你内心智能声音（每个人生来都有的）的词语。
- en: A good place to start is to think about your childhood. Did you have a natural
    affinity towards anything? Did you gravitate towards specific interests? Some
    people may have a slight inclination towards sound, making them want to get into
    music.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 一个好的开始是回想你的童年。你对任何事物有自然的亲和力吗？你是否倾向于特定的兴趣？有些人可能对声音有轻微的倾向，使他们想进入音乐领域。
- en: I recently realized that I had been suppressing my curiosity for a long time.
    As a teenager I was obsessed with weird people like Frank Yang, a spiritual bodybuilder,
    that would spout off about consciousness and other esoteric topics. I’d like to
    entertain the thought that I understood what he was talking about, I didn’t.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我最近意识到，我长期以来一直在压抑我的好奇心。作为一个青少年，我痴迷于像弗兰克·杨这样的怪人，一个精神健身者，他会谈论意识和其他神秘话题。我想假装我理解他在说什么，但实际上我没有。
- en: 'If I had dove deep into that interest, it would have opened new paths for my
    curiosity to explore:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我深入那个兴趣，它就会为我的好奇心开辟新的探索路径：
- en: How can I make an income out of this? If I became obsessed with figuring that
    out for a year — it would happen.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我如何从中获得收入？如果我痴迷于解决这个问题一年——它就会发生。
- en: How does consciousness work help with bodybuilding? Or vice versa? How about
    yoga? Is there a benefit to it beyond physical health?
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意识工作如何帮助健身？或者反过来呢？瑜伽呢？它对身体健康之外还有什么好处吗？
- en: What nutritional protocol, if any, would help raise my level of consciousness?
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果有任何营养方案，会帮助提高我的意识水平吗？
- en: Another reflection – I’ve always been hell-bent on avoiding the corporate life
    and doing “what I love” for a living. I knew it wasn’t impossible, so why not
    dedicate my life to figuring it out?
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个反思——我一直致力于避免企业生活，并“做我喜欢的事情”谋生。我知道这并非不可能，那么为什么不把我的生命奉献于找出答案呢？
- en: Diving DEEP — and I mean DEEP (over time) — into a particular interest is how
    you pursue a truly unique path.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 深入研究——我是指真正深入（随着时间的推移）——某个特定兴趣，这是你追求一条真正独特路径的方式。
- en: If you chose email marketing, your curiosity could pull you in 1000 different
    directions. You would have to learn copywriting, email marketing software, sequences,
    social media to grow the newsletter, etc. *All of these open up new paths **again**
    for your curiosity exploration.*
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你选择了电子邮件营销，你的好奇心可能会把你引向1000个不同的方向。你将不得不学习文案写作、电子邮件营销软件、序列、社交媒体来增长通讯录等。*所有这些再次为你的好奇心探索开辟了新的道路*。
- en: Your curiosity would eventually lead you to something that *seems* completely
    unrelated to your the interest you initially chose. This differentiates you from
    the sea of individuals pursuing a set path — [giving you informational leverage
    that you can charge big bucks for.](https://thedankoe.com/the-future-of-work-will-be-play/)
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 你的好奇心最终会引导你到一个似乎与你最初选择兴趣完全不相关的东西。这使你与追求固定路径的众多个体区分开来——[给你提供信息杠杆，你可以为此收取大价钱。](https://thedankoe.com/the-future-of-work-will-be-play/)
- en: We live in an age of infinite leverage, and the economic rewards for genuine
    intellectual curiosity have never been higher.
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们生活在一个无限杠杆的时代，真正的智力好奇心所带来的经济回报从未如此之高。
- en: ''
  id: totrans-48
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Naval (@naval) [June 21, 2017](https://twitter.com/naval/status/877321503896854528?ref_src=twsrc%5Etfw)
  id: totrans-49
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — Naval (@naval) [2017年6月21日](https://twitter.com/naval/status/877321503896854528?ref_src=twsrc%5Etfw)
- en: Can you see how simply adopting the habit of self-education (and execution,
    of course) will lead to the life you want? *It is the simple commitment to never
    rely on anything but yourself to actualize your potential.*
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 你能看出仅仅养成自我教育的习惯（当然还有执行）如何引导你走向想要的生活吗？*这是对永远不依赖任何事物但依赖自己来实现潜能的简单承诺*。
- en: Money is no longer optional. The need for money is encoded in the system. We
    don’t live in huts or hunt our own food anymore. Our psyche remains the same —
    wired for survival — but the environment we live in is completely different.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 金钱不再是可选择的。对金钱的需求被编码在系统中。我们不再住在棚屋里或自己狩猎食物。我们的心理仍然是相同的——为了生存而设定——但我们的生活环境却完全不同。
- en: The first thing you should begin educating yourself on is a skill that will
    eventually help you make money. This can be anything really, but marketable skills
    are usually the best option (and beginner-level information is readily available
    online). We will talk more about this later.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该首先开始教育自己的是那种最终能帮助你赚钱的技能。这可以是任何东西，但通常可销售技能是最好的选择（而且入门级信息在网上很容易找到）。我们稍后会更多地讨论这一点。
- en: The Domain Of Mastery has you choose 3 interests. These can change at anytime.
    These are just a starting point for pursuing your curiosity. By studying these
    and improving your skillset, you are diving deeper into the unknown. You are exposing
    yourself to information that schools won’t teach you.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 主宰领域要求你选择3个兴趣点。这些可以在任何时候改变。这些只是追求你好奇心的起点。通过研究这些并提高你的技能集，你正在深入未知。你正在让自己接触到学校不会教给你的信息。
- en: The thing that most people don’t understand is that in order to be a Master
    Of One, you *have* to be a jack of all trades. You have to dive deep into the
    iceberg of awareness if you want to be creative in that domain. A health coach
    without deep knowledge in psychology will not be able to get client results. They
    will think its a calorie intake problem when the root problem is societal conditioning
    and habit formation.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人不懂的是，为了成为某一领域的专家，你必须成为万事通。如果你想在这个领域有所创新，你必须深入到意识的冰山之下。一个没有心理学深厚知识的健康教练无法获得客户成果。他们会认为这是一个卡路里摄入问题，而根本问题是社会条件和习惯形成。
- en: Being a specialist can be trained. We are not trying to do something that others
    can be trained into.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 成为专家是可以训练的。我们并不是试图去做别人可以被训练去做的事情。
- en: As you dive deeper into these interests, you will realize that they all lead
    to the same thing — which is life itself. The universe is a giant mind. A network
    of complex and creative systems.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 当你深入这些兴趣时，你会意识到它们都指向同一个东西——那就是生活本身。宇宙是一个巨大的心智。一个由复杂和创造性的系统组成的网络。
- en: 'Here are 4 tips to begin your curiosity exploration:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些提示，帮助你开始好奇心探索：
- en: '**1) Study The Principles**'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 学习原则**'
- en: When you learn Photoshop, aside from knowing how to navigate the software, there
    are only a few things you need to know — the principles.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 当你学习Photoshop时，除了知道如何导航软件外，你只需要知道几件事——原则。
- en: Selections, masks, and adjustment layers.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 选择、遮罩和调整层。
- en: When you understand those, you can pretty much create anything you would need
    (unless the project demands something more.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 当你理解了这些，你几乎可以创造出你需要的一切（除非项目需要更多）。
- en: This is true with almost anything. When you understand the principles, you can
    accomplish 80% of the work you would need to get done in that domain.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这几乎适用于任何事物。当你理解了原理，你就可以完成该领域所需完成的大部分工作。
- en: '**2) Find “Mentors”**'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 寻找“导师”**'
- en: When I say find mentors, I mean find a congruent voice that you can learn from.
    Some of you are attracted to the philosophical or spiritual aspect of this newsletter
    even though I talk about business.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 当我说寻找导师时，我的意思是找到一个你能从中学习的声音一致的人。有些人可能被这封通讯的哲学或精神方面所吸引，尽管我谈论的是商业。
- en: You may or may not get useful information from someone who talks strictly about
    business.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能或可能不会从那些只谈论商业的人那里得到有用的信息。
- en: Search for books, social media accounts, podcasters, YouTubers, and any other
    information you can find on your topic of interest. If what they teach does not
    register with you, find another mentor that has a congruent voice you can make
    sense of (and are excited to learn from).
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 寻找书籍、社交媒体账户、播客主持人、YouTube博主以及你能找到的任何关于你感兴趣主题的信息。如果他们的教导对你没有影响，找到另一个声音一致、你能理解（并且乐于学习）的导师。
- en: '**3) Start A Real-World Project**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 开始一个现实世界项目**'
- en: I always recommend starting a personal brand to post your learnings online.
    [That alone will force you to understand money-making skills](https://open.spotify.com/episode/5DdgoAufTrFF6tzd4B6zXy?si=fae0ddd202224a05)
    if you want to see real progress. Copywriting, marketing, persuasion, sales, etc
    are all necessary to put out an impactful message and turn your interests into
    income.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我总是建议开始建立一个个人品牌，在网上发布你的学习成果。如果你想要看到真正的进步，[仅此一项就能迫使你理解赚钱的技能](https://open.spotify.com/episode/5DdgoAufTrFF6tzd4B6zXy?si=fae0ddd202224a05)。文案写作、营销、说服、销售等都是发出有影响力信息并将你的兴趣转化为收入所必需的。
- en: Remember, you can only learn so much by learning. You have to apply what you
    learn if you want to open new mental pathways to explore.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，仅通过学习你能学到的东西是有限的。如果你想开拓新的思维路径去探索，你必须应用你所学的知识。
- en: If you keep things in your head, you will get stuck in a loop of learning the
    same thing over and over without moving to the next level. You need real world
    feedback.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只是把东西记在脑子里，你将会陷入一个循环，反复学习同样的事情，却无法提升到下一个层次。你需要真实的反馈。
- en: '**4) Be Observant Of Connections**'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 注意寻找联系**'
- en: This leads into our next point, but once the principles are solidified in your
    head and you are actively struggling / failing with your real world project —
    you will start to recognize patterns in everyday life.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这引出了我们的下一个观点，但一旦原理在你脑海中稳固下来，并且你正在积极地努力/失败于你的现实世界项目——你将开始在日常生活中识别出模式。
- en: Creating content brings an entirely new sense of enjoyment to life. Pattern
    recognition increases dopamine levels in the brain (because you are *hunting*
    for your survival). You start to recognize things you never have before — because
    they actually have a use case now.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 创作内容给生活带来了全新的乐趣。模式识别增加了大脑中的多巴胺水平（因为你正在*狩猎*以生存）。你开始认识到以前从未认识到的东西——因为它们现在实际上有用途了。
- en: You start to appreciate the depth that life has to offer when you have something
    to apply your everyday experiences to — writing content online.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 当你有一些可以应用你的日常经验的东西时，你开始欣赏生活所能提供的深度——比如在网上写内容。
- en: This all falls within the [Intelligent Imitation process](https://thedankoe.com/how-to-copy-your-way-to-success-instead-of-mediocrity/)
    — in short, immerse yourself in an environment conducive to your goals and relentlessly
    eliminate distractions that do not serve your development.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都属于[智能模仿过程](https://thedankoe.com/how-to-copy-your-way-to-success-instead-of-mediocrity/)——简而言之，沉浸在一个有利于你目标的环境中，并坚持不懈地消除那些不利于你发展的干扰。
- en: '**Side note:** my free [7 Days To Genius challenge](https://7daystogeniusideas.com)
    will help you study, dissect, and take notes on your interests in a way that is
    unique to you. This is how you come up with unlimited content ideas, 10X your
    creative output, and raise your consciousness by diving deeper into your Domain
    Of Mastery.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**旁白：**我的免费[7天成为天才挑战](https://7daystogeniusideas.com)将帮助你以独特的方式研究、剖析并记录你对兴趣的见解。这就是你如何产生无限的内容想法，将你的创造力提升10倍，并通过更深入地探索你的专长领域来提升你的意识。'
- en: The private community, Modern Mastery, will help you write engaging content,
    grow an audience, and monetize your knowledge (like you see other’s doing, but
    think they are any more experienced than you) — [Koe Letter readers can join for
    $5 here](http://www.modernmastery.co/community/modern-mastery-hq-special).
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 私人社区，现代掌握（Modern Mastery），将帮助你创作引人入胜的内容，扩大受众，并货币化你的知识（就像你看到其他人那样做，但认为他们比你更有经验）——[科伊信件读者可以在此加入，只需5美元](http://www.modernmastery.co/community/modern-mastery-hq-special)。
- en: The Experience Model
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 经验模型
- en: Ken Wilber — possibly the most conscious man alive — talks about developmental
    *states* and *stages.*
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 肯·威尔伯——可能是最清醒的人——谈论了发展**状态**和**阶段**。
- en: States are temporary.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 状态是暂时的。
- en: Stages are permanent (ish?).
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 阶段是永久的（或者说几乎是永久的）。
- en: You can have a high month in business — which is a state — but it may not be
    maintained month to month.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在商业上有一个高收入月份——这是一个状态——但它可能不会每月都保持。
- en: But, if you develop your business leverage to a point where it’s near impossible
    to dip under $20K a month, that is a stage.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，如果你将你的商业杠杆发展到几乎不可能每月收入低于2万美元的程度，那就是一个阶段。
- en: 'You can enter a flow state, or you can develop yourself to a point of being
    in a perpetual degree of flow (see: enlightenment).'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以进入心流状态，或者你可以发展到持续处于心流状态的程度（参见：开悟）。
- en: You can have a burst of creativity, or you can develop yourself to a point of
    having a baseline level of creativity.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以有一阵子的创造力爆发，或者你可以发展到拥有一个基本的创造力水平。
- en: This is true for most traits, skills, and domains of life.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这对大多数特质、技能和生活的领域都是真的。
- en: Let’s think of it like a video game.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们把它想象成一个视频游戏。
- en: You can get powerups and buffs — states that allow you to perform better temporarily.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以得到增强和加成——这些状态可以让你暂时表现得更好。
- en: Or you can increase your XP, add points to your talent tree, and unlock new
    stages of the game that you didn’t know existed at a lower level.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，你可以增加你的经验值（XP），为你的天赋树添加分数，解锁你不知道在低级阶段存在的游戏新阶段。
- en: This stresses the importance of self-development. It is not optional. If you
    want to make it in a world where low-skill labor jobs are consistently being phased
    out — [self-development, continuous skill acquisition, and mental expansion are
    not optional.](https://thedankoe.com/how-to-make-money-as-a-creative-on-the-internet/)
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 这强调了自我发展的重要性。这是不可避免的。如果你想在一个低技能劳动力工作不断被淘汰的世界中成功——[自我发展、持续技能获取和心智扩展是不可避免的。](https://thedankoe.com/how-to-make-money-as-a-creative-on-the-internet/)
- en: This is why I recommend “development” being one of the interests in your Domain
    Of Mastery.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是为什么我建议“发展”是你的掌握领域（Domain Of Mastery）中的一个兴趣点。
- en: Specifically cognitive or mental development.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 特别是认知或心理发展。
- en: Most of your problems stem from mental limitations and blockages.
  id: totrans-93
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你大部分的问题都源于心理局限和障碍。
- en: ''
  id: totrans-94
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you want to master all areas of life, mental mastery must be at the top of
    your list.
  id: totrans-95
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你想要掌握生活的所有领域，心理掌握必须排在你的首位。
- en: ''
  id: totrans-96
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [December 4, 2021](https://twitter.com/thedankoe/status/1467169084806778882?ref_src=twsrc%5Etfw)
  id: totrans-97
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2021年12月4日](https://twitter.com/thedankoe/status/1467169084806778882?ref_src=twsrc%5Etfw)
- en: 'One more thing before we move on:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们继续前进之前，还有一件事：
- en: When you max out a specific trait, do you just stop?
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 当你最大化一个特定的特质时，你就停止了吗？
- en: Of course not, you move on to the next trait and aim to max that one out as
    well.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 当然不是，你继续前进到下一个特质，并努力将其最大化。
- en: Not to mention, in order to max out any specific trait, you need to make *some*
    form of progress in related traits.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 更不用说，为了最大化任何特定的特质，你需要在相关的特质上取得某种形式的进步。
- en: This is why some unhealthy businessmen suffer. They are financially wealthy
    — but they lack the physical, mental, and spiritual wealth.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是为什么一些不健康的商人会遭受痛苦。他们在财务上很富有——但他们缺乏身体、心理和精神财富。
- en: This is also why some dictators are corrupt. They’ve surpassed multiple stages
    of development in communication and leadership — but their moral development lags
    behind significantly.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是为什么一些独裁者会腐败。他们在沟通和领导力的多个发展阶段上超越了——但他们的道德发展落后很多。
- en: Now, how does this all relate to business?
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这一切如何与商业相关？
- en: As you dive deeper into your Domain Of Mastery, it will demand a certain amount
    of cognitive development to reach the next “stage.”
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你深入你的掌握领域，它将要求你进行一定程度的认知发展以达到下一个“阶段”。
- en: When you reach this first stage, you are ready to start monetizing.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 当你达到这个第一阶段时，你就准备好开始货币化了。
- en: Your job is to help people reach that stage of development faster than you did
    with what you learned along the way.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 你的任务是帮助人们比你更快地达到这个发展阶段。
- en: You do this by [selling a creative solution](https://thedankoe.com/how-to-make-money-as-a-creative-on-the-internet/)
    that will help someone navigate your path in less time.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过[出售一个创意解决方案](https://thedankoe.com/how-to-make-money-as-a-creative-on-the-internet/)来实现这一点，这将帮助某人更快地导航你的道路。
- en: <picture decoding="async" class="wp-image-605">![](../Images/4cb358f849ef5ede17c10ff80c72a818.png)</picture>
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-605">![](../Images/4cb358f849ef5ede17c10ff80c72a818.png)</picture>
- en: The funny thing — by helping others reach that developmental stage that you
    have (whether it’s free or paid) you are forced to organize the information and
    make connections.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是——通过帮助他人达到你所在的发展阶段（无论是免费还是付费），你被迫组织信息并建立联系。
- en: This is why writing online is so powerful. You HAVE to struggle with organizing
    information (or ordering consciousness) to pass along to others.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么在线写作如此强大的原因。你必须努力组织信息（或整理意识）以便传达给他人。
- en: The teacher learns more than the student.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 教师比学生学到的东西更多。
- en: This will open up room to reach *your* next developmental stage faster.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 这将为你更快地达到下一个发展阶段腾出空间。
- en: When you have everything you’ve made sense of packaged up and hosted in the
    digital world — you don’t have to worry about it anymore. You get to build on
    top of it. Iteration.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 当你将你所理解的一切打包并托管在数字世界中——你再也不用担心它了。你可以在此基础上构建。迭代。
- en: By doing this consistently over a 2-3 year span, you will bust through new stages
    of development, help others get there, and gain a deep satisfaction for life in
    general.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在2-3年的时间里持续这样做，你将突破新的发展阶段，帮助他人达到那里，并在生活中获得深深的满足感。
- en: Discovering Your Life’s Work
  id: totrans-116
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 发现你的人生使命
- en: If you are reading this, I am assuming that you don’t *know* what your life’s
    work is.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在阅读这篇文章，我假设你不知道你的人生使命是什么。
- en: NOBODY can tell you what it is. NOBODY can tell you exactly how to find it.
    NOBODY can help you discover YOUR life’s work. This isn’t mine. This isn’t your
    professor’s. This isn’t your parents. This isn’t any other entity that is projecting
    its wants and needs onto you. It is up to you to embrace the *inevitable* uncertainty
    that comes with ‘forging your own path’ and picking up pieces of the ‘life’s work
    puzzle’ over years of exploration.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人能告诉你那是什么。没有人能告诉你如何确切地找到它。没有人能帮助你发现你的人生使命。这不是我的。这不是你教授的。这不是你父母的。这不是任何其他将它的欲望和需求投射到你身上的实体。这取决于你拥抱“锻造自己的道路”和多年探索中拼凑“人生使命拼图”的必然不确定性。
- en: I cannot give you a clear path to discovering it. That is the beauty in it.
    Only you can find it through consistent self-development, putting your message
    out into the world, and iterating on your creations until the perfect idea pops
    into your brain (just for you to continue iterating and refining what you *think*
    your life’s work is.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 我不能给你一个清晰的发现它的路径。这正是它的美。只有你通过持续的自我发展，将你的信息传播到世界上，并在你的创作上进行迭代，直到完美的想法突然出现在你的脑海中（只是为了你继续迭代和精炼你认为你的人生使命是什么）。
- en: However, there are a few questions you can begin contemplating to prime your
    brain.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，有一些问题你可以开始思考，以激发你的大脑。
- en: 'According to Joe Dispenza:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 根据乔·迪斯彭萨的说法：
- en: Contemplation builds the circuits in your brain in preparation for the experience.
  id: totrans-122
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 思考构建了你大脑中的电路，为体验做准备。
- en: Meaning, if you are intentional and actively expanding your awareness in search
    for your life’s work, you will find it. I “found” mine last year after outlining
    a book I’ve been wanting to write. I can’t explain the feeling.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 意思是，如果你有意识地积极扩展你的意识，寻找你的人生使命，你就能找到它。我“找到”我的使命是在去年，在我概述了一本我一直想写的书之后。我无法解释那种感觉。
- en: 'Until then, here are two questions to meditate on:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 在此之前，这里有两个问题供你冥想：
- en: What is the BIG problem you want to solve in the world? The one that keeps you
    up at night.
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你想在世界上解决什么大问题？那个让你夜不能寐的问题。
- en: What is the BIG problem you want to solve in your life? The one you know is
    holding you back.
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你想在生活中解决什么大问题？那个你知道在阻碍你的问题。
- en: If you want to take it a bit further — if you could have any question about
    the world answered and hand-delivered to you, what would that question be? Start
    there.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要更进一步——如果你能有一个关于世界的任何问题得到解答并亲手递送到你手中，那会是什么问题？从这里开始吧。
- en: This is how you develop yourself as a human.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何作为一个人发展自己。
- en: You start asking questions to uncover problems.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 你开始提问以揭示问题。
- en: You solve those problems through self-education and self-development.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过自我教育和自我发展来解决这些问题。
- en: You uncover problems that you can solve for others by pursuing your genuine
    curiosity (your Domain Of Mastery).
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过追求你真正的好奇心（你的精通领域）来发现你可以为他人解决的问题。
- en: Once you solve enough problems, you will reach new stages of development.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你解决了足够的问题，你将达到新的发展阶段。
- en: Now you can help people 1 stage under you navigate those same problems in a
    creative fashion.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可以帮助那些在你之下一个阶段的人以创造性的方式解决同样的问题。
- en: If you are able to stay on this path (once you start, it’s near impossible to
    stop) you will understand every aspect of this letter.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能够坚持这条道路（一旦开始，几乎不可能停止），你将理解这封信的每一个方面。
- en: 'Here are some problems I see people encounter that prevents their growth:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些我看到人们遇到的问题，这些问题阻碍了他们的成长：
- en: They don’t take themselves or their message seriously. They are too afraid of
    external judgement, it dilutes their message, and they get stuck in a developmental
    stage.
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们不认真对待自己或他们的信息。他们过于害怕外界的评判，这稀释了他们的信息，并且他们陷入了发展的某个阶段。
- en: They are too focused on the money. Which is fine at first, but given time leads
    to a lack of meaning and fulfillment in the work you’ve built yourself into. It
    becomes another 9-5 instead of your life’s work (work + life combined for a deeper
    satisfaction in the balance)
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们过于关注金钱。一开始这没问题，但随着时间的推移，会导致你在自己建立的工作中缺乏意义和满足感。它变成了另一种朝九晚五的工作，而不是你的人生事业（工作与生活的结合，以获得更深层次的满足感）
- en: They do not see the value in consistent self-development (or they refuse to
    develop critical aspects that hold other aspects behind). Hence limiting their
    personal, creative, and professional potential.
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们看不到持续自我发展的价值（或者他们拒绝发展那些支撑其他方面的重要方面）。因此限制了他们的个人、创造力和职业潜力。
- en: 'In summary:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 总结一下：
- en: Choose 3 interests that you are genuinely curious about.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 选择 3 个你真正感兴趣的领域。
- en: Begin studying them via books and online content from a congruent voice that
    you are excited to learn with.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 通过书籍和在线内容，从你兴奋想要学习的和谐声音开始研究它们。
- en: Build a real-world project and do not suppress the problems that come up. YOU
    will need to change at some point. You will lose some people and things from your
    life as your development demands.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 建立一个真实世界的项目，不要压制出现的问题。你将需要在某个时候改变。随着你的发展，你将失去生活中的一些人和事物。
- en: If you stay on the unconventional path for more than 6 months — you will understand
    on a deep, internal level that it is impossible to fail.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你坚持非传统的道路超过 6 个月——你将在深层次、内心深处理解失败是不可能的。
- en: — Dan Koe
