- en: The Truth About Money (And How To Make A Ton Of It)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-truth-about-money-and-how-to-make-a-ton-of-it/](https://thedankoe.com/letters/the-truth-about-money-and-how-to-make-a-ton-of-it/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Most people struggle with money.
  prefs: []
  type: TYPE_NORMAL
- en: That’s a fact.
  prefs: []
  type: TYPE_NORMAL
- en: Money is deeply intertwined with modern survival.
  prefs: []
  type: TYPE_NORMAL
- en: It impacts every single area of your life. Even if you aren’t thinking about
    money, you’re thinking about money. Your health depends on your money. The sanity
    of your relationships depends on a baseline amount of money.
  prefs: []
  type: TYPE_NORMAL
- en: You can say that that’s unfair and complain about how it should be different,
    but I heavily disagree.
  prefs: []
  type: TYPE_NORMAL
- en: I’m not here to tell you the truth of money was somehow “hidden” from you.
  prefs: []
  type: TYPE_NORMAL
- en: It’s your own fault you’re in this situation.
  prefs: []
  type: TYPE_NORMAL
- en: You didn’t question how you were raised, developed a terrible psychological
    relationship with money, and because of that you failed to understand that making
    money is a skill. You can make as much as you want, you just didn’t take the time
    to study, practice, and master that skill.
  prefs: []
  type: TYPE_NORMAL
- en: My goal for this letter is to install the right money programming in your head,
    as that’s the first step to making as much as you want.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what we’re going to talk about:'
  prefs: []
  type: TYPE_NORMAL
- en: Why money problems don’t exist but psychological problems do (and how to remove
    your scarcity mindset).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The difference between a job, career, and calling so you can earn an income
    doing what you want.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A new perspective on money, and how it’s your key to a fulfilling life (not
    the thing that’s preventing a fulfilling life).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A complete breakdown of how to make money in any economic situation, because
    making money is a skill.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Face it.
  prefs: []
  type: TYPE_NORMAL
- en: You want freedom.
  prefs: []
  type: TYPE_NORMAL
- en: Well, maybe not complete freedom… we humans love structure and limitations (or
    else we’d already be free because freedom is mental).
  prefs: []
  type: TYPE_NORMAL
- en: At a minimum, you want autonomy.
  prefs: []
  type: TYPE_NORMAL
- en: The ability to choose your limitations.
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this letter, you will have just that.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'Subtle reminder:'
  prefs: []
  type: TYPE_NORMAL
- en: We are rolling out access to Kortex as we speak.
  prefs: []
  type: TYPE_NORMAL
- en: Kortex is a second brain for writers, creators, and note-takers.
  prefs: []
  type: TYPE_NORMAL
- en: You can capture any idea, save any highlight or bookmark, create atomic notes,
    and reference any idea in one view all in an interconnected database.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you’re tired of saving ideas in random apps and losing all of your best
    ideas:'
  prefs: []
  type: TYPE_NORMAL
- en: '[>> Join the Kortex waitlist queue here.](https://kortex.co)'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The Average Money Mindset
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Money problems don’t exist. Psychological problems do.
  prefs: []
  type: TYPE_NORMAL
- en: Most people’s inability to make, keep, or smartly use money comes down to their
    beliefs, because your beliefs determine the opportunities you can notice *to*
    do those things.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a list of the average person’s beliefs around money:'
  prefs: []
  type: TYPE_NORMAL
- en: You believe money is hard to make.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You don’t believe money is a domain of mastery like health, relationships, or
    your work.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You may believe money is evil (because prior negative experiences programmed
    you).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You aren’t interested in starting a business because you only see the vocal
    surface of sleazy salesmen and long work hours.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You think everyone is trying to scam you, or that any non-mega corporation is
    a grifter (when they’re usually the independent businesses you say you support).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You are stuck in survival mode, so you don’t see the importance of self-development
    or business and feel the urge to write them off to feel better about your own
    actions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You don’t think you can make a lot of money in your field, which is just plain
    false if you can simply observe the top earners in your field (hint: they have
    a business).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Every single one of these limits how much you make.
  prefs: []
  type: TYPE_NORMAL
- en: If you believe money isn’t a skill, you won’t learn that skill.
  prefs: []
  type: TYPE_NORMAL
- en: If you believe money is evil, you will be repulsed by the thought of making
    more (even if it’s your only way out of your self-induced chaos).
  prefs: []
  type: TYPE_NORMAL
- en: Your perception of money is determined by your level of development.
  prefs: []
  type: TYPE_NORMAL
- en: I have a concept of mine called the **Levels Of Purpose.**
  prefs: []
  type: TYPE_NORMAL
- en: The solution to your money problems (psychological problems) is to advance through
    each level.
  prefs: []
  type: TYPE_NORMAL
- en: The purpose of money changes as you develop yourself. It starts as a way to
    survive, becomes a method to acquire status, which leads to a desire for autonomy,
    then becomes a fuel for creativity and expression, then finally transforms into
    a way to help others advance through similar stages – related to money or not.
  prefs: []
  type: TYPE_NORMAL
- en: Those are the levels. Survival, status, autonomy, creativity, and contribution.
  prefs: []
  type: TYPE_NORMAL
- en: Survival
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Every belief we listed above is pursuing the goal and purpose of survival.
  prefs: []
  type: TYPE_NORMAL
- en: Your main purpose is what determines how you perceive situations. You won’t
    notice a money-making opportunity in the survival stage because your attention
    is solely consumed by the house, the mortgage, being tired from your job, the
    relationship problems that splinter off because of those, and barely having enough
    money to think.
  prefs: []
  type: TYPE_NORMAL
- en: You take any job you can get because you have to survive. And at this point
    in your life, when your goals are the product of your conditioning, you don’t
    have many options for work you enjoy.
  prefs: []
  type: TYPE_NORMAL
- en: You escape the survival stage by becoming deeply aware of how your beliefs are
    holding you back. How they create a ripple effect of destruction in your life.
  prefs: []
  type: TYPE_NORMAL
- en: Then, you orient your focus toward solving the problems that reveal themselves,
    which at this stage, is almost always just “making more money.” And that’s okay.
    I would argue it’s necessary. You’re in this stage because you ignore – and potentially
    despise – the need for it.
  prefs: []
  type: TYPE_NORMAL
- en: Status
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As we’ve discussed recently, there’s never been a time in history where weak,
    average, or mindless people weren’t treated like cattle. It can be infuriating
    that the only people who do well in society were those who gained power and influence.
  prefs: []
  type: TYPE_NORMAL
- en: You reach the status stage when (1) you have a sense of security around money
    and (2) you realize the need for others to perceive you as valuable.
  prefs: []
  type: TYPE_NORMAL
- en: You cultivate a skill set that allows you to get a better job or start a business.
    That job allows you to pay the bills, focus on other areas of your life, and make
    moderate to extravagant superficial purposes.
  prefs: []
  type: TYPE_NORMAL
- en: Many non-critical thinkers see this as bad, but they don’t understand perception
    or psychology. Humans must notice the surface before they notice the depth. I
    don’t care how “great of a personality” you have. People *do* care about looks
    before deciding to get into a relationship with them.
  prefs: []
  type: TYPE_NORMAL
- en: Creativity
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once you’ve achieved some level of status, your mind will start to transform.
  prefs: []
  type: TYPE_NORMAL
- en: You’ll begin to realize all of your mistakes.
  prefs: []
  type: TYPE_NORMAL
- en: Those mistakes are new problems to solve. A new purpose to pursue.
  prefs: []
  type: TYPE_NORMAL
- en: You may even feel the need to reject everything you’ve acquired.
  prefs: []
  type: TYPE_NORMAL
- en: You won’t find the same joy you used to in those superficial pursuits.
  prefs: []
  type: TYPE_NORMAL
- en: The money gets old. The sleeping around gets old. The cars and watches get old.
  prefs: []
  type: TYPE_NORMAL
- en: That doesn’t mean everything you did was a waste. You have a vast vat of experience
    to pull from and pass down to others.
  prefs: []
  type: TYPE_NORMAL
- en: You’ll start to crave autonomy. You’ll realize how slow the progression becomes
    as you advance higher in the status game and want to take on harder challenges.
  prefs: []
  type: TYPE_NORMAL
- en: At this point, your focus must shift to developing a philosophical sense of
    mastery around a few pursuits.
  prefs: []
  type: TYPE_NORMAL
- en: For bodybuilders, going to the gym starts as a pursuit to feel good about themselves.
    After a few years, they either quit or reorient toward a new, deeper destination
    that makes the journey more meaningful. They find joy in feeling good from healthy
    food. They have such a deep understanding of how their health choices impacts
    their future. They gain fulfillment from the process of making tiny improvements
    in the gym.
  prefs: []
  type: TYPE_NORMAL
- en: This is the creativity stage.
  prefs: []
  type: TYPE_NORMAL
- en: In the status stage, much of what you learn and do will be from what others
    teach you. What you absorbed to learn from others.
  prefs: []
  type: TYPE_NORMAL
- en: In the creativity stage, you take your expanded knowledge and begin to create
    your own way of doing things.
  prefs: []
  type: TYPE_NORMAL
- en: You’ve tried different training programs, business models, and coping strategies
    to the point of realizing the patterns and principles between them all. You’ve
    unlocked a level of mind that allows you to navigate with grace between them.
  prefs: []
  type: TYPE_NORMAL
- en: Your job in the creativity stage is to simply create.
  prefs: []
  type: TYPE_NORMAL
- en: Break free from the dogmas and ideologies and processes you’ve adopted from
    others. Build novel solutions from scratch. This sets you up nicely for the contribution
    stage.
  prefs: []
  type: TYPE_NORMAL
- en: Contribution
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With a combination of a high-value skill set and enough creative experimentation,
    you realize that you can deeply impact others’ lives and feel the pull to do so.
  prefs: []
  type: TYPE_NORMAL
- en: You feel a deep desire to *share* the things that have improved your life.
  prefs: []
  type: TYPE_NORMAL
- en: You begin to see life from a new perspective and wonder why others are constantly
    distracted with menial things. You can see where their life is heading, but they
    can’t.
  prefs: []
  type: TYPE_NORMAL
- en: The contribution stage is where the used-to-be separate domains of your life
    collapse into one.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t see work as somewhere that you clock in and clock out.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t see rest as a treat that you can only indulge in once work is done.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t see play as a hobby that lasts 30 minutes at night if you have the
    time to do it.
  prefs: []
  type: TYPE_NORMAL
- en: You see all of them as necessary counterbalances to one another.
  prefs: []
  type: TYPE_NORMAL
- en: Work, rest, and play become difficult to distinguish.
  prefs: []
  type: TYPE_NORMAL
- en: Rest becomes a way to regenerate your creative ability for your work. Play becomes
    what you do for work. Work is so deeply integrated with your life that anything
    you do can be passed down in the form of products or information.
  prefs: []
  type: TYPE_NORMAL
- en: Your entire life begins to revolve around how you can best contribute to the
    world.
  prefs: []
  type: TYPE_NORMAL
- en: You become a perspective vessel for reality. You make sense of the world from
    your mind and pass that perspective down for others to adopt and benefit from.
  prefs: []
  type: TYPE_NORMAL
- en: You hunt for and gather information, synthesize it with your experience, and
    distribute it to those who want to benefit from it.
  prefs: []
  type: TYPE_NORMAL
- en: You become less of a leech. You don’t only consume and take from reality for
    your selfish personal gain, but you create, share, and contribute back to the
    world.
  prefs: []
  type: TYPE_NORMAL
- en: 'A few last notes about these levels:'
  prefs: []
  type: TYPE_NORMAL
- en: They reset when you start a business. When you quit your job to start your business,
    you’re back in survival mode. You need status to acquire the right connections
    and resources. You begin to crave autonomy from things like client work and tasks
    you can delegate. You free up mental energy to be creative. Eventually, you will
    realize that your main purpose is to help other people.
  prefs: []
  type: TYPE_NORMAL
- en: These levels of purpose follow the “transcend and include” law. You never “escape”
    the survival stage, you simply integrate it. You leverage it.
  prefs: []
  type: TYPE_NORMAL
- en: The Art Of Living Is Getting Paid To Play
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Sensible people get paid to do what they enjoy. – Alan Watts
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We have been conditioned since birth to work for everyone but ourselves.
  prefs: []
  type: TYPE_NORMAL
- en: We are given assignments, paths that have already been trodden.
  prefs: []
  type: TYPE_NORMAL
- en: We work on these assignments without struggle or conscious thought, leading
    to a mechanical and replaceable role in a society filled to the brim with people
    who try to prove their happiness to hide their internal misery.
  prefs: []
  type: TYPE_NORMAL
- en: We don’t know any better because all we know is what we’ve been told.
  prefs: []
  type: TYPE_NORMAL
- en: We are told to read books we don’t care about to complete projects we don’t
    care about to prepare ourselves for a life we don’t care about. Before you know
    it, you are trapped in a dense cloud of responsibilities. The resources – time,
    energy, and money – that could be used to change your life are exhausted like
    clockwork, so you have no choice but to remain a productive robot as society’s
    plan for you intended.
  prefs: []
  type: TYPE_NORMAL
- en: '*If you hate your work, and it comprises one-third of your life, and it drains
    your energy to enjoy the other third, and you are asleep the other third, there
    doesn’t seem to be a higher priority than to create, build, design, write, sell,
    invest, own, experiment, and discover a way to control what you do with your day.*'
  prefs: []
  type: TYPE_NORMAL
- en: '**What you will discover on your path to purposeful money is the difference
    between a job, a career, and a calling.**'
  prefs: []
  type: TYPE_NORMAL
- en: A job is some unpleasant work you do for someone else for the sole purpose of
    making money.
  prefs: []
  type: TYPE_NORMAL
- en: A job is a survival mechanism.
  prefs: []
  type: TYPE_NORMAL
- en: A job is one milestone on the path to living up to those who shaped your mind.
  prefs: []
  type: TYPE_NORMAL
- en: A job is similar to schools from the perspective that good marketing can make
    up for a bad product.
  prefs: []
  type: TYPE_NORMAL
- en: After centuries of failing to get results, they’re still alive and well for
    the simple reason that very few people go through the trouble of thinking for
    themselves. Most people do what most people do. Most people aren’t okay with the
    results of most people, but by that point, it’s much harder to escape.
  prefs: []
  type: TYPE_NORMAL
- en: A career is a commitment to development in your work.
  prefs: []
  type: TYPE_NORMAL
- en: A career demands that you pursue a hierarchy of challenging roles and tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Psychologically, this brings long-term order and clarity to your mind.
  prefs: []
  type: TYPE_NORMAL
- en: With each level of challenge, life becomes more complex and interesting. New
    paths for knowledge and skill acquisition become apparent. If you want to progress
    further in a career, to an extent, you have to have your life together.
  prefs: []
  type: TYPE_NORMAL
- en: A calling is work you can’t pull yourself away from and others can’t help but
    pay you for.
  prefs: []
  type: TYPE_NORMAL
- en: A calling can’t be assigned to you.
  prefs: []
  type: TYPE_NORMAL
- en: A calling cannot be pursued under the orders of another.
  prefs: []
  type: TYPE_NORMAL
- en: A calling cannot be defined by a set amount of working hours because your mind
    is always working on it.
  prefs: []
  type: TYPE_NORMAL
- en: A calling is found at the point where improvement turns into obsession.
  prefs: []
  type: TYPE_NORMAL
- en: A calling is something others won’t understand. Something that must be cared
    for, protected, and maintained by the one pursuing it, like a gift that others
    could accidentally steal.
  prefs: []
  type: TYPE_NORMAL
- en: A job is not a career or calling, but a career and calling are both jobs. A
    career is not a calling, but a calling is a career.
  prefs: []
  type: TYPE_NORMAL
- en: Jobs are great for young people who don’t know what they want or simply need
    to survive.
  prefs: []
  type: TYPE_NORMAL
- en: Careers are great for those who want a bit more satisfaction in life, because
    they understand the need for challenging work as a forcing function for self-development.
  prefs: []
  type: TYPE_NORMAL
- en: A calling is for those who know they are meant for more.
  prefs: []
  type: TYPE_NORMAL
- en: The select few who are willing to take the plunge into the unknown and take
    full responsibility for the outcome of their life.
  prefs: []
  type: TYPE_NORMAL
- en: It’s a sad reality that the term work is now perceived as a curse. When the
    average person thinks about work, their mind floods with familiar pasts and predictable
    futures of stress, overwhelm, and anxiety.
  prefs: []
  type: TYPE_NORMAL
- en: When you are at work, you crave to be at rest. When you are at rest, you eventually
    crave to be at work. A disastrous cycle of never feeling like you are where you
    want to be.
  prefs: []
  type: TYPE_NORMAL
- en: Your mind is anywhere but the present moment.
  prefs: []
  type: TYPE_NORMAL
- en: People dream of the perpetual vacation we call retirement, but once they achieve
    that delusion, it normalizes as everything does.
  prefs: []
  type: TYPE_NORMAL
- en: Within a few weeks, you can’t help but want to balance being with doing.
  prefs: []
  type: TYPE_NORMAL
- en: It should be considered your full-time job to create work that feels like play.
  prefs: []
  type: TYPE_NORMAL
- en: To escape the narrow view that work is bad and money is evil.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you’re stuck in a job or nearing the top of your career ladder, there is
    one thing that will launch you into your next phase:'
  prefs: []
  type: TYPE_NORMAL
- en: Realizing that money is much, much more spiritual than you think.
  prefs: []
  type: TYPE_NORMAL
- en: Money Is More Spiritual Than You Think
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We work and work and work until we earn enough to rest all to find ourselves
    unsatisfied with how much we have and how little we are.
  prefs: []
  type: TYPE_NORMAL
- en: We drown in survival mode.
  prefs: []
  type: TYPE_NORMAL
- en: We never succeed in seeing beyond the responsibilities we were assigned and
    accepted without question.
  prefs: []
  type: TYPE_NORMAL
- en: Wake up, go to work, deal with the boss, eat convenient foods because you don’t
    have the time, skip the good habits you promised yourself you would do because
    you don’t have the energy, watch your life slowly crash as your mind, body, and
    relationships unravel into chaos, and do nothing about it because it’s the only
    life you know.
  prefs: []
  type: TYPE_NORMAL
- en: Realize that work is a necessary part of life.
  prefs: []
  type: TYPE_NORMAL
- en: Work is about solving problems.
  prefs: []
  type: TYPE_NORMAL
- en: Humans love to solve problems, but not just any problem, problems we deem meaningful
    and interesting.
  prefs: []
  type: TYPE_NORMAL
- en: The right problems narrow our attention and allow us to forget our worries.
  prefs: []
  type: TYPE_NORMAL
- en: The wrong problems enslave our attention and amplify our worries.
  prefs: []
  type: TYPE_NORMAL
- en: The difference between the two is that one is chosen, and the other is assigned.
    Problems are the limits on your mind and potential. Once solved, they allow for
    growth, expansion, and evolution.
  prefs: []
  type: TYPE_NORMAL
- en: Money itself is a beautiful invention.
  prefs: []
  type: TYPE_NORMAL
- en: It has allowed us to transcend our survival through value exchange.
  prefs: []
  type: TYPE_NORMAL
- en: We each have problems that we value solving. So we solve them and soon have
    the desire to help someone solve them to. But since some people don’t have the
    time, skill, or desire, the invention of money allows them to have a different
    resource to solve the problem with (or at least make it much easier to solve).
  prefs: []
  type: TYPE_NORMAL
- en: So, if problems are the limits on your potential… the things that prevent you
    from reaching your next level of purpose, then money is a tool to achieve your
    potential.
  prefs: []
  type: TYPE_NORMAL
- en: Now, purpose doesn’t exist without problems.
  prefs: []
  type: TYPE_NORMAL
- en: By solving a problem, you pursue a purpose. You discover your part in something
    greater than yourself. That’s what spirituality is. Discovering your part in the
    whole, transcending that whole to the next, and then the next until you reach
    your life’s purpose of contribution.
  prefs: []
  type: TYPE_NORMAL
- en: Most people in business are trapped in the survival and status stage.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why you see them as unspiritual.
  prefs: []
  type: TYPE_NORMAL
- en: But business is simply a legal structure to distribute value. Not all businesses
    are evil, but not starting your own ensures that the evil ones thrive.
  prefs: []
  type: TYPE_NORMAL
- en: When you are in the survival or status stage, by not starting a business, you
    are bound to unconsciously contribute to the businesses you deem as evil by working
    for a corporation that sickens the masses.
  prefs: []
  type: TYPE_NORMAL
- en: To wrap this up, if your life’s purpose is to contribute to humanity, pursuing
    your calling (not a job or career as an endpoint) is a part of that. And your
    calling will almost always be pursued with your own business.
  prefs: []
  type: TYPE_NORMAL
- en: Making Money Is A Skill, Not Luck
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Making money is not about luck.
  prefs: []
  type: TYPE_NORMAL
- en: We’re far beyond that silly belief.
  prefs: []
  type: TYPE_NORMAL
- en: We don’t live in that world anymore.
  prefs: []
  type: TYPE_NORMAL
- en: Luck is a concept used to describe a lack of understanding of a system.
  prefs: []
  type: TYPE_NORMAL
- en: If you understand the system of making money, you can make it at will (considering
    you actually learn the skills).
  prefs: []
  type: TYPE_NORMAL
- en: Here’s exactly what you need to understand to make as much money as you want.
  prefs: []
  type: TYPE_NORMAL
- en: 1) Understand the psychology of one person, preferably yourself.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Where does money come from?
  prefs: []
  type: TYPE_NORMAL
- en: I’m not talking about how the government prints it.
  prefs: []
  type: TYPE_NORMAL
- en: I’m talking about *how does it get into your hands?*
  prefs: []
  type: TYPE_NORMAL
- en: Someone gives it to you.
  prefs: []
  type: TYPE_NORMAL
- en: That’s the answer.
  prefs: []
  type: TYPE_NORMAL
- en: Whether it comes from a consumer or a business, somebody makes the decision
    to hand you money because they *see what you have to offer as valuable.*
  prefs: []
  type: TYPE_NORMAL
- en: The first step to creating something worth paying for is to understand the psychology
    of one person. Value is perception.
  prefs: []
  type: TYPE_NORMAL
- en: One man’s trash is another man’s treasure.
  prefs: []
  type: TYPE_NORMAL
- en: Many people will see what you offer as trash.
  prefs: []
  type: TYPE_NORMAL
- en: But you don’t see it that way, and there are hundreds of thousands of people
    like you.
  prefs: []
  type: TYPE_NORMAL
- en: Build a product for yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Market to yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Write to yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Attract people like you, because that’s who you can help the most.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Create a solution to a biological, personal, professional, or social problem.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most businesses fail because they try to solve a problem they haven’t experienced.
  prefs: []
  type: TYPE_NORMAL
- en: They spin up some fancy startup idea in their head, and then justify their failure
    with a dumb statistic like “99% of startups fail.”
  prefs: []
  type: TYPE_NORMAL
- en: If you pigeon-hole yourself into a narrow niche and problem you don’t have experience
    with, there isn’t really a path out of that. This is why I recommend [becoming
    the niche](https://thedankoe.com/letters/how-to-create-your-niche-of-one-become-nicheless/),
    because your business is only limited by your ability to develop yourself. Your
    products evolve as you do.
  prefs: []
  type: TYPE_NORMAL
- en: You build an audience around your name. You test ideas with content. You turn
    those best ideas into products. You improve your products or create new ones until
    it succeeds. You can’t really fail if you are the business, because you’re in
    full control of your improvement.
  prefs: []
  type: TYPE_NORMAL
- en: The best path for a beginner to take is one that is accessible and low-cost.
  prefs: []
  type: TYPE_NORMAL
- en: In the age of the internet, that means digital products and services.
  prefs: []
  type: TYPE_NORMAL
- en: 'For people who don’t know how to code, that means:'
  prefs: []
  type: TYPE_NORMAL
- en: Courses
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Coaching
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Templates
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Workshops
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Live events
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Etc
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: My favorite type of education product is a course curriculum paired with worksheets
    or resources that you can build inside of Notion or [Kortex](https://kortex.co).
  prefs: []
  type: TYPE_NORMAL
- en: You can build these products fast.
  prefs: []
  type: TYPE_NORMAL
- en: You can test whether they will do well or not by writing content and studying
    how well people engage with it.
  prefs: []
  type: TYPE_NORMAL
- en: From there, if the product does well, you can enjoy the high profit margins
    for as long as you want or turn it into another business.
  prefs: []
  type: TYPE_NORMAL
- en: Like how 2 Hour Writer turned into Kortex because Notion didn’t cut it for me
    as a writer.
  prefs: []
  type: TYPE_NORMAL
- en: But what do you build the product around?
  prefs: []
  type: TYPE_NORMAL
- en: A problem you’ve solve in your life.
  prefs: []
  type: TYPE_NORMAL
- en: What is a domain of life you’ve mastered?
  prefs: []
  type: TYPE_NORMAL
- en: What do you love to study and learn about?
  prefs: []
  type: TYPE_NORMAL
- en: What skills have you acquired that helped you live a better life or get a better
    career?
  prefs: []
  type: TYPE_NORMAL
- en: '*Build a product around that.*'
  prefs: []
  type: TYPE_NORMAL
- en: Teach people everything they need to now to reach the same goals you have.
  prefs: []
  type: TYPE_NORMAL
- en: If you need help, research what other people like you are selling.
  prefs: []
  type: TYPE_NORMAL
- en: Could you create the same thing, but better?
  prefs: []
  type: TYPE_NORMAL
- en: 3) Build, borrow, or buy an audience comprised of people with the same psychology
    and problem.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You have something that people want. Now you need the people side of that equation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Most beginners fall into the trap of building a website, perfecting their product,
    forming an LLC, and the rest but never get around to the most important part:'
  prefs: []
  type: TYPE_NORMAL
- en: Customers.
  prefs: []
  type: TYPE_NORMAL
- en: There are 3 types of distribution.
  prefs: []
  type: TYPE_NORMAL
- en: Built, borrowed, and bought.
  prefs: []
  type: TYPE_NORMAL
- en: You build distribution on something like social media and an email list. This
    is something you own and can promote your value to at any time. It is the highest
    leverage of the bunch.
  prefs: []
  type: TYPE_NORMAL
- en: You borrow distribution by networking with other people. Showing up as a podcast
    guest and getting thousands of eyes on you. Writing guest newsletters for people
    with large lists. Posting on forum sites or communities. Etc.
  prefs: []
  type: TYPE_NORMAL
- en: You buy distribution with sponsorships and advertisements. Podcast sponsorships,
    newsletter sponsorships, Google ads, Facebook ads, YouTube ads, etc.
  prefs: []
  type: TYPE_NORMAL
- en: In an optimal world, you would do all of them. But you only have so much time
    on your hands and so much money to hire other people (if you even want to do that).
  prefs: []
  type: TYPE_NORMAL
- en: In my eyes, the best option for a beginner is to *build* an audience.
  prefs: []
  type: TYPE_NORMAL
- en: Why?
  prefs: []
  type: TYPE_NORMAL
- en: Because it’s free to start.
  prefs: []
  type: TYPE_NORMAL
- en: Because you have to learn how to capture attention and persuade. You have to
    learn the skills that *will make your borrowed and bought distribution a success.*
  prefs: []
  type: TYPE_NORMAL
- en: And of course, you get to keep the audience. They follow you for you. You can
    be more authentic and purposeful.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to learn how to do this, watch my [One Person Business playlist
    on YouTube](https://youtube.com/playlist?list=PLB4ePXk6nBaeG3fD13NaRMsRsEc2iCsV4&si=WO--tXj7Ld284oii),
    or consider purchasing [2 Hour Writer](https://2hourwriter.com) (writing is how
    you build an audience).
  prefs: []
  type: TYPE_NORMAL
- en: 4) Systemize the promotion and delivery of the solution to that audience.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: People will ask me why they aren’t making money with their creative work.
  prefs: []
  type: TYPE_NORMAL
- en: 99% of the time they stopped doing the things that made them money in the first
    place.
  prefs: []
  type: TYPE_NORMAL
- en: They stopped promoting.
  prefs: []
  type: TYPE_NORMAL
- en: They stopped *trying* to get customers.
  prefs: []
  type: TYPE_NORMAL
- en: They didn’t create a repeatable weekly system that they can test and improve.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s an example for a creator business:'
  prefs: []
  type: TYPE_NORMAL
- en: Promote your product, service, lead magnet, or newsletter every single day under
    one post. This can be in the comments of that post or in your story.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Send a weekly newsletter and promote your product or service once in there.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Actively talk to 5-10 people a week in your DMs about your product.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, you have social media traffic going to your products and email list.
  prefs: []
  type: TYPE_NORMAL
- en: Your email list provides value and promotes your products.
  prefs: []
  type: TYPE_NORMAL
- en: Once that is set, all you have to do is worry about growing your audience and
    email list.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, you can also launch new products to see a substantial spike in sales
    and give more options to your audience (because one product will only benefit
    a certain part of that audience).
  prefs: []
  type: TYPE_NORMAL
- en: I’ve talked about this in [Zero To $1 Million As A One-Person Business.](https://thedankoe.com/letters/zero-to-1-million-as-a-one-person-business-while-working-2-4-hours-per-day/)
  prefs: []
  type: TYPE_NORMAL
- en: 5) Iterate and persist.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To recap on how to make as much money as you want:'
  prefs: []
  type: TYPE_NORMAL
- en: Understand your own mind so you can market to someone that is similar to you.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Turn the skills, knowledge, and interests that benefit your life into an education
    product.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Distribute that product to an audience that you build with content and writing.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create a weekly system to ensure that your audience sees your product.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That’s it.
  prefs: []
  type: TYPE_NORMAL
- en: That’s all you need to make as much money as you want.
  prefs: []
  type: TYPE_NORMAL
- en: The final piece of the puzzle is the delicate balance of iteration and persistence.
    This is where most people fail.
  prefs: []
  type: TYPE_NORMAL
- en: There are 4 points above.
  prefs: []
  type: TYPE_NORMAL
- en: Each of those points provide data.
  prefs: []
  type: TYPE_NORMAL
- en: If something isn’t working, you need to test something new.
  prefs: []
  type: TYPE_NORMAL
- en: Test new marketing angles (use personal experience to market how your product
    changed your own life) and gauge the response.
  prefs: []
  type: TYPE_NORMAL
- en: Test how effective your product is at solving the problem in others lives. Improve
    it until people can’t stop talking about it.
  prefs: []
  type: TYPE_NORMAL
- en: Test the ideas, content, and strategies you use to build an audience. If you
    aren’t growing, it’s because you haven’t done this. Your skill isn’t high enough.
  prefs: []
  type: TYPE_NORMAL
- en: Test how, when, and how often you promote your product each week until you make
    the amount of sales you want.
  prefs: []
  type: TYPE_NORMAL
- en: This whole business thing doesn’t stop when you decide on one marketing angle,
    one product, one strategy for audience growth, and one way to promote.
  prefs: []
  type: TYPE_NORMAL
- en: You can’t fail if you have all of the right pieces and experiment until they
    work.
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading this letter.
  prefs: []
  type: TYPE_NORMAL
- en: I hope it helped.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
