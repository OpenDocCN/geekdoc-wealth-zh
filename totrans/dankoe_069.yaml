- en: Get Mad At Where You Are In Life (To Get Ahead Of 99% Of People)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 对你生活中的现状感到愤怒（为了超越99%的人）。
- en: 原文：[https://thedankoe.com/letters/get-mad-at-where-you-are-in-life-to-get-ahead-of-99-of-people/](https://thedankoe.com/letters/get-mad-at-where-you-are-in-life-to-get-ahead-of-99-of-people/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/get-mad-at-where-you-are-in-life-to-get-ahead-of-99-of-people/](https://thedankoe.com/letters/get-mad-at-where-you-are-in-life-to-get-ahead-of-99-of-people/)
- en: The best periods of my life always came after a period of getting absolutely
    fed up with the lack of progress I was making.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我生命中最美好的时光总是在我完全厌倦了取得的进展不足之后。
- en: I’ve begun to understand the difference between “relief” and “cure.”
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我开始理解“缓解”和“治愈”之间的区别。
- en: Relief feels good.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 缓解感觉良好。
- en: It comes in the form of cheap pleasures, mindless entertainment, and prescriptions.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 它以廉价快乐、无脑娱乐和处方药的形式出现。
- en: Humans fear change.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 人类害怕改变。
- en: So we cling to the illusion of security that is presented by the external world.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们紧紧抓住外部世界所呈现的安全感的幻觉。
- en: The advice.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 建议也是如此。
- en: The porn, beyond sex.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 超越性别的色情。
- en: The promises of a better life.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 更好生活的承诺。
- en: The persuasive marketing angles.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 有说服力的营销角度。
- en: The things that may provide a sense of security, but are not of your own understanding.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 可能提供安全感的事物，但不是你自己的理解。
- en: A cure is painful.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 治愈是痛苦的。
- en: It comes in the form of getting sick of being sick, to the point where you come
    full circle.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 它以厌倦生病，最终达到完全翻转的形式出现。
- en: By full circle, I mean a complete and radical flip in perception.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我的意思是，一个完整的、彻底的感知翻转。
- en: Imagine a line colored in a black-to-white gradient with shades of gray in the
    middle.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一条从黑色到白色的渐变线，中间有灰色调。
- en: Then, connect the ends of that line together so that black and white touch.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，将这条线的两端连接起来，使黑色和白色相接触。
- en: We can see this pattern of reality in our everyday life.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以在日常生活中看到这种现实模式的例子。
- en: A person so stupid they become insightful.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 一个如此愚蠢的人，反而变得有洞察力。
- en: An outfit so unstylish it becomes stylish.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 一套如此不时髦的衣服，反而变得时髦。
- en: A joke so unfunny that it becomes funny.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 一个如此不好笑的笑话，反而变得好笑。
- en: A non-believer so trapped they become a believer.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 一个不信者如此被束缚，以至于他们变成了一个信徒。
- en: Or, a person so fed up with who they are they become an entirely new person.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，一个人对现状如此厌倦，以至于他们变成了一个完全不同的人。
- en: Character Begets Action
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 性格孕育行动。
- en: '*Identity restricts perspective.*'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '*身份限制视角*。'
- en: It provides a boundary so that your thoughts don’t fall into unknown territory
    and threaten your entire existence.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 它提供了一个边界，这样你的思想就不会落入未知领域，威胁到你的整个存在。
- en: '*Perspective influences perception.*'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '*视角影响感知*。'
- en: Any given situation has too much information for the conscious mind to process
    (we are capable of processing around 50 bits of information per second).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 任何给定的情况都有太多信息，以至于意识无法处理（我们每秒可以处理大约50比特的信息）。
- en: The identity, or character, you’ve cultivated with time will limit what information
    you process that is available to the perspective that you have access to.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 你随着时间的推移培养出的身份或性格将限制你可以处理的信息，这些信息是你能够接触到的视角。
- en: From that information, you will interpret it differently from everyone else.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 从那个信息中，你将与其他人不同地解释它。
- en: I can ask you to think of a “bird,” and the image that pops into your head will
    be different from every other human on this planet.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以让你想一个“鸟”，你脑海中浮现的图像将不同于这个星球上的任何其他人类。
- en: Some will think of a cardinal, others a blue jay, both with faint lines forming
    the image in your head. Yet the underlying essence of *what a bird is* remains
    the same.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人会想到红雀，其他人会想到蓝松鸦，两者都有微弱的线条在你的脑海中形成图像。然而，*鸟是什么*的潜在本质是相同的。
- en: The same is true for something like the concept of God. People go to war over
    interpretation and “proof” when the *experience* or *essence* of what the concept
    points at is the same, and it’s right in front of you but conditioned thoughts
    prevent you from seeing beyond the surface.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 对于像上帝这样的概念，人们会为了解释和“证据”而发动战争，而当概念所指的经验或本质是相同的，它就在你面前，但条件化的思想阻止你看到表面之下。
- en: Speaking of something as touchy as God, let’s tie in the example of Christ Consciousness.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 当说到像上帝这样敏感的话题时，让我们结合基督意识的例子。
- en: The identity of Christ was expanded to that of *everything* that his perspective
    expanded with it.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 基督的身份被扩展到他的视角所扩展的*一切*。
- en: He could perceive situations holistically and see them for what they are.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 他能够整体地感知情况，并看到它们本来的样子。
- en: I am not here to lecture you on religion or ideology or dogma because that is
    the exact opposite of what I am pointing to here. *Be careful how your rigid identity
    influences how you perceive these words (because I’ve been the dude that regurgitates
    blind “facts,” judging what I haven’t experienced as if it couldn’t possibly be
    there).*
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是来向你宣讲宗教、意识形态或教条的，因为这正是我这里所指的反面。*小心你的僵化身份如何影响你对这些话的理解（因为我曾经是那个盲目重复“事实”的家伙，把我没有经历过的事情当作不可能存在的东西来评判）。*
- en: I do not subscribe to one perspective, but attempt to integrate truths from
    all into my worldview. I am nowhere near perfect in this, but it is hard to deny
    that everyone is pointing at the same thing across every cultural belief system.
    The meaningful dopamine you reap from pattern recognition in studying different
    perspectives is a sign that you are heading in the right direction.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我不认同任何一种观点，而是试图将所有真理整合到我的世界观中。我在这一点上远未完美，但很难否认，每个文化信仰体系都在指向同一个东西。你在研究不同观点时从模式识别中获得的具有意义的多巴胺是一个迹象，表明你正在朝着正确的方向前进。
- en: '*Perception influences how you move within the world.*'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '*感知影响你在世界中的行动方式。*'
- en: People that are heavily tied to a religious, nutrition, business, or political
    ideology will almost always act in alignment with the goals that were assigned
    to them by that intellectual construct.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 与宗教、营养、商业或政治意识形态紧密相连的人几乎总是会按照由该意识形态结构分配给他们的目标行动。
- en: People that seek to open their mind to awareness and understanding can make
    decisions that are conducive to their ideal future.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求打开心扉，获得意识和理解的人可以做出有利于他们理想未来的决定。
- en: Action is directed toward a goal. Always.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 行动总是指向一个目标。
- en: Your identity has goals baked into it.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 你的身份中已经内置了目标。
- en: The question is whether or not those goals are self-generated or assigned to
    you by the external.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是这些目标是否是自我产生的，还是由外部分配给你的。
- en: A political ideologue that adopted the beliefs of their parents without question
    will act toward goals assigned to them by the political party.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 一个不加质疑就接受父母信念的政治意识形态者会朝着由政党分配给他们的目标行动。
- en: A bodybuilder by passion and self-study will generate their own goals and allow
    their nutrition, lifestyle, and training to fall in alignment with that goal –
    else they experience suffering, which is not bad, but a useful compass toward
    better.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 一个由热情和自学成才的健美运动员会设定自己的目标，并让他们的营养、生活方式和训练与该目标保持一致——否则他们会经历痛苦，这不是坏事，但是一个有用的指南，指向更好的方向。
- en: Character creates action and action reinforces character.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 性格创造行动，行动强化性格。
- en: If you want to change who you are, challenge your beliefs.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要改变自己，挑战你的信念。
- en: Allow your actions to follow suit with *time* (not a day or week or even month,
    but a lifetime).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 让你的行动与*时间*（不是一天、一周甚至一个月，而是一生）相一致。
- en: And by doing so, you create a life of less involuntary pain.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这样做，你创造了一个减少不自觉痛苦的生活。
- en: The Most Interesting Part Of A Story
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 故事中最有趣的部分
- en: Most people don’t realize that life *is* story.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人没有意识到生活*本身就是故事*。
- en: Story is symbolic of Universal patterns.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 故事象征着宇宙模式。
- en: You can note these patterns in architecture, music, all of creation, scripture,
    systems, environment, economics, and your life.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在建筑、音乐、所有创造、经文、系统、环境、经济学以及你的生活中注意到这些模式。
- en: That is how we make sense of the world.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们理解世界的方式。
- en: The mind interprets the world through concepts, stories, metaphors, and symbols.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑通过概念、故事、隐喻和符号来解释世界。
- en: To understand one thing, we must have a subconscious understanding of everything
    it is connected to.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解一件事，我们必须对与之相关的一切有潜意识的理解。
- en: A cup wouldn’t make sense without a hand.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 没有手，杯子就没有意义。
- en: Gravity wouldn’t make sense without force or mass.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 没有力量或质量，重力就没有意义。
- en: Your life wouldn’t make sense without the current state of society and culture.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 没有当前的社会和文化状态，你的生活就没有意义。
- en: Everything you know is just a layer of stories containing billions of bits of
    on/off information pieced together for your current level of understanding.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 你所知道的一切只是包含数十亿个开/关信息的层叠故事，这些信息是为了你当前的理解水平而拼凑在一起的。
- en: Stories give meaning to life.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 故事为生活赋予意义。
- en: Your identity is the story you tell yourself.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 你的身份是你对自己讲述的故事。
- en: You will live out that story on autopilot if not made conscious.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有意识到，你将自动地活出这个故事。
- en: What word, sentence, paragraph, section, and chapter is unfolding before you
    in the book that is your life?
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的人生之书中，眼前展开的是什么单词、句子、段落、章节？
- en: Now, we must bring in the topic of polarity to deepen our understanding of meaning.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们必须引入极性的话题，以深化我们对意义的理解。
- en: In short, one thing cannot exist without the other.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，一件事不能没有另一件事而存在。
- en: Happiness cannot exist without a sad reference point.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 没有悲伤的参照点，幸福无法存在。
- en: Nor a cup without a hand.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 没有手就没有杯子。
- en: Or life without suffering.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 或者没有痛苦的生活。
- en: On that last point, the climax of the story is often the most memorable.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 关于最后一点，故事的高潮往往是记忆最深刻的。
- en: When the battle is at its peak.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 当战斗达到顶峰时。
- en: When you aren’t sure what the future holds.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 当你不确定未来会怎样时。
- en: When the symbolic villain is just about to win but the hero triumphs.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 当象征性的反派即将获胜但英雄获胜时。
- en: If there were no low points in your life it would lose all meaning.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你生活中没有低点，它就会失去所有的意义。
- en: It would become flat. Dull. Linear. Lifeless. Mechanical. Robotic. Mindless.
    Mediocre.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 它会变得平坦。乏味。线性。没有生机。机械的。机器人的。无知的。平庸的。
- en: Life is a dance between order and chaos.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 生活是秩序与混乱之间的舞蹈。
- en: Push pull. Yin yang. Masculine feminine.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 推拉。阴阳。阳刚与阴柔。
- en: From personal to social to cultural to cosmic.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 从个人到社会到文化再到宇宙。
- en: You cannot achieve new heights, perspectives, or levels of consciousness if
    you never accept the battle, lose your ground, and propel in a new direction.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你从未接受过战斗，失去阵地，并朝新的方向推进，你就无法达到新的高度，获得新的视角或意识水平。
- en: Emotional Transmutation
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 情感转化。
- en: 'Transmutation (noun): the action of changing or the state of being changed
    into another form.'
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 转化（名词）：改变的行为或变成另一种形式的状态。
- en: I have a tattoo on my right forearm.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我在我的右前臂上有一个纹身。
- en: An ouroboros.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 一个奥菲罗斯。
- en: A symbol for alchemy.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这是炼金术的象征。
- en: It is an image of a snake eating its own tail in the shape of an infinity sign.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 它是一个蛇以其尾巴形状吃自己的图像，形状像一个无限符号。
- en: A reminder that creation demands destruction and that one cannot exist without
    the other.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个提醒，创造需要毁灭，而且两者不能单独存在。
- en: It points to the Law Of Equivalent Exchange which states that for anything received
    you must sacrifice something of equal or greater value.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 它指向等价交换定律，该定律指出，对于任何收到的东西，你必须牺牲等值或更大的价值。
- en: Business transmutation transforms creation into money.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 商业转化将创造转化为金钱。
- en: Emotional transmutation is the act of transforming your emotional state into
    something more powerful.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 情感转化是将你的情感状态转化为更强大的东西的行为。
- en: Like using something as potent as anger to push you toward something good.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 就像使用像愤怒这样强大的东西来推动你向好的方向发展。
- en: Of course, this can become dangerous fast.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这可以很快变得危险。
- en: Emotional transmutation is *not* becoming a slave to that emotion and letting
    it dictate your actions.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 情感转化并不是成为那个情感的奴隶，让它支配你的行为。
- en: We want to catch, feel, and direct our negative emotions like a mental Tai Chi
    master. We want to use, not be used.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我们想要像精神太极大师一样捕捉、感受和引导我们的负面情绪。我们想要利用，而不是被利用。
- en: To create a better life for yourself, emotional energy is the fuel, and intentional
    effort is the vessel.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 为了创造一个更好的生活，情感能量是燃料，有意的努力是载体。
- en: By hitting a low point in life, you come into direct contact with a powerful
    (yet temporary) fuel source that most people waste. That low point is a rapid
    connection to the divine.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在生活中达到低点，你直接接触到一个强大（但暂时）的燃料来源，大多数人却浪费了。那个低点是快速连接到神圣的。
- en: When the time comes for you, don’t waste it.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 当轮到你时，不要浪费它。
- en: Channel Into Building
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引导到建设。
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1288">![](../Images/61f0a01cb9588481cf3b815802d01822.png)</picture>
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1288">![](../Images/61f0a01cb9588481cf3b815802d01822.png)</picture>
- en: When you reach that low point, you need something tangible to direct that newfound
    (and hyper-potent) energy toward.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 当你达到那个低点时，你需要一些具体的东西来引导那种新发现的（并且超强大的）能量。
- en: A vision-aligned project.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 一个与愿景一致的项目。
- en: The opposing end of the low point you fell into.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 你跌入的低谷的对立面。
- en: From the awareness of negativity, you can easily identify that which you don’t
    want out of life. From there, you can visualize a better future to work towards.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 从对消极的认识中，你可以轻松地识别出你不想从生活中得到的东西。从那里，你可以可视化一个更好的未来去努力。
- en: If you hit a financial low point, maybe it’s time to start a business or get
    a new job.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你遇到了财务的低谷，也许现在是时候开始创业或找一份新工作。
- en: If you just got out of a breakup, maybe it’s time to shift your priority toward
    your health and personal development in the gym.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你刚刚结束一段恋情，也许现在是时候将你的优先级转向健康和个人发展，在健身房锻炼。
- en: Most successful people I know started their journey out of raw hatred for a
    situation in their life.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我认识的大多数成功人士都是从对生活中某个情境的原始仇恨开始的。
- en: They hated commuting to work.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 他们恨通勤上班。
- en: They hated wearing a monkey suit 5 days a week.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 他们恨每周五天都穿猴装。
- en: They hated that they let a relationship carry on, or that they weren’t “good
    enough” for one they wanted to keep.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 他们恨自己让一段关系继续下去，或者他们觉得自己不够好，无法保持他们想要的关系。
- en: When they felt that emotion and let go of the desire to hold on, a new potential
    revealed itself and action became frictionless.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 当他们感受到这种情感并放下想要抓住的欲望时，新的潜力显现出来，行动变得无摩擦。
- en: Most people think that “hate” shouldn’t exist when it is just an obstruction
    of love. And if that obstruction isn’t removed, hatred latches on and extends
    it’s stay.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人认为，“仇恨”不应该存在，因为它只是爱的障碍。如果这个障碍没有被移除，仇恨就会抓住它并延长它的停留时间。
- en: 'Now, this is my philosophy through my direct experience, and why many of you
    read these letters:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这是通过我的直接经验形成的我的哲学，也是为什么你们中的许多人会阅读这些信件：
- en: I believe that holistic entrepreneurship is the meta vessel for any man or woman
    balancing the chaos in their life with the masculine pursuit of self-generated,
    goal-oriented building.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为整体创业是任何男人或女人平衡生活中混乱与男性追求自我生成、目标导向建设的元容器。
- en: 'If that makes little sense, let me explain the entrepreneurial landscape right
    now:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这让你感到困惑，让我解释一下现在的创业环境：
- en: 1) Everyone is an entrepreneur.
  id: totrans-115
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 每个人都是企业家。
- en: Centuries ago, individuals each fulfilled a purpose within their tribe or community.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 几个世纪以前，每个人都在他们的部落或社区中承担着一种角色。
- en: They acquired skills and interests that fit the “marketplace” that was their
    community.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 他们获得了适合他们社区“市场”的技能和兴趣。
- en: 2) Social media is not just an app, it’s a new society.
  id: totrans-118
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 社交媒体不仅仅是一个应用程序，它是一个新的社会。
- en: People still don’t realize how revolutionary social media was.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 人们还没有意识到社交媒体的革命性。
- en: It’s where we learn (school).
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 那是我们学习（学校）的地方。
- en: It’s where we hire (career).
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 那是我们雇佣（职业）的地方。
- en: It’s where we teach (business).
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 那是我们教学（商业）的地方。
- en: It’s where we meet (social).
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 那是我们相遇（社交）的地方。
- en: We live in the virtual world right here and now. Virtual reality wouldn’t be
    able to exist without this societal backbone we already have.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 我们生活在这个虚拟世界中，就在这里和现在。没有我们已有的这个社会支柱，虚拟现实将无法存在。
- en: Neglecting social media is neglecting an evolutionary path toward your fullest
    potential.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 忽视社交媒体就是忽视了一条通往你最大潜能的进化之路。
- en: 3) We have problem solved our way to “doing what you love.”
  id: totrans-126
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 我们通过解决问题的方式实现了“做自己喜欢的事情”。
- en: Evolution is the process of solving problems, small and large.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 进化是解决大小问题的过程。
- en: We don’t notice it until we reflect on decade-plus-long time scales.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 我们直到反思十年以上的时间尺度才会注意到这一点。
- en: An innate human drive is to pursue your curiosity and embrace being.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 天生的人类驱动力是追求你的好奇心和拥抱存在。
- en: You can’t do that without money (to a point, but a hard point) in this society.
    Therefore, it becomes one’s life’s work to leverage modern technology to make
    an income doing what one enjoys.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个社会中，没有钱（在一定程度上，但这是一个硬点）你无法做到这一点。因此，利用现代技术通过做自己喜欢的事情来赚钱成为一个人的终身事业。
- en: You do this by pairing your personal interests with the skills of social media
    (understanding society), writing, speaking, marketing, and sales.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过将你的个人兴趣与社交媒体（理解社会）的技能、写作、演讲、营销和销售相结合来做这件事。
- en: I discuss this in the [$1 Million Dollar Skill Stack](https://thedankoe.com/letters/the-1-million-dollar-skill-stack-learn-in-this-order/).
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 我在[$1百万美元技能栈](https://thedankoe.com/letters/the-1-million-dollar-skill-stack-learn-in-this-order/)中讨论了这一点。
- en: 4) You are the most profitable niche.
  id: totrans-133
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 你是最有利可图的细分市场。
- en: What is the meaning of life?
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 生活的意义是什么？
- en: That is a loaded question, but I believe that the answer that makes the most
    sense is to raise the collective consciousness.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个有争议的问题，但我相信最有意义的答案是提升集体意识。
- en: To help others solve their problems so we can transcend the superficial and
    live in accordance with what is.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 帮助他人解决问题，这样我们才能超越表面，按照真实的生活。
- en: The problems in your life are mental, physical, financial, and spiritual.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 你生活中的问题是心理的、身体的、财务的和精神的。
- en: Same goes for anyone else.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 对其他人来说也是如此。
- en: Those are the problems we must individually solve for collective growth.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是我们必须个人解决以实现集体增长的问题。
- en: We as humanity are only as strong as our weakest link, and that weakest link
    is mediocre, mindless, and destructive. Hence, why you must learn marketing and
    persuasion for the sake of awareness. You don’t push your worldview, you simply
    illustrate it and let it do its thing.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 我们作为人类，只有当我们最薄弱的环节强大时，我们才是强大的，而这个最薄弱的环节是平庸、无意识和破坏性的。因此，你必须为了意识而学习营销和说服。你不是推动你的世界观，你只是展示它，让它发挥作用。
- en: '*Feed the hungry.*'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: '*喂饱饥饿的人*。'
- en: Those that are full will eventually grow hungry.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 那些已经满足的人最终会感到饥饿。
- en: When you solve your own problems, it is implied that you can pass down a solution.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 当你解决自己的问题时，意味着你可以传授一个解决方案。
- en: This solution is both how you gain a readership on social media (through content)
    and sell a product that saves the world one purchase at a time ([through education](https://thedankoe.com/letters/the-new-wave-of-micro-businesses-monetize-your-knowledge/)).
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 这个解决方案是你在社交媒体上获得读者群（通过内容）和销售一个一次购买就能拯救世界的产品（通过教育）的方式([通过教育](https://thedankoe.com/letters/the-new-wave-of-micro-businesses-monetize-your-knowledge/))。
- en: If you don’t know where to start, [try 2 Hour Writer](https://2hourwriter.com).
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道从哪里开始，[尝试2小时作家](https://2hourwriter.com)。
- en: 5) A “creator” is not a job but a new way of life.
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5) “创造者”不是一份工作，而是一种新的生活方式。
- en: Regardless of your beliefs in a higher power, underlying metaphysical fabric,
    or any interpretation of a Creator – it’s hard to deny that the act of creation
    is pure ecstasy, and that’s a sign to do it more often.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你信仰何种更高的力量、基本的形而上学结构，或对创造者的任何解释——很难否认创造的行为是纯粹的快乐，这是做更多次数的标志。
- en: 'When you learn, dissect, reconnect, and teach you flex the creative ability
    of your mind, and in the wise words of Arnold:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 当你学习时，剖析、重新连接，并教授，你就是在锻炼你大脑的创造力，正如阿诺德所说的明智话语：
- en: To me, the pump kind of feels like having sex with a beautiful woman and coming.
    You know? It just feels fantastic. I am coming all the time, you know!
  id: totrans-149
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 对我来说，泵的感觉就像和一位美丽的女人做爱并达到高潮。你知道吗？感觉太棒了。我总是在高潮，你知道！
- en: Creativity is mental bodybuilding. Creation is spiritual sex.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 创造力是心理健美。创造是精神上的性行为。
- en: And if everyone leans into their nature as a creator, it is difficult for saturation
    to exist.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 如果每个人都充分发挥自己的创造者本性，那么饱和状态就难以存在。
- en: Your story, or identity (that you display in the creator society), is nowhere
    near the same as anyone else’s – even if you are pursuing the same high-level
    goals like “making more money.”
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 你的故事，或身份（你在创造者社会中展示的），与任何人的都不一样——即使你追求的是像“赚更多钱”这样的高级目标。
- en: You can process 128 billion bits of conscious information in your lifetime.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 你一生中可以处理1280亿位的意识信息。
- en: That is your potential.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 那是你的潜力。
- en: At any given moment, you are wasting that potential through distraction or using
    it to craft a conscious character by which you can contribute to humanity.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何时刻，你都在通过分心或通过塑造一个能够为人类做出贡献的有意识的人格来浪费这种潜力。
- en: Feel into the situation you are in.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 感受你所处的情境。
- en: Transmute that energy toward a goal.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 将这种能量转化为目标。
- en: Acquire the skills necessary to reach that goal.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 获得实现那个目标所需的技能。
- en: Pursue your curiosity to avoid the mechanical nature of prescriptions.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 追求你的好奇心，以避免处方的机械性质。
- en: Exchange your knowledge, projects, and solutions in exchange for attention and
    income.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 交换你的知识、项目和解决方案，以换取关注和收入。
- en: Use your self-reflective consciousness to identify gaps in your ability and
    fix them.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 使用你的自我反思意识来识别你能力中的差距并修复它们。
- en: You have the resources.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 你拥有资源。
- en: It will take time. Years.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 这将需要时间。几年。
- en: You may not start now and that’s fine.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能现在不会开始，那没关系。
- en: This letter may not even make sense to you at your current level of awareness.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 这封信在你当前的认识水平上可能甚至对你都没有意义。
- en: Push forward in reality based on your experience level.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 根据你的经验水平，在现实中推进。
- en: Seek big-picture understanding.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求对大局的理解。
- en: Don’t get trapped in the technical details.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 不要陷入技术细节的陷阱。
- en: Enjoy the rest of your weekend.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 享受你周末的剩余时光。
- en: – Dan Koe
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: – 丹·科
