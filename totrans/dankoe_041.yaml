- en: How To Create A Life Of Meaning, Money, & Impact (As Fast As Humanly Possible)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何在最短的时间内创造一个有意义、有钱、有影响力的人生（尽可能快）
- en: 原文：[https://thedankoe.com/letters/how-to-create-a-life-of-meaning-money-impact-as-fast-as-humanly-possible/](https://thedankoe.com/letters/how-to-create-a-life-of-meaning-money-impact-as-fast-as-humanly-possible/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://thedankoe.com/letters/how-to-create-a-life-of-meaning-money-impact-as-fast-as-humanly-possible/](https://thedankoe.com/letters/how-to-create-a-life-of-meaning-money-impact-as-fast-as-humanly-possible/)'
- en: If I could attribute all of my progress to one thing — it would be *clarity.*
    The ability to order consciousness, that is. Clarity makes focus seamless, and
    we all know how important that is in the age of information.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我能把我的所有进步归功于一件事——那将是**清晰度**。即对意识进行排序的能力。清晰度使专注变得无缝，我们都知道在信息时代这一点有多么重要。
- en: As a kid, under 12 years old, I would carry a notebook with me everywhere. One
    of those “college-rule” notebooks that you would go school shopping for. Except
    this one wasn’t for school. This is where I drew weird monsters, robots, and anything
    else that my young mind could imagine.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在我还是个孩子，不到12岁的时候，我会随身携带一个笔记本。那种你会在学校购物时买的“大学规则”笔记本。但这个不是用来上学的。这是我画奇怪怪物、机器人以及任何我年轻大脑能想象到的东西的地方。
- en: These drawings were usually the same shape. A humanoid creature with a body,
    arms, legs, and a head. Sometimes I would make them muscular, sometimes skinny
    and alien-like, sometimes with horns, sometimes with halos.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这些画通常形状相同。一个有身体、手臂、腿和头的人形生物。有时我会让他们肌肉发达，有时又瘦又像外星人，有时有角，有时有光环。
- en: As I grew up, I stopped drawing but kept the notebook around. Instead of imaginary
    figures, I wrote imaginary scenarios for my future. A vision board, if you will.
    A map of steps I needed to take to get there. I would pin these to my wall above
    my computer. Whenever I was feeling especially lazy, my vision would stare me
    in the face — reminding me why I am here.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我长大，我停止了绘画，但保留了这个笔记本。不是想象的人物，而是为我的未来写下了想象场景。如果你愿意，这是一个愿景板。一个我需要采取的步骤的地图。我会把这些贴在我电脑上面的墙上。每当我特别懒惰的时候，我的愿景就会直面我——提醒我我为什么在这里。
- en: Turning Dreams (Or Nightmares) Into Reality
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将梦想（或噩梦）变为现实
- en: Awareness begets awareness. Thoughts beget thoughts. Ideas beget ideas. Projects
    beget projects… I can go on.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 意识产生意识。思想产生思想。想法产生想法。项目产生项目……我可以继续说下去。
- en: 'The point: you cannot create a future reality for yourself if you have not
    first imagined it.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 重点：如果你没有首先想象它，你就不能为自己创造一个未来的现实。
- en: Vice versa, you can only create a negative present reality if you have first
    imagined it (or experienced it).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 反之，如果你首先想象了它（或体验了它），你才能创造一个消极的当下现实。
- en: Tesla — the company — would not be here if the wheel, wagon, carriage, electricity,
    and car came before it.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 特斯拉——这家公司——如果车轮、马车、马车、电和汽车在它之前出现，它就不会存在。
- en: This brings up what could be the biggest problem we are experiencing as a species.
    And of course, we are the only ones who experience it, because we are the only
    species alive that has the cognitive ability TO experience it.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这引发了我们作为物种可能面临的最大问题。当然，我们是我们唯一经历它的，因为我们是我们唯一有认知能力去体验它的物种。
- en: I am talking about psychological time or the concept of linear time. That is
    the big problem. Reminiscing on a familiar past — something you have physically
    experienced before — and having the same familiar thoughts. Those thoughts pull
    your past experience into the present. You literally have the same sensory experience.
    You ARE your past self.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我在谈论心理时间或线性时间的概念。这是大问题。回忆一个熟悉的过去——你之前物理上经历过的事情——并且有相同的熟悉思想。这些思想将你的过去经验拉入当下。你实际上有相同的感官体验。你就是你过去的自己。
- en: As you repeat these thoughts, emotions, and experiences — your brain hardwires
    these patterns via neural networks. This is how habits and routines are formed.
    These are dangerous when unconscious. You remain the person you were in the past.
    Living out the same negative thoughts and sensory experiences over and over again.
    We have to learn how to program (internal) or be programmed (external). *Create
    or be created.*
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 当你重复这些想法、情绪和经历时——你的大脑通过神经网络将这些模式固化。这就是习惯和常规形成的方式。这些在无意识中是危险的。你仍然是过去的那个人。一次又一次地活出同样的消极思想和感官体验。我们必须学会如何编程（内部）或被编程（外部）。**创造或被创造**。
- en: The same thing happens with the future. You project into and stress over the
    predictable future based on your past experiences. Again, you feel those experiences
    in the present, meaning you haven’t changed throughout your entire unconscious
    life.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 未来的情况也是一样。你将注意力投射到基于你过去经验的可预测的未来，并对其感到焦虑。再次，你会在现在感受到这些经历，这意味着你在整个无意识的生活中并没有改变。
- en: There is a specific neural network for each of these. One for the stress your
    boss causes. One for getting in the shower. One for arguing with your spouse when
    you get home. As time goes on, these become more unconscious and disastrous.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这些，每个都有特定的神经网络。一个是你老板造成的压力，一个是为了洗澡，一个是你回家后与配偶争吵。随着时间的推移，这些变得越来越无意识和灾难性。
- en: Most people wake up and immediately project into a stressful future because
    of their programming. They wake up as a past version of themselves, having the
    same exact negative sensory experience they have every morning.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人醒来后，立即将注意力投射到一个有压力的未来，这是由于他们的编程。他们醒来时是过去的自己，有着每天早上都有的相同的负面感官体验。
- en: The only way to solve this problem is by diving into the unknown. Thinking new
    thoughts. Exposing yourself to new ideas. Immersing yourself in an environment
    conducive to growth (my notion of tactical stress). Building projects that lead
    to a positive potential reality. Taking unfamiliar actions that you have been
    told were “risky” — because the people saying that haven’t experienced the “risk”
    itself.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 解决这个问题的唯一方法就是深入未知。思考新的思想。接触新的想法。沉浸在一个有利于成长的环境中（我的战术压力概念）。建立导致积极潜在现实的项目。采取你被告知是“有风险”的不熟悉行动——因为说这些话的人没有经历过“风险”本身。
- en: <picture fetchpriority="high" decoding="async" class="wp-image-563">![](../Images/5dbbf53c47ffb04f0dff279bb42886d8.png)</picture>
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-563">![](../Images/5dbbf53c47ffb04f0dff279bb42886d8.png)</picture>
- en: 90+% of the population are a walking contradiction. They live out a “safe” and
    “certain” path on autopilot — which holds the most risk and uncertainty in our
    ever-changing world.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 90%以上的人口都是一种行动上的矛盾。他们在自动化的“安全”和“确定”的道路上生活——在我们不断变化的世界中，这充满了最大的风险和不确定性。
- en: The Greatest Skill Of The 21st Century
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 21世纪最重要的技能
- en: The mind can cause a lot of problems as we’ve learned. This is because of psychic
    entropy — the mind tending towards chaos and disorder. This is not bad if you
    [understand how to navigate these phases.](https://thedankoe.com/if-you-feel-lost-understand-these-3-phases-of-life/)
    They can be very rewarding. However, the solution is *clarity*. Ordered consciousness.
    The ability to organize information in a way that quite literally brings it to
    life. From mind to matter.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经了解到，心灵可以引起很多问题。这是因为心理熵——心灵倾向于混乱和无序。如果你[了解如何导航这些阶段](https://thedankoe.com/if-you-feel-lost-understand-these-3-phases-of-life/)，这并不坏。它们可以非常有益。然而，解决方案是*清晰性*。有序的意识。以非常直接的方式组织信息，使其生动起来的能力。从心灵到物质。
- en: <picture decoding="async" class="wp-image-564">![](../Images/e003a127a133ea8468a9d5d617a69214.png)</picture>
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-564">![](../Images/e003a127a133ea8468a9d5d617a69214.png)</picture>
- en: Nobody knows what they want to do in life. Nobody sees this as a blessing. Not
    knowing what you want means you get to create what you want in the infinite potential
    of the unknown. We will dive more into the science behind the quantum realm in
    a future letter. Just know, the unknown is where all potential exists. If it is
    known, that potential has already been actualized. You need to break the habit
    of living as your known, familiar, and predictable self in your known, familiar,
    and predictable life.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人知道他们生活中想要做什么。没有人把这看作是一种祝福。不知道自己想要什么意味着你可以在无限的未知潜力中创造自己想要的东西。我们将在未来的信件中更深入地探讨量子领域的科学。只需知道，未知是所有潜力的存在之地。如果已知，那么这种潜力已经实现了。你需要打破习惯，以你已知、熟悉和可预测的自我，在你的已知、熟悉和可预测的生活中生活。
- en: <picture decoding="async" class="wp-image-558">![](../Images/afab64c9dc36304bcbbca3651c442b3c.png)</picture>
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-558">![](../Images/afab64c9dc36304bcbbca3651c442b3c.png)</picture>
- en: Now, understand that this is a BIG topic. Everything in the pyramid above deserves
    its own letter. People have written entire books on all of the different aspects
    of the pyramid. Hell, I’m writing an entire book on it. We will not be able to
    understand this all in one post. All future and prior posts incorporate this.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，明白这是一个很大的话题。金字塔上的一切都值得有自己的信件。人们已经为金字塔的各个方面写了整本书。该死，我甚至正在写一本关于它的书。我们不可能在一篇帖子中理解这一切。所有未来的和过去的帖子都包含了这个内容。
- en: 'In this letter, we are focused on ordering consciousness to create a positive
    reality for ourselves. Here are the steps to do that:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在这封信中，我们专注于命令意识为自己创造一个积极的现实。以下是实现这一目标的步骤：
- en: '**1) Material VS Immaterial Experience**'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 物质 VS 非物质体验**'
- en: “I am not what happened to me, I am what I choose to become.” — Carl Jung
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “我不是发生在我身上的事，我是我选择成为的人。” —— 卡尔·荣格
- en: Do not interpret this quote from a materialist paradigm. Think of it from an
    immaterial, experiential perspective. You ARE who you choose to become. Right
    now. In this very moment. There is no gap to bridge in the immaterial world.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 不要从唯物主义的角度来解读这句话。从非物质、经验的角度来思考。你现在是选择成为的那个人。就在现在。在这个非常时刻。在非物质世界中没有需要跨越的鸿沟。
- en: When you tap into optimal experience, or the flow state, you are having the
    sensory experience that you crave. You do not care about the fancy car, house,
    or lifestyle. *You care about the feeling or experience it gives you.*
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 当你进入最佳体验或心流状态时，你正在体验你渴望的感官体验。你不在乎那辆豪华车、房子或生活方式。*你关心它给你带来的感觉或体验*。
- en: You can achieve that experience right now.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在就可以实现那种体验。
- en: '**Unpopular opinion:** “fake it til you make it” is incredible advice.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**不为人知的观点**：“假装做到你做到”是极好的建议。'
- en: From a material perspective, it makes you look like a fraud. From an immaterial
    perspective, there is no faking. You already are that person. The material world
    will catch up.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 从物质的角度来看，这让你看起来像是一个骗子。从非物质的角度来看，没有假装。你已经成为了那个人。物质世界会迎头赶上。
- en: '**2) Create A Crystal Clear Vision**'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 创建一个清晰的愿景**'
- en: How do we dive into the unknown? Through the power of our mind to visualize
    the potential reality we want to attract and work towards through intention.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何进入未知？通过我们的大脑的力量来可视化我们想要吸引和通过意图努力实现的潜在现实。
- en: 'Fun fact: “Intention” comes from Latin *intentionem* (nominative *intentio*)
    “a stretching out, straining, exertion, effort; attention,” noun of action from *intendere* “to
    turn one’s attention,” literally “to stretch out”'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的事实：“意图”来自拉丁语 *intentionem*（主格 *intentio*）“伸展，拉紧，努力，努力；注意力”，来自 *intendere*
    “转向某人的注意力”，字面意思是“伸展”。
- en: When you act with intention (a driver in The Creation Pyramid) — *you are stretching
    towards something through attention.*
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 当你带着意图行动（在创造金字塔中的驱动者）——*你通过注意力向某个目标伸展*。
- en: 'Many people *talk bad* about the “Law Of Attraction” but think of it like this:
    through consistent and specific visualization, you are framing your focus. When
    you practice focusing on your vision (instead of your boss causing you stress)
    you begin to deprogram the unconscious thought patterns in your brain.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人 *说坏话* 关于“吸引力法则”，但可以这样想：通过一致和具体的可视化，你正在设定你的焦点。当你练习专注于你的愿景（而不是你的老板让你有压力）时，你开始解构你大脑中的无意识思维模式。
- en: 'Another example: if you believe you can make money online (because you have
    clarity on your vision) you will start to notice money-making opportunities. *Like
    when you see a certain car that you haven’t seen before* — then you see it EVERYWHERE.
    You are actively opening your mind to pay attention to new, unknown things and
    “attracting” those experiences into your life.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个例子：如果你相信你可以在网上赚钱（因为你对自己的愿景有清晰的认知），你将开始注意到赚钱的机会。*就像当你看到你以前没见过的某种车时*——然后你到处都能看到它。你正在积极地打开你的心扉，注意新的、未知的事物，并将这些经历“吸引”到你的生活中。
- en: '[By getting specific on how you want your future to look](https://thedankoe.com/how-to-finally-stop-caring-what-other-people-think/)
    — you can start to tap into that energy.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '[通过具体说明你希望你的未来看起来如何](https://thedankoe.com/how-to-finally-stop-caring-what-other-people-think/)——你可以开始进入那种能量。'
- en: Energy? Like vibes? What do you mean?
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 能量？像振动一样？你是什么意思？
- en: Have you ever “looked forward” to going on vacation and gotten excited in that
    present moment? That’s what I mean. Environments hold energy. Nature holds energy.
    Everything holds energy. The frequency of certain energy is information. Our brains
    process and organize information. Stop thinking about all of this from a materialist
    paradigm.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 你有没有“期待”去度假，并在那个当下感到兴奋？这就是我的意思。环境持有能量。自然持有能量。一切事物都持有能量。某种能量的频率是信息。我们的头脑处理和组织信息。停止从唯物主义的角度思考所有这些。
- en: '[You can use my free planner if you want a guided way of doing all of this.](https://shop.thedankoe.com/planner)'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '[如果你想有一个引导你完成所有这些的免费计划表，可以使用我的。](https://shop.thedankoe.com/planner)'
- en: '**3) Reverse Engineer Your Vision Into Goals**'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 将你的愿景逆向工程为目标**'
- en: The purpose of creating goals isn’t to focus on them, but to provide more clarity
    and prove that it can be accomplished. *You can think of these as micro-visions
    if you want.* They are simply here to provide additional energy sources to tap
    into and be able to create a process to execute on when it’s time to actualize
    your vision.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 创建目标的目的不是专注于它们，而是提供更多的清晰度并证明它是可以实现的。*如果你想的话，可以将其视为微观愿景。* 它们只是在这里提供额外的能量来源，以便在实现愿景的时候能够执行一个过程。
- en: Everything here is variable. That’s why this is such a large and difficult topic
    to tackle. I am trying to guarantee success in a world where success is reserved
    for the 1% that understand The Creation Pyramid.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的一切都是可变的。这就是为什么这是一个如此庞大且难以解决的问题。我正在努力保证在一个成功被保留给理解《创造金字塔》的1%的世界中取得成功。
- en: How I have done it is break it down into 3 goals depending on the scale of what
    you are trying to create. If you are trying to create a better life, think big.
    Write out a 10 year goal, 1 year goal, and monthly goal.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我是如何做的呢？根据你试图创造的规模，将其分解为3个目标。如果你试图创造一个更好的生活，要考虑长远。写下10年目标、1年目标和月度目标。
- en: Now we can complete these quests, milestones, checkpoints, or “micro-visions”
    by executing on a specific process.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以通过执行一个特定的过程来完成这些任务、里程碑、检查点或“微观愿景”。
- en: '**4) Begin Testing A Process**'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 开始测试一个过程**'
- en: Think of all of this phase as an experiment. You don’t know what will get results
    unless you test specific parts. Scientists don’t come up with a replicable process
    that gets results the first time around. It may take weeks, months, or years.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 将所有这些阶段视为一个实验。除非你测试特定的部分，否则你不知道什么会产生结果。科学家们不会一开始就提出一个可复制的、能产生结果的过程。这可能需要几周、几个月甚至几年。
- en: <picture loading="lazy" decoding="async" class="wp-image-559">![](../Images/989fcff0a08a3dc77dbd37ce6fd5b055.png)</picture>
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-559">![](../Images/989fcff0a08a3dc77dbd37ce6fd5b055.png)</picture>
- en: Patience, faith, and surrender is necessary here. You are creating a reality
    that nobody has created before. If you want to go back to the “secure,” predictable,
    and conventional path of living, be my guest. If not, open yourself up to failure.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 耐心、信仰和顺从在这里是必要的。你正在创造一个以前没有人创造过的现实。如果你想回到“安全”、“可预测”和“传统”的生活道路，请随意。如果不这样，就敞开心扉接受失败。
- en: What lever-moving actions can you execute on everyday that will actualize the
    monthly, yearly, decade-long, and life-long vision for the reality you are working
    to attract and create?
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 你每天可以执行哪些杠杆移动行动来实现你正在努力吸引和创造的现实的月度、年度、十年甚至终身愿景？
- en: If this part makes you anxious, you will need to self-educate and practice to
    increase your skill. If this part makes you bored, you will need to increase the
    challenge.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这部分让你感到焦虑，你需要自我教育并练习以提高你的技能。如果你感到无聊，你需要增加挑战。
- en: <picture loading="lazy" decoding="async" class="wp-image-546">![](../Images/7462707a9140576b11dca6a3899a7a32.png)</picture>
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-546">![](../Images/7462707a9140576b11dca6a3899a7a32.png)</picture>
- en: '**5) Leverage Intrinsic Drivers**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**5) 利用内在驱动力**'
- en: Curiosity, passion, purpose, inspiration, and intention are all tools at your
    disposal to improve the quality of your work.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 好奇心、激情、目标、灵感以及意图都是你可以用来提高工作质量的工具。
- en: These all influence dopamine and other neurochemicals in your brain. When you
    [are inspired through curiosity pursuit](https://thedankoe.com/how-to-copy-your-way-to-success-instead-of-mediocrity/),
    you do better work. When you have a strong why or purpose, you do better work.
    These are energy sources that you can tap into at any time.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这些因素都会影响你大脑中的多巴胺和其他神经化学物质。当你通过好奇心追求[获得灵感](https://thedankoe.com/how-to-copy-your-way-to-success-instead-of-mediocrity/)时，你会做得更好。当你有一个强烈的理由或目标时，你会做得更好。这些都是你可以随时利用的能量来源。
- en: These should be intrinsic motivators, not extrinsic.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这些应该是内在的激励因素，而不是外在的。
- en: '**6) Control & Channel Your Attention**'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**6) 控制 & 引导你的注意力**'
- en: <picture loading="lazy" decoding="async" class="wp-image-560">![](../Images/435a7806c55eb221425fcf73af2f4094.png)</picture>
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-560">![](../Images/435a7806c55eb221425fcf73af2f4094.png)</picture>
- en: This deserves an entire post in itself. For now, understand that you can tap
    into the energy from any level of the pyramid. These are all options to free up
    creative energy.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这值得一篇完整的文章。现在，理解你可以从金字塔的任何级别获取能量。这些都是释放创造能量的选项。
- en: Attention gives and receives energy. We process the information that comes from
    frequencies, but can only process it if attention is given to it.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 注意力给予和接收能量。我们处理来自频率的信息，但只有当注意力被给予时，我们才能处理它。
- en: When you give unconscious attention to negative energy — like visualizing a
    stressful scenario with your boss at work — you tap into that energy source. There
    is an exchange of energy and you *feel* that energy going to waste.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 当你给予无意识的注意力给消极能量——比如想象在工作中与老板的紧张场景——你就触发了那个能量源。存在能量的交换，你*感觉到*那种能量被浪费了。
- en: By managing your attention, you free up energy to put maximum effort into your
    vision.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 通过管理你的注意力，你可以释放出能量，将最大努力投入到你的愿景中。
- en: When in doubt, bring your attention to the present moment. Expand your awareness.
    Open your focus. And tap into the infinite potential and positivity that the unknown
    holds.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 当你不确定时，将你的注意力集中在当下。扩展你的意识。打开你的焦点。并触碰到未知所持有的无限潜力和积极性。
- en: '**Example Breakdown:**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例分解：**'
- en: 'One aspect of your vision for the future is to make 6 figures with a creative
    skillset. We can get more specific, and you should, but let’s break it down into
    goals:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 你对未来愿景的一个方面是利用创意技能组合赚取6位数。我们可以更具体一些，你也应该这样做，但让我们将其分解为目标：
- en: '10 year goal: make 6 figures creating content selling design tutorials (4 clients
    at $2250 per month OR 84 sales of a $99 course)'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 10年目标：通过销售设计教程的内容赚取6位数（每月2250美元的4个客户或99美元课程的84次销售）
- en: '1 year goal: make $60,000 with graphic design mentoring and plan out a course'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 1年目标：通过图形设计辅导赚取60,000美元并规划一门课程
- en: '1 month goal: land one consulting client at $1,000'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 1个月目标：获得一位价值1,000美元的咨询客户
- en: 'Now we need a process to focus on for making that a reality:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要一个过程来专注于实现这一点：
- en: Post 3 tweets a day to build authority and a public resume
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每天发布3条推文来建立权威和公众简历
- en: DM 10 people that interact with my posts and run them through a [DM outreach
    soft-script](https://modernmastery.co/community/modern-mastery-hq-special)
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 给与我帖子互动的10个人发私信，并运行他们通过[私信外联软脚本](https://modernmastery.co/community/modern-mastery-hq-special)
- en: 1 timeline promotion per day for your product or service
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每天为你的产品或服务进行一次时间线推广
- en: Now, tap into certain intrinsic drivers. Even better, bake it into your routine
    with my [free creative process.](https://7daystogeniusideas.com/)
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，利用某些内在驱动力。更好的是，通过我的[免费创意流程](https://7daystogeniusideas.com/)将其融入你的日常习惯中。
- en: Frame your focus further by blocking off 1 hour every day to execute this process.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 通过每天留出1小时来执行这一过程，进一步框架化你的焦点。
- en: Becoming Multi-Dimensionally Jacked
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成为多维度强健的人
- en: The Creation Pyramid is not only for creating a better life for yourself. It
    can be applied to all dimensions of your personal and professional life.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 创造金字塔不仅是为了让你自己的生活变得更好。它可以应用于你个人和职业生活的各个方面。
- en: <picture loading="lazy" decoding="async" class="wp-image-565">![](../Images/05c33b7cc0a11df87b7f5af96020b514.png)</picture>
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/05c33b7cc0a11df87b7f5af96020b514.png)'
- en: '*Starting a new project?*'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '*开始一个新项目？*'
- en: Create a vision for it, gain clarity with goal setting, reduce the friction
    of taking action, and focus.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 为其制定愿景，通过目标设定获得清晰度，减少采取行动的摩擦，并集中注意力。
- en: '*How about creating a better relationship?*'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '*如何建立更好的关系？*'
- en: Create a vision for how you want the interaction with your significant other
    to go, gain clarity on how to make that happen, and frame your attention.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 为你想要与你的重要他人互动的方式制定愿景，明确如何实现这一点，并框架化你的注意力。
- en: '*Starting an online business with a personal brand?*'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '*用个人品牌开始在线业务？*'
- en: '**This is how you create your brand.**'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '**这就是你创建品牌的方式。**'
- en: Your vision is the desired outcome you are helping others reach. The goals to
    get there are what you educate your audience on. Your drive is what attracts like-minded
    people. Capturing attention and framing the focus of your audience is how you
    help them navigate roadblocks.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 你的愿景是你帮助他人达到的期望结果。达到那里的目标是你教育受众的内容。你的动力是吸引志同道合的人。吸引注意力和框架化受众的焦点是你帮助他们克服障碍的方式。
- en: 'Bonus: create a vision board of images that you like. I like black and white
    skyscrapers (I used to dream of living in a big city, and black and white is just
    my style) can you see that in my brand?'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 奖励：创建一个由你喜欢的图片组成的愿景板。我喜欢黑白摩天大楼（我以前梦想着住在大城市，黑白就是我的风格），你能在我的品牌中看到这一点吗？
- en: What about the *feeling* you want to convey? What environment, profile pictures,
    colors, and other forms of information that humans process through attention do
    you want to convey? It’s about the experience.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 你想要传达的感觉是什么？你希望通过环境、个人资料图片、颜色以及其他人类通过注意力处理的信息形式传达什么？这关乎体验。
- en: The same thing goes for creating a product or service. What is the desired outcome?
    How do they get there? What is the process that gets results that you walk them
    through? Are they able to focus and actually achieve those results? Are you making
    it seamless for them?
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 创建产品或服务也是如此。期望的结果是什么？他们如何达到那里？你引导他们经历的过程是如何产生结果的？他们能否集中精力并真正实现这些结果？你让他们感到无缝吗？
- en: The next time you feel lost in any dimension — mind, body, spirit, business,
    and the rest — refer to the creation pyramid to gain clarity and create the reality
    you want to live in.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 下次你在任何维度（心灵、身体、精神、商业等）感到迷茫时，参考创造金字塔以获得清晰并创造你想要生活的现实。
- en: — Dan Koe
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: — 丹·科
