- en: You Won’t Be The Same Person In 6 Months (Master Anything, Fast)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/you-wont-be-the-same-person-in-6-months-master-anything-fast/](https://thedankoe.com/letters/you-wont-be-the-same-person-in-6-months-master-anything-fast/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Most people, even though they don’t know it, are asleep. They’re born asleep,
    they live asleep, they marry in their sleep, they breed children in their sleep,
    they die in their sleep without ever waking up. They never understand the loveliness
    and the beauty of this thing that we call human existence. – Anthony De Mello
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: People are living on autopilot.
  prefs: []
  type: TYPE_NORMAL
- en: Everyone was assigned goals by society as a child.
  prefs: []
  type: TYPE_NORMAL
- en: Goals require a system to be achieved.
  prefs: []
  type: TYPE_NORMAL
- en: A system takes trial and error to become efficient.
  prefs: []
  type: TYPE_NORMAL
- en: You had the biological goals of walking, talking, and speaking to survive.
  prefs: []
  type: TYPE_NORMAL
- en: As simple as they are for you now, that wasn’t always the case.
  prefs: []
  type: TYPE_NORMAL
- en: Your mind received negative feedback from your environment that led to those
    systems becoming efficient to achieve your goal of surviving.
  prefs: []
  type: TYPE_NORMAL
- en: Your parents either scolded you or pointed you in the right direction when you
    made a mistake.
  prefs: []
  type: TYPE_NORMAL
- en: You started crawling, then stumbling around, then walking like a toddler with
    little balance, and now you can (hopefully) walk like an Olympic gold medalist
    can flip through the air and stick the landing – because they practiced achieving
    that goal long enough.
  prefs: []
  type: TYPE_NORMAL
- en: Learning to walk is just the start.
  prefs: []
  type: TYPE_NORMAL
- en: What about the goals of going to school, getting a high-paying job, and retiring
    at an age where you have little time left to enjoy your life?
  prefs: []
  type: TYPE_NORMAL
- en: '**Society is a behavior system.**'
  prefs: []
  type: TYPE_NORMAL
- en: And those are 3 big goals that they injected into your mind right when you learned
    to comprehend the language you speak.
  prefs: []
  type: TYPE_NORMAL
- en: 99% of people are only interpreting everyday situations in a way that leads
    to those goals.
  prefs: []
  type: TYPE_NORMAL
- en: 99% of people are practicing the skills and programming their minds to live
    a mediocre life without even knowing it.
  prefs: []
  type: TYPE_NORMAL
- en: The masses are being shepherded to an unfulfilling life because the systems
    that compose their mind, identity, perspective, and perception are becoming more
    efficient as they age.
  prefs: []
  type: TYPE_NORMAL
- en: '**A realization people often make too late:**'
  prefs: []
  type: TYPE_NORMAL
- en: Success is not planned, it is automatic.
  prefs: []
  type: TYPE_NORMAL
- en: Successful people – whether they were conscious of it or not – had a mind that
    was programmed to achieve the goals that led to their success.
  prefs: []
  type: TYPE_NORMAL
- en: Think of your mind as a structure of nested systems.
  prefs: []
  type: TYPE_NORMAL
- en: Your identity, perspective, and perception of situations are all systems that
    feed into and reinforce each other in that order.
  prefs: []
  type: TYPE_NORMAL
- en: I am here to make you conscious of the systems that lead to automatic success
    in any endeavor.
  prefs: []
  type: TYPE_NORMAL
- en: Goals > Systems
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1683">![](../Images/a9d1eaf0e39d28d05cf3c635c41b09a0.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: 80% of living the life you want boils down to creating your own goals while
    most people are mindless slaves to society’s goals.
  prefs: []
  type: TYPE_NORMAL
- en: Goals change how you interpret situations, which influences your actions, which
    programs your identity, which compounds over years into the good life.
  prefs: []
  type: TYPE_NORMAL
- en: You can’t solve a problem unless you’re aware of it.
  prefs: []
  type: TYPE_NORMAL
- en: You can’t become aware of a problem unless it impacts a goal.
  prefs: []
  type: TYPE_NORMAL
- en: Most people don’t have goals. Most people are afraid to make mistakes. Most
    people don’t give themselves a chance to improve any aspect of their life.
  prefs: []
  type: TYPE_NORMAL
- en: If you aren’t clear on what you want, you can’t communicate what you want to
    others.
  prefs: []
  type: TYPE_NORMAL
- en: This sets you up for a life of assumptions, expectations, and never getting
    what you want out of life. Nobody can help you and you can’t help yourself.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t invest energy into a goal, you won’t feel the pain of not reaching
    that goal.
  prefs: []
  type: TYPE_NORMAL
- en: Occasional, non-alcoholic-level drinking wasn’t a problem until it took away
    from achieving my goal of a fulfilling relationship.
  prefs: []
  type: TYPE_NORMAL
- en: I never saw it as a problem until I was made aware that I was acting “off” for
    a few days after. I thought I was acting normal. If I had never invested energy
    in the goal of a relationship, or deemed it more important than the pleasure of
    having a few drinks with dinner, I never would have noticed its impact. That’s
    my point.
  prefs: []
  type: TYPE_NORMAL
- en: Most don’t have a clear vision of what they want from that goal, so the negative
    impact of their actions goes unnoticed.
  prefs: []
  type: TYPE_NORMAL
- en: Your bad habits don’t seem worth quitting because you don’t have responsibilities
    (or prioritize those responsibilities) that deserve you at 100% capacity.
  prefs: []
  type: TYPE_NORMAL
- en: If the importance of those responsibilities outweighed the pleasure of your
    bad habits, you’d stop without question.
  prefs: []
  type: TYPE_NORMAL
- en: Goals are intertwined with identity.
  prefs: []
  type: TYPE_NORMAL
- en: Humans survive on the conceptual level.
  prefs: []
  type: TYPE_NORMAL
- en: We feel threatened when that which makes us, us is threatened.
  prefs: []
  type: TYPE_NORMAL
- en: A bodybuilder will feel stress and pain when they are in an environment that
    provides less control over their training and diet.
  prefs: []
  type: TYPE_NORMAL
- en: A routine is a set of practical goals that order the mind. A writer who moves
    to a new location or travels for an extended period of time will have a stressful
    acclimation period until their mind runs on new systems. If they can’t write well
    in their normal routine, they feel threatened, because “who they are” may die.
  prefs: []
  type: TYPE_NORMAL
- en: I discuss the importance of routines – even if you think you don’t need or have
    one – in [The Daily Routine That Changed My Life (4 Focus Habits)](https://thedankoe.com/letters/the-daily-routine-that-changed-my-life-4-focus-habits/).
  prefs: []
  type: TYPE_NORMAL
- en: The general misunderstanding here is that you either have a goal or you don’t.
  prefs: []
  type: TYPE_NORMAL
- en: Your mind is a web of conscious and unconscious goals with accompanying systems
    to achieve them.
  prefs: []
  type: TYPE_NORMAL
- en: You had biological goals as a child to walk, eat, and survive. It’s seamless
    for most people because they’ve practiced.
  prefs: []
  type: TYPE_NORMAL
- en: The system is efficient.
  prefs: []
  type: TYPE_NORMAL
- en: You may have cultural goals, depending on how you were raised, of fitting in
    and following the safe path according to that culture.
  prefs: []
  type: TYPE_NORMAL
- en: If you were to condition yourself with new stimuli (constant self-education)
    to the point of having an identity that couldn’t “survive” without achieving new
    goals – you would inevitably achieve whatever they are with ease. If you want
    a successful business, relationship, or anything that is out of the norm, you
    must fundamentally change the goals your mind operates on by changing who you
    are.
  prefs: []
  type: TYPE_NORMAL
- en: To change who you are you must educate, practice, and experience new information
    to reprogram your mind’s faulty wiring that was installed by society.
  prefs: []
  type: TYPE_NORMAL
- en: The Mind Is A System That Helps You Achieve Your Goals
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1686">![](../Images/008073dbba47fda571d39fa001b72cb2.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Man is by nature a goal-striving being. And because man is “built that way,”
    he is not happy unless he is functioning as he was made to function – as a goal
    striver. Thus true success and true happiness not only go together but each enhances
    the other. – Maxwell Waltz
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This quote from *Psycho Cybernetics* can be connected to another from *Flow.*
  prefs: []
  type: TYPE_NORMAL
- en: The optimal state of inner experience is one in which there is order in consciousness.
    This happens when psychic energy—or attention—is invested in realistic goals,
    and when skills match the opportunities for action. The pursuit of a goal brings
    order in awareness because a person must concentrate attention on the task at
    hand and momentarily forget everything else. – Mihaly Csikszentmihalyi
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Humans are goal-oriented creatures.
  prefs: []
  type: TYPE_NORMAL
- en: And goals create systems.
  prefs: []
  type: TYPE_NORMAL
- en: Systems don’t exist without goals (take that, James Clear).
  prefs: []
  type: TYPE_NORMAL
- en: 'The mind has two key purposes for survival:'
  prefs: []
  type: TYPE_NORMAL
- en: Achieving known goals
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Discovering unknown goals
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The mind is an information processing and pattern recognition machine that we
    have a certain amount of control over based on our level of consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: The mind is a system – containing a complex set of systems – that accepts, rejects,
    and uses information to aid in the goals you feed it.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re always focused on negative outcomes, they will become reality, and
    you’ll blame everyone but yourself for the misfortune in your life.
  prefs: []
  type: TYPE_NORMAL
- en: The man who conceives himself to be a “failure-type person” will find some way
    to fail, in spite of all his good intentions, even if opportunity is dumped in
    his lap. The person who conceives himself to be a victim of injustice, one who
    “was meant to suffer,” will invariably find circumstances to verify his opinions.
    – Maxwell Waltz
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In other words, if you think you can, you can, and if you think you can’t, you
    can’t.
  prefs: []
  type: TYPE_NORMAL
- en: At the root of your mind, like a puppet master, is your identity.
  prefs: []
  type: TYPE_NORMAL
- en: Identity is synonymous with self-image or personality for the sake of this letter.
  prefs: []
  type: TYPE_NORMAL
- en: Your identity is a system of ideas, beliefs, values, and standards that shape
    your perspective.
  prefs: []
  type: TYPE_NORMAL
- en: Your perspective is like the lens of a camera.
  prefs: []
  type: TYPE_NORMAL
- en: You can zoom in and out.
  prefs: []
  type: TYPE_NORMAL
- en: You can focus on one part of the scene – while the background is blurred – or
    focus on the detail of the entirety of the scene.
  prefs: []
  type: TYPE_NORMAL
- en: Your perspective influences your perception of situations.
  prefs: []
  type: TYPE_NORMAL
- en: Meaning, your identity will limit the information it can perceive, and if it
    receives information that does not match its beliefs, values, or standards it
    will reject it.
  prefs: []
  type: TYPE_NORMAL
- en: Your mind automatically accepts and rejects information that aids in the achievement
    of the goals that are programmed into your head.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to get a job, dopamine will signal the importance of information
    and opportunities that help you get that job.
  prefs: []
  type: TYPE_NORMAL
- en: Your book highlights will reflect that goal. How you approach conversations
    (with anyone) will reflect that goal. What you engage with on social media will
    reflect that goal (and the algorithm will help deepen the roots of that identity
    by showing you more of that information, for better or worse).
  prefs: []
  type: TYPE_NORMAL
- en: If you want to quit your job, dopamine will do the same thing, but for information
    that provides the opposite effect.
  prefs: []
  type: TYPE_NORMAL
- en: Your Google searches will change from “best careers to go into in 2024” to “best
    businesses to start in 2024.”
  prefs: []
  type: TYPE_NORMAL
- en: Or, you’ll be more compelled to check out [Digital Economics](https://digitaleconomics.school)
    where I help you deconstruct your identity and turn it into a profitable one-person
    business.
  prefs: []
  type: TYPE_NORMAL
- en: Your book highlights in even something like a novel will be vastly different
    from someone else with a different goal.
  prefs: []
  type: TYPE_NORMAL
- en: With or without knowing it, we are all reinforcing our potentially mediocre
    identity that determines the outcome of our lives. For most people, this will
    be negative.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to change the outcome of your life, change who you are.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to change who you are, change the direction of your life.
  prefs: []
  type: TYPE_NORMAL
- en: Expose yourself to new experiences, environments, and information to allow your
    mind a chance to discover new goals you can adopt that will carry you toward a
    better future.
  prefs: []
  type: TYPE_NORMAL
- en: The Mastery Method – How To Learn Anything, Fast
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1685">![](../Images/ef1008f25b3f1d5cdc1b25954ee58d52.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: It’s safe to say that you are going to have to learn… a lot.
  prefs: []
  type: TYPE_NORMAL
- en: Education expands your mind.
  prefs: []
  type: TYPE_NORMAL
- en: It introduces you to novel perspectives.
  prefs: []
  type: TYPE_NORMAL
- en: It increases dopamine in the brain as a consistent source of energy.
  prefs: []
  type: TYPE_NORMAL
- en: It gives you the knowledge to act with clarity toward your goals.
  prefs: []
  type: TYPE_NORMAL
- en: It exposes you to the potentials that you hadn’t yet become aware of.
  prefs: []
  type: TYPE_NORMAL
- en: A consistent flow of education increases your chances of encountering meaningful
    events.
  prefs: []
  type: TYPE_NORMAL
- en: Meaningful events occur at the edge of the known, when your nervous system signals
    that you should pay attention.
  prefs: []
  type: TYPE_NORMAL
- en: When you have one foot in the unknown, you can just barely metabolize new aspects
    of reality and put that information to use.
  prefs: []
  type: TYPE_NORMAL
- en: Becoming the person you want to be is the most painful and rewarding process
    you can dedicate your life to.
  prefs: []
  type: TYPE_NORMAL
- en: You begin this path when you realize that the pain and pleasure of where you
    are now are of lesser magnitude than the pain of not receiving the rewards that
    come from seeing what you are capable of.
  prefs: []
  type: TYPE_NORMAL
- en: 'With that, let’s discuss how to master almost anything as you trek toward becoming
    a new you:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Expand Your Mind
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: All real change is identity change.
  prefs: []
  type: TYPE_NORMAL
- en: Your level of mind dictates what values, beliefs, and standards are available
    to your identity.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t care about global problems because you haven’t solved the personal
    problems that restrict your mind from seeing them as important.
  prefs: []
  type: TYPE_NORMAL
- en: The purpose of humanity is to expand your level of mind to that of The Universe.
  prefs: []
  type: TYPE_NORMAL
- en: You must allow yourself the room to discover new goals by tossing an anchor
    into the unknown.
  prefs: []
  type: TYPE_NORMAL
- en: Create a massive goal that acts as the spotlight in the unknown.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t set this massive goal for practicality or achievement.
  prefs: []
  type: TYPE_NORMAL
- en: You set it for vision, direction, and filtration of opportunities.
  prefs: []
  type: TYPE_NORMAL
- en: Focus on making it as desirable as possible.
  prefs: []
  type: TYPE_NORMAL
- en: If you had all the money in the world, what would your average day look like?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What kind of environment do you want to live in? Is there a specific location?
    Do you want to travel?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Do you want a family? What do you want that life to look like? Visualize an
    average day of family time.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How long of a workday do you want to have? If you could do anything, what would
    you do for work?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How do you want to look and feel? Describe your body, energy levels, and how
    you want to present yourself to the world.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What does your ideal day look like? Map out every hour.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: List out anything else that comes to mind in terms of a specific future that
    you want to build for yourself.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To make this even more potent, turn this vision into an anti-vision to round
    out the perspective of your ideal self:'
  prefs: []
  type: TYPE_NORMAL
- en: What is the bane of your existence?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Write out the opposite of every question about your vision.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For even more firepower, create a vision board. Add images to a scrapbook, software,
    or wall that makes that future more tangible.
  prefs: []
  type: TYPE_NORMAL
- en: Remember that nothing is permanent.
  prefs: []
  type: TYPE_NORMAL
- en: You will discover inklings for your vision as you trek along this path. Be open
    to changing what you want as you discover what you don’t want.
  prefs: []
  type: TYPE_NORMAL
- en: The pain of not reaching your vision should outweigh the pleasure of mediocrity.
  prefs: []
  type: TYPE_NORMAL
- en: Not only does a massive goal provide vision, it allows you a perspective to
    adopt when it’s time to make a decision.
  prefs: []
  type: TYPE_NORMAL
- en: Filter every single opportunity you receive through your vision.
  prefs: []
  type: TYPE_NORMAL
- en: Say “no” to everything except for that which aligns with who you want to become.
  prefs: []
  type: TYPE_NORMAL
- en: Start short-circuiting the faulty programming your mind runs on through conscious
    choice.
  prefs: []
  type: TYPE_NORMAL
- en: 2) A Hierarchy Of Goals
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This is why I created the [FOCI Planner](https://thedankoe.com/planner):'
  prefs: []
  type: TYPE_NORMAL
- en: Most people don’t need motivation, they need clarity.
  prefs: []
  type: TYPE_NORMAL
- en: An ordered mind is a happy one, and a hierarchy of self-generated goals makes
    it hard for depressing distractions to penetrate your awareness.
  prefs: []
  type: TYPE_NORMAL
- en: While big goals are for vision and filtration, small goals are for practicality
    and progress.
  prefs: []
  type: TYPE_NORMAL
- en: Now, break your vision down into goals for each domain of your life – mind,
    body, spirit, business. Relationships are synonymous with spirit here.
  prefs: []
  type: TYPE_NORMAL
- en: Yes, this will be time-consuming. Keep this written somewhere safe so you can
    change things as you go.
  prefs: []
  type: TYPE_NORMAL
- en: 'For all 4 domains of life, create:'
  prefs: []
  type: TYPE_NORMAL
- en: 10-year goals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1-year goals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Monthly goals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Weekly goals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, every day, you are going to write down 3-5 priority tasks that move the
    needle toward these goals from the ground up.
  prefs: []
  type: TYPE_NORMAL
- en: Knock these tasks out first thing in the morning before responsibilities and
    distractions have time to wake up.
  prefs: []
  type: TYPE_NORMAL
- en: 'I talk about my deep work structure in the letter: [Change Your Life In 6 Months
    (My Deep Work Routine)](https://thedankoe.com/letters/change-your-life-in-6-months-my-deep-work-routine/).'
  prefs: []
  type: TYPE_NORMAL
- en: 3) How To Learn
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Learning comes from struggle, not memorization.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t learn by studying tutorials all day.
  prefs: []
  type: TYPE_NORMAL
- en: You learn by building a project and facing reality.
  prefs: []
  type: TYPE_NORMAL
- en: Projects are goals that you can measure and iterate.
  prefs: []
  type: TYPE_NORMAL
- en: So, turn a few of your 1-year or monthly goals into a project.
  prefs: []
  type: TYPE_NORMAL
- en: Ideate a way to build something tangible (you must do work)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Write down milestones you can reach.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create an outline in a notes app or notebook.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Brain-dump any ideas that come to mind.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Do this for mental, physical, financial, and spiritual development.
  prefs: []
  type: TYPE_NORMAL
- en: This primes your mind for pattern recognition-induced meaningful dopamine.
  prefs: []
  type: TYPE_NORMAL
- en: Your projects add additional “rules” to your perception of situations.
  prefs: []
  type: TYPE_NORMAL
- en: You now have a place to write down high-signal information that you receive
    as you educate yourself and interpret feedback while building.
  prefs: []
  type: TYPE_NORMAL
- en: Start, then learn. You must learn and build in unison to truly learn.
  prefs: []
  type: TYPE_NORMAL
- en: When you build something, you encounter real problems that require a new level
    of mind to solve.
  prefs: []
  type: TYPE_NORMAL
- en: Only then can you search for information to expand your mind and solve those
    problems. This is impossible when watching tutorials all day.
  prefs: []
  type: TYPE_NORMAL
- en: 4) Skills Are Groups Of Techniques
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Building a project isn’t the end of learning.
  prefs: []
  type: TYPE_NORMAL
- en: To build a project, you must acquire skills along the way.
  prefs: []
  type: TYPE_NORMAL
- en: But you don’t “learn a skill.”
  prefs: []
  type: TYPE_NORMAL
- en: You learn a technique, experiment with it, and continue adding techniques until
    you can combine them in a way that leads to your desired outcome.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t learn Photoshop as a skill.
  prefs: []
  type: TYPE_NORMAL
- en: You create a project, search for a technique to complete one aspect of it, and
    continue learning techniques until you finish the project.
  prefs: []
  type: TYPE_NORMAL
- en: Trying to learn the software itself is almost useless and takes much longer.
  prefs: []
  type: TYPE_NORMAL
- en: There are 10+ different techniques to remove the background of an image.
  prefs: []
  type: TYPE_NORMAL
- en: Knowing multiple techniques will allow you to remove the background seamlessly
    from almost any scene.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t learn copywriting as a skill.
  prefs: []
  type: TYPE_NORMAL
- en: 'You learn techniques for:'
  prefs: []
  type: TYPE_NORMAL
- en: Capturing attention
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Holding attention
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enhancing the perceived value of your product or idea
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Etc
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are dozens of techniques for each, and the more you learn, the better
    you get at copywriting as a skill.
  prefs: []
  type: TYPE_NORMAL
- en: In [2 Hour Writer](https://2hourwriter.com), every module is a technique for
    you to practice becoming a highly paid writer in the new economy.
  prefs: []
  type: TYPE_NORMAL
- en: Everything is a skill.
  prefs: []
  type: TYPE_NORMAL
- en: Life is a skill that encapsulates health, wealth, and relationships as skills
    until broken down into techniques you can practice over the course of your life
    to master life itself.
  prefs: []
  type: TYPE_NORMAL
- en: All skills are mental.
  prefs: []
  type: TYPE_NORMAL
- en: Skills mental systems that become more efficient with practice to achieve your
    desired outcome.
  prefs: []
  type: TYPE_NORMAL
- en: 5) Reinvent Yourself
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Think of your mind as the digestive system of reality.
  prefs: []
  type: TYPE_NORMAL
- en: If you eat too much or don’t move enough, you won’t metabolize that experience.
  prefs: []
  type: TYPE_NORMAL
- en: If you eat too little or move too much, you get hungry and agitated.
  prefs: []
  type: TYPE_NORMAL
- en: When you eat just enough, you create an environment that is conducive to mental
    muscle growth. You trek through reality toward your goals. You enter a season
    of pure progress, and the feeling is incredible.
  prefs: []
  type: TYPE_NORMAL
- en: You’ve already created the boundaries, limits, or clarity necessary to launch
    fairly far into the unknown.
  prefs: []
  type: TYPE_NORMAL
- en: With a vision, goals, and projects you are primed for an entirely new life.
  prefs: []
  type: TYPE_NORMAL
- en: All you have to do is take the leap.
  prefs: []
  type: TYPE_NORMAL
- en: Launch yourself into a new physical or digital environment.
  prefs: []
  type: TYPE_NORMAL
- en: Move across the country.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Unfollow everyone online.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Follow people aligned with your future.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Change what you wear, where you shop, and who you see.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Drown your mind in the books you’ve been putting off reading.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Align all information, or reality, with who you want to become.
  prefs: []
  type: TYPE_NORMAL
- en: You will feel threatened at the start until you expand into your new identity.
  prefs: []
  type: TYPE_NORMAL
- en: Your old identity will die because it is starved of the information that reinforces
    it.
  prefs: []
  type: TYPE_NORMAL
- en: Hold strong during this extremely difficult yet extremely meaningful turning
    point in your life.
  prefs: []
  type: TYPE_NORMAL
- en: 6) Nature’s Compass
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'People are so afraid of making mistakes that they make the biggest mistake
    of them all: not making mistakes.'
  prefs: []
  type: TYPE_NORMAL
- en: You can’t avoid making mistakes.
  prefs: []
  type: TYPE_NORMAL
- en: They are Nature’s Compass.
  prefs: []
  type: TYPE_NORMAL
- en: People who don’t make mistakes don’t give themselves a chance to achieve successes.
  prefs: []
  type: TYPE_NORMAL
- en: Imagine a self-driving car.
  prefs: []
  type: TYPE_NORMAL
- en: For years, it has received negative feedback that refines the system that shapes
    the mind of the car.
  prefs: []
  type: TYPE_NORMAL
- en: It can navigate roads with ease and may be arguably safer than a human driving
    the car.
  prefs: []
  type: TYPE_NORMAL
- en: Even though we often don’t think of it like this, the self-driving car made
    millions if not billions of mistakes before it could actually reach a meaningful
    destination.
  prefs: []
  type: TYPE_NORMAL
- en: You must act in alignment with your big goal to form new systems that your mind
    operates on through the negative feedback of mistakes.
  prefs: []
  type: TYPE_NORMAL
- en: Make a habit of forcing yourself to adopt the perspective of the highest version
    of yourself.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Allow this lens to unveil new opportunities that you can act on.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When you make a mistake, because you will, use it as direction for your next
    choice.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With time, you won’t even realize that you have become an artist in whatever
    skill you’ve chosen to develop.
  prefs: []
  type: TYPE_NORMAL
- en: You will be able to achieve what most people think are difficult goals like
    you are able to walk (while most are still crawling).
  prefs: []
  type: TYPE_NORMAL
- en: 7) Self-Experimentation Solves Problems
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Your life and the projects that compose it should be treated as science projects.
  prefs: []
  type: TYPE_NORMAL
- en: 'To solve the problems that achieve your goal:'
  prefs: []
  type: TYPE_NORMAL
- en: Hypothesize an outcome (from your goals)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Experiment with techniques (for skill acquisition)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Document the process (as a project)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Double down on results (as a solution)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, you have experience, skills, a project you can turn into a business product,
    and a solution that you can charge money for in the creator economy.
  prefs: []
  type: TYPE_NORMAL
- en: I discuss this in [The Anti-Niche (Why Becoming Nichless Makes You Irreplaceable)](https://thedankoe.com/letters/the-anti-niche-why-being-nicheless-makes-you-irreplaceable/).
  prefs: []
  type: TYPE_NORMAL
- en: Self-experimentation is the only way to solve your problems for good.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s say you have the goal of achieving a six-pack.
  prefs: []
  type: TYPE_NORMAL
- en: 'You are in search of a solution, they tell you that veganism will solve all
    of your problems, and from an unenlightened state you:'
  prefs: []
  type: TYPE_NORMAL
- en: Clean up your diet
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Follow their advice as if it were law
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: See the results they mentioned
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, you attach to that diet ideology and become a prophet. You attribute results,
    that others have gotten via different modalities, to veganism and demonize anyone
    that questions you.
  prefs: []
  type: TYPE_NORMAL
- en: This is dangerous, obviously, and is the definition of low consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: 'In reality, what happened is independent of veganism:'
  prefs: []
  type: TYPE_NORMAL
- en: You ate more nutrient-dense foods
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your actions worked to survive your vegan identity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You had clarity (not chaos) by following a disciplined nutrition regimen
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Veganism, in this case, was simply a modality for ordering your mind (sustained
    degree of flow state) and allowing you to follow the principles of health – but
    you attributed it to a method.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, if you were to try veganism for a month, carnivore for a month, keto for
    a month, and flexible dieting for a month, you would:'
  prefs: []
  type: TYPE_NORMAL
- en: Make connections between the diets to reveal the fundamentals of health (pattern
    recognition = dopamine).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pick and choose certain methodologies that you enjoy, meaning they will bring
    sustainable results.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Refine a system that fits your individual nature to perfection.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, once healthy living becomes effortless, you can do the same for your finances,
    social life, romantic relationships, spiritual endeavors, or any other domain
    of life.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re going through problems in your relationship, hire a therapist, watch
    a YouTube guru, go on a retreat, and experiment with options until you find the
    right solution.
  prefs: []
  type: TYPE_NORMAL
- en: If your business isn’t growing, buy a course, hire a coach, test a new software,
    zoom out, and create a new strategy.
  prefs: []
  type: TYPE_NORMAL
- en: There’s always a way to solve your problems, and you strip yourself of that
    power when you latch onto one solution (that probably won’t solve the problem
    for good).
  prefs: []
  type: TYPE_NORMAL
- en: Think of each domain of your life as both a project and a skill in which you
    collect techniques to master that domain.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Mastery Method: Summarized'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This is how you achieve goals so fast people ask for your cheat code in the
    game of life:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Expand your mind with a vision generation session.** This perspective will
    allow you to create new goals and discover new potentials for your life (so you
    can break out of your narrow mind and achieve more).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Create a hierarchy of goals to bring clarity to your life.** You need to
    bridge the gap between where you are now and where you want to be with practical
    goals.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Turn your goals into projects so you can build and learn in unison.** Projects
    are goals that are measured, tracked, and improved.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Don’t learn skills, acquire techniques. Your skill level depends on the amount
    of techniques in your toolbox that can solve challenging problems.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Reinvent yourself with information overload** Change your physical and digital
    environments to force an open mind and discovery of new potentials.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Treat mistakes as negative feedback in your system.** You have no other way
    to test something that gets better results.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Treat your life as a science project.** Become obsessed with experimentation
    in fitness, business, knowledge, and relationships.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Thank you for reading.
  prefs: []
  type: TYPE_NORMAL
- en: Until next week,
  prefs: []
  type: TYPE_NORMAL
- en: Dan
  prefs: []
  type: TYPE_NORMAL
