- en: Learn These Skills If You Want To Thrive In 2022
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如果你想在2022年蓬勃发展，请学习这些技能
- en: 原文：[https://thedankoe.com/letters/learn-these-skills-if-you-want-to-thrive-in-2022/](https://thedankoe.com/letters/learn-these-skills-if-you-want-to-thrive-in-2022/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/learn-these-skills-if-you-want-to-thrive-in-2022/](https://thedankoe.com/letters/learn-these-skills-if-you-want-to-thrive-in-2022/)
- en: '*“Dan, what are the best skills to learn?”*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*“丹，最好的学习技能是什么？”*'
- en: '*“Dan, how do I make money online?”*'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*“丹，我如何在网络上赚钱？”*'
- en: '*“Dan, how do I do absolutely zero work, research, and execution of my own
    to build passive income in less than 3 weeks?”*'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '*“丹，我如何在不到3周的时间内完全不工作、不进行研究，也不执行自己的计划来建立被动收入？”*'
- en: '**Stop**. You are asking the wrong questions. There are only a few skills that
    you *need* to learn. The others you learn should be the result of your innate
    curiosity. Taking small risks with your time for a potentially massive payout.
    Letting (good) novelty be your guide (per the last Mastery Letter).'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '**停止**。你提出的问题是错误的。你只需要学习少数几种技能。其他你学习的技能应该是你天生的好奇心的结果。用你的时间承担小的风险，以换取可能巨大的回报。让（好的）新奇成为你的指南（根据上一封掌握信）。'
- en: Let me break down what you should learn in the simplest way possible. If you
    follow this learning path, you will never have to worry about money again — given
    you can stay on the path for 1 year minimum.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 让我用最简单的方式分解你应该学习的内容。如果你遵循这个学习路径，你将永远不必担心金钱——前提是你至少能坚持1年。
- en: Becoming Valuable
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成为有价值的人
- en: In the material world, your perceived value is correlated with the *amount*
    of problems you solve. In the personal sense — improving yourself within the eternal
    markets (health, wealth, and relationships) turns you into a “high-value” individual.
    People gravitate towards you because you fill a hole in their life. You solve
    a problem.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在物质世界中，你的感知价值与你能解决的*问题数量*相关。在个人层面——在永恒的市场（健康、财富和关系）中提升自己，让你成为一个“高价值”的个人。人们会向你靠近，因为你填补了他们生活中的空白。你解决了问题。
- en: In the business world, these ‘improvements’ translate into the ability to solve
    biological problems for others — as you’ve already solved them for yourself. The
    thing is, you need to understand how to package up and communicate this value.
    You need to attract people. Followers. Prospects. Customers.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业世界中，这些“改进”转化为解决他人生物问题的能力——正如你已经为自己解决了这些问题。问题是，你需要了解如何包装和传达这种价值。你需要吸引人们。追随者。潜在客户。顾客。
- en: Improving yourself is only one piece of the puzzle. It relates to an education
    business more than anything. Coaching, programs, digital products, and the rest.
    This is tertiary but necessary to set the scene. It takes time to be able to monetize
    these skills — because it takes time to solve these problems for yourself.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 提升自己只是拼图中的一块。这比教育业务更相关。辅导、项目、数字产品等等。这是次要的但必要的，以设定场景。需要时间才能将这些技能货币化——因为需要时间来解决你自己的问题。
- en: 'While you are improving yourself, here are the skills you should acquire:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在提升自己的时候，以下是你应该掌握的技能：
- en: '**Evergreen Skills**'
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**常青技能**'
- en: There are an abundance of skills that content creators create a lot of noise
    about. Yelling at you to learn them so you can pull in some kind of online income.
    I want to take it back to the root. The skills that will have the most impact
    and fast-track your way to monetizing anything you want.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 内容创作者们创造了许多关于技能的噪音。他们大声呼吁你学习这些技能，以便你能吸引某种在线收入。我想回到根本。那些将产生最大影响并快速让你实现任何你想要的货币化的技能。
- en: There are 2 categories within the evergreen skills that will *always* hold value.
    They allow you to create and display your offerings to the open market.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在常青技能中有两个类别将*始终*保持价值。它们允许你创建并向公开市场展示你的产品。
- en: '![](../Images/c22ff048eb885886e7e3cd0146b12ffa.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c22ff048eb885886e7e3cd0146b12ffa.png)'
- en: Evergreen Skill Tree
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 常青技能树
- en: The first category I call **The Medium.** There are two mediums. Writing and
    speaking. Writing is the foundation of proper, articulate speaking and should
    be understood first. Writing — the written word — is how you organize and deliver
    your thoughts in the modern world. Communication with other human beings — in
    its root form — is writing.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我将第一个类别称为**媒介**。有两种媒介。写作和演讲。写作是正确、清晰演讲的基础，应该首先理解。写作——书面文字——是你如何在现代世界中组织和传达你的思想。与他人的沟通——在其根本形式上——就是写作。
- en: There are an abundance of resources online to learn how to write. I will teach
    you how to learn in future issues of this letter, but I can and will not give
    you step-by-step advice. That defeats the purpose of the entire journey. If I
    give you exact steps — as you will learn — it will not be fulfilling. You will
    quit as fast as you started. You need to let curiosity drive you. Start the snowball
    of momentum through self-education and diving into the unknown. Once you learn
    to walk, you can run. Once you learn to write, you can speak.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在线有大量资源可以学习如何写作。我将在未来几期信件中教您如何学习，但我不能，也不会给您提供一步一步的指导。那会违背整个旅程的目的。如果我给您具体的步骤——正如您将学到的——那将不会令人满意。您会像开始一样快速放弃。您需要让好奇心引导您。通过自我教育和深入未知领域来启动动量的雪球。一旦您学会了走路，您就可以奔跑。一旦您学会了写作，您就可以说话。
- en: The second category of evergreen skills is **The Message***.* Marketing and
    sales. How you write and speak to capture attention — the focus of others — to
    promote your solution. These are umbrella labels for understanding advertising,
    psychology, human nature, capturing attention, and what drives our decision-making.
    Without an understanding of these, you cannot write or speak effectively. You
    can learn a lot about these skills through self-awareness and observation of others.
    Paying attention to what they focus on and why they focus on it.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 永恒技能的第二类是**信息**。营销和销售。您如何写作和说话来吸引注意力——他人的关注——来推广您的解决方案。这些是理解广告、心理学、人性、吸引注意力和驱动我们决策因素的总称标签。没有对这些的理解，您无法有效地写作或说话。您可以通过自我意识和观察他人来学习很多关于这些技能的知识。关注他们关注什么以及为什么关注它。
- en: This is how you warm people up to your value. This is how you spark behavior
    change. Behavior change is the only metric that matters. Why? It means they will
    see positive results in their life. This is how you get paid for your efforts.
    Without marketing and sales, you will not make an income.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是您如何让人们认识到您的价值。这就是您如何激发行为改变。行为改变是唯一重要的指标。为什么？这意味着他们将在生活中看到积极的结果。这就是您为您的努力获得报酬的方式。没有营销和销售，您将无法赚取收入。
- en: For some, these have a negative connotation because you have had a negative
    experience with them. Your negative focus on a message with negative energy created
    a negative reaction. Detach from this belief and see these skills for what they
    are — a way to spread your positive message and solve the deep problems of others.
    If you don’t market and sell your solution, you will market and sell others’ solutions
    for life.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一些人来说，这些技能有负面含义，因为您与他们有过负面经历。您对带有负面能量的信息的负面关注产生了负面反应。摆脱这种信念，看看这些技能的本质——这是一种传播您积极信息并解决他人深层问题的方法。如果您不营销和销售您的解决方案，您将一生都在营销和销售他人的解决方案。
- en: Writing, speaking, marketing, and sales are the 4 skills that will set you up
    for a lucrative online career. If you pursue these through your own curiosity
    and *don’t* find a path to take… I don’t know what to tell you.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 写作、演讲、营销和销售是四种将为您铺就一份有利可图的在线职业生涯的技能。如果您通过自己的好奇心追求这些技能，却找不到一条可行的道路……我不知道该对您说什么。
- en: '**Shameless-mid-newsletter-plug**: Marketing and sales are the core teachings
    of the business side of [Modern Mastery HQ.](https://join.modernmastery.co/?utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter)
    Hundreds of resources, courses, roadmaps, and personalized support for you to
    find your lucrative path.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**无耻的中期信件插播**：营销和销售是[现代精通总部](https://join.modernmastery.co/?utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter)商业方面的核心教学。数百种资源、课程、路线图和个性化支持，帮助您找到您的有利可图之路。'
- en: '**Complimentary Skills**'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**补充技能**'
- en: Complementary skills allow you to further the impact of evergreen skills. Photography,
    videography, web and graphic design, technical proficiency, audio engineering,
    business management, and the rest.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 补充技能使您能够进一步扩大永恒技能的影响力。摄影、视频制作、网页和图形设计、技术熟练度、音频工程、商业管理和更多。
- en: Understanding these skills one-by-one will amplify the effect of your evergreen
    skills and vice versa. They are the *creative, technical, and business skills
    that allow you to display, visualize, and scale the impact of your evergreen skills.*
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 逐一理解这些技能将放大您永恒技能的效果，反之亦然。它们是*创造性、技术性和商业技能，使您能够展示、可视化和扩展您永恒技能的影响力*。
- en: 'These are what the majority of people learn first. The downside: they never
    learn to build online leverage or sell their products and services for a high
    price online. They fall into the “starving artist” trap. Avoid this at all costs
    by prioritizing evergreen skill acquisition.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是大多数人首先学习的。缺点是，他们从未学会在线建立杠杆或以高价在线销售他们的产品和服务。他们陷入了“饥饿艺术家”的陷阱。通过优先考虑常青技能的获取，不惜一切代价避免这种情况。
- en: Your evergreen skills can be used to market, sell, and monetize your complementary
    skills. All of these skills can be used to display your value relating to your
    interests and problems you’ve solved for yourself. As you trek along your self-education
    journey, these will make themselves apparent. Different projects require different
    complementary skills.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 您的常青技能可以用来推广、销售和货币化您的互补技能。所有这些技能都可以用来展示您与您的兴趣以及您为自己解决的问题相关的价值。随着您在自我教育之旅中前行，这些技能会逐渐显现。不同的项目需要不同的互补技能。
- en: As a one-person business, you must learn many of these to even survive. Most
    of you know my story (and those of many other successful solopreneurs). I tried
    freelancing with multiple different complementary skills. Started a digital art
    page. Multiple eCom brands. And more. Everything changed when [I started building
    an audience, learned marketing and sales, and focused on what would pull in revenue.](https://join.modernmastery.co/?utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter)
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一家一个人的企业，您必须学会许多这些技能才能生存。你们中的大多数人知道我的故事（以及许多其他成功独立创业者的故事）。我尝试了使用多种不同的互补技能进行自由职业。开设了数字艺术页面。多个电子商务品牌。还有更多。当我开始建立受众、学习营销和销售，并专注于能带来收入的事情时，一切都变了。[我开始建立受众，学习营销和销售，并专注于能带来收入的事情。](https://join.modernmastery.co/?utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter)
- en: '**A Note On Saturation**'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**关于饱和的注意事项**'
- en: Most eternal markets *are* saturated. There are a lot of competitors. Most of
    them are beginners. Most of them have not even hit the “valuable” stage. Very
    few are above average in the evergreen skills.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数永恒的市场*都是饱和的*。竞争者很多。其中大多数是初学者。大多数甚至还没有达到“有价值”的阶段。在常青技能方面，非常少数人高于平均水平。
- en: I do not want you to get discouraged as we dive into irreplaceability. That
    is a temporal game. It takes time. Understand that you can make an exceptional
    amount of money with curiosity, evergreen skills, and a few complementary skills.
    They all bleed into each other. They are interconnected.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们深入探讨不可替代性时，我不想让您感到气馁。这是一个时间性的游戏，需要时间。请理解，您可以通过好奇心、常青技能和少数互补技能赚取大量的金钱。它们相互渗透，相互关联。
- en: '**Becoming Irreplaceable**'
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**成为不可替代**'
- en: To earn a living wage (not *surviving* wage), you must become valuable. To generate
    infinite income, you must become irreplaceable. In today’s world, becoming valuable
    is synonymous with being a commodity. Everyone can offer some form of value in
    terms of the skills they’ve acquired. Few can offer an irreplaceable stack of
    specific, applicable skills and knowledge to a unique situation that gets results.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 为了赚取生活工资（而不是*生存*工资），您必须变得有价值。为了产生无限收入，您必须变得不可替代。在当今世界，变得有价值等同于成为商品。每个人都可以提供一些形式的价值，即他们所获得的技能。很少有人能够提供一组独特的、适用于特定情况的具体技能和知识，并能取得成果。
- en: The ability to guarantee that a problem is solved through a system of your design.
    Skill acquisition is necessary as we have discussed, but specific knowledge allows
    you to utilize those skills to the highest magnitude. You are able to fill the
    holes that others were not able to fill. **If you want to become valuable, know
    the rules. If you want to become irreplaceable, know when to break them.**
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 通过您设计的系统确保问题得到解决的能力。正如我们之前讨论的那样，技能获取是必要的，但具体知识使您能够充分利用这些技能。您能够填补其他人无法填补的空白。**如果您想变得有价值，了解规则。如果您想变得不可替代，了解何时打破规则。**
- en: '![](../Images/9351fa7b7de3dab4f4ff7fe715ccfa5b.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9351fa7b7de3dab4f4ff7fe715ccfa5b.png)'
- en: The Skill Matrix
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 技能矩阵
- en: This is where the eternal markets, learning, solving your own problems, and
    experience come into play. Becoming irreplaceable is less about what problem you
    solve and more about how you solve it. I will be writing a letter about The Solutions
    Economy and The Experience Model in the coming weeks — but for now, understand
    that your ability to *apply knowledge* through your skillset is what matters.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是永恒市场、学习、解决自己的问题以及经验发挥作用的地方。变得不可替代更多的是关于您解决什么问题，而不是您如何解决问题。在接下来的几周里，我将撰写关于解决方案经济和经验模型的一封信——但就目前而言，请理解，您通过您的技能集应用知识的能力才是最重要的。
- en: Big players are irreplaceable because of their vast experience. They solved
    their own problems > gained experience > started a service business (consulting,
    coaching, freelancing) > gained experience + started developing their own unique
    system for getting results > added a dash of persistence and iteration > productized
    their system > repeated the cycle.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 大玩家因为他们的丰富经验而不可替代。他们解决了他们自己的问题 > 获得经验 > 开始服务业务（咨询，辅导，自由职业）> 获得经验 + 开始开发他们自己独特的获得结果系统
    > 加入了一点点坚持和迭代 > 产品化他们的系统 > 重复这个循环。
- en: 'Going even further: the path to irreplaceability involves open-mindedness (being
    able to pivot and learn), studying all surrounding areas of your main offering,
    researching all sides, not becoming dogmatic about one way of doing things, etc.
    If you put yourself in a box, your income will remain in a box. Capped.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 更进一步：不可替代的道路涉及开放的心态（能够转向和学习），研究你主要提供服务的所有周边领域，研究所有方面，不要对某一种做事方式变得教条，等等。如果你把自己局限在一个框框里，你的收入也会局限在框框里。受限。
- en: '*Jack of all trades, master of one.*'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '*样样通，样样精*。'
- en: Rather than focusing all of your energy on increasing your income — you must
    focus on increasing your income *while* reducing your time invested. Constantly
    iterating, systemizing, productizing, and not settling because you hit $20,000/month
    as a service business. Especially when you can hit $1 million/month while working
    less.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是将你所有的精力都集中在增加收入上——你必须专注于在减少投入时间的同时增加收入。不断迭代，系统化，产品化，不要因为你的服务业务达到每月$20,000就满足，尤其是当你可以工作更少的时间达到每月$1百万时。
- en: Many have not reached this level. I do not want to confuse or overwhelm you.
    Start with the evergreen and complementary skills. Start building leverage by
    growing an audience. Start a service business, help for free, and develop your
    system. The path will reveal itself to you after.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人还没有达到这个水平。我不想让你困惑或不知所措。从永恒的、互补的技能开始。通过扩大受众来建立杠杆。开始服务业务，免费提供帮助，并发展你的系统。之后，道路会向你显现。
- en: As always, if you want step-by-step processes, strategies, and my 3 beginner
    courses (starting a service business, growing an audience, and building digital
