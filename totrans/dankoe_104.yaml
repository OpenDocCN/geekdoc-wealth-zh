- en: Most People Are Lost (How To Ruin Your Life, Fast)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 大多数人迷失了方向（如何快速毁掉你的生活）
- en: 原文：[https://thedankoe.com/letters/most-people-are-lost-how-to-ruin-your-life-fast/](https://thedankoe.com/letters/most-people-are-lost-how-to-ruin-your-life-fast/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/most-people-are-lost-how-to-ruin-your-life-fast/](https://thedankoe.com/letters/most-people-are-lost-how-to-ruin-your-life-fast/)
- en: 'The fastest way to ruin your life:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 毁掉你生活的最快方式：
- en: Do what others want for you.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 做别人希望你做的事情。
- en: Never question what you’re told.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 从不质疑你所被告知的事情。
- en: Take the route that seems safe on the surface, but is the least safe of them
    all.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 选择表面上看似安全的路线，但实际上是最不安全的。
- en: Avoid the essence of life – trial and error – and close yourself off to the
    profound, the deep, and the meaningful.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 避免生命的本质——试错——并且关闭你对深刻、深邃和有意义的事物的接触。
- en: The greatest mistake of all is not making any mistakes.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 最大的错误就是不做任何错误。
- en: This is the life of the masses.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是大众的生活。
- en: Bouncing around on the surface.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在表面上弹跳。
- en: Only learning what they’re taught in school.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 只学习他们在学校里学到的东西。
- en: Only experiencing the same day over and over again.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 只是一天又一天地重复同样的经历。
- en: Clock in, clock out, and fill the rest of your day numbing your mind from the
    thought of what will happen between tomorrow.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 上班打卡，下班打卡，然后在剩下的时间里麻木你的思维，不去想明天会发生什么。
- en: The path out of meaningless living is already available to you. Deep in your
    core.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 脱离无意义生活的道路已经在你内心深处。
- en: We all have access to Nature’s Compass.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都可以使用自然指南针。
- en: Nature’s Compass
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自然指南针
- en: If you don’t know what you want, you will be told what you want, and you will
    believe it. [– The Art of Focus](https://theartoffocusbook.com)
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你不知道你想要什么，你会被告知你想要什么，你会相信它。[– 专注的艺术](https://theartoffocusbook.com)
- en: 'How to do whatever you want:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 如何做你想要做的事情：
- en: Do what you want, but don’t ignore the consequences of your actions.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 做你想做的事情，但不要忽视你行动的后果。
- en: You have to do what you think you want to realize what you don’t want. You have
    to remove what you don’t want to do what you really want.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须做你认为你想做的事情，才能意识到你不想做的事情。你必须去除你不想做的事情，才能做你真正想做的事情。
- en: It is impossible to know with absolute certainty what is going to happen in
    the future.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 要绝对确定未来会发生什么是不可能的。
- en: This is why the masses flock to “secure” jobs and belief systems.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么大众都涌向“安全”的工作和信仰体系。
- en: It’s an illusion of certainty to avoid struggle. You can’t skip making mistakes.
    Mistakes are your light in the dark. Mistakes reveal problems to be solved. Problems
    are the limits on your mind.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 避免斗争的确定性是一种错觉。你不能跳过犯错误。错误是你在黑暗中的光明。错误揭示了需要解决的问题。问题是你的思维的限制。
- en: As Einstein said, “You can’t solve a problem with the same mind that created
    it.”
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 就像爱因斯坦说的，“你不能用创造问题的同一思维来解决它。”
- en: Most people skip that part.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人都跳过了那部分。
- en: They think they want a nice car, cushy job, and to travel the world – but once
    they do those things, the superficial shine fades fast.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 他们认为他们想要一辆好车，一份舒适的工作，以及环游世界——但一旦他们做了这些事情，表面的光鲜很快就会消失。
- en: They continue convincing themselves that’s the life they want, never evolve,
    never pursue anything deeper, and never get what they really want.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 他们继续说服自己，那就是他们想要的生活，从不进化，从不追求更深层次的东西，也从不得到他们真正想要的东西。
- en: That is, they never get what their nature wants, not what their ego wants.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 即，他们从未得到他们本性所想要的，而不是他们自我所想要的。
- en: 'To get what you want out of life:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 要从生活中得到你想要的东西：
- en: Pursue what you think you want
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 追求你认为你想要的东西。
- en: Realize what you don’t want
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解你不想做的事情。
- en: Become aware of that problem
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意识到那个问题。
- en: Sit with it, study it, dissect it
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与其相伴，研究它，剖析它。
- en: Expand your mind to see beyond it
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 扩展你的思维，超越它。
- en: Solve the problem to evolve one level
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解决问题以进化一个层次。
- en: Repeat the process until you reach the essence of life itself
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重复这个过程，直到你达到生命的本质。
- en: There is absolutely no set path that someone can give you to accomplish this.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人能给你一条明确的路径来实现这一点。
- en: People can give you direction with advice and tips, but they can’t act, think,
    or solve problems for you.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 人们可以给你提供方向，给你建议和提示，但他们不能为你行动，思考或解决问题。
- en: You don’t know what you want out of life because you haven’t tried anything.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 你不知道你从生活中想要什么，因为你没有尝试过任何事情。
- en: You’re not getting results because you don’t have the skill required to get
    those results.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有得到结果，因为你没有获得那些结果所需的技能。
- en: You don’t know what’s possible because you haven’t exposed yourself to the perspective
    that makes it possible.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 你不知道什么是有可能的，因为你没有接触到让你觉得可能性的观点。
- en: What you want right now may be completely different tomorrow, or next month,
    or next year.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在想要的可能明天、下个月或明年完全不同。
- en: Nothing lasts forever. Meaning is found in endless problem-solving until you
    drill so deep you find what you are looking for.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 没有什么是永恒的。意义在于无休止的解决问题，直到你挖掘到你所寻找的东西。
- en: This is normal. This is life.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这是正常的。这是生活。
- en: The Macro Cycle Of Life – Why You Always Feel Lost
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生活的宏观周期——为什么你总是感到迷茫
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1856">![](../Images/7955a53a9990577250becdff2f5ba82c.png)</picture>
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-1856">![](../Images/7955a53a9990577250becdff2f5ba82c.png)</picture>
- en: You feel lost because you don’t know what to do next.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 你感到迷茫，因为你不知道接下来该做什么。
- en: You don’t know what to do next because you don’t have a goal.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 你不知道接下来该做什么，因为你没有目标。
- en: You don’t have a goal (that you care about) because you aren’t aware of a problem
    that demands your focus.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有目标（你关心的目标），因为你没有意识到需要你关注的某个问题。
- en: Stop worrying about setting goals until you identify the next problem you want
    to solve in your life.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在你确定你生活中下一个想要解决的问题之前，不要担心设定目标。
- en: Life unfolds in chapters, phases, and cycles.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 生活以章节、阶段和周期展开。
- en: Your life is a story.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 你的生活是一个故事。
- en: Your year is a story.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 你的年份是一个故事。
- en: Your day is a story.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 你的日子是一个故事。
- en: Each of them have a series of goals, problems, highs, and lows that may repeat
    themselves as time passes.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 它们各自有一系列的目标、问题、高潮和低谷，这些可能随着时间的推移而重复。
- en: There is one macrocycle of life.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 生活中有一个宏观周期。
- en: Once you understand it, you can identify which part of the story you are in,
    become aware of its components, and ease your mind until you enter the next phase.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你理解了它，你就可以确定你在故事中的哪个部分，了解其组成部分，并让你的心情平静下来，直到你进入下一个阶段。
- en: 'The cycle is composed of 3 phases:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这个周期由三个阶段组成：
- en: '**You feel lost.** You don’t know what to pursue next. You’ve solved a problem,
    achieved a goal, and thought it was the end.'
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**你感到迷茫**。你不知道接下来该追求什么。你已经解决了问题，实现了目标，并认为这是终点。'
- en: '**You become curious.** You experiment with different topics, interests, and
    ideas until you become fully aware of the problem you want to solve.'
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**你变得好奇**。你尝试不同的主题、兴趣和想法，直到你完全意识到你想要解决的问题。'
- en: '**You become obsessed.** You dive deeper into the crevice of reality of your
    choice. You can’t stop learning and building toward your goal.'
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**你变得着迷**。你深入到你选择的现实裂缝中。你无法停止学习和朝着你的目标前进。'
- en: 'When you feel lost, you must force yourself to experiment in 2 directions:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 当你感到迷茫时，你必须强迫自己在两个方向上实验：
- en: '**1) Experiment Inward**'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 内向实验**'
- en: Rest. Nap. Journal. Walk. Embrace silence.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 休息。小睡。写日记。散步。拥抱寂静。
- en: Observe and deconstruct your thoughts.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 观察并分解你的思想。
- en: Attempt to catch a signal of opportunity.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试捕捉机会的信号。
- en: Follow your thoughts to a root problem.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 跟随你的思想到一个根本问题。
- en: '**2) Experiment Outward**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 外向实验**'
- en: Learn. Read. Scroll. Build. Try new things.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 学习。阅读。滚动。构建。尝试新事物。
- en: Refocus on the only things that matter in life.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 重新关注生活中唯一重要的事情。
- en: Health, wealth, relationships, happiness.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 健康、财富、关系、幸福。
- en: Experiment with techniques that invest energy into a goal. Any goal.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试投资于任何目标的技巧。任何目标。
- en: During the experimentation phase, you are trying to accumulate new experience
    until your next quest becomes visible.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在实验阶段，你试图积累新的经验，直到你的下一个目标变得可见。
- en: Like a video game, you are at a point where the quest isn’t unlocked, but you
    don’t have any other to pursue. You have to fumble around in the dark until you
    find a candle off in the distance.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 就像一款视频游戏，你处于一个任务尚未解锁但也没有其他任务可追求的点。你必须摸索在黑暗中，直到你在远处找到一支蜡烛。
- en: 'Note: avoid labeling this as shiny object syndrome.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：避免将此标签为闪亮物体综合症。
- en: My business today is only possible because I tried and “failed” at 7 different
    business models. In reflection, those failures were periods of skill stacking,
    problem solving, and increasing my awareness surface area for the right opportunities.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我今天的事业之所以可能，仅仅因为我尝试了7种不同的商业模式并“失败”。在反思中，那些失败是技能堆叠、解决问题和增加我对正确机会感知面积的阶段。
- en: Now, understand that there is no time limit for this phase.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，理解这个阶段没有时间限制。
- en: It could last weeks, months, or years.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 它可能持续几周、几个月或几年。
- en: You must stick it out until you accumulate enough vision to stop going wide
    and start going deep.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须坚持下去，直到你积累足够的视野来停止广泛探索并开始深入探索。
- en: When you find your obsession, experimentation doesn’t stop.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 当你找到你的着迷之处，实验就不会停止。
- en: '**3) Experiment Downward**'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 向下实验**'
- en: The secret is to try everything until you find that one thing that you can’t
    pull yourself away from. Then, once it becomes a normal part of your life, repeat
    the process.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 秘诀在于尝试一切，直到找到那件让你无法自拔的事情。然后，一旦它成为你生活的一部分，就重复这个过程。
- en: When you find that one thing, go deep.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 当你找到那件事时，深入挖掘。
- en: Learn everything you can about that domain.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 尽可能多地了解那个领域的知识。
- en: Dissect all perspectives and avoid becoming dogmatic about one.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 分析所有观点，避免对某一观点过于教条。
- en: In nutrition, collect truth from veganism, keto, carnivore, Ray Peat, flexible
    dieting, and other ideologies until you are confident enough to create your own
    that is closer to truth. Truth is a process not a commandment.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在营养方面，从素食主义、生酮饮食、食肉主义、雷·皮特、灵活饮食和其他意识形态中收集真理，直到你足够自信地创造出更接近真理的自己的理念。真理是一个过程，而不是一条命令。
- en: In business, collect truth from e-commerce, freelancing, software, and other
    models until you note the principles that bring clarity to your own endeavors.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业中，从电子商务、自由职业、软件和其他模式中收集真理，直到你注意到能为你自己的事业带来清晰度的原则。
- en: Self-experimentation is the only way to solve your problems for good.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 自我实验是解决你问题的唯一方法。
- en: People can diagnose and prescribe a solution to your problems, but that lacks
    regard for the difference in perspective, goals, and experience from those prescribing
    the solutions.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 人们可以诊断并为你提供解决方案，但这缺乏对那些提供解决方案的人的视角、目标和经验的考虑。
- en: '**4) Experiment Upward**'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 向上实验**'
- en: Persistence and iteration.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 持之以恒和迭代。
- en: I’m assuming that once you’ve found your obsession you want to make it a consistent
    part of your life.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我假设一旦你找到了你的痴迷，你希望让它成为你生活中的一致部分。
- en: This means you must earn a creative income from that interest.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着你必须从那个兴趣中获得创造性收入。
- en: 'In today’s world, that means:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今世界，这意味着：
- en: Building a project to spread to help others solve their problems.
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立一个项目来帮助他人解决问题。
- en: Teaching in public to attract people with those problems.
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向公众教学以吸引有那些问题的人。
- en: Selling your project so you can continue pursuing your obsession.
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过出售你的项目来继续追求你的痴迷。
- en: Improving your project as you learn what can only be learned through feedback.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在你学习只能通过反馈才能学到的东西的同时，改进你的项目。
- en: Evolving to a new project when you’ve reached the level that can only be reached
    through business.
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你达到只能通过商业达到的水平时，转向一个新的项目。
- en: There are many ways to do this. Experiment.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 有很多种方法可以做到这一点。尝试。
- en: But I can tell you with confidence, through my experimentation, that the creator
    economy is the “most true” model to follow considering human nature and the future
    of work.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 但我可以自信地告诉你，通过我的实验，创作者经济是考虑到人类本质和未来工作的“最真实”模式。
- en: The Digital Renaissance
  id: totrans-101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数字文艺复兴
- en: <picture decoding="async" class="wp-image-1857">![](../Images/0db151e65261fd3dbd55e50222bfd81b.png)</picture>
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-1857">![](../Images/0db151e65261fd3dbd55e50222bfd81b.png)</picture>
- en: 'We are living through a second Golden Age and it belongs to those who value:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在经历第二个黄金时代，它属于那些重视：
- en: Self-education
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自我教育
- en: Self-experimentation
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自我实验
- en: Multidisciplinary study
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跨学科研究
- en: Digital leverage
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数字杠杆
- en: Skill acquisition
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技能获取
- en: Building your own thing
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建自己的事物
- en: If you want to thrive, become a digital renaissance man.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要繁荣，成为一个数字文艺复兴人。
- en: 'Here’s what you do:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你要做的：
- en: Join The New Society
  id: totrans-112
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加入新社会
- en: Social media is not just an app on your phone.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体不仅仅是你的手机上的一个应用程序。
- en: It is a decentralized public school, marketplace, and podium but only for those
    who value personal responsibility. You aren’t forced to be a part of this society,
    and that’s why it’s important.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 它是一个去中心化的公立学校、市场和讲台，但只对那些重视个人责任的人开放。你不必被迫成为这个社会的一部分，这就是为什么它很重要。
- en: You no longer need startup capital to start a business.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 你不再需要启动资金来创业。
- en: You no longer need a job board to find a career.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 你不再需要招聘网站来找到一份职业。
- en: You no longer need a publisher to launch a book.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 你不再需要出版社来出版书籍。
- en: You no longer need a record label to make music.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 你不再需要唱片公司来制作音乐。
- en: You no longer need formal education to become an expert.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 你不再需要正规教育来成为专家。
- en: You no longer need religious institutions to feed you meaning.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 你不再需要宗教机构来赋予你意义。
- en: The centralized authority over learning, meaning, and earning is only a thing
    for those who are still asleep.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 对学习、意义和收入的集中式权威只属于那些仍在沉睡的人。
- en: All you need is an internet connection, social media account, and the courage
    to teach, fail, improve, and persist.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 你所需要的只是一个互联网连接、社交媒体账户，以及教学、失败、改进和坚持的勇气。
- en: I teach this in [2 Hour Writer](https://2hourwriter.com) & [Digital Economics](https://digitaleconomics.school).
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 我在[2小时作家](https://2hourwriter.com)和[数字经济学](https://digitaleconomics.school)中教授这一点。
- en: Become Valuable
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 变得有价值
- en: Everyone tells you to become valuable but nobody tells you what value is.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都告诉你变得有价值，但没有人告诉你价值是什么。
- en: Value is the relationship between what you do, why you do it, how you do it,
    and who benefits from that equation.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 价值是你所做之事、你为什么这样做、你如何做以及谁从那个等式中受益之间的关系。
- en: Value is composed of 4 parts.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 价值由4个部分组成。
- en: '**Problem** – A limitation or challenge that creates pain when unsolved.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问题** – 当未解决时，会带来痛苦的限制或挑战。'
- en: '**Solution** – An impactful end result that allows the recipient to evolve
    beyond the problem.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案** – 一个有影响力的最终结果，使接收者能够超越问题。'
- en: '**Clarity** – A creative system that breeds knowledge, skill, and awareness
    to bridge the gap between problem and solution.'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**清晰度** – 一个创造性的系统，通过知识、技能和意识来弥合问题和解决方案之间的差距。'
- en: '**People** – The amount of people that suffer from the problem, can benefit
    from the solution, and are ready to receive the clarity to act.'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人们** – 受问题困扰的人数，可以从解决方案中受益，并且准备好接受采取行动的清晰度。'
- en: Value is experience exchange.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 价值是经验交换。
- en: Value is the impact of your story.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 价值是你故事的影响力。
- en: So, to make a creative income, our job is to gain experience by solving the
    problems that prevent our evolution and pass down the condensed wisdom to those
    who are ready to receive it.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为了创造收入，我们的工作是通过解决阻碍我们进化的问题来积累经验，并将浓缩的智慧传授给那些准备好接受的人。
- en: '**1) Unveil Problems With An Anti-Vision**'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 用反愿景揭示问题**'
- en: It’s easier to know what you don’t want – from experience – than it is to know
    what you want – from imagination.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 从经验中知道你不想做什么比从想象中知道你想要什么更容易。
- en: So, create an anti-vision for your future.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为你的未来创造一个反愿景。
- en: 'Keep a running note that you will add to as you observe life:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 保持一个持续记录，随着你观察生活，你会添加内容：
- en: What do you **not** want to look like?
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不希望看起来是什么样子？
- en: How do you **not** want to feel?
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不希望感觉如何？
- en: What does your **worst** day look like?
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的**最糟糕的一天**是什么样子？
- en: What qualities do you **not** want in your friends, customers, partner, and
    co-workers?
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不希望在朋友、客户、合作伙伴和同事身上看到哪些品质？
- en: How much money **isn’t** enough to survive?
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多少钱**不足以**生存？
- en: How does everything above spread into each area of your life and prevent you
    from doing what you want?
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上述所有内容是如何渗透到你的生活的每个领域，并阻止你做你想做的事情的？
- en: Hit on the things that matter. Health, wealth, relationships, and happiness.
    Those are the eternal markets in business. If you build a creative solution for
    a problem within those domains, you won’t have a problem making a living from
    your experience.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 关注重要的事情。健康、财富、关系和幸福。这些都是商业中的永恒市场。如果你为这些领域内的一个问题构建一个创造性的解决方案，你将不会在从你的经验中谋生时遇到问题。
- en: '**2) Identify Solutions With A Vision**'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 用愿景识别解决方案**'
- en: You now have a plethora of problems to solve to gradually increase your value.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在有许多问题要解决，以逐渐增加你的价值。
- en: Pick one. Solve it. Move on to the next. Meaning is found not in the achievement
    of a goal, but in solving the endless string of problems that pull you deeper
    into the nature of reality.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个。解决它。继续下一个。意义不在于目标的实现，而在于解决那些让你更深入现实本质的无尽问题。
- en: Now, to increase your desire to solve it, create a vision for your ideal future.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，为了增加你解决它的愿望，为你的理想未来创造一个愿景。
- en: Write out the opposite of everything you listed for your anti-vision.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 为你的反愿景列出你所列出的所有内容的反面。
- en: Treat this as a Minimum Viable Vision. You will add to it with time. What you
    want will change as you do.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 将其视为一个最小可行愿景。随着时间的推移，你会不断添加内容。你的愿望会随着你的成长而改变。
- en: '**3) Learn & Build For Clarity**'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 为了清晰度学习和构建**'
- en: Don’t learn to build, build to learn.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 先学会构建，再通过构建来学习。
- en: You’ve chosen a problem you want to solve in your life. This could be related
    to fitness, finances, freedom, or anything else that is preventing you from living
    the life you want.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经选择了你生活中想要解决的问题。这可能与你想要的生活相关，如健身、财务、自由或其他任何阻碍你过上想要的生活的事情。
- en: With that problem in mind, laser in on one big goal.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 在考虑这个问题时，集中精力在一个大的目标上。
- en: But remember, goals don’t start out magnetic. You probably don’t care about
    the goal.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 但记住，目标一开始并不是有吸引力的。你可能并不关心目标。
- en: You must invest energy into the goal until you feel as if you are wasting resources
    for not achieving it. Your goal must frame your perspective for enough time to
    register reasons to continue pursuing it.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须投入精力到目标中，直到你感觉如果不实现它就是在浪费资源。你的目标必须足够长时间地塑造你的视角，以便记录下继续追求它的理由。
- en: You don’t develop an intrinsic philosophy in a day.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 你不可能在一天之内就发展出一种内在的哲学。
- en: You develop it through conversations, reading, listening, and filtering reality
    until you stack enough “whys” to hold you accountable.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过对话、阅读、倾听和过滤现实来发展它，直到你堆叠足够的“为什么”来让你负责。
- en: You will fail. That’s the only way to identify what you need to learn next.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 你会失败。这是唯一识别你需要学习下一步内容的方法。
- en: When you do fail, reframe it immediately as a knowledge gap.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 当你失败时，立即将其重新定义为知识差距。
- en: Use the failure as a new frame to filter your experiences for answers.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 用失败作为新的框架来过滤你的经验以寻找答案。
- en: '**4) Attract People With Your Story**'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 用你的故事吸引人们**'
- en: Be a failure.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 成为失败者。
- en: Launch the project to a crowd of crickets. Publish your thoughts and get called
    a fool. Start the venture and watch people criticize your first moves.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 将项目推向一群蝈蝈。发布你的想法，然后被指责为傻瓜。开始创业，看看人们如何批评你的第一步。
- en: Everyone else did it. You aren’t a special case.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都这样做过。你不是特殊情况。
- en: Invest in your portfolio of failures until you can afford to succeed.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 投资你的失败组合，直到你可以负担得起成功。
- en: Your portfolio of failures is your story.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 你的失败组合是你的故事。
- en: Like a movie, people are interested more in the lows than the highs.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 就像电影一样，人们更感兴趣的是低谷而不是高峰。
- en: You attract people and profit to you when you have the solution to a problem
    in your life.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 当你生活中有一个问题的解决方案时，你会吸引人们和利润。
- en: Distribute Your Value
  id: totrans-171
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分享你的价值。
- en: 'The greatest skill is writing because:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 最大的技能是写作，因为：
- en: It forces you to articulate your value
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它迫使你阐明你的价值。
- en: It is the foundation of all media
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它是所有媒介的基础。
- en: It can be repurposed into any other medium
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它可以被改编成任何其他媒介。
- en: Any other skill you acquire enhances it
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你获得的任何其他技能都会增强它。
- en: It brings immense mental clarity
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它带来了巨大的心理清晰度。
- en: Learn to write.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 学习写作。
- en: It takes time to realize that writing is the highest leverage work.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 认识到写作是最具杠杆作用的工作需要时间。
- en: You must synthesize your value into impactful ideas that live in the heads of
    others rent free and influence their thoughts and behaviors.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须将你的价值综合成其他人头脑中免费存在并影响他们思想和行为的有影响力的想法。
- en: You do this by writing emails, content, guides, and products with persistent
    and iterative effort.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过持续和迭代的努力撰写电子邮件、内容、指南和产品来做这件事。
- en: Writing is the foundation of communication.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 写作是沟通的基础。
- en: Communication is how you distribute value.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 沟通是分享价值的方式。
- en: Distributing value is how you attract people.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 分享价值是吸引人们的方式。
- en: If you don’t attract people, you will never have someone else in the value exchange
    process.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不能吸引人们，你将永远不会有人参与价值交换过程。
- en: This isn’t a job where someone hands you a paycheck for completing mechanical
    tasks that will be replaced.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是一份有人给你发工资来完成将被取代的机械任务的工作。
- en: This is a purpose that must be shared by another in order to earn a creative
    income.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个必须与他人共享的目标，以便赚取创意收入。
- en: I’ve discussed this in previous letters, please go search for them, or we walk
    you through it inside [Kortex University to become a synthesizer in 16 weeks](https://university.kortex.co).
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 我在之前的信件中讨论过这个问题，请去搜索它们，或者我们可以在[Kortex大学](https://university.kortex.co)内部带你成为16周内的合成师。
- en: Thank you for reading this letter.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您阅读这封信。
- en: I hope it helped.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 希望这有所帮助。
- en: Dan
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 丹
