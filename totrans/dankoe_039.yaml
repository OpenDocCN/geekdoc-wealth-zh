- en: How To Profit From Solving Your Own Problems
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何通过解决自己的问题来获利
- en: 原文：[https://thedankoe.com/letters/how-to-profit-from-solving-your-own-problems/](https://thedankoe.com/letters/how-to-profit-from-solving-your-own-problems/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/how-to-profit-from-solving-your-own-problems/](https://thedankoe.com/letters/how-to-profit-from-solving-your-own-problems/)
- en: Ever since I can remember, I’ve been obsessed with doing the impossible.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 从我记事起，我就着迷于做不可能的事情。
- en: Other people were doing what they loved for a living, *why couldn’t I?*
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 其他人在以他们热爱的事情为生，*为什么我不能？*
- en: 'That seems to be the question that determines the success of most leaders,
    creatives, and those we aspire to be like:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这似乎是最能决定大多数领导者、创意人士以及我们渴望成为的人的成功的问题：
- en: '***Why can’t I?***'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '***为什么我不能？***'
- en: As of late, I’ve seen a lot of these phrases on social media.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，我在社交媒体上看到了很多这样的说法。
- en: “Forget about finding your passion.”
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: “别想着找到你的激情。”
- en: “Make money, then study spirituality.”
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: “先赚钱，然后研究灵性。”
- en: “Get a job, then use the money to fuel your passion.”
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: “先找份工作，然后用钱来激发你的激情。”
- en: 'They’re all good advice, and I have my own views on those areas, but from my
    perspective:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 他们都是很好的建议，我对这些领域也有自己的看法，但就我的观点而言：
- en: They may turn people away from well-intentioned pursuits toward a better life.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 它们可能会让人们远离有良好意图的追求，走向更好的生活。
- en: And with the power of the internet, some marketing knowledge, and the ability
    to write an attractive message; you can monetize almost anything. Information,
    physical tools, or manual labor.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 而借助互联网的力量，一些营销知识，以及撰写吸引人信息的能力；你几乎可以货币化任何东西。信息、实体工具或体力劳动。
- en: As mentioned, I’ve always wanted to do the impossible.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我之前提到的，我一直想做一些不可能的事情。
- en: As a kid I was observant of ‘social media influencers’ (I’m not a fan of that
    phrase, bad connotation. In other words, the people that post package up what
    they know and distribute it online).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一个孩子，我观察着“社交媒体影响者”（我不是很喜欢这个短语，有负面含义。换句话说，就是那些在网上发布他们所知道的东西的人）。
- en: They were talking about their interests and teaching others what they knew.
    So I spent 10 years with my head deep in books, courses, projects, and anything
    else that could make their impossible reality my own.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 他们谈论着自己的兴趣，并教授他人他们所知道的知识。所以我花了10年时间，一头扎进书籍、课程、项目和任何其他能让他们不可能的现实成为我自己的事情中。
- en: To most eyes, I have done “the impossible.”
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数人眼中，我已经做到了“不可能的事情。”
- en: I wake up in the morning, write for a few hours, and go about my day doing what
    I want. Building out meaningful projects, hitting the gym, going on long walks,
    and upholding relationships with the select few people I care about the most.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我每天早上醒来，写几个小时，然后按照自己的意愿度过一天。构建有意义的计划，去健身房，进行长途散步，并与我最关心的少数人保持关系。
- en: I’m here to tell you that you *can* do what you love for a living.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里告诉你，你可以将你热爱的事情作为职业。
- en: '[Predictions for the future of work would agree.](Predictions for the future
    of work would agree.)'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '[关于工作未来的预测将会同意这一点。](Predictions for the future of work would agree.)'
- en: '**Finding Purpose By Solving Your Own Problems**'
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**通过解决自己的问题来找到目标**'
- en: '*Understand this:*'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '*理解这一点：*'
- en: Problems aren’t personal.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 问题不是个人的。
- en: '*They are systemic.*'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '*它们是系统性的。*'
- en: Your mind is a system containing systems.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 你的思想是一个包含系统的系统。
- en: Your body is a system containing systems.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 你的身体是一个包含系统的系统。
- en: The universe is a system containing systems.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 宇宙是一个包含系统的系统。
- en: Purpose is the divine force by which you conduct your life.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是引导你生活的神圣力量。
- en: Purpose is the intrinsic energy that makes positive choices seamless.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是使积极选择变得无缝的内生能量。
- en: Purpose is the compass that guides you inward — unmoved by external circumstance.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是引导你向内的指南针——不受外部环境的影响。
- en: '**How do you find your purpose?**'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**你如何找到你的目标？**'
- en: By solving systemic problems, allowing nature to flow as it was meant to.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 通过解决系统性问题，让自然按照其本意流动。
- en: 'Bring these questions to the top of your mind:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 将这些问题带到你的脑海中：
- en: '*What is the big problem you want to solve in the world?*'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '*你想要在世界上解决什么大问题？*'
- en: '*What is the big problem you want to solve in your life?*'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '*你想要在生活中解决什么大问题？*'
- en: With experience, you will realize that the answer to these questions are one
    in the same.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 随着经验的积累，你会意识到这些问题的答案其实是一致的。
- en: At this very moment, what is it? I’ll give an example from my own life.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个当下，那是什么？我会从我的生活中举一个例子。
- en: I am rereading the book *Rest* by Alex Soojung Kim Pang.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在重读亚历克斯·苏钟·金庞的《Rest》一书。
- en: It is an incredible book that is reminding me of my own work philosophy.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一本令人难以置信的书，它让我想起了自己的工作哲学。
- en: By rereading this book, I was reminded of my “why,” a former purpose of mine.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 通过重新阅读这本书，我提醒了自己我的“为什么”，我以前的一个目的。
- en: Reread the books that impacted your life the most, they’ll do it again.
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 重新阅读那些对你影响最大的书籍，它们会再次产生影响。
- en: ''
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [July 7, 2022](https://twitter.com/thedankoe/status/1544975014499319810?ref_src=twsrc%5Etfw)
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年7月7日](https://twitter.com/thedankoe/status/1544975014499319810?ref_src=twsrc%5Etfw)
- en: I had forgotten myself by spending too much time away from myself.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我因为花太多时间离开自己而忘记了自我。
- en: Chances are that the inward pull — where you will find your purpose — is painted
    over with layers of societal opinions, beliefs, and other projections that have
    been hard wired in your brain over years of unconscious living.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 很可能，那个向内的拉力——你将找到你的目的——被社会观点、信仰和其他在你多年无意识生活中根深蒂固的投射所覆盖。
- en: That inward pull, for those that may not understand, can go by many names.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 对于可能不理解的人来说，这种向内的拉力可以有很多名字。
- en: Some call it your higher voice. Some call it your calling. Some call it the
    universe.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人称它为你的更高声音。有些人称它为你的召唤。有些人称它为宇宙。
- en: For now, we will call in ***The Pull***.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将称之为***拉力***。
- en: <picture fetchpriority="high" decoding="async" class="wp-image-688">![](../Images/9e1bf96c8de0adac7ad42a236a17c2df.png)</picture>
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/9e1bf96c8de0adac7ad42a236a17c2df.png)'
- en: You increase the strength of The Pull by peeling back the layers that are suppressing
    it.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 通过剥去抑制它的层，你将增强拉力的强度。
- en: That means working from external to internal.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着从外部到内部工作。
- en: From superficial to profound.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 从表面到深刻。
- en: Surface level to the core.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 从表面到核心。
- en: Tip of the iceberg to the bottom of the ocean.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 冰山一角到海底。
- en: Don’t let the depths scare you off, there’s a reason it isn’t crowded.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 不要让深度吓到你，它之所以不拥挤，是有原因的。
- en: '**What problems are begging to be solved in your life right now?**'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**你现在生活中最迫切需要解决的问题是什么？**'
- en: Do you have self-esteem issues? Hit the gym.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 你有自尊问题吗？去健身房。
- en: Do you have money problems? Get a better job or start a low risk business.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 你有金钱问题吗？找一份更好的工作或者开始一个低风险的业务。
- en: By working your way up Maslow’s Hierarchy Of Needs, *you reveal the way inward
    toward your deepest purpose.*
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 通过攀登马斯洛的需求层次，*你揭示了通向你最深层次目的的道路。*
- en: <picture decoding="async" class="wp-image-689">![](../Images/073ff58f08784565de3bf58b593e9711.png)</picture>
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/073ff58f08784565de3bf58b593e9711.png)'
- en: Don’t know how to do any of this? I shouldn’t have to mention this if you are
    a reader of mine… but, **self-education.**
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 你不知道如何做这些？如果你是我的读者，我就不必提这个……但是，**自我教育。**
- en: LEARN. It is the most foundational human drive that modern distractions have
    hijacked.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 学习。这是现代干扰所劫持的最基础的人类驱动力。
- en: You have the Library Of Alexandria staring you straight in the face.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 你面前就是亚历山大图书馆。
- en: It will take some digging, of course. You will not find all of the answers after
    a few days of research.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这将需要一些挖掘。几天的研究后，你不会找到所有答案。
- en: Your problems will get better.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 你的问题会变得更好。
- en: You will see the futility in surface level external pursuits.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 你将看到表面层次的外部追求的无意义。
- en: You will have a (good) desire to explore the depths of your being.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 你将会有一个（好的）愿望去探索你内在的深度。
- en: You will adopt and shed macro and micro purposes for a lifetime until you uncover
    your life’s purpose.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 你将终身采纳和放弃宏观和微观的目的，直到你发现你的人生目的。
- en: The Vessel For Purpose, Growth, and Impact
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 目的、成长和影响力的载体
- en: So far we’ve knocked out 2 birds with 1 stone.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们一石二鸟。
- en: Finding purpose, personal growth, and the plethora of benefits that come along
    with both.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 找到目的、个人成长以及随之而来的众多好处。
- en: Want to knock out 3?
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 想要一举三得吗？
- en: '***Adopt a writing habit.***'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '***养成写作的习惯。***'
- en: Why?
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: Think about it.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 想想看。
- en: The foundation of media is an impactful message.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 媒体的基础是有影响力的信息。
- en: An impactful message starts with an idea.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 一个有影响力的信息始于一个想法。
- en: If that idea is not fleshed out for the sake of understanding through the written
    word; it will remain just that, an idea. Thrown in the trash with the millions
    of other “million dollar ideas” that have been piling up throughout your life.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这个想法不是为了通过文字理解而 flesh out；它将仅仅是一个想法。就像你一生中堆积起来的数百万个“百万美元的想法”一样，被扔进了垃圾桶。
- en: By not writing, you are preventing yourself from discovering new mental pathways
    to go down.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 通过不写作，你阻止了自己发现新的心理路径。
- en: One written word can change the direction of your life. Similar to how rereading
    the book *Rest* has set a new trajectory for my business.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 一个字可以改变你的人生方向。就像重新阅读《休息》这本书一样，为我的业务设定了新的轨迹。
- en: (And no, you don’t have to ask, I will be writing about work / rest balance
    in coming letters).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: （而且，你不必问，我将在未来的信中写关于工作/休息平衡的内容）。
- en: '*Writing is how you execute on ideas as fast as possible so they don’t get
    lost in the depths of your mind.*'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '*写作是你尽可能快速执行想法的方式，这样它们就不会在你心中的深处迷失。*'
- en: The greatest skill one can develop is decreasing the time between idea and execution.
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一个人能够培养出的最伟大的技能是缩短想法和执行之间的时间。
- en: ''
  id: totrans-83
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [May 5, 2022](https://twitter.com/thedankoe/status/1522144576768823296?ref_src=twsrc%5Etfw)
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年5月5日](https://twitter.com/thedankoe/status/1522144576768823296?ref_src=twsrc%5Etfw)
- en: If you want to take part in any form of online business, **media** is your foundation.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要参与任何形式的在线业务，**媒体**是你的基础。
- en: Educational content
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教育内容
- en: Newsletters and articles
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通讯和文章
- en: YouTube video scripts
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: YouTube视频脚本
- en: Sales and product pages
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 销售和产品页面
- en: Tweets, Instagram posts, TikTok scripts
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 推特、Instagram帖子、TikTok脚本
- en: The list goes on. Media is the front end of the internet and if you don’t plan
    to learn to code… better get started writing.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 列表还在继续。媒体是互联网的前端，如果你不打算学习编程……最好是开始写作。
- en: Creative, persuasive, and individual media houses (personal brands) cannot be
    phased out.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 创意、有说服力、个性化的媒体机构（个人品牌）是无法被取代的。
- en: Big corporations can be automated, but society is losing trust in those.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 大型公司可以被自动化，但社会正在失去对那些公司的信任。
- en: We are transitioning into an age of authenticity.
  id: totrans-94
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们正在过渡到一个真实性的时代。
- en: ''
  id: totrans-95
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'People are losing trust in:'
  id: totrans-96
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 人们正在失去对以下事物的信任：
- en: ''
  id: totrans-97
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – The media
  id: totrans-98
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 媒体
- en: – Big corporations
  id: totrans-99
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 大型公司
- en: – Flashy sales gimmicks
  id: totrans-100
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 霓虹灯式的销售花招
- en: ''
  id: totrans-101
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'People are gaining trust in:'
  id: totrans-102
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 人们正在对以下事物建立信任：
- en: ''
  id: totrans-103
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – Independent sources
  id: totrans-104
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 独立来源
- en: – Value-driven communities
  id: totrans-105
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 以价值为导向的社区
- en: – Clarity and human connection
  id: totrans-106
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 清晰度和人际连接
- en: ''
  id: totrans-107
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Only the curious will survive.
  id: totrans-108
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 只有好奇的人才能生存。
- en: ''
  id: totrans-109
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [July 14, 2022](https://twitter.com/thedankoe/status/1547569272867631107?ref_src=twsrc%5Etfw)
  id: totrans-110
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年7月14日](https://twitter.com/thedankoe/status/1547569272867631107?ref_src=twsrc%5Etfw)
- en: The future belongs to the authentic.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 未来属于那些真实的人。
- en: Authenticity stems from living through the energy generated from your purpose.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 真实性源于通过你的目标产生的能量。
- en: Finding purpose stems from solving your own problems.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 寻找目标源于解决你自己的问题。
- en: Writing is the vessel for pursuing your curiosity, understanding yourself, and
    creating solutions for your problems.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 写作是你追求好奇心、了解自己、为你的问题创造解决方案的载体。
- en: Media is how you document the process, teach others what you learned, and get
    paid for doing so.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 媒体是你记录过程、教授你所学，并因此获得报酬的方式。
- en: '*Another argument:*'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '*另一个论点：*'
- en: I’ve recently hit 224K followers on Instagram.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 我最近在Instagram上达到了224K的粉丝。
- en: When talking with Dakota Robertson, we were wondering why we get 5-10X the engagement
    and growth compared to people like models or fitness influencers.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 当与Dakota Robertson交谈时，我们想知道为什么我们比模特或健身影响者获得5-10倍的关注和增长。
- en: Looks get engagement, but engaging writing gets more.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 外观可以吸引关注，但引人入胜的写作可以吸引更多。
- en: Good writing can capture more attention (and deliver more value) than 6-pack-abs.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 好的写作可以吸引更多的注意力（并传递更多的价值），比六块腹肌还要吸引人。
- en: The Experience Model For One Person Businesses
  id: totrans-121
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 单人企业的体验模型
- en: '*Starting a business is not optional for those who want more out of life.*'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '*对于想要从生活中获得更多的人来说，创业是不可避免的。*'
- en: 'If you are reading this letter, I am assuming you have values and desires similar
    to my own:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在阅读这封信，我假设你和我有相似的价值和欲望：
- en: Full control over who you work with, what you work on, and when you work.
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完全控制你与谁合作、你做什么工作以及何时工作。
- en: The ability to live by the laws of nature, work 2-4 hours a day, and dedicate
    time to other important areas of your life (like rest!)
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够按照自然法则生活，每天工作2-4小时，并将时间投入到你生活的其他重要领域（比如休息！）
- en: Getting paid for doing what you love, even when people say it is impossible.
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 做你热爱的事情并获得报酬，即使别人说这是不可能的。
- en: Self-reliance, sovereignty, and the personal freedom that comes with a lack
    of money problems.
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自给自足、主权，以及没有金钱问题带来的个人自由。
- en: Most if not all of this is impossible through employment.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 如果不是大多数，那么通过就业实现这一点是不可能的。
- en: Am I saying employment is bad? No. It is a great option for increasing your
    income.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 我是不是在说就业是坏事？不，它是增加你收入的一个很好的选择。
- en: At the same time, employment comes with a cap and distorts others’ perceptions
    of money.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，就业带来的限制和扭曲了他人对金钱的认识。
- en: Once you are locked in to what was sold to you as “the good life”
  id: totrans-131
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一旦你被所谓的“美好生活”所吸引
- en: ''
  id: totrans-132
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 40-80 hour work weeks
  id: totrans-133
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 每周工作40-80小时
- en: A finite and predictable salary
  id: totrans-134
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一个有限且可预测的薪水
- en: 45 years of work before you rest
  id: totrans-135
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 工作45年后才能休息
- en: ''
  id: totrans-136
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It becomes 10x more difficult to get out.
  id: totrans-137
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 要摆脱这种状态会变得难上10倍。
- en: ''
  id: totrans-138
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Seen it too many times.
  id: totrans-139
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 看到过太多类似的情况。
- en: ''
  id: totrans-140
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Build while you still have little to no responsibility.
  id: totrans-141
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在你还有很少或没有责任的时候就开始建造。
- en: ''
  id: totrans-142
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [July 14, 2022](https://twitter.com/thedankoe/status/1547538903162392576?ref_src=twsrc%5Etfw)
  id: totrans-143
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 丹·科伊 (@thedankoe) [2022年7月14日](https://twitter.com/thedankoe/status/1547538903162392576?ref_src=twsrc%5Etfw)
- en: When you are surrounded by people that limit your perception of money (those
    who have a finite income) it will be hard to believe it when you hear big numbers.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 当你周围的人限制了你对金钱的认识（那些收入有限的人）时，当你听到大数字时，你会很难相信。
- en: I remember when I was hovering around $10K/month from self-employment.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 我记得当我从自营职业中每月徘徊在1万美元左右的时候。
- en: Someone I met online mentioned that they were making $100K/month doing what
    I was doing.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 我在网上认识的人提到，他们通过做我正在做的事情，每月赚取10万美元。
- en: I realized I had been holding myself back. Self-imposed limits that affected
    my income. About 3 months after, I hit my first $50K month working 3 hours a day…
    max.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 我意识到我一直在限制自己。自我强加的限制影响了我的收入。大约3个月后，我每天工作3小时，达到了第一个5万美元的月收入…最多。
- en: That’s what can happen when you write in public, solve your own problems, and
    help others solve their own.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在公共场合写作，解决自己的问题，并帮助他人解决自己的问题时，就会发生这种情况。
- en: That’s what business is… problem solving. That’s all it is. Money is the result
    of value exchange. *Offer* to solve someone’s problems for money in the areas
    you know best.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是商业的本质…解决问题。那仅此而已。金钱是价值交换的结果。*提供*以金钱解决你最擅长的领域内问题的服务。
- en: The limits that come along with employment cease to exist when you start taking
    the internet seriously.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 当你开始认真对待互联网时，与就业相关的限制就不再存在。
- en: Most of us “online business folk” refrain from talking about making a lot of
    money because that’s what most people’s lives revolve around.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 我们中的大多数“在线商业人士”避免谈论赚取大量金钱，因为那通常是人们生活围绕的核心。
- en: I think more people need to talk about money. Normalize it. Condition people
    into believing that they can earn as much as they want doing what they want. As
    cheesy as it sounds, self-belief is the first step in almost anything.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为更多的人需要谈论金钱。使其正常化。让人们相信他们可以通过做自己想做的事情赚取他们想要的任何金额。听起来可能很俗气，但自信几乎是任何事情的第一步。
- en: Thought comes before action.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 思考总是在行动之前。
- en: '**The Experience Model**'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: '**体验模型**'
- en: This can be as easy or as difficult as you can make it.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以像你想象的那样简单或困难。
- en: Forget about finding a niche. I’ve seen hundreds of business beginners quit
    because they think that the niche they chose is the problem.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 忘记寻找细分市场。我看到成百上千的商业新手因为认为他们选择的细分市场是问题而放弃。
- en: Choose 2-3 curiosities to pursue that have the potential to solve your own problems.
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择2-3个有潜力解决你自身问题的好奇心去追求。
- en: Immerse yourself in an informational and social environment conducive to solving
    those problems.
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 沉浸在一个有利于解决这些问题的信息和社会环境中。
- en: Read books, follow people online, and eliminate everything else that has the
    potential to distract you.
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 阅读书籍，关注在线人物，并消除所有可能分散你注意力的其他事物。
- en: Treat your Twitter, Instagram, or LinkedIn account as a place for sharing your
    discoveries and talking about your interests in a persuasive way (study persuasion,
    influence, and marketing).
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 把你的Twitter、Instagram或LinkedIn账户当作一个分享你的发现和以有说服力的方式谈论你的兴趣的地方（研究说服、影响和营销）。
- en: That is your niche. YOU are your niche. YOU, at this very moment, are interested
    in a select few things that intersect. That intersection is where your audience
    is built.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是你的细分市场。你，就是你的细分市场。你，在这个时刻，对少数几件事情感兴趣，这些事情交汇在一起。那个交汇点就是你的受众所在。
- en: Since I am interested in the book *Rest,* my niche are those that want to decrease
    their work times, produce higher quality work, and enjoy the entirety of their
    lives. See how that works?
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我对书籍《休息》感兴趣，我的细分市场是那些想要减少工作时间、提高工作质量并享受他们生活全部的人。看看这是怎么运作的？
- en: People are interested in more than one thing.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 人们对于不止一件事感兴趣。
- en: Those that are interested in health can also express interest in spirituality
    or learning to code. That’s where the fun comes in — it’s on you to craft a persuasive
    argument for the interests that will help others solve their problems.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 对健康感兴趣的人也可以表达对灵性或学习编程的兴趣。这就是乐趣所在——这取决于你如何为能帮助他人解决问题的兴趣构建有说服力的论点。
- en: As you evolve, your content and brand will evolve.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你进化，你的内容和品牌也会进化。
- en: That means you will move on from what you are currently talking about and selling.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着你将离开你现在正在谈论和销售的东西。
- en: You will desaturate the market beneath you.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 你将使你下面的市场失去饱和度。
- en: The creator economy is impossible to saturate, otherwise it’s not the creator
    economy (one-person businesses).
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 创作者经济是无法饱和的，否则它就不是创作者经济（个人企业）。
- en: '*Human connection cannot scale.*'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: '*人类联系无法规模化。*'
- en: If you want to build a billion-dollar company, then yes stick to one thing,
    but that’s not what I want… and I would argue 99% of people don’t actually want
    that.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要建立一个价值十亿美元的公司，那么是的，坚持一件事，但这不是我所想要的……而且我会争辩说99%的人实际上并不想要那样。
- en: '*Give me $1M a year and complete personal freedom. I’ll be good.*'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: '*给我每年100万美元，就能获得完全的自由。我会做得很好。*'
- en: At the moment, the creator economy + one-person business model seems to sustainably
    provide this.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，创作者经济加上个人商业模式似乎能够可持续地提供这一点。
- en: How do you evolve? By solving your own problems.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何进化？通过解决你自己的问题。
- en: All of this is so simple. It just takes people a bit of time trying to find
    the complex answer before they realize it.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都很简单。只是人们需要一点时间来尝试找到复杂的答案，然后他们才会意识到这一点。
- en: I didn’t like freelancing. It took up too much of my time and I disliked working
    on projects that weren’t my own.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 我不喜欢自由职业。它占用了我太多的时间，而且我不喜欢从事不属于我的项目。
- en: Thats a problem I can solve, write about, and start to teach… see how this goes?
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我能解决的问题，可以写下来，并开始教学……看看效果如何？
- en: I had to evolve, so I started writing on Twitter, built a product, and decreased
    my time on client work.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 我必须进化，所以我开始在Twitter上写作，建立了一个产品，并减少了客户工作的时间。
- en: Time to evolve again, I built a new brand consulting offer, charged more, productized
    certain aspects of it, and hit my first $50K month.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 是时候再次进化了，我建立了一个新的品牌咨询服务，收费更高，将其某些方面产品化，并实现了第一个5万美元的月收入。
- en: I wanted to maintain that income as a baseline and decrease my work times to
    2-4 hours in the morning — so I evolved yet again, built Modern Mastery, and once
    again reduced client work.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 我想保持这种收入作为基础，并将工作时间减少到早上2-4小时——所以我再次进化，建立了现代精通，并再次减少了客户工作。
- en: To most freelancers and B2B agencies this would be impossible to accomplish.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 对大多数自由职业者和B2B机构来说，这是不可能实现的。
- en: If you are one of them, the best thing you can do is build leverage by writing
    online.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你就是其中之一，你能做的最好的事情就是通过在线写作来建立影响力。
- en: Get out of the B2B space if you are dead set on living a life of self-reliance,
    fulfillment, and meaning.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你决心过一种自给自足、充实和有意义的生活，就离开B2B空间。
- en: Join the C2C (creator to creator) space that is continuing to grow, almost exponentially.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 加入持续增长的C2C（创作者到创作者）空间。
- en: Flow with the current that few can see without being in the space.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 随着少数人能看到的潮流而动。
- en: Flow with the shift from societal constructs and big business to individual
    education systems (social media and authentic products) and one-person businesses
    with media (writing) as the backbone of your success.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 随着社会结构和大型企业向个人教育系统（社交媒体和真实产品）以及以媒体（写作）作为成功支柱的个人企业的转变而流动。
- en: '**The Experience Paradox**'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: '**经验悖论**'
- en: 'Like a crappy job posting that you feel unqualified for:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 就像一份糟糕的招聘启事，你觉得自己不够资格：
- en: '*You need experience to start, but you gain experience by starting.*'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: '*你需要经验才能开始，但你通过开始来获得经验。*'
- en: Most of what you are told you can’t do is an illusion. You take it as law and
    impose limits on yourself.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数你被告知你不能做的事情都是一种错觉。你把它当作法律，并对自己施加限制。
- en: Let me make it easy for you.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 让我为你简化一下。
- en: 'Block out all advice you hear about building an online brand until you execute
    on this and figure it out for yourself:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 在你执行并自己解决这个问题之前，屏蔽掉所有关于建立在线品牌的建议：
- en: '**Treat Twitter (a writing platform) as a public journal.**'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: '**将Twitter（一个写作平台）视为一个公开的日记本。**'
- en: Post your thoughts, ideas, beliefs, likes, and dislikes
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发布你的想法、观点、信仰、喜好和厌恶。
- en: Speak to yourself. Give your current self the advice it needs to here and your
    past self advice it wish it had heard.
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与自己对话。给你的当前自我提供它需要的建议，给你的过去自我提供它希望听到的建议。
- en: Study your curiosities and share what you learn
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究你的好奇心，分享你所学到的知识。
- en: Actively improve your life and share the lessons and insights you came across
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 积极改善你的生活，分享你遇到的教训和洞察。
- en: Pursue your purpose, document how you solve your problems, and offer to help
    others in exchange for money
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 追求你的目标，记录你解决问题的方法，并出钱帮助他人。
- en: It is an incredibly difficult journey.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一条极其艰难的旅程。
- en: You will have many mental battles. Write your way through them.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 你将面临许多心理战斗。通过写作来克服它们。
- en: You will have many personal battles. Write your way through them.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 你将面临许多个人战斗。通过写作来克服它们。
- en: But what else would you expect?
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 但你还能期待什么？
- en: A comfy, limited, job handing you a paycheck every 2 weeks in exchange for 80%
    of your waking hours?
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 一个舒适的、有限的、每两周给你发一次工资的工作，以换取你80%的清醒时间？
- en: No thanks. Sounds even more difficult than the former.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 不谢。听起来比之前更难。
- en: Your survival-wired psyche will thank you with good dopamine by pursuing your
    vision, goals, and hunting for its survival on a daily basis.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 通过追求你的愿景、目标，并在日常生活中寻找生存，你的生存心理将会通过良好的多巴胺来感谢你。
- en: — Dan Koe
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: — 丹·科
