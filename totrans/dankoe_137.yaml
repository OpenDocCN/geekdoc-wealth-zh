- en: The Future-Proof Skill Stack (Learn In This Order)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-future-proof-skill-stack-learn-in-this-order/](https://thedankoe.com/letters/the-future-proof-skill-stack-learn-in-this-order/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I’ll be honest.
  prefs: []
  type: TYPE_NORMAL
- en: I’m worried.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve gone deep into the AGI and post-labor-work rabbit hole.
  prefs: []
  type: TYPE_NORMAL
- en: 'There’s been a few questions on my mind for the past month:'
  prefs: []
  type: TYPE_NORMAL
- en: What can humans do that machines can’t?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What will the future of work look like?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What jobs – if any – will persist over the next 20 years?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What can we, as humans, do to secure an above-average future?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With these problems at the forefront of my mind, I’ve found a few answers that
    may bring you optimism and clarity as you enter the unknown.
  prefs: []
  type: TYPE_NORMAL
- en: 'I want to focus on this point that many are worried about:'
  prefs: []
  type: TYPE_NORMAL
- en: We don’t know what to teach children because we don’t know what will be relevant
    in 20 years.
  prefs: []
  type: TYPE_NORMAL
- en: I was worried about this too until I came across a [post by Devon Erikson on
    X](https://twitter.com/Devon_Eriksen_/status/1766666283368562883) that shines
    light on the issue.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve been binging any podcast I can find of him and reading his new sci-fi fiction
    book, [Theft Of Fire](https://www.amazon.com/Theft-Fire-Orbital-Space-1-ebook/dp/B0CJHQ4LZN/ref=sr_1_1?crid=3C2XAP9DM9A4O&dib=eyJ2IjoiMSJ9.2gMY5kigj67bbl1ijL46pAs9FPPMdUsHbnq_pBHj3GTrsFy-bQG8OIP3aSgSOR96rpiGFXTHxQLtB3QprzS9bEazs4TzU2ObKCwYEYnrl9KQVY32OwHGonpN8fXe-ImCjSWQNHta-bDuzY3ZCeBbviC87FIOI9o5bTHXEHXeBIRI6eKTR_kopf2vTRwaj91lD2xYwc2WdtZmaRYE945BKlzNrZNtcqspdbAMfRAghZc.ij2Gfs-1FqT1jP0nBxJJ8Y2QuSLkN0JNX6uO4RSHaYA&dib_tag=se&keywords=theft+of+fire&qid=1710342205&sprefix=theft+of+fi%2Caps%2C166&sr=8-1).
    He is easily becoming one of my favorite thinkers.
  prefs: []
  type: TYPE_NORMAL
- en: I hope one day, once I’ve burned through his work, I can hold a high-level conversation
    with him on a podcast to share the similarities and differences between our worldviews.
    For now, I am the student.
  prefs: []
  type: TYPE_NORMAL
- en: 'On to his points:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Only slaves are expected to perform one task for their entire life.**'
  prefs: []
  type: TYPE_NORMAL
- en: Our current education system reflects the education of slaves.
  prefs: []
  type: TYPE_NORMAL
- en: They were career-specific skills like growing wheat, herding sheep, and riding
    a horse.
  prefs: []
  type: TYPE_NORMAL
- en: Today, we are taught to be useful workers. We are taught to obey the authority.
    We are conditioned to get good grades out of fear of punishment.
  prefs: []
  type: TYPE_NORMAL
- en: '**A free man is expected to act on his interests and do many things throughout
    his life.**'
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t create a purpose, you will be assigned one.
  prefs: []
  type: TYPE_NORMAL
- en: A purpose is a goal. Most people don’t choose their own goals.
  prefs: []
  type: TYPE_NORMAL
- en: A goal implies knowledge and skills that must be learned to solve problems that
    prevent you from achieving the goal.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t choose your own goal, you do not choose what you learn or what
    problems you solve. Your destiny is decided for you because the only potential
    you know is the one you were assigned.
  prefs: []
  type: TYPE_NORMAL
- en: '**The difference between the two is how to live, how to think, and how to learn.**'
  prefs: []
  type: TYPE_NORMAL
- en: True education, not a clone-producing machine we call public school, is an orientation
    toward how to live and thrive without being dependent on another.
  prefs: []
  type: TYPE_NORMAL
- en: True education does not only teach career skills that produce results by performing
    specific tasks, but how to think and learn so they could adapt to any situation.
  prefs: []
  type: TYPE_NORMAL
- en: '**Stop worrying about what career skills AI will make obsolete.**'
  prefs: []
  type: TYPE_NORMAL
- en: Worry about whether you are training (or being trained) to make ideal-future-aligned
    decisions, be open-minded and perceptive, and be self-motivated.
  prefs: []
  type: TYPE_NORMAL
- en: Everyone is creative.
  prefs: []
  type: TYPE_NORMAL
- en: Creativity is about achieving any goal with the knowledge and skill available
    to you, not fancy art or designs.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, you need to learn how to set self-generated goals, utilize the
    internet, mentors, and the abundance of information you have access to to educate
    yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Then, you need to embrace trial and error, self-reflect, and experiment to create
    your own path.
  prefs: []
  type: TYPE_NORMAL
- en: Creativity gives you the power to do whatever you want in life.
  prefs: []
  type: TYPE_NORMAL
- en: Those who don’t realize this gift are doomed to the assignments of others.
  prefs: []
  type: TYPE_NORMAL
- en: The Irreplaceable Individual
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1876">![](../Images/862895a3dadc21e14d5d437766528f1d.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: It is impossible to know what the future will hold.
  prefs: []
  type: TYPE_NORMAL
- en: All we know is that there *will* be a way of life that leads to the most satisfaction.
  prefs: []
  type: TYPE_NORMAL
- en: While some aspects of this ideal lifestyle will be unique, like the interests
    you choose to pursue, the overarching principles of the good life remain immutable,
    like what allows you to pursue those interests as a sovereign individual.
  prefs: []
  type: TYPE_NORMAL
- en: To discover what these are, we must look at what *is not taught in schools.*
  prefs: []
  type: TYPE_NORMAL
- en: If schools train you to be a modern slave that performs one task in one career
    for the entirety of your life, what is the knowledge and skill that sovereign
    individuals are taught – or teach themselves?
  prefs: []
  type: TYPE_NORMAL
- en: 1) The Future-Proof Skill Stack
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In Eriksen’s opinion, the seven liberal arts (or “liberating arts,” not to
    be confused with the ideological monstrosity found in a specific department of
    formal education taught by those who are not liberated themselves) are, quote:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Logic**: how to derive truth from known facts'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Statistics**: how to understand the implications of data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Rhetoric**: how to persuade, and spot persuasion tactics'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Research**: how to gather information on an unknown subject'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**(Practical) Psychology**: how to discern and understand the true motives
    of others'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Investment**: how to manage and grow existing assets'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Agency**: how to make decisions about what course to pursue, and proactively
    take action to pursue it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I would encourage you to hold these in your mind while pushing into the unknown.
  prefs: []
  type: TYPE_NORMAL
- en: If you prepare yourself with a future-proof mind, what technical skills will
    be lucrative or useful in the far future are irrelevant because you can adapt
    as necessary.
  prefs: []
  type: TYPE_NORMAL
- en: 'To learn the liberating arts, these are the skills I learned:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Marketing & sales** – if you don’t know how to attract and persuade, you
    will never get what you want, and your only option will be for an employer (or
    the government) to give it to you. (Rhetoric, psychology)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Writing & thinking** – the ability to communicate the value in your unique
    mind. The foundation of getting in front of other people. (Logic, research)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Entrepreneurship** – the process of taking my future into my own hands, hunting
    for my survival, and building products that I want to see in the world (that others
    care about). (Statistics, agency, investment)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Some may say things like entrepreneurship aren’t a “skill,” but I would argue
    that any mental process that becomes more efficient with time is a skill.
  prefs: []
  type: TYPE_NORMAL
- en: Everything is a skill, but most people don’t treat their life as a practice.
  prefs: []
  type: TYPE_NORMAL
- en: Nobody can tell you how they write, think, market, and sell. They can only tell
    you how they do it.
  prefs: []
  type: TYPE_NORMAL
- en: Meaning that to learn these skills, you must embrace a self-experimentation
    mindset.
  prefs: []
  type: TYPE_NORMAL
- en: 'Your job is to:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Research processes that others have found success with.** Thankfully, you
    can find these with a simple search.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Experiment with various techniques.** Implement the processes you learn and
    attempt to get results.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Identify patterns and principles.** Note the similarities between each and
    double down on them.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Create your own process.** Tailor what you learn to your unique lifestyle
    and situation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Contribute to true education by passing it down.** Give people education
    that can’t be taught in schools with a fundamental grounding in critical thinking.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With entrepreneurship as your vessel, you set the scene for true education and
    sovereignty.
  prefs: []
  type: TYPE_NORMAL
- en: With writing and thinking, you continuously create, test, and iterate on the
    value you have to offer.
  prefs: []
  type: TYPE_NORMAL
- en: You are required to learn practical psychology – marketing and sales – to understand
    the minds of yourself and your customers.
  prefs: []
  type: TYPE_NORMAL
- en: You then persuade, not force or deceive, to inspire people to care about the
    value you have to offer.
  prefs: []
  type: TYPE_NORMAL
- en: The future-proof skills are why I created [2 Hour Writer](https://2hourwriter.com)
    and [Mental Monetization](https://mentalmonetization.com) (writing + marketing
    and product).
  prefs: []
  type: TYPE_NORMAL
- en: 2) Technical Know-How
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With the foundation of a future-proof skill stack, the next step is adapting
    to the times with technical skills.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the digital renaissance, this means:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Social media** – building a name for yourself as your storefront for the
    value you create. The command center for your business.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Content** – writing or video to educate, entertain, and inspire people to
    see your value.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Email marketing** – newsletters or sequences to nurture the audience you
    acquire.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Visual design** – illustrating the vibe of your brand to spark emotion in
    your viewers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Funnel building** – creating landing pages, websites, and fueling them with
    other technical skills like content and email.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The requirements to learn these skills are bound to change as artificial intelligence
    shakes the industry. They won’t go away any time soon, but the general competition
    will increase due to the ease in acquiring these skills. Few people will learn
    the future-proof skills above, those are what will secure your future.
  prefs: []
  type: TYPE_NORMAL
- en: These technical skills are the current vessel for your entrepreneurial ventures.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Personal Interests
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now the questions you’re asking are:'
  prefs: []
  type: TYPE_NORMAL
- en: What do I write about?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What do I market and sell?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What do I email, design, or leverage technical skills with?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The interests you can’t help but tell others about.
  prefs: []
  type: TYPE_NORMAL
- en: The books you can’t pull yourself away from.
  prefs: []
  type: TYPE_NORMAL
- en: The ideas that flood your search history.
  prefs: []
  type: TYPE_NORMAL
- en: The projects you dream of building but can’t seem to find the time to.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t “find” a profitable niche. You create a profitable niche through persuasion.
  prefs: []
  type: TYPE_NORMAL
- en: Nobody can tell you what niche to go into, they can only tell you the one they
    went into.
  prefs: []
  type: TYPE_NORMAL
- en: If you understood the future-proof skills, and therefore human nature, you would
    understand that you can control the perception of your interests.
  prefs: []
  type: TYPE_NORMAL
- en: Interest is generated. Interest is programmed. You are interested in specific
    things because of how you were raised and the information you were exposed to.
  prefs: []
  type: TYPE_NORMAL
- en: You are interested in them for a reason. That means others can *become* interested
    in them with well-placed writing on social media. This has happened to you before.
    Go scroll the timeline and tell me something doesn’t persuade you to change your
    behavior.
  prefs: []
  type: TYPE_NORMAL
- en: You spend time, attention, and money on your interests. That means others will
    spend those same resources on you if you are valuable enough.
  prefs: []
  type: TYPE_NORMAL
- en: Free people don’t choose a niche, they create one.
  prefs: []
  type: TYPE_NORMAL
- en: The Digital Renaissance
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1881">![](../Images/4408e027cf459b7a8a3697c198636d3c.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Most people don’t try to become the top 5% in any skill because they don’t realize
    that the 95% is comprised of people who put 0% effort outside of anything they
    were told to do by their parents or society.
  prefs: []
  type: TYPE_NORMAL
- en: 30-60 minutes a day for 6-12 months puts you ahead of almost everyone.
  prefs: []
  type: TYPE_NORMAL
- en: Even that is too much to ask of most people.
  prefs: []
  type: TYPE_NORMAL
- en: Thanks to the decentralized education system being built in front of our eyes
    (creators on social media teaching paths they’ve gotten results in) you can quickly
    learn relevant skills that allow you to adapt to the changing career landscape.
  prefs: []
  type: TYPE_NORMAL
- en: In my eyes, it is silly to bank your future on education from those who are
    employed to be teachers.
  prefs: []
  type: TYPE_NORMAL
- en: I am not talking about general education. That is useful for getting people
    on the same page. I am talking about further education, when you are at the pivotal
    moment where you must choose what interest you want to pursue.
  prefs: []
  type: TYPE_NORMAL
- en: If the goal is to be in control of your future, it is wise to avoid education
    by those teaching how to be free but aren’t free themselves.
  prefs: []
  type: TYPE_NORMAL
- en: STEM education makes sense because it teaches hard skills, but an education
    in the liberal arts required to be free is learned better by those who have done
    what you are interested in doing.
  prefs: []
  type: TYPE_NORMAL
- en: Posts, podcasts, videos, courses, and coaching.
  prefs: []
  type: TYPE_NORMAL
- en: Use them to study every skill or interest we’ve discussed in this letter.
  prefs: []
  type: TYPE_NORMAL
- en: Nobody is going to give you the time. You must take it. Set aside 30-60 minutes
    in a non-distracting block of your day and build the habit. It will be difficult
    at the start as with anything new. Don’t expect otherwise.
  prefs: []
  type: TYPE_NORMAL
- en: The Domain Of Mastery
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Mastery is a blend of creative and specific work.
  prefs: []
  type: TYPE_NORMAL
- en: Mastery cannot be trained, it must be practiced.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t succeed by being smarter.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t succeed by working harder.
  prefs: []
  type: TYPE_NORMAL
- en: You succeed when you possess specific domain-relevant knowledge with a creative
    vessel for distribution.
  prefs: []
  type: TYPE_NORMAL
- en: I can be smart, with an IQ of 175, but if a bug occurs in a complex code base,
    how will being smart help me fix that? I need to know a bunch of very specific
    things about the code base.
  prefs: []
  type: TYPE_NORMAL
- en: Now, I can have specific knowledge of that domain, but if I am not one influencing
    the vision of that code base, I am not free, and I can be replaced.
  prefs: []
  type: TYPE_NORMAL
- en: It is difficult to replace someone who is highly equipped with specific knowledge,
    but it can still happen. And if that individual is replaced, do they have the
    creativity to make that knowledge work for them?
  prefs: []
  type: TYPE_NORMAL
- en: Your domain of mastery contains the skills and interests listed above.
  prefs: []
  type: TYPE_NORMAL
- en: '**Entrepreneurship is your vessel** – so you are in full control of your future.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Marketing and sales are your message** – so you can inspire people to care
    about what you do.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Writing and thinking are your medium** – so you can distribute your message
    in public.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Technical know-how is the “how”** – so you can succeed in the current market
    landscape.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Personal interests are the “what”** – so you have a craft to pour your heart
    and soul into.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Your ideal future is the “why”** – so you solve a problem that you have experience
    with.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An ideal future is born from adversity.
  prefs: []
  type: TYPE_NORMAL
- en: If you listen to the stories of the most successful entrepreneurs (excluding
    cases of unconscious competence), you will discover a common theme.
  prefs: []
  type: TYPE_NORMAL
- en: 'They built a product for one of three reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: To make something that helped them better.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: To solve a problem in their life.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: To build what they wanted to see in the world.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Or, even better, a combination of them all.
  prefs: []
  type: TYPE_NORMAL
- en: One suffered from eczema, experimented with all of the products they could on
    the market, and couldn’t find one that suited them.
  prefs: []
  type: TYPE_NORMAL
- en: The best they could find was a boring, scentless bar of soap.
  prefs: []
  type: TYPE_NORMAL
- en: So, they obsessed over botanicals and horticulture. Studied it like their life
    depended on it – because it did – and created a soap line that smelled good, looked
    good, and didn’t irritate their skin.
  prefs: []
  type: TYPE_NORMAL
- en: I, as another example, had trouble with consistent writing quality to fuel my
    business. Nobody seemed to understand that there was more to writing than just
    writing.
  prefs: []
  type: TYPE_NORMAL
- en: Since it was the foundation of my business success, and with having a plethora
    of specific knowledge in that domain, I experimented with other’s processes until
    I was able to create one that suited my unique goals.
  prefs: []
  type: TYPE_NORMAL
- en: That is how [2 Hour Writer](https://2hourwriter.com) was born. My hyper-successful
    course.
  prefs: []
  type: TYPE_NORMAL
- en: It may not work for some, but for others, it is the course that changed everything
    and shaped a huge portion of the creator space as we know it – including many
    spinoff products with other processes you can try.
  prefs: []
  type: TYPE_NORMAL
- en: Notice the [Value Equation](https://thedankoe.com/letters/the-value-equation-how-to-become-a-top-1-individual-fast/)
    from last week coming into play. It starts with a problem, reveals a goal, and
    sets a potential process to be created.
  prefs: []
  type: TYPE_NORMAL
- en: To wrap this up, technology only continues to advance.
  prefs: []
  type: TYPE_NORMAL
- en: Being scared of it is a great way to ruin your future.
  prefs: []
  type: TYPE_NORMAL
- en: The wise decision is to use it. Dissect it. Understand it.
  prefs: []
  type: TYPE_NORMAL
- en: Allow it to help you acquire skills faster and build your future in record time.
  prefs: []
  type: TYPE_NORMAL
- en: I hope you enjoyed this letter.
  prefs: []
  type: TYPE_NORMAL
- en: It was one of my favorites to write so far.
  prefs: []
  type: TYPE_NORMAL
- en: Dan
  prefs: []
  type: TYPE_NORMAL
