- en: Generalists Are Taking Over The World In The Digital Golden Ages
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/generalists-are-taking-over-the-world-in-the-digital-golden-ages/](https://thedankoe.com/letters/generalists-are-taking-over-the-world-in-the-digital-golden-ages/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I can’t help but wonder what artists, thinkers, and visionaries from the past
    would think of today’s world.
  prefs: []
  type: TYPE_NORMAL
- en: Would Alan Watts have a podcast?
  prefs: []
  type: TYPE_NORMAL
- en: Would Marcus Aurelius be Twitter famous?
  prefs: []
  type: TYPE_NORMAL
- en: Would Nietzsche do public speaking gigs about his New York Times bestseller?
  prefs: []
  type: TYPE_NORMAL
- en: Many people think they would “reject the world” and retire to the woods.
  prefs: []
  type: TYPE_NORMAL
- en: I would argue the exact opposite.
  prefs: []
  type: TYPE_NORMAL
- en: They would realize the raw power of the internet to spread their ideas to the
    world because humans have an innate drive to survive on more planes of existence
    than the physical.
  prefs: []
  type: TYPE_NORMAL
- en: But that’s not the main question on my mind.
  prefs: []
  type: TYPE_NORMAL
- en: I’m even more curious about today’s creators and how they will be remembered.
  prefs: []
  type: TYPE_NORMAL
- en: 'In a previous chat I had with [Justin C Scott](https://twitter.com/iamjustincscott)
    on our adventures in Greenville, South Carolina, he said something that stuck
    in my mind:'
  prefs: []
  type: TYPE_NORMAL
- en: The further removed an influential figure is from their time in history, the
    more mythical they become.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: People stop perceiving them as a person and begin to see them as something more
    – as the arbiter of certain ideas, concepts, and philosophies.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: They no longer live in the mind as someone who lived, but as an archetypal concept
    that feels as if they always were.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In the time of Watts or Aurelius, their language was normal.
  prefs: []
  type: TYPE_NORMAL
- en: It probably wasn’t perceived as “deep” and “mysterious” as we often think it
    is.
  prefs: []
  type: TYPE_NORMAL
- en: It was just normal language.
  prefs: []
  type: TYPE_NORMAL
- en: As language evolved with culture and society, so did our perception of the teachings
    of old.
  prefs: []
  type: TYPE_NORMAL
- en: In 100 years from now, language will see substantial changes yet again, and
    today’s creators will be perceived as ancient artifacts.
  prefs: []
  type: TYPE_NORMAL
- en: Jordan Peterson, Joe Rogan, and Mr. Beast have all added their own thread to
    the cultural tapestry we continue to create.
  prefs: []
  type: TYPE_NORMAL
- en: But who will be in the next generation of creators?
  prefs: []
  type: TYPE_NORMAL
- en: I’ll let your imagination run wild to answer that question.
  prefs: []
  type: TYPE_NORMAL
- en: But I believe the landscape of public intellectuals will change as a whole.
  prefs: []
  type: TYPE_NORMAL
- en: Those we hold with high regard in our mind will diversify based on community
    and self-interest.
  prefs: []
  type: TYPE_NORMAL
- en: For every one Marcus Aurelius, there will be ten Joe Rogans.
  prefs: []
  type: TYPE_NORMAL
- en: But the Joe Rogans will all attract different types of followers based on their
    unique perspectives and personality.
  prefs: []
  type: TYPE_NORMAL
- en: They will all talk about the same thing via internet content, but the teachings
    will be vastly different due to their personal experience.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve talked about the flipside of this in [The Future The Creator Economy.](https://thedankoe.com/the-future-of-the-creator-economy-my-bold-prediction/)
  prefs: []
  type: TYPE_NORMAL
- en: Every creator will distill their expertise and attract a school of students
    that resonate with their teaching style.
  prefs: []
  type: TYPE_NORMAL
- en: Creators will evolve and their following will evolve with them.
  prefs: []
  type: TYPE_NORMAL
- en: This eliminates saturation in the creator economy because life isn’t saturated
    – and we are all making the transition into the digital society.
  prefs: []
  type: TYPE_NORMAL
- en: '**Final Reminder**: Solopreneur Sprints starts in 2 days and Digital Economics
    price doubles on that date. [Check it out here](https://sprints.digitaleconomics.school)
    if you want to turn yourself into a fulfilling modern business.'
  prefs: []
  type: TYPE_NORMAL
- en: The Emerging Digital Society
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Every single person that was remembered throughout time had one thing in common:'
  prefs: []
  type: TYPE_NORMAL
- en: They were massive value creators.
  prefs: []
  type: TYPE_NORMAL
- en: They were fountainheads of knowledge, perspective, and insight.
  prefs: []
  type: TYPE_NORMAL
- en: They didn’t attempt to hold their thoughts in their finite headspace.
  prefs: []
  type: TYPE_NORMAL
- en: They wrote, spake, marketed, and sold the potent ideas that wove the web of
    their worldview.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is why I recommend studying those 4 evergreen skills and pairing them
    with your personal interests to succeed in the new renaissance (see: [The $1 Million
    Dollar Skill Stack](https://thedankoe.com/the-1-million-dollar-skill-stack-learn-in-this-order/)).'
  prefs: []
  type: TYPE_NORMAL
- en: Today’s world is different.
  prefs: []
  type: TYPE_NORMAL
- en: You have access to the internet.
  prefs: []
  type: TYPE_NORMAL
- en: The *internet.*
  prefs: []
  type: TYPE_NORMAL
- en: The revolutionary invention that people see as normal parts of their lives.
  prefs: []
  type: TYPE_NORMAL
- en: The thing that distracts people from their potential but is the exact tool to
    escape surface-level living.
  prefs: []
  type: TYPE_NORMAL
- en: There is an emerging digital society.
  prefs: []
  type: TYPE_NORMAL
- en: The world wide web continues to develop in unforeseen ways and I see it as a
    next step in human evolution.
  prefs: []
  type: TYPE_NORMAL
- en: You’re either providing value online or you are putting it off until you are
    forced to for survival.
  prefs: []
  type: TYPE_NORMAL
- en: Over the past decade digital tools and aids have become such a part of our life
    that we didn’t even realize we are half-robot.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, this comes with ramifications that the ancient masters warned about.
  prefs: []
  type: TYPE_NORMAL
- en: Mechanical and mindless living is the antagonist of a good life.
  prefs: []
  type: TYPE_NORMAL
- en: The internet must be used and it must not use you.
  prefs: []
  type: TYPE_NORMAL
- en: 'The power has shifted back into the hands of the individual. You have the ability
    to:'
  prefs: []
  type: TYPE_NORMAL
- en: Become highly skilled in any (valuable) topic you want in 3-6 months.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Form a high-level network that feeds you opportunities. This was impossible
    with prior barriers of physical location.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Attract an audience to your life’s work so you can get paid to do what you enjoy.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Humans solve problems to evolve, and I genuinely believe we have problem-solved
    our way into the opportunity to do what we love at almost all times of the day
    (if you put in the work to do so).
  prefs: []
  type: TYPE_NORMAL
- en: Start Building Your Legacy In The New World
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1169">![](../Images/9cd8a383bcf7ca3b26dd3fb7c3258ef2.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: We are smack in the middle of a second renaissance and future thought leaders
    are emerging left and right.
  prefs: []
  type: TYPE_NORMAL
- en: This is not to be taken lightly.
  prefs: []
  type: TYPE_NORMAL
- en: I used to think the term “thought leader” was rather cringe. But it is arguably
    the most important endeavor one can take on.
  prefs: []
  type: TYPE_NORMAL
- en: To become a thought leader, you must first learn to lead yourself.
  prefs: []
  type: TYPE_NORMAL
- en: 'By leading yourself into the unknown, you expose yourself to:'
  prefs: []
  type: TYPE_NORMAL
- en: Novel ideas and perspectives
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: New potentials for your life (and others)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Skills that you must acquire to push further
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Results you must get with those skills to maintain progress
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A thought leader will not be a thought leader for long if they do not build
    solutions that gets results for the occupants of society.
  prefs: []
  type: TYPE_NORMAL
- en: They must expand their mind to allow for thought to have further boundaries.
  prefs: []
  type: TYPE_NORMAL
- en: True thought can only go as far as the experience you have.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is how you begin to build your legacy in the new world:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Identify What You Must Do
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are infinite roads you can take that lead to the life you want.
  prefs: []
  type: TYPE_NORMAL
- en: But the first step is identifying the life you want so you can move in the right
    direction.
  prefs: []
  type: TYPE_NORMAL
- en: Dance between your desired future and despised future.
  prefs: []
  type: TYPE_NORMAL
- en: 'As you experience life:'
  prefs: []
  type: TYPE_NORMAL
- en: Be conscious and observant of those around you.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Take mental note of lives that you do not want to live.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Study the habits, patterns, and ideas of successful individuals.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Add brush strokes to the vision of your ideal future over time.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It won’t be absolutely clear at first, and that’s okay. You have time.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Solidify A Vessel For Actualizing That Reality
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is where most people go wrong.
  prefs: []
  type: TYPE_NORMAL
- en: They dream and dream about doing incredible things but let it remain a dream.
    Why?
  prefs: []
  type: TYPE_NORMAL
- en: Because they don’t have a clear and certain path for making it work.
  prefs: []
  type: TYPE_NORMAL
- en: They don’t realize that nothing certain is worth having, and that the future
    is uncertain no matter what you do (this should be obvious).
  prefs: []
  type: TYPE_NORMAL
- en: You need skills and interests that you can practice and apply for life.
  prefs: []
  type: TYPE_NORMAL
- en: It truly doesn’t matter what skills or interests you choose.
  prefs: []
  type: TYPE_NORMAL
- en: If you are conscious of the problems that stand in the way of executing on your
    plan, the next step should be obvious. Don’t hide from it.
  prefs: []
  type: TYPE_NORMAL
- en: If starting a business is the path to the life you want, but you “don’t know
    how,” then learn how with the endless information online.
  prefs: []
  type: TYPE_NORMAL
- en: Ya… it will take some time.
  prefs: []
  type: TYPE_NORMAL
- en: If you realize that you need money to start that business you choose, but don’t
    have any, then you either have to start with a [lower cost business model](https://2hourwriter.com)
    or get a higher-paying job (or experiment with budgeting techniques).
  prefs: []
  type: TYPE_NORMAL
- en: If you realize you can’t get a better job or don’t have the skill to start the
    low-cost business… answer the question yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Too many people avoid doing what they “don’t want” even when it is standing
    in the way of what they want.
  prefs: []
  type: TYPE_NORMAL
- en: Change your perspective.
  prefs: []
  type: TYPE_NORMAL
- en: If it’s standing in the way of what you want, then you should want to do it.
  prefs: []
  type: TYPE_NORMAL
- en: Think.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t get distracted.
  prefs: []
  type: TYPE_NORMAL
- en: Learn and apply the skills or interests that intrigue you most in alignment
    with your desired future.
  prefs: []
  type: TYPE_NORMAL
- en: When problems pop up, acquire the skills and interests necessary to overcome
    them.
  prefs: []
  type: TYPE_NORMAL
- en: Pretty simple.
  prefs: []
  type: TYPE_NORMAL
- en: No self-help prescription required.
  prefs: []
  type: TYPE_NORMAL
- en: You have a self-corrective compass called a mind.
  prefs: []
  type: TYPE_NORMAL
- en: Use it.
  prefs: []
  type: TYPE_NORMAL
- en: 3) A Powerful Habit Formation Heuristic
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*If you don’t know why you are doing something, why are you doing it?*'
  prefs: []
  type: TYPE_NORMAL
- en: Most people are unconscious as to *why* they are making 99% of the choices that
    they make.
  prefs: []
  type: TYPE_NORMAL
- en: Start questioning everything you do.
  prefs: []
  type: TYPE_NORMAL
- en: Everything.
  prefs: []
  type: TYPE_NORMAL
- en: If there is no conscious intention behind the action, stop doing it.
  prefs: []
  type: TYPE_NORMAL
- en: Why are you going out to drink and party?
  prefs: []
  type: TYPE_NORMAL
- en: I’m not telling you to stop. I’m telling you to have a reason.
  prefs: []
  type: TYPE_NORMAL
- en: I love the occasional party and can attribute much of my success to the conversations
    and people that I’ve met during those times.
  prefs: []
  type: TYPE_NORMAL
- en: But it’s usually used as a tactical reset after a period of extended intensity.
    It is a forced low that balances out the forced highs.
  prefs: []
  type: TYPE_NORMAL
- en: 'Back to questioning:'
  prefs: []
  type: TYPE_NORMAL
- en: Why are you shoveling hot and spicy McChickens down your throat?
  prefs: []
  type: TYPE_NORMAL
- en: Again, I’m not telling you to stop.
  prefs: []
  type: TYPE_NORMAL
- en: I love a good ol’ Mcdonald’s trip, but it still does not derail me completely
    from my mental, physical, and financial health goals.
  prefs: []
  type: TYPE_NORMAL
- en: Why are you laying in bed instead of going to the gym?
  prefs: []
  type: TYPE_NORMAL
- en: Why are you going to work after complaining about how you hate it?
  prefs: []
  type: TYPE_NORMAL
- en: Because you have to?
  prefs: []
  type: TYPE_NORMAL
- en: Is that not wage slavery?
  prefs: []
  type: TYPE_NORMAL
- en: Do you even care?
  prefs: []
  type: TYPE_NORMAL
- en: Are you lying to yourself that it’s for another reason?
  prefs: []
  type: TYPE_NORMAL
- en: Are you going to do anything about it?
  prefs: []
  type: TYPE_NORMAL
- en: Or are you just going to keep doing the same things until the day you die?
  prefs: []
  type: TYPE_NORMAL
- en: When will you allow yourself to become fully conscious of the situation you’ve
    built yourself into?
  prefs: []
  type: TYPE_NORMAL
- en: The answers to these questions may shock you (if you’re honest with yourself).
  prefs: []
  type: TYPE_NORMAL
- en: There are no wrong actions, there are only actions without intention.
  prefs: []
  type: TYPE_NORMAL
- en: Lead. Your. Thoughts.
  prefs: []
  type: TYPE_NORMAL
- en: 4) Personal Distribution
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Building an audience, readership, or distribution isn’t only for online businesses.
  prefs: []
  type: TYPE_NORMAL
- en: It is the new way of life.
  prefs: []
  type: TYPE_NORMAL
- en: 'Building personal distribution is how you:'
  prefs: []
  type: TYPE_NORMAL
- en: Get a job without a job board
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sell a book without a publisher
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Make music without a record label
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Be you, learn to persuade, and you get to skip ahead of those that rely on others
    for their success.
  prefs: []
  type: TYPE_NORMAL
- en: I’m in the process of self-publishing my book, *The Art Of Focus*, that has
    new plans to launch sooner than expected…
  prefs: []
  type: TYPE_NORMAL
- en: The average self-published book sells 250 copies (Googled statistic).
  prefs: []
  type: TYPE_NORMAL
- en: They make less than $1,000 a year.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve almost guaranteed my book to be a best-seller simply because I’ve built
    an audience over the past 3-4 years.
  prefs: []
  type: TYPE_NORMAL
- en: '*And* all of the ideas are validated through my newsletters and social media
    engagement. I already know that people will love it because they’ve already shown
    that.'
  prefs: []
  type: TYPE_NORMAL
- en: Same goes for any product I built that has a slight relation to what I talk
    about.
  prefs: []
  type: TYPE_NORMAL
- en: Since I’ve built distribution, I can build whatever I want.
  prefs: []
  type: TYPE_NORMAL
- en: I can start a gym, supplement line, apparel store, or even start producing music
    and get on a big stage when most producers will never see an audience of more
    than 100 people.
  prefs: []
  type: TYPE_NORMAL
- en: Fair? Maybe, maybe not.
  prefs: []
  type: TYPE_NORMAL
- en: Or it’s just the reality that people don’t learn the game before they try to
    win.
  prefs: []
  type: TYPE_NORMAL
- en: 5) Focus On Perspective Development
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The biggest “shift” for me was realizing that audience building isn’t about
    the latest hacks and tactics.
  prefs: []
  type: TYPE_NORMAL
- en: It’s about novel perspectives – something that AI tools will never be able to
    do under the name of a human.
  prefs: []
  type: TYPE_NORMAL
- en: I don’t see how AI could take something like Ken Wilbers’ theory of everything,
    connect it to the creator economy, and distill “stages of creator development”
    from a place of experience [like I did here](https://thedankoe.com/the-one-person-business-roadmap-99-of-creators-make-this-mistake/).
  prefs: []
  type: TYPE_NORMAL
- en: I’m assuming that AI can’t have insight and connect abstract patterns to its
    skills or interests.
  prefs: []
  type: TYPE_NORMAL
- en: There is a progression to this game, but you want to get to the point of contagious
    ideas that spread without your personal effort.
  prefs: []
  type: TYPE_NORMAL
- en: The creator economy is a game of mental warfare.
  prefs: []
  type: TYPE_NORMAL
- en: The more ideas you spread that form the identity and worldview of other individuals
    the more success will come to you.
  prefs: []
  type: TYPE_NORMAL
- en: If this doesn’t make sense to you, it won’t until you actually start building.
  prefs: []
  type: TYPE_NORMAL
- en: Good luck on your path, fellow Creator.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
- en: P.S. Alright last one so I can close enrollment and not worry about promotion
    over the next few days.
  prefs: []
  type: TYPE_NORMAL
- en: Solopreneur Sprints starts in 2 days and Digital Economics price doubles on
    that date. [Check it out here](https://sprints.digitaleconomics.school) if you
    want to turn yourself into a fulfilling modern business.
  prefs: []
  type: TYPE_NORMAL
