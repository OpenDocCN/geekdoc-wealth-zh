- en: How To Escape Beginner Hell As A Creator
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/how-to-escape-beginner-hell-as-a-creator/](https://thedankoe.com/letters/how-to-escape-beginner-hell-as-a-creator/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3-6 months.
  prefs: []
  type: TYPE_NORMAL
- en: That’s how long most creators are trapped in beginner hell.
  prefs: []
  type: TYPE_NORMAL
- en: You know, that dreadful place where you feel like you don’t know what you’re
    doing. You question whether it’s worth it to keep going. You’re thinking of what
    you’re going to try next (just to do it all over again). Unfortunately, most people
    quit before things start to get good.
  prefs: []
  type: TYPE_NORMAL
- en: 'But understand this:'
  prefs: []
  type: TYPE_NORMAL
- en: Most people think the answer is to “just be consistent.”
  prefs: []
  type: TYPE_NORMAL
- en: To keep pushing through even when you aren’t making progress.
  prefs: []
  type: TYPE_NORMAL
- en: Zero likes. Zero followers. Zero sales. It’s one of the most painful things
    in the world. Becoming a creator was supposed to be your ticket to the good life,
    wasn’t it? Or was it all just a scam? A pipe dream sold to you by marketers and
    gurus?
  prefs: []
  type: TYPE_NORMAL
- en: Here’s the brutal truth… *you aren’t making progress because you aren’t doing
    the right things.*
  prefs: []
  type: TYPE_NORMAL
- en: So before you go back to the life of comfort you swore to leave behind, listen
    to what I have to say.
  prefs: []
  type: TYPE_NORMAL
- en: You need to reach the point where everything “clicks.” You need that “aha!”
    moment where clarity strikes and you know exactly how to break through to intermediate
    heaven.
  prefs: []
  type: TYPE_NORMAL
- en: I know you’re on the edge right now.
  prefs: []
  type: TYPE_NORMAL
- en: But remember why you started.
  prefs: []
  type: TYPE_NORMAL
- en: You know you want to do something creative.
  prefs: []
  type: TYPE_NORMAL
- en: You know you need an audience to do that outside of a job.
  prefs: []
  type: TYPE_NORMAL
- en: You know you want to be in control of the money you make and the lifestyle you
    design.
  prefs: []
  type: TYPE_NORMAL
- en: You know that, in order to do those things, you need to write or create. You
    need to become your own media company that attracts people to your independent
    work. Your self-published books. Your music. Your ideas. Your expertise.
  prefs: []
  type: TYPE_NORMAL
- en: You just need to reach that glorious moment—the “click”—and you will finally
    feel in control of your future.
  prefs: []
  type: TYPE_NORMAL
- en: Let me help.
  prefs: []
  type: TYPE_NORMAL
- en: How To Escape Beginner Hell
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: All overnight success takes about 10 years. – Jeff Bezos
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Now, there is a series of actions you can take that will lead to results.
  prefs: []
  type: TYPE_NORMAL
- en: Plain and simple.
  prefs: []
  type: TYPE_NORMAL
- en: But most creators mindlessly follow the instructions they were given in a video,
    course, or article.
  prefs: []
  type: TYPE_NORMAL
- en: My friend, this isn’t a job with a linear set of steps you can perform everyday,
    shut your mind off, and live like you always have. This is a one-person business.
    You are the CEO. You are the CMO. You are the COO. You are everything. Please
    start acting like it. Get it together.
  prefs: []
  type: TYPE_NORMAL
- en: I know because I was in beginner hell for almost 5 years.
  prefs: []
  type: TYPE_NORMAL
- en: I jumped between dropshipping, 3 ecommerce stores, digital art and photography,
    a Facebook ads agency, an SEO content agency, and eventually had to get a job
    in web design because the loans were piling up and I wasn’t willing to drown any
    longer.
  prefs: []
  type: TYPE_NORMAL
- en: At my job, I procrastinated all my work to make freelance web design work. When
    I started writing on social media to land more clients, I didn’t experience a
    beginner hell because I knew how to avoid it.
  prefs: []
  type: TYPE_NORMAL
- en: 'The skills I learned along the way led to my own “click.” I’ll tell you what
    those are, but they involve:'
  prefs: []
  type: TYPE_NORMAL
- en: A different way to think about finding your niche
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The best type of content to bring in followers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to monetize without relying on platform ad revenue
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Why you should forget building a funnel because social media has changed
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'And much more that I’ll leave to your imagination. I am going to give you a
    condensed social media masterclass so you can finally feel like you have control
    over your life’s work. I am going to tell you how to end up like this guy:'
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2461">![](../Images/385c8b113e2db676798264b308140caa.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: 'After teaching writing and content to almost 30,000 students, here are the
    7 tips, strategies, and insights that will change everything for you:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Do What Works For Beginners
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Beginner hell can last anywhere from 3 months to 30 years.
  prefs: []
  type: TYPE_NORMAL
- en: For some people, it lasts their entire life (starving artists).
  prefs: []
  type: TYPE_NORMAL
- en: Why?
  prefs: []
  type: TYPE_NORMAL
- en: Because beginners don’t realize what advanced creators do now *is not* what
    they did to grow in the first place.
  prefs: []
  type: TYPE_NORMAL
- en: 'And that’s the most important point of this letter:'
  prefs: []
  type: TYPE_NORMAL
- en: '*You aren’t growing because you aren’t doing the things that lead to growth.*'
  prefs: []
  type: TYPE_NORMAL
- en: Beginners start posting philosophical quotes or try to be the next Marcus Aurelius
    when nobody knows who they are or cares about what they do. They have no *authority.*
  prefs: []
  type: TYPE_NORMAL
- en: I hate to break it to you, but you aren’t a Roman Emperor.
  prefs: []
  type: TYPE_NORMAL
- en: You aren’t respected because nobody knows who you are.
  prefs: []
  type: TYPE_NORMAL
- en: That means you have to build authority *on* social media before people care
    about your cute little fortune cookie posts.
  prefs: []
  type: TYPE_NORMAL
- en: How do you build authority?
  prefs: []
  type: TYPE_NORMAL
- en: '**1 – Solve more problems.**'
  prefs: []
  type: TYPE_NORMAL
- en: 80% of your content as a beginner should start with a pain point.
  prefs: []
  type: TYPE_NORMAL
- en: If you are just writing ideas without any second thought, you aren’t going to
    go very far. You need to be meticulous with the structure of your posts at the
    start.
  prefs: []
  type: TYPE_NORMAL
- en: With every idea you want to write about, think about a pain point that the average
    person faces. Start with that in your content.
  prefs: []
  type: TYPE_NORMAL
- en: 'Use phrases like:'
  prefs: []
  type: TYPE_NORMAL
- en: '**“Most people”** – i.e. Most people suck at writing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**“If you struggle with”** – i.e. If you struggle to focus for more than 5
    minutes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**“The worst”** – i.e. The worst skill you can learn is web design.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I use these quite often in my content because *they work.*
  prefs: []
  type: TYPE_NORMAL
- en: Problems capture attention. Problems open a curiosity loop. Problems make it
    100x easier to make the rest of the post impactful.
  prefs: []
  type: TYPE_NORMAL
- en: Start with the problem, then finish it with a list of steps, your unique perspective,
    or a novel insight.
  prefs: []
  type: TYPE_NORMAL
- en: '**2 – Cover the most important ideas in extreme depth.**'
  prefs: []
  type: TYPE_NORMAL
- en: Once you pick a topic, you don’t just start writing random ideas.
  prefs: []
  type: TYPE_NORMAL
- en: There are a select few evergreen ideas that *always* perform well within that
    topic. It’s up to you to find them and write everything you can about them under
    *your own brand.*
  prefs: []
  type: TYPE_NORMAL
- en: 'In something like building a business, those ideas are:'
  prefs: []
  type: TYPE_NORMAL
- en: How to choose a niche
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The best business model for beginners
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The best skills to learn
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to make X amount of money in Y amount of time
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There’s a reason you see these topics being talked about *all the time.*
  prefs: []
  type: TYPE_NORMAL
- en: Because they WORK. They work because 95% of the market are beginners. They work
    because nobody can get sick of the fundamentals.
  prefs: []
  type: TYPE_NORMAL
- en: Stop trying to avoid writing about the things that people want to learn about.
  prefs: []
  type: TYPE_NORMAL
- en: “But Dan, everyones talked about these things before, why would they care about
    me when I do?”
  prefs: []
  type: TYPE_NORMAL
- en: I need you to zoom out a bit. You’re in beginner hell so it’s easy for your
    mind to fall into survival mode and not be able to think straight.
  prefs: []
  type: TYPE_NORMAL
- en: How many times have *you* read about those topics from different people? Do
    *you* care?
  prefs: []
  type: TYPE_NORMAL
- en: No. Because people need to be reminded more than they need something new.
  prefs: []
  type: TYPE_NORMAL
- en: Once you know what topic you want to write about, research 5-10 accounts that
    talk about that thing. Notice what content they repeat on a weekly or monthly
    basis. Notice what content they all talk about.
  prefs: []
  type: TYPE_NORMAL
- en: Then, make it a consistent part of your brand.
  prefs: []
  type: TYPE_NORMAL
- en: Create multiple free guides around those topics.
  prefs: []
  type: TYPE_NORMAL
- en: Create content about one of them at least once a day.
  prefs: []
  type: TYPE_NORMAL
- en: Write short, medium, and long form content. Posts, threads, carousels, newsletters,
    and the rest.
  prefs: []
  type: TYPE_NORMAL
- en: You need to create a *world of content* so people can dig as deep as they want
    into your brand, but that’s something we’ll talk about in a later point.
  prefs: []
  type: TYPE_NORMAL
- en: '**3 – Filter your favorite accounts to find their oldest content.**'
  prefs: []
  type: TYPE_NORMAL
- en: Chances are, you are copying feel-good ideas from big accounts.
  prefs: []
  type: TYPE_NORMAL
- en: They already have an audience. They already have a high baseline level of engagement.
    You have no idea if those posts will work for someone with no authority or skin
    in the game.
  prefs: []
  type: TYPE_NORMAL
- en: James Clear can write anything and get thousands of likes. You can’t. Why? Because
    James has an absurd amount of time in the game and has published a serious amount
    of value. All people need to do is read his book and they’re a fan. You haven’t
    written a book, nor do you have the 1 million subscriber email list from blogging
    that made his book a success in the first place.
  prefs: []
  type: TYPE_NORMAL
- en: Study what content people created in order to grow. Look at their oldest posts
    and keep scrolling until you find some posts that did better than others.
  prefs: []
  type: TYPE_NORMAL
- en: Most people went through their own beginner hell, then they had 1-2 moments
    where they gained a bunch of followers at once. Find those.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Your Content Isn’t That Good
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Frankly, if you aren’t growing, your content just isn’t that good.
  prefs: []
  type: TYPE_NORMAL
- en: You can’t just pick a topic and start writing.
  prefs: []
  type: TYPE_NORMAL
- en: You need to take the reader’s psychology into account.
  prefs: []
  type: TYPE_NORMAL
- en: You need to become a dopamine dealer.
  prefs: []
  type: TYPE_NORMAL
- en: You need to *capture attention, hold attention, and deliver value.*
  prefs: []
  type: TYPE_NORMAL
- en: Most people think they are doing this, but they aren’t. They write a post and
    send it without any second thought or questioning whether it’s actually good.
  prefs: []
  type: TYPE_NORMAL
- en: All of those require a lifetime of study within themselves. Hell, even I need
    to refresh myself on how to do them every month or so.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve written a previous letter on the [10 Koemmandments of Engagement](https://thedankoe.com/letters/the-most-important-skill-of-the-21st-century-only-1-use-it/),
    so read that if you want to go deeper with examples, but I’ll list them here so
    you can practice.
  prefs: []
  type: TYPE_NORMAL
- en: I would highlight recommend writing these down. You can download the [Kortex](https://kortex.co)
    desktop app, open floating capture with **Option+C**, and take notes as you read.
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Specific Numbers**'
  prefs: []
  type: TYPE_NORMAL
- en: Use specific numbers in your hooks or headlines like “Apples new $1175 iPhone
    has this new feature.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Example:'
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-2462">![](../Images/28eccb5e8ed79e1e55628a1c94fc2c44.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: This works because it acts as a pattern interrupt (the added authority helps
    too).
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Pattern Interrupts**'
  prefs: []
  type: TYPE_NORMAL
- en: A pattern interrupt is something that breaks people out of their normal conditioned
    patterns.
  prefs: []
  type: TYPE_NORMAL
- en: On social media, people are scrolling through mostly boring text and images.
    You need to do something different that makes them stop their scroll.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Negativity Bias**'
  prefs: []
  type: TYPE_NORMAL
- en: The human brain is wired to remember and pay attention to negativity.
  prefs: []
  type: TYPE_NORMAL
- en: This doesn’t mean you need to be negative, it means you should position some
    of your writing in a negative light (it can still be positive).
  prefs: []
  type: TYPE_NORMAL
- en: “You are going to achieve great things.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Compared to:'
  prefs: []
  type: TYPE_NORMAL
- en: “You will never hit rock bottom again.”
  prefs: []
  type: TYPE_NORMAL
- en: The second is a lot more potent.
  prefs: []
  type: TYPE_NORMAL
- en: '**4) Target Callout**'
  prefs: []
  type: TYPE_NORMAL
- en: This is simple, call out the specific person you are talking to.
  prefs: []
  type: TYPE_NORMAL
- en: If you are in your 20’s…
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Calling all creators, coaches, and freelancers!
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fathers are a gift to humankind…
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Even if your audience doesn’t fall into the specific group you are calling out,
    it will allow them to “pick a side” and compare themselves to what you are saying.
  prefs: []
  type: TYPE_NORMAL
- en: '**5) Problem Callout**'
  prefs: []
  type: TYPE_NORMAL
- en: 'We talked about this one, but as a crucial reminder:'
  prefs: []
  type: TYPE_NORMAL
- en: Start with the pain point.
  prefs: []
  type: TYPE_NORMAL
- en: '**6) Potential Benefit**'
  prefs: []
  type: TYPE_NORMAL
- en: One of the most important questions you can answer for your readers is “What’s
    in it for me?”
  prefs: []
  type: TYPE_NORMAL
- en: If you ask yourself that question after reading over your content, most people
    will find that their content lacks any tangible value. You have a cool idea, but
    people don’t care about it.
  prefs: []
  type: TYPE_NORMAL
- en: Rewire your mind to think in problems and benefits.
  prefs: []
  type: TYPE_NORMAL
- en: Start with the problem, imply a desirable transformation with a benefit.
  prefs: []
  type: TYPE_NORMAL
- en: '**7) Social Proof**'
  prefs: []
  type: TYPE_NORMAL
- en: When you flex your results, experience, or credentials, people assume that you
    know something they don’t, and they want to continue reading or following.
  prefs: []
  type: TYPE_NORMAL
- en: 'Justin Welsh is great at doing this without being cocky:'
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-2463">![](../Images/9adc78e11a742a110d917d782432c99c.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Talk about your results.
  prefs: []
  type: TYPE_NORMAL
- en: AI can’t compete with your results.
  prefs: []
  type: TYPE_NORMAL
- en: Whether you’re a writer who finished a chapter of their book or a health nut
    that lost 20 pounds, share your experience. I’m sharing business screenshots because
    that’s what I have sitting around, but there are plenty of examples in the productivity,
    health, relationships, or self-improvement in general space. Numbers aren’t only
    money.
  prefs: []
  type: TYPE_NORMAL
- en: '**8) Confidence & Conviction**'
  prefs: []
  type: TYPE_NORMAL
- en: This is my favorite point because many people refuse to have conviction in their
    beliefs. This makes it quite easy to stand out if you can reconcile the phrase
    “firm beliefs held loosely” in your mind.
  prefs: []
  type: TYPE_NORMAL
- en: Eliminate words that imply uncertainty
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Speak in absolutes when possible
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Exaggerate your point to add energy
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Of course, do not abuse these for the sake of engagement.
  prefs: []
  type: TYPE_NORMAL
- en: 'Rather than saying:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“It may be wise if some people developed their skillset.”*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Say:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“It is crucial that everyone on planet earth develops their skill set.”*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a good example:'
  prefs: []
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-2464">![](../Images/b853b120d620ca6efe079db8f48659e5.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: I wrote this post almost 5 years ago now.
  prefs: []
  type: TYPE_NORMAL
- en: That was the first post that brought me almost 600 followers as a beginner.
  prefs: []
  type: TYPE_NORMAL
- en: Because of that, I kept talking about it, turned it into a thread, then a YouTube
    video (after 2 years, I focused on one platform at the start), and it is my most
    viewed video on my channel.
  prefs: []
  type: TYPE_NORMAL
- en: We will talk about how to make noise and double down on signal in a later point.
  prefs: []
  type: TYPE_NORMAL
- en: '**9) Punch, Rhythm, & Readability**'
  prefs: []
  type: TYPE_NORMAL
- en: Start short and to the point.
  prefs: []
  type: TYPE_NORMAL
- en: Then, just like this, continue on with your idea.
  prefs: []
  type: TYPE_NORMAL
- en: Use line breaks
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: People love bullet points
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can get as creative as you’d like
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Do you notice how I am guiding you down the page?
  prefs: []
  type: TYPE_NORMAL
- en: How I start short, keep you engaged, and deliver a hint of value?
  prefs: []
  type: TYPE_NORMAL
- en: Even the bullet list is ordered from the shortest point to longest.
  prefs: []
  type: TYPE_NORMAL
- en: '**10) Warnings & Caution**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Read this post:'
  prefs: []
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-2465">![](../Images/089cdb1b7c41079d9d921ed836e00aa0.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: I start with warning people about a trap. Then I tell them why.
  prefs: []
  type: TYPE_NORMAL
- en: This is an incredible way to write engaging content because *every topic* has
    a large list of traps that people can fall into. If you can identify what those
    traps are, you have a list of great content to write.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need to use all 10 Koemmandments at once, but I would urge you to
    have this list open while writing. Before you hit send, ensure that you have at
    least 2 for short form content and even more for long form content.
  prefs: []
  type: TYPE_NORMAL
- en: By the way, I talk about all of this in [2 Hour Writer.](https://2hourwriter.com)
  prefs: []
  type: TYPE_NORMAL
- en: 3) Start With Training Wheels
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most people don’t have an idea problem, they have a structure problem.
  prefs: []
  type: TYPE_NORMAL
- en: 'Because here’s the thing:'
  prefs: []
  type: TYPE_NORMAL
- en: Any idea can go viral if *and only if* you structure it the right way.
  prefs: []
  type: TYPE_NORMAL
- en: Generating ideas isn’t hard. You just passed by at least 50 in this newsletter
    so far that you could take and run with.
  prefs: []
  type: TYPE_NORMAL
- en: The problem is, you don’t know how to structure them.
  prefs: []
  type: TYPE_NORMAL
- en: You haven’t *trained your mind to masterfully articulate ideas in an impactful
    way.*
  prefs: []
  type: TYPE_NORMAL
- en: Once you do that, you can turn even the worst idea into something that people
    can’t stop reading, watching, or listening to.
  prefs: []
  type: TYPE_NORMAL
- en: 'Like any other skill, you need to start with training wheels. Here’s what you
    do:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Create a swipe file.**'
  prefs: []
  type: TYPE_NORMAL
- en: If you want to be a creator, you need to keep your finger on the pulse of the
    market.
  prefs: []
  type: TYPE_NORMAL
- en: You need to scroll social media not as a consumer, but as a researcher.
  prefs: []
  type: TYPE_NORMAL
- en: Whenever you see a viral idea that makes you think, “Damn, I wish I wrote that.”
    Save it. Copy the link into Kortex capture and organize it into a “Swipe File”
    document by typing “@.”
  prefs: []
  type: TYPE_NORMAL
- en: Think of your brand as an amalgamation of the ideas you love, the ideas that
    impacted you most, and the ideas you want to be included under your brand.
  prefs: []
  type: TYPE_NORMAL
- en: Now, you can use those ideas as inspiration, but that’s not the full point.
  prefs: []
  type: TYPE_NORMAL
- en: You are saving these content pieces so you can emulate the structure.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s take this post from before as an example:'
  prefs: []
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-2466">![](../Images/b8c20dd6abe41a95ce68fbf9f5035487.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: You can see a clear *structure:*
  prefs: []
  type: TYPE_NORMAL
- en: Broad hook with a desired outcome and specific number
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 5 exaggerated and polarizing steps in a bullet list
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Additional context that answers the objection “well I can’t disappear completely!
    I have friends and family!!”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Last line that ties everything together
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'So, if I were to plug in a different idea that I got from a random book like,
    “meditation is running for the mind” I could turn it into something completely
    new:'
  prefs: []
  type: TYPE_NORMAL
- en: '*How to clear your mind in 60 seconds:*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Lock yourself in a room*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Sit in the corner*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Breath deep into your belly*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*FEEL the breath with all senses*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Repeat for one minute*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Any time you get distracted, refocus your attention on the breath.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*“Meditation sprints” are how you achieve calm, fast.*'
  prefs: []
  type: TYPE_NORMAL
- en: If you want to get more creative with it, use the 10 Koemmandments above to
    change out the hook and let that shape the post more.
  prefs: []
  type: TYPE_NORMAL
- en: Instead of “How to clear your mind in 60 seconds,” I could focus on a pain point,
    statistic, target call out, or spin it in a negative lens like “How to destroy
    negative thoughts in 60 seconds.”
  prefs: []
  type: TYPE_NORMAL
- en: Yes, this requires you to think and sit with the idea.
  prefs: []
  type: TYPE_NORMAL
- en: The goal here is to practice this so much that it becomes second nature. You
    start writing texts to your mom in a persuasive way. You start speaking in a way
    people want to listen to. The benefits of this go far beyond gaining a few followers.
  prefs: []
  type: TYPE_NORMAL
- en: Last, don’t just do this with tweets. You can study long videos, short videos,
    or anything else relevant to the type of content you want to create.
  prefs: []
  type: TYPE_NORMAL
- en: If you want a swipe file with 77 post templates, here’s [my idea museum.](https://app.kortex.co/public/document/47b0dbfc-45df-43ae-802e-45b7eadd87e9)
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Study writing frameworks.**'
  prefs: []
  type: TYPE_NORMAL
- en: When I first started writing, frameworks were a lifesaver.
  prefs: []
  type: TYPE_NORMAL
- en: I read the book Ca$hvertising and learned the basics of frameworks like AIDA
    (attention, interest, desire, action).
  prefs: []
  type: TYPE_NORMAL
- en: As I got deeper into copywriting, I learned about PAS for short-form promotions
    and PASTOR for long form sales letters.
  prefs: []
  type: TYPE_NORMAL
- en: It’s safe to say that by using these for my writing, not only could I write
    faster, but I felt confident that I was being attention grabbing and persuasive.
  prefs: []
  type: TYPE_NORMAL
- en: Along with your swipe file of content, *research 5-10 copywriting frameworks.*
  prefs: []
  type: TYPE_NORMAL
- en: You can use ChatGPT (or Kortex AI next month) for this if you’d like.
  prefs: []
  type: TYPE_NORMAL
- en: Or, if you want another template to continue filling up your second brain with
    useful notes, here is an explanation of the [Pain & Process framework.](https://app.kortex.co/public/document/bec7fcec-d76c-4d00-8669-37f53892fead)
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Have them open as you write.**'
  prefs: []
  type: TYPE_NORMAL
- en: I say “write,” but this applies to all types of content.
  prefs: []
  type: TYPE_NORMAL
- en: If you write the script for your reels, TikToks, or YouTube videos first, you
    gain physical control over your articulation. You can *see* the hook, the sentences,
    the ideas, and move them around like legos until they’re beautiful. Don’t go into
    content as a beginner blindly.
  prefs: []
  type: TYPE_NORMAL
- en: Capture ideas throughout the week
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sit down 2-3 days out of the week for 1-2 hours
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Open up Kortex or another writing/notes software
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Paste in your content frameworks
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Open them in a pane on the side
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Write out your ideas and reference the frameworks
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You’re not copying the other people’s ideas. *You’re emulating the structure
    that makes them do well.*
  prefs: []
  type: TYPE_NORMAL
- en: 4) Nobody Knows Who You Are
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You have good content.
  prefs: []
  type: TYPE_NORMAL
- en: You know your ideas hit hard.
  prefs: []
  type: TYPE_NORMAL
- en: You’re writing all day every day, but you still gain maybe a few followers a
    day, max.
  prefs: []
  type: TYPE_NORMAL
- en: What’s the problem?
  prefs: []
  type: TYPE_NORMAL
- en: '*Nobody knows who you are.*'
  prefs: []
  type: TYPE_NORMAL
- en: You’re just waiting for your lord and savior the algorithm to launch your posts
    to the moon when that’s not going to happen. And even if it would, you should
    act like it wouldn’t. Your growth is on *you.* It’s in *your control…* if you
    know what you’re doing.
  prefs: []
  type: TYPE_NORMAL
- en: You see, content is one *small* part of the social media equation. Especially
    as a beginner.
  prefs: []
  type: TYPE_NORMAL
- en: 'The bigger part of the equation is:'
  prefs: []
  type: TYPE_NORMAL
- en: The amount of people who know and like you (because they’re more likely to share
    and engage with your posts)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The amount of people who see your posts (because almost nobody will as a beginner)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The quality of friendships you make with those on the rise (because they’ll
    pull you up as they grow)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you have 500 followers and get reposted by someone with 500,000 followers,
    your audience is now 500,500 followers.
  prefs: []
  type: TYPE_NORMAL
- en: This is how people make tens of thousands of dollars with a small audience.
    *They know how to network. They know how to get their content seen* ***beyond***
    *their audience.*
  prefs: []
  type: TYPE_NORMAL
- en: Beginners think they are limited to their follower count and the algorithm is
    how they grow.
  prefs: []
  type: TYPE_NORMAL
- en: Experts know they can access their own followers and their network’s followers.
    They write a post they know will bring in followers or sales and have 10-15 people
    share it. This isn’t something they do every day. It is strategic. They build
    up good will and act right when the time is right.
  prefs: []
  type: TYPE_NORMAL
- en: Sahil Bloom is someone to watch who is doing this right now. He has his book,
    [The 5 Types Of Wealth](https://www.amazon.com/gp/product/059372318X?tag=randohouseinc7986-20),
    available for preorder (it’s going to be a best seller, easily, by the way, not
    because he has a large audience, but because he is smart). He is working day and
    night to get his books in as many hands as he can. He is sending free copies to
    at least 50 people on X, bookmarking pages for them to post that will go viral,
    and commenting on them with the link to the post. He has 1 million followers,
    but if I had to guess, these posts have been seen by 100 million people.
  prefs: []
  type: TYPE_NORMAL
- en: I’m rambling.
  prefs: []
  type: TYPE_NORMAL
- en: What can you do?
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Inject yourself in a tribe.**'
  prefs: []
  type: TYPE_NORMAL
- en: The most basic social media advice is to “reply to large accounts a bunch.”
  prefs: []
  type: TYPE_NORMAL
- en: This works, and is important, but most people don’t know why they are doing
    it beyond getting a few impressions on their replies hoping that some will follow
    them.
  prefs: []
  type: TYPE_NORMAL
- en: 'In reality, you’re doing a few things:'
  prefs: []
  type: TYPE_NORMAL
- en: Writing *quality* replies (not “Great post!” or repeating what they said with
    ChatGPT) so people have a reason to look at your profile and follow you. Again,
    10 Koemmandments.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Becoming well known to a tribe of people. If I wanted to break into a social
    media circle, like the startup circle, I would simply reply to 10 great accounts
    in that space by adding value and personal experience. The *consumers* in that
    space get used to your face and follow you after they see you enough, not after
    your first reply.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Seeding connections. The more you reply and DM people within a certain niche
    group, the easier it is to DM them, or have them DM you. They will engage more
    with your posts and feed you opportunities.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reply strategically.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Practice non-needy networking.**'
  prefs: []
  type: TYPE_NORMAL
- en: It’s a shame this has to be taught, but it does.
  prefs: []
  type: TYPE_NORMAL
- en: People no longer learn social skills in their everyday environment.
  prefs: []
  type: TYPE_NORMAL
- en: People are as afraid of DMing other people as they are saying hi to a random
    person on the street.
  prefs: []
  type: TYPE_NORMAL
- en: In reality, it’s as simple as *finding a shared interest.*
  prefs: []
  type: TYPE_NORMAL
- en: <picture loading="lazy" decoding="async" class="wp-image-2467">![](../Images/b425106d9c881479c28555c18b6de15e.png)</picture>
    <picture loading="lazy" decoding="async" class="wp-image-2468">![](../Images/0d4d9fe39661e8b2b0b6c0232d3442f5.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: It’s literally that simple.
  prefs: []
  type: TYPE_NORMAL
- en: Guess what I did on that thread he shared? I reposted it. Because I had a new
    friend and he was smart enough to send it.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s another [Kortex doc](https://app.kortex.co/public/document/e5b5d206-0874-4637-9201-6cc0d6b2f583)
    with 7 non-needy networking steps if you want to add it to your workspace.
  prefs: []
  type: TYPE_NORMAL
- en: 'Send a compliment or question about their content. Talk for a bit. Then do
    this:'
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Plan one strategic post a week.**'
  prefs: []
  type: TYPE_NORMAL
- en: If you are only posting content, you will not grow.
  prefs: []
  type: TYPE_NORMAL
- en: Plain and simple.
  prefs: []
  type: TYPE_NORMAL
- en: And if you do grow, the algorithm will eventually change, and you will be floating
    off in the ocean without a support network.
  prefs: []
  type: TYPE_NORMAL
- en: You need to be having conversations every week. You need to be writing posts
    that add value to those conversations and sharing them with those people.
  prefs: []
  type: TYPE_NORMAL
- en: 5) You Need A Product
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most creators wait to monetize until they hit some imaginary follower count
    just to be disappointed when nobody buys.
  prefs: []
  type: TYPE_NORMAL
- en: Or, they think that they’ll make a decent income from platform monetization
    (like YouTube) until they hit a wall and their views plummet for 2 months.
  prefs: []
  type: TYPE_NORMAL
- en: The point is, if you want to be in control of your income, you need to sell
    a product or service.
  prefs: []
  type: TYPE_NORMAL
- en: 'This does a few things:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) People start to see you as an authority.**'
  prefs: []
  type: TYPE_NORMAL
- en: Most creators build an audience of people that don’t care about them.
  prefs: []
  type: TYPE_NORMAL
- en: They don’t realize that content isn’t enough to build a deep connection with
    someone. People need to *invest in you* in order to pay more attention to you.
  prefs: []
  type: TYPE_NORMAL
- en: People aren’t on social media to learn and adopt new habits. They buy products
    for that. And once you change their habits, or change their life, they will hold
    you much higher in their mind.
  prefs: []
  type: TYPE_NORMAL
- en: Many creators plateau simply because they have a surface level audience.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) It gives you a frame and incentive for your content.**'
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t know what to write, write about a topic that solves a pain point
    related to the product or service you sell. Simple.
  prefs: []
  type: TYPE_NORMAL
- en: On top of that, many people don’t have a *reason* to continue creating content
    because there is no immediate reward.
  prefs: []
  type: TYPE_NORMAL
- en: If you have a product or service, you at least have the *potential* to make
    some money from it. You’re able to focus your efforts on the things that get results.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) It makes trial and error more tolerable.**'
  prefs: []
  type: TYPE_NORMAL
- en: If something isn’t working, you *know* it isn’t working.
  prefs: []
  type: TYPE_NORMAL
- en: You aren’t getting clicks. You aren’t getting sales.
  prefs: []
  type: TYPE_NORMAL
- en: If you aren’t getting clicks, write content based around more pain points and
    get it spread to more people with non-needy networking.
  prefs: []
  type: TYPE_NORMAL
- en: If you aren’t getting sales, study offer creation and copywriting to convert
    more people.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t know where to start with a product or service, I show you how to
    build an “MVO” in the [One-Person Business Launchpad.](https://stan.store/thedankoe/p/the-oneperson-business-launchpad--your-first-5k)
  prefs: []
  type: TYPE_NORMAL
- en: 6) Build A World, Not A Funnel
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Gone are the days of countdown timers and fake scarcity.
  prefs: []
  type: TYPE_NORMAL
- en: Today, creators are building worlds, not funnels, although a simple newsletter
    and landing page can be considered a funnel. In that case, you’re building a world
    of mini funnels.
  prefs: []
  type: TYPE_NORMAL
- en: The average consumer doesn’t trust people out of the gate. You need both time
    in the game and enough value for them to explore in order for them to gain trust.
  prefs: []
  type: TYPE_NORMAL
- en: You need to build a small scale Marvel cinematic universe. You need to build
    movies, action figures, and lore that people can binge.
  prefs: []
  type: TYPE_NORMAL
- en: 'In other words, you need:'
  prefs: []
  type: TYPE_NORMAL
- en: Short form content (X, LinkedIn, Instagram, Threads, or TikTok)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Long form content (newsletter, podcast, or YouTube)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Free guides (ebooks, templates, video trainings)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Low ticket product (course, template, cohort)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: High ticket product (coaching, freelancing, consulting)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Start with one short form and one long form. I recommend X, LinkedIn, or Threads
    combined with a newsletter. Then, you can use those newsletters as YouTube scripts
    and cross post your short posts to all other platforms and use the best as reel
    or TikTok scripts.
  prefs: []
  type: TYPE_NORMAL
- en: Then, once you build enough distribution and cash flow, you have the resources
    to pivot into something like eCommerce or software.
  prefs: []
  type: TYPE_NORMAL
- en: Social posts are the new MVP.
  prefs: []
  type: TYPE_NORMAL
- en: Post a bunch. Turn the best into newsletters. Cross post those everywhere. Turn
    the best of the best into a digital product. Refine it until sales are high. Turn
    that system into a software, or compliment it with a physical product.
  prefs: []
  type: TYPE_NORMAL
- en: 7) Make Noise, Double Down On Signal
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The last objection:'
  prefs: []
  type: TYPE_NORMAL
- en: “But Dan, I want to write about my ideas in an authentic way. This whole social
    media thing feels so soulless and templated.”
  prefs: []
  type: TYPE_NORMAL
- en: I agree.
  prefs: []
  type: TYPE_NORMAL
- en: But to handle the first part, templates and frameworks don’t make you inauthentic.
    Creativity thrives with constraints, and a framework allows you to express your
    authentic ideas in a way that other people care about.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to be purely “authentic” without regard for what others think, that’s
    great, but good luck being able to sustain that as a lifestyle that pays you.
    Not that money is the end all be all, but it is important, and it’s only as evil
    as the person who wields it.
  prefs: []
  type: TYPE_NORMAL
- en: For the second part, you *can* write about whatever you want.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have to fall into the trap of only writing content that performs in
    the algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: You *should* make room for both. Content that you know will expose you to more
    people, and content that you think those people will love.
  prefs: []
  type: TYPE_NORMAL
- en: But if people don’t find you first, they don’t have a chance at seeing your
    other, deeper, ideas.
  prefs: []
  type: TYPE_NORMAL
- en: So, feel free to make a lot of noise.
  prefs: []
  type: TYPE_NORMAL
- en: Write about any idea your heart desires.
  prefs: []
  type: TYPE_NORMAL
- en: Pay attention to the ideas that people resonate with.
  prefs: []
  type: TYPE_NORMAL
- en: The ones that get slightly more engagement, DMs, or followers.
  prefs: []
  type: TYPE_NORMAL
- en: Then, incorporate them as a consistent part of your content strategy.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need to choose a niche. You need to experiment with ideas until people
    tell you what niche best suits your relationship with your audience.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to learn more about my “you are the niche” philosophy, here’s a
    previous letter.
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
