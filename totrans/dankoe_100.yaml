- en: Stop Wasting Your Life On Autopilot (4 Ways To Change Your Future)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/society-is-a-behavior-system-how-to-escape-the-matrix/](https://thedankoe.com/letters/society-is-a-behavior-system-how-to-escape-the-matrix/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1778">![](../Images/ab5db5da8b0624d8505386c447b8b8c5.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Your mind is a complex set of systems that becomes more efficient in achieving
    the goals it adopts with time.
  prefs: []
  type: TYPE_NORMAL
- en: Your mind is the vessel that interprets reality.
  prefs: []
  type: TYPE_NORMAL
- en: When you were born, your mind was almost a blank slate.
  prefs: []
  type: TYPE_NORMAL
- en: You had biological goals of survival, so your mind would fire the synapses to
    cry when you were hungry, when you wanted attention, and when you felt discomfort
    after letting one loose in your diaper. Most babies come out of the womb crying
    because they just entered a massively stimulating and unknown game called life.
  prefs: []
  type: TYPE_NORMAL
- en: As you aged, you started developing a kinesthetic version of yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Even when you couldn’t see your own face, your parents would sing nursery rhymes
    and point to their body parts to help you understand yourself.
  prefs: []
  type: TYPE_NORMAL
- en: “Eyes, ears, mouth, and nose.”
  prefs: []
  type: TYPE_NORMAL
- en: Soon after, you began to crawl, play with toys from your culture, walk, and
    try to make sense of this foreign language your parents were speaking.
  prefs: []
  type: TYPE_NORMAL
- en: You wanted to survive. You wanted to fit in. Your mind was a pattern recognition
    machine. And the systems of behavior and language were programmed into your mind
    as you subconsciously tested, failed, and succeeded with society’s code.
  prefs: []
  type: TYPE_NORMAL
- en: A system is a process to achieve a goal, and the societal system was injected
    in your mind so you didn’t lose your mind since you were a child.
  prefs: []
  type: TYPE_NORMAL
- en: I discuss all of this in my newly released book, [The Art of Focus](https://theartoffocusbook.com).
  prefs: []
  type: TYPE_NORMAL
- en: From Asleep To Awake
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: By the time we reach 30, the average person is in a prison of their own creation.
  prefs: []
  type: TYPE_NORMAL
- en: Not society’s creation, their own.
  prefs: []
  type: TYPE_NORMAL
- en: It was you who failed to question the limits that society projected on you.
  prefs: []
  type: TYPE_NORMAL
- en: You accepted them without struggle.
  prefs: []
  type: TYPE_NORMAL
- en: Most people grow to live the same monotonous life, over and over again, reinforcing
    their narrow minds with excuses, justifications, and identifications.
  prefs: []
  type: TYPE_NORMAL
- en: Get offended. Blame everyone but yourself. Tie your self-worth to radical ideologies.
    Accept everything at face value and question nothing. Expect free handouts for
    simply existing, no effort. Do what the authorities tell you. Go to school, get
    a job, retire at the ripe age of whatever it may be, no guarantees, with just
    the right amount of currency to survive until death. – The Art Of Focus
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: There is a turning point in every young adult’s life.
  prefs: []
  type: TYPE_NORMAL
- en: You can either remain a slave to the code written in your head, or you can go
    through the painful experience of learning it, deconstructing it, and reprogramming
    it.
  prefs: []
  type: TYPE_NORMAL
- en: '3 broad stages of moral development are generally agreed upon:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Pre-conventional** – a young human that has not yet socialized, they avoid
    punishment through obedience and act out of self-interest.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Conventional** – the human learns from itself and others forming beliefs,
    values, and standards by conforming to society. They attempt to maintain social
    order.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Post-conventional** – the human questions and reflects on society, observes
    it from a higher level, and can then criticize or reform it with critical thought.
    Universal principles come into play, resulting in the “Ah! Buddhists were right!”
    insight.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The danger is getting trapped in prior stages.
  prefs: []
  type: TYPE_NORMAL
- en: People attach to ideologies in these stages and preach that worldview as “right”
    while others are “wrong.”
  prefs: []
  type: TYPE_NORMAL
- en: You can see this in bible thumpers cowering to their fantastical God to avoid
    punishment.
  prefs: []
  type: TYPE_NORMAL
- en: You can also see this in businesspeople who believe one model or way of doing
    things is absolute.
  prefs: []
  type: TYPE_NORMAL
- en: And to break philosophical character a bit – those who reach the post-conventional
    stage of creator development make the realization that [You are the niche](https://thedankoe.com/letters/the-anti-niche-why-being-nicheless-makes-you-irreplaceable/)
    and operate their business from Universal principles.
  prefs: []
  type: TYPE_NORMAL
- en: This letter will serve as a catalyst to wake a few curious people up.
  prefs: []
  type: TYPE_NORMAL
- en: The Matrix Is A Web Of Ideas
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Culture is a mass hallucination, and when you step outside the mass hallucination
    you see it for what it’s worth. – Terrence McKenna
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How do you know anything about reality?
  prefs: []
  type: TYPE_NORMAL
- en: How do you know what’s true or what’s false?
  prefs: []
  type: TYPE_NORMAL
- en: How do you know what you should or shouldn’t do?
  prefs: []
  type: TYPE_NORMAL
- en: '*You were told by another person in society who learned in society.*'
  prefs: []
  type: TYPE_NORMAL
- en: 99% of what you know was not discovered by your own testing or experimentation.
  prefs: []
  type: TYPE_NORMAL
- en: Where did other people get their information? Other people.
  prefs: []
  type: TYPE_NORMAL
- en: '*Every piece of information you get is from other people who knew nothing when
    they were born.*'
  prefs: []
  type: TYPE_NORMAL
- en: After you learn to walk and talk, the next step you take as a child is to go
    to school, so let’s use that as an example.
  prefs: []
  type: TYPE_NORMAL
- en: School boards determine what should be taught in school. But parents heavily
    influence the school board. Where do parents get the notion of what should or
    shouldn’t be taught in school? From their schooling and parents.
  prefs: []
  type: TYPE_NORMAL
- en: As you progress through public school, you pick up habits, refine your behavior,
    and develop your language from other students and teachers. Where do students
    and teachers learn their habits, behavior, and language?
  prefs: []
  type: TYPE_NORMAL
- en: By now, you’re nearly a clone going into the formal education system.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s run through this a bit quicker…
  prefs: []
  type: TYPE_NORMAL
- en: The students and educators in the universities are coming from the schools.
    The people who teach children in the schools come from the universities. The people
    who taught the people who teach in universities also come from universities. Can
    you see how this is groundless and circular?
  prefs: []
  type: TYPE_NORMAL
- en: Society determines information as true from scientific journals and publications.
    To be published, you must conform to the bias of the publication. Who created
    the publications? People whose bias was shaped through their PhD education, taught
    by someone with a PhD education.
  prefs: []
  type: TYPE_NORMAL
- en: While you are at school, how do you complete your assignments? You research
    sites like Wikipedia when the articles are coming from the universities. You find
    the Wikipedia page through a search engine like Google.
  prefs: []
  type: TYPE_NORMAL
- en: Google determines what is displayed based on what’s most profitable or popular
    to serve up. Google gives authority to pages based on linking and link authority.
    Google places more authority on links coming from universities.
  prefs: []
  type: TYPE_NORMAL
- en: The school system is only one example of this.
  prefs: []
  type: TYPE_NORMAL
- en: Pharma companies fund huge wings of universities.
  prefs: []
  type: TYPE_NORMAL
- en: The banking system is the lubrication between each anchor in society.
  prefs: []
  type: TYPE_NORMAL
- en: You have to take out student loans to finance your education.
  prefs: []
  type: TYPE_NORMAL
- en: Money is the lifeblood of the matrix, and if money stops flowing to any given
    area, it dies off like if you were to lose blood to your hand.
  prefs: []
  type: TYPE_NORMAL
- en: The structure of society relies on itself to exist.
  prefs: []
  type: TYPE_NORMAL
- en: Some could call this a pyramid scheme.
  prefs: []
  type: TYPE_NORMAL
- en: Attention Anchors – Negative Feedback Conditions Your Mind
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You can live and die inside these intellectual structures if you choose to.
    But people of curiosity… usually find themselves unsatisfied with the conventional
    answers. – Terrence McKenna
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Society is a web of ideas that allows your mind to make sense of the world and
    not go insane.
  prefs: []
  type: TYPE_NORMAL
- en: Ideas, in this sense, are anything that the mind can make sense of and label.
    Ideas are everything. And if we want to get a bit crazy, everything is an idea
    in the mind of reality. Reality is mental.
  prefs: []
  type: TYPE_NORMAL
- en: Ideas are whole parts. They layer on top of each other. They allow each other
    to exist. They are hierarchical.
  prefs: []
  type: TYPE_NORMAL
- en: Like a word to a sentence to a paragraph to a chapter to a book, and that book
    is also a whole part of a bookcase, and that bookcase is broken down into parts
    like wood, which came from a tree, and a tree connects deep into the ecosystem
    allowing for much else to exist.
  prefs: []
  type: TYPE_NORMAL
- en: This societal web contains anchors like schooling, the media, the economy, the
    government, and culture that were all made up by those residing in it.
  prefs: []
  type: TYPE_NORMAL
- en: Society is a feedback system that punishes people for not fitting in as the
    negative feedback mechanism to correct behavior for the goals of society.
  prefs: []
  type: TYPE_NORMAL
- en: Parents scold their children when they don’t follow the rules of the matrix.
  prefs: []
  type: TYPE_NORMAL
- en: Teachers give bad grades to encourage memorization and obedience.
  prefs: []
  type: TYPE_NORMAL
- en: Peers make fun of you when you do something out of the norm.
  prefs: []
  type: TYPE_NORMAL
- en: Society is a system.
  prefs: []
  type: TYPE_NORMAL
- en: Your mind is a system.
  prefs: []
  type: TYPE_NORMAL
- en: Your identity is a system.
  prefs: []
  type: TYPE_NORMAL
- en: From macro to micro, reality is a complex nest – or hierarchy – of systems.
    Reality is a giant mind.
  prefs: []
  type: TYPE_NORMAL
- en: From the bottom up, your identity is programmed and shaped by society unless
    you make the conscious choice to reprogram it.
  prefs: []
  type: TYPE_NORMAL
- en: Programming is similar to conditioning or training.
  prefs: []
  type: TYPE_NORMAL
- en: With time and repetition, you pick up habits, learn your language, and form
    a worldview that may or may not align with your ideal lifestyle. Systems are layered
    in your mind as a deeply interconnected mesh with society.
  prefs: []
  type: TYPE_NORMAL
- en: It all starts with attention.
  prefs: []
  type: TYPE_NORMAL
- en: Your mind craves order, security, and certainty. Society provides that. So your
    attention is nearly forced to focus on the system society has laid out for you.
  prefs: []
  type: TYPE_NORMAL
- en: Your identity houses the conscious or unconscious goals you are trying to achieve.
  prefs: []
  type: TYPE_NORMAL
- en: If you are a program running in society, an NPC, and you have the goal to get
    a high-paying job, your mind won’t register starting a business as important.
  prefs: []
  type: TYPE_NORMAL
- en: This seems harmless on the surface, because “not everyone needs to start a business,”
    but it goes much deeper than that.
  prefs: []
  type: TYPE_NORMAL
- en: Deconstructing The Game
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-1779">![](../Images/1e20269e567aed752635b54102d74b92.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Games are fun to play, but only for a bit.
  prefs: []
  type: TYPE_NORMAL
- en: If you do not continue pursuing the challenge it takes to level up, it becomes
    boring.
  prefs: []
  type: TYPE_NORMAL
- en: If you try to play a new game but don’t start at level one, you get anxious
    and quit.
  prefs: []
  type: TYPE_NORMAL
- en: A game is a system. A game is a story. A mimics the ebbs and flows of reality.
  prefs: []
  type: TYPE_NORMAL
- en: The mind loves games because the mind loves order. It loves when things make
    sense, and hates when they don’t.
  prefs: []
  type: TYPE_NORMAL
- en: A game contains a hierarchy of goals that orders the mind and results in focus,
    flow, and fulfillment – but only as long as you are progressing through the game.
  prefs: []
  type: TYPE_NORMAL
- en: 'Society is a game with the goals from the bottom up of:'
  prefs: []
  type: TYPE_NORMAL
- en: Go to school so you can get on the same invisible page as everyone else
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Get a job so you can contribute to the operations of society
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Marry someone according to a made-up cultural moral code
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Become chained down with responsibilities you don’t care about (because society
    told you to)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Be forced to focus on menial problems so you waste your time and never threaten
    society by pursuing your own thing and thinking freely
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Retire at whatever age you can with a bit of money just like it was planned
    all along
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hope to never work again and be on eternal vacation (we all know how that turns
    out)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Life is somewhat engaging in school, but when you reach the job quest of the
    societal game, boredom slowly grasps at your sanity and makes you a pleasure-seeking
    robot.
  prefs: []
  type: TYPE_NORMAL
- en: This is the outcome for 99% of people.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t create your own game, you get trapped playing someone else’s, and
    that gets boring… sending you into an eternal cycle of stress and narrow-mindedness.
  prefs: []
  type: TYPE_NORMAL
- en: How To Escape The Matrix
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I am not writing this intending to paint society as evil.
  prefs: []
  type: TYPE_NORMAL
- en: It was mostly an unconscious process of survival.
  prefs: []
  type: TYPE_NORMAL
- en: It is a necessary game we have to play until more people wake up to create a
    more conscious game for children to play, which may take decades if not centuries.
  prefs: []
  type: TYPE_NORMAL
- en: However, for those reading this, there are general steps you can take to escape
    this matrix.
  prefs: []
  type: TYPE_NORMAL
- en: This is not a quick fix.
  prefs: []
  type: TYPE_NORMAL
- en: This is a lifestyle.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is your life’s work:'
  prefs: []
  type: TYPE_NORMAL
- en: To see what you are capable of.
  prefs: []
  type: TYPE_NORMAL
- en: 1) Master Your Survival & Find Purpose
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Your problems are a tight-knit web that bind you to your current situation.
    Problems don’t exist on their own. – The Art of Focus
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: There is a reason you are in a life situation you don’t like.
  prefs: []
  type: TYPE_NORMAL
- en: You have failed to gain awareness of the problems keeping you there.
  prefs: []
  type: TYPE_NORMAL
- en: You haven’t expanded your mind to see beyond your problems, acquire what is
    necessary to solve them (knowledge and skill), and solved them to solidify that
    new level of mind.
  prefs: []
  type: TYPE_NORMAL
- en: You feel lost because you don’t have a purpose.
  prefs: []
  type: TYPE_NORMAL
- en: For simplicity, your purpose is the problem you are solving to achieve a goal.
    Most people are assigned a purpose that doesn’t evolve, and they are forever stuck
    in a narrow-minded state of stress pushing toward the goals of society.
  prefs: []
  type: TYPE_NORMAL
- en: When you master your survival, you no longer have to worry constantly.
  prefs: []
  type: TYPE_NORMAL
- en: You open up room for creativity, spirituality, and meaningful work.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t care about these things because you can’t care about them.
  prefs: []
  type: TYPE_NORMAL
- en: You haven’t solved the problems staring you in the face.
  prefs: []
  type: TYPE_NORMAL
- en: Are you overweight? Is your diet terrible? Do you hate your job? Are you ignoring
    your relationships?
  prefs: []
  type: TYPE_NORMAL
- en: These are interconnected problems, not singular.
  prefs: []
  type: TYPE_NORMAL
- en: Your job may be consuming so much time in your day that you don’t have the energy
    to put effort into other areas of your life. Your nutrition may be contributing
    to that lack of energy and spilling over into your relationships.
  prefs: []
  type: TYPE_NORMAL
- en: 'Mastering your survival is mastering the eternal markets: health, wealth, and
    relationships.'
  prefs: []
  type: TYPE_NORMAL
- en: There’s no coincidence these are the most profitable verticals in business.
    Everyone has these problems, and by solving them, you gain the experience to monetize
    your experience and do what you love.
  prefs: []
  type: TYPE_NORMAL
- en: I discuss this in [Solve Your Own Problems & Sell The Solution](https://thedankoe.com/letters/the-self-reliant-career-path-how-to-generate-independent-income/).
  prefs: []
  type: TYPE_NORMAL
- en: When you fulfill minor purposes of self-improvement, only then can you discover
    deeper, more meaningful purposes.
  prefs: []
  type: TYPE_NORMAL
- en: Stop trying to solve the problems of the world when you haven’t even solved
    your own.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Learn From The Decentralized School System
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You aren’t aware of your potential because you haven’t been exposed to it.
  prefs: []
  type: TYPE_NORMAL
- en: You haven’t been exposed to it because your environment is completely known.
  prefs: []
  type: TYPE_NORMAL
- en: The unknown is the land of possibility.
  prefs: []
  type: TYPE_NORMAL
- en: You must expose yourself to new career paths, health paradigms, and social circles.
  prefs: []
  type: TYPE_NORMAL
- en: Realize the knowledge and skills you must acquire to change your life. Writing,
    marketing, sales, fitness, nutrition, communication, and the rest.
  prefs: []
  type: TYPE_NORMAL
- en: A good starting point is [2 Hour Writer](https://2hourwriter.com), as writing
    is the foundation of any other skill you learn.
  prefs: []
  type: TYPE_NORMAL
- en: When you do, you will feel uncomfortable. Your identity will be threatened.
    It will take time to accumulate.
  prefs: []
  type: TYPE_NORMAL
- en: The creator economy is the decentralized school system.
  prefs: []
  type: TYPE_NORMAL
- en: Creators are solving their own problems, forging new paths, creating new jobs,
    and teaching what they learn through content.
  prefs: []
  type: TYPE_NORMAL
- en: Break out of your bubble of comfort
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Follow new people distributing life-changing information
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Invest in non-traditional education for non-traditional results
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Discover new potentials for your life and act on them
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Life becomes meaningful at the edge of the known.
  prefs: []
  type: TYPE_NORMAL
- en: When you discover novel information, your brain will signal that you’ve encountered
    a meaningful event.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t ignore this.
  prefs: []
  type: TYPE_NORMAL
- en: Pursue it fully.
  prefs: []
  type: TYPE_NORMAL
- en: Obsess over the rabbit whole of education.
  prefs: []
  type: TYPE_NORMAL
- en: This is how you open your mind, order your mind, and train your mind to become
    a new mind – one that isn’t subject to the limits of society.
  prefs: []
  type: TYPE_NORMAL
- en: Create Your Own Infinite Game
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Entrepreneurship is the only logical option for long-term thinkers. – The Art
    of Focus
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you want to stop playing society’s game, you must create your own.
  prefs: []
  type: TYPE_NORMAL
- en: One with infinite progression and evolution.
  prefs: []
  type: TYPE_NORMAL
- en: Not one that traps you at a certain level and makes life boring.
  prefs: []
  type: TYPE_NORMAL
- en: This is done through cultivating a vision for your future, iterating on a plan
    to create that reality, and choosing a vessel that allows you to do that.
  prefs: []
  type: TYPE_NORMAL
- en: Note that I said “cultivate” a vision and “iterate” on a plan.
  prefs: []
  type: TYPE_NORMAL
- en: This is an ongoing process. It doesn’t end. Your vision will not remain static.
    Nor will your plan. As is the same with all things in life, they change.
  prefs: []
  type: TYPE_NORMAL
- en: Illustrate everything you want in your future
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Illustrate everything you don’t want in your future
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create a hierarchy of goals to get there
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Acquire the knowledge and skills necessary
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Make changes to your plan with experience as a feedback mechanism
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can do this in a blank notebook, or use [the FOCI Planner](https://thedankoe.store/products/the-foci-planner)
    I created for this exact process.
  prefs: []
  type: TYPE_NORMAL
- en: When you get bored, don’t quit, pivot. Pursue a higher challenge that utilizes
    the skills you’ve acquired.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example: if you get bored with freelancing, try e-commerce. This is not
    shiny object syndrome, this is intelligence.'
  prefs: []
  type: TYPE_NORMAL
- en: When you get anxious, set a more clear goal between you and the overwhelming
    goal you are trying to achieve.
  prefs: []
  type: TYPE_NORMAL
- en: Leverage The Digital Society
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I see jobs as a stepping stone, not a death sentence (although for *many* it
    is).
  prefs: []
  type: TYPE_NORMAL
- en: For most people, it isn’t feasible to go straight into entrepreneurship.
  prefs: []
  type: TYPE_NORMAL
- en: By nature of the matrix, people take on responsibilities that tie them down
    early in life.
  prefs: []
  type: TYPE_NORMAL
- en: Bills, a family, a house, and a job that can drain your energy to do anything
    about it.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t get me wrong, I am not anti-job.
  prefs: []
  type: TYPE_NORMAL
- en: Jobs are extremely useful for cultivating a valuable skill set, but the fulfilling
    challenge they provide can fade fast, and if work consumes 1/3 of your life, but
    drains your energy for the other 1/3, and you are asleep for the other 1/3… that
    is the first thing that needs to change.
  prefs: []
  type: TYPE_NORMAL
- en: The internet and social media have created a digital society.
  prefs: []
  type: TYPE_NORMAL
- en: Creators and brands are the new education system, media, government (of the
    online space… people calling each other out and whatnot to keep the space clean),
    religion (everyone is pushing an ideology), and economy (everyone is selling something…
    and no, this isn’t a bad thing, it’s survival).
  prefs: []
  type: TYPE_NORMAL
- en: This society is decentralized. You aren’t forced into any one path. You have
    the option to pursue what you want, and you are responsible for your lack of critical
    thought if you get trapped in place.
  prefs: []
