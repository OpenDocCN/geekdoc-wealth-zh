- en: How I Hunt For Viral Ideas (A 5 Minute Reading Habit)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/how-i-read-books-for-maximum-intelligence-5-minute-habit/](https://thedankoe.com/letters/how-i-read-books-for-maximum-intelligence-5-minute-habit/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Books allow you to explore the world that someone else has interpreted.
  prefs: []
  type: TYPE_NORMAL
- en: Books allow you to try on different worldviews to see situations in a new light.
  prefs: []
  type: TYPE_NORMAL
- en: Books present big, powerful, and time-tested ideas that can change the way you
    think. And by changing the way you think, you change the way you act, which determines
    the entirety of your future.
  prefs: []
  type: TYPE_NORMAL
- en: For the longest time, I would force myself to read entire books.
  prefs: []
  type: TYPE_NORMAL
- en: I’d never finish, of course, because they failed to hold my attention after
    some time.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve grown busier over the years.
  prefs: []
  type: TYPE_NORMAL
- en: Business projects can be endless if I don’t say “no.”
  prefs: []
  type: TYPE_NORMAL
- en: I have fitness and self-actualization goals that demand a consistent chunk out
    of my days.
  prefs: []
  type: TYPE_NORMAL
- en: I’m dedicating more time to dating and relationships because I’ve put it off
    to build other areas of my life.
  prefs: []
  type: TYPE_NORMAL
- en: I understand the power of reading, but it’s an afterthought nowadays.
  prefs: []
  type: TYPE_NORMAL
- en: Sure, I can schedule 30 minutes here and there for a good book, but I’ve never
    seemed to sustain that habit. Which is sad because a reading habit keeps your
    mind flowing with ideas. It’s hard to remain stagnant when endless solutions are
    at the top of your mind.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this letter I want to give you the process I’ve used to:'
  prefs: []
  type: TYPE_NORMAL
- en: Incorporate novel information into my day (to expand my mind and maintain the
    zest I have for life)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Capture ideas that I can use to fuel my own writing, articulation, and understanding.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Have it take less than 5 minutes each day so I can sustain my reading habit
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s dig in.
  prefs: []
  type: TYPE_NORMAL
- en: Set An Intention
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Humans are goal-oriented creatures.
  prefs: []
  type: TYPE_NORMAL
- en: We interpret information, conversations, and happenings from our individual
    perspectives.
  prefs: []
  type: TYPE_NORMAL
- en: At the root of that perspective is a series of goals, problems, and beliefs
    surrounding those goals or problems.
  prefs: []
  type: TYPE_NORMAL
- en: For most, this perspective is mindless and firm.
  prefs: []
  type: TYPE_NORMAL
- en: That is, it was conditioned into their head by society and culture.
  prefs: []
  type: TYPE_NORMAL
- en: Most people are automatons with the goal of going to college, getting a job,
    and retiring at 65.
  prefs: []
  type: TYPE_NORMAL
- en: So, they perceive the world through that lens.
  prefs: []
  type: TYPE_NORMAL
- en: They only *see* what helps them achieve those goals.
  prefs: []
  type: TYPE_NORMAL
- en: Any information that does not align with their perspective goes unseen.
  prefs: []
  type: TYPE_NORMAL
- en: Meaning 99% of life itself goes unseen.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you want to experience the depth and opportunity that lies beyond surface-level
    living:'
  prefs: []
  type: TYPE_NORMAL
- en: Set a meaningful goal for your future
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Remind yourself of that goal to hold it in the back of your mind
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Notice how you interpret life in a new light and your decisions begin to align
    with your goals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When you read a book you will begin to notice potential solutions to your problems,
    no matter the book topic.
  prefs: []
  type: TYPE_NORMAL
- en: Hunting For Ideas
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Our ancestors would hunt for food and resources.
  prefs: []
  type: TYPE_NORMAL
- en: But we do not live in that world.
  prefs: []
  type: TYPE_NORMAL
- en: We don’t have to worry about the threats that they did, and our survival needs
    have transcended the physical plane of existence into the mental.
  prefs: []
  type: TYPE_NORMAL
- en: Instead, great and memorable humans hunt for ideas.
  prefs: []
  type: TYPE_NORMAL
- en: To “hunt” is to reap meaningful dopamine from the web of information that we
    have access to online and off.
  prefs: []
  type: TYPE_NORMAL
- en: You do not hunt in the known. You explore the unknown to make novel discoveries.
  prefs: []
  type: TYPE_NORMAL
- en: Read the books that challenge you.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Read the books that pique your curiosity.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Read the books that you’ve been putting off reading.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The ones that have you place one foot in the unknown.
  prefs: []
  type: TYPE_NORMAL
- en: That way, the words pass through the middle of the right and left hemispheres
    of the brain.
  prefs: []
  type: TYPE_NORMAL
- en: The right hemisphere controls what you know while the left controls what is
    unknown.
  prefs: []
  type: TYPE_NORMAL
- en: When information passes through the “middle,” at the edge of your understanding,
    your nervous system signals to you that this is a meaningful event. A novel discovery
    in the making. A cosmic conflict reflected in your psyche that when resolved births
    creative emergence. In our case, a new idea, insight, or perception.
  prefs: []
  type: TYPE_NORMAL
- en: Certain books are so gripping because you are realizing the potential for your
    life. The ideas act as the raw material that you can use to sculpt the musical
    illustration that is your self-written story.
  prefs: []
  type: TYPE_NORMAL
- en: Creativity Is Playing With Mental Legos
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You are forgetful.
  prefs: []
  type: TYPE_NORMAL
- en: We all are.
  prefs: []
  type: TYPE_NORMAL
- en: So, create a commonplace in a handy notebook or app in your phone.
  prefs: []
  type: TYPE_NORMAL
- en: You need a place to capture the ideas that stick out to you the most.
  prefs: []
  type: TYPE_NORMAL
- en: That’s the first step.
  prefs: []
  type: TYPE_NORMAL
- en: The second is to stop reading.
  prefs: []
  type: TYPE_NORMAL
- en: Seriously, once you find a novel idea put down the book.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t read a book to remember every single word. You read a book to find
    a life-changing idea and implement it into your life.
  prefs: []
  type: TYPE_NORMAL
- en: 'Once you find and note the novel idea:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Contemplate the utility of the idea.** How does it relate to your life in
    more ways than one?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Apply it to your goals.** How can the idea aid in the improvement of your
    mind, body, or business?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Attempt to turn it into your own.** How can you rephrase the idea from your
    perspective?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you don’t have an idea development system, [you can download mine here in
    the form of a 7 day creative challenge.](https://7daystogeniusideas.com)
  prefs: []
  type: TYPE_NORMAL
- en: 'In the meantime, here’s how you can attempt to turn it into your own idea:'
  prefs: []
  type: TYPE_NORMAL
- en: Think about your goals.
  prefs: []
  type: TYPE_NORMAL
- en: Think about your current problems.
  prefs: []
  type: TYPE_NORMAL
- en: Think about your personal experiences.
  prefs: []
  type: TYPE_NORMAL
- en: Think about who you are and who you are becoming.
  prefs: []
  type: TYPE_NORMAL
- en: Then, frame the idea from your thoughts on any of the above.
  prefs: []
  type: TYPE_NORMAL
- en: 'I came across this fantastic idea the other day from Johann Wolfgang von Goethe:'
  prefs: []
  type: TYPE_NORMAL
- en: Music is liquid architecture; architecture is frozen music.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'If I contemplate my goals of writing and publishing a book, my reworded idea
    would be along the lines of:'
  prefs: []
  type: TYPE_NORMAL
- en: Books are paper sculptures. Writing is the clay and articulation is the chisel.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I’m sure it could be better or expanded, but you’d be surprised how powerful
    this can get with the ideas you store with time.
  prefs: []
  type: TYPE_NORMAL
- en: '**The lesson:**'
  prefs: []
  type: TYPE_NORMAL
- en: It’s better to focus on one idea instead of being flooded by thousands. Go deep.
    Sit with it. Contemplate it. And avoid getting trapped in the mental masturbation
    cycle of hoarding surface-level ideas that have no practical application to your
    life.
  prefs: []
  type: TYPE_NORMAL
- en: Read for 5 minutes.
  prefs: []
  type: TYPE_NORMAL
- en: '*If an idea doesn’t grip you, choose a different book or skip to a different
    chapter.*'
  prefs: []
  type: TYPE_NORMAL
- en: The Law Of Use
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1104">![](../Images/f32b44ab4223d6e0198c6ec32352ee0c.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Most people don’t need more advice.
  prefs: []
  type: TYPE_NORMAL
- en: They need more powerful ideas to shape their worldview and frame their decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: That way they make better choices, figure it out for themselves, and reap the
    dopamine that comes from trial and error induced progress.
  prefs: []
  type: TYPE_NORMAL
- en: The problem is that to reach powerful ideas you have to expand your mind to
    the point of understanding them.
  prefs: []
  type: TYPE_NORMAL
- en: To understand, ideas must meet reality.
  prefs: []
  type: TYPE_NORMAL
- en: You have to put the ideas you’ve gathered to use and solidify them through direct
    experience.
  prefs: []
  type: TYPE_NORMAL
- en: Only then can you [raise your level of mind](https://thedankoe.com/life-is-hard-get-used-to-it-the-way-to-mental-mastery/)
    to access the next stage of ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Like bodybuilding but with mental capacity.
  prefs: []
  type: TYPE_NORMAL
- en: Progressive overload still applies.
  prefs: []
  type: TYPE_NORMAL
- en: Drowning yourself in surface-level “how to” advice is like lifting 5-pound dumbbells
    for the entirety of your life and expecting to build mental muscle.
  prefs: []
  type: TYPE_NORMAL
- en: 'To brush your ideas up against reality:'
  prefs: []
  type: TYPE_NORMAL
- en: Write or journal to dive into the depths of *one* idea
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Start with a common problem, steps or a story to overcome it, and the transformation
    that occurs from doing so (this is the structure of both human behavior, storytelling,
    and content marketing)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sit with the ideas that stem from your writing and refine them
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: My favorite way of incorporating this mental expansion process is, of course,
    to [contribute to humanity through the creator economy](https://thedankoe.com/the-future-of-the-creator-economy-my-bold-prediction/).
  prefs: []
  type: TYPE_NORMAL
- en: Humans survive on a conceptual level, and this phenomenon is not limited to
    feeling threatened when someone challenges your beliefs.
  prefs: []
  type: TYPE_NORMAL
- en: We seek to reproduce through the transfer of ideas.
  prefs: []
  type: TYPE_NORMAL
- en: On the negative end, ideologues and zealots force their beliefs on you.
  prefs: []
  type: TYPE_NORMAL
- en: On the positive end, creators share their personal experiences and raise the
    collective well-being (and make a living doing so).
  prefs: []
  type: TYPE_NORMAL
- en: 'By writing long-form content, like a newsletter, you effectively:'
  prefs: []
  type: TYPE_NORMAL
- en: Deconstruct the idea you gathered on your hunt
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reconnect the dots through original writing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Deconstruct your own writing into a plethora of ideas
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Repeat the process and increase your mental capacity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In hyper-practical terms: write a newsletter or Twitter thread, break those
    down into tweets, and turn your tweets back into newsletters or threads.'
  prefs: []
  type: TYPE_NORMAL
- en: That’s my content strategy in a nutshell.
  prefs: []
  type: TYPE_NORMAL
- en: I repurpose my newsletter, threads, and tweets to all platforms (and use my
    [2 Hour Writer](https://2hourwriter.com) system to do it).
  prefs: []
  type: TYPE_NORMAL
- en: Not only does it prevent your mind from clogging up and sticking on one menial
    problem, but you impact millions of people along the way.
  prefs: []
  type: TYPE_NORMAL
- en: You will know 1000 people in your life.
  prefs: []
  type: TYPE_NORMAL
- en: They will know 1000 in their lives.
  prefs: []
  type: TYPE_NORMAL
- en: 1 billion people are 2 people that spread your ideas away from you.
  prefs: []
  type: TYPE_NORMAL
- en: Yes, the math on this is correct (even though I failed out of math).
  prefs: []
  type: TYPE_NORMAL
- en: 1000 x 1000 = 1,000,000 people that each have access to 1000 people in their
    lifetime = 1,000,000,000
  prefs: []
  type: TYPE_NORMAL
- en: (I took this idea from Peterson btw).
  prefs: []
  type: TYPE_NORMAL
- en: Don’t underthink your potential impact.
  prefs: []
  type: TYPE_NORMAL
- en: Set an intention.
  prefs: []
  type: TYPE_NORMAL
- en: Hunt for ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Play with mental legos.
  prefs: []
  type: TYPE_NORMAL
- en: Distribute your ideas.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan Koe
  prefs: []
  type: TYPE_NORMAL
- en: 'P.S. When you’re ready:'
  prefs: []
  type: TYPE_NORMAL
- en: There are free productivity tools, creativity challenges, and previous letters
    [on my site.](https://thedankoe.com)
  prefs: []
  type: TYPE_NORMAL
- en: You can also find a paid masterclass to productize yourself in the new economy,
    learn high-impact writing, and a community with 180+ strategies and courses to
    build your own thing.
  prefs: []
  type: TYPE_NORMAL
