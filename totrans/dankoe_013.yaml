- en: The Non-Needy Networking Process (How To Make High Value Connections)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/how-to-network-with-millionaires-and-build-a-name-for-yourself/](https://thedankoe.com/letters/how-to-network-with-millionaires-and-build-a-name-for-yourself/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I’m an introvert at heart.
  prefs: []
  type: TYPE_NORMAL
- en: When I went to college, I was never the first to engage in conversation. My
    friend group (that I still have to this day) kinda just stumbled on me and we
    hit it off.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t even get me started about speaking in front of the class.
  prefs: []
  type: TYPE_NORMAL
- en: Or going to “networking” meetups to get to know high-value people.
  prefs: []
  type: TYPE_NORMAL
- en: I wanted none of it.
  prefs: []
  type: TYPE_NORMAL
- en: All I wanted to do was sit in my dorm, play video games, and work on my side
    business. Which at the time was a fitness YouTube channel.
  prefs: []
  type: TYPE_NORMAL
- en: This was before I realized that introversion isn’t about being anti-social.
    Being social is a skill, not a personality trait, yet people hide behind their
    “introverted” identity to avoid the unavoidable discomfort required to see any
    form of success.
  prefs: []
  type: TYPE_NORMAL
- en: That was college, but now we’re at the center of a new party… social media.
  prefs: []
  type: TYPE_NORMAL
- en: I tried to build a name for myself many times in the past.
  prefs: []
  type: TYPE_NORMAL
- en: First with a YouTube channel.
  prefs: []
  type: TYPE_NORMAL
- en: Second with an Instagram photography and art page (you can find this if you
    scroll allllll the way down to the bottom of my Instagram).
  prefs: []
  type: TYPE_NORMAL
- en: Third was building multiple agencies and eCommerce brands with a variety of
    marketing tactics on social media.
  prefs: []
  type: TYPE_NORMAL
- en: Then I stumbled across Twitter.
  prefs: []
  type: TYPE_NORMAL
- en: Yes, Twitter, of all places to break into the social media scene.
  prefs: []
  type: TYPE_NORMAL
- en: I’d been on Twitter before, but I thought it was a place for politics and half-baked
    memes that I could find on Reddit.
  prefs: []
  type: TYPE_NORMAL
- en: But, one day a post from Jose Rosado popped up on my timeline.
  prefs: []
  type: TYPE_NORMAL
- en: I don’t remember exactly what it was, but it was some harsh truth around self-improvement.
  prefs: []
  type: TYPE_NORMAL
- en: And I loved it.
  prefs: []
  type: TYPE_NORMAL
- en: I followed Jose, and realized that he talked about online business as well,
    another thing I was interested in. (Another reason to [incorporate more of your
    interests](https://thedankoe.com/the-most-profitable-niche-is-you-how-to-create-your-niche/)
    and not be a hyper-niche robot!)
  prefs: []
  type: TYPE_NORMAL
- en: By following him, other accounts started popping up on my timeline and before
    I knew it, I was drowning in high-value “Money Twitter” posts.
  prefs: []
  type: TYPE_NORMAL
- en: I lurked, without engaging, for about 6 months. I was seeing some success with
    my freelance business at the time, so the tips from these accounts were extremely
    helpful.
  prefs: []
  type: TYPE_NORMAL
- en: 'Out of nowhere, a thought popped into my head:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“I can write all of these same tweets. Why am I just sitting here scrolling
    while others are clearly getting leads, sales, and having fun writing about their
    other interests?”*'
  prefs: []
  type: TYPE_NORMAL
- en: That question changed the direction of my life.
  prefs: []
  type: TYPE_NORMAL
- en: '***Quick note**: Solopreneur Sprints starts in a little over a week (February
    7th). [Check it out here](https://sprints.digitaleconomics.school) if you want
    help creating your niche, writing impactful content, and creating a growth strategy.*'
  prefs: []
  type: TYPE_NORMAL
- en: The Digital World Has No Barriers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1010">![](../Images/97704700e7ddea480870675ba40e0703.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: In the past, the only way to the top was through your network.
  prefs: []
  type: TYPE_NORMAL
- en: You couldn’t just DM a celebrity with a skillful message and get them to pay
    you 4 figures for a service (this is an overly optimal case).
  prefs: []
  type: TYPE_NORMAL
- en: You had to go to school.
  prefs: []
  type: TYPE_NORMAL
- en: Get good grades.
  prefs: []
  type: TYPE_NORMAL
- en: Apply to a prestigious college that may require you to change geographic location.
  prefs: []
  type: TYPE_NORMAL
- en: And be “extroverted” enough to network your way up the ladder until you meet
    someone with the perfect opportunity.
  prefs: []
  type: TYPE_NORMAL
- en: Big opportunities were limited to the people that worked their ass off to get
    them.
  prefs: []
  type: TYPE_NORMAL
- en: Now, opportunities are abundant.
  prefs: []
  type: TYPE_NORMAL
- en: That tweet you just scrolled by? They need a video editor.
  prefs: []
  type: TYPE_NORMAL
- en: That person you found in the comments? They want to learn how to be happy.
  prefs: []
  type: TYPE_NORMAL
- en: That video you never saw because it was buried by YouTube’s algorithm? It gave
    exact steps to starting a freelance business if you had the persistence to make
    it work.
  prefs: []
  type: TYPE_NORMAL
- en: The internet gives you access to the 4.9 billion people that have access to
    it.
  prefs: []
  type: TYPE_NORMAL
- en: All it takes is one piece of content to be spread to the right corner for the
    right person to see it, reach out to you, and pay you for the value you have to
    offer.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, this becomes easier as you grow an audience that shares your content,
    so we don’t want to rely on that at the start.
  prefs: []
  type: TYPE_NORMAL
- en: Networking – even though I hate that word – is the pillar of my digital success.
  prefs: []
  type: TYPE_NORMAL
- en: Jose Rosado was one of the first people I reached out to.
  prefs: []
  type: TYPE_NORMAL
- en: We hit it off, he helped share my content, and I ended up investing in his coaching
    program (this was ~3 years ago).
  prefs: []
  type: TYPE_NORMAL
- en: Jose and I have different views on online business now, but that’s the point.
    We each have unique paths to share, and both of them hold valuable experiences
    that others can learn from.
  prefs: []
  type: TYPE_NORMAL
- en: Another example is Joey Justice, one of my best friends (that I’m flying across
    the country to see for another time this year).
  prefs: []
  type: TYPE_NORMAL
- en: I met Joey with a group of other people trying to grow their brand at the time.
    We strategized, shared each other’s content, and worked together to refine the
    skills we wanted to get paid for.
  prefs: []
  type: TYPE_NORMAL
- en: Last year, I moved to Texas with Dakota Robertson and JK Molina.
  prefs: []
  type: TYPE_NORMAL
- en: I also met big players like Justin Welsh, Sahil Bloom, and Dickie Bush.
  prefs: []
  type: TYPE_NORMAL
- en: All in all, it’s safe to say that consistent and targeted networking with people
    that you like is how you break into the social media game (and sustain growth).
  prefs: []
  type: TYPE_NORMAL
- en: If you aren’t networking, you’ve already lost.
  prefs: []
  type: TYPE_NORMAL
- en: Ask any creator that actually has consistent account growth (and doesn’t get
    stuck in a bitter cycle of hating the game) if networking is important.
  prefs: []
  type: TYPE_NORMAL
- en: 'If they don’t attribute it to being the #1 thing that helped their growth,
    it would be wise not to trust them.'
  prefs: []
  type: TYPE_NORMAL
- en: The Power Of The DM
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: DMs are how you get in front of anyone on the internet.
  prefs: []
  type: TYPE_NORMAL
- en: Especially if you don’t have an audience yet.
  prefs: []
  type: TYPE_NORMAL
- en: Freelancers understand this for landing clients, but what about building a leverageable
    audience along the way so you aren’t left with nothing when you decide to pivot?
  prefs: []
  type: TYPE_NORMAL
- en: I’ve seen people land jobs, have tweets go viral with few followers, and gain
    hundreds if not thousands of fans from doing this.
  prefs: []
  type: TYPE_NORMAL
- en: 'People usually fall into one of two camps:'
  prefs: []
  type: TYPE_NORMAL
- en: They don’t understand the sheer power and network effect of DMing people on
    a consistent basis.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They don’t understand that you can get large accounts to share your posts (if
    you are strategic enough).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: DMs are how you network, grow, and get eyes on your content as a beginner (or
    whenever you want to get more traffic to your content).
  prefs: []
  type: TYPE_NORMAL
- en: But, most people suck at DMs.
  prefs: []
  type: TYPE_NORMAL
- en: Seriously. It’s a problem.
  prefs: []
  type: TYPE_NORMAL
- en: 'Never, and I repeat never ever ever expect a response if all you send is:'
  prefs: []
  type: TYPE_NORMAL
- en: Hi or hey
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How are you
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Can you follow me back
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A straight sales pitch with no prior connection
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A long block of text that takes too much time to read (especially if the sentences
    aren’t spaced out)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You have to approach DMs tactically. Especially if you are reaching out to a
    big account that gets 10+ DMs an hour and probably doesn’t check them (they usually
    skim over them to see if there is anything important).
  prefs: []
  type: TYPE_NORMAL
- en: Again, put yourself in the other person’s shoes and think for a second. How
    can you stand out from the sea of crappy DMs that don’t provide a shred of value
    before asking for something in return?
  prefs: []
  type: TYPE_NORMAL
- en: 7 Steps To Non-Needy Networking
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This process started as a viral Twitter thread, turned into a module in the
    Digital Economics cohort, then was used to help people get eyes on their writing
    in my writing course ([**2 Hour Writer**](https://2hourwriter.com/)).
  prefs: []
  type: TYPE_NORMAL
- en: This is foundational, and we will be using this to guarantee growth in the upcoming
    Solopreneur Sprint.
  prefs: []
  type: TYPE_NORMAL
- en: 'Knowing how to communicate and DM another person that you want to connect with
    will open up opportunities to paid work, social leverage, and meeting high-level
    people. You can use this strategy to:'
  prefs: []
  type: TYPE_NORMAL
- en: Get a 50,000+ follower account to retweet your thread which will result in massive
    growth (the same goes for any other social platform sharing your post).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Have connections that will share new growth strategies with you (Dickie Bush
    just sent me a LinkedIn tip the other day out of nowhere, I feel compelled to
    return the favor now).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Join or create mastermind groups and begin forming your tribe (that you will
    grow with for much of your social media journey).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To put your name in more people’s mouths. The more people that know about you,
    the more work and potential connections will be sent your way. **Get your name
    in front of as many eyes as possible.**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here are the 7 steps of Non-Needy Networking:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Find somebody that you WANT to DM**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is not exclusive to making connections. It is crucial for paid work as
    well.
  prefs: []
  type: TYPE_NORMAL
- en: The common theme among service businesses (like freelancers and agencies) is
    that their life is a living hell if they do not resonate with the client they
    are working with.
  prefs: []
  type: TYPE_NORMAL
- en: 'Reach out to people that:'
  prefs: []
  type: TYPE_NORMAL
- en: You are inspired by
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You would want to work with
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You would want to strategize with
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You see potential for mutual benefit
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When you are just starting out, you will have to work your way up the ladder.
    Start by DMing people that are within your follower range.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t know who to DM, I’m assuming you haven’t started yet. A consumer
    perceives social media content from an *entirely different lens* than a creator.
  prefs: []
  type: TYPE_NORMAL
- en: Once you have an audience and leverage, you can really reach out to anybody
    and get a warm response.
  prefs: []
  type: TYPE_NORMAL
- en: '*Where can you find people to DM?*'
  prefs: []
  type: TYPE_NORMAL
- en: The “following” list of accounts that you like.
  prefs: []
  type: TYPE_NORMAL
- en: Or, in the reply area of one of your mentors (if people are replying, it is
    implied that they are trying to grow and network).
  prefs: []
  type: TYPE_NORMAL
- en: Those are the main two areas to find people without using any fancy prospecting
    tools.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Send them an inspired compliment**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Find a piece of their content, work, or current projects that you are truly
    inspired by. Send it to them and tell them how it resonated with you.
  prefs: []
  type: TYPE_NORMAL
- en: This requires you to actually like their work.
  prefs: []
  type: TYPE_NORMAL
- en: People love praise — and per the principle of reciprocity — will feel obligated
    to repay this soft favor.
  prefs: []
  type: TYPE_NORMAL
- en: 'An example for a tweet on managing emotions:'
  prefs: []
  type: TYPE_NORMAL
- en: What’s up Dan, this tweet hit me hard. I’ve been going through it the past couple
    of days and this instantly gave me some relief. Thank you. [add the link to the
    post you liked]
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Simple as that.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Show interest in them**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If they don’t respond, you can try reaching out again in the same manner.
  prefs: []
  type: TYPE_NORMAL
- en: Showing interest is communication 101 — showing interest makes you interesting.
  prefs: []
  type: TYPE_NORMAL
- en: 'Ask them about:'
  prefs: []
  type: TYPE_NORMAL
- en: Their goals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What they are building
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What they do for work
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This gives you the opportunity to give value (even if YOU don’t have value to
    give right now).
  prefs: []
  type: TYPE_NORMAL
- en: Let’s assume they respond with the generic “thank you so much.”
  prefs: []
  type: TYPE_NORMAL
- en: Now, you can either find what they are working on from their profile or just
    ask them.
  prefs: []
  type: TYPE_NORMAL
- en: '**If you find what they are working on:**'
  prefs: []
  type: TYPE_NORMAL
- en: What are your next plans with Modern Mastery? It’s been crazy seeing it grow,
    I’m curious what you’ve got in store.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**If you can’t find what they are working on:**'
  prefs: []
  type: TYPE_NORMAL
- en: Do you have anything that you’re building right now? With that kind of content
    you must have something bigger in the works.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**4) Lead with value**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is the part that trips most people up.
  prefs: []
  type: TYPE_NORMAL
- en: 'Your first options are to:'
  prefs: []
  type: TYPE_NORMAL
- en: See where you can help
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Send actionable tips
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Send resources, systems, or videos you’ve created or remember off the top of
    your head
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Don’t go straight for a transaction when you haven’t given anything first.
  prefs: []
  type: TYPE_NORMAL
- en: If you have to ask more questions in order to send better actionable tips or
    resources, do it.
  prefs: []
  type: TYPE_NORMAL
- en: By resources I mean YouTube videos, articles, or anything that may be able to
    help them — or would pique their interest.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you have no value to give you can:'
  prefs: []
  type: TYPE_NORMAL
- en: Send a resource that can help them with their goals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Connect them with someone else in your network
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Just continue having a good conversation and showing interest
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Show that you are interested in helping them.
  prefs: []
  type: TYPE_NORMAL
- en: '**5) Get on a call to make a deeper connection**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This part is optional but recommended. You can skip straight to step 7 after
    a few days, but I would practice all of these steps at some point.
  prefs: []
  type: TYPE_NORMAL
- en: Making that “face-to-face” interaction is priceless. Nobody can see you, your
    personality, or your mannerisms via text.
  prefs: []
  type: TYPE_NORMAL
- en: When I was starting out, I was getting on zoom calls left and right with people
    that I wanted to get to know better. It’s more normal than you think — and people
    are usually open to it when it is clear that you are just there to get to know
    them.
  prefs: []
  type: TYPE_NORMAL
- en: You can also take the conversation somewhere like Telegram and send voice messages
    to make yourself seem more human. Most social accounts use Telegram and Whatsapp
    groups to communicate and strategize.
  prefs: []
  type: TYPE_NORMAL
- en: '**6) Follow up with value**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Remember their goals and keep an eye out for any content, resources, or people
    you can send their way. When you find something or someone, send it to them.
  prefs: []
  type: TYPE_NORMAL
- en: I remember you telling me about your plans for [their project or goal]. I found
    this today and thought you’d find it helpful.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “This” can be a YouTube video, article, lead magnet you found, or a person you
    connected with that may be able to help them.
  prefs: []
  type: TYPE_NORMAL
- en: '**7) Follow up with an ask**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'By this point, you’ve built a pretty damn solid connection. You’ve given value
    to the point where they are ready to return the favor. From here you can:'
  prefs: []
  type: TYPE_NORMAL
- en: Ask them to join a mastermind group
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Send them one of your posts that you put a lot of time into
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ask any specific questions you have for them without paying for consulting
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If your plan is to leverage their audience for growth, be sure to write a post
    that they would want to share. Then, you can send it to them and mention that
    they inspired that post.
  prefs: []
  type: TYPE_NORMAL
- en: Yo, just wrote this up and thought you’d enjoy it. It was inspired by our previous
    conversation.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Do not ask them to share it. Let them engage with it however they see fit.
  prefs: []
  type: TYPE_NORMAL
- en: Even if you don’t get a retweet or share, any engagement will help more people
    see it — helping you grow. (This is not limited to Twitter. Everything we talk
    about can transfer over to any social media, they all have the same structure.)
  prefs: []
  type: TYPE_NORMAL
- en: You should be reaching out to people almost every day. If you are immersing
    yourself in the environment of your interests, you should see inspirational people
    that you want to reach out to on a daily basis.
  prefs: []
  type: TYPE_NORMAL
- en: '**If you want to increase the chances of larger accounts responding to your
    DMs — follow them and engage with their content for a few days before reaching
    out so they are familiar with your face and profile picture.**'
  prefs: []
  type: TYPE_NORMAL
- en: 8) Final tip
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: “Dan, won’t this take a lot of time?”
  prefs: []
  type: TYPE_NORMAL
- en: Yes, obviously.
  prefs: []
  type: TYPE_NORMAL
- en: If it takes 4 years to get a job that has nothing to do with your degree and
    10 more years to work up to a reasonable salary – it’s gonna take time time to
    build your own dreams.
  prefs: []
  type: TYPE_NORMAL
- en: Which is ironic, because the “uncertain” path of doing your own thing is the
    quickest fix out there, people just lack perspective.
  prefs: []
  type: TYPE_NORMAL
- en: If you understand that DMs will be a part of your life when the time comes to
    take accountability for your future, then you should adopt the habit right now.
  prefs: []
  type: TYPE_NORMAL
- en: Same with being a writer.
  prefs: []
  type: TYPE_NORMAL
- en: Why are you not writing every single day if you plan on doing it every single
    day in the future? Because you aren’t getting paid? So you’re putting of getting
    paid even more by not writing for free? Are you actually serious about any of
    this sh*t?
  prefs: []
  type: TYPE_NORMAL
- en: Get your sh*t together.
  prefs: []
  type: TYPE_NORMAL
- en: As you can tell I’m feeling feisty today.
  prefs: []
  type: TYPE_NORMAL
- en: Too much coffee.
  prefs: []
  type: TYPE_NORMAL
- en: I’m out.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
- en: '**What Happened This Week**'
  prefs: []
  type: TYPE_NORMAL
