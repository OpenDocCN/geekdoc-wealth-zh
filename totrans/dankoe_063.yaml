- en: (Opinion) The Best Online Business Niche
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: （观点）最佳在线商业细分市场
- en: 原文：[https://thedankoe.com/letters/opinion-the-best-online-business-niche/](https://thedankoe.com/letters/opinion-the-best-online-business-niche/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/opinion-the-best-online-business-niche/](https://thedankoe.com/letters/opinion-the-best-online-business-niche/)
- en: When I first started out in online business, I was lost. I suffered from all
    of the problems that I see others suffering from.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 当我刚开始在线商业时，我感到迷茫。我遭受了其他人所遭受的所有问题。
- en: Indecisive about their niche, skillset, offer, lead generation mechanism, and
    the rest. I was stuck in a loop of reaching out to local businesses, making OK
    money, but knowing that I was not building leverage in any form.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 对于他们的细分市场、技能集、提供的产品、潜在客户的生成机制以及其他方面犹豫不决。我陷入了向当地企业伸出援手、赚取一些不错的收入，但知道我在任何形式上都没有建立优势的循环中。
- en: Over the years, everything eventually clicked — as they will for you — but I
    wish I had done this sooner.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 经过多年的努力，所有的事情最终都变得清晰起来——就像它们会为你所做的那样——但我希望我能早点开始做这件事。
- en: '**The C2C Business Model**'
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**C2C商业模式**'
- en: We’ve all heard of the B2B and B2C models. For those unaware, B2B is “business
    to business.” Think an agency that sells marketing services to local businesses.
    B2C is “business to consumer.” Like an eCommerce store selling coffee to an individual.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都听说过B2B和B2C模型。对于那些不知道的人来说，B2B是“企业对企业”。想想一个向当地企业销售营销服务的代理机构。B2C是“企业对消费者”。就像一个电子商务商店向个人销售咖啡。
- en: As social media has — and will continue to — grow and be the lifeblood of digital
    commerce, the want for human connection will grow alongside it. MOST businesses
    understand the importance of building their “online presence.” You can buy anything
    you would ever need online. Groceries, necessities, furniture, anything.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 随着社交媒体的不断发展，并将继续成为数字商业的生命线，人们对人际连接的需求也将随之增长。大多数企业都明白建立自己的“在线存在”的重要性。你可以在网上购买你需要的任何东西。杂货、必需品、家具，任何东西。
- en: This is already developing at high speed, but I predict that things will continue
    to move into the hands of the *individual, the creator*. Amazon will always have
    a leg up, but smaller brands will continue to thrive in the personalization department
    (and they can always sell on Amazon if they’d like.)
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这已经以高速发展，但我预测，事情将继续转移到个人、创作者的手中。亚马逊总是会占据优势，但较小的品牌将继续在个性化部门蓬勃发展（如果他们愿意，他们也可以在亚马逊上销售。）
- en: '*“There are 7 billion people on Earth. Someday, I hope in the future there
    are 7 billion businesses.” — Naval (?)*'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '*“地球上共有70亿人。我希望在未来某天，能有70亿家企业。”——纳瓦尔（？）*'
- en: In comes the C2C business model. Creator to creator. Personal brand to personal
    brand. Individual to “boutique” shop. I was only exposed to this when I started
    building an audience. Now, everything I do revolved around working with individual
    creators that can solve my problems.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 接着出现了C2C商业模式。创作者对创作者。个人品牌对个人品牌。个人对“精品”商店。我只是在开始建立观众时接触到了这一点。现在，我做的所有事情都围绕着与能够解决我问题的个人创作者合作。
- en: The common misconception here is that creators only sell courses, coaching,
    freelance services, or other kinds of digital products and services. This couldn’t
    be further from the truth. There are people that sell homemade cutting boards,
    herbal supplements, bodybuilding supplements, beef liver jerky, and quite literally
    anything you could find on Amazon. They can sell their offers through their audience,
    email list, other digital assets, and any other free / paid traffic mechanism
    (Amazon, Google ads, Facebook ads, influencer and blog marketing, etc).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的常见误解是，创作者只销售课程、辅导、自由职业服务或其他类型的数字产品和服务。这与事实相去甚远。有些人销售自制的切菜板、草药补充剂、健身补充剂、牛肉干，以及你可以在亚马逊上找到的任何东西。他们可以通过他们的观众、电子邮件列表、其他数字资产以及任何其他免费/付费流量机制（亚马逊、谷歌广告、Facebook广告、网红和博客营销等）来销售他们的产品。
- en: In short, the C2C business model is just like any other model – but with infinite
    scale, no need for a large team or employees, and allows you to be in full control
    of your time. Like renaissance times — trading your goods with the people of the
    city — but with the added power of the internet. The ability to reach anybody.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，C2C商业模式就像任何其他模式一样——但具有无限规模，不需要大型团队或员工，并允许你完全掌控你的时间。就像文艺复兴时期——与城市的人们交换商品——但增加了互联网的力量。能够接触到任何人。
- en: '**Why You Should Join The Creator Economy**'
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**为什么你应该加入创作者经济**'
- en: It is growing like wildfire. People are starting to realize that personal brands
    have more influence than any other kind of lead generation mechanism. That’s what
    a personal brand is. A lead generation mechanism for your products or services.
    The cool thing is, all you do is talk about your interests, what you are learning,
    and your expertise. People want to work with you because they connect with you
    on a human level.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 它正在像野火一样蔓延。人们开始意识到个人品牌比任何其他类型的潜在客户生成机制都有更大的影响力。这就是个人品牌。你的产品或服务的潜在客户生成机制。酷的是，你所做的就是谈论你的兴趣、你正在学习的内容以及你的专业知识。人们愿意与你合作，因为他们与你建立了人类层面的联系。
- en: In terms of what you can sell, it can be anything. If you are a beginner and
    want “quick” cash, start a freelance or coaching business. Creators of all forms
    need web design, email marketing, sales closers, performance coaching, masculinity
    coaching, SaaS development, quality physical products, and anything else that
    you could sell to a normal business. The upside? They are 10x more accessible
    than other businesses. Want to get in contact with them? *Send them a DM*. That
    simple.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在你可以销售的内容方面，可以是任何东西。如果你是初学者并且想要“快速”的现金，开始一个自由职业或辅导业务。所有形式的创作者都需要网页设计、电子邮件营销、销售促成者、绩效辅导、男性辅导、SaaS开发、高质量实体产品，以及你可以卖给正常企业的任何其他东西。好处？它们比其他企业更容易接触。想要与他们取得联系？*给他们发一条私信*。就这么简单。
- en: (P.S. you can learn all of these skills, how to build a personal brand, exactly
    how to make your first $3K, $5K, and first 6 figures inside [Modern Mastery HQ](https://join.modernmastery.co/?utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter).
    Proven strategies and systems. If you don’t stick it out and make money — I will
    refund you every penny you paid me.)
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: （P.S. 你可以在[Modern Mastery HQ](https://join.modernmastery.co/?utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter)学习所有这些技能，如何建立个人品牌，确切地如何赚取你的第一个3K美元、5K美元，以及第一个六位数。经过验证的策略和系统。如果你坚持不下来并赚到钱——我将退还你支付给我的每一分钱。）
- en: The most profitable eCommerce brands are the ones that are personalized. They
    sell a product or service that fits a specific individual’s interests and needs.
    They even market through personal brands and influencers with those interests.
    By understanding how to start and grow a personal brand, you bring that personal
    touch with you. You eliminate whatever saturation and competition existed in that
    space *because nobody can replicate your personality.*
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 最有利可图的电子商务品牌是那些个性化的品牌。它们销售的产品或服务符合特定个人的兴趣和需求。它们甚至通过拥有这些兴趣的个人品牌和影响者进行市场推广。通过了解如何开始和扩大个人品牌，你可以带着这种个人风格。你消除了那个空间中存在的任何饱和和竞争，因为没有人能复制你的个性。
- en: '**How To Join The Creator Economy Through Self-Improvement**'
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**如何通过自我提升加入创作者经济**'
- en: If people simply pursued their interests, solved their own life and business
    problems, systemized the solutions, and sold them to individuals that decided
    to solve different problems in *their* lives, you make money and have zero competition.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 如果人们仅仅追求他们的兴趣，解决他们自己的生活和商业问题，系统化解决方案，并将它们卖给决定解决他们*自己*生活中不同问题的个人，你就能赚钱，而且没有竞争。
- en: Becoming a creator is a highly spiritual experience. Self-reflection and self-awareness
    teach you about human nature, persuasion, emotional triggers, and everything else
    that helps you capture and convert attention. You must learn to let your intuition
    lead in this space. Your authentic self must shine through by detaching from your
    faulty perceptions and identifications. Once that is done, life and business become
    a natural strength.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 成为创作者是一种高度精神上的体验。自我反思和自我意识教你关于人性、说服力、情感触发点以及所有帮助你捕捉和转化注意力的东西。你必须学会在这个领域让直觉引导。通过摆脱你错误的感知和认同，你的真实自我必须通过。一旦完成，生活和商业就会成为一种自然的力量。
- en: The service business and online education routes have the lowest risk and lowest
    barrier of entry.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 服务业务和在线教育途径风险最低，进入门槛最低。
- en: '*Here are the steps I would take to monetize any skill or interest as a creator,
    coach, freelancer, or digital product creator.*'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '*以下是我作为创作者、教练、自由职业者或数字产品创作者，将任何技能或兴趣货币化的步骤。*'
- en: Study your interests
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 研究你的兴趣
- en: Start a service business
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 开始服务业务
- en: Grow an audience
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 增长你的受众
- en: Work for free
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 免费工作
- en: Develop your process
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 发展你的流程
- en: Increase prices
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 提高价格
- en: Repeat 5-6
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 重复5-6次
- en: Productize your process
  id: totrans-30
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 产品化你的流程
- en: ''
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This takes 2 years for potential $50K+ months & 3 hour workdays
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这需要2年的时间，潜在的月收入超过50K美元，每天只需工作3小时。
- en: ''
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: College takes 4 years for potential $10K months & 9 hour workdays
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [January 11, 2022](https://twitter.com/thedankoe/status/1480875904104599553?ref_src=twsrc%5Etfw)
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**1) Study a skill or interest that somebody is already monetizing (and aligns
    with you).**'
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Fact of the matter is, you can monetize anything nowadays. Even better, if
    somebody is already making money from it, you can make money too. Remember: a
    solid personal brand eliminates competition. *There is already money flowing in
    a “saturated” space. Don’t try to make money where money isn’t flowing.*'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: If you follow a lot of fitness people, understand it well, and have gotten yourself
    results — that is a good route to take. Same goes for anyone you follow on social
    media. Chances are you are learning from them, understand the topic well, and
    could help someone else get decent results.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Start creating content and understanding your social platform of choice.**'
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I’m biased towards Twitter (clearly). One, because it’s a writing platform.
    You don’t need to learn how to design or record graphics or videos. Two, the retweet
    button exposes you to an entire audience, you can grow much quicker than on other
    platform (like the strategies that JK Molina teaches to [get your first 2000 quality
    followers in record time inside MMHQ](https://join.modernmastery.co/?utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter))
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: Learning how to grow and refine your thoughts through writing is rewarding in
    itself. When it comes time to monetize, it gets even better.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Connect with other people and help them.**'
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: All online business owners will agree when I say that money is made in the DMs
    (especially when starting out). This is a key for growing your audience AND closing
    deals.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: When you are just starting, you have to talk with others and help them solve
    their problems for free. Give them tips on what you have expertise in, get on
    a call with them, understand their life or business, and help.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: I will be talking about this more on Tuesday’s podcast episode, “College or
    Business?” where I go in-depth on all of these steps.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: '**4) Start charging.**'
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After you’ve helped people and gained that next notch of experiential results
    under your belt – start charging $1000 minimum. [You can watch this YouTube video
    I posted a bit back to learn the process.](https://youtu.be/kC1IvnzM_-A?utm_campaign=The%20Mastery%20Letter&utm_medium=email&utm_source=Revue%20newsletter)
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: '**5) Increase prices and productize.**'
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that you’ve substantially increased your prices, are landing 3-4 $5,000
    clients per month, you can productize. That is, you can turn your system that
    get’s results into a digital product that you can sell *through the audience that
    you’ve been building this entire time.*
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: Don’t worry about this step until you’ve gotten to this point. $10K/month via
    high ticket and 10,000 followers. If done correctly, it can take 6-12 months to
    get here. Maybe longer. Maybe shorter if you execute perfectly, but you are human.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在达到这个阶段之前，不必担心这一步。通过高价值销售和10,000名关注者，每月可赚取10K美元。如果做得正确，可能需要6-12个月才能达到这个目标。也许更长。如果执行得完美，也许会更短，但您是人类。
- en: That is all I have for this letter.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是这封信的所有内容。
- en: I have way too many topics to write on, but I am excited to send them out to
    you each Friday.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我有很多话题要写，但我很兴奋每周五都能把它们发送给你们。
- en: Thank you for reading – and thank you for being a supporter of this newsletter.
    Have an incredible weekend, my friend.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您阅读——并感谢您成为这份通讯的支持者。祝您周末愉快，我的朋友。
- en: Dan Koe
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 丹·科
