- en: How To Actually Grow On Social Media (Even If You Have 0 Followers)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/how-to-actually-grow-on-social-media-what-they-dont-tell-you/](https://thedankoe.com/letters/how-to-actually-grow-on-social-media-what-they-dont-tell-you/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I have a lot of followers.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: (Nothing like a bit of narcissism to get this started, right?)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: On a serious note, I say that to frame this conversation. This is for people
    that want to grow on social media.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: I didn’t always have this big of a readership.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: This is obvious, but you know how human nature works.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: People create an image from what they know about you and base their judgments
    around that.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: People see I have 2.8 million followers and don’t think I had 500 at one point
    with a cringeworthy profile.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: It is extremely rare to find a human being who has done the self-development
    required to never judge a book by its cover.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: My first attempt at social media was as a photographer.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: I was in love with taking photos but was never able to monetize it outside of
    a few $50 graduation shoots (the images sucked, sorry whoever paid me to do that).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: I would post my images on Instagram, use a bunch of hashtags that I copied from
    other accounts, and hope that I would somehow gain 100,000 followers someday.
    I had no monetization plan.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: Editing started to catch my eye more in more.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: I would start taking photos just to do some crazy edits on them.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: I spent my days binge-watching YouTube videos to learn Photoshop and Lightroom.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: Eventually, I came across a guy named Visuals Of Julius.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: He would post these surreal images. Something like I’ve never seen before.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: I wanted to do what he did.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: So, my YouTube binges continued.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: I borrowed some Adderall from my roommates and would lock myself in my room,
    jamming to heavy rock, creating whatever my heart desired.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s one of my favorites:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bcba586a247f6d4d7ba36d61494cf316.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
- en: This is when things started to get real.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: I started to uncover the “secret” to social media growth.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: My beautiful images meant nothing on their own. I couldn’t just post and hope
    that our lord and savior, The Algorithm, would save me.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '*I had to get my content in front of people.*'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '*I had to get my content shared by people with larger audiences than me.*'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: (When you zoom out, this is the one and only principle for social media growth,
    even if you are hosting X Spaces or a podcast where someone else is hosting you
    to share your spoken content).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: In the digital art world, there are a lot of curation accounts.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: These were accounts that posted their favorite digital art every day and tagged
    the creator.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: You would only have a chance at getting seen by these accounts if you tagged
    them, used their hashtag, engaged with them, and possibly messaged them to build
    rapport.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: I was consistent for two months.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: I knew I had to create good content that the other accounts would *want* to
    share.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: If I remember correctly, my posts got shared 30-40 times across accounts of
    varying sizes.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: Accounts like “A Game Of Tones” were the jackpot. If you could get shared by
    them you would skyrocket in followers. The dopamine hit from getting shared by
    100K to 500K follower accounts was insane.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: In my first 2 months, I grew my Instagram from 0 to 2500 followers.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: The first 10,000 are always the hardest from what I’ve experienced in myself
    and my students.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: At this point, I burnt out and quit.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: I didn’t see myself sustaining a stimulant addiction and 8-hour days to produce
    one Photoshop composite.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: And, I didn’t know marketing or sales.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: I could have cashed out big if I would’ve created an education product around
    how I create the art (take notes, artists, there’s a reason every other big artist
    has a course or tutorial database. Sell what’s selling).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: 'This short-lived failure of growing a social media brand taught me what is
    actually necessary to grow:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: Get good content in front of other people – that’s the only chance you have
    at someone following you.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: But there are many ways to do this right.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: Let’s talk about every growth mechanism you can leverage, ordered by priority.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: Big Picture – How To Grow On Social Media
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I no longer do Photoshop art.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: I’m a writer now, and this is a part of the [Digital Writer series](https://thedankoe.com/blog/category/digital-writing/),
    so we will be talking about this from that lens – how to get your writing shared.
    (If you want a primer on what and how to write, [read this letter on writing authentic
    content](https://thedankoe.com/letters/dont-get-replaced-by-ai-how-to-write-authentic-content/)).
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: By writing, I mean anything written on social media, which is almost everything.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: Captions, Instagram posts with text on the image, tweets, LinkedIn posts, reels
    scripts, YouTube scripts, etc.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: Social media growth is so straightforward that everyone overcomplicates it,
    or they don’t pay attention to it at all.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: Some people post and post and post just to get mad at the algorithm for not
    spreading their content.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: Other people know how to grow, and they are intelligent individuals, but their
    posts are like art pieces that never get purchased. The artist thinks they are
    the best thing in the world, but the market couldn’t care less.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: Then, there are those who grow a bit but don’t know how to double down on their
    best ideas to compound that growth.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Write Persuasive Content**'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: The keyword here is persuasive.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: 'Persuasion implies a few things:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: '**A hook**. Be mindful as to whether or not your first sentence will grab their
    attention. This goes beyond just the words you use. The structure and design of
    the post can do this, even on X.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**A big problem**. Imply or state a problem that people can relate to. Don’t
    make it too high level.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**A clear solution**. An actionable way to overcome the problem, preferably
    with a unique way of doing so from personal experience.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**A big benefit**. Imply or state a desirable benefit that people will receive
    from your advice.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Confidence or polarization**. Stand firm in your beliefs but be willing to
    change them. Nobody wants to follow someone who doesn’t sound confident or can’t
    choose a side. Say what you want to say. You will get hate like everyone else.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**A novel perspective OR big idea**. This is why reading or consuming content
    is important. If you can find a way of explaining an idea that isn’t normal, it
    will give your readers a dopamine hit and advance their understanding.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The best way to solidify these in your head is to save them somewhere safe and
    try to spot them in the content you see online.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: I will be going over 10 strategies to make your writing more engaging in the
    next letter (with examples).
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: I teach all of this (how to write and grow a brand around your interests) in
    [2 Hour Writer](https://2hourwriter.com).
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Get Eyes On Your Content**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: We’ve discussed this and will discuss it in depth in the next section.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: For now, nail into your head that your content is meaningless if you don’t get
    eyes on it. This should be obvious.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: It’s fine to write content into the void for practice, but don’t let that turn
    into an excuse because you are afraid to grow and face criticism.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Iterate On Your Ideas With Data**'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: You can only reach this step if you have eyes on your content.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: You don’t know what ideas work best for you if you don’t have any engagement
    on them.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: When you do, review your highest-performing content in your analytics each month.
    Copy and paste them into a notes document.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: When you go to write more content, sprinkle in those ideas and write about them
    from different angles.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: This is how you increase your engagement with time.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: '**4) Create Depth & Span For Your Best Ideas**'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: You can do well on one platform like X, but you will eventually become a slave
    to that platform.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: You will have to continue using growth strategies to keep your content in front
    of people. It won’t live on very long.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: Modern power belongs to those who hold the most attention in their lifetime.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: A short post that holds 10 seconds of attention is nothing compared to a video,
    podcast, or newsletter that holds 15-60 minutes of attention.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: You must take your best ideas (from the last part) and turn them into longer-form
    content.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: This is how you get your name spread without you trying.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: This is how you build the roots of your brand deep into the collective psyche.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: This is how you build trust and authority orders of magnitude higher than those
    who only post short content.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: This is why you will almost always attribute the results in your life to a book
    or an author who taught you how.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: Even if someone talks about the same ideas on social media, the author will
    pop into your head (holding your attention) when you read it.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: Traffic Mechanisms – How To Get Your Writing Shared
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that you are hopefully writing and posting content, it helps to understand
    the mechanics of the social media game.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: When you understand how these allow you to grow, you can get creative with how
    you get your content shared.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: These are in no specific order.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: Test them all and see what works best.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: Don’t fall for the trap of social media gurus telling you one is any better
    than the other because tHe ALgoRiThM cHanGEd!!!
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Replies**'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: This is the most obvious one that everyone does.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: If you reply to somebody else’s posts, and readers go into the comments, they
    have a chance of seeing your reply.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: If your reply is good, they may click to your profile, read your content, and
    follow you if it’s good.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: 'There are a few things here that people miss:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: '**Boring content doesn’t make people read the replies**. I see people reply
    to boring posts all day and get a few impressions on their replies. Then they
    wonder what went wrong because.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Boring replies don’t make people click on your profile**. Stop repeating
    what was said in the first post. Talk about yourself here. Tell people how you’ve
    experienced the same thing in your life. Talking about yourself leads to the most
    profile clicks.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Small accounts get fewer impressions overall**. It’s good to reply and network
    with accounts at your size, but don’t think it will help you grow by much (that’s
    fine, you should still do it). Just be sure you are replying to bigger accounts
    with interesting content.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**2) Quote Posts**'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: Quote posts are when someone reposts your content with their own commentary.
    This can be on X or if someone shares your post to their IG story with their own
    commentary.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: On X, this can work very well if you know how to write persuasive content.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: If you quote post someone with valuable advice or something interesting, the
    original creator may repost you to their audience. This means you get more eyes
    on your content, which increases the potential for people to click on your profile
    and follow you.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: Be wary here, don’t aim too high with this one like you would with replies.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: Bigger creators have so many notifications that they will probably miss your
    post.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: Be able to view your growth efforts from the lens of the creator’s audience
    you are trying to leverage.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Reposts**'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: Your content has to be good enough, and relatable enough, for people to want
    to share on their feeds.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: Always think this through before hitting post.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: Will people share it? Why should they share it? Do they identify with anything
    I am saying? Is it polarizing enough to spark discussion and get comments?
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: '**4) Manual DMs**'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: This one is more difficult and slow, but it works for networking and getting
    big accounts to share your posts (if you’re a normal person who isn’t a LinkedIn
    corporate robot in their messages).
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: Nobody *wants* to receive a message like, “Hey! Great to connect! I love your
    stuff! We should have a virtual coffee and talk about the complexities of zapier
    automations to enhance the overall experience of your loyal email subscribers
    so that you can build an incredible digital presence!!!!”
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: You can make friends online to the point where they are happy to just share
    whatever you send them.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: Here’s a letter I wrote on my [Non-Needy Networking Process](https://thedankoe.com/letters/how-to-network-with-millionaires-and-build-a-name-for-yourself/).
    Use it wisely and don’t copy anything I say.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: The manual DM method can also cross over into a method for controlling your
    growth.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: Sending 1 DM may get 1 impression on your posts, but the potential that they
    share those posts is higher if you have a genuine conversation.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: How To *Control* Your Growth On Any Platform
  id: totrans-120
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you are smart, you can use any of the traffic mechanisms we discussed in
    creative ways to control your growth.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: Those are the only tools you can use to grow if you don’t want to be a slave
    to the algorithm.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Short Form To Long Form**'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: Short-form platforms like X, Instagram, and TikTok are inherently more easy
    to grow on than something like YouTube or a podcast.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: You can write more content that gets shared with the traffic mechanisms we discussed.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: I couldn’t grow on YouTube for the life of me, but I knew how to control my
    growth on X.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: So I posted to both and funneled my audience to YouTube with time.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have to do anything that I’m saying here, but this route makes sense
    considering everyone wants to be a YouTuber.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: You’re probably going to have to take a smarter path, and this is one of them.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Curation, Quotes, & Remixing**'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: DJs and producers grow by remixing popular songs so they can “steal” the traffic
    from that popular song.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes they will post reels on Instagram with their remix and the original
    artist (usually with a lot of followers and clout) would share it to their page
    or story.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: This was a similar case to when I was doing digital art.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: I could remix someone else’s art, tag them, and possibly get shared.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: The same is true for writers.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: 'You can:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: '**Quote them in a thread or newsletter**. Use their ideas in your longer posts
    to illustrate a point. Then DM them the post saying that you mentioned them. They
    may repost it without you asking.'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Commentate on their content**. Similar to how YouTubers make reaction videos
    to leverage the traffic that the larger creator is getting.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Get people on a podcast**. People love getting on podcasts. This is how you
    can get exposed to a larger creator’s audience. They will share the podcast to
    have their audience watch or listen.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Talk about their ideas and credit them**. A simple post where you say “The
    best idea I’ve seen this week:” then go on to explain how it impacted you and
    credit the original author.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This stresses the importance of long-form paired with short-form. It will be
    difficult to pull this off in a short post.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: You can, of course, write longer posts on platforms like X to leverage this
    strategy.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Paid Growth**'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: This one gets touchy.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: People who are “super authentic” and moral and noble (who also have zero experience
    with social media) love to say how authentic and moral they are for not using
    paid growth strategies.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: I’ve observed these people over the years, and 4 years down the road they’ve
    either not grown at all or have lost followers.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: People don’t like bitter complainers who stop focusing on providing value and
    pushing a more holistic worldview.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: Now, I’m not talking about running ads to gain followers. That’s the worst thing
    you could do. Do not do it. I repeat, do not do it.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: I’m also not talking about paying for Instagram shoutouts where you pay a large
    theme account to post your content and shout at people to follow you.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: Those are the accounts that have 500K followers with zero engagement.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: I’m talking about a truly authentic post and using a little money to boost your
    results.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: Good content is a prerequisite.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: The paid growth I’m talking about is paying larger accounts that you resonate
    with to spend their time on one of the traffic mechanisms from above.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: Large accounts are busy and probably won’t do this unless you pay them to pay
    attention to you. This isn’t unfair. It’s just reality. You don’t understand what
    they are building that occupies their attention.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: '**You can ask them to repost you.**'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
- en: On X, this is as simple as having them share your post.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
- en: On Instagram, this is having them share your post to their story.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: Do not have them say anything or tag you.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
- en: Let the readers see your content and follow you if they want to.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: '**You can ask them to reply to you.**'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
- en: This works well on something like X when the platform starts to favor comments.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: This is often easier on the creator you are paying because they aren’t sharing
    something to their feed.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
- en: You can really ask them to do anything.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: DM them, ask if they offer help to grow, take the conversation elsewhere, and
    negotiate a deal.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: In my eyes, this is a far better approach than paid ads or anything else to
    monetize your products or services.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
- en: Build your audience with authentic shares, let people follow you because they
    like your content, and then promote your offer to your audience as it grows.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: If you think it’s fine for advertisers to promote a product randomly in your
    face, then I don’t see why you shouldn’t think it’s fine for creators to accept
    money to share content (that you’ll probably like) without asking you to buy anything.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: '**4) Masterminds**'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: 'Harsh truth:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
- en: Every creator you know is in a group chat with other creators.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: They talk strategy and have fun building businesses together.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
- en: They also share each other’s posts and help them grow.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: They use the traffic mechanisms to create a strategy they can bake into their
    routine.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
- en: Some groups comment on each other’s posts each morning.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
- en: Others repost the posts that they share in the group.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: Most of all, they form a tribe and start to identify as a part of a group.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
- en: You can notice that there are tribes of 5-10 creators that all talk to each
    other online. This is why.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: Yes, you will have to DM people, make friends, and let these relationships form
    almost naturally.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
- en: This is a long-term game.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: You will not see insane results in less than a year by staying consistent with
    all of this.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您坚持这样做，不到一年时间内您不会看到疯狂的结果。
- en: Even then, you can still use other strategies to monetize as you grow.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 即使如此，随着您的成长，您仍然可以使用其他策略来货币化。
- en: That’s it for this one.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是这篇的全部内容。
- en: Thank you for reading.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您的阅读。
- en: Dan Koe
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 丹·科
- en: P.S. I teach digital writing inside [2 Hour Writer](https://2hourwriter.com).
    It goes beyond just “learning to write.” It gives you a system to act on every
    day so you can do it for a living.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: P.S. 我在 [2 Hour Writer](https://2hourwriter.com) 内教授数字写作。它不仅仅只是“学习写作”。它提供了一个每天可以采取的行动体系，这样您就可以以此为生。
