- en: 20-30 Years Old Is The Tutorial Phase, Don’t F*ck It Up
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/20-30-years-old-is-the-tutorial-phase-dont-fck-it-up/](https://thedankoe.com/letters/20-30-years-old-is-the-tutorial-phase-dont-fck-it-up/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This letter is going to piss some people off because it’s for a specific type
    of person.
  prefs: []
  type: TYPE_NORMAL
- en: I’m going to sound like an inconsiderate asshole to most people but that’s the
    only way I can get the severity of this situation across.
  prefs: []
  type: TYPE_NORMAL
- en: With that said, consider nuance turned off as of right *now*.
  prefs: []
  type: TYPE_NORMAL
- en: The people who get angry at the brutal honesty here are often those who have
    pretty terrible lives. They haven’t grown as a person past the age of 20 to 25.
  prefs: []
  type: TYPE_NORMAL
- en: 'They are the people who never realized this:'
  prefs: []
  type: TYPE_NORMAL
- en: '*The best way to make the most of your 20s is to make them your worst.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'You see, you have two options:'
  prefs: []
  type: TYPE_NORMAL
- en: Use your 20s to become who you were meant to be.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Repeat the same 6 months for the entirety of your life.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you don’t nearly max out your potential in your 20s, you can simply observe
    society and see that you become like everyone else.
  prefs: []
  type: TYPE_NORMAL
- en: You get stuck in a loop of anxiety, overwhelm, and attempting to live your last
    peak experience. You go to the same bars and raves. You play the same video games.
    You have the best experience of your life because you’re old enough to do new
    things, but not wise enough to realize that those are the lowest peaks one can
    experience, so you fill your life with those shallow activities.
  prefs: []
  type: TYPE_NORMAL
- en: Most people plateau around 23 years old.
  prefs: []
  type: TYPE_NORMAL
- en: When you ask them what they’re doing with their life, in an honest way, they
    don’t have anything to tell you, so they confidently say they’re “just living
    life.”
  prefs: []
  type: TYPE_NORMAL
- en: The thing is, you don’t realize the ramifications of staying the same.
  prefs: []
  type: TYPE_NORMAL
- en: If you did, you’d have no option but to change.
  prefs: []
  type: TYPE_NORMAL
- en: Most people turn 30 years old with the emotional maturity of a 15-year-old.
    The world rapidly pushes forward while your mind, body, spirit, and finances stay
    in place. But that’s the problem. Staying the same is an illusion. Without trying,
    you slowly dig yourself into a mediocre hole that only becomes more difficult
    to climb out of.
  prefs: []
  type: TYPE_NORMAL
- en: Your 20s are the tutorial, not the game.
  prefs: []
  type: TYPE_NORMAL
- en: The preparation, not the main event.
  prefs: []
  type: TYPE_NORMAL
- en: So, here are 3 traps to avoid, and 3 ways to turn it all around.
  prefs: []
  type: TYPE_NORMAL
- en: If you can set yourself up in your 20s, your quality of life will only continue
    to increase, even when your youth is no longer on your side.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t listen to anyone who doesn’t have the life you want.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: People who have the life you want are rare.
  prefs: []
  type: TYPE_NORMAL
- en: 1% of the population.
  prefs: []
  type: TYPE_NORMAL
- en: Possibly less.
  prefs: []
  type: TYPE_NORMAL
- en: The other 99% are people who love to blabber about how you should live your
    life when they wasted their own. They didn’t achieve anything great, so they are
    adamant on convincing you that the greatest things to do in life are the greatest
    things they did, which aren’t great at all.
  prefs: []
  type: TYPE_NORMAL
- en: They will tell you to be more realistic. Aim lower. Be like them. Enjoy your
    20s! Get the job. Create a budget. Invest your measly savings. Live a boring and
    mechanical life doing work you hate until you turn 50, as if it’s some twisted
    rite of passage. Many people say they want the best for you, but in reality, they
    don’t want to feel inferior to you.
  prefs: []
  type: TYPE_NORMAL
- en: The people who have the life you want are often quiet.
  prefs: []
  type: TYPE_NORMAL
- en: They are difficult to find.
  prefs: []
  type: TYPE_NORMAL
- en: Keep an eye out for them.
  prefs: []
  type: TYPE_NORMAL
- en: For most people, taking your parents, teachers, or peers’ advice to heart is
    a death sentence.
  prefs: []
  type: TYPE_NORMAL
- en: Get your taste of distractions, fast.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most people treat their youth as a currency instead of investment capital.
  prefs: []
  type: TYPE_NORMAL
- en: 'They party. They smoke. And while those things aren’t the end of the world
    in and of themselves, they destroy the immense benefits of being young: time,
    energy, focus.'
  prefs: []
  type: TYPE_NORMAL
- en: I was a dumb college kid too, but I always had something to work on that would
    someday “buy my freedom.”
  prefs: []
  type: TYPE_NORMAL
- en: I’m not telling you to avoid those things altogether. In fact, you would benefit
    from getting a taste of them quickly so you can recognize them as mistakes. Instead,
    I’m telling you to *have a life-altering goal that demands you at your best so
    you notice the impact of your degeneracy.*
  prefs: []
  type: TYPE_NORMAL
- en: The average person doesn’t see the problem with drinking and smoking because
    their life doesn’t demand a high level of performance. They work a desk job they’d
    rather not be at, so the hangover and laziness don’t really matter.
  prefs: []
  type: TYPE_NORMAL
- en: However, those aren’t the only social distractions.
  prefs: []
  type: TYPE_NORMAL
- en: I understand that you’re a young person who wants to experience the world and
    has their hormones obliterated from birth control and environmental toxins, but
    no, you aren’t going to meet the love of your life when you’re the worst version
    of yourself.
  prefs: []
  type: TYPE_NORMAL
- en: If you are pursuing a non-average life, you will quickly become unrelatable
    to your friends and partners unless you keep putting a dampener on your potential
    to avoid the thought of losing them in the pursuit of the highest version of yourself.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need to avoid socializing or dating, but if you don’t want to relate
    with 99% of people, and you probably don’t, get used to loving the time you have
    with yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Do everything in your power to never get a job.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When I was around 15 years old, I had an intense burst of insight.
  prefs: []
  type: TYPE_NORMAL
- en: '*If I got a typical job like most people, I would end up like most people.
    A third of my time would disappear as soon as I accepted the offer. Another third
    of my time would be spent asleep. And the last third would be spent doing nothing
    worthwhile, because work you hate – no matter how simple – is the most draining
    thing in the world.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'For the people who have read this far and agreed with most things I’ve said,
    I know what type of person you are, and this next statement won’t be a shocker
    to you:'
  prefs: []
  type: TYPE_NORMAL
- en: You need to start a business.
  prefs: []
  type: TYPE_NORMAL
- en: Immediately.
  prefs: []
  type: TYPE_NORMAL
- en: You’re not the person who’s going to furiously type out how “not everyone should
    start a business” in the comments.
  prefs: []
  type: TYPE_NORMAL
- en: You are the person who wants *control* over your time, energy, and money. You
    understand that the good life stems from an increasing level of challenge, as
    that’s how you develop yourself, and that in 99% of jobs, the level of challenge
    comes to a halt 1-2 years in. It psychologically castrates you.
  prefs: []
  type: TYPE_NORMAL
- en: It really doesn’t matter what kind of business you start because what you do
    2-3 years from now will be completely different.
  prefs: []
  type: TYPE_NORMAL
- en: You won’t get it right the first time.
  prefs: []
  type: TYPE_NORMAL
- en: So keep it simple at the start.
  prefs: []
  type: TYPE_NORMAL
- en: Do something low-cost, beginner level, and popular (because saturation is a
    sign that people need it, and 95% of people suck at it, so if you have a shred
    of ambition, you can make it work.)
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the current beginner to advanced business meta with minimal risk involved:'
  prefs: []
  type: TYPE_NORMAL
- en: Sell a service (freelancing or agency)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Build an audience while doing manual outreach
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Launch an information product or community
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now you have a skillset and cash flow
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hire a team, or start a software or e-commerce business
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Don’t worry about what skills to learn, because we’ll talk about that soon.
  prefs: []
  type: TYPE_NORMAL
- en: Set goals that f*cking scare you.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As I begin writing this section of the letter, my chest is getting tense and
    eyes are getting full, as I can’t help but hope that you all have a chance to
    feel what it’s like to reflect on your life and think, “I can’t believe how far
    I’ve come.”
  prefs: []
  type: TYPE_NORMAL
- en: Little Dan had dreams, but I never thought I’d actually write two books, build
    such a wide influence, be the CEO of a small yet growing startup, and live such
    a simple yet fulfilling life.
  prefs: []
  type: TYPE_NORMAL
- en: The pursuit of greatness can be shot down as materialistic in an instant by
    those who don’t understand.
  prefs: []
  type: TYPE_NORMAL
- en: But there’s something there.
  prefs: []
  type: TYPE_NORMAL
- en: Something deep.
  prefs: []
  type: TYPE_NORMAL
- en: A feeling so powerful that it can’t be replicated in any other way.
  prefs: []
  type: TYPE_NORMAL
- en: A source of energy so potent that big pharma’s strongest stimulant can’t compare.
  prefs: []
  type: TYPE_NORMAL
- en: A cosmic pull demanding you to become the highest version of yourself.
  prefs: []
  type: TYPE_NORMAL
- en: To replicate this, I want you to pull out a sheet of paper.
  prefs: []
  type: TYPE_NORMAL
- en: Title it “10 Goals, 10 Years.”
  prefs: []
  type: TYPE_NORMAL
- en: Write down 10 goals that make you feel uncomfortable.
  prefs: []
  type: TYPE_NORMAL
- en: Spread them out over the course of 10 years.
  prefs: []
  type: TYPE_NORMAL
- en: Focus solely on one massive goal per year.
  prefs: []
  type: TYPE_NORMAL
- en: Why?
  prefs: []
  type: TYPE_NORMAL
- en: Your mind expands to fill the goals set for achievement.
  prefs: []
  type: TYPE_NORMAL
- en: Building a $1 million company and a $100 million company requires the same amount
    of effort, but with different actions.
  prefs: []
  type: TYPE_NORMAL
- en: One could even argue that the owner of a local coffee shop works significantly
    harder than the owner of some online business, yet makes significantly less. Lots
    of context missing here, but don’t miss the point.
  prefs: []
  type: TYPE_NORMAL
- en: It’s common sense by now that hard work doesn’t lead to much in isolation.
  prefs: []
  type: TYPE_NORMAL
- en: You need to identify the actions that lead to the most outsized results, and
    if you don’t have large enough goals, you can’t identify large enough actions.
  prefs: []
  type: TYPE_NORMAL
- en: The greatest risk is no risk at all, and delusional goals change your brain.
  prefs: []
  type: TYPE_NORMAL
- en: I’ll save the explanation of that for another letter.
  prefs: []
  type: TYPE_NORMAL
- en: Make as much money as you can.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Money is tricky.
  prefs: []
  type: TYPE_NORMAL
- en: It’s such a large part of everyone’s lives that it has become intertwined with
    self-worth, morality, and survival, so people rarely see it for what it truly
    is.
  prefs: []
  type: TYPE_NORMAL
- en: Your parents tell you to save it.
  prefs: []
  type: TYPE_NORMAL
- en: Your pastor tells you to shun it.
  prefs: []
  type: TYPE_NORMAL
- en: Your culture tells you it’s not important.
  prefs: []
  type: TYPE_NORMAL
- en: So you don’t make it a priority, and a plethora of problems that can only be
    solved by money start to flood your life while you’re stuck making very little.
  prefs: []
  type: TYPE_NORMAL
- en: Very few people actually decide to see beyond the virtue signaling of others
    and form their own opinion, because in order to do so, they have to dedicate the
    time and brain power to getting rich. They would become the person they hate,
    even when they’ve never met that person. They’re living in a head filled with
    lies that influence their opportunity in the world.
  prefs: []
  type: TYPE_NORMAL
- en: Money is deeply ingrained into your mental, physical, spiritual, and obviously
    financial development. We don’t live in pre-industrial times. No, you can’t live
    like your ancestors, and I doubt you even want to, aside from the fact that you’re
    scared of money and refuse to accept your responsibility to make it.
  prefs: []
  type: TYPE_NORMAL
- en: “But Dan, what if I want to just make as much as I need?”
  prefs: []
  type: TYPE_NORMAL
- en: That’s perfectly fine, but again, you are limiting the level of challenge you
    can take on in multiple domains of your life. You can be mostly happy and satisfied,
    but I am talking specifically to those who cannot stand the thought of hitting
    a point in life where you repeat the same 6 months over and over again.
  prefs: []
  type: TYPE_NORMAL
- en: As dangerous and evil as money can be, you can’t build rockets or feed the world
    without it. Money is a globally accepted form of value, and very few people would
    work in such a motivated fashion without it. It’s an incredible construct. And
    whatever greater problems and innovations spring up throughout the course of evolution
    will probably require some kind of money, be it paper dollars or whatever currency
    that represents the exchange of value emerges.
  prefs: []
  type: TYPE_NORMAL
- en: The fact is, making money is a skill that can be developed like any other.
  prefs: []
  type: TYPE_NORMAL
- en: You aren’t good at making it because your identity is so latched onto unrealistic
    ideologies that skew your perception of everything related to money.
  prefs: []
  type: TYPE_NORMAL
- en: It’s pretty damn clear how you learn an instrument or get good at a video game.
  prefs: []
  type: TYPE_NORMAL
- en: You pick up the instrument. You learn the fundamentals. You attempt to play
    a song. You suck at it. Your brain starts to develop the pathways that lead to
    you playing the song. You choose a harder song. You suck again. You repeat the
    process.
  prefs: []
  type: TYPE_NORMAL
- en: With instruments and video games, there’s no *risk.*
  prefs: []
  type: TYPE_NORMAL
- en: It doesn’t matter if you fail.
  prefs: []
  type: TYPE_NORMAL
- en: But if you fail at making money, you can’t stop worrying about what everyone
    will think of you, how you wasted your time, how superficial you’re being, and
    whether it’s ever going to replace your current source of income.
  prefs: []
  type: TYPE_NORMAL
- en: Most people go about skill acquisition the completely wrong way.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not about studying every source of information you can get your hands on.
  prefs: []
  type: TYPE_NORMAL
- en: It’s about *actually playing the fucking game and improving based on what you
    did wrong the last time.*
  prefs: []
  type: TYPE_NORMAL
- en: When you play a guitar, you choose a song you want to learn to play.
  prefs: []
  type: TYPE_NORMAL
- en: You try to play it, you fail, and then you learn a little technique that was
    used in that song. Once you learn that technique, then another, then another,
    you can now play many songs without needing to study anything.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to make more money, then play a game that results in money until
    you win.
  prefs: []
  type: TYPE_NORMAL
- en: Self-actualize.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If the overarching aim that encompasses all other aims for your life is not
    to self-actualize, then it is to self-sabotage.
  prefs: []
  type: TYPE_NORMAL
- en: Every single action you take must align with the purpose of self-actualization.
  prefs: []
  type: TYPE_NORMAL
- en: If they don’t, then I would assume that you don’t have a deep reason behind
    why you do what you do.
  prefs: []
  type: TYPE_NORMAL
- en: It is difficult to explain the gravity of this.
  prefs: []
  type: TYPE_NORMAL
- en: Most people do not think about the life their actions will lead to.
  prefs: []
  type: TYPE_NORMAL
- en: They have a myopic focus on short-term pleasure that slowly beats them into
    a pulp without them realizing it until decades down the road. That is the worst
    possible place you could imagine yourself. Health issues that caught up with you.
    A mind that can’t adapt to the changing technological landscape. The actions you
    took were never a fully conscious choice, so they never led to anything great.
  prefs: []
  type: TYPE_NORMAL
- en: I shouldn’t have to show you the decades of psychological research that have
    amply dissected human needs and development. I shouldn’t have to explain that
    if you don’t self-actualize, you will drown in unnecessary pain.
  prefs: []
  type: TYPE_NORMAL
- en: For your own good, you need to train your mind to zoom out.
  prefs: []
  type: TYPE_NORMAL
- en: To adopt the perspective of the highest version of yourself and consult with
    them in real time.
  prefs: []
  type: TYPE_NORMAL
- en: 'It needs to become more than second nature to consider these 2 things before
    any small or large decision:'
  prefs: []
  type: TYPE_NORMAL
- en: Who do I want to become?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Who do I not want to become?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, allow your decisions to be shaped by them both.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need to be perfect, but realize that most people never make a conscious
    decision in their lives.
  prefs: []
  type: TYPE_NORMAL
- en: If you can make the right choice even 30% of the time, those actions will be
    the ones that radically shape your future for the better.
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading.
  prefs: []
  type: TYPE_NORMAL
- en: I hope it didn’t make too many people mad.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
- en: P.S. as a thank you for reading this post in its entirety, [here is a link to
    get 25% off](https://letters.thedankoe.com/88de5d98) the premium version of this
    substack (with prompts, marketing strategies, and a full one-person business launchpad
    course).
  prefs: []
  type: TYPE_NORMAL
