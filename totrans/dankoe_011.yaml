- en: The Most Profitable Niche Is You (How To Create Your Niche)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 最有利可图的领域是你（如何创建你的领域）
- en: 原文：[https://thedankoe.com/letters/the-most-profitable-niche-is-you-how-to-create-your-niche/](https://thedankoe.com/letters/the-most-profitable-niche-is-you-how-to-create-your-niche/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://thedankoe.com/letters/the-most-profitable-niche-is-you-how-to-create-your-niche/](https://thedankoe.com/letters/the-most-profitable-niche-is-you-how-to-create-your-niche/)
- en: The first business course I bought was a 6 figure agency course.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我买的第一门商业课程是一堂六位数的代理课程。
- en: This was 6 years ago.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在6年前。
- en: Before that, I didn’t see the value in courses.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在那之前，我看不出课程的价值。
- en: I tried doing everything myself.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我试图自己完成所有事情。
- en: I knew the information was online, and it was, but it never worked.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道信息在网上，它确实存在，但从未奏效。
- en: There were too many missing pieces.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 缺失的环节太多。
- en: Free education on social media is great, but the algorithm encourages people
    to keep it short, sweet, and focused on the most interesting topics.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体上的免费教育很棒，但算法鼓励人们保持简短、甜蜜并专注于最有趣的话题。
- en: Everyone wants free free free and that’s what causes the problem of high value
    advice getting buried under a sea of noise.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都想要免费免费免费，这就是高价值建议被淹没在噪音中的问题所在。
- en: Don’t act like you are immune to this. Nobody is.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 不要表现得你对此免疫。没有人是。
- en: When I was fed up with my multiple business attempts, I was ready to invest
    my entire bank account.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 当我对我的多次商业尝试感到厌倦时，我准备投资我的整个银行账户。
- en: I researched the best business models, found a dude who had a good reputation,
    watched his webinar, and paid $999.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我研究了最好的商业模式，找到了一个有良好声誉的人，观看了他的网络研讨会，并支付了999美元。
- en: This was a *huge* chunk out of my finances.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这对我的财务造成了巨大的影响。
- en: It all went onto my first credit card.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都记在了我的第一张信用卡上。
- en: And, as a college student working part-time, it put a lot of stress on me.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 而且，作为一个兼职的大学生，这给我带来了很多压力。
- en: I was juggling so many things at once.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我同时处理了很多事情。
- en: Schooling that I didn’t care about… but it pushed back my deadline to make my
    business work before getting a job.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我对教育并不关心…但它推迟了我找工作前使我的企业成功的截止日期。
- en: A part-time job that was clearly a dead end.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 一个明显是死胡同的兼职工作。
- en: Multiple business failures before this.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在此之前有多次商业失败。
- en: There was a lot on the line.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 有很多风险。
- en: And, to cut to the chase, it didn’t work out.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，结果并不理想。
- en: The course was great, and taught me about the applicability of copywriting,
    funnels, sales, and the client acquisition process that went on to fuel my future
    businesses…
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这门课程很棒，它教会了我关于文案写作、漏斗、销售和客户获取过程的适用性，这些都为我的未来企业提供了动力…
- en: 'But, there were three things that destroyed my chances at success:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，有三件事摧毁了我成功的机会：
- en: I didn’t give a flying f*ck about running a Facebook ads agency. I didn’t *want*
    to work on my business.
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我对运营一个Facebook广告代理公司根本不感兴趣。我不*想*在我的业务上工作。
- en: Cold emailing local businesses was time-consuming, stressful, and none of them
    had the money to pay me.
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 向当地企业发送冷邮件既耗时又压力大，而且他们中没有一个人有钱支付我。
- en: I was never confident in my niche, and that led to an immense amount of friction
    and shiny object syndrome.
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我从未对自己的领域有信心，这导致了我遇到了大量的摩擦和闪亮物体综合症。
- en: This Facebook ads journey of mine taught me more than any other business, course,
    or opinion out there.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我这次Facebook广告之旅教会了我比其他任何商业、课程或观点都多的东西。
- en: And, even if it didn’t teach me a direct lesson, it identified a problem in
    all future businesses I would start.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 即使它没有直接教会我东西，它也识别了我未来所有企业中存在的问题。
- en: Choosing a niche.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个领域。
- en: '*Before we dive in, this is a planned post (but I still plan to give as much
    value as possible here).*'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '*在我们深入探讨之前，这是一篇计划好的文章（但我仍然计划在这里提供尽可能多的价值）。*'
- en: '[The first Solopreneur Sprint starts February 7th](https://sprints.digitaleconomics.school).
    The first thing we go over is exactly how to create a niche you are confident
    in, one that resembles you. Consider checking it out.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '[第一个独立创业者冲刺活动将于2月7日开始](https://sprints.digitaleconomics.school)。我们首先要了解的是如何创建一个你自信的领域，一个与你相似的领域。考虑去看看。'
- en: It’s a $150 cohort with an interesting, but impactful, structure (so I don’t
    have to charge thousands for the same material).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个150美元的团队，结构有趣且具有影响力（所以我不必为同样的材料收取数千美元）。
- en: The Most Profitable Niche Is You
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最有利可图的领域是你自己
- en: <picture fetchpriority="high" decoding="async" class="wp-image-981">![](../Images/eaadf62a983870563ed789659ccd16b6.png)</picture>
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: <picture fetchpriority="high" decoding="async" class="wp-image-981">![](../Images/eaadf62a983870563ed789659ccd16b6.png)</picture>
- en: The ad agency wasn’t my first, or last, business attempt.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 广告公司并不是我的第一次，也不是最后一次商业尝试。
- en: Other people had made the freelancing model work, and I wasn’t giving up just
    yet (even though I “gave up” multiple times before).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 其他人在自由职业模式中取得了成功，我还没有放弃（尽管我之前“放弃”了好几次）。
- en: After grinding my way to my first 6 figures, I stumbled across Twitter.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在我努力达到第一个六位数之后，我偶然发现了推特。
- en: I found accounts in a little community called “Money Twitter” and they introduced
    me to a path that would lead to where I am now.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我在名为“金钱推特”的小社区中找到了账户，它们介绍了我走向现在的道路。
- en: It didn’t all happen at once, but I had a vision for the future of my brand.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不是一次性发生的，但我对我品牌的未来有一个愿景。
- en: I wrote content, built a product, and focused on solving the problems that stood
    in the way of my ideal future.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我写内容，构建产品，专注于解决阻碍我理想未来的问题。
- en: 'But, one thing made me stand out from everyone else in the business scene:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，有一件事让我在商业场景中脱颖而出：
- en: '*I didn’t have a static niche.*'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '*我没有一个静态的细分市场*。'
- en: My newly repositioned offer was marketing consulting for creators (it only made
    sense to get out of the local business niche), but I didn’t only talk about marketing.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我重新定位的提议是为创作者提供市场营销咨询（离开本地商业细分市场是有意义的），但我不仅仅谈论市场营销。
- en: I talked about whatever I wanted, in a way that illustrated the topic’s importance
    to a broad audience.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我以任何我想谈论的方式，展示了主题对广大受众的重要性。
- en: If I wanted to talk about emotional management, I would.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想谈论情绪管理，我会。
- en: If I wanted to talk about fitness and nutrition, I would.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想谈论健身和营养，我会。
- en: If I wanted to post an aspirational piece of advice, I would.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想发布一些励志的建议，我会。
- en: 80% of my content **did not** revolve around my service, and it didn’t matter.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我80%的内容**不**围绕我的服务，这并不重要。
- en: Why would it?
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么会这样呢？
- en: If I can be interested in both business and fitness, other people can too.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我可以对商业和健身都感兴趣，其他人也可以。
- en: And, if you’re “supposed” to narrow down your niche, is this not the best way
    to do it?
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 而且，如果你“应该”缩小你的细分市场，这不是最好的方法吗？
- en: Just target the people that are like you, or want to become like you since they
    have a similar ideal future.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 只针对像你一样的人，或者想要成为像你一样的人，因为他们有一个相似的理想未来。
- en: It’s not like you promote your products or services in **all** of your content.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不是说你在所有内容中都推广你的产品或服务。
- en: And, you can create a system that bakes authoritative and promotional content
    in.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以创建一个系统，其中包含权威和促销内容。
- en: 'If I want to launch a new product or service, here is what I would do:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想推出新产品或服务，我会这样做：
- en: Talk about whatever I want, in an interesting way that leads to growth.
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 无论是谈论什么，我都以有趣的方式引导人们走向增长。
- en: Craft a 3-week long strategy based on the topics in the product or service (this
    builds authority, and, it’s what I’m doing right now with [Solopreneur Sprints](https://sprints.digitaleconomics.school)…
    pay attention – did I talk about business in the last letter?).
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 基于产品或服务的主题制定一个为期三周的战略（这有助于建立权威，而且这正是我现在在[独奏者冲刺](https://sprints.digitaleconomics.school)中做的事情……请注意——我在上一封信中提到了商业吗？）。
- en: Start beginner level for the sake of customer awareness and increase to advanced
    as it gets closer to launch.
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了提高客户意识，从入门级开始，随着接近推出，逐步提升到高级。
- en: Write long, medium, and short-form content from the top down. The promotions
    write themselves.
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从上到下写长篇、中篇和短篇内容。促销内容自然而然就产生了。
- en: Systemize what worked and incorporate promotions throughout the week to keep
    sales high. Like bi-weekly threads on a topic around your offer.
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 系统化有效的方法，并在一周内穿插促销活动以保持销售额高。比如围绕你的产品或服务的主题进行的双周讨论。
- en: There is a naunced separation between your brand and your product. Your brand
    *is not* your product.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 你的品牌和产品之间存在细微的差别。你的品牌**不是**你的产品。
- en: A few “off-topic” pieces of content aren’t going to ruin your income. They actually
    help it if you know what you are doing.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 几篇“离题”的内容不会破坏你的收入。如果你知道自己在做什么，它们实际上会帮助你。
- en: I was fortunate to have my money problems solved by the time I started as a
    creator.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我很幸运，在我作为创作者开始的时候，我的金钱问题已经解决了。
- en: Most people start for the sake of money, which is good, but the need for survival
    can screw with your creative thinking.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人开始是为了钱，这是好事，但生存的需要可能会干扰你的创造性思维。
- en: Most creators start by subscribing to one business ideology telling them to
    niche down as far as possible, target a person they have nothing in common with,
    and use a skill that they don’t care about to get results. It’s no wonder people
    quit so soon.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数创作者都是从订阅一种商业理念开始的，这种理念告诉他们尽可能细分市场，针对一个与他们没有任何共同点的人，并使用他们不关心的技能来取得成果。难怪人们这么快就放弃了。
- en: If you want to remove all competition, you have to think bigger.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要消除所有竞争，你必须有更大的想法。
- en: A personal brand *can* be a means to landing clients.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 个人品牌*可以*是吸引客户的一种方式。
- en: But, when you treat your message as your life’s work, it is impossible to encapsulate
    everything in one traditional niche.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，当你把你的信息视为你一生的作品时，就不可能在一个传统的细分市场中包含一切。
- en: Your big goals in life will take multiple skills, interests, and expertise.
    Like how spirituality can help with financial freedom or emotional management
    in business. Your interests are what make your brand unique.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 你生活中的大目标需要多种技能、兴趣和专业知识。比如，精神如何帮助实现财务自由或商业中的情绪管理。你的兴趣使你的品牌独一无二。
- en: How To Create Your Niche Of One
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何创建你的个人细分市场
- en: <picture decoding="async" class="wp-image-982">![](../Images/c20cd49263043e82dfe2cca16e486ea1.png)</picture>
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-982">![](../Images/c20cd49263043e82dfe2cca16e486ea1.png)</picture>
- en: From a spiritual lens, your “brand” or “self” can be the outcome of repetitive
    business ideology or a conscious personal creation.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 从精神层面来看，你的“品牌”或“自我”可以是重复的商业理念或有意识的个人创造的结果。
- en: If your brand remains static, you’re in for a world of pain. Instead, we want
    to evolve, and never stop.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的品牌保持静止，你将面临一个充满痛苦的世界。相反，我们希望进化，永不停止。
- en: Because if you don’t evolve, you get trapped in a [lower stage of creator development.](https://thedankoe.com/the-one-person-business-roadmap-99-of-creators-make-this-mistake/)
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 因为如果你不进化，你就会被困在[创作者发展的较低阶段](https://thedankoe.com/the-one-person-business-roadmap-99-of-creators-make-this-mistake/)。
- en: Let’s walk through how to recreate yourself (for the sake of business).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们一起来探讨如何重塑自己（为了商业目的）。
- en: 1) Map Your Ideal Future
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 绘制你的理想未来
- en: How is your story going to end?
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 你的故事将如何结束？
- en: Will it result in peace, health, and fulfilling work? Or do you have no idea?
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这会带来和平、健康和充实的工作吗？还是你毫无头绪？
- en: Your story is what sets your personal brand apart.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 你的故事是你个人品牌与众不同的地方。
- en: If you don’t have a [vision for your future](https://thedankoe.com/the-focus-formula-how-to-take-control-of-your-life/),
    how are you going to self-educate and execute in a conducive direction?
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有[你对未来的愿景](https://thedankoe.com/the-focus-formula-how-to-take-control-of-your-life/)，你将如何自我教育并在有利的方向上执行？
- en: Sit with this and think.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 坐下来思考一下。
- en: We will come back to it in step 3.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在第3步回到它。
- en: 2) Intelligent Imitation
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 智能模仿
- en: When you take stuff from one writer it’s plagiarism, but **when you take from
    many writers it’s called research**. – Wilson Mizner
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当你从一位作家那里拿东西时，这是剽窃，但**当你从多位作家那里拿东西时，这被称为研究**。 —— 威尔逊·米兹纳
- en: My voice is a combination of the voices I love.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 我的嗓音是我所爱的嗓音的组合。
- en: My brand design is a combination of the colors, feel, and style I’ve grown to
    like over time.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我的品牌设计是随着时间的推移，我逐渐喜欢的颜色、感觉和风格的组合。
- en: My products, website, and landing pages were made by taking the best from everyone
    else.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我的商品、网站和着陆页是通过借鉴他人的优点制作的。
- en: A color here, button there, tone shift there, and other minor distinctions.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有颜色，那里有按钮，那里有语调的变化，以及其他一些细微的区别。
- en: I’m not talking about a few big things that make you look like a copy cat. I’m
    talking about every single minor distinction. This compounds with time.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是在谈论让你看起来像模仿者的几件大事。我是在谈论每一个微小的区别。随着时间的推移，这会累积起来。
- en: You do things “your own way” by taking the best from the people you aspire to
    be like and making it your own.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过借鉴你渴望成为的人的优点并使之成为你自己的方式来做“你自己的事”。
- en: 'This works for any project, but here’s what you do:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 这适用于任何项目，但你要这样做：
- en: Write down the books that impacted you the most
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出对你影响最大的书籍
- en: Write down the creators, authors, or public figures who’s style you love the
    most
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出你最爱的创作者、作者或公众人物的风格
- en: Immerse yourself in their work to condition your mind to think in that style
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 沉浸在他们的工作中，让你的思维习惯于那种风格
- en: Write down their tone, voice, and what makes them great
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出他们的语调、嗓音以及他们为什么如此出色
- en: Research their products, landing pages, and every detail about how they make
    an income
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究他们的产品、着陆页以及他们如何赚钱的每一个细节
- en: In short, create a tribe of mentors and exclusively consume their content for
    an extended period of time.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，创建一个由导师组成的部落，并长期独家消费他们的内容。
- en: Become their best friends (in spirit).
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 成为他们的精神上的好朋友（在精神上）。
- en: Then, transfer your passion for what you do through spirit.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，通过精神传递你对所做事情的热情。
- en: You won’t have to copy them if your subconscious mind pieces together their
    ideas into an original one.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你潜意识将他们的想法拼凑成一个新的原创想法，你就不需要复制它们。
- en: You are a perspective vessel, [and that is what makes you unique.](https://thedankoe.com/how-to-copy-your-way-to-success-instead-of-mediocrity/)
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 你是一个视角容器，[这正是你独特之处。](https://thedankoe.com/how-to-copy-your-way-to-success-instead-of-mediocrity/)
- en: If you make it a habit to study every aspect of those you aspire to be like,
    good ideas will become automatic.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你养成研究你所渴望成为的人的每一个方面的习惯，好想法就会变得自动。
- en: Then, execute on those ideas from your perspective.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，从你的角度执行那些想法。
- en: Perspectives are goal oriented.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 视角是目标导向的。
- en: So, create from the perspective of trying to actualize your ideal future.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，从试图实现你理想未来的角度进行创作。
- en: Some people write in their journal because their goal is mental clarity.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人写日记是因为他们的目标是精神上的清晰。
- en: Some people write online because their goal is financial freedom.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人写在线内容是因为他们的目标是财务自由。
- en: What is your goal? And how do particular skills and interests help you get there?
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 你的目标是什么？以及特定的技能和兴趣如何帮助你实现目标？
- en: 3) Book To Brand Content
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 书籍到品牌内容
- en: <picture decoding="async" class="wp-image-983">![](../Images/9100636ad8217c789033f52e82e41251.png)</picture>
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: <picture decoding="async" class="wp-image-983">![](../Images/9100636ad8217c789033f52e82e41251.png)</picture>
- en: Every story has an ideal outcome, an end goal.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 每个故事都有一个理想的结局，一个最终目标。
- en: The path to this end goal is going to be filled with highs, lows, emotions,
    battles, mistakes, and solutions to be systemized.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 通向这个最终目标的道路将充满高潮、低谷、情绪、战斗、错误和需要系统化的解决方案。
- en: 'Here’s how you turn your “self,” or brand into a niche that houses your content,
    products, and services:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何将你的“自我”或品牌转变为一个容纳你的内容、产品和服务的利基市场：
- en: Treat your ideal future as the end goal of the story.
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将你的理想未来视为故事的目标。
- en: Make note of your past, there are a select few pivotal moments that can be your
    starting point of the book.
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记录你的过去，有几个关键的转折点可以作为你书籍的起点。
- en: Write down an outline of the book. What are the chapters that must be included
    to reach the end goal?
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记录下书籍的大纲。为了达到最终目标，必须包含哪些章节？
- en: Outline key points for each of those chapters.
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为那些章节制定关键点大纲。
- en: This won’t be immediate, but you need an outline.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 这不会立即发生，但你需要一个大纲。
- en: Ideas for chapters will come to you as you experience life and make progress.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你经历生活并取得进步，章节的想法会出现在你面前。
- en: You won’t know what to write for some chapters, and that’s the point.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能不知道某些章节要写什么，这正是重点所在。
- en: You will have to acquire skills, interests, and expertise to actualize your
    reality.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 你将不得不获得技能、兴趣和专业知识来实现你的现实。
- en: You are the leader that attracts followers.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 你是吸引追随者的领导者。
- en: Pursue your goals, solve the problems standing in the way, and pass down your
    lessons.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 追求你的目标，解决挡在你道路上的问题，并将你的经验传授下去。
- en: 4) Write Your Story
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 写你的故事
- en: The story makes the brand, and yours is unique.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 故事造就了品牌，你的品牌是独一无二的。
- en: Your story makes you relatable to those going through the same low points as
    you.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 你的故事让你与那些经历与你相同低谷的人产生共鸣。
- en: It gives people hope that there is a way out, and that you are the lighthouse
    to guide them.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 这给人们带来希望，表明有出路，而你正是引导他们的灯塔。
- en: Now that you have an outline for the story of your life, start writing it.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经为你的生活故事制定了大纲，开始写作吧。
- en: Write the sections of each chapter as an article or newsletter.
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将每个章节的章节写成文章或通讯。
- en: Repurpose that writing into a podcast or YouTube video.
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将这些写作内容改编成播客或YouTube视频。
- en: Condense the main points into a thread, carousel or LinkedIn post.
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将主要观点浓缩成一条线索、轮播图或LinkedIn帖子。
- en: Rewrite those main points as engaging tweets.
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将那些主要观点重写为引人入胜的推文。
- en: Turn those tweets into reels and posts for other platforms.
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将那些推文变成其他平台的短视频和帖子。
- en: This process gives you a multi-dimensional understanding of the topic you are
    speaking about.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程让你对你所谈论的主题有一个多维度的理解。
- en: And, if you remember the best ways to learn, teaching is one of them.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，如果你记得最好的学习方法，教学就是其中之一。
- en: You will hate your first pieces of content, but that is how you identify a problem
    to solve.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会讨厌你最初的内容，但这就是你识别要解决的问题的方式。
- en: If you struggle to write, that is a good thing.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你写作有困难，那是一件好事。
- en: 5) When In Doubt, Zoom Out
  id: totrans-138
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5) 当怀疑时，放大视角
- en: <picture loading="lazy" decoding="async" class="wp-image-984">![](../Images/64b4628cf60b2fd1199720455d3c7dd7.png)</picture>
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: <picture loading="lazy" decoding="async" class="wp-image-984">![](../Images/64b4628cf60b2fd1199720455d3c7dd7.png)</picture>
- en: The solution to struggle is perspective.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 解决困境的方法是视角。
- en: This journey is difficult.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 这段旅程是困难的。
- en: You will struggle to articulate your niche, because nobody wants to put themselves
    in a box.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 你将难以表达你的专业领域，因为没有人愿意把自己放在一个框子里。
- en: Understand that you don’t need to solve this problem immediately.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 理解你不需要立即解决这个问题。
- en: Instead, you need to set an intention to solve the problem.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，你需要设定一个解决问题的意图。
- en: From there, you educate yourself with courses, content, and conversations that
    will store creative firepower in your brain.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，通过课程、内容和对话来教育自己，这些将把创造力储存在你的大脑中。
- en: Overload your mind with potential solutions.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 用潜在解决方案来充实你的大脑。
- en: Just don’t get distracted.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 只不要分心。
- en: Next, zoom out.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，放大视角。
- en: Give your mind some breathing room to craft a creative solution to that problem.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 给你的大脑留一些空间，以创造性地解决那个问题。
- en: Go on a walk. Go out with friends. Hit the gym.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 去散步。和朋友出去。去健身房。
- en: Do anything that allows you to stop thinking about work.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 做任何能让你停止思考工作的事情。
- en: Like magic, the “aha!” moment will come.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 就像魔法一样，“啊哈！”的时刻会到来。
- en: Your subconscious mind will send the breakthrough idea to your conscious mind.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 你的潜意识会将突破性想法发送到你的意识中。
- en: This cyclical process is called sovereign living.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 这个循环过程被称为主权生活。
- en: The highs and lows of life are not masked over by the routine of a job.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 生活的起伏不会被工作的日常所掩盖。
- en: Keep that in mind, and enjoy the rest of your day.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 记住这一点，享受你剩余的一天。
- en: '**– Dan Koe**'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: '**– 丹·科**'
- en: P.S. The first Solopreneur Sprint starts on February 7th.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: P.S. 第一次独立创业者冲刺将于2月7日开始。
- en: 'This is an intensive 14-day strategy for overwhelmed creators:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个为期14天的密集策略，适用于感到不知所措的创作者：
- en: Build the base of your one person business
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立你一个人的企业的基础
- en: Create and gain confidence in your niche of one
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创造并对你所在领域的信心
- en: Write 20+ foundational content pieces (that you can repurpose 1000 different
    ways)
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写20多个基础内容（你可以以1000种不同的方式重新利用）
- en: Learn zero-cost strategies to getting eyes on your content and profile (for
    followers)
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习零成本策略，让你的内容和个人资料（对于追随者）获得关注
- en: Repurpose your best content and leverage them to grow even faster
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重新利用你最好的内容，并利用它们更快地成长
- en: '*Without the high prices of the normal cohort model.*'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: '*无需承担正常团队模式的高价。*'
- en: '[If you’re interested, enroll here.](https://sprints.digitaleconomics.school)'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: '[如果你感兴趣，请在此处报名](https://sprints.digitaleconomics.school)'
- en: The price is $150 (for a brand that you will leverage for life).
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 价格是150美元（这是一个你将终身利用的品牌）。
