- en: Stop Caring So Much (It’s Ruining Your Life)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/stop-caring-so-much-its-ruining-your-life/](https://thedankoe.com/letters/stop-caring-so-much-its-ruining-your-life/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Look around.
  prefs: []
  type: TYPE_NORMAL
- en: Everyone is stressed out of their minds.
  prefs: []
  type: TYPE_NORMAL
- en: We all want to achieve big things, but it is becoming infinitely more difficult
    to focus on those big things… so they never get done.
  prefs: []
  type: TYPE_NORMAL
- en: 'Our mind is flooded with:'
  prefs: []
  type: TYPE_NORMAL
- en: The *risk* of pursuing your own goals instead of the ones your parents (or friends,
    or partner, or boss) want for you.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Being told what to care about – skills to learn, countries to support, foods
    to avoid – by people with goals that don’t align with your own.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Thoughts about the job you have to show up to, how much time you are going to
    waste, and all of the things you won’t be able to do.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What people will think if you decide to go your own way and take control of
    your life. What will they think?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are not easy thoughts to deal with.
  prefs: []
  type: TYPE_NORMAL
- en: If your friends or parents don’t support you – or even try to stop you – that
    can become incredibly painful. You may lose people from your life. You may lose
    a part of your identity. That hurts.
  prefs: []
  type: TYPE_NORMAL
- en: The problem is that they don’t know what you know.
  prefs: []
  type: TYPE_NORMAL
- en: They haven’t been exposed to the same information, education, and potential,
    so they don’t see the opportunity.
  prefs: []
  type: TYPE_NORMAL
- en: Their mind is still programmed with beliefs that serve their outdated goals.
    It’s difficult for them to believe that your new endeavor will work out because
    all they know to be possible is what they’ve done.
  prefs: []
  type: TYPE_NORMAL
- en: Parents are very good at this.
  prefs: []
  type: TYPE_NORMAL
- en: They were assigned goals at birth. They pursued those goals and saw results.
    Their identity was shaped, and so was their mind.
  prefs: []
  type: TYPE_NORMAL
- en: If they don’t continue expanding their minds into adulthood, their minds harden.
    Things that don’t align with what they know don’t make sense, and people hate
    what they don’t understand.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the first realization you must make:'
  prefs: []
  type: TYPE_NORMAL
- en: Nobody is going to give you permission to do what you want.
  prefs: []
  type: TYPE_NORMAL
- en: They weren’t exposed to the information you were.
  prefs: []
  type: TYPE_NORMAL
- en: They don’t have the story that you are telling yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Unless they are developed enough to open their mind to that story, you have
    to jump out of the nest at some point and trust that you can learn to fly.
  prefs: []
  type: TYPE_NORMAL
- en: Even further, you only have so much focus you can invest in your goals each
    day.
  prefs: []
  type: TYPE_NORMAL
- en: It’s no wonder why people live in a constant state of stress.
  prefs: []
  type: TYPE_NORMAL
- en: We can’t focus.
  prefs: []
  type: TYPE_NORMAL
- en: We pay too much attention to the goals of others to the point of having zero
    attention left for our own.
  prefs: []
  type: TYPE_NORMAL
- en: As soon as we wake up, we grab our phones and flood our minds with news, advice,
    doomsday predictions, and people doing better than us. The only way to find relief
    is to keep scrolling to make ourselves feel like we are making progress.
  prefs: []
  type: TYPE_NORMAL
- en: The mind craves order. That’s why you feel terrible.
  prefs: []
  type: TYPE_NORMAL
- en: Your attention is not focused on a singular vision for the future so potent
    that distractions cannot penetrate it.
  prefs: []
  type: TYPE_NORMAL
- en: You only have one option.
  prefs: []
  type: TYPE_NORMAL
- en: Feel deep into your situation.
  prefs: []
  type: TYPE_NORMAL
- en: Realize where your life will end up if you keep going down this path.
  prefs: []
  type: TYPE_NORMAL
- en: Become absolutely fed up with the lack of progress you are making.
  prefs: []
  type: TYPE_NORMAL
- en: Use that negative energy to laser in on the meaningful goal you’ve been putting
    off… you know, the inner voice that keeps nagging at you.
  prefs: []
  type: TYPE_NORMAL
- en: “You were meant for more than this.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “You have what it takes to be successful.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “You don’t have to end up like the rest.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Seriously, *feel* into your situation. Stop avoiding it. You have to add to
    the gravity of what you want to achieve.
  prefs: []
  type: TYPE_NORMAL
- en: The pain of not achieving your goals must outweigh the pain of living a comfortable
    life.
  prefs: []
  type: TYPE_NORMAL
- en: You must remove the distractions numbing you from the pain of becoming who you
    were meant to be.
  prefs: []
  type: TYPE_NORMAL
- en: Discipline Comes From Clarity, Not Force
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1976">![](../Images/9ed52e958e8c98cca816235c04ce948d.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Most people don’t understand self-discipline.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not something that’s supposed to be difficult.
  prefs: []
  type: TYPE_NORMAL
- en: It is the byproduct of knowing what you want and accepting nothing less from
    yourself. It is the byproduct of an ordered mind. That is, maintaining a clear
    vision for your future and filling clarity gaps with education and action.
  prefs: []
  type: TYPE_NORMAL
- en: The reason people struggle with self-discipline is because they get distracted
    from what matters.
  prefs: []
  type: TYPE_NORMAL
- en: They forget who they want to become.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They forget what they are capable of.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They forget the impact they want to have.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You aren’t disciplined because you aren’t the person who would seamlessly achieve
    the goal they set out to achieve.
  prefs: []
  type: TYPE_NORMAL
- en: Someone whose true identity is a bodybuilder doesn’t have difficulty eating
    healthy and going to the gym. They just do it.
  prefs: []
  type: TYPE_NORMAL
- en: Someone whose true identity is a writer doesn’t have difficulty blocking out
    time for idea generation, long walks, and writing.
  prefs: []
  type: TYPE_NORMAL
- en: Someone whose true identity is a gamer doesn’t have difficulty trolling people
    online, having a doomer mindset, and ruining their health in front of a screen
    for 8-10 hours a day.
  prefs: []
  type: TYPE_NORMAL
- en: The bodybuilder would see that lifestyle as a living hell. It would be close
    to impossible for them to adopt the gamer lifestyle without going insane and hating
    their life. They would be brutally aware of the goals they aren’t achieving.
  prefs: []
  type: TYPE_NORMAL
- en: Each identity has its tradeoffs. They each require sacrifices that allow them
    to achieve the goals they choose.
  prefs: []
  type: TYPE_NORMAL
- en: 'That leads us to our first step to becoming self-disciplined:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Removing Distractions**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Ask yourself:'
  prefs: []
  type: TYPE_NORMAL
- en: Do you know why you are doing what you are doing?
  prefs: []
  type: TYPE_NORMAL
- en: Have you asked yourself that question in the last month?
  prefs: []
  type: TYPE_NORMAL
- en: Why are you going to school? Working that job? Building that business? Doing
    that workout?
  prefs: []
  type: TYPE_NORMAL
- en: Was it your choice? Or was it a goal that was programmed into your head by your
    parents, friends, or culture?
  prefs: []
  type: TYPE_NORMAL
- en: Audit your life for goals you didn’t know you were pursuing.
  prefs: []
  type: TYPE_NORMAL
- en: Sit with a notebook and write down every single thing you are doing and why
    you are doing it.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t have a good answer, that is a distraction. You are wasting emotional
    energy on someone else’s dreams so you don’t have enough to pursue your own.
  prefs: []
  type: TYPE_NORMAL
- en: If you need help with clarity and are a fan of pen and paper, grab my [FOCI
    Planner](https://thedankoe.store/products/the-foci-planner).
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Life As A Game**'
  prefs: []
  type: TYPE_NORMAL
- en: I’ve been fascinated by the simple concept of anti-goals.
  prefs: []
  type: TYPE_NORMAL
- en: Anti-goals are *not* goals that you *don’t* want to achieve.
  prefs: []
  type: TYPE_NORMAL
- en: They are the sacrifices you are not willing to make to achieve a goal.
  prefs: []
  type: TYPE_NORMAL
- en: As an example, if I want to build a billion-dollar company, what am I not willing
    to sacrifice to get there?
  prefs: []
  type: TYPE_NORMAL
- en: 'Most people who have such lofty goals pay little regard to what they lose along
    the way: their health, their family, and their sanity.'
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, I know it’s possible to build that billion-dollar company
    while being healthy, having good relationships, and maintaining my mental health.
  prefs: []
  type: TYPE_NORMAL
- en: Yes, it will take a lot more time and work, but what else is there to do? Let
    your life burn in front of you because you didn’t have the restraint or discipline
    to carry more than one responsibility?
  prefs: []
  type: TYPE_NORMAL
- en: That’s the beautiful thing about anti-goals. They turn life into a fun game.
  prefs: []
  type: TYPE_NORMAL
- en: They check many boxes for flow – the main characteristic that makes us addicted
    to video games.
  prefs: []
  type: TYPE_NORMAL
- en: '**Challenge** – A goal that is within reach and tests your skill.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Skill** – If your skill is too low for the challenge, you get anxious. If
    it is too high, you get bored, indicating that you need to choose a greater or
    lesser challenge rather than give up.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Clarity** – A hierarchy of greater to lesser goals makes it easier to start
    moving toward your vision for the future.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Feedback** – You know exactly when you are making progress and that feels
    good. You don’t feel trapped in a cycle of repetitive tasks that lead to nowhere.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Rules** – Rules or boundaries frame how you perceive the world. Your mind
    has more space to notice information that aids in the achievement of your goals.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When you turn your life into a game, you become obsessed with progress.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Reinventing Yourself**'
  prefs: []
  type: TYPE_NORMAL
- en: All change is behavior change.
  prefs: []
  type: TYPE_NORMAL
- en: All behavior change is identity change.
  prefs: []
  type: TYPE_NORMAL
- en: So, all change is identity change.
  prefs: []
  type: TYPE_NORMAL
- en: You are what you repeatedly do.
  prefs: []
  type: TYPE_NORMAL
- en: You are disciplined toward the goals that live in your head rent-free at this
    very moment.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t find it difficult to lay in bed, watch Netflix, and play video games
    all day.
  prefs: []
  type: TYPE_NORMAL
- en: For many high-performers, that is the most difficult thing in the world. They
    can’t imagine doing that. The pain of not making progress toward the goals that
    make them who they are would eat them alive.
  prefs: []
  type: TYPE_NORMAL
- en: With that, your journey will be painful.
  prefs: []
  type: TYPE_NORMAL
- en: You are letting your old self die off.
  prefs: []
  type: TYPE_NORMAL
- en: You won’t want to shed the beliefs and habits that are holding you back.
  prefs: []
  type: TYPE_NORMAL
- en: That is step one. Awareness that difficulty is a good sign. A sign to keep going.
  prefs: []
  type: TYPE_NORMAL
- en: The second step is reprogramming your mind to operate toward new goals that
    create a new identity.
  prefs: []
  type: TYPE_NORMAL
- en: Throw yourself into a new environment that aligns with who you want to become.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Drown your mind in ideas, information, and education that expose you to new
    goals and ways to achieve those goals.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: View every situation through the perspective of your ideal lifestyle and make
    decisions accordingly.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Throw yourself into the deep end and teach yourself to swim.
  prefs: []
  type: TYPE_NORMAL
- en: Most people won’t take that leap out of fear.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why we need to talk about self-confidence.
  prefs: []
  type: TYPE_NORMAL
- en: An Unconventional Path To Becoming Self-Confident
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: My life changed when I started writing.
  prefs: []
  type: TYPE_NORMAL
- en: Not just writing in a private journal – which is incredibly helpful – but a
    public one toward a big goal for my future.
  prefs: []
  type: TYPE_NORMAL
- en: 'Writing helped me become confident in my thoughts and life direction by:'
  prefs: []
  type: TYPE_NORMAL
- en: Being exposed to public criticism, forcing me to audit my beliefs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finding friends and connections with shared goals so I stopped feeling like
    an outcast.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Practicing a skill and seeing progress with it every single day.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Failing often to keep me humble and give me new direction that I wouldn’t have
    normally found.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Writing is not the only way to develop self-confidence, but people get writing
    all wrong.
  prefs: []
  type: TYPE_NORMAL
- en: They think it’s some type of skill or hobby.
  prefs: []
  type: TYPE_NORMAL
- en: They don’t see it as the thing that makes us human.
  prefs: []
  type: TYPE_NORMAL
- en: We are the only species that can *pass down* information by documenting knowledge
    with writing to help those who come after us avoid danger and evolve. Writing
    is why we make it so far as individuals and as a collective.
  prefs: []
  type: TYPE_NORMAL
- en: Writing started as carvings in caves and has become ideas on the internet.
  prefs: []
  type: TYPE_NORMAL
- en: The carvings were barely seen, but with the internet, you have the ability to
    change your life and the lives of thousands.
  prefs: []
  type: TYPE_NORMAL
- en: Writing is the intersection of purpose and profit. Don’t underestimate that
    power.
  prefs: []
  type: TYPE_NORMAL
- en: 1) Deconstruct Your Goal
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You aren’t confident because you haven’t invested in your portfolio of failures.
  prefs: []
  type: TYPE_NORMAL
- en: You’ve spent too much time residing in the comfort of other people’s paths in
    life.
  prefs: []
  type: TYPE_NORMAL
- en: You’ve failed to break free from the masses, think for yourself, set your own
    goals, and achieve them regardless of how long it takes.
  prefs: []
  type: TYPE_NORMAL
- en: You aren’t confident because you don’t have results in anything aside from what’s
    already been done.
  prefs: []
  type: TYPE_NORMAL
- en: Sit with your thoughts.
  prefs: []
  type: TYPE_NORMAL
- en: What do you really want out of life?
  prefs: []
  type: TYPE_NORMAL
- en: Is it the same boring path as everyone else?
  prefs: []
  type: TYPE_NORMAL
- en: No?
  prefs: []
  type: TYPE_NORMAL
- en: 'Then the only option is to:'
  prefs: []
  type: TYPE_NORMAL
- en: Pay attention to what you don’t want in life by observing the actions of most
    people and where those lead.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Do the opposite of everyone else if you want to achieve something more out of
    life.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Think about your future and deconstruct it into goals you will have to achieve
    and actions you will have to take.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Educate yourself every single day with material that will help you achieve those
    goals.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Block out time for focused work to build out your vision for the future.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, start.
  prefs: []
  type: TYPE_NORMAL
- en: Self-confidence comes from doing what you think is uncomfortable, over and over
    again, and realizing it wasn’t that bad in the first place.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Start A Business
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you truly think about what you want in life, starting a business is not optional.
  prefs: []
  type: TYPE_NORMAL
- en: You want autonomy, work you enjoy, and to have an impact on the world so you
    can fulfill your human need to be a valuable contribution to humanity.
  prefs: []
  type: TYPE_NORMAL
- en: A business is not some capitalistic pursuit to own a private jet and mansion.
  prefs: []
  type: TYPE_NORMAL
- en: A business is how you solve problems.
  prefs: []
  type: TYPE_NORMAL
- en: A business is how you build something of your own.
  prefs: []
  type: TYPE_NORMAL
- en: A business is how you contribute to humanity through value exchange.
  prefs: []
  type: TYPE_NORMAL
- en: A business is how you take back control of your life.
  prefs: []
  type: TYPE_NORMAL
- en: A business is how you develop self-confidence in your interests and expertise.
  prefs: []
  type: TYPE_NORMAL
- en: Most people are programmed to have a negative reaction to the word “business.”
  prefs: []
  type: TYPE_NORMAL
- en: “It’s too hard.”
  prefs: []
  type: TYPE_NORMAL
- en: “Money is evil.”
  prefs: []
  type: TYPE_NORMAL
- en: “It’s a superficial pursuit.”
  prefs: []
  type: TYPE_NORMAL
- en: 'And then they go on to do the hardest thing of all:'
  prefs: []
  type: TYPE_NORMAL
- en: They hide from their desire to reach their potential, self-actualize, and self-transcend
    by demonizing anyone and anything that would compromise the comfort they don’t
    even know they are addicted to.
  prefs: []
  type: TYPE_NORMAL
- en: They continue to be a cog in the machine of a business that makes millions selling
    a product. They cry about how most businesses are unethical, yet they work for
    one, and don’t realize the only way to combat it is to start their own ethical
    business.
  prefs: []
  type: TYPE_NORMAL
- en: They say it’s superficial, yet they distract their mind whenever they have the
    time. They never escape the surface. They never see business as the vessel to
    dive into the depths that life has to offer on the unknown path.
  prefs: []
  type: TYPE_NORMAL
- en: A business is the storefront of your value.
  prefs: []
  type: TYPE_NORMAL
- en: It is the public display of yourself, your goals, and your values.
  prefs: []
  type: TYPE_NORMAL
- en: Businesses are an extension of yourself.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Write In Public
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Writing is a superpower.
  prefs: []
  type: TYPE_NORMAL
- en: You can achieve your goals faster.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can attract like-minded people.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can start with zero experience.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You become comfortable with people seeing your ideas.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And, writing is the foundation of media.
  prefs: []
  type: TYPE_NORMAL
- en: Everything you see online from posts to videos to advertisements start with
    writing.
  prefs: []
  type: TYPE_NORMAL
- en: Media is where the attention is.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to do anything worthwhile in life, you will need your own source
    of attention.
  prefs: []
  type: TYPE_NORMAL
- en: You can no longer rely on your boss to generate attention, attract customers,
    and assign you some measly work for a set amount of money to fulfill the product
    or service to those customers.
  prefs: []
  type: TYPE_NORMAL
- en: You must do all of the above.
  prefs: []
  type: TYPE_NORMAL
- en: Writing in public is the first step for beginners who don’t have capital or
    experience.
  prefs: []
  type: TYPE_NORMAL
- en: Writing is a zero-barrier-to-entry business model that allows you to build an
    audience for anything you are interested in.
  prefs: []
  type: TYPE_NORMAL
- en: Choose 2-3 topics to write about, topics you want to learn about, build a name
    for yourself in, and turn into a meaningful career.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learn through observation. Watch what other’s in those topics are writing about,
    how they write about it, and why they say things the way they do.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you think, “I could have wrote this,” then write about it… you don’t need
    permission on the internet.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t know where to start, consider enrolling in [2 Hour Writer](https://2hourwriter.com).
  prefs: []
  type: TYPE_NORMAL
- en: 4) Make New Friends
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Mastermind:'
  prefs: []
  type: TYPE_NORMAL
- en: Multiple minds working together to achieve a shared goal.
  prefs: []
  type: TYPE_NORMAL
- en: In the past, you needed to work hard for connections to make your business a
    success.
  prefs: []
  type: TYPE_NORMAL
- en: Now, you have access to anyone with the click of a button.
  prefs: []
  type: TYPE_NORMAL
- en: Your success is no longer determined by your socioeconomic status and physical
    location.
  prefs: []
  type: TYPE_NORMAL
- en: It is determined by who you are connected to and the opportunities they can
    pass off.
  prefs: []
  type: TYPE_NORMAL
- en: How do you find these connections?
  prefs: []
  type: TYPE_NORMAL
- en: Have a goal you want to achieve.
  prefs: []
  type: TYPE_NORMAL
- en: How do you attract people to that goal?
  prefs: []
  type: TYPE_NORMAL
- en: Starting a business with a mission to achieve that goal.
  prefs: []
  type: TYPE_NORMAL
- en: How do you get in front of well-connected people?
  prefs: []
  type: TYPE_NORMAL
- en: Writing in public to spread your ideas.
  prefs: []
  type: TYPE_NORMAL
- en: What does this have to do with self-confidence again?
  prefs: []
  type: TYPE_NORMAL
- en: Well, it’s kinda obvious.
  prefs: []
  type: TYPE_NORMAL
- en: You won’t develop confidence if you don’t push beyond your limits and fail.
  prefs: []
  type: TYPE_NORMAL
- en: A goal, business, and writing – in that order – are how you continue to repeat
    this process to infinity. There are no limits except for the ones you place on
    yourself.
  prefs: []
  type: TYPE_NORMAL
- en: You will eventually hit a ceiling in a job. Someone is in charge of the limits
    you can reach.
  prefs: []
  type: TYPE_NORMAL
- en: If you aren’t hopping on the evolution train with technology, AI, and the internet
    by “opening up shop” in virtual reality (the internet and social media) they will
    make you obsolete.
  prefs: []
  type: TYPE_NORMAL
- en: You make friends by showing up online and talking to people.
  prefs: []
  type: TYPE_NORMAL
- en: Just like you would at a party.
  prefs: []
  type: TYPE_NORMAL
- en: On the internet, you increase your social proof with your brand and ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Outside of the internet, you increase your status with cars, looks, and material
    acquisitions.
  prefs: []
  type: TYPE_NORMAL
- en: It’s obvious which one leads to a better life.
  prefs: []
  type: TYPE_NORMAL
- en: After 4 years of writing, I can message almost anyone and work with them if
    I have what they want.
  prefs: []
  type: TYPE_NORMAL
- en: As an example, Gordon Ramsey follows me.
  prefs: []
  type: TYPE_NORMAL
- en: I don’t know what I would need from him, but who knows, something could come
    of it down the road.
  prefs: []
  type: TYPE_NORMAL
- en: 4) Publish Your Work
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To understand confidence we must understand stories.
  prefs: []
  type: TYPE_NORMAL
- en: Stories = transformation.
  prefs: []
  type: TYPE_NORMAL
- en: You aren’t confident because you are trapped in someone else’s story. You don’t
    have a chance to transform into who you were meant to become.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have full control over your ability to escape the low point of the
    story, reach the climax, and have a happy resolution.
  prefs: []
  type: TYPE_NORMAL
- en: The path out of a low point is trial and error, the essence of life itself.
  prefs: []
  type: TYPE_NORMAL
- en: Your first attempt at writing will suck.
  prefs: []
  type: TYPE_NORMAL
- en: Your first attempt at launching a product will suck.
  prefs: []
  type: TYPE_NORMAL
- en: Your first attempt at making friends will suck.
  prefs: []
  type: TYPE_NORMAL
- en: The reason 99% of people are cripplingly unconfident is because unconsciously
    think you just become confident without doing anything that breeds a more stable
    form of confidence.
  prefs: []
  type: TYPE_NORMAL
- en: Confidence is improvement.
  prefs: []
  type: TYPE_NORMAL
- en: Publish your writing and be called an idiot.
  prefs: []
  type: TYPE_NORMAL
- en: Publish your product and collect the negative feedback.
  prefs: []
  type: TYPE_NORMAL
- en: Put yourself out there and let people expose your flaws.
  prefs: []
  type: TYPE_NORMAL
- en: Only then, once you are aware of the problem, can you know what to improve.
  prefs: []
  type: TYPE_NORMAL
- en: You can’t improve what isn’t published.
  prefs: []
  type: TYPE_NORMAL
- en: You can’t improve if you aren’t aware of the problem.
  prefs: []
  type: TYPE_NORMAL
- en: Dying in your dark hole of comfort prevents you from both.
  prefs: []
  type: TYPE_NORMAL
- en: The longer you decide to stay there, the longer it will take to develop confidence.
  prefs: []
  type: TYPE_NORMAL
- en: You can read this and do nothing with your life because you “don’t know enough
    to start.”
  prefs: []
  type: TYPE_NORMAL
- en: Or you can finally take the leap and dedicate your life to learning and building
    rather than expecting everything to be given to you.
  prefs: []
  type: TYPE_NORMAL
- en: That’s it for today.
  prefs: []
  type: TYPE_NORMAL
- en: Enjoy the rest of your week.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan
  prefs: []
  type: TYPE_NORMAL
