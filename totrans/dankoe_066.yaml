- en: The Art Of Self-Architecture (How To Change Who You Are)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-art-of-self-architecture-how-to-change-who-you-are/](https://thedankoe.com/letters/the-art-of-self-architecture-how-to-change-who-you-are/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Life is a game and your character determines the outcome.
  prefs: []
  type: TYPE_NORMAL
- en: Your character is malleable.
  prefs: []
  type: TYPE_NORMAL
- en: That’s the first realization you must make.
  prefs: []
  type: TYPE_NORMAL
- en: You can change.
  prefs: []
  type: TYPE_NORMAL
- en: No matter how painful.
  prefs: []
  type: TYPE_NORMAL
- en: No matter what your mind tells you.
  prefs: []
  type: TYPE_NORMAL
- en: No matter how much you want to cling to the comforts of your current life that
    are causing more destruction than you think.
  prefs: []
  type: TYPE_NORMAL
- en: 'Your character is your concept of self: who you think you are.'
  prefs: []
  type: TYPE_NORMAL
- en: An amalgamation of ideas, beliefs, experiences, and information you’ve processed
    that compose the operating system from which you interact with reality.
  prefs: []
  type: TYPE_NORMAL
- en: For most, their character was created for them.
  prefs: []
  type: TYPE_NORMAL
- en: In our childhood, every single one of us are a product of our environment.
  prefs: []
  type: TYPE_NORMAL
- en: The fundamental human drive to learn allows us to soak up any and all information
    that will contribute to our survival.
  prefs: []
  type: TYPE_NORMAL
- en: With this information, we are set on a default yet mediocre trajectory.
  prefs: []
  type: TYPE_NORMAL
- en: Like a train hurling down the tracks, if we don’t learn to conduct our own adventure
    we may end up heading towards a dead end.
  prefs: []
  type: TYPE_NORMAL
- en: The fate of humanity is not guaranteed.
  prefs: []
  type: TYPE_NORMAL
- en: This is the case for every life form.
  prefs: []
  type: TYPE_NORMAL
- en: If we do not make intelligent and conscious choices, we may eradicate ourselves
    from the face of the Earth.
  prefs: []
  type: TYPE_NORMAL
- en: This is the worst-case scenario, but it is an ever-increasing possibility.
  prefs: []
  type: TYPE_NORMAL
- en: Our character determines our actions.
  prefs: []
  type: TYPE_NORMAL
- en: Our actions contribute to society and culture.
  prefs: []
  type: TYPE_NORMAL
- en: Society and culture influence the programming of other characters.
  prefs: []
  type: TYPE_NORMAL
- en: The ideas, beliefs, and information that compose the form of our character will
    be spread through our choices to form other characters.
  prefs: []
  type: TYPE_NORMAL
- en: The collective character will determine its own fate.
  prefs: []
  type: TYPE_NORMAL
- en: It all starts with an individual’s ability to wake up from their mediocre trajectory,
    change who they are, and let their actions impact the world.
  prefs: []
  type: TYPE_NORMAL
- en: The Paradox Of Personal Development
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Life is a game that houses infinite games.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are two macro games that are the most fruitful:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) The External Game**'
  prefs: []
  type: TYPE_NORMAL
- en: The external game is what you choose to do with your life.
  prefs: []
  type: TYPE_NORMAL
- en: It is the self-generated goals you pursue that impact humanity.
  prefs: []
  type: TYPE_NORMAL
- en: It is your life’s work (that I help you discover and create in [Digital Economics](https://digitaleconomics.school)).
  prefs: []
  type: TYPE_NORMAL
- en: The thing that you dedicate your time, focus, and money to building as a modality
    for value creation.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) The Internal Game**'
  prefs: []
  type: TYPE_NORMAL
- en: If your external pursuits are not backed by a philosophical sense of mastery,
    they will remain superficial and meaningless.
  prefs: []
  type: TYPE_NORMAL
- en: For every goal you pursue outward, there is a lesson you must unlock inward.
  prefs: []
  type: TYPE_NORMAL
- en: That is the paradox of personal development.
  prefs: []
  type: TYPE_NORMAL
- en: The higher you push in the world the deeper you dive into yourself… if you don’t
    get lost.
  prefs: []
  type: TYPE_NORMAL
- en: As you develop yourself you increase your level of mind.
  prefs: []
  type: TYPE_NORMAL
- en: At each level, you get a top-down view of your past experiences.
  prefs: []
  type: TYPE_NORMAL
- en: You start to realize the structure of the system, or game, that you were playing
    (or allowing to play you).
  prefs: []
  type: TYPE_NORMAL
- en: A season of internal struggle is the requirement to reach your next level of
    mind.
  prefs: []
  type: TYPE_NORMAL
- en: When you acquire the skill or knowledge necessary, you reach the next level
    of mind that solves the problem you were facing.
  prefs: []
  type: TYPE_NORMAL
- en: Like how I failed at 7 different businesses.
  prefs: []
  type: TYPE_NORMAL
- en: I tried everything under the sun.
  prefs: []
  type: TYPE_NORMAL
- en: Learned every skill I could.
  prefs: []
  type: TYPE_NORMAL
- en: Tried freelancing, dropshipping, agency work, and social media with minimal
    results.
  prefs: []
  type: TYPE_NORMAL
- en: Nothing happens, then everything happens.
  prefs: []
  type: TYPE_NORMAL
- en: All at once, the puzzle pieces I had been gathering clicked in my brain.
  prefs: []
  type: TYPE_NORMAL
- en: An avalanche called insight crashed into my psyche.
  prefs: []
  type: TYPE_NORMAL
- en: I knew exactly what I had to do to make my next business endeavor work.
  prefs: []
  type: TYPE_NORMAL
- en: After multiple cycles of this phenomenon, I am where I am now.
  prefs: []
  type: TYPE_NORMAL
- en: This is why no matter how much free “game” I give you, you will still have to
    struggle for years.
  prefs: []
  type: TYPE_NORMAL
- en: You have to battle with reality to get the lesson that makes perfect sense to
    you.
  prefs: []
  type: TYPE_NORMAL
- en: It won’t happen in an instant. You must commit to the path of uncertainty for
    life.
  prefs: []
  type: TYPE_NORMAL
- en: Superficial To Metaphysical (Chiseling Inward)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The path of the problem solver, or value creator, is how you escape the world
    of replaceability. Fall in love with the challenge that problems present, from
    superficial to metaphysical, and your ideal future will create itself. This is
    the infinite game.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: That is a quote from my finally finished book, *The Art Of Focus*, launching
    (hopefully) this year.
  prefs: []
  type: TYPE_NORMAL
- en: To change who you are you must strike a balance between peace and progress.
  prefs: []
  type: TYPE_NORMAL
- en: You have to push outward toward meaningful goals while shedding the hardened
    shell of an identity you’ve formed.
  prefs: []
  type: TYPE_NORMAL
- en: Certain goals require a certain character to be achieved.
  prefs: []
  type: TYPE_NORMAL
- en: 'And if you neglect the inner work on your external journey you will end up
    trapped in a surface-level existence:'
  prefs: []
  type: TYPE_NORMAL
- en: A businessman with no health.
  prefs: []
  type: TYPE_NORMAL
- en: A bodybuilder with no philosophy.
  prefs: []
  type: TYPE_NORMAL
- en: A pick-up artist with no values.
  prefs: []
  type: TYPE_NORMAL
- en: The art of self-architecture demands holistic development.
  prefs: []
  type: TYPE_NORMAL
- en: New problems will surface in your awareness as you achieve bigger and better
    goals, but most people neglect these, hence the state of society.
  prefs: []
  type: TYPE_NORMAL
- en: We’ve discussed how to set, pursue, and achieve meaningful goals many times
    in the past ([like this letter](https://thedankoe.com/the-focus-formula-how-to-take-control-of-your-life/)),
    so we will focus on chiseling inward.
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-1162">![](../Images/99caf4846d143f479bb95518fd4f029e.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: Think of who you are, your concept of self, as an intellectual structure you’ve
    built with time.
  prefs: []
  type: TYPE_NORMAL
- en: When you remodel a house, do you go straight for the foundation?
  prefs: []
  type: TYPE_NORMAL
- en: Or do you start with a small cosmetic issue so the entire house doesn’t come
    crashing down?
  prefs: []
  type: TYPE_NORMAL
- en: When you start chiseling away at a slab of marble, do you smack with your hammer
    as hard as you can?
  prefs: []
  type: TYPE_NORMAL
- en: Or do you make small, calculated taps so you don’t turn them to dust?
  prefs: []
  type: TYPE_NORMAL
- en: The same concept applies to changing who you are.
  prefs: []
  type: TYPE_NORMAL
- en: Most people want to start with deep, spiritual, and metaphysical problems that
    reside in their core.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you haven’t done even the slightest bit of self-help work like:'
  prefs: []
  type: TYPE_NORMAL
- en: Going to the gym or training
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fixing your nutrition and habits
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Acquiring high-value skills and knowledge
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then you are in for a bad time.
  prefs: []
  type: TYPE_NORMAL
- en: I would argue that the people trying to be “spiritual” without doing the superficial
    work are doing it for superficial reasons.
  prefs: []
  type: TYPE_NORMAL
- en: They use spirituality as a nobility card to avoid making any form of contribution
    to humanity by pursuing goals.
  prefs: []
  type: TYPE_NORMAL
- en: Challenge:Skill = Purpose:Profits
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When all a person’s relevant skills are needed to cope with the challenges of
    a situation, that person’s attention is completely absorbed by the activity. There
    is no excess psychic energy left over to process any information but what the
    activity offers. All the attention is concentrated on the relevant stimuli. –
    Mihaly Csikszentmihalyi
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This is the path to a life of maximum enjoyment.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s the process to follow:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Pursue A Goal That Is Challenging Enough**'
  prefs: []
  type: TYPE_NORMAL
- en: Start small and superficial.
  prefs: []
  type: TYPE_NORMAL
- en: Fix your health, finances, and mindset.
  prefs: []
  type: TYPE_NORMAL
- en: Put one foot into the unknown so you feel the stress required to kick you into
    action.
  prefs: []
  type: TYPE_NORMAL
- en: This gives you a lesser purpose to actualize.
  prefs: []
  type: TYPE_NORMAL
- en: '**2)** **Acquire** **The Skill Necessary To Achieve The Goal**'
  prefs: []
  type: TYPE_NORMAL
- en: It is silly to think that you can achieve self-generated goals without self-education.
  prefs: []
  type: TYPE_NORMAL
- en: You need to immerse your conscious mind in the information that will program
    a new identity (and give you the knowledge to attack your goals).
  prefs: []
  type: TYPE_NORMAL
- en: Follow social media accounts that give specific information related to your
    goals.
  prefs: []
  type: TYPE_NORMAL
- en: Purchase 1-3 books on the matter and devour them.
  prefs: []
  type: TYPE_NORMAL
- en: When you have a goal that is top of mind you begin to perceive situations with
    intention.
  prefs: []
  type: TYPE_NORMAL
- en: Intention = what you are stretching towards.
  prefs: []
  type: TYPE_NORMAL
- en: Information becomes more relevant and applicable to your life.
  prefs: []
  type: TYPE_NORMAL
- en: You end the mindless distraction and consumption cycle.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t know what skill to learn, consider learning [high impact writing](https://2hourwriter.com).
    It is arguably the most lucrative skill in the digital age. Myself and my students
    have proven that.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Hunt & Stack “Whys” To Cultivate A Personal Philosophy**'
  prefs: []
  type: TYPE_NORMAL
- en: If you struggle to act, it’s because you don’t have a *compelling, personal,
    and intrinsic* reason to act.
  prefs: []
  type: TYPE_NORMAL
- en: The first step is difficult, but you must take it.
  prefs: []
  type: TYPE_NORMAL
- en: Then, as you are experiencing life, keep an eye out for reasons you can collect.
  prefs: []
  type: TYPE_NORMAL
- en: I used to hate going on walks.
  prefs: []
  type: TYPE_NORMAL
- en: I didn’t see the “point.”
  prefs: []
  type: TYPE_NORMAL
- en: One day, I decided to cut some weight.
  prefs: []
  type: TYPE_NORMAL
- en: I’d gotten a bit too heavy for my liking, and a goal was formed in my mind.
  prefs: []
  type: TYPE_NORMAL
- en: I started consuming information to piece together a weight loss strategy.
  prefs: []
  type: TYPE_NORMAL
- en: Walking seemed like a great way to increase my energy expenditure.
  prefs: []
  type: TYPE_NORMAL
- en: So, I started walking 10K steps a day.
  prefs: []
  type: TYPE_NORMAL
- en: 'On those walks, I realized:'
  prefs: []
  type: TYPE_NORMAL
- en: I can listen to lectures and books to fuel my mind
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I can generate ideas and write content
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I actually enjoyed taking a break to get out of the house, it helped with my
    focus
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After I lost the weight, my daily activity was higher so I could eat more (win)
    while staying lean
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I can take business calls
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I can maintain a decent tan for most of the year
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, I walk a minimum of 20K steps a day.
  prefs: []
  type: TYPE_NORMAL
- en: When I’m bored, I walk.
  prefs: []
  type: TYPE_NORMAL
- en: When I lack creativity, I walk.
  prefs: []
  type: TYPE_NORMAL
- en: When I need to go to the store, I walk.
  prefs: []
  type: TYPE_NORMAL
- en: That last point actually influenced where I live.
  prefs: []
  type: TYPE_NORMAL
- en: I don’t think I’ll ever live in a non-walkable city just because of the benefits
    it has brought me.
  prefs: []
  type: TYPE_NORMAL
- en: This does not only apply to walking, but to every single habit incorporated
    into my lifestyle.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t know “why” you are doing something, why are you doing it? That
    is the first sign of mindlessness.
  prefs: []
  type: TYPE_NORMAL
- en: Pursue goals.
  prefs: []
  type: TYPE_NORMAL
- en: Develop an intrinsic philosophy for each one.
  prefs: []
  type: TYPE_NORMAL
- en: Slowly cultivate the habits that forge who you are (because your choices mean
    everything).
  prefs: []
  type: TYPE_NORMAL
- en: '**4) Turn Your Pursuits Into Valuable Contributions**'
  prefs: []
  type: TYPE_NORMAL
- en: We live in a time where you can share your knowledge on the infinite public
    forum called the internet and get paid for improving yourself.
  prefs: []
  type: TYPE_NORMAL
- en: That is the best and most successful style of business anyway.
  prefs: []
  type: TYPE_NORMAL
- en: The kind that solves real, meaningful, and life-changing problems.
  prefs: []
  type: TYPE_NORMAL
- en: Most businesses fail because the problems they try to solve aren’t real.
  prefs: []
  type: TYPE_NORMAL
- en: By solving your own problems you know they are real.
  prefs: []
  type: TYPE_NORMAL
- en: You know that solving them changed your life.
  prefs: []
  type: TYPE_NORMAL
- en: Now, all you need to do is self-reflect, create a process that others can follow,
    and give it to others (and slap a price tag on it).
  prefs: []
  type: TYPE_NORMAL
- en: That’s how you turn purpose into profits.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan Koe
  prefs: []
  type: TYPE_NORMAL
