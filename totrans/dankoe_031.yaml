- en: Learn This Skill If You Want To Thrive In The Next 10 Years
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/learn-this-skill-if-you-want-to-thrive-in-the-next-10-years/](https://thedankoe.com/letters/learn-this-skill-if-you-want-to-thrive-in-the-next-10-years/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Ever since I can remember, I’ve had the goal of doing what I love for a living.
    Isn’t that what everyone wants?
  prefs: []
  type: TYPE_NORMAL
- en: My family, teachers, and even the people I was following online screamed at
    me to go down other paths.
  prefs: []
  type: TYPE_NORMAL
- en: So that’s what I did.
  prefs: []
  type: TYPE_NORMAL
- en: Went to college and partied the entire time
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learned creative skills on the side
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Started every online business imaginable
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learned to code because it was “lucrative”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dropped out of college because it was wasting my time
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Got a $55K/year job as an entry level web developer at a design agency
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Throughout this entire journey, my dream of “doing what I love” stuck in the
    back of my head. I was constantly reminded of it. There wasn’t a single moment
    from age 16-25 where I wasn’t working on a meaningful side project.
  prefs: []
  type: TYPE_NORMAL
- en: I still maintain this habit to this day. If it isn’t a business project, its
    a health project. This is how I get out of a rut, because the only reason I fall
    into a rut is psychic entropy, the mind tending toward disorder. Meaning I don’t
    have a goal, project, or priority to bring my focus to. When I spend time contemplating
    an area I want to make progress in, a vision will pop into my head after some
    time. The result? A dramatic boost in my quality of life. IF I act on that vision
    immediately.
  prefs: []
  type: TYPE_NORMAL
- en: My current projects are my new writing product and getting my compound lifts
    back up in the gym after an extended break from them. I *really* want to hit a
    600 pound deadlift for some reason, even when I swore off of them a few years
    ago. It just sounds fun, risk aside (and risk adding to the fun and necessity
    of maintaining healthy habits).
  prefs: []
  type: TYPE_NORMAL
- en: Why am I telling you this?
  prefs: []
  type: TYPE_NORMAL
- en: Because I realized that nobody knew what they were talking about. I was taking
    career and life advice from people that hadn’t achieved what I wanted to achieve.
    In their closed mind the reality I wanted to create was impossible, yet I kept
    looping back to projects that I loved working on for the sake of maintaining my
    sanity.
  prefs: []
  type: TYPE_NORMAL
- en: Meaning, if I could find a way to monetize these “passion projects” then I would
    be set.
  prefs: []
  type: TYPE_NORMAL
- en: After years of trial and error with every “marketable skill” that people tell
    you to learn, I found the secret.
  prefs: []
  type: TYPE_NORMAL
- en: Why Writing?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The backend of the internet is code. The frontend of the internet is media.
    If you want to thrive in the future, mastering code or media is your best bet.
    If you can master — or build a team — to take advantage of both (like **marketing**
    a **software** company) you shouldn’t have any worries about your life direction.
  prefs: []
  type: TYPE_NORMAL
- en: That is, being able to leverage *both* media and code. Which is more than possible
    with no-code tools like website builders, membership dashboards, email sending
    platforms, and other software that makes the one-person business model possible.
  prefs: []
  type: TYPE_NORMAL
- en: Do you not see the power in this? Does this *not* fuel you with immense energy
    to learn anything and everything available to you? Why have you not started failing
    at building a business when you can leverage code and learn media to build your
    mini-empire while spreading a message that you love spreading?
  prefs: []
  type: TYPE_NORMAL
- en: I learned to code in college, but I didn’t care for becoming a programmer. I
    wanted to freelance. So that’s what I tried to do. Web design, SEO, Facebook ads,
    content marketing, digital art, and every other skill under the sun… except for
    one.
  prefs: []
  type: TYPE_NORMAL
- en: There was a reason I failed at all of these business models. I didn’t understand
    what people actually wanted to buy. Not only that, I didn’t know how to get them
    to buy what I had to offer. That’s when I found Twitter. People were talking about
    online business and self-improvement. I got sucked in.
  prefs: []
  type: TYPE_NORMAL
- en: Some accounts that were posting insights about eCommerce mentioned a skill called
    “copywriting.” When I studied it deeper, that seemed to be the piece I was missing.
    Copywriting, in my definition, is persuasive writing. Think marketing and sales
    — two of the most important skills for making an income — but in written form.
  prefs: []
  type: TYPE_NORMAL
- en: As you could guess, this was the missing piece to my success. I started writing
    on Twitter to practice my writing, learned from my failures, and built a cumulative
    350K follower audience across multiple platforms.
  prefs: []
  type: TYPE_NORMAL
- en: Again, Why Writing?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Media is the frontend of the internet. It’s how you capture, hold, and convert
    attention in a sea of self-deprecating memes and valueless content.
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-711">![](../Images/0c879d7451fd3e20f5dff970d6d5754d.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: The foundation of media is writing.
  prefs: []
  type: TYPE_NORMAL
- en: '**Tweets?** Writing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Threads?** Writing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Newsletters?** Writing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Blog posts?** Writing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cold emails?** Writing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ads of any form?** Starts with writing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**YouTube videos?** Done best with written scripts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Instagram reels and TikToks?** Like reading well-written tweets.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Images on Instagram?** Usually designed from a well-written quote or saying.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Any other form of online marketing, advertising, or entertainment?** Starts
    with writing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There’s a reason I can outperform every dude with six pack abs in terms of engagement
    and follower growth on Instagram.
  prefs: []
  type: TYPE_NORMAL
- en: High-impact digital writing.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to become a master of media (and leverage no-code tools to distribute
    your writing and attract an audience) it’s pretty clear that writing needs to
    be the foundation of your one-person business.
  prefs: []
  type: TYPE_NORMAL
- en: '**Before we dive in:** Pre-sale for the 2 Hour Writer is now live. If you are
    an aspiring writer, one person business owner, or content creator that wants to
    implement my content ecosystem — [you can get 40% off here until the launch date.](https://2hourwriter.com)'
  prefs: []
  type: TYPE_NORMAL
- en: 9 Steps To Starting A One-Person Writing Business
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I call myself a writer because that is what I do on a daily basis (even when
    it doesn’t seem like it on social media).
  prefs: []
  type: TYPE_NORMAL
- en: I’ve sustained a $40-$60,000 per month income by writing tweets, newsletters,
    and threads that get repurposed into Instagram posts, YouTube videos, LinkedIn
    posts, and the rest.
  prefs: []
  type: TYPE_NORMAL
- en: In reflection, and referring to the top of this letter, writing is the force
    multiplier that helped me make my previous salary month after month.
  prefs: []
  type: TYPE_NORMAL
- en: But, if you were to strip things down to only Twitter and a Newsletter, I would
    still maintain 85-90% of my income. I don’t promote often, if at all, on other
    platforms. I’m building leverage and cross platform authority for now.
  prefs: []
  type: TYPE_NORMAL
- en: Getting into it, here are the 9 steps to start your writing business.
  prefs: []
  type: TYPE_NORMAL
- en: 1) Choose A Topic You Can’t Shut Up About
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Choosing a topic is what everyone struggles with in content creation. Let me
    make it simple for you.
  prefs: []
  type: TYPE_NORMAL
- en: 'Write down:'
  prefs: []
  type: TYPE_NORMAL
- en: Your favorite books
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your recent YouTube watch history
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your favorite social media accounts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What you would write about if money wasn’t an issue
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Seriously, pull out a piece of paper (or the notes app in your phone) and write
    down these all down.
  prefs: []
  type: TYPE_NORMAL
- en: Why are we doing this?
  prefs: []
  type: TYPE_NORMAL
- en: Because good writing isn’t about being professional. It’s about energy transfer.
    You will be excited to sit down and write everyday and that energy will show in
    your writing.
  prefs: []
  type: TYPE_NORMAL
- en: 2) Brainstorm A Unique Perspective You Have
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Novelty catches attention. Attention is a given if you want people to read what
    you write.
  prefs: []
  type: TYPE_NORMAL
- en: Novel perspectives are the best (and replicable way) to capture attention.
  prefs: []
  type: TYPE_NORMAL
- en: How do you come up with a novel perspective?
  prefs: []
  type: TYPE_NORMAL
- en: 'Braindump:'
  prefs: []
  type: TYPE_NORMAL
- en: Common problems associated with the topic
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Benefits to overcoming those problems
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Common goals associated with the topic
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Roadblocks to achieving those goals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Personal experiences you’ve had
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, piece everything together and *explain it how you would if you were talking
    to a friend.*
  prefs: []
  type: TYPE_NORMAL
- en: Don’t try to copy someones perspective or way of wording things. Say it in your
    own voice and let it *refine with time, effort, and practice.*
  prefs: []
  type: TYPE_NORMAL
- en: If you want a guided challenge on how to do this, [download my free 7 days to
    genius challenge.](https://7daystogeniusideas.com)
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t want to go through that, you can practice explaining topics in
    your own words and let experience create your perspective. You can do this by
    writing tweets everyday for a year. See what you can learn.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Write 1000+ Words On The Topic
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Every single piece of content online is based around a personal or professional
    problem.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s how you can structure your writing.
  prefs: []
  type: TYPE_NORMAL
- en: Explain the problem associated with the topic
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Talk about your personal experiences with it
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Optional: give context around the problem'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Give step-by-step actionable advice on how to solve that problem (like this
    letter)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Actionable advice is how you will build an audience at the start. I wouldn’t
    worry about being super insightful, that won’t help you grow until people know
    who you are.
  prefs: []
  type: TYPE_NORMAL
- en: Like how your favorite YouTuber didn’t start with vlogs. They started with what
    works, built an audience, then desaturated that market by doing whatever they
    want. Meaning that you can join in at anytime (this doesn’t only pertain to YouTube).
  prefs: []
  type: TYPE_NORMAL
- en: 4) Sign Up For A Blog & Newsletter Software
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I rarely use fancy sales funnels and it’s rare to see me promote my products
    on social media anymore.
  prefs: []
  type: TYPE_NORMAL
- en: 'I use the 2 hour content ecosystem:'
  prefs: []
  type: TYPE_NORMAL
- en: 1 newsletter a week
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The newsletter is kept on the blog
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1 thread a week from the newsletter
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3 tweets a day from the newsletter topic
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: People that only tweet have little authority and have trouble making sales and
    landing clients.
  prefs: []
  type: TYPE_NORMAL
- en: 'Authority comes from 1 of 2 things: **depth or expertise.**'
  prefs: []
  type: TYPE_NORMAL
- en: Long form content is where the money is made. Not with tweets and social media
    promotions.
  prefs: []
  type: TYPE_NORMAL
- en: For the sake of simplicity, I would sign up for Beehiiv, Revue, or Substack.
    We aren’t looking for fancy automations yet. All we want is a software that can
    send a newsletter, collect emails, and backlog that newsletter as a blog post
    (crucial point that no-one takes advantage of) so we can plug those as mini-salesmen
    or individual lead magnets under our other content.
  prefs: []
  type: TYPE_NORMAL
- en: 5) Repurpose The Actionable Section Of The Newsletter
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We know that actionable step-by-step advice is the most beginner friendly and
    potent tool for social growth. If you don’t know how to grow, chances are that
    you are trying to be too clever and insightful from the start — when all you need
    to do is give actionable advice related to your talking point (and pair it with
    step 6 of this newsletter).
  prefs: []
  type: TYPE_NORMAL
- en: Pair actionable advice with a Twitter thread and you have the potential to gain
    100-1000 followers your first time around. I see this happen all the time.
  prefs: []
  type: TYPE_NORMAL
- en: How do we make this easy?
  prefs: []
  type: TYPE_NORMAL
- en: Turn the actionable section of the newsletter you wrote into a Twitter thread.
    Simple as that. I show you exactly how in my new course, [2 Hour Writer](https://2hourwriter.com),
    to make sure that it is written for maximum impact.
  prefs: []
  type: TYPE_NORMAL
- en: 6) Learn How To Network & Grow On The Platform
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When you start playing a game, you don’t just dive in and start playing. You’ll
    have no idea what you are doing, get angry, and quit.
  prefs: []
  type: TYPE_NORMAL
- en: The reason you’ve tried and failed at growing on different social platforms
    is because you think it is as simple as posting good content. Not in the slightest.
  prefs: []
  type: TYPE_NORMAL
- en: You grow on social media platforms by getting more eyes on your profile. How
    do you do that?
  prefs: []
  type: TYPE_NORMAL
- en: People *sharing* your content to their audience
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Networking with similar follower accounts and growing together
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Commenting on larger accounts posts so people can see your comments and click
    to your account
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Make your long form content (newsletter) so good that people can’t help but
    talk about it
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Join a community (like [Modern Mastery](https://modernmastery.co/letter)) to
    meet people that are on the same path as you.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Optional but less taboo than you think: paying big accounts for shares (retweets,
    story shares on Instagram, or even something as simple as a comment because that
    still exposes your content to their audience).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Of course, you still need to have good content and an optimized profile if you
    want people to follow you.
  prefs: []
  type: TYPE_NORMAL
- en: It’s called *social* media for a reason. You have to interact with others, make
    friends, and help each other grow.
  prefs: []
  type: TYPE_NORMAL
- en: You can do without this, but it will be painstakingly slow and you’ll turn into
    one of those accounts that just whines all day about how social growth is unfair.
    Don’t hate the player, hate the game.
  prefs: []
  type: TYPE_NORMAL
- en: 7) Turn Ideas Into Impactful Tweets
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: From your newsletters and threads, your mind should be flooded with tweet ideas.
    Tweets are short and punchy writing that get people to react.
  prefs: []
  type: TYPE_NORMAL
- en: 'My favorite way of writing tweets is with the framework I developed: PPP'
  prefs: []
  type: TYPE_NORMAL
- en: Pull
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Perspective
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Punchline
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pull them in with something that catches attention (like a number or percentage),
    give a unique perspective that came from personal experience and critical thought,
    and wrap it all up in a way that makes sense.
  prefs: []
  type: TYPE_NORMAL
- en: 'Perspective and punchline often tie into one another, usually in one-liners
    like this:'
  prefs: []
  type: TYPE_NORMAL
- en: People will spend 10 hours worrying about a task that takes 10 minutes to complete.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [August 8, 2022](https://twitter.com/thedankoe/status/1556598603065475072?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'You can also see this framework separated well in list tweets (use these when
    you give actionable advice):'
  prefs: []
  type: TYPE_NORMAL
- en: 'Most people will spend:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 8 hours on someone else’s dreams
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 4 hours hiding from their own
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 2 hours going through the motions
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 16 hours awake
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 24 hours asleep
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It doesn’t have to take 40 years and a retirement plan realize that a participation
    trophy isn’t fulfilling.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — DAN KOE (@thedankoe) [August 8, 2022](https://twitter.com/thedankoe/status/1556571426794127361?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This is one of many tweet writing methods. Your best bet is to study the accounts
    you listed in step 1 and follow the [Intelligent Imitation process](https://thedankoe.com/how-to-copy-your-way-to-success-instead-of-mediocrity/).
    Emulate their writing as if their tweets were training wheels, dissect why it
    did well, and try to replicate in your own way.
  prefs: []
  type: TYPE_NORMAL
- en: 8) Develop A Writing System
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This newsletter goes over everything I would do if I had to start over from
    zero.
  prefs: []
  type: TYPE_NORMAL
- en: I wasted 2 years testing sales funnels, different content writing methods, and
    finding the best way to sustain a high monthly income with writing.
  prefs: []
  type: TYPE_NORMAL
- en: My best advice?
  prefs: []
  type: TYPE_NORMAL
- en: Create a system from the start and refine it over time. Then, if you want to
    package it up and sell it in the future, you can. That’s what the one-person business
    model does. They get results with a system they’ve tested on themselves (to solve
    their own problem) and then sell it to others — because by the time the system
    is perfected, you have ample experience and authority to bank on.
  prefs: []
  type: TYPE_NORMAL
- en: I use Notion to create systems to make it easy on myself. No other fancy software
    necessary.
  prefs: []
  type: TYPE_NORMAL
- en: These systems can start as step-by-step list of what you need to do on a daily
    or weekly basis. Then you can start getting fancy with Notions cool features.
  prefs: []
  type: TYPE_NORMAL
- en: 9) Branch Out To Other Platforms
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I overcomplicated this for the longest time.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve grown to 230K on Instagram, 23K on LinkedIn, and 7K on YouTube with my
    *writing* skills.
  prefs: []
  type: TYPE_NORMAL
- en: I get more engagement than dudes with adonis physiques because my writing hits
    harder than their chiseled abs.
  prefs: []
  type: TYPE_NORMAL
- en: All I do is copy, paste, and record the content that I’ve already written in
    my newsletters, threads, and tweets. You could even turn your best tweets into
    TikTok or reel scripts.
  prefs: []
  type: TYPE_NORMAL
- en: Master Twitter first, gain some authority, then use your best tweets to break
    into new platforms (since those ideas are already validated to do well).
  prefs: []
  type: TYPE_NORMAL
- en: Let’s Recap On How You Can Start Your Writing Business
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With 1-2 hours a day (considering you have a freelance, consulting, or digital
    product to sell with the traffic / distribution you are building) you can pull
    in a higher monthly income than some of the highest paid doctors, without spending
    a dime on a college degree.
  prefs: []
  type: TYPE_NORMAL
- en: We live in an age of authenticity where nobody is authentic. People don’t want
    professionalism. They want individuality and a sense of belonging with people
    that “get them.”
  prefs: []
  type: TYPE_NORMAL
- en: I am nowhere near the best writer, yet I make more than 99% of the writers out
    there. Funny how that works.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a recap of what we went over:'
  prefs: []
  type: TYPE_NORMAL
- en: Choose a topic you can’t shut up about
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Brainstorm a unique perspective you have
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Write 1000+ words in a structured way
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sign up for a newsletter / blog software and post it
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Turn the actionable section into a viral Twitter thread
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learn how to network and get eyes on your content
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Turn ideas from your newsletter into tweets and plug your newsletter under it
    to “read more” (this will grow your email list)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Develop a system to make writing take less than 4-6 hours a week
  prefs:
