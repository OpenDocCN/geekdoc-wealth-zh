  type: TYPE_NORMAL
- en: '**Flow Trigger Integration**: This stack systematically activates multiple
    flow triggers: gratitude (risk/reward balance), movement (embodiment), learning
    (novelty), work prep (clear goals), connection (social triggers), reflection (immediate
    feedback). The sequence primes all major neurochemical systems for optimal daily
    performance.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Evening Stack (30 minutes)**:'
  prefs: []
  type: TYPE_NORMAL
- en: '10 min: Day review'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '10 min: Preparation tomorrow'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '10 min: Relaxation practice'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Recovery Protocol**: Based on flow research showing that recovery is active,
    not passive. The evening stack facilitates memory consolidation (review), reduces
    anxiety (preparation), and triggers parasympathetic recovery (relaxation).'
  prefs: []
