- en: '**The Agency Shift**: This level marks the shift from employee to entrepreneur
    mindset—not necessarily in profession but in consciousness. You stop accepting
    assignments and start creating your own goals. You take full responsibility for
    outcomes, recognizing that “if you don’t create a product to sell, you will be
    forced to sell a product for someone else, or you will become the product.”'
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: '**代理转变**：这个级别标志着从雇员到企业家心态的转变——不一定在职业上，而是在意识上。你不再接受任务，而是开始设定自己的目标。你对自己的结果承担全部责任，认识到“如果你不创造一个产品去销售，你将被迫为别人销售产品，或者你将成为产品。”'
- en: '**Developmental Origin**: The rebellion against Level 1 constraints. Often
    triggered by recognizing the limitations, hypocrisies, or failures of inherited
    systems. The teenager who realizes parents aren’t perfect, extended to all life
    domains.'
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: '**发展起源**：对第一级约束的反抗。通常由认识到继承系统的局限性、虚伪或失败而触发。青少年意识到父母并不完美，这扩展到了所有生活领域。'
- en: '**The Autotelic Shift**: Level 2 marks the beginning of autotelic personality
    development. Individuals start finding intrinsic satisfaction in challenges. Flow
    research shows this shift correlates with increased dopamine receptor density
    and improved attention regulation. The ability to self-generate rewarding experiences
    reduces dependence on external validation.'
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: '**自足性转变**：第二级标志着自足性人格发展的开始。个体开始从挑战中找到内在的满足感。流动研究显示这种转变与多巴胺受体密度增加和注意力调节改善相关。自我产生奖励体验的能力减少了对外部验证的依赖。'
- en: '**The Status Game**: Level 2 is driven by status needs, which Koe validates:
    “You don’t start making more because you want to change the world. You start because
    you want to survive. Once that purpose is actualized, you make more because you
    want to be accepted and perceived as valuable.”'
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: '**地位游戏**：第二级由地位需求驱动，Koe予以验证：“你不是因为想要改变世界而开始赚钱。你是开始赚钱，因为你想生存。一旦这个目标实现，你开始赚钱，是因为你想要被接受和视为有价值。”'
