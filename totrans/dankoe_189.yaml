    where multiple flow states chain together. A Channel might contain hundreds of
    individual flow experiences over months, creating sustained transformation. The
    key difference: Channels involve fundamental identity reorganization, while flow
    states can occur within existing identity structures.'
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: '**宏观流程现象**：虽然渠道与心流状态不同，但它们与Kotler所说的“宏观流程”具有相似特征——多个心流状态连续发生的长期时期。一个渠道可能在几个月内包含数百个单独的心流体验，从而产生持续的转变。关键区别：渠道涉及基本身份重组，而心流状态可以在现有身份结构内发生。'
