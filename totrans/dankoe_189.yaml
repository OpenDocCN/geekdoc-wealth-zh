  type: TYPE_NORMAL
  zh: 亲密和脆弱的能力
- en: Community involvement and impact
  id: totrans-279
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 社区参与和影响
- en: Comfort with existential questions
  id: totrans-280
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对存在主义问题的舒适度
- en: Ability to create meaning from suffering
  id: totrans-281
  prefs:
