  type: TYPE_NORMAL
  zh: 身体（能量）→ 精神（连接）→ 心（清晰）→ 职业（资源）→ 身体（投资）
- en: Each improvement makes the next easier. Small gains compound across quadrants.
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: 每次改进都使下一次更容易。小收益在各个领域累积。
