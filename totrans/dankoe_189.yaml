  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我能否在不成为它们的情况下观察我的思想？
- en: '**Body Quadrant Assessment**:'
  id: totrans-951
  prefs: []
  type: TYPE_NORMAL
  zh: '**身体四象限评估**：'
- en: Do I have energy throughout the day?
  id: totrans-952
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我是否整天都有精力？
- en: Can I perform basic human movements well?
  id: totrans-953
