  id: totrans-1114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 写作练习（所有级别）
- en: “Start writing. The mark of a free individual is that they do many things throughout
    their life. This requires them to learn how to learn, how to think, and how to
    earn. Writing checks all three boxes.”
  id: totrans-1115
  prefs: []
  type: TYPE_NORMAL
  zh: “开始写作。自由个体的标志是他们一生中做了很多事情。这需要他们学习如何学习，如何思考，以及如何赚钱。写作满足了这三个条件。”
