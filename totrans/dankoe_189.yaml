- en: LEVEL 2.0 – THE INDIVIDUALIST
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The rebellion against conformity that develops personal agency, critical thinking,
    and achievement orientation.
  prefs: []
  type: TYPE_NORMAL
- en: '**Consciousness Structure**:'
  prefs: []
  type: TYPE_NORMAL
- en: Rational/modern thinking
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Internal authority development
  prefs:
