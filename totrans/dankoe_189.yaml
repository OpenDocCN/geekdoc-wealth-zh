- en: Without economic foundation, other development becomes nearly impossible. “Money
    is often the one thing holding people back from reaching their next level of personal
    development.”
  id: totrans-908
  prefs: []
  type: TYPE_NORMAL
  zh: 没有经济基础，其他发展几乎不可能。“金钱往往是阻碍人们达到下一个个人发展层次的一件事。”
- en: '**The Success Trap**:'
  id: totrans-909
