  type: TYPE_NORMAL
  zh: 相对象限：低迁移
- en: 'Meta-skills: Universal transfer'
  id: totrans-740
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 元技能：通用迁移
- en: '**Metacrisis Application**: The skills needed for navigating civilizational
    transition are different from those that created success in the old paradigm.
    Anti-rivalrous collaboration, systems thinking, regenerative design—these aren’t
    taught in traditional education. Developing these skills requires intentional
    practice in contexts that reward cooperation over competition. Meta-skills (learning
    to learn, adapting to change, holding complexity) become more valuable than specific
    technical skills.'
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: '**元危机应用**：应对文明转型所需的技能与创造旧范式成功所需的技能不同。非竞争性合作、系统思维、再生设计——这些在传统教育中并未教授。发展这些技能需要在奖励合作而非竞争的上下文中进行有意练习。元技能（学会学习、适应变化、处理复杂性）比具体技术技能更有价值。'
