  type: TYPE_NORMAL
  zh: 故障：高风险加速剂
- en: '**The Nature of Glitches**: Glitches are mechanisms that can force rapid development
    by breaking through normal consciousness constraints. Like exploiting bugs in
    video game code, they bypass normal progression rules—with corresponding risks.'
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: '**故障的本质**：故障是通过突破正常意识限制来强制快速发展的机制。就像利用视频游戏代码中的漏洞一样，它们绕过了正常的进步规则——伴随着相应的风险。'
- en: '**Core Principle**: Reality has “exploits” that allow rapid advancement, but
    using them without proper foundation is like taking steroids without training—destructive
    rather than developmental.'
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: '**核心原则**：现实有“漏洞”，可以允许快速进步，但如果没有适当的基础使用它们，就像没有训练就使用类固醇一样——具有破坏性而不是发展性。'
- en: '**The Neuroscience of Glitches**: These interventions work by dramatically
    altering neurochemistry beyond normal ranges. Psychedelics flood the brain with
    serotonin analogues, creating neuroplasticity windows. Extreme sports spike all
    flow neurochemicals simultaneously. While powerful, they can damage receptor sites
    and regulation mechanisms if misused.'
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: '**故障的神经科学**：这些干预措施通过显著改变超出正常范围的神经化学物质来工作。迷幻药物使大脑充满血清素类似物，创造神经可塑性窗口。极限运动同时激增所有流动神经化学物质。虽然强大，但如果误用，它们可能会损害受体位点和调节机制。'
- en: '**Historical Precedent**: William James experimented with nitrous oxide to
    access altered states. Aldous Huxley used mescaline. The difference now: we understand
    the mechanisms and risks through neuroscience, allowing more informed choices.'
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: '**历史先例**：威廉·詹姆斯曾尝试使用氧化亚氮来进入改变状态。奥尔德斯·赫胥黎使用了麦司卡林。现在的不同之处在于：我们通过神经科学理解了机制和风险，从而允许做出更明智的选择。'
- en: '**Metacrisis Context**: The entire technological age could be seen as humanity
    using a civilizational glitch—gaining godlike power without developing godlike
    wisdom. Individual glitches mirror this pattern. The question isn’t whether to
    use them but how to use them wisely—if at all.'
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: '**元危机背景**：整个技术时代可以看作是人类利用文明故障——在不发展神一般智慧的情况下获得神一般的力量。个人故障反映了这种模式。问题不在于是否使用它们，而在于如何明智地使用它们——如果确实使用的话。'
- en: AI as the Meta-Glitch
  id: totrans-860
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人工智能作为元故障
- en: 'AI represents the first Glitch that simultaneously affects all quadrants. It’s
    becoming the foundation of all creation: “Writing is the meta-skill… With advances
    in LLMs and artificial intelligence tools, code has begun to take the shape of
    natural language.”'
  id: totrans-861
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能代表了第一个同时影响所有象限的故障。它正成为所有创造的基石：“写作是元技能……随着大型语言模型和人工智能工具的进步，代码开始呈现出自然语言的形式。”
