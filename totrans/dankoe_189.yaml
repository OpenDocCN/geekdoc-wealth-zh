  id: totrans-903
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 心（理解）→ 职业（应用）→ 精神（目的）→ 身体（体现）→ 心（智慧）
- en: Knowledge becomes wisdom through complete circulation.
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: 知识通过完全循环成为智慧。
- en: Blocking Patterns
