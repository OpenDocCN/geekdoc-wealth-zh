- en: '**AI-Specific Risks**:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Cognitive Atrophy: Outsourcing thinking entirely'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Identity Confusion: Can’t distinguish self from AI'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Reality Dissociation: Living in AI-mediated reality'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Capability Illusion: Mistaking AI’s abilities for own'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Dependency Formation: Cannot function without AI'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Metacrisis Relevance**: AI is the ultimate expression of exponential technology
    outpacing wisdom. It offers unprecedented development acceleration but also unprecedented
    risk of sovereignty loss. Learning to use AI while maintaining human agency is
    perhaps the defining challenge of our time. Those who master this balance gain
    massive advantage; those who fail become appendages of machine intelligence.'
  prefs: []
