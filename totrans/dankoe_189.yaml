    Anti-rivalrous collaboration, systems thinking, regenerative design—these aren’t
    taught in traditional education. Developing these skills requires intentional
    practice in contexts that reward cooperation over competition. Meta-skills (learning
    to learn, adapting to change, holding complexity) become more valuable than specific
    technical skills.'
