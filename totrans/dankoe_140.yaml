- en: The Fastest Way To Build A One-Person Business (Beginner Guide)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://thedankoe.com/letters/the-minimalist-creator-business-make-your-first-1000-in-60-days/](https://thedankoe.com/letters/the-minimalist-creator-business-make-your-first-1000-in-60-days/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**I’m going to give you a 60-day action plan to make your first $1,000.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'This graphic is what you will learn how to master by the end of this letter:'
  prefs: []
  type: TYPE_NORMAL
- en: <picture fetchpriority="high" decoding="async" class="wp-image-2198">![](../Images/665d51f8424df3b002623e6a6104be10.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: This letter is for beginners, as I feel $1,000 in 60 days is more than reasonable,
    but if you aren’t a beginner, you can make much more than that in 60 days with
    what you will learn.
  prefs: []
  type: TYPE_NORMAL
- en: I will attempt to make this as concise and zero-fluff as I can. But understand
    that mindset advice is not fluff. Belief and clarity come before skill and confidence.
  prefs: []
  type: TYPE_NORMAL
- en: If I do drag on, it’s because what I’m writing is absolutely necessary for you
    to know. If you think it’s boring, that’s probably the part you’re going to skip
    over and complain when you don’t get results.
  prefs: []
  type: TYPE_NORMAL
- en: If you can make $1,000, you can make $100,000.
  prefs: []
  type: TYPE_NORMAL
- en: As you get better at this process and learn more, it will take you less time
    to earn $1,000+ at a time.
  prefs: []
  type: TYPE_NORMAL
- en: We are going to do this in the most streamlined way possible.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need a large audience.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You only need to learn the basics of 2 high-income skills.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All of your actions compound, and nothing goes to waste.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you stick with it, you will earn more than $1,000 every time you do this.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: But first, a disclaimer.
  prefs: []
  type: TYPE_NORMAL
- en: If you came to this video because you want a quick way to spam a “give me $1,000”
    button, you will probably fail.
  prefs: []
  type: TYPE_NORMAL
- en: Leave the get-rich-quick mindset at the door.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to be in control of how much you make, you need a business. Plain
    and simple. Unarguable.
  prefs: []
  type: TYPE_NORMAL
- en: If you start a business, it demands a much different character than a 9-5 job.
    You are responsible for everything. You must manage yourself, develop yourself,
    and learn to love the emotional highs and lows that come with business.
  prefs: []
  type: TYPE_NORMAL
- en: You will be rejected.
  prefs: []
  type: TYPE_NORMAL
- en: You will question if you should quit and go back to your just-comfortable-enough-to-survive-and-just-painless-enough-to-stay-the-same
    life.
  prefs: []
  type: TYPE_NORMAL
- en: Please, for the love of all things holy, commit to the one thing you know you
    need to do to take control of your life.
  prefs: []
  type: TYPE_NORMAL
- en: This is your way out.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what we will discuss:'
  prefs: []
  type: TYPE_NORMAL
- en: The importance of building an audience in a world of freelancers and agency
    owners.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What to talk about and what to sell.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The micro skill stack – how learning 2 high-income skills can set you up for
    a profitable future.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The micro offer – how to start landing clients today, without taking months
    to build your product or service.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The only 2 ways to land clients so you can focus for the next 60 days.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The $1000 challenge. Exact steps to take every single day to turn this into
    a business.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This letter is a mini-course, so it’s a bit long.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get started.
  prefs: []
  type: TYPE_NORMAL
- en: 'Side note: The One-Person Business Launchpad is 50% off until Black Friday
    weekend. [Check it out here.](https://thedankoe.com/get/opbl)'
  prefs: []
  type: TYPE_NORMAL
- en: Set Up Your Digital Storefront
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You’re going to build an audience on social media.
  prefs: []
  type: TYPE_NORMAL
- en: '**That’s lesson one of business:** you need *traffic* to send to your product
    or service. Building a website or designing a logo is *not* a productive use of
    your time right now.'
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need a million followers to start, but I guarantee you will want a
    growing audience for the future.
  prefs: []
  type: TYPE_NORMAL
- en: Cold email and paid ads are great, but there are much better ways to achieve
    the same result and avoid not having anything to show for it.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can send 10,000 cold emails and spend $10,000 on ads, but where do the
    people go after that? By building an audience with content on social media, you
    accomplish a few things:'
  prefs: []
  type: TYPE_NORMAL
- en: You keep access to the people that follow you.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It’s free to start, you don’t need much skill or permission.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Every piece of content you write warms up your audience to buy.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can build new products and increase profitability.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: People follow you for you. You aren’t trapped in a specific business model or
    skill.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When your audience is large enough, you can leave client work or build that
    startup you’ve always dreamed of (you already have customers potential candidates
    for your team and don’t need to spend hundreds of thousands on marketing and hiring).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With that said, let’s set up your social profile quick.
  prefs: []
  type: TYPE_NORMAL
- en: Deciding What To Teach And Sell
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I’ve taught this in many different ways before.
  prefs: []
  type: TYPE_NORMAL
- en: Most of the time it involves creating some kind of topic tree.
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-2196">![](../Images/7f0082d539834486ba3a415ca5b8f1a3.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: That is still useful, and I encourage you to use it, but I want to make things
    a tad bit easier.
  prefs: []
  type: TYPE_NORMAL
- en: You are going to *join the niche that you are already in.*
  prefs: []
  type: TYPE_NORMAL
- en: 'Answer these questions and choose the 1-3 topics that satisfy the most of them:'
  prefs: []
  type: TYPE_NORMAL
- en: What *valuable* content is in your search and YouTube watch history?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: What do the accounts you follow talk about? Do you feel like you have a similar
    level of knowledge?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If you were to buy a new book right now, what topic would it be on?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: When you buy an educational or behavior-improving product (like a planner, software,
    or health supplement, not a new article of clothing or other necessities), what
    do you buy?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The key to success in most areas of life is *intelligent imitation.*
  prefs: []
  type: TYPE_NORMAL
- en: We all imitate. Our minds are a complex amalgamation of the information we’ve
    been exposed to so far.
  prefs: []
  type: TYPE_NORMAL
- en: People truly overcomplicate business.
  prefs: []
  type: TYPE_NORMAL
- en: They think that if everyone else is doing it, it’s saturated.
  prefs: []
  type: TYPE_NORMAL
- en: No.
  prefs: []
  type: TYPE_NORMAL
- en: Not even close.
  prefs: []
  type: TYPE_NORMAL
- en: If everyone else is doing it, that means it’s profitable. It means people actually
    want it.
  prefs: []
  type: TYPE_NORMAL
- en: So, your job is to do the same thing, but make it just a *little* bit more unique.
  prefs: []
  type: TYPE_NORMAL
- en: My startup, Kortex, isn’t anything revolutionary or new.
  prefs: []
  type: TYPE_NORMAL
- en: There are note-taking and second-brain clones popping up everywhere.
  prefs: []
  type: TYPE_NORMAL
- en: What sets us apart are the little features we’ve added to make it just a tiny
    bit better based on the experience we have in that domain, which most people don’t
    have. We also have distribution. Competing with something like Notion isn’t too
    large of a task for us over the next few years. Other apps may or may not stand
    a chance.
  prefs: []
  type: TYPE_NORMAL
- en: Even if we don’t get to Notions level, we have a fraction of their team size
    and costs, we didn’t take any VC money, and we can still reach 8 figures ARR with
    the small market we do take.
  prefs: []
  type: TYPE_NORMAL
- en: Back to the point.
  prefs: []
  type: TYPE_NORMAL
- en: Write down 1-3 topics you already read about. This is where your content ideas
    will come from.
  prefs: []
  type: TYPE_NORMAL
- en: Write down 1-3 courses, templates, or products you’ve already purchased. These
    are the starting point of your offer that you will reposition.
  prefs: []
  type: TYPE_NORMAL
- en: As you actually write and sell, only then will you have the ideas and feedback
    to make those things truly unique to you.
  prefs: []
  type: TYPE_NORMAL
- en: Read that last sentence again and hammer it into your head.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not just a random sentence I put in to be forgotten. It’s the one thing
    that will determine your entire journey.
  prefs: []
  type: TYPE_NORMAL
- en: Creating Your Profile
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A good social media profile is a small feat.
  prefs: []
  type: TYPE_NORMAL
- en: You need to understand design and/or photography for a good profile picture
    and banner.
  prefs: []
  type: TYPE_NORMAL
- en: You need to understand copywriting for a bio that makes people want to follow
    you.
  prefs: []
  type: TYPE_NORMAL
- en: You need to understand awareness and funnels for the link you put in your bio.
  prefs: []
  type: TYPE_NORMAL
- en: You need to understand social media and writing to have an authoritative pinned
    post with decent engagement (that also plugs the next step in your funnel at the
    end).
  prefs: []
  type: TYPE_NORMAL
- en: Now, you shouldn’t use this as an excuse to go off and procrastinate in tutorial
    hell. No, you don’t need to take a design, copywriting, and funnel course. You
    need to create a profile fast and start testing. That’s the only way to actually
    learn these skills. Courses help with *techniques to test.* Skills are groups
    of techniques that you’ve tested and filtered for maximum results.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s the fastest way to do this:'
  prefs: []
  type: TYPE_NORMAL
- en: Watch 1-3 YouTube tutorials on how to take a headshot photo or create a profile
    picture. Create yours along with it.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Write your bio using what we talked about earlier. Your topics and the offer
    you want to build authority in.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I’ve done the testing for you. Use this bio template.
  prefs: []
  type: TYPE_NORMAL
- en: '*I write about [topics]. [Results they will get from your offer].*'
  prefs: []
  type: TYPE_NORMAL
- en: 'If my topics are productivity, writing, and self-improvement and the the thing
    I want to sell revolves around writing, my bio would be:'
  prefs: []
  type: TYPE_NORMAL
- en: '*I write about productivity, writing, and self-improvement. Learn to write
    as a high-income skill.*'
  prefs: []
  type: TYPE_NORMAL
- en: Then, I would link the first step of my offer which we will talk about in the
    Micro Offer section.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t feel like your bio is good enough, that’s fine. Don’t worry about
    it. Start writing content with it as it is. Your bio doesn’t mean much in the
    grand scheme of things. People see it once or twice and forget about it. Your
    content is what leads to the most followers and sales. Your job is to write content
    so good that it doesn’t matter what your bio says.
  prefs: []
  type: TYPE_NORMAL
- en: 'Lastly, a question to guide your profile creation:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Does it look like it should have 1,000,000 followers?**'
  prefs: []
  type: TYPE_NORMAL
- en: If not, slowly improve it over the next 6-12 months until it does.
  prefs: []
  type: TYPE_NORMAL
- en: You can still gain followers and make an income if it doesn’t.
  prefs: []
  type: TYPE_NORMAL
- en: The Micro Skill Stack
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As a one-person business, you need to eventually learn every single skill that
    allows you to run a full-fledged business (aside from physical distribution and
    commercial real estate).
  prefs: []
  type: TYPE_NORMAL
- en: The “Micro Creator” we are talking about here is just a way to get started.
    I’m assuming this will be your life’s work, so don’t cheap out on your long-term
    potential by continuing with the get-rich-quick mindset that brought you to this
    letter.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, in order to start making an income, you only need a few things:'
  prefs: []
  type: TYPE_NORMAL
- en: A traffic source
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A product or service to sell
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: So, the two skills that simplify that process are *writing* and *sales.*
  prefs: []
  type: TYPE_NORMAL
- en: Writing is accessible. You don’t need design or video experience. You don’t
    even need to write well, you just need to write with impact. All social media
    content starts with writing (yes, even video scripts).
  prefs: []
  type: TYPE_NORMAL
- en: Sales is how you turn the people who view your writing into customers.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s learn the basics of both.
  prefs: []
  type: TYPE_NORMAL
- en: Writing To Build An Audience
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'There are 2 types of social media content:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Short Posts**'
  prefs: []
  type: TYPE_NORMAL
- en: This includes tweets, reels, shorts, TikToks, posts on Instagram, and really
    anything that’s under 300 characters or 1 minute.
  prefs: []
  type: TYPE_NORMAL
- en: My favorite way to write on any platform is to write a tweet, then copy/paste
    that tweet into an image template in something like Figma or Canva (look at my
    Instagram page to see what writing looks like in image form). No, you don’t need
    to post anything other than writing to build an audience on any short-form platform.
  prefs: []
  type: TYPE_NORMAL
- en: Short posts are good for staying top of mind, attracting an audience, and testing
    ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Short posts are your base. You should post at least 1 a day. On X you can post
    2-3 a day to test which ones you should post to other platforms or turn into a
    long post.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Long Posts**'
  prefs: []
  type: TYPE_NORMAL
- en: This includes X threads, threads on Threads by IG, Instagram carousels, long
    LinkedIn posts or carousels, or what I call “micro articles” that have been doing
    rather well recently.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s an example of a micro-article:'
  prefs: []
  type: TYPE_NORMAL
- en: <picture decoding="async" class="wp-image-2197">![](../Images/53288acf63cd01244b8637bf31d871bb.png)</picture>
  prefs: []
  type: TYPE_NORMAL
- en: The beautiful thing about images for short or long posts is that you can post
    them to any platform. Just be sure the image’s dimensions are 4×5 so they fit
    on Instagram.
  prefs: []
  type: TYPE_NORMAL
- en: Long posts are strategic. They can go extremely viral if they are based on a
    validated topic (like one of your best short posts). They tend to pull in more
    followers.
  prefs: []
  type: TYPE_NORMAL
- en: The thing is, they take longer to write. You should aim to write 1-2 a week
    and make sure you are able to get them shared so they have the potential of being
    seen by more audiences. Don’t rely on the algorithm to help you grow. Read my
    letter “[How To Build An Audience With Zero Followers](https://thedankoe.com/letters/how-to-actually-grow-on-social-media-what-they-dont-tell-you/)”
    to learn how to do this.
  prefs: []
  type: TYPE_NORMAL
- en: Make sure everyone in your network shares your long posts each week. This is
    how you grow.
  prefs: []
  type: TYPE_NORMAL
- en: You can also learn the entire process inside of my [2 Hour Writer](https://2hourwriter.com)
    course (with templates).
  prefs: []
  type: TYPE_NORMAL
- en: 'To recap:'
  prefs: []
  type: TYPE_NORMAL
- en: Write 2-3 short posts a day on X.
  prefs: []
  type: TYPE_NORMAL
- en: Write 1-2 long posts a week on X.
  prefs: []
  type: TYPE_NORMAL
- en: When you get to 50,000+ followers, then consider starting to post on other platforms.
  prefs: []
  type: TYPE_NORMAL
- en: Why X?
  prefs: []
  type: TYPE_NORMAL
- en: The people on X are higher quality than those on most platforms aside from YouTube.
  prefs: []
  type: TYPE_NORMAL
- en: People don’t log onto Instagram, LinkedIn, or TikTok to be educated.
  prefs: []
  type: TYPE_NORMAL
- en: X is like Reddit, but just a tad less toxic, and you can follow actual people.
  prefs: []
  type: TYPE_NORMAL
- en: You often go on Reddit to learn something you didn’t know before.
  prefs: []
  type: TYPE_NORMAL
- en: And, all you need to do on X is write out your ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Then, take your best ones and make growth easier on other platforms.
  prefs: []
  type: TYPE_NORMAL
- en: Turn an idea into a thread, a thread into a newsletter, a newsletter into a
    YouTube video, that video into a free download, that free download into a product.
    That’s your validation process for a good idea.
  prefs: []
  type: TYPE_NORMAL
- en: Now, what do you actually write about?
  prefs: []
  type: TYPE_NORMAL
- en: 'Take the topics you chose earlier and do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Break them down into common pain points and write about how to solve them.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Research other accounts’ top tweets with a tool like the [TweetHunter X Sidebar](https://chromewebstore.google.com/detail/tweet-hunter-x-sidebar-fo/amoldiondpmjdnllknhklocndiibkcoe?hl=en)
    and rewrite them from your own perspective.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Read books and use social media as your place to take notes – but write those
    notes with a hook, body, and conclusion.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Go to your favorite YouTube channels and filter their videos by most popular.
    Then, use their titles as starting points for your hooks and posts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, start writing.
  prefs: []
  type: TYPE_NORMAL
- en: The Sales Process
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Sales is storytelling.
  prefs: []
  type: TYPE_NORMAL
- en: You are showing someone where they can be, making them aware of the pain points
    of their current situation, and *offering* them a path to get from point A to
    point B.
  prefs: []
  type: TYPE_NORMAL
- en: Pain point
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Desired outcome
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Path to get there (preferably your unique way of doing it)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That’s what sales is.
  prefs: []
  type: TYPE_NORMAL
- en: That’s what content is.
  prefs: []
  type: TYPE_NORMAL
- en: That’s what a landing page is.
  prefs: []
  type: TYPE_NORMAL
- en: That’s what all good and persuasive anything is. This isn’t just a lesson on
    sales, but persuasion in general [like we talked about last week.](https://thedankoe.com/letters/the-greatest-skill-of-the-21st-century/)
  prefs: []
  type: TYPE_NORMAL
- en: Practice sales in every situation you are in. Writing, conversations, and when
    attempting to earn an income.
  prefs: []
  type: TYPE_NORMAL
- en: We aren’t going to go too deep into the process of something like a sales call,
    because in all honesty, you don’t need to worry about it.
  prefs: []
  type: TYPE_NORMAL
- en: 'As a creator, 90% of your “selling” is done through content:'
  prefs: []
  type: TYPE_NORMAL
- en: Making people aware of their problems / pain points.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Giving them solutions to test and experiment with.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Illustrating their future life so they have a desired outcome.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Most business owners don’t have the luxuries that come with building an audience.
  prefs: []
  type: TYPE_NORMAL
- en: We will discuss a more practical way to sell in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: The Micro Offer
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To the point:'
  prefs: []
  type: TYPE_NORMAL
- en: A micro offer is a service where you don’t need anything built yet.
  prefs: []
  type: TYPE_NORMAL
- en: 'All you need is:'
  prefs: []
  type: TYPE_NORMAL
- en: A social media profile as your public resume.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Content that displays your authority (by illustrating problems and giving solutions
    – AKA “giving value”)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The ability to message people that like, comment, share, or DM you asking questions
    about your posts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A questionnaire for people to fill out if you don’t message them first so they
    can show interest.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A micro offer is a way of *testing* what you should turn into a full-fledged
    product or service before you spend time doing so.
  prefs: []
  type: TYPE_NORMAL
- en: The best way to create a micro offer is simple.
  prefs: []
  type: TYPE_NORMAL
- en: '**You offer a pack of 4 weekly one-to-one sessions for $1000.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'This does a few things:'
  prefs: []
  type: TYPE_NORMAL
- en: $1000 is a solid price. If people pay for it, it means others will pay $3000-$10,000
    for a more fleshed-out offer depending on your target audience (entrepreneurs
    and business owners often don’t flinch at such high price tags… $1000 is something
    most people can afford if they really want to (don’t let limiting beliefs and
    your lack of experience take over right now)).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 4 weekly calls is enough time to get results for your client.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Only a few people can benefit from you doing the work for them (freelance work).
    *Anyone* can benefit from you *teaching* them over a call. You can call this coaching
    or consulting if you want.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can identify what should go into a full product or service after selling
    a few of these.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, what do you include in these 4 calls?
  prefs: []
  type: TYPE_NORMAL
- en: The Micro Offer Framework
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We need a starting point.
  prefs: []
  type: TYPE_NORMAL
- en: Something that you feel confident in delivering.
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 1) Identify A Big Problem**'
  prefs: []
  type: TYPE_NORMAL
- en: Relating to the main topic you have some experience in, what is a big problem
    people face?
  prefs: []
  type: TYPE_NORMAL
- en: 'You can find this in a few ways:'
  prefs: []
  type: TYPE_NORMAL
- en: Writing content about different problems and seeing which gets the most engagement.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Researching YouTube videos about the topic, seeing which ones get a lot of views,
    and watching the video to identify the problem they are targeting in that video
    (all content targets a problem).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Following social media accounts that talk about that topic and seeing which
    of their problem-related posts do best.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Big problems should fall under the health, wealth, and relationships eternal
    markets. Your job is to target one of them and position your interest around it.
  prefs: []
  type: TYPE_NORMAL
- en: If my interest is productivity, a big problem is not having the time or energy
    to make their spouse feel loved (relationships) and make progress in their career
    (wealth).
  prefs: []
  type: TYPE_NORMAL
- en: You can dig deeper by illustrating *what those problems lead to in people’s
    lives.* In this case, their relationship can grow stale and boring, causing unnecessary
    stress and little problems that stack up into mental chaos. The better you can
    illustrate what’s happening in someone’s life, the better.
  prefs: []
  type: TYPE_NORMAL
- en: (Use all of this for content).
  prefs: []
  type: TYPE_NORMAL
- en: If my interest is programming or writing, a big problem is not having a skill
    set that allows you to make more money. You slowly get prodded along by the school
    system into a career that isn’t relevant to your skill stack. That path saps your
    energy to do more with your life and ties you down with responsibilities.
  prefs: []
  type: TYPE_NORMAL
- en: Notice how I’m not only illustrating the problem, but amplifying it? That’s
    important. Probably the most important part of your marketing emails, landing
    pages, and content.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t think of the problem as something directly related to the topic or interest
    you choose.
  prefs: []
  type: TYPE_NORMAL
- en: The problem is a *pain point that people are already experiencing in their life*
    ***that your topic or interest solves.***
  prefs: []
  type: TYPE_NORMAL
- en: What is a big problem in someone’s life, and how can your interest help solve
    that?
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 2) Illustrate A Desired Lifestyle**'
  prefs: []
  type: TYPE_NORMAL
- en: What is the opposite of the problem?
  prefs: []
  type: TYPE_NORMAL
- en: What is the goal they want to achieve?
  prefs: []
  type: TYPE_NORMAL
- en: What does their life look like once they’ve reached that goal?
  prefs: []
  type: TYPE_NORMAL
- en: Write down 3 aspects of their ideal day.
  prefs: []
  type: TYPE_NORMAL
- en: 'For something like productivity, that could be:'
  prefs: []
  type: TYPE_NORMAL
- en: Wake up and do work you enjoy
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Stop feeling tired and groggy after noon so you can get work done
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Sleep well knowing you don’t have a list of spill over tasks that cause stress
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You can map out more of these if you’d like.
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 3) Create A Unique Process**'
  prefs: []
  type: TYPE_NORMAL
- en: Now, what is your actual offer?
  prefs: []
  type: TYPE_NORMAL
- en: What are you going to walk people through in your sessions?
  prefs: []
  type: TYPE_NORMAL
- en: What will you eventually be able to turn into a product or full fledged service?
  prefs: []
  type: TYPE_NORMAL
- en: You need your own unique process or system that you can continue improving.
  prefs: []
  type: TYPE_NORMAL
- en: For my 2-Hour Writer course, it’s the 3 Point Content Ecosystem.
  prefs: []
  type: TYPE_NORMAL
- en: How do you come up with this?
  prefs: []
  type: TYPE_NORMAL
- en: Write out every step someone needs to take to get from step 1 (the big problem
    or where they are now) to step 2 (their desired lifestyle).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Look over the steps and polish them up a bit. Create a system that you believe
    will work for people you help.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Slap a compelling name on that process. This is what sparks desire in your potential
    customers. I’ve created so many names that have led to the audience I have today
    like The One Person Business, The 4 Hour Workday, The Mastery Method, and more.
    I practice naming things by doing it in most of my content (this one is the Micro
    Creator, and I bet most of you are here because of it).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Let’s not make it any more complicated than that.
  prefs: []
  type: TYPE_NORMAL
- en: Over your 4 sessions with your clients, you are going to split the steps you
    wrote down to be manageable within those 4 sessions.
  prefs: []
  type: TYPE_NORMAL
- en: As a bonus, you can create a project for your client to work on that guides
    them through those steps (like a productivity planner, fitness program, writing
    a newsletter, or programming a small app).
  prefs: []
  type: TYPE_NORMAL
- en: 'That’s your entire offer:'
  prefs: []
  type: TYPE_NORMAL
- en: Problem you solve
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Desired outcome
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Unique process to bridge the gap
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As you work with people, your focus should be on improving your offer and collecting
    testimonials.
  prefs: []
  type: TYPE_NORMAL
- en: Create A Qualifying Questionnaire
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most of our clients will come from content.
  prefs: []
  type: TYPE_NORMAL
- en: But, we need somewhere for people to express interest in working with us.
  prefs: []
  type: TYPE_NORMAL
- en: Usually, this would be a landing page or even a full website that illustrates
    your product or service.
  prefs: []
  type: TYPE_NORMAL
- en: For now, forget about that. It’s not necessary.
  prefs: []
  type: TYPE_NORMAL
- en: Sign up for JotForm, TypeForm, or use Google Forms.
  prefs: []
  type: TYPE_NORMAL
- en: Put the name of a form as “Work With Me 1 on 1”
  prefs: []
  type: TYPE_NORMAL
- en: Put the description as “Implement the [your unique process]
  prefs: []
  type: TYPE_NORMAL
- en: 'Include these questions relevant to your offer:'
  prefs: []
  type: TYPE_NORMAL
- en: Name
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Email
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Social media handle (so you can reach out to them)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: What are your biggest struggles? (have multiple choice answers relevant to your
    topic and offer)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Where do you want to be 30 days from now? (have multiple choice answers relevant
    to your topic and offer)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: “This is not a free service. Are you serious about working together to [desired
    outcome]?” (yes or no options)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Short, sweet, and to the point.
  prefs: []
  type: TYPE_NORMAL
- en: Question 4 makes the prospect aware of their problem.
  prefs: []
  type: TYPE_NORMAL
- en: Question 5 sparks desire to change.
  prefs: []
  type: TYPE_NORMAL
- en: Question 6 plants the idea of payment in their mind.
  prefs: []
  type: TYPE_NORMAL
- en: You are going to be plugging this questionnaire under your content and in your
    bio link.
  prefs: []
  type: TYPE_NORMAL
- en: But what do we do after? And how do we land clients that don’t fill out the
    questionnaire?
  prefs: []
  type: TYPE_NORMAL
- en: The Art Of The DM
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When you start watching online business tutorials, you will almost always be
    told to cold email or cold DM people to land clients for a skill you barely have
    any experience in.
  prefs: []
  type: TYPE_NORMAL
- en: We already have an offer that you at least have some knowledge in.
  prefs: []
  type: TYPE_NORMAL
- en: Now, we need to DM people that *already like you, want to talk with you, and
    are potential candidates for your offer.*
  prefs: []
  type: TYPE_NORMAL
- en: Avoid messaging random people. You will probably get roasted in the DMs and
    on the timeline.
  prefs: []
  type: TYPE_NORMAL
- en: '**Who do you direct message?**'
  prefs: []
  type: TYPE_NORMAL
- en: People who comment on posts that are relevant to your offer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: People who repost or share your posts that are relevant to your offer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: People who DM you first asking questions or saying “hi”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: People who fill out your qualifying questionnaire
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Before we understand what to say in the DMs, let’s understand what we will call
    Magnetic Content.
  prefs: []
  type: TYPE_NORMAL
- en: Magnetic Content is short or long posts that are written on pain points, benefits,
    the ideal lifestyle, quick tips, personal takes on common advice, rewrites of
    high performing content from other accounts, and actionable steps to overcome
    pain points… all relating to your offer.
  prefs: []
  type: TYPE_NORMAL
- en: Once you have your offer in place, writing content around it should be relatively
    simple.
  prefs: []
  type: TYPE_NORMAL
- en: '*The people who comment or share these posts are people expressing interest
    in that topic. They are perfect to reach out to on a warm note. They already know
    you and see you with some bit of authority.*'
  prefs: []
  type: TYPE_NORMAL
- en: '(Side note: if you’re doing this on YouTube, you can’t DM people, so you need
    to tell everyone to fill out the qualifying questionnaire and email them or DM
    them on a platform like Instagram).'
  prefs: []
  type: TYPE_NORMAL
- en: '**Now, what do you say in your direct message?**'
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Pick up the conversation where it left off.**'
  prefs: []
  type: TYPE_NORMAL
- en: If they commented on or shared one of your posts, *send them the link to the
    post* and “respond” to the comment in their DMs.
  prefs: []
  type: TYPE_NORMAL
- en: If you are DMing them after they submitted your questionnaire, your job is to
    briefly walk them through all of your questionnaires questions again.
  prefs: []
  type: TYPE_NORMAL
- en: Start with *“Hey [name], I saw you submitted the form to work with me. Can you
    tell me more about why you filled it out? What are you looking to get out of working
    with me?”*
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Ask them how their endeavors are going.**'
  prefs: []
  type: TYPE_NORMAL
- en: Assuming they are interested in the topic of the post they engaged with, ask
    them if they’re learning about it or how their progress is.
  prefs: []
  type: TYPE_NORMAL
- en: For something like fitness, *“How’s the weight loss journey going? Is there
    anything I can help with?”*
  prefs: []
  type: TYPE_NORMAL
- en: This both reminds them of their desired lifestyle and makes them aware of their
    sticking points.
  prefs: []
  type: TYPE_NORMAL
- en: If you are replying to their questionnaire, ask them what they’ve done to fix
    the problems they listed.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Give them novel advice and mention your offer.**'
  prefs: []
  type: TYPE_NORMAL
- en: By now you know if you can help them or not.
  prefs: []
  type: TYPE_NORMAL
- en: Start off with some free value and education. This proves your authority.
  prefs: []
  type: TYPE_NORMAL
- en: Give them advice for what they said in step 2 and try to make it non-basic.
    For something like fitness or productivity, telling them to “drink water” is going
    to make them think you aren’t worth working with. Prove you know your sh*t.
  prefs: []
  type: TYPE_NORMAL
- en: At the end of that message, mention “I actually offer a pack of 4 sessions to
    help with this. I help you implement [your unique process], which is just a fancy
    way of saying I make it a bit easier to reach [desired outcome]. The total cost
    is on par with a good personal trainer – $1000 for the 4 sessions.”
  prefs: []
  type: TYPE_NORMAL
- en: If you are replying to their questionnaire, exchange that last paragraph for
    explaining how next steps for your offer work. You can mention that if they’re
    interested, you will send what you will talk about in each session, how they will
    schedule calls, the projects they will work on, and the invoice along with it
    for $1000.
  prefs: []
  type: TYPE_NORMAL
- en: Yes, just state the price.
  prefs: []
  type: TYPE_NORMAL
- en: '**4) Handle objections, send the invoice.**'
  prefs: []
  type: TYPE_NORMAL
- en: A sales call can help, but you don’t need one. If they ask you to go over it
    on a call, that’s worth doing.
  prefs: []
  type: TYPE_NORMAL
- en: You will probably get quite a few no’s at the start. That’s fine. That’s how
    business is at the beginning.
  prefs: []
  type: TYPE_NORMAL
- en: Remember, we are aiming for $1,000 in 60 days. It will come a lot faster after
    you get the first client and testimonials.
  prefs: []
  type: TYPE_NORMAL
- en: At this point, answer any questions they have.
  prefs: []
  type: TYPE_NORMAL
- en: Once they’re done, send them a link to an invoice with Stripe or Paypal.
  prefs: []
  type: TYPE_NORMAL
- en: The 60-Day Action Plan
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You are going to feel confused and overwhelmed.
  prefs: []
  type: TYPE_NORMAL
- en: That’s just how it is when you are learning something new.
  prefs: []
  type: TYPE_NORMAL
- en: Your mind is struggling to expand and grow. Like how you get sore after lifting
    weights.
  prefs: []
  type: TYPE_NORMAL
- en: Most of your results are going to come after day 30.
  prefs: []
  type: TYPE_NORMAL
- en: If you haven’t achieved anything worthwhile, you may not have realized that
    there is a natural filter for people who aren’t serious about doing this.
  prefs: []
  type: TYPE_NORMAL
- en: I had to post 80 YouTube videos before one went viral and I actually felt like
    my YouTube was growing.
  prefs: []
  type: TYPE_NORMAL
- en: With all things worth having, nothing happens, then everything happens.
  prefs: []
  type: TYPE_NORMAL
- en: You feel like you’re not making any progress, then your experience accumulates
    and compounds into one person saying “yes.”
  prefs: []
  type: TYPE_NORMAL
- en: Here’s what to focus on.
  prefs: []
  type: TYPE_NORMAL
- en: Whether you get immediate results or not (some will), stop being a dopamine
    junkie and give yourself the full 60 days to make your first $1,000.
  prefs: []
  type: TYPE_NORMAL
- en: '**1) Create a profile and stop worrying about it.**'
  prefs: []
  type: TYPE_NORMAL
- en: No, changing your bio isn’t going to help you magically make $10,000 a month.
  prefs: []
  type: TYPE_NORMAL
- en: Create your profile and forget about it.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) Write 3-5 short posts every day.**'
  prefs: []
  type: TYPE_NORMAL
- en: Normally I advise 1-2 short posts a day, that’s what I do.
  prefs: []
  type: TYPE_NORMAL
- en: You may think 1-2 posts is easier, but it’s not. Ideas beget ideas. By writing
    more, you have more ideas, learn more, and feel as if you are making more progress.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what to do:'
  prefs: []
  type: TYPE_NORMAL
- en: Start building a swipe file of other’s content you love and want to recreate
    (save good tweets, posts, videos, etc)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Jot down ideas as you consume content, podcasts, books, or have conversations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Write about struggles, solutions, how-to’s, breakdowns, commentary on advice
    you disagree with, and more relating to your offer.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I use [Kortex](https://kortex.co) for all of this. I’ll show you my setup in
    next week’s [YouTube video](https://youtube.com/c/DanKoeTalks) – or read [last
    week’s letter / video](https://thedankoe.com/letters/the-greatest-skill-of-the-21st-century/)
    to see the process.
  prefs: []
  type: TYPE_NORMAL
- en: Every day, remember to go through your comments and reposts to DM people.
  prefs: []
  type: TYPE_NORMAL
- en: Every day or every other day, include a link and call to action to your questionnaire
    to have more interested people to DM.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) Write 1-2 long posts a week.**'
  prefs: []
  type: TYPE_NORMAL
- en: The longer you hold attention, the more people trust you and the more value
    you can deliver. This is why I write such long newsletters. People don’t need
    another reason to take my courses or try Kortex.
  prefs: []
  type: TYPE_NORMAL
- en: Newsletters aren’t a part of the “Micro Creator” workflow. Add them in when
    you have everything else down. We break all of this down in the [One-Person Business
    Launchpad](https://thedankoe.com/opbl).
  prefs: []
  type: TYPE_NORMAL
- en: 'For long posts, you are doing a similar thing:'
  prefs: []
  type: TYPE_NORMAL
- en: Take your best posts (or others best ideas) and expand on them in a thread,
    micro article ([example](https://x.com/thedankoe/status/1824463895894835480)),
    or long post.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use the extra space to give away extra secrets. Try to include at least one
    thing that isn’t common advice or knowledge.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Plug your questionnaire at the bottom of each one.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I personally recommend writing threads. Threads are multiple tweets strung together.
    You’ve seen them before, just tweet after tweet as comments to one another.
  prefs: []
  type: TYPE_NORMAL
- en: They hold more attention by how they are structured (more readable), they guide
    the reader straight to the call to action (more sales), and they can easily be
    repurposed to a YouTube video, Instagram carousel, or LinkedIn carousel. And,
    each tweet within them can be turned into new tweets.
  prefs: []
  type: TYPE_NORMAL
- en: Long posts will be the main fuel for your growth and sales. Don’t neglect them.
  prefs: []
  type: TYPE_NORMAL
- en: But, long posts only matter if you get eyes on them.
  prefs: []
  type: TYPE_NORMAL
- en: '**4) Get eyes on your posts.**'
  prefs: []
  type: TYPE_NORMAL
- en: We didn’t talk about this much in this letter (because I can’t shut up about
    it in other letters), but the algorithm probably isn’t going to make you an overnight
    success.
  prefs: []
  type: TYPE_NORMAL
- en: Most people don’t realize that social media growth comes from *manual effort
    and skill.* Once you do realize that, you no longer see it as a game of luck for
    popular people.
  prefs: []
  type: TYPE_NORMAL
- en: You need to reply to big and small accounts.
  prefs: []
  type: TYPE_NORMAL
- en: You need to DM people to make friends with them and grow together.
  prefs: []
  type: TYPE_NORMAL
- en: You need to write threads that tag other people so they have a reason to repost
    your content.
  prefs: []
  type: TYPE_NORMAL
- en: You can learn how to do all of these in “[How To Build An Audience With Zero
    Followers](https://thedankoe.com/letters/how-to-actually-grow-on-social-media-what-they-dont-tell-you/).”
  prefs: []
  type: TYPE_NORMAL
- en: Anyone who tells you you don’t need to do those things are probably just going
    to give you a method for being inauthentic and catering to the algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to write about what you want, how you want, the algorithm probably
    won’t like it – or you’ll get lucky and catch a wave, then wonder why you stop
    growing when the platform changes.
  prefs: []
  type: TYPE_NORMAL
- en: '**5) Map out your micro offer.**'
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need a solidified product or service yet.
  prefs: []
  type: TYPE_NORMAL
- en: You simply need something that (1) you are above average at and (2) helps people
    solve a tangible problem in their life.
  prefs: []
  type: TYPE_NORMAL
- en: Think about what you’re good at.
  prefs: []
  type: TYPE_NORMAL
- en: Do other people want to learn that thing? Are they already learning about it?
    Is there an industry built around it? Do you follow people who make a living off
    of it?
  prefs: []
  type: TYPE_NORMAL
- en: Great, you have everything you need to build a million dollar company. That’s
    not a joke. You are living through an active tutorial in how people make money.
  prefs: []
  type: TYPE_NORMAL
- en: I don’t sit around writing these newsletters for no reason. Yes, I like writing
    them, a lot (or else I’d do something even more profitable), but I write them
    because they contribute to my business making money.
  prefs: []
  type: TYPE_NORMAL
- en: Every piece of content you read, landing page you go to, email you read, book
    you read, etc has money attached to it.
  prefs: []
  type: TYPE_NORMAL
- en: You aren’t making money because you aren’t creating and selling those things.
  prefs: []
  type: TYPE_NORMAL
- en: All you need, right now, is a pack of 4 calls for $1000 to teach someone something
    that will benefit their lives.
  prefs: []
  type: TYPE_NORMAL
- en: Fitness, a skill, nutrition, programming, etc etc etc.
  prefs: []
  type: TYPE_NORMAL
- en: Pick something and offer to help people with it.
  prefs: []
  type: TYPE_NORMAL
- en: Once you start getting results and know what people want, invest more time into
    building a “real” business.
  prefs: []
  type: TYPE_NORMAL
- en: '**6) Send 30 DMs a week.**'
  prefs: []
  type: TYPE_NORMAL
- en: This sounds like a high number, but it’s extremely low and borderline pathetic.
  prefs: []
  type: TYPE_NORMAL
- en: Freelancers and agency owners who send thousands of cold emails a month would
    laugh in your face if you complained about sending 30 messages a month.
  prefs: []
  type: TYPE_NORMAL
- en: But, 30 DMs multiplied by 8 weeks equals 210 DMs.
  prefs: []
  type: TYPE_NORMAL
- en: You need less than 0.5% of the people you reach out to to say “yes” to a $1,000
    offer. That’s more than possible.
  prefs: []
  type: TYPE_NORMAL
- en: But, what you may not understand is that even if you only land one client, you’ve
    built a massive network.
  prefs: []
  type: TYPE_NORMAL
- en: You have direct connections with 210 people. You’ve probably grown by a few
    hundred followers. Around 1000 people will understand your expertise. Each of
    them knowing 50-500 more people they can tell about you.
  prefs: []
  type: TYPE_NORMAL
- en: The longer you stick with this, the more people say yes, the more your audience
    grows, and soon enough you’ll have people popping out of the sky to work with
    you.
  prefs: []
  type: TYPE_NORMAL
- en: That’s it for this letter.
  prefs: []
  type: TYPE_NORMAL
- en: I hope it was beneficial.
  prefs: []
  type: TYPE_NORMAL
- en: – Dan Koe
  prefs: []
  type: TYPE_NORMAL
